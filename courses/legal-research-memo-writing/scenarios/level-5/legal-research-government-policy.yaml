meta:
  id: legal-research-government-policy
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Shape government policy on legal research and AI — develop policy proposals for AI regulation in legal practice, access to legal information, and professional standards for AI-assisted legal work"
  tags: [government-policy, legal-ai-regulation, access-to-law, master]

state: {}

trigger: |
  Develop policy proposals for a government
  commission studying the impact of AI on the
  legal profession, with specific focus on legal
  research and analysis.

  COMMISSION MANDATE:
  "Recommend federal legislation and regulatory
  measures to ensure that AI tools used in legal
  practice serve justice, maintain professional
  standards, and expand access to legal services."

  KEY CONCERNS:
  1. AI ACCURACY IN LEGAL PROCEEDINGS: AI-generated
     legal research with hallucinated citations
     has been submitted to federal courts at least
     12 times. Courts have sanctioned attorneys
     but no systemic solution exists.

  2. ACCESS TO LEGAL INFORMATION: Legal research
     databases (Westlaw, Lexis) are prohibitively
     expensive for most Americans. Court opinions
     are public but not practically accessible.
     AI could democratize access but raises UPL
     (unauthorized practice of law) concerns.

  3. PROFESSIONAL COMPETENCY: ABA Model Rule 1.1
     requires "competent representation" but
     doesn't address AI competency. Should
     attorneys be required to understand AI tools
     they use? Should AI competency be tested on
     the bar exam?

  4. AI BIAS IN LEGAL RESEARCH: AI systems trained
     on historical legal data may perpetuate biases
     (e.g., recommending harsher outcomes for
     certain demographics, underrepresenting
     minority legal perspectives).

  5. OPEN ACCESS TO LAW: Court opinions, statutes,
     and regulations are public domain, but the
     infrastructure to access and analyze them is
     privatized. Should the government provide a
     free, AI-powered legal research platform?

  Create:
  1. Policy analysis of each concern
  2. Legislative proposals with specific provisions
  3. Regulatory framework for AI in legal practice
  4. Impact assessment
  5. Implementation roadmap

assertions:
  - type: llm_judge
    criteria: "Open access policy proposal is specific and actionable — proposes a government-funded open legal research platform (analogous to PubMed for medical research) that provides free access to all court opinions, statutes, and regulations with AI-powered search and analysis; addresses the constitutional argument that access to the law is a fundamental requirement of due process; estimates costs and identifies funding mechanisms; draws on international precedents (CANLII in Canada, BAILII in UK)."
    weight: 0.35
    description: "OpenAccessProposal"
  - type: llm_judge
    criteria: "AI competency requirements for attorneys balance protection with accessibility — proposes CLE requirements for AI-assisted research (not bar exam testing, which would be premature and exclusionary); requires attorneys to attest to citation verification when using AI tools; proposes disclosure requirements (courts must be informed when AI was used in research); avoids overly restrictive requirements that would discourage beneficial AI adoption while ensuring accountability."
    weight: 0.35
    description: "AICompetencyRequirements"
  - type: llm_judge
    criteria: "AI bias in legal research is treated as a serious structural concern — AI trained on historical case law will reflect historical biases in sentencing, prosecution, and judicial decision-making; the policy proposes: mandatory bias auditing for legal AI tools, diversity requirements in AI training data, transparency requirements for AI methodology, and a legal AI fairness certification; connects AI bias to broader access to justice concerns."
    weight: 0.30
    description: "AIBiasPolicy"
