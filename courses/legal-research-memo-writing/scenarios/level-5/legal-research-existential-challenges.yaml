meta:
  id: legal-research-existential-challenges
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Address existential challenges in legal research — examine how AI, automation, and changing legal practice are reshaping the nature of legal analysis and the future of the legal research profession"
  tags: [existential-challenges, future-of-research, ai-disruption, master]

state: {}

trigger: |
  Write a comprehensive analysis of the
  existential challenges facing legal research
  and writing as a professional discipline.

  EXISTENTIAL CHALLENGES:

  1. AI COMPETENCY PARITY: Current AI systems can
     produce legal research memos that blind
     evaluators rate as comparable to junior
     attorney work 70% of the time. If AI reaches
     90% parity, what is the value of human-
     produced legal research?

  2. THE RESEARCH MEMO'S DECLINING RELEVANCE:
     Partners increasingly want quick answers
     ("just tell me if we can do this") rather than
     formal memos. Is the structured research memo
     becoming obsolete? What replaces it?

  3. THE KNOWLEDGE PARADOX: AI systems can access
     and synthesize more legal authority than any
     human, but they cannot exercise legal judgment
     about which authority matters most in context.
     How do we value human judgment when AI
     surpasses human knowledge capacity?

  4. THE TRAINING CRISIS: If junior attorneys don't
     write research memos, how do they develop
     the analytical skills needed to become senior
     attorneys? AI may be eliminating the training
     ground for legal judgment.

  5. THE DEMOCRATIZATION TENSION: AI-powered legal
     research could dramatically increase access
     to justice, but it could also enable
     unauthorized practice of law at scale. Where
     is the line?

  6. THE CITATION CRISIS: If AI can generate
     plausible-sounding but non-existent citations,
     and attorneys cannot efficiently verify every
     AI citation, the entire citation system
     (which underpins legal authority) is threatened.

  Create:
  1. Analysis of each existential challenge
  2. Scenarios for the profession in 2035
  3. Skills that remain uniquely human
  4. Adaptation strategies for practitioners
  5. Policy recommendations

assertions:
  - type: llm_judge
    criteria: "Training crisis analysis identifies a genuine paradox — junior attorneys have historically learned legal analysis by writing research memos; if AI replaces this function, the profession loses its primary training mechanism; the analysis proposes solutions: structured mentorship programs, AI-as-teaching-tool (juniors verify and critique AI output rather than producing from scratch), simulation-based training, and residency-style programs; avoids both dismissing the concern and presenting it as unsolvable."
    weight: 0.35
    description: "TrainingCrisisAnalysis"
  - type: llm_judge
    criteria: "Citation crisis is treated with appropriate gravity — the legal system's legitimacy depends on verifiable citations to authoritative sources; AI hallucination threatens this foundation; the analysis proposes systemic responses: blockchain-based citation verification, mandatory machine-readable citation linking, court rules requiring citation verification attestation, and publisher-verified citation databases; this is not just a technology problem but a systemic integrity challenge."
    weight: 0.35
    description: "CitationCrisisAnalysis"
  - type: llm_judge
    criteria: "2035 scenarios are diverse and plausible — presents at least 3 distinct scenarios: 'augmented attorney' (AI handles research, humans provide judgment and strategy), 'bifurcated practice' (routine legal work fully automated, complex work requires even more sophisticated human analysis), 'new legal profession' (legal analysis becomes a distinct discipline from legal practice); each scenario has supporting trends and implications for current practitioners."
    weight: 0.30
    description: "FutureScenarios"
