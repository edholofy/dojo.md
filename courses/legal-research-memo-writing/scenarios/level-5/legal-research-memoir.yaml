meta:
  id: legal-research-memoir
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Write a professional memoir about a career in legal research — capture the evolution from card catalogs to AI, the enduring importance of analytical rigor, and lessons for the next generation"
  tags: [memoir, career-retrospective, legal-research-evolution, master]

state: {}

trigger: |
  Write a professional memoir chapter capturing
  the most important lessons from a 30-year career
  in legal research, from law library card catalogs
  to AI-powered research assistants.

  CAREER ARC:
  - Years 1-5 (1995-2000): Law librarian at a
    small firm. Learned research by physically
    pulling reporters off shelves. Mastered the
    Digest system, Shepard's Citations (print),
    and the Index to Legal Periodicals.
  - Years 6-10 (2000-2005): Transitioned to
    electronic research. Watched Westlaw and
    LexisNexis transform the profession overnight.
    Trained attorneys who resisted computers.
  - Years 11-15 (2005-2010): Director of Research
    at an Am Law 100 firm. Built the firm's first
    knowledge management system. Struggled with
    attorneys who wouldn't share research.
  - Years 16-20 (2010-2015): Chief Knowledge
    Officer. Led firm through the mobile revolution
    and cloud-based research tools. Started seeing
    the earliest AI research tools.
  - Years 21-25 (2015-2020): Witnessed the rise
    of legal AI. Navigated the firm through the
    first AI-hallucinated citation scandal.
    Developed AI research governance.
  - Years 26-30 (2020-2025): Retired from practice.
    Now teaching the next generation at a law
    school where most students have never used a
    physical law library.

  KEY STORIES:
  1. "The Partner Who Wouldn't Google" — resistance
     to technology adoption across generations
  2. "The Million-Dollar Memo" — a research memo
     that saved a client $50M in a merger dispute
  3. "The AI Citation Scandal" — when an associate's
     AI-generated brief contained fake cases
  4. "The Lost Art of Browsing" — serendipitous
     discovery in physical libraries vs. keyword
     search tunnel vision
  5. "Teaching Machines to Think Like Lawyers" —
     advising legal AI developers on what legal
     research actually requires

  Create:
  1. Chapter narrative with compelling storytelling
  2. Practical lessons from each career phase
  3. Evolution of legal research through one career
  4. Advice for the next generation
  5. Reflection on what endures

assertions:
  - type: llm_judge
    criteria: "The evolution narrative captures genuine technological and cultural transformation — the progression from physical Digest systems through electronic databases to AI mirrors the profession's transformation; each technology shift brought both capabilities and losses (electronic research gained speed but lost serendipitous browsing; AI gained breadth but introduced hallucination risk); the memoir is a history of the profession told through one career."
    weight: 0.35
    description: "EvolutionNarrative"
  - type: llm_judge
    criteria: "'The Lost Art of Browsing' captures something genuinely important — physical law library research involved browsing adjacent cases, discovering unexpected authorities, and developing an intuitive feel for the law; keyword-based electronic search narrowed this to finding only what you're looking for; AI further narrows by presenting answers without the journey; the story makes a compelling case for preserving the analytical exploration that serendipity enabled."
    weight: 0.35
    description: "BrowsingStory"
  - type: llm_judge
    criteria: "Advice for the next generation balances respect for AI with emphasis on fundamentals — recommends mastering analytical thinking (IRAC, case synthesis, analogical reasoning) before relying on AI; warns against 'AI complacency' (accepting AI output without critical evaluation); encourages understanding how research tools work (not just using them); the advice is forward-looking without being dismissive of new technology or nostalgic for old methods."
    weight: 0.30
    description: "NextGenerationAdvice"
