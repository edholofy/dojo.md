meta:
  id: global-legal-research-standards
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Develop global legal research standards — create international frameworks for research quality, citation practices, and AI governance that work across common law, civil law, and mixed legal systems"
  tags: [global-standards, international-framework, research-quality, master]

state: {}

trigger: |
  Lead the development of global legal research
  standards through an international legal
  organizations consortium.

  INITIATIVE CONTEXT:
  - Convening body: International Bar Association
    (IBA) in partnership with AALL and BIALL
  - Participating countries: 50+ jurisdictions
  - Legal systems: Common law (US, UK, Australia,
    India), civil law (Germany, France, Japan,
    Brazil), mixed (South Africa, Scotland, Quebec),
    religious law systems (Islamic, Talmudic)
  - Challenge: No universal standard for what
    constitutes quality legal research

  STANDARDS TO DEVELOP:
  1. Universal Legal Research Quality Standard
     (ULRQS) — what makes research "good" regardless
     of jurisdiction
  2. AI-Assisted Research Ethical Guidelines —
     global norms for AI use in legal analysis
  3. Cross-Jurisdictional Citation Protocol —
     how to cite foreign authority appropriately
  4. Research Competency Framework — global
     minimum competencies for legal researchers
  5. Knowledge Sharing Standards — interoperability
     between legal knowledge systems

  KEY CHALLENGES:
  - Common law systems rely heavily on case
    precedent; civil law systems prioritize
    statutory codes and scholarly commentary
  - Citation practices vary dramatically (Bluebook
    vs. OSCOLA vs. jurisdiction-specific guides)
  - AI readiness varies widely (US/UK advanced,
    many developing countries lack infrastructure)
  - Language barriers (legal concepts may not
    translate directly)
  - Professional regulation varies (bar admission
    vs. notarial systems)

  Create:
  1. Standards development process and governance
  2. Universal research quality principles
  3. AI ethics guidelines for legal research
  4. Cross-jurisdictional citation protocol design
  5. Implementation guide for diverse legal systems

assertions:
  - type: llm_judge
    criteria: "Universal quality principles work across legal traditions — identifies quality dimensions that transcend legal system differences: thoroughness (all relevant authority considered), accuracy (citations verified), currency (law is current), balance (opposing views acknowledged), clarity (analysis is understandable), and relevance (research addresses the actual question); these principles apply whether the 'authority' is case law, statutory codes, or scholarly doctrine."
    weight: 0.35
    description: "UniversalQualityPrinciples"
  - type: llm_judge
    criteria: "AI ethics guidelines address global disparities — acknowledges that AI legal research tools are primarily trained on English-language common law jurisdictions; guidelines address: bias toward common law reasoning, underrepresentation of civil law authorities, language limitations, and the risk of AI homogenizing legal analysis across traditions; proposes safeguards that protect jurisdictional diversity while enabling cross-border AI research."
    weight: 0.35
    description: "AIEthicsGuidelines"
  - type: llm_judge
    criteria: "Cross-jurisdictional citation protocol enables meaningful reference to foreign authority — proposes a standardized format for citing foreign cases, statutes, and secondary sources that includes: jurisdiction identifier, original citation, English translation of relevant text, statement of the cited authority's weight in its home jurisdiction, and an explanatory parenthetical; the protocol is practical enough for attorneys to use and clear enough for judges to evaluate the cited authority's relevance."
    weight: 0.30
    description: "CrossJurisdictionalCitation"
