meta:
  id: legal-research-handbook
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Author a research handbook chapter on the methodology of legal research — review the literature on legal analysis methods, identify gaps in research methodology, and propose a research agenda"
  tags: [research-handbook, methodology, academic-contribution, master]

state: {}

trigger: |
  Write a chapter for the Oxford Handbook of
  Legal Research Methodology. Your chapter
  addresses how computational methods are
  transforming legal research methodology.

  CHAPTER SCOPE:
  Title: "Computational Legal Research: From
  Document Retrieval to Legal Reasoning"

  LITERATURE TO SYNTHESIZE:
  1. Traditional legal research methodology
     (Delgado's "How to Read a Legal Opinion,"
     White's legal research methodology)
  2. Legal informatics (Katz's computational legal
     studies, Ashley's case-based reasoning)
  3. Information retrieval theory applied to law
     (relevance, precision, recall in legal search)
  4. NLP for legal text analysis (contract analysis,
     case law mining, statutory parsing)
  5. AI and legal reasoning (expert systems,
     machine learning, large language models)
  6. Empirical legal studies methodology

  EMERGING QUESTIONS:
  - Can AI systems perform genuine legal reasoning
    or only pattern matching?
  - How should computational legal research be
    validated against expert human analysis?
  - What methodological standards should govern
    AI-assisted legal research?
  - How do we study the quality of legal research
    itself?

  Create:
  1. Literature synthesis and critical assessment
  2. Taxonomy of computational legal research methods
  3. Methodological framework for studying legal
     research effectiveness
  4. Research agenda with specific proposals
  5. Implications for legal education and practice

assertions:
  - type: llm_judge
    criteria: "Literature synthesis identifies the paradigm shift from retrieval to reasoning — traces the evolution from keyword search (1970s CALR systems) through Boolean-based retrieval (1990s Westlaw/Lexis) through AI-enhanced search (2010s) to AI-generated analysis (2020s); positions current LLM-based tools as a potential paradigm shift rather than incremental improvement; critically assesses whether this represents genuine progress in legal analysis or merely faster document processing."
    weight: 0.35
    description: "LiteratureSynthesis"
  - type: llm_judge
    criteria: "Taxonomy of computational methods is comprehensive and useful — classifies methods by: input type (case law, statutes, contracts), analytical approach (classification, extraction, generation, reasoning), validation methodology (accuracy metrics, expert comparison, outcome prediction), and maturity level (research prototype vs. commercial deployment); the taxonomy helps researchers position their work and identify gaps."
    weight: 0.35
    description: "MethodsTaxonomy"
  - type: llm_judge
    criteria: "Research agenda proposes feasible studies with clear contribution — each proposed study has a specific research question, available data source, appropriate methodology, and expected contribution to both theory and practice; addresses the fundamental question of whether AI legal research can be validated against human expert judgment as a gold standard; includes interdisciplinary collaboration opportunities (law + computer science + cognitive science)."
    weight: 0.30
    description: "ResearchAgenda"
