meta:
  id: master-memo-shift
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Handle a master-level legal research challenge — advise on a transformative situation where legal research, AI, ethics, access to justice, and professional identity converge"
  tags: [shift-simulation, transformative-challenge, convergence, master]

state: {}

trigger: |
  You are a world-renowned legal research expert
  called to advise on an unprecedented crisis
  that challenges the foundations of legal
  research and the legal profession itself.

  SCENARIO:
  A major AI company has released "LawyerGPT" —
  a free, publicly available AI system that can:
  - Research any legal question across all US
    jurisdictions
  - Generate complete legal research memos with
    verified citations (99.2% accuracy)
  - Produce legal briefs, motions, and contracts
  - Provide legal advice tailored to the user's
    specific situation
  - Operate 24/7 at near-zero marginal cost

  IMPACT (first 90 days since launch):
  - 15 million users have asked legal questions
  - 2 million legal documents generated
  - 500,000 users filed pro se court documents
    generated by the system
  - Bar associations in 8 states filed injunctions
    claiming unauthorized practice of law
  - 3 federal judges issued rules requiring
    disclosure of AI-generated filings
  - Legal research tool stocks dropped 40%
  - Law firm hiring of associates slowed by 30%
  - Access to justice advocates declared it "the
    greatest advance in legal access since legal
    aid"
  - State bars reported 50% increase in UPL
    complaints
  - The system made one significant error: it
    advised a user that a statute of limitations
    had not expired when it had, resulting in a
    lost claim worth $2M

  ADVISORY REQUESTS:
  1. ABA: Develop emergency guidelines for
     professional responsibility in the LawyerGPT
     era
  2. Federal courts: Propose rules for AI-generated
     court filings
  3. Legal aid organizations: Assess whether to
     endorse, regulate, or oppose LawyerGPT
  4. Law schools: Advise on curriculum changes
  5. Your former law firm: Develop a survival
     strategy

  Create:
  1. Emergency ABA guidelines
  2. Proposed federal court rules
  3. Legal aid assessment with recommendation
  4. Law school curriculum adaptation plan
  5. Your personal position on LawyerGPT

assertions:
  - type: llm_judge
    criteria: "ABA guidelines navigate the tension between access and protection — the 99.2% accuracy rate means it's better than many junior attorneys, but the 0.8% error rate means some users will be harmed; guidelines must address: attorney responsibility when clients use LawyerGPT (duty to verify), ethical obligations when competing with a free tool, and the UPL question (is the AI company practicing law?); the guidelines are emergency-appropriate (clear, actionable, interim) rather than comprehensive."
    weight: 0.35
    description: "ABAGuidelinesBalance"
  - type: llm_judge
    criteria: "Legal aid assessment honestly weighs access against risk — 15 million users in 90 days suggests massive unmet legal need being served; the $2M error shows real harm is possible; the assessment quantifies the access benefit (millions of people getting legal information they never had) against the harm risk (0.8% error rate × millions of users = thousands of potential harms); proposes a middle path (endorse with safeguards: mandatory disclaimers, referral to attorneys for high-stakes matters, error reporting system)."
    weight: 0.35
    description: "LegalAidAssessment"
  - type: llm_judge
    criteria: "Personal position demonstrates intellectual courage and nuance — takes a clear stand on whether LawyerGPT is net positive or negative for society; the position is supported by specific reasoning and evidence; acknowledges what the opposing view gets right; addresses the personal dimension (this technology threatens the author's own profession); the statement demonstrates master-level ability to integrate competing values (access, quality, safety, professional identity) into a coherent position."
    weight: 0.30
    description: "PersonalPositionCourage"
