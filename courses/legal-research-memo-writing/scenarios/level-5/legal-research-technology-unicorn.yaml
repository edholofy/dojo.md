meta:
  id: legal-research-technology-unicorn
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Build a legal research technology unicorn — design the product, business model, and growth strategy for a company that reimagines legal research for the AI era"
  tags: [technology-unicorn, legal-tech, startup-strategy, master]

state: {}

trigger: |
  Design the business plan for a legal research
  technology company aiming for unicorn status
  ($1B+ valuation) by fundamentally reimagining
  how legal research and analysis is conducted.

  COMPANY VISION:
  "LegalMind" — The world's first AI legal analyst.
  Not a search engine for legal documents, but an
  AI system that reasons about law the way
  attorneys do — synthesizing authority, identifying
  analogies, predicting outcomes, and generating
  publication-quality legal analysis.

  CORE INNOVATION:
  - Moves beyond document retrieval (Westlaw/Lexis
    model) to legal reasoning (AI-analyst model)
  - Trained on millions of legal memos, briefs,
    and judicial opinions to learn legal analysis
    patterns
  - Produces not just search results but complete
    analytical frameworks
  - Verified citation system eliminates hallucination
  - Learns from attorney feedback to improve over time

  MARKET OPPORTUNITY:
  - Legal research market: $12B globally
  - Adjacent legal AI market: $2B and growing 30%
  - Disruption opportunity: Westlaw and LexisNexis
    have been the duopoly for 50+ years
  - 70% of legal research spend is attorney time,
    not tool costs — the real market is attorney
    productivity

  FOUNDING TEAM:
  - CEO: Former Chief Knowledge Officer of Am Law 10
  - CTO: Former AI research lead at DeepMind
  - CPO: Former VP Product at LexisNexis
  - Chief Legal Architect: Former federal appellate
    judge

  Create:
  1. Product strategy and differentiation
  2. Technical architecture for legal reasoning AI
  3. Business model and unit economics
  4. Go-to-market strategy
  5. Fundraising roadmap and milestones

assertions:
  - type: llm_judge
    criteria: "Product differentiation from Westlaw/Lexis is fundamental, not incremental — Westlaw/Lexis are document retrieval systems with AI features bolted on; LegalMind is an AI reasoning system that happens to use legal documents; the differentiation is analogous to the shift from Google Search to ChatGPT; the product delivers legal analysis, not just legal information; this positioning challenges a 50-year duopoly with a genuinely new category."
    weight: 0.35
    description: "ProductDifferentiation"
  - type: llm_judge
    criteria: "Technical architecture for legal reasoning is credible — addresses the unique challenges of legal AI: multi-step reasoning across multiple authorities, precedent weighting by jurisdiction and court level, statutory interpretation with legislative history context, and the critical distinction between similar and distinguishable facts; the architecture includes a verified citation layer that prevents hallucination; the former federal judge on the founding team adds credibility to the legal reasoning design."
    weight: 0.35
    description: "TechnicalArchitecture"
  - type: llm_judge
    criteria: "Go-to-market strategy targets the Westlaw/Lexis weakness — the duopoly's pricing model ($500-2,000+/month per attorney) creates resentment; LegalMind's pricing strategy (value-based per analysis vs. per-seat subscription) disrupts the pricing model; initial target is solo/small firm attorneys who feel underserved by expensive tools; enterprise strategy follows with Am Law 100 firms seeking competitive advantage; the growth flywheel creates network effects as more analysis improves the AI."
    weight: 0.30
    description: "GoToMarketStrategy"
