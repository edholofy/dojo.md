meta:
  id: legal-research-social-enterprise
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Build a social enterprise for legal research access — design a platform that democratizes legal research for underserved communities, pro bono organizations, and public interest attorneys"
  tags: [social-enterprise, access-to-justice, legal-research-access, master]

state: {}

trigger: |
  Design a social enterprise that democratizes
  access to legal research for those who cannot
  afford commercial legal databases.

  PROBLEM STATEMENT:
  - Westlaw and LexisNexis cost $500-$2,000+/month
  - Solo practitioners and small firms often cannot
    afford comprehensive legal research tools
  - Legal aid organizations operate on tight budgets
    with limited research resources
  - Pro bono attorneys lack access to the same
    research quality as paid clients
  - Self-represented litigants (30%+ of civil cases)
    have almost no access to legal research
  - Law students from underfunded schools have
    limited database access after graduation

  TARGET POPULATIONS:
  1. Legal aid attorneys and public defenders
  2. Pro bono attorneys at firms with limited
     resources
  3. Solo practitioners in rural areas
  4. Self-represented litigants
  5. Law school clinics and incubator programs
  6. International human rights organizations

  SOCIAL ENTERPRISE MODEL:
  - Free tier: AI-powered legal research for legal
    aid organizations and public defenders
  - Subsidized tier: Affordable access for solo
    practitioners ($49/month)
  - Full-price tier: Small firm pricing ($149/month)
    that cross-subsidizes free tier
  - Technology: AI-powered research using open
    legal data (court opinions, statutes, regulations)
    plus curated secondary sources
  - Pro bono network: Volunteer attorney-researchers
    provide peer review for complex questions

  Create:
  1. Business model and financial sustainability
  2. Technology platform design
  3. Content strategy (open data + curated sources)
  4. Pro bono network recruitment and management
  5. Impact measurement and reporting

assertions:
  - type: llm_judge
    criteria: "Technology platform leverages open legal data effectively — identifies comprehensive open data sources: PACER/RECAP (federal court opinions), state court databases, govinfo.gov (statutes, regulations, congressional record), Google Scholar (case law), Cornell LII; designs AI-powered search and analysis on top of these free sources; acknowledges limitations compared to Westlaw/Lexis (no proprietary headnotes, limited editorial enhancement) and proposes community-driven alternatives."
    weight: 0.35
    description: "OpenDataPlatform"
  - type: llm_judge
    criteria: "Financial sustainability is realistic without depending on donations — models the cross-subsidy economics (how many paid users at $49-149/month are needed to support free users); identifies additional revenue streams (grants, institutional licensing to law schools, API access for legal tech developers); achieves financial sustainability within 3-5 years; the model is similar to successful open-source/freemium businesses."
    weight: 0.35
    description: "FinancialSustainability"
  - type: llm_judge
    criteria: "Impact measurement connects access to justice outcomes — measures not just platform usage (research queries served) but downstream justice outcomes: case outcomes for legal aid clients who used the platform vs. those who didn't, attorney efficiency improvements, time-to-resolution reductions, self-represented litigant success rates; the impact story is compelling for funders and partners."
    weight: 0.30
    description: "ImpactMeasurement"
