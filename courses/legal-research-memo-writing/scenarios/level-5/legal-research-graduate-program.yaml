meta:
  id: legal-research-graduate-program
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Design a graduate program in legal research and knowledge management — create an interdisciplinary curriculum combining legal analysis, information science, technology, and AI for the next generation of legal research professionals"
  tags: [graduate-program, curriculum-design, interdisciplinary, master]

state: {}

trigger: |
  Design a Master of Legal Research and Knowledge
  Management (MLRKM) program at a top university,
  combining law school and information science
  school resources.

  PROGRAM CONTEXT:
  - Joint program: Law school + School of
    Information
  - Duration: 12 months full-time, 24 months
    part-time
  - Target enrollment: 30 students per cohort
  - Target students: Law librarians seeking
    advancement, JDs transitioning to legal ops,
    information science graduates entering legal,
    mid-career attorneys seeking research leadership
  - Tuition: $55,000

  MARKET DEMAND:
  - Legal operations is the fastest-growing legal
    function
  - Chief Knowledge Officer positions at law firms
    tripled in 5 years
  - No existing degree combines legal research
    methodology with information science and AI
  - Employers report inability to find candidates
    with both legal analysis and technology skills

  CURRICULUM REQUIREMENTS:
  - Legal research methodology (across legal systems)
  - Information science (taxonomy, ontology,
    knowledge representation)
  - AI and NLP for legal applications
  - Legal writing and analysis
  - Knowledge management systems design
  - Data analytics for legal operations
  - Research ethics and AI governance
  - Capstone project with industry partner

  Create:
  1. Full curriculum with course descriptions
  2. Faculty recruitment strategy
  3. Industry partnership program
  4. Student recruitment and career outcomes
  5. Program assessment and accreditation plan

assertions:
  - type: llm_judge
    criteria: "Curriculum bridges three traditionally separate disciplines — legal analysis (understanding legal reasoning, research methodology, citation practices), information science (taxonomy design, knowledge representation, search algorithms), and technology (AI/ML, NLP, database systems); no single existing program combines all three; the curriculum produces graduates uniquely qualified for CKO, legal ops, and legal tech roles; the interdisciplinary design is the program's key differentiator."
    weight: 0.35
    description: "InterdisciplinaryCurriculum"
  - type: llm_judge
    criteria: "Career outcomes are clearly mapped to market demand — identifies specific roles graduates will fill (Chief Knowledge Officer, Director of Legal Research, Legal Operations Manager, Legal Tech Product Manager, Legal AI Specialist); provides salary data and growth projections for each role; maps specific courses to the competencies required for each career path; the career mapping makes the tuition investment decision clear for prospective students."
    weight: 0.35
    description: "CareerOutcomeMapping"
  - type: llm_judge
    criteria: "Industry partnership creates mutual value — law firms provide guest lecturers, capstone projects, internship placements, anonymized research data, and a hiring pipeline; information science companies provide technology platforms and AI tools; the program provides partners with trained talent, research insights, and beta testers for legal tech products; partnership structure creates sustainable revenue beyond tuition."
    weight: 0.30
    description: "IndustryPartnership"
