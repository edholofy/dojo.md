meta:
  id: legal-research-thought-leadership
  level: 5
  course: legal-research-memo-writing
  type: output
  description: "Establish thought leadership in legal research — develop original frameworks for research methodology, publish influential perspectives on AI's impact on legal analysis, and shape the profession's future"
  tags: [thought-leadership, research-methodology, profession-shaping, master]

state: {}

trigger: |
  Develop a thought leadership platform on the
  future of legal research and writing in the
  AI era. Your thesis: "The legal research memo
  is dead — long live legal intelligence."

  CORE ARGUMENT:
  The traditional research memo — a static document
  answering a single legal question — is being
  replaced by dynamic legal intelligence systems
  that provide continuous, real-time legal analysis
  updated automatically as law changes. The
  profession must evolve from producing documents
  to managing living legal knowledge.

  PLATFORM COMPONENTS:
  1. Keynote presentation for ABA Annual Meeting
  2. Law review article for Stanford Law Review
  3. Op-ed for Above the Law / Law.com
  4. White paper with original research data
  5. TED-style talk (18 minutes)

  SUPPORTING EVIDENCE:
  - Average shelf life of a legal research memo
    is 6 months before cited authority changes
  - 40% of attorneys report never checking whether
    their memo citations are still good law
  - AI systems can now monitor legal developments
    and alert attorneys when cited authority changes
  - Dynamic legal dashboards are replacing static
    memos at leading firms
  - The UK's Solicitors Regulation Authority already
    requires "ongoing competency" in legal knowledge

  CONTRARIAN POSITIONS TO ADDRESS:
  - "Written analysis is essential for clear thinking"
  - "AI cannot replace legal judgment"
  - "Dynamic systems create complacency"
  - "The billable hour rewards static documents"

  Create:
  1. Keynote presentation outline
  2. Law review article structure and argument
  3. Op-ed draft (800 words)
  4. White paper methodology and findings
  5. Content calendar for 12-month rollout

assertions:
  - type: llm_judge
    criteria: "The 'legal intelligence' concept is clearly defined and distinguished from traditional research — articulates the shift from point-in-time document production to continuous knowledge management; uses compelling examples (a research memo saying 'the law is X' becomes wrong when the law changes but nobody updates the memo; a legal intelligence system would flag the change automatically); the concept is practical, not just theoretical."
    weight: 0.35
    description: "LegalIntelligenceConcept"
  - type: llm_judge
    criteria: "Contrarian positions are engaged with intellectual honesty — the 'written analysis is essential for clear thinking' argument has real merit (writing forces analytical rigor); the response acknowledges this while arguing that the format of that analysis can evolve (from static document to structured, updateable knowledge objects); avoids dismissing valid concerns and proposes synthesis rather than wholesale replacement."
    weight: 0.35
    description: "ContrarianEngagement"
  - type: llm_judge
    criteria: "Op-ed is punchy, provocative, and publishable — 800 words that grab attention with a compelling opening, build the case with specific data points, acknowledge the counterargument, and close with a call to action; the writing style is appropriate for a legal industry audience (informed, opinionated, evidence-based); the op-ed would generate discussion and shares in the legal community."
    weight: 0.30
    description: "OpEdQuality"
