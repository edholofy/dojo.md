meta:
  id: research-quality-review
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Conduct a quality review of legal research memos — evaluate analytical rigor, citation accuracy, structural completeness, and practical utility across a portfolio of memo samples"
  tags: [quality-review, memo-evaluation, research-standards, advanced]

state: {}

trigger: |
  Conduct a comprehensive quality review of 5
  research memos produced by the legal department
  over the past quarter. Identify systemic quality
  issues and recommend improvements.

  MEMO SAMPLES (summaries):

  MEMO 1 — Employment discrimination analysis:
  "Strong IRAC structure, thorough case synthesis.
  However, relies exclusively on 9th Circuit
  authority for a case in the 3rd Circuit.
  Conclusion states 'the client will definitely
  win' without acknowledging counterarguments.
  No discussion of damages or litigation costs."

  MEMO 2 — Contract interpretation dispute:
  "Comprehensive 20-page analysis of a $500K
  contract dispute. Cites 45 cases. However,
  12 of the cited cases are from state courts
  in jurisdictions irrelevant to the dispute.
  No executive summary. The partner spent 2 hours
  reading it before finding the conclusion on
  page 19. The key recommendation was buried in
  a footnote."

  MEMO 3 — Regulatory compliance assessment:
  "Properly identifies applicable regulations.
  However, cites a regulation that was amended
  6 months ago without noting the amendment.
  Analysis applies the old regulatory standard.
  No discussion of agency enforcement trends.
  Template language from a prior memo was not
  fully customized (still references a different
  client's industry)."

  MEMO 4 — IP due diligence memo:
  "Excellent organization and clear writing. But
  the memo only analyzes registered IP and
  completely ignores trade secrets, open-source
  license compliance, and employee IP assignment
  gaps. The scope limitation is not acknowledged."

  MEMO 5 — Privacy law compliance memo:
  "AI-assisted first draft that was not adequately
  reviewed. Contains 3 citations to cases that
  do not exist (hallucinated). Two statutory
  references have incorrect section numbers.
  Analysis is generally correct in direction but
  the specific legal standards cited are inaccurate."

  Create:
  1. Individual evaluation of each memo
  2. Systemic quality issues identified
  3. Root cause analysis
  4. Quality improvement recommendations
  5. Quality scoring rubric for future use

assertions:
  - type: llm_judge
    criteria: "Systemic quality issues are identified across the portfolio — the review identifies patterns: jurisdictional mismatch (Memo 1, Memo 2), lack of currency checking (Memo 3), scope management failures (Memo 4), and AI verification failures (Memo 5); connects these to root causes (insufficient research protocols, no peer review process, inadequate AI governance, time pressure, lack of standardized templates); the analysis goes beyond individual memo critiques to identify department-wide improvement opportunities."
    weight: 0.35
    description: "SystemicIssueIdentification"
  - type: llm_judge
    criteria: "Quality scoring rubric is practical and comprehensive — creates a scoring framework covering: jurisdictional accuracy (correct authority for the forum), currency (law is current as of memo date), analytical rigor (counterarguments addressed, appropriate hedging), structural quality (executive summary, clear conclusion, logical organization), citation accuracy (verified, correctly formatted), scope management (limitations acknowledged), and practical utility (actionable recommendations); each criterion has clear scoring criteria."
    weight: 0.35
    description: "QualityScoringRubric"
  - type: llm_judge
    criteria: "AI verification failure in Memo 5 triggers specific protocol recommendations — the hallucinated citations represent the most serious quality failure; recommends mandatory citation verification for all AI-assisted research; proposes a specific workflow (AI generates → attorney verifies every citation → supervisor spot-checks); addresses whether AI-assisted memos should be flagged as such; connects this to the firm's ethical obligations under Model Rules."
    weight: 0.30
    description: "AIVerificationProtocol"
