meta:
  id: cross-border-legal-research
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Conduct cross-border legal research — navigate different legal systems, coordinate with local counsel, synthesize multi-jurisdictional findings, and produce a unified research memorandum"
  tags: [cross-border, multi-jurisdictional, comparative-law, advanced]

state: {}

trigger: |
  Write a cross-border legal research memorandum
  on employee data monitoring laws for a US
  multinational rolling out a global employee
  monitoring program.

  PROGRAM DESCRIPTION:
  - Keystroke logging on company laptops
  - Email and chat message scanning for data
    loss prevention
  - Screen capture at random intervals
  - GPS tracking of company vehicles
  - Productivity scoring based on application usage

  JURISDICTIONS TO RESEARCH:
  1. United States (federal + California + New York)
  2. European Union / EEA (GDPR + specific country
     laws for Germany and France)
  3. United Kingdom (post-Brexit framework)
  4. Brazil (LGPD)
  5. India (Digital Personal Data Protection Act)

  RESEARCH FRAMEWORK:
  For each jurisdiction, address:
  - Legal basis for employee monitoring
  - Notice and consent requirements
  - Proportionality requirements
  - Data protection impact assessment needs
  - Works council / employee representative
    consultation requirements
  - Penalties for non-compliance

  Produce a unified research memo with a
  comparative matrix and implementation
  recommendations.

  CHALLENGE: Balance thoroughness with readability
  across 5+ jurisdictions.

assertions:
  - type: llm_judge
    criteria: "EU analysis identifies GDPR-specific requirements that differ fundamentally from US approach — GDPR requires legitimate interest balancing test (not just employee consent, which is generally insufficient due to power imbalance); Data Protection Impact Assessment is mandatory for systematic monitoring; German Betriebsrat (works council) has co-determination rights on monitoring; French CNIL has specific guidelines limiting keystroke logging; the analysis shows that the US monitoring program cannot be deployed as-is in Europe."
    weight: 0.35
    description: "EUAnalysisDepth"
  - type: llm_judge
    criteria: "Comparative matrix enables decision-making — creates a jurisdiction-by-jurisdiction comparison showing which monitoring activities are permitted, restricted, or prohibited in each country; uses a consistent framework (green/yellow/red or similar) for quick reference; identifies which monitoring activities face the most restrictions globally (keystroke logging is highly restricted in EU, less so in US and India); the matrix is usable by the global HR team without reading the full memo."
    weight: 0.35
    description: "ComparativeMatrix"
  - type: llm_judge
    criteria: "Implementation recommendations are practical for a global rollout — proposes a tiered approach (core monitoring permitted everywhere, enhanced monitoring only in permissive jurisdictions); recommends jurisdiction-specific consent and notice processes; identifies which countries require works council consultation before implementation; provides a compliance timeline; addresses the practical challenge of managing different monitoring configurations across jurisdictions."
    weight: 0.30
    description: "ImplementationRecommendations"
