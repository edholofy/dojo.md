meta:
  id: enterprise-legal-research-program
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Design an enterprise legal research program — create research protocols, quality standards, knowledge management systems, and training frameworks for a large legal department"
  tags: [enterprise-research, knowledge-management, research-protocols, advanced]

state: {}

trigger: |
  Design a legal research program for a Fortune
  500 company's in-house legal department that
  currently has inconsistent research practices
  across 8 practice groups.

  DEPARTMENT PROFILE:
  - 75 attorneys across 8 practice groups
  - 20 paralegals and 10 legal assistants
  - Practice groups: Employment, IP, Corporate/M&A,
    Litigation, Regulatory, Real Estate, Privacy/
    Data, Government Contracts
  - Annual outside counsel spend on research:
    $2.4M (to be reduced)
  - Current tools: Westlaw (underutilized), internal
    SharePoint (disorganized), ad hoc research
  - Problems: Duplicative research (same question
    researched 3x by different attorneys), no
    knowledge capture, inconsistent memo quality,
    junior attorneys struggle without guidance

  PROGRAM OBJECTIVES:
  - Standardize research memo quality across groups
  - Capture and reuse institutional knowledge
  - Reduce duplicative research by 50%
  - Reduce outside counsel research spend by 40%
  - Train junior attorneys to be self-sufficient
  - Leverage AI research tools responsibly

  Create:
  1. Research protocol and quality standards
  2. Knowledge management system design
  3. AI-assisted research governance framework
  4. Training curriculum for junior attorneys
  5. Metrics and ROI measurement

assertions:
  - type: llm_judge
    criteria: "Knowledge management system addresses the duplicative research problem — designs a searchable repository of completed research memos tagged by legal issue, jurisdiction, practice area, and date; includes a research request intake process that checks existing work product before assigning new research; builds on precedent memos rather than starting from scratch; estimates the $2.4M outside counsel savings achievable through better internal knowledge capture."
    weight: 0.35
    description: "KnowledgeManagementDesign"
  - type: llm_judge
    criteria: "AI research governance framework is practical and responsible — defines acceptable use cases for AI research tools (initial case law survey, citation checking, research summarization) vs. prohibited uses (final legal conclusions without human verification, client-facing work without attorney review); addresses hallucination risk with mandatory verification protocols; includes training requirements before attorneys can use AI tools; balances efficiency with accuracy."
    weight: 0.35
    description: "AIResearchGovernance"
  - type: llm_judge
    criteria: "Quality standards create consistency without bureaucracy — defines minimum standards for different memo types (quick analysis: 1-2 pages, standard memo: 5-10 pages, comprehensive memo: 10+ pages); includes templates, citation requirements, peer review thresholds based on risk/complexity; quality standards are lightweight enough to not slow down routine research while ensuring rigor for high-stakes analysis."
    weight: 0.30
    description: "QualityStandards"
