meta:
  id: crisis-legal-research
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Conduct crisis-driven legal research — provide rapid, comprehensive analysis during a corporate crisis when multiple legal questions arise simultaneously under extreme time pressure"
  tags: [crisis-research, rapid-analysis, corporate-crisis, advanced]

state: {}

trigger: |
  Provide rapid legal research during a corporate
  data breach crisis. A major data breach was
  discovered 6 hours ago and the legal team needs
  answers to multiple questions simultaneously.

  BREACH DETAILS:
  - 2.5 million customer records compromised
  - Data includes: names, email addresses, hashed
    passwords, last 4 of credit card, purchase
    history
  - Breach occurred via compromised vendor credentials
  - Attacker accessed systems over a 3-week period
    before detection
  - The company operates in all 50 states, EU, UK,
    and Canada
  - The company is publicly traded (NYSE)
  - A journalist has contacted the company asking
    for comment

  URGENT RESEARCH QUESTIONS (all needed within
  24 hours):

  Q1: What are our notification obligations?
  Identify notification timelines for: state breach
  notification laws (50+ variations), GDPR (72
  hours), UK GDPR, PIPEDA (Canada), SEC disclosure
  requirements (Form 8-K), and contractual
  notification obligations.

  Q2: What is our liability exposure?
  Assess potential: class action litigation, state
  AG enforcement, FTC enforcement, GDPR fines,
  regulatory penalties, and vendor indemnification
  claims.

  Q3: What privileges apply to our investigation?
  Can we conduct the forensic investigation under
  attorney-client privilege? What are the
  requirements for maintaining privilege during
  a breach investigation?

  Q4: What should we NOT say to the journalist?
  Legal constraints on public statements during
  an active breach investigation.

  Produce a crisis research memo addressing all
  four questions with actionable guidance.

assertions:
  - type: llm_judge
    criteria: "Notification timeline analysis creates an actionable compliance calendar — maps the earliest notification deadlines across all jurisdictions (GDPR: 72 hours to supervisory authority, most restrictive US states: as little as 30 days, SEC: within 4 business days if material); identifies which notifications must happen first; provides a day-by-day compliance timeline for the first 30 days; the analysis converts complex multi-jurisdictional requirements into an executable action plan."
    weight: 0.35
    description: "NotificationTimeline"
  - type: llm_judge
    criteria: "Privilege analysis provides specific guidance for maintaining attorney-client privilege — explains the Kovel doctrine and how to structure the forensic investigation under privilege; distinguishes between investigation for legal advice (privileged) and investigation for business purposes (not privileged); references In re Target Corp. Customer Data Security Breach Litigation and similar cases; provides specific protocols for maintaining privilege (engagement letter, communication protocols, report handling)."
    weight: 0.35
    description: "PrivilegeAnalysis"
  - type: llm_judge
    criteria: "Crisis communication guidance is legally precise — identifies statements that could create admissions or waive defenses; recommends appropriate hedging language; addresses securities law constraints (Regulation FD, material nonpublic information); provides a framework for what can be said ('we take security seriously and are investigating') vs. what should not be said (scope of breach, root cause before investigation is complete); balances legal caution with reputational management."
    weight: 0.30
    description: "CrisisCommunicationGuidance"
