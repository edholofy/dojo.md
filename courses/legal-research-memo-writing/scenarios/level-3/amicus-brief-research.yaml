meta:
  id: amicus-brief-research
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Research and draft an amicus curiae brief — identify the unique perspective to offer the court, synthesize policy arguments and empirical data, and present compelling non-party advocacy"
  tags: [amicus-brief, appellate-advocacy, policy-arguments, advanced]

state: {}

trigger: |
  Research and draft an amicus curiae brief for
  a technology industry trade association in a
  Supreme Court case addressing whether Section
  230 of the Communications Decency Act protects
  platforms from liability for algorithmically
  recommended content.

  CASE OVERVIEW:
  - A victim's family sued a social media platform
    alleging its recommendation algorithm promoted
    extremist content that radicalized the attacker
  - Lower court held Section 230 immunity applies
  - Supreme Court granted certiorari on the question:
    Does Section 230 immunity extend to algorithmic
    content recommendations?

  AMICUS ROLE:
  - Client: TechForward Alliance (trade association
    representing 200+ technology companies)
  - Perspective: Industry expertise on how
    recommendation algorithms function and the
    practical impact of narrowing Section 230

  ARGUMENTS TO DEVELOP:
  1. How recommendation algorithms work technically
     (they are integral to organizing all content,
     not just problematic content)
  2. Narrowing Section 230 would expose platforms
     to liability for basic content organization
  3. The economic and innovation impact of increased
     liability
  4. International comparison — how other countries
     handle platform liability
  5. The line between editorial discretion and
     algorithmic recommendation is technically
     indistinguishable

  Create:
  1. Statement of Interest (why this amicus has
     unique perspective)
  2. Summary of Argument
  3. Full argument section with supporting authority
  4. Policy analysis with empirical data
  5. Conclusion with specific ask

assertions:
  - type: llm_judge
    criteria: "Technical explanation makes algorithms accessible to non-technical judges — explains that recommendation algorithms are not selecting specific content to promote but are organizing billions of pieces of content based on relevance, recency, and user preferences; analogizes to a bookstore's organizational decisions (alphabetical, by popularity, staff picks); makes the case that treating algorithmic organization as 'publication' would create liability for basic content sorting."
    weight: 0.35
    description: "TechnicalExplanation"
  - type: llm_judge
    criteria: "Amicus brief adds value beyond what the parties provide — the trade association's unique perspective is industry-wide impact and technical expertise; the brief includes empirical data on the economic impact of Section 230 (enabling the growth of the $1T+ internet economy), practical consequences of narrowing immunity (which would affect all platforms, not just social media), and technical explanations that the parties may not provide; the statement of interest establishes why the court should listen."
    weight: 0.35
    description: "UniqueAmicusValue"
  - type: llm_judge
    criteria: "Policy arguments are substantive and candid — acknowledges the genuine harm caused by extremist content without dismissing the plaintiff's concerns; argues that the solution should come from Congress (legislative, not judicial narrowing of Section 230); proposes alternative approaches (content moderation transparency, notice-and-takedown improvement) that address the harm without creating broad platform liability; the brief is persuasive because it engages honestly with the opposing view."
    weight: 0.30
    description: "PolicyArgumentSubstance"
