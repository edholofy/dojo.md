meta:
  id: advanced-memo-shift
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Handle an advanced legal research shift — coordinate multiple research streams, manage a team of researchers, synthesize complex multi-jurisdictional findings, and deliver strategic legal intelligence"
  tags: [shift-simulation, team-coordination, strategic-research, advanced]

state: {}

trigger: |
  You are the senior research attorney coordinating
  a major research project. A client (a multinational
  technology company) is considering a hostile
  takeover bid for a competitor. You have 72 hours
  to deliver a comprehensive legal research package.

  RESEARCH STREAMS (you are coordinating all):

  STREAM 1 — Securities Regulation:
  - Williams Act (Section 13(d), 14(d)) disclosure
    requirements for tender offers
  - Hart-Scott-Rodino premerger notification
  - Poison pill / shareholder rights plan analysis
    (target has one in place)
  - State anti-takeover statutes (target is
    incorporated in Delaware, headquartered in
    Massachusetts)

  STREAM 2 — Antitrust:
  - Horizontal merger analysis under Clayton Act § 7
  - HHI analysis for the relevant market (cloud
    infrastructure — concentrated market)
  - Recent DOJ/FTC merger enforcement trends in
    technology
  - Potential divestiture requirements

  STREAM 3 — Regulatory Approvals:
  - CFIUS review (target has government contracts)
  - EU Merger Regulation (both companies operate
    extensively in EU)
  - UK CMA review
  - Sector-specific regulatory approvals (FCC if
    spectrum assets involved)

  STREAM 4 — Employment and Integration:
  - Target's executive change-of-control agreements
  - WARN Act implications for post-acquisition
    workforce reduction
  - Non-compete enforceability for key employees
  - Employee benefits integration requirements

  Create:
  1. Research coordination plan with assignments
  2. Synthesized executive summary of key findings
  3. Risk assessment matrix across all streams
  4. Critical path timeline for regulatory approvals
  5. Strategic recommendations for the bid

assertions:
  - type: llm_judge
    criteria: "Research streams are integrated into a coherent strategic picture — the securities, antitrust, regulatory, and employment analyses are not presented in isolation but are synthesized to show how they interact (e.g., HSR filing timing affects tender offer timeline, CFIUS review could delay or block the deal, antitrust concerns may require divestitures that change the strategic rationale); the executive summary connects all streams into actionable strategic guidance."
    weight: 0.35
    description: "ResearchStreamIntegration"
  - type: llm_judge
    criteria: "Delaware anti-takeover analysis is sophisticated — addresses the poison pill (shareholder rights plan) defenses available under Delaware law; references Revlon, Unocal, and Blasius standards; analyzes whether the target's board can 'just say no' or has Revlon duties if the offer is sufficiently high; considers whether the bidder can wage a proxy contest to replace the board; this is the strategic heart of the hostile takeover analysis."
    weight: 0.35
    description: "DelawareTakeoverAnalysis"
  - type: llm_judge
    criteria: "Critical path timeline identifies deal-breaking dependencies — maps the regulatory approval timeline (HSR: 30-day initial waiting period, CFIUS: up to 135 days, EU: 25-90 working days, UK CMA: variable); identifies which approvals must be sequential vs. parallel; calculates the minimum timeline to closing; highlights which regulatory stream poses the greatest risk of delay or blockage; the timeline enables the client to make an informed bid decision."
    weight: 0.30
    description: "CriticalPathTimeline"
