meta:
  id: precedent-mapping-analysis
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Map precedent development on a legal issue — trace how a legal doctrine evolved across circuits and over time, identify trends, predict future developments, and advise on litigation timing"
  tags: [precedent-mapping, doctrinal-evolution, circuit-analysis, advanced]

state: {}

trigger: |
  Map the development of the "right to repair"
  doctrine across federal and state courts,
  legislative bodies, and regulatory agencies.
  Advise a consumer electronics company on the
  legal landscape and strategic implications.

  CLIENT CONTEXT:
  - Major consumer electronics manufacturer
  - Products: Smartphones, laptops, smart home
    devices
  - Current policy: Proprietary repair ecosystem
    (authorized service providers only, software
    locks on unauthorized parts)
  - Concerns: Growing right-to-repair movement
    threatens the authorized repair model

  RESEARCH SCOPE:
  1. Federal legislative proposals (FAIR Repair Act,
     etc.)
  2. State right-to-repair laws (enacted and
     proposed, focusing on electronics)
  3. FTC enforcement actions and policy statements
     on repair restrictions
  4. Copyright/DMCA implications (Section 1201
     anti-circumvention)
  5. Antitrust theories related to repair markets
  6. International developments (EU right to repair
     directive)

  DELIVERABLE:
  - Comprehensive precedent map showing doctrinal
    evolution
  - Jurisdictional heat map of legislative activity
  - Prediction of regulatory trajectory
  - Strategic recommendations for the client

  Create the comprehensive research memo with
  precedent mapping.

assertions:
  - type: llm_judge
    criteria: "Precedent map traces the doctrinal evolution chronologically and thematically — shows how right-to-repair moved from a consumer advocacy concept to FTC policy priority to state legislation; identifies key inflection points (FTC's 2021 repair restrictions report, initial state laws, EU directive); traces the interaction between copyright law (DMCA Section 1201 exemptions for repair) and repair rights; the map reveals the direction and velocity of legal change."
    weight: 0.35
    description: "PrecedentMapping"
  - type: llm_judge
    criteria: "Regulatory trajectory prediction is evidence-based — analyzes the pattern of state legislative activity (which states have enacted laws, which have bills pending, which have failed attempts); assesses FTC enforcement priorities; considers the EU directive's influence on US policy (Brussels effect); predicts whether federal legislation is likely and on what timeline; the prediction is grounded in observable trends, not speculation."
    weight: 0.35
    description: "TrajectoryPrediction"
  - type: llm_judge
    criteria: "Strategic recommendations help the client adapt proactively — identifies whether resistance or adaptation is the better strategy; recommends specific actions (voluntary repair program to preempt legislation, lobbying strategy, litigation positions to preserve, contract modifications with suppliers); considers the reputational dimension (consumer perception of repair-friendly vs. repair-hostile companies); the recommendations are forward-looking, not reactive."
    weight: 0.30
    description: "StrategicRecommendations"
