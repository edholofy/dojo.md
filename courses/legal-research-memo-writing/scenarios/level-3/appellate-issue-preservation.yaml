meta:
  id: appellate-issue-preservation
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Analyze appellate issue preservation — research which trial court objections and arguments are preserved for appeal, identify waiver risks, and advise on appellate strategy"
  tags: [appellate-research, issue-preservation, waiver, advanced]

state: {}

trigger: |
  Write a comprehensive research memo analyzing
  whether key trial-level issues are preserved
  for appeal following an adverse jury verdict
  in a product liability case.

  TRIAL OUTCOME:
  - Jury found for plaintiff, awarding $8.5M in
    compensatory damages and $25M in punitive damages
  - Defendant is a pharmaceutical company defending
    against claims that its pain medication caused
    liver damage

  POTENTIAL APPELLATE ISSUES:

  ISSUE 1 — Expert Witness Exclusion:
  Defendant's Daubert motion to exclude plaintiff's
  expert (a toxicologist) was denied pre-trial.
  Defendant did not renew the objection at trial
  when the expert testified. Defendant's expert
  was excluded under Daubert. Defendant objected
  and cited specific Daubert factors at the time.

  ISSUE 2 — Jury Instruction Error:
  Defendant proposed a "sophisticated user" defense
  instruction. Court rejected it. Defendant
  objected at the charge conference but the
  objection was general ("We object to the
  court's refusal to give our proposed instruction
  #14") without stating specific grounds.

  ISSUE 3 — Punitive Damages:
  Defendant moved for judgment as a matter of
  law on punitive damages under Rule 50(a) before
  the case went to the jury but did NOT renew
  the motion under Rule 50(b) post-verdict.

  ISSUE 4 — Evidence Exclusion:
  Defendant sought to introduce FDA approval
  evidence. Court excluded it under Rule 403.
  Defendant made a proffer of the excluded evidence.

  JURISDICTION: Fifth Circuit (Federal)

  Write a memo analyzing preservation for each
  issue and recommending appellate strategy.

assertions:
  - type: llm_judge
    criteria: "Rule 50(b) waiver issue is correctly analyzed as fatal — failure to renew a Rule 50(a) motion as a Rule 50(b) motion post-verdict waives the right to challenge sufficiency of the evidence on appeal (Unitherm Food Systems v. Swift-Eckrich, 2006); this means the $25M punitive damages award likely cannot be challenged for evidentiary sufficiency on appeal; the memo correctly identifies this as the most serious preservation failure and explains the limited exceptions (plain error, constitutional issues)."
    weight: 0.35
    description: "Rule50WaiverAnalysis"
  - type: llm_judge
    criteria: "Jury instruction objection specificity is properly analyzed — a general objection ('we object to the refusal') without stating specific legal grounds may be insufficient to preserve the issue for appeal in the Fifth Circuit; the memo analyzes the specificity requirements under the circuit's rules and case law; contrasts this with the preserved Daubert objection for the defendant's expert (which cited specific grounds); recommends whether this issue is worth pursuing on appeal."
    weight: 0.35
    description: "InstructionObjectionSpecificity"
  - type: llm_judge
    criteria: "Appellate strategy prioritizes preserved issues — recommends focusing appellate arguments on the two well-preserved issues (defendant's expert exclusion with specific Daubert objection, FDA evidence exclusion with proffer) while acknowledging the uphill battles on the poorly preserved issues; proposes a realistic assessment of success probability for each issue; the strategy is practical, not merely academic."
    weight: 0.30
    description: "AppellateStrategyPrioritization"
