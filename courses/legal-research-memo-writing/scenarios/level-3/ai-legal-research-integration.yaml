meta:
  id: ai-legal-research-integration
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Integrate AI tools into legal research workflows — evaluate AI research platforms, design human-AI collaboration protocols, address accuracy and ethics concerns, and measure AI impact on research quality"
  tags: [ai-integration, legal-research-tools, human-ai-collaboration, advanced]

state: {}

trigger: |
  Design an AI integration strategy for a
  200-attorney law firm that wants to adopt AI
  legal research tools while maintaining research
  quality and ethical obligations.

  FIRM PROFILE:
  - 200 attorneys across 15 offices
  - Practice areas: Litigation, Corporate,
    Regulatory, IP, Labor & Employment
  - Current research tools: Westlaw Edge,
    LexisNexis, Bloomberg Law
  - Annual research spend: $4.5M (tools + staff time)
  - Recent incident: A partner submitted a brief
    containing AI-hallucinated case citations
  - Ethics committee has paused all AI use pending
    policy development

  AI TOOLS UNDER EVALUATION:
  - CoCounsel (Thomson Reuters/Westlaw) — legal
    research AI assistant
  - Lexis+ AI — LexisNexis generative AI
  - Harvey — general legal AI platform
  - Internal GPT deployment with firm-specific data

  REQUIREMENTS:
  - Must comply with ABA Model Rules (competence,
    supervision, confidentiality)
  - Must prevent hallucinated citations (zero
    tolerance)
  - Must maintain client confidentiality when using
    external AI tools
  - Must be auditable for billing purposes
  - Must include training before rollout
  - Must measure impact on research quality and
    efficiency

  Create:
  1. AI tool evaluation framework and recommendation
  2. Human-AI research workflow design
  3. Quality assurance protocol for AI-generated research
  4. Ethics and compliance framework
  5. Rollout plan with training and metrics

assertions:
  - type: llm_judge
    criteria: "Quality assurance protocol addresses the hallucination problem directly — requires mandatory human verification of every case citation generated by AI before inclusion in any work product; defines a verification workflow (AI generates → attorney verifies each citation exists and supports the stated proposition → supervisor reviews); implements automated citation checking where possible; the zero-tolerance standard is enforced through process design, not just policy."
    weight: 0.35
    description: "HallucinationPrevention"
  - type: llm_judge
    criteria: "Ethics framework addresses ABA Model Rule obligations — Rule 1.1 (competence) requires attorneys to understand AI tool limitations; Rule 5.1/5.3 (supervision) applies to AI outputs as it would to paralegal work; Rule 1.6 (confidentiality) restricts which client information can be input into external AI tools; the framework maps each ethical obligation to a specific protocol; addresses billing ethics (can you bill for AI-assisted research at full attorney rates?)."
    weight: 0.35
    description: "EthicsFramework"
  - type: llm_judge
    criteria: "Tool evaluation compares products on dimensions that matter for legal research — accuracy (tested against known research questions), confidentiality (data handling and training policies), integration (with existing Westlaw/Lexis workflows), auditability (research trail documentation), and cost; the evaluation is based on functional criteria, not marketing claims; recommends a preferred tool with clear rationale."
    weight: 0.30
    description: "ToolEvaluationFramework"
