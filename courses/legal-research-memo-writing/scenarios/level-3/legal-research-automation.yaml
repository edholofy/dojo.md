meta:
  id: legal-research-automation
  level: 3
  course: legal-research-memo-writing
  type: output
  description: "Design legal research automation workflows — create templates, checklists, and automated processes that accelerate research while maintaining quality and legal rigor"
  tags: [research-automation, workflow-design, templates, advanced]

state: {}

trigger: |
  Design an automated legal research workflow
  system for a legal department that handles
  1,000+ research requests per year across
  recurring legal topics.

  DEPARTMENT CONTEXT:
  - 40 attorneys, 15 paralegals
  - Research requests come from 12 business units
  - 60% of requests fall into recurring categories:
    * Employment law (hiring, termination, leave)
    * Contract review (standard terms analysis)
    * Regulatory compliance (industry-specific)
    * IP (trademark clearance, patent landscape)
    * Privacy/data protection (new product reviews)
  - 40% are novel or complex issues

  CURRENT PROBLEMS:
  - Average turnaround: 5 business days
  - No intake process — requests come via email,
    Slack, hallway conversations
  - No tracking of open research requests
  - Recurring questions are researched from scratch
  - Quality varies by attorney expertise
  - No way to measure research value or impact

  AUTOMATION REQUIREMENTS:
  - Self-service portal for research requests
  - Automated routing based on topic and complexity
  - Template-based responses for recurring topics
  - Knowledge base of past research
  - AI-assisted first drafts for standard topics
  - Tracking and SLA management
  - Quality scoring and feedback loops

  Create:
  1. Research request intake and classification system
  2. Template library design for recurring topics
  3. AI-assisted drafting workflow with quality controls
  4. SLA framework by request complexity
  5. Continuous improvement and metrics dashboard

assertions:
  - type: llm_judge
    criteria: "Intake and classification system reduces the 5-day turnaround — automates request routing based on topic classification (employment, contract, regulatory, IP, privacy) and complexity scoring; simple recurring questions get template-based responses within 24 hours; medium complexity gets attorney review within 3 days; complex/novel questions get full research within 5 days; the system prevents bottlenecks by distributing work based on attorney expertise and current workload."
    weight: 0.35
    description: "IntakeClassificationSystem"
  - type: llm_judge
    criteria: "Template library addresses the 60% recurring research — creates modular research templates for each recurring category (e.g., at-will termination checklist by state, standard contract term analysis framework, GDPR data processing assessment); templates include jurisdiction-specific variations, relevant citations, and customizable analysis sections; templates are living documents updated as law changes; reduces time-to-delivery for recurring topics by 70%+."
    weight: 0.35
    description: "TemplateLibraryDesign"
  - type: llm_judge
    criteria: "AI-assisted drafting has appropriate guardrails — defines which research categories are suitable for AI first drafts (recurring, well-established law) vs. which require human-first research (novel issues, unsettled law, high-stakes matters); includes mandatory attorney review before delivery; addresses the risk of AI-generated errors in legal analysis; the workflow accelerates research without compromising accuracy."
    weight: 0.30
    description: "AIAssistedDraftingGuardrails"
