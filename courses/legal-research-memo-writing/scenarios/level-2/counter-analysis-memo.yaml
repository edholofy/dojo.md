meta:
  id: counter-analysis-memo
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Write a memo with thorough counter-analysis — anticipate opposing arguments, distinguish unfavorable precedent, and assess the strength of both sides for strategic decision-making"
  tags: [counter-analysis, opposing-arguments, balanced-analysis, intermediate]

state: {}

trigger: |
  Write a research memo with balanced counter-
  analysis on whether a hospital's COVID-19
  vaccination mandate for employees violates
  religious freedom protections.

  FACTS:
  - Hospital requires all employees to be vaccinated
    against COVID-19 as a condition of employment
  - Employee (a nurse) claims a sincere religious
    belief that prohibits receiving vaccines
  - Employee's religion is a recognized denomination
    that does not have an official position on
    vaccines
  - Employee's religious belief is personal, not
    based on denominational doctrine
  - Hospital offered alternatives: weekly testing
    and masking. Employee rejected these as
    "participating in the same system"
  - Hospital terminated the employee after the
    accommodation was rejected
  - Hospital is a private, non-sectarian institution
  - Hospital serves immunocompromised patients

  LEGAL FRAMEWORK:
  - Title VII of the Civil Rights Act (religious
    discrimination and accommodation)
  - State religious freedom restoration act (RFRA)
  - First Amendment (if applicable)
  - EEOC guidance on COVID-19 vaccination mandates

  MEMO REQUIREMENT:
  Write a balanced memo that fully develops BOTH
  sides of the argument, not just the client's
  position. The partner needs to understand the
  strength of both the employer's and employee's
  cases.

assertions:
  - type: llm_judge
    criteria: "Both sides are fully developed — the employee's case includes: sincerity of religious belief does not require denominational support (Thomas v. Review Board), employer must attempt reasonable accommodation, weekly testing was offered but may not address all concerns; the employer's case includes: undue hardship (direct threat to immunocompromised patients, healthcare setting safety), accommodation was offered and rejected, employee's refusal of alternative accommodation weakens the claim; neither side is given superficial treatment."
    weight: 0.35
    description: "BalancedAnalysis"
  - type: llm_judge
    criteria: "Sincerity analysis is nuanced — the memo addresses whether a personal religious belief (not supported by denominational doctrine) qualifies for Title VII protection; correctly identifies that Title VII protects sincere individual religious beliefs regardless of whether they are part of a recognized religion's tenets; also addresses the employer's right to question sincerity without it constituting discrimination; this is a genuinely close legal question."
    weight: 0.35
    description: "SincerityAnalysis"
  - type: llm_judge
    criteria: "Undue hardship analysis reflects the healthcare context — the Groff v. DeJoy (2023) standard heightened the employer's burden beyond the de minimis standard of TWA v. Hardison; the memo applies the new standard while recognizing that healthcare settings present unique patient safety concerns that strengthen the undue hardship argument; the analysis is specific to the healthcare context rather than generic employer accommodation analysis."
    weight: 0.30
    description: "UndueHardshipAnalysis"
