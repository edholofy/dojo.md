meta:
  id: multi-issue-employment-memo
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Write a multi-issue employment law memo — analyze wrongful termination, discrimination, and retaliation claims in a single comprehensive research memorandum with proper organization"
  tags: [multi-issue, employment-law, wrongful-termination, intermediate]

state: {}

trigger: |
  Write a comprehensive multi-issue research
  memorandum on potential employment law claims
  for a terminated employee.

  FACTS:
  - Employee: Sarah Chen, 52-year-old software
    engineer at TechCorp, employed for 8 years
  - Performance: Consistently rated "Exceeds
    Expectations" for 7 years; most recent review
    (3 months before termination) rated "Meets
    Expectations" with vague criticism
  - Complaint: 6 weeks before termination, Sarah
    reported to HR that her new manager (age 35)
    made comments like "we need fresh perspectives"
    and "the team needs to be more agile and modern"
  - Termination: Laid off as part of a "restructuring"
    that eliminated 4 positions; all 4 were over
    age 45; 3 younger employees with less experience
    were retained in similar roles
  - Severance: Offered 4 weeks severance conditioned
    on signing a release of all claims including
    ADEA claims; given 21 days to consider
  - Post-termination: Sarah's position was posted
    2 months later with the title "Senior Developer"
    at a lower salary

  JURISDICTION: Massachusetts

  ISSUES TO ANALYZE:
  1. Age discrimination under ADEA and Massachusetts
     anti-discrimination law (M.G.L. c. 151B)
  2. Retaliation for the HR complaint
  3. Adequacy of the ADEA waiver under the OWBPA
  4. Potential damages and litigation strategy

  Write a comprehensive multi-issue research memo
  addressing all four issues with proper IRAC
  structure for each.

assertions:
  - type: llm_judge
    criteria: "Multi-issue organization is clear and logical — each of the four issues gets its own IRAC section with clear headings; threshold issues (ADEA waiver validity) are addressed appropriately in the analysis; the memo includes a brief answer section summarizing conclusions for all issues; cross-references between issues are handled smoothly (e.g., retaliation analysis references the discrimination complaint)."
    weight: 0.35
    description: "MultiIssueOrganization"
  - type: llm_judge
    criteria: "Age discrimination analysis is thorough — applies McDonnell Douglas burden-shifting framework; identifies strong circumstantial evidence (all 4 terminated employees over 45, younger less-experienced employees retained, position reposted at lower salary, manager's ageist comments); addresses both ADEA (federal) and M.G.L. c. 151B (state) claims and their differences; Massachusetts law may provide broader protections and higher damages."
    weight: 0.35
    description: "AgeDiscriminationAnalysis"
  - type: llm_judge
    criteria: "OWBPA waiver analysis is technically precise — the Older Workers Benefit Protection Act requires specific provisions for valid ADEA waivers including: 21 days to consider (met), 7-day revocation period (to verify), written in understandable language, specific reference to ADEA rights, advice to consult attorney, and adequate consideration; if part of a group termination (which this is — 4 positions), additional requirements apply including 45-day consideration period and disclosure of ages of terminated and retained employees."
    weight: 0.30
    description: "OWBPAWaiverAnalysis"
