meta:
  id: emerging-technology-memo
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Write a memo on emerging technology legal issues — research novel legal questions with limited precedent, reason by analogy from existing law, and identify regulatory gaps"
  tags: [emerging-technology, novel-issues, analogical-reasoning, intermediate]

state: {}

trigger: |
  Write a research memo on the legal implications
  of a company using AI-generated voices for
  customer service calls without disclosing that
  the voice is artificial.

  FACTS:
  - Company uses AI voice synthesis to handle
    80% of inbound customer service calls
  - The AI voice is modeled on a former employee's
    voice (who consented during employment but has
    since left the company)
  - Callers are not informed they are speaking with
    an AI; the system does not disclose its nature
  - The AI handles complaints, processes returns,
    and collects personal information (addresses,
    credit card numbers)
  - The company operates in all 50 states
  - Several states have enacted or proposed AI
    disclosure laws

  LEGAL QUESTIONS:
  1. Must the company disclose that the voice is
     AI-generated?
  2. Can the former employee's voice be used
     after employment ends?
  3. What are the implications under state consumer
     protection laws?
  4. Are there FTC deception concerns?
  5. How do emerging state AI laws affect this?

  CHALLENGE: This is a rapidly evolving area with
  limited direct precedent. The memo should reason
  by analogy from existing law where direct
  authority is unavailable.

  Write a comprehensive memo identifying applicable
  legal frameworks and predicting regulatory trends.

assertions:
  - type: llm_judge
    criteria: "Analogical reasoning bridges precedent gaps effectively — where direct AI voice precedent is lacking, the memo draws analogies from established areas: right of publicity law (using someone's voice without consent), robocall/TCPA regulations (automated calling disclosure requirements), consumer protection law (deceptive practices by omission), and wiretapping laws (consent to recording with an AI); each analogy is clearly explained as analogical rather than direct authority."
    weight: 0.35
    description: "AnalogicalReasoning"
  - type: llm_judge
    criteria: "Voice rights analysis addresses the former employee's consent gap — consent to use one's voice during employment may not extend post-employment; right of publicity varies by state but generally protects against commercial use of identity; the analysis identifies potential claims (right of publicity, Lanham Act § 43(a) false endorsement, contract breach if consent was limited); this is a distinct legal issue from the AI disclosure question."
    weight: 0.35
    description: "VoiceRightsAnalysis"
  - type: llm_judge
    criteria: "Emerging state AI laws are surveyed with regulatory trend prediction — identifies specific state laws requiring AI disclosure (California's BOT Act, Illinois's AI Video Interview Act, and newer laws); maps the trend toward mandatory AI disclosure in consumer interactions; predicts that federal regulation is likely and recommends proactive disclosure as a risk mitigation strategy regardless of current legal requirements."
    weight: 0.30
    description: "EmergingAILawSurvey"
