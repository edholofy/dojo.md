meta:
  id: intermediate-memo-shift
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Handle an intermediate legal research shift — manage complex research requests with competing deadlines, produce memos of varying types and depth, and navigate ambiguous research questions"
  tags: [shift-simulation, multi-complexity, deadline-management, intermediate]

state: {}

trigger: |
  You are a mid-level associate handling a busy
  research day. You have four requests of varying
  complexity and urgency.

  REQUEST 1 (Due: 2 hours — partner in deposition):
  Partner texts: "Opposing counsel just cited
  'Carpenter v. United States' to argue that our
  client's employee monitoring software violates
  the Fourth Amendment. Is Carpenter relevant to
  private employer surveillance? Need answer ASAP
  for deposition."

  Quick memo required: Is the Fourth Amendment
  (as interpreted in Carpenter) applicable to
  private employer electronic monitoring?

  REQUEST 2 (Due: End of day):
  Client (a social media company) wants to know
  if their new feature — automatically analyzing
  users' direct messages to serve targeted
  advertising — violates the Electronic
  Communications Privacy Act (18 U.S.C. § 2511).
  Users consent to "message analysis for service
  improvement" in the terms of service but the ToS
  does not specifically mention advertising.

  REQUEST 3 (Due: Tomorrow):
  Junior associate drafted a 15-page research
  memo on whether a force majeure clause covers
  a cyberattack. The memo has structural problems,
  weak analysis, and citation errors. Review and
  provide detailed editorial feedback.

  MEMO EXCERPT (from junior's draft):
  "Force majeure is a thing that happens when
  events beyond control occur. In the case of
  cyberattacks, it is arguable that these events
  could be force majeure. The contract says 'acts
  of God, war, and other events beyond the
  parties' reasonable control.' A cyberattack is
  arguably beyond control. Therefore, force majeure
  probably applies."

  REQUEST 4 (Due: This week):
  Partner wants a comprehensive memo on whether
  non-fungible tokens (NFTs) are securities under
  the Howey test (SEC v. W.J. Howey Co.).

  Create:
  1. Quick response for the deposition question
  2. ECPA analysis for the social media company
  3. Detailed editorial feedback on the junior's memo
  4. Outline/initial research for the NFT securities
     memo
  5. Time management rationale

assertions:
  - type: llm_judge
    criteria: "Deposition response is correct and immediate — correctly identifies that the Fourth Amendment constrains government action, not private employers; Carpenter v. United States (2018) addressed government cell-site location data collection; the holding does not apply to private employer monitoring; provides the key distinction in 2-3 sentences the partner can use immediately; this demonstrates the ability to provide accurate rapid-fire legal analysis."
    weight: 0.35
    description: "RapidDepositionResponse"
  - type: llm_judge
    criteria: "Junior associate feedback is constructive and specific — identifies the conclusory reasoning ('arguable,' 'probably'), lack of citations, informal language ('a thing that happens'), and absence of legal analysis; provides specific revision guidance (apply the contract's exact force majeure language to cyberattack facts, cite relevant cases, analyze ejusdem generis canon for the catch-all phrase, address notice requirements); the feedback teaches, not just criticizes."
    weight: 0.35
    description: "EditorialFeedbackQuality"
  - type: llm_judge
    criteria: "ECPA analysis identifies the consent scope issue — the statute prohibits interception of electronic communications without consent; the ToS consent to 'service improvement' may not extend to advertising purposes; the analysis addresses whether broadly worded ToS consent is sufficient under the ECPA; references cases on consent scope and identifies risk that targeted advertising falls outside the consented-to purpose."
    weight: 0.30
    description: "ECPAConsentAnalysis"
