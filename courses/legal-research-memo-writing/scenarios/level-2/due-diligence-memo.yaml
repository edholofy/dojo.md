meta:
  id: due-diligence-memo
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Write a legal due diligence memo — systematically assess legal risks in a business transaction, organize findings by risk category, and provide actionable recommendations"
  tags: [due-diligence, transactional, risk-assessment, intermediate]

state: {}

trigger: |
  Write a legal due diligence memorandum for
  the acquisition of a direct-to-consumer health
  supplement company.

  ACQUISITION OVERVIEW:
  - Target: VitaBoost Inc., annual revenue $35M
  - Purchase price: $50M (stock purchase)
  - Target sells dietary supplements online and
    through retail partners
  - Target has 45 employees, based in Florida

  DUE DILIGENCE FINDINGS:

  REGULATORY:
  - 2 FDA warning letters in past 3 years for
    product labeling claims ("clinically proven to
    boost immunity" without adequate substantiation)
  - FTC inquiry (ongoing) into advertising practices
  - No cGMP violations identified
  - 3 products marketed with structure/function
    claims that may cross into drug claims

  LITIGATION:
  - Active class action in California alleging
    misleading advertising (class not yet certified,
    $15M potential exposure)
  - 12 pending BBB complaints
  - 1 settled personal injury claim ($200K,
    confidential) for allergic reaction

  IP:
  - 5 registered trademarks (1 opposition pending)
  - Trade secrets for 3 proprietary formulations
    (no formal trade secret protection program)
  - 2 supplier agreements with IP ownership
    ambiguity

  EMPLOYMENT:
  - 3 independent contractor classifications that
    may be misclassified
  - No employment agreements with non-competes
    for key employees
  - Outstanding EEOC charge (pregnancy discrimination)

  Write a comprehensive due diligence memo
  organizing findings by risk level.

assertions:
  - type: llm_judge
    criteria: "Risk categorization is clear and decision-relevant — findings are organized by severity (critical, high, medium, low) rather than just by category; the ongoing FTC inquiry and California class action are critical risks that could affect deal value; FDA warning letters and potential drug claims are high risks requiring remediation; the memo provides a clear risk heat map that enables the acquisition team to make informed decisions."
    weight: 0.35
    description: "RiskCategorization"
  - type: llm_judge
    criteria: "Regulatory risk analysis is specific to dietary supplement industry — FDA regulation of dietary supplements under DSHEA is different from drug regulation; the distinction between structure/function claims and drug claims is analyzed with specifics; FTC advertising enforcement for health products has increased; the memo demonstrates industry-specific knowledge rather than generic regulatory analysis."
    weight: 0.35
    description: "SupplementRegulatoryAnalysis"
  - type: llm_judge
    criteria: "Recommendations are transactional and actionable — suggests specific deal protections: purchase price adjustment for litigation exposure, special indemnification for FTC inquiry and class action, escrow for regulatory contingencies, seller representations about regulatory compliance history, condition precedent for FTC inquiry resolution, post-closing remediation plan for labeling compliance; each recommendation is linked to a specific finding."
    weight: 0.30
    description: "TransactionalRecommendations"
