meta:
  id: legislative-history-memo
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Write a legislative history research memo — trace the development of a statute through committee reports, floor debates, and amendments to determine legislative intent on an ambiguous provision"
  tags: [legislative-history, statutory-intent, congressional-record, intermediate]

state: {}

trigger: |
  Write a research memo using legislative history
  to interpret an ambiguous provision of the
  Computer Fraud and Abuse Act (CFAA).

  LEGAL QUESTION:
  Does "exceeds authorized access" under the CFAA
  (18 U.S.C. § 1030(a)(2)) cover an employee who
  has legitimate access to a computer system but
  uses it for unauthorized purposes (e.g., accessing
  customer data to sell to a competitor)?

  FACTS:
  - Employee was a database administrator with full
    access to the company's customer database
  - Employee's job duties required this access
  - Employee downloaded 50,000 customer records
    and provided them to a competitor before resigning
  - The company's acceptable use policy prohibited
    using data for personal benefit or sharing
    with third parties
  - No technical access controls were violated

  RESEARCH APPROACH:
  1. Analyze the statutory text of § 1030
  2. Review the legislative history of the CFAA
     (original 1984 Act and 1986 amendments)
  3. Consider the Supreme Court's decision in
     Van Buren v. United States (2021)
  4. Assess circuit split on the interpretation
  5. Apply findings to the client's situation

  Write a memo that uses legislative history as
  a primary interpretive tool alongside the
  Supreme Court's textual analysis.

assertions:
  - type: llm_judge
    criteria: "Van Buren v. United States is properly analyzed as the controlling authority — the Supreme Court in 2021 adopted a narrow, gates-based interpretation of 'exceeds authorized access,' holding it covers those who access areas of a computer beyond their authorization, not those who misuse information they are authorized to access; the memo explains this holding and its implications for the client's case; under Van Buren, the employee who had legitimate access likely did not 'exceed authorized access' even though he misused the data."
    weight: 0.35
    description: "VanBurenAnalysis"
  - type: llm_judge
    criteria: "Legislative history is properly used and weighted — traces the CFAA's origins as an anti-hacking statute; references committee reports discussing the statute's intended scope (targeting unauthorized computer intrusion, not employment disputes); explains how the legislative history supports the narrow reading adopted in Van Buren; properly acknowledges the limits of legislative history as an interpretive tool and its subordination to clear textual analysis."
    weight: 0.35
    description: "LegislativeHistoryUse"
  - type: llm_judge
    criteria: "Alternative theories are identified for the client — since CFAA may not apply post-Van Buren, the memo identifies other potential claims: trade secret misappropriation (DTSA and state law), breach of contract (acceptable use policy), breach of fiduciary duty, tortious interference; the client needs viable alternatives if the CFAA claim fails; the memo provides a complete litigation strategy, not just a CFAA analysis."
    weight: 0.30
    description: "AlternativeTheories"
