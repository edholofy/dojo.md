meta:
  id: regulatory-analysis-memo
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Write a regulatory analysis memo — research federal and state regulations, analyze agency interpretations, assess compliance requirements, and advise on regulatory risk"
  tags: [regulatory-analysis, agency-interpretation, compliance, intermediate]

state: {}

trigger: |
  Write a regulatory analysis memo on whether
  a fintech company's new "buy now, pay later"
  (BNPL) product is subject to the Truth in
  Lending Act (TILA) and Regulation Z.

  PRODUCT DESCRIPTION:
  - Customers split purchases into 4 equal payments
    over 6 weeks
  - No interest charged
  - No fees if payments are made on time
  - Late fee of $7 per missed payment (capped at
    25% of purchase price)
  - Available for purchases between $35 and $1,000
  - Approval based on soft credit check
  - No traditional credit agreement signed — user
    agrees to terms in-app

  REGULATORY QUESTIONS:
  1. Is the BNPL product a "credit" transaction
     under TILA?
  2. If so, what Regulation Z disclosures are
     required?
  3. How does the CFPB's recent BNPL guidance
     affect the analysis?
  4. Are there state-level licensing requirements?
  5. What is the regulatory risk if the company
     does not comply?

  RELEVANT AUTHORITY:
  - Truth in Lending Act, 15 U.S.C. § 1602(f)
  - Regulation Z, 12 C.F.R. Part 1026
  - CFPB Interpretive Rule on BNPL (2022)
  - CFPB Market Report on BNPL (2022)
  - State lending and money transmission laws

  Write a comprehensive regulatory analysis memo.

assertions:
  - type: llm_judge
    criteria: "TILA applicability analysis navigates the definitional ambiguity — TILA defines 'credit' as the right to defer payment of a debt; the four-installment BNPL product may fall under the 'four installment rule' (Regulation Z § 1026.2(a)(17)(i)); the analysis correctly identifies that even if no interest is charged, the product may still be credit if payments are in more than four installments or fees are imposed; the CFPB's interpretive rule treating BNPL as credit is analyzed."
    weight: 0.35
    description: "TILAApplicabilityAnalysis"
  - type: llm_judge
    criteria: "CFPB guidance is analyzed with appropriate weight — the 2022 CFPB interpretive rule is not a formal regulation but signals the agency's enforcement priorities; the analysis distinguishes between binding regulations and agency guidance; assesses the likelihood of CFPB enforcement action; considers whether the product's specific features (no interest, 4 payments, 6-week term) might qualify for exemptions."
    weight: 0.35
    description: "CFPBGuidanceAnalysis"
  - type: llm_judge
    criteria: "State-level analysis identifies a patchwork of requirements — different states have varying definitions of lending, licensing requirements for installment lenders, and specific BNPL regulations; California's DFPI, New York's DFS, and other states have taken different positions; the memo identifies which states pose the highest regulatory risk and recommends a state-by-state compliance strategy."
    weight: 0.30
    description: "StateLevelAnalysis"
