meta:
  id: persuasive-brief-draft
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Draft a persuasive legal brief — transform objective research into advocacy writing with a theory of the case, persuasive fact presentation, and compelling legal arguments"
  tags: [persuasive-writing, legal-brief, advocacy, intermediate]

state: {}

trigger: |
  Transform the following research findings into
  a persuasive motion brief supporting a motion
  to dismiss a defamation lawsuit.

  CASE BACKGROUND:
  Plaintiff (a local politician) sued Defendant
  (a newspaper journalist) for defamation based
  on an article reporting that the politician
  was "under investigation by the state ethics
  commission for potential misuse of campaign funds."

  RESEARCH FINDINGS:
  1. The statement is substantially true — the ethics
     commission confirmed it opened a preliminary
     inquiry based on a complaint filed by a
     constituent
  2. The politician is a public figure — the actual
     malice standard of New York Times v. Sullivan
     applies
  3. The article used hedging language ("potential
     misuse," "under investigation") that courts
     treat as protected opinion or substantially
     true characterization
  4. The journalist verified the information with
     two independent sources before publication
  5. The politician's public statements about campaign
     spending were contradicted by financial disclosures

  JURISDICTION: Federal court (diversity), applying
  state law consistent with Sullivan standards

  DELIVERABLE:
  - Statement of facts (persuasive framing)
  - Legal standard for motion to dismiss
  - Argument section with three main points
  - Conclusion with specific relief requested

  Draft the persuasive brief.

assertions:
  - type: llm_judge
    criteria: "Statement of facts is persuasive without being misleading — presents facts in the order and framing most favorable to the defendant (journalist) while remaining truthful; emphasizes the journalist's verification process and the politician's contradictory public statements; uses subtle persuasive techniques (word choice, sentence structure, sequencing) without distorting facts; the facts tell a compelling story of responsible journalism."
    weight: 0.35
    description: "PersuasiveFactPresentation"
  - type: llm_judge
    criteria: "Argument structure builds a strong three-part case — first argument (truth/substantial truth as absolute defense) should be strongest; second argument (actual malice not shown — journalist verified with two sources, used hedging language) addresses the constitutional standard; third argument (fair report privilege — reporting on government proceedings) provides an independent basis for dismissal; each argument has a clear thesis, authority, and application."
    weight: 0.35
    description: "ArgumentStructure"
  - type: llm_judge
    criteria: "Brief demonstrates the shift from objective to persuasive writing — unlike an internal research memo, the brief presents only the strongest authorities, characterizes facts favorably, uses citation signals strategically (no 'but see' citations undercutting the argument), and makes affirmative arguments rather than hedged predictions; the writing is confident without being hyperbolic; distinguishes itself clearly from the objective memo genre."
    weight: 0.30
    description: "ObjectiveToPersuasiveShift"
