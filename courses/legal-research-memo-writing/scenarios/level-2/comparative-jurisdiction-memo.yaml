meta:
  id: comparative-jurisdiction-memo
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Write a comparative jurisdiction memo — analyze how different states or jurisdictions treat the same legal issue, identify the most favorable forum, and advise on jurisdictional strategy"
  tags: [comparative-jurisdiction, forum-selection, multi-state, intermediate]

state: {}

trigger: |
  Write a comparative jurisdiction memo analyzing
  how different states treat the enforceability
  of employee non-solicitation agreements.

  CLIENT SITUATION:
  - Software company headquartered in Massachusetts
  - Key employee (VP of Sales) with non-solicitation
    clause has resigned to join a competitor
  - Employee works remotely from Colorado
  - Non-solicitation prohibits soliciting company
    customers and employees for 18 months
  - Contract specifies Massachusetts governing law
    and venue
  - Employee has begun reaching out to 3 key
    customers in California, Texas, and New York
  - Employee has also recruited 2 engineers from
    the company

  COMPARATIVE ANALYSIS REQUIRED:
  Compare non-solicitation enforceability in:
  1. Massachusetts (governing law)
  2. Colorado (employee's location)
  3. California (customer location and strong
     anti-restrictive covenant state)
  4. Texas (customer location)
  5. New York (customer location)

  FOR EACH JURISDICTION:
  - Standard for enforceability
  - Key statutory or case law authority
  - Treatment of choice-of-law provisions
  - Remedies available
  - Recent trends in enforcement

  Recommend the optimal litigation strategy
  including forum selection.

assertions:
  - type: llm_judge
    criteria: "California's unique position is properly analyzed — California Business and Professions Code § 16600 voids non-compete agreements and most courts extend this to non-solicitation of customers; the analysis addresses whether the Massachusetts choice-of-law clause will be honored by California courts (likely not, under California's strong public policy exception); this makes enforcement against the California customer particularly challenging."
    weight: 0.35
    description: "CaliforniaAnalysis"
  - type: llm_judge
    criteria: "Choice-of-law analysis addresses the conflict between governing law and employee location — Colorado's 2022 non-compete legislation restricts enforcement; the analysis examines whether Massachusetts courts would apply Massachusetts law (per the contract) or Colorado law (where the employee resides and works); applies the Restatement (Second) of Conflict of Laws framework; identifies which jurisdiction's law is most likely to be applied."
    weight: 0.35
    description: "ChoiceOfLawAnalysis"
  - type: llm_judge
    criteria: "Forum selection strategy is practical and strategic — recommends filing in the jurisdiction most likely to enforce the agreement while considering enforcement challenges in other jurisdictions; addresses whether a TRO/preliminary injunction is available and likely; considers the practical challenges of multi-state enforcement; recommends a litigation strategy that maximizes leverage while managing costs."
    weight: 0.30
    description: "ForumSelectionStrategy"
