meta:
  id: constitutional-analysis-memo
  level: 2
  course: legal-research-memo-writing
  type: output
  description: "Write a constitutional analysis memo — apply constitutional standards including levels of scrutiny, fundamental rights analysis, and balancing tests to a contemporary legal question"
  tags: [constitutional-analysis, scrutiny-levels, fundamental-rights, intermediate]

state: {}

trigger: |
  Write a research memo analyzing the
  constitutionality of a city ordinance that bans
  facial recognition technology use by all
  businesses within city limits.

  ORDINANCE PROVISIONS:
  - Prohibits any business from using facial
    recognition technology to identify, verify,
    or track individuals
  - Applies to: retail stores, office buildings,
    entertainment venues, and all commercial
    establishments
  - Exceptions: Law enforcement (with warrant),
    medical facilities (for patient identification)
  - Penalties: $1,000 per violation per day, plus
    private right of action
  - Effective date: 6 months after passage

  CLIENT: TechSecure Inc., a security technology
  company that sells facial recognition systems
  to retail stores for theft prevention

  CONSTITUTIONAL CHALLENGES TO ANALYZE:
  1. Due Process (14th Amendment) — vagueness and
     overbreadth
  2. First Amendment — does facial recognition
     implicate speech or association rights?
  3. Commerce Clause — burden on interstate commerce
  4. Equal Protection — rational basis for the
     law enforcement exception
  5. Takings — impact on existing contracts and
     business expectations

  Write a comprehensive constitutional analysis
  memo assessing the viability of each challenge.

assertions:
  - type: llm_judge
    criteria: "Level of scrutiny analysis is correctly applied for each challenge — rational basis review likely applies to the economic regulation aspects; intermediate scrutiny may apply if First Amendment rights are implicated; the memo correctly identifies which standard applies to each constitutional claim and explains why; the analysis does not apply strict scrutiny to an economic regulation or rational basis to a fundamental right."
    weight: 0.35
    description: "ScrutinyAnalysis"
  - type: llm_judge
    criteria: "Commerce Clause analysis is nuanced — facial recognition technology sold across state lines implicates the dormant Commerce Clause; the analysis applies the Pike balancing test (local benefits vs. burden on interstate commerce); distinguishes between regulating the use of technology within city limits (likely permissible) and effectively banning the sale of technology (potentially problematic); references recent technology regulation precedents."
    weight: 0.35
    description: "CommerceClauseAnalysis"
  - type: llm_judge
    criteria: "Overall viability assessment is honest about the strength of each claim — acknowledges that most facial recognition bans have been upheld under rational basis review; the strongest challenge may be the Commerce Clause argument for a company selling interstate; the weakest may be the Due Process vagueness challenge if the ordinance clearly defines 'facial recognition technology'; the memo helps the client make a strategic litigation decision."
    weight: 0.30
    description: "ViabilityAssessment"
