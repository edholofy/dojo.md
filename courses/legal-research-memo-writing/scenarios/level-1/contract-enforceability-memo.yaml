meta:
  id: contract-enforceability-memo
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Write a memo on contract enforceability — analyze whether a contract is enforceable by examining formation requirements, consideration, capacity, and potential defenses"
  tags: [contract-formation, enforceability, defenses, beginner]

state: {}

trigger: |
  Write a research memo on whether a non-compete
  agreement signed by an employee is enforceable.

  FACTS:
  - Employee signed a non-compete as part of an
    employment agreement in Texas
  - The non-compete restricts employee from working
    for any competitor in the "software industry"
    anywhere in the United States for 3 years
  - Employee signed the agreement when hired, with
    no separate consideration beyond the employment
  - Employee was terminated without cause after
    18 months
  - Employee has now accepted a position at a
    competitor in the same city

  RESEARCH QUESTIONS:
  1. Is the non-compete enforceable under Texas law?
  2. Are the scope, geography, and duration reasonable?
  3. What is the effect of termination without cause
     on enforceability?
  4. What remedies could the employer seek?

  RELEVANT LAW:
  - Texas Business and Commerce Code § 15.50-15.52
  - Marsh USA Inc. v. Cook (Tex. 2011)
  - Light v. Centel Cellular Co. (Tex. 1994)

  Write a complete research memo addressing all
  four questions.

assertions:
  - type: llm_judge
    criteria: "Reasonableness analysis addresses all three dimensions — geographic scope ('anywhere in the United States' for a local employer is likely overbroad), temporal scope (3 years may be excessive for many positions), and activity scope ('software industry' is extremely broad); the analysis applies Texas-specific standards and notes that Texas courts may reform (blue-pencil) overbroad restrictions rather than void them entirely."
    weight: 0.35
    description: "ReasonablenessAnalysis"
  - type: llm_judge
    criteria: "Consideration analysis addresses the Texas-specific requirement — under Texas law, a non-compete must be ancillary to an otherwise enforceable agreement with adequate consideration; the memo analyzes whether continued employment alone constitutes sufficient consideration in Texas; references Light v. Centel Cellular and subsequent legislative changes; the analysis is jurisdiction-specific, not generic."
    weight: 0.35
    description: "ConsiderationAnalysis"
  - type: llm_judge
    criteria: "Termination without cause impact is addressed — many jurisdictions treat involuntary termination as a factor in enforceability analysis; the memo addresses whether an employer who fires an employee without cause can then enforce a non-compete; discusses whether reformation (narrowing) of the restriction is more likely than voiding; provides practical guidance on litigation risk."
    weight: 0.30
    description: "TerminationImpact"
