meta:
  id: citation-formatting-exercise
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Format legal citations correctly — apply Bluebook citation rules to cases, statutes, regulations, and secondary sources in a research memo context"
  tags: [bluebook-citations, legal-citations, formatting, beginner]

state: {}

trigger: |
  Review and correct the legal citations in
  the following draft memo excerpt, then explain
  each correction. The memo discusses whether
  a company can be liable for age discrimination
  based on disparate impact.

  DRAFT WITH CITATION ERRORS:

  "Under the Age Discrimination in Employment Act
  (Title 29, Section 623, United States Code),
  employers cannot discriminate against employees
  aged 40 and over. In Smith versus City of Jackson
  (2005), the Supreme Court held that disparate
  impact claims are available under the ADEA,
  although with a narrower scope than under Title
  VII. See also Meacham vs. Knolls Atomic Power,
  554 United States Reports 84 (2008).

  The EEOC regulations (found in Title 29 of the
  Code of Federal Regulations, Part 1625) provide
  guidance on age discrimination. As noted in
  Hazen Paper Co. v. Biggins, United States
  Reports volume 507, page 604, decided in 1993,
  the ADEA focuses on age as a factor, not on
  pension status.

  Several law review articles discuss this issue.
  See Jennifer Jolly-Ryan, 'Have They Really Gone
  Too Far,' University of Cincinnati Law Review,
  volume 81, 2012."

  Create:
  1. Corrected citations in proper Bluebook format
  2. Explanation of each citation error
  3. Properly formatted full citation for each source
  4. Short-form citation for subsequent references
  5. Brief guide to common citation rules applied

assertions:
  - type: llm_judge
    criteria: "All citation errors are identified and corrected — statutory citations should use proper format (29 U.S.C. § 623 not 'Title 29, Section 623, United States Code'); case citations need proper format (Smith v. City of Jackson, 544 U.S. 228 (2005) not 'Smith versus City of Jackson'); 'versus' should be 'v.' with a period; reporter citations need volume-reporter-page format; regulatory citations need proper CFR format (29 C.F.R. § 1625)."
    weight: 0.35
    description: "CitationErrorIdentification"
  - type: llm_judge
    criteria: "Short-form citations are correctly demonstrated — shows proper short-form for subsequent references to cases (Smith, 544 U.S. at 240; or Id. at 240 for immediately preceding citation), statutes (§ 623), and regulations (§ 1625); explains when to use id. versus supra versus short-form case names; demonstrates the hierarchy of citation signals."
    weight: 0.35
    description: "ShortFormCitations"
  - type: llm_judge
    criteria: "Citation guide covers rules actually applied — explains the key Bluebook rules demonstrated (Rule 10 for cases, Rule 12 for statutes, Rule 14 for regulations, Rule 16 for periodicals); provides enough context for a junior associate to understand not just the corrections but the underlying rules; the guide is practical and reference-worthy, not just a list of corrections."
    weight: 0.30
    description: "CitationGuideQuality"
