meta:
  id: regulatory-compliance-memo
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Write a regulatory compliance memo — research applicable regulations, identify compliance requirements, assess current practices against requirements, and recommend corrective actions"
  tags: [regulatory-compliance, ada-compliance, regulations, beginner]

state: {}

trigger: |
  Write a research memo on whether a small
  business's website must comply with the
  Americans with Disabilities Act (ADA) and
  Web Content Accessibility Guidelines (WCAG).

  FACTS:
  - Client operates a local bakery with 12 employees
  - Bakery has a website with online ordering,
    menu, and location information
  - Website was built using a template with no
    accessibility features
  - A visually impaired customer filed a demand
    letter alleging the website is inaccessible
  - Demand letter cites: no alt text on images,
    no keyboard navigation, poor color contrast,
    no screen reader compatibility
  - Demand letter requests $15,000 in damages plus
    attorney's fees

  RESEARCH QUESTIONS:
  1. Does the ADA apply to the bakery's website?
  2. What accessibility standard applies (WCAG 2.0,
     2.1, or 2.2)?
  3. What is the current legal landscape on website
     accessibility litigation?
  4. What should the bakery do in response?

  JURISDICTION: California (where ADA website
  accessibility litigation is most active)

  Write a complete research memo addressing
  all questions.

assertions:
  - type: llm_judge
    criteria: "ADA applicability analysis addresses the unresolved circuit split — explains that Title III of the ADA covers 'places of public accommodation' and courts are split on whether websites are covered independently or only if connected to a physical location; the bakery has a physical location which strengthens the argument for coverage; references key cases (Robles v. Domino's Pizza, Gil v. Winn-Dixie) and their different approaches."
    weight: 0.35
    description: "ADAApplicabilityAnalysis"
  - type: llm_judge
    criteria: "Practical response recommendation balances legal risk with business reality — a 12-employee bakery has limited resources; the memo recommends immediate remediation (WCAG 2.1 AA compliance as the de facto standard), engagement with the demand letter (response strategy), and ongoing accessibility maintenance; the recommendation is proportionate to the business's size and resources."
    weight: 0.35
    description: "PracticalRecommendation"
  - type: llm_judge
    criteria: "Litigation landscape analysis provides useful context — explains the rise in ADA website accessibility lawsuits (serial plaintiffs, law firm business models), California's Unruh Civil Rights Act (which provides minimum statutory damages), and the Department of Justice's evolving position on web accessibility; the client needs to understand both the legal merits and the litigation dynamics."
    weight: 0.30
    description: "LitigationLandscape"
