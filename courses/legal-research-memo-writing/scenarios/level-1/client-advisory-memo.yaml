meta:
  id: client-advisory-memo
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Write a client advisory memo — translate complex legal analysis into clear, actionable advice for a non-lawyer client while maintaining legal accuracy"
  tags: [client-advisory, plain-language, actionable-advice, beginner]

state: {}

trigger: |
  Write a client advisory memo for a small
  business owner who wants to know if they can
  install security cameras in their workplace.

  CLIENT PROFILE:
  - Owner of a 30-person marketing agency
  - Open floor plan office with shared workspaces
  - Wants to install cameras for theft prevention
    (recent laptop thefts)
  - Considering cameras in: common areas, conference
    rooms, kitchen/break room, and individual offices
  - Employees have not been informed
  - Located in California

  CLIENT'S QUESTIONS:
  1. "Can I put cameras anywhere in the office?"
  2. "Do I need to tell my employees?"
  3. "Can I record audio too?"
  4. "What about remote workers — can I monitor their
     home workspaces?"
  5. "Could an employee sue me over this?"

  RELEVANT LAW:
  - California Penal Code § 632 (recording of
    confidential communications)
  - California Labor Code § 435 (audio/video
    recording in workplace)
  - California Constitution Article I, § 1 (right
    to privacy)
  - Federal wiretapping laws (18 U.S.C. § 2511)

  Write a client advisory memo that the business
  owner can understand and act on.

assertions:
  - type: llm_judge
    criteria: "Advisory is written in client-accessible language — avoids legal jargon or explains it when necessary; directly answers each of the client's 5 questions in plain English; uses headers, bullet points, or numbered sections that align with the client's questions; the business owner should be able to read and understand the memo without an attorney explaining it."
    weight: 0.35
    description: "ClientAccessibleLanguage"
  - type: llm_judge
    criteria: "California-specific privacy requirements are accurately addressed — California has some of the strongest workplace privacy protections; audio recording requires all-party consent under Penal Code § 632; cameras in restrooms, changing areas, and private spaces are prohibited; the constitutional right to privacy in California is broader than most states; the memo correctly identifies where cameras are permitted and where they are not."
    weight: 0.35
    description: "CaliforniaPrivacyAccuracy"
  - type: llm_judge
    criteria: "Actionable recommendations are specific and practical — provides a clear list of do's and don'ts (cameras OK in common areas with notice, not OK in private spaces, no audio without consent); recommends specific steps (written policy, employee acknowledgment form, signage); addresses the remote worker question (monitoring home workspaces raises significant privacy issues); includes a recommended implementation timeline."
    weight: 0.30
    description: "ActionableRecommendations"
