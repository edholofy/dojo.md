meta:
  id: intellectual-property-memo
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Write an intellectual property research memo — analyze copyright, trademark, or patent issues using applicable statutes and case law to advise on IP protection or infringement risk"
  tags: [intellectual-property, copyright, fair-use, beginner]

state: {}

trigger: |
  Write a research memo on whether a competitor's
  use of a similar logo constitutes trademark
  infringement.

  FACTS:
  - Client's trademark: "GREENLEAF" with a stylized
    leaf design for organic food products
  - Registered with USPTO since 2019, in active
    commercial use since 2018
  - Competitor launched "GREEN LEAF FARMS" with a
    different leaf design for organic meal delivery
  - Competitor's mark was filed for registration
    6 months ago
  - Both companies operate in the same geographic
    region (Pacific Northwest)
  - Client has received customer inquiries confusing
    the two brands
  - Competitor's packaging uses similar green color
    scheme and font style

  RESEARCH QUESTIONS:
  1. Does the competitor's mark create a likelihood
     of confusion?
  2. What factors determine likelihood of confusion
     in the Ninth Circuit?
  3. What relief could the client obtain?
  4. Should the client oppose the competitor's
     trademark application?

  RELEVANT LAW:
  - Lanham Act, 15 U.S.C. § 1114 (infringement)
  - AMF Inc. v. Sleekcraft Boats (9th Cir. 1979)
    (Sleekcraft factors)

  Write a complete research memo.

assertions:
  - type: llm_judge
    criteria: "Sleekcraft likelihood-of-confusion factors are systematically applied — the memo analyzes all relevant factors: strength of the mark, proximity of the goods, similarity of the marks, evidence of actual confusion, marketing channels used, type of goods and degree of consumer care, defendant's intent, likelihood of expansion; each factor is analyzed with the specific facts rather than just defined."
    weight: 0.35
    description: "SleekraftFactorsAnalysis"
  - type: llm_judge
    criteria: "Actual confusion evidence is properly weighted — customer inquiries confusing the two brands constitute evidence of actual confusion, which is the strongest evidence of likelihood of confusion; the memo explains why this evidence is significant and how courts treat customer confusion evidence; it also addresses potential weaknesses in the evidence."
    weight: 0.35
    description: "ActualConfusionEvidence"
  - type: llm_judge
    criteria: "Remedies and procedural strategy are addressed — explains available remedies (injunction, damages, attorney's fees, cancellation/opposition); recommends opposing the competitor's pending trademark application at the TTAB; discusses whether to send a cease-and-desist letter or file suit directly; provides strategic recommendations for the client."
    weight: 0.30
    description: "RemediesAndStrategy"
