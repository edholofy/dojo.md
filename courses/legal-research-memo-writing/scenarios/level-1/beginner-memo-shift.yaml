meta:
  id: beginner-memo-shift
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Handle a beginner legal research shift — receive multiple research requests, prioritize by urgency, draft basic memos on different legal topics, and manage time effectively"
  tags: [shift-simulation, multi-topic, time-management, beginner]

state: {}

trigger: |
  You are a first-year associate at a mid-size
  law firm. It's Monday morning and you have
  three research assignments due this week. Draft
  memos for each.

  ASSIGNMENT 1 (Due: Tuesday — partner needs for
  client meeting):
  Client received a cease-and-desist letter
  claiming their business name "QuickFix Auto"
  infringes on "QuickFix Solutions" (a national
  IT repair company). Client is a local auto repair
  shop in Ohio, operating since 2020 under this
  name without trademark registration. The IT
  company registered their mark in 2018.

  Question: Does the client need to change their
  business name?

  ASSIGNMENT 2 (Due: Wednesday):
  A restaurant client wants to require all employees
  to sign arbitration agreements waiving their right
  to class action lawsuits. The restaurant has 45
  employees across 3 locations in New York.

  Question: Are mandatory arbitration agreements
  with class action waivers enforceable for
  restaurant employees in New York?

  ASSIGNMENT 3 (Due: Friday):
  A tech startup client wants to know if they can
  scrape publicly available data from a competitor's
  website to build a price comparison tool.

  Question: Is web scraping of publicly available
  data legal?

  Create:
  1. Brief research memo for each assignment
  2. Prioritization rationale for the three tasks
  3. Key authorities for each question
  4. Preliminary conclusions for each issue
  5. Follow-up questions for each supervising attorney

assertions:
  - type: llm_judge
    criteria: "Each memo follows proper structure despite time pressure — even brief memos include issue identification, governing rule, application, and conclusion; citations are included even in abbreviated form; the memos demonstrate that quality legal writing is possible at shorter lengths; follow-up questions show awareness of facts that would affect the analysis."
    weight: 0.35
    description: "StructuredBriefMemos"
  - type: llm_judge
    criteria: "Trademark analysis correctly identifies the different goods/services defense — 'QuickFix Auto' (auto repair) and 'QuickFix Solutions' (IT repair) operate in different markets; the likelihood of confusion analysis under the Lanham Act considers the relatedness of goods/services; despite the similar names, the different industries reduce confusion risk; the memo advises the client on the strength of their position while acknowledging registration priority."
    weight: 0.35
    description: "TrademarkDifferentGoodsAnalysis"
  - type: llm_judge
    criteria: "Web scraping analysis identifies the evolving legal landscape — references hiQ Labs v. LinkedIn (9th Cir. 2022) and CFAA limitations; distinguishes between scraping publicly available data and circumventing access controls; identifies potential claims (CFAA, trespass to chattels, contract (terms of service), copyright); the analysis reflects the current unsettled state of web scraping law rather than presenting a false certainty."
    weight: 0.30
    description: "WebScrapingAnalysis"
