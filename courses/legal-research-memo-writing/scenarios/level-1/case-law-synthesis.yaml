meta:
  id: case-law-synthesis
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Synthesize case law on a legal issue — identify relevant cases, extract holdings and reasoning, organize by theme, and present a coherent legal framework"
  tags: [case-synthesis, case-law, holdings, beginner]

state: {}

trigger: |
  Synthesize the relevant case law on whether
  an employer can terminate an at-will employee
  for off-duty social media posts critical of
  the company.

  SCENARIO:
  An employee posted on their personal Facebook
  page: "My company treats warehouse workers like
  machines. No breaks, no respect, poverty wages.
  #WorkerRights"

  The company fired the employee the next day for
  "social media misconduct."

  RESEARCH REQUEST:
  Synthesize case law addressing:
  1. At-will employment and its limitations
  2. NLRA Section 7 protections for concerted activity
  3. First Amendment applicability (or not) to
     private employers
  4. State laws protecting off-duty lawful conduct

  CASES TO ANALYZE:
  - NLRB v. Pier Sixty, LLC (2d Cir. 2017)
  - Triple Play Sports Bar (NLRB 2014)
  - Hispanics United of Buffalo (NLRB 2012)
  - General employment at-will doctrine

  DELIVERABLE:
  Case synthesis memo suitable for a partner
  reviewing whether the client (the employee)
  has a viable claim.

assertions:
  - type: llm_judge
    criteria: "Case synthesis organizes cases by legal principle rather than just chronologically — groups cases by theme (NLRA concerted activity protections, at-will limitations, First Amendment inapplicability); identifies the common thread that employee social media posts about working conditions are protected concerted activity under NLRA Section 7; distinguishes individual gripes from concerted activity."
    weight: 0.35
    description: "CaseSynthesisOrganization"
  - type: llm_judge
    criteria: "Each case is properly analyzed with holding, reasoning, and relevance — for each cited case, identifies the court, key facts, holding, and reasoning; connects each case to the client's situation with specific factual analogies; distinguishes cases that strengthen the claim from those that weaken it; does not merely list cases but synthesizes them into a coherent legal framework."
    weight: 0.35
    description: "CaseAnalysisQuality"
  - type: llm_judge
    criteria: "Predictive analysis is honest about strengths and weaknesses — acknowledges that the social media post could be protected concerted activity (discussing wages, working conditions) but also identifies potential weaknesses (was it truly 'concerted' or an individual complaint, did it use offensive language, was it directed at changing working conditions); the analysis is objective and useful for strategic decision-making."
    weight: 0.30
    description: "PredictiveHonesty"
