meta:
  id: irac-memo-basics
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Write a basic legal research memo using IRAC format — identify the issue, state the governing rule, apply facts to the rule, and reach a conclusion on a straightforward legal question"
  tags: [irac-format, basic-memo, legal-writing, beginner]

state: {}

trigger: |
  Write a legal research memo addressing whether
  a landlord can keep a tenant's security deposit
  for normal wear and tear.

  FACTS:
  - Tenant rented a 2-bedroom apartment for 3 years
  - Lease required $2,400 security deposit
  - Tenant vacated on time and returned all keys
  - Landlord withheld entire deposit claiming:
    (a) carpet stains throughout ($800)
    (b) scuff marks on walls ($400)
    (c) worn kitchen countertop ($600)
    (d) replacement of window blinds ($200)
    (e) professional cleaning ($400)
  - Tenant alleges all items are normal wear and tear

  JURISDICTION: California

  MEMO FORMAT:
  Use standard IRAC format:
  - Issue statement
  - Rule (with citations)
  - Application of facts to rule
  - Conclusion with recommendation

  RELEVANT AUTHORITY:
  - California Civil Code § 1950.5
  - Granberry v. Islay Investments (1995)
  - General guidance on "ordinary wear and tear"
    vs. damage

  Create:
  1. Complete IRAC-format research memo
  2. Clear issue statement
  3. Rule section with proper citations
  4. Thorough fact-to-rule application
  5. Actionable conclusion

assertions:
  - type: llm_judge
    criteria: "IRAC structure is properly followed — the issue is stated as a narrow legal question (not a fact summary); the rule section cites California Civil Code § 1950.5 and relevant case law establishing the distinction between ordinary wear and tear and tenant-caused damage; the application methodically addresses each claimed deduction against the legal standard; the conclusion provides a clear answer with recommendation."
    weight: 0.35
    description: "IRACStructure"
  - type: llm_judge
    criteria: "Normal wear and tear analysis is legally accurate — carpet wear after 3 years of occupancy, minor wall scuffs, and worn countertops are generally classified as normal wear and tear under California law; professional cleaning charges are prohibited unless the lease specifically requires the tenant to professionally clean upon departure; the analysis distinguishes between legitimate damage deductions and improper wear-and-tear deductions."
    weight: 0.35
    description: "WearAndTearAnalysis"
  - type: llm_judge
    criteria: "Memo uses proper legal writing conventions — citations follow standard format; language is precise and avoids colloquialisms; analysis is objective (predictive, not persuasive); hedging language is appropriate ('likely,' 'a court would probably'); the memo reads as professional legal writing, not casual communication."
    weight: 0.30
    description: "LegalWritingConventions"
