meta:
  id: statutory-interpretation-memo
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Write a statutory interpretation memo — analyze the plain text of a statute, apply canons of construction, consider legislative history, and reach a conclusion on statutory meaning"
  tags: [statutory-interpretation, plain-meaning, legislative-intent, beginner]

state: {}

trigger: |
  Write a research memo analyzing whether a
  food delivery app driver qualifies as an
  "employee" under the Fair Labor Standards Act.

  FACTS:
  - Driver uses personal vehicle
  - Sets own schedule through the app
  - Can reject any delivery request
  - Must follow app's delivery protocols and
    customer service standards
  - Company sets the delivery fees
  - Driver wears company-branded insulated bag
  - Company provides in-app navigation routing
  - Driver works exclusively for this app (by choice)
  - No benefits, no tax withholding

  STATUTORY FRAMEWORK:
  - Fair Labor Standards Act, 29 U.S.C. § 203(e)(1)
  - Definition of "employ" includes "suffer or permit
    to work" — the broadest definition in employment law
  - Economic reality test factors (as developed by
    courts)

  MEMO REQUIREMENTS:
  - Analyze the statutory definition of "employee"
  - Apply the economic reality test
  - Consider recent DOL guidance and rulemaking
  - Assess the strength of the classification
  - Recommend next steps

assertions:
  - type: llm_judge
    criteria: "Economic reality test is applied systematically — analyzes each factor: (1) degree of control, (2) worker's opportunity for profit/loss, (3) worker's investment in equipment, (4) permanence of relationship, (5) degree of skill required, (6) integral part of employer's business; each factor is analyzed with the specific facts, not just stated; some factors favor employee status (company sets fees, provides routing) while others favor independent contractor (own schedule, can reject work)."
    weight: 0.35
    description: "EconomicRealityTest"
  - type: llm_judge
    criteria: "Statutory interpretation is properly grounded — begins with the FLSA's broad 'suffer or permit to work' definition; explains why this definition is broader than common law agency tests; references relevant DOL guidance on gig economy workers; acknowledges the evolving nature of this area of law; does not rely solely on the statutory text but also considers judicial interpretation."
    weight: 0.35
    description: "StatutoryAnalysis"
  - type: llm_judge
    criteria: "Conclusion acknowledges the genuine uncertainty in this area — gig worker classification is genuinely unsettled law with reasonable arguments on both sides; the memo avoids false certainty while still providing a useful prediction; identifies which factors are strongest for each side; recommends protective measures regardless of ultimate classification."
    weight: 0.30
    description: "BalancedConclusion"
