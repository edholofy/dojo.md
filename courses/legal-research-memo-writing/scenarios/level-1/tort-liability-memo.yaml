meta:
  id: tort-liability-memo
  level: 1
  course: legal-research-memo-writing
  type: output
  description: "Write a tort liability research memo — analyze negligence elements, apply relevant standards of care, assess causation and damages, and predict litigation outcome"
  tags: [tort-liability, negligence, premises-liability, beginner]

state: {}

trigger: |
  Write a research memo analyzing potential
  premises liability for a slip-and-fall injury
  at a client's retail store.

  FACTS:
  - Customer slipped on a wet floor near the
    produce section of a grocery store
  - Customer suffered a broken wrist and concussion
  - The wet floor resulted from a leaking
    refrigeration unit
  - Store had placed a "Caution: Wet Floor" sign
    near the entrance (50 feet from the spill)
  - The leak had been reported by an employee
    2 hours before the incident
  - No one had cleaned the spill or placed a sign
    near the actual hazard
  - Security camera footage confirms the timeline
  - Customer's medical bills total $28,000
  - Customer missed 6 weeks of work ($12,000 lost
    wages)

  JURISDICTION: Florida

  RESEARCH QUESTIONS:
  1. What are the elements of premises liability
     in Florida?
  2. Did the store have constructive or actual
     notice of the hazard?
  3. Was the warning sign placement adequate?
  4. What is the likely outcome and damages range?

  Write a complete research memo.

assertions:
  - type: llm_judge
    criteria: "Negligence elements are methodically analyzed — the memo addresses duty (business invitee owed highest duty of care), breach (actual notice established by employee report 2 hours prior, failure to clean or properly warn), causation (direct link between wet floor and fall), and damages (medical bills + lost wages + potential pain and suffering); each element is analyzed with the specific facts, not just defined."
    weight: 0.35
    description: "NegligenceElementsAnalysis"
  - type: llm_judge
    criteria: "Notice analysis distinguishes actual from constructive notice — the store had actual notice (employee report 2 hours prior), which is stronger than constructive notice; the 2-hour delay in addressing a known hazard significantly weakens the store's defense; the misplaced warning sign (50 feet from hazard) does not constitute adequate warning; the analysis cites Florida premises liability standards."
    weight: 0.35
    description: "NoticeAnalysis"
  - type: llm_judge
    criteria: "Damages assessment is comprehensive — calculates economic damages ($28K medical + $12K lost wages = $40K minimum); discusses potential additional damages (pain and suffering multipliers, future medical treatment, permanent injury if applicable); addresses comparative negligence if applicable under Florida law; provides a realistic damages range rather than a single number."
    weight: 0.30
    description: "DamagesAssessment"
