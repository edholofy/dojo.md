meta:
  id: legal-research-governance
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Design legal research governance for a large organization — establish policies for research quality, AI tool usage, privileged research, and knowledge management across a global legal team"
  tags: [governance, research-policy, quality-standards, expert]

state: {}

trigger: |
  Design a comprehensive legal research governance
  framework for a global law firm with 1,500
  attorneys across 30 offices.

  FIRM PROFILE:
  - Am Law 50 firm
  - 1,500 attorneys, 500 paralegals, 100 research
    librarians
  - 30 offices across US, Europe, Asia, Middle East
  - Practice areas: Corporate, Litigation, IP,
    Tax, Regulatory, Real Estate, Employment
  - Annual research tool spend: $25M
  - Recent issues:
    * Associate submitted brief with AI-hallucinated
      citations (ethics complaint filed)
    * Privileged research memo inadvertently shared
      with opposing counsel
    * Two offices using different legal databases
      producing inconsistent research
    * Knowledge silos — NYC office reinvents research
      done by London office

  GOVERNANCE FRAMEWORK REQUIREMENTS:
  - AI usage policy and monitoring
  - Research quality standards by memo type
  - Privileged work product protection protocols
  - Knowledge sharing across offices and practices
  - Research tool standardization
  - Training and competency certification
  - Ethical compliance monitoring

  Create:
  1. Governance structure with roles and
     responsibilities
  2. AI research policy with enforcement mechanisms
  3. Privilege protection protocols
  4. Cross-office knowledge sharing framework
  5. Compliance monitoring and incident response

assertions:
  - type: llm_judge
    criteria: "AI research policy directly addresses the hallucinated citations incident — establishes mandatory citation verification for all AI-assisted research; requires AI disclosure tags on work product that used AI assistance; defines prohibited AI uses (unsupervised memo generation for client deliverables, AI-generated citations without database verification); includes disciplinary consequences for violations; the policy is specific enough to prevent recurrence while not being so restrictive that it eliminates AI benefits."
    weight: 0.35
    description: "AIResearchPolicy"
  - type: llm_judge
    criteria: "Privilege protection addresses the inadvertent disclosure incident — establishes protocols for marking privileged work product, controlling distribution, and handling inadvertent disclosures under FRE 502(b); includes metadata scrubbing requirements, email classification systems, and 'clawback' procedures; addresses the unique privilege challenges of cross-border research (different privilege rules in different jurisdictions) and AI-assisted research (where client data may be processed externally)."
    weight: 0.35
    description: "PrivilegeProtection"
  - type: llm_judge
    criteria: "Cross-office knowledge sharing breaks down silos practically — designs a centralized research repository with practice-area and jurisdiction tagging; includes a 'research request check' that searches existing work product before initiating new research; addresses time zone and language challenges for global sharing; implements incentives for knowledge contribution (recognition, credit toward billable expectations); the system prevents the NYC-reinventing-London-research problem."
    weight: 0.30
    description: "CrossOfficeKnowledgeSharing"
