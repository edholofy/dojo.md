meta:
  id: legal-writing-book-proposal
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Develop a book proposal for a modern legal research and writing guide — define the audience, establish the unique approach, and create a comprehensive outline for the AI era of legal research"
  tags: [book-proposal, legal-writing-guide, ai-era, expert]

state: {}

trigger: |
  Develop a book proposal for a modern legal
  research and writing guide that addresses the
  AI transformation of legal research.

  BOOK CONCEPT:
  Title: "The AI-Augmented Legal Researcher:
  Mastering Research and Writing in the Age of
  Artificial Intelligence"

  THESIS:
  AI has fundamentally changed what legal research
  means, but the core analytical skills — issue
  identification, rule synthesis, analogical
  reasoning, and persuasive writing — are more
  important than ever. This book teaches attorneys
  how to leverage AI as a powerful research
  assistant while maintaining the analytical rigor
  that defines excellent legal work.

  TARGET AUDIENCE:
  - Law students learning research for the first
    time
  - Junior attorneys seeking to improve efficiency
  - Mid-career attorneys adapting to AI tools
  - Legal writing professors updating their courses
  - Legal operations professionals managing
    research functions

  UNIQUE ANGLE:
  - Every chapter includes both "traditional" and
    "AI-assisted" approaches
  - Practical exercises using both Westlaw/Lexis
    and AI tools
  - Case studies of AI successes and failures in
    legal research
  - Ethical framework for responsible AI use

  Create:
  1. Full book proposal with chapter outline
  2. Sample chapter demonstrating the dual approach
  3. Competing titles analysis
  4. Marketing strategy for legal education market
  5. Supplementary materials plan (exercises, video,
     instructor resources)

assertions:
  - type: llm_judge
    criteria: "Chapter outline demonstrates the 'dual approach' consistently — each substantive chapter covers both traditional methodology (database searching, manual case synthesis, citator use) and AI-augmented methodology (natural language research queries, AI-generated summaries, automated citation verification); the book doesn't present AI as a replacement but as an acceleration layer; chapters build from foundational research skills to advanced analytical techniques."
    weight: 0.35
    description: "DualApproachOutline"
  - type: llm_judge
    criteria: "Sample chapter demonstrates pedagogical effectiveness — shows how to teach a specific skill (e.g., case synthesis) using both approaches; includes a worked example with the same legal question researched both traditionally and with AI assistance; highlights where AI excels (speed, breadth of search) and where it fails (nuanced analysis, novel analogies, accurate citation); the chapter teaches the reader to be a critical user of AI, not just a user."
    weight: 0.35
    description: "SampleChapterPedagogy"
  - type: llm_judge
    criteria: "Competing titles analysis identifies the specific gap — existing legal research texts (Kunz's 'The Process of Legal Research', Sloan's 'Basic Legal Research') predate AI integration; existing AI law books (Surden's works) are academic, not practical; the proposed book fills the gap between traditional legal research manuals and AI theory; positions the book as the essential text for law schools updating their research curriculum."
    weight: 0.30
    description: "CompetingTitlesAnalysis"
