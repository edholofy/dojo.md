meta:
  id: legal-research-technology-product
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Design a legal research technology product — specify features for AI-powered memo generation, citation verification, and research workflow management that transforms how legal research is conducted"
  tags: [legal-tech-product, research-platform, product-design, expert]

state: {}

trigger: |
  Design a legal research memo generation
  platform that uses AI to accelerate legal
  research while ensuring accuracy and
  professional standards.

  PRODUCT VISION:
  "ResearchCo" — An AI-powered legal research
  platform that helps attorneys produce higher-
  quality research memos in a fraction of the
  time by combining AI research capabilities with
  built-in quality assurance.

  TARGET USERS:
  - Solo practitioners and small firms (can't
    afford junior associates for research)
  - Mid-size firm associates (need to be more
    productive)
  - Corporate legal teams (need consistent research
    quality)

  CORE FEATURES:
  1. Research Question Intake — natural language
     question, auto-classifies by area of law,
     identifies jurisdiction
  2. AI Research Engine — searches case law, statutes,
     regulations; generates draft analysis
  3. Citation Verification — verifies every citation
     exists, is current, and supports the proposition
  4. Memo Generation — produces IRAC-format memo
     with proper citations, counteranalysis, and
     hedged predictions
  5. Quality Dashboard — scores each memo for
     completeness, accuracy, currency, and balance
  6. Knowledge Base — learns from user edits to
     improve over time

  COMPETITIVE LANDSCAPE:
  - Westlaw Edge / CoCounsel: Database-centric,
    expensive, not memo-focused
  - LexisNexis / Lexis+ AI: Similar to Westlaw
  - Harvey: General legal AI, not research-specific
  - Casetext / CoCounsel: Good for research but
    limited memo generation

  Create:
  1. Product requirements document
  2. AI/ML architecture specification
  3. Citation verification pipeline design
  4. Quality scoring algorithm
  5. Go-to-market strategy and pricing

assertions:
  - type: llm_judge
    criteria: "Citation verification pipeline is the key differentiator — designs a multi-stage verification process: (1) confirm the case/statute exists in an authoritative database, (2) verify it has not been overruled or superseded (Shepardize/KeyCite equivalent), (3) confirm the cited proposition actually appears in the cited source, (4) flag any negative treatment; this addresses the hallucination problem that plagues AI legal research and is the feature that creates trust."
    weight: 0.35
    description: "CitationVerificationPipeline"
  - type: llm_judge
    criteria: "Quality scoring algorithm provides objective memo evaluation — scores on: jurisdictional accuracy (correct authority for the forum), completeness (all elements of legal test addressed), balance (counterarguments included), currency (law is current), citation density (adequate authority for each proposition), structural quality (proper IRAC format), and readability; each dimension has a clear scoring methodology; the overall quality score helps users identify areas for improvement."
    weight: 0.35
    description: "QualityScoringAlgorithm"
  - type: llm_judge
    criteria: "Go-to-market strategy reaches underserved segments — the solo/small firm segment is underserved by existing legal tech (can't afford Westlaw + CoCounsel at $300+/month); pricing is accessible ($99-199/month) with value-based tiers; marketing channels include bar associations, CLE programs, and legal communities; the strategy emphasizes 'attorney-quality research for every lawyer' as the value proposition; includes a free trial or freemium tier for adoption."
    weight: 0.30
    description: "GoToMarketStrategy"
