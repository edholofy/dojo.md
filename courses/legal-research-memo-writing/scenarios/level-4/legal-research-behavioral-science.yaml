meta:
  id: legal-research-behavioral-science
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Apply behavioral science to legal research — examine how cognitive biases affect legal analysis, design debiasing interventions for memo writing, and improve research decision-making"
  tags: [behavioral-science, cognitive-bias, debiasing, expert]

state: {}

trigger: |
  Apply behavioral science principles to improve
  legal research and memo writing quality by
  identifying and mitigating cognitive biases
  that affect legal analysis.

  RESEARCH FINDINGS:
  A study of 200 legal research memos revealed
  systematic biases:

  1. CONFIRMATION BIAS: 73% of memos showed
     stronger engagement with supporting authority
     than opposing authority; attorneys spent 3x
     more time researching cases that supported
     their initial hypothesis

  2. ANCHORING TO FIRST AUTHORITY: Attorneys who
     found a favorable case first produced memos
     that overweighted that case by 40% compared
     to attorneys who found an unfavorable case first

  3. AUTHORITY BIAS: Supreme Court citations were
     weighted 2x more heavily than circuit court
     citations even when the circuit court authority
     was more directly relevant

  4. AVAILABILITY BIAS: Attorneys cited cases they
     encountered in law school or recent CLE
     programs 5x more frequently than equally
     relevant but less familiar cases

  5. OVERCONFIDENCE: Memo conclusions that stated
     outcomes as "certain" or "very likely" were
     accurate only 55% of the time; calibrated
     assessments ("approximately 60% likelihood")
     were accurate 85% of the time

  Create:
  1. Bias-by-bias analysis with legal research examples
  2. Debiasing interventions for the research process
  3. Memo writing protocols that reduce bias
  4. Training module design for bias awareness
  5. Measurement framework for bias reduction

assertions:
  - type: llm_judge
    criteria: "Debiasing interventions are practical for the research workflow — proposes specific process changes: mandatory 'adverse authority search' before concluding research (addresses confirmation bias); research question reframing before starting (addresses anchoring); citation relevance scoring independent of court level (addresses authority bias); systematic database searching rather than memory-based (addresses availability bias); probability calibration exercises (addresses overconfidence); each intervention is implementable in a law firm setting."
    weight: 0.35
    description: "DebiasingInterventions"
  - type: llm_judge
    criteria: "Overconfidence analysis has practical implications for client advice — the finding that 'certain' predictions are only 55% accurate while calibrated predictions are 85% accurate has immediate implications for how attorneys communicate litigation risk; recommends replacing binary predictions with probability ranges; proposes 'calibration training' where attorneys practice assigning probabilities and receive feedback on accuracy; connects overconfidence to poor client decision-making."
    weight: 0.35
    description: "OverconfidenceAnalysis"
  - type: llm_judge
    criteria: "Training module teaches bias recognition through legal-specific examples — uses actual legal research scenarios (not generic psychology examples) to demonstrate each bias; includes interactive exercises where participants analyze a legal question, reveal their biases through structured reflection, and practice debiased research; the training is designed for busy attorneys (2-3 hours, not a full-day course); includes follow-up assessments to measure lasting impact."
    weight: 0.30
    description: "TrainingModuleDesign"
