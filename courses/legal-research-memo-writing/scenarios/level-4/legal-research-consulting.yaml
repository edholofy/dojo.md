meta:
  id: legal-research-consulting
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Build a legal research consulting practice — design services for law firms and legal departments seeking to improve research capabilities, implement knowledge management, and adopt AI research tools"
  tags: [consulting-practice, legal-research-services, advisory, expert]

state: {}

trigger: |
  Design a consulting practice focused on helping
  law firms and corporate legal departments improve
  their legal research operations.

  MARKET OPPORTUNITY:
  - 300,000+ law firms in the US (most with
    suboptimal research practices)
  - Corporate legal departments growing research
    in-house to reduce outside counsel costs
  - AI disruption creating demand for research
    transformation advisory
  - No established consulting firm focused
    specifically on legal research operations

  TARGET CLIENTS:
  - Am Law 200 firms seeking research efficiency
  - Mid-market firms (50-200 attorneys) wanting to
    compete with larger firms
  - Fortune 500 legal departments building in-house
    research capability
  - Legal tech companies needing domain expertise

  SERVICE OFFERINGS TO DESIGN:
  1. Research operations assessment and benchmarking
  2. Knowledge management system design and
     implementation
  3. AI research tool selection and governance
  4. Research training and certification programs
  5. Research quality audit and improvement
  6. Outsourced research management (ongoing)

  Create:
  1. Service portfolio with pricing and delivery
  2. Client acquisition strategy
  3. Delivery methodology and quality frameworks
  4. Team structure and talent requirements
  5. Financial projections and growth plan

assertions:
  - type: llm_judge
    criteria: "Service portfolio addresses a real market gap — law firms spend billions on research but have no specialized advisory for optimizing it; the consulting practice fills the gap between generic management consulting (too expensive, not legal-specific) and legal tech vendor services (product-focused, not advisory); each service has clear deliverables, pricing rationale, and ROI justification for the client."
    weight: 0.35
    description: "ServicePortfolioDesign"
  - type: llm_judge
    criteria: "Delivery methodology is replicable and scalable — creates a standardized assessment framework that can be applied across different firm sizes and practice areas; includes diagnostic tools (research maturity assessment, knowledge management audit, AI readiness evaluation); defines engagement phases (discovery, assessment, recommendation, implementation, measurement); enables junior consultants to deliver consistent quality."
    weight: 0.35
    description: "DeliveryMethodology"
  - type: llm_judge
    criteria: "Financial projections are realistic for a professional services startup — estimates revenue based on realistic engagement sizes and pipeline conversion rates; accounts for the long sales cycle in legal services; projects break-even timeline; identifies recurring revenue opportunities (ongoing research management, annual audits, training renewals); addresses the challenge of scaling a knowledge-intensive consulting practice."
    weight: 0.30
    description: "FinancialProjections"
