meta:
  id: expert-memo-shift
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Handle an expert-level legal research challenge — develop and present a legal research strategy for a transformative case, integrate multiple research disciplines, and advise on research resource allocation"
  tags: [shift-simulation, strategic-research, resource-allocation, expert]

state: {}

trigger: |
  You are the Director of Legal Research for a
  large law firm. The firm has been retained to
  represent a class of plaintiffs in the first
  major lawsuit alleging that an AI system's
  autonomous decisions caused widespread financial
  harm. This is a case of first impression with
  no direct precedent.

  CASE SUMMARY:
  - An AI-powered investment platform made
    autonomous trading decisions that resulted in
    $500M in losses for 50,000 retail investors
  - The AI deviated from its disclosed investment
    strategy during a market volatility event
  - The platform's terms of service disclaim
    liability for AI decision-making
  - No human reviewed the AI's decisions in real
    time
  - The AI's decision-making process is a "black
    box" — even its creators cannot fully explain
    why it made specific trades

  RESEARCH CHALLENGES:
  - No direct precedent for AI autonomous
    decision-making liability
  - Multiple potential legal theories (negligence,
    product liability, securities fraud, breach of
    fiduciary duty, algorithmic discrimination)
  - Expert witnesses needed in AI/ML, finance,
    and risk management
  - International implications (similar lawsuits
    may follow in EU, UK, Japan)
  - Media and public interest is intense

  RESOURCES AVAILABLE:
  - $2M research budget
  - 10 attorneys available for research
  - Access to top AI/ML academic experts
  - 18 months before trial

  Create:
  1. Research strategy and resource allocation plan
  2. Analysis of viable legal theories
  3. Research team assignments and milestones
  4. Expert witness research requirements
  5. Brief bank development plan for novel arguments

assertions:
  - type: llm_judge
    criteria: "Legal theory analysis adapts existing frameworks to novel AI context — identifies how traditional doctrines apply: product liability (AI as a defective product), negligence (duty to supervise AI decisions), securities fraud (misleading disclosures about AI capabilities), breach of fiduciary duty (failure to exercise human judgment), and consumer protection (unfair practices); each theory is analyzed for strengths and weaknesses in the AI context; the analysis acknowledges the case-of-first-impression challenge while building on analogous precedent."
    weight: 0.35
    description: "LegalTheoryAdaptation"
  - type: llm_judge
    criteria: "Resource allocation reflects the strategic priorities — the $2M budget is allocated based on which research streams have the highest probability of success and impact; early investment goes to establishing favorable legal framework (product liability theory may be strongest), expert witness identification (AI explainability experts are rare), and international precedent research (EU AI Act may provide supporting framework); the allocation is justified and revisable as research progresses."
    weight: 0.35
    description: "ResourceAllocation"
  - type: llm_judge
    criteria: "The 'black box' problem is addressed as both a legal challenge and opportunity — the AI's unexplainability creates challenges for proving causation but also creates opportunities (the developer's inability to explain the AI's decisions strengthens the argument that human oversight was inadequate); the research strategy includes identifying AI explainability experts who can provide testimony on what the AI likely did and why; addresses whether algorithmic accountability requires explainability."
    weight: 0.30
    description: "BlackBoxLegalAnalysis"
