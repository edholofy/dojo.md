meta:
  id: legal-research-certification
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Design a legal research certification program — create competency standards, assessment methods, and professional development pathways for legal research professionals"
  tags: [certification-program, competency-standards, professional-development, expert]

state: {}

trigger: |
  Design a professional certification program
  for legal research and memo writing competency.
  The certification should serve both practicing
  attorneys and legal research professionals.

  PROGRAM CONTEXT:
  - Sponsoring organization: American Association
    of Law Libraries (AALL) in partnership with a
    bar association
  - Target candidates: Junior attorneys (1-5 years),
    paralegals, legal research specialists, law
    librarians, legal operations professionals
  - Market need: No standardized certification
    exists for legal research competency
  - Competitor certifications: CALI Excellence
    in Legal Research Award (academic only),
    various CLE programs (not certification)

  CERTIFICATION LEVELS:
  1. Certified Legal Researcher (CLR) — foundational
  2. Advanced Legal Research Professional (ALRP) —
     specialized expertise
  3. Master Legal Research Director (MLRD) — program
     leadership and governance

  COMPETENCY DOMAINS TO ASSESS:
  - Research methodology and strategy
  - Database proficiency (Westlaw, Lexis, Bloomberg)
  - Legal writing and analysis
  - Citation accuracy and formatting
  - AI-assisted research tools and governance
  - Knowledge management
  - Cross-jurisdictional research
  - Research team management (advanced levels)

  Create:
  1. Competency framework by certification level
  2. Assessment methodology and exam design
  3. Continuing education requirements
  4. Program administration and governance
  5. Market positioning and adoption strategy

assertions:
  - type: llm_judge
    criteria: "Competency framework has clear, measurable standards — each certification level has specific competencies that are observable and testable (e.g., CLR candidates must demonstrate ability to construct Boolean searches across multiple databases, apply IRAC format correctly, and verify 100% of citations); competencies progress logically from foundational (CLR) through specialized (ALRP) to leadership (MLRD); the framework avoids vague standards like 'understands legal research.'"
    weight: 0.35
    description: "CompetencyFramework"
  - type: llm_judge
    criteria: "Assessment methodology validates real-world competency — includes practical performance assessments (candidates receive a research question and must produce a memo under time constraints, using specified databases); written exams test knowledge of research methodology and legal analysis; AI competency assessment requires candidates to use AI tools and verify outputs; assessments are more rigorous than multiple-choice tests alone."
    weight: 0.35
    description: "AssessmentMethodology"
  - type: llm_judge
    criteria: "Adoption strategy addresses the chicken-and-egg problem — a new certification has no market value until employers recognize it; the strategy includes: founding employer partners who commit to preferring certified candidates, law school integration (students can begin certification track), CLE credit equivalency (certification counts toward CLE requirements), and endorsement from bar associations; builds initial credibility before scaling."
    weight: 0.30
    description: "AdoptionStrategy"
