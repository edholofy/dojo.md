meta:
  id: legal-writing-research-methodology
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Design empirical research on legal writing effectiveness — create studies measuring the impact of memo format, writing style, and AI tools on legal decision-making outcomes"
  tags: [empirical-research, legal-writing-effectiveness, methodology, expert]

state: {}

trigger: |
  Design a research program studying the
  effectiveness of legal research memos in
  influencing legal decision-making.

  RESEARCH CONTEXT:
  - Host: Law school legal writing center
  - Access to: 500+ practicing attorneys willing to
    participate in studies, archive of 10,000
    anonymized memos with outcome data
  - Funding: 3-year NSF/law school joint grant
  - Goal: Evidence-based improvements to legal
    research memo practices

  RESEARCH QUESTIONS:
  1. Does memo format (IRAC vs. CRAC vs. narrative)
     affect the accuracy of legal predictions by
     the reader?
  2. Do readers of plain-language memos make better
     decisions than readers of traditional legal
     prose?
  3. How does memo length affect reader
     comprehension and decision quality?
  4. Do AI-assisted memos produce better or worse
     outcomes than fully human-drafted memos?
  5. What is the relationship between citation
     density and persuasiveness?

  METHODOLOGICAL CONSTRAINTS:
  - Must use randomized controlled trials where
     feasible
  - Must control for reader expertise level
  - Must account for subject matter difficulty
  - Must be publishable in peer-reviewed journals
  - Must have practical implications for legal
     education and practice

  Create:
  1. Research program design and timeline
  2. Experimental methodology for each question
  3. Data collection and analysis plan
  4. Expected findings and practical implications
  5. Publication and dissemination strategy

assertions:
  - type: llm_judge
    criteria: "Experimental design for the format study is methodologically sound — presents the same legal question and facts in different memo formats (IRAC, CRAC, narrative) to randomly assigned attorney groups; measures decision accuracy (compared to actual case outcomes), reading time, confidence in decision, and recall of key legal points; controls for attorney experience level and practice area; sample size is adequate for statistical significance; addresses potential confounders."
    weight: 0.35
    description: "ExperimentalDesign"
  - type: llm_judge
    criteria: "AI vs. human memo study addresses the most pressing practical question — designs a blind evaluation where attorneys receive memos on the same legal question, some AI-assisted and some fully human-drafted; measures accuracy, completeness, citation validity, and reader trust; includes a 'revealed' phase where readers learn the source and report whether it changes their assessment; addresses the timely question of whether AI-assisted legal research improves or degrades quality."
    weight: 0.35
    description: "AIvsHumanStudy"
  - type: llm_judge
    criteria: "Practical implications bridge academia and practice — each study is designed to produce actionable findings (e.g., 'attorneys make 15% more accurate predictions when reading CRAC-format memos' or 'plain-language memos reduce reading time by 30% without sacrificing comprehension'); the dissemination strategy includes both academic publications and practitioner-accessible formats (CLE presentations, practice guides, law firm training materials)."
    weight: 0.30
    description: "PracticalImplications"
