meta:
  id: legal-research-knowledge-system
  level: 4
  course: legal-research-memo-writing
  type: output
  description: "Build a legal research knowledge system — design an institutional knowledge platform that captures, organizes, and retrieves legal research across practice areas, jurisdictions, and time"
  tags: [knowledge-system, institutional-knowledge, research-platform, expert]

state: {}

trigger: |
  Design a comprehensive legal research knowledge
  system for a global law firm that currently
  loses millions in duplicative research.

  FIRM PROFILE:
  - 2,000 attorneys across 40 offices worldwide
  - 20 practice groups
  - Estimated $12M annually in duplicative research
    (same legal questions researched independently
    by different offices/attorneys)
  - Existing knowledge: 50,000+ research memos
    in disparate systems (SharePoint, local drives,
    email archives, DMS)

  KNOWLEDGE SYSTEM REQUIREMENTS:
  - Centralized searchable repository of all past
    research
  - Semantic search (find relevant memos even when
    different terminology is used)
  - Jurisdiction and currency tracking (flag when
    cited law has changed)
  - Automatic categorization by practice area,
    legal issue, and jurisdiction
  - Contribution workflow (attorneys submit research
    to the knowledge base)
  - Quality scoring (which memos are most reliable)
  - Integration with research tools (Westlaw,
    Lexis) and DMS (iManage)
  - Multilingual support (English, French, German,
    Japanese, Mandarin)

  TECHNICAL ARCHITECTURE:
  - AI-powered semantic indexing
  - Knowledge graph for legal concept relationships
  - Version control and currency monitoring
  - Access controls (client confidentiality)
  - API for integration with other firm systems

  Create:
  1. System architecture and data model
  2. Knowledge capture and curation workflow
  3. Search and retrieval interface design
  4. Quality and currency maintenance processes
  5. Adoption strategy and change management

assertions:
  - type: llm_judge
    criteria: "Client confidentiality is addressed as the foundational design constraint — legal research memos often contain client-identifiable information; the system must either redact client information before contribution or implement strict access controls; conflict-of-interest walls (ethical screens) must be reflected in system access; Chinese walls between adversarial clients must be technically enforced; the system cannot compromise attorney-client privilege."
    weight: 0.35
    description: "ConfidentialityDesign"
  - type: llm_judge
    criteria: "Semantic search solves the terminology problem — legal concepts are expressed differently across practice areas and jurisdictions ('employment at will,' 'at-will employment,' 'employment without a definite term' all mean the same thing); the system uses AI-powered semantic indexing to find relevant memos regardless of terminology; includes legal concept ontology that maps synonymous terms and related concepts across jurisdictions and languages."
    weight: 0.35
    description: "SemanticSearchDesign"
  - type: llm_judge
    criteria: "Adoption strategy overcomes the knowledge hoarding problem — attorneys historically resist sharing research because it represents competitive advantage within the firm; the strategy includes: credit toward billable targets for knowledge contributions, quality-based recognition (best contributions highlighted), seamless contribution workflow (minimal extra effort), and partner mandate for knowledge sharing; addresses the cultural barriers, not just the technical ones."
    weight: 0.30
    description: "AdoptionStrategy"
