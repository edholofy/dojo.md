meta:
  id: data-driven-transformation
  level: 5
  course: data-analysis-python-pandas
  type: output
  description: "Lead a data-driven transformation — change organizational culture from intuition-based to data-informed decision-making"
  tags: [python, pandas, transformation, culture, data-literacy, organizational-change, master]

state: {}

trigger: |
  A 100-year-old manufacturing company ($500M revenue, 3,000 employees)
  has appointed its first Chief Data Officer. The CEO says: "Our
  competitors are using data to optimize everything — pricing, supply
  chain, quality control. We make decisions based on gut feeling and
  tribal knowledge. Transform us into a data-driven organization."

  Current state: decisions are made in meetings based on seniority
  and experience. Data exists in ERP systems but nobody trusts it.
  Factory floor managers say "I know my machines better than any
  spreadsheet." Sales leaders say "My relationships tell me more
  than any dashboard."

  The CDO has a $5M budget for year 1 and needs a transformation plan.

  Task: Design the organizational transformation strategy.

assertions:
  - type: llm_judge
    criteria: "Strategy addresses cultural resistance and change management — culture: 'Data-driven transformation strategy: Understanding the resistance: the factory managers and sales leaders are not wrong — they DO have valuable domain expertise. The goal is not to replace human judgment with data but to augment it. Framing matters: bad framing — \"the data says you are wrong.\" Good framing — \"the data confirms your intuition about X, and here is an additional insight about Y.\" Phase 1 — Win trust through quick wins (months 1-3): identify 3 pain points where data can visibly help. Manufacturing: predictive maintenance — use sensor data to predict machine failures before they happen. The floor managers know machines break down but cannot predict exactly when. A model that saves one unplanned downtime event ($50K per incident) wins immediate trust. Sales: lead scoring — use historical deal data to rank leads by close probability. Sales leaders keep their relationships but now focus on the most promising leads first. Finance: automated reporting — the monthly financial close takes 2 weeks of manual work. Automate 80% of it. The CFO becomes the first executive champion. Critical approach: start with problems THEY identify, not problems you think are important. Ask each department: what takes you the most time? What decisions do you wish you had better information for? Phase 2 — Build data literacy (months 4-6): data literacy is not about teaching everyone pandas. It is about teaching everyone to ask the right questions and interpret results. Executive data literacy: 4-hour workshop on reading dashboards, understanding confidence intervals, and recognizing when sample sizes are too small. Manager data literacy: 2-day program on A/B testing concepts, correlation vs causation, and how to request analytics support. Analyst upskilling: pandas, SQL, and statistical analysis training for the 10-15 people who will become domain analysts. Data champions program: identify 1-2 enthusiastic people per department. Give them early access to tools and training. They become the bridge between the data team and their department. Champions are more effective than top-down mandates because peers trust peers'"
    weight: 0.35
    description: "Culture"
  - type: llm_judge
    criteria: "Plan includes technology deployment and use case prioritization — technology: 'Technology and use case deployment: Budget allocation ($5M year 1): Data infrastructure: $1.5M — data warehouse, ELT pipelines, BI tools, data quality. Team: $2M — CDO + 8 initial hires (3 engineers, 3 analysts, 1 ML engineer, 1 governance). Training and change management: $500K — workshops, champion program, external consultants. Quick win projects: $500K — dedicated budget for the 3 quick-win use cases. Contingency: $500K — unexpected needs, additional tooling, contractor support. Use case prioritization framework: score each use case on: business impact (revenue or cost impact in dollars), feasibility (data availability, technical complexity), time to value (weeks vs months vs years), organizational readiness (will the team adopt it). Priority matrix: Tier 1 (quick wins, do first): predictive maintenance, lead scoring, automated reporting. Tier 2 (high impact, medium effort): pricing optimization, demand forecasting, quality defect prediction. Tier 3 (transformational, longer timeline): supply chain optimization, customer lifetime value modeling, real-time production dashboards. Technology stack for manufacturing: historian data (OSIsoft PI) feeds into the data warehouse. ERP data (SAP) replicated via Fivetran. IoT sensor data streamed via Kafka to a time-series database. All sources unified in Snowflake. dbt transforms raw data into analytical models. Looker serves dashboards to all departments. Python/pandas used by analysts for deep-dive analysis. Pandas in the transformation — concrete example: sensor_data = pd.read_sql(\"SELECT * FROM production.sensor_readings WHERE machine_id = 'CNC-07' AND date >= '2024-01-01'\", engine). sensor_data[\"rolling_temp_avg\"] = sensor_data[\"temperature\"].rolling(\"1H\").mean(). sensor_data[\"temp_anomaly\"] = (sensor_data[\"temperature\"] - sensor_data[\"rolling_temp_avg\"]).abs() > 3 * sensor_data[\"temperature\"].rolling(\"1H\").std(). anomaly_count = sensor_data.groupby(sensor_data[\"timestamp\"].dt.date)[\"temp_anomaly\"].sum(). Show the factory manager: on days with more than 5 temperature anomalies, there was a machine failure within 48 hours in 85% of cases. That is the kind of evidence that wins over skeptics'"
    weight: 0.35
    description: "Technology"
  - type: llm_judge
    criteria: "Response measures transformation success and addresses sustainability — measurement: 'Measuring transformation success: Leading indicators (track monthly): data tool adoption rate: what percentage of managers log into the BI tool weekly? Target: 30% at month 6, 60% at month 12. Decision documentation: what percentage of major decisions reference data? Survey executives quarterly. Analytics request volume: increasing requests means increasing trust. Data quality score: automated quality checks across all key datasets. Training completion: percentage of managers who completed data literacy program. Lagging indicators (track quarterly): revenue impact: can we attribute revenue gains to data-informed decisions? Cost savings: automation and optimization savings quantified. Time to decision: do decisions happen faster with data support? Employee satisfaction with data tools: NPS-style survey. Concrete ROI examples to present to the board: predictive maintenance — prevented 12 unplanned downtime events at $50K each = $600K saved. Demand forecasting — reduced inventory carrying costs by 15% = $2M saved. Lead scoring — sales team closes 20% more deals with the same effort = $3M incremental revenue. Automated reporting — freed 5 FTE-equivalents of manual work = $400K in productivity. Total measurable year 1 impact: $6M on a $5M investment. Sustainability — making the transformation stick: embed data into processes, not just tools. Every business review meeting must include a data slide. Every project proposal must include a hypothesis and success metric. Every quarterly goal must have a measurable KPI. Avoid data theater — dashboards that exist but influence nothing. If a dashboard does not change a decision within 90 days, retire it. Better to have 10 dashboards that drive action than 100 that are decoration. The CDO's ultimate success metric: 3 years from now, when someone proposes a new initiative, the first question in the room should be what does the data say — not because it is mandated, but because it is how the organization naturally thinks. That is cultural transformation'"
    weight: 0.30
    description: "Measurement"
