meta:
  id: cdo-board-communication
  level: 5
  course: data-analysis-python-pandas
  type: output
  description: "Communicate data strategy to the board — translate technical analytics capabilities into business value language for executive and board audiences"
  tags: [python, pandas, board, executive-communication, data-strategy, ROI, master]

state: {}

trigger: |
  As the CDO, you are presenting to the board of directors for the
  first time. The board consists of: a former CFO, a venture
  capitalist, a retired CEO, and a technology executive. They have
  varying levels of data literacy.

  You need to:
  1. Justify the $8M annual data team budget (25 people, tools,
     infrastructure)
  2. Show ROI from the past year's data investments
  3. Present 3 strategic data initiatives for next year
  4. Address the board's concern: "How do we know our data is
     accurate enough to base decisions on?"

  Available metrics: the data team has tracked all projects,
  their costs, and measurable business outcomes.

  Task: Prepare the board presentation with supporting analysis.

assertions:
  - type: llm_judge
    criteria: "Presentation justifies data investment with clear business ROI — roi: 'Board presentation — data investment ROI: Slide 1 — Data Team Investment Summary: Annual investment: $8M (people: $5M, tools: $1.5M, infrastructure: $1M, training: $500K). Team: 25 people (8 engineers, 10 analysts, 4 data scientists, 2 governance, 1 CDO). Slide 2 — Measurable Returns (build with pandas): projects = pd.DataFrame({\"initiative\": [\"Demand Forecasting\", \"Customer Churn Prevention\", \"Pricing Optimization\", \"Automated Reporting\", \"Fraud Detection\", \"Supply Chain Optimization\"], \"investment\": [300000, 500000, 400000, 200000, 600000, 800000], \"annual_return\": [2100000, 3500000, 1800000, 800000, 4200000, 2500000], \"confidence\": [\"high\", \"high\", \"medium\", \"high\", \"high\", \"medium\"]}). projects[\"roi\"] = ((projects[\"annual_return\"] - projects[\"investment\"]) / projects[\"investment\"] * 100).round(0). projects[\"payback_months\"] = (projects[\"investment\"] / (projects[\"annual_return\"] / 12)).round(1). total_investment = projects[\"investment\"].sum(). total_return = projects[\"annual_return\"].sum(). print(f\"Total project investment: ${total_investment:,.0f}\"). print(f\"Total measurable return: ${total_return:,.0f}\"). print(f\"Portfolio ROI: {(total_return - total_investment) / total_investment * 100:.0f}%\"). Result: $2.8M invested in projects returned $14.9M — a 432% ROI. The remaining $5.2M of the $8M budget is foundational (infrastructure, governance, team capacity) that enables all projects. Framing for the board: for every $1 spent on data, the company generated $1.86 in measurable returns. This excludes harder-to-measure benefits: faster decisions, better customer experience, risk reduction. The former CFO will ask about methodology: each return is calculated conservatively. Demand forecasting: compared forecast accuracy before (MAPE 25%) and after (MAPE 12%) and calculated inventory savings. Churn prevention: measured retention rate improvement in the treated group vs control. Only counted incremental retained revenue'"
    weight: 0.35
    description: "ROI"
  - type: llm_judge
    criteria: "Presentation proposes strategic initiatives with business cases — initiatives: 'Strategic initiatives for next year: Initiative 1 — Real-time customer intelligence platform: Current state: customer data is analyzed in weekly batches. By the time we identify an at-risk customer, they have already churned. Proposed: real-time event processing that triggers interventions within minutes. At-risk signals (declining usage, support complaints, billing issues) fire automated retention actions. Investment: $1.2M (2 engineers, streaming infrastructure, integration with CRM). Expected return: reduce churn by an additional 15% = $5M in retained revenue. The VC board member will appreciate this — it is a scalable, technology-driven competitive advantage. Initiative 2 — Predictive pricing engine: Current state: pricing is updated quarterly by a committee based on competitor analysis and gut feel. Proposed: dynamic pricing model that adjusts based on demand signals, inventory levels, competitor prices, and customer willingness-to-pay. Investment: $800K (1 data scientist, 1 engineer, pricing tool integration). Expected return: 3-5% revenue uplift on existing volume = $3-5M. The retired CEO will appreciate this — pricing is the highest-leverage growth lever. A 1% price improvement drops directly to the bottom line. Initiative 3 — Unified data platform for M&A integration: Current state: each acquisition takes 12-18 months to integrate data systems. Proposed: build a standardized data integration playbook and platform. New acquisitions plug into the existing warehouse within 90 days. Investment: $500K (platform development, documentation). Expected return: faster M&A integration saves $2M per acquisition in reduced consultant fees and faster synergy realization. The former CFO will appreciate this — M&A integration is always over budget and behind schedule. For each initiative: present the business case on one slide. Include investment, expected return, confidence level, timeline, and key risks. Let the board ask questions rather than overwhelming with detail'"
    weight: 0.35
    description: "Initiatives"
  - type: llm_judge
    criteria: "Response addresses data accuracy concerns with evidence — accuracy: 'Addressing the data accuracy concern: The board is right to ask. Data-driven decisions are only as good as the data. Slide — Data Quality Dashboard: quality_metrics = pd.DataFrame({\"dimension\": [\"Completeness\", \"Accuracy\", \"Timeliness\", \"Consistency\", \"Uniqueness\"], \"current_score\": [97.2, 99.1, 98.5, 96.8, 99.5], \"target\": [99, 99.5, 99, 99, 99.9], \"year_ago\": [89.5, 94.2, 85.0, 88.3, 96.1]}). quality_metrics[\"improvement\"] = (quality_metrics[\"current_score\"] - quality_metrics[\"year_ago\"]).round(1). Completeness: 97.2% of required fields are populated (up from 89.5%). Accuracy: 99.1% of records pass validation rules (up from 94.2%). Timeliness: 98.5% of data refreshes complete on time (up from 85.0%). Consistency: 96.8% metric agreement across systems (up from 88.3%). Uniqueness: 99.5% no duplicate records (up from 96.1%). Concrete example for the board: last year, the analytics team reported revenue that differed from finance by 8%. After implementing data governance, the discrepancy is now under 0.5%. We reconcile daily and investigate any difference above 1%. How we ensure accuracy: automated data quality tests run on every data pipeline (3,000 tests). Anomaly detection alerts the team when metrics deviate from expected ranges. Monthly reconciliation between analytics and finance systems. Data lineage tracking shows exactly where every number comes from. Audit trail records who accessed and modified data. The technology executive will want to know the technical approach. The former CFO will want to see the reconciliation process. The retired CEO wants to trust the numbers. The VC wants to know data quality scales with growth. Address all four perspectives. Final slide — ask: do you want the full quarterly data quality report sent to the board, or a summary exception report only when issues arise? Giving the board a choice demonstrates confidence and transparency'"
    weight: 0.30
    description: "Accuracy"
