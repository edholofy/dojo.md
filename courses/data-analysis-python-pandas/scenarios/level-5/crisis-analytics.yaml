meta:
  id: crisis-analytics
  level: 5
  course: data-analysis-python-pandas
  type: output
  description: "Deploy analytics during organizational crisis — provide real-time data-driven decision support during market disruptions, product failures, or financial crises"
  tags: [python, pandas, crisis, real-time, decision-support, executive, master]

state: {}

trigger: |
  Your company's primary product had a major data breach. Customer
  data for 500,000 users was exposed. The crisis team needs immediate
  analytics support:

  1. "How many customers were actually affected? What data was exposed?"
  2. "What is our financial exposure? Estimate the cost."
  3. "Which customers should we contact first? Prioritize by risk."
  4. "Model the churn impact — how many customers will we lose?"
  5. "Track the real-time impact on signups, usage, and revenue
     as the news spreads."

  The CEO needs answers within hours, not days. Media coverage is
  starting. Regulators are asking questions.

  Task: Provide crisis analytics support across all five questions.

assertions:
  - type: llm_judge
    criteria: "Analysis quickly scopes the breach impact and prioritizes communication — scope: 'Crisis analytics — breach impact assessment: Question 1 — Scope the breach (first 2 hours): breach_log = pd.read_csv(\"breach_access_log.csv\", parse_dates=[\"access_time\"]). Identify affected records: affected_users = breach_log[\"user_id\"].unique(). print(f\"Unique users in breach log: {len(affected_users)}\"). Identify what data was exposed: exposed_tables = breach_log[\"table_accessed\"].unique(). exposed_columns = breach_log.groupby(\"table_accessed\")[\"columns_accessed\"].apply(lambda x: set().union(*x.str.split(\",\"))).to_dict(). Categorize severity by data type: data_severity = {\"email\": \"medium\", \"name\": \"low\", \"phone\": \"medium\", \"address\": \"medium\", \"ssn\": \"critical\", \"credit_card\": \"critical\", \"password_hash\": \"high\", \"date_of_birth\": \"medium\"}. exposed_severity = {col: data_severity.get(col, \"unknown\") for table_cols in exposed_columns.values() for col in table_cols}. critical_exposure = [col for col, sev in exposed_severity.items() if sev == \"critical\"]. print(f\"CRITICAL data exposed: {critical_exposure}\"). Question 3 — Prioritize customer communication: users = pd.read_csv(\"users.csv\"). affected = users[users[\"user_id\"].isin(affected_users)]. Priority scoring: affected[\"priority_score\"] = 0. affected.loc[affected[\"has_ssn_on_file\"], \"priority_score\"] += 50. affected.loc[affected[\"has_credit_card\"], \"priority_score\"] += 40. affected.loc[affected[\"plan_type\"] == \"enterprise\", \"priority_score\"] += 30. affected.loc[affected[\"is_public_figure\"], \"priority_score\"] += 20. affected.loc[affected[\"lifetime_value\"] > 10000, \"priority_score\"] += 10. communication_order = affected.sort_values(\"priority_score\", ascending=False). tier_1 = communication_order.head(int(len(communication_order) * 0.1)). tier_2 = communication_order.iloc[int(len(communication_order) * 0.1):int(len(communication_order) * 0.3)]. tier_3 = communication_order.iloc[int(len(communication_order) * 0.3):]. print(f\"Tier 1 (contact within 4 hours): {len(tier_1)} users\"). print(f\"Tier 2 (contact within 24 hours): {len(tier_2)} users\"). print(f\"Tier 3 (contact within 72 hours): {len(tier_3)} users\"). Enterprise customers and those with critical data exposed are contacted first by phone. Others receive email notification'"
    weight: 0.35
    description: "Scope"
  - type: llm_judge
    criteria: "Analysis estimates financial exposure and models churn impact — financial: 'Financial impact modeling: Question 2 — Cost estimation: cost_model = pd.DataFrame({\"category\": [\"Notification costs\", \"Credit monitoring (2 years)\", \"Legal and regulatory fines\", \"Forensic investigation\", \"PR and crisis management\", \"Customer compensation\", \"Lost revenue (churn)\", \"System remediation\", \"Insurance deductible\"], \"per_user_cost\": [2, 25, 0, 0, 0, 50, 0, 0, 0], \"fixed_cost\": [0, 0, 5000000, 500000, 300000, 0, 0, 2000000, 1000000]}). affected_count = len(affected_users). cost_model[\"total\"] = cost_model[\"per_user_cost\"] * affected_count + cost_model[\"fixed_cost\"]. print(f\"Estimated total cost: ${cost_model['total'].sum():,.0f}\"). Scenarios: best case (minor data, quick containment): $5M. Expected case: $15M. Worst case (SSN exposed, regulatory action): $40M. For the CFO: ensure cyber insurance claim is filed immediately. Review policy limits and coverage. Question 4 — Churn impact modeling: Historical breach impact from industry data: breach churn rates typically 3-7% of affected users. But it depends on severity, response speed, and customer loyalty. churn_scenarios = pd.DataFrame({\"scenario\": [\"Best (quick response, low severity)\", \"Expected (moderate severity)\", \"Worst (critical data, slow response)\"], \"churn_rate\": [0.03, 0.07, 0.15], \"affected_users\": [affected_count] * 3}). churn_scenarios[\"users_lost\"] = (churn_scenarios[\"churn_rate\"] * churn_scenarios[\"affected_users\"]).astype(int). avg_revenue_per_user = affected[\"mrr\"].mean(). churn_scenarios[\"annual_revenue_impact\"] = churn_scenarios[\"users_lost\"] * avg_revenue_per_user * 12. Enterprise customers are particularly at risk — they have contractual security requirements and may be legally obligated to switch vendors after a breach. enterprise_at_risk = affected[affected[\"plan_type\"] == \"enterprise\"]. print(f\"Enterprise accounts at risk: {len(enterprise_at_risk)}\"). print(f\"Enterprise ARR at risk: ${enterprise_at_risk['mrr'].sum() * 12:,.0f}\"). Assign account managers to personally contact every enterprise customer within 24 hours'"
    weight: 0.35
    description: "Financial"
  - type: llm_judge
    criteria: "Response includes real-time monitoring dashboard and recovery tracking — monitoring: 'Real-time crisis monitoring: Question 5 — Track business impact as news spreads: Set up hourly monitoring from the moment the breach becomes public. def crisis_dashboard(hour): metrics = {\"hour\": hour, \"new_signups\": count_signups_last_hour(), \"cancellation_requests\": count_cancellations_last_hour(), \"support_tickets\": count_tickets_last_hour(), \"social_mentions\": count_social_mentions(), \"press_articles\": count_press_mentions(), \"active_users\": count_active_users(), \"api_usage\": count_api_calls_last_hour()}. metrics[\"signup_vs_baseline\"] = metrics[\"new_signups\"] / hourly_baseline[\"signups\"] - 1. metrics[\"cancellation_vs_baseline\"] = metrics[\"cancellation_requests\"] / hourly_baseline[\"cancellations\"] - 1. return metrics. Expected pattern after breach news: Hour 1-4: support tickets spike 500-1000%. Hours 4-12: cancellation requests increase 200-400%. Days 1-3: new signups drop 30-50%. Days 3-7: media coverage peaks then declines. Weeks 2-4: metrics begin recovering toward baseline. Recovery tracking — daily for 90 days: recovery = pd.DataFrame(daily_metrics). recovery[\"signup_recovery\"] = recovery[\"new_signups\"] / pre_breach_signups_avg * 100. recovery[\"churn_normalization\"] = recovery[\"cancellations\"] / pre_breach_cancellation_avg * 100. Full recovery typically takes 60-90 days if the response is handled well. If metrics have not recovered by day 90, there may be lasting brand damage. Executive crisis report (updated every 6 hours): crisis_summary = {\"total_affected\": len(affected_users), \"notified_so_far\": count_notified(), \"notification_pct\": count_notified() / len(affected_users) * 100, \"enterprise_contacted\": count_enterprise_contacted(), \"cancellations_since_breach\": total_cancellations, \"revenue_impact_to_date\": total_revenue_lost, \"estimated_total_cost\": cost_model[\"total\"].sum(), \"media_sentiment\": calculate_sentiment_score(), \"regulatory_status\": get_regulatory_status()}. The analytics team operates in 8-hour shifts for the first week. One analyst is dedicated to monitoring metrics. One analyst supports the legal and regulatory response with data. One analyst supports the customer communication team with prioritization and tracking. The crisis ends when all metrics return to within 10% of pre-breach baselines and all regulatory notifications are complete'"
    weight: 0.30
    description: "Monitoring"
