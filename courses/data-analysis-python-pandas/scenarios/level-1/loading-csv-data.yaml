meta:
  id: loading-csv-data
  level: 1
  course: data-analysis-python-pandas
  type: output
  description: "Load and inspect CSV data — use pandas to read a CSV file, examine its structure, and understand basic DataFrame properties"
  tags: [python, pandas, CSV, read_csv, DataFrame, beginner]

state: {}

trigger: |
  You are a junior data analyst. Your manager gives you a CSV file
  called `sales_data.csv` with the following columns:

  date, product_name, category, quantity, unit_price, region, customer_id

  The file has 10,000 rows. Your manager asks: "Load this data and
  tell me the basics — how many rows, what are the columns, any
  missing values, and what do the first few rows look like?"

  Task: Write the Python/pandas code to load and inspect the data,
  and explain what each step reveals.

assertions:
  - type: llm_judge
    criteria: "Code correctly loads and inspects the DataFrame — code: 'Loading and inspecting CSV data with pandas: import pandas as pd. df = pd.read_csv(\"sales_data.csv\"). Step 1 — First look at the data: df.head() shows the first 5 rows. This confirms the data loaded correctly, shows the column names, and gives a visual sense of the data format. df.tail() shows the last 5 rows — useful to verify the file was read completely (no truncation). Step 2 — Shape and structure: df.shape returns (10000, 7) — 10,000 rows and 7 columns. df.columns lists all column names: [\"date\", \"product_name\", \"category\", \"quantity\", \"unit_price\", \"region\", \"customer_id\"]. df.dtypes shows the data type of each column: date is likely object (string) — will need to be converted to datetime. product_name, category, region are object (string). quantity is int64. unit_price is float64. customer_id is int64. Step 3 — Missing values: df.isnull().sum() shows the count of missing values per column. Example output: date 0, product_name 12, category 5, quantity 0, unit_price 23, region 0, customer_id 0. This tells us: product_name has 12 missing values, category has 5, and unit_price has 23. These need to be addressed before analysis. df.isnull().sum().sum() gives the total missing values across the entire DataFrame. Step 4 — Summary statistics: df.describe() provides count, mean, std, min, 25%, 50%, 75%, max for numeric columns (quantity, unit_price, customer_id). This reveals: the range of quantities (e.g., 1-100), the price range (e.g., $5.99-$299.99), and any obvious outliers. df.describe(include=\"object\") shows count, unique, top, freq for string columns. This reveals: how many unique products, categories, and regions exist, and the most common values. Step 5 — Quick info summary: df.info() provides a concise summary: column names, non-null counts, data types, and memory usage. This is the single most useful command for understanding a new dataset'"
    weight: 0.35
    description: "Code quality"
  - type: llm_judge
    criteria: "Explanation helps a beginner understand why each inspection step matters — explanation: 'Why each step matters: head() and tail() are not just for viewing data — they catch loading errors. If head() shows garbled data, the CSV delimiter might be wrong (use sep parameter). If tail() shows fewer rows than expected, the file might be incomplete. shape is your sanity check — does 10,000 rows match what your manager said? If not, investigate (duplicate headers, extra blank rows at the end). dtypes tells you what pandas thinks each column is. The date column being object instead of datetime is common — pandas does not auto-detect dates. You will need pd.to_datetime(df[\"date\"]) later. isnull().sum() is critical before any analysis. Analyzing data with missing values without handling them first leads to wrong conclusions (e.g., average price would exclude rows with missing unit_price, biasing the result). describe() catches data quality issues: if quantity has a min of -5, something is wrong (negative quantities). If unit_price has a max of 999999, there might be a data entry error. Common mistakes beginners make: (1) Not specifying encoding: if the CSV has special characters, use pd.read_csv(\"file.csv\", encoding=\"utf-8\") or encoding=\"latin-1\". (2) Not handling the header: if the CSV has no header row, use header=None. If the first row is not the header, use skiprows=1. (3) Assuming the data is clean: always inspect before analyzing. Never skip the inspection step'"
    weight: 0.35
    description: "Explanation"
  - type: llm_judge
    criteria: "Additional read_csv parameters are explained for common real-world scenarios — parameters: 'Useful read_csv parameters: pd.read_csv(\"sales_data.csv\", parse_dates=[\"date\"]) — automatically converts the date column to datetime. pd.read_csv(\"sales_data.csv\", dtype={\"customer_id\": str}) — forces customer_id to be read as a string (useful when IDs have leading zeros like 00123). pd.read_csv(\"sales_data.csv\", usecols=[\"date\", \"product_name\", \"quantity\"]) — reads only specific columns (faster and uses less memory for large files). pd.read_csv(\"sales_data.csv\", nrows=100) — reads only the first 100 rows (useful for testing your code on a large file before processing everything). pd.read_csv(\"sales_data.csv\", na_values=[\"N/A\", \"missing\", \"-\"]) — treats additional strings as missing values (beyond the default NaN and empty string)'"
    weight: 0.30
    description: "Parameters"
