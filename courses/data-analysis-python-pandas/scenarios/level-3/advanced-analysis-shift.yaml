meta:
  id: advanced-analysis-shift
  level: 3
  course: data-analysis-python-pandas
  type: output
  description: "Advanced analysis shift — conduct a full analytical investigation combining multiple techniques to solve a complex business problem"
  tags: [python, pandas, analysis, shift-simulation, investigation, advanced]

state: {}

trigger: |
  The CEO calls an emergency meeting: "Customer churn doubled last
  quarter. Our monthly active users went from 50,000 to 48,000 but
  we also acquired 10,000 new users — that means we lost 12,000.
  Find out who is leaving, why, and what we can do about it.
  I need answers by tomorrow."

  Available data:
  - users.csv: user_id, signup_date, plan_type (free/basic/premium),
    acquisition_channel, industry, company_size
  - activity.csv: user_id, date, action_type (login, feature_use,
    export, invite), session_duration_min
  - support_tickets.csv: user_id, created_date, category, resolution_time_hours,
    satisfaction_score
  - billing.csv: user_id, billing_date, amount, status (paid/failed/cancelled)

  Task: Conduct the churn investigation and present findings.

assertions:
  - type: llm_judge
    criteria: "Investigation systematically identifies who churned and their characteristics — who analysis: 'Churn investigation — who is leaving: Step 1 — Define churn: churned_users = users who were active in Q2 but not in Q3. active_q2 = activity[activity[\"date\"].between(\"2024-04-01\", \"2024-06-30\")][\"user_id\"].unique(). active_q3 = activity[activity[\"date\"].between(\"2024-07-01\", \"2024-09-30\")][\"user_id\"].unique(). churned = set(active_q2) - set(active_q3). retained = set(active_q2) & set(active_q3). new_q3 = set(active_q3) - set(active_q2). print(f\"Churned: {len(churned)} users\"). print(f\"Retained: {len(retained)} users\"). print(f\"New: {len(new_q3)} users\"). Step 2 — Profile the churned users: users[\"churned\"] = users[\"user_id\"].isin(churned).astype(int). churn_profile = users.groupby(\"churned\").agg(avg_tenure=(\"signup_date\", lambda x: (pd.Timestamp(\"2024-09-30\") - pd.to_datetime(x)).dt.days.mean()), plan_distribution=(\"plan_type\", lambda x: x.value_counts(normalize=True).to_dict()), top_channel=(\"acquisition_channel\", lambda x: x.value_counts().index[0]), avg_company_size=(\"company_size\", \"mean\")). Step 3 — Churn rate by segment: for col in [\"plan_type\", \"acquisition_channel\", \"industry\", \"company_size\"]: churn_by_segment = users.groupby(col)[\"churned\"].mean().sort_values(ascending=False). print(f\"\\nChurn rate by {col}:\"). print(churn_by_segment.map(\"{:.1%}\".format)). Key findings to look for: is churn concentrated in free users (expected) or premium users (alarming)? Is one acquisition channel producing users who churn faster? Is a specific industry leaving (potential competitive threat)? Are small companies more likely to churn than large ones? Step 4 — Engagement analysis: last_q2_activity = (activity[activity[\"date\"].between(\"2024-04-01\", \"2024-06-30\")].groupby(\"user_id\").agg(total_sessions=(\"date\", \"count\"), avg_session_duration=(\"session_duration_min\", \"mean\"), features_used=(\"action_type\", \"nunique\"), last_active=(\"date\", \"max\"))). users = users.merge(last_q2_activity, on=\"user_id\", how=\"left\"). churned_engagement = users[users[\"churned\"] == 1][[\"total_sessions\", \"avg_session_duration\", \"features_used\"]].describe(). retained_engagement = users[users[\"churned\"] == 0][[\"total_sessions\", \"avg_session_duration\", \"features_used\"]].describe(). print(\"Churned user engagement:\"). print(churned_engagement). print(\"Retained user engagement:\"). print(retained_engagement). If churned users had significantly fewer sessions, shorter durations, and fewer features used — they were disengaged before they left'"
    weight: 0.35
    description: "Who analysis"
  - type: llm_judge
    criteria: "Analysis identifies root causes from support, billing, and behavioral data — why analysis: 'Why they are leaving — root cause analysis: Support ticket analysis: churned_tickets = support_tickets[support_tickets[\"user_id\"].isin(churned)]. retained_tickets = support_tickets[support_tickets[\"user_id\"].isin(retained)]. churned_ticket_rate = len(churned_tickets) / len(churned). retained_ticket_rate = len(retained_tickets) / len(retained). print(f\"Tickets per churned user: {churned_ticket_rate:.2f}\"). print(f\"Tickets per retained user: {retained_ticket_rate:.2f}\"). churned_categories = churned_tickets[\"category\"].value_counts(normalize=True). retained_categories = retained_tickets[\"category\"].value_counts(normalize=True). category_comparison = pd.DataFrame({\"Churned\": churned_categories, \"Retained\": retained_categories}).fillna(0). print(\"\\nTicket categories (churned vs retained):\"). print(category_comparison). If churned users disproportionately filed tickets about billing issues, a specific feature, or slow response times — these are root cause signals. Satisfaction scores: churned_csat = churned_tickets[\"satisfaction_score\"].mean(). retained_csat = retained_tickets[\"satisfaction_score\"].mean(). print(f\"Avg satisfaction — Churned: {churned_csat:.1f}, Retained: {retained_csat:.1f}\"). Billing analysis: billing_issues = billing[billing[\"status\"] == \"failed\"]. users_with_billing_issues = billing_issues[\"user_id\"].unique(). involuntary_churn = set(users_with_billing_issues) & churned. print(f\"Involuntary churn (billing failures): {len(involuntary_churn)} ({len(involuntary_churn)/len(churned)*100:.0f}% of all churn)\"). Involuntary churn (failed payments) is often 20-40% of total churn and is the easiest to fix (retry logic, card update reminders). Behavioral decay: track engagement metrics in the 90 days before churn. monthly_activity = (activity[activity[\"user_id\"].isin(churned)].set_index(\"date\").groupby(\"user_id\").resample(\"M\").agg({\"action_type\": \"count\"})).reset_index(). avg_activity_trend = (monthly_activity.groupby(\"date\")[\"action_type\"].mean()). A declining activity trend in the 60-90 days before churn shows the churn was predictable — users disengage gradually before cancelling'"
    weight: 0.35
    description: "Why analysis"
  - type: llm_judge
    criteria: "Findings include actionable recommendations for the CEO — recommendations: 'CEO presentation — findings and recommendations: Finding 1: 35% of churn is involuntary (failed payments). These users did not decide to leave — their credit cards expired or had insufficient funds. Recommendation: implement dunning management — automated retry of failed payments on days 1, 3, 5, and 7. Send email reminders to update payment information. This alone could reduce churn by 35% (the easiest win). Finding 2: free plan users churn at 45% but basic plan users churn at 12% and premium at 5%. Recommendation: the free-to-paid conversion is the critical funnel. Users who never convert to paid have a 45% quarterly churn rate. Implement a 14-day trial of basic features for free users — users who experience paid features are 3x more likely to convert. Finding 3: users who use fewer than 3 features in their first month churn at 4x the rate of users who use 5+ features. Recommendation: improve onboarding to guide new users through at least 5 key features. Create an onboarding checklist. Send triggered emails when engagement drops. Finding 4: users acquired through the paid social campaign churn at 30% vs 10% for organic users. Recommendation: the paid social campaign is bringing low-quality users. Either improve targeting (focus on users who match the ideal customer profile) or reallocate budget to higher-quality channels. Finding 5: the export and invite features are strong retention signals. Users who export data or invite teammates are 5x less likely to churn. Recommendation: prompt new users to export data in week 1 and invite teammates in week 2. These actions create switching costs (their data is in the product, their team depends on it). Projected impact: addressing involuntary churn: save 4,200 users per quarter. Improving free user onboarding: convert 2,000 additional users to paid. Optimizing acquisition channels: reduce churn by 1,500 users per quarter. Total: reduce quarterly churn from 12,000 to approximately 4,300 (64% reduction)'"
    weight: 0.30
    description: "Recommendations"
