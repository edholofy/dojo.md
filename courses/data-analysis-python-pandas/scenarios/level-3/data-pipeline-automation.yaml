meta:
  id: data-pipeline-automation
  level: 3
  course: data-analysis-python-pandas
  type: output
  description: "Build automated data pipelines — create production-grade data pipelines with error handling, logging, and scheduled execution"
  tags: [python, pandas, pipeline, automation, ETL, production, advanced]

state: {}

trigger: |
  Your weekly sales report is currently a Jupyter notebook that
  someone runs manually every Monday. The process:

  1. Load data from 3 CSV exports (orders, products, customers)
  2. Clean and merge the data
  3. Calculate KPIs (revenue, AOV, customer count, top products)
  4. Generate an Excel report with multiple tabs
  5. Email the report to 5 stakeholders

  Your manager says: "This needs to run automatically every Monday
  at 7 AM. If it fails, I need to know immediately. And it should
  handle messy data without crashing."

  Task: Convert the notebook into a production data pipeline.

assertions:
  - type: llm_judge
    criteria: "Pipeline has proper error handling, logging, and data validation — pipeline: 'Production data pipeline: import pandas as pd. import logging. from datetime import datetime. from pathlib import Path. logging.basicConfig(level=logging.INFO, format=\"%(asctime)s - %(levelname)s - %(message)s\", handlers=[logging.FileHandler(\"pipeline.log\"), logging.StreamHandler()]). logger = logging.getLogger(__name__). class DataPipelineError(Exception): pass. class DataValidationError(DataPipelineError): pass. def load_data(data_dir: Path) -> dict: logger.info(\"Loading data files...\"). files = {\"orders\": \"orders.csv\", \"products\": \"products.csv\", \"customers\": \"customers.csv\"}. dataframes = {}. for name, filename in files.items(): filepath = data_dir / filename. if not filepath.exists(): raise FileNotFoundError(f\"Missing required file: {filepath}\"). try: df = pd.read_csv(filepath). logger.info(f\"Loaded {name}: {len(df)} rows, {len(df.columns)} columns\"). dataframes[name] = df. except Exception as e: raise DataPipelineError(f\"Failed to load {filename}: {e}\"). return dataframes. def validate_data(dataframes: dict) -> None: logger.info(\"Validating data...\"). orders = dataframes[\"orders\"]. required_columns = {\"order_id\", \"customer_id\", \"product_id\", \"quantity\", \"order_date\"}. missing = required_columns - set(orders.columns). if missing: raise DataValidationError(f\"Orders missing columns: {missing}\"). if orders[\"order_id\"].duplicated().any(): dupes = orders[\"order_id\"].duplicated().sum(). logger.warning(f\"Found {dupes} duplicate order IDs — removing\"). dataframes[\"orders\"] = orders.drop_duplicates(subset=\"order_id\"). if (orders[\"quantity\"] <= 0).any(): bad = (orders[\"quantity\"] <= 0).sum(). logger.warning(f\"Found {bad} non-positive quantities — filtering\"). dataframes[\"orders\"] = orders[orders[\"quantity\"] > 0]. logger.info(\"Data validation passed\"). def transform_data(dataframes: dict) -> pd.DataFrame: logger.info(\"Transforming data...\"). orders = dataframes[\"orders\"].copy(). products = dataframes[\"products\"].copy(). customers = dataframes[\"customers\"].copy(). orders[\"order_date\"] = pd.to_datetime(orders[\"order_date\"], errors=\"coerce\"). invalid_dates = orders[\"order_date\"].isna().sum(). if invalid_dates > 0: logger.warning(f\"Dropped {invalid_dates} rows with unparseable dates\"). orders = orders.dropna(subset=[\"order_date\"]). df = (orders.merge(products, on=\"product_id\", how=\"left\").merge(customers, on=\"customer_id\", how=\"left\")). df[\"revenue\"] = df[\"quantity\"] * df[\"unit_price\"]. logger.info(f\"Transformed dataset: {len(df)} rows\"). return df. def calculate_kpis(df: pd.DataFrame, report_date: datetime) -> dict: logger.info(\"Calculating KPIs...\"). week_start = report_date - pd.Timedelta(days=7). week_data = df[df[\"order_date\"].between(week_start, report_date)]. kpis = {\"report_date\": report_date.strftime(\"%Y-%m-%d\"), \"total_revenue\": week_data[\"revenue\"].sum(), \"total_orders\": len(week_data), \"avg_order_value\": week_data[\"revenue\"].mean(), \"unique_customers\": week_data[\"customer_id\"].nunique(), \"top_product\": week_data.groupby(\"product_name\")[\"revenue\"].sum().idxmax()}. logger.info(f\"KPIs calculated: revenue=${kpis['total_revenue']:,.0f}\"). return kpis. def generate_report(df: pd.DataFrame, kpis: dict, output_path: Path) -> Path: logger.info(\"Generating Excel report...\"). with pd.ExcelWriter(output_path, engine=\"openpyxl\") as writer: pd.DataFrame([kpis]).to_excel(writer, sheet_name=\"KPIs\", index=False). region_summary = df.groupby(\"region\")[\"revenue\"].agg([\"sum\", \"mean\", \"count\"]).round(2). region_summary.to_excel(writer, sheet_name=\"By Region\"). product_summary = df.groupby(\"product_name\")[\"revenue\"].sum().nlargest(20). product_summary.to_excel(writer, sheet_name=\"Top Products\"). logger.info(f\"Report saved to {output_path}\"). return output_path. def run_pipeline(): logger.info(\"Pipeline started\"). try: data_dir = Path(\"data/\"). dataframes = load_data(data_dir). validate_data(dataframes). df = transform_data(dataframes). kpis = calculate_kpis(df, datetime.now()). output_path = Path(f\"reports/weekly_report_{datetime.now():%Y%m%d}.xlsx\"). output_path.parent.mkdir(exist_ok=True). generate_report(df, kpis, output_path). logger.info(\"Pipeline completed successfully\"). return output_path. except DataValidationError as e: logger.error(f\"Data validation failed: {e}\"). raise. except Exception as e: logger.error(f\"Pipeline failed: {e}\", exc_info=True). raise. if __name__ == \"__main__\": run_pipeline()'"
    weight: 0.35
    description: "Pipeline"
  - type: llm_judge
    criteria: "Explanation covers scheduling, monitoring, and operational concerns — operations: 'Operational concerns for production pipelines: Scheduling: Option 1 — cron (Linux/Mac): 0 7 * * 1 cd /app && python pipeline.py (runs every Monday at 7 AM). Option 2 — Windows Task Scheduler: create a task with trigger Monday 7:00 AM, action python pipeline.py. Option 3 — Python scheduler (for more control): import schedule. schedule.every().monday.at(\"07:00\").do(run_pipeline). while True: schedule.run_pending(). time.sleep(60). Option 4 — Cloud scheduler: AWS Lambda + CloudWatch Events, GCP Cloud Scheduler, or GitHub Actions on a cron schedule. Alerting on failure: import smtplib. from email.mime.text import MIMEText. def send_alert(error_msg): msg = MIMEText(f\"Pipeline failed: {error_msg}\"). msg[\"Subject\"] = \"ALERT: Weekly Sales Pipeline Failed\". msg[\"From\"] = \"pipeline@company.com\". msg[\"To\"] = \"manager@company.com\". smtp = smtplib.SMTP(\"smtp.company.com\"). smtp.send_message(msg). smtp.quit(). Wrap the pipeline in a try/except that calls send_alert on failure. Idempotency: the pipeline should produce the same result if run twice. Check if the report already exists before regenerating. Use deterministic date ranges (not relative to now — use the report_date parameter). Data freshness check: verify the most recent order_date in the data is within the last 7 days. If the data is stale, log a warning (the source system may not have exported fresh data). Monitoring over time: log the row counts, KPI values, and execution time for each run. Track these over time to detect: data volume changes (sudden drops suggest missing data), KPI anomalies (revenue dropped 50% — is that real or a data issue?), performance degradation (pipeline taking longer each week — dataset growing?)'"
    weight: 0.35
    description: "Operations"
  - type: llm_judge
    criteria: "Response covers testing strategies for data pipelines — testing: 'Testing data pipelines: Unit tests for individual functions: import pytest. def test_load_data_missing_file(): with pytest.raises(FileNotFoundError): load_data(Path(\"nonexistent_dir/\")). def test_validate_data_removes_duplicates(): orders = pd.DataFrame({\"order_id\": [1, 1, 2], \"customer_id\": [1, 1, 2], \"product_id\": [1, 1, 2], \"quantity\": [1, 1, 2], \"order_date\": [\"2024-01-01\"] * 3}). dataframes = {\"orders\": orders, \"products\": pd.DataFrame(), \"customers\": pd.DataFrame()}. validate_data(dataframes). assert len(dataframes[\"orders\"]) == 2. def test_kpi_calculation(): df = pd.DataFrame({\"order_date\": pd.date_range(\"2024-01-01\", periods=10), \"revenue\": [100] * 10, \"customer_id\": range(10), \"product_name\": [\"Widget\"] * 10}). kpis = calculate_kpis(df, pd.Timestamp(\"2024-01-10\")). assert kpis[\"total_revenue\"] == 700. assert kpis[\"unique_customers\"] == 7. Integration test with sample data: create a small test dataset (100 rows) that exercises all edge cases: missing values, duplicates, negative quantities, unparseable dates, and valid data. Run the full pipeline on the test dataset. Verify the output Excel file exists, has the correct sheets, and the KPIs are within expected ranges. Data contract testing: define expectations for the input data: column names, data types, value ranges, and null percentages. Test these expectations at the start of the pipeline. If the source system changes the export format, the contract test catches it immediately (instead of silently producing wrong results)'"
    weight: 0.30
    description: "Testing"
