meta:
  id: exploratory-data-analysis
  level: 3
  course: data-analysis-python-pandas
  type: output
  description: "Conduct exploratory data analysis — systematically explore an unfamiliar dataset to discover patterns, anomalies, and insights"
  tags: [python, pandas, EDA, exploration, patterns, anomalies, advanced]

state: {}

trigger: |
  You receive a dataset you have never seen before: 500,000 rows
  of e-commerce transaction data with 25 columns. The data science
  team says: "We're building a churn prediction model. Before we
  start, we need a thorough EDA. Find the patterns, the problems,
  and the surprises."

  Columns include: customer_id, order_date, order_total, items_count,
  discount_applied, payment_method, shipping_method, delivery_days,
  return_flag, customer_tenure_days, customer_lifetime_value,
  customer_segment, product_category, channel (web/app/phone),
  device_type, session_duration_min, pages_viewed, cart_abandonment,
  customer_satisfaction_score, referral_source, and more.

  Task: Conduct the systematic EDA and present findings.

assertions:
  - type: llm_judge
    criteria: "EDA follows a systematic methodology from overview to deep dives — methodology: 'Systematic EDA methodology: Phase 1 — Dataset overview (10 minutes): df = pd.read_csv(\"ecommerce_data.csv\", parse_dates=[\"order_date\"]). print(f\"Shape: {df.shape}\"). print(f\"Memory: {df.memory_usage(deep=True).sum() / 1e6:.0f} MB\"). df.info(). df.describe(include=\"all\"). df.isnull().sum().sort_values(ascending=False).head(10). What to look for: row and column count (500K x 25 as expected?), data types (are dates parsed correctly, are IDs strings?), missing values (which columns, what percentage, any patterns?), summary statistics (ranges, means, anything obviously wrong?). Phase 2 — Univariate analysis (distribution of each variable, 30 minutes): Numeric columns: fig, axes = plt.subplots(4, 3, figsize=(15, 12)). numeric_cols = df.select_dtypes(include=\"number\").columns. for idx, col in enumerate(numeric_cols[:12]): ax = axes[idx // 3, idx % 3]. df[col].hist(bins=50, ax=ax, color=\"steelblue\", edgecolor=\"white\"). ax.set_title(col). ax.axvline(df[col].median(), color=\"red\", linestyle=\"--\"). plt.tight_layout(). What to look for: skewed distributions (right-skew is common in monetary variables), bimodal distributions (suggests two distinct populations), unexpected ranges (negative delivery days? Satisfaction scores above 10?), extreme outliers (an order_total of $1M when 99% are under $500). Categorical columns: for col in df.select_dtypes(include=\"object\").columns: print(f\"\\n{col}: {df[col].nunique()} unique values\"). print(df[col].value_counts().head(10)). What to look for: high cardinality (too many unique values to be useful as a feature), imbalanced categories (90% web, 5% app, 5% phone), unexpected values (typos, encoding issues, placeholder values like N/A or TBD). Phase 3 — Bivariate analysis (relationships between variables, 45 minutes): Target variable analysis (churn): churn_rate = df.groupby(\"customer_segment\")[\"return_flag\"].mean(). Correlation matrix: corr = df.select_dtypes(include=\"number\").corr(). fig, ax = plt.subplots(figsize=(12, 10)). sns.heatmap(corr, annot=True, cmap=\"coolwarm\", center=0, fmt=\".2f\", ax=ax, mask=np.triu(np.ones_like(corr, dtype=bool))). What to look for: strong correlations between features (multicollinearity — may need to drop one), features correlated with the target (predictive features for the model), unexpected correlations (delivery_days correlated with return_flag suggests slow delivery causes returns). Key relationships to explore: order_total by customer_segment, delivery_days by shipping_method, return_flag by product_category, customer_satisfaction by channel. Phase 4 — Temporal analysis (15 minutes): monthly = df.resample(\"M\", on=\"order_date\").agg({\"order_total\": [\"sum\", \"mean\", \"count\"], \"customer_id\": \"nunique\"}). What to look for: seasonality (holiday spikes, summer dips), trend (growing or declining), anomalies (sudden drops might indicate data collection issues, not real changes). Phase 5 — Data quality deep dive (20 minutes): Duplicates: exact = df.duplicated().sum(). near = df.duplicated(subset=[\"customer_id\", \"order_date\", \"order_total\"]).sum(). Logical consistency: negative_delivery = (df[\"delivery_days\"] < 0).sum(). future_orders = (df[\"order_date\"] > pd.Timestamp.now()).sum(). impossible_scores = ((df[\"customer_satisfaction_score\"] < 1) | (df[\"customer_satisfaction_score\"] > 5)).sum(). Missing value patterns: import seaborn as sns. sns.heatmap(df.isnull(), cbar=False, yticklabels=False). Are missing values correlated? (Missing satisfaction scores might cluster with missing delivery dates — both come from the same data source)'"
    weight: 0.35
    description: "Methodology"
  - type: llm_judge
    criteria: "Findings identify actionable patterns and data quality issues — findings: 'EDA findings report: Data Quality Issues: (1) customer_satisfaction_score has 35% missing values. The missing values are not random — they cluster in the phone channel (85% missing). Phone orders likely do not trigger the satisfaction survey. Recommendation for the modeling team: do not use satisfaction score as a feature unless you can impute it reliably. Or split the model: one for web/app customers (with satisfaction data) and one for phone customers (without). (2) 1,200 rows have delivery_days less than 0. These are likely data entry errors or timezone issues. Recommendation: set negative delivery_days to NaN and investigate the source. (3) 45 rows have order_total equal to exactly $0.00. These might be free trial orders, fully discounted orders, or data errors. Recommendation: investigate and either remove or flag as a separate category. Pattern Discoveries: (1) Customer lifetime value has a bimodal distribution. There are two peaks: one around $200 and another around $2,000. This suggests two distinct customer populations (possibly consumer vs. business customers). Recommendation: segment analysis should account for this bimodality. (2) Discount usage varies dramatically by channel: web 45%, app 30%, phone 15%. This could indicate that web customers are more price-sensitive, or that web makes coupons more visible. Implication for churn: heavy discount users might churn when discounts stop. (3) Return rate is 3x higher for the Clothing category than Electronics. Combined with the delivery_days correlation: slow clothing delivery drives returns (customers buy elsewhere while waiting). (4) Cart abandonment rate is 68% on mobile devices vs 42% on desktop. This suggests a mobile UX issue — a potential quick win for the product team. (5) Temporal pattern: order volume drops 40% every January (post-holiday hangover) and spikes 60% in November (Black Friday). The churn model should account for seasonality — a customer not ordering in January is normal, not churn. Recommendations for the modeling team: features likely predictive of churn: customer_tenure_days, days since last order, order frequency trend, return_flag history, delivery satisfaction. Features to handle carefully: customer_satisfaction_score (35% missing), order_total (skewed — consider log transformation), discount_applied (confounding — discounts prevent churn but heavy discount users are also churn-prone)'"
    weight: 0.35
    description: "Findings"
  - type: llm_judge
    criteria: "Response includes automated EDA tools and reproducibility practices — automation: 'Automated EDA and reproducibility: Automated profiling: from ydata_profiling import ProfileReport. profile = ProfileReport(df, title=\"E-commerce EDA\", explorative=True). profile.to_file(\"eda_report.html\"). ydata-profiling (formerly pandas-profiling) generates a comprehensive HTML report with: variable distributions, correlations, missing value analysis, duplicate detection, and alerts for data quality issues. This takes 5-10 minutes to generate on 500K rows. Use it as a starting point, then dive deeper into specific findings. Reproducible EDA notebook structure: Cell 1: imports and configuration. Cell 2: data loading with schema validation. Cell 3: overview (shape, dtypes, missing values). Cell 4: univariate analysis (one subsection per column group). Cell 5: bivariate analysis (correlations, grouped comparisons). Cell 6: temporal analysis. Cell 7: data quality issues log. Cell 8: findings summary and recommendations. Cell 9: export clean dataset for modeling. Key principle: every finding should be reproducible by re-running the notebook. No manual data inspection that is not captured in code. Save the EDA notebook alongside the data — it is documentation of the dataset's characteristics at a point in time'"
    weight: 0.30
    description: "Automation"
