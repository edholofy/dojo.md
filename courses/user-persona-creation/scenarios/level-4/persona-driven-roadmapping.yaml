meta:
  id: persona-driven-roadmapping
  level: 4
  course: user-persona-creation
  type: output
  description: "Persona-driven roadmapping — use personas to inform, prioritize, and communicate product roadmap decisions"
  tags: [roadmap, prioritization, product-strategy, planning, expert]

state: {}

trigger: |
  You're the VP of Product preparing the annual product
  roadmap. Your team has proposed 40 features for next
  year. Budget allows for approximately 15. Your 4
  personas are:

  Primary — "Growth Manager Grace" (40% of revenue):
  Manages a growing team, needs scalability, collaboration,
  and reporting features

  Secondary — "Solo Pro Sam" (25% of revenue):
  Individual power user, needs efficiency, customization,
  and advanced workflows

  Secondary — "Enterprise Admin Alex" (20% of revenue):
  IT administrator, needs security, compliance, SSO, and
  bulk management

  Tertiary — "Casual User Casey" (15% of revenue):
  Occasional user, needs simplicity, quick tasks, and
  minimal learning curve

  The 40 proposed features include:
  - 12 features serving Grace (collaboration, reporting)
  - 10 features serving Sam (power-user shortcuts, custom
    workflows)
  - 8 features serving Alex (security, compliance, admin)
  - 6 features serving Casey (simplified UI, quick actions)
  - 4 features serving multiple personas

  Stakeholder pressure:
  - CEO wants enterprise features (Alex) for upmarket push
  - Sales wants Sam's features for competitive demos
  - Support wants Casey's features to reduce tickets
  - The data shows Grace's features have the highest
    projected revenue impact

  Task: Create a persona-driven roadmap prioritization
  framework and apply it to select 15 features from 40.

assertions:
  - type: llm_judge
    criteria: "Response creates a prioritization framework — persona-weighted scoring (assign weights based on strategic importance: Grace 40% weight reflecting revenue contribution, Sam 20%, Alex 25% reflecting CEO's enterprise strategy upweight, Casey 15%; each feature scored on: persona alignment — how directly does this serve the persona's core needs?, projected impact — revenue, retention, or efficiency impact, strategic alignment — does this support the company's direction?, effort — engineering and design cost; combined score = persona weight × impact × strategic alignment / effort), multi-persona features (the 4 features serving multiple personas should score highest: they deliver value across the portfolio with shared investment, prioritize these unless they compromise depth for any specific persona), addressing stakeholder pressure (the CEO's enterprise push justifies upweighting Alex from 20% revenue to 25% strategic weight — but not overriding Grace at 40% revenue, sales wanting Sam's features for demos should be evaluated: do demo features drive revenue or just look impressive?, support wanting Casey's features should quantify: how many tickets would each feature prevent? what's the cost savings?)."
    weight: 0.35
    description: "PrioritizationFramework"
  - type: llm_judge
    criteria: "Response selects and justifies approximately 15 features — selection methodology (apply the scoring framework: rank all 40 features, draw the line at 15, present the rationale for each included and excluded feature; expected distribution: 5-6 Grace features reflecting primary persona status and highest revenue impact, 2-3 Sam features balancing power user needs, 3-4 Alex features reflecting strategic enterprise push, 1-2 Casey features addressing the highest-volume support issues, 3-4 multi-persona features maximizing cross-portfolio value), what gets cut and why (25 features don't make the cut — for each: explain which persona it serves, why it scored lower, and when it might be reconsidered; features cut should be: lower-impact features for high-priority personas — Grace doesn't get all 12, just the highest-impact 5-6; features serving the tertiary persona beyond basics — Casey gets the minimum needed to reduce top support tickets; features that serve competitive positioning but don't improve user experience — demo-friendly features without user value), communication plan (present the roadmap in persona terms: 'This roadmap invests 35% in Grace's growth needs, 20% in Sam's productivity, 25% in Alex's enterprise requirements, and 20% in cross-portfolio improvements' — stakeholders understand who we're serving and why)."
    weight: 0.35
    description: "FeatureSelection"
  - type: llm_judge
    criteria: "Response addresses roadmap communication and evolution — persona-driven roadmap narrative (don't present the roadmap as a feature list — present it as persona stories: 'By Q2, Grace will be able to run her growing team with real-time collaboration and automated reports; by Q3, Alex will have the security and compliance features needed for enterprise deployment; by Q4, Sam will have the power-user workflows that make our product indispensable' — this makes the roadmap meaningful beyond feature names), quarterly re-evaluation (the roadmap shouldn't be fixed for 12 months: quarterly persona data check — has the revenue distribution shifted? have persona needs changed? has the competitive landscape affected which persona to prioritize?; if Grace's segment grows faster than projected — consider adding more Grace features in Q3-Q4; if the enterprise push stalls — reconsider Alex feature investment), managing disappointment (25 features were cut — those feature champions will be disappointed: provide transparency — 'here's how each feature scored and why it didn't make the cut'; provide hope — 'these features are queued for consideration next quarter if resources allow'; provide the persona rationale — 'we can't serve all 4 personas equally with 15 features — here's how we balanced'; establish that persona-driven prioritization is the new standard — decisions are evidence-based not politics-based)."
    weight: 0.30
    description: "CommunicationAndEvolution"
