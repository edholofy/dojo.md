meta:
  id: persona-competitive-intelligence
  level: 4
  course: user-persona-creation
  type: output
  description: "Persona competitive intelligence — analyze competitor personas and use persona strategy as competitive differentiation"
  tags: [competitive, intelligence, differentiation, strategy, expert]

state: {}

trigger: |
  Your competitive intelligence team has analyzed 3 key
  competitors and their apparent persona strategies:

  Competitor A (market leader, 40% share):
  - Targets enterprise exclusively — their product is
    built for 1000+ employee companies
  - Pricing: $50/user/month minimum
  - Their personas appear to be: IT admin, department
    head, C-suite executive
  - Weakness: completely ignores SMB and mid-market

  Competitor B (fast-growing challenger, 25% share):
  - Targets "everyone" — free tier to enterprise
  - No clear persona focus — features scattered across
    segments
  - Pricing: freemium to $30/user/month
  - Their product is wide but shallow — many features,
    none deeply serving specific users
  - Weakness: no segment loyalty, users churn to
    specialists

  Competitor C (niche player, 10% share):
  - Targets a single persona: the "power individual user"
  - Product is beautifully designed for solo productivity
  - Pricing: $15/month individual
  - Weakness: can't serve teams, collaboration features
    are afterthoughts

  Your company: 25% share, mid-market focus (100-500
  employees), 3 personas (team lead, department manager,
  admin).

  Task: Use persona competitive analysis to identify
  strategic positioning opportunities.

assertions:
  - type: llm_judge
    criteria: "Response provides persona-driven competitive analysis — competitor persona mapping (for each competitor, identify: who they serve well — their effective persona focus; who they underserve — persona gaps that create opportunity; where your personas overlap with theirs — direct competition zones; where your personas fill gaps they leave — differentiation opportunities), strategic gaps identified (Competitor A leaves SMB and mid-market completely open — this is your territory, strengthen it; Competitor B's 'everyone' approach means no deep persona satisfaction — users in your target segments get a shallow experience from B and will switch for depth; Competitor C's individual focus means teams can't grow into their product — team-oriented personas are your advantage; the mid-market 100-500 employee segment is uniquely yours — Competitor A is too heavy, B is too shallow, C is too individual), persona-based competitive positioning (your advantage: deep understanding of mid-market team dynamics — team lead who needs collaboration, department manager who needs visibility, admin who needs control, competitors either over-engineer for enterprise or under-invest for everyone, your persona-informed product should feel 'made for us' to mid-market teams in a way no competitor achieves)."
    weight: 0.35
    description: "CompetitiveAnalysis"
  - type: llm_judge
    criteria: "Response identifies strategic persona opportunities — defensive moves (protect your mid-market position: deepen persona research in the 100-500 employee segment, build features that specifically serve team lead + department manager + admin workflows that competitors can't match, make switching cost high by deeply integrating into mid-market team workflows), offensive moves (attack competitors' weak points: Competitor A's SMB gap — attract their smaller customers who are over-served and overcharged, offer a migration path for companies who 'grow out of' Competitor C's individual product — their users become your team lead persona, compete with Competitor B on depth — when B's users get frustrated with shallow features, be the deep alternative for their mid-market segment), persona expansion evaluation (should you create new personas to capture competitor gaps?: potential 'solo professional' persona to compete with Competitor C for individual users who might bring teams later; potential 'enterprise buyer' persona to move upmarket where Competitor A dominates — but this is risky and expensive; evaluate each expansion by: market size, competitive defensibility, product architecture requirements, and alignment with core competency)."
    weight: 0.35
    description: "StrategicOpportunities"
  - type: llm_judge
    criteria: "Response provides actionable competitive persona strategy — competitive persona monitoring (track competitors' persona evolution: are they moving toward your market? is Competitor A launching a mid-market tier? is Competitor C adding team features? competitor persona signals: new feature launches indicate persona investment, pricing changes indicate market segment targeting, marketing messaging changes indicate persona repositioning), competitive win/loss analysis by persona (when you win deals: which competitor did you beat? which persona did the buyer match? what did they cite as the reason for choosing you?; when you lose: which competitor won? which persona was the buyer? what did they cite as the reason? — this data reveals where your persona strategy is working and where it needs improvement), strategic planning (annual competitive persona review: map the competitive landscape by persona segment, identify where competition is intensifying and where gaps are opening, adjust persona investment accordingly: if Competitor A starts targeting mid-market, invest more in deepening your mid-market persona understanding; if Competitor C adds collaboration, consider whether your team-focused positioning is still differentiated)."
    weight: 0.30
    description: "ActionableStrategy"
