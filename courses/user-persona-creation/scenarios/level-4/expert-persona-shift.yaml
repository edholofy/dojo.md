meta:
  id: expert-persona-shift
  level: 4
  course: user-persona-creation
  type: output
  description: "Expert persona shift — handle multiple expert-level organizational persona challenges in a single session"
  tags: [shift, combined, assessment, expert]

state: {}

trigger: |
  You're the Chief Design Officer handling three persona
  challenges simultaneously:

  TASK 1 — The board asks: "Our competitor just published
  a case study showing their persona-driven redesign
  increased revenue by $12M. We spend $500K on personas.
  Where's our $12M?" Prepare a board-level response.

  TASK 2 — Your company is launching in 3 new markets
  (India, Southeast Asia, Middle East) simultaneously.
  Your current personas are US/Europe-centric. You have
  $200K budget and 4 months to create culturally-informed
  personas for all 3 markets. Design the research plan.

  TASK 3 — An AI vendor pitches: "Our tool can generate
  data-driven personas automatically from your customer
  data in 48 hours. No more expensive research projects."
  The VP of Product is excited. The UX Research Director
  is skeptical. Evaluate the proposal.

  Task: Handle all three expert persona challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — board revenue question — honest assessment (don't fabricate a $12M number — present what you can defensibly attribute: quantify persona-driven improvements in adoption, retention, design efficiency, and sales effectiveness using your actual metrics, if you can show $2M in measurable impact from $500K investment, that's a 4x ROI — comparable to the competitor's case study), competitive context (the competitor's $12M claim needs scrutiny: was it a major redesign where personas were one factor among many? did they control for other variables? published case studies often overstate persona contribution — your board should compare methodologies not just headlines), investment case (frame the $500K as: cost of understanding your customers vs cost of guessing — what's the cost of building the wrong features? of targeting the wrong market? of losing customers because the product doesn't serve their needs? persona investment is insurance against expensive product mistakes — the ROI is partially in value delivered and partially in mistakes avoided)."
    weight: 0.35
    description: "BoardResponse"
  - type: llm_judge
    criteria: "Response handles Task 2 — multi-market persona research — budget allocation ($200K across 3 markets: approximately $55-65K per market plus $15-20K for coordination and synthesis; per market: local research partner engagement $20K, 10-15 user interviews at $1-2K each, quantitative survey of 200+ respondents $10K, analysis and persona development $10K, local validation workshops $5K), research approach (don't send US researchers to interview Indian users about their cultural context: hire local research partners in each market who understand cultural nuances, language, and business practices; parallel execution across all 3 markets to meet the 4-month timeline; month 1: partner selection and research design, month 2: fieldwork — interviews and surveys, month 3: analysis and persona development, month 4: validation and socialization), cultural methodology (each market needs culturally-appropriate research methods: India — consider regional diversity, urban vs rural, language variety, hierarchical business culture; Southeast Asia — diverse region, consider which specific countries, collectivist decision-making, relationship-driven business; Middle East — consider GCC vs Levant differences, formal business etiquette, Arabic and English language dynamics)."
    weight: 0.35
    description: "MultiMarketResearch"
  - type: llm_judge
    criteria: "Response handles Task 3 — AI persona vendor evaluation — what AI can do (legitimate capabilities: cluster behavioral data to identify segments, analyze support tickets and feedback for common themes, generate initial persona drafts from quantitative patterns, accelerate the data analysis phase of persona development — this has real value and can reduce costs and timeline), what AI can't do (critical limitations: AI can't conduct empathetic user interviews that reveal motivations and emotions, AI can't interpret cultural context or nuanced social dynamics, AI can't validate whether behavioral clusters represent meaningful persona distinctions, AI-generated personas risk reinforcing existing data biases — if your data skews toward certain demographics, AI personas will too, AI can't generate insights about users you don't have data on — new markets, underserved segments), recommendation (don't reject OR fully adopt: propose a hybrid approach: use AI for the data analysis and initial segmentation — this genuinely accelerates the process, then validate and enrich AI-generated personas with targeted qualitative research — interviews, contextual inquiry, estimate: AI handles 40% of the persona development effort, saving time and money, human researchers handle the 60% that requires judgment, empathy, and cultural understanding, position to the VP of Product: 'we can use AI to make our persona process faster and cheaper, but not to replace the human understanding that makes personas actionable')."
    weight: 0.30
    description: "AIVendorEvaluation"
