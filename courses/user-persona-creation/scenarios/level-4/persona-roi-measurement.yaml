meta:
  id: persona-roi-measurement
  level: 4
  course: user-persona-creation
  type: output
  description: "Persona ROI measurement — quantify the business impact and return on investment of persona programs"
  tags: [roi, measurement, business-impact, value, expert]

state: {}

trigger: |
  The CFO questions your persona program budget: "You
  spent $350K last year on persona research, development,
  and maintenance. Can you show me the ROI? What's the
  measurable business impact?"

  Available data:
  - Persona-aligned features (designed with persona input):
    32% higher adoption rate than non-persona-aligned
  - Customer satisfaction (CSAT) for persona-informed
    products: 4.2/5 vs 3.4/5 for products without personas
  - Redesigns with persona input: 40% fewer post-launch
    revisions
  - Sales team using persona playbooks: 28% higher close
    rate
  - Time-to-design-decision: decreased 35% with persona
    clarity
  - Customer support tickets decreased 22% for persona-
    informed features
  - Research duplication eliminated: saved ~$80K in
    redundant studies

  Task: Build a comprehensive ROI case for the persona
  program.

assertions:
  - type: llm_judge
    criteria: "Response builds a financial ROI framework — cost side ($350K investment includes: research salaries and recruiting costs, tools and infrastructure, persona development and socialization time, ongoing maintenance and updates — present this as the total investment), return side (quantify each data point in financial terms: 32% higher adoption — estimate revenue impact of faster adoption on ARR growth, multiply by average revenue per feature; 40% fewer post-launch revisions — estimate engineering cost of revisions at average developer hourly rate × hours per revision cycle × number of revisions avoided; 28% higher close rate — multiply by average deal size and number of opportunities to calculate incremental revenue; $80K research savings — direct cost avoidance; 22% fewer support tickets — calculate cost per ticket × tickets avoided for direct savings; 35% faster design decisions — estimate designer/PM time saved at their hourly rates), ROI calculation (present as: total quantified returns / $350K investment = X:1 ROI, also show: payback period — when did cumulative returns exceed the $350K investment?)."
    weight: 0.35
    description: "FinancialROI"
  - type: llm_judge
    criteria: "Response addresses attribution challenges honestly — attribution complexity (not all improvements can be directly attributed to personas: higher adoption could also reflect better marketing or market timing, higher close rates could also reflect improved sales training, fewer revisions could also reflect improved engineering processes — acknowledge this honestly with the CFO), attribution methodology (propose: controlled comparison — persona-informed features vs non-persona-informed features from the same period, controlling for other variables; A/B attribution — when possible, track identical feature launches with and without persona input; contribution analysis — estimate persona's contribution as a percentage of total improvement rather than claiming 100% attribution; be conservative in claims — the CFO will trust conservative, defensible numbers more than inflated ones), qualitative value (some persona benefits are hard to quantify but real: faster team alignment reduces meetings and debate, shared language across departments reduces miscommunication, designer confidence in decisions reduces second-guessing and iteration — acknowledge these but don't try to assign fake dollar values to them)."
    weight: 0.35
    description: "AttributionChallenges"
  - type: llm_judge
    criteria: "Response provides ongoing measurement framework — metrics dashboard (create a persona ROI dashboard tracking: feature adoption rates segmented by persona alignment, design revision rates for persona-informed vs non-informed, sales close rates using persona playbooks vs not, support ticket volume trends for persona-informed features, research efficiency — cost per insight, redundancy rate — present quarterly to finance), benchmarking (compare persona program ROI to industry benchmarks: Forrester estimates persona-driven redesigns return up to 4x, 70% of companies using advanced personalization achieve 200% ROI — position your program relative to these benchmarks), investment optimization (use the data to optimize the $350K investment: if research is the highest-ROI component, invest more there, if socialization and training drive adoption rates, prioritize those, if maintenance prevents persona decay — which would erode all other returns — ensure adequate ongoing investment, present to the CFO: 'based on this data, increasing investment to $450K in year 2 would yield proportionally higher returns in these specific areas'), continuous tracking (don't make this a one-time presentation — build ROI tracking into the persona program: every major feature launch records whether persona input was used, creating a growing dataset for ROI analysis)."
    weight: 0.30
    description: "OngoingMeasurement"
