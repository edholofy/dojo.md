meta:
  id: persona-ecosystem-architecture
  level: 4
  course: user-persona-creation
  type: output
  description: "Persona ecosystem architecture — design the technical and organizational infrastructure for a scalable persona system"
  tags: [ecosystem, architecture, infrastructure, systems, expert]

state: {}

trigger: |
  Your company (500 employees, 60 designers, 8 product
  teams) has outgrown its persona management approach:
  personas live in scattered Figma files, Notion pages,
  and slide decks. Nobody can find the current version.

  The Head of Design Ops says: "We need a persona
  ecosystem — not just documents, but a system that
  connects personas to our tools, processes, and data."

  Current pain points:
  - 8 teams reference different versions of the same
    personas
  - No connection between persona definitions and customer
    data in the CRM
  - Analytics dashboards don't segment by persona
  - Marketing automation uses different segments than
    product personas
  - When personas update, nobody knows except the team
    that updated them
  - New hires take 3 weeks to learn the persona set

  Task: Design a persona ecosystem architecture that
  connects personas to organizational tools and processes.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-layer persona architecture — data layer (customer data platform connecting: CRM records tagged by persona segment, product analytics segmented by persona behavioral patterns, support tickets categorized by persona, marketing automation audiences mapped to personas — this layer ensures personas are connected to real customer data, not floating in abstraction), persona layer (central persona repository: single source of truth accessible to all 8 teams, version-controlled with change history, rich persona profiles: demographics, behaviors, goals, frustrations, scenarios, design implications, research evidence, each persona linked to its corresponding data layer segment — clicking on a persona shows live metrics for that segment), application layer (personas consumed by: design tools — Figma libraries with persona reference components, development tools — user stories templated with persona context, marketing tools — campaign targeting aligned with persona segments, sales tools — persona-specific playbooks and talking points, support tools — ticket routing and response templates by persona), notification layer (when a persona updates: automated notification to all 8 teams, changelog showing what changed and why, impact assessment — which products/campaigns/playbooks are affected)."
    weight: 0.35
    description: "EcosystemArchitecture"
  - type: llm_judge
    criteria: "Response addresses specific integration points — CRM integration (map each CRM account/contact to a persona segment: when customer success reviews an account, they see which persona the primary contact matches, when sales prospects a new lead, CRM suggests which persona they align with — this enriches customer interactions with persona context), analytics integration (product analytics dashboards segmented by persona: feature adoption by persona, engagement metrics by persona, churn risk by persona — this makes personas actionable for product decisions, not just design artifacts, when analytics shows a persona segment's behavior changing, it triggers a persona review), marketing alignment (marketing automation audiences should map to product personas: 'nurture campaign for Enterprise Emma' should target the same segment that product defines as 'Enterprise Emma', currently marketing uses different segments — this creates disjointed customer experiences where marketing promises don't match product reality), onboarding integration (new hire persona orientation: instead of 3 weeks of discovery, new hires access the persona system on day 1 with: interactive persona profiles, video introductions to each persona, links to recent design decisions referencing each persona, persona quiz to verify understanding — target: persona familiarity within 3 days not 3 weeks)."
    weight: 0.35
    description: "IntegrationPoints"
  - type: llm_judge
    criteria: "Response provides implementation roadmap — phased build (Phase 1 month 1-2: consolidate — audit all persona versions, create canonical set, establish single source of truth in Notion or Confluence; Phase 2 month 3-4: connect data — map CRM contacts to persona segments, set up analytics segmentation by persona; Phase 3 month 5-6: integrate tools — Figma persona components, user story templates, marketing audience alignment; Phase 4 month 7-8: automate — notification system for persona changes, automated dashboards, new hire onboarding flow; Phase 5 ongoing: evolve — continuous data feedback loop, quarterly persona health reviews), technology choices (don't over-engineer: the persona system should use tools the team already knows — Notion for documentation, analytics tools for dashboards, CRM for customer mapping, avoid building a custom persona management platform unless scale demands it, the ecosystem is about connecting existing tools not replacing them), success metrics (time to find current persona version: from hours to seconds; cross-team persona consistency: all 8 teams reference the same version; persona-to-data connection: 100% of personas linked to analytics segments; new hire ramp time: from 3 weeks to 3 days; persona update propagation: from weeks to hours)."
    weight: 0.30
    description: "ImplementationRoadmap"
