meta:
  id: persona-change-management
  level: 4
  course: user-persona-creation
  type: output
  description: "Persona change management — manage organizational transitions when personas change, merge, split, or are retired"
  tags: [change-management, transition, communication, adoption, expert]

state: {}

trigger: |
  Major persona changes are needed based on new research:

  Change 1: Your primary persona "Small Business Sara"
  is being split into two: "Solo Entrepreneur Elena"
  (1-person businesses) and "Growing Team Tanya" (5-20
  person businesses). Research shows their needs have
  diverged significantly.

  Change 2: Your secondary persona "Developer Dave" is
  being retired — the developer API segment represents
  only 3% of revenue and shrinking.

  Change 3: A new persona "Remote-First Rachel" is being
  added — research shows a growing segment of distributed
  teams with unique needs around async collaboration.

  Impact:
  - 50 designers reference "Small Business Sara" in daily
    work
  - Engineering has 200+ user stories referencing "Sara"
  - Marketing's entire content strategy targets "Sara"
  - Sales playbook is built around "Sara" and "Dave"
  - 3 features in development are designed for "Dave"

  Task: Create a comprehensive change management plan for
  all 3 persona changes.

assertions:
  - type: llm_judge
    criteria: "Response manages the Sara split — communication plan (announce the split with rationale: 'Our research shows that solo entrepreneurs and 5-20 person teams have diverged in their needs — Sara represented both, but designing for both simultaneously has led to compromise experiences that serve neither well', show the data that supports the split), migration plan (phase 1: create Elena and Tanya persona documents, mapping which of Sara's attributes go to each; phase 2: audit all references to 'Sara' across design files, user stories, marketing content, and sales playbooks — this is the largest effort given 200+ user stories; phase 3: update each reference to either Elena or Tanya based on the context; phase 4: retire Sara's persona document with a redirect to Elena and Tanya), minimize disruption (the 50 designers who reference Sara daily need a quick reference showing: 'if you're designing for solo users, use Elena; if you're designing for small teams, use Tanya' — a simple decision tree helps the transition, give teams 4 weeks to migrate — don't expect instant adoption, during transition allow references to 'Sara (now Elena/Tanya)' as a bridge)."
    weight: 0.35
    description: "SaraSplitManagement"
  - type: llm_judge
    criteria: "Response manages Dave retirement and Rachel addition — Dave retirement (the 3 features currently in development for Dave need immediate assessment: can they be reframed to serve another persona? should they be descoped or cancelled? the sunk cost fallacy applies — if the features only serve 3% of revenue and that segment is shrinking, continuing may not be justified; sales playbook update — remove Dave-specific talking points, redirect API-interested prospects to documentation or self-serve; communicate sensitively — the engineers who built Dave's features shouldn't feel their work was wasted, reframe: 'the market has shifted, and our resources will now serve growing segments'), Rachel addition (introduce Rachel with clear context: 'Remote-first distributed teams are a growing segment with unique needs around async collaboration, timezone-aware workflows, and digital-first communication', socialization plan: workshop for all 50 designers introducing Rachel with scenarios and design implications, engineering briefing on how Rachel's needs differ from existing personas — async collaboration features, timezone-aware scheduling, offline-first capabilities, marketing brief on how to reach and speak to remote-first teams, sales playbook addition: how to identify Rachel prospects and position the product for distributed teams)."
    weight: 0.35
    description: "RetirementAndAddition"
  - type: llm_judge
    criteria: "Response provides change management framework — communication cadence (pre-change: announce changes 2 weeks before implementation with rationale and timeline, provide Q&A sessions for teams with questions; during change: weekly update emails tracking migration progress, designated 'persona change champions' per team who field day-to-day questions; post-change: 30-day check-in — are teams using the new personas? are there confusion points?), resistance management (anticipate resistance: 'Sara was fine — why change?' — answer with data showing the divergence, 'Dave's features are important' — acknowledge the work while showing the business case for retirement, 'another persona to learn?' — show how Rachel fills a gap that was causing design compromises for distributed teams), template for future changes (this won't be the last persona change — create a reusable framework: persona change proposal document: what's changing, why, evidence, impact assessment; communication template: pre-change announcement, migration guide, FAQ; migration checklist: all systems that reference personas and need updating; timeline template: research → announcement → migration → verification → completion; this framework makes future persona changes less disruptive because the process is known)."
    weight: 0.30
    description: "ChangeManagementFramework"
