meta:
  id: portfolio-persona-management
  level: 4
  course: user-persona-creation
  type: output
  description: "Portfolio persona management — manage personas across a multi-product portfolio ensuring consistency and strategic alignment"
  tags: [portfolio, multi-product, consistency, cross-product, expert]

state: {}

trigger: |
  Your company has 4 products in its portfolio:

  Product A — CRM (flagship, 60% of revenue)
  Product B — Marketing automation (30% of revenue)
  Product C — Customer support platform (8% of revenue)
  Product D — Analytics dashboard (2%, newly launched)

  Each product team has its own personas:
  - Product A: 4 personas (sales rep, sales manager,
    admin, executive)
  - Product B: 3 personas (marketing manager, content
    creator, CMO)
  - Product C: 3 personas (support agent, support manager,
    customer)
  - Product D: 2 personas (data analyst, executive)

  Problem: A customer who uses Products A, B, and C
  encounters 3 different experiences because each product
  was designed for different personas — even though the
  same person (a mid-market VP of Operations) uses all 3.

  Task: Create a portfolio-level persona framework that
  ensures consistent experience across products.

assertions:
  - type: llm_judge
    criteria: "Response designs a portfolio persona framework — master persona layer (identify the cross-product personas: users who interact with multiple products should have a single persona that spans the portfolio, example: 'Operations VP' who uses CRM for pipeline visibility, marketing automation for campaign oversight, and support platform for escalation monitoring — this person is currently split across 3 product-specific personas with inconsistent attributes, create 5-7 master personas representing distinct cross-product user types), product-specific view layer (each master persona has product-specific attributes: for the 'Operations VP' — CRM view: focuses on pipeline and forecasting, Marketing view: focuses on campaign performance, Support view: focuses on escalation patterns and CSAT, these views customize the persona for each product context while maintaining consistency in core attributes like goals, frustrations, and behavior patterns), current persona mapping (map all 12 existing product-specific personas to master personas: some will merge — Product A's 'executive' and Product D's 'executive' are likely the same person, some will remain product-specific — Product C's 'customer' persona doesn't map to other products, some will reveal gaps — cross-product users may not be well-represented by any current persona)."
    weight: 0.35
    description: "PortfolioFramework"
  - type: llm_judge
    criteria: "Response addresses cross-product experience consistency — experience inconsistency diagnosis (the VP who encounters 3 different experiences is facing: inconsistent terminology — same data called different things across products, inconsistent interaction patterns — navigation and workflows differ unnecessarily, inconsistent design language — each product evolved independently, inconsistent mental model — the user must learn 3 different systems instead of one coherent platform), consistency principles (portfolio personas enforce: shared vocabulary — cross-product personas use the same terminology, shared interaction patterns — similar actions work the same way across products, shared design system — visual consistency backed by persona-driven component standards, shared information architecture — the same user shouldn't need to learn a new mental model per product), implementation (start with the highest-traffic cross-product journey: map how the VP moves between products during their workflow, identify every inconsistency in that journey, prioritize fixes by user impact — terminology inconsistencies are quick fixes, interaction pattern alignment requires deeper work)."
    weight: 0.35
    description: "CrossProductConsistency"
  - type: llm_judge
    criteria: "Response provides governance for portfolio personas — ownership model (portfolio persona owner — likely VP of Design or Head of Design Ops, responsible for master persona consistency; product persona stewards — one per product, responsible for product-specific persona layers; cross-product persona council — quarterly meeting of all stewards to review consistency and resolve conflicts), update coordination (when a master persona attribute changes: all 4 product teams are notified, each team reviews impact on their product-specific layer, changes cascade through design systems, marketing, and sales materials — coordinated, not independent), conflict resolution (when product teams disagree about a persona attribute: gather cross-product data — how does this user actually behave across products?, prioritize by revenue impact — Product A at 60% gets more weight, test with users — does the user experience the inconsistency? is it a problem?), portfolio evolution (as new products launch, they inherit the master persona framework — Product D should have started with master personas not created new ones, when products are deprecated, their persona-specific layers are retired but master personas persist, annual portfolio persona review: are the master personas still accurate as the portfolio evolves?)."
    weight: 0.30
    description: "PortfolioGovernance"
