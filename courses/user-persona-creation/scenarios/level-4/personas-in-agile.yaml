meta:
  id: personas-in-agile
  level: 4
  course: user-persona-creation
  type: output
  description: "Personas in agile — integrate persona practices effectively into agile and lean product development environments"
  tags: [agile, lean, sprints, integration, expert]

state: {}

trigger: |
  Your engineering VP pushes back on personas: "We're an
  agile shop. We ship every 2 weeks. Personas are a
  waterfall artifact — they take months to create and
  they're already outdated by the time we finish them.
  We need to move fast, not create documents."

  Current reality:
  - 6 scrum teams shipping biweekly
  - User stories written as: "As a user, I want to..."
    (no persona specificity)
  - Sprint planning: 60-min meetings that focus on
    estimates and capacity, not user needs
  - Retrospectives: focus on velocity, not user impact
  - Design reviews: developers review design specs but
    don't reference who the design is for
  - PM backlog: prioritized by stakeholder requests,
    not persona needs

  Task: Design an agile-integrated persona practice that
  addresses the VP's concerns while improving user-
  centricity in the agile process.

assertions:
  - type: llm_judge
    criteria: "Response addresses the VP's concerns directly — speed concern (personas don't have to take months: lean personas can be created in 1-2 weeks with focused research, 'good enough' personas improved iteratively are better than no personas at all, the current approach — shipping features without understanding users — is actually SLOWER because it results in rework when features miss user needs), waterfall accusation (personas aren't waterfall — they're living documents that evolve with agile sprints: every sprint retrospective includes 'did we learn something new about our personas?', every user test reveals persona insights that are incorporated immediately, personas are updated in the same 2-week cadence as the product — they're agile artifacts maintained alongside code), outdated concern (personas become outdated when they're created once and never updated — that's a process failure not a persona failure, in an agile environment, personas are continuously refined: sprint-level feedback updates behavioral assumptions, monthly analytics checks validate quantitative attributes, quarterly research validates qualitative depth — this is the agile approach to personas)."
    weight: 0.35
    description: "VPConcerns"
  - type: llm_judge
    criteria: "Response integrates personas into agile ceremonies — sprint planning (replace 'As a user' with 'As [persona name]': this single change forces the team to think about who they're building for, example: 'As Maria the marketing manager who spends 2 hours/day in the tool, I want faster report generation so I can spend less time pulling data and more time analyzing it' — the persona context changes what 'faster' means and how to test it), design reviews (every design review starts with: 'Who is this for?' — the designer names the persona, explains the design decision in terms of that persona's goals and constraints, developers can ask: 'would [persona name] actually use this?' — this surfaces usability issues before they're built), retrospectives (add persona-centric reflection: 'Did this sprint move the needle for our primary persona? Did we learn anything that changes our understanding of our users? Were there surprises in user testing that suggest our persona is incomplete?' — this keeps user-centricity in the team's regular reflection), backlog prioritization (shift from stakeholder-driven to persona-driven: 'which backlog items serve our primary persona's most critical needs?' — stakeholder requests are evaluated through the persona lens: 'the VP wants this feature, but does our primary persona need it?')."
    weight: 0.35
    description: "AgileCeremonyIntegration"
  - type: llm_judge
    criteria: "Response provides practical agile persona tools — lean persona format (keep personas sprint-compatible: name and photo, 3 key goals, top frustration, representative quote, core behavior pattern — fits on one index card or one Slack message, this card sits on every developer's desk or is pinned in every team's Slack channel — constant visibility is the goal), persona sprint board integration (add persona labels to sprint board cards: each ticket tagged with the persona it serves, sprint metrics include: what percentage of tickets served each persona?, teams can see at a glance if they're over-indexing on one persona and neglecting others), feedback loop (every user test, support ticket, and customer conversation is a persona data point: create a lightweight capture mechanism — a Slack channel where anyone posts persona-relevant observations, monthly: research synthesizes observations into persona updates, this makes persona evolution a natural byproduct of agile work, not a separate research project), measuring success (track: user story specificity — are stories written for specific personas or generic 'users'?, design review quality — are persona needs referenced in discussions?, feature adoption by persona segment — are persona-aligned features performing better?, sprint retrospective quality — are user insights part of the reflection?)."
    weight: 0.30
    description: "PracticalAgileTools"
