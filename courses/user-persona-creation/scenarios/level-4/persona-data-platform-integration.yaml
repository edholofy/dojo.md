meta:
  id: persona-data-platform-integration
  level: 4
  course: user-persona-creation
  type: output
  description: "Persona data platform integration — connect personas to customer data platforms, analytics, and business intelligence systems"
  tags: [data-platform, cdp, analytics, integration, expert]

state: {}

trigger: |
  Your company just implemented a Customer Data Platform
  (CDP) that unifies data from:
  - Product analytics (Amplitude): usage patterns
  - CRM (Salesforce): account data, deal stages
  - Support (Zendesk): ticket history, satisfaction
  - Marketing (HubSpot): campaign engagement
  - Billing (Stripe): subscription and revenue data

  The CDP can segment users by any combination of
  attributes and behaviors. The Head of Data asks:
  "Can we connect your personas to the CDP so we can
  measure persona-level metrics in real time?"

  Current personas (3):
  - "Growth-Stage Gina": 50-200 employee companies,
    rapid scaling, needs flexibility and integrations
  - "Enterprise Eric": 500+ employees, needs compliance,
    security, and admin controls
  - "Startup Sam": <50 employees, price-sensitive,
    needs quick setup and simplicity

  Task: Design the persona-to-CDP integration strategy
  including segment definitions, metrics, and governance.

assertions:
  - type: llm_judge
    criteria: "Response designs persona-to-CDP segment mapping — segment definition rules (each persona must translate into specific, measurable CDP segment criteria: Startup Sam: company size <50 employees AND account age <2 years AND plan tier = starter or free AND monthly active users <10; Growth-Stage Gina: company size 50-200 employees AND plan tier = professional AND integration count >3 AND user growth rate >10% monthly; Enterprise Eric: company size >500 employees AND plan tier = enterprise AND SSO enabled AND compliance features activated; each segment rule should be: mutually exclusive — every account maps to exactly one persona, exhaustive — every account maps to at least one persona, verifiable — criteria can be checked programmatically in the CDP), edge case handling (accounts that fall between personas: a 250-employee company growing fast — Growth-Stage or Enterprise? define clear thresholds with borderline rules, accounts that don't match any persona — 'unclassified' segment that triggers investigation: are these users a new persona or data quality issues?)."
    weight: 0.35
    description: "SegmentMapping"
  - type: llm_judge
    criteria: "Response defines persona-level metrics — per-persona dashboard (for each persona, track: acquisition: how many new accounts match this persona each month? cost of acquisition by persona; activation: time-to-value by persona — how quickly does each persona reach their 'aha moment'?; engagement: daily/weekly active users, feature adoption depth, session duration by persona; retention: churn rate by persona, expansion revenue by persona; satisfaction: NPS/CSAT by persona, support ticket volume and resolution time by persona; revenue: ARR by persona, lifetime value by persona, revenue growth rate by persona), cross-persona insights (which persona has highest LTV? which has highest churn? which is growing fastest? which generates the most support tickets? — these insights directly inform product strategy: invest in the highest-LTV persona, fix churn for the most at-risk persona, grow the fastest-growing segment), anomaly detection (set alerts for persona-level metric shifts: if Enterprise Eric churn spikes above threshold — investigate immediately, if Startup Sam activation rate drops — investigate onboarding changes, these alerts make personas actionable in real time not just quarterly reviews)."
    weight: 0.35
    description: "PersonaMetrics"
  - type: llm_judge
    criteria: "Response addresses governance and evolution — data quality governance (persona segments are only as good as the underlying data: ensure company size data in CRM is accurate and current, validate segment membership periodically — sample 50 accounts per persona quarterly and verify manually, handle data conflicts: what if CRM says 200 employees but product shows 500 active users? — establish data hierarchy), persona-CDP feedback loop (the CDP can inform persona evolution: if the Startup Sam segment shows bimodal behavior — half are truly price-sensitive, half are well-funded startups that just happen to be small — the data may reveal a persona should be split, if the Growth-Stage Gina segment's behavioral patterns change significantly over 6 months — the persona needs updating, the CDP enables data-driven persona evolution instead of gut-driven), organizational adoption (make persona dashboards accessible to all teams: product sees engagement and retention by persona, sales sees pipeline and close rates by persona, marketing sees campaign performance by persona, support sees ticket patterns by persona, executive team sees a unified persona-level business health dashboard, this makes personas the shared language of the organization — every department sees the same customers through the same lens)."
    weight: 0.30
    description: "GovernanceAndEvolution"
