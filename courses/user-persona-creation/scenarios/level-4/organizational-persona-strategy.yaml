meta:
  id: organizational-persona-strategy
  level: 4
  course: user-persona-creation
  type: output
  description: "Organizational persona strategy — align persona programs with business strategy, product roadmap, and organizational goals"
  tags: [strategy, organizational, alignment, roadmap, expert]

state: {}

trigger: |
  You're the VP of Design at a $100M B2B SaaS company.
  The CEO says: "We're shifting strategy from serving SMBs
  to targeting mid-market and enterprise. Our current
  personas are all SMB-focused. How do we transition?"

  Current state:
  - 3 SMB personas used for 4 years — deeply embedded in
    product decisions, marketing, and sales playbooks
  - SMB revenue: $80M (80% of total)
  - Mid-market revenue: $15M (15%, growing 40% YoY)
  - Enterprise revenue: $5M (5%, growing 100% YoY)
  - Product designed for SMB workflows — lacks enterprise
    features like SSO, audit logs, advanced permissions
  - 200 employees trained on SMB personas

  Task: Create a persona transition strategy that supports
  the business strategy shift from SMB to mid-market and
  enterprise.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased persona transition — phase 1 research months 1-3 (don't create new personas from assumptions — the company has limited enterprise experience: conduct 15-20 interviews with mid-market and enterprise prospects and customers, analyze the $5M enterprise and $15M mid-market accounts for behavioral patterns, identify the key differences between SMB and enterprise buyers and users: buying process, user roles, feature requirements, success criteria, compliance needs), phase 2 persona development months 3-5 (create new mid-market and enterprise personas based on research: enterprise buyer persona — VP/Director who evaluates and purchases, different buying process than SMB self-serve; enterprise admin persona — IT administrator who deploys and manages, doesn't exist in SMB; enterprise end user persona — may use the product differently than SMB users due to different workflows and compliance requirements; keep the SMB personas but re-designate their priority), phase 3 organizational transition months 5-12 (this is the hardest part: 200 employees trained on SMB personas need to learn new personas, product roadmap needs to shift to enterprise feature requirements, sales and marketing need new playbooks for longer enterprise sales cycles, the transition must be gradual — SMB still represents 80% of revenue and can't be abandoned)."
    weight: 0.35
    description: "PhasedTransition"
  - type: llm_judge
    criteria: "Response addresses strategic persona prioritization — the prioritization dilemma (SMB personas represent 80% of current revenue — deprioritizing them is risky, enterprise personas represent the growth strategy — under-investing in them compromises the future, the answer is: transition from SMB-primary to dual-track: maintain SMB personas as the current revenue foundation while elevating enterprise personas as the strategic growth priority), dual-track strategy (year 1: SMB = primary persona for product maintenance and optimization, enterprise = primary persona for new feature development and roadmap; year 2: evaluate — if enterprise revenue grows as projected, shift enterprise to overall primary; year 3: reassess SMB persona priority based on revenue mix), product implications (enterprise features like SSO, audit logs, and advanced permissions aren't just features — they reflect a different persona's security and compliance requirements, the product architecture may need to support both persona sets simultaneously: SMB users need simplicity, enterprise users need configurability — this is a fundamental design challenge), risk management (don't alienate SMB customers while pursuing enterprise — they're still 80% of revenue, don't create enterprise personas based on what you wish enterprise customers wanted — research actual needs, the biggest risk: building enterprise features that SMB customers find confusing and enterprise customers find insufficient because the team didn't truly understand the enterprise persona)."
    weight: 0.35
    description: "StrategicPrioritization"
  - type: llm_judge
    criteria: "Response addresses organizational change management — training and adoption (200 employees need to learn new personas: design team needs workshops on enterprise user workflows and design patterns, engineering needs to understand enterprise architecture requirements like multi-tenancy and compliance, sales needs new playbooks for enterprise sales cycles — 6-month cycles vs SMB's self-serve, marketing needs new messaging aligned with enterprise persona language and concerns), cultural shift (moving from SMB to enterprise changes organizational identity: SMB mindset — ship fast, iterate, self-serve onboarding; enterprise mindset — ship reliably, plan thoroughly, white-glove onboarding; both mindsets are valid but they serve different personas — the organization needs to hold both), measurement (track the transition: percentage of new features serving enterprise personas, enterprise persona adoption rate across teams, enterprise revenue growth correlated with persona-informed product decisions, SMB customer satisfaction maintained during transition — if SMB NPS drops, the transition is too aggressive)."
    weight: 0.30
    description: "ChangeManagement"
