meta:
  id: international-cultural-personas
  level: 3
  course: user-persona-creation
  type: output
  description: "International cultural personas — create personas that account for cultural differences across global markets"
  tags: [international, cultural, global, localization, advanced]

state: {}

trigger: |
  Your SaaS product is expanding from the US market to
  Japan, Germany, and Brazil. The VP of International says:
  "Our US personas won't work in these markets. Cultural
  differences affect everything from how users evaluate
  software to how they interact with customer support."

  Research findings per market:

  Japan:
  - Decision-making is consensus-based (ringi system) —
    multiple approvers needed
  - Users prefer detailed documentation before trial
  - Customer support expectations: 24/7, extreme politeness
  - Feature requests come through formal channels, not
    direct feedback
  - Low tolerance for software bugs — quality is paramount

  Germany:
  - Data privacy is critical (GDPR cultural mindset, not
    just compliance)
  - Thorough evaluation process — detailed feature
    comparison matrices
  - Direct communication style — expect honest answers
    about limitations
  - Preference for on-premise or EU-hosted solutions
  - Long vendor relationships valued over switching

  Brazil:
  - Relationship-driven sales — personal connection matters
  - WhatsApp is the primary communication channel
  - Price sensitivity with creative payment approaches
    (installment plans)
  - High mobile usage — mobile-first expectations
  - Flexible, informal communication style preferred

  Task: Create a culturally-informed persona for each
  market that goes beyond stereotypes.

assertions:
  - type: llm_judge
    criteria: "Response creates 3 culturally-grounded personas — Japan persona (specific person reflecting cultural patterns: a decision-maker who needs to build consensus — show the ringi process affecting how they evaluate and purchase software, their expectation of thorough documentation before committing to a trial, their relationship with quality and the embarrassment of recommending a buggy product to colleagues — but avoid stereotypes: not 'all Japanese are polite' but 'Kenji's organizational culture requires formal consensus, so he needs materials he can share with 4 approvers who each have different evaluation criteria'), Germany persona (specific person reflecting German business culture: detailed evaluation methodology, data privacy as a value not just a regulation, direct communication expectations — 'Claudia asks vendors directly about product limitations and appreciates honest answers — vague marketing language immediately erodes her trust' — she creates comparison matrices because her organization's procurement process requires documented justification), Brazil persona (specific person reflecting Brazilian business dynamics: relationship-first approach, WhatsApp as workflow — 'Rafael does 60% of his vendor communication via WhatsApp and expects real-time responses, not ticket systems', mobile-first usage in a growing economy with creative financial solutions — 'his company evaluates software partly on whether it offers boleto or installment payment options')."
    weight: 0.35
    description: "CulturalPersonas"
  - type: llm_judge
    criteria: "Response avoids stereotypes while respecting cultural patterns — the line between insight and stereotype (cultural patterns are real and research-backed — Japanese consensus decision-making IS a common organizational pattern; but individuals within cultures vary widely — not every Japanese professional uses ringi, not every German creates comparison matrices; the persona should represent a culturally-informed individual, not a cultural caricature), techniques to avoid stereotyping (ground every cultural attribute in specific research data — not 'Japanese people are polite' but 'our research shows Japanese enterprise buyers expect 24/7 support with formal communication'; show individual agency within cultural context — the persona can agree with, resist, or adapt cultural norms; include modern and evolving cultural elements — Brazil's tech ecosystem is rapidly evolving, Germany's startup culture differs from traditional enterprise culture; acknowledge that cultural personas need local validation — a US team's understanding of Japanese culture needs verification by Japanese researchers)."
    weight: 0.35
    description: "StereotypeAvoidance"
  - type: llm_judge
    criteria: "Response provides design implications per market — Japan implications (pre-trial documentation: detailed feature guides, comparison charts, and case studies available before signup; consensus support: ability to share evaluations with multiple stakeholders, team trial features, formal proposal documents; quality expectations: rigorous QA, proactive bug communication, and rapid resolution), Germany implications (data privacy by design: clear data location disclosure, EU hosting options, GDPR compliance documentation prominent not hidden; honest feature pages: clear 'what we don't do' sections alongside features, limitation transparency; long-term relationship: multi-year contract options, dedicated account management, vendor stability signals), Brazil implications (WhatsApp integration: support and sales available via WhatsApp, not just email/chat; mobile-first: the full product experience must work on mobile, not just a responsive afterthought; flexible pricing: installment options, local payment methods, pricing that reflects market purchasing power; relationship building: informal onboarding, personal check-ins, community-building features), universal principle (each market requires its own persona research — don't create US personas and 'localize' them, create culturally authentic personas from scratch with local research)."
    weight: 0.30
    description: "DesignImplications"
