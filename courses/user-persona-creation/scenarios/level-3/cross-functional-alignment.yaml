meta:
  id: cross-functional-alignment
  level: 3
  course: user-persona-creation
  type: output
  description: "Cross-functional persona alignment — align product, marketing, sales, and engineering teams around shared persona understanding"
  tags: [cross-functional, alignment, shared-understanding, collaboration, advanced]

state: {}

trigger: |
  Your company has 3 well-researched product personas. But
  each department uses them differently — or not at all:

  Product/Design: Uses personas actively in design reviews
  and feature prioritization. Refers to personas by name.

  Engineering: Doesn't use personas. One engineer said:
  "Those are just marketing documents. I build what the
  tickets say."

  Marketing: Created separate "buyer personas" that overlap
  with product personas but have different names, different
  demographics, and focus on purchase behavior not usage.

  Sales: Uses their own "ideal customer profiles" (ICPs)
  that describe companies not people. They say: "We sell
  to companies, not to personas."

  Customer Success: "We see patterns in churn that don't
  match any of the personas. The personas might be wrong."

  Task: Create an alignment strategy that gets all 5
  departments using personas consistently.

assertions:
  - type: llm_judge
    criteria: "Response addresses each department specifically — engineering alignment (engineers need to see how personas improve THEIR work: personas reduce ambiguity in tickets — instead of 'as a user' write 'as [persona name] who needs to...' which gives engineers more context, personas help engineers make edge case decisions — when encountering an undefined behavior, they can ask 'what would [persona name] expect?', frame it practically: 'personas aren't marketing documents — they're specification context that reduces back-and-forth between engineering and design'), marketing alignment (the separate buyer personas create confusion — unify: buyer and product personas should be the same people at different journey stages, the buyer persona 'considers purchase' and the product persona 'uses the product daily' should be the same person with consistent attributes, work with marketing to merge into a single persona set that covers the full lifecycle), sales alignment (ICPs and personas serve different levels: ICPs describe the company (firmographics), personas describe the person within the company (behaviors) — they're complementary not competitive, help sales see: 'you sell to companies but you talk to PEOPLE within those companies — the persona tells you how to talk to them'), customer success insight (CS seeing churn patterns that don't match personas is VALUABLE — don't dismiss it, it may mean: personas are incomplete — churn-prone users represent a segment the personas don't capture, or personas are outdated — user behavior has shifted since persona creation, use CS data to validate and update personas)."
    weight: 0.35
    description: "DepartmentSpecific"
  - type: llm_judge
    criteria: "Response provides alignment mechanisms — shared persona language (all departments should use the same persona names — if product calls the persona 'Sarah the PM' and marketing calls her 'Marketing Mary', the organization has no shared language, create a persona glossary: unified names, one-line descriptions, and how each department uses the persona, make persona names appear in: product tickets, marketing briefs, sales playbooks, CS dashboards), integration touchpoints (where personas naturally connect departments: sprint planning — product and engineering discuss what the persona needs, campaign planning — marketing designs campaigns targeting specific personas using the same attributes product uses, sales enablement — sales collateral references personas by name with persona-specific value propositions, churn analysis — CS maps churned accounts to personas to identify which personas are at risk), single source of truth (one document or system where the definitive persona lives — all departments reference the same source, no separate copies that drift over time, assign one owner per persona who maintains cross-departmental accuracy, quarterly persona review meeting with all departments represented)."
    weight: 0.35
    description: "AlignmentMechanisms"
  - type: llm_judge
    criteria: "Response provides a change management approach — executive sponsorship (alignment across 5 departments requires top-down support — get the VP of Product or CEO to mandate persona adoption as a company practice, not just a design tool), pilot program (don't try to align all departments simultaneously — pick the most receptive pair, say product and marketing, align them first, show results, then expand: 'marketing campaigns targeting the unified persona achieved 30% higher engagement than campaigns using the old buyer persona' — this creates internal case studies for adoption), training and workshops (each department needs persona training tailored to their context: engineering workshop — how to use personas in sprint planning and code reviews; sales workshop — how to identify which persona a prospect matches and adjust pitch accordingly; marketing workshop — how to unify buyer and product personas for consistent messaging; CS workshop — how to map customer accounts to personas for proactive retention), measurement (track adoption: percentage of tickets referencing personas, marketing campaigns aligned with personas, sales calls where persona language is used, CS churn reports segmented by persona — adoption metrics create accountability and show progress)."
    weight: 0.30
    description: "ChangeManagement"
