meta:
  id: accessibility-personas
  level: 3
  course: user-persona-creation
  type: output
  description: "Accessibility personas — create personas representing users with disabilities to drive inclusive design"
  tags: [accessibility, disability, inclusive-design, wcag, advanced]

state: {}

trigger: |
  Your company's accessibility audit revealed WCAG AA
  compliance at only 45%. The Head of Design says: "We
  need accessibility personas to help the team understand
  WHO we're designing for when we say 'accessible design.'
  Real people, not checklists."

  Research inputs:
  - 15% of the world's population lives with some form
    of disability
  - Your product's user base includes users who:
    * Use screen readers (JAWS, NVDA, VoiceOver)
    * Navigate entirely by keyboard (no mouse)
    * Use screen magnification (200-400%)
    * Have color vision deficiency (8% of males)
    * Experience cognitive load sensitivity (ADHD, dyslexia)
    * Use voice control (Dragon NaturallySpeaking)
  - Current complaints from users with disabilities:
    "The app is unusable with a screen reader"
    "I can't tell which button is active — the colors
    look the same to me"
    "The timeout kicks me out before I can finish the form"

  Task: Create 3 accessibility personas that educate the
  team and drive inclusive design decisions.

assertions:
  - type: llm_judge
    criteria: "Response creates 3 distinct accessibility personas — visual disability persona (specific person who uses a screen reader: name, age, occupation — they are a full professional with expertise, not defined by their disability; how they navigate the product: screen reader announces page structure, headings, landmarks, form labels; what breaks: unlabeled buttons, images without alt text, custom components without ARIA roles, focus order that jumps around the page; what works: semantic HTML, proper heading hierarchy, descriptive link text, keyboard-navigable interfaces), motor/dexterity persona (specific person who navigates by keyboard or voice control: why they don't use a mouse, what their workflow looks like — tab through interactive elements, use shortcuts; what breaks: small click targets, hover-only interactions, drag-and-drop without keyboard alternative, modals that trap focus; what works: large interactive elements, keyboard shortcuts, focus indicators, skip navigation links), cognitive accessibility persona (specific person with ADHD or dyslexia: how their condition affects product interaction — not inability but different cognitive processing; what breaks: session timeouts during complex forms, walls of text without structure, moving/auto-playing content that diverts attention, unclear error messages that don't explain what to fix; what works: clear visual hierarchy, chunked content, progress indicators, plain language, consistent navigation)."
    weight: 0.35
    description: "AccessibilityPersonas"
  - type: llm_judge
    criteria: "Response presents personas as whole people not defined by disability — person-first framing (the persona is 'Marcus, a financial analyst who is blind' not 'a blind user'; their disability is one characteristic among many — they have expertise, goals, frustrations, technology preferences, and a life beyond their disability; show how they successfully use technology daily — they're not helpless, they're expert users of assistive technology who are blocked by inaccessible design), practical technology context (each persona should describe their specific assistive technology setup: which screen reader and browser combination, keyboard navigation preferences, magnification level and settings, voice control software — this helps engineers understand the specific technical requirements), emotional dimension (show the frustration of being excluded: 'When Marcus encounters an unlabeled button, he doesn't just skip it — he wonders if this is the critical action he needs to complete his work, or if he's missing important information that sighted users can see', the impact of inaccessibility is not just inconvenience — it's exclusion from participating fully in work and life)."
    weight: 0.35
    description: "WholePersonApproach"
  - type: llm_judge
    criteria: "Response connects personas to specific design actions — per-persona design requirements (visual: semantic HTML, proper heading structure, ARIA labels on all interactive elements, alt text on images, focus management in SPAs, screen reader testing as part of QA; motor: minimum 44px touch/click targets, keyboard alternatives for all interactions, visible focus indicators, no time-limited interactions without extension, skip navigation; cognitive: plain language content, consistent navigation, progress indicators for multi-step processes, adjustable timeouts, no auto-playing media, clear error messages with recovery guidance), testing methodology per persona (don't just run automated tools — test with the actual assistive technologies each persona uses: test with NVDA/JAWS for the screen reader persona, test with keyboard-only navigation for the motor persona, test with real users who have cognitive disabilities for the cognitive persona — automated tools catch 30-40% of issues, manual testing catches the rest), integration with the team's workflow (each sprint should include: accessibility check against all 3 personas, at least one accessibility persona in every user story's acceptance criteria, quarterly testing with users who have disabilities — the personas guide the testing but don't replace real user feedback)."
    weight: 0.30
    description: "DesignActions"
