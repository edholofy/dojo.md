meta:
  id: persona-driven-design-decisions
  level: 3
  course: user-persona-creation
  type: output
  description: "Persona-driven design decisions — use personas as the primary framework for making and justifying product design decisions"
  tags: [decision-making, design-choices, prioritization, framework, advanced]

state: {}

trigger: |
  Your team has 3 well-established personas for a CRM
  product:

  Persona 1 — "Alex the Account Executive": Manages 50+
  accounts, needs speed above all, lives in the CRM 8
  hours/day, power user who customizes everything.

  Persona 2 — "Maria the Marketing Manager": Uses CRM
  data for campaigns, needs clean data and reporting, uses
  CRM 2 hours/day, frustrated by complex UI.

  Persona 3 — "Pat the Sales VP": Checks dashboard weekly,
  needs high-level pipeline visibility, spends 30 min/week
  in CRM, makes resource allocation decisions.

  Design decision needed: The team is adding a new
  "activity timeline" feature showing all customer
  interactions in one view. Three design proposals exist:

  Proposal A: Detailed timeline with every interaction,
  filters, search, and inline editing
  Proposal B: Simplified timeline showing key milestones
  only, with drill-down for details
  Proposal C: AI-summarized timeline showing insights
  and next recommended actions

  Task: Use the personas to evaluate all 3 proposals and
  make a recommendation with persona-based justification.

assertions:
  - type: llm_judge
    criteria: "Response evaluates each proposal against each persona — Proposal A against personas (Alex: loves it — matches his power-user workflow, he's in the CRM 8 hours/day and wants every detail with inline editing; Maria: overwhelmed — she uses CRM 2 hours/day and a detailed timeline with filters adds complexity to her already-frustrating experience; Pat: useless — she spends 30 min/week and won't wade through a detailed timeline, she needs the headline not the article), Proposal B against personas (Alex: frustrated — he needs the details, not just milestones, a simplified view without full data access slows him down; Maria: better — milestone view is closer to her needs, drill-down provides detail when needed without overwhelming the default view; Pat: decent — milestones are closer to what she needs but still more than a dashboard), Proposal C against personas (Alex: concerned — AI summaries may miss details he needs, he doesn't trust automated recommendations over his own judgment; Maria: excited — AI-summarized insights with next actions is exactly what she needs: actionable information without information overload; Pat: ideal — an AI summary of the timeline is the executive view she wants, recommended actions help her make resource decisions faster)."
    weight: 0.35
    description: "PersonaEvaluation"
  - type: llm_judge
    criteria: "Response makes a justified recommendation — recommendation (none of the proposals perfectly serves all 3 personas — but that's expected, the solution is a configurable timeline with persona-appropriate defaults: Alex's default — detailed view with all interactions, filters, inline editing, Proposal A as his default; Maria's default — AI-summarized view with key insights and next actions, Proposal C as her default; Pat's default — executive summary dashboard with headline metrics, Proposal C simplified even further; the view should be switchable so any persona can access any level of detail when needed), persona-based justification (Alex is the primary persona — he's in the CRM 8 hours/day and generates revenue directly, his needs cannot be compromised; Maria is secondary — she's an important but less frequent user, the simplified/AI view serves her without requiring the complexity Alex needs; Pat is tertiary — her needs can be served with a dashboard derivative, not a custom feature), design principle extracted (when personas have conflicting needs, the answer is often: persona-appropriate defaults with the ability to switch — not choosing one proposal over another, but designing a flexible system that serves each persona's default workflow while allowing access to alternative views)."
    weight: 0.35
    description: "JustifiedRecommendation"
  - type: llm_judge
    criteria: "Response demonstrates persona-driven decision methodology — decision framework (for any design decision: 1. Map proposals against each persona — who benefits, who suffers? 2. Weight by persona priority — primary persona's needs take precedence; 3. Identify conflicts — where do persona needs contradict? 4. Find creative solutions that serve multiple personas — configurable defaults, progressive disclosure, role-based views; 5. When compromise is impossible — primary persona wins, mitigate impact on secondary personas), when personas aren't enough (personas inform the recommendation but don't make the decision: technical feasibility — can we build configurable views? cost — is building 3 views worth the investment? timeline — can we ship a primary persona version first and add others later? the design recommendation should note these constraints), documentation (every significant design decision should reference personas: 'We chose this design because it best serves Alex's daily workflow while providing Maria and Pat with role-appropriate views' — this creates a decision log that future team members can understand and that prevents relitigating settled decisions)."
    weight: 0.30
    description: "DecisionMethodology"
