meta:
  id: data-driven-persona-evolution
  level: 3
  course: user-persona-creation
  type: output
  description: "Data-driven persona evolution — continuously evolve personas using behavioral analytics, support data, and market signals"
  tags: [data-driven, evolution, analytics, continuous, advanced]

state: {}

trigger: |
  You're the UX Research Lead for a productivity SaaS tool.
  Your personas were created 18 months ago based on
  interviews. Now you have 18 months of behavioral data
  that tells a more complex story:

  Original Persona "Power User Paula":
  - Assumed: uses advanced features daily, power user
  - Actual data: 70% of "power users" only discovered
    advanced features after month 6; the first 5 months
    they behaved identically to basic users
  - Insight: "power user" is a stage, not a type

  Original Persona "Basic User Ben":
  - Assumed: simple needs, uses only basic features
  - Actual data: 35% of "basic users" tried advanced
    features, got confused, and reverted to basic usage
  - Insight: some "basic users" are actually failed power
    users blocked by UX complexity

  New signal from data (no persona exists for this):
  - 15% of users exhibit "burst usage" — inactive for
    weeks, then extremely active for 2-3 days, then
    inactive again
  - These users have the highest churn risk

  Task: Evolve the persona set based on 18 months of
  behavioral data, including creating new personas for
  uncaptured segments.

assertions:
  - type: llm_judge
    criteria: "Response evolves existing personas based on data — Paula evolution (transform from a persona 'type' to a persona 'journey': Paula isn't born a power user — she becomes one over 6 months, the persona should now include: onboarding phase months 1-2, exploration phase months 3-5, power user phase month 6+, design implications shift: don't design advanced features for expert-from-day-one users, design discovery paths that guide users from basic to advanced naturally), Ben evolution (split into two distinct personas: 'True Basic Ben' — genuinely simple needs, happy with basic features, doesn't want or need more; 'Blocked Barbara' — tried advanced features, got confused, retreated to basics — she has power user potential but the product's complexity barrier stopped her; design implications: for True Basic Ben, don't push advanced features; for Blocked Barbara, redesign the advanced feature onboarding to be more gradual and forgiving), the evolution should preserve what was accurate in the original personas while correcting what the data revealed was wrong."
    weight: 0.35
    description: "PersonaEvolution"
  - type: llm_judge
    criteria: "Response creates a new persona for the uncaptured segment — burst user persona (15% of users with 'burst usage' pattern: create a new persona — perhaps 'Sprint Sam' — who uses the product intensely for specific projects then goes dormant until the next project; behavioral pattern: 2-3 days of intense usage creating and completing a deliverable, then weeks of inactivity, this could be: a freelancer who uses the tool per project, a team member who only uses it for specific workflows like quarterly reporting, a user evaluating the tool who keeps trying and abandoning; the persona should capture: their relationship with the product — it's a tool not a daily companion, their churn risk — they look churned during dormant periods but may return, their onboarding needs — they essentially re-onboard every time they return), design implications for burst users (don't send 'we miss you' emails during dormant periods — they're not churning they're just between projects, make re-engagement frictionless — quick access to previous work, minimal re-learning curve, consider session-based or project-based pricing — daily active user metrics don't capture their value, onboarding should be self-contained — they won't remember tutorials from 3 weeks ago)."
    weight: 0.35
    description: "NewPersonaCreation"
  - type: llm_judge
    criteria: "Response establishes a data-to-persona feedback loop — continuous evolution methodology (behavioral data dashboard: track key persona assumptions against real data monthly — usage frequency, feature adoption progression, engagement patterns; anomaly detection: flag when user behavior deviates significantly from persona predictions — the burst users were likely detectable months ago but nobody was looking; cohort analysis: track user cohorts over time to understand persona stages — when do basic users become power users? when do burst users churn?), persona evolution cadence (monthly: quick data check — do key metrics match persona predictions?; quarterly: deeper analysis — any segments emerging that personas don't capture?; annually: comprehensive persona refresh with new qualitative research to understand the 'why' behind behavioral changes), from static documents to living models (personas should evolve from 'documents that get updated' to 'models that are continuously informed by data': connect persona definitions to analytics segments so they update semi-automatically, alert when behavioral clusters shift significantly, make persona evolution visible to the team — show how understanding has deepened over time, not just that it changed)."
    weight: 0.30
    description: "DataFeedbackLoop"
