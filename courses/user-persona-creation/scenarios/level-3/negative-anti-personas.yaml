meta:
  id: negative-anti-personas
  level: 3
  course: user-persona-creation
  type: output
  description: "Negative anti-personas — create anti-personas to define who you're NOT designing for and prevent scope creep"
  tags: [anti-persona, negative-persona, scope, boundaries, advanced]

state: {}

trigger: |
  Your team builds a professional project management tool
  priced at $25/user/month. Feature requests are coming
  from all directions:

  - "Add personal to-do lists for individual task tracking"
  - "Add Gantt charts for complex multi-year construction
    projects"
  - "Make it work for classrooms — teachers want to assign
    homework through it"
  - "Add social features — users want to share their
    project progress publicly"
  - "Make a free tier for students and hobbyists"
  - "Add advanced resource leveling for 500+ person
    program management"

  Each request comes from a real user or prospect. But
  pursuing all of them would destroy the product's focus.

  Task: Create anti-personas that define who the product
  is NOT for, and use them to evaluate each feature
  request.

assertions:
  - type: llm_judge
    criteria: "Response creates 3-4 clear anti-personas — personal organizer anti-persona (the individual who wants a personal to-do list app: they don't need team collaboration, project timelines, or resource allocation — they need Todoist or Things, designing for them would simplify the product into a to-do app and alienate professional teams who need project management depth), enterprise program manager anti-persona (the person managing 500+ people across multi-year programs: they need Oracle Primavera or Microsoft Project, their requirements for resource leveling, earned value management, and program-level reporting would add massive complexity for the 90% of users who manage teams of 5-25, pursuing this market requires different architecture not just features), education anti-persona (the teacher wanting homework management: education has specific requirements — grading, parent visibility, curriculum alignment — that diverge entirely from professional project management, building for education means building a different product), each anti-persona should be as detailed as a regular persona: name, context, why they're attracted to your product, and specifically why serving them would harm the product for primary personas."
    weight: 0.35
    description: "AntiPersonaCreation"
  - type: llm_judge
    criteria: "Response evaluates feature requests using anti-personas — request evaluation (personal to-do lists: maps to Personal Organizer anti-persona — decline, recommend to-do app alternatives; Gantt charts for construction: partially maps to Enterprise PM anti-persona — evaluate carefully: basic Gantt could serve primary personas, construction-specific Gantt would not; classroom use: maps to Education anti-persona — decline, this is a different market requiring a different product; social sharing: doesn't map to any anti-persona but also doesn't serve primary personas — evaluate against primary persona goals, if social features distract from project management, deprioritize; free student tier: maps to Personal Organizer anti-persona — students don't need professional PM tools, a free tier would attract users who dilute product feedback with individual-use requests; advanced resource leveling: maps to Enterprise PM anti-persona — decline for now, this serves a market segment beyond current product scope), each evaluation should reference the specific anti-persona and explain the reasoning."
    weight: 0.35
    description: "FeatureRequestEvaluation"
  - type: llm_judge
    criteria: "Response explains anti-persona value and methodology — why anti-personas matter (they prevent the 'death by a thousand features' that destroys product focus, they give the team permission to say 'no' backed by strategy not just opinion, they make prioritization decisions faster: 'this request is from our Education anti-persona — we don't build for that segment', they protect the product's value proposition: a PM tool that also does personal to-do lists and classroom management is a confused product nobody loves), how to create anti-personas (identify feature requests that don't serve primary personas, group them into user types, validate: is this really a segment we shouldn't serve? or is it a growth opportunity?, create the anti-persona with the same rigor as a regular persona — specificity matters), when to revisit (anti-personas aren't permanent: if the Enterprise PM market becomes strategic, the anti-persona becomes a target persona, review anti-personas annually: has the market or strategy changed? quarterly check: are we getting more requests from anti-persona segments than expected — could indicate a market shift?), communication (share anti-personas with sales and marketing — they need to know who NOT to sell to, sales pursuing anti-persona prospects wastes resources and creates misaligned customers who churn and leave bad reviews)."
    weight: 0.30
    description: "AntiPersonaMethodology"
