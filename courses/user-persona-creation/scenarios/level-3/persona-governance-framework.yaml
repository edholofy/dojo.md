meta:
  id: persona-governance-framework
  level: 3
  course: user-persona-creation
  type: output
  description: "Persona governance framework — establish rules, ownership, and processes for maintaining persona quality and consistency"
  tags: [governance, ownership, standards, quality, advanced]

state: {}

trigger: |
  After a company reorg, your persona program is in chaos:

  1. Three teams modified the same persona independently —
     three versions now exist with conflicting attributes
  2. A new PM created 4 new personas without validating
     against existing ones — 2 are duplicates of existing
     personas with different names
  3. The design system references persona names that were
     changed 6 months ago — documentation is out of sync
  4. Nobody knows who "owns" the personas — when questions
     arise about persona accuracy, there's no authoritative
     answer
  5. International teams created local personas that
     contradict the global persona set
  6. A designer left the company and took the only copy
     of the persona research data with them

  Task: Design a persona governance framework that prevents
  these problems and establishes clear rules for persona
  management.

assertions:
  - type: llm_judge
    criteria: "Response establishes clear governance structure — ownership model (Persona Program Owner: one person ultimately responsible for the persona set — likely Head of UX Research or a designated Design Ops role; Persona Stewards: one per persona, responsible for maintaining accuracy and fielding questions about their persona; Team Representatives: each product team has a persona liaison who surfaces team-specific needs and ensures local compliance), access control and versioning (single source of truth: all personas live in one accessible, version-controlled location — Notion, Confluence, or a dedicated tool; no unauthorized copies — personas are referenced not duplicated; version control: every change is tracked with who, what, why, and when; change approval: modifications to core persona attributes require approval from the Persona Program Owner; view vs edit permissions — anyone can view, only authorized stewards can edit), naming and identity standards (persona names are unique and permanent — changing a name requires a formal deprecation of the old name and redirect to the new one, no two personas can have the same or similar names, new personas must be checked against existing ones before creation — the PM creating 4 redundant personas should have been caught by a review process)."
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Response addresses each specific problem — conflicting versions (immediate: audit all 3 versions, identify what changed and why, merge into one authoritative version with the most accurate and well-supported attributes, communicate the canonical version to all teams; prevention: lock editing to authorized stewards, require change proposals for modifications), duplicate creation (immediate: compare the new PM's 4 personas against existing ones, retire the 2 duplicates with documentation showing they're the same as existing personas; prevention: new persona creation requires a 'persona proposal' reviewed against the existing set before any work begins), documentation sync (immediate: audit all design system and documentation references, update to current persona names; prevention: persona name changes trigger automated notifications to all documentation owners, maintain a persona changelog that all dependent systems can reference), ownership gap (immediate: assign owners per the governance model above; prevention: persona ownership is a documented role with handoff procedures when people change roles), international conflicts (immediate: review international personas against global set, determine if differences reflect genuine cultural variation or inconsistency; prevention: international personas follow a 'core + local' model — core attributes match the global set, local attributes add cultural context), lost research (immediate: reconstruct what you can from any remaining documentation; prevention: all research data lives in a centralized, company-owned repository — never on personal drives or accounts, exit procedures include research data handoff)."
    weight: 0.35
    description: "ProblemResolution"
  - type: llm_judge
    criteria: "Response provides governance processes and prevention — persona lifecycle processes (creation: submit persona proposal → review against existing set → research and development → steward approval → socialization → active; modification: submit change request with evidence → steward review → Program Owner approval if core attribute → version increment → notification to dependent teams; retirement: present evidence that persona is no longer representative → Program Owner approval → formal deprecation notice → archive with rationale → update all references), quality standards (every persona must include: creation date, last validated date, data sources with links, confidence level for each attribute, known gaps and assumptions to validate, owner/steward contact), audit schedule (quarterly persona health audit: are all personas still referenced in active work? are any attributes contradicted by recent data? are all documentation references current? are governance processes being followed?), training (new team members receive persona orientation: what are the personas, where to find them, who owns them, how to request changes, how NOT to create duplicates — the PM who created 4 redundant personas likely didn't know the existing personas existed, which is an onboarding failure)."
    weight: 0.30
    description: "ProcessAndPrevention"
