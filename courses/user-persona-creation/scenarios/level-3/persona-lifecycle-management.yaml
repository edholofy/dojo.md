meta:
  id: persona-lifecycle-management
  level: 3
  course: user-persona-creation
  type: output
  description: "Persona lifecycle management — manage personas through their full lifecycle from creation to retirement"
  tags: [lifecycle, evolution, maintenance, retirement, advanced]

state: {}

trigger: |
  Your company has been using personas for 3 years. The
  persona program is showing signs of age:

  Persona "Startup Steve" (created Year 1):
  - Originally: 28, solo founder, bootstrapping, price-
    sensitive, needs all-in-one solution
  - Current reality: your customer base has shifted to
    funded startups with 10-50 employees who have budgets
  - Team still designs for "Startup Steve" even though
    he doesn't represent current users

  Persona "Enterprise Emma" (created Year 2):
  - Originally: 45, VP at Fortune 500, needs compliance
    and security features
  - Current reality: this persona is accurate but has been
    enriched by 2 years of customer success data that
    reveals nuances the original persona missed
  - Needs updating not retirement

  Persona "Developer Dan" (created Year 1):
  - Originally: 30, backend developer, uses API only,
    hates UI
  - Current reality: developer tools have evolved — Dan's
    tools and workflows have changed significantly, low-
    code tools have blurred the line between developers
    and non-developers
  - Unclear whether to update or retire

  Task: Create a persona lifecycle management framework
  and apply it to evaluate all 3 personas.

assertions:
  - type: llm_judge
    criteria: "Response defines a persona lifecycle framework — lifecycle stages (Stage 1 Creation: initial research, persona development, team socialization; Stage 2 Active Use: persona guides design decisions, referenced in user stories and design reviews; Stage 3 Monitoring: quarterly data checks comparing persona assumptions to actual user behavior; Stage 4 Evolution: persona attributes updated based on new research and data; Stage 5 Retirement: persona no longer represents a significant user segment — formally deprecated with documentation of why; Stage 6 Succession: a new or updated persona replaces the retired one), lifecycle triggers (creation trigger: new product, new market, or major user base shift; evolution trigger: behavioral data diverges more than 20% from persona assumptions, new research reveals important nuances, market or product changes affect user context; retirement trigger: the user segment shrinks below a meaningful threshold, or the persona's core assumptions are fundamentally invalidated), lifecycle documentation (every persona should have: creation date, last update date, next scheduled review, data sources used, evolution history — what changed and why, confidence level — how well-validated is this persona currently?)."
    weight: 0.35
    description: "LifecycleFramework"
  - type: llm_judge
    criteria: "Response evaluates all 3 personas using the framework — Startup Steve evaluation (diagnosis: retirement candidate — the persona's core assumption 'solo founder, bootstrapping, price-sensitive' is fundamentally misaligned with the current customer base of funded startups with budgets; action: retire Steve and create a new persona 'Funded Startup Fiona' based on current customer data — 10-50 employee startups with funding who need scalability not just affordability; transition plan: announce Steve's retirement, explain why, introduce the replacement, update all references in tickets and design documents), Enterprise Emma evaluation (diagnosis: evolution candidate — the persona is fundamentally accurate but incomplete, 2 years of customer success data reveals nuances: her buying process, onboarding challenges, feature adoption patterns, and renewal decision criteria; action: update Emma with enriched behavioral data, add customer success insights, keep core attributes but add depth; don't change the name — continuity helps team adoption), Developer Dan evaluation (diagnosis: needs investigation before deciding — the developer landscape has changed, but are Dan's users still present? data check: what percentage of users interact primarily via API? has the API-first segment grown or shrunk? are 'citizen developers' using low-code tools a new segment?; if API users are still significant: update Dan to reflect modern developer tools and workflows; if the segment has shrunk significantly: retire Dan and investigate whether a new 'low-code builder' persona is needed)."
    weight: 0.35
    description: "PersonaEvaluations"
  - type: llm_judge
    criteria: "Response provides ongoing lifecycle management practices — quarterly health check (every quarter, review each persona against: behavioral analytics — does user behavior match persona predictions?, support data — are there new frustration patterns not captured in personas?, business data — has the customer segment changed size or composition?, team usage — is the team still referencing this persona or has it become invisible?), retirement ceremony (don't just quietly delete personas — formally retire them: announce to the team why the persona is being retired, document what changed in the market or user base, archive the persona for historical reference, introduce the successor persona and explain the transition), persona versioning (maintain version history: v1.0 — initial creation with data sources, v1.1 — minor updates based on quarterly review, v2.0 — major revision with new research, this helps teams understand how their understanding of users has evolved over time and prevents reverting to outdated assumptions), anti-pattern prevention (the biggest lifecycle risk is 'zombie personas' — personas that are technically alive but nobody uses or updates, regular adoption audits ensure personas remain active parts of the design process, if a persona isn't referenced in any design decision for 6 months, it's either not useful or not being used — investigate and fix)."
    weight: 0.30
    description: "OngoingManagement"
