meta:
  id: advanced-persona-shift
  level: 3
  course: user-persona-creation
  type: output
  description: "Advanced persona shift — handle multiple advanced persona challenges in a single session"
  tags: [shift, combined, assessment, advanced]

state: {}

trigger: |
  You're the UX Research Director handling three advanced
  persona challenges:

  TASK 1 — Your product analytics team used machine
  learning to identify 12 behavioral clusters in your
  user base. They want to create a persona for each
  cluster. Your current persona set has 4 personas that
  work well. The data science team says: "Our clusters
  are more accurate — they're based on real data, not
  interviews." Respond to this proposal.

  TASK 2 — Your company sells a B2B2C product: you sell
  to businesses (B2B) who then serve consumers (B2C).
  Example: you sell a scheduling platform to dental
  offices, and patients use the platform to book
  appointments. You need personas for BOTH the dental
  office AND the patient — but they have different and
  sometimes conflicting needs. Create a persona
  relationship framework.

  TASK 3 — A senior designer argues: "Personas are
  outdated. They're static documents in a dynamic world.
  We should replace them with real-time behavioral
  dashboards." The research team disagrees: "Dashboards
  show what users do, not why they do it. You need both."
  Settle this debate.

  Task: Handle all three advanced persona challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — ML clusters vs personas — the data science team's critique and its limits (ML clusters ARE more statistically rigorous than interview-based personas — acknowledge this; but 12 clusters is too many to design for — the human brain can't hold 12 distinct user models during design decisions; clusters tell you WHAT users do, not WHY — a cluster of users who abandon checkout might include people who found a better price, people who got distracted, and people who couldn't complete payment — the behavior is identical but the design solution is different for each), resolution (don't choose between 4 interview personas and 12 ML clusters — combine them: use ML clusters to validate and enrich the 4 personas — do the 4 personas map cleanly to clusters? if not, adjust; if some clusters represent users not captured by current personas — investigate whether new personas are needed; reduce 12 clusters to 4-6 meaningful segments that can be represented as personas; use the cluster data to make persona behavioral attributes more precise while keeping the qualitative depth that interviews provide), collaborative framework (invite data science into the persona process: they contribute behavioral data and statistical rigor, UX research contributes motivational understanding and empathy, together they create data-backed personas that are both accurate and useful for design — better than either approach alone)."
    weight: 0.35
    description: "MLClustersVsPersonas"
  - type: llm_judge
    criteria: "Response handles Task 2 — B2B2C persona framework — dual persona system (create two layers: Business Layer — the dental office: office manager who selects and administers the platform, dentist who needs schedule visibility, receptionist who manages daily bookings; Consumer Layer — the patient: books appointments, receives reminders, manages their dental care; the two layers have a relationship: business personas are your buyers and administrators, consumer personas are your end users), conflict identification (where business and consumer needs conflict: the dental office wants to minimize no-shows through aggressive reminders and cancellation fees — the patient wants flexibility and finds frequent reminders annoying; the office wants to control available slots to optimize schedule — the patient wants wide availability and flexibility; the office wants patient data for marketing — the patient wants privacy), resolution framework (for each conflict: whose need takes priority depends on who drives the business: if dental offices churn when patients don't show up — the reminder system serves the business first with patient-friendly design; if patient satisfaction drives office retention — patient experience takes priority because happy patients keep offices subscribed; map each conflict to a design decision and evaluate which persona's need most impacts business sustainability)."
    weight: 0.35
    description: "B2B2CFramework"
  - type: llm_judge
    criteria: "Response handles Task 3 — personas vs dashboards debate — both are right (the designer is right that static persona documents become outdated; the researcher is right that dashboards can't capture motivation, context, and emotion; this is a false choice — the answer is both), the synthesis (personas provide: user empathy, motivation understanding, design direction, team alignment around shared user models; dashboards provide: real-time behavioral data, trend detection, anomaly identification, quantitative validation; the solution is 'living personas' — persona documents enriched with dashboard data: each persona has an associated behavioral dashboard showing real-time metrics for their segment, the persona document provides the 'who' and 'why', the dashboard provides the 'what' and 'how much', the dashboard validates the persona continuously — if behavioral data diverges from persona predictions, it triggers a persona update), practical implementation (persona profile page with: static section — name, goals, frustrations, scenarios, updated annually; dynamic section — live dashboard showing behavioral metrics for this persona's segment, updated in real-time; alert system — flags when dashboard metrics deviate significantly from persona assumptions — 'power user session length dropped 30% — persona may need investigation')."
    weight: 0.30
    description: "PersonasVsDashboards"
