meta:
  id: enterprise-persona-program
  level: 3
  course: user-persona-creation
  type: output
  description: "Enterprise persona program — establish a scalable persona program across a large organization with multiple product teams"
  tags: [enterprise, program, scaling, governance, advanced]

state: {}

trigger: |
  You're the Head of UX Research at a company with 200
  employees and 4 product teams. Each team has created
  their own personas independently:

  Team Alpha: 5 personas for the customer portal
  Team Beta: 4 personas for the mobile app
  Team Gamma: 6 personas for the admin dashboard
  Team Delta: 3 personas for the API/developer tools

  Problems discovered:
  1. Teams Alpha and Beta have different personas for what
     is clearly the same user — a small business owner
     who uses both the portal and the mobile app
  2. Team Gamma's "Admin User" persona contradicts Team
     Alpha's "Power User" persona — same person, different
     assumptions about their behavior
  3. Total of 18 personas across the company — nobody can
     remember more than 3
  4. No shared research — each team did their own interviews
     with no coordination
  5. Sales and marketing have separate "buyer personas"
     that don't align with any product personas

  Task: Design an enterprise persona program that unifies
  personas across all teams.

assertions:
  - type: llm_judge
    criteria: "Response designs a unified persona architecture — persona consolidation strategy (audit all 18 personas: identify duplicates — the same user described differently across teams, identify conflicts — contradictory assumptions about the same user, identify gaps — user types that no team has captured; target: reduce 18 to 5-7 unified personas that span the product portfolio, each persona should work across multiple products showing how the same person interacts with different touchpoints), master persona framework (create a tiered structure: Core Layer — attributes shared across all products: name, role, goals, frustrations, behavior patterns; Product Layer — product-specific details: how this persona uses each team's product differently, what features matter, what workflows they follow; this structure allows each team to see their product-specific view while maintaining a unified understanding of the user), sales and marketing alignment (buyer personas and product personas describe the same people at different stages: buyer personas focus on purchase decision, product personas focus on product usage — unify them into a single persona journey: awareness → evaluation → purchase → onboarding → daily usage → renewal)."
    weight: 0.35
    description: "UnifiedArchitecture"
  - type: llm_judge
    criteria: "Response addresses governance and process — ownership model (assign clear roles: Persona Program Owner — one person responsible for the overall persona program, typically the Head of UX Research; Team Persona Champions — one person per product team responsible for maintaining the product-specific layer; Research Coordinator — ensures research efforts are shared, not duplicated across teams), update cadence (quarterly persona review: all teams present new research findings, update core persona attributes based on accumulated evidence, discuss conflicts and resolve them with data; annual comprehensive persona refresh: major research initiative validating the full persona set against current user data), shared research infrastructure (centralized research repository: all interview transcripts, survey data, and analytics findings accessible to all teams; research coordination: before a team conducts research, check what other teams have already learned about the same persona; shared recruiting pool: if Team Alpha interviews small business owners, share relevant findings with Team Beta who serves the same users), change management (consolidating 18 personas into 5-7 will face resistance — teams are attached to their personas: involve teams in the consolidation process so they feel ownership, show how unified personas improve their work — fewer contradictions, shared insights, less duplicated research)."
    weight: 0.35
    description: "GovernanceAndProcess"
  - type: llm_judge
    criteria: "Response provides an implementation plan — phased rollout (Phase 1 weeks 1-4: persona audit — map all 18 personas, identify overlaps, conflicts, and gaps, create a persona relationship matrix showing which teams' personas describe the same users; Phase 2 weeks 5-8: consolidation workshops — bring representatives from all teams together to co-create the unified persona set, use shared research to resolve conflicts; Phase 3 weeks 9-12: documentation and socialization — create the unified persona documents with core and product layers, present to all teams, sales, marketing, and leadership; Phase 4 ongoing: governance — implement the update cadence, shared research, and ownership model), success metrics (persona count: from 18 to 5-7, cross-team alignment: all teams can name the same primary personas, research efficiency: no duplicate research across teams, design consistency: features designed for the same persona work coherently across products, adoption: all teams actively reference unified personas in design decisions), risk mitigation (teams may resist losing 'their' personas — involve them in co-creation, the consolidation may reveal that some products serve different users than assumed — this is valuable insight even if uncomfortable, unified personas may feel too generic for specific product needs — the product-specific layer addresses this)."
    weight: 0.30
    description: "ImplementationPlan"
