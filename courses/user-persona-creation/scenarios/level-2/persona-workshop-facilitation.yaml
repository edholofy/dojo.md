meta:
  id: persona-workshop-facilitation
  level: 2
  course: user-persona-creation
  type: output
  description: "Persona workshop facilitation — design and run a collaborative persona creation workshop with cross-functional stakeholders"
  tags: [workshop, facilitation, collaboration, cross-functional, intermediate]

state: {}

trigger: |
  You need to create personas for a new product — a
  corporate travel booking platform. The VP of Product
  says: "Include everyone in the persona process — we
  want buy-in from across the organization."

  Workshop participants (12 people):
  - 2 UX designers
  - 2 product managers
  - 1 UX researcher (has interview data from 8 users)
  - 2 engineers
  - 2 sales reps (talk to customers daily)
  - 1 customer success manager
  - 1 marketing manager
  - 1 finance analyst (handles travel budget policies)

  Available time: 3-hour workshop (one session)
  Available data: 8 user interviews, 2,000 support tickets,
  sales call recordings, competitor analysis

  Task: Design a 3-hour persona creation workshop agenda,
  including activities, facilitation notes, and expected
  outcomes.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured 3-hour agenda — time-blocked activities (not just a list of topics but specific activities with time allocations: e.g., 15 min — context setting and research share, 30 min — assumption mapping exercise, 45 min — persona drafting in small groups, 30 min — group critique and synthesis, etc.), pre-workshop preparation (share research summaries 48 hours before the workshop so participants arrive informed: key interview quotes, support ticket themes, sales insights — the workshop should BUILD on shared knowledge not spend time presenting it), warm-up activity (5-10 min icebreaker that gets everyone thinking about users: 'describe the last customer you talked to' for sales, 'describe the last support ticket that surprised you' for customer success — this surfaces assumptions immediately), research presentation (15-20 min: the UX researcher presents key findings from the 8 interviews — themes, quotes, patterns — this grounds the workshop in data not just assumptions), the agenda should balance structure with flexibility — have clear outcomes for each block but allow for productive tangents."
    weight: 0.35
    description: "WorkshopAgenda"
  - type: llm_judge
    criteria: "Response includes specific collaborative activities — assumption mapping (each participant writes their assumptions about users on sticky notes independently, then group similar assumptions — areas of agreement become persona hypotheses, areas of disagreement become research questions, this reveals what the team THINKS they know and highlights blind spots), persona drafting in small groups (divide 12 participants into 3-4 groups, each group drafts a persona using a provided template: name, goals, frustrations, behaviors, quote — mix functional roles in each group so engineers hear sales perspectives and vice versa, each group presents their persona to the room), synthesis and critique (compare the 3-4 drafted personas: where do they overlap? where do they conflict? are there personas the groups independently arrived at? — the facilitator guides the room toward consensus on 2-3 primary personas, disagreements are documented as 'assumptions to validate'), ground rules for the workshop (everyone's perspective is valuable — sales knows what customers SAY they want, engineers know what's feasible, finance knows budget constraints; distinguish between what we KNOW from data and what we ASSUME — label assumptions clearly; this workshop produces draft personas that need validation, not final personas)."
    weight: 0.35
    description: "CollaborativeActivities"
  - type: llm_judge
    criteria: "Response addresses facilitation challenges and outcomes — managing dominant voices (sales reps may dominate because they talk to customers daily — but their perspective is filtered through the sales lens, engineers may stay quiet because they feel personas are 'not their area' — but they have crucial technical context, the finance analyst may feel out of place — but they understand the budget constraints that shape user behavior, facilitator techniques: round-robin sharing, written before spoken exercises, explicitly calling on quiet participants), expected outcomes (by end of 3 hours: 2-3 draft personas with consensus from the group, a prioritized list of assumptions to validate with research, assigned owners for persona refinement post-workshop, scheduled follow-up meeting to review validated personas), post-workshop plan (the workshop produces DRAFTS not final personas: UX researcher validates key assumptions through additional interviews, designers refine persona documents based on workshop consensus, share refined personas with all participants for feedback within 2 weeks, final personas presented and adopted within 4 weeks of workshop), workshop documentation (assign a note-taker, photograph all sticky notes and whiteboard work, distribute a workshop summary within 24 hours — this maintains momentum and shows participants their input was captured)."
    weight: 0.30
    description: "FacilitationAndOutcomes"
