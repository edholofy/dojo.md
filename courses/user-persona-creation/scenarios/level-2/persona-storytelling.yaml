meta:
  id: persona-storytelling
  level: 2
  course: user-persona-creation
  type: output
  description: "Persona storytelling — use narrative techniques to make personas memorable and emotionally resonant for the team"
  tags: [storytelling, narrative, engagement, communication, intermediate]

state: {}

trigger: |
  You've created 3 well-researched personas for your
  product, but they're not being used. The engineering
  lead says: "Those persona documents are 4 pages each.
  Nobody reads them. I tried to use them in a sprint
  planning meeting and everyone's eyes glazed over."

  The personas have good data but are written like academic
  reports: dense paragraphs, bullet point lists, clinical
  language.

  Your current primary persona opening:
  "User Persona: Sarah Mitchell. Demographics: Female, 34,
  Software Engineer, San Francisco. Income: $145K. Education:
  BS Computer Science. Marital Status: Married, 1 child.
  Technology Usage: High. Primary Device: MacBook Pro.
  Secondary Device: iPhone 14."

  Task: Rewrite this persona using storytelling techniques
  that make it memorable and actionable, and explain how
  narrative structure improves persona adoption.

assertions:
  - type: llm_judge
    criteria: "Response rewrites the persona using narrative techniques — opening hook (replace the clinical demographic dump with a moment that captures Sarah's experience: 'It's 6:47 AM. Sarah has 13 minutes before her daughter wakes up. She opens her laptop, checks three Slack channels, reviews a pull request, and starts her first coffee. By 7 AM, her day has already begun.' — this immediately tells you more about Sarah than any demographic list), narrative arc (structure the persona as a story: her morning routine reveals her constraints, her workday reveals her goals, her evening reveals her frustrations, her weekend reveals her aspirations — the narrative format makes the persona memorable because humans remember stories not data tables), show don't tell (instead of 'Technology Usage: High', show it: 'Sarah has 4 monitors at her desk, uses keyboard shortcuts for everything, and has automated her morning stand-up notes' — behavioral details are more useful and more memorable than categorical labels), emotional resonance (the persona should make the reader feel something: empathy for Sarah's time constraints, understanding of her priorities, connection to her frustrations — if the team feels they 'know' Sarah, they'll design for her)."
    weight: 0.35
    description: "NarrativeRewrite"
  - type: llm_judge
    criteria: "Response explains why storytelling improves persona adoption — cognitive science (humans remember stories 22x better than facts alone — a narrative persona sticks in memory while a data table is forgotten, stories activate empathy circuits in the brain — when the team 'feels' the persona's frustration, they're more motivated to solve it, narrative structure provides context that raw data lacks — 'Income: $145K' means nothing without knowing that $145K in San Francisco with a child doesn't feel wealthy), practical adoption benefits (short and scannable: a well-told persona story can be 1 page instead of 4 — less is more when you want people to actually read it, quotable: a persona with memorable moments gives the team shared language — 'remember Sarah's 13-minute window?' becomes shorthand in design discussions, actionable: narrative moments reveal design opportunities more clearly than data points — '13 minutes before her daughter wakes up' immediately tells you the product must work in short bursts)."
    weight: 0.35
    description: "WhyStorytellingWorks"
  - type: llm_judge
    criteria: "Response provides practical storytelling techniques for personas — techniques (the 'day in the life' structure: follow the persona through a typical day, showing when and how they encounter the product; the 'frustration moment': a specific scene showing the persona's key pain point in vivid detail — make the problem tangible; the 'quote that captures everything': one sentence in the persona's own voice that the team can reference — 'I have 13 minutes to be an engineer before I become a mom'; the 'before and after': show the persona's life without your product and with it — make the value proposition concrete), what to keep from the data (don't throw away the research — create two artifacts: the story version for daily team reference, the data version as an appendix for when teams need specific details, every narrative element should be traceable to research data — storytelling doesn't mean fiction), common storytelling mistakes (don't make the persona too perfect or too pitiful — they should be a complex, realistic person, don't add drama that isn't supported by research — the story should be authentic, don't make the persona's life revolve around your product — they have a life outside your app, keep it to 1 page — if it's longer, the storytelling isn't tight enough)."
    weight: 0.30
    description: "StorytellingTechniques"
