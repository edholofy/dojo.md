meta:
  id: intermediate-persona-shift
  level: 2
  course: user-persona-creation
  type: output
  description: "Intermediate persona shift — handle multiple intermediate-level persona challenges in a single session"
  tags: [shift, combined, assessment, intermediate]

state: {}

trigger: |
  You're the UX lead on a food delivery app redesign.
  Handle these three challenges:

  TASK 1 — Your existing persona "Hungry Hannah" was
  created 2 years ago. She's described as: "28, single,
  orders food 4x/week, lives in NYC, loves trying new
  restaurants." Recent data shows:
  - Average user age shifted from 28 to 34
  - 60% of orders are now family-sized (2+ people)
  - Reorder rate is 70% — users stick to favorites, not
    new restaurants
  - Suburban orders grew 200% while urban remained flat
  Decide: update, retire, or replace Hannah.

  TASK 2 — A product manager created a persona called
  "Everyone Eddie" — described as "25-55, any occupation,
  any location, wants convenient food." The PM says "we
  need to design for everyone." Explain why this isn't
  a useful persona and propose a better approach.

  TASK 3 — Your CEO saw a competitor's persona page and
  wants you to create "aspirational personas" — users who
  DON'T currently use the app but the CEO wishes would.
  The CEO says: "I want us to target premium diners who
  spend $100+ per order." Current data shows 95% of orders
  are under $35. Respond to the CEO's request.

  Task: Handle all three persona challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — Hannah evaluation — data-driven decision (the data contradicts nearly every Hannah attribute: age shifted from 28 to 34, single to family, new restaurants to reorder favorites, NYC urban to suburban growth — Hannah is no longer representative of the actual user base, recommend: retire Hannah and create a new primary persona based on current data — a 34-year-old suburban parent who reorders family meals from familiar restaurants), migration plan (don't just delete Hannah — document what changed and why: the user base evolved as the app matured from urban early-adopters to suburban mainstream, create the new persona grounded in current data: family ordering patterns, suburban context, reorder behavior, convenience over exploration, name the new persona and explicitly note how they differ from Hannah to help the team transition their mental model), lessons learned (personas have a shelf life — 2 years without updating allowed the persona to drift from reality, establish a quarterly data check: compare persona assumptions against current analytics, flag discrepancies early)."
    weight: 0.35
    description: "HannahEvaluation"
  - type: llm_judge
    criteria: "Response handles Task 2 — Everyone Eddie critique — why it fails (a persona that describes everyone describes no one: if Eddie is 25-55, any occupation, any location, how do you design a home screen? for a 25-year-old in NYC or a 55-year-old in suburbs? how do you write copy? casually or formally? how do you prioritize features? for speed or for selection? 'wants convenient food' is so broad it provides zero design guidance — every food delivery user wants convenient food, that's literally why the category exists), the deeper problem (the PM's 'design for everyone' philosophy sounds inclusive but is actually exclusive: designing for the average user means designing for nobody perfectly, trying to serve all users equally means no user gets a great experience), better approach (propose: create 3-4 specific personas that represent distinct behavioral segments — frequent reorderers, occasional explorers, family meal planners, late-night impulse orderers — these segments have different needs that drive different design decisions, each persona should be specific enough that you could pick them out of a crowd)."
    weight: 0.35
    description: "EveryoneEddieCritique"
  - type: llm_judge
    criteria: "Response handles Task 3 — aspirational persona request — diplomatic but data-grounded response (don't dismiss the CEO's vision — 'premium diners' may be a valid growth opportunity: but validate it first — is there evidence that premium diners would use a delivery app? what's the market size? what do competitors offer in this segment?), the risk of aspirational personas (designing for users who don't exist yet means: no research data to validate assumptions, no behavioral patterns to design around, risk of alienating the 95% of current users who order under $35 — premium features might make the core experience worse for existing users), constructive alternative (propose: create a 'potential persona' with a research plan: hypothesis — premium diners might use the app for restaurant-quality delivery, research needed — interview 10 people who spend $100+ on dining out weekly, if the research validates the segment — create a secondary persona and design features that serve premium users without degrading the core experience, if research invalidates — present the data to the CEO and redirect investment toward the validated user base), acknowledge the strategic value (the CEO's instinct about premium users might be right — higher-value orders improve unit economics, the issue isn't the goal but the method: personas should be built on evidence not aspiration)."
    weight: 0.30
    description: "AspirationalPersonaResponse"
