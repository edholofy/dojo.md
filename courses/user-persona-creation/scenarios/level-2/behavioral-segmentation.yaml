meta:
  id: behavioral-segmentation
  level: 2
  course: user-persona-creation
  type: output
  description: "Behavioral segmentation — segment users by behavior patterns rather than demographics for more actionable personas"
  tags: [behavioral, segmentation, patterns, analytics, intermediate]

state: {}

trigger: |
  You're creating personas for a music streaming service.
  Your marketing team has demographic personas:

  - "College Student" (18-22, free tier, listens on mobile)
  - "Working Professional" (25-40, premium subscriber,
    listens during commute)
  - "Parent" (30-50, family plan, plays kids music)

  Your analytics team shares behavioral data that tells
  a different story:

  Behavior Cluster 1 — "Curators" (18% of users):
  Create 10+ playlists, save 50+ songs/month, rarely use
  algorithmic recommendations, share playlists socially

  Behavior Cluster 2 — "Lean-backers" (45% of users):
  Use "play similar" or radio features exclusively, never
  create playlists, listen passively while doing other
  things, avg 3 hours/day

  Behavior Cluster 3 — "Discoverers" (22% of users):
  Listen to 100+ unique artists/month, save few songs,
  use "discover weekly" heavily, skip tracks frequently

  Behavior Cluster 4 — "Loyalists" (15% of users):
  Listen to same 30-50 artists repeatedly, rarely explore
  new music, use "library" and "liked songs" primarily

  Task: Explain why behavioral segmentation is better than
  demographic segmentation for this product, and create
  personas from the behavioral clusters.

assertions:
  - type: llm_judge
    criteria: "Response explains the superiority of behavioral segmentation — why demographics fail here (a 22-year-old college student could be a Curator, Lean-backer, Discoverer, or Loyalist — their age tells you nothing about how they use the product; a 35-year-old professional who creates 20 playlists a week and a 35-year-old professional who only listens to radio mode need completely different experiences despite identical demographics; the marketing team's demographic personas would lead to designing features for 'college students' that only serve Curators who happen to be in college), why behavior succeeds (behavioral clusters directly inform design decisions: Curators need powerful playlist tools, Lean-backers need great algorithmic recommendations, Discoverers need exploration features, Loyalists need library management; behavior predicts engagement and retention better than demographics: a Lean-backer's churn risk looks different from a Discoverer's; behavior reveals the actual value proposition each segment gets from the product — each cluster uses the same app for fundamentally different purposes), the paradigm shift (designing for 'college students' means guessing what features they need, designing for 'Curators' means knowing exactly what features matter — behavior-first segmentation replaces guesswork with evidence)."
    weight: 0.35
    description: "BehavioralSuperior"
  - type: llm_judge
    criteria: "Response creates personas from behavioral clusters — each cluster gets a persona (Curator persona: name, but defined by curation behavior not demographics — this person could be any age, their identity is built around creating and sharing musical experiences, their frustrations are about playlist management tools; Lean-backer persona: defined by passive consumption — they want music without effort, their ideal experience is pressing play and forgetting, they're the largest segment at 45% — their experience IS the default product experience; Discoverer persona: defined by exploration — they value novelty over familiarity, they use the product as a discovery engine, their metric is 'new artists found' not 'hours listened'; Loyalist persona: defined by deep relationship with specific music — they don't want recommendations for new music, they want their library organized and accessible), each persona includes: characteristic behaviors, motivations behind the behavior, frustrations that threaten the behavior, the value proposition they receive from the product."
    weight: 0.35
    description: "BehavioralPersonas"
  - type: llm_judge
    criteria: "Response addresses practical transition from demographic to behavioral personas — migration strategy (you don't have to abandon the marketing demographic personas — they serve a different purpose: demographic personas are for marketing targeting and messaging, behavioral personas are for product design and feature development, the two can coexist but should be clearly labeled for their purpose), design implications per cluster (Curator: playlist creation and sharing tools, collaborative playlists, social features; Lean-backer: auto-generated playlists, 'just play something' button, background listening optimization; Discoverer: discovery algorithms, new release highlights, genre exploration features; Loyalist: library organization, offline downloads, artist deep-dives), cross-cluster considerations (users can shift between behaviors: a Loyalist might enter a Discoverer phase when starting a new genre, design should accommodate behavioral fluidity not lock users into one cluster, track cluster transitions as a product health metric — are users moving toward active clusters or toward passive ones?)."
    weight: 0.30
    description: "PracticalTransition"
