meta:
  id: jobs-to-be-done-integration
  level: 2
  course: user-persona-creation
  type: output
  description: "Jobs-to-be-done integration — combine JTBD framework with personas for deeper user understanding"
  tags: [jtbd, jobs-to-be-done, combined-frameworks, motivation, intermediate]

state: {}

trigger: |
  Your team is debating: should we use personas or JTBD
  (Jobs to Be Done) for our new banking app? The PM says
  "JTBD is better — personas are demographic stereotypes."
  The designer says "Personas give us empathy — JTBD is
  too abstract."

  You have research data from 15 interviews:

  User segment: First-time home buyers (ages 27-35)
  - Job: "Help me understand if I can afford a house and
    guide me through the mortgage process"
  - Functional need: Compare mortgage rates, calculate
    monthly payments, understand closing costs
  - Emotional need: Feel confident making the biggest
    purchase of my life without being taken advantage of
  - Social need: Appear financially responsible to my
    partner/family

  Task: Create an integrated persona+JTBD document that
  shows how the two frameworks complement each other, and
  explain why the team shouldn't choose between them.

assertions:
  - type: llm_judge
    criteria: "Response explains the complementary nature of personas and JTBD — what JTBD provides that personas don't (JTBD focuses on the outcome users want to achieve regardless of who they are: 'help me understand if I can afford a house' is the job — whether you're 27 or 35, married or single, the job is the same; JTBD reveals functional, emotional, and social success criteria: what does 'done' look like for each dimension?; JTBD prevents designing for demographics: a 28-year-old and a 33-year-old buying their first home have the same job), what personas provide that JTBD doesn't (personas provide empathy and context: HOW does a first-time buyer in their late 20s approach this job differently than a couple in their mid-30s? what's their emotional state, their technology comfort, their support network?; personas reveal constraints: a single person has different financial constraints than a couple, a person in a high-cost city faces different challenges than someone in a rural area; personas make the abstract concrete: 'a first-time home buyer' is abstract, 'Aisha, 29, a graphic designer in Denver trying to buy her first condo' is a person you can empathize with), the integration (JTBD defines WHAT success looks like, personas define WHO is trying to achieve it and HOW their context affects the journey — together they provide both the empathy of personas and the outcome-focus of JTBD)."
    weight: 0.35
    description: "FrameworkComplementarity"
  - type: llm_judge
    criteria: "Response creates an integrated persona+JTBD document — persona section (specific person: name, age, occupation, life situation, financial context, emotional state about home buying — grounded in the interview data), JTBD section within the persona (primary job: 'When I want to buy my first home, help me understand affordability and guide me through the mortgage process, so I can make a confident decision'; functional outcomes: compare rates from multiple lenders, calculate true monthly cost including taxes and insurance, understand each step of the mortgage process before it happens; emotional outcomes: feel informed not overwhelmed, trust that the tool is showing me unbiased information, feel confident explaining mortgage details to my partner; social outcomes: demonstrate financial responsibility to my family, feel equal to peers who already own homes), the integration should feel seamless — the persona provides the human context, the JTBD provides the outcome structure, and together they tell a complete story of who this person is and what they need to accomplish."
    weight: 0.35
    description: "IntegratedDocument"
  - type: llm_judge
    criteria: "Response addresses the team debate constructively — resolve the PM's concern (JTBD IS better than demographic stereotypes — but well-made personas aren't demographic stereotypes, they're behavioral profiles with emotional depth, the PM's criticism applies to BAD personas, not to personas as a framework, suggest: 'Let's agree that our personas will be behavior-driven with JTBD embedded — that addresses your concern about stereotypes while keeping the empathy our designer values'), resolve the designer's concern (JTBD isn't too abstract when paired with a persona — the persona makes the job tangible by showing a specific person trying to accomplish it, without personas, JTBD risks designing for 'a user' without understanding their emotional context, fears, and constraints), practical integration for the team (use JTBD to define feature requirements: what outcomes must the app deliver?, use personas to guide experience design: how should the app feel for this person?, use both together for prioritization: which jobs matter most for our primary personas?, suggest a unified template that the team can use going forward)."
    weight: 0.30
    description: "TeamDebateResolution"
