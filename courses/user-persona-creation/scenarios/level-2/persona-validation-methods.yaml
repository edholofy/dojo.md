meta:
  id: persona-validation-methods
  level: 2
  course: user-persona-creation
  type: output
  description: "Persona validation methods — validate persona accuracy against real user behavior and stakeholder feedback"
  tags: [validation, verification, accuracy, testing, intermediate]

state: {}

trigger: |
  You created 3 personas for an e-commerce fashion app
  6 months ago. The product team has been designing based
  on them. Now you need to validate whether the personas
  are still accurate. Here are the personas and some
  concerning signals:

  Persona 1 — "Trendy Tara" (25, fashion-forward):
  - Assumed: shops weekly, follows trends, high spend
  - Reality: analytics show the 25-30 segment actually
    shops biweekly and spends less than predicted

  Persona 2 — "Practical Patricia" (42, value-conscious):
  - Assumed: shops during sales, compares prices, bulk buys
  - Reality: this segment has the highest return rate (40%),
    suggesting they buy to try, not to keep

  Persona 3 — "Gift-Giver Greg" (35, shops for others):
  - Assumed: shops seasonally, needs gift wrapping, wants
    recommendations
  - Reality: this segment barely exists in the data —
    less than 5% of users fit this profile

  Task: Design a validation study to test all 3 personas
  and recommend updates based on the concerning signals.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive validation study — validation methodology (multi-method approach: 1. Behavioral data audit — compare each persona's assumed behaviors against 6 months of actual analytics data, quantify discrepancies; 2. User interviews — recruit 4-6 users from each persona's target segment, conduct interviews testing persona assumptions against real behaviors and motivations; 3. Survey validation — larger sample survey testing specific persona attributes like shopping frequency, motivation, and decision factors; 4. Stakeholder feedback — gather input from customer service, marketing, and product teams on whether personas match the customers they interact with), for each persona assess (behavioral accuracy — do real users behave as the persona predicts?, motivational accuracy — do real users have the goals and frustrations the persona describes?, demographic accuracy — does the persona's demographic profile match the actual user segment?, size accuracy — is this persona's segment as large as assumed?)."
    weight: 0.35
    description: "ValidationStudy"
  - type: llm_judge
    criteria: "Response addresses each persona's concerning signals — Tara validation (the biweekly shopping and lower spend contradicts the 'shops weekly, high spend' assumption — investigate: is the persona's spending assumption based on aspiration rather than reality? is the lower spend due to app limitations or economic factors? should the persona be updated to reflect actual behavior or should the app be redesigned to encourage the assumed behavior? — this is a critical question: do you update the persona to match reality or try to change reality to match the persona?), Patricia validation (40% return rate is a major signal — the assumed 'value-conscious bulk buyer' is actually a 'try before you buy' shopper — this fundamentally changes the persona's relationship with the app: she's not comparing prices, she's using the app as a virtual fitting room, this has massive design implications: the return process becomes a core feature not an edge case), Greg invalidation (less than 5% of users is below the threshold for a viable persona — options: retire the persona entirely, merge gift-giving behavior into other personas as a secondary behavior, or investigate whether the persona was based on bad assumptions about who uses the platform — maybe gift-givers use other platforms)."
    weight: 0.35
    description: "PersonaSpecificValidation"
  - type: llm_judge
    criteria: "Response provides update recommendations and ongoing validation — persona updates (Tara: update shopping frequency and spend to match reality, investigate whether aspirational assumptions need correction or whether app improvements could increase frequency; Patricia: fundamentally revise — she's a 'try-at-home' shopper, update goals and behaviors to reflect try-and-return pattern, redesign implications: easy returns, virtual try-on, size recommendations; Greg: recommend retiring or downgrading to a behavioral mode that occurs across personas rather than a standalone persona, reinvest research effort into discovering who the actual third segment is), ongoing validation framework (don't wait 6 months again: monthly behavior-to-persona comparison dashboard tracking key metrics per segment, quarterly quick validation checks — are the personas still predicting behavior accurately?, annual comprehensive validation study with qualitative research, trigger-based validation — if any key metric deviates more than 20% from persona prediction, trigger an investigation), lessons learned (personas are hypotheses about users, not facts — they need continuous testing, the gap between assumed and actual behavior reveals design opportunities, validate early and often — 6 months of building on inaccurate personas could have been caught sooner with a lightweight monthly check)."
    weight: 0.30
    description: "UpdatesAndOngoing"
