meta:
  id: persona-for-edge-cases
  level: 2
  course: user-persona-creation
  type: output
  description: "Persona for edge cases — create personas that represent edge case users to ensure inclusive and robust design"
  tags: [edge-cases, inclusive, accessibility, extreme-users, intermediate]

state: {}

trigger: |
  Your team is designing an online banking app. The
  primary personas are well-established. Your UX lead
  says: "Our primary personas are great for the 80%. But
  we're getting complaints from users our personas don't
  represent. Create edge case personas for:"

  1. A 78-year-old user with low vision who uses screen
     magnification and has never used mobile banking before
  2. A 19-year-old user who is unbanked (first bank account
     ever), has no credit history, and speaks English as
     a second language
  3. A user managing finances during a domestic abuse
     situation who needs to hide their banking activity
     from a partner who monitors their phone

  Task: Create edge case personas for all 3 users and
  explain why edge case personas matter for the product.

assertions:
  - type: llm_judge
    criteria: "Response creates 3 distinct edge case personas — elderly/low vision persona (specific person with name and backstory: why they're starting mobile banking now, what assistive technology they use, their relationship with technology and with their bank branch, fears about making mistakes with money online, frustrations with small text and complex navigation — this persona tests accessibility, onboarding, and error prevention), unbanked young user (specific person navigating the financial system for the first time: why they were unbanked — family situation, immigration, homelessness?, what financial tools they've used instead — cash apps, prepaid cards?, language barriers in financial terminology, lack of credit history creating systemic barriers — this persona tests financial literacy assumptions, language accessibility, and onboarding for first-time users), abuse situation persona (this requires extreme sensitivity: a person who needs to manage finances secretly, concerns about notification settings visible to an abusive partner, need for private browsing/session management, ability to hide the app or access banking without the app, emergency access to funds — this persona tests privacy, security, and safety features that most design processes never consider)."
    weight: 0.35
    description: "EdgeCasePersonas"
  - type: llm_judge
    criteria: "Response explains why edge case personas matter — design for the edges improves the middle (designing for a 78-year-old with low vision means larger touch targets, clearer labels, and simpler navigation — these improvements help ALL users, the 'curb cut effect' — curb cuts designed for wheelchairs help everyone with strollers, luggage, and bicycles), legal and ethical obligations (accessibility is not optional — ADA and WCAG compliance requires designing for users with disabilities; financial inclusion for unbanked users is both an ethical imperative and a market opportunity; safety for abuse survivors is a literal life-or-death design consideration), business case (the elderly population is growing and controlling more wealth — ignoring them is leaving money on the table; the unbanked population represents 4.5% of US households — first-bank-account users become lifetime customers if the experience is good; safety features become competitive differentiators and generate positive press and trust), each edge case persona should include: specific design implications that wouldn't emerge from primary personas alone."
    weight: 0.35
    description: "WhyEdgeCasesMatter"
  - type: llm_judge
    criteria: "Response provides design implications specific to each edge case — elderly/low vision implications (minimum font size of 16px, high contrast mode, voice-over compatibility, simplified navigation with clear hierarchy, error messages that explain exactly what happened and what to do, phone support integration — not just chat, onboarding that assumes no prior mobile banking experience), unbanked user implications (financial literacy integrated into the experience — don't assume users know what 'routing number' means, multi-language support beyond translation — culturally appropriate financial guidance, alternative identity verification for users without traditional documentation, progressive account features — don't overwhelm with options on day one), abuse situation implications (private notification settings — ability to turn off all notifications or make them generic, quick-exit button that immediately navigates to an innocuous screen, no auto-login or visible app badges that reveal banking activity, ability to access account via web browser without installing the app, support team trained in financial abuse situations, secure communication channels that don't leave traces on the device — these features are life-safety requirements not nice-to-haves)."
    weight: 0.30
    description: "DesignImplications"
