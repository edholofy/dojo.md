meta:
  id: research-backed-personas
  level: 2
  course: user-persona-creation
  type: output
  description: "Research-backed personas — create personas grounded in multiple research methods and validated data sources"
  tags: [research, data-backed, validation, evidence, intermediate]

state: {}

trigger: |
  Your team is redesigning a telehealth platform. You have
  access to multiple data sources:

  Quantitative (from analytics, N=50,000):
  - 62% of appointments are from patients 45+
  - Peak usage: Mon-Wed, 8-10 AM and 6-8 PM
  - Average appointment duration: 12 min
  - 35% of patients use mobile, 65% desktop
  - Repeat visit rate: 40% return within 30 days

  Qualitative (from 12 interviews):
  - Patients value not having to travel to the doctor
  - Many are managing chronic conditions (diabetes, HTN)
  - Biggest fear: "Will the doctor actually examine me?"
  - Tech comfort varies widely — some need family help
  - Rural patients have limited broadband — video quality
    issues

  Support data (from 500 tickets):
  - #1 issue: "How do I share my screen with the doctor?"
  - #2 issue: "My video keeps freezing"
  - #3 issue: "I can't find my lab results after the visit"

  Task: Create a research-backed persona that synthesizes
  all three data sources with clear attribution.

assertions:
  - type: llm_judge
    criteria: "Response synthesizes all three data sources — quantitative integration (the persona should reflect the dominant segment: 45+ age, desktop-primary, peak morning or evening user, likely managing chronic conditions given the 40% repeat visit rate within 30 days — these aren't random data points but interconnected behavioral patterns), qualitative depth (the persona should incorporate interview insights: values avoiding travel, managing chronic conditions, concerned about examination quality, varying tech comfort — these add emotional and motivational depth that analytics alone cannot provide), support data as frustration evidence (the top 3 support issues become concrete frustrations in the persona: screen sharing confusion, video quality problems, lab result accessibility — these are validated pain points from real user behavior not assumed frustrations), clear attribution (each persona element should note its source: 'Based on analytics: uses desktop primarily for appointments' vs 'Based on interviews: values not having to travel due to mobility concerns' vs 'Based on support data: frequently struggles to find lab results post-visit' — this makes the persona's evidence basis transparent and updateable)."
    weight: 0.35
    description: "DataSynthesis"
  - type: llm_judge
    criteria: "Response demonstrates research triangulation — convergent findings (identify where all three sources agree: chronic condition management is supported by repeat visits quantitatively, chronic condition mentions in interviews, and repeated lab result access issues in support — this convergence strengthens the persona element), divergent findings (note where sources disagree or reveal different perspectives: analytics shows 65% desktop but interviews mention tech comfort issues — the desktop preference might be because the mobile experience is too difficult, not because users prefer desktop; the 12-min appointment duration seems short for chronic condition management — is this adequate or a sign of rushed appointments?), gaps to fill (acknowledge what the data doesn't tell you: no demographic data beyond age, no income or insurance information, no data on patients who tried telehealth and abandoned it — these are research gaps that should inform the next round of research)."
    weight: 0.35
    description: "Triangulation"
  - type: llm_judge
    criteria: "Response creates a complete, high-quality persona — persona document (name, specific age within 45+ range, occupation or retirement status, chronic condition being managed, living situation reflecting rural broadband challenges, technology setup and comfort level, relationship with healthcare — frequency, trust, concerns), the persona should feel like a real person informed by data not a statistical composite ('Margaret, 58, retired teacher in rural Kentucky, manages Type 2 diabetes with quarterly telehealth check-ins, uses her desktop computer in the living room with her daughter's help for video setup'), design implications grounded in data (each design recommendation traces to specific data: lab result accessibility needs improvement per support data, video quality settings should auto-adjust for low bandwidth per rural broadband issues, onboarding should include screen sharing tutorial per #1 support issue), and secondary persona suggestion (briefly note that the 35% mobile users under 45 represent a different segment that warrants its own persona — don't try to make one persona represent everyone)."
    weight: 0.30
    description: "PersonaQuality"
