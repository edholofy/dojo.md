meta:
  id: proto-persona-workshop
  level: 1
  course: user-persona-creation
  type: output
  description: "Proto-persona workshop — create quick assumption-based personas when formal research isn't available yet"
  tags: [proto-persona, assumptions, workshop, lean, beginner]

state: {}

trigger: |
  Your startup is building a pet care marketplace. You
  have no budget for formal user research yet, but the
  team needs personas to guide initial design decisions.
  Your PM says: "Let's create proto-personas based on what
  we think we know. We'll validate them later with real
  research."

  Team assumptions:
  - Primary users are pet owners aged 25-45
  - They spend $100-300/month on pet care
  - They struggle to find reliable pet sitters and groomers
  - They want reviews and ratings before booking
  - Some are first-time pet owners, others are experienced
  - Dog owners and cat owners have different needs
  - Urban users have more options but less time to research
  - Suburban users have fewer options but more flexibility

  Task: Create 2 proto-personas and explain the methodology,
  limitations, and validation plan.

assertions:
  - type: llm_judge
    criteria: "Response creates 2 distinct proto-personas — persona differentiation (the two personas should represent meaningfully different user segments, not just demographic variations: e.g., 'anxious first-time pet owner' vs 'experienced multi-pet household', or 'time-poor urban professional' vs 'budget-conscious suburban family' — the personas should have different goals, different pain points, and different decision-making patterns), each proto-persona includes (name, demographics, pet type and situation, primary goal with the marketplace, main frustrations with current alternatives, decision factors — what matters most when choosing a service, comfort level with technology and online booking), the personas should be specific enough to differentiate design decisions (if both personas would make the same design choices, they're not distinct enough)."
    weight: 0.35
    description: "ProtoPersonas"
  - type: llm_judge
    criteria: "Response explains proto-persona methodology — what proto-personas are (assumption-based personas created without formal research — they represent the team's best hypotheses about users, used to align the team and guide early decisions, NOT a substitute for research-backed personas), when to use them (early-stage startups before research budget, project kickoffs to align team assumptions, as a starting point that will be validated — never as a final artifact), how to create them (collaborative workshop format: each team member writes their assumptions, team discusses and synthesizes, identify areas of agreement and disagreement — disagreements are the most valuable because they highlight assumptions that need testing), limitations clearly stated (these are ASSUMPTIONS not facts — every element needs validation, proto-personas can reinforce team biases rather than reveal user truth, the team likely shares blind spots — the personas will reflect what the team thinks, not what users actually experience, there's a risk of treating proto-personas as validated — they must be explicitly labeled as 'hypotheses to test')."
    weight: 0.35
    description: "Methodology"
  - type: llm_judge
    criteria: "Response includes a validation plan — research plan to validate (step 1: identify the highest-risk assumptions in each proto-persona — which assumptions, if wrong, would most change the design? step 2: design 5-8 user interviews targeting these assumptions, step 3: recruit participants that match AND don't match the proto-persona demographics — you might be wrong about who your users are, step 4: compare interview findings to proto-persona assumptions — update, revise, or discard personas based on data), specific assumptions to validate (are the personas the right segments? do the pain points match real user frustrations? are the decision factors accurate? are there user types the team hasn't considered?), timeline (recommend: validate within 4-6 weeks of creating proto-personas, don't build too much on unvalidated assumptions — use proto-personas for early ideation but validate before committing to a design direction)."
    weight: 0.30
    description: "ValidationPlan"
