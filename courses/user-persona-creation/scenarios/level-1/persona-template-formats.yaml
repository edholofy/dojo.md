meta:
  id: persona-template-formats
  level: 1
  course: user-persona-creation
  type: output
  description: "Persona template formats — choose and create the right persona format for different audiences and purposes"
  tags: [templates, formats, presentation, communication, beginner]

state: {}

trigger: |
  You've completed user research for a B2B project
  management tool and created a detailed persona. Now you
  need to present the persona to 3 different audiences:

  1. The design team — needs detailed behavioral data,
     interaction patterns, and design implications
  2. The sales team — needs to understand who this customer
     is, what they care about, and how to talk to them
  3. The executive team — needs the high-level story in
     under 2 minutes

  Persona data you have:
  - Name: Rachel Torres, 36, Operations Director
  - Manages a team of 15 at a mid-size logistics company
  - Spends 3 hours/day in meetings, manages projects via
    spreadsheets and Slack
  - Frustrated by lack of visibility into project status
  - Evaluated 4 PM tools in the past year, abandoned each
  - Decision factors: team adoption ease, mobile access,
    integration with existing tools
  - Budget authority: up to $50K without CEO approval
  - Quote: "I need to know what's falling behind before
    my CEO asks me"

  Task: Create 3 different persona presentations for the
  3 audiences, explaining format choices.

assertions:
  - type: llm_judge
    criteria: "Response creates 3 distinct persona formats — design team format (detailed persona document: full demographics, behavioral patterns, interaction preferences, technology ecosystem, daily workflow, pain points with current tools, design implications, empathy map elements, usage scenarios — this is the comprehensive reference document the design team will use daily), sales team format (customer profile card: who Rachel is in business context, her buying journey, decision factors, objections she'll raise based on past tool abandonment, how to position the product against her specific frustrations, language she uses — 'visibility into project status', 'falling behind' — sales should mirror her language, budget information and approval process), executive format (persona snapshot: one-page or one-slide format with: photo placeholder, key quote, 3 bullet points on who she is, 3 bullet points on why she matters to the business, the business opportunity this persona represents — '$50K budget authority, manages 15 people, evaluated 4 competitors — she's an active buyer looking for the right solution')."
    weight: 0.35
    description: "ThreeFormats"
  - type: llm_judge
    criteria: "Response explains format decisions — why different audiences need different formats (the same persona data presented in a 10-page document will be read by designers, ignored by sales, and rejected by executives — format is audience communication, not just aesthetics), design team rationale (designers need depth: behavioral patterns, emotional states, scenarios, design implications — they'll reference this document throughout the project, more detail enables better design decisions), sales team rationale (sales needs actionable intelligence: how to identify this persona in a discovery call, what to say, what to avoid, how to handle objections — they don't need design details, they need customer understanding), executive team rationale (executives need the 'so what': who is this person, why do they matter to our business, what's the opportunity — 2 minutes maximum, visual format preferred, lead with the business case not the research methodology)."
    weight: 0.35
    description: "FormatRationale"
  - type: llm_judge
    criteria: "Response addresses common format pitfalls — common mistakes (creating one persona document and sending it to everyone — this ensures nobody reads it effectively; including too much information — executives don't read 10-page personas; including too little information — designers can't design from a one-pager; using design jargon with non-design audiences — 'empathy map' and 'mental model' mean nothing to sales; making personas look like marketing segments — personas describe individual people with behaviors, not market categories with demographics), practical advice (start with the comprehensive design version, then create derivative formats for other audiences — don't create three separate personas, create three presentations of the same persona; keep all versions consistent — the core persona is the same, the framing changes; update all versions when the persona is updated — stale personas in circulation cause confusion; make personas accessible — post them where each team actually works: design wall, sales playbook, strategy deck)."
    weight: 0.30
    description: "FormatPitfalls"
