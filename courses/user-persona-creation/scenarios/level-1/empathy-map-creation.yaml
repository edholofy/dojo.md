meta:
  id: empathy-map-creation
  level: 1
  course: user-persona-creation
  type: output
  description: "Empathy map creation — build an empathy map to capture what a user thinks, feels, says, and does"
  tags: [empathy-map, emotions, behavior, observation, beginner]

state: {}

trigger: |
  Your team completed 6 user interviews for a personal
  finance app. The research lead asks you to create an
  empathy map for the primary persona. Here are key quotes
  and observations from the interviews:

  What users SAID:
  - "I know I should save more but I don't know where to
    start"
  - "Budgeting apps make me feel judged"
  - "I check my bank balance obsessively but avoid looking
    at my credit card statement"

  What users DID (observed):
  - 4/6 users had multiple banking apps but used none
    regularly
  - Users opened the finance app then immediately closed it
    during testing
  - 3/6 users had sticky notes with budget reminders

  What users seemed to FEEL:
  - Anxiety when showing their financial situation
  - Relief when told "there's no wrong answer"
  - Embarrassment about financial knowledge gaps

  What users likely THINK (inferred):
  - "Everyone else has this figured out"
  - "If I ignore it, it's not a problem"
  - "Financial tools are for people who are already good
    with money"

  Task: Create a complete empathy map that synthesizes
  these observations into actionable insights.

assertions:
  - type: llm_judge
    criteria: "Response creates a properly structured empathy map — four quadrants clearly defined (Says: direct quotes and paraphrased statements from interviews, preserving user voice and language; Thinks: inferred beliefs and mental models — what users likely believe but didn't explicitly say, noting these are inferences that need validation; Feels: emotional states observed during interviews — anxiety, relief, embarrassment, and the underlying emotional relationship with money and financial tools; Does: observable behaviors and actions — app avoidance, obsessive balance checking, sticky note workarounds, multiple unused apps), each quadrant should contain 3-5 synthesized items that represent patterns across the 6 interviews not just individual quotes."
    weight: 0.35
    description: "EmpathyMapStructure"
  - type: llm_judge
    criteria: "Response identifies tensions and contradictions — key tensions (checking bank balance obsessively BUT avoiding credit card statements — this reveals selective avoidance driven by anxiety, having multiple finance apps BUT using none — tool availability isn't the problem, wanting to save BUT not knowing where to start — knowledge gap combined with emotional barrier, acknowledging need to budget BUT feeling judged by budgeting tools — emotional safety is a prerequisite), these tensions are the most valuable insights because they reveal design opportunities: the app needs to be non-judgmental, provide starting points not just tracking, address emotional barriers before functional ones."
    weight: 0.35
    description: "TensionsAndInsights"
  - type: llm_judge
    criteria: "Response connects the empathy map to design implications — actionable insights (the empathy map should lead to specific design directions: emotional safety first — onboarding should normalize financial uncertainty, not assume competence; gentle entry points — start with simple actions like 'check your balance' before asking users to budget; non-judgmental tone — avoid terms like 'overspending' or 'you should'; make progress visible — counter the 'everyone else has this figured out' belief by showing that progress is relative), and explanation of empathy map methodology (when to use empathy maps: after user research to synthesize findings, how they differ from personas: empathy maps capture emotional and cognitive states while personas capture demographics and behaviors — they complement each other, how to use them: post them visibly for the team as a reference during design decisions)."
    weight: 0.30
    description: "DesignImplications"
