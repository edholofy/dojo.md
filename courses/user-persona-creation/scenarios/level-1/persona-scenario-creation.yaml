meta:
  id: persona-scenario-creation
  level: 1
  course: user-persona-creation
  type: output
  description: "Persona scenario creation — write realistic usage scenarios that bring personas to life and guide design decisions"
  tags: [scenarios, usage, storytelling, context, beginner]

state: {}

trigger: |
  You've created a persona for a grocery delivery app:

  Name: David Chen, 38
  Occupation: Remote software developer
  Household: Lives with partner and 2 kids (ages 4 and 7)
  Goal: Get weekly groceries delivered without spending
  more than he would in-store
  Frustration: Substitutions are always wrong — he ordered
  organic bananas and got regular, requested whole milk
  and got 2%
  Behavior: Orders groceries Sunday evening for Monday
  delivery, spends 25 min building the order
  Tech: Comfortable with apps, uses phone primarily

  Your lead says: "This persona is fine but it's static.
  I need you to write 3 scenarios that show David actually
  using the app. Make them realistic — show the moments
  where the design matters."

  Task: Write 3 usage scenarios for this persona that
  reveal design opportunities.

assertions:
  - type: llm_judge
    criteria: "Response writes 3 distinct, realistic scenarios — scenario differentiation (each scenario should cover a different usage context and reveal different design challenges: Scenario 1 — the happy path: David's regular Sunday evening order, showing the ideal experience and what 'good' looks like; Scenario 2 — the substitution problem: David receives an order with wrong substitutions, showing the frustration moment and how the app handles or fails to handle it; Scenario 3 — an edge case: something unexpected — maybe David needs to add items mid-week, or his partner needs to modify the order, or there's a delivery time conflict — this tests flexibility), each scenario should be a narrative showing David in his context — at home on Sunday evening with kids in the background, checking his phone during Monday delivery, dealing with incorrect items."
    weight: 0.35
    description: "ScenarioVariety"
  - type: llm_judge
    criteria: "Response includes design-relevant moments in each scenario — decision points (each scenario should highlight moments where the app's design makes a difference: in the ordering scenario — how does David build a list from scratch vs repeat a previous order? can he share the list with his partner? does the 25-min ordering time seem efficient or wasteful?; in the substitution scenario — was David asked about substitution preferences? can he set 'no substitution' for specific items? how is he notified about substitutions — before or after delivery?; in the edge case — how does the app handle unexpected needs?), emotional context (show David's emotional state at each moment: relaxed on Sunday evening building the order, frustrated when substitutions are wrong, stressed when the delivery is late and dinner plans depend on it), the scenarios should reveal what the persona section alone cannot: the gap between the user's expectation and the app's behavior."
    weight: 0.35
    description: "DesignMoments"
  - type: llm_judge
    criteria: "Response connects scenarios to design implications — each scenario leads to design questions (Scenario 1 questions: how to reduce the 25-min ordering time? should the app suggest a repeated order? can it learn David's preferences?; Scenario 2 questions: how to prevent wrong substitutions? should the app ask for substitution preferences per item? how to communicate substitutions before delivery?; Scenario 3 questions: how to handle multi-user household needs? how to modify orders after submission?), scenarios should be specific enough to drive design discussions ('David scrolls through 200 items looking for organic bananas' is more useful than 'David searches for bananas'), and scenarios should avoid being prescriptive about solutions — they describe the user's experience and problems, not how the app should work."
    weight: 0.30
    description: "ScenarioToDesign"
