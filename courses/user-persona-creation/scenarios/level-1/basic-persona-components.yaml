meta:
  id: basic-persona-components
  level: 1
  course: user-persona-creation
  type: output
  description: "Basic persona components — create a user persona with core elements: name, demographics, goals, frustrations, and context"
  tags: [basics, demographics, goals, frustrations, beginner]

state: {}

trigger: |
  You're a junior UX designer starting your first project
  — a meal planning app for busy professionals. Your lead
  says: "Before we design anything, create a user persona.
  Include the basics: name, age, occupation, goals, pain
  points, and a brief scenario of how they'd use the app."

  You have these research notes from 5 user interviews:
  - Users are 28-42, mostly working parents
  - They spend 30-45 min daily deciding what to cook
  - Most plan meals on Sunday but abandon the plan by Wed
  - Top frustration: grocery lists don't match what they
    planned
  - They want healthy meals but default to fast food when
    tired
  - Budget is a concern but not the primary driver

  Task: Create a complete user persona based on these
  research notes.

assertions:
  - type: llm_judge
    criteria: "Response creates a well-structured persona with all core components — identity (realistic name, age within the 28-42 range, occupation that reflects 'busy professional', family status reflecting 'working parent' — the persona should feel like a real person not a stereotype), demographics and context (household size, location type, income range that aligns with 'budget concern but not primary driver', tech comfort level, daily routine overview), goals (primary: eat healthier meals consistently through the week, secondary: reduce time spent on meal decisions, tertiary: stick to a plan beyond Wednesday, aspirational: be the parent who feeds their family well without stress), frustrations and pain points (grocery lists disconnected from meal plans, meal plan abandonment mid-week when energy drops, defaulting to fast food despite wanting to be healthier, the Sunday planning ritual that doesn't survive reality), the persona should synthesize the interview data not just repeat it — show patterns and insights."
    weight: 0.35
    description: "PersonaStructure"
  - type: llm_judge
    criteria: "Response includes behavioral context and usage scenario — behaviors (current meal planning habits: Sunday batch planning that degrades, decision fatigue by Wednesday, impulse fast food ordering when tired, grocery shopping patterns), technology relationship (what apps/tools they currently use for food — notes app, recipe bookmarks, grocery delivery, how they interact with their phone during cooking), a day-in-the-life scenario (show the persona's typical day: morning rush, work, evening decision point about dinner — this is where the meal planning app would intervene, highlight the emotional state at each decision point: stressed, tired, guilty about fast food), and a quote that captures the persona's voice ('I start every week determined to eat healthy, and by Wednesday I'm ordering pizza because I'm too exhausted to think about cooking')."
    weight: 0.35
    description: "BehavioralContext"
  - type: llm_judge
    criteria: "Response demonstrates persona quality — specificity (the persona should be specific enough to make design decisions: not 'a busy person' but a person with particular constraints, habits, and emotional patterns), research grounding (every element of the persona should trace back to the interview notes — don't invent characteristics that aren't supported by the data, if something is assumed beyond the data, note it as an assumption to validate), design implications (briefly note how each persona element should influence design: the Wednesday abandonment point suggests the app needs mid-week re-engagement, the grocery-plan disconnect suggests integrated shopping lists, the fatigue factor suggests very low-effort interaction at decision points), and avoidance of common mistakes (not too generic — 'Sarah likes technology' is useless, not a marketing segment — personas describe behavior not purchasing habits, not aspirational — describe who the user IS not who you want them to be)."
    weight: 0.30
    description: "PersonaQuality"
