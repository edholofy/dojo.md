meta:
  id: first-persona-shift
  level: 1
  course: user-persona-creation
  type: output
  description: "First persona shift — handle multiple beginner persona creation challenges in a single session"
  tags: [shift, combined, assessment, beginner]

state: {}

trigger: |
  You're a UX designer starting a new project — a
  community volunteering platform. Handle these three
  tasks:

  TASK 1 — Your PM hands you survey data from 200
  respondents about volunteering habits:
  - 65% volunteer monthly, 20% weekly, 15% rarely
  - Top motivations: "give back" (45%), "meet people" (30%),
    "build skills" (25%)
  - Ages: 22-30 (40%), 31-45 (35%), 46-65 (25%)
  - 70% prefer short-term projects (1 day), 30% prefer
    ongoing commitments
  - 80% use phones for volunteering coordination
  - Top frustration: "I want to volunteer but can't find
    opportunities that fit my schedule"
  Create a primary persona from this quantitative data.

  TASK 2 — A stakeholder says: "I volunteer every weekend
  at the animal shelter. Make the persona based on me."
  Explain why a single stakeholder shouldn't be the basis
  for a persona and how to handle this diplomatically.

  TASK 3 — Your developer asks: "Why do we need personas?
  Can't we just build features based on the requirements
  doc?" Write a concise explanation of why personas matter
  for product development.

  Task: Handle all three persona challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — quantitative persona creation — synthesizes survey data into a specific person (not a statistical average: pick the largest segment — likely a 22-30 year old who volunteers monthly, motivated by giving back and meeting people, prefers short-term projects, uses phone, frustrated by schedule matching — but make them a specific individual not a demographic composite), the persona should reflect the majority patterns while noting the diversity (the persona represents the 40% largest age group combined with the 65% monthly volunteering pattern — but acknowledge that weekly volunteers and skill-builders are secondary personas), includes all persona components (name, specific age, occupation, living situation, volunteering history, motivations mapped to the survey data, frustrations, technology usage, a realistic scenario of how they'd use the platform), design implications from the data (schedule flexibility is the #1 issue — the platform's core value proposition must be matching volunteer availability to opportunities, phone-first design given 80% mobile usage)."
    weight: 0.35
    description: "QuantitativePersona"
  - type: llm_judge
    criteria: "Response handles Task 2 — stakeholder persona request — diplomatic but firm explanation (acknowledge the stakeholder's volunteering experience as valuable input: 'Your experience is really helpful context — thank you for sharing it', but explain why one person doesn't make a persona: 'Personas need to represent patterns across many users so we design for our actual audience, not just one perspective', the risk: building a product for the stakeholder means building for a power user who volunteers weekly at a specific location — this doesn't represent the 65% who volunteer monthly or the 70% who prefer short-term projects), how to include the stakeholder constructively (invite them to participate in user research — their experience is one data point that should be part of the research pool, if their pattern is common across multiple users, it may become a secondary persona, validate their experience against broader data — maybe weekly animal shelter volunteers ARE a segment, but it needs data beyond one person), what happens when you build for one person (you get a product that works perfectly for that person and poorly for everyone else — this is a common startup failure mode where the founder builds for themselves)."
    weight: 0.35
    description: "StakeholderHandling"
  - type: llm_judge
    criteria: "Response handles Task 3 — justifying personas to developers — concise and developer-relevant explanation (translate persona value into terms a developer understands: personas answer 'who are we building this for?' — without that answer, every feature decision is a guess; requirements docs tell you WHAT to build, personas tell you WHO you're building it for and WHY — both are necessary; example: the requirements doc says 'build a search feature' — the persona tells you that users are searching on phones with one hand while commuting, which means the search needs to be thumb-reachable with autocomplete, not a desktop-style search page), practical benefits for developers (personas prevent scope creep by providing a filter: 'does our persona need this feature?', personas help prioritize edge cases: which edge cases matter for our actual users vs hypothetical users?, personas make user stories concrete: instead of 'as a user' the story becomes 'as [persona name] who is [context]'), keep it brief — developers appreciate concise communication not lengthy UX methodology lectures."
    weight: 0.30
    description: "DeveloperJustification"
