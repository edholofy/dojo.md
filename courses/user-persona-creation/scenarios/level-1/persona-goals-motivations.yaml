meta:
  id: persona-goals-motivations
  level: 1
  course: user-persona-creation
  type: output
  description: "Persona goals and motivations — articulate user goals at functional, emotional, and social levels"
  tags: [goals, motivations, needs, hierarchy, beginner]

state: {}

trigger: |
  You're creating a persona for an online learning platform.
  Research data:

  User segment: Career changers (age 28-40)
  - They want to learn new skills to switch careers
  - They're anxious about being "too old" to change
  - They study at night after work and family obligations
  - They compare themselves to younger learners
  - They need proof of competence (certificates, portfolios)
  - They're motivated by stories of successful career
    changers
  - They drop off courses when they feel overwhelmed
  - They want structured paths, not open-ended options

  Task: Create a persona with well-articulated goals at
  three levels: functional (what they need to DO),
  emotional (how they want to FEEL), and social (how they
  want to be PERCEIVED).

assertions:
  - type: llm_judge
    criteria: "Response articulates three levels of goals — functional goals (what the user needs to accomplish: complete a structured learning path that leads to employable skills, earn certificates or credentials that prove competence to employers, build a portfolio of work that demonstrates capability, find a job in their target field within a defined timeframe), emotional goals (how the user wants to feel: confident that career change is possible 'at their age', competent and progressing — not overwhelmed or behind, supported and not alone in the journey, proud of taking a brave step), social goals (how the user wants to be perceived: seen as competent and hireable by potential employers, respected by peers and family for making a bold career move, not pitied or seen as 'starting over' — reframed as 'leveling up', validated by success stories of others like them), each goal level should be specific to the career changer context not generic learning goals."
    weight: 0.35
    description: "ThreeLevelGoals"
  - type: llm_judge
    criteria: "Response creates a complete persona around the goal structure — persona profile (realistic name, age within 28-40 range, current occupation they want to leave, target career, family situation that creates time constraints, educational background), behavioral patterns (studies at night after family responsibilities — typically 8-10 PM, progresses in bursts — motivated weeks followed by overwhelmed weeks, compares their progress to younger learners on the platform — this triggers imposter syndrome, seeks validation through certificates and completion milestones, motivated by community success stories — these are emotional fuel), frustrations specific to goal levels (functional: courses that don't lead to clear outcomes, emotional: feeling behind or 'too old', social: LinkedIn profile that shows 'student' not 'professional in transition'), a quote that captures the intersection of all three goal levels ('I need to know this path actually leads somewhere — that I'm not just collecting certificates while my real career stalls')."
    weight: 0.35
    description: "PersonaAroundGoals"
  - type: llm_judge
    criteria: "Response connects goals to design implications — design for functional goals (structured career paths with clear milestones and estimated timelines, 'hire-ready' indicators that show progress toward employability, portfolio-building exercises integrated into courses not separate), design for emotional goals (age-inclusive design — avoid 'young coder' imagery and language, progress visualization that shows cumulative growth not comparison, manageable learning chunks for nighttime study sessions — 15-20 min modules, 'you're not behind' messaging throughout the experience), design for social goals (shareable credentials and portfolio pieces, career changer community — not mixed with traditional learners, success story features that match the persona's demographic, LinkedIn integration that frames the journey positively), and explanation of why three-level goals matter (functional goals drive feature requirements, emotional goals drive tone and experience design, social goals drive sharing and community features — addressing only functional goals creates a technically adequate but emotionally hollow product)."
    weight: 0.30
    description: "GoalToDesign"
