meta:
  id: persona-anti-patterns
  level: 1
  course: user-persona-creation
  type: output
  description: "Persona anti-patterns — identify and fix common mistakes in poorly constructed personas"
  tags: [anti-patterns, mistakes, quality, critique, beginner]

state: {}

trigger: |
  A colleague asks you to review their persona before a
  design review. Here's what they wrote:

  "PERSONA: Tech-Savvy Millennial
  Age: 25-35
  Gender: Any
  Likes: Technology, social media, avocado toast, Netflix
  Dislikes: Phone calls, long emails, waiting
  Bio: This person grew up with technology and expects
  everything to be fast and digital. They prefer apps over
  websites and value convenience above all else. They are
  always on their phone and influenced by social media
  trends.
  Goal: Wants a modern, cool app experience
  Quote: 'There's an app for that!'"

  Task: Identify every anti-pattern in this persona and
  create a corrected version that demonstrates best
  practices.

assertions:
  - type: llm_judge
    criteria: "Response identifies all anti-patterns — stereotype not persona (this is a generational caricature, not a real person: 'avocado toast' is a meme, 'always on their phone' is a stereotype, 'Tech-Savvy Millennial' is a label not a name), age range not age (25-35 is a demographic segment — a persona is a specific person with a specific age, a 25-year-old and a 35-year-old are in very different life stages), no specificity (likes 'technology' — what technology? what apps? what workflows? this could describe billions of people), no research basis (nothing here comes from user research — it reads like assumptions about 'young people'), no real goals ('wants a modern, cool app experience' is not a goal — what are they trying to accomplish? what problem are they solving?), no frustrations or pain points (dislikes 'phone calls' and 'waiting' are generic preferences not persona-relevant frustrations), fake quote ('There's an app for that' is a marketing slogan not something a real person would say — it reveals nothing about the user), no behavioral data (no information about how this person actually behaves, what their workflow looks like, what decisions they make), no design implications (this persona provides zero guidance for design decisions — a team can't use this to make choices)."
    weight: 0.35
    description: "AntiPatternIdentification"
  - type: llm_judge
    criteria: "Response creates a corrected persona — the corrected version demonstrates best practices by contrast: specific person (a real name, specific age, specific occupation, specific life situation — not a demographic range), research-grounded (every element should feel like it came from an interview, even if fabricated for this exercise — specific behaviors, specific frustrations, specific quotes that sound like real speech), actionable goals (replace 'wants a modern app' with a specific goal tied to the product being designed — what is the user trying to accomplish?), real frustrations (replace 'dislikes waiting' with specific friction points the user encounters in their current workflow), behavioral detail (how does this person actually use technology — not 'always on their phone' but 'checks messages during commute, uses desktop at work, browses on tablet in the evening'), authentic quote (a quote that reveals the persona's attitude, not a marketing slogan — something that sounds like a real person in a real interview)."
    weight: 0.35
    description: "CorrectedPersona"
  - type: llm_judge
    criteria: "Response teaches persona quality principles — quality checklist (a good persona should pass these tests: Would you recognize this person if you met them? → the persona should feel like someone you could have a conversation with; Can you make a design decision based on this persona? → if the persona doesn't help you choose between two design options, it's not specific enough; Does this persona come from research or assumptions? → every element should trace to data; Is this one person or a demographic segment? → if you could split the persona into two meaningfully different people, it's too broad; Does the persona include behaviors, not just attributes? → 'likes technology' is an attribute, 'checks email 3 times before lunch' is a behavior), common anti-patterns summarized (the elastic persona — so broad it describes everyone and guides nothing; the stereotype persona — based on demographic clichés not research; the aspirational persona — describes who you WANT users to be not who they ARE; the marketing persona — buyer segments repackaged as UX personas; the fictional character — creative writing exercise with no research basis)."
    weight: 0.30
    description: "QualityPrinciples"
