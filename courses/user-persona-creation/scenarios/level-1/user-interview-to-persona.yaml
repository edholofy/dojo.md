meta:
  id: user-interview-to-persona
  level: 1
  course: user-persona-creation
  type: output
  description: "User interview to persona — transform raw interview data into a structured user persona"
  tags: [interviews, synthesis, data-to-persona, research, beginner]

state: {}

trigger: |
  You conducted 3 user interviews for a fitness tracking
  app redesign. Here are your raw notes:

  Interview 1 — Maria, 34, marketing manager:
  "I used to run 3x/week but after my second kid I can
  barely fit in walks. I feel guilty about it. I tried
  the current app but seeing my 'decline' in stats was
  depressing. I stopped opening it."

  Interview 2 — James, 29, software engineer:
  "I work out every day — lifting, running, yoga. The app
  doesn't let me track different workout types easily.
  I end up using 3 different apps. I want one place for
  everything."

  Interview 3 — Priya, 41, teacher:
  "I walk with my dog every morning, 30 minutes. That's
  my exercise. The app treats walking like it doesn't
  count — it only celebrates running and high-intensity
  stuff. I feel like the app isn't for people like me."

  Task: Analyze these interviews, identify which
  interviewee should become the primary persona, and
  create that persona with justification for your choice.

assertions:
  - type: llm_judge
    criteria: "Response analyzes all three interviews systematically — pattern identification (common themes across interviews: the app's current design assumes a specific type of user — active, high-intensity, performance-focused — and alienates those who don't fit; emotional impact of the app: Maria feels depressed, Priya feels excluded, even James is frustrated; the app fails to accommodate diverse fitness journeys), persona selection with justification (the primary persona should represent the largest underserved opportunity: Maria or Priya represent the 'everyday exerciser' segment that the current app alienates — this is likely a much larger market than James's 'power user' segment, James's needs could be addressed through feature additions, while Maria/Priya's needs require a fundamental design philosophy change, recommend creating one primary persona and noting the others as secondary personas for future consideration)."
    weight: 0.35
    description: "InterviewAnalysis"
  - type: llm_judge
    criteria: "Response creates a complete persona from the selected interview — persona document (based on the chosen interviewee: full persona with demographics, goals, frustrations, behaviors, technology usage, a day-in-the-life scenario, and a representative quote), the persona should expand beyond the raw interview data while staying grounded in it (if choosing Maria: expand on the working parent fitness journey, the guilt-motivation cycle, the relationship with former fitness identity — these are reasonable inferences from her statements, but note them as assumptions to validate with more research), the persona should include emotional journey with the product (discovery → initial excitement → confrontation with 'decline' stats → guilt → avoidance → abandonment — this journey is critical for redesign)."
    weight: 0.35
    description: "PersonaCreation"
  - type: llm_judge
    criteria: "Response demonstrates good research synthesis practices — data limitations acknowledgment (3 interviews is not enough for a confident persona — this is a proto-persona that needs validation with quantitative data and more interviews, note which persona elements are well-supported by data and which are inferences), secondary personas (briefly outline the other interviewees as secondary personas: the 'power user' who needs multi-activity support and the 'gentle exerciser' who needs inclusive design — these represent different segments the app should consider), design implications from the persona (what the persona tells us about the redesign: celebrate all movement not just high-intensity, show progress relative to the user's own context not universal benchmarks, design for life changes and fitness journey evolution, avoid shame-based motivation)."
    weight: 0.30
    description: "ResearchSynthesis"
