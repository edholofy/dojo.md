meta:
  id: persona-thought-leadership
  level: 5
  course: user-persona-creation
  type: output
  description: "Persona thought leadership — develop and present original frameworks that advance the practice of persona creation industry-wide"
  tags: [thought-leadership, innovation, frameworks, keynote, master]

state: {}

trigger: |
  You're keynoting at a major UX conference (3,000
  attendees). Topic: "The Future of Personas." The
  organizer says: "Alan Cooper invented personas in 1999.
  It's been 27 years. What's next? Challenge the industry."

  Your observations preparing the keynote:
  - Most persona advice hasn't changed in 15 years
  - Personas are still primarily static documents
  - AI can now generate personas from data in hours
  - Remote/distributed work changed how people behave
  - Products are increasingly global — cultural persona
    work is underdeveloped
  - Many companies create personas that are never used
  - The gap between "persona created" and "persona used
    in decisions" is the real problem

  Task: Write a keynote outline that presents original
  ideas about the future of persona practice.

assertions:
  - type: llm_judge
    criteria: "Response presents original frameworks — the usage gap thesis (the biggest problem in persona practice isn't creation — it's adoption: most personas are created, socialized once, and then slowly forgotten; the future of personas isn't about making better documents — it's about embedding personas into the systems where decisions are made: sprint planning tools, design systems, analytics dashboards, CRM workflows; propose: 'Embedded Personas' — personas that live inside the tools teams use, not alongside them in separate documents), living personas framework (static documents were appropriate in 1999 when data was scarce; in 2026 with real-time behavioral data, personas should be: continuously updated — behavioral attributes refresh weekly from analytics, segmentation-linked — each persona maps to a live customer segment with real-time health metrics, predictive — based on historical patterns, personas predict future behavior changes and alert teams before shifts happen; propose: 'Dynamic Persona System' — the evolution from persona documents to persona data products), post-demographic personas (the industry's fixation on demographics — age, gender, location — is a legacy of marketing persona origins; the future is: behavior-first — what users DO matters more than who they ARE, context-first — the same person behaves differently on mobile vs desktop, at work vs at home, Monday vs Friday, emotion-first — emotional state at the moment of interaction determines experience more than demographic category)."
    weight: 0.35
    description: "OriginalFrameworks"
  - type: llm_judge
    criteria: "Response addresses emerging challenges — AI and personas (three scenarios: AI generates personas — faster, cheaper, but risks losing the empathy that comes from human research; AI is the user — as AI agents act on behalf of humans, do we need personas for AI users?; AI maintains personas — continuous monitoring and updating that humans can't sustain; the human role shifts from creating personas to curating and interpreting AI-generated insights), global-first personas (cultural persona work is underdeveloped because the field is US-centric: the future requires culturally-native persona practices built by local researchers not imported from Silicon Valley, persona frameworks must accommodate cultural dimensions that current templates ignore: collectivist vs individualist decision-making, relationship-first vs transaction-first behavior, different technology adoption patterns), distributed work evolution (remote/distributed work didn't just change WHERE people work — it changed HOW they behave: attention patterns are different in async vs synchronous environments, trust-building happens differently in digital-first relationships, persona behavior varies by work context — the same person behaves differently in office vs home office vs coffee shop; future personas must capture contextual behavior variation, not assume consistent behavior across all contexts)."
    weight: 0.35
    description: "EmergingChallenges"
  - type: llm_judge
    criteria: "Response provides keynote structure and actionable takeaways — keynote arc (opening provocation: 'Alan Cooper gave us personas 27 years ago. They were revolutionary. But we've been polishing the same approach for 15 years while the world changed around us. Today I'm going to argue that the way we do personas is broken — and show you what comes next.'; Act 1: What's broken — the usage gap, static documents in a dynamic world, demographics over behavior; Act 2: What's changing — AI, distributed work, global markets, embedded systems; Act 3: What comes next — three frameworks for the next era of personas; closing: a call to action with specific steps), actionable takeaways (every attendee should leave with: one thing to stop doing — creating static persona documents that live in a folder; one thing to start doing — connecting personas to live behavioral data; one question to ask — 'when was the last time our persona actually changed a decision?'; one tool to try — embed a persona reference directly into their sprint planning or design review workflow), memorable moments (the keynote needs: a surprising statistic about persona adoption rates, a live demo showing a dynamic persona updating in real time, a provocative question that changes how the audience thinks about personas, a human story showing the difference between a persona that's used and one that isn't)."
    weight: 0.30
    description: "KeynoteStructure"
