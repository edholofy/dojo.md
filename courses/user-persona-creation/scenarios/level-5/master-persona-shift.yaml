meta:
  id: master-persona-shift
  level: 5
  course: user-persona-creation
  type: output
  description: "Master persona shift — handle multiple master-level strategic persona challenges in a single session"
  tags: [shift, combined, assessment, master]

state: {}

trigger: |
  You're the Chief Product Officer handling three master-
  level persona challenges simultaneously:

  TASK 1 — Your company is going public in 6 months. The
  investment bankers want to include your persona-driven
  product strategy in the S-1 filing and investor roadshow.
  They say: "Show investors that you understand your
  customers better than any competitor. Make personas
  part of the growth narrative." Create the investor-
  facing persona strategy section.

  TASK 2 — Three industry organizations (IxDA, Nielsen
  Norman Group, and UXPA) invite you to co-author a
  "State of Persona Practice 2026" report. Your research
  shows: 85% of companies create personas, but only 22%
  use them in actual product decisions. The gap between
  creation and usage is the biggest challenge facing
  the industry. Write the executive summary.

  TASK 3 — A venture capital firm asks you to evaluate
  a potential portfolio company's persona maturity as
  part of their due diligence. The target company has:
  $50M ARR, 80 employees, 3 personas created by the
  founder 4 years ago with no research, no updates,
  and adoption only within the 5-person design team.
  Product decisions are made by the CEO based on
  "customer intuition." Write the assessment.

  Task: Handle all three master-level challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — IPO persona strategy — investor narrative (translate persona strategy into investor language: 'Our deep customer understanding, formalized through data-driven persona programs, gives us a sustainable competitive advantage in product development. Our persona-informed features achieve 32% higher adoption and 40% fewer post-launch revisions, resulting in faster revenue recognition and lower development costs.'), S-1 language (include: customer understanding methodology as a competitive moat — it takes years to build and can't be copied by hiring one person, quantified impact on key business metrics — adoption rates, retention, development efficiency, market expansion strategy informed by persona research — we don't enter markets blind, we enter with validated customer understanding), investor roadshow positioning (competitive advantage: 'while competitors build features based on competitive matching, we build features based on deep customer understanding — this is why our NPS is X while the industry average is Y', growth narrative: 'our persona-driven approach has enabled us to expand into N markets with M% success rate because we invest in understanding local customers before building'), caution (be accurate — SEC scrutiny means every claim must be defensible, don't overstate persona attribution — present conservative, verifiable metrics)."
    weight: 0.35
    description: "IPOPersonaStrategy"
  - type: llm_judge
    criteria: "Response handles Task 2 — industry report executive summary — the usage gap (frame the central finding: the industry has a persona adoption crisis — 85% create personas but only 22% use them in decisions, this means 63% of persona investment is wasted, the problem isn't that personas don't work — it's that organizations don't integrate them into decision-making workflows), root cause analysis (why the gap exists: personas live in documents, decisions happen in meetings and tools — there's a physical separation, personas are created by design teams but decisions are made by cross-functional teams — there's an organizational separation, personas are static but products evolve — there's a temporal separation, personas require interpretation but busy teams want explicit guidance — there's a cognitive separation), industry recommendations (close the gap: embed personas in decision-making tools — sprint planning, design systems, analytics dashboards, expand persona ownership beyond design — product, engineering, sales, marketing must co-own, make personas dynamic — connected to data, continuously updated, relevant, simplify persona artifacts — a persona that takes 10 minutes to read won't be read, reduce to essentials), call to action (the industry needs to shift from 'creating better personas' to 'making personas more useful' — the 22% usage rate is the metric to improve)."
    weight: 0.35
    description: "IndustryReport"
  - type: llm_judge
    criteria: "Response handles Task 3 — VC due diligence assessment — maturity assessment (current state: Level 1 — Ad Hoc; evidence: personas created by founder without research — assumption-based, no updates in 4 years — stale, adoption only in 5-person design team — no organizational reach, CEO decides based on 'customer intuition' — persona practice doesn't influence decisions, this is a significant product risk: the company is making $50M ARR worth of product decisions based on one person's intuition rather than customer evidence), risk assessment for the VC (risks: single point of failure — if the CEO's intuition is wrong, there's no data to correct course; scalability — intuition-based decisions don't scale as the company grows beyond 80 employees; product-market fit fragility — without validated personas, the company doesn't know WHY customers use the product, making it vulnerable to competitive disruption; acquisition integration — stale, founder-based personas make post-acquisition product integration more difficult), remediation recommendation (the target company needs: immediate — 20 customer interviews to validate or replace the founder's personas, within 3 months — research-backed persona set with data integration, within 6 months — cross-functional persona adoption, within 12 months — Level 3 maturity with governance and data connection, investment: $100-150K for the research and program establishment, this should be a condition of the investment or a post-investment priority, not optional), valuation impact (weak persona practice suggests: product decisions may not be optimally serving the market, there may be hidden product-market fit risks the current metrics don't show, the CEO's departure would create a customer understanding vacuum — this affects key-person risk assessment, remediation is achievable and would strengthen the investment thesis)."
    weight: 0.30
    description: "VCDueDiligence"
