meta:
  id: persona-ma-integration
  level: 5
  course: user-persona-creation
  type: output
  description: "Persona M&A integration — manage persona consolidation during mergers and acquisitions"
  tags: [mergers, acquisitions, integration, consolidation, master]

state: {}

trigger: |
  Your company ($1B revenue, 300 designers) is acquiring
  a competitor ($400M revenue, 120 designers). You're the
  CPO responsible for persona integration.

  Your company's personas (5):
  - "SMB Owner" — small business decision-maker
  - "Enterprise Admin" — IT administrator at large orgs
  - "Power User" — daily heavy user, any company size
  - "Executive Buyer" — C-level purchasing authority
  - "Developer" — API and integration user

  Acquired company's personas (4):
  - "Startup Founder" — overlaps with your SMB Owner
  - "IT Manager" — overlaps with your Enterprise Admin
  - "Marketing User" — no equivalent in your persona set
  - "Agency User" — manages multiple client accounts,
    no equivalent in your set

  Complexity:
  - Your "Power User" persona doesn't exist in their set —
    they design for specific roles, not usage intensity
  - Their "Marketing User" and "Agency User" represent
    segments you've never served
  - Combined customer base of 500K accounts with overlap
  - 420 designers need a unified persona set within 6
    months
  - Products will remain separate for 18 months before
    integration

  Task: Create a persona M&A integration strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a persona consolidation strategy — overlap analysis (map the overlap: your SMB Owner ↔ their Startup Founder — similar but not identical: SMB Owner is established, Startup Founder is early-stage, decide: merge into one persona with two variants, or keep separate if needs are truly different; your Enterprise Admin ↔ their IT Manager — likely very similar, merge into a unified persona taking the best attributes from both), gap analysis (new personas to consider: their Marketing User — a segment your company hasn't served, adding this persona expands your addressable market; their Agency User — multi-client account management is a unique use case your product doesn't support, this persona represents a growth opportunity or a segment to deliberately exclude), contested personas (your Power User is a behavioral persona — usage intensity — while their personas are role-based; decide: keep Power User as a cross-cutting behavioral dimension that applies across role-based personas? or retire it in favor of role-specific depth? this is a philosophical choice about persona architecture that affects how 420 designers think about users), target: unified set of 6-8 personas within 6 months."
    weight: 0.35
    description: "ConsolidationStrategy"
  - type: llm_judge
    criteria: "Response addresses organizational integration — dual-product transition (products remain separate for 18 months: during this period, maintain product-specific persona layers while establishing unified core personas, each product team references the same core persona but with product-specific usage context, this prevents 420 designers from working with inconsistent user understanding while respecting that the products are still separate), team integration (420 designers from two companies with different persona philosophies: your company uses behavioral personas — Power User, their company uses role-based personas — Marketing User, the merged persona set should honor both approaches: role-based primary organization with behavioral attributes as secondary dimensions, socialization is critical: joint workshops where designers from both companies co-create the unified personas, building relationships and shared understanding simultaneously), cultural integration (persona integration is a proxy for cultural integration: how the two companies think about users reflects how they think about design — use the persona consolidation process as a cultural alignment exercise, the process of creating unified personas together builds the shared language and trust that the merged design organization needs, resistance is expected: both sides will feel their personas were 'better' — focus on creating something new that draws from both, not choosing one over the other)."
    weight: 0.35
    description: "OrganizationalIntegration"
  - type: llm_judge
    criteria: "Response provides timeline and governance — 6-month integration timeline (month 1: persona audit — map all 9 personas from both companies, identify overlaps, gaps, and conflicts; month 2: combined research — interview customers from both companies to understand the combined user base, focus on overlap areas and new segments; month 3: persona co-creation workshops — mixed teams from both companies draft the unified persona set; month 4: validation — test unified personas against customer data from both companies; month 5: socialization — train all 420 designers on the new persona set, update all tooling and documentation; month 6: launch — officially adopt unified personas, retire legacy persona sets with clear redirection), governance for dual-product period (persona council with representatives from both legacy companies and all product teams, monthly sync to ensure unified personas are being applied consistently across both products, when product integration begins at month 18: the unified personas guide what the integrated product experience should look like), success metrics (post-integration: all 420 designers can name the unified primary personas, design decisions across both products reference the same persona set, customer experience consistency scores improve as designs align around shared personas, no designer feels their company's personas were 'thrown away' — satisfaction survey at month 6 and month 12)."
    weight: 0.30
    description: "TimelineAndGovernance"
