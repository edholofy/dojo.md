meta:
  id: ai-assisted-persona-creation
  level: 5
  course: user-persona-creation
  type: output
  description: "AI-assisted persona creation — leverage AI and machine learning to augment persona research, development, and maintenance"
  tags: [ai, machine-learning, automation, augmented, master]

state: {}

trigger: |
  Your organization is evaluating how AI can transform
  its persona practice. The CTO proposes: "We have 5
  years of customer data — 200K accounts, 10M support
  tickets, 50K NPS responses, and complete product usage
  analytics. We should be able to generate personas
  algorithmically and update them in real time."

  The UX Research Director counters: "AI can find patterns
  in data, but it can't understand WHY people behave the
  way they do. The best persona insights come from sitting
  with a user and watching them struggle. You can't
  automate empathy."

  The CEO wants a recommendation that satisfies both.

  Task: Design an AI-augmented persona program that
  leverages AI for what it does well while preserving
  human research for what requires human judgment.

assertions:
  - type: llm_judge
    criteria: "Response defines the AI-human collaboration model — AI capabilities (what AI should handle: behavioral clustering — ML algorithms analyzing usage patterns, feature adoption, engagement levels to identify natural user segments; NLP analysis — processing 10M support tickets and 50K NPS responses to extract sentiment themes, common frustrations, and feature requests per segment; pattern detection — identifying behavioral anomalies, segment shifts, and emerging user types that would take human researchers months to find manually; persona attribute population — auto-filling quantitative persona attributes like usage frequency, feature adoption patterns, churn risk scores from data; continuous monitoring — real-time tracking of persona segment health, alerting when behavioral patterns shift significantly), human capabilities (what humans must retain: motivational research — conducting interviews that reveal WHY users behave as they do, not just WHAT they do; contextual inquiry — observing users in their natural environment to understand constraints the data doesn't capture; cultural interpretation — understanding how cultural, emotional, and social factors shape behavior; creative synthesis — combining data patterns with qualitative insights into a compelling, usable persona narrative; strategic judgment — deciding which personas matter most for business strategy, which segments to pursue or ignore)."
    weight: 0.35
    description: "AIHumanModel"
  - type: llm_judge
    criteria: "Response designs the integrated workflow — discovery phase (AI: cluster 200K accounts into behavioral segments, extract top themes from support tickets per segment, identify statistical profiles per cluster; human: review AI-generated segments — do they make sense? do they represent meaningful distinctions?; combined: AI segments guide human research — interview users from each AI-identified segment to understand motivations), development phase (AI: generate initial persona drafts with quantitative attributes populated from data; human: enrich with qualitative depth — goals, frustrations, emotional context, scenarios, voice; combined: the persona document has both a data-validated quantitative section and a research-rich qualitative section), maintenance phase (AI: continuous monitoring — alert when segment behavior shifts, when new clusters emerge, when segment sizes change significantly; human: quarterly investigation — when AI flags a shift, human researchers investigate why and update persona narrative; combined: personas evolve continuously with AI monitoring and periodic human depth-research), the workflow should show clear handoff points between AI and human contributions."
    weight: 0.35
    description: "IntegratedWorkflow"
  - type: llm_judge
    criteria: "Response addresses risks and governance — AI risks (data bias: if historical data over-represents certain demographics, AI personas will reflect that bias — regular bias audits required; false precision: AI can generate highly specific persona attributes that feel authoritative but may be statistically unstable — validate segment stability over time before building on AI-generated attributes; empathy erosion: over-reliance on AI-generated personas may reduce team empathy — if designers never meet real users, the personas become abstract numbers not people; black box segments: ML clustering may create segments that are statistically valid but have no meaningful business interpretation — humans must verify that AI segments represent actionable user groups), governance framework (AI persona governance: all AI-generated segments reviewed by human researcher before becoming official personas; model retraining: re-cluster annually as user base evolves; bias review: quarterly check for demographic or behavioral biases in AI-generated segments; human research minimum: regardless of AI capability, conduct at least 20 user interviews per year per persona to maintain qualitative depth), recommendation to CEO (invest in AI augmentation — the CTO is right that 5 years of data is a goldmine, but the Research Director is right that empathy can't be automated; the hybrid approach: AI for speed, scale, and pattern detection; humans for depth, empathy, and strategic judgment; estimated impact: 50% reduction in persona development time, 30% cost reduction for quantitative analysis, improved persona accuracy through continuous data monitoring — while maintaining the qualitative depth that makes personas actionable for design)."
    weight: 0.30
    description: "RisksAndGovernance"
