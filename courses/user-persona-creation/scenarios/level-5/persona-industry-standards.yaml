meta:
  id: persona-industry-standards
  level: 5
  course: user-persona-creation
  type: output
  description: "Persona industry standards — develop and promote industry-wide standards for persona research, development, and governance"
  tags: [industry, standards, methodology, best-practices, master]

state: {}

trigger: |
  You've been invited to chair a working group creating
  "Persona Practice Standards" for the design industry.
  The working group includes representatives from:
  - 5 Fortune 500 companies
  - 3 design agencies
  - 2 academic researchers
  - 1 AI/ML company specializing in user segmentation
  - Nielsen Norman Group (industry thought leader)

  Debates within the group:
  1. Minimum research requirements: How many interviews
     are needed for a valid persona? The academics say 20+,
     the agencies say 5-8 with analytics.
  2. Persona format: Should there be a standard format?
     Companies argue formats should be flexible; agencies
     want consistency for cross-client work.
  3. AI-generated personas: Should they be accepted as
     valid? The AI company says yes, researchers say no.
  4. Update frequency: How often must personas be reviewed?
     Fast-moving startups say monthly, enterprises say
     annually.
  5. Validation requirements: What evidence is needed to
     claim a persona is "validated"?

  Task: Draft the industry standard framework resolving
  these debates.

assertions:
  - type: llm_judge
    criteria: "Response resolves the research requirements debate — tiered approach (don't prescribe one number — define tiers: Tier 1 Proto-Persona: 0 interviews, assumption-based, explicitly labeled as unvalidated — acceptable for early-stage exploration with mandatory validation timeline; Tier 2 Research-Informed: 5-8 interviews plus analytics data — acceptable for most product decisions, must note sample size limitations; Tier 3 Research-Validated: 15-20+ interviews with quantitative validation — required for high-stakes decisions like market entry, major redesigns, or board-level strategy; Tier 4 Continuously Validated: ongoing research with quarterly data checks — gold standard for mature organizations), the standard should be: clear about minimum requirements per tier, flexible about which tier is appropriate for different contexts, honest about the limitations of each tier, and accessible to organizations at different maturity levels."
    weight: 0.35
    description: "ResearchStandards"
  - type: llm_judge
    criteria: "Response addresses format, AI, and update standards — format standard (define required elements not required format: every persona must include: name and identity, data source disclosure — what research supports each attribute, goals and frustrations, behavioral patterns, and design implications; format is flexible: one-page card, detailed document, interactive profile — the medium adapts to the organization; consistency requirement: within an organization, all personas must follow the same format for comparability), AI standard (AI-generated personas are valid as Tier 1 or Tier 2 inputs: AI can identify behavioral clusters and populate quantitative attributes, but AI-generated personas must be: explicitly labeled as AI-assisted, validated by human researchers before Tier 3 status, enriched with qualitative research for motivational depth, regularly audited for data bias — the standard doesn't ban AI, it classifies AI-generated personas appropriately and requires human validation for high-stakes use), update frequency standard (define by tier: Tier 1 — must be validated or retired within 6 months; Tier 2 — annual review with data check; Tier 3 — quarterly data check, annual qualitative refresh; Tier 4 — continuous monitoring with investigation triggered by metric deviations — the standard accommodates different organizational speeds while preventing stale personas)."
    weight: 0.35
    description: "FormatAIUpdate"
  - type: llm_judge
    criteria: "Response provides validation standards and adoption framework — validation requirements (define what 'validated' means: behavioral validation — persona's predicted behaviors match observed analytics data for the segment; motivational validation — persona's stated goals and frustrations confirmed by at least 5 independent user interviews; demographic validation — persona's demographic attributes match the actual segment composition within reasonable bounds; temporal validation — persona validated within the last 12 months; each tier of validation explicitly stated in the persona document), adoption framework (the standard should be: voluntary — organizations adopt because it improves their practice, not because it's mandated; self-certifying — organizations can assess themselves against the standard; progressive — organizations can adopt at their current maturity level and advance over time; measurable — the standard includes a self-assessment tool for benchmarking), working group governance (the standard itself needs governance: annual review and update by the working group, public comment period for proposed changes, versioned releases — organizations can reference specific versions, industry case studies collected to validate and evolve the standard, the standard should evolve as the practice evolves — especially as AI capabilities advance)."
    weight: 0.30
    description: "ValidationAndAdoption"
