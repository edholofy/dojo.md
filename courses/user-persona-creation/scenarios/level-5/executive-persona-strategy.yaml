meta:
  id: executive-persona-strategy
  level: 5
  course: user-persona-creation
  type: output
  description: "Executive persona strategy — position persona programs as strategic business assets at the C-suite and board level"
  tags: [executive, c-suite, board, strategic, master]

state: {}

trigger: |
  You're presenting to the board of a $500M SaaS company.
  The board is evaluating a strategic shift: from a
  product-led growth model (PLG) targeting individuals to
  an enterprise sales model targeting large organizations.

  The chairperson asks: "Our current customer understanding
  is based on individual user personas. If we're shifting
  to enterprise sales, we need to understand different
  people — procurement officers, CISOs, IT directors.
  How does our persona strategy need to change, what will
  it cost, and what's the timeline?"

  Current state:
  - 5 PLG personas focused on individual users
  - 85% of revenue from self-serve individual subscriptions
  - Enterprise represents 15% of revenue but 60% of growth
  - No enterprise buyer personas exist
  - Sales team is new — hired 12 enterprise AEs last quarter
  - Product lacks enterprise features (SSO, SCIM, audit
    logs, admin console)

  Task: Present a comprehensive persona strategy transition
  plan to the board.

assertions:
  - type: llm_judge
    criteria: "Response presents a board-appropriate strategic framework — strategic framing (the persona transition isn't just a UX exercise — it's a fundamental business strategy enabler: without enterprise personas, the 12 new AEs are selling blind, product can't prioritize enterprise features effectively, and marketing can't create enterprise messaging; the persona strategy directly impacts whether the PLG-to-enterprise transition succeeds), enterprise persona architecture (enterprise buying involves multiple personas in a single deal: Economic Buyer — VP/Director who controls budget and makes the purchase decision; Technical Evaluator — IT/security team who assesses compliance, security, and integration requirements; Champion — the individual user within the enterprise who advocates for adoption based on PLG experience; Administrator — IT admin who deploys, configures, and manages the product; End User — the individual within the enterprise who uses the product daily; each persona has different evaluation criteria, different communication preferences, and different success definitions), dual-track strategy (don't abandon PLG personas — PLG users become enterprise Champions: the individual who uses the product personally and then brings it to their organization, the PLG-to-enterprise bridge is a unique competitive advantage — enterprise competitors don't have individual user champions, maintain PLG personas for product experience while adding enterprise personas for sales and feature development)."
    weight: 0.35
    description: "StrategicFramework"
  - type: llm_judge
    criteria: "Response includes budget, timeline, and ROI projection — investment plan (enterprise persona development: $200-300K over 6 months, broken down: research — 30 enterprise buyer interviews, 15 IT admin interviews, 20 end user interviews within enterprise accounts: $120K; analysis and persona development: $50K; socialization and training for 12 AEs, product, and marketing: $40K; persona infrastructure — CRM integration, sales playbooks, marketing content: $50K; ongoing maintenance and evolution: $60K/year), timeline (month 1-2: enterprise research — interviews with prospects, customers, and churned accounts; month 3: persona development and validation; month 4: sales enablement — train AEs on enterprise personas; month 5: product alignment — roadmap reprioritization based on enterprise personas; month 6: marketing alignment — enterprise messaging and content based on personas; ongoing: quarterly updates and refinement), ROI projection (enterprise AE average quota: $500K-1M/year, 12 AEs with persona-informed selling typically see 25-30% higher close rates: conservative estimate of $1.5-2M incremental revenue in year 1 from better-informed selling alone; product improvements serving enterprise personas should accelerate the 60% enterprise growth rate; compare: $300K persona investment against $1.5M+ projected return = 5x ROI)."
    weight: 0.35
    description: "BudgetAndTimeline"
  - type: llm_judge
    criteria: "Response addresses board-level concerns — risk management (risk: enterprise personas based on limited data — only 15% of current revenue is enterprise, mitigation: include prospect interviews and competitive intelligence, not just current customer data; risk: PLG product experience degrades while building enterprise features, mitigation: dual-track development with separate teams serving PLG and enterprise personas; risk: AEs with wrong enterprise personas sell to wrong buyers, mitigation: validate personas with early deals and iterate), success metrics for the board (track: enterprise deal close rate improvement correlated with persona-informed selling, time-to-close reduction as AEs understand buyer personas better, feature adoption by enterprise persona — are we building the right things?, enterprise NPS compared to PLG NPS — is the enterprise experience meeting expectations?, quarterly persona accuracy assessment — are our enterprise personas predicting real buyer behavior?), competitive positioning (most competitors are either PLG-only or enterprise-only — the PLG-to-enterprise bridge powered by champion personas is a unique advantage: the champion persona connects individual user love with enterprise purchasing authority, no competitor has this bridge because they haven't served both segments, the persona strategy protects this competitive moat by ensuring the bridge experience is intentionally designed)."
    weight: 0.30
    description: "BoardLevelConcerns"
