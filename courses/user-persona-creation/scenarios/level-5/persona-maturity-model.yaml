meta:
  id: persona-maturity-model
  level: 5
  course: user-persona-creation
  type: output
  description: "Persona maturity model — assess and advance an organization's persona practice maturity across multiple dimensions"
  tags: [maturity, assessment, advancement, benchmarking, master]

state: {}

trigger: |
  A Fortune 500 company hires you to assess their persona
  practice maturity. After 3 weeks of assessment:

  Research practices:
  - Personas based on 12 interviews conducted 2 years ago
  - No quantitative data integration
  - No ongoing research to validate or update personas

  Organizational adoption:
  - Design team uses personas actively (85% adoption)
  - Product management uses personas occasionally (40%)
  - Engineering rarely references personas (15%)
  - Sales and marketing have their own customer models
  - Executive team doesn't reference personas in strategy

  Infrastructure:
  - Personas stored in a Figma file with no version control
  - No connection to analytics or customer data
  - No persona metrics or ROI tracking

  Governance:
  - No formal persona owner
  - No update schedule
  - No quality standards for persona content

  Cultural:
  - Design team values personas deeply
  - Other teams view personas as "a design thing"
  - No company-wide user-centricity culture

  Task: Assess the current maturity level, identify gaps,
  and create a 3-year advancement roadmap.

assertions:
  - type: llm_judge
    criteria: "Response defines a persona maturity model — maturity dimensions (assess across 5 dimensions: Research Quality — depth, breadth, recency, and methodology of persona research; Organizational Adoption — percentage of teams actively using personas in decisions; Infrastructure — tools, systems, and data connections supporting personas; Governance — ownership, maintenance, quality standards; Culture — organizational user-centricity and persona as shared language), maturity levels per dimension (Level 1 Ad Hoc: no formal practice, assumptions-based; Level 2 Emerging: basic practice established, limited scope; Level 3 Established: consistent practice, cross-functional adoption; Level 4 Optimized: data-driven, measured, continuously improved; Level 5 Leading: strategic asset, industry benchmark, innovation driver), current assessment (Research: Level 2 — personas exist but are stale, no ongoing research; Adoption: Level 2 — strong in design but limited elsewhere; Infrastructure: Level 1 — no systems, version control, or data connection; Governance: Level 1 — no ownership, schedule, or standards; Culture: Level 1-2 — personas are a design tool not an organizational practice; Overall: Level 1.5-2 — emerging with significant gaps in infrastructure, governance, and cross-functional adoption)."
    weight: 0.35
    description: "MaturityModel"
  - type: llm_judge
    criteria: "Response provides a 3-year advancement roadmap — year 1 foundation target Level 3 (quarter 1: assign persona program owner, establish governance framework, refresh personas with new research — 20+ interviews plus quantitative data integration; quarter 2: migrate personas to version-controlled platform, establish quarterly update cadence, begin cross-functional socialization — product management workshops; quarter 3: connect personas to analytics for behavioral validation, train engineering teams on persona usage in user stories, align sales and marketing models with product personas; quarter 4: launch persona metrics dashboard, establish ROI tracking, conduct first annual persona health assessment), year 2 optimization target Level 4 (integrate personas with CDP/CRM, implement data-driven persona monitoring, establish cross-functional persona council, launch persona-driven feature prioritization framework, begin measuring persona-level business metrics — revenue, retention, satisfaction by persona, quarterly persona accuracy reviews against behavioral data), year 3 leadership target Level 4-5 (AI-augmented persona monitoring and evolution, persona strategy integrated with board-level business strategy, industry thought leadership — publishing persona methodology and case studies, innovation: predictive persona modeling — anticipating persona evolution before it happens, full organizational user-centricity culture where personas are everyone's language not just design's)."
    weight: 0.35
    description: "ThreeYearRoadmap"
  - type: llm_judge
    criteria: "Response addresses investment and success metrics — investment profile (year 1: $200-300K — research refresh, tool migration, training and socialization, program owner hire; year 2: $150-200K — CDP integration, data platform, ongoing research, training expansion; year 3: $100-150K — AI augmentation, innovation, thought leadership — decreasing investment as the system becomes self-sustaining), success metrics per year (year 1: persona freshness — updated within last 6 months, cross-functional adoption — from 15% engineering to 50%+, governance — formal owner, schedule, and standards in place; year 2: data connection — personas linked to analytics and CRM, business metrics — persona-level revenue and retention tracking, ROI — measurable return on persona investment; year 3: strategic integration — personas referenced in board strategy discussions, cultural metric — >80% of employees can name primary personas, industry benchmark — published case study or conference presentation), maturity assessment methodology (self-assessment tool: 20-question survey covering all 5 dimensions, scored 1-5 per dimension, overall maturity score is the average, administered annually with trend tracking, benchmark against industry peers when data is available)."
    weight: 0.30
    description: "InvestmentAndMetrics"
