meta:
  id: persona-innovation-lab
  level: 5
  course: user-persona-creation
  type: output
  description: "Persona innovation lab — pioneer next-generation persona methodologies including predictive personas, real-time personas, and AI-native approaches"
  tags: [innovation, next-generation, predictive, real-time, master]

state: {}

trigger: |
  Your organization has a mature persona practice (Level 4
  maturity). The CEO asks: "What's next? How do we push
  persona practice beyond best practices into innovation?"

  You propose a Persona Innovation Lab to explore:

  1. Predictive Personas — can we predict how personas will
     evolve before changes happen, using trend data and
     market signals?
  2. Real-Time Personas — can personas update themselves
     automatically based on live behavioral data?
  3. Contextual Personas — can we model how the same person
     behaves differently in different contexts (work vs
     personal, mobile vs desktop, stressed vs relaxed)?
  4. AI-Native Personas — what does persona practice look
     like when AI agents are users alongside humans?

  Task: Design the Persona Innovation Lab including
  research agenda, experiments, and success criteria.

assertions:
  - type: llm_judge
    criteria: "Response designs experiments for each innovation area — predictive personas (hypothesis: by combining behavioral trend data with market signals and industry research, we can predict persona evolution 6-12 months ahead; experiment: analyze 3 years of historical persona data alongside market data — can we retroactively predict the shifts that actually occurred?; if successful: product teams can design for where users are going, not just where they are; methodology: trend analysis combining product usage trajectories, industry reports, technology adoption curves, and macroeconomic signals; success criteria: predicted persona evolution matches actual evolution within 70% accuracy 6 months ahead), real-time personas (hypothesis: behavioral data can automatically update quantitative persona attributes without human intervention; experiment: connect 3 personas to live analytics segments, set up automated attribute updates with human review triggers — does the system accurately detect and reflect behavioral shifts?; risks: over-sensitivity to noise, loss of narrative coherence if attributes change too frequently; success criteria: real-time persona attributes match quarterly manual research findings within 85% accuracy, with less than 10% false positive change alerts)."
    weight: 0.35
    description: "InnovationExperiments"
  - type: llm_judge
    criteria: "Response addresses contextual and AI-native personas — contextual personas (hypothesis: the same user behaves meaningfully differently in different contexts — a project manager on desktop during focused work vs on mobile during a commute vs in a meeting checking status; experiment: instrument product to track same-user behavior across contexts — device type, time of day, session length, feature usage — do distinct behavioral modes emerge?; if successful: design can adapt to context rather than treating users as static — mobile experience during commute optimizes for quick checks, desktop experience during deep work optimizes for comprehensive management; methodology: same-user cross-context behavioral analysis, contextual inquiry research in multiple settings), AI-native personas (hypothesis: as AI agents increasingly act on behalf of users — scheduling meetings, summarizing data, executing workflows — we need personas for AI-mediated interactions; experiment: study how users delegate to AI and how AI interaction patterns differ from human patterns — what does an AI 'user' need from your product? how does the API experience change when the 'user' is an AI agent making 100 requests per minute vs a human making 5 per day?; if successful: product design accounts for both human and AI users as first-class personas; this is genuinely novel — few companies have considered AI-agent personas)."
    weight: 0.35
    description: "ContextualAndAINative"
  - type: llm_judge
    criteria: "Response provides lab structure and governance — lab structure (team: 1 lab director, 2 researchers, 1 data scientist, 1 designer, 1 engineer — small team focused on experimentation; timeline: 6-month sprints per innovation area, each sprint includes: hypothesis definition, experiment design, data collection, analysis, and findings presentation; budget: $300-500K annually — primarily people cost plus data infrastructure; reporting: quarterly findings presentation to executive team, annual innovation report), experiment governance (each experiment has: clear hypothesis, defined success criteria, ethical review — especially for predictive and contextual tracking, fail-fast protocol — if early results don't support the hypothesis, pivot rather than persist, knowledge sharing — findings published internally and externally to build thought leadership), innovation-to-practice pipeline (successful experiments transition to core persona practice: real-time personas graduate from lab to production if accuracy criteria are met, predictive capabilities integrate into quarterly persona reviews, contextual attributes become standard persona dimensions, AI-native personas become formal personas if AI-mediated usage reaches meaningful volume; failed experiments are documented and shared — negative findings are valuable for the industry), measuring innovation ROI (track: experiments that graduate to practice — what percentage of lab innovations become operational?, business impact of graduated innovations — did predictive personas help product teams make better roadmap decisions?, industry recognition — publications, conference presentations, thought leadership positioning, team learning — is the lab building capabilities that strengthen the broader research team?)."
    weight: 0.30
    description: "LabStructure"
