meta:
  id: persona-culture-transformation
  level: 5
  course: user-persona-creation
  type: output
  description: "Persona culture transformation — transform an organization from product-centric to persona-centric decision-making"
  tags: [culture, transformation, user-centric, organizational, master]

state: {}

trigger: |
  A Fortune 500 company ($3B revenue, 15,000 employees)
  makes all product decisions based on competitive analysis
  and executive opinion. They have never used personas.
  The new CEO, hired from a design-led company, says:
  "We're going to become customer-centric. That starts
  with understanding our customers as people, not as
  revenue segments."

  Current state:
  - Product decisions driven by competitive features:
    "Competitor X has this, we need it too"
  - Executive opinion dominates: "The SVP wants this
    feature, build it"
  - Customers described only in financial terms: "our
    $50K+ ARR accounts" not "the operations manager
    struggling with workflow automation"
  - No user research function exists
  - Design team (80 people) has no voice in strategy
  - Customer satisfaction declining for 3 years
  - Employee engagement at 38% (industry average 55%)
  - NPS at 15 (industry average 35)

  Task: Design a persona-driven cultural transformation
  program for a 15,000-person organization.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased cultural transformation — phase 1 months 1-6 foundation (establish UX research function: hire Head of Research and 4-6 researchers, conduct foundational research: 50+ customer interviews, behavioral analytics analysis, support ticket mining, develop initial persona set — 4-6 personas representing core customer types, CEO champions the change: visible, vocal, sustained executive sponsorship, quick win: take the most data-driven product decision in the company's history using personas — make the success visible to the organization), phase 2 months 7-12 embedding (train 100 product managers and leaders on persona-driven decision-making, integrate personas into the product development process: every product decision references a persona, pilot 'customer-centric sprint' with 3 product teams: all planning, design, and prioritization through persona lens, share results: did persona-informed teams make better decisions? did their features perform better?), phase 3 year 2 scaling (expand persona-driven practices to all product teams, extend to sales and marketing: unified customer understanding across the organization, launch customer advisory board: real customers that validate personas annually, integrate personas into hiring, performance reviews, and leadership development), phase 4 year 3 maturation (persona-driven strategy at board level, customer-centricity as core cultural value — measured and reinforced, industry recognition for customer-centric transformation)."
    weight: 0.35
    description: "PhasedTransformation"
  - type: llm_judge
    criteria: "Response addresses resistance and change management — executive resistance (SVPs used to 'I want this feature' culture will resist losing influence: show them that persona-driven decisions don't eliminate executive judgment — they enhance it with customer evidence, frame personas as executive decision-support tools not executive-replacement tools, early adopter SVPs become internal champions, resistant SVPs are managed through CEO's clear expectation that persona-driven decisions are the new standard), competitive analysis habit (the 'competitor X has this' reflex is deeply ingrained: reframe: 'what does our persona need?' is a better question than 'what does our competitor have?' — sometimes the answer is the same feature but designed for your persona's specific context, competitive analysis remains relevant but filtered through persona lens: 'does our persona need what competitor X built?'), organizational inertia (15,000 employees can't transform overnight: focus on the 'critical 15%' — the 100-200 product managers, designers, and leaders who make daily product decisions, change their behavior first and it cascades through the organization, make persona usage visible and rewarded — celebrate teams that reference personas in decisions, create 'customer champion' awards), measurement (NPS: target 25 by year 2, 35 by year 3; customer satisfaction: reverse 3-year decline; employee engagement: target 45% by year 2, 55% by year 3; product success rate: compare persona-informed launches to the historical baseline)."
    weight: 0.35
    description: "ResistanceAndChange"
  - type: llm_judge
    criteria: "Response addresses the business case and sustainability — business case (the financial argument for transformation: NPS at 15 vs industry 35 means customers are actively detracting — each point of NPS below average represents lost referrals, higher churn, and competitive vulnerability; customer satisfaction declining 3 years means revenue erosion is coming even if it hasn't hit yet; competitive feature-matching without customer understanding produces features nobody asked for — wasted engineering investment; estimate: improving NPS from 15 to 35 could impact $150-300M in revenue through improved retention and growth; the transformation investment — $5-10M over 3 years for research, training, and infrastructure — is small relative to the revenue at risk), sustainability mechanisms (culture change that depends on one CEO doesn't survive the next CEO: embed persona-driven practices in organizational process — hiring criteria, performance reviews, promotion standards; build a research infrastructure that's organizationally permanent — not dependent on any single leader's enthusiasm; create a persona governance structure with distributed ownership — not centralized in one team that could be cut; connect persona-driven decisions to measurable business outcomes — when the business results are clear, no future CEO will dismantle the practice)."
    weight: 0.30
    description: "BusinessCaseAndSustainability"
