meta:
  id: global-persona-standardization
  level: 5
  course: user-persona-creation
  type: output
  description: "Global persona standardization — create a unified persona framework for a multinational organization spanning diverse markets"
  tags: [global, multinational, standardization, cultural, master]

state: {}

trigger: |
  You're the Global Head of Design for a multinational
  SaaS company operating in 25 countries. Each regional
  team has created their own personas:

  - North America: 5 personas (role-based: admin, user,
    buyer, developer, executive)
  - Europe: 8 personas (3 shared with NA, 5 Europe-specific
    reflecting GDPR sensitivity and market differences)
  - Asia Pacific: 6 personas (completely different from NA
    and EU, reflecting local market dynamics)
  - Latin America: 4 personas (partially overlapping with
    NA but with pricing and communication differences)
  - Middle East & Africa: 3 personas (minimal, created
    recently with limited research)

  Total: 26 personas across 5 regions. Nobody knows which
  are duplicates, which are genuinely different, and which
  are wrong. Product teams building global features don't
  know which persona to design for.

  Task: Create a global persona standardization strategy
  that respects regional differences while enabling global
  product decisions.

assertions:
  - type: llm_judge
    criteria: "Response designs a global-local persona architecture — global core personas (identify 5-7 core personas that transcend regions: the 'admin', 'buyer', 'end user', 'developer', 'executive' archetypes likely exist in all markets with shared goals and frustrations — these become the global core that all regions share, core attributes: role-based goals, primary workflows, fundamental frustrations, technology relationship — these are consistent globally), regional persona layers (each region adds cultural, regulatory, and market-specific attributes to the global core: European layer adds GDPR sensitivity, privacy-first evaluation criteria, EU hosting requirements; Asia Pacific layer adds consensus decision-making patterns, relationship-driven sales dynamics, mobile-first behavior; Latin America layer adds WhatsApp communication preferences, installment payment expectations, relationship-first trust building; Middle East & Africa layer adds cultural communication norms, emerging market technology patterns), architecture principle (global core defines WHAT users want to accomplish — their fundamental job-to-be-done; regional layer defines HOW they approach it — influenced by culture, regulation, market maturity, and communication preferences; this allows global features to serve the core need while regional implementations adapt to local context)."
    weight: 0.35
    description: "GlobalLocalArchitecture"
  - type: llm_judge
    criteria: "Response addresses consolidation methodology — persona audit process (step 1: map all 26 personas into a comparison matrix: role, goals, frustrations, behaviors, data source, research quality; step 2: identify clusters — personas that describe the same role across regions should cluster naturally; step 3: for each cluster, determine: what's truly global — shared across all regions? what's genuinely regional — unique to a specific market? what's an artifact of different research approaches — the same user described differently due to methodology differences?; step 4: merge clusters into global core + regional layers), research gap filling (Middle East & Africa has only 3 personas with limited research — this needs investment: conduct 15-20 interviews in key MEA markets, validate whether existing global personas apply with local adaptation or whether unique personas are needed; Asia Pacific's 6 completely different personas may reflect genuine market differences or may reflect an APAC team that didn't reference global personas — investigate: interview APAC customers alongside NA/EU customers on the same topics and compare), validation methodology (how to verify the global-local structure works: select one persona — e.g., 'the admin' — and validate across 5 regions: is the global core accurate everywhere? do regional layers capture what's truly different? test by using the persona to make a product design decision for a global feature — does the framework help or confuse?)."
    weight: 0.35
    description: "ConsolidationMethodology"
  - type: llm_judge
    criteria: "Response provides governance and implementation — governance model (Global Persona Council: representatives from each region plus global design leadership, meets quarterly to review the global persona set; Regional Persona Stewards: one per region, responsible for maintaining regional layers and conducting local research; Global Persona Program Owner: one person who maintains the core framework and facilitates cross-regional alignment), implementation plan (phase 1 months 1-3: persona audit and gap analysis across all 5 regions; phase 2 months 4-6: consolidation — create the global core personas and initial regional layers; phase 3 months 7-9: validation — test the framework with product teams building global features, iterate based on feedback; phase 4 months 10-12: launch — train all regional teams on the unified framework, establish governance cadence), reducing from 26 to manageable (target: 6-8 global core personas with regional layers, this is a reduction from 26 independent personas to 6-8 globally consistent ones with cultural adaptation — each product team anywhere in the world references the same core persona set with regionally-relevant context), success metrics (global product teams report the framework helps them make design decisions for multi-market features; regional teams feel their local market nuances are respected — not erased by standardization; cross-regional feature consistency improves; time to make persona-informed global design decisions decreases; all 5 regions reference the same core persona names in their design work)."
    weight: 0.30
    description: "GovernanceAndImplementation"
