meta:
  id: three-email-sequence-design
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Design a complete 3-email abandoned cart recovery sequence"
  tags: [email, abandoned-cart, sequence, three-email]

state: {}

trigger: |
  Design a complete 3-email abandoned cart recovery sequence for "WildBloom,"
  a natural beauty and skincare brand.

  Cart contents:
  - Rose Hip Facial Oil — $42.00
  - Lavender Night Cream — $38.00
  - Charcoal Cleansing Bar — $16.00
  - Cart total: $96.00

  Context:
  - Customer: Mia
  - Average recovery rate currently: 4% (goal: 12%)
  - Free shipping over $75 (this cart qualifies)
  - Brand voice: natural, clean, earthy
  - The brand does NOT offer discounts (brand integrity policy)

  For each email provide: timing, subject line, preview text, full body, and CTA.
  Since no discounts are allowed, the sequence must recover carts through other means.

assertions:
  - type: llm_judge
    criteria: "Three distinct emails with proper timing — Email 1 within 1 hour (reminder), Email 2 at 24 hours (social proof/education), Email 3 at 72 hours (final push with urgency)"
    weight: 0.25
    description: "Proper 3-email timing and distinction"
  - type: llm_judge
    criteria: "The sequence recovers carts WITHOUT discounts — it uses social proof, ingredient education, scarcity, free shipping highlight, and emotional connection instead of price incentives"
    weight: 0.30
    description: "Effective recovery without discounts"
  - type: llm_judge
    criteria: "Each email has a different angle and purpose — they don't repeat the same message three times but escalate through different persuasion approaches"
    weight: 0.25
    description: "Different persuasion angle per email"
  - type: llm_judge
    criteria: "The natural, earthy brand voice is consistent across all three emails — they feel like they come from the same brand while serving different purposes"
    weight: 0.20
    description: "Consistent brand voice across sequence"
