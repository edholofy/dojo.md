meta:
  id: cross-sell-in-cart-email
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Write a cart recovery email that includes cross-sell recommendations"
  tags: [email, abandoned-cart, cross-sell, recommendations]

state: {}

trigger: |
  Write an abandoned cart email for "TechHub" (an electronics retailer) that
  includes strategic cross-sell recommendations.

  Cart contents:
  - iPhone 17 Pro (256GB, Black) — $1,099.00

  Frequently bought together:
  - MagSafe Case ($49.99) — 78% of iPhone buyers also purchase
  - AirPods Pro 3 ($249.99) — 34% of iPhone buyers also purchase
  - AppleCare+ ($199.00) — 45% of iPhone buyers also purchase
  - Screen Protector ($19.99) — 62% of iPhone buyers also purchase

  Challenge: include cross-sell without distracting from the primary goal
  (completing the iPhone purchase). The cross-sell should increase AOV, not
  reduce conversion.

assertions:
  - type: llm_judge
    criteria: "The primary focus is still on completing the iPhone purchase — cross-sell items are secondary and clearly positioned below the main cart item and primary CTA"
    weight: 0.30
    description: "Primary focus on cart completion"
  - type: llm_judge
    criteria: "Cross-sell items are positioned as complementary, not competing — they're framed as 'frequently bought together' or 'complete your setup' rather than alternative products"
    weight: 0.25
    description: "Complementary cross-sell positioning"
  - type: llm_judge
    criteria: "Not all 4 cross-sell items are shown — the email selects the most relevant 2-3 items to avoid overwhelm, with clear reasoning for which to include"
    weight: 0.25
    description: "Curated cross-sell selection"
  - type: llm_judge
    criteria: "The cross-sell doesn't add a separate CTA — there's one primary 'return to cart' button that takes them to a cart page where cross-sells can be added, not multiple competing buy buttons"
    weight: 0.20
    description: "Single primary CTA maintained"
