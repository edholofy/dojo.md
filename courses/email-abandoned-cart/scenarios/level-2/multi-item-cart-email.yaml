meta:
  id: multi-item-cart-email
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Write a recovery email for a large multi-item cart"
  tags: [email, abandoned-cart, multi-item, layout]

state: {}

trigger: |
  Write an abandoned cart email for a customer with 7 items in their cart at
  "KitchenCraft," a kitchenware retailer.

  Cart contents:
  1. Chef's Knife (8-inch) — $79.99
  2. Cutting Board (Walnut) — $49.99
  3. Knife Sharpener — $24.99
  4. Kitchen Towels (Set of 4) — $18.99
  5. Measuring Cups (Stainless) — $15.99
  6. Mixing Bowls (Set of 3) — $34.99
  7. Silicone Spatula Set — $12.99
  Cart total: $237.93

  Challenge: How do you present 7 items without overwhelming the email?

  Write the email and explain your product display strategy — which items to
  highlight, which to summarize, and why.

assertions:
  - type: llm_judge
    criteria: "Not all 7 items are given equal weight — the highest-value items (Chef's Knife, Cutting Board) are highlighted while smaller items are summarized or grouped"
    weight: 0.30
    description: "Strategic product display hierarchy"
  - type: llm_judge
    criteria: "The total cart value ($237.93) is prominently displayed — for a multi-item cart, the total is more compelling than individual item prices"
    weight: 0.20
    description: "Total cart value prominently displayed"
  - type: llm_judge
    criteria: "The email doesn't feel cluttered — despite 7 items, the layout is clean and scannable, with a clear visual hierarchy that guides the eye to the CTA"
    weight: 0.25
    description: "Clean layout despite many items"
  - type: llm_judge
    criteria: "The product display strategy is explained — the reasoning behind which items to feature vs. summarize is clear and based on value, visual appeal, or conversion impact"
    weight: 0.25
    description: "Clear product display strategy rationale"
