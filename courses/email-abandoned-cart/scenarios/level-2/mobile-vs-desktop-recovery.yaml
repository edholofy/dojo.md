meta:
  id: mobile-vs-desktop-recovery
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Design different recovery emails for mobile vs. desktop abandonment"
  tags: [email, abandoned-cart, mobile, desktop, device-specific]

state: {}

trigger: |
  "StyleNow" (a fast-fashion retailer) has noticed their cart recovery performs
  very differently by device:

  Desktop abandonment:
  - Rate: 68%
  - Recovery rate from email: 14%
  - Average cart value: $78

  Mobile abandonment:
  - Rate: 86%
  - Recovery rate from email: 5%
  - Average cart value: $52

  Mobile recovery is 3x worse than desktop. Design device-specific recovery emails:

  1. A recovery email optimized for desktop abandoners
  2. A recovery email optimized for mobile abandoners
  3. Explain why mobile recovery is so much worse
  4. Specific tactics to close the mobile-desktop gap

assertions:
  - type: llm_judge
    criteria: "The mobile email is specifically designed for mobile viewing — shorter copy, larger CTA buttons, simpler layout, and acknowledges that the customer may have abandoned due to mobile friction"
    weight: 0.30
    description: "Mobile-optimized recovery email"
  - type: llm_judge
    criteria: "The analysis correctly identifies why mobile recovery is worse — smaller screens, more distractions, checkout friction on mobile, security concerns on mobile, and comparison shopping behavior"
    weight: 0.25
    description: "Correct mobile recovery gap analysis"
  - type: llm_judge
    criteria: "Specific tactics to close the gap are actionable — such as deep-linking to the cart, offering Apple Pay/Google Pay options, simplifying the mobile checkout flow"
    weight: 0.25
    description: "Actionable mobile gap-closing tactics"
  - type: llm_judge
    criteria: "The desktop email leverages desktop advantages — can include more product details, comparison information, and richer visual content that renders well on larger screens"
    weight: 0.20
    description: "Desktop email leverages larger screen"
