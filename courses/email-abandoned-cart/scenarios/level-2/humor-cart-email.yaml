meta:
  id: humor-cart-email
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Write a humorous abandoned cart email"
  tags: [email, abandoned-cart, humor, creative]

state: {}

trigger: |
  Write a humorous abandoned cart email for "BarkBox" style pet subscription
  service called "PupJoy."

  Cart contents:
  - Monthly Pup Box (Medium Dog) — $35.99/month
  - Customer: Alex
  - Dog's name: Cooper (entered during customization)
  - Abandoned 3 hours ago

  Brand voice: playful, dog-obsessed, uses humor liberally, occasionally writes
  from the "perspective" of the dog.

  Write a cart recovery email that uses humor to re-engage. The email should
  be genuinely funny, not cringe-inducing "corporate humor."

  Key constraint: humor must serve the goal of conversion, not just entertainment.

assertions:
  - type: llm_judge
    criteria: "The humor is genuinely funny — it would make someone smile or laugh, not cringe. It's creative and unexpected, not recycled 'your cart misses you' tropes"
    weight: 0.30
    description: "Genuinely funny, not cringe"
  - type: llm_judge
    criteria: "Cooper the dog is used effectively — the dog's name personalizes the humor and creates emotional connection. The dog 'perspective' or references feel natural, not forced"
    weight: 0.25
    description: "Dog personalization used effectively"
  - type: llm_judge
    criteria: "Despite the humor, the email still drives conversion — there's a clear CTA, the cart contents are referenced, and the reader knows exactly what to do next"
    weight: 0.25
    description: "Humor serves conversion goal"
  - type: llm_judge
    criteria: "The humor is on-brand for a pet subscription — it's lighthearted and joy-focused, appropriate for the pet parent audience"
    weight: 0.20
    description: "On-brand pet parent humor"
