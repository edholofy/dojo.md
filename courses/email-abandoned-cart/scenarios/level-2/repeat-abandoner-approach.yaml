meta:
  id: repeat-abandoner-approach
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Design an approach for repeat cart abandoners"
  tags: [email, abandoned-cart, repeat, serial-abandoner]

state: {}

trigger: |
  "LuxeBeauty" (a prestige cosmetics brand) has identified that 22% of their
  cart abandoners are repeat offenders — they abandon carts at least once a month.

  Customer profile — "Serial Abandoner":
  - Name: Jordan
  - Has abandoned 5 carts in the last 3 months
  - Has received 15 abandoned cart emails total
  - Has made 0 purchases from any cart email
  - But has made 2 purchases directly (not from emails) in the same period
  - Currently in their cart: Charlotte Tilbury Lipstick ($34) and Setting Spray ($35)

  Design:
  1. Should they receive the standard abandoned cart sequence? Why or why not?
  2. If not, what alternative approach is better?
  3. Write the email they SHOULD receive (if any)
  4. Long-term strategy for serial abandoners

assertions:
  - type: llm_judge
    criteria: "The standard sequence is NOT recommended — the response identifies that sending the same cart emails to someone who's received 15 without converting is definition of insanity"
    weight: 0.25
    description: "Correctly advises against standard sequence"
  - type: llm_judge
    criteria: "The alternative recognizes that Jordan DOES buy — just not from cart emails. The strategy adapts to their actual purchase behavior rather than treating them as lost"
    weight: 0.25
    description: "Adapts to actual purchase behavior"
  - type: llm_judge
    criteria: "The long-term strategy is nuanced — it might include suppressing cart emails, using browse-based emails instead, reducing frequency, or targeting through other channels"
    weight: 0.25
    description: "Nuanced long-term strategy"
  - type: llm_judge
    criteria: "If an email is recommended, it takes a fundamentally different approach — perhaps humor about their browsing habit, or a completely different format that breaks the pattern"
    weight: 0.25
    description: "Fundamentally different email approach"
