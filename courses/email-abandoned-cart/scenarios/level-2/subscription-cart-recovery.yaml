meta:
  id: subscription-cart-recovery
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Write a cart recovery email for a subscription product"
  tags: [email, abandoned-cart, subscription, recurring]

state: {}

trigger: |
  Write an abandoned cart email for "FreshMeals" (a meal kit subscription).

  Cart contents:
  - Weekly Meal Kit (4 meals for 2 people) — $69.99/week
  - Add-on: Smoothie Pack — $14.99/week
  - First week total: $84.98/week (ongoing)

  Context:
  - Customer: Casey
  - They completed meal selection but abandoned during payment
  - This is a recurring commitment (weekly charge), not a one-time purchase
  - The #1 objection: "What if I don't like it and can't cancel easily?"
  - FreshMeals offers: skip any week, cancel anytime, full refund on first box
  - Competitor advantage: more recipe variety than HelloFresh
  - Brand voice: foodie-friendly, convenient, no commitment pressure

  Address the subscription-specific fears in the recovery email.

assertions:
  - type: llm_judge
    criteria: "Subscription-specific fears are addressed — the email explicitly communicates skip-any-week flexibility, cancel-anytime policy, and first-box guarantee to reduce recurring commitment anxiety"
    weight: 0.30
    description: "Subscription commitment fears addressed"
  - type: llm_judge
    criteria: "The email frames the subscription as low-risk — it positions the first box as a trial rather than a commitment, making the initial purchase feel like a one-time experiment"
    weight: 0.25
    description: "Low-risk framing of subscription"
  - type: llm_judge
    criteria: "The meal selection they made is referenced — reminding them of the specific meals they chose personalizes the email and reminds them of the excitement of selecting recipes"
    weight: 0.25
    description: "Specific meal selections referenced"
  - type: llm_judge
    criteria: "The ongoing cost ($84.98/week) is handled thoughtfully — it's either broken down per meal to seem more affordable, or the first-box value is emphasized over the recurring price"
    weight: 0.20
    description: "Recurring cost handled thoughtfully"
