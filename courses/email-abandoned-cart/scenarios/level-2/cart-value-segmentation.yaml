meta:
  id: cart-value-segmentation
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Design different recovery approaches based on cart value"
  tags: [email, abandoned-cart, segmentation, cart-value]

state: {}

trigger: |
  "EliteAudio" (a premium audio equipment retailer) needs different abandoned cart
  approaches for different cart values.

  Cart value segments:
  - Low value: Under $100 (headphone accessories, cables) — 60% of abandoned carts
  - Mid value: $100-$500 (headphones, portable speakers) — 30% of abandoned carts
  - High value: $500+ (high-end headphones, home theater systems) — 10% of abandoned carts

  Current: same 3-email sequence for all cart values.

  Design differentiated approaches for each segment:
  1. Number of emails and timing per segment
  2. Incentive strategy per segment
  3. Content and tone differences
  4. When to involve a human (sales team outreach)

assertions:
  - type: llm_judge
    criteria: "Each segment gets a different approach — low value gets automated efficiency, mid value gets balanced nurture, and high value gets premium treatment with potential human touch"
    weight: 0.30
    description: "Differentiated approach per cart value"
  - type: llm_judge
    criteria: "The high-value segment gets the most attention — more emails, possible personal outreach, concierge-style service, no generic discount approaches for $500+ carts"
    weight: 0.25
    description: "Premium treatment for high-value carts"
  - type: llm_judge
    criteria: "Incentive strategy matches cart value — low-value carts might get flat-dollar shipping offers, while high-value carts might get bundled accessories or extended warranties instead of discounts"
    weight: 0.25
    description: "Value-appropriate incentive strategies"
  - type: llm_judge
    criteria: "Human outreach criteria are defined — specific triggers for when a sales team member should personally reach out (e.g., $500+ cart, repeat visitor, known customer)"
    weight: 0.20
    description: "Clear human outreach criteria"
