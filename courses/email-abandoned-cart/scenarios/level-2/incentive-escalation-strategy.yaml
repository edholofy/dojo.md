meta:
  id: incentive-escalation-strategy
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Design an incentive escalation strategy across a cart recovery sequence"
  tags: [email, abandoned-cart, incentive, escalation, strategy]

state: {}

trigger: |
  "FitGear Pro" (an athletic equipment e-commerce store) wants to design an
  incentive escalation strategy for their abandoned cart sequence.

  Business constraints:
  - Average order value: $185
  - Profit margin: 45%
  - Current cart recovery rate: 6%
  - Monthly abandoned carts: 3,200
  - Current approach: 10% off in every cart email (losing margin unnecessarily)
  - Shipping costs: $12.95 flat rate

  Design a 3-email incentive escalation strategy that:
  1. Email 1: No incentive (recovery through reminder only)
  2. Email 2: Low-cost incentive (specify what and why)
  3. Email 3: Stronger incentive (specify what and why)

  Include: the business math showing expected revenue vs. current approach.

assertions:
  - type: llm_judge
    criteria: "The escalation is logical — Email 1 has no discount, Email 2 introduces a low-cost incentive (likely free shipping at $12.95), and Email 3 offers a stronger discount. Each level is justified"
    weight: 0.25
    description: "Logical incentive escalation"
  - type: llm_judge
    criteria: "The business math is presented — shows expected recovery at each stage, cost of incentives, and demonstrates that the escalation approach generates more net revenue than blanket 10% off"
    weight: 0.30
    description: "Business math proves approach superiority"
  - type: llm_judge
    criteria: "Free shipping is preferred over percentage discount in Email 2 — recognizing that shipping costs are the #1 abandonment reason and cost less than percentage discounts"
    weight: 0.25
    description: "Strategic use of free shipping before discounts"
  - type: llm_judge
    criteria: "The strategy prevents discount conditioning — by starting with no incentive, customers who would have bought anyway don't get unnecessary discounts"
    weight: 0.20
    description: "Prevents unnecessary discount conditioning"
