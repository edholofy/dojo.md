meta:
  id: browse-abandonment-vs-cart
  level: 2
  course: email-abandoned-cart
  type: output
  description: "Differentiate between browse abandonment and cart abandonment emails"
  tags: [email, abandoned-cart, browse-abandonment, differentiation]

state: {}

trigger: |
  "OutdoorPro" (an outdoor recreation retailer) is confusing two behaviors:
  browse abandonment and cart abandonment. Help them design appropriate emails
  for each scenario.

  Scenario A — Browse Abandonment:
  Customer viewed a product page for the "TrailMaster 65L Backpack" ($189) for
  3 minutes, read 2 reviews, but never added it to cart.

  Scenario B — Cart Abandonment:
  Customer added the same backpack to their cart, entered their shipping address,
  but left during the payment step.

  For each scenario:
  1. The appropriate email (subject line, body, CTA)
  2. The key differences in approach and why
  3. Timing differences
  4. Incentive approach differences

assertions:
  - type: llm_judge
    criteria: "The two emails are fundamentally different — browse abandonment is softer and focuses on the product itself, while cart abandonment is more direct and focuses on completing the transaction"
    weight: 0.30
    description: "Fundamentally different approaches"
  - type: llm_judge
    criteria: "The browse abandonment email correctly avoids assuming purchase intent — it introduces the product more broadly, perhaps with alternatives, since the customer never committed to buying"
    weight: 0.25
    description: "Browse email doesn't assume purchase intent"
  - type: llm_judge
    criteria: "The cart abandonment email addresses checkout-specific friction — since the customer left during payment, it addresses security concerns, return policies, and offers to help complete the order"
    weight: 0.25
    description: "Cart email addresses checkout friction"
  - type: llm_judge
    criteria: "Timing and incentive differences are explained — browse emails should be sent later and more cautiously, while cart emails should be sent within 1 hour with stronger conversion tactics"
    weight: 0.20
    description: "Correct timing and incentive differences"
