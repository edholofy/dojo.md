meta:
  id: high-shipping-cost-recovery
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Recover carts abandoned due to high shipping costs"
  tags: [email, abandoned-cart, shipping, friction, cost]

state: {}

trigger: |
  "GlobalCraft" is an international marketplace for handmade goods. Their #1
  abandonment reason is shipping shock — customers see high shipping costs at checkout.

  Data:
  - Average cart value: $65
  - Average shipping cost: $18.50 (international from artisan locations)
  - Abandonment rate at shipping step: 72% (vs. 45% at other steps)
  - Free shipping threshold: $120 (only 15% of carts reach this)
  - Cannot reduce shipping costs (real logistics costs from multiple countries)

  Abandoned cart:
  - Customer: Lisa (shipping to California, USA)
  - Handwoven Macramé Wall Hanging from Bali — $52.00
  - Shipping: $22.50
  - Total: $74.50

  Design a cart recovery email that addresses the shipping cost objection WITHOUT
  just offering free shipping (the economics don't support it).

assertions:
  - type: llm_judge
    criteria: "The shipping cost is addressed honestly — the email doesn't hide it but reframes it, perhaps by explaining it covers international shipping from the artisan's location"
    weight: 0.30
    description: "Honest shipping cost reframing"
  - type: llm_judge
    criteria: "Alternative approaches to free shipping are used — such as showing the value of the handmade item (worth far more than the price), highlighting the artisan's story, or suggesting additional items to reach the free shipping threshold"
    weight: 0.30
    description: "Creative alternatives to free shipping"
  - type: llm_judge
    criteria: "The artisan origin story adds value — knowing the item ships directly from Bali and was handmade by a specific artisan transforms 'expensive shipping' into 'direct from the maker'"
    weight: 0.20
    description: "Artisan story adds perceived value"
  - type: llm_judge
    criteria: "A path to free shipping is offered — suggesting complementary items that would push the cart to $120 threshold, making the customer feel smart rather than pressured"
    weight: 0.20
    description: "Path to free shipping threshold"
