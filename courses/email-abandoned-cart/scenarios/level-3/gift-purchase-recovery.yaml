meta:
  id: gift-purchase-recovery
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Design cart recovery for a gift purchase"
  tags: [email, abandoned-cart, gift, holiday, sentiment]

state: {}

trigger: |
  "CraftedGifts" (a personalized gifts e-commerce store) needs cart recovery
  emails specifically for gift purchases.

  Abandoned cart:
  - Customer: Pat
  - Product: Engraved Wooden Watch Box (personalized) — $89.99
  - Engraving text entered: "Happy Anniversary, Love Always"
  - Gift wrapping selected: Yes ($7.99)
  - Delivery date requested: February 14 (Valentine's Day) — 10 days away
  - Cart total: $97.98

  Gift-specific challenges:
  - Deadline pressure (Valentine's Day delivery required)
  - Emotional purchase (not price-sensitive in the same way)
  - Personalization already started (engraving text entered — commitment)
  - Recipient satisfaction concern (will they like it?)

  Design a 2-email recovery sequence optimized for gift purchases.

assertions:
  - type: llm_judge
    criteria: "The deadline urgency is leveraged — Valentine's Day is 10 days away and the email makes clear that delaying risks missing the delivery date for a personalized item"
    weight: 0.30
    description: "Gift deadline urgency leveraged"
  - type: llm_judge
    criteria: "The emotional investment is acknowledged — the customer already entered their engraving text ('Happy Anniversary, Love Always'), showing commitment. The email references this to reconnect them emotionally"
    weight: 0.25
    description: "Emotional investment acknowledged"
  - type: llm_judge
    criteria: "Gift-specific reassurance is provided — satisfaction guarantees, gift receipt options, exchange policies, and perhaps a preview of how the engraving will look"
    weight: 0.25
    description: "Gift-specific reassurance"
  - type: llm_judge
    criteria: "The copy appeals to the gift-giver's desire to make someone happy — it's about the recipient's joy, not the product features"
    weight: 0.20
    description: "Copy appeals to gift-giving emotion"
