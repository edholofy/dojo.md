meta:
  id: saas-trial-abandonment
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Design a recovery flow for SaaS pricing page abandonment"
  tags: [email, abandoned-cart, saas, pricing-page, b2b]

state: {}

trigger: |
  "ProjectSync" is a B2B project management SaaS tool. They don't have a traditional
  cart, but they track "pricing page abandonment" — visitors who view the pricing
  page and select a plan but don't complete signup.

  Abandonment data:
  - Selected plan: Team ($25/user/month, min 5 users = $125/month)
  - Reached the billing page but left before entering payment info
  - Customer: work email from a mid-size company (200 employees)
  - Job title (from LinkedIn enrichment): Director of Operations

  Context:
  - This is B2B, not B2C — the buyer is likely purchasing for a team
  - They may need stakeholder approval before purchasing
  - Competitors: Monday.com, Asana, ClickUp (all have free tiers)
  - ProjectSync offers a 14-day free trial (which the customer skipped)

  Design a 3-email recovery sequence for this SaaS pricing page abandonment.

assertions:
  - type: llm_judge
    criteria: "The sequence recognizes this is B2B — the buyer may need to convince others, so emails provide shareable assets like ROI calculators, comparison sheets, or case studies"
    weight: 0.30
    description: "B2B buying process recognized"
  - type: llm_judge
    criteria: "The free trial is offered as a fallback — if the customer isn't ready to pay, the emails suggest starting with a free trial to reduce risk and get team buy-in"
    weight: 0.25
    description: "Free trial offered as risk-reducing fallback"
  - type: llm_judge
    criteria: "The competitive positioning is addressed — emails differentiate from Monday.com, Asana, and ClickUp without being negative, highlighting what ProjectSync does uniquely"
    weight: 0.25
    description: "Competitive differentiation addressed"
  - type: llm_judge
    criteria: "The email tone is appropriate for a Director of Operations — professional, data-driven, and focused on operational efficiency and team productivity outcomes"
    weight: 0.20
    description: "Director-level appropriate tone"
