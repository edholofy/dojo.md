meta:
  id: travel-booking-abandonment
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Design cart recovery for an abandoned travel booking"
  tags: [email, abandoned-cart, travel, booking, high-value]

state: {}

trigger: |
  "WanderStay" (a boutique hotel booking platform) needs cart recovery for
  abandoned travel bookings.

  Abandoned booking:
  - Hotel: The Cliffside Resort, Santorini, Greece
  - Dates: July 15-22, 2026 (7 nights)
  - Room: Ocean View Suite — $420/night
  - Total: $2,940 + $290 in taxes/fees = $3,230
  - Customer: Emily, searched from New York IP address

  Travel-specific challenges:
  - Price fluctuation: hotel rates can increase (genuine urgency)
  - Seasonal demand: July is peak season, rooms may sell out
  - Group decision: customer may need to coordinate with a travel partner
  - Comparison shopping: likely checking 3-4 booking platforms
  - Long consideration period: people plan vacations weeks in advance

  Design a 3-email recovery sequence that accounts for travel-specific behavior.

assertions:
  - type: llm_judge
    criteria: "Genuine travel urgency is leveraged — rate fluctuation and room availability in peak season are real, not manufactured. The email creates urgency through legitimate market dynamics"
    weight: 0.30
    description: "Genuine travel urgency leveraged"
  - type: llm_judge
    criteria: "The sequence accounts for group decision-making — perhaps offering to send the booking details to a travel partner, or providing shareable links"
    weight: 0.20
    description: "Group decision-making accommodated"
  - type: llm_judge
    criteria: "The destination is sold, not just the room — emails include Santorini highlights, nearby attractions, or seasonal events to reignite the travel excitement"
    weight: 0.25
    description: "Destination experience sold alongside room"
  - type: llm_judge
    criteria: "Price comparison concern is addressed — the sequence highlights best price guarantees, unique properties not on other platforms, or added value that competitors don't offer"
    weight: 0.25
    description: "Price comparison concern addressed"
