meta:
  id: seasonal-peak-recovery
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Design cart recovery during seasonal peak (Black Friday/holiday)"
  tags: [email, abandoned-cart, seasonal, black-friday, holiday]

state: {}

trigger: |
  "GadgetZone" (electronics retailer) is preparing their Black Friday abandoned
  cart recovery strategy.

  Black Friday context:
  - Expected abandoned carts: 15,000 (5x normal volume)
  - Deals expire at midnight Sunday (Cyber Monday deals are different)
  - Customers are comparison shopping across 5-10 retailers simultaneously
  - Email inbox is extremely crowded (average person gets 50+ promo emails/day)
  - Standard recovery emails get 30% lower open rates during BFCM weekend
  - Stock is genuinely limited (popular items sell out)

  Design:
  1. A modified 3-email BFCM cart recovery sequence (different from year-round)
  2. Subject lines that cut through Black Friday inbox noise
  3. Timing adjustments for the compressed BFCM window
  4. Strategy for when the abandoned item sells out before recovery

assertions:
  - type: llm_judge
    criteria: "The timing is compressed for BFCM — instead of 1hr/24hr/72hr, the sequence fits within the BFCM window (e.g., 30min/6hr/24hr) because deals expire fast"
    weight: 0.25
    description: "Compressed BFCM timing"
  - type: llm_judge
    criteria: "Subject lines are specifically designed to cut through BFCM noise — they don't look like the 50 other promotional emails in the inbox but use urgency, personalization, or pattern interruption"
    weight: 0.25
    description: "Inbox-cutting BFCM subject lines"
  - type: llm_judge
    criteria: "A sold-out contingency is included — when the abandoned item is no longer available, the email offers similar alternatives rather than a dead end"
    weight: 0.25
    description: "Sold-out item contingency plan"
  - type: llm_judge
    criteria: "The comparison shopping behavior is addressed — the email gives reasons to buy HERE rather than at a competitor, without badmouthing competitors"
    weight: 0.25
    description: "Comparison shopping behavior addressed"
