meta:
  id: luxury-brand-recovery
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Design cart recovery for a luxury brand without discounting"
  tags: [email, abandoned-cart, luxury, premium, no-discount]

state: {}

trigger: |
  Design a 3-email cart recovery sequence for "MaisonBlanc," a luxury handbag brand.

  Cart contents:
  - Classic Leather Tote (Cognac) — $1,850.00

  Context:
  - Customer: Sophia, returning customer (1 previous purchase of $920)
  - Luxury brands NEVER discount — it destroys brand equity
  - Average consideration period for luxury: 2-4 weeks
  - Recovery rate for luxury: typically 2-4% (lower than mass market)
  - The brand has a waitlist for certain colors (Cognac is popular but available)
  - Craftsmanship story: each bag takes 40 hours to handcraft in Italy
  - Brand voice: refined, exclusive, understated elegance

  Design a recovery sequence that respects luxury positioning while driving conversion.

assertions:
  - type: llm_judge
    criteria: "No discounts are offered — the sequence relies entirely on exclusivity, craftsmanship storytelling, scarcity, and personal service to drive recovery"
    weight: 0.25
    description: "Recovery without any discounting"
  - type: llm_judge
    criteria: "The craftsmanship story is leveraged — the 40-hour handcrafting process, Italian origin, and quality details reinforce why the $1,850 price is justified"
    weight: 0.25
    description: "Craftsmanship justifies price"
  - type: llm_judge
    criteria: "The sequence acknowledges the longer luxury consideration period — emails are spaced further apart than typical e-commerce (days, not hours) and don't rush the decision"
    weight: 0.25
    description: "Respects luxury consideration timeline"
  - type: llm_judge
    criteria: "Personal service elements are incorporated — perhaps offering a personal shopping consultation, virtual appointment, or exclusive styling service as a conversion lever"
    weight: 0.25
    description: "Personal service as conversion lever"
