meta:
  id: first-time-vs-returning-customer
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Design different recovery approaches for new vs. returning customers"
  tags: [email, abandoned-cart, segmentation, new-vs-returning]

state: {}

trigger: |
  "FreshRoast" (a specialty coffee roaster) wants to differentiate their cart
  recovery for first-time visitors vs. returning customers.

  Scenario A — First-Time Visitor:
  - Never purchased before
  - Cart: Ethiopian Yirgacheffe (12oz bag) — $18.99
  - Browsed 4 product pages before adding to cart
  - No discount code applied

  Scenario B — Returning Customer:
  - Has purchased 3 times in the last 6 months (total spent: $124)
  - Cart: Colombian Supremo (12oz bag) — $16.99 + Coffee Grinder — $49.99
  - Already has a loyalty account
  - Has 150 loyalty points ($7.50 value)

  Design a recovery email for EACH customer type and explain the key strategic
  differences between them.

assertions:
  - type: llm_judge
    criteria: "The first-time visitor email focuses on trust-building — brand story, quality signals, roasting process, reviews from other first-time buyers. They need to be sold on the brand"
    weight: 0.25
    description: "First-time email focuses on trust"
  - type: llm_judge
    criteria: "The returning customer email leverages the existing relationship — references past purchases, mentions loyalty points balance, and treats them as a valued customer rather than a stranger"
    weight: 0.25
    description: "Returning email leverages relationship"
  - type: llm_judge
    criteria: "The loyalty points are used strategically — for the returning customer, mentioning they have $7.50 in points ready to redeem reduces the effective price without costing the brand additional margin"
    weight: 0.25
    description: "Loyalty points used as conversion lever"
  - type: llm_judge
    criteria: "The strategic differences are clearly articulated — the response explains WHY each approach is different, not just WHAT is different"
    weight: 0.25
    description: "Strategic differences clearly explained"
