meta:
  id: exit-intent-to-email-flow
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Design an integrated exit-intent popup to email recovery flow"
  tags: [email, abandoned-cart, exit-intent, popup, integrated]

state: {}

trigger: |
  "StyleBox" (a women's fashion e-commerce brand) wants to integrate their
  exit-intent popup with their email recovery flow.

  Current state:
  - Exit-intent popup shows when customer moves cursor to close tab
  - Popup offers 10% off to stay and complete purchase
  - If they dismiss the popup AND abandon, they get standard cart emails that
    ALSO offer 10% off in Email 3
  - Result: discount fatigue + margin erosion (double discount opportunity)

  Design an integrated flow:
  1. What the exit-intent popup should offer (and what it shouldn't)
  2. How the email sequence adapts based on popup interaction
  3. Three different email paths:
     a) Customer saw popup, dismissed it, then abandoned
     b) Customer entered email in popup but still abandoned
     c) Customer never triggered popup (mobile users, fast exit)
  4. Rules to prevent discount stacking

assertions:
  - type: llm_judge
    criteria: "The popup and email offers don't stack — clear rules prevent a customer from getting 10% from the popup AND another 10% from email. The system is designed as one cohesive flow"
    weight: 0.30
    description: "No discount stacking between popup and email"
  - type: llm_judge
    criteria: "Three distinct paths are designed — popup-dismissed, email-captured, and no-popup. Each path has different email content and incentive strategies"
    weight: 0.25
    description: "Three distinct interaction paths"
  - type: llm_judge
    criteria: "The popup strategy is smarter than just offering a discount — perhaps capturing email first, then offering the incentive in the follow-up email for better attribution"
    weight: 0.25
    description: "Strategic popup beyond simple discounting"
  - type: llm_judge
    criteria: "Mobile users are accounted for — exit-intent popups don't work on mobile, so the mobile path has an alternative capture mechanism"
    weight: 0.20
    description: "Mobile alternative for exit-intent"
