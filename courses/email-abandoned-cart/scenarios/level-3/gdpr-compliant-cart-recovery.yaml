meta:
  id: gdpr-compliant-cart-recovery
  level: 3
  course: email-abandoned-cart
  type: output
  description: "Design GDPR-compliant abandoned cart recovery"
  tags: [email, abandoned-cart, gdpr, compliance, legal]

state: {}

trigger: |
  "EuroStyle" (a fashion e-commerce brand) ships across the EU and must ensure
  their abandoned cart emails comply with GDPR.

  Legal question: Can they send abandoned cart emails at all under GDPR?

  Two customer scenarios:
  Scenario A: A customer who has an account and checked "I agree to receive
  marketing emails" during registration, then abandoned a cart.

  Scenario B: A guest checkout customer who entered their email address during
  checkout (to receive order confirmation) but never opted into marketing.

  For each scenario:
  1. Is the abandoned cart email legally permissible? Under what basis?
  2. If yes, write the email with all required GDPR elements annotated
  3. If no or grey area, explain why and what alternatives exist
  4. How to handle the "right to erasure" if a customer requests it mid-sequence

assertions:
  - type: llm_judge
    criteria: "Scenario A is correctly identified as permissible — the customer gave explicit marketing consent, making cart emails clearly allowed under GDPR"
    weight: 0.20
    description: "Scenario A correctly identified as permissible"
  - type: llm_judge
    criteria: "Scenario B is correctly identified as legally grey — the email was collected for transactional purposes, not marketing. The response discusses soft opt-in rules and legitimate interest as potential bases"
    weight: 0.25
    description: "Scenario B grey area correctly analyzed"
  - type: llm_judge
    criteria: "Required GDPR elements are annotated in the email — unsubscribe link, privacy policy link, data controller identification, and purpose of data processing"
    weight: 0.25
    description: "GDPR elements properly annotated"
  - type: llm_judge
    criteria: "Right to erasure is addressed — if a customer requests deletion mid-sequence, the process for immediately stopping emails AND deleting their data is described"
    weight: 0.30
    description: "Right to erasure process described"
