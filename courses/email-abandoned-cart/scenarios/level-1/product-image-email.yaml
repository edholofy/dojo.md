meta:
  id: product-image-email
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Describe an abandoned cart email layout emphasizing product images"
  tags: [email, abandoned-cart, design, product-images, layout]

state: {}

trigger: |
  Describe the visual layout and copy for an abandoned cart email for "LuxeWatch,"
  a premium watch retailer.

  Cart contents:
  - Timex Marlin Automatic (40mm, Silver/Navy) — $299.00

  Context:
  - Customer: Jordan
  - The watch is a visual product — the image MUST be the hero of the email
  - The customer was browsing from desktop
  - Brand voice: sophisticated, understated luxury
  - The watch has a 4.9 star rating (890 reviews)

  Since you can't embed actual images, describe:
  1. The email layout with clear sections (what goes where)
  2. Where product images would be placed and what they'd show
  3. The copy for each section
  4. How the visual design supports the premium brand

assertions:
  - type: llm_judge
    criteria: "The product image is the hero element — it's described as the largest, most prominent element in the email, not secondary to text"
    weight: 0.30
    description: "Product image as hero element"
  - type: llm_judge
    criteria: "The layout description is specific and practical — it could be handed to a designer and built without ambiguity about what goes where"
    weight: 0.25
    description: "Specific practical layout description"
  - type: llm_judge
    criteria: "The copy is minimal and premium — short, elegant phrases that let the product images do the heavy lifting, consistent with luxury brand communication"
    weight: 0.25
    description: "Minimal premium copy style"
  - type: llm_judge
    criteria: "The overall design supports the luxury positioning — white space, clean typography, and restraint in design choices that signal sophistication"
    weight: 0.20
    description: "Design supports luxury positioning"
