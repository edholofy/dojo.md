meta:
  id: checkout-friction-email
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Write a cart recovery email addressing common checkout friction"
  tags: [email, abandoned-cart, friction, trust]

state: {}

trigger: |
  Write an abandoned cart email that addresses common checkout concerns for
  "ArtisanHome," a handmade furniture marketplace.

  Cart contents:
  - Handcrafted Oak Dining Table — $1,299.00

  Context:
  - Customer: Taylor
  - This is a high-value purchase — the customer likely has more hesitation
  - Common checkout barriers for furniture: shipping damage concerns, return
    policy uncertainty, quality concerns (buying handmade sight-unseen),
    and wondering if the price is justified
  - ArtisanHome offers: free white-glove delivery, 30-day returns, lifetime
    craftsman warranty, and 5-star reviews from 8,000+ customers

  The email should proactively address these trust barriers.

assertions:
  - type: llm_judge
    criteria: "Multiple trust barriers are addressed — shipping damage (white-glove delivery), returns (30-day policy), quality (craftsman warranty), and value (reviews/ratings)"
    weight: 0.30
    description: "Multiple trust barriers addressed"
  - type: llm_judge
    criteria: "The trust signals are relevant to the high-value purchase — buying a $1,299 table online requires more reassurance than a $30 product, and the email acknowledges this"
    weight: 0.25
    description: "Trust signals match high-value purchase context"
  - type: llm_judge
    criteria: "The email doesn't feel like a list of policies — trust information is woven into a narrative that empathizes with the customer's hesitation"
    weight: 0.25
    description: "Trust info woven into empathetic narrative"
  - type: llm_judge
    criteria: "The CTA is confident and reassuring — it reduces the perceived risk of completing the purchase rather than just urging them to buy"
    weight: 0.20
    description: "Risk-reducing CTA"
