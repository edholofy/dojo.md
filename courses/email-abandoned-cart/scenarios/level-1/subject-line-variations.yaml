meta:
  id: subject-line-variations
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Write abandoned cart subject line variations"
  tags: [email, subject-line, abandoned-cart, copywriting]

state: {}

trigger: |
  Write 8 subject line variations for an abandoned cart email from "PetPals,"
  an online pet food and supplies store.

  Cart contents: Premium grain-free dog food ($54.99) and a dog bed ($89.99)

  For each subject line:
  1. The subject line (keep under 40 characters for mobile)
  2. Matching preview text (under 90 characters)
  3. The psychological approach used (curiosity, urgency, humor, etc.)

  Cover at least 4 different psychological approaches across the 8 variations.

assertions:
  - type: llm_judge
    criteria: "Eight subject lines are provided, each under 40 characters, with at least 4 different psychological approaches represented"
    weight: 0.30
    description: "Eight diverse subject lines under 40 chars"
  - type: llm_judge
    criteria: "Preview text complements each subject line — it adds information rather than repeating the subject line, creating a one-two punch that drives opens"
    weight: 0.25
    description: "Complementary preview text"
  - type: llm_judge
    criteria: "The psychological approaches are correctly identified — curiosity, urgency, FOMO, humor, personalization, benefit-driven, etc. The labeling matches the actual technique"
    weight: 0.25
    description: "Correctly identified psychological approaches"
  - type: llm_judge
    criteria: "The pet brand context shines through — at least some subject lines incorporate pet-themed language or emotions (e.g., 'Your pup is waiting' rather than generic cart reminders)"
    weight: 0.20
    description: "Pet brand personality in subject lines"
