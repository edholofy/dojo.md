meta:
  id: free-shipping-incentive
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Write an abandoned cart email offering free shipping"
  tags: [email, abandoned-cart, free-shipping, incentive]

state: {}

trigger: |
  Write an abandoned cart email that offers free shipping as the incentive for
  "FreshFit," an athleisure clothing brand.

  Cart contents:
  - High-Waist Leggings (Black, Size S) — $58.00
  - Sports Bra (Navy, Size S) — $42.00
  - Cart total: $100.00
  - Standard shipping: $7.95

  Context:
  - Customer: Riley
  - Free shipping threshold is normally $125 (this cart is $25 short)
  - This is the SECOND email (sent 24 hours after abandonment)
  - The first email was a simple reminder with no incentive
  - Brand voice: energetic, motivational, body-positive

  The email should offer free shipping on their current cart as a one-time incentive.

assertions:
  - type: llm_judge
    criteria: "Free shipping is offered as a special one-time incentive — it's positioned as an exclusive offer for this customer, not a generic site-wide promotion"
    weight: 0.30
    description: "Free shipping positioned as exclusive offer"
  - type: llm_judge
    criteria: "The savings math is clear — the customer understands they're saving $7.95 on shipping, which combined with their $100 cart makes the total feel more accessible"
    weight: 0.25
    description: "Clear savings communication"
  - type: llm_judge
    criteria: "The email acknowledges this is the second touchpoint — it doesn't repeat the first email but builds on it with the new incentive"
    weight: 0.25
    description: "Builds on first email naturally"
  - type: llm_judge
    criteria: "The brand voice is energetic and body-positive — the copy motivates the customer about their fitness journey, not just the transaction"
    weight: 0.20
    description: "Energetic body-positive brand voice"
