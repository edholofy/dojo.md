meta:
  id: simple-discount-recovery
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Write an abandoned cart email with a simple percentage discount"
  tags: [email, abandoned-cart, discount, incentive]

state: {}

trigger: |
  Write the third and final email in an abandoned cart sequence for "SnackBox,"
  a monthly snack subscription ($29.99/month).

  Cart contents:
  - SnackBox Monthly Subscription — $29.99/month

  Context:
  - Customer: Sam
  - Email 1 (1 hour ago): Simple reminder — opened but didn't click
  - Email 2 (24 hours ago): Showed customer reviews — opened but didn't click
  - This is Email 3 (72 hours after abandonment): Last chance with 15% off first box
  - Discount code: SNACK15
  - The discount expires in 24 hours
  - Brand voice: fun, playful, snack-obsessed

  This is the final push — make it count without being desperate.

assertions:
  - type: llm_judge
    criteria: "The email acknowledges this is the final attempt — it creates closure ('last chance') without being guilt-trippy or desperate"
    weight: 0.25
    description: "Final attempt with closure, not desperation"
  - type: llm_judge
    criteria: "The 15% discount and code SNACK15 are prominently featured — the incentive is the star of this email since previous emails without discounts didn't convert"
    weight: 0.25
    description: "Discount prominently featured"
  - type: llm_judge
    criteria: "The 24-hour expiration creates real urgency — it motivates immediate action, and the expiration feels natural given it's the final email"
    weight: 0.25
    description: "24-hour expiration creates urgency"
  - type: llm_judge
    criteria: "The playful snack-obsessed brand voice is maintained — even in a discount-heavy email, the personality comes through"
    weight: 0.25
    description: "Playful brand voice maintained"
