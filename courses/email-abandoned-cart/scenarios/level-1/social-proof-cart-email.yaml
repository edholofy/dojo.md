meta:
  id: social-proof-cart-email
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Write an abandoned cart email using social proof"
  tags: [email, abandoned-cart, social-proof, reviews]

state: {}

trigger: |
  Write an abandoned cart email that uses social proof for "GlowSkin," a skincare brand.

  Cart contents:
  - Vitamin C Brightening Serum — $48.00 (4.8 stars, 2,340 reviews)
  - Hyaluronic Acid Moisturizer — $36.00 (4.7 stars, 1,890 reviews)
  - Cart total: $84.00

  Available social proof:
  - "This serum literally transformed my skin in 2 weeks" — Sarah M. ★★★★★
  - "I've tried $200 serums that don't work as well as this $48 one" — Katie R. ★★★★★
  - "The moisturizer is the only one that doesn't break me out" — Priya K. ★★★★★
  - Over 150,000 5-star reviews across all products
  - Featured in Allure, Vogue, and Byrdie

  Weave social proof naturally into the cart recovery email.

assertions:
  - type: llm_judge
    criteria: "Social proof is woven into the email naturally — reviews and ratings support the cart items specifically, not randomly placed. Each piece of proof reduces a specific hesitation"
    weight: 0.30
    description: "Social proof woven naturally"
  - type: llm_judge
    criteria: "The star ratings and review counts are included for the specific abandoned products — not just generic brand-level social proof"
    weight: 0.25
    description: "Product-specific ratings and reviews"
  - type: llm_judge
    criteria: "Press mentions (Allure, Vogue, Byrdie) are used as authority signals — they build trust in the brand's legitimacy"
    weight: 0.20
    description: "Press authority signals included"
  - type: llm_judge
    criteria: "The email doesn't read like a review compilation page — the social proof is integrated into a cohesive email that still has a clear CTA to complete the purchase"
    weight: 0.25
    description: "Cohesive email with CTA, not just reviews"
