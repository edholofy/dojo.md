meta:
  id: fashion-cart-recovery
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Write an abandoned cart email for a fashion brand"
  tags: [email, abandoned-cart, fashion, reminder]

state: {}

trigger: |
  Write an abandoned cart email for "UrbanEdge," a streetwear brand.

  Cart contents:
  - Oversized Graphic Tee (Black, Size L) — $45.00
  - Cargo Joggers (Olive, Size M) — $68.00
  - Canvas Sneakers (White, Size 10) — $95.00
  - Cart total: $208.00

  Context:
  - Customer: Alex
  - Abandoned 45 minutes ago on mobile
  - Brand voice: cool, confident, understated — NOT corporate or trying too hard
  - The brand is popular with 18-28 year olds
  - No discount in this first email

  Write subject line, preview text, and full email body.

assertions:
  - type: llm_judge
    criteria: "The voice is genuinely cool and on-brand for streetwear — it doesn't sound like a generic e-commerce email or a corporation trying to be hip"
    weight: 0.30
    description: "Authentic streetwear brand voice"
  - type: llm_judge
    criteria: "All three cart items are referenced with enough detail (name, color, size) that Alex can recall exactly what they were shopping for"
    weight: 0.25
    description: "Cart items with identifying details"
  - type: llm_judge
    criteria: "The email is mobile-optimized in its design — short paragraphs, concise copy, clear CTA, since the customer was shopping on mobile"
    weight: 0.25
    description: "Mobile-optimized design and copy"
  - type: llm_judge
    criteria: "The CTA uses on-brand language — not generic 'Complete Your Order' but something that fits the streetwear aesthetic"
    weight: 0.20
    description: "On-brand CTA language"
