meta:
  id: basic-cart-reminder
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Write a simple abandoned cart reminder email"
  tags: [email, abandoned-cart, reminder, basics]

state: {}

trigger: |
  Write an abandoned cart reminder email for "CozyHome," an online home décor store.

  Cart contents:
  - Velvet Throw Pillow (Emerald Green) — $34.99
  - Ceramic Table Lamp (Warm White) — $79.99
  - Cart total: $114.98

  Context:
  - Customer name: Jamie
  - Cart was abandoned 1 hour ago
  - No discount or incentive — this is a pure reminder
  - Brand voice: warm, inviting, design-focused
  - Free shipping on orders over $75 (this cart qualifies)

  Write the complete email: subject line, preview text, body, and CTA.

assertions:
  - type: llm_judge
    criteria: "The email is a gentle reminder, not a hard sell — it feels like a helpful nudge rather than a desperate sales pitch"
    weight: 0.25
    description: "Gentle reminder tone"
  - type: llm_judge
    criteria: "Both abandoned items are mentioned with their names and prices — the customer can immediately recall what they left behind"
    weight: 0.25
    description: "Cart items clearly listed"
  - type: llm_judge
    criteria: "Free shipping qualification is highlighted — since the cart qualifies for free shipping, this perk is mentioned to reduce checkout friction"
    weight: 0.25
    description: "Free shipping perk highlighted"
  - type: llm_judge
    criteria: "A single clear CTA directs back to their cart — not multiple links to browse, shop categories, or read a blog"
    weight: 0.25
    description: "Single clear return-to-cart CTA"
