meta:
  id: timing-explanation
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Explain optimal timing for abandoned cart emails"
  tags: [email, timing, abandoned-cart, strategy]

state: {}

trigger: |
  A small Shopify store owner asks: "When should I send my abandoned cart emails?
  I currently send one email 24 hours after abandonment. Is that right?"

  Context:
  - Store: handmade jewelry, average order $65
  - They only send ONE abandoned cart email
  - Monthly abandoned carts: ~400
  - Current recovery rate: 3%
  - Using Klaviyo for email automation

  Write a response that:
  1. Explains why 24 hours is too late for the first email
  2. Recommends optimal timing for a 3-email sequence
  3. Explains what each email should accomplish
  4. Provides expected recovery rate improvement

assertions:
  - type: llm_judge
    criteria: "The response explains that 24 hours is too late — within 1 hour is optimal for the first email, with data showing conversion drops significantly after the first hour"
    weight: 0.30
    description: "Explains why 24 hours is too late"
  - type: llm_judge
    criteria: "A 3-email sequence is recommended with specific timing — approximately 1 hour, 24 hours, and 72 hours, with clear reasoning for each interval"
    weight: 0.30
    description: "3-email sequence with specific timing"
  - type: llm_judge
    criteria: "Each email has a distinct purpose — reminder, objection handling/social proof, and final incentive push. They aren't just three copies of the same message"
    weight: 0.20
    description: "Distinct purpose for each email"
  - type: llm_judge
    criteria: "Expected improvement is reasonable — moving from 3% to approximately 8-12% recovery rate with a proper 3-email sequence, backed by benchmark data"
    weight: 0.20
    description: "Reasonable recovery rate improvement estimate"
