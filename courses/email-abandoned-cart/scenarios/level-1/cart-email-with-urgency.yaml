meta:
  id: cart-email-with-urgency
  level: 1
  course: email-abandoned-cart
  type: output
  description: "Write an abandoned cart email using urgency tactics"
  tags: [email, abandoned-cart, urgency, scarcity]

state: {}

trigger: |
  Write an abandoned cart email that uses urgency and scarcity for "TechDeals,"
  an electronics retailer.

  Cart contents:
  - Sony WH-1000XM6 Headphones — $349.99 (sale price, normally $399.99)
  - Cart total: $349.99

  Context:
  - The sale price expires in 48 hours
  - Only 12 units left in stock
  - Customer name: Morgan
  - Abandoned 2 hours ago
  - Brand voice: tech-savvy, helpful, data-driven

  Use urgency and scarcity naturally — NOT in a manipulative way.

assertions:
  - type: llm_judge
    criteria: "Urgency is created through legitimate signals — the real sale price expiration and genuine limited stock, not fake countdown timers or manufactured scarcity"
    weight: 0.30
    description: "Legitimate urgency signals"
  - type: llm_judge
    criteria: "The $50 savings is highlighted — the difference between sale price ($349.99) and regular price ($399.99) is made clear to reinforce what the customer would lose by waiting"
    weight: 0.25
    description: "Savings clearly highlighted"
  - type: llm_judge
    criteria: "The scarcity (12 units left) is mentioned without being alarmist — it creates awareness without feeling like a pressure tactic"
    weight: 0.25
    description: "Scarcity mentioned without manipulation"
  - type: llm_judge
    criteria: "The overall email still feels helpful, not pushy — it's positioned as doing the customer a favor by reminding them, not pressuring them to buy"
    weight: 0.20
    description: "Helpful not pushy overall feel"
