meta:
  id: cart-recovery-audit
  level: 4
  course: email-abandoned-cart
  type: output
  description: "Audit and rebuild a failing cart recovery program"
  tags: [email, abandoned-cart, audit, diagnosis, rebuild]

state: {}

trigger: |
  Audit "BrightSmile" (dental care DTC brand) cart recovery program. It's
  performing well below benchmarks.

  Current metrics vs. benchmarks:
  | Metric | BrightSmile | Benchmark |
  |--------|-------------|-----------|
  | Email 1 open rate | 22% | 48% |
  | Email 1 click rate | 1.8% | 8% |
  | Email 2 open rate | 14% | 35% |
  | Email 3 open rate | 8% | 28% |
  | Recovery rate | 1.2% | 10-15% |
  | Unsubscribe rate | 3.8% | <0.5% |

  Current setup:
  - Email 1: Sent 6 hours after abandonment. Subject: "You left something behind!"
    Body: 500-word brand manifesto about oral health importance. CTA: "Complete Order"
  - Email 2: Sent 48 hours later. Subject: "Don't miss out on a healthier smile!"
    Body: Same 500-word manifesto, repeated. Same CTA.
  - Email 3: Sent 5 days later. Subject: "Last chance for 20% off!"
    Body: Aggressive sales copy, 3 different CTAs, pop-up discount code.
  - Sending from: donotreply@brightsmile.com
  - No product images in any email
  - Not personalized (no customer name, no cart contents shown)

  Provide:
  1. Root cause analysis of each metric failure
  2. Complete rebuild plan with rewritten emails
  3. Technical fixes (sending domain, deliverability)
  4. Expected metric improvements after rebuild

assertions:
  - type: llm_judge
    criteria: "Root causes are correctly identified — 6-hour delay, generic subject lines, no product images, donotreply@ sender, repeated content, aggressive Email 3, and 3.8% unsubscribe indicating spam-like behavior"
    weight: 0.30
    description: "Accurate root cause identification"
  - type: llm_judge
    criteria: "Rewritten emails fix every identified problem — faster timing, personalized subject lines, product images, concise copy, single CTAs, and escalating approach without aggression"
    weight: 0.30
    description: "Rewrites fix all identified problems"
  - type: llm_judge
    criteria: "Technical fixes are included — changing donotreply@ to a personable sender name, fixing deliverability signals, and adding authentication"
    weight: 0.20
    description: "Technical sending fixes included"
  - type: llm_judge
    criteria: "Expected improvements are specific and achievable — estimates for each metric based on the specific changes made, not generic promises"
    weight: 0.20
    description: "Specific achievable improvement estimates"
