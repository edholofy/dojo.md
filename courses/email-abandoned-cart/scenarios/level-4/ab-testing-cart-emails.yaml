meta:
  id: ab-testing-cart-emails
  level: 4
  course: email-abandoned-cart
  type: output
  description: "Design a comprehensive A/B testing program for cart recovery"
  tags: [email, abandoned-cart, ab-testing, optimization]

state: {}

trigger: |
  "ModernHome" (furniture e-commerce, $8M revenue) wants to systematically
  optimize their cart recovery emails through A/B testing.

  Current performance:
  - Email 1 (1hr): 48% open, 8% click, 4.2% conversion
  - Email 2 (24hr): 35% open, 5% click, 2.8% conversion
  - Email 3 (72hr, with 10% off): 28% open, 7% click, 3.5% conversion
  - Monthly abandoned carts: 6,500
  - Monthly recovered revenue: $52,000

  Design a 6-month A/B testing roadmap:
  1. What to test first (highest impact variables)
  2. Testing methodology for each experiment
  3. Sample size calculations and test duration
  4. How to isolate variables across a 3-email sequence
  5. Decision framework for implementing winners
  6. Projected revenue impact from optimization

assertions:
  - type: llm_judge
    criteria: "The testing roadmap prioritizes highest-impact variables first — subject lines and timing before design elements, and Email 1 before Email 3 (since Email 1 drives 60% of recovery)"
    weight: 0.25
    description: "Highest-impact variables tested first"
  - type: llm_judge
    criteria: "Sample size and statistical rigor are addressed — calculations account for the 6,500 monthly carts, required confidence levels, and minimum detectable effect"
    weight: 0.25
    description: "Statistically rigorous methodology"
  - type: llm_judge
    criteria: "Variable isolation is handled — the plan explains how to test one element at a time within a multi-email sequence without confounding results"
    weight: 0.25
    description: "Variable isolation in multi-email testing"
  - type: llm_judge
    criteria: "Revenue projections are based on the current $52K/month baseline — improvements are estimated per test, compounding over 6 months with reasonable expectations (not 10x improvement)"
    weight: 0.25
    description: "Reasonable revenue impact projections"
