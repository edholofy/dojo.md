meta:
  id: cart-recovery-personalization-engine
  level: 4
  course: email-abandoned-cart
  type: output
  description: "Design a personalization engine for cart recovery emails"
  tags: [email, abandoned-cart, personalization, engine, dynamic]

state: {}

trigger: |
  "MegaMart" (an online department store) sends 50,000 abandoned cart emails per
  month. They want to build a personalization engine that dynamically assembles
  each email based on customer data.

  Available data points per customer:
  - Customer tier: New, Regular, VIP, Dormant
  - Cart value: Low (<$50), Medium ($50-200), High ($200+)
  - Product category: Electronics, Fashion, Home, Beauty, Sports
  - Device: Mobile, Desktop, Tablet
  - Previous purchase history: 0, 1-3, 4-10, 10+ orders
  - Abandonment stage: Product page, Cart page, Shipping, Payment
  - Time of abandonment: Morning, Afternoon, Evening, Late night

  Dynamic email components:
  - Subject line (tone and urgency level)
  - Hero section (image vs. text, product vs. lifestyle)
  - Body copy (length, formality, social proof type)
  - Incentive block (none, free shipping, % off, $ off, gift with purchase)
  - CTA (text, color, placement)
  - Footer (related products, help links, social)

  Design the personalization logic matrix showing how each data point affects
  each email component. Then show 3 fully assembled example emails.

assertions:
  - type: llm_judge
    criteria: "A clear logic matrix connects data points to email components — it's obvious how a VIP customer with a high-value Electronics cart on mobile gets a different email than a New customer with a low-value Fashion cart on desktop"
    weight: 0.30
    description: "Clear personalization logic matrix"
  - type: llm_judge
    criteria: "The three example emails demonstrate dramatically different experiences — they look like they came from different brands, all driven by the same template system"
    weight: 0.25
    description: "Three dramatically different assembled emails"
  - type: llm_judge
    criteria: "Incentive logic is business-smart — VIP customers get higher-value incentives because their LTV justifies it, while new customers get free shipping (lower cost) rather than percentage discounts"
    weight: 0.25
    description: "Business-smart incentive personalization"
  - type: llm_judge
    criteria: "The system is practical to implement — it doesn't require 1000 unique templates but uses modular blocks that combine in different ways"
    weight: 0.20
    description: "Practical modular implementation"
