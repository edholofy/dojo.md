meta:
  id: accessibility-cart-emails
  level: 4
  course: email-abandoned-cart
  type: output
  description: "Optimize cart recovery emails for accessibility"
  tags: [email, abandoned-cart, accessibility, inclusive-design]

state: {}

trigger: |
  "AccessShop" (a general retailer committed to accessibility) wants to ensure
  their cart recovery emails are fully accessible.

  Current issues identified by accessibility audit:
  1. Product images have no alt text
  2. CTA buttons rely on color alone to indicate action
  3. Email layout breaks on screen readers
  4. Font size is 12px (too small for low-vision users)
  5. Discount codes use all-caps styling that screen readers read letter-by-letter
  6. Price information is in images, not HTML text

  Rewrite their cart recovery email with full accessibility:
  1. Fix every identified issue with specific implementation details
  2. Write alt text for a cart containing 3 different products
  3. Design the CTA to work for colorblind users and screen reader users
  4. Ensure the email works in plain text fallback
  5. Create an accessibility checklist for all future cart emails

assertions:
  - type: llm_judge
    criteria: "All 6 accessibility issues are fixed with specific implementation details — not just 'add alt text' but showing actual alt text examples for the products"
    weight: 0.30
    description: "All 6 issues fixed with specific solutions"
  - type: llm_judge
    criteria: "The accessibility improvements don't compromise the email's effectiveness — the email is still visually appealing and conversion-focused while being fully accessible"
    weight: 0.25
    description: "Accessibility doesn't compromise effectiveness"
  - type: llm_judge
    criteria: "Screen reader experience is specifically addressed — the email reading order makes sense, important information comes first, and interactive elements are properly labeled"
    weight: 0.25
    description: "Screen reader experience designed"
  - type: llm_judge
    criteria: "The accessibility checklist is comprehensive and reusable — it covers alt text, color contrast, font sizes, semantic HTML, screen reader testing, and plain text fallback"
    weight: 0.20
    description: "Comprehensive reusable accessibility checklist"
