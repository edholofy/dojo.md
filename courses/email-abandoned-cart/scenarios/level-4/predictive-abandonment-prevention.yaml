meta:
  id: predictive-abandonment-prevention
  level: 4
  course: email-abandoned-cart
  type: output
  description: "Design a predictive system to prevent cart abandonment before it happens"
  tags: [email, abandoned-cart, predictive, prevention, ai]

state: {}

trigger: |
  "SmartShop" (a general e-commerce retailer, $25M revenue) wants to go beyond
  recovery to PREVENTION — using behavioral signals to intervene before customers
  abandon their carts.

  Available behavioral signals:
  - Mouse movement patterns (hovering near close button)
  - Time on checkout page (longer = more likely to abandon)
  - Switching between tabs (comparison shopping)
  - Adding/removing items from cart (indecision)
  - Scroll depth on product pages
  - Session count without purchase (repeat visitor without buying)
  - Cart value relative to customer's typical order

  Design:
  1. A predictive abandonment scoring model (which signals matter most)
  2. On-site interventions triggered by high abandonment probability
  3. Pre-emptive email strategy for customers identified as at-risk
  4. How the prevention system works with the recovery system
  5. Measurement framework to prove prevention works

assertions:
  - type: llm_judge
    criteria: "The predictive scoring model is well-designed — signals are weighted by predictive power, and the model produces a clear abandonment risk score that triggers different interventions"
    weight: 0.25
    description: "Well-designed predictive scoring model"
  - type: llm_judge
    criteria: "On-site interventions are specific and appropriate — live chat triggers, personalized offers, simplified checkout options, or saved-cart notifications based on the risk signal"
    weight: 0.25
    description: "Specific on-site interventions"
  - type: llm_judge
    criteria: "The prevention and recovery systems are integrated — prevention reduces the number of carts that need recovery, and the recovery system handles what prevention misses"
    weight: 0.25
    description: "Prevention-recovery integration"
  - type: llm_judge
    criteria: "The measurement framework can distinguish between prevented abandonments and natural non-abandonments — using control groups or holdout testing to prove the system works"
    weight: 0.25
    description: "Prevention effectiveness measurement"
