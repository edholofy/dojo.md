meta:
  id: cart-recovery-attribution
  level: 4
  course: email-abandoned-cart
  type: output
  description: "Build a revenue attribution model for cart recovery"
  tags: [email, abandoned-cart, attribution, analytics, revenue]

state: {}

trigger: |
  "TrendStyle" (fashion e-commerce, $12M revenue) is debating the true value
  of their cart recovery program. The marketing director says it generates
  $180K/month. The CFO says it's over-attributed because many of those
  customers would have returned and purchased anyway.

  Data:
  - Monthly cart recovery attributed revenue: $180,000
  - Recovery emails sent: 25,000/month
  - Last-click attribution: $180,000 (100% credit to cart email)
  - Holdout test (10% group receives no cart emails):
    * Control group (no emails): 8% purchase rate within 7 days
    * Email group: 14% purchase rate within 7 days
  - The 8% "natural return rate" means $103,000 would happen WITHOUT emails
  - Incremental revenue from emails: ~$77,000/month (not $180,000)

  Design:
  1. An attribution model that correctly values cart recovery
  2. How to present these numbers to both the marketing director and CFO
  3. A holdout testing methodology for ongoing measurement
  4. Recommendations based on the true incremental value

assertions:
  - type: llm_judge
    criteria: "The attribution math is correct — the response distinguishes between attributed revenue ($180K) and incremental revenue (~$77K) and explains why the difference matters"
    weight: 0.30
    description: "Correct incremental vs. attributed math"
  - type: llm_judge
    criteria: "Both stakeholders' perspectives are addressed — the marketing director's reporting isn't wrong (those customers did click the email), but the CFO is right that the true business impact is the incremental lift"
    weight: 0.25
    description: "Both stakeholder perspectives validated"
  - type: llm_judge
    criteria: "The holdout testing methodology is sound — explains how to maintain a statistically valid holdout group, how often to measure, and how to ensure the test doesn't sacrifice too much revenue"
    weight: 0.25
    description: "Sound holdout testing methodology"
  - type: llm_judge
    criteria: "Actionable recommendations follow from the data — perhaps the $77K incremental value still justifies the program cost but should inform incentive spending (don't give discounts to the 8% who'd buy anyway)"
    weight: 0.20
    description: "Data-driven actionable recommendations"
