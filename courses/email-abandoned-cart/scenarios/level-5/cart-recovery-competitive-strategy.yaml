meta:
  id: cart-recovery-competitive-strategy
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Design cart recovery that addresses competitive comparison shopping"
  tags: [email, abandoned-cart, competitive, comparison-shopping]

state: {}

trigger: |
  "HomeTech" (smart home devices retailer) knows that 45% of their cart
  abandonments happen because customers are comparison shopping across
  Amazon, Best Buy, and the brand's own website.

  Abandoned cart:
  - Customer: Alex
  - Product: SmartNest Thermostat Pro — $249.99
  - The same product is available on:
    * Amazon: $249.99 (Prime shipping, easy returns)
    * Best Buy: $239.99 (10-day price match, store pickup)
    * HomeTech.com: $249.99 (manufacturer direct, 3-year warranty)

  HomeTech's competitive advantages:
  - Direct manufacturer warranty (3 years vs. 1 year standard)
  - Free professional installation ($150 value)
  - Exclusive color options
  - Priority customer support from actual engineers
  - 60-day return policy (vs. Amazon's 30)

  Design a cart recovery strategy that wins back comparison shoppers WITHOUT
  just matching the lowest price.

assertions:
  - type: llm_judge
    criteria: "The strategy differentiates on value, not price — it doesn't match Best Buy's $239.99 but instead emphasizes the $150 installation, extended warranty, and expert support that competitors can't offer"
    weight: 0.30
    description: "Value differentiation over price matching"
  - type: llm_judge
    criteria: "The total value proposition is calculated — when you add free installation ($150) and extended warranty value to HomeTech's price, the 'real cost' is lower than competitors"
    weight: 0.25
    description: "Total value proposition math presented"
  - type: llm_judge
    criteria: "The email acknowledges comparison shopping without being defensive — it doesn't say 'don't buy from Amazon' but positions HomeTech as the smart choice for savvy shoppers"
    weight: 0.25
    description: "Non-defensive comparison shopping acknowledgment"
  - type: llm_judge
    criteria: "Urgency is created through exclusive benefits — limited-time installation offer, exclusive color availability, or warranty promotion that competitors can't match"
    weight: 0.20
    description: "Exclusive benefit urgency"
