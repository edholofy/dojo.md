meta:
  id: cart-recovery-economics-model
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Build a complete economic model for cart recovery ROI"
  tags: [email, abandoned-cart, economics, roi, model]

state: {}

trigger: |
  "RetailMax" (mid-market retailer, $50M annual revenue) is debating whether to
  invest $120K/year in upgrading their cart recovery system. The CEO wants a
  detailed economic model.

  Current state:
  - Monthly abandoned carts: 45,000
  - Average cart value: $95
  - Current recovery rate: 7% (3,150 orders/month)
  - Current monthly recovered revenue: $299,250
  - Current system cost: $2,400/month (Klaviyo plan)
  - Average discount given: 12% on recovered carts
  - Average shipping cost absorbed: $8.50 per recovered cart

  Proposed upgrade ($120K/year investment):
  - AI-powered personalization
  - Multi-channel (adding SMS + push)
  - Advanced segmentation engine
  - Real-time inventory integration
  - Dedicated cart recovery specialist (salary)
  - Expected recovery rate: 12-15%

  Build:
  1. Complete P&L model for current vs. proposed system
  2. Break-even analysis (when does the $120K investment pay for itself?)
  3. Sensitivity analysis (what if the projected recovery rate falls short?)
  4. 3-year revenue projection with compounding improvements
  5. Non-revenue benefits (customer data, brand perception, LTV impact)

assertions:
  - type: llm_judge
    criteria: "The P&L model is complete — includes revenue, discount costs, shipping absorption, platform costs, SMS costs, personnel costs, and net profit for both current and proposed systems"
    weight: 0.30
    description: "Complete P&L model with all cost categories"
  - type: llm_judge
    criteria: "The break-even analysis is clear — identifies the exact recovery rate improvement needed to justify the $120K investment, accounting for all costs including incremental discount spend"
    weight: 0.25
    description: "Clear break-even analysis"
  - type: llm_judge
    criteria: "Sensitivity analysis shows multiple scenarios — what happens at 10%, 12%, and 15% recovery rates, and at what point the investment becomes unprofitable"
    weight: 0.25
    description: "Multi-scenario sensitivity analysis"
  - type: llm_judge
    criteria: "Non-revenue benefits are quantified where possible — customer data value, reduced churn from better experience, LTV lift from personalized recovery, and brand perception impact"
    weight: 0.20
    description: "Non-revenue benefits quantified"
