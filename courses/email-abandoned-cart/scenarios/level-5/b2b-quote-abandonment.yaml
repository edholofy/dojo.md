meta:
  id: b2b-quote-abandonment
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Design recovery for abandoned B2B quotes and proposals"
  tags: [email, abandoned-cart, b2b, quote, proposal, enterprise]

state: {}

trigger: |
  "CloudScale" (a B2B cloud infrastructure provider) has an "abandoned quote"
  problem — the B2B equivalent of cart abandonment.

  The journey:
  1. Prospect visits pricing page
  2. Uses the pricing calculator to configure their cloud package
  3. Submits a quote request (providing email, company name, requirements)
  4. Receives an automated quote email with pricing: $4,500/month
  5. Never responds to the quote (abandonment)

  Data:
  - Monthly quote requests: 800
  - Quote-to-close rate: 12% (benchmark: 25%)
  - Average deal value: $54K/year ($4,500/month)
  - Average sales cycle: 45 days
  - 60% of abandoned quotes cite "still evaluating options"
  - 25% cite "need internal approval"
  - 15% cite "budget not approved yet"

  Design a 5-email abandoned quote recovery sequence that addresses the
  B2B-specific reasons for abandonment.

assertions:
  - type: llm_judge
    criteria: "The sequence addresses all three abandonment reasons — evaluating options gets competitive comparison content, internal approval gets stakeholder-friendly resources, budget delays get ROI justification tools"
    weight: 0.30
    description: "All three abandonment reasons addressed"
  - type: llm_judge
    criteria: "The sequence is properly paced for B2B — emails are spaced over weeks (not days), reflecting the 45-day sales cycle and enterprise decision-making process"
    weight: 0.25
    description: "B2B-appropriate pacing over weeks"
  - type: llm_judge
    criteria: "Sales team handoff is integrated — the sequence identifies when automated emails should transition to personal outreach from an account executive"
    weight: 0.25
    description: "Automated-to-human handoff integrated"
  - type: llm_judge
    criteria: "Champion enablement is provided — resources that the internal champion can share with their decision-makers (ROI calculators, comparison sheets, security documentation)"
    weight: 0.20
    description: "Champion enablement resources provided"
