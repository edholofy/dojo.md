meta:
  id: privacy-first-cart-recovery
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Design cart recovery for a privacy-conscious brand in a cookieless world"
  tags: [email, abandoned-cart, privacy, cookieless, first-party-data]

state: {}

trigger: |
  "EthicalShop" (a sustainable fashion brand) positions itself as privacy-first.
  With third-party cookies deprecated and Apple Mail Privacy Protection inflating
  open rates, they need to rethink their cart recovery strategy.

  Privacy constraints they've committed to:
  - No third-party tracking pixels
  - No cross-site tracking or retargeting
  - Minimal data collection (only what's needed for the transaction)
  - Apple Mail Privacy Protection makes open rates unreliable
  - GDPR-strict approach globally (even for US customers)
  - No purchasing behavioral data from third parties

  Current challenges:
  - Can't identify anonymous browsers who abandon carts (no login required to add)
  - Open rates are unreliable (50%+ of "opens" are Apple Mail pre-loads)
  - Can't retarget abandoners on social media or display ads
  - Must rely entirely on first-party data and direct email

  Design a privacy-first cart recovery strategy that:
  1. Works within these constraints
  2. Identifies which customers they CAN reach (and which they can't)
  3. Uses first-party data effectively
  4. Measures success without open rate
  5. Maintains brand integrity as a privacy-first company

assertions:
  - type: llm_judge
    criteria: "The strategy works within the privacy constraints — no cheating, no 'well you could just add a pixel,' but genuine solutions using first-party data and direct communication"
    weight: 0.25
    description: "Genuinely privacy-first approach"
  - type: llm_judge
    criteria: "The identification gap is addressed — clearly explains that only logged-in users or those who entered email can be reached, and offers strategies to increase the identifiable pool"
    weight: 0.25
    description: "Identification gap addressed honestly"
  - type: llm_judge
    criteria: "Alternative success metrics replace open rates — click-through rates, conversion rates, and revenue are used as primary metrics since open rates are unreliable"
    weight: 0.25
    description: "Open rate replaced with reliable metrics"
  - type: llm_judge
    criteria: "The privacy-first approach is positioned as a brand strength — the recovery emails themselves reinforce the brand's commitment to privacy, turning a constraint into a trust signal"
    weight: 0.25
    description: "Privacy constraint as brand strength"
