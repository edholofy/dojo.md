meta:
  id: global-cart-recovery-system
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Design a cart recovery system for a global retailer across 15+ countries"
  tags: [email, abandoned-cart, global, multi-country, system-design]

state: {}

trigger: |
  "WorldMart" is a global e-commerce platform operating in 18 countries across
  North America, Europe, Asia-Pacific, and Latin America.

  Scale: 2.5M abandoned carts per month globally

  Challenges:
  - 12 different languages
  - Different email regulations per country (GDPR, CAN-SPAM, LGPD, PDPA, PIPL)
  - Different payment methods (credit cards, iDEAL, PIX, Alipay, bank transfer)
  - Cultural differences in email engagement and purchasing behavior
  - Time zone coordination (send at optimal local time)
  - Different shipping policies and delivery timeframes per country
  - Currency and pricing differences
  - Some markets have strict discount regulations (Germany's pricing law)

  Design a comprehensive global cart recovery system:
  1. Architecture for managing 18-country cart recovery from one platform
  2. Localization strategy beyond translation
  3. Compliance matrix by country
  4. Cultural adaptation examples (3 countries: US, Japan, Germany)
  5. Performance benchmarking across markets

assertions:
  - type: llm_judge
    criteria: "The architecture is scalable — it uses a master template with country-specific modules rather than 18 separate systems, enabling centralized management with local customization"
    weight: 0.25
    description: "Scalable global architecture"
  - type: llm_judge
    criteria: "The compliance matrix correctly identifies key differences — GDPR consent requirements, CAN-SPAM opt-out rules, Brazil's LGPD, and Asia-Pacific regulations are each addressed"
    weight: 0.25
    description: "Accurate multi-country compliance matrix"
  - type: llm_judge
    criteria: "Cultural adaptation goes beyond language — US emails are direct and incentive-forward, Japanese emails are more formal and relationship-oriented, German emails are precise and legally conservative"
    weight: 0.25
    description: "Deep cultural adaptation examples"
  - type: llm_judge
    criteria: "The benchmarking framework accounts for market differences — comparing US recovery rates to Japan's isn't apples-to-apples, and the framework adjusts expectations per market"
    weight: 0.25
    description: "Market-adjusted performance benchmarking"
