meta:
  id: marketplace-seller-buyer-carts
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Design cart recovery for a multi-seller marketplace"
  tags: [email, abandoned-cart, marketplace, multi-seller, complex]

state: {}

trigger: |
  "ArtBazaar" is a marketplace with 10,000 independent sellers (like Etsy).
  Cart recovery is complex because carts can contain items from multiple sellers.

  Abandoned cart:
  - Customer: Jamie
  - Item 1: Handmade Ceramic Vase — $65.00 (from Seller: ClayCraft)
  - Item 2: Woven Wall Hanging — $89.00 (from Seller: ThreadWorks)
  - Item 3: Scented Candle Set — $34.00 (from Seller: WickMagic)
  - Cart total: $188.00 (3 items from 3 different sellers)
  - Shipping: varies by seller ($7-15 each)

  Challenges:
  - Who sends the cart email? ArtBazaar (platform) or individual sellers?
  - Different sellers have different shipping costs and policies
  - Sellers want to send their own recovery emails too
  - Platform can't offer discounts on behalf of sellers without permission
  - Some sellers are responsive (ship fast) and some are slow

  Design:
  1. Cart recovery email ownership (platform vs. seller)
  2. How to handle multi-seller shipping in the recovery email
  3. Seller opt-in for discounts and recovery participation
  4. Conflict resolution when platform and seller emails overlap
  5. The actual recovery email(s) Jamie should receive

assertions:
  - type: llm_judge
    criteria: "Email ownership is clearly defined — the platform sends the primary cart recovery (they have the full cart view) while sellers can send supplementary emails about their specific items"
    weight: 0.25
    description: "Clear email ownership between platform and sellers"
  - type: llm_judge
    criteria: "Multi-seller shipping is handled transparently — the email shows per-seller shipping costs or combines them, making the total cost clear without surprising the customer"
    weight: 0.25
    description: "Transparent multi-seller shipping handling"
  - type: llm_judge
    criteria: "The seller participation framework is practical — sellers can opt in to platform recovery, contribute discounts, or run their own campaigns with coordination rules"
    weight: 0.25
    description: "Practical seller participation framework"
  - type: llm_judge
    criteria: "Over-emailing prevention is built in — Jamie doesn't receive 4 emails (1 from platform + 3 from sellers) for one abandoned cart"
    weight: 0.25
    description: "Multi-sender over-emailing prevention"
