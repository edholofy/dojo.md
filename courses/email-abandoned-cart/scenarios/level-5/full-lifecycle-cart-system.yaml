meta:
  id: full-lifecycle-cart-system
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Design a complete cart recovery lifecycle from detection to post-purchase"
  tags: [email, abandoned-cart, lifecycle, system-design, comprehensive]

state: {}

trigger: |
  "OmniRetail" ($200M annual revenue, 1.2M monthly abandoned carts) needs a
  complete end-to-end cart recovery lifecycle system. Current state: basic 3-email
  sequence in Klaviyo with 9% recovery rate.

  Design the complete lifecycle:

  Phase 1 — Prevention (before abandonment):
  On-site interventions to reduce abandonment before it happens

  Phase 2 — Detection (moment of abandonment):
  How the system identifies and classifies abandonment events

  Phase 3 — Recovery (the email/channel sequence):
  Multi-channel, segmented, personalized recovery

  Phase 4 — Post-Recovery (after purchase or final email):
  What happens with recovered customers and non-recovered abandoners

  Phase 5 — Optimization (continuous improvement):
  Testing, learning, and evolving the system

  For each phase, provide:
  - Key actions and touchpoints
  - Technology requirements
  - Team roles and responsibilities
  - KPIs and success metrics
  - Budget allocation guidance

assertions:
  - type: llm_judge
    criteria: "All five phases are comprehensively designed — each phase has specific actions, technology needs, team roles, KPIs, and budget guidance. No phase is an afterthought"
    weight: 0.25
    description: "All five phases comprehensively covered"
  - type: llm_judge
    criteria: "The phases connect into a coherent lifecycle — prevention feeds into detection, detection triggers recovery, recovery informs post-recovery, and optimization improves all phases"
    weight: 0.25
    description: "Phases connected into coherent lifecycle"
  - type: llm_judge
    criteria: "The system is appropriately scaled for $200M revenue — technology recommendations, team size, and budget reflect enterprise needs, not startup solutions"
    weight: 0.25
    description: "Enterprise-scale system design"
  - type: llm_judge
    criteria: "The optimization phase creates a learning flywheel — data from each phase feeds back into improvement, creating a system that gets better over time rather than remaining static"
    weight: 0.25
    description: "Continuous learning flywheel"
