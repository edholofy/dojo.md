meta:
  id: recession-cart-recovery
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Adapt cart recovery strategy during economic downturn"
  tags: [email, abandoned-cart, recession, economic, adaptation]

state: {}

trigger: |
  "EverydayLux" (a mid-range home goods retailer) is seeing their cart recovery
  metrics deteriorate during an economic downturn.

  Pre-recession metrics (6 months ago):
  - Cart abandonment rate: 68%
  - Recovery rate: 14%
  - Average cart value: $125
  - Discount effectiveness: 10% off recovered 35% more carts

  Current recession metrics:
  - Cart abandonment rate: 82% (+14 points)
  - Recovery rate: 6% (-8 points)
  - Average cart value: $78 (-38%)
  - Discount effectiveness: 10% off only recovers 8% more carts
  - "Buy now, pay later" (Afterpay) usage: up 340%
  - Wishlist additions: up 120% (browsing without buying)
  - Cart items frequently removed at checkout (price shock)

  Design:
  1. Diagnosis: why standard recovery tactics aren't working in a recession
  2. Adapted recovery strategy for recessionary behavior
  3. How to leverage "buy now, pay later" in recovery emails
  4. Wishlist-to-cart conversion strategy
  5. New incentive approach when discounts lose effectiveness

assertions:
  - type: llm_judge
    criteria: "The diagnosis correctly identifies recession-specific behaviors — customers abandon due to genuine financial constraints, not distraction. Standard urgency and discounts don't work when people genuinely can't afford to buy"
    weight: 0.25
    description: "Correct recession behavior diagnosis"
  - type: llm_judge
    criteria: "Buy now, pay later is strategically integrated — BNPL is highlighted in recovery emails as a way to spread the cost, making purchases accessible during tight budgets"
    weight: 0.25
    description: "Strategic BNPL integration"
  - type: llm_judge
    criteria: "The wishlist surge is addressed — a separate flow converts wishlist items to purchases when prices drop or when pay-day timing aligns"
    weight: 0.25
    description: "Wishlist-to-purchase conversion strategy"
  - type: llm_judge
    criteria: "The adapted strategy is empathetic — it doesn't push harder during financial stress but repositions products as affordable indulgences, offers flexible payment, and respects budget constraints"
    weight: 0.25
    description: "Empathetic recession-adapted approach"
