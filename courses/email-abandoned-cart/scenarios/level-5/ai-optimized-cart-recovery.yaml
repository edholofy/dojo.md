meta:
  id: ai-optimized-cart-recovery
  level: 5
  course: email-abandoned-cart
  type: output
  description: "Design an AI-powered cart recovery optimization system"
  tags: [email, abandoned-cart, ai, machine-learning, optimization]

state: {}

trigger: |
  "SmartRetail" (a large e-commerce platform, 500K monthly abandoned carts)
  wants to replace their rules-based cart recovery with an AI-driven system.

  Current rules-based system:
  - Fixed timing: 1hr / 24hr / 72hr for all customers
  - Fixed incentives: no discount / free shipping / 10% off
  - Fixed content: same email template for everyone
  - Recovery rate: 11%

  AI capabilities available:
  - Customer behavior prediction (purchase probability model)
  - Optimal send time prediction (per individual)
  - Incentive sensitivity model (which customers need discounts vs. which don't)
  - Content preference model (minimal vs. detailed, emotional vs. rational)
  - Channel preference model (email vs. SMS vs. push)
  - LTV prediction (to calibrate incentive spend)

  Design:
  1. The AI system architecture (what models, how they interact)
  2. How each model improves on the rules-based approach
  3. Training data requirements and cold-start handling
  4. A/B testing framework for AI vs. rules-based system
  5. Ethical guardrails (preventing manipulation, ensuring fairness)
  6. Target metrics and expected improvement

assertions:
  - type: llm_judge
    criteria: "The AI architecture is coherent — models work together (LTV informs incentive model, purchase probability informs timing), not as isolated systems"
    weight: 0.25
    description: "Coherent multi-model architecture"
  - type: llm_judge
    criteria: "Cold-start is addressed — new customers with limited data get reasonable defaults while the system learns, with progressive personalization as data accumulates"
    weight: 0.20
    description: "Cold-start handling for new customers"
  - type: llm_judge
    criteria: "The A/B testing framework is statistically sound — properly compares AI system vs. rules-based with appropriate sample sizes, holdout groups, and success criteria"
    weight: 0.20
    description: "Sound AI vs. rules-based A/B testing"
  - type: llm_judge
    criteria: "Ethical guardrails are meaningful — prevents price discrimination, avoids exploiting vulnerable customers, ensures transparency, and defines boundaries for incentive personalization"
    weight: 0.20
    description: "Meaningful ethical guardrails"
  - type: llm_judge
    criteria: "Target improvement is ambitious but realistic — moving from 11% to 15-18% recovery rate with AI, not promising unrealistic 5x improvements"
    weight: 0.15
    description: "Realistic improvement targets"
