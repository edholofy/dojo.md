meta:
  id: global-curriculum-harmonization
  level: 4
  course: course-curriculum-design
  type: output
  description: "Harmonize curriculum across a multinational university network operating in 6 countries, balancing global consistency with local accreditation and cultural requirements"
  tags: [global-curriculum, multinational, harmonization, expert]

state: {}

trigger: |
  You're the Global Academic Director for "Atlas
  University Network" — a multinational higher
  education group that operates university campuses
  in 6 countries: United States, United Kingdom,
  Australia, United Arab Emirates, Singapore, and
  Brazil. The network has acquired these campuses
  over the past 5 years and now needs to create
  a harmonized curriculum framework while respecting
  each country's unique accreditation and cultural
  requirements.

  Network details:
  - Total students: 42,000 across 6 campuses
  - Shared programs to harmonize: Business
    Administration, Computer Science, and
    Engineering (3 programs across 6 campuses =
    18 program instances)
  - Each campus currently runs its programs
    independently with different curricula,
    different textbooks, and different assessment
    approaches
  - Goal: A student who starts at any campus can
    transfer to any other campus seamlessly

  Country-specific challenges:
  - US: AACSB accreditation (business), ABET
    (engineering), credit-hour system, broad
    general education requirements
  - UK: QAA framework, 3-year degree, no general
    education, external examiner system, research-
    intensive
  - Australia: TEQSA, AQF levels, 3-year degree,
    competency-based focus
  - UAE: CAA (Commission for Academic Accreditation),
    Arabic language requirements, Islamic studies
    requirements, gender considerations
  - Singapore: EduTrust, alignment with Singapore
    Qualifications Framework, emphasis on industry
    connectivity
  - Brazil: MEC accreditation, Portuguese language,
    5-year engineering degree, extensive government-
    mandated curriculum

  Harmonization requirements:
  - Global learning outcomes (what every graduate
    achieves, regardless of campus)
  - Core curriculum (50-70% shared across all
    campuses)
  - Local curriculum (30-50% unique to each campus
    for accreditation and cultural requirements)
  - Cross-campus student mobility (transfer without
    credit loss)
  - Shared assessment framework (comparable rigor
    across campuses)
  - Faculty exchange and co-teaching opportunities
  - Global capstone or final-year project
  - Quality assurance across all 6 accreditation
    systems

  Task: Design the complete global curriculum
  harmonization framework — including the global
  learning outcomes, the core/local curriculum
  split, the credit transfer system, the shared
  assessment framework, the quality assurance
  model, and the governance structure for
  maintaining harmonization over time.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive global harmonization framework — global learning outcomes are meaningful and achievable across all 6 campuses; the core/local curriculum split (50-70% shared, 30-50% local) is well-defined with clear rationale; the framework respects each country's unique requirements (3-year vs 4-year degrees, language requirements, cultural mandates); the credit transfer system enables seamless mobility; the shared assessment framework ensures comparable rigor; the overall design would create a genuine global university network."
    weight: 0.35
    description: "HarmonizationDesign"
  - type: llm_judge
    criteria: "Response navigates the multi-accreditation complexity — addresses all 6 accreditation systems (AACSB, QAA, TEQSA, CAA, EduTrust, MEC) with specific strategies; the framework satisfies each country's requirements without compromising global consistency; the 3-year vs 4-year degree structure is resolved; language requirements (Arabic, Portuguese) are accommodated; cultural considerations (Islamic studies, gender) are handled respectfully; the quality assurance model works across all 6 systems."
    weight: 0.35
    description: "AccreditationComplexity"
  - type: llm_judge
    criteria: "Response includes governance and sustainability — the governance structure manages 6 campus academic leaders with appropriate authority; the framework update process ensures harmonization is maintained as standards and accreditation requirements evolve; faculty exchange and co-teaching opportunities are structured; the global capstone is designed to leverage the multinational network; the overall framework is sustainable and would enhance the network's competitive positioning."
    weight: 0.30
    description: "GovernanceAndSustainability"
