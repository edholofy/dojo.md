meta:
  id: university-wide-assessment
  level: 4
  course: course-curriculum-design
  type: output
  description: "Design a university-wide learning outcomes assessment system that satisfies multiple accreditors, connects to institutional effectiveness, and drives genuine improvement"
  tags: [institutional-assessment, accreditation, learning-outcomes, expert]

state: {}

trigger: |
  You're the newly appointed Chief Assessment
  Officer at a comprehensive university with 18,000
  students, 6 colleges, 85 academic programs, and
  multiple accreditors. The university's regional
  accreditor (SACSCOC) placed the institution on
  "warning" status for inadequate assessment of
  student learning outcomes. You have 18 months to
  demonstrate a fully functioning assessment system
  or face probation.

  Current state:
  - No university-wide assessment framework
  - Some programs assess outcomes systematically;
    most do not
  - Institutional effectiveness office collects
    data but doesn't connect it to improvement
  - Faculty distrust assessment ("it's just for
    administrators")
  - Multiple accreditors: SACSCOC (institutional),
    ABET (engineering), AACSB (business), CCNE
    (nursing), ACEJMC (journalism), NASP (psychology)
  - Each programmatic accreditor has different
    assessment expectations

  Six colleges and representative programs:
  - College of Engineering (4 programs, ABET)
  - College of Business (6 programs, AACSB)
  - College of Health Sciences (5 programs, CCNE +
    others)
  - College of Arts & Sciences (35 programs, no
    programmatic accreditors)
  - College of Education (8 programs, CAEP)
  - College of Media (4 programs, ACEJMC)

  Design requirements:
  - University-wide assessment framework that works
    across all 6 colleges
  - Program-level assessment plans that satisfy
    both SACSCOC and relevant programmatic accreditors
  - General education assessment plan
  - Institutional-level learning outcomes (ILOs)
    mapped to programs
  - Annual assessment reporting cycle
  - Assessment management system (technology)
  - Faculty development for assessment literacy
  - Dashboard for leadership (deans, provost, board)

  Timeline pressure:
  - 6 months: Framework designed, pilot programs
    running
  - 12 months: All programs have assessment plans
    and first cycle data
  - 18 months: Demonstrate continuous improvement
    evidence to SACSCOC

  Task: Design the complete university-wide
  assessment system — including the assessment
  framework, the reporting cycle, technology
  infrastructure, faculty development plan, the
  leadership dashboard, and the 18-month
  implementation timeline. The system must satisfy
  SACSCOC while accommodating 5 different
  programmatic accreditors.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive university-wide assessment system — the framework works across 6 diverse colleges; institutional learning outcomes (ILOs) are meaningful and mapped to programs; program-level assessment plans accommodate different accreditor requirements (ABET, AACSB, CCNE, etc.); the general education assessment plan addresses the largest gap; the annual reporting cycle is clear and manageable; the technology infrastructure supports data collection, analysis, and reporting; the system is coherent, not just a collection of independent assessment activities."
    weight: 0.35
    description: "AssessmentSystem"
  - type: llm_judge
    criteria: "Response addresses the political and cultural challenges — the faculty development plan acknowledges faculty distrust and builds assessment literacy without being condescending; the approach connects assessment to improvement (not just compliance); the dashboard provides useful information to leadership without oversimplifying; the system accommodates programs at different assessment maturity levels (some advanced, some just starting); the approach would shift institutional culture toward genuine assessment for improvement."
    weight: 0.35
    description: "CulturalChange"
  - type: llm_judge
    criteria: "Response meets the 18-month SACSCOC timeline — the implementation plan has realistic milestones for 6, 12, and 18 months; the 18-month evidence would satisfy SACSCOC requirements; the plan prioritizes the most critical gaps first; resource requirements are realistic for a 18,000-student university; the system is designed for sustainability beyond the accreditation deadline; the overall plan would move the institution from warning status to good standing."
    weight: 0.30
    description: "TimelineAndCompliance"
