meta:
  id: national-standards-development
  level: 4
  course: course-curriculum-design
  type: output
  description: "Lead the development of national curriculum standards for a professional field, managing stakeholder input, political dynamics, and implementation across diverse institutions"
  tags: [national-standards, governance, stakeholder-management, expert]

state: {}

trigger: |
  You're the Chair of the National Curriculum
  Standards Committee for the American Counseling
  Association (ACA). CACREP (the Council for
  Accreditation of Counseling and Related
  Educational Programs) has commissioned your
  committee to develop the next revision of
  national curriculum standards for master's-level
  counseling programs. The current standards are
  8 years old and no longer reflect the field.

  Committee composition:
  - 15 members: 5 counseling program directors,
    3 practicing counselors, 2 state licensure
    board representatives, 2 student representatives,
    2 employers, 1 public member
  - Geographic diversity required (every region
    represented)
  - Political reality: Some members want radical
    reform, others want minimal changes

  Current standards areas (8 core areas):
  1. Professional Counseling Orientation and Ethics
  2. Social and Cultural Diversity
  3. Human Growth and Development
  4. Career Development
  5. Counseling and Helping Relationships
  6. Group Counseling and Group Work
  7. Assessment and Testing
  8. Research and Program Evaluation

  Revision drivers:
  - Telehealth/virtual counseling has exploded
    (no current standards coverage)
  - Social media and technology impacts on mental
    health need addressing
  - Trauma-informed care has become foundational
    (currently an elective topic)
  - Neuroscience research has advanced significantly
  - Equity, justice, and antiracist practice need
    stronger integration (beyond "cultural diversity")
  - Crisis and disaster mental health (pandemic
    response highlighted gaps)
  - Substance use and addiction (opioid crisis)
  - Interprofessional collaboration with healthcare

  Process requirements:
  - Public comment period with analysis of feedback
  - Field testing at 10 pilot programs
  - Implementation timeline (3-year transition)
  - Faculty development resources for updated
    standards
  - Impact analysis on existing programs

  Task: Design the complete standards revision —
  including the proposed revised standards
  framework with key learning outcomes for each
  area, the new content areas, the stakeholder
  engagement process, the field testing plan, the
  3-year implementation timeline, and the faculty
  development resource plan.

assertions:
  - type: llm_judge
    criteria: "Response develops a comprehensive national standards revision — the revised framework updates all 8 existing core areas with current content; new content areas (telehealth, trauma-informed care, crisis counseling, technology) are meaningfully integrated; learning outcomes for each area are specific and measurable; the standards balance prescriptiveness with institutional flexibility; the revision reflects genuine evolution of the counseling field; the standards would prepare graduates for contemporary practice."
    weight: 0.35
    description: "StandardsFramework"
  - type: llm_judge
    criteria: "Response manages the stakeholder and political dynamics — the stakeholder engagement process includes multiple constituencies (faculty, practitioners, students, employers, public); the public comment analysis methodology is systematic; the committee management approach handles the reform-vs-stability tension; the field testing plan at 10 pilot programs is well-designed; the process is transparent and inclusive; the overall approach would build consensus and legitimacy for the revised standards."
    weight: 0.35
    description: "StakeholderManagement"
  - type: llm_judge
    criteria: "Response includes a realistic implementation plan — the 3-year implementation timeline has clear phases; the impact analysis on existing programs is honest about the effort required; faculty development resources are substantive; the transition plan includes support for programs at different starting points; the implementation is feasible for accreditation purposes; the overall plan would result in successful adoption of revised standards across hundreds of programs."
    weight: 0.30
    description: "ImplementationPlan"
