meta:
  id: competency-framework-national
  level: 4
  course: course-curriculum-design
  type: output
  description: "Design a national competency framework and micro-credential system for a profession, creating pathways from entry to expert that are recognized across employers and institutions"
  tags: [competency-framework, micro-credentials, national, expert]

state: {}

trigger: |
  You're the Executive Director of the National
  Digital Skills Council, a newly formed public-
  private partnership. The federal Department of
  Education has funded your organization to develop
  a National Digital Literacy Competency Framework
  and associated micro-credential ecosystem. The
  goal is to create a nationally recognized system
  where individuals can earn stackable digital
  literacy credentials that are recognized by both
  employers and educational institutions.

  Framework scope:
  - Population: All adults in the workforce (160M+)
  - Levels: Foundation → Intermediate → Advanced →
    Expert
  - Domains: 6 competency domains spanning the
    full spectrum of digital literacy
  - Credentials: Micro-credentials (badges) at
    each level for each domain, stackable into
    larger certificates

  Competency domains to define:
  1. Digital Communication and Collaboration
  2. Information and Data Literacy
  3. Digital Content Creation
  4. Digital Safety and Security
  5. Digital Problem Solving
  6. AI Literacy and Responsible AI Use

  Stakeholders:
  - Federal Department of Education (funder)
  - 12 industry partners (tech companies, employers)
  - 8 community college systems (delivery partners)
  - 3 workforce development boards
  - National Assessment Institute (assessment
    partner)
  - 6 professional associations
  - State education agencies (50 states)

  Design requirements:
  - Competency definitions for all 6 domains at
    all 4 levels (24 competency sets)
  - Assessment methodology for each competency
  - Micro-credential specifications (what each
    badge represents, how it's earned)
  - Quality assurance framework (who certifies
    providers)
  - Stackability model (how badges combine into
    certificates and degrees)
  - Recognition framework (how employers and
    institutions accept credentials)
  - Prior learning assessment for experienced
    workers
  - Equity considerations (accessibility, cost,
    digital divide)

  Task: Design the complete National Digital
  Literacy Competency Framework — including the
  competency definitions, micro-credential
  architecture, quality assurance framework,
  recognition model, equity strategy, and the
  governance structure for maintaining and
  updating the framework over time.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive national competency framework — all 6 domains are defined at all 4 levels with specific, measurable competencies; the progression from Foundation to Expert is genuine (not just more content — higher cognitive complexity); competency definitions are specific enough for assessment but flexible enough for diverse delivery; the framework is coherent as a whole (domains interconnect, levels build on each other); the overall design would be credible at the national level."
    weight: 0.35
    description: "CompetencyFramework"
  - type: llm_judge
    criteria: "Response creates a viable micro-credential ecosystem — micro-credential specifications are clear (what each badge represents, earning criteria, evidence requirements); the stackability model shows how badges combine into certificates; the quality assurance framework ensures credential integrity; the recognition model would be accepted by employers and institutions; prior learning assessment respects experienced workers; the overall ecosystem is technically and logistically feasible at national scale."
    weight: 0.35
    description: "MicroCredentialEcosystem"
  - type: llm_judge
    criteria: "Response addresses governance, equity, and sustainability — the governance structure manages multiple stakeholders (federal, industry, academic, state); the equity strategy addresses the digital divide, cost barriers, and accessibility; the framework update process ensures the system stays current; the overall design is sustainable beyond the initial funding period; the stakeholder management approach would build the consensus needed for national adoption; the framework would genuinely advance digital literacy across the workforce."
    weight: 0.30
    description: "GovernanceAndEquity"
