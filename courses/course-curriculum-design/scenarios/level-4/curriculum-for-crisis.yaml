meta:
  id: curriculum-for-crisis
  level: 4
  course: course-curriculum-design
  type: output
  description: "Rapidly redesign an entire school's curriculum for emergency remote learning during a crisis, maintaining quality and equity while transitioning in days"
  tags: [crisis-curriculum, emergency-remote, equity, expert]

state: {}

trigger: |
  You're the Superintendent of a mid-size school
  district (22 schools, 14,000 students, 1,100
  staff). A major infrastructure event has made
  all school buildings unusable for at least 8
  weeks. You need to transition the entire K-12
  curriculum to remote delivery within 72 hours
  while maintaining learning quality and addressing
  equity gaps.

  District profile:
  - 8 elementary schools (K-5)
  - 4 middle schools (6-8)
  - 3 high schools (9-12)
  - 7 specialized programs (special education,
    gifted, ELL, career/technical, alternative
    school, early childhood, adult education)
  - Demographics: 45% low-income (qualify for
    free/reduced lunch), 22% English Language
    Learners, 14% special education, 8% gifted

  Digital readiness assessment:
  - 60% of students have reliable home internet
  - 40% have school-issued devices (1:1 program
    for grades 6-12 only)
  - Elementary students (K-5) have no devices
  - 35% of teachers have never taught online
  - LMS (Google Classroom) is used by only 45% of
    teachers
  - Special education services require modification
    for remote delivery

  Equity concerns:
  - 5,600 students lack reliable internet
  - 5,600 K-5 students have no devices
  - 400+ IEP students need modified services
  - 3,080 ELL students need language support
  - Some students are caregivers for younger
    siblings
  - Free/reduced lunch students lose access to
    school meals

  Design requirements:
  - 72-hour transition plan (what happens
    immediately)
  - Week 1 stabilization curriculum (simplified,
    high-priority content)
  - Weeks 2-8 sustained remote curriculum
  - Technology distribution plan
  - Teacher rapid-training plan
  - Special education service delivery modification
  - ELL support modifications
  - Assessment modifications
  - Family communication and support
  - Student mental health and social-emotional
    support

  Task: Design the complete crisis curriculum plan
  — including the 72-hour transition plan, the
  phased curriculum from stabilization to sustained
  delivery, the equity intervention plan,
  technology distribution strategy, teacher support,
  special populations accommodations, and the
  social-emotional learning integration.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive crisis curriculum plan — the 72-hour transition is realistic and prioritized (most critical actions first); the Week 1 stabilization curriculum is simplified appropriately (not trying to replicate the full school day immediately); the Weeks 2-8 sustained curriculum maintains learning standards while adapting to remote delivery; the plan covers all grade levels (K-12) with age-appropriate modifications; the phased approach builds capacity over time; the overall plan would keep 14,000 students learning."
    weight: 0.35
    description: "CrisisTransition"
  - type: llm_judge
    criteria: "Response addresses equity with substance and urgency — the technology distribution plan reaches all 5,600 students without devices; the internet connectivity solution is realistic (hotspots, community access points, offline packets); IEP modifications maintain FAPE (Free Appropriate Public Education) requirements; ELL support is specific (not just 'translate materials'); the plan addresses students who are caregivers; meal distribution is addressed; the equity interventions are actionable within the crisis timeline, not aspirational."
    weight: 0.35
    description: "EquityResponse"
  - type: llm_judge
    criteria: "Response includes teacher support and social-emotional dimensions — the rapid teacher training plan is realistic (35% have never taught online); the plan includes ongoing teacher support (not just one training session); social-emotional learning is integrated into the curriculum (not an afterthought); student mental health monitoring and support are defined; family communication is clear and multilingual; the overall plan recognizes that crisis curriculum is about people, not just content delivery."
    weight: 0.30
    description: "TeacherAndSEL"
