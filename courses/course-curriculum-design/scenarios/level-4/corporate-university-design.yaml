meta:
  id: corporate-university-design
  level: 4
  course: course-curriculum-design
  type: output
  description: "Design a corporate university from scratch for a Fortune 500 company, establishing governance, curriculum architecture, faculty model, credentialing, and strategic alignment"
  tags: [corporate-university, organizational-learning, governance, expert]

state: {}

trigger: |
  You're the founding Chief Learning Officer of
  a Fortune 500 healthcare company with 45,000
  employees across 28 countries. The CEO has
  committed $25M over 3 years to establish a
  corporate university — "HealthFirst University"
  — to replace the fragmented training programs
  currently run by individual business units. The
  board approved the initiative based on your
  proposal, and now you need to design the
  complete university.

  Company context:
  - Revenue: $18B annually
  - Business units: Hospital Management, Medical
    Devices, Health IT, Pharmaceutical Services,
    Insurance Services
  - Employees: 45,000 (28 countries, 14 languages)
  - Current L&D: $45M spent annually across
    business units (fragmented, duplicative,
    no standardization, no shared curriculum)
  - Strategic priorities: Digital transformation,
    patient safety culture, leadership pipeline,
    M&A integration capability

  Corporate university design requirements:
  - Governance structure (advisory board, academic
    council, program review committee)
  - Curriculum architecture (core curriculum for
    all employees + functional tracks + leadership
    tracks)
  - Faculty model (internal subject matter experts,
    external partners, university affiliations)
  - Technology platform (learning experience
    platform, content management, analytics)
  - Credentialing system (certificates, badges,
    pathways to external degrees)
  - Global delivery model (multi-language, multi-
    timezone, cultural adaptation)
  - Quality assurance (course development standards,
    evaluation, continuous improvement)
  - Budget model (centralized funding vs business
    unit cost allocation)
  - Physical/virtual campus strategy
  - External partnerships (universities, content
    providers, certification bodies)

  Success metrics (Year 3):
  - 90% employee engagement with learning platform
  - Leadership pipeline: 80% of director+ roles
    filled internally
  - Training cost per employee: Reduce from $1,000
    to $700 through consolidation
  - Employee retention improvement: 5%
  - Time-to-competency for new hires: 30% reduction

  Task: Design the complete corporate university —
  including the governance structure, curriculum
  architecture, faculty model, technology strategy,
  credentialing system, global delivery model,
  quality assurance framework, budget model, and
  3-year implementation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive corporate university — the governance structure has appropriate levels (advisory board, academic council, program review); the curriculum architecture includes core (all employees), functional (business unit-specific), and leadership tracks; the faculty model balances internal SMEs with external partners; the technology platform strategy is modern (LXP, not just LMS); the credentialing system connects to career development; the overall design is enterprise-grade, not a training department with a new name."
    weight: 0.35
    description: "UniversityDesign"
  - type: llm_judge
    criteria: "Response addresses the global and operational complexity — the global delivery model handles 28 countries and 14 languages; cultural adaptation is substantive; the budget model handles centralized vs business unit funding; the transition from fragmented training to unified university is realistic; the quality assurance framework maintains standards across the enterprise; the $25M budget is allocated across design elements; the 3-year roadmap has clear phases and milestones."
    weight: 0.35
    description: "GlobalComplexity"
  - type: llm_judge
    criteria: "Response connects the university to strategic outcomes — the curriculum aligns with company strategic priorities (digital transformation, patient safety, leadership pipeline, M&A integration); the success metrics are measurable and connected to business outcomes; the university would justify its $25M investment; the design consolidates $45M in fragmented spending; the leadership pipeline development is systematic; the overall corporate university would be a genuine competitive advantage."
    weight: 0.30
    description: "StrategicAlignment"
