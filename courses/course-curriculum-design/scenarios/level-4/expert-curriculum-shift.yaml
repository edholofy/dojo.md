meta:
  id: expert-curriculum-shift
  level: 4
  course: course-curriculum-design
  type: output
  description: "Create three expert-level curriculum documents simultaneously — a strategic enrollment-driven program portfolio review, a regulatory compliance curriculum audit, and a multi-institution consortium curriculum agreement"
  tags: [portfolio-review, compliance-audit, consortium, shift-simulation, expert]

state: {}

trigger: |
  You're the Provost of a comprehensive university
  facing multiple curriculum governance challenges
  simultaneously. Three documents must be completed
  this month for different governance bodies.

  Document 1 — Strategic Program Portfolio Review:
  The university has 142 academic programs but
  enrollment has declined 18% over 5 years. The
  Board of Trustees has demanded a program
  portfolio review to identify programs for growth,
  maintenance, transformation, or discontinuation.
  Financial data shows 38 programs are running at
  a loss, 12 programs have fewer than 10 graduates
  per year, and 6 programs have zero graduates in
  2 of the past 3 years. Faculty are terrified of
  program cuts.
  Deliverable: Program portfolio analysis framework,
  recommended actions for each category, and the
  communication strategy for the difficult
  conversations about program discontinuation.

  Document 2 — Regulatory Compliance Curriculum
  Audit:
  The state higher education commission has
  launched a compliance audit of all teacher
  preparation programs in the state. Your
  university has 8 teacher certification programs
  (elementary, secondary English, secondary math,
  secondary science, secondary social studies,
  special education, ESL, school counseling).
  Recent changes to state certification requirements
  mean 5 of your 8 programs may be out of
  compliance. Non-compliance means the state
  revokes your authority to recommend graduates
  for certification.
  Deliverable: Compliance gap analysis for all 8
  programs, remediation plan for the 5 non-compliant
  programs, and timeline for achieving compliance.

  Document 3 — Consortium Curriculum Agreement:
  Your university is forming a consortium with 2
  other universities and 3 community colleges to
  create shared online courses. The consortium
  will offer 15 shared general education courses
  that students at any member institution can take
  for credit. This requires agreement on learning
  outcomes, grading standards, and credit transfer.
  The 6 institutions have 6 different general
  education models.
  Deliverable: Consortium agreement framework
  including shared course standards, quality
  assurance, financial model (revenue sharing),
  and governance structure.

  Task: Create all three governance documents,
  demonstrating expertise in strategic program
  management, regulatory compliance, and multi-
  institutional collaboration.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct governance documents — the program portfolio review uses a systematic framework (not just financial data — includes market demand, mission alignment, quality metrics); the compliance audit identifies specific gaps in teacher preparation programs and provides remediation plans; the consortium agreement addresses learning outcomes, quality assurance, financial model, and governance; each document serves its specific governance audience; the three documents demonstrate range across senior academic leadership competencies."
    weight: 0.35
    description: "ThreeDocuments"
  - type: llm_judge
    criteria: "Response handles the political sensitivity of each document — the program portfolio review addresses faculty fear of program cuts with transparency and process; the compliance audit balances urgency (certification authority at risk) with thoroughness; the consortium agreement respects institutional autonomy while creating meaningful collaboration; each document navigates its specific political landscape; the communication strategies are sophisticated and empathetic."
    weight: 0.35
    description: "PoliticalSophistication"
  - type: llm_judge
    criteria: "Response produces decision-ready documents — the program portfolio review provides clear recommendations (grow, maintain, transform, discontinue) with supporting evidence; the compliance remediation plan has specific timelines and resource requirements; the consortium agreement is specific enough to be signed by 6 institutions; all three documents would advance decision-making at their respective governance levels; the overall quality demonstrates provost-level academic leadership."
    weight: 0.30
    description: "DecisionReadiness"
