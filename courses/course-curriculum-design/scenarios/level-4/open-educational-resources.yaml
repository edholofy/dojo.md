meta:
  id: open-educational-resources
  level: 4
  course: course-curriculum-design
  type: output
  description: "Design and launch an OER initiative for a state college system, creating openly licensed curriculum materials that replace expensive textbooks while maintaining quality"
  tags: [oer, open-education, textbook-affordability, expert]

state: {}

trigger: |
  You're the Statewide OER Coordinator for a state
  college system of 23 community colleges and 11
  universities. The governor has signed legislation
  requiring the system to develop Open Educational
  Resources (OER) for the 25 highest-enrollment
  courses across the state, eliminating textbook
  costs for an estimated 180,000 students and
  saving $22M annually. You have $4.5M in state
  funding and 3 years to deliver.

  System context:
  - 34 institutions (23 community colleges, 11
    universities)
  - 420,000 total students
  - 25 target courses: Introduction to Psychology,
    English Composition, College Algebra, US History,
    Biology I, Chemistry I, Introduction to Sociology,
    Microeconomics, Macroeconomics, Statistics,
    Anatomy & Physiology I, Speech Communication,
    Introduction to Philosophy, Art Appreciation,
    Music Appreciation, Spanish I, Introduction to
    Business, Accounting I, Introduction to Computer
    Science, Government/Political Science, World
    Literature, Environmental Science, Nutrition,
    Developmental Mathematics, College Success/
    First-Year Experience
  - Faculty: 2,800+ who teach these courses across
    all 34 institutions

  Design challenges:
  - Faculty autonomy: "No one tells me what textbook
    to use"
  - Quality perception: "Free means low quality"
  - Sustainability: OER need ongoing updates
    (who does this after the grant?)
  - Accessibility: OER must meet WCAG 2.1 AA
    standards
  - Ancillary materials: Students need more than
    just text (test banks, slides, homework systems)
  - Publisher resistance: Major publishers lobby
    against OER
  - Assessment alignment: OER must support existing
    course assessments
  - Cultural responsiveness: Content must be
    inclusive and representative

  Deliverables:
  - OER development process for all 25 courses
  - Quality assurance framework (peer review,
    accessibility review, cultural review)
  - Faculty adoption incentive and support program
  - Technology platform for hosting and updating OER
  - Sustainability model for post-grant maintenance
  - Impact measurement plan

  Task: Design the complete statewide OER initiative
  — including the development process, quality
  framework, faculty adoption strategy, technology
  infrastructure, sustainability model, and impact
  measurement plan. The initiative must produce
  high-quality, accessible, culturally responsive
  OER for 25 courses while building faculty buy-in
  across 34 institutions.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive OER initiative — the development process for 25 courses is systematic and scalable; the quality assurance framework includes peer review, accessibility review (WCAG 2.1 AA), and cultural responsiveness review; the OER include ancillary materials (not just textbook replacements); the technology platform strategy supports hosting, updating, and customization; the $4.5M budget is allocated across all program elements; the 3-year timeline has realistic milestones for developing 25 courses."
    weight: 0.35
    description: "OERDesign"
  - type: llm_judge
    criteria: "Response addresses faculty adoption and quality perception — the faculty adoption strategy respects autonomy while incentivizing participation; the quality assurance process produces materials that counter the 'free means low quality' perception; faculty development supports OER creation and adoption; the approach handles publisher resistance; the faculty incentive model is realistic (stipends, recognition, course releases); the overall strategy would achieve meaningful adoption across 34 institutions."
    weight: 0.35
    description: "FacultyAdoption"
  - type: llm_judge
    criteria: "Response includes sustainability and impact measurement — the sustainability model ensures OER are updated after the 3-year grant period; the impact measurement plan tracks cost savings, student outcomes, and adoption rates; the initiative would genuinely save $22M annually; the cultural responsiveness approach is substantive; the overall initiative would be a model for other state systems; the plan addresses potential political and commercial opposition."
    weight: 0.30
    description: "SustainabilityAndImpact"
