meta:
  id: adaptive-learning-system
  level: 4
  course: course-curriculum-design
  type: output
  description: "Design an AI-powered adaptive learning curriculum system that personalizes content, pacing, and assessment based on individual learner performance and learning style"
  tags: [adaptive-learning, ai-personalization, edtech, expert]

state: {}

trigger: |
  You're the VP of Curriculum at an edtech company
  that is building an adaptive learning platform
  for college-level mathematics (from developmental
  math through Calculus II). The platform will use
  AI to create personalized learning paths for each
  student. You need to design the curriculum
  architecture that the AI system will operate
  within.

  Platform parameters:
  - Subject: Mathematics (developmental math,
    college algebra, precalculus, calculus I,
    calculus II)
  - Target users: Community college and university
    students
  - Scale: Designed for 500,000+ concurrent users
  - Content: Video lessons, interactive exercises,
    worked examples, assessments, hint systems
  - AI capabilities: Real-time performance tracking,
    prerequisite gap detection, pace adaptation,
    difficulty adjustment, learning pathway
    optimization

  Curriculum architecture requirements:
  - Knowledge graph: Map all mathematical concepts
    and their prerequisite relationships (estimated
    2,000+ nodes)
  - Learning objectives at granular level (each
    concept has specific, assessable objectives)
  - Mastery definitions (what score/performance =
    mastery at each node)
  - Multiple instructional pathways to the same
    concept (visual, algebraic, applied/contextual)
  - Adaptive assessment design (questions that
    efficiently determine mastery level)
  - Diagnostic placement system (where does a new
    student start?)
  - Intervention triggers (when does the AI flag
    a struggling student for human intervention?)
  - Content specifications for each node (what
    content must be created)

  Pedagogical requirements:
  - Productive struggle: The AI should challenge
    students but not frustrate them
  - Growth mindset messaging integrated into the
    system
  - Spaced repetition for long-term retention
  - Prerequisite remediation without shame
    (seamless gap-filling)
  - Connection to real-world applications at
    every level

  Design challenges:
  - Math anxiety is real — the system must not
    create more anxiety
  - Students at developmental level may have
    significant gaps going back to elementary
    school
  - The knowledge graph must be comprehensive
    but not infinitely complex
  - AI decisions must be explainable (students
    should understand why they're seeing certain
    content)

  Task: Design the complete adaptive curriculum
  architecture — including a representative
  section of the knowledge graph, the mastery
  definition model, the adaptive pathway logic,
  the diagnostic placement system, intervention
  triggers, content specifications, and the
  pedagogical guidelines that constrain AI
  decision-making.

assertions:
  - type: llm_judge
    criteria: "Response designs a sophisticated adaptive curriculum architecture — the knowledge graph is well-structured with clear prerequisite relationships; mastery definitions are specific and differentiated by concept complexity; the adaptive pathway logic personalizes learning genuinely (not just easier/harder questions); the diagnostic placement system accurately assesses student starting points; content specifications are detailed enough for content producers; the overall architecture would support 500,000+ concurrent users."
    weight: 0.35
    description: "AdaptiveArchitecture"
  - type: llm_judge
    criteria: "Response addresses the pedagogical dimensions of adaptive learning — the system promotes productive struggle without frustration; growth mindset messaging is integrated meaningfully; spaced repetition is built into the pathway logic; prerequisite remediation is seamless (not stigmatizing); math anxiety considerations influence system design; the AI's decisions are explainable to students; the pedagogical guidelines appropriately constrain AI behavior; the system would improve learning outcomes, not just automate content delivery."
    weight: 0.35
    description: "PedagogicalDesign"
  - type: llm_judge
    criteria: "Response handles the technical and human integration — intervention triggers define when AI escalates to human support; the system handles students with deep gaps (developmental math level) without overwhelm; multiple instructional pathways (visual, algebraic, contextual) are designed for different learning approaches; real-world applications are integrated at every level; the overall system balances AI capability with human touch; the architecture would be feasible to implement and maintain."
    weight: 0.30
    description: "TechnicalIntegration"
