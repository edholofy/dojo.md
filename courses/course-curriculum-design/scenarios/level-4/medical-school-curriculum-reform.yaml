meta:
  id: medical-school-curriculum-reform
  level: 4
  course: course-curriculum-design
  type: output
  description: "Lead a comprehensive medical school curriculum reform from traditional organ-system blocks to an integrated, competency-based model while maintaining LCME accreditation"
  tags: [medical-education, curriculum-reform, lcme, expert]

state: {}

trigger: |
  You're the Associate Dean for Medical Education
  at a medical school that the LCME (Liaison
  Committee on Medical Education) has given a
  "conditional" accreditation status. The LCME
  cited: outdated lecture-based curriculum, poor
  integration of basic science with clinical
  medicine, inadequate longitudinal clinical
  experiences, insufficient attention to healthcare
  disparities, and lack of competency-based
  assessment. You have 2 years to demonstrate
  substantial progress on a comprehensive
  curriculum reform.

  Current curriculum (traditional):
  - Year 1: Basic sciences (anatomy, biochemistry,
    physiology, pharmacology) — lecture-heavy
  - Year 2: Pathology + organ systems (disease-
    focused blocks) — lecture-heavy
  - Year 3: Core clinical clerkships (internal
    medicine, surgery, pediatrics, OB/GYN,
    psychiatry, family medicine)
  - Year 4: Sub-internships and electives
  - Total: 170 students per class, 680 total
  - Pass rate: USMLE Step 1 — 89% (national avg:
    92%), Step 2 CK — 91% (national avg: 96%)

  Reform direction:
  - Integrated curriculum: Basic science + clinical
    medicine taught together from Year 1
  - Case-based learning replacing lectures
  - Longitudinal clinical experience starting in
    Year 1
  - Competency-based progression (not just time-
    based)
  - Health systems science as a third pillar
    (alongside basic science and clinical science)
  - Interprofessional education integrated
    throughout
  - Healthcare disparities and social determinants
    woven into every course

  Political landscape:
  - Basic science faculty fear losing teaching
    hours and relevance
  - Clinical faculty resist structured teaching
    (prefer the apprenticeship model)
  - Students are anxious about USMLE scores
  - Hospital partners may resist early clinical
    exposure
  - 40% of faculty have been teaching the same
    way for 20+ years

  Task: Design the comprehensive curriculum reform
  plan — including the new curriculum architecture,
  the integration model, the competency framework,
  the assessment system, the clinical experience
  design, the faculty development plan, the change
  management strategy, and the 2-year LCME
  compliance timeline.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive medical curriculum reform — the new architecture integrates basic science with clinical medicine from Year 1; case-based learning replaces lecture-heavy formats; longitudinal clinical experiences begin early; health systems science is a genuine third pillar; the competency framework replaces time-based progression; interprofessional education and healthcare disparities are woven throughout; the overall design represents a genuine transformation, not cosmetic changes; the curriculum would improve USMLE performance."
    weight: 0.35
    description: "CurriculumReform"
  - type: llm_judge
    criteria: "Response manages the change management and political complexity — the strategy addresses basic science faculty concerns about losing hours; clinical faculty resistance is handled with evidence and gradual transition; student anxiety about USMLE is addressed; hospital partners are engaged constructively; the faculty development plan prepares 20+ year veterans for new teaching methods; the change management approach is realistic about timelines and resistance; the strategy would build sufficient faculty buy-in for successful implementation."
    weight: 0.35
    description: "ChangeManagement"
  - type: llm_judge
    criteria: "Response meets the LCME compliance timeline — the 2-year plan addresses all cited deficiencies (outdated curriculum, poor integration, inadequate clinical experiences, healthcare disparities, lack of competency assessment); milestones are specific and achievable; the assessment system demonstrates competency-based progression; the overall plan would satisfy LCME evaluators; the reform is sustainable beyond the accreditation deadline; the plan balances urgency with quality."
    weight: 0.30
    description: "LCMECompliance"
