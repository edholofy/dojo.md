meta:
  id: lms-migration-curriculum
  level: 3
  course: course-curriculum-design
  type: output
  description: "Plan and execute the curriculum migration from one LMS to another for an entire university, addressing content conversion, faculty training, and quality assurance"
  tags: [lms-migration, educational-technology, change-management, advanced]

state: {}

trigger: |
  You're the Director of Educational Technology at
  a university with 12,000 students. The university
  is migrating from Blackboard to Canvas over the
  next 12 months. You need to design the curriculum
  migration plan — not just the technical migration,
  but ensuring that courses are improved during
  the transition, faculty are supported, and
  students experience minimal disruption.

  Migration scope:
  - 850 active courses across 45 departments
  - 420 faculty members (full-time and adjunct)
  - 12 months to complete migration
  - Budget: $340,000 (licenses already covered
    separately)

  Current state in Blackboard:
  - 30% of courses are well-designed (clear
    organization, active use of features)
  - 40% are basic (syllabus uploaded, some documents,
    minimal interactivity)
  - 30% are unused or barely used (faculty post
    the syllabus and nothing else)

  Migration challenges:
  - Faculty fear: "All my course materials will
    break" / "I don't want to learn a new system"
  - Not all Blackboard features map 1:1 to Canvas
  - This is an opportunity to improve course design,
    not just copy-paste
  - Some faculty have 10+ years of content built
    in Blackboard
  - Assessment data and grade histories need
    careful handling
  - The migration must not disrupt mid-semester
    courses

  Design requirements:
  - Phased migration timeline (12 months)
  - Faculty training curriculum (multiple skill
    levels)
  - Course design standards for the new LMS
  - Quality assurance process for migrated courses
  - Support structure (help desk, office hours,
    peer mentors)
  - Communication plan for faculty and students
  - Content conversion workflow (what migrates
    automatically vs manually)

  Task: Design the complete LMS migration plan —
  including the phased timeline, faculty training
  curriculum, course design standards, the QA
  process, support structure, and communication
  plan. The plan should treat this as a curriculum
  improvement opportunity, not just a technology
  swap.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive 12-month migration plan — includes a phased timeline that avoids mid-semester disruption; the phases are logical (pilot → early adopters → majority → stragglers); the faculty training curriculum addresses multiple skill levels (beginner, intermediate, advanced Canvas users); course design standards define minimum quality expectations; the QA process ensures migrated courses meet standards; the $340,000 budget is allocated across plan elements."
    weight: 0.35
    description: "MigrationPlan"
  - type: llm_judge
    criteria: "Response addresses the human dimensions of migration — the faculty training curriculum is supportive, not mandated; the communication plan manages fear and resistance; the plan acknowledges different faculty starting points (30% well-designed, 40% basic, 30% barely used); peer mentor and support structures are well-defined; the plan treats migration as a curriculum improvement opportunity; the approach would build faculty confidence rather than create resentment."
    weight: 0.35
    description: "ChangeManagement"
  - type: llm_judge
    criteria: "Response handles technical and quality concerns — the content conversion workflow distinguishes automatic vs manual migration; assessment data and grade history handling is addressed; the QA process includes both automated checks and human review; course design standards are specific enough to improve quality; the plan acknowledges that not all Blackboard features map to Canvas; the overall approach would result in better courses in Canvas than existed in Blackboard."
    weight: 0.30
    description: "TechnicalQuality"
