meta:
  id: ai-curriculum-transformation
  level: 3
  course: course-curriculum-design
  type: output
  description: "Redesign a university department's curriculum to integrate AI tools and AI literacy, addressing academic integrity, pedagogical shifts, and workforce preparation"
  tags: [ai-integration, academic-integrity, curriculum-reform, advanced]

state: {}

trigger: |
  You're the Chair of the English Department at a
  liberal arts university. Since the launch of
  ChatGPT, your department has been in crisis mode
  — faculty are divided between banning AI tools
  and embracing them, students are using AI
  regardless of policies, and employers are
  increasingly expecting graduates to be AI-literate.
  The Provost has asked you to lead a departmental
  curriculum redesign that thoughtfully integrates
  AI.

  Department details:
  - Programs: B.A. in English, B.A. in Creative
    Writing, Minor in Writing
  - Faculty: 18 full-time (3 supportive of AI,
    8 cautious, 4 resistant, 3 openly hostile)
  - Students: 220 majors, 180 minors
  - Current AI policy: "No AI use allowed in any
    course" (widely ignored by students)

  Courses to redesign (representative sample):
  - ENG 101: Composition I (required for all
    university students — 800 students/year)
  - ENG 201: Composition II
  - ENG 310: Advanced Expository Writing
  - ENG 325: Creative Writing Workshop (Fiction)
  - ENG 340: Technical and Professional Writing
  - ENG 410: Literary Analysis Seminar
  - ENG 450: Senior Capstone

  Key tensions:
  - Academic integrity: How do you assess student
    writing when AI can write essays?
  - Learning objectives: If AI writes the first
    draft, what are students actually learning?
  - Equity: Not all students have equal access to
    paid AI tools
  - Creative writing faculty feel AI threatens the
    essence of human expression
  - Technical writing faculty see AI as an essential
    industry tool
  - Literary analysis faculty worry about AI-
    generated interpretations replacing critical
    thinking

  Design requirements:
  - Department-wide AI policy framework (replacing
    the blanket ban)
  - Course-by-course AI integration guidelines
    (some courses may restrict AI, others may
    require it)
  - Redesigned assignments that maintain learning
    objectives in an AI-available world
  - AI literacy learning outcomes for English majors
  - Assessment strategies that verify student
    learning when AI is available
  - Faculty development plan for AI pedagogy

  Task: Design the complete curriculum
  transformation plan — including the AI policy
  framework, course-level integration guidelines,
  redesigned assignment examples, AI literacy
  outcomes, assessment strategies, and the faculty
  development plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a nuanced AI integration plan — the AI policy framework is not a one-size-fits-all approach (different courses have different AI policies based on learning objectives); the course-by-course guidelines are pedagogically justified; redesigned assignments maintain the core learning objectives of each course; AI literacy outcomes are specific and measurable; the plan acknowledges the genuine tension between AI assistance and learning development; the approach prepares graduates for an AI-enabled workplace."
    weight: 0.35
    description: "AIIntegrationDesign"
  - type: llm_judge
    criteria: "Response navigates the faculty and pedagogical tensions — addresses the spectrum of faculty attitudes (from supportive to hostile) with empathy; the creative writing vs technical writing distinction is handled thoughtfully; assessment strategies genuinely verify student learning (not just detecting AI use); the equity dimension (access to paid AI tools) is addressed; the plan values human expression and critical thinking while being realistic about AI's role; the communication to students explains the rationale clearly."
    weight: 0.35
    description: "NavigatingTensions"
  - type: llm_judge
    criteria: "Response provides practical, implementable elements — redesigned assignment examples are specific and demonstrate how learning objectives can be maintained; the faculty development plan is realistic for faculty with varying technology comfort; the assessment strategies are workable (not requiring faculty to become AI detection experts); the transition timeline is phased and manageable; the plan would be acceptable to the Provost, most faculty, and students; the approach is sustainable and adaptable as AI tools evolve."
    weight: 0.30
    description: "PracticalImplementation"
