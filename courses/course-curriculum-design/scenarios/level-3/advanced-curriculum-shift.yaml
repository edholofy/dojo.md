meta:
  id: advanced-curriculum-shift
  level: 3
  course: course-curriculum-design
  type: output
  description: "Design three complex curriculum documents simultaneously — a program review response, a new program feasibility study, and a curriculum audit report — demonstrating advanced instructional design and academic planning skills"
  tags: [program-review, feasibility-study, audit, shift-simulation, advanced]

state: {}

trigger: |
  You're the Vice Provost for Academic Programs at
  a comprehensive university. Three critical projects
  need your team's attention this month, each
  requiring different academic planning expertise.

  Project 1 — Program Review Response:
  The Psychology Department's 5-year program review
  revealed several concerns: declining enrollment
  (from 450 to 280 majors over 5 years), low
  alumni satisfaction with career preparation (2.9/5.0),
  curriculum that hasn't been updated in 8 years,
  and over-reliance on adjunct faculty (60% of
  courses taught by adjuncts). The external review
  team recommended "significant curricular revision."
  Deliverable: A comprehensive response plan with
  curriculum revision strategy, enrollment recovery
  plan, and timeline.

  Project 2 — New Program Feasibility Study:
  The School of Health Sciences wants to launch a
  Doctor of Physical Therapy (DPT) program. This
  would be the university's first doctoral program.
  The nearest DPT programs are 90 miles away, and
  regional demand is strong. However, the startup
  costs are significant ($3.2M), clinical placement
  sites need to be secured, and the CAPTE
  accreditation process takes 3-5 years.
  Deliverable: A feasibility study covering market
  analysis, curriculum outline, resource requirements,
  accreditation pathway, financial projections, and
  recommendation (go/no-go).

  Project 3 — General Education Curriculum Audit:
  The university's general education program hasn't
  been substantively reviewed in 12 years. Faculty
  senate has requested an audit. Current gen ed is
  a traditional distribution model (pick 2 from
  humanities, 2 from social sciences, 2 from
  natural sciences, etc.) that students view as
  "random requirements with no purpose." Completion
  rates for gen ed requirements are 78% after 4
  years (should be ~95%).
  Deliverable: An audit report analyzing the current
  gen ed program, benchmarking against peer
  institutions, and proposing a redesigned model
  with implementation recommendations.

  Task: Create all three academic planning documents,
  demonstrating expertise in program review,
  feasibility analysis, and curriculum audit.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct academic planning documents — the program review response addresses all identified concerns (enrollment, satisfaction, curriculum, adjuncts) with specific strategies; the feasibility study includes all required components (market, curriculum, resources, accreditation, finances, recommendation); the gen ed audit analyzes current weaknesses and proposes a coherent redesigned model; each document follows appropriate academic planning conventions; the three documents demonstrate range across academic planning competencies."
    weight: 0.35
    description: "ThreeDocuments"
  - type: llm_judge
    criteria: "Response demonstrates sophisticated academic planning — the program review response proposes evidence-based curriculum revisions (not just 'update the curriculum'); the DPT feasibility study shows understanding of doctoral program development and CAPTE accreditation; the gen ed audit proposes a model with clear rationale (not just rearranging distribution requirements); each document addresses political and practical realities of academic governance; the analysis in each document is substantive, not superficial."
    weight: 0.35
    description: "AnalyticalDepth"
  - type: llm_judge
    criteria: "Response produces actionable, decision-ready documents — the program review response could be presented to the psychology department; the feasibility study provides a clear go/no-go recommendation with supporting evidence; the gen ed audit report could be presented to faculty senate; financial projections are realistic; timelines are specific; each document would advance decision-making at the appropriate governance level; the overall quality demonstrates VP-level academic planning competence."
    weight: 0.30
    description: "DecisionReadiness"
