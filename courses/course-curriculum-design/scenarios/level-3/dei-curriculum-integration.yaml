meta:
  id: dei-curriculum-integration
  level: 3
  course: course-curriculum-design
  type: output
  description: "Design the integration of DEI principles across an entire business school curriculum, beyond standalone courses to embedded competencies and inclusive pedagogy"
  tags: [dei, inclusive-pedagogy, business-school, advanced]

state: {}

trigger: |
  You're the Associate Dean for Diversity, Equity,
  and Inclusion at a top-50 business school. After
  years of offering a single standalone "Diversity
  in the Workplace" elective, the Dean has
  committed to integrating DEI principles across
  the entire MBA curriculum. The faculty senate
  approved this initiative, but implementation
  is contentious — some faculty are enthusiastic,
  some are skeptical, and a few are openly
  resistant.

  MBA program details:
  - 2-year full-time MBA, 60 credit hours
  - 12 required core courses + 8 electives
  - 450 students (60% domestic, 40% international)
  - 65 full-time faculty across 6 departments
    (Accounting, Finance, Marketing, Management,
    Operations, Strategy)

  Core courses to integrate DEI into:
  - Financial Accounting
  - Corporate Finance
  - Marketing Management
  - Organizational Behavior
  - Operations Management
  - Business Strategy
  - Data Analytics
  - Managerial Economics
  - Business Law and Ethics
  - Leadership and Communication
  - Entrepreneurship
  - Global Business

  Integration challenges:
  - Faculty autonomy: "You can't tell me what to
    teach in my finance class"
  - Tokenism risk: Adding one DEI case study doesn't
    equal integration
  - Measurement: How do you assess DEI competency
    without performative box-checking?
  - Student resistance: Some students see DEI as
    "not relevant to business"
  - Cultural sensitivity: International students
    have diverse perspectives on equity
  - Political sensitivity: Avoiding the appearance
    of political indoctrination

  Design requirements:
  - DEI competency framework for MBA graduates
  - Course-by-course integration plan (what DEI
    looks like in Finance vs Marketing vs Operations)
  - Inclusive pedagogy guidelines for faculty
  - Assessment approach for DEI learning outcomes
  - Faculty development plan (workshops, resources)
  - Student-facing communication explaining the
    rationale

  Task: Design the complete DEI curriculum
  integration plan — including the competency
  framework, course-by-course integration
  strategies, inclusive pedagogy guidelines, the
  assessment approach, faculty development plan,
  and communication strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a substantive DEI integration plan — the competency framework defines specific, measurable DEI competencies for MBA graduates (not vague platitudes); the course-by-course integration is substantive (showing what DEI looks like in Finance, Marketing, Operations, etc. — not just adding a case study); integration strategies are discipline-appropriate (equity in financial analysis is different from equity in marketing); the plan avoids both tokenism and over-reach."
    weight: 0.35
    description: "IntegrationDesign"
  - type: llm_judge
    criteria: "Response navigates the political and pedagogical complexity — addresses faculty autonomy with persuasion, not mandate; provides inclusive pedagogy guidelines that are practical for faculty with varying DEI literacy; the assessment approach avoids performative box-checking while still measuring growth; addresses student resistance with business-case reasoning; handles the international student perspective thoughtfully; the communication strategy is transparent about rationale without being preachy."
    weight: 0.35
    description: "NavigatingComplexity"
  - type: llm_judge
    criteria: "Response includes practical implementation elements — the faculty development plan is realistic (acknowledging different starting points); the integration timeline is phased (not all 12 courses at once); the plan includes resources faculty can actually use (case studies, readings, discussion frameworks); the assessment connects to program-level learning outcomes; the overall plan would earn the respect of both DEI advocates and skeptical faculty; the approach is sustainable beyond the current dean's tenure."
    weight: 0.30
    description: "PracticalImplementation"
