meta:
  id: accreditation-self-study
  level: 3
  course: course-curriculum-design
  type: output
  description: "Prepare the curriculum sections of an accreditation self-study for a professional program, demonstrating continuous improvement and outcomes assessment"
  tags: [accreditation, self-study, continuous-improvement, advanced]

state: {}

trigger: |
  You're the Assessment Director for a School of
  Engineering at a regional university. The ABET
  (Accreditation Board for Engineering and
  Technology) accreditation visit is in 10 months,
  and you're responsible for preparing the
  curriculum-related sections of the self-study
  report. The program was cited for weaknesses in
  assessment and continuous improvement during the
  last accreditation cycle 6 years ago.

  Program details:
  - Program: B.S. in Civil Engineering
  - Accreditor: ABET (Engineering Accreditation
    Commission)
  - Students: 180 in the program (45 per cohort)
  - Faculty: 12 full-time, 4 adjunct
  - Last visit finding: "The program does not have
    a systematic process for assessing student
    outcomes and using results for continuous
    improvement"

  ABET criteria to address:
  - Criterion 2: Program Educational Objectives
    (what graduates do 3-5 years out)
  - Criterion 3: Student Outcomes (1-7 outcomes
    per ABET, plus any program-specific outcomes)
  - Criterion 5: Curriculum (math/science, engineering
    topics, general education, capstone design)
  - Criterion 6: Faculty (competence, authority,
    number)

  Specific challenges:
  - The previous assessment plan was "collect data
    but don't use it" — data was gathered but
    never analyzed or used to improve curriculum
  - Faculty see assessment as bureaucratic compliance,
    not useful
  - Student outcome data is scattered across
    individual faculty files
  - The program has made curriculum changes since
    the last visit but cannot document the rationale
    or evidence that prompted them
  - Advisory board meets annually but minutes do not
    show how their input influenced curriculum

  Task: Prepare the curriculum-related sections of
  the ABET self-study — including the program
  educational objectives, student outcomes
  assessment plan with rubrics, curriculum mapping
  (outcomes to courses), the continuous improvement
  documentation (showing the close-the-loop
  process), and the data collection/analysis
  framework. The documentation must show genuine
  continuous improvement, not just compliance
  theater.

assertions:
  - type: llm_judge
    criteria: "Response prepares comprehensive ABET self-study sections — addresses Criteria 2, 3, 5, and 6 with appropriate detail; program educational objectives are measurable and reflect what graduates do 3-5 years out; student outcomes align with ABET's 7 outcomes; the curriculum map shows outcomes across courses; the assessment plan includes rubrics and data collection methods; the documentation directly addresses the previous visit's weakness finding about systematic assessment and continuous improvement."
    weight: 0.35
    description: "SelfStudyComprehensiveness"
  - type: llm_judge
    criteria: "Response demonstrates genuine continuous improvement — the close-the-loop process shows how data leads to analysis, analysis leads to decisions, and decisions lead to curriculum changes; examples of evidence-based curriculum modifications are documented with before/after comparisons; advisory board input is connected to specific curriculum decisions; the documentation would convince ABET evaluators that the program has addressed its previous weakness; the approach is authentic, not just compliance theater."
    weight: 0.35
    description: "ContinuousImprovement"
  - type: llm_judge
    criteria: "Response provides a sustainable assessment infrastructure — the data collection framework is manageable for 12 faculty (not requiring excessive work); rubrics are practical and can be embedded in regular coursework; the assessment cycle (collect, analyze, act, document) is defined; faculty buy-in strategies are included; the framework would work beyond the accreditation visit as an ongoing program improvement tool; the documentation is organized for ABET evaluators (following their expected format)."
    weight: 0.30
    description: "SustainableAssessment"
