meta:
  id: study-abroad-curriculum
  level: 3
  course: course-curriculum-design
  type: output
  description: "Design a semester-long study abroad curriculum that integrates academic coursework, experiential learning, and cultural immersion in a way that meets home institution requirements"
  tags: [study-abroad, experiential-learning, global-education, advanced]

state: {}

trigger: |
  You're the Director of Global Education at a
  liberal arts college. You're designing a new
  semester-long study abroad program in Barcelona,
  Spain, focused on "Mediterranean Business and
  Culture." The program must provide rigorous
  academics while leveraging the location for
  experiential learning. It also must satisfy the
  home institution's general education and major
  requirements so students don't "fall behind."

  Program parameters:
  - Duration: Fall semester (15 weeks)
  - Students: 20 juniors from various majors
    (business, international studies, languages,
    art history)
  - Location: Barcelona, Spain (partner university
    + rented classroom space)
  - Faculty: 1 resident director (your faculty
    member) + 2 local adjunct instructors
  - Housing: Homestay families

  Courses to design (15 credits total):
  1. Mediterranean Business Environment (3 cr) —
     European business practices, EU regulations,
     startup ecosystem, sustainability
  2. Spanish Language and Culture (3 cr) — Intermediate
     level, communication-focused, Catalan cultural
     context
  3. Art and Architecture of Barcelona (3 cr) —
     Gaudi, modernisme, medieval quarter, contemporary
     art scene
  4. Experiential Learning Seminar (3 cr) — Internship
     or service learning placement + reflective
     seminar
  5. Independent Study / Directed Research (3 cr) —
     Student-designed research project on a local
     topic

  Design challenges:
  - Courses must meet home institution standards
    (equivalent to on-campus courses in rigor)
  - Need to use Barcelona as a "living classroom"
    without becoming tourism
  - Homestay families are part of the learning
    experience
  - Students from different majors need courses to
    count toward their requirements
  - Health, safety, and liability considerations
  - Students may experience culture shock, homesickness,
    and group dynamics issues
  - The experiential learning placements must be
    meaningful, not just resume padding

  Task: Design the complete study abroad curriculum
  — including syllabi for all 5 courses, the
  experiential learning placement structure, the
  orientation and re-entry programs, student
  support protocols, and the assessment plan that
  demonstrates academic rigor equivalent to
  on-campus courses.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive study abroad curriculum — includes syllabi or detailed outlines for all 5 courses; courses genuinely leverage the Barcelona location (not courses that could be taught anywhere); learning objectives are clear and meet home institution standards; the 15-credit course load is manageable alongside cultural immersion; the curriculum integrates academic, experiential, and cultural learning; the balance between structured academics and experiential exploration is appropriate."
    weight: 0.35
    description: "CurriculumDesign"
  - type: llm_judge
    criteria: "Response addresses the experiential and cultural dimensions — the experiential learning placements are structured with clear expectations, supervision, and reflection; homestay families are integrated into the learning design; the curriculum uses Barcelona as a living classroom meaningfully; orientation addresses culture shock and expectations; re-entry programming helps students process their experience; the program avoids being academic tourism while maintaining genuine cultural immersion."
    weight: 0.35
    description: "ExperientialLearning"
  - type: llm_judge
    criteria: "Response includes student support and assessment rigor — student support protocols address health, safety, mental health, and group dynamics; the assessment plan demonstrates academic rigor equivalent to on-campus courses; the curriculum would satisfy students from different majors (business, international studies, languages, art history); the independent study component is well-structured with mentorship; the overall program would be a transformative educational experience, not just a semester of living abroad."
    weight: 0.30
    description: "SupportAndRigor"
