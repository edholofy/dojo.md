meta:
  id: cross-institutional-articulation
  level: 3
  course: course-curriculum-design
  type: output
  description: "Design transfer articulation agreements between a community college and university system, ensuring seamless credit transfer and curriculum alignment"
  tags: [transfer-articulation, community-college, curriculum-alignment, advanced]

state: {}

trigger: |
  You're the Transfer Articulation Officer for a
  state university system that includes 3
  universities and 8 community colleges. The state
  legislature has mandated a "Guaranteed Transfer
  Pathway" program — students who complete an
  associate degree at any of the 8 community
  colleges must be able to transfer seamlessly
  into a related bachelor's degree at any of the
  3 universities with no loss of credits.

  Pilot program: Business Administration
  - Community college side: A.A. in Business (60
    credits across 8 community colleges)
  - University side: B.S. in Business Administration
    (120 credits across 3 universities)

  Current problems:
  - A student who transfers from CC-A to University-1
    loses an average of 12 credits (courses that
    don't transfer or don't count toward the major)
  - The same course has different names at different
    institutions (e.g., "Principles of Management"
    vs "Introduction to Management" vs "Management
    Fundamentals")
  - Community colleges teach some courses at
    different depths than universities expect
  - General education requirements vary across
    all 11 institutions
  - Faculty at universities resist accepting CC
    courses as equivalent to their own

  Design requirements:
  - Course equivalency matrix across all 11
    institutions
  - Common course numbering system or crosswalk
  - Guaranteed transfer curriculum (which 60 credits
    at the CC will transfer to the B.S. at any
    university)
  - Course-level learning outcomes alignment
    (proving equivalency)
  - General education transfer block
  - Faculty review process for maintaining
    equivalencies
  - Student advising guide

  Task: Design the complete transfer articulation
  framework — including the course equivalency
  matrix, the guaranteed transfer curriculum,
  learning outcomes alignment documentation, the
  faculty review process, and the student-facing
  advising guide. The framework must satisfy the
  legislative mandate while respecting institutional
  autonomy.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive articulation framework — includes a course equivalency matrix or crosswalk across 11 institutions; the guaranteed transfer curriculum specifies which 60 CC credits transfer to each university; learning outcomes alignment demonstrates course equivalency; the general education transfer block simplifies gen ed transfer; the framework ensures zero credit loss for students who follow the prescribed pathway; the design is systematic, not just a collection of one-off agreements."
    weight: 0.35
    description: "ArticulationFramework"
  - type: llm_judge
    criteria: "Response navigates institutional politics and quality concerns — addresses university faculty resistance with outcomes-based equivalency evidence; respects institutional autonomy while meeting the legislative mandate; the faculty review process maintains quality standards without being obstructionist; the framework handles the tension between standardization and institutional identity; the process for maintaining and updating equivalencies is defined; the overall approach would be acceptable to both CC and university stakeholders."
    weight: 0.35
    description: "InstitutionalPolitics"
  - type: llm_judge
    criteria: "Response includes a practical student advising guide — the guide is clear enough for students to navigate the transfer process independently; it specifies exactly which courses to take at the CC; it addresses common pitfalls (courses that look equivalent but aren't); the guide would reduce the average credit loss from 12 to 0 for pathway students; the overall framework would satisfy the legislative mandate and improve transfer student outcomes."
    weight: 0.30
    description: "StudentAdvising"
