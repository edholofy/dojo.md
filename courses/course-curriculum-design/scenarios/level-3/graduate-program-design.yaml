meta:
  id: graduate-program-design
  level: 3
  course: course-curriculum-design
  type: output
  description: "Design a new interdisciplinary master's degree program, navigating faculty governance, accreditation requirements, and cross-department collaboration"
  tags: [graduate-program, interdisciplinary, accreditation, advanced]

state: {}

trigger: |
  You're the Associate Dean for Academic Affairs at
  a mid-size university. The Provost has asked you
  to lead the development of a new Master of Science
  in Data Analytics program — an interdisciplinary
  degree spanning the Computer Science, Statistics,
  and Business departments. This is the university's
  first truly interdisciplinary graduate program.

  Program parameters:
  - Degree: M.S. in Data Analytics
  - Duration: 2 years (4 semesters), 36 credit hours
  - Enrollment target: 30 students per cohort
  - Delivery: Hybrid (60% in-person, 40% online)
  - Target students: Working professionals with
    bachelor's degrees in any field + basic stats/
    programming proficiency

  Political landscape:
  - Computer Science department wants the program
    housed in their department (they have the most
    faculty resources)
  - Statistics department feels they own "analytics"
    and resents being a junior partner
  - Business department has the most applicant
    demand but fewest technical faculty
  - The Graduate School requires compliance with
    existing degree approval processes
  - Regional accreditor (HLC) requires new program
    notification and may require a site visit

  Curriculum design requirements:
  - Core courses (18 credits): Must draw from all
    three departments
  - Electives (12 credits): Specialization tracks
    (Business Analytics, Health Analytics, Social
    Analytics)
  - Capstone (6 credits): Industry-partnered
    capstone project
  - Prerequisites: Define admission requirements
    and bridge courses for students lacking
    technical backgrounds
  - Assessment: Program-level learning outcomes
    mapped to courses

  Additional requirements:
  - Market analysis justification (show demand)
  - Faculty resource plan (who teaches what)
  - Budget projection (tuition revenue vs costs)
  - Accreditation compliance documentation
  - Curriculum committee proposal format

  Task: Design the complete M.S. program proposal —
  including the curriculum plan, course descriptions,
  specialization tracks, faculty resource allocation,
  budget projection, accreditation documentation,
  and the strategy for navigating the
  interdepartmental politics.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive M.S. program — includes 36-credit curriculum plan with core courses (18 cr), electives (12 cr), and capstone (6 cr); core courses draw meaningfully from all three departments; specialization tracks are distinct and viable; course descriptions include learning objectives; prerequisites and bridge courses address diverse student backgrounds; the 4-semester sequence is logical; the program would produce graduates with genuine data analytics competency."
    weight: 0.35
    description: "ProgramDesign"
  - type: llm_judge
    criteria: "Response navigates the institutional complexity — addresses the interdepartmental politics with a diplomatic governance structure; the faculty resource plan distributes teaching fairly across departments; the budget projection is realistic (revenue vs costs); accreditation documentation meets HLC requirements for new program notification; the curriculum committee proposal follows standard academic governance; the strategy acknowledges and addresses each department's concerns without being dismissive."
    weight: 0.35
    description: "InstitutionalNavigation"
  - type: llm_judge
    criteria: "Response includes market justification and program viability — the market analysis demonstrates demand for data analytics graduates; the program differentiates from competitors; the hybrid delivery model is well-designed for working professionals; the industry-partnered capstone is structured to benefit both students and partners; the enrollment target (30/cohort) is realistic given the university's market position; the overall proposal would be persuasive to a provost and curriculum committee."
    weight: 0.30
    description: "MarketViability"
