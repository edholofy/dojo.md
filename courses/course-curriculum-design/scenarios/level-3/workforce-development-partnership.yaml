meta:
  id: workforce-development-partnership
  level: 3
  course: course-curriculum-design
  type: output
  description: "Design a workforce development curriculum in partnership with industry, creating stackable credentials that address regional skill gaps and employer needs"
  tags: [workforce-development, stackable-credentials, industry-partnership, advanced]

state: {}

trigger: |
  You're the Dean of Workforce Development at a
  community college in a mid-size city. The regional
  economic development authority has awarded your
  college a $2.5M grant to create a cybersecurity
  workforce pipeline in partnership with 5 local
  employers (a hospital system, a bank, a defense
  contractor, a tech company, and the city
  government).

  Regional context:
  - 340 unfilled cybersecurity positions in the
    region
  - Median salary: $78,000 (attractive for the
    region)
  - Current pipeline: Zero — no local institution
    offers cybersecurity training
  - Target population: Career changers, veterans,
    underemployed adults, and recent high school
    graduates
  - Employer commitment: Each partner will provide
    internship slots, guest instructors, and
    equipment donations

  Program design requirements:
  - Stackable credential model:
    Level 1: Cybersecurity Fundamentals Certificate
    (4 months, entry-level SOC analyst)
    Level 2: Advanced Cybersecurity Certificate
    (4 months, incident response/vulnerability
    assessment)
    Level 3: A.A.S. in Cybersecurity (additional
    year, comprehensive)
  - Each level leads to industry certifications:
    Level 1 → CompTIA Security+
    Level 2 → CompTIA CySA+ or CEH
    Level 3 → CISSP Associate
  - Employer co-designed curriculum (employer
    advisory board)
  - Paid internships between levels
  - Wrap-around student support (career coaching,
    financial aid navigation, childcare referrals)

  Grant requirements:
  - 200 completers over 3 years
  - 80% job placement rate within 6 months
  - 40% of completers from underrepresented groups
  - Employer satisfaction score: 4.0/5.0
  - Curriculum must be transferable to 4-year
    institutions

  Task: Design the complete stackable credential
  program — including curriculum for all 3 levels,
  industry certification alignment, the employer
  co-design process, internship structure, student
  support model, recruitment strategy for
  underrepresented groups, and the program
  evaluation plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive stackable credential program — curriculum for all 3 levels is detailed with course descriptions and learning outcomes; the levels build logically (fundamentals → advanced → comprehensive); industry certifications are meaningfully integrated (not just mentioned as goals); the stackable model allows students to exit at any level with a credential and re-enter later; the curriculum balances theory and hands-on practice; the A.A.S. credits are designed to transfer to 4-year institutions."
    weight: 0.35
    description: "StackableDesign"
  - type: llm_judge
    criteria: "Response addresses the industry partnership and equity dimensions — the employer co-design process is defined (advisory board structure, curriculum review cycle, feedback mechanisms); internship structure benefits both students and employers; the recruitment strategy for underrepresented groups is substantive (not just 'we will recruit diversely'); wrap-around support services address real barriers (childcare, financial, transportation); the 40% underrepresented group target has a realistic achievement plan."
    weight: 0.35
    description: "PartnershipAndEquity"
  - type: llm_judge
    criteria: "Response includes a viable evaluation plan — the evaluation connects to all grant requirements (200 completers, 80% placement, 40% underrepresented, 4.0 employer satisfaction); data collection is defined for each metric; the $2.5M budget is allocated across program elements; the 3-year timeline has milestones; the program is designed for sustainability beyond the grant period; the overall program would fill the 340-position gap and create a lasting cybersecurity pipeline."
    weight: 0.30
    description: "EvaluationAndSustainability"
