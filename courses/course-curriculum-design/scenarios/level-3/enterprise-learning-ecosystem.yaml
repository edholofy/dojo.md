meta:
  id: enterprise-learning-ecosystem
  level: 3
  course: course-curriculum-design
  type: output
  description: "Design an enterprise-wide learning ecosystem for a global company, integrating compliance training, leadership development, technical skills, and career pathing across 15,000 employees"
  tags: [enterprise-learning, global, learning-ecosystem, advanced]

state: {}

trigger: |
  You're the newly hired VP of Learning &
  Development at a global pharmaceutical company
  with 15,000 employees across 12 countries. The
  CEO has given you a mandate to transform L&D
  from a "training department" into a strategic
  "learning ecosystem." Currently, training is
  fragmented — each region runs its own programs
  with no coordination, compliance training is
  overdue for 34% of employees, and there's no
  connection between learning and career progression.

  Current state:
  - 3 different LMS platforms (US uses Cornerstone,
    Europe uses SAP SuccessFactors, Asia uses a
    legacy system)
  - No global content standards
  - Compliance training completion: 66% (regulated
    industry — this is a risk)
  - Leadership development: ad hoc, inconsistent
  - Technical skills training: varies by site
  - Employee survey: "I don't see a clear path
    for growth" — 58% agree
  - Annual L&D budget: $12M (0.8% of payroll —
    industry average is 1.5%)

  Design requirements:
  - Unified learning architecture across all regions
  - Compliance training track (GxP, pharmacovigilance,
    data integrity, safety)
  - Leadership pipeline (individual contributor →
    manager → director → VP)
  - Technical skills framework (R&D, manufacturing,
    commercial, G&A)
  - Career pathway mapping connected to learning
  - Global content governance (what's global vs
    regional vs local)
  - LMS consolidation strategy
  - Measurement framework (business impact, not
    just completion rates)

  Constraints:
  - Budget increase approval pending ($12M → $18M
    over 3 years)
  - Must maintain regulatory compliance throughout
    transition
  - Union requirements in 3 European countries
  - Language requirements: English, German, Japanese,
    Mandarin (minimum)
  - Cultural sensitivity across 12 countries

  Task: Design the complete learning ecosystem
  strategy — including the architecture, content
  framework, career pathway integration, LMS
  consolidation plan, global governance model,
  3-year implementation roadmap, and the measurement
  framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive learning ecosystem — includes a unified architecture that integrates compliance, leadership, technical skills, and career pathing; the content framework distinguishes global, regional, and local content; the career pathway mapping connects learning to progression; the design addresses all 15,000 employees across 12 countries; the ecosystem is strategic (connected to business outcomes), not just a training catalog; the architecture is scalable and sustainable."
    weight: 0.35
    description: "EcosystemArchitecture"
  - type: llm_judge
    criteria: "Response addresses the operational complexity — the LMS consolidation plan is realistic (phased migration, not big-bang); compliance training remediation addresses the 34% overdue risk immediately; the global governance model handles the tension between global consistency and regional autonomy; language and cultural considerations are substantive; union requirements in European countries are addressed; the 3-year implementation roadmap has clear phases and milestones; the budget increase ($12M → $18M) is allocated thoughtfully."
    weight: 0.35
    description: "OperationalComplexity"
  - type: llm_judge
    criteria: "Response includes a meaningful measurement framework — goes beyond completion rates to measure business impact (performance improvement, promotion readiness, compliance risk reduction); connects L&D metrics to business KPIs; the measurement approach would justify the budget increase to the CEO; the framework addresses the 58% 'no clear growth path' survey finding; the overall strategy would transform L&D from a cost center to a strategic function."
    weight: 0.30
    description: "MeasurementFramework"
