meta:
  id: curriculum-mapping
  level: 2
  course: course-curriculum-design
  type: output
  description: "Create a curriculum map for a nursing program, aligning program outcomes, course objectives, and clinical competencies across a 4-year BSN degree"
  tags: [curriculum-mapping, nursing, accreditation, intermediate]

state: {}

trigger: |
  You're the curriculum coordinator for a Bachelor
  of Science in Nursing (BSN) program at a regional
  university. The program is preparing for its
  CCNE (Commission on Collegiate Nursing Education)
  accreditation visit in 8 months. The accreditation
  team has specifically requested a curriculum map
  showing how program outcomes are addressed across
  the 4-year curriculum.

  Program details:
  - Degree: BSN (Bachelor of Science in Nursing)
  - Duration: 4 years (8 semesters)
  - Students: 60 per cohort
  - Clinical partners: 3 hospital systems, 2 long-
    term care facilities, 2 community health centers

  Program outcomes (what graduates can do):
  1. Provide patient-centered care using evidence-
     based practice
  2. Apply clinical reasoning and critical thinking
     to nursing practice
  3. Demonstrate proficiency in health assessment
     and clinical skills
  4. Collaborate effectively within interprofessional
     teams
  5. Integrate informatics and technology in
     healthcare delivery
  6. Demonstrate leadership and professionalism
  7. Incorporate population health and social
     determinants into care planning
  8. Practice within legal, ethical, and regulatory
     frameworks

  Core nursing courses (chronological):
  Year 1: Fundamentals of Nursing, Health Assessment,
    Pathophysiology, Pharmacology I
  Year 2: Adult Health I, Mental Health Nursing,
    Pharmacology II, Nursing Research
  Year 3: Adult Health II, Maternal-Newborn,
    Pediatric Nursing, Community Health
  Year 4: Leadership & Management, Complex Care,
    Nursing Capstone, Clinical Immersion

  Mapping requirements:
  - Show where each program outcome is Introduced
    (I), Reinforced (R), and Mastered (M) across
    the curriculum
  - Identify assessment methods for each outcome
    in each course
  - Flag any gaps (outcomes not adequately addressed)
  - Flag any redundancies (outcomes over-addressed)
  - Align with AACN Essentials (2021)

  Task: Create the complete curriculum map —
  including the I/R/M matrix, assessment alignment,
  gap analysis, and recommendations for curriculum
  adjustments. Format the map so it can be presented
  to the accreditation team.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive curriculum map — includes an I/R/M (Introduced, Reinforced, Mastered) matrix showing all 8 program outcomes across all 16 core courses; the mapping is logical (outcomes are introduced early, reinforced in middle years, mastered in later years); the map shows a clear developmental progression; assessment methods are identified for each outcome in each course; the format is professional and suitable for an accreditation review."
    weight: 0.35
    description: "CurriculumMap"
  - type: llm_judge
    criteria: "Response includes meaningful gap and redundancy analysis — identifies specific gaps where program outcomes are not adequately addressed; identifies redundancies where outcomes are over-addressed without progression; recommendations for curriculum adjustments are specific and actionable; the analysis connects to AACN Essentials; the gap analysis would be valuable for the accreditation preparation, not just perfunctory."
    weight: 0.35
    description: "GapAnalysis"
  - type: llm_judge
    criteria: "Response demonstrates understanding of accreditation requirements — the curriculum map format meets CCNE expectations; program outcomes are measurable and assessable; the I/R/M progression ensures students achieve mastery before graduation; clinical experiences are mapped to competency development; the overall document would strengthen the program's accreditation case; the recommendations are prioritized by urgency for the 8-month timeline."
    weight: 0.30
    description: "AccreditationAlignment"
