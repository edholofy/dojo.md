meta:
  id: mooc-design
  level: 2
  course: course-curriculum-design
  type: output
  description: "Design a MOOC for a university partnership with an online platform, addressing massive scale, engagement, completion rates, and certification"
  tags: [mooc, online-learning, scale, intermediate]

state: {}

trigger: |
  You're a professor of data science at a large
  research university. Coursera has approached your
  department to create a MOOC called "Data Science
  for Everyone" — a course that makes data science
  accessible to non-technical professionals. The
  university sees this as a branding opportunity
  and wants high production quality.

  MOOC parameters:
  - Platform: Coursera
  - Expected enrollment: 50,000-100,000 learners
  - Target audience: Business professionals,
    managers, marketers, journalists — people who
    work with data but aren't programmers
  - Duration: 6 weeks (3-5 hours/week effort)
  - No prerequisites; basic spreadsheet familiarity
    assumed
  - Tool: Google Sheets (free, accessible)
  - Certificate: Coursera verified certificate
    upon completion

  Content:
  - Week 1: What is Data Science? (thinking with
    data, types of data, data lifecycle)
  - Week 2: Asking the Right Questions (framing
    business questions as data questions)
  - Week 3: Data Collection and Cleaning (sources,
    quality, common problems)
  - Week 4: Exploratory Data Analysis (descriptive
    statistics, charts, patterns)
  - Week 5: Making Predictions (basic regression,
    correlation vs causation, forecasting)
  - Week 6: Communicating with Data (dashboards,
    storytelling, avoiding misleading charts)

  Challenges:
  - MOOC completion rates are typically 5-15%;
    your department wants at least 20%
  - No live instruction; everything must be
    asynchronous
  - Learners span different time zones, languages,
    and motivation levels
  - You need engagement mechanisms that work at
    massive scale
  - Assessment must be auto-graded or peer-graded

  Task: Design the complete MOOC curriculum —
  including weekly structure, video lesson plans,
  engagement strategies to improve completion rates,
  the assessment and grading scheme, the peer
  review framework, and a production plan for
  video content.

assertions:
  - type: llm_judge
    criteria: "Response designs a well-structured 6-week MOOC — each week has a clear theme, learning objectives, and lesson breakdown; video lessons are appropriately short (5-12 minutes each); the weekly effort (3-5 hours) is realistic; the progression from data literacy to data communication is logical; the content is genuinely accessible to non-technical professionals; the design works within Coursera's platform capabilities."
    weight: 0.35
    description: "MOOCStructure"
  - type: llm_judge
    criteria: "Response addresses the completion rate challenge with specific engagement strategies — identifies multiple strategies to improve completion beyond the typical 5-15% (social learning, gamification, real-world relevance, cohort-based elements, milestone rewards, etc.); engagement strategies are feasible at 50,000+ learner scale; the assessment scheme combines auto-graded and peer-graded elements effectively; the peer review framework is structured (rubric, calibration, minimum reviews); the design would plausibly achieve the 20% completion target."
    weight: 0.35
    description: "EngagementAndCompletion"
  - type: llm_judge
    criteria: "Response includes a production plan and practical considerations — the video production plan covers format, length, presentation style, and visual elements; production quality considerations are addressed (not just 'record lectures'); the course design accounts for global accessibility (time zones, language, connectivity); the certificate requirements are clear; the overall design represents the university's brand well; the course would be competitive with other data science MOOCs on Coursera."
    weight: 0.30
    description: "ProductionAndPracticality"
