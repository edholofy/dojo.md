meta:
  id: blended-learning-redesign
  level: 2
  course: course-curriculum-design
  type: output
  description: "Redesign a traditional lecture-based university course into a blended learning format, integrating online and in-person components with a flipped classroom approach"
  tags: [blended-learning, flipped-classroom, university, intermediate]

state: {}

trigger: |
  You're an instructional designer helping a
  chemistry professor redesign "General Chemistry I
  (CHEM 101)" from a traditional lecture format to
  a blended/flipped classroom model. The professor
  is skeptical but willing to try after seeing poor
  exam scores and high DFW rates (35% of students
  earn D, F, or withdraw).

  Current course structure:
  - 3 lecture hours/week (MWF, 50 min each) — pure
    lecture with PowerPoint slides
  - 1 lab session/week (3 hours) — traditional
    cookbook labs
  - 4 exams + final exam
  - No online component
  - 150 students in lecture; 25 per lab section
  - DFW rate: 35%
  - Student feedback: "Lectures are boring," "Can't
    keep up with note-taking," "Don't understand
    until I try problems but there's no time in
    class"

  Proposed blended model:
  - Pre-class: Students watch short video lectures
    and complete reading quizzes online (async)
  - In-class: Active learning — problem-solving,
    group work, clicker questions, demonstrations
    (the "flip")
  - Lab: Redesign from cookbook to inquiry-based
  - Online: Discussion forums, practice problems
    with instant feedback, study groups

  Redesign parameters:
  - LMS: Blackboard
  - Same time slots (MWF 50 min + lab 3 hrs)
  - Must cover same content (stoichiometry, atomic
    structure, bonding, gases, solutions, acids/
    bases, thermodynamics)
  - Professor has a TA budget for 6 TAs
  - The professor needs convincing — show evidence
    this approach works

  Task: Design the complete blended course — including
  the flipped classroom model with weekly plans for
  at least 4 representative weeks, pre-class video
  specifications, in-class active learning activities,
  the redesigned assessment plan, and a brief
  evidence-based rationale the professor can share
  with the department chair.

assertions:
  - type: llm_judge
    criteria: "Response designs a coherent blended/flipped course model — clearly defines what happens pre-class (videos, reading quizzes), in-class (active learning), and post-class (practice, forums); weekly plans for at least 4 representative weeks show the model in action; pre-class video specifications are realistic (short videos, 8-15 minutes, focused on single concepts); in-class activities are genuinely active (not just working through problems silently); the model maintains the same content coverage as the traditional format."
    weight: 0.35
    description: "BlendedModel"
  - type: llm_judge
    criteria: "Response redesigns assessments and labs appropriately — the assessment plan shifts from reliance on 4 high-stakes exams to include more frequent, lower-stakes assessments; pre-class quizzes check preparation; in-class participation is measured; labs are redesigned from cookbook to inquiry-based; the overall assessment approach would reduce the 35% DFW rate; the redesign accounts for 150 students in lecture (scalability of active learning)."
    weight: 0.35
    description: "AssessmentRedesign"
  - type: llm_judge
    criteria: "Response provides evidence-based rationale and practical implementation guidance — cites relevant research on flipped classrooms in STEM (e.g., Freeman et al., 2014 on active learning); addresses the professor's skepticism with evidence; includes practical implementation tips (how to make videos, how to manage active learning with 150 students, TA roles); the rationale would be convincing to a department chair; the transition plan is gradual, not all-at-once."
    weight: 0.30
    description: "EvidenceAndPracticality"
