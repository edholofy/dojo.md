meta:
  id: intermediate-curriculum-shift
  level: 2
  course: course-curriculum-design
  type: output
  description: "Design three curriculum documents simultaneously — a university course redesign using ADDIE, a training needs analysis, and a curriculum evaluation report — demonstrating intermediate instructional design skills"
  tags: [multi-format, addie, needs-analysis, shift-simulation, intermediate]

state: {}

trigger: |
  You're a senior instructional designer at a
  university's Center for Online Learning. Three
  urgent projects have landed on your desk this
  week, each requiring different instructional
  design frameworks.

  Project 1 — ADDIE Course Redesign:
  Apply the ADDIE model to redesign "BUS 301:
  Principles of Marketing" from a face-to-face
  lecture course to a fully online asynchronous
  format. The course has 120 students per section,
  2 sections per semester. Current student
  satisfaction: 2.8/5.0. The professor is retiring
  and the department wants to standardize the course.
  Deliverable: Complete ADDIE documentation showing
  Analysis, Design, Development plan, Implementation
  strategy, and Evaluation plan.

  Project 2 — Training Needs Analysis:
  The university's IT department wants to launch a
  cybersecurity awareness training program for all
  3,200 employees (faculty, staff, administrators).
  Recent phishing attacks have compromised 14
  accounts in the past quarter. Before designing
  the training, you need to conduct a training
  needs analysis.
  Deliverable: Training needs analysis report
  including gap analysis, target audience profiles,
  learning needs, recommended training modalities,
  and a preliminary content outline.

  Project 3 — Curriculum Evaluation Report:
  The School of Education's teacher preparation
  program has declining enrollment (from 180 to 95
  students over 5 years) and lower-than-state-
  average Praxis pass rates (68% vs 82% state
  average). The Dean has requested a curriculum
  evaluation using Kirkpatrick's Four Levels.
  Deliverable: Curriculum evaluation framework
  with data collection methods, analysis criteria,
  and preliminary recommendations based on
  available data.

  Task: Create all three deliverables, demonstrating
  your ability to apply ADDIE, conduct needs
  analysis, and evaluate curricula using Kirkpatrick's
  model.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct instructional design documents — the ADDIE redesign shows all 5 phases with appropriate detail for BUS 301; the training needs analysis follows a systematic methodology for the cybersecurity program; the curriculum evaluation applies Kirkpatrick's Four Levels (Reaction, Learning, Behavior, Results) to the education program; each document uses its respective framework correctly; the three documents demonstrate range across instructional design competencies."
    weight: 0.35
    description: "ThreeDocuments"
  - type: llm_judge
    criteria: "Response applies instructional design frameworks with depth — ADDIE phases are substantive (not just labels — each phase has specific deliverables and decisions); the needs analysis identifies genuine gaps between current and desired state; Kirkpatrick's evaluation includes specific data collection methods for each level; the documents reflect understanding of the underlying theories, not just surface-level application; each framework is appropriate for its specific project."
    weight: 0.35
    description: "FrameworkDepth"
  - type: llm_judge
    criteria: "Response produces actionable, professional documents — the ADDIE redesign could guide actual course development; the needs analysis would inform real training design decisions; the evaluation framework could be implemented by an assessment team; all three documents address their respective problems (low satisfaction, security breaches, declining enrollment/pass rates); the overall quality demonstrates competence at the senior instructional designer level."
    weight: 0.30
    description: "Actionability"
