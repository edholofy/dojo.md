meta:
  id: microlearning-program
  level: 2
  course: course-curriculum-design
  type: output
  description: "Design a microlearning program for a sales team, breaking complex product knowledge into bite-sized daily lessons delivered via mobile app"
  tags: [microlearning, mobile, sales-training, intermediate]

state: {}

trigger: |
  You're the Sales Enablement Manager at a B2B
  SaaS company that sells a complex enterprise
  resource planning (ERP) platform. The 80-person
  sales team struggles to keep up with product
  updates (new features ship every 2 weeks) and
  competitive intelligence. The current approach —
  quarterly all-hands training sessions — isn't
  working. Reps forget 70% of training within a
  week.

  Microlearning program parameters:
  - Delivery: Mobile app (existing company learning
    app — supports video, text, quizzes, flashcards,
    and scenario simulations)
  - Frequency: Daily lessons, 5-7 minutes each
  - Duration: Ongoing (design the first 8-week
    launch program)
  - Audience: 80 sales reps (mix of SDRs, AEs,
    and SEs)
  - Content areas: Product features, competitive
    positioning, objection handling, industry
    knowledge, customer success stories

  Design requirements:
  - Each daily lesson focuses on one concept
  - Lessons use spaced repetition (key concepts
    resurface in later lessons)
  - Content adapts by role (SDR vs AE vs SE)
  - Include gamification (points, streaks,
    leaderboards)
  - Weekly "challenge" scenarios that simulate
    customer conversations
  - Manager dashboard showing team knowledge gaps
  - Content update workflow for new product releases

  Success metrics:
  - Daily engagement rate: target 80%+
  - Product knowledge assessment scores: target
    85%+ average
  - Win rate improvement: target 5% increase in
    6 months
  - Time-to-competency for new hires: reduce from
    8 weeks to 4 weeks

  Task: Design the complete 8-week microlearning
  program — including the content architecture,
  daily lesson plan for at least 2 representative
  weeks, the spaced repetition model, gamification
  mechanics, role-based content paths, and the
  content update workflow for ongoing maintenance.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured 8-week microlearning program — includes a clear content architecture organizing topics across the 8 weeks; daily lessons for at least 2 representative weeks are detailed; each lesson is 5-7 minutes with a single concept focus; the content progresses logically within and across weeks; the design accounts for the different roles (SDR, AE, SE) with appropriate content paths; the overall structure supports the 'daily habit' model of learning."
    weight: 0.35
    description: "MicrolearningDesign"
  - type: llm_judge
    criteria: "Response includes effective engagement and retention mechanisms — spaced repetition model is clearly defined (how and when concepts resurface); gamification mechanics are motivating but not distracting (points, streaks, leaderboards); weekly challenge scenarios simulate realistic customer conversations; the engagement strategies would plausibly achieve 80%+ daily engagement; the manager dashboard identifies actionable knowledge gaps; the design addresses the 'forget 70% in a week' problem."
    weight: 0.35
    description: "EngagementAndRetention"
  - type: llm_judge
    criteria: "Response addresses ongoing content maintenance — the content update workflow handles bi-weekly product releases efficiently; the process for adding new competitive intelligence is defined; the program is designed for long-term sustainability, not just the 8-week launch; the overall design would realistically improve win rates and reduce time-to-competency; the program justifies its investment over the current quarterly training approach."
    weight: 0.30
    description: "ContentMaintenance"
