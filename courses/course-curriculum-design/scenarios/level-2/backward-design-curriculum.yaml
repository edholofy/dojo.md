meta:
  id: backward-design-curriculum
  level: 2
  course: course-curriculum-design
  type: output
  description: "Apply backward design (Understanding by Design) to redesign a high school history course, starting from desired understandings and working back to daily lessons"
  tags: [backward-design, ubd, high-school, intermediate]

state: {}

trigger: |
  You're a high school history teacher who has
  attended a workshop on Understanding by Design
  (UbD) by Wiggins and McTighe. You've decided to
  redesign your "U.S. History: 1865-Present" course
  using the backward design framework. The principal
  has asked you to demonstrate the approach by
  fully designing one 4-week unit.

  Unit: The Civil Rights Movement (1954-1968)

  Course context:
  - Grade: 11th grade (ages 16-17)
  - Duration: 4 weeks (20 class periods, 55 minutes
    each)
  - Class: 30 students, diverse backgrounds; some
    students have strong opinions about race and
    equity that need to be handled sensitively
  - State standards: Aligned to state social studies
    standards (analyze causes and effects of the
    Civil Rights Movement, evaluate the role of
    individuals and organizations, connect
    historical events to contemporary issues)

  UbD Stage 1 — Desired Results:
  You need to identify:
  - Enduring understandings (big ideas that transfer
    beyond this unit)
  - Essential questions (open-ended questions that
    drive inquiry)
  - Knowledge and skills students will acquire

  UbD Stage 2 — Assessment Evidence:
  You need to design:
  - A performance task (authentic assessment)
  - Other evidence (quizzes, discussions, etc.)
  - Self-assessment and reflection

  UbD Stage 3 — Learning Plan:
  You need to create:
  - The sequence of learning activities (WHERE TO —
    Where, Hook, Explore, Rethink, Exhibit, Tailor,
    Organize)
  - Daily lesson outlines for 20 class periods

  Task: Design the complete unit using all three
  stages of UbD — including enduring understandings,
  essential questions, the performance task with
  rubric, and the 20-day learning plan. Show how
  each stage connects to the others.

assertions:
  - type: llm_judge
    criteria: "Response correctly applies the UbD backward design framework — Stage 1 includes genuine enduring understandings (transferable big ideas, not just facts), essential questions (open-ended, thought-provoking), and specific knowledge/skills; Stage 2 designs assessment evidence before instruction (performance task first, then supporting evidence); Stage 3 creates a learning plan that serves Stages 1 and 2; the three stages are explicitly connected and aligned; the response demonstrates understanding of UbD, not just paying lip service to the framework."
    weight: 0.35
    description: "UbDApplication"
  - type: llm_judge
    criteria: "Response designs a meaningful performance task and assessment plan — the performance task is authentic (not just an essay or test — something that requires students to demonstrate understanding in a real-world context); the rubric assesses enduring understandings, not just recall; supporting assessments (quizzes, discussions) align with Stage 1 goals; self-assessment is included; the assessment plan would genuinely reveal whether students have achieved the desired understandings."
    weight: 0.35
    description: "AssessmentDesign"
  - type: llm_judge
    criteria: "Response creates a coherent 20-day learning plan — daily lessons follow a logical sequence; activities address the WHERE TO elements; the plan builds toward the performance task; sensitive topics (race, equity, contemporary connections) are handled thoughtfully; the plan includes varied instructional strategies (primary sources, discussion, multimedia, group work); the pacing is realistic for 55-minute periods with 30 students; the unit would be engaging for 11th graders."
    weight: 0.30
    description: "LearningPlan"
