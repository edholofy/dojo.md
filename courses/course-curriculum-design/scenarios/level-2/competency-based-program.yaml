meta:
  id: competency-based-program
  level: 2
  course: course-curriculum-design
  type: output
  description: "Design a competency-based education program for a healthcare certification, replacing seat-time requirements with demonstrated mastery of defined competencies"
  tags: [competency-based, healthcare, certification, intermediate]

state: {}

trigger: |
  You're the program director for a community
  college's Medical Coding and Billing certificate
  program. The college has received a grant to
  redesign the program from traditional seat-time
  courses to a competency-based education (CBE)
  model. Students should be able to progress at
  their own pace and demonstrate mastery to earn
  the certificate.

  Current program:
  - 4 courses over 2 semesters (32 weeks total)
  - MED 201: Medical Terminology (8 weeks)
  - MED 202: Anatomy for Coders (8 weeks)
  - MED 210: ICD-10-CM Coding (8 weeks)
  - MED 220: CPT/HCPCS Coding & Billing (8 weeks)
  - Total: 24 credit hours
  - Current completion rate: 58% (many drop out
    mid-program)
  - Students: Working adults, many single parents,
    ages 22-50

  CBE redesign requirements:
  - Define competencies for each course area
  - Design mastery-based assessments (not tests —
    demonstrations of real-world coding ability)
  - Allow students to test out of areas they already
    know (prior learning assessment)
  - Create a flexible pacing model (students move
    at their own speed)
  - Define "mastery" clearly (what does 'competent'
    look like?)
  - Maintain alignment with AAPC certification exam
    requirements
  - Design mentoring/support structure for self-paced
    learners

  Task: Design the complete CBE program — including
  competency definitions for each area, mastery
  assessments, prior learning assessment process,
  the flexible pacing model, support structure,
  and a comparison showing how the new CBE model
  maps to the old seat-time courses.

assertions:
  - type: llm_judge
    criteria: "Response designs a well-structured CBE program — defines clear, measurable competencies for each of the 4 course areas; competencies are specific enough to assess (not vague like 'understands medical terminology'); the total set of competencies covers the same ground as the original 24-credit program; competencies align with AAPC certification requirements; the program has a clear structure even without fixed schedules; the comparison to the old model is transparent."
    weight: 0.35
    description: "CompetencyDesign"
  - type: llm_judge
    criteria: "Response creates meaningful mastery assessments — assessments are performance-based (actual coding tasks, not just multiple-choice); mastery criteria are explicit (what score/performance level = mastery); the prior learning assessment process is fair and rigorous; assessments reflect real-world medical coding work; students who pass these assessments would be prepared for the AAPC exam; the assessment design would be more authentic than traditional exams."
    weight: 0.35
    description: "MasteryAssessments"
  - type: llm_judge
    criteria: "Response addresses the practical challenges of CBE — the flexible pacing model is realistic (not just 'go at your own pace' — includes checkpoints, expected timelines, maximum time limits); the support structure addresses the needs of working adults and single parents; the design would likely improve the 58% completion rate; the program is financially viable for the college; the transition plan from old to new model is considered."
    weight: 0.30
    description: "PracticalCBE"
