meta:
  id: spiral-curriculum-design
  level: 2
  course: course-curriculum-design
  type: output
  description: "Design a spiral mathematics curriculum for elementary school that revisits core concepts with increasing complexity across grades K-5"
  tags: [spiral-curriculum, mathematics, elementary, intermediate]

state: {}

trigger: |
  You're the mathematics curriculum specialist for
  a school district. The district is adopting a
  spiral curriculum approach for elementary math
  (grades K-5) to replace the current "teach it
  once and move on" model. Teachers report that
  students frequently forget concepts from previous
  grades and need extensive review each fall.

  Spiral curriculum parameters:
  - Grades: K-5 (6 years)
  - Focus concept: Fractions (chosen as pilot for
    the spiral approach before expanding to all
    math topics)
  - Current problem: Fractions are taught intensively
    in grade 3, briefly reviewed in grade 4, then
    assumed mastery in grade 5. Many students never
    achieve true understanding.
  - Goal: Design a spiral approach where fraction
    concepts are introduced early and revisited with
    increasing complexity each year

  Spiral progression to design:
  - Kindergarten: Fair sharing, equal parts (concrete
    manipulatives only)
  - Grade 1: Halves and fourths, fraction vocabulary,
    real-world contexts
  - Grade 2: Unit fractions, number line introduction,
    comparing simple fractions
  - Grade 3: Fraction operations (add/subtract with
    like denominators), equivalent fractions
  - Grade 4: Unlike denominators, mixed numbers,
    fraction-decimal connection
  - Grade 5: Fraction operations (multiply/divide),
    fractions in ratio/proportion contexts

  Requirements:
  - Show how each grade level builds on the
    previous one
  - Identify the specific skills spiraled at each
    grade
  - Design 2-3 representative activities per grade
    level
  - Include a visual spiral map showing concept
    progression
  - Align to Common Core State Standards for Math
  - Provide teacher guidance for connecting
    current-year work to prior learning

  Task: Design the complete spiral curriculum for
  fractions K-5 — including the grade-by-grade
  progression, representative activities, the
  spiral concept map, standards alignment, and
  teacher implementation guidance.

assertions:
  - type: llm_judge
    criteria: "Response designs a coherent spiral curriculum — shows clear progression from concrete (K-1) to representational (2-3) to abstract (4-5); each grade level explicitly builds on prior year's learning; the spiral revisits concepts with genuine increasing complexity (not just repetition); the K-5 progression tells a coherent story of fraction understanding; the pacing at each grade level is developmentally appropriate."
    weight: 0.35
    description: "SpiralDesign"
  - type: llm_judge
    criteria: "Response includes meaningful activities and standards alignment — 2-3 activities per grade level are age-appropriate and engaging; activities progress from manipulatives (K-1) to visual models (2-3) to symbolic operations (4-5); standards alignment is specific (cites CCSS.Math.Content standards); the activities would develop genuine conceptual understanding, not just procedural fluency; the spiral concept map provides a clear visual of the K-5 progression."
    weight: 0.35
    description: "ActivitiesAndAlignment"
  - type: llm_judge
    criteria: "Response provides practical teacher guidance — explains how teachers should connect current-year work to prior learning; addresses the transition from the old 'teach it once' model to the spiral approach; provides guidance for handling students who transfer in from non-spiral schools; the implementation guide would help teachers who are unfamiliar with spiral curriculum design; the overall design would solve the district's problem of students forgetting fraction concepts."
    weight: 0.30
    description: "TeacherGuidance"
