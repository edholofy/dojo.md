meta:
  id: professional-certification-prep
  level: 2
  course: course-curriculum-design
  type: output
  description: "Design a certification preparation curriculum for the PMP exam, balancing content coverage, practice testing, and study strategies for working professionals"
  tags: [certification-prep, pmp, professional-development, intermediate]

state: {}

trigger: |
  You're a training consultant hired by a project
  management consulting firm to design a PMP
  (Project Management Professional) exam
  preparation course. The firm wants to offer this
  as a premium product to its clients' employees.

  Course parameters:
  - Exam: PMP (PMI's Project Management Professional)
  - Format: Blended — 5 live virtual sessions
    (Saturdays, 4 hours each) + self-paced online
    content between sessions
  - Duration: 10 weeks total
  - Participants: 15-20 working project managers
    with 3-5 years experience
  - Prerequisite: Participants meet PMP eligibility
    requirements (education + experience hours)
  - Goal: 90%+ first-attempt pass rate (industry
    average is ~60%)
  - The course must provide the 35 contact hours
    required by PMI for PMP eligibility

  PMP exam domains (per PMI's Examination Content
  Outline):
  - People (42%): Managing conflict, leading a team,
    supporting team performance, empowering team
    members, ensuring adequate training
  - Process (50%): Executing project work, managing
    communications, engaging stakeholders, planning
    and managing scope/schedule/cost/quality/resources
  - Business Environment (8%): Planning and managing
    compliance, evaluating delivery for value,
    supporting organizational change

  Design challenges:
  - Participants are working full-time and can only
    dedicate 6-8 hours/week to study
  - The PMP exam is now situational (scenario-based
    questions, not rote memorization)
  - Need to balance content coverage with test-
    taking strategies
  - Participants have real-world experience but may
    not align with PMI's framework language
  - Include practice exams with analytics to
    identify weak areas

  Task: Design the complete PMP prep curriculum —
  including the 10-week study plan, each Saturday
  session agenda, self-paced content structure,
  practice exam strategy, the 35 contact hour
  breakdown, and study strategies for working
  professionals.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured 10-week PMP prep curriculum — includes a clear week-by-week study plan; each of the 5 Saturday sessions has a detailed 4-hour agenda; self-paced content between sessions is well-defined; the curriculum covers all three PMP domains (People 42%, Process 50%, Business Environment 8%) with appropriate emphasis; the 35 contact hours are tracked and documented; the pacing is realistic for working professionals studying 6-8 hours/week."
    weight: 0.35
    description: "CurriculumStructure"
  - type: llm_judge
    criteria: "Response addresses the scenario-based exam format — practice questions reflect the situational format of the current PMP exam; the curriculum bridges participants' real-world experience with PMI's framework language; test-taking strategies for scenario-based questions are included; practice exams include analytics to identify weak areas; the approach would realistically support a 90%+ first-attempt pass rate; the curriculum goes beyond memorization to develop exam thinking skills."
    weight: 0.35
    description: "ExamPreparation"
  - type: llm_judge
    criteria: "Response provides practical study strategies for working professionals — study schedules respect the 6-8 hours/week constraint; self-paced content is chunked appropriately for busy schedules; the curriculum includes spaced repetition and active recall strategies; the blended format effectively uses live sessions for high-value activities (not content delivery); the overall design would be a compelling premium product that justifies its price; the course would differentiate from free PMP study resources."
    weight: 0.30
    description: "StudyStrategies"
