meta:
  id: corporate-leadership-program
  level: 2
  course: course-curriculum-design
  type: output
  description: "Design a 6-month corporate leadership development program for mid-level managers, combining workshops, coaching, action learning, and 360-degree assessments"
  tags: [corporate-training, leadership, management, intermediate]

state: {}

trigger: |
  You're the Director of Learning & Development
  at a Fortune 500 manufacturing company. The CHRO
  has asked you to design a leadership development
  program for mid-level managers who have been
  identified as high-potential talent. The company
  is experiencing high turnover among managers
  (28%) and wants to invest in developing its
  pipeline.

  Program parameters:
  - Name: "Emerging Leaders Accelerator"
  - Duration: 6 months
  - Cohort: 24 managers (from different divisions)
  - Participants: Individual contributors who have
    been promoted to manager in the last 2 years;
    strong technical skills but limited leadership
    training
  - Budget: $180,000 total (includes external
    facilitators, materials, venue, but not
    participant time)
  - Format: Monthly 2-day workshops + ongoing
    activities between workshops

  Competency areas to develop:
  - Self-awareness and emotional intelligence
  - Coaching and developing direct reports
  - Strategic thinking and business acumen
  - Communication and influence
  - Leading through change
  - Building high-performing teams

  Program elements:
  - 360-degree assessment (pre and post)
  - Monthly 2-day in-person workshops (6 total)
  - Executive coaching (monthly sessions)
  - Action learning projects (real business
    challenges)
  - Peer learning groups (groups of 4)
  - Executive sponsor interactions

  Success metrics:
  - Manager retention rate improvement (from 72%
    to target 88%)
  - Direct report engagement scores
  - Participant promotion rate within 18 months
  - Business impact from action learning projects

  Task: Design the complete 6-month program —
  including the program arc, each monthly workshop
  agenda, the 360-degree assessment framework, the
  action learning project structure, the coaching
  model, and the program evaluation plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive 6-month leadership program — includes a clear program arc that builds from self-awareness to strategic leadership; each of the 6 monthly workshops has a theme, agenda, and learning objectives; the program integrates multiple learning modalities (workshops, coaching, action learning, peer groups); the 24-participant cohort is managed effectively (not just large-group lectures); the monthly cadence allows for application between workshops; the overall design reflects adult learning principles."
    weight: 0.35
    description: "ProgramDesign"
  - type: llm_judge
    criteria: "Response includes well-designed program components — the 360-degree assessment measures relevant leadership competencies; the action learning projects are tied to real business challenges (not hypothetical); the coaching model defines frequency, focus, and coach qualifications; peer learning groups have structure (not just 'meet and talk'); executive sponsor interactions are purposeful; each component reinforces the others; the overall design would develop genuine leadership capability, not just knowledge."
    weight: 0.35
    description: "ProgramComponents"
  - type: llm_judge
    criteria: "Response addresses measurement and ROI — the evaluation plan connects to the success metrics (retention, engagement, promotion, business impact); the 360-degree pre/post comparison provides measurable growth data; action learning project outcomes are quantifiable; the $180,000 budget is allocated reasonably across program elements; the overall program would justify its cost to the CHRO; the design addresses the root causes of 28% manager turnover."
    weight: 0.30
    description: "MeasurementAndROI"
