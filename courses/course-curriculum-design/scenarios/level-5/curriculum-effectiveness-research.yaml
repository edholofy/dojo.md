meta:
  id: curriculum-effectiveness-research
  level: 5
  course: course-curriculum-design
  type: output
  description: "Design and publish a landmark research study on curriculum design effectiveness, creating a new measurement methodology and analyzing data from hundreds of institutions"
  tags: [research, measurement, effectiveness, master]

state: {}

trigger: |
  You're a tenured professor of Educational Policy
  at a top-10 school of education. You've spent
  5 years building a dataset of curriculum design
  practices and student outcomes from 450
  institutions (200 community colleges, 150
  universities, 100 K-12 districts) across 38
  states. Your dataset includes curriculum
  structure data, assessment practices, faculty
  characteristics, student demographics, and
  outcome measures (graduation rates, employment,
  learning outcomes).

  Research questions:
  1. Does curriculum design methodology (ADDIE vs
     backward design vs agile/SAM vs hybrid)
     predict student learning outcomes, controlling
     for institutional type and student demographics?
  2. What specific curriculum design features
     (integration, sequencing, assessment frequency,
     active learning percentage, technology
     integration) most strongly predict student
     success?
  3. Is there a "curriculum design quality index"
     that can reliably predict program effectiveness?
  4. How does curriculum design interact with
     faculty characteristics (adjunct percentage,
     years of experience, pedagogical training) to
     affect outcomes?

  Dataset characteristics:
  - 450 institutions, 2,800 academic programs
  - 1.2 million student records (anonymized)
  - 15,000 course syllabi analyzed via NLP
  - 3,200 faculty survey responses
  - Outcome data: 6-year graduation rates, course
    pass rates, licensure exam pass rates,
    employment rates, alumni satisfaction
  - Longitudinal: 8 years of data (2016-2024)

  Key finding (preliminary):
  - Programs using backward design + authentic
    assessment + 60%+ active learning achieve 23%
    higher graduation rates than programs using
    traditional lecture + exam models, even after
    controlling for selectivity, funding, and
    demographics (p < 0.001)
  - Your "Curriculum Design Quality Index" (CDQI)
    — a composite measure you've developed — has
    a correlation of r = 0.68 with graduation
    rates and r = 0.54 with employment outcomes

  Task: Write the complete research article for
  publication in the American Educational Research
  Journal — including the literature review,
  theoretical framework, methodology, results,
  discussion, limitations, implications for
  practice, and your proposed "Curriculum Design
  Quality Index" as a new measurement tool for
  the field.

assertions:
  - type: llm_judge
    criteria: "Response writes a rigorous research article — the literature review situates the study within existing curriculum design research; the theoretical framework is clearly articulated; the methodology is appropriate for the research questions (quantitative with appropriate controls); the results are presented with appropriate statistical rigor; the discussion interprets findings without overclaiming; limitations are honest; the article follows AERJ conventions; the overall contribution would be publishable in a top-tier journal."
    weight: 0.35
    description: "ResearchRigor"
  - type: llm_judge
    criteria: "Response introduces a credible Curriculum Design Quality Index — the CDQI is clearly defined with specific components and scoring methodology; the construct validity argument is articulated; the predictive validity (r = 0.68 with graduation, r = 0.54 with employment) is contextualized; the index is practical enough for institutions to use; the CDQI represents a genuine measurement contribution to the field; the development process (450 institutions, 1.2M students) gives it credibility."
    weight: 0.35
    description: "CDQIContribution"
  - type: llm_judge
    criteria: "Response provides meaningful implications for practice — the implications translate statistical findings into actionable guidance for curriculum designers and administrators; the 23% graduation rate improvement finding is contextualized appropriately; the research addresses the 'so what?' question for practitioners; policy implications for accreditation bodies and funding agencies are included; the article would influence how institutions approach curriculum design; the findings would be cited in future curriculum design scholarship."
    weight: 0.30
    description: "PracticalImplications"
