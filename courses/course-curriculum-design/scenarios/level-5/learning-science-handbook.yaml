meta:
  id: learning-science-handbook
  level: 5
  course: course-curriculum-design
  type: output
  description: "Write a chapter for the authoritative handbook on learning science applied to curriculum design, synthesizing cognitive science, neuroscience, and educational research"
  tags: [learning-science, handbook, cognitive-science, master]

state: {}

trigger: |
  You're a cognitive scientist at MIT who studies
  how people learn. Oxford University Press has
  commissioned you to write the chapter on
  "Cognitive Science Foundations of Curriculum
  Design" for The Oxford Handbook of Educational
  Design. This will be the authoritative reference
  chapter connecting learning science research to
  curriculum design practice.

  Chapter parameters:
  - Target: The definitive reference chapter on
    learning science for curriculum design
  - Audience: Education researchers, instructional
    designers, curriculum developers, graduate
    students
  - Length: 12,000-15,000 words (comprehensive
    but focused)
  - Style: Academic but accessible; this chapter
    will be assigned in graduate courses

  Content areas:
  1. Memory and Learning (working memory limitations,
     encoding strategies, retrieval practice,
     spacing effect, interleaving)
  2. Cognitive Load Theory (intrinsic, extraneous,
     germane load; implications for content
     sequencing and multimedia design)
  3. Schema Theory (how expertise develops, novice
     vs expert knowledge structures, implications
     for scaffolding)
  4. Transfer of Learning (near vs far transfer,
     conditions that promote transfer, why transfer
     is so difficult)
  5. Motivation and Self-Regulation (self-
     determination theory, growth mindset,
     metacognition, productive failure)
  6. Social Learning (collaborative learning,
     community of practice, social presence in
     online learning)
  7. Neuroscience Insights (neuroplasticity, emotion
     and learning, sleep and consolidation, stress
     and cognition)
  8. Synthesis: A Cognitive Science Framework for
     Curriculum Design (your original contribution
     — translating all of the above into actionable
     design principles)

  Key requirement:
  - Each section must translate research findings
    into specific, actionable curriculum design
    principles
  - Include a summary table: "Research Finding →
    Design Principle → Practical Application"
  - Address common myths about learning that
    curriculum designers should avoid

  Task: Write the complete handbook chapter —
  including all 8 content sections, the translation
  of research to design principles, the summary
  table, the learning myths section, and your
  original cognitive science framework for
  curriculum design.

assertions:
  - type: llm_judge
    criteria: "Response writes a comprehensive handbook chapter — all 8 content areas are covered with appropriate depth; the research citations are specific and credible; each section translates findings into actionable design principles; the summary table (Research Finding, Design Principle, Practical Application) is well-constructed; common learning myths are identified and debunked; the chapter demonstrates mastery of cognitive science and its application to education; the writing quality is appropriate for an Oxford Handbook."
    weight: 0.35
    description: "ChapterQuality"
  - type: llm_judge
    criteria: "Response demonstrates genuine learning science expertise — memory and cognitive load sections reflect current research; schema theory and transfer discussions go beyond surface level; motivation and self-regulation are connected to curriculum design choices; neuroscience insights are presented responsibly (not overhyped); the overall synthesis reflects a deep understanding of how people learn; the chapter would be respected by cognitive scientists and educational researchers alike."
    weight: 0.35
    description: "ScientificExpertise"
  - type: llm_judge
    criteria: "Response introduces an original cognitive science framework — the synthesis section (Section 8) offers a coherent framework connecting all research areas to curriculum design practice; the framework is more than a summary — it provides a new way to think about designing for learning; the framework is practical enough for curriculum designers to apply; the overall contribution would advance the field at the intersection of cognitive science and education; the chapter would be widely cited."
    weight: 0.30
    description: "OriginalFramework"
