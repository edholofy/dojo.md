meta:
  id: curriculum-equity-audit
  level: 5
  course: course-curriculum-design
  type: output
  description: "Conduct a comprehensive equity audit of a state's K-12 curriculum, analyzing representation, access, outcomes, and systemic bias across subjects and grade levels"
  tags: [equity-audit, systemic-analysis, k12, master]

state: {}

trigger: |
  You're the Director of Equity and Curriculum at
  a state Department of Education. Following
  legislation requiring an equity review of all
  state curriculum standards, you're leading the
  first-ever comprehensive curriculum equity audit
  for a state of 1.8 million K-12 students across
  420 school districts.

  State demographics:
  - Total K-12 students: 1,800,000
  - Racial/ethnic: 42% White, 28% Hispanic/Latino,
    18% Black, 7% Asian, 3% Multiracial, 2%
    Indigenous
  - 24% English Language Learners
  - 15% Students with disabilities
  - 52% qualify for free/reduced lunch
  - 35% rural, 45% suburban, 20% urban

  Audit scope:
  - All K-12 curriculum standards across 8 subject
    areas (ELA, Math, Science, Social Studies,
    World Languages, Arts, Health/PE, Career &
    Technical Education)
  - State-adopted textbooks and instructional
    materials
  - Assessment instruments (state standardized
    tests)
  - Outcome data disaggregated by race, income,
    disability, language, geography
  - Access data (AP/honors enrollment, CTE access,
    gifted identification, discipline patterns)

  Key disparities identified in preliminary data:
  - AP enrollment: White students 3.2x more likely
    to enroll than Black students
  - Gifted identification: Asian students identified
    at 4x the rate of Hispanic students
  - Discipline: Black students suspended at 3.8x
    the rate of White students (impacting
    instructional time)
  - ELL students: Average 2.1 grade levels behind
    in reading by Grade 4
  - Rural districts: 40% fewer AP/honors course
    offerings
  - Special education: 68% of IEP students never
    access general education curriculum
  - Social studies curriculum: 89% of historical
    figures studied are White males

  Audit deliverables:
  - Methodology documentation (how the audit was
    conducted)
  - Representation analysis of curriculum content
    and materials
  - Access analysis of course offerings and
    enrollment patterns
  - Outcomes analysis disaggregated by demographics
  - Systemic bias analysis of assessment instruments
  - Recommendations for curriculum standards revision
  - Implementation recommendations for districts
  - Community engagement findings

  Task: Write the complete curriculum equity audit
  report — including the methodology, analysis
  across all dimensions (representation, access,
  outcomes, systemic bias), findings, prioritized
  recommendations, and the implementation strategy
  for addressing identified inequities across 420
  districts.

assertions:
  - type: llm_judge
    criteria: "Response writes a comprehensive equity audit report — the methodology is rigorous and defensible; the analysis covers representation, access, outcomes, and systemic bias across subjects; findings are specific and evidence-based (not vague generalizations); the disparities are quantified and contextualized; the report addresses all 8 subject areas; community engagement findings are included; the overall report would withstand scrutiny from advocates, critics, and policymakers."
    weight: 0.35
    description: "AuditComprehensiveness"
  - type: llm_judge
    criteria: "Response provides nuanced analysis of systemic curriculum inequity — the representation analysis goes beyond counting (examines whose perspectives are centered, whose stories are told); the access analysis connects course offerings to opportunity gaps; the assessment bias analysis examines how tests may disadvantage specific populations; the analysis recognizes intersectionality (race + income + geography + language + disability); the report avoids both defensiveness and oversimplification; the analysis would be respected by equity scholars."
    weight: 0.35
    description: "EquityAnalysis"
  - type: llm_judge
    criteria: "Response includes actionable, prioritized recommendations — recommendations are specific enough for implementation; the implementation strategy addresses 420 diverse districts (one-size-fits-all won't work); recommendations are prioritized by impact and feasibility; the strategy includes accountability measures; the report balances urgency with realistic timelines; the overall recommendations would move the state toward more equitable curriculum and outcomes; the political sensitivity of equity work is handled with care."
    weight: 0.30
    description: "ActionableRecommendations"
