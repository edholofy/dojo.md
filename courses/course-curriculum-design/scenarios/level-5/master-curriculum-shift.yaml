meta:
  id: master-curriculum-shift
  level: 5
  course: course-curriculum-design
  type: output
  description: "Serve as the incoming Provost of a university in crisis, simultaneously managing curriculum restructuring, accreditation probation response, enrollment recovery, faculty workforce planning, and a controversial program elimination — the ultimate curriculum leadership challenge"
  tags: [provost, institutional-crisis, multi-challenge, shift-simulation, master]

state: {}

trigger: |
  You're the newly appointed Provost of "Pacific
  Northwest University" (PNU) — a comprehensive
  university with 9,500 students that is facing
  an existential crisis. Your predecessor resigned
  under pressure after the institution received
  simultaneous negative findings from its regional
  accreditor and two programmatic accreditors. The
  President has given you 18 months to stabilize
  the academic enterprise. You must manage 5
  simultaneous curriculum and academic challenges.

  University profile:
  - Students: 9,500 (down from 13,200 five years ago)
  - Faculty: 380 full-time, 220 adjunct
  - Colleges: Liberal Arts, Business, Education,
    Health Sciences, Engineering & Technology
  - Endowment: $45M (modest)
  - Operating budget: $142M (running $8M deficit)
  - Morale: Low (3 Provosts in 4 years)

  Challenge 1 — Accreditation Crisis:
  NWCCU (Northwest Commission on Colleges and
  Universities) has placed PNU on "warning" for
  deficiencies in: (a) assessment of student
  learning outcomes across all programs, (b)
  general education program coherence, and (c)
  evidence of continuous improvement. You have
  12 months to submit a comprehensive report
  demonstrating substantial progress.
  Additionally, ABET has placed 3 of 4 engineering
  programs on "show cause" and CAEP has placed
  the teacher education program on "conditional."

  Challenge 2 — Enrollment Cliff Response:
  Enrollment has declined 28% in 5 years. The
  Enrollment Management VP projects another 8%
  decline next year without intervention. The
  university needs new programs to attract students
  but has no budget for new faculty. You need a
  curriculum strategy that drives enrollment
  recovery: new programs, program restructuring,
  online expansion, and micro-credentials.

  Challenge 3 — Program Discontinuation:
  The Board of Trustees has mandated the elimination
  of 8-10 programs with fewer than 15 graduates
  per year to reduce the $8M deficit. The programs
  on the list include Philosophy, French, Music
  Performance, Art History, Anthropology, Religious
  Studies, Physics (yes, physics), and Theater
  Arts. Faculty in these programs are tenured.
  The faculty union has threatened legal action.
  Students in these programs are organizing
  protests. The media has picked up the story.

  Challenge 4 — General Education Overhaul:
  The general education program is a fragmented
  distribution model that students call "random
  requirements." It accounts for 35% of all credit
  hours taught but has no coherent learning
  outcomes. The NWCCU specifically cited gen ed
  as a deficiency. You need a complete redesign
  that is coherent, assessable, and attractive to
  students — and you need faculty buy-in from a
  demoralized faculty.

  Challenge 5 — Faculty Workforce Restructuring:
  With enrollment down 28% and programs being
  eliminated, the university has more faculty than
  it needs in some areas and not enough in others.
  The university needs to shift resources from
  declining humanities and social science programs
  to growing health sciences and technology
  programs. But 85% of full-time faculty are
  tenured, the union contract restricts layoffs,
  and faculty expertise doesn't transfer easily
  from French literature to data science.

  Task: Create the comprehensive Provost's Action
  Plan addressing all 5 challenges — including:
  1. The accreditation response strategy (NWCCU,
     ABET, CAEP)
  2. The enrollment recovery curriculum strategy
  3. The program discontinuation plan with
     stakeholder management
  4. The general education redesign framework
  5. The faculty workforce restructuring plan
  All five plans must be internally consistent
  (they can't contradict each other) and must be
  achievable within the 18-month timeline with
  the university's constrained resources.

assertions:
  - type: llm_judge
    criteria: "Response creates 5 comprehensive, internally consistent plans — the accreditation response addresses NWCCU, ABET, and CAEP deficiencies; the enrollment strategy identifies viable new programs and delivery modes; the program discontinuation plan handles the 8-10 programs with specific process and criteria; the gen ed redesign is coherent and assessable; the faculty restructuring plan is legally and ethically sound; crucially, the 5 plans are consistent with each other (enrollment strategy leverages restructured faculty, gen ed redesign supports accreditation response, etc.)."
    weight: 0.35
    description: "ComprehensiveConsistency"
  - type: llm_judge
    criteria: "Response navigates the political and human dimensions with sophistication — the program discontinuation plan handles tenured faculty, union threats, student protests, and media attention with empathy and strategy; the gen ed redesign approach builds buy-in from demoralized faculty; the faculty workforce restructuring respects tenure while enabling necessary changes; the communication strategy addresses all stakeholders (faculty, students, board, media, community); the overall approach demonstrates that academic leadership is ultimately about people, not just programs."
    weight: 0.35
    description: "LeadershipSophistication"
  - type: llm_judge
    criteria: "Response produces an achievable plan within severe constraints — the 18-month timeline has realistic milestones; the plans work within the $142M budget with $8M deficit; the faculty restructuring acknowledges the 85% tenure rate and union contract; new programs don't require new faculty lines (leverage existing resources); the accreditation response would satisfy NWCCU evaluators; the overall Provost's Action Plan would stabilize PNU and set it on a sustainable trajectory — this is the ultimate curriculum leadership challenge."
    weight: 0.30
    description: "FeasibilityUnderConstraint"
