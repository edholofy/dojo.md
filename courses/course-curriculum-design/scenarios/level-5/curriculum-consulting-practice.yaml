meta:
  id: curriculum-consulting-practice
  level: 5
  course: course-curriculum-design
  type: output
  description: "Launch a curriculum design consulting practice, developing the service model, methodology, engagement framework, and thought leadership strategy"
  tags: [consulting, practice-launch, methodology, master]

state: {}

trigger: |
  You're a former Chief Academic Officer at a
  major university system who is launching an
  independent curriculum design consulting
  practice called "CurriculumForge." After 25
  years in higher education, you've developed a
  proprietary methodology for curriculum
  transformation that you believe can help
  institutions nationwide.

  Your background:
  - Led curriculum reforms at 3 universities
  - Managed $50M+ in academic budgets
  - Published 40+ articles on instructional design
  - Served on 12 accreditation review teams
  - Keynote speaker at 50+ conferences
  - Network of 2,000+ academic leaders

  Practice vision:
  - Service lines:
    1. Curriculum Audit and Assessment (2-week
       diagnostic engagement)
    2. Program Design and Redesign (6-12 month
       engagement)
    3. Accreditation Preparation (12-18 month
       engagement)
    4. Faculty Development Programs (ongoing)
    5. Institutional Effectiveness Strategy
       (system-level)

  - Target clients: Universities, community
    colleges, state systems, corporate universities,
    and international institutions
  - Year 1 revenue target: $800K
  - Year 3 revenue target: $2.5M
  - Team: Initially solo + 2 associates; build to
    8 consultants by Year 3

  Deliverables to create:
  - Proprietary methodology documentation
    ("CurriculumForge Method")
  - Service line descriptions with engagement
    frameworks
  - Client diagnostic questionnaire
  - Sample engagement proposal for a prospective
    client
  - Pricing model
  - Thought leadership content strategy (blog,
    podcast, white papers)
  - Business development plan

  Task: Create the complete consulting practice
  launch package — including the proprietary
  methodology, all 5 service line descriptions,
  the client diagnostic, a sample proposal, the
  pricing model, the thought leadership strategy,
  and the business development plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive consulting practice launch — the proprietary methodology ('CurriculumForge Method') is clearly articulated with distinct phases, tools, and deliverables; all 5 service lines have detailed descriptions with engagement frameworks; the client diagnostic questionnaire identifies real institutional needs; the sample proposal is persuasive and professional; the practice addresses a genuine market need; the overall package demonstrates readiness to launch a credible consulting practice."
    weight: 0.35
    description: "PracticeLaunch"
  - type: llm_judge
    criteria: "Response demonstrates deep expertise in the consulting methodology — the CurriculumForge Method reflects genuine curriculum design expertise (not generic consulting frameworks with education labels); service line engagement frameworks include specific milestones, deliverables, and success criteria; the diagnostic questionnaire asks sophisticated questions that reflect deep field knowledge; the methodology would produce better outcomes than standard consulting approaches; the intellectual property is defensible and distinctive."
    weight: 0.35
    description: "MethodologyDepth"
  - type: llm_judge
    criteria: "Response includes a viable business model — the pricing model is realistic for higher education budgets; the revenue targets ($800K Year 1, $2.5M Year 3) are achievable with the proposed business development plan; the thought leadership strategy would generate qualified leads; the team scaling plan (solo to 8 consultants) is realistic; the business development approach leverages the 2,000-person network; the overall practice would be financially sustainable and professionally impactful."
    weight: 0.30
    description: "BusinessViability"
