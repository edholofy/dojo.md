meta:
  id: lifelong-learning-system
  level: 5
  course: course-curriculum-design
  type: output
  description: "Design a national lifelong learning system that integrates formal education, workforce training, and informal learning into a coherent curriculum ecosystem with portable credentials"
  tags: [lifelong-learning, national-system, ecosystem-design, master]

state: {}

trigger: |
  You're the Special Advisor to the Secretary of
  Education, tasked with designing a "National
  Lifelong Learning System" (NLLS) — a policy
  framework and implementation plan that creates
  seamless pathways between K-12 education, higher
  education, workforce training, and informal
  learning. The President has made lifelong learning
  a priority following projections that 65% of
  current jobs will be transformed by AI within
  15 years.

  System vision:
  - Every American has a "Learning Passport" — a
    digital record of all formal and informal
    learning credentials
  - Credentials earned anywhere (universities,
    employers, MOOCs, apprenticeships, military)
    are portable and stackable
  - Education and training are seamlessly connected
    to labor market needs
  - Financial support follows the learner, not the
    institution
  - Quality assurance is consistent across all
    learning providers

  Stakeholder landscape:
  - Department of Education (policy, funding)
  - Department of Labor (workforce data, apprenticeships)
  - 4,000+ higher education institutions
  - 50 state education agencies
  - Major employers (Fortune 500, small businesses)
  - EdTech industry
  - Unions and professional associations
  - Accreditation bodies (regional, national,
    programmatic)
  - Student/learner advocacy groups

  Design challenges:
  - Higher education is deeply decentralized (no
    federal curriculum authority)
  - Quality assurance is fragmented (6 regional
    accreditors, dozens of programmatic)
  - Employer credentials have no standard
    recognition framework
  - Informal learning (MOOCs, self-study, open
    source contributions) is invisible
  - Financial aid is tied to traditional enrollment
    patterns
  - Privacy and data security for lifelong learning
    records
  - Political divide: Some see this as government
    overreach, others as essential infrastructure

  Design requirements:
  - Learning Passport specifications (digital
    credential infrastructure)
  - Quality assurance framework across all provider
    types
  - Curriculum standards that connect education to
    labor market competencies
  - Financial model (funding follows the learner)
  - Governance structure (federal, state, private)
  - Technology infrastructure
  - Equity provisions (ensuring the system doesn't
    advantage already-privileged learners)
  - Implementation roadmap (10-year plan)

  Task: Write the comprehensive policy framework
  and implementation plan for the National Lifelong
  Learning System — including the Learning Passport
  design, quality assurance framework, curriculum-
  labor market alignment, financial model,
  governance structure, equity provisions, and the
  10-year implementation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive national lifelong learning system — the Learning Passport is technically specified and practically viable; the quality assurance framework works across higher education, employer training, and informal learning; the curriculum-labor market alignment is dynamic (not a static mapping); the financial model (funding follows the learner) is defined; the governance structure balances federal coordination with state and private autonomy; the overall system is coherent and would genuinely enable lifelong learning at national scale."
    weight: 0.35
    description: "SystemDesign"
  - type: llm_judge
    criteria: "Response navigates the political and institutional complexity — addresses higher education decentralization realistically; handles the accreditation fragmentation; respects institutional autonomy while creating interoperability; the privacy and data security dimensions are substantive; the political sensitivity is handled (government role defined carefully); the stakeholder engagement strategy builds sufficient coalition; the overall framework would be feasible in the American political context."
    weight: 0.35
    description: "PoliticalFeasibility"
  - type: llm_judge
    criteria: "Response includes equity and implementation dimensions — the equity provisions ensure the system doesn't widen existing gaps; the technology infrastructure is accessible; the financial model doesn't disadvantage low-income learners; the 10-year roadmap has realistic phases and milestones; the implementation addresses the 65% job transformation projection; the overall system would advance economic mobility and workforce readiness; the policy framework would be taken seriously at the federal level."
    weight: 0.30
    description: "EquityAndImplementation"
