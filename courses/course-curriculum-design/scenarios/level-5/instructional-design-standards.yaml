meta:
  id: instructional-design-standards
  level: 5
  course: course-curriculum-design
  type: output
  description: "Chair a standards body committee drafting the next generation of instructional design quality standards, balancing innovation with reliability across diverse contexts"
  tags: [standards, quality-assurance, governance, master]

state: {}

trigger: |
  You're the Chair of the Quality Matters (QM)
  Standards Committee, tasked with developing the
  8th Edition of the QM Higher Education Rubric —
  the most widely used quality assurance framework
  for online and blended courses. The current 7th
  Edition was published 4 years ago and is showing
  its age. Over 1,500 institutions subscribe to QM,
  and any changes will affect millions of courses.

  Committee composition:
  - 18 members: 6 faculty from diverse disciplines,
    4 instructional designers, 2 accessibility
    experts, 2 assessment specialists, 2 student
    representatives, 1 edtech industry
    representative, 1 international member
  - Subcommittees for each standard area

  Current QM rubric structure (7th Edition):
  - 8 General Standards, 42 Specific Review
    Standards
  - Standards areas: Course Overview, Learning
    Objectives, Assessment, Instructional Materials,
    Learning Activities, Course Technology,
    Learner Support, Accessibility/Usability

  Revision drivers:
  - AI integration: Courses now use AI tools —
    standards must address responsible AI use
  - Universal Design: Current accessibility
    standards are compliance-focused, not UDL-
    aligned
  - Competency-based education: Current standards
    assume time-based courses — CBE needs
    accommodation
  - Student engagement: Research shows engagement
    design matters more than content quality
  - Data analytics: Learning analytics should
    inform course improvement — not currently
    addressed
  - Cultural responsiveness: Current standards are
    Western-centric
  - Micro-credentials and short courses: Current
    rubric assumes semester-length courses
  - Neuroscience of learning: Cognitive load,
    spaced practice, retrieval practice should
    inform standards

  Process requirements:
  - Stakeholder input from 1,500+ subscribing
    institutions
  - Pilot testing at 50 institutions across 8
    countries
  - Backward compatibility (institutions using 7th
    Edition can transition smoothly)
  - Training materials for 5,000+ peer reviewers
  - Research-based justification for every standard

  Task: Draft the 8th Edition QM rubric framework —
  including the revised standard areas, new and
  modified specific standards, research
  justifications, the AI integration standards, the
  stakeholder input process, the pilot testing
  plan, the peer reviewer training update, and the
  transition guide from 7th to 8th Edition.

assertions:
  - type: llm_judge
    criteria: "Response drafts a comprehensive quality standards revision — the revised framework addresses all identified drivers (AI, UDL, CBE, engagement, analytics, cultural responsiveness, micro-credentials, neuroscience); new and modified standards are specific and assessable; each standard has research-based justification; the standards are flexible enough for diverse course formats while maintaining rigor; the overall framework advances quality assurance in online/blended education; the revision is substantive, not cosmetic."
    weight: 0.35
    description: "StandardsRevision"
  - type: llm_judge
    criteria: "Response manages the governance and stakeholder complexity — the stakeholder input process engages 1,500+ institutions meaningfully; the committee management approach handles 18 diverse voices; the pilot testing at 50 institutions across 8 countries is well-designed; backward compatibility ensures smooth transition; the peer reviewer training update addresses new standards; the process builds consensus and legitimacy; the transition guide helps institutions move from 7th to 8th Edition."
    weight: 0.35
    description: "GovernanceProcess"
  - type: llm_judge
    criteria: "Response demonstrates standards-level intellectual rigor — AI integration standards are thoughtful (not just 'use AI responsibly'); the cultural responsiveness standards address genuine global diversity; the engagement and neuroscience standards are evidence-based; the framework would be recognized as the definitive quality standard by the field; the overall contribution would advance instructional design quality assurance for the next decade; the standards would be adopted by the 1,500+ subscribing institutions."
    weight: 0.30
    description: "IntellectualRigor"
