meta:
  id: international-education-reform
  level: 5
  course: course-curriculum-design
  type: output
  description: "Advise a developing nation's Ministry of Education on comprehensive K-12 curriculum reform, balancing international benchmarking with cultural preservation and resource constraints"
  tags: [international, education-reform, ministry, master]

state: {}

trigger: |
  You're a senior education advisor at the World
  Bank, deployed to the Republic of Novara (a
  fictional developing nation in Southeast Asia,
  population 18 million). The Minister of Education
  has requested World Bank support for a
  comprehensive K-12 curriculum reform. Novara's
  education system has not been reformed in 25
  years, and the country is falling behind its
  regional peers in PISA scores, STEM readiness,
  and workforce preparation.

  Country context:
  - GDP per capita: $4,200 (lower-middle income)
  - Literacy rate: 89% (but functional literacy
    is estimated at 67%)
  - Languages: Novaran (national), English (business/
    academic), 14 indigenous languages
  - School system: 6-3-3 (6 primary, 3 lower
    secondary, 3 upper secondary)
  - Enrollment: 94% primary, 72% lower secondary,
    48% upper secondary
  - Teachers: 145,000 (60% lack formal pedagogical
    training)
  - Schools: 8,200 (40% lack electricity, 25% lack
    internet)
  - Budget: 4.2% of GDP allocated to education

  Current curriculum problems:
  - Rote memorization dominant; critical thinking
    not assessed
  - Curriculum is fact-heavy and outdated (textbooks
    are 15 years old)
  - STEM curriculum is particularly weak (only 12%
    of graduates are STEM-ready)
  - No digital literacy curriculum exists
  - Mother-tongue instruction in early grades is
    not supported despite 14 indigenous languages
  - Assessment is high-stakes, exam-only (national
    exam at end of Grade 9 and Grade 12)
  - Gender disparities in upper secondary
    enrollment (58% male, 42% female)
  - Rural-urban quality gap is extreme

  Reform priorities (from Minister):
  1. Modernize curriculum (21st century skills,
     STEM, digital literacy)
  2. Shift from rote to competency-based learning
  3. Address gender and rural-urban equity
  4. Support mother-tongue instruction in early
     grades
  5. Reform assessment (reduce reliance on high-
     stakes exams)
  6. Teacher professional development at scale
  7. Textbook and materials development
  8. Implementation across 8,200 schools over 5
     years

  Task: Write the comprehensive curriculum reform
  advisory report for the Minister — including the
  situation analysis, the reform framework, the
  new competency-based curriculum structure, the
  assessment reform plan, the teacher development
  strategy, the implementation roadmap (5-year
  phased plan), the equity strategy (gender and
  rural-urban), and the budget projection.

assertions:
  - type: llm_judge
    criteria: "Response writes a comprehensive reform advisory report — the situation analysis is evidence-based and honest; the reform framework is coherent and addresses all 8 priorities; the new competency-based curriculum structure is appropriate for Novara's context (not a Western model copy-pasted); the assessment reform reduces high-stakes exam reliance; the implementation roadmap is phased over 5 years with realistic milestones; the overall report would be credible coming from a World Bank senior advisor."
    weight: 0.35
    description: "ReformReport"
  - type: llm_judge
    criteria: "Response addresses the developing-nation context with nuance — acknowledges resource constraints (40% of schools lack electricity, 60% of teachers lack training); the curriculum doesn't assume technology access everywhere; the mother-tongue instruction plan respects linguistic diversity; the STEM curriculum is appropriate for the economic context; the reform is ambitious but realistic given GDP and budget constraints; the approach avoids educational colonialism (imposing Western models without adaptation)."
    weight: 0.35
    description: "ContextualNuance"
  - type: llm_judge
    criteria: "Response includes equity and sustainability dimensions — the gender strategy addresses the 58/42 enrollment disparity with specific interventions; the rural-urban quality gap has targeted strategies; the teacher development plan is scalable to 145,000 teachers; the textbook/materials development is financially feasible; the budget projection is realistic for 4.2% of GDP; the reform is designed for sustainability beyond World Bank involvement; the overall plan would genuinely improve education outcomes for 18 million people."
    weight: 0.30
    description: "EquityAndSustainability"
