meta:
  id: curriculum-design-thought-leadership
  level: 5
  course: course-curriculum-design
  type: output
  description: "Deliver a keynote address on the future of curriculum design at a national education conference, synthesizing emerging trends, research, and a new framework for the next decade"
  tags: [thought-leadership, keynote, future-of-education, master]

state: {}

trigger: |
  You're a globally recognized curriculum design
  scholar and former university provost. You've
  been invited to deliver the opening keynote at
  the Association for Curriculum Development
  International (ACDI) annual conference. The
  title of your talk: "Beyond the Blueprint: Why
  Everything We Know About Curriculum Design Is
  About to Change."

  Your credentials:
  - 30 years in education (K-12 teacher, professor,
    dean, provost, now independent scholar)
  - Author of "Curriculum Architecture" (standard
    textbook, 6th edition)
  - Led curriculum reforms at 3 institutions
  - Advised the World Bank and UNESCO on education
    systems
  - Known for provocative, evidence-based arguments

  Keynote parameters:
  - Audience: 2,000 educators, administrators,
    policymakers, and edtech leaders from 45
    countries
  - Duration: 45 minutes + 15 minutes Q&A
  - Expectation: Not a survey of trends — a
    compelling argument for a new paradigm

  Keynote themes to address:
  1. The Industrial-Age Curriculum Model Is Dead
     (why courses, credits, and semesters are
     artifacts of a bygone era)
  2. AI as Curriculum Co-Designer (how generative
     AI changes who designs curriculum and how)
  3. The Competency Revolution (from seat time to
     demonstrated mastery at every level of
     education)
  4. Learner Agency as Curriculum Architecture
     (self-directed learning paths as the default,
     not the exception)
  5. Global Curriculum Convergence (as education
     globalizes, are we heading toward universal
     learning outcomes?)
  6. The Assessment Paradox (we need to assess
     learning, but everything we assess can now be
     done by AI)
  7. A New Framework: "Living Curriculum" (your
     proposed paradigm — curriculum that adapts in
     real-time to learners, labor markets, and
     knowledge frontiers)

  Task: Write the complete keynote — including the
  opening hook, the structured argument through
  all 7 themes, your "Living Curriculum" framework
  (original intellectual contribution), supporting
  evidence and examples, and a powerful closing
  call to action. The keynote should be quotable,
  provocative, and grounded in evidence.

assertions:
  - type: llm_judge
    criteria: "Response delivers a compelling keynote speech — the opening hook captures attention immediately; the argument progresses logically through the 7 themes; each theme is supported with evidence, examples, or data; the 'Living Curriculum' framework is a genuine intellectual contribution (not just a repackaging of existing ideas); the closing call to action is powerful and specific; the overall keynote would be memorable and quotable; the 45-minute length is appropriate (not too long, not too short)."
    weight: 0.35
    description: "KeynoteQuality"
  - type: llm_judge
    criteria: "Response demonstrates mastery of curriculum design as a field — the analysis of industrial-age curriculum limitations is nuanced; the AI discussion goes beyond hype to substantive pedagogical implications; the competency revolution argument is historically grounded; the assessment paradox is articulated with genuine insight; the global convergence discussion respects cultural differences; the overall argument reflects 30 years of deep expertise; the keynote would be respected by the 2,000-person expert audience."
    weight: 0.35
    description: "FieldMastery"
  - type: llm_judge
    criteria: "Response introduces an original 'Living Curriculum' framework — the framework is clearly articulated with specific components; it addresses the challenges raised in the keynote themes; it is actionable (not just visionary — educators can apply it); it represents a genuine paradigm shift, not incremental improvement; the framework is theoretically grounded but practically applicable; the overall contribution would advance the field of curriculum design."
    weight: 0.30
    description: "OriginalFramework"
