meta:
  id: edtech-curriculum-platform
  level: 5
  course: course-curriculum-design
  type: output
  description: "Design the product strategy and curriculum architecture for an AI-powered curriculum design platform, writing the product vision that bridges education expertise with technology"
  tags: [edtech, product-strategy, ai-platform, master]

state: {}

trigger: |
  You're the co-founder and Chief Education Officer
  of "CurriculumAI" — a venture-backed edtech
  startup that has raised a $12M Series A to build
  an AI-powered curriculum design platform. The
  platform will help instructional designers,
  faculty, and curriculum committees design,
  evaluate, and improve curricula using AI
  assistance. You're writing the product vision
  and curriculum architecture documentation for
  the engineering team.

  Company context:
  - Funding: $12M Series A (lead: education-focused
    VC)
  - Team: 22 people (8 engineers, 4 data scientists,
    3 education researchers, 3 product, 4 operations)
  - Current state: MVP with 45 beta customers
    (universities and corporate L&D)
  - ARR: $1.2M (growing 15% month-over-month)
  - Competitors: Legacy LMS platforms adding AI
    features, Coursera/edX authoring tools,
    manual consulting firms

  Platform capabilities to design:
  1. AI Curriculum Architect: Generates curriculum
     structures from program outcomes and
     constraints (accreditation, credits, time)
  2. Learning Objectives Engine: Suggests and
     refines objectives using Bloom's taxonomy
     with discipline-specific language
  3. Assessment Designer: Creates aligned
     assessments from learning objectives with
     rubric generation
  4. Curriculum Mapper: Automatically maps outcomes
     across courses, identifies gaps and
     redundancies
  5. Quality Analyzer: Scores curriculum quality
     using a proprietary index (inspired by QM
     rubric + research)
  6. Collaboration Hub: Real-time collaboration
     for curriculum committees with AI-facilitated
     consensus building
  7. Accreditation Compliance: Checks curriculum
     against accreditation standards (AACSB, ABET,
     CCNE, HLC, etc.)
  8. Content Recommendation: Suggests OER, readings,
     and media aligned with objectives

  Product questions to address:
  - How does the AI ensure pedagogical soundness
    (not just generating text)?
  - How do we handle the diversity of educational
    contexts (K-12, higher ed, corporate)?
  - What is the right balance between AI automation
    and human expertise?
  - How do we build trust with faculty who are
    skeptical of AI in curriculum design?
  - How do we make the platform a must-have, not
    a nice-to-have?

  Task: Write the complete product vision and
  curriculum architecture documentation — including
  the product vision statement, detailed
  specifications for all 8 capabilities, the AI
  pedagogical guardrails, the educational data
  model, the user journey for 3 key personas
  (instructional designer, faculty member,
  department chair), and the competitive
  positioning strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive product vision and architecture — the product vision is compelling and differentiated; all 8 capabilities are specified with sufficient detail for engineering implementation; the AI pedagogical guardrails ensure the system produces educationally sound results; the educational data model captures the complexity of curriculum design; user journeys for 3 personas are realistic and demonstrate product value; the overall architecture would support a viable edtech platform."
    weight: 0.35
    description: "ProductVision"
  - type: llm_judge
    criteria: "Response bridges education expertise with technology design — the curriculum architecture reflects deep instructional design knowledge (Bloom's taxonomy, backward design, quality assurance); the AI capabilities enhance rather than replace human expertise; the platform addresses genuine pain points in curriculum design; the quality analyzer and accreditation compliance features demonstrate understanding of institutional needs; the overall product would be respected by education professionals, not dismissed as 'tech bro education.'"
    weight: 0.35
    description: "EducationTechBridge"
  - type: llm_judge
    criteria: "Response addresses business viability and competitive positioning — the competitive positioning differentiates from legacy LMS and manual consulting; the product addresses the 'must-have vs nice-to-have' question; the strategy for building trust with skeptical faculty is thoughtful; the $12M investment would be justified by the product scope; the growth strategy is realistic; the overall product vision would excite both the VC investors and education customers."
    weight: 0.30
    description: "BusinessStrategy"
