meta:
  id: content-sequencing-plan
  level: 1
  course: course-curriculum-design
  type: output
  description: "Design the content sequencing for a 10-week adult education course on personal finance, determining the optimal order of topics and prerequisite relationships"
  tags: [content-sequencing, adult-education, personal-finance, beginner]

state: {}

trigger: |
  You're a financial literacy educator at a
  community organization that serves working adults.
  You've been asked to design a 10-week evening
  course called "Money Matters: Personal Finance
  Fundamentals" for adults who have little to no
  formal financial education.

  Course parameters:
  - Duration: 10 weeks, one 2-hour evening session
    per week (Tuesday evenings, 7-9 PM)
  - Participants: 15-20 adults (ages 25-55)
  - Background: Working adults with varying income
    levels; some have debt problems, some want to
    start investing; most have never had formal
    financial education
  - Format: In-person with handouts; no homework
    (participants are too busy)
  - Sensitivity: Money is a sensitive topic; some
    participants may feel shame about their
    financial situation

  Topics to cover (not yet sequenced):
  - Budgeting and tracking expenses
  - Understanding credit scores and reports
  - Debt management strategies (snowball vs avalanche)
  - Emergency funds and savings goals
  - Introduction to investing (401k, IRA, index funds)
  - Insurance basics (health, auto, life, renter's)
  - Tax basics (W-2, 1099, deductions, filing)
  - Setting financial goals (short-term, long-term)
  - Avoiding financial scams and predatory lending
  - Retirement planning basics

  Sequencing considerations:
  - Some topics depend on others (e.g., investing
    assumes budgeting knowledge)
  - Early sessions should build confidence and
    provide quick wins
  - The course should feel empowering, not
    overwhelming
  - Each session needs a practical takeaway
    (something participants can do that week)

  Task: Design the complete content sequencing plan
  — including the 10-week topic order with rationale
  for the sequence, prerequisite relationships
  between topics, session outlines for each week,
  and a practical takeaway for each session.

assertions:
  - type: llm_judge
    criteria: "Response designs a logical 10-week content sequence — assigns one topic to each week with clear rationale for the ordering; prerequisite relationships are identified (e.g., budgeting before investing, credit before debt management); the sequence moves from foundational skills to more complex topics; early weeks focus on immediate, practical skills that build confidence; the sequence creates a coherent learning journey, not just a random list of topics."
    weight: 0.35
    description: "SequenceDesign"
  - type: llm_judge
    criteria: "Response includes session outlines and practical takeaways — each of the 10 weeks has a session outline with key activities for the 2-hour format; each session includes a practical takeaway (a specific action participants can take that week); activities are appropriate for adults (not patronizing); the outlines show how each session connects to the next; the overall design respects that participants have no homework time."
    weight: 0.35
    description: "SessionOutlines"
  - type: llm_judge
    criteria: "Response addresses the sensitive nature of financial education — acknowledges that money is a sensitive topic; designs early sessions to be empowering rather than shame-inducing; includes strategies for creating a safe learning environment; the sequencing provides quick wins early (not starting with debt or problems); the overall tone is practical and encouraging; the course would leave participants feeling more capable, not more anxious about their finances."
    weight: 0.30
    description: "SensitivityAndEmpowerment"
