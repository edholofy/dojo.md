meta:
  id: first-online-course
  level: 1
  course: course-curriculum-design
  type: output
  description: "Design a beginner-level online course curriculum for a self-paced platform, including learning objectives, module structure, and basic assessments"
  tags: [online-course, self-paced, beginner-design, beginner]

state: {}

trigger: |
  You're a freelance graphic designer who has been
  asked to create a beginner-level online course
  called "Introduction to Graphic Design" for a
  self-paced learning platform (similar to Udemy or
  Skillshare). The course should take learners from
  zero design knowledge to being able to create basic
  marketing materials.

  Course parameters:
  - Target audience: Complete beginners (small business
    owners, social media managers, hobbyists)
  - Duration: 6-8 hours of content total
  - Format: Video lessons + practice exercises
  - Platform: Self-paced; no live instruction
  - Prerequisite: None; access to a computer with
    Canva (free tier)

  Topics to cover:
  - Design principles (contrast, alignment, repetition,
    proximity — CARP)
  - Color theory basics (color wheel, complementary,
    analogous; choosing palettes)
  - Typography fundamentals (font pairing, hierarchy,
    readability)
  - Layout and composition (rule of thirds, white
    space, visual flow)
  - Working with images (sourcing, cropping, resolution)
  - Practical project: Design a social media post, a
    business card, and a one-page flyer

  Task: Design the complete course curriculum —
  including course-level learning objectives, module
  breakdown with lesson-level objectives, content
  outline for each lesson, practice exercises, and
  a final project brief.

assertions:
  - type: llm_judge
    criteria: "Response designs a well-structured online course — includes clear course-level learning objectives (what learners will be able to do after completing the course); breaks the course into logical modules (5-8 modules) with lesson-level objectives; each lesson has a content outline, estimated duration, and practice exercise; the module sequence follows a logical learning progression (principles before application, theory before practice); the curriculum is achievable for complete beginners within 6-8 hours."
    weight: 0.35
    description: "CourseStructure"
  - type: llm_judge
    criteria: "Response creates appropriate learning objectives and assessments — learning objectives use action verbs aligned with Bloom's taxonomy (identify, apply, create, evaluate); practice exercises reinforce each lesson's key concepts; the final project (social media post, business card, flyer) integrates skills from multiple modules; assessments are practical and portfolio-building rather than quiz-only; the learning objectives are measurable and specific."
    weight: 0.35
    description: "ObjectivesAndAssessments"
  - type: llm_judge
    criteria: "Response is practical and learner-centered — content is designed for self-paced learning (no assumption of live support); uses Canva as the accessible tool (not expensive software); includes tips for self-assessment since there's no instructor feedback; the difficulty progression is appropriate for beginners; the curriculum would result in tangible, portfolio-worthy outputs; the overall design demonstrates basic instructional design awareness."
    weight: 0.30
    description: "LearnerCentered"
