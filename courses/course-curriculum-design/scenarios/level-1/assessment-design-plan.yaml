meta:
  id: assessment-design-plan
  level: 1
  course: course-curriculum-design
  type: output
  description: "Design an assessment plan for a semester-long college writing course, including formative checks, summative evaluations, rubrics, and a grading policy"
  tags: [assessment, rubric, college-writing, beginner]

state: {}

trigger: |
  You're an English professor redesigning the
  assessment plan for "English Composition I
  (ENG 101)" — a required first-year writing
  course at a state university. The previous
  instructor used only three essays and a final
  exam, and student pass rates were 62%. You want
  to create a more supportive assessment structure
  that helps students improve throughout the
  semester.

  Course parameters:
  - Course: ENG 101 — English Composition I
  - Duration: 15-week semester
  - Class size: 25 students
  - Students: First-year students, varied writing
    abilities, many are first-generation college
    students
  - Goal: Students produce clear, well-organized
    academic writing

  Current problem:
  - Students receive their first graded essay in
    week 5 and many are shocked by low grades
  - No feedback loop before major assignments
  - High anxiety around writing; some students
    stop attending after a bad grade
  - The final exam tests grammar in isolation,
    not actual writing ability

  Assessment types to include:
  - Formative: Low-stakes writing exercises, peer
    review, drafting workshops, self-reflection
  - Summative: 4 major essays (narrative, analysis,
    argument, research)
  - Portfolio: End-of-semester portfolio with
    revised best work and reflection

  Requirements:
  - Design the complete assessment plan with timing
  - Create a detailed rubric for at least one
    major essay
  - Develop the grading policy (weight distribution)
  - Include a feedback strategy (how and when
    students receive feedback)
  - Address how to build student confidence through
    assessment design

  Task: Design the complete assessment plan —
  including the semester-long assessment schedule,
  formative and summative assessment descriptions,
  at least one detailed rubric, the grading policy,
  and the feedback strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive assessment plan — includes a semester-long timeline showing when each assessment occurs; formative assessments (low-stakes writing, peer review, drafts) are embedded throughout, not just before major essays; summative assessments (4 essays) are spaced appropriately; the portfolio component is well-defined; the plan addresses the current problem (students getting shocked by first grades) by providing early, low-stakes feedback; the overall structure is more supportive than the previous 'three essays and a final' approach."
    weight: 0.35
    description: "AssessmentStructure"
  - type: llm_judge
    criteria: "Response includes a detailed rubric and grading policy — at least one essay rubric has specific criteria (thesis, organization, evidence, style, mechanics) with clear performance levels (excellent, proficient, developing, beginning); the grading policy distributes weight across assessment types (not all weight on major essays); low-stakes formative work is counted but weighted appropriately; the portfolio allows students to revise and improve; the grading policy is transparent and would reduce student anxiety."
    weight: 0.35
    description: "RubricAndGrading"
  - type: llm_judge
    criteria: "Response addresses feedback strategy and student confidence — explains how and when students receive feedback (instructor, peer, self-assessment); feedback is timely (not weeks after submission); the plan builds student confidence by starting with lower-stakes assignments and increasing expectations gradually; addresses first-generation college students' needs; the overall design would likely improve the 62% pass rate; the reflection component helps students develop metacognitive awareness of their writing."
    weight: 0.30
    description: "FeedbackAndConfidence"
