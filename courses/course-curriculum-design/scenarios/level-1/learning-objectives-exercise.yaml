meta:
  id: learning-objectives-exercise
  level: 1
  course: course-curriculum-design
  type: output
  description: "Write learning objectives using Bloom's Taxonomy for a university-level introductory psychology course, including course-level and module-level objectives"
  tags: [learning-objectives, blooms-taxonomy, university, beginner]

state: {}

trigger: |
  You're a new adjunct professor at a community
  college, preparing to teach "Introduction to
  Psychology (PSY 101)" for the first time. The
  department chair has asked you to write clear,
  measurable learning objectives for the course
  using Bloom's Taxonomy.

  Course parameters:
  - Course: PSY 101 — Introduction to Psychology
  - Level: Freshman-level, no prerequisites
  - Duration: 16-week semester, 3 hours/week
  - Students: 35 students, mix of majors (not
    all psychology majors)
  - Textbook: Standard intro psychology textbook
  - Assessment: 2 exams, 1 research paper,
    weekly discussion posts

  Modules to cover (8 modules, ~2 weeks each):
  1. What is Psychology? (history, research methods)
  2. Biological Bases of Behavior (brain, neurons)
  3. Sensation and Perception
  4. Learning and Memory
  5. Development Across the Lifespan
  6. Personality Theories
  7. Psychological Disorders
  8. Social Psychology

  Requirements:
  - Write 3-5 course-level learning objectives
    (what students will be able to do after
    completing the entire course)
  - Write 3-4 module-level learning objectives
    for each of the 8 modules
  - Use action verbs from Bloom's Taxonomy
    (remember, understand, apply, analyze,
    evaluate, create)
  - Ensure objectives span multiple levels of
    Bloom's (not all "remember" or "identify")
  - Each objective must be measurable
  - Include a mapping showing which Bloom's level
    each objective targets

  Task: Write the complete set of learning objectives
  — including course-level objectives, module-level
  objectives for all 8 modules, Bloom's level
  mapping, and a brief explanation of how the
  objectives build in complexity across modules.

assertions:
  - type: llm_judge
    criteria: "Response writes clear, measurable learning objectives — includes 3-5 course-level objectives that describe what students will be able to do after completing PSY 101; each of the 8 modules has 3-4 specific learning objectives; all objectives use action verbs from Bloom's Taxonomy (not vague verbs like 'understand' or 'learn about'); objectives are measurable (you can assess whether a student achieved them); the total set of objectives is comprehensive but not overwhelming."
    weight: 0.35
    description: "ObjectiveQuality"
  - type: llm_judge
    criteria: "Response demonstrates proper use of Bloom's Taxonomy — objectives span multiple cognitive levels (not all at the same level); lower-level modules use more remember/understand verbs while later modules incorporate analyze/evaluate/create; a clear mapping shows which Bloom's level each objective targets; the progression across modules shows increasing cognitive complexity; course-level objectives target higher-order thinking while module-level objectives include foundational skills."
    weight: 0.35
    description: "BloomsTaxonomy"
  - type: llm_judge
    criteria: "Response provides practical alignment guidance — explains how objectives build in complexity across the 8 modules; connects objectives to the assessment methods (exams, research paper, discussion posts); the objectives are appropriate for a freshman-level community college course (not too advanced, not too basic); the overall set would help a new adjunct professor plan their course and communicate expectations to students; includes a useful Bloom's level mapping format."
    weight: 0.30
    description: "PracticalAlignment"
