meta:
  id: accessible-course-design
  level: 1
  course: course-curriculum-design
  type: output
  description: "Redesign an existing online course to meet accessibility standards and UDL principles, creating an inclusive learning experience for diverse learners"
  tags: [accessibility, udl, inclusive-design, beginner]

state: {}

trigger: |
  You're an instructional designer at a university's
  Center for Teaching and Learning. A biology
  professor has asked for help making their online
  "Introduction to Biology (BIO 101)" course more
  accessible. The course currently has several
  accessibility issues, and two students with
  disabilities have filed accommodation requests.

  Current course issues:
  - All content is delivered through lecture videos
    (no captions, no transcripts)
  - Assessments are exclusively timed multiple-choice
    exams
  - Lab simulations require mouse-only interaction
    (no keyboard navigation)
  - PDFs of the textbook are scanned images (not
    screen-reader compatible)
  - Color-coded charts in slides have no alternative
    text or labels
  - Discussion boards require text-only responses
    (no audio/video option)

  Student needs:
  - One student is deaf and uses ASL interpreters
  - One student has a visual impairment and uses
    a screen reader
  - Several students have learning disabilities
    (not formally registered)
  - Many students are non-native English speakers

  Course parameters:
  - Format: Fully online, asynchronous
  - Duration: 16-week semester
  - Current modules: 12 modules with video lectures,
    readings, quizzes, and 4 exams
  - LMS: Canvas

  Task: Create a comprehensive accessibility
  redesign plan — including specific fixes for
  each identified issue, UDL-aligned redesign
  recommendations for content delivery, assessment
  alternatives, and a checklist the professor can
  use to ensure future course materials are
  accessible.

assertions:
  - type: llm_judge
    criteria: "Response addresses each accessibility issue with specific fixes — provides actionable solutions for captions/transcripts on videos, screen-reader-compatible documents, keyboard-navigable simulations, color-accessible charts, and flexible discussion formats; fixes are practical (not just 'make it accessible' but specific steps); addresses both the two registered students and the broader population of students with unregistered needs; the solutions work within the Canvas LMS."
    weight: 0.35
    description: "AccessibilityFixes"
  - type: llm_judge
    criteria: "Response applies UDL principles meaningfully — addresses all three UDL principles (engagement, representation, action/expression); provides multiple means of content delivery (not just video — also text, audio, interactive); offers assessment alternatives beyond timed multiple-choice (projects, oral exams, portfolios); the redesign benefits all learners, not just those with disabilities; the approach is about proactive design, not just reactive accommodation."
    weight: 0.35
    description: "UDLApplication"
  - type: llm_judge
    criteria: "Response includes a practical, reusable accessibility checklist — the checklist covers document accessibility, video accessibility, assessment design, LMS configuration, and interaction design; the checklist is specific enough to be actionable (not just 'ensure accessibility'); the overall redesign plan is realistic for a professor to implement (not requiring complete course rebuild); the plan prioritizes fixes by impact and effort; the tone is supportive, not punitive toward the professor."
    weight: 0.30
    description: "PracticalChecklist"
