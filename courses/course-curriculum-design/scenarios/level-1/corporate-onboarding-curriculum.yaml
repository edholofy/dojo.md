meta:
  id: corporate-onboarding-curriculum
  level: 1
  course: course-curriculum-design
  type: output
  description: "Design a new employee onboarding curriculum for a mid-size tech company, covering company culture, tools, processes, and role-specific training"
  tags: [corporate-training, onboarding, new-hire, beginner]

state: {}

trigger: |
  You're the People Operations Manager at a 200-person
  SaaS startup. The company has grown from 80 to 200
  employees in the past year, and the informal "shadow
  someone for a week" onboarding approach is no longer
  working. New hires report feeling lost and
  unproductive for their first 3-4 weeks. You need to
  design a structured onboarding curriculum.

  Onboarding requirements:
  - Duration: First 2 weeks (10 business days)
  - Audience: All new hires across engineering, sales,
    marketing, customer success, and G&A
  - Mix: Some content is universal (company-wide);
    some is department-specific
  - Format: Combination of live sessions, self-paced
    modules, and hands-on activities
  - Tools to cover: Slack, Notion, Jira, GitHub
    (engineering), Salesforce (sales/CS), Google
    Workspace

  Content areas:
  Week 1 (company-wide):
  - Company mission, values, and culture
  - Product overview and demo
  - Organization structure and key contacts
  - HR essentials (benefits, policies, time off)
  - Security and compliance basics
  - Communication norms (Slack channels, meeting
    etiquette, async vs sync)
  - IT setup and tool access

  Week 2 (department-specific):
  - Engineering: Dev environment setup, code review
    process, deployment pipeline, architecture overview
  - Sales: CRM setup, sales process, product demo
    training, objection handling basics
  - Marketing: Brand guidelines, content workflow,
    analytics tools, campaign calendar
  - Customer Success: Support tools, escalation
    process, customer health metrics, product knowledge
  - G&A: Finance processes, procurement, vendor
    management

  Success metrics:
  - New hire satisfaction score (target: 4.5/5.0)
  - Time to first meaningful contribution (target:
    reduce from 4 weeks to 2 weeks)
  - 30-day retention (currently 92%, target: 98%)

  Task: Design the complete 2-week onboarding
  curriculum — including daily schedules, session
  descriptions, learning objectives, facilitator
  notes, and the new hire feedback mechanism.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured 2-week onboarding curriculum — includes a day-by-day schedule for Week 1 (company-wide) and Week 2 (department-specific tracks); each session has clear learning objectives and estimated duration; the mix of live sessions, self-paced modules, and hands-on activities is balanced; the curriculum flows logically (company context before tools, tools before processes); the overall program is achievable in 10 business days without overwhelming new hires."
    weight: 0.35
    description: "OnboardingStructure"
  - type: llm_judge
    criteria: "Response addresses both universal and department-specific needs — Week 1 provides a solid foundation for all new hires; Week 2 includes differentiated tracks for at least 3 departments (engineering, sales, CS); department-specific sessions are practical and role-relevant; the curriculum includes social integration elements (not just information transfer — meeting the team, buddy system, etc.); hands-on activities ensure new hires practice with actual tools and systems."
    weight: 0.35
    description: "DifferentiatedContent"
  - type: llm_judge
    criteria: "Response includes feedback mechanisms and success measurement — incorporates daily or weekly check-ins for new hires to flag confusion; includes a feedback survey mechanism; connects the curriculum to the success metrics (satisfaction, time to contribution, retention); includes facilitator notes or guidelines for session leaders; the overall design reflects an understanding that onboarding is about integration, not just information delivery."
    weight: 0.30
    description: "FeedbackAndMeasurement"
