meta:
  id: beginner-curriculum-shift
  level: 1
  course: course-curriculum-design
  type: output
  description: "Design multiple curriculum documents simultaneously — a community college course syllabus, a workshop lesson plan, and a self-paced module — demonstrating foundational curriculum design skills across formats"
  tags: [multi-format, syllabus, lesson-plan, shift-simulation, beginner]

state: {}

trigger: |
  You're a new instructional designer at a
  community college. On your first week, your
  supervisor has given you three assignments to
  complete by Friday, each requiring a different
  curriculum design format.

  Assignment 1 — Course Syllabus:
  Design a syllabus for "CIS 110: Introduction to
  Computer Applications" — a 16-week, 3-credit
  course for students with no computer experience.
  Topics: Word processing, spreadsheets, presentations,
  email, internet safety, basic file management.
  Include: Course description, learning objectives
  (Bloom's-aligned), weekly schedule, grading policy,
  required materials, and academic integrity policy.

  Assignment 2 — Workshop Lesson Plan:
  Design a 3-hour workshop lesson plan for "Excel
  for Administrative Professionals." 15 participants
  who use Excel daily but only know basics (data
  entry, simple formatting). The workshop should
  cover: VLOOKUP, pivot tables, conditional
  formatting, and basic charts. Include: Minute-by-
  minute timing, activities, handout descriptions,
  and practice exercises.

  Assignment 3 — Self-Paced Module:
  Design a 45-minute self-paced e-learning module
  on "Email Etiquette for the Workplace" for the
  college's employee training portal. Include:
  Module outline, screen-by-screen content flow,
  3 interactive scenarios, a 10-question knowledge
  check, and completion criteria.

  Constraints:
  - Each document must follow a different format
    appropriate to its delivery mode
  - All three must have clear learning objectives
  - The syllabus must meet accreditation standards
  - The workshop must be hands-on (not lecture-only)
  - The e-learning module must work without an
    instructor

  Task: Create all three curriculum documents,
  demonstrating your ability to design for different
  formats, audiences, and delivery modes.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct curriculum documents — the syllabus follows standard college syllabus format with all required elements (description, objectives, schedule, grading, materials, policies); the workshop lesson plan has minute-by-minute timing with hands-on activities; the self-paced module has a screen-by-screen flow with interactive elements; each document is formatted appropriately for its delivery mode; the three documents demonstrate range across curriculum design formats."
    weight: 0.35
    description: "ThreeDocuments"
  - type: llm_judge
    criteria: "Response demonstrates foundational curriculum design skills across all three documents — learning objectives use Bloom's taxonomy action verbs; the syllabus weekly schedule is realistic for 16 weeks; the workshop balances instruction with practice; the e-learning module includes interactivity (scenarios, knowledge check); assessments are appropriate for each format; the content is appropriate for the stated audiences (beginners for CIS 110, intermediate for Excel workshop, employees for email etiquette)."
    weight: 0.35
    description: "DesignSkills"
  - type: llm_judge
    criteria: "Response produces practical, implementable documents — the syllabus could be distributed to students on day one; the workshop could be facilitated by someone other than the author; the e-learning module could be built by a developer from the provided specifications; all three documents are complete enough to be used without significant additional development; the overall quality demonstrates readiness for instructional design work."
    weight: 0.30
    description: "Implementability"
