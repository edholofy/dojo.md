meta:
  id: workshop-curriculum
  level: 1
  course: course-curriculum-design
  type: output
  description: "Design a single-day workshop curriculum on public speaking for professionals, including learning activities, timing, and materials"
  tags: [workshop, single-day, public-speaking, beginner]

state: {}

trigger: |
  You're a communication coach hired to design and
  facilitate a full-day (8-hour) public speaking
  workshop for a professional development program at
  a mid-size accounting firm. The 20 participants are
  managers and senior associates who need to present
  to clients and partners but have little formal
  presentation training.

  Workshop parameters:
  - Duration: 8 hours (9 AM - 5 PM with lunch break)
  - Participants: 20 professionals
  - Experience level: Beginner to intermediate; most
    are anxious about public speaking
  - Room: Conference room with projector, whiteboard,
    and breakout space
  - Deliverable: Each participant delivers a 3-minute
    presentation at the end

  Topics to cover:
  - Overcoming speaking anxiety (breathing, preparation,
    reframing nervousness)
  - Structuring a presentation (opening hook, 3-point
    structure, strong close)
  - Delivery skills (eye contact, voice projection,
    pacing, gestures)
  - Visual aids (slide design basics; less is more)
  - Handling Q&A and difficult questions
  - Practice and feedback

  Constraints:
  - Participants are accountants — they prefer
    structured, logical approaches
  - Some participants will be very reluctant to speak
    in front of the group
  - The firm wants measurable improvement (pre/post
    self-assessment)

  Task: Design the complete workshop curriculum —
  including a detailed minute-by-minute agenda,
  learning activities, materials needed, facilitation
  notes for managing reluctant participants, and the
  pre/post assessment tool.

assertions:
  - type: llm_judge
    criteria: "Response designs a detailed single-day workshop agenda — includes time blocks with specific start/end times covering the full 8-hour day; activities are varied (lecture, demonstration, pair practice, group exercise, individual practice, feedback); includes breaks and lunch; the flow builds from low-stakes activities (pair work) to higher-stakes (group presentation); the timing is realistic for 20 participants; the final 3-minute presentations fit within the schedule."
    weight: 0.35
    description: "WorkshopAgenda"
  - type: llm_judge
    criteria: "Response includes appropriate learning activities and facilitation strategies — addresses speaking anxiety early with practical techniques; activities match the accountant audience (structured, logical, professional context); includes strategies for managing reluctant participants (opt-in escalation, safe environment); peer feedback is structured (not just 'any comments?'); the workshop balances theory with practice (at least 50% practice time); materials needed are listed for each activity."
    weight: 0.35
    description: "ActivitiesAndFacilitation"
  - type: llm_judge
    criteria: "Response includes assessment and measurement — includes a pre/post self-assessment tool (specific dimensions: anxiety level, confidence, skill self-rating); the assessment is quick to administer (5 minutes); the workshop design would produce measurable improvement for most participants; includes a take-away resource (one-page reference card, practice plan); the overall design would leave participants feeling more confident and capable, not overwhelmed."
    weight: 0.30
    description: "AssessmentAndOutcomes"
