meta:
  id: bootcamp-curriculum
  level: 1
  course: course-curriculum-design
  type: output
  description: "Design a 12-week coding bootcamp curriculum for career changers learning full-stack web development, including weekly modules, projects, and career support"
  tags: [bootcamp, coding, full-stack, beginner]

state: {}

trigger: |
  You're the curriculum director at a new coding
  bootcamp called "LaunchPad Academy." You need to
  design a 12-week full-stack web development
  curriculum for career changers with no prior
  coding experience.

  Bootcamp parameters:
  - Duration: 12 weeks, full-time (40 hours/week)
  - Cohort size: 20 students
  - Background: Career changers (ages 25-45);
    motivated but no coding experience
  - Format: In-person; 1 lead instructor + 2 TAs
  - Tech stack: HTML/CSS, JavaScript, React, Node.js,
    PostgreSQL
  - Outcome goal: Students can build and deploy a
    full-stack web application by graduation

  Structure requirements:
  - Each week should have a theme and learning
    objectives
  - Daily schedule: 9 AM - 5 PM with breaks
  - Morning: Instruction and guided practice
  - Afternoon: Project work and pair programming
  - Friday: Weekly project presentation + retrospective
  - 3 milestone projects throughout the program
  - Capstone project in final 2 weeks

  Career support:
  - Resume and LinkedIn workshops (weeks 10-12)
  - Mock interviews
  - Portfolio building

  Task: Design the complete 12-week curriculum —
  including weekly themes, daily learning objectives,
  milestone project briefs, the capstone project
  requirements, and the assessment framework for
  tracking student progress.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive 12-week bootcamp curriculum — includes weekly themes and learning objectives for all 12 weeks; the progression is logical (HTML/CSS → JavaScript → React → Node.js → PostgreSQL → full-stack integration → capstone); daily structure follows the morning instruction/afternoon project pattern; Fridays include presentations and retrospectives; the pacing is realistic for beginners (not rushing through concepts); each week builds on the previous week's skills."
    weight: 0.35
    description: "BootcampStructure"
  - type: llm_judge
    criteria: "Response includes well-designed projects and assessments — 3 milestone projects test cumulative skills (front-end only, back-end only, full-stack); project briefs include clear requirements and deliverables; the capstone project is substantial enough for a portfolio piece; the assessment framework tracks student progress meaningfully (not just pass/fail); pair programming is integrated into the daily workflow; the curriculum produces portfolio-worthy outputs."
    weight: 0.35
    description: "ProjectsAndAssessments"
  - type: llm_judge
    criteria: "Response addresses career readiness and student support — includes career support elements (resume workshops, mock interviews, portfolio building); the curriculum accounts for the emotional journey of career changers (early wins, managing frustration, building confidence); the capstone project is designed to be impressive to potential employers; the overall design would realistically prepare a complete beginner for a junior developer role in 12 weeks; the daily schedule includes adequate break time."
    weight: 0.30
    description: "CareerReadiness"
