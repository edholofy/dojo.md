meta:
  id: k12-unit-plan
  level: 1
  course: course-curriculum-design
  type: output
  description: "Design a 3-week K-12 unit plan for a middle school science class, including daily lessons, standards alignment, and differentiated activities"
  tags: [k12, unit-plan, middle-school, beginner]

state: {}

trigger: |
  You're a 7th-grade science teacher at a suburban
  middle school. You need to design a 3-week unit
  plan on "Ecosystems and Biodiversity" for your
  class of 28 students. The school follows Next
  Generation Science Standards (NGSS).

  Unit parameters:
  - Grade: 7th grade (ages 12-13)
  - Duration: 3 weeks (15 class periods, 50 minutes
    each)
  - Class size: 28 students
  - Student demographics: Mixed ability levels;
    3 students have IEPs, 4 are English Language
    Learners, 2 are gifted
  - Resources: Science textbook, classroom set of
    Chromebooks, school garden, basic lab supplies
  - Standards: NGSS MS-LS2 (Ecosystems: Interactions,
    Energy, and Dynamics)

  Topics to cover:
  - What is an ecosystem? (biotic vs abiotic factors)
  - Food chains and food webs
  - Energy flow and trophic levels
  - Biodiversity and its importance
  - Human impact on ecosystems
  - Conservation and sustainability

  Assessment requirements:
  - Daily formative checks (exit tickets, quick writes)
  - One mid-unit quiz (end of week 1)
  - Final project: Students create an "Ecosystem
    Health Report Card" for a local ecosystem
  - Rubric for final project

  Task: Design the complete 3-week unit plan —
  including daily lesson plans with learning
  objectives, activities, NGSS alignment, differentiation
  strategies for IEP/ELL/gifted students, assessment
  plan, and materials list.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured 3-week unit plan — includes 15 daily lesson plans with learning objectives, activities, and timing; each lesson aligns to specific NGSS standards (MS-LS2); the sequence builds logically from foundational concepts (ecosystem components) to complex ideas (human impact, conservation); activities are varied (lecture, lab, group work, outdoor observation, technology-based); the plan includes a mid-unit quiz and final project with rubric."
    weight: 0.35
    description: "UnitStructure"
  - type: llm_judge
    criteria: "Response includes appropriate differentiation and assessment — addresses the needs of IEP students (modified assignments, scaffolding), ELL students (visual supports, vocabulary pre-teaching, sentence frames), and gifted students (extension activities, deeper inquiry); formative assessments are embedded throughout (exit tickets, quick writes, observation); the Ecosystem Health Report Card project is well-defined with clear rubric criteria; assessments measure understanding, not just recall."
    weight: 0.35
    description: "DifferentiationAndAssessment"
  - type: llm_judge
    criteria: "Response is practical and standards-aligned — uses available resources appropriately (Chromebooks, school garden, lab supplies); the materials list is realistic for a middle school classroom; NGSS alignment is specific (not just 'covers MS-LS2' but identifies specific performance expectations); the pacing is realistic for 50-minute periods with 28 students; the unit would be implementable by a teacher with standard middle school resources."
    weight: 0.30
    description: "PracticalAndAligned"
