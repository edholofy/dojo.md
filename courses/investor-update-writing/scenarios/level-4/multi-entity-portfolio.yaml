meta:
  id: multi-entity-portfolio
  level: 4
  course: investor-update-writing
  type: output
  description: "Write a consolidated investor update for a holding company with multiple portfolio entities at different stages, including an SPV, a fund, and directly-held companies"
  tags: [holding-company, portfolio, multi-entity, expert]

state: {}

trigger: |
  You're the CEO of a venture studio / holding company
  structure called "NovaBuild" that manages multiple
  entities. Your investor base ($28M committed across
  vehicles) receives a consolidated quarterly update
  covering all entities.

  Entity 1 — NovaBuild Fund I ($15M, 2024 vintage):
  Early-stage VC fund investing in B2B SaaS:
  - 8 investments made (average $1.5M check)
  - TVPI: 1.6x (driven by 1 breakout company at 5x)
  - DPI: 0.0x (no exits yet)
  - Reserve: $3M remaining
  - Notable: Best performer raised Series A at $45M
    valuation (5x markup from your $9M entry)
  - Concern: 2 companies struggling (combined $2.5M at
    risk)

  Entity 2 — NovaBuild Studio (operating company):
  Venture studio that incubates and launches companies:
  - Revenue: $1.2M (from studio services to portfolio
    companies + management fees)
  - Studio companies launched: 3 this year (AI customer
    support, vertical SaaS for dentists, API monitoring)
  - Studio success rate: 5 of 8 launched companies still
    operating after 12 months (62.5%)
  - Team: 18 full-time + 12 contractors
  - Burn: $180K/month above revenue
  - Cash: $1.8M

  Entity 3 — DataCo SPV ($5M):
  Special purpose vehicle co-investing in a specific
  growth-stage data infrastructure company:
  - Portfolio company raised Series C at $420M (2.8x
    from your entry at $150M)
  - Company is performing well (ARR: $38M, growing 80%)
  - SPV has pro-rata rights in potential Series D
  - Tax K-1s distributed on time (improvement from last
    year's delays)

  Entity 4 — NovaBuild Ventures II ($8M, newly launched):
  New fund currently in fundraising:
  - First close: $4.2M (of $8M target)
  - Target final close: Q2 2027
  - First 2 investments made ($2.4M deployed)
  - LP base: Mix of Fund I LPs re-upping + new
    institutional LPs

  Cross-entity complexity:
  - Some LPs are in multiple vehicles (Fund I + SPV +
    Fund II)
  - Studio companies sometimes receive follow-on from
    Fund I (related-party transactions)
  - Management fees flow between entities (studio
    charges fund, fund pays management company)
  - Conflict of interest policies must be disclosed

  Task: Write a comprehensive consolidated quarterly
  update covering all four entities with appropriate
  detail for each, cross-entity disclosures, and clear
  navigation for LPs invested in different combinations
  of vehicles.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive consolidated update covering all four entities — presents each entity with appropriate metrics and detail (Fund I: TVPI/DPI/IRR, portfolio company updates; Studio: revenue, launches, success rate; SPV: portfolio company performance, valuation; Fund II: fundraise progress, early investments); organizes the update so LPs in different vehicle combinations can navigate to their relevant sections; includes an executive summary that synthesizes the overall NovaBuild platform performance; addresses cross-entity relationships and conflicts transparently; the consolidated update would satisfy institutional LP reporting standards."
    weight: 0.35
    description: "ComprehensiveConsolidatedUpdate"
  - type: llm_judge
    criteria: "Response addresses the cross-entity complexity with appropriate governance disclosures — discloses related-party transactions between entities (studio companies receiving Fund I follow-on investments); explains management fee flows between entities transparently; addresses conflict of interest policies and how they're being managed; explains the LP allocation across vehicles clearly; addresses the Fund II fundraise in the context of existing LPs (re-up rates, new LP pipeline); discusses how the studio model creates deal flow advantages for the fund vehicles while managing conflicts; the governance disclosures would satisfy a sophisticated institutional LP's due diligence requirements."
    weight: 0.35
    description: "CrossEntityGovernance"
  - type: llm_judge
    criteria: "Response balances the positive and negative across the portfolio — presents Fund I's breakout company (5x) alongside the 2 struggling companies ($2.5M at risk); addresses the studio's 62.5% success rate honestly (what it means for the model); presents the SPV's strong performance (2.8x) while discussing pro-rata decisions; addresses Fund II's fundraise progress and timeline; creates a balanced narrative that doesn't cherry-pick the best-performing entity; includes forward-looking commentary for each entity (Fund I deployment plan, Studio pipeline, SPV pro-rata decision, Fund II close timeline); the overall update demonstrates professional multi-entity fund management."
    weight: 0.30
    description: "PortfolioBalance"
