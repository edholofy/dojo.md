meta:
  id: secondary-transaction-update
  level: 4
  course: investor-update-writing
  type: output
  description: "Write investor communications around a complex secondary transaction involving founder shares, employee liquidity, and investor ROFR rights"
  tags: [secondary, liquidity, rofr, expert]

state: {}

trigger: |
  You're the CEO of a Series C company ($75M raised,
  $42M ARR, 180 employees, $320M last-round valuation).
  You're managing a complex secondary transaction that
  involves multiple parties and requires careful investor
  communication.

  The secondary transaction:
  - Total secondary pool: $18M
  - Seller 1: You (CEO) — selling $5M of your shares
    (15% of your holdings) for personal financial
    diversification (house purchase, tax obligations
    from prior exercises)
  - Seller 2: Co-founder/CTO — selling $3M (12% of
    holdings) for similar personal reasons
  - Seller 3: Employee pool — $10M allocated for early
    employees (pre-Series A) to achieve partial
    liquidity; 22 employees eligible based on tenure
    and vesting
  - Buyer: A well-known secondary fund (Industry
    Ventures) offering to purchase at $290M implied
    valuation (9% discount to last round)
  - ROFR: Your existing investors have Right of First
    Refusal on secondary sales per the SHA; you need
    to offer them the opportunity to purchase before
    Industry Ventures

  Complicating factors:
  - Series C lead (invested $30M at $320M) may view the
    9% discount negatively (implies valuation decline)
  - Some investors may want to exercise ROFR to prevent
    a secondary fund from joining the cap table
  - The founder sales could be perceived as lack of
    confidence (even though the company is performing
    well)
  - Employee liquidity is overdue — several early
    employees have approached you about selling shares
    privately; one has already explored a transaction
    on a secondary marketplace
  - Tax implications: QSBS eligibility may be affected
    for some participants
  - Board approval required for all secondary
    transactions per charter

  Current business performance (context):
  - ARR: $42M (growing 55% YoY)
  - NRR: 135%
  - Path to profitability: Achievable within 18 months
  - Last round: 10 months ago at $320M
  - Next round: Not needed for 24+ months (strong cash
    position)

  Your investors:
  - Series C lead: $30M invested, Board seat
  - Series B lead: $20M invested, Board seat
  - Series A lead: $8M invested, Board observer
  - Angels: 15 individuals ($4M combined from seed)

  Task: Write the investor communications needed for
  this secondary transaction — including the ROFR
  notice, a cover letter explaining the rationale, and
  guidance for the Board discussion — each maintaining
  appropriate legal formality and strategic framing.

assertions:
  - type: llm_judge
    criteria: "Response produces the necessary secondary transaction communications — creates a ROFR notice with appropriate legal formality (identifies sellers, shares, proposed buyer, price, terms, exercise period); writes a cover letter explaining the rationale for the secondary (founder diversification, employee retention through liquidity, market-appropriate timing); prepares Board discussion materials framing the key decisions (approve/deny, ROFR exercise, valuation implications); each document serves its specific purpose; the communications would be reviewed by counsel and deemed appropriate."
    weight: 0.35
    description: "SecondaryTransactionCommunications"
  - type: llm_judge
    criteria: "Response addresses the sensitive dynamics skillfully — frames founder secondary sales positively (personal financial management, not lack of confidence; selling only 15%/12% of holdings; company performing well); addresses the 9% valuation discount transparently (secondary discount is market-standard; doesn't indicate valuation decline; provides comparable secondary transaction benchmarks); handles the employee liquidity narrative empathetically (retention tool, overdue recognition for early employees, prevents shadow market activity); addresses ROFR mechanics clearly (timeline, exercise procedures, what happens if investors don't exercise); discusses the secondary fund buyer's implications for the cap table (information rights, future round dynamics)."
    weight: 0.35
    description: "SensitiveDynamicsHandling"
  - type: llm_judge
    criteria: "Response demonstrates expert-level understanding of secondary mechanics — addresses QSBS implications for eligible participants; discusses 409A considerations; addresses the cap table implications (new investor, information rights, anti-dilution considerations); presents the Board approval process and timeline; discusses how this secondary affects the company's future fundraising narrative (positive: demonstrates employee retention investment; potential negative: valuation anchor below last round); addresses the risk of unsanctioned secondary market activity as justification for the formal process; the communications demonstrate deep understanding of secondary transaction mechanics and venture capital governance."
    weight: 0.30
    description: "SecondaryMechanicsExpertise"
