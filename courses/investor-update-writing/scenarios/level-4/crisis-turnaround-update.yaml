meta:
  id: crisis-turnaround-update
  level: 4
  course: investor-update-writing
  type: output
  description: "Write investor updates during a company turnaround involving new leadership, business model change, and investor trust rebuilding after a period of poor communication"
  tags: [turnaround, new-leadership, trust-rebuilding, expert]

state: {}

trigger: |
  You're the newly installed CEO (3 months in) of a
  Series B startup ($25M raised, down to 40 employees
  from 90) brought in by the Board after the founding
  CEO was asked to resign. The company builds a
  workforce management platform for healthcare staffing
  agencies. This is your first investor update — the
  previous CEO hadn't sent one in 8 months.

  What you inherited:
  - ARR: $4.8M (down from peak of $7.2M 18 months ago;
    significant churn)
  - Burn: $340K/month (reduced from $680K after the
    layoffs the prior CEO executed poorly — announced
    via Slack on a Friday afternoon)
  - Cash: $3.8M
  - Runway: 11 months
  - Team morale: Very low; Glassdoor rating dropped
    from 4.2 to 2.8; 12 people left voluntarily in
    past 4 months
  - Product: Core platform is solid but the AI
    scheduling feature (which consumed $4M in R&D) was
    abandoned — it never reached product-market fit
  - Customers: 62 (down from 95); remaining customers
    are loyal but underserved
  - Technical debt: Significant; platform stability
    issues causing weekly outages
  - Investor relations: Zero communication for 8 months;
    several angels have emailed with no response;
    Board members frustrated

  What you've done in 3 months:
  - Conducted 100-day assessment (customer interviews,
    product audit, team assessment, financial review)
  - Identified core value proposition (scheduling +
    compliance tracking, NOT AI scheduling)
  - Rebuilt executive team: New VP Engineering (from
    previous turnaround), new Head of Customer Success
  - Stabilized platform (outages reduced from weekly to
    monthly)
  - Recovered 4 churned customers ($240K ARR returned)
  - Implemented weekly all-hands to rebuild culture
  - Established financial controls and forecasting

  Your 18-month plan:
  - Phase 1 (months 1-6): Stabilize — retain customers,
    fix platform, rebuild team
  - Phase 2 (months 7-12): Grow — resume new customer
    acquisition, launch compliance module (customers
    requesting it)
  - Phase 3 (months 13-18): Scale — path to $8M ARR,
    evaluate fundraising options
  - Cash: Need bridge ($1.5-2M) by month 9 to fund
    Phase 2/3

  Your investors:
  - Series B lead: Growth fund ($12M, Board seat) — very
    frustrated, considering writing off the investment
  - Series A lead: Early-stage fund ($6M, Board seat) —
    cautiously supportive of new CEO
  - Seed investors: 8 angels ($3M combined) — some
    ghosted, some angry, some checked out
  - 2 angels have threatened legal action over lack of
    communication and perceived mismanagement

  Task: Write a comprehensive "re-introduction" investor
  update that re-establishes communication, acknowledges
  what went wrong, presents your assessment and plan,
  and begins rebuilding trust — while being direct about
  the difficult path ahead.

assertions:
  - type: llm_judge
    criteria: "Response writes a powerful re-introduction update that addresses the communication gap head-on — acknowledges the 8-month silence directly and apologizes without deflecting; introduces the new CEO with appropriate credibility; presents the 100-day assessment honestly (what was found, how bad it is, what's salvageable); commits to regular communication going forward (specific cadence); addresses investors who were ignored by name or category; the update would begin to repair the damaged trust relationship between the company and its investors."
    weight: 0.35
    description: "ReIntroductionUpdate"
  - type: llm_judge
    criteria: "Response balances accountability for the past with confidence about the future — doesn't throw the previous CEO under the bus but acknowledges what went wrong (no communication, misallocated R&D, poor layoff execution); presents what's been accomplished in 3 months (platform stabilization, customer recovery, team rebuilding) as evidence of new leadership capability; presents the 18-month plan with specific milestones; addresses the bridge financing need honestly (month 9 timeline, amount); the tone is direct, humble, and determined — not over-promising but not defeatist; the update would make even the most frustrated investor pause before writing off the investment."
    weight: 0.35
    description: "AccountabilityAndConfidence"
  - type: llm_judge
    criteria: "Response addresses each investor segment appropriately — acknowledges the Series B lead's frustration and provides a framework for evaluating whether to continue supporting the company; addresses the Series A lead's cautious support with specific milestones; addresses the seed angels (both the engaged and the ghosted) with empathy and information; addresses the legal threats from 2 angels with professionalism (take them seriously without being defensive); makes specific asks (bridge financing exploration, patience, referrals for team rebuilding); the update demonstrates the emotional intelligence and strategic clarity that a turnaround CEO needs to project."
    weight: 0.30
    description: "InvestorSegmentAddressing"
