meta:
  id: post-acquisition-integration
  level: 4
  course: investor-update-writing
  type: output
  description: "Write investor communications managing the post-acquisition integration of a target company, including synergy tracking, cultural challenges, and revised financial projections for a complex multi-stakeholder audience"
  tags: [post-acquisition, integration, synergies, expert]

state: {}

trigger: |
  You're the CEO of a Series C vertical SaaS company
  for property management ($68M ARR, $480M last-round
  valuation, 320 employees) that closed its first major
  acquisition 90 days ago — a competing property
  management platform focused on commercial real estate
  ($22M ARR, 85 employees, $95M purchase price: $60M
  cash + $25M stock + $10M earnout over 2 years).

  Integration status at Day 90:
  - Revenue: Combined run-rate is $87M (vs $90M target
    — lost $3M ARR from customer overlap/churn during
    transition)
  - Headcount: 385 (vs 405 at close; 20 departures,
    mostly from acquired company's sales team)
  - Product integration: Behind schedule — planned Q1
    unified platform launch pushed to Q3; API
    integration proving more complex than diligence
    suggested
  - Cost synergies: Tracking at 60% of plan ($1.8M
    annualized vs $3M target; office consolidation
    complete but engineering tool rationalization delayed)
  - Revenue synergies: Early signs positive — 8 cross-
    sell deals in pipeline ($1.2M potential ARR) but
    none closed yet
  - Cultural challenges: Acquired company had a remote-
    first culture; your company requires 3 days in-
    office; significant friction and 4 senior engineers
    from acquired team have resigned
  - Earnout tension: Acquired CEO (now your SVP
    Commercial) believes integration delays are
    jeopardizing earnout targets and has raised this
    with your Board

  Financial impact:
  - The acquisition was funded with $40M from Series C
    reserves + $20M venture debt (SVB, 3-year term)
  - Burn increased from $2.2M/month to $3.8M/month
    (was supposed to be $3.2M by Day 90)
  - Cash position: $28M (was $32M projected)
  - Runway: 7.4 months at current burn (was 10 months
    projected)
  - Series D timing: Was planned for month 15 post-
    acquisition; may need to accelerate

  Your investors:
  - Series C lead: Tiger Global ($40M, Board seat) —
    approved the acquisition, now concerned about
    execution
  - Series B lead: Insight Partners ($25M, Board seat)
    — was skeptical of the acquisition price
  - Series A lead: Bessemer ($12M, Board observer) —
    supportive but watching burn closely
  - Strategic investor: RealPage ($5M) — a potential
    competitor who invested pre-acquisition; concerned
    about competitive positioning shift
  - Venture debt: SVB ($20M facility) — monitoring
    covenants (ARR-based, minimum $85M combined)
  - Acquired company shareholders: 3 founders + 2 small
    VCs receiving stock consideration; subject to lock-
    up and vesting

  Task: Write a comprehensive Day-90 integration update
  for your investor base that honestly assesses progress
  against plan, addresses the financial implications,
  presents the revised integration timeline, and manages
  the various stakeholder concerns — including the
  earnout tension and venture debt covenant situation.

assertions:
  - type: llm_judge
    criteria: "Response creates a thorough Day-90 integration update that honestly assesses progress against the original acquisition thesis — addresses revenue shortfall ($87M vs $90M target, explaining the $3M churn), headcount attrition (20 departures, cultural friction), product integration delays (Q1 to Q3 push), cost synergy tracking (60% of plan), and early revenue synergy pipeline; presents the financial impact clearly (burn increase, cash position, runway compression); compares actual vs plan on all key metrics; the update would satisfy a Board that approved the acquisition and wants to know if the thesis is still intact."
    weight: 0.35
    description: "IntegrationProgressAssessment"
  - type: llm_judge
    criteria: "Response navigates the multi-stakeholder complexity of post-acquisition communications — addresses Tiger Global's execution concerns (they approved it), Insight's price skepticism (validates or acknowledges their concern), Bessemer's burn monitoring, RealPage's competitive concerns (strategic investor who's also a competitor), SVB's covenant monitoring ($85M ARR minimum vs current $87M run-rate with churn risk), and acquired company shareholders' earnout tension; each stakeholder's specific concern is acknowledged with appropriate detail; the earnout dispute is handled diplomatically but transparently."
    weight: 0.35
    description: "MultiStakeholderNavigation"
  - type: llm_judge
    criteria: "Response presents a credible path forward — includes a revised integration plan with realistic milestones (not just re-promising the original plan); addresses the cultural integration challenge with specific actions (remote policy, retention packages, leadership alignment); presents options for the financial situation (accelerate Series D, reduce burn, draw additional venture debt); discusses how to protect the ARR covenant; addresses the earnout tension constructively (what can the company control vs what's been impacted by integration decisions); the update demonstrates CEO accountability for integration execution while maintaining investor confidence in the long-term thesis."
    weight: 0.30
    description: "PathForwardCredibility"
