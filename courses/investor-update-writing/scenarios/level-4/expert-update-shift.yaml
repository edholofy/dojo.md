meta:
  id: expert-update-shift
  level: 4
  course: investor-update-writing
  type: output
  description: "Write multiple high-stakes investor communications simultaneously — a Board-level quarterly during an active hostile takeover attempt, a confidential investor sidebar about management buyout options, and a public-facing investor FAQ for a company considering dual-class share conversion"
  tags: [hostile-takeover, mbo, dual-class, expert, shift-simulation]

state: {}

trigger: |
  You're the CFO of a publicly-traded-equivalent late-
  stage company ($180M ARR, $1.8B last-round valuation,
  850 employees, has filed S-1 but paused the IPO
  process) facing a convergence of complex investor
  communication challenges.

  Situation 1 — Hostile takeover attempt:
  A large enterprise software company ("AcquireCo,"
  $40B market cap) has made an unsolicited public offer
  to acquire your company for $2.4B (1.33x your last-
  round valuation). AcquireCo has also sent a letter to
  your Board threatening a proxy contest if the offer is
  rejected. Your Board has met twice and believes the
  offer undervalues the company, but 2 of 7 Board
  members (representing investors who entered at the
  Series B at $200M valuation — 12x return at offer
  price) are sympathetic to the offer.

  Key facts:
  - AcquireCo offer: $2.4B all-cash
  - Your Board's view of intrinsic value: $3.5-4.5B
    (based on paused IPO valuation range)
  - AcquireCo has retained proxy solicitation firm
  - Your company has a poison pill (shareholder rights
    plan) triggered at 15% ownership; AcquireCo has
    accumulated 9.8% through open market purchases
  - Deadline for Board response: 21 days (14 remaining)
  - Advisors: Morgan Stanley (financial), Wachtell
    (legal)

  Situation 2 — Management buyout exploration:
  Separately and confidentially, the CEO and 3 other
  executives have approached 2 PE firms (Silver Lake
  and Thoma Bravo) about a potential management buyout
  at $3.2B. This is known only to the CEO, the
  independent Board Chair, and you (CFO). If this leaks,
  it creates massive legal and fiduciary issues.

  MBO considerations:
  - PE firms have expressed preliminary interest
  - CEO's stake: 12% ($384M at MBO price)
  - Management rollover: CEO + executives would roll
    50% of proceeds into the PE-backed entity
  - Financing: 60% leverage ($1.92B debt)
  - Board fiduciary duty: Must consider all alternatives
    that maximize shareholder value
  - Conflict of interest: CEO is both a fiduciary to
    shareholders AND a potential buyer

  Situation 3 — Dual-class share conversion:
  Before the hostile bid, the company was considering
  converting from single-class to dual-class shares
  (10:1 voting) as part of the IPO. This would give
  founders/management voting control even post-IPO.
  Several investors strongly oppose this. The hostile
  bid has complicated this — dual-class would be an
  effective takeover defense but would also entrench
  management.

  Your investors:
  - Series D lead: Coatue ($60M, Board seat) — wants
    to maximize exit value; open to AcquireCo offer if
    price increases to $3B+
  - Series C lead: a]6z ($45M, Board seat) — strongly
    opposes sale, believes in standalone path, supports
    dual-class
  - Series B investors: 2 VCs ($30M combined, 1 Board
    seat shared) — sympathetic to AcquireCo offer (12x
    return); fund is approaching end of life
  - Series A: Angel syndicate ($8M) — divided opinions
  - Employee shareholders: 180 option holders watching
    nervously

  Task: Write three communications:
  1. A Board-level quarterly update that addresses
     company performance while navigating the hostile
     bid (what can be shared with the full Board given
     the MBO is confidential from most Board members)
  2. A strictly confidential memo to the independent
     Board Chair about the MBO exploration, fiduciary
     considerations, and recommended process
  3. An investor FAQ addressing the dual-class share
     structure question in the context of the hostile
     bid — balancing takeover defense with shareholder
     rights concerns

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct communications with appropriate information barriers — the Board quarterly update discusses company performance and the hostile bid response without revealing the MBO exploration (maintains the confidentiality wall); the confidential Chair memo addresses the MBO with full awareness of fiduciary duties, conflicts of interest, and the need for a special committee; the dual-class FAQ addresses governance concerns without tipping strategy on either the hostile bid response or MBO; each document demonstrates awareness of what information can and cannot be shared with each audience; the overall package shows sophisticated understanding of corporate governance in contested situations."
    weight: 0.35
    description: "InformationBarrierManagement"
  - type: llm_judge
    criteria: "Response navigates the legal and fiduciary complexities with precision — addresses Revlon duties (Board obligation to maximize shareholder value once a sale is contemplated); handles the CEO's conflict of interest in the MBO (fiduciary as Board member vs personal interest as buyer); discusses the poison pill appropriately (defensive measure vs entrenchment); addresses the proxy contest threat; handles the dual-class conversion timing (defensive use vs pre-existing plan); discusses the 2 sympathetic Board members' position without being dismissive; references appropriate legal frameworks and advisor roles (Morgan Stanley fairness opinion, Wachtell legal guidance, special committee formation); the communications would withstand scrutiny from securities counsel."
    weight: 0.35
    description: "LegalFiduciaryComplexity"
  - type: llm_judge
    criteria: "Response manages the multi-dimensional stakeholder dynamics — addresses Coatue's price-sensitive position (open to sale at higher price); handles a16z's standalone conviction and dual-class support; acknowledges the Series B investors' fund lifecycle pressure (end-of-life fund, 12x return is attractive); addresses angel and employee shareholder concerns; the Board quarterly maintains operational focus despite the M&A distraction; the dual-class FAQ presents balanced arguments (takeover defense vs shareholder rights vs founder vision protection); the overall communications demonstrate a CFO who can operate at the intersection of corporate finance, governance, and stakeholder management during the most complex situation a company can face."
    weight: 0.30
    description: "StakeholderDynamicsManagement"
