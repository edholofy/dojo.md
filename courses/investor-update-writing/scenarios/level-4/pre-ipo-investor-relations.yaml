meta:
  id: pre-ipo-investor-relations
  level: 4
  course: investor-update-writing
  type: output
  description: "Write the investor communications transitioning from private company updates to pre-IPO investor relations, including quiet period considerations"
  tags: [pre-ipo, investor-relations, quiet-period, expert]

state: {}

trigger: |
  You're the VP of Investor Relations at a late-stage
  technology company ($200M ARR, $2.8B last-round
  valuation, 1,200 employees) that has confidentially
  filed its S-1 with the SEC. You need to manage the
  transition from informal private-company investor
  updates to formal pre-IPO investor communications.

  IPO timeline:
  - S-1 confidential filing: 3 weeks ago
  - SEC comment period: Ongoing (first round of comments
    received; amendments being prepared)
  - Public S-1 filing: Expected in 6 weeks
  - Roadshow: 8-9 weeks from now
  - Pricing: ~10 weeks from now
  - Expected valuation range: $3.5-4.5B
  - Target raise: $400-600M

  Communication challenges:
  1. Quiet period: Once S-1 is public, the company
     enters a "quiet period" limiting what can be
     communicated. But private investors still expect
     updates.
  2. Material non-public information: Private investors
     have MNPI (financial results, S-1 filing) that
     public investors won't have until the S-1 is public.
     Trading restrictions apply.
  3. Regular quarterly update: Q4 results are strong
     ($56M revenue, +38% YoY) and the quarterly update
     is due. But the update will contain financial
     information that may be inconsistent with (or
     supplement) the S-1 disclosures.
  4. Lock-up agreements: All existing investors will be
     subject to 180-day lock-up post-IPO. Some angels
     are unhappy about this and asking questions.
  5. Underwriter guidance: Goldman Sachs (lead left
     bookrunner) has provided guidance on permitted
     communications during the quiet period.

  Investor base:
  - 3 VC Board members (combined 45% ownership)
  - 2 PE growth investors (combined 20%)
  - 1 sovereign wealth fund (8%)
  - 1 strategic investor (5%)
  - 22 angels and early employees (combined 12%)
  - Management and employee pool (10%)

  Specific issues to address:
  - Angel investors asking: "What will the IPO price
    be? When can I sell?" — they need education about
    the process, lock-up, and quiet period
  - PE investors requesting financial model updates for
    their own LP reporting
  - Strategic investor asking about commercial
    relationship post-IPO
  - Sovereign wealth fund requesting assurance about
    their Board observer rights post-IPO

  Task: Write the necessary pre-IPO investor
  communications including a quarterly update compliant
  with quiet period considerations, an IPO process FAQ
  for all investors, and specific responses to each
  stakeholder group's concerns — all reviewed for
  securities law compliance.

assertions:
  - type: llm_judge
    criteria: "Response creates pre-IPO communications with securities law awareness — writes a quarterly update that is careful about quiet period limitations (provides factual information without forward-looking statements or projections that could be construed as offering materials); creates an IPO process FAQ that educates investors about the timeline, quiet period, lock-up, and what to expect; ensures communications don't contain material inconsistent with the S-1; addresses the MNPI concern (private investors have information public investors don't); references underwriter guidance appropriately; the communications would pass legal review by IPO counsel."
    weight: 0.35
    description: "SecuritiesLawCompliance"
  - type: llm_judge
    criteria: "Response addresses each investor group's specific pre-IPO concerns — educates angel investors about IPO mechanics (pricing process, lock-up periods, when they can sell, Rule 144 requirements); addresses PE investors' LP reporting needs (what financial information they can share with their LPs, confidentiality obligations); responds to the strategic investor's commercial relationship question (how the partnership may or may not change post-IPO, public company commercial agreements); addresses the sovereign wealth fund's Board observer rights (corporate governance changes at IPO, ongoing observer rights); each response is tailored to the sophistication level of the audience."
    weight: 0.35
    description: "StakeholderSpecificConcerns"
  - type: llm_judge
    criteria: "Response manages the private-to-public transition professionally — establishes the new communication framework (from informal CEO emails to formal IR function); sets expectations about how communications will change post-IPO (quiet periods, earnings calls, SEC filing requirements); addresses the lock-up conversation with empathy (angels who have waited years for liquidity); discusses the practical timeline for each investor group's eventual liquidity; creates a clear contact structure for the IR function; the overall communications package demonstrates professional investor relations capability appropriate for a company about to become public."
    weight: 0.30
    description: "PrivateToPublicTransition"
