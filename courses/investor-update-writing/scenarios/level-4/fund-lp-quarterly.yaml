meta:
  id: fund-lp-quarterly
  level: 4
  course: investor-update-writing
  type: output
  description: "Write a quarterly LP letter for a venture capital fund with complex portfolio dynamics including markups, write-downs, and liquidity events"
  tags: [vc-fund, lp-letter, portfolio-reporting, expert]

state: {}

trigger: |
  You're the Managing Partner of a $120M early-stage
  venture fund (Fund III). You need to write the Q3
  2026 quarterly LP letter. Your LP base includes 8
  institutional LPs (endowments, foundations, pension
  funds, fund-of-funds) and 12 high-net-worth
  individuals.

  Fund overview:
  - Fund III: $120M, 2023 vintage, 65% deployed
  - Investments: 22 portfolio companies (18 active, 2
    written off, 2 marked up significantly)
  - TVPI (Total Value to Paid-In): 1.42x
  - DPI (Distributions to Paid-In): 0.08x (only one
    small distribution)
  - Net IRR: 28.2% (vs vintage benchmark 18%)
  - Reserve ratio: 40% remaining for follow-on

  Key portfolio events this quarter:

  Positive:
  1. PortfolioCo "CloudSecure" (cybersecurity) raised
     Series B at $280M valuation — your entry was at
     $25M post; $3M invested now marked at $33.6M (11.2x
     MOIC unrealized). This is 42% of total fund value.
  2. PortfolioCo "FoodFlow" (food logistics) acquired
     by Sysco for $52M — your $2M investment returned
     $8.4M (4.2x MOIC realized). First significant DPI
     event.
  3. 3 other companies raised at higher valuations
     (average 2.4x step-up)

  Negative:
  4. PortfolioCo "MetaLearn" (edtech): Write-down from
     $12M fair value to $3M. Company pivoting, runway
     at 6 months, bridge round likely at down valuation.
     Your cost basis: $4M.
  5. PortfolioCo "HealthPay" (healthtech payments):
     CEO departed; interim CEO from Board; company stable
     but growth stalled. Marked flat.
  6. PortfolioCo "CryptoFlow" (DeFi infrastructure):
     Written off completely. Regulatory action forced
     shutdown. $2.5M loss.

  Fund management:
  - Management fee: 2% on committed capital ($2.4M/year)
  - Carried interest: 20% over 8% preferred return
  - Fund expenses this quarter: $680K (management fee +
    fund admin + legal)
  - Capital calls: $8.2M called this quarter for 2
    follow-on investments

  Concentration risk concern:
  - CloudSecure is 42% of total fund value — LP advisory
    committee has raised concern about concentration
  - You need to address the position management strategy
    (hold vs partial secondary sale)

  Upcoming:
  - Fund III is approaching final close for remaining
    commitments
  - Fund IV fundraise planned for Q2 2027

  Task: Write a comprehensive quarterly LP letter
  covering fund performance, portfolio company updates,
  realized and unrealized gains, valuations methodology,
  concentration risk, and fund operations — formatted
  for institutional LPs.

assertions:
  - type: llm_judge
    criteria: "Response writes a professional quarterly LP letter meeting institutional standards — structures appropriately (letter from GP, fund performance summary, portfolio company updates, valuations, capital account summary, fund operations); presents TVPI, DPI, and Net IRR with appropriate benchmarking against vintage year; reports on all key portfolio events (CloudSecure markup, FoodFlow exit, MetaLearn write-down, CryptoFlow write-off); includes a capital calls and distributions summary; presents fund-level financial information (expenses, management fees); addresses the upcoming Fund IV fundraise appropriately; the letter would meet the reporting standards expected by endowments and pension fund LPs."
    weight: 0.35
    description: "InstitutionalLPLetter"
  - type: llm_judge
    criteria: "Response addresses portfolio valuation and concentration with rigor — explains the valuation methodology (ASC 820 fair value, calibration to recent rounds, milestone-based adjustments for companies without recent rounds); presents the CloudSecure markup with appropriate methodology (Series B pricing, discounted for illiquidity if applicable); addresses the MetaLearn write-down rationale transparently; explains the CryptoFlow write-off; discusses the concentration risk (42% of value in CloudSecure) with a thoughtful position management strategy (secondary sale considerations, timing, implications for fund returns); presents the unrealized vs realized return composition; the valuation discussion would withstand LP advisory committee scrutiny."
    weight: 0.35
    description: "ValuationAndConcentration"
  - type: llm_judge
    criteria: "Response navigates the LP relationship dynamics skillfully — balances the positive (strong unrealized returns, first DPI event) with the negative (write-downs, write-off) transparently; addresses the LP advisory committee's concentration concern directly with options; discusses the reserve strategy (40% remaining) in context of follow-on needs; positions the Fund IV fundraise timing appropriately (raising before/after CloudSecure liquidity event has different implications); addresses different LP audience needs (institutional LPs want benchmarking and methodology; HNW LPs want clear explanations); the letter builds confidence in the GP while being fully transparent about losses."
    weight: 0.30
    description: "LPRelationshipNavigation"
