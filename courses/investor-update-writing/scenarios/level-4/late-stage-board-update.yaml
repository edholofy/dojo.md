meta:
  id: late-stage-board-update
  level: 4
  course: investor-update-writing
  type: output
  description: "Write a comprehensive Board update package for a late-stage company preparing for IPO with complex financial reporting requirements"
  tags: [late-stage, board-update, ipo-prep, expert]

state: {}

trigger: |
  You're the CFO of a Series D enterprise software
  company ($180M raised total, $125M ARR, 650 employees,
  $1.2B last-round valuation) that is 12-18 months from
  a potential IPO. Your Board (7 members: 3 investor
  directors, 2 independent directors, CEO, and you)
  requires quarterly Board materials that are approaching
  public-company quality.

  Q3 2026 results:
  Financial performance:
  - Revenue: $32.8M (Q2: $30.2M, +8.6% QoQ, +42% YoY)
  - ARR: $125M (net new: $8.2M this quarter)
  - Subscription gross margin: 82%
  - Total gross margin: 74% (blended with professional
    services at 28% margin)
  - Operating expenses: $38.4M (122% of revenue)
  - GAAP operating loss: -$5.6M (-17% margin)
  - Non-GAAP operating loss: -$1.8M (-5.5% margin, adds
    back $3.8M in stock-based comp)
  - Free cash flow: -$2.1M (improving from -$4.8M in Q2)
  - Cash: $82M
  - Rule of 40 score: 37 (42% growth + -5% operating
    margin)

  Key SaaS metrics:
  - Net revenue retention: 128%
  - Gross revenue retention: 93%
  - Logo churn: 4.2% annually
  - ACV: $185K (enterprise); $42K (mid-market)
  - Enterprise mix: 68% of new ARR (up from 55% last
    year)
  - CAC payback: 18 months (target: 15)
  - Magic number: 0.72 (improving from 0.65)

  IPO readiness:
  - SOX 404 readiness: Internal controls assessment
    65% complete
  - Audit: Big 4 audit firm engaged; restatement of
    prior years in progress
  - CFO office: Hired VP of Investor Relations and
    Director of SEC Reporting
  - Board composition: Need 1 more independent director
    with public company audit committee experience
  - Revenue recognition: ASC 606 implementation complete;
    2 multi-element arrangements flagged for additional
    review
  - D&O insurance: Pre-IPO D&O policy being quoted

  Strategic issues for Board discussion:
  - Competitive: Two competitors are rumored to be
    exploring mergers; combined entity would be formidable
  - International: EMEA growing 65% YoY but requires
    $8M incremental investment in 2027
  - M&A: Inbound acquisition interest from 2 strategic
    acquirers ($1.5-2B range); Board needs to decide
    whether to engage or stay on IPO track
  - Team: VP of Sales departure (announced; replacement
    search underway); Head of Product on parental leave
    for 12 weeks

  Task: Write a comprehensive Board update package that
  includes an executive summary, detailed financial
  analysis with IPO-quality metrics, IPO readiness
  assessment, strategic discussion topics, and specific
  decision items for the Board.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive Board package approaching IPO quality — structures the update in a formal Board-appropriate format (executive summary, financial performance, SaaS metrics dashboard, IPO readiness, strategic issues, decision items); presents both GAAP and non-GAAP metrics with clear reconciliation; includes Rule of 40 analysis, magic number, CAC payback, and other public-market SaaS metrics; presents unit economics at both enterprise and mid-market segments; addresses free cash flow trajectory as an IPO readiness indicator; the package would meet the standard expected by independent directors with public company experience."
    weight: 0.35
    description: "IPOQualityBoardPackage"
  - type: llm_judge
    criteria: "Response addresses IPO readiness assessment comprehensively — covers SOX 404 implementation status and timeline; addresses the ASC 606 flagged arrangements; discusses the audit firm engagement and prior-year restatement; addresses Board composition requirements (additional independent director); presents the IR and SEC reporting hires as execution progress; discusses D&O insurance; addresses the stock-based compensation impact on GAAP vs non-GAAP (important for IPO narrative); evaluates whether the company's metrics are 'IPO ready' (Rule of 40 at 37 is close; NRR 128% is strong; GAAP profitability path matters); identifies remaining gaps and timeline to address them; the IPO readiness section would satisfy a seasoned Board."
    weight: 0.35
    description: "IPOReadinessAssessment"
  - type: llm_judge
    criteria: "Response frames strategic decisions for Board input effectively — presents the M&A inbound interest as a genuine alternative to IPO (not just a distraction) with framework for evaluation ($1.5-2B range vs potential IPO valuation); addresses the competitive merger rumors and their strategic implications; presents the EMEA investment decision with financial analysis ($8M investment vs growth potential); addresses the VP of Sales departure with succession plan and risk mitigation; each strategic issue includes specific questions for Board discussion and decision; the materials demonstrate CFO-level strategic thinking, not just financial reporting."
    weight: 0.30
    description: "StrategicDecisionFraming"
