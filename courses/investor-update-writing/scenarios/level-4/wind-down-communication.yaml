meta:
  id: wind-down-communication
  level: 4
  course: investor-update-writing
  type: output
  description: "Write the investor communications for a company wind-down, including the decision announcement, asset disposition plan, and final distribution communications"
  tags: [wind-down, shutdown, final-communication, expert]

state: {}

trigger: |
  You're the CEO of a Series A startup ($9M raised, down
  to 12 employees from peak of 35) that built a
  blockchain-based supply chain verification platform.
  After 3 years of operation, the Board has voted
  unanimously to wind down the company. You need to
  communicate this to all stakeholders.

  Why wind-down:
  - Market thesis didn't materialize — enterprise
    adoption of blockchain supply chain remained niche
  - ARR plateaued at $840K for 12 months; churn
    increasing
  - Failed to raise Series B (pitched 42 VCs over 6
    months; zero term sheets)
  - Reduced team from 35 to 12 over the past year
  - Cash remaining: $620K
  - Monthly burn (current): $95K
  - Runway: ~6.5 months
  - Board determined that further investment in the
    current direction is not warranted
  - Team is talented; acqui-hire or technology asset
    sale may return some capital

  Asset disposition:
  - Technology IP: 4 patents filed (2 granted); estimated
    value $200-400K
  - Customer contracts: 18 remaining customers; potential
    transition to competitor (2 competitors expressed
    interest in acquiring customer base for $150-250K)
  - Brand/domain: Minor value ($10-20K)
  - Equipment and office: $30K
  - Potential acqui-hire: 3 companies have expressed
    interest in hiring the engineering team (8 people);
    one offered $400K acqui-hire fee

  Estimated returns to investors:
  - Best case: $900K-$1.1M returned (10-12% of invested)
  - Likely case: $600-800K returned (7-9% of invested)
  - Worst case: $300K returned after wind-down costs
    (3% of invested)
  - Liquidation preference: Series A has 1x non-
    participating preferred ($9M)
  - Realistic distribution: All returns go to Series A
    investors; seed investors (angels, $1.5M) and common
    shareholders receive nothing

  Your investors:
  - Series A lead: Venture fund ($5M check, Board seat)
  - Series A co-investor: Corporate VC ($2.5M)
  - Series A participants: 2 angels ($1.5M combined)
  - Seed investors: 12 angels ($1.5M combined at seed)
  - Founder equity: 4 founders with combined 40%
    ownership

  Wind-down timeline:
  - Months 1-2: Customer transition, asset sales, team
    placement
  - Month 3: Final distributions, entity dissolution
  - Legal: Wind-down counsel engaged

  Task: Write the complete set of wind-down investor
  communications — including the initial announcement,
  the asset disposition plan, information about expected
  distributions, and a personal note from the CEO
  reflecting on the journey.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete set of wind-down communications with appropriate gravity — creates the initial announcement (Board decision, rationale, timeline); presents the asset disposition plan (IP, customer contracts, acqui-hire, equipment) with estimated values; communicates the liquidation waterfall clearly (Series A preference, what seed and common receive, why); includes a personal CEO reflection that is genuine and professional; each communication serves its purpose; the overall package treats investors with respect and demonstrates responsible stewardship of their capital even in failure."
    weight: 0.35
    description: "CompleteWindDownCommunications"
  - type: llm_judge
    criteria: "Response handles the financial and legal aspects with precision — explains the liquidation preference waterfall (1x non-participating preferred means Series A gets first $9M; since returns are $600-800K, all goes to Series A; seed and common get nothing); addresses the corporate VC's likely concerns (portfolio write-off implications, any transition rights for customers); discusses the wind-down timeline with specific milestones; addresses ongoing obligations (customer data handling, employee severance, IP assignment, final tax filings); discusses the acqui-hire opportunity honestly (benefits team, provides some capital return); the financial communication would satisfy fund accountants and legal counsel."
    weight: 0.35
    description: "FinancialLegalPrecision"
  - type: llm_judge
    criteria: "Response navigates the emotional and relational dimensions — addresses the seed angels who will receive nothing with empathy and honesty; the CEO's personal note acknowledges failure without self-pity; reflects on lessons learned genuinely; thanks investors for their trust and support; addresses what the founders are doing next (if appropriate); handles the team's transition with care (acqui-hire or placement); doesn't make excuses but provides honest retrospective on what went wrong (market thesis, timing, execution); the communications would preserve professional relationships despite the loss; a seed angel reading this would feel respected even though they lost their investment."
    weight: 0.30
    description: "EmotionalRelationalDimensions"
