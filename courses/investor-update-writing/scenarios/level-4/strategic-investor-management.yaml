meta:
  id: strategic-investor-management
  level: 4
  course: investor-update-writing
  type: output
  description: "Write differentiated investor updates for a company with a complex cap table including competing strategic investors, sovereign wealth funds, and a PE firm with different information rights"
  tags: [strategic-investors, information-rights, cap-table, expert]

state: {}

trigger: |
  You're the CEO of a Series C enterprise AI company
  ($85M raised, $52M ARR, 280 employees) with a
  complex cap table that creates significant investor
  communication challenges.

  Your investor base:
  1. Series C lead: Vista Equity (PE firm, $35M, Board
     seat) — focused on operational metrics, EBITDA
     margin path, wants monthly financial packages
  2. Series B lead: Bessemer Venture Partners ($20M,
     Board seat) — focused on growth metrics, ARR
     trajectory, market positioning
  3. Strategic investor 1: Microsoft (CVC arm, $10M,
     Board observer, information rights) — also a
     customer and distribution partner; competes with
     your AI capabilities in some segments
  4. Strategic investor 2: Salesforce Ventures ($8M,
     information rights) — your product integrates with
     Salesforce; but they just announced a competing AI
     feature
  5. Strategic investor 3: Samsung NEXT ($5M) — invested
     for edge AI capabilities; limited involvement
  6. Series A investors: 2 VC firms ($7M combined)
  7. Seed investors: Angels, mostly inactive

  Information rights complexity:
  - Vista has most extensive rights (monthly financials,
    quarterly Board package, annual audit)
  - Bessemer has standard Board-level rights
  - Microsoft has information rights + competitive
    sensitivity (you can't share certain product roadmap
    details with a competitor)
  - Salesforce has information rights but just became a
    competitor; sharing product roadmap creates risk
  - Samsung NEXT has basic information rights
  - Angels have minimal rights but you maintain goodwill
    updates

  This quarter's developments:
  - ARR: $52M → $58M (+11.5% QoQ, +68% YoY)
  - EBITDA margin: -12% (Vista wants path to +10% within
    18 months)
  - Microsoft partnership: Generating $8M ARR through
    Azure Marketplace distribution (15% of total)
  - Salesforce competitive feature: Their new "Einstein
    AI Agent" directly competes with your core product;
    3 customers have asked if they should switch
  - Product roadmap: Major new capability launching
    that leapfrogs Salesforce's announcement
  - M&A: Exploring acquisition of a 25-person AI
    company ($4M revenue) that would accelerate roadmap

  Task: Write differentiated investor communications
  for each major stakeholder group — considering their
  information rights, competitive sensitivities, and
  strategic interests — while maintaining consistency
  in the core narrative.

assertions:
  - type: llm_judge
    criteria: "Response creates appropriately differentiated communications for different investor groups — Vista's package emphasizes operational metrics, EBITDA path, efficiency gains, and M&A analysis; Bessemer's version focuses on growth trajectory, market positioning, and competitive dynamics; Microsoft's version addresses the partnership value while carefully handling the competitive overlap; Salesforce's version navigates the competitive tension with particular care; the general update for remaining investors provides comprehensive but less sensitive information; each communication maintains the same core narrative while emphasizing different aspects."
    weight: 0.35
    description: "DifferentiatedCommunications"
  - type: llm_judge
    criteria: "Response navigates the competitive investor dynamics with sophistication — handles the Salesforce situation carefully (their Einstein AI Agent competes but they're both a customer and investor); determines what product roadmap information can vs cannot be shared with Microsoft and Salesforce (competitive sensitivity analysis); addresses the customer concerns about switching to Salesforce's product without revealing this to Salesforce; presents the Microsoft partnership revenue ($8M) appropriately to Salesforce (they see it as a competitive dynamic); addresses the M&A opportunity with appropriate confidentiality (who needs to know, who shouldn't know yet); demonstrates understanding of strategic investor management in complex cap tables."
    weight: 0.35
    description: "CompetitiveInvestorNavigation"
  - type: llm_judge
    criteria: "Response addresses the PE vs VC investor dynamic — acknowledges that Vista (PE) and Bessemer (VC) have fundamentally different frameworks for evaluating the business (EBITDA path vs growth trajectory); presents the -12% EBITDA margin differently to each (Vista: path to +10% with specific drivers; Bessemer: investment in growth driving ARR acceleration); addresses how the M&A target fits each investor's perspective (Vista: operational leverage; Bessemer: product acceleration); navigates the Board dynamics where Vista and Bessemer may have different views on profitability vs growth; the communications demonstrate a CEO who can serve multiple masters with different investment theses."
    weight: 0.30
    description: "PEvsVCDynamic"
