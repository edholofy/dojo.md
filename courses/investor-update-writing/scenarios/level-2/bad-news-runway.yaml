meta:
  id: bad-news-runway
  level: 2
  course: investor-update-writing
  type: output
  description: "Write a monthly investor update communicating a significant runway concern and the plan to address it"
  tags: [runway, bad-news, transparency, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A marketplace startup ($8M
  raised 14 months ago, 32 employees) that connects
  independent fitness instructors with corporate wellness
  programs. The business has been growing but more slowly
  than planned, and your burn rate is higher than
  projected. You need to communicate a runway issue.

  Current situation:
  - GMV: $380K/month (plan was $550K by now)
  - Net revenue: $76K/month (20% take rate)
  - Monthly burn: $290K (plan was $240K)
  - Cash: $1.9M
  - Runway: ~6.5 months at current burn
  - Team: 32 people

  What went wrong:
  - Enterprise sales cycle is 6-9 months (originally
    modeled at 3-4 months)
  - Hired too aggressively for sales team (8 AEs) before
    product-market fit in enterprise was fully proven
  - Corporate wellness budgets tightened in Q3 due to
    economic uncertainty
  - Instructor supply side is strong but demand side
    lagging

  Plan to extend runway:
  Option A (preferred): Reduce burn to $180K/month
  through layoffs (reduce team from 32 to 22, primarily
  sales), extending runway to ~10.5 months
  Option B: Raise a bridge round ($1.5-2M) at existing
  valuation from current investors
  Option C: Combination — modest reduction (to 27 people)
  + smaller bridge ($1M)

  Your investors:
  - Lead: Wellness Capital Partners ($4M, Board seat)
  - Co-lead: General VC Fund ($3M, Board observer)
  - Seed investors: 6 angels ($1M combined)

  Your Board (Wellness Capital partner + independent
  director) has been briefed and supports Option C.
  General VC Fund has not been briefed yet.

  You've already discussed this privately with Wellness
  Capital but need to communicate to your full investor
  base including General VC Fund and the angels.

  Task: Write a monthly investor update that transparently
  communicates the runway situation, the root causes, and
  the plan — while maintaining as much investor
  confidence as possible.

assertions:
  - type: llm_judge
    criteria: "Response communicates the runway concern transparently and constructively — doesn't bury the news in the middle of the update; presents the situation honestly (6.5 months runway, below-plan GMV, above-plan burn); explains root causes without making excuses (longer sales cycle, premature hiring, market headwinds); presents the plan (Option C: modest reduction + bridge) with Board alignment; maintains composure and demonstrates leadership — not panicking but not minimizing either; the update would make investors feel the founder has clear-eyed self-awareness and a credible plan."
    weight: 0.35
    description: "TransparentRunwayCommunication"
  - type: llm_judge
    criteria: "Response demonstrates sophistication in handling bad news communication — frames the situation as a course correction, not a failure; acknowledges the hiring mistake (too aggressive before PMF) as a learning; presents the reduction plan with empathy for affected team members; explains why Option C is preferred over pure layoffs or pure bridge; addresses what changes operationally (focus on proven segments, smaller sales team with higher qualification bar); includes specific metrics that will indicate the plan is working; doesn't over-promise or set unrealistic recovery timelines."
    weight: 0.35
    description: "BadNewsSophistication"
  - type: llm_judge
    criteria: "Response navigates the multi-stakeholder dynamics appropriately — acknowledges Board alignment on the plan (Wellness Capital briefed); frames the bridge round ask specifically (amount, terms, timeline); addresses what this means for the company's path (adjusted timeline to Series B vs original plan); makes specific asks of investors beyond just money (introductions to proven corporate wellness buyers, bridge participants); sets expectations for increased update frequency during this period; the update would maintain trust with sophisticated institutional investors and avoid alarming angel investors unnecessarily."
    weight: 0.30
    description: "MultiStakeholderNavigation"
