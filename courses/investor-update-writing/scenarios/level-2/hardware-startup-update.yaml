meta:
  id: hardware-startup-update
  level: 2
  course: investor-update-writing
  type: output
  description: "Write a quarterly investor update for a hardware startup navigating manufacturing delays and supply chain challenges"
  tags: [hardware, manufacturing, supply-chain, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A hardware startup ($7M
  raised, 20 employees) that makes a smart air quality
  monitor for commercial buildings. You're in the
  transition from prototype to volume manufacturing
  and facing typical hardware startup challenges.

  Q3 2026 update:

  Manufacturing:
  - Production partner in Shenzhen delivered first 500
    units (Batch 1) — 3 weeks late
  - Quality: 94% pass rate on QA (target was 98%); main
    issue is LED alignment on 6% of units (cosmetic,
    not functional)
  - BOM cost: $142/unit (target was $125); difference
    due to upgraded sensor component ($18 more expensive)
    and lower-than-expected volume discount
  - Batch 2 (2,000 units): Ordered, expected December —
    tooling modifications underway to fix LED issue
  - Batch 3 (5,000 units): Planning for Q1 2027

  Sales and revenue:
  - Units shipped: 380 (remaining 120 of Batch 1
    reserved for demos and replacements)
  - Revenue: $285K (average selling price $750/unit)
  - Pipeline: $1.8M in active proposals (12 commercial
    building management companies)
  - Recurring revenue: SaaS monitoring subscription
    $45/unit/month — $17.1K MRR from 380 active units
  - Hardware gross margin: 27% (target 40% — below due
    to BOM cost and low volumes)
  - Combined hardware + SaaS gross margin: 52%

  Product:
  - New firmware update: Added predictive HVAC
    optimization (reduces energy costs 8-12% in pilot
    buildings)
  - UL certification obtained
  - FCC certification obtained
  - CE marking application submitted (EU market entry)

  Challenges:
  - BOM cost needs to come down 12% for target margins
    (working with supplier on volume pricing for Batch 3)
  - Supply chain risk: Main particulate sensor has single
    source (Japanese supplier); exploring second source
  - Installation complexity: Average installation time is
    4 hours (target was 2 hours); designing mounting
    bracket improvement
  - Cash: $3.8M remaining; burn $210K/month; runway 18
    months — but $420K inventory purchase for Batch 2
    in November will reduce effective runway

  Task: Write a quarterly investor update that
  communicates the hardware manufacturing journey with
  appropriate context for what's normal in hardware
  vs. what's concerning.

assertions:
  - type: llm_judge
    criteria: "Response effectively communicates hardware startup dynamics — addresses manufacturing delays and quality issues with appropriate context (3-week delay and 94% pass rate are common for first production runs); explains BOM cost variance ($142 vs $125 target) with clear plan to achieve target at volume; presents the combined hardware + SaaS gross margin (52%) as the more meaningful long-term metric; addresses supply chain risks (single-source sensor) with mitigation plans; explains the cash flow timing impact of inventory purchases; the update would satisfy investors familiar with hardware scaling challenges."
    weight: 0.35
    description: "HardwareDynamicsCommunication"
  - type: llm_judge
    criteria: "Response addresses the hardware-specific metrics and milestones — presents regulatory certifications (UL, FCC, CE) as significant milestones; explains the volume scaling plan (Batch 1: 500, Batch 2: 2,000, Batch 3: 5,000) and cost reduction trajectory; frames the LED alignment issue appropriately (cosmetic, not functional, with fix planned for Batch 2); highlights the predictive HVAC feature as differentiation (energy cost reduction is a compelling ROI story); explains the installation time challenge and improvement plan; the pipeline ($1.8M) is properly contextualized against available inventory; the metrics mix of hardware and SaaS revenue is presented clearly."
    weight: 0.35
    description: "HardwareMetrics"
  - type: llm_judge
    criteria: "Response manages expectations and highlights milestones — frames what's normal for hardware at this stage (first batch delays, QA iteration, BOM cost optimization over volumes) vs what needs attention (single-source risk, installation complexity); presents the path from 27% hardware margin to 40% target with specific drivers; addresses the cash flow complexity of hardware (inventory purchases, working capital); makes relevant asks (manufacturing expertise, building management company intros, EU market connections for CE certification); the update educates investors who may be more familiar with software economics."
    weight: 0.30
    description: "ExpectationManagement"
