meta:
  id: series-a-quarterly
  level: 2
  course: investor-update-writing
  type: output
  description: "Write a quarterly investor update for a Series A SaaS company with a mixed investor base of institutional VCs and angels"
  tags: [series-a, quarterly, saas, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A SaaS company ($12M
  raised, 45 employees) that provides a customer
  success platform for mid-market SaaS companies. You
  report quarterly to your Board (3 members) and send
  a slightly different quarterly update to your broader
  investor base (2 VC firms, 1 strategic investor from
  Salesforce Ventures, and 15 angels from seed round).

  Q2 2026 results:
  - ARR: $4.8M (up from $3.9M in Q1, +23% QoQ)
  - MRR: $400K
  - Customers: 128 (up from 108, +19%)
  - New logo ARR added: $1.1M
  - Expansion ARR: $320K
  - Churned ARR: $520K (significant — lost 2 large
    accounts worth $340K combined)
  - Net revenue retention: 104% (down from 112% in Q1)
  - Gross revenue retention: 88% (below 90% target)
  - ACV: $37.5K
  - CAC: $42K (CAC payback: 14 months)
  - LTV/CAC: 4.2x
  - Gross margin: 72%

  Team:
  - Added VP of Customer Success (from Gainsight)
  - Engineering team: 18 (hired 3 this quarter)
  - Sales team: 8 (hired 2 SDRs)
  - Total headcount: 45 (was 38)

  Financial:
  - Burn: $380K/month (up from $320K)
  - Cash: $7.2M
  - Runway: 19 months

  Key wins:
  - Signed first $200K ACV enterprise deal (Fortune 500
    telecom company)
  - Launched AI-powered health score feature (early
    differentiation)
  - Won "Best Customer Success Tool" at SaaStr Annual

  Key concerns:
  - Churn: Lost Acme Corp ($220K ACV) — they were
    acquired; lost TechFlow ($120K ACV) — switched to
    Gainsight citing missing enterprise features
  - NRR declined from 112% to 104% — concerning trend
  - CAC payback at 14 months is above 12-month target
  - Burn increased 19% while ARR grew 23%

  Task: Write a quarterly investor update appropriate
  for your mixed investor base (VCs, strategic investor,
  angels) that addresses both the positive developments
  and the concerning metrics honestly.

assertions:
  - type: llm_judge
    criteria: "Response writes a sophisticated quarterly update that balances good and concerning news — presents the ARR growth (23% QoQ) and new logo performance alongside the churn concerns transparently; addresses the NRR decline (112% to 104%) with analysis (acquisition churn vs competitive churn); contextualizes the two large account losses differently (Acme: uncontrollable M&A event; TechFlow: competitive loss requiring product response); presents the SaaS metrics comprehensively and accurately; the update would satisfy sophisticated VC investors who understand SaaS unit economics."
    weight: 0.35
    description: "SophisticatedQuarterlyUpdate"
  - type: llm_judge
    criteria: "Response demonstrates advanced SaaS metric communication — distinguishes between gross and net revenue retention; explains the churn composition (M&A churn vs competitive churn — only competitive churn is actionable); addresses the CAC payback exceeding target and what's being done about it; frames the burn increase relative to ARR growth (burn efficiency); contextualizes the Gainsight competitive loss (product gap vs positioning issue); explains how the VP of Customer Success hire addresses the churn trend; the enterprise deal ($200K ACV) is positioned as validating market expansion while acknowledging it changes the business dynamics."
    weight: 0.35
    description: "AdvancedSaaSMetrics"
  - type: llm_judge
    criteria: "Response is appropriate for the mixed investor audience — the content works for institutional VCs (who want SaaS metrics depth), the Salesforce Ventures strategic investor (who cares about competitive positioning vs Gainsight), and seed-round angels (who need more context on what the numbers mean); addresses the strategic investor dynamic thoughtfully (lost a customer to Gainsight, which is a Salesforce portfolio company); includes specific asks and priorities; the update demonstrates executive-level communication skills appropriate for a $12M-funded company."
    weight: 0.30
    description: "MixedAudienceAppropriate"
