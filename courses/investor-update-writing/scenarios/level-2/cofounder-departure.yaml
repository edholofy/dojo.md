meta:
  id: cofounder-departure
  level: 2
  course: investor-update-writing
  type: output
  description: "Write an investor update addressing a co-founder departure and its implications for the company"
  tags: [cofounder, departure, team-change, intermediate]

state: {}

trigger: |
  You're the CEO of a seed-stage startup ($3M raised,
  14 employees) that builds AI-powered document analysis
  tools for law firms. Your co-founder and CTO, Alex
  Kim, has decided to leave the company. This is the
  most sensitive investor communication you've had to
  write.

  Situation:
  - Alex has been with the company since inception (2.5
    years)
  - He owns 22% of the company (vesting schedule: 4-year
    with 1-year cliff; 2.5 years vested — 62.5% vested)
  - Departure reason: Combination of burnout and
    disagreement about product direction (Alex wanted to
    build horizontal AI tools; you and the Board believe
    the legal vertical focus is the right strategy)
  - The departure is amicable — Alex will stay for 60
    days to transition; has agreed to be an advisor for
    12 months; non-compete in place
  - Alex's unvested shares (37.5% of his grant) will be
    forfeited per the shareholder agreement

  Impact on the company:
  - 3 engineers report to Alex; they are staying
  - Alex was the primary architect of the ML pipeline
  - You've already begun CTO search through a retained
    recruiter
  - Your Head of Engineering (18 months at the company)
    has been promoted to interim CTO
  - Product roadmap: No delay to Q1 deliverables; Q2
    AI feature launch may shift by 4-6 weeks

  Current business metrics (include in update):
  - ARR: $820K (up from $680K last quarter)
  - Customers: 34 law firms
  - Burn: $95K/month
  - Cash: $2.1M
  - Runway: 22 months

  Your investors:
  - Lead VC fund (Board seat)
  - 2 angel investors who know Alex personally
  - 5 other angels

  Task: Write an investor update that addresses Alex's
  departure honestly and reassuringly while continuing
  to report business progress.

assertions:
  - type: llm_judge
    criteria: "Response handles the co-founder departure with appropriate seriousness and transparency — addresses the departure directly and early in the update (doesn't bury it); provides enough context on the reason without airing dirty laundry (strategic disagreement framed professionally); emphasizes the amicable nature (60-day transition, advisory role); addresses the equity implications factually; acknowledges the significance (co-founder departure is a big deal) without catastrophizing; the tone is measured — acknowledges the loss while demonstrating stability."
    weight: 0.35
    description: "CofounderDepartureHandling"
  - type: llm_judge
    criteria: "Response addresses continuity and risk mitigation credibly — explains the interim CTO promotion and why this person is capable; addresses the engineering team stability (3 direct reports staying); provides realistic product roadmap impact (Q1 on track, Q2 may shift 4-6 weeks — specific and honest); describes the CTO search process (retained recruiter already engaged); the transition plan demonstrates preparedness, not reaction; addresses the ML pipeline knowledge transfer specifically; the response would satisfy a Board-seat VC that the company won't be derailed by this departure."
    weight: 0.35
    description: "ContinuityPlan"
  - type: llm_judge
    criteria: "Response navigates the personal dynamics thoughtfully — considers that 2 angel investors know Alex personally (may hear his side of the story); keeps the messaging professional and gracious toward Alex (acknowledges his contributions); maintains alignment with the Board-approved strategy (legal vertical focus); includes the regular business update (ARR, customers, metrics) to show the company continues executing; makes appropriate asks (CTO search referrals, patience during transition); the overall update preserves relationships with all stakeholders."
    weight: 0.30
    description: "PersonalDynamicsNavigation"
