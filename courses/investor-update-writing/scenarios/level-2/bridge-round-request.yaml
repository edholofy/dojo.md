meta:
  id: bridge-round-request
  level: 2
  course: investor-update-writing
  type: output
  description: "Write an investor update that requests bridge financing from existing investors when the Series A is taking longer than expected"
  tags: [bridge-round, fundraising, ask, intermediate]

state: {}

trigger: |
  You're the CEO of a seed-stage startup ($2.5M raised
  22 months ago, 15 employees) that provides an AI
  writing assistant for commercial real estate brokers.
  You've been fundraising for your Series A for 3 months
  with no term sheet yet, and you need bridge financing.

  Business metrics (actually good):
  - ARR: $960K (up from $480K 12 months ago — 2x growth)
  - MRR: $80K
  - Customers: 52 CRE brokerages
  - Net revenue retention: 125%
  - Monthly churn: 0.8% (excellent)
  - Average ACV: $18.5K

  Why Series A hasn't closed:
  - Started fundraising in September (worst VC timing)
  - First 2 VC partners who were championing you
    internally didn't get approval from their
    partnerships
  - CRE-tech is a niche market — many generalist VCs
    pass without deep diligence
  - You've met with 28 firms, have 4 in active diligence
  - Two of the 4 expect to make decisions in 6-8 weeks

  Financial reality:
  - Burn: $105K/month
  - Cash: $420K
  - Runway: 4 months (critical)
  - You need $500-750K bridge to maintain operations
    while Series A process completes

  Bridge proposal:
  - Amount: $500-750K
  - Structure: Convertible note with 20% discount to
    Series A, $15M cap (current seed post-money was $10M)
  - Requesting pro-rata participation from existing
    investors
  - Existing investors:
    - PropTech Capital (lead, $1.2M) — verbally committed
      to $200K bridge
    - RealTech Angels syndicate ($600K) — haven't asked
    - 7 individual angels ($700K combined) — haven't
      asked

  Task: Write an investor update that communicates the
  bridge round request honestly and compellingly —
  framing it as a timing issue with a strong business,
  not a business failure requiring emergency capital.

assertions:
  - type: llm_judge
    criteria: "Response communicates the bridge request effectively — frames the need clearly (Series A timing, not business fundamentals); presents the business metrics prominently to demonstrate underlying strength ($960K ARR, 2x growth, 125% NRR, 0.8% churn); explains the Series A process status honestly (28 firms met, 4 in active diligence, 2 expected decisions in 6-8 weeks); addresses runway directly (4 months); presents the bridge terms clearly (amount, structure, cap, discount); mentions PropTech Capital's verbal commitment as social proof; the request feels like a bridge to inevitable success, not a bailout."
    weight: 0.35
    description: "EffectiveBridgeRequest"
  - type: llm_judge
    criteria: "Response handles the fundraising challenges transparently — explains the timing factors (September start, partnership dynamics) without blaming VCs; addresses the niche market challenge honestly (CRE-tech requires specialized investor interest); presents the pipeline of 4 firms in active diligence as evidence that Series A will happen; provides a realistic timeline for closure (6-8 weeks); addresses what happens if Series A doesn't close with the current pipeline (plan B); the communication builds confidence that the founder understands the fundraising landscape and has a credible path forward."
    weight: 0.35
    description: "FundraisingTransparency"
  - type: llm_judge
    criteria: "Response navigates the ask mechanics appropriately — explains the convertible note structure in investor-friendly terms; addresses pro-rata rights and participation expectations; provides clear next steps (timeline to commit, documentation process); frames the bridge as an opportunity (20% discount to Series A creates favorable economics for bridge participants); doesn't pressure investors but makes the opportunity clear; addresses what the bridge capital will fund specifically (maintaining team, continuing sales, supporting Series A close process); appropriate urgency without desperation."
    weight: 0.30
    description: "AskMechanics"
