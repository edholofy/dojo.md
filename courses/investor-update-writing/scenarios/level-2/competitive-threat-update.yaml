meta:
  id: competitive-threat-update
  level: 2
  course: investor-update-writing
  type: output
  description: "Write a monthly investor update addressing a major competitive threat from a well-funded competitor or big tech entry"
  tags: [competitive-threat, strategy, positioning, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A startup ($10M raised, 35
  employees) that provides AI-powered meeting
  transcription and action item extraction for sales
  teams. Last week, Microsoft announced that Teams will
  include free AI meeting summaries and action items in
  its next update — directly overlapping with your core
  product.

  Your situation:
  - ARR: $3.2M
  - Customers: 180 (mostly mid-market, 100-1000
    employees)
  - Growth: 18% QoQ
  - Your differentiation (you believe): Sales-specific
    intelligence (competitor mentions, objection tracking,
    deal risk scoring, CRM integration), not just generic
    meeting summaries
  - 80% of your customers use Zoom, not Teams
  - Your NPS is 68; customer interviews show value from
    sales coaching features, not just transcription
  - Churn has been 1.5% monthly

  Impact assessment:
  - Teams customers (20% of base, ~$640K ARR) at highest
    risk
  - New customer acquisition may slow as prospects ask
    "why not just use Teams?"
  - Your outbound email response rate dropped 30% in the
    week since the announcement
  - Your sales team is asking for competitive positioning
    guidance
  - Two prospects in late-stage evaluation paused
    decisions "to see the Teams feature"
  - Stock in trade press covered the Microsoft
    announcement; one article mentioned your company
    as a potential casualty

  What you're doing:
  - Commissioning a formal competitive analysis
  - Doubling down on sales-specific features (releasing
    deal risk scoring in 2 weeks)
  - Launching "Why We're Different" content campaign
  - Preemptively reaching out to all Teams-using
    customers
  - Considering a pricing response for net-new Teams
    customers

  Task: Write a monthly investor update that addresses
  the Microsoft competitive entry directly and
  demonstrates strategic clarity about how the company
  will respond.

assertions:
  - type: llm_judge
    criteria: "Response addresses the competitive threat directly and strategically — doesn't minimize the Microsoft announcement (investors have already seen the news); presents a clear analysis of the threat level (which customers at risk, which segments defensible); articulates the company's differentiation with specificity (sales intelligence, not generic transcription); addresses the immediate impact honestly (outbound response rate drop, paused prospects, press coverage); presents the response plan with concrete actions; the update demonstrates that the CEO is clear-eyed about the threat and strategic about the response."
    weight: 0.35
    description: "CompetitiveResponseStrategy"
  - type: llm_judge
    criteria: "Response distinguishes between hype and reality in the competitive analysis — explains what Microsoft will likely offer (good-enough generic meeting summaries) vs what the startup offers (sales-specific intelligence, coaching, deal risk); references the historical pattern of big tech entries into vertical software markets (generalist vs specialist); addresses the 80/20 Zoom vs Teams split in the customer base (mitigating factor); explains why existing customers (NPS 68, value from coaching features) are less at risk than prospects; provides a framework for evaluating the actual competitive impact over the next 3-6 months (leading indicators to watch); the analysis would satisfy a VC Board member."
    weight: 0.35
    description: "CompetitiveAnalysisDepth"
  - type: llm_judge
    criteria: "Response maintains business momentum alongside competitive response — still includes standard metrics (ARR, growth, churn); presents the product roadmap acceleration (deal risk scoring in 2 weeks) as both competitive response and planned development; addresses the sales team morale and positioning issue; makes specific asks of investors (competitive intelligence, customer introductions, press/analyst relationships); doesn't let the competitive news dominate the entire update — balances with business progress; the update conveys confidence without dismissiveness."
    weight: 0.30
    description: "MomentumAlongsideResponse"
