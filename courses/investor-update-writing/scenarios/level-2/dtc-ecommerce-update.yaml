meta:
  id: dtc-ecommerce-update
  level: 2
  course: investor-update-writing
  type: output
  description: "Write a quarterly investor update for a DTC e-commerce brand navigating seasonal dynamics and inventory challenges"
  tags: [dtc, ecommerce, seasonal, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A DTC skincare brand ($5M
  raised, 18 employees) that sells premium, science-
  backed skincare products online and through select
  retail partnerships. You're writing your Q3 2026
  quarterly update heading into the critical Q4 holiday
  season.

  Q3 2026 metrics:
  - Revenue: $1.42M (Q2: $1.68M, Q3 2025: $980K)
  - YoY growth: +45%
  - QoQ decline: -15% (expected — Q2 included a product
    launch; Q3 is historically weakest quarter)
  - Gross margin: 68% (down from 72% due to ingredient
    cost increases)
  - Contribution margin after fulfillment: 42%
  - Customer acquisition:
    - New customers: 8,400 (Q2: 11,200)
    - Blended CAC: $38 (up from $32, Meta CPMs increased)
    - CAC payback: 4.2 months
  - Retention:
    - 90-day repurchase rate: 34% (target: 40%)
    - Subscription revenue as % of total: 28%
    - Average order value (AOV): $62 (up from $58)
  - Retail: Now in 145 Sephora locations (up from 80)
  - Burn: $180K/month
  - Cash: $2.8M
  - Runway: 15 months

  Q4 preparation:
  - Holiday gift sets designed (3 SKUs, higher margin)
  - Sephora holiday placement confirmed (endcap in 145
    stores)
  - Influencer gifting program: 200 micro-influencers
    confirmed
  - Inventory: Ordered $420K of inventory for Q4 (cash
    impact in October)
  - Q4 revenue target: $2.4M (would bring annual to
    $7.2M, up from $4.8M last year)

  Concerns:
  - Ingredient cost inflation (shea butter +22%, niacin-
    amide +15%) pressuring margins
  - Meta ad costs up 18% YoY; exploring TikTok Shop but
    early results mixed
  - Retail wholesale margin (45%) significantly lower
    than DTC margin (68%)
  - Subscription churn at 8% monthly (higher than target)
  - $420K inventory purchase reduces cash position
    significantly before Q4 revenue arrives

  Task: Write a quarterly investor update that
  effectively communicates the seasonal DTC dynamics,
  prepares investors for the Q4 push, and addresses
  the margin and inventory concerns.

assertions:
  - type: llm_judge
    criteria: "Response effectively communicates DTC seasonal dynamics — frames the Q3 QoQ revenue decline within seasonal context (historically weakest quarter, no product launch); emphasizes YoY growth (45%) as the more meaningful comparison; explains the Q4 opportunity with specific plans (holiday sets, Sephora endcaps, influencer program); addresses the $420K inventory investment and its cash flow timing impact; presents the Q4 revenue target ($2.4M) with supporting evidence for achievability; the update educates investors on DTC seasonality if they're not DTC specialists."
    weight: 0.35
    description: "DTCSeasonalDynamics"
  - type: llm_judge
    criteria: "Response addresses margin and unit economics with sophistication — analyzes the gross margin compression (68% from 72%) with ingredient cost specifics; discusses the channel mix impact on blended margins (DTC 68% vs retail wholesale 45%); addresses CAC inflation honestly and the exploration of alternative channels; explains subscription metrics (28% of revenue, 8% monthly churn) as both a strength and area for improvement; presents contribution margin (42%) as the true profitability indicator; the financial analysis would satisfy investors experienced with DTC/CPG economics."
    weight: 0.35
    description: "MarginUnitEconomics"
  - type: llm_judge
    criteria: "Response balances optimism about Q4 with realistic risk assessment — presents the Q4 plan with confidence (Sephora placement, holiday sets, influencer campaign) while acknowledging risks (ad cost inflation, inventory cash impact, margin pressure); discusses what success looks like and what would be concerning; addresses the retail expansion strategically (growth driver vs margin dilution trade-off); makes specific asks relevant to DTC (retail buyer intros, influencer connections, Q4 promotional strategy input); the update demonstrates a founder who understands DTC P&L dynamics deeply."
    weight: 0.30
    description: "Q4OptimismWithRealism"
