meta:
  id: biotech-milestone-update
  level: 2
  course: investor-update-writing
  type: output
  description: "Write a quarterly investor update for a biotech startup focused on R&D milestones rather than revenue metrics"
  tags: [biotech, r-and-d, milestones, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A biotech startup ($18M
  raised, 28 employees) developing a novel small molecule
  drug for treatment-resistant depression. Your investor
  updates focus on R&D and regulatory milestones rather
  than revenue metrics since the company is pre-revenue.

  Q3 2026 update:

  Clinical development:
  - Phase 1b/2a trial: Enrolled 48 of 60 target patients
    (80% enrollment); ahead of schedule by 3 weeks
  - Safety data: No serious adverse events (SAEs) in
    first 36 patients dosed; mild side effects consistent
    with mechanism of action
  - Preliminary efficacy signals: In the open-label lead-
    in cohort (n=18), 61% of patients showed ≥50%
    improvement on MADRS scale at Week 6 (historically,
    ketamine showed ~50% in similar populations)
  - Data readout: Topline Phase 1b/2a data expected Q1
    2027

  Regulatory:
  - FDA Type B Pre-IND meeting: Confirmed alignment on
    Phase 2b trial design (randomized, double-blind,
    placebo-controlled, 200 patients)
  - Fast Track Designation: Application submitted; FDA
    response expected within 60 days
  - IP: 2 new composition-of-matter patents filed
    (extending protection to 2044)

  Business development:
  - 3 pharma company meetings at JP Morgan Healthcare
    Conference (January) — partnership/licensing
    discussions initiated
  - KOL advisory board meeting: 8 leading psychiatrists
    reviewed data and provided positive feedback on
    trial design

  Team:
  - Hired Chief Medical Officer (previously CMO at a
    mid-size pharma, led 3 CNS drug approvals)
  - Added 2 clinical operations managers

  Financial:
  - Burn: $520K/month (up from $480K due to clinical
    trial costs)
  - Cash: $11.2M
  - Runway: 21 months
  - Projected cash needs: Will need $30-40M Series B
    to fund Phase 2b trial (start fundraising Q2 2027)

  Risks:
  - Enrollment in 2 sites slower than others (site
    management issue, not patient interest)
  - One competing program (by Neurocure Therapeutics)
    announced positive Phase 2 data, though different
    mechanism of action
  - FDA meeting on Fast Track response could be delayed

  Task: Write a quarterly investor update appropriate
  for biotech investors, focusing on R&D milestones,
  regulatory progress, and scientific de-risking.

assertions:
  - type: llm_judge
    criteria: "Response writes a biotech-appropriate investor update — structures around clinical/regulatory milestones rather than revenue metrics; presents clinical data accurately (enrollment, safety, preliminary efficacy signals with appropriate caveats); explains the MADRS improvement data in context (comparison to ketamine benchmark); addresses regulatory interactions (FDA Type B meeting, Fast Track application); presents IP developments (patent protection timeline); includes financial runway discussion tied to Series B timing; the update reads like it was written by a biotech CEO for biotech investors."
    weight: 0.35
    description: "BiotechAppropriateUpdate"
  - type: llm_judge
    criteria: "Response handles preliminary efficacy data communication appropriately — presents the open-label data (61% response rate) with proper scientific caveats (small sample, open-label bias, lead-in cohort not randomized); positions the data as 'encouraging signal' not 'proof of efficacy'; contextualizes against ketamine benchmark without overclaiming; explains why the Phase 2b design (RCT) will provide definitive data; addresses the competitive landscape (Neurocure) factually and differentiates mechanism of action; the CMO hire is positioned as de-risking for the Phase 2b program; the data presentation would be appropriate for sophisticated life science investors."
    weight: 0.35
    description: "EfficacyDataCommunication"
  - type: llm_judge
    criteria: "Response addresses biotech-specific investor concerns — discusses cash runway in context of next clinical milestone (21 months runway vs Q1 2027 data readout gives 6+ months of post-data fundraising window); frames Series B timing and size ($30-40M) based on Phase 2b trial requirements; addresses partnership/licensing discussions appropriately (early stage, don't overclaim); presents risks honestly (site enrollment variability, competitive programs, FDA timing); the KOL advisory board feedback is properly framed as external validation; makes relevant asks (JP Morgan Healthcare Conference intros, Series B investor introductions, KOL connections); the financial planning demonstrates awareness of biotech capital intensity."
    weight: 0.30
    description: "BiotechInvestorConcerns"
