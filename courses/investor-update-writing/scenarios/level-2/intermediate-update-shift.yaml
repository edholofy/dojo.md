meta:
  id: intermediate-update-shift
  level: 2
  course: investor-update-writing
  type: output
  description: "Handle an intermediate shift where you must write a quarterly update during an active fundraise while managing sensitive information and different stakeholder needs"
  tags: [shift-simulation, fundraise, stakeholders, intermediate]

state: {}

trigger: |
  You're the CEO of a Series A fintech startup ($9M
  raised, 28 employees) that provides embedded lending
  infrastructure for SaaS platforms. You're in the
  middle of a Series B fundraise and need to write
  several investor communications today.

  Communication 1 — Quarterly Update to All Investors:
  Q4 2026 was your best quarter, and you need to share
  results with your full investor base (2 VC firms, 1
  corporate strategic investor from a major bank, 10
  angels). But you're mid-Series B process and need to
  be careful about what you share publicly vs. privately.

  Q4 metrics:
  - ARR: $8.2M (Q3: $6.4M, +28% QoQ)
  - Loan originations through platform: $48M (Q3: $32M)
  - Platform partners: 24 SaaS companies (Q3: 18)
  - Net revenue retention: 142%
  - Default rate on loans: 2.1% (below 3% target)
  - Gross margin: 65%
  - Burn: $320K/month; Cash: $4.8M; Runway: 15 months

  Communication 2 — Confidential Update to Lead VC:
  Your lead VC (Board member) needs a private update on
  the Series B process:
  - You've received 2 term sheets: Tier 1 VC offering
    $25M at $120M pre-money; Growth equity firm offering
    $35M at $100M pre-money
  - You're leaning toward the Tier 1 VC (better brand,
    better terms despite lower check, board member would
    be very helpful) but the valuation difference is
    significant
  - Your lead VC has signaled they want to invest $3M
    in the Series B (pro-rata)
  - You need the lead's advice on negotiation strategy

  Communication 3 — Response to Strategic Investor:
  The corporate strategic investor (major bank, invested
  $2M at Series A) has emailed asking: "We're hearing
  you may be raising. We'd like to discuss increasing
  our position and potentially exploring a deeper
  commercial partnership. Can we talk this week?"
  You need to respond carefully — the bank could be a
  valuable partner but strategic investors in fintech
  can complicate VC dynamics.

  Task: Write all three communications with appropriate
  information boundaries, tone, and strategic awareness
  for each audience.

assertions:
  - type: llm_judge
    criteria: "Response produces three communications with clear information boundaries — the quarterly update shares strong metrics without revealing fundraise details, term sheets, or valuation discussions; the lead VC update is appropriately confidential with specific fundraise details; the strategic investor response is warm but careful, not revealing other term sheets or specific terms; information that should be private (term sheets, valuations) is not leaked into the broader update; each communication contains only information appropriate for its audience."
    weight: 0.35
    description: "InformationBoundaries"
  - type: llm_judge
    criteria: "Response navigates the multi-stakeholder dynamics with strategic sophistication — the quarterly update implicitly positions the company for Series B without explicitly announcing fundraise (strong metrics speak for themselves); the lead VC communication seeks genuine advice on the term sheet decision (Tier 1 brand vs growth equity valuation); the strategic investor response manages expectations (interest without commitment, avoids creating FOMO or desperation); addresses the potential complication of strategic investors in VC rounds; the three communications work together as a coherent investor relations strategy."
    weight: 0.35
    description: "StrategicSophistication"
  - type: llm_judge
    criteria: "Response demonstrates fintech-specific investor communication — the quarterly update highlights fintech-relevant metrics (loan originations, default rates, platform partners, net revenue retention); the lead VC communication shows awareness of Series B dynamics (brand value vs check size vs valuation trade-offs); the strategic investor response acknowledges the value of a banking partnership while maintaining negotiating leverage; each communication demonstrates understanding of embedded lending/fintech positioning; the overall approach would make all stakeholders feel well-managed."
    weight: 0.30
    description: "FintechSpecificCommunication"
