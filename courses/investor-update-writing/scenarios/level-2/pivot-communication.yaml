meta:
  id: pivot-communication
  level: 2
  course: investor-update-writing
  type: output
  description: "Write an investor update communicating a significant product pivot and new strategic direction"
  tags: [pivot, strategic-change, communication, intermediate]

state: {}

trigger: |
  You're the CEO of a seed-stage startup ($2.8M raised
  10 months ago, 11 employees) that originally built a
  consumer social app for sharing recipes. After 10
  months, the consumer metrics are disappointing and
  you've decided to pivot to a B2B food content platform
  for grocery brands.

  Why you're pivoting:
  - Consumer app: 22,000 downloads but only 1,800 MAU
    (8% retention — well below the 25%+ needed for a
    social app)
  - Failed to find viral loop — users create content but
    don't invite friends
  - Consumer monetization unclear (tested ads, users
    hated them; tested premium, <1% conversion)
  - CAC for consumer social is $12-18 per user (not
    sustainable)
  - However: Grocery brands have been reaching out
    asking to sponsor recipes and create branded content
    on the platform
  - 3 brands (a major yogurt brand, a olive oil company,
    and a meal kit service) have expressed willingness to
    pay $5K-15K/month for branded recipe content tools

  The pivot:
  - Repurpose the recipe creation engine and content
    management system as a B2B SaaS product
  - Target: CPG food brands (there are 300+ in the US
    with $10M+ marketing budgets)
  - Value prop: Help food brands create, manage, and
    distribute recipe content across their digital
    channels (website, social, email)
  - Initial pricing: $3K-10K/month based on content
    volume and features
  - 3 brands already in pilot discussions
  - 70% of existing code is reusable

  Financial impact:
  - Burn: $78K/month
  - Cash: $1.92M
  - Runway: ~24 months
  - Will likely need to let go of 2 consumer growth
    people; hire 1 enterprise sales person
  - Path to $500K ARR within 12 months (vs. $0 on
    consumer path)

  Investors: 1 lead VC fund + 8 angels. The lead VC
  invested based on the consumer social thesis.

  Task: Write an investor update that clearly communicates
  the pivot decision, the rationale, and the new strategy
  in a way that maintains investor confidence in the
  founding team's judgment.

assertions:
  - type: llm_judge
    criteria: "Response communicates the pivot clearly and persuasively — states the pivot decision upfront (not buried); provides clear rationale based on data (consumer metrics failing, B2B demand signal from brands); explains what's changing (target market, business model, product focus) and what's being preserved (recipe creation engine, content tech, team expertise); presents the 3 brands in pilot as validation; frames the pivot as following customer demand, not desperation; acknowledges that the original thesis didn't work without being self-flagellating; the pivot narrative would be convincing to the lead VC."
    weight: 0.35
    description: "ClearPivotCommunication"
  - type: llm_judge
    criteria: "Response demonstrates strategic pivot communication skills — presents the consumer metrics honestly as the 'why' (doesn't just say 'we decided to pivot' without evidence); frames the inbound brand interest as a market signal, not just a lifeline; quantifies the B2B opportunity (300+ CPG brands, $3-10K/month pricing, $500K ARR target); addresses the team changes empathetically (2 consumer hires transitioning out, enterprise sales hire needed); explains code reusability (70%) as a competitive advantage (not starting from scratch); addresses runway impact positively (24 months gives time to prove B2B model); sets clear milestones for the new direction."
    weight: 0.35
    description: "StrategicPivotSkills"
  - type: llm_judge
    criteria: "Response navigates the investor relationship implications — acknowledges that the lead VC invested on a consumer thesis and directly addresses why the B2B pivot is a better path to returns; reframes the founding team's strengths as applicable to the new direction; doesn't blame external factors but takes responsibility for the consumer thesis not working; sets clear next milestones that investors can use to evaluate the new direction (e.g., first paid customer, pipeline, ACV); asks for specific help relevant to the B2B direction (CPG brand intros, enterprise sales candidates); the update would make investors feel the team is adaptable and data-driven rather than having failed."
    weight: 0.30
    description: "InvestorRelationshipNavigation"
