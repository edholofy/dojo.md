meta:
  id: seed-stage-quarterly
  level: 1
  course: investor-update-writing
  type: output
  description: "Write a quarterly investor update for a seed-stage B2B SaaS startup with straightforward growth metrics"
  tags: [quarterly-update, seed-stage, saas, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage B2B SaaS startup that
  provides automated invoice processing for small
  accounting firms. You raised a $2.2M seed round 8
  months ago. You send quarterly updates to your 3
  institutional investors (2 seed funds, 1 angel syndicate
  lead) and 12 angel investors.

  Q3 2026 metrics:
  - ARR: $312K (up from $228K last quarter, +37% QoQ)
  - MRR: $26K
  - Customers: 78 (up from 54, +44% QoQ)
  - Net revenue retention: 108%
  - Monthly churn: 2.1%
  - Average contract value (ACV): $4,000/year
  - CAC: $1,800 (down from $2,400 last quarter)
  - LTV/CAC: 3.2x
  - Burn rate: $85K/month
  - Cash in bank: $1.42M
  - Runway: ~17 months
  - Team: 8 people (added 2 engineers this quarter)

  Key developments:
  - Launched integration with QuickBooks Online (most
    requested feature)
  - Closed first 3 customers through partner channel
    (accounting software resellers)
  - Won "Best New Fintech Tool" at AccountingToday
    conference
  - Hired senior engineer from Intuit

  Challenges:
  - Sales cycle is 45 days (longer than expected)
  - Enterprise prospects asking for SOC 2 (don't have it)
  - One large customer ($12K ACV) churned due to
    switching accounting platforms

  Next quarter priorities:
  - Begin SOC 2 Type I process
  - Launch Xero integration
  - Hire first SDR
  - Target $400K ARR by end of Q4

  Task: Write a quarterly investor update that
  effectively communicates progress, challenges, and
  plans to your investor base.

assertions:
  - type: llm_judge
    criteria: "Response writes a well-structured quarterly investor update — organizes information logically with clear sections (summary/highlights, metrics, product updates, team, challenges, next quarter, asks); presents SaaS metrics comprehensively (ARR, MRR, customer count, NRR, churn, ACV, CAC, LTV/CAC, runway); shows quarter-over-quarter trends; includes a concise executive summary at the top so busy investors get the key points quickly; the update is appropriate length for a quarterly cadence (more detailed than monthly)."
    weight: 0.35
    description: "WellStructuredQuarterly"
  - type: llm_judge
    criteria: "Response demonstrates SaaS-specific investor communication skills — contextualizes metrics appropriately (37% QoQ ARR growth is strong for seed stage; 108% NRR shows expansion potential; 2.1% monthly churn is acceptable but worth monitoring; LTV/CAC of 3.2x is healthy); frames the QuickBooks integration as a strategic milestone (not just a feature); positions the partner channel as an emerging growth lever; handles the churn of the large customer honestly (explains context, doesn't hide it); frames SOC 2 as both a challenge and a strategic investment; the financial position (runway, burn) is presented transparently."
    weight: 0.35
    description: "SaaSInvestorCommunication"
  - type: llm_judge
    criteria: "Response includes forward-looking elements and actionable asks — sets clear Q4 targets ($400K ARR) that are ambitious but achievable given trajectory; prioritizes SOC 2 and Xero integration as strategic next steps; makes specific asks investors can help with (intros for SOC 2 auditors, SDR candidates, potential enterprise prospects); doesn't just report on the past but shows strategic thinking about the future; the update builds confidence that the founders know where they're going and can execute."
    weight: 0.30
    description: "ForwardLookingAndAsks"
