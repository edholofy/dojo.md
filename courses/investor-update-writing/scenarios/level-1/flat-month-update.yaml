meta:
  id: flat-month-update
  level: 1
  course: investor-update-writing
  type: output
  description: "Write a monthly investor update for a month where growth was flat and nothing particularly exciting happened"
  tags: [flat-growth, transparency, monthly, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage startup ($1.8M raised,
  10 employees) that builds a scheduling tool for hair
  salons and barbershops. After 4 consecutive months of
  15-20% MoM growth, this month was flat.

  This month's metrics:
  - MRR: $14.2K (last month: $14.0K, +1.4% MoM)
  - Active salon accounts: 186 (last month: 183, +1.6%)
  - New signups: 12 (last month: 28, down 57%)
  - Churn: 9 accounts (last month: 5 — highest ever)
  - Appointments booked through platform: 18,400
  - Average appointments per salon: 99/month
  - Burn: $62K/month
  - Cash: $1.08M
  - Runway: ~17 months

  What happened:
  - Your primary growth channel (Instagram ads targeting
    salon owners) saw CPAs increase 3x due to holiday
    season ad competition
  - You lost a cluster of 4 accounts in one city when a
    competing product offered free migration + 6 months
    free
  - Your Head of Sales was out for 2 weeks (family
    emergency)
  - You did ship a new SMS reminders feature that early
    users love (reducing no-shows by 22%)

  You're worried investors will be concerned about the
  flat month, especially after strong growth.

  Task: Write an honest monthly investor update that
  addresses the flat growth without being alarmist or
  making excuses, while maintaining investor confidence.

assertions:
  - type: llm_judge
    criteria: "Response writes an honest update about a flat month without being defensive or alarmist — acknowledges the flat growth directly (doesn't bury or spin it); explains contributing factors factually (holiday ad costs, competitive loss, sales absence) without making excuses; maintains confidence by providing context (4 prior months of strong growth, single flat month vs trend); presents the SMS reminders feature as a positive development; the tone balances transparency with composure — a mature founder communicating a normal business fluctuation."
    weight: 0.35
    description: "HonestFlatMonthUpdate"
  - type: llm_judge
    criteria: "Response demonstrates how to communicate setbacks effectively — separates one-time factors (holiday ad costs, sales absence) from potential structural concerns (competitive pressure, churn increase); addresses the churn spike specifically (4 accounts lost to competitor — is this a trend or isolated?); outlines concrete actions being taken (diversifying acquisition channels, competitive response strategy, churn analysis); doesn't catastrophize or over-reassure — presents data and lets investors draw informed conclusions; includes forward-looking indicators that suggest the flat month is temporary."
    weight: 0.35
    description: "SetbackCommunication"
  - type: llm_judge
    criteria: "Response maintains standard update structure despite the challenging month — still includes metrics, highlights (SMS feature), lowlights, asks, and financial position; doesn't skip sections or deviate from normal format just because the month was tough; the SMS reminders feature (22% no-show reduction) is properly highlighted as a product win; runway and financial position are included transparently; includes specific asks that could help address the challenges (e.g., introductions to alternative marketing channels, competitive intelligence); the update would maintain investor trust through consistency and transparency."
    weight: 0.30
    description: "ConsistentStructure"
