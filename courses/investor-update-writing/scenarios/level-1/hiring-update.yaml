meta:
  id: hiring-update
  level: 1
  course: investor-update-writing
  type: output
  description: "Write a monthly investor update that focuses on a key hire announcement and team growth"
  tags: [hiring, team-update, monthly, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage healthtech startup
  ($1.5M raised) that builds a patient engagement
  platform for physical therapy clinics. You have 6
  employees and just made two critical hires that your
  investors have been asking about for months.

  New hires:
  1. VP of Engineering — Sarah Chen, previously Staff
     Engineer at Zocdoc (6 years), led the team that
     built their provider-side scheduling platform.
     She starts in 2 weeks. You offered her $165K base
     + 1.2% equity (your investors had suggested a range
     of 0.8-1.5% for this role).

  2. Head of Clinical Partnerships — Dr. James Rodriguez,
     DPT, MBA. Previously Director of Digital Health
     Initiatives at a 45-clinic PT chain. Has
     relationships with 200+ clinic owners. Starts next
     Monday. Compensation: $140K base + 0.6% equity.

  Other updates this month:
  - MRR: $8.2K (up from $7.1K, +15% MoM)
  - Clinics on platform: 28 (up from 24)
  - Patient engagement rate: 72% (industry avg ~40%)
  - Burn rate increased to $52K/month (from $38K with
    new hires)
  - Runway: ~22 months (down from 30 months)
  - Completed HIPAA compliance audit (no findings)

  Challenges:
  - Integration with 2 major PT-specific EHR systems
    (WebPT, Prompt) still in development
  - One clinic churned (owner retired)

  Your investors:
  - Lead: HealthTech Ventures (wrote $800K check)
  - Angels: 5 individuals, 2 of whom are physicians

  Task: Write a monthly investor update that effectively
  announces these hires and frames them in the context
  of company progress.

assertions:
  - type: llm_judge
    criteria: "Response writes an effective team-focused investor update — leads with or prominently features the two key hires; provides enough background on each hire to demonstrate quality (Sarah's Zocdoc experience and relevant platform work, James's clinic relationships and industry credibility); frames the hires as addressing previously identified gaps; addresses the burn rate increase transparently (natural consequence of team growth); includes standard monthly metrics alongside the hiring news; the update demonstrates the company is building a strong team."
    weight: 0.35
    description: "EffectiveTeamUpdate"
  - type: llm_judge
    criteria: "Response demonstrates hiring communication best practices — explains why each hire matters strategically (VP Engineering for product development velocity, Head of Clinical Partnerships for clinic acquisition); mentions compensation details at the right level (doesn't need to share exact numbers with all investors but may reference that equity was within discussed ranges); acknowledges how these hires accelerate the company's roadmap; addresses the runway impact honestly (22 months is still healthy but a meaningful change from 30 months); the update makes investors feel good about the caliber of people joining."
    weight: 0.35
    description: "HiringCommunicationBestPractices"
  - type: llm_judge
    criteria: "Response appropriately balances hire announcements with broader business context — doesn't make the update only about hiring; includes product progress (HIPAA audit, patient engagement metrics), growth metrics (MRR, clinic count), and challenges (EHR integrations, churn); the hiring news enriches the broader narrative (e.g., James will accelerate clinic acquisition, Sarah will accelerate EHR integrations); makes asks that leverage the new hires (e.g., intros for James's first outreach wave, engineering referrals); appropriate for the healthtech investor audience (physician angels appreciate clinical credibility)."
    weight: 0.30
    description: "BalancedWithBusiness"
