meta:
  id: fundraising-kickoff
  level: 1
  course: investor-update-writing
  type: output
  description: "Write a monthly investor update that communicates the decision to begin Series A fundraising"
  tags: [fundraising, series-a, kickoff, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage startup ($2.5M raised
  18 months ago) that provides an employee benefits
  platform for companies with 50-500 employees. You've
  decided to begin your Series A fundraise and want to
  inform your existing investors.

  Current state:
  - ARR: $1.1M (from $0 at seed close)
  - MRR: $92K
  - Customers: 42 mid-market companies
  - Net revenue retention: 115%
  - Monthly churn: 1.8%
  - Burn: $120K/month
  - Cash: $680K
  - Runway: ~6 months
  - Team: 16 employees

  Fundraising plan:
  - Target: $8-12M Series A
  - Timeline: Aiming to close within 3 months
  - You've already had introductory conversations with
    6 VC firms (2 expressed strong interest after seeing
    your metrics)
  - Your lead seed investor (Catalyst Ventures) has
    indicated they will participate in the round
  - You've engaged a financial advisor to help manage
    the process

  Your existing investors:
  - Catalyst Ventures (lead, $1.2M)
  - 2 angel syndicates ($600K combined)
  - 8 individual angels ($700K combined)

  What you need from existing investors:
  - Warm introductions to Series A firms they know
  - References when prospective leads do back-channel
    calls
  - Patience with potentially less detailed updates
    during the fundraise sprint

  Task: Write a monthly investor update that naturally
  communicates the fundraising kickoff while continuing
  to report on business progress.

assertions:
  - type: llm_judge
    criteria: "Response effectively communicates the fundraising kickoff — clearly states the decision to begin Series A fundraising; provides the key parameters (target range, timeline, current pipeline); frames the business metrics as Series A-ready ($1.1M ARR, 115% NRR, 1.8% churn); mentions Catalyst's participation signal (important social proof for other investors); addresses the runway context honestly (6 months creates urgency but isn't panic territory with fundraise plan); the announcement feels confident and planned, not desperate."
    weight: 0.35
    description: "FundraisingKickoffCommunication"
  - type: llm_judge
    criteria: "Response makes effective asks of existing investors — requests warm introductions to specific types of Series A firms (not just 'any intros'); asks investors to be available for back-channel reference calls; sets expectations about update cadence during the fundraise; frames the asks as specific and actionable (not vague 'help us raise'); acknowledges investors' role in getting to this milestone; the asks make investors feel like valued partners in the process, not just passive recipients."
    weight: 0.35
    description: "EffectiveInvestorAsks"
  - type: llm_judge
    criteria: "Response maintains business update quality alongside fundraising news — doesn't let the fundraising announcement overshadow business progress; includes standard metrics and updates; demonstrates that the business continues to execute during fundraising; the update structure allows investors to evaluate both the business trajectory and the fundraising decision; appropriate tone — excited about the milestone but focused on execution; the update would make seed investors feel proud of the company's progress and eager to help."
    weight: 0.30
    description: "BusinessAlongsideFundraising"
