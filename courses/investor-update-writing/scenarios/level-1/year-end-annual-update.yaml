meta:
  id: year-end-annual-update
  level: 1
  course: investor-update-writing
  type: output
  description: "Write an annual year-end investor update summarizing a full year of progress for a seed-stage startup"
  tags: [annual, year-end, summary, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage startup ($2M raised)
  that provides a platform for local restaurants to
  manage their delivery operations across multiple
  delivery apps (DoorDash, Uber Eats, Grubhub). You
  send monthly updates but your investors have asked for
  a comprehensive year-end summary.

  Year-in-review (January - December 2026):
  - ARR: Started at $180K, ended at $720K (+300% YoY)
  - MRR: $60K (December)
  - Restaurant partners: 35 → 148 (+323%)
  - Cities: 3 → 11
  - Team: 5 → 14 (added 9 people)
  - Total orders managed through platform: 2.1M
  - Average revenue per restaurant: $405/month
  - Net revenue retention: 112%
  - Monthly churn: 2.4%

  Key milestones by quarter:
  Q1: Launched integration with Grubhub (completing
  the "Big 3"); hired first salesperson
  Q2: Expanded to 5 new cities; closed first enterprise
  customer (12-location chain); hit $400K ARR
  Q3: Raised awareness through National Restaurant
  Association conference; launched analytics dashboard;
  hired VP of Sales
  Q4: Crossed $700K ARR; began pilot with a 45-location
  regional chain; infrastructure reliability hit 99.7%
  uptime

  Challenges faced during the year:
  - Lost 2 engineers to big tech companies (July/August)
  - API changes by DoorDash caused 2-day outage in March
  - Unit economics in smaller cities less favorable
  - Restaurant industry margin pressure reduced
    willingness to pay for premium features

  Financial summary:
  - Total cash spent in 2026: $780K
  - Cash remaining: $1.22M
  - Average monthly burn (H2): $72K
  - Runway: ~17 months

  2027 goals:
  - $2M ARR target
  - 300+ restaurant partners
  - Launch catering management module
  - Begin Series A conversations in Q3

  Task: Write a comprehensive year-end annual investor
  update that tells the story of the year and sets the
  stage for the next year.

assertions:
  - type: llm_judge
    criteria: "Response writes a comprehensive year-end summary — structures the year coherently (narrative arc from beginning to end, or quarterly breakdown); highlights the headline numbers prominently (ARR 300% growth, restaurant count 4x, team nearly 3x); provides a quarterly milestone timeline that shows progression; addresses challenges honestly (talent competition, API dependencies, unit economics); includes financial summary with burn trajectory; the update tells a complete story of the year that a time-strapped investor could understand in one read."
    weight: 0.35
    description: "ComprehensiveYearEnd"
  - type: llm_judge
    criteria: "Response frames the year within the broader company trajectory — connects 2026 achievements to the original seed investment thesis; shows how the year's learnings inform 2027 strategy; the $2M ARR target for 2027 is framed as ambitious but achievable given the growth trajectory; the Series A conversation timeline is positioned appropriately; addresses what the company learned (smaller city economics, retention drivers, enterprise opportunities); the update would make investors feel their investment is progressing well and the team is learning and adapting."
    weight: 0.35
    description: "TrajectoryFraming"
  - type: llm_judge
    criteria: "Response sets up 2027 effectively — outlines specific goals for the coming year ($2M ARR, 300+ restaurants, catering module, Series A); explains the strategic rationale for each goal; identifies key risks and dependencies for 2027; addresses what resources or help will be needed; expresses gratitude to investors for their support during the year; the forward-looking section creates anticipation and maintains investor engagement for the year ahead; appropriate annual update length (longer than monthly, but focused — not exhaustive)."
    weight: 0.30
    description: "SetUp2027"
