meta:
  id: product-launch-update
  level: 1
  course: investor-update-writing
  type: output
  description: "Write a monthly investor update announcing a major product launch and early traction signals"
  tags: [product-launch, traction, monthly, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage developer tools startup
  ($1.6M raised, 8 employees) that provides an automated
  code review tool for Python developers. You've been in
  private beta for 6 months and just launched publicly.

  Launch results (first 2 weeks):
  - Product Hunt launch: #3 Product of the Day (1,240
    upvotes)
  - Hacker News: Front page for 6 hours, 380 comments
  - New signups: 4,200 (from ~300 beta users)
  - Free tier activations: 3,800
  - Paid conversions: 48 ($29/month plan)
  - Team plan inquiries: 12 companies
  - GitHub stars: 2,100 (open-source component)

  Pre-launch metrics (for comparison):
  - Beta users: 312
  - Paying beta users: 28 ($19/month beta pricing)
  - MRR: $532

  Post-launch metrics:
  - MRR: $1,924 (includes new $29/month pricing)
  - Free-to-paid conversion rate: 1.3%
  - Daily active repos scanned: 890
  - Average reviews per repo: 4.2/week
  - Infrastructure costs spiked to $8.2K/month (from
    $1.8K) due to demand

  Challenges:
  - Infrastructure costs scaling faster than expected
  - 3 critical bugs found in first week (all patched
    within 24 hours)
  - Support volume overwhelming for team of 8
  - Conversion rate (1.3%) lower than 3% target

  Financial:
  - Burn: $48K/month (up from $32K due to infra costs)
  - Cash: $1.12M
  - Runway: ~23 months at new burn rate

  Task: Write a monthly investor update that captures
  the excitement of the public launch while being
  honest about early learnings and challenges.

assertions:
  - type: llm_judge
    criteria: "Response captures launch excitement while remaining grounded — leads with the launch results (Product Hunt #3, HN front page, 4,200 signups); quantifies the growth from beta to public (312 to 4,200 users, MRR from $532 to $1,924); presents the early traction signals positively but honestly (strong awareness, solid initial conversions, but conversion rate below target); acknowledges the infrastructure and support challenges without dampening the momentum; the tone is energized and confident — this is a milestone worth celebrating."
    weight: 0.35
    description: "LaunchExcitement"
  - type: llm_judge
    criteria: "Response demonstrates understanding of developer tool launch metrics — contextualizes Product Hunt and Hacker News performance appropriately (awareness metrics, not revenue metrics); frames GitHub stars as community engagement signal; analyzes the 1.3% free-to-paid conversion rate honestly (below 3% target but within range for developer tools at launch); addresses infrastructure cost scaling as a 'good problem' with a plan; identifies the team bandwidth challenge; presents the pricing increase from $19 to $29 as validated by launch demand; the metrics analysis would satisfy technically-savvy investors."
    weight: 0.35
    description: "DevToolLaunchMetrics"
  - type: llm_judge
    criteria: "Response includes forward-looking plans and asks — outlines immediate priorities (infrastructure optimization, conversion rate improvement, support scaling); identifies what the team will focus on in the next month; makes specific asks relevant to the launch (introductions to developer community leaders, infrastructure optimization expertise, potential team plan customers from investor networks); the update positions the launch as a beginning, not an end — shows the team knows what to do with this momentum; appropriate for seed-stage investor audience."
    weight: 0.30
    description: "ForwardLookingPlans"
