meta:
  id: metrics-dashboard-update
  level: 1
  course: investor-update-writing
  type: output
  description: "Write a monthly investor update focused on presenting key metrics in a dashboard format for a marketplace startup"
  tags: [metrics, dashboard, marketplace, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage two-sided marketplace
  that connects freelance graphic designers with small
  businesses needing design work (logos, social media
  graphics, packaging). You send monthly updates in a
  metrics-first "dashboard" format that your lead
  investor prefers.

  October 2026 metrics:
  Supply side (designers):
  - Active designers: 890 (up from 820, +8.5% MoM)
  - New designer signups: 142
  - Designer utilization rate: 34%
  - Average designer earnings: $1,840/month (for active)
  - Designer NPS: 42

  Demand side (businesses):
  - Active business clients: 1,450 (up from 1,280, +13%)
  - New business signups: 285
  - Repeat order rate: 38%
  - Average order value: $320
  - Business client NPS: 58

  Marketplace metrics:
  - GMV (Gross Merchandise Value): $465K (up from $408K)
  - Take rate: 18%
  - Net revenue: $83.7K
  - Orders completed: 1,453
  - Average time to match: 4.2 hours
  - Dispute rate: 3.8%
  - Average project completion time: 3.1 days

  Financial:
  - Net revenue: $83.7K
  - Operating expenses: $112K
  - Net burn: $28.3K/month
  - Cash: $980K
  - Runway: ~34 months

  Highlights:
  - Launched "Design Packages" feature (bundled services)
    — 12% of orders already using it
  - Partnership with Shopify app store approved
    (launching next month)

  Lowlights:
  - Designer utilization still below 40% target
  - Dispute rate crept up from 3.2% to 3.8%
  - Onboarding redesign delayed by 2 weeks

  Task: Write a monthly investor update in a clean
  dashboard/metrics-forward format that makes the key
  numbers easy to scan and understand.

assertions:
  - type: llm_judge
    criteria: "Response presents metrics in a clean, scannable dashboard format — organizes metrics logically by category (supply, demand, marketplace, financial); uses formatting that makes numbers easy to scan (tables, aligned columns, or clear visual structure); includes month-over-month comparisons and directional indicators (up/down arrows or percentage changes); highlights the most important metrics prominently; the format prioritizes quick scanning over narrative prose; a busy investor should be able to understand the business health in under 2 minutes."
    weight: 0.35
    description: "CleanDashboardFormat"
  - type: llm_judge
    criteria: "Response demonstrates marketplace-specific metric understanding — includes both supply and demand side metrics (two-sided marketplace requires tracking both); highlights the GMV and take rate as core marketplace KPIs; contextualizes the utilization rate (34% vs 40% target — explains why this matters for marketplace health); addresses the dispute rate increase with appropriate concern; frames repeat order rate as a retention/quality signal; explains the Shopify partnership's strategic significance for demand acquisition; the metrics tell a coherent story about marketplace health."
    weight: 0.35
    description: "MarketplaceMetricUnderstanding"
  - type: llm_judge
    criteria: "Response balances dashboard format with necessary context — doesn't just list numbers but provides brief commentary on the most important trends; explains what's working (demand growth, Design Packages adoption) and what needs attention (utilization, disputes); includes a brief section on priorities or next month's focus; makes specific asks; the update is concise (dashboard format should be shorter than narrative format); appropriate tone for a monthly cadence (brief, consistent, not over-explaining every metric)."
    weight: 0.30
    description: "DashboardWithContext"
