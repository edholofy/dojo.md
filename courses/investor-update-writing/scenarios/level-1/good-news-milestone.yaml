meta:
  id: good-news-milestone
  level: 1
  course: investor-update-writing
  type: output
  description: "Write an ad hoc investor update announcing a major milestone achievement"
  tags: [milestone, good-news, ad-hoc, beginner]

state: {}

trigger: |
  You're the CEO of a Series A edtech startup ($6M
  raised, 22 employees). Your company provides an
  AI tutoring platform for K-12 math students. You just
  hit a major milestone that warrants an off-cycle update
  to your investors.

  The milestone:
  - You signed a district-wide contract with the Houston
    Independent School District (HISD) — the 8th largest
    school district in the US (196,000 students)
  - Contract value: $1.8M over 3 years ($600K/year)
  - This is your largest contract by 4x (previous largest
    was $150K/year)
  - Implementation starts in January 2027 across 280
    schools
  - HISD will be a reference customer and agreed to a
    case study
  - The deal took 9 months to close and involved an RFP
    process where you beat Pearson and Khan Academy

  Context:
  - Current ARR before this deal: $1.4M
  - This deal brings ARR to $2.0M
  - Your board and lead investor (a well-known edtech
    fund) have been pushing you to land a "lighthouse"
    district deal
  - This validates the enterprise sales motion you've
    been building

  Additional context:
  - You recently hired a VP of Sales from Clever
    (edtech company)
  - Pipeline has 4 more large district conversations
    influenced by the Houston relationship
  - Your Series A investors include 2 edtech-focused
    funds and 6 angels (3 are former school
    administrators)

  Task: Write an ad hoc investor update email announcing
  this milestone in a way that generates excitement while
  remaining professional and credible.

assertions:
  - type: llm_judge
    criteria: "Response writes an effective milestone announcement — leads with the big news (HISD deal) clearly and concisely; quantifies the impact (contract value, ARR jump from $1.4M to $2.0M, 43% increase, largest district in portfolio by 4x); provides context on why this matters (8th largest district, beat Pearson and Khan Academy, validates enterprise sales motion); acknowledges the team and VP of Sales hire that enabled this; the announcement is celebratory without being unprofessional."
    weight: 0.35
    description: "EffectiveMilestoneAnnouncement"
  - type: llm_judge
    criteria: "Response balances celebration with strategic framing — frames the deal as a strategic inflection point (lighthouse customer, reference customer, case study); connects to the broader narrative investors care about (enterprise sales validation, pipeline implications); mentions the 4 additional district conversations without overpromising; positions this as evidence of product-market fit in the K-12 enterprise segment; doesn't just report the win but explains what it means for the company's trajectory; acknowledges the 9-month sales cycle as a learning (implications for forecasting and pipeline management)."
    weight: 0.35
    description: "StrategicFraming"
  - type: llm_judge
    criteria: "Response is appropriately formatted for an ad hoc update — shorter than a regular monthly/quarterly update (this is a single announcement, not a comprehensive update); uses a compelling subject line; gets to the point quickly; includes specific asks if relevant (e.g., intros to other large districts, help amplifying the news); the tone is enthusiastic but authentic — celebrates the win without hyperbole; appropriate for the mixed investor audience (institutional edtech funds who understand the significance and angel investors who are former school administrators)."
    weight: 0.30
    description: "AdHocFormat"
