meta:
  id: first-update-shift
  level: 1
  course: investor-update-writing
  type: output
  description: "Handle a shift where you need to write three different investor communications in one day with varying tones and audiences"
  tags: [multi-update, shift-simulation, varied-tone, beginner]

state: {}

trigger: |
  You're the CEO of a seed-stage proptech startup ($1.5M
  raised, 7 employees) that helps property managers
  automate tenant screening. Today you need to write
  three separate investor communications:

  Communication 1 — Standard Monthly Update:
  Your regular monthly update to all 11 investors.
  - MRR: $11.8K (up from $10.2K, +15.7% MoM)
  - Property managers on platform: 64 (up from 58)
  - Applications processed: 2,840 this month
  - Average revenue per property manager: $184/month
  - New feature: Credit score integration launched
  - Challenge: Support tickets up 40% (integration bugs)
  - Burn: $42K/month, Cash: $890K, Runway: ~21 months

  Communication 2 — Individual Investor Email:
  One of your angel investors, Maria Torres, forwarded
  an article about a well-funded competitor (Snappt, $22M
  Series B) that recently launched a similar automated
  screening product. Maria asked: "Should we be worried
  about this?" You need to respond thoughtfully.

  Your competitive advantage: You focus specifically on
  small/mid-size property managers (10-100 units) while
  Snappt targets enterprise (100+ units); your pricing
  is 60% lower; you have deeper integration with the
  property management tools small PMs actually use
  (Buildium, AppFolio vs. Yardi, RealPage); your NPS
  is 72 vs. industry average of 35.

  Communication 3 — Thank You Note:
  Your lead investor, James Park at NextHome Ventures,
  personally introduced you to a regional property
  management association that resulted in 8 new
  customers this month (worth $1,470 MRR). You need to
  send him a brief thank-you that also gives him context
  on the impact of his introduction.

  Task: Write all three investor communications — the
  monthly update, the competitive response to Maria,
  and the thank-you note to James — each with
  appropriate tone, length, and content.

assertions:
  - type: llm_judge
    criteria: "Response produces three distinct communications with appropriate differentiation — the monthly update follows standard structure (metrics, highlights, challenges, asks); the competitive response to Maria directly addresses her concern with specific competitive positioning; the thank-you note to James is warm, brief, and quantifies the impact of his introduction; each communication has a different tone (professional/comprehensive for the update, analytical/reassuring for Maria, grateful/personal for James); the three pieces feel like they came from the same person but are appropriately tailored to each audience."
    weight: 0.35
    description: "ThreeDistinctCommunications"
  - type: llm_judge
    criteria: "Response handles the competitive question effectively — addresses Maria's concern directly without being dismissive; provides specific competitive differentiation (market segment, pricing, integrations, NPS); frames the competitive landscape honestly (acknowledges Snappt's funding advantage while highlighting strategic positioning); doesn't badmouth the competitor but clearly articulates why the startup wins in its segment; shows strategic awareness that makes Maria feel the founder is thoughtful about competition."
    weight: 0.35
    description: "CompetitiveResponseQuality"
  - type: llm_judge
    criteria: "Response demonstrates appropriate investor relationship management — the monthly update treats all investors equally with comprehensive information; the individual response to Maria shows responsiveness and care for investor concerns; the thank-you to James is genuine and specific (quantifies the 8 customers and $1,470 MRR impact); all three communications would strengthen the founder-investor relationship; the thank-you encourages future introductions without being transactional; appropriate lengths (monthly update: medium; competitive response: medium; thank-you: brief)."
    weight: 0.30
    description: "InvestorRelationshipManagement"
