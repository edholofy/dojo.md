meta:
  id: first-monthly-update
  level: 1
  course: investor-update-writing
  type: output
  description: "Write the first monthly investor update for a pre-seed startup that just closed its round"
  tags: [monthly-update, pre-seed, first-update, beginner]

state: {}

trigger: |
  You're the CEO of a pre-seed startup that builds an
  AI-powered meal planning app. You closed a $500K
  pre-seed round 6 weeks ago from 8 angel investors
  and one micro-VC fund. This is your first investor
  update and you've never written one before.

  Company details:
  - Product: AI meal planning app (iOS only)
  - Stage: Pre-seed, launched MVP 3 months ago
  - Team: 3 co-founders (CEO, CTO, Head of Product)
  - Monthly burn: $18K (mostly founder stipends + AWS)
  - Runway: ~27 months at current burn rate
  - Metrics this month:
    - 1,240 downloads (up from 890 last month)
    - 320 weekly active users (WAU)
    - 45 paying subscribers ($4.99/month)
    - Revenue: $224.55 MRR
    - DAU/MAU ratio: 0.28
    - App Store rating: 4.2 (68 reviews)
  - Key wins: Featured in a food blogger's newsletter
    (drove 180 downloads in 2 days); completed recipe
    database integration with Spoonacular API
  - Challenges: iOS-only limiting growth; onboarding
    flow has 52% drop-off rate; struggling to find a
    growth marketer within budget
  - Asks: Looking for intro to growth marketers and
    anyone with grocery delivery API partnerships

  Task: Write your first monthly investor update email
  that is clear, concise, professional, and establishes
  a good cadence for ongoing investor communication.

assertions:
  - type: llm_judge
    criteria: "Response writes a clear and well-structured first monthly investor update — includes key sections (highlights/wins, metrics, challenges/lowlights, asks/help needed); presents metrics clearly (downloads, WAU, paying subscribers, MRR, runway); maintains an appropriate tone (transparent but confident, not overly promotional or overly pessimistic); acknowledges this is the first update and sets expectations for ongoing cadence; is concise (appropriate length for a pre-seed update — not too long or too short); the update would make angel investors feel informed and glad they invested."
    weight: 0.35
    description: "ClearStructuredUpdate"
  - type: llm_judge
    criteria: "Response demonstrates good investor update practices — leads with the most important information (not buried in paragraphs); presents metrics in an easy-to-scan format (table, bullets, or dashboard-style); contextualizes metrics (month-over-month changes, what the numbers mean at this stage); is honest about challenges without being alarmist (52% onboarding drop-off, iOS-only limitation, hiring difficulty); makes specific asks that investors can act on (growth marketer intros, grocery API partnerships — not vague 'any help appreciated'); includes runway/financial position transparently."
    weight: 0.35
    description: "InvestorUpdateBestPractices"
  - type: llm_judge
    criteria: "Response is appropriately calibrated for a pre-seed startup — doesn't over-index on vanity metrics (downloads) while under-reporting engagement metrics (DAU/MAU, retention); frames the food blogger feature as a signal of product-market resonance rather than a growth strategy; acknowledges the early stage honestly (small numbers are normal, focus on learning and iteration); doesn't make grandiose projections; the tone is authentic and founder-voice rather than corporate; the update builds trust through transparency rather than spin."
    weight: 0.30
    description: "StageAppropriate"
