meta:
  id: regulatory-crisis-update
  level: 3
  course: investor-update-writing
  type: output
  description: "Write an investor update addressing a regulatory crisis that threatens the company's business model"
  tags: [regulatory, crisis, compliance, advanced]

state: {}

trigger: |
  You're the CEO of a Series B fintech startup ($28M
  raised, 62 employees) that provides a "buy now, pay
  later" (BNPL) product for healthcare expenses (dental
  work, elective procedures, veterinary care). Your
  company partners with 2,400 healthcare providers to
  offer patients 0% APR financing for 6-12 months.

  Regulatory crisis:
  The CFPB has issued a new interpretive rule effective
  in 90 days that:
  1. Classifies all BNPL products (including yours) as
     credit subject to TILA/Regulation Z, requiring full
     credit disclosures
  2. Requires BNPL providers to assess ability-to-repay
     before extending credit
  3. Mandates dispute resolution rights equivalent to
     credit cards (Reg E protections)
  4. Requires BNPL providers to furnish data to credit
     bureaus

  Impact on your business:
  - Your current process does NOT include TILA
    disclosures (you marketed as "pay over time" not
    "credit")
  - You do basic identity verification but not ability-
    to-repay assessment (would require soft credit pull
    for every applicant — estimated 15% of current
    approvals would be denied)
  - Your dispute resolution process doesn't meet Reg E
    standards (estimated $800K+ to build)
  - Credit bureau furnishing infrastructure doesn't
    exist (6-month build estimated)
  - Your provider agreement terms may need to be
    renegotiated (providers currently bear 3.5%
    merchant discount rate; compliance costs may require
    increase to 5%)
  - Compliance costs estimated: $2.5M one-time + $600K
    annually
  - Revenue impact: 15% approval rate reduction would
    decrease annual originations by ~$18M

  Financial:
  - ARR: $14.2M
  - Originations: $120M annually
  - Default rate: 4.2%
  - Burn: $380K/month
  - Cash: $8.4M
  - Runway: 22 months (but compliance costs will
    accelerate burn significantly)

  Your investors: Series B lead (healthcare-focused VC),
  Series A lead (fintech VC), corporate strategic
  (national dental chain), 12 angels.

  Your Board is scheduled to meet in 5 days to discuss
  the regulatory response strategy.

  Task: Write an investor update that communicates the
  regulatory development, its impact assessment, and
  your preliminary response strategy — timed before the
  Board meeting so investors can arrive informed.

assertions:
  - type: llm_judge
    criteria: "Response communicates the regulatory crisis clearly and comprehensively — explains the CFPB rule and its specific implications for the business; quantifies the impact across multiple dimensions (compliance costs, revenue reduction, operational changes, timeline); addresses each of the four regulatory requirements and their specific implementation challenges; frames the 90-day timeline appropriately (urgent but not impossible); presents a preliminary response strategy while acknowledging the Board meeting for final decisions; the update would serve as effective pre-read material for Board discussion."
    weight: 0.35
    description: "RegulatorycrisisCommunication"
  - type: llm_judge
    criteria: "Response demonstrates strategic thinking about the regulatory response — presents multiple response options (full compliance, legal challenge, hybrid approach, potential business model adjustment); evaluates the ability-to-repay requirement's impact on growth (15% approval reduction); addresses the provider relationship implications (merchant discount rate increase from 3.5% to 5%); considers competitive implications (does this affect all BNPL or just healthcare BNPL?); addresses whether this is existential or manageable with investment; discusses how compliance could become a competitive moat (competitors who can't afford compliance costs); the strategic analysis would help investors evaluate the company's path forward."
    weight: 0.35
    description: "StrategicRegulatory"
  - type: llm_judge
    criteria: "Response manages stakeholder dynamics appropriately — addresses the healthcare VC's likely concerns (regulatory risk to the thesis); addresses the fintech VC's perspective (BNPL regulatory landscape they've seen elsewhere); addresses the dental chain strategic investor (provider relationship impact); frames the Board meeting effectively (what decisions are needed, what input investors should come prepared with); sets expectations for follow-up communication; maintains confidence while being realistic about the challenge; the update demonstrates the CEO can navigate regulatory crises — a critical founder skill for fintech."
    weight: 0.30
    description: "StakeholderManagement"
