meta:
  id: layoffs-restructuring
  level: 3
  course: investor-update-writing
  type: output
  description: "Write an investor update announcing a significant restructuring including layoffs and strategic refocusing"
  tags: [layoffs, restructuring, strategy, advanced]

state: {}

trigger: |
  You're the CEO of a Series B startup ($40M raised over
  3 rounds, 120 employees) that provides a "super app"
  for small restaurants — combining POS, inventory
  management, online ordering, employee scheduling, and
  marketing. After 18 months of trying to build
  everything, the Board has agreed that a restructuring
  is necessary.

  The restructuring:
  - Layoff: Reducing from 120 to 72 employees (40% RIF)
  - Shutting down 2 of 5 product lines: Marketing
    module (never gained traction, $180K ARR) and
    employee scheduling (competitive market, $240K ARR)
  - Refocusing on 3 core products: POS, inventory
    management, and online ordering ($4.8M combined ARR)
  - Affected teams: Marketing product team (8 people),
    scheduling product team (10 people), part of sales
    team (12 people focusing on shut-down products),
    G&A reduction (6 people), engineering reduction (12
    people)
  - Severance: 8 weeks for all affected employees +
    3 months COBRA + job placement support

  Why (honest assessment):
  - Tried to be everything for restaurants; became
    mediocre at 5 things instead of excellent at 3
  - $40M raised across rounds was deployed across too
    many product lines
  - Burn was $850K/month; unsustainable for the revenue
    level ($5.2M ARR total)
  - Core 3 products have good unit economics (LTV/CAC
    4.5x); non-core products have negative unit
    economics
  - Post-restructuring burn drops to $480K/month
  - Cash remaining: $6.8M → ~14 months runway (up from
    8 months pre-restructuring)

  Post-restructuring plan:
  - Path to profitability within 18 months on core 3
    products
  - Target: $10M ARR on core products by end of next
    year
  - Restaurant market opportunity in POS + inventory +
    online ordering: $8B TAM
  - Focus on restaurants with $1-5M revenue (sweet spot)

  Your investors: Series B lead (consumer/SMB VC, Board
  seat), Series A lead (fintech VC, Board observer),
  seed investors (restaurant industry angel syndicate),
  and 8 individual angels.

  Task: Write an investor update that communicates the
  restructuring decision, demonstrates accountability,
  and presents a credible path forward.

assertions:
  - type: llm_judge
    criteria: "Response communicates the restructuring with accountability and strategic clarity — leads with the decision and takes ownership (doesn't blame market conditions alone); explains the strategic rationale (focus over breadth, negative unit economics on non-core products); quantifies the restructuring clearly (120→72 people, 5→3 products, $850K→$480K burn); addresses the human impact with empathy (severance, COBRA, job placement); presents the refocusing as a strategic choice, not panic; the communication demonstrates the kind of hard decision-making investors expect from mature founders."
    weight: 0.35
    description: "RestructuringAccountability"
  - type: llm_judge
    criteria: "Response presents a credible post-restructuring strategy — explains why the remaining 3 products are the right focus (unit economics, market size, competitive position); presents the path to profitability (18-month timeline with specific milestones); the $10M ARR target on core products is grounded in current trajectory and market opportunity; addresses the revenue loss from shut-down products ($420K ARR) in context of the cost savings ($370K/month burn reduction); addresses customer communication strategy for users of discontinued products; discusses the team's capability post-restructuring (key talent retained, leadership continuity); the strategy would give investors confidence that the remaining business is viable."
    weight: 0.35
    description: "PostRestructuringStrategy"
  - type: llm_judge
    criteria: "Response navigates the investor dynamics thoughtfully — addresses different investors' perspectives (consumer/SMB VC Series B lead who approved the original strategy, fintech Series A lead, restaurant industry angels who may have emotional attachment to the broader vision); acknowledges that the original strategy (funded by their investment) didn't work; demonstrates learning without excessive self-flagellation; sets clear new milestones for the focused strategy; adjusts reporting metrics to reflect the new reality; addresses runway extension clearly (8→14 months); the update would leave investors feeling that the right decision was made, even if the original strategy was wrong."
    weight: 0.30
    description: "InvestorDynamicsNavigation"
