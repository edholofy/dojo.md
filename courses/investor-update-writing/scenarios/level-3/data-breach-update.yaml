meta:
  id: data-breach-update
  level: 3
  course: investor-update-writing
  type: output
  description: "Write an investor update addressing a security breach affecting customer data"
  tags: [security-breach, crisis, data, advanced]

state: {}

trigger: |
  You're the CEO of a Series B SaaS startup ($20M raised,
  48 employees) that provides a cloud-based patient
  engagement platform for healthcare clinics (telehealth,
  appointment scheduling, patient messaging). You've
  experienced a data breach.

  Breach details:
  - Discovered: 5 days ago (by your security monitoring)
  - Nature: Unauthorized access to a database containing
    patient demographic information through a
    misconfigured API endpoint
  - Data exposed: Names, email addresses, phone numbers,
    dates of birth, and appointment histories for
    approximately 84,000 patients across 120 clinic
    customers
  - NOT exposed: Social Security numbers, payment info,
    medical records, clinical notes (stored in separate
    encrypted database)
  - Duration: API endpoint was exposed for approximately
    21 days before detection
  - Attacker: Unknown; forensic investigation ongoing
    with external cybersecurity firm (CrowdStrike)
  - Current status: Vulnerability patched within 2 hours
    of discovery; all API endpoints audited; no evidence
    of data exfiltration to dark web (as of today)

  Actions taken:
  - Engaged CrowdStrike for forensic investigation
  - Engaged outside counsel (healthcare data privacy
    specialists)
  - Notified OCR (Office for Civil Rights) — HIPAA
    breach notification within 60-day window
  - Individual patient notification being prepared
  - Notified all 120 affected clinic customers directly
    (phone calls to each clinic owner)
  - Retained credit monitoring service for affected
    patients (estimated cost: $340K)
  - Accelerated SOC 2 Type II timeline

  Impact assessment:
  - Legal: HIPAA breach notification required; potential
    OCR investigation; estimated legal costs $400-800K
  - Customer: 3 clinic customers have temporarily paused
    their accounts pending investigation results
  - Financial: Estimated total cost $1-2M (legal,
    forensic, credit monitoring, security improvements)
  - Reputational: Local news covered the breach (1
    article so far)
  - Insurance: Cyber insurance policy ($5M coverage)
    has been notified; deductible is $100K

  Business metrics (for context):
  - ARR: $6.8M
  - Customers: 420 clinics
  - Burn: $280K/month
  - Cash: $8.2M

  Your investors: 2 VC firms (one healthcare-focused,
  one general tech), 6 angels.

  Task: Write an investor update that communicates the
  breach transparently, demonstrates responsible
  handling, and addresses the business implications —
  while maintaining appropriate legal sensitivity.

assertions:
  - type: llm_judge
    criteria: "Response communicates the breach with appropriate transparency and legal awareness — discloses the breach clearly (what happened, what was exposed, what was NOT exposed); presents the timeline (21-day exposure window, 5-day discovery-to-communication); addresses HIPAA implications specifically; demonstrates responsible handling (CrowdStrike engagement, outside counsel, OCR notification, patient notification, credit monitoring); addresses the distinction between data exposure and confirmed exfiltration; maintains appropriate legal qualifications (investigation ongoing, preliminary findings); the communication would demonstrate to investors that the company is handling the crisis competently."
    weight: 0.35
    description: "BreachTransparencyAndLegalAwareness"
  - type: llm_judge
    criteria: "Response addresses business impact and mitigation credibly — quantifies the financial impact ($1-2M estimated cost, cyber insurance coverage); addresses customer impact (3 paused accounts out of 420 — contained so far); discusses the root cause (misconfigured API endpoint) and remediation (security audit, SOC 2 acceleration); addresses reputational risk management (media coverage, proactive communication); discusses what's being done to prevent recurrence (security improvements, API security review); addresses the healthcare-specific sensitivity (patient trust, clinic owner relationships); the impact assessment would satisfy investor due diligence questions."
    weight: 0.35
    description: "BusinessImpactAndMitigation"
  - type: llm_judge
    criteria: "Response navigates the healthcare investor dynamics — addresses the healthcare-focused VC's specific concerns (HIPAA compliance, patient trust, OCR investigation risk); discusses the implications for the company's security posture and competitive positioning; addresses whether this affects customer acquisition (clinics evaluating platform may be concerned); frames the SOC 2 Type II acceleration as a positive outcome; sets expectations for ongoing communication (investigation timeline, OCR process, follow-up updates); makes asks of investors (legal referrals, crisis communication advice, customer reassurance support); the update maintains investor confidence in the management team's crisis management capability."
    weight: 0.30
    description: "HealthcareInvestorDynamics"
