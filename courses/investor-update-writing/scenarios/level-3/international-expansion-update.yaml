meta:
  id: international-expansion-update
  level: 3
  course: investor-update-writing
  type: output
  description: "Write a quarterly update for a Series B company launching international operations with mixed early results"
  tags: [international, expansion, mixed-results, advanced]

state: {}

trigger: |
  You're the CEO of a Series B HR tech startup ($35M
  raised, 95 employees) that provides an AI recruitment
  platform. You're 6 months into your first international
  expansion (UK and Germany) and results are mixed.

  US business (core market):
  - ARR: $18.2M (growing 45% YoY)
  - Customers: 340
  - NRR: 118%
  - Unit economics: Strong (LTV/CAC 5.2x)

  UK expansion (launched 6 months ago):
  - ARR: $680K (target was $1.2M by now — 57% of target)
  - Customers: 18 (target was 30)
  - Team: 8 people (Country Manager, 4 sales, 2 CS, 1
    marketing)
  - CAC: $28K (vs US $15K — nearly 2x)
  - Sales cycle: 85 days (vs US 45 days)
  - Win rate: 18% (vs US 32%)
  - Learnings: UK employers have different expectations
    around AI in hiring (more cautious, GDPR/AI Act
    concerns, stronger works council involvement);
    pricing needs to be adjusted (UK market expects
    lower per-seat pricing)

  Germany expansion (launched 3 months ago):
  - ARR: $120K (target was $300K — 40% of target)
  - Customers: 4
  - Team: 5 people (Country Manager, 2 sales, 1 CS, 1
    product localization)
  - Works council requirement: Adding 8-12 weeks to
    every enterprise deal
  - Product localization: 70% complete; German labor law
    compliance features still in development
  - Key learning: Product needs significant localization
    beyond language (German employment law, works council
    approval workflows, Betriebsverfassungsgesetz
    compliance)

  International cost impact:
  - International burn: $280K/month (all in: salaries,
    office, legal, compliance)
  - Total company burn: $680K/month (up from $400K pre-
    expansion)
  - Cash: $14.8M
  - Runway: 22 months at current burn
  - Board-approved international budget was $3M over 18
    months; on pace to spend $5M

  The Board is divided: Series B lead wants to "double
  down and invest through the learning curve" while
  Series A lead is questioning whether international
  was premature and wants to refocus on US growth.

  Task: Write a quarterly investor update that honestly
  assesses the international expansion — what's working,
  what isn't, and how you're adapting — while managing
  a Board with divided opinions.

assertions:
  - type: llm_judge
    criteria: "Response presents the international expansion with radical transparency — shows the target vs actual performance for both markets (UK 57%, Germany 40% of plan); doesn't cherry-pick positive metrics while hiding negative ones; explains the root causes for underperformance (market differences, not just execution); differentiates between UK challenges (market education, pricing) and Germany challenges (regulatory/localization); presents the US business strength as context (45% YoY growth, strong unit economics); addresses the budget overrun ($5M pace vs $3M approved); the update would satisfy both the 'double down' and 'pull back' Board members by presenting facts objectively."
    weight: 0.35
    description: "InternationalTransparency"
  - type: llm_judge
    criteria: "Response demonstrates strategic maturity in evaluating international expansion — distinguishes between learnings that suggest the market will convert (customer quality, product-market fit signals) vs structural challenges (CAC 2x, sales cycles 2x, win rates half); presents a framework for the Board decision (what would need to be true to justify continued investment vs what would trigger a pullback); addresses the Germany localization depth required (not just language — employment law, works council, Betriebsverfassungsgesetz); evaluates whether the international challenges are typical market entry friction or fundamental product-market fit issues; proposes specific milestones for the next quarter that will inform the continue/pullback decision."
    weight: 0.35
    description: "StrategicEvaluationMaturity"
  - type: llm_judge
    criteria: "Response navigates the Board division skillfully — acknowledges both perspectives (invest through the curve vs refocus on US) without taking sides prematurely; presents data that both viewpoints can engage with; proposes a decision framework rather than a unilateral decision; addresses the cash/runway implications of each path; frames the next quarterly review as a decision point with clear criteria; maintains CEO credibility with both Board members; makes asks that help inform the decision (customer references in UK/Germany, international HR tech benchmarks, introductions to European HR leaders)."
    weight: 0.30
    description: "BoardNavigation"
