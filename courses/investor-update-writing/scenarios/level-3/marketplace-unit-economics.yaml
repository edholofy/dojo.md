meta:
  id: marketplace-unit-economics
  level: 3
  course: investor-update-writing
  type: output
  description: "Write a quarterly investor update for a marketplace company that must communicate a strategic shift from growth-at-all-costs to unit economics focus"
  tags: [marketplace, unit-economics, strategy-shift, advanced]

state: {}

trigger: |
  You're the CEO of a Series B marketplace startup ($45M
  raised, 110 employees) that connects home service
  professionals (plumbers, electricians, cleaners) with
  homeowners. After 3 years of growth-focused spending,
  your Series B lead (who joined the Board 10 months ago)
  is pushing for a fundamental shift to unit economics
  profitability before the company will be "Series C
  ready."

  Current state:
  - GMV: $92M annualized (up from $64M last year, +44%)
  - Take rate: 15%
  - Net revenue: $13.8M annualized
  - Gross margin: 45% (after payment processing and
    insurance costs)
  - Contribution margin: -8% (after customer acquisition
    and service provider acquisition costs)
  - Monthly burn: $720K
  - Cash: $16.2M
  - Runway: 22 months

  Unit economics breakdown:
  - Customer (homeowner) acquisition:
    - CAC: $85 (primarily Google Ads + referrals)
    - Average first transaction: $340
    - Repeat rate: 42% (within 12 months)
    - LTV (2-year): $520
    - LTV/CAC: 6.1x (looks good at headline level)
  - Service provider acquisition:
    - Acquisition cost: $220 per professional
    - Average provider active for 14 months
    - Provider LTV: $1,800
    - BUT: 35% of providers churn in first 60 days
    - Active providers: 4,200 (need ~3,000 for current
      demand)
  - Market-level economics (unit = single market/city):
    - Active in 28 cities
    - Only 8 cities are contribution-margin positive
    - 12 cities are within 6 months of breakeven
    - 8 cities launched in last 6 months are deeply
      unprofitable

  The strategic shift:
  - Pause new city launches until existing cities reach
    contribution-margin breakeven
  - Reduce customer acquisition spend in unprofitable
    markets by 40%
  - Invest in provider retention (reduce 35% early churn)
  - Target: Contribution margin positive across all
    active markets within 12 months
  - Impact: GMV growth will slow from 44% to ~20% YoY
  - Implication for Series C: Can raise from a position
    of strength (profitable unit economics) but at a
    lower revenue multiple

  Task: Write a quarterly investor update that
  communicates the strategy shift from growth to unit
  economics, with the detailed financial analysis that
  sophisticated marketplace investors expect.

assertions:
  - type: llm_judge
    criteria: "Response communicates the unit economics pivot with analytical rigor — presents the contribution margin breakdown clearly (revenue→gross margin→contribution margin at -8%); explains the market-level economics (8 profitable, 12 near breakeven, 8 deeply unprofitable); addresses the service provider unit economics challenge (35% early churn is the key leak); differentiates between the headline LTV/CAC (6.1x looks good) and the underlying reality (contribution margin negative when fully loaded); presents the strategic shift plan with specific actions and measurable targets; the financial analysis would satisfy marketplace-specialist VCs."
    weight: 0.35
    description: "UnitEconomicsAnalyticalRigor"
  - type: llm_judge
    criteria: "Response frames the growth-to-profitability transition strategically — explains why this is the right time for the shift (better to correct now with 22 months runway than wait until it's urgent); addresses the GMV growth slowdown (44%→20%) as an intentional trade-off, not a failure; presents the path to contribution margin positive as value-creating (better Series C positioning); addresses the provider retention investment as the highest-ROI initiative (reducing 35% early churn improves both unit economics and service quality); discusses market-level maturity curves (older markets proving the model works when properly managed); the narrative would help investors understand this is strategic maturity, not giving up on growth."
    weight: 0.35
    description: "StrategicGrowthTransition"
  - type: llm_judge
    criteria: "Response addresses the Series C implications and investor dynamics — discusses how the unit economics shift affects Series C timing and valuation (later but stronger); addresses the Series B lead's push for unit economics as aligned with good business fundamentals; presents specific milestones that would signal Series C readiness (contribution margin positive across markets, sustainable growth rate, provider retention improvement); acknowledges the tension between growth metrics and profitability metrics in marketplace investing; makes specific asks (marketplace operator advisors, provider retention expertise); the update demonstrates a CEO who can balance growth ambition with financial discipline."
    weight: 0.30
    description: "SeriesCImplications"
