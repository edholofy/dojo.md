meta:
  id: spv-lp-reporting
  level: 3
  course: investor-update-writing
  type: output
  description: "Write quarterly LP reports for a venture capital SPV that invested in a portfolio company with complex developments"
  tags: [spv, lp-reporting, fund-reporting, advanced]

state: {}

trigger: |
  You're the Managing Partner of a $12M rolling fund
  who organized a $2.5M SPV to co-invest alongside a
  Tier 1 VC in a Series A round for "DataStack," an
  AI data infrastructure startup. Your SPV has 45 LPs
  (Limited Partners) — a mix of high-net-worth
  individuals, family offices, and a few fund-of-funds.

  You need to write the quarterly LP update for the SPV.

  DataStack's Q3 2026 performance:
  - ARR: $5.8M (up from $3.2M at time of investment
    12 months ago — 81% growth)
  - Customers: 92 (up from 48)
  - Net revenue retention: 135%
  - Team: 42 employees (up from 24)
  - Product: Launched enterprise tier ($100K+ ACV)
  - Burn: $450K/month
  - Cash: $8.2M (from $15M Series A)

  Complex developments to communicate:
  1. DataStack is raising a Series B: Two term sheets
     received — $30M at $180M pre-money (3.6x your entry
     valuation of $50M post-money). Your SPV has pro-rata
     rights but exercising them would require an
     additional $400K from LPs.
  2. A secondary transaction opportunity: One Series A
     investor wants to sell their $1.5M position. Your
     SPV could acquire a portion at a 15% discount to
     the expected Series B price. This would increase
     the SPV's position significantly.
  3. Mark-to-market: Based on the Series B term sheets,
     the SPV's $2.5M investment is worth approximately
     $9M (3.6x MOIC, 260% return on paper). However,
     this is unrealized and illiquid.
  4. Tax implications: K-1s for last year were delayed
     due to the SPV's fund administrator error; several
     LPs have filed tax extensions and are unhappy.

  LP concerns you've received:
  - 3 LPs asking about pro-rata rights and how much
    additional capital is needed
  - 5 LPs frustrated about K-1 delays
  - 2 family offices asking about the secondary
    opportunity
  - 1 fund-of-funds LP requesting more detailed
    financial statements

  Task: Write a comprehensive quarterly LP report for
  the DataStack SPV that covers portfolio company
  performance, mark-to-market valuation, the pro-rata
  and secondary opportunities, tax K-1 status, and
  addresses LP concerns — formatted for a diverse LP
  base.

assertions:
  - type: llm_judge
    criteria: "Response writes a professional LP report appropriate for SPV investors — structures the report in standard LP reporting format (executive summary, portfolio company update, valuation update, capital call/distribution status, tax reporting, action items); presents DataStack's performance clearly (ARR growth, customer growth, team expansion); presents the mark-to-market valuation with appropriate caveats (3.6x MOIC based on term sheets, unrealized and illiquid); addresses the pro-rata opportunity clearly (amount needed, deadline, how to participate); addresses the secondary opportunity with appropriate detail; the report would satisfy LP expectations for a $2.5M SPV investment."
    weight: 0.35
    description: "ProfessionalLPReport"
  - type: llm_judge
    criteria: "Response handles the complex financial opportunities with clarity — explains the pro-rata rights clearly (what they are, how much additional capital, timeline, how to exercise); presents the secondary opportunity with its economics (15% discount to Series B price, risk/reward profile); addresses the difference between these two opportunities and whether LPs can participate in one, both, or neither; presents the unrealized return (3.6x MOIC) with appropriate disclaimers about liquidity; addresses the overall fund economics (management fees, carry implications at current valuation); the financial communication would be understandable to non-professional investors while meeting the standards of family offices and fund-of-funds."
    weight: 0.35
    description: "ComplexFinancialClarity"
  - type: llm_judge
    criteria: "Response addresses LP concerns directly and empathetically — acknowledges the K-1 delays, explains the cause (fund administrator error), provides resolution timeline, and describes preventive measures; addresses pro-rata questions with specific guidance on process and timeline; responds to the secondary opportunity inquiries with appropriate detail; addresses the fund-of-funds LP's request for more detailed financials; the communication treats LP concerns as legitimate and urgent; maintains the GP-LP relationship of trust and transparency; includes clear next steps and contact information for follow-up; the overall tone balances professionalism with accessibility."
    weight: 0.30
    description: "LPConcernManagement"
