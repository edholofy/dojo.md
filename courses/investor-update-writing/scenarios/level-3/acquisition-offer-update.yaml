meta:
  id: acquisition-offer-update
  level: 3
  course: investor-update-writing
  type: output
  description: "Write an investor update communicating an unsolicited acquisition offer and the Board's evaluation process"
  tags: [acquisition, m-and-a, strategic, advanced]

state: {}

trigger: |
  You're the CEO of a Series B SaaS startup ($22M raised
  at $110M post-money, 55 employees) that provides
  compliance automation software for financial services
  companies. You received an unsolicited acquisition
  offer that the Board needs to evaluate.

  The offer:
  - Acquirer: A publicly traded GRC (governance, risk,
    compliance) company ($2.4B market cap, $480M revenue)
  - Offer: $165M all-cash (1.5x the last round valuation)
  - Structure: 100% acquisition, all employees receive
    offer letters, 2-year retention packages for founders
    and key executives
  - Timeline: 30-day exclusivity period requested; 90-day
    closing target
  - Due diligence: Preliminary DD already conducted on
    public information; full DD would begin during
    exclusivity

  Your situation:
  - ARR: $11.5M (growing 65% YoY)
  - Burn: $420K/month
  - Cash: $9.8M
  - Runway: 23 months
  - You were planning to raise Series C in Q3 2027
    (targeting $80-100M round at $350-500M valuation)

  Board dynamics:
  - Series B lead (holds 22% — invested $12M): Concerned
    about macro environment; might favor the certain
    return of 1.5x in 18 months
  - Series A lead (holds 15% — invested $5M): Would get
    3.3x return; likely to support if founders support
  - CEO (you, hold 18%): Believe the company could be
    worth $500M+ in 3 years but acknowledge the risk
  - 2 independent Board members: Haven't weighed in yet

  Complicating factors:
  - If you enter exclusivity, the Series C timeline is
    disrupted
  - The acquirer is also a competitor (their compliance
    product is weaker but they have 4x your customer
    base)
  - 3 of your top engineers have equity that would be
    worth $2-4M each in the acquisition — they might
    leave if you decline
  - Your biggest customer (8% of ARR) is also a customer
    of the acquirer

  You need to communicate to your broader investor base
  (beyond the Board) about the acquisition interest
  while being careful about confidentiality and legal
  obligations.

  Task: Write an investor update that appropriately
  communicates the acquisition interest, the Board's
  evaluation framework, and the considerations at play —
  while managing confidentiality and fiduciary
  responsibilities.

assertions:
  - type: llm_judge
    criteria: "Response navigates the acquisition communication with appropriate confidentiality — communicates the existence of acquisition interest without revealing specific terms publicly (or recommends different levels of disclosure for Board vs broader investors); addresses fiduciary duty considerations (Board's obligation to evaluate credible offers); presents an evaluation framework (standalone value vs acquisition value, strategic alternatives analysis); discusses the opportunity cost of entering exclusivity (Series C disruption); the communication maintains legal and strategic propriety while keeping investors informed."
    weight: 0.35
    description: "AcquisitionConfidentialityCommunication"
  - type: llm_judge
    criteria: "Response presents a thoughtful evaluation framework — compares the $165M offer against the company's standalone trajectory ($350-500M potential in 3 years vs certain $165M today); considers risk factors for the standalone path (execution risk, market risk, fundraising risk); addresses the time value of money for different investor classes (Series B investor gets 1.5x in 18 months vs potential 3-4x in 3-4 years); considers the competitive dynamics (acquirer gaining vs losing access to your technology); addresses employee retention risk and equity implications; presents multiple scenarios rather than a single recommendation; the analysis would help investors form informed opinions."
    weight: 0.35
    description: "EvaluationFramework"
  - type: llm_judge
    criteria: "Response manages the multi-stakeholder dynamics effectively — acknowledges that different investors have different return profiles and risk tolerances (Series B investor's 1.5x vs Series A investor's 3.3x vs angels' potential outcomes); addresses the CEO's personal perspective without letting it dominate (the founder believes in the standalone path but respects Board governance); discusses the employee equity consideration sensitively; addresses what happens to the biggest customer relationship under either scenario; sets clear next steps and timeline for the evaluation process; the update would leave all investors feeling their interests are being considered."
    weight: 0.30
    description: "MultiStakeholderDynamics"
