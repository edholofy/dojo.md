meta:
  id: advanced-update-shift
  level: 3
  course: investor-update-writing
  type: output
  description: "Handle an advanced shift where you must write investor updates during a crisis involving a failed product launch, a key customer loss, and emerging acquisition interest — all while mid-fundraise"
  tags: [multi-crisis, fundraise, shift-simulation, advanced]

state: {}

trigger: |
  You're the CEO of a Series A enterprise SaaS company
  ($12M raised, 40 employees) that provides contract
  lifecycle management (CLM) software. You have a
  terrible week coinciding with your quarterly update
  cycle, and you must write three critical communications.

  Communication 1 — Quarterly Update (to all investors):
  Q3 results are mixed and you need to present them:
  - ARR: $5.2M (target was $5.8M — 90% of plan)
  - MRR: $433K
  - New logos: 8 (target: 12)
  - Expansion: $280K ARR (strong, above plan)
  - Churn: Lost your 2nd largest customer, GlobalTech
    ($380K ACV, 7.3% of ARR), which was acquired by a
    company using a competitor's CLM platform
  - Without the GlobalTech churn: retention metrics are
    strong (NRR 122%)
  - Enterprise product launch: Your new "AI Contract
    Review" module launched this quarter but adoption is
    slower than expected (only 6 of 42 eligible customers
    activated); sales team says the feature isn't ready
    for enterprise demo
  - Burn: $320K/month; Cash: $5.4M; Runway: 17 months

  Communication 2 — Confidential Board Note:
  You've received an inbound acquisition inquiry from
  DocuSign (or similar large e-signature/CLM company).
  They want to "explore strategic partnership or
  acquisition." This happened the same week you lost
  GlobalTech and the product launch underperformed. You
  need to brief the Board on:
  - Whether to engage with the inquiry
  - How this interacts with your planned Series B
    fundraise (scheduled for Q2 2027)
  - Your honest assessment of the company's position

  Communication 3 — 1:1 Email to Lead Investor:
  Your lead investor's partner (Board member) sent you
  a text: "Heard from a portfolio CEO that your AI
  Contract Review launch isn't going well. Customers
  saying it's not ready. What's happening? Let's talk
  before the quarterly goes out."
  You need to respond before the formal quarterly update
  goes out. The partner is clearly concerned and has
  independent intelligence.

  Task: Write all three communications — the quarterly
  update, the confidential Board note, and the 1:1 lead
  investor response — each at the appropriate level of
  detail, confidentiality, and strategic framing.

assertions:
  - type: llm_judge
    criteria: "Response produces three communications at different levels of confidentiality and strategic depth — quarterly update presents the mixed quarter professionally (missed targets, GlobalTech churn, AI launch challenges, strong expansion); Board note discusses acquisition inquiry strategically and confidentially (should we engage, timing considerations, honest company position assessment); lead investor 1:1 is candid and responsive (addresses the product feedback directly, doesn't get defensive about the partner hearing from a portfolio CEO); information flows appropriately between the three (Board note has information not in the quarterly; 1:1 has candor not in the quarterly; quarterly doesn't reference either)."
    weight: 0.35
    description: "ThreeLevelCommunication"
  - type: llm_judge
    criteria: "Response demonstrates strategic maturity across all three communications — the quarterly addresses the AI launch honestly (6/42 customers, slower than expected, remediation plan) without catastrophizing; the Board note evaluates the acquisition inquiry objectively (considers timing relative to Series B, company position, strategic alternatives); the 1:1 acknowledges the product feedback and addresses the partner's concern directly (shows the CEO is aware and has a plan, doesn't shoot the messenger or dismiss the intelligence); each communication reveals a founder who thinks strategically and handles pressure well."
    weight: 0.35
    description: "StrategicMaturityAcross"
  - type: llm_judge
    criteria: "Response handles the interconnected nature of the events — recognizes that the missed quarter + failed product launch + customer loss creates a narrative problem for the Series B fundraise; the Board note connects these dots with the acquisition inquiry timing (is this a floor offer or should we be grateful?); the lead investor 1:1 addresses the underlying concern (is the company executing?) not just the surface question (is the feature ready?); all three communications work together as a coherent investor relations strategy during a difficult period; the CEO emerges as honest, strategic, and in control despite challenging circumstances."
    weight: 0.30
    description: "InterconnectedEventHandling"
