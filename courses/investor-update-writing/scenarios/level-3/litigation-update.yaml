meta:
  id: litigation-update
  level: 3
  course: investor-update-writing
  type: output
  description: "Write an investor update addressing active litigation from a former employee and a patent troll while maintaining attorney-client privilege"
  tags: [litigation, legal-risk, privilege, advanced]

state: {}

trigger: |
  You're the CEO of a Series A startup ($14M raised,
  38 employees) that provides an AI-powered sales
  coaching platform. You're facing two simultaneous
  legal matters that investors need to know about.

  Litigation 1 — Former Employee Lawsuit:
  Your former VP of Engineering (terminated 8 months ago
  for performance issues) has filed a lawsuit alleging:
  - Wrongful termination (claims termination was
    retaliation for raising concerns about product
    reliability)
  - Breach of employment agreement (disputes equity
    forfeiture on unvested shares)
  - Trade secret misappropriation (claims the AI model
    he developed before joining was improperly
    incorporated into your product)
  - Demands: $2.8M in damages + return of 1.5% equity
    + injunction on using the AI model

  Your counsel's assessment:
  - Wrongful termination: Weak claim — comprehensive
    performance documentation exists; board approved
    termination
  - Equity dispute: Clear shareholder agreement terms;
    standard vesting with cliff
  - Trade secret claim: This is the concerning one — the
    AI model question involves gray area around what he
    developed prior to joining vs what was developed at
    the company; could create product risk if injunction
    is granted
  - Estimated legal costs: $400-600K over 18 months
  - Settlement range being discussed: $300-500K

  Litigation 2 — Patent Troll:
  A non-practicing entity (NPE) has sent a demand letter
  claiming your sales coaching platform infringes on 3
  patents related to "machine learning applied to sales
  conversation analysis" (Patent Nos. US 9,XXX,XXX;
  US 10,XXX,XXX; US 11,XXX,XXX). They're demanding
  $1.2M in licensing fees or threaten to file in the
  Eastern District of Texas.

  Your counsel's assessment:
  - Patents appear overly broad; good invalidity arguments
  - Similar patents have been challenged successfully at
    PTAB (Patent Trial and Appeal Board)
  - Estimated cost to fight: $250-400K (IPR proceeding)
  - Settlement: NPE would likely accept $150-250K
  - Many SaaS companies in adjacent spaces have received
    similar letters from this NPE

  Financial impact:
  - Combined worst case: $2M+ in legal costs and
    settlements
  - D&O insurance: $5M coverage; employment claims
    covered under EPLI policy ($2M coverage, $50K
    deductible)
  - Current cash: $6.8M; burn: $240K/month; runway: 28
    months
  - Legal costs could reduce runway by 3-4 months

  Task: Write an investor update that communicates both
  legal matters appropriately — providing enough
  information for investors to understand the risk while
  maintaining attorney-client privilege and avoiding
  statements that could be used against the company.

assertions:
  - type: llm_judge
    criteria: "Response communicates the legal matters with appropriate privilege awareness — provides enough detail for investors to understand the risk without disclosing privileged attorney-client communications or litigation strategy; distinguishes between facts (lawsuit filed, patent demand received) and legal assessments (presented in general terms, not specific counsel advice); avoids making admissions that could be used against the company in either proceeding; maintains appropriate qualifiers ('we believe,' 'based on our assessment'); addresses both matters without conflating them; the communication would be approved by litigation counsel."
    weight: 0.35
    description: "PrivilegeAwareCommunication"
  - type: llm_judge
    criteria: "Response differentiates the two legal risks appropriately — frames the former employee lawsuit correctly (identifies the trade secret claim as the primary risk vs the weaker wrongful termination and equity claims); addresses the patent troll matter as common in the industry (many SaaS companies face similar claims); quantifies the financial exposure (combined worst case, insurance coverage, runway impact); addresses the injunction risk on the AI model specifically (this is the existential risk, not the monetary claims); presents the insurance coverage as mitigating some financial risk; the risk assessment would help sophisticated investors evaluate materiality."
    weight: 0.35
    description: "LegalRiskDifferentiation"
  - type: llm_judge
    criteria: "Response maintains business momentum alongside legal disclosure — includes standard business metrics and progress update (doesn't let legal matters consume the entire update); frames the legal matters as manageable business risks, not existential crises; addresses how the CEO is managing time allocation (not consumed by legal at the expense of business execution); makes relevant asks (litigation counsel referrals, patent defense expertise, connections to companies that have dealt with the same NPE); sets expectations for future updates on legal matters (what to expect, when); the overall update maintains investor confidence while being fully transparent about legal risks."
    weight: 0.30
    description: "BusinessMomentumAlongsideLegal"
