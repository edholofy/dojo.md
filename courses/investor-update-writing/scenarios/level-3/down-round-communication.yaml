meta:
  id: down-round-communication
  level: 3
  course: investor-update-writing
  type: output
  description: "Write an investor update communicating a down round and its implications for existing investors"
  tags: [down-round, dilution, difficult-news, advanced]

state: {}

trigger: |
  You're the CEO of a Series B startup ($32M raised
  previously at $150M post-money valuation, 85 employees)
  that provides supply chain visibility software for
  mid-market manufacturers. Due to a combination of
  slower-than-expected growth and a difficult macro
  environment for enterprise software, you're raising
  a Series C at a significantly lower valuation.

  Business context:
  - ARR: $12.8M (projected $18M at Series B; missed by
    29%)
  - Growth: 35% YoY (down from 80% YoY at Series B)
  - Gross margin: 74%
  - Net revenue retention: 108% (was 125% at Series B)
  - Monthly burn: $620K
  - Cash: $5.2M
  - Runway: ~8 months (urgent)

  Down round details:
  - Series C terms: $20M at $85M pre-money ($105M post)
    — 30% below last round's $150M post-money
  - Lead investor: A supply chain-focused PE growth fund
    (new investor)
  - Anti-dilution protection from Series B will trigger
    — broad-based weighted average ratchet
  - Series B investors will see their ownership increase
    slightly due to anti-dilution, but all earlier
    investors (seed, Series A) will be diluted more
  - Employee option pool needs a 5% refresh (current
    pool nearly exhausted)
  - Existing investors have pro-rata rights but limited
    appetite given the down round

  Why it happened (honest assessment):
  - Overinvested in enterprise sales team before product
    was enterprise-ready (18-month sales cycles, not
    12 as modeled)
  - Supply chain software market cooled significantly
    post-pandemic
  - Lost 3 key enterprise deals to SAP and Oracle who
    dropped pricing aggressively
  - Hired too fast: grew from 45 to 85 people in 12
    months; had to lay off 15 people 4 months ago

  Silver linings:
  - Core product is strong (NPS 62, customers love it)
  - Pipeline has $4.2M in weighted opportunities
  - New PE growth fund brings supply chain industry
    expertise and customer introductions
  - Post-round, company will be properly capitalized
    for 24+ months
  - ARR per employee improved after layoffs

  Your investors: 2 VC firms (Series A and B leads, both
  have Board seats), 1 corporate strategic (manufacturer),
  8 seed angels.

  Task: Write an investor update communicating the down
  round — its terms, implications, rationale, and path
  forward — with honesty and appropriate sensitivity to
  each investor group's concerns.

assertions:
  - type: llm_judge
    criteria: "Response communicates the down round with honesty, accountability, and strategic framing — leads with the core message (raising at lower valuation) without burying it; takes accountability for the miss (doesn't blame macro alone); explains the specific reasons (enterprise readiness overestimation, market cooling, competitive dynamics, over-hiring); presents the terms clearly ($20M at $85M pre, 30% below previous); addresses the anti-dilution mechanics and their impact on different investor classes; frames the new investor's strategic value; the communication is honest without being defeatist."
    weight: 0.35
    description: "DownRoundHonesty"
  - type: llm_judge
    criteria: "Response addresses each investor group's specific concerns — for Series B investors: addresses the anti-dilution protection activation and their resulting ownership position; for Series A investors: addresses the dilution impact honestly; for seed angels: explains what the down round means for their position in the cap table; for the corporate strategic: addresses how the new PE investor and strategic direction affect the partnership; addresses pro-rata rights and whether existing investors should participate; discusses the option pool refresh and its dilutive impact; the update demonstrates empathy for the financial impact on existing investors while making the case for why this round is the right path forward."
    weight: 0.35
    description: "InvestorGroupConcerns"
  - type: llm_judge
    criteria: "Response presents a credible recovery narrative — explains how the post-round company will be different (properly capitalized, right-sized team, focused strategy); presents specific metrics and milestones for the next 12-18 months; explains what the company learned and how it's being applied; the new PE investor's supply chain expertise is positioned as strategic value, not just capital; addresses the path back to a positive trajectory (ARR targets, efficiency improvements); the recovery plan is realistic and specific, not vague promises; the update would leave investors disappointed but not abandoned — they understand the situation and believe in the path forward."
    weight: 0.30
    description: "RecoveryNarrative"
