meta:
  id: cross-border-fund-reporting
  level: 5
  course: investor-update-writing
  type: output
  description: "Design the investor reporting framework for a cross-border venture fund with LPs across 12 jurisdictions, addressing regulatory requirements (AIFMD, SFDR, Form PF), tax reporting (K-1s, FATCA/CRS), and multi-currency portfolio performance"
  tags: [cross-border, fund-reporting, regulatory, master]

state: {}

trigger: |
  You're the COO and Head of Investor Relations for
  "Meridian Ventures" — a $500M global venture fund
  with offices in San Francisco, London, Singapore,
  and Tel Aviv. Your LP base spans 12 jurisdictions,
  and your portfolio companies operate in 20+ countries.
  You need to design a comprehensive investor reporting
  framework that satisfies all regulatory, tax, and
  investor communication requirements.

  Fund structure:
  - Meridian Ventures IV LP (Delaware) — main fund
  - Meridian Ventures IV-A LP (Cayman) — offshore
    parallel fund for non-US LPs
  - Meridian Ventures IV-B (Luxembourg SCSp) — EU-
    regulated vehicle for AIFMD compliance
  - Meridian Ventures IV SPV I-III — 3 co-investment
    vehicles
  - Total committed capital: $500M across vehicles

  LP base (42 LPs across structures):
  - US institutional (12 LPs, $180M): CalPERS,
    university endowments, US pension funds
    Requirements: Form PF, FOIA considerations,
    ESG reporting, US GAAP
  - European institutional (8 LPs, $120M): European
    pension funds, insurance companies, sovereign
    Requirements: AIFMD Annex IV, SFDR Articles 6/8,
    IFRS, EU Taxonomy, FATCA/CRS
  - Middle Eastern sovereign (3 LPs, $80M): Abu Dhabi,
    Saudi, Kuwait
    Requirements: Sharia compliance screening, ESG
    aligned with national frameworks, quarterly
    Arabic-language summaries
  - Asian institutional (5 LPs, $60M): Singapore GIC,
    Japan GPIF sub-allocation, Korean pension
    Requirements: Local regulatory reporting, APAC
    tax treaty considerations
  - Family offices (8 LPs, $40M): Multi-jurisdiction
    Requirements: Personalized reporting, tax lot
    tracking, estate planning considerations
  - Fund-of-funds (6 LPs, $20M): Secondary reporting
    Requirements: Look-through reporting, J-curve
    analysis, benchmark comparison

  Portfolio (28 companies):
  - 15 US-based companies
  - 5 European companies (UK, Germany, France)
  - 4 Israeli companies
  - 2 Indian companies
  - 2 Southeast Asian companies
  - Portfolio denominated in 8 currencies
  - Combined portfolio ARR: $380M
  - Fund performance: 2.1x TVPI, 0.4x DPI, 22% net
    IRR (vintage 2022)

  Regulatory requirements to address:
  - SEC Form PF (quarterly for large advisers)
  - AIFMD Annex IV reporting (semi-annual)
  - SFDR periodic reporting (Article 8 fund)
  - EU Taxonomy alignment assessment
  - FATCA/CRS reporting (annually)
  - K-1 preparation and distribution
  - State and local tax obligations (US LPs)
  - Cayman CIMA reporting
  - Luxembourg CSSF reporting

  Current challenges:
  - K-1s delivered 2 months late last year (LP
    complaints; 3 family offices threatened to leave)
  - SFDR reporting quality challenged by EU LPs
  - Currency hedging P&L creating confusion in
    performance reporting
  - 4 different accounting firms across jurisdictions
  - No standardized LP portal (using email + Dropbox)

  Task: Design the comprehensive investor reporting
  framework for Meridian Ventures — including the
  reporting calendar, content requirements by LP
  segment, regulatory compliance checklist, technology
  infrastructure recommendations, and a sample
  quarterly LP letter that addresses the multi-
  jurisdictional complexity while remaining readable.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive cross-border reporting framework — creates a detailed reporting calendar covering all regulatory deadlines (Form PF, AIFMD Annex IV, SFDR, FATCA/CRS, K-1s, CIMA, CSSF); addresses the multi-vehicle structure (Delaware, Cayman, Luxembourg) with appropriate reporting for each; segments LP communication by jurisdiction and type (US institutional, European, Middle Eastern, Asian, family offices, fund-of-funds); addresses multi-currency performance reporting with clear methodology (hedged vs unhedged returns, currency impact attribution); the framework would satisfy a compliance officer reviewing reporting adequacy across all 12 jurisdictions."
    weight: 0.35
    description: "CrossBorderFramework"
  - type: llm_judge
    criteria: "Response addresses the specific LP segment requirements with appropriate detail — handles the SFDR Article 8 reporting for European LPs (PAI indicators, sustainability metrics); addresses Sharia compliance screening for Middle Eastern sovereign LPs; provides look-through reporting for fund-of-funds LPs; addresses estate planning and tax lot tracking for family offices; handles the FOIA considerations for US public pension LPs; each segment receives appropriately differentiated reporting while maintaining a consistent core narrative; the framework addresses the K-1 delivery problem with specific process improvements; technology recommendations (LP portal, reporting automation) are practical and proportionate."
    weight: 0.35
    description: "LPSegmentRequirements"
  - type: llm_judge
    criteria: "Response produces a sample quarterly LP letter that demonstrates mastery of multi-jurisdictional fund reporting — presents fund performance in multiple formats (TVPI, DPI, IRR, PME benchmark); addresses currency effects transparently; highlights portfolio company performance across geographies; includes ESG/sustainability reporting without greenwashing; navigates the political sensitivities of the LP base (different ESG frameworks, different regulatory regimes); the letter is readable and engaging despite the complexity; the overall framework and sample letter would position Meridian Ventures as a best-in-class institutional fund manager with sophisticated global investor relations."
    weight: 0.30
    description: "SampleLPLetter"
