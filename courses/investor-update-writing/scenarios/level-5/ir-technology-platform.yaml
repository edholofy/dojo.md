meta:
  id: ir-technology-platform
  level: 5
  course: investor-update-writing
  type: output
  description: "Design the product strategy and write the investor pitch for an AI-powered investor relations platform that automates update creation, manages multi-stakeholder communications, and provides real-time portfolio analytics"
  tags: [ir-technology, ai-platform, product-strategy, master]

state: {}

trigger: |
  You're the CEO and co-founder of "UpdateIQ" — an
  AI-powered investor relations platform for venture-
  backed startups. You've raised a $6M seed round and
  have 45 paying customers ($1.8M ARR). You're
  preparing for your Series A, which requires both a
  compelling product vision document AND a
  demonstration of your own investor update writing
  capabilities (you're a meta-example — an IR platform
  that must excel at its own investor communications).

  Product capabilities (current):
  - AI-generated investor update drafts (trained on
    10,000+ anonymized investor updates)
  - Automatic financial data integration (QuickBooks,
    Stripe, Carta)
  - Multi-stakeholder communication management
    (different versions for different investor groups)
  - Investor engagement analytics (open rates, read
    time, link clicks)
  - Template library (50+ templates for common
    situations: fundraising, crisis, milestone)
  - Board deck generator

  Product roadmap (Series A funding):
  - Phase 1: "Smart Drafting" — AI that learns each
    company's voice, adapts to their metrics, and
    generates increasingly personalized updates
  - Phase 2: "Investor Intelligence" — analytics
    showing which investors engage, which are cooling,
    predictive fundraising timing
  - Phase 3: "Portfolio Dashboard" — LP-facing real-
    time dashboard that VCs can white-label for their
    LPs (B2B2B model)
  - Phase 4: "Crisis Response" — real-time crisis
    communication drafting with legal compliance
    guardrails and stakeholder-specific messaging

  Market data:
  - TAM: 50,000 venture-backed startups in US alone
  - SAM: 15,000 Series A+ companies ($50-500 ARR range
    for the product)
  - Current penetration: 0.3% of SAM
  - Competitors: Visible.vc (established, broader
    focus), Carta (cap table focused, has reporting),
    manual (most companies use Google Docs/email)
  - Differentiation: AI-first, multi-stakeholder
    management, investor engagement analytics

  Your metrics:
  - ARR: $1.8M (growing 22% MoM for last 6 months)
  - Customers: 45 (avg deal size $40K ARR)
  - NRR: 135% (expansion from template → full platform)
  - Gross margin: 78%
  - CAC payback: 8 months
  - Logo churn: 5% annually
  - Team: 22 (12 engineering, 4 sales, 3 CS, 3 G&A)
  - Users generate 2,800 investor updates/month on
    platform

  Series A target: $18-22M at $80-100M pre-money
  Lead investors in process: Bessemer, Iconiq, Craft

  Task: Write both (1) the product vision document
  for UpdateIQ's Series A pitch deck — articulating
  the full platform strategy and market opportunity —
  AND (2) your own quarterly investor update to your
  seed investors, which serves as a live demonstration
  of your platform's philosophy and capabilities.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling product vision document — articulates the market opportunity (50K venture-backed startups, most using manual processes); presents the 4-phase product roadmap with clear strategic logic (drafting → intelligence → LP dashboard → crisis response); differentiates from Visible.vc and Carta convincingly; presents the B2B2B model (startup → VC → LP) as the platform's ultimate vision; addresses the AI-first approach with specifics (how the AI learns company voice, what data it integrates, how multi-stakeholder management works); the product vision would excite a Series A investor (Bessemer, Iconiq, Craft) about the market opportunity and UpdateIQ's position."
    weight: 0.35
    description: "ProductVisionDocument"
  - type: llm_judge
    criteria: "Response writes an exemplary quarterly investor update that serves as a meta-demonstration — the update itself showcases the principles UpdateIQ advocates (structured format, honest metrics, clear asks, calibrated optimism); presents the company's performance compellingly ($1.8M ARR, 22% MoM growth, 135% NRR); addresses challenges honestly (competition, market education needed, engineering talent market); makes specific asks of seed investors (Series A introductions, customer referrals, product feedback); the update is the kind of communication that makes seed investors proud and proves the company practices what it preaches."
    weight: 0.35
    description: "MetaDemonstrationUpdate"
  - type: llm_judge
    criteria: "Response addresses the unique strategic challenges of an IR platform — discusses the meta-challenge (an IR tool must have perfect IR); addresses the AI-generated update concern (authenticity vs efficiency, how to ensure AI-drafted updates maintain founder voice); discusses data privacy and security (handling sensitive financial data from thousands of companies); addresses the competitive moat (data network effects from 10,000+ updates training the AI); discusses the platform's role in the broader transparency movement in venture capital; the overall package demonstrates founder-market fit — someone who deeply understands both the technology and the investor relations domain."
    weight: 0.30
    description: "StrategicDepth"
