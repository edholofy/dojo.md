meta:
  id: ir-consulting-practice
  level: 5
  course: investor-update-writing
  type: output
  description: "Design and launch an investor relations consulting practice for growth-stage startups, including service offerings, methodology, pricing, and go-to-market strategy"
  tags: [consulting, ir-practice, methodology, master]

state: {}

trigger: |
  You're a former VP of Investor Relations at two
  successful IPOs (a $4B SaaS company and a $2.2B
  fintech) who is launching "ClearSignal IR" — an
  investor relations consulting practice specifically
  for Series B+ startups preparing for or navigating
  growth-stage investor communications. You've raised
  $500K from angel investors to fund the first 18
  months.

  Your market insight: Most startups don't hire a
  dedicated IR person until Series C or later, but
  the communication challenges start at Series B. The
  gap between "CEO writes monthly emails" and
  "professional IR function" is where companies lose
  investor trust, mishandle crises, and damage
  fundraising outcomes.

  Service lines to design:

  1. "IR Readiness Assessment" (one-time):
     - Audit current investor communications
     - Gap analysis against best practices
     - Investor perception survey (confidential
       interviews with 5-10 investors)
     - Deliverable: IR Readiness Score + improvement
       roadmap
     - Target: Pre-Series B companies preparing for
       growth

  2. "Fractional IR" (ongoing retainer):
     - Monthly: Write/review investor updates, manage
       investor inbox, prepare Board materials
     - Quarterly: Investor meetings, fundraising
       preparation, metrics benchmarking
     - Annual: Annual review, investor day preparation
     - Target: Series B/C companies ($10-100M ARR)

  3. "Crisis Communications" (project-based):
     - Rapid response for investor-facing crises (down
       rounds, layoffs, leadership changes, regulatory
       issues)
     - 48-hour initial response drafting
     - Ongoing crisis management through resolution
     - Target: Any stage, crisis-driven

  4. "IPO Communications Preparation" (6-12 month
     engagement):
     - S-1 narrative development
     - Investor presentation creation
     - Roadshow preparation and coaching
     - Quiet period communication management
     - Target: Pre-IPO companies ($100M+ ARR)

  5. "IR Technology Stack" (implementation):
     - Select and implement IR tools (Visible, Carta,
       custom dashboards)
     - Design automated reporting workflows
     - Build investor CRM and communication tracking
     - Target: Series B+ companies building IR
       infrastructure

  Financial model considerations:
  - IR Readiness Assessment: $15-25K per engagement
  - Fractional IR: $8-15K/month retainer
  - Crisis Communications: $25-50K per engagement
  - IPO Prep: $150-300K for full engagement
  - IR Tech Stack: $20-40K implementation
  - Year 1 target: $600K revenue, 8-12 clients
  - Year 3 target: $2.5M revenue, 25-30 clients,
    team of 5

  Competitive landscape:
  - Big IR firms (FTI, Sard Verbinnen) focus on public
    companies
  - VC operating partners provide some IR support but
    it's not their core expertise
  - A few boutiques exist but most focus on public
    company IR
  - Gap: No dedicated, tech-native IR practice for
    growth-stage startups

  Task: Write the complete business plan and go-to-
  market strategy for ClearSignal IR, including
  detailed service descriptions with sample
  deliverables, the proprietary methodology, pricing
  rationale, sales strategy, and the pitch deck
  narrative for your angel investors' first quarterly
  update.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive IR consulting practice with detailed service offerings — each of the 5 service lines has clear scope, deliverables, timelines, and target client profiles; the IR Readiness Assessment includes a credible scoring methodology; the Fractional IR service has clear SLAs and communication cadences; the Crisis Communications service has a rapid-response framework; the IPO Prep engagement has a detailed phase-by-phase approach; the IR Tech Stack service demonstrates knowledge of the tools landscape; sample deliverables illustrate the quality and depth of work; the overall practice design demonstrates deep IR expertise translated into a viable consulting business."
    weight: 0.35
    description: "ServiceDesign"
  - type: llm_judge
    criteria: "Response creates a viable business model and go-to-market strategy — pricing is justified relative to client value and competitive alternatives; the revenue build from Year 1 ($600K) to Year 3 ($2.5M) is credible with clear assumptions; the sales strategy identifies specific channels (VC referrals, accelerator partnerships, content marketing, conference speaking); addresses client acquisition costs and retention; discusses team scaling (when to hire, what roles); the financial model accounts for the realities of a consulting business (utilization rates, project overlap, seasonal patterns); the go-to-market strategy differentiates ClearSignal from both big IR firms and VC operating partners."
    weight: 0.35
    description: "BusinessModelViability"
  - type: llm_judge
    criteria: "Response develops a proprietary methodology that codifies IR best practices — creates a framework or system (named and branded) that translates IR expertise into repeatable processes; the methodology addresses the full spectrum of investor communications (routine updates, milestone announcements, crisis communications, fundraising narratives); includes metrics and benchmarks for measuring IR effectiveness; the angel investor quarterly update demonstrates the methodology in action (practicing what you preach); the overall package would convince both potential clients and angel investors that ClearSignal has a differentiated, scalable approach to startup IR."
    weight: 0.30
    description: "ProprietaryMethodology"
