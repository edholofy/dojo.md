meta:
  id: master-update-shift
  level: 5
  course: investor-update-writing
  type: output
  description: "Write the investor communications for a $12B mega-fund managing a portfolio-wide crisis — simultaneous public market correction, LP liquidity crunch, GP succession, regulatory investigation, and portfolio company contagion — requiring mastery of every investor communication discipline"
  tags: [mega-fund, portfolio-crisis, gp-succession, master, shift-simulation]

state: {}

trigger: |
  You're the incoming Managing Partner of "Apex
  Ventures" — a storied $12B venture capital firm (4
  active funds, 180 portfolio companies, 320 LPs,
  offices in 6 countries). You assumed the role 3 weeks
  ago after the founding Managing Partner (30-year
  tenure, industry legend) stepped down abruptly due
  to a personal health crisis. You have 72 hours to
  prepare and deliver a comprehensive communication
  package addressing multiple simultaneous crises.

  Crisis 1 — GP succession and leadership transition:
  - Founding MP stepped down with 1 week notice
  - Key-person clause triggered in Funds III and IV
    ($4.2B and $3.8B respectively) — LPs have 90 days
    to evaluate and potentially suspend commitments
  - 2 of 8 General Partners have resigned (following
    the founder), taking their deal networks
  - Remaining team: 6 GPs, 12 principals, 20 associates
  - Your background: 15 years at Apex (joined as
    principal), led 22 investments, 6 IPOs

  Crisis 2 — Public market correction:
  - NASDAQ down 28% in 3 months; IPO window closed
  - 8 portfolio companies that were IPO-track are now
    pivoting to "survive and extend" mode
  - 12 portfolio companies need follow-on funding in
    next 12 months; unfavorable market conditions
  - 3 portfolio companies' latest valuations are being
    challenged by auditors (down-round marks needed)
  - Fund IV TVPI likely to decrease from 1.8x to 1.3x
    after remarking

  Crisis 3 — LP liquidity crisis:
  - "Denominator effect": Several large LPs are over-
    allocated to venture (public portfolio down, so VC
    % has increased above target)
  - 4 LPs have requested early distributions or
    secondary sales of their fund interests
  - 2 LPs have asked to reduce unfunded commitments
    (contractually difficult but politically sensitive)
  - Fund V fundraise (target $5B) was 60% through
    when the founder departed; now on pause

  Crisis 4 — Regulatory investigation:
  - SEC has opened an inquiry into Apex's valuation
    practices for Fund III (2021 vintage — marks during
    the bubble peak)
  - Specific concern: 4 portfolio companies marked at
    revenue multiples 3-5x higher than current public
    comparables, and these marks were used in Fund IV
    fundraising materials
  - Outside counsel (Sullivan & Cromwell) engaged
  - LPAC (LP Advisory Committee) notified per LPA
    requirements

  Crisis 5 — Portfolio company contagion:
  - Your largest portfolio company (AI company, $2.4B
    mark, 8% of Fund III) just lost its CEO to a
    competitor, and 3 Board members resigned
  - Your second-largest position (fintech, $1.8B mark,
    6% of Fund III) is under CFPB investigation
  - Combined, these 2 positions represent $4.2B (14%
    of marks across funds) and are simultaneously in
    crisis

  Your LP base (320 LPs):
  - Tier 1 (15 LPs, $4.5B): Major institutions
    (CalPERS, OTPP, GIC, ADIA, Harvard) — sophisticated,
    demand full transparency, have key-person concerns
  - Tier 2 (45 LPs, $4.2B): Mid-size institutions —
    need clear guidance, concerned about liquidity
  - Tier 3 (120 LPs, $2.5B): Smaller institutions and
    family offices — need simplified but honest
    communication
  - Tier 4 (140 LPs, $0.8B): Fund-of-funds and
    advisors — need look-through data for their own
    LP reporting

  Task: Write the complete communication package:
  1. An "all-LP" letter introducing yourself as new MP,
     addressing the leadership transition, and providing
     an honest assessment of the current environment
  2. A detailed Tier 1 LP briefing document addressing
     all 5 crises with specifics, your response plan,
     and the key-person clause process
  3. A confidential LPAC memo addressing the SEC inquiry
     and valuation methodology defense
  4. Portfolio company CEO communication about what the
     GP transition means for them and how Apex will
     continue to support them
  5. A personal note establishing your leadership
     philosophy and communication commitments going
     forward

assertions:
  - type: llm_judge
    criteria: "Response creates 5 distinct communications with appropriate information tiers — the all-LP letter introduces the new MP with credibility and addresses the transition at a high level without causing panic; the Tier 1 briefing provides full transparency on all 5 crises with specific data, response plans, and timeline; the LPAC memo addresses the SEC inquiry with appropriate legal caution (Sullivan & Cromwell guidance, valuation methodology defense, LPAC notification obligations); the portfolio company CEO letter provides stability and continuity assurance; the personal note establishes leadership philosophy; each communication is calibrated to its audience's sophistication, information rights, and emotional needs; information barriers between documents are maintained appropriately."
    weight: 0.35
    description: "TieredCommunicationMastery"
  - type: llm_judge
    criteria: "Response navigates the interconnected crises with strategic coherence — addresses the GP succession (key-person clause, 90-day window, team stability) in a way that builds confidence rather than triggers LP exits; handles the market correction's impact on portfolio marks (TVPI decline from 1.8x to 1.3x) with analytical rigor; addresses the LP liquidity crisis (denominator effect, secondary requests, reduced commitments) with empathy and practical solutions; handles the SEC inquiry without admitting wrongdoing while being transparent with LPAC; addresses the portfolio company crises (AI company CEO departure, fintech CFPB investigation) as specific challenges rather than systemic failures; each crisis is addressed both individually and in the context of the overall situation."
    weight: 0.35
    description: "InterconnectedCrisisNavigation"
  - type: llm_judge
    criteria: "Response demonstrates the leadership qualities needed for a mega-fund Managing Partner transition — the personal note establishes credibility (15 years, 22 investments, 6 IPOs) without arrogance; the communication commitments are specific and measurable (reporting cadence, accessibility, transparency principles); the overall tone is calm, competent, and determined without being dismissive of the severity of the situation; the Fund V fundraise pause is addressed realistically; the team stability message is convincing; the portfolio company communication demonstrates that Apex's value-add continues despite GP changes; the complete package would make a Tier 1 LP pause before triggering the key-person exit right and instead give the new MP a chance to prove themselves."
    weight: 0.30
    description: "LeadershipTransitionCredibility"
