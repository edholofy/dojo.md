meta:
  id: behavioral-economics-investor-comms
  level: 5
  course: investor-update-writing
  type: output
  description: "Write an academic chapter applying behavioral economics and cognitive science to investor update design — how framing effects, anchoring, loss aversion, and narrative psychology shape investor perception and decision-making"
  tags: [behavioral-economics, cognitive-science, investor-psychology, master]

state: {}

trigger: |
  You're a professor of behavioral finance at Wharton
  who has been commissioned to write a chapter for the
  Oxford Handbook of Entrepreneurial Finance titled
  "The Behavioral Science of Investor Communications:
  How Cognitive Biases Shape the GP-LP and Founder-
  Investor Relationship."

  Your research combines experimental psychology with
  real-world investor communication analysis. You've
  conducted 8 experimental studies and analyzed the
  same 12,000-update dataset from Stanford (with
  permission) through a behavioral lens.

  Key findings to present:

  1. Framing effects in investor updates:
     - "Revenue grew 15% QoQ" vs "Revenue missed plan
       by 8%" — same company, same quarter, different
       framing produces different investor responses
     - Experiment: 200 LPs shown identical financials
       with different framing; positive framing
       increased willingness to invest by 34%
     - BUT sophisticated LPs (>10 years experience)
       showed reverse effect — they penalized obvious
       positive framing by 22%
     - Implication: Framing should match audience
       sophistication

  2. Anchoring in valuation communication:
     - Companies that reference their last-round
       valuation in updates anchor investor expectations
     - Experiment: Presenting "we're at $50M ARR on
       a $500M post" vs just "$50M ARR" — the
       valuation anchor changed follow-on price
       expectations by 18%
     - Down round communication: Initial anchor
       dramatically affects perception of the new
       valuation (presenting the "why" before the
       number reduces negative reaction by 40%)

  3. Loss aversion and bad news delivery:
     - Founders delay bad news an average of 6.2 weeks
       (compared to 1.3 weeks for good news) —
       consistent with Kahneman's loss aversion
     - The "drip" strategy (gradually revealing bad
       news) vs "rip the bandaid" (full disclosure
       immediately) — experimental finding: investors
       prefer and reward immediate full disclosure
     - But founder surveys show 78% believe gradual
       revelation is safer (perception-reality gap)

  4. Narrative psychology and investor storytelling:
     - Updates with clear narrative arc (challenge →
       action → result) increase investor engagement
       by 2.4x vs data-only updates
     - The "hero's journey" pattern in successful
       startup narratives (founder as protagonist
       overcoming obstacles)
     - Danger of narrative coherence bias: too-clean
       narratives trigger skepticism in experienced
       investors
     - "Strategic ambiguity" — leaving some narrative
       threads open increases investor engagement
       (they want to know what happens next)

  5. Social proof and comparison effects:
     - Benchmarking against named competitors changes
       investor perception (but naming competitors
       can backfire if the competitor is more
       prestigious)
     - Investor update "tone matching" — founders
       unconsciously mirror the communication style
       of their lead investor (VC culture transmission)
     - Herd behavior in follow-on decisions: LPs who
       learn other LPs are re-investing increase their
       own re-investment probability by 56%

  6. The "update fatigue" phenomenon:
     - LP attention declines 12% per year of fund life
     - Information overload: updates over 1,500 words
       see 35% lower engagement
     - The optimal update length: 800-1,200 words
       (sweet spot for information density vs attention)
     - Visual elements increase information retention
       by 40% but only if they're charts (stock photos
       decrease trust)

  Task: Write the complete handbook chapter including
  literature review, presentation of each finding with
  methodology, practical implications for founders and
  GPs, and a theoretical framework connecting these
  findings to broader behavioral finance theory.

assertions:
  - type: llm_judge
    criteria: "Response writes a rigorous academic chapter that applies behavioral economics to investor communications — presents each of the 6 research areas (framing, anchoring, loss aversion, narrative psychology, social proof, update fatigue) with appropriate experimental methodology; connects findings to established behavioral finance theory (Kahneman, Thaler, Shiller, Tversky); includes effect sizes and statistical significance; distinguishes between experimental and observational findings; the chapter would meet Oxford Handbook standards for academic rigor while remaining accessible to practitioner readers."
    weight: 0.35
    description: "AcademicRigorAndTheory"
  - type: llm_judge
    criteria: "Response presents the experimental findings with nuance and intellectual honesty — addresses the counterintuitive finding that sophisticated LPs penalize positive framing; discusses the perception-reality gap in bad news delivery; handles the narrative coherence bias finding (too-clean stories backfire); presents the anchoring effects in valuation communication with appropriate caveats; discusses the limitations of each experiment (sample size, external validity, demand characteristics); doesn't oversimplify complex findings for practical appeal; the chapter advances the academic understanding of investor communication as a behavioral phenomenon."
    weight: 0.35
    description: "NuancedFindings"
  - type: llm_judge
    criteria: "Response bridges behavioral science and practical investor communications — translates each finding into actionable guidance for founders and GPs (framing calibrated to audience sophistication, anchoring strategies for valuation communication, full-disclosure approach to bad news, narrative arc design, optimal update length); creates a theoretical framework that connects all 6 areas into a coherent model of investor communication psychology; discusses implications for AI-generated updates (can AI replicate the behavioral nuances?); the practical section would be excerpted and shared widely among founders and investors as evidence-based communication guidance."
    weight: 0.30
    description: "PracticalBridge"
