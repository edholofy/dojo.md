meta:
  id: investor-update-empirical-research
  level: 5
  course: investor-update-writing
  type: output
  description: "Design and write up a large-scale empirical research study analyzing the correlation between investor update practices and startup outcomes, for publication in a top management journal"
  tags: [empirical-research, academic, startup-outcomes, master]

state: {}

trigger: |
  You're a tenured professor at Stanford GSB who
  specializes in entrepreneurial finance and has
  secured a unique dataset: 12,000 investor updates
  from 840 venture-backed startups (2015-2024),
  provided under NDA by 6 major VC firms who want to
  understand the relationship between founder
  communication practices and company outcomes.

  Your research questions:
  1. Does the frequency and quality of investor updates
     predict startup success (defined as exit via IPO
     or acquisition at >3x invested capital)?
  2. What communication patterns distinguish companies
     that successfully navigate crises (pivots, down
     rounds, leadership changes) from those that fail?
  3. How does investor update sentiment and information
     asymmetry correlate with subsequent fundraising
     outcomes?

  Dataset details:
  - 12,000 investor updates from 840 companies
  - Company outcomes tracked through 2025
  - 340 companies achieved successful exit (40.5%)
  - 180 companies failed/wound down (21.4%)
  - 320 companies still operating (38.1%)
  - Updates span seed through Series D
  - Average 14.3 updates per company in dataset
  - Median company age at first update: 18 months
  - Supplemental data: Crunchbase, PitchBook, SEC
    filings, founder surveys (n=312)

  Preliminary findings:
  1. Update frequency and outcomes:
     - Companies sending monthly updates: 52% success
       rate (vs 31% for quarterly, 18% for irregular)
     - But causality is unclear — better companies may
       simply update more
     - Instrumental variable approach using VC firm
       "update culture" as exogenous variation

  2. Communication quality scoring (NLP analysis):
     - Developed "Transparency Index" (0-100) based on:
       specificity of metrics, acknowledgment of
       challenges, forward-looking honesty, ask clarity
     - Top-quartile Transparency Index: 58% success
       rate; bottom-quartile: 24%
     - "Bad news delivery" quality is the strongest
       single predictor (r=0.42 with exit outcome)

  3. Crisis communication patterns:
     - Companies that proactively communicated crises
       (before investors discovered them): 3.1x more
       likely to raise follow-on funding
     - "Communication gap" (months without update)
       preceding company failure: average 4.2 months
     - Down round communication: companies with
       structured narratives raised 40% more in
       subsequent rounds

  4. Sentiment analysis:
     - Excessive positivity in updates correlates with
       worse outcomes (r=-0.28)
     - "Calibrated optimism" (positive overall with
       specific risk acknowledgment) correlates with
       best outcomes
     - Linguistic complexity (Flesch-Kincaid) negatively
       correlated with investor trust scores

  5. Information asymmetry:
     - Companies sharing more detailed financials
       (unit economics, cohort data) raised follow-on
       rounds 2.4 months faster
     - Selective disclosure (different info to different
       investors) detected in 23% of companies;
       correlated with 30% lower success rate

  Methodological challenges:
  - Selection bias (VCs that share data may have
    different portfolio dynamics)
  - Survivorship bias (failed companies' updates may
    be missing)
  - Causality vs correlation (good communication may
    be a symptom, not a cause, of good management)
  - NLP limitations in scoring subjective "quality"

  Task: Write the full research paper for submission
  to the Journal of Financial Economics, including
  abstract, introduction, literature review framework,
  methodology, results presentation, discussion of
  implications for practitioners and theory, and
  limitations.

assertions:
  - type: llm_judge
    criteria: "Response produces a credible academic research paper structure — includes a compelling abstract that states the research question, methodology, and key findings; the introduction motivates the study within entrepreneurial finance literature; the methodology section addresses the dataset, NLP-based Transparency Index construction, instrumental variable approach for causality, and robustness checks; results are presented with appropriate statistical rigor (regression tables described, effect sizes, confidence intervals); the discussion connects findings to both academic theory and practitioner implications; limitations are honestly addressed (selection bias, survivorship, causality); the paper would be taken seriously by JFE reviewers."
    weight: 0.35
    description: "AcademicRigor"
  - type: llm_judge
    criteria: "Response presents the empirical findings with nuance and intellectual honesty — distinguishes between correlation and causation throughout (especially the update frequency → success relationship); presents the instrumental variable approach convincingly; discusses the Transparency Index methodology with appropriate caveats (NLP limitations, subjectivity of quality); addresses the counterargument that good communication is merely a proxy for good management; presents the crisis communication findings as the most causally compelling (proactive disclosure → follow-on funding); the selective disclosure finding is discussed with appropriate complexity; the overall analysis would advance the academic understanding of information dynamics in venture capital."
    weight: 0.35
    description: "EmpiricalNuance"
  - type: llm_judge
    criteria: "Response bridges academic research and practical implications — translates findings into actionable insights for founders (monthly updates, bad news delivery quality, calibrated optimism); provides implications for VCs (how to evaluate portfolio company communication as a signal, update culture as firm-level value-add); discusses policy implications (should NVCA/ILPA standardize reporting?); addresses the AI-generated update phenomenon and its implications for the research findings; the practitioner section would be excerpted and shared widely in the startup ecosystem; the paper demonstrates that investor communication is a legitimate and important field of academic inquiry."
    weight: 0.30
    description: "PracticalImplications"
