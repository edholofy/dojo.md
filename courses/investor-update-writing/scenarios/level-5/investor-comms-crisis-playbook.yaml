meta:
  id: investor-comms-crisis-playbook
  level: 5
  course: investor-update-writing
  type: output
  description: "Create the definitive crisis communications playbook for startups — covering every major crisis type with templates, decision frameworks, legal guardrails, and stakeholder management strategies"
  tags: [crisis-playbook, templates, decision-frameworks, master]

state: {}

trigger: |
  You're a former General Counsel at two unicorns
  (one successful IPO, one spectacular implosion) who
  is now a venture partner at a top-5 VC firm. Your
  managing partner has asked you to create the
  definitive "Investor Crisis Communications Playbook"
  — a resource that every portfolio company CEO can
  reference when facing a crisis that requires investor
  communication.

  Your experience includes personally managing investor
  communications during:
  - A $400M down round (Company A: SaaS, 2022)
  - A founder misconduct investigation and removal
    (Company B: fintech, CEO terminated for cause)
  - An SEC investigation and eventual settlement
    (Company C: crypto, $12M fine)
  - A mass layoff (Company A: 45% reduction)
  - A data breach affecting 2M users (Company B)
  - A co-founder lawsuit and IP dispute (Company D)
  - A company wind-down and asset sale (Company E)
  - A hostile takeover defense (Company A: successful)

  The playbook should cover:

  1. Crisis taxonomy and severity framework:
     - Financial crises (runway, down round, missed
       covenants, bridge needs)
     - Leadership crises (founder departure, misconduct,
       Board disputes)
     - Legal/regulatory crises (investigations, lawsuits,
       compliance failures)
     - Operational crises (data breach, product failure,
       customer loss)
     - Reputational crises (media coverage, social media,
       whistleblower)
     - Market crises (competitive disruption, market
       collapse)
     - Each with severity levels (1-5) and communication
       urgency guidance

  2. Communication decision framework:
     - Who needs to know, in what order, with how much
       detail?
     - Legal privilege considerations (what NOT to put
       in writing)
     - Board notification obligations vs all-investor
       communication
     - When to proactively disclose vs when to wait
     - The "48-hour rule" (your principle: if investors
       will find out within 48 hours from other sources,
       you should tell them first)

  3. Templates for each crisis type:
     - Each template should include: opening framework,
       fact pattern presentation, action plan, ask/
       request, and tone guidance
     - "What to say" AND "what NOT to say" for each
     - Legal review checklist for each template

  4. Stakeholder management matrix:
     - Board members (fiduciary duty, real-time updates)
     - Lead investors (most detail, strategic input)
     - Follow-on investors (timely but proportional)
     - Angels/small investors (simplified, less frequent)
     - Employees (what they should/shouldn't hear)
     - Customers (if applicable)
     - Media (if applicable)

  5. Post-crisis recovery communications:
     - Rebuilding trust after each crisis type
     - The "100-day recovery update" framework
     - Measuring investor confidence recovery
     - When/how to address the crisis in future
       fundraising (the "what happened" narrative)

  Task: Write the complete Investor Crisis
  Communications Playbook — comprehensive enough to
  serve as the definitive reference for any startup
  CEO facing a crisis, with practical templates, legal
  guardrails, and real-world examples drawn from your
  experience.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive crisis communications playbook — covers all 6 crisis categories (financial, leadership, legal/regulatory, operational, reputational, market) with severity frameworks and communication urgency guidance; provides the decision framework for disclosure timing, audience, and detail level; includes templates for each major crisis type with opening frameworks, fact presentation, action plans, and tone guidance; the stakeholder management matrix clearly delineates who gets what information when; the playbook is structured for quick reference during actual crises (when CEOs are under extreme stress); the overall resource would be the definitive reference for startup crisis communications."
    weight: 0.35
    description: "ComprehensivePlaybook"
  - type: llm_judge
    criteria: "Response addresses the legal and strategic dimensions with sophistication — includes 'what NOT to say' guidance that reflects real legal considerations (attorney-client privilege, securities law, defamation, employment law); the disclosure timing framework balances proactive transparency with legal risk management; addresses the tension between full transparency and protecting the company's legal position; discusses Board notification obligations and fiduciary duty implications; the legal review checklist for each template would be useful to both CEOs and their counsel; the playbook draws credibly on the author's experience with SEC investigations, founder misconduct, and hostile takeovers."
    weight: 0.35
    description: "LegalStrategicSophistication"
  - type: llm_judge
    criteria: "Response provides practical, immediately usable templates and frameworks — each crisis template can be adapted with minimal effort during an actual crisis; the '48-hour rule' and other principles are memorable and actionable; post-crisis recovery communications are addressed with specific frameworks (100-day recovery update); the playbook addresses the emotional dimension of crisis communications (founder stress, investor anger, team anxiety); real-world examples illustrate each principle without breaching confidentiality; the playbook would be shared among portfolio company CEOs and become an essential resource in the venture ecosystem."
    weight: 0.30
    description: "PracticalUsability"
