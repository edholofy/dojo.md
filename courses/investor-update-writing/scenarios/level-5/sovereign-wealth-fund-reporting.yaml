meta:
  id: sovereign-wealth-fund-reporting
  level: 5
  course: investor-update-writing
  type: output
  description: "Design the annual transparency report for a sovereign wealth fund's venture capital program, balancing public accountability with portfolio company confidentiality and geopolitical sensitivities"
  tags: [sovereign-wealth, transparency, public-accountability, master]

state: {}

trigger: |
  You're the Chief Investment Officer of the Technology
  Ventures division at a major sovereign wealth fund
  ("NordFund," $180B total AUM, $8B allocated to
  venture/growth technology). NordFund is owned by the
  government of a Northern European country and is
  subject to public accountability requirements — the
  annual report is presented to Parliament and published
  online.

  Your mandate: Invest in global technology companies
  (seed through pre-IPO) to generate returns for the
  national wealth fund while building technology
  knowledge that benefits the domestic economy.

  Technology Ventures portfolio:
  - Direct investments: 42 companies across US (22),
    Europe (12), Israel (4), India (2), SE Asia (2)
  - Fund investments: LP in 15 VC funds (including
    Sequoia, Bessemer, Lightspeed, Balderton, Accel)
  - Total deployed: $5.2B over 8 years
  - Realized returns: $3.8B (from 18 exits)
  - Unrealized portfolio: $8.4B (estimated fair value)
  - Overall TVPI: 2.35x; DPI: 0.73x; Net IRR: 18.2%

  This year's notable developments:
  - Best performer: AI infrastructure company (invested
    $120M at Series B, now worth $2.8B — 23x)
  - Worst performer: Crypto exchange (invested $200M,
    now written down to $30M — regulatory issues)
  - Controversy: $150M investment in a US defense tech
    company drew domestic political criticism (ethical
    concerns about autonomous weapons)
  - Geopolitical: 2 Chinese portfolio companies
    affected by US-China tech restrictions; divesting
    under political pressure
  - Knowledge transfer: 8 portfolio companies opened
    offices in your country (340 jobs created)
  - ESG: 3 portfolio companies flagged in ESG screening
    (labor practices, environmental impact, data
    privacy)

  Reporting challenges:
  1. Public accountability vs confidentiality:
     - Parliament expects full transparency
     - Portfolio companies (especially private) expect
       confidentiality of financial details
     - VC fund GPs have strict NDA requirements
     - How much to disclose without harming portfolio
       company interests?

  2. Political sensitivity:
     - Defense tech investment controversial domestically
     - China divestment politically charged
     - Crypto write-down will be criticized
     - Opposition party has requested detailed breakdown
       of "failed investments"

  3. Performance reporting complexity:
     - Unrealized gains ($8.4B) dwarf realized returns
       ($3.8B) — TVPI looks great but DPI is modest
     - How to present performance honestly without
       creating misleading impressions?
     - Benchmark selection (vs public equities? vs
       other SWFs? vs VC industry?)

  4. Domestic benefit measurement:
     - How to quantify technology knowledge transfer?
     - Job creation tracking (direct vs indirect)
     - Startup ecosystem development impact
     - Return on "soft mandate" (non-financial benefits)

  Task: Write the annual transparency report for
  NordFund's Technology Ventures division — suitable
  for Parliamentary presentation, public publication,
  and media scrutiny — that balances accountability
  with confidentiality, addresses the controversies
  honestly, and presents both financial and strategic
  value creation.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive annual transparency report suitable for Parliamentary presentation — presents financial performance with appropriate rigor (TVPI, DPI, IRR, vintage analysis, benchmark comparison); addresses the unrealized vs realized returns distinction honestly; reports on the full portfolio without disclosing confidential company-level financials (aggregated by sector, stage, geography); includes the domestic benefit analysis (jobs, offices, knowledge transfer) with credible measurement methodology; the report would satisfy a Parliamentary committee reviewing the fund's technology investment mandate."
    weight: 0.35
    description: "ParliamentaryTransparency"
  - type: llm_judge
    criteria: "Response navigates the political controversies with diplomatic honesty — addresses the defense tech investment controversy with principled reasoning (investment thesis, ethical review process, defense policy alignment); handles the China divestment with geopolitical awareness; presents the crypto write-down as a learning experience without being dismissive of $170M in lost value; addresses the ESG flags with specific remediation actions; doesn't hide bad news but doesn't lead with it either; provides the opposition party's requested 'failed investments' information in a way that contextualizes failures within portfolio construction theory; the report would withstand media scrutiny and political questioning."
    weight: 0.35
    description: "PoliticalNavigation"
  - type: llm_judge
    criteria: "Response balances public accountability with portfolio confidentiality — establishes clear principles for what is disclosed publicly vs what remains confidential; addresses the tension between Parliamentary transparency expectations and VC fund NDA requirements; discusses the aggregation methodology that protects company-level data while providing meaningful insight; presents the fund investment portfolio (15 VC funds) with appropriate detail; addresses ESG reporting with substance (not greenwashing); includes forward-looking strategy and risk factors; the overall report demonstrates that a sovereign wealth fund can be a sophisticated, responsible, and transparent venture capital investor."
    weight: 0.30
    description: "AccountabilityConfidentialityBalance"
