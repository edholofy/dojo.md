meta:
  id: lp-reporting-standards
  level: 5
  course: investor-update-writing
  type: output
  description: "Draft the next generation of ILPA reporting standards for venture capital, incorporating real-time data, ESG metrics, DEI reporting, and AI-augmented transparency requirements"
  tags: [ilpa, reporting-standards, lp-gp, master]

state: {}

trigger: |
  You're the Chair of the ILPA (Institutional Limited
  Partners Association) Reporting Standards Committee,
  tasked with drafting "ILPA Reporting Standards 3.0"
  — a comprehensive update to the industry's GP-to-LP
  reporting framework. The last major update was in
  2016, and the venture capital landscape has changed
  dramatically.

  Committee composition:
  - 8 LP representatives (CalPERS, Ontario Teachers,
    Temasek, Abu Dhabi Investment Authority, Harvard
    Management Company, Ford Foundation, Swiss Re,
    Alaska Permanent Fund)
  - 6 GP representatives (Sequoia, a16z, KKR Growth,
    Insight Partners, Accel, General Atlantic)
  - 4 independent experts (2 academics, 1 former SEC
    commissioner, 1 data standards specialist)

  Key issues the standards must address:

  1. Valuation and performance reporting:
     - TVPI vs DPI emphasis (LPs increasingly want DPI
       focus; GPs prefer TVPI during markup periods)
     - Fair value methodology transparency (how are
       unrealized gains calculated?)
     - Vintage year performance vs absolute performance
     - Benchmark selection and comparison methodology
     - "Zombie fund" reporting (funds past their term
       with unrealized positions)

  2. Real-time and digital reporting:
     - Minimum reporting frequency (quarterly letters
       vs real-time dashboards)
     - Standardized data formats (API-accessible data
       vs PDF reports)
     - Portfolio company data granularity (what KPIs
       should be standardized?)
     - Data room standards for due diligence

  3. ESG and impact reporting:
     - Carbon footprint of portfolio companies
     - DEI metrics (GP team and portfolio company
       leadership)
     - SFDR (EU) compliance for European LPs
     - Impact measurement for impact-oriented LPs
     - Greenwashing concerns in ESG reporting

  4. Fee and expense transparency:
     - Management fee calculations and offsets
     - Carried interest and clawback provisions
     - Portfolio company fee sharing
     - GP commitment and co-investment terms
     - Hidden fees (monitoring, transaction, advisory)
     - Total expense ratio standardization

  5. Risk and concentration reporting:
     - Portfolio concentration limits and reporting
     - Follow-on investment decision frameworks
     - Currency and geographic risk exposure
     - Sector concentration and correlation analysis
     - Liquidity risk (secondary market conditions)

  6. AI and technology considerations:
     - AI-generated reports: Disclosure requirements
     - Data privacy in LP reporting (GDPR, CCPA)
     - Cybersecurity standards for data transmission
     - Machine-readable vs human-readable reports
     - LP data aggregation and benchmarking platforms

  Contentious issues:
  - GPs resist real-time reporting (competitive
    concerns, operational burden)
  - LPs want more granularity; GPs cite confidentiality
  - DEI reporting is politically sensitive in some
    jurisdictions
  - Fee transparency threatens established GP economics
  - Small/emerging managers argue standards
    disproportionately burden them

  Task: Draft the ILPA Reporting Standards 3.0
  framework document, including the standard structure,
  required vs recommended disclosures, implementation
  timeline, and commentary addressing the contentious
  issues with balanced perspectives from both GP and
  LP constituencies.

assertions:
  - type: llm_judge
    criteria: "Response drafts a comprehensive reporting standards framework — covers all 6 major areas (valuation, digital reporting, ESG, fees, risk, AI/technology) with specific requirements and recommendations; distinguishes between mandatory and recommended disclosures; includes a phased implementation timeline (recognizing that small managers need more time); provides standardized templates or frameworks for key reports; addresses the quarterly letter format with specific content requirements; the standards document would be taken seriously by ILPA members and could serve as a basis for industry adoption."
    weight: 0.35
    description: "ComprehensiveStandards"
  - type: llm_judge
    criteria: "Response navigates the GP-LP tension with diplomatic balance — addresses the TVPI vs DPI debate with a framework that serves both perspectives; handles the real-time reporting resistance by proposing tiered requirements; addresses fee transparency without being punitive to GPs; navigates the DEI reporting sensitivities across jurisdictions; acknowledges the burden on emerging managers with proportional requirements; each contentious issue is addressed with the perspectives of both GP and LP committee members; the standards would be implementable because they balance transparency with operational reality."
    weight: 0.35
    description: "GPLPBalance"
  - type: llm_judge
    criteria: "Response addresses the modern challenges with forward-looking intelligence — provides a framework for AI-generated report disclosure; addresses data standards and API accessibility for the digital age; incorporates ESG/SFDR requirements that are actionable rather than performative; addresses cybersecurity and data privacy in reporting; discusses the role of LP data aggregation platforms (Burgiss, Cambridge Associates) in the standards ecosystem; proposes a mechanism for standards evolution (annual review process, technology addenda); the overall document positions ILPA reporting standards for the next decade of venture capital evolution."
    weight: 0.30
    description: "ForwardLookingStandards"
