meta:
  id: ecommerce-copywriting-mastery
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Demonstrate mastery by writing product descriptions across every product type, price point, and audience"
  tags: [ecommerce, mastery, comprehensive, portfolio, mastery]

state: {}

trigger: |
  This is the ultimate product description challenge. Write exceptional
  descriptions across 10 radically different products — each requiring
  a different approach, tone, audience understanding, and conversion
  strategy. This tests every skill learned in this course.

  Write master-level product descriptions for all 10 products:

  1. $5 commodity: Pack of 12 mechanical pencils
  Challenge: Make a boring, low-consideration product stand out

  2. $49 mid-range tech: Smart LED light bulbs (4-pack)
  Challenge: Balance technical specs with lifestyle benefits

  3. $199 considered purchase: Ergonomic keyboard
  Challenge: Overcome "my current keyboard works fine" inertia

  4. $895 luxury: Italian leather weekender bag
  Challenge: Justify premium pricing through craftsmanship story

  5. $2,499 high-ticket: Electric bike
  Challenge: Address major purchase anxiety with comprehensive info

  6. Subscription ($15/month): Curated book box
  Challenge: Sell the surprise and ongoing value, not a single product

  7. Digital product ($79): Online photography course
  Challenge: Sell intangible value and transformation, not a physical thing

  8. B2B product ($5,000/year): CRM software
  Challenge: Speak to multiple stakeholders (user, manager, buyer)

  9. Handmade/artisan ($65): Hand-thrown ceramic vase
  Challenge: Convey uniqueness and justify handmade premium

  10. Controversial/sensitive ($34): CBD sleep gummies
  Challenge: Navigate regulations while building trust for a stigmatized category

  For each product:
  1. Write the complete product description (200-250 words)
  2. Write 5 bullet points
  3. Write the meta description
  4. Identify the single most important conversion driver
  5. Write the one-sentence elevator pitch
  6. Explain your strategic approach and why it works for this specific
     product type

  After all 10, provide:
  - Analysis: what changes between product types and what stays consistent
  - The universal principles that apply to ALL product descriptions
  - Your personal product description writing process (step by step)
  - Career advice: how to become an expert e-commerce copywriter

assertions:
  - type: llm_judge
    criteria: "All 10 descriptions are distinctly tailored — each adapts tone, length, detail level, and selling approach to match its specific product type, price point, and audience"
    weight: 0.30
    description: "Distinctly tailored descriptions"
  - type: llm_judge
    criteria: "Difficult products are handled expertly — the commodity pencils are made compelling, the CBD gummies navigate regulations gracefully, the B2B software speaks to multiple stakeholders"
    weight: 0.30
    description: "Expert handling of difficult products"
  - type: llm_judge
    criteria: "Universal principles are genuinely insightful — identify patterns that work across all 10 products while acknowledging what must change"
    weight: 0.20
    description: "Genuinely insightful universal principles"
  - type: llm_judge
    criteria: "The writing process is detailed and teachable — provides a step-by-step methodology that another copywriter could follow to achieve similar results"
    weight: 0.20
    description: "Detailed teachable writing process"
