meta:
  id: product-description-innovation
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Push the boundaries of product descriptions with innovative formats and experimental approaches"
  tags: [ecommerce, innovation, experimental, creative, mastery]

state: {}

trigger: |
  The best product descriptions don't just follow best practices — they
  innovate. This challenge asks you to reimagine what a product
  description can be, using unconventional formats that capture attention
  and drive conversion in unexpected ways.

  Create 6 innovative product description formats:

  Innovation 1: Interactive story format
  Product: Hiking boots ($185)
  Format: Write a "choose your adventure" style description where the
  reader's choices reveal different product features
  - Path A: "You're on a rainy mountain trail..." → waterproof features
  - Path B: "You're scrambling over rocky terrain..." → grip/traction
  - Path C: "You're 15 miles into a day hike..." → comfort/support

  Innovation 2: First-person product narrative
  Product: Vintage-style record player ($249)
  Format: The product describes itself in first person
  - "I was designed in a Brooklyn studio..."
  - Reveal features as personality traits
  - End with why the product chose this customer

  Innovation 3: Letter from the maker
  Product: Small-batch hot sauce ($14)
  Format: A personal letter from the founder to the customer
  - Origin story as personal journey
  - Recipe development as passion project
  - Invitation to join the community

  Innovation 4: Customer day-in-the-life format
  Product: Smart home hub ($129)
  Format: Follow a customer through 24 hours showing how the product
  integrates into their life
  - 6 AM: alarm and morning routine
  - 8 AM: security check from the office
  - 6 PM: arrive home to perfect temperature
  - 10 PM: goodnight routine automation

  Innovation 5: Comparison to the alternative
  Product: Standing desk ($599)
  Format: Side-by-side narrative of two workers — one with the product,
  one without
  - Same meeting, different energy levels
  - Same 3 PM slump, different solutions
  - Same end-of-day, different back pain levels

  Innovation 6: Minimalist anti-description
  Product: Luxury watch ($3,200)
  Format: Deliberately sparse — 3 sentences maximum
  - Let the restraint communicate luxury
  - Every word carries maximum weight
  - The absence of selling IS the selling

  For each innovation:
  1. Write the complete innovative description
  2. Explain the psychology behind why this format works
  3. Identify which product types and audiences this format suits
  4. Acknowledge the risks and limitations
  5. Show the conversion metrics you'd track to validate effectiveness
  6. Write the "safe" traditional version for comparison

  Then provide:
  - When to innovate vs when to follow best practices
  - How to A/B test innovative formats against traditional descriptions
  - Risk management: ensuring innovation doesn't hurt conversion
  - Building a culture of description experimentation

assertions:
  - type: llm_judge
    criteria: "Innovations are genuinely creative — each format is a distinctly different approach to product description that goes beyond conventional best practices"
    weight: 0.30
    description: "Genuinely creative innovations"
  - type: llm_judge
    criteria: "Psychology explanations are insightful — each format's effectiveness is grounded in specific cognitive principles (narrative transportation, empathy, curiosity gap)"
    weight: 0.25
    description: "Insightful psychology explanations"
  - type: llm_judge
    criteria: "Risks are honestly assessed — acknowledges that innovative formats may confuse some shoppers and provides guidelines for when innovation is and isn't appropriate"
    weight: 0.25
    description: "Honestly assessed risks"
  - type: llm_judge
    criteria: "Traditional comparisons provide context — safe versions show what the innovation improves upon and helps evaluate whether the innovation is worth the risk"
    weight: 0.20
    description: "Context-providing traditional comparisons"
