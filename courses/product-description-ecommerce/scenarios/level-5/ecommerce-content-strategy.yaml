meta:
  id: ecommerce-content-strategy
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Build a holistic content strategy that connects product descriptions to the full e-commerce content ecosystem"
  tags: [ecommerce, content-strategy, ecosystem, holistic, mastery]

state: {}

trigger: |
  Product descriptions don't exist in isolation — they're part of a
  content ecosystem that includes category pages, buying guides, blog
  posts, email campaigns, social media, and customer reviews. A holistic
  content strategy ensures all content works together to drive discovery,
  consideration, and purchase.

  Build a content ecosystem for an outdoor gear e-commerce brand:

  Brand: "Basecamp Supply" — Mid-range outdoor equipment
  Annual revenue: $12M
  Products: 500 SKUs across camping, hiking, climbing, and water sports
  Team: 2 copywriters, 1 content strategist, 1 social media manager

  Part 1: Content ecosystem map
  1. Map how product descriptions connect to:
     - Category page descriptions (how do they differ?)
     - Buying guides (how do descriptions reference guides?)
     - Blog posts (how do blog posts drive to product pages?)
     - Email campaigns (how is product copy adapted for email?)
     - Social media (how are descriptions adapted for social?)
     - Customer reviews (how do reviews enhance descriptions?)
  2. Design the internal linking architecture
  3. Create the content hub model (pillar content + supporting content)
  4. Map the customer journey: which content type at each stage

  Part 2: Integrated description strategy
  1. Write integrated content for ONE product ecosystem:
     Product: 3-person backpacking tent ($349)

     a) Product page description (250 words)
     b) Category page blurb (50 words, within "Backpacking Tents" page)
     c) Buying guide excerpt ("How to Choose a Backpacking Tent" —
        write the section featuring this product)
     d) Blog post excerpt ("5 Best Tents for PCT Thru-Hiking" —
        write the section for this tent)
     e) Email campaign block (cart abandonment email featuring this tent)
     f) Instagram caption (for lifestyle photo of this tent)
     g) Google Shopping description (short-form, keyword-optimized)

  2. Show how each piece of content links to the others
  3. Explain the SEO strategy that prevents cannibalization
  4. Design the content calendar (when each piece publishes)

  Part 3: Content performance framework
  1. Attribution model: how to credit each content type's contribution
     to product sales
  2. Content gap analysis methodology
  3. Competitive content benchmarking approach
  4. Quarterly content review process

  Part 4: Scaling strategy
  1. How to scale this ecosystem approach to 500 products
  2. Prioritization framework: which products get full ecosystem treatment
  3. AI-assisted content creation for ecosystem scaling
  4. Measurement: how to know the ecosystem is working

assertions:
  - type: llm_judge
    criteria: "The content ecosystem is genuinely interconnected — each piece of content links to and supports others, creating a cohesive experience across touchpoints"
    weight: 0.30
    description: "Genuinely interconnected ecosystem"
  - type: llm_judge
    criteria: "All 7 content pieces for the tent work together — each adapts the product story for its channel while maintaining consistency and avoiding redundancy"
    weight: 0.25
    description: "Cohesive multi-channel content"
  - type: llm_judge
    criteria: "Anti-cannibalization strategy is sound — clearly differentiates the SEO intent of product pages, category pages, buying guides, and blog posts"
    weight: 0.25
    description: "Sound anti-cannibalization strategy"
  - type: llm_judge
    criteria: "Scaling strategy is realistic — acknowledges that not all 500 products can get full ecosystem treatment and provides practical prioritization"
    weight: 0.20
    description: "Realistic scaling strategy"
