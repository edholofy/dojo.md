meta:
  id: product-description-roi
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Build a complete ROI framework for measuring product description impact on revenue"
  tags: [ecommerce, roi, analytics, measurement, mastery]

state: {}

trigger: |
  Most e-commerce teams can't prove the ROI of product description
  improvements. Building a measurement framework that connects
  description quality to revenue requires attribution modeling,
  controlled experiments, and financial analysis.

  Build a comprehensive product description ROI framework:

  Part 1: Baseline measurement
  Given this e-commerce store data:
  - 10,000 active products
  - $25M annual revenue
  - Average conversion rate: 2.3%
  - Average order value: $72
  - 4.8M annual product page views
  - Return rate: 12%
  - Customer acquisition cost: $28
  - Customer lifetime value: $195

  1. Calculate the current revenue per product page view
  2. Model the impact of conversion rate improvements:
     - 2.3% → 2.5% (+0.2%): calculate additional annual revenue
     - 2.3% → 2.8% (+0.5%): calculate additional annual revenue
     - 2.3% → 3.0% (+0.7%): calculate additional annual revenue
  3. Model the impact of return rate reduction:
     - 12% → 10%: calculate saved revenue
     - 12% → 8%: calculate saved revenue
  4. Model the SEO traffic impact:
     - 10% organic traffic increase: additional revenue
     - 25% organic traffic increase: additional revenue

  Part 2: Attribution methodology
  1. Design the controlled experiment:
     - How to isolate description impact from other variables
     - Sample group selection and control group design
     - Test duration and statistical significance requirements
  2. Create the attribution model:
     - Direct attribution (description A/B test results)
     - Indirect attribution (SEO traffic from description optimization)
     - Correlation analysis (description quality score vs conversion rate)
  3. Handle confounding variables:
     - Price changes during testing
     - Seasonal fluctuations
     - Marketing campaign overlap
     - Product review accumulation

  Part 3: Financial model
  1. Cost of description improvement:
     - Human copywriter cost (per description and per hour)
     - AI-assisted cost (per description)
     - Editor/reviewer cost
     - Technology costs
  2. Revenue impact projections:
     - Conservative, moderate, and optimistic scenarios
     - Time to ROI for each scenario
     - Break-even analysis
  3. Build the executive presentation:
     - ROI summary for C-suite
     - Investment request justification
     - Risk analysis and mitigation

  Part 4: Ongoing measurement
  1. KPI dashboard design (what to track weekly/monthly/quarterly)
  2. Reporting cadence and stakeholder communication
  3. How to maintain measurement as the catalog grows
  4. Long-term impact tracking (year-over-year comparisons)

assertions:
  - type: llm_judge
    criteria: "Financial calculations are accurate — revenue impact projections use correct math based on the provided baseline metrics"
    weight: 0.30
    description: "Accurate financial calculations"
  - type: llm_judge
    criteria: "Attribution methodology is rigorous — properly addresses controlled experiments, confounding variables, and the challenge of isolating description impact"
    weight: 0.25
    description: "Rigorous attribution methodology"
  - type: llm_judge
    criteria: "The executive presentation is persuasive — frames the investment in business terms with clear ROI projections, risk mitigation, and competitive justification"
    weight: 0.25
    description: "Persuasive executive presentation"
  - type: llm_judge
    criteria: "The ongoing measurement system is sustainable — practical dashboard and reporting cadence that a real team could maintain without excessive overhead"
    weight: 0.20
    description: "Sustainable measurement system"
