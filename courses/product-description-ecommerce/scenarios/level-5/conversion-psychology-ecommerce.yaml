meta:
  id: conversion-psychology-ecommerce
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Apply advanced conversion psychology to create product descriptions that overcome every purchase barrier"
  tags: [ecommerce, conversion-psychology, purchase-barriers, persuasion, mastery]

state: {}

trigger: |
  Every product has 5-7 psychological barriers that prevent purchase.
  Mastery-level product descriptions systematically identify and
  overcome every barrier through strategic copy placement, objection
  reversal, and cognitive bias leverage.

  Map and overcome all purchase barriers for 3 complex products:

  Product 1: Smart home security system ($499 + $20/month monitoring)
  Known barriers:
  - Price anxiety (is $499 worth it?)
  - Technical intimidation (can I install this?)
  - Privacy concerns (cameras in my home?)
  - Subscription fatigue (another monthly charge?)
  - Switching cost (I already have a basic system)
  - Brand trust (is this company reliable?)
  - Decision complexity (which package do I need?)

  Product 2: Online MBA program ($25,000 over 18 months)
  Known barriers:
  - Massive financial commitment
  - Time investment uncertainty (can I do this with a full-time job?)
  - ROI skepticism (will this actually advance my career?)
  - Online stigma (is an online MBA respected?)
  - Completion doubt (will I actually finish?)
  - Comparison paralysis (100+ online MBA programs exist)
  - Imposter syndrome (am I smart enough for an MBA?)

  Product 3: Premium meal delivery service ($150/week for family of 4)
  Known barriers:
  - Weekly cost comparison to grocery shopping
  - Taste skepticism (will my family actually eat this?)
  - Dietary flexibility (can it handle picky eaters AND allergies?)
  - Commitment fear (can I cancel easily?)
  - Portion concern (will adults actually feel full?)
  - Freshness doubt (how is pre-prepped food fresh?)
  - Environmental guilt (all that packaging)

  For each product:
  1. Map ALL purchase barriers with psychological root causes
  2. Write the complete product description (300+ words) that
     systematically addresses every barrier in strategic order
  3. Annotate the description: label each sentence with the barrier
     it addresses
  4. Design the "barrier reversal" copy blocks:
     - Price: value anchoring and comparison
     - Trust: social proof and guarantees
     - Complexity: simplification and guidance
     - Risk: trial offers and money-back guarantees
     - Inertia: urgency and loss framing
  5. Create the objection-handling FAQ (one question per barrier)
  6. Design the post-purchase reassurance copy (reducing buyer's remorse)

  Then provide:
  - Universal purchase barriers taxonomy (15 common barriers)
  - Copy techniques for each barrier type
  - How to prioritize which barriers to address first
  - Testing methodology: measuring barrier removal effectiveness
  - When NOT to overcome barriers (some products aren't right for
    some customers)

assertions:
  - type: llm_judge
    criteria: "Barrier mapping is comprehensive — identifies ALL significant purchase barriers including psychological root causes, not just surface-level objections"
    weight: 0.25
    description: "Comprehensive barrier mapping"
  - type: llm_judge
    criteria: "Descriptions systematically address every barrier — annotated copy shows each sentence serving a specific purpose in the barrier-removal strategy"
    weight: 0.30
    description: "Systematic barrier addressing"
  - type: llm_judge
    criteria: "The barrier taxonomy is universally applicable — 15 common barriers with techniques that could be applied to any product category"
    weight: 0.25
    description: "Universally applicable barrier taxonomy"
  - type: llm_judge
    criteria: "Ethical consideration is present — acknowledges that some barriers are legitimate and not every customer should be convinced, maintaining honesty"
    weight: 0.20
    description: "Present ethical consideration"
