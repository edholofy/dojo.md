meta:
  id: description-agency-portfolio
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Create a portfolio-quality product description project for an e-commerce copywriting agency"
  tags: [ecommerce, agency, portfolio, client-work, mastery]

state: {}

trigger: |
  You run a product description copywriting agency. A potential client
  — a mid-size beauty brand with $5M annual revenue — wants to see
  your capabilities before signing a $50,000 annual contract. Create
  a portfolio presentation that demonstrates mastery across every
  dimension of product description writing.

  Client: "Botanica Rose" — Clean beauty and skincare brand
  Products: 80 SKUs across skincare, haircare, body care, and fragrance
  Current problems: Generic descriptions, no SEO optimization, inconsistent
  voice, poor mobile experience, 2.1% average product page conversion rate
  (industry average: 3.5%)
  Goal: Increase conversion to 4%+ and improve organic traffic by 40%

  Create the full pitch deliverable:

  Part 1: Audit of current descriptions (3 examples)
  Take these 3 "current" descriptions and audit them:

  Current description A (Face serum, $52):
  "Our face serum is made with natural ingredients. It helps your skin look
  better. Apply daily for best results. Contains vitamin C and hyaluronic
  acid. Suitable for all skin types."

  Current description B (Shampoo, $28):
  "Botanica Rose Volumizing Shampoo. Sulfate-free formula. For fine and
  thin hair. Adds body and volume. Paraben-free. 12 fl oz. Made in USA."

  Current description C (Perfume, $78):
  "A beautiful floral fragrance that you'll love. Top notes of rose and
  jasmine. Long-lasting scent that lasts all day. Perfect for any occasion.
  Makes a great gift."

  For each:
  1. Score on a 0-100 scale with breakdown by category
  2. Identify every specific problem
  3. Write the dramatically improved version
  4. Project the conversion impact of the improvement

  Part 2: Strategy presentation
  1. Brand voice recommendation for Botanica Rose
  2. Category-specific description strategy (skincare, haircare, body,
     fragrance)
  3. SEO opportunity analysis (keyword gaps, structured data)
  4. Mobile optimization recommendations
  5. A/B testing roadmap for the first 6 months

  Part 3: Sample deliverables (5 new descriptions)
  Write portfolio-quality descriptions for:
  1. Anti-aging moisturizer ($62) — skincare
  2. Curl-defining cream ($34) — haircare
  3. Body butter ($28) — body care
  4. Room spray ($42) — fragrance/home
  5. Gift set: best-sellers collection ($120) — bundle

  Each description should include:
  - SEO-optimized title
  - Meta description
  - Full product description (200-250 words)
  - 5 benefit-first bullet points
  - Ingredient spotlight section
  - JSON-LD structured data recommendation

  Part 4: ROI projection
  1. Revenue impact model: conversion rate improvement × traffic × AOV
  2. SEO traffic growth projection
  3. Timeline to ROI
  4. Benchmarks from similar client engagements

assertions:
  - type: llm_judge
    criteria: "The audit is thorough and persuasive — clearly demonstrates expertise by identifying specific problems the client may not have noticed, building confidence in the agency's capabilities"
    weight: 0.25
    description: "Thorough persuasive audit"
  - type: llm_judge
    criteria: "Sample descriptions are portfolio-quality — each is a polished, brand-consistent, SEO-optimized description that demonstrates mastery of the craft"
    weight: 0.30
    description: "Portfolio-quality sample descriptions"
  - type: llm_judge
    criteria: "The strategy is client-specific — recommendations are tailored to a clean beauty brand rather than generic e-commerce advice"
    weight: 0.25
    description: "Client-specific strategy"
  - type: llm_judge
    criteria: "ROI projections are credible — uses realistic conversion rate improvements and traffic growth estimates with clear assumptions stated"
    weight: 0.20
    description: "Credible ROI projections"
