meta:
  id: enterprise-catalog-transformation
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Lead a full catalog transformation for an enterprise e-commerce company with 50,000+ products"
  tags: [ecommerce, enterprise, catalog, transformation, mastery]

state: {}

trigger: |
  An enterprise retailer with 50,000 products has hired you to transform
  their entire product catalog. Most descriptions were written by
  manufacturers and haven't been updated in years. The project has a
  $200,000 budget and 12-month timeline.

  Company profile:
  - 50,000 active SKUs, 15 product categories
  - Mix of private label and third-party brands
  - Current descriptions: 70% manufacturer-provided (generic), 20%
    written in-house (inconsistent quality), 10% no description at all
  - Average product page conversion: 1.8% (goal: 3.0%)
  - Channels: Own website, Amazon, Walmart, Google Shopping
  - Team: 5 copywriters, 2 editors, 1 SEO lead, 3 product managers
  - Technology: Salsify PIM, Shopify Plus, Amazon Seller Central

  Design the complete transformation program:

  Phase 1: Assessment and planning (Month 1-2)
  1. Design the catalog audit methodology for 50,000 products
  2. Create the scoring algorithm (automated quality assessment)
  3. Build the prioritization engine: which products to rewrite first
  4. Define the ROI model for the executive stakeholder presentation
  5. Create the resource plan: humans + AI + tools
  6. Identify the technology stack additions needed

  Phase 2: Content infrastructure (Month 2-3)
  1. Build the brand voice guidelines for private label
  2. Create guidelines for enhancing third-party brand descriptions
  3. Design 15 category-specific templates
  4. Set up the AI-assisted writing pipeline
  5. Create the quality assurance framework (automated + human)
  6. Design the multi-channel adaptation workflow

  Phase 3: Production (Month 3-10)
  1. Production plan: 50,000 descriptions in 8 months
  2. Tiered approach: full rewrite (top 5,000), enhanced (next 15,000),
     template-based (next 20,000), AI-generated with review (bottom 10,000)
  3. Weekly production targets and quality checkpoints
  4. AI prompt library for each category and quality tier
  5. Editor workflow: review cadence, approval criteria, escalation path

  Phase 4: Optimization and maintenance (Month 10-12)
  1. A/B testing program design for ongoing optimization
  2. Content performance analytics dashboard
  3. Seasonal update calendar
  4. New product onboarding description workflow
  5. Ongoing maintenance plan: keeping 50,000 descriptions fresh
  6. Knowledge transfer to internal team

  Deliverables:
  - Executive summary of the transformation program
  - Detailed project plan with milestones and dependencies
  - Budget allocation breakdown ($200K across phases)
  - Sample descriptions at each quality tier (4 examples)
  - Risk register and mitigation strategies
  - Success metrics and reporting framework

assertions:
  - type: llm_judge
    criteria: "The tiered approach is strategically sound — high-revenue products get full rewrites while lower-priority products get template-based or AI-assisted treatment, maximizing ROI"
    weight: 0.25
    description: "Strategically sound tiered approach"
  - type: llm_judge
    criteria: "Production math is realistic — 50,000 descriptions in 8 months with the stated team is achievable with the proposed AI-assisted workflow and tiered quality levels"
    weight: 0.25
    description: "Realistic production math"
  - type: llm_judge
    criteria: "Budget allocation is reasonable — $200K distributed appropriately across talent, tools, and phases with the highest investment in the production phase"
    weight: 0.25
    description: "Reasonable budget allocation"
  - type: llm_judge
    criteria: "Risk management is comprehensive — identifies real risks (team burnout, quality degradation at scale, AI hallucination, platform changes) with practical mitigation strategies"
    weight: 0.25
    description: "Comprehensive risk management"
