meta:
  id: personalization-dynamic-descriptions
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Design personalized and dynamic product descriptions that adapt to individual shoppers"
  tags: [ecommerce, personalization, dynamic-content, segmentation, mastery]

state: {}

trigger: |
  Personalized product descriptions can increase conversion by 15-25%.
  Dynamic descriptions adapt based on the shopper's behavior, traffic
  source, location, browsing history, and purchase history. This requires
  both content strategy and technical implementation.

  Design a dynamic product description system:

  Product: Smart fitness watch ($299)
  Base features: GPS, heart rate, sleep tracking, 7-day battery, water
  resistant, 100+ workout modes, stress monitoring, music storage

  Create personalized descriptions for 8 shopper segments:

  Segment 1: First-time visitor from Google search ("best fitness watch")
  - What they need: comparison-focused, feature-rich, trust-building
  Task: Write 150 words optimized for first discovery

  Segment 2: Returning visitor (viewed 3 times, hasn't purchased)
  - What they need: objection handling, urgency, social proof
  Task: Write 150 words addressing hesitation

  Segment 3: Referral from running blog
  - What they need: running-specific features, GPS accuracy, training plans
  Task: Write 150 words emphasizing running capabilities

  Segment 4: Visitor from Instagram ad (lifestyle creative)
  - What they need: design appeal, social features, lifestyle integration
  Task: Write 150 words matching the Instagram aesthetic

  Segment 5: Previous customer (owns the older model)
  - What they need: upgrade justification, new features highlighted, loyalty
  Task: Write 150 words focused on what's new vs their current model

  Segment 6: Corporate wellness buyer (B2B)
  - What they need: bulk pricing, fleet management, health data analytics
  Task: Write 150 words targeting the HR/wellness program decision-maker

  Segment 7: Price-sensitive shopper (came from price comparison site)
  - What they need: value justification, financing options, total cost of ownership
  Task: Write 150 words focused on value rather than cost

  Segment 8: Gift buyer (December traffic, browsing multiple products)
  - What they need: gift appeal, packaging, return policy, sizing help
  Task: Write 150 words optimized for the gift-giving context

  For each segment:
  1. Write the personalized description
  2. Identify the trigger data points (how do you know this is their segment?)
  3. Define the content modules that change vs stay the same
  4. Write the personalized CTA
  5. Design the fallback for when segmentation data is unavailable

  Then provide:
  - Dynamic content architecture: how to modularize descriptions for
    personalization
  - Technology requirements: CDP, CMS, and personalization tools needed
  - Data requirements: what shopper data enables personalization
  - Privacy considerations: GDPR/CCPA compliance for personalized content
  - ROI measurement: how to A/B test personalization effectiveness

assertions:
  - type: llm_judge
    criteria: "Segment descriptions are genuinely personalized — each addresses the specific needs, context, and intent of that shopper segment rather than minor word changes"
    weight: 0.30
    description: "Genuinely personalized segments"
  - type: llm_judge
    criteria: "Trigger data points are practical — identifies realistic behavioral signals that e-commerce platforms can actually detect and act on"
    weight: 0.25
    description: "Practical trigger data points"
  - type: llm_judge
    criteria: "The modular content architecture is well-designed — clearly defines which content blocks are static vs dynamic, enabling efficient management"
    weight: 0.25
    description: "Well-designed modular architecture"
  - type: llm_judge
    criteria: "Privacy compliance is properly addressed — covers GDPR consent requirements, CCPA disclosure obligations, and how to personalize with privacy-respecting data"
    weight: 0.20
    description: "Properly addressed privacy compliance"
