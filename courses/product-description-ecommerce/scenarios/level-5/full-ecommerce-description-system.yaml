meta:
  id: full-ecommerce-description-system
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Design a complete end-to-end product description system for a new e-commerce store launch"
  tags: [ecommerce, system-design, launch, comprehensive, mastery]

state: {}

trigger: |
  You've been hired as the Head of Product Content for a new DTC
  (direct-to-consumer) brand launching with 200 products across 6
  categories. You need to build the entire product description system
  from scratch — strategy, templates, workflows, and quality standards.

  Brand: "Summit Gear" — Premium outdoor and camping equipment
  Categories: Tents, sleeping bags, backpacks, cooking gear, clothing,
  accessories
  Price range: $15-$599
  Channels: Own Shopify store, Amazon, REI.com
  Team: 2 copywriters, 1 SEO specialist, you as content lead
  Timeline: 200 descriptions needed in 8 weeks for launch
  Budget: $15,000 for content creation

  Build the complete system:

  Part 1: Content strategy (Week 1)
  1. Define the brand voice for Summit Gear
  2. Create the product description style guide
  3. Establish category-specific templates for all 6 categories
  4. Define the SEO keyword strategy per category
  5. Set quality standards and the review process

  Part 2: Production plan (Week 2-7)
  1. Prioritize which products to write first (revenue × visibility)
  2. Create the production schedule: 200 descriptions in 6 weeks
  3. Design the workflow: brief → draft → review → SEO optimize → publish
  4. Allocate work across the team (who writes what)
  5. Build the quality assurance checklist

  Part 3: Channel optimization (concurrent with Part 2)
  1. Create the Shopify store description format
  2. Create the Amazon listing format
  3. Create the REI.com product copy format
  4. Design the master description → channel adaptation process
  5. Handle cross-channel SEO without duplicate content issues

  Part 4: Measurement and iteration (Week 8+)
  1. Define success KPIs for product descriptions
  2. Create the A/B testing roadmap for post-launch optimization
  3. Build the content maintenance calendar
  4. Plan for catalog growth (50 new products/quarter)
  5. Create the content performance reporting template

  Deliverables:
  - Complete brand voice guide
  - 6 category-specific description templates (filled in with examples)
  - Production schedule spreadsheet structure
  - Sample descriptions for 1 product per category (6 total, across all
    3 channels = 18 description versions)
  - Quality checklist and review rubric
  - KPI dashboard design
  - Budget allocation breakdown

assertions:
  - type: llm_judge
    criteria: "The system is comprehensive and realistic — covers strategy, production, quality, and measurement with practical timelines and resource allocation for a 4-person team"
    weight: 0.25
    description: "Comprehensive realistic system"
  - type: llm_judge
    criteria: "Sample descriptions demonstrate quality — 6 category examples are distinct, brand-consistent, and demonstrate the templates working in practice"
    weight: 0.25
    description: "Quality-demonstrating samples"
  - type: llm_judge
    criteria: "Production planning is feasible — 200 descriptions in 8 weeks with 2 writers is achievable with the proposed workflow and prioritization"
    weight: 0.25
    description: "Feasible production planning"
  - type: llm_judge
    criteria: "Multi-channel strategy avoids common pitfalls — addresses duplicate content, platform-specific formatting, and efficient channel adaptation without tripling the workload"
    weight: 0.25
    description: "Smart multi-channel strategy"
