meta:
  id: ai-commerce-future
  level: 5
  course: product-description-ecommerce
  type: output
  description: "Future-proof product descriptions for AI shopping, voice commerce, and emerging e-commerce channels"
  tags: [ecommerce, ai-commerce, voice-search, future, mastery]

state: {}

trigger: |
  E-commerce is evolving rapidly — AI shopping assistants, voice commerce,
  AR try-on, social commerce, and conversational product discovery are
  changing how product information is consumed. Product descriptions
  written today must work for tomorrow's channels.

  Future-proof product descriptions for emerging commerce channels:

  Channel 1: AI shopping assistants (ChatGPT, Google Gemini, Perplexity)
  Product: Running shoes ($140)
  Challenge: AI assistants summarize product info for shoppers. Your
  description must be structured so AI accurately represents your product.
  Task:
  1. Write the description optimized for AI extraction
  2. Create the structured data that AI assistants can parse
  3. Design the "AI shopping brief" — the information your product
     page must contain to be recommended by AI
  4. Show how different AI assistants would present your product

  Channel 2: Voice commerce (Alexa, Google Home)
  Product: Coffee pods (variety pack, $24)
  Challenge: Voice has no visual — descriptions must be heard, not read.
  Task:
  1. Write the voice-optimized product description (conversational,
     concise, no visual formatting)
  2. Write the voice search FAQ (natural language queries)
  3. Create the voice shopping flow script (what Alexa says about your
     product when asked)
  4. Optimize for voice search discovery

  Channel 3: AR/VR commerce
  Product: Sectional sofa ($1,599)
  Challenge: When customers can virtually place furniture in their room,
  descriptions must complement the visual experience differently.
  Task:
  1. Write the AR-companion description (what to show alongside the
     3D model)
  2. Create the interactive specification callouts
  3. Design the AR experience text overlays
  4. Write the post-AR-experience call to action

  Channel 4: Social commerce (TikTok Shop, Instagram Shopping)
  Product: Skincare serum ($44)
  Challenge: Social commerce descriptions must work as captions, comments,
  and product cards simultaneously.
  Task:
  1. Write the TikTok Shop product card (under 200 characters)
  2. Write the Instagram Shopping description
  3. Write the creator brief for UGC content featuring the product
  4. Design the social-first description strategy

  Channel 5: Conversational commerce (chat-based shopping)
  Product: Laptop ($999)
  Challenge: A chatbot needs to answer product questions naturally.
  Task:
  1. Write the product information in Q&A format for chatbot training
  2. Create the decision tree for helping shoppers choose the right model
  3. Write the conversational product pitch (as a knowledgeable sales
     assistant would say it)
  4. Design the objection-handling dialogue

  For each channel:
  - Write the complete channel-optimized content
  - Explain how this differs from traditional product page descriptions
  - Identify the unique constraints and opportunities
  - Provide implementation recommendations

  Then provide:
  - The future of product descriptions: predictions for 2025-2030
  - How to write descriptions that work across current AND future channels
  - Skills that product description writers need to develop
  - Technology stack for future-ready product content

assertions:
  - type: llm_judge
    criteria: "AI-optimized descriptions are well-structured for extraction — use clear formatting, structured data, and unambiguous claims that AI can accurately summarize"
    weight: 0.30
    description: "Well-structured AI-optimized descriptions"
  - type: llm_judge
    criteria: "Voice commerce descriptions are genuinely conversational — read naturally when spoken aloud, are concise, and work without any visual formatting"
    weight: 0.25
    description: "Genuinely conversational voice descriptions"
  - type: llm_judge
    criteria: "Social commerce content is platform-native — TikTok descriptions feel like TikTok, Instagram descriptions feel like Instagram, not repurposed web copy"
    weight: 0.25
    description: "Platform-native social commerce content"
  - type: llm_judge
    criteria: "Future predictions are grounded — based on current trends and technology trajectories rather than science fiction, with practical preparation steps"
    weight: 0.20
    description: "Grounded future predictions"
