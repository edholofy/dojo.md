meta:
  id: seasonal-holiday-descriptions
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Adapt product descriptions for seasonal campaigns, holidays, and sales events"
  tags: [ecommerce, seasonal, holiday, campaigns, advanced]

state: {}

trigger: |
  Holiday shopping drives 25-30% of annual e-commerce revenue.
  Product descriptions must be adapted for seasonal context — gift
  framing for holidays, urgency for sales events, and lifestyle
  appeal for seasonal needs. Timing and tone shifts are critical.

  Adapt the SAME product's description for 5 different seasonal contexts:

  Product: Premium wireless headphones ($199)
  Base features: Active noise cancellation, 40-hour battery, spatial audio,
  premium comfort padding, foldable design, carrying case included

  Context 1: Holiday gift guide (November-December)
  - Frame as the perfect gift
  - Include gift-wrapping availability
  - Address gift-buyer concerns (returns, sizing)

  Context 2: Back-to-school (August-September)
  - Frame for students and remote learning
  - Emphasize study focus and campus use
  - Budget-conscious messaging

  Context 3: Black Friday/Cyber Monday
  - Urgency and scarcity framing
  - Deal value emphasis
  - Quick-decision optimization

  Context 4: Summer travel season (June-July)
  - Frame for travel and commuting
  - Emphasize portability and battery life
  - Adventure and lifestyle appeal

  Context 5: New Year / fresh start (January)
  - Frame for productivity and self-improvement
  - "Invest in yourself" messaging
  - Focus and deep work appeal

  For each seasonal version:
  1. Write the adapted product description (150-200 words)
  2. Write the seasonal headline/tagline
  3. Identify which features to emphasize and which to downplay
  4. Write the seasonal CTA
  5. Explain the psychological trigger for this season

  Then provide:
  - E-commerce seasonal calendar: key dates and how far ahead to prepare
  - How to update descriptions efficiently for seasonal campaigns
  - When seasonal framing hurts (products that shouldn't be seasonal)
  - Post-season cleanup: reverting descriptions without losing SEO

assertions:
  - type: llm_judge
    criteria: "Each seasonal version is genuinely distinct — the holiday gift description feels warm and gift-oriented while Black Friday feels urgent and deal-focused"
    weight: 0.30
    description: "Genuinely distinct seasonal versions"
  - type: llm_judge
    criteria: "Feature emphasis shifts correctly — travel season highlights portability and battery, back-to-school highlights noise cancellation for studying"
    weight: 0.25
    description: "Correct seasonal feature emphasis"
  - type: llm_judge
    criteria: "Seasonal calendar is comprehensive and actionable — covers major shopping events with specific prep timelines and content change recommendations"
    weight: 0.25
    description: "Comprehensive actionable seasonal calendar"
  - type: llm_judge
    criteria: "SEO preservation advice is practical — explains how to update seasonal content without losing existing rankings through URL changes or content deletion"
    weight: 0.20
    description: "Practical SEO preservation advice"
