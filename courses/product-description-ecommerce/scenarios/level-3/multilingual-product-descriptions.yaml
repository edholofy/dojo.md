meta:
  id: multilingual-product-descriptions
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Adapt product descriptions for international markets with cultural and linguistic considerations"
  tags: [ecommerce, multilingual, international, localization, advanced]

state: {}

trigger: |
  Cross-border e-commerce accounts for 22% of global online sales.
  Translating product descriptions isn't enough — they must be
  localized for cultural context, measurement systems, sizing
  standards, and local shopping behavior. A direct translation often
  misses cultural nuances that affect conversion.

  Localize product descriptions for 4 products across 3 markets:

  Product 1: Winter parka ($189)
  Original market: US
  Localize for: UK, Germany, Japan
  Considerations: Temperature units (F vs C), sizing systems,
  cultural associations with warmth and outdoor activity

  Product 2: Organic green tea ($18/box of 20 sachets)
  Original market: US
  Localize for: Japan, France, Brazil
  Considerations: Tea culture varies dramatically, organic certification
  recognition differs, taste description preferences

  Product 3: Smart fitness tracker ($129)
  Original market: US
  Localize for: UK, India, South Korea
  Considerations: Measurement units (miles vs km), health feature
  emphasis, tech-savviness assumptions, price perception

  Product 4: Kitchen stand mixer ($299)
  Original market: US
  Localize for: Italy, Mexico, Australia
  Considerations: Cooking traditions, recipe context, electrical
  compatibility, common baking/cooking tasks

  For each product × market combination:
  1. Write a 100-word localized description (in English, but adapted
     for the target market's cultural context)
  2. Identify 3 localization changes beyond language translation
  3. Highlight cultural sensitivities or opportunities
  4. Adapt units, sizing, and regulatory references
  5. Adjust the tone and selling points for local shopping behavior

  Then provide:
  - Localization vs translation: what's different and why it matters
  - Cultural product description pitfalls by region
  - Measurement and sizing conversion guide for e-commerce
  - When to create separate listings vs adapt one listing
  - SEO considerations for multilingual product pages (hreflang, etc.)

assertions:
  - type: llm_judge
    criteria: "Localization goes beyond translation — descriptions adapt selling points, cultural references, and emphasis based on each market's values and shopping behavior"
    weight: 0.30
    description: "Deep localization beyond translation"
  - type: llm_judge
    criteria: "Cultural sensitivities are correctly identified — tea culture in Japan requires respectful positioning, Italian cooking traditions affect mixer selling points"
    weight: 0.25
    description: "Correctly identified cultural sensitivities"
  - type: llm_judge
    criteria: "Practical elements are adapted — units converted, sizing systems changed, regulatory certifications referenced for each market, electrical specs noted"
    weight: 0.25
    description: "Adapted practical elements"
  - type: llm_judge
    criteria: "SEO guidance is technically correct — covers hreflang tags, separate URLs vs subdirectories, and local keyword research considerations"
    weight: 0.20
    description: "Technically correct multilingual SEO"
