meta:
  id: sustainability-ethical-copy
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions that communicate sustainability and ethical sourcing authentically"
  tags: [ecommerce, sustainability, ethical, greenwashing, advanced]

state: {}

trigger: |
  73% of Gen Z consumers are willing to pay more for sustainable products,
  but 68% don't trust brand sustainability claims. Product descriptions
  must communicate environmental and ethical commitments authentically
  without greenwashing — specific, verifiable claims backed by
  certifications and data.

  Write sustainability-focused product descriptions for 5 products:

  Product 1: Recycled ocean plastic sunglasses ($85)
  Sustainability claims: Made from 5 recycled ocean plastic bottles,
  B Corp certified, 1% for the Planet member, carbon-neutral shipping,
  biodegradable packaging, repair program available

  Product 2: Organic cotton bedding set ($145)
  Sustainability claims: GOTS-certified organic cotton, OEKO-TEX Standard
  100, Fair Trade certified factory, closed-loop water system (saves
  10,000L per set), natural dyes, plastic-free packaging

  Product 3: Refillable cleaning product system ($32 starter kit)
  Sustainability claims: Eliminates 90% of single-use plastic, EPA Safer
  Choice certified, plant-based formula, refill pods shipped in
  compostable packaging, carbon footprint calculator on website

  Product 4: Bamboo toothbrush subscription ($8/3-pack quarterly)
  Sustainability claims: FSC-certified bamboo, BPA-free nylon bristles
  (plant-based alternative available), compostable handle, carbon-offset
  shipping, partnership with ocean cleanup charity

  Product 5: Upcycled leather accessories ($65-120)
  Sustainability claims: Made from leather scraps from luxury furniture
  manufacturing, zero virgin materials, each piece unique, handmade by
  artisans in social enterprise workshop, living wage certified

  For each product:
  1. Write 150-200 words that lead with sustainability authentically
  2. Balance eco-messaging with product quality and design appeal
  3. Include specific, verifiable environmental impact data
  4. Write the "Our Impact" section with concrete numbers
  5. Address the skeptical shopper: "How do I know this is real?"

  Then provide:
  - Greenwashing red flags: 10 vague claims to avoid
  - Certification guide: which eco-certifications matter and what they mean
  - How to write sustainability copy that converts (not just informs)
  - FTC Green Guides compliance for product descriptions

assertions:
  - type: llm_judge
    criteria: "Sustainability claims are specific and verifiable — uses concrete numbers ('5 recycled bottles,' '10,000L water saved') rather than vague terms like 'eco-friendly' or 'green'"
    weight: 0.30
    description: "Specific verifiable sustainability claims"
  - type: llm_judge
    criteria: "Products are still sold as desirable products — sustainability is a value-add, not the only selling point; quality, design, and functionality are also highlighted"
    weight: 0.25
    description: "Desirable products beyond sustainability"
  - type: llm_judge
    criteria: "Greenwashing red flags are accurate — correctly identifies vague terms ('natural,' 'earth-friendly'), unsubstantiated claims, and misleading imagery as problematic"
    weight: 0.25
    description: "Accurate greenwashing red flags"
  - type: llm_judge
    criteria: "FTC Green Guides compliance is correctly addressed — covers qualification of claims, substantiation requirements, and proper use of terms like 'recyclable' and 'biodegradable'"
    weight: 0.20
    description: "Correct FTC Green Guides compliance"
