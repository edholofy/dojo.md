meta:
  id: luxury-premium-descriptions
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions for luxury and premium products that justify high price points"
  tags: [ecommerce, luxury, premium, brand-storytelling, advanced]

state: {}

trigger: |
  Luxury product descriptions must justify price while maintaining
  exclusivity. They never "sell" — they invite. The language is
  restrained, the details are precise, and the craftsmanship story
  does the convincing. Price is mentioned last or not at all.

  Write luxury product descriptions for 5 premium products:

  Product 1: Handmade Italian leather briefcase ($895)
  Details: Full-grain vegetable-tanned Tuscan leather, brass hardware,
  hand-stitched, 3 compartments, fits 15" laptop, ages beautifully,
  each piece unique, 50-year artisan tradition
  Brand story: Family workshop in Florence, 3rd-generation craftsmen

  Product 2: Swiss automatic watch ($2,400)
  Details: Sapphire crystal, 316L surgical steel case, ETA 2824-2
  movement, 200m water resistance, exhibition caseback, 42mm case,
  genuine alligator strap, limited to 500 pieces per year

  Product 3: Cashmere throw blanket ($495)
  Details: 100% Grade-A Inner Mongolian cashmere, hand-finished edges,
  natural dye, weighs 300g, 130x180cm, comes in a linen storage bag,
  sourced from nomadic herders

  Product 4: Japanese chef's knife ($340)
  Details: VG-10 stainless steel core with 67-layer Damascus pattern,
  hand-forged by master bladesmith, D-shaped octagonal handle in
  pakkawood, 8-inch gyuto, Rockwell hardness 60-61, Sakai tradition

  Product 5: Artisan perfume ($220/50ml)
  Details: 12-note composition, natural ingredients sourced from 6
  countries, aged 6 months, hand-blown glass bottle, aluminum-free
  spray mechanism, created by award-winning perfumer, batch numbered

  For each product:
  1. Write 200-250 words in luxury brand voice
  2. Identify the 3 "justifiers" — details that make the price feel
     reasonable
  3. Write the origin/craftsmanship story (the "why this costs more")
  4. Explain what luxury copy does differently from mass-market copy
  5. Write the subtle CTA (luxury products don't say "Buy Now!")

  Then provide:
  - Luxury copywriting principles: restraint, precision, invitation
  - Words that signal luxury vs words that cheapen a brand
  - How to describe price without discounting the brand
  - The psychology of premium pricing in product descriptions

assertions:
  - type: llm_judge
    criteria: "Luxury voice is consistent — restrained, precise, and invitational rather than promotional or pushy, with an unhurried pace that conveys confidence"
    weight: 0.30
    description: "Consistent luxury voice"
  - type: llm_judge
    criteria: "Craftsmanship stories justify pricing — each product's origin, process, or heritage naturally explains why it costs more without explicitly defending the price"
    weight: 0.25
    description: "Price-justifying craftsmanship stories"
  - type: llm_judge
    criteria: "CTAs are appropriately subtle — 'Discover' or 'Explore' rather than 'Buy Now' or 'Add to Cart,' matching luxury brand conventions"
    weight: 0.25
    description: "Appropriately subtle CTAs"
  - type: llm_judge
    criteria: "Luxury vs mass-market word lists are specific — correctly identifies words like 'crafted,' 'curated,' 'heritage' as luxury vs 'cheap,' 'deal,' 'bargain' as cheapening"
    weight: 0.20
    description: "Specific luxury vs mass-market words"
