meta:
  id: accessibility-inclusive-descriptions
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Write accessible and inclusive product descriptions that serve all shoppers"
  tags: [ecommerce, accessibility, inclusive, wcag, advanced]

state: {}

trigger: |
  Over 1 billion people worldwide have some form of disability.
  Accessible product descriptions improve the experience for screen
  reader users, people with cognitive disabilities, and non-native
  speakers — while also improving SEO and clarity for everyone.

  Write accessible and inclusive product descriptions for 5 products:

  Product 1: Adjustable desk lamp ($55)
  Challenge: Describe visual features (light color, brightness levels)
  for screen reader users who need functional information, not just aesthetics.
  Features: 5 color temperatures (2700K-6500K), 10 brightness levels,
  USB charging port, flexible gooseneck, touch controls, 15W LED

  Product 2: Patterned area rug ($120)
  Challenge: Describe visual patterns and colors accessibly while still
  appealing to sighted shoppers.
  Features: 5'x8', hand-tufted wool, geometric pattern in navy/cream/gold,
  low pile (0.5"), non-slip backing, easy to vacuum

  Product 3: Unisex adaptive clothing jacket ($75)
  Challenge: Describe adaptive features without being condescending to
  disabled shoppers.
  Features: Magnetic closures (replace buttons/zippers), seated-wear back
  design, one-handed dressing capability, sensory-friendly flat seams,
  machine washable, 6 colors

  Product 4: Bluetooth speaker ($45)
  Challenge: Describe audio quality for deaf/hard-of-hearing shoppers
  who may use the speaker for vibration or others in the room.
  Features: 360° sound, 20W output, IPX7 waterproof, 12-hour battery,
  LED light show mode, aux input, speakerphone

  Product 5: Smart home hub ($89)
  Challenge: Describe voice-controlled features considering users with
  speech disabilities who may need alternative control methods.
  Features: Voice control (Alexa/Google), touchscreen display, app control,
  physical buttons, controls 100+ smart devices, routines and automation

  For each product:
  1. Write a 150-word accessible description (clear language, structured
     headings, no color-only information)
  2. Write the alt text for 3 product images
  3. Identify and fix accessibility problems common in this category
  4. Ensure inclusive language throughout (no ableist assumptions)
  5. Write the ARIA-friendly product specification table

  Then provide:
  - WCAG 2.1 guidelines relevant to product descriptions
  - Inclusive language guide for e-commerce (avoid: "normal size,"
    "wheelchair-bound," gendered assumptions)
  - Reading level optimization: write for 8th-grade reading level
  - How accessible descriptions improve SEO (structured content, clear
    headings, descriptive text)

assertions:
  - type: llm_judge
    criteria: "Descriptions are genuinely accessible — avoid color-only references, use clear structure, and provide functional information that works with screen readers"
    weight: 0.30
    description: "Genuinely accessible descriptions"
  - type: llm_judge
    criteria: "Inclusive language is used throughout — avoids ableist assumptions, gendered language, and treats adaptive features as standard design rather than special accommodation"
    weight: 0.25
    description: "Consistently inclusive language"
  - type: llm_judge
    criteria: "Alt text is properly descriptive — conveys what each image shows functionally without being overly verbose, following WCAG image description guidelines"
    weight: 0.25
    description: "Properly descriptive alt text"
  - type: llm_judge
    criteria: "WCAG guidelines are correctly applied — identifies relevant success criteria and provides practical implementation advice specific to product descriptions"
    weight: 0.20
    description: "Correctly applied WCAG guidelines"
