meta:
  id: ab-testing-product-copy
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Design and analyze A/B tests for product description elements"
  tags: [ecommerce, ab-testing, conversion, optimization, advanced]

state: {}

trigger: |
  A/B testing product descriptions can increase conversion by 10-30%.
  But most stores test the wrong elements or run tests without
  statistical significance. Strategic testing isolates specific
  variables — headline, bullet format, benefit framing, social proof
  placement — to find what drives purchases.

  Design A/B tests for 5 product description elements:

  Test 1: Headline approach
  Product: Ergonomic office chair ($399)
  Version A: Benefit-focused headline ("End Back Pain with 8+ Hours
  of Comfortable Sitting")
  Version B: Feature-focused headline ("Ergonomic Mesh Chair with
  Lumbar Support and Adjustable Armrests")
  Task: Write both versions, predict the winner, and explain why

  Test 2: Social proof placement
  Product: Skincare serum ($48)
  Version A: Social proof in the opening line ("Join 50,000+ customers
  who've transformed their skin")
  Version B: Social proof after benefit description (benefits first,
  then "Trusted by 50,000+ customers")
  Task: Write both full descriptions and analyze placement impact

  Test 3: Bullet point format
  Product: Laptop backpack ($65)
  Version A: Short bullets (under 8 words each)
  Version B: Detailed bullets (15-25 words each with benefit + proof)
  Task: Write both sets and explain which audience each serves

  Test 4: Urgency framing
  Product: Limited edition sneakers ($180)
  Version A: Scarcity-driven ("Only 247 pairs remaining")
  Version B: Exclusivity-driven ("Designed for the few who notice details")
  Task: Write both approaches and analyze psychological impact

  Test 5: Description length
  Product: Premium coffee maker ($249)
  Version A: Short description (75 words — just the essentials)
  Version B: Long description (250 words — full story + specs)
  Task: Write both and identify which performs better at this price point

  For each test:
  1. Write both complete versions (A and B)
  2. Predict the winner with reasoning
  3. Define the success metric (CTR, add-to-cart, purchase, time on page)
  4. Calculate the minimum sample size for statistical significance
  5. Identify potential confounding variables

  Then provide:
  - A/B testing roadmap: which elements to test first (highest impact)
  - Statistical significance basics for e-commerce teams
  - How to document and build on test results over time
  - Common A/B testing mistakes in product copy

assertions:
  - type: llm_judge
    criteria: "Both versions in each test are well-crafted — neither A nor B is intentionally weak; both represent genuine strategic approaches"
    weight: 0.25
    description: "Well-crafted test versions"
  - type: llm_judge
    criteria: "Predictions are well-reasoned — backed by conversion psychology and research rather than just gut feeling, with nuance about audience and product type"
    weight: 0.30
    description: "Well-reasoned predictions"
  - type: llm_judge
    criteria: "Statistical methodology is correct — sample size calculations use appropriate formulas considering baseline conversion rate, minimum detectable effect, and confidence level"
    weight: 0.25
    description: "Correct statistical methodology"
  - type: llm_judge
    criteria: "The testing roadmap prioritizes correctly — tests headline and CTA first (highest impact), then social proof and format, then length and detail level"
    weight: 0.20
    description: "Correctly prioritized testing roadmap"
