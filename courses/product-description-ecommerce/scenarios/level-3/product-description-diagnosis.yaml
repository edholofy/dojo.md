meta:
  id: product-description-diagnosis
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Diagnose underperforming product pages and prescribe copy improvements"
  tags: [ecommerce, diagnosis, optimization, analytics, advanced]

state: {}

trigger: |
  When product pages have high traffic but low conversion, the
  description is usually the culprit. Diagnosing description problems
  requires analyzing copy against conversion principles, comparing
  to category benchmarks, and identifying specific fixable issues.

  Diagnose 5 underperforming product pages and prescribe fixes:

  Page 1: Yoga mat ($48) — High traffic, low add-to-cart (1.2%)
  Current description: "This is our best-selling yoga mat. Made with
  eco-friendly materials. Available in multiple colors. Great for all
  skill levels. Non-slip surface. Lightweight and portable. Free
  shipping on orders over $50."
  Analytics: 8 seconds average time on page, 72% bounce rate

  Page 2: Mechanical keyboard ($139) — Good add-to-cart, high abandonment
  Current description: (750 words, extremely detailed technical specs
  covering every switch specification, keycap material analysis, and PCB
  design philosophy — no benefits, no use cases, no emotional appeal)
  Analytics: 45 seconds average time, 3.8% add-to-cart, 68% cart abandonment

  Page 3: Dog bed ($65) — Low organic traffic despite competitive product
  Current description: "Comfortable dog bed for your furry friend. Soft
  and cozy. Machine washable cover. Multiple sizes available." (42 words)
  Analytics: 200 monthly organic visits, position 47 for "dog bed"

  Page 4: Protein bars (12-pack, $32) — High returns (18% return rate)
  Current description: "Delicious protein bars packed with 20g of protein!
  The tastiest bars you'll ever try! Perfect for gym lovers and health
  enthusiasts! Amazing flavor!" (no ingredients, no allergen info, no
  texture description, no nutrition facts)
  Analytics: Good conversion but 18% return rate, frequent "not what I
  expected" feedback

  Page 5: Smart watch ($279) — Low time on page, high bounce
  Current description: Uses a wall of unformatted text — 300 words in
  one paragraph, no headings, no bullets, no visual breaks, features
  and benefits mixed together without structure
  Analytics: 4 seconds average time, 81% bounce rate

  For each page:
  1. Diagnose the specific problems (list each issue)
  2. Explain why each problem hurts the specific metric that's underperforming
  3. Write the improved version that addresses every diagnosed issue
  4. Predict the expected improvement with the fix
  5. Prioritize: which fix has the highest impact?

  Then provide:
  - Product page diagnosis framework: 15-point checklist
  - How to read analytics to diagnose description problems
  - Common metric-problem correlations (high bounce = formatting,
    high abandonment = trust/info gaps, high returns = expectation mismatch)
  - ROI calculator: estimating revenue impact of description improvements

assertions:
  - type: llm_judge
    criteria: "Diagnoses are specific to the underperforming metric — low add-to-cart is diagnosed as benefit/value gap, high returns as expectation mismatch, low traffic as SEO deficiency"
    weight: 0.30
    description: "Metric-specific diagnoses"
  - type: llm_judge
    criteria: "Improved versions address every diagnosed issue — each rewrite is a complete, publishable description that fixes all identified problems"
    weight: 0.25
    description: "Comprehensive improved versions"
  - type: llm_judge
    criteria: "The diagnosis framework is systematic — provides a repeatable checklist that any e-commerce team could apply to their product pages"
    weight: 0.25
    description: "Systematic diagnosis framework"
  - type: llm_judge
    criteria: "Analytics interpretation is accurate — correctly explains what high bounce rate, low time on page, and cart abandonment signal about description quality"
    weight: 0.20
    description: "Accurate analytics interpretation"
