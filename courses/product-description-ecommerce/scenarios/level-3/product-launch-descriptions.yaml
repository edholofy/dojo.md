meta:
  id: product-launch-descriptions
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions for new product launches that build anticipation and drive first purchases"
  tags: [ecommerce, product-launch, anticipation, first-purchase, advanced]

state: {}

trigger: |
  Product launch descriptions face a unique challenge: no reviews, no
  social proof, no purchase history. The description must compensate
  by building anticipation, establishing credibility through brand
  trust and specs, and reducing risk with guarantees.

  Write launch descriptions for 5 new products at different stages:

  Stage 1: Coming soon / pre-launch teaser
  Product: Smart sleep tracker ring ($249)
  Available info: Tracks sleep stages, blood oxygen, heart rate variability,
  body temperature. Titanium build, 7-day battery, no subscription needed.
  Launching in 6 weeks.
  Task: Write the teaser page description that builds a waitlist

  Stage 2: Pre-order now available
  Product: Electric cargo bike ($2,799)
  Available info: 80-mile range, 400 lb cargo capacity, mid-drive motor,
  integrated GPS, modular cargo system, 2-year warranty. Ships in 8 weeks.
  Task: Write the pre-order page that justifies paying before receiving

  Stage 3: Just launched — first week
  Product: AI-powered language learning app ($12/month)
  Available info: Adaptive difficulty, real conversation practice with AI,
  30 languages, speech recognition scoring, daily streak rewards.
  No reviews yet.
  Task: Write the launch description without social proof

  Stage 4: Launch with early adopter reviews
  Product: Modular standing desk system ($699)
  Available info: Magnetic modular shelves, integrated wireless charging,
  cable management, sit-stand in 3 seconds. 50 beta testers with feedback.
  Task: Weave early reviews into the launch description

  Stage 5: Post-launch iteration
  Product: Meal planning app ($8/month)
  Available info: Launched 3 months ago, 5,000 users, 4.3/5 average rating,
  top feature request fulfilled (grocery list integration). Releasing v2.
  Task: Write the v2 description that acknowledges growth and improvement

  For each stage:
  1. Write 150-200 words appropriate to the launch stage
  2. Identify the #1 trust barrier and how to overcome it
  3. Write the stage-appropriate CTA (waitlist, pre-order, try now, upgrade)
  4. Explain what social proof substitute to use at this stage
  5. Write the FAQ section addressing launch-specific concerns

  Then provide:
  - Launch description timeline: what to write at each stage
  - How to build trust without reviews (founder story, behind-the-scenes,
    beta feedback, money-back guarantees)
  - Pre-order vs waitlist: when each approach works better
  - How to evolve descriptions as reviews and data come in

assertions:
  - type: llm_judge
    criteria: "Each launch stage has appropriate trust-building — pre-launch uses founder credibility, pre-order uses guarantee framing, just-launched uses risk reversal"
    weight: 0.30
    description: "Stage-appropriate trust building"
  - type: llm_judge
    criteria: "CTAs match the stage — waitlist for teaser, pre-order for available, free trial for launched, upgrade for iteration — each with appropriate urgency level"
    weight: 0.25
    description: "Stage-matching CTAs"
  - type: llm_judge
    criteria: "No-review descriptions are still compelling — use credibility indicators like certifications, technical specs, founder expertise, and guarantees to compensate"
    weight: 0.25
    description: "Compelling no-review descriptions"
  - type: llm_judge
    criteria: "The launch timeline is comprehensive — covers teaser to maturity with specific copy recommendations and description evolution milestones"
    weight: 0.20
    description: "Comprehensive launch timeline"
