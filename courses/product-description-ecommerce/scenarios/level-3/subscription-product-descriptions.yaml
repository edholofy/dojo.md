meta:
  id: subscription-product-descriptions
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions for subscription and recurring products that reduce churn objections"
  tags: [ecommerce, subscription, recurring, retention, advanced]

state: {}

trigger: |
  Subscription e-commerce is growing 20% annually, but the #1 barrier
  is commitment fear. Product descriptions for subscriptions must sell
  the ongoing value, not just the first delivery. They need to address
  flexibility, cancellation ease, and cumulative benefits.

  Write subscription product descriptions for 5 products:

  Product 1: Coffee subscription ($16/month)
  Details: Freshly roasted beans delivered monthly, choose your roast
  preference, rotating single-origin selections, free shipping, pause
  or cancel anytime, subscriber-exclusive blends

  Product 2: Pet food subscription ($45/month)
  Details: Personalized formula based on breed/age/weight, vet-formulated,
  auto-adjusted portions as pet grows, free delivery, transition guide
  included, 30-day satisfaction guarantee

  Product 3: Skincare subscription box ($35/month)
  Details: 5-7 curated products (mix of full-size and samples), matches
  skin type quiz results, includes exclusive brands, retail value $80+,
  skip or swap products, earn loyalty points

  Product 4: Vitamin supplement subscription ($25/month)
  Details: Personalized daily packs based on health quiz, 30 individually
  wrapped daily servings, third-party tested, free nutritionist
  consultation, adjust formula quarterly

  Product 5: Razor and grooming subscription ($10/month)
  Details: 4 razor cartridges + choice of 1 grooming product, German
  steel blades, ergonomic handle (first shipment), carbon-neutral
  shipping, 100% satisfaction guarantee

  For each product:
  1. Write 150-200 words that sell the subscription, not just the product
  2. Address the top 3 commitment objections (cost over time, flexibility,
     value consistency)
  3. Write the "Why subscribe vs one-time purchase?" section
  4. Create the first-shipment welcome experience description
  5. Write the reactivation copy (for paused or cancelled subscribers)

  Then provide:
  - Subscription description formula: Value + Convenience + Flexibility
  - How to frame monthly cost (daily equivalent, comparison anchoring)
  - Objection-handling copy for common subscription fears
  - Retention-focused language: keeping subscribers beyond month 3

assertions:
  - type: llm_judge
    criteria: "Descriptions sell ongoing value — emphasize the cumulative benefit of subscribing (personalization improves over time, exclusive access, cost savings) rather than just the first delivery"
    weight: 0.30
    description: "Sells ongoing subscription value"
  - type: llm_judge
    criteria: "Commitment objections are proactively addressed — mentions 'pause or cancel anytime,' 'no contracts,' and flexibility prominently without waiting for the customer to ask"
    weight: 0.25
    description: "Proactively addressed commitment fears"
  - type: llm_judge
    criteria: "Cost framing is persuasive — breaks monthly costs into daily equivalents or compares to alternatives ('less than your daily coffee') to minimize perceived expense"
    weight: 0.25
    description: "Persuasive cost framing"
  - type: llm_judge
    criteria: "Reactivation copy is personalized and compelling — acknowledges the subscriber's history and offers a genuine reason to return rather than just a discount"
    weight: 0.20
    description: "Compelling personalized reactivation copy"
