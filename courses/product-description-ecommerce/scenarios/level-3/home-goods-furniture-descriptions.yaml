meta:
  id: home-goods-furniture-descriptions
  level: 3
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions for home goods and furniture that reduce buyer hesitation"
  tags: [ecommerce, home-goods, furniture, high-consideration, advanced]

state: {}

trigger: |
  Furniture and home goods are high-consideration purchases with return
  rates of 15-20% — primarily due to size mismatches and color
  discrepancies. Descriptions must help shoppers visualize items in
  their space and address the "Will this fit my room?" question that
  photos alone can't answer.

  Write product descriptions for 5 home goods products:

  Product 1: Mid-century modern sofa ($1,299)
  Details: 82" wide, 35" deep, 33" high, hardwood frame, high-density
  foam cushions, performance fabric (stain-resistant), solid walnut legs,
  5 color options, 500 lb weight capacity, assembly required
  Challenge: Help buyers visualize this in their living room

  Product 2: Handwoven Moroccan rug ($380, 8'x10')
  Details: 100% wool, hand-knotted by artisan cooperatives, reversible,
  abstract geometric pattern, natural undyed wool with indigo accents,
  each piece unique, varies ±2" from listed dimensions
  Challenge: Convey uniqueness while managing expectations about handmade

  Product 3: Kitchen island cart ($449)
  Details: Solid rubberwood top, granite inset, drop-leaf extension (expands
  from 40" to 52"), 2 drawers, towel bar, locking casters, spice rack,
  wine bottle storage, 200 lb top capacity
  Challenge: Communicate space-saving versatility for small kitchens

  Product 4: Custom blackout curtains ($85/panel)
  Details: 100% polyester blackout fabric, rod pocket or grommet top,
  available in 22 colors, custom width (24"-120") and length (63"-120"),
  machine washable, thermal insulating, noise reducing
  Challenge: Guide through customization without overwhelming

  Product 5: Ceramic table lamp set ($120/pair)
  Details: Hand-glazed ceramic base, linen drum shade, E26 bulb (not
  included), 3-way switch, 24" tall, 14" shade diameter, 6 ft cord,
  available in 4 glaze finishes, slight variations in each piece
  Challenge: Describe light quality and ambiance created

  For each product:
  1. Write 200-250 words that help buyers visualize the product in their home
  2. Include precise dimensions with real-world context ("fits through
     standard doorways," "seats 3 adults comfortably")
  3. Address the #1 return reason for this product category
  4. Write the care and maintenance section
  5. Include assembly/installation guidance if applicable

  Then provide:
  - Home goods description essentials: 10 must-include data points
  - How to describe colors accurately (monitor calibration disclaimer,
    fabric swatches offer)
  - Dimension visualization techniques (comparison objects, room context)
  - Managing handmade product expectations (slight variations, uniqueness)

assertions:
  - type: llm_judge
    criteria: "Dimensions are contextualized — not just measurements but real-world references like 'fits through standard 32-inch doorways' and 'seats 3-4 adults comfortably'"
    weight: 0.30
    description: "Contextualized dimensions"
  - type: llm_judge
    criteria: "Return-reducing information is proactive — addresses color variation disclaimers, assembly difficulty, size verification suggestions before the sale"
    weight: 0.25
    description: "Proactive return-reducing information"
  - type: llm_judge
    criteria: "Handmade product expectations are managed well — positions natural variation as desirable uniqueness while being transparent about dimensional tolerances"
    weight: 0.25
    description: "Well-managed handmade expectations"
  - type: llm_judge
    criteria: "Color description techniques are practical — includes monitor calibration notes, offers fabric/finish swatches, uses descriptive color names beyond generic terms"
    weight: 0.20
    description: "Practical color description techniques"
