meta:
  id: product-storytelling
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Master advanced product storytelling techniques that create emotional connection and brand loyalty"
  tags: [ecommerce, storytelling, narrative, brand-loyalty, expert]

state: {}

trigger: |
  Products with stories sell 5-20x more than products with just
  descriptions. Advanced product storytelling weaves origin narratives,
  customer journeys, founder missions, and craftsmanship tales into
  descriptions that create emotional connection beyond features and
  benefits.

  Write story-driven product descriptions using 5 different narrative
  techniques:

  Technique 1: Origin story
  Product: Single-origin chocolate bar ($8)
  Story elements: Small cacao farm in Ecuador, farmer partnership since
  2018, bean-to-bar process, 72-hour conching, family recipe
  Task: Write 200 words that transport the reader to the cacao farm

  Technique 2: Customer transformation story
  Product: Online course platform ($29/month)
  Story elements: A teacher who went from burned-out to thriving by
  creating a side income with online courses
  Task: Write 200 words using the hero's journey framework

  Technique 3: Behind-the-scenes / making-of
  Product: Handmade ceramic mug ($32)
  Story elements: Potter with 20 years experience, wheel-thrown, wood-fired
  kiln, 72-hour firing process, each piece unique
  Task: Write 200 words that reveal the craft process

  Technique 4: Problem-solution narrative
  Product: Noise-canceling sleep earbuds ($79)
  Story elements: Founded by a light sleeper who tried everything, 3 years
  of R&D, 47 prototypes, finally solved the comfort + noise problem
  Task: Write 200 words starting with the problem the founder experienced

  Technique 5: Future-state visualization
  Product: Smart garden system ($149)
  Story elements: Imagine harvesting fresh herbs every morning, no gardening
  experience needed, apartment-friendly, year-round growing
  Task: Write 200 words that paint a picture of the buyer's life with
  this product

  For each narrative:
  1. Write the full story-driven description
  2. Identify the emotional arc (beginning, tension, resolution)
  3. Show where to place the CTA within the story
  4. Analyze which products/categories benefit most from this technique
  5. Write a non-story version of the same description for comparison

  Then provide:
  - 5 product storytelling frameworks with templates
  - How to research and uncover product stories (interview questions
    for founders, suppliers, customers)
  - Story length optimization: when to tell a short vs long story
  - How storytelling affects key metrics (time on page, conversion,
    share rate, return customer rate)

assertions:
  - type: llm_judge
    criteria: "Each narrative technique creates genuine emotional engagement — the origin story transports, the customer story inspires, the behind-the-scenes reveals craft"
    weight: 0.30
    description: "Genuine emotional engagement"
  - type: llm_judge
    criteria: "Stories serve the sale — narratives naturally lead to the CTA without feeling interrupted; the story makes the purchase feel like the next logical step"
    weight: 0.25
    description: "Sales-serving stories"
  - type: llm_judge
    criteria: "The storytelling frameworks are actionable — each includes a fill-in template that a copywriter could use to create stories for any product"
    weight: 0.25
    description: "Actionable storytelling frameworks"
  - type: llm_judge
    criteria: "Non-story comparisons clearly show the difference — feature-only versions feel flat and forgettable next to the story-driven versions"
    weight: 0.20
    description: "Clear story vs non-story contrast"
