meta:
  id: industry-specific-descriptions
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions for regulated and specialized industries with compliance requirements"
  tags: [ecommerce, regulated, compliance, industry-specific, expert]

state: {}

trigger: |
  Certain industries have strict regulations about what product
  descriptions can and cannot claim. Health products, financial products,
  children's products, alcohol, and supplements all have specific
  compliance requirements that copywriters must follow.

  Write compliant product descriptions for 5 regulated product categories:

  Category 1: Dietary supplement ($34/bottle)
  Product: Joint health supplement with glucosamine and turmeric
  Regulations: FDA dietary supplement rules, FTC advertising guidelines
  Restrictions: Cannot claim to treat/cure disease, must include disclaimer
  Task: Write a compelling description that drives purchase within
  regulatory limits

  Category 2: Children's toy ($25)
  Product: STEM building set for ages 6-12
  Regulations: CPSC safety standards, COPPA (for online), ASTM F963
  Restrictions: Age-appropriate claims, safety certifications,
  choking hazard warnings
  Task: Write a description that excites parents AND satisfies compliance

  Category 3: Alcoholic beverage ($18/bottle)
  Product: Craft small-batch bourbon
  Regulations: TTB labeling requirements, state-specific advertising laws
  Restrictions: Cannot show consumption, no health claims, must verify age
  Task: Write a premium description within alcohol advertising guidelines

  Category 4: Financial product ($9.99/month subscription)
  Product: Personal budgeting app with investment tracking
  Regulations: SEC/FINRA advertising rules, state financial regulations
  Restrictions: Cannot guarantee returns, must include disclosures,
  no misleading performance claims
  Task: Write a description that communicates value without financial promises

  Category 5: Medical device (Class I, $89)
  Product: Pulse oximeter for home use
  Regulations: FDA device regulations, FTC health claims guidelines
  Restrictions: Cannot claim to diagnose conditions, must state
  "not a substitute for professional medical advice"
  Task: Write a useful description that stays within medical device claims

  For each category:
  1. Write the compliant product description (150-200 words)
  2. Identify every regulatory requirement and how it's addressed
  3. Show the required disclaimers and where to place them
  4. Write a "what NOT to say" list specific to this category
  5. Demonstrate the line between compliant and non-compliant claims

  Then provide:
  - Regulatory compliance checklist by industry
  - How to write compelling copy within regulatory constraints
  - Common compliance mistakes that result in FTC action
  - When to involve legal review in the description process
  - How AI-generated descriptions create compliance risks

assertions:
  - type: llm_judge
    criteria: "Descriptions are both compliant and compelling — comply with all stated regulations while still being persuasive and conversion-oriented"
    weight: 0.30
    description: "Compliant yet compelling descriptions"
  - type: llm_judge
    criteria: "Regulatory requirements are accurately identified — FDA supplement disclaimers, CPSC safety standards, TTB labeling rules are correctly referenced"
    weight: 0.25
    description: "Accurately identified regulations"
  - type: llm_judge
    criteria: "Non-compliant examples clearly show the risk — demonstrates specific claims that would violate regulations and why they're problematic"
    weight: 0.25
    description: "Clear non-compliant risk examples"
  - type: llm_judge
    criteria: "The compliance checklist is actionable — provides specific checks for each industry that a copywriter could use before publishing"
    weight: 0.20
    description: "Actionable compliance checklist"
