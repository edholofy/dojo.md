meta:
  id: product-page-ux-writing
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Master UX writing for product pages — micro-copy, error states, and interactive elements"
  tags: [ecommerce, ux-writing, micro-copy, interface, expert]

state: {}

trigger: |
  Product page UX writing goes beyond the main description — it includes
  button text, size selector labels, color names, error messages, loading
  states, out-of-stock messaging, and every micro-interaction on the page.
  Great UX copy reduces friction and guides shoppers toward purchase.

  Write comprehensive UX copy for a complete product page:

  Product: Premium wireless headphones ($249)
  Features: 3 colors, 2 sizes, noise cancellation, 40hr battery

  Part 1: Primary micro-copy elements
  Write the copy for each element:
  1. Add-to-cart button (and variations: pre-order, notify me, sold out)
  2. Color selector labels (creative names vs descriptive names)
  3. Size selector with guidance text
  4. Quantity selector with inventory hints
  5. Shipping information display (in stock, ships in X days, backordered)
  6. Return policy summary (on-page, not link to policy page)
  7. Price display (original price, sale price, savings messaging)
  8. Wishlist/save button text
  9. Share button options and messaging
  10. Trust badges and guarantee text

  Part 2: Dynamic states
  Write the copy for each state:
  1. Loading state (skeleton text while price/availability loads)
  2. Out-of-stock state (with alternatives and notification signup)
  3. Low-stock urgency ("Only 3 left")
  4. Price drop notification
  5. Added-to-cart confirmation (modal or toast)
  6. Error state (payment failed, size unavailable, address issue)
  7. Returning customer state ("Welcome back — you viewed this before")

  Part 3: Interactive elements
  1. Product Q&A section (how to prompt questions, answer format)
  2. Review solicitation (post-purchase email copy)
  3. Size chart modal copy
  4. Comparison tool labels
  5. "Complete the look" or "Frequently bought together" section headers

  For each element:
  - Write 2-3 variations
  - Explain the UX rationale for your copy choices
  - Identify which variation to A/B test

  Then provide:
  - Product page UX copy audit checklist (25 micro-copy elements)
  - Tone guidelines for transactional vs inspirational micro-copy
  - Error message writing best practices for e-commerce
  - How micro-copy improvements impact conversion (case studies/data)

assertions:
  - type: llm_judge
    criteria: "Micro-copy variations are meaningfully different — each variation takes a distinct approach (action-oriented vs benefit-oriented vs urgency-oriented) with clear rationale"
    weight: 0.30
    description: "Meaningfully different micro-copy variations"
  - type: llm_judge
    criteria: "Dynamic states are handled gracefully — out-of-stock messaging offers alternatives rather than dead ends, error states guide recovery rather than just stating the problem"
    weight: 0.25
    description: "Graceful dynamic state handling"
  - type: llm_judge
    criteria: "The UX audit checklist is comprehensive — covers all 25+ micro-copy touchpoints on a product page that most teams overlook"
    weight: 0.25
    description: "Comprehensive UX audit checklist"
  - type: llm_judge
    criteria: "UX rationale is grounded in principles — explains choices using cognitive load reduction, progressive disclosure, and error prevention rather than just personal preference"
    weight: 0.20
    description: "Principle-grounded UX rationale"
