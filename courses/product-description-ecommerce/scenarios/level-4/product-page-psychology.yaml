meta:
  id: product-page-psychology
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Apply behavioral psychology principles to product descriptions for higher conversion"
  tags: [ecommerce, psychology, behavioral, persuasion, expert]

state: {}

trigger: |
  Behavioral psychology principles like anchoring, loss aversion, the
  decoy effect, and social proof can be ethically applied to product
  descriptions to increase conversion. Understanding the cognitive
  biases behind purchase decisions helps write copy that aligns with
  how people actually make buying decisions.

  Apply 8 psychological principles to product descriptions:

  Principle 1: Anchoring effect
  Product: Premium blender ($349)
  Task: Write a description that anchors the price against a higher
  reference point (restaurant smoothies, competitor pricing)
  Show: How the first number mentioned shapes price perception

  Principle 2: Loss aversion
  Product: Home security camera ($99)
  Task: Write a description framing the purchase as preventing loss
  rather than gaining benefit ("Don't risk..." vs "You'll enjoy...")
  Show: Loss-frame vs gain-frame versions

  Principle 3: Social proof / bandwagon effect
  Product: Language learning app ($15/month)
  Task: Write a description leveraging user numbers, ratings, and
  community belonging
  Show: How different social proof numbers affect perception

  Principle 4: Scarcity and urgency
  Product: Limited edition sneakers ($180)
  Task: Write ethical scarcity copy (real limitations, not manufactured)
  Show: Ethical vs manipulative scarcity examples

  Principle 5: The decoy effect
  Product: SaaS project management tool
  Task: Write descriptions for 3 pricing tiers where the middle tier
  is positioned as the obvious best choice
  Show: How the decoy (basic tier) makes the standard tier look valuable

  Principle 6: Endowment effect
  Product: Mattress ($899, 100-night trial)
  Task: Write a description that leverages the trial period to create
  ownership feelings before purchase
  Show: How "it's already yours" language increases conversion

  Principle 7: Authority bias
  Product: Vitamin supplement ($32)
  Task: Write a description leveraging expert endorsements and
  scientific authority
  Show: How different authority signals affect trust levels

  Principle 8: Paradox of choice
  Product: Custom suit ($499)
  Task: Write a description that simplifies a complex customization
  process to reduce decision paralysis
  Show: How reducing visible options increases conversion

  For each principle:
  1. Explain the psychology in plain language
  2. Write the product description applying the principle
  3. Write a version that does NOT apply the principle (for comparison)
  4. Identify the ethical boundary — when this crosses into manipulation
  5. Provide A/B test metrics to measure the principle's impact

  Then provide:
  - Ethics framework: persuasion vs manipulation in e-commerce copy
  - The 5 most impactful psychological principles for product descriptions
  - How to combine multiple principles without overwhelming the shopper
  - Dark patterns to avoid: what crosses the ethical line

assertions:
  - type: llm_judge
    criteria: "Psychological principles are correctly applied — anchoring uses proper reference points, loss aversion uses prospect theory framing, scarcity uses real limitations"
    weight: 0.30
    description: "Correctly applied psychology"
  - type: llm_judge
    criteria: "Ethical boundaries are clearly defined — each principle includes where it crosses from persuasion to manipulation, with specific examples of both"
    weight: 0.25
    description: "Clearly defined ethical boundaries"
  - type: llm_judge
    criteria: "Before/after comparisons demonstrate the impact — descriptions without the principle are noticeably less compelling, showing the value of the psychological approach"
    weight: 0.25
    description: "Impactful before-after comparisons"
  - type: llm_judge
    criteria: "Dark patterns are comprehensively covered — identifies countdown timers with fake urgency, hidden costs, bait-and-switch, and manipulative social proof"
    weight: 0.20
    description: "Comprehensive dark patterns coverage"
