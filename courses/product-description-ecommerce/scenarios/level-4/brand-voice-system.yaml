meta:
  id: brand-voice-system
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Build a brand voice system for consistent product descriptions across teams and channels"
  tags: [ecommerce, brand-voice, consistency, guidelines, expert]

state: {}

trigger: |
  As e-commerce teams scale, description quality becomes inconsistent.
  Different writers, AI tools, and agencies produce different voices.
  A brand voice system ensures every product description sounds like
  it came from the same brand, whether written by a junior copywriter,
  freelancer, or AI.

  Build a complete brand voice system for 3 different brand personalities:

  Brand 1: "Evergreen Outdoors" — Premium outdoor gear
  Personality: Knowledgeable, adventurous, unpretentious, trustworthy
  Target: Experienced outdoor enthusiasts, 30-55 years old
  Price range: $50-$500
  Tone: Expert friend, not salesperson

  Brand 2: "Glow Republic" — Gen Z skincare
  Personality: Fun, inclusive, science-backed, empowering
  Target: 18-28 year olds, skincare-curious, social media native
  Price range: $12-$45
  Tone: Smart best friend who happens to know chemistry

  Brand 3: "Hartwell & Co" — Luxury home furnishings
  Personality: Refined, understated, quality-obsessed, timeless
  Target: Design-conscious homeowners, 35-60, high income
  Price range: $200-$5,000
  Tone: Knowledgeable interior designer, never flashy

  For each brand:
  1. Write the brand voice document (personality, tone, vocabulary)
  2. Create the "We say / We don't say" word list (20+ entries)
  3. Write 3 product descriptions demonstrating the voice
  4. Write the same product in the wrong voice (for contrast)
  5. Create the quality rubric: how to score descriptions for voice
     compliance (1-5 scale with examples at each level)

  Then provide:
  - How to onboard new writers to a brand voice
  - Brand voice QA process: reviewing descriptions for consistency
  - How to adapt brand voice for different platforms (website vs Amazon
    vs social) while maintaining identity
  - Voice evolution: when and how to update brand voice guidelines

assertions:
  - type: llm_judge
    criteria: "Three brand voices are distinctly different — Evergreen sounds knowledgeable and rugged, Glow Republic sounds fun and inclusive, Hartwell sounds refined and understated"
    weight: 0.30
    description: "Distinctly different brand voices"
  - type: llm_judge
    criteria: "The 'We say / We don't say' lists are specific and useful — not generic dos and don'ts but brand-specific vocabulary choices that define the voice"
    weight: 0.25
    description: "Specific useful vocabulary lists"
  - type: llm_judge
    criteria: "Wrong-voice examples clearly illustrate the contrast — using Glow Republic's casual tone for Hartwell's luxury products creates an obviously wrong feel"
    weight: 0.25
    description: "Clear wrong-voice contrasts"
  - type: llm_judge
    criteria: "The quality rubric is actionable — provides clear examples of what a 1-rated, 3-rated, and 5-rated description looks like for each brand"
    weight: 0.20
    description: "Actionable quality rubric"
