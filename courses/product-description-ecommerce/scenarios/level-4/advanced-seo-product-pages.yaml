meta:
  id: advanced-seo-product-pages
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Implement advanced SEO strategies for product pages including structured data and AI search"
  tags: [ecommerce, seo-advanced, structured-data, ai-search, expert]

state: {}

trigger: |
  Advanced product page SEO goes beyond keywords — it includes structured
  data for rich results, optimization for AI shopping assistants and
  Google AI Overviews, entity-based SEO, and strategic internal linking.
  With AI Overviews appearing in 40% of shopping queries, product
  descriptions must be optimized for both traditional and AI search.

  Implement advanced SEO for 3 product pages:

  Product 1: Espresso machine ($899)
  Category: High-competition, high-value keyword
  Target: "best espresso machine for home" (AI Overview trigger)
  Task: Optimize for both traditional SERP and AI Overview inclusion

  Product 2: Organic baby blanket ($45)
  Category: Long-tail, high-intent keyword
  Target: "organic cotton baby blanket hypoallergenic"
  Task: Optimize for rich snippets and Google Shopping

  Product 3: Standing desk converter ($249)
  Category: Comparison-heavy, review-dependent keyword
  Target: "best standing desk converter for dual monitors"
  Task: Optimize for featured snippets and comparison queries

  For each product:
  1. Write the full product description optimized for advanced SEO
  2. Create the complete JSON-LD structured data (Product, Offer,
     AggregateRating, Review, FAQ)
  3. Write FAQ schema content (5 questions) targeting PAA boxes
  4. Design the internal linking strategy (related products, category
     pages, buying guides)
  5. Write the AI-Overview-optimized content block
  6. Create the breadcrumb schema

  Then provide:
  - AI Overview optimization strategy for product pages
  - Complete Product schema.org implementation guide
  - How to win rich results for e-commerce (review stars, price,
     availability, images)
  - Entity SEO for products: connecting products to knowledge graph
  - Voice search optimization for product discovery
  - Cannibalization prevention: product pages vs category pages vs
    blog posts

assertions:
  - type: llm_judge
    criteria: "Structured data is complete and valid — JSON-LD includes all required and recommended Product properties with correct nesting and data types"
    weight: 0.30
    description: "Complete valid structured data"
  - type: llm_judge
    criteria: "AI Overview optimization is strategic — content is structured to be cited by AI summaries with concise, authoritative answers that position the product as a recommendation"
    weight: 0.25
    description: "Strategic AI Overview optimization"
  - type: llm_judge
    criteria: "FAQ content targets real PAA questions — questions match actual 'People Also Ask' patterns for each product category with concise, authoritative answers"
    weight: 0.25
    description: "Real PAA-targeting FAQ content"
  - type: llm_judge
    criteria: "Internal linking strategy is comprehensive — connects product pages to category pages, buying guides, related products, and blog content in a logical hierarchy"
    weight: 0.20
    description: "Comprehensive internal linking strategy"
