meta:
  id: product-content-operations
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Design product content operations for managing descriptions across large catalogs"
  tags: [ecommerce, content-operations, catalog, scaling, expert]

state: {}

trigger: |
  Enterprise e-commerce stores manage 10,000-100,000+ product descriptions.
  Content operations (ContentOps) treats product descriptions as a
  managed asset with governance, workflows, and quality standards.
  Without ContentOps, catalogs degrade into inconsistent, outdated,
  and underperforming descriptions.

  Design a ContentOps system for a mid-size e-commerce company:

  Company profile:
  - 5,000 active SKUs across 12 product categories
  - 200 new products added monthly
  - 3 copywriters, 1 content manager, 1 SEO specialist
  - Products sold on own website + Amazon + Walmart
  - Current state: 60% of descriptions are under 50 words,
    30% haven't been updated in 2+ years

  Part 1: Content audit and prioritization
  1. Design the product description audit scoring system (0-100)
     - Quality score components (completeness, SEO, conversion elements)
  2. Create the prioritization matrix: which products to fix first
     - Revenue impact × description quality gap
  3. Build the triage process: rewrite from scratch vs update vs leave

  Part 2: Production workflow
  1. Design the product description creation workflow:
     Data collection → Brief → Draft → Review → Optimize → Publish
  2. Define roles and responsibilities at each stage
  3. Create the product description brief template
  4. Set production targets: descriptions per writer per day
  5. Quality assurance process: review criteria and approval flow

  Part 3: Governance and maintenance
  1. Create the product description style guide (format, length, voice)
  2. Design the content calendar for seasonal updates
  3. Build the monitoring system: how to detect degrading descriptions
  4. Plan the technology stack: PIM, CMS, and description tools
  5. Create the content maintenance schedule (quarterly reviews)

  Part 4: Performance measurement
  1. Define KPIs for product description quality
  2. Build the reporting dashboard (metrics, frequency, stakeholders)
  3. Create the ROI model: connecting description quality to revenue
  4. Set benchmarks by product category

assertions:
  - type: llm_judge
    criteria: "The audit scoring system is comprehensive — includes completeness, SEO elements, conversion best practices, formatting, and content freshness as measurable components"
    weight: 0.25
    description: "Comprehensive audit scoring"
  - type: llm_judge
    criteria: "Prioritization is data-driven — uses revenue impact and quality gap to determine which products to fix first, maximizing ROI of copywriting effort"
    weight: 0.25
    description: "Data-driven prioritization"
  - type: llm_judge
    criteria: "The production workflow is realistic — accounts for actual copywriter capacity, review bottlenecks, and the challenge of maintaining quality at scale"
    weight: 0.25
    description: "Realistic production workflow"
  - type: llm_judge
    criteria: "Performance measurement connects descriptions to revenue — ROI model shows how description quality improvements translate to conversion rate and revenue changes"
    weight: 0.25
    description: "Revenue-connected performance measurement"
