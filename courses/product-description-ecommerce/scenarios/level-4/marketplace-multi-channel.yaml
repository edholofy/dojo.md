meta:
  id: marketplace-multi-channel
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Adapt product descriptions for multiple sales channels while maintaining consistency"
  tags: [ecommerce, multi-channel, marketplace, omnichannel, expert]

state: {}

trigger: |
  Most e-commerce brands sell on 3-5 channels simultaneously — their
  own website, Amazon, Walmart Marketplace, Etsy, and social commerce.
  Each channel has different format requirements, character limits,
  search algorithms, and shopper expectations. Writing one description
  and copying it everywhere is a common mistake.

  Adapt product descriptions for 3 products across 5 channels:

  Product 1: Artisan candle ($36)
  Channels: Brand Shopify store, Amazon, Etsy, Instagram Shop, Walmart

  Product 2: Wireless charging station ($49)
  Channels: Brand website, Amazon, Best Buy Marketplace, Google Shopping,
  TikTok Shop

  Product 3: Organic dog treats ($18)
  Channels: Brand website, Amazon, Chewy, Walmart, Facebook Shop

  For each product × channel combination:
  1. Write the channel-optimized description
  2. Note the character limits and format constraints
  3. Identify which elements change vs stay consistent across channels
  4. Explain the channel's search/discovery algorithm considerations
  5. Write the channel-specific keywords or tags

  Then provide a comprehensive multi-channel strategy:
  1. Channel comparison matrix: format requirements, character limits,
     and feature support for each major platform
  2. Content hierarchy: what's the "master" description and how channels
     derive from it
  3. Duplicate content concerns: does copying descriptions hurt SEO?
  4. Channel-specific optimization guides:
     - Amazon: A+ Content, backend keywords, bullet formula
     - Walmart: rich media modules, attribute requirements
     - Etsy: tag optimization, story-driven copy
     - Social commerce: short-form, visual-first descriptions
  5. Multi-channel management workflow: how to update 500+ products
     across 5 channels efficiently

assertions:
  - type: llm_judge
    criteria: "Channel adaptations are genuinely different — Amazon descriptions are keyword-rich and structured, Etsy descriptions are story-driven, Instagram descriptions are concise and visual"
    weight: 0.30
    description: "Genuinely different channel adaptations"
  - type: llm_judge
    criteria: "Format constraints are accurate — correct character limits for each platform, proper bullet point formatting for Amazon, tag requirements for Etsy"
    weight: 0.25
    description: "Accurate format constraints"
  - type: llm_judge
    criteria: "The master description system is practical — shows how to maintain a single source of truth while efficiently creating channel-specific versions"
    weight: 0.25
    description: "Practical master description system"
  - type: llm_judge
    criteria: "Multi-channel workflow is scalable — addresses real operational challenges of updating hundreds of products across multiple platforms"
    weight: 0.20
    description: "Scalable multi-channel workflow"
