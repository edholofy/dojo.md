meta:
  id: conversion-rate-optimization
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Systematically optimize product descriptions for conversion rate improvement"
  tags: [ecommerce, cro, conversion, analytics, expert]

state: {}

trigger: |
  Product description optimization is a systematic discipline, not
  guesswork. CRO professionals use data from heatmaps, scroll depth,
  session recordings, and A/B tests to identify exactly which
  description elements impact conversion and by how much.

  Design a comprehensive CRO program for product descriptions:

  Part 1: Audit and baseline
  Given this product page data for an online furniture store:

  Product A: Sectional sofa ($1,899)
  - 5,000 monthly visits, 1.8% conversion rate
  - Avg time on page: 12 seconds
  - Scroll depth: 35% of visitors see below the fold
  - Heatmap: Most clicks on images, few on description
  - Exit survey: "Need more info about dimensions and fabric"

  Product B: Throw pillows (set of 4, $59)
  - 8,000 monthly visits, 4.2% conversion rate
  - Avg time on page: 6 seconds
  - Scroll depth: 60% see full page
  - Heatmap: Clicks concentrated on "Add to Cart" and color options
  - Exit survey: "Wanted to see more color combinations"

  Product C: Dining table ($799)
  - 3,000 monthly visits, 0.9% conversion rate
  - Avg time on page: 25 seconds
  - Scroll depth: 70% see full page
  - Heatmap: Heavy reading of description but no conversion
  - Exit survey: "Worried about assembly" and "Not sure about size"

  For each product:
  1. Analyze the data to diagnose the conversion problem
  2. Prioritize 3 description changes by expected impact
  3. Write the optimized description implementing all changes
  4. Define the A/B test to validate each change
  5. Project the conversion lift with confidence intervals

  Part 2: CRO playbook
  1. Create a product description CRO audit template (20 checkpoints)
  2. Map customer objections to description solutions
  3. Design the testing calendar (what to test each quarter)
  4. Build the measurement framework (KPIs, tools, reporting cadence)

  Part 3: Advanced techniques
  1. Personalized descriptions based on traffic source (Google vs
     social vs email)
  2. Dynamic content based on user behavior (returning vs new visitor)
  3. Price-anchoring techniques within descriptions
  4. Micro-copy optimization (button text, trust badges, urgency elements)

assertions:
  - type: llm_judge
    criteria: "Data analysis is correct — high time on page with low conversion (Product C) is diagnosed as information gap or trust issue, not engagement problem"
    weight: 0.30
    description: "Correct data-driven diagnosis"
  - type: llm_judge
    criteria: "Prioritization is impact-driven — changes are ordered by expected conversion lift with reasoning, not just listed randomly"
    weight: 0.25
    description: "Impact-driven prioritization"
  - type: llm_judge
    criteria: "A/B test designs are methodologically sound — define hypothesis, control, variant, success metric, sample size, and runtime for each test"
    weight: 0.25
    description: "Methodologically sound A/B tests"
  - type: llm_judge
    criteria: "Advanced techniques are practical — personalized and dynamic content recommendations include implementation guidance, not just theoretical concepts"
    weight: 0.20
    description: "Practical advanced techniques"
