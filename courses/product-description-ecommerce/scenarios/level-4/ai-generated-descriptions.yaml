meta:
  id: ai-generated-descriptions
  level: 4
  course: product-description-ecommerce
  type: output
  description: "Design AI-assisted workflows for generating product descriptions at scale with quality control"
  tags: [ecommerce, ai-generation, automation, quality-control, expert]

state: {}

trigger: |
  AI-generated product descriptions can increase conversion by 23.7%
  when properly trained and quality-controlled. But raw AI output often
  lacks brand voice, contains hallucinated specs, and sounds generic.
  The expert approach uses AI as a first draft with human refinement.

  Design an AI-assisted product description workflow for an e-commerce
  store with 2,000 products:

  Part 1: Prompt engineering for product descriptions
  Create AI prompts for generating descriptions in 4 categories:
  - Fashion apparel (needs fit, fabric, styling)
  - Electronics (needs specs translation, compatibility)
  - Food/beverage (needs sensory language, dietary info)
  - Home goods (needs dimension context, room visualization)

  For each category:
  1. Write the base system prompt that establishes brand voice and format
  2. Write 3 example input/output pairs (few-shot examples)
  3. Define the required input data fields (what the AI needs to write well)
  4. Write the quality control checklist for reviewing AI output
  5. Show a raw AI output vs the human-refined final version

  Part 2: Workflow design
  1. Map the end-to-end workflow: data input → AI generation → human
     review → publishing
  2. Define quality tiers: which products need full human rewrite vs
     light editing vs AI-only
  3. Create the editorial guidelines for AI description refinement
  4. Design the feedback loop: how human edits improve future AI output

  Part 3: Common AI description failures
  1. List 10 typical AI product description mistakes
  2. Show how to detect and fix each one
  3. Create guardrails to prevent hallucinated specs or false claims
  4. Address brand voice drift across thousands of AI-generated descriptions

  Then provide:
  - Cost-benefit analysis: AI-assisted vs fully human-written at scale
  - Quality metrics for AI-generated descriptions
  - How to train AI on your brand voice (fine-tuning vs prompt engineering)
  - Legal considerations for AI-generated product content

assertions:
  - type: llm_judge
    criteria: "Prompts are well-engineered — category-specific system prompts include brand voice guidelines, format requirements, and few-shot examples that produce usable first drafts"
    weight: 0.30
    description: "Well-engineered category prompts"
  - type: llm_judge
    criteria: "The workflow is practical and scalable — addresses real bottlenecks in generating 2,000+ descriptions with clear roles for AI and humans at each stage"
    weight: 0.25
    description: "Practical scalable workflow"
  - type: llm_judge
    criteria: "AI failure modes are accurately identified — covers hallucinated specifications, generic language, brand voice inconsistency, and over-promising claims"
    weight: 0.25
    description: "Accurately identified AI failures"
  - type: llm_judge
    criteria: "Quality control system is robust — includes automated checks (word count, keyword density, readability score) and human review criteria organized by priority"
    weight: 0.20
    description: "Robust quality control system"
