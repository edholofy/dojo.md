meta:
  id: target-audience-descriptions
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Tailor product descriptions to different buyer personas and audiences"
  tags: [ecommerce, target-audience, buyer-persona, personalization, basics]

state: {}

trigger: |
  The same product needs different descriptions for different buyers.
  A kitchen knife described for a home cook focuses on ease and safety;
  for a professional chef, it focuses on precision and durability. Matching
  description tone and emphasis to the buyer persona increases conversion
  by 25-40%.

  Write 3 different product descriptions for EACH product, tailored to
  3 distinct buyer personas:

  Product 1: Noise-canceling headphones ($299)
  Features: 30-hour battery, adaptive ANC, spatial audio, multipoint
  connection, premium comfort padding
  Personas:
  A) Remote worker (productivity-focused, values focus time)
  B) Audiophile (sound quality obsessed, compares specs)
  C) Frequent traveler (comfort on long flights, portability)

  Product 2: Cast iron skillet ($45)
  Features: Pre-seasoned, 12-inch, heat retention, oven-safe to 500°F,
  lifetime warranty
  Personas:
  A) Beginner home cook (intimidated by cast iron, wants easy)
  B) Experienced cook (knows cast iron, wants quality details)
  C) Gift buyer (looking for something special, needs convincing)

  For each persona description:
  1. Write 120-150 words tailored to that persona
  2. Highlight which features you emphasized and which you downplayed
  3. Explain the tone shift (technical vs emotional vs practical)
  4. Identify the #1 objection this persona has and address it

  Then provide:
  - A framework for identifying your product's buyer personas
  - How to write one description that works for multiple personas
  - When separate descriptions are worth the effort vs one universal version

assertions:
  - type: llm_judge
    criteria: "Persona descriptions are genuinely different — the remote worker description emphasizes focus and productivity while the audiophile version dives into sound specs and the traveler version highlights portability"
    weight: 0.30
    description: "Genuinely different persona descriptions"
  - type: llm_judge
    criteria: "Tone shifts are appropriate — technical language for the audiophile, reassuring language for the beginner cook, aspirational language for the gift buyer"
    weight: 0.25
    description: "Appropriate tone shifts"
  - type: llm_judge
    criteria: "Objection handling is specific — beginner cook worries about maintenance, audiophile questions whether ANC compromises sound quality, gift buyer needs social proof"
    weight: 0.25
    description: "Specific objection handling"
  - type: llm_judge
    criteria: "The persona framework is practical — provides concrete steps to identify buyer personas using reviews, search queries, and customer data, not just theoretical models"
    weight: 0.20
    description: "Practical persona framework"
