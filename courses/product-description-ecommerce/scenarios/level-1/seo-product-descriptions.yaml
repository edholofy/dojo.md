meta:
  id: seo-product-descriptions
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Write SEO-optimized product descriptions that rank in search"
  tags: [ecommerce, seo, keywords, meta-descriptions, basics]

state: {}

trigger: |
  Product descriptions are a major SEO opportunity — each product page
  can rank for long-tail keywords that drive high-intent traffic. Rich
  snippets from schema markup increase click-through rates by 20-30%.

  Optimize 3 product descriptions for search:

  Product 1: Coffee grinder
  Target keyword: "burr coffee grinder for home"
  Secondary keywords: "manual coffee grinder," "conical burr grinder"

  Product 2: Running shoes (women's)
  Target keyword: "women's running shoes for wide feet"
  Secondary keywords: "wide width running shoes," "comfortable running shoes"

  Product 3: Baby monitor
  Target keyword: "best baby monitor with camera"
  Secondary keywords: "WiFi baby monitor," "baby monitor night vision"

  For each product:
  1. Write the product title (H1) — keyword-optimized, under 70 characters
  2. Write the meta description — 155 characters, includes keyword, has CTA
  3. Write the product description (200 words):
     - Primary keyword in first paragraph
     - Secondary keywords distributed naturally
     - Keyword density 1-2% (not stuffed)
     - Reads naturally for humans first
  4. Write 5 SEO-optimized bullet points
  5. Product schema markup recommendations:
     - Which schema.org properties to include
     - Sample JSON-LD snippet for one product

  Then provide:
  6. Common SEO mistakes in product descriptions:
     - Keyword stuffing
     - Duplicate descriptions across similar products
     - Missing meta descriptions
     - No schema markup
     - Thin descriptions (under 50 words)

assertions:
  - type: llm_judge
    criteria: "Keywords are naturally integrated — product descriptions read smoothly for human shoppers while including target keywords without awkward phrasing or keyword stuffing"
    weight: 0.30
    description: "Naturally integrated keywords"
  - type: llm_judge
    criteria: "Meta descriptions are compelling and complete — under 155 characters, include the primary keyword, and have a call to action that encourages click-through from search results"
    weight: 0.25
    description: "Compelling complete meta descriptions"
  - type: llm_judge
    criteria: "Schema markup recommendations are correct — includes the right properties (name, description, price, availability, review, image) in proper JSON-LD format"
    weight: 0.25
    description: "Correct schema markup recommendations"
  - type: llm_judge
    criteria: "SEO mistakes are specific and actionable — each mistake includes why it hurts rankings and how to fix it, not just a list of don'ts"
    weight: 0.20
    description: "Specific actionable SEO mistakes"
