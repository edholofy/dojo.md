meta:
  id: social-proof-descriptions
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Integrate social proof into product descriptions to boost credibility and conversion"
  tags: [ecommerce, social-proof, reviews, trust, basics]

state: {}

trigger: |
  92% of consumers read reviews before purchasing. Products with social
  proof in their descriptions see up to 270% higher conversion rates.
  Social proof includes customer reviews, ratings, expert endorsements,
  usage statistics, and trust badges.

  Integrate social proof into product descriptions for 5 products:

  Product 1: Robot vacuum ($349)
  Available proof: 4.6/5 stars (12,400 reviews), "Best Budget Robot Vacuum"
  by Wirecutter, 2M+ units sold
  Customer quote: "I was skeptical but it actually gets under my couch
  perfectly. My floors have never been cleaner."

  Product 2: Protein powder ($39)
  Available proof: 4.8/5 stars (8,200 reviews), NSF Certified for Sport,
  used by 500+ college athletic programs
  Customer quote: "Finally a protein powder that doesn't taste like chalk.
  I use it every single morning."

  Product 3: Carry-on luggage ($225)
  Available proof: 4.7/5 stars (15,000 reviews), featured in Travel +
  Leisure "Best Carry-Ons 2025," 100-day trial
  Customer quote: "Survived 47 flights in one year. Still looks brand new."

  Product 4: Online course platform subscription ($29/mo)
  Available proof: 50,000+ active users, 4.5/5 on G2, "Leader" in
  Gartner Magic Quadrant, 94% customer retention
  Customer quote: "We doubled our course completion rates within 3 months."

  Product 5: Organic baby food ($6/pouch)
  Available proof: 4.9/5 stars (3,400 reviews), pediatrician recommended,
  USDA Organic certified, winner of Parents Magazine Best Baby Food 2025
  Customer quote: "My picky toddler devours this. It's the only brand
  she'll eat."

  For each product:
  1. Write a 150-word description that naturally weaves in social proof
  2. Identify which type of social proof is most powerful for this product
     and why
  3. Show where to place social proof for maximum impact (beginning,
     middle, or end of description)
  4. Write a version WITHOUT social proof for comparison

  Then provide:
  - 6 types of social proof ranked by effectiveness for e-commerce
  - How to use social proof without it feeling forced or fake
  - Legal considerations (FTC guidelines for testimonials and claims)

assertions:
  - type: llm_judge
    criteria: "Social proof is naturally woven in — reviews, stats, and endorsements feel like part of the narrative, not awkwardly inserted badges or disconnected quotes"
    weight: 0.30
    description: "Naturally woven social proof"
  - type: llm_judge
    criteria: "The right type of social proof matches each product — expert endorsement matters most for baby food (parent trust), usage stats matter for SaaS (peer validation), durability proof matters for luggage"
    weight: 0.25
    description: "Right social proof type per product"
  - type: llm_judge
    criteria: "Before/after comparison clearly shows impact — descriptions without social proof are noticeably less convincing, demonstrating the value of including proof points"
    weight: 0.25
    description: "Clear before-after impact"
  - type: llm_judge
    criteria: "Legal considerations are accurate — covers FTC requirements for testimonials, disclosure of material connections, substantiation of claims, and typical results disclaimers"
    weight: 0.20
    description: "Accurate legal considerations"
