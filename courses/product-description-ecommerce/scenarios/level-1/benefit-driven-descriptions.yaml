meta:
  id: benefit-driven-descriptions
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Transform feature lists into benefit-driven product descriptions"
  tags: [ecommerce, benefits, features, copywriting, basics]

state: {}

trigger: |
  72% of consumers say product descriptions influence their purchase
  decisions. But most product descriptions are just feature lists.
  Features tell WHAT a product is; benefits tell WHY someone should buy it.

  Formula: Feature → Advantage → Benefit (FAB)

  Transform these 5 product feature lists into benefit-driven descriptions:

  Product 1: Wireless Bluetooth headphones ($79)
  Features: 40-hour battery, active noise cancellation, 40mm drivers,
  Bluetooth 5.3, foldable design, built-in microphone

  Product 2: Organic cotton t-shirt ($35)
  Features: 100% GOTS-certified organic cotton, pre-shrunk, reinforced
  stitching, tag-free label, 6 colors available

  Product 3: Stainless steel water bottle ($28)
  Features: Double-wall vacuum insulation, 24oz capacity, BPA-free,
  leak-proof lid, wide mouth opening

  Product 4: Standing desk converter ($199)
  Features: Height adjustable (6"-17"), holds 35 lbs, gas spring lift,
  keyboard tray, cable management

  Product 5: Pet camera ($89)
  Features: 1080p HD video, 2-way audio, treat dispenser, night vision,
  motion alerts, WiFi connected

  For each product:
  1. Apply the FAB formula to each feature (feature → advantage → benefit)
  2. Write a 150-word benefit-driven description
  3. Write 5 bullet points (benefit-first, feature as proof)
  4. Identify the #1 emotional benefit (how does this product make
     the buyer FEEL?)

assertions:
  - type: llm_judge
    criteria: "Each FAB transformation correctly identifies real benefits — '40-hour battery' becomes about freedom from charging anxiety, not just 'long-lasting battery'"
    weight: 0.30
    description: "Correctly identified real benefits"
  - type: llm_judge
    criteria: "Product descriptions lead with benefits, not features — the first sentence of each description addresses what the buyer gains, with features as supporting proof"
    weight: 0.25
    description: "Benefit-leading descriptions"
  - type: llm_judge
    criteria: "Bullet points follow benefit-first format — each bullet starts with what the customer gets, followed by the feature that delivers it"
    weight: 0.25
    description: "Benefit-first bullet points"
  - type: llm_judge
    criteria: "Emotional benefits are specific to the target buyer — pet camera buyers feel peace of mind when away, standing desk buyers feel energized and productive"
    weight: 0.20
    description: "Buyer-specific emotional benefits"
