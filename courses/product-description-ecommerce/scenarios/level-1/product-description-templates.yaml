meta:
  id: product-description-templates
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Create reusable product description templates for different product categories"
  tags: [ecommerce, templates, frameworks, scalability, basics]

state: {}

trigger: |
  E-commerce stores with hundreds or thousands of products need reusable
  templates that maintain quality at scale. A good template provides
  structure and prompts while allowing each product to feel unique.

  Create product description templates for 5 different product categories:

  Category 1: Apparel (clothing and accessories)
  Example product: Women's cashmere sweater ($120)

  Category 2: Electronics (gadgets and devices)
  Example product: Wireless earbuds ($59)

  Category 3: Beauty and skincare
  Example product: Vitamin C serum ($38)

  Category 4: Home and kitchen
  Example product: Ceramic non-stick pan set ($85)

  Category 5: Food and beverage
  Example product: Artisan hot sauce variety pack ($24)

  For each category:
  1. Create a fill-in-the-blank template with:
     - Headline formula
     - Opening hook (1-2 sentences)
     - 5 bullet point slots with guidance
     - Closing/CTA line
  2. Show the template filled in with the example product
  3. Explain what's unique about this category's template and why
  4. List the must-include information for this category

  Then provide:
  - A universal template that works across ALL categories (with
    category-specific customization notes)
  - Tips for maintaining brand voice consistency across templates
  - How to scale: writing 100+ descriptions using templates without
    sounding repetitive

assertions:
  - type: llm_judge
    criteria: "Templates are category-specific — apparel templates include fit and fabric sections, electronics include specs tables, beauty includes ingredient highlights, food includes flavor profiles"
    weight: 0.30
    description: "Category-specific templates"
  - type: llm_judge
    criteria: "Filled-in examples demonstrate the template working — each example product description reads naturally, not like a mad-libs exercise"
    weight: 0.25
    description: "Natural filled-in examples"
  - type: llm_judge
    criteria: "The universal template is adaptable — provides a flexible framework with clear notes on where to customize for different categories"
    weight: 0.25
    description: "Adaptable universal template"
  - type: llm_judge
    criteria: "Scaling advice is practical — addresses real challenges like avoiding repetitive openings, varying sentence structure, and maintaining quality at volume"
    weight: 0.20
    description: "Practical scaling advice"
