meta:
  id: bullet-vs-paragraph
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Choose the right format — bullets vs paragraphs — for different product types"
  tags: [ecommerce, formatting, bullets, paragraphs, basics]

state: {}

trigger: |
  Bullet points increase product page scannability by 47%, but paragraphs
  build emotional connection and storytelling. The best descriptions use both
  strategically — bullets for specs and quick benefits, paragraphs for brand
  story and lifestyle appeal.

  Write product descriptions in BOTH formats for 4 products, then recommend
  which format works best for each:

  Product 1: USB-C charging cable ($12)
  Specs: 6ft length, 100W PD, braided nylon, 480Mbps data transfer,
  10,000+ bend tested

  Product 2: Handmade leather journal ($45)
  Details: Italian vegetable-tanned leather, 240 pages, acid-free paper,
  lay-flat binding, brass snap closure

  Product 3: Multivitamin supplement ($29/bottle)
  Details: 23 essential vitamins and minerals, 90-day supply, third-party
  tested, non-GMO, vegetarian capsules

  Product 4: Vintage-style wall clock ($55)
  Details: Distressed wood frame, Roman numerals, silent quartz movement,
  14-inch diameter, battery operated

  For each product:
  1. Write the bullet-point version (5-7 bullets, benefit-first)
  2. Write the paragraph version (100-120 words, narrative style)
  3. Write the hybrid version (short paragraph + bullets)
  4. Recommend which format is best and explain why

  Then provide:
  - A decision framework: when to use bullets, paragraphs, or hybrid
  - How product price affects format choice
  - How the buyer's journey stage affects format

assertions:
  - type: llm_judge
    criteria: "All three formats are genuinely different for each product — bullets are scannable and quick, paragraphs tell a story, and hybrids combine both approaches meaningfully"
    weight: 0.25
    description: "Genuinely different formats"
  - type: llm_judge
    criteria: "Format recommendations match the product type — commodity items like cables favor bullets while artisan items like leather journals benefit from paragraph storytelling"
    weight: 0.30
    description: "Correct format recommendations"
  - type: llm_judge
    criteria: "The decision framework is practical — provides clear criteria (price point, product complexity, emotional vs rational purchase) for choosing between formats"
    weight: 0.25
    description: "Practical decision framework"
  - type: llm_judge
    criteria: "Buyer journey connection is logical — awareness stage needs more storytelling while decision stage needs quick-scan specs and social proof"
    weight: 0.20
    description: "Logical buyer journey connection"
