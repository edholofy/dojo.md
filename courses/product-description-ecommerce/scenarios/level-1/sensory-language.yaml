meta:
  id: sensory-language
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Use sensory language to make product descriptions tangible and vivid"
  tags: [ecommerce, sensory-language, vivid-writing, engagement, basics]

state: {}

trigger: |
  Online shoppers can't touch, smell, taste, or try products. Sensory
  language bridges this gap by helping customers imagine the experience
  of owning and using the product. Descriptions with sensory words
  increase conversion by 19%.

  Write sensory-rich descriptions for 5 products across different senses:

  1. Cashmere scarf ($89) — Focus on TOUCH
     - How does it feel? (softness, weight, warmth)
     - Write 100 words that make the reader feel the fabric

  2. Artisan coffee beans ($22/bag) — Focus on TASTE and SMELL
     - Flavor profile, aroma, origin story
     - Write 100 words that make the reader crave a cup

  3. Bluetooth speaker ($65) — Focus on SOUND
     - Audio quality, bass depth, clarity
     - Write 100 words that make the reader hear the music

  4. Scented candle ($32) — Focus on SMELL and SIGHT
     - Fragrance notes, flame ambiance, room transformation
     - Write 100 words that make the reader imagine the atmosphere

  5. Ergonomic office chair ($450) — Focus on COMFORT (multi-sensory)
     - How does sitting feel after 1 hour? 4 hours? 8 hours?
     - Write 100 words about the physical experience

  For each:
  - Highlight the sensory words used (bold or annotate)
  - Show a "before" version without sensory language
  - Explain why sensory descriptions work for online shopping

  Then provide:
  - A sensory word bank organized by sense (touch, taste, smell,
    sound, sight)
  - 20 power words for product descriptions
  - When sensory language is inappropriate (technical products, B2B)

assertions:
  - type: llm_judge
    criteria: "Sensory words create vivid mental images — the cashmere description makes the reader imagine the texture, the coffee description evokes flavor, and each product engages the targeted sense"
    weight: 0.30
    description: "Vivid sensory mental images"
  - type: llm_judge
    criteria: "Before/after comparisons clearly show the impact — the 'before' versions are flat and generic while the sensory versions are engaging and immersive"
    weight: 0.25
    description: "Clear before-after impact"
  - type: llm_judge
    criteria: "The sensory word bank is organized and useful — categorized by sense with words that could be applied to multiple product categories"
    weight: 0.25
    description: "Organized useful sensory word bank"
  - type: llm_judge
    criteria: "Limitations are addressed — correctly identifies that technical products and B2B purchases require more rational language, with guidelines for when to dial back sensory copy"
    weight: 0.20
    description: "Addressed sensory language limitations"
