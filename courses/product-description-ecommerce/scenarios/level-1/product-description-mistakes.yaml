meta:
  id: product-description-mistakes
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Identify and fix common product description mistakes that kill sales"
  tags: [ecommerce, mistakes, diagnosis, fixes, basics]

state: {}

trigger: |
  Most product descriptions make the same mistakes — generic copy,
  feature-only language, missing details, and poor formatting. These
  mistakes cost e-commerce stores thousands in lost revenue.

  Here are 5 real product descriptions with common mistakes. Identify
  every problem and write the fixed version:

  Description 1 (Kitchen knife set):
  "This is a great knife set. It includes 5 knives. Very sharp. Made of
  stainless steel. Good for cooking. Buy now!"

  Description 2 (Moisturizer):
  "Our revolutionary quantum-infused dermatological hydration complex
  utilizes proprietary nano-technology to deliver unprecedented moisture
  at the cellular level. Patent-pending formula."

  Description 3 (Laptop backpack):
  "Laptop backpack. Fits 15 inch laptops. Has pockets. Waterproof.
  Black and grey. Padded straps."

  Description 4 (Candle):
  "This candle smells amazing! Everyone loves it! It's the best candle
  you'll ever buy! Perfect for any room! Makes a great gift!"

  Description 5 (Dog food):
  "Premium dog food made with natural ingredients. Contains chicken,
  rice, and vegetables. Good for dogs of all ages and sizes. Free
  shipping available."

  For each description:
  1. Identify all mistakes (list each specific problem)
  2. Categorize: too vague, too technical, too generic, too hyperbolic,
     or too thin
  3. Write the improved version (150-200 words)
  4. Explain each specific improvement you made

  Then provide a "Product Description Mistakes Checklist" — 10 items
  to check before publishing any product description.

assertions:
  - type: llm_judge
    criteria: "Each diagnosis is specific — identifies the exact problem (not just 'bad copy' but 'too vague — doesn't mention knife types, blade material quality, or use cases')"
    weight: 0.25
    description: "Specific problem diagnosis"
  - type: llm_judge
    criteria: "Fixed descriptions are dramatically better — each rewrite addresses every identified problem with specific benefits, sensory details, and concrete information"
    weight: 0.30
    description: "Dramatically improved rewrites"
  - type: llm_judge
    criteria: "The jargon-heavy description (moisturizer) is correctly simplified — translates 'quantum-infused dermatological hydration complex' into clear language while maintaining credibility"
    weight: 0.25
    description: "Correctly simplified jargon"
  - type: llm_judge
    criteria: "The checklist is practical and comprehensive — covers specificity, benefits, sensory language, SEO, formatting, proof points, and buyer persona alignment"
    weight: 0.20
    description: "Practical comprehensive checklist"
