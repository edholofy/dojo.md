meta:
  id: product-title-optimization
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Write optimized product titles that improve search visibility and click-through"
  tags: [ecommerce, product-titles, seo, click-through, basics]

state: {}

trigger: |
  Product titles are the first thing shoppers see in search results and
  category pages. A well-structured title includes the brand, product type,
  key differentiator, and relevant attributes — all within 60-80 characters
  for full display on most platforms.

  Optimize the product titles for 6 products across different platforms:

  Product 1: A pair of men's running shoes by Nike, model Pegasus 41,
  in blue/white, size range 7-14
  Platforms: Amazon, Google Shopping, Shopify store

  Product 2: An organic face moisturizer by a small brand called "Glow
  Botanics," 2oz jar, for dry skin
  Platforms: Amazon, Etsy, brand's own website

  Product 3: A 65-inch 4K smart TV by Samsung, model QN65Q80C, QLED
  Platforms: Best Buy listing, Amazon, Google Shopping

  Product 4: A set of 12 colored pencils, artist grade, by Prismacolor
  Platforms: Amazon, Michaels, brand's own website

  For each product:
  1. Write the title optimized for each specified platform
  2. Explain why titles differ across platforms (character limits,
     search behavior, competition)
  3. Identify the essential vs optional elements in each title
  4. Show a bad title example and explain why it fails

  Then provide:
  - Product title formula: [Brand] + [Product Type] + [Key Feature] +
    [Size/Variant] — with variations by category
  - Platform-specific title guidelines (Amazon, Shopify, Google Shopping,
    Etsy, eBay)
  - 10 common product title mistakes

assertions:
  - type: llm_judge
    criteria: "Titles are genuinely optimized per platform — Amazon titles are keyword-rich and longer, Shopify titles are brand-focused and cleaner, Google Shopping titles include key attributes for structured data"
    weight: 0.30
    description: "Platform-specific title optimization"
  - type: llm_judge
    criteria: "The title formula is clear and adaptable — provides a template that works across product categories with specific examples of how to apply it"
    weight: 0.25
    description: "Clear adaptable title formula"
  - type: llm_judge
    criteria: "Bad title examples illustrate specific problems — keyword stuffing, missing brand, vague descriptions, or wrong attribute order — with clear explanations"
    weight: 0.25
    description: "Illustrative bad title examples"
  - type: llm_judge
    criteria: "Platform guidelines reflect real differences — Amazon allows 200 characters, Etsy titles affect search ranking differently, Google Shopping has structured requirements"
    weight: 0.20
    description: "Accurate platform guidelines"
