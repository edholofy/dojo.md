meta:
  id: product-description-structure
  level: 1
  course: product-description-ecommerce
  type: output
  description: "Structure product descriptions for maximum readability and conversion"
  tags: [ecommerce, structure, formatting, readability, basics]

state: {}

trigger: |
  The structure of a product description determines whether shoppers read
  it or bounce. Average time on a product page is 8-12 seconds — your
  description must work for both scanners and readers.

  Write product descriptions in 3 different structures for the same product:

  Product: Premium yoga mat ($68)
  Details: 6mm thick, natural rubber, non-slip surface, alignment markers,
  carrying strap included, available in 5 colors, eco-friendly materials,
  sweat-resistant, dimensions 72" x 26"

  Structure 1: Scannable bullet format
  - Short headline
  - 5-7 bullet points (benefit-first)
  - Quick-view specs table
  - Best for: quick-decision shoppers

  Structure 2: Story + specs format
  - Engaging opening paragraph (2-3 sentences)
  - 3-4 benefit sections with mini-headlines
  - Separate specs section
  - Best for: detail-oriented shoppers

  Structure 3: Hybrid format (best practice)
  - Short benefit paragraph (the hook)
  - Scannable bullet points (key benefits)
  - Detailed paragraph (the story)
  - Specs table (the details)
  - Best for: mixed audiences

  For each structure:
  1. Write the complete description
  2. Explain when this structure works best (product type, audience, price)
  3. Mobile vs desktop: how each structure renders

  Then provide:
  4. A word count guide:
     - When to write short (under 100 words)
     - When to write medium (150-300 words)
     - When to write long (300+ words)
     - How product price correlates with description length

assertions:
  - type: llm_judge
    criteria: "All 3 structures are complete and distinct — each is a fully written description, not just an outline, and each offers a genuinely different reading experience"
    weight: 0.25
    description: "Complete distinct structures"
  - type: llm_judge
    criteria: "The hybrid format is correctly identified as the best practice — combines scannability for quick shoppers with depth for detailed readers"
    weight: 0.25
    description: "Correct hybrid best practice"
  - type: llm_judge
    criteria: "The word count guide correlates with product complexity and price — a $10 item needs less copy than a $200 item, with specific examples"
    weight: 0.25
    description: "Price-correlated word count guide"
  - type: llm_judge
    criteria: "Mobile considerations are practical — addresses how bullet formats render better on mobile while long paragraphs become walls of text on small screens"
    weight: 0.25
    description: "Practical mobile considerations"
