meta:
  id: food-beverage-descriptions
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Write food and beverage product descriptions that trigger cravings and build trust"
  tags: [ecommerce, food, beverage, sensory, intermediate]

state: {}

trigger: |
  Food and beverage e-commerce is uniquely challenging — shoppers can't
  taste or smell before buying. Descriptions must create flavor anticipation
  while addressing ingredient transparency, dietary needs, and freshness
  concerns. The food category also has strict labeling requirements.

  Write product descriptions for 5 food and beverage products:

  Product 1: Single-origin Ethiopian coffee beans ($19/12oz)
  Details: Yirgacheffe region, light roast, natural process, notes of
  blueberry, jasmine, and dark chocolate, altitude 1,900-2,200m,
  small-batch roasted weekly

  Product 2: Artisan hot sauce variety pack ($32, 4 bottles)
  Details: Habanero mango, smoky chipotle, garlic ghost pepper, and
  Carolina reaper. Scoville range: 15,000-100,000. Small-batch,
  all-natural ingredients, no preservatives

  Product 3: Organic protein bars (box of 12, $36)
  Details: 20g plant protein, 5g sugar, gluten-free, vegan, non-GMO,
  flavors: chocolate peanut butter, vanilla almond, mixed berry
  Certifications: USDA Organic, Certified B Corp, Rainforest Alliance

  Product 4: Premium olive oil ($28/500ml)
  Details: Extra virgin, single-estate Tuscan, cold-pressed within 4 hours
  of harvest, polyphenol content 450mg/kg, 2024 harvest, protected
  designation of origin (PDO)

  Product 5: Craft beer variety pack ($24, 12 cans)
  Details: IPA (6.5% ABV), Hazy IPA (7.2%), Pilsner (4.8%), Stout (8.1%).
  Brewed in Portland, OR. All-natural ingredients, unfiltered,
  no artificial flavors

  For each product:
  1. Write 150-200 words that make the reader taste/smell/crave the product
  2. Include origin story or sourcing narrative
  3. Address dietary and allergen information naturally (not as a footnote)
  4. Write the sensory flavor profile description
  5. Include a "Pairs well with" or "Best served" section

  Then provide:
  - Food description sensory vocabulary organized by taste profile
    (sweet, savory, bitter, umami, sour, spicy)
  - How to describe taste to someone who hasn't tried it (analogy method)
  - FDA labeling requirements for online food descriptions
  - How origin stories increase perceived value (and justify premium pricing)

assertions:
  - type: llm_judge
    criteria: "Flavor descriptions create cravings — the coffee description makes the reader imagine the aroma, the hot sauce descriptions convey heat levels vividly"
    weight: 0.30
    description: "Craving-inducing flavor descriptions"
  - type: llm_judge
    criteria: "Origin stories add value — each product's sourcing narrative justifies its price point and differentiates it from commodity alternatives"
    weight: 0.25
    description: "Value-adding origin stories"
  - type: llm_judge
    criteria: "Dietary information is naturally integrated — allergies, certifications, and dietary labels are woven into the description rather than listed as separate disclaimers"
    weight: 0.25
    description: "Naturally integrated dietary info"
  - type: llm_judge
    criteria: "Sensory vocabulary is rich and specific — uses precise flavor terms like 'bright acidity' and 'smoky undertones' rather than generic words like 'delicious' and 'tasty'"
    weight: 0.20
    description: "Rich specific sensory vocabulary"
