meta:
  id: emotional-vs-rational-copy
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Balance emotional and rational appeals in product descriptions based on product type"
  tags: [ecommerce, emotional-copy, rational-copy, psychology, intermediate]

state: {}

trigger: |
  Purchases are driven by both emotion and logic — but the ratio shifts
  depending on product type, price, and buyer context. Luxury items
  need 80% emotional copy; commodity items need 80% rational copy.
  Understanding this balance is crucial for conversion.

  Write product descriptions at different emotional-rational ratios:

  Scenario 1: HIGH EMOTIONAL (80/20 emotional-rational)
  Product: Engagement ring ($3,500)
  Features: 1-carat lab-grown diamond, platinum setting, VS1 clarity,
  F color grade, ethically sourced, lifetime warranty
  Task: Write a description that makes the buyer feel the moment

  Scenario 2: HIGH RATIONAL (20/80 emotional-rational)
  Product: Printer toner cartridge ($45)
  Features: Compatible with HP LaserJet Pro series, 3,000 page yield,
  ISO certified, chip included, 2-year shelf life
  Task: Write a description that provides all needed specs efficiently

  Scenario 3: BALANCED (50/50)
  Product: Standing desk ($599)
  Features: Electric dual motor, 48x30 inch surface, adjustable 25-51
  inches, 350 lb capacity, 4 memory presets, cable management tray
  Task: Write a description that motivates AND informs equally

  Scenario 4: EMOTIONAL with RATIONAL proof
  Product: Luxury candle ($72)
  Features: Hand-poured soy wax, 80-hour burn time, Limoges porcelain
  vessel, perfumer-crafted fragrance, reusable container
  Task: Emotional hook with specs that justify the premium price

  Scenario 5: RATIONAL with EMOTIONAL close
  Product: Home security system ($299)
  Features: 8 sensors, 1080p cameras, professional monitoring ($20/mo),
  cellular backup, 24/7 support, smart home integration
  Task: Specs-first description that closes with peace-of-mind appeal

  For each scenario:
  1. Write 150-200 words at the specified ratio
  2. Label which sentences are emotional and which are rational
  3. Explain why this ratio works for this product category
  4. Show what happens when the ratio is wrong (too emotional for toner,
     too rational for engagement ring)

  Then provide:
  - Product category guide: recommended emotional-rational ratios
  - Emotional trigger words for e-commerce (organized by emotion: joy,
    fear, belonging, pride, comfort)
  - How price point shifts the ratio (under $20, $20-100, $100-500, $500+)
  - When to break the rules: rational products that benefit from emotion

assertions:
  - type: llm_judge
    criteria: "Emotional-rational ratios are correctly applied — the engagement ring description evokes love and anticipation while the toner description is efficiently informational"
    weight: 0.30
    description: "Correctly applied emotional-rational ratios"
  - type: llm_judge
    criteria: "The 'wrong ratio' examples clearly demonstrate the problem — an overly emotional toner description feels absurd while an overly rational engagement ring description feels cold"
    weight: 0.25
    description: "Clear wrong-ratio demonstrations"
  - type: llm_judge
    criteria: "The category guide provides specific ratios — not just 'more emotional' but actual percentages with product examples for each range"
    weight: 0.25
    description: "Specific category ratio guide"
  - type: llm_judge
    criteria: "Emotional trigger words are organized and practical — grouped by emotion with specific examples of how to use them in product descriptions"
    weight: 0.20
    description: "Organized practical trigger words"
