meta:
  id: product-comparison-copy
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Write product comparison copy that helps shoppers choose without disparaging competitors"
  tags: [ecommerce, comparison, competitive, positioning, intermediate]

state: {}

trigger: |
  62% of shoppers compare at least 2-3 products before purchasing.
  Smart product descriptions anticipate comparison shopping by
  highlighting differentiators and addressing "Why this one?" without
  mentioning competitors by name.

  Write comparison-aware product descriptions for 4 products in
  competitive categories:

  Product 1: Robot vacuum ($399) — competing against iRobot, Roborock
  Your advantages: Self-emptying base, LiDAR mapping, 5,000Pa suction,
  60-day dustbin capacity
  Competitor weaknesses to leverage (without naming): Most require
  frequent emptying, many use bump-navigation, lower suction

  Product 2: Project management tool ($12/user/month) — competing against
  Asana, Monday, ClickUp
  Your advantages: Built-in time tracking, unlimited storage, native
  Gantt charts, no per-feature pricing tiers
  Competitor weaknesses: Feature gating, storage limits, add-on pricing

  Product 3: Electric toothbrush ($90) — competing against Oral-B, Philips
  Your advantages: 90-day battery (vs 14-day industry average), $6
  replacement heads (vs $8-12), pressure sensor with haptic feedback
  Competitor weaknesses: Short battery life, expensive heads, basic alerts

  Product 4: Meal kit delivery ($9/serving) — competing against HelloFresh,
  Blue Apron
  Your advantages: Organic ingredients, 20-minute max prep time, dietary
  customization (keto, vegan, paleo), skip/cancel anytime
  Competitor weaknesses: Long prep times, limited dietary options, rigid plans

  For each product:
  1. Write a 150-word description that positions against competitors
     WITHOUT naming them
  2. Write 5 "Why choose us" bullet points
  3. Create a comparison table structure (Your Product vs "Others" or
     "Typical [Category]")
  4. Write the objection handler: "But isn't [competitor type] better?"
  5. Identify the #1 differentiator and how to make it the hero

  Then provide:
  - Ethical comparison copy: what you can and cannot claim
  - How to position against market leaders without naming them
  - Comparison table design best practices
  - When to acknowledge competitors vs ignore them

assertions:
  - type: llm_judge
    criteria: "Competitive positioning is strong without naming competitors — uses phrases like 'unlike typical robot vacuums' or 'while most project management tools' to draw contrasts"
    weight: 0.30
    description: "Strong unnamed competitive positioning"
  - type: llm_judge
    criteria: "Differentiators are highlighted as benefits — '90-day battery' becomes 'pack once for a 3-month trip' rather than just a spec comparison"
    weight: 0.25
    description: "Differentiators as benefits"
  - type: llm_judge
    criteria: "Comparison tables are fair and effective — structure makes the product's advantages clear without using misleading or cherry-picked comparisons"
    weight: 0.25
    description: "Fair effective comparison tables"
  - type: llm_judge
    criteria: "Ethical guidelines are clear — covers FTC comparative advertising rules, substantiation requirements, and the line between positioning and disparagement"
    weight: 0.20
    description: "Clear ethical comparison guidelines"
