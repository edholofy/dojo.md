meta:
  id: cross-selling-upselling-copy
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Write cross-selling and upselling copy within product descriptions to increase AOV"
  tags: [ecommerce, cross-selling, upselling, aov, intermediate]

state: {}

trigger: |
  Cross-selling increases average order value by 20-42%. The best
  product descriptions naturally suggest complementary products and
  premium upgrades without feeling pushy. The key is making the
  suggestion feel helpful, not salesy.

  Write product descriptions with integrated cross-sell and upsell
  opportunities for 5 products:

  Product 1: DSLR camera body ($1,499)
  Upsell: Camera + lens kit ($1,899 — saves $200 vs buying separately)
  Cross-sells: Camera bag ($79), extra battery ($49), SD card ($35),
  lens cleaning kit ($22)

  Product 2: Running shoes ($130)
  Upsell: Premium version with carbon plate ($200)
  Cross-sells: Running socks ($16), insoles ($35), shoe cleaning kit ($15),
  sports watch ($299)

  Product 3: Espresso machine ($350)
  Upsell: Espresso machine + grinder bundle ($499 — grinder worth $199)
  Cross-sells: Coffee beans ($18), tamper ($25), milk frother ($45),
  descaling solution ($12)

  Product 4: King-size duvet ($120)
  Upsell: Duvet + 2 pillows bundle ($165 — save $35)
  Cross-sells: Duvet cover ($80), pillow protectors ($25), mattress
  topper ($95), sheet set ($65)

  Product 5: Wireless speaker ($65)
  Upsell: Stereo pair bundle ($115 — save $15)
  Cross-sells: Travel case ($20), charging dock ($25), aux cable ($10)

  For each product:
  1. Write the main product description (150 words)
  2. Write the upsell section ("Upgrade your experience")
  3. Write 3 cross-sell product suggestions with micro-descriptions
  4. Explain the psychology behind each suggestion (why it works)
  5. Write the bundle value proposition (savings framing)

  Then provide:
  - Cross-sell copy formulas: "Customers also bought," "Complete your setup,"
    "Pairs perfectly with"
  - When cross-selling helps vs annoys (the fine line)
  - How to frame bundles: savings percentage vs dollar amount vs value adds
  - Average order value impact by cross-sell strategy

assertions:
  - type: llm_judge
    criteria: "Cross-sell suggestions feel natural and helpful — they're genuinely useful companion products, not random inventory pushed for revenue"
    weight: 0.30
    description: "Natural helpful cross-sell suggestions"
  - type: llm_judge
    criteria: "Upsell framing emphasizes value — focuses on what the customer gains with the upgrade rather than just the price difference"
    weight: 0.25
    description: "Value-focused upsell framing"
  - type: llm_judge
    criteria: "Bundle savings are framed compellingly — uses the most persuasive framing for each scenario (percentage for smaller items, dollar amount for larger)"
    weight: 0.25
    description: "Compelling bundle savings framing"
  - type: llm_judge
    criteria: "The fine line between helpful and pushy is clearly addressed — provides guidelines for number of suggestions, placement, and tone"
    weight: 0.20
    description: "Clear helpful vs pushy guidelines"
