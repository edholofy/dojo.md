meta:
  id: mobile-product-descriptions
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Optimize product descriptions for mobile-first shopping experiences"
  tags: [ecommerce, mobile, responsive, ux-writing, intermediate]

state: {}

trigger: |
  60-70% of e-commerce traffic comes from mobile devices, but mobile
  conversion rates are 40-51% lower than desktop. Product descriptions
  must be optimized for small screens — shorter paragraphs, scannable
  format, front-loaded benefits, and thumb-friendly layouts.

  Optimize product descriptions for mobile for 4 products:

  Product 1: Wireless earbuds ($79)
  Current desktop description (280 words): Long paragraphs about sound
  quality, battery life, comfort, Bluetooth range, water resistance,
  charging case capacity, noise cancellation modes, and app features.

  Product 2: Yoga pants ($55)
  Current desktop description (220 words): Detailed fabric composition,
  fit guide, care instructions, size chart, and lifestyle imagery.

  Product 3: Electric toothbrush ($89)
  Current desktop description (300 words): Technical specs, brushing modes,
  clinical studies, replacement head info, battery life, and app integration.

  Product 4: Meal prep containers (set of 10, $25)
  Current desktop description (200 words): Material details, microwave/
  dishwasher safety, portion sizes, stacking, leak-proof claims.

  For each product:
  1. Write the mobile-optimized version (under 100 words visible
     above the fold)
  2. Structure the "Read more" expandable content
  3. Write the mobile bullet points (max 5, each under 10 words)
  4. Design the information hierarchy — what shows first, second, third
  5. Compare the mobile vs desktop reading experience

  Then provide:
  - Mobile product page anatomy: what goes where on a phone screen
  - Character count guidelines for mobile product descriptions
  - How to use progressive disclosure (show less, reveal more)
  - Thumb zone optimization: placing key info where thumbs naturally rest
  - Mobile description testing checklist (8 items)

assertions:
  - type: llm_judge
    criteria: "Mobile descriptions are genuinely shorter and punchier — under 100 words above the fold with the most compelling benefit and CTA immediately visible"
    weight: 0.30
    description: "Genuinely shorter mobile descriptions"
  - type: llm_judge
    criteria: "Information hierarchy prioritizes correctly — price, key benefit, and star rating appear first; detailed specs are in expandable sections"
    weight: 0.25
    description: "Correct information hierarchy"
  - type: llm_judge
    criteria: "Progressive disclosure is well-designed — the 'Read more' content is organized so that each expansion reveals the next most important information"
    weight: 0.25
    description: "Well-designed progressive disclosure"
  - type: llm_judge
    criteria: "Mobile testing checklist is practical — covers readability on 375px screens, tap target sizes, load time impact, and font size minimums"
    weight: 0.20
    description: "Practical mobile testing checklist"
