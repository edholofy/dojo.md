meta:
  id: beauty-skincare-descriptions
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Write beauty and skincare product descriptions that educate, build trust, and convert"
  tags: [ecommerce, beauty, skincare, ingredients, intermediate]

state: {}

trigger: |
  Beauty shoppers are increasingly ingredient-savvy — 73% research
  ingredients before buying skincare. Product descriptions must balance
  scientific credibility with accessible language, and address both
  skin concerns and ingredient transparency.

  Write product descriptions for 5 beauty/skincare products:

  Product 1: Retinol night serum ($52)
  Key ingredients: 0.5% encapsulated retinol, hyaluronic acid, vitamin E,
  squalane
  Claims: Reduces fine lines in 4 weeks (clinical study, 87 participants),
  dermatologist tested, fragrance-free, suitable for sensitive skin

  Product 2: Matte liquid lipstick ($24)
  Features: 12-hour wear, transfer-proof, hydrating formula with hyaluronic
  acid, 32 shades, vegan, cruelty-free, precision applicator

  Product 3: Hair repair mask ($38)
  Key ingredients: Keratin complex, argan oil, biotin, silk amino acids
  Claims: Repairs 2 years of damage in 3 uses (lab tested), color-safe,
  sulfate-free, suitable for all hair types

  Product 4: SPF 50 mineral sunscreen ($28)
  Key ingredients: Zinc oxide 20%, vitamin C, green tea extract
  Claims: Reef-safe, no white cast on all skin tones, sweat-resistant
  80 minutes, non-comedogenic, pediatrician approved

  Product 5: Exfoliating toner ($30)
  Key ingredients: 7% glycolic acid, 2% salicylic acid, niacinamide,
  aloe vera
  Claims: Visible pore reduction in 2 weeks, pH-balanced (3.5-4),
  alcohol-free, suitable for combination to oily skin

  For each product:
  1. Write 150-200 words that balance science with accessibility
  2. Explain how to present clinical claims compellingly without overpromising
  3. Write an ingredient spotlight section (hero ingredients and why they work)
  4. Address the top concern for this product type (irritation for retinol,
     transfer for lipstick, damage for hair mask, white cast for sunscreen,
     sensitivity for acids)
  5. Include a "How to Use" section that reinforces the product value

  Then provide:
  - Clean beauty claims: what you can and cannot say (FDA/FTC guidelines)
  - How to describe ingredients without a chemistry degree
  - The trust hierarchy: clinical studies > dermatologist tested > customer
    reviews > brand claims

assertions:
  - type: llm_judge
    criteria: "Scientific claims are presented credibly — clinical study references include participant counts and timeframes, not just vague 'clinically proven' language"
    weight: 0.30
    description: "Credible scientific claims"
  - type: llm_judge
    criteria: "Ingredient descriptions are accessible — explains what retinol, glycolic acid, and squalane actually do for skin in plain language without dumbing down"
    weight: 0.25
    description: "Accessible ingredient descriptions"
  - type: llm_judge
    criteria: "Product concerns are proactively addressed — retinol description addresses irritation and purging period, sunscreen addresses white cast on darker skin tones"
    weight: 0.25
    description: "Proactively addressed concerns"
  - type: llm_judge
    criteria: "Regulatory guidelines are accurate — correctly distinguishes between cosmetic claims and drug claims, covers FDA labeling requirements for SPF products"
    weight: 0.20
    description: "Accurate regulatory guidelines"
