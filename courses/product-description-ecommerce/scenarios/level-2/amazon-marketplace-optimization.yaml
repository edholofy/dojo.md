meta:
  id: amazon-marketplace-optimization
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Optimize product descriptions specifically for Amazon's A9 algorithm and marketplace format"
  tags: [ecommerce, amazon, marketplace, a9-algorithm, intermediate]

state: {}

trigger: |
  Amazon accounts for 38% of US e-commerce. Its A9 search algorithm
  prioritizes keyword relevance, conversion rate, and listing quality.
  Amazon descriptions have strict formatting rules and character limits
  that differ from standalone stores.

  Optimize product listings for Amazon for 4 products:

  Product 1: Stainless steel insulated tumbler ($24)
  Features: 30oz, triple-wall vacuum insulation, keeps drinks cold 24hr/hot
  12hr, BPA-free, splash-proof lid, fits cup holders, dishwasher safe
  Target keywords: "insulated tumbler 30oz," "stainless steel water tumbler"

  Product 2: Wireless charging pad ($18)
  Features: 15W fast charging, Qi-certified, compatible with iPhone 15/14/13
  and Samsung Galaxy S24/S23, LED indicator, non-slip surface, USB-C input
  Target keywords: "wireless charger fast charging," "Qi wireless charging pad"

  Product 3: Memory foam pillow ($45)
  Features: Gel-infused cooling foam, adjustable loft (removable foam),
  bamboo-derived rayon cover, CertiPUR-US certified, hypoallergenic,
  standard/queen size, 3-year warranty
  Target keywords: "cooling memory foam pillow," "adjustable loft pillow"

  Product 4: Resistance bands set ($22)
  Features: 5 bands (10-50 lbs), natural latex, door anchor, ankle straps,
  carrying bag, exercise guide included, lifetime warranty
  Target keywords: "resistance bands set with handles," "workout bands"

  For each product:
  1. Write the Amazon title (under 200 characters, keyword-optimized)
  2. Write 5 Amazon bullet points (each under 500 characters, benefit-led)
  3. Write the A+ Content description (use enhanced brand content format)
  4. Identify backend search terms (keywords NOT in the listing)
  5. Show what NOT to do: Amazon listing policy violations to avoid

  Then provide:
  - Amazon A9 algorithm ranking factors explained for copywriters
  - Amazon bullet point formula: [BENEFIT IN CAPS] — supporting detail
  - A+ Content vs basic description: when each matters
  - Amazon listing optimization checklist (10 items)

assertions:
  - type: llm_judge
    criteria: "Amazon titles follow platform conventions — include brand, product type, key feature, size/quantity, and target keyword within 200 characters without keyword stuffing"
    weight: 0.25
    description: "Platform-correct Amazon titles"
  - type: llm_judge
    criteria: "Bullet points follow Amazon's benefit-first format — each starts with a capitalized benefit statement followed by supporting details and relevant keywords"
    weight: 0.30
    description: "Amazon-format bullet points"
  - type: llm_judge
    criteria: "Backend search terms are strategic — includes synonyms, misspellings, and related terms NOT already in the visible listing to maximize search coverage"
    weight: 0.25
    description: "Strategic backend search terms"
  - type: llm_judge
    criteria: "Policy violations are accurately identified — covers prohibited claims, restricted words, competitor name usage, and HTML/special character restrictions"
    weight: 0.20
    description: "Accurate policy violation warnings"
