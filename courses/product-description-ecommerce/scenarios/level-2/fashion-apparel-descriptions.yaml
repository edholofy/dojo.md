meta:
  id: fashion-apparel-descriptions
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions for fashion and apparel that reduce returns and increase conversion"
  tags: [ecommerce, fashion, apparel, category-specific, intermediate]

state: {}

trigger: |
  Fashion has the highest e-commerce return rate (30-40%), largely driven
  by poor product descriptions that don't convey fit, fabric, and styling.
  Great fashion descriptions reduce returns while increasing add-to-cart
  rates by addressing the "Will this look good on me?" question.

  Write product descriptions for 5 fashion items:

  Product 1: Women's midi wrap dress ($78)
  Details: Viscose fabric, adjustable wrap tie, V-neckline, flutter sleeves,
  available in 4 prints, machine washable, runs true to size
  Size range: XS-3XL

  Product 2: Men's slim-fit chinos ($55)
  Details: 98% cotton/2% elastane, mid-rise, tapered leg, 4 colors,
  wrinkle-resistant, zip fly, side and back pockets
  Size range: 28-40 waist

  Product 3: Leather ankle boots ($165)
  Details: Full-grain leather, 2-inch block heel, side zip, cushioned
  insole, rubber outsole, runs half-size large
  Size range: 5-12

  Product 4: Oversized cashmere hoodie ($195)
  Details: 100% Grade-A Mongolian cashmere, relaxed fit, kangaroo pocket,
  ribbed cuffs and hem, dry clean recommended
  Size range: XS-XL (intentionally oversized)

  Product 5: Athletic leggings ($42)
  Details: 4-way stretch fabric, high-rise waistband, hidden pocket,
  squat-proof, moisture-wicking, flatlock seams
  Size range: XXS-3XL

  For each product:
  1. Write a 150-200 word description covering fit, fabric, styling, and care
  2. Write a size and fit guide section specific to this garment
  3. Include styling suggestions (what to pair it with)
  4. Address the #1 return reason for this garment type
  5. Write 5 bullet points covering the details shoppers need most

  Then provide:
  - Fashion description must-haves: the 8 elements every apparel listing needs
  - How to describe fit without a model (inclusive language, measurements)
  - Fabric description cheat sheet: how to make materials sound appealing

assertions:
  - type: llm_judge
    criteria: "Descriptions address fit anxiety — each garment includes specific fit guidance, comparison references, and honest sizing notes that reduce return likelihood"
    weight: 0.30
    description: "Addresses fit anxiety for returns"
  - type: llm_judge
    criteria: "Fabric descriptions are sensory and specific — 'viscose drapes softly' rather than just listing the material, making shoppers feel the garment through words"
    weight: 0.25
    description: "Sensory specific fabric descriptions"
  - type: llm_judge
    criteria: "Styling suggestions are practical and visual — specific outfit combinations that help shoppers imagine wearing the item, not vague 'pairs well with anything'"
    weight: 0.25
    description: "Practical visual styling suggestions"
  - type: llm_judge
    criteria: "The fashion must-haves checklist is comprehensive — covers fit, fabric, care, sizing, model measurements reference, styling, occasion, and return-reducing details"
    weight: 0.20
    description: "Comprehensive fashion must-haves"
