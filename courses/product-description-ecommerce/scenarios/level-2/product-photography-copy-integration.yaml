meta:
  id: product-photography-copy-integration
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions that complement and enhance product photography"
  tags: [ecommerce, photography, visual-copy, integration, intermediate]

state: {}

trigger: |
  Product descriptions and photography work together — copy should
  complement what images show, not duplicate it. If the photo shows the
  product's color and design, the description should focus on what photos
  can't convey: texture, scent, sound, durability, and hidden features.

  Write photo-integrated product descriptions for 5 products, specifying
  what each image should show and what the copy should describe:

  Product 1: Leather messenger bag ($185)
  Photo set: Hero shot (bag closed), interior layout, leather texture
  close-up, model wearing it, size comparison with laptop
  Challenge: Convey leather quality and craftsmanship through words

  Product 2: Bluetooth portable speaker ($55)
  Photo set: Product front/back, size in hand, poolside lifestyle shot,
  color options, charging port detail
  Challenge: Convey sound quality that photos can't capture

  Product 3: Ceramic dinnerware set ($120, 16-piece)
  Photo set: Table setting styled, stack shot, individual pieces, glaze
  detail close-up, dishwasher rack fit
  Challenge: Convey weight, feel, and durability through words

  Product 4: Indoor herb garden kit ($45)
  Photo set: Unboxing, setup process, 30-day growth progress, kitchen
  counter lifestyle, harvesting herbs
  Challenge: Convey the experience over time (growth journey)

  Product 5: Weighted blanket ($89)
  Photo set: Blanket on bed styled, fabric texture close-up, person
  using it on couch, folded size, weight distribution detail
  Challenge: Convey the physical sensation of weight and comfort

  For each product:
  1. Write a photo-aware description (150 words) — text that complements,
     not repeats, what images show
  2. Specify exactly what each image in the set should convey
  3. Write the alt text for each product image (SEO + accessibility)
  4. Identify the "copy gap" — what photos can't show that descriptions must
  5. Write the caption/callout text for each image

  Then provide:
  - Photo-copy integration framework: what images do best vs what words
    do best
  - Alt text writing guide for product images (SEO + accessibility)
  - How to write descriptions when photos are poor quality or limited
  - Image sequence best practices for product pages

assertions:
  - type: llm_judge
    criteria: "Copy complements photos rather than duplicating them — descriptions focus on texture, scent, sound, durability, and experience rather than describing what's visually obvious"
    weight: 0.30
    description: "Copy complements not duplicates photos"
  - type: llm_judge
    criteria: "Alt text is properly written — descriptive for accessibility while including relevant keywords for SEO, specific to each image rather than generic"
    weight: 0.25
    description: "Proper accessible SEO alt text"
  - type: llm_judge
    criteria: "The copy gap analysis is insightful — correctly identifies that leather texture, sound quality, weight sensation, and growth over time cannot be photographed and must be described"
    weight: 0.25
    description: "Insightful copy gap analysis"
  - type: llm_judge
    criteria: "Image sequence recommendations follow conversion best practices — hero shot first, lifestyle second, details third, with clear reasoning for the order"
    weight: 0.20
    description: "Conversion-optimized image sequence"
