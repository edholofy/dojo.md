meta:
  id: electronics-tech-descriptions
  level: 2
  course: product-description-ecommerce
  type: output
  description: "Write product descriptions for electronics that balance technical specs with accessible benefits"
  tags: [ecommerce, electronics, tech, specs, intermediate]

state: {}

trigger: |
  Electronics shoppers research extensively — 81% compare specs before
  purchasing. But pure spec sheets lose non-technical buyers. The best
  electronics descriptions translate specs into real-world performance
  while providing the detailed data power users demand.

  Write product descriptions for 5 electronics products:

  Product 1: Mirrorless camera ($1,299)
  Specs: 26.1MP APS-C sensor, 4K 60fps video, 5-axis IBIS, 425-point
  phase-detect AF, 11fps burst, dual SD card slots, weather-sealed body,
  680g, 3-inch tilting touchscreen

  Product 2: Wireless mesh WiFi system ($279, 3-pack)
  Specs: WiFi 6E tri-band, covers 6,000 sq ft, 2.5Gbps backhaul,
  supports 150+ devices, WPA3 security, automatic band steering,
  parental controls, app-managed

  Product 3: Portable power station ($449)
  Specs: 1,024Wh LiFePO4 battery, 1,500W pure sine wave output, 8 outlets
  (2 AC, 2 USB-C 100W, 2 USB-A, 2 DC), solar input 400W max, charges
  0-80% in 1 hour, 3,000+ cycle life, 23 lbs

  Product 4: Smart doorbell camera ($179)
  Specs: 2K HDR video, 180° field of view, person/package/vehicle detection,
  two-way audio with noise cancellation, local + cloud storage options,
  hardwired or battery, works with Alexa/Google

  Product 5: Mechanical keyboard ($129)
  Specs: 75% layout, hot-swappable switches (Gateron Pro), south-facing
  RGB LEDs, gasket-mount, PBT keycaps, USB-C + Bluetooth 5.1 + 2.4GHz,
  4,000mAh battery, foam-dampened case

  For each product:
  1. Write 200 words: translate specs into benefits for a general audience
  2. Write a separate "Tech Specs" section formatted for comparison shoppers
  3. Write 5 benefit-first bullet points (spec as proof)
  4. Identify which specs matter most vs which are marketing fluff
  5. Write the "Why this over competitors?" positioning statement

  Then provide:
  - How to translate common tech specs into plain language
  - When to lead with specs vs benefits (audience signals)
  - Comparison table best practices for electronics pages

assertions:
  - type: llm_judge
    criteria: "Specs are translated into real-world benefits — '1,024Wh battery' becomes 'powers your mini-fridge for 12 hours during an outage,' '425-point AF' becomes 'never miss a shot of your moving toddler'"
    weight: 0.30
    description: "Real-world spec translations"
  - type: llm_judge
    criteria: "Tech specs sections are well-organized — formatted in clean tables or structured lists that power users can quickly scan and compare"
    weight: 0.25
    description: "Well-organized tech specs"
  - type: llm_judge
    criteria: "Competitive positioning is specific — identifies real differentiators rather than vague 'best in class' claims, referencing actual category norms"
    weight: 0.25
    description: "Specific competitive positioning"
  - type: llm_judge
    criteria: "The spec translation guide is useful — covers common units (mAh, nits, Hz, Wh) and shows how to convert each into language shoppers understand"
    weight: 0.20
    description: "Useful spec translation guide"
