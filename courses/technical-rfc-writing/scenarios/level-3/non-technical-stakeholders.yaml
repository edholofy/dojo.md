meta:
  id: non-technical-stakeholders
  level: 3
  course: technical-rfc-writing
  type: output
  description: "Write for non-technical stakeholders — translate complex technical proposals into business language for executives, product managers, and customers"
  tags: [RFC, non-technical, executive, business-language, translation, advanced]

state: {}

trigger: |
  You've written an RFC to re-architect your application from a
  monolith to microservices. The technical RFC is solid — engineers
  approve it. But now the CTO asks you to present the proposal to:

  1. The CEO: cares about revenue impact and competitive position
  2. The CFO: cares about cost justification and ROI
  3. The CPO (Chief Product Officer): cares about feature velocity
     and customer experience
  4. The board of directors: cares about risk and strategic alignment

  Your 12-page technical RFC means nothing to these audiences. The
  CEO doesn't know what a microservice is and shouldn't need to.

  Task: Create an executive briefing document derived from your
  technical RFC. Translate the technical proposal into business
  language for each audience. Show how to maintain accuracy while
  removing jargon, and how to connect technical decisions to business
  outcomes.

assertions:
  - type: llm_judge
    criteria: "CEO perspective focuses on revenue and competitive impact — CEO brief (1 page): 'What we're proposing: restructuring our software so different product features can be developed, deployed, and scaled independently. Like converting a single factory that makes everything into specialized workshops that can operate independently.' Business impact: 'Currently, adding a new feature takes 6-8 weeks because all parts of the application must be updated and tested together. After: features ship in 2-3 weeks because teams work independently. This means we respond to market changes 2-3x faster.' Revenue connection: 'Three enterprise prospects cited our slow feature delivery as a reason for choosing competitors in the last quarter ($X pipeline lost). This architecture enables the feature velocity enterprise customers expect.' Risk: 'The transition takes 6 months. During this period, feature delivery continues at current pace. After: permanent improvement.' No technical jargon — no mention of containers, APIs, databases, or deployment pipelines. Everything expressed in business outcomes"
    weight: 0.35
    description: "Executive translation"
  - type: llm_judge
    criteria: "CFO perspective includes financial analysis — CFO brief (1 page): 'Investment required: $X (6 engineers × 6 months, allocated from existing headcount, no new hires). Infrastructure cost increase: $Y/month (additional cloud services for independent operation). Total 12-month cost: $Z.' ROI calculation: 'Infrastructure efficiency gains: $A/year (individual feature scaling vs scaling everything). Developer productivity: $B/year (faster development cycles, less coordination overhead). Revenue acceleration: $C/year (faster feature delivery enables enterprise sales). Incident cost reduction: $D/year (isolated failures vs system-wide outages). Estimated payback period: 9-14 months.' Risk quantified: 'Worst case: transition takes 9 months instead of 6 (additional $E in engineer time). Best case: transition complete in 5 months with immediate productivity gains.' Comparison: 'Alternative: continue with current architecture. Cost of inaction: increasing development time (+2 weeks/quarter at current trajectory), growing incident frequency (3 major outages last year, trending upward), and competitive disadvantage in enterprise deals.'"
    weight: 0.35
    description: "Financial analysis"
  - type: llm_judge
    criteria: "Translation guide shows how to maintain accuracy without jargon — principles for technical-to-business translation: (1) Replace technical nouns with business outcomes: 'microservices' becomes 'independent product features', 'deployment pipeline' becomes 'faster release process', 'horizontal scaling' becomes 'handling more customers without manual effort.' (2) Quantify everything: 'improved latency' becomes 'pages load in 1 second instead of 4', 'better scalability' becomes 'handle 10x current traffic without additional cost.' (3) Use analogies that match the audience's domain: factory production lines for operations-minded executives, investment portfolios for finance-minded executives. (4) Connect every technical decision to a business metric: 'Why containers?' → 'Because they reduce our cloud costs by 30% and let us deploy new features in hours instead of days.' (5) Preserve accuracy: simplify but don't misrepresent. 'Independent deployment' is accurate simplification. 'No dependencies between features' would be inaccurate. (6) Include what you're NOT saying: 'This brief omits implementation details, risk mitigations, and technical design — available in the full RFC for interested parties.'"
    weight: 0.30
    description: "Translation guide"
