meta:
  id: rfc-driven-development
  level: 3
  course: technical-rfc-writing
  type: output
  description: "Practice RFC-driven development — use RFCs as the primary mechanism for proposing, reviewing, and documenting technical decisions"
  tags: [RFC, rfc-driven, process, decision-making, documentation, advanced]

state: {}

trigger: |
  Your engineering team of 40 engineers across 6 teams has grown
  beyond the point where technical decisions can be made in Slack
  threads and verbal agreements. You've had three incidents this
  quarter caused by undocumented architectural decisions:

  1. Two teams built incompatible event schemas because neither knew
     about the other's design
  2. A database migration broke a service that wasn't consulted
  3. A library upgrade in a shared package had unexpected side effects

  You want to propose RFC-driven development as the team's decision
  framework. But engineers are skeptical — "RFCs will slow us down"
  and "we'll spend all our time writing documents instead of code."

  Task: Write an RFC (meta-RFC!) proposing RFC-driven development
  for your organization. Address the skeptics. Define what requires
  an RFC vs what doesn't. Show how the RFC process accelerates
  decisions rather than slowing them down.

assertions:
  - type: llm_judge
    criteria: "RFC process is clearly defined with thresholds — what requires an RFC: 'Any change that (1) affects more than one team, (2) is difficult to reverse once deployed, (3) involves choosing between multiple valid approaches, (4) changes a public API or shared interface, or (5) requires more than 2 weeks of engineering effort.' What does NOT require an RFC: 'Bug fixes, refactoring within a single service, dependency updates (unless major version), feature work within established patterns, performance optimizations within existing architecture.' Process defined: (1) Author writes RFC using template (1-3 days). (2) RFC posted to team-wide channel for review (3 business days minimum). (3) Required reviewers identified based on affected teams. (4) Comments addressed, RFC updated. (5) Decision meeting if consensus not reached in comments (30 minutes, not longer). (6) RFC approved/rejected/deferred with rationale. (7) Approved RFCs become living documents — updated during implementation. Total overhead target: 'An RFC should take 1-3 days to write and 3-5 days to review. If it takes longer, the scope is too broad — split it.'"
    weight: 0.35
    description: "Process definition"
  - type: llm_judge
    criteria: "Skeptic concerns are addressed with specific counterarguments — 'RFCs slow us down' reframed: 'The three incidents this quarter each required 1-2 weeks of cleanup. Three 3-day RFC processes would have cost 9 days and prevented 3-6 weeks of incident response. RFCs are slower per-decision but faster per-outcome.' 'We'll write documents instead of code' addressed: 'RFCs replace undocumented decisions, not code. Today decisions happen in Slack threads that aren't searchable, meetings with incomplete attendance, or not at all. RFCs make explicit what's currently implicit — the decision-making happens regardless, we're just documenting it.' 'What about velocity for small teams?' addressed: 'Teams under 10 engineers with a single service may not need formal RFCs. The threshold is designed for cross-team impact. Within-team decisions remain at the team's discretion.' Data from industry: 'Google, Amazon, Spotify, and Uber all use RFC-like processes at scale. The pattern works because it prevents the coordination failures that slow large organizations more than any document ever could.'"
    weight: 0.35
    description: "Addressing skeptics"
  - type: llm_judge
    criteria: "Implementation and adoption strategy is practical — rollout plan: 'Month 1: pilot with 2 volunteer teams. Collect feedback on template, process, and tooling. Month 2: refine based on pilot feedback. Address pain points before broader rollout. Month 3: roll out to all teams with training sessions and example RFCs from the pilot.' Tooling: 'RFCs stored in a dedicated GitHub repository. Each RFC is a markdown file with frontmatter (status, author, reviewers, date). GitHub PR process for review — familiar to all engineers. Searchable archive of all decisions.' Template provided: lightweight template with required sections (summary, problem, solution, alternatives, risks) and optional sections (detailed design, implementation plan). Cultural elements: 'RFC review is engineering work — it goes on the sprint. Reviewing an RFC is as important as writing code. Senior engineers expected to review 2-3 RFCs per month.' Success metrics: 'Cross-team incidents caused by undocumented decisions: target zero within 6 months. Average time from RFC submission to decision: under 5 business days. Engineer satisfaction survey: majority agree RFCs improve decision quality.' Anti-pattern detection: 'If RFCs are routinely rubber-stamped, the bar is too low. If RFCs are routinely blocked for weeks, the process needs a decision escalation path'"
    weight: 0.30
    description: "Adoption strategy"
