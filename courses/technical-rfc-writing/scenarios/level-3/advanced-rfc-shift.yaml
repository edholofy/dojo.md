meta:
  id: advanced-rfc-shift
  level: 3
  course: technical-rfc-writing
  type: output
  description: "Advanced RFC shift simulation — write an RFC for a complex organizational and technical initiative spanning multiple teams, requiring executive buy-in and phased execution"
  tags: [RFC, shift-simulation, organizational, multi-team, executive, advanced]

state: {}

trigger: |
  You're the tech lead writing an RFC for your company's most
  ambitious technical initiative: building a real-time data platform
  that unifies data from all product lines.

  Context:
  - 5 product lines, each with its own database and data model
  - Data analysts spend 60% of time joining data across systems
  - No single view of customer across products
  - Executive team wants "data-driven decisions" but can't get
    consistent metrics (each product reports differently)
  - Sales team manually cross-references 3 systems per customer call
  - Compliance audit found data inconsistencies across systems

  The initiative involves:
  - Unified data model across 5 product lines
  - Real-time event streaming from all systems
  - Central data warehouse with transformation pipeline
  - Self-service analytics for business users
  - API layer for programmatic access

  This requires buy-in from: 5 product teams, data engineering,
  infrastructure, security, compliance, and executive leadership.
  Budget: $500K over 12 months.

  Task: Write the complete RFC covering technical architecture,
  organizational coordination, phased delivery, budget justification,
  and executive summary. This is your advanced synthesis — show
  mastery of RFC writing for a complex, cross-organizational initiative.

assertions:
  - type: llm_judge
    criteria: "RFC addresses both technical and organizational complexity — technical architecture: event streaming architecture (Kafka/Kinesis) capturing changes from 5 product databases, transformation pipeline (dbt or similar) normalizing data models, data warehouse (Snowflake/BigQuery) for analytics, API layer for programmatic access. Unified data model: customer-centric model linking entities across product lines with a canonical customer ID. Data quality: validation rules, schema enforcement, monitoring for data freshness and completeness. Organizational coordination: RACI matrix for 5 product teams (each responsible for event publishing from their system), data engineering (owns pipeline and warehouse), infrastructure (provides streaming infrastructure), security (data access controls), compliance (data governance). Governance model: data stewards per product line, central data team as platform owner. The RFC should feel like a complete project proposal that both a senior engineer and a VP could evaluate"
    weight: 0.35
    description: "Technical and organizational"
  - type: llm_judge
    criteria: "Phased delivery is realistic with clear value at each phase — Phase 1 (Months 1-3): 'Unify customer identity across 2 highest-value product lines. Deliverable: single customer view for sales team. Value: sales reps save 30 minutes per customer call, immediately measurable.' Phase 2 (Months 4-6): 'Add remaining 3 product lines. Standardize key metrics (revenue, usage, churn) across all products. Deliverable: executive dashboard with consistent metrics. Value: exec team gets reliable data for Q3 planning.' Phase 3 (Months 7-9): 'Self-service analytics layer. Business users can query data without engineering support. Deliverable: analytics workspace with pre-built templates. Value: data analysts reclaim 60% of time currently spent on manual joins.' Phase 4 (Months 10-12): 'API layer and advanced use cases — programmatic access, real-time triggers, ML feature store foundation. Value: enables personalization, automated alerting, and predictive analytics.' Each phase is independently valuable — if budget is cut after Phase 2, the company still has unified customer view and consistent metrics"
    weight: 0.35
    description: "Phased delivery"
  - type: llm_judge
    criteria: "Budget justification and executive summary are compelling — budget breakdown: 'Engineering: 4 dedicated data engineers × 12 months ($360K). Infrastructure: streaming + warehouse ($80K/year). Tooling and licenses ($40K/year). Contingency (10%): $20K. Total: $500K.' ROI: 'Sales productivity improvement: $X/year (30 min/call × Y calls/day × Z reps). Analyst productivity: $A/year (60% time recovery × B analysts). Executive decision quality: unquantifiable but cited as top-3 strategic priority. Compliance risk reduction: audit finding resolved, avoiding potential $C in penalties. Customer retention: unified view enables proactive churn prevention, estimated $D/year impact.' Executive summary (1 page): frames as strategic investment, not infrastructure cost. 'We propose building a unified data platform to give every team a single, trusted view of our customers and business. Today, five separate systems mean five different answers to the same question. This initiative costs $500K over 12 months and delivers measurable value starting in Month 3.' Risk section: addresses the most common data platform failure mode — scope creep and over-engineering. 'We succeed by delivering incremental value, not by building the perfect platform. Phase 1 proves the approach with 2 systems before expanding to all 5.'"
    weight: 0.30
    description: "Budget and executive summary"
