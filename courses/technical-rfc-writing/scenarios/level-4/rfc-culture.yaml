meta:
  id: rfc-culture
  level: 4
  course: technical-rfc-writing
  type: output
  description: "Build RFC culture — create an environment where writing and reviewing RFCs is valued, accessible, and produces better technical decisions"
  tags: [RFC, culture, participation, inclusion, writing-culture, expert]

state: {}

trigger: |
  You're the Head of Engineering at a company where the RFC process
  technically exists but culturally isn't working:

  - Only 5 senior engineers (out of 80 total) write RFCs
  - Those 5 are burned out from being the only ones doing it
  - Junior and mid-level engineers say "I don't feel qualified"
  - Non-native English speakers avoid writing because they fear
    language criticism
  - Women engineers report that their RFCs receive more critical
    scrutiny than those from male colleagues
  - Remote engineers feel excluded from RFC discussions that happen
    in-person after meetings
  - The "culture" is really 5 people who happen to like writing
    documents — not an organizational practice

  Task: Design a cultural transformation plan that makes RFC
  writing accessible, inclusive, and valued across the organization.
  Address each barrier to participation. Show how to build a culture
  where diverse perspectives improve technical decisions.

assertions:
  - type: llm_judge
    criteria: "Each barrier to participation is addressed with specific interventions — 'I don't feel qualified' addressed: 'RFC mentorship program: every first-time RFC author is paired with an experienced author who provides feedback before public review. First RFC is never reviewed cold. RFC writing workshops quarterly covering structure, common patterns, and examples of successful RFCs from all seniority levels. Showcase junior engineer RFCs that led to important decisions — normalization that good ideas come from all levels.' Language barriers addressed: 'RFC template with fill-in prompts reduces blank-page anxiety. Writing is evaluated for clarity of thinking, not prose quality. Explicit review guidelines: comment on the idea, not the grammar. Optional writing support: technical writing review available before submission. Multi-format RFCs accepted: diagrams, pseudocode, and bullet points are valid — not every RFC needs to be polished prose.' Remote exclusion addressed: 'All RFC discussion happens in written comments — no in-person side-discussions that override written feedback. If a discussion happens verbally, it must be summarized in the RFC comments within 24 hours or it didn't happen. Asynchronous-first review process with a minimum 3 business day review window'"
    weight: 0.35
    description: "Barrier removal"
  - type: llm_judge
    criteria: "Bias and inclusion issues are directly confronted — gender bias addressed: 'Blind review pilot: RFC author names hidden during initial review period (technical feasibility assessed). If blind review isn't technically feasible, explicit bias training for reviewers focusing on: evaluating the proposal's merit independent of the author, providing evidence-based feedback, and avoiding tone policing. Review auditing: quarterly analysis of review comment sentiment and approval rates by author demographics. If disparities are found, they are addressed directly.' Inclusive review norms established: (1) 'Comment on the idea, not the person. Instead of: you didn't consider X. Use: how would this handle X?' (2) 'Questions before assertions. Ask for clarification before assuming the author missed something.' (3) 'Acknowledge what's strong before identifying gaps.' (4) 'No LGTM-only approvals for senior authors — every RFC deserves substantive review regardless of author reputation.' (5) 'Review guidelines published and enforced. Reviewers who consistently violate norms are spoken to privately by their manager.' Structural change: 'Required reviewers are rotated to prevent cliques. Cross-team review ensures diverse perspectives'"
    weight: 0.35
    description: "Inclusion and bias"
  - type: llm_judge
    criteria: "Cultural transformation is sustainable, not performative — incentive alignment: 'RFC participation (writing and reviewing) is explicitly part of performance review criteria. Not just senior engineers — expected at all levels with complexity appropriate to seniority.' Recognition: 'Monthly highlight of impactful RFCs in engineering all-hands. Recognize both authors and reviewers. RFC of the quarter award (voted on by engineering org).' Leadership modeling: 'Engineering leaders write RFCs for their proposals too — not just engineers. VP of Engineering writes the RFC for organizational changes. This normalizes that RFCs are for everyone, not a hoop for ICs to jump through.' Measurement: 'RFC participation diversity metrics tracked quarterly: percentage of engineers who wrote/reviewed at least 1 RFC, distribution by seniority, tenure, team, demographics (where self-reported). Target: 60% of engineers participate in RFC process per quarter within 12 months (up from current 6%).' Sustainability: 'Avoid RFC fatigue by not requiring RFCs for everything. Clear thresholds prevent over-documentation. Regular retrospectives to tune the process. Culture change is a 12-18 month effort with quarterly checkpoints, not a one-time initiative'"
    weight: 0.30
    description: "Sustainable culture"
