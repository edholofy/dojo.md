meta:
  id: measuring-effectiveness
  level: 4
  course: technical-rfc-writing
  type: output
  description: "Measure RFC process effectiveness — design metrics and feedback loops to evaluate whether the RFC process improves technical decision quality"
  tags: [RFC, metrics, effectiveness, decision-quality, measurement, expert]

state: {}

trigger: |
  Your RFC process has been running for 18 months. Leadership asks:
  "Is it working? Are we making better technical decisions?" You
  realize you can't answer this definitively.

  You have process metrics:
  - 180 RFCs written, 140 approved, 35 rejected
  - Average review time: 6 days
  - 82% reviewer response rate

  But these are activity metrics, not outcome metrics. Writing more
  RFCs doesn't mean better decisions. Fast reviews might mean
  rubber-stamping.

  You also suspect problems:
  - Some approved RFCs led to projects that failed or were abandoned
  - Some rejected RFCs might have been good ideas killed by politics
  - Some teams bypass the process for "urgent" decisions — are those
    worse outcomes?
  - The process might be creating a false sense of rigor

  Task: Design a comprehensive effectiveness measurement framework
  for the RFC process. Include leading indicators, lagging indicators,
  outcome metrics tied to decision quality, and feedback loops for
  continuous improvement.

assertions:
  - type: llm_judge
    criteria: "Outcome metrics distinguish process activity from decision quality — decision quality metrics: (1) 'Implementation success rate: of approved RFCs, what percentage were fully implemented as designed? (Currently: unknown, target: 70%+). RFCs that required significant redesign during implementation suggest the review process missed issues.' (2) 'Post-implementation satisfaction: 6 months after implementation, do the author and stakeholders agree the decision was correct? Survey with specific questions: did the solution solve the stated problem? Were the risks accurately identified? Was the timeline realistic?' (3) 'Incident correlation: do production incidents correlate with decisions made via RFC vs decisions made without RFC? This tests the core hypothesis that the RFC process produces better outcomes.' (4) 'Rejected RFC analysis: of rejected RFCs, how many addressed a problem that remained unsolved? A rejected RFC whose problem persists suggests the review process blocked without solving.' (5) 'Bypass analysis: decisions made without RFCs — do they have higher incident rates or require more rework? This validates whether the process adds value or just overhead'"
    weight: 0.35
    description: "Outcome metrics"
  - type: llm_judge
    criteria: "Leading indicators detect process health before outcomes appear — review quality indicators: (1) 'Comment substance ratio: percentage of review comments that are substantive (questions, concerns, alternatives) vs procedural (formatting, template compliance). Target: 80%+ substantive. Low substance suggests rubber-stamping.' (2) 'Revision rate: percentage of RFCs that are meaningfully revised based on review feedback. Too low (under 30%) suggests reviews aren't adding value. Too high (over 80%) suggests authors aren't doing enough upfront work.' (3) 'Dissent rate: percentage of RFCs with at least one significant objection during review. Some dissent is healthy (diverse perspectives). Zero dissent across all RFCs suggests groupthink or intimidation.' (4) 'Author diversity: are RFCs written by a broad cross-section of engineers? If only 10% of engineers write RFCs, the process isn't capturing distributed knowledge.' (5) 'Time-to-decision trend: is average review time increasing (possible bottleneck), decreasing (possible rubber-stamping), or stable (healthy)?' Red flags: 'All RFCs approved (no quality bar), same 5 reviewers on every RFC (bottleneck risk), review time under 1 day for complex RFCs (insufficient review)'"
    weight: 0.35
    description: "Leading indicators"
  - type: llm_judge
    criteria: "Feedback loops enable continuous improvement — retrospective cadence: 'Quarterly RFC process retrospective with representative engineers from each seniority level. Agenda: what worked, what didn't, process changes proposed.' Failed RFC postmortem: 'When an implemented RFC leads to a failed project or significant rework, conduct a decision postmortem (not blame): Was the problem correctly identified? Were alternatives adequately explored? Were risks underestimated? Was the review process adequate? What would have changed the outcome?' Annual RFC effectiveness report: 'Comprehensive analysis presented to engineering leadership: total decisions documented, implementation success rate, decision reversal rate, correlation between RFC process compliance and project outcomes, participation trends, comparison to industry benchmarks.' Feedback into process: 'If decision postmortems reveal that risk sections are consistently inadequate, update the template to include more structured risk analysis. If reviews are consistently missing security concerns, add security review as a required reviewer role.' Anti-gaming measures: 'Metrics are used to improve the process, not evaluate individuals. RFC count is not a performance metric — quality of decisions matters, not quantity of documents. Explicitly: no OKRs tied to RFC volume'"
    weight: 0.30
    description: "Feedback loops"
