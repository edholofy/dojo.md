meta:
  id: expert-rfc-shift
  level: 4
  course: technical-rfc-writing
  type: output
  description: "Expert RFC shift simulation — design and present an enterprise-wide technical governance framework through RFCs, balancing innovation velocity with architectural integrity"
  tags: [RFC, shift-simulation, governance, enterprise, strategy, expert]

state: {}

trigger: |
  You're the newly appointed VP of Engineering at a rapidly growing
  company (500 → 1,200 engineers in 18 months). The growth has
  created chaos:

  - 40 new services created in 6 months with no architectural review
  - 12 different databases in production (PostgreSQL, MySQL, MongoDB,
    DynamoDB, Redis, Cassandra, CockroachDB, Neo4j, Elasticsearch,
    ClickHouse, SQLite, and a team using Google Sheets as a database)
  - 3 major outages caused by undocumented service dependencies
  - $200K/month in cloud waste from over-provisioned services
  - New engineers take 3 months to become productive because there's
    no documentation of how systems connect
  - Teams accidentally build the same capability in parallel

  The CEO says "fix this" but also "don't slow down innovation."

  Task: Write an RFC proposing a technical governance framework that
  brings order without killing velocity. This is your expert
  synthesis: you need to address technical architecture, organizational
  process, culture change, tooling, and executive communication — all
  in one coherent proposal that a board of directors would approve
  and engineers would follow.

assertions:
  - type: llm_judge
    criteria: "Governance framework addresses all dysfunction areas with proportional responses — database proliferation: 'Not all 12 databases are wrong — some serve legitimate use cases. Establish a supported database tier (PostgreSQL, Redis, Elasticsearch — covered by DBA support, monitoring, and backup) and an unsupported tier (everything else — team must self-operate, no incident response from platform team). New services must justify unsupported database choice via RFC. Google Sheets: immediate migration project, not negotiable.' Undocumented dependencies: 'Service registry mandatory for all services within 60 days. Registry includes: service name, team owner, dependencies, data stores, API contracts. Auto-discovery tooling supplements manual registration.' Cloud waste: 'Immediate cost allocation to teams (visibility). Cost anomaly alerting. Quarterly cost review per team. Target: $200K/month → $80K/month within 6 months.' Parallel capability building: 'Inner-source catalog of shared capabilities. Before building a new capability, teams check the catalog and post a brief RFC. If a similar capability exists, teams must justify building vs reusing.' Each response is proportional: mandates for critical issues (database registration), guidelines for moderate issues (cost awareness), and enablement for strategic goals (inner-source)"
    weight: 0.35
    description: "Proportional governance"
  - type: llm_judge
    criteria: "Innovation velocity is explicitly protected — philosophy: 'Governance is a guardrail, not a gate. Teams should be able to move fast within boundaries, not wait for permission.' Specific velocity protections: (1) 'RFC required only for decisions above the threshold (cross-team, hard to reverse, or high cost). Estimated 80% of decisions remain team-level with no process overhead.' (2) 'Approved technology list: teams can use anything on the list without justification. Only non-standard choices need RFC.' (3) 'Self-service infrastructure: provision databases, caches, and compute via platform tools in under 1 hour. The bottleneck should be thinking, not waiting.' (4) 'RFC process with SLA: 5 business day max for standard RFCs. If SLA is breached, auto-approved with advisory feedback.' (5) 'Innovation budget: 20% of team capacity is explicitly for experimentation outside standard patterns. Experiments documented but not reviewed.' Measurement: 'Track both governance metrics (compliance, architectural consistency) AND velocity metrics (time to deploy, feature delivery rate). If velocity declines, governance must be loosened. The goal is better decisions at the same speed, not more process at any speed'"
    weight: 0.35
    description: "Velocity protection"
  - type: llm_judge
    criteria: "Executive communication and implementation plan are board-ready — executive summary: 'In 18 months of growth, we've accumulated $200K/month in cloud waste, 3 major outages from undocumented dependencies, and 3-month onboarding times from architectural complexity. This RFC proposes a governance framework that reduces waste by 60%, prevents dependency-related outages, and cuts onboarding to 1 month — while maintaining current feature delivery velocity.' Cost of inaction: 'At current trajectory, cloud waste reaches $400K/month by year-end. Outage frequency increases with service count. Onboarding time increases as documentation debt grows.' Investment: '3 platform engineers (existing headcount reallocation) + $50K tooling budget. ROI: governance saves $1.4M/year in cloud costs alone. Outage prevention and onboarding improvements provide additional value.' Implementation timeline: 'Month 1: service registry + cost allocation (quick wins). Month 2-3: supported technology list + RFC process launch. Month 4-6: platform tooling for self-service. Month 7-12: culture embedding, measurement, and iteration.' Success metrics for the board: 'Cloud spend per engineer decreasing, mean time between outages increasing, new engineer time-to-first-deploy decreasing, feature delivery velocity maintained or improved.' The RFC should feel like something that earns both board approval and engineer buy-in"
    weight: 0.30
    description: "Executive readiness"
