meta:
  id: global-standards-rfc
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Write global technical standards RFCs — create standards that work across jurisdictions, cultures, and organizational boundaries"
  tags: [RFC, global-standards, cross-cultural, jurisdictions, international, master]

state: {}

trigger: |
  You're the Global VP of Engineering for a company with engineering
  offices in San Francisco, London, Bangalore, and Tokyo. You need
  to write a global engineering standards RFC, but you've discovered
  that "standards" mean different things in different offices:

  - SF: favors autonomy, minimal process, move fast. "Standards are
    suggestions." Engineers resist anything perceived as mandate.
  - London: values thorough documentation, formal review. "Standards
    should be comprehensive." Engineers want clarity and completeness.
  - Bangalore: respects hierarchy, follows established process.
    "Standards come from leadership." Engineers implement diligently
    but may not push back when standards don't fit local context.
  - Tokyo: values consensus and quality. "Standards should be
    perfected before publishing." Engineers invest heavily in getting
    it right but the process is slow.

  Previous attempts at global standards were written by SF engineers
  and received as "American tech culture imposed on everyone."

  Task: Write a global engineering standards RFC that respects
  cultural differences, builds genuine consensus, and creates
  standards that work across all offices. Address the meta-challenge
  of writing a standards RFC for a culturally diverse organization.

assertions:
  - type: llm_judge
    criteria: "Cultural dynamics are explicitly acknowledged and accommodated — each office's strengths identified: 'SF brings innovation velocity and willingness to experiment. London brings rigor and thorough documentation. Bangalore brings execution discipline and systematic implementation. Tokyo brings quality focus and consensus-building.' Standards adapted to cultural context: 'The RFC process itself has cultural adaptations: SF teams can use lightweight async review (matches their preference for autonomy). London teams can use formal document review meetings (matches their preference for thoroughness). Bangalore teams get explicit escalation paths for when standards don't fit (addressing the tendency to follow without pushback). Tokyo teams get a pre-publication review phase for quality refinement (matching their consensus culture).' Authorship: 'This RFC is co-authored by representatives from all 4 offices, not written by one office and distributed to others. Each office contributed sections reflecting their expertise: SF wrote the innovation principles, London wrote the documentation standards, Bangalore wrote the implementation guidelines, Tokyo wrote the quality criteria.' Communication: 'Standards published in English (working language) with supplementary materials in local languages for complex topics. Timezone-inclusive review periods (minimum 5 business days spanning all time zones)'"
    weight: 0.35
    description: "Cultural accommodation"
  - type: llm_judge
    criteria: "Standards framework distinguishes universal from local — three-tier standards: Tier 1 (Universal, non-negotiable): security standards (data encryption, access control, vulnerability patching), compliance requirements (GDPR for EU-touching systems, SOX for financial systems), interoperability standards (API contracts between teams, shared event schemas, common authentication). These are universal because the risk of inconsistency is too high. Tier 2 (Global with local adaptation): code review practices (universal: all code must be reviewed; local: review format and tooling may vary), testing standards (universal: critical paths must be tested; local: testing tools and coverage targets may vary by team), documentation standards (universal: decision records and API docs required; local: format, language of internal docs, level of detail). Tier 3 (Local office autonomy): technology choices within services, development workflow (sprint/kanban/flow), internal team processes, office-specific tooling. Principle: 'Standardize what must interoperate. Adapt what benefits from local context. Leave autonomous what has no cross-office impact.' This prevents both chaos (no standards) and rigidity (one-size-fits-all)"
    weight: 0.35
    description: "Universal vs local"
  - type: llm_judge
    criteria: "Consensus-building process is genuinely inclusive — RFC review process designed for global inclusion: 'Phase 1: Draft created by cross-office working group (2 representatives per office). 1 week. Phase 2: Local review — each office reviews internally, consolidates feedback. 2 weeks (accommodates Tokyo's consensus preference). Phase 3: Cross-office comment resolution — video calls scheduled at rotating times to be fair to all timezones (not always convenient for the same office). 1 week. Phase 4: Final review with resolved comments. 1 week. Total: 5 weeks for a global standard (acceptable for standards that will be enforced for years).' Conflict resolution: 'If offices disagree on a standard: (1) document both positions with reasoning, (2) assess impact — does the disagreement affect interoperability? (3) If no interoperability impact: allow local variation. (4) If interoperability impact: escalation to Global VP with advisory input from all offices.' Preventing dominance: 'No single office can approve or block a global standard. Consensus requires at least 3 of 4 offices agreeing. The dissenting office's concerns are documented and addressed in the standard's adaptation guidance.' Feedback loop: 'Quarterly global standards retrospective with rotating facilitator from different offices. Standards are living documents — any office can propose amendments through the same inclusive process'"
    weight: 0.30
    description: "Inclusive consensus"
