meta:
  id: enterprise-rfc-strategy
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Design enterprise RFC strategy — create a technology decision-making framework that scales across thousands of engineers, multiple business units, and global operations"
  tags: [RFC, enterprise, strategy, global, decision-framework, master]

state: {}

trigger: |
  You're the CTO of a Fortune 500 company with 5,000 engineers across
  15 business units in 8 countries. The CEO and board have asked you
  to establish a unified approach to technology decision-making after
  a series of expensive mistakes:

  - Two BUs independently built competing data platforms ($15M wasted)
  - A security breach traced to a BU that adopted an unvetted vendor
  - Regulatory fines in the EU because one BU's system didn't comply
    with GDPR
  - M&A integration failures because acquired companies' tech was
    incompatible
  - Board lost confidence in technology investment decisions

  The board wants: "A framework that ensures technology decisions are
  sound, coordinated, and strategically aligned — without creating
  a bureaucracy that kills innovation."

  Task: Design the enterprise technology decision framework using
  RFCs as the core mechanism. Cover: decision categorization, review
  structures at different organizational levels, compliance
  integration, M&A technology governance, and board reporting.

assertions:
  - type: llm_judge
    criteria: "Decision categorization operates at enterprise scale — four decision tiers: Tier 1 (Team): internal implementation decisions. No RFC required. Examples: library choice, internal refactoring, test strategy. Boundary: affects only the team's own code and data. Tier 2 (Business Unit): decisions affecting multiple teams within a BU. RFC reviewed within BU by BU architect. Examples: new service, database selection, API design. SLA: 5 business days. Tier 3 (Cross-BU): decisions affecting multiple business units. RFC reviewed by Enterprise Architecture Council (EAC) — representatives from affected BUs. Examples: shared platform decisions, data standards, inter-BU API contracts, vendor selection above $100K. SLA: 15 business days. Tier 4 (Strategic): decisions with company-wide impact, >$1M cost, or regulatory implications. RFC reviewed by EAC + CTO + relevant C-suite stakeholders. Presented to board technology committee for >$5M decisions. Examples: cloud provider strategy, build-vs-buy decisions for core capabilities, M&A technology integration. SLA: 30 business days. Volume estimate: '95% Tier 1-2 (no enterprise overhead), 4% Tier 3, 1% Tier 4. Enterprise governance touches only the 5% of decisions that matter at scale'"
    weight: 0.35
    description: "Enterprise categorization"
  - type: llm_judge
    criteria: "Compliance and regulatory integration is built into the framework — compliance-by-design: 'Tier 3 and 4 RFCs include mandatory compliance checklist: data residency requirements, privacy impact assessment, security architecture review, regulatory implications by jurisdiction.' Jurisdiction-aware review: 'RFCs affecting EU operations require GDPR impact assessment signed off by DPO. RFCs affecting financial services BU require SOX compliance review. RFCs involving healthcare BU require HIPAA assessment. These are automated checks in the RFC template — not optional sections.' Vendor governance: 'New vendor adoption above $50K requires a security assessment and a data processing agreement. RFC template for vendor adoption includes: security questionnaire results, compliance certifications, data residency commitments, exit strategy if vendor is dropped.' Audit trail: 'All Tier 3-4 RFCs are immutable once approved. Approval chain recorded with timestamps. Accessible to internal audit and external regulators. This converts the RFC process from a decision tool into a compliance artifact.' M&A governance: 'Technology due diligence checklist derived from RFC standards. Acquired companies assessed against: tech stack compatibility, data governance maturity, security posture, compliance readiness. Integration RFC required within 90 days of acquisition close, defining: what stays, what migrates, what is decommissioned, timeline, and cost'"
    weight: 0.35
    description: "Compliance integration"
  - type: llm_judge
    criteria: "Board reporting and strategic alignment are addressed — board technology committee reporting: 'Quarterly technology governance report covering: Tier 4 decisions made and their strategic rationale, technology investment portfolio (active initiatives, cost, expected ROI), risk register (open technology risks ranked by potential impact), compliance status (any regulatory gaps and remediation timeline), technology debt quantified (estimated cost to remediate, risk if not addressed).' Strategic alignment mechanism: 'Annual technology strategy RFC from CTO to board: defines technology principles, approved investment themes, and decision criteria for the year. All Tier 3-4 RFCs must reference alignment with the annual strategy. RFCs that conflict with strategy require CTO exception.' Investment portfolio view: 'Technology decisions tracked as an investment portfolio: build vs buy, maintain vs modernize, invest vs sunset. Board sees technology spend by category with ROI tracking.' CTO dashboard: 'Real-time view of: active Tier 3-4 RFCs and their status, technology risk heatmap by BU, compliance posture by jurisdiction, M&A technology integration progress.' Communication to board in business language: 'Technology decisions presented as investment decisions with risk/return profiles. Board evaluates technology the same way they evaluate any capital allocation'"
    weight: 0.30
    description: "Board reporting"
