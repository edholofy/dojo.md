meta:
  id: board-technology-strategy
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Write board-level technology strategy RFCs — present multi-year technology roadmaps and investment strategies to boards of directors"
  tags: [RFC, board, technology-strategy, investment, roadmap, master]

state: {}

trigger: |
  You're the CTO presenting your annual technology strategy to the
  board of directors. The company is a $500M revenue SaaS platform.
  The board has 3 technology-related questions:

  1. "Should we invest $20M to rebuild our platform on modern
     architecture, or continue incremental improvements?"
  2. "Our competitors are investing in AI features. What's our
     AI strategy and how much should we invest?"
  3. "We're considering acquiring a company with a completely
     different tech stack. What are the technology integration
     risks?"

  The board includes: 2 former CTOs (technically literate), 3 finance
  executives (ROI-focused), and 2 industry executives (market-focused).
  Each needs different information to make these decisions.

  Task: Write a board-level technology strategy RFC that addresses
  all three questions with the rigor of a technical proposal but
  the language and framing of a board presentation. Include investment
  analysis, risk assessment, and strategic recommendations.

assertions:
  - type: llm_judge
    criteria: "Platform investment question has investment-grade analysis — option analysis: 'Option A: Big-bang rebuild ($20M, 18-24 months, high risk). Option B: Strangler fig migration ($12M, 24-36 months, medium risk). Option C: Targeted modernization ($6M, ongoing, low risk per project). We recommend Option B.' Financial analysis for Option B: 'Investment: $12M over 3 years (40 engineers). Expected returns: $8M/year in operational efficiency (current platform requires 2x the engineering effort for new features vs industry benchmark), $4M/year in cloud optimization (modern architecture reduces infrastructure costs by 35%), $2M/year in reduced incident costs (current platform averages 4 major incidents/quarter). Payback period: 18 months. NPV at 10% discount rate: $X million over 5 years.' Risk for each option: 'Option A: 40% of large platform rewrites fail (industry data). Company-specific risk: 18 months without new features while competitors advance. Option B: lower risk because value is delivered incrementally — if we stop at month 12, we've already modernized the highest-value components. Option C: doesn't address the fundamental architectural limitations causing 2x engineering overhead.' For the technically literate board members: appendix with architecture comparison"
    weight: 0.35
    description: "Investment analysis"
  - type: llm_judge
    criteria: "AI strategy is grounded in business value, not hype — AI strategy framework: 'We categorize AI investments by certainty of return: Tier 1 (High certainty, implement now): AI-powered search and recommendations. Evidence: competitors with AI search report 15-25% increase in user engagement. Our data assets enable this. Investment: $2M, 6-month timeline, estimated $10M annual revenue uplift. Tier 2 (Medium certainty, pilot this year): AI-assisted customer support. Evidence: industry benchmarks show 30-40% reduction in support costs. Investment: $1M pilot, scale to $3M if successful. Tier 3 (Low certainty, assess): AI-generated content, predictive analytics for churn. Investment: $500K for assessment, decision on further investment in 6 months.' Total AI investment recommendation: '$3.5M in Year 1 (1.5% of revenue). Industry benchmark: companies our size investing 2-4% of revenue in AI.' Competitive analysis: 'Competitor A invested $30M in AI but 70% on undifferentiated capabilities we can buy. Our advantage: proprietary data from 10M users. Strategy: buy commodity AI capabilities, build differentiated AI features on our unique data.' For finance board members: IRR calculations per tier. For industry board members: competitive positioning impact"
    weight: 0.35
    description: "AI strategy"
  - type: llm_judge
    criteria: "M&A technology risk assessment is board-actionable — technology due diligence framework: 'We assess acquisition targets across 5 dimensions: (1) Architecture compatibility (can systems integrate?), (2) Data compatibility (can data be unified?), (3) Team capability (can their engineers contribute to our platform?), (4) Technical debt (what's the hidden cost?), (5) Security and compliance posture (what's the risk?).' For the specific acquisition: 'Architecture: Target uses a different stack but their API-first design means integration is feasible via APIs without rewriting. Risk: Medium. Estimated integration cost: $2-3M.' 'Data: Target's data model is incompatible with ours. Customer data unification requires a 6-month data mapping project. Risk: High — data is the primary value of this acquisition.' 'Technical debt: preliminary code review estimates $4M in deferred maintenance. This should be factored into acquisition price.' 'Total technology integration cost: $8-12M over 18 months, in addition to acquisition price.' Risk-adjusted recommendation: 'Proceed with acquisition only if technology integration costs are factored into the deal price. If deal price assumes zero integration cost, walk away.' Board-actionable: board can use this analysis to negotiate deal terms"
    weight: 0.30
    description: "M&A assessment"
