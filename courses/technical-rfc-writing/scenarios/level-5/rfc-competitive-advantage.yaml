meta:
  id: rfc-competitive-advantage
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Leverage RFCs as competitive advantage — show how structured technical decision-making creates organizational learning that compounds over time"
  tags: [RFC, competitive-advantage, organizational-learning, compounding, strategy, master]

state: {}

trigger: |
  You're presenting to the board of a technology company that's
  losing market share. The board's diagnosis: "Our competitors ship
  faster and make fewer costly mistakes. Their technology just works
  better." You believe the root cause isn't technology talent (your
  engineers are equally skilled) but decision-making infrastructure.

  Evidence:
  - Your competitors publish engineering blogs showing sophisticated
    decision processes (RFC archives, design reviews, tech radar)
  - Your company has no institutional memory — lessons from failed
    projects aren't captured
  - New engineers repeat mistakes that senior engineers made years ago
  - Technology choices are inconsistent — 5 teams solving the same
    problem 5 different ways
  - Technical debt accumulates because no one tracks decisions that
    create it

  Task: Write a board presentation (in RFC format) arguing that
  structured technical decision-making is a competitive advantage,
  not overhead. Quantify the impact of poor decision-making,
  propose a decision infrastructure investment, and show how
  better decisions compound over time.

assertions:
  - type: llm_judge
    criteria: "Poor decision-making costs are quantified with evidence — cost of duplicated effort: '5 teams solving the same caching problem = 4 redundant implementations × 3 engineer-weeks each = 12 engineer-weeks wasted × $X/week loaded cost = $Y. Applied across 20 common problems: estimated $Z million/year in duplicated engineering effort.' Cost of repeated mistakes: 'Analysis of last 12 production incidents: 4 were caused by anti-patterns that had been discovered and solved before but the knowledge was lost. Average incident cost: $A (engineer time + customer impact + reputation). Annual cost of repeated mistakes: $B.' Cost of inconsistent technology: '8 different caching solutions means 8 different sets of operational knowledge, 8 different monitoring approaches, 8 different failure modes. Operational overhead: estimated 30% more ops engineering time than necessary. Infrastructure cost: 15% higher due to inability to negotiate volume pricing or optimize a standard stack.' Cost of accumulated technical debt: 'Major refactoring projects triggered by past decisions made without adequate review: $C million in the last 2 years. Preventable with upfront decision review: estimated 60% of these projects.' Total estimated annual cost of unstructured decision-making: $D million (2-5% of engineering budget is typical for companies at our scale)"
    weight: 0.35
    description: "Quantified costs"
  - type: llm_judge
    criteria: "Compounding nature of better decisions is explained — compounding argument: 'Better decisions today create a better foundation for decisions tomorrow. This compounds: Year 1: structured decisions reduce duplicated effort by 50% (immediate ROI). Year 2: institutional memory prevents 70% of repeated mistakes (compounding ROI — built on Year 1 knowledge base). Year 3: consistent technology choices enable platform capabilities that individual teams couldn't build (multiplicative ROI — standard stack enables shared tooling). Year 5: decision infrastructure becomes a moat — competitors need years to build equivalent institutional knowledge.' Analogy for board: 'This is like compound interest for engineering capability. A 10% improvement in decision quality each year compounds to 60% improvement over 5 years. Our competitors who started this 3 years ago already have that compounding advantage.' Talent retention connection: 'Engineers want to work at companies with good decision-making processes. Poor decision-making leads to wasted work and frustration. Top engineers leave companies where their expertise is ignored. Decision infrastructure is a talent retention strategy.' Market evidence: 'Companies known for engineering excellence (Google, Stripe, Shopify) all have documented decision processes. This is not correlation — structured decision-making is a necessary component of engineering excellence at scale'"
    weight: 0.35
    description: "Compounding argument"
  - type: llm_judge
    criteria: "Investment proposal and ROI are board-actionable — proposed investment: 'Year 1: $X (tooling + 2 dedicated decision infrastructure engineers + training). Year 2: $Y (tooling maintenance + process refinement). Ongoing: $Z/year (process operation, tooling, and continuous improvement).' ROI projection: 'Conservative estimate: 3x return on investment by Year 2. Aggressive estimate: 7x return by Year 3. Based on: reduction in duplicated effort, reduction in preventable incidents, reduction in wasted migration projects, and improved engineering velocity.' Benchmarking: 'Industry analysis of companies that implemented structured decision processes shows: 20-30% reduction in project failure rates, 15-25% improvement in engineering velocity (measured by features shipped per engineer), 40-50% reduction in production incidents attributed to architectural decisions.' Success metrics for board tracking: 'Quarter 1: decision process adopted by 50% of teams (leading indicator). Quarter 2: first measurable reduction in duplicated technology initiatives. Quarter 4: engineering satisfaction survey shows improvement in decision quality perception. Year 1: incident rate attributed to architectural decisions reduced by 30%. Year 2: independent engineering efficiency audit shows improvement.' Risk of not investing: 'Competitors who invest in decision infrastructure will compound their advantage. Gap widens by approximately 10% per year. Within 3 years, the efficiency gap becomes a strategic disadvantage that cannot be closed quickly'"
    weight: 0.30
    description: "Investment proposal"
