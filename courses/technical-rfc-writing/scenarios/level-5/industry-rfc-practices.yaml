meta:
  id: industry-rfc-practices
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Analyze industry RFC practices — compare and synthesize RFC approaches from Google, Amazon, Meta, Spotify, and IETF to design best-in-class processes"
  tags: [RFC, industry-practices, Google, Amazon, IETF, benchmarking, master]

state: {}

trigger: |
  You're a technology consultant hired by a late-stage startup
  (Series D, 800 engineers) preparing for IPO. The board wants
  "enterprise-grade technical governance" before going public. The
  CTO asks you to analyze how the best technology companies handle
  technical decision-making and design a process that takes the
  best from each.

  You need to evaluate:
  - Google's design doc process
  - Amazon's 6-pager/PRFAQ approach
  - Meta's (Facebook's) diff-based review culture
  - Spotify's guild and chapter model for technical alignment
  - IETF's formal RFC process for standards
  - Uber's and Stripe's engineering blogs on design reviews

  Task: Write an analysis of industry RFC practices, identify what
  works at each company and why, and synthesize a recommended
  approach for the client. Show how different organizational
  contexts require different approaches and how to adapt industry
  practices rather than blindly copying them.

assertions:
  - type: llm_judge
    criteria: "Each company's approach is accurately analyzed with strengths and limitations — Google design docs: 'Strengths: lightweight template, asynchronous review, strong engineering culture of feedback. Author proposes, reviewers critique, but author owns the decision. This works because Google hires engineers with strong technical judgment.' Limitation: 'Relies on hiring bar — less effective if engineering judgment varies widely.' Amazon 6-pager: 'Strengths: narrative format forces clear thinking (you can't hide confusion in bullet points). Silent reading period at start of meeting ensures everyone actually reads the document. PRFAQ format for customer-facing decisions forces outside-in thinking.' Limitation: 'Heavyweight — 6 pages of prose is significant effort for routine technical decisions.' Meta: 'Strengths: code-centric review culture means decisions are made close to implementation. Diff-based discussions keep design and implementation aligned.' Limitation: 'Can under-invest in upfront design for large architectural changes.' Spotify: 'Strengths: guilds create cross-team alignment without top-down mandates. Technical alignment emerges from community rather than authority.' Limitation: 'Voluntary alignment can fragment when guilds disagree.' IETF: 'Strengths: formal process ensures thorough review for standards that must be correct. Consensus-driven decision making.' Limitation: 'Too slow for commercial software development — appropriate for standards, not product features'"
    weight: 0.35
    description: "Industry analysis"
  - type: llm_judge
    criteria: "Synthesis adapts practices to client's context — client context assessment: '800 engineers, pre-IPO, need governance that satisfies board/auditors without slowing growth. Engineers are mostly senior (startup culture) but need to onboard 200+ post-IPO. Mix of move-fast consumer product teams and careful infrastructure/payments teams.' Recommended synthesis: 'From Google: lightweight template and author-owns-decision model for most RFCs. Keeps velocity high while documenting decisions. From Amazon: 6-pager format for Tier 3-4 decisions (cross-BU, strategic). Narrative format forces rigor where it matters most. From Spotify: guild model for technology alignment on shared concerns (observability, security, API standards). Bottom-up alignment complements top-down governance. From IETF: formal review process only for external-facing standards (API contracts, data formats used by partners). From Meta: tight coupling between design docs and implementation — RFC links to implementation PRs for traceability.' What NOT to adopt: 'Not Amazon's 6-pager for routine decisions (too heavy). Not IETF's consensus process (too slow for product development). Not Meta's code-only approach for strategic decisions (insufficient upfront design for cross-BU initiatives).' Adaptation principle: 'Every practice must earn its place in the process. Adopt it because it solves a specific problem in our context, not because a prestigious company uses it'"
    weight: 0.35
    description: "Contextual synthesis"
  - type: llm_judge
    criteria: "IPO readiness and maturity progression are addressed — IPO governance requirements: 'Public company technology governance requires: documented decision processes (RFC process provides this), risk management framework (tiered RFC review provides this), audit trail for material technology decisions (RFC archive provides this), board-level technology oversight (quarterly technology governance report from Tier 4 RFC summaries).' Maturity model: 'Level 1 (Current): ad hoc decisions, some documentation. Level 2 (6 months): lightweight RFC process for cross-team decisions, template and tooling in place. Level 3 (12 months): full tiered RFC process with compliance integration, guild model for alignment. Level 4 (18 months): enterprise governance with board reporting, M&A technology assessment, technology radar. Level 5 (24 months): data-driven governance — decision quality metrics, feedback loops, continuous process improvement.' Current assessment: 'Client is at Level 1. IPO requires Level 3 minimum. Recommend aggressive implementation to reach Level 3 within 12 months.' Post-IPO evolution: 'As the company grows post-IPO (800 → 2000+ engineers), the governance framework scales through delegation (BU architects), automation (compliance checks), and culture (engineering community ownership of standards). The framework is designed to grow with the company, not be replaced'"
    weight: 0.30
    description: "IPO readiness"
