meta:
  id: ma-technology-integration
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Write M&A technology integration RFCs — evaluate and plan technology integration for mergers and acquisitions with due diligence, risk assessment, and integration roadmaps"
  tags: [RFC, M&A, integration, due-diligence, acquisition, master]

state: {}

trigger: |
  Your company (1,500 engineers, $800M revenue) is acquiring a
  competitor ($200M revenue, 400 engineers). The deal closes in 90
  days. You're the CTO responsible for technology integration.

  Acquiree's technology:
  - Monolithic Java application (Spring Boot, 2M lines of code)
  - Oracle database (500GB, 300+ tables)
  - On-premise data centers (2 locations)
  - Custom-built CI/CD on Jenkins
  - 15-year-old codebase with significant technical debt
  - Strong domain expertise in their engineering team

  Your technology:
  - Microservices architecture (Node.js, Go)
  - PostgreSQL and DynamoDB on AWS
  - Kubernetes on AWS
  - Modern CI/CD (GitHub Actions)
  - 5-year-old codebase, relatively modern

  Board expectations: "Combined platform within 18 months. $30M
  annual synergy target from technology consolidation."

  Task: Write the technology integration RFC. Address: due diligence
  findings, integration strategy (absorb, preserve, or transform),
  talent retention, timeline, cost, and realistic synergy projections.
  Be honest about what the board's timeline and synergy targets mean
  in practice.

assertions:
  - type: llm_judge
    criteria: "Due diligence is thorough and honest about challenges — technical assessment: 'Positive: acquiree's domain logic is well-encapsulated despite monolithic architecture. Data model is normalized and well-documented. Engineering team has deep domain expertise that's critical to retain. Test coverage is 65% (higher than expected for a 15-year codebase).' Challenges: 'Oracle license costs $X/year — migration to PostgreSQL is a significant project. On-premise data centers have 18-month lease obligations. Jenkins CI/CD has custom plugins that don't translate to GitHub Actions. Java Spring Boot monolith cannot be directly integrated with Node.js microservices — requires API layer.' Technical debt assessment: '$8-12M estimated remediation cost. Critical items: security vulnerabilities in 3 Java dependencies (patch within 30 days), no encryption at rest for customer data (compliance risk), no automated disaster recovery.' Integration complexity rating: 'High. This is not a bolt-on acquisition — it requires significant engineering investment to realize the promised synergies.' Honest assessment of board expectations: 'The 18-month timeline for combined platform is aggressive. Realistic timeline: 24-30 months for full integration, with partial integration (API interoperability) achievable at 12 months'"
    weight: 0.35
    description: "Honest due diligence"
  - type: llm_judge
    criteria: "Integration strategy balances speed with risk and talent retention — strategy: 'Phase 1 (Months 1-6): PRESERVE. Keep acquiree systems running as-is. Focus on: security remediation, API bridge between systems (customers get unified experience via API gateway), unified authentication (SSO across both platforms), data replication for unified reporting. No rewriting, no migration.' Phase 2 (Months 7-18): TRANSFORM incrementally. Extract highest-value domain services from monolith as independent microservices. Start with customer-facing features that need cross-platform integration. Oracle → PostgreSQL migration for extracted services (not big-bang database migration). Phase 3 (Months 19-30): CONSOLIDATE. Remaining monolith functionality migrated or deprecated. Data centers decommissioned (after lease expiration). Unified platform operational.' Talent retention strategy: 'The acquiree's 400 engineers are the acquisition's most valuable asset — they understand the domain. Integration approach must not: (1) tell them their technology is inferior, (2) force them to learn a completely new stack immediately, (3) make their expertise irrelevant. Instead: Java engineers lead the domain service extraction (they understand the business logic), receive training in Go/Node.js as services are extracted, and become domain experts in the combined organization. Retention packages tied to integration milestones. Target: 85% engineer retention through integration'"
    weight: 0.35
    description: "Integration strategy"
  - type: llm_judge
    criteria: "Synergy projections are realistic and staged — board's $30M target analyzed: 'Achievable synergies: Infrastructure consolidation ($8M/year — Oracle license elimination $3M, data center decommission $3M, cloud optimization $2M). Reachable by Month 24. Engineering efficiency ($12M/year — shared platform reduces duplicated capabilities, unified CI/CD, shared monitoring). Reachable by Month 30. Revenue synergy ($5M/year — cross-selling enabled by unified platform, combined product offerings). Reachable by Month 18 for API-bridged features. Total achievable: $25M/year at steady state (Month 30+).' What's NOT achievable: 'The $30M target assumes $5M in headcount synergies (reducing combined engineering team). Recommendation: do NOT reduce engineering headcount during integration. The combined team is needed for the integration work itself. Headcount synergies, if any, should be evaluated at Month 30+ after integration is stable.' Integration costs: 'Year 1: $10M (integration engineering, cloud migration, tooling). Year 2: $6M (continued migration, optimization). Total integration investment: $16M. Net synergy timeline: integration investment recovered by Month 30. Positive ROI from Month 30 onward.' Risk to synergies: 'If talent retention drops below 70%, domain knowledge loss delays integration by 6-12 months and reduces achievable synergies by 30-40%. Talent retention is the single highest-risk factor for integration success'"
    weight: 0.30
    description: "Realistic synergies"
