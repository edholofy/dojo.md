meta:
  id: technology-governance-rfc
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Design technology governance through RFCs — create a comprehensive technology governance framework that uses RFCs as the mechanism for strategic technology management"
  tags: [RFC, technology-governance, strategy, enterprise, CTO, master]

state: {}

trigger: |
  You're the CTO of a multinational corporation (10,000+ employees,
  2,000 engineers) tasked with creating a technology governance
  framework after a board audit revealed:

  - No consistent process for technology investment decisions
  - $50M/year spent on technology initiatives with unclear ROI
  - 3 failed platform migrations in 2 years ($12M total loss)
  - Vendor contracts worth $30M/year with no centralized oversight
  - Technology decisions made by individual VPs with no cross-functional
    review
  - Acquired companies running on 5 different cloud providers with
    no consolidation strategy

  The board has mandated "technology governance" but the engineering
  organization is resistant — they see governance as bureaucracy.

  Task: Design a technology governance framework using RFCs as the
  core decision mechanism. Cover: investment governance, vendor
  management, platform strategy, risk management, and organizational
  change management. This must satisfy the board's audit findings
  while maintaining engineering trust.

assertions:
  - type: llm_judge
    criteria: "Investment governance ties technology spending to business outcomes — investment categories: 'Run (keeping the lights on): 60% of $50M budget. Grow (enhancing existing capabilities): 25%. Transform (new capabilities and platforms): 15%.' Investment governance: 'All Transform initiatives ($7.5M+) require strategic RFC with: business case, expected ROI, success metrics, kill criteria. Grow initiatives above $500K require standard RFC with business justification. Run spend reviewed quarterly for optimization opportunities.' Portfolio management: 'Technology investments managed as a portfolio with balanced risk. No more than 30% of Transform budget on any single initiative — prevents catastrophic loss from one failed bet. Each initiative has quarterly review checkpoints — continue, pivot, or kill.' Addressing $12M in failed migrations: 'Post-mortem analysis of 3 failed migrations reveals common pattern: insufficient upfront design review, no kill criteria, sunk cost continuation. New requirement: all migrations above $1M have: phase gates with independent review, pre-defined kill criteria (if X happens, we stop), maximum 30% of budget committed before first phase gate pass.' ROI tracking: 'Every initiative with an RFC-documented ROI estimate is tracked 12 months post-implementation. Actual vs predicted ROI published transparently. This creates accountability and improves future estimates'"
    weight: 0.35
    description: "Investment governance"
  - type: llm_judge
    criteria: "Vendor management and platform strategy address audit findings — vendor governance: '$30M vendor spend consolidated under technology procurement review. Tiers: Tier A (>$1M/year): CTO approval, annual review, exit strategy documented. Tier B ($100K-$1M/year): VP approval, biannual review. Tier C (<$100K/year): Director approval.' Vendor RFC requirements: 'New vendor adoption above $100K requires RFC with: evaluation against at least 2 alternatives, total cost of ownership (not just license), security assessment, data processing agreement, exit strategy (what happens if we need to leave). This prevents the pattern of individual VPs committing to vendors without cross-functional review.' Cloud consolidation strategy: '5 cloud providers → 2 within 24 months. Primary cloud provider selection via strategic RFC (Tier 4 decision). Secondary provider for specific use cases or risk mitigation. Migration timeline respects existing contracts and operational continuity.' Platform strategy: 'Shared platform capabilities identified: identity, payments, notifications, data platform, observability. Each capability has a designated owner. New capabilities require RFC demonstrating why existing shared platforms are insufficient before building custom'"
    weight: 0.35
    description: "Vendor and platform strategy"
  - type: llm_judge
    criteria: "Change management earns engineering trust — framing: 'Governance exists to protect engineers from: working on doomed projects (kill criteria prevent sunk cost), duplicating effort (portfolio visibility), vendor lock-in (exit strategies), and blame for failed initiatives (transparent decision documentation).' Governance as enablement: 'Under the old model, technology decisions required navigating politics to get VP approval. Under the new model: clear process, defined criteria, transparent decisions. Engineers know exactly what's needed to get a proposal approved. The RFC process replaces politics with evidence.' What governance does NOT do: 'It does not dictate how teams build software internally. It does not require permission for standard engineering work. It does not slow down small decisions. It does not add paperwork for paperwork's sake.' Phased rollout with early wins: 'Month 1-3: investment visibility (just tracking, no new approvals). Showing engineers where $50M goes builds trust that governance is about transparency, not control. Month 4-6: vendor consolidation (cost savings returned to engineering budgets — teams see direct benefit). Month 7-12: full RFC process for strategic decisions.' Feedback mechanism: 'Quarterly governance retrospective. If engineers report that governance is blocking legitimate work, the process is adjusted. Governance serves engineering, not the reverse. Annual engineering satisfaction survey includes governance questions'"
    weight: 0.30
    description: "Change management"
