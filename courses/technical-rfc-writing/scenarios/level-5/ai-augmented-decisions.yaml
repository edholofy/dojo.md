meta:
  id: ai-augmented-decisions
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Design AI-augmented decision making — integrate AI tools into the RFC process for analysis, review assistance, and decision quality improvement at enterprise scale"
  tags: [RFC, AI, decision-making, augmented, enterprise, master]

state: {}

trigger: |
  You're the CTO of a technology company exploring how AI can
  improve your RFC and technical decision-making process. Your
  organization writes 50+ RFCs per month across 500 engineers.

  Current pain points:
  - Reviewers are overwhelmed (average engineer reviews 4 RFCs/week)
  - Historical decisions are hard to find (1,000+ archived RFCs)
  - Similar proposals are submitted independently by different teams
  - Risk sections are consistently the weakest part of RFCs
  - New engineers can't find relevant past decisions during onboarding
  - Decision quality varies significantly between experienced and
    junior RFC authors

  You want to explore using AI (LLMs, embeddings, semantic search)
  to augment — not replace — human technical decision-making.

  Task: Write an RFC proposing AI integration into your decision-
  making process. Address: where AI adds value vs where human
  judgment is essential, ethical considerations, implementation plan,
  and how to avoid AI-washing (adding AI where it doesn't help).

assertions:
  - type: llm_judge
    criteria: "AI integration points are specific and genuinely valuable — high-value AI applications: (1) Semantic search over RFC archive: 'Embedding-based search enables finding relevant past decisions using natural language queries. Engineer asks: how did we handle rate limiting? System returns the 3 most relevant RFCs from 1,000+ archive. This solves the onboarding problem and prevents duplicated proposals.' (2) Duplicate detection: 'When a new RFC is drafted, automatically surface similar active or past proposals. Prevents 2 teams independently proposing the same solution.' (3) Risk analysis assistance: 'AI reviewer suggests risks the author may have missed by comparing with similar past RFCs and common failure patterns. Example: RFC proposes database migration → AI suggests: previous migration RFCs identified connection string coordination as a common risk — is this addressed?' (4) Review triage: 'AI pre-screens RFCs for completeness (all required sections filled), consistency (success metrics match problem statement), and scope (flags potential scope issues). Reviewers spend time on substance, not checklists.' Each application has a clear problem it solves and a metric for success"
    weight: 0.35
    description: "Valuable AI integration"
  - type: llm_judge
    criteria: "Human judgment boundaries are clearly drawn — AI does NOT: 'Make approval decisions. Evaluate technical correctness. Assess organizational feasibility. Judge the quality of an engineer's thinking. Score or rank RFC authors.' Why: 'Technical decision-making requires context that AI cannot fully capture: organizational politics, team capabilities, strategic direction, and the nuances of why a particular approach fits this team at this time. AI can surface information; humans must judge it.' AI as assistant, not authority: 'AI suggestions are clearly labeled as AI-generated. Reviewers can dismiss or incorporate AI suggestions at their discretion. No RFC is auto-approved or auto-rejected based on AI analysis.' Quality risks addressed: 'AI hallucination risk: AI suggestions are reference points, not facts. All AI-surfaced past decisions include links to original RFCs for verification. AI bias: regularly audit AI suggestions for patterns that favor certain technologies, authors, or approaches. Over-reliance: engineers must be able to write and review RFCs without AI. AI augments the process; it is not required for the process to function.' Ethical considerations: 'RFC content may contain proprietary technical strategy. AI models must be self-hosted or under strict data processing agreements. No RFC content sent to external AI services without explicit approval'"
    weight: 0.35
    description: "Human judgment boundaries"
  - type: llm_judge
    criteria: "Implementation avoids AI-washing and measures real impact — anti-AI-washing criteria: 'For each proposed AI feature, we answer: (1) What specific problem does this solve? (2) How is this problem currently handled without AI? (3) What measurable improvement do we expect? (4) Would a simpler non-AI solution work? If a keyword search solves the problem, we don't need embeddings.' Phased rollout: 'Phase 1 (Month 1-3): semantic search over RFC archive. Lowest risk, highest immediate value. Success metric: time-to-find-relevant-past-decision reduced from average 45 minutes to under 5 minutes. Phase 2 (Month 4-6): duplicate detection and completeness checking. Success metric: duplicate proposals detected before review (target: catch 80% of duplicates). Phase 3 (Month 7-9): risk analysis suggestions. Success metric: reviewer satisfaction with risk sections improves by 30%. Phase 4 (Month 10-12): review triage and prioritization. Success metric: reviewer time per RFC reduced by 25% without decrease in review quality.' Kill criteria per phase: 'If measurable improvement is less than 50% of target, reassess approach before proceeding. AI features that don't demonstrably improve decision quality are removed.' Cost-benefit: 'Implementation cost: $X (engineering time + infrastructure). Expected value: $Y (reviewer time saved × hourly cost + duplicate effort avoided + improved decision quality). Feature must have positive ROI within 12 months of deployment or it's discontinued'"
    weight: 0.30
    description: "Measured implementation"
