meta:
  id: rfc-program-maturity
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Assess and advance RFC program maturity — evaluate an organization's decision-making maturity and create a roadmap for advancement"
  tags: [RFC, maturity-model, assessment, organizational-development, improvement, master]

state: {}

trigger: |
  You're a technology consulting partner brought in by the board of
  a public company to assess their technology decision-making
  maturity. The company has 3,000 engineers and has been growing by
  acquisition (4 companies in 3 years). Each acquired company brought
  its own decision-making process (or lack thereof).

  Current state across the combined organization:
  - Parent company: mature RFC process, 500+ archived decisions
  - Acquisition 1 (2 years ago): adopted parent's RFC process but
    compliance is inconsistent
  - Acquisition 2 (18 months ago): uses Amazon-style 6-pagers for
    some decisions, nothing for others
  - Acquisition 3 (1 year ago): informal Slack-based decisions, no
    documentation
  - Acquisition 4 (6 months ago): no process at all, decisions by
    loudest voice

  Task: Create a maturity assessment framework, assess the current
  organization, and provide a roadmap for reaching target maturity.
  Show how to harmonize different decision-making cultures without
  destroying what works at each unit.

assertions:
  - type: llm_judge
    criteria: "Maturity model is comprehensive and measurable — maturity levels defined: Level 1 (Ad Hoc): decisions made informally, no documentation, knowledge in individuals' heads. Indicator: 'How was this decided?' has no documented answer for 80%+ of technical decisions. Level 2 (Documented): some decisions documented post-hoc, inconsistent format, no review process. Indicator: documentation exists for 30-50% of significant decisions but is not systematically reviewed. Level 3 (Structured): defined RFC process with templates, review workflows, and approval criteria. 60-80% of significant decisions go through process. Level 4 (Managed): RFC process with metrics, feedback loops, outcome tracking. Process continuously improved based on data. 80%+ compliance. Decision quality measured. Level 5 (Optimizing): decision-making is a strategic capability. Institutional memory actively maintained. Decision patterns identified and shared. Organization learns from past decisions systematically. Assessment criteria per level: (1) Process existence, (2) Template/format consistency, (3) Review quality, (4) Decision traceability, (5) Outcome tracking, (6) Institutional memory, (7) Cross-team coordination. Each criterion scored 1-5"
    weight: 0.35
    description: "Maturity model"
  - type: llm_judge
    criteria: "Current organization is assessed with specific findings per unit — parent company: 'Level 3.5. Strong RFC process and archive. Gap: outcome tracking is minimal — we know what was decided but not whether it worked. Review quality varies — some RFCs rubber-stamped. Recommendation: advance to Level 4 with outcome tracking and review quality metrics.' Acquisition 1: 'Level 2.5. Adopted RFC process but inconsistent compliance (estimated 40% of significant decisions documented). Cultural issue: engineers see RFCs as parent company bureaucracy, not a tool that helps them. Recommendation: demonstrate value by connecting RFC process to incident prevention — show that undocumented decisions caused 3 of their last 5 incidents.' Acquisition 2: 'Level 2. Amazon-style 6-pagers for major decisions are excellent but nothing for medium decisions. Binary: either 6-pager or nothing. Recommendation: introduce lightweight RFC track (mini-RFC) for medium decisions while preserving 6-pager for strategic ones.' Acquisition 3: 'Level 1.5. Slack decisions are fast but create knowledge loss and excluded remote team members. Recommendation: Slack-to-RFC bridge — decisions made in Slack are formalized into lightweight decision records within 24 hours.' Acquisition 4: 'Level 1. Highest priority for intervention — decisions by loudest voice creates toxic dynamics and poor outcomes. Recommendation: immediate introduction of structured RFC for any cross-team decision, with facilitated decision meetings replacing debate-by-volume'"
    weight: 0.35
    description: "Current assessment"
  - type: llm_judge
    criteria: "Roadmap harmonizes cultures without destroying what works — harmonization principle: 'The goal is not identical processes across all units — it is interoperable processes that ensure: decisions are documented, decisions are reviewed, and decisions can be found by anyone in the organization.' What's preserved: 'Acquisition 2's 6-pager practice for strategic decisions is preserved and offered as an option for other units. Parent company's RFC archive and templates are shared as resources, not mandated.' What's standardized: 'Minimum standards all units must meet within 12 months: (1) all cross-team decisions documented in a searchable repository, (2) significant decisions reviewed by at least one person outside the author's team, (3) decision records include: what was decided, why, what alternatives were considered, and who approved.' What's shared: 'Common tooling (shared RFC platform), common search (all decisions searchable across units), common metrics (dashboard showing decision process health per unit).' Roadmap: 'Months 1-3: assessment and quick wins (Acquisition 4 gets basic RFC process, Acquisition 3 gets Slack-to-RFC bridge). Months 4-8: minimum standards rollout with per-unit coaching. Months 9-12: unified tooling and cross-unit decision visibility. Months 13-18: advance all units to Level 3+. Months 19-24: target Level 4 for parent company and Acquisition 1, Level 3 for others.' Success metrics: 'All units at Level 3+ within 18 months. Cross-unit decision conflicts (same problem solved independently) reduced to zero. New employee time-to-find-relevant-decision under 10 minutes'"
    weight: 0.30
    description: "Harmonization roadmap"
