meta:
  id: master-rfc-shift
  level: 5
  course: technical-rfc-writing
  type: output
  description: "Master RFC shift simulation — design and present a comprehensive technology transformation strategy through the RFC medium, demonstrating mastery of all RFC writing skills at executive and board level"
  tags: [RFC, shift-simulation, transformation, board-level, mastery, master]

state: {}

trigger: |
  You are the incoming CTO of a publicly traded company ($2B revenue,
  8,000 employees, 3,000 engineers) that has fallen behind
  technologically. The board hired you specifically to lead a
  technology transformation. Your first 90 days are up and you need
  to present your technology transformation strategy.

  Situation assessment:
  - Core platform is 12 years old, built on technologies that are
    now end-of-life
  - 60% of engineering time spent on maintenance, 40% on new features
    (industry benchmark: 30/70)
  - Customer NPS for product reliability: 35 (industry average: 60)
  - 3 attempted modernization efforts failed in the last 5 years
    ($40M spent with no significant improvement)
  - Talent attrition is 25% annually (engineers leaving for companies
    with modern stacks)
  - The company has strong market position and customer relationships
    — technology is the bottleneck

  The board wants a 3-year transformation plan. The engineering
  organization is demoralized from 3 failed attempts. The CEO says
  "this is your one shot — if this fails, we'll outsource engineering."

  Task: Write the master RFC — a technology transformation strategy
  that addresses: technical architecture, organizational change,
  talent strategy, investment plan, risk management, board governance,
  and cultural renewal. This document must be simultaneously a
  detailed technical proposal, a business case, and an organizational
  change plan. Demonstrate mastery of every RFC skill at the highest
  level.

assertions:
  - type: llm_judge
    criteria: "Strategy addresses why previous attempts failed and how this one is different — failure analysis: 'Three previous modernization attempts failed because: (1) Attempt 1 (big-bang rewrite, $15M) failed because it tried to replace the entire platform at once. After 18 months with no user-visible improvement, the project was cancelled. (2) Attempt 2 (outsourced modernization, $12M) failed because external teams didn't understand the domain. Code was delivered but couldn't be maintained by internal teams. (3) Attempt 3 (microservices migration, $13M) failed because it started with the hardest, most coupled components rather than the most independent.' How this strategy differs: '(1) Incremental value delivery — every 90 days, a measurable improvement ships to customers. No 18-month wait for results. (2) Internal teams lead — external partners support but don't own. Knowledge stays in-house. (3) Start with the edges, not the core — decouple independent features first, build confidence and capability, then tackle the core. (4) Kill criteria — if any phase doesn't deliver expected value, we stop and reassess. No sunk cost continuation.' Cultural messaging: 'This is not Modernization Attempt 4. This is a continuous improvement program with modernization milestones. We're not betting the company on a single big project — we're building a capability for continuous evolution'"
    weight: 0.35
    description: "Failure-informed strategy"
  - type: llm_judge
    criteria: "Multi-dimensional transformation covers technical, organizational, and cultural change — technical: '3-year architecture roadmap. Year 1: stabilize and decouple (reduce incidents by 50%, extract 5 independent services from monolith). Year 2: modernize core (replace end-of-life components, migrate primary database). Year 3: accelerate (new features on modern platform, 70/30 innovation/maintenance ratio achieved).' Organizational: 'Team restructuring from component teams to product teams. Platform team established to provide shared infrastructure. Architecture guild for cross-team alignment. Rotation program to spread modernization expertise.' Talent: 'Reverse the 25% attrition: competitive compensation benchmarking (immediate), modern technology stack (Year 1-2), meaningful work (shifting from maintenance to innovation). Hiring: 15 senior engineers with modernization experience in Year 1 to seed knowledge. Training: all engineers receive training on modern stack within 6 months.' Cultural: 'Shift from learned helplessness (3 failures) to earned confidence. Celebrate early wins publicly. Transparency about challenges — no over-promising. Monthly engineering all-hands showing measurable progress. RFC process for decision-making — engineers have voice in transformation direction.' Investment: 'Year 1: $25M (stabilization, team building, initial decoupling). Year 2: $30M (core modernization, infrastructure). Year 3: $20M (acceleration, optimization). Total: $75M over 3 years.'"
    weight: 0.35
    description: "Multi-dimensional plan"
  - type: llm_judge
    criteria: "Board governance and risk management inspire confidence — board reporting structure: 'Quarterly transformation review with board technology committee. Metrics dashboard: engineering time split (maintenance vs innovation), customer NPS for reliability, talent attrition rate, incident frequency, deployment frequency. Each metric has a Year 1, Year 2, Year 3 target with current baseline.' Risk management for a $75M investment: 'Phase gates every 6 months. Each phase gate evaluates: are we delivering expected value? Is the investment on track? Should we continue, adjust, or stop? Kill criteria: if after 12 months, maintenance ratio hasn't improved by at least 5 percentage points, fundamental reassessment required.' Scenario planning: 'Best case: transformation complete in 2.5 years, $65M spent, engineering efficiency exceeds industry benchmarks. Expected case: transformation in 3 years, $75M spent, engineering efficiency reaches industry average. Worst case: transformation stalls at 18 months, $40M spent, reassess approach (not abandon — domain expertise and market position still strong).' CEO commitment: 'This transformation requires sustained investment through years of compounding improvement. The temptation to cut funding after Year 1 (before returns are fully visible) must be resisted. Board commitment to 3-year funding horizon is a prerequisite, not a nice-to-have.' The RFC should leave the board feeling: 'This is a credible plan from a leader who has learned from past failures, understands the risks, and has a realistic path to success'"
    weight: 0.30
    description: "Board confidence"
