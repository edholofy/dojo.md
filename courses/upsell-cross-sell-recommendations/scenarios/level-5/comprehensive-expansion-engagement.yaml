meta:
  id: comprehensive-expansion-engagement
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Lead a comprehensive expansion transformation — integrate all expansion disciplines into a cohesive capability that makes customer expansion the primary growth engine and competitive moat"
  tags: [sales, upsell, cross-sell, comprehensive, transformation, growth-engine, master]

state: {}

trigger: |
  You've been hired as the first Chief Growth Officer (CGO) at
  "NexGenSaaS" ($1B ARR, targeting $3B in 5 years). The CEO created
  this role specifically to make customer expansion the company's
  primary competitive advantage. Your mandate: build a world-class
  expansion function that produces 60% of all growth (currently 25%).

  Starting position:
  - $1B ARR, 12,000 customers, 40 countries
  - NRR: 108% (target: 130%+ within 3 years)
  - Expansion as % of growth: 25% (target: 60%)
  - Expansion team: 45 people (scattered across CS, Sales, Ops)
  - No unified expansion strategy, no AI, no customer marketing
  - Average expansion deal size: $35K
  - Expansion close rate: 25%
  - Estimated annual value leakage: $300M

  Your budget: $25M over 3 years
  Your headcount authority: 0 → 120+ (expansion team)

  CEO's vision:
  "In 3 years, I want analysts to cite our expansion capability as
  the reason to buy our stock. I want customers to expand because our
  experience is so good they naturally want more. I want competitors
  to study our expansion playbook. And I want to capture $200M of the
  $300M we're currently leaking."

  The challenge:
  Simultaneously build 10 capabilities:
  1. Expansion strategy and playbook
  2. Expansion organization (team, roles, structure)
  3. Expansion analytics and AI
  4. Product-led expansion
  5. Customer marketing for expansion
  6. Partner expansion program
  7. Executive sponsor program
  8. Expansion compensation alignment
  9. Global expansion standardization
  10. Expansion thought leadership and category creation

  Tasks:
  1. Write the "CGO 100-Day Plan" — your first 100 days. Days 1-30:
     Assessment and quick wins. Days 31-60: Strategy and design.
     Days 61-100: Launch and early wins. Include deliverables, key
     hires, stakeholder engagement, and first metrics report.

  2. Write the "3-Year Expansion Transformation Roadmap" — the
     comprehensive plan. Year 1: Foundation (org build, playbook, tech,
     basic analytics). Year 2: Acceleration (AI, customer marketing,
     global scaling, partner program). Year 3: Excellence (predictive
     models, category leadership, public company optimization). For
     each year: initiatives, budget, headcount, technology, expected
     NRR and expansion revenue impact, and risks.

  3. Write the "Competitive Moat Thesis" — how expansion capability
     becomes an unassailable competitive advantage. Include: the
     customer experience advantage, the data advantage (12,000 accounts
     of expansion data creates AI superiority), the talent advantage
     (top expansion talent wants to work at the best), the ecosystem
     advantage (partners and marketplace amplify expansion), the brand
     advantage (thought leadership establishes authority), and the
     financial advantage (expansion economics fund more expansion
     investment, creating a virtuous cycle).

assertions:
  - type: llm_judge
    criteria: "100-day plan builds CGO credibility — assessment, design, and launch phases with quick wins, key hires, and metrics that establish the expansion function"
    weight: 0.35
    description: "Credibility-building 100-day plan"
  - type: llm_judge
    criteria: "3-year roadmap transforms at scale — 10 capabilities built across 3 phases with budget, headcount, technology, NRR projections, and risks for a $1B company"
    weight: 0.35
    description: "Scale-appropriate transformation roadmap"
  - type: llm_judge
    criteria: "Competitive moat thesis is compelling — customer experience, data, talent, ecosystem, brand, and financial advantages that create a defensible expansion capability"
    weight: 0.30
    description: "Compelling competitive moat thesis"
