meta:
  id: expansion-category-creation
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Create a new category around expansion — position your company as the definitive leader in 'customer expansion intelligence' by creating and owning a new market category"
  tags: [sales, upsell, cross-sell, category-creation, positioning, market, master]

state: {}

trigger: |
  You're the CEO of "ExpansionIQ" — a startup ($15M ARR, Series B)
  that has built an AI-powered platform specifically for identifying,
  prioritizing, and executing customer expansion opportunities. You
  compete in the "customer success platform" category against Gainsight,
  ChurnZero, Totango, and others. But your investors and board believe
  you should create and own a new category: "Customer Expansion
  Intelligence."

  Why category creation:
  - Customer success platforms focus on retention (preventing churn)
  - Your platform focuses on growth (driving expansion)
  - The CS platform market is commoditizing (features converging)
  - Analysts group you with CS platforms, which limits your valuation
  - A new category would position you as the leader, not a follower

  Your differentiation:
  - AI-powered expansion signal detection (no CS platform has this)
  - Predictive NRR modeling (unique capability)
  - Expansion-optimized pricing recommendations
  - Cross-sell intelligence from product usage data
  - Expansion pipeline management (purpose-built, not CRM adapted)

  Market data:
  - CS platform market: $2.5B, growing 18% YoY
  - Estimated "expansion intelligence" market: $800M (subset of CS +
    RevOps + product analytics markets)
  - Potential market in 5 years: $4B (as companies shift focus from
    retention to expansion)
  - Your current market share of CS platforms: 0.6%
  - Your potential market share of expansion intelligence: 15-20%

  Category creation requirements:
  1. Define the category (what it is, what it isn't)
  2. Establish the problem (why existing categories fail)
  3. Position yourself as the obvious leader
  4. Get analysts, press, and customers to use the term
  5. Build a community around the category

  Tasks:
  1. Write the "Category Definition Document" — the foundational
     document that defines Customer Expansion Intelligence. Include:
     the category name and definition, the problem statement (why
     existing tools fail at expansion), the buyer persona (who buys
     this, what title, what budget), the category landscape (who else
     could be in this category and how you differ), the evaluation
     criteria (what buyers should look for when evaluating solutions
     in this category), and the market sizing (current and projected).

  2. Write the "Category Creation Go-to-Market Plan" — how to launch
     and establish the category. Include: the analyst relations strategy
     (how to get Gartner/Forrester to recognize the category), the
     content strategy (thought leadership that educates the market),
     the community building plan (events, user groups, industry
     association), the customer advocacy program (getting customers
     to evangelize the category), the PR strategy (media placements,
     speaking engagements, awards), and the competitive positioning
     (how to handle existing CS platforms' inevitable response).

  3. Write the "Category Economics Thesis" — the financial argument
     for why this category deserves investment. Include: the market
     creation opportunity ($800M → $4B), the category leader economics
     (why the category creator captures disproportionate value), the
     valuation impact (category leaders trade at premium multiples),
     the customer acquisition advantage (category leader = default
     choice), and the competitive moat (why followers can't easily
     replicate the category leadership position).

assertions:
  - type: llm_judge
    criteria: "Category definition is compelling and clear — name, problem statement, buyer persona, landscape, evaluation criteria, and market sizing that could establish a new market"
    weight: 0.35
    description: "Compelling category definition"
  - type: llm_judge
    criteria: "GTM plan covers all category creation channels — analyst relations, content, community, customer advocacy, PR, and competitive positioning for comprehensive market creation"
    weight: 0.35
    description: "Comprehensive category creation GTM"
  - type: llm_judge
    criteria: "Economics thesis justifies investment — market creation, category leader economics, valuation impact, and competitive moat arguments that would convince investors"
    weight: 0.30
    description: "Investor-convincing economics thesis"
