meta:
  id: behavioral-expansion-science
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Apply behavioral science to expansion — design expansion experiences that leverage cognitive biases, habit formation, and decision architecture to increase upgrade and cross-sell rates"
  tags: [sales, upsell, cross-sell, behavioral-science, psychology, decision-design, master]

state: {}

trigger: |
  You're a Behavioral Science Advisor to the CPO at "BehaviorGrow"
  ($250M ARR, 4,000 customers). The company has hired you to apply
  behavioral science principles to their expansion experience. Your
  research has identified specific cognitive patterns that affect
  expansion decisions.

  Research findings from analyzing 5,000 expansion interactions:

  Finding 1 — Status quo bias: 78% of customers who should upgrade
  based on usage data choose to stay on their current plan. The effort
  of evaluating and changing plans outweighs the perceived benefit.

  Finding 2 — Anchoring in upgrades: When customers see their current
  price first, they anchor on it and perceive the upgrade as "expensive."
  When they see the value delivered first, willingness to pay increases
  by 35%.

  Finding 3 — Peak-end rule: Customers who had a recent positive
  experience (resolved support ticket, successful QBR, feature launch
  they love) are 3.2x more likely to accept an expansion proposal.

  Finding 4 — Social proof: Customers who see "72% of companies your
  size use the Professional tier" are 28% more likely to upgrade.
  Industry-specific proof is 40% more effective.

  Finding 5 — Default effect: When the "recommended" tier is pre-
  selected in proposals, selection rate increases by 45% vs presenting
  all tiers equally.

  Finding 6 — Decoy pricing: Adding a strategically priced option
  between Professional ($50/user) and Enterprise ($90/user) at $75/user
  with fewer features than Enterprise increases Enterprise selection by
  22%.

  Finding 7 — Endowment effect in trials: Customers given temporary
  access to premium features convert at 34% vs 8% for customers shown
  a demo of premium features. Once they "own" the experience, losing
  it feels costly.

  Finding 8 — Goal gradient: Customers who are shown progress toward
  a "next level" milestone (e.g., "You're 80% to needing Professional
  tier") are 2.1x more likely to proactively upgrade vs those told
  "you should upgrade."

  Tasks:
  1. Write the "Behavioral Expansion Playbook" — how to apply each
     finding to expansion. For each: the science, the specific tactic,
     the implementation guide (where in the customer journey to apply),
     the ethical boundaries, and the expected impact.

  2. Write the "Expansion Experience Redesign" — how to rebuild the
     entire expansion experience using behavioral science. Include:
     the awareness stage (how customers discover they need more), the
     consideration stage (how they evaluate options), the decision
     stage (how they choose to expand), the activation stage (how
     they experience the expanded product), and the advocacy stage
     (how expanded customers promote expansion to peers). For each
     stage: the behavioral principles applied, the specific UX changes,
     and the measurement approach.

  3. Write the "Ethical Framework" — the guardrails for behavioral
     expansion tactics. Include: the customer welfare test (does this
     genuinely serve customer interests), the transparency standard
     (what must be disclosed), the dark pattern identification (what
     crosses the line), the organizational guidelines (approved vs
     prohibited tactics), and the review process (how new behavioral
     tactics are evaluated and approved).

assertions:
  - type: llm_judge
    criteria: "Behavioral playbook applies 8 findings specifically — science, tactics, implementation, ethical boundaries, and impact for each cognitive bias in expansion contexts"
    weight: 0.35
    description: "Specifically applied behavioral science"
  - type: llm_judge
    criteria: "Experience redesign covers full journey — awareness, consideration, decision, activation, and advocacy stages with behavioral principles, UX changes, and measurement"
    weight: 0.35
    description: "Full-journey experience redesign"
  - type: llm_judge
    criteria: "Ethical framework provides real guardrails — welfare test, transparency, dark pattern identification, organizational guidelines, and review process"
    weight: 0.30
    description: "Real ethical guardrails"
