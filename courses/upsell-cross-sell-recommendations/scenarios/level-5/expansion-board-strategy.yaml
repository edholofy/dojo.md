meta:
  id: expansion-board-strategy
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Present expansion strategy to the board — build the board-level narrative on how expansion capability drives valuation, competitive moat, and sustainable growth"
  tags: [sales, upsell, cross-sell, board, valuation, strategy, governance, master]

state: {}

trigger: |
  You're the CEO of "ValueMax" ($600M ARR, targeting $2B+ IPO in 18
  months). Your board has requested a comprehensive presentation on how
  your expansion strategy will drive the valuation they expect. Current
  NRR of 112% is good but not the 125%+ that commands a premium multiple.

  Board context:
  - Target IPO valuation: $6B (10x ARR)
  - Current implied valuation at 112% NRR: $4.8B (8x ARR)
  - Target valuation at 125% NRR: $7.2B (12x ARR)
  - Valuation gap: $2.4B — driven primarily by NRR

  Financial data:
  - $600M ARR, growing 30% YoY
  - Expansion ARR: $72M/year (12% of base)
  - Gross churn: 7%
  - NRR: 112%
  - Expansion as % of new ARR: 40%
  - Customer lifetime: 5.8 years average
  - Expansion CAC: $11K (vs new business CAC: $58K)
  - Rule of 40: 38% (30% growth + 8% margin)

  Competitive intelligence:
  - Competitor A: NRR 128%, valued at 15x ARR
  - Competitor B: NRR 122%, valued at 12x ARR
  - Competitor C: NRR 115%, valued at 9x ARR
  - The NRR-to-multiple correlation is clear

  Board members:
  - 3 growth equity directors (focused on growth rate and efficiency)
  - 2 independent directors (risk-averse, governance-focused)
  - CFO (IPO-focused, investor relations)
  - CEO (you — presenting)

  Tasks:
  1. Write the "Board Presentation" — 12 slides. Include: the
     strategic imperative (why NRR is the key to valuation), the
     current assessment (where we are, honest gaps), the competitive
     benchmarking (how NRR correlates with multiples), the
     transformation plan (how we go from 112% to 125%+), the
     investment case (what we need to spend), the financial projections
     (3-year ARR under different NRR scenarios), the risk assessment,
     and the specific ask (budget approval and governance framework).

  2. Write the "Investor Narrative on Expansion" — how expansion
     becomes a key part of the IPO story. Include: the NRR as
     competitive moat narrative, the efficient growth narrative (how
     expansion improves unit economics), the platform expansion
     narrative (how product evolution drives expansion), the market
     expansion narrative (how geographic and vertical expansion
     contribute), and the durability narrative (why your expansion
     rate is sustainable, not temporary).

  3. Write the "Board Governance Framework for Expansion" — how the
     board oversees the expansion transformation. Include: the
     quarterly reporting package (metrics, commentary, risks), the
     delegation framework (what management decides vs board approves),
     the investment triggers (when additional investment is warranted),
     the risk limits (maximum acceptable exposure from expansion
     investments), and the success criteria (how the board evaluates
     whether the strategy is working).

assertions:
  - type: llm_judge
    criteria: "Board presentation connects NRR to valuation — 12 slides with strategic imperative, honest assessment, competitive benchmarks, and financial projections showing the $2.4B valuation gap"
    weight: 0.35
    description: "Valuation-connecting board presentation"
  - type: llm_judge
    criteria: "Investor narrative is IPO-ready — competitive moat, efficient growth, platform expansion, market expansion, and durability narratives that investors would find compelling"
    weight: 0.35
    description: "IPO-ready investor narrative"
  - type: llm_judge
    criteria: "Governance framework enables oversight — quarterly reporting, delegation, investment triggers, risk limits, and success criteria for board-level expansion governance"
    weight: 0.30
    description: "Oversight-enabling governance framework"
