meta:
  id: expansion-maturity-model
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Build an expansion maturity model — create the universal assessment framework for evaluating and improving expansion capabilities across SaaS organizations"
  tags: [sales, upsell, cross-sell, maturity-model, assessment, framework, master]

state: {}

trigger: |
  You're a thought leader in SaaS expansion strategy. A major SaaS
  industry association has commissioned you to build the definitive
  "Expansion Maturity Model" that any SaaS company can use to assess
  and improve their expansion capabilities. This will become the
  industry standard.

  Three client organizations of different maturity will test the model:

  Client 1 — "SeedStage" ($5M ARR, Series A, 30 employees):
  Expansion today: CEO handles all expansion personally. No process,
  no tools, no dedicated roles. Expansion is opportunistic — when a
  customer asks for more, they get it. NRR: 95% (net contraction).

  Client 2 — "GrowthStage" ($80M ARR, 300 employees):
  Expansion today: CS team identifies opportunities, hands to sales.
  Basic health scoring exists. Some expansion training. No CLM, no
  analytics, no customer marketing. NRR: 108%.

  Client 3 — "ScaleStage" ($400M ARR, 1,200 employees):
  Expansion today: Dedicated expansion team, deal desk, CLM, quarterly
  business reviews, customer marketing program, partner expansion.
  AI system in pilot. But NRR has plateaued at 118% despite significant
  investment. Something is preventing the leap to 125%+.

  Tasks:
  1. Write the "Expansion Maturity Model" — the universal framework
     with 5 maturity levels and 10 capability dimensions. Levels:
     Level 1 (Ad-hoc), Level 2 (Emerging), Level 3 (Defined), Level 4
     (Managed), Level 5 (Optimized). Dimensions: Strategy, Organization,
     Process, Technology, Analytics, Product, Marketing, Partners,
     Culture, Customer Experience. For each of the 50 cells (5×10):
     specific characteristics, behaviors, and outcomes.

  2. Write the "Assessment Reports" for all 3 clients. For each: the
     maturity score by dimension, the overall maturity level, the
     key strengths and gaps, the priority recommendations (top 3
     actions to advance), and the investment estimate. Specifically
     diagnose why ScaleStage has plateaued at Level 4 despite heavy
     investment (likely a culture, customer experience, or strategy
     dimension holding them back).

  3. Write the "Advancement Guide" — how organizations advance from
     each level to the next. Include: Level 1→2 (survival moves —
     first expansion process, basic health scoring), Level 2→3
     (foundation — playbooks, team structure, comp alignment), Level
     3→4 (management — analytics, AI, customer marketing, partners),
     Level 4→5 (optimization — behavioral science, predictive models,
     category leadership). For each: prerequisites, key actions,
     investment, timeline, and common mistakes that stall advancement.

assertions:
  - type: llm_judge
    criteria: "Maturity model is comprehensive — 5 levels across 10 dimensions with specific characteristics for each cell that could assess any SaaS company's expansion capabilities"
    weight: 0.35
    description: "Comprehensive 5×10 maturity model"
  - type: llm_judge
    criteria: "Three assessments diagnose different stages — SeedStage foundations, GrowthStage scaling, and ScaleStage plateau each accurately assessed with root-cause diagnosis"
    weight: 0.35
    description: "Stage-appropriate assessments"
  - type: llm_judge
    criteria: "Advancement guide provides clear transitions — level-by-level actions, prerequisites, investment, and common mistakes for organizations at every maturity stage"
    weight: 0.30
    description: "Clear advancement transitions"
