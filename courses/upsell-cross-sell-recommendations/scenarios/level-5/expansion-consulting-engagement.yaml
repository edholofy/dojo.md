meta:
  id: expansion-consulting-engagement
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Lead a full expansion consulting engagement — assess, design, and implement a complete customer expansion transformation for a client organization"
  tags: [sales, upsell, cross-sell, consulting, transformation, assessment, master]

state: {}

trigger: |
  You're a Managing Partner at a revenue growth consulting firm.
  "UnderExpand Corp" ($500M ARR, 6,000 customers, B2B SaaS) has hired
  your firm for a $2M engagement to transform their expansion
  capabilities. Their NRR has been flat at 103% for 3 years while
  competitors average 118%.

  Discovery findings:
  Quantitative:
  - NRR: 103% (3-year flat trend; peer median: 118%)
  - Gross churn: 11% (peer median: 8%)
  - Expansion rate: 14% (peer median: 26%)
  - Expansion as % of new ARR: 18% (peer median: 40%)
  - Expansion pipeline coverage: 1.5x (should be 3x)
  - Expansion close rate: 22% (peer median: 35%)
  - Average expansion deal size: $18K (peer median: $28K)
  - CSM-to-account ratio: 1:60 (peer median: 1:40)
  - AMs dedicated to expansion: 12 (should be 30+)

  Qualitative:
  - No expansion playbook, no standardized process
  - Product has 3 tiers but no usage-based component or add-ons
  - CS team measured only on retention, not expansion
  - No customer marketing for expansion
  - No deal desk for expansion deals
  - Product team doesn't consider expansion in roadmap
  - No AI or analytics for expansion signal detection
  - Partner channel does zero expansion (referral only)
  - Executive sponsorship program: doesn't exist
  - QBRs are check-in meetings, not expansion engines

  Executive sponsor: CEO (focused on IPO in 24 months — NRR is the
  #1 metric investors will evaluate).

  Tasks:
  1. Write the "Assessment Report" — the formal deliverable presenting
     findings to UnderExpand's executive team. Include: the executive
     summary (3 key findings, financial impact, urgency), the detailed
     findings by 8 capability areas (strategy, people, process,
     technology, product, marketing, analytics, partners), the peer
     benchmark comparison, the root cause analysis (why NRR has been
     flat despite revenue growth), and the opportunity quantification
     ($500M ARR × 15% NRR improvement = $75M in additional retained
     and expanded revenue).

  2. Write the "Transformation Roadmap" — the 18-month plan. Phase 1
     (Month 1-4): Foundation — expansion playbook, CS restructuring,
     comp redesign, pipeline process. Phase 2 (Month 5-9): Acceleration
     — product changes, customer marketing launch, analytics system,
     deal desk. Phase 3 (Month 10-14): Optimization — AI system, partner
     expansion, global scaling, executive sponsorship. Phase 4 (Month
     15-18): Excellence — predictive expansion, customer marketing
     maturity, IPO readiness. For each phase: deliverables, investment,
     expected NRR impact, and risks.

  3. Write the "Business Case" — the financial justification. Include:
     the investment breakdown ($2M consulting + $5M internal), the
     return by initiative (each initiative's contribution to NRR
     improvement), the cumulative financial impact (3-year model), the
     risk-adjusted ROI (conservative/moderate/optimistic), and the
     IPO valuation impact (NRR improvement → revenue multiple →
     valuation increase).

assertions:
  - type: llm_judge
    criteria: "Assessment is consulting-quality — executive summary, 8 capability areas, benchmarks, root causes, and $75M opportunity quantification for executive audience"
    weight: 0.35
    description: "Consulting-quality assessment"
  - type: llm_judge
    criteria: "Roadmap is phased and realistic — 4 phases with deliverables, investment, NRR impact, and risks across 18 months of transformation"
    weight: 0.35
    description: "Phased realistic roadmap"
  - type: llm_judge
    criteria: "Business case justifies investment — breakdown, returns by initiative, 3-year model, risk-adjusted ROI, and IPO valuation impact"
    weight: 0.30
    description: "Investment-justifying business case"
