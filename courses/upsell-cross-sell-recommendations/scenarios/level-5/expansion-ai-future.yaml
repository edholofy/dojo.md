meta:
  id: expansion-ai-future
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Architect the future of AI-native expansion — design a next-generation expansion system where AI autonomously identifies, nurtures, and closes expansion opportunities with minimal human intervention"
  tags: [sales, upsell, cross-sell, AI, autonomous, future, innovation, master]

state: {}

trigger: |
  You've been hired as the "Head of AI-Native Expansion" at "FutureSaaS"
  ($2B ARR, 25,000 customers). The CEO wants to build the world's first
  fully AI-native expansion function — where AI doesn't just assist
  humans but autonomously runs 80% of the expansion process. The vision:
  reduce the expansion team from 200 humans to 40 human strategists
  supported by AI systems, while tripling expansion revenue from $240M
  to $720M annually.

  Current state:
  - 200-person expansion team (AMs, CSMs, expansion specialists)
  - $240M expansion ARR (12% of base)
  - NRR: 115%
  - Average expansion cycle: 45 days
  - Expansion close rate: 28%
  - Human cost of expansion team: $32M/year
  - Tools: Salesforce, Gainsight, Gong, custom dashboards

  AI-native vision (3-year horizon):
  - AI identifies 95% of expansion opportunities autonomously
  - AI personalizes and sends 80% of expansion communications
  - AI negotiates pricing for deals under $50K
  - AI predicts expansion timing with 85%+ accuracy
  - AI generates custom proposals, ROI models, and business cases
  - AI manages the full expansion pipeline and forecasts NRR
  - Humans focus on strategic accounts ($500K+), relationship building,
    and complex multi-stakeholder negotiations

  Technology landscape available:
  - Foundation models (GPT-5, Claude 4, Gemini Ultra) for reasoning
  - Agent frameworks for autonomous workflow execution
  - Real-time product telemetry (500M events/day)
  - Behavioral analytics across 25,000 accounts
  - NLP for conversation intelligence across 2M annual interactions
  - Computer vision for product usage pattern recognition
  - Reinforcement learning for pricing optimization

  Constraints:
  - Budget: $15M over 3 years (must show positive ROI by month 18)
  - Enterprise customers require human touchpoints for deals over $100K
  - Regulatory considerations in healthcare (HIPAA) and finance (SOX)
  - Change management: 200-person team will resist automation
  - Data privacy: EU customers subject to AI Act requirements
  - Board skepticism: "AI replacing salespeople" narrative is risky

  Tasks:
  1. Write the "AI-Native Expansion Architecture" — the technical and
     organizational blueprint. Include: the AI expansion stack (which AI
     capabilities handle which parts of the expansion process — signal
     detection, opportunity scoring, communication, proposal generation,
     negotiation, closing), the human-AI collaboration model (where
     humans remain essential and how they work alongside AI agents), the
     data architecture (how 500M daily events, conversation data, and
     behavioral analytics feed the AI systems), the autonomous expansion
     agent design (how AI agents operate independently — their decision
     boundaries, escalation triggers, and self-improvement loops), the
     ethics and governance framework (preventing AI from being
     manipulative, ensuring transparency with customers, handling the
     "AI sold me something I don't need" scenario), and the phased
     rollout (which expansion segments go AI-first and in what order).

  2. Write the "Workforce Transformation Plan" — how to transition 200
     humans to 40 AI-augmented strategists. Include: the skills
     assessment (which current team members can become AI-augmented
     strategists), the reskilling program (training humans to work with
     AI — prompt engineering, AI oversight, exception handling, strategic
     relationship management), the organizational redesign (new roles:
     AI expansion strategist, expansion AI trainer, expansion data
     scientist, expansion ethics officer), the change management
     strategy (how to frame this as augmentation not replacement), the
     retention plan for top performers (how to keep the best 40 while
     transitioning 160), and the timeline with milestones (quarterly
     transitions over 2 years with off-ramps if AI performance falls
     short).

  3. Write the "AI Expansion Economics Model" — the financial case for
     AI-native expansion. Include: the current cost structure ($32M
     human cost, $8M tools, $240M expansion revenue = 16.7% cost of
     expansion), the target cost structure ($6M human cost, $15M AI
     infrastructure amortized, $720M expansion revenue = 2.9% cost of
     expansion), the transition economics (costs, savings, and revenue
     impact for each quarter over 3 years), the risk-adjusted projections
     (scenarios where AI performs at 60%, 80%, and 100% of target), the
     competitive impact (what happens if competitors build this first
     vs second-mover advantage of learning from their mistakes), and
     the valuation impact (how AI-native expansion changes the company's
     growth narrative and multiple — from 8x to 15x ARR potential).

assertions:
  - type: llm_judge
    criteria: "AI architecture is visionary yet grounded — AI stack, human-AI collaboration, data architecture, autonomous agent design, ethics framework, and phased rollout for a $2B ARR company"
    weight: 0.35
    description: "Visionary yet grounded AI architecture"
  - type: llm_judge
    criteria: "Workforce transformation is humane and practical — skills assessment, reskilling, organizational redesign, change management, retention, and timeline for 200→40 transition"
    weight: 0.35
    description: "Humane workforce transformation plan"
  - type: llm_judge
    criteria: "Economics model justifies investment — current vs target cost structure, transition economics, risk-adjusted projections, competitive impact, and valuation impact from 16.7% to 2.9% cost of expansion"
    weight: 0.30
    description: "Investment-justifying economics model"
