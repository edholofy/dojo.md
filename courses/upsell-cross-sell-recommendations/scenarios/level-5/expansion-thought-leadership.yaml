meta:
  id: expansion-thought-leadership
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Create thought leadership on the future of expansion — write the authoritative analysis of how AI, PLG, usage-based pricing, and ecosystem models are transforming customer expansion"
  tags: [sales, upsell, cross-sell, thought-leadership, future, innovation, master]

state: {}

trigger: |
  You're a recognized industry expert on SaaS growth. A leading SaaS
  publication has commissioned you to write a comprehensive report on
  "The Future of Customer Expansion in B2B SaaS." The audience is
  CROs, CCOs, and growth leaders at SaaS companies.

  Trends shaping the future:
  1. AI-native expansion: AI recommends, prices, and even executes
     expansion — moving from human-led to AI-augmented to AI-led
  2. Product-led everything: Expansion triggered entirely in-product
     with zero human touch for most customers
  3. Usage-based pricing: Natural expansion built into the pricing
     model — usage grows, revenue grows automatically
  4. Ecosystem expansion: Platform marketplaces and partner apps
     create expansion vectors beyond the core product
  5. Customer-controlled expansion: Self-serve portals where customers
     manage their own expansion (add seats, upgrade tiers, buy add-ons)
  6. Predictive NRR: AI predicts NRR 12 months in advance, enabling
     proactive intervention
  7. Outcome-based expansion: Customers expand based on measured
     outcomes, not features or capacity
  8. Community-driven expansion: Customer communities become expansion
     channels through peer influence

  Current state statistics:
  - Only 15% of SaaS companies have AI-powered expansion systems
  - 30% have usage-based pricing components
  - Average NRR across SaaS: 101% (top quartile: 125%+)
  - Expansion contributes 40% of growth at best-in-class companies
  - 60% of expansion is still human-initiated (not product or AI)
  - Customer self-serve expansion: 12% of expansion revenue today

  Tasks:
  1. Write the "State of Customer Expansion" — the current landscape.
     Include: the expansion maturity distribution (what % of companies
     are at each maturity level), the NRR benchmarks by segment and
     stage, the key metrics that define expansion excellence, the
     organizational models in use today, and the technology stack
     evolution.

  2. Write the "Five Transformation Waves" — the 5 major shifts
     reshaping expansion. For each: the driving forces, the current
     state, the future state (3-5 year vision), the early adopters
     and their results, the implications for roles and organizations,
     and the preparation checklist for leaders. Waves: (1) AI-native
     expansion, (2) Product-led expansion, (3) Outcome-based expansion,
     (4) Ecosystem expansion, (5) Customer-controlled expansion.

  3. Write the "Executive Action Plan" — what leaders should do now.
     Include: the CRO agenda (revenue model implications), the CCO
     agenda (CS transformation), the CPO agenda (product-led expansion
     architecture), the CDO agenda (data and AI infrastructure), the
     CMO agenda (customer marketing evolution), and the CEO agenda
     (strategic positioning for expansion-led growth).

assertions:
  - type: llm_judge
    criteria: "State assessment is authoritative — maturity distribution, NRR benchmarks, metrics, organizational models, and technology evolution with specific data points"
    weight: 0.35
    description: "Authoritative state assessment"
  - type: llm_judge
    criteria: "Five waves are specific and credible — driving forces, current/future state, early adopters, role implications, and preparation checklists beyond generic predictions"
    weight: 0.35
    description: "Specific credible transformation waves"
  - type: llm_judge
    criteria: "Action plans are role-specific — CRO, CCO, CPO, CDO, CMO, and CEO each get relevant agendas connecting expansion trends to their decisions"
    weight: 0.30
    description: "Role-specific action plans"
