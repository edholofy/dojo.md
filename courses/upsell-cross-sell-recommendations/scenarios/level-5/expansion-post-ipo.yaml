meta:
  id: expansion-post-ipo
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Manage expansion as a public company — navigate the unique pressures of quarterly reporting, analyst expectations, and public market scrutiny on expansion metrics"
  tags: [sales, upsell, cross-sell, public-company, IPO, Wall-Street, master]

state: {}

trigger: |
  You're the CRO of "PublicSaaS" ($800M ARR) which IPO'd 6 months
  ago. NRR was your headline metric in the S-1 (125%) and analysts
  are watching it closely. This quarter, NRR is trending to 118% —
  a 7-point drop. Your earnings call is in 3 weeks. If you report
  this decline without a credible explanation and remediation plan,
  your stock could drop 20%+.

  Why NRR is declining:
  1. Macro headwinds: 15% of customers have announced budget freezes
     (reducing expansion propensity by 30% in affected accounts)
  2. Product maturation: Your largest customer cohort (3+ year) has
     saturated their expansion — they're using all tiers and add-ons
  3. Competitive pressure: 2 competitors launched aggressive expansion
     offers targeting your install base
  4. Organizational growing pains: Post-IPO, your best expansion AMs
     were promoted or left for other startups
  5. Metric composition: Your IPO NRR included a one-time enterprise
     expansion cohort that inflated the number by 3-4 points

  Pressures:
  - Wall Street consensus expects 123% NRR (you'll report 118%)
  - Analysts will ask: "Is this a temporary blip or structural decline?"
  - Your stock is trading at 14x ARR — a drop to 10x would wipe $3.2B
    in market cap
  - Competitors will use your NRR decline in their sales messaging
  - Your board wants a plan before the earnings call

  Additional data:
  - Q1 NRR: 125% (S-1 metric)
  - Q2 NRR: 122% (first full quarter as public company)
  - Q3 NRR (current): Trending to 118%
  - Customer segments: Enterprise 127% (stable), Mid-market 115%
    (declining), SMB 98% (net contraction)
  - Pipeline for Q4: $45M (need $60M for NRR recovery)

  Tasks:
  1. Write the "NRR Recovery Plan" — the 2-quarter plan to stabilize
     and recover NRR. Include: the immediate triage (what to do in
     next 3 weeks before earnings), the Q4 acceleration plan (how
     to rebuild expansion pipeline and close rate), the segment-
     specific strategies (different approaches for Enterprise stable,
     Mid-market declining, and SMB contracting), the competitive
     response (how to counter aggressive competitor offers), and the
     organizational rebuild (how to replace lost talent and strengthen
     the expansion team).

  2. Write the "Earnings Call Preparation" — what to say to analysts
     and investors about NRR. Include: the prepared remarks (how the
     CEO and CFO address NRR in their scripts), the Q&A preparation
     (the 10 most likely analyst questions with approved answers),
     the supplemental metrics to highlight (other positive metrics
     that contextualize the NRR decline), the forward-looking
     guidance (what to guide for future NRR — be conservative or
     ambitious?), and the investor communication strategy (1:1
     meetings with top 10 institutional investors).

  3. Write the "Public Company Expansion Governance" — the ongoing
     governance for managing expansion metrics as a public company.
     Include: the NRR forecasting methodology (how to predict NRR
     accurately 2 quarters out), the early warning system (triggers
     that flag NRR risk before it hits), the disclosure framework
     (what to proactively disclose about expansion vs what's required),
     the peer benchmarking process (how to position your NRR vs public
     company peers), and the long-term NRR strategy (sustainable
     target range, not one-time spikes).

assertions:
  - type: llm_judge
    criteria: "Recovery plan addresses all decline drivers — macro, maturation, competitive, organizational, and metric composition with segment-specific strategies"
    weight: 0.35
    description: "Driver-addressing recovery plan"
  - type: llm_judge
    criteria: "Earnings preparation is investor-ready — prepared remarks, Q&A answers, supplemental metrics, guidance approach, and investor communication for a sensitive NRR disclosure"
    weight: 0.35
    description: "Investor-ready earnings preparation"
  - type: llm_judge
    criteria: "Public company governance enables sustained management — NRR forecasting, early warnings, disclosure framework, peer benchmarking, and long-term strategy"
    weight: 0.30
    description: "Sustained public company governance"
