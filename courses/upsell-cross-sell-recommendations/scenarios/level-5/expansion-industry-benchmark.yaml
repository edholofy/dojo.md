meta:
  id: expansion-industry-benchmark
  level: 5
  course: upsell-cross-sell-recommendations
  type: output
  description: "Build the industry benchmark for expansion — create the definitive benchmarking study that SaaS companies use to evaluate their expansion performance"
  tags: [sales, upsell, cross-sell, benchmarking, industry-study, research, master]

state: {}

trigger: |
  You're a research director at a SaaS industry research firm. You've
  been tasked with creating the definitive "State of SaaS Customer
  Expansion" benchmark report based on data from 500 SaaS companies.
  This report will be the industry standard reference.

  Dataset:
  - 500 B2B SaaS companies surveyed
  - Revenue range: $5M to $2B ARR
  - Industries: Technology (35%), Financial Services (15%), Healthcare
    (12%), Manufacturing (10%), Retail (8%), Other (20%)
  - Geographic coverage: NA (55%), EMEA (25%), APAC (15%), LATAM (5%)

  Key findings from the data:
  - Median NRR: 101% (mean: 108%; top quartile: 125%+)
  - Expansion as % of new ARR: Median 28%, top quartile 48%
  - Expansion close rate: Median 30%, top quartile 42%
  - Companies with dedicated expansion teams: 35%
  - Companies with AI-powered expansion: 12%
  - Companies with customer marketing for expansion: 22%
  - Companies with partner expansion programs: 18%
  - Companies with usage-based pricing: 28%
  - Average expansion deal size: $28K (enterprise $85K, mid $22K, SMB $8K)
  - CSM-to-account ratio (expansion-focused): 1:45 median

  Correlation analysis:
  - Dedicated expansion team → +8% higher NRR
  - AI-powered expansion → +12% higher NRR
  - Usage-based pricing → +6% higher NRR
  - Customer marketing → +5% higher NRR
  - Executive sponsor program → +7% higher NRR
  - Partner expansion → +4% higher NRR
  - Behavioral science in expansion → +9% higher NRR
  - Product-led expansion → +11% higher NRR

  Tasks:
  1. Write the "State of SaaS Expansion Report" — the comprehensive
     benchmark report. Include: the executive summary (top 10 findings),
     the NRR analysis (distribution, trends, drivers), the expansion
     capability analysis (what companies are doing and how it
     correlates with performance), the organizational analysis (team
     structures, headcount ratios, reporting lines), the technology
     analysis (tools, AI adoption, automation), and the financial
     analysis (unit economics, ROI of expansion investment).

  2. Write the "Peer Comparison Framework" — the tool companies use
     to benchmark themselves. Include: the benchmarking questionnaire
     (30 questions across 8 categories), the scoring methodology (how
     to calculate a company's expansion maturity score from answers),
     the peer group matching (how to identify the right comparison
     group — by size, industry, model), and the gap analysis template
     (how to identify where a company over/underperforms vs peers).

  3. Write the "Industry Recommendations" — the strategic guidance
     based on the data. Include: the top 5 investments for NRR
     improvement (ranked by impact and cost), the common mistakes
     (what the bottom quartile does differently), the emerging
     practices (what early adopters are doing that will become
     standard), the industry-specific insights (how expansion differs
     by vertical), and the predictions (where expansion practices
     are headed in the next 3 years).

assertions:
  - type: llm_judge
    criteria: "Benchmark report is authoritative — executive summary, NRR analysis, capability analysis, organizational analysis, technology analysis, and financial analysis from 500-company dataset"
    weight: 0.35
    description: "Authoritative benchmark report"
  - type: llm_judge
    criteria: "Peer comparison framework is usable — 30-question assessment, scoring methodology, peer matching, and gap analysis that companies could actually use to benchmark themselves"
    weight: 0.35
    description: "Usable peer comparison framework"
  - type: llm_judge
    criteria: "Recommendations are data-grounded — top 5 investments, common mistakes, emerging practices, and predictions backed by the 500-company dataset correlations"
    weight: 0.30
    description: "Data-grounded recommendations"
