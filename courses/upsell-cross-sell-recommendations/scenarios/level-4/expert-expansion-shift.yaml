meta:
  id: expert-expansion-shift
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Handle an expert-level expansion transformation crisis — manage organizational change, M&A integration, competitive threats, and board expectations simultaneously"
  tags: [sales, upsell, cross-sell, transformation, crisis, multi-front, expert]

state: {}

trigger: |
  You're the CRO at "TransformGrow" ($400M ARR). The board has set
  a non-negotiable target: achieve 130% NRR within 18 months or they
  will replace the revenue leadership team. Currently NRR is 105%.
  Simultaneously, 3 existential challenges have emerged.

  Challenge 1 — Acquisition integration:
  TransformGrow acquired "CompanyB" ($60M ARR) 3 months ago. Cross-
  sell was the acquisition thesis ($40M cross-sell target in 2 years).
  Reality: Zero cross-sell has happened. CompanyB's sales team is
  demoralized (3 top AEs have left). CompanyB's customers are confused
  and 15 have started competitive evaluations. The board is asking:
  "When will we see cross-sell revenue?"

  Challenge 2 — Market disruption:
  A well-funded startup ($200M Series D) has launched a "free forever"
  tier that matches 80% of your base tier features. 200 of your
  customers (SMB segment) are evaluating the free alternative. Your
  expansion motion in SMB (which relied on tier upgrades from your
  base tier) is now threatened — why upgrade when they can get free
  elsewhere?

  Challenge 3 — Organizational resistance:
  You implemented new expansion compensation plans last quarter (CSMs
  get 15% variable on expansion). Result: 8 of your top 20 CSMs have
  submitted resignation letters, saying "we became salespeople — that's
  not why we joined CS." The head of CS is publicly criticizing the
  comp change in leadership meetings. Meanwhile, the expansion results
  from the comp change are promising — CSMs who stayed are generating
  40% more expansion pipeline.

  Resources:
  - Revenue team: 300 people (sales, CS, ops)
  - Budget for 20 additional headcount
  - Outside consulting budget: $500K
  - CEO support: "Full backing, but deliver results"
  - Board patience: 18 months max

  Tasks:
  1. Write the "18-Month NRR Transformation Plan" — the integrated
     plan to move from 105% to 130% NRR while managing all 3
     challenges. Include: the NRR math (what levers move NRR from
     105% to 130% — reduce churn, increase expansion, or both), the
     initiative portfolio (which initiatives contribute how much NRR
     improvement), the quarterly milestones (what NRR should be at
     Q2, Q3, Q4, Q5, Q6), and the board reporting cadence.

  2. Write the "Challenge Resolution Strategies" — specific plans
     for each challenge. Challenge 1: Cross-sell acceleration plan
     (how to start generating cross-sell from acquisition, including
     team stabilization). Challenge 2: Competitive response (how to
     defend against free competitor while maintaining expansion
     motion). Challenge 3: Organizational healing (how to retain
     remaining CSMs, address legitimate concerns, and maintain
     expansion incentive).

  3. Write the "Risk Assessment and Contingency Plan" — what happens
     if things go wrong. Include: the scenario planning (optimistic,
     realistic, pessimistic NRR trajectories), the early warning
     indicators (signals that an initiative is failing), the
     contingency actions (what to do if NRR isn't tracking to plan
     at each quarterly checkpoint), and the downside protection (what
     happens if the board's deadline can't be met — how to communicate,
     what alternatives to propose).

assertions:
  - type: llm_judge
    criteria: "Transformation plan addresses NRR math — specific levers, initiative portfolio, and quarterly milestones that could realistically move NRR from 105% to 130% in 18 months"
    weight: 0.35
    description: "NRR-math-grounded transformation"
  - type: llm_judge
    criteria: "Three challenge resolutions are actionable — cross-sell acceleration, competitive defense, and organizational healing each get specific plans that address root causes"
    weight: 0.35
    description: "Root-cause challenge resolution"
  - type: llm_judge
    criteria: "Risk assessment provides real contingencies — scenario planning, early warnings, contingency actions, and downside protection for an honest assessment of what could go wrong"
    weight: 0.30
    description: "Honest contingency planning"
