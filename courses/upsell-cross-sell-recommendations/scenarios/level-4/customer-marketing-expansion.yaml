meta:
  id: customer-marketing-expansion
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Build a customer marketing engine for expansion — design the marketing programs, campaigns, and content that drive expansion awareness, interest, and pipeline"
  tags: [sales, upsell, cross-sell, customer-marketing, campaigns, content, expert]

state: {}

trigger: |
  You're the VP of Customer Marketing at "MarketExpand" ($200M ARR,
  3,000 customers). Your company has invested heavily in demand
  generation for new business (90% of marketing budget) but has no
  customer marketing function. The CRO has given you a budget of $1.5M
  and a mandate: build a customer marketing engine that generates $15M
  in expansion pipeline within 12 months.

  Current state:
  - Marketing budget: $20M total, $18M on new customer demand gen
  - Customer marketing budget: $2M (events and newsletters only)
  - Customer marketing team: 2 people (1 events, 1 newsletter)
  - Expansion pipeline generated by marketing: $0 (all expansion is
    sales/CS-driven today)
  - Customer communication: Monthly product newsletter (12% open rate)
  - Customer events: Annual user conference (800 attendees)
  - Customer content: Zero dedicated content for expansion
  - Customer campaigns: Zero expansion-focused campaigns

  Expansion marketing opportunity:
  - 3,000 customers, average ACV $67K
  - If 20% of customers engage with expansion marketing, that's 600
    accounts generating pipeline
  - Average expansion opportunity: $25K → 600 × $25K = $15M pipeline
  - Expected conversion from pipeline to closed: 35% → $5.25M new ARR
  - Customer marketing ROI at $1.5M investment: 3.5x (vs 1.2x for
    new business demand gen)

  Customer segments for marketing:
  - Power users (800 accounts): High adoption, green health, expansion
    ready. Need: awareness of premium features and add-ons.
  - Growth accounts (1,200 accounts): Growing organizations that could
    add seats or tiers. Need: value realization content and upgrade paths.
  - Underutilized (600 accounts): Low adoption despite potential. Need:
    adoption campaigns before expansion marketing.
  - At-risk (400 accounts): Yellow/red health. Need: retention focus,
    not expansion.

  Tasks:
  1. Write the "Customer Marketing Strategy" — the 12-month plan for
     building an expansion marketing engine. Include: the team design
     (roles, headcount, skills), the campaign calendar (what campaigns,
     when, for which segments), the content strategy (what content
     types, topics, and formats for expansion), the channel strategy
     (email, in-app, events, community, webinars, ABM), and the
     technology stack (what tools needed for customer marketing).

  2. Write the "Expansion Campaign Playbooks" — 5 campaign types
     optimized for expansion. Include: the "feature awareness" campaign
     (educating customers on premium features they don't know about),
     the "peer benchmark" campaign (showing customers how they compare
     to similar companies), the "use case expansion" campaign (showing
     new use cases for their current product), the "executive briefing"
     campaign (inviting executives to learn about strategic platform
     value), and the "community-driven" campaign (leveraging customer
     advocates to inspire expansion). For each: the audience, the
     messaging, the channel mix, the timeline, and the success metrics.

  3. Write the "Customer Marketing Measurement Framework" — how to
     track and optimize customer marketing effectiveness. Include:
     the funnel metrics (awareness → engagement → pipeline → closed),
     the campaign attribution model (how to credit marketing for
     expansion revenue), the customer engagement score (how to measure
     if marketing is reaching the right customers), the A/B testing
     framework (how to optimize campaigns), and the quarterly review
     process (how to report on customer marketing ROI).

assertions:
  - type: llm_judge
    criteria: "Customer marketing strategy is comprehensive — team design, campaign calendar, content strategy, channel strategy, and technology for a $15M pipeline target"
    weight: 0.35
    description: "Comprehensive customer marketing strategy"
  - type: llm_judge
    criteria: "Five campaign playbooks are distinct and actionable — feature awareness, peer benchmark, use case, executive briefing, and community campaigns with audience, messaging, channels, and metrics"
    weight: 0.35
    description: "Distinct actionable campaign playbooks"
  - type: llm_judge
    criteria: "Measurement framework enables optimization — funnel metrics, attribution, engagement scoring, A/B testing, and quarterly review for data-driven customer marketing"
    weight: 0.30
    description: "Optimization-enabling measurement"
