meta:
  id: nrr-strategy-design
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Design an NRR-first growth strategy — build the organizational strategy that makes net revenue retention the primary growth engine, surpassing new business acquisition"
  tags: [sales, upsell, cross-sell, NRR, strategy, growth-engine, expert]

state: {}

trigger: |
  You're the Chief Revenue Officer at "NRRFirst" ($300M ARR, growing
  25% YoY). Your board has challenged you: "New customer acquisition
  costs are rising 15% per year. Your expansion economics are 5x more
  efficient. Why isn't NRR your primary growth engine?" Currently, new
  business drives 70% of growth and expansion drives 30%. The board
  wants to flip this to 40% new business, 60% expansion within 2 years.

  Current financial model:
  - Total ARR: $300M
  - New business ARR: $52.5M/year (70% of $75M total growth)
  - Expansion ARR: $22.5M/year (30% of $75M total growth)
  - Gross churn: 10% ($30M lost annually)
  - NRR: 108% (expansion - churn = net 8% growth from base)
  - CAC for new business: $45K per customer ($1.25 CAC payback ratio)
  - CAC for expansion: $8K per customer ($6.25 CAC payback ratio)
  - LTV of expanded customer: 2.3x LTV of non-expanded customer
  - Customer lifetime: Expanded customers 5.2 years vs 3.1 years

  Target financial model (in 2 years):
  - Total ARR: $500M (67% growth over 2 years)
  - New business: $48M/year (40% of $120M growth) — efficiency focus
  - Expansion: $72M/year (60% of $120M growth) — 3.2x current
  - Gross churn: 7% (reduced) — $35M lost on larger base
  - NRR target: 125%

  Organizational reality:
  - 200 AEs focused on new business
  - 80 CSMs focused on retention
  - 20 AMs focused on expansion
  - Sales culture: "Hunters are heroes, farmers are second class"
  - Marketing: 90% of budget on demand gen for new business
  - Product: Roadmap driven by new customer acquisition features

  Tasks:
  1. Write the "NRR Growth Strategy" — the comprehensive plan to
     shift from acquisition-led to expansion-led growth. Include: the
     financial model transformation (how investment shifts from
     acquisition to expansion), the organizational restructuring
     (headcount reallocation across new business, expansion, retention),
     the cultural transformation plan (how to make expansion as
     prestigious as new business), the marketing reallocation (what
     % of budget shifts to customer marketing), and the product
     strategy alignment (how the roadmap shifts to support expansion).

  2. Write the "NRR Operating Model" — the operating rhythm for an
     NRR-first organization. Include: the weekly expansion cadence
     (pipeline reviews, deal inspections, signal monitoring), the
     monthly business review (expansion metrics, forecast, coaching),
     the quarterly planning cycle (quota setting, territory design,
     account planning), the annual strategic planning (multi-year
     expansion forecasts, investment decisions), and the cross-functional
     coordination (how sales, CS, product, and marketing align weekly
     on expansion).

  3. Write the "Board Presentation" — the strategic case for the
     NRR transformation. Include: the economic argument (CAC
     efficiency, LTV improvement, margin impact), the competitive
     argument (how NRR creates a moat), the risk analysis (what
     happens if new business suffers during the transition), the
     investment request (additional resources needed), and the
     milestone-based governance plan (quarterly checkpoints with
     go/no-go decisions).

assertions:
  - type: llm_judge
    criteria: "NRR strategy addresses all dimensions — financial model, organizational restructuring, cultural transformation, marketing reallocation, and product alignment for a real shift from 30% to 60% expansion"
    weight: 0.35
    description: "Multi-dimensional NRR strategy"
  - type: llm_judge
    criteria: "Operating model provides practical rhythm — weekly, monthly, quarterly, and annual cadences with cross-functional coordination for managing NRR-first operations"
    weight: 0.35
    description: "Practical NRR operating model"
  - type: llm_judge
    criteria: "Board presentation makes a compelling case — economic argument, competitive moat, risk analysis, investment request, and governance plan that would convince a growth-oriented board"
    weight: 0.30
    description: "Compelling board-level case"
