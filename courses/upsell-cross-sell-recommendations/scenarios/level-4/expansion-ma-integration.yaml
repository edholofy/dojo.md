meta:
  id: expansion-ma-integration
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Integrate expansion capabilities during M&A — merge customer bases, expansion motions, and product portfolios to create cross-sell opportunities across combined entities"
  tags: [sales, upsell, cross-sell, M&A, integration, cross-portfolio, expert]

state: {}

trigger: |
  You're the Chief Revenue Officer at "AcquireGrow" ($350M ARR) which
  just acquired "TargetProduct" ($90M ARR) for $700M. The acquisition
  thesis is primarily about cross-sell: AcquireGrow's 5,000 customers
  should buy TargetProduct's complementary solution, and TargetProduct's
  2,000 customers should buy AcquireGrow's platform. The board expects
  $60M in cross-sell ARR within 24 months. If you miss this target,
  the acquisition is considered a failure.

  AcquireGrow profile:
  - Product: Enterprise CRM platform
  - 5,000 customers, $350M ARR
  - Average ACV: $70K
  - NRR: 112%
  - Strong enterprise sales team (300 AEs)
  - Weak CS team (50 CSMs)

  TargetProduct profile:
  - Product: Customer success/health scoring platform
  - 2,000 customers, $90M ARR
  - Average ACV: $45K
  - NRR: 105%
  - Strong CS team (80 CSMs)
  - Weak sales team (40 AEs)

  Cross-sell analysis:
  - 300 overlap customers (use both products already)
  - AcquireGrow → TargetProduct: 4,700 customers who could buy
    (estimated 25% penetration = 1,175 customers × $45K = $52.9M)
  - TargetProduct → AcquireGrow: 1,700 customers who could buy
    (estimated 10% penetration = 170 customers × $70K = $11.9M)
  - Combined cross-sell target: $60M in 24 months

  Integration challenges:
  1. Product integration: Products are standalone today — no technical
     integration exists (6+ months to build meaningful integration)
  2. Sales team: AcquireGrow AEs know nothing about TargetProduct (and
     vice versa). Neither team is incentivized to sell the other product.
  3. Customer experience: Overlap customers report confusion about who
     their point of contact is
  4. Pricing: Products priced independently — no combined pricing/bundling
  5. Competition: Your main CRM competitor now positions their native
     CS module as superior to "franken-stack of two acquired products"

  Tasks:
  1. Write the "Cross-Sell Integration Plan" — the 24-month plan to
     achieve $60M in cross-sell ARR. Include: the phased timeline
     (Month 1-6: foundation, Month 7-12: launch, Month 13-18:
     acceleration, Month 19-24: optimization), the customer
     segmentation (which customers to target first for cross-sell and
     why), the product integration roadmap (what technical integration
     is needed and when), the go-to-market strategy (how to sell the
     combined solution), and the revenue milestones by quarter.

  2. Write the "Cross-Sell Sales Enablement Program" — how to enable
     both sales teams to sell the combined portfolio. Include: the
     product training curriculum (what each team needs to learn about
     the other product), the compensation redesign (how to incentivize
     cross-sell without cannibalizing core quota), the joint selling
     motion (how AEs from both teams collaborate on cross-sell deals),
     the positioning and messaging (how to tell the combined story),
     and the competitive counter-positioning (how to respond to
     "franken-stack" competitive messaging).

  3. Write the "Integration Risk Management Plan" — how to manage
     the risks that could derail the $60M target. Include: the
     customer churn risk (preventing customers from leaving during
     integration), the talent retention risk (keeping key salespeople
     from both companies), the execution risk (what if product
     integration takes longer), the competitive risk (how to defend
     against competitors during the vulnerable integration period),
     and the quarterly review framework (how to track progress and
     course-correct).

assertions:
  - type: llm_judge
    criteria: "Cross-sell plan is phased and realistic — 24-month timeline with customer segmentation, product integration, GTM strategy, and revenue milestones for $60M target"
    weight: 0.35
    description: "Phased realistic cross-sell plan"
  - type: llm_judge
    criteria: "Enablement program bridges two teams — product training, compensation redesign, joint selling, positioning, and competitive response for merged sales organizations"
    weight: 0.35
    description: "Team-bridging enablement program"
  - type: llm_judge
    criteria: "Risk management addresses real integration dangers — customer churn, talent retention, execution delays, competitive attacks, and quarterly governance"
    weight: 0.30
    description: "Real-danger risk management"
