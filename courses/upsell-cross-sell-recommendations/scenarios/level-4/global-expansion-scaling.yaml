meta:
  id: global-expansion-scaling
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Scale expansion globally — build expansion capabilities across regions with different market dynamics, cultural norms, and organizational maturity"
  tags: [sales, upsell, cross-sell, global, scaling, international, expert]

state: {}

trigger: |
  You're the Global VP of Customer Growth at "WorldScale" ($400M ARR,
  8,000 customers across 30 countries). Your expansion performance
  varies wildly by region, and the CEO wants global consistency.

  Regional expansion performance:
  - North America (50% of ARR, $200M): NRR 118%, expansion rate 28%,
    mature CS team, deal desk, PLG motion running
  - EMEA (25% of ARR, $100M): NRR 106%, expansion rate 12%, CS team
    building, no deal desk, expansion considered "sales job not CS"
  - APAC (15% of ARR, $60M): NRR 102%, expansion rate 8%, tiny CS
    team, expansion motions non-existent, culturally reluctant to
    "sell" to existing customers
  - LATAM (10% of ARR, $40M): NRR 98% (net contraction!), expansion
    rate 5%, highest churn, currency issues, small team

  Regional challenges:
  North America: Mature but plateauing. Already captured "easy"
  expansion. Need to find new expansion vectors.
  EMEA: Cultural resistance (especially DACH region) to CSMs doing
  expansion. GDPR limits how you can use customer data for expansion
  targeting. 8 different markets with different maturity.
  APAC: Japan relationship-focused (expansion feels transactional).
  Australia/NZ more Western approach. India price-sensitive.
  Expansion perceived as aggressive in many APAC cultures.
  LATAM: Currency volatility means ARR in local currency may decline
  even if usage grows. Small team spread across 8 countries. Customer
  sophistication varies from São Paulo enterprise to smaller markets.

  Resources:
  - NA: 40 CSMs, 15 AMs, 5 deal desk analysts
  - EMEA: 15 CSMs, 5 AMs, 0 deal desk
  - APAC: 8 CSMs, 2 AMs, 0 deal desk
  - LATAM: 5 CSMs, 1 AM, 0 deal desk
  - Global expansion budget: $2M additional investment

  Tasks:
  1. Write the "Global Expansion Strategy" — the plan for achieving
     consistent expansion performance worldwide. Include: the "global
     core, local flex" framework (what's standardized vs adapted by
     region), the regional maturity assessment (where each region is
     on the expansion maturity curve), the investment allocation by
     region (how to distribute the $2M budget), the global expansion
     playbook (universal approaches that work everywhere), and the
     regional adaptation guidelines (how to modify for EMEA, APAC,
     LATAM).

  2. Write the "Regional Expansion Plans" — specific plans for the
     3 underperforming regions. For each (EMEA, APAC, LATAM): the
     12-month improvement roadmap (from current NRR to target NRR),
     the team building plan (what roles to hire and when), the
     cultural adaptation strategy (how to make expansion fit regional
     norms), the quick wins (what to do in the first 30 days), and
     the key metrics and milestones.

  3. Write the "Global Expansion Governance Model" — how to manage
     expansion performance across regions. Include: the global
     expansion council structure (who, when, what authority), the
     regional performance scorecards (metrics by region with
     benchmarks), the best practice sharing mechanism (how successful
     approaches in one region get adopted elsewhere), the global
     vs regional decision rights (what's decided centrally vs
     locally), and the escalation process (when regional performance
     triggers intervention).

assertions:
  - type: llm_judge
    criteria: "Global strategy balances consistency and adaptation — global core with local flex, regional maturity assessment, budget allocation, and adaptation guidelines for 4 regions"
    weight: 0.35
    description: "Consistency-adaptation balanced strategy"
  - type: llm_judge
    criteria: "Regional plans address real differences — EMEA cultural resistance, APAC relationship norms, and LATAM currency/scale challenges each get tailored 12-month roadmaps"
    weight: 0.35
    description: "Culturally-tailored regional plans"
  - type: llm_judge
    criteria: "Governance model enables global management — council structure, regional scorecards, best practice sharing, decision rights, and escalation for consistent global performance"
    weight: 0.30
    description: "Global-management governance model"
