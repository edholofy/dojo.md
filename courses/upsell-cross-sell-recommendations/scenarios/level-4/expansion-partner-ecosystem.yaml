meta:
  id: expansion-partner-ecosystem
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Design a partner-driven expansion ecosystem — build the channel, technology, and services partner programs that amplify customer expansion beyond direct team capacity"
  tags: [sales, upsell, cross-sell, partners, ecosystem, channel, expert]

state: {}

trigger: |
  You're the VP of Partnerships at "EcoSaaS" ($450M ARR, 6,500 customers).
  The CEO has mandated that partner-influenced expansion must grow from 8%
  to 30% of total expansion ARR within 2 years. Current expansion ARR is
  $54M/year; the target is $120M with $36M partner-influenced.

  Partner landscape:
  - Channel partners (resellers/VARs): 45 active, generate $4.3M expansion
  - Technology partners (integrations): 120 listed, 15 drive measurable
    expansion, contributing $2.8M
  - Services partners (SIs/consultancies): 22 active, $1.2M expansion
  - Marketplace: 85 apps listed, $0.5M influenced expansion
  - Total partner-influenced expansion: $8.8M (8% of new ARR)

  Challenges:
  - Channel partners sell new logos but rarely drive expansion
  - Technology partners have no incentive to co-sell expansion
  - Services partners implement but don't recommend tier upgrades
  - Marketplace apps are disconnected from expansion signals
  - No unified partner attribution model for expansion
  - Partner team (12 people) focuses on recruitment, not enablement

  Competitor intelligence:
  - Competitor A: 40% of expansion is partner-influenced (best in class)
  - Competitor B: Launched "Expansion Certified" partner tier with 3x
    higher partner expansion rates
  - Competitor C: Built co-sell platform that surfaces expansion
    opportunities directly to partners

  Budget: $3.5M over 2 years for partner expansion programs

  Tasks:
  1. Design the "Partner Expansion Ecosystem Architecture" — the
     comprehensive framework. Include: the partner segmentation model
     (which partners can drive which types of expansion — upsells vs
     cross-sells vs add-ons), the partner enablement program (training,
     certification, expansion playbooks for each partner type), the
     partner incentive redesign (SPIFs, margin structures, and expansion-
     specific rewards that motivate expansion behavior), the technology
     platform requirements (partner portal, co-sell alerts, attribution
     engine), and the governance model (how partner expansion is measured,
     reported, and optimized quarterly).

  2. Design the "Partner Co-sell Expansion Model" — how partners and
     your direct team collaborate on expansion. Include: the signal-
     sharing framework (how product usage data and expansion signals are
     shared with relevant partners), the engagement rules (which partner
     engages which account, conflict resolution, account ownership), the
     co-sell playbook (joint QBRs, partner-led technical assessments,
     coordinated expansion proposals), the revenue sharing model (how
     expansion revenue is split or attributed), and the success metrics
     (partner expansion pipeline, conversion rates, partner NPS, time-
     to-expand with vs without partner involvement).

  3. Design the "Marketplace-Driven Expansion Strategy" — how your app
     marketplace becomes an expansion engine. Include: the marketplace
     expansion thesis (why marketplace adoption correlates with expansion
     propensity), the ISV recruitment strategy (which app categories
     drive the most expansion and how to recruit those ISVs), the
     marketplace-to-expansion funnel (how app adoption creates upsell
     triggers, usage-based expansion, and platform stickiness), the
     marketplace analytics (which apps predict expansion, which create
     lock-in, which drive churn), and the 2-year roadmap to grow
     marketplace-influenced expansion from $0.5M to $5M+.

assertions:
  - type: llm_judge
    criteria: "Ecosystem architecture is comprehensive — partner segmentation, enablement, incentive redesign, technology platform, and governance for channel, technology, services, and marketplace partners"
    weight: 0.35
    description: "Comprehensive ecosystem architecture"
  - type: llm_judge
    criteria: "Co-sell model enables collaboration — signal sharing, engagement rules, co-sell playbooks, revenue sharing, and success metrics for partner-direct team coordination"
    weight: 0.35
    description: "Collaboration-enabling co-sell model"
  - type: llm_judge
    criteria: "Marketplace strategy drives expansion — expansion thesis, ISV recruitment, adoption-to-expansion funnel, analytics, and roadmap from $0.5M to $5M+"
    weight: 0.30
    description: "Expansion-driving marketplace strategy"
