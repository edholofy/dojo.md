meta:
  id: expansion-economics-model
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Build an expansion economics model — quantify the unit economics of expansion vs acquisition and build financial models that guide investment decisions"
  tags: [sales, upsell, cross-sell, economics, financial-model, unit-economics, expert]

state: {}

trigger: |
  You're the CFO at "EconExpand" ($280M ARR, preparing for IPO).
  Investment bankers have told you that your NRR of 110% is "good but
  not great" — top quartile SaaS companies achieve 125%+, which
  commands a 2-3x valuation premium. You need to build the financial
  model that proves the ROI of investing in expansion and justify the
  investment to the board.

  Current unit economics:
  New business:
  - CAC: $52K (fully loaded — sales, marketing, SDRs)
  - Average first-year ACV: $65K
  - CAC payback: 9.6 months
  - LTV: $195K (3-year average lifetime)
  - LTV:CAC ratio: 3.75x

  Expansion:
  - Expansion acquisition cost (EAC): $9K (CSM time + sales support)
  - Average expansion deal: $22K
  - EAC payback: 4.9 months
  - Expansion LTV: $88K (expanded revenue × remaining lifetime)
  - LTV:EAC ratio: 9.8x

  Key financial insight: Every $1 invested in expansion generates 2.6x
  more lifetime value than $1 invested in new business acquisition.

  Financial projections needed:
  1. NRR improvement model: What investment is needed to move NRR from
     110% to 125% and what's the ARR impact over 3 years?
  2. Expansion investment model: How much to invest in CS, expansion
     sales, and product (for expansion features) to capture the
     opportunity?
  3. IPO valuation impact: What's the difference in IPO valuation
     between 110% NRR and 125% NRR?
  4. Break-even analysis: At what point does expansion investment
     start generating positive ROI?

  Board data requirements:
  - Conservative, moderate, and optimistic scenarios
  - Sensitivity analysis on key assumptions
  - Comparison to peer group (5 public SaaS companies)
  - Risk-adjusted projections

  Tasks:
  1. Write the "Expansion Economics Model" — the comprehensive
     financial model for expansion investment. Include: the unit
     economics comparison (new business vs expansion with all cost
     components), the NRR improvement model (investment needed to move
     from 110% to 125% with assumptions), the 3-year financial
     projection (ARR trajectory under 3 scenarios), the break-even
     analysis (when expansion investment turns positive), and the
     sensitivity analysis (how results change with key assumption
     variations — churn rate, expansion close rate, average deal size).

  2. Write the "IPO Valuation Impact Analysis" — how NRR affects
     company valuation. Include: the NRR-to-valuation correlation
     (data from public SaaS companies showing revenue multiple by NRR),
     the valuation differential ($280M ARR at 110% NRR vs 125% NRR),
     the investor narrative (how to tell the NRR story to investors),
     the peer comparison (how your NRR compares to 5 relevant public
     SaaS companies), and the timeline to IPO-ready NRR.

  3. Write the "Expansion Investment Proposal" — the specific budget
     request for the board. Include: the total investment by category
     (headcount, technology, training, product), the phased budget
     (Year 1 vs Year 2 vs Year 3), the expected returns by initiative,
     the risk factors and mitigations, and the governance framework
     (quarterly milestones, go/no-go decisions, reallocation triggers).

assertions:
  - type: llm_judge
    criteria: "Economics model is financially rigorous — unit economics comparison, NRR improvement model, 3-year projections, break-even, and sensitivity analysis with realistic assumptions"
    weight: 0.35
    description: "Financially rigorous economics model"
  - type: llm_judge
    criteria: "Valuation analysis connects NRR to IPO — NRR-valuation correlation, differential calculation, investor narrative, peer comparison that quantify the valuation premium"
    weight: 0.35
    description: "NRR-to-valuation connection"
  - type: llm_judge
    criteria: "Investment proposal is board-ready — categorized budget, phased timeline, expected returns, risks, and governance that a board could approve"
    weight: 0.30
    description: "Board-ready investment proposal"
