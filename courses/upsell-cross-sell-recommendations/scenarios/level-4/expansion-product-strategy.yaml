meta:
  id: expansion-product-strategy
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Align product strategy with expansion goals — influence product roadmap, packaging, and feature development to maximize expansion revenue opportunities"
  tags: [sales, upsell, cross-sell, product-strategy, roadmap, packaging, expert]

state: {}

trigger: |
  You're the Chief Product Officer at "ProductExpand" ($250M ARR).
  Your CRO has presented data showing that product decisions directly
  impact expansion revenue — but the product team has never optimized
  for expansion. You need to redesign your product strategy to maximize
  expansion opportunities.

  Product expansion analysis:
  - Features gated behind higher tiers drive 60% of tier upgrade revenue
  - The #1 expansion request is "more API calls" — a capacity expansion
    that has no product development cost
  - Add-on attach rate: 1.8 per customer (top SaaS companies: 3.5+)
  - Your product has 1 expansion vector (tier upgrade). Best-in-class
    companies have 4+ vectors (tier, seat, usage, add-ons, marketplace)
  - Feature usage analysis shows 30% of Enterprise features are used
    by Standard customers (through workarounds) — they need the tier
    but won't upgrade because the jump is too large ($35 → $95/user)
  - No "value metric" pricing — all pricing is per-seat regardless
    of value delivered

  Product-expansion disconnects:
  1. Tier gap: $35 → $95 jump too large (many customers want $55-65
     option that doesn't exist)
  2. No usage-based component: Heavy users pay the same as light users,
     creating no natural expansion pressure
  3. Feature overpacking: Enterprise tier has 40 features; customers
     only need 5-10, but must buy all 40. Creates objection "I'm paying
     for features I don't need."
  4. Add-on cannibalization: 3 of your add-ons should be tier features
     (customers are confused why they're separate)
  5. No marketplace: Customers build custom integrations that could
     be marketplace apps (revenue opportunity missed)
  6. Free-to-paid conversion: 2% (benchmark: 4-5%) — free tier is too
     generous, no natural conversion triggers

  Stakeholder perspectives:
  - CRO: "Product is leaving $30M+ on the table in expansion revenue"
  - VP Engineering: "We're building for new customers, not expansion"
  - VP CS: "Customers are confused by our packaging — they don't know
    what to buy"
  - VP Marketing: "Our packaging makes it hard to create upgrade campaigns"
  - CFO: "Usage-based pricing would improve revenue predictability"

  Tasks:
  1. Write the "Product-Led Expansion Strategy" — the product changes
     needed to maximize expansion. Include: the tier restructuring
     proposal (adding a mid-tier, repackaging features), the usage-
     based pricing component design (what metric, how it scales), the
     add-on rationalization (which add-ons become tier features, which
     stay standalone, which new add-ons to create), the marketplace
     strategy (how to launch and grow a partner app marketplace), and
     the free tier optimization (reducing generosity to improve
     conversion while maintaining adoption).

  2. Write the "Expansion-Optimized Product Roadmap" — the 12-month
     product roadmap that prioritizes expansion. Include: the Q1 quick
     wins (changes that improve expansion with minimal engineering),
     the Q2 tier restructuring (mid-tier launch, feature repackaging),
     the Q3 usage-based pricing (usage component launch), the Q4
     marketplace launch (beta marketplace with 20 partner apps). For
     each quarter: the engineering investment, the expected revenue
     impact, the customer migration plan, and the risks.

  3. Write the "Product-Revenue Alignment Framework" — the ongoing
     process for ensuring product decisions consider expansion impact.
     Include: the expansion impact assessment for new features (how
     to evaluate if a feature should be a tier differentiator, add-on,
     or base feature), the pricing committee design (who decides
     feature placement and pricing), the data-driven feature gating
     methodology (how usage data determines optimal tier placement),
     and the quarterly product-revenue review (how product and revenue
     teams align on expansion priorities).

assertions:
  - type: llm_judge
    criteria: "Product strategy addresses all disconnects — tier restructuring, usage-based pricing, add-on rationalization, marketplace, and free tier optimization to unlock $30M+ in expansion"
    weight: 0.35
    description: "Disconnect-addressing product strategy"
  - type: llm_judge
    criteria: "Roadmap is quarterly and actionable — Q1 quick wins through Q4 marketplace with engineering investment, revenue impact, migration plans, and risks for each quarter"
    weight: 0.35
    description: "Actionable quarterly roadmap"
  - type: llm_judge
    criteria: "Alignment framework ensures ongoing optimization — expansion impact assessment, pricing committee, data-driven gating, and quarterly review for sustainable product-revenue alignment"
    weight: 0.30
    description: "Sustainable product-revenue alignment"
