meta:
  id: expansion-org-design
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Design the expansion organization — build the organizational structure that optimizes for expansion revenue including roles, reporting lines, and cross-functional coordination"
  tags: [sales, upsell, cross-sell, organization, design, structure, expert]

state: {}

trigger: |
  You're the COO at "OrgExpand" ($350M ARR). The CEO wants to
  restructure the revenue organization to maximize expansion. Currently,
  expansion responsibilities are fragmented across 4 teams (CS, Sales,
  Marketing, Product) with no clear ownership. The result: $350M ARR
  but only $35M in annual expansion (10% — should be 25%+).

  Current org structure:
  - CRO → VP Sales (new business), VP Sales Ops
  - CCO (Chief Customer Officer) → VP CS, VP Support
  - CMO → VP Demand Gen, VP Product Marketing
  - CPO → VP Product, VP Engineering
  - Total revenue team: 450 people

  Expansion ownership today:
  - CSMs identify expansion signals but aren't measured on expansion
  - AEs occasionally help with large expansion deals (no dedicated team)
  - No expansion-focused marketing
  - Product team doesn't consider expansion in feature prioritization
  - Deal desk handles expansion pricing reactively
  - Total people dedicated to expansion: ~8 (out of 450)

  CEO's challenge: "I want a clear answer to one question: Who is
  accountable for expansion revenue? Right now, the answer is everyone
  and no one."

  Options under consideration:
  A. Expansion under CRO (alongside new business)
  B. Expansion under CCO (alongside CS and retention)
  C. Dedicated CXO (Chief Expansion Officer — new role)
  D. Shared accountability model (cross-functional team)

  Constraints:
  - Budget for 15 net-new headcount
  - Can reallocate up to 20% of existing roles
  - Must maintain new business performance during reorganization
  - Implementation within 6 months
  - Must work at current scale ($350M) and future scale ($1B)

  Tasks:
  1. Write the "Expansion Organizational Design" — the recommended
     structure with detailed justification. Include: the analysis of
     all 4 options (pros, cons, risks for each), the recommended
     structure (with rationale), the detailed org chart (roles,
     reporting lines, headcount), the role definitions (every
     expansion-focused role with responsibilities), the cross-
     functional coordination model (how expansion team interacts with
     sales, CS, marketing, product), and the performance metrics by
     role (what each person is measured on).

  2. Write the "Transition Plan" — how to implement the reorganization.
     Include: the 6-month phased implementation (Month 1-2: announce
     and recruit, Month 3-4: operationalize, Month 5-6: optimize),
     the people plan (which existing roles change, which are new
     hires, retention risk assessment), the change management strategy
     (communication plan, stakeholder buy-in, addressing resistance),
     the process redesign (what workflows change with the new
     structure), and the quick wins (what can improve expansion
     revenue immediately, before reorg is complete).

  3. Write the "Scalability Assessment" — how the expansion org
     design works as the company grows from $350M to $1B ARR.
     Include: the scaling model (when to add headcount, what triggers
     new roles), the maturity stages (what the expansion org looks
     like at $500M, $750M, $1B), the technology investment roadmap
     (what tools are needed at each stage), and the leadership
     development plan (how to grow expansion leaders from within).

assertions:
  - type: llm_judge
    criteria: "Org design evaluates all options rigorously — 4 options analyzed with pros, cons, and risks, leading to a recommended structure with detailed org chart, roles, and metrics"
    weight: 0.35
    description: "Rigorously evaluated org design"
  - type: llm_judge
    criteria: "Transition plan manages change effectively — phased implementation, people plan, change management, process redesign, and quick wins for a real reorganization"
    weight: 0.35
    description: "Change-managing transition plan"
  - type: llm_judge
    criteria: "Scalability assessment ensures longevity — scaling model, maturity stages, technology roadmap, and leadership development from $350M to $1B"
    weight: 0.30
    description: "Longevity-ensuring scalability"
