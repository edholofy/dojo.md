meta:
  id: expansion-ai-system
  level: 4
  course: upsell-cross-sell-recommendations
  type: output
  description: "Build an AI-powered expansion system — design the AI/ML infrastructure that predicts, prioritizes, and personalizes expansion opportunities at scale"
  tags: [sales, upsell, cross-sell, AI, machine-learning, prediction, expert]

state: {}

trigger: |
  You're the Chief Data Officer at "AIExpand" ($220M ARR, 4,000
  customers). The CRO wants an AI-powered expansion system that
  transforms how your company identifies and pursues expansion
  opportunities. Budget: $3M over 18 months.

  Available data:
  - 4,000 active customer records with full contract history
  - 3 years of product usage data (2B+ events)
  - 10,000 historical expansion opportunities with outcomes (win/loss)
  - Customer health scores (updated weekly)
  - CRM activity data (emails, meetings, notes)
  - Support ticket data (volume, sentiment, resolution)
  - Financial data (revenue, discounts, payment history)
  - NPS/CSAT survey data (quarterly)

  Current state (manual process):
  - CSMs manually review accounts for expansion signals
  - Average CSM reviews 40 accounts, misses signals on 60%
  - Time from signal to outreach: 14 days average
  - Expansion pipeline accuracy: 55% (many false positives)
  - No personalization — same expansion pitch to all customers

  Target state (AI-powered):
  - AI identifies expansion signals in real-time
  - Predictive model scores likelihood and optimal timing
  - Recommendation engine suggests best expansion approach
  - Personalized messaging generated for each opportunity
  - CSMs review AI recommendations vs doing manual analysis

  Technical requirements:
  - Must work with existing tech stack (Salesforce, Gainsight, Amplitude)
  - Must be explainable (CSMs need to understand why AI recommends)
  - Must have human-in-the-loop (AI recommends, human decides)
  - Must handle data privacy (customer data, GDPR, SOC 2)
  - Must scale to 10,000+ customers within 2 years

  Tasks:
  1. Write the "AI Expansion System Architecture" — the technical
     design. Include: the data pipeline (how data flows from 6+
     sources into the AI system), the predictive models (expansion
     likelihood model, timing model, deal size model, churn risk
     model), the recommendation engine (next-best-action for each
     account), the personalization engine (custom messaging based
     on account profile and history), and the feedback loop (how
     outcomes improve the model over time).

  2. Write the "AI-Augmented CSM Workflow" — how the AI system
     changes daily CSM work. Include: the morning dashboard (AI-
     curated priority list for the day), the account review experience
     (AI insights presented alongside account data), the outreach
     assistance (AI-drafted personalized expansion messages), the
     deal support (AI-recommended negotiation approaches and pricing),
     and the coaching insights (AI identifies patterns in CSM
     performance to improve skills).

  3. Write the "Implementation and Governance Plan" — how to build,
     deploy, and manage the AI system responsibly. Include: the phased
     development plan (Phase 1: signal detection, Phase 2: prediction,
     Phase 3: recommendation, Phase 4: personalization), the model
     validation framework (how to ensure AI recommendations are
     accurate), the bias monitoring (ensuring AI doesn't disadvantage
     certain customer segments), the adoption plan (how to get CSMs
     to trust and use the system), and the ROI measurement (how to
     quantify the AI system's impact on expansion revenue).

assertions:
  - type: llm_judge
    criteria: "AI architecture is technically sound — data pipeline, 4 predictive models, recommendation engine, personalization, and feedback loop that could power real expansion predictions"
    weight: 0.35
    description: "Technically sound AI architecture"
  - type: llm_judge
    criteria: "CSM workflow is genuinely augmented — morning dashboard, account insights, outreach assistance, deal support, and coaching that enhance rather than replace human judgment"
    weight: 0.35
    description: "Human-augmenting CSM workflow"
  - type: llm_judge
    criteria: "Implementation is responsible — phased development, model validation, bias monitoring, adoption plan, and ROI measurement for ethical AI deployment"
    weight: 0.30
    description: "Responsibly implemented AI system"
