meta:
  id: multi-stakeholder-expansion
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Navigate multi-stakeholder expansion deals — engage multiple decision-makers across departments when expanding from one team to the entire organization"
  tags: [sales, upsell, cross-sell, multi-stakeholder, enterprise, departmental, intermediate]

state: {}

trigger: |
  You're an Enterprise Account Manager at "OrgConnect" ($130M ARR,
  workplace collaboration platform). Your customer "GlobalMfg"
  (manufacturing company, 5,000 employees, $45K current ARR — 75 users
  in engineering department) wants to expand to 3 additional departments,
  but each department has different needs, budgets, and decision-makers.

  Current deployment:
  - Engineering (75 users, $45K ARR): Power users, high satisfaction
  - Champion: VP of Engineering (Sarah) — strong internal advocate
  - Usage: 95% weekly active, using collaboration, document sharing,
    and project tracking features

  Expansion targets:

  Department 1 — Operations (200 employees):
  Decision-maker: COO (Michael) — focused on efficiency and cost
  reduction. Has budget authority. Never used OrgConnect. Skeptical of
  "another tech tool." Currently uses a mix of email, shared drives,
  and a legacy system. Needs: Workflow automation, real-time dashboards,
  cross-plant collaboration (5 manufacturing plants).
  Budget: Has $80K for new technology this fiscal year.

  Department 2 — Sales (150 employees):
  Decision-maker: VP of Sales (David) — focused on pipeline and revenue.
  His team tried OrgConnect briefly last year but abandoned it (called
  it "not built for sales"). Currently uses Salesforce + Slack.
  Needs: Deal collaboration, proposal management, customer-facing
  project portals. Budget: Would need to justify ROI to CFO.

  Department 3 — HR (50 employees):
  Decision-maker: CHRO (Priya) — focused on employee experience and
  compliance. Open to new tools. Saw engineering team using OrgConnect
  and proactively asked about it. Currently uses BambooHR for HRIS
  and email for everything else.
  Needs: Employee onboarding workflows, policy management, cross-
  department communication. Budget: Small ($20K), but HR gets priority
  for "employee experience" initiatives.

  Additional context:
  - GlobalMfg's CEO has announced a "digital transformation" initiative
  - CFO controls large purchases (>$50K requires CFO approval)
  - IT department must approve all new software deployments
  - Each department's fiscal year starts at different times
  - Engineering champion Sarah has good relationship with COO and CHRO
    but not VP Sales (they had a disagreement last year)

  Tasks:
  1. Write the "Multi-Stakeholder Expansion Strategy" for GlobalMfg.
     Include: the stakeholder map (who influences whom, who has budget,
     who has veto power), the expansion sequence (which department to
     target first and why), the value proposition for each stakeholder
     (personalized messaging for COO, VP Sales, CHRO, CFO, IT), and
     the executive engagement plan (how to get CEO sponsorship for
     the digital transformation alignment).

  2. Write the "Department-Specific Expansion Proposals" — 3 proposals
     tailored to each department. For each: the current pain points
     (specific to their workflow), the OrgConnect solution mapping
     (which features solve which pain), the ROI estimate (quantified
     value for their department), the implementation plan (timeline,
     training, support), and the pricing recommendation (including
     enterprise-wide volume pricing).

  3. Write the "Enterprise-Wide Deal Strategy" — how to convert 3
     separate departmental deals into one enterprise agreement.
     Include: the single contract vs multiple PO approach, the
     enterprise pricing proposal (volume discount for 475 total
     users), the executive presentation (how to present the company-
     wide vision to CEO/CFO), and the "land-and-expand inside an
     expand" strategy (securing one department quickly while
     negotiating the enterprise deal).

assertions:
  - type: llm_judge
    criteria: "Stakeholder strategy maps influence and sequence — who influences whom, which department first, personalized messaging, and executive sponsorship plan"
    weight: 0.35
    description: "Influence-mapped stakeholder strategy"
  - type: llm_judge
    criteria: "Three proposals are genuinely department-specific — Operations, Sales, and HR each get distinct pain points, solution mapping, ROI, and implementation that reflect their different needs"
    weight: 0.35
    description: "Genuinely department-specific proposals"
  - type: llm_judge
    criteria: "Enterprise deal strategy converts departmental to company-wide — single contract approach, volume pricing, executive presentation, and phased strategy"
    weight: 0.30
    description: "Departmental-to-enterprise conversion"
