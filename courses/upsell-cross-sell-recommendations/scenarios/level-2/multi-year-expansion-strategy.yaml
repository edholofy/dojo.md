meta:
  id: multi-year-expansion-strategy
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Design multi-year expansion strategies — create long-term account growth plans that expand customer value systematically over 2-3 years"
  tags: [sales, upsell, cross-sell, multi-year, land-expand, strategic-planning, intermediate]

state: {}

trigger: |
  You're a Strategic Account Manager at "GrowthEngine" ($120M ARR,
  enterprise marketing platform). You have 3 strategic accounts that
  were "landed" in the past 6 months with initial deals. Your job is
  to design the 3-year "expand" strategy for each.

  Account 1 — "ConsumerBrands" (CPG company, 3,000 employees):
  Land deal: $80K ARR — Marketing team (40 users) using email
  marketing and basic analytics modules.
  Total addressable: $600K ARR (5 modules × 300 potential users)
  Customer goals: "Become a data-driven marketing organization."
  Current maturity: Basic — still using spreadsheets for campaign
  planning. Only the digital marketing team uses GrowthEngine.
  Expansion barriers: Traditional culture, slow adoption, fragmented
  marketing operations (4 brand teams work independently).

  Account 2 — "TechDisrupt" (B2B tech startup, 200 employees):
  Land deal: $25K ARR — Growth team (15 users) using marketing
  automation and A/B testing modules.
  Total addressable: $180K ARR (6 modules × 80 potential users)
  Customer goals: "10x our pipeline generation through data-driven
  marketing." Growing 100% YoY. Series C funded ($80M).
  Current maturity: Advanced — data-savvy team, fast adopters.
  Expansion barriers: Rapid growth means constant organizational
  change. Budget is available but attention is scarce.

  Account 3 — "HealthPharma" (pharmaceutical company, 15,000 employees):
  Land deal: $120K ARR — US marketing team (60 users) using content
  management and compliance modules.
  Total addressable: $2.4M ARR (6 modules × 2,000+ potential users
  across 12 countries).
  Customer goals: "Standardize global marketing operations."
  Current maturity: Mixed — US team is sophisticated, international
  teams range from basic to non-existent digital marketing.
  Expansion barriers: Regulatory complexity (pharma marketing rules
  vary by country), slow procurement, siloed country organizations.

  Tasks:
  1. For each account, write the "3-Year Expansion Roadmap." Include:
     Year 1 goals (deepen adoption, prove value, identify champions),
     Year 2 goals (expand to new teams/modules, build internal
     advocacy), Year 3 goals (enterprise-wide standardization, full
     platform adoption). For each year: specific expansion milestones,
     target ARR, key actions, dependencies, and risk factors.

  2. Write the "Land-and-Expand Playbook by Customer Maturity" — the
     different expansion approaches based on customer digital maturity.
     Include: the "Traditional" approach (ConsumerBrands — slow, change
     management intensive, prove-value-first), the "Growth" approach
     (TechDisrupt — fast, scale quickly, match their pace), and the
     "Global" approach (HealthPharma — regional expansion, compliance-
     aware, long cycle). For each: the expansion velocity, the key
     success factors, the typical timeline, and the common pitfalls.

  3. Write the "Expansion Milestone Tracker" — the framework for
     measuring progress against the 3-year plan. Include: the
     quarterly review metrics (adoption, engagement, satisfaction,
     expansion pipeline, competitive threats), the milestone
     definitions (what constitutes a "successfully expanded" account),
     the course correction triggers (signs the plan needs adjustment),
     and the escalation criteria (when to involve leadership).

assertions:
  - type: llm_judge
    criteria: "Three roadmaps reflect different customer realities — ConsumerBrands' slow culture, TechDisrupt's rapid growth, and HealthPharma's global complexity each get phased, realistic 3-year plans"
    weight: 0.35
    description: "Reality-reflecting 3-year roadmaps"
  - type: llm_judge
    criteria: "Maturity-based playbook provides different speeds — Traditional, Growth, and Global approaches with distinct velocities, success factors, and pitfalls"
    weight: 0.35
    description: "Speed-differentiated maturity playbook"
  - type: llm_judge
    criteria: "Milestone tracker enables measurement — quarterly metrics, milestone definitions, course correction triggers, and escalation criteria for ongoing plan management"
    weight: 0.30
    description: "Measurement-enabling milestone tracker"
