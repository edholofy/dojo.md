meta:
  id: expansion-objection-handling
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Handle expansion-specific objections — overcome the unique objections customers raise when asked to expand an existing relationship vs buying for the first time"
  tags: [sales, upsell, cross-sell, objections, resistance, handling, intermediate]

state: {}

trigger: |
  You're the Director of Expansion Sales at "ScaleUp" ($90M ARR). Your
  team has identified that expansion deals face different objections
  than new business deals. You've collected the 10 most common
  expansion objections from your team's last 200 expansion conversations:

  Objection 1 — "We're not even using all the features we pay for now"
  Frequency: 45% of expansion conversations
  Context: Customer pays for Professional tier but uses only 60% of
  features. Feels wasteful to pay for more.

  Objection 2 — "We need a discount since we're already a customer"
  Frequency: 40% of expansion conversations
  Context: Existing customers feel entitled to better pricing than
  new customers. "We've been loyal for 2 years — what's our discount?"

  Objection 3 — "Our budget is locked — can't add anything until renewal"
  Frequency: 35% of expansion conversations
  Context: Mid-contract, no budget for additional spend. CFO won't
  approve out-of-cycle purchases.

  Objection 4 — "We had issues with [feature X] — fix that first"
  Frequency: 30% of expansion conversations
  Context: Customer has open support tickets or historical frustrations.
  Uses dissatisfaction as leverage against expansion.

  Objection 5 — "Another team here had a bad experience with you"
  Frequency: 25% of expansion conversations
  Context: Cross-departmental expansion blocked by a team that had
  poor onboarding or implementation. Internal reputation is damaged.

  Objection 6 — "We're evaluating [competitor] for this use case"
  Frequency: 22% of expansion conversations
  Context: Instead of expanding your platform, they're considering
  a competitor's point solution for the adjacent need.

  Objection 7 — "Our new CIO/CFO wants to consolidate vendors, and
  you might be on the chopping block"
  Frequency: 18% of expansion conversations
  Context: New executive is reviewing all vendor relationships. Instead
  of expansion, you might face a downgrade or non-renewal.

  Objection 8 — "We want to build this internally"
  Frequency: 15% of expansion conversations
  Context: Engineering team believes they can build the capability
  themselves rather than buying your add-on module.

  Objection 9 — "The ROI on the initial purchase hasn't been proven"
  Frequency: 12% of expansion conversations
  Context: Customer hasn't measured or documented value from current
  deployment. Can't justify additional investment.

  Objection 10 — "We just need you to be more flexible on terms"
  Frequency: 10% of expansion conversations
  Context: Customer is willing to expand but uses it as leverage to
  renegotiate existing contract terms (lower price, longer payment
  terms, more favorable SLA).

  Tasks:
  1. For each of the 10 objections, write: the root cause analysis
     (what's really behind this objection), the empathy response
     (how to acknowledge without being defensive), the reframe
     strategy (how to turn the objection into an expansion
     opportunity), and the specific response script (3-5 sentences).

  2. Write the "Expansion Objection Prevention Guide" — how to
     prevent these objections from arising. Include: the pre-expansion
     checklist (what to verify before proposing expansion), the
     adoption audit process (ensuring current product is well-utilized
     before expanding), the stakeholder pre-alignment (checking with
     all influencers before formal proposal), and the value
     documentation practice (continuously building the ROI case so
     it's ready when needed).

  3. Write the "Objection-to-Opportunity Conversion Playbook" — how
     to use objections as signals for different expansion approaches.
     Include: "not using features" → adoption campaign that leads to
     natural upgrade, "bad experience" → recovery plan that strengthens
     relationship for future expansion, "evaluating competitor" →
     competitive displacement play, "new executive review" → executive
     briefing that repositions you as strategic partner. For each:
     the conversion steps, the timeline, and the expected outcome.

assertions:
  - type: llm_judge
    criteria: "Ten objection responses address root causes — empathy, reframe, and scripts for each that go beyond surface-level handling to address why the objection exists"
    weight: 0.35
    description: "Root-cause objection responses"
  - type: llm_judge
    criteria: "Prevention guide stops objections before they arise — pre-expansion checklist, adoption audit, stakeholder alignment, and value documentation that proactively address common triggers"
    weight: 0.35
    description: "Proactive objection prevention"
  - type: llm_judge
    criteria: "Conversion playbook turns negatives into opportunities — 4 objection-to-opportunity paths with conversion steps that create better outcomes than simply overcoming the objection"
    weight: 0.30
    description: "Negative-to-opportunity conversion"
