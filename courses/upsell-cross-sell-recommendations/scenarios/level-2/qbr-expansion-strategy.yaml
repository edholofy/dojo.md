meta:
  id: qbr-expansion-strategy
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Use QBRs as expansion engines — design quarterly business reviews that naturally surface and advance expansion opportunities through value demonstration"
  tags: [sales, upsell, cross-sell, QBR, review, value-demonstration, intermediate]

state: {}

trigger: |
  You're the VP of Customer Success at "ReviewPlatform" ($95M ARR).
  Your team conducts 400 QBRs per quarter across 200 strategic accounts.
  Currently, QBRs are "check-in" meetings that review metrics but rarely
  lead to expansion. You want to redesign them as expansion engines.

  Current QBR state:
  - 400 QBRs per quarter (2 per strategic account per year)
  - Average QBR duration: 45 minutes
  - QBRs that result in expansion conversation: 15%
  - QBRs that result in expansion deal: 4%
  - Customer satisfaction with QBRs: 3.2/5 (customers find them "nice
    but not actionable")
  - Most common customer feedback: "The QBR is a status update — tell
    us something we don't know"

  Current QBR format (generic):
  1. Relationship check-in (5 min)
  2. Product usage review (15 min)
  3. Support ticket review (10 min)
  4. Product roadmap preview (10 min)
  5. Next steps (5 min)

  Benchmarks from top-performing CSMs:
  - Top CSMs' QBRs result in expansion conversation 55% of the time
  - Their format focuses on business outcomes, not product usage
  - They invite economic buyers (VP+), not just day-to-day champions
  - They share industry benchmarks (how the customer compares to peers)
  - They present a "next horizon" vision of what the customer could
    achieve with expanded usage
  - Average QBR duration: 60 minutes (more strategic, less tactical)

  You have 3 accounts with upcoming QBRs next week:

  Account A — "TechOrg" ($85K ARR, 100 users, 18-month customer):
  Health: Green. Achieved 35% efficiency gain. Champion: VP Ops.
  Expansion opportunity: Team tier upgrade + 50 new users ($65K upsell)

  Account B — "ServiceCo" ($120K ARR, 200 users, 24-month customer):
  Health: Yellow. Adoption dropped from 85% to 70% in last quarter.
  Champion: Director of IT (not senior enough for expansion decisions).
  Expansion opportunity: Analytics add-on ($30K cross-sell) — but
  need to fix adoption first.

  Account C — "MfgCorp" ($200K ARR, 300 users, 12-month customer):
  Health: Green. Using 90% of features. 3 departments requesting access.
  Champion: CIO. Expansion opportunity: 3-department expansion ($150K).

  Tasks:
  1. Write the "Expansion-Oriented QBR Framework" — the redesigned
     QBR format that naturally leads to expansion conversations.
     Include: the new QBR structure (with timing for each section),
     the value story section (how to present business impact in a
     way that creates appetite for more), the benchmarking section
     (how to use peer comparisons to inspire growth), the "next
     horizon" section (how to introduce expansion opportunities
     naturally), and the attendee strategy (who should be in the
     room and why).

  2. Write the "QBR Preparation Playbooks" for the 3 upcoming QBRs.
     For each: the pre-QBR research (what to analyze and prepare),
     the customized agenda (specific to their account situation), the
     key insights to present (data that will surprise and engage them),
     the expansion positioning strategy (how and when to introduce
     the expansion opportunity), and the follow-up plan (what happens
     after the QBR).

  3. Write the "QBR Metrics and Improvement System" — how to measure
     and improve QBR effectiveness at driving expansion. Include: the
     QBR quality scorecard (10 criteria for a great QBR), the post-QBR
     survey (what to ask customers), the QBR-to-expansion tracking
     (metrics linking QBR quality to expansion revenue), the CSM
     coaching framework (how to help CSMs improve their QBR skills),
     and the quarterly QBR review process (how the CS leadership
     audits and improves the QBR program).

assertions:
  - type: llm_judge
    criteria: "QBR framework transforms check-ins into expansion engines — value story, benchmarking, next horizon, and attendee strategy that naturally surface expansion opportunities"
    weight: 0.35
    description: "Expansion-driving QBR framework"
  - type: llm_judge
    criteria: "Three QBR playbooks are account-specific — pre-QBR research, customized agendas, key insights, and expansion positioning tailored to TechOrg, ServiceCo, and MfgCorp"
    weight: 0.35
    description: "Account-specific QBR playbooks"
  - type: llm_judge
    criteria: "Metrics system connects QBR quality to expansion — scorecard, survey, tracking, coaching, and review process that create a measurable QBR improvement program"
    weight: 0.30
    description: "QBR-to-expansion metrics system"
