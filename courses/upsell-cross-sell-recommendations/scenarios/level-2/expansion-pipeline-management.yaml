meta:
  id: expansion-pipeline-management
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Build and manage an expansion pipeline — create systematic processes for tracking, forecasting, and converting expansion opportunities across your customer portfolio"
  tags: [sales, upsell, cross-sell, pipeline, forecasting, process, intermediate]

state: {}

trigger: |
  You're the Expansion Sales Manager at "PlatformPro" ($85M ARR, 1,200
  customers). You manage a team of 8 Account Managers (AMs) responsible
  for $12M in expansion ARR this year. Currently, your expansion pipeline
  is a mess — opportunities are tracked in spreadsheets, there's no
  standard methodology, and your team missed their Q1 target by 30%.

  Current state:
  - Q1 expansion target: $3M ARR. Actual: $2.1M (70% attainment)
  - Pipeline at start of Q1: $8M (should have been 3x coverage = $9M)
  - Pipeline conversion rate: 26% (industry benchmark: 35%)
  - Average expansion deal cycle: 45 days (benchmark: 30 days)
  - Pipeline stages: None defined (AMs use their own systems)
  - No expansion-specific forecasting methodology

  Q1 post-mortem findings:
  - 40% of "pipeline" was stale (opportunities not updated in 30+ days)
  - 25% of opportunities were incorrectly staged (marked as "verbal
    commit" when they were actually "early discussion")
  - No differentiation between upsell and cross-sell opportunities
  - Top 2 AMs generated 60% of expansion revenue; bottom 4 generated 15%
  - 35% of expansion opportunities came from proactive outreach, 65%
    from reactive customer requests

  Team performance data:
  - AM 1 (top performer): $520K expansion, 38% close rate, 25-day cycle
  - AM 2: $410K, 32% close rate, 30-day cycle
  - AM 3: $290K, 28% close rate, 40-day cycle
  - AM 4: $260K, 25% close rate, 45-day cycle
  - AM 5-8 (underperformers): avg $155K each, 18% close rate, 55-day cycle

  Tasks:
  1. Write the "Expansion Pipeline Framework" — the standard pipeline
     methodology for the team. Include: the 6 pipeline stages with
     clear entry/exit criteria (Identified → Qualified → Proposed →
     Negotiating → Verbal Commit → Closed Won), the pipeline hygiene
     rules (update cadence, stale deal policies, stage accuracy
     requirements), the pipeline coverage model (how much pipeline
     is needed at each stage to hit target), and the forecasting
     methodology (weighted pipeline, commit categories, call accuracy).

  2. Write the "Expansion Opportunity Scoring Model" — how to
     prioritize which expansion opportunities to pursue. Include:
     the scoring criteria (account health, usage signals, business
     events, relationship strength, deal size, competitive risk),
     the scoring methodology (weighted scoring with thresholds), the
     priority tiers (Tier 1: act now, Tier 2: nurture, Tier 3: park),
     and the resource allocation guide (how much time to spend on each
     tier).

  3. Write the "Q2 Pipeline Recovery Plan" — specific actions to hit
     the $3M Q2 target. Include: the pipeline generation plan (how
     to build $10M+ in qualified pipeline in the first 2 weeks of Q2),
     the conversion improvement actions (how to improve from 26% to
     35% close rate), the coaching plan for underperforming AMs, and
     the weekly cadence (pipeline review rhythm, forecasting calls,
     deal inspection process).

assertions:
  - type: llm_judge
    criteria: "Pipeline framework provides structure — 6 stages with entry/exit criteria, hygiene rules, coverage model, and forecasting methodology that could standardize a real expansion team"
    weight: 0.35
    description: "Structured pipeline framework"
  - type: llm_judge
    criteria: "Scoring model enables prioritization — weighted criteria, methodology, priority tiers, and resource allocation that help AMs focus on highest-value opportunities"
    weight: 0.35
    description: "Prioritization-enabling scoring model"
  - type: llm_judge
    criteria: "Recovery plan is actionable for Q2 — pipeline generation, conversion improvement, AM coaching, and weekly cadence that could realistically recover from a 30% Q1 miss"
    weight: 0.30
    description: "Actionable Q2 recovery plan"
