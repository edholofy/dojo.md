meta:
  id: account-whitespace-analysis
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Conduct whitespace analysis for expansion — map the total addressable opportunity within existing accounts and build expansion strategies for each whitespace gap"
  tags: [sales, upsell, cross-sell, whitespace, account-planning, mapping, intermediate]

state: {}

trigger: |
  You're an Enterprise Account Manager at "EnterpriseSuite" ($200M ARR,
  enterprise platform with 6 product modules). Your top 5 strategic
  accounts represent $4.5M in current ARR but your analysis shows
  $18M in total addressable revenue. You need to identify and pursue
  the $13.5M whitespace.

  Product portfolio (6 modules):
  - Core Platform ($30/user/mo): Project management, collaboration
  - Analytics ($15/user/mo): Business intelligence, dashboards
  - Automation ($20/user/mo): Workflow automation, integrations
  - Security ($12/user/mo): SSO, audit, compliance
  - AI Assistant ($18/user/mo): AI-powered insights, predictions
  - Developer Platform ($25/user/mo): APIs, custom apps, SDKs

  Strategic account map:

  Account 1 — "MegaBank" (15,000 employees, financial services):
  Current: Core Platform (500 users in IT), Security (500 users)
  Current ARR: $252K. Addressable: 4,000 users across 8 departments.
  Using competitors: Analytics (Tableau), Automation (ServiceNow)
  Relationships: Strong in IT, weak in business units.
  Potential ARR at full penetration: $2.4M

  Account 2 — "HealthSystem" (8,000 employees, healthcare):
  Current: Core Platform (200 users in admin), Automation (200 users)
  Current ARR: $120K. Addressable: 2,000 users across clinical and admin.
  Using competitors: Security (CrowdStrike), Analytics (Power BI)
  Relationships: Strong in operations, none in clinical or IT.
  Potential ARR at full penetration: $960K

  Account 3 — "TechGiant" (25,000 employees, technology):
  Current: Core Platform (2,000 users), Analytics (800 users),
  Automation (1,200 users), Security (2,000 users), Developer (500 users)
  Current ARR: $3.12M. Addressable: 8,000 users, all 6 modules.
  Using competitors: AI Assistant (internal tool)
  Relationships: Excellent across engineering, product, and IT.
  Potential ARR at full penetration: $5.76M

  Account 4 — "RetailCo" (12,000 employees, retail):
  Current: Core Platform (300 users in corporate), AI Assistant (100 users)
  Current ARR: $126K. Addressable: 3,000 users (corporate + regional).
  Using competitors: Analytics (Looker), Automation (Zapier Enterprise)
  Relationships: Good in corporate HQ, none in 200 retail locations.
  Potential ARR at full penetration: $2.16M

  Account 5 — "GovDefense" (20,000 employees, defense contractor):
  Current: Core Platform (1,000 users), Security (1,000 users)
  Current ARR: $504K. Addressable: 5,000 users, but FedRAMP required.
  Using competitors: Analytics (Palantir), Automation (BMC Remedy)
  Relationships: Strong with CISO, moderate with program managers.
  Potential ARR at full penetration: $3.6M

  Tasks:
  1. For each account, write the "Whitespace Map" — the visual
     representation of current state vs total opportunity. Include:
     the department-by-module matrix (which departments use which
     modules), the competitive landscape (where competitors are
     entrenched and how vulnerable they are), the expansion
     priority ranking (which whitespace to pursue first and why),
     and the 12-month expansion target (realistic revenue goal).

  2. Write the "Whitespace Pursuit Strategies" — the specific
     approaches for the 3 highest-priority whitespace gaps across
     all 5 accounts. For each: the entry strategy (how to get into
     the new department or replace the competitor), the value
     proposition (why switch or add your module), the champion
     strategy (who to recruit as internal advocate), the competitive
     displacement approach (how to unseat the incumbent), and the
     timeline with milestones.

  3. Write the "Account Planning Template" — the reusable template
     AMs use for whitespace analysis on any strategic account.
     Include: the org mapping methodology (how to identify all
     addressable users), the product fit assessment (how to determine
     which modules fit which departments), the competitive analysis
     framework (how to assess competitor vulnerability), the
     relationship mapping guide (how to identify and build
     relationships across the org), and the expansion roadmap template
     (12-month plan with quarterly milestones).

assertions:
  - type: llm_judge
    criteria: "Five whitespace maps reveal total opportunity — department-by-module matrices, competitive landscapes, priority rankings, and revenue targets for each strategic account"
    weight: 0.35
    description: "Opportunity-revealing whitespace maps"
  - type: llm_judge
    criteria: "Pursuit strategies are specific and actionable — entry strategies, value propositions, champion recruitment, and competitive displacement for the 3 highest-priority gaps"
    weight: 0.35
    description: "Actionable pursuit strategies"
  - type: llm_judge
    criteria: "Account planning template is reusable — org mapping, product fit, competitive analysis, relationship mapping, and expansion roadmap that any AM could apply"
    weight: 0.30
    description: "Reusable account planning template"
