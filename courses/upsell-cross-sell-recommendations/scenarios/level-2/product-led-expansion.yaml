meta:
  id: product-led-expansion
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Drive product-led expansion — use in-product signals, feature gates, and usage triggers to create self-serve and assisted expansion motions"
  tags: [sales, upsell, cross-sell, product-led, PLG, usage-triggers, intermediate]

state: {}

trigger: |
  You're the Head of Growth at "DevToolKit" ($70M ARR, developer tools
  platform with a PLG motion). Your product has a generous free tier
  that drives adoption, but converting free users to paid — and paid
  users to higher tiers — is underperforming.

  Current product tiers:
  - Free: 3 projects, 5 team members, 1GB storage, community support
  - Pro ($29/user/mo): 25 projects, 25 team members, 50GB, email support
  - Team ($59/user/mo): Unlimited projects/members, 500GB, priority
    support, SSO, analytics
  - Enterprise ($99/user/mo): Everything + dedicated support, custom
    integrations, SLA, audit logs

  Current metrics:
  - 150,000 free users (individuals and small teams)
  - 8,000 paid accounts (mostly Pro)
  - Free-to-Pro conversion: 2.1% (industry benchmark: 3-5%)
  - Pro-to-Team upgrade: 8% annually (benchmark: 15-20%)
  - Team-to-Enterprise: 12% annually (benchmark: 15%)
  - Average time from free signup to first paid conversion: 45 days
  - Expansion revenue: 18% of total new ARR (benchmark: 30-40%)

  Product usage data analysis:
  - Users who hit the 3-project limit: 68% convert to Pro within 14 days
  - Users who invite 4+ team members on free: 52% convert within 30 days
  - Pro users with 15+ team members: 35% could benefit from Team tier
  - Pro users using API more than 1,000 calls/month: 28% would benefit
    from Team tier API limits
  - Free users who are active for 30+ days without converting: 12%
    eventually convert (vs 4% for those active <15 days)
  - Users who complete the onboarding tutorial: 3.2x more likely to convert
  - Users from companies with 200+ employees: 4.1x LTV vs average

  Current in-product expansion triggers (all underperforming):
  - Banner when hitting project limit: 5% click-through rate
  - Email when 80% storage used: 3% click-through rate
  - Upgrade button in navigation: 0.5% click-through rate
  - Annual pricing comparison modal: 2% conversion from view

  Tasks:
  1. Write the "Product-Led Expansion Strategy" — the comprehensive
     plan for improving in-product expansion. Include: the expansion
     trigger redesign (which product moments to use for upgrade
     prompts, with specific UX recommendations), the segmentation
     strategy (different expansion approaches for different user types),
     the pricing experiment plan (what to test — free tier limits,
     trial length, upgrade incentives), and the self-serve vs assisted
     decision framework (which expansion motions should be self-serve
     and which need human touch).

  2. Write the "In-Product Expansion Playbook" — the specific in-app
     experiences for each upgrade path. Include: Free-to-Pro triggers
     (5 specific moments with UX copy), Pro-to-Team triggers (5
     specific moments with UX copy), Team-to-Enterprise triggers (3
     specific moments plus human handoff), and the experimentation
     framework (how to A/B test each trigger for optimal conversion).

  3. Write the "Product-Led Sales Assist Model" — how the sales team
     supports product-led expansion. Include: the PQL (Product
     Qualified Lead) definition (what usage patterns trigger sales
     outreach), the outreach playbook (how sales contacts PQLs
     differently than MQLs), the hybrid motion design (how self-serve
     and sales-assisted expansion work together), and the attribution
     model (how to credit product vs sales for expansion revenue).

assertions:
  - type: llm_judge
    criteria: "PLG strategy is data-driven — expansion triggers, segmentation, pricing experiments, and self-serve vs assisted decisions based on the specific usage data provided"
    weight: 0.35
    description: "Data-driven PLG strategy"
  - type: llm_judge
    criteria: "In-product playbook provides specific UX — 5+ triggers per upgrade path with UX copy and experimentation framework, not just general suggestions"
    weight: 0.35
    description: "Specific in-product playbook"
  - type: llm_judge
    criteria: "Sales assist model bridges PLG and sales — PQL definition, outreach playbook, hybrid motion, and attribution that connect product usage to sales actions"
    weight: 0.30
    description: "PLG-sales bridging model"
