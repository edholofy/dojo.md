meta:
  id: intermediate-expansion-shift
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Handle an intermediate expansion shift — manage a complex week with pipeline pressures, CS-Sales handoff issues, competitive threats, and executive stakeholder demands"
  tags: [sales, upsell, cross-sell, shift-simulation, multi-challenge, intermediate]

state: {}

trigger: |
  You're the Expansion Sales Manager at "ExpansionCo" ($110M ARR). It's
  the last week of Q2 and your team needs $800K more in expansion ARR
  to hit the quarterly target of $4.5M. You have $1.2M in pipeline but
  several deals are at risk. You have 6 team members and 5 situations
  to manage.

  Situation 1 — Pipeline deal in jeopardy ($350K):
  "BigTech" was supposed to expand from 200 to 500 seats this quarter.
  Their VP sponsor was just laid off in a restructuring. The new VP
  hasn't been briefed on the expansion. Your AM has been unable to
  reach anyone at BigTech for 2 weeks. The deal was marked "Commit" in
  your forecast.

  Situation 2 — CS handoff fumble ($120K):
  "HealthOrg" was identified by CS as ready for a tier upgrade 6 weeks
  ago. The handoff was poorly executed (no context provided). Your AM
  called the customer and pitched the wrong product (Analytics add-on
  when they wanted Security module). The customer champion emailed CS
  saying "your sales team doesn't understand our needs." The customer
  is now shopping competitors.

  Situation 3 — Competitive threat during expansion ($200K):
  "RetailCo" was in final stages of expanding to 3 new departments.
  A competitor offered their CIO a "free 6-month pilot" for their
  entire organization. The CIO has paused your expansion deal to
  evaluate. "We need to see what they're offering before we commit
  more budget to you."

  Situation 4 — Executive demand ($180K):
  Your VP of Sales has told you that the CEO of "FinanceOrg" (one of
  your top accounts) wants a meeting with your CEO tomorrow to discuss
  a potential enterprise-wide expansion. This could be $180K in Q2
  plus $500K+ over the next year. But you have no preparation, no
  proposal, and no expansion plan for this account. Your CEO expects
  you to prepare the briefing package tonight.

  Situation 5 — Team conflict ($150K):
  Two of your AMs are fighting over who owns the "ConsultingCo"
  expansion. The CSM identified the opportunity and handed it to AM-1
  (geographic territory). But AM-2 has the existing relationship (she
  closed the original deal). ConsultingCo is confused because two
  people have contacted them about expansion. The customer champion
  is annoyed: "Can you guys get your act together?"

  Tasks:
  1. Write the "Week Triage Plan" — how to handle all 5 situations
     in the final week of Q2. Include: the priority ranking, the
     resource allocation (which AM handles what), the realistic
     assessment (which deals can still close this week vs which should
     be moved to Q3), and the revised forecast (what you'll actually
     report to leadership).

  2. For each situation, write the specific resolution strategy with
     action steps, timeline (day by day), and expected outcome.
     Include: Situation 1 (how to re-engage BigTech after sponsor
     loss), Situation 2 (how to recover from the CS handoff failure),
     Situation 3 (how to defend against the competitive free pilot),
     Situation 4 (how to prepare the CEO briefing overnight), and
     Situation 5 (how to resolve the AM territory conflict).

  3. Write the "Q2 Post-Mortem and Q3 Prevention Plan" — lessons
     learned and actions to prevent these situations in Q3. Include:
     the forecast accuracy improvement actions (preventing another
     missed quarter), the CS handoff quality improvements, the
     competitive early-warning system, the executive engagement
     readiness plan, and the territory/ownership clarification rules.

assertions:
  - type: llm_judge
    criteria: "Triage plan is realistic about Q2 — priority ranking, resource allocation, and revised forecast that honestly assess which deals can close this week vs next quarter"
    weight: 0.35
    description: "Realistically triaged week plan"
  - type: llm_judge
    criteria: "Five resolution strategies are specific — day-by-day actions for re-engagement, recovery, competitive defense, CEO prep, and territory conflict with expected outcomes"
    weight: 0.35
    description: "Day-by-day resolution strategies"
  - type: llm_judge
    criteria: "Post-mortem prevents recurrence — forecast accuracy, handoff quality, competitive early-warning, executive readiness, and territory rules that address root causes"
    weight: 0.30
    description: "Recurrence-preventing post-mortem"
