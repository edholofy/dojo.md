meta:
  id: cs-sales-handoff-design
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Design the CS-to-Sales handoff for expansion opportunities — build the process that ensures expansion leads from Customer Success are properly handed to Sales for closing"
  tags: [sales, upsell, cross-sell, CS-handoff, process, collaboration, intermediate]

state: {}

trigger: |
  You're the Director of Revenue Operations at "SyncPlatform" ($100M
  ARR). Your CS team identifies expansion opportunities but the
  handoff to the Sales team (Account Executives who handle expansion
  deals over $25K) is broken. Expansion leads are falling through
  the cracks, and both teams blame each other.

  Current problems:
  - CS identifies ~50 expansion opportunities per month
  - Only 30 make it to an AE (20 lost in handoff)
  - Of the 30, AEs accept 18 (12 rejected as "not qualified")
  - Of the 18 accepted, 6 close (33% close rate)
  - Revenue from CS-sourced expansion: $1.8M/quarter
  - Estimated missed revenue from lost handoffs: $1.2M/quarter

  CS team complaints:
  - "AEs don't follow up on our leads"
  - "AEs reject opportunities without explaining why"
  - "We don't get credit for expansion revenue we helped generate"
  - "AEs take too long to engage — customer momentum dies"
  - Average time from CS handoff to AE first contact: 8 days

  Sales team complaints:
  - "CS sends us unqualified leads — customer isn't ready to buy"
  - "The handoff information is incomplete — we have to re-discover"
  - "CS promises things during handoff that we can't deliver"
  - "We're measured on new business, expansion is secondary priority"
  - "CS doesn't understand sales process or buying signals"

  Current handoff process:
  CSM sends email to AE with customer name and "they want to expand."
  No template, no qualification criteria, no SLA, no tracking.

  Data from successful handoffs (the 6 that closed):
  - CSM included specific expansion need and business context
  - Customer champion was warm-introduced to AE
  - AE contacted customer within 48 hours
  - CSM stayed involved through the deal
  - Average deal size: $45K

  Tasks:
  1. Write the "CS-to-Sales Expansion Handoff Process" — the end-to-end
     process for passing expansion opportunities from CS to Sales.
     Include: the qualification criteria (what makes an opportunity
     ready for handoff — minimum 5 criteria), the handoff document
     template (what information CS must provide to Sales), the warm
     introduction protocol (how CS introduces the AE to the customer),
     the SLA framework (response times, acceptance criteria, follow-up
     requirements), and the escalation path (what happens when the
     process breaks down).

  2. Write the "Shared Metrics and Incentives Framework" — how to
     align CS and Sales on expansion goals. Include: the shared
     metrics dashboard (what both teams track together), the
     compensation alignment (how CS gets credit for expansion revenue
     they source), the team-level goals (shared expansion targets),
     the attribution model (how to credit CS vs Sales for expansion
     revenue), and the recognition program (how to celebrate
     successful CS-Sales collaboration).

  3. Write the "Handoff Quality Improvement Plan" — specific actions
     to improve from current state. Include: the training plan (what
     CS needs to learn about sales qualification, what Sales needs
     to learn about customer health), the feedback loop (how AEs
     provide feedback on lead quality back to CS), the quarterly
     review process (how to audit and improve the handoff), and the
     technology requirements (what tools/integrations needed to
     automate and track handoffs).

assertions:
  - type: llm_judge
    criteria: "Handoff process addresses both team complaints — qualification criteria, handoff template, warm introduction, SLA, and escalation that could recover the $1.2M quarterly gap"
    weight: 0.35
    description: "Complaint-addressing handoff process"
  - type: llm_judge
    criteria: "Metrics framework aligns incentives — shared dashboard, compensation alignment, attribution model, and recognition that motivate both CS and Sales to collaborate on expansion"
    weight: 0.35
    description: "Incentive-aligning metrics framework"
  - type: llm_judge
    criteria: "Improvement plan builds capability — cross-training, feedback loops, quarterly reviews, and technology that create ongoing improvement in handoff quality"
    weight: 0.30
    description: "Capability-building improvement plan"
