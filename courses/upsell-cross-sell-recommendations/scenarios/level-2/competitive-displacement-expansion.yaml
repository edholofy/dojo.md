meta:
  id: competitive-displacement-expansion
  level: 2
  course: upsell-cross-sell-recommendations
  type: output
  description: "Expand footprint by displacing competitors — identify and execute expansion opportunities where customers use competitor products for adjacent use cases"
  tags: [sales, upsell, cross-sell, competitive-displacement, expansion, strategy, intermediate]

state: {}

trigger: |
  You're a Strategic Account Manager at "UnifyPlatform" ($150M ARR,
  all-in-one business operations platform). Your strategic accounts
  use your platform for some workflows but competitor products for
  others. Your CEO's mandate: "Consolidate our customers onto our
  platform — displace every competitor in our install base."

  3 strategic accounts with competitive displacement opportunities:

  Account 1 — "LogiCorp" ($200K ARR on UnifyPlatform):
  Your modules: Project Management, Document Management
  Competitor 1: Salesforce CRM ($180K/year) — 200 sales users
  Competitor 2: Zendesk Support ($45K/year) — 50 support users
  Competitor 3: Slack ($30K/year) — 400 users (company-wide)
  Total addressable with UnifyPlatform: $520K ARR
  Context: LogiCorp's CTO is frustrated with "tool sprawl" (18 SaaS
  tools). CFO wants to consolidate vendors to reduce costs. Your CRM
  and Support modules exist but are less mature than Salesforce/Zendesk.

  Account 2 — "MediaGroup" ($120K ARR on UnifyPlatform):
  Your modules: Project Management, Analytics
  Competitor 1: Adobe Creative Cloud ($95K/year) — 80 creative users
  Competitor 2: Asana ($35K/year) — 60 marketing users (overlap with
  your Project Management!)
  Competitor 3: HubSpot Marketing ($60K/year) — 30 marketing users
  Total addressable with UnifyPlatform: $380K ARR
  Context: MediaGroup just went through a merger, inheriting Asana from
  the acquired company. They now have 2 project management tools
  (yours and Asana). The merged marketing team uses both HubSpot and
  your Analytics. CRO wants "one source of truth."

  Account 3 — "FinServices" ($350K ARR on UnifyPlatform):
  Your modules: CRM, Analytics, Document Management, Security
  Competitor 1: ServiceNow ITSM ($200K/year) — 100 IT users
  Competitor 2: Jira ($40K/year) — 80 engineering users
  Competitor 3: Power BI ($25K/year) — 50 data team users
  Total addressable with UnifyPlatform: $680K ARR
  Context: FinServices is your highest-spending customer. They've
  standardized most departments on your platform. IT and Engineering
  are the last holdouts. IT has deep ServiceNow customizations (3 years
  of investment). Engineering loves Jira's developer workflow.

  Tasks:
  1. For each account, write the "Competitive Displacement Strategy."
     Include: the priority ranking (which competitor to displace first
     and why), the displacement approach (rip-and-replace vs
     coexist-and-expand), the migration plan (how to transition users
     from competitor to your platform), the risk assessment (what
     could go wrong — data migration, user resistance, feature gaps),
     and the business case (TCO comparison showing consolidation
     savings).

  2. Write the "Competitive Displacement Playbook" — the reusable
     framework for displacing competitors within existing accounts.
     Include: the 5-step displacement methodology (Assess → Position →
     Pilot → Migrate → Optimize), the competitor vulnerability
     assessment (how to identify when a competitor is most vulnerable),
     the internal champion recruitment strategy (how to find advocates
     in the competitor's user base), the migration support framework
     (what resources to offer during transition), and the consolidation
     value calculator (how to quantify savings from vendor reduction).

  3. Write the "Feature Gap Objection Handling Guide" — how to handle
     the #1 objection in competitive displacement: "Your module isn't
     as good as [Competitor]." Include: the honest assessment approach
     (when to acknowledge gaps vs when to reframe), the "good enough
     plus integration" argument (why 80% feature parity + platform
     integration beats 100% point solution), the roadmap commitment
     strategy (when to promise future features), and 5 specific
     objection-response scripts for common competitor comparisons.

assertions:
  - type: llm_judge
    criteria: "Three displacement strategies are realistic — priority ranking, approach, migration plan, risk assessment, and TCO comparison that acknowledge real competitive strengths"
    weight: 0.35
    description: "Realistic displacement strategies"
  - type: llm_judge
    criteria: "Playbook provides reusable methodology — 5-step process, vulnerability assessment, champion recruitment, migration support, and value calculator for any competitive displacement"
    weight: 0.35
    description: "Reusable displacement methodology"
  - type: llm_judge
    criteria: "Feature gap guide is honest — acknowledges gaps, presents integration value, handles roadmap commitments, and provides specific scripts that build trust rather than overselling"
    weight: 0.30
    description: "Honest feature gap handling"
