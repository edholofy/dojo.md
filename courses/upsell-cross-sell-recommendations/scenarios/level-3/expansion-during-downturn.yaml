meta:
  id: expansion-during-downturn
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Drive expansion during economic downturn — adapt upsell and cross-sell strategies when customers are cutting budgets and consolidating vendors"
  tags: [sales, upsell, cross-sell, downturn, budget-cuts, consolidation, advanced]

state: {}

trigger: |
  You're the CRO at "ResilienceCloud" ($200M ARR, enterprise platform).
  A major economic downturn has hit, and your customers are cutting
  budgets. Expansion revenue has dropped 40% quarter-over-quarter.
  You need to adapt your expansion strategy to the new reality.

  Market conditions:
  - GDP contracted 1.2% last quarter
  - 60% of your customers have announced budget freezes
  - 25% have announced layoffs (reducing your per-seat revenue)
  - CFOs are reviewing all SaaS spend; vendor consolidation is
    the #1 priority
  - Average customer budget reduction for software: 15-20%
  - Competitive "rescue" offers flooding the market

  Impact on your business:
  - Expansion ARR dropped from $15M/quarter to $9M/quarter
  - New business ARR dropped from $20M/quarter to $12M/quarter
  - Churn increased from 8% to 14% annualized
  - NRR dropped from 118% to 95% (net contraction)
  - Downsell requests: 45 customers have asked to reduce seats or
    downgrade tiers
  - 30 customers have started competitive evaluations for consolidation

  Your customer portfolio:
  - 2,500 customers, $200M ARR
  - 40% enterprise (1,000 accounts, $120M ARR) — most budget-impacted
  - 35% mid-market (875 accounts, $55M ARR) — mixed impact
  - 25% SMB (625 accounts, $25M ARR) — highest churn risk

  Bright spots:
  - Customers looking to consolidate vendors may consolidate ONTO your
    platform (replacing competitors) — this is "defensive expansion"
  - Cost-reduction features (automation, efficiency) are in high demand
  - 15% of customers are actually growing despite the downturn
  - Multi-year commitments lock in revenue at protected pricing

  Tasks:
  1. Write the "Downturn Expansion Strategy" — the adapted approach
     for driving expansion during an economic downturn. Include: the
     "defensive expansion" playbook (how to position yourself as the
     consolidation winner), the "efficiency sell" approach (how to
     upsell by showing cost reduction rather than new capabilities),
     the "lock-in" strategy (multi-year commitments at protected
     pricing for budget certainty), the "grow with the growers"
     targeting (how to identify and focus on the 15% that are growing),
     and the "protect and expand" balancing act (how to retain at-risk
     customers while still growing expansion revenue).

  2. Write the "Customer Segmentation for Downturn" — how to
     re-segment your portfolio based on downturn impact. Include: the
     4 segments (Growers — still expanding, Steady — maintaining,
     Cutters — reducing spend, At-Risk — may churn), the identification
     criteria for each segment, the expansion strategy for each segment
     (yes, even Cutters may have expansion opportunities), the resource
     allocation across segments, and the early warning signals for
     segment migration (e.g., a Steady becoming a Cutter).

  3. Write the "Downturn Communication Templates" — how to communicate
     about expansion during tough times. Include: the empathetic
     outreach template (acknowledging the downturn without being
     tone-deaf), the consolidation proposal template (offering to
     replace competitors), the efficiency ROI template (showing how
     expansion actually saves money), the multi-year protection
     template (offering budget certainty), and the executive briefing
     template (for CXO conversations about strategic partnership
     during the downturn).

assertions:
  - type: llm_judge
    criteria: "Downturn strategy is realistic and adaptive — defensive expansion, efficiency sell, lock-in, grower targeting, and protect-and-expand that acknowledge reality while finding growth"
    weight: 0.35
    description: "Realistically adaptive downturn strategy"
  - type: llm_judge
    criteria: "Segmentation enables targeted action — Growers, Steady, Cutters, and At-Risk each get identification criteria, tailored expansion strategies, and resource allocation"
    weight: 0.35
    description: "Action-enabling downturn segmentation"
  - type: llm_judge
    criteria: "Communication templates are tone-appropriate — empathetic, efficiency-focused, and partnership-oriented messaging that avoids being tone-deaf during economic hardship"
    weight: 0.30
    description: "Tone-appropriate downturn communication"
