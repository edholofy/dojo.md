meta:
  id: vertical-expansion-playbook
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Build vertical-specific expansion playbooks — create industry-tailored upsell and cross-sell strategies that leverage vertical knowledge for higher conversion rates"
  tags: [sales, upsell, cross-sell, vertical, industry-specific, playbook, advanced]

state: {}

trigger: |
  You're the VP of Industry Solutions at "VerticalPlatform" ($160M ARR,
  horizontal platform selling into 5 major verticals). Your CEO wants
  to increase expansion revenue by creating industry-specific expansion
  playbooks. The hypothesis: generic expansion approaches don't work
  because each industry has unique buying patterns, expansion triggers,
  and decision-making structures.

  Your 5 verticals (with current expansion metrics):
  - Financial Services (400 customers, $50M ARR): Expansion rate 15%
  - Healthcare (300 customers, $35M ARR): Expansion rate 8%
  - Technology (500 customers, $40M ARR): Expansion rate 22%
  - Manufacturing (200 customers, $20M ARR): Expansion rate 10%
  - Retail (150 customers, $15M ARR): Expansion rate 12%

  Industry-specific characteristics:

  Financial Services: Regulated, compliance-driven purchases. Budget
  cycles tied to regulatory calendar. Expansion blocked by compliance
  review (adds 45+ days). Buying committee includes compliance officer.
  High willingness to pay for security and audit features.

  Healthcare: Extremely regulated (HIPAA). Clinical vs administrative
  buying. Budget tied to fiscal year (often Oct 1). Expansion to
  clinical departments requires different approval path than admin.
  High switching costs once implemented.

  Technology: Fast-moving, PLG-influenced. Budget available year-round.
  Technical evaluations heavy. Expansion driven by developer adoption.
  Low loyalty — will switch for better product. Quick decisions.

  Manufacturing: Conservative, ROI-focused. Long procurement cycles.
  Capital expenditure mentality even for SaaS. Expansion tied to plant
  expansion or modernization projects. Seasonal buying patterns.

  Retail: Seasonal business, Q4 is blackout for purchases. Budget
  concentrated in Q1. Omnichannel expansion (HQ + stores + e-commerce).
  Expansion tied to holiday performance and new store openings.

  Tasks:
  1. Write the "Vertical Expansion Playbook" for the top 3 verticals
     (Financial Services, Healthcare, Technology). For each: the
     expansion triggers unique to the industry, the buying committee
     composition (who's involved in expansion decisions), the
     compliance/regulatory considerations affecting expansion, the
     optimal expansion timing (when to approach based on industry
     calendar), the value messaging by vertical (what resonates in
     each industry), and the expected expansion rate after playbook
     implementation.

  2. Write the "Cross-Vertical Expansion Patterns" — the common
     expansion patterns that work across industries and those that
     are industry-specific. Include: the universal expansion signals
     (apply to all verticals), the industry-specific signals (unique
     to each vertical), the conversion rate comparison (how expansion
     approaches perform differently by vertical), and the resource
     allocation recommendation (where to invest expansion resources
     based on vertical potential).

  3. Write the "Vertical CSM Specialization Model" — how to organize
     the CS team for vertical-specific expansion. Include: the
     generalist vs specialist debate (pros/cons of each approach),
     the recommended team structure (how many specialists per vertical),
     the industry certification requirements (what CSMs need to know
     about each industry), and the knowledge sharing system (how
     vertical insights get shared across the organization).

assertions:
  - type: llm_judge
    criteria: "Three vertical playbooks reflect real industry differences — expansion triggers, buying committees, compliance, timing, and messaging specific to Financial Services, Healthcare, and Technology"
    weight: 0.35
    description: "Industry-differentiated vertical playbooks"
  - type: llm_judge
    criteria: "Cross-vertical analysis identifies universal vs specific — common expansion patterns, unique signals, conversion differences, and resource allocation based on vertical potential"
    weight: 0.35
    description: "Universal vs specific pattern analysis"
  - type: llm_judge
    criteria: "CSM specialization model is practical — generalist vs specialist analysis, team structure, certification requirements, and knowledge sharing for vertical-focused expansion"
    weight: 0.30
    description: "Practical CSM specialization model"
