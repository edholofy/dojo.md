meta:
  id: executive-sponsor-expansion
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Leverage executive sponsors for expansion — build executive-level relationships that unlock large expansion deals and enterprise-wide platform adoption"
  tags: [sales, upsell, cross-sell, executive, sponsorship, enterprise, advanced]

state: {}

trigger: |
  You're a Strategic Account Director at "EnterpriseMax" ($250M ARR).
  You manage 10 strategic accounts representing $25M ARR. Your company
  has launched an Executive Sponsor Program (ESP) to accelerate
  expansion in top accounts. You need to design and execute the program
  for your accounts.

  Program structure:
  - Each strategic account gets an executive sponsor from your company
    (VP or C-level) paired with a counterpart at the customer
  - Executive sponsors meet customer counterparts quarterly
  - Goal: Build relationships that unlock expansion opportunities
    that CSMs and AMs can't access on their own

  Your 3 highest-priority accounts for the ESP:

  Account 1 — "MegaCorp" ($4M ARR, 2,000 users, Fortune 200):
  Current state: Deployed in IT and Finance departments. Engineering
  (5,000 employees) uses a competitor. CIO is your champion but has
  no influence over Engineering's tool decisions. VP of Engineering
  is skeptical of your platform. Expansion potential: $8M ARR if
  you penetrate Engineering.
  Proposed sponsor pairing: Your CTO ↔ Their VP of Engineering.

  Account 2 — "GlobalRetail" ($3M ARR, 1,500 users, multinational):
  Current state: Deployed in US operations only (30% of company).
  EMEA (40%) and APAC (30%) use different solutions. COO wants global
  standardization but regional VPs have autonomy. Expansion potential:
  $7M ARR if you go global.
  Proposed sponsor pairing: Your CEO ↔ Their COO.

  Account 3 — "TechUnicorn" ($2M ARR, 800 users, late-stage startup):
  Current state: Broad deployment but on basic tier. Preparing for IPO.
  Need Enterprise features (audit, compliance, security) but CFO is
  focused on cost reduction pre-IPO. Expansion potential: $5M ARR
  with Enterprise tier upgrade.
  Proposed sponsor pairing: Your CFO ↔ Their CFO.

  Tasks:
  1. For each account, write the "Executive Engagement Plan." Include:
     the relationship objective (what you want the executive
     relationship to achieve), the meeting agenda for the first
     executive-to-executive meeting (topic framework, not a sales
     pitch), the value exchange (what the customer executive gets
     from the relationship — not just what you get), the internal
     briefing for your executive (what they need to know before the
     meeting), and the post-meeting action plan (how to convert
     relationship into expansion opportunity).

  2. Write the "Executive Sponsor Program Playbook" — the reusable
     framework for the entire program. Include: the account selection
     criteria (which accounts qualify for ESP), the sponsor matching
     methodology (how to pair your executives with customer executives),
     the engagement cadence and format (quarterly meetings, annual
     dinners, ad-hoc touchpoints), the sponsor preparation process
     (how to brief sponsors before each interaction), the opportunity
     identification methodology (how sponsors surface expansion
     opportunities without being "salesy"), and the success metrics
     (how to measure ESP effectiveness).

  3. Write the "ESP Risk Management Guide" — how to handle the
     risks inherent in executive-level engagement. Include: the
     relationship dependency risk (what if the customer executive
     leaves), the sponsor fatigue risk (what if your executives
     lose interest), the expectation management risk (what if the
     customer expects concessions from the senior relationship),
     the competitive risk (what if a competitor launches their own
     ESP), and the conflict resolution process (what if the executive
     relationship creates tension with the day-to-day team).

assertions:
  - type: llm_judge
    criteria: "Three engagement plans are strategically designed — relationship objectives, meeting agendas, value exchange, internal briefings, and post-meeting actions specific to each account's expansion needs"
    weight: 0.35
    description: "Strategically designed engagement plans"
  - type: llm_judge
    criteria: "ESP playbook is comprehensive — account selection, sponsor matching, engagement cadence, preparation, opportunity identification, and metrics for a scalable program"
    weight: 0.35
    description: "Comprehensive ESP playbook"
  - type: llm_judge
    criteria: "Risk guide addresses real dangers — relationship dependency, sponsor fatigue, expectation management, competitive response, and conflict resolution with mitigation strategies"
    weight: 0.30
    description: "Real-danger risk guide"
