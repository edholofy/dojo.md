meta:
  id: advanced-expansion-shift
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Handle an advanced expansion shift — manage cross-functional expansion challenges spanning revenue operations, partner programs, pricing changes, and organizational alignment"
  tags: [sales, upsell, cross-sell, shift-simulation, cross-functional, advanced]

state: {}

trigger: |
  You're the VP of Expansion at "GrowthMax" ($180M ARR). The board
  has set an aggressive target: increase NRR from 108% to 125% within
  12 months. This means growing expansion ARR from $14.4M to $45M —
  a 3x increase. You have 5 major initiatives that must all succeed
  simultaneously.

  Initiative 1 — Product-led expansion launch:
  The product team has built usage-based pricing triggers (in-app
  upgrade prompts). Launch is in 2 weeks, but your CS team is worried
  it will feel "pushy" to customers. They want to gate all upgrade
  prompts through human CSMs. The product team says that defeats the
  purpose of PLG. You need to resolve this before launch.

  Initiative 2 — Partner expansion program rollout:
  Your new partner expansion program (designed last quarter) is ready
  to launch. 30 Tier 1 partners need training. But your channel team
  just discovered that the new partner commission structure conflicts
  with existing partner agreements. 12 partners have contracts that
  guarantee them 20% margin on "all customer transactions" — which
  could include your direct expansion. Legal says amending these
  contracts will take 90 days.

  Initiative 3 — Expansion comp plan changes:
  Your new compensation plans (CSMs get 15% variable on expansion,
  AMs get 40% of variable on expansion) take effect next month. Three
  of your best CSMs have complained that "this turns us into
  salespeople" and threatened to leave. Your VP of CS agrees with
  them. Meanwhile, your VP of Sales says the comp changes don't go
  far enough for AMs.

  Initiative 4 — Strategic account expansion blitz:
  Your top 20 strategic accounts represent $40M ARR. Analysis shows
  $120M in total addressable value. Your CEO wants a "Q3 expansion
  blitz" targeting $20M in new pipeline from these accounts. You need
  an executive sponsor for each account and a customized expansion
  plan for each.

  Initiative 5 — Data infrastructure:
  Your RevOps team is building the expansion signal system (unifying
  product, CRM, and CS data). It's 60% complete. The data team says
  they need 4 more months. Your other 4 initiatives need this data
  now. You need an interim solution.

  Tasks:
  1. Write the "Integrated Expansion Program Plan" — how all 5
     initiatives work together to achieve 108% → 125% NRR. Include:
     the initiative dependency map (which initiatives depend on which),
     the phased timeline (what launches when and why in that order),
     the resource allocation (people and budget across initiatives),
     the risk assessment (what could derail each initiative), and the
     contingency plan (backup approaches if an initiative stalls).

  2. Write the "Conflict Resolution Strategies" — how to resolve the
     4 internal conflicts. Include: PLG vs CS debate (how to balance
     automated and human expansion), partner contract conflict (how
     to handle legacy agreements), CSM resistance to comp change (how
     to address retention risk while maintaining expansion incentive),
     and data readiness gap (interim solution while infrastructure
     builds). For each: the root cause, the stakeholder perspectives,
     the recommended resolution, and the communication approach.

  3. Write the "Board Update Package" — the quarterly board
     presentation on expansion progress. Include: the scorecard (NRR
     trajectory, expansion pipeline, initiative status), the initiative
     deep-dives (progress, risks, and actions for each), the resource
     request (if additional investment is needed), and the confidence
     assessment (probability of hitting 125% NRR by target date).

assertions:
  - type: llm_judge
    criteria: "Integrated plan connects 5 initiatives — dependency map, phased timeline, resource allocation, risks, and contingencies that could realistically drive 108% to 125% NRR"
    weight: 0.35
    description: "Realistically integrated expansion plan"
  - type: llm_judge
    criteria: "Conflict resolutions balance stakeholder needs — PLG/CS, partner contracts, CSM resistance, and data gaps each resolved with understanding of all perspectives"
    weight: 0.35
    description: "Stakeholder-balancing conflict resolution"
  - type: llm_judge
    criteria: "Board package communicates progress clearly — scorecard, deep-dives, resource requests, and confidence assessment appropriate for board-level governance"
    weight: 0.30
    description: "Board-level progress communication"
