meta:
  id: expansion-revenue-operations
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Build expansion revenue operations — design the data infrastructure, analytics, and processes that systematically identify and convert expansion opportunities at scale"
  tags: [sales, upsell, cross-sell, revops, analytics, infrastructure, advanced]

state: {}

trigger: |
  You're the VP of Revenue Operations at "ScaleMetrics" ($180M ARR,
  3,500 customers). The CRO wants expansion revenue to grow from 25%
  to 40% of new ARR within 18 months. You need to build the RevOps
  infrastructure to make this happen.

  Current state:
  - Total new ARR: $54M/year (25% expansion = $13.5M)
  - Target: 40% expansion = $21.6M (60% increase in expansion ARR)
  - Customer data scattered across: CRM (Salesforce), CS platform
    (Gainsight), product analytics (Amplitude), billing (Stripe),
    support (Zendesk)
  - No unified customer data model
  - Expansion signals are identified manually by CSMs
  - No predictive models for expansion likelihood
  - Pipeline visibility: Only 40% of expansion deals are in CRM

  Available data sources:
  - Product usage: Daily active users, feature adoption, API calls,
    storage usage, error rates (Amplitude)
  - Customer health: NPS, CSAT, support tickets, QBR notes (Gainsight)
  - Financial: Revenue, contract terms, payment history, discounts (Stripe)
  - Sales activity: Emails, meetings, opportunities, win/loss (Salesforce)
  - Support: Ticket volume, resolution time, escalations (Zendesk)

  Tasks:
  1. Write the "Expansion Data Architecture" — the technical design
     for a unified expansion intelligence system. Include: the customer
     data model (how data from 5 systems combines into one view), the
     expansion signal taxonomy (all signals categorized by type,
     source, and strength), the predictive expansion model design (ML
     model that scores expansion likelihood using all data sources),
     the real-time alerting system (how signals trigger actions), and
     the integration architecture (how data flows between systems).

  2. Write the "Expansion Analytics Dashboard" — the metrics and
     visualizations for managing expansion at scale. Include: the
     executive view (NRR, expansion ARR, pipeline, conversion by
     segment), the manager view (team performance, pipeline health,
     forecast accuracy), the individual contributor view (account
     scores, next-best-action recommendations, activity tracking),
     and the product view (feature adoption driving expansion,
     usage-based upgrade triggers, tier migration analysis).

  3. Write the "Expansion Process Automation Plan" — how to automate
     the expansion identification and routing process. Include: the
     automated signal detection (which signals trigger automated
     actions), the intelligent routing (how expansion opportunities
     are assigned to the right person), the automated outreach
     sequences (what communications are sent automatically vs
     manually), the workflow automation (approval processes, pricing
     rules, contract generation), and the measurement framework (how
     to track automation effectiveness).

assertions:
  - type: llm_judge
    criteria: "Data architecture unifies 5 systems — customer data model, signal taxonomy, predictive model, alerting, and integration that could power a real expansion intelligence system"
    weight: 0.35
    description: "System-unifying data architecture"
  - type: llm_judge
    criteria: "Dashboard serves multiple personas — executive, manager, IC, and product views with specific metrics and visualizations appropriate to each role's decisions"
    weight: 0.35
    description: "Multi-persona analytics dashboard"
  - type: llm_judge
    criteria: "Automation plan is practical — signal detection, routing, outreach, workflow, and measurement that could realistically increase expansion from 25% to 40% of new ARR"
    weight: 0.30
    description: "Practical automation plan"
