meta:
  id: pricing-expansion-optimization
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Optimize pricing for expansion — design pricing models, bundles, and discount structures that maximize expansion revenue while maintaining customer satisfaction"
  tags: [sales, upsell, cross-sell, pricing, optimization, bundles, advanced]

state: {}

trigger: |
  You're the VP of Pricing Strategy at "PriceRight" ($140M ARR,
  enterprise platform). Your analysis shows that pricing is both the
  #1 driver and #1 blocker of expansion revenue. You need to redesign
  the pricing architecture to optimize for expansion.

  Current pricing issues:
  - Per-seat pricing ($50/user/mo) doesn't scale well — customers at
    500+ seats push for 40%+ volume discounts, eroding margins
  - No usage-based component — heavy users pay the same as light users,
    creating no natural expansion trigger
  - Add-on pricing confuses customers — 12 add-ons at different price
    points, customers don't know what to buy
  - Bundle discount is too deep (30%) — many customers overbuy the
    bundle just for one feature, reducing expansion opportunity
  - Expansion discount expectation: Existing customers expect 20%
    discount on any expansion (your new customer discount is 10-15%)
  - Upgrade path is unclear: Customers don't know when/why to upgrade
    from Standard to Professional to Enterprise

  Current pricing:
  - Standard: $35/user/mo (basic features)
  - Professional: $50/user/mo (advanced features)
  - Enterprise: $80/user/mo (full platform)
  - 12 add-ons: $5-25/user/mo each
  - Bundle (all add-ons): $35/user/mo (vs $130 à la carte)
  - Volume discounts: 10% at 100+ seats, 20% at 250+, 30% at 500+

  Expansion data:
  - Standard-to-Professional upgrade rate: 12%/year
  - Professional-to-Enterprise upgrade rate: 8%/year
  - Add-on attach rate: 1.3 per customer (benchmark: 2.5)
  - Average expansion deal size: $18K
  - Customers who bought the bundle: 0.4 additional add-on purchases
    (vs 1.8 for non-bundle customers) — bundle kills cross-sell
  - Usage data shows 25% of customers on Standard use 90%+ of
    their feature allocation — ready to upgrade

  Tasks:
  1. Write the "Expansion-Optimized Pricing Architecture" — the
     redesigned pricing model. Include: the new tier structure (what
     changes and why), the usage-based component design (what metric,
     how it scales, what limits), the add-on simplification strategy
     (how to reduce 12 add-ons to a manageable number while preserving
     revenue), the bundle redesign (how to create bundles that
     encourage rather than kill cross-sell), and the upgrade trigger
     engineering (how to create natural moments when customers hit
     limits and need to upgrade).

  2. Write the "Expansion Discount Framework" — the specific discount
     strategy for expansion deals. Include: the expansion discount
     principles (why expansion discounts should differ from new
     business), the discount matrix by expansion type (seat add,
     tier upgrade, add-on purchase, multi-year commitment), the
     volume discount curve redesign (where current volume discounts
     are too aggressive), the loyalty reward alternative (non-discount
     incentives for loyal customers), and the competitive response
     discounts (when to discount to prevent competitive loss).

  3. Write the "Pricing Migration Plan" — how to transition existing
     customers to the new pricing. Include: the grandfather strategy
     (which customers keep old pricing and for how long), the
     migration communication plan (how to explain changes positively),
     the early adopter incentives (how to encourage migration), the
     risk assessment (which customers are most likely to push back
     and why), and the financial impact model (expected revenue change
     over 12 months).

assertions:
  - type: llm_judge
    criteria: "Pricing architecture maximizes expansion — new tiers, usage-based components, simplified add-ons, redesigned bundles, and upgrade triggers that address all identified pricing issues"
    weight: 0.35
    description: "Expansion-maximizing pricing"
  - type: llm_judge
    criteria: "Discount framework is strategic — principles, matrix by expansion type, redesigned volume curve, loyalty alternatives, and competitive responses that protect margin while enabling expansion"
    weight: 0.35
    description: "Strategic discount framework"
  - type: llm_judge
    criteria: "Migration plan is customer-sensitive — grandfather strategy, communication plan, incentives, risk assessment, and financial model that transition customers without causing churn"
    weight: 0.30
    description: "Customer-sensitive migration plan"
