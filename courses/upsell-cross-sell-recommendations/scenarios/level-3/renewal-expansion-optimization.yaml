meta:
  id: renewal-expansion-optimization
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Optimize the renewal-expansion motion — design the process that maximizes expansion revenue at renewal while maintaining high retention rates"
  tags: [sales, upsell, cross-sell, renewal, optimization, process, advanced]

state: {}

trigger: |
  You're the VP of Customer Success at "RenewalMax" ($150M ARR, 2,000
  customers). Your renewal rate is strong (92%) but your renewal
  expansion rate is weak — only 18% of renewals include any expansion
  (benchmark: 40-50%). You're leaving $15M+ on the table annually.

  Current state:
  - 2,000 customers, $150M ARR
  - Annual renewal rate: 92%
  - Renewals with expansion: 18% (benchmark: 40-50%)
  - Average expansion at renewal: $12K (for the 18% that expand)
  - Total expansion at renewal: $6.5M/year
  - If 45% expanded at $15K average: $20.25M/year ($13.75M gap)
  - Renewal process starts 60 days before expiry
  - Renewal handled by CSMs (no AM involvement)

  Renewal analysis (last 12 months, 2,000 renewals):
  - Straight renewals (no change): 72%
  - Renewals with expansion: 18%
  - Renewals with downsell: 6%
  - Non-renewals (churn): 4%

  Of the 72% straight renewals:
  - 45% had expansion signals that were never pursued
  - 25% had no expansion potential (small accounts, saturated usage)
  - 30% had untapped potential but CSMs didn't feel it was "their job"

  Expansion signals missed during straight renewals:
  - 200 accounts grew headcount by 20%+ (didn't add seats)
  - 150 accounts hit tier feature limits multiple times
  - 100 accounts asked about features in higher tiers during support
  - 80 accounts had new departments show interest
  - 50 accounts had usage data showing they'd benefit from add-ons

  Tasks:
  1. Write the "Renewal Expansion Engine" — the redesigned renewal
     process that systematically captures expansion. Include: the
     180-day pre-renewal workflow (what happens at 180, 120, 90, 60,
     30 days), the expansion signal screening process (how to
     automatically flag expansion potential at each renewal), the
     "renewal + expansion" proposal packaging (how to present combined
     proposals), the role definition (what CSMs vs AMs do during
     renewal expansion), and the pricing strategy for renewal
     expansion (incentives for expanding at renewal vs mid-cycle).

  2. Write the "Renewal Expansion Playbooks by Scenario" — the
     specific approaches for the 5 most common expansion-at-renewal
     scenarios. Include: the headcount growth play (200 accounts),
     the tier upgrade play (150 accounts hitting limits), the feature
     interest play (100 accounts asking about higher-tier features),
     the departmental expansion play (80 accounts with new department
     interest), and the add-on recommendation play (50 accounts with
     add-on potential). For each: the trigger, the approach, the
     messaging, the expected conversion rate, and the average deal size.

  3. Write the "Renewal Analytics Dashboard" — the metrics for
     managing renewal expansion at scale. Include: the leading
     indicators (signals predicting expansion at renewal), the
     process metrics (are renewal workflows being followed), the
     outcome metrics (expansion rate, average expansion size, total
     expansion ARR), the comparison metrics (expansion rates by
     CSM, segment, industry, account health), and the gap analysis
     (where the biggest opportunities are being missed).

assertions:
  - type: llm_judge
    criteria: "Renewal engine captures missed expansion — 180-day workflow, signal screening, combined proposals, role definition, and pricing that could close the $13.75M annual gap"
    weight: 0.35
    description: "Gap-closing renewal engine"
  - type: llm_judge
    criteria: "Five scenario playbooks are data-driven — headcount, tier, feature, departmental, and add-on plays with triggers, approaches, and expected conversions grounded in the renewal analysis data"
    weight: 0.35
    description: "Data-driven scenario playbooks"
  - type: llm_judge
    criteria: "Dashboard enables management at scale — leading indicators, process metrics, outcomes, comparisons, and gap analysis for 2,000 customers"
    weight: 0.30
    description: "Scale-enabling renewal dashboard"
