meta:
  id: expansion-compensation-design
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Design compensation plans for expansion — create incentive structures that motivate CSMs, AMs, and AEs to prioritize and close expansion deals"
  tags: [sales, upsell, cross-sell, compensation, incentives, design, advanced]

state: {}

trigger: |
  You're the VP of Sales Operations at "CompAlign" ($170M ARR). The
  CEO has flagged that your compensation plans are misaligned with
  your expansion goals. CSMs have no expansion incentive, AMs are
  penalized for spending time on existing customers instead of new
  business, and the result is that expansion is nobody's priority.

  Current compensation structures:
  - CSMs: Base salary only ($85-120K). No variable compensation.
    Measured on retention rate and CSAT. "Expansion isn't our job."
  - AMs (Account Managers): Base + 15% variable. Variable tied 100%
    to new business quota. "Expansion takes time away from hunting."
  - AEs (Account Executives - new business): Base + 50% variable.
    Variable tied 100% to new logo acquisition. "Why would I help
    with expansion?"
  - No one owns expansion systematically.

  Business impact:
  - Expansion revenue: $25M/year (14.7% of ARR) — should be $40M+ (23%+)
  - CS-sourced expansion leads: 50/month, but only 15 get followed up
  - AM expansion pipeline: $8M (should be $20M+ for target)
  - Customer satisfaction with expansion experience: 2.8/5 — customers
    feel "nobody is proactively helping them grow"

  Constraints:
  - Total compensation budget can increase by max 8%
  - Need to maintain competitiveness for recruiting
  - Must comply with local labor laws (variable comp regulations)
  - Changes must be implementable within 1 quarter
  - Need buy-in from CS, Sales, and Finance leaders

  Industry benchmarks:
  - Top SaaS companies: CSMs have 15-25% variable tied to expansion
  - AM comp split: 30-40% variable, with 40-60% of variable on expansion
  - Double-crediting: Best companies credit both CSM and AM on expansion
  - Expansion quota: Typically 30-50% of AM's total quota is expansion
  - SPIFs (Sales Performance Incentive Funds): Used for short-term
    expansion pushes

  Tasks:
  1. Write the "Expansion Compensation Redesign" — the new comp
     structure for all 3 roles. For each role: the new base/variable
     split, the expansion component (what % tied to expansion, what
     metrics), the quota structure (how expansion quota is set), the
     accelerator design (what happens when they exceed expansion
     targets), and the double-crediting rules (when both CSM and AM
     get credit). Include the total budget impact calculation
     (staying within 8% increase).

  2. Write the "Compensation Transition Plan" — how to implement
     the new comp plans. Include: the communication strategy (how to
     announce changes positively), the transition mechanics (mid-year
     comp changes, quota adjustments, guarantee periods), the
     manager enablement (how front-line managers explain and coach
     through the change), the FAQ document (answers to the 15 most
     common questions employees will ask), and the rollback criteria
     (what would trigger reverting the changes).

  3. Write the "Expansion Incentive Toolkit" — the additional
     incentive programs beyond base comp. Include: the SPIF design
     (short-term contests for expansion revenue), the team-based
     incentives (how to reward CS-Sales collaboration), the non-
     monetary recognition (expansion leaderboards, awards, career
     development), the customer-facing incentives (should customers
     get benefits for expanding?), and the measurement framework
     (how to track whether new comp plans actually drive expansion).

assertions:
  - type: llm_judge
    criteria: "Compensation redesign aligns all 3 roles — CSM, AM, and AE each get new structures with expansion components, quotas, accelerators, and double-crediting within 8% budget increase"
    weight: 0.35
    description: "Budget-constrained role alignment"
  - type: llm_judge
    criteria: "Transition plan manages change effectively — communication, transition mechanics, manager enablement, FAQ, and rollback criteria for sensitive compensation changes"
    weight: 0.35
    description: "Change-managing transition plan"
  - type: llm_judge
    criteria: "Incentive toolkit goes beyond comp — SPIFs, team incentives, recognition, customer incentives, and measurement that create a comprehensive expansion motivation system"
    weight: 0.30
    description: "Comprehensive incentive toolkit"
