meta:
  id: channel-partner-expansion
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Drive expansion through channel partners — design partner programs, incentives, and enablement that motivate partners to upsell and cross-sell your products"
  tags: [sales, upsell, cross-sell, channel, partner, enablement, advanced]

state: {}

trigger: |
  You're the VP of Channel at "PartnerFirst" ($120M ARR, 40% of
  revenue through channel partners). Your 150 channel partners are
  good at selling initial deals but terrible at expansion — only 5%
  of partner-sourced customers expand vs 25% of direct customers.
  Your CEO says: "Fix the partner expansion gap."

  Current channel state:
  - 150 active partners (mix of resellers, MSPs, and consultants)
  - Partner-sourced customers: 1,800 ($48M ARR)
  - Direct customers: 2,200 ($72M ARR)
  - Partner expansion rate: 5% annually ($2.4M expansion ARR)
  - Direct expansion rate: 25% annually ($18M expansion ARR)
  - Gap: Partner customers expand at 1/5th the rate of direct customers

  Root cause analysis:
  1. Partner incentive structure: Partners earn 20% margin on initial
     sale but only 10% on expansion (they're incentivized to find new
     logos, not grow existing ones)
  2. Partner access to data: Partners can't see customer usage data
     (expansion signals invisible to them)
  3. Partner training: Partners trained on initial sale only, no
     expansion training
  4. Customer relationship: Partners "own" the relationship and don't
     involve your team for expansion conversations
  5. Product knowledge: Partners know your core product but not add-ons
     or advanced tiers (can't recommend what they don't know)
  6. Success measurement: Partners measured on new ARR only, not NRR

  Partner profiles:
  - Tier 1 (20 partners, $30M sourced ARR): Large resellers/MSPs.
    Sophisticated. Have their own CS teams. Could do expansion if
    incentivized and enabled.
  - Tier 2 (50 partners, $14M sourced ARR): Mid-size consultants.
    Knowledgeable but resource-constrained. Need more support.
  - Tier 3 (80 partners, $4M sourced ARR): Small referral partners.
    Mostly introduce customers then step back. Limited capacity.

  Tasks:
  1. Write the "Partner Expansion Program" — the redesigned partner
     program optimized for expansion. Include: the new incentive
     structure (margin on expansion that motivates partners to grow
     accounts), the partner health dashboard (giving partners access
     to customer usage data and expansion signals), the expansion
     enablement curriculum (training partners on upsell/cross-sell
     methodology), the co-selling model (how your team supports
     partners on expansion deals), and the certification program
     (expansion-certified partner designation).

  2. Write the "Partner Tier Expansion Playbooks" — different expansion
     approaches for each partner tier. Tier 1: Partner-led expansion
     (they do it themselves with your data and training). Tier 2:
     Partner-assisted expansion (they identify opportunities, you
     help close). Tier 3: Vendor-led expansion with partner
     notification (you lead expansion, partner gets commission).
     For each: the process, the responsibilities, the economics, and
     the success metrics.

  3. Write the "Partner Expansion Enablement Kit" — the tools and
     resources partners need to identify and close expansion
     opportunities. Include: the expansion signal guide (what to
     look for in customer behavior), the expansion conversation
     scripts (how to introduce expansion in partner conversations),
     the pricing tools (expansion pricing calculator partners can
     use), the proposal templates (partner-branded expansion
     proposals), and the case study library (partner expansion
     success stories to inspire others).

assertions:
  - type: llm_judge
    criteria: "Partner program addresses root causes — incentive restructure, data access, enablement, co-selling, and certification that could close the 5% vs 25% expansion gap"
    weight: 0.35
    description: "Root-cause-addressing partner program"
  - type: llm_judge
    criteria: "Tier playbooks match partner capability — Tier 1 partner-led, Tier 2 partner-assisted, Tier 3 vendor-led with appropriate processes, responsibilities, and economics"
    weight: 0.35
    description: "Capability-matched tier playbooks"
  - type: llm_judge
    criteria: "Enablement kit is partner-ready — signal guide, conversation scripts, pricing tools, proposal templates, and case studies that partners could use immediately"
    weight: 0.30
    description: "Partner-ready enablement kit"
