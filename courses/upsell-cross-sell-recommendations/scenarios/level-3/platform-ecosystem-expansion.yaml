meta:
  id: platform-ecosystem-expansion
  level: 3
  course: upsell-cross-sell-recommendations
  type: output
  description: "Drive expansion through platform ecosystem — leverage marketplace, integrations, and developer ecosystem to create expansion opportunities that go beyond core product"
  tags: [sales, upsell, cross-sell, platform, ecosystem, marketplace, advanced]

state: {}

trigger: |
  You're the VP of Platform & Ecosystem at "EcosystemHub" ($200M ARR,
  enterprise platform with a marketplace of 250+ partner apps). Your
  company has realized that ecosystem-driven expansion (customers
  buying partner apps through your marketplace) can be a massive growth
  lever, but it's currently underperforming.

  Current ecosystem state:
  - 250 partner apps on marketplace
  - 15% of customers have purchased at least one partner app
  - Average spend on partner apps: $8K/year (per customer who buys)
  - Marketplace revenue: $6M/year (3% of total ARR — benchmark: 10%+)
  - Your platform take rate: 20% of partner app revenue
  - Customer NPS for marketplace: 35 (lower than core product NPS of 52)

  Marketplace analysis:
  - Top 10 apps generate 80% of marketplace revenue
  - 150 apps have fewer than 10 customers each
  - Customer discovery: 65% of customers don't know the marketplace exists
  - App quality: Ranges from excellent to barely functional
  - Integration depth: Most apps are "shallow" integrations (data sync
    only, not embedded in workflow)

  Expansion opportunities through ecosystem:
  1. Core product expansion: Customers who buy 2+ partner apps have
     35% higher tier upgrade rate (deeper platform investment)
  2. Ecosystem lock-in: Customers with 3+ integrations have 95%
     retention rate (vs 82% for core-only customers)
  3. Use case expansion: Partner apps enable use cases your core
     product doesn't serve (industry vertical, compliance, analytics)
  4. Developer platform: 500 developers building custom integrations,
     generating $4M in Developer Platform tier revenue

  Tasks:
  1. Write the "Ecosystem Expansion Strategy" — how to grow marketplace
     revenue from 3% to 10%+ of ARR. Include: the app curation
     strategy (which apps to promote, which to sunset), the customer
     discovery improvement (how to make customers aware of marketplace),
     the app recommendation engine design (how to suggest relevant
     apps based on customer profile and usage), the partner incentive
     redesign (how to motivate partners to drive adoption), and the
     revenue model optimization (take rate, pricing tiers, bundle
     opportunities).

  2. Write the "Platform-Led Expansion Playbook" — how to use the
     ecosystem to drive core product expansion. Include: the
     "integration depth = tier upgrade" play (how deeper integration
     naturally leads to higher tier needs), the "use case expansion"
     play (how partner apps expand the platform's addressable needs),
     the "developer as champion" play (how developers building on
     your platform become internal advocates for expansion), and the
     "ecosystem switching cost" play (how to make the ecosystem so
     valuable that switching is unthinkable).

  3. Write the "Ecosystem Health Metrics" — how to measure and
     manage ecosystem-driven expansion. Include: the marketplace
     health dashboard (app quality, customer adoption, revenue per
     app), the ecosystem expansion attribution (how to credit
     ecosystem for tier upgrades and retention), the partner
     performance scoreboard (which partners drive expansion), the
     developer ecosystem health (API adoption, custom integrations,
     developer satisfaction), and the quarterly ecosystem review
     process.

assertions:
  - type: llm_judge
    criteria: "Ecosystem strategy addresses growth gap — app curation, customer discovery, recommendation engine, partner incentives, and revenue model to grow from 3% to 10%+ of ARR"
    weight: 0.35
    description: "Growth-gap-addressing ecosystem strategy"
  - type: llm_judge
    criteria: "Platform playbook connects ecosystem to core expansion — integration depth, use case expansion, developer champions, and switching cost plays that leverage ecosystem for growth"
    weight: 0.35
    description: "Ecosystem-connected core expansion"
  - type: llm_judge
    criteria: "Ecosystem metrics enable management — marketplace health, expansion attribution, partner performance, developer health, and quarterly review for ongoing ecosystem governance"
    weight: 0.30
    description: "Management-enabling ecosystem metrics"
