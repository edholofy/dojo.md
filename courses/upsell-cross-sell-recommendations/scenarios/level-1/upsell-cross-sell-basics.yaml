meta:
  id: upsell-cross-sell-basics
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Learn the fundamentals of upselling and cross-selling in B2B SaaS — understand definitions, key differences, common expansion types, and when each approach is appropriate"
  tags: [sales, upsell, cross-sell, fundamentals, definitions, beginner]

state: {}

trigger: |
  You're a newly hired Customer Success Manager (CSM) at "GrowthStack"
  ($60M ARR, project management SaaS with 3 tiers: Starter $15/user/mo,
  Professional $35/user/mo, Enterprise $65/user/mo). You manage 40
  mid-market accounts.

  Your manager has asked you to learn the expansion playbook because
  your team is responsible for 30% of new ARR through upsells and
  cross-sells. Currently you don't understand the difference between
  the two or when to pursue each.

  Your portfolio snapshot:
  - 40 accounts, $2.8M total ARR
  - 22 accounts on Starter tier
  - 14 accounts on Professional tier
  - 4 accounts on Enterprise tier
  - Average account age: 14 months
  - Average seats: 45 per account

  Product overview:
  - Starter: Basic project management, 10GB storage, email support
  - Professional: + Advanced reporting, 100GB storage, API access,
    priority support, custom workflows
  - Enterprise: + SSO, SCIM, audit logs, unlimited storage, dedicated
    CSM, custom integrations, SLA
  - Add-ons: Time tracking ($5/user/mo), Resource planning ($8/user/mo),
    Portfolio dashboard ($200/mo flat), Advanced security ($3/user/mo)

  3 accounts that your manager says are "ready for expansion":

  Account 1 — "DesignStudio" (Starter, 30 seats, $5,400 ARR):
  Usage data: 92% weekly active users, hit storage limit 3 times
  in past month, 5 support tickets about reporting limitations,
  CEO asked about SSO during last QBR.

  Account 2 — "BuildCo" (Professional, 80 seats, $33,600 ARR):
  Usage data: Recently hired 20 new PMs (not on platform yet), using
  a separate time tracking tool (competitor), mentioned resource
  planning needs in support ticket.

  Account 3 — "TechFlow" (Enterprise, 200 seats, $156,000 ARR):
  Usage data: Only 3 of 8 departments using the platform, IT department
  asked about API documentation, Finance team expressed interest
  in portfolio dashboard during last meeting.

  Tasks:
  1. Write the "Upsell vs Cross-sell Guide" for new CSMs. Include:
     clear definitions of upsell (upgrading to a higher tier or adding
     seats) vs cross-sell (selling additional products or add-ons),
     4 examples of each from GrowthStack's product lineup, the key
     signals that indicate each type of opportunity, and a decision
     framework for choosing upsell vs cross-sell for a given account.

  2. For each of the 3 accounts, write: the expansion opportunity
     type (upsell, cross-sell, or both), the specific recommendation
     (which product/tier/add-on and why), the evidence from usage
     data supporting your recommendation, and a brief outreach message
     to the account champion introducing the expansion idea.

  3. Write the "Expansion Opportunity Checklist" — the 10 signals
     that indicate an account is ready for expansion (e.g., hitting
     usage limits, asking about features in higher tiers, growing
     headcount, etc.). For each signal: what it indicates (upsell
     or cross-sell opportunity), how urgent it is (act now vs nurture),
     and the recommended first action.

assertions:
  - type: llm_judge
    criteria: "Guide clearly distinguishes upsell from cross-sell — definitions, 4 examples each, signals, and decision framework that a new CSM could immediately apply"
    weight: 0.35
    description: "Clear upsell vs cross-sell distinction"
  - type: llm_judge
    criteria: "Three account recommendations are evidence-based — each uses specific usage data to justify the expansion type and includes a natural outreach message"
    weight: 0.35
    description: "Evidence-based account recommendations"
  - type: llm_judge
    criteria: "Expansion checklist identifies real signals — 10 signals with expansion type, urgency, and first action that could serve as a practical CSM reference"
    weight: 0.30
    description: "Practical signal checklist"
