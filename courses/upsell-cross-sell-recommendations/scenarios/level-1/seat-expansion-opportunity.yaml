meta:
  id: seat-expansion-opportunity
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Identify and execute seat expansion opportunities — recognize when accounts need more licenses and craft proposals that grow user adoption across departments"
  tags: [sales, upsell, seat-expansion, adoption, growth, beginner]

state: {}

trigger: |
  You're a CSM at "CollabHub" (team collaboration SaaS, $8/user/mo).
  Three accounts in your portfolio are showing seat expansion signals.

  Account 1 — "FastGrow" (startup, current: 25 seats, $2,400 ARR):
  Signals: Company just announced Series B funding and plans to grow
  from 30 to 80 employees in the next 6 months. Currently all 25 seats
  are active. CEO mentioned in last call: "We'll need to onboard a lot
  of new people soon." No expansion conversation has happened yet.
  Challenge: They're a startup — budget-conscious. May push for volume
  discount.

  Account 2 — "AgencyCo" (marketing agency, current: 40 seats, $3,840 ARR):
  Signals: Using CollabHub for their internal team (40 people) but NOT
  for their 60+ freelancers and contractors who collaborate on projects.
  Freelancers currently use a free competitor tool, causing version
  control issues. Project manager filed 4 support tickets about
  "external collaboration" features in the past month.
  Challenge: They may want a cheaper "external collaborator" seat type
  that doesn't exist in your pricing.

  Account 3 — "CorpBank" (enterprise bank, current: 200 seats, $19,200 ARR):
  Signals: Currently deployed in IT department only (200 users). HR
  department (150 people) saw the IT deployment and asked their VP about
  getting CollabHub. Marketing department (80 people) is using a
  competitor. Total addressable seats: 2,000+ across the organization.
  Challenge: Enterprise procurement requires new PO for additional
  departments. IT champion may not have influence over HR/Marketing
  budgets.

  Tasks:
  1. For each account, write: the expansion opportunity assessment
     (how many seats, what timeline, what revenue impact), the outreach
     strategy (who to contact, what message, what timing), the pricing
     recommendation (standard vs volume discount, annual commitment),
     and the potential obstacles and how to overcome them.

  2. Write the "Seat Expansion Email Templates" — 3 templates for
     common seat expansion scenarios: the "company growing" template
     (for FastGrow-type situations), the "new use case" template
     (for AgencyCo-type situations where seats expand to new user
     types), and the "departmental expansion" template (for CorpBank-
     type cross-department growth). Each template should be personalized,
     reference specific signals, and include a clear next step.

  3. Write the "Volume Pricing Guide" for CSMs — when and how to
     offer volume discounts for seat expansions. Include: the standard
     pricing tiers (1-50 seats, 51-200, 201-500, 500+), the discount
     authority (what CSMs can approve vs what needs manager approval),
     the annual commitment incentive (how much discount for annual
     prepay), and the 3 rules for never leading with discount (always
     lead with value).

assertions:
  - type: llm_judge
    criteria: "Three expansion assessments are specific — seat counts, timelines, revenue impact, outreach strategy, pricing, and obstacle mitigation for each distinct scenario"
    weight: 0.35
    description: "Specific expansion assessments"
  - type: llm_judge
    criteria: "Email templates are personalized and signal-referenced — each addresses its specific scenario with relevant signals and clear next steps, not generic expansion pitches"
    weight: 0.35
    description: "Signal-referenced email templates"
  - type: llm_judge
    criteria: "Volume pricing guide balances discount with value — tiers, authority levels, commitment incentives, and value-first rules that prevent unnecessary discounting"
    weight: 0.30
    description: "Value-first pricing guide"
