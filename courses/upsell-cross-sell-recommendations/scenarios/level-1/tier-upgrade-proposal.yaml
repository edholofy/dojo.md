meta:
  id: tier-upgrade-proposal
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Write compelling tier upgrade proposals — craft value-based recommendations that justify moving customers from lower to higher product tiers"
  tags: [sales, upsell, tier-upgrade, value-proposition, proposal, beginner]

state: {}

trigger: |
  You're a CSM at "AnalyticsPro" (business intelligence SaaS). A key
  account, "RetailMax" (mid-market retailer, 500 employees), is on
  your Basic tier ($29/user/mo, 50 users = $17,400 ARR) and showing
  clear signs they need the Advanced tier ($59/user/mo).

  RetailMax's current usage (Basic tier):
  - 50 users with 92% monthly active rate
  - 8 users regularly hit the 5-dashboard limit (Basic allows 5)
  - Created 47 custom reports (approaching the 50-report Basic limit)
  - 3 support tickets asking about real-time data refresh (Basic is
    daily refresh only; Advanced is hourly; Premium is real-time)
  - Marketing team (12 users) requested API access for connecting to
    their marketing automation tool (API is Advanced+ only)
  - VP of Analytics asked during QBR: "Can we schedule automated
    report delivery to our executive team?"
  - Finance team (8 users) needs row-level security for sensitive
    financial data (Advanced+ feature)

  Tier comparison:
  Basic ($29/user): 5 dashboards, 50 reports, daily refresh, email
  support, basic permissions
  Advanced ($59/user): 25 dashboards, unlimited reports, hourly refresh,
  API access, scheduled delivery, row-level security, priority support
  Premium ($99/user): Unlimited everything, real-time refresh, embedded
  analytics, custom connectors, dedicated CSM, SLA

  RetailMax context:
  - Contract renewal is in 3 months
  - Their fiscal year planning starts in 6 weeks
  - Champion is VP of Analytics (strong internal advocate)
  - Blocker is CFO (cost-conscious, needs ROI justification)
  - They recently hired a Data Engineering team (5 people) not yet
    on the platform
  - Competitor "DataViz" has been contacting their VP of Marketing
  - Industry: Retail (seasonal business, Q4 is critical)

  Tasks:
  1. Write the "Tier Upgrade Proposal" for RetailMax. Include: the
     executive summary (why Advanced tier is the right move now), the
     current limitations analysis (specific pain points they're hitting
     on Basic), the feature-to-need mapping (which Advanced features
     solve which specific RetailMax problems), the ROI justification
     (time savings, efficiency gains, risk reduction from row-level
     security), and the proposed pricing (including the 5 new Data
     Engineering users).

  2. Write the "Stakeholder-Specific Messaging" — different messages
     for different decision-makers. Include: the VP of Analytics
     message (focused on capability and team productivity), the CFO
     message (focused on ROI and cost justification), the VP of
     Marketing message (focused on API integration and marketing
     insights), and the IT Director message (focused on security
     and governance).

  3. Write the "Objection Preparation" — the 5 most likely objections
     to the upgrade and your prepared responses. Include: "It's too
     expensive" (ROI math), "We're not using all Basic features yet"
     (usage data shows otherwise), "Can we just get API access without
     upgrading?" (why bundled tiers are better value), "Let's wait
     until renewal" (why acting now is better), and "Competitor X is
     cheaper" (value comparison).

assertions:
  - type: llm_judge
    criteria: "Upgrade proposal maps features to specific needs — current limitations, feature-need mapping, and ROI justification tied to RetailMax's actual usage data and business context"
    weight: 0.35
    description: "Need-mapped upgrade proposal"
  - type: llm_judge
    criteria: "Stakeholder messages are role-appropriate — VP Analytics, CFO, VP Marketing, and IT Director each receive messaging that addresses their specific concerns and motivations"
    weight: 0.35
    description: "Role-appropriate stakeholder messaging"
  - type: llm_judge
    criteria: "Objection responses use evidence — 5 objections handled with data, ROI math, and value comparisons rather than generic deflections"
    weight: 0.30
    description: "Evidence-based objection responses"
