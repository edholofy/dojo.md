meta:
  id: add-on-product-recommendation
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Recommend add-on products effectively — identify which add-on products fit customer needs and present them as natural extensions of their current usage"
  tags: [sales, cross-sell, add-on, product-recommendation, value, beginner]

state: {}

trigger: |
  You're a CSM at "WorkflowPlus" (workflow automation SaaS, $45M ARR).
  The core platform is $40/user/mo and there are 5 add-on products:

  Add-on 1: Document Automation ($12/user/mo) — auto-generate
  contracts, proposals, and reports from templates. Ideal for teams
  that create 50+ documents per month.

  Add-on 2: Advanced Analytics ($8/user/mo) — custom dashboards,
  predictive analytics, data export. Ideal for teams that need to
  measure workflow efficiency.

  Add-on 3: Integration Hub ($200/mo flat) — connect to 150+ apps
  including Salesforce, HubSpot, Jira, Slack. Ideal for teams with
  complex tech stacks.

  Add-on 4: Compliance Module ($15/user/mo) — audit trails, approval
  workflows, regulatory compliance templates. Ideal for regulated
  industries (finance, healthcare, government).

  Add-on 5: AI Assistant ($10/user/mo) — AI-powered workflow
  suggestions, auto-routing, anomaly detection. Ideal for teams
  processing 500+ tasks per month.

  You have 3 accounts to analyze for add-on recommendations:

  Account A — "LegalEase" (law firm, 30 users, $14,400 ARR):
  Usage: Creating 200+ client documents manually per month using
  external tools. 85% of workflows involve document creation or
  review. They're in a regulated industry with client confidentiality
  requirements. Support tickets show frustration with manual document
  processes.

  Account B — "SalesOrg" (sales team, 50 users, $24,000 ARR):
  Usage: Sales team uses WorkflowPlus for deal management. They also
  use Salesforce CRM and HubSpot for marketing. Currently copying
  data between systems manually. Processing 800+ tasks per month.
  VP Sales asked: "Can we get insights on where deals are getting stuck?"

  Account C — "MfgCorp" (manufacturer, 100 users, $48,000 ARR):
  Usage: Operations team uses WorkflowPlus for production workflows.
  Low adoption of reporting features (only 5 users look at reports).
  No integrations set up despite having ERP (SAP) and quality
  management (QMS) systems. Quality team (20 users) needs ISO 9001
  compliance documentation.

  Tasks:
  1. For each account, write: the recommended add-on(s) with priority
     ranking, the evidence from usage data that supports each
     recommendation, the value proposition specific to their use case
     (how the add-on solves their specific problem), and the expected
     ROI (time savings, error reduction, compliance risk mitigation).

  2. Write the "Add-on Recommendation Framework" — the systematic
     approach for matching add-ons to customer needs. Include: the
     usage signal matrix (which usage patterns indicate which add-on),
     the industry-based recommendations (which industries typically
     need which add-ons), the adoption readiness checklist (signs
     the customer is ready for an add-on vs would be overwhelmed),
     and the bundling strategy (which add-ons work well together
     and what discount to offer for bundles).

  3. Write the "Cross-sell Conversation Guide" — how to naturally
     introduce add-on products in customer conversations. Include:
     the QBR approach (how to surface add-on opportunities during
     quarterly reviews), the support ticket approach (how to convert
     support issues into add-on conversations), the usage milestone
     approach (when customers hit certain usage thresholds), and 3
     conversation scripts for the most common cross-sell scenarios.

assertions:
  - type: llm_judge
    criteria: "Three recommendations match usage evidence to add-ons — each account gets prioritized add-on suggestions backed by specific usage data and ROI estimates"
    weight: 0.35
    description: "Usage-matched add-on recommendations"
  - type: llm_judge
    criteria: "Framework enables systematic matching — signal matrix, industry recommendations, readiness checklist, and bundling strategy that any CSM could apply"
    weight: 0.35
    description: "Systematic matching framework"
  - type: llm_judge
    criteria: "Conversation guide is natural — QBR, support ticket, and usage milestone approaches with scripts that introduce add-ons as solutions, not sales pitches"
    weight: 0.30
    description: "Natural conversation guide"
