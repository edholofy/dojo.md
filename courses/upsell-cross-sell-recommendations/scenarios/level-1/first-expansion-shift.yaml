meta:
  id: first-expansion-shift
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Handle your first expansion shift — manage multiple simultaneous expansion opportunities with different timelines, stakeholders, and challenges in a single week"
  tags: [sales, upsell, cross-sell, shift-simulation, multi-account, beginner]

state: {}

trigger: |
  You're a CSM at "SaaSFlow" ($45M ARR) and it's Monday morning of
  what your manager calls an "expansion week." You have 5 expansion-
  related situations that all need attention this week. You need to
  prioritize and execute.

  Situation 1 — "QuickCo" urgent tier upgrade (due: Tuesday):
  QuickCo (50 users, $30K ARR) is hitting their API rate limit and
  their production system is being throttled. Their CTO emailed you
  Friday evening saying "we need Enterprise tier API limits by
  Wednesday or we'll have to find another solution." Enterprise tier
  is $80/user/mo vs their current $50/user/mo (new ARR: $48K).
  You haven't responded yet.

  Situation 2 — "GrowthInc" seat expansion (due: Thursday):
  GrowthInc (30 users, $18K ARR) has 15 new employees who need
  onboarding. Their HR manager asked for 15 new seats at a 20%
  discount because "we're already a customer." Your standard discount
  authority is 10%. New seats at full price: $9K ARR.

  Situation 3 — "BigRetail" cross-sell opportunity (due: Friday QBR):
  You have a QBR with BigRetail (200 users, $120K ARR) on Friday. Your
  product team just launched a new Analytics add-on ($10/user/mo) that
  would be perfect for them. This is the first time you've presented
  a brand-new product to an existing customer. Potential add-on ARR:
  $24K.

  Situation 4 — "TechStart" renewal expansion (due: this week):
  TechStart (20 users, $12K ARR) renews next Monday. They've been a
  happy customer but mentioned they're "evaluating options." Your
  manager suggests offering a 2-year deal with 10% discount to lock
  them in, plus pitching the 3 add-ons they've expressed interest in
  (total add-on value: $6K ARR). You need to prepare the renewal
  proposal.

  Situation 5 — "HealthTech" expansion blocker (this week):
  HealthTech (75 users, $45K ARR) was ready to expand to 150 users,
  but their new CIO (started 2 weeks ago) has frozen all new vendor
  spend pending a "technology audit." Your champion (VP of Engineering)
  is frustrated and asked you: "What can we do?" The expansion was
  worth $45K ARR and was supposed to close this month.

  Tasks:
  1. Write the "Weekly Priority Plan" — how you'll handle all 5
     situations this week. Include: the priority ranking (most urgent
     to least), the time allocation (how many hours on each), the
     daily action plan (Monday through Friday), and the risk
     assessment (what happens if you can't get to everything).

  2. For each situation, write the specific response or action plan:
     Situation 1 (urgent email response + fast-track upgrade proposal),
     Situation 2 (discount negotiation approach), Situation 3 (QBR
     cross-sell presentation plan), Situation 4 (renewal + expansion
     proposal), Situation 5 (strategy to navigate the spending freeze).
     Include the specific emails, talking points, or proposals needed.

  3. Write the "Expansion Week Retrospective Template" — how to
     review the week's outcomes. Include: the metrics to track
     (conversion rate, expansion ARR generated, pipeline created),
     the wins and lessons learned framework, and the 3 questions to
     ask yourself after every expansion week (What worked? What didn't?
     What would I do differently?).

assertions:
  - type: llm_judge
    criteria: "Priority plan is realistic — ranking, time allocation, and daily schedule that a real CSM could execute across 5 situations in one week"
    weight: 0.35
    description: "Realistic weekly priority plan"
  - type: llm_judge
    criteria: "Five responses are situation-specific — urgent upgrade, discount negotiation, QBR presentation, renewal proposal, and spending freeze navigation each get tailored approaches"
    weight: 0.35
    description: "Situation-specific responses"
  - type: llm_judge
    criteria: "Retrospective template enables learning — metrics, wins/lessons framework, and reflection questions that help CSMs improve expansion execution over time"
    weight: 0.30
    description: "Learning-enabling retrospective"
