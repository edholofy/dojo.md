meta:
  id: expansion-roi-calculation
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Calculate and present ROI for expansion proposals — build compelling financial justifications that help customers justify additional investment to their leadership"
  tags: [sales, upsell, cross-sell, ROI, financial-justification, business-case, beginner]

state: {}

trigger: |
  You're a CSM at "AutomateIt" ($65M ARR, business process automation).
  Your champion at "MidCorp" (manufacturing company, 200 employees)
  wants to upgrade from the Standard tier ($25/user/mo, 80 users =
  $24,000 ARR) to the Premium tier ($45/user/mo), but their CFO
  requires an ROI justification for any new spend over $10,000.

  The proposed expansion:
  - Upgrade 80 existing users from Standard to Premium: $45 - $25 =
    $20/user/mo additional cost = $19,200/year increase
  - Add 30 new users (operations team): 30 × $45/user/mo = $16,200/year
  - Total new ARR: $35,400 (from $24,000 to $59,400)
  - Total additional cost to MidCorp: $35,400/year

  Value data you've collected from MidCorp's current usage:
  - Current Standard tier saves MidCorp 200 hours/month in manual
    processes (they've documented this in their QBR)
  - Average employee cost at MidCorp: $45/hour (fully loaded)
  - Current monthly savings: 200 hours × $45 = $9,000/month = $108K/yr

  Premium tier additional value (based on similar customer benchmarks):
  - Advanced automation: Estimated 150 additional hours/month saved
    (150 × $45 = $6,750/month = $81K/year)
  - Error reduction: Premium's AI quality checks reduce errors by 60%
    (MidCorp currently spends $3,200/month on error correction =
    $38,400/year; 60% reduction = $23,040 savings)
  - Compliance automation: Saves 40 hours/month of compliance reporting
    (40 × $45 = $1,800/month = $21,600/year)
  - Operations team efficiency: 30 new users each saving est. 8
    hours/month (240 hours × $45 = $10,800/month = $129,600/year)

  CFO's requirements for approval:
  - Payback period under 12 months
  - Minimum 3x ROI over 3 years
  - Comparison to alternative approaches (hiring, building in-house)
  - Risk assessment (what if we don't achieve projected savings?)

  Tasks:
  1. Write the "ROI Business Case" for MidCorp's CFO. Include: the
     executive summary (1 paragraph, bottom line), the investment
     overview (what they're buying and what it costs), the value
     quantification (each value category with calculations), the
     ROI calculation (annual ROI, 3-year ROI, payback period), the
     comparison to alternatives (hiring FTEs vs buying software, with
     cost comparison), and the risk-adjusted analysis (conservative,
     realistic, and optimistic scenarios).

  2. Write the "ROI Calculation Template" — a reusable framework CSMs
     can use for any expansion proposal. Include: the value categories
     to quantify (time savings, error reduction, compliance, revenue
     impact, risk mitigation), the data collection guide (where to
     find each data point), the calculation formulas (with examples),
     the presentation format (how to lay it out for executive
     audiences), and the common mistakes (inflating numbers, ignoring
     implementation costs, not risk-adjusting).

  3. Write the "CFO Conversation Guide" — how to present the ROI to
     a financial decision-maker. Include: the opening (what CFOs care
     about — payback and risk), the presentation flow (investment →
     return → risk → comparison → ask), the questions to expect
     (and prepared answers), and the follow-up approach (what to send
     after the meeting).

assertions:
  - type: llm_judge
    criteria: "ROI business case is CFO-ready — executive summary, investment overview, quantified value categories, ROI/payback calculations, alternative comparison, and risk-adjusted scenarios"
    weight: 0.35
    description: "CFO-ready business case"
  - type: llm_judge
    criteria: "ROI template is reusable — value categories, data collection guide, formulas, presentation format, and common mistakes that any CSM could apply to a different account"
    weight: 0.35
    description: "Reusable ROI template"
  - type: llm_judge
    criteria: "CFO conversation guide reflects financial mindset — opening, presentation flow, expected questions, and follow-up that demonstrate understanding of how CFOs evaluate investments"
    weight: 0.30
    description: "Financial-mindset conversation guide"
