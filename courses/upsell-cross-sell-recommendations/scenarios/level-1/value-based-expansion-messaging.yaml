meta:
  id: value-based-expansion-messaging
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Craft value-based expansion messages — write emails, Slack messages, and QBR talking points that lead with customer value rather than product features"
  tags: [sales, upsell, cross-sell, messaging, value-based, communication, beginner]

state: {}

trigger: |
  You're a CSM at "MetricsCloud" ($55M ARR, marketing analytics SaaS).
  Your manager reviewed your last 5 expansion emails and gave you
  feedback: "You're leading with features instead of value. Customers
  don't buy features — they buy outcomes."

  Here are your 5 emails that need to be rewritten (your originals):

  Email 1 (to "BrandCo", Professional tier, 80 users):
  Subject: "New Enterprise Features Available!"
  Body: "Hi Sarah, I wanted to let you know about our Enterprise tier.
  It includes SSO, advanced permissions, custom dashboards, and API
  access. The Enterprise tier is $89/user/mo compared to your current
  $49/user/mo. Would you like to schedule a demo?"

  Email 2 (to "RetailNow", 50 seats, growing team):
  Subject: "Time to Add More Seats?"
  Body: "Hi Mike, I noticed your team has grown recently. We'd love
  to add more seats to your account. Our current pricing is $35/user/mo.
  For 20+ additional seats, I can offer a 10% volume discount. Let me
  know if you'd like to proceed."

  Email 3 (to "TechStart", Starter tier, hitting limits):
  Subject: "You're Approaching Your Dashboard Limit"
  Body: "Hi Alex, Your account has created 9 of 10 allowed dashboards.
  To get unlimited dashboards, you'll need to upgrade to Professional
  tier at $49/user/mo (currently $29/user/mo). Want to upgrade?"

  Email 4 (to "HealthOrg", no add-ons):
  Subject: "Check Out Our Compliance Module"
  Body: "Hi Dr. Chen, We recently launched a Compliance Module add-on
  for $15/user/mo that includes HIPAA reporting templates, audit
  trails, and automated compliance checks. Given you're in healthcare,
  this could be useful. Interested in a walkthrough?"

  Email 5 (to "AgencyPro", QBR follow-up):
  Subject: "QBR Follow-up: Upgrade Options"
  Body: "Hi Jordan, Thanks for a great QBR yesterday. As discussed,
  I'm sending over our upgrade options. Attached is our pricing sheet
  with all tier comparisons. Let me know which option works best for
  your team."

  Customer context for rewrites:
  - BrandCo: Their marketing team wastes 15 hours/week on manual
    reporting. Enterprise API would automate this. They just failed
    a security audit due to shared login credentials (no SSO).
  - RetailNow: Onboarded 20 new employees last month who aren't on
    the platform. The existing team reports "collaboration bottlenecks"
    because new hires can't access shared dashboards.
  - TechStart: Built 9 dashboards for different business functions.
    The CFO reviews a "Master Dashboard" that combines data from
    all others — but they can't build it because of the limit.
  - HealthOrg: Just received a warning letter from their compliance
    officer about audit trail gaps. Manual compliance reporting takes
    their team 20 hours per month.
  - AgencyPro: During QBR, they revealed they're losing 2-3 clients
    per quarter because they can't provide real-time campaign analytics
    (available on higher tier).

  Tasks:
  1. Rewrite all 5 emails using value-based messaging. For each:
     lead with the customer's specific problem or opportunity (not
     the product feature), quantify the value (time saved, risk
     reduced, revenue gained), connect the expansion to their business
     goals, and end with a consultative next step (not "want to buy?").

  2. Write the "Value-Based Expansion Messaging Framework" — the
     template structure that transforms any feature-first message into
     a value-first message. Include: the formula (Problem → Impact →
     Solution → Proof → Next Step), 3 examples using the formula, and
     the common "feature-first" phrases to avoid with their value-first
     replacements.

  3. Write the "Channel-Specific Messaging Guide" — how expansion
     messaging differs by channel. Include: the email approach
     (structured, data-rich, shareable), the Slack/chat approach
     (casual, quick, conversational), the QBR approach (visual,
     data-driven, collaborative), and the phone call approach
     (discovery-led, conversational, real-time). Write 1 example
     of the same expansion opportunity communicated through each
     channel.

assertions:
  - type: llm_judge
    criteria: "Five rewritten emails lead with value — each starts with the customer's specific problem, quantifies impact, and connects the expansion to business outcomes rather than features"
    weight: 0.35
    description: "Value-leading email rewrites"
  - type: llm_judge
    criteria: "Messaging framework is transferable — Problem→Impact→Solution→Proof→Next Step formula with examples and phrase replacements that CSMs can apply to any expansion message"
    weight: 0.35
    description: "Transferable messaging framework"
  - type: llm_judge
    criteria: "Channel guide shows real differences — email, Slack, QBR, and phone each get distinct approaches with examples showing how the same opportunity is communicated differently"
    weight: 0.30
    description: "Channel-differentiated guide"
