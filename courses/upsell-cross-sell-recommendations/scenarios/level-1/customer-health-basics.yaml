meta:
  id: customer-health-basics
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Use customer health scores to identify expansion opportunities — understand how usage metrics, engagement signals, and satisfaction data indicate expansion readiness"
  tags: [sales, upsell, cross-sell, health-score, usage-data, signals, beginner]

state: {}

trigger: |
  You're a CSM at "PlatformX" ($70M ARR, business process automation).
  Your company just launched a customer health scoring system, and your
  manager wants you to use it to identify expansion opportunities in
  your portfolio of 35 accounts.

  Health score components (each scored 0-100, weighted):
  - Product adoption (30%): Feature usage breadth and depth
  - User engagement (25%): Weekly active users, session duration
  - Support health (15%): Ticket volume, resolution satisfaction
  - Relationship (15%): Champion engagement, executive access
  - Business outcomes (15%): Reported ROI, success milestones achieved

  Overall health score: weighted average of 5 components
  - 80-100: "Green" — healthy, expansion-ready
  - 60-79: "Yellow" — stable, needs attention
  - 0-59: "Red" — at-risk, focus on retention

  Your portfolio health scores:

  Account A — "ProServices" (60 users, $72K ARR):
  Overall: 88 (Green). Adoption: 92, Engagement: 90, Support: 85,
  Relationship: 82, Outcomes: 88. Using 85% of available features.
  Champion actively advocates internally. Recently achieved 30% time
  savings on their core workflow.

  Account B — "MidTech" (40 users, $48K ARR):
  Overall: 72 (Yellow). Adoption: 65, Engagement: 78, Support: 70,
  Relationship: 80, Outcomes: 68. Using only 50% of available features.
  Champion is engaged but users aren't fully adopting. Haven't measured
  outcomes formally.

  Account C — "BigCo" (150 users, $180K ARR):
  Overall: 45 (Red). Adoption: 35, Engagement: 40, Support: 30,
  Relationship: 65, Outcomes: 50. Only 60 of 150 users active. 12 open
  support tickets. Executive sponsor has gone silent. Implementation
  gaps in 2 departments.

  Account D — "FastScale" (25 users, $30K ARR):
  Overall: 91 (Green). Adoption: 95, Engagement: 94, Support: 92,
  Relationship: 85, Outcomes: 90. Power users maxing out current tier.
  Champion presented PlatformX results to their board. Company growing
  rapidly (hiring 30 people this quarter).

  Account E — "GovAgency" (80 users, $96K ARR):
  Overall: 68 (Yellow). Adoption: 75, Engagement: 60, Support: 80,
  Relationship: 55, Outcomes: 72. Solid usage in 2 departments but
  executive sponsor retired. No replacement champion identified.
  Budget cycle starts in 2 months.

  Tasks:
  1. For each account, write: the health score interpretation (what
     the scores tell you about expansion readiness), the recommended
     action (expand, nurture, or stabilize — and why), the specific
     expansion opportunity (if applicable), and the risk factors that
     could derail expansion. Explain why a high health score doesn't
     always mean "push for expansion" and why a yellow account might
     still have expansion potential.

  2. Write the "Health Score to Expansion Playbook" — how to use each
     health score component to identify specific expansion types.
     Include: high adoption score → tier upgrade opportunity, high
     engagement + limited features → add-on opportunity, high
     relationship score → departmental expansion opportunity, high
     outcomes score → case study + referral + expansion play. For
     each: the threshold score that triggers action, the specific
     playbook to follow, and the expected conversion rate.

  3. Write the "Health Score Improvement Plan" — for accounts not
     yet ready for expansion (MidTech, BigCo, GovAgency). For each:
     the priority component to improve (which score to increase first),
     the specific actions to improve that component, the timeline to
     get to "expansion-ready" status, and the early warning signs that
     the account might decline further.

assertions:
  - type: llm_judge
    criteria: "Five account interpretations go beyond the score — each explains what the health data means for expansion readiness, including cases where high scores don't mean 'expand' and yellow might still expand"
    weight: 0.35
    description: "Nuanced health score interpretation"
  - type: llm_judge
    criteria: "Health-to-expansion playbook connects specific scores to specific opportunities — adoption to tier upgrade, engagement to add-ons, relationship to departmental expansion with thresholds and playbooks"
    weight: 0.35
    description: "Score-to-opportunity playbook"
  - type: llm_judge
    criteria: "Improvement plans are actionable — priority components, specific actions, timelines, and early warning signs for the 3 non-expansion-ready accounts"
    weight: 0.30
    description: "Actionable improvement plans"
