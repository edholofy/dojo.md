meta:
  id: expansion-timing-fundamentals
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Master expansion timing — learn when to approach customers for upsells and cross-sells based on adoption milestones, business events, and relationship signals"
  tags: [sales, upsell, cross-sell, timing, milestones, cadence, beginner]

state: {}

trigger: |
  You're a CSM at "CloudServe" ($80M ARR, cloud infrastructure SaaS).
  Your manager has told you that your timing on expansion conversations
  is off — you've been approaching customers either too early (before
  they've adopted the current product) or too late (after they've
  already found alternatives or their budget window closed).

  Your 5 accounts with expansion opportunities:

  Account 1 — "DataCo" (2 months into contract, Starter tier):
  Adoption: Only 40% of licensed users have logged in. Implementation
  is 60% complete. They haven't set up any integrations yet. No QBR
  scheduled yet. Champion seems overwhelmed with onboarding.
  Your instinct: Pitch them the Advanced tier upgrade now.

  Account 2 — "LogiTech" (8 months into 12-month contract):
  Adoption: 95% user adoption, hit 3 of 5 feature usage milestones,
  champion just got promoted to VP (good sign). Budget planning for
  next fiscal year starts in 6 weeks. Renewal is in 4 months.
  Your instinct: Wait until renewal to bring up expansion.

  Account 3 — "HealthSys" (just completed implementation, 3 months in):
  Adoption: 80% user adoption, completed all onboarding milestones.
  Just had their first successful use case (saved 40 hours on a
  compliance report). Champion is enthusiastic. They mentioned 2 other
  departments that might benefit.
  Your instinct: Not sure when to bring it up.

  Account 4 — "FinanceOrg" (6 months in, on Professional tier):
  Adoption: 88% adoption, heavy API usage approaching tier limits.
  They just raised their next funding round ($50M Series C). Their
  team is growing fast. CFO mentioned "we'll need to scale our tools."
  Your instinct: Send them a pricing sheet for Enterprise tier.

  Account 5 — "RetailBiz" (10 months into 12-month contract):
  Adoption: 70% adoption, satisfaction is moderate (CSAT 3.5/5). They
  have 3 open support tickets. Champion has been less responsive
  lately. Renewal is in 2 months.
  Your instinct: Push for a multi-year upsell at renewal.

  Tasks:
  1. For each account, write: whether your instinct is right or wrong
     (and why), the correct timing recommendation (when to have the
     expansion conversation), the readiness assessment (is the account
     actually ready for expansion or does it need something else first),
     and the specific action to take now (even if the expansion
     conversation should wait).

  2. Write the "Expansion Timing Framework" — the rules for when to
     approach customers about expansion. Include: the 5 adoption
     milestones that must be met before any expansion conversation
     (implementation complete, target adoption achieved, first value
     realized, champion engaged, satisfaction confirmed), the 8
     business event triggers that create expansion windows (funding,
     hiring, promotion, new project, compliance requirement, etc.),
     and the timing relative to contract cycle (when during a 12-month
     contract is each type of expansion appropriate).

  3. Write the "Too Early vs Too Late Guide" — the common mistakes
     CSMs make with expansion timing. Include: the 5 signs you're
     too early (and what to do instead), the 5 signs you're too late
     (and how to recover), and the "Goldilocks zone" indicators that
     confirm the timing is right.

assertions:
  - type: llm_judge
    criteria: "Five account assessments correctly diagnose timing — each instinct is evaluated against adoption data, with correct timing recommendation and immediate action"
    weight: 0.35
    description: "Correctly diagnosed timing"
  - type: llm_judge
    criteria: "Timing framework provides clear rules — adoption milestones, business event triggers, and contract cycle timing that prevent premature or late expansion approaches"
    weight: 0.35
    description: "Clear timing rules"
  - type: llm_judge
    criteria: "Too early/too late guide identifies real mistakes — 5 signs for each with recovery actions and Goldilocks indicators that CSMs can use for self-assessment"
    weight: 0.30
    description: "Real timing mistake guide"
