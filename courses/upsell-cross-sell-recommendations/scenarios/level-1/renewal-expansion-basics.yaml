meta:
  id: renewal-expansion-basics
  level: 1
  course: upsell-cross-sell-recommendations
  type: output
  description: "Turn renewals into expansion opportunities — learn how to use the renewal conversation as a natural moment to introduce upsells and cross-sells"
  tags: [sales, upsell, renewal, expansion, timing, conversation, beginner]

state: {}

trigger: |
  You're a CSM at "ProjectFlow" ($50M ARR, project management SaaS).
  You have 4 accounts renewing in the next 60 days. Your manager wants
  you to turn at least 2 of these renewals into expansion opportunities
  (net positive ARR change).

  Renewal 1 — "ConsultCo" (40 users, Professional tier, $28,800 ARR):
  Current contract: 12-month, auto-renewal with 60-day cancellation
  window. Renewal date: 45 days. Health: Green (score 85). Usage
  highlights: Using 80% of Professional features, champion loves the
  product, recently asked about resource planning capabilities (available
  in Enterprise tier at $95/user/mo vs current $60/user/mo). Team
  growing — 5 new hires expected next month.
  Risk: No competitive threat detected. Budget is approved.

  Renewal 2 — "DesignHQ" (25 users, Starter tier, $9,000 ARR):
  Current contract: 12-month. Renewal date: 30 days. Health: Yellow
  (score 68). Usage highlights: Using only 55% of Starter features.
  3 users inactive for 60+ days. Champion has been slow to respond
  to emails (last response took 2 weeks). However, they just won a
  large client contract that requires project management collaboration
  with 15 external stakeholders.
  Risk: Low engagement could mean they're evaluating alternatives.

  Renewal 3 — "TechCorp" (100 users, Enterprise tier, $114,000 ARR):
  Current contract: 12-month. Renewal date: 55 days. Health: Green
  (score 82). Usage highlights: Power users in engineering (60 users)
  love the product. But marketing (25 users) and sales (15 users)
  barely use it. Marketing VP mentioned in last QBR that they're
  evaluating a competitor for their specific workflow needs.
  Risk: Possible downsell — marketing and sales might drop off.

  Renewal 4 — "NGOHelp" (35 users, Professional tier, $25,200 ARR):
  Current contract: 12-month. Renewal date: 40 days. Health: Green
  (score 78). Usage highlights: Great adoption in their programs team.
  They've been asking about reporting features for their board and
  donors (available as add-on: Impact Reporting $200/mo). They also
  need to add 3 regional offices (15 users each = 45 additional seats).
  Risk: Nonprofit — always budget-constrained. May push for discount.

  Tasks:
  1. For each renewal, write: the renewal strategy (straight renewal,
     expansion, or "save" play), the specific expansion recommendation
     (if applicable), the conversation approach (how to introduce
     expansion during the renewal discussion), and the pricing
     proposal (including any incentives for expansion at renewal).

  2. Write the "Renewal-to-Expansion Playbook" — the step-by-step
     process for turning renewals into expansion events. Include: the
     pre-renewal preparation (what to analyze 90, 60, and 30 days
     before renewal), the renewal meeting structure (how to conduct
     the conversation to naturally surface expansion needs), the
     packaging strategy (how to bundle expansion with renewal for
     better value), and the follow-up cadence (what happens after the
     renewal conversation).

  3. Write the "Renewal Pricing Strategies" — how to handle pricing
     during expansion renewals. Include: the annual commitment
     incentive (how to use renewal as leverage for multi-year), the
     expansion discount approach (should you discount expansion at
     renewal? when?), the "price increase + expansion" bundling
     strategy (how to offset a price increase with expansion value),
     and the nonprofit/budget-constrained approach (how to make
     expansion affordable for price-sensitive accounts).

assertions:
  - type: llm_judge
    criteria: "Four renewal strategies match account context — each correctly identifies expansion, save, or straight renewal based on health, usage, and risk data with specific recommendations"
    weight: 0.35
    description: "Context-matched renewal strategies"
  - type: llm_judge
    criteria: "Playbook provides step-by-step renewal-to-expansion process — 90/60/30 day preparation, meeting structure, packaging, and follow-up that makes expansion a natural part of renewal"
    weight: 0.35
    description: "Step-by-step renewal playbook"
  - type: llm_judge
    criteria: "Pricing strategies handle real scenarios — commitment incentives, expansion discounts, price increase bundling, and budget-constrained approaches for different account types"
    weight: 0.30
    description: "Scenario-specific pricing strategies"
