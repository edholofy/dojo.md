meta:
  id: contract-terms-basics
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Learn essential SaaS contract terms — understand payment terms, termination clauses, auto-renewal, liability caps, and SLAs that every sales rep must know"
  tags: [sales, contracts, terms, fundamentals, SaaS, beginner]

state: {}

trigger: |
  You're a newly promoted Account Executive at "CloudOps" (enterprise
  SaaS platform, $80M ARR). You just got your first enterprise deal
  ($85K ACV) into the contract stage, and the prospect's legal team
  has sent back a redlined contract. You're panicking because you
  don't understand half the terms they're negotiating.

  CloudOps' standard contract terms:
  - Payment terms: Net 30 (payment due 30 days after invoice)
  - Contract length: Annual (12 months), auto-renews
  - Termination: 90 days written notice before renewal date
  - Termination for cause: 30 days to cure after written notice
  - Liability cap: 12 months of fees paid
  - Indemnification: CloudOps indemnifies for IP infringement only
  - SLA: 99.9% uptime, 5% service credit per 0.1% below SLA
  - Data: Customer owns their data, CloudOps processes per DPA
  - Governing law: State of Delaware

  The prospect's redline requests:
  1. Payment terms: Change from Net 30 to Net 60
  2. Auto-renewal: Remove auto-renewal clause entirely
  3. Termination: Reduce from 90 days to 30 days notice
  4. Liability cap: Increase from 12 months fees to unlimited
  5. SLA: Increase from 99.9% to 99.99% uptime
  6. Data: Add data deletion within 7 days of contract termination
  7. Governing law: Change from Delaware to California

  Tasks:
  1. For each of the 7 redline requests, write: what the prospect is
     asking for (plain English explanation), why they're asking for it
     (their business motivation), whether to accept, negotiate, or
     reject (with reasoning), and the recommended response (exact
     counter-proposal language). Explain which requests are standard
     and acceptable vs which are deal-breakers.

  2. Write the "Contract Terms Glossary" — a plain-English guide to
     the 15 most common SaaS contract terms every AE must know.
     Include: the term, what it means in simple language, why it
     matters to the customer, why it matters to your company, and the
     typical negotiation range. Cover: payment terms, auto-renewal,
     termination, liability, indemnification, SLA, uptime, service
     credits, data ownership, DPA, governing law, force majeure,
     confidentiality, assignment, and warranty.

  3. Write the "When to Escalate" guide — how AEs know when to handle
     a contract request themselves vs when to involve Legal, Finance,
     or their VP of Sales. Include: the self-service zone (requests
     AEs can approve within guidelines), the escalation triggers
     (what terms always require legal review), and the escalation
     process (how to escalate without slowing down the deal).

assertions:
  - type: llm_judge
    criteria: "Redline responses are practical and well-reasoned — each of 7 requests has clear explanation, motivation, accept/negotiate/reject recommendation, and specific counter-proposal language"
    weight: 0.35
    description: "Practical redline responses"
  - type: llm_judge
    criteria: "Contract terms glossary is genuinely accessible — 15 terms explained in plain English with bilateral perspective (customer + company) and negotiation ranges"
    weight: 0.35
    description: "Accessible contract glossary"
  - type: llm_judge
    criteria: "Escalation guide prevents delays — clear self-service zone, escalation triggers, and process that empowers AEs to handle routine requests while protecting the company on material terms"
    weight: 0.30
    description: "Delay-preventing escalation guide"
