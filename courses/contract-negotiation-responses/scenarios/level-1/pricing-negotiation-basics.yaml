meta:
  id: pricing-negotiation-basics
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Handle basic pricing negotiations — defend your price point, offer appropriate discounts, and avoid the common trap of discounting too quickly"
  tags: [sales, contracts, pricing, discounting, value-defense, beginner]

state: {}

trigger: |
  You're an AE at "SignalPro" (sales intelligence platform, $50M ARR).
  Your list pricing:
  - Starter: $50/user/month (up to 25 users)
  - Professional: $100/user/month (up to 200 users)
  - Enterprise: $150/user/month (unlimited)

  Your discount authority:
  - Up to 10%: AE can approve
  - 10-20%: Manager approval required
  - 20-30%: VP of Sales approval (rare, strategic only)
  - 30%+: CRO approval (almost never — requires business case)

  You have 4 deals in the pricing negotiation stage:

  Deal 1 — "TechStart" (50-user startup, Professional tier):
  Request: "We love your product but can only afford $60/user/month.
  That's our max budget." (40% discount request)
  Context: They're a funded startup with $12M Series A. Their budget
  claim seems soft. No competitive threat mentioned.

  Deal 2 — "MidCo" (100-user mid-market, Professional tier):
  Request: "Gong offered us $80/user/month. Can you match that?"
  Context: They genuinely have a Gong proposal. They prefer your
  product but need to justify the price internally.

  Deal 3 — "BigCorp" (500-user enterprise, Enterprise tier):
  Request: "We need 20% off, multi-year commitment in exchange."
  Context: 3-year deal, $500K+ TCV. They're willing to commit long
  term. Procurement is involved.

  Deal 4 — "QuickDeal" (30-user SMB, Starter tier):
  Request: "Can you do $40/user? We'll sign today."
  Context: Small deal ($14.4K ACV). They're using urgency as leverage.
  No competitive threat.

  Tasks:
  1. For each of the 4 deals, write the recommended response. Include:
     the analysis (what's really happening), the counter-offer
     strategy (what to propose), the exact talk track (what to say),
     and the walk-away point (when to let the deal go). Explain the
     reasoning behind each response.

  2. Write the "Pricing Negotiation Playbook for AEs" — the 10 rules
     every rep should follow when prospects negotiate on price.
     Include: never discount without getting something in return (what
     to ask for), the "flinch" technique (always react to discount
     requests), how to reframe from price to value, the multi-year
     commitment trade, the user/seat expansion trade, and when it's
     OK to let a deal walk.

  3. Write the "Discount Impact Calculator" guide — help AEs understand
     the real impact of discounting. Show: how a 20% discount on a
     $100K deal affects quota credit, commission, company margin, and
     LTV. Include the "discount math" that shows giving 20% off
     requires 25% more deals to hit the same revenue. Create a simple
     reference table.

assertions:
  - type: llm_judge
    criteria: "Four deal responses are strategically different — each recognizes the unique context (budget constraint, competitive pressure, multi-year trade, urgency tactic) with appropriate counter-offers and walk-away points"
    weight: 0.35
    description: "Strategically different deal responses"
  - type: llm_judge
    criteria: "Pricing playbook gives AEs confidence — 10 practical rules with specific techniques (flinch, value reframe, trade-for-value) that prevent premature discounting"
    weight: 0.35
    description: "Confidence-building pricing playbook"
  - type: llm_judge
    criteria: "Discount impact calculator is eye-opening — clearly shows the revenue, margin, and quota impact of discounting with a reference table AEs can use in the moment"
    weight: 0.30
    description: "Eye-opening discount impact"
