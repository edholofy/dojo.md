meta:
  id: common-negotiation-mistakes
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Recognize and avoid common contract negotiation mistakes — learn the 8 most costly errors new AEs make during the contract phase"
  tags: [sales, contracts, mistakes, pitfalls, learning, awareness, beginner]

state: {}

trigger: |
  You're the VP of Sales at "AppTech" (enterprise SaaS, $70M ARR,
  80 AEs). You've reviewed the last 50 contract negotiations and
  identified 8 recurring mistakes that are costing the company
  revenue and creating legal exposure.

  The 8 mistakes (with real examples from your team):

  Mistake 1 — Giving away discounts for nothing:
  AE gave 25% discount without getting anything in return (no multi-
  year, no case study, no expansion commitment). $40K deal became $30K.

  Mistake 2 — Agreeing to terms they don't understand:
  AE accepted "unlimited liability" because they didn't know what it
  meant. On a $60K deal, AppTech accepted unlimited financial exposure.

  Mistake 3 — Negotiating against themselves:
  Prospect asked for "better terms." AE immediately offered 15%
  discount + extended payment + additional users — before the prospect
  even said what they wanted.

  Mistake 4 — Letting legal kill momentum:
  AE sent the contract to legal on both sides and went silent for 3
  weeks. By the time legal finished, the champion had lost internal
  buy-in.

  Mistake 5 — Caving to "standard policy" claims:
  Prospect said "it's our company policy that all vendor contracts
  have termination for convenience." AE accepted without questioning.
  Later learned that 3 other vendors negotiated this away.

  Mistake 6 — Negotiating over email instead of live:
  18-round email thread over 6 weeks for issues that could have been
  resolved in a 30-minute call. Deal nearly died from exhaustion.

  Mistake 7 — Splitting the difference:
  Prospect asked for 40% discount. AE proposed 0%. Prospect said
  "let's split the difference — 20%." AE agreed. 20% was higher than
  the maximum discount authority.

  Mistake 8 — Forgetting to get something in return:
  AE gave quarterly billing (not standard) as a concession. Didn't
  ask for anything in return — not even a case study reference.

  Tasks:
  1. For each of the 8 mistakes, write: why AEs make this mistake
     (the psychology behind it), the financial or legal impact (what
     it costs), the corrected approach (what to do instead), and the
     "prevention rule" (a simple rule to prevent this mistake).

  2. Write the "Pre-Negotiation Checklist" — 15 items an AE should
     prepare before entering any contract negotiation. Include: know
     your BATNA (best alternative), know your walk-away point, know
     your discount authority, understand all key terms, identify the
     prospect's decision-maker vs legal team vs procurement, research
     the prospect's typical vendor terms, and prepare the concession
     trade list (what you can give and what you'll ask in return).

  3. Write the "Negotiation Self-Assessment" — a scoring rubric AEs
     can use after each negotiation to evaluate their performance.
     Include 10 criteria: value preservation (did you protect price?),
     trade balance (did you get something for everything given?),
     momentum management (how long from contract to signature?),
     relationship preservation (is the champion still engaged?), and
     term quality (are the final terms within guidelines?). Each
     criterion scored 1-5 with descriptions.

assertions:
  - type: llm_judge
    criteria: "Eight mistakes are diagnosed with prevention — each explains the psychology, quantifies impact, provides corrected approach, and establishes a simple prevention rule"
    weight: 0.35
    description: "Diagnosed mistakes with prevention"
  - type: llm_judge
    criteria: "Pre-negotiation checklist is thorough — 15 items that prepare AEs for negotiation including BATNA, authority, term knowledge, stakeholder mapping, and concession planning"
    weight: 0.30
    description: "Thorough pre-negotiation checklist"
  - type: llm_judge
    criteria: "Self-assessment rubric promotes improvement — 10 criteria with 1-5 scoring that help AEs evaluate and improve their negotiation performance objectively"
    weight: 0.35
    description: "Improvement-promoting self-assessment"
