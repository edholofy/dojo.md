meta:
  id: sla-negotiation-basics
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Negotiate SLA terms effectively — understand uptime commitments, service credits, response times, and how to defend your SLA without over-committing"
  tags: [sales, contracts, SLA, uptime, service-credits, reliability, beginner]

state: {}

trigger: |
  You're an AE at "HostPro" (cloud hosting platform, $60M ARR). Your
  standard SLA offerings:

  Uptime SLA tiers:
  - Standard: 99.5% uptime (allows ~43 hours downtime/year)
  - Business: 99.9% uptime (allows ~8.8 hours downtime/year)
  - Enterprise: 99.95% uptime (allows ~4.4 hours downtime/year)
  - Premium: 99.99% uptime (allows ~52 minutes downtime/year)

  Service credit structure:
  - Below SLA by 0.1-0.5%: 10% credit on monthly fee
  - Below SLA by 0.5-1.0%: 25% credit on monthly fee
  - Below SLA by 1.0%+: 50% credit on monthly fee
  - Credits capped at 30% of annual contract value

  Response time SLA:
  - Critical (P1): 15 minutes acknowledgment, 4 hours resolution target
  - High (P2): 1 hour acknowledgment, 8 hours resolution target
  - Medium (P3): 4 hours acknowledgment, 2 business days resolution
  - Low (P4): 1 business day acknowledgment, 5 business days resolution

  3 prospects are negotiating SLA terms:

  Prospect 1 — E-commerce company ($200K deal, Business tier):
  Request: "We need 99.99% uptime. Every minute of downtime costs us
  $5,000 in lost sales. Your 99.9% isn't good enough."

  Prospect 2 — Healthcare SaaS ($150K deal, Enterprise tier):
  Request: "We need guaranteed 99.95% with uncapped service credits.
  If you're down, we're down, and our customers are patients."

  Prospect 3 — Financial services firm ($300K deal, Premium tier):
  Request: "We need 99.999% uptime with financial penalties (not just
  credits) for SLA breaches. Our regulator requires it."

  Tasks:
  1. For each prospect, write: the analysis (is their request
     reasonable?), the response strategy (what to offer), the exact
     counter-proposal, and the technical context they need to
     understand (what uptime numbers actually mean in practice).
     Include the math — what each uptime level means in minutes of
     allowed downtime.

  2. Write the "SLA Negotiation Guide" — everything an AE needs to
     know about SLA negotiations. Include: the uptime math table (what
     each 9 means), the difference between planned and unplanned
     downtime, why 99.99% is exponentially harder than 99.9%, the
     service credit defense (why credits are better than penalties),
     the "shared responsibility" concept (customer architecture affects
     uptime), and the response time vs. resolution time distinction.

  3. Write the "SLA Objection Responses" — talk tracks for the 5 most
     common SLA objections: "Your SLA isn't high enough," "We want
     uncapped credits," "We need financial penalties," "Your response
     times are too slow," and "Our current vendor offers better SLAs."
     Each response should be factual, empathetic, and defensible.

assertions:
  - type: llm_judge
    criteria: "Three prospect responses balance business and technical realities — each recognizes the customer's legitimate concern while providing realistic counter-proposals and uptime math context"
    weight: 0.35
    description: "Balanced prospect SLA responses"
  - type: llm_judge
    criteria: "SLA guide educates effectively — uptime math, planned vs unplanned downtime, exponential difficulty, credit vs penalty defense, and shared responsibility explained accessibly"
    weight: 0.35
    description: "Effective SLA education"
  - type: llm_judge
    criteria: "Objection responses are usable — 5 talk tracks that are factual, empathetic, and give AEs confidence to handle SLA pushback in real conversations"
    weight: 0.30
    description: "Usable SLA objection responses"
