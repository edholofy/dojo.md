meta:
  id: negotiation-communication
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Communicate effectively during contract negotiations — write professional redline responses, manage negotiation emails, and maintain deal momentum through legal review"
  tags: [sales, contracts, communication, email, redline, professionalism, beginner]

state: {}

trigger: |
  You're an AE at "ConnectPro" (integration platform, $30M ARR).
  Your deals keep stalling during the contract phase because you
  don't know how to communicate effectively with prospects' legal
  teams. Your VP of Sales reviewed your last 5 contract negotiation
  email threads and found these problems:

  Problem 1 — Too casual:
  Your email: "Hey! Got your redlines back. Some of those asks are
  pretty aggressive lol. Let me check with legal and get back to you."
  VP's note: "This is unprofessional and dismissive of their concerns."

  Problem 2 — Too slow:
  Prospect sent redlines on Monday. You responded the following Friday
  with "Still working on this, will have something next week."
  VP's note: "You've now added 2 weeks to the close timeline."

  Problem 3 — Accepting without understanding:
  Your email: "All looks good! We can accept everything. When can we
  sign?"
  VP's note: "You accepted unlimited liability and a 30-day
  termination for convenience. This could cost us hundreds of thousands."

  Problem 4 — Confrontational:
  Your email: "We absolutely cannot accept these terms. Our standard
  contract is our standard contract. If you want to use our product,
  these are the terms."
  VP's note: "You just killed a $150K deal with a Fortune 500 prospect."

  Problem 5 — Losing control:
  After 4 weeks of legal back-and-forth, the deal went dark. You sent
  3 follow-up emails with no response. The champion went quiet.
  VP's note: "You let the lawyers take over the relationship."

  Tasks:
  1. Rewrite all 5 problematic communications. For each: the rewritten
     email (professional, specific, and momentum-maintaining), the
     explanation of what changed and why, and the template pattern
     (reusable format for similar situations).

  2. Write the "Contract Negotiation Email Templates" — 8 email
     templates AEs need throughout the contract phase. Include:
     a) Initial redline receipt and timeline setting
     b) Counter-proposal with rationale
     c) Partial acceptance with remaining items
     d) Escalation to mutual executive discussion
     e) Momentum check-in (preventing deals from going dark)
     f) Final terms summary for sign-off
     g) Stalled negotiation re-engagement
     h) Post-signature thank you and onboarding handoff

  3. Write the "Deal Momentum Guide" — how to keep deals moving during
     contract negotiation. Include: the ideal timeline (contract to
     signature in 2 weeks), the daily actions to prevent stalling, how
     to manage parallel tracks (legal negotiation + business champion
     engaged), the "3-meeting" structure for complex negotiations
     (kickoff, working session, closing), and the warning signs that
     a deal is going dark (and what to do about each).

assertions:
  - type: llm_judge
    criteria: "Five rewritten communications are professional and effective — each corrects the specific problem while maintaining deal momentum with reusable template patterns"
    weight: 0.35
    description: "Professional effective rewrites"
  - type: llm_judge
    criteria: "Eight email templates are ready to use — cover the full contract lifecycle from redline receipt to post-signature with appropriate tone, specificity, and momentum-maintaining language"
    weight: 0.35
    description: "Ready-to-use email templates"
  - type: llm_judge
    criteria: "Deal momentum guide prevents stalling — ideal timeline, daily actions, parallel tracks, meeting structure, and dark-deal warning signs with recovery actions"
    weight: 0.30
    description: "Stall-preventing momentum guide"
