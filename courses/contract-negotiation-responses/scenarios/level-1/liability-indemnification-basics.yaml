meta:
  id: liability-indemnification-basics
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Understand liability and indemnification clauses — learn what these terms mean, common negotiation positions, and how to respond when prospects demand unlimited liability"
  tags: [sales, contracts, liability, indemnification, risk, legal, beginner]

state: {}

trigger: |
  You're an AE at "DataGuard" (data protection platform, $45M ARR).
  Your last 3 deals got stuck in legal review over liability and
  indemnification clauses. You need to understand these terms so you
  can have informed conversations with prospects' legal teams.

  DataGuard's standard contract terms:
  - Liability cap: Total fees paid in the 12 months preceding the
    claim (if they pay $100K/year, liability is capped at $100K)
  - Exclusion of consequential damages: DataGuard is not liable for
    lost profits, lost data, business interruption, or any indirect
    damages
  - Indemnification: DataGuard indemnifies the customer against
    third-party IP infringement claims arising from use of DataGuard
  - Customer indemnification: Customer indemnifies DataGuard against
    claims arising from customer's data or use of the platform
  - Carve-outs: Data breach caused by DataGuard's negligence has a
    separate, higher liability cap of 2x annual fees
  - Warranty: DataGuard warrants the product will perform materially
    in accordance with documentation

  3 legal redline situations:

  Situation 1 — Healthcare company ($120K deal):
  Their redline: "Unlimited liability for data breaches. You're
  handling PHI — if you breach it, we face HIPAA fines of up to
  $1.9M per violation. Your $120K cap doesn't cover one violation."

  Situation 2 — Financial services company ($200K deal):
  Their redline: "Remove the exclusion of consequential damages. If
  your platform fails during a trading window, our losses could be
  $10M+. We need you to stand behind your product."

  Situation 3 — Tech company ($80K deal):
  Their redline: "Mutual indemnification for all claims, not just IP.
  If your product causes a data loss that leads to a customer lawsuit
  against us, you should indemnify us."

  Tasks:
  1. For each situation, write: a plain-English explanation of what
     they're asking for, why their concern is legitimate (or not), the
     risk to DataGuard if you accept, the recommended counter-proposal,
     and the exact response language. Help the AE understand both
     perspectives.

  2. Write the "Liability & Indemnification Primer" — the AE-friendly
     guide to these scary-sounding clauses. Include: what liability
     caps really mean (with examples), the difference between direct
     and consequential damages (with real scenarios), what
     indemnification means and the 3 types (IP, data breach, general),
     why mutual vs one-way indemnification matters, and what "carve-
     outs" are and when they're appropriate.

  3. Write the "Negotiation Position Chart" — a reference showing the
     spectrum of negotiation positions from "most favorable to us" to
     "most favorable to them" for liability cap, consequential damages,
     and indemnification. For each term, show 5 positions from hardest
     to most flexible, with guidance on when each position is
     appropriate.

assertions:
  - type: llm_judge
    criteria: "Three situation responses balance both sides — each explains the prospect's legitimate concern, quantifies DataGuard's risk, and provides realistic counter-proposals with specific language"
    weight: 0.35
    description: "Balanced liability responses"
  - type: llm_judge
    criteria: "Primer makes complex terms accessible — liability caps, direct vs consequential damages, indemnification types, and carve-outs explained with real examples that non-lawyers can understand"
    weight: 0.35
    description: "Accessible liability primer"
  - type: llm_judge
    criteria: "Position chart shows the negotiation spectrum — 5 positions per term from hardest to most flexible with situational guidance that helps AEs choose the right position"
    weight: 0.30
    description: "Spectrum-showing position chart"
