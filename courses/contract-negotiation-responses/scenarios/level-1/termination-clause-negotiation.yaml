meta:
  id: termination-clause-negotiation
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Negotiate termination clauses — handle requests for early termination, convenience termination, and exit rights while protecting recurring revenue"
  tags: [sales, contracts, termination, exit-rights, retention, beginner]

state: {}

trigger: |
  You're an AE at "RetainCloud" (customer success platform, $35M ARR).
  Termination clauses are the #1 negotiation topic in your contracts.
  Prospects increasingly want "easy exit" provisions that threaten your
  recurring revenue model.

  RetainCloud standard termination terms:
  - Contract: 12-month minimum, auto-renews annually
  - Termination for convenience: Not available (standard)
  - Termination for cause: 30-day cure period after written notice
  - Non-renewal: 60 days written notice before renewal date
  - Early termination fee: Remaining contract balance due upon early exit
  - Data: Customer data returned within 30 days, deleted within 90

  4 prospects are pushing on termination terms:

  Prospect 1 — Series B startup ($40K deal):
  "We need the ability to terminate with 30 days notice at any time.
  We're a startup — we might pivot, get acquired, or run out of
  runway. We can't be locked in for 12 months."

  Prospect 2 — Fortune 500 company ($250K deal):
  "Our policy requires termination for convenience with 90 days notice
  in all vendor contracts. This is non-negotiable — it's a corporate
  policy from Legal."

  Prospect 3 — Government agency ($180K deal):
  "Federal contracts require termination for convenience per FAR
  52.249. We need this clause or we literally cannot sign."

  Prospect 4 — Mid-market company ($75K deal):
  "What if your product doesn't deliver? We need a performance-based
  termination clause — if we don't see 20% improvement in retention
  within 6 months, we can exit."

  Tasks:
  1. For each prospect, write: the analysis (is their request
     legitimate?), the risk assessment (what happens if you agree),
     the recommended response (accept, counter, or reject), the
     counter-proposal language, and the revenue protection strategy
     (how to minimize financial exposure if you accept any termination
     flexibility).

  2. Write the "Termination Clause Playbook" — the complete guide for
     handling termination negotiations. Include: the 5 types of
     termination clauses (for cause, for convenience, performance-
     based, non-appropriation, change of control), when to accept each
     type, the revenue protection mechanisms (minimum commitment
     periods, early termination fees, ramp-down provisions), and the
     negotiation hierarchy (what to offer first vs last resort).

  3. Write the "Auto-Renewal Defense Guide" — how to defend auto-
     renewal clauses when prospects push back. Include: why auto-
     renewal benefits both parties (continuity, planning), the common
     objections and responses, the compromise positions (opt-out
     windows, renewal caps), and when to give up auto-renewal (trade
     it for something else).

assertions:
  - type: llm_judge
    criteria: "Four prospect responses are contextually appropriate — startup, enterprise, government, and mid-market each get different approaches recognizing their legitimate vs tactical motivations"
    weight: 0.35
    description: "Contextually appropriate termination responses"
  - type: llm_judge
    criteria: "Termination playbook covers all types — 5 termination clause types with clear guidance on acceptance, revenue protection, and negotiation hierarchy"
    weight: 0.35
    description: "Complete termination playbook"
  - type: llm_judge
    criteria: "Auto-renewal defense is balanced — acknowledges both perspectives, provides specific objection responses, and offers compromise positions that protect revenue"
    weight: 0.30
    description: "Balanced auto-renewal defense"
