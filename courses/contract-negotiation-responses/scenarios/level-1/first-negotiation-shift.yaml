meta:
  id: first-negotiation-shift
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "First shift simulation — navigate a complete contract negotiation from redline receipt to signature under time pressure with a demanding procurement team"
  tags: [sales, contracts, simulation, procurement, time-pressure, beginner]

state: {}

trigger: |
  URGENT DEAL: You're an AE at "QuickSign" (e-signature platform,
  $25M ARR). You have a $65K deal with "RetailGroup" that must close
  by end of quarter (8 business days away) or the budget expires and
  you lose the deal to DocuSign.

  RetailGroup's procurement team just sent their redlines. There are
  12 changes requested. Your champion (VP of Legal) warns you: "Our
  procurement team is tough. If you push back on everything, they'll
  recommend DocuSign. If you accept everything, your company will
  regret it. Find the middle ground fast."

  The 12 redline requests (in order of importance to RetailGroup):
  1. Payment terms: Net 30 → Net 60
  2. Discount: 15% off list price (they have a DocuSign quote at 10%
     below your list)
  3. Auto-renewal: Remove (they want to opt-in to renew each year)
  4. Liability cap: 12 months fees → 24 months fees
  5. Termination for convenience: Add with 60 days notice
  6. SLA uptime: 99.5% → 99.9%
  7. Data deletion: 30 days → 7 days after termination
  8. Response time: P1 from 4 hours → 1 hour
  9. Insurance: Add $5M cyber liability insurance requirement
  10. Audit rights: Customer can audit QuickSign annually
  11. Governing law: Delaware → California
  12. Assignment: Restrict QuickSign from assigning without consent

  Your authority:
  - Discount: Up to 10% self-service, 10-15% needs VP approval
  - Payment terms: Net 45 max without CFO approval
  - Liability cap: Up to 18 months without legal review
  - Other terms: Need legal review for anything non-standard

  Tasks:
  1. Categorize all 12 requests into 3 buckets: "Accept" (reasonable,
     low risk), "Negotiate" (counter with modified version), and
     "Reject" (unacceptable, offer alternative). For each: explain
     your reasoning and write the specific counter-proposal or
     acceptance language. Prioritize — which items to resolve first
     to build momentum?

  2. Write the "Negotiation Strategy" for this specific deal. Include:
     the negotiation sequence (which items to address in which order),
     the concession plan (what to give first to build goodwill, what
     to save as leverage), the time management plan (8 days to
     signature — what happens each day), and the DocuSign counter-
     strategy (how to use competitive pressure without panicking).

  3. Write 3 key emails for this negotiation:
     a) The initial response to the redlines (sets tone and timeline)
     b) The counter-proposal email (presents your positions on all 12)
     c) The "final terms" email that gets to signature (summarizes
        agreed terms and provides signature timeline)
     All should be professional, specific, and momentum-focused.

assertions:
  - type: llm_judge
    criteria: "12 requests are well-categorized — accept/negotiate/reject buckets are well-reasoned with specific counter-proposals, and sequencing prioritizes momentum-building"
    weight: 0.35
    description: "Well-categorized request handling"
  - type: llm_judge
    criteria: "Negotiation strategy manages the 8-day timeline — sequence, concession plan, daily time management, and competitive counter-strategy that could realistically close the deal in time"
    weight: 0.35
    description: "Timeline-managing negotiation strategy"
  - type: llm_judge
    criteria: "Three emails are professional and effective — set tone, present positions, and drive to signature with the right balance of flexibility and firmness"
    weight: 0.30
    description: "Professional effective negotiation emails"
