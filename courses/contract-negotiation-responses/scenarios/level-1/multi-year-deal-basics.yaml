meta:
  id: multi-year-deal-basics
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Structure multi-year deals — understand when to offer multi-year contracts, how to structure commitments, and the discount-for-commitment trade-off"
  tags: [sales, contracts, multi-year, commitment, discount, structure, beginner]

state: {}

trigger: |
  You're an AE at "ScalePlatform" (enterprise SaaS, $55M ARR). Your
  company is pushing multi-year deals to improve retention and
  predictability. You need to understand the mechanics.

  ScalePlatform multi-year pricing:
  - 1-year: List price (no discount)
  - 2-year: 5% discount on annual price
  - 3-year: 10% discount on annual price
  - Payment options: Annual upfront each year, or full prepayment
    (additional 3% discount for full prepayment)

  Example: $100K/year list price
  - 1-year: $100K
  - 2-year: $95K/year × 2 = $190K TCV (save $10K vs two 1-year)
  - 3-year: $90K/year × 3 = $270K TCV (save $30K vs three 1-year)
  - 3-year prepaid: $87.3K/year equivalent × 3 = $261.9K TCV

  5 scenarios to analyze:

  Scenario 1: Prospect wants 20% discount for 3-year commitment.
  Your authority is 10% max for 3-year. What's the counter?

  Scenario 2: Prospect wants 3-year term but annual cancellation
  option (essentially a 1-year with option to renew at locked price).
  Is this really a multi-year deal?

  Scenario 3: Prospect wants 3-year deal but expects to grow from 50
  to 200 users over the term. How do you structure the pricing? Lock
  all 200 users at discounted rate? Or ramp pricing?

  Scenario 4: Prospect's CFO demands full prepayment discount (3%)
  but wants to pay quarterly. They want both benefits.

  Scenario 5: Prospect is willing to do 2-year at 5% discount but
  wants a "most favored nation" clause — if you offer a better deal
  to any other customer, they get the same price.

  Tasks:
  1. For each of the 5 scenarios, write: the analysis (what's the
     real ask and its implications), the recommended response, the
     exact counter-proposal with pricing math, and the talk track.

  2. Write the "Multi-Year Deal Structuring Guide" — the complete
     framework for building multi-year contracts. Include: when to
     propose multi-year (signals of a good candidate), the discount-
     for-commitment matrix (what discounts are appropriate for what
     terms), the payment structure options (annual vs prepaid vs
     quarterly with pros/cons), the growth/ramp pricing approach
     (how to handle expected expansion), and the price lock mechanics
     (what's locked, what can change).

  3. Write the "Multi-Year Deal Calculator" — a reference tool that
     helps AEs quickly calculate multi-year pricing. Include: the TCV
     calculation for 2-year and 3-year at different price points, the
     effective discount comparison (what the customer actually saves),
     the company-side economics (why multi-year is good for the
     business even with discounts), and the break-even analysis (at
     what churn rate does the multi-year discount pay for itself).

assertions:
  - type: llm_judge
    criteria: "Five scenario responses are commercially sound — each recognizes the real ask, provides a counter that protects revenue, and includes specific pricing math"
    weight: 0.35
    description: "Commercially sound scenario responses"
  - type: llm_judge
    criteria: "Multi-year guide is comprehensive — when to propose, discount matrix, payment options, growth pricing, and price lock mechanics with clear guidance"
    weight: 0.35
    description: "Comprehensive multi-year guide"
  - type: llm_judge
    criteria: "Calculator is useful — TCV calculations, effective discount comparison, company economics, and break-even analysis that help AEs make informed multi-year decisions"
    weight: 0.30
    description: "Useful multi-year calculator"
