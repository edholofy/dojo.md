meta:
  id: payment-terms-negotiation
  level: 1
  course: contract-negotiation-responses
  type: output
  description: "Navigate payment terms negotiations — handle Net 30/60/90 requests, annual vs monthly billing, upfront payment incentives, and cash flow trade-offs"
  tags: [sales, contracts, payment-terms, billing, cash-flow, beginner]

state: {}

trigger: |
  You're a Sales Operations Analyst at "FlowSaaS" (workflow automation,
  $40M ARR). The VP of Sales has asked you to create the payment terms
  negotiation guide because AEs keep agreeing to unfavorable terms
  without understanding the financial impact.

  FlowSaaS standard payment terms:
  - Default: Annual upfront payment, Net 30
  - Monthly billing: Available at 15% premium (monthly price =
    annual price / 12 × 1.15)
  - Multi-year: 2-year (5% discount), 3-year (10% discount)
  - Payment schedule: Annual upfront preferred, quarterly available
    for deals >$100K

  Recent problematic negotiation outcomes:
  1. AE agreed to Net 90 on a $200K deal → FlowSaaS didn't receive
     payment for 4.5 months (invoice + 90 days)
  2. AE agreed to quarterly billing with no premium on a $50K deal →
     increased billing complexity, higher churn risk
  3. AE offered 25% discount for a 3-year deal (standard is 10%) →
     VP of Finance rejected, almost lost the deal
  4. AE agreed to "payment upon implementation completion" with no
     defined timeline → customer stalled implementation for 6 months,
     payment delayed indefinitely
  5. AE accepted payment in local currency (Brazilian Reals) without
     finance approval → exchange rate exposure cost 8% of deal value

  Tasks:
  1. For each of the 5 problematic outcomes, write: what went wrong,
     the financial impact on FlowSaaS, what the AE should have done
     instead, and the corrected negotiation approach (exact language).

  2. Write the "Payment Terms Negotiation Matrix" — a decision
     framework AEs can use in real-time. Include: the standard terms
     (what we offer by default), the flexibility zones (what we can
     negotiate, with limits), the trade-offs (if you give X, ask for Y
     in return), and the hard limits (terms that require finance
     approval). Cover: payment timing (Net 30/60/90), billing frequency
     (annual/quarterly/monthly), prepayment incentives, multi-year
     discounts, and currency requirements.

  3. Write the "Cash Flow Impact Guide" — help AEs understand why
     payment terms matter to the company. Include: the time value of
     money (simple explanation), how payment terms affect revenue
     recognition, the cash flow impact calculation (Net 30 vs Net 90
     on a $100K deal), why annual upfront is preferred (reduce churn,
     improve cash flow, lower billing cost), and the true cost of
     offering monthly billing.

assertions:
  - type: llm_judge
    criteria: "Five problematic outcomes are diagnosed and corrected — each identifies what went wrong, quantifies impact, and provides specific alternative approach with negotiation language"
    weight: 0.35
    description: "Diagnosed and corrected outcomes"
  - type: llm_judge
    criteria: "Payment terms matrix is decision-ready — covers timing, frequency, prepayment, multi-year, and currency with standard/flexible/hard-limit guidance and trade-off logic"
    weight: 0.35
    description: "Decision-ready payment matrix"
  - type: llm_judge
    criteria: "Cash flow guide educates on business impact — explains time value, revenue recognition, and cash flow calculations accessibly enough for AEs without finance backgrounds"
    weight: 0.30
    description: "Business-impact cash flow education"
