meta:
  id: pricing-model-transformation
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Navigate pricing model transformation in contracts — manage the transition from one pricing model to another while renegotiating existing customer contracts"
  tags: [sales, contracts, pricing-model, transformation, migration, usage-based, expert]

state: {}

trigger: |
  You're the Chief Revenue Officer at "MetricSaaS" ($220M ARR, 3,000
  customers). The company is transitioning from per-seat pricing to
  usage-based pricing (consumption model). This affects every customer
  contract and requires the most complex negotiation your company has
  ever undertaken.

  Current state:
  - 3,000 customers on per-seat pricing
  - Average ACV: $73K (range: $5K to $2M)
  - Average seats: 150 per customer
  - Average price per seat: $487/year

  New pricing model:
  - Base platform fee: $2,000/month
  - Usage charge: $0.02 per API call + $0.10 per GB processed
  - Projected customer impact:
    - 40% of customers will pay MORE (heavy users, underpriced today)
    - 35% of customers will pay ABOUT THE SAME (within ±10%)
    - 25% of customers will pay LESS (light users, overpriced today)

  Contract challenges:
  1. Existing contracts: 2,100 customers have 12-month contracts with
     locked per-seat pricing. You can't change pricing mid-contract.
  2. Multi-year deals: 600 customers have 2-3 year contracts with
     price protection clauses. Some don't renew for 30 months.
  3. Enterprise agreements: 300 customers have custom enterprise
     agreements with negotiated rates, volume discounts, and price
     caps that don't translate to the new model.
  4. Channel partners: 200 customers purchased through resellers who
     mark up per-seat pricing. The usage model breaks their margin
     structure.
  5. Revenue predictability: The board is concerned that usage-based
     pricing reduces revenue predictability. They want committed
     minimums in all contracts.

  Financial constraints:
  - Cannot lose more than 5% of ARR during transition (max $11M at risk)
  - Must maintain 75%+ gross margin
  - Need to show Wall Street that usage model accelerates growth
  - Transition must be complete within 18 months

  Tasks:
  1. Write the "Pricing Transition Contract Strategy" — the master
     plan for transitioning 3,000 customers to the new model. Include:
     the customer segmentation by transition approach (immediate
     transition, gradual migration, grandfather period), the contract
     amendment templates for each segment, the pricing guarantee
     structures (how to protect customers from bill shock), the
     committed minimum frameworks (how to ensure revenue predictability
     while allowing usage-based flexibility), and the timeline with
     milestones.

  2. Write the "Customer Negotiation Playbook by Segment" — the
     specific negotiation approaches for the 5 customer segments
     (customers who pay more, about the same, less, multi-year
     locked, and channel). Include: the value narrative for each
     segment (why usage-based is better for them), the specific
     transition offers (discounts, guarantees, credits), the
     objection handling scripts (for each common objection by
     segment), and the escalation procedures (when to involve
     leadership).

  3. Write the "Channel Partner Transition Plan" — the specific
     strategy for transitioning 200 channel-purchased customers.
     Include: the new channel margin structure (how partners make
     money in a usage model), the partner communication plan (how
     to explain without losing partners), the customer-facing
     messaging (what channel customers are told), and the fallback
     options (what if key partners refuse the new model).

assertions:
  - type: llm_judge
    criteria: "Transition strategy handles 3,000-customer migration — segmentation, amendment templates, pricing guarantees, committed minimums, and timeline that could execute a real pricing model change"
    weight: 0.35
    description: "Executable pricing transition"
  - type: llm_judge
    criteria: "Segment playbooks address different impacts — customers paying more, same, less, locked, and channel each get tailored value narratives, offers, and objection handling"
    weight: 0.35
    description: "Segment-tailored playbooks"
  - type: llm_judge
    criteria: "Channel plan preserves partner economics — new margin structure, communication plan, and fallback options that maintain channel relationships during pricing upheaval"
    weight: 0.30
    description: "Partner-preserving channel plan"
