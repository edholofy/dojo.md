meta:
  id: expert-negotiation-shift
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Handle an expert-level organizational negotiation crisis — manage a company-wide contract crisis involving regulatory changes, competitive threats, M&A complications, and board governance"
  tags: [sales, contracts, crisis, organizational, multi-dimensional, shift-simulation, expert]

state: {}

trigger: |
  You're the CRO at "CrisisCloud" ($450M ARR, 6,000 customers). Three
  simultaneous events have created a contract crisis that threatens
  the business:

  Event 1 — Regulatory bombshell:
  A new federal data privacy regulation (taking effect in 6 months)
  requires all SaaS vendors to include specific data handling clauses
  in every customer contract. Your analysis shows:
  - 4,200 of 6,000 contracts don't have the required clauses
  - Failure to comply results in fines of up to $10,000 per contract
    per day of non-compliance ($42M/day potential exposure)
  - You need customer consent for contract amendments (can't
    unilaterally change terms)
  - Legal team of 10 can handle ~50 amendments per week at current
    capacity

  Event 2 — Competitive crisis:
  Your largest competitor has announced a "freedom from lock-in"
  campaign, offering your customers free migration and 50% first-year
  discount. They're specifically targeting your customers with long
  auto-renewal contracts and above-market pricing. Intelligence shows:
  - 200 customers (representing $60M ARR) have received outreach
  - 35 customers have already started competitive evaluations
  - 15 customers have demanded immediate contract renegotiation or
    they'll switch
  - Your auto-renewal clauses (60-day cancellation window) are being
    portrayed as "vendor lock-in" in trade press

  Event 3 — M&A complication:
  Your company is in acquisition talks with "MegaCorp" (Fortune 50).
  Due diligence reveals:
  - MegaCorp is concerned about your contract portfolio risk ($2.1B
    in maximum liability exposure across all contracts)
  - They want all non-standard liability contracts remediated before
    closing (800 contracts with unlimited liability)
  - The acquisition timeline is 9 months — overlapping with the
    regulatory compliance deadline
  - If the acquisition falls through, the board will lose confidence
    in current leadership

  Resources:
  - Legal: 10 attorneys, max capacity 50 contract amendments/week
  - Sales: 300 AEs, most with no contract expertise
  - Budget: $2M for outside legal counsel
  - Technology: Basic CLM tool, no automation
  - Timeline: 6 months for regulatory, 9 months for M&A, competitive
    threat is immediate

  Tasks:
  1. Write the "Crisis Response Plan" — the integrated strategy for
     addressing all three events simultaneously. Include: the priority
     matrix (which customers/contracts to address first, considering
     all three events), the resource allocation across initiatives
     (how to split limited legal and sales capacity), the timeline
     with milestones for each workstream, the risk assessment (what
     happens if you can't meet all three deadlines), and the board
     communication plan.

  2. Write the "Execution Playbook" for each workstream. Regulatory
     compliance: the mass amendment strategy (how to amend 4,200
     contracts in 6 months), the customer communication campaign, the
     automation opportunities. Competitive defense: the retention
     strategy for the 200 at-risk customers, the contract modernization
     approach (removing "lock-in" perception), the counter-messaging.
     M&A readiness: the liability remediation plan for 800 contracts,
     the due diligence package, the clean-up prioritization.

  3. Write the "Organizational Transformation Proposal" — the
     long-term changes needed so this crisis never happens again.
     Include: the contract operations restructuring (headcount,
     process, technology), the proactive compliance monitoring system,
     the competitive contract intelligence function, the M&A-ready
     contract portfolio standards, and the investment case (what
     these changes cost vs the risk they mitigate).

assertions:
  - type: llm_judge
    criteria: "Crisis plan integrates three simultaneous challenges — priority matrix, resource allocation, and timeline that address regulatory, competitive, and M&A events with limited resources"
    weight: 0.35
    description: "Integrated crisis response"
  - type: llm_judge
    criteria: "Execution playbooks are specific and achievable — mass amendment strategy, competitive retention, and liability remediation with realistic timelines given stated resource constraints"
    weight: 0.35
    description: "Achievable execution playbooks"
  - type: llm_judge
    criteria: "Transformation proposal prevents recurrence — restructuring, compliance monitoring, competitive intelligence, and M&A readiness standards that create structural resilience"
    weight: 0.30
    description: "Resilience-creating transformation"
