meta:
  id: deal-desk-architecture
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Architect a world-class deal desk — design the organizational structure, processes, and technology that enable high-velocity, high-quality contract negotiations at scale"
  tags: [sales, contracts, deal-desk, architecture, operations, scale, expert]

state: {}

trigger: |
  You're the SVP of Revenue Operations at "HyperGrowth" ($500M ARR,
  growing 60% YoY, 600 AEs). The company has outgrown its ad-hoc
  contract negotiation process. The CEO has approved budget for a
  world-class deal desk. You're designing it from scratch.

  Current state (broken):
  - No centralized deal desk — AEs handle negotiations independently
  - Legal team of 6 is overwhelmed (1,800 contracts/year, growing fast)
  - Average deal cycle: 34 business days (industry benchmark: 18 days)
  - 30% of deals require executive approval due to non-standard terms
  - No standard approval workflow — AEs email various executives
  - Revenue recognition issues due to non-standard payment terms
  - Customer complaints about slow contracting (NPS impact: -8 points)

  Growth projections:
  - Expecting 3,000 contracts/year in 12 months (67% increase)
  - New product line launching (requires new contract templates)
  - International expansion into 10 new countries (local requirements)
  - Moving upmarket — enterprise deals increasing from 15% to 30%
  - IPO planned in 18 months — audit-ready processes required

  Budget approved:
  - 8 new headcount (mix of deal desk analysts, contract managers,
    and legal counsel)
  - $400K for CLM technology
  - $150K for training and change management

  Executive priorities:
  - CEO: "Deals should never be lost because of slow contracting"
  - CFO: "I need audit-ready deal approval processes for IPO"
  - CRO: "Don't create more bureaucracy — AEs need to sell, not
    fill out forms"
  - CLO: "Protect the company without being a bottleneck"
  - COO: "Make it scalable — this needs to work at $2B ARR too"

  Tasks:
  1. Write the "Deal Desk Organization Design" — the complete
     structure for the deal desk. Include: the organizational chart
     (roles, reporting lines, headcount by role), the job descriptions
     for each role (deal desk analyst, senior analyst, contract
     manager, deal desk director), the team structure by segment
     (enterprise pod, mid-market pod, SMB self-service), the
     interaction model with sales, legal, and finance, and the
     success metrics for the deal desk (speed, quality, compliance,
     AE satisfaction).

  2. Write the "Deal Desk Process Architecture" — the end-to-end
     processes the deal desk will manage. Include: the deal intake
     process (how deals enter the desk), the tiered review process
     (self-service, analyst review, legal review, executive approval),
     the approval workflow by deal characteristics (size, terms,
     discount level, customer type), the SLA for each process tier
     (response times, turnaround commitments), the exception handling
     process (how non-standard deals are managed), and the handoff
     protocols (between deal desk, legal, and sales).

  3. Write the "Technology and Implementation Plan" — the CLM tool
     requirements and 6-month implementation roadmap. Include: the
     must-have features for the CLM tool (template management,
     approval workflows, clause library, e-signature, analytics),
     the nice-to-have features (AI-assisted review, playbook
     integration, CRM integration), the vendor evaluation criteria,
     the phased rollout plan (Month 1-2: foundation, Month 3-4:
     automation, Month 5-6: optimization), and the change management
     strategy (how to get 600 AEs to adopt new processes).

assertions:
  - type: llm_judge
    criteria: "Organization design is scalable — roles, structure, segment pods, and success metrics that work at $500M and scale to $2B with IPO-ready governance"
    weight: 0.35
    description: "Scalable organization design"
  - type: llm_judge
    criteria: "Process architecture enables speed — tiered review, approval workflows, SLAs, and exception handling that could reduce 34-day cycle to industry benchmark"
    weight: 0.35
    description: "Speed-enabling process architecture"
  - type: llm_judge
    criteria: "Implementation plan is realistic — phased 6-month CLM rollout with change management for 600 AEs, balancing technology with process transformation"
    weight: 0.30
    description: "Realistic implementation plan"
