meta:
  id: competitive-deal-rescue
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Rescue deals from competitive losses through contract innovation — design creative contract terms that beat competitors on structure, not just price"
  tags: [sales, contracts, competitive, deal-rescue, creative-terms, win-back, expert]

state: {}

trigger: |
  You're the VP of Strategic Sales at "WinBack" ($180M ARR, enterprise
  platform). Your company is losing too many competitive deals — not on
  product, but on commercial terms. Competitors are offering creative
  contract structures that your standard approach can't match. You need
  to develop a competitive contract playbook.

  Competitive intelligence on 5 recent losses:

  Loss 1 — "BigRetail" ($600K, lost to CompetitorA):
  Why lost: CompetitorA offered "outcome-based pricing" — BigRetail
  only pays based on measurable business outcomes (revenue increase,
  cost reduction). Base fee of $200K + performance bonus up to $600K.
  BigRetail loved the aligned incentives. Your proposal was a flat
  $600K annual license.

  Loss 2 — "HealthNet" ($400K, lost to CompetitorB):
  Why lost: CompetitorB offered a "risk-free pilot" — 6-month full
  deployment at zero cost with conversion to paid only if HealthNet
  achieves pre-defined success criteria. Your proposal required
  upfront commitment with a 30-day money-back guarantee.

  Loss 3 — "TechStartup" ($150K, lost to CompetitorC):
  Why lost: CompetitorC offered "equity payment" — accepted $50K cash
  plus $100K in company equity. TechStartup is pre-revenue but well-
  funded. Your policy requires cash payment only.

  Loss 4 — "MfgCorp" ($350K, lost to CompetitorA):
  Why lost: CompetitorA offered a "gainshare" model — base fee of
  $150K plus 5% of documented cost savings achieved through the
  platform. They guaranteed minimum savings of $700K in year 1
  (making the gainshare worth at least $35K + $150K base). Your flat
  pricing seemed "rigid" in comparison.

  Loss 5 — "GovState" ($250K, lost to CompetitorD):
  Why lost: CompetitorD offered a "cooperative consortium" deal —
  6 state agencies could share one license at $250K total instead of
  individual licenses. Your model required each agency to purchase
  separately at $50-80K each.

  Analysis: In 4 of 5 losses, your product scored higher in technical
  evaluation. You're losing on commercial creativity, not product.

  Tasks:
  1. Write the "Competitive Contract Innovation Playbook" — 8 creative
     contract structures to compete against each competitive approach.
     Include: outcome-based pricing (how to structure, risk mitigation),
     risk-free pilots (what metrics, what conversion terms), equity
     payment (when appropriate, how to value, approval process),
     gainshare models (base + variable, cap structure, measurement),
     consortium deals (pricing, governance, usage allocation), embedded
     financing (spreading costs, lease-like structures), technology
     insurance (guaranteeing performance with insurance backing), and
     hybrid models (combining multiple creative structures).

  2. Write the "Deal Rescue Strategies" for each of the 5 lost deals
     — how you would re-approach each customer with a competitive
     counter-proposal. Include: the re-engagement strategy (how to
     get back in the conversation), the competitive counter-offer
     (specific terms that beat the competitor's offer), the risk
     analysis (what risks you're taking and how to mitigate), and
     the approval requirements (what internal approvals are needed).

  3. Write the "Competitive Terms Intelligence System" — the ongoing
     process for monitoring and responding to competitive contract
     innovations. Include: the competitive terms database (how to
     collect and catalog competitor contract structures), the response
     library (pre-approved counter-offers for each competitive
     approach), the win/loss contract analysis process (how to extract
     contract insights from every deal), and the quarterly competitive
     contract review (how to update your playbook).

assertions:
  - type: llm_judge
    criteria: "Eight creative structures provide real competitive options — outcome-based, risk-free, equity, gainshare, consortium, financing, insurance, and hybrid models with risk mitigation for each"
    weight: 0.35
    description: "Creative competitive structures"
  - type: llm_judge
    criteria: "Five rescue strategies could win back real deals — re-engagement approaches, counter-offers, and risk analysis specific to each lost deal scenario"
    weight: 0.35
    description: "Actionable rescue strategies"
  - type: llm_judge
    criteria: "Intelligence system enables ongoing adaptation — competitive database, response library, win/loss analysis, and quarterly review that keep contract innovation current"
    weight: 0.30
    description: "Adaptive intelligence system"
