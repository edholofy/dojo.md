meta:
  id: ma-contract-transition
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Manage contract negotiations during M&A — handle customer contract transitions, renegotiations, and harmonization when acquiring or being acquired"
  tags: [sales, contracts, M&A, acquisition, transition, harmonization, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "AcquireTech" ($300M ARR)
  which just acquired "TargetSaaS" ($80M ARR) for $600M. You now
  need to manage the contract transition for both companies' combined
  customer bases. This is one of the most complex contract challenges
  in SaaS.

  Current state:
  AcquireTech:
  - 2,400 active contracts
  - Standard MSA with 12-month terms, 90-day auto-renewal
  - Average ACV: $125K
  - Liability cap: 2x ACV
  - Standard SLA: 99.9% uptime with service credits

  TargetSaaS:
  - 1,800 active contracts
  - Varied contract structures (no standardization)
  - Average ACV: $44K
  - Liability varies: some unlimited, some 1x, some 2x
  - SLA varies: some 99.9%, some 99.5%, some have no SLA

  Key challenges:
  1. Contract Assignment: 400 of TargetSaaS's contracts have anti-
     assignment clauses that require customer consent for the acquisition
     transfer. 50 of these are with customers who also use AcquireTech
     (overlap customers).

  2. Terms Harmonization: TargetSaaS gave significantly more favorable
     terms to win deals (unlimited liability, 99.99% SLA, perpetual
     pricing locks). These terms can't be sustained under AcquireTech's
     model. 200 contracts have "most-favored-customer" clauses.

  3. Overlap Customers: 50 customers have contracts with both companies.
     Some have better terms with TargetSaaS, some with AcquireTech.
     They'll expect the best terms from each contract to apply going
     forward.

  4. Pricing Integration: TargetSaaS's pricing was 30% below market
     to gain share. AcquireTech needs to normalize pricing over time
     without losing customers.

  5. Revenue Recognition: Different contract structures create
     ASC 606 compliance challenges. Auditors need clean contracts
     before IPO (planned in 24 months).

  6. Competitor Risk: Competitors are actively reaching out to
     TargetSaaS customers, saying the acquisition will mean price
     increases and service degradation.

  Tasks:
  1. Write the "Contract Transition Master Plan" — the 12-month plan
     for harmonizing 4,200 contracts. Include: the customer segmentation
     strategy (which contracts to address first and why), the assignment
     consent campaign (how to get consent from 400 customers), the
     terms harmonization roadmap (timeline for bringing TargetSaaS
     terms to standard), the overlap customer strategy (how to handle
     50 dual-contract customers), and the communication plan (what
     to tell customers at each stage).

  2. Write the "Contract Renegotiation Playbook" — the specific
     approach for renegotiating TargetSaaS contracts to AcquireTech
     standards. Include: the pricing normalization strategy (how to
     increase prices 30% without losing customers), the terms upgrade
     approach (how to move from unlimited liability to capped), the
     SLA standardization plan (how to move from 99.99% to 99.9%),
     the MFC clause resolution strategy, the customer retention
     offers (what value to add during renegotiation to offset term
     changes), and the competitive defense tactics (how to prevent
     customer defection during transition).

  3. Write the "M&A Contract Integration Checklist" — the reusable
     checklist for future acquisitions. Include: the pre-close contract
     analysis (what to review during due diligence), the Day 1
     contract actions (immediate post-close steps), the 30/60/90-day
     milestones, the revenue recognition compliance requirements, and
     the risk assessment framework (how to evaluate contract portfolio
     risk during M&A).

assertions:
  - type: llm_judge
    criteria: "Transition plan handles 4,200-contract complexity — segmentation, assignment consent, harmonization roadmap, overlap strategy, and communication that could guide a real post-acquisition integration"
    weight: 0.35
    description: "Complex transition master plan"
  - type: llm_judge
    criteria: "Renegotiation playbook balances normalization with retention — pricing increases, terms upgrades, SLA standardization with retention offers that minimize customer defection"
    weight: 0.35
    description: "Retention-balanced renegotiation"
  - type: llm_judge
    criteria: "M&A checklist is reusable — pre-close analysis, Day 1 actions, milestones, and risk framework that could be applied to future acquisitions"
    weight: 0.30
    description: "Reusable M&A checklist"
