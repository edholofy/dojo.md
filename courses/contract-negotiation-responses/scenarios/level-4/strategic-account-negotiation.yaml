meta:
  id: strategic-account-negotiation
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Negotiate strategic account contracts — handle whale deals with Fortune 100 companies where the relationship, terms, and pricing set precedents for the entire business"
  tags: [sales, contracts, strategic-accounts, enterprise, whale-deals, precedent, expert]

state: {}

trigger: |
  You're the Chief Revenue Officer at "PlatformMax" ($400M ARR). Your
  largest customer, "TechTitan" (Fortune 50, $80B revenue), is up for
  their 3-year renewal. They represent $8M ARR (2% of your revenue)
  and are a marquee logo. This negotiation will set precedents that
  affect your entire business.

  TechTitan's renewal demands:
  1. Pricing: 25% reduction from current $8M to $6M, citing competitive
     alternatives and internal platform consolidation initiative.
     They've completed POCs with 2 competitors.
  2. Terms: Unlimited liability (currently capped at $16M/2x ACV).
     They've made this a "non-negotiable" requirement.
  3. Exclusivity: They want you to agree not to hire from TechTitan
     for 2 years and not to share their usage data in any benchmarks
     or case studies (even anonymized).
  4. Product: They want guaranteed access to beta features, a dedicated
     product manager for their account, and veto power over any
     product changes that affect their implementation.
  5. SLA: 99.99% uptime (current is 99.9%) with uncapped financial
     penalties (not credits) for breaches.
  6. Most-Favored-Customer: They want a clause guaranteeing that no
     customer of comparable size gets better pricing or terms.

  Your analysis:
  - Losing TechTitan would be a $8M revenue hit plus reputational
    damage (they're your #1 reference customer)
  - Their competitive alternatives are real but would take 18 months
    to migrate (high switching costs)
  - Accepting unlimited liability would require a carve-out in your
    D&O insurance ($200K+ annual cost)
  - The MFC clause would constrain future deals with other Fortune 50s
  - The product demands would effectively make them a co-development
    partner (positive and negative implications)
  - Your board expects renewal at minimum $7M (12.5% reduction max)

  Internal stakeholders with opinions:
  - Board: "Keep this customer at all costs but don't set bad precedents"
  - CFO: "I can stomach $7M but not $6M — and no unlimited liability"
  - CPO: "Dedicated PM is fine. Veto power is absolutely not."
  - CLO: "MFC clause will cripple us. Unlimited liability is insurable
    but expensive."
  - VP Sales: "If we lose TechTitan, 3 other Fortune 100s will question
    their renewals"

  Tasks:
  1. Write the "TechTitan Renewal Strategy" — the comprehensive
     negotiation plan. Include: the BATNA analysis (theirs and yours),
     the red lines (what you absolutely cannot accept), the negotiation
     positions for all 6 demands (initial position, target, walk-away),
     the value-add proposals (what you can offer instead of price
     reductions), and the multi-meeting negotiation choreography
     (which issues to address in which meetings).

  2. Write the "Strategic Account Negotiation Framework" — the
     reusable approach for top-10 customer negotiations. Include:
     the stakeholder mapping methodology (who negotiates with whom),
     the precedent impact assessment (how to evaluate if terms will
     create precedents), the escalation strategy (when CRO should
     be in the room vs staying in reserve), the competitive response
     playbook (what to do when strategic accounts threaten to leave),
     and the renewal preparation timeline (how far in advance to
     start, with what activities).

  3. Write the "Board Communication Package" — how to communicate
     the negotiation status and outcomes to the board. Include: the
     pre-negotiation board briefing (what you're facing, what you
     recommend), the during-negotiation updates (milestones, risks),
     the post-negotiation summary (what you agreed, what you gave up,
     why), and the precedent analysis (how this deal affects future
     negotiations).

assertions:
  - type: llm_judge
    criteria: "TechTitan strategy balances retention with precedent protection — BATNA analysis, red lines, positions for all 6 demands, and meeting choreography that could retain an $8M customer without crippling future deals"
    weight: 0.35
    description: "Precedent-protecting renewal strategy"
  - type: llm_judge
    criteria: "Strategic account framework is reusable — stakeholder mapping, precedent assessment, escalation strategy, and competitive response that works across top-10 accounts"
    weight: 0.35
    description: "Reusable strategic account framework"
  - type: llm_judge
    criteria: "Board package communicates effectively — pre-negotiation briefing, during-negotiation updates, and post-negotiation summary appropriate for board-level governance"
    weight: 0.30
    description: "Board-ready communication package"
