meta:
  id: negotiation-playbook-design
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Design an organization-wide negotiation playbook — create the definitive guide that standardizes negotiation approaches, approval authorities, and deal terms across the entire sales organization"
  tags: [sales, contracts, playbook, organization, standardization, governance, expert]

state: {}

trigger: |
  You're the CRO at "ScaleSaaS" ($350M ARR, 400 AEs across 6 regions,
  selling to enterprise, mid-market, and SMB). The board has flagged
  that negotiation inconsistency is your biggest revenue leak — same-size
  customers get wildly different terms depending on which AE handles
  the deal. You need to build the definitive negotiation playbook.

  Current problems:
  - Discount variance: Enterprise deals range from 5% to 45% discount
    for similar deal sizes and customer profiles
  - Terms variance: Some AEs agree to unlimited liability; others
    hold firm at 1x ACV cap. No standard exists.
  - Payment terms: Range from prepaid annual to Net 90, with no
    correlation to deal size or customer creditworthiness
  - Legal cycle: Ranges from 3 days to 45 days depending on AE's
    contract knowledge and legal relationship
  - Customer perception: Prospects compare notes at industry events
    and discover pricing/terms inconsistencies, damaging trust
  - Revenue impact: Finance estimates $18M in annual revenue lost to
    excessive discounting and unfavorable terms

  Data available:
  - 3,200 deals from last 24 months with full term details
  - Win/loss analysis by discount tier, deal size, industry, region
  - Customer satisfaction scores correlated with contract terms
  - Competitive intelligence on market-standard terms
  - Legal review cycle times by issue type and AE experience level

  Stakeholder requirements:
  - Sales: "We need flexibility — every deal is different"
  - Legal: "We need consistency — rogue terms create liability"
  - Finance: "We need predictability — wildcard terms hurt forecasting"
  - Customer Success: "We need deliverable terms — don't promise what
    we can't deliver"
  - Executive team: "We need margin protection without losing deals"

  Tasks:
  1. Write the "Master Negotiation Playbook" — the comprehensive,
     authoritative guide for all contract negotiations. Include:
     the negotiation philosophy (principles that guide all decisions),
     the deal classification framework (how to categorize deals for
     appropriate treatment), the standard terms by deal tier (SMB,
     mid-market, enterprise, strategic), the approval authority matrix
     (who can approve what at each deal tier), the discount guidelines
     with guardrails (standard, maximum, exception process), the
     non-price concession menu (alternatives to discounts), and the
     escalation procedures (when and how to escalate).

  2. Write the "Negotiation Decision Framework" — the specific
     decision trees for the 10 most common negotiation scenarios.
     Include: discount requests (how much, when, with what
     justification), liability cap negotiations (your position, walk-
     away, alternatives), payment terms (standard, extended, when
     to flex), SLA commitments (what to offer, what to avoid),
     termination clauses (your standard, acceptable modifications),
     indemnification (scope, caps, exclusions), data protection
     (standard DPA, when to customize), multi-year pricing (discount
     curves, prepayment incentives), competitive displacement pricing
     (how aggressive to be), and renewal pricing (increase caps,
     exception handling).

  3. Write the "Playbook Governance Model" — how the playbook is
     maintained, updated, and enforced. Include: the review cadence
     (when to update terms based on market changes), the exception
     tracking system (how to track and learn from non-standard deals),
     the compliance measurement (how to ensure AEs follow the playbook),
     the feedback loop (how field input improves the playbook), and
     the change management plan (how to roll out and get adoption).

assertions:
  - type: llm_judge
    criteria: "Master playbook addresses organizational inconsistency — philosophy, classification, standard terms by tier, approval matrix, discount guardrails, and escalation that could standardize 400 AEs"
    weight: 0.35
    description: "Org-wide standardization playbook"
  - type: llm_judge
    criteria: "Decision framework covers 10 scenarios with specificity — each common negotiation situation has clear decision paths, positions, and walk-away points that AEs can follow"
    weight: 0.35
    description: "Specific decision frameworks"
  - type: llm_judge
    criteria: "Governance model ensures longevity — review cadence, exception tracking, compliance measurement, and feedback loops that keep the playbook relevant and adopted"
    weight: 0.30
    description: "Sustainable governance model"
