meta:
  id: legal-sales-partnership
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Build an effective legal-sales partnership — design the operating model where legal accelerates deals instead of blocking them while maintaining appropriate risk governance"
  tags: [sales, contracts, legal-partnership, operating-model, governance, alignment, expert]

state: {}

trigger: |
  You're the Chief Operating Officer at "BridgeGap" ($250M ARR). The
  relationship between your sales and legal teams has deteriorated to
  the point where it's affecting revenue. The CEO has asked you to
  redesign the legal-sales operating model.

  Current dysfunction:
  Sales team perspective (from survey, 150 AEs):
  - "Legal kills our deals" — 68% of AEs say legal is a bottleneck
  - "They don't understand business urgency" — 72% say legal doesn't
    prioritize based on deal importance
  - "Different attorneys give different answers" — 55% report
    inconsistent legal guidance
  - "We work around legal to get deals done" — 34% admit to
    occasionally signing contracts without full legal review
  - Average legal review wait: 4.8 business days
  - AEs spend 6.2 hours per deal on contract administration

  Legal team perspective (from survey, 8 attorneys):
  - "Sales makes promises we can't support" — 75% say AEs agree to
    terms without understanding implications
  - "We're brought in too late" — 88% say they first see contracts
    within days of deadline
  - "No one follows the playbook" — 62% say AEs ignore existing
    guidelines
  - "We're understaffed" — each attorney handles 200+ contracts/year
    (industry norm is 150)
  - "We're measured on risk, not speed" — their performance metrics
    reward preventing bad deals, not enabling good ones
  - They handle 1,600 contracts/year with 8 attorneys

  Business impact:
  - Average deal cycle: 32 days (12 days attributable to legal)
  - 15 deals lost last quarter due to "slow legal process" (per AE
    reporting — legal disputes this number)
  - 3 contracts from last year have resulted in liability claims
    totaling $1.2M (legal says this proves review is needed)
  - Customer NPS for contracting experience: 28 (well below company
    NPS of 52)

  Tasks:
  1. Write the "Legal-Sales Partnership Operating Model" — the new
     way legal and sales work together. Include: the partnership
     principles (shared goals, mutual accountability), the engagement
     model (when and how sales involves legal at each deal stage),
     the tiered service model (self-service for simple deals, light
     touch for standard, full engagement for complex), the shared
     metrics (speed, deal quality, risk management measured together),
     and the communication protocols (standing meetings, Slack
     channels, escalation paths).

  2. Write the "Legal Enablement Program" — how to make legal a
     competitive advantage. Include: the legal secondment program
     (rotating attorneys into sales team for immersion), the AE
     legal training curriculum (contract basics every AE must know),
     the attorney sales training curriculum (deal dynamics every
     attorney must understand), the shared playbook development
     process (how legal and sales co-create negotiation guidelines),
     and the technology enablement (tools that reduce legal bottleneck).

  3. Write the "Performance Measurement Framework" — how to measure
     and incentivize the partnership. Include: the shared scoreboard
     (metrics both teams are accountable for), the individual metrics
     by role (AE contract competency, attorney deal velocity), the
     quarterly partnership review process, the recognition program
     (celebrating legal-sales collaboration wins), and the escalation
     and conflict resolution mechanism (what happens when legal and
     sales disagree on a deal).

assertions:
  - type: llm_judge
    criteria: "Operating model bridges the dysfunction — partnership principles, tiered engagement, shared metrics, and communication protocols that address both sales and legal frustrations"
    weight: 0.35
    description: "Dysfunction-bridging operating model"
  - type: llm_judge
    criteria: "Legal enablement makes legal a competitive advantage — secondments, cross-training, co-created playbooks, and technology that transform legal from bottleneck to accelerator"
    weight: 0.35
    description: "Legal-as-advantage enablement"
  - type: llm_judge
    criteria: "Performance framework drives partnership behavior — shared scoreboard, individual metrics, partnership reviews, and conflict resolution that incentivize collaboration"
    weight: 0.30
    description: "Partnership-driving performance framework"
