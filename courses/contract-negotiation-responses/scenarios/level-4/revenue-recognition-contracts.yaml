meta:
  id: revenue-recognition-contracts
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Align contract terms with revenue recognition requirements — ensure deal structures comply with ASC 606, avoid rev rec pitfalls, and structure contracts that finance can book cleanly"
  tags: [sales, contracts, revenue-recognition, ASC-606, finance, compliance, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "BookClean" ($280M ARR,
  preparing for IPO in 12 months). Your auditors have flagged that
  35% of contracts from the past year have revenue recognition issues
  that need remediation. The CFO has asked you to fix the problem and
  prevent it from recurring.

  Audit findings:
  1. Variable consideration (120 contracts): Deals with uncapped
     discounts, conditional pricing, or performance-based fees that
     make it difficult to estimate the transaction price at inception.
     Example: "Customer pays $100K but gets $30K refund if they don't
     achieve 20% ROI within 12 months."

  2. Multiple performance obligations (85 contracts): Bundled deals
     combining software licenses, implementation services, training,
     and support without clear standalone selling prices for each
     element. Example: "$500K deal for platform + implementation +
     3 years support" with no breakdown.

  3. Contract modifications (60 contracts): Mid-term changes (scope
     additions, price changes, term extensions) that weren't properly
     documented as modifications vs new contracts, creating ambiguity
     about whether to use prospective or cumulative catch-up treatment.

  4. Payment term misalignment (45 contracts): Extended payment terms
     (Net 120+) or financing arrangements that create implied financing
     components, requiring present value calculations and interest
     imputation.

  5. Right of return and clawback (30 contracts): SLA credits, money-
     back guarantees, and clawback provisions that create variable
     consideration requiring constraint estimates.

  Total contracts requiring remediation: 340 (some have multiple issues)
  Revenue at risk: $42M that may need restatement
  IPO impact: Auditors won't sign off until issues are resolved

  Tasks:
  1. Write the "Revenue-Compliant Contract Guidelines" — the specific
     rules AEs must follow to ensure contracts are ASC 606 compliant.
     For each of the 5 audit finding categories: the root cause (why
     AEs create these issues), the contract language that causes
     problems (examples), the compliant alternative language (what to
     use instead), the review checkpoint (how to catch issues before
     signing), and the escalation trigger (when to involve revenue
     accounting).

  2. Write the "Contract Remediation Plan" — how to fix the 340
     existing problem contracts. Include: the prioritization framework
     (which contracts to fix first based on materiality and IPO
     timeline), the customer communication strategy (how to approach
     customers about amendments), the amendment templates for each
     issue type, the timeline for completing remediation (must finish
     8 months before IPO filing), and the tracking and reporting
     system.

  3. Write the "Sales-Finance Alignment Framework" — the ongoing
     process to prevent future rev rec issues. Include: the deal
     structure review process (when finance reviews deals before
     signing), the AE training curriculum on rev rec basics (what
     every AE needs to know), the contract clause library with rev
     rec impact ratings, the quarterly compliance audit process, and
     the incentive alignment recommendations (how to change comp
     plans to discourage rev rec-problematic deal structures).

assertions:
  - type: llm_judge
    criteria: "Revenue-compliant guidelines address all 5 audit categories — root causes, problematic language, compliant alternatives, review checkpoints, and escalation triggers for real ASC 606 compliance"
    weight: 0.35
    description: "ASC 606-compliant guidelines"
  - type: llm_judge
    criteria: "Remediation plan is IPO-ready — prioritization, customer communication, amendment templates, and timeline that could fix 340 contracts before IPO filing"
    weight: 0.35
    description: "IPO-ready remediation plan"
  - type: llm_judge
    criteria: "Sales-finance alignment prevents recurrence — deal review process, AE training, clause library, and incentive alignment that creates structural prevention of rev rec issues"
    weight: 0.30
    description: "Structural prevention framework"
