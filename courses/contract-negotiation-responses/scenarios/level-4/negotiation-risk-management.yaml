meta:
  id: negotiation-risk-management
  level: 4
  course: contract-negotiation-responses
  type: output
  description: "Build a negotiation risk management framework — identify, quantify, and mitigate contractual risks across the portfolio to protect the business while enabling growth"
  tags: [sales, contracts, risk-management, portfolio, quantification, governance, expert]

state: {}

trigger: |
  You're the Chief Legal Officer at "RiskAware" ($320M ARR, 4,500
  active contracts). The board's audit committee has asked for a
  comprehensive assessment of contractual risk across your entire
  portfolio. A recent $4.5M liability claim (from a contract where
  the AE agreed to unlimited liability without legal review) has
  triggered this review.

  Portfolio risk snapshot:
  - 4,500 active contracts, $320M ARR
  - 12% of contracts ($38.4M ARR) have non-standard liability terms
  - 8% ($25.6M ARR) have unlimited liability exposure
  - 5% ($16M ARR) have performance guarantees that CS can't meet
  - 18% ($57.6M ARR) have non-standard termination provisions
  - 3% ($9.6M ARR) have most-favored-customer clauses
  - 7% ($22.4M ARR) have data handling terms that may not comply with
    current regulations (GDPR evolution, state privacy laws)
  - Total estimated maximum liability exposure: $1.8B
    (vs $640M in total contract value)

  Recent incidents:
  1. $4.5M claim: Customer experienced data breach, invoked unlimited
     liability clause. AE had agreed to the term to close a $200K deal.
  2. $800K SLA penalty: Customer invoked uncapped SLA penalties during
     a 6-hour outage. Contract had no cap on penalties.
  3. $2.1M forced discount: Customer invoked MFC clause when they
     discovered a smaller customer got better pricing. Required
     retroactive price reduction.
  4. $350K termination: Customer terminated for convenience with
     30-day notice on a deal with $350K in remaining obligation.
     Contract didn't require any termination fee.

  Board questions:
  - What is our total contractual risk exposure?
  - Which contracts pose the greatest financial risk?
  - How do we reduce risk without disrupting customer relationships?
  - What governance prevents future high-risk contract creation?

  Tasks:
  1. Write the "Contractual Risk Assessment Report" for the board.
     Include: the portfolio risk summary (total exposure by risk
     category), the top 20 highest-risk contracts (identified by
     exposure amount), the risk quantification methodology (how you
     calculate exposure), the trend analysis (is risk increasing or
     decreasing and why), and the peer benchmarking (how your risk
     profile compares to industry norms).

  2. Write the "Risk Remediation Strategy" — the 18-month plan to
     reduce contractual risk to acceptable levels. Include: the
     risk prioritization framework (which risks to address first),
     the customer engagement approach for each risk category (how
     to negotiate term changes during renewals), the insurance
     strategy (what to insure vs what to remediate in contracts),
     the interim risk mitigation (what to do before contracts can
     be amended), and the financial impact forecast (expected
     reduction in exposure by quarter).

  3. Write the "Contractual Risk Governance Framework" — the ongoing
     system to prevent future high-risk contracts. Include: the risk
     scoring model for new contracts (how to score risk at deal
     stage), the approval thresholds by risk level (who must approve
     high-risk terms), the quarterly portfolio risk review process,
     the AE accountability framework (consequences for circumventing
     review), the early warning system (triggers that flag emerging
     portfolio risks), and the board reporting cadence and format.

assertions:
  - type: llm_judge
    criteria: "Risk assessment is board-ready — portfolio summary, top 20 risks, quantification methodology, and trend analysis that an audit committee could review and act on"
    weight: 0.35
    description: "Board-ready risk assessment"
  - type: llm_judge
    criteria: "Remediation strategy is practical — risk prioritization, customer engagement by category, insurance strategy, and financial forecast that could reduce $1.8B exposure"
    weight: 0.35
    description: "Practical remediation strategy"
  - type: llm_judge
    criteria: "Governance framework prevents recurrence — risk scoring, approval thresholds, portfolio reviews, AE accountability, and early warning system that structurally prevent high-risk contracts"
    weight: 0.30
    description: "Recurrence-preventing governance"
