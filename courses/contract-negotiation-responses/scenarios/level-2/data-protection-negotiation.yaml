meta:
  id: data-protection-negotiation
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Negotiate data protection terms — handle DPA requirements, GDPR compliance clauses, data residency demands, and privacy-related contract provisions"
  tags: [sales, contracts, data-protection, GDPR, DPA, privacy, intermediate]

state: {}

trigger: |
  You're a Deal Desk Manager at "AnalyticsPro" (customer analytics
  platform, $65M ARR). You process personal data for customers across
  the US, EU, and UK. Data protection clauses are now the #1 source
  of contract delays — adding an average of 3.2 weeks to deal cycles.

  AnalyticsPro's standard DPA:
  - Data processor role: AnalyticsPro processes data on customer's
    behalf per their instructions
  - Sub-processors: Listed in DPA appendix, 30-day notice for changes,
    customer can object
  - Data residency: US-based data centers (AWS us-east-1 and us-west-2)
  - Breach notification: 72 hours after becoming aware
  - Data deletion: Within 90 days of contract termination
  - Security: SOC 2 Type II, ISO 27001, encryption at rest and transit
  - GDPR compliance: Standard Contractual Clauses (SCCs) for EU data

  4 customer negotiation scenarios:

  Scenario 1 — German enterprise ($180K deal):
  "We require all data to be stored and processed within the EU. No
  data may leave the EU under any circumstances, including for
  support or maintenance purposes. We also need 24-hour breach
  notification, not 72 hours."

  Scenario 2 — UK financial services ($250K deal):
  "Post-Brexit, we need UK-specific data protection addendum aligned
  with UK GDPR. We also need the right to audit your data processing
  facilities annually, with 30 days notice."

  Scenario 3 — US healthcare ($120K deal):
  "We need a BAA (Business Associate Agreement) for HIPAA compliance.
  All PHI must be encrypted with AES-256, and you need to limit access
  to PHI to named individuals only."

  Scenario 4 — Global company with EU and US employees ($300K deal):
  "We have employees in 15 countries. We need data residency in the
  EU for EU employees, in the US for US employees, and a legal basis
  for all cross-border transfers. Also, we need data subject access
  request response support within 48 hours."

  Tasks:
  1. For each scenario, write: the compliance requirements (what's
     legally required vs what's a preference), the feasibility
     assessment (can AnalyticsPro meet this?), the counter-proposal
     (what to offer if the request isn't fully feasible), and the
     contract language (specific DPA amendments for each). Flag the
     items that require engineering or infrastructure changes.

  2. Write the "Data Protection Negotiation Framework" — the
     reusable process for handling data protection contract requests.
     Include: the compliance requirements by jurisdiction (EU, UK, US,
     global), the standard vs custom DPA approach (what's in the
     standard DPA vs what needs customization), the common requests
     and pre-approved responses (reduce legal review time), and the
     escalation path (when data protection requests need engineering,
     legal, or CISO involvement).

  3. Write the "Data Protection FAQ for Sales" — 20 questions AEs
     get from prospects about data protection, with approved answers.
     Cover: "Where is our data stored?", "Who has access to our
     data?", "What happens to our data when we leave?", "Are you
     GDPR compliant?", "Can you sign our DPA?", "Do you use sub-
     processors?", and 14 more. Each answer should be legally
     accurate and sales-appropriate.

assertions:
  - type: llm_judge
    criteria: "Four scenario responses distinguish legal requirements from preferences — compliance requirements identified, feasibility assessed, counter-proposals provided with specific DPA language"
    weight: 0.35
    description: "Legally precise scenario responses"
  - type: llm_judge
    criteria: "Framework reduces legal review time — jurisdiction-specific requirements, standard vs custom DPA, pre-approved responses, and escalation paths that accelerate data protection negotiations"
    weight: 0.35
    description: "Time-reducing data protection framework"
  - type: llm_judge
    criteria: "FAQ empowers AEs — 20 questions with legally accurate, sales-appropriate answers that let AEs address data protection concerns without always involving legal"
    weight: 0.30
    description: "AE-empowering data protection FAQ"
