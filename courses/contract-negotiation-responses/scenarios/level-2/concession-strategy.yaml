meta:
  id: concession-strategy
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Build a concession strategy — learn when to give, what to ask in return, and how to structure trades that move deals forward while protecting value"
  tags: [sales, contracts, concession, trade, negotiation, strategy, intermediate]

state: {}

trigger: |
  You're the VP of Sales Operations at "IntegratePro" (integration
  platform, $70M ARR). Your AEs are terrible at trading concessions —
  they either give everything away or refuse to budge. You need a
  systematic approach.

  IntegratePro's negotiable items (what you can give):
  - Pricing: Up to 20% discount (with approval)
  - Payment terms: Net 30 to Net 60 (Net 90 rare, CFO approval)
  - Contract length: 1-3 years
  - SLA upgrade: Can upgrade one tier at no cost
  - Implementation: 2 free onboarding sessions (normally $5K)
  - Training: 1 additional training day (normally $3K)
  - Support: Upgrade to premium support for 6 months trial
  - Case study: Customer agrees to be a reference
  - Expansion commit: Customer agrees to minimum user growth
  - Product feedback: Customer joins advisory board

  IntegratePro's ask-in-return items (what you want):
  - Multi-year commitment (reduces churn risk)
  - Larger user commitment (volume lock-in)
  - Annual upfront payment (cash flow)
  - Case study/reference participation (marketing value)
  - Product advisory board membership (product feedback)
  - Introduction to peer companies (referral pipeline)
  - Logo rights for marketing (brand credibility)
  - Expansion commitment (growth guarantee)

  5 negotiation scenarios requiring concession trades:

  Scenario 1: Customer wants 15% discount. What do you ask for?
  Scenario 2: Customer wants Net 90 payment terms. What's the trade?
  Scenario 3: Customer wants termination for convenience. Trade?
  Scenario 4: Customer wants premium SLA at standard price. Trade?
  Scenario 5: Customer wants 3 extra implementation days ($15K value).

  Tasks:
  1. For each of the 5 scenarios, write: what the customer wants (and
     its cost to IntegratePro), the 3 best things to ask in return
     (ranked by value to IntegratePro), the exact trade proposal
     language, and the "if they say no to all three" fallback plan.

  2. Write the "Concession Trading Matrix" — a visual reference tool
     that maps every give-item to every ask-item with a value rating.
     Include: the cost of each concession to IntegratePro (in dollars
     or risk), the value of each ask-in-return (in dollars or
     strategic value), the recommended pairings (which gives match
     which asks), and the "never give without getting" rule with
     exception criteria.

  3. Write the "Concession Negotiation Techniques" guide — the 8
     techniques for making concessions effectively. Include: the
     "reluctant concession" (make them feel they've won something),
     the "diminishing concessions" (each concession gets smaller),
     the "conditional concession" ("If you... then we..."), the
     "package deal" (bundle multiple items), the "split the
     difference" defense, the "take it or leave it" close, the
     "higher authority" hold ("I need to check with my VP"), and the
     "creative expansion" (find new value rather than splitting
     existing value).

assertions:
  - type: llm_judge
    criteria: "Five scenario trades are value-balanced — each concession has appropriate asks-in-return ranked by value, with specific language and fallback plans"
    weight: 0.35
    description: "Value-balanced scenario trades"
  - type: llm_judge
    criteria: "Trading matrix is a practical reference — maps gives to asks with value ratings and recommended pairings that AEs can use as a real-time negotiation tool"
    weight: 0.30
    description: "Practical trading matrix"
  - type: llm_judge
    criteria: "Eight techniques are actionable — specific concession techniques with when to use each and how to execute them in live negotiations"
    weight: 0.35
    description: "Actionable concession techniques"
