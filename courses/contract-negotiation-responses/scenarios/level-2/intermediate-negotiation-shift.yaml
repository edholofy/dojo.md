meta:
  id: intermediate-negotiation-shift
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Intermediate shift simulation — navigate a complex multi-round negotiation with a Fortune 500 procurement team that uses every tactic in the book"
  tags: [sales, contracts, simulation, multi-round, procurement, Fortune-500, intermediate]

state: {}

trigger: |
  SIMULATION: 3-round contract negotiation with professional procurement.

  You're an AE at "CloudGuard" (cloud security platform, $80M ARR).
  Deal: "GlobalBank" — $350K ACV, 2,000 users, 3-year proposal.

  Round 1 — Initial redline response (Day 1):
  GlobalBank's procurement sends 18 redlines across commercial,
  legal, and technical terms. Key items:
  - Commercial: 25% discount (your max is 15% for 3-year), Net 90
    payment terms, quarterly billing
  - Legal: Unlimited liability for data breaches, 30-day termination
    for convenience, uncapped service credits
  - Technical: 99.99% uptime SLA, 30-minute P1 response, dedicated
    support engineer included
  Their deadline: "We need your response by end of this week."

  Round 2 — Counter-proposal negotiation (Day 5):
  After your Round 1 response, procurement comes back with:
  "We've accepted 8 of your 18 positions. On the remaining 10, we've
  moved slightly but need further concessions on pricing (now asking
  20%), liability (willing to cap at 36 months fees), and SLA (will
  accept 99.95% but need automatic credits)."
  New element: "Our CISO also requires a security questionnaire
  (285 questions) completed within 2 weeks."

  Round 3 — Final negotiation and close (Day 10):
  Procurement says: "We're down to 3 open items: final price, liability
  cap for data breach specifically, and the SLA credit structure. Our
  CFO will approve if we can resolve these by Friday."
  New tactic: "By the way, your competitor CrowdStrike offered to do
  a 30-day free pilot. Would you match?"

  Tasks:
  1. Write your complete response for each round. Round 1: categorize
     all 18 redlines and respond. Round 2: counter-propose on the
     remaining 10 items and address the security questionnaire timeline.
     Round 3: close the 3 final items and handle the CrowdStrike
     pilot request. Include exact language for each response.

  2. Write the "Negotiation Journal" — your internal notes tracking
     the negotiation across all 3 rounds. For each round: what you
     learned about their priorities, what tactics they used, what
     concessions you made and what you received in return, and your
     updated strategy for the next round. Show how a skilled negotiator
     adapts strategy based on new information.

  3. Write the post-negotiation "Lessons Learned" document — what
     went well, what you'd do differently, and the principles you'd
     apply to the next Fortune 500 negotiation. Include specific
     recommendations for CloudGuard's deal desk to handle similar
     negotiations more efficiently.

assertions:
  - type: llm_judge
    criteria: "Three rounds show progressive resolution — Round 1 categorizes and responds to 18 items, Round 2 narrows to 10 with strategic concessions, Round 3 closes final 3 with specific language throughout"
    weight: 0.35
    description: "Progressive 3-round resolution"
  - type: llm_judge
    criteria: "Negotiation journal shows adaptive strategy — each round reveals new information that changes approach, with clear concession tracking and tactical adjustments"
    weight: 0.35
    description: "Adaptive strategy journal"
  - type: llm_judge
    criteria: "Lessons learned provides systemic improvement — actionable recommendations for CloudGuard's deal desk based on specific negotiation experiences"
    weight: 0.30
    description: "Systemic improvement lessons"
