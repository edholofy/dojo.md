meta:
  id: renewal-negotiation-strategy
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Master renewal contract negotiations — defend price increases, handle competitive threats, manage down-sell attempts, and lock in multi-year renewals"
  tags: [sales, contracts, renewal, retention, price-increase, expansion, intermediate]

state: {}

trigger: |
  You're a Senior Customer Success Manager at "RetentionPro" (customer
  engagement platform, $75M ARR, 92% gross retention). You manage a
  portfolio of 35 accounts totaling $4.2M ARR. Renewal season is here,
  and 8 accounts are up for renewal this quarter.

  RetentionPro's renewal pricing policy:
  - Standard: 5% annual increase (CPI-linked)
  - Expansion: Additional users at current list price
  - Multi-year renewal: 3% discount for 2-year, 7% for 3-year
  - Down-sell: Minimum 12-month commitment at lower tier, requires VP
    approval

  4 challenging renewal situations:

  Renewal 1 — "TechGiant" ($450K ARR, 500 users):
  Situation: They want to reduce from 500 to 300 users (40% down-sell).
  Their stated reason: "We reorganized and don't need as many seats."
  Real reason: You know from product analytics that 200 users haven't
  logged in for 6 months. Usage has declined 35%.

  Renewal 2 — "RetailMax" ($320K ARR, using for 3 years):
  Situation: "We have a quote from your competitor for 30% less. Match
  the price or we switch." They're showing you a Braze proposal.
  Real assessment: Migration would take 4 months and cost them $150K
  in implementation. They're bluffing but the competitive pressure is
  real.

  Renewal 3 — "FinServ Corp" ($280K ARR, Enterprise tier):
  Situation: They want to renew but refuse the 5% increase. "We're
  freezing all vendor price increases this year — board mandate."
  Your assessment: They love the product (NPS 9), usage is up 20%, but
  the CFO has genuinely mandated a vendor cost freeze.

  Renewal 4 — "StartupScale" ($85K ARR, growing fast):
  Situation: They want to renew AND expand from 100 to 400 users. But
  they want the expansion at their existing per-user rate ($70/user/
  month), not the current list price ($85/user/month). "We were early
  adopters — we deserve grandfathered pricing."

  Tasks:
  1. For each of the 4 renewal situations, write: the analysis (what's
     really happening), the renewal strategy (defend, negotiate, or
     concede), the specific offer (pricing, terms, commitment), the
     talk track (what to say), and the walk-away point (when to accept
     churn). Calculate the financial impact of each option.

  2. Write the "Renewal Negotiation Playbook" — the complete guide
     for managing renewal negotiations. Include: when to start (120+
     days out), the renewal preparation checklist (usage data, value
     delivered, expansion opportunity, competitive intelligence), the
     value-first conversation framework (lead with outcomes, not price),
     the concession hierarchy (what to offer first vs last resort), and
     the multi-year conversion strategy (how to upgrade from annual to
     multi-year at renewal).

  3. Write the "Price Increase Defense Guide" — how to justify and
     defend annual price increases. Include: the CPI-linked argument
     (inflation), the value-delivered argument (ROI they've achieved),
     the product-investment argument (new features and improvements),
     the competitive-context argument (still below market rate), and
     the 5 objection responses for "we're not paying more."

assertions:
  - type: llm_judge
    criteria: "Four renewal strategies are financially grounded — each analyzes the real situation, proposes specific offers with pricing math, and defines walk-away points"
    weight: 0.35
    description: "Financially grounded renewal strategies"
  - type: llm_judge
    criteria: "Renewal playbook starts early and leads with value — 120+ day timeline, preparation checklist, value-first conversation, concession hierarchy, and multi-year conversion that protect revenue"
    weight: 0.35
    description: "Value-leading renewal playbook"
  - type: llm_judge
    criteria: "Price increase defense is multi-angle — CPI, value, product investment, and competitive context arguments with specific objection responses"
    weight: 0.30
    description: "Multi-angle price defense"
