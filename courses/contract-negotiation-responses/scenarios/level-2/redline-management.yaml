meta:
  id: redline-management
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Manage contract redlines efficiently — prioritize changes, accelerate legal review, and prevent redline ping-pong that kills deal momentum"
  tags: [sales, contracts, redlines, legal-review, efficiency, process, intermediate]

state: {}

trigger: |
  You're the Deal Desk Manager at "CloudSecure" (cybersecurity SaaS,
  $55M ARR). Legal review is your biggest deal-closer bottleneck.
  Average contract-to-signature time: 4.8 weeks. Target: 2 weeks.

  Current redline process problems:
  - Average redline rounds: 3.4 (some deals go 7+ rounds)
  - Legal review turnaround: 5-7 business days per round
  - 60% of redlines are repeat issues (same requests from different
    customers, but legal reviews each from scratch)
  - AEs don't triage redlines — they forward the entire document to
    legal without context
  - No pre-approved alternative language for common requests
  - Legal team of 2 reviews 15-20 contracts per month
  - 3 deals were lost last quarter because legal review took too long

  Sample redline document from "DataCorp" ($120K deal):
  25 total redlines:
  - 8 minor formatting/wording changes (no material impact)
  - 5 standard requests (Net 60, data deletion, governing law)
  - 4 moderate requests (liability cap, SLA upgrade, termination)
  - 3 significant requests (unlimited liability for data breach,
    broad indemnification, custom DPA requirements)
  - 3 unreasonable requests (right to terminate at will, penalty
    clause for SLA breach, most favored nation pricing)
  - 2 unclear requests (ambiguous language that could mean anything)

  Tasks:
  1. Triage the 25 DataCorp redlines into 5 categories with specific
     handling instructions: "Auto-accept" (minor, no review needed),
     "Pre-approved language" (standard requests with approved
     alternatives), "AE can negotiate" (within authority), "Legal
     review required" (material terms), and "Likely reject" (pushback
     with alternative). Show the prioritization logic.

  2. Write the "Redline Acceleration System" — the process that
     reduces contract-to-signature from 4.8 weeks to 2 weeks. Include:
     the pre-approved language library (30 most common redlines with
     approved alternative language), the AE triage checklist (how AEs
     categorize redlines before sending to legal), the legal review
     SLA (turnaround time targets by category), the parallel
     processing approach (which items can be resolved simultaneously),
     and the escalation triggers (when to bring in VP or GC).

  3. Write the "Common Redlines Reference Guide" — the 20 most
     frequent redlines CloudSecure receives, organized by category.
     For each: the customer's request (typical language), the risk
     level (low/medium/high), the pre-approved response (alternative
     language if acceptable), and the rejection language (if not
     acceptable, with explanation). This becomes the AE self-service
     tool that reduces legal involvement by 60%.

assertions:
  - type: llm_judge
    criteria: "25 redlines are well-triaged — 5 clear categories with specific handling instructions and prioritization logic that saves legal from reviewing minor changes"
    weight: 0.35
    description: "Well-triaged redline categorization"
  - type: llm_judge
    criteria: "Acceleration system is credible — pre-approved library, AE triage, legal SLAs, parallel processing, and escalation that could realistically reduce 4.8 weeks to 2 weeks"
    weight: 0.35
    description: "Credible acceleration system"
  - type: llm_judge
    criteria: "Common redlines reference empowers self-service — 20 frequent redlines with risk levels, approved responses, and rejection language that AEs can handle without legal"
    weight: 0.30
    description: "Self-service redlines reference"
