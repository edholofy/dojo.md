meta:
  id: procurement-tactics-defense
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Defend against professional procurement tactics — recognize and counter higher authority, cherry-picking, phantom competitors, and last-minute nibbling"
  tags: [sales, contracts, procurement, tactics, defense, counter-tactics, intermediate]

state: {}

trigger: |
  You're a Senior AE at "PlatformX" (enterprise collaboration, $90M
  ARR). You're in a $200K deal with "MegaCorp" — a Fortune 500 company
  with a notoriously aggressive procurement team. Your champion (VP of
  IT) has warned you: "Our procurement team has taken down better sales
  reps than you. Be prepared."

  Over the past 3 weeks, procurement has used 6 different tactics:

  Tactic 1 — Higher Authority:
  "We love your proposal, but my VP of Procurement needs to approve
  anything over $150K. She'll want a bigger discount."
  (Your champion says the procurement rep has full authority to $500K.)

  Tactic 2 — Cherry-Picking:
  "Your competitor quoted $80/user for their base product. Can you
  match that? We'll add your premium features later."
  (They're comparing your all-in-one platform to a competitor's
  stripped-down offering.)

  Tactic 3 — Phantom Competitor:
  "We have a very compelling offer from a company I can't name. They're
  offering 40% below your price with similar features."
  (No evidence this competitor exists.)

  Tactic 4 — Good Cop/Bad Cop:
  The procurement analyst says "We can make this work at 15% off." The
  procurement director jumps in: "15% isn't enough. We need 30% or
  we're going with the other vendor."

  Tactic 5 — Last-Minute Nibbling:
  After agreeing on all terms, procurement emails: "One more thing —
  we need you to include 2 days of on-site training (normally $8K)
  at no additional cost."

  Tactic 6 — Deadline Pressure:
  "Our budget approval expires Friday. If we don't have a signed
  contract by 5pm Friday, this deal dies and you'll have to start
  over in Q3."

  Tasks:
  1. For each of the 6 tactics, write: how to identify the tactic
     (what it looks like), the psychology behind it (why it works),
     the counter-strategy (how to respond), and the exact talk track
     (what to say). Include the signal that distinguishes a genuine
     concern from a tactic.

  2. Write the "Procurement Negotiation Playbook" — the comprehensive
     guide for selling into procurement-heavy organizations. Include:
     the 3 phases of procurement engagement (relationship building,
     negotiation, closing), how to maintain your champion relationship
     during procurement review (don't let procurement cut you off),
     the "give to get" concession framework, and the documentation
     strategy (getting everything in writing to prevent revisiting
     agreed terms).

  3. Write the "Procurement Intelligence Brief" template — a pre-
     negotiation research document. Include: how to research the
     procurement team (LinkedIn, Glassdoor, industry contacts), the
     company's procurement reputation (published vendor guidelines),
     the budget cycle timing, the approval process mapping (who
     signs what at what threshold), and the historical vendor terms
     (public contracts, SEC filings for public companies).

assertions:
  - type: llm_judge
    criteria: "Six tactic responses are specific and effective — each identifies the tactic, explains the psychology, provides a counter-strategy, and includes talk track that distinguishes genuine concerns from manipulation"
    weight: 0.35
    description: "Specific effective tactic responses"
  - type: llm_judge
    criteria: "Procurement playbook is strategically sound — 3-phase engagement, champion protection, concession framework, and documentation strategy for procurement-heavy organizations"
    weight: 0.35
    description: "Strategically sound procurement playbook"
  - type: llm_judge
    criteria: "Intelligence brief template is actionable — research sources, budget cycle mapping, approval process identification, and historical terms analysis that prepare AEs before negotiation"
    weight: 0.30
    description: "Actionable intelligence brief"
