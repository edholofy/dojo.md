meta:
  id: deal-desk-operations
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Build deal desk operations — design the approval workflows, pricing guidelines, and exception processes that accelerate contract negotiations"
  tags: [sales, contracts, deal-desk, approvals, process, operations, intermediate]

state: {}

trigger: |
  You're the newly hired Deal Desk Manager at "ScaleUp" (enterprise
  SaaS, $60M ARR, 80 AEs). Currently, every contract negotiation is
  ad hoc — AEs email the VP of Sales for pricing approvals, CC legal
  for redlines, and loop in finance for payment terms. Average
  approval time: 3.2 days. Some deals have taken 2 weeks.

  Current state problems:
  - No standardized approval workflow (every deal takes a different path)
  - No pricing guidelines (AEs don't know what they can approve)
  - No pre-approved contract language (legal reviews every redline fresh)
  - No exception tracking (nobody knows why discounts were granted)
  - Finance isn't involved until after AEs have agreed to payment terms
  - 35% of deals require VP-level intervention that could have been
    avoided with clear guidelines
  - 12% of deals have terms that violate company policy (discovered
    post-signature)

  ScaleUp deal profile:
  - Average ACV: $75K
  - Deal range: $15K (SMB) to $500K+ (Enterprise)
  - Monthly deal volume: 25-30 new contracts
  - Renewal volume: 15-20 per month
  - Current contract template: Standard MSA + SOW
  - Legal team: 1 in-house counsel + outside firm for complex deals

  Tasks:
  1. Design the "Deal Desk Approval Matrix" — the decision framework
     that specifies who can approve what. Include: pricing approvals
     by discount level (AE, manager, VP, CRO), contract term approvals
     by risk level (AE, deal desk, legal, VP), payment term approvals
     (AE, finance), and exception handling (when and how to request
     exceptions). The matrix should cover 90% of deal scenarios
     without requiring escalation.

  2. Write the "Deal Desk Operating Procedures" — the standard
     operating procedures for processing deals. Include: the intake
     process (how AEs submit deals for review), the triage workflow
     (how deal desk categorizes and routes deals), the parallel
     processing protocol (legal and finance review simultaneously,
     not sequentially), the SLA for each step (maximum turnaround
     times), and the communication standards (who updates whom, when).

  3. Write the "Deal Desk Metrics Dashboard" — the KPIs for measuring
     deal desk effectiveness. Include: cycle time (contract to
     signature), approval turnaround time, escalation rate (% of
     deals requiring VP+ involvement), policy compliance rate, discount
     tracking (average discount by segment, rep, quarter), and revenue
     impact (deals accelerated, deals saved from policy violations).
     Define targets for each metric.

assertions:
  - type: llm_judge
    criteria: "Approval matrix covers 90% of scenarios — clear discount, term, and payment approvals by level with exception handling that reduces unnecessary escalations"
    weight: 0.35
    description: "Comprehensive approval matrix"
  - type: llm_judge
    criteria: "Operating procedures accelerate deals — intake, triage, parallel processing, SLAs, and communication standards that reduce the 3.2-day average approval time"
    weight: 0.35
    description: "Deal-accelerating operating procedures"
  - type: llm_judge
    criteria: "Metrics dashboard measures what matters — cycle time, turnaround, escalation rate, compliance, and discount tracking with specific targets for each"
    weight: 0.30
    description: "Meaningful metrics dashboard"
