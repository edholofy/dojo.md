meta:
  id: competitive-leverage-negotiation
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Handle competitive leverage in negotiations — respond when prospects use competitor quotes to pressure pricing and terms"
  tags: [sales, contracts, competitive, leverage, pricing-pressure, intermediate]

state: {}

trigger: |
  You're an AE at "MarketPro" (marketing automation, $45M ARR).
  Prospects constantly use competitor quotes as negotiation leverage.
  Some are genuine, some are fabricated. You need to know the
  difference and how to respond.

  MarketPro pricing: $120/user/month (Enterprise tier)
  Main competitors and their pricing:
  - HubSpot Marketing Hub Enterprise: $3,600/month (flat, up to 10K contacts)
  - Marketo (Adobe): ~$100-140/user/month (enterprise, negotiable)
  - Pardot (Salesforce): ~$80-120/user/month (enterprise)
  - ActiveCampaign: $49-149/month (flat, lower tier product)

  5 competitive leverage scenarios:

  Scenario 1 — Genuine quote, direct competitor:
  "Marketo offered us $85/user/month for 200 users. 30% below your
  price. We prefer your product, but we can't justify paying 30% more."
  Evidence: They forwarded the Marketo proposal (redacted but real).

  Scenario 2 — Apples-to-oranges comparison:
  "ActiveCampaign is $149/month for unlimited users. You're $120 per
  user per month. Why should we pay 50x more?"
  Context: ActiveCampaign is a different product category (SMB email
  tool vs enterprise marketing automation).

  Scenario 3 — Fabricated or inflated quote:
  "We have a quote from a major competitor at 50% below your price.
  I can't show it to you, but trust me, it's real."
  Red flag: No evidence, no specific vendor named, round number discount.

  Scenario 4 — Renewal competitive threat:
  "We've been your customer for 2 years. Pardot just offered us a
  3-year deal at 40% below your renewal price. Switch costs are worth
  it at this discount."
  Context: They're in a renewal negotiation and using Pardot to
  pressure your price.

  Scenario 5 — Build vs buy argument:
  "Our engineering team says they can build what we need from your
  platform using open-source tools for $50K one-time cost. Why would
  we pay $300K over 3 years?"
  Context: Engineering team submitted a proposal but it doesn't
  include maintenance, support, or ongoing development.

  Tasks:
  1. For each scenario, write: how to identify if the competitive
     threat is genuine (verification techniques), the response strategy
     (match, differentiate, or hold), the specific talk track, and the
     "if they insist" fallback. Include the competitive intelligence
     to gather before responding.

  2. Write the "Competitive Leverage Response Framework" — the
     systematic approach for handling competitive pricing pressure.
     Include: the verification step (how to assess if the quote is
     real), the differentiation response (why comparing on price alone
     is incomplete), the TCO argument (total cost of ownership
     comparison), the switching cost calculation (what it really costs
     to switch vendors), and the "match and expand" strategy (match
     price but expand scope/commitment).

  3. Write the "Competitive Price Intelligence Brief" — what AEs need
     to know about competitor pricing to negotiate effectively.
     Include: each major competitor's typical pricing range, their
     common discount patterns, what triggers their aggressive pricing
     (quarter-end, new product launch, displacement deal), and the
     honest assessment (where MarketPro is genuinely more expensive
     and the justification for it).

assertions:
  - type: llm_judge
    criteria: "Five scenario responses distinguish genuine from fabricated threats — verification techniques, appropriate strategies, and specific talk tracks that don't cave to pressure or antagonize prospects"
    weight: 0.35
    description: "Genuine-vs-fabricated threat responses"
  - type: llm_judge
    criteria: "Framework provides systematic competitive defense — verification, differentiation, TCO, switching costs, and match-and-expand strategies that are repeatable across deals"
    weight: 0.35
    description: "Systematic competitive defense framework"
  - type: llm_judge
    criteria: "Price intelligence brief is honest — competitor pricing ranges, discount patterns, and aggressive pricing triggers with honest assessment of where MarketPro is genuinely expensive"
    weight: 0.30
    description: "Honest price intelligence brief"
