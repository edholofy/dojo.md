meta:
  id: batna-preparation
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Build your BATNA and ZOPA — prepare for negotiations by identifying your best alternatives, establishing walk-away points, and mapping the zone of possible agreement"
  tags: [sales, contracts, BATNA, ZOPA, preparation, frameworks, intermediate]

state: {}

trigger: |
  You're a Sales Manager at "ConnectFlow" (workflow automation, $35M
  ARR) coaching 3 AEs who are about to enter contract negotiations.
  None of them have prepared their BATNA or ZOPA. You need to teach
  them the frameworks and help them prepare.

  Deal 1 — Sarah's deal with "LogiCorp" ($180K ACV):
  - LogiCorp needs workflow automation by Q2 (hard deadline — regulatory)
  - They're evaluating ConnectFlow and Monday.com
  - Sarah's quota: $800K this quarter, currently at $620K
  - ConnectFlow's cost to serve this deal: $40K/year
  - LogiCorp's procurement is tough — typical discount: 15-25%
  - Sarah's manager says: "We need this deal to hit the quarter"

  Deal 2 — Jake's deal with "HealthPlus" ($95K ACV):
  - HealthPlus is on a competitor (Zapier) paying $45K/year
  - They want to upgrade to ConnectFlow for HIPAA compliance
  - Jake has 4 other deals in pipeline this quarter ($350K total)
  - ConnectFlow's HIPAA-compliant tier is $95K minimum
  - HealthPlus says: "We'll pay $65K max. We can stay on Zapier."
  - Jake's discount authority: 10%

  Deal 3 — Maria's renewal with "TechStart" ($140K ARR, current customer):
  - TechStart has been a customer for 2 years, loves the product
  - They want 20% price reduction at renewal (to $112K)
  - Maria knows TechStart's usage has grown 40% YoY
  - Switching cost for TechStart: estimated $200K (data migration +
    retraining + 3 months productivity loss)
  - Maria's renewal target: flat or growth, any reduction needs VP
    approval
  - TechStart's CFO is driving the cost reduction initiative

  Tasks:
  1. For each deal, identify: the AE's BATNA (what happens if this
     deal doesn't close?), the prospect's BATNA (what happens if they
     don't buy from ConnectFlow?), the ZOPA (the range of acceptable
     outcomes for both sides), the reservation point (minimum
     acceptable deal), and the aspiration point (ideal outcome). Show
     how understanding BATNA changes the negotiation strategy.

  2. Write the "BATNA & ZOPA Preparation Template" — a worksheet AEs
     complete before every negotiation. Include: Step 1 (Identify your
     BATNA — what's your alternative if this deal fails?), Step 2
     (Assess their BATNA — what happens if they don't buy from you?),
     Step 3 (Define your reservation point — minimum acceptable terms),
     Step 4 (Map the ZOPA — where do acceptable ranges overlap?),
     Step 5 (Set your aspiration point — your ideal outcome), and
     Step 6 (Plan your opening position — where to anchor).

  3. Write the "BATNA Coaching Guide" for Sales Managers — how to coach
     AEs on BATNA preparation. Include: the common BATNA mistakes (AEs
     who think they have no BATNA, AEs who overestimate their BATNA,
     AEs who reveal their BATNA to the prospect), the coaching
     questions to ask before every negotiation, the role-play scenarios
     for practice, and how to strengthen a weak BATNA before entering
     negotiation.

assertions:
  - type: llm_judge
    criteria: "Three deal analyses reveal negotiation power — each identifies both BATNAs, maps the ZOPA, and shows how BATNA understanding changes strategy, with specific reservation and aspiration points"
    weight: 0.35
    description: "Power-revealing deal analyses"
  - type: llm_judge
    criteria: "Preparation template is practical — 6-step worksheet that any AE can complete before a negotiation to understand their position and plan their approach"
    weight: 0.30
    description: "Practical preparation template"
  - type: llm_judge
    criteria: "Coaching guide helps managers develop AEs — common mistakes, coaching questions, role-plays, and BATNA strengthening that build systematic negotiation preparation skills"
    weight: 0.35
    description: "Manager-ready coaching guide"
