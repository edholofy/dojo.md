meta:
  id: negotiation-psychology-basics
  level: 2
  course: contract-negotiation-responses
  type: output
  description: "Apply negotiation psychology — use anchoring, framing, reciprocity, and scarcity ethically to improve negotiation outcomes"
  tags: [sales, contracts, psychology, anchoring, framing, reciprocity, intermediate]

state: {}

trigger: |
  You're a negotiation skills trainer at "SalesCorp" (enterprise SaaS,
  $100M ARR, 150 AEs). You're designing the "Negotiation Psychology"
  training module. You need to teach 6 psychological principles that
  influence contract negotiations — and the ethical boundaries for
  using them.

  The 6 principles:

  1. Anchoring: The first number mentioned becomes the reference point.
     In SaaS negotiations, whoever proposes pricing first sets the anchor.

  2. Framing: "95% customer satisfaction" vs "5% dissatisfaction rate"
     — same data, different perception. How you frame contract terms
     changes how they're received.

  3. Reciprocity: When you make a concession, the other party feels
     compelled to reciprocate. Strategic concession ordering matters.

  4. Loss Aversion: People fear losses 2-2.5x more than they value
     equivalent gains. "You'll lose $500K without this" is more
     powerful than "You'll gain $500K with this."

  5. Scarcity: "This pricing expires end of quarter" creates urgency.
     Limited availability increases perceived value.

  6. Commitment Consistency: Once someone agrees to a small commitment,
     they're more likely to agree to larger related commitments.

  For each principle, you have a real negotiation example from SalesCorp:
  - Anchoring: AE led with list price of $150/user. Prospect anchored
    to a competitor at $80/user. All subsequent discussion was relative
    to $80, not $150.
  - Framing: AE reframed a $200K annual cost as "$16.67K/month" and
    "$0.55 per employee per day." Same price, felt smaller.
  - Reciprocity: AE gave a free 2-day implementation ($6K value)
    upfront. Prospect reciprocated by agreeing to a case study and
    a 2-year commitment.
  - Loss Aversion: AE showed the prospect they were losing $180K/year
    in productivity without the tool. More effective than showing they'd
    gain $180K.
  - Scarcity: AE said "I can hold this pricing until Friday but my
    VP hasn't approved it for next quarter." Prospect signed Thursday.
  - Commitment Consistency: AE got verbal agreement on value, then
    terms, then pricing sequentially. By the time they reached pricing,
    the prospect had made 5 small commitments.

  Tasks:
  1. For each of the 6 principles, write: the scientific explanation
     (why it works psychologically), the SaaS negotiation application
     (specific techniques), a "do this" example (ethical use), a
     "don't do this" example (manipulation that crosses the line), and
     the ethical boundary (where persuasion becomes manipulation).

  2. Write the "Psychological Negotiation Playbook" — how to apply
     all 6 principles in a single negotiation. Map the principles to
     the negotiation timeline: pre-negotiation preparation (anchoring
     strategy, framing plan), early negotiation (reciprocity, commitment
     consistency), mid-negotiation (loss aversion, framing), and close
     (scarcity, commitment consistency). Show how they work together.

  3. Write the "Ethics Self-Check" — 10 questions AEs should ask
     themselves before using any psychological technique. Include:
     "Am I being truthful about the scarcity?", "Would I be
     comfortable if the prospect knew my strategy?", "Am I helping
     them make a better decision or just a faster one?" Draw the
     line between influence and manipulation.

assertions:
  - type: llm_judge
    criteria: "Six principles are scientifically grounded with ethical boundaries — each has psychological explanation, SaaS application, ethical/unethical examples, and clear boundary lines"
    weight: 0.35
    description: "Grounded principles with boundaries"
  - type: llm_judge
    criteria: "Playbook maps principles to negotiation timeline — shows how all 6 principles work together across preparation, early, mid, and close phases of a real negotiation"
    weight: 0.35
    description: "Timeline-mapped negotiation playbook"
  - type: llm_judge
    criteria: "Ethics self-check is meaningful — 10 questions that genuinely distinguish ethical influence from manipulation, not just platitudes"
    weight: 0.30
    description: "Meaningful ethics self-check"
