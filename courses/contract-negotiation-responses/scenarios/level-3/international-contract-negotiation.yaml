meta:
  id: international-contract-negotiation
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Navigate international contract negotiations — handle multi-jurisdiction deals with GDPR, data sovereignty, local entity requirements, and cross-cultural negotiation styles"
  tags: [sales, contracts, international, GDPR, cross-border, jurisdiction, advanced]

state: {}

trigger: |
  You're the Director of International Sales at "GlobalSaaS" (enterprise
  SaaS, $150M ARR, selling in 25 countries). You have 4 international
  deals in contract negotiation, each with unique jurisdiction
  challenges.

  Deal 1 — Germany ($300K deal, "DeutschBank AG"):
  Requirements: Data must stay in EU (Frankfurt data center), German
  DPA addendum required, liability provisions must comply with German
  Civil Code (BGB) which invalidates certain liability exclusions,
  contract must be in both English and German (German version
  prevails in disputes), payment in EUR.

  Deal 2 — Japan ($250K deal, "NipponTech"):
  Requirements: Local entity or partner required for invoicing,
  contract aligned with Japanese Act on the Protection of Personal
  Information (APPI), culturally expects 3-4 rounds of negotiation
  (rushing is disrespectful), payment Net 60 standard in Japan,
  strong preference for long-term relationships over short-term terms.

  Deal 3 — Brazil ($180K deal, "BrazilCorp"):
  Requirements: Must comply with LGPD (Brazil's data protection law),
  contract in Portuguese required for enforcement, local entity may
  be needed for tax compliance, payment in BRL with FX risk, Brazilian
  courts have history of invalidating foreign governing law clauses.

  Deal 4 — UAE ($400K deal, "DubaiEnterprises"):
  Requirements: Data residency in UAE required by regulation, DIFC
  (Dubai International Financial Centre) governing law preferred,
  Sharia-compliant contract provisions may be required, payment in
  AED, import/export licensing may apply to software.

  Tasks:
  1. For each deal, write: the jurisdiction-specific contract
     requirements (what's legally mandatory), the recommended contract
     structure (local paper vs global MSA with local addendum), the
     key terms that must be adapted (data residency, governing law,
     liability), and the cultural considerations that affect
     negotiation approach. Flag the items requiring local legal counsel.

  2. Write the "International Contract Playbook" — the reusable
     framework for negotiating contracts across jurisdictions. Include:
     the "global MSA + local addendum" architecture (how to maintain
     consistency while meeting local requirements), the data protection
     requirement matrix by region (EU, APAC, LATAM, Middle East), the
     governing law selection guide (when to use your law vs theirs vs
     neutral), and the currency and payment terms by region.

  3. Write the "Cross-Cultural Negotiation Guide" — how negotiation
     style differs across 4 cultures. Include: the pace of negotiation
     (US fast vs Japan slow), the directness spectrum (Germany direct
     vs Japan indirect), the relationship importance (Middle East and
     Brazil high vs US and Germany task-focused), the decision-making
     style (US individual vs Japan consensus), and specific do's and
     don'ts for each culture in contract negotiations.

assertions:
  - type: llm_judge
    criteria: "Four deal responses address real jurisdiction requirements — mandatory legal requirements, contract structures, adapted terms, and cultural considerations specific to each country"
    weight: 0.35
    description: "Real jurisdiction requirements"
  - type: llm_judge
    criteria: "International playbook provides reusable architecture — global+local structure, data protection matrix, governing law guide, and payment terms that work across jurisdictions"
    weight: 0.35
    description: "Reusable international architecture"
  - type: llm_judge
    criteria: "Cross-cultural guide reflects real differences — pace, directness, relationship focus, and decision-making across 4 cultures with specific do's and don'ts for contract negotiations"
    weight: 0.30
    description: "Real cross-cultural differences"
