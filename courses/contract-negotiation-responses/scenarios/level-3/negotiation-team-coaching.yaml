meta:
  id: negotiation-team-coaching
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Coach and train sales teams on negotiation skills — build negotiation competency programs, role-play frameworks, and performance improvement plans for underperforming negotiators"
  tags: [sales, contracts, coaching, training, team-development, skills, advanced]

state: {}

trigger: |
  You're the VP of Sales Enablement at "SalesForce Pro" ($200M ARR,
  180 AEs). Your CEO has flagged that average discount rates have
  increased from 12% to 18% over the past year, costing ~$10M in
  lost revenue. You need to build a negotiation coaching program.

  Current state assessment:
  - 180 AEs across 4 segments (Enterprise, Mid-Market, SMB, Strategic)
  - Average discount: 18% (was 12% a year ago)
  - Top performers (20%): 10% avg discount, 35% win rate
  - Middle performers (60%): 18% avg discount, 27% win rate
  - Bottom performers (20%): 28% avg discount, 19% win rate
  - Only 15% of AEs can articulate the company's value proposition
    without resorting to price reductions
  - Legal review cycle: avg 3.2 rounds (top performers: 1.8 rounds)
  - 40% of AEs admit to giving discounts before being asked
  - No formal negotiation training exists today

  Specific coaching challenges:
  AE Profile 1 — "The Discounter" (Sarah, Enterprise AE, 3 years):
  Consistently gives 25-30% discounts. Wins deals but at low margins.
  Closes quickly. Says "customers always ask for discounts." Believes
  the product is overpriced. Her pipeline is large but her revenue per
  deal is 40% below team average.

  AE Profile 2 — "The Stalker" (Mike, Mid-Market AE, 1 year):
  Refuses to negotiate at all. Loses deals because he won't budge on
  any terms. Win rate is 15% (team avg 27%). Says "our pricing is
  fair, take it or leave it." Has strong product knowledge but poor
  emotional intelligence in negotiations.

  AE Profile 3 — "The Avoider" (Lisa, SMB AE, 2 years):
  Avoids confrontation. When customers push back, she escalates to
  her manager instead of negotiating. Her manager handles 70% of her
  negotiations. She's afraid of losing deals and lacks confidence.

  Tasks:
  1. Write the "Negotiation Competency Framework" — the skills and
     behaviors that define effective negotiation at each level
     (beginner, intermediate, advanced, expert). Include: the 8 core
     negotiation competencies (preparation, anchoring, value articulation,
     concession management, objection handling, creative problem-solving,
     emotional intelligence, closing), the behavioral indicators for
     each competency at each level, and the assessment methodology
     (how to measure negotiation competency).

  2. Write the "Individual Coaching Plans" for Sarah, Mike, and Lisa.
     For each: the diagnosis (what's driving their behavior), the
     specific coaching interventions (role-plays, ride-alongs, training),
     the measurable goals (discount rate, win rate, deal size targets),
     the timeline (30/60/90 day milestones), and the conversation
     scripts (how the manager should address the issue).

  3. Write the "Negotiation Training Program" — a 12-week curriculum
     for all 180 AEs. Include: the weekly topics and exercises, the
     role-play scenarios (3 scenarios per level), the certification
     criteria (what AEs must demonstrate to pass), the ongoing
     reinforcement plan (how to prevent skills from fading), and the
     measurement framework (how to track program ROI — target: return
     to 12% average discount within 6 months).

assertions:
  - type: llm_judge
    criteria: "Competency framework defines 8 negotiation skills across 4 levels — with behavioral indicators and assessment methodology that could be used to evaluate real sales teams"
    weight: 0.35
    description: "Multi-level competency framework"
  - type: llm_judge
    criteria: "Three coaching plans address root causes — Sarah's price sensitivity, Mike's rigidity, and Lisa's avoidance each get specific interventions, goals, and conversation scripts"
    weight: 0.35
    description: "Root-cause coaching plans"
  - type: llm_judge
    criteria: "12-week training program is actionable — weekly curriculum, role-plays, certification, and ROI measurement that could realistically return discount rates to 12%"
    weight: 0.30
    description: "Actionable training program"
