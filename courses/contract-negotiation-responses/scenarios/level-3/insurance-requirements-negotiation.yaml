meta:
  id: insurance-requirements-negotiation
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Negotiate insurance and compliance requirements in enterprise contracts — handle cyber liability, professional liability, and compliance certifications demanded by enterprise procurement"
  tags: [sales, contracts, insurance, compliance, risk, enterprise, advanced]

state: {}

trigger: |
  You're the Head of Deal Operations at "SecureStack" ($110M ARR,
  cloud security platform). Enterprise customers increasingly demand
  extensive insurance coverage and compliance certifications as contract
  requirements. You need to create a strategy for handling these demands.

  Current situation:
  Your existing insurance coverage:
  - Cyber liability: $5M per occurrence, $10M aggregate
  - Professional liability (E&O): $5M per occurrence
  - General liability: $2M per occurrence
  - Technology E&O: $5M per occurrence
  - Workers comp: statutory limits
  - Annual insurance cost: $380K

  3 deals are stuck on insurance/compliance requirements:

  Deal 1 — "FinanceGiant" ($450K ACV, financial services):
  Requirements: $25M cyber liability, $15M professional liability,
  $10M general liability. SOC 2 Type II (you have this), PCI DSS
  Level 1 (you have this), but they also want ISO 27001 (you're
  6 months from certification). They want to be named as additional
  insured on your policy. They require certificate of insurance
  before contract signing.
  Challenge: Their insurance requirements are 3-5x your current
  coverage. Getting additional coverage would cost ~$200K/year. They
  represent 0.4% of ARR but want insurance that covers 25% of ARR.

  Deal 2 — "HealthCo" ($280K ACV, healthcare):
  Requirements: $10M cyber liability, $10M professional liability,
  HIPAA BAA (you have this), but they also want HITRUST CSF
  certification (you don't have, 12+ months to obtain, $300K+ cost).
  They want the right to audit your security practices annually.
  They require breach notification within 24 hours (your standard
  is 72 hours per HIPAA).
  Challenge: HITRUST certification would be valuable for the healthcare
  vertical broadly but is expensive. Breach notification within 24
  hours is operationally challenging.

  Deal 3 — "RetailMega" ($180K ACV, retail):
  Requirements: $5M cyber liability (you meet this), PCI DSS (you
  have this), but they want you to indemnify them for any data breach
  regardless of fault. They want the right to perform penetration
  testing on your production environment. They require annual SOC 2
  reports shared 30 days after issuance.
  Challenge: Unlimited breach indemnification is unreasonable. Pen
  testing of production environment is a security risk. SOC 2 sharing
  timeline is tight.

  Tasks:
  1. For each deal, write: the analysis of which requirements are
     reasonable vs excessive, the counter-proposals for each
     unreasonable requirement (with specific language), the
     compliance gap remediation plan (how to address gaps like ISO
     27001 and HITRUST), and the cost-benefit analysis (is it worth
     investing in additional coverage/certifications for this deal
     and the broader market).

  2. Write the "Insurance and Compliance Negotiation Playbook" —
     the reusable framework for handling insurance/compliance demands.
     Include: the insurance coverage benchmarks by industry and deal
     size, the compliance certification priority matrix (which certs
     to get and in what order based on market value), the standard
     responses to excessive insurance demands, the additional insured
     vs certificate of insurance guide, and the compliance roadmap
     template (how to commit to future certifications without blocking
     current deals).

  3. Write the "Compliance Requirements Communication Templates" —
     the responses to send when you can or can't meet compliance
     requirements. Include: the "we meet this" confirmation template,
     the "we're working toward this" gap acknowledgment template
     (with timeline commitment), the "this is unreasonable" pushback
     template (with alternative proposals), and the "let's discuss
     the spirit of the requirement" reframing template (when the
     customer's stated requirement doesn't match their actual need).

assertions:
  - type: llm_judge
    criteria: "Three deal analyses distinguish reasonable from excessive requirements — with counter-proposals, gap remediation plans, and cost-benefit analysis for insurance and compliance investments"
    weight: 0.35
    description: "Reasonable vs excessive analysis"
  - type: llm_judge
    criteria: "Insurance playbook provides benchmarks and frameworks — coverage benchmarks by industry, certification priority matrix, and standard responses that scale across the sales organization"
    weight: 0.35
    description: "Benchmarked insurance playbook"
  - type: llm_judge
    criteria: "Communication templates are ready to use — confirmation, gap acknowledgment, pushback, and reframing templates that AEs can adapt for real compliance negotiations"
    weight: 0.30
    description: "Ready-to-use compliance templates"
