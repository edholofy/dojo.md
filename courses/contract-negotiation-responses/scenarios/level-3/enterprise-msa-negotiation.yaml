meta:
  id: enterprise-msa-negotiation
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Negotiate enterprise Master Service Agreements — handle complex MSA negotiations with Fortune 500 legal teams that have 40+ page contracts"
  tags: [sales, contracts, MSA, enterprise, legal, complex-terms, advanced]

state: {}

trigger: |
  You're a Strategic Account Executive at "EnterpriseCloud" ($200M ARR,
  enterprise cloud platform). You've landed a $1.2M deal with
  "MegaRetail" (Fortune 100 retailer, 150,000 employees). Instead of
  using your standard contract, MegaRetail insists on using THEIR MSA.

  Their MSA is 47 pages long. Your legal team has identified 28 issues
  ranging from minor to deal-breaking. Key provisions of concern:

  Critical (must change):
  1. Liability: Unlimited liability for all claims (no cap whatsoever)
  2. Indemnification: EnterpriseCloud must indemnify for "all losses
     arising from or related to the Services" (essentially unlimited)
  3. IP: MegaRetail claims ownership of all "work product" including
     custom configurations and integrations built on your platform
  4. Audit: Unlimited audit rights with 48-hour notice, including
     access to source code and financial records

  Significant (should change):
  5. SLA penalties: Financial penalties (not credits) for SLA breaches,
     uncapped at 100% of monthly fees
  6. Termination: MegaRetail can terminate for convenience with 30
     days notice; EnterpriseCloud cannot
  7. Insurance: $25M cyber insurance, $10M professional liability,
     $10M general liability required
  8. Assignment: MegaRetail can assign freely; EnterpriseCloud needs
     written consent

  Desirable (try to change):
  9-28: Various terms including governing law (their state), payment
  terms (Net 90), force majeure exclusions, data return timelines,
  non-compete provisions, and restrictive marketing restrictions.

  Tasks:
  1. Write the "MSA Negotiation Strategy" for MegaRetail. Include:
     the prioritized issues list (critical, significant, desirable),
     the recommended position for each critical and significant issue
     (accept, counter, reject), the specific counter-proposal language
     for issues 1-8, and the "package deal" strategy (bundling trades
     across multiple issues).

  2. Write the "Customer MSA Response Guide" — the general framework
     for when enterprise customers insist on their paper instead of
     yours. Include: the advantages and disadvantages of customer
     paper, the review methodology (how to efficiently analyze a 40+
     page MSA), the prioritization framework (which issues to fight
     for vs concede), the multi-round negotiation strategy (which
     issues to address in which round), and the "walk-away" criteria
     (when the customer MSA is too one-sided to accept).

  3. Write the "MSA Issue Comparison Template" — a side-by-side
     document comparing MegaRetail's terms vs EnterpriseCloud's
     standard terms for the 8 critical/significant issues. For each:
     their language, your standard language, the recommended compromise
     language, and the business risk assessment (low/medium/high/
     critical).

assertions:
  - type: llm_judge
    criteria: "MSA strategy handles 8 critical issues with specific counter-proposals — prioritized, with package deal strategy that addresses unlimited liability, IP ownership, audit rights realistically"
    weight: 0.35
    description: "Critical-issue MSA strategy"
  - type: llm_judge
    criteria: "Customer MSA guide provides reusable framework — review methodology, prioritization, multi-round strategy, and walk-away criteria for when customers insist on their paper"
    weight: 0.30
    description: "Reusable customer MSA framework"
  - type: llm_judge
    criteria: "Comparison template is precise — side-by-side language for 8 issues with compromise proposals and risk assessments that legal teams could use directly"
    weight: 0.35
    description: "Precise comparison template"
