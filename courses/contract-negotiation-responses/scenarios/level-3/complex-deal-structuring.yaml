meta:
  id: complex-deal-structuring
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Structure complex enterprise deals — design creative deal structures that overcome budget constraints, multi-division purchases, and phased implementations"
  tags: [sales, contracts, deal-structuring, enterprise, creative, phased, advanced]

state: {}

trigger: |
  You're a Deal Strategist at "PlatformOne" (enterprise software,
  $180M ARR). You have 3 complex deals that can't close with standard
  contract structures. Each needs creative deal design.

  Deal 1 — "CongloCorp" (multi-division, $800K total value):
  Challenge: 4 divisions want PlatformOne but each has separate
  budgets, different fiscal years, and different procurement teams.
  Division A ($250K) can sign now. Division B ($200K) budget available
  Q3. Division C ($200K) budget in January. Division D ($150K)
  "interested but not committed."
  Constraints: They want enterprise pricing (quantity discount across
  all divisions) but can't sign one contract because budgets are
  separate.

  Deal 2 — "StartupRocket" (budget-constrained, $120K value):
  Challenge: Series B startup that needs enterprise features but only
  has $40K in this year's budget. They'll have $120K budget next year
  after their next funding round (highly likely — term sheet signed).
  Constraints: They can't legally commit to spend they don't have
  budget for. But if they start on a basic tier, they'll build
  dependencies that make it expensive to switch.

  Deal 3 — "GovAgency" (government, $500K value):
  Challenge: Federal agency with a use-or-lose $500K budget that
  expires September 30. But their implementation timeline requires
  18 months. They can't deploy the full platform before the budget
  expires, and they can't get new funding until the next fiscal year.
  Constraints: FAR compliance, must show value for money, can't pay
  for services not yet delivered, appropriations law restrictions.

  Tasks:
  1. For each deal, design the creative deal structure. Include: the
     contract architecture (what agreements, what terms), the payment
     structure (how money flows when), the risk mitigation (what
     happens if assumptions fail — e.g., StartupRocket doesn't get
     funded), and the approval strategy (how to get each stakeholder
     to agree).

  2. Write the "Creative Deal Structures Catalog" — 8 creative deal
     structures AEs can propose when standard terms don't work.
     Include: the ramp deal (start small, grow over time), the
     enterprise license agreement (covers multiple divisions), the
     land-and-expand (seed at low price, expand at full price), the
     success-based pricing (pay based on outcomes), the prepaid credit
     model (buy credits upfront, consume over time), the consortium
     deal (multiple entities, one agreement), the phased deployment
     (align payment to implementation milestones), and the bridge
     agreement (temporary terms while long-term deal is negotiated).

  3. Write the "Deal Structure Decision Tree" — a flowchart that
     helps AEs identify which creative structure fits which situation.
     Include the decision criteria: budget timing (now vs later),
     buyer type (enterprise, SMB, government), multi-stakeholder
     complexity, risk tolerance, and implementation timeline. Map
     each path to the recommended structure.

assertions:
  - type: llm_judge
    criteria: "Three creative structures solve real constraints — multi-division, budget-constrained, and government deals each have feasible architecture, payment flows, and risk mitigation"
    weight: 0.35
    description: "Constraint-solving creative structures"
  - type: llm_judge
    criteria: "Eight deal structures provide real options — each is clearly described with when to use it, providing a comprehensive toolkit for non-standard deal scenarios"
    weight: 0.35
    description: "Comprehensive deal structure toolkit"
  - type: llm_judge
    criteria: "Decision tree maps situations to structures — clear criteria and paths that help AEs quickly identify which creative structure fits their specific deal scenario"
    weight: 0.30
    description: "Situation-mapping decision tree"
