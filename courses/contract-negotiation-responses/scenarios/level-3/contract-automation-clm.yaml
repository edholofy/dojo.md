meta:
  id: contract-automation-clm
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Design contract lifecycle management processes — build CLM workflows, pre-approved clause libraries, and automated contract generation to accelerate deal velocity"
  tags: [sales, contracts, CLM, automation, process, velocity, advanced]

state: {}

trigger: |
  You're the Director of Revenue Operations at "DealFlow" ($160M ARR,
  enterprise SaaS). Your average contract-to-signature time is 28
  business days, and your CEO wants it under 14 days. You've been
  tasked with building a contract lifecycle management (CLM) strategy.

  Current state:
  - 1,200 contracts processed per year
  - Average contract-to-signature: 28 business days
  - Legal team: 4 attorneys (1 per 300 contracts/year)
  - 65% of contracts use standard template (no redlines)
  - 25% require minor modifications (1-5 redlines)
  - 10% require major negotiation (6+ redlines, custom terms)
  - Current process: AE emails legal → legal reviews in 3-5 days →
    sends to customer → customer redlines → legal reviews again →
    2.8 average rounds → signature
  - Top bottleneck: Legal review queue (avg 3.2 day wait time)
  - Second bottleneck: Customer redline turnaround (avg 5.1 days)

  Pain points from stakeholder interviews:
  - Sales: "Legal is a bottleneck. We lose deals waiting for contracts."
  - Legal: "AEs agree to terms they shouldn't. We're cleaning up messes."
  - Finance: "Non-standard payment terms create AR headaches."
  - Customer Success: "We inherit contracts with SLAs we can't meet."

  Specific scenarios to address:
  1. Standard deals (65%): Should be fully self-service for AEs
  2. Minor modification deals (25%): Need pre-approved alternatives
  3. Complex deals (10%): Need streamlined legal engagement

  Tasks:
  1. Write the "CLM Strategy Document" — the end-to-end contract
     lifecycle management plan. Include: the contract workflow by
     deal type (standard, minor mod, complex), the pre-approved
     clause library design (what clauses, what alternatives, who
     approves), the approval matrix (which deal terms require which
     level of approval), the technology requirements (what a CLM
     tool needs to do), and the implementation roadmap (phases,
     timeline, success metrics).

  2. Write the "Pre-Approved Clause Library" — the specific clause
     alternatives that AEs can select without legal review. Include
     10 common negotiation points: liability cap (3 alternatives),
     indemnification scope (3 alternatives), termination provisions
     (3 alternatives), SLA commitments (3 alternatives), payment
     terms (3 alternatives), data protection (3 alternatives),
     governing law (3 alternatives), limitation of liability
     exclusions (3 alternatives), insurance requirements (3
     alternatives), and assignment rights (3 alternatives). For each
     alternative: the language, the risk level (green/yellow/red),
     the approval authority, and the business impact.

  3. Write the "Contract Velocity Improvement Plan" — the specific
     actions to reduce contract-to-signature from 28 to 14 business
     days. Include: the quick wins (achievable in 30 days), the
     medium-term improvements (30-90 days), the long-term
     transformation (90-180 days), the change management plan (how
     to get sales, legal, and finance aligned), and the measurement
     framework (what metrics to track weekly).

assertions:
  - type: llm_judge
    criteria: "CLM strategy covers end-to-end lifecycle — workflows by deal type, clause library design, approval matrix, technology requirements, and phased implementation with success metrics"
    weight: 0.35
    description: "End-to-end CLM strategy"
  - type: llm_judge
    criteria: "Clause library provides real alternatives — 10 negotiation points with 3 alternatives each, including risk levels and approval authorities that legal teams could adopt"
    weight: 0.35
    description: "Practical clause library"
  - type: llm_judge
    criteria: "Velocity plan is achievable — quick wins, medium-term, and long-term actions with change management and measurement that could realistically halve contract cycle time"
    weight: 0.30
    description: "Achievable velocity plan"
