meta:
  id: government-contract-negotiation
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Navigate government and public sector contract negotiation — handle FAR clauses, appropriations law, CLIN structures, and compliance requirements unique to federal and state contracts"
  tags: [sales, contracts, government, federal, FAR, compliance, advanced]

state: {}

trigger: |
  You're the Director of Public Sector Sales at "GovCloud" (FedRAMP
  authorized SaaS platform, $80M ARR). You're negotiating 3 government
  contracts simultaneously, each with unique compliance challenges.

  Contract 1 — Federal Agency (Department of Commerce, $600K):
  Vehicle: GSA Schedule (MAS). They've issued a RFQ requiring: FAR
  52.212-4 (Contract Terms for Commercial Products), DFARS compliance
  for CUI (Controlled Unclassified Information), Section 508
  accessibility compliance, FedRAMP Moderate authorization (you have
  this). Their modifications include: unlimited government audit rights,
  data must remain in CONUS, 30-day termination for convenience (FAR
  52.212-4(l)), government retains unlimited rights in all data.
  Challenge: Their "unlimited rights in data" clause could mean they
  claim rights to your IP. Their termination for convenience clause
  provides no transition period. They want Net 30 but government
  payment averages 45 days.

  Contract 2 — State Government (California, $280K):
  Vehicle: NASPO ValuePoint contract. Requirements: CCPA compliance
  (state-specific), California accessibility standards (beyond Section
  508), data residency within US, state-specific insurance requirements
  ($5M cyber liability). Key issues: They want to use California
  governing law (vendor-unfavorable precedents), require source code
  escrow, want 99.99% uptime SLA (your standard is 99.9%), penalty
  clause of 2% of monthly fees per hour of downtime beyond SLA.
  Challenge: Their SLA penalty structure could exceed the contract
  value in a major outage. Source code escrow has IP and security
  implications.

  Contract 3 — Municipal Government (City of Austin, $85K):
  Vehicle: Cooperative purchasing (TIPS/TAPS). Requirements: Texas
  Public Information Act compliance (open records), data portability
  within 30 days of termination, local preference scoring (you're not
  local), ADA compliance. Key issues: Contract value is small but could
  lead to statewide rollout ($2M+). They want perpetual license to
  any customizations, 60-day payment terms, and require on-site
  training (3 trips).
  Challenge: The deal economics don't work at $85K with their
  requirements, but the strategic value is high.

  Tasks:
  1. For each contract, write: the compliance requirements analysis
     (what's mandatory vs negotiable), the recommended contract
     positions for each issue, the specific counter-proposal language
     for problematic clauses (data rights, SLA penalties, termination),
     and the risk assessment for each government-specific provision.

  2. Write the "Government Contract Negotiation Playbook" — the
     reusable framework for public sector deals. Include: the
     procurement vehicle comparison (GSA, NASPO, cooperative, direct),
     the FAR clause navigation guide (which FAR clauses are mandatory
     vs negotiable), the compliance requirement matrix by government
     level (federal, state, municipal), the pricing strategy for
     government (how GSA pricing affects commercial pricing), and the
     timeline management guide (government procurement cycles, fiscal
     year deadlines, continuing resolutions).

  3. Write the "Government vs Commercial Contract Differences Guide"
     — a comparison document for AEs transitioning from commercial to
     government sales. Include: the 10 key differences between
     government and commercial contracts, the common mistakes commercial
     AEs make in government negotiations, the government decision-making
     process (how it differs from enterprise), and the relationship
     building approach in government sales.

assertions:
  - type: llm_judge
    criteria: "Three government contract responses address real compliance requirements — FAR clauses, data rights, SLA penalties with counter-proposals that respect government procurement rules while protecting vendor interests"
    weight: 0.35
    description: "Compliance-aware government responses"
  - type: llm_judge
    criteria: "Government playbook provides reusable framework — procurement vehicle comparison, FAR navigation, compliance matrix, and pricing strategy specific to public sector sales"
    weight: 0.35
    description: "Reusable government playbook"
  - type: llm_judge
    criteria: "Differences guide helps commercial AEs transition — 10 key differences, common mistakes, and government-specific approaches that bridge the commercial-to-government knowledge gap"
    weight: 0.30
    description: "Commercial-to-government transition guide"
