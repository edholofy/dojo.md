meta:
  id: channel-partner-contracts
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Negotiate channel partner agreements — structure reseller, referral, and co-sell contracts that align partner incentives with company goals"
  tags: [sales, contracts, channel, partner, reseller, co-sell, advanced]

state: {}

trigger: |
  You're the VP of Channel Sales at "CloudConnect" ($90M ARR). You
  need to negotiate partner agreements with 3 different types of
  partners, each requiring a unique contract structure.

  Partner 1 — "TechConsult" (management consulting firm, 500 consultants):
  Model: Co-sell. They identify opportunities during consulting
  engagements and bring CloudConnect into the deal. They want 20%
  commission on first-year revenue and 10% on renewals. They also
  want to sell their implementation services ($50-200K per deal).
  Challenges: Commission rates are above your standard 15%/5%. They
  want exclusive rights in financial services vertical. They want
  a minimum annual guarantee of $500K in commissions.

  Partner 2 — "ValueResell" (IT reseller, 2,000 customers):
  Model: Resell. They purchase CloudConnect at wholesale discount and
  sell to their customers at their own price. They want 30% margin
  and the right to bundle CloudConnect with their own services.
  Challenges: 30% margin is above your 25% standard. They want to
  white-label (remove your branding). They want to control the
  customer relationship entirely (you have no direct access).

  Partner 3 — "ReferPartner" (industry association, 5,000 members):
  Model: Referral. They recommend CloudConnect to their members.
  They want $5,000 per qualified lead and $10,000 per closed deal.
  Challenges: $10K per deal is 13% of average ACV ($75K). They
  want minimum quarterly referral fees ($25K/quarter guaranteed
  regardless of referral volume). They want exclusivity for their
  member base.

  Tasks:
  1. For each partner, write: the recommended contract structure
     (terms, compensation, obligations), the counter-proposal for
     their above-standard requests, the protection clauses you need
     (performance minimums, exclusivity limitations, brand control),
     and the deal economics (what this partnership costs you vs the
     revenue it generates).

  2. Write the "Partner Agreement Template Library" — 3 contract
     templates (co-sell, reseller, referral) with standard terms.
     For each: the key commercial terms (compensation, payment
     schedule, clawbacks), the performance requirements (minimums,
     certifications, training), the brand and IP provisions (co-
     branding rules, white-label limitations), the data sharing rules
     (what customer data is shared between partner and vendor), and
     the termination provisions (notice period, customer transition).

  3. Write the "Partner Negotiation Guide" — how to negotiate with
     partners (different from customer negotiations). Include: the
     alignment principle (partner success = your success), the margin
     math (what margins partners need to be profitable), the
     exclusivity trap (why to avoid and alternatives), the minimum
     performance protection (how to ensure partners actually sell),
     and the conflict resolution mechanism (what happens when partner
     and direct sales compete for the same customer).

assertions:
  - type: llm_judge
    criteria: "Three partner responses balance incentives — each addresses above-standard requests with counter-proposals that maintain partner motivation while protecting company economics"
    weight: 0.35
    description: "Incentive-balancing partner responses"
  - type: llm_judge
    criteria: "Template library covers three models — co-sell, reseller, and referral templates with commercial terms, performance requirements, brand provisions, and data sharing rules"
    weight: 0.35
    description: "Three-model template library"
  - type: llm_judge
    criteria: "Partner negotiation guide addresses unique dynamics — alignment, margin math, exclusivity alternatives, performance protection, and conflict resolution specific to partner negotiations"
    weight: 0.30
    description: "Partner-specific negotiation guide"
