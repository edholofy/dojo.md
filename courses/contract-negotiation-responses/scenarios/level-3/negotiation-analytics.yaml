meta:
  id: negotiation-analytics
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Use data analytics for negotiation optimization — analyze deal patterns, discount trends, and negotiation outcomes to build data-driven negotiation strategies"
  tags: [sales, contracts, analytics, data-driven, optimization, patterns, advanced]

state: {}

trigger: |
  You're the VP of Revenue Operations at "DataDeal" ($120M ARR, 200
  AEs). You've collected 2 years of contract negotiation data (1,800
  deals) and need to extract insights that improve negotiation outcomes.

  Dataset summary:
  - 1,800 deals over 24 months
  - Average ACV: $67K
  - Average discount: 14.2%
  - Average contract-to-signature: 22 business days
  - Overall win rate in competitive deals: 28%

  Key data points:
  - Deals with <10% discount: 34% win rate, 18 avg days to close
  - Deals with 10-20% discount: 31% win rate, 24 avg days to close
  - Deals with 20-30% discount: 22% win rate, 32 avg days to close
  - Deals with >30% discount: 15% win rate, 38 avg days to close
  - Counterintuitive: Higher discounts correlate with LOWER win rates

  Additional patterns:
  - AEs who propose first (anchor): 26% avg discount vs 18% when
    customer anchors first
  - Multi-year deals: 8% avg discount but 3x LTV
  - Q4 deals: 18% avg discount (vs 12% in Q1-Q3)
  - Enterprise (>$100K): 19% avg discount, 32 days to close
  - SMB (<$30K): 8% avg discount, 12 days to close
  - Legal redline rounds: avg 2.8 rounds, each round adds 4.5 days
  - Deals where AE involved legal early: 19 days avg close vs 28 days
  - Top 20% of AEs by revenue: 11% avg discount, 33% win rate
  - Bottom 20% of AEs: 19% avg discount, 21% win rate

  Tasks:
  1. Write the "Negotiation Intelligence Report" — analyze the data
     and extract the 8 most important insights. For each: the finding
     (what the data shows), the explanation (why this happens), the
     recommendation (what to change), and the expected impact (how
     much improvement). Address the counterintuitive finding about
     discounts and win rates.

  2. Write the "Data-Driven Negotiation Guidelines" — pricing and
     terms guidance based on the data. Include: the optimal discount
     ranges by segment (enterprise, mid-market, SMB), the timing
     recommendations (when to offer discounts vs hold), the legal
     engagement strategy (when to involve legal to reduce cycle time),
     the multi-year conversion triggers (which deals to push for
     multi-year), and the Q4 discount protection measures.

  3. Write the "Negotiation Scorecard" — a tool for scoring and
     comparing negotiation outcomes. Include: the 8 metrics that
     define a "good" negotiation (discount percentage, time to close,
     terms quality, expansion potential, reference obtained, multi-
     year conversion, payment terms, total value preserved), the
     scoring methodology, the rep ranking approach, and the coaching
     triggers (which scores indicate an AE needs coaching).

assertions:
  - type: llm_judge
    criteria: "Intelligence report extracts real insights — 8 findings drawn from the specific data with explanations for counterintuitive patterns and specific improvement recommendations"
    weight: 0.35
    description: "Data-driven intelligence insights"
  - type: llm_judge
    criteria: "Guidelines are grounded in data — optimal ranges, timing, legal strategy, and Q4 protections backed by specific data points from the 1,800-deal dataset"
    weight: 0.35
    description: "Data-grounded negotiation guidelines"
  - type: llm_judge
    criteria: "Scorecard enables measurement — 8 metrics with scoring methodology that can rank AEs and trigger coaching interventions based on negotiation performance"
    weight: 0.30
    description: "Measurement-enabling scorecard"
