meta:
  id: advanced-negotiation-shift
  level: 3
  course: contract-negotiation-responses
  type: output
  description: "Handle a complex multi-front negotiation shift — manage simultaneous contract challenges spanning enterprise MSA, international requirements, government compliance, and internal team coaching"
  tags: [sales, contracts, multi-front, shift-simulation, comprehensive, advanced]

state: {}

trigger: |
  You're the VP of Deal Strategy at "OmniPlatform" ($250M ARR, selling
  across enterprise, government, and international markets). It's the
  last week of Q4 and you have 5 critical deals that must close by
  Friday to hit your annual target. Each has a different contract
  challenge, and you have limited resources (2 attorneys, 3 senior AEs).

  Deal 1 — "GlobalBank" ($800K, enterprise MSA):
  Status: On their paper (52-page MSA). Legal has identified 15 issues.
  8 are resolved. 7 remain, including unlimited liability (they won't
  cap below $50M — your standard is 2x ACV) and a most-favored-customer
  clause (they want guaranteed best pricing). Their legal team goes on
  holiday break Friday evening.
  Resource need: 1 attorney full-time for 3 days.

  Deal 2 — "TokyoTech" ($350K, international):
  Status: Commercial terms agreed but legal review reveals Japan APPI
  compliance gaps in your DPA. Their legal team has flagged 4 data
  handling provisions that don't meet APPI requirements. They also need
  a Japanese-language contract version by Friday.
  Resource need: 1 attorney for 2 days + translation service.

  Deal 3 — "FedAgency" ($500K, government):
  Status: All terms agreed, but the contracting officer discovered your
  FedRAMP authorization doesn't cover a new module they want to add.
  The module is in FedRAMP review (expected authorization in 60 days).
  They need the contract signed before fiscal year end (Friday) or
  the budget expires.
  Resource need: Creative deal structuring (no attorney needed).

  Deal 4 — "MidCorp" ($200K, renewal):
  Status: Existing customer threatening to leave for a competitor.
  They want 30% discount on renewal, 3 additional product modules at
  no charge, and removal of the auto-renewal clause. Their current
  contract expires Friday. Your AE (junior) has already verbally
  agreed to the 30% discount.
  Resource need: Senior AE to take over negotiation.

  Deal 5 — "StartupScale" ($120K, new business):
  Status: Contract is fully agreed but the signer (CEO) is traveling
  and "can't sign until next week." Your AE suspects the delay is a
  negotiation tactic to push into Q1 for better terms. Current offer
  includes 15% discount that expires end of Q4.
  Resource need: Closing strategy (no attorney needed).

  Tasks:
  1. Write the "Resource Allocation Plan" — how to deploy your 2
     attorneys and 3 senior AEs across the 5 deals for the remaining
     3 days. Include: the priority ranking (which deals to focus on
     if you can't close all 5), the resource assignment (who works
     on what, when), and the contingency plan (what if Deal 1 or
     Deal 2 requires more time than expected).

  2. For each deal, write the specific resolution strategy: Deal 1
     (how to resolve unlimited liability and MFC clause in 3 days),
     Deal 2 (how to address APPI gaps and get Japanese contract done),
     Deal 3 (creative structure to include the non-FedRAMP module),
     Deal 4 (how to recover from the verbal discount commitment and
     retain the customer), and Deal 5 (how to determine if delay is
     tactical and close this week).

  3. Write the "Q4 Close Lessons Learned" — the process improvements
     to prevent this situation next quarter. Include: the contract
     readiness assessment (how to identify deal risks earlier), the
     resource planning model (how to ensure legal capacity during
     close periods), the escalation triggers (when deals should be
     flagged to leadership), and the AE empowerment framework (what
     authority AEs need to resolve issues without attorney support).

assertions:
  - type: llm_judge
    criteria: "Resource allocation is realistic and prioritized — 2 attorneys and 3 AEs assigned across 5 deals with priority ranking, daily schedule, and contingency plans for overruns"
    weight: 0.35
    description: "Realistic resource allocation"
  - type: llm_judge
    criteria: "Five resolution strategies are specific and actionable — each deal gets a tailored approach addressing its unique challenge (MSA, international, government, renewal, closing tactic)"
    weight: 0.35
    description: "Deal-specific resolution strategies"
  - type: llm_judge
    criteria: "Lessons learned address root causes — contract readiness, resource planning, escalation triggers, and AE empowerment that prevent future Q4 crunches"
    weight: 0.30
    description: "Root-cause lessons learned"
