meta:
  id: global-negotiation-standardization
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Standardize contract negotiation across a global organization — build a unified negotiation framework that works across 30+ countries while respecting local requirements and cultures"
  tags: [sales, contracts, global, standardization, multi-jurisdiction, cultural, master]

state: {}

trigger: |
  You're the Global VP of Deal Strategy at "WorldPlatform" ($1.2B ARR,
  selling in 35 countries, 1,500 AEs). The company has grown through
  7 acquisitions across 4 continents, and each acquired entity brought
  its own contract practices. The result is complete fragmentation —
  the same product is sold under radically different terms in different
  regions.

  Current fragmentation:
  North America (50% of ARR): Uses standard US MSA, aggressive
  discounting culture (avg 20%), deal desk with 4 analysts, CLM tool
  (Ironclad), average cycle: 22 days.

  Europe (25% of ARR): 8 different contract templates by country
  (Germany, UK, France, Nordics, etc.), conservative discounting
  (avg 12%), no deal desk, GDPR-compliant DPA standard, average
  cycle: 35 days. German team insists on German-law contracts only.

  APAC (15% of ARR): Japan uses completely different contract format
  (aligned with Japanese business customs), Australia/NZ uses UK-style
  terms, Singapore serves as hub but uses US templates, India has
  custom terms for government deals. Average discount: 15%, average
  cycle: 40 days. No CLM tool.

  LATAM (10% of ARR): Brazil requires Portuguese contracts, Mexico
  uses Spanish versions, all other countries use English. Local
  entities invoice in some countries, parent company in others. Average
  discount: 25%, average cycle: 45 days. No standardized processes.

  Problems caused by fragmentation:
  - Global customers (150 accounts in multiple regions) get different
    terms in each country, causing confusion and negotiation leverage
  - Cannot report on negotiation metrics consistently across regions
  - Legal review in some regions takes 4x longer than others
  - 7 different CLM tools (or no tool) across regions
  - No global discount authority — regional VPs set their own limits
  - Compliance risk: Some regional contracts don't meet global
    standards for data protection or liability
  - M&A due diligence repeatedly flags contract fragmentation as risk

  Board mandate: "One company, one contract framework" — within 24 months.
  Budget: $3M for the standardization initiative.

  Tasks:
  1. Write the "Global Contract Standardization Strategy" — the
     master plan for unifying contract negotiation across 35 countries.
     Include: the "global core + local flex" architecture (which terms
     are globally standard vs locally adaptable), the template
     consolidation plan (reducing from 15+ templates to 3 global
     templates with local addenda), the global approval authority
     framework (who approves what at global vs regional level), the
     technology consolidation plan (one global CLM), and the change
     management strategy by region (each region has different
     resistance points).

  2. Write the "Regional Implementation Plans" — the specific
     approach for each of 4 regions. For each: the current state
     assessment, the gap analysis (vs global standard), the transition
     roadmap (what changes when), the key stakeholder management
     (who needs to be convinced and how), and the success metrics.
     Address specific regional challenges: German insistence on
     local law, Japanese cultural practices, Brazilian legal
     requirements, and North American resistance to less aggressive
     discounting.

  3. Write the "Global Negotiation Governance Model" — the ongoing
     governance for maintaining standardization. Include: the Global
     Deal Council structure (who, what authority, meeting cadence),
     the exception management process (how regional exceptions are
     approved and tracked), the quarterly global review process
     (metrics, benchmarks, improvement actions), the center of
     excellence design (how the central team supports regions), and
     the continuous improvement mechanism (how regional innovations
     become global standards and vice versa).

assertions:
  - type: llm_judge
    criteria: "Global strategy balances consistency with local needs — 'global core + local flex' architecture, template consolidation, approval framework, and technology plan across 35 countries"
    weight: 0.35
    description: "Consistency-flexibility balance"
  - type: llm_judge
    criteria: "Regional plans address real differences — German legal insistence, Japanese cultural practices, Brazilian requirements, and NA discounting culture each get specific transition approaches"
    weight: 0.35
    description: "Culturally-aware regional plans"
  - type: llm_judge
    criteria: "Governance model sustains standardization — Deal Council, exception management, quarterly reviews, center of excellence, and improvement mechanism that prevent re-fragmentation"
    weight: 0.30
    description: "Re-fragmentation-preventing governance"
