meta:
  id: negotiation-board-strategy
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Present negotiation strategy to the board — build a board-level narrative on how contract negotiation capability drives company valuation, competitive advantage, and strategic positioning"
  tags: [sales, contracts, board-strategy, valuation, competitive-advantage, governance, master]

state: {}

trigger: |
  You're the CEO of "ValuationMax" ($500M ARR, preparing for $5B IPO
  in 12 months). Your board has requested a comprehensive presentation
  on how contract negotiation capability affects company valuation and
  what investments are needed. This is the first time negotiation has
  been a board-level topic.

  Context for the board:
  ValuationMax financials:
  - $500M ARR, growing 35% YoY
  - Gross margin: 76% (would be 82% without excessive discounting)
  - Net retention: 108% (below SaaS benchmark of 120%+)
  - Average discount: 21% (estimated $130M in value leaked annually)
  - Contract disputes: 45 active, $12M in potential liability
  - Customer NPS: 44 (contracting experience NPS: 22)

  Competitive position:
  - Top competitor has 14% average discount (vs your 21%)
  - Top competitor's deal cycle: 18 days (vs your 34 days)
  - Top competitor invested $8M in CLM and deal desk 3 years ago
  - Analyst reports cite their "contract agility" as competitive moat
  - Multiple acquisition targets rejected your offer due to contract
    portfolio risk concerns

  IPO implications:
  - Auditors flagged revenue recognition issues in 15% of contracts
  - Non-standard liability terms create $2.8B in maximum exposure
  - Investor presentations must disclose material contract risks
  - Public company compliance (SOX) requires auditable approval
    processes for all non-standard terms
  - Peer comparables show 2-3x valuation premium for companies with
    strong contract operations

  Board composition:
  - 2 private equity directors (focused on margin and EBITDA)
  - 2 independent directors (governance and risk focused)
  - 1 founder director (growth and vision focused)
  - CFO (IPO readiness focused)
  - CEO (you — making the case for investment)

  Tasks:
  1. Write the "Board Presentation" — the 15-slide narrative
     presentation for the board. Include: the strategic context
     (why negotiation matters for valuation), the current state
     assessment (where we are, with data), the competitive gap
     analysis (how we compare to peers), the financial impact
     analysis ($130M annual value leakage, margin improvement
     opportunity), the risk assessment (IPO and ongoing risks from
     current state), the investment proposal (what we need to spend
     and why), the expected ROI (returns by initiative with timeline),
     and the ask (board approval for specific budget and authority).
     Write the content for each slide with speaker notes.

  2. Write the "Investment Proposal" — the detailed business case
     supporting the board presentation. Include: the 3-year investment
     plan (Year 1: foundation, Year 2: optimization, Year 3:
     excellence), the budget by category (people, process, technology,
     training, consulting), the financial projections (revenue impact,
     margin improvement, risk reduction), the sensitivity analysis
     (optimistic, realistic, pessimistic scenarios), and the decision
     framework (what metrics will determine success and trigger
     additional investment or course correction).

  3. Write the "Board Governance Framework" — how the board will
     oversee negotiation capability going forward. Include: the
     quarterly board reporting package (what metrics the board should
     monitor), the delegation of authority framework (what the board
     retains vs delegates to management), the risk appetite statement
     (the board's tolerance for contractual risk), the annual review
     process (how the board evaluates negotiation performance), and
     the management accountability structure (who is responsible for
     what).

assertions:
  - type: llm_judge
    criteria: "Board presentation tells a compelling 15-slide story — strategic context, current state, competitive gap, financial impact, risk, investment, ROI, and specific ask with speaker notes"
    weight: 0.35
    description: "Compelling board narrative"
  - type: llm_judge
    criteria: "Investment proposal is financially rigorous — 3-year plan, budget breakdown, projections, sensitivity analysis, and decision framework that PE directors would approve"
    weight: 0.35
    description: "Financially rigorous proposal"
  - type: llm_judge
    criteria: "Governance framework enables board oversight — quarterly reporting, delegation, risk appetite, annual review, and accountability that satisfy governance-focused directors"
    weight: 0.30
    description: "Board-level governance framework"
