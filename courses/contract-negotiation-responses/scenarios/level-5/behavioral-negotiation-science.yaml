meta:
  id: behavioral-negotiation-science
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Apply behavioral science to contract negotiation — design negotiation processes that leverage cognitive biases, framing effects, and decision architecture to improve outcomes"
  tags: [sales, contracts, behavioral-science, psychology, decision-architecture, framing, master]

state: {}

trigger: |
  You're a Behavioral Science Advisor to the CRO at "MindDeal" ($300M
  ARR). The company has hired you to apply behavioral science principles
  to their contract negotiation process. Your research has identified
  specific cognitive biases and decision-making patterns that affect
  both buyers and sellers during contract negotiations.

  Research findings from analyzing 2,000 negotiations:

  Finding 1 — Anchoring dominance:
  When MindDeal presents its pricing first, the final discount averages
  12%. When the customer anchors first ("we can only pay $X"), the
  final discount averages 22%. First-mover advantage is worth ~10
  percentage points of margin.

  Finding 2 — Loss aversion in terms:
  Customers fight 3x harder to remove a penalty clause than to add
  a benefit clause of equal financial value. A $10K SLA penalty
  generates 3x more resistance than a $10K discount generates
  enthusiasm.

  Finding 3 — Choice overload:
  When presented with more than 3 pricing tiers/options, decision
  time increases by 40% and win rate decreases by 15%. Optimal is
  3 options (bronze/silver/gold or similar).

  Finding 4 — Decoy effect:
  Adding a strategically inferior option increases selection of the
  target option by 28%. Example: Adding a "premium" tier at $150K
  makes the $100K "growth" tier feel like a better deal, even when
  the $80K "starter" tier exists.

  Finding 5 — Commitment and consistency:
  Customers who verbally agree to 3+ individual terms are 65% more
  likely to sign the full contract. Building incremental commitment
  throughout negotiation dramatically increases close rate.

  Finding 6 — Social proof in contracting:
  Telling customers "85% of companies your size choose this package"
  increases selection of that package by 34%. Industry-specific proof
  ("70% of financial services companies include this clause") is
  even more powerful.

  Finding 7 — Endowment effect in renewals:
  Customers value their current contract terms 2.4x more than
  equivalent new terms. Framing renewal changes as "upgrades" (adding
  value) rather than "changes" (replacing something) reduces pushback
  by 55%.

  Finding 8 — Temporal discounting:
  Customers systematically undervalue future costs vs present savings.
  A $10K discount today is preferred over $15K in value delivered over
  3 years. This creates opportunity for front-loaded discounts with
  back-loaded value.

  Tasks:
  1. Write the "Behavioral Negotiation Playbook" — how to apply each
     of the 8 findings to contract negotiation. For each finding:
     the science behind it (why it works), the specific negotiation
     tactics (how to use it ethically), the implementation guidance
     (scripts, templates, process changes), the ethical boundaries
     (when this crosses from persuasion to manipulation), and the
     expected impact (quantified improvement).

  2. Write the "Decision Architecture Guide" — how to redesign the
     contract and proposal experience to leverage behavioral science.
     Include: the pricing presentation design (how to structure
     options using decoy and anchoring), the contract term sequencing
     (which terms to negotiate first to build commitment), the
     renewal experience design (how to frame renewals using endowment
     effect), the proposal document design (layout, order, framing
     that improves conversion), and the negotiation meeting design
     (how to structure meetings for maximum agreement).

  3. Write the "Ethical Framework for Behavioral Negotiation" — the
     guidelines that ensure behavioral tactics are used ethically.
     Include: the distinction between persuasion and manipulation
     (where the line is), the transparency requirements (what must
     be disclosed), the customer welfare test (does this tactic serve
     the customer's genuine interests), the organizational standards
     (what's acceptable company practice), and the training approach
     (how to teach behavioral negotiation responsibly).

assertions:
  - type: llm_judge
    criteria: "Behavioral playbook applies 8 findings practically — science, specific tactics, implementation guidance, ethical boundaries, and quantified impact for each cognitive bias in contract negotiation"
    weight: 0.35
    description: "Practically applied behavioral science"
  - type: llm_judge
    criteria: "Decision architecture redesigns the experience — pricing presentation, term sequencing, renewal framing, proposal design, and meeting structure leveraging behavioral science"
    weight: 0.35
    description: "Behaviorally-designed architecture"
  - type: llm_judge
    criteria: "Ethical framework provides real guardrails — persuasion vs manipulation distinction, transparency requirements, customer welfare test, and responsible training approach"
    weight: 0.30
    description: "Real ethical guardrails"
