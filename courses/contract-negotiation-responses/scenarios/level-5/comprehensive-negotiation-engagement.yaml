meta:
  id: comprehensive-negotiation-engagement
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Lead a comprehensive contract negotiation transformation — integrate all negotiation disciplines into a cohesive organizational capability that drives competitive advantage and company valuation"
  tags: [sales, contracts, comprehensive, transformation, integration, competitive-advantage, master]

state: {}

trigger: |
  You've been hired as the first-ever Chief Negotiation Officer (CNO)
  at "NexGen" ($750M ARR, targeting $3B ARR in 5 years). The CEO
  created this role because she believes contract negotiation capability
  will be NexGen's primary competitive differentiator. Your mandate:
  build a world-class negotiation function from scratch.

  Starting position:
  - 10,000 active contracts, $750M ARR
  - 500 AEs across 25 countries
  - Legal team of 20 (understaffed by industry standards of 1:100
    contracts)
  - No deal desk, no CLM, no negotiation training
  - Average discount: 24% (industry leader is at 11%)
  - Average deal cycle: 40 days (industry leader: 15 days)
  - Non-standard contract terms: 55% of portfolio
  - Customer contracting NPS: 15 (industry leader: 58)
  - Estimated annual value leakage: $200M

  Your budget: $15M over 3 years
  Your headcount: Building from 0 to 50+ (deal desk, contract ops,
  negotiation excellence, analytics, AI/automation)

  CEO's vision:
  "In 3 years, I want our contract negotiation to be so good that
  customers PREFER our contracting experience. I want analysts to
  cite our 'contract agility' as a competitive moat. I want our
  win rate to increase not because we're cheaper, but because we're
  faster, more creative, and more trusted. And I want to capture
  $150M of the $200M we're currently leaking."

  The challenge:
  You need to simultaneously:
  1. Stop the bleeding (reduce value leakage immediately)
  2. Build the foundation (people, process, technology)
  3. Create competitive advantage (innovation, AI, customer experience)
  4. Scale globally (25 countries, 500 AEs)
  5. Measure everything (analytics and ROI tracking)

  Tasks:
  1. Write the "CNO 100-Day Plan" — your first 100 days on the job.
     Include: Days 1-30 (assessment and quick wins — what to measure,
     who to interview, what changes can have immediate impact), Days
     31-60 (strategy and design — organizational structure, technology
     selection, process design), Days 61-100 (launch and early wins —
     what to deploy first, how to build credibility, first metrics
     report to CEO). Include the specific deliverables for each phase,
     the stakeholder engagement plan, and the communication strategy.

  2. Write the "3-Year Transformation Roadmap" — the comprehensive
     plan for building world-class negotiation capability. Year 1:
     Foundation (deal desk, playbook, CLM, basic training, analytics
     baseline). Year 2: Optimization (advanced training, AI tools,
     behavioral science, global standardization, coaching program).
     Year 3: Excellence (AI-native workflows, predictive analytics,
     outcome-based contracting, industry thought leadership, customer
     experience transformation). For each year: the initiatives, the
     budget allocation, the headcount plan, the technology investments,
     the expected metrics improvements, and the risks.

  3. Write the "Competitive Differentiation Thesis" — the strategic
     argument for how negotiation capability becomes a competitive
     moat. Include: the customer experience advantage (why customers
     choose you for contracting, not just product), the margin
     advantage (how 11% avg discount vs competitors' 18% translates
     to valuation), the speed advantage (how 15-day cycle vs 30-day
     cycle wins time-sensitive deals), the innovation advantage (how
     creative deal structures expand your addressable market), the
     talent advantage (how negotiation excellence attracts top sales
     talent), and the M&A advantage (how a clean contract portfolio
     accelerates acquisitions both as buyer and target).

assertions:
  - type: llm_judge
    criteria: "100-day plan is actionable and phased — assessment, design, and launch phases with specific deliverables, stakeholder engagement, and quick wins that build CNO credibility"
    weight: 0.35
    description: "Actionable 100-day plan"
  - type: llm_judge
    criteria: "3-year roadmap transforms capability — foundation, optimization, and excellence phases with budget, headcount, technology, metrics, and risks that could capture $150M in value"
    weight: 0.35
    description: "Value-capturing transformation roadmap"
  - type: llm_judge
    criteria: "Competitive thesis is compelling — customer experience, margin, speed, innovation, talent, and M&A advantages that make a strategic case for negotiation as competitive moat"
    weight: 0.30
    description: "Compelling competitive moat thesis"
