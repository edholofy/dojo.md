meta:
  id: negotiation-economics-model
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Build a negotiation economics model — quantify the financial impact of every contract term and build decision models that optimize deal value, not just deal size"
  tags: [sales, contracts, economics, financial-modeling, optimization, value, master]

state: {}

trigger: |
  You're the Chief Strategy Officer at "OptimalDeal" ($400M ARR).
  The board wants a rigorous, quantitative approach to contract
  negotiation — moving from gut-feel decisions to data-driven
  optimization. You need to build a negotiation economics model
  that quantifies the true financial impact of every contract term.

  Available data:
  - 5,000 historical contracts over 3 years
  - Full financial performance data (revenue, margin, collections,
    disputes, renewals) for each contract
  - Customer lifetime value by contract type
  - Cost of capital: 8%
  - Gross margin: 78%
  - Net retention rate: 112%
  - Customer acquisition cost: $45K average
  - Average contract term: 14 months

  Key financial relationships discovered in preliminary analysis:
  - Each 1% discount reduces lifetime deal value by 2.3% (due to
    renewal anchoring — customers expect same or better pricing)
  - Extended payment terms (beyond Net 30) cost 0.8% per additional
    30 days (working capital + default risk)
  - Multi-year contracts (3-year) have 85% renewal rate vs 68% for
    annual contracts (retention premium)
  - Unlimited liability contracts have 4.2x higher dispute rate and
    6.1x higher legal costs than capped contracts
  - SLA penalties above 10% of monthly fees correlate with 23% higher
    churn (suggests over-commitment leading to delivery failures)
  - Contracts with detailed success criteria have 92% renewal rate
    vs 71% without
  - Custom terms add average 12 days to deal cycle (opportunity cost
    of $8,200 in AE time)

  Optimization challenges:
  1. Discount vs lifetime value trade-off: When does a discount increase
     total value (by winning the deal) vs decrease it?
  2. Payment terms vs cash flow: When should you accept Net 90 to win
     a deal vs hold at Net 30?
  3. Risk vs reward: When does accepting higher liability justify the
     deal value?
  4. Speed vs terms: When should you accept customer paper to close
     faster vs insist on your terms?
  5. Multi-year discount: What's the optimal discount for 2-year and
     3-year commitments?

  Tasks:
  1. Write the "Contract Term Valuation Model" — the framework for
     quantifying the financial impact of every major contract term.
     Include: the discount impact model (lifetime value of discounts
     with renewal anchoring), the payment term valuation (present
     value calculation including default risk), the liability term
     cost model (expected cost of each liability structure), the SLA
     penalty valuation (cost of penalties vs cost of over-commitment),
     the term length value model (retention premium calculation for
     multi-year), and the speed premium model (opportunity cost of
     extended negotiation). For each model: the formula, the variables,
     the data inputs, and an example calculation.

  2. Write the "Deal Optimization Calculator" — the tool AEs use to
     make trade-off decisions during live negotiations. Include: the
     input variables (deal size, term length, discount, payment terms,
     liability structure, SLA level, custom terms), the calculation
     engine (how to compute deal value score from inputs), the
     comparison framework (how to compare two deal structures), the
     guidance thresholds (green/yellow/red for each variable), and
     the scenario analysis capability (what-if modeling for
     negotiations).

  3. Write the "Executive Dashboard Design" — the analytics that the
     leadership team reviews to manage negotiation performance. Include:
     the portfolio-level metrics (aggregate deal quality, margin
     protection, risk exposure), the trend analysis (how negotiation
     outcomes are changing over time), the segmentation views (by
     AE, region, segment, industry), the predictive indicators (which
     current deals are at risk of poor outcomes), and the board-ready
     summary (quarterly negotiation performance report).

assertions:
  - type: llm_judge
    criteria: "Valuation model quantifies every major term — discount, payment, liability, SLA, term length, and speed models with formulas, variables, and example calculations that could drive real decisions"
    weight: 0.35
    description: "Quantitative term valuation"
  - type: llm_judge
    criteria: "Deal optimization calculator is usable — input variables, calculation engine, comparison framework, and scenario analysis that AEs could use during live negotiations"
    weight: 0.35
    description: "Usable deal calculator"
  - type: llm_judge
    criteria: "Executive dashboard enables governance — portfolio metrics, trends, segmentation, predictive indicators, and board summary that enable data-driven negotiation management"
    weight: 0.30
    description: "Governance-enabling dashboard"
