meta:
  id: negotiation-maturity-model
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Build a contract negotiation maturity model — create the assessment framework that organizations use to measure and improve their negotiation capabilities across all dimensions"
  tags: [sales, contracts, maturity-model, assessment, capability, benchmarking, master]

state: {}

trigger: |
  You're a Principal at a strategy consulting firm specializing in
  revenue operations. Three clients have asked you to assess their
  contract negotiation maturity. You need to build a universal maturity
  model and then apply it to each client.

  Client 1 — "EarlyStage" ($15M ARR, Series B, 20 AEs):
  Current state: CEO handles all negotiations personally. No templates,
  no playbook, no legal review for deals under $50K. Uses a shared
  Google Doc for "standard terms." Discounts are whatever it takes to
  win. No deal desk, no CLM, no training. Legal is an outside firm
  billed hourly ($450/hour).

  Client 2 — "MidGrowth" ($120M ARR, 150 AEs):
  Current state: Has a 2-person legal team and a part-time deal desk
  analyst. Standard templates exist but are rarely used (AEs prefer
  their own versions). Playbook was created 2 years ago but never
  updated. CLM tool implemented but adoption is 30%. Training is a
  one-time onboarding module. Discounting is governed by approval
  matrix but frequently circumvented. Win/loss analysis exists but
  doesn't include contract terms.

  Client 3 — "Enterprise" ($800M ARR, 600 AEs):
  Current state: Has a 6-person deal desk and 15-person legal team.
  Comprehensive playbook updated quarterly. CLM tool with 85% adoption.
  Regular training program. Analytics dashboard for negotiation metrics.
  However: still has 22% average discount (benchmark 14%), deal cycle
  is 30 days (benchmark 18), and customer satisfaction with contracting
  is low. They have the infrastructure but aren't getting results.

  Tasks:
  1. Write the "Contract Negotiation Maturity Model" — the universal
     framework with 5 maturity levels and 8 capability dimensions.
     Levels: Level 1 (Ad-hoc), Level 2 (Reactive), Level 3 (Defined),
     Level 4 (Managed), Level 5 (Optimized). Dimensions: Strategy
     (negotiation philosophy and goals), People (skills and roles),
     Process (workflows and procedures), Technology (tools and
     automation), Governance (approvals and compliance), Analytics
     (measurement and insights), Culture (legal-sales partnership
     and customer focus), Innovation (creative deal structures and
     continuous improvement). For each cell in the 5x8 matrix:
     describe the specific characteristics and behaviors.

  2. Write the "Assessment Reports" for all 3 clients. For each:
     the maturity score by dimension (scored 1-5), the overall
     maturity level, the key strengths and weaknesses, the priority
     recommendations (top 3 actions to advance one level), and the
     investment estimate (time and money to reach next level).
     Address why Enterprise has the infrastructure but not the results
     (hint: likely a culture/strategy issue, not a process/technology
     issue).

  3. Write the "Maturity Advancement Playbook" — the specific actions
     to advance from one level to the next. Include: Level 1→2
     transitions (the foundation moves — templates, basic training,
     approval process), Level 2→3 transitions (the standardization
     moves — playbook, CLM, deal desk), Level 3→4 transitions (the
     management moves — analytics, coaching, governance), Level 4→5
     transitions (the optimization moves — AI, behavioral science,
     innovation). For each transition: the prerequisites, the key
     actions, the timeline, the common pitfalls, and the success
     indicators.

assertions:
  - type: llm_judge
    criteria: "Maturity model is comprehensive — 5 levels across 8 dimensions with specific characteristics for each cell in the 40-cell matrix that could assess any organization"
    weight: 0.35
    description: "Comprehensive 5x8 maturity model"
  - type: llm_judge
    criteria: "Three assessments reveal different challenges — EarlyStage's foundation gaps, MidGrowth's adoption issues, and Enterprise's results gap each diagnosed accurately with priority recommendations"
    weight: 0.35
    description: "Accurately diagnosed assessments"
  - type: llm_judge
    criteria: "Advancement playbook provides clear transitions — level-by-level actions, prerequisites, timelines, and pitfalls that guide organizations from ad-hoc to optimized"
    weight: 0.30
    description: "Clear advancement transitions"
