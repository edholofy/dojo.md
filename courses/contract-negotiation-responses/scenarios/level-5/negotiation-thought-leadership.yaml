meta:
  id: negotiation-thought-leadership
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Create thought leadership on the future of contract negotiation — write authoritative content on how AI, blockchain, and new business models are transforming B2B contract negotiation"
  tags: [sales, contracts, thought-leadership, future, AI, innovation, master]

state: {}

trigger: |
  You're a recognized industry expert on B2B contract negotiation.
  A leading business publication has commissioned you to write a
  comprehensive special report on "The Future of Contract Negotiation
  in B2B SaaS." The audience is C-suite executives, heads of legal,
  and revenue leaders at SaaS companies.

  Research inputs:
  1. Technology trends: AI-powered contract review (reducing legal
     review from days to minutes), smart contracts on blockchain
     (self-executing terms), natural language processing for clause
     extraction, predictive analytics for negotiation outcomes,
     automated compliance monitoring.

  2. Business model trends: Usage-based pricing replacing per-seat,
     outcome-based contracts, PLG (product-led growth) self-service
     contracts, API-first contracting, embedded finance in contracts.

  3. Regulatory trends: Global data privacy convergence, AI
     regulation affecting automated decision-making in contracts,
     ESG clauses becoming standard, supply chain due diligence
     requirements, digital contract enforceability laws.

  4. Workforce trends: Remote negotiation becoming permanent, AI
     augmenting (not replacing) negotiators, negotiation as a
     technical skill (data-driven), cross-cultural virtual negotiation,
     deal desk as strategic function.

  5. Customer behavior trends: Buyers more informed (peer networks,
     review sites), procurement professionalization in mid-market,
     consortium buying, vendor consolidation pressure, demand for
     contract simplification.

  Current statistics:
  - 73% of B2B contracts still involve manual review processes
  - AI-assisted contract review reduces cycle time by 60%
  - Only 12% of SaaS companies have outcome-based pricing options
  - 85% of CLO offices plan to increase AI investment by 2027
  - Average enterprise contract has grown from 15 pages to 32 pages
    over 10 years
  - 45% of deal value is determined in post-sale negotiation (renewals,
    expansions) not initial sale

  Tasks:
  1. Write the "State of Contract Negotiation" analysis — the current
     landscape assessment. Include: the evolution of B2B contracting
     (last 10 years), the current pain points (quantified with data),
     the maturity model (5 levels of negotiation maturity from ad-hoc
     to AI-optimized), the industry benchmarks (what good looks like
     today), and the gap analysis (where most companies fall short).

  2. Write the "Future of Contract Negotiation" vision — the 5 major
     transformations coming in the next 5 years. Include: AI-native
     negotiation (how AI changes every stage of negotiation), outcome-
     based contracting (the shift from inputs to outputs), continuous
     contracts (replacing point-in-time agreements with dynamic terms),
     trust-based contracting (simplification driven by transparency),
     and ecosystem contracting (multi-party agreements for platform
     ecosystems). For each transformation: the driving forces, the
     timeline, the impact on roles and processes, the early movers
     to watch, and the preparation checklist.

  3. Write the "Executive Action Plan" — what leaders should do now
     to prepare for the future. Include: the CRO agenda (revenue
     implications and sales process changes), the CLO agenda (legal
     operations transformation), the CTO agenda (technology
     infrastructure needed), the CFO agenda (financial model
     implications), and the CEO agenda (strategic positioning and
     competitive advantage from negotiation excellence).

assertions:
  - type: llm_judge
    criteria: "State assessment provides authoritative analysis — evolution, quantified pain points, maturity model, benchmarks, and gap analysis that establishes credibility with C-suite readers"
    weight: 0.35
    description: "Authoritative state assessment"
  - type: llm_judge
    criteria: "Future vision is specific and credible — 5 transformations with driving forces, timelines, role impacts, early movers, and preparation checklists that go beyond generic predictions"
    weight: 0.35
    description: "Specific credible future vision"
  - type: llm_judge
    criteria: "Action plan is role-specific — CRO, CLO, CTO, CFO, and CEO each get relevant agendas that connect future trends to their specific responsibilities and decisions"
    weight: 0.30
    description: "Role-specific action plans"
