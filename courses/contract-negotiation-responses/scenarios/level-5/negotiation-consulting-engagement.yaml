meta:
  id: negotiation-consulting-engagement
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Lead a full negotiation consulting engagement — assess, design, and implement a complete contract negotiation transformation for a client organization"
  tags: [sales, contracts, consulting, transformation, assessment, implementation, master]

state: {}

trigger: |
  You're a Managing Partner at a management consulting firm specializing
  in revenue operations. "ScaleUp Corp" ($600M ARR, 800 AEs, B2B SaaS)
  has hired your firm for a $1.2M engagement to transform their contract
  negotiation capabilities. They're losing $45M annually to negotiation
  inefficiencies and are 18 months from IPO.

  Discovery findings from Week 1:
  Quantitative:
  - Average discount: 22% (industry benchmark: 14%)
  - Deal cycle: 38 business days (benchmark: 20 days)
  - Legal review turnaround: 6.2 days (benchmark: 2 days)
  - Non-standard terms in 45% of contracts (benchmark: 15%)
  - 800 AEs, 12 attorneys, no deal desk
  - Win rate: 24% (benchmark: 32%)
  - Contract disputes in last year: 28 (resulting in $3.8M in costs)
  - Customer NPS for contracting experience: 18 (benchmark: 42)

  Qualitative:
  - No negotiation playbook exists
  - AEs receive zero negotiation training
  - Legal is seen as the "department of no"
  - No CLM tool — contracts managed via email and shared drives
  - Approval process: AEs email their VP, who emails legal, who
    emails the CLO. Average 4 touches per approval.
  - No standard contract templates — 12 versions floating around
  - Pricing authority unclear — AEs quote whatever they think will win
  - Competitive intelligence on contract terms: none
  - Post-mortem on lost deals: none
  - Renewal negotiation: reactive, starts 2 weeks before expiry

  Executive sponsor: CFO (focused on IPO readiness and margin improvement)
  Stakeholders: CRO (wants speed), CLO (wants risk reduction), COO
  (wants process), Head of CS (wants deliverable terms)

  Tasks:
  1. Write the "Assessment Report" — the formal deliverable presenting
     your findings to ScaleUp Corp's executive team. Include: the
     executive summary (3 key findings, financial impact), the
     detailed findings by capability area (6 areas: playbook, people,
     process, technology, governance, culture), the benchmark
     comparison (ScaleUp vs industry), the root cause analysis (why
     they're underperforming), and the opportunity quantification
     ($45M annual impact broken down by initiative).

  2. Write the "Transformation Roadmap" — the 12-month implementation
     plan with 4 phases. Phase 1 (Month 1-3): Foundation — playbook
     creation, template standardization, deal desk design. Phase 2
     (Month 4-6): Enablement — training program, CLM implementation,
     legal partnership model. Phase 3 (Month 7-9): Optimization —
     analytics dashboard, competitive intelligence, coaching program.
     Phase 4 (Month 10-12): Excellence — advanced negotiation
     strategies, IPO readiness audit, continuous improvement system.
     For each phase: the specific deliverables, the resource
     requirements, the success metrics, and the dependencies.

  3. Write the "Business Case" — the financial justification for the
     transformation. Include: the investment required ($1.2M consulting
     + internal costs), the expected returns by initiative (discount
     reduction, cycle acceleration, dispute reduction, retention
     improvement), the ROI calculation (expected 8-12x ROI), the
     risk factors (what could go wrong), and the IPO impact assessment
     (how improved negotiation capability affects valuation).

assertions:
  - type: llm_judge
    criteria: "Assessment report is consulting-quality — executive summary, 6 capability areas, benchmarks, root causes, and quantified opportunity that could be presented to a C-suite"
    weight: 0.35
    description: "Consulting-quality assessment"
  - type: llm_judge
    criteria: "Transformation roadmap is phased and realistic — 4 phases with specific deliverables, resources, metrics, and dependencies that could guide a 12-month implementation"
    weight: 0.35
    description: "Phased transformation roadmap"
  - type: llm_judge
    criteria: "Business case justifies investment — investment breakdown, returns by initiative, ROI calculation, risk factors, and IPO impact that would convince a CFO"
    weight: 0.30
    description: "CFO-convincing business case"
