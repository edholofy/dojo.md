meta:
  id: industry-transformation-negotiation
  level: 5
  course: contract-negotiation-responses
  type: output
  description: "Navigate contract negotiation during industry transformation — manage contract challenges when your entire industry is shifting models, regulations, and customer expectations simultaneously"
  tags: [sales, contracts, industry-transformation, disruption, adaptation, strategy, master]

state: {}

trigger: |
  You're the Chief Commercial Officer at "HealthTech Platform" ($200M
  ARR, healthcare SaaS). The healthcare industry is undergoing a
  simultaneous triple transformation that affects every contract you
  negotiate:

  Transformation 1 — Regulatory revolution:
  The federal government has announced sweeping new healthcare data
  regulations (effective in 18 months) that will:
  - Require patient data portability between any system within 24 hours
  - Mandate AI algorithmic transparency for any clinical decision support
  - Establish minimum interoperability standards (replacing FHIR R4 with
    a new framework)
  - Create personal health data ownership rights (patients can demand
    deletion of their data from any system)
  - Impose penalties of $1M per violation per day
  Impact: Every customer contract must address new data obligations.
  Your current contracts don't comply. Neither do your competitors'.

  Transformation 2 — Business model shift:
  Healthcare buyers are demanding outcome-based contracts:
  - Hospitals want to pay based on patient outcomes, not software seats
  - Payers want contracts tied to cost reduction metrics
  - Life sciences companies want contracts linked to drug efficacy data
  - Government programs want value-based care metrics in contracts
  Current state: 95% of your contracts are traditional per-seat pricing.
  Only 5% have any outcome-based component. Competitors are starting
  to offer outcome-based models.

  Transformation 3 — Ecosystem consolidation:
  Healthcare is consolidating into large ecosystems:
  - 3 mega-health systems (each 500+ hospitals) now control 40% of
    your addressable market
  - They're demanding consortium pricing, data interoperability, and
    ecosystem-wide licensing
  - They want to be both customers and partners (reselling your
    platform to their affiliates)
  - Their procurement teams are becoming as sophisticated as tech
    companies
  Impact: Individual hospital contracts are being replaced by
  ecosystem-wide master agreements worth $5-20M.

  Your contract portfolio:
  - 800 active contracts, $200M ARR
  - 60% are with organizations that belong to one of the 3 mega-systems
  - 40% are with independent organizations
  - Average contract size: $250K (range: $20K to $5M)
  - Renewal rate: 88% (was 94% two years ago — declining)

  Tasks:
  1. Write the "Industry Transformation Contract Strategy" — the
     comprehensive strategy for adapting your contract approach to
     all three transformations simultaneously. Include: the regulatory
     compliance contract roadmap (how to update 800 contracts in
     18 months), the outcome-based pricing model design (how to
     transition from per-seat to value-based contracts), the ecosystem
     agreement architecture (master agreements for mega-systems with
     affiliate sub-licenses), the competitive positioning (how to
     lead on contract innovation rather than follow), and the risk
     assessment (what happens if you don't adapt).

  2. Write the "New Contract Architecture" — the specific contract
     structures for the transformed industry. Include: the outcome-
     based contract template (performance metrics, measurement
     methodology, payment calculation, risk sharing), the ecosystem
     master agreement template (consortium pricing, affiliate
     licensing, data sharing, governance), the regulatory-compliant
     addendum (covering all new data requirements), and the hybrid
     model (combining seat-based pricing with outcome-based bonuses
     as a transition mechanism).

  3. Write the "Transformation Execution Plan" — the 18-month
     implementation plan. Include: the customer segmentation strategy
     (which customers to transition first and why), the sales team
     enablement (how to train AEs on new contract models), the legal
     team preparation (new skills needed for outcome-based and
     ecosystem contracts), the technology requirements (what systems
     need to change to support new models), and the board communication
     plan (quarterly updates on transformation progress, risks, and
     financial impact).

assertions:
  - type: llm_judge
    criteria: "Transformation strategy addresses triple challenge — regulatory compliance, outcome-based pricing, and ecosystem agreements with competitive positioning that leads rather than follows"
    weight: 0.35
    description: "Triple-transformation strategy"
  - type: llm_judge
    criteria: "Contract architecture provides real templates — outcome-based, ecosystem, regulatory addendum, and hybrid models with sufficient specificity for legal teams to adapt"
    weight: 0.35
    description: "Adaptable contract architecture"
  - type: llm_judge
    criteria: "Execution plan is comprehensive — customer segmentation, team enablement, technology requirements, and board communication across an 18-month timeline"
    weight: 0.30
    description: "Comprehensive execution plan"
