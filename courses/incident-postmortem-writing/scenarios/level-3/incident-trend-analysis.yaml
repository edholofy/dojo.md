meta:
  id: incident-trend-analysis
  level: 3
  course: incident-postmortem-writing
  type: output
  description: "Analyze incident trends — identify patterns across multiple incidents to find systemic reliability issues and prioritize investments"
  tags: [postmortem, trends, patterns, analysis, reliability-investment, advanced]

state: {}

trigger: |
  You're the SRE lead reviewing 12 months of incident data. You have
  48 postmortems to analyze. Your leadership wants to know:
  1. Are we getting more or less reliable?
  2. Where should we invest to prevent the most incidents?
  3. Are our postmortem action items actually working?

  Raw data summary:
  - Q1: 8 incidents (2 SEV-1, 3 SEV-2, 3 SEV-3)
  - Q2: 14 incidents (3 SEV-1, 5 SEV-2, 6 SEV-3)
  - Q3: 16 incidents (4 SEV-1, 6 SEV-2, 6 SEV-3)
  - Q4: 10 incidents (1 SEV-1, 4 SEV-2, 5 SEV-3)

  Root cause categories across all incidents:
  - Configuration changes: 15 incidents (31%)
  - Capacity/scaling: 10 incidents (21%)
  - Dependencies (third-party): 8 incidents (17%)
  - Code bugs: 7 incidents (15%)
  - Infrastructure (hardware/cloud): 5 incidents (10%)
  - Human error (operational): 3 incidents (6%)

  Task: Write an incident trend analysis report. Identify patterns,
  assess whether remediation efforts are working, and propose
  data-driven investment priorities. This is the kind of analysis
  that turns individual postmortems into organizational learning.

assertions:
  - type: llm_judge
    criteria: "Trend analysis answers the three leadership questions with data — question 1 (more or less reliable?): 'Incident count increased Q1→Q3 (8→14→16) then decreased Q4 (10). However, this alone is misleading — we also grew from 5 to 8 services in that period. Incidents per service: Q1: 1.6, Q2: 2.0, Q3: 2.0, Q4: 1.25. Normalized for growth, Q4 shows genuine improvement. SEV-1 trend is most important: Q1: 2, Q2: 3, Q3: 4, Q4: 1. Q4 SEV-1 reduction is significant and correlates with configuration management improvements deployed after Q3. MTTR trend: Q1 average 95 minutes, Q2: 82 minutes, Q3: 75 minutes, Q4: 55 minutes. Improving consistently — better incident response processes are working.' Question 2 (where to invest): 'Configuration changes cause 31% of incidents — this is the single highest-impact investment area. If we eliminated all config-related incidents, total incident count drops by nearly one-third.' Question 3 (are action items working): 'Q4 SEV-1 reduction from 4 to 1 correlates with Q3 action items: automated config validation and staging requirements. Config-related incidents dropped from 5 in Q3 to 2 in Q4. Evidence suggests Q3 remediation is having measurable effect'"
    weight: 0.35
    description: "Data-driven answers"
  - type: llm_judge
    criteria: "Patterns are identified with actionable insights — pattern 1: Configuration changes are the dominant failure mode (31%). 'This is not a testing problem — 12 of 15 config incidents passed testing. It is a deployment problem: configs tested in staging don't match production reality (different scale, different dependencies). Fix: config deployment requires production-like staging environment, not just functional staging.' Pattern 2: Capacity incidents cluster around events (launches, Black Friday, end-of-month reporting). '8 of 10 capacity incidents occurred during predictable traffic spikes. Fix: pre-event capacity planning checklist with load testing against projected traffic.' Pattern 3: Third-party dependency incidents are increasing (Q1: 1, Q2: 2, Q3: 3, Q4: 2). 'As we add integrations, dependency risk grows. 6 of 8 dependency incidents lacked circuit breakers or fallbacks. Fix: dependency resilience review for all external integrations.' Pattern 4: MTTR improvement correlates with runbook quality. 'Incidents with up-to-date runbooks resolved 40% faster than those without. Runbook currency is a high-ROI investment.' Pattern 5: 'Human error' is declining (Q1: 2, Q2-Q4: 1 total). 'This suggests our automation and guardrails are reducing reliance on human vigilance. Continue this trajectory.'"
    weight: 0.35
    description: "Actionable patterns"
  - type: llm_judge
    criteria: "Investment priorities are ranked with expected impact — priority 1: Configuration management hardening (estimated 31% incident reduction). 'Investment: 2 engineers for 6 weeks building production-like staging and automated config validation. Expected: config-related incidents reduced from 15/year to 3-5/year. ROI: highest, addresses the largest incident category.' Priority 2: Dependency resilience program (estimated 17% incident reduction). 'Investment: circuit breaker implementation and fallback design for top 10 external dependencies. 1 engineer for 8 weeks. Expected: dependency incidents reduced from 8/year to 2-3/year.' Priority 3: Capacity planning automation (estimated 21% incident reduction, but most are lower severity). 'Investment: automated capacity planning for predictable events. Expected: capacity incidents during planned events reduced from 8/year to 2/year.' Priority 4: Runbook currency program (improves MTTR across all incidents). 'Investment: 1 day/month per team maintaining runbooks. Expected: 20% reduction in average MTTR.' Total estimated impact: 'Combined investments could reduce incident count by 40-50% and MTTR by 20%. Estimated annual savings: $X (based on current incident cost per hour).'"
    weight: 0.30
    description: "Investment priorities"
