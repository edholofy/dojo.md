meta:
  id: crisis-management-strategy
  level: 5
  course: incident-postmortem-writing
  type: output
  description: "Design crisis management strategy — create frameworks for incidents that escalate beyond engineering into company-wide crises affecting reputation, legal standing, and market position"
  tags: [postmortem, crisis-management, reputation, legal, strategic, master]

state: {}

trigger: |
  Your company is a B2B SaaS platform with 2,000 enterprise customers.
  A security researcher publicly disclosed (on Twitter, with proof)
  that your platform has been leaking customer data through an
  insecure API endpoint for an estimated 6 months. The researcher
  tagged major tech journalists.

  The situation:
  - The vulnerability is real and has been confirmed by your security
    team
  - Approximately 800 customers' data was potentially exposed
  - The data includes business-sensitive information (contracts,
    pricing, internal documents)
  - You don't know if any malicious actors exploited this before
    the researcher found it
  - Tech journalists are already writing stories
  - Your stock is trading down 5% in pre-market
  - Your largest customer ($15M/year contract) is calling the CEO
  - Your legal team says this may trigger state breach notification
    laws in 40+ states
  - Employee morale is shattered — engineers feel responsible

  Task: Write the crisis management plan covering the first 72 hours.
  Include: immediate response, communication strategy (internal,
  customer, public, media, regulatory), legal coordination, customer
  retention plan, and the post-crisis postmortem framework. This
  goes beyond a technical postmortem — this is organizational crisis
  management.

assertions:
  - type: llm_judge
    criteria: "72-hour crisis plan is structured with clear ownership and timing — hour 0-4 (containment and assessment): '(1) Technical: patch the vulnerability immediately. Engage external security firm for forensic investigation — do not rely solely on internal assessment. Begin log analysis to determine if data was accessed by parties other than the researcher. (2) Legal: engage outside counsel specializing in data breach response. Begin breach notification assessment for all applicable jurisdictions. Issue litigation hold on all relevant logs and data. (3) Communications: activate crisis communications team. Draft holding statement: We are aware of a reported security vulnerability and are actively investigating. We take the security of our customers' data seriously and will provide a detailed update within [X] hours. (4) Executive: CEO briefed every 2 hours. War room established with: CTO, CISO, General Counsel, VP Communications, VP Customer Success. (5) Board: board chair notified by CEO within 4 hours with initial assessment.' Hour 4-24 (investigation and initial response): '(6) Technical assessment: scope of data exposure determined. Which customers, what data types, what time period. (7) Customer communication: direct outreach to all potentially affected customers. Not a mass email — personalized communication from account managers to enterprise clients. Content: what we know, what we are doing, what they should do. (8) Public statement: CEO-level statement published on company blog and distributed to media. Tone: transparent, accountable, action-oriented. Not defensive. (9) Employee communication: all-hands or all-engineering meeting. Message: this is a serious situation, here is what we know, here is what we are doing, you are not individually blamed, here is how you can help. (10) Regulatory: begin notifications in jurisdictions with shortest timelines.' Hour 24-72 (sustained response): '(11) Forensic results: external firm provides initial findings. (12) Customer support surge: dedicated response team for customer inquiries. (13) Media management: CEO and CISO available for selected media interviews. (14) Regulatory notifications: complete all required notifications. (15) Remediation: security audit of all API endpoints underway'"
    weight: 0.35
    description: "72-hour crisis plan"
  - type: llm_judge
    criteria: "Multi-stakeholder communication strategy balances transparency with legal constraints — communication strategy by audience: 'Customers (highest priority): every affected customer receives direct communication within 24 hours. Enterprise customers ($1M+ annual contract): personal call from account manager plus CTO letter. Content: specific description of what data of theirs was potentially exposed, confirmation of what was NOT exposed, immediate steps we have taken, ongoing remediation plan, direct contact for their security team to speak with ours. Standard customers: personalized email with same content framework. Follow-up: weekly updates until investigation is complete.' Public and media: 'Company blog post within 12 hours. CEO statement: We discovered a security vulnerability that exposed some customer data through an API endpoint. We patched the vulnerability within [X] hours of confirmation. We have engaged an independent security firm to conduct a thorough investigation. We are directly notifying all potentially affected customers. We will publish a detailed technical postmortem when the investigation is complete. Tone principles: lead with what happened (do not bury the news), take responsibility (do not blame the researcher or external factors), show action (not just words), commit to transparency (publish the postmortem). Media strategy: CEO does 2-3 targeted interviews with major tech publications. Consistent talking points. Do not speculate on what we do not yet know.' Internal (employees): 'Engineering all-hands within 24 hours. CTO message: This is not about finding who to blame. This is about understanding what happened and making sure it cannot happen again. Specific guidance: do not discuss the incident on social media or with external parties. Direct all inquiries to communications team. Engineering is empowered to prioritize security audit above all other work.' Regulatory: 'Legal team manages all regulatory notifications. Timeline compliance documented for each jurisdiction. Proactive communication approach: notify regulators before they ask, demonstrate we discovered and contained the issue promptly, show robust remediation plan'"
    weight: 0.35
    description: "Multi-stakeholder communication"
  - type: llm_judge
    criteria: "Post-crisis postmortem framework captures both technical and organizational lessons — post-crisis postmortem: 'The post-crisis postmortem is conducted after the immediate crisis stabilizes (typically 2-4 weeks after the incident). It covers two domains that a standard technical postmortem does not: Domain 1: Security failure analysis (technical): how did this vulnerability exist for 6 months undetected? Root cause: the API endpoint was added without authentication review. Contributing factors: no automated security scanning for unauthenticated endpoints, no regular penetration testing, no bug bounty program that might have found this sooner. Technical action items: automated API security scanning in CI/CD, quarterly penetration testing by external firm, launch bug bounty program. Domain 2: Crisis response analysis (organizational): how did the organization handle the crisis? Communication analysis: were customers notified promptly enough? Were the right messages sent to the right audiences? What would we change? Decision-making analysis: were decisions made quickly enough? Were the right people in the room? Where did we lose time? External partner analysis: did outside counsel and the security firm perform effectively? Employee impact analysis: how did the crisis affect engineering morale and productivity? What support is needed?' Customer retention plan: 'For each at-risk customer (those affected and those whose contracts are in negotiation): customer impact assessment, relationship damage level, retention strategy (may include: contract concessions, dedicated security review, early access to security improvements). For the largest customer ($15M/year): CEO-level engagement, independent security audit report shared directly, quarterly security briefings.' Long-term recovery metrics: '(1) Customer retention: track affected customer renewal rates vs. unaffected. (2) Brand sentiment: monitor media coverage and social media sentiment trend. (3) Security posture: track security audit findings trending toward zero. (4) Employee morale: pulse surveys at 30, 60, 90 days. (5) Trust recovery timeline: based on customer NPS recovery to pre-incident levels'"
    weight: 0.30
    description: "Post-crisis postmortem"
