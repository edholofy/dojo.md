meta:
  id: reliability-competitive-advantage
  level: 5
  course: incident-postmortem-writing
  type: output
  description: "Position reliability as competitive advantage — build the strategic case for reliability investment as business differentiation, not just cost avoidance"
  tags: [postmortem, strategy, competitive-advantage, business-case, differentiation, master]

state: {}

trigger: |
  You're the CTO of a B2B SaaS company competing against 3 major
  rivals for enterprise customers. Your platform is technically
  similar to competitors, but your reliability metrics are
  significantly better:

  - Your availability: 99.99% (52 minutes downtime/year)
  - Competitor A: 99.9% (8.7 hours/year)
  - Competitor B: 99.95% (4.4 hours/year)
  - Competitor C: does not publish reliability data

  Your postmortem practice is mature — you publish public incident
  reports, share reliability metrics transparently, and have a
  track record of learning from failures. Competitors do not.

  The CEO wants to know: how do we turn our reliability advantage
  into a competitive moat? Can we use our postmortem culture and
  reliability practices as a sales differentiator?

  Task: Write the strategic document that positions reliability
  as a competitive advantage. Include: the business case for
  reliability differentiation, how to communicate reliability
  to enterprise buyers, how to use public postmortems as a
  trust-building tool, and the reliability program investments
  needed to maintain the advantage.

assertions:
  - type: llm_judge
    criteria: "Business case connects reliability metrics to revenue and market position — business case: 'Our reliability advantage is not an engineering metric — it is a business asset. Here is why: (1) Enterprise customer acquisition cost: enterprise sales cycles average 6 months. The #1 objection in competitive deals is can we trust this platform with our mission-critical operations? Our 99.99% availability answers this objection with data. Competitor A's 99.9% means their customers experience 8.7 hours of downtime per year — that is a full business day of lost productivity. Our customers experience 52 minutes. This is not a marginal difference; it is an order of magnitude. (2) Customer retention: our customer churn rate is 4% annually vs. industry average of 12%. Exit interviews from the 4% cite feature gaps, not reliability concerns. For competitors, reliability concerns are in the top 3 churn reasons. (3) Price premium: our average contract value is 15% higher than Competitor A for similar service tiers. Enterprise buyers pay more for reliability because the cost of downtime exceeds the cost of premium pricing. (4) Deal velocity: in competitive evaluations where we share our reliability data, our win rate is 68% vs. 45% when reliability is not part of the conversation.' Total value of reliability advantage: 'If our reliability advantage contributes to: 15% price premium on $100M ARR = $15M/year in pricing power. 8% lower churn vs. industry = $8M/year in retained revenue. Higher win rate in competitive deals = estimated $5-10M/year in additional revenue. Total estimated value: $28-33M/year. Our annual reliability engineering investment: $4M. ROI: 7-8x'"
    weight: 0.35
    description: "Business case"
  - type: llm_judge
    criteria: "Public postmortems are positioned as a trust-building tool — public postmortem strategy: 'Our public incident reports are our most powerful trust signal. Here is why and how to leverage them: Why public postmortems build trust: (1) Transparency signals confidence. Companies that hide failures signal that they either have too many to discuss or lack the maturity to analyze them. Companies that publish failures signal: we have nothing to hide, we learn from mistakes, and we trust our process. (2) Technical credibility. Enterprise buyers have technical evaluators (CTOs, VPs of Engineering) who read public postmortems. A well-written postmortem demonstrates engineering excellence more effectively than marketing collateral. (3) Competitive asymmetry. If we publish postmortems and competitors do not, every incident our competitors have is a mystery (what went wrong? did they learn? will it happen again?) while our incidents are transparent learning opportunities. How to leverage in sales: (1) Include public postmortem links in enterprise proposals under a Transparency and Trust section. Message: here is how we handle failures — transparently, with accountability, and with a proven track record of preventing recurrence. (2) During competitive evaluations, ask the prospect: ask our competitor for their last 5 incident reports and what they changed. We can provide ours immediately. (3) Case study: after a well-handled incident, with customer permission, create a case study showing: what happened, how we responded, how we communicated, and what we changed. This turns incidents into sales assets.' Content standards for public postmortems: 'Balance transparency with strategic messaging. Include: clear description of what happened, honest root cause, specific prevention steps. Exclude: specific technology stack details (competitive intelligence), customer-identifying information, security vulnerability details that could be exploited elsewhere'"
    weight: 0.35
    description: "Public postmortem strategy"
  - type: llm_judge
    criteria: "Investment plan maintains the reliability moat — investment strategy: 'Competitive advantages erode if not maintained. Our reliability advantage requires ongoing investment to stay ahead. Current investment: $4M/year (SRE team, tooling, infrastructure redundancy). Recommended investment increases: (1) Reliability engineering talent: expand SRE team from 8 to 12. Cost: $800K/year. Purpose: maintain the practices (postmortems, game days, monitoring) that created the advantage. As the platform grows, the team must grow proportionally. (2) Public transparency program: dedicated investment in public-facing reliability communications. Cost: $200K/year (technical writer, status page improvements, quarterly reliability reports). Purpose: ensure our reliability advantage is visible to the market. An advantage that customers cannot see is not a competitive advantage. (3) Advanced reliability capabilities: chaos engineering program, predictive incident detection, automated remediation. Cost: $500K/year. Purpose: extend the advantage beyond what competitors can easily replicate. Basic SRE practices are becoming table stakes; advanced capabilities create a sustainable moat. (4) Reliability certification program: explore offering reliability certifications or SLA guarantees that competitors cannot match. Cost: $300K/year (audit, legal, insurance). Purpose: formalize the advantage into a marketable offering. Enterprise customers can purchase reliability commitments backed by financial guarantees.' Moat sustainability: 'Reliability culture is hard to build and easy to lose. The moat is not our tools or our metrics — it is our culture of learning from failures. This culture, embodied in our postmortem practice, is the one thing competitors cannot simply purchase or implement overnight. Our investment must protect the culture first and the technology second. Biggest risk to the moat: if we stop investing in reliability because the numbers look good, competitors will catch up. The gap narrows when we stand still.' Total recommended investment: $5.8M/year (up from $4M). Expected return: continued $28-33M/year in reliability-driven revenue advantage. Board presentation: position reliability investment as revenue protection, not cost center'"
    weight: 0.30
    description: "Investment plan"
