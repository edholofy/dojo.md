meta:
  id: master-postmortem-shift
  level: 5
  course: incident-postmortem-writing
  type: output
  description: "Master postmortem shift — navigate a company-defining incident requiring board communication, regulatory response, global coordination, competitive positioning, and organizational transformation"
  tags: [postmortem, shift-simulation, master, comprehensive, company-defining]

state: {}

trigger: |
  You are the CTO of a publicly traded cloud infrastructure company
  (market cap $8B, 4,000 engineers, customers in 40 countries).
  A catastrophic incident has just occurred:

  A software bug in your storage layer caused data corruption
  affecting 15% of your customer base across all regions. The bug
  was in a code path that was supposed to protect against data
  corruption (an ironic failure in a safety mechanism).

  The scope:
  - 3,000 of 20,000 customers affected
  - Data corruption means some customers' stored data has been
    modified (not just unavailable — actually corrupted)
  - Backups exist but are 24 hours old — some data loss is real
  - The incident was detected by customers before internal monitoring
  - Time to contain: 6 hours (the bug was in a critical path that
    couldn't be simply disabled)
  - Financial press, tech press, and social media are covering it
  - Stock is down 12% since the news broke
  - 3 class-action lawsuits filed within 48 hours
  - Your company's tagline is literally "Your data, always safe"
  - Board emergency session tomorrow
  - Enterprise customers (Fortune 500) are demanding answers
  - Regulatory inquiries from 8 jurisdictions
  - Employee morale crisis — the storage team is devastated

  This is a company-defining moment. How you handle the next 30 days
  determines whether the company recovers or enters a death spiral.

  Task: Write the comprehensive 30-day response plan. Cover every
  dimension: technical remediation, customer recovery, board and
  investor communication, regulatory response, legal strategy,
  public communication, employee support, competitive defense,
  organizational changes, and the post-crisis postmortem that
  transforms this failure into your company's defining moment of
  accountability and improvement.

assertions:
  - type: llm_judge
    criteria: "30-day plan covers all critical dimensions with clear ownership — plan structure: 'This plan is organized by phase (not by dimension) because multiple workstreams must execute in parallel. Phase 1 (days 1-3): crisis containment. Technical: deploy the fix to all regions (already in progress). Validate fix effectiveness. Begin data integrity assessment for all 3,000 affected customers. Customer: direct outreach to every affected customer within 24 hours. Enterprise (Fortune 500): CEO or CTO personal call. Mid-market: VP Customer Success call. SMB: personalized email with dedicated support line. Message: we know, we are sorry, here is exactly what we are doing, here is how to reach us 24/7. Board: emergency session. Present: what happened (2 minutes), impact scope (5 minutes), containment status (5 minutes), 30-day plan (15 minutes), financial exposure estimate (10 minutes), Q&A (remaining time). Legal: engage top-tier litigation counsel for class actions. Issue litigation hold. Begin document preservation. Do NOT settle or make admissions — but do communicate transparently. These are not contradictory. Regulatory: acknowledge inquiries in all 8 jurisdictions. Provide initial response with containment status and timeline for detailed report. Employee: CTO all-hands within 24 hours. Message: this is a company-defining moment. We will be transparent, we will fix this, and we will not blame individuals. The storage team built our platform — one bug does not define them. Psychological support resources available.' Phase 2 (days 4-14): recovery and investigation. Technical: complete data integrity assessment for all affected customers. For each customer: determine exact data affected, restore from backup where possible, identify unrecoverable data, provide customer with complete impact report. Independent forensic investigation by external firm (for credibility with regulators and courts). Root cause analysis: not just the bug, but why the safety mechanism failed, why testing did not catch it, and why customers detected it before monitoring. Customer: weekly update to all affected customers. Dedicated support team for data recovery assistance. SLA credit program announced. Board: daily written briefing (one page). Weekly video call. Financial: work with CFO to quantify total financial exposure (SLA credits, legal costs, potential settlements, customer churn, stock impact). Public: CEO blog post with detailed technical explanation (after root cause confirmed). Published public postmortem.' Phase 3 (days 15-30): transformation. This is where the incident becomes a turning point rather than a decline. Announce: comprehensive reliability investment program, external advisory board for storage reliability, independent security and reliability audit, enhanced data protection architecture, customer transparency program (regular reliability reporting)'"
    weight: 0.35
    description: "Comprehensive 30-day plan"
  - type: llm_judge
    criteria: "The plan addresses the existential risk and positions recovery as transformation — existential risk assessment: 'This incident threatens the company's existence because our entire value proposition is data safety. The tagline your data, always safe is now a liability. If we handle this poorly, the narrative becomes: they promised safety and delivered corruption. If we handle this exceptionally, the narrative becomes: they had a major failure, took full responsibility, and built something better. The difference between these narratives determines whether we lose 30% of customers or 5%.' Communication strategy for transformation: 'CEO letter to all customers and public (day 7, after root cause confirmed): a transparent, humble, and specific communication. Structure: (1) What happened — clear, technical, honest. No minimization. (2) What we got wrong — not just the bug, but the systemic factors. (3) What we are doing — specific investments with timelines. (4) What we are changing — organizational changes that show we take this seriously. (5) How we will prove it — independent audit, regular transparency reports, enhanced SLAs. Tone: this is the most important communication in our company's history. It must be: honest (do not hide or minimize), accountable (do not blame vendors, partners, or individuals), specific (do not promise vaguely — commit to measurable actions), humble (do not claim we are the best — show we are committed to earning back trust).' Organizational changes: '(1) Create a Chief Reliability Officer role reporting to CEO (not under CTO). Signal: reliability is a company-level priority, not just an engineering concern. (2) Establish an independent data integrity review board with external experts. (3) Invest $25M in reliability over 12 months (engineering, infrastructure, testing). (4) Retire the tagline. Replace with something earned, not claimed.' Employee support specifically for the storage team: 'The storage team members are likely experiencing shame, guilt, and fear. Specific actions: CTO meets with the team in person within 48 hours. Message: you built the platform that serves 20,000 customers. This bug does not define you. The systemic conditions that allowed this bug to cause corruption are an organizational failure, not a team failure. Offer: confidential psychological support, explicit protection from retaliation, opportunity to lead the remediation (they are the experts), public recognition when the remediation is complete'"
    weight: 0.35
    description: "Transformation positioning"
  - type: llm_judge
    criteria: "Post-crisis postmortem serves as the foundation for organizational transformation — post-crisis postmortem structure: 'This postmortem is unlike any other the company has written. It must serve multiple audiences and purposes simultaneously. It will be: the most detailed technical analysis the company has produced (for engineering credibility), the foundation of the legal defense (demonstrating prompt and thorough response), evidence for regulators (demonstrating we understand what happened and have remediated), a public document (for customer and market trust), and the blueprint for organizational transformation.' Technical depth: 'The storage safety mechanism (designed to detect and prevent corruption) had a bug in its error handling path. When a specific sequence of operations occurred under load, the safety check incorrectly reported success while the underlying write had been partially applied. The irony: the code path that was supposed to protect data integrity was the code path that caused data corruption. This was a second-order failure — the system did not fail to protect data; it actively reported that data was protected when it was not. Why testing missed it: the specific trigger sequence required concurrent writes to the same storage block from different regions — a condition that our testing framework did not simulate because our test environments are single-region.' Systemic analysis: 'Beyond the bug: (1) Why did customers detect it before monitoring? Our monitoring checked that writes succeeded (they did — the safety mechanism said so) but did not independently verify data integrity after writes. We trusted the safety mechanism instead of verifying its output. (2) Why did containment take 6 hours? The affected code path could not be disabled without disabling all writes — there was no surgical fix. The architecture did not support isolating the safety mechanism from the write path. (3) Why was the impact so broad? The same code ran in all regions. There was no progressive rollout for storage layer changes. A code change that affected all regions simultaneously had no blast radius containment.' Transformation commitments (specific, measurable, time-bound): '(1) Independent data integrity verification: continuous background verification of stored data integrity, independent of the write path. Detects corruption within 1 hour of occurrence. Timeline: 90 days. (2) Regional isolation for storage changes: storage layer updates deployed to one region first, with 48-hour bake time before global rollout. Timeline: 60 days. (3) External reliability advisory board: 3 independent experts who review architectural decisions for the storage layer. First meeting within 30 days. (4) Quarterly public reliability report: availability, data integrity metrics, incident summary. First report within 90 days. (5) Enhanced SLA: data integrity SLA with financial guarantees, backed by independent audit. Timeline: 120 days'"
    weight: 0.30
    description: "Transformative postmortem"
