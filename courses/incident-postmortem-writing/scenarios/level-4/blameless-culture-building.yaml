meta:
  id: blameless-culture-building
  level: 4
  course: incident-postmortem-writing
  type: output
  description: "Build blameless postmortem culture — design organizational practices that create psychological safety for honest incident analysis and learning"
  tags: [postmortem, blameless-culture, psychological-safety, organizational-learning, expert]

state: {}

trigger: |
  You're the new Director of Engineering at a company where the
  postmortem culture is toxic. Symptoms:

  - Engineers hide mistakes because they fear punishment
  - Postmortems always name "who did it" and assign blame
  - The phrase "human error" appears in 80% of root cause analyses
  - Action items are frequently "retrain the person who made the
    mistake" or "add a review step for that person's work"
  - Junior engineers are afraid to deploy because "if something
    breaks, it's on you"
  - Near-misses are never reported because "why would I tell anyone
    I almost broke something?"
  - Incident count has been declining — but not because reliability
    improved; engineers just stopped reporting incidents

  Leadership thinks reliability is improving because incident reports
  are down. You know the opposite: reliability is degrading because
  learning has stopped.

  Task: Write a proposal to transform the postmortem culture. Include:
  the case for blameless postmortems (for leadership), specific
  practices to implement, how to transition from blame culture to
  learning culture, and metrics that measure cultural health.

assertions:
  - type: llm_judge
    criteria: "Makes the business case for blameless postmortems — case for leadership: 'Our declining incident reports are not a sign of improving reliability — they are a sign of deteriorating visibility. Engineers have learned that reporting incidents leads to blame, so they stop reporting. This creates two dangerous dynamics: (1) We cannot fix problems we do not know about. Unreported incidents recur and compound. (2) Near-misses, our most valuable source of learning, are invisible because no one reports close calls when the culture punishes failure.' Evidence framework: 'Research from aviation safety, healthcare, and tech (Google SRE, Etsy, Netflix) consistently shows: organizations that punish failure get less reporting, not fewer failures. Organizations that learn from failure get fewer failures over time.' Cost of blame: 'When an engineer is blamed for an incident, the organization learns one thing: that engineer made a mistake. When an incident is analyzed without blame, the organization learns: what systemic conditions allowed the mistake to have impact, and how to change those conditions. The first approach produces one lesson. The second produces systemic improvement.' Specific risks of current culture: 'Engineers deploying less frequently to avoid risk — this means larger, riskier deployments when they do deploy. Engineers hiding near-misses — we lose our best leading indicators. Engineers leaving — our exit interviews show safety culture concerns from 3 departing engineers this quarter.' Reframe for leadership: 'Blameless does not mean accountable-less. It means we hold the system accountable, not individuals. The goal shifts from who made the mistake to why did the system allow the mistake to cause harm'"
    weight: 0.35
    description: "Business case"
  - type: llm_judge
    criteria: "Specific practices for building blameless culture are actionable — practice 1, language standards: 'Ban specific phrases from postmortems: human error as a root cause (replace with what system conditions made this error possible and impactful), [person] should have known (replace with our documentation and training did not prepare the operator for this scenario), [person] failed to (replace with the process did not include a check for this condition). Post a visible guide in postmortem templates with banned phrases and their replacements.' Practice 2, postmortem facilitation: 'Trained facilitators run postmortem meetings. Facilitator responsibilities: redirect blame language in real-time, ask systemic questions (how could anyone have made this mistake vs. why did this person make this mistake), ensure psychological safety. Facilitator training: 4-hour workshop plus shadowing 3 postmortems.' Practice 3, near-miss program: 'Create a near-miss reporting channel with explicit recognition. Monthly near-miss awards for the most valuable near-miss reports. Near-misses are celebrated because reporting them prevents future incidents. Target metric: near-miss reports should outnumber incident reports 3:1.' Practice 4, action item standards: 'Postmortem action items must target systems, not people. Banned: retrain [person], add review step for [person], [person] must get approval before deploying. Required framing: improve the deployment pipeline to catch X, add automated validation for Y, update documentation to cover Z. Every action item must answer: how does this make the system more resilient regardless of which individual is operating it?'"
    weight: 0.35
    description: "Actionable practices"
  - type: llm_judge
    criteria: "Transition plan and cultural health metrics are realistic — transition plan: 'Phase 1 (month 1): leadership commitment. CEO and VP Engineering publicly commit to blameless postmortem policy. Explicitly state: no one will be disciplined for incidents they report honestly. This must come from the top — middle management cannot create psychological safety alone. Phase 2 (months 1-2): train facilitators. Select 6-8 respected senior engineers. Train them in blameless facilitation. They facilitate all postmortems for the first 3 months. Phase 3 (months 2-3): rewrite the postmortem template. Remove fields that invite blame. Add systemic analysis prompts. Include the language guide. Phase 4 (months 3-6): build evidence. Track and share examples where blameless analysis found systemic fixes that blame-based analysis would have missed. Celebrate teams that report near-misses. Phase 5 (month 6+): measure and iterate. Survey engineers on psychological safety. Compare incident reporting rates. Adjust practices based on feedback.' Cultural health metrics: '(1) Incident reporting rate: should increase initially as hidden incidents surface. A spike in reports is a sign of success, not failure. (2) Near-miss reporting rate: target 3x incident rate. (3) Time to report: how long between an engineer discovering an issue and reporting it. Decreasing time = increasing trust. (4) Postmortem action item quality: percentage of action items that target systems vs. individuals. Target: 100% systemic. (5) Psychological safety survey: quarterly anonymous survey. Questions: I feel safe reporting mistakes. I have seen someone blamed for an incident in the last quarter. I would report a near-miss without hesitation. (6) Voluntary incident participation: are engineers volunteering for on-call and incident response, or avoiding it?' Leading vs lagging: 'Near-miss reports and psychological safety scores are leading indicators. Incident frequency and MTTR are lagging indicators. Focus on leading indicators first — lagging indicators will follow'"
    weight: 0.30
    description: "Transition and metrics"
