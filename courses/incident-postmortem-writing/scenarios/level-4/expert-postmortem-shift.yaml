meta:
  id: expert-postmortem-shift
  level: 4
  course: incident-postmortem-writing
  type: output
  description: "Expert postmortem shift — design a complete incident management and postmortem program for a growing organization with multiple teams and compliance requirements"
  tags: [postmortem, shift-simulation, expert, program-design, comprehensive]

state: {}

trigger: |
  You've been hired as the Head of Reliability at a Series C startup
  that just acquired two smaller companies. You now have:

  - 3 engineering organizations being merged (120 + 40 + 30 engineers)
  - 3 different incident response processes (or lack thereof)
  - 3 different tech stacks (but they need to integrate)
  - No unified on-call rotation
  - No shared postmortem practice
  - Regulators are watching (you process healthcare data — HIPAA)
  - Board wants a "reliability roadmap" in 60 days
  - 2 major incidents in the past month across the combined systems
    (one from integration issues between the acquired codebases)

  Task: Write the reliability roadmap document. Cover: unified
  incident response process, postmortem program design, compliance
  integration, cultural alignment (merging 3 teams with different
  practices), metrics and goals, and the 60/90/180 day plan.
  This is a comprehensive program design document.

assertions:
  - type: llm_judge
    criteria: "Reliability roadmap addresses organizational merger challenges — current state assessment: 'Three engineering organizations with different maturity levels: (1) Original company (120 engineers): informal incident process, some postmortems, basic monitoring. (2) Acquired company A (40 engineers): no formal incident process, incidents handled ad-hoc, no postmortems. (3) Acquired company B (30 engineers): mature incident process and postmortem practice, good monitoring. Our challenge is not building from zero — it is unifying three different approaches into one cohesive program while maintaining what works.' Cultural alignment strategy: 'We will not impose one team's practices on the others. Instead: (1) Identify best practices from all three organizations. Company B has the most mature incident practice — we adopt their strengths. (2) Form a cross-organization incident response working group (2 members from each organization) to design the unified process. This ensures buy-in from all teams. (3) Explicit acknowledgment: merging practices is uncomfortable. Each team has reasons for their current approach. We honor those reasons while building something better together.' Integration risk: 'The two incidents last month both involved integration points between acquired codebases. This is expected — integration surfaces unknown dependencies. The unified incident process must include: integration-specific runbooks, cross-team escalation paths that bridge former organizational boundaries, and shared monitoring across all systems. Ownership boundaries between formerly separate teams must be explicitly documented'"
    weight: 0.35
    description: "Merger challenges"
  - type: llm_judge
    criteria: "60/90/180 day plan is concrete and achievable — 60-day plan (foundations): 'Week 1-2: incident response audit. Document current processes across all three organizations. Identify gaps, overlaps, and best practices. Establish interim on-call rotation that covers all systems. Week 3-4: unified incident process v1. Adopt PagerDuty-style framework customized with best practices from Company B. Define severity levels, roles, escalation paths. Train all engineers on the basics (2-hour session). Week 5-6: postmortem program launch. Standardized template (mandatory for SEV-1/2, optional for SEV-3). Central postmortem registry. Peer review process. Week 7-8: compliance baseline. Map HIPAA incident reporting requirements to the incident process. Ensure every incident involving PHI triggers the compliance notification workflow. Deliverable for board: unified incident response process document, initial metrics dashboard, compliance integration plan.' 90-day plan (maturity): 'Months 3: IC training program. Train 12 ICs across the combined organization (at least 2 from each former company). Run 2 tabletop exercises. Month 3: SLO definition. Define SLOs for all customer-facing services across the combined platform. Establish error budgets. Connect incident impact to error budget consumption. Month 3: integration reliability. Dedicated effort to map and document all integration points between the three codebases. Add monitoring to integration boundaries. Create runbooks for integration failure modes.' 180-day plan (optimization): 'Months 4-6: postmortem effectiveness measurement. Track action item completion, incident recurrence, MTTR trends. Quarterly cross-organization incident pattern review. Game Day program launch (quarterly). Organizational learning system: weekly incident digest, pattern library, onboarding integration. Target metrics at 180 days: MTTR reduced by 30%, postmortem completion rate at 95% for SEV-1/2, zero repeat incidents from unaddressed action items, IC pool of 12 trained and certified, full HIPAA compliance for incident reporting'"
    weight: 0.35
    description: "Phased roadmap"
  - type: llm_judge
    criteria: "Compliance integration and board-level metrics are production-ready — HIPAA compliance integration: 'Every incident is assessed for PHI involvement at the start of the incident response process. IC checklist includes: does this incident involve access to, exposure of, or loss of protected health information? If yes: (1) Privacy Officer notified within 1 hour. (2) Incident documentation follows HIPAA breach assessment framework. (3) All access logs preserved as evidence. (4) Breach determination made within 48 hours with legal counsel. (5) If breach confirmed: notification timeline starts (60 days for individuals, annual report to HHS for breaches under 500 individuals, immediate for breaches over 500). Integration: the compliance assessment is a mandatory section of the postmortem template for any incident flagged as PHI-related.' Board-level metrics and reporting: 'Monthly reliability report for leadership: (1) Reliability score: percentage of time within SLO targets across all services. Target: 99.9% within 180 days. (2) Incident volume by severity: trending over time, normalized for system growth. (3) MTTR by severity: tracking improvement. (4) Postmortem action item completion rate: accountability metric. (5) Error budget status: are we within budget for the quarter? (6) Compliance status: all HIPAA requirements met, SOC 2 evidence current. (7) Integration reliability: specific metric tracking incidents at integration boundaries between acquired systems. Expected trend: decreasing as integration matures.' Board narrative: 'The board sees 4 numbers: overall reliability (SLO attainment), trend direction (improving or declining), cost of incidents (revenue impact), and investment in prevention (engineering time allocated to reliability). These connect to business outcomes: reliability drives customer retention, reduces churn risk, and is a competitive advantage in healthcare SaaS where downtime has patient safety implications'"
    weight: 0.30
    description: "Compliance and board metrics"
