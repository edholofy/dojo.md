meta:
  id: incident-commander-training
  level: 4
  course: incident-postmortem-writing
  type: output
  description: "Create incident commander training materials — design training programs and evaluation criteria for incident commanders"
  tags: [postmortem, incident-commander, training, leadership, crisis-management, expert]

state: {}

trigger: |
  Your organization needs to scale its incident commander (IC)
  capacity. Currently, only 3 senior engineers can serve as IC for
  the 150-person engineering org. This creates bottlenecks and
  burnout. You need to grow the IC pool to 12 people.

  Challenges:
  - IC skills are different from engineering skills — good engineers
    aren't automatically good ICs
  - Most engineers have never been in a leadership role during a
    crisis
  - Current ICs learned through trial and error over years
  - You need to train people faster than "learn from experience"
  - ICs must be able to facilitate blameless postmortems after the
    incident, not just manage the response

  Task: Write the incident commander training program. Include:
  curriculum, hands-on exercises, evaluation criteria, and how
  postmortem facilitation integrates into IC responsibilities.
  This should be a document that a training coordinator can use
  to run the program.

assertions:
  - type: llm_judge
    criteria: "Training curriculum covers IC competencies beyond technical skill — curriculum structure: 'Module 1: Incident Command Fundamentals (4 hours). What an IC does (and does not do): the IC coordinates, they do not debug. The IC makes decisions when consensus is absent. The IC controls the war room. Key skills: situation assessment, role assignment, decision-making under uncertainty, communication cadence. Anti-patterns: IC starts debugging (loses coordination perspective), IC allows war room to grow unchecked, IC forgets to communicate externally.' Module 2: Communication Under Pressure (3 hours). Status update framework: what is happening, what is the impact, what are we doing, when is the next update. Audience management: technical team needs different information than executives. Escalation judgment: when to escalate severity, when to involve additional teams, when to notify executives. Practice: write 5 status updates from provided incident scenarios, peer review for clarity and completeness.' Module 3: Decision-Making in Uncertainty (3 hours). When to act vs. when to gather more information. Reversible vs. irreversible decisions — bias toward action for reversible decisions. Handling conflicting recommendations from multiple experts. Time-boxing: if no diagnosis in X minutes, switch to mitigation strategy. Practice: scenario exercises with deliberately incomplete information.' Module 4: Human Factors (2 hours). Managing stress and fatigue during long incidents. Recognizing when team members need to be rotated. Handling disagreements between team members. Dealing with pressure from executives who want faster resolution. Setting a calm, focused tone when others are panicking'"
    weight: 0.35
    description: "IC curriculum design"
  - type: llm_judge
    criteria: "Hands-on exercises and evaluation criteria are practical — exercise 1, tabletop simulation (2 hours): 'Facilitator presents an evolving incident scenario in real-time. IC candidate must: assign roles, make decisions, communicate status, escalate appropriately. Scenario includes deliberate complications: conflicting information from two teams, an executive demanding immediate answers, a junior engineer who found the root cause but is being talked over. Evaluated on: role assignment speed, communication quality, decision-making rationale, ability to manage competing demands.' Exercise 2, shadow rotation (2 real incidents): 'Candidate shadows an experienced IC during 2 real incidents. After each: debrief with experienced IC covering what went well, what the candidate would have done differently, and why the IC made the decisions they did.' Exercise 3, reverse IC (1 real incident): 'Candidate serves as IC with an experienced IC shadowing. Experienced IC only intervenes if the situation is deteriorating. After: detailed debrief and feedback.' Exercise 4, postmortem facilitation practice (2 hours): 'Candidate facilitates a postmortem for a past incident (not their own). Evaluated on: maintaining blameless tone, redirecting blame language, asking systemic questions, ensuring action items are specific and owned.' Evaluation criteria: 'IC candidates are evaluated on 6 competencies, each rated 1-5: (1) Situation assessment accuracy. (2) Decision-making quality and speed. (3) Communication clarity and cadence. (4) Role delegation and war room management. (5) Stress management and team tone-setting. (6) Postmortem facilitation and blameless culture. Minimum to certify: 3 or higher on all 6, with no score below 3. Candidates scoring 2 on any competency receive targeted coaching and re-evaluate in 4 weeks'"
    weight: 0.35
    description: "Exercises and evaluation"
  - type: llm_judge
    criteria: "Postmortem facilitation is integrated as a core IC responsibility — why ICs must facilitate postmortems: 'The IC is uniquely positioned to facilitate the postmortem because they have the most complete picture of the incident. They know why decisions were made, what information was available at each point, and how the response unfolded. But facilitation requires a different skill than incident command: during the incident, the IC drives action. During the postmortem, the IC drives learning. This shift from action mode to learning mode is a distinct skill that requires training.' Postmortem facilitation curriculum: 'Setting the tone: IC opens every postmortem with an explicit statement about blamelessness. Example opening: We are here to understand what happened and improve our systems. We are not here to assign blame. Everyone involved made the best decisions they could with the information they had at the time. Active listening techniques: let people complete their account before asking questions. Ask what did you see? not why did you do that? Challenge systemic thinking: when someone says I should have caught that, redirect to what could we change so this is caught automatically? Managing difficult moments: when a manager starts assigning blame, when someone becomes defensive, when the postmortem reveals an uncomfortable organizational truth.' IC postmortem checklist: '(1) Schedule within 48 hours while memory is fresh. (2) Review the scribe notes and timeline before the meeting. (3) Open with blamelessness statement. (4) Walk through timeline — ask for corrections and additions. (5) For each contributing factor: ask what system change would prevent this, not who should have caught this. (6) Ensure every action item has an owner, a due date, and targets a system improvement. (7) Close with: what did we learn that makes us better?' Ongoing development: 'ICs peer-review each other's postmortem documents quarterly. Experienced ICs mentor new ICs through their first 3 postmortem facilitations. Annual IC retrospective: what is working in our incident response and postmortem process, what needs improvement'"
    weight: 0.30
    description: "Postmortem facilitation integration"
