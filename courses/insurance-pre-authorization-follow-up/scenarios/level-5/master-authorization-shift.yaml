meta:
  id: master-authorization-shift
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Master shift simulation — lead a transformational moment in PA history balancing congressional testimony, industry disruption, international standards, and the human cost of the authorization system"
  tags: [shift-simulation, transformational-leadership, paradigm-change, master]

state: {}

trigger: |
  You are at a pivotal moment in PA reform history.
  As the most recognized authority on prior authorization
  in the United States, you face interconnected challenges
  that will shape the future of the PA system.

  MOMENT 1 — Congressional hearing tomorrow:
  You will testify before the Senate HELP Committee
  alongside the CEO of the largest health insurer and
  the president of the AMA. The hearing will determine
  whether the "Patients Over Paperwork Act" advances.
  The bill mandates: 24-hour urgent PA response, gold
  card for 95%+ approval providers, real-time ePA for
  routine services, and annual payer PA performance
  reporting. The insurance industry is mobilizing
  against the 24-hour provision. Your testimony could
  be the deciding factor.

  MOMENT 2 — Industry disruption decision:
  A major technology company (think Google/Apple scale)
  has approached you to lead their new healthcare
  authorization division. They want to build a universal
  PA platform that would make current PA processes
  obsolete. The offer: $5M/year + equity potentially
  worth $50M. But joining them means leaving your reform
  advocacy role and potentially being seen as co-opted
  by big tech. Also, their platform would eliminate
  thousands of PA specialist jobs.

  MOMENT 3 — International speaking invitation:
  The WHO has invited you to lead a session on
  "Utilization Management and Universal Health Coverage"
  at the World Health Assembly. You must present
  recommendations for how countries building or
  reforming health systems can implement appropriate
  utilization management without creating the barriers
  the US PA system has produced.

  MOMENT 4 — Personal reckoning:
  The family of the cancer patient who died 20 years
  ago (the case that launched your career) has contacted
  you. They want to file a wrongful death lawsuit
  against the insurer, citing PA delay as a contributing
  factor. They want you to be an expert witness. Taking
  the case would make you a partisan in the very system
  you're trying to reform from a neutral position.

  Navigate all four moments:
  1. Senate testimony strategy and key arguments
  2. Technology company decision framework
  3. WHO presentation on global UM principles
  4. Expert witness decision and its implications
  5. How these four decisions interact and shape your legacy
  6. Personal values statement guiding these choices

assertions:
  - type: llm_judge
    criteria: "Senate testimony makes a compelling case for the bill while addressing legitimate concerns — doesn't dismiss the insurance industry's 24-hour provision objections; proposes workable amendments that preserve the bill's intent while acknowledging implementation realities; the testimony is quotable and persuasive."
    weight: 0.35
    description: "SenatTestimonyPersuasion"
  - type: llm_judge
    criteria: "Technology company decision engages with genuine ethical complexity — the opportunity to transform PA through technology is real, but the workforce displacement, perceived co-optation, and loss of reform independence are real trade-offs; the analysis doesn't reduce to a simple yes/no but examines conditions under which each choice serves the reform mission."
    weight: 0.35
    description: "TechDecisionComplexity"
  - type: llm_judge
    criteria: "Personal values statement provides a coherent framework — the four decisions are not independent; they reflect a consistent set of values about patient protection, systemic reform, personal integrity, and professional legacy; the values statement explains why these specific choices align with the person's lifelong mission."
    weight: 0.30
    description: "ValuesCoherence"
