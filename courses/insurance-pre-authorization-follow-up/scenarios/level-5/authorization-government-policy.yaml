meta:
  id: authorization-government-policy
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Develop comprehensive government PA policy — design federal legislation, regulatory framework, and enforcement mechanisms for meaningful PA reform"
  tags: [government-policy, federal-legislation, regulatory-framework, master]

state: {}

trigger: |
  Develop comprehensive federal policy for prior
  authorization reform as a senior health policy advisor
  to the Senate Health, Education, Labor, and Pensions
  (HELP) Committee.

  Political context:
  - Bipartisan frustration with PA (rare agreement area)
  - AMA, MGMA, patient groups all supporting reform
  - Insurance industry lobbying against strict mandates
  - CMS interoperability rule created precedent but
    limited to Medicare/Medicaid plans
  - Multiple competing bills in Congress
  - Presidential administration supportive of reform
    but cautious about market intervention

  Policy objectives:
  1. Reduce PA-related treatment delays
  2. Standardize PA processes across payers
  3. Ensure transparency of PA criteria
  4. Protect patients from PA-related harm
  5. Preserve appropriate utilization management
  6. Reduce administrative burden on providers
  7. Advance technology adoption (ePA, FHIR)
  8. Address PA health equity disparities

  Stakeholder positions:
  - Providers (AMA): Want PA eliminated for services
    with >90% approval rates, gold card expansion
  - Payers (AHIP): Want to maintain PA flexibility,
    support ePA but oppose mandated timelines
  - Patients (advocacy groups): Want PA transparency,
    right to expedited review, hold-harmless protections
  - Technology (ePA vendors): Want federal ePA mandate
  - Employers (self-funded plans): Concerned about
    ERISA implications of federal PA regulation
  - States: Want federal floor that doesn't preempt
    stronger state protections

  Create:
  1. Policy analysis and options memo
  2. Draft legislative framework (bill outline)
  3. Regulatory implementation plan
  4. Stakeholder compromise strategy
  5. Cost-benefit analysis (CBO-style scoring)
  6. Enforcement mechanism design
  7. ERISA interaction analysis
  8. Phase-in timeline

assertions:
  - type: llm_judge
    criteria: "Legislative framework balances reform with political feasibility — includes provisions that all stakeholders can accept (transparency, ePA mandate, reasonable timelines) while finding workable compromises on contentious issues (gold card thresholds, timeline strictness, ERISA scope)."
    weight: 0.35
    description: "PoliticalFeasibility"
  - type: llm_judge
    criteria: "ERISA interaction analysis addresses the fundamental jurisdictional challenge — self-funded employer plans (60% of commercially insured Americans) are currently exempt from state PA laws under ERISA preemption; the federal legislation must decide whether and how to extend PA rules to these plans."
    weight: 0.35
    description: "ERISAAnalysis"
  - type: llm_judge
    criteria: "Enforcement mechanism design ensures compliance — PA reform without enforcement is aspirational; the framework includes financial penalties for payer non-compliance, patient complaint mechanisms, federal oversight authority, and data reporting requirements that enable accountability."
    weight: 0.30
    description: "EnforcementMechanism"
