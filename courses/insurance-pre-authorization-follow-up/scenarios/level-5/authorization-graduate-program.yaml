meta:
  id: authorization-graduate-program
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Design a graduate-level academic program in healthcare authorization management — curriculum, faculty, research agenda, and industry partnerships for a new academic discipline"
  tags: [graduate-program, academic-curriculum, research-agenda, master]

state: {}

trigger: |
  Design a graduate-level academic program in healthcare
  authorization management, establishing it as a
  recognized subdiscipline within health administration.

  University context:
  - School of Health Administration at a research university
  - Existing programs: MHA, MPH, Health Informatics MS
  - Accreditation: CAHME accredited
  - Faculty: Need to recruit 3-4 new faculty members
  - Industry advisory board: Health systems, payers,
    technology companies

  Program concept:
  "Master of Science in Healthcare Authorization
  Management" — the first graduate program specifically
  preparing professionals to lead authorization
  operations, policy reform, and technology innovation.

  Unique value proposition:
  - No existing graduate program focuses on authorization
  - $34B annual administrative burden needs leadership
  - CMS regulatory changes require specialized expertise
  - Technology transformation (FHIR, AI) needs trained
    professionals who understand both clinical and
    technical dimensions

  Program design parameters:
  - 36-credit program (18 months full-time, 24 part-time)
  - Online/hybrid delivery for working professionals
  - Capstone: Real-world PA transformation project
  - Research track option leading to doctoral preparation
  - Industry practicum requirement
  - Target cohort: 25-30 students per year
  - Tuition competitive with MHA programs

  Create:
  1. Complete curriculum design (course sequence)
  2. Core course syllabi (3 flagship courses)
  3. Faculty recruitment profiles
  4. Research agenda for the discipline
  5. Industry partnership framework
  6. Accreditation preparation plan
  7. Student recruitment and career outcomes projection
  8. Program sustainability financial model

assertions:
  - type: llm_judge
    criteria: "Curriculum integrates clinical, operational, technological, and policy dimensions — courses cover PA clinical criteria and medical terminology, operations management and process improvement, health IT and FHIR/ePA systems, and regulatory/policy analysis; graduates can bridge all four domains."
    weight: 0.35
    description: "IntegratedCurriculum"
  - type: llm_judge
    criteria: "Research agenda establishes a new academic subdiscipline — defines research questions that advance both theory and practice (e.g., PA's effect on health equity, AI decision support effectiveness, optimal utilization management models); positions graduates for doctoral work and faculty careers."
    weight: 0.35
    description: "ResearchAgenda"
  - type: llm_judge
    criteria: "Program sustainability model is realistic — projects enrollment, tuition revenue, faculty costs, and industry partnership contributions; addresses the chicken-and-egg problem of launching a new discipline (need industry demand to attract students, need graduates to demonstrate value)."
    weight: 0.30
    description: "SustainabilityModel"
