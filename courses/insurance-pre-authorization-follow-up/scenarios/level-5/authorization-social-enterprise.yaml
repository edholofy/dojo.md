meta:
  id: authorization-social-enterprise
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Launch a social enterprise addressing PA-related health inequity — build an organization providing PA navigation, advocacy, and technology for underserved patients and safety-net providers"
  tags: [social-enterprise, health-equity, patient-advocacy, master]

state: {}

trigger: |
  Launch a social enterprise that addresses the
  disproportionate impact of prior authorization
  barriers on underserved populations.

  Problem statement:
  PA barriers disproportionately affect:
  - Low-income patients who can't navigate complex processes
  - Non-English speaking patients who can't advocate
  - Rural patients with fewer provider options
  - Patients with mental health and SUD conditions
  - Uninsured patients needing charity care PA
  - Safety-net providers with limited PA staff

  Evidence of inequity:
  - Medicaid patients face 40% higher PA denial rates
    than commercial patients for the same services
  - Black and Hispanic patients are 25% more likely to
    have PA-related treatment delays
  - Rural FQHCs spend 3x more per PA than urban practices
    due to lack of ePA infrastructure
  - 60% of safety-net providers report PA causes them
    to stop offering certain services to Medicaid patients

  Social enterprise concept:
  "AuthorizeHealth" — a B-corp providing:
  1. Free PA navigation for underserved patients
  2. Shared PA services for safety-net providers
  3. Technology solutions adapted for low-resource settings
  4. Policy advocacy for PA equity
  5. Training for community health workers on PA navigation

  Funding model:
  - Foundation grants (initial capital)
  - Government contracts (Medicaid support services)
  - Sliding-scale fees from providers
  - Technology licensing to larger health systems
  - Impact investment for social return

  Create:
  1. Social enterprise business plan
  2. Health equity impact framework
  3. Patient navigation service model
  4. Shared services operational design
  5. Technology platform for low-resource settings
  6. Funding and sustainability strategy
  7. Impact measurement methodology
  8. Scaling strategy (local to national)

assertions:
  - type: llm_judge
    criteria: "Patient navigation service model addresses root causes of PA inequity — language barriers, health literacy, transportation for in-person PA requirements, technology access, and the power differential between patients and insurance companies; community health workers are trained as PA advocates."
    weight: 0.35
    description: "PatientNavigationModel"
  - type: llm_judge
    criteria: "Shared services model is economically viable for safety-net providers — FQHCs and community health centers can't afford individual PA staff; the shared model pools PA expertise across multiple providers, reducing per-provider cost while maintaining quality; addresses both urban and rural deployment."
    weight: 0.35
    description: "SharedServicesViability"
  - type: llm_judge
    criteria: "Impact measurement goes beyond access metrics — measures not just PA completion rates but downstream health outcomes (treatment delay reduction, disease progression prevention, emergency utilization avoided); connects PA equity to health equity outcomes."
    weight: 0.30
    description: "ImpactMeasurement"
