meta:
  id: global-authorization-standards
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Develop global utilization management standards — compare US PA with international approaches, design international best practices framework, and propose harmonized standards"
  tags: [global-standards, international-comparison, harmonization, master]

state: {}

trigger: |
  Develop a global framework for utilization management
  and prior authorization by analyzing international
  approaches and synthesizing best practices.

  Comparative analysis scope:

  United States:
  - Commercial payer PA system (current)
  - Medicare/Medicaid PA requirements
  - CMS interoperability reform
  - State-level PA reform movement

  United Kingdom (NHS):
  - Individual Funding Requests (IFR) process
  - NICE technology appraisals as implicit PA
  - Clinical Commissioning Group formulary controls
  - No patient-level PA for most standard treatments
  - Challenge: Wait times serve as implicit rationing

  Germany (Statutory Health Insurance):
  - Joint Federal Committee (G-BA) determines coverage
  - Regional KV approval for specialist referrals
  - Drug prescribing quotas vs. explicit PA
  - Step therapy embedded in prescribing guidelines
  - Challenge: Budgetary pressure on physicians

  Canada (Provincial systems):
  - Provincial formulary exception processes
  - Wait time management for procedures
  - Special authorization for high-cost medications
  - No universal PA for procedures (implicit rationing)
  - Challenge: Regional variation in access

  Australia (PBS/MBS):
  - Pharmaceutical Benefits Scheme authority prescriptions
  - Medicare Benefits Schedule restrictions
  - Section 100 highly specialized drug access
  - Relatively streamlined electronic authorization
  - Challenge: Equity between urban and rural access

  Japan (NHI):
  - Point-based fee schedule as implicit utilization control
  - Retrospective review (audit) vs. prospective PA
  - Regional review committees for high-cost treatments
  - Challenge: Rapidly aging population pressures

  Create:
  1. Comprehensive international comparison matrix
  2. Best practices synthesis across systems
  3. Universal utilization management principles
  4. Technology interoperability recommendations
  5. Patient-centered design framework
  6. Implementation adaptability guide
  7. Research agenda for global UM optimization

assertions:
  - type: llm_judge
    criteria: "International comparison reveals structural insights — identifies that prospective PA (US) vs. retrospective audit (Japan) vs. implicit rationing (UK wait times, Canada) represent fundamentally different approaches to the same problem of resource allocation; each has trade-offs the US system could learn from."
    weight: 0.35
    description: "StructuralInsights"
  - type: llm_judge
    criteria: "Best practices synthesis is actionable for US reform — doesn't just describe other systems; identifies specific mechanisms that could be adapted (e.g., Australia's streamlined electronic authority, Germany's guideline-embedded step therapy, UK's NICE as system-level PA) with implementation considerations."
    weight: 0.35
    description: "ActionableSynthesis"
  - type: llm_judge
    criteria: "Universal principles transcend system-specific contexts — identifies core principles (transparency of criteria, timeliness of decisions, patient appeal rights, evidence-based standards, administrative proportionality) that apply regardless of healthcare system structure."
    weight: 0.30
    description: "UniversalPrinciples"
