meta:
  id: authorization-memoir
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Write a professional memoir on PA reform advocacy — craft a narrative that humanizes the PA crisis through personal and patient stories, culminating in a vision for systemic change"
  tags: [professional-memoir, pa-advocacy, narrative-craft, master]

state: {}

trigger: |
  Write a professional memoir chronicling your 20-year
  journey from PA specialist to national PA reform
  advocate, using personal stories to humanize the
  crisis and inspire change.

  Author's career arc:
  - Year 1-3: PA specialist at a small practice. First
    encountered the system's dysfunction when a patient's
    cancer treatment was delayed 3 weeks by PA. The patient
    died 6 months later. Always wondered if the delay
    mattered.
  - Year 4-7: PA supervisor at a hospital. Built a team
    of 8 specialists. Watched burnout destroy talented
    people. One specialist processed 45 PAs per day,
    broke down crying, and quit healthcare entirely.
  - Year 8-12: Director of PA operations at a health
    system. Introduced ePA, reduced denials by 40%.
    But the wins felt small against the systemic problem.
    Started writing articles about PA burden.
  - Year 13-16: VP of Revenue Cycle. Had direct contact
    with payer executives for the first time. Discovered
    many were sympathetic but trapped by their own systems.
    A payer medical director confided: "I deny cases I
    know should be approved because the criteria leave
    no choice."
  - Year 17-20: National advocate and consultant. Testified
    before Congress. Helped draft state PA reform bills.
    Worked with CMS on the interoperability rule. Still
    meets patients harmed by PA every month.

  Key stories to develop:
  1. The cancer patient who started it all
  2. The burnout crisis among PA staff
  3. The technology breakthrough (and its limits)
  4. The payer medical director's confession
  5. The legislative victory (and what it didn't change)
  6. The patient who fought back and won
  7. The vision for what PA should become

  Create:
  1. Book structure and chapter outline
  2. Opening chapter (complete draft)
  3. Key narrative threads and how they interweave
  4. Reflection on systemic vs. individual change
  5. Vision chapter outline (the future of PA)
  6. Author's note on methodology and ethics
  7. Discussion guide for healthcare leadership teams

assertions:
  - type: llm_judge
    criteria: "Opening chapter establishes emotional stakes immediately — the reader understands within the first pages that PA is not an abstract administrative issue but a system that affects real patients, real healthcare workers, and real clinical outcomes; the personal voice is authentic and compelling."
    weight: 0.35
    description: "EmotionalStakes"
  - type: llm_judge
    criteria: "Narrative threads balance personal story with systemic analysis — doesn't wallow in individual tragedy or abstract into policy wonkery; uses personal experiences to illuminate systemic dysfunction and uses systemic analysis to contextualize personal stories."
    weight: 0.35
    description: "PersonalSystemicBalance"
  - type: llm_judge
    criteria: "Vision chapter transcends complaint — after documenting the crisis, offers a specific, achievable vision for what PA should become; the reader finishes the book with both righteous anger and pragmatic hope; the discussion guide enables healthcare teams to translate inspiration into action."
    weight: 0.30
    description: "TranscendentVision"
