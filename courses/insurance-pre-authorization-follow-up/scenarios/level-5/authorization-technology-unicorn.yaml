meta:
  id: authorization-technology-unicorn
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Build a venture-scale PA technology company — develop a platform strategy, raise venture capital, navigate regulatory complexity, and scale to transform the PA industry"
  tags: [technology-unicorn, venture-scale, platform-strategy, master]

state: {}

trigger: |
  Build a venture-scale technology company that
  fundamentally transforms the prior authorization
  industry through an intelligent platform connecting
  providers, payers, and patients.

  Company concept: "ClearPath Health"
  Vision: "Make prior authorization invisible."

  Platform strategy:
  Unlike existing PA tools that automate provider-side
  submission, ClearPath sits between providers and payers
  as an intelligent middleware that:
  - Translates clinical intent into payer-specific PA
    language automatically
  - Predicts PA outcomes with 95%+ accuracy
  - Enables real-time PA adjudication for 80% of requests
  - Provides payers with structured clinical data that
    reduces their review burden
  - Gives patients transparent PA status and advocacy tools

  Market dynamics:
  - TAM: $34B annual PA administrative spend
  - SAM: $8B (technology-addressable portion)
  - SOM: $800M (initial target segments)
  - Competitive landscape: CoverMyMeds (owned by McKesson),
    Availity, SureScripts (pharmacy only), eviCore (payer-side)
  - Disruption opportunity: No platform serves both sides

  Venture capital fundraise:
  - Series A: $25M (product-market fit, first 50 clients)
  - Series B: $80M (scale to 500 clients, payer partnerships)
  - Series C: $200M (market leadership, international)
  - Target valuation at Series C: $2B+

  Regulatory and strategic risks:
  - HIPAA compliance for middleware handling PHI
  - Potential conflicts of interest (serving both sides)
  - CMS regulation could either enable or threaten the model
  - Payer resistance to disintermediation
  - EHR vendor competition (Epic, Oracle Health building PA)

  Create:
  1. Pitch deck (Series A)
  2. Platform architecture and technical differentiation
  3. Go-to-market strategy (two-sided marketplace)
  4. Competitive moat analysis
  5. Regulatory strategy (HIPAA, CMS, state laws)
  6. Unit economics and path to profitability
  7. Team and hiring plan
  8. Risk mitigation strategy

assertions:
  - type: llm_judge
    criteria: "Two-sided marketplace strategy solves the chicken-and-egg problem — explains how to acquire both provider and payer clients when each side's value depends on the other; likely starts provider-side (easier acquisition) and brings data/volume to attract payers."
    weight: 0.35
    description: "MarketplaceStrategy"
  - type: llm_judge
    criteria: "Competitive moat is defensible — identifies sustainable advantages beyond first-mover (network effects from two-sided data, ML model improvement with scale, switching costs from workflow integration, regulatory compliance as barrier to entry); explains why McKesson/CoverMyMeds can't easily replicate."
    weight: 0.35
    description: "CompetitiveMoat"
  - type: llm_judge
    criteria: "Risk mitigation addresses the biggest existential threats — CMS could mandate free PA APIs (destroying the value proposition), Epic could build equivalent functionality (platform risk), or payers could refuse to participate; each risk has a specific mitigation strategy."
    weight: 0.30
    description: "ExistentialRiskMitigation"
