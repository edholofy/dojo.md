meta:
  id: authorization-thought-leadership
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Establish thought leadership in PA reform — develop a multi-platform content strategy, keynote addresses, and policy white papers that shape the national PA reform conversation"
  tags: [thought-leadership, pa-reform, policy-influence, master]

state: {}

trigger: |
  Establish yourself as a national thought leader in
  pre-authorization reform, shaping the conversation
  around how PA should evolve to better serve patients,
  providers, and the healthcare system.

  Your platform:
  - Chief PA Strategy Officer at a top-10 health system
  - Board member, AMA Prior Authorization Reform Coalition
  - Advisory role to CMS on interoperability policy
  - Author of widely-cited PA burden research
  - 15,000 LinkedIn followers in healthcare leadership
  - Regular contributor to Health Affairs Blog

  Thought leadership vision:
  "Prior authorization should transition from a
  retrospective barrier to a prospective clinical
  support tool — embedded in clinical workflows,
  driven by real-time data, and focused on guiding
  appropriate care rather than denying it."

  Key messages to develop:
  1. The current PA model is clinically harmful and
     administratively unsustainable
  2. Technology (FHIR, AI) can transform PA from
     barrier to support
  3. Regulatory reform is necessary but insufficient
     without operational transformation
  4. The payer-provider adversarial model around PA
     must evolve toward collaboration
  5. Patient voice must be central to PA reform

  Platforms and opportunities:
  - HIMSS annual conference keynote (accepted)
  - Health Affairs policy brief (invited)
  - Congressional briefing on PA reform (scheduled)
  - Healthcare startup advisory board (offered)
  - University healthcare leadership course (guest lecture)

  Create:
  1. Thought leadership strategic plan
  2. HIMSS keynote address outline and key slides
  3. Health Affairs policy brief
  4. Congressional briefing testimony
  5. Content calendar (12 months)
  6. Stakeholder engagement map
  7. Impact measurement framework

assertions:
  - type: llm_judge
    criteria: "Thought leadership messaging is distinctive and forward-looking — doesn't just rehash the PA burden problem; proposes a specific vision for what PA should become (prospective clinical support) that resonates with both provider and payer audiences; the 'PA as clinical support tool' framing redefines the conversation."
    weight: 0.35
    description: "DistinctiveVision"
  - type: llm_judge
    criteria: "Congressional briefing is politically astute — presents PA reform as bipartisan (patient protection + administrative simplification + cost reduction appeal to both sides); provides specific policy recommendations that are implementable within current legislative frameworks."
    weight: 0.35
    description: "PoliticalAstuteness"
  - type: llm_judge
    criteria: "Impact measurement framework tracks influence beyond vanity metrics — measures policy changes influenced, health system practices adopted, payer policy modifications, and patient outcome improvements attributable to advocacy; connects thought leadership activities to tangible PA reform outcomes."
    weight: 0.30
    description: "ImpactMeasurement"
