meta:
  id: authorization-research-handbook
  level: 5
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Edit a comprehensive research handbook on utilization management — curate and organize the definitive academic reference covering PA theory, methodology, evidence, and policy"
  tags: [research-handbook, academic-reference, definitive-guide, master]

state: {}

trigger: |
  Edit a comprehensive research handbook that serves
  as the definitive academic reference on utilization
  management and prior authorization.

  Publisher: Oxford University Press, Health Policy Series
  Role: You are the editor-in-chief, responsible for
  the entire volume

  Handbook scope:
  "The Oxford Handbook of Healthcare Utilization
  Management: Prior Authorization, Clinical Review,
  and Resource Allocation"

  The handbook should be the go-to reference for:
  - Health policy researchers studying UM/PA
  - Healthcare administration doctoral students
  - Policy analysts evaluating PA reform
  - Health system leaders designing UM programs
  - International scholars comparing systems

  Section structure to develop:

  Part I — Foundations (5 chapters):
  - History and evolution of utilization management
  - Economic theory of PA as a rationing mechanism
  - Clinical evidence for PA effectiveness
  - Legal and regulatory framework
  - Ethical dimensions of PA

  Part II — Systems and Processes (6 chapters):
  - PA administration and workflow
  - Technology and automation
  - Appeals and external review
  - Specialty-specific PA considerations
  - Pharmacy benefit management and formulary PA
  - Behavioral health and parity

  Part III — Outcomes and Evidence (5 chapters):
  - Clinical impact of PA on patient outcomes
  - Administrative burden measurement
  - Health equity and PA disparities
  - Cost-effectiveness of PA programs
  - Provider and patient experience

  Part IV — Reform and Innovation (5 chapters):
  - US federal PA reform (CMS rules)
  - State-level PA reform legislation
  - International UM approaches
  - Technology innovation (AI, FHIR, real-time PA)
  - Future of utilization management

  Part V — Practice and Implementation (4 chapters):
  - PA operations best practices
  - Workforce development
  - Payer-provider collaboration models
  - Performance measurement and benchmarking

  Create:
  1. Complete handbook prospectus (publisher-ready)
  2. Detailed chapter outlines for all 25 chapters
  3. Author recruitment strategy (leading scholars)
  4. Editorial guidelines and standards
  5. Research methodology appendix
  6. Index structure and cross-references
  7. Timeline and production schedule

assertions:
  - type: llm_judge
    criteria: "Chapter outlines demonstrate comprehensive coverage — each chapter has a specific research question, literature review scope, methodological approach, and unique contribution; together the 25 chapters create a complete reference with minimal overlap and maximal coverage."
    weight: 0.35
    description: "ComprehensiveCoverage"
  - type: llm_judge
    criteria: "Author recruitment targets the right scholars — identifies specific research areas and the types of experts needed (health economists for cost-effectiveness, health informatics researchers for technology, health law scholars for regulatory chapters); creates a balanced editorial board."
    weight: 0.35
    description: "AuthorRecruitment"
  - type: llm_judge
    criteria: "Handbook fills a genuine academic gap — positions this as the first comprehensive academic treatment of PA/UM as a distinct research domain; demonstrates that existing literature is fragmented across health policy, health services research, and health informatics journals without a unified reference."
    weight: 0.30
    description: "AcademicGapFilling"
