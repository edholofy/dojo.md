meta:
  id: multi-payer-coordination
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Manage pre-authorization coordination across multiple insurance payers — navigate different requirements, timelines, and submission processes for complex patient coverage"
  tags: [multi-payer, coordination, complex-coverage, intermediate]

state: {}

trigger: |
  Manage pre-authorization coordination for patients
  with complex insurance situations involving multiple
  payers with different requirements.

  Case 1 — Dual coverage:
  Patient Maria Lopez has both employer-sponsored UHC
  (primary) and her spouse's Aetna plan (secondary).
  She needs a hysterectomy (CPT 58150). Both plans
  require PA. UHC requires clinical notes and failed
  conservative treatment documentation. Aetna requires
  only an authorization number from the primary insurer
  plus the procedure code.

  Case 2 — Medicare + Medicaid (dual eligible):
  Patient Harold Jones, age 72, has Medicare (primary)
  and Medicaid (secondary). He needs a power wheelchair
  (HCPCS K0856). Medicare requires a face-to-face exam
  within 45 days, a detailed written order, and specific
  mobility assessment documentation. Medicaid requires
  a separate PA through the state's managed care plan.

  Case 3 — Workers' comp + commercial:
  Patient Steve Miller was injured at work but has an
  existing related condition. His back surgery may be
  partially work-related (workers' comp via Travelers
  Insurance) and partially degenerative (commercial
  insurance via Cigna). Both insurers need to determine
  coverage responsibility.

  Create:
  1. Coordination workflow for each case
  2. Payer-specific requirement comparison matrix
  3. Submission sequencing strategy (which payer first)
  4. Communication templates for each payer
  5. Timeline management across payers
  6. Patient communication about complex coverage

assertions:
  - type: llm_judge
    criteria: "Submission sequencing is correct — primary insurer authorization must be obtained first before secondary; workers' comp determination should precede commercial insurance; the sequence prevents wasted effort and delays."
    weight: 0.35
    description: "SequencingCorrectness"
  - type: llm_judge
    criteria: "Payer-specific requirements are accurately differentiated — recognizes that Medicare DME has unique documentation requirements, that Medicaid managed care adds a layer, and that workers' comp has fundamentally different processes."
    weight: 0.35
    description: "PayerDifferentiation"
  - type: llm_judge
    criteria: "Patient communication about complex coverage is clear without being overwhelming — explains who is responsible for what, what the patient needs to do (if anything), and realistic timelines given the coordination complexity."
    weight: 0.30
    description: "PatientClarityComplexCoverage"
