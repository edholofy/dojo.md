meta:
  id: denial-pattern-analysis
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Analyze denial patterns and develop prevention strategies — data-driven approach to reducing pre-authorization denials through root cause analysis"
  tags: [denial-analysis, root-cause, prevention-strategy, intermediate]

state: {}

trigger: |
  Analyze pre-authorization denial patterns for a
  medical practice and develop targeted prevention
  strategies based on root cause analysis.

  Practice: Mountain View Medical Group
  - 20 providers, 5 specialties
  - Monthly PA volume: 350 requests
  - Overall denial rate: 26% (industry avg: 15-20%)
  - Annual estimated revenue loss from denials: $840K

  Denial data (past 6 months, 2,100 requests):

  By denial reason:
  - Medical necessity not established: 38%
  - Incomplete documentation: 24%
  - Service not covered under plan: 15%
  - Step therapy requirements not met: 12%
  - Provider not in-network: 6%
  - Administrative errors (wrong codes, etc.): 5%

  By specialty:
  - Pain management: 42% denial rate (highest)
  - Orthopedics: 28%
  - Cardiology: 20%
  - Gastroenterology: 18%
  - Primary care: 15%

  By payer:
  - Cigna: 35% denial rate
  - Aetna: 28%
  - UHC: 22%
  - BCBS: 20%
  - Medicare: 18%
  - Medicaid: 30%

  By submission method:
  - Fax: 32% denial rate
  - Phone: 28%
  - Portal: 20%
  - ePA: 14% (lowest)

  Appeal outcomes:
  - Appeals filed: 45% of denials
  - Appeal success rate: 42%
  - Average appeal turnaround: 38 days
  - Revenue recovered through appeals: $180K

  Create:
  1. Root cause analysis report
  2. Specialty-specific denial prevention strategies
  3. Payer-specific submission optimization
  4. Documentation quality improvement plan
  5. Appeal prioritization framework
  6. Staff training plan based on findings
  7. KPI dashboard for ongoing monitoring

assertions:
  - type: llm_judge
    criteria: "Root cause analysis goes beyond surface-level statistics — identifies why pain management has highest denial rate (likely criteria-specific issues), why Cigna denials are disproportionate, and what makes ePA submissions more successful."
    weight: 0.35
    description: "RootCauseDepth"
  - type: llm_judge
    criteria: "Prevention strategies are targeted and actionable — doesn't just say 'improve documentation' but specifies which documentation gaps cause which denials, with specific templates, checklists, or workflow changes for each specialty."
    weight: 0.35
    description: "PreventionStrategiesTargeted"
  - type: llm_judge
    criteria: "Appeal prioritization framework maximizes recovery ROI — focuses appeal resources on cases with highest revenue impact and highest win probability; $180K recovered vs $840K lost shows significant opportunity."
    weight: 0.30
    description: "AppealPrioritizationROI"
