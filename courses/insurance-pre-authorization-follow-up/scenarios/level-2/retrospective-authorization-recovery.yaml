meta:
  id: retrospective-authorization-recovery
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Recover from missed or lapsed pre-authorizations — develop retroactive authorization requests, gap-in-authorization strategies, and financial protection plans for patients"
  tags: [retrospective-authorization, gap-recovery, financial-protection, intermediate]

state: {}

trigger: |
  Develop strategies to recover from pre-authorization
  gaps that have put patient services and practice
  revenue at risk.

  Case 1 — Missed initial authorization:
  Patient: Sandra Williams, age 48
  Insurance: Cigna HMO
  Service: MRI of lumbar spine performed 5 days ago
  Issue: Front desk staff ordered MRI without verifying
  PA requirement. Cigna requires PA for all advanced
  imaging under HMO plans. Service already rendered.
  Claim amount: $2,800
  Deadline for retro-auth request: 30 days from service

  Case 2 — Lapsed authorization:
  Patient: Robert Kim, age 67
  Insurance: Medicare Advantage (Humana)
  Service: Ongoing physical therapy (3x/week)
  Issue: Initial authorization for 24 visits expired.
  Patient continued therapy for 6 additional visits
  without renewal authorization being filed.
  Claim amount: $1,200 (6 unauthorized visits)
  Humana retro-auth policy: Case-by-case review

  Case 3 — Authorization for wrong provider:
  Patient: Maria Santos, age 39
  Insurance: UnitedHealthcare PPO
  Service: Outpatient surgery (authorized)
  Issue: Surgery was authorized for Dr. Smith, but
  Dr. Johnson (same practice, same specialty) performed
  it due to scheduling conflict. UHC denied claim —
  "service performed by unauthorized provider."
  Claim amount: $12,500

  Create:
  1. Retroactive authorization request for each case
  2. Clinical justification for each scenario
  3. Process improvement to prevent recurrence
  4. Patient communication plan
  5. Financial contingency for each case
  6. Staff training points from each failure

assertions:
  - type: llm_judge
    criteria: "Retroactive authorization requests are tailored to each payer's retro-auth policy — Cigna HMO has different retro-auth rules than Medicare Advantage or UHC PPO; each request uses the correct process, forms, and timelines rather than a generic approach."
    weight: 0.35
    description: "PayerSpecificRetroAuth"
  - type: llm_judge
    criteria: "Process improvements target root causes — missed PA caught by verification workflow, lapsed PA caught by expiration tracking system, wrong-provider PA caught by scheduling-authorization integration; each fix prevents the specific failure mode."
    weight: 0.35
    description: "RootCauseProcessFix"
  - type: llm_judge
    criteria: "Patient financial protection is addressed — patients should not bear costs for practice administrative failures; identifies hold-harmless obligations, patient notification requirements, and financial counseling for worst-case scenarios."
    weight: 0.30
    description: "PatientFinancialProtection"
