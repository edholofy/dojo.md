meta:
  id: epa-workflow-optimization
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Optimize electronic prior authorization workflows — streamline ePA processes, reduce turnaround time, and improve approval rates through systematic improvements"
  tags: [epa-optimization, workflow-improvement, turnaround-reduction, intermediate]

state: {}

trigger: |
  Optimize the electronic prior authorization workflow
  for a multi-specialty practice transitioning from
  fax-based to primarily electronic PA submission.

  Current state:
  - Practice: 15 providers, 4 specialties
  - Monthly PA volume: 280 requests
  - Current process: 70% fax, 20% phone, 10% ePA
  - Average turnaround: 4.2 business days
  - First-pass approval rate: 62%
  - Denial rate: 23% (15% overturned on appeal)
  - Staff: 2 full-time PA specialists

  Target state:
  - 80% ePA, 15% portal, 5% phone/fax
  - Average turnaround: under 2 business days
  - First-pass approval rate: 80%+
  - Denial rate: under 12%

  EHR system: Epic (ePA module available)
  Payer ePA readiness:
  - UnitedHealthcare: Full ePA support
  - Aetna: Partial (medications only)
  - BCBS: Full ePA support
  - Cigna: Portal-based (no true ePA)
  - Medicare: Varies by MAC
  - Medicaid: State portal required

  Improvement opportunities identified:
  - Clinical documentation often incomplete at submission
  - Wrong CPT codes used 8% of the time
  - No pre-submission quality check
  - Staff not trained on ePA module features
  - No tracking of payer-specific approval patterns

  Create:
  1. ePA transition plan and timeline
  2. Pre-submission quality checklist
  3. Payer-specific submission guide
  4. Staff training curriculum for ePA
  5. Denial analysis and prevention strategy
  6. Performance metrics dashboard
  7. Continuous improvement process

assertions:
  - type: llm_judge
    criteria: "Pre-submission quality checklist targets the highest-impact errors — addresses incomplete documentation (top denial cause), wrong CPT codes, missing comorbidity documentation, and step therapy history; the checklist prevents the most common preventable denials."
    weight: 0.35
    description: "QualityChecklistImpact"
  - type: llm_judge
    criteria: "Transition plan acknowledges payer-specific ePA readiness — doesn't assume all payers support ePA equally; creates specific workflows for each payer's capability level; Cigna's portal-only approach gets different treatment than UHC's full ePA."
    weight: 0.35
    description: "PayerReadinessRealism"
  - type: llm_judge
    criteria: "Denial analysis identifies patterns that inform prevention — tracks denial reasons by payer, procedure type, and provider to find systematic issues (e.g., one provider's documentation always triggers denials for imaging); uses data to drive targeted training."
    weight: 0.30
    description: "DenialPatternAnalysis"
