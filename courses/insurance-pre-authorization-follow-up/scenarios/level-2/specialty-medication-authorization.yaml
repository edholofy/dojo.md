meta:
  id: specialty-medication-authorization
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Navigate specialty medication prior authorization — biologics, oncology drugs, and high-cost therapeutics with complex step therapy and formulary requirements"
  tags: [specialty-medication, biologics, formulary-management, intermediate]

state: {}

trigger: |
  Navigate the complex prior authorization process for
  specialty medications across different therapeutic
  categories.

  Case 1 — Oncology:
  Patient: Carol Davis, age 58
  Diagnosis: Metastatic non-small cell lung cancer
  (NSCLC), PDL-1 positive (TPS >50%)
  Requested: Keytruda (pembrolizumab) 200mg IV q3weeks
  Insurance: Cigna
  Challenge: Cigna requires genetic testing results
  showing PDL-1 expression, EGFR/ALK mutation status,
  and tumor mutational burden before approving first-line
  immunotherapy. Some results take 2-3 weeks.

  Case 2 — Rheumatology (biosimilar mandate):
  Patient: James Chen, age 52
  Diagnosis: Psoriatic arthritis
  Currently stable on: Humira (adalimumab) for 3 years
  Insurance: UHC
  Challenge: UHC changed formulary — now requires
  biosimilar (Hadlima) instead of brand Humira.
  Patient fears switching. Provider has concerns about
  switching stable patient. Need PA for either continuation
  or biosimilar exception.

  Case 3 — Specialty pharmacy coordination:
  Patient: Lisa Park, age 34
  Diagnosis: Multiple sclerosis
  Requested: Ocrevus (ocrelizumab) IV infusion
  Insurance: Aetna
  Challenge: Requires authorization from insurance,
  coordination with specialty pharmacy for drug procurement,
  and infusion center authorization — three separate PA
  processes for one treatment.

  Create:
  1. Authorization strategy for each case
  2. Clinical documentation packages
  3. Formulary exception or continuation of therapy letters
  4. Specialty pharmacy coordination workflow
  5. Patient communication for each scenario
  6. Escalation plans for urgent oncology needs

assertions:
  - type: llm_judge
    criteria: "Oncology case addresses the urgency of cancer treatment — recognizes that 2-3 week delays for genetic testing results while awaiting PA are clinically unacceptable; proposes interim treatment strategies and escalation to medical director."
    weight: 0.35
    description: "OncologyUrgency"
  - type: llm_judge
    criteria: "Biosimilar mandate response balances clinical and formulary considerations — presents a compelling case for continuation if clinically appropriate, while acknowledging the insurer's formulary change; uses 'stable on therapy' exception pathway."
    weight: 0.35
    description: "BiosimilarBalance"
  - type: llm_judge
    criteria: "Specialty pharmacy coordination identifies all three PA touchpoints — insurance coverage approval, specialty pharmacy drug authorization, and infusion center authorization are tracked as separate but dependent processes."
    weight: 0.30
    description: "SpecialtyPharmacyCoordination"
