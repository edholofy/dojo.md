meta:
  id: surgical-authorization-management
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Manage surgical pre-authorization from initial request through post-approval scheduling — coordinate between surgeon, facility, anesthesia, and insurance"
  tags: [surgical-authorization, multi-party-coordination, scheduling, intermediate]

state: {}

trigger: |
  Manage the complete surgical pre-authorization process
  for a complex procedure requiring coordination between
  multiple providers and the insurance company.

  Patient: William Chen, age 55
  Insurance: Humana PPO, Gold plan
  Procedure: Total shoulder replacement (CPT 23472)
  Surgeon: Dr. Angela Rivera, Orthopedic Surgery
  Facility: Regional Medical Center (in-network)
  Anesthesia: Valley Anesthesia Associates (in-network)

  Authorization requirements (Humana):
  - Surgeon authorization (procedure + surgeon fees)
  - Facility authorization (hospital stay, OR time)
  - Anesthesia authorization (may be separate)
  - Implant authorization (specific implant system)
  - Post-surgical PT authorization (start planning now)

  Clinical documentation needed:
  - X-rays showing bone-on-bone arthritis
  - MRI documenting rotator cuff status
  - Documentation of failed conservative treatment
    (PT, injections, NSAIDs for 12+ weeks)
  - Surgical plan with specific implant selection
  - Comorbidity assessment (cardiac clearance needed)

  Coordination challenges:
  - Cardiac clearance appointment not yet scheduled
  - Surgeon wants specific implant (Smith & Nephew)
    but Humana may prefer less expensive option
  - Patient wants surgery within 6 weeks
  - Facility needs 2 weeks advance notice for OR booking
  - PT authorization should be concurrent to avoid gap

  Create:
  1. Multi-party authorization timeline
  2. Documentation collection checklist
  3. Implant authorization strategy
  4. Concurrent PT authorization submission
  5. Communication plan for all parties
  6. Contingency plan for partial denials

assertions:
  - type: llm_judge
    criteria: "Multi-party timeline sequences authorizations correctly — cardiac clearance before surgical PA submission, surgeon auth before facility auth, and PT authorization submitted concurrently to avoid post-surgical gap; critical path is identified."
    weight: 0.35
    description: "TimelineSequencing"
  - type: llm_judge
    criteria: "Implant authorization strategy addresses cost concerns proactively — provides clinical justification for the specific implant system, comparative data if available, and a fallback plan if insurer mandates alternative; protects both clinical judgment and approval likelihood."
    weight: 0.35
    description: "ImplantAuthorizationStrategy"
  - type: llm_judge
    criteria: "Communication plan keeps all parties informed — surgeon knows documentation needs, facility knows tentative dates pending authorization, patient has realistic timeline, and PT provider knows to expect authorization."
    weight: 0.30
    description: "MultiPartyCoordination"
