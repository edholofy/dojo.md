meta:
  id: multi-state-authorization-compliance
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Navigate pre-authorization requirements across multiple states — handle varying state PA reform laws, telehealth authorization rules, and cross-state referral authorization"
  tags: [multi-state, compliance, telehealth-authorization, intermediate]

state: {}

trigger: |
  Navigate pre-authorization compliance for a healthcare
  organization operating across multiple states with
  different PA reform laws and requirements.

  Organization: MedConnect Health System
  - Operates in: Texas, California, Georgia
  - Services: Primary care, telehealth, specialty referrals
  - Payer mix: Commercial (60%), Medicare (25%), Medicaid (15%)

  State-specific PA landscapes:

  Texas (SB 1137, effective 2024):
  - Gold card exemption: Providers with 90%+ approval
    rate for specific services exempt from PA for 1 year
  - Insurer must respond within 3 business days (standard)
  - 1 business day for urgent requests
  - Peer-to-peer must be offered before denial

  California (SB 250):
  - Prior authorization must be completed within 5 days
  - 72 hours for urgent requests
  - Continuity of care protections for ongoing treatments
  - Prospective review required (no retro-denial of
    approved services)

  Georgia:
  - No comprehensive PA reform law
  - Follows federal CMS timelines for Medicare/Medicaid
  - Commercial plans: contract-specific PA requirements
  - Step therapy override available only through appeal

  Cross-state challenges:
  - Telehealth patient in California seeing Texas provider
  - Referral from Georgia PCP to California specialist
  - Patient relocating from Texas to Georgia mid-treatment
  - Dual-eligible patient (Medicare + Georgia Medicaid)

  Create:
  1. State-by-state PA compliance matrix
  2. Cross-state telehealth authorization guide
  3. Patient relocation authorization continuity plan
  4. Gold card qualification tracking system
  5. Staff training for state-specific requirements
  6. Compliance monitoring dashboard

assertions:
  - type: llm_judge
    criteria: "State-by-state compliance matrix captures meaningful differences — Texas gold card exemption, California's prospective review protection, and Georgia's lack of comprehensive reform create different workflows and timelines; the matrix enables staff to quickly identify which rules apply."
    weight: 0.35
    description: "StateComplianceMatrix"
  - type: llm_judge
    criteria: "Cross-state scenarios are resolved with clear guidance — determines which state's PA rules apply for telehealth (generally patient's state), how referral authorizations transfer across state lines, and how to maintain treatment continuity during patient relocation."
    weight: 0.35
    description: "CrossStateResolution"
  - type: llm_judge
    criteria: "Gold card tracking system is practical — identifies which providers and service categories qualify for Texas gold card exemption, tracks approval rates by provider/service, and alerts when rates drop below threshold; this is a competitive advantage worth operationalizing."
    weight: 0.30
    description: "GoldCardTracking"
