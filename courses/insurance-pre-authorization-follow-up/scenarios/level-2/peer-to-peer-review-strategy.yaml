meta:
  id: peer-to-peer-review-strategy
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Prepare physicians for peer-to-peer reviews with insurance medical directors — develop talking points, clinical evidence packages, and negotiation strategies for overturning denials"
  tags: [peer-to-peer, medical-director-review, clinical-negotiation, intermediate]

state: {}

trigger: |
  Prepare a comprehensive peer-to-peer review strategy
  for a physician whose pre-authorization was denied.
  The P2P is the critical last step before formal appeal.

  Denied case:
  Patient: Thomas Garcia, age 62
  Insurance: Anthem BCBS
  Denied procedure: Robotic-assisted total knee
  replacement (CPT 27447 with robotic modifier)
  Denial reason: "Robotic-assisted approach not
  medically necessary — standard TKR is appropriate.
  Robotic guidance does not change clinical outcomes
  per plan criteria."

  Surgeon: Dr. Michael Park, Orthopedic Surgery
  - Board-certified, 15 years experience
  - Has performed 200+ robotic TKR procedures
  - Published research on robotic accuracy
  - Wants to advocate for robotic approach

  Patient clinical factors:
  - Complex deformity (15° valgus malalignment)
  - Previous hardware from tibial plateau fracture
  - BMI 34 (increases alignment difficulty)
  - Failed conservative treatment for 18 months
  - Bone quality concerns (osteopenia)
  - Previous contralateral TKR (standard) — had
    complications requiring revision at 3 years

  P2P review scheduled in 3 days with Anthem's
  orthopedic medical director.

  Create:
  1. P2P preparation briefing for Dr. Park
  2. Clinical talking points (evidence-based)
  3. Anticipated objections and responses
  4. Patient-specific clinical justification
  5. Supporting literature references
  6. Fallback negotiation positions
  7. Post-P2P documentation template

assertions:
  - type: llm_judge
    criteria: "P2P preparation focuses on patient-specific clinical factors — the complex deformity, previous hardware, and prior failed standard TKR on the other knee make this case distinct from routine TKR; generic 'robotic is better' arguments won't work with a medical director."
    weight: 0.35
    description: "PatientSpecificJustification"
  - type: llm_judge
    criteria: "Anticipated objections are realistic and responses are evidence-based — addresses the medical director's likely arguments about cost-effectiveness, insufficient outcome data, and plan criteria; responses cite specific studies and clinical guidelines rather than anecdotal evidence."
    weight: 0.35
    description: "ObjectionPreparation"
  - type: llm_judge
    criteria: "Fallback positions provide a negotiation path — if full robotic approval is denied, offers alternatives like single-case agreement, patient cost-sharing for robotic component, or specific measurable criteria that would trigger approval; the goal is to avoid a flat denial."
    weight: 0.30
    description: "NegotiationFallbacks"
