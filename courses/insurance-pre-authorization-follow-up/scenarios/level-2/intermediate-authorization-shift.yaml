meta:
  id: intermediate-authorization-shift
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Intermediate shift simulation — manage concurrent pre-authorization challenges including a P2P review, retroactive authorization, cross-payer coordination, and an urgent surgical case"
  tags: [shift-simulation, multi-scenario, concurrent-management, intermediate]

state: {}

trigger: |
  You are the lead PA specialist for a multi-specialty
  practice during a challenging afternoon shift. Handle
  these concurrent situations:

  SITUATION 1 — Urgent P2P in 30 minutes:
  Dr. Patel has a peer-to-peer review with Aetna's
  medical director in 30 minutes for a denied cardiac
  catheterization. The patient (age 71, Medicare Advantage
  with Aetna) had an abnormal stress test and worsening
  angina despite maximum medical therapy. Aetna denied
  citing "insufficient documentation of failed medical
  management." Dr. Patel needs prep materials NOW.

  SITUATION 2 — Retroactive authorization crisis:
  Billing department discovered that 12 physical therapy
  visits across 4 patients were rendered without valid
  authorizations due to a system migration that dropped
  expiration date tracking. Total claims at risk: $4,200.
  The payers (UHC, BCBS, Cigna, Aetna) each have different
  retro-auth policies and deadlines are approaching.

  SITUATION 3 — Surgical case timeline pressure:
  A patient needs ACL reconstruction surgery scheduled
  for next Friday. The surgeon's authorization was approved,
  but the facility authorization from Humana is still
  pending (submitted 8 days ago). Humana's standard
  turnaround is 10 business days. If facility auth isn't
  received by Wednesday, the OR slot will be released.

  SITUATION 4 — New specialty medication request:
  A rheumatologist prescribed Rinvoq (upadacitinib) for
  a patient with rheumatoid arthritis who has failed
  methotrexate and two TNF inhibitors. Cigna requires
  documentation of all failed therapies with specific
  dates, doses, and reasons for discontinuation. The
  chart documentation is incomplete — some therapy trials
  were at a previous practice.

  Manage all four situations simultaneously:
  1. Priority triage and time allocation plan
  2. P2P preparation materials (rapid format)
  3. Retro-auth recovery strategy by payer
  4. Surgical facility authorization escalation plan
  5. Specialty medication documentation gap strategy
  6. Risk assessment for each situation

assertions:
  - type: llm_judge
    criteria: "Priority triage is time-sensitive and logical — the P2P in 30 minutes gets immediate attention, the surgical case with Wednesday deadline is next, retro-auth deadlines are mapped by payer, and the medication request (no immediate deadline) is appropriately deprioritized without being neglected."
    weight: 0.35
    description: "TriagePrioritization"
  - type: llm_judge
    criteria: "P2P preparation is rapid but effective — provides Dr. Patel with concise talking points focused on the specific denial reason (failed medical management), key clinical data points, and the most compelling patient-specific arguments; formatted for quick review in under 10 minutes."
    weight: 0.35
    description: "RapidP2PPrep"
  - type: llm_judge
    criteria: "Each situation has a specific action plan with realistic timelines — not just 'call the payer' but exactly what to say, which department to contact, what documentation to reference, and what escalation path to take if the first approach fails."
    weight: 0.30
    description: "ActionableSpecificity"
