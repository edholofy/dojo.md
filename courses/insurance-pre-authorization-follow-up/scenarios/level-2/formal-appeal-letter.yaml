meta:
  id: formal-appeal-letter
  level: 2
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Write a formal first-level appeal letter for a denied pre-authorization — evidence-based clinical argument with supporting documentation strategy"
  tags: [appeal-letter, clinical-argument, evidence-based, intermediate]

state: {}

trigger: |
  Write a comprehensive first-level internal appeal
  letter for a denied pre-authorization. The appeal
  must be persuasive, evidence-based, and properly
  formatted.

  Denial details:
  - Patient: Elizabeth Warren, age 45
  - Insurance: Anthem BCBS, PPO plan
  - Denied procedure: Bariatric surgery — Roux-en-Y
    gastric bypass (CPT 43644)
  - Denial reason: "Patient does not meet medical
    necessity criteria. BMI of 38 does not meet the
    threshold of 40 for surgical intervention without
    qualifying comorbidities."
  - Denial letter date: 10 days ago
  - Appeal deadline: 50 days remaining

  Clinical facts supporting appeal:
  - BMI: 38.2 (qualifies with comorbidities)
  - Comorbidities NOT mentioned in denial:
    * Type 2 diabetes (A1C 8.9, on 3 medications)
    * Obstructive sleep apnea (AHI 28, on CPAP)
    * Hypertension (on 2 medications, poorly controlled)
    * Osteoarthritis of both knees (limits exercise)
  - Supervised weight loss history:
    * 12-month medically supervised program (documented)
    * Lost 15 lbs, regained 22 lbs
    * Nutritional counseling: 24 sessions
    * Exercise program: limited by knee pain
  - Psychological evaluation: cleared for surgery
  - NIH Consensus Conference guidelines support surgery
    for BMI ≥35 with comorbidities

  Create:
  1. Formal appeal letter (complete, submission-ready)
  2. Clinical argument structure
  3. Evidence citations (guidelines, peer-reviewed studies)
  4. Supporting documentation inventory
  5. Cover letter for appeal submission

assertions:
  - type: llm_judge
    criteria: "Appeal letter directly addresses the denial reason — demonstrates that BMI 38.2 WITH qualifying comorbidities (diabetes, OSA, hypertension) meets criteria for BMI ≥35 with comorbidities per NIH and ASMBS guidelines; the denial applied the wrong threshold."
    weight: 0.35
    description: "DenialReasonDirectAddress"
  - type: llm_judge
    criteria: "Clinical argument follows a logical, persuasive structure — establishes eligibility criteria, presents the patient's qualifying status, documents exhausted conservative measures, and cites authoritative guidelines; a medical director reading this would overturn the denial."
    weight: 0.35
    description: "ClinicalArgumentStructure"
  - type: llm_judge
    criteria: "Evidence citations are specific and authoritative — references NIH Consensus Conference, ASMBS guidelines, and relevant clinical studies rather than vague 'studies show' language; provides the medical director with defensible grounds for reversal."
    weight: 0.30
    description: "EvidenceCitationSpecificity"
