meta:
  id: payer-contract-negotiation
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Leverage PA performance data in payer contract negotiations — use denial patterns, administrative burden metrics, and approval rate data to negotiate more favorable PA terms"
  tags: [payer-negotiation, contract-terms, administrative-burden, advanced]

state: {}

trigger: |
  Use pre-authorization performance data to negotiate
  improved PA terms in upcoming payer contract renewals.
  The goal is to reduce administrative burden while
  maintaining appropriate utilization management.

  Organization: Valley Medical Group
  - 60 providers, 6 specialties
  - Annual revenue: $45M
  - PA volume: 600/month across all payers

  Contract renewals approaching:

  Payer A — Anthem BCBS (30% of revenue):
  Contract expires in 90 days.
  PA performance data:
  - PA volume: 180/month
  - First-pass approval rate: 82%
  - Average turnaround: 4.8 business days
  - Denial rate: 14%
  - Appeal overturn rate: 55% (indicates many denials unwarranted)
  - Administrative cost per PA: $68 (vs. industry avg $31)
  - Gold card eligible providers: 8 of 18

  Payer B — UnitedHealthcare (25% of revenue):
  Contract expires in 6 months.
  PA performance data:
  - PA volume: 150/month
  - PA requirements expanded 40% in last contract cycle
  - First-pass approval rate: 72%
  - Turnaround: 6.2 business days (exceeds state requirement)
  - 15% of PAs require re-submission due to payer system errors
  - Peer-to-peer availability: average 12-day wait

  Payer C — Cigna (15% of revenue):
  Contract expires in 4 months.
  PA performance data:
  - Requires PA for services where no other payer does
  - Denial rate for pain management: 48%
  - Clinical criteria not publicly available
  - No ePA support — fax only
  - Average turnaround: 8.5 business days

  Create:
  1. Data-driven negotiation brief for each payer
  2. Specific PA term improvement proposals
  3. Gold card program expansion request
  4. Administrative burden cost analysis
  5. Fallback positions and trade-offs
  6. Comparative payer benchmarking presentation
  7. Contract language recommendations

assertions:
  - type: llm_judge
    criteria: "Negotiation briefs use data persuasively — the 55% appeal overturn rate at Anthem proves over-denial, UHC's 40% PA expansion and system errors demonstrate administrative overreach, and Cigna's fax-only/opaque criteria are objectively below industry standard; each brief connects data to specific contractual asks."
    weight: 0.35
    description: "DataDrivenNegotiation"
  - type: llm_judge
    criteria: "PA term improvement proposals are specific and contractually enforceable — not just 'reduce PA requirements' but specific clauses like 'gold card exemption for providers with 90%+ approval rate', 'turnaround guarantee of 3 business days with auto-approval if exceeded', and 'annual PA list review with provider input'."
    weight: 0.35
    description: "ContractTermSpecificity"
  - type: llm_judge
    criteria: "Trade-offs and fallback positions are realistic — acknowledges that payers may not agree to all terms; identifies what the practice is willing to concede (e.g., quality reporting, utilization data sharing) in exchange for PA relief; considers the leverage each payer relationship provides."
    weight: 0.30
    description: "NegotiationTradeoffs"
