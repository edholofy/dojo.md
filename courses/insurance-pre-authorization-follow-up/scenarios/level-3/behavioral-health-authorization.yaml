meta:
  id: behavioral-health-authorization
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Navigate behavioral health pre-authorization complexities — handle mental health parity requirements, substance use disorder confidentiality (42 CFR Part 2), concurrent review for inpatient stays, and crisis authorization"
  tags: [behavioral-health, mental-health-parity, substance-abuse, advanced]

state: {}

trigger: |
  Navigate the unique pre-authorization challenges in
  behavioral health care, including parity compliance,
  substance use disorder confidentiality, and crisis
  situations requiring immediate treatment.

  Organization: Harmony Behavioral Health
  - Services: Inpatient psychiatric, residential SUD
    treatment, intensive outpatient, PHP, outpatient therapy
  - 40 providers (psychiatrists, psychologists, LCSW, LPC)
  - Payer mix: Commercial (45%), Medicaid (35%), Medicare (20%)

  Challenge 1 — Mental Health Parity Act compliance:
  PA requirements for behavioral health services appear
  more restrictive than comparable medical/surgical
  services at several payers:
  - Anthem requires concurrent review every 3 days for
    psych inpatient but every 7 days for medical inpatient
  - UHC requires PA for all outpatient therapy after
    session 6, but no PA for outpatient medical visits
  - Cigna's PA criteria for residential SUD treatment
    require "imminent danger" — a higher bar than for
    comparable medical rehabilitation

  Challenge 2 — 42 CFR Part 2 (SUD confidentiality):
  Patients in SUD treatment have heightened confidentiality
  protections. PA submission must include clinical
  information but cannot disclose SUD diagnosis or
  treatment details to unauthorized parties.
  - Patient consent required for each PA disclosure
  - Re-disclosure prohibition affects how payers handle info
  - 2024 SAMHSA updates aligned Part 2 with HIPAA but
    still has stricter consent requirements

  Challenge 3 — Crisis authorization:
  - Psychiatric emergencies requiring immediate inpatient
    admission — PA cannot delay treatment
  - Insurance often requires concurrent review starting
    within 24 hours of emergency admission
  - Denial of continued stay during acute stabilization
  - Patients presenting to ED in suicidal crisis need
    immediate disposition, not PA processing

  Challenge 4 — Level of care transitions:
  Patient moving through: Crisis → Inpatient → PHP →
  IOP → Outpatient. Each transition requires new PA.
  Gap between levels creates relapse risk.

  Create:
  1. Parity compliance audit methodology
  2. 42 CFR Part 2 compliant PA submission protocol
  3. Crisis authorization rapid response procedure
  4. Level-of-care transition authorization plan
  5. Parity violation documentation and reporting
  6. Staff training on behavioral health PA specifics

assertions:
  - type: llm_judge
    criteria: "Parity compliance audit identifies specific quantitative and non-quantitative treatment limitation (NQTL) violations — the examples given (3-day vs 7-day concurrent review, session limits for therapy but not medical visits) are textbook parity violations; the audit methodology documents these systematically for regulatory complaint or litigation."
    weight: 0.35
    description: "ParityAuditMethodology"
  - type: llm_judge
    criteria: "42 CFR Part 2 protocol balances clinical documentation needs with confidentiality — PA submissions must include enough clinical information for medical necessity but protect SUD-specific information; addresses consent management, segmented records, and what happens when a payer requests records that include Part 2-protected information."
    weight: 0.35
    description: "Part2ComplianceProtocol"
  - type: llm_judge
    criteria: "Crisis authorization procedure ensures treatment is never delayed — psychiatric emergencies have stabilization-first obligations; the procedure documents how to admit first and manage PA concurrently, how to handle concurrent review during acute stabilization, and how to appeal continued stay denials while the patient is still in crisis."
    weight: 0.30
    description: "CrisisAuthorizationProcedure"
