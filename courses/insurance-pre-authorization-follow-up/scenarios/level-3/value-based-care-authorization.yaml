meta:
  id: value-based-care-authorization
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Navigate pre-authorization in value-based care arrangements — handle PA requirements under ACOs, bundled payments, shared savings, and capitated contracts where traditional PA may not apply"
  tags: [value-based-care, aco, bundled-payment, advanced]

state: {}

trigger: |
  Navigate the complex intersection of pre-authorization
  requirements and value-based care arrangements where
  traditional PA rules may be modified, waived, or
  replaced by different utilization management approaches.

  Organization: Summit Health Partners (ACO)
  - 120 providers across 15 practices
  - Participating in multiple VBC arrangements:

  Arrangement 1 — Medicare Shared Savings Program (MSSP):
  - 18,000 attributed Medicare beneficiaries
  - Track 2 (two-sided risk)
  - PA requirements: Standard Medicare rules apply, BUT
    ACO has negotiated PA waiver for certain services
  - Waived PA services: Home health, SNF stays <20 days,
    outpatient PT/OT, DME under $5,000
  - Non-waived: Still need PA for advanced imaging,
    specialty drugs, inpatient elective surgery

  Arrangement 2 — Commercial bundled payment (Aetna):
  - Bundled episodes: Joint replacement, cardiac surgery,
    spine surgery
  - PA during bundle: Once episode is triggered, services
    within the bundle do NOT require individual PA
  - Challenge: Determining what's "within the bundle"
    vs. requires separate PA

  Arrangement 3 — Capitated specialty contract (UHC):
  - Capitated cardiology services for 8,000 lives
  - PA is managed internally by the ACO, NOT by UHC
  - ACO must perform its own utilization review
  - Challenge: ACO is now both provider and reviewer

  Cross-arrangement scenarios:
  - Patient attributed to MSSP needs a bundled joint
    replacement through Aetna arrangement
  - Dual-eligible patient under both MSSP and Medicaid
  - Provider wants to refer outside the ACO network

  Create:
  1. VBC authorization decision matrix
  2. Bundle boundary determination guide
  3. Internal utilization review protocol (for capitated)
  4. Cross-arrangement patient navigation workflow
  5. Provider education on VBC-specific PA rules
  6. Financial risk tracking for authorization decisions
  7. Compliance framework for self-managed PA

assertions:
  - type: llm_judge
    criteria: "VBC authorization decision matrix correctly identifies when traditional PA applies vs. when VBC arrangements modify or eliminate PA — waived services under MSSP, bundled services under Aetna, and internally managed services under UHC capitation each follow different rules."
    weight: 0.35
    description: "VBCDecisionMatrix"
  - type: llm_judge
    criteria: "Internal utilization review for capitated arrangement addresses the inherent conflict of interest — when the ACO is both provider and utilization reviewer, safeguards against overuse and underuse are needed; proposes clinical criteria, independent review mechanisms, and quality metrics."
    weight: 0.35
    description: "InternalURConflict"
  - type: llm_judge
    criteria: "Bundle boundary determination provides clear guidance — defines which services fall within a joint replacement bundle (pre-op clearance, surgery, implant, hospital stay, 90-day post-op rehab) vs. what requires separate PA (unrelated comorbidity management, complications requiring different specialty)."
    weight: 0.30
    description: "BundleBoundaryClarity"
