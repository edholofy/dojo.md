meta:
  id: regulatory-compliance-program
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Build a comprehensive PA regulatory compliance program — navigate CMS final rule changes, state PA reform laws, ERISA preemption, and payer accountability requirements"
  tags: [regulatory-compliance, cms-rules, state-reform, advanced]

state: {}

trigger: |
  Build a comprehensive regulatory compliance program
  for pre-authorization operations that addresses the
  rapidly evolving federal and state PA regulatory
  landscape.

  Organization: National Health Network
  - Operating in 12 states
  - 500+ providers, 200,000 annual PA submissions
  - Mix: Commercial (55%), Medicare (30%), Medicaid (15%)
  - Current compliance posture: Reactive, no formal program

  Key regulatory requirements to address:

  Federal — CMS Interoperability & Prior Authorization
  Final Rule (CMS-0057-F):
  - Effective dates: Phased 2026-2027
  - Payers must implement FHIR-based PA APIs
  - 72-hour response for urgent, 7 calendar days standard
  - Payers must publish PA requirements electronically
  - Reason for denial must be specific and coded
  - Real-time PA decision capability required for select services

  State PA reform laws (varies by state):
  - Gold card exemptions (Texas, others)
  - Step therapy override rights
  - Continuity of care protections
  - External review rights
  - PA validity periods (some states mandate minimums)

  ERISA preemption considerations:
  - Self-funded employer plans may not be subject to
    state PA reform laws
  - Creates dual-track compliance requirements
  - Growing number of states testing ERISA boundaries

  Payer accountability:
  - Some states require payers to report PA metrics
  - Denial rate transparency requirements emerging
  - Provider right to appeal directly to state regulator
  - Financial penalties for payer non-compliance

  Create:
  1. Multi-jurisdiction compliance matrix
  2. CMS final rule implementation timeline
  3. ERISA vs. state law decision framework
  4. Payer accountability tracking system
  5. Staff compliance training program
  6. Compliance monitoring and audit plan
  7. Regulatory change management process

assertions:
  - type: llm_judge
    criteria: "CMS final rule implementation timeline addresses phased effective dates — distinguishes between what payers must do vs. what providers should prepare for; identifies specific technical readiness steps (FHIR API integration, electronic PA submission capabilities) and organizational readiness steps."
    weight: 0.35
    description: "CMSRuleTimeline"
  - type: llm_judge
    criteria: "ERISA preemption framework provides practical guidance — when a patient has a self-funded employer plan, state PA reform protections (gold card, step therapy override) may not apply; the framework helps staff quickly determine which rules govern each patient's PA."
    weight: 0.35
    description: "ERISAFramework"
  - type: llm_judge
    criteria: "Regulatory change management process is proactive — monitors legislative developments across 12 states, assesses impact on operations, and updates workflows before new laws take effect; doesn't just react to compliance failures."
    weight: 0.30
    description: "ProactiveChangeManagement"
