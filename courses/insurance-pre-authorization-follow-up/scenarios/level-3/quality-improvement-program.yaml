meta:
  id: quality-improvement-program
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Design a continuous quality improvement program for PA operations — PDSA cycles, Six Sigma methods, and evidence-based process improvement to systematically reduce denials and turnaround time"
  tags: [quality-improvement, pdsa, six-sigma, advanced]

state: {}

trigger: |
  Design a continuous quality improvement (CQI) program
  for pre-authorization operations using structured
  improvement methodologies.

  Organization: Lakeside Medical Center
  - 200-bed community hospital
  - Monthly PA volume: 1,200 requests
  - Current performance:
    * First-pass approval rate: 65% (target: 85%)
    * Average turnaround: 5.3 days (target: 2 days)
    * Denial rate: 25% (target: 12%)
    * Appeal success rate: 38%
    * Staff overtime for PA work: 120 hours/month
    * Patient complaints related to PA delays: 45/month

  Root cause data from initial assessment:
  - 42% of denials: Documentation deficiencies
    * Clinical notes don't address medical necessity
    * Lab/imaging results not attached
    * Conservative treatment history missing
  - 23% of denials: Coding errors
    * Wrong CPT code for procedure
    * Diagnosis code doesn't support procedure
    * Modifier errors
  - 18% of denials: Process failures
    * Submitted to wrong department at payer
    * Missed timely filing deadlines
    * Duplicate submissions creating confusion
  - 17% of denials: Clinical criteria mismatch
    * Service doesn't meet payer's criteria
    * Step therapy requirements not completed
    * Peer-reviewed alternative exists

  Available resources:
  - Quality department support (Six Sigma Black Belt)
  - EHR reporting capabilities
  - Staff willing to participate in improvement teams
  - Leadership commitment to PA performance improvement
  - Budget for process improvement: $50K

  Create:
  1. CQI program charter and governance
  2. DMAIC project plan for denial reduction
  3. Key process indicators and measurement plan
  4. PDSA cycle design for top 3 improvement opportunities
  5. Staff engagement and training strategy
  6. Sustainability plan for improvements
  7. Quarterly review and reporting framework

assertions:
  - type: llm_judge
    criteria: "DMAIC project plan is methodologically sound — Define phase scopes the problem using current data, Measure phase establishes baseline metrics with statistical validity, Analyze phase uses root cause data to identify the 42% documentation deficiency as the highest-leverage target, Improve phase designs specific interventions, Control phase sustains gains."
    weight: 0.35
    description: "DMAICMethodology"
  - type: llm_judge
    criteria: "PDSA cycles target the highest-impact opportunities with rapid iteration — first cycle addresses documentation deficiencies (42% of denials), second addresses coding errors (23%), third addresses process failures (18%); each cycle has specific interventions, measurable outcomes, and defined learning goals."
    weight: 0.35
    description: "PDSACycleDesign"
  - type: llm_judge
    criteria: "Sustainability plan prevents improvement decay — addresses how to maintain gains after the improvement project ends; includes ongoing monitoring, refresher training triggers, process control charts, and escalation procedures when metrics trend toward pre-improvement levels."
    weight: 0.30
    description: "SustainabilityPlan"
