meta:
  id: population-health-authorization
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Develop population-level pre-authorization strategies — manage PA at scale for chronic disease populations, preventive care programs, and community health initiatives"
  tags: [population-health, chronic-disease, preventive-care, advanced]

state: {}

trigger: |
  Develop population-level pre-authorization strategies
  for a health system managing large chronic disease
  populations where individual PA processing is
  creating care access barriers.

  Organization: Community Health Alliance
  - FQHC network serving 85,000 patients
  - 5 health centers, 40 providers
  - Patient demographics: 60% Medicaid, 20% uninsured,
    15% commercial, 5% Medicare

  Population PA challenges:

  Diabetes population (12,000 patients):
  - CGM devices (Dexcom, Libre): PA required by all payers
  - Insulin pump authorization: 6-8 week process
  - GLP-1 medications (Ozempic, Mounjaro): Step therapy
    required, criteria vary dramatically by payer
  - Diabetic shoes/orthotics: PA + documentation burden
    exceeds reimbursement for many practices
  - Net effect: 35% of eligible diabetic patients never
    receive CGM due to PA barriers

  Behavioral health population (8,500 patients):
  - ADHD medications: PA for all non-generic stimulants
  - MAT (medication-assisted treatment): PA creates
    dangerous gaps in opioid treatment
  - Psychiatric referrals: PA required for non-network
    specialists (few in-network options available)
  - Net effect: Average 23-day delay from referral to
    psychiatric appointment due to PA processing

  Preventive care barriers:
  - Colonoscopy screening: PA required by some Medicaid
    MCOs despite being ACA-mandated preventive care
  - Mammography with tomosynthesis: PA for 3D imaging
  - HPV vaccination (catch-up doses): PA for patients
    outside standard age range

  Create:
  1. Population-level PA management strategy
  2. Batch authorization workflow for chronic conditions
  3. PA barrier reduction advocacy plan
  4. Payer engagement strategy for FQHC populations
  5. Patient navigation program for complex PA
  6. Metrics dashboard for population PA outcomes
  7. Policy advocacy recommendations

assertions:
  - type: llm_judge
    criteria: "Population-level strategy moves beyond individual PA processing — proposes batch authorization for common chronic disease management (e.g., standing PA protocols for CGM in all diabetics meeting criteria), payer-negotiated PA waivers for high-volume services, and automated PA pathways for protocol-driven care."
    weight: 0.35
    description: "PopulationLevelStrategy"
  - type: llm_judge
    criteria: "PA barrier analysis connects authorization delays to health outcomes — 35% of diabetics never getting CGM and 23-day psychiatric appointment delays are patient safety issues, not just administrative problems; the analysis quantifies health impact to support advocacy and payer negotiation."
    weight: 0.35
    description: "HealthOutcomeImpact"
  - type: llm_judge
    criteria: "FQHC-specific considerations are addressed — sliding-scale patients, uninsured patients needing manufacturer PAP programs, Medicaid MCO variability, 340B drug pricing interactions with PA, and the disproportionate administrative burden on safety-net providers."
    weight: 0.30
    description: "FQHCSpecificConsiderations"
