meta:
  id: advanced-authorization-shift
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Advanced shift simulation — manage enterprise-level PA challenges including a parity violation complaint, FHIR implementation decision, payer contract negotiation prep, and a population health PA barrier crisis"
  tags: [shift-simulation, enterprise-challenges, multi-domain, advanced]

state: {}

trigger: |
  You are the Director of Authorization Services for
  a regional health system. Today you face strategic
  challenges that require cross-functional leadership.

  CHALLENGE 1 — Mental health parity violation discovery:
  Your behavioral health team has documented that Anthem
  requires PA for all psychiatric medication changes
  (even within the same class) but does NOT require PA
  for analogous medical medication changes. This affects
  2,800 behavioral health patients. Your legal team
  believes this is a Mental Health Parity and Addiction
  Equity Act (MHPAEA) violation.
  Decision needed: File regulatory complaint, negotiate
  directly with Anthem, or pursue litigation?

  CHALLENGE 2 — FHIR implementation vendor selection:
  Two vendors have presented FHIR PA integration solutions:
  - Vendor A: $180K, 8-month implementation, supports
    5 major payers, requires Epic upgrade
  - Vendor B: $95K, 4-month implementation, supports
    3 payers initially, works with current Epic version
  CMS compliance deadline is 14 months away. Your IT
  team has limited bandwidth for Epic upgrades.

  CHALLENGE 3 — Payer contract leverage opportunity:
  Your largest commercial payer (35% of revenue) just
  lost a class-action lawsuit over PA delays causing
  patient harm. Their contract with you is up for
  renewal in 60 days. Your data shows their PA denials
  cost you $1.2M annually in lost revenue and
  administrative burden.
  Decision needed: How aggressively to leverage this
  moment in negotiations?

  CHALLENGE 4 — Oncology PA crisis:
  Three oncology patients have had treatment delays
  of 10+ days due to PA processing. One patient's
  cancer has progressed during the delay. The oncology
  department is threatening to go to the media.
  Immediate response needed.

  Address all four challenges:
  1. Parity violation response strategy with timeline
  2. FHIR vendor recommendation with justification
  3. Contract negotiation strategy and specific asks
  4. Oncology crisis response and systemic prevention
  5. Resource allocation across all four priorities
  6. Board-level executive summary

assertions:
  - type: llm_judge
    criteria: "Parity violation response considers legal, regulatory, and relationship dimensions — filing a complaint has long-term policy impact but may damage the Anthem relationship; direct negotiation may resolve faster but lacks enforcement; the recommended approach weighs these trade-offs and may combine strategies."
    weight: 0.35
    description: "ParityViolationStrategy"
  - type: llm_judge
    criteria: "FHIR vendor recommendation balances cost, timeline, and risk — Vendor B is cheaper and faster but supports fewer payers; Vendor A requires an Epic upgrade that competes for IT bandwidth; the recommendation considers CMS deadline pressure, total cost of ownership, and implementation risk."
    weight: 0.35
    description: "FHIRVendorAnalysis"
  - type: llm_judge
    criteria: "Oncology crisis response addresses both immediate patient need and systemic failure — expedites the three pending authorizations through emergency channels while implementing safeguards against future oncology PA delays; manages media risk without appearing to cover up the problem."
    weight: 0.30
    description: "OncologyCrisisResponse"
