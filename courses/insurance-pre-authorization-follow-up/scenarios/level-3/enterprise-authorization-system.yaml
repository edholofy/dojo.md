meta:
  id: enterprise-authorization-system
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Design an enterprise-wide pre-authorization management system — centralized authorization workflows, cross-department coordination, and real-time tracking across a multi-facility health system"
  tags: [enterprise-system, centralized-workflow, multi-facility, advanced]

state: {}

trigger: |
  Design a comprehensive enterprise pre-authorization
  management system for a large health system undergoing
  centralization of PA operations.

  Organization: Pacific Health Partners
  - 4 hospitals, 28 outpatient clinics, 350 providers
  - 12 specialties across all locations
  - Monthly PA volume: 4,200 requests
  - Current state: Each facility manages PAs independently
  - Overall denial rate: 24% (varies 15-35% by facility)
  - Annual revenue at risk from PA issues: $8.2M
  - PA staff: 32 FTEs across facilities (no standardization)

  Current pain points:
  - Duplicate PA submissions for same patient/service
  - No visibility into PA status across facilities
  - Inconsistent documentation quality by location
  - Provider credentialing gaps affecting PA approval
  - No centralized denial tracking or appeal management
  - Each facility uses different submission methods
  - Patient transfers between facilities lose PA status
  - No escalation pathways for time-sensitive requests

  Technology environment:
  - EHR: Epic (implemented at hospitals, rolling out to clinics)
  - PA management: Mix of CoverMyMeds, Availity, manual
  - Communication: Secure messaging, fax, phone
  - Analytics: Basic reporting only

  Create:
  1. Centralized PA operations model
  2. Technology integration architecture
  3. Standardized workflow design
  4. Cross-facility PA portability protocol
  5. Staffing model and role definitions
  6. Performance benchmarking framework
  7. Implementation roadmap (phased)
  8. Change management strategy

assertions:
  - type: llm_judge
    criteria: "Centralized operations model balances efficiency with clinical proximity — doesn't just create a call center; maintains specialty-specific PA expertise while centralizing intake, tracking, and follow-up; addresses how centralized staff handles clinical questions from 12 different specialties."
    weight: 0.35
    description: "CentralizationBalance"
  - type: llm_judge
    criteria: "Cross-facility PA portability protocol solves real patient transfer scenarios — when a patient authorized for surgery at Hospital A is transferred to Hospital B, the authorization transfers or is rapidly re-obtained; addresses both emergency and planned transfer situations."
    weight: 0.35
    description: "PAPortability"
  - type: llm_judge
    criteria: "Implementation roadmap is phased with realistic sequencing — doesn't attempt big-bang implementation across 32 locations; identifies pilot sites, defines success criteria for phase advancement, and manages change resistance from facilities losing local control."
    weight: 0.30
    description: "PhasedImplementation"
