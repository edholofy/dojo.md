meta:
  id: interoperability-fhir-integration
  level: 3
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Implement FHIR-based prior authorization interoperability — design Da Vinci PAS implementation, payer-provider data exchange, and real-time PA decision workflows per CMS requirements"
  tags: [fhir-interoperability, da-vinci-pas, cms-compliance, advanced]

state: {}

trigger: |
  Plan the implementation of FHIR-based prior
  authorization interoperability per the CMS
  Interoperability and Prior Authorization Final Rule,
  leveraging the HL7 Da Vinci Prior Authorization
  Support (PAS) implementation guide.

  Organization: Regional Health System
  - 3 hospitals, 20 clinics
  - EHR: Epic (Hyperspace/MyChart)
  - Monthly PA volume: 2,800 requests
  - Current electronic PA rate: 35%
  - Target: 90% electronic PA by compliance deadline

  Technical requirements:
  - FHIR R4 API for PA submission and status inquiry
  - Da Vinci PAS IG compliance
  - Integration with payer FHIR endpoints
  - Real-time PA for select service categories
  - Attachment submission via Da Vinci CDex
  - Provider directory cross-reference

  Payer FHIR readiness (as of implementation planning):
  - UHC: Production FHIR PA API available
  - Anthem: Beta testing, limited service categories
  - Aetna: Production ready for pharmacy PA only
  - Cigna: Development environment only
  - Humana: Production ready, full service coverage
  - Medicare MACs: Phased rollout per CMS timeline

  Integration challenges:
  - Epic PA module needs FHIR adapter configuration
  - Multiple payers = multiple FHIR endpoints with
    variations in implementation
  - Attachment formats vary (C-CDA, PDF, FHIR documents)
  - Real-time PA requires clinical decision support
    integration within provider workflow
  - Staff must learn new workflows alongside legacy

  Create:
  1. FHIR implementation architecture
  2. Da Vinci PAS workflow mapping
  3. Payer-specific integration plan
  4. Epic configuration requirements
  5. Testing and validation strategy
  6. Dual-workflow management (FHIR + legacy)
  7. Staff transition training plan
  8. Compliance timeline alignment

assertions:
  - type: llm_judge
    criteria: "FHIR architecture addresses multi-payer endpoint variability — recognizes that each payer's FHIR implementation differs in maturity and capability; designs a middleware/gateway approach that normalizes these differences so clinical staff have a consistent workflow regardless of payer."
    weight: 0.35
    description: "FHIRArchitectureDesign"
  - type: llm_judge
    criteria: "Da Vinci PAS workflow mapping translates technical specifications into clinical operations — maps the FHIR request/response cycle to the clinical staff's experience; identifies where real-time PA decisions change clinical workflow (provider gets instant approval vs. waiting days)."
    weight: 0.35
    description: "PASWorkflowMapping"
  - type: llm_judge
    criteria: "Dual-workflow management provides a realistic transition path — FHIR and legacy PA processes must coexist for 12-24 months; staff need clear decision rules for which submission method to use for which payer/service combination, without doubling their workload."
    weight: 0.30
    description: "DualWorkflowTransition"
