meta:
  id: standard-submission-letter
  level: 1
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Write a standard pre-authorization submission letter — clinical justification letter with supporting documentation for a common procedure"
  tags: [submission-letter, clinical-justification, documentation, beginner]

state: {}

trigger: |
  Write a pre-authorization submission letter for a
  common procedure. The letter must clearly establish
  medical necessity.

  Patient: Robert Chen
  DOB: 11/22/1965
  Insurance: UnitedHealthcare
  Member ID: U987654321
  Group: CORP-555

  Requesting authorization for:
  - Procedure: CT scan of abdomen and pelvis with contrast
    (CPT 74178)
  - Urgency: Standard (non-emergent)
  - Ordering provider: Dr. James Wilson, Internal Medicine
  - Facility: Riverside Medical Center

  Clinical justification:
  - Chief complaint: Unexplained weight loss (15 lbs in
    2 months), persistent abdominal pain (6 weeks)
  - Physical exam: Palpable mass in right lower quadrant
  - Lab results: Elevated ESR (45), mild anemia (Hgb 11.2)
  - Previous workup: Abdominal ultrasound (inconclusive,
    "possible mass, recommend CT for further evaluation")
  - Differential diagnosis: Possible malignancy, inflammatory
    process, abscess
  - Why CT specifically: Superior to ultrasound for
    characterizing abdominal masses, contrast needed for
    vascularity assessment

  Create:
  1. Formal pre-authorization request letter
  2. Clinical necessity summary
  3. Checklist of supporting documents to attach
  4. Cover sheet for fax submission

assertions:
  - type: llm_judge
    criteria: "Clinical justification letter clearly establishes medical necessity — connects symptoms (weight loss, pain, mass) to the specific imaging requested, explains why CT with contrast is needed over alternatives, and references clinical guidelines where applicable."
    weight: 0.35
    description: "ClinicalJustificationClarity"
  - type: llm_judge
    criteria: "Letter format is professional and follows insurance industry conventions — includes all required identifiers (member ID, NPI, CPT codes), uses proper medical terminology, and is organized for easy review by an insurance medical director."
    weight: 0.35
    description: "ProfessionalFormat"
  - type: llm_judge
    criteria: "Supporting document checklist is thorough — includes clinical notes, lab results, imaging reports, referral documentation, and any relevant clinical guidelines; ensures nothing is missing that would cause a delay or denial."
    weight: 0.30
    description: "DocumentChecklist"
