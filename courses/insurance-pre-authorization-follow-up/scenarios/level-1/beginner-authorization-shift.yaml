meta:
  id: beginner-authorization-shift
  level: 1
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Handle basic pre-authorization complications — expired authorization, wrong procedure code, missing documentation, and patient insurance change"
  tags: [complications, problem-solving, corrective-action, beginner]

state: {}

trigger: |
  Several basic pre-authorization issues have emerged
  today. Handle each one with appropriate urgency and
  communication.

  Problem 1 — Expired authorization:
  Patient Linda Garcia was approved for a shoulder
  surgery (CPT 23430) 90 days ago. The surgery was
  delayed due to a family emergency. The authorization
  expired yesterday. Surgery is now scheduled for
  next week. Insurance: Humana.

  Problem 2 — Wrong procedure code:
  Authorization was obtained for a colonoscopy (CPT 45378,
  diagnostic) but the gastroenterologist now needs to
  perform a polypectomy (CPT 45385, therapeutic) based
  on prep day phone screening. The procedure is tomorrow.
  Insurance: Aetna. Patient: James Park.

  Problem 3 — Missing documentation:
  Cigna is requesting additional clinical documentation
  for a pending CT authorization. They want "the most
  recent office visit note and lab results." The request
  was faxed 3 days ago with a 5-day response deadline
  (2 days left). The physician hasn't signed the office
  note yet. Patient: Maria Santos.

  Problem 4 — Insurance changed:
  Patient Tom Wilson had authorization approved through
  BCBS. He just informed the office that his employer
  switched to UnitedHealthcare effective the 1st of this
  month. His surgery is scheduled for next Thursday.
  The existing BCBS authorization is now worthless.

  Address all four problems:
  1. Re-authorization strategy for expired auth
  2. Procedure code change handling
  3. Missing documentation urgent response
  4. Insurance change re-authorization plan
  For each: immediate action + communication to patient

assertions:
  - type: llm_judge
    criteria: "Each problem has a clear, prioritized action plan — identifies the most urgent issue (surgery tomorrow with wrong code), provides immediate steps for each, and distinguishes between what can wait and what can't."
    weight: 0.35
    description: "PrioritizedActionPlans"
  - type: llm_judge
    criteria: "Procedure code change handling addresses the time constraint — recognizes that tomorrow's procedure needs either an emergency code change or conversion to the correct code during the procedure; knows the insurance company's process for same-day modifications."
    weight: 0.35
    description: "CodeChangeTimeConstraint"
  - type: llm_judge
    criteria: "Patient communication for each problem is honest but reassuring — doesn't hide the issue from the patient but also doesn't create panic; clearly states what might need to change (timing, additional steps) and who is handling it."
    weight: 0.30
    description: "PatientCommunicationHonesty"
