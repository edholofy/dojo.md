meta:
  id: insurance-portal-navigation
  level: 1
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Navigate an insurance company's provider portal for pre-authorization — step-by-step guide for electronic submission, status checking, and document upload"
  tags: [portal-navigation, electronic-submission, step-by-step, beginner]

state: {}

trigger: |
  Create a step-by-step guide for navigating a major
  insurance company's provider portal to submit and
  track pre-authorization requests electronically.

  Portal: UnitedHealthcare Provider Portal (UHCProvider.com)
  Staff member: New hire who has never used the portal

  Tasks to document:

  Task 1 — Submit a new pre-authorization:
  - Patient: Karen White, Member ID: U-112233445
  - Procedure: Total knee replacement (CPT 27447)
  - Need to enter clinical information, attach documents,
    and submit

  Task 2 — Check status of existing authorization:
  - Patient: James Lee, Auth Reference: UHC-2024-98765
  - Submitted 7 days ago, no response yet

  Task 3 — Upload additional documentation:
  - Insurance requested additional clinical notes
  - Need to upload 3 PDF documents to existing case

  Task 4 — Find denial letter and initiate appeal:
  - Patient: Maria Gomez, Auth Reference: UHC-2024-87654
  - Denied 2 days ago, need to access denial details
    and start electronic appeal

  Portal features to cover:
  - Login and navigation to authorization section
  - New request submission workflow
  - Status dashboard and search
  - Document upload and attachment
  - Messaging/communication with reviewer
  - Appeal initiation process

  Create a step-by-step guide with screenshots
  descriptions for each task.

assertions:
  - type: llm_judge
    criteria: "Step-by-step instructions are detailed enough for a true beginner — describes each click, menu item, and data entry field; includes where to find specific functions (not just 'go to authorizations'); anticipates where users get confused."
    weight: 0.35
    description: "BeginnerFriendlyDetail"
  - type: llm_judge
    criteria: "Guide covers common pitfalls — addresses typical errors like wrong CPT code entry, missing required fields, file size limits for uploads, timeout issues, and what to do if the system crashes mid-submission."
    weight: 0.35
    description: "PitfallCoverage"
  - type: llm_judge
    criteria: "Guide includes verification steps — after each task, shows how to confirm submission was received, how to get a reference/confirmation number, and how to verify documents were successfully attached."
    weight: 0.30
    description: "VerificationSteps"
