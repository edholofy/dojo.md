meta:
  id: basic-status-inquiry
  level: 1
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Write a basic pre-authorization status inquiry — professional phone script and follow-up documentation for checking authorization status with an insurance company"
  tags: [status-inquiry, phone-script, basic-follow-up, beginner]

state: {}

trigger: |
  Write a phone script for calling an insurance company
  to check the status of a pending pre-authorization
  request. Include documentation notes.

  Patient: Michael Thompson
  DOB: 04/15/1978
  Insurance: Blue Cross Blue Shield (BCBS)
  Member ID: XYZ123456789
  Group #: 98765

  Authorization details:
  - Submitted: 5 business days ago
  - Procedure: MRI of lumbar spine (CPT 72148)
  - Ordering provider: Dr. Sarah Kim, Orthopedics
  - NPI: 1234567890
  - Clinical reason: Persistent lower back pain x 6 weeks,
    failed conservative treatment (PT, NSAIDs)
  - Expected turnaround: 3-5 business days (standard)

  Context:
  - Patient's MRI appointment is scheduled for next week
  - Need to confirm authorization before appointment
  - Patient has called twice asking about status

  Create:
  1. Phone script for calling BCBS
  2. Information to have ready before calling
  3. Documentation template for the call outcome
  4. Patient communication for each possible outcome
     (approved, pending, denied)

assertions:
  - type: llm_judge
    criteria: "Phone script is professional and efficient — identifies the caller, provides necessary reference numbers upfront, asks clear questions, and anticipates common insurance rep responses; doesn't waste time on unnecessary information."
    weight: 0.35
    description: "PhoneScriptEfficiency"
  - type: llm_judge
    criteria: "Documentation template captures all critical information — authorization number if approved, reason if denied, representative name and reference number, next steps required, and timeline; the documentation serves as a reliable record."
    weight: 0.35
    description: "DocumentationCompleteness"
  - type: llm_judge
    criteria: "Patient communication for each outcome is clear and actionable — tells the patient exactly what's happening, what they need to do (if anything), and when they'll hear next; manages expectations without creating unnecessary anxiety."
    weight: 0.30
    description: "PatientCommunicationClarity"
