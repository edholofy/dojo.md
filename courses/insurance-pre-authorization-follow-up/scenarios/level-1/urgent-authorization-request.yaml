meta:
  id: urgent-authorization-request
  level: 1
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Handle an urgent/expedited pre-authorization request — time-sensitive communication for procedures needed within 24-72 hours"
  tags: [urgent-request, expedited-review, time-sensitive, beginner]

state: {}

trigger: |
  Handle an urgent pre-authorization request for a
  procedure needed within 48 hours. Time is critical.

  Patient: Amanda Williams
  DOB: 07/30/1952
  Insurance: Cigna
  Member ID: CIG-88776655

  Urgent authorization needed for:
  - Procedure: Cardiac catheterization (CPT 93458)
  - Urgency: Urgent — must be performed within 48 hours
  - Provider: Dr. Lisa Patel, Interventional Cardiology
  - Facility: Heart Center at University Hospital

  Clinical urgency justification:
  - Patient presented to ER with chest pain and dyspnea
  - Troponin levels elevated (0.15 ng/mL, trending up)
  - ECG showing ST-segment depression in leads V4-V6
  - Echocardiogram: EF 35% (reduced from 55% six months ago)
  - Patient stabilized on heparin drip in cardiac ICU
  - Cardiologist recommends catheterization within 48 hours
    to assess coronary anatomy before potential intervention

  Cigna urgent authorization process:
  - Phone: Urgent auth line available 24/7
  - Turnaround: 24-72 hours for urgent requests
  - Required: Clinical urgency documentation
  - Fax backup: Send supporting docs within 24 hours

  Create:
  1. Urgent authorization phone call script
  2. Clinical urgency justification letter
  3. Escalation plan if initial request delayed
  4. Patient/family communication about auth process
  5. Documentation tracking for urgent timeline

assertions:
  - type: llm_judge
    criteria: "Urgency is clearly communicated — clinical indicators (elevated troponin, declining EF, ST changes) are presented immediately and compellingly; the case for 48-hour timeline is medically unambiguous."
    weight: 0.35
    description: "UrgencyCommunication"
  - type: llm_judge
    criteria: "Escalation plan addresses real delays — includes supervisor escalation at the insurance company, state insurance commissioner emergency contact, and the option for the provider to proceed under emergency provisions with retrospective authorization."
    weight: 0.35
    description: "EscalationPlan"
  - type: llm_judge
    criteria: "Patient/family communication acknowledges anxiety — explains the authorization process simply during what's already a frightening medical situation, reassures that medical care will proceed regardless, and doesn't burden the patient with administrative details."
    weight: 0.30
    description: "PatientFamilyReassurance"
