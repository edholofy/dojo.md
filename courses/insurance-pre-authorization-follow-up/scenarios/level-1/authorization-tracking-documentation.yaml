meta:
  id: authorization-tracking-documentation
  level: 1
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Create authorization tracking documentation — organize pending, approved, and denied authorizations with follow-up schedules and status reporting"
  tags: [tracking-documentation, status-reporting, organization, beginner]

state: {}

trigger: |
  Create tracking documentation for managing multiple
  pending pre-authorizations. The practice currently
  has no organized system and authorizations are being
  lost or expiring.

  Current situation (chaotic):
  - 35 pending authorizations across 8 providers
  - 3 authorizations expired before procedures scheduled
  - 5 denials discovered too late for timely appeal
  - No single person responsible for tracking
  - Information scattered across fax folders, sticky notes,
    and email

  Authorizations to track (sample):

  1. Patient: Tom Brown — MRI Brain (pending 8 days)
     Insurance: Aetna — Standard review
  2. Patient: Lisa Kim — Knee Surgery (approved, expires 4/15)
     Insurance: BCBS — Surgery not yet scheduled
  3. Patient: Mark Davis — Humira (denied yesterday)
     Insurance: Cigna — Appeal deadline: 60 days
  4. Patient: Ana Ruiz — CT Chest (urgent, submitted today)
     Insurance: Medicare — 24-hour turnaround expected
  5. Patient: John Smith — Physical Therapy (approved, 
     12 visits used of 20) Insurance: UHC — expires 6/30

  Create:
  1. Authorization tracking spreadsheet template
  2. Daily/weekly follow-up workflow
  3. Expiration alert system
  4. Denial tracking and appeal deadline monitoring
  5. Status report template for providers
  6. Handoff documentation for staff coverage

assertions:
  - type: llm_judge
    criteria: "Tracking spreadsheet captures all critical data — patient name, insurance, auth number, status, submission date, expected turnaround, expiration date, and next action required; nothing falls through the cracks."
    weight: 0.35
    description: "TrackingCompleteness"
  - type: llm_judge
    criteria: "Follow-up workflow has clear triggers — defines when to follow up (e.g., day 4 if 5-day turnaround), who follows up, escalation if no response, and documentation of each contact; it's systematic, not ad hoc."
    weight: 0.35
    description: "FollowUpSystematic"
  - type: llm_judge
    criteria: "Expiration and deadline alerts prevent the problems described — approved authorizations nearing expiration trigger scheduling alerts, denial appeal deadlines create countdown notifications; the system catches issues before they become crises."
    weight: 0.30
    description: "AlertPrevention"
