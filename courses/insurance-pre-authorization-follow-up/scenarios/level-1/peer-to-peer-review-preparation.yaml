meta:
  id: peer-to-peer-review-preparation
  level: 1
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Prepare a provider for a peer-to-peer review call — talking points, clinical evidence summary, and call preparation checklist"
  tags: [peer-to-peer, call-preparation, clinical-summary, beginner]

state: {}

trigger: |
  Prepare a physician for a peer-to-peer review call
  with an insurance company medical director. The
  initial pre-authorization was denied and the P2P is
  the next step before formal appeal.

  Background:
  - Patient: Richard Thompson, age 58
  - Insurance: Anthem BCBS
  - Denied procedure: Spinal fusion L4-L5 (CPT 22612)
  - Denial reason: "Conservative treatment options not
    exhausted. Consider additional physical therapy and
    epidural injections before surgical intervention."
  - Ordering provider: Dr. Mark Anderson, Spine Surgery
  - P2P call scheduled: Tomorrow at 2:00 PM

  Clinical history:
  - Symptoms: 18 months of progressive lower back pain
    with L5 radiculopathy
  - MRI: Grade 2 spondylolisthesis L4-L5, severe neural
    foraminal stenosis
  - PT: Completed 24 sessions over 4 months (documented)
  - Epidural injections: 3 injections (2 transforaminal,
    1 interlaminar) — temporary relief only (2-3 weeks)
  - Medications: Gabapentin 600mg TID, meloxicam,
    muscle relaxant — partial relief
  - Functional status: Unable to sit >20 min, unable to
    work (on short-term disability), sleep disruption
  - Failed treatments summary: PT, injections, medications,
    activity modification, weight loss program

  Create:
  1. Clinical summary one-pager for Dr. Anderson
  2. Anticipated insurance medical director questions
  3. Talking points with evidence-based responses
  4. Key clinical guidelines to reference (NASS, etc.)
  5. Call preparation checklist
  6. Post-call documentation template

assertions:
  - type: llm_judge
    criteria: "Clinical summary is concise but comprehensive — presents the case in a logical flow (symptoms → diagnostics → failed treatments → current status → surgical indication) that a medical director can follow in under 2 minutes."
    weight: 0.35
    description: "ClinicalSummaryConcise"
  - type: llm_judge
    criteria: "Anticipated questions address the specific denial reason — prepares responses for 'why not more PT?', 'why not more injections?', 'is this truly surgical?' with specific clinical evidence and guideline references."
    weight: 0.35
    description: "AnticipatedQuestionsPrecision"
  - type: llm_judge
    criteria: "Talking points reference evidence-based guidelines — cites NASS or similar spine surgery criteria for when conservative treatment is considered exhausted, providing the medical director with a shared framework for evaluation."
    weight: 0.30
    description: "GuidelineReferences"
