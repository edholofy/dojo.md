meta:
  id: authorization-knowledge-graph
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Build a PA knowledge graph — design a structured knowledge system capturing payer rules, clinical criteria, regulatory requirements, and approval patterns for intelligent PA decision support"
  tags: [knowledge-graph, structured-knowledge, decision-support, expert]

state: {}

trigger: |
  Design a comprehensive knowledge graph for pre-
  authorization that captures the complex relationships
  between payer rules, clinical criteria, procedures,
  diagnoses, regulatory requirements, and approval
  patterns to power intelligent PA decision support.

  Purpose:
  The knowledge graph will serve as the foundational
  data structure for an intelligent PA management system.
  Current PA systems rely on flat databases of payer
  rules that don't capture relationships or enable
  reasoning.

  Knowledge domains to model:

  1. Payer rules domain:
  - PA requirements by payer × plan × service
  - Clinical criteria for each PA requirement
  - Step therapy sequences and alternatives
  - Formulary tiers and exception pathways
  - Network restrictions and authorization rules
  - Timelines and regulatory compliance requirements

  2. Clinical domain:
  - Procedure-diagnosis relationships (what procedures
    treat which diagnoses)
  - Evidence-based treatment pathways
  - Clinical guideline recommendations
  - Comorbidity interactions affecting PA
  - Conservative treatment hierarchies

  3. Regulatory domain:
  - State PA reform law provisions
  - CMS rules and timelines
  - ERISA preemption boundaries
  - Mental health parity requirements
  - Patient protection provisions

  4. Operational domain:
  - Provider credentialing and PA eligibility
  - Historical approval patterns by entity combination
  - Documentation requirements and templates
  - Appeal success factors and patterns
  - Turnaround time benchmarks

  Scale:
  - 8 major national payers
  - 50+ state jurisdictions
  - 10,000+ procedure codes
  - 70,000+ diagnosis codes
  - Hundreds of clinical guidelines

  Create:
  1. Knowledge graph schema design
  2. Entity and relationship taxonomy
  3. Data sourcing and ingestion strategy
  4. Query patterns for PA decision support
  5. Knowledge maintenance and update process
  6. Integration architecture with PA systems
  7. Validation and quality assurance methodology

assertions:
  - type: llm_judge
    criteria: "Knowledge graph schema captures multi-dimensional PA relationships — a single PA decision depends on payer + plan + service + diagnosis + provider + patient history + state regulations; the schema models these intersections as traversable graph relationships, not just flat lookup tables."
    weight: 0.35
    description: "SchemaDesign"
  - type: llm_judge
    criteria: "Query patterns support real-time PA decision-making — enables queries like 'Given patient X with diagnosis Y needing procedure Z under payer W in state S, what are the PA requirements, documentation needs, and predicted approval probability?' — returning actionable guidance in seconds."
    weight: 0.35
    description: "QueryPatternDesign"
  - type: llm_judge
    criteria: "Knowledge maintenance process handles the velocity of change — payer rules change quarterly, formularies change annually, regulations change with legislative cycles; the maintenance process captures these changes through automated monitoring, human review, and version control."
    weight: 0.30
    description: "KnowledgeMaintenance"
