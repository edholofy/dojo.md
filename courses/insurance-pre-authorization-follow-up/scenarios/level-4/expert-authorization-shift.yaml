meta:
  id: expert-authorization-shift
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Expert shift simulation — navigate organizational PA transformation challenges including board presentation, vendor evaluation, regulatory testimony, and clinical integration redesign"
  tags: [shift-simulation, organizational-transformation, strategic-leadership, expert]

state: {}

trigger: |
  You are the Chief Revenue Cycle Officer for a
  national health system. Today requires expert-level
  strategic decision-making across multiple domains.

  CHALLENGE 1 — Board presentation on PA investment:
  The Board of Directors meets in 2 hours. You must
  present a business case for a $2.5M PA transformation
  program (technology, staff, consulting). The CFO is
  supportive but the board chair is skeptical about
  ROI timelines. The program promises to reduce annual
  PA-related losses from $18M to $6M within 3 years.
  Key question: The board will ask "Why can't we just
  hire more staff instead of investing in technology?"

  CHALLENGE 2 — Vendor evaluation for AI PA platform:
  Three vendors have presented AI-powered PA platforms:
  - Vendor A: Established company, $1.2M/yr, proven at
    20+ health systems, 15% denial reduction average
  - Vendor B: Startup, $600K/yr, innovative ML approach,
    claims 30% denial reduction but only 3 clients
  - Vendor C: EHR-native (Epic module), $400K/yr,
    seamless integration but limited AI capabilities
  You must recommend one to the board this afternoon.

  CHALLENGE 3 — State regulatory testimony request:
  Your state legislature's health committee has invited
  you to testify next week about the impact of PA on
  patient care. You will testify alongside a payer
  representative who will defend PA as necessary for
  cost control. The committee is considering a PA reform
  bill that would mandate gold card exemptions, 48-hour
  response times, and PA validity minimums.

  CHALLENGE 4 — CMO-initiated clinical integration:
  The CMO wants to embed PA considerations into clinical
  decision support — ordering providers would see PA
  requirements, approval probability, and alternative
  options at the point of care. This requires significant
  clinical workflow redesign and provider buy-in.
  Some physicians see this as "insurance companies
  practicing medicine."

  Address all four challenges:
  1. Board presentation with ROI model and staff-vs-tech
     counter-argument
  2. Vendor recommendation with risk-adjusted analysis
  3. Legislative testimony outline
  4. Clinical integration strategy addressing physician
     concerns
  5. Strategic alignment across all four initiatives

assertions:
  - type: llm_judge
    criteria: "Board presentation counters the 'just hire staff' argument with data — shows that PA complexity (ePA, FHIR, parity, multi-state compliance) exceeds what additional manual staff can handle; technology investment reduces cost per PA from $68 to projected $25-30 while also improving quality and compliance."
    weight: 0.35
    description: "BoardROIArgument"
  - type: llm_judge
    criteria: "Vendor recommendation accounts for risk — Vendor B's 30% claim vs. 3 clients creates significant execution risk; Vendor A's proven track record vs. higher cost; Vendor C's integration advantage vs. limited AI; the recommendation includes a risk-adjusted evaluation, not just feature comparison."
    weight: 0.35
    description: "VendorRiskAnalysis"
  - type: llm_judge
    criteria: "Legislative testimony balances advocacy with credibility — presents data on PA burden and patient harm while acknowledging the legitimate role of utilization management; specific policy recommendations are practical for legislators to implement; establishes the health system as a constructive reform partner."
    weight: 0.30
    description: "TestimonyCredibility"
