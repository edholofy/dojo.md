meta:
  id: authorization-behavioral-economics
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Apply behavioral economics to PA — analyze how cognitive biases affect PA decisions by providers, payers, and patients, and design nudge-based interventions to improve outcomes"
  tags: [behavioral-economics, cognitive-bias, nudge-design, expert]

state: {}

trigger: |
  Apply behavioral economics principles to understand
  and improve pre-authorization decision-making by
  all parties — providers, payers, and patients.

  Research context:
  You are a behavioral economist embedded in a health
  system's innovation lab, tasked with designing
  evidence-based interventions to improve PA outcomes.

  Observed behavioral patterns:

  Provider-side biases:
  - Anchoring: Providers anchor to the first PA outcome
    they experience with a payer and assume future outcomes
    will be similar, reducing effort on submissions
  - Status quo bias: Providers continue prescribing PA-
    exempt medications even when PA-required alternatives
    are clinically superior
  - Learned helplessness: After repeated denials for a
    service category, providers stop requesting PA entirely
    — even for patients who clearly qualify
  - Optimism bias: Some providers submit minimal
    documentation expecting approval, then face denials

  Payer-side biases:
  - Loss aversion: Payers deny conservatively because
    the cost of approving an unnecessary service is more
    salient than the cost of denying a necessary one
  - Confirmation bias: Reviewers focus on documentation
    gaps that support denial rather than evidence supporting
    approval
  - Automation bias: Over-reliance on automated PA systems
    that apply rigid criteria without clinical nuance

  Patient-side behaviors:
  - Present bias: Patients abandon PA processes for
    treatments needed in the future but not urgently
  - Choice overload: Multiple steps, forms, and decisions
    in the PA process lead to patient disengagement
  - Authority compliance: Patients accept denials without
    question, not realizing they can appeal

  Create:
  1. Behavioral analysis framework for PA decisions
  2. Provider-side nudge interventions
  3. Payer-side decision architecture improvements
  4. Patient engagement behavioral design
  5. Measurement methodology for intervention impact
  6. Ethical considerations framework
  7. Implementation pilot design

assertions:
  - type: llm_judge
    criteria: "Provider-side nudges address learned helplessness and documentation quality — interventions like success rate feedback, pre-populated documentation templates, and approval probability indicators counteract specific biases identified; nudges are choice-preserving, not mandates."
    weight: 0.35
    description: "ProviderNudgeDesign"
  - type: llm_judge
    criteria: "Payer-side decision architecture addresses loss aversion and confirmation bias — proposes structural changes like requiring reviewers to document evidence supporting approval before denial, default-to-approve with exception criteria, or mandatory second review for denials in high-overturn categories."
    weight: 0.35
    description: "PayerDecisionArchitecture"
  - type: llm_judge
    criteria: "Measurement methodology enables rigorous evaluation — designs A/B testing or stepped-wedge trials to measure intervention impact on PA outcomes (approval rates, turnaround time, patient completion rates); controls for confounding variables and measures both intended effects and unintended consequences."
    weight: 0.30
    description: "MeasurementMethodology"
