meta:
  id: authorization-book-proposal
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Write a book proposal on PA reform and innovation — develop a comprehensive treatment of the PA crisis, reform movement, and technology solutions for a healthcare publisher"
  tags: [book-proposal, pa-reform, thought-leadership, expert]

state: {}

trigger: |
  Write a comprehensive book proposal for a major
  healthcare publisher on the pre-authorization crisis
  and the path to reform.

  Author qualifications:
  - 20 years in healthcare operations, last 10 focused
    on PA management and automation
  - Led PA transformation at two major health systems
  - Published 15 peer-reviewed articles on PA burden
  - Frequent speaker at MGMA, HFMA, HIMSS conferences
  - Member of AMA Prior Authorization Reform Task Force
  - Consultant to CMS on the interoperability final rule

  Book concept:
  Title: "The Authorization Crisis: How Prior Authorization
  Broke American Healthcare and How We Can Fix It"

  The book would:
  - Document the origin and growth of PA in managed care
  - Quantify the clinical and administrative burden
  - Present patient stories of PA-related harm
  - Analyze the regulatory reform landscape
  - Evaluate technology solutions (ePA, AI, FHIR)
  - Propose a comprehensive reform framework
  - Provide a practical implementation roadmap

  Target audience:
  - Healthcare executives and administrators
  - Physicians and clinical leaders
  - Health policy researchers and legislators
  - Health IT professionals
  - Healthcare MBA students

  Publisher targets:
  - ACHE Management Series
  - Health Administration Press
  - McGraw-Hill Healthcare
  - Springer Healthcare Management

  Create:
  1. Complete book proposal (publisher-ready)
  2. Chapter outline with summaries
  3. Sample chapter (introduction or key chapter)
  4. Market analysis and competitive positioning
  5. Author platform and promotional plan
  6. Timeline and delivery schedule

assertions:
  - type: llm_judge
    criteria: "Chapter outline tells a compelling narrative arc — moves from the problem (PA burden and patient harm) through analysis (how we got here, regulatory landscape) to solutions (technology, policy reform, implementation roadmap); each chapter builds on the previous one toward a coherent reform vision."
    weight: 0.35
    description: "NarrativeArc"
  - type: llm_judge
    criteria: "Market analysis demonstrates a gap in existing literature — while individual articles and reports address PA, no comprehensive book treatment exists; positions this work as the definitive reference for healthcare leaders navigating PA reform."
    weight: 0.35
    description: "MarketGapAnalysis"
  - type: llm_judge
    criteria: "Sample chapter demonstrates the author's unique voice — balances data-driven analysis with compelling patient stories, avoids being either purely academic or purely anecdotal; a publisher reading this chapter would want to acquire the book."
    weight: 0.30
    description: "SampleChapterQuality"
