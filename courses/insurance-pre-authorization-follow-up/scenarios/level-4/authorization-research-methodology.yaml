meta:
  id: authorization-research-methodology
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Design a research study measuring the clinical and financial impact of PA on patient outcomes — develop methodology, IRB protocol, and publication strategy for PA burden research"
  tags: [research-methodology, clinical-impact, irb-protocol, expert]

state: {}

trigger: |
  Design a comprehensive research study measuring the
  clinical, financial, and operational impact of
  pre-authorization requirements on patient care
  outcomes.

  Research context:
  - Sponsor: Health system research institute
  - Investigator: You are the principal investigator
  - Funding: $300K grant from healthcare foundation
  - Timeline: 18-month study
  - IRB approval: Required (patient data involved)

  Research questions:
  1. Primary: Does PA-related treatment delay lead to
     measurable clinical deterioration in cancer,
     cardiovascular, and behavioral health patients?
  2. Secondary: What is the total administrative cost
     of PA per transaction across different specialties?
  3. Secondary: Do PA denial patterns correlate with
     patient demographics (race, income, payer type)?
  4. Exploratory: Does ePA adoption reduce PA-related
     adverse events compared to manual PA processes?

  Available data sources:
  - EHR data from a 12-hospital health system (3 years)
  - Claims data from 2 commercial payers (partnership)
  - PA tracking system data (submission-to-decision times)
  - Patient satisfaction surveys (existing)
  - Staff time studies (new data collection needed)
  - State adverse event reporting database

  Methodological considerations:
  - Retrospective cohort for clinical outcome analysis
  - Time-motion study for administrative cost analysis
  - Regression analysis controlling for clinical severity
  - Sub-group analysis for demographic disparities
  - Propensity score matching for ePA vs. manual comparison

  Create:
  1. Study protocol with methodology
  2. IRB application narrative
  3. Data collection and management plan
  4. Statistical analysis plan
  5. Health equity analysis framework
  6. Publication and dissemination strategy
  7. Policy recommendation development plan

assertions:
  - type: llm_judge
    criteria: "Study methodology addresses causation vs. correlation — PA delays and worse outcomes could be confounded by disease severity; the design uses propensity score matching, severity adjustment, and appropriate controls to isolate the PA delay effect from underlying clinical complexity."
    weight: 0.35
    description: "MethodologicalRigor"
  - type: llm_judge
    criteria: "Health equity analysis is embedded in the study design — examines whether PA denials and delays disproportionately affect patients by race, income, insurance type, or language; uses regression analysis to control for clinical factors and isolate demographic effects."
    weight: 0.35
    description: "HealthEquityAnalysis"
  - type: llm_judge
    criteria: "Publication and dissemination strategy targets both academic and policy audiences — peer-reviewed journals for clinical evidence, CMS and state regulators for policy impact, professional organizations (AMA, MGMA) for practice change; the research is designed to influence PA reform."
    weight: 0.30
    description: "DisseminationStrategy"
