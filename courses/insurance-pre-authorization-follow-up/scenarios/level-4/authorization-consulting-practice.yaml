meta:
  id: authorization-consulting-practice
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Build a consulting practice specializing in PA optimization — develop service offerings, client engagement models, and revenue impact methodologies for health system PA transformation"
  tags: [consulting-practice, pa-optimization, revenue-impact, expert]

state: {}

trigger: |
  Build a consulting practice specializing in
  pre-authorization optimization for health systems
  and medical practices.

  Consultant profile:
  - 15 years in healthcare revenue cycle management
  - Certified in Six Sigma (Black Belt) and LEAN
  - Former VP of Revenue Cycle at a 500-provider system
  - Published research on PA burden and automation
  - Network of health system and payer contacts

  Market opportunity:
  - US healthcare spends $34B annually on PA administration
  - Average practice spends $68 per PA transaction
  - CMS final rule creating compliance urgency
  - 85% of physicians report PA delays harm patients
  - Growing interest in PA automation and ePA
  - Few consulting firms specialize in PA specifically

  Target clients:
  - Mid-size health systems (100-500 providers)
  - Large multi-specialty practices
  - FQHCs and safety-net providers
  - Health plans seeking to reduce PA-related complaints

  Service areas to develop:
  1. PA operations assessment and benchmarking
  2. Denial reduction and prevention programs
  3. ePA and FHIR implementation advisory
  4. Payer contract PA term negotiation support
  5. Staff training and competency development
  6. Regulatory compliance (CMS rule, state laws)
  7. Revenue recovery and appeal optimization

  Create:
  1. Business plan with service offerings
  2. Client engagement methodology
  3. ROI demonstration framework
  4. Pricing strategy and revenue model
  5. Marketing and thought leadership plan
  6. Scalability strategy (solo to firm)
  7. Competitive differentiation positioning

assertions:
  - type: llm_judge
    criteria: "Service offerings are productized with clear deliverables — each offering has defined scope, methodology, timeline, and measurable outcomes; clients understand exactly what they're buying and what results to expect; not just 'we'll help you with PA'."
    weight: 0.35
    description: "ProductizedServices"
  - type: llm_judge
    criteria: "ROI demonstration framework quantifies client value — connects PA improvements (denial reduction, turnaround time, staff efficiency) to dollar amounts using standard healthcare financial metrics; enables the consultant to show 3-5x return on consulting fees."
    weight: 0.35
    description: "ROIDemonstration"
  - type: llm_judge
    criteria: "Competitive differentiation leverages the CMS rule urgency — positions the practice as the go-to expert for FHIR PA compliance, which is time-sensitive and technically complex; uses regulatory deadline pressure as a natural sales accelerator."
    weight: 0.30
    description: "CompetitiveDifferentiation"
