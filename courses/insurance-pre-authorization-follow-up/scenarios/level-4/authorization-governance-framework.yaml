meta:
  id: authorization-governance-framework
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Design an organizational governance framework for PA operations — executive oversight, clinical committee structure, performance accountability, and strategic alignment"
  tags: [governance-framework, executive-oversight, accountability, expert]

state: {}

trigger: |
  Design a comprehensive governance framework for
  pre-authorization operations within a large health
  system that elevates PA from a back-office function
  to a strategically managed capability.

  Organization: Atlantic Health Partners
  - 8 hospitals, 45 ambulatory sites
  - 800 providers across 18 specialties
  - Annual PA volume: 65,000 requests
  - PA staff: 85 FTEs (decentralized across locations)
  - Annual PA-related revenue impact: $18M
  - Current reporting: PA reports to each facility's
    revenue cycle director (no system-level oversight)

  Governance gaps identified:
  - No executive accountability for PA performance
  - No clinical committee reviewing PA criteria alignment
  - No standardized policies across the system
  - No formal escalation pathway for urgent PA needs
  - No mechanism for providers to report PA barriers
  - No strategic use of PA data in payer negotiations
  - No patient advocacy function within PA operations
  - No connection between PA operations and quality metrics

  Stakeholders requiring governance representation:
  - Chief Medical Officer (clinical oversight)
  - Chief Financial Officer (revenue impact)
  - Chief Information Officer (technology/interoperability)
  - VP of Revenue Cycle (operations)
  - Medical directors by specialty
  - Patient experience leadership
  - Legal/compliance
  - Payer relations

  Create:
  1. Governance structure and committee charters
  2. Executive dashboard and reporting cadence
  3. Clinical PA review committee design
  4. Performance accountability framework
  5. Provider feedback and advocacy mechanism
  6. Strategic PA data utilization plan
  7. Patient advocacy integration
  8. Annual governance calendar

assertions:
  - type: llm_judge
    criteria: "Governance structure creates clear accountability without bureaucracy — committee charters define decision rights, escalation paths, and meeting cadence; the CMO owns clinical criteria alignment, the CFO owns financial performance, and the CIO owns technology; cross-functional coordination is structured, not ad hoc."
    weight: 0.35
    description: "GovernanceAccountability"
  - type: llm_judge
    criteria: "Clinical PA review committee serves a meaningful function — reviews payer PA criteria against evidence-based guidelines, identifies criteria that are clinically inappropriate, and provides physician leadership for appeals and payer negotiations; this is not just another committee but a clinical authority."
    weight: 0.35
    description: "ClinicalCommitteeFunction"
  - type: llm_judge
    criteria: "Provider feedback mechanism enables frontline intelligence — physicians and APPs can report PA barriers, unreasonable criteria, and patient harm from PA delays through a structured channel; feedback is aggregated, analyzed, and drives governance action."
    weight: 0.30
    description: "ProviderFeedbackMechanism"
