meta:
  id: authorization-technology-product
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Design a PA technology product — create a SaaS platform for intelligent PA management with predictive analytics, automated submission, and payer integration"
  tags: [technology-product, saas-platform, product-design, expert]

state: {}

trigger: |
  Design a SaaS technology product for intelligent
  pre-authorization management that combines AI,
  workflow automation, and payer integration into
  a comprehensive platform.

  Product vision:
  "Eliminate PA as a barrier to patient care through
  intelligent automation and real-time payer integration."

  Target market:
  - Primary: Medical practices (10-100 providers)
  - Secondary: Health systems (100-500 providers)
  - TAM: 250,000 practices, $3.2B addressable market
  - Early adopter profile: Multi-specialty practices
    with high PA volume and ePA readiness

  Core product capabilities:
  1. Intelligent PA determination — instantly identifies
     whether a service requires PA for a specific patient/payer
  2. Automated documentation assembly — pulls clinical
     data from EHR and assembles PA-ready packages
  3. Multi-channel submission — ePA, portal, fax with
     intelligent routing by payer capability
  4. Predictive approval scoring — ML model predicts
     approval probability before submission
  5. Real-time status tracking — unified dashboard across
     all payers and submissions
  6. Automated follow-up — escalation workflows for
     overdue responses
  7. Appeal management — automated appeal letter generation
     with clinical evidence assembly
  8. Analytics and reporting — denial patterns, turnaround
     trends, provider performance

  Technical architecture decisions needed:
  - EHR integration strategy (Epic, Cerner, Athena, etc.)
  - FHIR vs. proprietary API approach
  - ML model training data and privacy
  - Multi-tenant vs. single-tenant architecture
  - Real-time processing requirements

  Business model:
  - SaaS subscription (per provider per month)
  - Implementation fee
  - Potential outcome-based pricing component

  Create:
  1. Product requirements document (PRD)
  2. Technical architecture overview
  3. EHR integration strategy
  4. ML model specification
  5. Go-to-market strategy
  6. Pricing model with unit economics
  7. Competitive analysis and positioning
  8. Product roadmap (12-month)

assertions:
  - type: llm_judge
    criteria: "Product requirements prioritize the highest-value capabilities — PA determination and automated documentation assembly address the most time-consuming manual steps; predictive approval scoring differentiates from competitors; the PRD sequences capabilities by build complexity and market impact."
    weight: 0.35
    description: "ProductRequirements"
  - type: llm_judge
    criteria: "Technical architecture addresses the core integration challenge — connecting to multiple EHRs and multiple payers with different APIs, formats, and capabilities requires a middleware/abstraction layer; the architecture balances standardization with payer-specific adaptability."
    weight: 0.35
    description: "TechnicalArchitecture"
  - type: llm_judge
    criteria: "Business model and unit economics are viable — per-provider pricing reflects the value delivered (PA cost reduction from $68 to projected $20-30 per transaction); implementation fees cover onboarding costs; outcome-based pricing component aligns incentives with client success."
    weight: 0.30
    description: "BusinessModelViability"
