meta:
  id: authorization-certification-program
  level: 4
  course: insurance-pre-authorization-follow-up
  type: output
  description: "Design a professional certification program for PA specialists — competency frameworks, assessment methodologies, continuing education, and career pathway development"
  tags: [certification-program, professional-development, competency-framework, expert]

state: {}

trigger: |
  Design a professional certification program for
  pre-authorization specialists that establishes
  professional standards, validates competency, and
  creates career pathways in PA operations.

  Context:
  - No nationally recognized PA specialist certification
    currently exists (unlike medical coding - CPC, CCS)
  - PA specialist role has grown in complexity with ePA,
    FHIR, parity laws, and VBC arrangements
  - High turnover in PA positions (35% annually)
  - No standardized training or competency assessment
  - Growing demand for skilled PA professionals

  Sponsoring organization:
  - Healthcare Revenue Cycle Association (fictional)
  - 5,000 member organizations nationally
  - Existing certification programs in coding and billing
  - Budget for certification development: $500K
  - Advisory board of health system PA leaders

  Certification tiers to design:
  1. Certified PA Specialist (CPAS) — entry level
     * Basic PA processing, payer requirements, documentation
  2. Certified PA Professional (CPAP) — intermediate
     * Complex PA management, appeals, specialty medications
  3. Certified PA Leader (CPAL) — advanced
     * PA operations management, strategy, analytics

  Design requirements:
  - Competency-based assessment (not just knowledge)
  - Practical scenario-based examination components
  - Continuing education requirements
  - Recertification cycle
  - Experience prerequisites
  - Accreditation pathway

  Create:
  1. Competency framework for each certification level
  2. Examination design and assessment methodology
  3. Study curriculum and preparation resources
  4. Continuing education requirements
  5. Recertification process
  6. Career pathway map showing progression
  7. Employer value proposition for certified staff
  8. Launch and marketing strategy

assertions:
  - type: llm_judge
    criteria: "Competency framework reflects real PA complexity — entry level covers payer rules, documentation requirements, and submission processes; intermediate adds clinical knowledge for specialty PA, appeal writing, and ePA systems; advanced includes analytics, payer negotiation, and strategic PA management."
    weight: 0.35
    description: "CompetencyFramework"
  - type: llm_judge
    criteria: "Assessment methodology validates practical competency — includes scenario-based testing (not just multiple choice) where candidates must process a mock PA, identify documentation gaps, write an appeal, or triage concurrent requests; mirrors real-world PA challenges."
    weight: 0.35
    description: "AssessmentMethodology"
  - type: llm_judge
    criteria: "Career pathway addresses retention — the 35% annual turnover indicates PA specialists lack career progression; the certification creates advancement opportunities (specialist → professional → leader) with corresponding salary differentiation and expanded responsibilities."
    weight: 0.30
    description: "CareerPathwayRetention"
