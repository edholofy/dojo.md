meta:
  id: digital-goods-dispute-strategy
  level: 3
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Build a digital goods dispute strategy — design evidence collection and prevention specifically for software, digital content, and online services"
  tags: [stripe, dispute, digital-goods, SaaS, evidence, usage-proof, advanced]

state: {}

trigger: |
  You're the Head of Trust & Safety at a digital content platform
  (streaming, courses, software licenses — $30M ARR). Digital goods
  have uniquely challenging dispute dynamics: no shipping proof, no
  delivery signature, and customers can claim "not received" even
  after consuming the entire product.

  Your dispute data (digital goods):
  - Dispute rate: 0.9% (higher than industry average of 0.5%)
  - Win rate: 22% (industry average for digital: 35%)
  - Top reasons: Fraudulent 50%, Product not received 25%,
    Product unacceptable 15%, Other 10%
  - Most disputed products: Premium courses ($99-$499), annual
    software licenses ($199-$999), streaming subscriptions ($9.99-
    $19.99/month)

  Evidence challenges for digital goods:
  - No shipping tracking or delivery confirmation
  - "Product not received" is hard to disprove for intangible goods
  - Customers complete courses then dispute (friendly fraud)
  - Software licenses can be used and then disputed
  - Streaming is consumed in real-time with no physical trace

  Tasks:
  1. Design the evidence collection system for digital goods. Write:
     the data to capture at every stage (purchase: IP, device, email
     verification, ToS acceptance; delivery: access timestamp, first
     login, content unlock; usage: completion percentage, features
     used, download history), the evidence storage architecture
     (immutable logs that can be exported for disputes), and the
     automated evidence packaging (turning logs into Stripe evidence
     fields).

  2. Create evidence templates for each product type. Write: the
     course dispute evidence (completion percentage, quiz scores,
     certificate issued), the software license evidence (activation
     timestamp, feature usage logs, API calls from customer's
     systems), the streaming evidence (watch history, device
     continuity, account activity), and the narrative templates
     for each product type.

  3. Build the digital-specific prevention system. Write: the
     refund-before-dispute strategy (make it easier to get a refund
     than to file a dispute), the access-gating strategy (for high-
     value courses: progressive content unlock tied to billing), the
     customer communication (post-purchase confirmation with clear
     descriptor), and the friendly fraud deterrent (warning that
     false disputes are fraud and may result in account termination
     and legal action).

assertions:
  - type: llm_judge
    criteria: "Evidence collection captures all digital proof — purchase verification, delivery/access timestamps, and usage metrics are all logged; storage is immutable; and automated packaging maps to Stripe fields"
    weight: 0.35
    description: "Complete digital evidence collection"
  - type: llm_judge
    criteria: "Evidence templates are product-specific — courses use completion data, software uses activation/API logs, streaming uses watch history, and narratives are tailored to each product type"
    weight: 0.35
    description: "Product-specific evidence templates"
  - type: llm_judge
    criteria: "Prevention system addresses digital-specific challenges — refund-before-dispute reduces escalation, access-gating protects high-value content, post-purchase communication prevents confusion, and deterrent messaging discourages abuse"
    weight: 0.30
    description: "Digital-specific prevention"
