meta:
  id: dispute-legal-strategy
  level: 3
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Navigate dispute legal issues — handle the legal dimensions of chargebacks including terms of service, arbitration, and law enforcement referrals"
  tags: [stripe, dispute, legal, terms-of-service, arbitration, law-enforcement, advanced]

state: {}

trigger: |
  You're the Legal Operations Manager at an e-commerce company. Three
  complex legal situations have arisen from disputes:

  Situation 1 — Serial fraudster ($12,000 across 8 disputes):
  One customer has filed 8 "fraudulent" disputes over 6 months,
  totaling $12,000. Each time they buy expensive electronics, receive
  them (tracking shows delivered), and file a dispute. You've won 2
  and lost 6 (issuing banks favor cardholders). The same person, same
  card, same address. This is clearly intentional friendly fraud.

  Your legal options: File a police report? Sue in small claims? Send
  a demand letter? Report to card network? At what dollar threshold
  does legal action become worthwhile?

  Situation 2 — Terms of Service weakness:
  Your external attorney reviewed your ToS and found critical
  weaknesses that hurt your dispute evidence: no binding arbitration
  clause for billing disputes, no clear refund policy, no explicit
  agreement to recurring charges, and no acknowledgment that filing
  false chargebacks constitutes fraud.

  Situation 3 — Card network arbitration:
  You won a dispute at the initial evidence stage, but the cardholder
  filed a pre-arbitration claim. Visa is requesting additional
  documentation and a $500 arbitration filing fee. The disputed
  amount is $3,200 for a commercial-grade printer. You have delivery
  proof, signed receipt, and the customer used the printer (toner
  reorder on file).

  Tasks:
  1. Handle the serial fraudster (Situation 1). Write: the legal
     strategy (demand letter, police report, small claims filing,
     card network reporting), the cost-benefit analysis of each legal
     option, the evidence package for law enforcement (organized
     chronologically with all 8 disputes), and the policy change to
     prevent future serial abuse (customer blocklist, purchase
     limits).

  2. Fix the Terms of Service (Situation 2). Write: the binding
     arbitration clause for billing disputes, the clear refund and
     return policy, the recurring charge acknowledgment language, the
     false chargeback fraud clause, and the explicit consent
     mechanism (how customers agree to these terms at checkout).

  3. Navigate the card network arbitration (Situation 3). Write:
     the pre-arbitration response (additional evidence, addressing
     the cardholder's new claims), the decision framework (when to
     accept the loss vs. proceed to arbitration based on amount and
     evidence strength), the arbitration filing with evidence, and
     the precedent tracking (how arbitration outcomes affect future
     disputes).

assertions:
  - type: llm_judge
    criteria: "Serial fraudster strategy is legally sound — legal options are evaluated with cost-benefit, evidence is organized for law enforcement, and prevention measures block future abuse"
    weight: 0.35
    description: "Legally sound fraudster strategy"
  - type: llm_judge
    criteria: "ToS fixes strengthen dispute defense — arbitration clause, refund policy, recurring charge acknowledgment, and false chargeback clause are all legally appropriate and improve evidence position"
    weight: 0.35
    description: "Defense-strengthening ToS fixes"
  - type: llm_judge
    criteria: "Arbitration navigation is strategic — pre-arbitration evidence is supplemented, the proceed/accept decision framework uses amount and evidence strength, and precedent tracking enables learning"
    weight: 0.30
    description: "Strategic arbitration navigation"
