meta:
  id: dispute-connect-platform
  level: 3
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Manage disputes on Stripe Connect platforms — design dispute handling for platforms with thousands of connected accounts"
  tags: [stripe, dispute, Connect, platform, connected-accounts, liability, advanced]

state: {}

trigger: |
  You're the Head of Risk at a Stripe Connect platform (2,500
  connected accounts, $80M annual GMV). Disputes on your platform
  are complex because three parties are involved: the buyer, the
  seller (connected account), and your platform.

  Platform dispute data:
  - Monthly disputes: 180
  - Platform liability disputes: 120 (destination charges)
  - Connected account liability: 60 (direct charges)
  - Average dispute amount: $167
  - Win rate: 25%
  - Connected accounts with >1% dispute rate: 45 (1.8% of total)
  - 5 connected accounts responsible for 40% of all disputes

  Dispute liability configuration:
  - Destination charges (default): Platform is liable for disputes
  - Direct charges: Connected account is liable
  - Separate charges and transfers: Platform can configure liability

  Key challenges:
  1. The platform bears liability for 120 disputes/month that
     sellers caused
  2. Evidence gathering requires seller cooperation (they have
     shipping info, customer communication)
  3. High-dispute sellers damage the platform's overall dispute rate
  4. Connected accounts in different countries have different rules
  5. Seller onboarding doesn't verify dispute-handling capability

  Tasks:
  1. Design the platform dispute management system. Include: the
     liability framework (when the platform vs. seller bears the
     cost), the automated seller evidence request (when a dispute
     arrives, immediately request evidence from the seller via API),
     the evidence assembly (combining platform data with seller
     data), and the financial resolution (debiting the seller's
     account for dispute fees and lost disputes).

  2. Build the seller risk management system. Include: the seller
     dispute rate monitoring (per-account dispute tracking), the
     tiered consequences (warning at 0.5%, review at 0.75%, funds
     hold at 1.0%, suspension at 1.5%), the seller education program
     (onboarding training on dispute prevention), and the high-risk
     seller identification (early indicators before disputes spike).

  3. Optimize the platform's overall dispute rate. Write: the
     strategy for the 5 high-dispute sellers (remediate or remove),
     the charge type optimization (when to use direct charges to
     shift liability), the platform-level prevention (pre-purchase
     verification, delivery confirmation requirements), and the
     connected account onboarding changes (dispute capability
     requirements).

assertions:
  - type: llm_judge
    criteria: "Platform system handles multi-party complexity — liability framework is clear, seller evidence requests are automated, evidence assembly combines both parties' data, and seller debiting is implemented"
    weight: 0.35
    description: "Multi-party dispute system"
  - type: llm_judge
    criteria: "Seller risk management is proactive — monitoring tracks per-account rates, consequences are tiered and proportionate, education reduces disputes, and early indicators catch problems"
    weight: 0.35
    description: "Proactive seller risk management"
  - type: llm_judge
    criteria: "Platform optimization addresses root causes — high-dispute sellers are handled, charge type decisions shift liability appropriately, platform-level prevention reduces overall rate, and onboarding improves seller quality"
    weight: 0.30
    description: "Root-cause platform optimization"
