meta:
  id: dispute-recovery-program
  level: 3
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Build a VDMP recovery program — design and execute a plan to exit Visa's Dispute Monitoring Program after exceeding the threshold"
  tags: [stripe, dispute, VDMP, recovery, monitoring-program, remediation, advanced]

state: {}

trigger: |
  Your company has been placed in Visa's VDMP (Dispute Monitoring
  Program) Standard tier. Your dispute rate hit 1.1% last month
  (threshold: 0.9%). Visa requires a remediation plan within 30 days
  and monthly compliance reporting.

  VDMP consequences:
  - Month 1-4: $25,000 monthly monitoring fee
  - Month 5-8: $50,000 monthly fee + $25 per dispute
  - Month 9-12: $75,000 monthly fee + $50 per dispute
  - Month 12+: Potential card processing termination

  Your data:
  - Monthly transactions: 15,000
  - Current dispute rate: 1.1% (165 disputes/month)
  - Target: Under 0.65% within 4 months (98 disputes/month max)
  - Need to eliminate ~67 disputes per month

  Dispute breakdown:
  - Fraud (genuine card-not-present fraud): 40 disputes/month
  - Friendly fraud (legitimate customers disputing): 55 disputes/month
  - Product issues (not received, unacceptable): 35 disputes/month
  - Subscription disputes: 20 disputes/month
  - Unrecognized charges: 15 disputes/month

  Budget for remediation: $150K over 4 months.

  Tasks:
  1. Write the Visa remediation plan. Include: the root cause
     analysis for each dispute category, the specific actions to
     reduce each category (with projected dispute reduction per
     action), the timeline (month-by-month targets), the monitoring
     and reporting plan (how you'll track progress), and the
     escalation plan (what if you're not on track).

  2. Implement the quick wins (first 30 days). Write: the Verifi
     RDR configuration (auto-refund disputes under $75 to prevent
     them from counting), the billing descriptor fix (reduce
     unrecognized from 15 to 3), the proactive refund policy (refund
     obvious fraud before disputes), the subscription pre-renewal
     notification (reduce subscription disputes), and the projected
     impact of all quick wins combined.

  3. Implement the structural fixes (months 2-4). Write: the Radar
     rule overhaul (targeting the 40 genuine fraud disputes), the
     friendly fraud prevention system (CE 3.0, evidence improvement,
     customer outreach before disputes), the product quality
     monitoring (reduce product issue disputes through better
     shipping, QC, and customer service), and the monthly compliance
     report format for Visa.

assertions:
  - type: llm_judge
    criteria: "Remediation plan addresses Visa's requirements — root cause analysis covers all categories, actions are specific with projected reduction, timeline is month-by-month, monitoring is defined, and escalation plan exists"
    weight: 0.35
    description: "Visa-compliant remediation plan"
  - type: llm_judge
    criteria: "Quick wins deliver immediate impact — RDR auto-refunds reduce counted disputes, descriptor fix addresses unrecognized charges, proactive refunds prevent fraud disputes, and combined impact projection is realistic"
    weight: 0.35
    description: "Impactful quick wins"
  - type: llm_judge
    criteria: "Structural fixes sustain improvement — Radar rules target genuine fraud, friendly fraud system uses CE 3.0, product quality monitoring reduces issue disputes, and compliance reporting is formatted"
    weight: 0.30
    description: "Sustainable structural fixes"
