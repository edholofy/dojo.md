meta:
  id: cross-border-dispute-management
  level: 3
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Manage cross-border disputes — handle international chargebacks with different card network rules, consumer protection laws, and evidence requirements"
  tags: [stripe, dispute, cross-border, international, regulations, card-networks, advanced]

state: {}

trigger: |
  You're the Head of Risk at a global e-commerce company selling in
  25 countries. International disputes are 3x harder than domestic
  ones because of varying card network rules, consumer protection
  laws, and evidence requirements.

  Your international dispute data:
  - US domestic: 0.4% dispute rate, 40% win rate
  - EU (SEPA): 0.6% dispute rate, 30% win rate
  - UK: 0.7% dispute rate, 28% win rate
  - Asia-Pacific: 1.1% dispute rate, 22% win rate
  - Latin America: 1.4% dispute rate, 18% win rate

  Specific challenges by region:

  EU: Strong consumer protection (Consumer Rights Directive). Customers
  have 14-day "cooling off" period for online purchases — they can
  return for ANY reason. If you deny a return within 14 days and the
  customer files a dispute, you will lose.

  UK: Similar to EU post-Brexit but with UK-specific rules. Section
  75 of the Consumer Credit Act allows credit card holders to claim
  against the card issuer for breach of contract for purchases
  £100-£30,000. This is separate from the chargeback process.

  Latin America: High fraud rates. Many countries have weak address
  verification systems. Installment payments (parcelas in Brazil)
  create unique dispute scenarios where a customer disputes one
  installment of a 12-part payment.

  Asia-Pacific: Varying card network penetration. Japan uses JCB
  (different dispute rules than Visa/Mastercard). India has RBI
  mandates affecting recurring payment disputes.

  Tasks:
  1. Create the cross-border dispute playbook. For each region:
     the key consumer protection laws that affect disputes, the
     card network differences (Visa/MC/Amex/JCB rules), the
     evidence requirements unique to the region, and the win rate
     optimization strategy.

  2. Address the EU 14-day cooling-off challenge. Write: how to
     detect disputes within the cooling-off period (likely losses),
     the proactive refund strategy (refund before the dispute is
     filed to avoid the fee), the evidence strategy for disputes
     outside the cooling-off period, and the terms of service
     adjustments needed for EU compliance.

  3. Design the global dispute prevention strategy. Write: the
     region-specific fraud prevention rules (higher 3DS usage in
     high-risk regions), the localized billing descriptors (in local
     language where possible), the region-specific customer
     communication (pre-charge notifications in countries with high
     unrecognized rates), and the overall dispute rate target by
     region with improvement roadmap.

assertions:
  - type: llm_judge
    criteria: "Cross-border playbook covers all regions — each region has specific consumer protection context, card network differences, evidence requirements, and win rate strategies"
    weight: 0.35
    description: "Comprehensive cross-border playbook"
  - type: llm_judge
    criteria: "EU cooling-off handling is legally sound — detection of cooling-off period disputes works, proactive refund strategy is practical, evidence for post-cooling-off is designed, and ToS adjustments comply"
    weight: 0.35
    description: "Legally sound EU handling"
  - type: llm_judge
    criteria: "Global prevention is region-appropriate — 3DS rules vary by risk, descriptors are localized, communications are region-specific, and targets are realistic per region"
    weight: 0.30
    description: "Region-appropriate prevention"
