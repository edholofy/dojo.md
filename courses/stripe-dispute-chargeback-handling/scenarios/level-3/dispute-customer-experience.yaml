meta:
  id: dispute-customer-experience
  level: 3
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Design dispute-preventing customer experiences — build UX flows that reduce chargebacks by making it easier to resolve issues directly"
  tags: [stripe, dispute, customer-experience, UX, self-service, prevention, advanced]

state: {}

trigger: |
  You're the Head of Customer Experience at an e-commerce company.
  Research shows that 40% of disputes could have been prevented if
  the customer had contacted you first. The problem: customers find
  it easier to call their bank than to navigate your support system.

  Customer journey analysis (for customers who filed disputes):
  - 58% never contacted support before filing
  - 22% contacted support, got no resolution within 48 hours, then
    filed
  - 12% contacted support, were denied a refund, then filed
  - 8% tried to contact support but couldn't find how

  Current customer experience problems:
  1. Support is buried: "Contact Us" link is in the footer, 6 clicks
     from the order page
  2. Slow response: Average first response time is 36 hours
  3. Rigid refund policy: "No refunds on opened items" drives
     disputes for unacceptable products
  4. No self-serve: Customers can't initiate returns or refunds
     without contacting support
  5. Poor communication: After purchase, no proactive communication
     about shipping or delivery

  Tasks:
  1. Redesign the post-purchase experience to prevent disputes.
     Write: the order confirmation improvements (clear descriptor
     explanation, support contact, delivery timeline), the proactive
     shipping updates (email at ship, in-transit, and delivery), the
     delivery confirmation follow-up (email asking "Did everything
     arrive okay?" with easy issue reporting), and the satisfaction
     check (7-day post-delivery survey with instant refund option
     for dissatisfied customers).

  2. Build the self-service dispute resolution center. Write: the
     order management page (where customers can initiate returns,
     request refunds, report issues without contacting support), the
     instant refund flow (for orders under $50, auto-approve refunds),
     the return label generation (for product issues), and the
     credit-before-dispute system (if a customer reports an issue,
     issue store credit immediately while investigating).

  3. Optimize the support escalation path. Write: the prominent
     support access (support button on every order page, not buried
     in footer), the 4-hour SLA for billing inquiries (faster than
     the time it takes to call a bank), the dispute interception
     (when a customer mentions "calling my bank" or "chargeback" in
     a support ticket, escalate immediately), and the measurement
     framework (track dispute-to-contact ratio, time-to-resolution
     vs. time-to-dispute).

assertions:
  - type: llm_judge
    criteria: "Post-purchase experience prevents confusion — order confirmation explains the descriptor, shipping updates are proactive, delivery follow-up catches issues, and satisfaction check offers easy resolution"
    weight: 0.35
    description: "Confusion-preventing post-purchase"
  - type: llm_judge
    criteria: "Self-service center reduces dispute motivation — customers can initiate returns/refunds easily, instant refund for small amounts removes friction, return labels simplify returns, and store credit provides immediate resolution"
    weight: 0.35
    description: "Motivation-reducing self-service"
  - type: llm_judge
    criteria: "Support escalation intercepts disputes — support is prominently accessible, billing inquiry SLA beats bank call time, chargeback mentions trigger escalation, and metrics track effectiveness"
    weight: 0.30
    description: "Dispute-intercepting support"
