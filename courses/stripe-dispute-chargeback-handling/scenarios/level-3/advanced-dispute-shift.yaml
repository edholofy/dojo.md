meta:
  id: advanced-dispute-shift
  level: 3
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Advanced dispute shift — handle a coordinated fraud ring, a VDMP compliance deadline, and a critical evidence system failure simultaneously"
  tags: [stripe, dispute, shift-simulation, fraud-ring, VDMP, system-failure, advanced]

state: {}

trigger: |
  You're the VP of Risk. Three crises converge on the same day:

  Crisis 1 — Coordinated fraud ring detected:
  Your fraud team identified a coordinated attack: 23 orders placed
  over the past 2 weeks, all from different cards but connected by
  shipping to 3 adjacent addresses. Total: $47,000 in orders, most
  already shipped and delivered. You expect all 23 to become disputes
  within the next 30 days, which would add 1.5% to your monthly
  dispute rate.

  Of the 23 orders: 18 have been delivered, 3 are in transit, and
  2 haven't shipped yet.

  Crisis 2 — VDMP compliance deadline:
  Visa's monthly VDMP compliance report is due in 48 hours. Your
  current month's dispute rate is 0.88%. If you submit at 0.88%,
  you'll be 0.02% under the threshold — but if even 3 of the 23
  fraud ring disputes are filed before month-end, you'll exceed 0.9%.

  Crisis 3 — Evidence system failure:
  Your automated evidence gathering system (which pulls order data,
  shipping info, and customer communication) crashed last night.
  There are 12 disputes with evidence deadlines in the next 72 hours
  that need manual evidence compilation. Your team of 2 people can
  handle approximately 6 disputes in 72 hours at manual speed.

  Tasks:
  1. Triage all three crises. Write: the priority order, the
     immediate actions for each (first 4 hours), and the resource
     allocation (you have 2 dispute analysts, 1 fraud investigator,
     and yourself).

  2. Handle Crisis 1 (fraud ring). Write: the immediate actions
     (cancel the 2 unshipped orders, attempt to intercept the 3
     in-transit, report the fraud ring to law enforcement), the
     evidence preparation for the 18 delivered orders (pre-compile
     evidence before disputes arrive), the dispute rate mitigation
     (can you use Verifi RDR to auto-resolve before they count?),
     and the card network notification.

  3. Handle Crises 2 and 3 under constraint. Write: the VDMP report
     preparation (honest reporting, risk communication to Stripe),
     the evidence deadline triage (which of the 12 disputes are
     worth fighting at $4,800 total, and which to accept to free up
     time), and the evidence system recovery plan (manual process
     for 72 hours, then fix).

assertions:
  - type: llm_judge
    criteria: "Triage is decisive — priority order is justified, immediate actions are achievable in 4 hours, and resource allocation matches the urgency of each crisis"
    weight: 0.35
    description: "Decisive triage"
  - type: llm_judge
    criteria: "Fraud ring response is comprehensive — unshipped orders are cancelled, in-transit intercept is attempted, evidence is pre-compiled, dispute rate mitigation uses pre-dispute alerts, and law enforcement is notified"
    weight: 0.35
    description: "Comprehensive fraud ring response"
  - type: llm_judge
    criteria: "Constrained resolution is realistic — VDMP report is honest, evidence deadline triage prioritizes winnable high-value cases, and system recovery plan ensures continuity"
    weight: 0.30
    description: "Realistic constrained resolution"
