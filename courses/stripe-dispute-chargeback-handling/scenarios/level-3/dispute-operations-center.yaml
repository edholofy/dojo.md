meta:
  id: dispute-operations-center
  level: 3
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Build a dispute operations center — design the team, processes, and technology for a high-volume dispute management operation"
  tags: [stripe, dispute, operations, team, SLA, workflow, advanced]

state: {}

trigger: |
  You're building the Dispute Operations Center for a large
  e-commerce marketplace ($200M GMV, 500+ disputes per month). The
  CEO says: "Disputes cost us $1.2M last year. I want a dedicated
  team that cuts that in half."

  Current state:
  - 500+ disputes/month (growing 10% QoQ)
  - Win rate: 28%
  - Average response time: 8 days (deadline is 20 for Visa)
  - Evidence quality: Inconsistent (depends on who handles it)
  - Team: 1 part-time person + ad-hoc help from support
  - No SLAs, no templates, no automation

  Target state:
  - Win rate: 50%+
  - Response time: <48 hours
  - Cost reduction: $600K+ annually
  - Full dispute lifecycle management

  Budget: $300K/year (team + tools)

  Tasks:
  1. Design the team structure and operating model. Include: the
     team composition (dispute analysts, fraud investigators,
     operations manager — how many of each?), the skill requirements
     (evidence writing, data analysis, Stripe expertise), the shift
     coverage (disputes arrive 24/7, evidence deadlines don't wait),
     the escalation matrix (who handles which dispute types), and
     the performance metrics (individual and team KPIs).

  2. Define the dispute management workflows. Include: the intake
     and triage process (categorize by reason, amount, win
     probability), the evidence gathering SLA (48 hours from dispute
     creation to evidence submitted), the quality review process
     (peer review of evidence before submission), the escalation
     path (disputes over $1,000 require senior review), and the
     continuous improvement cycle (monthly win rate analysis,
     evidence A/B testing).

  3. Build the technology stack. Include: the dispute management
     platform (custom or third-party), the evidence automation
     tools (order lookup, shipping tracking, customer communication
     search), the analytics dashboard (real-time dispute rate,
     win rate trend, SLA compliance, team productivity), and the
     Stripe API integration (automated evidence submission,
     webhook-driven workflow).

assertions:
  - type: llm_judge
    criteria: "Team structure matches the workload — team size handles 500+ disputes/month, roles cover all dispute types, shift coverage ensures deadlines are met, and KPIs drive performance"
    weight: 0.35
    description: "Workload-matching team structure"
  - type: llm_judge
    criteria: "Workflows ensure quality and speed — triage categorizes effectively, 48-hour SLA is enforced, quality review catches weak evidence, escalation protects high-value cases, and improvement cycle optimizes over time"
    weight: 0.35
    description: "Quality and speed workflows"
  - type: llm_judge
    criteria: "Technology stack enables efficiency — platform automates routine tasks, evidence tools reduce manual effort, analytics provide visibility, and Stripe integration is well-designed"
    weight: 0.30
    description: "Efficiency-enabling technology"
