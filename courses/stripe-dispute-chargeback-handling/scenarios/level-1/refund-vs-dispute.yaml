meta:
  id: refund-vs-dispute
  level: 1
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Understand refunds vs disputes — learn when to proactively refund to prevent disputes and when to fight them"
  tags: [stripe, dispute, refund, prevention, decision-making, cost-analysis, beginner]

state: {}

trigger: |
  You're a customer service manager at an e-commerce company. Your
  team handles ~50 customer complaints per week about charges. Some
  complain directly to you, others go straight to their bank (filing
  a dispute). You need a clear policy on when to refund proactively
  vs. when to let disputes happen.

  Current situation:
  - Monthly disputes: 35 (costing $15 × 35 = $525 in dispute fees
    alone, plus the disputed amounts)
  - Dispute win rate: 28% (losing most disputes)
  - Average dispute amount: $127
  - You suspect 40% of disputes could have been prevented if the
    customer had contacted you first
  - Current dispute rate: 0.65% (dangerously close to Visa's 0.9%
    threshold)

  Cost analysis needed:
  - Refund cost: Lost revenue + payment processing fee (not recovered
    on refund)
  - Dispute cost: $15 fee + frozen funds during dispute + time to
    submit evidence + risk of losing + impact on dispute rate
  - Dispute rate consequences: Visa VDMP monitoring at 0.9% (fines,
    required action plan), Mastercard EFM at 1.0%

  Five scenarios to decide:
  1. Customer emails: "I didn't order this!" Amount: $34.99.
     Shipping shows delivered. Customer has 0 previous orders.
  2. Customer emails: "Double charged!" Amount: $89.99 × 2.
     You verify there are indeed 2 identical charges 30 seconds apart.
  3. Customer emails: "I want a refund, product is terrible."
     Amount: $199.99. Product was delivered, no defect. Your policy
     says "no refunds on opened products."
  4. No customer contact. Dispute filed: "Fraudulent." Amount:
     $449.99. CVC passed, AVS passed, customer has 3 previous
     successful orders.
  5. Customer tweets: "This company is a scam! I'm calling my bank!"
     Amount: $67.00. Order was delivered 2 days ago.

  Tasks:
  1. Make the refund-vs-fight decision for each scenario. For each:
     the decision (refund proactively, fight the dispute, or
     partial refund), the reasoning (cost analysis, win probability,
     dispute rate impact), and the customer communication.

  2. Write the dispute prevention policy. Include: the decision
     tree (when to refund immediately, when to fight, when to
     offer partial refund), the dollar thresholds (under $X: always
     refund, it's cheaper than fighting), the customer history
     factors (repeat customers, first-time buyers, known fraud
     patterns), and the dispute rate management (when you're
     approaching 0.9%, lower your threshold for proactive refunds).

  3. Calculate the financial impact of the new policy. Include:
     the projected dispute rate reduction (from 0.65% to target),
     the cost savings from fewer dispute fees, the revenue impact
     of increased proactive refunds, and the net benefit to the
     business.

assertions:
  - type: llm_judge
    criteria: "Decisions are well-reasoned for all 5 scenarios — each considers cost, win probability, and dispute rate impact; obvious refunds (double charge) are identified; fights are picked only when evidence is strong"
    weight: 0.35
    description: "Well-reasoned decisions"
  - type: llm_judge
    criteria: "Prevention policy is actionable — decision tree covers common scenarios, dollar thresholds reflect the economics, customer history is factored in, and dispute rate management provides escalation rules"
    weight: 0.35
    description: "Actionable prevention policy"
  - type: llm_judge
    criteria: "Financial analysis is quantified — dispute rate reduction is projected, fee savings are calculated, refund cost increase is accounted for, and net benefit shows the policy is worth implementing"
    weight: 0.30
    description: "Quantified financial analysis"
