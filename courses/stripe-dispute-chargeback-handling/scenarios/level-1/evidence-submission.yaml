meta:
  id: evidence-submission
  level: 1
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Submit dispute evidence — learn how to compile and submit compelling evidence for different dispute types"
  tags: [stripe, dispute, evidence, submission, documentation, beginner]

state: {}

trigger: |
  You're handling your first week of disputes at an e-commerce
  company. Three disputes arrived, each with a different reason.
  Your team lead says: "The evidence you submit determines whether
  we win or lose. Each reason code requires different evidence."

  Dispute 1 — "Product not received" ($89.99):
  Customer claims they never received the order.
  Your records:
  - Order shipped February 5th via FedEx
  - Tracking: 7961 0012 3456 7890 1234
  - FedEx shows: "Delivered to front door, February 8th, 2:14 PM"
  - Signature: None required (order under $100)
  - Shipping address matches billing address
  - No prior contact from customer about non-delivery

  Dispute 2 — "Product unacceptable" ($249.00):
  Customer claims the product was defective.
  Your records:
  - Product: Bluetooth speaker
  - Customer emailed support on February 12th: "Speaker cuts out"
  - Support replied February 12th: "Please try a factory reset.
    If still defective, we'll send a replacement or issue a refund."
  - Customer never replied to the support email
  - Customer filed dispute on February 20th (8 days later)
  - Your return policy: 30-day returns with no questions asked

  Dispute 3 — "Subscription canceled" ($49.00):
  Customer claims they canceled their subscription.
  Your records:
  - Subscription started January 1st
  - No cancellation request found in your system
  - Customer logged in 12 times in February (active usage)
  - The charge in dispute is the February renewal

  Tasks:
  1. Compile and submit evidence for each dispute. For each: list
     the specific Stripe evidence fields to populate, write the
     narrative for uncategorized_text, attach the relevant documents
     (tracking screenshot, email thread, login logs), and explain
     why each piece of evidence matters.

  2. Explain the evidence strategy for each dispute reason. Write:
     why "product not received" is your strongest case (delivery
     proof wins), why "product unacceptable" requires showing you
     offered a resolution, and why "subscription canceled" needs
     proof of active usage and no cancellation request.

  3. Write an evidence checklist template for your team. Include:
     the standard evidence to collect for each reason code, the
     format requirements (file types, size limits), the common
     mistakes that lose cases (blurry screenshots, missing dates,
     no narrative), and the win rate expectations by reason code.

assertions:
  - type: llm_judge
    criteria: "Evidence for all 3 disputes is well-compiled — correct Stripe fields are used, narratives are persuasive, documents support the case, and each piece of evidence is explained"
    weight: 0.35
    description: "Well-compiled evidence"
  - type: llm_judge
    criteria: "Evidence strategies are reason-specific — delivery proof for not-received, resolution attempt for unacceptable, usage proof for canceled, and the relative strength of each case is assessed"
    weight: 0.35
    description: "Reason-specific strategies"
  - type: llm_judge
    criteria: "Checklist template is team-ready — covers all reason codes, format requirements are specified, common mistakes are warned against, and win rate expectations set realistic goals"
    weight: 0.30
    description: "Team-ready checklist"
