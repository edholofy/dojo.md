meta:
  id: friendly-fraud-basics
  level: 1
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Handle friendly fraud — identify and respond to legitimate customers who file chargebacks instead of requesting refunds"
  tags: [stripe, dispute, friendly-fraud, first-party-fraud, evidence, beginner]

state: {}

trigger: |
  You're a support lead at a digital products company (online
  courses, $29-$199 per course). You've noticed a pattern: customers
  buy a course, complete it (you can see their progress), and then
  file a "fraudulent" dispute to get their money back. This is
  "friendly fraud" — the customer made the purchase but claims they
  didn't.

  Recent friendly fraud cases:
  Case 1: Customer bought "Advanced Python" for $149. Completed 94%
  of the course over 3 weeks. Filed "fraudulent" dispute on day 25.
  Your system logs show 47 logins from the same IP/device.

  Case 2: Customer bought 3 courses ($397 total). Downloaded all
  PDFs and course materials within 2 hours. Filed "product not
  received" dispute 5 days later. Downloads are logged.

  Case 3: Customer bought a course, emailed asking for a refund
  (which you denied because they completed 60% of the course per
  your policy), then filed a "credit not processed" dispute 2 days
  later.

  Your current win rate against friendly fraud: 35% (should be much
  higher with the evidence you have).

  Tasks:
  1. Submit evidence for each case. For each: identify the strongest
     evidence (IP/device logs, course completion data, download
     records, email communication), write the narrative for
     uncategorized_text (telling the story of the friendly fraud),
     and explain which evidence fields to use (customer_communication
     for Case 3, service_documentation for Cases 1 and 2).

  2. Design the friendly fraud prevention system. Include: the
     terms of service changes (clear non-refund policy for completed
     digital content), the pre-purchase disclosure (explicit
     agreement to terms), the IP/device fingerprinting (to prove
     the cardholder used the product), the email verification (tying
     the customer's email to the charge), and the download tracking
     (logging all content access).

  3. Write the evidence template for digital product friendly fraud.
     Include: the standard sections (product description, terms
     acceptance screenshot, usage logs, IP address matching billing
     address location, customer communication history), the common
     mistakes (not including timestamps, not showing the customer
     agreed to terms), and how to present technical evidence in a
     way that card network reviewers (non-technical) can understand.

assertions:
  - type: llm_judge
    criteria: "Evidence for all 3 cases is compelling — uses the strongest available evidence (completion logs, downloads, email thread), narratives tell a clear story of friendly fraud, and correct evidence fields are used"
    weight: 0.35
    description: "Compelling friendly fraud evidence"
  - type: llm_judge
    criteria: "Prevention system reduces future friendly fraud — ToS changes, pre-purchase disclosure, fingerprinting, email verification, and download tracking create a strong evidence foundation for future cases"
    weight: 0.35
    description: "Effective prevention system"
  - type: llm_judge
    criteria: "Evidence template is reusable — standard sections cover digital product disputes, common mistakes are warned against, and technical evidence is presented in non-technical terms"
    weight: 0.30
    description: "Reusable evidence template"
