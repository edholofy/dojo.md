meta:
  id: chargeback-protection-evaluation
  level: 2
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Evaluate chargeback protection options — compare Stripe's protection products with third-party solutions and in-house management"
  tags: [stripe, dispute, chargeback-protection, Smart-Disputes, evaluation, intermediate]

state: {}

trigger: |
  You're evaluating chargeback protection solutions for your
  e-commerce company ($2M monthly revenue, 0.7% dispute rate, $14K
  monthly in dispute losses). The CFO wants a recommendation.

  Options to evaluate:

  Option 1 — Stripe Chargeback Protection:
  - Cost: 0.4% per transaction ($8,000/month at $2M revenue)
  - Coverage: Fraud disputes only (not product issues or
    subscription disputes)
  - Benefit: Automatic reimbursement for covered disputes
  - Annual cap: $25,000
  - No evidence submission needed for covered disputes

  Option 2 — Stripe Smart Disputes:
  - Cost: 30% success fee (only pay when you win)
  - No dispute counter fee ($15 waived)
  - AI-powered evidence submission
  - Covers all dispute types (not just fraud)

  Option 3 — Third-party solution (Chargeflow/Chargebacks911):
  - Cost: 25-35% success fee
  - Full-service: they handle all evidence submission
  - Expert analysts for complex cases
  - Additional tools: pre-dispute alerts, prevention analytics

  Option 4 — In-house team:
  - Cost: 1 FTE at $65K + tools ($10K/year)
  - Full control over evidence and strategy
  - Can implement CE 3.0 and custom evidence
  - Requires expertise building and maintenance

  Your dispute breakdown:
  - Fraud disputes: 45% ($6,300/month)
  - Product issues: 30% ($4,200/month)
  - Subscription disputes: 15% ($2,100/month)
  - Other: 10% ($1,400/month)

  Current win rate: 30%

  Tasks:
  1. Analyze each option. For each: calculate the monthly cost, the
     expected recovery (based on dispute types covered and win rate),
     the net financial impact (cost minus recovery), the coverage
     gaps, and the operational burden.

  2. Recommend the optimal strategy. Write: the recommended approach
     (it may be a combination of options), the financial model
     showing the 12-month comparison, the implementation timeline,
     and the risks of each approach.

  3. Present to the CFO. Write: the executive summary (1 paragraph),
     the cost-benefit table comparing all 4 options, the
     recommendation with justification, and the key metrics to track
     after implementation (win rate, cost per dispute, net recovery).

assertions:
  - type: llm_judge
    criteria: "Analysis is financially rigorous — monthly costs, expected recovery, and net impact are calculated for each option; coverage gaps are identified (Chargeback Protection only covers fraud); and operational burden is assessed"
    weight: 0.35
    description: "Financially rigorous analysis"
  - type: llm_judge
    criteria: "Recommendation is well-justified — may combine options for optimal coverage, financial model shows 12-month comparison, implementation is phased, and risks are identified"
    weight: 0.35
    description: "Well-justified recommendation"
  - type: llm_judge
    criteria: "CFO presentation is concise and clear — executive summary is 1 paragraph, cost-benefit table enables quick comparison, and tracking metrics measure success"
    weight: 0.30
    description: "Clear CFO presentation"
