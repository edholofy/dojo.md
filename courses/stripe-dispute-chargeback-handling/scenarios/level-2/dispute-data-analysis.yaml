meta:
  id: dispute-data-analysis
  level: 2
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Analyze dispute data — extract insights from dispute patterns to identify root causes and prioritize prevention efforts"
  tags: [stripe, dispute, data-analysis, patterns, root-cause, insights, intermediate]

state: {}

trigger: |
  You're the data analyst supporting the payments team. The VP of
  Payments says: "We have 6 months of dispute data. I need you to
  find the patterns and tell me where to focus our prevention
  efforts."

  Dataset (6 months, 280 disputes):
  - By reason: Fraudulent 38%, Product not received 22%,
    Unrecognized 18%, Product unacceptable 10%, Subscription canceled
    7%, Duplicate 3%, Credit not processed 2%
  - By amount: Under $50 (25%), $50-$150 (40%), $150-$500 (25%),
    Over $500 (10%)
  - Win rate by reason: Fraudulent 22%, Not received 48%, Unrecognized
    15%, Unacceptable 35%, Canceled 20%, Duplicate 65%, Credit 30%
  - By product category: Electronics 42%, Clothing 28%, Digital 18%,
    Home goods 12%
  - By customer type: New (first purchase) 55%, Returning 45%
  - By payment method: Visa 52%, Mastercard 30%, Amex 12%, Discover 6%
  - By geography: US 70%, EU 15%, UK 8%, Other 7%
  - By day of week: Monday 20%, Friday 18%, Saturday 15%, other days
    ~12% each
  - Time from purchase to dispute: Average 32 days, Median 21 days

  Tasks:
  1. Perform the analysis and identify the top 5 insights. Write:
     the key patterns (which combinations of factors predict
     disputes), the root cause hypotheses for each pattern, the
     quantified impact of each pattern (disputes per month, dollar
     exposure), and the prioritized prevention opportunities
     (highest impact, lowest effort first).

  2. Create the dispute risk model. Write: the risk score formula
     (which factors increase dispute probability — product category,
     customer type, amount, geography, payment method), the risk
     segments (low, medium, high with dispute rate for each), and
     the targeted interventions per segment (what to do for
     high-risk transactions).

  3. Build the recurring dispute report. Write: the monthly
     executive summary template (key metrics, trends, actions taken),
     the dispute breakdown by all dimensions (reason, amount,
     product, customer, geography), the win rate analysis (what's
     working, what's not), and the forecast (projected dispute rate
     for next month based on trends).

assertions:
  - type: llm_judge
    criteria: "Analysis identifies meaningful patterns — top 5 insights go beyond obvious observations, root cause hypotheses are plausible, impact is quantified, and prevention priorities are ranked by impact and effort"
    weight: 0.35
    description: "Meaningful pattern identification"
  - type: llm_judge
    criteria: "Risk model uses the right factors — multi-factor scoring combines product, customer, amount, and geography; segments have distinct dispute rates; and interventions are targeted per segment"
    weight: 0.35
    description: "Multi-factor risk model"
  - type: llm_judge
    criteria: "Report template is executive-ready — monthly summary is concise, breakdowns are comprehensive, win rate analysis drives improvement, and forecasting helps planning"
    weight: 0.30
    description: "Executive-ready report template"
