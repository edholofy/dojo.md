meta:
  id: advanced-evidence-strategy
  level: 2
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Build advanced evidence strategies — craft compelling evidence packages for complex dispute scenarios using Visa CE 3.0"
  tags: [stripe, dispute, evidence, CE3, Visa, advanced-strategy, intermediate]

state: {}

trigger: |
  You're the dispute analyst at a mid-size e-commerce company (5,000
  transactions/month, 40 disputes/month). Your win rate is 32% —
  well below the 45% industry benchmark. Your manager suspects the
  problem is evidence quality, not case merit.

  Visa recently introduced Compelling Evidence 3.0 (CE 3.0), which
  allows you to prove prior non-fraudulent transactions with the
  same cardholder to combat friendly fraud. You need to understand
  and implement CE 3.0.

  Three complex dispute cases to solve:

  Case 1 — CE 3.0 eligible ($789.99, "Fraudulent"):
  Customer has 5 prior undisputed purchases over the past year
  (all from the same card, same device, same IP range). This is the
  6th purchase, and the customer claims fraud. CE 3.0 criteria
  require at least 2 prior undisputed transactions within 120-365
  days with matching payment method.

  Case 2 — Multi-item order partial dispute ($1,247.00 order,
  customer disputes $499.00, "Product unacceptable"):
  Customer ordered 4 items. Claims one item (a wireless router) is
  defective. Kept the other 3 items. Customer never contacted
  support. The router has a 30-day return policy they didn't use.

  Case 3 — International transaction ($2,100.00, "Fraudulent"):
  US-issued card used for a purchase shipped to a UK address.
  Customer claims the card was stolen. But: the UK shipping address
  is the same address used for 3 prior undisputed purchases, and
  the email on the account is verified with 2FA.

  Tasks:
  1. Compile CE 3.0 evidence for Case 1. Write: the prior
     transaction documentation (transaction IDs, dates, amounts,
     IP addresses, device IDs), the CE 3.0 eligibility checklist
     (same payment method, within time window, undisputed), the
     formatted evidence package, and the narrative explaining why
     this is friendly fraud.

  2. Build the evidence for Cases 2 and 3. For Case 2: partial
     dispute strategy (showing 3 items were acceptable, return
     policy not used, no prior support contact). For Case 3:
     international transaction evidence (address history, 2FA
     verification, prior undisputed purchases to same address).

  3. Create the evidence quality improvement playbook. Include:
     the evidence scoring rubric (what makes evidence "compelling"
     vs. "weak"), the evidence collection automation (what data to
     capture at purchase time that helps disputes later), the
     template library (one template per dispute reason), and the
     A/B testing approach for evidence narratives.

assertions:
  - type: llm_judge
    criteria: "CE 3.0 evidence is correctly compiled — prior transactions meet eligibility criteria, documentation includes required fields (payment method, IP, device), and the evidence makes a compelling friendly fraud case"
    weight: 0.35
    description: "Correct CE 3.0 evidence"
  - type: llm_judge
    criteria: "Complex cases have strong evidence — partial dispute shows selective behavior, unused return policy is leveraged, international case uses address history and 2FA, and narratives are persuasive"
    weight: 0.35
    description: "Strong complex case evidence"
  - type: llm_judge
    criteria: "Playbook improves win rates — scoring rubric is objective, automation captures evidence proactively, templates standardize quality, and A/B testing enables optimization"
    weight: 0.30
    description: "Win-rate improving playbook"
