meta:
  id: pre-dispute-alerts
  level: 2
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Implement pre-dispute alerts — set up Verifi RDR and Ethoca alerts to resolve disputes before they become chargebacks"
  tags: [stripe, dispute, pre-dispute, Verifi, Ethoca, RDR, prevention, intermediate]

state: {}

trigger: |
  You're the payments manager at an e-commerce company. Your dispute
  rate is 0.78% and you need to get it below 0.65% (Visa's early
  warning threshold). Your current approach — fighting disputes after
  they're filed — isn't working fast enough.

  Your payment processor introduced you to two pre-dispute services:

  Verifi RDR (Rapid Dispute Resolution):
  - Visa-exclusive
  - Automated: resolves disputes in 3 seconds
  - You set rules (e.g., "auto-refund all disputes under $50")
  - Resolved disputes DON'T count toward your dispute rate
  - Cost: ~$40 per alert
  - Can resolve up to 71% of Visa disputes before they become
    chargebacks

  Ethoca Alerts:
  - Multi-network (Visa and Mastercard)
  - Semi-automated: you receive an alert and have 24-72 hours to
    issue a refund
  - Primarily for fraud disputes
  - Cost: ~$40 per alert
  - Can prevent chargebacks but requires manual action

  Your dispute data (last 3 months):
  - Total disputes: 120
  - Visa disputes: 78 (65%)
  - Mastercard disputes: 36 (30%)
  - Other: 6 (5%)
  - Average dispute amount: $134
  - Disputes under $50: 32 (27%)
  - Disputes $50-$200: 58 (48%)
  - Disputes over $200: 30 (25%)

  Tasks:
  1. Evaluate and recommend a pre-dispute alert strategy. Write:
     the analysis of Verifi RDR vs. Ethoca (coverage, automation,
     cost), the recommended configuration for each service (what
     disputes to auto-resolve vs. review manually), the ROI
     calculation (cost of alerts vs. savings from reduced dispute
     rate and avoided monitoring program), and the projected dispute
     rate after implementation.

  2. Design the Verifi RDR rules. Write: the auto-refund rules
     (amount thresholds, dispute reason filters, customer history
     checks), the review rules (when to flag for human decision
     instead of auto-refund), the exclusion rules (when NOT to
     refund — e.g., known friendly fraud repeat offenders), and the
     integration with your order management system.

  3. Build the pre-dispute monitoring system. Write: the dashboard
     showing pre-dispute alert volume, auto-resolution rate, manual
     resolution rate, and the impact on your official dispute rate.
     Include the cost-benefit report (monthly spend on alerts vs.
     savings from avoided disputes) and the trend analysis.

assertions:
  - type: llm_judge
    criteria: "Strategy evaluation is data-driven — Verifi and Ethoca are compared on coverage, automation, and cost; configuration matches dispute patterns; ROI calculation uses actual numbers; and projected dispute rate is realistic"
    weight: 0.35
    description: "Data-driven strategy evaluation"
  - type: llm_judge
    criteria: "RDR rules are well-designed — auto-refund thresholds match the economics, review rules catch complex cases, exclusion rules prevent abuse, and integration with order management is planned"
    weight: 0.35
    description: "Well-designed RDR rules"
  - type: llm_judge
    criteria: "Monitoring system provides visibility — dashboard tracks alert volume and resolution rates, cost-benefit report justifies the investment, and trend analysis shows progress toward the 0.65% target"
    weight: 0.30
    description: "Visibility-providing monitoring"
