meta:
  id: dispute-ma-integration
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Integrate dispute systems in M&A — manage dispute operations during a merger, harmonize policies, and consolidate dispute management across acquired entities"
  tags: [stripe, dispute, M&A, integration, harmonization, consolidation, master]

state: {}

trigger: |
  You're the VP of Payment Operations at a holding company that just
  completed three acquisitions in 18 months, growing from $500M to
  $1.8B in annual revenue. Each acquired company has different dispute
  management practices, different payment processors, and different
  dispute rates. The board wants a unified dispute strategy within
  12 months.

  Acquired entities:

  Entity A — Premium fashion e-commerce ($400M revenue):
  - Processor: Stripe (same as parent)
  - Dispute rate: 0.45% (healthy)
  - Win rate: 48% (strong)
  - Team: 4 dedicated dispute analysts
  - Tools: Chargebacks911 managed service ($180K/year)
  - Strength: Excellent evidence quality, strong brand trust
  - Weakness: Manual processes, no API integration

  Entity B — Digital media subscription ($300M revenue):
  - Processor: Adyen (different from parent)
  - Dispute rate: 1.35% (critical — in Visa VDMP)
  - Win rate: 19% (very low)
  - Team: 2 customer support agents (part-time on disputes)
  - Tools: None (manual Adyen dashboard)
  - Strength: Large customer base, high-growth
  - Weakness: Subscription cancellation dark patterns, poor billing
    descriptors, no prevention infrastructure

  Entity C — Marketplace for handmade goods ($600M GMV):
  - Processor: Stripe Connect
  - Dispute rate: 0.82% (rising)
  - Win rate: 24% (low)
  - Team: 1 risk manager + outsourced to BPO ($90K/year)
  - Tools: Custom-built dispute tool (fragile, undocumented)
  - Strength: Unique marketplace data, seller cooperation
  - Weakness: Platform liability for seller disputes, BPO quality issues

  Parent company:
  - Processor: Stripe
  - Dispute rate: 0.58%
  - Win rate: 38%
  - Team: 6 analysts + 1 manager
  - Tools: Stripe API integration + internal tooling

  Tasks:
  1. Design the integration strategy. Include: the assessment framework
     (how to evaluate each entity's dispute maturity and identify the
     highest-priority problems), the processor consolidation plan (move
     Entity B from Adyen to Stripe — timeline, risks, migration steps,
     or keep multi-processor with unified reporting), the policy
     harmonization roadmap (unified refund policies, evidence standards,
     and escalation procedures across all entities), and the
     organizational model (centralized dispute team vs. hub-and-spoke
     vs. federated model — with recommendation and justification).

  2. Address the critical VDMP situation for Entity B. Include: the
     90-day emergency remediation plan (immediate actions to bring
     1.35% below 0.9%), the dark pattern audit (identify and fix
     subscription practices that drive disputes), the evidence system
     bootstrap (minimum viable evidence process while long-term
     integration proceeds), and the Visa remediation communication
     (how to present the acquisition context to Visa/Stripe — new
     ownership means new commitment to compliance).

  3. Build the unified dispute intelligence platform. Include: the
     consolidated data model (how to merge dispute data from Stripe,
     Adyen, and Stripe Connect into a single view), the cross-entity
     analytics (benchmarking entities against each other, identifying
     best practices to share), the unified reporting framework (single
     dashboard for the board showing all entities), and the synergy
     realization plan (vendor consolidation savings, shared tooling
     benefits, knowledge transfer value — quantified).

assertions:
  - type: llm_judge
    criteria: "Integration strategy is methodical — assessment framework evaluates maturity systematically, processor consolidation weighs risks and benefits, policy harmonization is phased, and organizational model is justified"
    weight: 0.35
    description: "Methodical integration strategy"
  - type: llm_judge
    criteria: "VDMP remediation is urgent and effective — 90-day plan has specific rate-reduction initiatives, dark patterns are identified and fixed, evidence system provides immediate capability, and Visa communication leverages acquisition narrative"
    weight: 0.35
    description: "Urgent effective VDMP remediation"
  - type: llm_judge
    criteria: "Unified platform enables cross-entity intelligence — data model handles multi-processor sources, cross-entity analytics identify best practices, reporting gives board visibility, and synergies are quantified"
    weight: 0.30
    description: "Cross-entity intelligence platform"
