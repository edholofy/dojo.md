meta:
  id: dispute-fintech-product
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Build a dispute management fintech product — design, validate, and go-to-market for a SaaS platform that helps merchants manage Stripe disputes"
  tags: [stripe, dispute, fintech, product, SaaS, go-to-market, master]

state: {}

trigger: |
  You're the co-founder/CPO of a fintech startup building a dispute
  management platform for Stripe merchants. You've raised a $4M seed
  round and have 12 months of runway. Your vision: make world-class
  dispute management accessible to every Stripe merchant, not just
  enterprises that can afford $300K/year managed services.

  Market research findings:
  - Stripe has 3.1M+ active business accounts
  - 85% of small-to-mid Stripe merchants have no dispute management
    tooling beyond the Stripe Dashboard
  - Average SMB dispute win rate: 22% (vs. 45%+ for merchants with
    professional tools)
  - Annual dispute losses for an average Stripe merchant ($2M revenue):
    $28,000
  - Willingness to pay: $200-500/month for a solution that recovers
    $15K+ annually
  - Competitors: Chargebacks911 ($$$, enterprise), Midigator ($$$,
    mid-market), Chargeback Gurus ($$$, managed service)
  - Gap: No affordable, self-service, Stripe-native solution

  Your advantages:
  - Deep Stripe API integration (Stripe App Marketplace listing)
  - AI-powered evidence generation (using LLMs)
  - Real-time dispute prevention (proactive alerts)
  - Pricing: $99/month Starter, $299/month Pro, $799/month Enterprise

  Technical architecture decisions needed:
  - Stripe OAuth for merchant onboarding
  - Webhook-driven dispute ingestion
  - LLM-based evidence generation and submission
  - Pre-dispute alert integration (Verifi RDR, Ethoca)
  - Multi-tenant architecture for 10K+ merchants

  Tasks:
  1. Define the product strategy. Include: the core value proposition
     (what makes your product 10x better than the Stripe Dashboard),
     the feature prioritization for MVP (rank: automated evidence
     submission, evidence templates, dispute analytics dashboard,
     pre-dispute alerts, AI evidence narratives, win rate prediction),
     the tier differentiation (what's in Starter vs. Pro vs.
     Enterprise — justify each tier boundary), and the Stripe App
     Marketplace strategy (how to leverage Stripe's distribution).

  2. Design the technical architecture. Include: the Stripe integration
     layer (OAuth flow, webhook processing, Evidence API submission,
     handling 10K+ merchants' webhooks), the AI evidence pipeline
     (how to generate compelling evidence narratives using LLMs —
     prompt design, quality assurance, handling hallucination risk),
     the multi-tenant data architecture (merchant isolation, data
     security, compliance with PCI requirements), and the scalability
     plan (from 100 merchants at launch to 10,000 in year 2).

  3. Create the go-to-market plan. Include: the launch strategy (beta
     program with 50 merchants, metrics for launch readiness, Stripe
     App Marketplace listing optimization), the pricing validation
     (A/B test framework for pricing tiers, free trial design, annual
     vs. monthly incentives), the content marketing strategy (dispute
     management content that attracts Stripe merchants — benchmark
     reports, best practice guides, ROI calculators), and the customer
     success framework (onboarding flow, time-to-value metrics,
     retention strategy, expansion triggers).

assertions:
  - type: llm_judge
    criteria: "Product strategy is differentiated — value proposition is specific and compelling, MVP features are prioritized based on impact, tier boundaries create natural upgrade paths, and Stripe Marketplace leverages distribution"
    weight: 0.35
    description: "Differentiated product strategy"
  - type: llm_judge
    criteria: "Technical architecture handles scale and trust — Stripe integration is robust, AI evidence pipeline manages quality and hallucination risk, multi-tenant design ensures isolation, and scalability plan is realistic"
    weight: 0.35
    description: "Scale-handling technical architecture"
  - type: llm_judge
    criteria: "GTM plan drives efficient growth — launch strategy validates before scaling, pricing validation uses data, content marketing targets the right audience, and customer success ensures retention"
    weight: 0.30
    description: "Efficient-growth GTM plan"
