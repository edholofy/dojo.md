meta:
  id: dispute-behavioral-economics
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Apply behavioral economics to disputes — use psychological principles to design systems that reduce dispute-filing behavior and improve resolution outcomes"
  tags: [stripe, dispute, behavioral-economics, psychology, nudge, decision-architecture, master]

state: {}

trigger: |
  You're the Head of Behavioral Science at a large e-commerce platform.
  The VP of Payments hired you specifically to apply behavioral economics
  to the dispute problem. Research shows that 65% of disputes involve
  some degree of "friendly fraud" — customers who received their
  products but file disputes anyway due to cognitive biases, friction,
  or perceived unfairness.

  Behavioral insights from customer research:
  1. Regret bias: 34% of disputers report "buyer's remorse" — they
     regret the purchase but find dispute filing easier than returns
  2. Effort heuristic: Filing a bank dispute takes 2 minutes via app;
     your return process takes 15 minutes and requires printing a label
  3. Loss aversion: Customers who perceive they "lost money" (billing
     confusion, forgot subscription) are 3x more likely to dispute
  4. Social proof: Customers who hear friends filed chargebacks
     successfully are 2.5x more likely to file one themselves
  5. Anchoring: Customers anchor on the "free protection" narrative
     from banks promoting chargeback rights
  6. Status quo bias: Subscription customers continue paying (not
     cancelling) but then dispute months of charges later
  7. Attribution error: When delivery is late, customers blame the
     merchant (not the carrier) and file disputes

  Customer segments by dispute motivation:
  - Impulsive regretters (34%): Bought on impulse, want money back
  - Confused billers (22%): Don't recognize the charge
  - Effort minimizers (18%): Returns too hard, disputes easier
  - Genuine fraud victims (15%): Actually didn't make the purchase
  - Subscription forgetters (11%): Forgot they signed up

  Tasks:
  1. Design the pre-dispute nudge system. For each customer segment,
     write: the behavioral diagnosis (what cognitive bias drives the
     dispute), the intervention point (when in the customer journey to
     intervene), the nudge design (the specific behavioral intervention
     — choice architecture, default setting, friction reduction, social
     proof, loss framing), and the expected impact (projected dispute
     reduction for that segment).

  2. Redesign the dispute-prevention UX using behavioral principles.
     Include: the purchase confirmation design (reducing regret through
     commitment devices and cooling-off nudges), the billing clarity
     system (statement descriptors, pre-charge notifications, and
     charge explanation pages that reduce confusion), the effortless
     resolution center (making refunds/returns so easy that disputes
     become the harder path — inverting the effort heuristic), and the
     subscription transparency framework (usage reminders, value
     reinforcement, easy cancellation that prevents dispute-as-
     cancellation).

  3. Build the evidence persuasion framework using behavioral science.
     Include: the narrative framing strategy (how to frame evidence
     to appeal to the issuing bank's decision-making biases — fairness
     framing, loss framing, authority framing), the evidence
     presentation order (primacy and recency effects in evidence
     organization), the visual evidence design (how visual evidence
     like delivery photos and signed receipts leverages the picture
     superiority effect), and the A/B testing framework for evidence
     effectiveness (testing different framings and measuring win rate
     impact).

assertions:
  - type: llm_judge
    criteria: "Nudge system is segment-specific — each segment has accurate behavioral diagnosis, interventions are timed correctly in the journey, nudge designs apply valid behavioral principles, and impact projections are reasonable"
    weight: 0.35
    description: "Segment-specific nudge system"
  - type: llm_judge
    criteria: "UX redesign inverts effort dynamics — purchase confirmation reduces regret, billing clarity reduces confusion, resolution center is genuinely easier than disputes, and subscription framework prevents accumulating charges"
    weight: 0.35
    description: "Effort-inverting UX redesign"
  - type: llm_judge
    criteria: "Evidence persuasion applies valid psychology — narrative framing uses appropriate cognitive biases, presentation order leverages memory effects, visual evidence uses picture superiority, and A/B testing enables optimization"
    weight: 0.30
    description: "Psychology-applying evidence persuasion"
