meta:
  id: dispute-board-strategy
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Present dispute strategy to the board — develop a board-level dispute governance framework, risk appetite statement, and multi-year investment thesis"
  tags: [stripe, dispute, board-strategy, governance, risk-appetite, investment, master]

state: {}

trigger: |
  You're the Chief Risk Officer presenting to the board of directors
  of a publicly traded e-commerce company ($2.5B annual revenue, $1.8B
  processed through Stripe). The board audit committee has requested a
  comprehensive dispute governance framework after discovering that
  dispute losses ($18M annually) exceed the company's cybersecurity
  budget ($12M).

  Board context:
  - 9 board members (3 financial backgrounds, 2 tech, 2 retail, 1 legal,
    1 PE)
  - Last quarter's earnings call: analyst questioned rising "payment
    processing costs" line item (which includes dispute losses)
  - Competitor: announced 40% dispute rate reduction using AI
  - Regulatory environment: FTC investigating "dark patterns" in
    subscription billing that lead to disputes
  - M&A: company is acquiring a digital marketplace ($200M deal, due
    diligence found 1.8% dispute rate on the target)

  Current dispute landscape:
  - Annual dispute volume: 72,000 (growing 15% YoY)
  - Dispute rate: 0.76% (Visa), 0.58% (Mastercard)
  - Win rate: 33%
  - Annual losses: $18M (direct) + $4M (fees) + $3M (operational)
  - Prevention investment: $1.2M (2 FTEs + Stripe Radar)
  - No formal dispute governance, no board reporting, no risk appetite

  Tasks:
  1. Present the dispute governance framework. Include: the governance
     structure (board audit committee oversight, management risk
     committee quarterly review, operational team monthly execution),
     the risk appetite statement (what dispute rate is acceptable given
     business strategy, growth targets, and regulatory environment —
     with justification for the chosen threshold), the escalation
     triggers (what dispute events require board notification — VDMP
     breach, material financial impact, regulatory inquiry), and the
     accountability matrix (who is responsible for dispute prevention,
     response, compliance, and reporting at each organizational level).

  2. Develop the multi-year investment thesis. Include: the 3-year
     roadmap (Year 1: foundational — team, tools, processes at $2M;
     Year 2: optimization — AI, automation, prevention at $3M; Year 3:
     leadership — predictive, industry-leading at $2M), the ROI model
     (projected dispute rate reduction, win rate improvement, and
     financial impact per year), the competitive positioning (how
     dispute excellence becomes a competitive advantage in customer
     trust and unit economics), and the M&A integration plan (how to
     bring the acquisition's 1.8% dispute rate to acceptable levels).

  3. Address the board's strategic questions. Include: the response to
     analyst concerns (how to communicate dispute cost reduction in
     earnings calls without revealing competitive intelligence), the
     AI strategy (realistic assessment of AI capabilities for dispute
     management — what works today, what's hype, timeline for impact),
     the regulatory preparedness (FTC dark patterns investigation —
     audit of subscription practices, proactive compliance changes),
     and the shareholder value connection (how dispute management
     improvements translate to EPS, customer lifetime value, and
     brand equity).

assertions:
  - type: llm_judge
    criteria: "Governance framework is board-appropriate — structure has clear oversight layers, risk appetite is justified with business context, escalation triggers are material, and accountability is assigned at every level"
    weight: 0.35
    description: "Board-appropriate governance framework"
  - type: llm_judge
    criteria: "Investment thesis is compelling and realistic — 3-year roadmap is phased appropriately, ROI model uses conservative assumptions, competitive positioning is strategic, and M&A integration is addressed"
    weight: 0.35
    description: "Compelling realistic investment thesis"
  - type: llm_judge
    criteria: "Strategic questions are addressed substantively — analyst communication strategy protects competitive intelligence, AI assessment is realistic, regulatory preparedness is proactive, and shareholder value connection is quantified"
    weight: 0.30
    description: "Substantively addressed strategic questions"
