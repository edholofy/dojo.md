meta:
  id: comprehensive-dispute-system
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Design a comprehensive dispute management system — architect the end-to-end platform covering prevention, detection, response, analytics, and continuous improvement"
  tags: [stripe, dispute, comprehensive, system-design, end-to-end, architecture, master]

state: {}

trigger: |
  You're the CTO tasked with designing the definitive dispute management
  system for a $5B e-commerce conglomerate operating 8 brands across
  physical goods, digital subscriptions, marketplace, and services.
  All brands process through Stripe with a unified Stripe account
  structure. The system must handle 15,000 disputes/month across all
  brands while maintaining each brand's unique dispute profile.

  System requirements:

  1. Prevention layer:
  - Pre-transaction fraud scoring (augmenting Stripe Radar)
  - Real-time risk assessment for each order
  - Verifi RDR and Ethoca alert integration
  - Customer risk scoring based on behavior patterns
  - Dynamic 3DS triggering based on risk level

  2. Detection layer:
  - Real-time dispute ingestion from Stripe webhooks
  - Automated dispute classification (reason code, severity, brand,
    product type)
  - Duplicate and related dispute detection
  - Fraud ring identification
  - Dispute rate monitoring by brand, product, region

  3. Response layer:
  - Automated evidence compilation from 12 internal data sources
  - AI-generated evidence narratives
  - Reason-code-specific evidence templates
  - Multi-level review workflow (auto → analyst → specialist → legal)
  - Stripe Evidence API integration with retry and monitoring

  4. Analytics layer:
  - Real-time dashboards (operational, management, executive)
  - Win/loss analysis by every dimension
  - Cohort analysis and trend detection
  - Predictive modeling for dispute volumes and outcomes
  - Benchmarking across the 8 brands

  5. Continuous improvement layer:
  - A/B testing framework for evidence strategies
  - Feedback loop from outcomes to prevention rules
  - Model retraining pipeline
  - Knowledge base of winning evidence patterns
  - Regulatory compliance monitoring

  Tasks:
  1. Design the system architecture. Include: the component diagram
     (all 5 layers with their sub-components and data flows), the
     event-driven architecture (how disputes flow through the system
     from webhook to resolution), the multi-brand isolation strategy
     (how 8 brands share infrastructure while maintaining separate
     policies and evidence sources), and the integration architecture
     (how the dispute system connects to Stripe APIs, internal systems,
     and third-party services).

  2. Define the data architecture. Include: the core data model
     (entities: disputes, evidence, actions, outcomes, rules, models,
     brands), the event sourcing design (immutable event log of all
     dispute state transitions for audit and replay), the data pipeline
     (from raw Stripe webhooks through transformation to analytics-ready
     datasets), and the ML feature store (features for outcome
     prediction, risk scoring, and evidence quality models).

  3. Create the implementation and operations plan. Include: the phased
     build plan (18-month roadmap: MVP with core prevention + response
     → analytics + AI → continuous improvement), the team structure
     (engineering pods, their responsibilities, and cross-pod
     coordination), the operational runbook (how the system is
     monitored, how incidents are handled, how deployments work), and
     the success metrics (how to measure the system's impact on dispute
     rate, win rate, operational cost, and revenue recovery).

assertions:
  - type: llm_judge
    criteria: "System architecture is complete and coherent — all 5 layers are designed with clear responsibilities, event-driven flow handles the dispute lifecycle, multi-brand isolation balances sharing and separation, and integrations are comprehensive"
    weight: 0.35
    description: "Complete coherent system architecture"
  - type: llm_judge
    criteria: "Data architecture enables intelligence — core model captures all entities and relationships, event sourcing provides audit trail, pipeline transforms raw data to insights, and feature store supports ML models"
    weight: 0.35
    description: "Intelligence-enabling data architecture"
  - type: llm_judge
    criteria: "Implementation plan is executable — phased roadmap prioritizes value delivery, team structure enables parallel development, operational runbook ensures reliability, and success metrics measure business impact"
    weight: 0.30
    description: "Executable implementation plan"
