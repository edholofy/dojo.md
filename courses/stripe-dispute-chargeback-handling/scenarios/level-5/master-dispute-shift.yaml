meta:
  id: master-dispute-shift
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Master dispute shift — navigate an existential dispute crisis involving VDMP termination threat, regulatory investigation, board pressure, and competitive disruption simultaneously"
  tags: [stripe, dispute, shift-simulation, existential-crisis, VDMP-termination, regulatory, master]

state: {}

trigger: |
  You're the CEO of a $1B e-commerce company. Five simultaneous crises
  threaten the business's ability to process payments:

  Crisis 1 — VDMP termination warning:
  Visa has issued a final warning: your dispute rate has been above 0.9%
  for 8 consecutive months (currently 1.42%). If you don't achieve
  compliance in 60 days, Visa will terminate your ability to accept
  Visa cards. Visa represents 62% of your payment volume. Losing Visa
  acceptance would be an extinction-level event.

  Crisis 2 — FTC investigation:
  The FTC opened a formal investigation into your subscription billing
  practices after 2,000+ consumer complaints to the CFPB. They allege
  dark patterns in your subscription flow (pre-checked boxes, hidden
  recurring charges, difficult cancellation). The investigation could
  result in $50M+ in fines, mandatory refunds, and a consent decree
  requiring FTC oversight of your billing practices for 20 years.

  Crisis 3 — Board pressure:
  Three board members (representing 35% of shares) are pushing for
  your replacement, citing the VDMP crisis as evidence of operational
  failure. The lead PE investor wants a new "turnaround CEO." You have
  the next board meeting in 2 weeks to present your survival plan.

  Crisis 4 — Stripe account review:
  Stripe initiated an account review and placed a 10% rolling reserve
  on your account ($500K/month held for 120 days). They've asked for
  a detailed remediation plan within 5 business days or they may
  terminate your account. Migrating payment processors would take
  3-6 months and disrupt operations.

  Crisis 5 — Competitive disruption:
  Your largest competitor just announced a "Buyer Protection Guarantee"
  that offers instant refunds for any dispute, effectively making
  chargebacks unnecessary for their customers. Early reports suggest
  they're capturing market share from merchants with high dispute rates
  (like you). Industry press is comparing their 0.3% dispute rate to
  your 1.42%.

  Tasks:
  1. Create the 60-day survival plan. Include: the triage matrix
     (priority order of all 5 crises with justification), the 60-day
     timeline with weekly milestones, the resource allocation (what
     gets budget and attention, what gets deferred), the quick-win
     dispute reduction actions (what can reduce the rate within 30 days
     — pre-dispute alert enrollment, proactive refund program for
     subscriptions, aggressive Radar rule tightening), and the risk
     assessment (probability and impact of each crisis worsening).

  2. Address the regulatory and governance crises. Include: the FTC
     response strategy (engage regulatory counsel, conduct internal
     audit of subscription practices, implement immediate fixes,
     prepare negotiation position for consent decree terms), the board
     presentation (acknowledge failures, present data-driven remediation
     plan, demonstrate personal accountability, request 6 months to
     execute), the Stripe relationship salvage (remediation plan that
     demonstrates commitment, request reserve reduction timeline,
     escalate to Stripe leadership), and the stakeholder communication
     plan (employees, investors, partners — what to say and when).

  3. Design the long-term transformation. Include: the dispute
     operations overhaul (from reactive to predictive — team, tools,
     processes, technology), the subscription billing reform (consent-
     first design, easy cancellation, proactive billing notifications
     — turning the FTC weakness into a strength), the competitive
     response (your own buyer protection program, superior customer
     experience, turning dispute management into a brand differentiator),
     and the cultural change (making dispute prevention everyone's
     responsibility — product, engineering, marketing, customer success).

assertions:
  - type: llm_judge
    criteria: "Survival plan is decisive and achievable — triage prioritizes correctly, timeline has specific milestones, resources are allocated to highest-impact actions, quick wins address the 60-day VDMP deadline, and risks are assessed honestly"
    weight: 0.35
    description: "Decisive achievable survival plan"
  - type: llm_judge
    criteria: "Regulatory and governance response demonstrates leadership — FTC strategy balances cooperation with protection, board presentation is honest yet compelling, Stripe relationship is salvaged, and stakeholder communication is transparent"
    weight: 0.35
    description: "Leadership-demonstrating regulatory response"
  - type: llm_judge
    criteria: "Long-term transformation turns crisis into advantage — operations overhaul is comprehensive, subscription reform exceeds regulatory requirements, competitive response is differentiated, and cultural change embeds dispute prevention"
    weight: 0.30
    description: "Advantage-turning long-term transformation"
