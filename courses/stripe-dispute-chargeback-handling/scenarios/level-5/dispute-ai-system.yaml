meta:
  id: dispute-ai-system
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Design an AI-powered dispute management system — architect the ML pipeline, NLP evidence generation, and predictive analytics for next-generation dispute handling"
  tags: [stripe, dispute, AI, machine-learning, NLP, predictive-analytics, master]

state: {}

trigger: |
  You're the VP of AI/ML at a payments technology company building the
  next generation of dispute management. Your product serves 5,000
  merchants processing $50B annually through Stripe. The goal: build an
  AI system that achieves 70%+ win rates (current industry average: 38%)
  and prevents 50% of disputes before they're filed.

  Available data:
  - 2M+ historical disputes with outcomes (won/lost/withdrawn)
  - Full evidence submissions for each dispute
  - Transaction data: amount, time, device, IP, AVS, CVV, 3DS results
  - Customer data: purchase history, support interactions, dispute history
  - Merchant data: industry, product type, refund policy, support quality
  - Pre-dispute signals: Verifi RDR alerts, Ethoca alerts, support tickets
  - External: BIN data, IP intelligence, device fingerprints

  Current AI capabilities:
  - Basic fraud scoring (Stripe Radar features)
  - Rule-based dispute routing
  - Template-based evidence generation
  - No outcome prediction, no NLP evidence, no prevention prediction

  Competitive landscape:
  - Competitor A: Claims 65% win rate using "proprietary AI"
  - Competitor B: Focus on prevention, claims 45% dispute reduction
  - Competitor C: Full-service with human + AI hybrid, premium pricing
  - Industry movement toward real-time, pre-dispute resolution

  Tasks:
  1. Design the ML model architecture. Include: the dispute outcome
     prediction model (features: transaction signals, customer behavior,
     evidence quality score, merchant characteristics, reason code;
     architecture: gradient boosted trees vs. neural net with
     justification; training: handling class imbalance since most
     disputes are lost), the dispute probability model (pre-transaction
     scoring that predicts likelihood of future dispute; features:
     customer dispute history, transaction risk signals, product
     category risk; use case: enabling proactive merchant alerts), the
     evidence quality scoring model (NLP-based assessment of evidence
     completeness and persuasiveness; trained on winning vs. losing
     evidence packages), and the model ensemble strategy (how multiple
     models work together for final decisions).

  2. Build the NLP evidence generation system. Include: the automated
     evidence narrative (using LLMs to generate compelling dispute
     response narratives from structured data — order details, shipping
     proof, customer communications), the evidence completeness checker
     (NLP model that identifies missing evidence elements based on
     reason code requirements), the sentiment analysis pipeline (analyzing
     customer support interactions to identify dispute risk and extract
     favorable evidence), and the multi-language evidence generation
     (for cross-border disputes where evidence may need to be in the
     cardholder's language).

  3. Design the predictive prevention system. Include: the pre-dispute
     alert optimization (ML model that decides whether to auto-refund
     via RDR or fight, based on predicted outcome and amount), the
     customer dispute risk scoring (real-time scoring that triggers
     proactive outreach before disputes are filed), the merchant
     coaching engine (AI that analyzes each merchant's dispute patterns
     and generates specific, actionable recommendations), and the
     feedback loop architecture (how dispute outcomes flow back to
     improve all models continuously).

assertions:
  - type: llm_judge
    criteria: "ML architecture is technically sound — outcome prediction handles class imbalance, dispute probability enables prevention, evidence scoring uses NLP effectively, and ensemble strategy combines models intelligently"
    weight: 0.35
    description: "Technically sound ML architecture"
  - type: llm_judge
    criteria: "NLP evidence system is practical — narrative generation uses structured data effectively, completeness checking is reason-code-aware, sentiment analysis extracts useful signals, and multi-language support addresses cross-border needs"
    weight: 0.35
    description: "Practical NLP evidence system"
  - type: llm_judge
    criteria: "Prevention system closes the loop — RDR optimization balances cost and recovery, risk scoring enables proactive outreach, merchant coaching is actionable, and feedback loops ensure continuous improvement"
    weight: 0.30
    description: "Loop-closing prevention system"
