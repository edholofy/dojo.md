meta:
  id: dispute-industry-benchmarks
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Develop dispute industry benchmarks — create the analytical framework for benchmarking dispute performance across industries, geographies, and business models"
  tags: [stripe, dispute, benchmarks, industry-analysis, metrics, comparative, master]

state: {}

trigger: |
  You're the Head of Dispute Intelligence at a payments analytics firm.
  Your clients (200+ merchants across 12 industries) want to understand
  how their dispute performance compares to peers. You're building the
  definitive dispute benchmarking methodology and publishing the annual
  "State of Disputes" report.

  Aggregated data across your client base:
  - Total annual transactions: 2.1B
  - Total annual disputes: 8.4M
  - Overall dispute rate: 0.40%
  - Overall win rate: 38%

  Industry breakdown:
  | Industry              | Dispute Rate | Win Rate | Top Reason      |
  | Physical goods        | 0.32%        | 42%      | Not Received    |
  | Digital goods/SaaS    | 0.58%        | 28%      | Subscription    |
  | Travel/hospitality    | 0.71%        | 35%      | Service Quality |
  | Marketplaces          | 0.45%        | 31%      | Not As Described|
  | Subscription boxes    | 0.63%        | 25%      | Cancellation    |
  | High-ticket luxury    | 0.18%        | 55%      | Fraud           |
  | Gambling/gaming       | 0.89%        | 22%      | Regret/Fraud    |
  | Healthcare            | 0.24%        | 48%      | Billing Error   |
  | Education/online      | 0.41%        | 33%      | Not As Described|
  | Food delivery         | 0.52%        | 29%      | Quality/Missing |
  | B2B services          | 0.15%        | 62%      | Service Quality |
  | Crypto/fintech        | 1.24%        | 19%      | Fraud           |

  Geographic patterns:
  - US: 0.43% dispute rate (highest friendly fraud)
  - EU: 0.31% (3DS reduces fraud, PSD2 protection)
  - UK: 0.38% (Section 75 adds complexity)
  - APAC: 0.28% (lower card usage, alternative payments)
  - LATAM: 0.67% (high fraud rates, limited 3DS adoption)

  Tasks:
  1. Build the benchmarking methodology. Include: the dispute rate
     normalization framework (how to fairly compare merchants with
     different transaction volumes, average order values, and product
     mixes), the maturity model (Level 1: reactive, Level 2: managed,
     Level 3: optimized, Level 4: predictive — with criteria for each),
     the composite dispute health score (single metric combining rate,
     win rate, response time, prevention effectiveness), and the peer
     group construction methodology (how to create meaningful comparison
     groups by industry, size, geography, and business model).

  2. Analyze the cross-industry patterns. Include: the industry-specific
     dispute drivers (why each industry has its characteristic dispute
     profile), the emerging trends (which industries are improving vs.
     deteriorating, and why), the geographic arbitrage opportunities
     (how merchants can learn from lower-dispute regions), and the
     business model correlation (what structural features of a business
     model predict higher or lower dispute rates).

  3. Write the strategic insights section of the report. Include: the
     dispute economy overview (total global dispute costs, where the
     money flows, who bears the burden), the technology impact analysis
     (how 3DS2, tokenization, network tokens, and AI are changing
     dispute patterns), the regulatory impact forecast (how PSD3,
     open banking dispute resolution, and US regulatory changes will
     reshape disputes), and the predictions (5 dispute trends for the
     next 3 years with supporting evidence).

assertions:
  - type: llm_judge
    criteria: "Benchmarking methodology is rigorous — normalization accounts for merchant differences, maturity model has clear criteria, health score is composite and meaningful, and peer groups enable fair comparison"
    weight: 0.35
    description: "Rigorous benchmarking methodology"
  - type: llm_judge
    criteria: "Cross-industry analysis reveals actionable patterns — drivers are industry-specific, trends identify improvement opportunities, geographic analysis suggests strategies, and business model correlations are insightful"
    weight: 0.35
    description: "Pattern-revealing cross-industry analysis"
  - type: llm_judge
    criteria: "Strategic insights are forward-looking — dispute economy is quantified, technology impacts are analyzed, regulatory changes are forecasted, and predictions are specific and evidence-based"
    weight: 0.30
    description: "Forward-looking strategic insights"
