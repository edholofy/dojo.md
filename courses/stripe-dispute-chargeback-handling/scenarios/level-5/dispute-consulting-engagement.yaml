meta:
  id: dispute-consulting-engagement
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Lead a dispute optimization consulting engagement — diagnose a client's dispute problems, design the solution, and deliver measurable results"
  tags: [stripe, dispute, consulting, optimization, engagement, diagnostics, master]

state: {}

trigger: |
  You're a senior payments consultant hired by a mid-market e-commerce
  company ($150M annual revenue, 1,200 SKUs, Stripe processing). They
  contacted you because Stripe warned them about potential account
  restrictions due to rising dispute rates. The engagement is 12 weeks,
  $180K budget.

  Client diagnostic data (Week 1 findings):
  - Annual disputes: 14,400 (1,200/month)
  - Dispute rate: 1.12% (above Visa VDMP threshold for 3 months)
  - Win rate: 18% (extremely low)
  - Top reason codes: Fraud (42%), Product Not Received (28%),
    Product Not As Described (18%), Subscription (12%)
  - Evidence submission rate: 64% (36% of disputes get no response)
  - Average evidence quality: 3.2/10 (minimal documentation)
  - Pre-dispute alert enrollment: None
  - Fraud prevention tools: Stripe Radar default rules only (no custom)
  - Refund policy: "Contact us within 7 days" (buried in ToS)
  - Customer support: Email only, 72-hour response time
  - Statement descriptor: "PYMT*ACME" (generic, causes confusion)

  Client organizational context:
  - No dedicated dispute team (customer support handles disputes)
  - 3 customer support agents handle disputes alongside other tickets
  - No dispute-specific training or playbooks
  - CFO views disputes as "cost of doing business"
  - CTO is open to technical solutions but has limited engineering bandwidth

  Tasks:
  1. Deliver the diagnostic report (Week 2). Include: the root cause
     analysis (why each of the 4 dispute categories is elevated, with
     specific evidence), the benchmarking analysis (how the client
     compares to industry by category), the financial impact assessment
     (current annual cost of disputes including losses, fees, operational
     cost, and VDMP fine exposure), and the quick wins identification
     (changes that can reduce dispute rate within 30 days).

  2. Design the 90-day remediation plan (Weeks 3-12). Include: Phase 1
     (Days 1-30: emergency rate reduction — enable Verifi RDR and Ethoca,
     fix the statement descriptor, launch proactive refund outreach for
     at-risk orders), Phase 2 (Days 31-60: evidence system overhaul —
     implement automated evidence gathering, create reason-code-specific
     templates, train support staff), Phase 3 (Days 61-90: prevention
     infrastructure — custom Radar rules, improved refund policy, post-
     purchase communication flow), and the projected impact per phase.

  3. Create the client handoff package. Include: the operational
     playbook (step-by-step procedures for every dispute type), the
     technology configuration guide (Stripe settings, Radar rules, webhook
     setup, pre-dispute alert configuration), the training curriculum
     (for the 3 support agents who will own disputes going forward), the
     measurement framework (KPIs to track monthly with targets), and the
     executive summary for the CFO (ROI of the engagement, projected
     annual savings).

assertions:
  - type: llm_judge
    criteria: "Diagnostic is data-driven and actionable — root causes are specific to each category, benchmarking contextualizes the problems, financial impact motivates action, and quick wins provide immediate relief"
    weight: 0.35
    description: "Data-driven actionable diagnostic"
  - type: llm_judge
    criteria: "Remediation plan is phased and realistic — Phase 1 addresses VDMP urgency, Phase 2 builds sustainable capability, Phase 3 creates prevention infrastructure, and projected impacts are credible"
    weight: 0.35
    description: "Phased realistic remediation plan"
  - type: llm_judge
    criteria: "Handoff ensures sustainability — playbook enables independent operation, technology guide is specific, training builds capability, metrics track ongoing performance, and CFO summary demonstrates ROI"
    weight: 0.30
    description: "Sustainability-ensuring handoff"
