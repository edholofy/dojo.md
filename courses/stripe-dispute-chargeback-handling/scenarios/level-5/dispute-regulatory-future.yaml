meta:
  id: dispute-regulatory-future
  level: 5
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Navigate the future of dispute regulation — analyze upcoming regulatory changes and design a forward-looking compliance strategy"
  tags: [stripe, dispute, regulatory, PSD3, open-banking, FTC, compliance, master]

state: {}

trigger: |
  You're the Chief Regulatory Officer at a global e-commerce company
  ($3B revenue, operating in 40 countries, processing through Stripe
  with local acquiring in 15 markets). The regulatory landscape for
  disputes is shifting dramatically. The board wants a comprehensive
  analysis of upcoming changes and a strategy to turn regulatory
  compliance into competitive advantage.

  Regulatory developments to analyze:

  1. EU — PSD3 and Payment Services Regulation (PSR):
  - Stronger customer authentication requirements
  - Extended chargeback rights for consumers
  - New liability frameworks for payment service providers
  - Real-time dispute resolution requirements
  - Open banking mandate for dispute data sharing
  - Timeline: Proposed 2023, expected implementation 2026-2027

  2. US — FTC and CFPB actions:
  - FTC dark patterns enforcement (subscription traps that lead to
    disputes)
  - CFPB proposed rule on "junk fees" (including chargeback fees
    passed to consumers)
  - State-level privacy laws affecting dispute evidence collection
  - Click-to-cancel rule for subscriptions
  - Potential federal chargeback reform legislation

  3. Card network evolution:
  - Visa CE 3.0 (Compelling Evidence 3.0) — new evidence standards
  - Mastercard's First-Party Trust program
  - Real-time dispute resolution pilots
  - Network token-based dispute prevention
  - Cross-network dispute standardization efforts

  4. Emerging technologies regulatory impact:
  - AI regulation (EU AI Act) affecting automated dispute decisions
  - Biometric authentication laws affecting 3DS
  - Data localization requirements affecting dispute evidence storage
  - Cryptocurrency and BNPL dispute frameworks

  Tasks:
  1. Analyze the regulatory impact on dispute operations. For each
     regulatory development, write: the specific impact on dispute
     processes (what changes in how disputes are filed, handled, and
     resolved), the compliance requirements (what the company must do
     and by when), the operational changes needed (systems, processes,
     team capabilities), and the financial impact (costs to comply,
     potential fines for non-compliance, and potential benefits from
     early compliance).

  2. Design the forward-looking compliance strategy. Include: the
     regulatory monitoring system (how to track 40 jurisdictions for
     dispute-relevant changes), the compliance-by-design framework
     (building regulatory requirements into dispute systems from the
     start, not retrofitting), the jurisdiction-specific playbooks
     (EU, US, UK, APAC, LATAM — key differences and requirements),
     and the regulatory relationship strategy (engagement with
     regulators, industry associations, and standards bodies).

  3. Create the competitive advantage plan. Include: the first-mover
     opportunities (regulations that create barriers to entry for
     competitors — who benefits from higher compliance standards?), the
     customer trust narrative (how strong dispute practices and
     regulatory compliance build brand trust), the partner ecosystem
     (how to work with Stripe on regulatory compliance — leveraging
     their regulatory team and infrastructure), and the innovation
     roadmap (new dispute resolution methods enabled by regulation —
     real-time resolution, open banking dispute APIs, AI-mediated
     resolution).

assertions:
  - type: llm_judge
    criteria: "Regulatory analysis is comprehensive and specific — each development has clear operational impact, compliance requirements are timelined, operational changes are identified, and financial impact is estimated"
    weight: 0.35
    description: "Comprehensive specific regulatory analysis"
  - type: llm_judge
    criteria: "Compliance strategy is proactive — monitoring covers all jurisdictions, compliance-by-design prevents retrofitting, jurisdiction playbooks address key differences, and regulatory relationships are cultivated"
    weight: 0.35
    description: "Proactive compliance strategy"
  - type: llm_judge
    criteria: "Competitive advantage plan is strategic — first-mover opportunities are identified, customer trust is connected to compliance, Stripe partnership is leveraged, and innovation is regulation-enabled"
    weight: 0.30
    description: "Strategic competitive advantage plan"
