meta:
  id: expert-dispute-shift
  level: 4
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Expert dispute shift — manage a VDMP breach, evidence system migration, and board-level crisis communication simultaneously"
  tags: [stripe, dispute, shift-simulation, VDMP-breach, migration, board-crisis, expert]

state: {}

trigger: |
  You're the VP of Payments on the worst day of the year. Four crises
  hit simultaneously:

  Crisis 1 — VDMP breach confirmed:
  Visa officially notified you (via Stripe) that your account has
  breached the VDMP Excessive threshold (1.83% dispute rate, 2,100
  disputes last month). You're now in the program with fines starting
  at month 5 ($50/dispute). You must submit a remediation plan within
  10 business days.

  Crisis 2 — Evidence system migration deadline:
  Your legacy dispute management system's contract expires in 30 days.
  The new system is 60% migrated. 1,400 active disputes with evidence
  need to be transferred, and 200 have evidence deadlines in the next
  2 weeks. The new system has a critical bug: it's submitting evidence
  to the wrong dispute IDs for about 5% of cases.

  Crisis 3 — Board emergency meeting:
  The board called an emergency session after learning about the VDMP
  breach. They want to understand: How did this happen? What's the
  financial exposure? What's the plan? And should they consider
  switching from Stripe? You present in 3 hours.

  Crisis 4 — Team morale crisis:
  Your dispute team lead just resigned, citing burnout. Two of the
  three remaining analysts are threatening to follow. You're losing
  institutional knowledge at the worst possible time. The team lead
  managed the Visa relationship and knew the VDMP remediation process
  from a previous employer.

  Tasks:
  1. Triage and prioritize. Write: the priority ranking of all 4
     crises with justification, the first-hour action plan (what
     happens in the next 60 minutes for each crisis), the resource
     allocation (who does what — you have yourself, 3 analysts, 2
     engineers, and the CTO's attention for 1 hour), and the
     communication plan (who needs to know what, and when).

  2. Develop the VDMP remediation plan. Write: the 10-day remediation
     submission (root cause analysis, immediate actions already taken,
     30/60/90-day plan), the dispute rate reduction strategy (target
     from 1.83% to below 0.9% in 90 days — specific initiatives with
     projected impact), the financial exposure calculation (fines at
     current rate vs. target rate over 12 months), and the Stripe
     communication strategy (positioning as a partner, not a problem).

  3. Handle the immediate operational crises. Write: the evidence
     system triage (freeze the buggy migration, manual process for
     the 200 urgent disputes, bug fix timeline), the board
     presentation (how this happened, financial exposure, remediation
     plan, why Stripe is still the right partner), and the team
     retention plan (immediate actions to prevent the remaining
     analysts from leaving — compensation, workload, recognition).

assertions:
  - type: llm_judge
    criteria: "Triage is clear-headed under pressure — priorities are justified, first-hour actions are achievable, resource allocation is realistic with a depleted team, and communications are sequenced correctly"
    weight: 0.35
    description: "Clear-headed pressure triage"
  - type: llm_judge
    criteria: "VDMP remediation is credible — root cause is honest, actions are specific with projected impact, financial exposure is quantified, and Stripe communication maintains the relationship"
    weight: 0.35
    description: "Credible VDMP remediation"
  - type: llm_judge
    criteria: "Operational crises are stabilized — evidence system is triaged without losing disputes, board presentation is honest yet confident, and team retention addresses immediate flight risk"
    weight: 0.30
    description: "Stabilized operational crises"
