meta:
  id: dispute-vendor-evaluation
  level: 4
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Evaluate dispute management vendors — conduct a comprehensive RFP and selection process for chargeback management platforms and services"
  tags: [stripe, dispute, vendor-evaluation, RFP, chargeback-management, platform, expert]

state: {}

trigger: |
  You're the Director of Payment Operations. The CFO approved $350K
  annually for a dispute management solution. You need to evaluate
  vendors and make a recommendation. Your company processes $400M
  annually through Stripe with 2,200 disputes/month.

  Vendor landscape (shortlisted after initial research):

  Vendor A — Full-service chargeback management:
  - Handles evidence compilation and submission automatically
  - Proprietary AI for win rate optimization
  - Claims 65% win rate for their merchants
  - Pricing: $25/dispute + 15% of recovered revenue
  - Integration: Stripe API plugin, 2-week setup
  - Contract: 2-year minimum

  Vendor B — Prevention-focused platform:
  - Pre-dispute alerts (Verifi RDR + Ethoca integration)
  - Real-time fraud scoring overlaying Stripe Radar
  - Customer dispute resolution portal
  - Claims 40% dispute reduction
  - Pricing: $0.03/transaction + $500/month platform fee
  - Integration: Stripe webhook integration, 4-week setup
  - Contract: 1-year minimum

  Vendor C — Hybrid platform + services:
  - Self-service platform with evidence templates and automation
  - Optional managed service for complex disputes
  - Analytics dashboard with reason code insights
  - Claims 50% win rate improvement
  - Pricing: $8,000/month platform + $15/dispute for managed service
  - Integration: Stripe API + direct processor integration, 6-week setup
  - Contract: Annual with 90-day cancellation

  Vendor D — Build in-house using Stripe APIs:
  - Custom solution using Stripe Dispute API + webhooks
  - Evidence automation using internal data sources
  - Full control and customization
  - Estimated cost: $180K build + $60K/year maintenance
  - Timeline: 4-6 months to MVP
  - Risk: engineering resources, maintenance burden

  Tasks:
  1. Design the vendor evaluation framework. Include: the evaluation
     criteria matrix (weighted scoring for win rate impact, prevention
     capability, integration ease, total cost of ownership, contract
     flexibility, data security, scalability), the TCO analysis for
     each vendor (all-in cost over 3 years including hidden costs like
     integration engineering, training, opportunity cost), the risk
     assessment (vendor lock-in, data portability, vendor failure
     scenarios), and the proof-of-concept requirements (what to test
     during a trial period).

  2. Conduct the comparative analysis. Include: the feature comparison
     (side-by-side matrix of capabilities), the financial comparison
     (3-year TCO at current volume and at projected 2x volume), the
     integration analysis (compatibility with Stripe, engineering
     effort, data flow architecture), and the reference check framework
     (questions for vendor references, red flags to watch for).

  3. Write the recommendation memo. Include: the recommended vendor
     (or combination strategy — e.g., Vendor B for prevention + Vendor
     D for response), the implementation roadmap (phased rollout with
     milestones), the success metrics (how you'll measure the vendor's
     impact at 90 days, 6 months, 1 year), and the exit strategy (how
     to switch vendors if the chosen solution underperforms).

assertions:
  - type: llm_judge
    criteria: "Evaluation framework is rigorous — criteria are weighted and justified, TCO captures hidden costs, risk assessment covers lock-in and failure scenarios, and POC requirements are specific"
    weight: 0.35
    description: "Rigorous evaluation framework"
  - type: llm_judge
    criteria: "Comparative analysis enables decision — features are compared fairly, financial comparison accounts for volume growth, integration analysis is realistic, and reference check questions are insightful"
    weight: 0.35
    description: "Decision-enabling comparative analysis"
  - type: llm_judge
    criteria: "Recommendation is actionable — vendor choice is justified with data, implementation roadmap is phased, success metrics are measurable, and exit strategy provides optionality"
    weight: 0.30
    description: "Actionable vendor recommendation"
