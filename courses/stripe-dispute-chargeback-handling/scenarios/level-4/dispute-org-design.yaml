meta:
  id: dispute-org-design
  level: 4
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Design the dispute management organization — build team structure, hiring profiles, career paths, and operational workflows for a scaling dispute function"
  tags: [stripe, dispute, org-design, team-building, hiring, career-path, expert]

state: {}

trigger: |
  You're the SVP of Operations. The company has grown from $50M to
  $300M in annual revenue over 3 years. The dispute team hasn't
  scaled — it's still the same 3 people who handled disputes when you
  were at $50M. They're overwhelmed, burning out, and the quality of
  evidence submissions has dropped (win rate fell from 40% to 22%).

  Current state:
  - 3-person team (1 lead, 2 analysts)
  - Monthly disputes: 2,800 (was 450 three years ago)
  - Each analyst handles 47 disputes/day (unsustainable)
  - No specialization (everyone handles everything)
  - No career path (the two analysts have been asking about growth)
  - No training program (new hires learn by osmosis)
  - No coverage plan (when someone is sick, disputes pile up)

  Growth projection:
  - Year 1: $450M revenue, ~4,200 disputes/month
  - Year 2: $600M revenue, ~5,600 disputes/month
  - Year 3: $800M revenue, ~7,500 disputes/month

  Budget approval: You have budget for 12 FTEs by end of year 1,
  scaling to 20 FTEs by year 3, plus $200K for tooling.

  Tasks:
  1. Design the target organization structure. Include: the team
     hierarchy (individual contributors, specialists, team leads,
     managers, director), the specialization model (by dispute reason
     code, by value tier, by complexity, or by product line — justify
     the choice), the coverage model (shifts, on-call rotation, holiday
     coverage), and the cross-functional relationships (how the dispute
     team works with engineering, product, customer success, legal, and
     finance).

  2. Build the hiring and development plan. Include: the hiring
     profiles for each role (skills, experience, interview criteria),
     the 12-month hiring timeline (which roles first and why), the
     onboarding program (week 1 through month 3, with dispute-specific
     training curriculum), the career ladder (analyst → senior analyst
     → specialist → team lead → manager, with clear promotion criteria
     and compensation bands), and the retention strategy (the two
     existing analysts are flight risks).

  3. Create the operational workflows. Include: the dispute intake
     workflow (from webhook to assignment to resolution), the
     escalation framework (when and how disputes escalate from L1 to
     L2 to specialist), the knowledge management system (evidence
     templates, reason code playbooks, win/loss post-mortems), and
     the performance management cadence (daily huddles, weekly metrics
     reviews, monthly deep dives, quarterly planning).

assertions:
  - type: llm_judge
    criteria: "Organization structure scales with growth — hierarchy supports 20 FTEs, specialization model is justified, coverage ensures no gaps, and cross-functional relationships are defined"
    weight: 0.35
    description: "Growth-scaling organization structure"
  - type: llm_judge
    criteria: "Hiring and development plan retains and attracts talent — profiles match needs, timeline prioritizes critical hires, onboarding is structured, career ladder provides growth, and retention addresses flight risks"
    weight: 0.35
    description: "Talent-retaining hiring plan"
  - type: llm_judge
    criteria: "Operational workflows enable consistent execution — intake is automated where possible, escalation criteria are clear, knowledge management captures institutional knowledge, and performance cadence drives accountability"
    weight: 0.30
    description: "Execution-enabling operational workflows"
