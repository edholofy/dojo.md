meta:
  id: dispute-enterprise-operations
  level: 4
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Design enterprise dispute operations — build the operational framework for a high-volume merchant processing 50,000+ disputes annually"
  tags: [stripe, dispute, enterprise, operations, SLA, workflow, expert]

state: {}

trigger: |
  You're the VP of Payment Operations at a large e-commerce company
  ($2B annual revenue, 50,000+ disputes per year, 15-person dispute
  team). The CEO wants to transform dispute handling from a cost center
  into a strategic function that protects revenue and improves customer
  relationships.

  Current operational metrics:
  - Monthly disputes: 4,200
  - Win rate: 31% (industry benchmark: 45%)
  - Average response time: 9.2 days (deadline: 30 days)
  - Evidence quality score: 62/100 (internal assessment)
  - Cost per dispute handled: $28 (industry benchmark: $15)
  - Automation rate: 12% (industry benchmark: 60%)
  - Dispute rate: 0.72% (Visa threshold: 0.9%)
  - Annual dispute losses: $8.4M (disputes lost × average amount)
  - Annual operational cost: $1.8M (team + tools + fees)

  Team structure:
  - 8 dispute analysts (handle evidence and responses)
  - 3 fraud investigators (pattern detection, fraud rings)
  - 2 data analysts (reporting, trend analysis)
  - 1 team lead
  - 1 VP (you)

  Technology stack:
  - Stripe Dashboard for manual dispute handling
  - Spreadsheet-based tracking
  - Email-based evidence collection from internal teams
  - No API integration, no automation

  Tasks:
  1. Design the target operating model. Include: the tiered dispute
     handling framework (Tier 1: automated response for common patterns,
     Tier 2: analyst-handled with templates, Tier 3: specialist-handled
     complex cases), the SLA structure (response time targets by dispute
     value and complexity), the quality assurance program (evidence
     review sampling, win rate tracking by analyst), and the capacity
     planning model (disputes per analyst per day by tier).

  2. Build the technology transformation roadmap. Include: Phase 1
     (Stripe API integration — automated dispute ingestion, evidence
     submission via API, webhook-driven workflows), Phase 2 (evidence
     automation — auto-pull order data, shipping proof, customer
     communications), Phase 3 (intelligent routing — ML-based dispute
     categorization, auto-response for high-confidence cases), and
     Phase 4 (predictive operations — forecasting dispute volumes,
     pre-building evidence before disputes arrive).

  3. Create the performance management framework. Include: the KPI
     dashboard (win rate by reason code, response time distribution,
     cost per dispute, analyst productivity), the analyst scorecard
     (individual win rates, quality scores, throughput, customer
     feedback), the continuous improvement program (monthly win/loss
     analysis, evidence template optimization, reason code trend
     analysis), and the executive reporting package (quarterly business
     review with ROI of dispute operations).

assertions:
  - type: llm_judge
    criteria: "Operating model is structured for scale — tiered handling matches complexity to resources, SLAs are realistic and value-based, QA program drives quality, and capacity planning ensures sustainable workload"
    weight: 0.35
    description: "Scale-structured operating model"
  - type: llm_judge
    criteria: "Technology roadmap is phased and practical — API integration comes first, automation builds on integration, ML routing builds on automation, and each phase has clear ROI justification"
    weight: 0.35
    description: "Practical technology roadmap"
  - type: llm_judge
    criteria: "Performance framework drives improvement — KPIs are actionable, analyst scorecards enable coaching, continuous improvement uses data, and executive reporting demonstrates business value"
    weight: 0.30
    description: "Improvement-driving performance framework"
