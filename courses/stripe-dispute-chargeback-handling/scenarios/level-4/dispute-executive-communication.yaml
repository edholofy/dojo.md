meta:
  id: dispute-executive-communication
  level: 4
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Communicate dispute impact to executives — translate operational dispute metrics into board-level business intelligence and strategic recommendations"
  tags: [stripe, dispute, executive-communication, board, strategy, metrics, expert]

state: {}

trigger: |
  You're the VP of Payments preparing three critical executive
  communications. Each requires translating technical dispute
  operations into business language that drives decisions.

  Communication 1 — Board meeting presentation:
  The board meets in 2 weeks. The CEO asks you to present a 15-minute
  overview of dispute operations. Board members are non-technical
  (private equity background). Key data points:
  - Dispute losses: $3.2M last year (0.64% of revenue)
  - Dispute rate trend: 0.71% → 0.78% → 0.82% (last 3 quarters)
  - Win rate: 34% (was 41% a year ago)
  - New threat: friendly fraud increasing 20% YoY
  - Opportunity: $1.2M recoverable with better evidence
  - Investment needed: $500K for dispute platform + 4 FTEs

  Communication 2 — Cross-functional incident brief:
  Yesterday, a bug in the refund system caused 200 customers to not
  receive their refunds. Your support team has already received 45
  angry emails, and you expect 30-50 of these to become disputes
  within the next 2 weeks. You need to brief the CTO, Head of
  Customer Success, and Head of Finance in a 30-minute meeting
  with a clear action plan.

  Communication 3 — Stripe relationship management:
  Your Stripe account manager scheduled a quarterly business review.
  You want to negotiate better dispute handling terms (faster evidence
  processing, access to beta features, reduced fees for merchants with
  strong dispute prevention). Your leverage: $500M annual processing
  volume, 0.82% dispute rate (good but not great), 18 months on Stripe.

  Tasks:
  1. Create the board presentation. Include: the executive summary
     (1-slide dispute landscape), the business impact analysis
     (disputes as % of revenue, trend, and comparison to industry),
     the risk assessment (what happens if the trend continues — VDMP,
     account restrictions, revenue impact), the strategic plan
     (prevention investment, technology upgrade, team expansion), and
     the ROI projection (investment vs. recovered revenue).

  2. Write the incident brief. Include: the situation summary (what
     happened, customer impact, dispute risk), the immediate action
     plan (process all pending refunds within 24 hours, proactive
     outreach to all 200 customers), the dispute mitigation strategy
     (offer goodwill credits, flag the 200 charges for expedited
     dispute handling), the financial impact (worst case: 50 disputes
     × $X average = $Y), and the systemic fix (root cause and
     prevention).

  3. Prepare the Stripe QBR strategy. Include: the relationship
     positioning (demonstrate value as a merchant — volume, growth,
     low dispute rate relative to industry), the negotiation asks
     (prioritized list: reduced dispute fees, access to enhanced
     dispute analytics, early access to Stripe's AI evidence
     features, dedicated dispute support), the data package (metrics
     that demonstrate your dispute management maturity), and the
     escalation strategy (if standard asks are declined, what
     alternatives to propose).

assertions:
  - type: llm_judge
    criteria: "Board presentation translates technical metrics into business impact — non-technical board members can understand the risk, opportunity is quantified, investment is justified with ROI, and strategic plan is actionable"
    weight: 0.35
    description: "Business-impact board presentation"
  - type: llm_judge
    criteria: "Incident brief enables rapid cross-functional response — situation is clear, actions are assigned to specific functions, dispute mitigation is proactive, and systemic fix prevents recurrence"
    weight: 0.35
    description: "Rapid-response incident brief"
  - type: llm_judge
    criteria: "Stripe QBR strategy maximizes relationship value — positioning demonstrates merchant value, asks are prioritized and reasonable, data supports the case, and fallback options exist"
    weight: 0.30
    description: "Value-maximizing QBR strategy"
