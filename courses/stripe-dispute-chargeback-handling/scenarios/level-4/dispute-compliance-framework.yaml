meta:
  id: dispute-compliance-framework
  level: 4
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Build a dispute compliance framework — navigate card network rules, monitoring programs, and regulatory requirements for enterprise dispute management"
  tags: [stripe, dispute, compliance, VDMP, EFM, PCI, card-network-rules, expert]

state: {}

trigger: |
  You're the Chief Compliance Officer at a payments company. After
  a near-miss with Visa's VDMP (Visa Dispute Monitoring Program) —
  your dispute rate hit 0.87% last month, just 0.03% below the 0.9%
  threshold — the board mandates a comprehensive compliance framework.

  Current compliance landscape:
  - Visa VDMP thresholds: Standard (0.9% rate AND 100 disputes),
    Excessive (1.8% rate AND 1,000 disputes)
  - Mastercard EFM thresholds: Excessive Chargeback Merchant
    (1.5% rate AND 100 chargebacks), High Excessive (3.0% rate AND
    300 chargebacks)
  - Your current rates: Visa 0.87%, Mastercard 0.63%
  - Monthly volumes: 210,000 Visa transactions, 85,000 Mastercard
  - Monthly disputes: 1,827 Visa, 536 Mastercard

  Recent compliance events:
  - Month 1: Visa rate 0.72% (safe)
  - Month 2: Visa rate 0.78% (rising)
  - Month 3: Visa rate 0.83% (warning signs)
  - Month 4: Visa rate 0.87% (near-miss)
  - Trend: 0.05% increase per month (projection: breach in 1 month)

  Complicating factors:
  1. The company is expanding internationally (new markets = higher
     dispute rates initially)
  2. A new product line (digital subscriptions) has a 2.1% dispute
     rate but represents 30% of growth strategy
  3. Stripe's own monitoring adds a layer — Stripe may restrict your
     account before card networks act
  4. PCI DSS 4.0 has new requirements for dispute data handling

  Tasks:
  1. Design the card network compliance monitoring system. Include:
     the real-time rate tracking dashboard (daily dispute rate by
     network with 30-day rolling window), the early warning system
     (alerts at 0.65%, 0.75%, 0.85% for Visa; corresponding for
     Mastercard), the breach prevention protocol (automated actions
     when approaching thresholds — tightening fraud rules, enabling
     pre-dispute alerts, temporarily pausing high-risk acquisition),
     and the remediation plan template (if breached, the 90-day plan
     that Visa requires).

  2. Build the multi-network compliance framework. Include: the
     Visa-specific compliance (VDMP rules, Visa CE 3.0 evidence
     requirements, Visa Rapid Dispute Resolution), the Mastercard-
     specific compliance (EFM rules, Mastercard dispute categories,
     Ethoca alerts), the cross-network harmonization (unified tracking
     that satisfies both networks), and the Stripe-specific layer
     (Stripe's own account health monitoring, communication protocols
     with Stripe when approaching thresholds).

  3. Address the strategic compliance challenges. Include: the
     international expansion playbook (expected dispute rate impact by
     market, mitigation strategies per country, network-specific rules
     by region), the high-risk product strategy (isolating the digital
     subscription dispute rate, creating a separate MID strategy,
     product changes to reduce disputes), the PCI DSS 4.0 dispute data
     requirements (secure storage of dispute evidence, access controls,
     encryption requirements), and the board reporting framework
     (quarterly compliance status, risk exposure, investment needs).

assertions:
  - type: llm_judge
    criteria: "Monitoring system prevents breaches — real-time tracking uses rolling windows, early warnings trigger at appropriate thresholds, breach prevention automates rate reduction, and remediation plans are pre-built"
    weight: 0.35
    description: "Breach-preventing monitoring system"
  - type: llm_judge
    criteria: "Multi-network framework handles complexity — Visa and Mastercard rules are accurately differentiated, cross-network tracking is unified, and Stripe's own monitoring layer is accounted for"
    weight: 0.35
    description: "Complexity-handling multi-network framework"
  - type: llm_judge
    criteria: "Strategic challenges are addressed practically — international expansion accounts for dispute rate impact, high-risk products are isolated, PCI requirements are met, and board reporting communicates risk clearly"
    weight: 0.30
    description: "Practically addressed strategic challenges"
