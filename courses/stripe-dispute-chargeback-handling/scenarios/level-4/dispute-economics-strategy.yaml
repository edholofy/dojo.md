meta:
  id: dispute-economics-strategy
  level: 4
  course: stripe-dispute-chargeback-handling
  type: output
  description: "Analyze dispute economics — build the financial model that quantifies dispute costs, optimizes fight/accept decisions, and justifies prevention investment"
  tags: [stripe, dispute, economics, financial-model, ROI, CFO, expert]

state: {}

trigger: |
  You're the Director of Financial Operations presenting the dispute
  economics analysis to the CFO. The company processes $500M annually
  through Stripe with an 0.82% dispute rate. The CFO wants to
  understand the true cost of disputes and whether to invest $400K
  in a dispute management platform.

  Current dispute economics:
  - Monthly disputes: 1,850
  - Average dispute amount: $220
  - Win rate: 28%
  - Disputes fought: 70% (1,295/month)
  - Disputes accepted: 30% (555/month)
  - Monthly dispute losses: $293,000 (lost disputes × amounts)
  - Monthly operational cost: $48,000 (team of 4 + tools)
  - Monthly network fees: $27,750 ($15/dispute)
  - Monthly chargeback fees: $37,000 ($20/chargeback from Stripe)
  - Total monthly dispute cost: $405,750

  Cost breakdown per dispute:
  - Direct loss (when lost): $220 average
  - Chargeback fee: $20 (Stripe)
  - Network fee: $15 (Visa/Mastercard)
  - Operational cost: $26 (analyst time)
  - Shipping cost (already incurred): $12 average
  - COGS (already incurred): $88 average
  - Total cost of a lost dispute: $381
  - Total cost of a won dispute: $61 (fees + operational)

  Proposed platform investment:
  - Annual cost: $400K (platform + implementation)
  - Projected improvements: Win rate from 28% to 45%, automation
    rate from 10% to 65%, operational cost reduction of 40%
  - Projected prevention: 20% reduction in dispute volume through
    pre-dispute alerts and improved customer experience

  Tasks:
  1. Build the comprehensive dispute cost model. Include: the true
     cost per dispute (direct loss, fees, operational cost, COGS,
     shipping, opportunity cost of analyst time), the fight vs. accept
     decision framework (at what win probability does fighting become
     NPV-positive, considering the cost to fight vs. cost to accept),
     the dispute rate cost curve (what happens financially at 0.5%,
     0.75%, 0.9%, 1.0%, 1.5% dispute rates — including VDMP fines),
     and the hidden costs (customer lifetime value impact, brand
     reputation, employee morale).

  2. Create the investment ROI analysis. Include: the 3-year financial
     projection (year 1: implementation + partial benefits, year 2:
     full automation + improved win rates, year 3: predictive
     prevention + scale), the sensitivity analysis (what if win rate
     only improves to 35% instead of 45%? what if volume reduction
     is 10% instead of 20%?), the break-even analysis (when does
     the investment pay for itself?), and the comparison to
     alternatives (hiring more analysts, outsourcing, doing nothing).

  3. Design the dispute financial dashboard for the CFO. Include: the
     monthly P&L impact report (dispute costs as % of revenue, trend
     analysis, variance to budget), the dispute cost attribution
     (which product lines, customer segments, and channels generate
     the most dispute costs), the prevention ROI tracker (measuring
     the actual impact of each prevention initiative), and the
     risk-adjusted forecast (projected dispute costs under different
     growth scenarios).

assertions:
  - type: llm_judge
    criteria: "Cost model captures true economics — all direct and indirect costs are quantified, fight/accept framework uses NPV analysis, dispute rate curve includes program fees, and hidden costs are acknowledged"
    weight: 0.35
    description: "True-economics cost model"
  - type: llm_judge
    criteria: "ROI analysis is CFO-ready — 3-year projection is realistic, sensitivity analysis tests key assumptions, break-even is clearly identified, and alternatives are fairly compared"
    weight: 0.35
    description: "CFO-ready ROI analysis"
  - type: llm_judge
    criteria: "Financial dashboard enables decisions — P&L impact is clear, cost attribution identifies root causes, prevention ROI is measurable, and forecasts account for growth"
    weight: 0.30
    description: "Decision-enabling financial dashboard"
