meta:
  id: enterprise-review-redesign
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Enterprise review redesign — redesign a company-wide performance review system that has lost credibility"
  tags: [enterprise, redesign, system-overhaul, credibility, advanced]

state: {}

trigger: |
  You're the VP of People Operations at a 2,500-person
  financial services company. The CEO has asked you to
  redesign the performance review system after an employee
  engagement survey revealed devastating results:

  Survey findings:
  - 67% of employees say reviews are "a waste of time"
  - 72% of managers say they "just go through the motions"
  - 58% of employees say their rating doesn't reflect
    their actual performance
  - 44% of employees of color report their reviews feel
    biased compared to 12% of white employees
  - 81% of employees want more frequent feedback
  - Only 23% say their review helped them develop
  - 3 discrimination complaints in the past year cited
    performance review language as evidence

  Current system problems:
  - Annual reviews only (no mid-year check-ins)
  - Single-rater system (manager only)
  - Forced ranking (top 20%, middle 70%, bottom 10%)
  - Reviews done in a 2-week crunch in December
  - No calibration sessions
  - Ratings directly determine bonus (creates gaming)
  - No manager training on writing reviews
  - Paper-based forms, no analytics
  - Same form for all levels (IC to VP)

  Constraints:
  - Budget: $500K for implementation
  - Timeline: New system must be ready for next review
    cycle (10 months away)
  - Must maintain compensation linkage (CEO requirement)
  - Union employees (800 of 2,500) have review process
    in their CBA — changes need union approval
  - Company is in a regulated industry (compliance
    documentation requirements)

  Task: Design the new performance review system. Include
  the framework, implementation timeline, change management
  plan, and how you'll address each of the survey findings.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive new system — replaces forced ranking with a fairer model; introduces multi-rater feedback; adds mid-year or quarterly check-ins; includes calibration sessions; differentiates review forms by level; adds manager training; addresses the bias concerns with specific structural changes; the system design directly responds to each survey finding."
    weight: 0.35
    description: "ComprehensiveDesign"
  - type: llm_judge
    criteria: "Response provides a realistic implementation plan — the 10-month timeline is phased with specific milestones; the $500K budget is allocated across technology, training, and change management; addresses the union CBA constraint with a negotiation strategy; accounts for the regulatory compliance requirements; includes a pilot program before full rollout; the plan is achievable, not aspirational."
    weight: 0.35
    description: "RealisticImplementation"
  - type: llm_judge
    criteria: "Response includes a change management strategy — addresses manager resistance to new processes; plans communication to employees about why the system is changing; addresses the bias findings with specific actions (bias training, diverse calibration panels, analytics monitoring); the CEO's compensation linkage requirement is handled thoughtfully; the approach would rebuild trust in the review process."
    weight: 0.30
    description: "ChangeManagement"
