meta:
  id: competency-framework-design
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Competency framework design — build a company-wide competency framework that drives performance evaluations"
  tags: [competency-framework, company-wide, behaviors, leveling, advanced]

state: {}

trigger: |
  You're the Director of Organizational Development at a
  1,800-person technology company. The company has grown
  from 200 to 1,800 in 4 years and has no formal
  competency framework. Managers evaluate performance
  inconsistently — some focus on output, others on behavior,
  others on seniority. You've been asked to design a
  competency framework that will serve as the foundation
  for all performance evaluations.

  Company context:
  - 5 departments: Engineering (700), Product (200),
    Sales (400), Operations (300), G&A (200)
  - 6 levels: Individual Contributor (L1-L4), Manager
    (M1-M2), Director (D1), VP, C-Suite
  - The company values (stated): Innovation, Customer
    Obsession, Ownership, Collaboration
  - Real culture: Engineering-dominated, moves fast,
    tolerates "brilliant jerks," promotes based on
    technical skill not leadership ability

  Problems to solve:
  - A senior engineer was promoted to manager despite 3
    direct reports requesting transfers away from them
  - Sales and Engineering have completely different
    definitions of "high performance"
  - New managers have no framework for what "good" looks
    like at each level
  - Diversity initiatives are stalled because promotion
    criteria are subjective and opaque
  - An employee survey showed 54% don't understand what's
    needed for promotion

  Stakeholder requirements:
  - CEO: "Don't create bureaucracy. I want it simple."
  - VP Engineering: "Technical excellence must be the top
    priority for engineering evaluations."
  - VP Sales: "Revenue is what matters for my team."
  - VP People: "We need to stop promoting brilliant jerks."
  - DEI Lead: "The framework must reduce bias in
    evaluations, not create new bias."

  Task: Design the complete competency framework. Include:
  core competencies (universal), functional competencies
  (department-specific), behavioral indicators for each
  level, and how the framework integrates with performance
  reviews. Address each stakeholder's requirements.

assertions:
  - type: llm_judge
    criteria: "Response designs a practical competency framework — includes 4-6 core competencies applicable across all departments with clear behavioral indicators for each level (L1 through C-Suite); includes functional competencies for at least Engineering and Sales with meaningful differentiation; behavioral indicators are specific and observable (not vague like 'demonstrates leadership'); the framework is genuinely usable for writing performance reviews."
    weight: 0.35
    description: "PracticalFramework"
  - type: llm_judge
    criteria: "Response addresses the 'brilliant jerk' problem directly — the framework makes collaboration/leadership a promotion requirement alongside technical/functional excellence; behavioral indicators at higher levels require people skills; the engineer promotion scenario would be prevented by the new framework; the framework balances CEO's simplicity requirement with VP People's anti-jerk requirement."
    weight: 0.35
    description: "BrilliantJerkSolution"
  - type: llm_judge
    criteria: "Response addresses all stakeholder requirements — CEO's simplicity (framework isn't bureaucratic), VP Engineering's technical priority (technical excellence is valued but not sufficient alone), VP Sales's revenue focus (functional competencies include commercial metrics), VP People's culture goals (behavioral standards enforced), DEI Lead's bias reduction (clear, observable criteria reduce subjective evaluation); the framework navigates these competing demands with genuine trade-offs acknowledged."
    weight: 0.30
    description: "StakeholderBalance"
