meta:
  id: advanced-review-shift
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Advanced review shift — navigate a review cycle crisis where a discrimination lawsuit, a leaked rating spreadsheet, and a mass resignation threat converge"
  tags: [shift, discrimination-lawsuit, leak, mass-resignation, advanced]

state: {}

trigger: |
  You're the VP of HR at a 1,500-person professional
  services firm. Three crises have converged during review
  season.

  Crisis 1 — Discrimination Lawsuit:
  A Black senior consultant has filed an EEOC complaint
  alleging racial discrimination in performance reviews.
  Their evidence:
  - Rated 3 for 4 consecutive years despite billing rates
    and utilization matching or exceeding peers rated 4
  - Their reviews consistently mention "communication
    style" as a development area (no specific behavioral
    examples provided)
  - A white colleague with lower utilization and client
    scores was promoted over them last year
  - They have a recording of their manager saying "clients
    in our market prefer a certain type of consultant"
  - The EEOC complaint names 4 other Black consultants
    with similar patterns

  The General Counsel has told you to "freeze all review
  activities immediately" until legal review.

  Crisis 2 — Leaked Rating Spreadsheet:
  A manager accidentally emailed the entire team's proposed
  ratings (40 people) to the whole department. Employees
  can now see each other's ratings. Reactions:
  - 3 employees rated 2 are furious and demanding to know
    why before formal reviews
  - 2 employees rated 4 are being congratulated publicly,
    creating pressure on their managers to maintain ratings
  - Several employees discovered that peers with less
    experience and fewer contributions are rated higher
  - The leaked spreadsheet shows comments like "need to
    keep costs down" next to some ratings, suggesting
    ratings were influenced by budget, not performance

  Crisis 3 — Mass Resignation Threat:
  12 consultants (your top billing team, generating $8M
  annually) have collectively threatened to resign if the
  company doesn't "fix the broken review system." Their
  demands:
  - Transparent rating criteria published for all employees
  - Independent calibration (not just the partner group)
  - 360-degree feedback replacing manager-only evaluations
  - Annual equity audit of review outcomes
  - Accountability for the managers named in the EEOC
    complaint
  They've given you 2 weeks to respond before they start
  interviewing.

  Task: Create the comprehensive crisis response plan
  addressing all 3 situations simultaneously. Include
  immediate actions (next 48 hours), short-term plan
  (next 30 days), and long-term systemic reforms.

assertions:
  - type: llm_judge
    criteria: "Response addresses the EEOC complaint with legal and ethical seriousness — recommends preserving all review documentation, engaging external employment counsel, conducting an independent review of the 5 named Black consultants' evaluations, addressing the recorded comment immediately; doesn't just focus on legal defense but also addresses the underlying equity failure; the response balances legal protection with genuine accountability."
    weight: 0.35
    description: "EEOCResponse"
  - type: llm_judge
    criteria: "Response handles the leak crisis practically — addresses immediate communication needs (what to say to the department now); manages the employees rated 2 with urgency and sensitivity; addresses the 'budget-influenced ratings' revelation transparently; proposes how to proceed with reviews when ratings are already known; the response prevents further damage while maintaining trust."
    weight: 0.35
    description: "LeakCrisisHandling"
  - type: llm_judge
    criteria: "Response addresses the mass resignation threat strategically — takes the 12 consultants' demands seriously (most are reasonable systemic reforms); responds within their 2-week timeline; doesn't dismiss the demands or capitulate entirely; connects the demands to the EEOC issues (they're related problems); the long-term reforms would genuinely fix the systemic issues; the response would retain the top billing team while driving real change."
    weight: 0.30
    description: "ResignationResponse"
