meta:
  id: cross-cultural-review
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Cross-cultural review — adapt performance reviews for employees across different cultural contexts"
  tags: [cross-cultural, international, cultural-adaptation, global, advanced]

state: {}

trigger: |
  You're the Global Head of Talent Management at a
  multinational manufacturing company (8,000 employees,
  operations in US, Germany, Japan, Brazil, and India).
  The company uses a single global performance review
  system, but you've discovered significant problems with
  cultural fit.

  Issues reported by regional HR leaders:

  Japan (1,200 employees):
  - Employees rate themselves 2-3 out of 5 regardless of
    actual performance (cultural humility)
  - Managers give uniformly positive reviews to avoid
    causing "loss of face"
  - Direct negative feedback is considered disrespectful
  - 360 feedback from peers is consistently vague and
    positive
  - Result: Impossible to differentiate performance, and
    Japanese employees are systematically rated lower than
    US counterparts when self-ratings are weighted

  Germany (1,500 employees):
  - Employees expect extremely detailed, technical feedback
  - "Meets Expectations" is considered a compliment, not
    mediocre (unlike US perception)
  - Workers' council (Betriebsrat) must approve any
    review system changes
  - Legal requirements: Reviews must be shown to employees
    before filing, employees can attach a written response
  - German managers give blunt, direct feedback that US
    HR considers "too harsh"

  Brazil (800 employees):
  - Reviews are highly relationship-oriented — personal
    rapport affects ratings significantly
  - Feedback tends to be indirect and wrapped in positive
    language
  - Employees expect reviews to include personal development
    beyond job scope
  - Hierarchy matters — junior employees won't give honest
    upward feedback
  - Cultural expectation: Manager should care about the
    "whole person," not just work output

  India (1,400 employees):
  - Strong hierarchy makes upward feedback nearly impossible
  - Reviews heavily influenced by seniority rather than
    performance
  - "Exceeds Expectations" is seen as baseline for promotion
    consideration
  - Employees expect specific numerical targets and
    technical metrics
  - High-context communication means written feedback
    often doesn't capture the intended message

  Task: Design culturally adapted performance review
  guidelines for each region while maintaining a consistent
  global framework. Include specific adaptations for rating
  scales, feedback delivery, 360 processes, and
  self-assessment approaches.

assertions:
  - type: llm_judge
    criteria: "Response designs region-specific adaptations that respect cultural differences — addresses Japan's self-rating deflation with calibration mechanisms; adapts Germany's directness expectations while meeting legal requirements (Betriebsrat, employee response rights); accounts for Brazil's relationship orientation and holistic employee view; addresses India's hierarchy barriers to upward feedback; each adaptation demonstrates genuine cultural understanding, not stereotyping."
    weight: 0.35
    description: "CulturalAdaptations"
  - type: llm_judge
    criteria: "Response maintains a global consistency framework — identifies which elements must be consistent globally (rating definitions, core competencies, legal compliance) vs. which can be adapted locally (delivery method, self-assessment weighting, feedback formats); creates a mechanism to compare performance across regions fairly despite different cultural norms; addresses the systematic underrating of Japanese employees specifically."
    weight: 0.35
    description: "GlobalConsistency"
  - type: llm_judge
    criteria: "Response provides practical implementation guidance — includes specific tools and processes for each region (not just principles); addresses the Germany workers' council approval requirement; provides feedback delivery scripts or frameworks adapted for each culture; the guidelines would be usable by regional HR teams; addresses training needs for managers in each region."
    weight: 0.30
    description: "PracticalImplementation"
