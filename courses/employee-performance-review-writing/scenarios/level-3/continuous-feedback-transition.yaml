meta:
  id: continuous-feedback-transition
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Continuous feedback transition — design and implement a transition from annual reviews to continuous performance management"
  tags: [continuous-feedback, agile-performance, transformation, culture-change, advanced]

state: {}

trigger: |
  You're the Head of People Experience at a 1,200-person
  digital media company. The CEO has decided to eliminate
  annual performance reviews and move to a continuous
  feedback model after reading articles about companies
  like Adobe and Deloitte doing the same. You've been asked
  to design and implement the transition.

  Current state:
  - Annual reviews in December (everyone dreads them)
  - 5-point rating scale tied to annual bonus (2% for 3,
    5% for 4, 10% for 5)
  - Average manager spends 8 hours per review cycle
  - Reviews are 70% backward-looking, 30% goals
  - Manager quality varies wildly — some write thoughtful
    3-page reviews, others submit 2 sentences
  - Employee engagement with reviews: 2.1/5

  Resistance you're facing:
  - CFO: "How do we determine bonuses without ratings?"
  - Legal: "We need documented performance records for
    any termination"
  - Senior managers: "My people need structure — they
    want to know where they stand"
  - HR team: "This is a lot of change. We barely have
    capacity to support the current system"
  - Engineering managers: "We already do agile retros and
    1:1s — this is redundant"
  - Some employees: "I actually like getting a formal
    rating — it validates my work"

  Benchmarks from companies that made this transition:
  - Adobe: Eliminated ratings, moved to quarterly
    check-ins. Voluntary turnover dropped 30%
  - Deloitte: Redesigned to frequent pulse check-ins with
    project-based evaluations
  - Gap: Dropped ratings, moved to GPS (Grow, Perform,
    Succeed) model
  - Microsoft: Eliminated stack ranking, moved to impact-
    and-growth focused conversations
  - 30% of Fortune 500 have abandoned traditional reviews

  Constraints:
  - Must maintain legal documentation capability
  - Compensation decisions must still be data-informed
  - Implementation budget: $200K
  - Timeline: 18 months to full rollout
  - Performance management technology: Currently using
    basic HRIS (BambooHR), need to evaluate upgrades

  Task: Design the complete transition plan. Include the
  new continuous feedback model, how compensation decisions
  will work, change management strategy addressing each
  resistance point, and implementation timeline.

assertions:
  - type: llm_judge
    criteria: "Response designs a practical continuous feedback model — includes specific cadence (weekly, monthly, quarterly elements); defines what replaces the annual review (check-ins, project reviews, periodic summaries); maintains documentation capability for legal purposes; the model is differentiated from what engineering already does with agile/1:1s; the new system is clearly better than the old one, not just different."
    weight: 0.35
    description: "PracticalFeedbackModel"
  - type: llm_judge
    criteria: "Response addresses every resistance point specifically — explains how bonuses work without ratings (calibration sessions, manager discretion with guardrails, or simplified rating at compensation time); maintains legal documentation; provides structure for employees who want formal assessments; acknowledges HR capacity constraints; differentiates from engineering's existing agile practices; validates employees who want ratings; each response is substantive, not dismissive."
    weight: 0.35
    description: "ResistanceAddressed"
  - type: llm_judge
    criteria: "Response provides a realistic implementation plan — the 18-month timeline is phased with pilot groups; the $200K budget is allocated thoughtfully (technology, training, change management); includes manager training on continuous feedback conversations; addresses technology needs (BambooHR upgrade or replacement); includes success metrics to measure whether the new system is working; the plan acknowledges that this is a cultural shift, not just a process change."
    weight: 0.30
    description: "RealisticPlan"
