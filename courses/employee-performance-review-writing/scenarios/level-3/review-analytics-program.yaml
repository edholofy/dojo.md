meta:
  id: review-analytics-program
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Review analytics program — build a people analytics program to measure and improve performance review quality and outcomes"
  tags: [analytics, measurement, data-driven, quality-metrics, advanced]

state: {}

trigger: |
  You're the Director of People Analytics at a 5,000-person
  retail technology company. The VP of HR wants to build a
  data-driven approach to measuring and improving
  performance review quality. Currently, the company has no
  metrics on whether reviews are effective, fair, or
  driving the right outcomes.

  Available data sources:
  - HRIS (Workday): employee demographics, tenure, role,
    level, compensation history, performance ratings (3
    years), promotion history, termination records
  - Review text: 15,000 written reviews from last cycle
    (unstructured text)
  - Employee engagement survey: Annual survey with 75%
    participation, includes questions about review
    experience
  - Manager 360 feedback: Quarterly pulse surveys on
    manager effectiveness
  - Exit interview data: 2 years of structured exit
    interviews
  - Training completion records: Which managers completed
    review-writing training
  - Time-tracking: How long each manager spends writing
    reviews (from Workday login data)

  Key questions the VP wants answered:
  1. Are our reviews predicting actual performance outcomes?
     (Do high-rated employees actually outperform?)
  2. Are reviews fair across demographics?
  3. Which managers write the best reviews? What do they
     have in common?
  4. Does review quality correlate with employee retention?
  5. What's the ROI of investing in better reviews?
  6. Are our reviews getting better or worse over time?

  Technical constraints:
  - Analytics team: 3 people (you + 2 analysts)
  - Tools: Python, Tableau, basic NLP capabilities
  - No budget for new tools this year
  - Data privacy: Must comply with internal data policies
    (no individual-level dashboards visible to non-HR)
  - Timeline: MVP dashboard in 3 months, full program in
    9 months

  Task: Design the complete people analytics program for
  performance review quality. Include: metrics framework,
  data methodology, dashboard design, NLP analysis plan
  for review text, and how you'll present insights to
  leadership.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive metrics framework — defines specific metrics for each of the VP's 6 questions (predictive validity correlation, demographic parity analysis, manager quality scoring, retention correlation, ROI calculation methodology, trend analysis); metrics are specific and measurable; the framework distinguishes between leading and lagging indicators; addresses the complexity of measuring 'review quality.'"
    weight: 0.35
    description: "MetricsFramework"
  - type: llm_judge
    criteria: "Response includes a practical NLP analysis plan — describes how to analyze 15,000 reviews for quality indicators (specificity, behavioral language, bias patterns, development plan quality); the methodology is feasible with basic NLP capabilities and Python; includes specific approaches (sentiment analysis, keyword frequency, readability scores, bias term detection); addresses data privacy and individual review confidentiality."
    weight: 0.35
    description: "NLPAnalysisPlan"
  - type: llm_judge
    criteria: "Response provides realistic implementation with the 3-person team — the MVP dashboard scope is achievable in 3 months; the full program timeline is realistic for 9 months; tool choices work within budget constraints (Python, Tableau); the dashboard design would be useful for HR leadership; includes how insights will be communicated to drive action; addresses the 'so what' — how the analytics will actually improve review quality."
    weight: 0.30
    description: "RealisticImplementation"
