meta:
  id: review-equity-audit
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Review equity audit — conduct a comprehensive equity audit of performance reviews across the organization"
  tags: [equity-audit, bias-analysis, demographic, fairness, advanced]

state: {}

trigger: |
  You're the Head of People Analytics at a 3,000-person
  technology company. The Chief Diversity Officer has asked
  you to conduct a comprehensive equity audit of the
  company's performance reviews after receiving complaints
  that the review system disadvantages certain groups.

  Data you've analyzed (last 3 review cycles):

  Rating Distribution by Gender:
  - Men (1,800 employees): Avg rating 3.6, 28% rated 4+
  - Women (1,200 employees): Avg rating 3.3, 19% rated 4+
  - Gap: 0.3 rating points, statistically significant

  Rating Distribution by Race/Ethnicity:
  - White: Avg 3.5, 26% rated 4+
  - Asian: Avg 3.6, 29% rated 4+
  - Black: Avg 3.2, 14% rated 4+
  - Hispanic/Latino: Avg 3.3, 17% rated 4+

  Promotion rates following "Exceeds" ratings:
  - White men rated 4+: 42% promoted within 12 months
  - White women rated 4+: 31% promoted within 12 months
  - Black employees rated 4+: 22% promoted within 12 months
  - Hispanic employees rated 4+: 25% promoted within 12 months

  Language analysis (NLP on 9,000 reviews):
  - Women's reviews: 2.5x more likely to contain words
    like "collaborative," "helpful," "supportive"
  - Men's reviews: 3x more likely to contain words like
    "strategic," "visionary," "technical leader"
  - Black employees' reviews: 1.8x more likely to contain
    "communication style" as development area
  - Women's development areas: 40% relate to "executive
    presence" or "confidence"
  - Men's development areas: 65% relate to specific
    technical or business skills

  Manager analysis:
  - 15 managers (of 300) account for 45% of the rating gap
  - These managers rate all employees lower, but
    underrepresented groups disproportionately lower
  - 6 of these 15 managers are in the Engineering org
  - No manager has ever been coached or held accountable
    for biased review patterns

  Additional findings:
  - Part-time employees (80% women): Avg rating 2.9,
    regardless of output quality
  - Employees who took parental leave: Rating drops 0.4
    points in the year of leave
  - Remote employees (higher % employees of color): 0.2
    point lower average rating

  Task: Write the complete equity audit report with
  findings, root cause analysis, specific recommendations,
  and an accountability framework. This report will be
  presented to the executive team and board.

assertions:
  - type: llm_judge
    criteria: "Response presents findings clearly and compellingly — organizes the data into clear themes (gender gap, racial gap, language bias, promotion inequity, structural biases); uses the data effectively to tell a story; distinguishes between correlation and causation where appropriate; the presentation is suitable for an executive and board audience; quantifies the business and legal risk of the current state."
    weight: 0.35
    description: "ClearFindings"
  - type: llm_judge
    criteria: "Response provides root cause analysis — identifies structural causes (part-time penalty, parental leave impact, remote work bias, single-rater system); identifies behavioral causes (gendered language patterns, development area framing); identifies systemic causes (no manager accountability, concentrated bias in 15 managers); the analysis goes beyond surface-level symptoms to underlying system failures."
    weight: 0.35
    description: "RootCauseAnalysis"
  - type: llm_judge
    criteria: "Response includes specific, actionable recommendations — proposes interventions for each root cause (manager accountability for the 15 outlier managers, language audit tools, calibration process changes, parental leave rating protection, part-time evaluation adjustments); includes an accountability framework with timelines and metrics; the recommendations are prioritized and sequenced; the report would drive real change, not just awareness."
    weight: 0.30
    description: "ActionableRecommendations"
