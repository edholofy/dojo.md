meta:
  id: executive-review-design
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Executive review design — create the performance review framework and write a sample review for a C-suite executive"
  tags: [executive, c-suite, board-review, leadership, advanced]

state: {}

trigger: |
  You're the Chief Human Resources Officer at a publicly
  traded SaaS company ($800M revenue, 3,500 employees).
  The Board's Compensation Committee has asked you to
  redesign the executive performance review process and
  write a sample review for the Chief Revenue Officer (CRO)
  that demonstrates the new format.

  Current problems with executive reviews:
  - CEO gives informal verbal feedback only — nothing
    documented
  - Executive comp is set by the board without clear
    performance linkage
  - No 360-degree feedback for executives
  - No development plans — "executives should know what
    they need to work on"
  - During the last proxy fight, activist investors
    criticized the lack of executive accountability

  CRO performance data (sample review subject):
  Name: James Chen, CRO (3 years in role)

  Financial metrics:
  - Revenue: $800M (target: $850M — 94% attainment)
  - Net Revenue Retention: 112% (target: 115%)
  - New business bookings: $180M (target: $160M — 113%)
  - Sales team quota attainment: 78% of reps at quota
    (benchmark: 65%)
  - CAC payback: 18 months (improved from 24)

  Leadership metrics:
  - Sales team voluntary turnover: 22% (industry avg: 18%)
  - Employee engagement score for sales org: 3.4/5
    (company avg: 4.1)
  - 2 senior sales directors left citing "toxic culture"
  - 360 feedback themes (from pilot): "brilliant strategist,"
    "intimidating in meetings," "doesn't listen to
    dissent," "plays favorites"

  Strategic contributions:
  - Led successful entry into enterprise segment ($50M
    new pipeline)
  - Built partnership channel generating $30M
  - Restructured sales org for geographic expansion
  - Board praised the enterprise strategy presentation

  Concerns:
  - Department has highest HR complaints rate in company
  - 1 formal harassment investigation (substantiated
    allegation of verbal abuse toward a subordinate —
    received written warning)
  - Consistently over-promises revenue to the board,
    then misses targets
  - Resists cross-functional collaboration with Product
    and Customer Success

  Task: Design the executive performance review framework
  (applicable to all C-suite), then write the complete
  sample review for the CRO using the new framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a robust executive review framework — includes financial/strategic metrics, leadership effectiveness, stakeholder relationships, board deliverables, and cultural stewardship; incorporates 360-degree feedback from direct reports, peers, and board members; links to compensation transparently; differentiates from IC/manager reviews appropriately; addresses the proxy fight criticism about accountability."
    weight: 0.35
    description: "ExecutiveFramework"
  - type: llm_judge
    criteria: "Response writes a balanced CRO review — acknowledges the strong strategic contributions (enterprise entry, partnership channel, rep productivity) while directly addressing the serious concerns (toxic culture indicators, harassment incident, turnover, over-promising); the review doesn't sugarcoat the leadership issues despite strong financial results; the rating reflects the full picture (strong results but significant leadership deficiencies)."
    weight: 0.35
    description: "BalancedExecutiveReview"
  - type: llm_judge
    criteria: "Response handles the sensitive issues appropriately — the substantiated harassment warning is referenced as a serious concern requiring behavioral change; the 'toxic culture' feedback is addressed with specific required actions; the review distinguishes between revenue performance (strong) and leadership/culture (concerning); the development plan for the CRO would be actionable and measurable; the review would be defensible to the board, investors, and in litigation."
    weight: 0.30
    description: "SensitiveIssueHandling"
