meta:
  id: legal-defensibility-framework
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Legal defensibility framework — create a performance review documentation framework that protects the company in employment litigation"
  tags: [legal, documentation, litigation, compliance, advanced]

state: {}

trigger: |
  You're the Director of Employee Relations at a 4,000-person
  healthcare company. The company just settled 2 wrongful
  termination lawsuits for a combined $1.8M. In both cases,
  the company's performance review documentation was the
  primary vulnerability:

  Case 1: A nurse was terminated for "poor performance,"
  but her reviews for the prior 3 years all said "Meets
  Expectations" with generic positive comments. The jury
  found the termination was pretextual because the
  documentation didn't support the stated reason.

  Case 2: A male and female physician assistant with
  similar performance received different ratings (male: 4,
  female: 3). The manager couldn't articulate the difference
  when deposed. The language in the female PA's review
  included "could be more assertive" and "sometimes too
  emotional" — phrases the plaintiff's attorney argued
  were gender-coded.

  The General Counsel has asked you to create a comprehensive
  framework to prevent these vulnerabilities in the future.

  Current state:
  - 400 managers write reviews
  - No review language guidelines exist
  - No legal review of performance documentation
  - Managers receive no training on legally defensible
    writing
  - Reviews are not audited for consistency
  - Documentation gaps are common (missing reviews, late
    reviews, incomplete forms)

  Task: Create the complete legal defensibility framework
  for performance reviews. Include: documentation standards,
  prohibited language guidelines with examples, review
  quality audit process, manager training curriculum, and
  an escalation protocol for performance-based terminations.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive documentation standards — specifies what must be documented (behavioral examples, measurable outcomes, development discussions); addresses the Case 1 vulnerability (reviews must align with any subsequent adverse action); includes minimum documentation requirements (completion deadlines, required sections, evidence standards); the standards would prevent 'generic positive review followed by termination' scenarios."
    weight: 0.35
    description: "DocumentationStandards"
  - type: llm_judge
    criteria: "Response includes specific prohibited language guidelines — identifies gender-coded language (assertive, emotional, abrasive, aggressive for women; similar patterns for other protected classes); provides specific before/after examples of problematic phrases; addresses the Case 2 vulnerability (different standards for similar employees); the guidelines are practical enough for managers to use as a reference during review writing."
    weight: 0.35
    description: "LanguageGuidelines"
  - type: llm_judge
    criteria: "Response includes audit and escalation processes — describes a review quality audit process (random sampling, consistency checks, demographic analysis); creates an escalation protocol for terminations (HR review required, documentation completeness check, legal sign-off); includes manager training with specific content and cadence; the framework would meaningfully reduce litigation risk; addresses the 400-manager scale realistically."
    weight: 0.30
    description: "AuditAndEscalation"
