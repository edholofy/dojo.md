meta:
  id: manager-training-program
  level: 3
  course: employee-performance-review-writing
  type: output
  description: "Manager training program — design a comprehensive manager training curriculum for writing effective performance reviews"
  tags: [manager-training, curriculum, writing-skills, coaching, advanced]

state: {}

trigger: |
  You're the Head of Learning and Development at a
  2,000-person insurance company. After an external audit
  revealed that 60% of performance reviews fail to meet
  basic quality standards, the CHRO has asked you to design
  a mandatory manager training program on writing effective
  performance reviews.

  Audit findings (from reviewing 500 randomly sampled
  reviews):
  - 42% contain no specific behavioral examples
  - 38% use vague language ("good communicator," "team
    player," "needs improvement")
  - 27% show rating inflation (rating doesn't match
    written narrative)
  - 22% contain potentially biased language
  - 15% are copy-pasted from previous year with minor edits
  - 8% are fewer than 100 words total
  - 68% of development sections say "continue doing what
    you're doing" or equivalent

  Manager population:
  - 250 managers total
  - 40% are first-time managers (promoted in last 2 years)
  - 65% have never received any review-writing training
  - Average manager tenure: 3.5 years
  - Departments: Claims (80), Underwriting (60), Sales
    (50), IT (30), Operations (20), Admin (10)
  - Manager engagement with HR processes: 2.8/5

  Constraints:
  - Budget: $150K
  - Timeline: Must be completed before next review cycle
    (5 months)
  - Managers cannot be out of role for more than 8 hours
    total for training
  - Must include certification (pass/fail assessment)
  - Technology: Company has LMS (Cornerstone), Zoom, and
    Microsoft Teams

  Task: Design the complete manager training program.
  Include: curriculum outline, training methodology,
  practice exercises with sample scenarios, certification
  assessment design, and ongoing reinforcement strategy.
  The program should directly address each audit finding.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive curriculum — addresses each audit finding with specific training modules (behavioral examples, precise language, rating-narrative alignment, bias awareness, development planning); the curriculum is structured logically (foundations → skills → practice → assessment); includes specific training content, not just module titles; the 8-hour time constraint is respected with a realistic schedule."
    weight: 0.35
    description: "ComprehensiveCurriculum"
  - type: llm_judge
    criteria: "Response includes practical exercises — provides specific practice scenarios where managers rewrite poor reviews, identify bias in sample reviews, calibrate ratings across employee profiles; exercises build on the audit findings (rewriting vague language, adding behavioral examples, writing genuine development plans); the exercises would develop actual skill, not just awareness; includes before/after examples."
    weight: 0.35
    description: "PracticalExercises"
  - type: llm_judge
    criteria: "Response addresses the $150K budget and scale realistically — the training methodology works for 250 managers within budget (blend of e-learning, live workshops, and peer practice); the certification assessment is practical and meaningful (not just a quiz); the ongoing reinforcement strategy sustains quality beyond initial training; addresses manager engagement concerns (2.8/5) with motivating, practical content."
    weight: 0.30
    description: "RealisticImplementation"
