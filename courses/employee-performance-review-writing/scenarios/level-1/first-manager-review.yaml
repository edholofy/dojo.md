meta:
  id: first-manager-review
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "First manager review — write a performance review as a first-time manager for a direct report"
  tags: [manager-review, first-time, direct-report, evaluation, beginner]

state: {}

trigger: |
  You're a Senior Software Engineer who was promoted to
  Engineering Manager 8 months ago. You now manage 4
  engineers. This is your first time writing performance
  reviews.

  You need to write a review for Alex, a mid-level software
  engineer (2.5 years at the company, 4 years total
  experience).

  Alex's performance this year:
  Strengths:
  - Shipped 3 major features on time (auth redesign, payment
    integration, notification system)
  - Code quality is excellent — PR review feedback consistently
    positive
  - Other team members frequently ask Alex for help
  - Volunteered to present at the company's internal tech talk
  - Took on mentoring a junior engineer informally

  Areas of concern:
  - Estimations are consistently optimistic (underestimates by
    30-50% regularly)
  - Avoids conflict in code reviews — approves PRs that should
    have more feedback
  - Missed 2 sprint commitments in Q3 (related to estimation
    issues)
  - Doesn't speak up in meetings even when they have strong
    opinions (you've confirmed in 1:1s they disagree with
    decisions but won't voice it publicly)

  Performance data:
  - Completed 89% of sprint commitments (team average: 92%)
  - 0 production incidents from Alex's code
  - Code review turnaround: 4 hours (team average: 8 hours)
  - Customer satisfaction for features: 4.2/5

  Rating scale: 1-5 (1=Does Not Meet, 2=Partially Meets,
  3=Meets Expectations, 4=Exceeds Expectations, 5=Exceptional)

  Task: Write Alex's performance review. Be balanced, specific,
  and actionable. Include a rating with justification.

assertions:
  - type: llm_judge
    criteria: "Response writes a balanced, specific review — acknowledges Alex's significant strengths (feature delivery, code quality, helping others) with concrete examples; addresses areas of concern honestly (estimation, conflict avoidance, speaking up) without being harsh; uses performance data to support observations; the review is evidence-based, not opinion-based; follows a clear structure."
    weight: 0.35
    description: "BalancedSpecificReview"
  - type: llm_judge
    criteria: "Response provides actionable development feedback — for each area of concern, suggests specific improvement actions (estimation techniques, code review assertiveness coaching, meeting participation strategies); the development areas are framed constructively (growth opportunities, not failures); includes specific, measurable goals for the next review period; the feedback would actually help Alex improve."
    weight: 0.35
    description: "ActionableFeedback"
  - type: llm_judge
    criteria: "Response assigns and justifies an appropriate rating — the rating reflects the overall balance of strong delivery with notable improvement areas (likely 3-3.5, 'Meets' to 'Meets+'); the justification is transparent (Alex would understand why they received this rating); the rating is calibrated fairly (not inflated despite being likeable, not deflated for improvement areas); the review would feel fair to Alex and defensible to HR."
    weight: 0.30
    description: "AppropriateRating"
