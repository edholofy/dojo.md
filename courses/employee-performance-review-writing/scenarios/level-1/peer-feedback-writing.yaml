meta:
  id: peer-feedback-writing
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "Peer feedback writing — write constructive peer feedback for a 360-degree review as a colleague"
  tags: [peer-feedback, 360-review, colleague, constructive, beginner]

state: {}

trigger: |
  You're a Product Designer at a 300-person fintech company.
  Your company uses 360-degree reviews, and you've been asked
  to write peer feedback for 3 colleagues you work with
  regularly.

  Peer feedback form format:
  - Strengths (what does this person do well?)
  - Areas for development (where could they improve?)
  - Collaboration rating: 1-5
  - Would you want to work with this person again? Yes/No
  - Additional comments

  Colleague 1 — Dana (Frontend Developer):
  You've worked with Dana on 3 projects this past year. Dana
  is technically excellent — their code is clean, they ship
  on time, and they proactively fix bugs they find. However,
  Dana is difficult to collaborate with. They dismiss design
  feedback, saying "that's not how the component library
  works," often implement designs differently than specified
  without discussing changes first, and once told you in a
  team meeting that your design was "overthinking it." You've
  noticed other designers avoid pairing with Dana.

  Colleague 2 — Marcus (Product Manager):
  Marcus is your PM on the core banking product. He's great
  at stakeholder management and always keeps the team
  informed about business context. He runs efficient meetings
  and makes clear decisions. However, Marcus tends to change
  requirements mid-sprint without acknowledging the impact on
  design and engineering. Last quarter, he changed the
  onboarding flow requirements 3 times, each time saying "the
  stakeholders want this" without pushing back. He also rarely
  asks for your input on prioritization decisions.

  Colleague 3 — Priya (UX Researcher):
  Priya is outstanding. Her research is thorough, she
  presents findings clearly, and she's made your design work
  significantly better. She ran 4 usability studies that
  directly improved your designs. She's also patient, always
  available for questions, and proactively shares relevant
  industry research. Your only concern is that Priya takes
  on too much work and seems stressed — she's missed 2
  deadlines this quarter and you've noticed she works late
  regularly.

  Task: Write the complete peer feedback for all 3 colleagues.
  Be honest, specific, and constructive. Remember this
  feedback will be shared with each person and their manager.

assertions:
  - type: llm_judge
    criteria: "Response writes honest, specific feedback for all 3 colleagues — Dana's feedback addresses the collaboration issues with specific examples (dismissing design feedback, implementing changes without discussion, the meeting comment) while acknowledging technical excellence; Marcus's feedback addresses requirement changes and lack of input-seeking with specific examples; Priya's feedback celebrates her contributions specifically while honestly raising the overwork/burnout concern; none of the feedback is vague or generic."
    weight: 0.35
    description: "HonestSpecific"
  - type: llm_judge
    criteria: "Response maintains appropriate tone for peer feedback — Dana's feedback is honest about collaboration issues without being personal or attacking; Marcus's feedback raises concerns constructively without undermining his authority; Priya's feedback raises the overwork concern with genuine care, not as a criticism; all feedback includes specific, actionable suggestions for improvement; the writer comes across as a thoughtful, fair colleague; collaboration ratings are justified and reasonable."
    weight: 0.35
    description: "AppropriateTone"
  - type: llm_judge
    criteria: "Response demonstrates peer feedback best practices — balances positive and constructive feedback for each person (even the difficult colleague gets genuine positives); uses specific examples rather than generalizations; the 'would you work with them again' answers are honest and nuanced; additional comments add value beyond the structured sections; the feedback would be useful to each person's manager in writing their review."
    weight: 0.30
    description: "FeedbackBestPractices"
