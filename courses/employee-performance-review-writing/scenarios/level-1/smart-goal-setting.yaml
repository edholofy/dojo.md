meta:
  id: smart-goal-setting
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "SMART goal setting — write SMART performance goals for a direct report's upcoming review period"
  tags: [smart-goals, goal-setting, development, measurable, beginner]

state: {}

trigger: |
  You're a Team Lead at a mid-size e-commerce company. Your
  direct report, Jamie, is a Customer Support Specialist who
  just completed their first year. During the annual review,
  you both agreed on several development areas.

  Jamie's current performance:
  - Average handle time: 8.5 minutes (team avg: 7 minutes)
  - Customer satisfaction: 4.1/5 (team avg: 4.3/5)
  - First-contact resolution: 72% (team avg: 78%)
  - Escalation rate: 18% (team avg: 12%)
  - Product knowledge quiz score: 68/100
  - Peer feedback: "Friendly and empathetic, but sometimes
    gives incorrect information and escalates too quickly"

  Jamie's strengths:
  - Empathy and rapport-building (customers frequently
    mention positive interactions)
  - Willingness to learn — asks lots of questions
  - Never missed a shift in 12 months
  - Volunteers for weekend coverage

  Development areas agreed upon:
  1. Improve product knowledge (especially the premium tier
     features and billing system)
  2. Reduce unnecessary escalations
  3. Improve first-contact resolution rate
  4. Develop ability to handle difficult/angry customers
     independently

  Task: Write 4 SMART goals for Jamie's next 6-month review
  period. Each goal should be Specific, Measurable,
  Achievable, Relevant, and Time-bound. Include milestones
  and support actions you'll provide as the manager.

assertions:
  - type: llm_judge
    criteria: "Response writes 4 goals that are genuinely SMART — each goal is Specific (clearly defines what Jamie will do), Measurable (has a quantifiable target or observable outcome), Achievable (targets are realistic given Jamie's current performance — not expecting perfection), Relevant (directly addresses the agreed development areas), and Time-bound (has clear deadlines or milestones within the 6-month period); the goals are not generic templates but tailored to Jamie's situation."
    weight: 0.35
    description: "GenuinelySMART"
  - type: llm_judge
    criteria: "Response includes meaningful milestones and manager support — each goal has interim checkpoints (not just a final deadline); includes specific support actions the manager will provide (training, shadowing, coaching, resources); the milestones create accountability without micromanaging; the support demonstrates the manager's commitment to Jamie's success."
    weight: 0.35
    description: "MilestonesAndSupport"
  - type: llm_judge
    criteria: "Response sets realistic, motivating targets — the numeric targets represent meaningful improvement without being discouraging (e.g., moving from 72% to 78% FCR, not 95%); the goals build on Jamie's existing strengths (empathy, willingness to learn); the overall goal set would feel achievable and motivating to Jamie, not punitive; the goals would genuinely help Jamie grow."
    weight: 0.30
    description: "RealisticMotivating"
