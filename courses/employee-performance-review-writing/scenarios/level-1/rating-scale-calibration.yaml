meta:
  id: rating-scale-calibration
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "Rating scale calibration — assign and justify appropriate performance ratings for employees using a standard 5-point scale"
  tags: [rating-scale, calibration, justification, consistency, beginner]

state: {}

trigger: |
  You're an HR Coordinator helping first-time managers
  understand how to use your company's 5-point rating scale
  consistently. You've been given 5 employee profiles and
  asked to assign ratings with detailed justifications that
  can serve as calibration examples for new managers.

  Rating scale:
  1 - Does Not Meet Expectations: Significant performance
      gaps; immediate improvement required
  2 - Partially Meets Expectations: Some goals met but
      notable gaps remain; development plan needed
  3 - Meets Expectations: Solid, reliable performance;
      consistently delivers on responsibilities
  4 - Exceeds Expectations: Frequently goes above and
      beyond; strong contributor with notable achievements
  5 - Exceptional: Truly outstanding; top 5-10% performer;
      consistently delivers extraordinary results

  Employee profiles:

  Employee A — Wei (Sales Representative, 3 years):
  - Hit 105% of annual quota
  - Won 2 new enterprise accounts (team target: 1)
  - Customer retention: 94% (team avg: 91%)
  - Missed Q2 target (78% of quarterly goal)
  - Received a formal complaint from a client about
    response time during Q2
  - Mentors 1 new hire informally

  Employee B — Aaliyah (Data Analyst, 1 year):
  - Completed all assigned analysis projects on time
  - Built an automated dashboard that saved the team
    10 hours/week
  - Learned Python independently to improve her work
  - No missed deadlines, no quality issues
  - Manager says: "Aaliyah is exactly what you want —
    reliable, growing, no drama"
  - Hasn't taken on cross-team projects yet

  Employee C — Derek (Account Manager, 5 years):
  - Revenue from his accounts: flat year-over-year
  - 3 of his 8 accounts reduced their spend
  - Received 2 client complaints about lack of proactive
    communication
  - Says he's "bored" and wants a promotion
  - Did complete required training on time
  - Attendance is perfect

  Employee D — Fatima (Operations Coordinator, 2 years):
  - Redesigned the inventory tracking process (reduced
    errors by 40%)
  - Led a cross-functional project with 3 departments
  - Received the quarterly "Impact Award" from leadership
  - Took on 2 additional responsibilities when a colleague
    went on leave
  - Had a conflict with a peer that escalated to HR
    (resolved through mediation)
  - Occasionally misses small administrative deadlines

  Employee E — Ryan (Software Developer, 4 years):
  - Code output: 30% below team average
  - 2 production incidents traced to his code
  - Received feedback about code quality in 3 consecutive
    sprints
  - Manager documented a verbal warning in Q3
  - Ryan says workload is too high and he needs support
  - Positive peer feedback about being helpful and
    collaborative

  Task: Assign a rating (1-5) to each employee with a
  detailed justification. For each, explain why you chose
  that rating over the adjacent ratings (e.g., why 3 and
  not 2 or 4). These justifications will be used as
  training examples for new managers.

assertions:
  - type: llm_judge
    criteria: "Response assigns defensible ratings for all 5 employees — ratings reflect the evidence provided (Wei likely 3-4, Aaliyah likely 3-4, Derek likely 2-3, Fatima likely 4, Ryan likely 1-2); each rating is justified with specific evidence from the profile; the ratings are not inflated or deflated; the response demonstrates understanding of what each rating level means."
    weight: 0.35
    description: "DefensibleRatings"
  - type: llm_judge
    criteria: "Response explains why each rating was chosen over adjacent ratings — for each employee, articulates why they didn't receive the rating above or below (e.g., 'Wei earns a 3 rather than 4 because despite hitting quota, the Q2 miss and client complaint show inconsistency'); this comparative analysis demonstrates calibration thinking; the explanations would help new managers understand the boundaries between rating levels."
    weight: 0.35
    description: "ComparativeAnalysis"
  - type: llm_judge
    criteria: "Response serves as an effective training tool — the justifications model evidence-based rating decisions; addresses common manager mistakes (rating inflation, penalizing one bad quarter, confusing activity with impact); the response acknowledges complexity (Ryan's workload concern, Fatima's HR conflict vs. overall excellence); would help new managers write more accurate, consistent ratings."
    weight: 0.30
    description: "TrainingEffectiveness"
