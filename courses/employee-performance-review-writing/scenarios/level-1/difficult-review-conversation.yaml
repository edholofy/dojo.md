meta:
  id: difficult-review-conversation
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "Difficult review conversation — prepare talking points and a script for delivering a below-expectations performance review"
  tags: [difficult-conversation, below-expectations, preparation, script, beginner]

state: {}

trigger: |
  You're a Regional Sales Manager at a commercial real
  estate firm. You need to deliver a performance review to
  Lisa, a Senior Sales Associate who has been with the
  company for 6 years. Lisa was previously a top performer
  but has had a notably poor year.

  Lisa's performance this year:
  - Revenue generated: $1.2M (target: $2.5M, team avg:
    $2.1M)
  - Deals closed: 4 (target: 10, team avg: 8)
  - Pipeline value: $800K (should be 3x quota = $7.5M)
  - Client meetings per month: 6 (standard: 15)
  - CRM updates: Consistently 2-3 weeks behind
  - Missed 3 quarterly business reviews without notice
  - Lost 2 existing clients who cited "lack of
    responsiveness"

  Context you know but Lisa hasn't discussed directly:
  - Lisa's spouse was diagnosed with a serious illness
    this year (you learned from a colleague, Lisa hasn't
    told you)
  - Lisa's biggest client (worth $600K annually) left the
    company entirely (not Lisa's fault — they went bankrupt)
  - The market has been soft — overall team revenue is down
    15% from last year

  Lisa's rating: 2 out of 5 (Partially Meets Expectations)

  Lisa's personality: She's proud of her track record, can
  become defensive when criticized, and has mentioned
  feeling "underappreciated" in past conversations.

  Task: Prepare your complete talking points and
  conversation script for delivering this review. Include
  how you'll open the conversation, deliver the rating,
  handle likely reactions, and close with next steps.

assertions:
  - type: llm_judge
    criteria: "Response prepares a thoughtful conversation structure — opens with empathy and respect for Lisa's tenure and track record; delivers the rating honestly with specific evidence; addresses the performance gaps factually without being harsh; acknowledges external factors (client bankruptcy, soft market) while still holding Lisa accountable for the controllable gaps (meeting frequency, CRM, missed QBRs); includes talking points, not just a script."
    weight: 0.35
    description: "ThoughtfulStructure"
  - type: llm_judge
    criteria: "Response handles the sensitive elements appropriately — does NOT bring up Lisa's spouse's illness since Lisa hasn't shared it (this is critical — bringing up secondhand personal information would be a serious violation of trust and potentially illegal); creates an opening for Lisa to share personal circumstances if she chooses; prepares for defensive reactions with specific de-escalation approaches; treats Lisa with dignity as a valued 6-year employee having a bad year."
    weight: 0.35
    description: "SensitiveHandling"
  - type: llm_judge
    criteria: "Response closes with constructive next steps — proposes a realistic improvement plan or support structure; offers resources (EAP, flexible arrangements, coaching) without being presumptuous; sets clear expectations for the next period; the conversation would leave Lisa feeling heard and supported even though the news is tough; the overall approach balances accountability with compassion."
    weight: 0.30
    description: "ConstructiveClose"
