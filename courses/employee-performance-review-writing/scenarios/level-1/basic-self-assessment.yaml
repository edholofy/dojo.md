meta:
  id: basic-self-assessment
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "Basic self-assessment — write a self-assessment for an annual performance review as an individual contributor"
  tags: [self-assessment, annual-review, individual-contributor, beginner]

state: {}

trigger: |
  You're a Marketing Coordinator at a mid-size B2B SaaS
  company (200 employees). It's annual review time, and your
  manager has asked you to write a self-assessment. You've
  been at the company for 14 months and this is your first
  review.

  Your accomplishments this year:
  - Managed social media accounts: grew LinkedIn followers
    from 2,400 to 5,800 (+142%)
  - Launched the company's first email newsletter (now has
    3,200 subscribers, 28% open rate)
  - Coordinated 4 webinars (average 120 attendees, up from
    45 when you started)
  - Created a content calendar system that the team now uses
  - Learned HubSpot on your own and became the team's go-to
    person
  - Missed a deadline on Q3 campaign materials (shipped 3 days
    late due to poor planning)
  - Struggled with the transition to a new design tool (Figma)
    and needed extra support

  Your goals for next year:
  - Take on more strategic work (not just execution)
  - Learn paid advertising (Google Ads, Meta Ads)
  - Get a professional certification (HubSpot or Google
    Analytics)

  Company review format:
  - Key accomplishments (what you achieved)
  - Areas for improvement (where you fell short)
  - Goals for next review period
  - Overall self-rating: 1-5 scale (1=Needs Improvement,
    3=Meets Expectations, 5=Exceptional)

  Task: Write the complete self-assessment. Be honest,
  specific, and evidence-based. Include a self-rating with
  justification.

assertions:
  - type: llm_judge
    criteria: "Response writes a specific, evidence-based self-assessment — accomplishments include quantifiable results (follower growth percentage, subscriber count, attendee increase); uses specific examples rather than vague claims; honestly addresses the deadline miss and Figma struggle without excessive self-deprecation; the self-assessment is the right length (not too brief, not a novel); follows the company's format."
    weight: 0.35
    description: "SpecificEvidence"
  - type: llm_judge
    criteria: "Response balances confidence with humility — celebrates accomplishments without arrogance; addresses areas for improvement honestly without undermining overall performance; the self-rating is reasonable and well-justified (likely 3.5-4 range given strong performance with one notable miss); the overall tone would impress a manager reviewing the self-assessment; shows self-awareness."
    weight: 0.35
    description: "BalancedTone"
  - type: llm_judge
    criteria: "Response includes thoughtful future goals — the goals for next year are specific and actionable (not just 'do better'); the goals build on current strengths while addressing gaps; the certification goal shows initiative; 'more strategic work' is articulated with examples of what that means; the goals would serve as a foundation for next year's review; the self-assessment would help the manager write a better review."
    weight: 0.30
    description: "ThoughtfulGoals"
