meta:
  id: constructive-feedback-writing
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "Constructive feedback writing — transform vague or harsh feedback into specific, actionable, and constructive review comments"
  tags: [constructive-feedback, rewriting, specific, actionable, beginner]

state: {}

trigger: |
  You're an HR Business Partner at a 500-person logistics
  company. It's review season, and several managers have
  submitted draft performance reviews with feedback that is
  either too vague, too harsh, or not actionable.

  Your task is to rewrite each piece of feedback to be
  specific, constructive, and actionable while preserving
  the core message.

  Original feedback from managers (rewrite each one):

  1. "Sarah is a great team player and always does good work."
     Context: Sarah is a Customer Success Manager who resolved
     147 tickets last quarter (team avg: 110), maintained a
     4.6/5 CSAT score, and created 3 new knowledge base
     articles that reduced repeat tickets by 18%.

  2. "Tom needs to get his act together. His attitude is
     terrible and he's dragging the team down."
     Context: Tom is a warehouse supervisor who has been late
     to 8 of his last 20 shifts, missed 2 safety briefings,
     and received 3 complaints from team members about
     dismissive responses. However, his team's throughput is
     12% above target when he's present.

  3. "Performance is satisfactory."
     Context: Priya is a Financial Analyst who delivered all
     quarterly reports on time, identified a $340K billing
     error that saved the company money, took on two
     additional client accounts, but struggled with the new
     forecasting software and needed significant help from
     colleagues.

  4. "Jordan is amazing!!! Best employee ever! Promote
     immediately!"
     Context: Jordan is a Marketing Associate (8 months in
     role) who launched 2 successful campaigns (15% above
     lead targets), has excellent design skills, but has
     missed 3 deadlines, doesn't attend optional team
     meetings, and hasn't completed required compliance
     training.

  5. "I don't really have any feedback. Everything is fine."
     Context: Maria is a Software Developer who completed 95%
     of sprint commitments, has zero production incidents, but
     hasn't taken on any stretch assignments, declined a
     mentoring opportunity, and her manager noticed she seems
     disengaged in team discussions.

  Task: Rewrite all 5 pieces of feedback. For each, provide
  the constructive version and briefly explain what was wrong
  with the original.

assertions:
  - type: llm_judge
    criteria: "Response rewrites all 5 feedback items with specific, evidence-based language — each rewrite references the concrete data provided (ticket counts, CSAT scores, throughput percentages, dollar amounts, deadline counts); replaces vague praise ('great', 'amazing') with specific observations; replaces harsh criticism ('get his act together') with professional, behavioral language; the rewrites are noticeably better than the originals."
    weight: 0.35
    description: "SpecificRewriting"
  - type: llm_judge
    criteria: "Response makes feedback actionable and balanced — each rewrite includes both strengths and development areas (even the positive ones identify growth opportunities); each development area suggests a concrete next step or improvement action; the feedback would help each employee understand exactly what to continue, start, or stop doing; criticism is framed constructively without being dishonest."
    weight: 0.35
    description: "ActionableBalanced"
  - type: llm_judge
    criteria: "Response explains what was wrong with each original — identifies the specific problem (vagueness, harshness, inflation, avoidance, lack of substance); the explanations would help managers write better feedback in the future; demonstrates understanding of performance review best practices; the overall response serves as a teaching tool for managers."
    weight: 0.30
    description: "EducationalExplanation"
