meta:
  id: first-review-shift
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "First review shift — navigate a review cycle where multiple complications arise simultaneously as a new manager"
  tags: [shift, first-review-cycle, complications, new-manager, beginner]

state: {}

trigger: |
  You're a newly promoted Engineering Manager (4 months in
  role) at a 200-person SaaS company. It's your first
  review cycle, and you manage a team of 5 engineers.
  Multiple complications have arisen simultaneously.

  Situation 1 — The Self-Rating Disagreement:
  Taylor (Senior Engineer) submitted a self-assessment
  rating themselves 5/5 (Exceptional). Your assessment is
  3/5 (Meets Expectations). Taylor's data: shipped 4
  features, no production incidents, mentored 1 junior.
  However, Taylor regularly misses sprint commitments,
  doesn't participate in code reviews (0 reviews given
  this quarter vs team avg of 15), and has caused friction
  by refusing to work on "boring" maintenance tasks.
  Taylor is well-connected in the company and has told
  other team members they expect a promotion.

  Situation 2 — The Quiet Contributor:
  Morgan (Mid-level Engineer) submitted a self-assessment
  rating themselves 2/5 (Partially Meets). Your assessment
  is 4/5 (Exceeds Expectations). Morgan's data: highest
  code quality scores on the team, volunteers for on-call,
  quietly fixed a critical database issue at 2 AM that
  saved a major client, but Morgan listed "failure to
  speak up in meetings" and "not innovative enough" as
  weaknesses. Morgan has imposter syndrome.

  Situation 3 — The Missing Data:
  Jordan (Junior Engineer, started 6 months ago) has no
  performance data because your predecessor (their former
  manager) kept no notes, no 1:1 records, and no goal
  documentation. Jordan seems solid but you have limited
  firsthand observations since you've only managed them
  for 4 months.

  Task: Write your approach for handling all 3 situations.
  For each, provide: your final rating with justification,
  key talking points for the review conversation, and how
  you'll handle the specific complication.

assertions:
  - type: llm_judge
    criteria: "Response handles the Taylor disagreement professionally — assigns a rating based on evidence (likely 3, addressing the gap between self-perception and reality); prepares talking points that acknowledge Taylor's strengths while clearly explaining the gaps (code reviews, sprint commitments, maintenance work); anticipates Taylor's likely defensive reaction and promotion expectations; doesn't cave to social pressure or inflate the rating."
    weight: 0.35
    description: "TaylorDisagreement"
  - type: llm_judge
    criteria: "Response handles the Morgan situation with emotional intelligence — corrects the self-underrating with specific evidence (database save, code quality, on-call volunteering); addresses imposter syndrome sensitively; uses the review as an opportunity to build Morgan's confidence; the talking points celebrate Morgan's contributions specifically; helps Morgan see their impact accurately."
    weight: 0.35
    description: "MorganImpostor"
  - type: llm_judge
    criteria: "Response handles the Jordan data gap responsibly — doesn't penalize Jordan for predecessor's poor documentation; develops a fair approach with available data (4 months of observation, code metrics, peer feedback); acknowledges the limitation transparently; sets up proper documentation for the next period; the rating is reasonable given limited data; demonstrates good management practices for inheriting a team."
    weight: 0.30
    description: "JordanDataGap"
