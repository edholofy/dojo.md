meta:
  id: pip-basics
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "PIP basics — write a basic performance improvement plan for an underperforming employee"
  tags: [pip, performance-improvement-plan, underperformance, documentation, beginner]

state: {}

trigger: |
  You're a Call Center Supervisor at a health insurance
  company. One of your team members, Carlos, has been
  underperforming for the past 3 months despite verbal
  coaching. HR has asked you to write a formal 60-day
  Performance Improvement Plan (PIP).

  Carlos's role: Customer Service Representative
  Tenure: 18 months (first 12 months were strong)

  Performance issues (last 3 months):
  - Average handle time: 14 minutes (standard: 8 minutes)
  - Calls per day: 28 (standard: 45)
  - Quality score: 62/100 (standard: 80/100, based on
    recorded call audits)
  - 4 customer complaints about being put on hold
    excessively
  - 2 instances of providing incorrect policy information
  - Attendance: 3 unexcused absences in 3 months
  - Missed 2 required training sessions

  Previous coaching:
  - Verbal feedback given on March 5 about handle time
  - Follow-up conversation on March 20 about quality scores
  - Informal check-in on April 2 — Carlos said he was
    "dealing with personal stuff" but didn't elaborate
  - Manager offered EAP (Employee Assistance Program)
    referral; Carlos declined

  Carlos's strengths (from first 12 months):
  - Strong product knowledge (scored 92/100 on initial
    certification)
  - Excellent customer rapport — 3 positive customer
    letters
  - Previously hit all performance standards

  Company PIP format:
  - Performance deficiencies (specific gaps with data)
  - Expected standards (clear targets)
  - Action plan (specific steps and support)
  - Timeline and check-ins
  - Consequences if standards not met

  Task: Write the complete 60-day PIP for Carlos. Be
  specific, fair, documented, and legally sound.

assertions:
  - type: llm_judge
    criteria: "Response writes a complete, well-structured PIP — identifies specific performance deficiencies with data (handle time, calls per day, quality score, attendance, complaints); sets clear, measurable expected standards for each area; the targets are realistic (improvement toward standard, not perfection by day 1); follows the company's required format; the document reads as a formal HR document."
    weight: 0.35
    description: "CompletePIP"
  - type: llm_judge
    criteria: "Response includes a genuine support plan — provides specific actions the company will take to help Carlos succeed (training, coaching, shadowing, call monitoring, weekly check-ins); the support is proportionate to the issues; acknowledges Carlos's previous strong performance and existing strengths; the PIP feels like a genuine attempt to help Carlos return to good performance, not just documentation for termination; includes interim milestones (30-day check-in)."
    weight: 0.35
    description: "GenuineSupport"
  - type: llm_judge
    criteria: "Response is legally sound and fair — documents prior coaching attempts; states consequences clearly but professionally (up to and including termination); doesn't make assumptions about Carlos's personal situation; notes the EAP referral without pressuring; the language is objective and behavioral (not judgmental); the PIP would be defensible if challenged; treats Carlos with dignity throughout."
    weight: 0.30
    description: "LegallySoundFair"
