meta:
  id: quarterly-check-in
  level: 1
  course: employee-performance-review-writing
  type: output
  description: "Quarterly check-in — write a mid-year quarterly performance check-in document for a direct report"
  tags: [quarterly-check-in, mid-year, continuous-feedback, progress, beginner]

state: {}

trigger: |
  You're a Design Lead at a consumer app company. It's the
  Q2 check-in (mid-year), and you need to write a quarterly
  performance check-in for Sam, a Visual Designer on your
  team.

  Sam's annual goals (set in January):
  1. Improve design system contribution — create at least
     15 new reusable components by year-end
  2. Reduce design-to-development handoff friction — achieve
     less than 5% revision rate on shipped designs
  3. Lead the redesign of the onboarding flow (major Q3
     project)
  4. Develop presentation skills — present at least 2 design
     reviews to stakeholders by year-end

  Q1-Q2 progress:
  - Created 8 design system components (on track for 15)
  - Revision rate: 12% (needs work — target is <5%)
  - Onboarding redesign: Completed research and wireframes,
    slightly ahead of schedule
  - Presentations: Gave 1 design review to the product team
    (went well, got positive feedback, but Sam was visibly
    nervous and skipped the Q&A portion)

  Additional observations:
  - Sam's Figma skills have improved significantly — other
    designers now ask Sam for help with complex prototyping
  - Sam struggles with ambiguity — when given open-ended
    briefs, Sam asks many clarifying questions and takes
    longer to start
  - Sam has been a great collaborator with engineering — the
    lead developer specifically praised Sam's annotation
    quality
  - Sam turned down an opportunity to join a cross-functional
    project committee, saying they wanted to "focus on core
    work"

  Company check-in format:
  - Progress against goals (on track / needs attention /
    off track for each)
  - Key wins this quarter
  - Development focus for next quarter
  - Any goal adjustments needed

  Task: Write Sam's Q2 quarterly check-in. Be specific,
  forward-looking, and actionable.

assertions:
  - type: llm_judge
    criteria: "Response accurately assesses progress against each goal — correctly identifies Goal 1 as on track (8/15 at midpoint), Goal 2 as needs attention (12% vs <5% target), Goal 3 as on track or ahead, Goal 4 as partially on track (1/2 but quality of presentation needs development); the assessment uses the specific data provided; each goal gets a clear status with supporting evidence."
    weight: 0.35
    description: "AccurateAssessment"
  - type: llm_judge
    criteria: "Response is forward-looking and actionable — for the revision rate issue, suggests specific actions to improve handoff quality; for the presentation skills goal, addresses both the nervousness and Q&A avoidance constructively; identifies the 'struggles with ambiguity' pattern as a development opportunity; the development focus for next quarter is specific and achievable; the check-in would genuinely help Sam improve in Q3-Q4."
    weight: 0.35
    description: "ForwardLooking"
  - type: llm_judge
    criteria: "Response captures the full picture — acknowledges Sam's wins (Figma expertise growth, engineering collaboration, onboarding project progress); addresses the cross-functional committee decline thoughtfully (is it a concern or a reasonable choice?); the tone is supportive and coaching-oriented, appropriate for a mid-year check-in; the document follows the company format; would serve as useful reference for the annual review."
    weight: 0.30
    description: "FullPicture"
