meta:
  id: review-cross-industry-research
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Cross-industry review research — conduct a landmark cross-industry study on performance review practices and their impact on organizational outcomes"
  tags: [cross-industry, research, landmark-study, outcomes, master]

state: {}

trigger: |
  You're the Research Director at a workforce analytics
  consortium funded by 40 major employers and 5 HR
  technology companies. Your consortium has access to the
  largest cross-industry performance review dataset ever
  assembled: 8 million reviews across 15 industries in 25
  countries, with matched 3-year outcome data (retention,
  promotion, compensation, engagement, productivity).

  Your board has commissioned a landmark study: "The State
  of Performance Reviews 2026 — What 8 Million Reviews Tell
  Us About How Organizations Evaluate People."

  Your analysis framework:

  1. Review system effectiveness by type:
     - Traditional annual reviews (5-point scale)
     - Continuous feedback (no annual review)
     - Hybrid models (continuous + periodic formal)
     - OKR-based reviews
     - Competency-based reviews
     - Narrative-only reviews (no ratings)
     - AI-augmented reviews

  2. Industry comparison:
     - Which industries have the best review practices?
     - Where are the biggest gaps between evidence and
       practice?
     - How do industry-specific methods compare (medical
       competencies, legal billable hours, tech coding
       metrics)?

  3. Bias analysis:
     - Which review methods produce the most equitable
       outcomes?
     - How does the number of raters affect bias?
     - Does structured review language reduce demographic
       disparities?
     - How do AI-augmented reviews compare on equity?

  4. Manager quality impact:
     - How much does manager skill affect review quality?
     - What training investments produce the biggest
       improvement?
     - Do calibration sessions actually improve consistency?
     - What's the optimal manager-to-employee ratio for
       effective reviews?

  5. Employee experience:
     - Does review experience correlate with engagement?
     - What review elements do employees value most?
     - How does review frequency affect satisfaction?
     - Do employees prefer ratings or narrative-only?

  6. Actionable findings:
     - What are the 10 highest-impact review improvements?
     - Can you create a universal review quality index?
     - What's the dollar value of improving review quality?
     - What's the minimum viable review system?

  Task: Write the comprehensive research report.

assertions:
  - type: llm_judge
    criteria: "Response writes a comprehensive research report — covers all 6 analysis areas with specific findings and data points; includes cross-industry comparisons with meaningful differences; the report reads like a genuine workforce analytics publication; data points are realistic and specific; the length and depth reflect a landmark annual report; includes methodology description."
    weight: 0.35
    description: "ComprehensiveReport"
  - type: llm_judge
    criteria: "Response provides actionable rankings and recommendations — the '10 highest-impact improvements' are specific, ranked, and evidence-based; the universal review quality index is well-designed with clear scoring methodology; the dollar value of improvement is calculated with credible methodology; the 'minimum viable review system' is provocative and useful; findings would be cited by CHROs making review strategy decisions."
    weight: 0.35
    description: "ActionableFindings"
  - type: llm_judge
    criteria: "Response demonstrates research rigor — acknowledges limitations and confounding variables; distinguishes correlation from causation; the AI analysis is nuanced (benefits AND risks); bias analysis uses appropriate methodological approaches; findings include surprises and counter-intuitive results; the report advances understanding beyond conventional wisdom about performance reviews."
    weight: 0.30
    description: "ResearchRigor"
