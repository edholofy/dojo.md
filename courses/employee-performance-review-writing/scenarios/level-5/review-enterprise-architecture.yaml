meta:
  id: review-enterprise-architecture
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Review enterprise architecture — design the performance management architecture for a 50,000-person conglomerate"
  tags: [enterprise-architecture, conglomerate, global-system, scale, master]

state: {}

trigger: |
  You're the Global CHRO of a 50,000-person diversified
  conglomerate with 12 business units across manufacturing,
  technology, healthcare, and financial services. The board
  has mandated the design of an integrated performance
  management architecture that serves the entire enterprise.

  Business units:
  1. Advanced Manufacturing (8,000 — factories in 6
     countries, unionized workforce)
  2. Enterprise Software (6,000 — tech talent, agile teams)
  3. Healthcare Devices (5,000 — FDA-regulated, clinical
     professionals)
  4. Commercial Banking (7,000 — highly regulated, formal
     culture)
  5. Insurance Operations (4,000 — actuaries, agents, claims)
  6. Consulting Services (5,000 — partners, associates,
     project-based)
  7. Retail Division (3,000 — hourly workers, seasonal)
  8. Logistics (3,000 — drivers, warehouse, operations)
  9. Digital Ventures (1,500 — startups, innovation lab)
  10. Shared Services (3,000 — HR, Finance, IT, Legal)
  11. R&D Labs (2,500 — scientists, researchers, PhDs)
  12. Real Estate (2,000 — property management, agents)

  Architecture requirements:
  - Common talent data model across all BUs
  - Consistent leadership evaluation at VP+ level
  - Business-unit-specific functional evaluation
  - Cross-BU talent mobility and comparison
  - Global analytics and reporting dashboard
  - Compliance with 25+ jurisdictions
  - Single technology platform (replacing 8 current systems)
  - Union compatibility for 3 unionized BUs
  - FDA/regulatory compliance for healthcare
  - Support for hourly, salaried, professional, and
    executive populations
  - Budget: $25M over 5 years
  - Must maintain operations during transition

  Additional complexity:
  - 3 BUs were acquired in the last 2 years (not integrated)
  - Leadership wants to identify top talent across BUs for
    conglomerate-level succession
  - Some BUs resist standardization ("manufacturing workers
    can't be evaluated like consultants")
  - Previous standardization attempt failed 3 years ago
    (too rigid, lacked BU buy-in)

  Task: Design the complete performance management
  architecture. Include: the talent data model, evaluation
  framework (universal + BU-specific layers), technology
  architecture, governance model, implementation roadmap,
  and change management strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a sophisticated multi-layer architecture — creates a universal core (common competencies, leadership framework, rating taxonomy) with business-unit-specific modules (manufacturing metrics differ from consulting metrics differ from R&D metrics); the architecture supports cross-BU comparison while respecting BU differences; the talent data model enables mobility and succession planning; the design is genuinely enterprise-scale."
    weight: 0.35
    description: "SophisticatedArchitecture"
  - type: llm_judge
    criteria: "Response addresses the diverse workforce populations — includes evaluation approaches for hourly workers, knowledge workers, scientists, sales professionals, executives, and unionized employees; the architecture doesn't force a one-size-fits-all approach; addresses FDA regulatory requirements for healthcare; the design acknowledges that each population needs different cadence, metrics, and processes."
    weight: 0.35
    description: "DiversePopulations"
  - type: llm_judge
    criteria: "Response provides a credible implementation roadmap — the 5-year/$25M plan is phased by BU group (not all-at-once); learns from the previous failed attempt (addresses BU buy-in explicitly); the technology consolidation from 8 systems is sequenced realistically; governance includes BU representation; the change management strategy addresses resistance from BUs who don't want standardization; the plan would survive board scrutiny."
    weight: 0.30
    description: "CredibleImplementation"
