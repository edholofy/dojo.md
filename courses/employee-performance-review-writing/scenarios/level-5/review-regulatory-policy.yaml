meta:
  id: review-regulatory-policy
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Review regulatory policy — draft model legislation governing fairness and transparency in workplace performance evaluations"
  tags: [regulatory, legislation, policy, transparency, master]

state: {}

trigger: |
  You're a policy advisor to the US Department of Labor,
  tasked with drafting a model "Fair Performance Evaluation
  Act" that states can adopt. The legislation responds to
  growing evidence that performance reviews are a primary
  mechanism for employment discrimination but are currently
  unregulated.

  Context driving the legislation:
  - EEOC reports that performance review-related complaints
    increased 340% in the last decade
  - Academic research shows performance reviews have poor
    predictive validity and significant bias
  - Multiple class-action lawsuits have exposed systematic
    bias in review systems
  - AI-powered review tools are proliferating without
    regulation
  - Pay transparency laws have exposed review-driven pay
    inequities
  - No federal or state law currently regulates how
    employers conduct performance evaluations

  Constituencies to balance:
  - Employers: Need flexibility to manage performance;
    concerned about compliance burden
  - Employees: Want transparency, fairness, and protection
    from bias
  - HR professionals: Want clear standards but not
    prescriptive mandates
  - Employment attorneys (plaintiff): Want accountability
    and transparency
  - Employment attorneys (defense): Want clear safe harbors
  - Civil rights organizations: Want strong protections
    against discriminatory reviews
  - Small business: Concerned about compliance costs
  - Technology companies: Building AI review tools, want
    innovation-friendly regulation

  Key legislative questions:
  1. Should employers be required to use structured,
     validated rating instruments?
  2. Should employees have the right to access their
     review data (and comparison data)?
  3. Should AI-powered review tools require algorithmic
     auditing?
  4. Should employers be required to conduct bias audits
     of review outcomes?
  5. What remedies should employees have for unfair reviews?
  6. Should there be small business exemptions?

  Task: Draft the model legislation with explanatory
  commentary. Include: definitions, employer requirements,
  employee rights, AI provisions, enforcement mechanisms,
  exemptions, and implementation timeline.

assertions:
  - type: llm_judge
    criteria: "Response drafts substantive model legislation — includes clear definitions, specific employer obligations, measurable compliance standards, and enforcement mechanisms; the legislation reads like actual model legislation (proper legal structure and language); addresses all 6 key legislative questions with specific provisions; includes implementation timeline with phase-in periods."
    weight: 0.35
    description: "SubstantiveLegislation"
  - type: llm_judge
    criteria: "Response balances competing constituencies — employer flexibility is preserved where possible; employee protections are meaningful; small business exemptions are reasonable; AI provisions encourage innovation while preventing harm; the legislation creates clear safe harbors for compliant employers; the balance would make the legislation politically viable for adoption."
    weight: 0.35
    description: "ConstituencyBalance"
  - type: llm_judge
    criteria: "Response includes thoughtful explanatory commentary — explains the rationale for each provision; acknowledges implementation challenges; discusses likely objections and how the legislation addresses them; the commentary demonstrates deep understanding of employment law, performance management, and regulatory design; the AI provisions reflect current understanding of algorithmic bias and accountability."
    weight: 0.30
    description: "ThoughtfulCommentary"
