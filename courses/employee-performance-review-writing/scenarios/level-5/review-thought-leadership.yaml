meta:
  id: review-thought-leadership
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Review thought leadership — write a landmark article arguing for the fundamental reinvention of performance reviews"
  tags: [thought-leadership, reinvention, future-of-work, paradigm-shift, master]

state: {}

trigger: |
  You're a globally recognized organizational psychologist
  and former CHRO of two Fortune 100 companies. Harvard
  Business Review has commissioned you to write a 5,000-word
  feature article titled "The Performance Review Is Dead.
  What Comes Next?"

  Your thesis: The performance review as currently practiced
  is fundamentally broken — not fixable with incremental
  improvements. The entire paradigm of periodic, evaluative,
  manager-driven assessment needs to be replaced with
  something new.

  Arguments to develop:

  1. The historical argument: Performance reviews were
     designed in the 1950s-60s for a manufacturing economy
     with stable roles, clear hierarchies, and predictable
     work. The modern knowledge economy has none of these.

  2. The evidence argument: Decades of I-O psychology
     research show traditional reviews have poor predictive
     validity, are riddled with cognitive bias, and often
     decrease rather than increase performance.

  3. The cultural argument: Performance reviews reinforce
     power dynamics, create adversarial relationships, and
     undermine the psychological safety needed for
     innovation and growth.

  4. The technology argument: AI and analytics can now
     capture performance signals continuously, making
     periodic evaluation obsolete — but this creates new
     risks (surveillance, algorithmic bias).

  5. The generational argument: Younger workers expect
     real-time feedback, coaching relationships, and
     purpose-driven work — not annual paperwork rituals.

  6. The alternative: What replaces the performance review?
     Propose a new model based on your experience and
     research.

  Requirements:
  - Must be intellectually rigorous (cite research, even
    if simulated)
  - Must acknowledge counterarguments (some companies have
    improved traditional reviews successfully)
  - Must include a practical framework, not just criticism
  - Must be provocative enough for HBR but credible enough
    for practitioners
  - Must address: "If we eliminate reviews, how do we make
    compensation decisions, manage underperformance, and
    document for legal purposes?"

  Task: Write the complete HBR article.

assertions:
  - type: llm_judge
    criteria: "Response writes a compelling, intellectually rigorous article — develops all 5 arguments with depth and evidence; the writing quality is HBR-caliber (clear, insightful, well-structured); includes realistic research citations or frameworks; the article is provocative without being dismissive of current practitioners; the length and depth reflect a major feature article."
    weight: 0.35
    description: "IntellectualRigor"
  - type: llm_judge
    criteria: "Response proposes a credible alternative model — the 'what comes next' section presents a practical, implementable framework; addresses the hard questions (compensation, underperformance management, legal documentation) specifically; the alternative acknowledges trade-offs and implementation challenges; the model is grounded in both research and practical experience; the alternative would interest CHROs and CEOs."
    weight: 0.35
    description: "CredibleAlternative"
  - type: llm_judge
    criteria: "Response acknowledges counterarguments and nuance — recognizes that some companies have improved traditional reviews; addresses the risk of eliminating structure entirely; acknowledges that continuous feedback without formal documentation creates legal risk; the article doesn't strawman the current system; the overall argument is persuasive because it's fair-minded; the piece advances the conversation beyond simple 'reviews are broken' critique."
    weight: 0.30
    description: "NuancedArgument"
