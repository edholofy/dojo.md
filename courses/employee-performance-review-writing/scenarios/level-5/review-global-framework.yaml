meta:
  id: review-global-framework
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Global review framework — design a universal performance evaluation framework for a 100,000-person multinational that respects cultural, legal, and business diversity"
  tags: [global-framework, multinational, universal, 100k-scale, master]

state: {}

trigger: |
  You're the Global CHRO of a 100,000-person multinational
  conglomerate headquartered in Singapore. The company
  operates in 40 countries across every major industry.
  The board has mandated the creation of a unified
  performance evaluation framework — the company's first-
  ever global standard.

  Scale and complexity:
  - 100,000 employees across 40 countries
  - 15 business divisions (tech, manufacturing, services,
    finance, healthcare, energy)
  - 200+ distinct job families
  - 8 languages for review documentation
  - 12 different legal frameworks governing reviews
  - 25 unions and works councils with co-determination
    rights
  - Employees range from factory workers to PhD researchers
    to investment bankers

  Current chaos:
  - 23 different review systems in use
  - Rating scales range from 3-point to 10-point
  - Some divisions use forced ranking, others no ratings
  - Review cadence varies from monthly to annual
  - No cross-division talent comparison possible
  - Technology: 14 different HRIS/performance tools
  - Total annual cost of current systems: $45M
  - No global analytics capability

  Strategic imperatives:
  - Enable cross-division, cross-country talent mobility
  - Identify top 1% of talent for leadership acceleration
  - Create consistent documentation for global compliance
  - Reduce total cost of performance management by 30%
  - Improve employee experience with reviews (current
    global satisfaction: 2.4/5)
  - Support upcoming IPO (need demonstrable governance)

  Constraints:
  - Budget: $60M over 5 years
  - Must maintain local compliance in all 40 countries
  - Must negotiate with 25 unions/works councils
  - Cannot disrupt operations during transition
  - IPO timeline: 24 months — governance framework must
    be demonstrable by then
  - CEO: "I want simplicity at scale. Not bureaucracy."

  Task: Design the complete global performance evaluation
  framework and implementation strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a framework that achieves simplicity at genuine scale — creates a universal core that works across 200+ job families, 40 countries, and 15 divisions; the framework is layered (global core + regional adaptation + division specialization); enables cross-unit talent comparison through a common taxonomy; the design would actually work at 100,000-person scale; addresses the 8-language documentation requirement."
    weight: 0.35
    description: "SimplicityAtScale"
  - type: llm_judge
    criteria: "Response provides a credible implementation strategy — consolidation from 23 systems to a unified approach is phased over 5 years; the $60M budget is allocated across technology, change management, legal consultation, and training; the 24-month IPO timeline is addressed with governance milestones; the 30% cost reduction target is achievable; union/works council negotiation strategy is realistic."
    weight: 0.35
    description: "CredibleImplementation"
  - type: llm_judge
    criteria: "Response addresses the governance and compliance complexity — covers legal requirements across 40 countries; works council co-determination is respected; the framework supports IPO-ready governance documentation; global analytics capability is designed; the approach would satisfy board expectations and IPO auditors; the framework represents genuine thought leadership at the intersection of performance management and global governance."
    weight: 0.30
    description: "GovernanceComplexity"
