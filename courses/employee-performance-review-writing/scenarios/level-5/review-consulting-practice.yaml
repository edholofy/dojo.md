meta:
  id: review-consulting-practice
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Review consulting practice — launch a boutique consulting firm specializing in performance review transformation"
  tags: [consulting, practice-launch, methodology, business-model, master]

state: {}

trigger: |
  You're a former SVP of People Operations at a Fortune 50
  company with 20 years of experience in performance
  management. You're launching a boutique consulting firm
  called "Performance Reimagined" specializing in helping
  organizations transform their performance review systems.

  Your differentiation: Most consultants sell software or
  generic frameworks. You combine organizational psychology,
  employment law, data analytics, and change management
  into a comprehensive transformation methodology.

  Business plan requirements:

  1. Service offerings (tiered):
     - Diagnostic assessment (entry point)
     - System redesign (core offering)
     - Implementation support
     - Manager training and certification
     - Ongoing analytics and optimization
     - Expert witness services for employment litigation

  2. Proprietary methodology:
     - Create a 5-phase transformation framework with a
       compelling name
     - Each phase should include specific deliverables,
       tools, and timelines
     - The methodology should be IP-protectable and
       differentiating

  3. Target market:
     - Companies 500-10,000 employees
     - Industries: technology, professional services,
       healthcare, financial services
     - Buyer personas: CHRO, VP HR, CEO (for smaller cos)
     - Engagement triggers: litigation, failed audit,
       M&A integration, employee survey results

  4. Pricing model:
     - Diagnostic: fixed fee
     - Redesign: project-based
     - Implementation: retainer
     - Training: per-person
     - Expert witness: hourly

  5. Go-to-market strategy:
     - How do you generate demand?
     - What's your content strategy?
     - How do you build credibility quickly?

  6. First-year financial projections:
     - Revenue targets by service line
     - Team requirements
     - Break-even analysis

  Task: Write the complete business plan for Performance
  Reimagined.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling consulting methodology — the 5-phase framework has a memorable name and logical progression; each phase has specific deliverables and tools; the methodology is differentiated from generic consulting approaches; the IP is protectable (unique framework, proprietary assessments, branded tools); the methodology would genuinely help clients transform their review systems."
    weight: 0.35
    description: "CompellingMethodology"
  - type: llm_judge
    criteria: "Response includes a viable business model — pricing is realistic for the target market ($500-10K employees); revenue projections are grounded in achievable engagement counts; team requirements are practical for a boutique launch; the service tiers create a natural client journey; the expert witness service adds a unique revenue stream; the break-even analysis is credible."
    weight: 0.35
    description: "ViableBusinessModel"
  - type: llm_judge
    criteria: "Response provides a practical go-to-market strategy — demand generation leverages the founder's expertise (speaking, publishing, LinkedIn); content strategy positions the firm as thought leaders; the engagement triggers are specific and actionable for business development; the plan builds credibility through specific channels; the first-year plan is achievable for a solo founder with limited resources."
    weight: 0.30
    description: "GoToMarketStrategy"
