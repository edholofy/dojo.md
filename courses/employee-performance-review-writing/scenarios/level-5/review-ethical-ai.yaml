meta:
  id: review-ethical-ai
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Review ethical AI — develop an ethical framework for AI-powered performance evaluation that becomes the industry standard"
  tags: [ethical-ai, framework, industry-standard, responsible-ai, master]

state: {}

trigger: |
  You're the Chief Ethics Officer at the world's largest
  HR technology company, which sells AI-powered performance
  management tools to 5,000 organizations covering 30
  million employees globally. Growing concerns about AI
  bias in performance reviews have led to regulatory
  scrutiny, customer demands for transparency, and media
  attention.

  Your CEO has asked you to develop a comprehensive ethical
  AI framework for performance evaluation that will become
  the industry standard — both governing your own products
  and proposed as a voluntary framework for the entire HR
  tech industry.

  Current AI capabilities in your product:
  1. Performance prediction: ML models predict employee
     performance based on behavioral data
  2. Rating suggestion: AI recommends ratings based on
     quantitative metrics
  3. Language analysis: NLP analyzes review text for bias,
     specificity, and sentiment
  4. Calibration automation: AI identifies rating
     inconsistencies and suggests adjustments
  5. Flight risk prediction: Models predict turnover risk
     from review patterns
  6. Promotion readiness: AI assesses readiness for next-
     level roles
  7. Goal recommendation: AI suggests goals based on
     performance gaps
  8. Coaching prompts: AI generates coaching questions for
     manager 1:1s

  Ethical concerns documented:
  - Your performance prediction model is 15% less accurate
    for Black employees than white employees
  - Rating suggestions correlate with historical bias
    (perpetuating past discrimination)
  - Language analysis flags "assertive" in women's reviews
    but not men's (false positive bias in bias detection)
  - Calibration automation produces different outcomes for
    same-performance employees depending on team composition
  - Flight risk model uses proxy variables correlated with
    race (zip code, commute distance)
  - Promotion readiness model was trained on historical
    promotions (biased data)
  - Customers use your tools in ways you didn't intend
    (using coaching prompts for discipline documentation)
  - 3 customers have been sued, with your AI tools named
    as contributing to discriminatory outcomes

  Regulatory landscape:
  - EU AI Act classifies employment AI as "high-risk"
  - NYC Local Law 144 requires algorithmic hiring audits
  - Illinois BIPA restricts biometric data in reviews
  - California proposed AI accountability act
  - EEOC issued guidance on AI and employment discrimination
  - Multiple state AG investigations into HR AI tools

  Task: Develop the comprehensive ethical AI framework for
  performance evaluation. Include: principles, technical
  standards, audit methodology, customer guidelines,
  regulatory compliance, and industry governance proposal.

assertions:
  - type: llm_judge
    criteria: "Response develops a rigorous ethical framework — establishes clear principles for AI in performance evaluation; includes specific technical standards for bias testing, accuracy requirements, and fairness metrics; the audit methodology is detailed enough to be actionable; addresses each of the 8 AI capabilities with specific ethical guidelines; the framework goes beyond generic AI ethics to performance-evaluation-specific concerns."
    weight: 0.35
    description: "RigorousFramework"
  - type: llm_judge
    criteria: "Response addresses the documented ethical concerns honestly — proposes specific fixes for the 15% accuracy gap, historical bias perpetuation, false positive bias detection, proxy variable usage, and biased training data; doesn't just acknowledge problems but proposes technical and process solutions; addresses customer misuse with contractual and product design interventions; confronts the 3 lawsuits directly."
    weight: 0.35
    description: "HonestConcernAddressing"
  - type: llm_judge
    criteria: "Response includes a credible industry governance proposal — proposes a governance structure (consortium, standards body, or certification program); the regulatory compliance approach addresses EU AI Act, NYC Local Law 144, and emerging regulations specifically; the framework would be adoptable by competitors; balances innovation with responsibility; the overall contribution would position the company as an ethical leader while raising the bar for the entire industry."
    weight: 0.30
    description: "IndustryGovernance"
