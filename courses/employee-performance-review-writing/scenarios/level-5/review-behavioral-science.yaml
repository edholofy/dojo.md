meta:
  id: review-behavioral-science
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Review behavioral science — apply cognitive and behavioral science to redesign performance reviews that actually change behavior"
  tags: [behavioral-science, cognitive-psychology, nudges, behavior-change, master]

state: {}

trigger: |
  You're a Professor of Organizational Behavior at a top
  business school and the world's leading researcher on the
  psychology of performance evaluation. A major consulting
  firm has commissioned you to write a research-backed
  guide titled "The Science of Better Reviews: How
  Cognitive Psychology Can Transform Performance Management."

  Your guide must cover:

  1. Why reviews fail psychologically:
     - Cognitive biases in evaluation (anchoring, contrast
       effects, attribution errors, fundamental attribution
       error, actor-observer asymmetry)
     - Memory distortions in retrospective assessment
     - Emotional contamination of rational judgment
     - The "telling-listening" asymmetry (feedback givers
       overestimate impact; receivers defensively filter)
     - Threat response: Reviews activate the brain's threat
       circuitry, reducing learning capacity

  2. The neuroscience of feedback:
     - How the brain processes positive vs. negative
       feedback differently
     - The role of dopamine in motivation and learning
     - Why annual feedback timing is neurologically
       suboptimal
     - Growth mindset vs. fixed mindset in review context
     - The cortisol response to evaluative situations

  3. Behavioral nudges for better reviews:
     - Choice architecture for rating scales
     - Default effects in review templates
     - Commitment devices for development plans
     - Social proof in calibration sessions
     - Temporal framing effects on goal-setting

  4. Redesigned review elements:
     - A debiased rating instrument
     - A feedback delivery framework based on motivational
       interviewing principles
     - A self-assessment approach that overcomes Dunning-
       Kruger and imposter syndrome simultaneously
     - A goal-setting framework informed by implementation
       intentions

  5. Evidence-based interventions:
     - What the research actually shows works
     - What's popular but unsupported by evidence
     - Common "best practices" that are actually harmful
     - The minimum viable review system (what can you
       remove without losing effectiveness?)

  Task: Write the complete research guide with specific,
  implementable recommendations for each section.

assertions:
  - type: llm_judge
    criteria: "Response demonstrates deep psychological knowledge — accurately describes cognitive biases with performance review examples; the neuroscience section is grounded in real phenomena (threat response, dopamine, cortisol); behavioral nudges are correctly applied (not just buzzwords); the guide demonstrates genuine expertise in I-O psychology and behavioral science; concepts are explained clearly enough for practitioners."
    weight: 0.35
    description: "PsychologicalDepth"
  - type: llm_judge
    criteria: "Response provides implementable redesigned elements — the debiased rating instrument is specific enough to use; the feedback delivery framework provides actual steps and scripts; the self-assessment approach addresses both overconfidence and underconfidence with concrete mechanisms; the goal-setting framework uses implementation intentions correctly; each redesigned element bridges theory and practice."
    weight: 0.35
    description: "ImplementableDesigns"
  - type: llm_judge
    criteria: "Response includes evidence-based critique — identifies popular practices that lack evidence (or that evidence contradicts); the 'minimum viable review system' challenges conventional complexity; distinguishes between what research shows and what practitioners believe; the guide would change how a thoughtful CHRO designs their review system; the overall contribution advances understanding beyond conventional wisdom."
    weight: 0.30
    description: "EvidenceBasedCritique"
