meta:
  id: review-cultural-transformation
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Review cultural transformation — use performance review reform as the lever for fundamental organizational culture change"
  tags: [cultural-transformation, organizational-change, culture-reform, paradigm, master]

state: {}

trigger: |
  You're a legendary organizational development consultant
  hired by a 20,000-person defense contractor to
  fundamentally transform its culture. The company's
  culture has been described as "toxic" in a congressional
  report, and the Department of Defense has threatened to
  revoke contracts unless the culture changes.

  Congressional report findings:
  - "Culture of fear" where employees are afraid to report
    safety concerns
  - Performance reviews used as weapons — managers
    retaliate against employees who raise concerns
  - 78% of employees say they've witnessed ethical
    violations but didn't report them
  - Women represent 28% of employees but only 8% of
    executive leadership
  - "Old boys' network" determines promotions, not merit
  - Performance reviews praised "loyalty" and "toughness"
    while penalizing "questioning" and "caution"
  - 3 major safety incidents in 2 years linked to
    employees who were afraid to speak up
  - Whistleblowers received negative reviews within 6
    months of reporting (100% of cases examined)

  Your assessment of the root cause:
  The performance review system is both a symptom and a
  cause of the toxic culture. Reviews reinforce the wrong
  behaviors (obedience over integrity, speed over safety,
  loyalty over excellence). Changing the review system
  alone won't fix the culture, but the culture can't
  change without fundamentally changing how performance
  is defined, measured, and rewarded.

  Your mandate:
  - Use performance review reform as the primary lever for
    culture transformation
  - The transformation must be visible enough to satisfy
    DoD and Congress
  - Must retain technical talent (the work is specialized)
  - Must change leadership behavior, not just employee
    behavior
  - Budget: $10M over 3 years
  - Timeline: Meaningful progress demonstrated within 12
    months for DoD contract review

  Resistance you'll face:
  - 20+ year veteran managers who "know how things work"
  - Union leadership that sees review changes as management
    manipulation
  - Executive team members who benefited from the old
    culture
  - Employees who are cynical about change ("we've seen
    this before")
  - Security clearance constraints that limit transparency

  Task: Design the comprehensive culture transformation
  plan using performance review reform as the central
  mechanism. Include the new performance framework, culture
  metrics, leadership accountability system, change
  management strategy, and timeline.

assertions:
  - type: llm_judge
    criteria: "Response designs a performance framework that drives culture change — redefines 'performance' to include ethical behavior, safety advocacy, and psychological safety contribution; removes 'loyalty' and 'toughness' as valued traits and replaces with integrity and courage; creates specific review criteria that reward speaking up and reporting concerns; the framework makes the desired culture behaviors measurable and evaluable."
    weight: 0.35
    description: "CultureDrivingFramework"
  - type: llm_judge
    criteria: "Response addresses leadership accountability specifically — holds executives and managers to higher behavioral standards; addresses the whistleblower retaliation pattern with specific protections and consequences; creates mechanisms to detect and prevent review-based retaliation; the plan addresses the 'old boys' network' promotion pattern; leadership accountability is enforced, not voluntary."
    weight: 0.35
    description: "LeadershipAccountability"
  - type: llm_judge
    criteria: "Response provides a realistic change management strategy — addresses cynicism from employees who've 'seen this before'; works with (not against) union leadership; manages veteran managers who resist change; accounts for security clearance constraints; the 12-month timeline shows meaningful progress for DoD review; the $10M budget is allocated across 3 years with clear priorities; the strategy acknowledges that culture change is slow but creates visible early wins."
    weight: 0.30
    description: "RealisticChangeManagement"
