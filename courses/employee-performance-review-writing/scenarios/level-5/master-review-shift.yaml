meta:
  id: master-review-shift
  level: 5
  course: employee-performance-review-writing
  type: output
  description: "Master review shift — navigate a scenario where a company's performance review practices become the center of a federal investigation and industry reckoning"
  tags: [shift, federal-investigation, industry-reckoning, systemic-reform, master]

state: {}

trigger: |
  You're the Chief People Officer of a Fortune 100
  technology company (80,000 employees, $120B market cap).
  A former HR director has become a federal whistleblower,
  providing the EEOC, DOJ, and SEC with 7 years of internal
  data showing systematic manipulation of performance
  reviews.

  The whistleblower's evidence:

  1. Rating manipulation: Internal emails show business
     unit heads routinely overrode manager ratings to fit
     budget constraints. "High performer" ratings were
     capped to control merit increase costs, regardless
     of actual performance. 12,000 employees affected
     annually.

  2. Demographic steering: Analysis shows managers were
     coached to rate diverse employees "Meets Expectations"
     to avoid the documentation burden of higher ratings
     triggering promotion discussions. Internal memo:
     "Keep it simple — 3s don't need justification."

  3. Retaliation documentation: 47 employees who filed HR
     complaints received lower performance ratings within
     2 review cycles. Statistical analysis shows this is
     not random — p<0.001.

  4. Review data monetization: The company sold anonymized
     (but re-identifiable) performance review data to 3
     workforce analytics companies. 8 million employee
     reviews were monetized without employee consent.

  5. AI bias concealment: The company's AI review tool
     (used by 15,000 managers) was known internally to
     produce biased rating suggestions for employees with
     non-English names. The finding was suppressed to
     avoid delaying the product launch.

  6. Executive exemption: C-suite and VP-level executives
     were exempt from the performance review system
     entirely. No documentation, no ratings, no
     accountability. When asked by the board, HR reported
     that "all employees undergo annual performance
     evaluation."

  7. Accommodation discrimination: Employees who requested
     ADA accommodations were flagged in the HRIS with a
     code that managers could see. Analysis shows flagged
     employees received ratings 0.6 points lower on
     average.

  Simultaneous pressures:
  - EEOC pattern-or-practice investigation (demographic
    steering, retaliation, ADA discrimination)
  - DOJ investigation (data monetization, potential wire
    fraud)
  - SEC investigation (material misrepresentation to board
    about executive reviews, ESG reporting accuracy)
  - Congressional hearing scheduled in 6 weeks
  - 3 class-action lawsuits (12,000 affected employees,
    ADA violation class, retaliation class)
  - Employee walkout by 5,000 employees demanding reform
  - Stock dropped 18% on the news
  - 4 board members have called for CEO resignation
  - Major customers (3 Fortune 500 companies) have
    suspended contracts pending investigation

  Task: Create the complete crisis response — congressional
  testimony preparation, immediate remediation (30 days),
  systemic reform (18 months), internal communication to
  80,000 employees, and board presentation.

assertions:
  - type: llm_judge
    criteria: "Response creates credible congressional testimony — acknowledges failures without creating additional legal liability across 3 federal investigations; addresses each of the 7 findings honestly; demonstrates accountability and concrete action; the testimony is prepared for hostile questioning; distinguishes between company-level responsibility and individual accountability; reflects understanding of how congressional hearings work."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "Response provides comprehensive remediation — 30-day plan addresses immediate risks (rating manipulation halt, AI tool suspension, HRIS flag removal, data monetization cessation, retaliation investigation, accommodation review, executive review implementation); 18-month reform plan addresses systemic root causes; both plans are specific enough to be verifiable by investigators; addresses all 7 findings with dedicated remediation."
    weight: 0.35
    description: "ComprehensiveRemediation"
  - type: llm_judge
    criteria: "Response navigates the multi-stakeholder crisis — employee communication to 80,000 addresses the walkout honestly; board presentation covers legal exposure, financial impact, and leadership accountability; the response balances legal caution with moral accountability; addresses the whistleblower's treatment (retaliation finding is legally dangerous); the overall response demonstrates courage to propose real change while managing existential legal and business risks."
    weight: 0.30
    description: "CrisisNavigation"
