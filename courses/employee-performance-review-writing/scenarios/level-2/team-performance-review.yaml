meta:
  id: team-performance-review
  level: 2
  course: employee-performance-review-writing
  type: output
  description: "Team performance review — write a team-level performance review for a cross-functional project team"
  tags: [team-review, project-based, cross-functional, collective, intermediate]

state: {}

trigger: |
  You're the VP of Engineering at a fintech company. The
  company has asked all department heads to write team-level
  performance reviews for major cross-functional projects
  completed this year. You need to review the "Project
  Phoenix" team — a 6-month initiative to rebuild the
  payment processing system.

  Project Phoenix outcomes:
  - Delivered 2 weeks late (original deadline: June 30,
    actual: July 14)
  - Budget: $1.8M spent of $1.5M budget (20% over)
  - Payment processing speed: improved from 3.2s to 0.8s
    (75% improvement)
  - Error rate: reduced from 2.1% to 0.3% (86% reduction)
  - Revenue impact: estimated $4.2M annual increase from
    reduced cart abandonment
  - System uptime since launch: 99.99%
  - Zero data breaches during migration of 2.3M customer
    records

  Team members and contributions:

  Rachel (Tech Lead — Engineering):
  - Architected the new system, made key technology decisions
  - Worked 70+ hour weeks during crunch periods
  - Excellent technical decisions, but poor at communicating
    timeline risks early — the 2-week delay surprised
    leadership
  - Conflict with the PM over scope changes

  David (Product Manager):
  - Managed stakeholder expectations effectively
  - Clear requirements documentation
  - Added 3 features mid-project that contributed to the
    delay and budget overrun (stakeholders requested them)
  - Should have pushed back on scope creep but didn't

  Anika (QA Lead):
  - Built comprehensive test automation (400+ test cases)
  - Caught a critical security vulnerability before launch
  - The zero-defect launch is largely attributed to Anika
  - Stayed late every day for the last 2 months

  Marcus (DevOps Engineer):
  - Designed the migration strategy for 2.3M records
  - Zero-downtime deployment
  - Proactive monitoring setup caught 3 issues before
    customers were affected
  - Quiet contributor — rarely spoke in meetings but
    delivered flawlessly

  Lisa (UX Designer):
  - Redesigned the checkout flow (contributed to cart
    abandonment reduction)
  - Conducted 12 user tests during development
  - Frequently clashed with Rachel over implementation
    constraints vs. design ideals
  - Left the project 3 weeks before launch due to a new
    role (team had to finish without dedicated design
    support)

  Task: Write the team performance review covering overall
  project assessment, individual contribution highlights,
  team dynamics analysis, and lessons learned. The review
  should be useful for future project planning.

assertions:
  - type: llm_judge
    criteria: "Response provides a balanced project assessment — acknowledges the significant wins (75% speed improvement, 86% error reduction, $4.2M revenue impact, zero breaches) while honestly addressing the overruns (2 weeks late, 20% over budget); contextualizes the overruns (scope creep from stakeholder requests, not poor execution); the overall assessment recognizes this as a successful project with process lessons."
    weight: 0.35
    description: "BalancedAssessment"
  - type: llm_judge
    criteria: "Response evaluates individual contributions fairly — highlights each person's key contribution; addresses issues constructively (Rachel's communication gap, David's scope management, Lisa's departure timing); recognizes quiet contributors like Marcus appropriately; doesn't over-reward visible work while under-recognizing essential infrastructure contributions; the individual assessments would feel fair to each team member."
    weight: 0.35
    description: "IndividualFairness"
  - type: llm_judge
    criteria: "Response includes useful lessons learned and team dynamics analysis — identifies systemic issues (scope creep process, timeline communication, workload sustainability with 70+ hour weeks); addresses the Rachel-David conflict and Rachel-Lisa clashes constructively; the lessons learned are specific and actionable for future projects; the review would genuinely improve how the next major project is run."
    weight: 0.30
    description: "LessonsLearned"
