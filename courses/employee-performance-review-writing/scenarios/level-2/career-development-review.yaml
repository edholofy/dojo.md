meta:
  id: career-development-review
  level: 2
  course: employee-performance-review-writing
  type: output
  description: "Career development review — write a review that integrates performance assessment with a career development plan"
  tags: [career-development, growth-plan, career-path, mentoring, intermediate]

state: {}

trigger: |
  You're a Creative Director at an advertising agency. You
  need to write an annual review for Mia, a Senior
  Copywriter who has been with the agency for 5 years and
  is at a career crossroads.

  Mia's performance:
  - Won 2 industry awards for campaign work (Webby and
    Shorty Award)
  - Client satisfaction: consistently highest on the team
  - Managed 4 major campaigns this year (target: 3)
  - Revenue from Mia's accounts: $3.2M (up 18% YoY)
  - Quality of work: exceptional — clients specifically
    request Mia
  - Mentored 2 junior copywriters (both performing well)

  Development areas:
  - Mia avoids business development — doesn't want to pitch
    new clients ("I'm a writer, not a salesperson")
  - Struggles with constructive criticism of others' work
    (too nice, doesn't push her team's work to be better)
  - Has not developed skills in new media formats (video
    scripting, social-first content)

  Career crossroads context:
  Mia has expressed three different career interests at
  various points:
  1. "I want to be Associate Creative Director eventually"
     (said in January goal-setting)
  2. "I'm thinking about going freelance — more flexibility,
     more creative control" (said casually in a 1:1 in
     September)
  3. "Maybe I should try the client side — better work-life
     balance" (said after a stressful campaign in November)

  Your observations:
  - Mia is creatively brilliant but seems unfulfilled
  - She lights up when mentoring junior writers
  - She's most engaged during conceptual brainstorming,
    least engaged during project management tasks
  - She's been working weekends more often and seems
    burned out
  - The ACD path requires pitching, business development,
    and team management — skills Mia currently avoids

  Task: Write Mia's performance review with an integrated
  career development plan. The review should acknowledge her
  exceptional work, address development areas honestly, and
  provide a thoughtful framework for the career conversation.

assertions:
  - type: llm_judge
    criteria: "Response writes a strong performance review — celebrates Mia's exceptional creative work with specific accomplishments (awards, client satisfaction, revenue growth); addresses development areas (business development avoidance, inability to give tough feedback, new media gap) constructively as growth opportunities, not failures; the rating reflects genuinely excellent performance; the review feels appreciative and honest."
    weight: 0.35
    description: "StrongReview"
  - type: llm_judge
    criteria: "Response provides a thoughtful career development framework — doesn't just assume ACD is the right path; explores all 3 expressed interests honestly (ACD path requirements and gaps, freelance pros/cons, client-side considerations); identifies what Mia seems to genuinely enjoy (mentoring, brainstorming, creative excellence); the framework helps Mia make an informed decision rather than pushing one direction; addresses the burnout signals."
    weight: 0.35
    description: "CareerFramework"
  - type: llm_judge
    criteria: "Response integrates the development plan with career exploration — if Mia chooses ACD, outlines specific steps to build missing skills (business development exposure, feedback coaching, new media training); if she's exploring other paths, provides support and timeline; the development plan is practical and phased; the overall approach demonstrates genuine investment in Mia's career, not just the agency's retention needs."
    weight: 0.30
    description: "IntegratedDevelopment"
