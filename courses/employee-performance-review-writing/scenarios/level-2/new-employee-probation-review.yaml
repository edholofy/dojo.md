meta:
  id: new-employee-probation-review
  level: 2
  course: employee-performance-review-writing
  type: output
  description: "New employee probation review — write a 90-day probationary review with a pass/fail recommendation"
  tags: [probation, 90-day, new-hire, onboarding, intermediate]

state: {}

trigger: |
  You're a Head of Customer Support at an e-commerce
  company. You need to write 90-day probationary reviews
  for 2 new hires with a recommendation to confirm or
  extend their probation.

  Company policy:
  - 90-day probation for all new hires
  - Options: Confirm employment, Extend probation (30 days),
    or Terminate
  - Review must document: onboarding completion, performance
    against role expectations, cultural fit, manager
    recommendation

  New Hire 1 — Alex (Customer Support Specialist):
  Onboarding:
  - Completed all 8 training modules on time
  - Passed product knowledge assessment: 88/100 (passing: 75)
  - Shadowed 20 calls (required: 15)
  - Certified on ticketing system

  Performance (Days 31-90):
  - Tickets resolved: 180 (standard for 90-day: 150)
  - CSAT: 4.4/5 (team avg: 4.2)
  - Average handle time: 9 minutes (standard: 10 minutes)
  - Escalation rate: 15% (standard: 20%, team avg: 14%)
  - 1 customer complaint (customer said Alex was "dismissive"
    — Alex acknowledged and improved immediately)

  Cultural fit:
  - Integrated well with the team
  - Participates actively in team meetings
  - Volunteered for Saturday coverage
  - One peer said: "Alex is the best new hire we've had
    in years"

  New Hire 2 — Jordan (Customer Support Specialist):
  Onboarding:
  - Completed 6 of 8 training modules (2 still incomplete)
  - Product knowledge assessment: 71/100 (below passing: 75)
  - Shadowed 12 calls (required: 15)
  - Not yet certified on ticketing system (says "the
    interface is confusing")

  Performance (Days 31-90):
  - Tickets resolved: 95 (standard for 90-day: 150)
  - CSAT: 3.8/5 (team avg: 4.2)
  - Average handle time: 16 minutes (standard: 10 minutes)
  - Escalation rate: 35% (standard: 20%, team avg: 14%)
  - 3 customer complaints (2 about incorrect information,
    1 about long hold times)

  Cultural fit:
  - Pleasant and well-liked personally
  - Has been late to 4 shifts (various excuses — traffic,
    alarm, parking)
  - Asked thoughtful questions during training
  - Previous employer gave a strong reference

  Complicating factor for Jordan:
  - Jordan disclosed during week 6 that they're going
    through a divorce, which has been "incredibly
    distracting"
  - Jordan was hired through an employee referral from
    your top performer
  - Jordan shows flashes of strong ability — their best
    day metrics match Alex's averages

  Task: Write the complete 90-day probationary review for
  both employees, with your recommendation for each.

assertions:
  - type: llm_judge
    criteria: "Response writes clear, evidence-based reviews for both employees — Alex's review documents strong performance with specific metrics exceeding all standards; Jordan's review honestly documents the gaps (incomplete training, below-standard metrics, attendance issues) while acknowledging positive indicators (thoughtful questions, flashes of ability); both reviews follow the company's required format."
    weight: 0.35
    description: "EvidenceBasedReviews"
  - type: llm_judge
    criteria: "Response makes appropriate recommendations — Alex should be confirmed (clear evidence of success); Jordan's recommendation is nuanced — likely extend probation rather than terminate (personal circumstances + flashes of ability + incomplete training suggest potential), with specific conditions and milestones for the extended period; the recommendations are not influenced by the referral relationship; each recommendation is justified with specific evidence."
    weight: 0.35
    description: "AppropriateRecommendations"
  - type: llm_judge
    criteria: "Response handles the sensitive elements professionally — Jordan's divorce disclosure is acknowledged compassionately but doesn't excuse the performance gaps; the referral relationship doesn't influence the recommendation; the attendance issues are addressed directly; the extension conditions (if recommended) are specific and measurable; the review treats Jordan with dignity while being honest about the concerns."
    weight: 0.30
    description: "SensitiveHandling"
