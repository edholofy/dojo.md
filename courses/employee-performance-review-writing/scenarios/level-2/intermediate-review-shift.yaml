meta:
  id: intermediate-review-shift
  level: 2
  course: employee-performance-review-writing
  type: output
  description: "Intermediate review shift — navigate a review cycle where an employee challenges their rating, HR pushes back, and a peer complaint surfaces mid-review"
  tags: [shift, rating-dispute, hr-pushback, peer-complaint, intermediate]

state: {}

trigger: |
  You're an Engineering Manager at a 500-person B2B SaaS
  company. You're in the middle of review season and 3
  complications have hit simultaneously.

  Complication 1 — The Rating Challenge:
  You gave Sam (Senior Engineer) a rating of 3 (Meets
  Expectations). Sam has formally challenged the rating,
  arguing it should be 4. Sam's arguments:
  - "I shipped the most features on the team (7 vs team
    avg of 4)"
  - "I had zero production incidents"
  - "I volunteered for on-call every holiday"
  - "Last year I got a 4 — nothing changed, so why did
    my rating drop?"

  Your justification for the 3 rating:
  - Sam's features were smaller scope (quick CRUD endpoints,
    not complex systems work)
  - Sam's code quality has declined — 3 PRs were rejected
    in code review for missing tests
  - Sam hasn't grown technically this year — still working
    at the same level as last year
  - The team's bar for "Exceeds" has risen — 2 new senior
    engineers joined who are operating at a higher level
  - Sam's on-call volunteering is appreciated but doesn't
    offset the core technical assessment

  Sam has cc'd HR on the challenge email and mentioned
  "wanting a formal process."

  Complication 2 — HR's Forced Distribution:
  HR has told you that your team has "too many 4s" and you
  need to move one person from 4 to 3. Your current
  distribution: one 4 (Priya — genuinely excels), two 3s
  (Sam + one other), one 2 (on a PIP). HR says: "The
  engineering department is only allocated 15% in the 4+
  category and your team already exceeds that."

  You believe Priya genuinely earned her 4 and downgrading
  her would be unfair and dishonest.

  Complication 3 — The Last-Minute Peer Complaint:
  The day before you finalize reviews, you receive a formal
  complaint from a female junior engineer that Sam made
  a "condescending and dismissive comment" during a code
  review last week. The junior engineer says: "Sam told me
  my approach was 'cute but not how real engineers do it.'"
  Sam denies the intent was condescending and says it was
  "just technical feedback."

  Task: Write your action plan for handling all 3
  complications. Include: your response to Sam's rating
  challenge (with the specific rebuttal), your response
  to HR's forced distribution demand, and how you handle
  the peer complaint in the context of reviews.

assertions:
  - type: llm_judge
    criteria: "Response handles Sam's rating challenge professionally — provides a clear, evidence-based rebuttal addressing each of Sam's arguments; explains the difference between quantity and quality of work; addresses the 'nothing changed' argument (the bar rose, same performance ≠ same rating); doesn't cave to pressure but remains respectful; the response would hold up in a formal HR process."
    weight: 0.35
    description: "RatingChallengeResponse"
  - type: llm_judge
    criteria: "Response pushes back on HR's forced distribution appropriately — advocates for Priya's legitimate rating with evidence; explains why forced distribution can harm fairness and trust; proposes alternatives (departmental rebalancing, data presentation) rather than simply complying or simply refusing; demonstrates understanding of the tension between organizational calibration and individual fairness."
    weight: 0.35
    description: "ForcedDistributionResponse"
  - type: llm_judge
    criteria: "Response handles the peer complaint carefully — separates the complaint investigation from the review process; doesn't retroactively change Sam's rating based on a last-minute complaint (that would be procedurally unfair); initiates a proper investigation; addresses the 'cute but not how real engineers do it' comment as potentially gendered and dismissive; protects the junior engineer while ensuring fair process for Sam."
    weight: 0.30
    description: "PeerComplaintHandling"
