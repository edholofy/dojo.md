meta:
  id: compensation-linked-review
  level: 2
  course: employee-performance-review-writing
  type: output
  description: "Compensation-linked review — write a performance review that supports a compensation recommendation with evidence"
  tags: [compensation, merit-increase, promotion-case, pay-equity, intermediate]

state: {}

trigger: |
  You're a Senior Engineering Manager at a mid-size SaaS
  company. Review season requires you to submit performance
  reviews that directly feed into compensation decisions.
  Your company uses a merit matrix:

  Rating 5: 8-12% increase + equity refresh
  Rating 4: 5-8% increase + potential equity
  Rating 3: 2-4% increase
  Rating 2: 0-2% increase + development plan
  Rating 1: 0% increase + PIP

  You need to write reviews for 3 of your engineers who
  represent different compensation scenarios:

  Engineer 1 — Priya (Senior Engineer, 4 years):
  You want to recommend Priya for promotion to Staff
  Engineer with a 15% increase. Her data:
  - Led the migration to microservices (6-month project,
    $2M estimated annual savings)
  - Mentored 3 engineers who all received positive reviews
  - Authored 5 engineering RFCs adopted by the org
  - Incident commander for 2 major outages (both resolved
    under SLA)
  - Code review turnaround: best on the team
  - Peer feedback: "Priya is the person I go to when
    something is really hard"
  Current comp: $165K base + $40K equity. Market rate for
  Staff: $195K-$210K.

  Engineer 2 — Marcus (Mid-level Engineer, 2 years):
  Marcus performs well but is at the top of his pay band.
  His data:
  - Completed all assigned projects on time
  - Code quality: above average
  - Good collaboration
  - No stretch projects or leadership initiatives
  - Has not expressed interest in promotion
  Current comp: $145K (band max: $150K, mid-level market:
  $120-$150K). A 3% increase would push him over band max.

  Engineer 3 — Sofia (Senior Engineer, 3 years):
  Sofia is underpaid relative to peers (she was hired at a
  lower rate and never caught up). Her data:
  - Consistent strong performer, rated 4 for 2 consecutive
    years
  - Leads the frontend architecture guild
  - No performance issues
  - Recently received a competing offer at $180K
  Current comp: $148K. Peer average for same role/level:
  $168K. A standard 5-8% increase would only bring her to
  $156-$160K.

  Task: Write the performance review and compensation
  recommendation for each engineer. Include the business
  case for each recommendation.

assertions:
  - type: llm_judge
    criteria: "Response builds a compelling promotion case for Priya — the review documents Staff-level work (technical leadership, organizational impact, mentorship); quantifies business impact ($2M savings); the compensation recommendation is specific and justified with market data; the review would convince a compensation committee; distinguishes between senior-level and staff-level contributions."
    weight: 0.35
    description: "PromotionCase"
  - type: llm_judge
    criteria: "Response handles the Marcus and Sofia situations thoughtfully — for Marcus, navigates the band-max issue honestly (options: lump sum bonus, title adjustment, or transparent conversation about growth); for Sofia, addresses the pay equity gap directly (advocating for an equity adjustment beyond standard merit, using the competing offer and peer comparison as leverage); both recommendations are practical and fair."
    weight: 0.35
    description: "CompensationNavigation"
  - type: llm_judge
    criteria: "Response connects performance evidence to compensation recommendations — each review shows clear linkage between specific accomplishments and the recommended compensation action; the business cases would withstand scrutiny from finance/HR; addresses potential pushback (budget constraints, precedent-setting); the overall approach demonstrates how reviews should drive fair compensation decisions."
    weight: 0.30
    description: "EvidenceCompensationLink"
