meta:
  id: remote-employee-review
  level: 2
  course: employee-performance-review-writing
  type: output
  description: "Remote employee review — write a performance review for a fully remote employee avoiding proximity bias"
  tags: [remote-work, proximity-bias, hybrid, evaluation, intermediate]

state: {}

trigger: |
  You're a Director of Customer Success at a hybrid company
  (60% in-office, 40% remote). You manage 10 people — 6
  in-office and 4 fully remote. You need to write a
  performance review for Taylor, one of your remote
  employees based in a different time zone (3 hours behind
  headquarters).

  Taylor's role: Senior Customer Success Manager
  Tenure: 3 years (first 2 in-office, transitioned to
  remote 14 months ago)

  Performance data:
  - Net Revenue Retention: 108% (target: 105%, team avg:
    103%)
  - Accounts managed: 35 (team avg: 28)
  - Churn rate: 3.2% (team avg: 5.8% — Taylor's is the
    lowest on the team)
  - Upsell revenue: $420K (target: $300K)
  - QBR completion rate: 100% (team avg: 88%)
  - Average CSAT: 4.7/5 (team avg: 4.3/5)
  - Response time to client issues: avg 2 hours (team
    avg: 4 hours)

  Challenges to evaluate fairly:
  - Taylor misses the "water cooler" conversations — you
    don't have casual visibility into their daily work
  - Taylor often can't attend team meetings scheduled at
    9 AM HQ time (6 AM their time)
  - Two in-office colleagues have mentioned that Taylor
    "isn't around" and is "hard to reach" — but Slack data
    shows Taylor responds within 15 minutes during their
    working hours
  - Taylor wasn't included in 2 strategic planning sessions
    because "it was easier to do in person"
  - You realize you've had 40% fewer 1:1s with Taylor than
    with your in-office reports (you tend to do impromptu
    check-ins with in-office people)
  - Taylor requested and was denied a promotion last cycle
    — the feedback was "needs more visibility with
    leadership"

  Previous review (1 year ago, when in-office):
  Rating: 4/5 (Exceeds Expectations)
  Comments: "Taylor is a star. Visible leader on the team,
  always first to help, great energy in the office."

  Task: Write Taylor's current performance review.
  Additionally, write a brief self-assessment of your own
  biases as a manager in evaluating Taylor, and propose 3
  specific actions to ensure remote employees are evaluated
  fairly going forward.

assertions:
  - type: llm_judge
    criteria: "Response writes a performance review based on outcomes, not visibility — Taylor's exceptional metrics (108% NRR, lowest churn, highest CSAT, 100% QBR completion) are prominently featured; the review does not penalize Taylor for missing in-person meetings or lacking 'visibility'; the rating reflects the actual performance data (likely 4 or higher given metrics exceed all targets); the review avoids proximity bias that would downgrade a remote employee."
    weight: 0.35
    description: "OutcomeBasedReview"
  - type: llm_judge
    criteria: "Response includes honest self-assessment of manager bias — acknowledges the 40% fewer 1:1s, the exclusion from strategic planning, the 'visibility' promotion feedback, and the tendency to equate in-office presence with engagement; recognizes that 'isn't around' and 'hard to reach' complaints are perception, not performance; the self-assessment demonstrates genuine reflection on remote employee evaluation fairness."
    weight: 0.35
    description: "ManagerSelfAssessment"
  - type: llm_judge
    criteria: "Response proposes actionable fairness improvements — the 3 actions address systemic issues (meeting scheduling across time zones, structured 1:1 cadence for all reports, visibility opportunities for remote employees, outcome-based evaluation criteria); the actions would genuinely improve equity for remote employees; the proposals are practical and implementable."
    weight: 0.30
    description: "FairnessImprovements"
