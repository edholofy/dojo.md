meta:
  id: high-performer-development
  level: 2
  course: employee-performance-review-writing
  type: output
  description: "High performer development — write a review for a top performer that focuses on career growth and retention"
  tags: [high-performer, development, retention, career-growth, intermediate]

state: {}

trigger: |
  You're a VP of Product at a fast-growing startup (Series
  C, 400 employees). You need to write the annual review
  for Chen, your Director of Product who is clearly your
  highest performer — and you're worried about losing them.

  Chen's performance:
  - Led the launch of 3 major product lines that generated
    $12M in new ARR (company target: $8M)
  - Built the product team from 4 to 11 people with zero
    regretted attrition
  - Customer NPS for Chen's products: 72 (company avg: 45)
  - Reduced time-to-market by 35% through process
    improvements
  - Presented product strategy to the board (CEO
    specifically praised the presentation)
  - Mentored 2 PMs who were both promoted this year
  - Only concern: Chen sometimes makes decisions without
    consulting stakeholders, leading to 2 cross-functional
    friction incidents

  Retention signals you've noticed:
  - Chen mentioned they were "curious about what VP roles
    look like" in a recent 1:1
  - A competitor (well-funded Series D) has been reaching
    out on LinkedIn
  - Chen has been less enthusiastic in recent all-hands
    meetings
  - Chen's spouse mentioned at a company event that they
    "might be moving to Austin" (your company is in SF)

  Your constraints:
  - You can offer a title change (VP of Product), but it
    requires CEO approval
  - Budget for merit increase: up to 12%
  - Equity refresh available but limited
  - Remote work policy is "hybrid preferred" but exceptions
    exist
  - The company needs Chen for the upcoming enterprise
    product launch (Q2 next year)

  Task: Write Chen's performance review. Include a
  development plan and retention strategy that you'll
  discuss during the review conversation. The review should
  be compelling enough that Chen feels valued while also
  addressing the one development area honestly.

assertions:
  - type: llm_judge
    criteria: "Response writes a review that would make a high performer feel genuinely valued — celebrates Chen's exceptional contributions with specific data and impact; the development area (decision-making without stakeholder consultation) is raised constructively as a growth edge for VP readiness, not as criticism; the overall tone conveys that Chen is a critical asset; the review is not generic high-performer language but specifically tailored to Chen's accomplishments."
    weight: 0.35
    description: "HighPerformerRecognition"
  - type: llm_judge
    criteria: "Response includes a thoughtful career development plan — addresses Chen's interest in VP roles with a concrete path (timeline, milestones, sponsor); the development plan positions the stakeholder consultation issue as the key VP-readiness growth area; includes stretch assignments or experiences that would prepare Chen for the next level; the plan demonstrates investment in Chen's future, not just retention tactics."
    weight: 0.35
    description: "CareerDevelopmentPlan"
  - type: llm_judge
    criteria: "Response includes a practical retention strategy — addresses compensation (merit + equity within constraints), title path (VP of Product timeline), flexibility (remote/Austin possibility), and purpose (enterprise product launch as a meaningful challenge); the strategy is honest about constraints rather than making promises that can't be kept; anticipates the conversation about competitor interest; the approach would genuinely reduce flight risk."
    weight: 0.30
    description: "RetentionStrategy"
