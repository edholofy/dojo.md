meta:
  id: 360-feedback-synthesis
  level: 2
  course: employee-performance-review-writing
  type: output
  description: "360 feedback synthesis — synthesize multi-rater feedback from 6 sources into a coherent performance review"
  tags: [360-feedback, multi-rater, synthesis, themes, intermediate]

state: {}

trigger: |
  You're a Director of Operations at a healthcare services
  company. You're writing the annual review for Pat, an
  Operations Manager, using 360-degree feedback from 6
  sources. Your task is to synthesize the sometimes
  contradictory feedback into a fair, balanced review.

  Self-Assessment (Pat):
  "I've had a strong year. I improved our processing time
  by 22%, managed a team through a difficult system
  migration with zero downtime, and took on the compliance
  project nobody else wanted. I think I deserve a 4/5. My
  only weakness is that I sometimes work too hard and
  don't delegate enough."

  Manager (You — Director of Operations):
  "Pat is operationally excellent. Delivers consistently.
  The system migration was impressive. However, Pat
  struggles with strategic thinking — focuses on tactical
  execution and resists when asked to think about long-term
  process redesign. Pat also tends to hoard information,
  making the team dependent on Pat for key decisions."

  Peer 1 (Finance Manager):
  "Pat is the most reliable person I work with. If Pat says
  something will be done, it gets done. Our monthly
  reconciliation process improved significantly because of
  Pat's work. Sometimes Pat is inflexible about process
  changes — 'that's not how we do it' — even when the
  change would be beneficial."

  Peer 2 (HR Business Partner):
  "I've had mixed experiences with Pat. Pat is competent
  and organized, but can be dismissive in cross-functional
  meetings. In our last project together, Pat made a
  decision that affected my team without consulting us.
  When I raised it, Pat said, 'I didn't think it was that
  important.' It felt disrespectful."

  Direct Report 1 (Operations Analyst):
  "Pat is a good manager in many ways — protects us from
  corporate politics, gives us clear direction, and
  recognizes our work. But Pat micromanages the details. I
  can't send an email to a stakeholder without Pat
  reviewing it first. I've been here 3 years and still
  don't feel trusted. I'm considering leaving because of
  this."

  Direct Report 2 (Operations Coordinator):
  "I love working for Pat. Pat taught me everything I know
  about operations. Pat is patient, organized, and always
  available. I feel supported and challenged. My only
  wish is that Pat would let us sit in on the leadership
  meetings so we can learn more about the business."

  Task: Synthesize all 6 feedback sources into a cohesive
  performance review. Identify themes, reconcile
  contradictions, assign a fair rating, and develop
  targeted development recommendations.

assertions:
  - type: llm_judge
    criteria: "Response synthesizes the feedback into clear themes — identifies the pattern across sources: (1) operational excellence and reliability (consistent across all raters), (2) information hoarding and micromanagement (manager + direct report 1 + peers), (3) resistance to change and inflexibility (manager + peer 1), (4) inconsistent cross-functional collaboration (peer 2 + manager); reconciles the contradictory direct report feedback (one feels micromanaged, the other feels supported — likely related to experience level and role)."
    weight: 0.35
    description: "ThemeSynthesis"
  - type: llm_judge
    criteria: "Response handles Pat's self-assessment appropriately — addresses the 'I work too hard' weakness honestly (this is actually the micromanagement/delegation issue reframed); doesn't just accept Pat's self-rating without analysis; uses the gap between self-perception and multi-rater feedback as a development conversation opportunity; the final rating is calibrated fairly considering all sources (likely 3-3.5 given excellent execution but significant development areas)."
    weight: 0.35
    description: "SelfAssessmentHandling"
  - type: llm_judge
    criteria: "Response provides targeted development recommendations — addresses the strategic thinking gap, the delegation/micromanagement pattern, and the cross-functional collaboration issues with specific actions; the recommendations are connected to the theme analysis; acknowledges the retention risk with Direct Report 1; the development plan would genuinely help Pat grow from tactical excellence to strategic leadership."
    weight: 0.30
    description: "TargetedDevelopment"
