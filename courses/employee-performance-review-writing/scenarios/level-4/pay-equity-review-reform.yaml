meta:
  id: pay-equity-review-reform
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Pay equity review reform — reform performance reviews to eliminate their role in perpetuating pay inequity"
  tags: [pay-equity, compensation, reform, systemic-bias, expert]

state: {}

trigger: |
  You're the Chief People Officer at a 5,000-person
  professional services firm. An external pay equity audit
  (required by new state law) has revealed that performance
  reviews are the primary mechanism perpetuating pay
  inequity in the organization.

  Audit findings:

  The pay gap:
  - Women earn 87 cents per dollar compared to men in
    equivalent roles
  - Black employees earn 82 cents per dollar compared to
    white employees in equivalent roles
  - The gap has remained stable for 5 years despite DEI
    programs

  How reviews perpetuate the gap:
  1. Rating-to-raise conversion: Each rating point = 2%
     merit increase. A 0.3 rating gap compounds to 6-8%
     salary difference over 5 years.
  2. Starting salary amplification: Employees who
     negotiated higher starting salaries receive bigger
     absolute increases (3% of $100K > 3% of $85K). Reviews
     never close the gap, they widen it.
  3. "Likeability premium": Analysis shows employees
     described as "likeable" or "great to work with"
     receive 0.4 higher ratings on average. Women of color
     are least likely to receive likeability language.
  4. Part-time penalty: Part-time employees (75% women)
     are rated on the same scale but receive lower ratings
     because "they're not as visible" — despite pro-rated
     productivity being equivalent or better.
  5. Manager discretion: Managers have 30% discretion in
     how they allocate merit pool. Analysis shows
     discretionary allocation benefits white men
     disproportionately.
  6. Promotion gatekeeping: "Exceeds" rating required for
     promotion eligibility. The rating gap means women and
     minorities are systematically excluded from the
     promotion pool.

  Legal context:
  - 3 states (California, Colorado, Illinois) now require
    annual pay equity audits
  - Pay transparency laws expanding rapidly
  - The audit findings could constitute evidence of
    disparate impact under Title VII if discovered in
    litigation
  - The firm has 18 months before the next required audit
    submission

  Stakeholder positions:
  - CEO: "Fix this without disrupting business. No dramatic
    pay adjustments — we can't afford it."
  - CFO: "The remediation cost for pay equity adjustments
    alone is $4.2M. That's our entire merit pool."
  - General Counsel: "This audit is a ticking time bomb.
    If plaintiffs' attorneys get these findings, we're
    looking at a class action."
  - Managing partners: "Our best people earn the most.
    That's meritocracy."
  - DEI committee: "We've been warning about this for 3
    years. Finally someone is listening."

  Task: Design the comprehensive reform plan that breaks
  the link between biased reviews and pay inequity. Include
  review system changes, compensation system changes,
  immediate remediation plan, and long-term structural
  reforms.

assertions:
  - type: llm_judge
    criteria: "Response addresses each mechanism perpetuating pay inequity — proposes specific interventions for the rating-to-raise conversion amplification, starting salary gap compounding, likeability premium, part-time penalty, manager discretion bias, and promotion gatekeeping; the interventions are targeted to each mechanism, not generic bias training; the reforms would measurably reduce the pay gap."
    weight: 0.35
    description: "MechanismInterventions"
  - type: llm_judge
    criteria: "Response navigates the financial and political constraints — addresses the CEO's cost concern with a phased remediation approach; works within the $4.2M budget reality; handles the General Counsel's litigation risk urgency; challenges the managing partners' 'meritocracy' argument with data; validates the DEI committee's long-standing warnings; the plan is politically viable, not just theoretically correct."
    weight: 0.35
    description: "ConstraintNavigation"
  - type: llm_judge
    criteria: "Response includes both immediate remediation and structural reform — immediate actions reduce legal exposure before the next audit (18 months); structural reforms prevent recurrence; the plan distinguishes between pay equity adjustments (compensation) and review system reforms (process); addresses the legal risk explicitly with a timeline; the overall approach would satisfy regulators and reduce litigation risk."
    weight: 0.30
    description: "RemediationAndReform"
