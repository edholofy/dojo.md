meta:
  id: succession-review-integration
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Succession review integration — design a system that integrates performance reviews with succession planning for a Fortune 500 company"
  tags: [succession, talent-pipeline, leadership, 9-box, expert]

state: {}

trigger: |
  You're the SVP of Talent at a Fortune 500 consumer goods
  company (25,000 employees globally). The board has
  identified a critical succession gap: 40% of VP+ roles
  have no identified successor, and the company's leadership
  pipeline is 72% white and 68% male in a company that is
  45% non-white and 52% female overall.

  The CEO wants you to redesign how performance reviews feed
  into succession planning to build a more robust and
  diverse leadership pipeline.

  Current problems:
  - Performance reviews and succession planning are separate
    systems with no data connection
  - "High potential" identification is entirely based on
    manager nomination (subject to affinity bias)
  - The 9-box grid is used but inconsistently — some
    divisions place everyone in the top right
  - Reviews measure "what" (results) but not "how"
    (leadership behaviors)
  - Leadership competencies aren't defined or measured
  - Development plans from reviews are rarely executed
  - Diverse candidates are rated well individually but
    rarely appear in succession slates
  - No data on whether high-potential designees actually
    succeed in promoted roles

  Stakeholder requirements:
  - Board: "We need a diverse pipeline of ready-now
    successors for every VP+ role within 24 months."
  - CEO: "I don't want to lower the bar — I want to expand
    the pool."
  - CHRO: "Our HiPo process has a credibility problem.
    People see it as political, not merit-based."
  - DEI Officer: "The 9-box grid perpetuates bias — it
    needs to be redesigned or replaced."
  - CFO: "Prove to me that investing in succession planning
    generates ROI."
  - Business unit presidents: "Don't add bureaucracy to our
    review process."

  Data you have:
  - 5 years of performance review data
  - 3 years of succession planning data
  - Demographic data across all levels
  - Promotion and turnover data
  - 360 feedback for director+ levels
  - External market benchmarking data

  Task: Design the integrated performance review and
  succession planning system. Include the assessment
  framework, leadership competency model, pipeline
  analytics, diversity mechanisms, and governance structure.

assertions:
  - type: llm_judge
    criteria: "Response designs a genuine integration — performance reviews feed directly into succession assessments; leadership competencies are measured in reviews and mapped to succession readiness; the 9-box is redesigned or replaced with a more bias-resistant assessment tool; high-potential identification uses objective criteria, not just manager nomination; the system creates a data pipeline from review to succession slate."
    weight: 0.35
    description: "GenuineIntegration"
  - type: llm_judge
    criteria: "Response addresses the diversity pipeline gap specifically — proposes mechanisms to expand the pool (not lower the bar) as the CEO requested; identifies where diverse candidates are being filtered out; creates accountability for diverse slates; the system would measurably increase the diversity of succession candidates; addresses the 72%/68% gap with specific interventions."
    weight: 0.35
    description: "DiversityPipeline"
  - type: llm_judge
    criteria: "Response addresses all stakeholder requirements — provides board with a 24-month timeline for ready-now successors; addresses CHRO's credibility concern; works with DEI Officer on 9-box redesign; provides CFO with ROI methodology; minimizes bureaucracy for business unit presidents; the overall system would gain executive buy-in; includes governance for ongoing accountability."
    weight: 0.30
    description: "StakeholderAlignment"
