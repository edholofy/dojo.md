meta:
  id: review-governance-framework
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Review governance framework — design an enterprise performance review governance structure for a 10,000-person organization"
  tags: [governance, enterprise, policy, accountability, expert]

state: {}

trigger: |
  You're the SVP of Human Capital at a 10,000-person global
  professional services firm (consulting, audit, advisory).
  The firm has grown through 6 acquisitions in 5 years, and
  each legacy entity still runs its own performance review
  system. The CEO wants a unified governance framework.

  Current state across legacy entities:
  - Entity A (4,000 employees, US): Annual 9-box grid,
    forced distribution, partner-led calibration
  - Entity B (2,500 employees, UK): Competency-based
    reviews, quarterly check-ins, no ratings
  - Entity C (1,500 employees, APAC): Simple 3-point scale,
    manager-only, minimal documentation
  - Entity D (1,000 employees, DACH): Works council
    involvement, detailed written reviews, employee
    co-determination rights
  - Entity E (500 employees, Brazil): Relationship-heavy,
    360 feedback, development-focused
  - Entity F (500 employees, Canada): Recently adopted OKR-
    based reviews with continuous feedback

  Governance requirements:
  - Unified rating taxonomy (must map across all entities)
  - Consistent documentation standards for legal compliance
    across 12 jurisdictions
  - Common calibration methodology
  - Shared analytics and reporting
  - Protection of local labor law requirements (especially
    DACH works council, Brazil labor courts)
  - Common technology platform (currently 4 different HRIS)
  - Executive accountability for review quality
  - Budget: $3M over 3 years
  - Must not disrupt ongoing operations during transition

  Political dynamics:
  - Entity A partners resist giving up forced distribution
    ("it's how we identify who to develop and who to exit")
  - Entity B leaders say their system is superior and
    shouldn't change
  - Entity D works council has threatened legal action if
    review changes aren't negotiated
  - Entity F feels their modern approach shouldn't be
    "dragged backward"

  Task: Design the complete governance framework including
  policy architecture, governance bodies, decision rights,
  compliance framework, technology strategy, and transition
  plan that addresses each entity's concerns.

assertions:
  - type: llm_judge
    criteria: "Response designs a practical governance framework — includes governance bodies (review board, calibration committees, compliance oversight); defines decision rights clearly (what's centralized vs. local); creates a unified rating taxonomy that maps across different existing systems; the framework provides consistency without requiring identical processes; addresses the scale of 10,000 employees across 12 jurisdictions."
    weight: 0.35
    description: "GovernanceFramework"
  - type: llm_judge
    criteria: "Response navigates the political dynamics skillfully — addresses Entity A's forced distribution attachment, Entity B's superiority claim, Entity D's legal requirements, and Entity F's modern approach; proposes a 'common core with local adaptation' model or similar approach that respects each entity's concerns while achieving unification; the transition plan sequences changes to minimize disruption; the approach would gain buy-in from resistant leaders."
    weight: 0.35
    description: "PoliticalNavigation"
  - type: llm_judge
    criteria: "Response addresses compliance and technology realistically — covers labor law requirements across jurisdictions (DACH co-determination, Brazil labor courts, UK employment law); the technology strategy addresses the 4 HRIS consolidation challenge; the $3M budget is allocated across 3 years with clear priorities; the implementation is phased and achievable; analytics and reporting strategy provides meaningful oversight."
    weight: 0.30
    description: "ComplianceTechnology"
