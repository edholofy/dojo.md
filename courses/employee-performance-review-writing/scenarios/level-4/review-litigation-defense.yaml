meta:
  id: review-litigation-defense
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Review litigation defense — prepare the company's defense when performance reviews become the centerpiece of a class-action discrimination lawsuit"
  tags: [litigation, class-action, discrimination, legal-defense, expert]

state: {}

trigger: |
  You're the VP of Employee Relations at a 12,000-person
  financial services company. A class-action lawsuit has
  been filed by 340 current and former female employees
  alleging systemic gender discrimination in performance
  reviews. The suit was filed under Title VII of the Civil
  Rights Act and seeks $85M in damages.

  Plaintiff's key allegations:
  1. Statistical evidence: Women received an average rating
     of 3.2 vs. men's 3.7 over 5 years, controlling for
     role, tenure, and department
  2. Language analysis: Expert witness analyzed 8,000
     reviews and found women's reviews were 3x more likely
     to include personality-based criticism ("abrasive,"
     "too aggressive," "emotional")
  3. Promotion gap: Women rated 4 were promoted at 60% the
     rate of men rated 4
  4. Calibration manipulation: Whistleblower testimony that
     one business unit head routinely moved women's ratings
     down during calibration, saying "she's good but not
     partner material"
  5. PIP disparities: Women were placed on PIPs at 2x the
     rate of men with equivalent performance data
  6. Retaliation: 3 women who complained about review
     fairness received lower ratings the following cycle

  Evidence in the company's possession:
  - 60,000 performance reviews from 5 years
  - Calibration session notes (some business units)
  - Manager training records (sporadic, inconsistent)
  - Exit interview data mentioning "unfair reviews"
  - HR investigation files (4 completed, 2 substantiated)
  - Email communications between managers about ratings

  External counsel has asked you to:
  1. Conduct an internal assessment of the allegations
  2. Identify the company's strongest defense arguments
  3. Identify the company's greatest vulnerabilities
  4. Recommend immediate remediation actions (without
     admitting liability)
  5. Prepare a litigation hold and document preservation
     strategy

  Task: Prepare the complete internal assessment and
  defense preparation document for external counsel.

assertions:
  - type: llm_judge
    criteria: "Response provides a thorough internal assessment — evaluates each of the 6 allegations honestly against the company's own data; identifies which allegations are likely substantiated and which can be defended; the assessment is candid (designed for counsel, not PR); quantifies exposure where possible; the analysis would be useful to defense attorneys preparing the case."
    weight: 0.35
    description: "ThoroughAssessment"
  - type: llm_judge
    criteria: "Response identifies credible defense arguments and vulnerabilities — defense arguments might include legitimate business justifications, differences in role mix, or calibration process; vulnerabilities include the whistleblower testimony, language patterns, and retaliation evidence; the analysis is realistic about relative strengths and weaknesses; acknowledges that some evidence (personality-based language, calibration manipulation) is very difficult to defend."
    weight: 0.35
    description: "DefenseAnalysis"
  - type: llm_judge
    criteria: "Response includes practical remediation and preservation — litigation hold covers all review data, calibration notes, emails, and HR files; remediation actions reduce ongoing harm without admitting liability (bias training, calibration process reform, language audit tools); the approach demonstrates good faith while protecting legal position; the document would give external counsel what they need to develop a defense strategy."
    weight: 0.30
    description: "RemediationPreservation"
