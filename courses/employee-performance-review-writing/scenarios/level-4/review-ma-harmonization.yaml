meta:
  id: review-ma-harmonization
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Review M&A harmonization — harmonize performance review systems during a major merger of two companies with opposing philosophies"
  tags: [merger, harmonization, integration, culture-clash, expert]

state: {}

trigger: |
  You're the Chief People Officer of NewCo, a company
  formed by the merger of AcquirerCo (8,000 employees,
  traditional financial services) and TargetCo (3,000
  employees, fintech startup). The merger closed 60 days
  ago. You need to harmonize two radically different
  performance review systems before the next review cycle
  in 6 months.

  AcquirerCo's system:
  - Annual reviews with 5-point scale
  - Forced distribution (bell curve enforced)
  - 10-page review forms with detailed competency ratings
  - Separate calibration by business unit
  - Reviews tied directly to bonus pool allocation
  - Manager training: 2-day workshop every 2 years
  - Average review writing time: 6 hours per employee
  - System: SAP SuccessFactors
  - Employee satisfaction with reviews: 3.1/5
  - Tenure-heavy culture (avg tenure: 12 years)

  TargetCo's system:
  - Quarterly lightweight check-ins (no annual review)
  - No numerical ratings ("we don't believe in labels")
  - Peer-nominated feedback cycles
  - OKR-based goal tracking
  - Compensation decisions made by "people team" holistically
  - No formal manager training (culture of "radical
    transparency")
  - Average check-in time: 30 minutes per quarter
  - System: Lattice
  - Employee satisfaction with reviews: 4.2/5
  - Fast-moving culture (avg tenure: 2.3 years)

  Political dynamics:
  - AcquirerCo CEO (now NewCo CEO): "We need rigor and
    documentation. The startup approach is too loose."
  - TargetCo founder (now NewCo CTO): "Our system is why
    people chose to work here. Forcing ratings will cause
    mass exodus."
  - AcquirerCo managers: "We need ratings to manage
    performance. How else do we know who to develop?"
  - TargetCo engineers: "If you make me fill out a 10-page
    form, I'm quitting."
  - Board: "Harmonization must be complete within 12 months
    for integration to succeed."
  - Legal: "We need consistent documentation across all
    11,000 employees for compliance."

  Retention risk:
  - 200 key TargetCo employees have retention packages
    that vest in 18 months — they need to be kept engaged
  - 15 TargetCo engineers have already left citing
    "cultural concerns"
  - AcquirerCo employees are anxious about "startup chaos"
    eroding their structured environment

  Task: Design the harmonized performance review system and
  the integration timeline. The system must satisfy both
  cultures while meeting legal and business requirements.

assertions:
  - type: llm_judge
    criteria: "Response designs a harmonized system that genuinely bridges both cultures — not simply adopting one system over the other; likely a hybrid with regular check-ins (TargetCo influence) plus periodic formal documentation (AcquirerCo influence); addresses the rating question with a nuanced solution; the system would feel recognizable to both employee populations; preserves the best elements of each system."
    weight: 0.35
    description: "HarmonizedDesign"
  - type: llm_judge
    criteria: "Response navigates the political dynamics effectively — addresses the CEO's rigor requirement and the CTO's culture preservation; provides specific arguments for compromise positions; the integration timeline is phased to manage change fatigue; addresses the 200 key employee retention risk directly; acknowledges and mitigates the 15 engineers who already left as a warning signal."
    weight: 0.35
    description: "PoliticalNavigation"
  - type: llm_judge
    criteria: "Response addresses practical integration challenges — technology consolidation strategy (SAP SuccessFactors vs. Lattice); manager training for both populations; consistent documentation that meets legal requirements without being burdensome; compensation decision methodology that works for both cultures; the 12-month timeline is achievable; the approach would survive scrutiny from the board."
    weight: 0.30
    description: "PracticalIntegration"
