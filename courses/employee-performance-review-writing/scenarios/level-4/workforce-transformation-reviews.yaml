meta:
  id: workforce-transformation-reviews
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Workforce transformation reviews — redesign performance reviews for an organization undergoing AI-driven workforce transformation"
  tags: [transformation, ai-workforce, reskilling, future-of-work, expert]

state: {}

trigger: |
  You're the CHRO of a 7,000-person insurance company
  undergoing an AI-driven transformation. Over the next 3
  years, 40% of current roles will be significantly
  modified or eliminated by AI automation, and 800 new
  roles will be created that don't exist today. You need
  to redesign the performance review system to support this
  transformation.

  Transformation impact on workforce:

  Claims Processing (2,000 employees):
  - AI will automate 70% of standard claims processing
  - 1,400 employees need to transition to "Claims
    Intelligence Analysts" (overseeing AI, handling
    complex cases, managing exceptions)
  - 400 roles will be eliminated over 18 months
  - Current reviews measure: claims processed per day,
    accuracy rate, compliance scores

  Underwriting (1,500 employees):
  - AI will handle initial risk assessment
  - Underwriters transition to "Risk Advisors" (complex
    commercial, relationship-based)
  - 300 roles eliminated, 200 new senior advisory roles
    created
  - Current reviews measure: policies written, loss ratios,
    turnaround time

  Customer Service (1,000 employees):
  - AI chatbots handle 60% of inquiries
  - Human agents focus on complex, emotional, high-value
    interactions
  - 500 roles eliminated, 200 "Customer Advocacy" roles
    created
  - Current reviews measure: call volume, handle time,
    CSAT

  New roles being created:
  - AI Operations Specialists (100 roles)
  - Data Scientists/Engineers (150 roles)
  - Human-AI Collaboration Designers (50 roles)
  - Digital Ethics Officers (20 roles)
  - Transformation Coaches (80 roles)
  - Customer Experience Architects (100 roles)

  Challenge:
  - Current reviews measure skills that are becoming
    obsolete (volume metrics, speed metrics)
  - No framework exists for evaluating "learning agility"
    or "adaptability" — critical skills for the transition
  - Employees who excel at current tasks may struggle with
    new tasks (and vice versa)
  - The 400/300/500 employees being eliminated need fair,
    documented reviews that don't penalize them for
    organizational decisions
  - Union (representing 1,200 claims processors) demands
    that reviews not be used to select who is laid off vs.
    retained

  Task: Design the transformed performance review system
  that supports the workforce transition. Include: new
  competency frameworks, transitional review approaches,
  metrics for new roles, fair separation documentation,
  and how reviews support reskilling efforts.

assertions:
  - type: llm_judge
    criteria: "Response designs a performance review system for transformation — replaces volume/speed metrics with human-value-add metrics (judgment quality, exception handling, customer empathy, AI collaboration effectiveness); creates a transitional review framework that evaluates both current role performance and reskilling progress; includes competency frameworks for new roles that don't exist yet; the system enables rather than hinders the workforce transformation."
    weight: 0.35
    description: "TransformationDesign"
  - type: llm_judge
    criteria: "Response addresses the human impact fairly — creates a separation documentation approach that doesn't penalize employees for organizational decisions (role elimination is not performance failure); addresses the union's demand about reviews and layoff selection; includes reskilling assessment that identifies employees who can transition vs. those who need different support; the approach treats displaced employees with dignity."
    weight: 0.35
    description: "HumanImpact"
  - type: llm_judge
    criteria: "Response provides practical implementation — the transitional review approach is phased (current metrics → blended metrics → new metrics); includes 'learning agility' and 'adaptability' assessment frameworks; addresses how to review employees for roles that don't exist yet; the system supports both retention (reskilling talent) and separation (fair documentation); would survive union scrutiny and potential litigation."
    weight: 0.30
    description: "PracticalTransition"
