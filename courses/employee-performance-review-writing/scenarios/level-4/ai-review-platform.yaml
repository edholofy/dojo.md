meta:
  id: ai-review-platform
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "AI review platform — design an AI-powered performance review system that augments manager judgment while preventing bias"
  tags: [ai, technology, bias-prevention, augmentation, expert]

state: {}

trigger: |
  You're the Chief People Officer at a 6,000-person
  technology company. The CEO wants to build an AI-powered
  performance review platform that "makes reviews 10x
  better." You need to design the system strategy, balancing
  AI capabilities with human judgment, bias prevention, and
  employee trust.

  AI capabilities you could implement:
  1. Writing assistance: AI suggests review language based
     on performance data (like auto-complete for reviews)
  2. Bias detection: Real-time flagging of biased or vague
     language as managers write
  3. Rating recommendation: AI suggests ratings based on
     quantitative performance data
  4. Calibration support: AI identifies rating
     inconsistencies across managers
  5. Sentiment analysis: NLP analysis of review tone and
     specificity
  6. Predictive analytics: AI predicts flight risk based on
     review patterns
  7. Goal tracking: AI monitors progress against goals and
     suggests check-in topics
  8. Peer feedback aggregation: AI synthesizes 360 feedback
     into themes

  Concerns raised by stakeholders:
  - Legal: "AI-generated ratings could create legal
    liability — who's accountable for a biased AI
    recommendation?"
  - Employee council: "Employees don't want AI evaluating
    them. This feels like surveillance."
  - Engineering: "AI bias is well-documented. An AI trained
    on our historically biased reviews will perpetuate bias."
  - Managers: "If AI writes the reviews, what's the point
    of managers? Will this replace us?"
  - CHRO: "How do we ensure AI augments rather than replaces
    human judgment?"
  - CFO: "What's the ROI? How do we justify the investment?"

  Data available:
  - 5 years of review text (30,000 reviews)
  - Performance ratings with demographic data
  - Promotion and compensation outcomes
  - Employee engagement survey data
  - Exit interview data

  Technical constraints:
  - Build vs. buy decision needed
  - Budget: $2M for initial development, $500K annual
    maintenance
  - Timeline: MVP in 12 months
  - Must comply with EU AI Act, NYC Local Law 144
    (algorithmic hiring tools), and emerging state
    regulations
  - Data privacy requirements (GDPR, CCPA)

  Task: Design the complete AI-powered review platform
  strategy. Include: feature prioritization and phasing,
  ethical AI framework, bias prevention methodology, change
  management plan, regulatory compliance approach, and ROI
  business case.

assertions:
  - type: llm_judge
    criteria: "Response designs a thoughtful AI strategy — prioritizes features based on impact and risk (bias detection and writing assistance likely first, rating recommendations later or never); clearly delineates what AI decides vs. what humans decide; the phasing is logical (low-risk features first, build trust before high-stakes features); addresses each of the 8 capabilities with a clear recommendation (implement, defer, or reject with reasoning)."
    weight: 0.35
    description: "ThoughtfulAIStrategy"
  - type: llm_judge
    criteria: "Response addresses ethical and bias concerns rigorously — explains how to prevent AI from perpetuating historical bias in 30,000 reviews; addresses accountability for AI recommendations; includes audit mechanisms and human override requirements; addresses employee surveillance concerns; the ethical framework is specific (not just 'we'll be ethical'); addresses EU AI Act and NYC Local Law 144 compliance specifically."
    weight: 0.35
    description: "EthicalFramework"
  - type: llm_judge
    criteria: "Response includes practical business justification — ROI calculation methodology is credible; addresses the build vs. buy decision with specific criteria; the $2M budget is allocated thoughtfully; change management addresses manager anxiety about replacement; the platform would genuinely improve review quality while maintaining human judgment; the overall approach balances innovation with responsibility."
    weight: 0.30
    description: "BusinessJustification"
