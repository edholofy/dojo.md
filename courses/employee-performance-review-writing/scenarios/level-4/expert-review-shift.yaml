meta:
  id: expert-review-shift
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Expert review shift — navigate a crisis where a leaked internal analysis reveals the performance review system systematically disadvantages disabled employees"
  tags: [shift, disability, systemic-discrimination, ada-violation, expert]

state: {}

trigger: |
  You're the CHRO of an 8,000-person technology company.
  An internal People Analytics report — intended for
  executive eyes only — has been leaked to the press. The
  report reveals that your performance review system
  systematically disadvantages employees with disabilities.

  Leaked report findings:

  Rating disparities:
  - Employees with disclosed disabilities: avg rating 2.9
  - Employees without disclosed disabilities: avg rating 3.5
  - Gap persists after controlling for role, tenure, and
    department

  Specific patterns:
  - Employees who use accommodations (flexible schedules,
    assistive technology, modified duties): avg rating 2.7
  - Review language for disabled employees: 4x more likely
    to include "attendance concerns," "pace of work," and
    "reliability" despite equivalent output quality
  - Managers who have employees with accommodations are
    2x more likely to rate all their employees lower
    (halo effect in reverse)
  - 0 employees with disclosed disabilities have been
    promoted to director+ level in 3 years
  - PIP rates for employees with disabilities: 3x higher
    than non-disabled employees

  Root causes identified in the report:
  - Performance metrics don't account for reasonable
    accommodations (e.g., modified schedules counted as
    "attendance issues")
  - No manager training on evaluating employees with
    accommodations
  - Bias: Managers equate physical presence and speed with
    performance
  - The review form asks about "initiative" and "going above
    and beyond" — creating bias against employees who
    focus on assigned duties within accommodation boundaries
  - No audit mechanism to catch disability-related bias

  Immediate pressures:
  - Major disability rights organization has issued a
    public statement demanding accountability
  - EEOC has opened a preliminary investigation based on
    the leaked report
  - 45 employees with disabilities have sent a joint
    letter demanding systemic reform
  - 3 employees have filed individual ADA complaints
  - Stock price dropped 4% on the news
  - The internal analytics team is demoralized (they wrote
    the report to fix the problem, not to create a PR
    crisis)

  Task: Create the complete crisis response and systemic
  reform plan. Include immediate communications (48 hours),
  EEOC response strategy, review system reforms, manager
  training, and accountability framework.

assertions:
  - type: llm_judge
    criteria: "Response addresses the crisis with genuine accountability — immediate communications acknowledge the findings honestly without defensive language; takes responsibility for systemic failures; doesn't blame the leaked report or the analytics team who identified the problems; the tone would satisfy disability rights advocates that the company takes this seriously; addresses both the PR crisis and the substantive equity failures."
    weight: 0.35
    description: "GenuineAccountability"
  - type: llm_judge
    criteria: "Response provides comprehensive review system reforms — redesigns metrics to account for reasonable accommodations; removes or modifies 'initiative' and 'going above and beyond' criteria that disadvantage disabled employees; creates accommodation-aware evaluation standards; adds disability-inclusive bias training for managers; builds an audit mechanism to catch disability-related rating disparities; the reforms address each root cause identified in the report."
    weight: 0.35
    description: "SystemicReforms"
  - type: llm_judge
    criteria: "Response navigates the EEOC and legal challenges — prepares for the EEOC investigation with document preservation and cooperation strategy; addresses the 3 individual ADA complaints; responds to the 45-employee letter substantively; protects the analytics team (who were doing their job); the strategy balances legal protection with genuine reform; includes accountability for managers who exhibited bias; the approach would reduce rather than increase legal exposure."
    weight: 0.30
    description: "LegalNavigation"
