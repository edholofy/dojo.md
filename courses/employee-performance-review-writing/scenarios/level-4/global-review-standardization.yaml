meta:
  id: global-review-standardization
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Global review standardization — standardize performance reviews across a 15,000-person multinational with complex labor law requirements"
  tags: [global, standardization, labor-law, multinational, expert]

state: {}

trigger: |
  You're the Global Head of Talent Management at a
  15,000-person multinational pharmaceutical company
  headquartered in Switzerland with operations in 18
  countries. The board has mandated global standardization
  of performance reviews after discovering that identical
  performers receive ratings ranging from 2 to 5 depending
  on which country they work in.

  Current state by major region:

  United States (4,500 employees):
  - 5-point scale, annual, at-will employment context
  - Forced ranking in Sales, no ranking elsewhere
  - Reviews directly determine merit increases
  - California and NYC have additional pay equity laws

  European Union (5,000 employees across 8 countries):
  - Works councils in Germany, France, Netherlands require
    co-determination on review processes
  - GDPR applies to all review data
  - France: Employee right to disconnect affects review
    of availability
  - Germany: Reviews must be shown to employees before
    filing; employees can demand removal of inaccurate
    statements
  - Varying notice periods affect how PIPs work

  Japan (2,000 employees):
  - Seniority-based compensation limits rating impact
  - Cultural norm: managers avoid direct negative feedback
  - "Lifetime employment" expectation (though changing)
  - Reviews historically focused on effort, not outcomes

  China (2,000 employees):
  - Rapid growth market, high turnover
  - Strong emphasis on quantitative metrics
  - "Social credit" concerns about how review data is used
  - Government labor inspections increasingly common

  India (1,000 employees):
  - Bell curve heavily used in IT sector
  - High attrition if rating doesn't match promotion
    expectations
  - Festival calendar affects review timing
  - Labor tribunal risk if PIPs aren't properly documented

  Brazil (500 employees):
  - CLT labor law requires careful documentation
  - Reviews are discoverable in labor court proceedings
  - 13th month salary calculations affected by ratings
  - Strong relationship between review and dismissal risk

  Key objectives:
  - Create a globally consistent rating taxonomy
  - Enable cross-country talent comparison and mobility
  - Maintain local legal compliance
  - Support global calibration at VP+ level
  - Budget: $5M over 3 years
  - Technology: Global rollout of Workday (in progress)

  Task: Design the global standardization strategy with
  the rating taxonomy, compliance framework by jurisdiction,
  implementation roadmap, and governance structure.

assertions:
  - type: llm_judge
    criteria: "Response designs a globally consistent rating taxonomy — creates a common framework that maps across all 18 countries; addresses the calibration problem (same performance = same rating regardless of country); includes mechanisms for cross-country comparison; the taxonomy accommodates cultural differences in self-assessment and manager rating patterns; the design is sophisticated enough for a 15,000-person pharma company."
    weight: 0.35
    description: "GlobalTaxonomy"
  - type: llm_judge
    criteria: "Response addresses jurisdiction-specific compliance — covers GDPR for EU review data; addresses works council co-determination in Germany/France/Netherlands; accounts for Japan's seniority system and cultural norms; addresses China's data sensitivity; covers Brazil's CLT labor law requirements; India's bell curve expectations and labor tribunal risk; the compliance framework demonstrates genuine understanding of each jurisdiction."
    weight: 0.35
    description: "JurisdictionCompliance"
  - type: llm_judge
    criteria: "Response provides a realistic implementation roadmap — the 3-year timeline is phased by region with clear milestones; the $5M budget is allocated across technology (Workday), training, legal consultation, and change management; leverages the in-progress Workday rollout; includes governance structure for ongoing oversight; the approach would survive executive scrutiny and board review."
    weight: 0.30
    description: "ImplementationRoadmap"
