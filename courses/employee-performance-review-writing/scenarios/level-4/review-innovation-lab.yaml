meta:
  id: review-innovation-lab
  level: 4
  course: employee-performance-review-writing
  type: output
  description: "Review innovation lab — design and pilot experimental performance review approaches that challenge conventional practices"
  tags: [innovation, experimental, pilot, future-of-work, expert]

state: {}

trigger: |
  You're the VP of People Innovation at a 4,000-person
  technology company known for progressive HR practices.
  The CEO has given you a $500K budget and 12 months to
  run a "Performance Review Innovation Lab" — testing 4
  experimental review approaches on volunteer teams before
  deciding which elements to adopt company-wide.

  Experiment 1 — Peer-Only Reviews (no manager input):
  Team: 40-person Product Engineering team
  Concept: Eliminate manager reviews entirely. Peers who
  work directly with each person write reviews and
  collectively determine ratings through facilitated
  discussion. Manager's only role is to facilitate, not
  evaluate.
  Concerns: Will peers be honest? Social dynamics? Cliques
  influencing ratings? Legal defensibility without manager
  accountability?

  Experiment 2 — Project-Based Reviews (no annual cycle):
  Team: 35-person Professional Services team
  Concept: Eliminate the annual review cycle. Instead,
  conduct reviews at the end of every major project
  (typically 4-8 per year). No annual summary, just
  accumulated project reviews.
  Concerns: What about ongoing operational roles? How do
  compensation decisions work? How do you compare across
  teams?

  Experiment 3 — Self-Directed Development (no ratings):
  Team: 30-person Design team
  Concept: Eliminate ratings and evaluative language
  entirely. Employees set their own development goals,
  receive feedback from anyone they request it from, and
  self-assess progress. Manager's role is coaching only.
  Compensation decisions made by a "people panel" using
  market data and team input.
  Concerns: How do you manage underperformance? Legal
  documentation? Will self-directed development actually
  happen?

  Experiment 4 — AI-Augmented Continuous Feedback:
  Team: 50-person Customer Success team
  Concept: AI analyzes work products, communication
  patterns (with consent), and outcomes data to generate
  weekly "performance insights" for each employee. Human
  manager reviews AI insights monthly and adds context.
  Quarterly summary replaces annual review.
  Concerns: Surveillance concerns? Data privacy? AI bias?
  Employee trust?

  For each experiment, you need:
  - Detailed pilot design with success metrics
  - Risk mitigation strategies
  - Legal review considerations
  - How compensation decisions will work
  - Measurement framework to compare across experiments
  - Decision criteria for scaling vs. abandoning

  Task: Design the complete Innovation Lab plan with all
  4 experiments.

assertions:
  - type: llm_judge
    criteria: "Response designs rigorous pilot protocols for all 4 experiments — each has specific success metrics (quantitative and qualitative), control groups or comparison benchmarks, clear timelines, and defined roles; the experiments are designed to generate genuine learning, not just validate a predetermined conclusion; the designs address the specific concerns raised for each experiment."
    weight: 0.35
    description: "RigorousPilotDesign"
  - type: llm_judge
    criteria: "Response addresses practical implementation challenges — explains how compensation decisions work under each model; addresses legal defensibility for non-traditional approaches; includes risk mitigation for each experiment (peer dynamics, AI bias, documentation gaps); the approaches are innovative but implementable; the lab design would produce actionable results."
    weight: 0.35
    description: "PracticalImplementation"
  - type: llm_judge
    criteria: "Response includes a decision framework — defines criteria for scaling, modifying, or abandoning each experiment; the measurement framework enables fair comparison across the 4 approaches; includes a timeline for decision-making; the overall lab design would provide the company with genuine evidence for performance review innovation; the $500K budget is allocated thoughtfully."
    weight: 0.30
    description: "DecisionFramework"
