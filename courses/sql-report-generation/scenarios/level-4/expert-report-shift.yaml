meta:
  id: expert-report-shift
  level: 4
  course: sql-report-generation
  type: output
  description: "Expert report shift — handle complex organizational reporting challenges requiring cross-database federation, financial precision, automation, and compliance in a single shift"
  tags: [SQL, shift-simulation, expert, federation, compliance, automation]

state: {}

trigger: |
  You are the senior data engineer covering a critical 24-hour shift.
  Four urgent situations arrive:

  Situation 1 (8 AM — SOC 2 audit): "Auditors are on-site today.
  They need evidence of: who accessed the financial_reports table in
  the last 90 days, all changes to the GL entries table with before/
  after values, and proof that every monthly report was generated by
  one person and approved by a different person."

  Situation 2 (11 AM — acquisition integration): "We just acquired
  a company running MySQL. The CFO needs a combined revenue report
  by tomorrow showing PostgreSQL revenue + MySQL revenue by region
  and month. The MySQL database uses different column names and
  stores dates as strings."

  Situation 3 (2 PM — performance emergency): "The quarterly board
  report has been running for 3 hours and is still going. The board
  meeting is at 5 PM. This query joins orders (800M rows) with
  customers and products, groups by quarter, region, and category."

  Situation 4 (5 PM — automation request): "The CEO says she's tired
  of waiting for reports. Set up automated daily reports that run at
  6 AM, with failure alerts to Slack, and a dependency chain so the
  monthly summary only runs after all daily reports succeed."

  Task: Handle all four situations with expert-level SQL solutions.

assertions:
  - type: llm_judge
    criteria: "Response provides audit evidence queries and acquisition integration — audit_and_acquisition: 'Situation 1 — SOC 2 audit evidence: Access audit: SELECT username, COUNT(*) AS access_count, MIN(executed_at) AS first_access, MAX(executed_at) AS last_access FROM audit_query_log WHERE tables_accessed @> ARRAY['financial_reports'] AND executed_at >= CURRENT_DATE - INTERVAL '90 days' GROUP BY username ORDER BY access_count DESC. GL change log with before/after: SELECT changed_at, changed_by, operation, old_values->>'account_code' AS account, old_values->>'amount' AS old_amount, new_values->>'amount' AS new_amount, (new_values->>'amount')::numeric - (old_values->>'amount')::numeric AS change FROM audit_change_log WHERE table_name = 'gl_entries' AND changed_at >= CURRENT_DATE - INTERVAL '90 days' ORDER BY changed_at DESC. Segregation of duties proof: SELECT rc.report_name, ra.generated_by, ra.approved_by, ra.approved_at, CASE WHEN ra.generated_by != ra.approved_by THEN 'COMPLIANT' ELSE 'VIOLATION' END AS sod_status FROM report_approvals ra JOIN report_executions re ON ra.report_execution_id = re.execution_id JOIN report_catalog rc ON re.report_id = rc.report_id WHERE ra.approved_at >= CURRENT_DATE - INTERVAL '90 days'. Situation 2 — Acquisition integration: CREATE EXTENSION mysql_fdw; CREATE SERVER acquired_co FOREIGN DATA WRAPPER mysql_fdw OPTIONS (host 'mysql.acquired.com', port '3306'); CREATE FOREIGN TABLE ft_acquired_orders (id INT, sale_amount DECIMAL(10,2), sale_region TEXT, sale_date_str TEXT) SERVER acquired_co OPTIONS (dbname 'sales', table_name 'orders'); Combined report: SELECT month, region, SUM(revenue) AS total_revenue, source FROM (SELECT DATE_TRUNC('month', order_date) AS month, region, SUM(amount) AS revenue, 'PostgreSQL' AS source FROM orders WHERE status = 'completed' GROUP BY 1, 2 UNION ALL SELECT DATE_TRUNC('month', TO_DATE(sale_date_str, 'MM/DD/YYYY')), sale_region, SUM(sale_amount), 'MySQL_Acquired' FROM ft_acquired_orders GROUP BY 1, 2) combined GROUP BY month, region, source ORDER BY month, region'"
    weight: 0.35
    description: "AuditAndAcquisition"
  - type: llm_judge
    criteria: "Response solves the performance emergency with immediate and long-term fixes — performance: 'Situation 3 — Performance emergency for the board meeting: Immediate fix (get results in 30 minutes, not 3 hours): Step 1 — Kill the running query: SELECT pg_cancel_backend(pid) FROM pg_stat_activity WHERE query LIKE '%quarterly_board%' AND state = 'active'. Step 2 — Rewrite with materialized intermediate results: CREATE TEMPORARY TABLE tmp_quarterly_orders AS SELECT DATE_TRUNC('quarter', order_date) AS quarter, region, product_category, COUNT(*) AS orders, SUM(amount) AS revenue, COUNT(DISTINCT customer_id) AS customers FROM orders WHERE order_date >= '2024-01-01' AND status = 'completed' GROUP BY 1, 2, 3. CREATE INDEX idx_tmp_q ON tmp_quarterly_orders(quarter, region). This aggregates 800M rows into thousands of rows in about 10 minutes. Step 3 — Join the temp table with dimensions: SELECT tq.quarter, tq.region, tq.product_category, tq.orders, tq.revenue, tq.customers, ROUND(tq.revenue / NULLIF(tq.orders, 0), 2) AS avg_order_value, RANK() OVER (PARTITION BY tq.quarter ORDER BY tq.revenue DESC) AS revenue_rank FROM tmp_quarterly_orders tq ORDER BY tq.quarter, tq.revenue DESC. This join runs in seconds against the pre-aggregated temp table. Total time: 10-15 minutes instead of 3+ hours. Long-term fix: create a permanent materialized view refreshed nightly so the board report always runs instantly'"
    weight: 0.35
    description: "Performance"
  - type: llm_judge
    criteria: "Response implements the automation system with dependency chain and failure alerts — automation: 'Situation 4 — Report automation with dependencies: Daily report automation: SELECT cron.schedule('daily_revenue', '0 6 * * *', $$ SELECT run_report('daily_revenue_summary') $$); SELECT cron.schedule('daily_orders', '0 6 * * *', $$ SELECT run_report('daily_order_metrics') $$); SELECT cron.schedule('daily_customers', '5 6 * * *', $$ SELECT run_report('daily_customer_activity') $$). Failure alerting: CREATE OR REPLACE FUNCTION run_report_with_alert(p_name TEXT) RETURNS void AS $$ BEGIN PERFORM run_report(p_name); EXCEPTION WHEN OTHERS THEN INSERT INTO alert_queue (channel, message, severity) VALUES ('slack', format('ALERT: Report %s failed at %s: %s', p_name, NOW()::text, SQLERRM), 'critical'); RAISE; END; $$ LANGUAGE plpgsql. Monthly dependency chain: the monthly summary depends on all daily reports for the month completing. CREATE OR REPLACE FUNCTION run_monthly_if_ready() RETURNS void AS $$ DECLARE v_days_in_month INTEGER; v_completed_days INTEGER; BEGIN v_days_in_month := EXTRACT(DAY FROM DATE_TRUNC('month', CURRENT_DATE) + INTERVAL '1 month' - INTERVAL '1 day')::integer; SELECT COUNT(DISTINCT DATE(started_at)) INTO v_completed_days FROM report_executions WHERE report_id = (SELECT report_id FROM report_registry WHERE report_name = 'daily_revenue_summary') AND status = 'completed' AND started_at >= DATE_TRUNC('month', CURRENT_DATE - INTERVAL '1 month') AND started_at < DATE_TRUNC('month', CURRENT_DATE); IF v_completed_days >= v_days_in_month THEN PERFORM run_report('monthly_summary'); ELSE INSERT INTO alert_queue (channel, message, severity) VALUES ('slack', format('Monthly summary blocked: only %s/%s daily reports completed', v_completed_days, v_days_in_month), 'warning'); END IF; END; $$ LANGUAGE plpgsql. Schedule monthly check on the 1st at 8 AM: SELECT cron.schedule('0 8 1 * *', 'SELECT run_monthly_if_ready()'). CEO gets her reports at 6:05 AM without asking anyone'"
    weight: 0.30
    description: "Automation"
