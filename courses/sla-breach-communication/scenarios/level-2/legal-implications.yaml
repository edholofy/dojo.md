meta:
  id: legal-implications
  level: 2
  course: sla-breach-communication
  type: output
  description: "Navigate legal implications and contractual obligations of SLA breaches"
  tags: [legal, contracts, liability, indemnification, enforcement]

state: {}

trigger: |
  You're the VP Operations at "FinTech360" (payment processing SaaS) and just
  experienced a critical SLA breach. Your legal team and CFO need briefing on
  the financial and legal implications. Three separate customer situations
  require different approaches.

  SITUATION 1: Enterprise Customer (Contractual Limits)
  - Customer: "BigBank Inc" ($100K/month contract)
  - SLA: 99.95% uptime guarantee
  - Breach: 8-hour complete outage
  - Service credit per contract: 25% of monthly fee = $25,000 credit
  - Customer claiming: "$500K lost trading revenue"
  - Question: Are you liable for the $500K?
  - Contract clause: "SLA credits are sole remedy for breaches, 
    no liability for consequential damages"

  SITUATION 2: Customer in Healthcare (Regulatory)
  - Customer: "MediLabs" ($50K/month contract)
  - SLA: 99.9% uptime with HIPAA compliance
  - Breach: 4-hour outage + data breach (PHI exposed)
  - Service credit: 15% = $7,500
  - Regulatory impact: HIPAA breach notification required
  - Your exposure: State breach notification laws, HHS notification
  - Customer implication: Breach notification to affected patients
  - Question: What's your liability beyond service credit?

  SITUATION 3: Cascading Vendor Breach
  - Your customer: "DataCorp" ($20K/month contract)
  - Your SLA: 99% uptime
  - Root cause: AWS (your vendor) experienced 6-hour RDS outage
  - Your outage duration: 6 hours (affected 2,000 of DataCorp's customers)
  - Service credit owed to DataCorp: $3,000 (15% × $20K)
  - DataCorp's customer claims: $50K in lost sales
  - Your AWS contract: 99.95% SLA, cap $10K service credit
  - Question: Who bears the $50K cost?

  For each situation, address:
  1. Maximum financial exposure (best vs worst case)
  2. Contractual defenses (what protects you?)
  3. Regulatory obligations (must you disclose/report?)
  4. Indemnification (who pays whom?)
  5. Enforcement options (can you recover from vendors?)
  6. Insurance implications (covered by E&O or cyber policy?)
  7. Settlement recommendation (pay or fight in court?)

assertions:
  - type: llm_judge
    criteria: "Situation 1: Correctly identifies that 'sole remedy' clause limits liability to $25K service credit, customer has no claim for $500K consequential damages (contract language is key)"
    weight: 0.3
    description: "Contractual limits understood"

  - type: llm_judge
    criteria: "Situation 2: Correctly identifies HIPAA breach notification obligations (regardless of SLA), explains HHS notification requirements, identifies breach notification law applicability by state"
    weight: 0.3
    description: "Regulatory obligations identified"

  - type: llm_judge
    criteria: "Situation 3: Correctly applies cascading breach logic - AWS liable to you for $3K credit + your operational costs, you can pass through to customer, or recover from AWS via indemnification clause"
    weight: 0.25
    description: "Vendor indemnification concept applied"

  - type: llm_judge
    criteria: "All three situations address insurance applicability and whether claims should be submitted to E&O carrier"
    weight: 0.15
    description: "Insurance implications considered"
