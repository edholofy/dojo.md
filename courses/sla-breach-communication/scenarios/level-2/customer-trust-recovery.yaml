meta:
  id: customer-trust-recovery
  level: 2
  course: sla-breach-communication
  type: output
  description: "Recover customer trust after significant SLA breach"
  tags: [customer-success, trust-recovery, communication, retention, relationship-management]

state: {}

trigger: |
  You're the VP Customer Success at "DatabasePlus" (managed database SaaS).
  A critical customer is considering leaving after a 3-hour outage yesterday
  during their peak business hours. This customer:
  - Pays $15,000/month
  - Has 99.9% SLA with you
  - Lost $200,000 in revenue during the outage
  - Just received your automated service credit email (3% credit = $450)
  - Posted on Twitter: "DatabasePlus down for 3 hours during peak hours. 
    This is unacceptable for enterprise SLA."
  - Has NOT responded to your apology yet

  Historical context:
  - This is their FIRST outage with you (18 months of good service)
  - They're comparing you with competitor who offers 99.95% SLA
  - Their contract renews in 3 months
  - They have business-critical dependency on your service

  Your trust recovery plan must include:
  1. Personal outreach (who reaches out, when, how?)
  2. Transparency communication (what do you explain?)
  3. Compensation/remediation (is 3% credit enough? What else?)
  4. Enhanced service offerings (what can you do to restore confidence?)
  5. Relationship rebuilding (how do you prevent them from churning?)
  6. Executive engagement (do you loop in your CEO/executive?)
  7. Prevention assurance (what specific improvements prevent repeat?)

  Craft your response including:
  - Who should call them (ops person? executive? account manager?)
  - What should the call/message say (empathy, transparency, concrete actions)
  - What compensation offer (beyond the $450 credit)
  - What enhanced monitoring/support (to show you care)
  - What timeline (when do they get each touchpoint?)
  - Success metrics (how do you know trust is recovering?)

assertions:
  - type: llm_judge
    criteria: "Executive outreach (VP+ or CEO) recommended within 24 hours of Twitter post, showing customer criticality and executive awareness"
    weight: 0.25
    description: "Executive involvement appropriate"

  - type: llm_judge
    criteria: "Compensation includes: service credit + additional offset (month free, upgrade, or discount) + explicit acknowledgment that $450 credit inadequate for $200k loss"
    weight: 0.25
    description: "Compensation proportional to impact"

  - type: llm_judge
    criteria: "Enhanced service offerings include: dedicated support engineer, weekly calls with your team, prioritized access to CTO/engineering for technical guidance"
    weight: 0.25
    description: "Enhanced services show commitment"

  - type: llm_judge
    criteria: "Prevention plan includes specific improvements from postmortem (e.g., 'we've implemented connection timeout config to prevent similar events') + timeline"
    weight: 0.25
    description: "Prevention measures concrete"
