meta:
  id: sla-dashboard-design
  level: 2
  course: sla-breach-communication
  type: output
  description: "Design SLA monitoring dashboards for both internal operations and customer-facing transparency"
  tags: [SLA, dashboard, monitoring, metrics, intermediate]

state: {}

trigger: |
  You're a product operations manager at "CloudServe" (infrastructure
  SaaS, $40M ARR, 4,000 customers). The VP of Operations says: "We
  need two dashboards — one for internal SLA monitoring and one for
  customer-facing transparency."

  Current monitoring gaps:
  - No real-time view of SLA compliance across all customers
  - Service credits are calculated manually (takes 3 days after month)
  - Engineers find out about SLA breaches from customers, not from
    dashboards
  - Customers can see the status page but not their individual SLA
    performance
  - No predictive alerting — we only know about breaches after they
    happen

  Available data:
  - Uptime monitoring: per-region, per-service, every 30 seconds
  - Latency metrics: P50, P95, P99 per endpoint
  - Error rates: per endpoint, per customer
  - Support ticket data: response time, resolution time, severity
  - Customer contracts: SLA tier, custom terms, credit schedule
  - Historical performance: 2 years of data

  Tasks:
  1. Design the internal SLA operations dashboard:
     - What metrics and alerts should it show?
     - How do you visualize "SLA budget remaining" per customer tier?
     - What predictive alerts help prevent breaches before they happen?
     - Who should have access and what actions should it enable?

  2. Design the customer-facing SLA dashboard:
     - What should each customer see about their own SLA performance?
     - How do you present compliance data that builds trust?
     - What should you NOT show customers? (And why?)
     - How do you handle months with perfect compliance vs. breached?

  3. The VP asks: "Can the dashboard automatically trigger service
     credits?" Design the automated credit calculation workflow.

  4. A customer sees their dashboard shows 99.92% uptime but your
     internal dashboard shows 99.95% for the same period. Why might
     these differ, and how do you reconcile?

assertions:
  - type: llm_judge
    criteria: "Internal dashboard includes predictive alerts — proposes 'SLA budget remaining' meters that alert when usage approaches thresholds (e.g., 80% of monthly budget consumed)"
    weight: 0.25
    description: "Predictive internal alerting"
  - type: llm_judge
    criteria: "Customer dashboard builds trust — shows individual customer's SLA metrics clearly, with historical trend, and doesn't hide bad months"
    weight: 0.25
    description: "Trust-building customer dashboard"
  - type: llm_judge
    criteria: "Automated credits workflow has guardrails — proposes automation for standard calculations with human review for unusual amounts or custom SLA terms"
    weight: 0.25
    description: "Guarded automated credits"
  - type: llm_judge
    criteria: "Measurement discrepancy is explained — identifies possible causes (different monitoring points, regional vs global measurement, exclusion windows, rounding) and proposes a single source of truth"
    weight: 0.25
    description: "Measurement discrepancy explanation"
