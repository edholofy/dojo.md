meta:
  id: sla-credit-negotiation
  level: 2
  course: sla-breach-communication
  type: output
  description: "Negotiate SLA credit requests from customers who believe the standard credit is insufficient for their business impact"
  tags: [SLA, credits, negotiation, compensation, intermediate]

state: {}

trigger: |
  You're a customer success manager at "LogiTrack" (logistics SaaS,
  $60M ARR). After a 3-hour outage last week, several customers are
  requesting compensation beyond the standard SLA credits.

  Standard SLA credit schedule:
  - 99.0-99.9% uptime: 10% of monthly fee
  - 98.0-99.0%: 25%
  - Below 98.0%: 50%

  3 negotiation scenarios:

  Scenario 1: "TransCo" ($36K/year)
  Standard credit owed: $300 (10% of $3,000/month)
  Customer's position: "Your outage caused us to miss 50 delivery
  windows. Each missed delivery costs us $200 in penalties from OUR
  customers. That's $10,000 in losses. $300 doesn't cut it."
  They want: $10,000 credit or 3 months free

  Scenario 2: "QuickShip" ($180K/year)
  Standard credit owed: $1,500 (10% of $15,000/month)
  Customer's position: "We're your biggest logistics customer. This is
  the second outage this quarter. We're evaluating Competitor X, who
  is offering us a deal."
  They want: 50% credit ($7,500) + guaranteed SLA improvement

  Scenario 3: "LocalDeliver" ($6K/year)
  Standard credit owed: $50 (10% of $500/month)
  Customer's position: "I'm a small business. Every minute of downtime
  hurts me more than your big customers. $50 means nothing."
  They want: 1 month free ($500)

  Your authority: You can approve up to 25% of annual contract value
  in credits without manager approval. Above that needs VP approval.

  Tasks:
  1. For each scenario, propose your counter-offer. What can you
     offer within your authority? When should you escalate?

  2. TransCo claims $10,000 in losses from missed deliveries. Your
     SLA contract limits liability to service credits. How do you
     handle the gap between contractual obligation and customer
     expectation?

  3. QuickShip is leveraging a competitor offer. How do you negotiate
     when the customer has alternatives?

  4. When does it make business sense to exceed standard SLA credits?
     Define the criteria for going above and beyond.

assertions:
  - type: llm_judge
    criteria: "Counter-offers are creative — proposes alternatives beyond cash credits (extended contract, feature upgrade, dedicated support, custom SLA addendum) rather than just negotiating dollar amounts"
    weight: 0.25
    description: "Creative counter-offers"
  - type: llm_judge
    criteria: "Contractual vs expectation gap is navigated carefully — acknowledges TransCo's business impact empathetically while explaining contractual limitations without dismissing their concern"
    weight: 0.25
    description: "Gap navigation between contract and expectation"
  - type: llm_judge
    criteria: "Competitive leverage is countered with value — responds to QuickShip's competitor threat by emphasizing switching costs, existing relationship value, and improvement commitments"
    weight: 0.25
    description: "Value-based competitive response"
  - type: llm_judge
    criteria: "Criteria for exceeding credits are defined — proposes rules like customer size, churn risk, repeat offenses, or strategic importance as triggers for above-standard credits"
    weight: 0.25
    description: "Defined exceeding criteria"
