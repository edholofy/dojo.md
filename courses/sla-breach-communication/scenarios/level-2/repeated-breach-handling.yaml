meta:
  id: repeated-breach-handling
  level: 2
  course: sla-breach-communication
  type: output
  description: "Handle repeated SLA breaches where the same customer has been impacted multiple times, eroding trust and threatening retention"
  tags: [SLA, repeated, trust, retention, intermediate]

state: {}

trigger: |
  You're a customer success manager at "DataPipe" (data integration
  platform, $30M ARR). One of your enterprise customers, "FinServ
  Corp" ($120K/year), has experienced 4 SLA breaches in the past 6
  months:

  Breach 1 (6 months ago): 2-hour outage due to deployment error
  - Service credit: $1,000 issued
  - Postmortem: Promised deployment process improvements
  - Customer reaction: "Understood, these things happen"

  Breach 2 (4 months ago): 45-minute outage due to database failure
  - Service credit: $500 issued
  - Postmortem: Promised database redundancy improvements
  - Customer reaction: "This is becoming a pattern"

  Breach 3 (2 months ago): 30-minute outage due to... deployment error
  - Service credit: $500 issued
  - Postmortem: Same root cause as Breach 1
  - Customer reaction: "You promised to fix this. You didn't."

  Breach 4 (this week): 90-minute outage due to capacity limits
  - Service credit: $1,200 owed
  - Root cause: Traffic spike exceeded infrastructure capacity
  - Customer reaction: "I need to talk to your VP. We're evaluating
    alternatives."

  The customer's VP of Engineering emails your VP:
  "We've been patient through 4 outages in 6 months. Your SLA says
  99.9% uptime but we're seeing 99.5%. The service credits don't
  begin to cover our business impact. We need either (a) a concrete
  improvement plan with milestones, (b) a significant contract
  discount, or (c) an exit from this contract."

  Tasks:
  1. Write the VP-to-VP response that addresses the customer's 3
     options (improvement plan, discount, or exit).

  2. The customer's most damaging point: Breach 3 was the same root
     cause as Breach 1. How do you address the broken promise?

  3. Design the customer-specific improvement plan with milestones
     that the customer can track.

  4. At what point should you proactively offer a contract discount
     or extension to retain the customer? What's the retention math?

assertions:
  - type: llm_judge
    criteria: "VP response takes full accountability — doesn't make excuses, acknowledges the pattern, and addresses the broken promise from Breach 1→3 directly"
    weight: 0.25
    description: "Full accountability in VP response"
  - type: llm_judge
    criteria: "Improvement plan has measurable milestones — proposes specific targets (e.g., 'deployment automation by March 15', 'capacity auto-scaling by April 1') that the customer can verify"
    weight: 0.25
    description: "Measurable improvement milestones"
  - type: llm_judge
    criteria: "Retention math is calculated — compares the cost of a discount or extended credit against the $120K/year revenue at risk, making a data-driven retention decision"
    weight: 0.25
    description: "Data-driven retention math"
  - type: llm_judge
    criteria: "Broken promise is addressed head-on — explains why the Breach 1 fix didn't prevent Breach 3, what went wrong with the remediation, and what's different this time"
    weight: 0.25
    description: "Broken promise addressed directly"
