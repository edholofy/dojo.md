meta:
  id: internal-breach-escalation
  level: 2
  course: sla-breach-communication
  type: output
  description: "Navigate internal SLA breach escalation — coordinating between engineering, leadership, legal, and customer success during an active breach"
  tags: [SLA, escalation, internal, coordination, intermediate]

state: {}

trigger: |
  You're the on-duty SLA manager at "FinTechPay" (payment processing,
  $100M ARR, 5,000 merchants). A P1 incident is unfolding and you're
  the central coordinator.

  10:00 AM — Incident detected: Payment processing latency exceeds
  SLA thresholds. 20% of transactions are timing out.

  Your escalation responsibilities:
  - Engineering: Need them to fix the issue
  - VP Engineering: Need to know about P1 within 15 minutes
  - Customer Success: Need to notify affected merchants
  - Legal: Need to know if breach triggers contractual penalties
  - CFO: Need to know estimated financial exposure
  - CEO: Needs to know if this is "board-level"

  Current situation at 10:30 AM:
  - Engineering says: "We think it's the new database migration. We
    might need to roll back, which will take 2 hours."
  - VP Engineering says: "Don't roll back yet. Let me look at it."
  - 500 merchants have been affected for 30 minutes
  - 15 merchants have called support angry
  - Legal says: "We have 3 merchants with custom SLAs that include
    financial penalties beyond standard credits. Check their contracts."
  - The CEO is in a meeting with investors and asks: "Is this
    contained? Can it wait 2 hours?"

  11:00 AM — Situation worsens:
  - Transaction failures increase from 20% to 40%
  - VP Engineering and Engineering disagree: rollback vs hotfix
  - 3 merchants have disabled their PayStream integration and are
    processing payments manually
  - One merchant's CFO is threatening to go to the press

  Tasks:
  1. Write the internal escalation messages for each stakeholder at
     10:30 AM. What does each person need to know?

  2. Engineering and VP Engineering disagree on the fix approach. How
     do you facilitate a decision when technical leaders disagree
     during an active incident?

  3. The CEO asks if it can wait 2 hours. How do you communicate the
     situation's urgency without being alarmist?

  4. Design the internal war room communication protocol for P1
     incidents. Who updates whom, how often, and through what channel?

assertions:
  - type: llm_judge
    criteria: "Stakeholder messages are tailored — engineering gets technical details, CFO gets financial exposure estimate, CEO gets a 2-sentence business impact summary, legal gets contract references"
    weight: 0.25
    description: "Tailored stakeholder messages"
  - type: llm_judge
    criteria: "Technical disagreement is facilitated with a deadline — proposes a time-boxed decision (e.g., 'if hotfix doesn't work in 15 minutes, we roll back') rather than letting the debate continue during an active incident"
    weight: 0.25
    description: "Time-boxed technical decision"
  - type: llm_judge
    criteria: "CEO message conveys urgency without panic — uses quantified impact (40% failure rate, $X at risk, merchants disconnecting) to justify interrupting the investor meeting"
    weight: 0.25
    description: "Quantified urgency to CEO"
  - type: llm_judge
    criteria: "War room protocol has clear roles — defines incident commander, communication lead, and technical lead with specific update frequencies (e.g., every 15 minutes)"
    weight: 0.25
    description: "Clear war room protocol"
