meta:
  id: multi-tier-sla-management
  level: 2
  course: sla-breach-communication
  type: output
  description: "Design and manage differentiated SLAs across customer tiers"
  tags: [multi-tier, pricing, customer-segmentation, differentiation]

state: {}

trigger: |
  You're designing the SLA tiers for "CloudServe" (cloud infrastructure provider).
  You have three customer segments with vastly different needs and willingness to pay.

  Current situation:
  - All customers get same SLA: 99% uptime, 8-hour response time
  - Profit margin declining on small customers
  - Enterprise customers demanding better SLAs (99.9%+)
  - No differentiation, hard to justify premium pricing

  Design three SLA tiers that:
  1. Clearly differentiate service levels
  2. Align with customer willingness to pay
  3. Scale operationally (don't require 3x support team)
  4. Justify price differences (customers understand the value)

  Target Customer Segments:

  BRONZE TIER (Cost-conscious, non-critical):
  - SMBs with limited budgets
  - Non-critical workloads
  - Can tolerate occasional downtime
  - Price sensitivity: High
  - Expected price: $100-500/month

  SILVER TIER (Growing businesses, important but not critical):
  - Mid-market companies
  - Important but not mission-critical
  - Some SLA breaches would impact operations
  - Price sensitivity: Medium
  - Expected price: $500-2,000/month

  GOLD TIER (Enterprise, mission-critical):
  - Large enterprises, mission-critical infrastructure
  - 1 hour of downtime = significant revenue loss
  - Demand 24/7 support and rapid response
  - Price sensitivity: Low
  - Expected price: $2,000+/month (4-20x Bronze)

  Your tier design must specify:
  1. Uptime SLA for each tier (90%, 95%, 99%, 99.9%, 99.99%)
  2. Response times (by severity level)
  3. Support hours (24/7 vs business vs email)
  4. Service credits and caps
  5. Monitoring/reporting capabilities
  6. Premium features (dedicated support, API quotas, etc)
  7. Transition rules (how customers move between tiers)

  Also address:
  - How do you operationally support 99.9% without tripling costs?
  - Why would a customer choose Silver over Bronze?
  - How do you migrate Bronze customer to Silver (upgrade path)?
  - What prevents margin collapse on Bronze tier?

assertions:
  - type: llm_judge
    criteria: "Bronze tier offers 90-95% uptime, email support, 24-48 hour response, adequate for non-critical workloads"
    weight: 0.25
    description: "Bronze tier appropriately positioned"

  - type: llm_judge
    criteria: "Silver tier offers 99% uptime, business-hours support, 4-8 hour response, clear upgrade value vs Bronze"
    weight: 0.25
    description: "Silver tier clearly differentiated"

  - type: llm_judge
    criteria: "Gold tier offers 99.9% uptime, 24/7 support, 1-2 hour response, dedicated engineer, executive reviews"
    weight: 0.25
    description: "Gold tier positioned for enterprise"

  - type: llm_judge
    criteria: "Operationally designed to avoid 3x cost for Gold: shared infrastructure with tier-specific monitoring, tiered escalation (Gold gets priority), auto-scaling to handle load"
    weight: 0.25
    description: "Economic model addresses cost sustainability"
