meta:
  id: customer-reaction-handling
  level: 1
  course: sla-breach-communication
  type: output
  description: "Handle common customer reactions to SLA breaches — from anger and frustration to demands for compensation beyond the SLA terms"
  tags: [SLA, customer-reactions, de-escalation, fundamentals]

state: {}

trigger: |
  You're a customer success associate at "StreamData" (real-time data
  platform, 3,000 customers). After a 2-hour outage that breached the
  SLA for all customers, you're handling the aftermath. Different
  customers are reacting differently.

  Customer 1 — The Angry Customer:
  "This is absolutely unacceptable. We lost $50,000 in revenue because
  your platform was down during our biggest sales event of the year.
  Your 25% service credit on a $3,000 monthly bill is a JOKE. $750
  doesn't cover our losses. I want full compensation."

  Customer 2 — The Understanding Customer:
  "Hey, we noticed the outage. No worries, these things happen. Just
  wanted to check — is everything stable now? And should we expect
  the service credit automatically?"

  Customer 3 — The Legal Threat Customer:
  "I've forwarded this incident to our legal team. Your SLA guarantees
  99.9% uptime and you failed to deliver. We expect compensation
  beyond the service credit. If we don't hear back with a satisfactory
  resolution by Friday, we'll proceed with legal action."

  Customer 4 — The Silent Customer:
  This customer hasn't said anything. But your analytics show they
  were heavily impacted (their data pipeline was down for the full
  2 hours) and they have their contract renewal in 30 days.

  Customer 5 — The Social Media Customer:
  "@StreamData is DOWN AGAIN! Second time this quarter. Moving to
  @CompetitorX. #unreliable #SLAfail" (Posted on Twitter with 500
  retweets)

  Tasks:
  1. Write a response to each of the 5 customers.

  2. Customer 1 wants $50,000 in compensation but your SLA limits
     credits to 25% of monthly fee. How do you handle the gap between
     their expectation and your contractual obligation?

  3. Customer 4 hasn't complained but is at high churn risk. What
     proactive outreach should you do?

  4. Customer 5 is on social media. What's your response strategy
     for public SLA complaints? Do you respond publicly, privately,
     or both?

assertions:
  - type: llm_judge
    criteria: "Angry customer response is empathetic but bounded — acknowledges the $50K impact and frustration without promising compensation beyond the SLA terms, while exploring what additional support is possible"
    weight: 0.25
    description: "Empathetic but bounded response"
  - type: llm_judge
    criteria: "Silent customer gets proactive outreach — recognizes that silence before renewal is a churn signal and proposes personal outreach acknowledging the impact"
    weight: 0.25
    description: "Proactive silent customer outreach"
  - type: llm_judge
    criteria: "Social media response is both public and private — responds publicly to show the company cares, then moves the conversation to DM for specifics"
    weight: 0.25
    description: "Public and private social response"
  - type: llm_judge
    criteria: "Legal threat response doesn't make admissions — responds professionally, offers to discuss concerns, but doesn't admit liability or make promises that legal hasn't approved"
    weight: 0.25
    description: "Professional legal response"
