meta:
  id: customer-notification-initial
  level: 1
  course: sla-breach-communication
  type: output
  description: "Write initial customer notifications for SLA breaches"
  tags: [communication, notification, customer-facing, transparency]

state: {}

trigger: |
  You're the Customer Success Manager at "HostOne" (web hosting provider).
  Three SLA breaches just occurred. Write initial breach notifications for
  each customer within 30 minutes of detection.

  Breach Scenario 1: Enterprise Customer (99.9% SLA)
  - Service: Managed hosting
  - Monthly fee: $5,000
  - Status: Database server experienced unplanned 2-hour outage
  - Impact: Customer's e-commerce site completely offline
  - Detection time: 8:15 AM
  - Expected resolution: 10:30 AM (2.5 hours total)
  - Affected traffic: 15,000 daily active users

  Breach Scenario 2: Mid-Market Customer (99% SLA)
  - Service: Email hosting
  - Monthly fee: $1,200
  - Status: Email delivery delays (not full outage)
  - Impact: Emails taking 2-4 hours to deliver (vs normal 2 minutes)
  - Duration: 1.5 hours so far
  - Root cause: SUSPECTED DNS issue (under investigation)
  - Affected mailboxes: 500 users

  Breach Scenario 3: Startup Customer (95% SLA)
  - Service: Managed hosting
  - Monthly fee: $300
  - Status: Partial service degradation
  - Impact: Page load times 5-8 seconds (vs normal 1-2 seconds)
  - Duration: 45 minutes ongoing
  - Root cause: Neighboring customer's database query consuming resources
  - Status: Being investigated

  For each, write a notification that includes:
  1. Clear statement of what happened and when
  2. Customer impact (explicit, quantified where possible)
  3. Current status and expected resolution time
  4. What you're doing about it
  5. Where to find updates (status page URL, contact method)
  6. NO apology yet (save for post-breach review)

assertions:
  - type: llm_judge
    criteria: "Enterprise notification leads with service impact (site offline), includes timeline (detected 8:15, expected fixed 10:30), and acknowledges criticality"
    weight: 0.25
    description: "Enterprise notification appropriate urgency"

  - type: llm_judge
    criteria: "Mid-market notification clearly explains partial impact (delivery delays not full outage) and notes investigation status for DNS issue"
    weight: 0.25
    description: "Mid-market notification clarity on partial outage"

  - type: llm_judge
    criteria: "Startup notification acknowledges issue but notes it's within 95% SLA terms (degradation not full outage)"
    weight: 0.25
    description: "Startup notification appropriately manages expectations"

  - type: llm_judge
    criteria: "All notifications avoid apologizing, focus on facts and transparency, and provide clear resolution expectations"
    weight: 0.25
    description: "Factual, non-defensive tone across all three"
