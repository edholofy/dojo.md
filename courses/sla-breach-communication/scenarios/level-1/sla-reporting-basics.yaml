meta:
  id: sla-reporting-basics
  level: 1
  course: sla-breach-communication
  type: output
  description: "Learn to create basic SLA compliance reports for customers showing uptime, incident history, and performance metrics"
  tags: [SLA, reporting, compliance, metrics, fundamentals]

state: {}

trigger: |
  You're a customer success associate at "CloudAPI" (API management
  platform, 2,500 customers). Enterprise customers receive monthly
  SLA compliance reports. Your manager asks you to prepare reports
  for 3 customers.

  Customer data for January:

  Customer 1: "TechStart" (Pro tier, SLA: 99.9% uptime)
  - Total downtime: 28 minutes
  - Incidents: 2 (15 min on Jan 8, 13 min on Jan 22)
  - API latency: average 120ms (SLA: <200ms)
  - Error rate: 0.03% (SLA: <0.1%)
  - Support tickets: 4 (all resolved within SLA)

  Customer 2: "FinanceGo" (Enterprise tier, SLA: 99.99% uptime)
  - Total downtime: 8 minutes
  - Incidents: 1 (8 min on Jan 15 — database failover)
  - API latency: average 45ms (SLA: <100ms)
  - Error rate: 0.01% (SLA: <0.05%)
  - Support tickets: 2 (1 resolved within SLA, 1 missed by 30 min)

  Customer 3: "RetailMax" (Enterprise tier, SLA: 99.99% uptime)
  - Total downtime: 0 minutes
  - Incidents: 0
  - API latency: average 85ms (SLA: <100ms)
  - Error rate: 0.008% (SLA: <0.05%)
  - Support tickets: 7 (all resolved within SLA)
  - Note: Latency spiked to 95ms on Jan 28 (within SLA but close)

  January has 31 days = 44,640 minutes.

  Tasks:
  1. Calculate the uptime percentage for each customer. Which ones
     met their SLA?

  2. Create a simple SLA report for Customer 2 (FinanceGo) that
     includes: uptime percentage, incident summary, latency metrics,
     error rate, and support ticket SLA compliance.

  3. Customer 2 missed their SLA on both uptime (8 minutes exceeds
     99.99% = 4.46 minutes max) and 1 support ticket. How do you
     present this in the report without being defensive?

  4. Customer 3 had perfect uptime but their latency is approaching
     the SLA limit (85ms vs 100ms). Should the report mention this
     as a concern?

assertions:
  - type: llm_judge
    criteria: "Uptime calculations are correct — TechStart: 99.94% (meets 99.9%), FinanceGo: 99.98% (misses 99.99%), RetailMax: 100% (meets 99.99%)"
    weight: 0.25
    description: "Correct uptime calculations"
  - type: llm_judge
    criteria: "FinanceGo report presents breaches clearly — states the SLA was missed on uptime and one support ticket, without burying the bad news in good metrics"
    weight: 0.25
    description: "Clear breach presentation"
  - type: llm_judge
    criteria: "Report is professional format — includes a summary section, detailed metrics table, incident log, and action items in a format a customer executive can quickly scan"
    weight: 0.25
    description: "Professional report format"
  - type: llm_judge
    criteria: "RetailMax latency concern is mentioned proactively — even though SLA is met, flagging that latency is at 85% of the SLA limit shows proactive monitoring and builds trust"
    weight: 0.25
    description: "Proactive near-miss reporting"
