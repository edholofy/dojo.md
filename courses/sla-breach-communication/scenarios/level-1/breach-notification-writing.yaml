meta:
  id: breach-notification-writing
  level: 1
  course: sla-breach-communication
  type: output
  description: "Write clear, professional SLA breach notification emails to customers that acknowledge the issue and set expectations"
  tags: [SLA, breach, notification, writing, fundamentals]

state: {}

trigger: |
  You're a customer success associate at "DataSync" (data integration
  platform, 3,000 customers). Three SLA breaches occurred this week
  and you need to write notification emails for each.

  Breach 1: Uptime SLA missed
  - Customer: MidSize Corp (Business tier, $2,000/month)
  - SLA: 99.95% uptime (max 21.6 minutes/month)
  - Actual downtime: 45 minutes (unexpected API outage)
  - Impact: Customer's data sync jobs failed for 45 minutes
  - Service credit: 10% = $200
  - Root cause: A deployment error took down the API gateway
  - Status: Resolved. Fix deployed and verified.

  Breach 2: Response time SLA missed
  - Customer: BigTech Inc (Enterprise tier, $15,000/month)
  - SLA: P1 response within 15 minutes
  - Actual response: 38 minutes
  - Impact: Customer reported a critical data loss issue but waited
    38 minutes for first response
  - Reason: The on-call engineer was handling another P1 incident
  - Status: Response delivered at 38 min. Issue itself was resolved
    in 2 hours (within resolution SLA).

  Breach 3: Resolution time SLA missed
  - Customer: StartupCo (Starter tier, $500/month)
  - SLA: P2 resolution within 8 hours
  - Actual resolution: 14 hours
  - Impact: Customer's reporting dashboard was unavailable
  - Reason: Required a database migration that took longer than
    expected
  - Status: Resolved. Dashboard fully operational.

  Tasks:
  1. Write the breach notification email for each customer. Each email
     should include: acknowledgment, what happened, impact, service
     credit (if applicable), what you're doing to prevent recurrence.

  2. How does the tone differ between the $15,000/month enterprise
     customer vs the $500/month starter customer?

  3. Breach 2 (response time) didn't cause additional damage — the
     issue was still resolved within SLA. Should you still notify the
     customer? Why or why not?

  4. Write a brief internal summary for your manager covering all 3
     breaches.

assertions:
  - type: llm_judge
    criteria: "Emails are structured and complete — each notification includes: acknowledgment of the breach, what happened, customer impact, remediation steps, and prevention measures"
    weight: 0.25
    description: "Complete breach notifications"
  - type: llm_judge
    criteria: "Tone is appropriately different — enterprise customer gets more detailed, personalized communication; starter customer gets clear but more concise notification"
    weight: 0.25
    description: "Tier-appropriate tone"
  - type: llm_judge
    criteria: "Response time breach is still communicated — transparency requires notifying about the response SLA miss even though resolution was on time, but the communication can emphasize the successful resolution"
    weight: 0.25
    description: "Transparent response time reporting"
  - type: llm_judge
    criteria: "Internal summary is concise and actionable — covers all 3 breaches in a format the manager can quickly scan, including customer impact and any required follow-up"
    weight: 0.25
    description: "Concise internal summary"
