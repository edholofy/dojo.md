meta:
  id: proactive-communication
  level: 1
  course: sla-breach-communication
  type: output
  description: "Learn the importance of proactive SLA breach communication — notifying customers before they discover the problem themselves"
  tags: [SLA, proactive, communication, trust, fundamentals]

state: {}

trigger: |
  You're a customer success associate at "HostPro" (web hosting, 8,000
  customers). Your monitoring system detected an issue at 2:15 PM:

  Issue: Database cluster performance degradation
  - Response times increased from 50ms to 800ms
  - Not a complete outage — sites are loading slowly but still working
  - Affects ~500 customers on Cluster B
  - Engineering is investigating, ETA for fix: unknown
  - SLA commitment: 99.9% uptime (performance degradation counts as
    partial downtime in your SLA)

  Timeline of events:
  - 2:15 PM: Monitoring alerts fire
  - 2:20 PM: Engineering confirms the issue
  - 2:25 PM: You learn about it (NOW)
  - Current time: 2:25 PM

  No customers have contacted support yet about the issue. You have
  a choice:

  Option A: Wait to see if engineering fixes it quickly. If they fix
  it in the next 15 minutes, most customers may never notice.

  Option B: Immediately notify all 500 affected customers. This
  confirms there's a problem even to customers who haven't noticed.

  Option C: Update the status page only. Customers who check will see
  it; those who don't won't be bothered.

  Option D: Notify only Enterprise customers (50 of 500) proactively.
  Let others discover it via status page.

  Tasks:
  1. Which option do you choose? Justify your decision.

  2. If you choose proactive notification, write the message to send
     to affected customers at 2:25 PM (10 minutes into the issue,
     no fix yet).

  3. At 2:45 PM (30 minutes in), engineering says "fix will take
     another 60 minutes." Write the update.

  4. At 3:50 PM (95 minutes in), the issue is resolved. Write the
     resolution notification.

  5. What's the risk of OVER-communicating? Can proactive notifications
     ever backfire?

assertions:
  - type: llm_judge
    criteria: "Proactive communication is chosen — selects Option B or D (notifying customers) over waiting, understanding that discovering an issue yourself feels worse than being told"
    weight: 0.25
    description: "Proactive approach chosen"
  - type: llm_judge
    criteria: "Initial message is honest about uncertainty — at 2:25 PM, acknowledges the issue and impact without promising a fix time that isn't known yet"
    weight: 0.25
    description: "Honest uncertain initial message"
  - type: llm_judge
    criteria: "Update at 2:45 PM provides new information — doesn't just repeat the initial message but adds the 60-minute ETA and any additional context about what's being done"
    weight: 0.25
    description: "Value-adding update message"
  - type: llm_judge
    criteria: "Over-communication risk is acknowledged — identifies that excessive alerts can cause alert fatigue, panic, or erode trust if issues are minor, while still favoring transparency for significant issues"
    weight: 0.25
    description: "Over-communication risk awareness"
