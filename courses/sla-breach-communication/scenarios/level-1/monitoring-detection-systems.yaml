meta:
  id: monitoring-detection-systems
  level: 1
  course: sla-breach-communication
  type: output
  description: "Design real-time SLA breach detection and monitoring systems"
  tags: [monitoring, detection, early-warning, systems]

state: {}

trigger: |
  You're designing the SLA monitoring infrastructure for "CloudPlatform" (IaaS
  provider). The goal is to detect SLA breaches faster and prevent them
  proactively. You need to define:

  1. Detection thresholds (at what point do you trigger alerts?)
  2. Alert escalation paths (who gets notified and when?)
  3. Early warning system (what predicts a breach before it happens?)
  4. Measurement frequency (how often do you check metrics?)

  Current pain points:
  - Manual calculation of SLA metrics (takes 4 hours after breach)
  - Threshold-based alerts flood ops with false positives
  - No predictive capability (breeches discovered after they happen)
  - Customers sometimes learn about outages from Twitter before your team

  Design Requirements:
  - 80% faster detection than current manual process
  - 75% reduction in false positive alerts
  - Predictive alerts for impending breaches
  - Automated customer notification within 5 minutes of breach detection
  - Color-coded severity system (green, yellow, red)

  For your system design, address:
  1. Real-time data collection (what metrics, how often?)
  2. Breach detection logic (thresholds and rules)
  3. Early warning signals (trend analysis, velocity of change)
  4. Alert routing (who sees what, based on severity)
  5. Escalation paths (time-based escalation, war room triggers)
  6. Alert fatigue reduction (context, severity levels)

assertions:
  - type: llm_judge
    criteria: "Design includes automated collection at 1-minute intervals for uptime metrics, with real-time calculation vs 4-hour manual baseline"
    weight: 0.2
    description: "Real-time data collection defined"

  - type: llm_judge
    criteria: "Breach detection uses multiple thresholds: 75% warning → 90% escalation → 100% breach, with context (not just threshold crossing)"
    weight: 0.25
    description: "Threshold logic reduces false positives"

  - type: llm_judge
    criteria: "Early warning system includes trend analysis (moving average, velocity of change) to predict breaches 15-30 minutes before they occur"
    weight: 0.25
    description: "Predictive capability included"

  - type: llm_judge
    criteria: "Alert routing includes on-call engineer (P1), manager (P2), and leadership (P3), with automatic war room creation for critical breaches"
    weight: 0.3
    description: "Escalation paths clear and automated"
