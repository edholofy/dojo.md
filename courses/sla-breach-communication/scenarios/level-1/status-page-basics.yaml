meta:
  id: status-page-basics
  level: 1
  course: sla-breach-communication
  type: output
  description: "Learn to write clear status page updates during incidents that keep customers informed without causing unnecessary panic"
  tags: [SLA, status-page, incidents, updates, fundamentals]

state: {}

trigger: |
  You're the communications lead during an incident at "StorePlatform"
  (e-commerce platform, 6,000 online stores). Your status page
  (status.storeplatform.com) is the primary channel for incident
  communication.

  Incident timeline:
  - 10:00 AM: Monitoring detects checkout failures for ~30% of stores
  - 10:05 AM: Engineering confirms the issue
  - 10:10 AM: Status page needs first update (NOW)
  - 10:30 AM: Root cause identified (payment provider API degradation)
  - 10:45 AM: Workaround deployed (fallback payment processor)
  - 11:15 AM: Payment provider confirms their issue is resolved
  - 11:30 AM: Full service restored, monitoring stable

  Your status page has these components to update:
  - Checkout Service: [Operational / Degraded / Partial Outage / Major Outage]
  - Payment Processing: [Operational / Degraded / Partial Outage / Major Outage]
  - Dashboard: [Operational]
  - API: [Operational]

  Tasks:
  1. Write status page updates for each timestamp in the timeline
     (10:10 AM, 10:30 AM, 10:45 AM, 11:15 AM, 11:30 AM). For each,
     include the component status and a brief description.

  2. At 10:10 AM, you don't know the root cause yet. How do you
     communicate uncertainty without saying "we have no idea what's
     wrong"?

  3. At 10:30 AM, the root cause is your payment provider's API. Do
     you name the third-party provider on your status page? Why or
     why not?

  4. After resolution at 11:30 AM, do you post a follow-up incident
     report? If so, what should it include?

assertions:
  - type: llm_judge
    criteria: "Updates are progressive and add new information — each update provides something new (investigating → identified → workaround → monitoring → resolved) rather than repeating the same message"
    weight: 0.25
    description: "Progressive status updates"
  - type: llm_judge
    criteria: "10:10 AM update communicates honestly — uses language like 'investigating an issue affecting checkout' rather than claiming to know more than they do, while conveying the team is actively working"
    weight: 0.25
    description: "Honest uncertainty communication"
  - type: llm_judge
    criteria: "Third-party naming decision is reasoned — either names the provider (transparency) or doesn't (relationship preservation) with a clear rationale for the choice"
    weight: 0.25
    description: "Reasoned third-party naming"
  - type: llm_judge
    criteria: "Post-incident report includes key elements — covers what happened, impact (duration, affected stores), root cause, and prevention steps"
    weight: 0.25
    description: "Complete post-incident report"
