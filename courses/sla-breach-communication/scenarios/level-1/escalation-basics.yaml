meta:
  id: escalation-basics
  level: 1
  course: sla-breach-communication
  type: output
  description: "Learn basic SLA breach escalation procedures — when, how, and to whom to escalate SLA-related issues"
  tags: [SLA, escalation, procedures, fundamentals]

state: {}

trigger: |
  You're a Tier 1 support agent at "PayFlow" (payment processing
  platform, 4,000 merchants). It's your first week handling SLA
  escalations. Your manager gives you the escalation matrix:

  Escalation Matrix:
  | Severity | First Response | Escalation if unresolved after: | Escalate to: |
  |----------|---------------|----------------------------------|--------------|
  | P1       | 15 min        | 30 min                          | VP Engineering |
  | P2       | 1 hour        | 2 hours                         | Eng Manager |
  | P3       | 4 hours       | 8 hours                         | Team Lead |
  | P4       | 24 hours      | 48 hours                        | Team Lead |

  5 situations arise during your shift:

  Situation 1: A P1 ticket was opened 25 minutes ago. An engineer is
  working on it but hasn't found the root cause yet. The escalation
  threshold is 30 minutes. Do you escalate now or wait 5 more minutes?

  Situation 2: A customer is calling every 10 minutes demanding to
  speak to a manager. Their issue is classified as P3 (workaround
  exists) and was filed 2 hours ago. They want it escalated to P1.

  Situation 3: An engineer resolved a P2 ticket at 7 hours 50 minutes
  (10 minutes before the 8-hour resolution SLA). But the customer
  reports the fix didn't actually work. The clock is still running.

  Situation 4: It's 5 PM Friday. A P2 ticket was filed at 3 PM.
  The on-call engineer is transitioning to the weekend team. The
  resolution SLA is 8 hours (11 PM). Who owns this now?

  Situation 5: A P1 incident is affecting 200 merchants. You've
  escalated to the VP of Engineering per the matrix. The VP says
  "I'm in a meeting, handle it." What do you do?

  Tasks:
  1. For each situation, what's the right action? Explain your
     reasoning based on the escalation matrix and SLA timelines.

  2. Situation 2: The customer wants a severity upgrade. What criteria
     would justify changing from P3 to P1? Is their frustration a
     valid reason?

  3. Situation 5: Your VP is unavailable during a P1 incident. Write
     the escalation message you'd send and identify the next person
     to contact.

  4. What makes a good escalation message? Write a template with the
     essential information for any SLA escalation.

assertions:
  - type: llm_judge
    criteria: "Situation 1 is escalated proactively — at 25 minutes into a 30-minute threshold, the right call is to prepare the escalation now rather than waiting for the deadline to pass"
    weight: 0.25
    description: "Proactive escalation timing"
  - type: llm_judge
    criteria: "Customer frustration alone doesn't change severity — Situation 2 stays P3 unless the workaround stopped working or business impact changed; frustration is understandable but severity is objective"
    weight: 0.25
    description: "Objective severity criteria"
  - type: llm_judge
    criteria: "VP unavailability has a backup plan — identifies the next person in the escalation chain (CTO, another VP, senior engineering director) rather than just waiting"
    weight: 0.25
    description: "Escalation backup plan"
  - type: llm_judge
    criteria: "Escalation template includes essential info — covers: customer name, severity, SLA status, what's been tried, current impact, and what's needed from the escalation target"
    weight: 0.25
    description: "Complete escalation template"
