meta:
  id: sla-types-and-components
  level: 1
  course: sla-breach-communication
  type: output
  description: "Identify and classify different SLA types and components"
  tags: [sla-fundamentals, types, components, uptime, response-time]

state: {}

trigger: |
  You work at "CloudServe" (cloud infrastructure provider). You're designing
  SLAs for three customer segments. For each scenario below, classify the SLA
  type, identify the key components, and explain what metrics matter most.

  Scenario 1: Enterprise Customer (100 employees, mission-critical production)
  - They run financial analysis software on your cloud platform
  - 1 hour of downtime costs them ~$50,000 in lost productivity
  - They need 24/7 support and immediate notification of any issues

  Scenario 2: Mid-Market Customer (30 employees, business-critical)
  - They run a SaaS product that serves other businesses
  - Occasional downtime is disruptive but manageable
  - They need business-hours support with escalation after-hours

  Scenario 3: Small Business Customer (5 employees, convenience tool)
  - They use your platform for internal project management
  - Can tolerate occasional outages
  - Standard email support is sufficient

  For each customer, provide:
  1. The SLA type (customer-level, service-level, or hybrid)
  2. Recommended uptime targets (90%, 99%, 99.9%, 99.99%, 99.999%)
  3. Key metrics (uptime %, response time, resolution time, error rate)
  4. Justification based on business impact

assertions:
  - type: llm_judge
    criteria: "Enterprise customer receives 99.9% uptime SLA (mission-critical threshold) with P1 response time of 15-30 minutes and 24/7 support"
    weight: 0.25
    description: "Enterprise SLA appropriately stringent"

  - type: llm_judge
    criteria: "Mid-market customer receives 99% uptime SLA with P2 response time of 1-4 hours and business-hours primary support"
    weight: 0.25
    description: "Mid-market SLA balanced appropriately"

  - type: llm_judge
    criteria: "Small business customer receives 90-95% uptime SLA with P3 response time of 8-24 hours and standard email support"
    weight: 0.25
    description: "Small business SLA cost-appropriate"

  - type: llm_judge
    criteria: "Response includes explanation of how SLA components (uptime, response time, resolution time) align with each customer's business impact"
    weight: 0.25
    description: "Business impact reasoning clear"
