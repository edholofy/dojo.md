meta:
  id: sla-customer-partnership
  level: 5
  course: sla-breach-communication
  type: output
  description: "Evolve from a vendor-customer SLA relationship to a strategic reliability partnership — shared accountability, collaborative monitoring, and co-designed SLAs"
  tags: [SLA, partnership, strategic, co-design, master]

state: {}

trigger: |
  You're the Chief Customer Officer at "PartnerCloud" ($600M ARR,
  enterprise cloud platform). Your top 50 customers represent $250M
  in ARR. The CEO's vision: "We should be reliability partners
  with our biggest customers, not just vendors with SLAs."

  Current relationship model:
  - Transactional: You provide service, they pay, SLA governs failures
  - Adversarial during breaches: Customer demands credits, you defend
  - One-way monitoring: You monitor your services; customer monitors
    their own
  - Blame game: Each side blames the other for integration issues

  Proposed partnership model:

  Tier 1 — "Strategic Reliability Partners" (Top 10 customers):
  - Shared monitoring dashboards (both see each other's metrics)
  - Co-designed SLAs based on the customer's actual business needs
  - Joint incident response (shared war rooms during incidents)
  - Quarterly reliability reviews with mutual action items
  - Shared investment in redundancy (customer funds dedicated infra)
  - Mutual accountability (customer SLA for their integration quality)

  Tier 2 — "Enhanced Partners" (Next 40 customers):
  - Customer-visible monitoring dashboards
  - Collaborative SLA reviews annually
  - Priority incident response channel
  - Shared postmortem process

  Challenges:
  - Legal: Sharing monitoring data could expose liability
  - Sales: "Mutual accountability" means telling customers THEY
    caused issues sometimes
  - Engineering: Shared war rooms mean customers see your messy
    incident response in real-time
  - Finance: "Shared investment" means revenue accounting complexity
  - Customer: "Why should we pay for YOUR reliability?"

  Tasks:
  1. Design the Strategic Reliability Partner program. What's included,
     how does it work day-to-day, and how do you launch it?

  2. Write the pitch to your #1 customer ($30M ARR) to join the
     partnership program. Why should they invest in your reliability?

  3. Handle the "mutual accountability" conversation. How do you tell
     a $30M customer that their integration caused an incident
     without damaging the relationship?

  4. Design the shared monitoring framework. What do you show customers,
     what do you NOT show, and how do you handle data that makes you
     look bad?

assertions:
  - type: llm_judge
    criteria: "Partnership program is well-structured — defines clear tiers, benefits, responsibilities, and governance that go beyond traditional vendor-customer SLAs"
    weight: 0.25
    description: "Well-structured partnership program"
  - type: llm_judge
    criteria: "Customer pitch is compelling — frames the partnership as mutual benefit (better reliability, cost savings, competitive advantage) not just a vendor upsell"
    weight: 0.25
    description: "Compelling partnership pitch"
  - type: llm_judge
    criteria: "Mutual accountability conversation is diplomatic — uses data to show integration impact, proposes collaborative fixes, and frames it as shared improvement"
    weight: 0.25
    description: "Diplomatic mutual accountability"
  - type: llm_judge
    criteria: "Shared monitoring design balances transparency and risk — shares meaningful operational data while protecting competitive information and managing liability"
    weight: 0.25
    description: "Balanced shared monitoring"
