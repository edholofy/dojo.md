meta:
  id: sla-economics-model
  level: 5
  course: sla-breach-communication
  type: output
  description: "Build a comprehensive economic model for SLA management — pricing reliability, quantifying trust, and optimizing the financial relationship between uptime investment and customer value"
  tags: [SLA, economics, pricing, financial-modeling, master]

state: {}

trigger: |
  You're the Chief Strategy Officer at "ReliabilityFirst" ($500M ARR,
  enterprise infrastructure). The board wants a "unified economic
  model" that connects reliability investment to business outcomes.

  Data available:
  - 5 years of SLA performance data across 20,000 customers
  - Churn correlation: Each 0.01% drop in uptime correlates with
    0.3% increase in annual churn
  - Price elasticity: Customers pay 15-25% premium for 99.99% vs 99.9%
  - Investment curve: Going from 99.9% to 99.99% costs 10x more than
    going from 99% to 99.9%
  - Credit model: Currently paying out 2.8% of revenue in credits
  - Insurance: Cyber liability covers $10M/year at $1.2M premium

  Key questions the board wants answered:

  Question 1: Optimal reliability target
  What uptime level maximizes profit? 99.99% costs more to achieve
  but commands higher prices and reduces churn. Where's the sweet spot?

  Question 2: Credit structure optimization
  Are we giving away too much or too little in credits? Model the
  equilibrium where credits are high enough to retain trust but low
  enough to be sustainable.

  Question 3: Reliability as a product
  Should we sell "reliability tiers" as a separate product line?
  (Like AWS's "Enterprise Support" but for SLAs) Model the
  addressable market and pricing.

  Question 4: Investment prioritization
  We have $20M to invest in reliability. Where does each dollar
  generate the most return — monitoring, redundancy, staffing,
  architecture, or process?

  Tasks:
  1. Model the optimal reliability target. Show the cost curve,
     revenue curve, and profit-maximizing intersection.

  2. Design the optimal credit structure using the churn and retention
     data. What's the "Goldilocks" credit level?

  3. Build the business case for "Reliability as a Product." Define
     tiers, pricing, and 3-year revenue projections.

  4. Allocate the $20M reliability investment budget with expected
     ROI for each category.

assertions:
  - type: llm_judge
    criteria: "Reliability target model is analytically sound — uses the cost curve and revenue/retention data to identify a specific optimal target with sensitivity analysis"
    weight: 0.25
    description: "Analytically sound target model"
  - type: llm_judge
    criteria: "Credit optimization uses retention data — identifies the credit level that minimizes total cost (credits paid + churn cost) with quantified analysis"
    weight: 0.25
    description: "Retention-optimized credits"
  - type: llm_judge
    criteria: "Reliability product business case is detailed — includes market sizing, tier definitions, pricing strategy, margin analysis, and competitive positioning"
    weight: 0.25
    description: "Detailed reliability product case"
  - type: llm_judge
    criteria: "Investment allocation shows marginal returns — distributes budget based on diminishing returns analysis for each category with clear prioritization"
    weight: 0.25
    description: "Marginal-return investment allocation"
