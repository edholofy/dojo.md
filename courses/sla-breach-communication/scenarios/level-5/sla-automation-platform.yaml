meta:
  id: sla-automation-platform
  level: 5
  course: sla-breach-communication
  type: output
  description: "Design and implement a comprehensive SLA management automation platform — from monitoring to credit calculation to customer communication, fully automated"
  tags: [SLA, automation, platform-design, end-to-end, master]

state: {}

trigger: |
  You're the VP of Platform Engineering at "AutoOps" ($200M ARR,
  15,000 customers). You've been tasked with building the "SLA
  Management Platform" — an internal system that automates the
  entire SLA lifecycle.

  Current manual processes to automate:
  1. SLA monitoring: 3 engineers manually check dashboards daily
  2. Breach detection: Average 15-minute delay from monitoring alerts
  3. Customer notification: Support team manually sends emails (avg
     45 min after breach detected)
  4. Credit calculation: Finance team spends 40 hours/month on manual
     calculations with a 5% error rate
  5. Postmortem coordination: PM manually schedules and tracks reviews
  6. SLA reporting: 20 hours/month per customer success manager to
     generate monthly SLA reports
  7. Contract compliance: Legal manually checks SLA terms per customer

  Platform requirements:
  - Real-time SLA monitoring across all services and customers
  - Automatic breach detection with <1 minute latency
  - Automated customer notification pipeline (email, status page,
    in-app, webhook)
  - Automatic credit calculation with per-customer contract terms
  - Self-service SLA dashboard for customers
  - Integration with Salesforce (contracts), PagerDuty (incidents),
    Zendesk (tickets), and Stripe (billing/credits)
  - Audit trail for all SLA decisions and communications

  Technical constraints:
  - Must handle 15,000 customers with different SLA terms
  - 50,000 services to monitor across 5 regions
  - Sub-minute detection across all monitoring points
  - Credit calculations must handle 200+ unique contract variations
  - Must be SOC 2 compliant (audit trail, access controls)

  Budget: $2M for Year 1, $500K/year ongoing.

  Tasks:
  1. Design the platform architecture. What are the core components,
     data flows, and integration points?

  2. How do you handle the 200+ unique contract variations in
     automated credit calculations? Design the rules engine.

  3. Design the automated customer notification pipeline. How do you
     ensure the right customers get the right message at the right
     time without false positives?

  4. The CFO asks: "What's the ROI?" Calculate the cost savings and
     quality improvements from automation.

assertions:
  - type: llm_judge
    criteria: "Platform architecture is well-designed — identifies core services (monitoring, detection, notification, calculation, reporting), data flows, and integration strategy"
    weight: 0.25
    description: "Well-designed platform architecture"
  - type: llm_judge
    criteria: "Rules engine handles contract complexity — proposes a flexible rules system that can encode diverse SLA terms without custom code per customer"
    weight: 0.25
    description: "Flexible contract rules engine"
  - type: llm_judge
    criteria: "Notification pipeline has safeguards — includes confirmation thresholds, deduplication, customer preferences, and human override for high-impact notifications"
    weight: 0.25
    description: "Safeguarded notification pipeline"
  - type: llm_judge
    criteria: "ROI calculation is credible — quantifies labor savings, error reduction, faster detection, and customer satisfaction improvements with realistic estimates"
    weight: 0.25
    description: "Credible ROI calculation"
