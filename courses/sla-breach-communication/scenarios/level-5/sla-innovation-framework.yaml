meta:
  id: sla-innovation-framework
  level: 5
  course: sla-breach-communication
  type: output
  description: "Design next-generation SLA frameworks that go beyond traditional uptime guarantees — outcome-based SLAs, customer-experience SLAs, and trust-based models"
  tags: [SLA, innovation, next-generation, outcomes, master]

state: {}

trigger: |
  You're the Chief Product Officer at "NextGen Platform" ($300M ARR,
  15,000 customers). The board challenges you: "Traditional SLAs
  measure uptime. Our customers care about outcomes. Reinvent our
  SLA model."

  Market research:
  - 65% of customers say "uptime is table stakes — what about
    performance, data accuracy, and business outcomes?"
  - Competitor launched "outcome-based SLAs" guaranteeing API response
    times at P99, not just availability
  - Enterprise trend: customers want SLAs tied to THEIR business
    metrics, not your infrastructure metrics
  - Industry analysts predict "experience-level agreements (XLAs)"
    will replace SLAs within 5 years

  Current SLA model (what you're replacing):
  - 99.9% uptime guarantee
  - Standard credit tiers
  - Binary measurement (up/down)
  - Same SLA for all customers

  Proposed innovations to evaluate:

  Model A: Outcome-Based SLAs
  Guarantee: "99.9% of API calls complete successfully within 200ms"
  Challenge: Measurement complexity, customer-specific thresholds

  Model B: Experience-Level Agreements (XLAs)
  Guarantee: "Customer satisfaction score (CSAT) above 4.5/5.0"
  Challenge: Subjective measurement, gaming risk

  Model C: Composite SLAs
  Guarantee: Weighted score of uptime (40%), latency (30%), data
  accuracy (20%), support response (10%)
  Challenge: Complexity, customer education

  Model D: Trust Accounts
  Each customer has a "trust score" that accumulates. Perfect months
  add points, breaches subtract. Credits triggered only when trust
  score goes negative.
  Challenge: Novel concept, hard to explain

  Tasks:
  1. Evaluate each model. Which would you recommend and why? What are
     the implementation risks?

  2. Design the implementation plan for your recommended model. How
     do you measure, report, and enforce it?

  3. 15,000 customers are on the current model. Design the migration
     strategy that doesn't cause confusion or mass credit claims.

  4. The legal team says: "Outcome-based SLAs expose us to more
     liability." How do you design guardrails?

assertions:
  - type: llm_judge
    criteria: "Model evaluation is thorough — analyzes each model's strengths, weaknesses, measurement feasibility, and customer reception with a clear recommendation"
    weight: 0.25
    description: "Thorough model evaluation"
  - type: llm_judge
    criteria: "Implementation plan is detailed — covers measurement infrastructure, reporting cadence, enforcement mechanisms, and edge cases"
    weight: 0.25
    description: "Detailed implementation plan"
  - type: llm_judge
    criteria: "Migration strategy minimizes disruption — proposes phased rollout, opt-in periods, parallel reporting, and clear communication"
    weight: 0.25
    description: "Low-disruption migration"
  - type: llm_judge
    criteria: "Legal guardrails are practical — defines liability caps, measurement dispute resolution, and exclusions that protect the company without undermining the innovation"
    weight: 0.25
    description: "Practical legal guardrails"
