meta:
  id: sla-maturity-assessment
  level: 5
  course: sla-breach-communication
  type: output
  description: "Assess and improve organizational SLA maturity — from ad-hoc to optimized, across measurement, communication, governance, and continuous improvement"
  tags: [SLA, maturity-model, assessment, continuous-improvement, master]

state: {}

trigger: |
  You're a senior operations advisor brought in to assess SLA
  maturity at "GrowthTech" ($250M ARR, 12,000 customers, 4 product
  lines). The CEO says: "I don't know if we're good or bad at SLA
  management. Tell me where we stand and what to fix."

  Assessment findings across 6 maturity dimensions:

  1. Measurement (Level 2/5 — Reactive)
  - Uptime measured globally, not per-customer or per-service
  - No latency or throughput SLAs, only availability
  - Monitoring checks every 60 seconds (misses sub-minute outages)
  - Different teams use different tools with inconsistent data

  2. Communication (Level 3/5 — Defined)
  - Status page exists and is usually updated within 30 minutes
  - Post-incident emails sent to affected customers
  - No proactive pre-breach warnings
  - Communication templates exist but are inconsistently used

  3. Governance (Level 1/5 — Ad Hoc)
  - No SLA owner or committee
  - Sales sets SLA targets without engineering input
  - No regular SLA review cycle
  - Custom SLA terms granted ad-hoc during negotiations

  4. Credits & Compensation (Level 2/5 — Reactive)
  - Credits calculated manually, often late
  - No automated tracking or distribution
  - Inconsistent application across customer segments
  - No visibility into cumulative credit exposure

  5. Prevention (Level 1/5 — Ad Hoc)
  - No error budgets or SLOs
  - Post-incident actions rarely followed through
  - No capacity planning tied to SLA targets
  - Reliability improvements compete with features for resources

  6. Customer Trust (Level 3/5 — Defined)
  - Customer satisfaction scores tracked quarterly
  - Account managers aware of SLA history per customer
  - No formal trust recovery program after breaches
  - Good customer relationships compensate for process gaps

  Tasks:
  1. Present the maturity assessment with a clear scoring framework.
     Where are they strong, and where are the critical gaps?

  2. Design the roadmap to reach Level 4 (Managed) across all
     dimensions within 18 months. What's the sequence?

  3. The CEO asks: "Can we get to Level 5 (Optimized) within 3
     years?" Is this realistic? What would it require?

  4. Prioritize the first 3 investments. Which dimensions should
     they improve first and why?

assertions:
  - type: llm_judge
    criteria: "Maturity assessment is structured — presents a clear framework with defined levels, scores each dimension with evidence, and identifies the most critical gaps"
    weight: 0.25
    description: "Structured maturity assessment"
  - type: llm_judge
    criteria: "Roadmap is sequenced logically — improves foundational capabilities first (measurement, governance) before advanced capabilities (prevention, automation)"
    weight: 0.25
    description: "Logically sequenced roadmap"
  - type: llm_judge
    criteria: "Level 5 assessment is honest — identifies whether Level 5 is achievable, what organizational changes are required, and where diminishing returns set in"
    weight: 0.25
    description: "Honest Level 5 assessment"
  - type: llm_judge
    criteria: "Investment priorities are justified — selects the 3 highest-impact investments with clear rationale for sequencing and expected outcomes"
    weight: 0.25
    description: "Justified investment priorities"
