meta:
  id: sla-board-presentation
  level: 5
  course: sla-breach-communication
  type: output
  description: "Prepare and deliver a board-level SLA strategy presentation — connecting reliability to business value, requesting investment, and managing board expectations"
  tags: [SLA, board, executive, strategy-presentation, master]

state: {}

trigger: |
  You're the CTO of "PublicCloud" (publicly traded cloud
  infrastructure company, $800M ARR, 40,000 customers). The board
  has allocated 45 minutes of the next meeting for an "SLA Strategy
  Review." This is the first time SLA has been a dedicated board
  topic.

  Why now:
  - Q3 SLA credits hit $8M (1% of quarterly revenue), up from $2M
    last year
  - Competitors are marketing "industry-leading SLAs" and winning deals
  - An activist investor published a letter citing "reliability
    concerns" as evidence of underinvestment
  - Customer NPS dropped 15 points, with reliability the #1 concern
  - SEC filing requires disclosure of material SLA credit obligations

  Board members:
  - Chair: Former AWS SVP (deeply technical, will ask hard questions)
  - Member A: PE investor (focused on margins and capital efficiency)
  - Member B: Former Fortune 500 CFO (concerned about SEC disclosure)
  - Member C: SaaS industry expert (focused on competitive positioning)
  - Member D: Customer representative (advocate for service quality)

  Data available:
  - 3-year SLA performance trends (declining: 99.97% → 99.91%)
  - Credit costs: $2M → $5M → $8M (growing 100%+ year over year)
  - Churn correlated to breaches: $40M in ARR lost over 3 years
  - Infrastructure investment: flat for 3 years while customer count
    tripled
  - Competitor comparison: 2 of 3 competitors have better SLA records
  - Engineering headcount: growing 20%/year but all in features

  Your ask: $50M over 3 years for reliability transformation
  (infrastructure + headcount + tooling).

  Tasks:
  1. Structure the 45-minute board presentation. What are the key
     sections, the narrative arc, and the call to action?

  2. Anticipate and prepare answers for each board member's likely
     questions based on their background.

  3. Make the financial case for the $50M investment. Connect it to
     revenue protection, competitive positioning, and stock price.

  4. The activist investor's letter claims "management is asleep at
     the reliability wheel." How do you address this in the
     presentation without being defensive?

assertions:
  - type: llm_judge
    criteria: "Presentation structure is board-appropriate — follows a narrative arc (problem, impact, root cause, plan, ask) and respects the 45-minute constraint with executive-level content"
    weight: 0.25
    description: "Board-appropriate presentation"
  - type: llm_judge
    criteria: "Anticipated questions are tailored — prepares specific answers for each board member's background and likely concerns"
    weight: 0.25
    description: "Tailored anticipated questions"
  - type: llm_judge
    criteria: "Financial case is board-grade — connects investment to revenue retention, competitive win rates, stock price, and SEC disclosure risk with quantified projections"
    weight: 0.25
    description: "Board-grade financial case"
  - type: llm_judge
    criteria: "Activist investor response is measured — acknowledges the concern, presents evidence of action, and reframes the narrative without being dismissive"
    weight: 0.25
    description: "Measured activist investor response"
