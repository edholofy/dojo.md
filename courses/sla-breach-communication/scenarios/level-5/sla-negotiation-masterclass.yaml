meta:
  id: sla-negotiation-masterclass
  level: 5
  course: sla-breach-communication
  type: output
  description: "Navigate high-stakes SLA contract negotiations with sophisticated enterprise customers, legal teams, and procurement departments"
  tags: [SLA, negotiation, enterprise, contracts, master]

state: {}

trigger: |
  You're the VP of Enterprise Sales at "PlatformPrime" ($400M ARR).
  You're negotiating a $5M/year deal with "MegaBank," one of the
  world's largest financial institutions. Their procurement team is
  notoriously tough.

  MegaBank's SLA demands:
  1. 99.999% uptime (you currently guarantee 99.95% maximum)
  2. $100,000 per hour of downtime in liquidated damages (your cap
     is typically 50% of monthly fee = $208K for the whole month)
  3. Real-time data accuracy: "Zero data errors" guarantee
  4. 15-minute P1 response time (you staff for 30-minute response)
  5. Right to audit your infrastructure annually
  6. Unlimited termination rights for any SLA breach
  7. Most-favored-customer clause: "Our SLA must be equal to or
     better than any other customer's"

  Your constraints:
  - Maximum uptime guarantee: 99.99% (engineering's hard ceiling)
  - Maximum liquidated damages: $500K/month (CFO's red line)
  - Current P1 response capability: 30 minutes without new hires
  - "Zero data errors" is impossible (all systems have error rates)
  - Most-favored-customer clause: would constrain all future deals
  - Deal is strategically important: CEO wants it closed

  Context:
  - MegaBank is evaluating 2 competitors who may offer more aggressive
    SLAs (but can they deliver?)
  - If you win MegaBank, 5 other major banks will likely follow
  - Your current highest SLA customer has 99.95% with standard credits
  - MegaBank's legal team has 30 people; yours has 5

  Tasks:
  1. For each of MegaBank's 7 demands, propose your counter-position.
     What can you agree to, what must you modify, and what's a
     dealbreaker?

  2. The "zero data errors" demand: How do you reframe this into a
     measurable, achievable SLA that still gives MegaBank confidence?

  3. Handle the most-favored-customer clause. Why is it dangerous,
     and what do you offer instead?

  4. MegaBank's procurement says: "Your competitor offered 99.999%.
     Match it or lose the deal." How do you respond?

assertions:
  - type: llm_judge
    criteria: "Counter-positions are strategic — concedes on some demands, modifies others, and firmly declines dealbreakers with clear alternatives for each"
    weight: 0.25
    description: "Strategic counter-positions"
  - type: llm_judge
    criteria: "Data accuracy reframe is credible — transforms 'zero errors' into a measurable SLA (e.g., error rate threshold, detection time, correction guarantee)"
    weight: 0.25
    description: "Credible data accuracy reframe"
  - type: llm_judge
    criteria: "MFN clause response is sophisticated — explains the cascading risk, proposes alternatives like 'best-in-class tier' or 'SLA review parity'"
    weight: 0.25
    description: "Sophisticated MFN response"
  - type: llm_judge
    criteria: "Competitive pressure response is confident — questions competitor's ability to deliver, emphasizes own track record, and offers verification mechanisms"
    weight: 0.25
    description: "Confident competitive response"
