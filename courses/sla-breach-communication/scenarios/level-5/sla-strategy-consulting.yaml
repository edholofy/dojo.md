meta:
  id: sla-strategy-consulting
  level: 5
  course: sla-breach-communication
  type: output
  description: "Act as an SLA strategy consultant advising a struggling company on rebuilding their entire SLA framework from the ground up"
  tags: [SLA, consulting, strategy, organizational, master]

state: {}

trigger: |
  You're a senior SLA strategy consultant hired by "CrisisCloud"
  ($150M ARR, 8,000 customers, B2B SaaS). They've had a disastrous
  year: 15 SLA breaches, $6M in credits paid, 12% customer churn,
  and a class-action lawsuit from a group of enterprise customers.

  Discovery findings:
  - No dedicated SLA ownership — split across 4 departments
  - SLA targets set 6 years ago when the company was 10x smaller
  - Credit structure is contractually locked for 3,000 customers
    (can't change until renewal)
  - Engineering has no visibility into SLA performance
  - Customer communication is reactive — customers find out about
    breaches from their own monitoring
  - The CEO views SLA management as a "cost center"
  - Board is considering whether the CTO should be replaced
  - Morale in the SRE team is critically low (50% turnover)

  Financial context:
  - $6M in credits = 4% of revenue
  - 12% churn = $18M in lost ARR
  - Total SLA-related losses: ~$24M/year
  - Company valuation dropped 30% in the last round

  Competitive context:
  - 3 competitors have "five nines" marketing
  - 1 competitor offers "SLA insurance" (novel in the market)
  - Industry trend: moving from SLAs to SLOs with public dashboards

  Tasks:
  1. Present your 90-day assessment and recommendations. What are the
     top 5 changes that would have the highest impact?

  2. The CEO says: "SLA management doesn't generate revenue." Make the
     business case for investing $5M in SLA transformation.

  3. Design the organizational structure for SLA management. Who
     reports to whom? What roles are needed?

  4. How do you handle the class-action lawsuit's impact on the SLA
     transformation? Legal wants to be cautious; customers want action.

assertions:
  - type: llm_judge
    criteria: "Assessment is prioritized by impact — identifies the 5 highest-impact changes with estimated ROI and implementation difficulty for each"
    weight: 0.25
    description: "Impact-prioritized assessment"
  - type: llm_judge
    criteria: "Business case is compelling — quantifies the cost of inaction ($24M/year) vs. investment ($5M), shows break-even timeline, and connects SLA to revenue retention"
    weight: 0.25
    description: "Compelling business case"
  - type: llm_judge
    criteria: "Organizational design is practical — proposes a clear structure with SLA ownership, cross-functional integration, and career paths that attract talent"
    weight: 0.25
    description: "Practical organizational design"
  - type: llm_judge
    criteria: "Legal-transformation balance is sophisticated — proposes actions that demonstrate good faith for litigation while still transforming the system"
    weight: 0.25
    description: "Sophisticated legal-transformation balance"
