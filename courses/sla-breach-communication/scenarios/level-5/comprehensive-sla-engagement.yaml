meta:
  id: comprehensive-sla-engagement
  level: 5
  course: sla-breach-communication
  type: output
  description: "Execute a full-day consulting engagement covering SLA strategy, governance, crisis management, customer communication, and organizational transformation"
  tags: [SLA, consulting, comprehensive, full-engagement, master]

state: {}

trigger: |
  You're a world-class SLA management consultant. "TechGiant"
  ($2B ARR, 100,000 customers, 8 product lines, global operations)
  has hired you for a 1-day intensive strategy session. Their SLA
  management is "broken at every level."

  Morning Session (9 AM - 12 PM): Assessment & Strategy

  Assessment data:
  - Annual SLA credits: $30M (1.5% of revenue, growing 40%/year)
  - Customer churn from reliability: $120M ARR lost in past 2 years
  - 8 product lines with 8 different SLA frameworks
  - No unified monitoring, measurement, or reporting
  - SLA governance: nonexistent (each product line independent)
  - Engineering reliability investment: 5% of engineering budget
  - Competitor benchmark: Industry leaders invest 15-20%
  - Employee engagement: SRE team turnover at 45%

  Session topics:
  1. Where does TechGiant stand vs. industry benchmarks?
  2. What's the total cost of poor SLA management (credits + churn +
     reputation + recruiting + competitive disadvantage)?
  3. What's the north star: What does "world-class SLA management"
     look like for a $2B company?

  Afternoon Session 1 (1 PM - 3 PM): Crisis Simulation

  Scenario: A zero-day vulnerability in TechGiant's authentication
  service causes a global outage lasting 6 hours across all 8 product
  lines. 100,000 customers affected. Media, regulators, and the board
  are involved.

  Simulate: First 4 hours of the crisis response. What communications
  go out, to whom, in what order?

  Afternoon Session 2 (3 PM - 5 PM): Transformation Plan

  Design the 3-year SLA management transformation:
  - Year 1: Foundation (governance, measurement, quick wins)
  - Year 2: Excellence (automation, predictive, culture change)
  - Year 3: Leadership (industry-leading SLA, competitive advantage)

  Budget available: $100M over 3 years.

  Tasks:
  1. Present the morning assessment — quantify the total cost of
     poor SLA management and the gap to world-class.

  2. Execute the crisis simulation — walk through the first 4 hours
     with specific communications at each stage.

  3. Design the 3-year transformation plan with specific milestones,
     metrics, and budget allocation per year.

  4. Close the engagement: What are the 3 things TechGiant must do
     in the next 30 days, and what happens if they don't?

assertions:
  - type: llm_judge
    criteria: "Assessment quantifies total cost — goes beyond credit costs to include churn, reputation damage, recruiting costs, and competitive disadvantage with specific dollar amounts"
    weight: 0.25
    description: "Quantified total cost assessment"
  - type: llm_judge
    criteria: "Crisis simulation is realistic — provides specific communications with timing, audience, and content for each stage of the 4-hour window"
    weight: 0.25
    description: "Realistic crisis simulation"
  - type: llm_judge
    criteria: "3-year plan is structured and ambitious — defines specific milestones per year, allocates the $100M budget, and sets measurable targets for each phase"
    weight: 0.25
    description: "Structured 3-year transformation plan"
  - type: llm_judge
    criteria: "30-day actions are urgent and specific — identifies concrete, achievable actions with clear owners and consequences of inaction"
    weight: 0.25
    description: "Urgent 30-day actions"
