meta:
  id: global-sla-governance
  level: 5
  course: sla-breach-communication
  type: output
  description: "Design enterprise-wide SLA governance for a global organization — multi-product, multi-region, multi-regulation with executive accountability and continuous improvement"
  tags: [SLA, governance, enterprise, global, master]

state: {}

trigger: |
  You're the Chief Reliability Officer (newly created C-suite role)
  at "GlobalSaaS" ($1.2B ARR, 50,000 customers, 12 product lines,
  operations in 30 countries). The CEO hired you after the company
  paid $25M in SLA credits last year and lost $80M in churned ARR.

  Your mandate: Build the first enterprise-wide SLA governance
  framework for a company that has operated with product-line
  autonomy for 15 years.

  Current state:
  - 12 product lines, each with their own SLA definitions
  - 30 countries with different regulatory requirements
  - 8 different monitoring tools across product lines
  - No unified incident management process
  - Credit calculations done by 12 different finance teams
  - Customer-facing: 12 different status pages
  - SLA data exists but isn't aggregated across products
  - Each product VP views their SLA as their own decision

  Political challenges:
  - Product VPs resist centralized governance ("Don't slow us down")
  - CFO wants standardized credit calculations (currently inconsistent)
  - Legal wants unified contract terms (currently 12 different SLA
    contracts)
  - CTO wants shared infrastructure investment (currently siloed)
  - Sales wants flexibility to negotiate custom SLAs per deal
  - Customers want a single SLA view across all products they use

  Regulatory landscape:
  - DORA (EU financial services): Effective, requires ICT risk
    management
  - HIPAA (US healthcare): 15% of customers are healthcare
  - FedRAMP (US government): 5% of revenue from government
  - SOC 2: Annual audits require consistent SLA documentation

  Tasks:
  1. Design the enterprise SLA governance framework. What's the
     organizational structure, decision rights, and escalation path?

  2. How do you get buy-in from 12 resistant product VPs? Design
     the change management approach.

  3. Create the unified SLA measurement standard across all 12
     products. How do you handle products with different reliability
     profiles?

  4. Design the executive dashboard that gives the CEO a single
     view of SLA health across the entire enterprise.

assertions:
  - type: llm_judge
    criteria: "Governance framework balances centralization and autonomy — establishes enterprise standards while allowing product-line flexibility within guardrails"
    weight: 0.25
    description: "Balanced centralization-autonomy governance"
  - type: llm_judge
    criteria: "Change management approach is politically astute — addresses each VP's concerns, proposes incentive alignment, and uses quick wins to build momentum"
    weight: 0.25
    description: "Politically astute change management"
  - type: llm_judge
    criteria: "Measurement standard is practical — defines core metrics all products must report while accommodating product-specific supplemental metrics"
    weight: 0.25
    description: "Practical measurement standard"
  - type: llm_judge
    criteria: "Executive dashboard is actionable — shows aggregate SLA health, highlights at-risk areas, and enables drill-down from enterprise to product to customer level"
    weight: 0.25
    description: "Actionable executive dashboard"
