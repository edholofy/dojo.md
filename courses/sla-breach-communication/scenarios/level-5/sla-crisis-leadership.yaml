meta:
  id: sla-crisis-leadership
  level: 5
  course: sla-breach-communication
  type: output
  description: "Lead through a company-defining SLA crisis — a multi-day outage that threatens the company's survival, requiring executive crisis management across all stakeholders"
  tags: [SLA, crisis-leadership, survival, executive, master]

state: {}

trigger: |
  You're the CEO of "DataVault" (cloud storage provider, $350M ARR,
  30,000 customers). A ransomware attack has encrypted your primary
  storage infrastructure. This is a company-survival event.

  Day 1:
  - 6 AM: Security team detects encryption of storage arrays
  - 8 AM: Confirmed: 60% of customer data is inaccessible
  - 10 AM: Backups are 18 hours old (last clean backup before attack)
  - 12 PM: 30,000 customers can't access their data
  - 2 PM: Ransom demand received: $20M in Bitcoin
  - 4 PM: Wall Street Journal breaks the story
  - 6 PM: Stock drops 40%. Board demands emergency meeting.

  Day 2:
  - Recovery in progress but ETA is 48-72 hours
  - FBI is involved, advising against paying ransom
  - 5,000 customers have filed support tickets
  - 200 enterprise customers threatening immediate termination
  - Your SLA guarantees 99.99% uptime — you're at 0% for 30+ hours
  - Credit exposure: unlimited for some enterprise contracts

  Day 3:
  - Partial recovery: 40% of data restored from backups
  - 18 hours of data loss confirmed for all customers
  - Class-action lawsuit filed
  - 3 enterprise customers (total $15M ARR) have formally terminated
  - Insurance carrier notifies you: "Ransomware may be excluded"
  - Board member leaks to Bloomberg: "CEO may be replaced"

  Stakeholders demanding your attention simultaneously:
  - 30,000 customers waiting for data access
  - Board of directors (loss of confidence)
  - FBI (criminal investigation)
  - SEC (public company disclosure)
  - Media (constant requests)
  - Employees (terrified about job security)
  - Insurance carrier (coverage dispute)
  - Legal team (class-action defense)

  Tasks:
  1. As CEO, how do you prioritize these stakeholders? Design the
     72-hour crisis management plan.

  2. The ransom: Do you pay? Analyze the decision framework including
     legal, ethical, practical, and business considerations.

  3. Draft the Day 1 customer communication. What do you say when
     you don't yet know the full extent of the damage?

  4. On Day 3, with confirmed data loss, write the communication to
     all 30,000 customers that's honest about what happened and
     what it means for them.

assertions:
  - type: llm_judge
    criteria: "Crisis prioritization is leadership-grade — addresses safety and legal obligations first, then customer communication, then stakeholder management, with clear delegation"
    weight: 0.25
    description: "Leadership-grade crisis prioritization"
  - type: llm_judge
    criteria: "Ransom decision framework is comprehensive — considers legal implications (OFAC sanctions), ethical considerations, practical effectiveness, insurance impact, and precedent"
    weight: 0.25
    description: "Comprehensive ransom decision framework"
  - type: llm_judge
    criteria: "Day 1 communication is appropriately uncertain — acknowledges the incident, describes what's known and unknown, commits to updates, and doesn't make premature promises"
    weight: 0.25
    description: "Appropriately uncertain Day 1 communication"
  - type: llm_judge
    criteria: "Day 3 data loss communication is brutally honest — directly states the 18-hour data loss, explains what it means for each customer, and outlines recovery and compensation"
    weight: 0.25
    description: "Brutally honest data loss communication"
