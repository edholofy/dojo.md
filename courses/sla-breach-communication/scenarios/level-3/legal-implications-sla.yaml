meta:
  id: legal-implications-sla
  level: 3
  course: sla-breach-communication
  type: output
  description: "Navigate the legal implications of SLA breaches including contractual obligations, liability limits, indemnification, and when breaches become legal disputes"
  tags: [SLA, legal, contracts, liability, advanced]

state: {}

trigger: |
  You're the Director of Operations at "SecureHost" (managed hosting
  provider, $120M ARR). A 6-hour outage last week caused significant
  customer impact. Your legal team has flagged several issues.

  The outage details:
  - Duration: 6 hours (2 AM - 8 AM EST)
  - Cause: Storage array firmware bug triggered cascading failures
  - Impact: 40% of customers experienced data inaccessibility
  - Data loss: None confirmed, but 12 customers report "missing" data
    (likely caching issues, still investigating)

  Legal issues:

  Issue 1: Liability cap dispute
  Customer "FinanceFirst" ($500K/year) suffered $2M in trading losses
  during the outage. Your SLA limits liability to 12 months of service
  fees ($500K). They're threatening to sue for the full $2M, claiming
  the liability cap is "unconscionable" given your marketing promises
  of "enterprise-grade reliability."

  Issue 2: Regulatory notification
  Customer "HealthData" is a healthcare platform. The 6-hour data
  inaccessibility may trigger HIPAA breach notification requirements.
  They're asking you to co-sign a joint incident report to HHS.

  Issue 3: Indemnification chain
  Your storage vendor's SLA caps their liability at $50K. Your total
  credit exposure is $800K. The vendor caused the bug. Can you pass
  through liability?

  Issue 4: Force majeure claims
  Your legal team suggests classifying the firmware bug as a "force
  majeure" event to avoid SLA penalties. Is this defensible?

  Tasks:
  1. For FinanceFirst: Draft talking points for the meeting where they
     threaten legal action. What's your position on the liability cap?

  2. For HealthData: Should you co-sign the HHS report? What are the
     risks? Draft your response.

  3. Analyze the vendor liability gap ($50K vs $800K). What are your
     options for recovering costs?

  4. Evaluate the force majeure argument. Would you use it? What are
     the consequences for customer trust?

assertions:
  - type: llm_judge
    criteria: "Liability cap response is legally sound — acknowledges FinanceFirst's frustration, maintains the contractual position while offering goodwill concessions, and avoids admissions that could weaken the cap"
    weight: 0.25
    description: "Sound liability cap response"
  - type: llm_judge
    criteria: "Regulatory response is cautious — advises careful review before co-signing, involves legal counsel, and separates operational facts from legal admissions"
    weight: 0.25
    description: "Cautious regulatory response"
  - type: llm_judge
    criteria: "Vendor recovery analysis is thorough — identifies contract remedies, negotiation leverage, and long-term vendor management improvements"
    weight: 0.25
    description: "Thorough vendor recovery analysis"
  - type: llm_judge
    criteria: "Force majeure evaluation weighs consequences — identifies that while technically arguable, using force majeure for a vendor bug damages credibility and customer trust"
    weight: 0.25
    description: "Balanced force majeure evaluation"
