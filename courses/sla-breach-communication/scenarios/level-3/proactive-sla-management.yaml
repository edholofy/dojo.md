meta:
  id: proactive-sla-management
  level: 3
  course: sla-breach-communication
  type: output
  description: "Implement proactive SLA management strategies — preventive measures, capacity planning, redundancy, and early warning systems to prevent breaches before they happen"
  tags: [SLA, proactive, prevention, capacity-planning, advanced]

state: {}

trigger: |
  You're the Director of Site Reliability at "ScaleDB" (database-as-a-
  service, $70M ARR, 6,000 customers). After 3 SLA breaches in 2
  months, the CEO says: "I never want to be surprised by an SLA
  breach again. Build me a proactive system."

  Recent breach history:
  - Month 1: 45-minute outage from a failed deployment (bad canary)
  - Month 1: 2-hour degradation from database connection exhaustion
    during a traffic spike
  - Month 2: 90-minute outage from a cascading failure triggered by
    a single node failure in the primary cluster

  Current monitoring:
  - Uptime checks every 60 seconds per region
  - Alert when error rate > 1% for 5 minutes
  - No predictive alerting
  - No capacity planning tools
  - Post-incident reviews happen but rarely produce systemic changes

  Budget: $500K for proactive SLA management (tooling, headcount,
  infrastructure).

  Tasks:
  1. Design the predictive alerting system. What signals predict SLA
     breaches before they happen? Define specific thresholds and
     lead-time targets.

  2. Create a capacity planning framework that prevents the traffic-
     spike breach. How far ahead should you plan? What triggers
     scaling decisions?

  3. Design a "pre-breach" communication protocol. When your systems
     predict an SLA might be at risk, who do you notify internally
     and externally?

  4. Allocate the $500K budget across tooling, infrastructure, and
     headcount. Justify each allocation.

assertions:
  - type: llm_judge
    criteria: "Predictive alerting is specific — defines concrete signals (connection pool utilization, deployment risk scores, traffic growth trends) with quantified thresholds and lead times"
    weight: 0.25
    description: "Specific predictive alerting"
  - type: llm_judge
    criteria: "Capacity planning is systematic — includes traffic forecasting, headroom policies, auto-scaling triggers, and regular review cycles"
    weight: 0.25
    description: "Systematic capacity planning"
  - type: llm_judge
    criteria: "Pre-breach protocol is practical — defines escalation tiers, internal notification chains, and customer communication triggers tied to risk levels"
    weight: 0.25
    description: "Practical pre-breach protocol"
  - type: llm_judge
    criteria: "Budget allocation is justified — distributes across quick wins and long-term investments with clear ROI reasoning for each line item"
    weight: 0.25
    description: "Justified budget allocation"
