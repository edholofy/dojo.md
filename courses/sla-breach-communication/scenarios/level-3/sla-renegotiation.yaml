meta:
  id: sla-renegotiation
  level: 3
  course: sla-breach-communication
  type: output
  description: "Renegotiate SLA terms with customers after repeated breaches have eroded trust and the current SLA is no longer achievable"
  tags: [SLA, renegotiation, contracts, customer-retention, advanced]

state: {}

trigger: |
  You're the VP of Customer Success at "DataFlow" (data pipeline SaaS,
  $80M ARR, 2,000 customers). Over the past 6 months, you've breached
  the 99.95% uptime SLA 4 times. The board has decided that 99.95% is
  not achievable with your current architecture, and engineering needs
  18 months to reach that reliability.

  Current SLA: 99.95% uptime (26.3 minutes downtime/month max)
  Actual performance last 6 months: 99.87% average (56 minutes/month)
  Service credits paid: $2.1M across all customers

  Customer segments:
  - Enterprise (200 customers, $300K+ ARR each): Custom SLAs, some at
    99.99%. These customers chose you partly because of the SLA.
  - Mid-market (800 customers, $30-100K ARR): Standard 99.95% SLA.
    Most haven't complained but credit claims are increasing.
  - SMB (1,000 customers, <$30K ARR): Standard 99.95% SLA. Few claim
    credits but churn is increasing.

  Proposed new SLA tiers:
  - Standard: 99.9% uptime (43.2 min/month max)
  - Premium: 99.95% uptime — $5K/month add-on with enhanced credits
  - Enterprise: 99.99% — custom pricing, requires dedicated infra

  Tasks:
  1. Design the communication strategy for announcing the SLA change.
     How do you frame moving from 99.95% to 99.9% as the standard
     without it looking like you're lowering the bar?

  2. Write the notification to mid-market customers explaining the
     new SLA structure. They're effectively getting a downgrade.

  3. Your top enterprise customer ($1.2M ARR) has a contractual 99.99%
     SLA with 18 months remaining. They demand you honor it. How do
     you negotiate?

  4. 3 customers threaten to leave if the SLA changes. Design the
     retention offer for each segment (enterprise, mid-market, SMB).

assertions:
  - type: llm_judge
    criteria: "SLA change is framed positively — positions the change as improved transparency, introduces tiered options, and doesn't simply announce a downgrade"
    weight: 0.25
    description: "Positive SLA change framing"
  - type: llm_judge
    criteria: "Mid-market notification is honest yet reassuring — acknowledges the change, explains why, and offers the Premium tier as an upgrade path"
    weight: 0.25
    description: "Honest mid-market communication"
  - type: llm_judge
    criteria: "Enterprise contract negotiation is practical — proposes amendments like extended terms, enhanced credits, or infrastructure investment rather than simply breaking the contract"
    weight: 0.25
    description: "Practical enterprise negotiation"
  - type: llm_judge
    criteria: "Retention offers are segment-appropriate — enterprise gets dedicated resources, mid-market gets pricing incentives, SMB gets simplified value"
    weight: 0.25
    description: "Segment-appropriate retention"
