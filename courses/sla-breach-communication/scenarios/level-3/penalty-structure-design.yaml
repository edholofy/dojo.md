meta:
  id: penalty-structure-design
  level: 3
  course: sla-breach-communication
  type: output
  description: "Design SLA penalty structures that incentivize reliability without creating perverse incentives or unsustainable financial exposure"
  tags: [SLA, penalties, contract-design, credits, advanced]

state: {}

trigger: |
  You're the VP of Product at "ReliableAPI" (API infrastructure
  provider, $90M ARR, 8,000 customers). The CFO and Head of Sales
  disagree on SLA penalty structure.

  Current penalty structure:
  - 99.9-99.99% uptime: 10% monthly credit
  - 99.0-99.9%: 25% monthly credit
  - Below 99.0%: 50% monthly credit
  - Cap: 50% of monthly fee

  Problems:
  - Sales wants aggressive SLAs to win deals: "Competitors offer
    99.99% with 100% credit if breached."
  - CFO says: "Last quarter we paid $1.2M in credits. That's 5% of
    revenue. We need to reduce exposure."
  - Engineering says: "The credit structure doesn't differentiate
    between a 5-minute blip and a 4-hour outage."
  - Customers say: "10% credit for missing SLA is insultingly low.
    Our losses are 100x that."

  Competitive landscape:
  - Competitor A: 99.99% SLA, 100% credit, but excludes scheduled
    maintenance, "force majeure," and partial outages
  - Competitor B: 99.95% SLA, tiered credits up to 30%, but includes
    response time and resolution time SLAs
  - Competitor C: No uptime SLA, but offers "reliability insurance"
    — customers pay extra for guaranteed compensation

  Tasks:
  1. Design a new penalty structure that addresses all four
     stakeholders' concerns. Show the specific tiers and credit
     percentages.

  2. Should you offer a "reliability insurance" add-on like
     Competitor C? Model the economics.

  3. How do you handle the transition from the old structure to the
     new one for existing customers?

  4. A prospect asks: "Why should I trust your SLA when Competitor A
     offers 99.99% with 100% credit?" Craft your response.

assertions:
  - type: llm_judge
    criteria: "New penalty structure addresses all stakeholders — differentiates by duration/severity, keeps exposure manageable, gives sales competitive ammunition, and feels fair to customers"
    weight: 0.25
    description: "Multi-stakeholder penalty design"
  - type: llm_judge
    criteria: "Reliability insurance economics are modeled — calculates premium pricing, expected payout rates, and break-even analysis"
    weight: 0.25
    description: "Modeled insurance economics"
  - type: llm_judge
    criteria: "Transition plan is customer-friendly — grandfathers existing terms or offers opt-in migration with incentives"
    weight: 0.25
    description: "Customer-friendly transition"
  - type: llm_judge
    criteria: "Competitive response is value-based — deconstructs competitor's SLA exclusions and positions own SLA as more honest and comprehensive"
    weight: 0.25
    description: "Value-based competitive response"
