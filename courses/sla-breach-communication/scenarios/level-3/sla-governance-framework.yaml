meta:
  id: sla-governance-framework
  level: 3
  course: sla-breach-communication
  type: output
  description: "Design an SLA governance framework — organizational ownership, review cycles, continuous improvement processes, and cross-functional accountability"
  tags: [SLA, governance, process-design, accountability, advanced]

state: {}

trigger: |
  You're the VP of Operations at "TechStack" (developer tools platform,
  $100M ARR, 15,000 customers). The CEO says: "Nobody owns SLA
  management. Engineering sets targets they can't meet, Sales promises
  things we can't deliver, and Customer Success cleans up the mess."

  Current state:
  - SLA targets are set by Sales during contract negotiation
  - Engineering has no input on SLA commitments
  - No regular SLA review process exists
  - Credit calculations happen ad-hoc when customers complain
  - 5 different teams touch SLA-related processes but none "owns" it
  - Different customers have been promised different SLAs verbally
    that aren't in their contracts

  Pain points:
  - Sales closed a $2M deal with 99.999% uptime SLA (5.3 min/year)
    without consulting engineering. You can't achieve this.
  - A customer discovered their contract says 99.9% but their sales
    rep promised 99.99% in an email. Legal is involved.
  - Post-incident reviews recommend "improve SLA monitoring" but
    nobody is accountable for implementing it.
  - 3 departments use different definitions of "uptime"

  Tasks:
  1. Design the SLA governance framework. Who owns what? Define roles,
     responsibilities, and decision rights across Engineering, Sales,
     Customer Success, Legal, and Finance.

  2. Create the SLA review cycle. How often should SLAs be reviewed?
     What triggers an ad-hoc review? What data informs decisions?

  3. How do you handle the 99.999% SLA that was already sold? Design
     the remediation process for Sales promises that can't be kept.

  4. Standardize the definition of "uptime" across the organization.
     What should it include and exclude?

assertions:
  - type: llm_judge
    criteria: "Governance framework has clear ownership — assigns an SLA owner or team with defined RACI across departments and decision authority for commitments"
    weight: 0.25
    description: "Clear governance ownership"
  - type: llm_judge
    criteria: "Review cycle is specific — defines quarterly or monthly reviews with concrete inputs (performance data, customer feedback, engineering capacity) and outputs (updated targets, action items)"
    weight: 0.25
    description: "Specific review cycle"
  - type: llm_judge
    criteria: "Unsellable SLA remediation is practical — proposes customer conversation, contract amendment options, and sales process guardrails to prevent recurrence"
    weight: 0.25
    description: "Practical SLA remediation"
  - type: llm_judge
    criteria: "Uptime definition is comprehensive — addresses measurement methodology, exclusion windows, partial degradation, and regional vs. global measurement"
    weight: 0.25
    description: "Comprehensive uptime definition"
