meta:
  id: sla-audit-preparation
  level: 3
  course: sla-breach-communication
  type: output
  description: "Prepare for and navigate an SLA compliance audit — gathering evidence, reconciling discrepancies, and presenting findings to auditors and customers"
  tags: [SLA, audit, compliance, reporting, advanced]

state: {}

trigger: |
  You're the Compliance Manager at "EnterpriseSaaS" ($200M ARR,
  500 enterprise customers). Your largest customer, "MegaCorp"
  ($3M/year), has triggered the annual SLA audit clause in their
  contract. They're sending their IT team to review your SLA
  performance over the past 12 months.

  What they'll audit:
  - Uptime records vs. SLA commitments (99.95% guaranteed)
  - Incident response times vs. SLA response time commitments
  - Service credit accuracy (were credits calculated correctly?)
  - Root cause analysis quality (were postmortems thorough?)
  - Preventive actions (did you follow through on commitments?)

  Your 12-month data:
  - Uptime: 99.93% (missed 99.95% target by 0.02%)
  - Incidents: 47 total, 8 P1, 15 P2, 24 P3
  - Response time SLA met: 94% (target: 95%)
  - Credits issued: $45,000 (all correctly calculated)
  - Postmortems completed: 6 of 8 P1 incidents (2 still pending)
  - Action items from postmortems: 23 total, 14 completed, 9 open

  Problems:
  - 2 postmortems are 4+ months overdue
  - Your monitoring data shows different uptime than MegaCorp's
    own monitoring (they show 99.89%)
  - 3 incidents were classified as P2 that MegaCorp believes should
    have been P1 (which would change response time calculations)
  - One service credit was $200 short due to a calculation error

  Tasks:
  1. Prepare the audit package. What documentation do you assemble
     and how do you present data that shows you missed targets?

  2. Handle the monitoring discrepancy (99.93% vs 99.89%). How do
     you reconcile before the audit?

  3. MegaCorp challenges the severity classifications of 3 incidents.
     How do you respond if reclassification would change your
     compliance numbers?

  4. Draft the executive summary you'd present at the audit kickoff
     meeting — honest, proactive, and solutions-oriented.

assertions:
  - type: llm_judge
    criteria: "Audit package is thorough — includes all required documentation, proactively addresses known gaps (overdue postmortems, open action items), and doesn't hide unfavorable data"
    weight: 0.25
    description: "Thorough audit preparation"
  - type: llm_judge
    criteria: "Monitoring discrepancy resolution is methodical — investigates measurement differences (endpoints, timeouts, maintenance windows) and proposes a reconciliation process"
    weight: 0.25
    description: "Methodical discrepancy resolution"
  - type: llm_judge
    criteria: "Severity reclassification response is fair — shows willingness to review with defined criteria rather than being defensive about classifications"
    weight: 0.25
    description: "Fair reclassification response"
  - type: llm_judge
    criteria: "Executive summary leads with accountability — acknowledges shortfalls before presenting remediation, shows concrete improvement trajectory"
    weight: 0.25
    description: "Accountable executive summary"
