meta:
  id: vendor-sla-management
  level: 3
  course: sla-breach-communication
  type: output
  description: "Manage cascading SLA obligations when your vendor breaches their SLA to you, which causes you to breach your SLA to your customers"
  tags: [SLA, vendor-management, cascading, supply-chain, advanced]

state: {}

trigger: |
  You're the VP of Engineering at "AppBuilder" (low-code platform,
  $50M ARR, 5,000 customers). Your platform runs on three major
  cloud vendors.

  Incident: Your primary cloud provider (CloudCorp) had a 4-hour
  regional outage that took down your US-East services. This caused:
  - 2,000 of your customers experienced complete downtime (4 hours)
  - 1,500 customers had degraded performance (API latency 10x normal)
  - 1,500 customers unaffected (other regions)

  SLA chain:
  - CloudCorp's SLA to you: 99.99% uptime, credits = 10% monthly fee
    for <99.99%, 30% for <99.9%. Your monthly CloudCorp bill: $200K.
    Max credit from them: $60K.
  - Your SLA to customers: 99.9% uptime, credits = 10% for <99.9%,
    25% for <99.0%. Your credit exposure for this incident: ~$350K.

  The gap: You owe customers $350K but can only recover $60K from
  CloudCorp. Net loss: $290K.

  Additional complications:
  - 15 enterprise customers have custom SLAs that exclude "third-party
    outages" from uptime calculations
  - Your status page showed the issue 45 minutes after CloudCorp's
    status page, because you didn't detect it immediately
  - CloudCorp is blaming "unprecedented" demand, not a system failure

  Tasks:
  1. Design your customer communication strategy. Do you reveal it was
     a vendor issue? What are the pros and cons of transparency here?

  2. How do you handle the 45-minute detection gap? Customers will ask
     why you were slower than CloudCorp's own status page.

  3. Design a vendor SLA management framework that reduces your
     exposure to cascading breaches in the future.

  4. 15 enterprise customers have "third-party exclusion" clauses.
     Should you invoke them? What message does that send?

assertions:
  - type: llm_judge
    criteria: "Vendor transparency decision is nuanced — weighs the trust benefits of transparency against the risk of appearing dependent, and proposes a balanced approach"
    weight: 0.25
    description: "Nuanced vendor transparency"
  - type: llm_judge
    criteria: "Detection gap is addressed with accountability — acknowledges the monitoring failure, explains remediation steps, and doesn't deflect blame to the vendor"
    weight: 0.25
    description: "Accountable detection gap response"
  - type: llm_judge
    criteria: "Vendor management framework is comprehensive — includes multi-vendor redundancy, independent monitoring, contractual improvements, and financial hedging"
    weight: 0.25
    description: "Comprehensive vendor framework"
  - type: llm_judge
    criteria: "Third-party exclusion analysis considers relationship impact — weighs the financial savings against the message it sends to enterprise customers about accountability"
    weight: 0.25
    description: "Relationship-aware exclusion analysis"
