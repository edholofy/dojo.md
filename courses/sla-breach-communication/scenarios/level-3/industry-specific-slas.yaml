meta:
  id: industry-specific-slas
  level: 3
  course: sla-breach-communication
  type: output
  description: "Navigate industry-specific SLA requirements for healthcare, financial services, and government sectors with unique compliance and regulatory obligations"
  tags: [SLA, compliance, healthcare, fintech, government, advanced]

state: {}

trigger: |
  You're the Head of Compliance at "MultiCloud" (managed cloud services,
  $200M ARR). Your platform serves customers across regulated industries.
  A 2-hour outage last week affects customers differently based on their
  industry.

  The outage: 2 hours of degraded API performance (50% of requests
  failing) across all regions. Root cause: database connection pool
  exhaustion.

  Affected customers by industry:

  Healthcare (30 customers, $20M ARR):
  - HIPAA requires 99.99% availability for systems handling PHI
  - 3 hospital systems had EHR access disrupted during the outage
  - One hospital reports a patient safety near-miss due to inability
    to access medication records
  - HIPAA breach notification may be required within 60 days

  Financial Services (50 customers, $40M ARR):
  - SOC 2 Type II audit is next month — this outage affects the report
  - SEC Rule 17a-4 requires continuous access to financial records
  - Two broker-dealers couldn't execute trades during the window
  - Contractual SLAs include "no more than 10 minutes of unplanned
    downtime per quarter"

  Government (10 customers, $15M ARR):
  - FedRAMP continuous monitoring requires incident reporting within
    72 hours
  - One agency is processing tax returns with an IRS deadline
  - Government SLAs include liquidated damages (not just credits)

  Tasks:
  1. For each industry, outline the regulatory notification
     requirements triggered by this outage.

  2. The hospital reports a patient safety near-miss. How do you
     handle this? What's your legal and operational response?

  3. The SOC 2 audit is next month. How do you work with the financial
     services customers to ensure the outage doesn't derail their audit?

  4. Design industry-specific SLA addendums that account for regulatory
     requirements while remaining commercially viable.

assertions:
  - type: llm_judge
    criteria: "Regulatory requirements are accurately identified — correctly distinguishes HIPAA notification, SOC 2 implications, SEC record access, and FedRAMP reporting timelines"
    weight: 0.25
    description: "Accurate regulatory identification"
  - type: llm_judge
    criteria: "Patient safety response is appropriately serious — treats the near-miss with gravity, involves legal and medical affairs, and proposes concrete remediation"
    weight: 0.25
    description: "Serious patient safety response"
  - type: llm_judge
    criteria: "SOC 2 audit guidance is practical — suggests incident documentation, remediation evidence, and auditor communication that contextualizes the outage"
    weight: 0.25
    description: "Practical SOC 2 guidance"
  - type: llm_judge
    criteria: "Industry addendums balance compliance and viability — proposes enhanced SLA terms for regulated industries with appropriate pricing and scope"
    weight: 0.25
    description: "Balanced industry addendums"
