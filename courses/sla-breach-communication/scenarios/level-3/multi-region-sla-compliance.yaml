meta:
  id: multi-region-sla-compliance
  level: 3
  course: sla-breach-communication
  type: output
  description: "Manage SLA compliance across multiple geographic regions with different availability zones, regulations, and customer expectations"
  tags: [SLA, multi-region, compliance, global-operations, advanced]

state: {}

trigger: |
  You're the Global SLA Manager at "WorldAPI" (API gateway service,
  $180M ARR, 20,000 customers across 6 regions).

  Your regions and current SLA performance (last 30 days):
  - US-East: 99.97% (13 min downtime) — within 99.9% SLA
  - US-West: 99.99% (4 min downtime) — within SLA
  - EU-West: 99.85% (65 min downtime) — BREACHED (99.9% SLA)
  - EU-Central: 99.92% (35 min downtime) — within SLA (barely)
  - APAC-Tokyo: 99.94% (26 min downtime) — within SLA
  - APAC-Sydney: 99.78% (95 min downtime) — BREACHED

  Complications:
  - EU customers are subject to GDPR — their data can't failover to
    US regions even during outages
  - APAC-Sydney has persistent infrastructure issues (aging hardware,
    vendor support gaps)
  - Some customers are "multi-region" — they use 3+ regions and expect
    a global SLA, not per-region
  - Your SLA contract says "per-region uptime" but 60% of customers
    interpret it as "global uptime"
  - EU-West breach was caused by GDPR-mandated data residency
    constraints preventing optimal failover

  Tasks:
  1. Two regions are breached. Design the communication plan: do you
     notify all customers or only those in breached regions? What about
     multi-region customers?

  2. The GDPR data residency constraint caused the EU-West breach.
     How do you communicate that regulatory compliance contributed to
     the outage without blaming regulators?

  3. Customers interpret "per-region" differently than your contracts
     state. Propose a clarified SLA structure for multi-region customers.

  4. APAC-Sydney has chronic issues. Should you offer a different SLA
     for that region, invest in infrastructure, or deprecate it?

assertions:
  - type: llm_judge
    criteria: "Notification plan segments by impact — differentiates communication for breached-region customers, multi-region customers, and unaffected customers"
    weight: 0.25
    description: "Impact-segmented notification"
  - type: llm_judge
    criteria: "GDPR constraint communication is balanced — explains the trade-off between data residency and availability honestly without making GDPR sound like an excuse"
    weight: 0.25
    description: "Balanced GDPR communication"
  - type: llm_judge
    criteria: "Multi-region SLA proposal is clear — defines whether global SLA is the best, worst, or weighted average of regional SLAs, with rationale"
    weight: 0.25
    description: "Clear multi-region SLA proposal"
  - type: llm_judge
    criteria: "APAC-Sydney decision is data-driven — analyzes cost of infrastructure investment vs. revenue from the region vs. customer impact of deprecation"
    weight: 0.25
    description: "Data-driven APAC decision"
