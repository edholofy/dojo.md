meta:
  id: executive-breach-communication
  level: 3
  course: sla-breach-communication
  type: output
  description: "Communicate SLA breaches to executive leadership and the board — framing the technical incident in business terms with clear impact and remediation plans"
  tags: [SLA, executive-communication, board, leadership, advanced]

state: {}

trigger: |
  You're the CTO of "CloudPay" (payment processing SaaS, $150M ARR,
  public company). A major SLA breach occurred yesterday:

  Incident: 3-hour outage of the payment processing API
  - 12,000 merchants couldn't process payments
  - Estimated merchant revenue loss: $45M in failed transactions
  - Service credit exposure: $2.8M
  - Stock dropped 4% in after-hours trading on news reports

  You need to communicate to three executive audiences:

  Audience 1: CEO and CFO (in 30 minutes)
  They want: Financial impact, customer exposure, stock implications,
  and what you're doing about it. The CFO is concerned about the
  credit exposure hitting Q4 earnings.

  Audience 2: Board of Directors (emergency call tomorrow)
  They want: How this happened, why existing safeguards failed, and
  the strategic plan to prevent recurrence. One board member is a
  former AWS VP — they'll ask technical questions.

  Audience 3: Quarterly earnings call (next week)
  Analysts will ask about the outage. The IR team wants prepared
  talking points that are honest without creating additional liability.

  Context:
  - This is the second major outage in 3 quarters
  - You promised the board a "reliability transformation" last quarter
  - Engineering headcount is already 40% of the company
  - Two competitors announced "zero-downtime" architectures last month

  Tasks:
  1. Write the executive briefing for CEO/CFO. Include financial
     impact, customer exposure, and recommended actions.

  2. Prepare the board presentation outline. How do you address the
     failed "reliability transformation" promise?

  3. Draft the earnings call talking points about the outage.

  4. The board asks: "Should we replace the CTO?" How do you make
     the case for your continued leadership?

assertions:
  - type: llm_judge
    criteria: "Executive briefing is business-focused — leads with financial impact and customer exposure, not technical details, and includes clear decision points"
    weight: 0.25
    description: "Business-focused executive briefing"
  - type: llm_judge
    criteria: "Board presentation addresses the failed promise — acknowledges the gap honestly, explains what was underestimated, and presents a revised credible plan"
    weight: 0.25
    description: "Honest board presentation"
  - type: llm_judge
    criteria: "Earnings talking points are legally careful — discloses appropriately without creating additional liability or making forward-looking promises that could backfire"
    weight: 0.25
    description: "Legally careful earnings points"
  - type: llm_judge
    criteria: "Leadership defense is substantive — makes the case based on institutional knowledge, concrete actions taken, and future plan rather than just tenure"
    weight: 0.25
    description: "Substantive leadership defense"
