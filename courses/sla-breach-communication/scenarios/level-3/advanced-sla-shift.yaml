meta:
  id: advanced-sla-shift
  level: 3
  course: sla-breach-communication
  type: output
  description: "Navigate a complex SLA management shift involving regulatory complications, vendor cascading failures, and executive-level decision making"
  tags: [SLA, shift-simulation, multi-incident, decision-making, advanced]

state: {}

trigger: |
  You're the Senior SLA Operations Manager at "GlobalPlatform" (PaaS,
  $250M ARR, 25,000 customers across 4 regions). Your shift: 6 AM to
  6 PM. Today is the last day of the month.

  Monthly SLA status at shift start:
  - Global: 99.92% (34.6 min downtime, max 43.2 min for 99.9% SLA)
  - EU region: 99.88% — already breached for EU customers
  - Budget remaining: 8.6 minutes of global downtime before breach

  7:00 AM — Vendor notification
  Your primary CDN vendor emails: "Planned emergency maintenance on
  EU-West edge nodes, 7:30-8:30 AM UTC. Expected 50% capacity
  reduction." You weren't given 72-hour notice.

  8:30 AM — CDN maintenance extends
  Vendor says: "Maintenance taking longer. ETA: 10:00 AM." EU
  customers report 30% error rates.

  9:00 AM — Regulatory pressure
  A German enterprise customer emails: "We're reporting this to BaFin
  (financial regulator) as a service continuity failure. We need a
  formal incident report within 4 hours."

  10:30 AM — CDN restored but damage done
  Total EU degradation: 3 hours. EU SLA now: 99.46% (232 min down).
  Global SLA now: 99.84% (69 min down). Global SLA breached.

  11:00 AM — Financial reckoning
  Credit exposure calculation:
  - EU customers (5,000): 25% tier = $450K
  - Global impact (all 25,000): 10% tier = $800K
  - Total: $1.25M in service credits this month

  12:00 PM — Customer flood + media
  TechCrunch publishes: "GlobalPlatform's EU service hit by hours-long
  outage." 500 support tickets flood in. Enterprise customers demand
  executive calls.

  2:00 PM — End-of-month pressure
  CFO calls: "Can we delay acknowledging the breach until tomorrow to
  keep it out of this month's financials?" Legal says this is risky.

  Tasks:
  1. Handle each timestamp chronologically. What decisions do you make
     and what communications do you send?

  2. The German regulatory report: draft the incident report for the
     customer to submit to BaFin.

  3. Address the CFO's request to delay breach acknowledgment. What
     do you advise and why?

  4. Write the end-of-shift handoff — everything the next manager
     needs to know.

assertions:
  - type: llm_judge
    criteria: "Chronological decisions are sound — pushes back on vendor, activates failover where possible, prioritizes regulatory and enterprise customers, and communicates proactively at each stage"
    weight: 0.25
    description: "Sound chronological decisions"
  - type: llm_judge
    criteria: "Regulatory report is professional — provides factual incident timeline, impact assessment, root cause, and remediation steps appropriate for a financial regulator"
    weight: 0.25
    description: "Professional regulatory report"
  - type: llm_judge
    criteria: "CFO request is handled with integrity — clearly advises against delaying acknowledgment, explains the legal and reputational risks, and proposes alternative approaches to managing the financial impact"
    weight: 0.25
    description: "Integrity-driven CFO response"
  - type: llm_judge
    criteria: "Shift handoff is comprehensive — covers all open items, pending customer communications, regulatory obligations, credit calculations, and next-day priorities"
    weight: 0.25
    description: "Comprehensive shift handoff"
