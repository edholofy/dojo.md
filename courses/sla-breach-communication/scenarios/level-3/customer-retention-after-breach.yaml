meta:
  id: customer-retention-after-breach
  level: 3
  course: sla-breach-communication
  type: output
  description: "Execute customer trust recovery and retention strategies after significant SLA breaches — repairing relationships and preventing churn"
  tags: [SLA, customer-retention, trust-recovery, churn-prevention, advanced]

state: {}

trigger: |
  You're the VP of Customer Success at "DataSync" (data integration
  platform, $60M ARR, 3,000 customers). Two weeks ago, a catastrophic
  outage took the platform down for 8 hours. Monthly SLA (99.9%) is
  breached. Impact:

  Churn signals detected:
  - 45 customers have contacted sales about contract termination
  - 120 customers have reduced API usage by >50% since the outage
  - 3 enterprise customers ($500K+ ARR each) have started POCs with
    competitors
  - NPS dropped from +42 to +12 in the post-incident survey
  - Glassdoor review from a customer's employee: "DataSync cost us
    $200K and they don't care"

  Customer segments at risk:
  - Segment A: 15 enterprise customers ($8M ARR) — threatening to
    leave, want executive attention and enhanced SLAs
  - Segment B: 30 mid-market customers ($3M ARR) — asking for
    significant credits beyond standard, considering alternatives
  - Segment C: 120 SMB customers ($2M ARR) — quietly reducing usage,
    haven't complained but engagement metrics are declining

  Resources available:
  - $500K discretionary credit budget
  - Engineering can offer "enhanced monitoring" packages
  - Executive team willing to do customer calls
  - New redundancy features shipping in 6 weeks

  Tasks:
  1. Design the retention playbook for each segment. What specific
     actions do you take for A, B, and C?

  2. The 3 enterprise customers doing competitor POCs: Design the
     "save" plan. What do you offer? When do you involve the CEO?

  3. How do you win back the 120 quiet churning SMBs who haven't
     complained? They're the hardest to save because they're silent.

  4. The Glassdoor review is public. How do you respond (if at all)
     and how do you prevent this narrative from spreading?

assertions:
  - type: llm_judge
    criteria: "Retention playbook is segment-specific — proposes different interventions for enterprise (executive attention), mid-market (enhanced credits), and SMB (proactive outreach)"
    weight: 0.25
    description: "Segment-specific retention"
  - type: llm_judge
    criteria: "Enterprise save plan is aggressive — includes executive involvement, custom SLA terms, dedicated resources, and a timeline to demonstrate improvement"
    weight: 0.25
    description: "Aggressive enterprise save plan"
  - type: llm_judge
    criteria: "Silent churn strategy uses data — identifies usage decline patterns, triggers proactive outreach based on engagement metrics, and offers re-engagement incentives"
    weight: 0.25
    description: "Data-driven silent churn strategy"
  - type: llm_judge
    criteria: "Public review response is measured — addresses the concern without being defensive, demonstrates accountability, and redirects to private channels"
    weight: 0.25
    description: "Measured public review response"
