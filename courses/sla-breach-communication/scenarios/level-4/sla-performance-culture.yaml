meta:
  id: sla-performance-culture
  level: 4
  course: sla-breach-communication
  type: output
  description: "Build an engineering culture where SLA performance is a shared value — error budgets, blameless postmortems, reliability incentives, and team accountability"
  tags: [SLA, culture, engineering, error-budgets, blameless, expert]

state: {}

trigger: |
  You're the VP of Engineering at "DevScale" ($120M ARR, 300
  engineers, 8,000 customers). Engineering culture is strong on
  feature velocity but weak on reliability. The CTO says: "Every
  team ships fast, but nobody owns uptime."

  Current problems:
  - Teams celebrate feature launches but not reliability milestones
  - Post-incident reviews blame individuals ("Bob's deploy broke prod")
  - No team has reliability in their OKRs
  - On-call is seen as punishment, not responsibility
  - Error budgets: concept known, not practiced
  - Last quarter: 8 incidents caused by feature teams deploying
    without adequate testing
  - SRE team (6 people) is a "cleanup crew" — called after things break

  Organizational structure:
  - 25 feature teams (10-12 engineers each)
  - 1 SRE team (6 engineers, overworked)
  - 1 platform team (8 engineers)
  - No reliability ownership at team level

  Cultural signals:
  - Promotion criteria: "Impact" = features shipped, not reliability
  - Sprint reviews: only feature demos, never reliability improvements
  - Incident commanders are always the SRE team (feature teams disengage)
  - Engineers fear deploying on Fridays but management hasn't formalized it

  Tasks:
  1. Design the reliability culture transformation. How do you make
     SLA performance a shared engineering value without killing velocity?

  2. Introduce error budgets at the team level. How do you define them,
     what happens when a team exhausts their budget, and how do you
     prevent gaming?

  3. Redesign the post-incident review process. How do you make it
     blameless while maintaining accountability?

  4. Change the incentive structure. How do you make reliability a
     factor in promotions, team reviews, and recognition?

assertions:
  - type: llm_judge
    criteria: "Culture transformation is gradual — starts with awareness, moves to shared ownership, and doesn't impose reliability at the expense of morale"
    weight: 0.25
    description: "Gradual culture transformation"
  - type: llm_judge
    criteria: "Error budget framework is practical — defines budget calculation, consumption tracking, consequences for exhaustion, and anti-gaming measures"
    weight: 0.25
    description: "Practical error budget framework"
  - type: llm_judge
    criteria: "Blameless postmortem process has teeth — ensures learning and follow-through without finger-pointing, with specific facilitator training and template"
    weight: 0.25
    description: "Effective blameless postmortems"
  - type: llm_judge
    criteria: "Incentive redesign is concrete — proposes specific changes to promotion criteria, sprint reviews, and recognition that elevate reliability alongside feature work"
    weight: 0.25
    description: "Concrete incentive redesign"
