meta:
  id: sla-transformation-program
  level: 4
  course: sla-breach-communication
  type: output
  description: "Lead an organization-wide SLA transformation — from reactive breach management to a reliability-first culture with proactive SLA excellence"
  tags: [SLA, transformation, culture, organizational-change, expert]

state: {}

trigger: |
  You're the newly hired VP of Reliability at "LegacyCloud"
  ($200M ARR, 10,000 customers). The board created this role after
  SLA breaches cost the company $8M in credits and $15M in churned
  ARR last year.

  Current state assessment:
  - 12 SLA breaches last year (monthly uptime SLA breached in 4 of
    12 months)
  - Mean time to detect (MTTD): 25 minutes (industry best: <5 min)
  - Mean time to resolve (MTTR): 4 hours (industry best: <30 min)
  - Post-incident reviews: inconsistent, no follow-through
  - Engineering culture: "Move fast, break things" — reliability is
    seen as "operations team's problem"
  - No SRE team, no error budgets, no SLO framework
  - SLA targets were set 5 years ago and never updated
  - Customer-facing status page: often outdated or inaccurate

  Your mandate: Reduce SLA breaches by 80% within 18 months.

  Budget: $3M (headcount, tooling, infrastructure).
  Constraint: Cannot slow down feature development (CEO's directive).

  Organizational resistance:
  - VP of Engineering: "We're already understaffed for features"
  - VP of Sales: "Don't change SLAs — it'll confuse customers"
  - CFO: "The $3M better show ROI within 12 months"
  - Engineering ICs: "SLAs aren't my problem"

  Tasks:
  1. Design the 18-month transformation roadmap. What are the phases,
     milestones, and quick wins?

  2. How do you introduce error budgets and SLOs without slowing
     feature development? Design the framework.

  3. Address each resistant stakeholder. What's your pitch to the VP
     of Engineering, VP of Sales, CFO, and engineering ICs?

  4. Define the metrics that prove the transformation is working.
     What do you measure, and what are the 6-month and 12-month
     targets?

assertions:
  - type: llm_judge
    criteria: "Roadmap has phased approach — starts with quick wins (monitoring, status page), builds to structural changes (SRE team, error budgets), and ends with culture change"
    weight: 0.25
    description: "Phased transformation roadmap"
  - type: llm_judge
    criteria: "Error budget framework coexists with velocity — proposes error budgets that gate risky deployments while allowing safe feature work to continue"
    weight: 0.25
    description: "Velocity-compatible error budgets"
  - type: llm_judge
    criteria: "Stakeholder pitches are tailored — speaks to each person's concerns (engineering: less on-call pain, sales: competitive advantage, CFO: churn reduction ROI, ICs: autonomy)"
    weight: 0.25
    description: "Tailored stakeholder pitches"
  - type: llm_judge
    criteria: "Success metrics are measurable — includes MTTD, MTTR, breach count, credit costs, customer satisfaction, and deployment confidence"
    weight: 0.25
    description: "Measurable success metrics"
