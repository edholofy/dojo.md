meta:
  id: sla-breach-crisis-management
  level: 4
  course: sla-breach-communication
  type: output
  description: "Manage a company-wide SLA crisis where a catastrophic failure breaches SLAs for thousands of customers simultaneously and threatens the business"
  tags: [SLA, crisis-management, catastrophic-failure, leadership, expert]

state: {}

trigger: |
  You're the COO of "CoreStack" (core banking infrastructure,
  $400M ARR, 200 bank customers). A catastrophic database corruption
  event has caused a 12-hour outage — the worst in company history.

  Impact:
  - All 200 bank customers affected (12 hours of total downtime)
  - Monthly SLA (99.99% = 4.32 min max): catastrophically breached
  - Current monthly uptime: 98.33% (720 min = 12 hours down)
  - 15 banks couldn't process any transactions for 8+ hours
  - Estimated customer losses: $500M+ in failed transactions
  - Media coverage: Front page of Wall Street Journal

  SLA credit exposure:
  - Standard SLA: 50% of monthly fee for <98% uptime
  - 40 banks have "enhanced SLA" with 100% credit + liquidated
    damages of 2x monthly fee
  - Total credit exposure: $35M (8.75% of ARR)
  - Liquidated damages exposure: additional $20M

  Regulatory fallout:
  - OCC (Office of the Comptroller) has opened an inquiry
  - 3 banks are required to file regulatory incident reports
  - FDIC is asking about systemic risk implications

  Stakeholders demanding attention:
  - 200 angry bank CIOs
  - Board of directors (emergency meeting in 2 hours)
  - Wall Street Journal reporter requesting comment
  - OCC requesting a formal response within 48 hours
  - Your own engineering team (demoralized, 36-hour shifts)

  Tasks:
  1. Prioritize the first 24 hours. In what order do you address
     stakeholders, and what do you say to each?

  2. Draft the formal response to the OCC inquiry. What do
     regulators need to see?

  3. The $35M credit exposure threatens quarterly results. Design
     the financial mitigation strategy — how do you manage this
     without going bankrupt or losing customers?

  4. 6 banks are considering terminating contracts (total ARR: $30M).
     Design the retention strategy when your credibility is at its
     lowest point.

assertions:
  - type: llm_judge
    criteria: "Prioritization is crisis-appropriate — addresses immediate safety and regulatory obligations first, then customer communication, then media, then internal"
    weight: 0.25
    description: "Crisis-appropriate prioritization"
  - type: llm_judge
    criteria: "Regulatory response is formal and thorough — includes incident timeline, root cause, customer impact, remediation steps, and governance improvements in regulatory language"
    weight: 0.25
    description: "Thorough regulatory response"
  - type: llm_judge
    criteria: "Financial mitigation is creative — considers phased credit distribution, insurance claims, vendor liability, negotiated settlements, and revenue acceleration"
    weight: 0.25
    description: "Creative financial mitigation"
  - type: llm_judge
    criteria: "Retention strategy rebuilds credibility — goes beyond credits to offer architectural changes, dedicated resources, transparency commitments, and governance improvements"
    weight: 0.25
    description: "Credibility-rebuilding retention"
