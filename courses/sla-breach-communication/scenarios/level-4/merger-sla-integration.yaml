meta:
  id: merger-sla-integration
  level: 4
  course: sla-breach-communication
  type: output
  description: "Integrate SLA frameworks during a merger/acquisition — aligning different commitments, migrating customers, and maintaining service during platform consolidation"
  tags: [SLA, M&A, integration, migration, expert]

state: {}

trigger: |
  You're the Chief Integration Officer at "AcquireTech" ($500M ARR).
  AcquireTech just acquired "TargetSaaS" ($80M ARR, 2,000 customers)
  for $400M. The integration plan calls for migrating all TargetSaaS
  customers to AcquireTech's platform within 18 months.

  SLA comparison:
  AcquireTech:
  - 99.9% uptime, measured per-service
  - 10/25/50% credit tiers
  - Response time: P1 in 1 hour, P2 in 4 hours
  - Quarterly SLA reviews
  - No data durability SLA

  TargetSaaS:
  - 99.95% uptime, measured globally
  - Fixed penalty: $100 per minute of downtime
  - Response time: P1 in 15 minutes, P2 in 30 minutes (much faster)
  - Monthly SLA reviews with customer-specific reports
  - 99.9999% data durability SLA

  Problems:
  - TargetSaaS customers have BETTER SLAs than AcquireTech customers
  - Migration itself will cause downtime (estimated: 2-4 hours per
    customer batch)
  - TargetSaaS's $100/minute penalty means migration downtime could
    cost $12K-$24K per customer
  - 50 TargetSaaS customers have "change of control" clauses allowing
    termination if SLA terms change
  - AcquireTech's platform doesn't support the 15-minute P1 response
    time currently

  Financial model:
  - TargetSaaS customer revenue: $80M/year
  - Migration downtime credit exposure: ~$4.8M
  - Potential churn from SLA downgrade: 20% = $16M ARR at risk
  - Cost to match TargetSaaS SLAs: $8M/year in infrastructure + staff

  Tasks:
  1. Design the SLA integration strategy. Do you honor TargetSaaS
     SLAs, migrate to AcquireTech SLAs, or create a hybrid?

  2. Handle the migration downtime problem. How do you migrate 2,000
     customers with minimal SLA impact? What SLA terms apply during
     migration?

  3. 50 customers have "change of control" clauses. Design the
     retention strategy to prevent mass termination.

  4. Write the customer communication announcing the acquisition and
     what it means for their SLA.

assertions:
  - type: llm_judge
    criteria: "Integration strategy is financially sound — weighs the cost of honoring superior SLAs against churn risk of downgrading, and proposes a viable middle ground"
    weight: 0.25
    description: "Financially sound integration"
  - type: llm_judge
    criteria: "Migration plan minimizes SLA impact — proposes rolling migration with maintenance windows, reduced-impact approaches, and SLA grace periods"
    weight: 0.25
    description: "Low-impact migration plan"
  - type: llm_judge
    criteria: "Change of control retention is proactive — reaches out before customers trigger clauses, offers incentives to stay, and addresses their specific concerns"
    weight: 0.25
    description: "Proactive change-of-control retention"
  - type: llm_judge
    criteria: "Acquisition announcement is reassuring — emphasizes continuity, investment, and improvement while being transparent about upcoming changes"
    weight: 0.25
    description: "Reassuring acquisition announcement"
