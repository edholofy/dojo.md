meta:
  id: expert-sla-shift
  level: 4
  course: sla-breach-communication
  type: output
  description: "Navigate an expert-level SLA management shift involving cascading vendor failures, regulatory pressure, executive escalations, and financial crisis management"
  tags: [SLA, shift-simulation, expert, multi-crisis, decision-making]

state: {}

trigger: |
  You're the VP of Global Operations at "MegaPlatform" (critical
  infrastructure SaaS, $600M ARR, 30,000 customers including
  government agencies and financial institutions). Your on-call
  shift: 6 AM to 6 PM. It's the last day of Q4.

  6:00 AM — Shift briefing
  Monthly SLA: 99.94% (26 min downtime, 43.2 min budget remaining).
  Q4 bonus for operations team tied to zero SLA breaches this month.
  3 open P1 tickets. Board meeting tomorrow.

  7:00 AM — Vendor alert
  AWS emails: "We are experiencing elevated error rates in us-east-1.
  ETA for resolution: unknown." Your primary region is us-east-1.
  Your multi-region failover is untested at full load.

  7:30 AM — Decision point
  Error rates climbing to 3%. Do you:
  a) Activate failover to us-west-2 (risky, never tested at scale)
  b) Wait for AWS to resolve (unknown timeline, SLA budget burning)
  c) Partial failover for critical customers only

  8:00 AM — Failover complications (if activated)
  Failover triggers but database replication lag causes 15 minutes
  of stale data for 5,000 customers. Or if you waited: AWS still
  down, 30 minutes of degradation logged.

  9:00 AM — Regulatory escalation
  OCC (bank regulator) calls: "Three of your bank customers have
  reported service disruption. We need a status update in 1 hour
  and a formal incident report within 24 hours."

  10:00 AM — Media + customer storm
  Bloomberg reports the outage. 2,000 support tickets. Your
  enterprise CSMs are overwhelmed. The CEO texts: "Why am I
  reading about this on Bloomberg?"

  11:00 AM — Resolution
  AWS resolves their issue. Total impact: 3.5 hours of degradation.
  Monthly SLA: breached at 99.82%. Q4 operations bonus: gone.

  12:00 PM — Financial fallout
  CFO calculates: $2.8M in credits. $600K from government customers
  with liquidated damages. Insurance claim threshold: $1M (met).

  2:00 PM — Board prep
  CEO says: "I need a board-ready summary by 4 PM. Make it honest
  but show we're in control."

  Tasks:
  1. Walk through your decisions at each timestamp. Justify the
     failover decision at 7:30 AM.

  2. Handle the OCC within their 1-hour window. What do you tell them?

  3. Address the CEO's Bloomberg text. How do you manage up during
     a crisis?

  4. Write the board-ready summary for the CEO by 4 PM.

assertions:
  - type: llm_judge
    criteria: "Failover decision is well-reasoned — weighs the risks of each option, makes a defensible choice, and explains the decision framework used"
    weight: 0.25
    description: "Well-reasoned failover decision"
  - type: llm_judge
    criteria: "OCC communication is regulatory-appropriate — provides factual status, impact to regulated customers, and timeline for formal report without over-committing"
    weight: 0.25
    description: "Regulatory-appropriate OCC response"
  - type: llm_judge
    criteria: "CEO management is executive-appropriate — provides concise status, takes ownership, doesn't make excuses, and focuses on actions being taken"
    weight: 0.25
    description: "Executive-appropriate CEO management"
  - type: llm_judge
    criteria: "Board summary is comprehensive — covers incident, impact, financial exposure, root cause, remediation plan, and forward-looking commitments in board-appropriate language"
    weight: 0.25
    description: "Comprehensive board summary"
