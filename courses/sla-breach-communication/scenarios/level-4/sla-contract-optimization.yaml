meta:
  id: sla-contract-optimization
  level: 4
  course: sla-breach-communication
  type: output
  description: "Optimize SLA contracts to balance customer expectations, legal protection, and operational reality — rewriting terms that have caused recurring problems"
  tags: [SLA, contracts, legal, optimization, expert]

state: {}

trigger: |
  You're the VP of Legal Operations at "ContractCloud" ($250M ARR,
  4,000 customers). The General Counsel says: "Our SLA contract
  language has caused $3M in unnecessary credits and 2 lawsuits
  in the past year. Fix it."

  Problematic clauses:

  Clause 1: "Uptime" definition
  Current: "Service shall maintain 99.9% uptime measured monthly."
  Problem: No definition of how uptime is measured. Customers argue
  any API error is "downtime." You measure binary availability.
  One lawsuit claims that 500ms latency spikes are "downtime."

  Clause 2: Credit calculation
  Current: "Credits shall be calculated based on the total monthly
  fee for all services."
  Problem: A customer paying $50K/month for 5 services had one
  service go down. They claimed $50K credit (10% of total) even
  though the affected service was $5K/month.

  Clause 3: Exclusions
  Current: "Scheduled maintenance, force majeure, and customer-
  caused issues are excluded from uptime calculations."
  Problem: No definition of "force majeure." Customers argue a
  vendor outage isn't force majeure. "Customer-caused" is disputed
  when customers trigger bugs in your software.

  Clause 4: Notification requirements
  Current: "Customer must request credits within 30 days."
  Problem: 60% of eligible customers never claim credits. When you
  auto-calculate, the CFO objects to the cost increase.

  Clause 5: Termination
  Current: "Customer may terminate for cause after 3 SLA breaches
  in any 12-month period."
  Problem: What counts as a "breach"? If you're at 99.89% instead
  of 99.9%, is that one breach for the month? Or is each incident
  a separate breach?

  Tasks:
  1. Rewrite each clause with precise, defensible language.

  2. For the "auto-calculate vs. claim-based" credits debate, what's
     the right approach? Argue both sides.

  3. A customer's lawyer sends a letter arguing your new terms are
     "materially adverse" to existing customers. How do you respond?

  4. Design the SLA contract review process that prevents these
     problems from recurring.

assertions:
  - type: llm_judge
    criteria: "Rewritten clauses are precise — defines measurement methodology, per-service credit calculation, specific exclusions, and breach counting methodology"
    weight: 0.25
    description: "Precise clause rewrites"
  - type: llm_judge
    criteria: "Credit mechanism analysis is balanced — presents arguments for auto-calculation (trust, simplicity) and claim-based (cost control) with a recommended hybrid approach"
    weight: 0.25
    description: "Balanced credit mechanism"
  - type: llm_judge
    criteria: "Legal response is measured — acknowledges the concern, explains the rationale for changes, and offers transition protections"
    weight: 0.25
    description: "Measured legal response"
  - type: llm_judge
    criteria: "Review process prevents recurrence — includes cross-functional review, regular legal audit, customer feedback loop, and version control"
    weight: 0.25
    description: "Preventive review process"
