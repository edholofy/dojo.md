meta:
  id: cascading-failure-management
  level: 4
  course: sla-breach-communication
  type: output
  description: "Manage a cascading SLA failure that propagates through your vendor chain, affects multiple customer tiers, and triggers contractual domino effects"
  tags: [SLA, cascading-failure, vendor-chain, domino-effect, expert]

state: {}

trigger: |
  You're the VP of Operations at "PlatformHub" ($180M ARR,
  multi-layered platform). A cascading failure is unfolding in
  real-time across your vendor and customer chain.

  The cascade (timeline):

  Hour 0: Your DNS provider has a global resolution failure.
  - Impact: All your services unreachable for 45 minutes.

  Hour 1: DNS resolves but your CDN's cache is poisoned from the
  DNS failure. Serving stale/incorrect content.
  - Impact: 30% of API responses returning wrong data for 2 hours.

  Hour 3: A customer's automated system processed incorrect data
  from your API and made bad trading decisions.
  - Customer "TradeFirm" claims $5M in trading losses.

  Hour 4: TradeFirm's customers (pension funds) are now affected.
  They're threatening TradeFirm, who is threatening you.

  Hour 6: Media reports that "PlatformHub data error causes pension
  fund trading losses." Regulators are asking questions.

  SLA chain analysis:
  - DNS provider → you: 99.99% SLA, credit cap: $10K/month
  - CDN provider → you: 99.95% SLA, credit cap: $50K/month
  - You → TradeFirm: 99.9% SLA + data accuracy guarantee, credit
    cap: 12 months fees ($600K)
  - TradeFirm → pension funds: custom SLAs with uncapped liability

  Liability exposure:
  - Your direct: $600K (TradeFirm credit cap)
  - TradeFirm's claim: $5M (beyond your cap)
  - Pension fund claims through TradeFirm: unknown, potentially $50M+
  - Recovery from vendors: max $60K

  Tasks:
  1. Manage the real-time cascade. At each hour, what actions do you
     take and what communications do you send?

  2. TradeFirm demands $5M, citing your "data accuracy guarantee."
     Your cap is $600K. Navigate this negotiation.

  3. Design the post-cascade vendor management improvements. How do
     you prevent DNS → CDN → data corruption cascades?

  4. The pension fund regulator (SEC) asks for your role in the
     trading losses. Draft your formal response.

assertions:
  - type: llm_judge
    criteria: "Real-time cascade management is decisive — takes immediate action at each stage (DNS failover, CDN cache purge, customer data validation alerts) with parallel communication"
    weight: 0.25
    description: "Decisive cascade management"
  - type: llm_judge
    criteria: "TradeFirm negotiation balances empathy and limits — acknowledges impact, offers maximum contractual credit, explores creative alternatives, but doesn't accept uncapped liability"
    weight: 0.25
    description: "Balanced liability negotiation"
  - type: llm_judge
    criteria: "Cascade prevention is systemic — addresses each link in the chain (multi-DNS, CDN validation, data integrity checks) to prevent propagation"
    weight: 0.25
    description: "Systemic cascade prevention"
  - type: llm_judge
    criteria: "Regulatory response is carefully scoped — describes your role factually, delineates responsibility boundaries, and doesn't admit liability beyond contractual obligations"
    weight: 0.25
    description: "Carefully scoped regulatory response"
