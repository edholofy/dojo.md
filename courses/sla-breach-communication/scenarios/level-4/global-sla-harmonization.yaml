meta:
  id: global-sla-harmonization
  level: 4
  course: sla-breach-communication
  type: output
  description: "Harmonize SLA frameworks across a global enterprise with acquired companies, regional differences, and inconsistent legacy commitments"
  tags: [SLA, global-operations, harmonization, M&A, expert]

state: {}

trigger: |
  You're the Global Head of Service Management at "UnifiedTech"
  ($800M ARR). Over the past 3 years, UnifiedTech acquired 4
  companies, each with their own SLA frameworks.

  Current state (4 legacy SLA frameworks):

  Original UnifiedTech (US, 8,000 customers):
  - 99.9% uptime SLA
  - 10/25/50% credit tiers
  - Monthly measurement, quarterly review
  - Well-documented, consistently applied

  Acquired Company A — "EuroSoft" (EU, 3,000 customers):
  - 99.95% uptime SLA
  - Fixed penalty: €5,000 per hour of downtime
  - Includes response time SLA (P1: 15 min, P2: 1 hour)
  - DORA-compliant addendums for financial customers

  Acquired Company B — "AsiaServe" (APAC, 5,000 customers):
  - 99.5% uptime SLA (intentionally lower for cost reasons)
  - No service credits — offers "service extensions" instead
  - Includes data durability SLA (99.999%)
  - No formal measurement methodology documented

  Acquired Company C — "GovCloud" (US Gov, 200 customers):
  - 99.99% uptime SLA (FedRAMP requirement)
  - Liquidated damages at 3x monthly fee for breaches
  - Mandatory quarterly compliance reporting
  - Cannot be changed without government approval

  Problems:
  - Same customer might use products from 2+ acquired companies
  - Engineering is consolidating to one platform but SLAs diverge
  - Sales doesn't know which SLA to offer new customers
  - Credit exposure is unpredictable due to inconsistent formulas
  - Customer confusion: "My EuroSoft SLA says X but UnifiedTech says Y"

  Tasks:
  1. Design the unified SLA framework. How do you harmonize 4
     different approaches without breaking existing contracts?

  2. Handle the "downgrade" problem: EuroSoft customers have 99.95%
     but the unified standard is 99.9%. How do you migrate them?

  3. GovCloud SLAs can't change without government approval. How do
     you maintain a separate government SLA tier within the unified
     framework?

  4. A customer uses products from both EuroSoft and AsiaServe
     acquisitions. They get two separate SLA reports with different
     metrics. Design the unified customer experience.

assertions:
  - type: llm_judge
    criteria: "Unified framework is practical — creates a tiered structure that accommodates legacy commitments while establishing a single new-customer standard"
    weight: 0.25
    description: "Practical unified framework"
  - type: llm_judge
    criteria: "EuroSoft migration is customer-friendly — offers grandfathering, migration incentives, or premium tier options rather than forcing downgrades"
    weight: 0.25
    description: "Customer-friendly migration"
  - type: llm_judge
    criteria: "Government tier is properly isolated — maintains compliance requirements while sharing the broader framework's measurement and reporting infrastructure"
    weight: 0.25
    description: "Properly isolated government tier"
  - type: llm_judge
    criteria: "Cross-product SLA experience is unified — proposes a single dashboard, composite SLA, or product-level breakdown that gives the customer a coherent view"
    weight: 0.25
    description: "Unified cross-product experience"
