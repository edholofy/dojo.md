meta:
  id: sla-architecture-design
  level: 4
  course: sla-breach-communication
  type: output
  description: "Design an end-to-end SLA framework for a new product line — targets, measurement, penalties, governance, and customer communication"
  tags: [SLA, architecture, framework-design, strategy, expert]

state: {}

trigger: |
  You're the VP of Product Operations at "NexusCloud" ($300M ARR,
  infrastructure platform). The company is launching a new "real-time
  data streaming" product line. The CEO says: "Design the SLA from
  scratch. I don't want to repeat the mistakes we made with our
  compute product."

  Compute product SLA problems (lessons learned):
  - SLA was set by Sales without engineering input (99.99%)
  - Measurement methodology was vague ("uptime" never defined)
  - Credit structure was too generous (100% credit at <99.9%)
  - No per-customer SLA tracking — only aggregate
  - Maintenance windows were excluded but poorly communicated
  - No SLA tiers — same SLA for $500/month and $500K/month customers

  New product characteristics:
  - Real-time streaming: latency matters more than binary uptime
  - Customers will measure: message delivery rate, end-to-end latency,
    ordering guarantees, throughput
  - Target market: Financial services (trading), IoT (sensor data),
    and media (live streaming)
  - Pricing: $5K-$200K/month depending on volume
  - Architecture: Multi-region, active-active, 3 availability zones

  Competitive SLAs:
  - Competitor A: 99.95% uptime + P99 latency <100ms, 10-30% credits
  - Competitor B: 99.99% uptime + P99 latency <50ms, up to 100% credit
  - Competitor C: "Reliability SLO" (not SLA) — published targets
    but no contractual penalties

  Tasks:
  1. Design the complete SLA framework:
     - What metrics should the SLA cover? (Not just uptime)
     - What targets for each metric and tier?
     - How do you measure each metric fairly?

  2. Design the penalty/credit structure. How do you avoid the
     "too generous" problem while remaining competitive?

  3. Define the SLA tiers for different customer segments. What does
     each tier include and what does it cost?

  4. The CEO asks: "Should we do an SLO like Competitor C instead of
     a binding SLA?" Advise on the trade-offs.

assertions:
  - type: llm_judge
    criteria: "SLA framework goes beyond uptime — includes latency percentiles, message delivery rate, throughput guarantees, and ordering guarantees appropriate for streaming"
    weight: 0.25
    description: "Beyond-uptime SLA framework"
  - type: llm_judge
    criteria: "Credit structure is balanced — avoids both over-generosity and insulting minimums, with escalating tiers tied to severity and duration"
    weight: 0.25
    description: "Balanced credit structure"
  - type: llm_judge
    criteria: "Tier design is market-aware — differentiates tiers based on customer segment needs (fintech wants low latency, IoT wants throughput, media wants uptime)"
    weight: 0.25
    description: "Market-aware tier design"
  - type: llm_judge
    criteria: "SLO vs SLA analysis is strategic — weighs credibility, sales impact, competitive positioning, and legal exposure of each approach"
    weight: 0.25
    description: "Strategic SLO vs SLA analysis"
