meta:
  id: financial-impact-modeling
  level: 4
  course: sla-breach-communication
  type: output
  description: "Model the financial impact of SLA breaches — credit exposure, churn correlation, insurance, and investment justification for reliability improvements"
  tags: [SLA, financial-modeling, ROI, business-case, expert]

state: {}

trigger: |
  You're the Director of Business Operations at "ScaleForce"
  (enterprise SaaS, $350M ARR, 1,500 customers). The CFO wants a
  comprehensive financial model for SLA management.

  Historical data (last 24 months):
  - Total SLA credits paid: $4.2M
  - Revenue churned correlated to breaches: $12M
  - Average breach → churn lag: 90 days
  - Customer acquisition cost (CAC): $45K per enterprise customer
  - Gross margin: 78%
  - Customer lifetime value (LTV): $280K

  Reliability investment options:
  - Option A: Multi-region active-active ($5M upfront + $2M/year)
    Expected impact: Reduce breaches from 8/year to 2/year
  - Option B: Enhanced monitoring + SRE team ($3M/year headcount)
    Expected impact: Reduce MTTR 60%, cut breach duration in half
  - Option C: Reliability insurance ($800K/year premium)
    Coverage: Up to $10M per year in credit obligations
  - Option D: All of the above ($5M upfront + $5.8M/year)

  Breach scenarios to model:
  - Scenario 1: "Normal year" — 6 minor breaches (10-30 min each)
  - Scenario 2: "Bad year" — 6 minor + 2 major (2-4 hours each)
  - Scenario 3: "Catastrophic" — 1 event with 8+ hours downtime

  Additional factors:
  - Insurance: Cyber liability policy covers $5M but has a $500K
    deductible and excludes "known reliability issues"
  - Contractual: 200 customers have "termination for chronic breach"
    clauses (3+ breaches in 12 months)
  - Competitive: 30% of churned customers cite reliability as the
    primary reason

  Tasks:
  1. Build the financial model: Calculate total cost of breaches
     (credits + churn + acquisition cost to replace) for each
     scenario.

  2. Calculate ROI for each investment option. Which offers the best
     return? Show your math.

  3. The CFO asks: "Should we buy the insurance or invest in
     reliability?" Make the case with numbers.

  4. Present the "cost of doing nothing" — what happens to the P&L
     over 3 years without investment?

assertions:
  - type: llm_judge
    criteria: "Financial model is comprehensive — includes direct costs (credits), indirect costs (churn, replacement), and opportunity costs (expansion revenue lost) for each scenario"
    weight: 0.25
    description: "Comprehensive financial model"
  - type: llm_judge
    criteria: "ROI calculations show work — presents NPV or payback period for each option with clearly stated assumptions"
    weight: 0.25
    description: "Transparent ROI calculations"
  - type: llm_judge
    criteria: "Insurance vs investment analysis is nuanced — considers insurance as complement not substitute, and evaluates moral hazard of relying on insurance"
    weight: 0.25
    description: "Nuanced insurance analysis"
  - type: llm_judge
    criteria: "Cost of inaction is compelling — projects escalating costs, competitive loss, and potential inflection points that make inaction increasingly expensive"
    weight: 0.25
    description: "Compelling inaction cost"
