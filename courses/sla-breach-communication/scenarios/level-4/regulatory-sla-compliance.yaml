meta:
  id: regulatory-sla-compliance
  level: 4
  course: sla-breach-communication
  type: output
  description: "Navigate complex regulatory SLA requirements across jurisdictions — DORA, SOC 2, HIPAA, FedRAMP — while maintaining commercial viability"
  tags: [SLA, regulatory, DORA, compliance, multi-jurisdiction, expert]

state: {}

trigger: |
  You're the Chief Compliance Officer at "RegTech Cloud" (regulated
  industry cloud platform, $500M ARR, serving financial services,
  healthcare, and government). New regulations are forcing you to
  overhaul your SLA framework.

  Regulatory requirements by jurisdiction:

  EU — DORA (Digital Operational Resilience Act):
  - ICT service providers must guarantee specific availability targets
  - Mandatory incident reporting to regulators within 4 hours
  - Exit strategy SLAs: must guarantee service continuity during
    customer migration (up to 24 months)
  - Subcontractor chain transparency required
  - Effective January 2025

  US — FedRAMP:
  - 99.95% uptime for government workloads
  - Continuous monitoring and monthly reporting
  - Incident response within 1 hour for government customers
  - Annual third-party audit of SLA compliance

  Healthcare — HIPAA:
  - No specific uptime number but "reasonable availability"
  - Breach notification within 60 days
  - BAA (Business Associate Agreement) SLAs must be documented

  Financial Services — SOC 2 + SEC:
  - Continuous availability of financial records
  - 24-hour maximum recovery time
  - Annual SOC 2 Type II certification

  Current state:
  - One global SLA (99.9% uptime, same for all customers)
  - No regulatory-specific SLA tiers
  - Incident reporting is manual (average: 6 hours to notify)
  - No exit strategy SLAs
  - Subcontractor SLAs are not disclosed to customers

  Tasks:
  1. Design the regulatory-compliant SLA framework. How many SLA
     tiers do you need, and what does each cover?

  2. DORA requires exit strategy SLAs. Design the service continuity
     guarantees for customers migrating away.

  3. You can't meet the FedRAMP 1-hour incident response for all
     customers. How do you tier your incident response SLAs?

  4. An audit reveals you've been non-compliant with DORA's
     subcontractor transparency requirements. How do you remediate
     and communicate this to affected customers?

assertions:
  - type: llm_judge
    criteria: "Regulatory SLA framework addresses each jurisdiction — creates distinct tiers or addendums for DORA, FedRAMP, HIPAA, and SOC 2 with specific metrics"
    weight: 0.25
    description: "Jurisdiction-specific SLA framework"
  - type: llm_judge
    criteria: "Exit strategy SLA is practical — defines data portability timelines, service continuity periods, format guarantees, and support during migration"
    weight: 0.25
    description: "Practical exit strategy SLA"
  - type: llm_judge
    criteria: "Incident response tiering is defensible — creates prioritized response tiers based on regulatory requirements with clear resource allocation"
    weight: 0.25
    description: "Defensible incident response tiers"
  - type: llm_judge
    criteria: "Non-compliance remediation is proactive — discloses the gap, presents a remediation timeline, and implements transparency measures"
    weight: 0.25
    description: "Proactive non-compliance remediation"
