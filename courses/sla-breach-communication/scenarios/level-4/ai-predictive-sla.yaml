meta:
  id: ai-predictive-sla
  level: 4
  course: sla-breach-communication
  type: output
  description: "Design AI-powered predictive SLA management — using machine learning to predict breaches, automate responses, and optimize reliability investments"
  tags: [SLA, AI, predictive-analytics, automation, expert]

state: {}

trigger: |
  You're the VP of Engineering at "AIops Platform" ($150M ARR,
  12,000 customers). The board wants you to build an AI-powered
  SLA management system. "We should be predicting breaches, not
  reacting to them."

  Available data:
  - 3 years of infrastructure metrics (CPU, memory, network, disk)
    at 10-second granularity
  - 3 years of application metrics (error rates, latency, throughput)
  - 500+ post-incident reports with root causes categorized
  - Customer usage patterns (time-of-day, seasonal, growth trends)
  - Deployment logs (500+ deployments/month with rollback data)
  - External signals (cloud provider status, DNS, CDN metrics)

  Current breach patterns (from historical analysis):
  - 40% of breaches follow deployments (within 2 hours)
  - 25% are caused by traffic spikes exceeding capacity
  - 20% are cascading failures from vendor issues
  - 15% are "novel" failures not seen before

  Requirements:
  - Predict potential SLA breaches 30+ minutes before they happen
  - Automatically trigger mitigation actions for known failure modes
  - Generate customer communications when breach probability > 80%
  - Provide breach risk scores for each customer based on their
    specific infrastructure and usage patterns

  Concerns:
  - False positives: If you alert on every prediction, teams will
    ignore alerts (alert fatigue)
  - False negatives: Missing a predicted breach is worse than no
    prediction at all
  - Automation risk: Auto-mitigation could itself cause incidents
  - Customer communication: Telling customers "we predict a breach"
    before it happens — is that reassuring or alarming?

  Tasks:
  1. Design the predictive model architecture. What inputs, what
     algorithms, and how do you validate predictions?

  2. Design the automated response system with appropriate guardrails.
     What can be auto-mitigated vs. what needs human approval?

  3. Handle the false positive/negative trade-off. What precision
     and recall targets do you set, and how do you tune them?

  4. Should you tell customers when you predict a breach? Design the
     pre-breach customer communication strategy.

assertions:
  - type: llm_judge
    criteria: "Predictive model design is practical — identifies specific input features, appropriate ML approaches (anomaly detection, time series), and validation methodology"
    weight: 0.25
    description: "Practical predictive model"
  - type: llm_judge
    criteria: "Automation guardrails are appropriate — defines a confidence threshold for auto-mitigation, human-in-the-loop for high-risk actions, and rollback mechanisms"
    weight: 0.25
    description: "Appropriate automation guardrails"
  - type: llm_judge
    criteria: "False positive/negative trade-off is thoughtful — sets asymmetric thresholds favoring recall over precision for critical services, with tuning strategy"
    weight: 0.25
    description: "Thoughtful precision-recall trade-off"
  - type: llm_judge
    criteria: "Pre-breach communication strategy is nuanced — considers customer segment, probability threshold, and framing that builds trust rather than causing alarm"
    weight: 0.25
    description: "Nuanced pre-breach communication"
