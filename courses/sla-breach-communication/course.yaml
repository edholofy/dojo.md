id: sla-breach-communication
name: "SLA Breach Communication & Management"
description: >
  Master SLA breach communication across all 20 domains: types and components
  (uptime, response time, resolution time, service credits), breach detection
  and monitoring (real-time systems, early warnings, predictive analytics),
  customer notification (proactive vs reactive, timing, channels), service credit
  calculations (formulas, automatic vs manual, industry standards), internal
  escalation (severity levels, war rooms, escalation matrices), root cause
  analysis (blameless postmortems, 5 Whys, action items), SLA renegotiation
  (contract amendments, customer retention), multi-tier management (gold/silver/bronze),
  reporting and dashboards (uptime reports, compliance tracking), legal
  implications (contractual obligations, liability, indemnification), SLA design
  best practices (achievable targets, measurement methodology, exclusions),
  customer trust recovery (relationship repair, enhanced monitoring), industry-specific
  SLAs (cloud, SaaS, healthcare, financial services), penalty structures (service
  credits, fee reductions, termination rights), cascading SLA breaches (vendor
  dependencies, pass-through penalties), SLA breach trends and statistics,
  proactive management (preventive measures, capacity planning, redundancy),
  executive and board communication, and SLA governance frameworks (organizational
  ownership, review cycles, continuous improvement).

levels: 5
scenarios_per_level: 12
tags: [operations, customer-success, incident-management, communication, compliance, contracts, leadership]
