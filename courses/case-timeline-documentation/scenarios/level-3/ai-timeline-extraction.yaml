meta:
  id: ai-timeline-extraction
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Design an AI-powered timeline extraction system — build an automated pipeline that extracts timeline events from unstructured legal documents, medical records, and communications using NLP and LLMs"
  tags: [ai-extraction, nlp-pipeline, document-analysis, advanced]

state: {}

trigger: |
  A legal technology company wants to build an
  AI-powered system that automatically extracts
  timeline events from legal documents. Design
  the system architecture and extraction pipeline.

  INPUT DOCUMENTS (typical case):
  - 50,000 pages of discovery documents
  - 5,000 emails with attachments
  - 2,000 pages of medical records
  - 500 pages of deposition transcripts
  - 300 pages of corporate records
  - Court filings and correspondence

  EXTRACTION REQUIREMENTS:
  - Identify dates and temporal expressions
    ("three weeks later," "the following Monday")
  - Extract event descriptions with participants
  - Classify events by type (legal, medical,
    financial, communication, etc.)
  - Resolve conflicting dates across documents
  - Link events to source documents with page
    references
  - Handle ambiguous dates and date ranges
  - Detect gaps in the timeline
  - Identify key events vs. routine events
  - Support attorney review and correction workflow
  - Maintain chain of custody for evidentiary purposes

  ACCURACY REQUIREMENTS:
  - Date extraction: 98%+ accuracy
  - Event classification: 90%+ accuracy
  - Zero tolerance for missed critical deadlines
  - Attorney review required before finalization
  - Audit trail for all AI-generated entries

  Create:
  1. System architecture for AI timeline extraction
  2. NLP pipeline design (preprocessing, extraction,
     classification, resolution)
  3. Conflict resolution algorithms for contradictory
     dates
  4. Attorney review workflow
  5. Quality metrics and validation framework

assertions:
  - type: llm_judge
    criteria: "NLP pipeline design covers the full extraction workflow — preprocessing (OCR for scanned documents, email parsing, deposition formatting); temporal expression recognition (absolute dates, relative dates, duration expressions, date ranges); event extraction using named entity recognition and relationship extraction; event classification into legal, medical, financial, communication categories; the pipeline handles the specific challenges of legal documents including Bates numbering, exhibit references, and legal terminology."
    weight: 0.35
    description: "NLPPipelineDesign"
  - type: llm_judge
    criteria: "Conflict resolution algorithms handle contradictory information — when multiple documents give different dates for the same event, the system ranks sources by reliability (court filings > contemporaneous records > deposition testimony > later correspondence); the system flags conflicts for attorney review rather than silently resolving them; the resolution workflow presents conflicting dates side-by-side with source document excerpts; confidence scores indicate the system's certainty level for each extracted event."
    weight: 0.35
    description: "ConflictResolutionAlgorithms"
  - type: llm_judge
    criteria: "Attorney review workflow balances automation with human oversight — extracted events are presented in a review queue sorted by confidence score (lowest confidence first for prioritized review); attorneys can approve, modify, or reject each event; the system learns from corrections to improve future extractions; audit trails track every AI extraction and human modification for evidentiary chain of custody; the zero-tolerance requirement for critical deadlines is met by requiring explicit attorney verification of all deadline-related events."
    weight: 0.30
    description: "AttorneyReviewWorkflow"
