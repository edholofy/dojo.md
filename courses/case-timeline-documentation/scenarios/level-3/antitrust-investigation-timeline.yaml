meta:
  id: antitrust-investigation-timeline
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Build an antitrust investigation timeline — track price-fixing conspiracy events, DOJ/FTC investigation milestones, leniency applications, and parallel civil litigation across a multi-year cartel investigation"
  tags: [antitrust, price-fixing, doj-investigation, advanced]

state: {}

trigger: |
  Create a timeline for a price-fixing cartel
  investigation in the auto parts industry.

  CONSPIRACY: Alleged price-fixing among 4 major
  manufacturers of automotive electronic control
  units (ECUs) sold to major automakers

  CONSPIRATORS:
  - TechParts Inc. (US) — first to apply for leniency
  - EuroParts GmbH (Germany)
  - AsiaElectronics Co. (Japan)
  - GlobalSupply Ltd. (South Korea)

  CUSTOMERS (VICTIMS):
  - Ford, GM, Toyota, Honda, BMW (major automakers)

  CONSPIRACY TIMELINE:
  - 2015: Executives from all 4 companies meet at
    Frankfurt Auto Show; agree to coordinate pricing
  - 2016-2020: Quarterly meetings rotate between
    Tokyo, Frankfurt, Seoul, and Chicago
  - 2016-2020: Companies exchange pricing information
    via encrypted messaging app
  - Each bid round: companies pre-agree which company
    will submit lowest bid; rotate "winners"
  - Estimated overcharge: 15-20% above competitive
    price levels ($800M in affected commerce)

  INVESTIGATION TIMELINE:
  - Jan 2021: TechParts VP (whistleblower) contacts
    DOJ Antitrust Division; applies for leniency
    under Amnesty Program
  - Mar 2021: DOJ grants conditional leniency to
    TechParts
  - May 2021: DOJ opens grand jury investigation
  - Jun 2021: FBI raids EuroParts' US offices; seizes
    computers and documents
  - Aug 2021: AsiaElectronics applies for Amnesty
    Plus (cooperating in exchange for reduced
    penalties in separate investigation)
  - Oct 2021: Grand jury subpoenas issued to all
    companies and 15 individual executives
  - Jan 2022: EuroParts agrees to plea agreement —
    $180M fine, 2 executives agree to prison time
  - Apr 2022: AsiaElectronics plea — $120M fine
  - Jul 2022: GlobalSupply contests charges; goes
    to trial
  - Nov 2022: GlobalSupply convicted; $250M fine,
    CEO sentenced to 3 years
  - 2023-2024: Civil follow-on lawsuits by automakers
    (treble damages under Clayton Act)
  - 2024: EU Commission opens parallel investigation
    under Article 101 TFEU

  Create:
  1. Conspiracy timeline (covert activities)
  2. Investigation and prosecution timeline
  3. Leniency program analysis
  4. Civil follow-on litigation timeline
  5. Cross-border enforcement coordination

assertions:
  - type: llm_judge
    criteria: "Conspiracy timeline maps the covert cartel activities — tracks the formation at Frankfurt Auto Show (2015), quarterly rotation of meetings across four countries, encrypted communication channels, bid-rigging rotation scheme, and the 5-year duration of anticompetitive conduct; the timeline quantifies the affected commerce ($800M) and estimated overcharge (15-20%); each conspirator's role and participation level is documented to support individual liability assessments; the timeline distinguishes between per se violations (price-fixing, bid-rigging) and evidence of agreement."
    weight: 0.35
    description: "ConspiracyTimeline"
  - type: llm_judge
    criteria: "Leniency program analysis tracks the strategic dynamics of cooperation — TechParts' first-in leniency application (Jan 2021) secured conditional immunity from criminal prosecution; EuroParts' and AsiaElectronics' later cooperation earned reduced penalties but not immunity; GlobalSupply's decision to contest charges resulted in the highest penalties ($250M fine, CEO imprisonment); the timeline illustrates the race-to-cooperate incentive structure of the DOJ Amnesty Program and how sequential cooperation agreements provided escalating evidence against remaining defendants."
    weight: 0.35
    description: "LeniencyProgramAnalysis"
  - type: llm_judge
    criteria: "Cross-border enforcement coordination addresses parallel proceedings — the EU Commission investigation (2024) under Article 101 runs parallel to completed US criminal proceedings; the timeline addresses double jeopardy and ne bis in idem issues between US and EU; cooperation between DOJ and EU DG Competition through existing MLATs and competition cooperation agreements; the civil follow-on suits by automakers seek treble damages under the Clayton Act using the criminal convictions as prima facie evidence (Section 5(a) of the Clayton Act); the timeline coordinates US criminal, US civil, and EU administrative proceedings."
    weight: 0.30
    description: "CrossBorderEnforcement"
