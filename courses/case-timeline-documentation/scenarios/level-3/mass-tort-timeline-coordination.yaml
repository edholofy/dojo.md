meta:
  id: mass-tort-timeline-coordination
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Design a mass tort timeline coordination system — manage thousands of individual plaintiff timelines, bellwether trial selection, MDL coordination, and global settlement negotiations across a mass tort litigation"
  tags: [mass-tort, mdl-coordination, bellwether-trials, advanced]

state: {}

trigger: |
  Design a timeline management system for a
  pharmaceutical mass tort litigation involving
  thousands of plaintiffs.

  LITIGATION: In re PharmaCo Painkiller Litigation
  MDL No. 2XXX (E.D. Pennsylvania)
  Drug: "ReliefMax" — prescription painkiller alleged
  to cause liver damage

  SCALE:
  - 8,500 individual cases consolidated in MDL
  - New cases filing at rate of 200/month
  - Plaintiffs from all 50 states
  - 47 different law firms representing plaintiffs
  - Defense team: 3 law firms for PharmaCo

  KEY DATES:
  - 2015: ReliefMax FDA approved
  - 2015-2020: 25 million prescriptions written
  - 2019: First adverse event reports to FDA
  - 2020: FDA adds black box warning for liver risk
  - 2021: First lawsuits filed
  - 2022: JPML creates MDL
  - 2023: Plaintiffs' Steering Committee (PSC)
    appointed (12 firms)
  - 2024: Bellwether discovery pool of 50 cases
    selected
  - 2025: First bellwether trial set for October 2025

  INDIVIDUAL PLAINTIFF DATA POINTS:
  Each plaintiff timeline must track:
  - Date of first ReliefMax prescription
  - Duration of use and dosage
  - Date of liver injury diagnosis
  - Medical treatment history
  - Prior liver conditions (defense causation argument)
  - Statute of limitations compliance
  - State-specific legal requirements
  - Plaintiff fact sheet completion status

  COORDINATION CHALLENGES:
  - Plaintiff fact sheets: only 60% complete
  - 15% of cases may be time-barred in their
    respective states
  - Defense argues individual causation issues
    preclude class treatment
  - Settlement demand: $4.2B aggregate
  - PharmaCo offers: $1.8B, tiered by injury severity

  Create:
  1. MDL master timeline and coordination framework
  2. Individual plaintiff timeline template
  3. Bellwether selection timeline and criteria
  4. Statute of limitations audit system
  5. Settlement tier classification timeline

assertions:
  - type: llm_judge
    criteria: "MDL master timeline coordinates the macro-level litigation — tracks the progression from FDA approval (2015) through adverse events (2019), MDL creation (2022), bellwether discovery (2024), to first trial (Oct 2025); the PSC's responsibilities and deadlines are documented; common discovery (general causation experts, corporate documents, FDA communications) is tracked separately from individual discovery; the timeline manages the 200/month new case intake process and fact sheet completion tracking (60% complete = 3,400 outstanding)."
    weight: 0.35
    description: "MDLMasterTimeline"
  - type: llm_judge
    criteria: "Statute of limitations audit system addresses the 15% at-risk cases — creates a state-by-state analysis of applicable limitation periods (typically 2-3 years from discovery of injury); the system identifies when each plaintiff's clock started based on diagnosis date vs. when they knew or should have known about the drug connection; the FDA black box warning (2020) may constitute constructive notice; tolling arguments (discovery rule, fraudulent concealment by PharmaCo) are mapped for each at-risk case; the audit prioritizes the ~1,275 at-risk cases for immediate review."
    weight: 0.35
    description: "StatuteOfLimitationsAudit"
  - type: llm_judge
    criteria: "Settlement tier classification uses timeline data for injury severity categorization — creates tiers based on: duration of drug use, severity of liver injury (elevated enzymes → hepatitis → cirrhosis → liver failure → transplant → death), time from drug use to injury onset, and absence of alternative causes; each tier maps to a settlement value range within the $1.8B-$4.2B negotiation space; the bellwether trial results will calibrate the tier values; the system handles the 47-firm plaintiff allocation and attorney fee structures."
    weight: 0.30
    description: "SettlementTierClassification"
