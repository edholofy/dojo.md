meta:
  id: forensic-digital-evidence-timeline
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Create a forensic digital evidence timeline — reconstruct events from digital forensic artifacts including file metadata, system logs, network traffic, and mobile device data while maintaining chain of custody"
  tags: [digital-forensics, metadata-analysis, chain-of-custody, advanced]

state: {}

trigger: |
  Create a forensic digital evidence timeline for
  a corporate embezzlement investigation involving
  multiple digital evidence sources.

  CASE: Investigation of CFO David Park's alleged
  embezzlement of $2.3M from Apex Technologies Inc.
  over a 3-year period

  DIGITAL EVIDENCE COLLECTED:
  1. Corporate laptop (Dell XPS, seized Nov 2024)
  2. Corporate email (Microsoft 365, preserved)
  3. Company ERP system logs (SAP)
  4. Corporate bank transaction records
  5. Personal phone (iPhone 15, seized under warrant)
  6. Cloud storage (personal Dropbox, subpoenaed)
  7. Network access logs (VPN, badge access)

  FORENSIC FINDINGS:

  Laptop Analysis:
  - File "vendor_payments_actual.xlsx" created
    Mar 15, 2022; last modified Oct 30, 2024
  - File metadata shows author: "David Park"
  - Spreadsheet contains two sheets: "Official"
    (matches company records) and "Actual" (shows
    discrepancies totaling $2.3M)
  - Browser history: 847 visits to offshore banking
    portal (First Caribbean International Bank)
    between Jan 2022 and Nov 2024
  - USB device connected 34 times between Mar 2022
    and Oct 2024 (SanDisk Ultra 128GB, SN: XXXX)
  - Deleted files recovered: "shell_company_docs"
    folder containing incorporation papers for
    "Pacific Consulting LLC" (Nevada entity)

  Email Analysis:
  - 23 emails between Park and "payments@pacific-
    consulting-llc.com" discussing "consulting fees"
  - Internal emails from Park approving 47 payments
    to Pacific Consulting LLC totaling $2.3M
  - No RFP, competitive bid, or board approval for
    Pacific Consulting engagement
  - Email to personal account forwarding company
    financial reports (monthly, 2022-2024)

  ERP/Banking:
  - 47 wire transfers to Pacific Consulting LLC's
    account at First Caribbean International Bank
  - Payment amounts structured to stay below $50K
    review threshold (all between $35K-$49.5K)
  - Pacific Consulting LLC bank account owned by
    "David Park, sole member"
  - Transactions processed on Fridays after 3 PM
    (reduced staff oversight)

  Phone:
  - WhatsApp messages with "M. Chen" discussing
    "the arrangement" and "keeping it quiet"
  - GPS data shows visits to Pacific Consulting's
    registered agent address in Las Vegas (3 trips)
  - Photos of offshore bank documents

  Create:
  1. Comprehensive forensic timeline reconstructing
     the embezzlement scheme
  2. Digital evidence correlation matrix
  3. Chain of custody documentation for each device
  4. Anti-forensic detection analysis
  5. Evidence presentation strategy for prosecution

assertions:
  - type: llm_judge
    criteria: "Forensic timeline reconstructs the embezzlement scheme chronologically — maps the lifecycle from setup (shell company formation, offshore account opening in early 2022) through execution (47 structured payments over 3 years) to discovery (Nov 2024 seizure); each event is supported by specific digital artifacts (file metadata, email timestamps, transaction records, GPS data); the timeline reveals patterns: Friday afternoon transactions, amounts structured below $50K threshold, USB device usage corresponding to data exfiltration periods; the M. Chen WhatsApp messages suggest a co-conspirator."
    weight: 0.35
    description: "EmbezzlementSchemeReconstruction"
  - type: llm_judge
    criteria: "Digital evidence correlation matrix cross-references all evidence sources — the laptop spreadsheet's creation date (Mar 2022) aligns with the first wire transfer; email approvals for Pacific Consulting payments match SAP transaction logs; browser history of offshore banking visits correlates with transaction dates; USB device connections correlate with times when financial data was exported; GPS visits to Las Vegas match the registered agent address; each piece of evidence independently corroborates the scheme and eliminates alternative explanations."
    weight: 0.35
    description: "EvidenceCorrelationMatrix"
  - type: llm_judge
    criteria: "Chain of custody documentation is forensically sound — each device's seizure is documented (date, time, location, seizing officer, witnesses); forensic imaging procedures (write-blockers used, hash values calculated, bit-for-bit copies verified); analysis performed on forensic copies, not originals; cloud data preservation through legal hold notices and custodian preservation letters; personal phone seizure under warrant with scope limitations documented; the timeline notes any gaps in custody or potential challenges to admissibility."
    weight: 0.30
    description: "ChainOfCustodyDocumentation"
