meta:
  id: bankruptcy-proceedings-timeline
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Create a bankruptcy proceedings timeline — track petition filing, automatic stay, claims bar dates, plan confirmation, and creditor distributions in a complex Chapter 11 reorganization"
  tags: [bankruptcy, chapter-11, claims-tracking, advanced]

state: {}

trigger: |
  Create a comprehensive timeline for a large
  Chapter 11 bankruptcy reorganization.

  DEBTOR: RetailChain Corp. — national retail chain
  with 450 stores, 28,000 employees, $2.8B in
  annual revenue

  PRE-PETITION EVENTS:
  - 2020-2022: COVID-19 devastates retail operations;
    200 stores temporarily closed
  - Jan 2023: RetailChain draws down $500M revolving
    credit facility
  - Mar 2023: Misses $45M interest payment on senior
    secured notes (grace period: 30 days)
  - Apr 2023: Hires restructuring advisor (Alvarez
    & Marsal)
  - May 2023: Board approves restructuring plan;
    secures $350M DIP financing commitment
  - Jun 2023: Files forbearance agreement with
    senior lenders (90 days)

  CHAPTER 11 CASE:
  - Sep 1, 2023: Voluntary Chapter 11 petition filed
    (S.D. Texas, Houston Division)
  - Sep 1, 2023: Automatic stay takes effect (11
    U.S.C. § 362)
  - Sep 3, 2023: First day motions filed (DIP
    financing, critical vendor payments, employee
    wages, cash management)
  - Sep 5, 2023: Court approves first day motions
    on interim basis
  - Sep 15, 2023: DIP financing approved on final
    basis ($350M)
  - Oct 1, 2023: Creditors' Committee appointed
    (7 members: trade creditors, bondholders, pension
    fund)
  - Nov 1, 2023: Claims bar date set for Jan 31, 2024
  - Dec 2023: Debtor files schedules and statements
    listing $3.2B in liabilities
  - Jan 2024: Store closing motions — 150 stores
    approved for liquidation
  - Feb 2024: Going-concern sale process for 200
    stores (stalking horse bid: $800M from PE firm)
  - Mar 2024: Auction conducted; winning bid: $950M
    from competing retailer
  - Apr 2024: Sale approved under Section 363
  - May 2024: Plan of reorganization filed for
    remaining 100 stores
  - Jul 2024: Disclosure statement approved
  - Aug 2024: Plan voting period (solicitation)
  - Sep 2024: Plan confirmation hearing
  - Oct 2024: Plan confirmed; emergence from Chapter 11

  CREDITOR CLASSES:
  - DIP lenders: Paid in full (administrative priority)
  - Senior secured: 85 cents on dollar
  - Unsecured creditors: 22 cents on dollar
  - Equity holders: Wiped out (0 recovery)
  - Employees: Priority claims paid; pension
    obligations assumed by PBGC

  Create:
  1. Complete Chapter 11 procedural timeline
  2. Creditor recovery analysis timeline
  3. Store disposition timeline (close vs. sell)
  4. Key deadlines and court dates tracker
  5. Preference and fraudulent transfer analysis
    timeline

assertions:
  - type: llm_judge
    criteria: "Chapter 11 procedural timeline tracks every critical milestone — from pre-petition restructuring efforts (advisor retention, DIP commitment, forbearance) through petition, first day motions, DIP approval, creditors' committee formation, claims bar date, 363 sale process, plan filing, disclosure statement, solicitation, and confirmation; each milestone is annotated with the applicable Bankruptcy Code section; the timeline shows the typical 13-month Chapter 11 duration and identifies where delays could have occurred or been avoided."
    weight: 0.35
    description: "Chapter11ProceduralTimeline"
  - type: llm_judge
    criteria: "Creditor recovery analysis maps how each class fares through the case — tracks the absolute priority rule: DIP lenders paid first (administrative priority), senior secured at 85 cents, unsecured at 22 cents, equity wiped out; the timeline shows when each class's recovery became determinable (363 sale proceeds defined the available pool, plan of reorganization allocated remaining value); the PBGC assumption of pension obligations is tracked as a significant creditor event; the timeline demonstrates why equity holders receive nothing when senior classes are not paid in full."
    weight: 0.35
    description: "CreditorRecoveryAnalysis"
  - type: llm_judge
    criteria: "Preference and fraudulent transfer analysis examines pre-petition transactions — the $500M credit facility draw (Jan 2023) within the preference period is analyzed; any payments to insiders within one year of petition are flagged; the forbearance agreement (Jun 2023) and its terms are scrutinized for potential avoidable transfers; the restructuring advisor's retention and any pre-petition professional fees are examined; the timeline identifies the 90-day preference period (Jun 3 - Sep 1, 2023) and 1-year insider preference period for investigation of avoidable transfers."
    weight: 0.30
    description: "PreferenceAnalysis"
