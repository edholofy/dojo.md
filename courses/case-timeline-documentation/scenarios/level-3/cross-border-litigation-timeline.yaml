meta:
  id: cross-border-litigation-timeline
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Build a cross-border litigation timeline — coordinate parallel proceedings across multiple jurisdictions, track international service requirements, and manage conflicting procedural deadlines"
  tags: [cross-border, multi-jurisdiction, international-litigation, advanced]

state: {}

trigger: |
  Create a cross-border litigation timeline for
  parallel proceedings involving a multinational
  contract dispute.

  PARTIES:
  - Plaintiff: EuroTech GmbH (Germany)
  - Defendant 1: AmeriCorp Inc. (Delaware, USA)
  - Defendant 2: AsiaSupply Ltd. (Singapore)

  DISPUTE: $50M contract for technology components;
  AmeriCorp contracted with EuroTech for custom
  semiconductor components; EuroTech subcontracted
  manufacturing to AsiaSupply; components failed
  quality testing, causing AmeriCorp production
  line shutdown

  PARALLEL PROCEEDINGS:

  US Proceedings (S.D. New York):
  - Jan 2024: AmeriCorp files breach of contract
    against EuroTech
  - Feb 2024: Service via Hague Convention on EuroTech
    in Germany (6-month estimated timeline)
  - Mar 2024: AmeriCorp seeks preliminary injunction
    freezing EuroTech's US assets ($8M in US bank
    accounts)
  - Apr 2024: Court grants temporary restraining order
  - Aug 2024: Hague service confirmed complete
  - Oct 2024: EuroTech files motion to dismiss for
    forum non conveniens
  - Dec 2024: Court denies FNC motion; retains
    jurisdiction
  - Feb 2025: Discovery begins under Federal Rules

  German Proceedings (Landgericht Frankfurt):
  - Mar 2024: EuroTech files against AmeriCorp for
    wrongful termination of supply agreement and
    damages of €15M
  - Apr 2024: Service on AmeriCorp via German law
    and bilateral treaty
  - Sep 2024: AmeriCorp challenges German jurisdiction
  - Nov 2024: German court asserts jurisdiction based
    on contract's performance in Germany
  - Jan 2025: German discovery process begins (more
    limited than US)

  Singapore Proceedings:
  - Jun 2024: EuroTech files against AsiaSupply in
    Singapore International Commercial Court (SICC)
  - Jul 2024: AsiaSupply counterclaims for unpaid
    invoices ($12M)
  - Oct 2024: SICC orders mediation before proceeding
  - Jan 2025: Mediation unsuccessful
  - Mar 2025: SICC trial date set for Sep 2025

  COMPLICATING FACTORS:
  - Contract contains arbitration clause (ICC Paris)
    but parties dispute its scope
  - US and German proceedings may produce conflicting
    judgments
  - Singapore evidence needed in US discovery
  - Letters rogatory required for cross-border
    depositions

  Create:
  1. Parallel proceedings timeline (all 3 jurisdictions)
  2. Service of process tracking across jurisdictions
  3. Discovery coordination plan
  4. Conflict of judgments analysis
  5. Arbitration clause impact assessment

assertions:
  - type: llm_judge
    criteria: "Parallel proceedings timeline coordinates three jurisdictions — presents US, German, and Singapore proceedings on synchronized timelines showing where they overlap and potentially conflict; highlights that the German and US cases address overlapping claims (breach of contract) that could produce inconsistent judgments; tracks each jurisdiction's procedural milestones side-by-side; identifies the arbitration clause as a potential basis for staying one or more court proceedings under the New York Convention or Singapore's International Arbitration Act."
    weight: 0.35
    description: "ParallelProceedingsTimeline"
  - type: llm_judge
    criteria: "Service of process tracking addresses international requirements — Hague Convention service on EuroTech in Germany took 6 months (Feb-Aug 2024); German service on AmeriCorp required bilateral treaty compliance; Singapore service followed SICC rules; the timeline tracks each service attempt, method used, confirmation dates, and deadline implications; the delays inherent in international service are factored into overall case strategy and timeline planning."
    weight: 0.35
    description: "InternationalServiceTracking"
  - type: llm_judge
    criteria: "Discovery coordination plan addresses cross-border evidence challenges — US discovery rules are broader than German or Singaporean procedures; letters rogatory or Hague Evidence Convention requests are needed for cross-border depositions; the timeline plans for the significant delays (6-12 months) inherent in international evidence requests; Singapore evidence relevant to the US case requires coordination between counsel in all three jurisdictions; blocking statutes in some jurisdictions may limit discovery cooperation; the arbitration clause's scope affects whether discovery should proceed in courts or through arbitral procedures."
    weight: 0.30
    description: "DiscoveryCoordinationPlan"
