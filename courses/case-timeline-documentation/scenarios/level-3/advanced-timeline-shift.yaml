meta:
  id: advanced-timeline-shift
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Advanced shift simulation — manage enterprise-scale timeline challenges including cross-jurisdictional coordination, AI-assisted extraction, mass tort management, and digital forensic evidence integration under extreme time pressure"
  tags: [shift-simulation, enterprise-scale, cross-functional, advanced]

state: {}

trigger: |
  You are the litigation support director at a
  national law firm. Three critical situations
  require your expertise simultaneously.

  SITUATION 1 — TRIAL EMERGENCY
  A partner calls from the courthouse. The trial
  in Ortiz v. MegaHealth starts Monday (4 days
  away). The key timeline exhibit was prepared by
  a paralegal who just quit. The partner has found
  errors in the timeline and needs it rebuilt from
  scratch.

  Case facts:
  - Medical malpractice — failure to diagnose stroke
  - Patient: Carlos Ortiz, age 58
  - Dec 10, 2023, 7 AM: Ortiz presents to ER with
    severe headache, dizziness, slurred speech
  - Dec 10, 8 AM: Triage nurse records vitals; notes
    "possible migraine"; wait time: 2 hours
  - Dec 10, 10 AM: ER physician (Dr. Adams) examines;
    orders blood work only; no neurological exam
  - Dec 10, 11 AM: Blood work normal; Ortiz discharged
    with migraine diagnosis and pain medication
  - Dec 10, 6 PM: Ortiz collapses at home; wife calls
    911
  - Dec 10, 7 PM: Returns to same ER; CT scan shows
    massive ischemic stroke
  - Dec 10, 8 PM: tPA window has passed (4.5 hours
    from symptom onset was 11:30 AM)
  - Dec 11: Ortiz transferred to ICU; significant
    brain damage
  - Current: Ortiz has permanent left-side paralysis,
    speech difficulties, requires 24/7 care

  Build a jury-ready trial timeline exhibit showing
  the missed treatment window and standard of care
  violations.

  SITUATION 2 — DATA BREACH MDL
  Your firm was just appointed to the plaintiffs'
  steering committee in a massive data breach MDL.
  50 million consumers affected. You need to create
  the master timeline framework for the MDL within
  48 hours for the first PSC meeting.

  Key events:
  - Mar 2024: Hackers breach FinanceApp's systems
    via third-party vendor vulnerability
  - Mar-Jun 2024: Hackers exfiltrate data over 90
    days undetected
  - Jul 1, 2024: FinanceApp discovers breach during
    penetration testing
  - Jul 15, 2024: FinanceApp notifies FBI
  - Aug 1, 2024: FinanceApp notifies consumers
    (31 days after discovery; varies by state law
    whether timely)
  - Sep-Dec 2024: 200+ lawsuits filed nationwide
  - Jan 2025: JPML consolidates to N.D. California
  - Feb 2025: PSC appointed (your firm)

  Design the MDL master timeline framework.

  SITUATION 3 — MERGER TIMELINE CRISIS
  A corporate client's $2B acquisition is at risk
  because the antitrust timeline is slipping. FTC
  has extended its review and the merger agreement's
  drop-dead date is approaching.

  Key events:
  - Jun 2024: Merger agreement signed; $2B purchase
    price; drop-dead date: Mar 31, 2025
  - Jul 2024: HSR Act filing (both parties)
  - Aug 2024: FTC issues Second Request (extensive
    document demand)
  - Sep-Dec 2024: Companies produce 5M documents
    to FTC
  - Jan 2025: FTC staff recommends challenging the
    merger
  - Feb 2025: Companies request meeting with FTC
    Commissioners
  - Feb 20, 2025: FTC vote scheduled for Mar 15
  - Mar 31, 2025: Drop-dead date

  Create a critical-path timeline showing the
  remaining window to close the deal and
  contingency plans.

assertions:
  - type: llm_judge
    criteria: "Trial timeline exhibit for medical malpractice is jury-ready — creates a visual-friendly chronology showing the 7 AM symptom onset through the 11 AM discharge (missed 4.5-hour tPA window), with the treatment window clearly marked; the standard of care violations are highlighted at each decision point (triage understating symptoms, no neurological exam, no CT/MRI ordered, premature discharge); the timeline demonstrates that if proper care had been provided at 10 AM, tPA could have been administered before the 11:30 AM window closed; the exhibit connects each provider failure to the irreversible outcome."
    weight: 0.35
    description: "JuryReadyTrialTimeline"
  - type: llm_judge
    criteria: "MDL master timeline framework is comprehensive and scalable — creates a structure for tracking: the breach event timeline (Mar-Jul 2024), regulatory notification compliance across 50 states (varying requirements), litigation consolidation process, common discovery plan, bellwether selection methodology, class certification strategy, and settlement framework; the framework accommodates 200+ individual cases with their unique fact patterns; notification timing analysis identifies which states' laws were violated based on the 31-day disclosure delay."
    weight: 0.35
    description: "MDLTimelineFramework"
  - type: llm_judge
    criteria: "Merger critical-path timeline identifies the narrow window and contingencies — with the Mar 31 drop-dead date and FTC vote on Mar 15, there are only 16 days between the vote and deadline; if FTC challenges, the timeline maps: consent decree negotiation option (requires FTC acceptance), litigation to enjoin (FTC sues in own administrative court or federal court), drop-dead date extension negotiation (requires counterparty consent, possibly additional consideration), or merger abandonment and reverse breakup fee; each contingency pathway is mapped with realistic timeframes."
    weight: 0.30
    description: "MergerCriticalPathTimeline"
