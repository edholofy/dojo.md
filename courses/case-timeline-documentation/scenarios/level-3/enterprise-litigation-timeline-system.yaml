meta:
  id: enterprise-litigation-timeline-system
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Design an enterprise litigation timeline management system — create standardized processes, templates, and workflows for managing timelines across a large law firm's entire case portfolio"
  tags: [enterprise-system, litigation-management, workflow-design, advanced]

state: {}

trigger: |
  A 200-attorney law firm is standardizing its
  case timeline documentation across all practice
  groups. Design a comprehensive timeline management
  system.

  CURRENT STATE:
  - 500+ active matters across 8 practice groups
  - No standardized timeline format; each attorney
    uses their own method (spreadsheets, Word docs,
    CaseMap, paper)
  - 3 recent cases lost due to missed deadlines
  - 2 malpractice claims from statute of limitations
    failures
  - Merger with 50-attorney firm adds 150 matters
    with incompatible formats

  PRACTICE GROUPS:
  1. Commercial Litigation (120 matters)
  2. Employment (80 matters)
  3. Personal Injury (90 matters)
  4. Corporate/M&A (60 matters)
  5. Intellectual Property (45 matters)
  6. Real Estate (40 matters)
  7. Criminal Defense (35 matters)
  8. Regulatory/Compliance (30 matters)

  REQUIREMENTS:
  - Universal timeline format adaptable to all
    practice areas
  - Integration with existing case management
    software (NetDocuments, Clio)
  - Automated deadline calculation and alerts
  - Multi-attorney collaboration on shared timelines
  - Client-facing timeline exports (simplified view)
  - Conflict checking integration
  - Training program for all staff
  - Migration plan for existing 650+ matters
  - Quality control and audit procedures

  Create:
  1. Enterprise timeline architecture
  2. Standardized event taxonomy across practice areas
  3. Deadline automation rules
  4. Migration and adoption plan
  5. Quality assurance framework

assertions:
  - type: llm_judge
    criteria: "Enterprise timeline architecture addresses all practice groups — creates a universal core schema with practice-area-specific extensions; the core includes: event date, event type, parties involved, evidence references, legal significance, deadline implications, and attorney responsible; each practice group gets custom fields (e.g., criminal defense gets speedy trial calculations, IP gets patent prosecution milestones, employment gets EEOC deadlines); the system handles multi-jurisdictional deadline rules and integrates with NetDocuments and Clio."
    weight: 0.35
    description: "EnterpriseArchitecture"
  - type: llm_judge
    criteria: "Deadline automation rules prevent the exact failures that occurred — automated statute of limitations tracking with escalating alerts (90, 60, 30, 14, 7 days); calculation rules for jurisdiction-specific deadlines (federal vs. state, business days vs. calendar days, tolling events); automatic identification of dependent deadlines (e.g., discovery cutoff triggers expert disclosure deadline); the system addresses the 3 missed deadline cases and 2 malpractice claims by creating redundant alert systems and supervisory review requirements."
    weight: 0.35
    description: "DeadlineAutomationRules"
  - type: llm_judge
    criteria: "Migration plan handles the 650+ matter conversion realistically — phases the migration by priority (matters closest to trial first, then by statute of limitations urgency); the merger firm's 150 matters get a dedicated conversion team; each practice group has a champion responsible for taxonomy mapping; includes data validation steps to catch errors during conversion; estimates realistic timeline for full adoption (typically 6-12 months for a firm this size); training program includes practice-group-specific modules."
    weight: 0.30
    description: "MigrationPlan"
