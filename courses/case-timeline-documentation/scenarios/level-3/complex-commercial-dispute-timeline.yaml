meta:
  id: complex-commercial-dispute-timeline
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Create a complex commercial dispute timeline — manage multi-phase litigation involving contract, tort, and statutory claims with extensive document production, expert discovery, and summary judgment practice"
  tags: [commercial-dispute, multi-phase-litigation, summary-judgment, advanced]

state: {}

trigger: |
  Create a comprehensive litigation timeline for
  a high-stakes commercial dispute between technology
  companies.

  CASE: InnovateTech Inc. v. CopyCat Systems Corp.
  Court: U.S. District Court, District of Delaware
  Claims: Trade secret misappropriation (federal DTSA
  + state law), patent infringement (2 patents),
  breach of NDA, tortious interference with business
  relationships, unfair competition

  DAMAGES CLAIMED: $500M (lost profits + unjust
  enrichment + reasonable royalty + exemplary damages)

  PRE-LITIGATION:
  - 2020: Parties enter NDA for potential partnership
  - 2021: CopyCat receives InnovateTech's proprietary
    technical specifications under NDA
  - Jan 2022: Partnership negotiations fail
  - Jun 2022: CopyCat launches competing product with
    suspiciously similar features
  - Sep 2022: InnovateTech sends cease and desist
  - Nov 2022: CopyCat continues sales; product
    generates $200M revenue in first year

  LITIGATION TIMELINE:
  - Jan 2023: Complaint filed (5 counts)
  - Feb 2023: Motion for TRO and preliminary injunction
  - Mar 2023: TRO hearing; TRO denied but expedited
    PI briefing ordered
  - Apr 2023: PI hearing (3-day evidentiary hearing)
  - May 2023: PI granted on trade secret claim only;
    CopyCat ordered to remove 3 specific features
  - Jun 2023: CopyCat appeals PI to Federal Circuit
  - Aug 2023: Federal Circuit affirms PI
  - Sep 2023: Answer and counterclaims filed (patent
    invalidity, inequitable conduct, antitrust)
  - Nov 2023: Initial scheduling conference; case
    management order entered
  - Dec 2023: Claim construction briefing begins
    (Markman)
  - Mar 2024: Markman hearing; court construes 8
    disputed claim terms
  - May 2024: Fact discovery deadline
  - Jun 2024: 2.5M documents produced; 8,000 documents
    withheld on privilege (privilege log disputes)
  - Jul 2024: 12 fact depositions completed
  - Aug 2024: Expert reports due — Plaintiff: damages
    expert ($500M), technical expert (infringement);
    Defendant: damages rebuttal, invalidity expert
  - Sep 2024: Expert depositions (6 experts total)
  - Oct 2024: Summary judgment motions filed (both
    sides)
  - Dec 2024: Summary judgment arguments
  - Feb 2025: Court grants partial SJ — dismisses
    unfair competition claim, denies all other motions
  - Mar 2025: Pretrial conference; bifurcated trial
    ordered (liability → damages)
  - May 2025: Liability trial (2 weeks)
  - Jun 2025: Damages trial (1 week) if liability
    found

  Create:
  1. Complete litigation lifecycle timeline
  2. Discovery management timeline with production
     tracking
  3. Motion practice timeline and outcomes
  4. Expert discovery coordination
  5. Trial preparation countdown timeline

assertions:
  - type: llm_judge
    criteria: "Litigation lifecycle timeline maps the complete case arc — from pre-litigation events (NDA, partnership failure, competing product launch) through emergency relief (TRO/PI), appellate proceedings, answer/counterclaims, Markman hearing, fact and expert discovery, summary judgment, to bifurcated trial; each phase is annotated with its strategic significance; the timeline shows how the PI appeal to the Federal Circuit ran parallel to main case discovery; the 2.5-year litigation timeline is typical for a complex IP/trade secret case of this magnitude."
    weight: 0.35
    description: "LitigationLifecycleTimeline"
  - type: llm_judge
    criteria: "Discovery management timeline tracks the massive document production — 2.5M documents produced, 8,000 withheld on privilege with privilege log disputes; 12 fact depositions across both parties; the timeline identifies key discovery milestones and flags the privilege log dispute as a potential motion to compel issue; document review staffing and technology (TAR/predictive coding) needs are implied by the volume; the sequential flow from fact discovery → expert reports → expert depositions → dispositive motions follows the Federal Rules framework."
    weight: 0.35
    description: "DiscoveryManagementTimeline"
  - type: llm_judge
    criteria: "Trial preparation countdown works backward from trial date — identifies pretrial deadlines including motions in limine, jury instructions, exhibit lists, witness lists, deposition designation disputes, and trial briefs; the bifurcated trial structure (liability then damages) requires separate preparation tracks; the remaining 4 claims after partial SJ (trade secret, 2 patent claims, breach of NDA, tortious interference) each require separate proof at trial; the timeline coordinates expert witness scheduling across the 2-week liability trial and potential 1-week damages trial."
    weight: 0.30
    description: "TrialPreparationCountdown"
