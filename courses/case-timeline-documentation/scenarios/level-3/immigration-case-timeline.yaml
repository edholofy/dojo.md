meta:
  id: immigration-case-timeline
  level: 3
  course: case-timeline-documentation
  type: output
  description: "Build a complex immigration case timeline — track visa applications, status changes, removal proceedings, and administrative appeals while managing strict filing deadlines across USCIS, EOIR, and federal courts"
  tags: [immigration, removal-proceedings, visa-tracking, advanced]

state: {}

trigger: |
  Create a comprehensive timeline for a complex
  immigration case involving multiple status changes,
  removal proceedings, and administrative appeals.

  CLIENT: Dr. Amir Hassan, citizen of Egypt
  Current Status: In removal proceedings with pending
  applications for relief

  IMMIGRATION HISTORY:
  - Aug 2012: Enters US on F-1 student visa; PhD
    program in biomedical engineering at MIT
  - May 2017: Completes PhD; applies for OPT
    (Optional Practical Training)
  - Jun 2017: OPT approved; begins post-doctoral
    research at Johns Hopkins
  - Apr 2019: Employer (Johns Hopkins) files H-1B
    petition; selected in lottery
  - Oct 2019: H-1B status begins
  - Jan 2020: Employer begins PERM labor certification
    for green card (EB-1B Outstanding Researcher)
  - Mar 2020: COVID-19; PERM recruitment paused
  - Sep 2020: PERM labor certification approved
  - Nov 2020: I-140 Immigrant Petition filed (EB-1B)
  - Feb 2021: I-140 approved; Priority Date: Nov 2020
  - Jun 2021: I-485 Adjustment of Status filed
    (priority date current for Egypt EB-1)
  - Aug 2021: Biometrics appointment completed
  - Oct 2021: I-485 interview at Baltimore field office
  - Nov 2021: I-485 DENIED — USCIS determines prior
    J-1 status (summer research program in 2011,
    before F-1) triggered 2-year home residency
    requirement; no waiver obtained
  - Dec 2021: Motion to Reopen/Reconsider filed with
    USCIS
  - Feb 2022: Motion denied; USCIS issues NTA
    (Notice to Appear) — removal proceedings initiated
  - Apr 2022: Master calendar hearing at Baltimore
    Immigration Court
  - Jun 2022: Attorney files application for J-1
    waiver with DOS (Department of State) based on
    "no objection" from Egypt
  - Sep 2022: Egypt issues "no objection" statement
  - Nov 2022: DOS recommends J-1 waiver approval
    to USCIS
  - Jan 2023: USCIS approves J-1 waiver
  - Mar 2023: Attorney files I-485 renewal in
    immigration court as application for relief
    from removal
  - Jun 2023: Individual hearing before Immigration
    Judge
  - Aug 2023: IJ grants adjustment of status;
    DHS reserves appeal
  - Sep 2023: DHS appeals to BIA (Board of
    Immigration Appeals)
  - Dec 2023: BIA briefing schedule set
  - Mar 2024: BIA dismisses DHS appeal; affirms IJ
  - Apr 2024: DHS does not file Petition for Review
    with Circuit Court (30-day deadline passes)
  - May 2024: Green card issued; LPR status granted

  Create:
  1. Complete immigration status timeline
  2. Removal proceedings procedural timeline
  3. J-1 waiver process timeline
  4. Administrative appeal timeline
  5. Critical deadline tracker with malpractice
     risk analysis

assertions:
  - type: llm_judge
    criteria: "Immigration status timeline tracks every change in status and authorization — F-1 (2012) → OPT (2017) → H-1B (2019) → I-485 pending (2021) → denied/out-of-status → removal proceedings (2022) → relief granted → LPR (2024); each status change is annotated with the applicable INA section and regulatory basis; the timeline identifies the critical issue: the undisclosed 2011 J-1 status and its 2-year home residency requirement under INA § 212(e) that derailed the otherwise straightforward EB-1B process; the 12-year journey from student to permanent resident is documented."
    weight: 0.35
    description: "ImmigrationStatusTimeline"
  - type: llm_judge
    criteria: "J-1 waiver process timeline tracks the multi-agency coordination — DOS request (Jun 2022), Egyptian no-objection statement (Sep 2022), DOS recommendation to USCIS (Nov 2022), USCIS approval (Jan 2023); the 7-month waiver process is documented with each agency's role and processing times; the timeline explains why the waiver was critical — without it, Dr. Hassan was subject to INA § 212(e)'s 2-year home residency requirement before being eligible for H-1B or adjustment; the waiver retroactively cured the eligibility issue."
    weight: 0.35
    description: "J1WaiverTimeline"
  - type: llm_judge
    criteria: "Critical deadline tracker identifies malpractice risks — the original attorney potentially committed malpractice by filing the I-485 without first obtaining a J-1 waiver; the 30-day BIA appeal deadline after IJ decision is flagged as critical; DHS's 30-day Petition for Review deadline with the Circuit Court is tracked (expired Apr 2024 without filing); the motion to reopen deadline after I-485 denial is documented; each deadline is assessed for the consequences of missing it (permanent bar vs. procedural delay vs. waivable); the timeline serves as a malpractice prevention tool."
    weight: 0.30
    description: "CriticalDeadlineTracker"
