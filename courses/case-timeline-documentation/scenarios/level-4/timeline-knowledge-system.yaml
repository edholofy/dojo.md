meta:
  id: timeline-knowledge-system
  level: 4
  course: case-timeline-documentation
  type: output
  description: "Design a knowledge management system for legal timelines — build an organizational memory that captures timeline patterns, precedent chronologies, and reusable timeline components across a firm's case history"
  tags: [knowledge-management, pattern-library, organizational-memory, expert]

state: {}

trigger: |
  Design a knowledge management system that captures
  and leverages timeline intelligence across a law
  firm's entire case history.

  FIRM: 300-attorney national firm with 15 offices
  and 5 practice groups

  PROBLEM STATEMENT:
  Every case builds a timeline from scratch. The
  firm has 20 years of case history (8,000+ matters)
  with valuable timeline intelligence locked in
  individual case files. Attorneys in Dallas don't
  know that colleagues in Chicago built an identical
  timeline for a similar case 2 years ago.

  KNOWLEDGE ASSETS TO CAPTURE:
  1. Timeline Patterns — recurring chronological
     patterns in specific case types (e.g., the
     typical sequence in employment discrimination:
     protected activity → adverse action → pretext
     investigation)
  2. Precedent Chronologies — timelines from past
     cases that provide templates for current matters
  3. Judicial Preferences — how specific judges prefer
     timeline exhibits formatted and presented
  4. Deadline Libraries — jurisdiction-specific
     deadline calculations (statute of limitations,
     filing deadlines, discovery cutoffs)
  5. Event Taxonomies — standardized classification
     of events by practice area
  6. Expert Timeline Templates — proven timeline
     structures used in winning cases
  7. Outcome Correlations — which timeline
     characteristics correlated with favorable
     outcomes

  CONSTRAINTS:
  - Client confidentiality must be maintained
    (anonymization required)
  - Must integrate with existing document management
    (iManage) and case management systems
  - Multi-office access with role-based permissions
  - Must comply with firm's data retention policies
  - Cannot require significant additional attorney
    time for data entry

  Create:
  1. Knowledge system architecture
  2. Data capture and anonymization pipeline
  3. Search and retrieval interface design
  4. Pattern recognition and recommendation engine
  5. Governance and maintenance plan

assertions:
  - type: llm_judge
    criteria: "Knowledge system architecture captures and connects timeline intelligence — designs a multi-layer system: (1) raw timeline data layer (individual case timelines linked to iManage documents); (2) anonymized pattern layer (event sequences stripped of client identifiers); (3) metadata layer (case type, venue, judge, outcome, timeline quality ratings); (4) recommendation layer (AI-powered suggestions based on current case characteristics); the architecture maintains client confidentiality through systematic anonymization while preserving analytical value; multi-office access is role-based with practice-group-level permissions."
    weight: 0.35
    description: "KnowledgeSystemArchitecture"
  - type: llm_judge
    criteria: "Pattern recognition engine identifies reusable timeline intelligence — analyzes 8,000+ historical timelines to identify recurring patterns by case type; for employment discrimination: maps the typical timeline arc with statistical frequency data; for product liability: identifies common regulatory timeline patterns; the engine recommends starting templates for new matters based on case characteristics; judicial preference data is automatically extracted from past cases in the same court; the recommendation engine improves accuracy over time through attorney feedback loops (was this recommendation helpful?)."
    weight: 0.35
    description: "PatternRecognitionEngine"
  - type: llm_judge
    criteria: "Data capture pipeline requires minimal attorney effort — automates extraction from existing case management system data (filing dates, discovery deadlines, hearing dates); uses NLP to extract timeline events from closing memos and case summaries already in iManage; provides quick-capture tools (mobile app, email forwarding, document tagging) for real-time timeline updates; anonymization occurs automatically using entity recognition to replace client names, case numbers, and identifying details with generic labels; the governance plan assigns maintenance responsibility and addresses data quality monitoring."
    weight: 0.30
    description: "DataCapturePipeline"
