meta:
  id: timeline-book-proposal
  level: 4
  course: case-timeline-documentation
  type: output
  description: "Write a book proposal for a definitive guide to legal case timeline documentation — design a comprehensive reference covering methodology, technology, practice-area applications, and expert witness use of timelines"
  tags: [book-proposal, legal-writing, reference-guide, expert]

state: {}

trigger: |
  Write a book proposal for a definitive guide
  to case timeline documentation in legal practice.

  PROPOSED TITLE:
  "The Litigation Timeline: A Practitioner's Guide
  to Building, Analyzing, and Presenting Case
  Chronologies"

  AUTHOR:
  - 25 years litigation experience (plaintiff and
    defense)
  - Former federal law clerk
  - Adjunct professor of litigation skills
  - Has published articles in The Practical Litigator,
    Litigation Journal, and ABA Journal
  - Created timeline exhibits admitted in 200+ trials

  TARGET PUBLISHER: American Bar Association (ABA)
  Publishing or West Academic Publishing

  TARGET AUDIENCE:
  - Primary: Practicing litigation attorneys (all
    levels)
  - Secondary: Paralegals and litigation support
    professionals
  - Tertiary: Law students, judicial clerks, pro se
    litigants

  MARKET ANALYSIS:
  - No comprehensive book on legal timeline
    methodology currently exists
  - Related books focus on trial preparation or
    legal writing but don't address timelines
    specifically
  - Growing market as legal tech increases focus on
    chronological analysis
  - CLE programs on timeline skills consistently
    oversubscribed

  PROPOSED CHAPTERS:
  Design 15-20 chapters covering the complete arc
  from basic methodology through advanced applications,
  with practice-area-specific chapters and technology
  guides.

  Create:
  1. Detailed book proposal with chapter outline
  2. Sample chapter (first chapter)
  3. Market analysis and competitive positioning
  4. Author platform and marketing plan
  5. Timeline and deliverable schedule

assertions:
  - type: llm_judge
    criteria: "Chapter outline covers the complete arc of timeline practice — progresses from foundational methodology (why timelines matter, cognitive science of chronological understanding) through practical techniques (document analysis, event extraction, date disambiguation, source verification) to practice-area applications (civil litigation, criminal defense, family law, IP, employment, regulatory) to advanced topics (multi-party coordination, digital forensics integration, AI-assisted extraction, expert testimony, trial presentation) to organizational chapters (firm-wide standards, quality control, training); each chapter includes learning objectives, practical exercises, and real-world examples."
    weight: 0.35
    description: "ChapterOutline"
  - type: llm_judge
    criteria: "Sample chapter demonstrates the book's value and voice — the first chapter introduces timeline methodology by telling the story of a case won or lost because of timeline quality; establishes the cognitive science basis (sequential processing, temporal reasoning, memory and chronology); introduces the core framework that subsequent chapters will build on; includes at least one practical exercise; the writing is accessible to attorneys at all experience levels while maintaining intellectual rigor; the tone balances practical 'how-to' guidance with analytical depth; the chapter is 15-25 pages and representative of the full book's quality."
    weight: 0.35
    description: "SampleChapter"
  - type: llm_judge
    criteria: "Market analysis demonstrates commercial viability — identifies the gap in existing legal literature (no comprehensive timeline book); quantifies the target market (1.3M US attorneys, 400K paralegals); positions against related titles (trial preparation books, legal writing guides, legal tech books) showing how this fills a unique niche; the ABA Publishing / West Academic publishing path provides credibility and distribution; marketing plan includes CLE programming tie-ins, law school adoption potential, conference speaking, and endorsement strategy from prominent litigators and judges."
    weight: 0.30
    description: "MarketAnalysis"
