meta:
  id: timeline-consulting-practice
  level: 4
  course: case-timeline-documentation
  type: output
  description: "Design a litigation timeline consulting practice — build a specialized consulting firm offering timeline analysis, visual timeline creation, and expert testimony on chronological evidence interpretation"
  tags: [consulting-practice, business-design, expert-testimony, expert]

state: {}

trigger: |
  Design a consulting practice specializing in
  litigation timeline analysis and visual evidence
  presentation.

  FOUNDER PROFILE:
  - 20 years litigation support experience
  - Former director of litigation support at AmLaw 50 firm
  - Certified trial presentation specialist
  - Expert in CaseMap, TrialLine, TimelineJS, and
    custom visualization tools
  - Has testified as expert on document chronology
    and metadata analysis in 15 cases

  MARKET OPPORTUNITY:
  - 80% of litigation cases lack professional timeline
    analysis (industry survey)
  - Average law firm spends 30% of associate time
    manually building timelines
  - Growing demand for visual evidence presentation
    as juries expect visual aids
  - Legal tech market growing at 8% CAGR
  - Competitors: mostly solo practitioners or small
    divisions within e-discovery firms

  TARGET CLIENTS:
  - AmLaw 200 law firms (litigation departments)
  - Government agencies (DOJ, SEC, state AGs)
  - In-house legal departments (Fortune 500)
  - Insurance companies (claims investigation)
  - Criminal defense attorneys (complex cases)

  SERVICE LINES TO DEVELOP:
  1. On-demand timeline construction for active cases
  2. Expert witness services (chronology testimony)
  3. Trial presentation support (visual exhibits)
  4. Training and certification programs
  5. Software/platform licensing

  Create:
  1. Business plan with revenue projections
  2. Service delivery model for each line
  3. Pricing strategy and competitive positioning
  4. Staffing plan and skill requirements
  5. Technology platform requirements

assertions:
  - type: llm_judge
    criteria: "Business plan includes realistic revenue projections — Year 1 targets establishing 5-10 anchor client relationships with AmLaw firms; revenue builds from hourly consulting fees ($250-500/hour) plus project-based pricing for timeline construction ($5K-$50K per case depending on complexity); expert testimony commands premium rates ($500-800/hour); training programs provide recurring revenue; the plan addresses the critical challenge of building a pipeline while delivering on early engagements; 3-year revenue targets are realistic for a professional services firm in the legal market."
    weight: 0.35
    description: "BusinessPlanProjections"
  - type: llm_judge
    criteria: "Service delivery model defines scalable workflows for each line — on-demand timeline construction uses a standardized intake process (case type, document volume, timeline, output format); expert witness services include engagement protocols, report preparation, and deposition/trial testimony preparation; trial presentation services offer tiered packages (basic timeline graphic → interactive courtroom display → full trial support); training programs include CLE-accredited courses for attorneys and certification for paralegals; each service line has defined quality standards and delivery timelines."
    weight: 0.35
    description: "ServiceDeliveryModel"
  - type: llm_judge
    criteria: "Technology platform requirements define the proprietary tools needed — a timeline management platform that accepts multiple input formats (CSV, CaseMap exports, document review platform exports, manual entry); produces multiple output formats (interactive web, PDF, PowerPoint, courtroom-ready); supports collaboration between attorneys and timeline analysts; includes AI-assisted event extraction from uploaded documents; the platform differentiates from competitors by combining visual presentation quality with analytical depth; build vs. buy analysis for each component is included."
    weight: 0.30
    description: "TechnologyPlatform"
