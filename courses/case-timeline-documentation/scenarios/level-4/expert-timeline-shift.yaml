meta:
  id: expert-timeline-shift
  level: 4
  course: case-timeline-documentation
  type: output
  description: "Expert shift simulation — address organizational-level timeline challenges including practice governance, technology transformation, knowledge management, and professional development across a legal organization"
  tags: [shift-simulation, organizational-leadership, strategic-planning, expert]

state: {}

trigger: |
  You are the newly appointed Chief Litigation
  Technology Officer at a global law firm (800
  attorneys, 25 offices, 12 countries). The
  Managing Partner has given you three strategic
  initiatives to launch within your first 90 days.

  INITIATIVE 1 — MALPRACTICE CRISIS RESPONSE
  The firm has had 5 malpractice claims in the past
  year, all related to timeline and deadline
  management failures:

  Claim 1: Missed federal appeal deadline (14 days
  post-judgment) — case worth $15M lost; malpractice
  settlement: $8M

  Claim 2: Statute of limitations expired on personal
  injury case — failed to account for state-specific
  tolling rules; $3M claim

  Claim 3: Summary judgment motion filed with
  incorrect timeline exhibit — key dates wrong by
  6 months; motion denied; case settled for $2M
  less than projected

  Claim 4: Discovery production incomplete — timeline
  showed 200 documents produced but 800 responsive
  documents existed; sanctions imposed; $500K fine

  Claim 5: Parallel proceedings in 2 countries —
  timeline failed to coordinate deadlines across
  jurisdictions; default judgment entered in
  foreign court; $5M exposure

  Total malpractice exposure: $18.5M+
  Insurance carrier threatens non-renewal

  Design a comprehensive remediation plan that
  prevents future timeline-related malpractice.

  INITIATIVE 2 — GLOBAL TIMELINE STANDARDIZATION
  The firm's 12-country presence creates unique
  timeline challenges:
  - Different legal systems (common law vs. civil
    law) have different procedural timelines
  - Date formats vary (MM/DD/YYYY vs. DD/MM/YYYY
    vs. YYYY/MM/DD)
  - Business day calculations differ by jurisdiction
  - 15 different timeline tools currently in use
  - Language barriers in timeline documentation
  - Some offices have no digital timeline capability

  Design a global standardization plan.

  INITIATIVE 3 — AI TIMELINE STRATEGY
  The Managing Partner wants the firm to be an
  "AI-first timeline practice" within 18 months.
  Current state:
  - No AI tools in use for timeline work
  - Partners skeptical ("AI can't understand legal
    nuance")
  - Paralegals fearful ("AI will replace us")
  - IT infrastructure not AI-ready
  - No data governance framework for AI training
  - Competitors have begun advertising AI timeline
    capabilities

  Design the AI adoption strategy.

assertions:
  - type: llm_judge
    criteria: "Malpractice remediation plan addresses each failure mode — Claim 1 (missed appeal deadline): implements automated jurisdictional deadline calculation with redundant alerts to two responsible attorneys; Claim 2 (SOL/tolling): creates a database of state-specific tolling rules with automatic application; Claim 3 (incorrect exhibit): mandates peer review of all timeline exhibits before filing; Claim 4 (incomplete discovery): integrates timeline tracking with document review platform completeness checks; Claim 5 (parallel proceedings): creates cross-jurisdictional coordination protocols with mandatory conflict-of-deadline checks; the plan includes immediate, 30-day, and 90-day milestones; insurance carrier renewal is addressed with a comprehensive risk mitigation presentation."
    weight: 0.35
    description: "MalpracticeRemediationPlan"
  - type: llm_judge
    criteria: "Global standardization plan addresses cross-jurisdictional complexity — establishes a universal timeline data model that accommodates common law and civil law procedural frameworks; date format standardization uses ISO 8601 (YYYY-MM-DD) internally with locale-specific display; business day calculations incorporate jurisdiction-specific holiday calendars and court schedules; a single platform is selected for global deployment with multi-language support; offices without digital capability get a phased migration with interim solutions; the plan respects local legal practice differences while achieving interoperability."
    weight: 0.35
    description: "GlobalStandardizationPlan"
  - type: llm_judge
    criteria: "AI adoption strategy addresses technical, cultural, and ethical dimensions — technical: defines the infrastructure requirements, data pipeline, and AI tool selection (build vs. buy vs. partner); cultural: addresses partner skepticism through pilot programs showing concrete ROI and paralegal fears through role evolution messaging (AI augments, not replaces); ethical: establishes data governance for AI training on client data (confidentiality, bias mitigation, transparency); the 18-month roadmap progresses from proof of concept (months 1-6) to limited deployment (months 7-12) to firm-wide integration (months 13-18); success metrics are defined for each phase."
    weight: 0.30
    description: "AIAdoptionStrategy"
