meta:
  id: timeline-behavioral-science
  level: 4
  course: case-timeline-documentation
  type: output
  description: "Apply behavioral science to timeline design — research how cognitive biases, anchoring effects, and narrative framing influence how judges and juries interpret chronological evidence"
  tags: [behavioral-science, cognitive-bias, jury-psychology, expert]

state: {}

trigger: |
  Design a research program exploring how cognitive
  biases and narrative framing affect the
  interpretation of legal case timelines by judges
  and juries.

  RESEARCH CONTEXT:
  Growing evidence suggests that how chronological
  information is presented significantly affects
  legal decision-making. This program investigates
  the intersection of behavioral science and
  timeline presentation.

  KEY PHENOMENA TO INVESTIGATE:

  1. Anchoring Effect in Timeline Perception:
     - Does the first date/event presented anchor
       subsequent temporal judgments?
     - How does starting point selection affect
       perceived causation?

  2. Narrative Coherence Bias:
     - Do decision-makers prefer timelines that tell
       a "clean" story over those with messy reality?
     - How do gaps in timelines affect credibility
       assessments?

  3. Recency vs. Primacy in Chronological Evidence:
     - Do events at the beginning or end of a timeline
       have more influence on decisions?
     - How does timeline length affect which events
       are remembered?

  4. Hindsight Bias in Timeline Interpretation:
     - How does knowing the outcome (injury, loss)
       affect interpretation of earlier timeline
       events?
     - Can timeline presentation reduce or amplify
       hindsight bias?

  5. Visual Format Effects:
     - Horizontal vs. vertical timeline orientation
     - Color coding and highlighting effects
     - Granularity (day-level vs. month-level vs.
       year-level) impact on perception
     - Interactive vs. static timeline effectiveness

  PRACTICAL APPLICATIONS:
  - Attorney trial strategy (plaintiff vs. defense
    timeline preferences)
  - Judicial decision-making improvement
  - Jury instruction design
  - Mediation and settlement visualization
  - Legal education

  Create:
  1. Research program design with 5 study protocols
  2. Hypothesis frameworks for each phenomenon
  3. Experimental methodology (mock trial design)
  4. Analysis plan for each study
  5. Practical implications for trial attorneys

assertions:
  - type: llm_judge
    criteria: "Research program addresses all 5 cognitive phenomena with rigorous study designs — each phenomenon has a specific study protocol with testable hypotheses; anchoring study uses between-subjects design varying the timeline's starting event; narrative coherence study compares decision-maker responses to 'clean' vs. 'messy' (realistic) timelines; recency/primacy study varies timeline length and event positioning; hindsight bias study uses prospective vs. retrospective timeline presentation; visual format study uses A/B testing across format variations; each study includes power analysis, randomization strategy, and confound controls."
    weight: 0.35
    description: "ResearchProgramDesign"
  - type: llm_judge
    criteria: "Practical implications translate research findings to trial strategy — for plaintiff attorneys: starting the timeline at the moment of harm and working backward to causation may leverage anchoring bias; for defense attorneys: presenting the complete context with pre-incident timeline may dilute causation perception; timeline gaps should be addressed proactively to avoid narrative coherence bias against the presenting party; visual formatting recommendations include evidence-based color coding, optimal granularity for different case lengths, and interactive vs. static recommendations based on complexity."
    weight: 0.35
    description: "PracticalTrialImplications"
  - type: llm_judge
    criteria: "Experimental methodology is ecologically valid — mock trial designs use realistic case materials and representative jury pools; studies control for case type, case strength, and presentation medium; outcome measures include verdict direction, confidence level, factual comprehension (recall test), and perceived timeline credibility; the methodology addresses the tension between internal validity (controlled lab setting) and external validity (real courtroom conditions); participant recruitment covers diverse demographics representative of actual jury pools; ethical protocols include informed consent and debriefing."
    weight: 0.30
    description: "ExperimentalMethodology"
