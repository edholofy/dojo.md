  description: "Design a timeline documentation training and certification program — create curriculum, assessments, and professional development pathways for legal professionals specializing in case chronology"
  tags: [training-program, certification, professional-development, expert]

state: {}

trigger: |
  Design a comprehensive training and certification
  program in case timeline documentation for a
  national paralegal professional association.

  ASSOCIATION PROFILE:
  - National Association of Legal Timeline
    Professionals (NALTP) — proposed new organization
  - Target membership: 50,000 paralegals, litigation
    support professionals, and legal nurses
  - Partnership with 3 paralegal certificate programs
    at accredited universities
  - Endorsed by 5 state bar associations

  PROGRAM STRUCTURE:
  Create a 3-tier certification program:

  Tier 1: Certified Timeline Analyst (CTA)
  - Entry-level certification
  - Target: New paralegals, legal assistants
  - Prerequisites: Paralegal certificate or 1 year
    legal experience

  Tier 2: Advanced Timeline Specialist (ATS)
  - Mid-career certification
  - Target: Experienced paralegals, litigation
    support managers
  - Prerequisites: CTA + 3 years experience + 50
    timelines completed

  Tier 3: Master Timeline Consultant (MTC)
  - Expert-level certification
  - Target: Consultants, expert witnesses, program
    directors
  - Prerequisites: ATS + 7 years experience + expert
    testimony or publication record

  CURRICULUM AREAS:
  1. Chronology methodology and best practices
  2. Document analysis and fact extraction
  3. Legal research for timeline context
  4. Technology tools (CaseMap, TrialLine, etc.)
  5. Visual presentation and exhibit design
  6. Practice-area specializations
  7. Expert testimony preparation
  8. Quality assurance and review
  9. Project management for large timelines
  10. AI and emerging technology applications

  Create:
  1. Detailed curriculum for each tier
  2. Assessment and examination structure
  3. Continuing education requirements
  4. Revenue model and sustainability plan
  5. University partnership integration

assertions:
  - type: llm_judge
    criteria: "Curriculum for each tier builds progressively — CTA covers fundamentals: chronology methodology, basic document analysis, standard timeline tools, event classification, source verification, and single-case timeline construction; ATS adds: complex multi-party timelines, cross-jurisdictional coordination, advanced technology (AI extraction, custom visualization), project management for 10,000+ document cases, and quality review supervision; MTC covers: expert testimony preparation, program design for organizations, research methodology, advanced analytics, training development, and consulting practice management; each tier's curriculum maps to specific competencies assessed in examinations."
    weight: 0.35
    description: "TieredCurriculumDesign"
  - type: llm_judge
    criteria: "Assessment structure measures practical competency — CTA exam includes written knowledge test plus practical assessment (build a timeline from a provided document set within 4 hours); ATS exam requires a portfolio of 5 complex timelines with self-assessment plus a live case study exercise; MTC assessment includes peer review of a published or court-submitted timeline work product, a mock expert testimony session evaluated by attorneys, and a research or methodology paper; all assessments use standardized rubrics; recertification every 3 years requires continuing education credits and portfolio updates."
    weight: 0.35
    description: "AssessmentStructure"
  - type: llm_judge
    criteria: "Revenue model demonstrates sustainability — primary revenue streams: certification exam fees ($300 CTA, $500 ATS, $800 MTC), annual membership dues ($150-300 by tier), CLE/CE course fees ($50-200 per course), corporate training programs ($5K-$25K per engagement), conference registration, and study materials/textbook sales; university partnerships provide tuition revenue sharing for integrated programs; the model projects break-even within 2 years with 2,000 initial members; long-term sustainability relies on certification becoming an industry standard that employers require or prefer."
    weight: 0.30
    description: "RevenueModelSustainability"
