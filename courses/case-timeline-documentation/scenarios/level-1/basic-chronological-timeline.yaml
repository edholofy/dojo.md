meta:
  id: basic-chronological-timeline
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Create a basic chronological timeline — organize events in sequential order, identify key dates, link events to source documents, and establish a clear factual narrative"
  tags: [chronological-timeline, basic-organization, event-sequencing, beginner]

state: {}

trigger: |
  Create a chronological case timeline for a
  breach of contract lawsuit.

  CASE OVERVIEW:
  Plaintiff (a small software company) sues
  Defendant (a mid-size retailer) for breach of
  a software development contract.

  RAW FACTS (unorganized):
  - Jun 15, 2024: Defendant emailed Plaintiff
    requesting a "rush delivery" of Phase 2
  - Mar 1, 2024: Contract signed — Plaintiff to
    develop custom inventory management software
  - Sep 30, 2024: Plaintiff delivers Phase 2
    (2 weeks late)
  - Aug 1, 2024: Plaintiff delivers Phase 1 on time
  - Oct 15, 2024: Defendant sends written notice
    of defects in Phase 2
  - Jan 10, 2025: Plaintiff sends final invoice
    for $180,000
  - Nov 1, 2024: Plaintiff acknowledges defects and
    promises fix within 30 days
  - Apr 15, 2024: Project kickoff meeting; parties
    agree on requirements document
  - Dec 15, 2024: Plaintiff delivers "fixed" Phase 2
    but 3 critical defects remain
  - Feb 1, 2025: Defendant terminates contract
    citing material breach
  - Feb 15, 2025: Plaintiff files lawsuit for
    unpaid invoices ($180,000)
  - Jul 1, 2024: Phase 1 deadline per contract
  - Sep 15, 2024: Phase 2 deadline per contract

  SOURCE DOCUMENTS:
  - Contract (Exhibit A)
  - Project kickoff meeting notes (Exhibit B)
  - Rush delivery email (Exhibit C)
  - Phase 1 delivery confirmation (Exhibit D)
  - Phase 2 delivery email (Exhibit E)
  - Defect notice letter (Exhibit F)
  - Fix acknowledgment email (Exhibit G)
  - Phase 2 re-delivery email (Exhibit H)
  - Final invoice (Exhibit I)
  - Termination letter (Exhibit J)

  Create:
  1. Organized chronological timeline with dates
  2. Source document links for each event
  3. Timeline narrative summary
  4. Key date identification (deadlines, breaches)
  5. Timeline gaps requiring further investigation

assertions:
  - type: llm_judge
    criteria: "Timeline is properly sequenced with all events in chronological order — events run from March 1, 2024 (contract signing) through February 15, 2025 (lawsuit filed); each entry includes the date, event description, and source document reference; no events are out of order; the timeline distinguishes between contractual deadlines (Jul 1, Sep 15) and actual delivery dates (Aug 1, Sep 30) to show where delays occurred."
    weight: 0.35
    description: "ChronologicalSequencing"
  - type: llm_judge
    criteria: "Key dates and their significance are identified — highlights the Phase 2 deadline (Sep 15) vs. actual delivery (Sep 30) showing the 2-week delay; notes the rush delivery request (Jun 15) which may explain/excuse the delay; identifies the 30-day fix promise (Nov 1 → Dec 1) vs. actual fix delivery (Dec 15, also late); flags the termination date (Feb 1) and lawsuit filing (Feb 15); each key date is annotated with its legal significance."
    weight: 0.35
    description: "KeyDateIdentification"
  - type: llm_judge
    criteria: "Timeline gaps are identified for further investigation — the timeline should note gaps such as: what happened between the rush delivery request (Jun 15) and Phase 1 delivery (Aug 1)? Was Phase 1 delivered late because of the rush request? What specific defects were identified? Were there any payment milestones? Was there any correspondence between Dec 15 and Jan 10? These gaps would need to be filled through discovery."
    weight: 0.30
    description: "TimelineGapIdentification"
