meta:
  id: beginner-timeline-shift
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Beginner shift simulation — handle multiple timeline documentation tasks under pressure, combining chronological organization, witness mapping, document extraction, and procedural tracking across different case types"
  tags: [shift-simulation, multi-task, timeline-basics, beginner]

state: {}

trigger: |
  You are a paralegal on your first week at a busy
  litigation firm. Your supervising attorney has
  left you three urgent timeline tasks before heading
  to court. Complete all three before she returns
  at 3 PM.

  TASK 1 — SLIP AND FALL CASE
  Client: Rosa Martinez, injured at GroceryMart
  - Nov 15, 2024, 2:30 PM: Rosa slips on wet floor
    in produce aisle; no wet floor sign visible
  - Nov 15, 2024, 2:35 PM: Store manager (Tom Park)
    arrives; calls ambulance
  - Nov 15, 2024, 2:45 PM: Rosa taken by ambulance
    to City Hospital
  - Nov 15, 2024, 3:00 PM: ER diagnosis — fractured
    hip, requires surgery
  - Nov 16, 2024: Surgery performed
  - Nov 20, 2024: Rosa discharged; needs 6 weeks
    physical therapy
  - Dec 1, 2024: Rosa's daughter contacts our firm
  - Dec 5, 2024: Attorney sends preservation letter
    to GroceryMart (surveillance video, incident
    reports, cleaning logs)
  - Jan 10, 2025: GroceryMart responds — claims video
    was "automatically overwritten" after 30 days
  Create a timeline and flag the spoliation issue.

  TASK 2 — BREACH OF CONTRACT
  Parties: BuildRight LLC (client) v. SupplyPro Inc.
  - Jan 2024: Signed supply agreement for building
    materials, 12-month term
  - Mar 2024: First late delivery (5 days late)
  - May 2024: Second late delivery (8 days late),
    BuildRight sends written warning per contract
  - Jul 2024: Materials delivered on time but wrong
    specifications — 2x4s instead of 2x6s
  - Aug 2024: BuildRight forced to source replacement
    materials at 40% premium
  - Sep 2024: SupplyPro delivers correct materials
    but 3 weeks late
  - Oct 2024: BuildRight sends notice of breach
  - Nov 2024: SupplyPro claims force majeure due to
    supply chain disruptions
  Create timeline showing pattern of breach.

  TASK 3 — WORKERS' COMPENSATION
  Claimant: James Foster, warehouse worker
  - Jun 1, 2024: James reports back pain to supervisor
  - Jun 3, 2024: Supervisor says "walk it off"
  - Jun 15, 2024: James sees personal doctor; diagnosed
    with herniated disc; doctor notes "likely work-
    related due to heavy lifting requirements"
  - Jun 16, 2024: James reports injury to HR
  - Jun 20, 2024: Employer files First Report of Injury
  - Jul 1, 2024: Workers' comp insurer denies claim —
    "not reported within required timeframe"
  - Jul 15, 2024: James retains our firm
  - Aug 1, 2024: We file appeal with Workers' Comp Board
  Create timeline highlighting the reporting dispute.

assertions:
  - type: llm_judge
    criteria: "Slip and fall timeline flags critical spoliation issue — the 30-day video overwrite claim is identified as suspicious given the preservation letter was sent on Dec 5 (20 days after incident) but GroceryMart's response on Jan 10 claims the video was already overwritten; this gap suggests either the preservation letter was ignored or the video was intentionally destroyed; the timeline documents the preservation demand and spoliation for a future motion for adverse inference."
    weight: 0.35
    description: "SpoliationIssueIdentification"
  - type: llm_judge
    criteria: "Breach of contract timeline shows escalating pattern — documents the progression from late deliveries (Mar, May) to wrong specifications (Jul) to continued delays (Sep); each breach is connected to the contract terms and BuildRight's responses (written warning in May, notice of breach in Oct); the force majeure defense (Nov) is placed in context showing problems predated any supply chain excuse; the 40% premium for replacement materials quantifies damages."
    weight: 0.35
    description: "BreachPatternDocumentation"
  - type: llm_judge
    criteria: "Workers' comp timeline addresses the reporting timeline dispute — documents the gap between initial report to supervisor (Jun 1) and formal HR report (Jun 16); highlights that supervisor's dismissive response ('walk it off') contributed to the delay; the doctor's note (Jun 15) establishing work-relatedness is a key piece of evidence; the timeline supports the argument that the initial supervisor report (Jun 1) should count as timely notice to the employer."
    weight: 0.30
    description: "ReportingDisputeTimeline"
