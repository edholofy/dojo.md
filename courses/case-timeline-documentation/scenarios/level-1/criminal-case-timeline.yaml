meta:
  id: criminal-case-timeline
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Create a criminal case timeline — organize arrest, arraignment, discovery, motion practice, and trial dates while tracking speedy trial deadlines and key procedural milestones"
  tags: [criminal-case, procedural-timeline, speedy-trial, beginner]

state: {}

trigger: |
  Create a procedural timeline for a criminal
  fraud case, tracking all key dates and
  deadlines.

  CASE: United States v. Thompson
  Charge: Wire fraud (18 U.S.C. § 1343), 5 counts
  Court: U.S. District Court, Southern District
  of New York

  EVENTS:
  - Aug 10, 2024: FBI executes search warrant at
    defendant's office
  - Aug 10, 2024: 15 boxes of documents and 3
    computers seized
  - Sep 5, 2024: Grand jury returns indictment
  - Sep 12, 2024: Defendant arrested
  - Sep 13, 2024: Initial appearance; bail set
    at $500,000; defendant released on bond
  - Sep 20, 2024: Arraignment; defendant pleads
    not guilty
  - Oct 1, 2024: Government's initial discovery
    production (150,000 pages, 2TB electronic data)
  - Oct 15, 2024: Defense files motion to suppress
    evidence from search warrant (argues overbreadth)
  - Nov 1, 2024: Government opposes suppression motion
  - Nov 15, 2024: Court hears suppression motion
  - Dec 1, 2024: Court denies suppression motion
  - Dec 15, 2024: Government produces additional
    discovery (cooperation agreement with co-
    conspirator Jane Davis, who will testify)
  - Jan 10, 2025: Defense files motion for bill
    of particulars
  - Jan 30, 2025: Court orders government to
    provide bill of particulars by Feb 15
  - Feb 15, 2025: Government files bill of
    particulars
  - Mar 1, 2025: Defense requests 90-day continuance
    to review voluminous discovery
  - Mar 5, 2025: Court grants 60-day continuance
  - May 5, 2025: Trial date set

  SPEEDY TRIAL ACT: 70-day clock
  Excludable delays: pretrial motions, continuances
  granted by court

  Create:
  1. Complete procedural timeline
  2. Speedy Trial Act calculation
  3. Discovery production tracking
  4. Motion practice timeline
  5. Trial preparation deadlines

assertions:
  - type: llm_judge
    criteria: "Speedy Trial Act calculation is accurate — the 70-day clock starts at arraignment (Sep 20) or initial appearance (Sep 13), whichever is later; excludable time includes the suppression motion period (Oct 15 - Dec 1), the bill of particulars motion period (Jan 10 - Feb 15), and the court-granted continuance (Mar 5 - May 5); the calculation shows how many non-excludable days have elapsed and whether the May 5 trial date complies with the STA."
    weight: 0.35
    description: "SpeedyTrialCalculation"
  - type: llm_judge
    criteria: "Discovery tracking shows volume and timing challenges — 150,000 pages plus 2TB of electronic data on Oct 1 followed by additional production on Dec 15 (cooperating witness agreement) creates a massive review burden; the timeline contextualizes the defense's 90-day continuance request against the discovery volume; identifies potential Brady/Giglio obligations related to the cooperating witness agreement."
    weight: 0.35
    description: "DiscoveryTracking"
  - type: llm_judge
    criteria: "Trial preparation deadlines are identified and tracked — works backward from the May 5 trial date to identify key pretrial deadlines: jury instructions due date, motions in limine deadline, witness list exchange, exhibit list exchange, pretrial conference date; these deadlines may not be explicitly stated in the facts but should be estimated based on typical federal court scheduling orders."
    weight: 0.30
    description: "TrialPrepDeadlines"
