meta:
  id: witness-event-mapping
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Map events to witnesses — identify which witnesses have knowledge of which events, create a witness-event matrix, and identify gaps in witness coverage"
  tags: [witness-mapping, event-matrix, witness-coverage, beginner]

state: {}

trigger: |
  Create a witness-event matrix for a workplace
  discrimination case.

  CASE OVERVIEW:
  Employee (Maria Gonzalez) was terminated from
  a marketing firm. She alleges gender and
  national origin discrimination.

  WITNESSES AND THEIR KNOWLEDGE:

  MARIA GONZALEZ (Plaintiff):
  - Hired as Marketing Manager, Jan 2022
  - Received "Exceeds Expectations" reviews for
    2 years
  - Denied promotion to VP Marketing, Jun 2024
  - Told by CEO: "clients prefer someone who looks
    more corporate" (Aug 2024)
  - Filed HR complaint about the comment, Sep 2024
  - Performance rating dropped to "Needs Improvement"
    in next review, Oct 2024
  - Terminated for "performance issues," Dec 2024

  JOHN CHEN (HR Director):
  - Conducted Maria's annual reviews
  - Received Maria's discrimination complaint
  - Investigated the complaint (found "inconclusive")
  - Present at the termination meeting
  - Selected the replacement (a less experienced
    white male)

  SARAH WILLIAMS (CEO):
  - Made the "looks more corporate" comment
  - Made the promotion decision
  - Approved the termination
  - Denies the comment was discriminatory

  TOM BAKER (Maria's Direct Supervisor):
  - Supervised Maria's daily work
  - Wrote performance reviews (positive ones)
  - Was not consulted about the termination
  - Disagrees with the "Needs Improvement" rating
  - Willing to testify that Maria was a strong
    performer

  LISA PARK (Colleague):
  - Overheard the "looks more corporate" comment
  - Noticed Maria being excluded from client
    meetings after the complaint
  - Left the company 2 months after Maria's
    termination

  Create:
  1. Witness-event matrix (who knows what)
  2. Witness credibility assessment
  3. Deposition priority recommendations
  4. Timeline of events by witness knowledge
  5. Key testimony to elicit from each witness

assertions:
  - type: llm_judge
    criteria: "Witness-event matrix clearly maps which witnesses have firsthand knowledge of which events — creates a grid showing each key event across the top and each witness down the side, with clear indicators of who was present/has knowledge; identifies corroboration opportunities (Lisa Park corroborates the CEO's comment); highlights events with only one witness (the promotion decision has only Sarah Williams and Maria); the matrix is a practical tool for deposition and trial preparation."
    weight: 0.35
    description: "WitnessEventMatrix"
  - type: llm_judge
    criteria: "Deposition priority reflects strategic value — Tom Baker should be deposed early (favorable witness who disagrees with the performance rating change and was not consulted about termination); Lisa Park should be deposed before she becomes harder to reach (left the company, corroborates the key comment); John Chen's deposition should focus on the complaint investigation process; Sarah Williams should be deposed last (opposing party, with full knowledge of other testimony)."
    weight: 0.35
    description: "DepositionPriority"
  - type: llm_judge
    criteria: "Key testimony to elicit is strategically organized — for each witness, identifies specific questions that will establish elements of the discrimination claim: the comment (Maria + Lisa = corroboration), the timeline of retaliation (complaint in Sep → rating drop in Oct → termination in Dec), the pretext evidence (Tom Baker's testimony undermines the 'performance issues' justification), and the comparator evidence (John Chen selected a less qualified replacement)."
    weight: 0.30
    description: "KeyTestimonyStrategy"
