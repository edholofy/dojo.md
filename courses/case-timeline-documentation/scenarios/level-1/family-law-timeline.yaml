meta:
  id: family-law-timeline
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Create a family law case timeline — track marriage events, financial transactions, custody events, and court proceedings for a divorce and custody dispute"
  tags: [family-law, divorce-timeline, custody, beginner]

state: {}

trigger: |
  Create a comprehensive timeline for a contested
  divorce with custody and property division issues.

  PARTIES: Jennifer and Michael Roberts
  Married: June 15, 2015

  KEY EVENTS:
  - Jun 2015: Marriage; both employed full-time
  - Sep 2016: Child born (Emma, now 8)
  - Jan 2018: Child born (James, now 7)
  - Mar 2018: Jennifer leaves career to be primary
    caregiver (by mutual agreement)
  - Jun 2019: Couple purchases home ($650,000, using
    $130,000 from Michael's inheritance for down
    payment)
  - Jan 2022: Michael receives $200,000 inheritance
    from grandmother; deposits into joint investment
    account
  - Jun 2023: Jennifer discovers Michael's affair
  - Aug 2023: Michael moves out to apartment
  - Sep 2023: Jennifer files for divorce
  - Oct 2023: Temporary orders hearing; Jennifer
    awarded temporary custody, Michael gets every
    other weekend
  - Nov 2023: Michael's income: $250,000/year
    salary + $80,000 bonus (variable)
  - Dec 2023: Jennifer discovers Michael transferred
    $50,000 from joint account to his sister
  - Jan 2024: Court orders Michael to return
    transferred funds
  - Mar 2024: Custody evaluation ordered by court
  - Jun 2024: Custody evaluator recommends shared
    custody (week-on, week-off)
  - Sep 2024: Financial discovery reveals Michael's
    undisclosed cryptocurrency holdings ($175,000)
  - Nov 2024: Trial date set for Jan 2025

  Create:
  1. Complete case timeline
  2. Financial event timeline (property acquisition,
     transfers, income)
  3. Custody-related event timeline
  4. Dissipation of assets analysis
  5. Key dates for trial preparation

assertions:
  - type: llm_judge
    criteria: "Financial timeline tracks property characterization — distinguishes between marital property (home equity minus down payment from separate funds, joint investment account) and separate property (Michael's inheritance, potentially commingled); the $200K inheritance deposited into a joint account may have been transmuted to marital property through commingling; the $50K transfer and undisclosed crypto are tracked as potential dissipation/concealment; this timeline directly supports the property division arguments."
    weight: 0.35
    description: "FinancialTimelineProperty"
  - type: llm_judge
    criteria: "Custody timeline supports the best-interests analysis — tracks Jennifer as primary caregiver from 2018 (6+ years of primary caregiving); Michael's every-other-weekend arrangement since separation; the custody evaluator's week-on/week-off recommendation; the timeline documents the children's established routine and stability factors that courts consider; Jennifer's career sacrifice creates an imputed income issue for support calculations."
    weight: 0.35
    description: "CustodyTimeline"
  - type: llm_judge
    criteria: "Dissipation of assets is documented chronologically — the $50K transfer to Michael's sister occurred after divorce filing (Dec 2023, 3 months after filing); the undisclosed cryptocurrency suggests intentional concealment; both events are flagged as potential grounds for unequal property division; the timeline connects each financial event to its legal significance in the divorce proceeding."
    weight: 0.30
    description: "DissipationDocumentation"
