meta:
  id: contract-milestone-timeline
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Create a contract milestone timeline — track performance obligations, payment schedules, notice periods, and key contractual deadlines across the life of a commercial agreement"
  tags: [contract-milestones, deadline-tracking, obligations, beginner]

state: {}

trigger: |
  Create a timeline of contractual milestones
  and obligations for a construction project
  dispute.

  CONTRACT DETAILS:
  - Parties: HomeOwner (Owner) and BuildRight
    Construction (Contractor)
  - Project: Custom home construction
  - Contract date: January 15, 2024
  - Contract price: $850,000
  - Completion date: December 31, 2024

  MILESTONE SCHEDULE (from contract):
  1. Permit approval: Within 60 days of contract
     (by Mar 15, 2024)
  2. Foundation complete: Within 90 days of permit
  3. Framing complete: Within 60 days of foundation
  4. Rough-in (electrical, plumbing, HVAC): Within
     45 days of framing
  5. Inspection approval: Within 30 days of rough-in
  6. Finish work: Within 90 days of inspection
  7. Final walkthrough: Within 14 days of finish
  8. Substantial completion: By Dec 31, 2024

  PAYMENT SCHEDULE (from contract):
  - $170,000 at contract signing
  - $170,000 at foundation completion
  - $170,000 at framing completion
  - $170,000 at rough-in completion
  - $170,000 at substantial completion

  ACTUAL EVENTS:
  - Jan 15: Contract signed, $170K paid
  - Mar 10: Permits approved (on time)
  - Jul 5: Foundation complete (15 days late)
  - Jul 20: $170K payment made
  - Oct 1: Framing complete (27 days late)
  - Oct 15: $170K payment made
  - Dec 1: Rough-in complete (16 days late)
  - Dec 15: Payment of $170K withheld by Owner
  - Dec 31: Project not complete, Contractor
    claims delays were due to weather and supply
    chain issues
  - Jan 15, 2025: Owner sends notice of default
  - Feb 1, 2025: Contractor responds claiming
    force majeure and demanding payment

  Create:
  1. Contract vs. actual performance timeline
  2. Delay analysis showing cumulative slippage
  3. Payment obligation tracking
  4. Notice and cure period timeline
  5. Key dates for litigation planning

assertions:
  - type: llm_judge
    criteria: "Contract vs. actual timeline clearly shows cumulative delay — calculates each milestone's scheduled date from the contract terms, then compares to actual completion; shows that the initial 15-day delay on foundation cascaded through subsequent milestones; the cumulative delay analysis demonstrates whether later milestones were completed within their allocated time from the prior milestone (relative delay) or fell further behind (absolute delay)."
    weight: 0.35
    description: "DelayAnalysis"
  - type: llm_judge
    criteria: "Payment withholding is contextualized against performance — the Owner withheld the 4th payment ($170K) on Dec 15 after rough-in was complete; the timeline shows whether this was justified (was payment due upon rough-in completion regardless of delay?) or a breach (if the contract doesn't condition payment on being on schedule); the payment timeline is critical to both parties' claims."
    weight: 0.35
    description: "PaymentPerformanceContext"
  - type: llm_judge
    criteria: "Notice and cure period analysis is precise — the default notice (Jan 15, 2025) triggered a cure period (typically 30 days unless the contract specifies otherwise); the timeline identifies when the cure period expires; the Contractor's force majeure response (Feb 1) falls within the cure period; the analysis tracks whether proper notice procedures were followed per the contract terms."
    weight: 0.30
    description: "NoticeCurePeriodAnalysis"
