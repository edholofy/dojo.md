meta:
  id: regulatory-compliance-timeline
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Build a regulatory compliance timeline — track regulatory filings, agency communications, compliance deadlines, and enforcement actions in chronological order"
  tags: [regulatory-compliance, agency-communications, enforcement, beginner]

state: {}

trigger: |
  Create a regulatory compliance timeline for
  a food safety enforcement action.

  CASE: FDA enforcement against FreshFoods Inc.
  for violations at their processing facility.

  EVENTS (unorganized):
  - Mar 2024: FDA announces routine inspection of
    FreshFoods facility
  - Apr 1-5, 2024: FDA inspection conducted;
    inspector finds: (a) inadequate temperature
    controls in storage area, (b) cross-contamination
    risk between raw and ready-to-eat products,
    (c) incomplete HACCP plan
  - Apr 20, 2024: FDA issues Form 483 listing
    3 observations
  - May 5, 2024: FreshFoods responds to Form 483
    with corrective action plan
  - May 20, 2024: FDA reviews response; finds
    corrective actions insufficient for observations
    1 and 3
  - Jun 15, 2024: FDA issues Warning Letter
  - Jul 1, 2024: FreshFoods has 15 business days
    to respond to Warning Letter
  - Jul 20, 2024: FreshFoods responds with revised
    corrective action plan
  - Aug 15, 2024: FDA conducts follow-up inspection
  - Aug 20, 2024: Follow-up finds observation 1
    corrected, observation 3 partially corrected,
    NEW observation: employee hygiene violations
  - Sep 10, 2024: FDA sends Untitled Letter
    regarding new observation
  - Oct 1, 2024: Consumer reports illness linked
    to FreshFoods product
  - Oct 5, 2024: CDC confirms Listeria outbreak
    (15 cases, 3 hospitalizations)
  - Oct 7, 2024: FreshFoods initiates voluntary
    recall (Class I)
  - Oct 10, 2024: FDA issues press release about
    recall
  - Nov 1, 2024: FreshFoods retains counsel for
    potential enforcement action
  - Dec 1, 2024: FDA refers case to DOJ for
    potential criminal prosecution

  Create:
  1. Complete regulatory timeline
  2. Escalation pattern analysis
  3. Compliance response adequacy assessment
  4. Key regulatory deadlines
  5. Litigation risk assessment based on timeline

assertions:
  - type: llm_judge
    criteria: "Escalation pattern is clearly visualized — the timeline shows regulatory escalation from routine inspection → Form 483 → Warning Letter → follow-up inspection with new violations → Untitled Letter → outbreak → recall → DOJ referral; each escalation step is annotated with what triggered it; the pattern shows that FreshFoods' inadequate responses at each stage led to the next level of enforcement."
    weight: 0.35
    description: "EscalationPatternAnalysis"
  - type: llm_judge
    criteria: "Compliance response adequacy is assessed at each stage — the Form 483 response (May 5) was found insufficient by FDA (May 20); the Warning Letter response (Jul 20) led to a follow-up inspection that found partial correction plus new violations; this pattern of inadequate responses is damaging for any future defense; the timeline shows that FreshFoods had multiple opportunities to correct problems and failed each time."
    weight: 0.35
    description: "ComplianceResponseAssessment"
  - type: llm_judge
    criteria: "Criminal prosecution risk is assessed based on the timeline — the DOJ referral (Dec 1) suggests potential criminal charges under FDCA; the timeline's pattern of repeated warnings and inadequate responses demonstrates 'knowing' violations; the outbreak causing hospitalizations adds potential felony exposure; the timeline is a prosecution exhibit showing the company had notice and failed to act; defense strategy must address this damaging chronology."
    weight: 0.30
    description: "CriminalProsecutionRisk"
