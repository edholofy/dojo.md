meta:
  id: employment-dispute-timeline
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Create an employment dispute timeline — track the sequence of workplace events, HR actions, administrative complaints, and legal deadlines for an employment law claim"
  tags: [employment-dispute, administrative-process, eeoc-timeline, beginner]

state: {}

trigger: |
  Create a timeline for an employment
  discrimination case tracking both workplace
  events and the administrative process.

  WORKPLACE EVENTS:
  - Jan 2023: Employee (David Kim) hired as Senior
    Accountant at MegaCorp
  - Jun 2023: Annual review — "Exceeds Expectations"
  - Sep 2023: New supervisor (Mark Jones) takes over
  - Oct 2023: Kim requests religious accommodation
    (time off for Korean Lunar New Year)
  - Oct 2023: Supervisor denies request, stating
    "we don't do that here"
  - Nov 2023: Kim makes second accommodation request
    through HR
  - Dec 2023: HR approves accommodation; supervisor
    visibly unhappy
  - Jan 2024: Supervisor assigns Kim to least
    desirable accounts
  - Mar 2024: Supervisor gives Kim "Below
    Expectations" review (first negative review)
  - Apr 2024: Kim reports retaliation to HR
  - May 2024: HR investigates — "finds no evidence
    of retaliation"
  - Jun 2024: Kim placed on Performance Improvement
    Plan (PIP)
  - Sep 2024: PIP period ends — supervisor rates
    Kim as "failed PIP"
  - Oct 2024: Kim terminated

  ADMINISTRATIVE PROCESS:
  - Nov 15, 2024: Kim files EEOC charge (religious
    discrimination + retaliation)
  - Dec 1, 2024: EEOC sends notice to MegaCorp
  - Feb 1, 2025: MegaCorp files position statement
  - Mar 15, 2025: EEOC conducts on-site investigation
  - Jun 1, 2025: EEOC issues right-to-sue letter
  - Deadline: Kim has 90 days from right-to-sue
    letter to file federal lawsuit (Aug 30, 2025)

  Create:
  1. Combined workplace and administrative timeline
  2. Retaliation causation timeline (proximity analysis)
  3. Administrative deadline tracking
  4. Key documents to request in discovery
  5. Timeline-based theory of the case

assertions:
  - type: llm_judge
    criteria: "Retaliation causation timeline highlights temporal proximity — the timeline clearly shows the sequence: religious accommodation request (Oct 2023) → denial → HR override (Dec 2023) → reassignment to bad accounts (Jan 2024, 1 month later) → first negative review (Mar 2024, 3 months later) → retaliation complaint (Apr 2024) → PIP (Jun 2024, 2 months after complaint) → termination (Oct 2024); this close temporal proximity is powerful circumstantial evidence of retaliation."
    weight: 0.35
    description: "RetaliationCausationTimeline"
  - type: llm_judge
    criteria: "Administrative deadlines are clearly tracked — the 90-day deadline to file federal suit after the right-to-sue letter (Jun 1 → Aug 30, 2025) is prominently flagged; the EEOC filing deadline (300 days from the discriminatory act in deferral states, 180 days in non-deferral states) is noted relative to the termination date; missing this deadline would be malpractice; the timeline serves as a docket management tool."
    weight: 0.35
    description: "AdministrativeDeadlines"
  - type: llm_judge
    criteria: "Theory of the case emerges from the timeline — the chronological sequence tells a story: accommodation request → supervisor hostility → pattern of escalating adverse actions → pretext termination; the timeline reveals that every negative action occurred after the accommodation request, and the pace of adverse actions accelerated after the retaliation complaint; the timeline IS the theory of the case."
    weight: 0.30
    description: "TimelineBasedTheory"
