meta:
  id: email-chain-timeline
  level: 1
  course: case-timeline-documentation
  type: output
  description: "Build a timeline from email chains — extract chronological events from email correspondence, identify key communications, and reconstruct the factual narrative from electronic communications"
  tags: [email-analysis, communication-timeline, electronic-evidence, beginner]

state: {}

trigger: |
  Reconstruct a timeline from email chains in
  a trade secret misappropriation case.

  EMAIL EVIDENCE (chronological excerpts):

  EMAIL 1 — Jan 5, 2025, 9:15 AM
  From: Alex Rivera (VP Engineering, TechCo)
  To: Pat Morgan (CEO, StartupX)
  Subject: Exciting opportunity
  "Pat, great catching up at CES. I've been
  thinking about your offer. Let's talk more.
  I'll need to be careful about my non-compete."

  EMAIL 2 — Jan 12, 2025, 2:30 PM
  From: Pat Morgan
  To: Alex Rivera
  Subject: Re: Exciting opportunity
  "Our lawyers reviewed your non-compete. They
  think it's overbroad and unlikely enforceable
  in California. Let's move forward."

  EMAIL 3 — Jan 20, 2025, 6:45 PM
  From: Alex Rivera
  To: personal email (alex.r.home@gmail.com)
  Subject: Files
  [Attachment: TechCo_product_roadmap_2025.pdf]
  [Attachment: customer_list_Q4_2024.xlsx]
  [Attachment: proprietary_algorithm_v3.py]

  EMAIL 4 — Feb 1, 2025, 8:00 AM
  From: Alex Rivera
  To: HR@TechCo.com
  Subject: Resignation
  "Please accept my resignation effective
  February 14, 2025."

  EMAIL 5 — Feb 3, 2025, 10:00 AM
  From: TechCo IT Security
  To: General Counsel
  Subject: Suspicious data transfer alert
  "Flagged: A. Rivera transferred 3 files to
  personal email on Jan 20. Files include
  proprietary algorithm source code."

  EMAIL 6 — Feb 14, 2025, 5:00 PM
  Alex Rivera's last day at TechCo

  EMAIL 7 — Feb 17, 2025, 9:00 AM
  From: StartupX Blog Post
  "We're excited to welcome Alex Rivera as our
  new CTO!"

  EMAIL 8 — Mar 1, 2025, 11:00 AM
  From: TechCo Customer (Sarah Lee)
  To: TechCo Sales
  "Hi, I received a call from StartupX offering
  a competing product at 30% less. They seemed
  to know exactly our contract terms and renewal
  date. How is that possible?"

  Create:
  1. Chronological email timeline with analysis
  2. Evidence of trade secret misappropriation
  3. Key communications for each legal element
  4. Metadata analysis recommendations
  5. Additional emails to subpoena in discovery

assertions:
  - type: llm_judge
    criteria: "Timeline reconstructs the misappropriation narrative from emails — establishes the sequence: recruitment discussion (Jan 5) → non-compete analysis (Jan 12) → data exfiltration (Jan 20) → resignation (Feb 1) → security alert (Feb 3) → departure (Feb 14) → competitor announcement (Feb 17) → customer solicitation (Mar 1); each email is annotated with its evidentiary significance for the trade secret claim."
    weight: 0.35
    description: "MisappropriationNarrative"
  - type: llm_judge
    criteria: "Evidence mapping connects emails to legal elements — trade secret identification (Email 3: proprietary algorithm, customer list), misappropriation method (Email 3: personal email transfer), improper purpose (Email 1: job discussion predates transfer), use by competitor (Email 8: competitor knew customer contract terms), and notice of restrictions (Email 1: Rivera acknowledges non-compete); each email maps to a specific element of the claim."
    weight: 0.35
    description: "EvidenceToElementsMapping"
  - type: llm_judge
    criteria: "Additional discovery targets are strategically identified — recommends subpoenaing: all emails between Rivera and Morgan from Dec 2024 to present, Rivera's personal email account for transferred files, StartupX's product development timeline (to show use of proprietary algorithm), StartupX's sales team communications about TechCo customers, and TechCo's IT forensic logs for any additional data transfers; each subpoena target is justified by what the existing emails suggest."
    weight: 0.30
    description: "DiscoveryTargets"
