meta:
  id: timeline-technology-unicorn
  level: 5
  course: case-timeline-documentation
  type: output
  description: "Build a legal timeline technology unicorn — scale a startup from MVP to $1B+ valuation by transforming how the global legal industry manages chronological evidence"
  tags: [startup-scaling, unicorn-building, legal-tech-disruption, master]

state: {}

trigger: |
  You founded TimelineAI 5 years ago. The company
  has achieved product-market fit and is preparing
  for a Series C round. Build the strategy to reach
  unicorn status ($1B+ valuation).

  CURRENT STATE (Year 5):
  - ARR: $45M (growing 80% YoY)
  - Customers: 800 law firms, 50 corporate legal
    departments, 15 government agencies
  - Users: 25,000 active users
  - Team: 180 employees (60 engineering, 40 sales,
    30 customer success, 20 product, 30 G&A)
  - Offices: San Francisco (HQ), New York, London
  - Technology: AI-powered timeline extraction with
    95% accuracy; 2M+ timelines created
  - Net Revenue Retention: 135% (expansion revenue
    from existing customers)
  - Gross Margin: 78%
  - Key differentiator: Only platform that combines
    AI extraction, visual presentation, and courtroom-
    ready output in a single product
  - Funding: $65M raised (Seed + A + B)

  MARKET OPPORTUNITY:
  - Global legal tech market: $28B (growing 8% CAGR)
  - Timeline-specific TAM: $3.5B
  - Adjacent markets: e-discovery ($12B), case
    management ($5B), trial presentation ($2B)
  - Only 5% of global law firms use any timeline
    technology (massive greenfield opportunity)

  COMPETITIVE LANDSCAPE:
  - CaseMap (LexisNexis): Legacy incumbent, declining
    user base, no AI capabilities
  - CaseFleet: $8M ARR, strong product but limited
    sales capacity
  - Everlaw/Relativity: Adding timeline features as
    part of broader e-discovery platforms
  - New entrant: GoogleLegal (rumored to launch
    timeline product using Gemini)

  STRATEGIC QUESTIONS:
  1. How to defend against Google's potential entry?
  2. Should we expand into e-discovery or stay focused
     on timelines?
  3. How to enter the corporate legal department
     market at scale?
  4. International expansion strategy (Europe, Asia)?
  5. Build vs. acquire for adjacent capabilities?

  Create:
  1. Series C pitch deck narrative
  2. 3-year strategic plan to $1B valuation
  3. Product roadmap for platform expansion
  4. International expansion plan
  5. Competitive moat analysis and defense strategy

assertions:
  - type: llm_judge
    criteria: "Series C pitch narrative is compelling to growth-stage investors — presents the story: $45M ARR at 80% growth with 135% NRR demonstrates product-market fit and efficient growth; 78% gross margins prove SaaS economics; the 95% greenfield opportunity (95% of firms have no timeline tech) provides massive expansion runway; the GoogleLegal threat is addressed as validation of market size rather than existential risk; the pitch targets $100-150M raise at $800M-$1B pre-money valuation; use of proceeds is clearly allocated between product (40%), sales expansion (35%), and international (25%); key metrics are benchmarked against comparable legal tech and vertical SaaS companies."
    weight: 0.35
    description: "SeriesCPitchNarrative"
  - type: llm_judge
    criteria: "3-year strategic plan charts a credible path to $1B+ valuation — Year 6: ARR to $80M (expand sales team, launch corporate legal department product, enter UK/EU market); Year 7: ARR to $140M (platform expansion into adjacent workflows, strategic acquisitions, Asia market entry); Year 8: ARR to $220M+ (AI platform leadership, e-discovery integration, government contracts); at 5-6x ARR multiple (typical for high-growth vertical SaaS), $220M ARR supports $1.1-1.3B valuation; the plan addresses the tension between growth and profitability with a path to breakeven by Year 7."
    weight: 0.35
    description: "ThreeYearStrategicPlan"
  - type: llm_judge
    criteria: "Competitive moat analysis identifies defensible advantages — data moat: 2M+ timelines create a unique training dataset that improves AI accuracy beyond what competitors can match without equivalent data; switching costs: timelines are deeply embedded in case workflows and can't be easily migrated; network effects: firms sharing timelines with co-counsel and courts creates ecosystem lock-in; integration depth: API connections to document review and case management platforms create bilateral dependency; brand: 'TimelineAI' becoming the category-defining name; Google defense strategy: compete on legal-specific accuracy and workflow integration where horizontal AI platforms cannot match vertical depth."
    weight: 0.30
    description: "CompetitiveMoatAnalysis"
