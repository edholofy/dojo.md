meta:
  id: global-timeline-standards
  level: 5
  course: case-timeline-documentation
  type: output
  description: "Develop global standards for legal case timeline documentation — create an international framework for chronological evidence that works across common law, civil law, and Islamic legal systems"
  tags: [global-standards, international-framework, cross-system, master]

state: {}

trigger: |
  The International Bar Association (IBA) has
  commissioned you to develop the first global
  standard for legal case timeline documentation.

  SCOPE:
  The standard must work across:
  - Common law systems (US, UK, Canada, Australia,
    India, etc.)
  - Civil law systems (France, Germany, Japan, Brazil,
    etc.)
  - Islamic legal systems (Saudi Arabia, UAE, etc.)
  - Mixed systems (South Africa, Scotland, Louisiana,
    Quebec, etc.)
  - International tribunals (ICJ, ICC, WTO, ICSID,
    arbitration bodies)

  WORKING GROUP:
  - 40 members from 25 countries
  - Representatives from judiciary, private practice,
    academia, and legal technology
  - 3-year development timeline
  - Budget: $2M (funded by IBA + foundation grants)

  KEY CHALLENGES:
  1. Date Systems: Gregorian, Hijri (Islamic), Hebrew,
     Chinese lunar calendars in use across jurisdictions
  2. Procedural Differences: adversarial vs.
     inquisitorial systems have fundamentally different
     timeline structures
  3. Language: standard must be translatable into 6
     UN languages minimum
  4. Technology Access: ranges from courts with
     advanced e-filing to jurisdictions with
     paper-only records
  5. Cultural Norms: concepts of time, urgency, and
     procedural pace vary dramatically
  6. Privacy Laws: GDPR, data localization, varying
     disclosure requirements affect timeline sharing

  EXISTING STANDARDS TO HARMONIZE WITH:
  - IBA Rules on the Taking of Evidence (2020)
  - UNCITRAL Model Law on International Commercial
    Arbitration
  - Hague Convention on the Service of Abroad
  - Budapest Convention on Cybercrime (digital evidence)
  - ISO 8601 (date/time format)

  Create:
  1. Global standard framework document
  2. Implementation guidelines for each legal system
  3. Technology-neutral specification
  4. Adoption and compliance pathway
  5. Cultural sensitivity and inclusivity measures

assertions:
  - type: llm_judge
    criteria: "Global standard framework accommodates fundamental differences between legal systems — creates a core module (mandatory for all systems: event identification, date recording, source attribution, participant tracking) and optional modules tailored to system-specific needs (adversarial system module: discovery timeline, motion practice; inquisitorial system module: judicial investigation phases, expert appointment; arbitration module: procedural calendar, document exchange); the framework addresses calendar conversion (Gregorian/Hijri/Hebrew) using ISO 8601 as the internal standard with locale-specific display; privacy-compliant data sharing follows GDPR as the baseline with jurisdiction-specific overlay rules."
    weight: 0.35
    description: "GlobalStandardFramework"
  - type: llm_judge
    criteria: "Technology-neutral specification works from paper to AI — defines the standard in terms of data requirements and relationships rather than specific technology implementations; the specification includes a paper-based reference implementation (structured forms, manual chronology sheets) for jurisdictions without digital infrastructure; a spreadsheet implementation for basic digital adoption; and API specifications for advanced digital platforms; the specification uses a layered approach where each technology tier adds capability without breaking compatibility with lower tiers; interoperability between systems is achieved through a common data exchange format (XML/JSON schema)."
    weight: 0.35
    description: "TechnologyNeutralSpecification"
  - type: llm_judge
    criteria: "Adoption pathway is politically viable and practically achievable — uses a voluntary adoption model initially (similar to IBA evidence rules gaining soft-law status); the 3-year development process includes 6 consultative rounds across all regions; regional champion programs provide local advocates in each legal tradition; the pathway addresses institutional resistance (bar associations, judicial councils, law ministries) through demonstrated value in pilot programs; the $2M budget is allocated across research (30%), drafting (25%), consultation (25%), and pilot implementation (20%); success metrics include adoption by 50+ jurisdictions within 10 years."
    weight: 0.30
    description: "AdoptionPathway"
