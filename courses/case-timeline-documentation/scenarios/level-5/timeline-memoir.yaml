meta:
  id: timeline-memoir
  level: 5
  course: case-timeline-documentation
  type: output
  description: "Write a professional memoir reflecting on a career in legal timeline documentation — chronicle the evolution from paper chronologies to AI-powered platforms through the lens of landmark cases and professional growth"
  tags: [memoir, professional-reflection, career-narrative, master]

state: {}

trigger: |
  Write a professional memoir reflecting on a 35-year
  career in legal case timeline documentation.

  AUTHOR PROFILE:
  Sarah Nakamura — retiring after 35 years as one of
  the nation's premier litigation support specialists.
  Career spanning from paper-and-typewriter era to
  AI-powered legal technology.

  CAREER ARC:
  1989-1995: "The Paper Years"
  - Started as a legal secretary at a 10-attorney
    personal injury firm in Portland, Oregon
  - Taught herself timeline construction after a
    partner's case was nearly lost due to disorganized
    chronology
  - Built timelines by hand on poster board with
    sticky notes — partner won the case and credited
    her work
  - Rose to "case manager" — first such title at
    the firm
  - Key case: wrongful death case where her 12-foot
    poster-board timeline convinced a jury in a case
    the firm expected to lose

  1995-2005: "The Digital Revolution"
  - Moved to AmLaw 100 firm in San Francisco
  - Self-taught on CaseMap when it launched (1999)
  - Built the firm's first litigation support
    department (grew from 1 to 15 staff)
  - Testified as a chronology expert for the first
    time (antitrust case, 2003)
  - Key case: tobacco litigation — managed a timeline
    spanning 50 years with 10,000+ events from
    millions of documents

  2005-2015: "The Data Explosion"
  - E-discovery transformed the field; document
    volumes grew 1000x
  - Had to reinvent timeline methodology for digital-
    native evidence (email metadata, server logs,
    social media)
  - Published first article: "Timelines in the Age
    of Electronic Discovery" (Practical Litigator,
    2008)
  - Recruited to build timeline practice at a
    consulting firm
  - Key case: international banking fraud — timeline
    spanning 5 countries, 3 languages, 2 calendar
    systems, 500,000 documents

  2015-2024: "The AI Era"
  - Skeptical at first ("AI can't understand legal
    context"), then became an advocate
  - Led development of AI-assisted timeline platform
    used by 50+ firms
  - Wrote the book: "The Litigation Timeline" (ABA
    Publishing, 2020)
  - Awarded ABA's Legal Technology Innovation Prize
  - Key case: mass tort pharmaceutical litigation —
    8,500 plaintiff timelines managed through AI-
    assisted platform she helped design
  - Mentored 200+ young professionals, many now
    leading their own departments

  THEMES TO EXPLORE:
  1. How technology changed the craft without changing
     the fundamentals
  2. The tension between efficiency and thoroughness
  3. Finding meaning in work that's often invisible
  4. The human stories behind the legal timelines
  5. What's lost and gained in the digital transition

  Create:
  1. Memoir narrative (5,000-6,000 words)
  2. Key case studies woven into personal narrative
  3. Professional lessons and wisdom
  4. Reflection on the future of the profession
  5. Dedication and acknowledgments

assertions:
  - type: llm_judge
    criteria: "Memoir narrative weaves personal growth with professional evolution — tells Sarah's story from legal secretary to industry leader through specific cases and moments of transformation; the 12-foot poster-board timeline scene is vivid and establishes her core insight (chronology tells stories that arguments cannot); the tobacco litigation section explores the scale challenge and how it forced methodological innovation; the banking fraud case explores cross-cultural timeline challenges; the mass tort case shows how she embraced AI while maintaining craft values; the narrative voice is reflective, warm, and occasionally wry; it reads as genuine memoir, not professional biography."
    weight: 0.35
    description: "MemoirNarrative"
  - type: llm_judge
    criteria: "Professional lessons emerge organically from experience — themes include: (1) technology changes tools but not the fundamental skill of identifying what matters in a chronology; (2) the best timelines are built by people who understand both the legal issues and the human stories; (3) thoroughness is non-negotiable (the tobacco case taught that every missing event is a potential weakness); (4) mentorship multiplies impact (200+ mentees carry forward the craft); (5) invisibility is the paradox of litigation support — the best work is seamless and unnoticed; each lesson emerges from specific experiences rather than being stated as abstract principles."
    weight: 0.35
    description: "ProfessionalLessons"
  - type: llm_judge
    criteria: "Reflection on the profession's future balances optimism and concern — acknowledges that AI will transform timeline construction (her own mass tort platform proves this) but worries about loss of craft knowledge; identifies the risk that young professionals may trust AI-generated timelines without the foundational understanding to spot errors; reflects on deepfake and AI-fabrication challenges; ultimately expresses hope that the human elements of timeline work — judgment, empathy, narrative sense — will remain essential; the dedication to 'every paralegal who ever built a timeline on a Saturday night before trial' captures the spirit of the profession."
    weight: 0.30
    description: "FutureReflection"
