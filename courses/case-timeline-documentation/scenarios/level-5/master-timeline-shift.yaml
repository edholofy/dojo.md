meta:
  id: master-timeline-shift
  level: 5
  course: case-timeline-documentation
  type: output
  description: "Master shift simulation — address the highest-stakes challenges in legal timeline documentation including international tribunal evidence, systemic legal reform, technology disruption strategy, and legacy-defining professional contributions"
  tags: [shift-simulation, master-class, legacy-defining, master]

state: {}

trigger: |
  You are the world's foremost authority on legal
  case timeline documentation. Three unprecedented
  challenges arrive on the same day.

  CHALLENGE 1 — INTERNATIONAL CRIMINAL TRIBUNAL
  The International Criminal Court (ICC) at The Hague
  has appointed you as the lead timeline consultant
  for a war crimes prosecution. The case involves
  alleged ethnic cleansing in a fictional conflict.

  Facts:
  - Conflict period: 2020-2023 in "Region X"
  - 15,000+ civilian casualties alleged
  - 200+ villages affected
  - Accused: 3 military commanders + 2 political
    leaders
  - Evidence: 500,000 documents, 10,000 witness
    statements, satellite imagery, intercepted
    communications, social media evidence, mass
    grave forensic reports
  - Trial starts in 18 months

  Build the master prosecution timeline showing:
  - Command chain and order flow from political
    leaders to field commanders to units
  - Geographic progression of attacks across
    200+ villages
  - Temporal correlation between orders and attacks
  - Pattern evidence showing systematic (not random)
    targeting
  - Individual criminal responsibility for each
    accused

  CHALLENGE 2 — SUPREME COURT AMICUS BRIEF
  The US Supreme Court has granted cert in a case
  that will determine whether AI-generated timeline
  evidence is admissible in federal courts. You have
  been asked to file an amicus brief by the world's
  leading timeline professionals.

  Case: United States v. Algorithmic Evidence Corp.
  Question presented: "Whether timeline evidence
  generated by artificial intelligence systems,
  without independent human verification of each
  extracted event, satisfies the authentication
  requirements of Federal Rule of Evidence 901 and
  the reliability standards of Daubert v. Merrell
  Dow Pharmaceuticals."

  Your amicus must address:
  - Current state of AI timeline technology
  - Accuracy rates and error types
  - Comparison to human-generated timelines
  - Proposed standards for AI timeline admissibility
  - Impact on access to justice if AI timelines
    are excluded
  - Safeguards against AI fabrication

  CHALLENGE 3 — LEGACY PROJECT
  A $50M foundation has offered to fund your legacy
  project: "The Timeline Institute" — a permanent
  institution dedicated to advancing the science
  and practice of legal chronological evidence.

  Design the institute:
  - Mission and organizational structure
  - Research programs
  - Professional development center
  - Public service arm (access to justice)
  - International collaboration network
  - Endowment and sustainability model

  The institute will bear your name and shape
  the field for generations.

assertions:
  - type: llm_judge
    criteria: "ICC prosecution timeline demonstrates mastery of the most complex timeline challenge imaginable — organizes 500,000 documents and 10,000 witness statements into a coherent narrative proving systematic ethnic cleansing; the timeline uses multiple layers: command structure (who ordered what), geographic progression (mapping attacks across 200+ villages), temporal correlation (orders → attacks within specific time windows), pattern analysis (targeting criteria showing ethnic selectivity); individual criminal responsibility is traced for each accused through the command chain; the methodology draws on ICC precedents (Lubanga, Ntaganda) for timeline presentation standards; the timeline is designed for presentation over an 18-month trial with modular sections for different charges."
    weight: 0.35
    description: "ICCProsecutionTimeline"
  - type: llm_judge
    criteria: "Supreme Court amicus brief presents a nuanced position on AI timeline admissibility — avoids the extremes of 'exclude all AI evidence' and 'admit without safeguards'; proposes a framework: AI-generated timelines are admissible when (1) the AI system's methodology is disclosed and reproducible, (2) accuracy rates are established through validation studies, (3) a qualified human reviews the output and can testify to the review process, (4) opposing counsel has access to the AI system for testing, (5) the court applies a modified Daubert analysis tailored to AI evidence; the brief addresses the access-to-justice argument (excluding AI timelines disproportionately harms resource-limited litigants) while acknowledging fabrication risks; the analysis engages with FRE 901(b)(9) (process or system), Daubert's reliability factors, and emerging AI evidence scholarship."
    weight: 0.35
    description: "SupremeCourtAmicusBrief"
  - type: llm_judge
    criteria: "Timeline Institute design creates a lasting institutional legacy — the $50M endowment (assuming 5% annual distribution = $2.5M/year) supports: a research program with 5 funded projects annually, a professional development center offering certification and continuing education, a public service arm providing free timeline services to legal aid organizations and pro bono cases, and an international collaboration network connecting timeline professionals across 50+ countries; the organizational structure includes an academic director, practice director, technology director, and public interest director; advisory board includes judges, academics, practitioners, and legal tech leaders; sustainability plan includes earned revenue from certification fees, consulting, and publications to supplement endowment income; the institute's mission connects timeline excellence to justice system improvement."
    weight: 0.30
    description: "TimelineInstituteLegacy"
