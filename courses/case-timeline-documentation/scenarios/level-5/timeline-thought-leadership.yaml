meta:
  id: timeline-thought-leadership
  level: 5
  course: case-timeline-documentation
  type: output
  description: "Establish thought leadership in legal timeline methodology — publish groundbreaking research, influence professional standards, and shape the future of chronological evidence in the legal profession"
  tags: [thought-leadership, industry-influence, professional-standards, master]

state: {}

trigger: |
  You are recognized as the world's leading authority
  on legal case timeline documentation. You have
  been invited to deliver the keynote address at the
  American Bar Association's Annual Meeting on "The
  Future of Chronological Evidence in Law."

  KEYNOTE REQUIREMENTS:
  Your address must cover:

  1. The Historical Evolution of Timelines in Law:
  - From handwritten chronologies in 19th century
    trials to AI-powered timeline platforms
  - Key inflection points: photocopier (1960s),
    personal computer (1980s), internet/email
    (1990s), e-discovery (2000s), AI/ML (2020s)
  - How each technology shift changed timeline
    methodology

  2. The Current Crisis in Timeline Practice:
  - 23% of malpractice claims involve deadline
    management failures
  - Only 15% of attorneys use professional timeline
    tools
  - Jury research shows 65% information retention
    with visual timelines vs. 10% with verbal
    testimony alone
  - No uniform professional standards exist
  - Law schools don't teach timeline methodology

  3. A Vision for the Next Decade:
  - AI-native timeline platforms that learn from
    case outcomes
  - Real-time collaborative timeline editing during
    depositions and hearings
  - Predictive analytics: using timeline patterns
    to forecast case outcomes
  - Virtual/AR courtroom timeline presentation
  - Blockchain-verified timeline evidence
  - Global timeline standards across legal systems

  4. A Call to Action:
  - Propose specific changes to legal education,
    bar standards, and professional development
  - Address the ethical implications of AI in
    timeline creation
  - Challenge the profession to adopt evidence-based
    timeline practices

  Create:
  1. Complete keynote address (3,000-4,000 words)
  2. Supporting research and data citations
  3. Audience engagement strategy
  4. Post-keynote action plan for the ABA
  5. Media strategy for amplifying the message

assertions:
  - type: llm_judge
    criteria: "Keynote address is compelling and substantive — presents a clear narrative arc from historical evolution through current crisis to future vision and call to action; uses specific data points (23% malpractice claims, 65% vs. 10% retention rates, 15% tool adoption) to establish urgency; the vision for the next decade is both ambitious and grounded in current technological capabilities; the address balances technical depth with accessible language appropriate for a mixed audience of attorneys, judges, and legal tech professionals; it would be genuinely influential if delivered at an ABA meeting."
    weight: 0.35
    description: "KeynoteAddress"
  - type: llm_judge
    criteria: "Call to action proposes specific, implementable changes — recommends: (1) ABA adopt model timeline standards as part of litigation practice guidelines; (2) law school accreditation require timeline methodology in curriculum; (3) CLE boards create mandatory timeline documentation credits; (4) bar associations develop timeline certification programs; (5) courts adopt uniform timeline exhibit standards; (6) ethics opinions address AI-assisted timeline creation; each proposal includes implementation pathway, responsible parties, and realistic timeline; the call to action is ambitious but achievable."
    weight: 0.35
    description: "CallToAction"
  - type: llm_judge
    criteria: "Media strategy amplifies the keynote's impact — pre-event strategy includes advance copies to legal media (National Law Journal, ABA Journal, Law.com), social media teasers, and outreach to legal tech influencers; during-event strategy includes live-tweeting, LinkedIn posting, and video recording; post-event strategy includes op-ed placement in major legal publications, podcast interviews, webinar series expanding on keynote themes, and white paper distribution; the strategy targets both the legal profession audience and mainstream media (NYT, WSJ business section) for broader impact on public understanding of legal technology."
    weight: 0.30
    description: "MediaStrategy"
