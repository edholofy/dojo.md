meta:
  id: class-action-timeline
  level: 2
  course: case-timeline-documentation
  type: output
  description: "Build a class action procedural timeline — track class certification, notice, discovery, settlement negotiations, and fairness hearing deadlines in a consumer class action"
  tags: [class-action, certification, settlement, intermediate]

state: {}

trigger: |
  Create a procedural timeline for a consumer
  class action against a data breach defendant.

  CASE: Johnson v. DataSafe Corp.
  Court: U.S. District Court, Northern District
  of Illinois
  Claim: Negligence, breach of contract, state
  consumer protection act violations arising from
  a data breach exposing 4.5 million customers'
  personal and financial information

  TIMELINE OF EVENTS:

  Data Breach Events:
  - Mar 2024: Hackers access DataSafe's customer
    database through unpatched server vulnerability
  - Apr 15, 2024: DataSafe discovers breach during
    routine security audit
  - May 1, 2024: DataSafe notifies affected customers
    (47 days after discovery; state law requires
    notification within 30 days)
  - May 5, 2024: DataSafe offers 1 year free credit
    monitoring to affected customers
  - Jun-Aug 2024: Reports of identity theft and
    fraudulent charges from affected customers

  Litigation Timeline:
  - Jun 1, 2024: First lawsuit filed (Johnson v.
    DataSafe)
  - Jun-Jul 2024: 12 additional related lawsuits
    filed in 6 different districts
  - Aug 15, 2024: JPML transfers and consolidates
    all cases to N.D. Illinois (MDL No. 3XXX)
  - Sep 1, 2024: Lead counsel appointed (3-firm
    consortium)
  - Oct 1, 2024: Consolidated Amended Complaint filed
  - Nov 15, 2024: DataSafe files Motion to Dismiss
    (argues lack of standing — no actual harm)
  - Jan 15, 2025: Court denies MTD — finds alleged
    identity theft constitutes Article III injury
  - Feb 1, 2025: Answer filed; discovery begins
  - Apr 1, 2025: Plaintiffs move for class
    certification under Rule 23(b)(3)
  - Jun 1, 2025: DataSafe opposes certification
    (argues individual issues predominate — varying
    state laws, different types of data exposed,
    different injuries)
  - Aug 1, 2025: Court grants certification;
    defines class as "all US persons whose data was
    compromised in the March 2024 DataSafe breach"
  - Sep 1, 2025: Class notice distributed via email
    and publication
  - Oct 1, 2025: Opt-out deadline (60 days from
    notice)
  - Nov 2025: Mediation ordered; parties select
    former federal judge as mediator
  - Dec 2025: Settlement reached: $85M fund (approx
    $18.89 per class member), 3 years credit
    monitoring, DataSafe agrees to security upgrades
  - Jan 2026: Preliminary approval hearing
  - Mar 2026: Fairness hearing (Final approval) set

  Create:
  1. Complete litigation procedural timeline
  2. Class certification analysis timeline
  3. Settlement timeline and fairness analysis
  4. Key deadlines tracker
  5. MDL coordination timeline

assertions:
  - type: llm_judge
    criteria: "Class certification analysis timeline documents Rule 23 requirements — tracks how plaintiffs established numerosity (4.5M affected), commonality (same breach, same security failures), typicality (named plaintiff suffered same type of harm), and adequacy (lead counsel consortium); the predominance analysis addresses DataSafe's argument about varying state laws and different injury types; the timeline shows how the court resolved these issues and defined the class to satisfy Rule 23(b)(3)."
    weight: 0.35
    description: "ClassCertificationTimeline"
  - type: llm_judge
    criteria: "Settlement timeline evaluates fairness factors — the $85M settlement represents approximately $18.89 per class member; the timeline assesses this against the strength of the claims, the risks of continued litigation, DataSafe's ability to pay, and the cost of administration; the 3-year credit monitoring and security upgrades add non-monetary value; the timeline tracks the preliminary approval → notice → opt-out → objection → final approval sequence required by Rule 23(e); attorney fee allocation from the fund is flagged."
    weight: 0.35
    description: "SettlementFairnessTimeline"
  - type: llm_judge
    criteria: "MDL coordination timeline tracks the consolidation process — 13 cases filed in 6 districts were transferred by JPML to N.D. Illinois; the timeline shows the efficiency gains from consolidation (unified discovery, single motion practice, coordinated settlement); the lead counsel appointment process and consolidated complaint filing are documented; the timeline notes that individual cases retain their separate identities for purposes that may require remand post-settlement; the late notification (47 vs 30 days required) is flagged as a statutory violation supporting the claims."
    weight: 0.30
    description: "MDLCoordinationTimeline"
