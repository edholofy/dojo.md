meta:
  id: intermediate-timeline-shift
  level: 2
  course: case-timeline-documentation
  type: output
  description: "Intermediate shift simulation — handle complex timeline tasks requiring multi-party analysis, regulatory compliance tracking, and cross-referencing evidence across different case types simultaneously"
  tags: [shift-simulation, multi-case, cross-referencing, intermediate]

state: {}

trigger: |
  You are a senior paralegal managing timelines
  for three active cases heading to critical
  deadlines. The partner needs updated timelines
  for a strategy meeting tomorrow morning.

  CASE 1 — COMMERCIAL LEASE DISPUTE
  Landlord: Metro Properties LLC
  Tenant: TechStart Inc. (our client)
  Issue: Landlord claims tenant breached lease;
  tenant claims constructive eviction

  Events:
  - Jan 2023: 5-year lease signed; $15,000/month;
    landlord responsible for HVAC maintenance
  - Apr 2023: HVAC system fails; tenant reports to
    landlord
  - May 2023: Landlord sends repair crew; temporary
    fix only
  - Jul 2023: HVAC fails again; office temperature
    exceeds 90°F for 3 consecutive days
  - Jul 2023: Tenant sends written notice per lease
    Section 12.3 requiring repair within 30 days
  - Aug 2023: Landlord fails to repair; sends email
    "parts are on backorder"
  - Sep 2023: Tenant withholds rent citing
    uninhabitable conditions; moves 10 employees
    to co-working space ($8,000/month)
  - Oct 2023: Landlord serves 3-day notice to pay
    or quit
  - Nov 2023: Landlord files unlawful detainer
  - Dec 2023: Tenant cross-complains for constructive
    eviction and breach of lease
  Timeline should show landlord breached first.

  CASE 2 — WRONGFUL DEATH / AUTO ACCIDENT
  Decedent: Maria Santos, age 34
  Defendant: DriveCo Logistics (employer of driver)
  Driver: Kevin Wright (employee, driving company van)

  Events:
  - Oct 5, 2024, 6:15 PM: Wright driving DriveCo
    van; runs red light at Main & 5th intersection
  - Collision with Santos' vehicle; Santos transported
    to trauma center
  - Oct 5, 2024, 9:30 PM: Santos dies from injuries
  - Oct 7, 2024: Police report — Wright cited for
    running red light; toxicology pending
  - Oct 20, 2024: Toxicology results — Wright tested
    positive for amphetamines
  - Nov 1, 2024: Discovery that Wright's CDL was
    suspended 6 months prior for DUI
  - Nov 5, 2024: DriveCo's HR file shows they never
    checked Wright's driving record after initial hire
  - Nov 15, 2024: Santos' husband retains our firm
  - Dec 1, 2024: Demand letter sent to DriveCo and
    its insurer
  - Dec 15, 2024: DriveCo's insurer offers $500K
    policy limits; DriveCo has $5M umbrella policy
    with different carrier

  Timeline should support negligent hiring/retention
  and respondeat superior theories.

  CASE 3 — PARTNERSHIP DISSOLUTION
  Partners: Alex Kim (40%), Jordan Lee (35%),
  Sam Patel (25%)
  Business: Digital marketing agency, $3M annual
  revenue

  Events:
  - 2020: Partnership formed; partnership agreement
    requires unanimous consent for expenditures
    over $50,000
  - Jan 2024: Kim discovers Lee has been diverting
    client payments to personal account ($175,000
    over 18 months)
  - Feb 2024: Kim confronts Lee; Lee denies, then
    admits to "borrowing" funds temporarily
  - Mar 2024: Kim and Patel vote to expel Lee per
    partnership agreement Section 8.2
  - Apr 2024: Lee refuses to leave; claims expulsion
    was improper because no written notice given
  - May 2024: Kim files for judicial dissolution
  - Jun 2024: Court appoints receiver to manage
    partnership pending dissolution
  - Jul 2024: Forensic accountant finds additional
    $95,000 in unauthorized expenditures by Lee
  - Aug 2024: Lee files counterclaim alleging Kim
    and Patel conspired to squeeze him out

  Timeline should document Lee's breaches and
  the proper dissolution procedure.

assertions:
  - type: llm_judge
    criteria: "Commercial lease timeline establishes landlord's prior breach — clearly documents the sequence: HVAC failure (Apr 2023) → inadequate repair (May) → second failure (Jul) → proper tenant notice under Section 12.3 (Jul) → landlord's 30-day cure period expires without repair (Aug) → tenant's rent withholding justified by constructive eviction (Sep); the landlord's unlawful detainer action (Nov) is contextualized as retaliatory given the landlord's own prior breach; the $8,000/month co-working costs quantify mitigation damages."
    weight: 0.35
    description: "ConstructiveEvictionTimeline"
  - type: llm_judge
    criteria: "Wrongful death timeline supports both liability theories — respondeat superior: Wright was acting within scope of employment at time of accident; negligent hiring/retention: DriveCo never checked Wright's driving record after initial hire, his CDL was suspended for DUI 6 months prior, and he tested positive for amphetamines; the timeline shows DriveCo had constructive knowledge of Wright's dangerous driving history and failed to act; punitive damages are supported by the employer's willful failure to monitor employee driving records."
    weight: 0.35
    description: "NegligentHiringTimeline"
  - type: llm_judge
    criteria: "Partnership dissolution timeline documents fiduciary breach and procedural compliance — Lee's diversion of $175,000 plus $95,000 in unauthorized expenditures constitutes breach of fiduciary duty and violation of the unanimous consent provision; the expulsion procedure under Section 8.2 is tracked step-by-step; Lee's counterclaim about improper notice is addressed by examining whether the partnership agreement's notice requirements were satisfied; the court-appointed receiver and forensic accounting establish the scope of Lee's breaches."
    weight: 0.30
    description: "PartnershipDissolutionTimeline"
