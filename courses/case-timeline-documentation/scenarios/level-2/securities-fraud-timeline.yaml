meta:
  id: securities-fraud-timeline
  level: 2
  course: case-timeline-documentation
  type: output
  description: "Create a securities fraud timeline — track stock price movements, insider trading windows, public disclosures, and SEC filing dates to establish the fraud timeline in a securities class action"
  tags: [securities-fraud, insider-trading, sec-filings, intermediate]

state: {}

trigger: |
  Create a securities fraud timeline for a class
  action lawsuit against TechVision Corp.

  CASE: In re TechVision Corp. Securities Litigation
  Allegation: Material misrepresentation of revenue
  through channel stuffing

  CLASS PERIOD: Jan 1, 2024 — Sep 15, 2024

  EVENTS:
  - Jan 15, 2024: TechVision files 10-K reporting
    $2.1B revenue for FY2023 (30% YoY growth);
    stock price: $85
  - Feb 5, 2024: CEO Jane Foster sells 200,000 shares
    at $92 through 10b5-1 plan (plan adopted Nov 2023)
  - Mar 1, 2024: Q4 2023 earnings call — CEO states
    "Our growth is organic and sustainable. Our channel
    partners are seeing unprecedented demand."
  - Mar 15, 2024: CFO Mark Davis sells 150,000 shares
    at $95 (NO 10b5-1 plan in place)
  - Apr 10, 2024: Company issues Q1 2024 guidance —
    projects 25% revenue growth; stock hits $105
  - May 12, 2024: Former sales director (whistleblower)
    emails SEC alleging company is stuffing channels
    by offering extended payment terms and guaranteed
    returns to distributors
  - Jun 1, 2024: TechVision files 10-Q; reports Q1
    revenue of $580M (28% growth); accounts receivable
    up 65% — analysts express concern
  - Jul 15, 2024: Analyst report from Goldman publishes
    "TechVision: Too Good to Be True?" questioning
    revenue quality; stock drops to $88
  - Aug 5, 2024: SEC sends informal inquiry letter
    to TechVision regarding revenue recognition
  - Aug 20, 2024: Board forms Special Committee to
    investigate revenue recognition practices
  - Sep 15, 2024: TechVision announces restatement
    of Q4 2023 and Q1 2024 revenue; reduces reported
    revenue by $340M; stock crashes to $32
  - Oct 1, 2024: Multiple class action lawsuits filed
  - Nov 15, 2024: SEC files formal enforcement action

  Create:
  1. Securities fraud timeline with stock price overlay
  2. Insider trading analysis
  3. Scienter evidence timeline
  4. Loss causation analysis
  5. Class period definition support

assertions:
  - type: llm_judge
    criteria: "Insider trading analysis flags suspicious sales — the CFO's March 15 sale of 150,000 shares at $95 without a 10b5-1 plan is the strongest scienter evidence; this sale occurred 2 months before the whistleblower complaint and while the CFO presumably knew about channel stuffing; the CEO's February sale through a pre-existing 10b5-1 plan is less suspicious but the plan's timing (adopted Nov 2023) near the end of the alleged fraud period warrants scrutiny; both sales are before the stock's decline."
    weight: 0.35
    description: "InsiderTradingAnalysis"
  - type: llm_judge
    criteria: "Scienter evidence timeline builds a compelling inference of fraudulent intent — the timeline connects: CEO's affirmative statement about 'organic' growth (Mar 1) while channel stuffing was occurring; CFO's stock sale without 10b5-1 plan (Mar 15); optimistic forward guidance (Apr 10); dramatically inflated accounts receivable (Jun 1, up 65%); the restatement proving the statements were false when made; each event adds to the cumulative weight of scienter evidence required under the PSLRA."
    weight: 0.35
    description: "ScienterEvidenceTimeline"
  - type: llm_judge
    criteria: "Loss causation analysis connects corrective disclosures to stock price drops — identifies two potential corrective disclosures: the Goldman analyst report (Jul 15, stock drops from ~$105 to $88) and the restatement announcement (Sep 15, stock crashes from ~$88 to $32); the timeline supports class period from Jan 1 (first fraudulent 10-K) to Sep 15 (full corrective disclosure); total class period losses and price impact at each disclosure event are documented for damages calculation."
    weight: 0.30
    description: "LossCausationAnalysis"
