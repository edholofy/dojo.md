meta:
  id: environmental-contamination-timeline
  level: 2
  course: case-timeline-documentation
  type: output
  description: "Create an environmental contamination timeline — track contamination events, regulatory notices, remediation activities, and responsible party identification for a CERCLA/Superfund site"
  tags: [environmental-law, cercla-superfund, contamination, intermediate]

state: {}

trigger: |
  Create a contamination timeline for a former
  industrial site with multiple potentially
  responsible parties (PRPs).

  SITE: Former Victory Chemical Works, 25-acre
  industrial site, River City, State

  SITE HISTORY:
  - 1955-1985: Victory Chemical Works operates
    chemical manufacturing facility; produces
    industrial solvents and degreasers
  - 1970: Clean Water Act enacted; Victory applies
    for NPDES discharge permit
  - 1972: State inspectors find improper waste
    disposal — drums buried on-site; Victory fined
    $5,000
  - 1978: RCRA enacted; Victory applies for hazardous
    waste permit
  - 1980: CERCLA (Superfund) enacted
  - 1985: Victory Chemical closes; property sold to
    River City Development Corp. for $500,000
  - 1986-1995: River City Development uses site for
    warehousing; unaware of subsurface contamination
  - 1990: Residential subdivision "Oak Park" built
    adjacent to site
  - 1995: River City Development sells to current
    owner Metro Industrial LLC for $2.1M
  - 1998: Oak Park residents complain about chemical
    odors from groundwater
  - 2000: State EPA tests monitoring wells; finds
    TCE (trichloroethylene) at 50x safe drinking
    water levels
  - 2001: EPA places site on National Priorities List
    (NPL) — Superfund site designation
  - 2003: EPA issues General Notice Letters to PRPs:
    Victory Chemical (dissolved), River City
    Development, Metro Industrial LLC
  - 2005: EPA conducts Remedial Investigation/
    Feasibility Study (RI/FS)
  - 2007: EPA issues Record of Decision (ROD) —
    selected remedy: soil excavation, groundwater
    pump-and-treat; estimated cost: $45M
  - 2008: EPA orders Metro Industrial to begin
    remediation as current owner
  - 2010: Metro Industrial files contribution action
    against River City Development and Victory
    Chemical's successor
  - 2012: Groundwater plume found to have migrated
    under Oak Park subdivision
  - 2015: Oak Park homeowners file toxic tort lawsuit
    against all PRPs
  - 2020: Remediation ongoing; costs to date: $28M
  - 2024: Five-year review shows TCE levels decreasing
    but still above cleanup standards

  Create:
  1. Site history and contamination origin timeline
  2. Regulatory action and PRP identification timeline
  3. Remediation progress timeline
  4. CERCLA liability analysis for each PRP
  5. Statute of limitations analysis for tort claims

assertions:
  - type: llm_judge
    criteria: "CERCLA liability analysis maps each PRP to their basis of liability — Victory Chemical as operator/generator (Section 107(a)(1)-(3)) even though dissolved; River City Development as past owner during period of disposal (if contamination continued to migrate, the drums remained on-site constituting 'disposal'); Metro Industrial as current owner (strict liability regardless of knowledge); the timeline documents each party's connection to the contamination and their potential defenses (innocent purchaser for Metro, intervening acts for River City)."
    weight: 0.35
    description: "CERCLALiabilityAnalysis"
  - type: llm_judge
    criteria: "Regulatory action timeline shows the progression from discovery to enforcement — residential complaints (1998) → state testing (2000) → NPL listing (2001) → General Notice Letters (2003) → RI/FS (2005) → ROD (2007) → remediation order (2008); each step is annotated with the statutory authority and procedural requirements; the 7-year gap between complaint and ROD illustrates typical CERCLA timelines; the 2024 five-year review requirement under NCP Section 300.430(f)(4)(ii) is tracked."
    weight: 0.35
    description: "RegulatoryActionTimeline"
  - type: llm_judge
    criteria: "Tort statute of limitations analysis uses the timeline to determine when claims accrued — residential complaints began in 1998 but the contamination wasn't confirmed until 2000; the groundwater plume migration under Oak Park wasn't discovered until 2012; the timeline applies the discovery rule to determine when each plaintiff's claim accrued; different statute of limitations periods for personal injury vs. property damage claims are analyzed; the 2015 lawsuit is assessed for timeliness based on when plaintiffs knew or should have known of the contamination."
    weight: 0.30
    description: "TortStatuteOfLimitations"
