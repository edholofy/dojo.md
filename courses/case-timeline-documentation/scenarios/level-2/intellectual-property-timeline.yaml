meta:
  id: intellectual-property-timeline
  level: 2
  course: case-timeline-documentation
  type: output
  description: "Build an intellectual property litigation timeline — track patent prosecution history, prior art dates, infringement timeline, and damages period for a patent infringement case"
  tags: [intellectual-property, patent-litigation, prior-art, intermediate]

state: {}

trigger: |
  Create a patent infringement timeline for a
  pharmaceutical patent dispute.

  CASE: PharmaCo Inc. v. GenericDrug Corp.
  Patent: US Patent No. 9,XXX,XXX — "Extended-
  release formulation of Medication X"

  PATENT PROSECUTION TIMELINE:
  - Jun 15, 2015: Provisional patent application filed
  - Jun 14, 2016: Non-provisional application filed
    (claims priority from provisional)
  - Mar 2017: First Office Action — Examiner rejects
    claims as obvious over prior art (Smith 2010,
    Jones 2012)
  - Jun 2017: PharmaCo amends claims; narrows to
    specific polymer matrix and release profile
  - Sep 2017: Examiner allows amended claims
  - Dec 5, 2017: Patent issues (20-year term from
    non-provisional filing = expires Jun 14, 2036)

  FDA REGULATORY TIMELINE:
  - Jan 2016: PharmaCo submits NDA for Medication X
  - Nov 2016: FDA approves Medication X; PharmaCo
    begins sales
  - Jan 2018: PharmaCo lists patent in Orange Book
  - Aug 2023: GenericDrug files ANDA with Paragraph IV
    certification
  - Sep 2023: GenericDrug notifies PharmaCo of ANDA
    filing (as required)
  - Oct 2023: PharmaCo files patent infringement suit
    (45-day deadline)
  - Oct 2023: 30-month stay triggered — FDA cannot
    approve ANDA until Apr 2026 (absent court ruling)

  LITIGATION TIMELINE:
  - Oct 2023: Complaint filed
  - Jan 2024: GenericDrug answers; asserts invalidity
    (obviousness, anticipation) and non-infringement
  - Mar 2024: Markman hearing on claim construction
  - Jun 2024: Court construes key claim term "extended
    release" — favors PharmaCo's narrow interpretation
  - Sep 2024: Expert discovery — GenericDrug's expert
    identifies new prior art (Chen 2014 publication)
  - Dec 2024: PharmaCo's expert opines GenericDrug's
    formulation falls within claim scope
  - Mar 2025: Trial date set

  Medication X annual sales: $1.8 billion

  Create:
  1. Complete patent prosecution timeline
  2. Hatch-Waxman regulatory timeline
  3. Litigation milestone timeline
  4. Prior art landscape timeline
  5. Damages period calculation

assertions:
  - type: llm_judge
    criteria: "Hatch-Waxman regulatory timeline correctly tracks the ANDA process — GenericDrug's Paragraph IV certification (Aug 2023) is the act of infringement; PharmaCo's suit within 45 days triggered the 30-month stay preventing FDA approval until April 2026; the timeline shows how the regulatory framework and patent litigation intersect; Orange Book listing, ANDA filing, notification, and suit filing are all connected to their statutory deadlines and consequences."
    weight: 0.35
    description: "HatchWaxmanTimeline"
  - type: llm_judge
    criteria: "Prior art landscape timeline organizes the invalidity defense chronologically — Smith 2010 and Jones 2012 were already considered during prosecution and overcome by claim amendments; Chen 2014 is newly discovered prior art not before the examiner; the timeline shows that Chen 2014 was published after the provisional filing (Jun 2015) but could be prior art depending on its effective date; the prosecution history estoppel from the 2017 amendments may limit PharmaCo's ability to assert broad claim scope."
    weight: 0.35
    description: "PriorArtLandscape"
  - type: llm_judge
    criteria: "Damages period calculation uses the timeline to establish the revenue at risk — the patent expires Jun 14, 2036; with $1.8B annual sales, the remaining patent life represents significant damages; the timeline identifies when generic entry would have occurred absent the patent (after FDA approval); the 30-month stay, trial date, and potential settlement all affect the damages calculation; the Markman ruling favoring PharmaCo's claim construction strengthens the infringement case."
    weight: 0.30
    description: "DamagesPeriodCalculation"
