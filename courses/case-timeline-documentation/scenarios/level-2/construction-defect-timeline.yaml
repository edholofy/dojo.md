meta:
  id: construction-defect-timeline
  level: 2
  course: case-timeline-documentation
  type: output
  description: "Create a construction defect timeline — track design, permitting, construction phases, inspections, defect discovery, and repair history for a construction defect lawsuit"
  tags: [construction-defect, building-inspection, warranty-claims, intermediate]

state: {}

trigger: |
  Create a construction defect timeline for a
  residential subdivision with widespread water
  intrusion problems.

  PROJECT: Sunrise Estates, 48-unit townhome
  development
  Developer: Pinnacle Development LLC
  General Contractor: Atlas Construction Inc.
  Architect: Modern Design Associates

  SUBCONTRACTORS:
  - Waterproofing: DrySeal Inc.
  - Roofing: TopCover Roofing LLC
  - Windows: ClearView Window Installation

  TIMELINE:
  Phase 1 — Design & Permitting:
  - Jan 2020: Architect submits plans to city
  - Mar 2020: City issues building permits
  - Apr 2020: Architect specifies waterproofing system
    (Brand X membrane) in specs

  Phase 2 — Construction:
  - May 2020: Construction begins
  - Aug 2020: DrySeal substitutes cheaper Brand Y
    membrane without architect approval (saves $45,000)
  - Sep 2020: City inspector notes "waterproofing
    appears adequate" during framing inspection
  - Nov 2020: TopCover installs roofing; 3 of 48 units
    have flashing that doesn't meet manufacturer specs
  - Jan 2021: ClearView installs windows; architect
    later finds 12 units have improper sealant
    application
  - Mar 2021: Final inspection passed; certificates
    of occupancy issued

  Phase 3 — Homeowner Complaints:
  - Jun 2021: First homeowner (Unit 7) reports water
    stain on ceiling after heavy rain
  - Sep 2021: 4 more units report water intrusion
  - Dec 2021: HOA hires independent inspector; finds
    systemic waterproofing failures in 22 of 48 units
  - Feb 2022: HOA sends notice of defect to developer
  - Mar 2022: Developer sends repair crew; patches
    visible damage only (cosmetic fix)
  - Jun 2022: Water problems return in patched units
    plus 8 new units affected
  - Sep 2022: HOA retains construction defect attorney
  - Jan 2023: Expert inspection reveals: (a) wrong
    waterproofing membrane, (b) improper flashing,
    (c) window sealant failures, (d) mold in 15 units
  - Apr 2023: HOA files lawsuit against developer, GC,
    architect, and all 3 subcontractors
  - Estimated repair cost: $3.2 million

  Create:
  1. Construction phase timeline with defect origins
  2. Notice and repair timeline (for statute of
     limitations and right-to-repair analysis)
  3. Multi-party responsibility matrix
  4. Defect propagation timeline (how defects spread)
  5. Damages chronology

assertions:
  - type: llm_judge
    criteria: "Construction phase timeline identifies defect origins at each stage — the unauthorized material substitution by DrySeal (Aug 2020) is the primary cause; TopCover's non-conforming flashing (Nov 2020) and ClearView's improper sealant (Jan 2021) are contributing factors; the city inspector's cursory review (Sep 2020) and architect's failure to catch the substitution during construction administration are noted; each defect origin is traceable to a specific party and construction phase."
    weight: 0.35
    description: "DefectOriginTracking"
  - type: llm_judge
    criteria: "Notice and repair timeline supports statute of limitations and right-to-repair analysis — first complaint (Jun 2021) starts the discovery clock; HOA formal notice (Feb 2022) triggers right-to-repair obligations; developer's cosmetic-only repair (Mar 2022) may constitute inadequate repair under right-to-repair statutes; the 10-year statute of repose runs from certificate of occupancy (Mar 2021); the timeline tracks each notice and repair attempt to preserve all legal claims."
    weight: 0.35
    description: "NoticeAndRepairTimeline"
  - type: llm_judge
    criteria: "Multi-party responsibility matrix maps each defect to responsible parties — DrySeal bears primary responsibility for waterproofing failure (unauthorized substitution); TopCover for flashing defects; ClearView for window sealant; Atlas Construction for failing to supervise subcontractor work and catch the substitution; Modern Design for inadequate construction administration; Pinnacle Development for overall project responsibility and inadequate repair response; the matrix quantifies each party's proportional contribution to the $3.2M in damages."
    weight: 0.30
    description: "MultiPartyResponsibilityMatrix"
