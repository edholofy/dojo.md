meta:
  id: multi-party-accident-timeline
  level: 2
  course: case-timeline-documentation
  type: output
  description: "Build a multi-party accident timeline — track multiple vehicles, witnesses, emergency responders, and insurance claims in a complex intersection collision with disputed fault"
  tags: [multi-party, accident-reconstruction, fault-analysis, intermediate]

state: {}

trigger: |
  Create a multi-party accident timeline for a
  four-vehicle chain reaction collision.

  INCIDENT: Highway 101, Mile Marker 47
  Date: October 15, 2024, 5:45 PM (dusk, light rain)

  VEHICLES AND DRIVERS:
  - Vehicle A: Sarah Chen (2022 Tesla Model 3)
  - Vehicle B: Robert Williams (2019 Ford F-150)
  - Vehicle C: Maria Garcia (2021 Honda Civic)
  - Vehicle D: TruckCo Inc. (2020 Freightliner,
    driver: Jake Thompson, commercial vehicle)

  SEQUENCE OF EVENTS:
  5:42 PM: Vehicle D (semi-truck) traveling 62 mph
    in a 55 mph zone per GPS data
  5:43 PM: Vehicle A brakes suddenly for debris
    in road
  5:43:15 PM: Vehicle B rear-ends Vehicle A; Vehicle
    B driver was looking at phone (cell records show
    text sent at 5:43 PM)
  5:43:20 PM: Vehicle C swerves to avoid collision,
    strikes median barrier, rebounds into traffic
  5:43:25 PM: Vehicle D unable to stop in time;
    jackknifes, striking Vehicle C and Vehicle B

  WITNESS STATEMENTS:
  - Witness 1 (following Vehicle D): "The truck was
    going way too fast for the rain. He never even
    tried to brake until the last second."
  - Witness 2 (opposite direction): "I saw the Tesla
    brake hard, then everything happened fast. The
    pickup definitely hit the Tesla first."
  - Witness 3 (passenger in Vehicle C): "We had no
    chance. The truck pushed us into the wall."

  INJURIES:
  - Sarah Chen: Whiplash, concussion (ER visit)
  - Robert Williams: Broken wrist (surgery required)
  - Maria Garcia: T12 vertebra fracture, spinal cord
    injury (permanent disability)
  - Jake Thompson: Minor bruising

  EVIDENCE:
  - Tesla dashcam footage (Vehicles A perspective)
  - Truck GPS and electronic logging device (ELD) data
  - Cell phone records for Robert Williams
  - Highway patrol accident report
  - Weather service data: light rain, 52°F, visibility
    reduced to 0.5 miles
  - Skid mark analysis by accident reconstructionist

  Create:
  1. Second-by-second collision timeline
  2. Multi-party fault analysis timeline
  3. Evidence correlation matrix
  4. Insurance claim tracking for all parties
  5. Comparative negligence assessment

assertions:
  - type: llm_judge
    criteria: "Second-by-second timeline precisely reconstructs the collision chain — maps the 45-second window from Vehicle D speeding (5:42) through Vehicle A braking, Vehicle B distracted driving rear-end, Vehicle C evasive maneuver, to Vehicle D jackknife; each event is timestamped with supporting evidence (GPS for speed, cell records for distraction, dashcam for sequence, skid marks for braking); the timeline enables accident reconstruction analysis."
    weight: 0.35
    description: "CollisionChainReconstruction"
  - type: llm_judge
    criteria: "Multi-party fault analysis uses timeline to assess comparative negligence — Vehicle B's texting while driving is documented via cell records; Vehicle D's speeding (62 in 55) in adverse weather conditions plus failure to maintain safe following distance; Vehicle A's sudden braking had a legitimate cause (road debris); Vehicle C's evasive maneuver was a reasonable response; the timeline supports percentage fault allocation with evidence backing each party's contribution."
    weight: 0.35
    description: "ComparativeNegligenceAnalysis"
  - type: llm_judge
    criteria: "Evidence correlation matrix maps each piece of evidence to timeline events and fault determinations — Tesla dashcam corroborates collision sequence; ELD data proves speeding; cell records prove distraction; weather data establishes reduced visibility conditions; witness statements are cross-referenced for consistency; skid mark analysis validates braking distances; each evidence piece supports or contradicts specific fault theories."
    weight: 0.30
    description: "EvidenceCorrelationMatrix"
