meta:
  id: product-liability-timeline
  level: 2
  course: case-timeline-documentation
  type: output
  description: "Create a product liability timeline — track product design, manufacturing, distribution, injury reports, regulatory actions, and recall history for a defective product case"
  tags: [product-liability, recall-timeline, cpsc-reporting, intermediate]

state: {}

trigger: |
  Create a product liability timeline for a
  defective children's toy case involving multiple
  injuries.

  PRODUCT: "SuperBuild Block Set" manufactured by
  ToyWorld International Ltd. (China-based
  manufacturer), imported and distributed by
  FunTime Distribution Inc. (US-based)

  PRODUCT HISTORY:
  - Jan 2022: ToyWorld designs SuperBuild Block Set
  - Mar 2022: Third-party testing lab (SafetyFirst
    Labs) tests prototype; passes ASTM F963 and
    CPSIA standards
  - May 2022: Production begins; ToyWorld modifies
    design to reduce costs — uses smaller connectors
    (now potential choking hazard for children under 3)
  - Jun 2022: No re-testing performed after design
    modification
  - Aug 2022: First shipment of 500,000 units to US
  - Sep 2022: FunTime distributes to major retailers
    (Target, Walmart, Amazon)
  - Oct 2022: Product marketed for "ages 2 and up"
    despite small parts

  INJURY REPORTS:
  - Dec 2022: First injury report — 2-year-old in
    Texas chokes on detached connector; ER visit,
    recovered
  - Feb 2023: Second injury — 3-year-old in California
    swallows connector; requires endoscopy
  - Mar 2023: FunTime receives both reports via
    retailer complaints
  - Apr 2023: FunTime's in-house review — "isolated
    incidents, no action needed"
  - Jun 2023: Third injury — 18-month-old in Florida
    aspirates connector; hospitalized 5 days, ICU
  - Jul 2023: CPSC receives consumer complaint directly
  - Aug 2023: CPSC opens investigation
  - Sep 2023: CPSC testing confirms connectors are
    small parts under 16 CFR 1501 — fail small parts
    test for children under 3
  - Oct 2023: CPSC issues recall notice (Class A —
    risk of serious injury); 500,000 units affected
  - Nov 2023: Fourth injury reported during recall
    period — 2-year-old in New York

  Create:
  1. Product lifecycle timeline
  2. Injury report and response timeline
  3. Regulatory compliance failure analysis
  4. CPSC reporting obligation timeline
  5. Liability allocation across supply chain

assertions:
  - type: llm_judge
    criteria: "Regulatory compliance failure analysis traces the failure chain — the initial testing (Mar 2022) passed because the original design met standards; the May 2022 design modification creating smaller connectors was never re-tested, violating the requirement that production units match tested samples; the 'ages 2 and up' marketing despite small parts violated CPSIA mandatory labeling requirements; FunTime's failure to report to CPSC within 24 hours of learning about injuries (Mar 2023, first knowledge) violated Section 15(b) of CPSA; each regulatory failure is timestamped and tied to specific requirements."
    weight: 0.35
    description: "RegulatoryComplianceFailure"
  - type: llm_judge
    criteria: "Injury report and response timeline shows corporate knowledge and inaction — FunTime knew about two injuries by March 2023 but dismissed them as 'isolated incidents' in April 2023; a third serious injury (ICU hospitalization) occurred in June 2023, three months after FunTime had notice; the timeline shows a 7-month gap between FunTime's knowledge (Mar 2023) and the CPSC recall (Oct 2023); during this gap, at least two more children were injured; this delay supports punitive damages arguments."
    weight: 0.35
    description: "InjuryResponseTimeline"
  - type: llm_judge
    criteria: "Supply chain liability allocation maps responsibility to each party — ToyWorld made the unauthorized design change (strict liability for manufacturing defect, design defect); FunTime failed to verify production matched tested design, failed CPSC reporting, and mismarketed age appropriateness (distributor liability, negligence, failure to warn); SafetyFirst Labs tested the original design only (potential malpractice if contract required production testing); retailers may have indemnification rights; the timeline supports claims against each entity."
    weight: 0.30
    description: "SupplyChainLiability"
