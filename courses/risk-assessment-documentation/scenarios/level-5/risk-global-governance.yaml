meta:
  id: risk-global-governance
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk global governance — design unified enterprise risk governance for a Fortune 50 multinational operating across 65 countries with divergent regulatory regimes"
  tags: [global-governance, multinational, regulatory-harmonization, board-oversight, master]

state: {}

trigger: |
  You're the Group Chief Risk Officer of "Meridian
  Industries," a Fortune 50 industrial conglomerate with
  $92B in revenue, 185,000 employees across 65 countries,
  and 4 operating divisions (Aerospace & Defense, Energy
  Systems, Healthcare Technology, Digital Infrastructure).
  The board has directed you to redesign global risk
  governance after three governance failures in 18 months.

  Governance failures that triggered the redesign:
  1. Brazil subsidiary: Environmental contamination
     discovered 14 months after internal reports flagged
     risk — information never escalated to Group level
     (R$800M remediation, criminal investigation of local
     management)
  2. China joint venture: IP theft by JV partner went
     undetected for 2 years — division risk committee had
     classified it as "low" based on partner's self-
     assessment ($1.2B estimated IP loss)
  3. Germany acquisition: Post-acquisition risk assessment
     revealed €400M in undisclosed environmental liabilities
     — acquisition risk framework failed to detect during
     due diligence

  Current state of risk governance:
  - 4 division CROs report to division Presidents (not
    Group CRO) — "dotted line" to Group CRO is ignored
  - 65 country risk officers with varying qualifications
    and independence
  - 12 different risk taxonomies across divisions
  - Risk committee structures vary by division (some
    quarterly, some ad hoc, some non-existent)
  - Board risk committee meets quarterly, receives 200+
    page reports that directors describe as "impenetrable"
  - Risk appetite statements exist at Group level but are
    not cascaded or enforced
  - No common risk data platform — each division uses
    different GRC tools
  - Regulatory requirements span: SOX, UK Corporate
    Governance Code, EU CSRD, ITAR, EAR, local requirements
    in 65 jurisdictions

  Board expectations:
  - Unified risk governance that ensures material risks
    reach the board regardless of where they originate
  - Preserve division autonomy while ensuring Group
    oversight
  - Address regulatory requirements across all
    jurisdictions without creating bureaucratic paralysis
  - Implement within 24 months with measurable improvement
  - Budget: $45M over 3 years for governance transformation

  Task: Design the complete global risk governance
  framework including the organizational model (reporting
  lines, independence, authority), the unified risk
  taxonomy and appetite cascade, the escalation framework
  that prevents information suppression, the board and
  committee structure, the risk data and technology
  architecture, and the regulatory harmonization approach.
  Address the cultural challenges of implementing
  consistent risk governance across 65 countries.

assertions:
  - type: llm_judge
    criteria: "Response designs a credible global risk governance framework — addresses the organizational model with clear reporting lines that balance division autonomy with Group oversight (solid vs dotted lines, independence provisions); creates a unified risk taxonomy that accommodates division-specific risks while enabling Group-level aggregation; designs an escalation framework with mandatory triggers that prevent information suppression (the Brazil failure); establishes risk appetite cascade from board to division to country level with measurable thresholds."
    weight: 0.35
    description: "CredibleGovernanceFramework"
  - type: llm_judge
    criteria: "Response addresses the specific failures and regulatory complexity — directly addresses how the redesign prevents each of the three governance failures (Brazil escalation failure, China JV assessment failure, Germany due diligence failure); designs regulatory harmonization across SOX, UK Code, EU CSRD, ITAR/EAR, and local requirements without creating compliance paralysis; proposes risk data and technology architecture that enables Group-level visibility; the framework would work across 65 countries with different legal systems, cultures, and regulatory regimes."
    weight: 0.35
    description: "FailurePreventionAndRegulatory"
  - type: llm_judge
    criteria: "Response addresses implementation and cultural challenges — proposes realistic implementation roadmap within 24 months and $45M budget; addresses cultural dimensions of risk governance (hierarchical vs flat cultures, whistleblowing attitudes, face-saving dynamics); designs board reporting that transforms 200+ pages into actionable insight; includes change management strategy for shifting division CRO reporting lines and building risk culture across 185,000 employees; a Fortune 50 board would find this framework implementable and effective."
    weight: 0.30
    description: "ImplementationAndCulture"
