meta:
  id: risk-education-curriculum
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk education curriculum — design a comprehensive risk management education program for a top business school that bridges academic rigor with practitioner relevance"
  tags: [education, curriculum-design, executive-education, academic, master]

state: {}

trigger: |
  You're the founding Academic Director of the Centre for
  Enterprise Risk at INSEAD. The school has received a
  €15M endowment from a global reinsurer to establish the
  premier academic program in enterprise risk management.
  You need to design the complete educational ecosystem
  spanning degree programs, executive education, and
  research.

  Endowment mandate:
  - Create the world's leading academic program in ERM
  - Bridge the gap between academic risk research and
    practitioner application
  - Produce graduates who can lead risk functions at
    major organizations
  - Advance knowledge through rigorous research that
    informs practice
  - Build a global network of risk leaders

  Programs to design:
  1. MSc in Enterprise Risk Management (12-month
     full-time, 60 students/year)
  2. Executive MBA Risk Leadership concentration
     (for working CROs and risk directors)
  3. Open Executive Education programs:
     - "Board Risk Governance" (4 days, for NEDs)
     - "CRO Leadership Program" (2 weeks, for aspiring
       CROs)
     - "Risk Analytics and AI" (1 week, technical)
     - "Risk Culture Transformation" (3 days, for CHROs
       and CROs)
  4. Custom corporate programs (designed for individual
     organizations)
  5. Research agenda and publication strategy

  Current landscape of risk education:
  - Few dedicated ERM degree programs exist globally
  - Most risk education is professional certification
    (FRM, PRM, ARM, CRISC) — exam-focused, not leadership-
    focused
  - Academic research on risk is fragmented across finance,
    operations, strategy, and organizational behavior
  - Practitioners complain academic research is "irrelevant
    to real risk management"
  - Academics complain practitioners are "atheoretical"
  - AI is disrupting traditional risk analysis skills

  Faculty you've recruited:
  - 3 tenured professors (behavioral decision science,
    quantitative risk modeling, organizational resilience)
  - 2 clinical professors (former Group CROs of FTSE 100
    firms)
  - 1 professor of practice (former head of risk at a
    global regulator)
  - Adjunct budget for 10-12 industry practitioners per year

  Task: Design the complete educational ecosystem including
  the MSc curriculum (course-by-course), the executive
  education programs with learning objectives, the
  pedagogical approach that bridges theory and practice,
  the research agenda, the assessment methodology, and the
  strategy for establishing INSEAD as the global leader in
  risk management education. Include how AI changes what
  risk professionals need to learn.

assertions:
  - type: llm_judge
    criteria: "Response designs a rigorous curriculum — the MSc program has a coherent course sequence from foundations to advanced topics; covers quantitative methods, behavioral science, governance, regulatory frameworks, and emerging risks; each course has clear learning objectives and assessment approach; the curriculum reflects current best practices while preparing graduates for 5-10 year career horizons; the program differentiates from professional certifications (FRM, ARM) by emphasizing leadership, judgment, and strategic thinking over technical compliance."
    weight: 0.35
    description: "RigorousCurriculum"
  - type: llm_judge
    criteria: "Response bridges theory and practice effectively — the pedagogical approach uses case studies, simulations, practitioner mentoring, and real organizational engagements; executive education programs have relevant content for senior audiences (board directors, CROs); the faculty mix of academics and practitioners is leveraged intentionally; the research agenda produces both academically rigorous and practically relevant work; addresses how AI changes what risk professionals need to learn (from data analysis to judgment, oversight, and AI risk management)."
    weight: 0.35
    description: "TheoryPracticeBridge"
  - type: llm_judge
    criteria: "Response creates a viable institutional strategy — proposes how to establish INSEAD as the global leader in risk education within 5 years; includes partnership strategy (regulators, professional associations, industry); addresses revenue model and financial sustainability beyond endowment; proposes metrics for program success (graduate placement, research impact, industry adoption); the strategy accounts for competition from existing programs (NYU Stern, Imperial, professional bodies); an INSEAD dean would find this compelling and implementable."
    weight: 0.30
    description: "ViableInstitutionalStrategy"
