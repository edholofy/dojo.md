meta:
  id: master-risk-assessment-shift
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Master risk assessment shift — handle simultaneous global crises requiring real-time risk governance across a systemically important financial institution"
  tags: [shift-simulation, crisis-convergence, systemic-risk, global-governance, master]

state: {}

trigger: |
  You're the Group Chief Risk Officer of "Atlas Financial
  Group," a Global Systemically Important Bank (G-SIB)
  with $1.8T in assets, operations in 42 countries, and
  85,000 employees. It's Tuesday morning and three crises
  are converging simultaneously.

  CRISIS 1 — SOVEREIGN DEBT CONTAGION (6:00 AM):
  A major European economy has failed to roll over €45B
  in government debt. Credit default swaps have spiked
  400bps overnight. Your direct sovereign exposure is
  €8.2B, but your total exposure including counterparty
  risk, derivatives, and collateral chains is estimated
  at €22-35B (the uncertainty itself is a risk). Three
  other European sovereigns are showing stress. The ECB
  has not yet announced intervention. Markets open in
  90 minutes.

  Your immediate data:
  - Direct sovereign bond holdings: €8.2B
  - Sovereign-linked derivatives (notional): €14.8B
  - Counterparty exposure to banks with heavy sovereign
    exposure: €6.4B
  - Collateral received that references affected
    sovereigns: €3.1B
  - Client assets in affected jurisdictions: €28B
  - CET1 impact (preliminary): -180bps under stress
    (regulatory minimum breach possible)

  CRISIS 2 — INTERNAL FRAUD DISCOVERY (7:30 AM):
  Internal audit has discovered that a senior trader in
  your Singapore office has been concealing losses through
  fictitious trades for approximately 18 months. Estimated
  hidden losses: $1.4-2.8B (still being quantified). The
  trader has been suspended but the full extent of
  positions and losses is unknown. The Monetary Authority
  of Singapore (MAS) must be notified within 24 hours.
  The fraud may have also violated US sanctions (some
  trades appear to involve sanctioned entities).

  Complicating factors:
  - The trader's supervisor is on the risk committee that
    approved the desk's risk limits
  - The fraud exploited a gap between the front office
    risk system and the back office settlement system
  - Unwinding the positions during sovereign stress could
    amplify both crises
  - Media has not yet reported either crisis

  CRISIS 3 — REGULATORY ULTIMATUM (8:15 AM):
  The Federal Reserve has delivered a private letter
  demanding immediate response to examination findings
  from 3 months ago. The letter states that Atlas's risk
  data aggregation capabilities are "materially deficient"
  under BCBS 239, and that the Fed is considering a
  formal enforcement action (cease and desist order) if a
  credible remediation plan is not submitted within 72
  hours. The letter specifically cites:
  - Inability to aggregate risk exposures within 24 hours
    during stress events
  - 3,200 manual reconciliations between risk systems
  - No single source of truth for counterparty exposure
  - Model risk governance gaps (12 unvalidated models)

  The irony: the BCBS 239 deficiencies are exactly why
  you cannot quickly determine your total exposure to
  Crisis 1 or the full extent of Crisis 2.

  Your governance obligations:
  - Board risk committee emergency session (you must brief
    within 4 hours)
  - Regulatory notifications: MAS (fraud), Fed (response
    to letter + crisis updates), ECB (sovereign exposure),
    PRA/FCA (UK operations impact)
  - Market disclosure: Material information that may
    require immediate public disclosure under SEC/MAR rules
  - Investor relations: Earnings call is scheduled for
    Thursday
  - Employee communication: 85,000 employees across 42
    countries

  Task: Produce the complete crisis risk governance
  response including: the board emergency briefing that
  explains all three crises and their interconnections;
  the risk assessment for each crisis with scenario
  analysis; the regulatory notification strategy across
  all jurisdictions; the decision framework for the first
  72 hours (what decisions must be made, by whom, in what
  sequence); the market disclosure analysis; and the
  remediation commitments for the Fed letter that are
  credible given the other two crises. Address the
  fundamental irony that the data deficiencies the Fed
  identified are preventing effective crisis response.

assertions:
  - type: llm_judge
    criteria: "Response produces a credible board emergency briefing — communicates all three crises clearly with their interconnections (sovereign stress amplifies fraud unwind risk, data deficiencies hamper both crisis responses, fraud may trigger additional regulatory scrutiny); provides scenario analysis with quantified impact ranges; recommends specific board decisions with clear rationale; the briefing is concise enough for a 60-minute emergency session while covering all material information; the tone conveys urgency without panic and demonstrates command of the situation."
    weight: 0.35
    description: "CredibleBoardBriefing"
  - type: llm_judge
    criteria: "Response designs a coherent 72-hour decision framework — sequences decisions correctly (what must happen in hours 1-4, 4-12, 12-24, 24-72); addresses regulatory notifications across jurisdictions (MAS, Fed, ECB, PRA/FCA, SEC) with timing and content; analyzes market disclosure obligations under SEC/MAR rules; manages the fraud unwind in context of sovereign stress; proposes credible Fed remediation commitments that acknowledge the current crises make the data deficiency argument more urgent, not less; the response demonstrates sophisticated understanding of G-SIB crisis governance."
    weight: 0.35
    description: "CoherentDecisionFramework"
  - type: llm_judge
    criteria: "Response addresses systemic implications and institutional learning — recognizes that the three crises together could threaten the institution's viability (CET1 breach + fraud losses + regulatory action); addresses contagion risk to the broader financial system; proposes how to use the crisis to accelerate BCBS 239 remediation rather than delay it; includes stakeholder management (employees, clients, counterparties, media); the response reflects the judgment expected of a G-SIB CRO managing through a potentially existential crisis; addresses what must change institutionally to prevent recurrence."
    weight: 0.30
    description: "SystemicImplicationsAndLearning"
