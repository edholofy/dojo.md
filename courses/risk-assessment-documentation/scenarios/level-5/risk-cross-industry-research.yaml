meta:
  id: risk-cross-industry-research
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk cross-industry research — write the definitive 'State of Enterprise Risk Management 2026' research report based on global survey data"
  tags: [research, cross-industry, erm-survey, benchmarking, master]

state: {}

trigger: |
  You're the Director of Research at the Risk Management
  Society (RIMS). You've completed the largest-ever global
  survey of enterprise risk management practices — 4,500
  responses from CROs, risk managers, and board directors
  across 48 countries and 22 industries. You need to produce
  the "State of Enterprise Risk Management 2026" report.

  Survey data highlights:
  
  ERM maturity metrics:
  - Formal ERM program in place: 62% (up from 45% in 2020)
  - ERM integrated with strategy: 28% (vs 72% who say it's
    standalone)
  - CRO reports directly to CEO: 41%
  - CRO reports to CFO: 38%
  - CRO reports to General Counsel: 21%
  - Board risk committee: 78% of public companies, 34% of
    private

  Risk assessment practices:
  - Annual risk assessment: 52%
  - Semi-annual: 23%
  - Continuous/dynamic: 15%
  - Ad hoc (no regular cadence): 10%
  - Use qualitative methods only: 48%
  - Use quantitative methods: 32%
  - Use both: 20%

  AI in risk management:
  - Any AI use in risk management: 24% (up from 6% in 2022)
  - AI for risk monitoring: 18%
  - AI for risk scoring: 12%
  - AI for emerging risk detection: 8%
  - AI for regulatory change tracking: 15%
  - Trust in AI risk assessments: 31% trust fully, 42%
    trust with verification, 27% don't trust

  Top risks identified (global ranking):
  1. Cybersecurity and data privacy (89%)
  2. Economic uncertainty and recession (82%)
  3. Regulatory change and compliance (78%)
  4. AI risks and opportunities (75%)
  5. Geopolitical instability (72%)
  6. Climate and environmental (68%)
  7. Supply chain disruption (65%)
  8. Talent and workforce (62%)
  9. Pandemic/health crises (58%)
  10. Third-party/vendor risk (55%)

  Risk management effectiveness:
  - "ERM added value during recent crises": 45% agree
  - "Board engagement with risk has improved": 52% agree
  - "Risk management influences strategic decisions": 33%
  - "Our risk appetite is clearly defined": 38%
  - "We effectively monitor emerging risks": 22%
  - Average risk management budget: 0.3% of revenue

  Regional differences:
  - North America: Most likely to have formal ERM (68%),
    highest AI adoption (28%)
  - Europe: Strongest regulatory compliance focus (DORA, FCA)
  - Asia-Pacific: Fastest-growing ERM adoption (from 35% to
    58% in 3 years)
  - Middle East/Africa: Lowest maturity but fastest improvement

  Task: Write the full research report including executive
  summary, key findings by theme, regional and industry
  benchmarking, analysis of what distinguishes effective
  risk management, the AI adoption trajectory, and
  practitioner recommendations. This should become the
  definitive annual reference for the risk profession.

assertions:
  - type: llm_judge
    criteria: "Response creates a professional research report — includes executive summary with top 10 findings; organizes findings thematically (maturity, practices, AI adoption, effectiveness, emerging risks); presents data with appropriate statistical context; describes data visualizations that would communicate findings effectively; the report structure and depth would be appropriate for a major RIMS or Deloitte-caliber industry report; provides actionable benchmarks for risk professionals."
    weight: 0.35
    description: "ProfessionalResearchReport"
  - type: llm_judge
    criteria: "Response identifies what distinguishes effective risk management — analyzes what differentiates top-performing risk programs (ERM-strategy integration, board engagement, quantitative methods, continuous assessment); creates useful benchmarks by company size, industry, and region; analyzes the ROI of mature ERM programs; addresses the gap between having ERM and getting value from it (62% have programs but only 45% say they added value in crises); prescriptive insights that help CROs improve their programs."
    weight: 0.35
    description: "EffectivenessAnalysis"
  - type: llm_judge
    criteria: "Response identifies emerging trends and future directions — analyzes the AI adoption trajectory in risk management with realistic predictions; addresses the trust gap (only 31% fully trust AI risk assessments); covers evolving risk landscape (AI risk, climate, geopolitical); identifies the shift from periodic to continuous risk assessment; proposes a maturity model for the risk profession; the trends section is forward-looking without being speculative; a CRO reading this would understand where risk management is heading."
    weight: 0.30
    description: "EmergingTrendsAndFuture"
