meta:
  id: risk-consulting-practice
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk consulting practice — design a boutique risk advisory firm specializing in enterprise risk transformation"
  tags: [consulting, practice-building, risk-advisory, methodology, master]

state: {}

trigger: |
  You're a former Group CRO of a FTSE 100 company who left
  to start "Resilience Partners," a boutique risk advisory
  firm. You've assembled a team of 8 former CROs, senior
  regulators, and risk technology experts. Your vision is
  to help companies transform their risk management from
  compliance-driven to strategy-enabling. You need to
  create your firm's methodology, go-to-market strategy,
  and first client engagement framework.

  Market opportunity:
  - 78% of boards say risk management is "not providing
    strategic value"
  - ERM transformation market: ~$12B globally
  - Competitors: Big 4 firms (generic, expensive), niche
    GRC consultancies (technology-focused), regulatory
    compliance firms (narrow)
  - Your differentiation: Practitioner-led CRO perspective,
    board-level relationships, outcome-focused (not
    framework-for-framework's-sake)

  Service offerings to design:
  1. Risk Maturity Assessment (2 weeks, $75-100K):
     Benchmark current risk management against best practices
     and regulatory expectations
  2. ERM Transformation Design (8-12 weeks, $250-500K):
     Redesign the risk management operating model,
     governance, and capabilities
  3. Board Risk Governance Advisory (retainer, $20-30K/month):
     Ongoing advisory to boards and risk committees
  4. Crisis Readiness Assessment (4 weeks, $150-200K):
     Test and improve crisis management capabilities
  5. Risk Culture Transformation (6-18 months, $500K-1.5M):
     Assess and transform organizational risk culture

  First client prospect:
  - $6B pharmaceutical company, 22,000 employees
  - Recently received FDA warning letter citing "inadequate
    risk-based quality management"
  - New CEO (6 months in) wants "world-class risk management"
  - Previous ERM program: COSO framework implemented 5 years
    ago, now "dead on arrival" — nobody uses it
  - Board risk committee meets quarterly but has limited
    risk expertise
  - Budget for risk transformation: $800K-1.2M over 18 months
  - Competing proposal from EY ($2.5M, 24-month program)

  Task: Create the complete consulting methodology for your
  flagship ERM Transformation Design service, develop the
  winning proposal for the pharma client that positions you
  against EY, build the risk maturity model, and design the
  value measurement framework that proves ROI of risk
  management transformation.

assertions:
  - type: llm_judge
    criteria: "Response creates a credible consulting methodology — the ERM Transformation Design has a clear phase structure (diagnose, design, build, embed); each phase has specific deliverables, activities, and outcomes; the methodology addresses governance, capabilities, processes, culture, and technology; it reflects real CRO experience (not generic consulting framework); the methodology differentiates Resilience Partners from Big 4 firms and GRC consultancies."
    weight: 0.35
    description: "CredibleConsultingMethodology"
  - type: llm_judge
    criteria: "Response designs a winning client proposal — positions against EY (half the cost, practitioner-led, focused on outcomes not frameworks, faster time-to-value); addresses the specific pharma challenges (FDA warning letter, dead ERM program, board capability gap); scopes within $800K-1.2M budget; shows visible results within 6 months; demonstrates understanding of pharmaceutical industry risk landscape (quality systems, regulatory compliance, clinical trial risk); the proposal would win the business."
    weight: 0.35
    description: "WinningClientProposal"
  - type: llm_judge
    criteria: "Response includes a risk maturity model and value framework — creates a maturity model with clear levels (ad hoc, developing, defined, managed, optimized) and observable criteria; the maturity model is practical (not just theoretical levels but specific behaviors and capabilities at each level); the value measurement framework shows ROI of risk management transformation (risk events avoided, decision quality improvement, regulatory compliance, insurance cost reduction, reputation protection); the framework helps clients justify ongoing investment in risk management."
    weight: 0.30
    description: "MaturityModelAndValueFramework"
