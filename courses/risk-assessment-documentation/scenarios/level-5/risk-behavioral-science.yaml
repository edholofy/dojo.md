meta:
  id: risk-behavioral-science
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk behavioral science — write a research framework on cognitive biases in risk assessment and evidence-based debiasing interventions"
  tags: [behavioral-science, cognitive-biases, debiasing, risk-perception, master]

state: {}

trigger: |
  You're a professor of Decision Science and Risk at
  London Business School. You've received a £400K research
  grant from the UK Financial Conduct Authority (FCA) to
  study cognitive biases in enterprise risk assessment and
  develop evidence-based interventions to improve risk
  decision quality. Your research will inform FCA guidance
  on risk governance for regulated firms.

  Your research catalog of risk assessment biases:
  1. Normalcy bias: Risk assessors discount "unprecedented"
     events (COVID was rated "low probability" by 92% of
     risk registers in 2019)
  2. Anchoring to history: Past loss data anchors future
     risk estimates (firms that haven't been breached
     underestimate cyber risk by 3-5x)
  3. Groupthink in risk committees: Committees consistently
     underestimate risks that leadership has publicly
     dismissed
  4. Availability bias: Recent events dominate risk
     assessment (post-incident, the assessed risk category
     jumps 2-3 levels for 6 months, then reverts)
  5. Overconfidence in controls: Risk owners rate their own
     controls as 2x more effective than independent
     assessors
  6. Linear thinking in non-linear systems: Risk assessors
     fail to account for cascade and contagion effects
     (assessed interconnected risk impact = sum of parts,
     not multiplicative)
  7. Regulatory capture of risk thinking: Risk registers
     mirror regulatory requirements, missing strategic and
     emerging risks
  8. Status quo bias: 85% of risk register entries unchanged
     year-over-year (regardless of changing environment)
  9. Optimism bias in mitigation planning: Remediation
     timelines underestimated by 50-100% on average
  10. Illusion of control: Risk assessors overestimate
      ability to manage risks they "own"

  Research methodology:
  - 4-year longitudinal study with 30 regulated financial
    firms
  - Access to risk committee meeting transcripts, risk
    registers, and outcomes
  - Controlled experiments with risk professionals (A/B
    testing interventions)
  - Survey of 1,500 risk professionals across industries

  Task: Create the research framework and practitioner
  guide. Include hypothesis structure, experimental design
  for debiasing interventions, expected findings, and the
  "Evidence-Based Risk Assessment Toolkit" that translates
  research into practical tools for CROs. The toolkit
  should be usable by risk committees at regulated firms.

assertions:
  - type: llm_judge
    criteria: "Response creates a rigorous research framework — structures hypotheses for each bias with testable predictions; designs experiments that isolate bias effects and test interventions; addresses research validity (observer effect, selection bias, confidentiality); proposes novel interventions (pre-mortem analysis for normalcy bias, red team challenges for groupthink, algorithmic base rates for anchoring); the methodology would pass peer review in a management science or risk management journal."
    weight: 0.35
    description: "RigorousResearchFramework"
  - type: llm_judge
    criteria: "Response produces a usable practitioner toolkit — translates each bias into observable behaviors in risk committees (checklist for detection); proposes practical debiasing interventions that work in real organizational settings; includes facilitation guides for risk committee meetings; provides self-assessment tools for risk committees to evaluate their own bias susceptibility; the toolkit is designed for FCA-regulated firms but applicable broadly; a CRO could implement 3+ interventions in the next quarter."
    weight: 0.35
    description: "UsablePractitionerToolkit"
  - type: llm_judge
    criteria: "Response demonstrates deep expertise in both behavioral science and risk management — shows genuine understanding of decision science research (Kahneman, Tetlock, Klein) applied to risk assessment; connects biases to real organizational outcomes (not just theoretical effects); addresses the political dynamics that reinforce biases (challenging the CEO's risk dismissal is career-risky); proposes interventions that work within organizational power structures; the research contributes to both academic knowledge and regulatory practice."
    weight: 0.30
    description: "CrossDomainExpertise"
