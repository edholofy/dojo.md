meta:
  id: risk-ethics-framework
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk ethics framework — develop a comprehensive ethical framework for enterprise risk management addressing moral dimensions of risk decisions, algorithmic bias in risk scoring, and organizational accountability"
  tags: [ethics, moral-philosophy, algorithmic-bias, accountability, master]

state: {}

trigger: |
  You're the Chair of the Ethics and Standards Committee
  at the Institute of Risk Management (IRM). Following
  several high-profile failures where technically sound
  risk assessments led to ethically problematic outcomes,
  the IRM board has commissioned you to develop the
  profession's first comprehensive "Ethical Framework for
  Enterprise Risk Management."

  Cases that prompted the framework:
  1. Insurance redlining: An insurer's AI risk model
     systematically underpriced policies in affluent areas
     and overpriced in minority communities. The model was
     statistically accurate (claims correlated with the
     variables used) but perpetuated discriminatory outcomes.
     The risk team approved the model as "technically valid."
  2. Environmental trade-off: A chemical company's risk
     assessment concluded that relocating a hazardous
     facility to a developing country reduced "enterprise
     risk" by 60% — because weaker regulation, lower
     litigation risk, and cheaper remediation costs made
     the risk-reward favorable. Risk committee approved.
  3. Whistleblower retaliation: A risk analyst identified
     material risks being suppressed by senior management.
     The ERM framework had no provisions for protecting
     dissenting risk opinions. The analyst was terminated
     for "performance issues."
  4. Pandemic triage: A healthcare system's risk framework
     prioritized financial risk (revenue loss) over patient
     safety risk during COVID, leading to premature
     reopening of elective procedures that caused
     preventable infections.
  5. AI hiring risk: A company's operational risk
     assessment of its AI hiring tool focused on legal
     compliance (EEOC) but not on broader fairness —
     the tool was legally compliant but systematically
     disadvantaged candidates from non-traditional
     backgrounds.

  Current state of ethics in risk management:
  - Professional codes of conduct exist (IRM, RIMS, GARP)
    but are generic and not specific to risk assessment
    decisions
  - No established methodology for evaluating ethical
    dimensions of risk decisions
  - Risk frameworks (COSO, ISO 31000) mention "values"
    but provide no ethical decision-making guidance
  - Growing use of AI in risk assessment creates new
    ethical challenges (algorithmic bias, opacity,
    accountability gaps)
  - Regulatory pressure increasing (EU AI Act, FCA
    Consumer Duty, US algorithmic accountability proposals)

  Task: Develop the complete ethical framework including
  ethical principles specific to risk management, decision
  frameworks for ethically complex risk scenarios, guidance
  on algorithmic ethics in risk scoring, whistleblower
  and dissent protection provisions, accountability
  structures, and implementation guidance for CROs.
  The framework should be adopted by IRM as professional
  guidance and influence ISO 31000's next revision.

assertions:
  - type: llm_judge
    criteria: "Response develops substantive ethical principles — articulates principles specific to risk management (not generic business ethics); addresses the tension between shareholder value and stakeholder harm; provides decision frameworks for each case study scenario (insurance redlining, environmental arbitrage, whistleblower protection, pandemic triage, AI hiring); the principles are philosophically grounded (justice, duty of care, proportionality) while being practically actionable; the framework goes beyond compliance to genuine ethical reasoning."
    weight: 0.35
    description: "SubstantiveEthicalPrinciples"
  - type: llm_judge
    criteria: "Response addresses algorithmic ethics and accountability — provides specific guidance on evaluating AI/algorithmic risk models for fairness, bias, and disparate impact; addresses the distinction between statistical validity and ethical acceptability; proposes accountability structures (who is responsible when an AI risk model causes harm?); includes provisions for protecting dissenting risk opinions and whistleblowers; the accountability framework covers individual, organizational, and professional responsibility."
    weight: 0.35
    description: "AlgorithmicEthicsAndAccountability"
  - type: llm_judge
    criteria: "Response creates implementable professional guidance — the framework is structured for adoption by IRM as professional standards; includes self-assessment tools for CROs to evaluate their organization's ethical risk practices; proposes training and certification requirements for ethical risk assessment; addresses how to integrate ethical review into existing ERM processes without creating bureaucratic overhead; the framework would influence ISO 31000 revision and elevate the risk management profession's ethical standing; a CRO could implement key elements within 6 months."
    weight: 0.30
    description: "ImplementableProfessionalGuidance"
