meta:
  id: risk-thought-leadership
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk thought leadership — write a McKinsey Quarterly-caliber article on the future of enterprise risk management in the age of AI and interconnected crises"
  tags: [thought-leadership, future-of-risk, ai-era, interconnected-crises, master]

state: {}

trigger: |
  You're a former Fortune 100 CRO turned professor at
  Columbia Business School. McKinsey Quarterly has
  commissioned you to write a feature article titled
  "Risk Management 3.0: Why Traditional Frameworks Fail
  in the Age of Interconnected Crises." The article should
  draw on your experience managing risk through COVID,
  supply chain disruptions, cyber warfare, and climate
  events — and argue that the current ERM paradigm is
  fundamentally broken.

  Article requirements:
  - 3,000-4,000 words
  - Must challenge ERM orthodoxy with evidence
  - Propose a new paradigm for risk management
  - Address AI's role (both as risk and risk management tool)
  - Include case studies and research evidence
  - Target audience: Board directors and C-suite executives

  Your thesis:
  Traditional ERM (built on COSO 2004/2017, ISO 31000) was
  designed for a world of independent, identifiable risks.
  Today's risk landscape is characterized by:
  1. Interconnection: Risks cascade across domains (pandemic
     → supply chain → financial → social)
  2. Velocity: Risk events propagate at digital speed
     (cyber attacks, social media crises, market contagion)
  3. Non-linearity: Small events trigger outsized consequences
     (Suez Canal blockage → global supply chain crisis)
  4. Polycrisis: Multiple crises converge simultaneously
     (COVID + supply chain + inflation + war + climate)
  5. AI duality: AI creates new risks while being essential
     for managing complex risks

  Research data to incorporate:
  - 85% of CROs say their ERM framework was "inadequate"
    during COVID
  - Companies with integrated risk-strategy processes
    outperformed peers by 18% during the 2020-2023 crisis period
  - Average company faces 3.5 concurrent crises (up from 1.2
    in 2015)
  - AI-powered risk monitoring detects emerging risks 6-8
    weeks earlier than traditional methods
  - 92% of risk registers failed to include "pandemic" as
    a material risk before COVID

  Task: Write the full McKinsey Quarterly article that makes
  a compelling case for Risk Management 3.0. Include the
  critique of current ERM, the new paradigm with specific
  framework, case studies, and a transformation roadmap for
  CROs and boards.

assertions:
  - type: llm_judge
    criteria: "Response presents a compelling intellectual argument — critiques traditional ERM with specific evidence (not just general complaints); articulates why interconnection, velocity, and non-linearity break existing frameworks; proposes a coherent new paradigm (Risk Management 3.0) with specific principles and methodology; the argument builds logically and would persuade skeptical board directors; the writing quality and depth are appropriate for a McKinsey Quarterly feature."
    weight: 0.35
    description: "CompellingIntellectualArgument"
  - type: llm_judge
    criteria: "Response proposes a specific new framework — goes beyond critique to propose actionable alternatives (dynamic risk sensing, interconnected risk modeling, adaptive response capabilities, AI-augmented risk intelligence); the framework addresses each weakness of traditional ERM; includes practical implementation guidance for CROs; addresses AI's dual role (both risk and risk management tool); the new paradigm is grounded in research evidence and practical experience."
    weight: 0.35
    description: "SpecificNewFramework"
  - type: llm_judge
    criteria: "Response demonstrates deep risk expertise and vision — uses case studies effectively to illustrate concepts; connects theoretical framework to practical business outcomes; addresses organizational and cultural barriers to adoption; the author's voice carries authority of someone who has managed risk through real crises; the article contributes genuinely new thinking (not just repackaging existing ideas); a CRO reading this would fundamentally reconsider their approach to risk management."
    weight: 0.30
    description: "DeepExpertiseAndVision"
