meta:
  id: risk-regulatory-policy
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk regulatory policy — draft model legislation for enterprise risk management standards for critical infrastructure"
  tags: [regulatory-policy, legislation, critical-infrastructure, standards, master]

state: {}

trigger: |
  You're a senior policy advisor to the US Treasury
  Department's Office of Financial Research (OFR). Congress
  has directed the OFR to develop model legislation for
  "Enterprise Risk Management Standards for Critical
  Infrastructure" after a series of cascading failures
  (Colonial Pipeline, SolarWinds, Silicon Valley Bank)
  demonstrated that critical infrastructure risk management
  is inadequate.

  Congressional directive:
  - Develop model ERM standards for critical infrastructure
    sectors (financial services, energy, healthcare,
    telecommunications, transportation)
  - Standards should address: cyber risk, operational
    resilience, systemic interconnection, climate risk, and
    AI risk
  - Must balance protection with innovation (not create
    barriers that prevent advancement)
  - Consider international harmonization (UK, EU, Singapore
    have similar initiatives)
  - Propose enforcement mechanisms and penalties
  - Address small vs large entity proportionality
  - Include self-assessment and external validation
    requirements

  Case studies driving the legislation:
  1. Colonial Pipeline (2021): Ransomware shut down fuel
     supply for 45% of US East Coast
  2. SolarWinds (2020): Supply chain attack affected 18,000+
     organizations including government
  3. Silicon Valley Bank (2023): Failed risk management
     contributed to bank collapse affecting financial system
  4. CrowdStrike outage (2024): Single software update
     crashed 8.5M Windows systems globally
  5. Change Healthcare (2024): Ransomware disrupted 1/3 of
     US healthcare claims processing

  Stakeholder positions:
  - Industry lobby: "Voluntary frameworks work better than
    mandates. Compliance costs will be enormous."
  - National security: "Critical infrastructure risk
    management is a national security issue. Voluntary
    has failed."
  - Small business: "Large company standards will bankrupt
    us. We need proportionate requirements."
  - Technology sector: "Prescriptive risk standards will
    freeze innovation. Principles-based is better."
  - State regulators: "Federal standards must not preempt
    state authority."
  - International allies: "Cross-border harmonization
    prevents regulatory arbitrage."

  Task: Draft the model legislation with explanatory
  commentary. Include the ERM standards framework, sector-
  specific requirements, proportionality provisions, the
  enforcement and penalty structure, the self-assessment
  and external validation requirements, international
  harmonization provisions, and the implementation timeline.
  Balance all stakeholder interests.

assertions:
  - type: llm_judge
    criteria: "Response drafts credible model legislation — follows legislative structure (findings, definitions, scope, standards, enforcement, effective dates); the ERM standards address all required domains (cyber, operational resilience, systemic interconnection, climate, AI); standards are principles-based with sector-specific technical supplements; the proportionality framework differentiates requirements by entity size and systemic importance; the legislation is detailed enough to be implementable while flexible enough to adapt to evolving risks."
    weight: 0.35
    description: "CredibleModelLegislation"
  - type: llm_judge
    criteria: "Response balances all stakeholder interests — addresses industry concerns about compliance costs (proportionality, phased implementation, safe harbor for good faith compliance); addresses national security concerns (mandatory minimums for systemically important entities); protects small businesses (tiered requirements, simplified frameworks); addresses state regulators (federal floor with state authority preserved); supports innovation (principles-based, technology-neutral); the balance would enable bipartisan support."
    weight: 0.35
    description: "BalancedStakeholderInterests"
  - type: llm_judge
    criteria: "Response addresses enforcement and international harmonization — proposes enforcement mechanisms proportionate to violation severity (warnings, penalties, consent orders, license revocation for critical failures); includes self-assessment requirements with external validation for high-risk entities; addresses international harmonization with UK, EU, and Singapore frameworks; proposes mutual recognition agreements; the legislation draws lessons from each case study (Colonial Pipeline, SVB, CrowdStrike, Change Healthcare); the policy framework demonstrates sophisticated understanding of risk regulation."
    weight: 0.30
    description: "EnforcementAndHarmonization"
