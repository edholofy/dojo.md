meta:
  id: risk-technology-platform
  level: 5
  course: risk-assessment-documentation
  type: output
  description: "Risk technology platform — design an AI-powered enterprise risk management platform that disrupts traditional GRC software"
  tags: [risk-tech, ai-platform, grc, product-design, master]

state: {}

trigger: |
  You're the CEO and co-founder of "RiskSense AI," an
  AI-powered enterprise risk management platform that
  raised a $30M Series B. Your vision is to replace the
  traditional GRC tools (Archer, ServiceNow GRC, MetricStream)
  with an AI-native platform that continuously monitors
  risk, predicts emerging threats, and automates risk
  assessment. You need to create the product vision, go-to-
  market strategy, and 3-year business plan.

  Product vision:
  - Continuous risk monitoring using AI agents that scan
    news, regulatory filings, vendor data, internal metrics
  - Automated risk scoring that adapts to new information
    (replacing annual risk assessments)
  - Predictive risk analytics (identifying emerging risks
    6-8 weeks before they materialize)
  - Natural language risk reporting ("What's our top risk
    this week?" "How has our cyber risk changed?")
  - Automated regulatory change impact assessment
  - Risk simulation engine (model cascading risk scenarios)
  - Integration with enterprise data (ERP, CRM, HRIS, IT
    monitoring)

  Market landscape:
  | Competitor | Revenue | Strength | Weakness |
  |-----------|---------|----------|----------|
  | Archer (RSA) | $200M | Market leader, deep GRC | Legacy architecture, no AI |
  | ServiceNow GRC | $150M | Platform integration | GRC is afterthought |
  | MetricStream | $120M | Regulatory compliance | Complex, slow |
  | LogicGate | $50M | Modern UX | Limited AI, early |
  | OneTrust | $400M | Privacy focus, expanding | GRC is secondary |

  RiskSense AI current state:
  - 55 customers (mostly mid-market financial services)
  - ARR: $8M (growing 150% YoY)
  - ACV: $145K (enterprise deals reaching $400K)
  - NRR: 128%
  - Team: 75 people (35 engineering, 15 sales, 10 CS)
  - Core AI: Risk monitoring agents, automated scoring,
    regulatory change detection
  - Gross margin: 68% (AI compute costs significant)

  Series B expectations:
  - Reach $40M ARR within 24 months
  - Enter enterprise market ($10B+ companies)
  - Expand beyond financial services (healthcare, energy)
  - Build regulatory partnership program
  - Path to profitability within 36 months

  Task: Create the comprehensive product and business plan
  including the product roadmap (prioritized AI capabilities),
  go-to-market strategy (how to displace Archer in
  enterprise accounts), the financial model, the partnership
  strategy (regulators, Big 4 firms), and the trust
  framework (how do CROs trust AI risk assessments?).

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling product vision and roadmap — prioritizes AI capabilities by customer value and technical feasibility; addresses the trust problem (CROs need to verify AI risk assessments, not just accept them); the roadmap builds from current capabilities to full vision; includes differentiation from legacy GRC tools (continuous vs periodic, predictive vs reactive, AI-native vs AI-bolted-on); the product vision is ambitious but technically grounded."
    weight: 0.35
    description: "CompellingProductVision"
  - type: llm_judge
    criteria: "Response designs a viable go-to-market strategy — explains how to win enterprise deals against entrenched incumbents (Archer, ServiceNow); identifies the buying process for enterprise risk technology (CRO, CIO, board involvement); proposes partnership strategy with Big 4 firms and regulators; addresses vertical expansion (financial services → healthcare → energy); the financial model shows credible path from $8M to $40M ARR; the strategy accounts for enterprise sales cycle length."
    weight: 0.35
    description: "ViableGoToMarketStrategy"
  - type: llm_judge
    criteria: "Response addresses the trust and adoption challenge — explains how to build CRO trust in AI-generated risk assessments (explainability, human-in-the-loop, accuracy validation, regulatory acceptance); proposes how the platform handles risk data quality issues; addresses competitive moat (data network effects, regulatory relationships, industry-specific models); the business plan includes realistic AI compute costs in the margin model; the approach to AI in risk management would be credible to both CROs and technologists."
    weight: 0.30
    description: "TrustAndAdoptionChallenge"
