meta:
  id: change-management-risk-assessment
  level: 2
  course: risk-assessment-documentation
  type: output
  description: "Change management risk assessment — assess risks of a major organizational change initiative affecting the entire company"
  tags: [change-management, organizational-change, transformation, intermediate]

state: {}

trigger: |
  You're the VP of People at a 450-person professional
  services firm ($75M revenue). The CEO has announced a
  major restructuring: transitioning from a geographic
  office model (5 regional offices operating semi-
  autonomously) to a centralized practice-area model (4
  global practice groups). This affects reporting structures,
  compensation, office locations, and client relationships.
  The COO has asked you to conduct a change management risk
  assessment before the restructuring begins.

  Restructuring details:
  - FROM: 5 regional offices (NY, Chicago, Dallas, LA, Miami)
    each with their own P&L, managing partner, and support staff
  - TO: 4 practice groups (Strategy, Operations, Technology,
    Human Capital) with centralized operations

  Impact analysis:
  - 450 employees affected (all of them)
  - 35 people will change reporting managers
  - 5 regional managing partners lose P&L authority (2 will
    become practice leaders, 3 will become senior partners
    with diminished roles)
  - 28 support staff positions being consolidated (HR,
    finance, admin) — 12 positions eliminated
  - Compensation structure changing: Regional bonuses
    replaced by practice-area performance metrics
  - 2 offices (Dallas, Miami) being downsized to satellite
    offices (some people may need to relocate)
  - Client relationships: 120 clients will get new
    relationship managers

  Known resistance factors:
  - Dallas managing partner is threatening to leave and
    take his team (8 people, $6M client portfolio)
  - Chicago office has strongest "local culture" and is most
    resistant
  - Senior partners (55+) see this as diminishing their
    autonomy
  - Support staff are anxious about job security
  - Some clients have expressed concern about "losing their
    team"
  - Union-represented admin staff in NY office (12 people)

  Timeline:
  - Announcement: Already made (2 weeks ago)
  - Phase 1 (months 1-3): Structural changes (reporting,
    leadership assignments)
  - Phase 2 (months 4-6): Process and systems alignment
  - Phase 3 (months 7-12): Culture integration and
    optimization
  - CEO expects "minimal disruption to client work"

  Task: Create the change management risk assessment
  covering people risks (talent loss, morale, resistance),
  operational risks (client disruption, productivity loss),
  financial risks (revenue impact, restructuring costs),
  and execution risks (timeline, change fatigue). Include
  a risk mitigation plan and key risk indicators to monitor
  throughout the transition.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured change management risk assessment — identifies specific people risks (Dallas partner departure, senior partner disengagement, support staff anxiety, union considerations), operational risks (client relationship disruption, productivity dip during transition), financial risks (revenue loss from departures, restructuring costs, lost clients), and execution risks (timeline too aggressive, change fatigue, insufficient communication); each risk is rated with likelihood and impact; the assessment addresses all the known resistance factors."
    weight: 0.35
    description: "StructuredChangeRiskAssessment"
  - type: llm_judge
    criteria: "Response proposes specific risk mitigation strategies — addresses the Dallas partner retention (retention package, client transition protection, role design); proposes Chicago culture integration approach; designs communication plan for support staff (transparency about timelines, severance details, redeployment options); addresses client concerns (proactive communication, relationship transition plan); handles union requirements (consultation, CBA compliance); mitigations are specific to each risk, not generic change management advice."
    weight: 0.35
    description: "SpecificMitigationStrategies"
  - type: llm_judge
    criteria: "Response includes monitoring KRIs and governance — proposes specific Key Risk Indicators to track during the transition (voluntary attrition rate, employee engagement scores, client satisfaction, revenue retention, productivity metrics, cultural survey results); establishes thresholds that trigger escalation; proposes a change governance structure (steering committee, change champions, regular check-ins); the monitoring approach enables early intervention before risks materialize into losses."
    weight: 0.30
    description: "MonitoringKRIsAndGovernance"
