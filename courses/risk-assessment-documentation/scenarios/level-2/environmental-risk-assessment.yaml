meta:
  id: environmental-risk-assessment
  level: 2
  course: risk-assessment-documentation
  type: output
  description: "Environmental risk assessment — assess environmental and climate risks for a company's operations with regulatory compliance analysis"
  tags: [environmental, climate-risk, esg, regulatory-compliance, intermediate]

state: {}

trigger: |
  You're the EHS (Environment, Health & Safety) Manager at
  a 280-person chemical distribution company with 4
  warehouse locations. Your company distributes industrial
  chemicals to manufacturing customers across the Southeast
  US. The board has asked for an environmental risk
  assessment after a competitor received a $2.8M EPA fine
  for improper waste disposal and contaminated groundwater.

  Operations overview:
  - 4 warehouses: Atlanta (HQ), Charlotte, Jacksonville,
    Nashville
  - Products: 380 chemical products (solvents, acids, bases,
    specialty chemicals)
  - Storage: 2.4M gallons total capacity across all sites
  - Transportation: 45 company trucks, 12 hazmat-certified
    drivers
  - Waste generated: 120,000 gallons/year of rinsate,
    expired chemicals, contaminated materials
  - Permits: EPA RCRA generator permits (all sites), DOT
    hazmat, state air permits (Atlanta, Charlotte)

  Current environmental compliance state:
  - Last EPA inspection: 18 months ago (Atlanta only, no
    violations found)
  - RCRA compliance: Generally good but self-audit found
    3 instances of improper satellite accumulation
  - Spill prevention: SPCC plans in place, last updated
    2 years ago
  - Air emissions: VOC emissions tracked quarterly (Atlanta
    near permit limit at 92%)
  - Stormwater: 2 sites have stormwater permits, monthly
    sampling
  - Waste disposal: Contract with licensed TSDF, manifests
    complete
  - Training: Annual hazmat training, RCRA training for
    warehouse staff

  Environmental incidents (past 3 years):
  - 4 small spills (all contained, cleaned up, reported)
  - 1 stormwater exceedance (Charlotte, elevated pH in
    runoff, corrective action taken)
  - 0 EPA enforcement actions
  - 2 customer complaints about chemical odors near
    Jacksonville facility
  - 1 DOT violation for paperwork error on hazmat shipment

  Emerging concerns:
  - Climate risk: Jacksonville warehouse in FEMA flood zone
    (2 hurricanes in last 5 years caused minor flooding)
  - PFAS: 12 products contain PFAS compounds — new EPA
    regulations incoming
  - Community pressure: Neighborhood group near Charlotte
    facility concerned about chemical storage
  - ESG reporting: Board considering voluntary sustainability
    reporting

  Task: Create the environmental risk assessment covering
  regulatory compliance risks, operational environmental
  risks, climate/physical risks, community/reputational
  risks, and emerging regulatory risks (PFAS). Include
  a risk-ranked action plan and compliance improvement
  roadmap.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive environmental risk assessment — covers regulatory compliance (RCRA, Clean Air Act, Clean Water Act, DOT hazmat), operational risks (spills, releases, waste management), climate/physical risks (flooding, hurricanes, supply chain disruption), community/reputational risks (neighbor complaints, community relations), and emerging risks (PFAS regulation, ESG reporting); each risk is rated for likelihood and impact (environmental, financial, reputational); the assessment reflects chemical distribution industry-specific knowledge."
    weight: 0.35
    description: "ComprehensiveEnvironmentalAssessment"
  - type: llm_judge
    criteria: "Response addresses regulatory compliance gaps — identifies the satellite accumulation violations as systemic issues; addresses the Atlanta VOC emissions approaching permit limits (92%); proposes SPCC plan updates; evaluates stormwater management adequacy; addresses DOT compliance improvement; the compliance assessment is specific enough that an EPA inspector would find it credible; identifies areas where current compliance could deteriorate into violations."
    weight: 0.35
    description: "RegulatoryComplianceGapsAddressed"
  - type: llm_judge
    criteria: "Response addresses emerging risks proactively — analyzes PFAS regulatory exposure (which products, what new regulations mean, financial impact); assesses Jacksonville flood risk with climate projections; proposes community engagement strategy for Charlotte; evaluates ESG reporting readiness; the risk action plan prioritizes highest-impact items first; includes cost estimates for remediation and improvement; the assessment positions the company ahead of regulatory changes rather than reacting to them."
    weight: 0.30
    description: "EmergingRisksAddressedProactively"
