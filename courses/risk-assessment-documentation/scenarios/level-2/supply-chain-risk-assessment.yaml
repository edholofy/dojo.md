meta:
  id: supply-chain-risk-assessment
  level: 2
  course: risk-assessment-documentation
  type: output
  description: "Supply chain risk assessment — assess and document risks across a multi-tier supply chain with concentration and geopolitical risks"
  tags: [supply-chain, geopolitical, concentration-risk, resilience, intermediate]

state: {}

trigger: |
  You're the Director of Supply Chain at a 400-person
  consumer electronics company ($85M revenue) that designs
  and sells smart home devices. A recent port strike
  delayed $4M in components for 3 weeks, costing $600K in
  expedited shipping and $1.2M in missed sales. The CEO
  wants a formal supply chain risk assessment.

  Supply chain structure:
  | Tier | Supplier Count | Location | Spend |
  |------|---------------|----------|-------|
  | Tier 1 (assembly) | 3 | China (2), Vietnam (1) | $32M |
  | Tier 2 (components) | 18 | China, Taiwan, S. Korea, Japan | $15M |
  | Tier 3 (raw materials) | Unknown | Various | Unknown |
  | Logistics | 4 | Global | $8M |
  | Packaging | 2 | US | $3M |

  Critical dependencies:
  - 75% of assembly through 1 factory in Shenzhen, China
  - Custom chips from single supplier in Taiwan (TSMC sub)
  - Lithium batteries from 2 suppliers, both in Guangdong
  - Freight forwarding: 60% through one logistics partner
  - Amazon FBA: 45% of sales through Amazon fulfillment

  Known supply chain risks:
  - US-China trade tensions: Tariffs currently 25% on
    finished goods, could increase
  - Taiwan Strait geopolitical risk (affects chip supply)
  - Port congestion: West Coast ports at 90% capacity
  - Supplier financial health: 2 Tier 2 suppliers flagged
    by D&B for declining financials
  - Quality issues: 3% defect rate from Vietnam assembly
    (vs 0.8% from Shenzhen)
  - Lead time variability: 45-90 days (was 30-45 pre-pandemic)
  - Inventory: $6M on hand (8 weeks coverage), $2M in transit
  - Single points of failure: Custom molds owned by supplier
    (not company)

  Recent disruptions (past 18 months):
  1. Port strike: 3-week delay, $1.8M total impact
  2. Chinese New Year extended shutdown: 2-week production gap
  3. Component shortage (capacitors): 6-week delay on one SKU
  4. Vietnam factory quality issue: 12,000 units reworked
  5. Freight cost spike: Container rates doubled for 2 months

  Task: Create the supply chain risk assessment covering
  supplier risks, logistics risks, geopolitical risks,
  concentration risks, and quality risks. Include a tier-by-
  tier analysis, risk quantification, and a resilience
  improvement plan with specific recommendations for
  diversification, inventory strategy, and contingency
  planning.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured supply chain risk assessment — analyzes risks by tier (Tier 1 assembly, Tier 2 components, logistics, Tier 3 materials); identifies concentration risks quantitatively (75% single factory, single-source chips, dual-source batteries both in same region); assesses geopolitical risks (US-China tensions, Taiwan Strait) with scenario impact; rates each risk by likelihood and financial impact; the assessment covers the full supply chain, not just direct suppliers."
    weight: 0.35
    description: "StructuredSupplyChainAssessment"
  - type: llm_judge
    criteria: "Response quantifies risk impact — calculates financial exposure for major disruption scenarios (Shenzhen factory shutdown: revenue impact, lead time impact, alternative cost; Taiwan chip disruption: product availability impact; tariff increase scenarios); uses the recent disruption data ($1.8M port strike impact) to calibrate risk estimates; shows total supply chain risk exposure aggregated across scenarios; the quantification would help the CEO make investment decisions about risk mitigation."
    weight: 0.35
    description: "RiskImpactQuantification"
  - type: llm_judge
    criteria: "Response provides a resilience improvement plan — recommends specific diversification actions (qualify alternative assembly in Vietnam or India, second-source critical components, multi-port logistics strategy); proposes inventory strategy changes (safety stock for critical components, pre-positioning); addresses the mold ownership issue (bring tooling in-house or escrow); includes timeline and investment estimates; the plan is realistic for an $85M company (not suggesting they build their own factory); balances cost of mitigation against risk reduction."
    weight: 0.30
    description: "ResilienceImprovementPlan"
