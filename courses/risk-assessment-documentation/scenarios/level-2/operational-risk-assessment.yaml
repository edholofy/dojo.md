meta:
  id: operational-risk-assessment
  level: 2
  course: risk-assessment-documentation
  type: output
  description: "Operational risk assessment — assess operational risks for a high-volume service operation using RCSA methodology"
  tags: [operational-risk, rcsa, process-risk, controls, intermediate]

state: {}

trigger: |
  You're the VP of Operations at a 500-person mortgage
  processing company that handles 8,000 loan applications
  per month. Regulators (CFPB and state banking departments)
  have identified "operational risk management deficiencies"
  in their latest examination and require you to implement
  a Risk and Control Self-Assessment (RCSA) program within
  90 days.

  Key processes to assess:
  1. Loan application intake (800 daily)
  2. Document verification and underwriting
  3. Credit decisioning (automated + manual)
  4. Closing and funding
  5. Post-closing quality control
  6. Customer communication and disclosure
  7. Third-party vendor management (appraisers, title
     companies)
  8. Data management and reporting

  Recent operational issues:
  - 15% of loan applications have data entry errors
    requiring rework
  - 8 customer complaints to CFPB in past quarter (up from 2)
  - 3 instances of disclosure timing violations (TRID)
  - Title company vendor missed 2 closing deadlines
  - System outage (4 hours) caused $120K in rate lock
    extension costs
  - QC sample found 6% of loans with missing required
    documents
  - Employee processed 3 loans for a family member without
    disclosure (conflict of interest)

  Regulatory requirements:
  - CFPB: Fair lending, TRID disclosure timing, complaint
    management, UDAAP
  - State: Licensing, rate locks, funding timelines
  - Federal: BSA/AML (SAR filing), ECOA (fair lending),
    RESPA (kickback prohibition)
  - Privacy: GLBA, state data breach notification

  Task: Create the RCSA for the mortgage processing
  operation. For each key process, identify inherent risks,
  document existing controls, assess control effectiveness,
  calculate residual risk, and propose improvements. Include
  key risk indicators (KRIs) for ongoing monitoring and
  address the specific regulatory findings.

assertions:
  - type: llm_judge
    criteria: "Response applies RCSA methodology correctly — for each of the 8 key processes: identifies inherent risks (before controls), documents existing controls (preventive and detective), assesses control design and operating effectiveness, calculates residual risk (after controls); uses a consistent rating framework; identifies control gaps (where controls don't adequately mitigate risk); the RCSA format is recognizable to financial services regulators."
    weight: 0.35
    description: "CorrectRCSAApplication"
  - type: llm_judge
    criteria: "Response addresses regulatory findings specifically — proposes remediation for each cited issue (data entry errors, CFPB complaints, TRID violations, vendor management failures, conflict of interest); connects operational risks to regulatory requirements (CFPB, TRID, BSA/AML, ECOA, RESPA); identifies additional regulatory risks that examiners might find; the RCSA demonstrates the company is taking regulatory feedback seriously and implementing systematic improvement."
    weight: 0.35
    description: "RegulatoryFindingsAddressed"
  - type: llm_judge
    criteria: "Response includes practical KRIs and monitoring — proposes specific, measurable Key Risk Indicators for each major risk (error rates, processing times, complaint volumes, exception rates, vendor performance metrics); establishes thresholds that trigger escalation (green/yellow/red); proposes monitoring frequency and reporting structure; the KRI framework enables early detection of emerging operational risks before they become regulatory issues; the monitoring approach is implementable within 90 days."
    weight: 0.30
    description: "PracticalKRIsAndMonitoring"
