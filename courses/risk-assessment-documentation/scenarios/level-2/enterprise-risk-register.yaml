meta:
  id: enterprise-risk-register
  level: 2
  course: risk-assessment-documentation
  type: output
  description: "Enterprise risk register — build a company-wide risk register using a structured ERM framework with risk appetite alignment"
  tags: [enterprise-risk, erm, risk-appetite, framework, intermediate]

state: {}

trigger: |
  You're the Director of Risk Management at a 600-person
  manufacturing company ($150M revenue). The board has
  directed the CEO to implement a formal Enterprise Risk
  Management program. Your first deliverable is a company-
  wide risk register that aligns with the board's risk
  appetite statement.

  Board's risk appetite statement (approved last quarter):
  - "We accept moderate operational risk to drive growth
    and innovation"
  - "We have low tolerance for safety and environmental
    incidents"
  - "We have zero tolerance for fraud, bribery, or ethics
    violations"
  - "We accept moderate financial risk for strategic
    acquisitions"
  - "We have low tolerance for cybersecurity incidents
    affecting customer data"

  Company context:
  - 3 manufacturing plants (US, Mexico, Poland)
  - Products: Industrial components for automotive and
    aerospace
  - Key certifications: ISO 9001, AS9100 (aerospace),
    IATF 16949 (automotive)
  - 180 suppliers across 12 countries
  - 3 acquisitions in last 5 years (integration ongoing)
  - Revenue split: Automotive 55%, Aerospace 30%, Industrial 15%
  - Current risks identified informally by department heads:
    * Supply chain disruption (tariff uncertainty)
    * Quality escape risk (2 recalls in 3 years)
    * Cybersecurity (ransomware attempt blocked 6 months ago)
    * Key customer concentration (top 5 = 60% revenue)
    * Foreign exchange exposure (EUR, MXN)
    * Regulatory compliance (environmental, trade)
    * Talent retention (18% turnover in engineering)
    * Integration risk from recent acquisition

  Task: Build the enterprise risk register covering
  strategic, operational, financial, compliance, and
  reputational risk categories. Include at least 20 risks
  with likelihood/impact ratings, risk owners, current
  controls, treatment plans, and alignment with the board's
  risk appetite statement. Include a risk heat map and
  summary for board reporting.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive enterprise risk register — includes at least 20 risks spanning strategic (market, competition, M&A integration), operational (quality, supply chain, production), financial (FX, customer concentration, credit), compliance (environmental, trade, safety), and reputational categories; each risk has description, likelihood/impact rating, risk score, owner, current controls, treatment plan, and risk appetite alignment; the register is organized for enterprise-level visibility."
    weight: 0.35
    description: "ComprehensiveEnterpriseRegister"
  - type: llm_judge
    criteria: "Response aligns risks with board risk appetite — explicitly maps each risk to the board's appetite statement; identifies risks that exceed appetite (requiring immediate action) vs those within appetite (requiring monitoring); flags zero-tolerance areas (fraud, ethics) with enhanced controls; demonstrates how the risk register operationalizes the board's risk appetite into actionable risk management; includes a risk appetite dashboard or summary showing current risk posture vs appetite."
    weight: 0.35
    description: "RiskAppetiteAlignment"
  - type: llm_judge
    criteria: "Response includes board-ready summary — provides a risk heat map visualization (described or formatted); includes an executive summary highlighting top 5 risks requiring board attention; proposes risk reporting cadence (quarterly board reports, monthly management reviews); identifies emerging risks and trends; the summary is concise enough for a 15-minute board discussion while providing enough detail for informed governance decisions."
    weight: 0.30
    description: "BoardReadySummary"
