meta:
  id: product-launch-risk-assessment
  level: 2
  course: risk-assessment-documentation
  type: output
  description: "Product launch risk assessment — assess risks of launching a new product line including market, technical, regulatory, and competitive risks"
  tags: [product-launch, market-risk, technical-risk, go-to-market, intermediate]

state: {}

trigger: |
  You're the Product Director at a 200-person medical
  device company ($60M revenue). The company is launching
  its first Class II medical device (a smart blood pressure
  monitor with AI-powered health insights) — a major step
  up from your current Class I device portfolio. The CEO
  has invested $8M in development and expects $15M in
  Year 1 revenue. The VP of Regulatory has flagged concerns,
  and the board wants a risk assessment before approving
  the go-to-market budget.

  Product details:
  - SmartBP Pro: AI-powered blood pressure monitor
  - Classification: Class II medical device (510(k) pathway)
  - Features: Continuous monitoring, AI trend analysis,
    physician portal, mobile app
  - Price point: $299 consumer / $199 through insurance
  - Target: Hypertension patients (75M in US)
  - Distribution: Direct-to-consumer (DTC) + healthcare
    provider channel
  - Manufacturing: Contract manufacturer in Malaysia

  Development status:
  - Hardware: Final prototyping, production tooling ordered
  - Software/AI: Beta, FDA submission-ready in 6 weeks
  - 510(k) submission: Planned in 8 weeks
  - Expected FDA clearance: 4-6 months
  - Target launch: 10 months from now

  Risk areas identified:
  - Regulatory: First 510(k) submission, AI/ML component
    adds complexity (FDA's AI/ML framework)
  - Technical: AI algorithm accuracy (97.2% in testing,
    FDA may require 99%+), battery life issues in testing
  - Manufacturing: New contract manufacturer, first medical
    device for them, capacity untested
  - Market: Consumer medical device market is crowded,
    reimbursement pathway unclear
  - Competitive: Withings and Omron have similar products
    launching within 6 months
  - Clinical: No clinical trial data (using literature
    review for 510(k) — FDA may request clinical)
  - Supply chain: Key sensor from single supplier (Japan)
  - Financial: $8M invested, break-even requires 50K unit
    sales

  Board's concerns:
  - "What's the probability of FDA clearance on first
    submission?"
  - "What if the AI algorithm doesn't meet FDA requirements?"
  - "Can we hit $15M revenue in Year 1?"
  - "What are the product liability risks?"

  Task: Create the product launch risk assessment covering
  regulatory, technical, manufacturing, market, competitive,
  clinical, supply chain, and financial risks. Rate each
  risk, identify the critical path risks that could delay
  or kill the launch, and propose a risk mitigation plan
  with decision gates.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive product launch risk assessment — covers all risk categories (regulatory, technical, manufacturing, market, competitive, clinical, supply chain, financial, liability); each risk has specific description, likelihood rating, impact rating, and risk score; identifies which risks are on the critical path (could delay or prevent launch); the assessment reflects understanding of medical device development and FDA regulatory process."
    weight: 0.35
    description: "ComprehensiveProductLaunchAssessment"
  - type: llm_judge
    criteria: "Response addresses board concerns directly — assesses 510(k) clearance probability with supporting rationale (first submission success rate, AI/ML complexity factor, predicate device strength); addresses the AI algorithm risk with specific mitigation (what if 97.2% isn't sufficient — validation plan, alternative algorithms, clinical data options); evaluates the $15M Year 1 revenue target against launch timing, competitive landscape, and market readiness; assesses product liability exposure (AI-driven health recommendations create novel liability)."
    weight: 0.35
    description: "BoardConcernsAddressed"
  - type: llm_judge
    criteria: "Response proposes decision gates and mitigation plan — identifies specific go/no-go decision points (FDA pre-submission feedback, algorithm validation results, manufacturing qualification, 510(k) filing acceptance); for each critical risk, proposes specific mitigation actions with timeline and cost; includes contingency plans (if FDA requests clinical data: timeline impact, cost, alternative strategies); the risk mitigation plan helps the board understand what triggers a course correction or project termination."
    weight: 0.30
    description: "DecisionGatesAndMitigationPlan"
