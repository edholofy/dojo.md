meta:
  id: merger-risk-assessment
  level: 2
  course: risk-assessment-documentation
  type: output
  description: "Merger risk assessment — document risks of a proposed acquisition covering financial, operational, cultural, and integration risks"
  tags: [merger, acquisition, due-diligence, integration-risk, intermediate]

state: {}

trigger: |
  You're the Director of Corporate Development at a 350-
  person industrial automation company ($95M revenue). The
  CEO wants to acquire a 120-person competitor ($28M revenue)
  to expand your product line and enter the food and
  beverage manufacturing vertical. The board requires a
  formal risk assessment before approving the Letter of
  Intent.

  Target company profile:
  - Revenue: $28M (growing 8%/year)
  - EBITDA: $3.5M (12.5% margin)
  - Proposed price: $35M (10x EBITDA)
  - Employees: 120 (42 engineers, 25 sales, 53 operations)
  - Key product: Automated inspection system for food
    processing lines
  - Customers: 85 (mostly mid-size food manufacturers)
  - Top 3 customers: 38% of revenue
  - IP: 12 patents, proprietary software platform
  - Facilities: 1 office/lab (leased, 3 years remaining)

  Due diligence findings (preliminary):
  - Revenue is growing but top-line growth masks customer
    churn (lost 12 customers last year, gained 18)
  - 2 key engineers hold critical product knowledge (no
    documentation)
  - Software platform built on aging technology stack
    (Python 2.7, on-premise)
  - Pending litigation: Former employee alleging patent
    co-inventorship ($2M claim)
  - Customer satisfaction scores declining (NPS dropped from
    45 to 28)
  - Sales team compensation heavily weighted to commissions
    (may resist integration changes)
  - No formal quality management system (no ISO certification)
  - Environmental: No known liabilities but manufacturing
    processes use some regulated chemicals

  Potential synergies identified:
  - Cross-sell to your 200+ existing customers: $8M revenue
    potential
  - Consolidate back-office functions: $1.5M savings
  - Shared engineering resources: $800K savings
  - Combined purchasing power: $400K savings
  - But: Synergy realization typically takes 18-24 months

  Task: Create the acquisition risk assessment covering
  financial risks, operational risks, technology risks,
  people/cultural risks, legal risks, market risks, and
  integration risks. Rate each risk, identify deal-breakers
  vs manageable risks, and propose risk-adjusted deal terms
  or mitigations.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive acquisition risk assessment — covers financial risks (customer concentration, revenue quality, valuation premium), operational risks (no QMS, aging technology, key person dependency), people/cultural risks (engineer retention, sales compensation conflicts), legal risks (patent litigation, environmental), market risks (customer churn trend, competitive dynamics), and integration risks (technology migration, organizational alignment); each risk has a severity rating and likelihood assessment."
    weight: 0.35
    description: "ComprehensiveAcquisitionAssessment"
  - type: llm_judge
    criteria: "Response distinguishes deal-breakers from manageable risks — clearly identifies which risks could be deal-breakers (key engineer departure, patent litigation outcome, technology platform viability) vs which are normal M&A risks with known mitigations; proposes risk-adjusted deal terms (escrow for patent litigation, earnout for revenue retention, retention bonuses for key engineers); the risk assessment helps the board make an informed go/no-go decision, not just a list of scary things."
    weight: 0.35
    description: "DealBreakerDistinction"
  - type: llm_judge
    criteria: "Response addresses integration risk realistically — identifies specific integration challenges (technology stack migration from Python 2.7, customer communication during transition, sales team compensation harmonization, quality system implementation); proposes an integration risk mitigation plan with timeline; addresses the synergy realization risk (typically overstated — what's the downside scenario?); the assessment reflects someone who has seen M&A integrations succeed and fail."
    weight: 0.30
    description: "RealisticIntegrationRisk"
