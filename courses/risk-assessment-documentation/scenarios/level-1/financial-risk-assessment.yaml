meta:
  id: financial-risk-assessment
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "Financial risk assessment — identify and document financial risks facing a small business with mitigation strategies"
  tags: [financial-risk, cash-flow, credit-risk, small-business, beginner]

state: {}

trigger: |
  You're the Controller at a 45-person specialty
  construction company ($12M annual revenue). The owner
  is applying for a $2M line of credit, and the bank has
  asked for a "financial risk assessment" as part of the
  loan application. The owner has asked you to create this
  document.

  Company financial profile:
  - Revenue: $12M (3-year trend: $8M → $10M → $12M)
  - Gross margin: 28% (industry average: 32%)
  - Net income: $480K (4% margin)
  - Cash on hand: $380K
  - Accounts receivable: $2.1M (DSO: 64 days)
  - Current line of credit: $500K (fully drawn)
  - Equipment loans: $1.2M outstanding
  - Backlog: $8M in signed contracts

  Revenue concentration:
  | Client | % Revenue | Payment Terms |
  |--------|-----------|--------------|
  | Apex Developers | 35% | Net 60 |
  | City of Riverside | 18% | Net 45 |
  | Regional Hospital | 15% | Net 30 |
  | Various (12 clients) | 32% | Net 30-60 |

  Known financial risks:
  - 35% revenue concentration with one client
  - Gross margins below industry average (labor and materials
    cost overruns on recent projects)
  - AR aging: $420K is over 90 days (Apex owes $280K of this)
  - 3 fixed-price contracts have eroding margins due to
    material price increases
  - Seasonal cash flow: Q1 is typically cash-negative
  - Workers' comp insurance premium increasing 15%
  - Key estimator (who prices all bids) has no backup
  - No formal financial forecasting or budgeting process

  Owner's guidance:
  - "Be honest but don't make us look bad to the bank"
  - "Show that we know our risks and have plans to manage
    them"
  - "The bank wants to see that we'll be able to service
    the debt"

  Task: Create the financial risk assessment document for
  the bank loan application. Identify and categorize
  financial risks, rate their severity, describe current
  controls and planned mitigations, and include a debt
  service coverage analysis showing the company can handle
  the new line of credit.

assertions:
  - type: llm_judge
    criteria: "Response identifies relevant financial risks — covers revenue concentration (35% single client), credit/collection risk (aging AR, slow-paying client), margin erosion (below industry average, fixed-price contract exposure), cash flow risk (seasonal patterns, current credit utilization), operational risks that have financial impact (key person dependency, no forecasting process); each risk is rated for severity and likelihood; the risks are specific to this construction company's situation."
    weight: 0.35
    description: "RelevantFinancialRisksIdentified"
  - type: llm_judge
    criteria: "Response balances honesty with positioning — acknowledges real risks without being alarmist (as the owner requested); presents mitigations that are credible and actionable; includes a debt service coverage analysis demonstrating ability to repay; positions the company as a well-managed business that understands its risks and is proactively addressing them; the document would give a bank loan officer confidence that the company is creditworthy."
    weight: 0.35
    description: "HonestyWithPositioning"
  - type: llm_judge
    criteria: "Response proposes practical financial risk mitigations — addresses revenue concentration with diversification plan; proposes AR management improvements (collection process, credit policies); suggests margin improvement actions (bidding process, material escalation clauses); includes cash flow management strategy (seasonal planning, credit facility usage); the mitigations are realistic for a 45-person construction company; includes specific financial metrics the company should track."
    weight: 0.30
    description: "PracticalFinancialMitigations"
