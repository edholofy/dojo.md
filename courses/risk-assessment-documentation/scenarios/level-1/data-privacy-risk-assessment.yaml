meta:
  id: data-privacy-risk-assessment
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "Data privacy risk assessment — assess and document data privacy risks for a company handling personal information"
  tags: [data-privacy, gdpr, personal-data, compliance, beginner]

state: {}

trigger: |
  You're the Marketing Operations Manager at a 100-person
  B2C e-commerce company that sells specialty food products
  online. The company has been growing fast (200% in 2 years)
  and customer data management has been ad hoc. The new
  General Counsel has asked every department to conduct a
  data privacy risk assessment because "we're handling
  100,000+ customer records and we have no idea where all
  the data lives or who has access."

  Your department's data handling:
  - Email marketing platform (Klaviyo): 95,000 email
    addresses, purchase history, browsing behavior
  - Customer reviews platform: 12,000 reviews with names
    and email addresses
  - Social media ad platforms: Customer lists uploaded to
    Facebook, Google, TikTok for targeting
  - SMS marketing: 28,000 phone numbers
  - Loyalty program: 15,000 members with names, emails,
    birthdays, purchase history
  - Analytics tools: Google Analytics, Hotjar (session
    recordings), Mixpanel
  - Spreadsheets: 3 team members maintain various customer
    lists on their laptops

  Known issues:
  - No formal data retention policy — you never delete
    anything
  - Customer opt-out requests are handled manually (sometimes
    takes 2 weeks)
  - The SMS list was partially purchased from a data broker
    (unclear consent status)
  - Hotjar records user sessions including form inputs (may
    capture credit card numbers)
  - Customer data is shared with 2 freelance marketers
    who use personal Gmail accounts
  - No data processing agreements with 3 of your 8 vendors
  - California customers (~18% of base) subject to CCPA
  - Some international customers (UK, EU, Canada) — unclear
    GDPR obligations

  General Counsel's questions:
  - "Where does customer personal data live?"
  - "Who has access to it?"
  - "What's our biggest exposure?"
  - "What do we need to fix immediately?"

  Task: Create the data privacy risk assessment for your
  marketing department. Include a data inventory/map, risk
  identification with severity ratings, regulatory compliance
  gaps, and a prioritized remediation plan. Focus on CCPA
  and GDPR exposure.

assertions:
  - type: llm_judge
    criteria: "Response creates a data inventory — maps where personal data lives (email platform, reviews, social ads, SMS, loyalty, analytics, spreadsheets); identifies data types in each system (PII categories); documents who has access (employees, freelancers, vendors); identifies data flows (data shared between systems and with third parties); the inventory is specific to the marketing department's tools and practices, not generic."
    weight: 0.35
    description: "DataInventoryCreated"
  - type: llm_judge
    criteria: "Response identifies specific privacy risks with severity — flags high-severity issues (purchased SMS list with unclear consent, Hotjar potentially capturing credit card data, freelancers using personal Gmail, no DPAs with vendors); rates each risk by likelihood and impact; identifies specific CCPA exposure (California customers' right to know, delete, opt-out) and GDPR exposure (international customers, lawful basis for processing); the risks are specific to the company's actual practices, not theoretical."
    weight: 0.35
    description: "SpecificPrivacyRisksIdentified"
  - type: llm_judge
    criteria: "Response provides a prioritized remediation plan — addresses immediate risks first (stop Hotjar from capturing card data, execute DPAs with vendors, secure freelancer access); then short-term fixes (implement proper opt-out automation, audit SMS list consent, establish data retention policy); then medium-term improvements (privacy program formalization, CCPA compliance process); the remediation plan is practical for a 100-person company without a dedicated privacy team; estimated effort and cost are reasonable."
    weight: 0.30
    description: "PrioritizedRemediationPlan"
