meta:
  id: business-continuity-risk-assessment
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "Business continuity risk assessment — identify and document threats to business operations with recovery priorities"
  tags: [business-continuity, bcp, disaster-recovery, beginner]

state: {}

trigger: |
  You're the Office Manager at a 90-person regional
  insurance agency with 3 offices. After a severe storm
  knocked out power to your main office for 2 days last
  month (costing an estimated $45,000 in lost productivity
  and delayed claims processing), the agency owner wants
  you to conduct a basic business continuity risk assessment.

  Agency operations:
  - Main office (55 people): Underwriting, claims processing,
    accounting, management
  - Branch 1 (20 people, 45 miles away): Sales, customer
    service
  - Branch 2 (15 people, 80 miles away): Sales, customer
    service
  - Critical systems: Agency management system (cloud-based),
    email (Microsoft 365), phone system (VoIP), document
    management (on-premise server)
  - Key processes: New policy processing (24-hour SLA from
    carriers), claims filing, premium collection, customer
    inquiries

  Recent disruption experience:
  - Power outage (2 days): Staff sent home, claims delayed,
    3 customer complaints escalated
  - Internet outage (4 hours, 3 months ago): Cloud systems
    inaccessible, phones down
  - Key employee (lead claims processor) had emergency
    surgery — out 6 weeks, backlog grew to 120 claims

  Infrastructure:
  - No backup generator at any office
  - On-premise document server backed up to external drive
    (manual, weekly)
  - No formal work-from-home capability (some employees have
    laptops, most have desktops)
  - Phone system goes down with internet
  - Paper files still used for some legacy policies

  Owner's request:
  - "What could shut us down and for how long?"
  - "What are our most critical operations?"
  - "What should we invest in first to protect ourselves?"
  - "Keep it simple — I don't need a 100-page plan"

  Task: Create the business continuity risk assessment
  identifying threats, assessing their likelihood and
  impact on operations, documenting critical business
  functions with recovery time objectives, and recommending
  priority investments. Include a simple business impact
  analysis.

assertions:
  - type: llm_judge
    criteria: "Response identifies relevant threats to the agency — covers natural disasters (storms, flooding), infrastructure failures (power, internet, hardware), cyber threats (ransomware, data breach), personnel risks (key person dependency, pandemic), and external events (carrier system outages, regulatory changes); each threat has a likelihood and impact assessment; threats are relevant to a regional insurance agency (not generic corporate risks); the assessment builds on the recent disruption experience."
    weight: 0.35
    description: "RelevantThreatIdentification"
  - type: llm_judge
    criteria: "Response includes a practical business impact analysis — identifies critical business functions and ranks them by urgency (claims processing, customer inquiries, new policy binding, premium collection); assigns recovery time objectives (RTO) and recovery point objectives (RPO) for each function; quantifies the cost of downtime (using the $45K/2-day reference point); identifies dependencies (which systems, people, and facilities each function requires); the BIA is simple enough for a 90-person agency but thorough enough to drive action."
    weight: 0.35
    description: "PracticalBusinessImpactAnalysis"
  - type: llm_judge
    criteria: "Response recommends prioritized investments — proposes specific, actionable improvements ranked by cost-effectiveness (e.g., laptop deployment for remote work capability, backup internet connection, generator for main office, cross-training for key roles, cloud migration for document server); includes rough cost estimates; distinguishes between quick wins and longer-term investments; the recommendations address the most likely disruptions first; the owner could read this and know exactly what to spend money on and in what order."
    weight: 0.30
    description: "PrioritizedInvestmentRecommendations"
