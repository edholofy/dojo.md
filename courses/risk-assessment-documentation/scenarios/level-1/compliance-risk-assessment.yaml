meta:
  id: compliance-risk-assessment
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "Compliance risk assessment — document regulatory compliance risks for a company entering a regulated industry"
  tags: [compliance-risk, regulatory, gap-analysis, beginner]

state: {}

trigger: |
  You're the Compliance Manager at a 70-person fintech
  startup that offers a mobile payment app. The company has
  been operating under a partner bank's licenses, but is now
  applying for its own money transmitter licenses in 15
  states. The VP of Legal has asked you to create a
  compliance risk assessment to support the license
  applications and prepare for state examinations.

  Current compliance state:
  - Operating in 22 states under partner bank's licenses
  - Processing $45M/month in transactions
  - 280,000 active users
  - Current compliance team: You + 1 analyst
  - AML/KYC: Using automated identity verification (Jumio)
  - Transaction monitoring: Basic rules-based system
  - SAR filing: 12 filed in the past year (through partner
    bank)
  - Customer complaints: 340/month (primarily transaction
    disputes)
  - State examinations: None yet (partner bank handles these)

  Known compliance gaps:
  - No formal BSA/AML compliance program documentation
  - Transaction monitoring rules haven't been updated in
    18 months
  - Customer complaint response times average 8 days (some
    states require 3-5 day response)
  - Privacy policy doesn't cover all state-specific
    requirements
  - No independent compliance testing or audit
  - Staff training on AML/compliance is informal (no
    documented training program)
  - Record retention policy exists but isn't consistently
    followed
  - No formal change management process for compliance
    impact assessment

  Regulatory landscape:
  - Federal: Bank Secrecy Act, FinCEN regulations, CFPB
    oversight
  - State: Money transmitter laws (vary by state), NMLS
    requirements
  - Data privacy: State-specific (California CCPA, New York
    DFS cybersecurity)
  - Consumer protection: State AG enforcement, UDAP/UDAAP

  VP of Legal's request:
  - "State examiners will ask to see our compliance risk
    assessment — we need one"
  - "Identify our biggest compliance gaps before the
    examiners find them"
  - "Show we have a plan to remediate — examiners like to
    see progress, not perfection"
  - "Budget implications: Tell me what we need to spend"

  Task: Create the compliance risk assessment covering BSA/
  AML, consumer protection, data privacy, and state-specific
  requirements. Rate each compliance risk, identify gaps,
  and create a remediation roadmap with resource and budget
  requirements.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured compliance risk assessment — covers all major regulatory domains (BSA/AML, consumer protection, data privacy, state money transmitter requirements); each compliance area has specific risk statements with gap identification; risks are rated by severity (regulatory impact) and likelihood (based on current gaps); the assessment format would be acceptable to state examiners as evidence of a compliance program."
    weight: 0.35
    description: "StructuredComplianceAssessment"
  - type: llm_judge
    criteria: "Response identifies specific compliance gaps — flags the most critical issues (no formal BSA/AML program documentation, outdated transaction monitoring, complaint response time violations, no independent testing); explains why each gap matters (what regulatory action could result); prioritizes gaps by regulatory risk level; the gap analysis is specific to a fintech money transmitter (not generic compliance content); addresses the transition from partner bank to independent licensing."
    weight: 0.35
    description: "SpecificComplianceGapsIdentified"
  - type: llm_judge
    criteria: "Response provides a remediation roadmap with budget — proposes specific remediation actions for each gap with timelines; estimates costs (additional staff, technology, external audits, training); phases the remediation realistically (critical gaps before licensing, others over 6-12 months); addresses the resource gap (2-person compliance team is insufficient); the roadmap shows examiners that the company is proactively addressing compliance — building confidence in the license application."
    weight: 0.30
    description: "RemediationRoadmapWithBudget"
