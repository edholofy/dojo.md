meta:
  id: basic-risk-register
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "Basic risk register — create a simple risk register for a department identifying, categorizing, and rating key risks"
  tags: [risk-register, identification, beginner, fundamentals]

state: {}

trigger: |
  You're the Operations Manager at a 60-person e-commerce
  fulfillment company. The CEO has asked all department heads
  to create a risk register for their areas after a warehouse
  fire at a competitor disrupted their business for 3 months.
  You've never created a formal risk register before.

  Your department (Warehouse Operations, 35 employees):
  - Processes 2,000 orders/day from a single warehouse
  - Peak season (Nov-Dec) volume triples
  - Inventory value: $3.2M on-site
  - Equipment: 8 forklifts, conveyor system, packing stations
  - Key vendor: Single shipping carrier for 80% of shipments
  - Recent incidents:
    * Forklift collision damaged $15K in inventory (2 months ago)
    * Power outage stopped operations for 6 hours (4 months ago)
    * Key employee quit during peak season (last year)
    * Customer data breach scare from phishing email (6 months
      ago, contained before damage)

  CEO's guidance:
  - "I don't need a fancy framework — just identify the
    risks, rate them, and tell me what you'd do about each one"
  - "Focus on the risks that could actually shut us down or
    cost real money"
  - "Include who owns each risk"
  - "Keep it practical — something we'll actually review
    quarterly"

  Task: Create the risk register with at least 10 risks
  covering different categories. For each risk, include a
  description, likelihood rating, impact rating, current
  controls, and proposed mitigations. Use a simple 1-5
  rating scale and include a risk heat map summary.

assertions:
  - type: llm_judge
    criteria: "Response creates a well-structured risk register — identifies at least 10 distinct risks across multiple categories (operational, financial, personnel, technology, compliance, external); each risk has a clear description, likelihood rating (1-5), impact rating (1-5), risk score, current controls, proposed mitigations, and owner; the risks are relevant to an e-commerce fulfillment operation; the register is practical and would be usable for quarterly review."
    weight: 0.35
    description: "WellStructuredRiskRegister"
  - type: llm_judge
    criteria: "Response uses appropriate risk rating methodology — the 1-5 likelihood and impact scales are defined with clear descriptions for each level; ratings are consistent and defensible (a warehouse fire should rate higher impact than a minor process delay); includes a risk score calculation (likelihood × impact); presents a visual or described risk heat map showing risk distribution; the methodology is simple enough for a first-time risk manager to use."
    weight: 0.35
    description: "AppropriateRatingMethodology"
  - type: llm_judge
    criteria: "Response provides practical mitigations — proposed actions are specific and actionable (not just 'improve safety' but 'install fire suppression system in Zone B by Q3'); distinguishes between existing controls and proposed improvements; prioritizes risks that could 'shut us down' (single warehouse, single carrier, peak season); mitigations are proportionate to risk level; the register tells the CEO what to worry about and what to do about it."
    weight: 0.30
    description: "PracticalMitigations"
