meta:
  id: workplace-safety-risk-assessment
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "Workplace safety risk assessment — document workplace hazards and safety risks for an OSHA-compliant risk assessment"
  tags: [workplace-safety, osha, hazard-identification, beginner]

state: {}

trigger: |
  You're the Safety Coordinator at a 120-person light
  manufacturing company that produces custom metal parts.
  OSHA conducted a surprise inspection last month and issued
  3 citations. Your Plant Manager has asked you to conduct
  a comprehensive workplace safety risk assessment and
  document it properly — "We can't afford another OSHA
  visit like that."

  OSHA citations received:
  1. Inadequate machine guarding on 2 press brakes (Serious,
     $14,500 fine)
  2. Incomplete lockout/tagout procedures (Serious, $14,500
     fine)
  3. Missing Safety Data Sheets for 4 chemicals (Other,
     $1,200 fine)

  Facility overview:
  - 45,000 sq ft manufacturing floor
  - Equipment: 8 CNC machines, 4 press brakes, 2 welding
    stations, paint booth, assembly area
  - Materials: Sheet metal, aluminum, steel bar stock
  - Chemicals: Cutting fluids, degreasers, paint, solvents
  - 85 production workers (3 shifts), 15 office staff,
    20 warehouse/shipping
  - Injury history (past 12 months): 8 recordable incidents
    (3 lacerations, 2 back strains, 1 eye injury, 1 chemical
    splash, 1 slip/fall)
  - PPE provided: Safety glasses, gloves, steel-toe boots,
    hearing protection

  Work areas to assess:
  1. CNC machining area
  2. Press brake and forming area
  3. Welding stations
  4. Paint booth and finishing
  5. Assembly area
  6. Warehouse and shipping
  7. Maintenance shop
  8. Office area

  Task: Create the workplace safety risk assessment document
  covering all work areas. For each area, identify hazards,
  assess risk severity and likelihood, document current
  controls, and recommend corrective actions. Address the
  3 OSHA citations specifically and include a prioritized
  action plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive safety risk assessment — covers all 8 work areas with specific hazards identified for each (not generic statements but hazards relevant to metalworking — machine entanglement, flying debris, noise exposure, chemical exposure, ergonomic strain, electrical hazards); uses a severity × likelihood risk matrix; documents current controls (PPE, procedures, training) and gaps; the assessment format would satisfy OSHA as evidence of a proactive safety program."
    weight: 0.35
    description: "ComprehensiveSafetyAssessment"
  - type: llm_judge
    criteria: "Response addresses OSHA citations directly — proposes specific corrective actions for each citation (machine guarding specifications, LOTO procedure documentation, SDS management system); corrective actions have deadlines that demonstrate good faith compliance; identifies similar hazards that could lead to future citations; the assessment shows the company is treating the citations as a wake-up call for systemic improvement, not just fixing the 3 cited items."
    weight: 0.35
    description: "OSHACitationResponse"
  - type: llm_judge
    criteria: "Response includes a prioritized action plan — ranks corrective actions by risk severity (life-threatening hazards first, then serious injury potential, then minor); estimates costs for each corrective action; assigns responsibility and timelines; distinguishes between immediate actions (fix guarding this week), short-term (implement LOTO program this month), and long-term (safety culture program this quarter); the action plan is realistic for a 120-person manufacturing company with limited safety resources."
    weight: 0.30
    description: "PrioritizedActionPlan"
