meta:
  id: first-risk-assessment-shift
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "First risk assessment shift — handle a safety incident documentation, a vendor risk escalation, and a compliance audit finding simultaneously"
  tags: [shift-simulation, safety-incident, vendor-escalation, audit-finding, beginner]

state: {}

trigger: |
  You're the Risk and Compliance Coordinator at a 180-person
  food distribution company. Three risk-related situations
  have landed on your desk this morning.

  SITUATION 1 — Safety Incident Documentation:
  A forklift operator in the warehouse backed into a
  shelving unit, causing 3 pallets of product to fall.
  One pallet struck a nearby worker who was treated at
  urgent care for a bruised shoulder and sent home. No
  broken bones, but the worker is out for at least 3 days.

  You need to:
  - Document the incident for OSHA recordkeeping (it's
    recordable — days away from work)
  - Assess what went wrong (the aisle was narrowed by
    temporary storage blocking the normal path)
  - Identify the root cause and contributing factors
  - Recommend corrective actions to prevent recurrence
  - The warehouse manager says "it was just bad luck"

  SITUATION 2 — Vendor Risk Escalation:
  Your primary cold storage logistics vendor (handles 40%
  of your refrigerated shipments) just reported a
  cybersecurity breach affecting their dispatch system.
  They say "customer data wasn't affected" but their
  system is down and shipments are delayed 24-48 hours.
  You have $180K worth of perishable products scheduled
  for delivery today and tomorrow.

  You need to:
  - Assess the immediate business impact
  - Document the vendor risk event
  - Determine if customer notification is required
  - Recommend contingency measures
  - Evaluate if this changes the vendor's risk rating

  SITUATION 3 — Compliance Audit Finding:
  The internal auditor found that temperature monitoring
  logs for one of your cold storage units have gaps — 3
  days last month where temperatures weren't recorded. FDA
  Food Safety Modernization Act (FSMA) requires continuous
  monitoring. The logs were supposed to be checked daily by
  the warehouse supervisor who was on vacation and nobody
  covered the task.

  You need to:
  - Assess the compliance risk severity
  - Determine if any product in that unit is compromised
  - Document the finding with root cause analysis
  - Propose a corrective action plan
  - Decide if this requires notification to customers or
    regulators

  Task: Address all three situations with appropriate risk
  assessment documentation. For each, provide the incident/
  risk documentation, root cause analysis, severity
  assessment, and recommended actions.

assertions:
  - type: llm_judge
    criteria: "Response documents the safety incident properly — includes all OSHA-required elements (date, time, location, employee info, nature of injury, medical treatment, days away from work); conducts root cause analysis beyond 'bad luck' (identifies systemic issue with aisle obstruction and lack of traffic management); recommends corrective actions addressing root causes (aisle marking, storage policies, spotter requirements); the documentation would satisfy an OSHA inspector reviewing the company's incident records."
    weight: 0.35
    description: "SafetyIncidentDocumentation"
  - type: llm_judge
    criteria: "Response addresses the vendor risk event with appropriate urgency — assesses the immediate financial exposure ($180K perishable products); proposes contingency measures (alternative logistics providers, customer communication, product preservation); documents the vendor risk event for the risk register; evaluates whether the cybersecurity breach affects the vendor's risk rating and contract status; determines if customer notification is required (data breach vs operational disruption)."
    weight: 0.35
    description: "VendorRiskEventResponse"
  - type: llm_judge
    criteria: "Response handles the compliance audit finding with appropriate rigor — assesses FSMA compliance severity (temperature monitoring gaps are serious food safety violations); conducts root cause analysis (single point of failure — no backup for supervisor duties); determines product disposition (assess if product integrity was maintained despite log gaps); recommends both immediate corrective actions (verify product safety) and systemic improvements (automated monitoring, backup procedures, documented delegation); addresses regulatory notification requirements."
    weight: 0.30
    description: "ComplianceAuditFindingResponse"
