meta:
  id: project-risk-assessment
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "Project risk assessment — document risks for a software implementation project with likelihood, impact, and response plans"
  tags: [project-risk, software-implementation, response-plans, beginner]

state: {}

trigger: |
  You're a Project Manager at a 200-person accounting firm.
  You're leading the implementation of a new practice
  management software system that will replace the firm's
  15-year-old system. The project sponsor (Managing Partner)
  wants a risk assessment before the project kickoff next
  month.

  Project details:
  - Budget: $450K (software: $180K, implementation: $150K,
    training: $60K, contingency: $60K)
  - Timeline: 8 months (go-live target: October 1)
  - Scope: All 200 employees will use the new system
  - Vendor: Mid-size SaaS provider, selected after 6-month
    evaluation
  - Data migration: 12 years of client records, billing
    history, and documents
  - Integration: Must connect with tax software, document
    management, and email

  Known concerns raised during planning:
  - Senior partners (ages 55-65) are resistant to change —
    "The old system works fine"
  - Tax season (Jan-April) is blackout period — no changes
  - The IT team is 2 people (both stretched thin)
  - Data quality in old system is poor — duplicates,
    incomplete records
  - Last software change (5 years ago) went 3 months over
    schedule
  - New vendor has limited experience with accounting firms
    this size

  Managing Partner's questions:
  - "What could go wrong?"
  - "What risks would delay our October go-live?"
  - "What's our fallback if the new system doesn't work?"
  - "How do we avoid the problems we had last time?"

  Task: Create the project risk assessment document with at
  least 8 risks, each with likelihood and impact ratings,
  risk response strategy (avoid, mitigate, transfer, accept),
  and specific action items. Include a risk response plan
  for the top 3 risks and a risk monitoring approach.

assertions:
  - type: llm_judge
    criteria: "Response identifies relevant project risks — covers technical risks (data migration quality, integration failures, system performance), organizational risks (user adoption, change resistance from senior partners, insufficient IT capacity), schedule risks (timeline too aggressive, tax season constraint, vendor delays), and resource risks (budget overrun, key person dependency); each risk is specific to this project (not generic risk statements); risks address all the concerns raised during planning."
    weight: 0.35
    description: "RelevantProjectRisks"
  - type: llm_judge
    criteria: "Response applies proper risk response strategies — correctly uses risk response types (avoid, mitigate, transfer, accept) for each risk; the response strategy is appropriate for the risk type and severity; action items are specific with owners and timeframes; the top 3 risks have detailed response plans with triggers, escalation paths, and fallback options; addresses the Managing Partner's question about a fallback if the system doesn't work."
    weight: 0.35
    description: "ProperRiskResponseStrategies"
  - type: llm_judge
    criteria: "Response includes practical monitoring approach — proposes how risks will be tracked during the project (risk review frequency, status indicators, escalation criteria); identifies early warning signs for each major risk (leading indicators, not just lagging); addresses lessons learned from the previous failed software change; the risk monitoring approach is lightweight enough for a 2-person IT team to manage; the document would give the Managing Partner confidence that risks are being actively managed."
    weight: 0.30
    description: "PracticalMonitoringApproach"
