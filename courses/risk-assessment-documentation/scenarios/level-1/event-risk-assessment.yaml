meta:
  id: event-risk-assessment
  level: 1
  course: risk-assessment-documentation
  type: output
  description: "Event risk assessment — document risks for a large corporate event covering safety, logistics, financial, and reputational risks"
  tags: [event-risk, safety, logistics, corporate-event, beginner]

state: {}

trigger: |
  You're the Events Manager at a 500-person tech company.
  You're organizing the company's annual customer conference
  — the biggest event of the year. The VP of Marketing (your
  boss) has asked you to create a risk assessment after last
  year's conference had several problems: a keynote speaker
  cancelled 48 hours before, the Wi-Fi crashed during a
  live demo, and a severe thunderstorm forced evacuation
  of an outdoor reception.

  Event details:
  - "TechForward 2026" — 2-day customer conference
  - Venue: Convention center in Austin, TX (June)
  - Expected attendance: 1,200 (800 customers, 200 partners,
    200 employees)
  - Budget: $650K
  - Format: 3 keynotes, 24 breakout sessions, expo hall,
    evening reception, partner dinner
  - Speakers: CEO keynote, 2 industry speakers ($25K each),
    20 internal speakers
  - Technology: Live streaming, event app, Wi-Fi for all
    attendees, AV in all rooms
  - Catering: Lunch both days, breaks, reception, partner
    dinner
  - Travel: Company arranging travel for 120 VIP customers

  Last year's issues:
  1. Keynote speaker (industry analyst) cancelled — had to
     scramble for replacement
  2. Convention center Wi-Fi overloaded with 800+ devices —
     live demo failed on stage
  3. Thunderstorm forced outdoor reception indoors — space
     too small, fire code concerns
  4. Registration line was 45 minutes — angry attendees

  VP's request:
  - "I don't want any surprises this year"
  - "Cover everything — speaker issues, tech failures,
    weather, health emergencies, the works"
  - "For each risk, tell me what we're doing about it"
  - "What's our contingency if something goes wrong?"

  Task: Create the event risk assessment covering safety/
  health risks, technology risks, speaker/content risks,
  weather risks, logistics risks, and financial/reputational
  risks. Include lessons learned from last year and
  contingency plans for the top risks.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive event risk assessment — covers multiple risk categories relevant to a large conference (safety/health, technology, speakers/content, weather, logistics, financial, reputational); identifies at least 12 distinct risks; each risk has likelihood and impact ratings; the assessment is specific to this conference (Austin in June, 1,200 attendees, convention center venue); addresses all 4 of last year's issues with preventive measures."
    weight: 0.35
    description: "ComprehensiveEventAssessment"
  - type: llm_judge
    criteria: "Response includes practical contingency plans — provides specific backup plans for major risks (backup speaker identified and briefed, redundant internet connection, indoor alternative for outdoor events, mobile-first registration to reduce lines); contingency plans include trigger criteria (when do we activate the backup?), responsible persons, and communication protocols; the contingencies are realistic and actionable for an events team."
    weight: 0.35
    description: "PracticalContingencyPlans"
  - type: llm_judge
    criteria: "Response addresses both operational and reputational risks — covers safety risks (medical emergency, fire evacuation, food allergies, severe weather) alongside reputational risks (social media backlash, competitor presence, executive embarrassment from tech failure); includes financial risk mitigation (event insurance, vendor penalties, cancellation policies); the assessment would give the VP of Marketing confidence that the events team is prepared for anything; lessons learned from last year are explicitly incorporated."
    weight: 0.30
    description: "OperationalAndReputationalRisks"
