meta:
  id: operational-resilience-program
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Operational resilience program — design an operational resilience framework meeting UK FCA, EU DORA, and US OCC requirements"
  tags: [operational-resilience, fca, dora, occ, expert]

state: {}

trigger: |
  You're the Global Head of Operational Resilience at a
  multinational bank ($120B assets, 25,000 employees,
  operations in US, UK, EU, Singapore, and Hong Kong). Three
  different regulators have issued operational resilience
  requirements with overlapping but different requirements.
  You need to design one program that satisfies all three.

  Regulatory requirements:
  
  UK FCA/PRA Operational Resilience:
  - Identify "important business services" (IBS)
  - Set "impact tolerances" for each IBS
  - Map dependencies (people, processes, technology, third
    parties, facilities)
  - Conduct scenario testing against impact tolerances
  - Full compliance deadline: March 2025 (already in effect)
  - Self-assessment required annually

  EU DORA (Digital Operational Resilience Act):
  - ICT risk management framework
  - ICT incident management and reporting (within 4 hours
    for major incidents)
  - Digital operational resilience testing (including TLPT —
    threat-led penetration testing)
  - Third-party ICT risk management (register of all ICT
    service providers)
  - Compliance deadline: January 2025 (in effect)

  US OCC/FFIEC Guidance:
  - Sound practices for operational resilience
  - Business continuity management
  - Third-party risk management (OCC 2023-17)
  - Technology risk management
  - No single compliance date but examination focus area

  Your important business services (identified):
  1. Retail payment processing (500M transactions/year)
  2. Corporate lending (origination + servicing)
  3. Securities trading and settlement
  4. Customer account management
  5. AML/sanctions screening
  6. Treasury and liquidity management

  Current state:
  - UK entity has partial operational resilience program
  - EU entity has DORA compliance project underway (behind
    schedule)
  - US entity has traditional BCP program (not resilience-
    focused)
  - No integrated global program
  - Third-party register: 3,200 vendors, no ICT-specific
    classification
  - Testing: Annual BCP tests (basic), no threat-led testing
  - Incident reporting: Different processes in each region

  Task: Design the integrated operational resilience
  framework that satisfies FCA, DORA, and OCC requirements
  through a single program. Include the IBS identification
  methodology, impact tolerance setting, dependency mapping,
  testing program, ICT risk management framework, and the
  third-party ICT register. Address how to manage regulatory
  differences while avoiding duplicative work.

assertions:
  - type: llm_judge
    criteria: "Response designs an integrated framework satisfying all three regulators — maps FCA, DORA, and OCC requirements to identify overlaps and gaps; creates a unified program structure that addresses all requirements without duplication; handles regulatory differences (FCA's impact tolerances vs DORA's ICT focus vs OCC's examination expectations); the framework demonstrates genuine understanding of each regulation's requirements and philosophy; the approach would be defensible to all three regulators simultaneously."
    weight: 0.35
    description: "IntegratedMultiRegulatorFramework"
  - type: llm_judge
    criteria: "Response addresses impact tolerance setting and testing — proposes methodology for setting impact tolerances for each IBS (based on customer impact, market impact, financial impact); designs a comprehensive testing program (scenario testing against impact tolerances, TLPT for DORA, annual BCP tests for OCC); the testing program reveals vulnerabilities without creating operational risk; addresses how to test across jurisdictions (multi-region scenarios); the impact tolerances are specific enough to be measurable."
    weight: 0.35
    description: "ImpactTolerancesAndTesting"
  - type: llm_judge
    criteria: "Response includes practical implementation for the global program — proposes governance structure (global resilience function with regional leads); addresses the third-party ICT register requirement (classifying 3,200 vendors by ICT criticality); designs incident reporting that satisfies DORA's 4-hour requirement and other regional requirements; proposes a dependency mapping methodology that works across jurisdictions; the implementation plan addresses the EU entity being behind schedule on DORA; the program is scalable and sustainable."
    weight: 0.30
    description: "PracticalGlobalImplementation"
