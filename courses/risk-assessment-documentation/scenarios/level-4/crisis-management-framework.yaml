meta:
  id: crisis-management-framework
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Crisis management framework — design a comprehensive crisis management and escalation framework for a multinational company"
  tags: [crisis-management, escalation, crisis-response, multinational, expert]

state: {}

trigger: |
  You're the SVP of Enterprise Risk at a Fortune 200
  consumer products company ($12B revenue, 45,000 employees,
  operations in 60 countries). After three unrelated crises
  in the past 18 months (product contamination recall,
  factory explosion in Vietnam, and executive misconduct
  scandal), the CEO has concluded that "our crisis
  management is ad hoc — we're always scrambling instead
  of executing a plan."

  Recent crisis performance review:
  
  Crisis 1 — Product contamination (6 months ago):
  - Consumer reported illness from contaminated product
  - 18 hours before crisis team was assembled
  - No playbook for product recall — improvised response
  - Media got ahead of the narrative (social media video
    went viral before company responded)
  - 850,000 units recalled, $35M direct cost
  - Stock dropped 8% ($1.2B market cap loss)
  - Recovery: 4 months to restore brand trust in that market

  Crisis 2 — Factory explosion, Vietnam (12 months ago):
  - Explosion killed 2 workers, injured 12
  - Local country team managed response without informing
    HQ for 6 hours
  - No crisis communication protocol for international
    incidents
  - Local media reported inaccurate death toll (said 5,
    actually 2)
  - Vietnamese government investigation ongoing
  - $45M in damages and lost production

  Crisis 3 — Executive misconduct (15 months ago):
  - SVP arrested for financial fraud (personal, not company)
  - Board notified 48 hours after arrest
  - No holding statement prepared — media inquiries went
    unanswered for 24 hours
  - Competitor planted story linking fraud to company culture
  - Investigation revealed 3 other executives with
    undisclosed conflicts of interest

  CEO's mandate:
  - "Build a crisis management system that works across all
    60 countries"
  - "Ensure any crisis anywhere is reported to the right
    people within 1 hour"
  - "Have playbooks for the top 20 crisis scenarios"
  - "I want to know we're ready — test it regularly"
  - "Coordinate with legal, communications, operations, and
    government affairs"

  Task: Design the comprehensive crisis management framework
  including the crisis classification and escalation
  protocol, 24/7 notification system, crisis team structure,
  scenario-specific playbooks for the top crisis types,
  crisis communication framework, and the testing/exercise
  program. Apply lessons learned from all three recent crises.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive crisis management framework — includes crisis classification levels (e.g., Level 1-4 with clear criteria for each level); escalation protocol that ensures 1-hour notification; 24/7 global crisis notification system design; crisis management team structure (corporate level, regional level, functional roles); clearly defined roles and responsibilities during crisis; the framework addresses the 60-country operational footprint with appropriate regional structure."
    weight: 0.35
    description: "ComprehensiveCrisisFramework"
  - type: llm_judge
    criteria: "Response includes scenario-specific playbooks — develops playbooks for top crisis types (product safety/recall, workplace fatality, cyber incident, executive misconduct, natural disaster, regulatory enforcement, activist targeting, supply chain failure); each playbook has decision trees, communication templates, stakeholder notification lists, and regulatory requirements; playbooks address the specific failures from the 3 recent crises (18-hour assembly delay, 6-hour HQ notification gap, 48-hour board notification); the playbooks are actionable (not just checklists but decision frameworks)."
    weight: 0.35
    description: "ScenarioSpecificPlaybooks"
  - type: llm_judge
    criteria: "Response addresses crisis communication and testing — designs crisis communication framework (holding statements, media response protocols, social media monitoring and response, internal communication cascade); addresses the international communication challenge (local media, language, cultural sensitivity); proposes a testing and exercise program (tabletop exercises, simulation exercises, full-scale drills) with regular cadence; applies specific lessons from each recent crisis to prevent recurrence; the testing program validates the framework works under pressure."
    weight: 0.30
    description: "CommunicationAndTesting"
