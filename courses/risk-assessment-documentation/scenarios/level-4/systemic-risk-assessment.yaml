meta:
  id: systemic-risk-assessment
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Systemic risk assessment — assess interconnected risks across a financial institution's portfolio with contagion and cascade analysis"
  tags: [systemic-risk, contagion, cascade-analysis, financial-institution, expert]

state: {}

trigger: |
  You're the Group CRO of a $50B diversified financial
  services holding company (12,000 employees) with
  subsidiaries in banking, insurance, asset management,
  and wealth management. The Federal Reserve has issued
  new guidance requiring large financial institutions to
  conduct "systemic risk assessments" that go beyond
  traditional risk silos to identify interconnected and
  cascading risks. Your assessment is due in 90 days.

  Subsidiary structure:
  | Entity | Assets/AUM | Risk Profile |
  |--------|-----------|-------------|
  | Community Bank | $18B assets | Credit, interest rate, liquidity |
  | Insurance Co | $8B premium | Underwriting, catastrophe, reserve |
  | Asset Management | $45B AUM | Market, operational, fiduciary |
  | Wealth Management | $12B AUM | Operational, fiduciary, compliance |
  | Fintech Subsidiary | $200M revenue | Technology, cyber, regulatory |

  Interconnected risk scenarios to assess:
  1. "Contagion scenario": Insurance subsidiary catastrophe
     loss ($800M) triggers rating downgrade → bank funding
     costs increase → asset management clients withdraw →
     holding company liquidity crisis
  2. "Cyber cascade": Ransomware hits shared IT infrastructure
     → all subsidiaries affected → regulatory sanctions from
     5 different regulators → reputational crisis
  3. "Market stress": 30% equity decline → asset management
     AUM drops $13.5B → management fee revenue collapses →
     insurance investment portfolio losses → bank commercial
     real estate loan defaults spike
  4. "Regulatory cascade": Fintech subsidiary enforcement
     action → congressional scrutiny → all subsidiaries
     face enhanced examination → compliance costs double

  Current risk management:
  - Each subsidiary has its own CRO and risk framework
  - No integrated risk reporting across subsidiaries
  - Capital adequacy assessed at subsidiary level, not
    consolidated
  - Stress testing performed separately (not integrated
    scenarios)
  - Shared services: IT, HR, Legal, Compliance (creates
    operational concentration)
  - Intercompany transactions: $2.8B annually (creates
    financial interconnections)

  Fed's expectations:
  - "Identify risks that span multiple subsidiaries"
  - "Model cascade and contagion effects"
  - "Assess capital adequacy under combined stress scenarios"
  - "Demonstrate board-level understanding of systemic risks"
  - "Show how risk governance prevents cascade failures"

  Task: Conduct the systemic risk assessment modeling
  interconnected risks across all subsidiaries. Include
  the cascade analysis for each scenario, aggregated stress
  testing results, capital adequacy assessment under
  combined stress, and the integrated risk governance
  framework. Address how to break contagion chains through
  structural and operational measures.

assertions:
  - type: llm_judge
    criteria: "Response models interconnected risks with cascade analysis — for each of the 4 scenarios, traces the transmission mechanism from initial event through each subsidiary; quantifies the cumulative impact (not just the sum of individual impacts, but the amplified effect of interconnection); identifies where contagion accelerates and where structural barriers could break the chain; the cascade analysis demonstrates genuine understanding of how risks propagate across a diversified financial institution."
    weight: 0.35
    description: "CascadeAnalysisModeling"
  - type: llm_judge
    criteria: "Response includes integrated stress testing and capital adequacy — performs combined stress scenarios (not just subsidiary-level tests run separately); calculates aggregated capital impact under each scenario; identifies which scenarios threaten holding company solvency; addresses the intercompany transaction exposure ($2.8B); evaluates shared services concentration risk; the capital adequacy assessment would satisfy Federal Reserve supervisory expectations."
    weight: 0.35
    description: "IntegratedStressTestingAndCapital"
  - type: llm_judge
    criteria: "Response proposes structural measures to reduce systemic risk — identifies specific actions to break contagion chains (ring-fencing subsidiaries, intercompany exposure limits, independent IT systems for critical functions, separate stress buffers per subsidiary); proposes an integrated risk governance framework (consolidated CRO reporting, cross-subsidiary risk committee, integrated risk reporting); addresses the fundamental tension between shared services efficiency and operational resilience; the measures are practical and proportionate."
    weight: 0.30
    description: "ContagionBreakingMeasures"
