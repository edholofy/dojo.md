meta:
  id: risk-quantification-framework
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Risk quantification framework — design an enterprise-wide risk quantification methodology using Monte Carlo simulation and FAIR principles"
  tags: [risk-quantification, monte-carlo, fair, methodology, expert]

state: {}

trigger: |
  You're the CRO of a $3B technology company (9,500
  employees). The board has decided that qualitative risk
  assessments ("high/medium/low") are no longer sufficient
  for strategic decision-making. They want every material
  risk quantified in financial terms with probability
  distributions. You need to design the enterprise risk
  quantification framework.

  Current state:
  - 85 risks in the enterprise risk register (all rated
    qualitatively on 5×5 heat map)
  - Board reviews heat map quarterly but says: "We can't
    make resource allocation decisions based on colors"
  - No financial quantification of any risk
  - Risk appetite defined qualitatively ("low tolerance
    for cyber risk") — not in dollar terms
  - Different risk domains use different methodologies
  - No aggregated risk view (can't answer "what's our total
    risk exposure?")

  Risk domains requiring quantification:
  1. Cybersecurity (12 risks): Data breach, ransomware,
     supply chain attack, insider threat
  2. Operational (18 risks): System outage, process failure,
     vendor failure, quality escape
  3. Strategic (8 risks): Market disruption, M&A failure,
     product launch failure
  4. Financial (10 risks): Currency, credit, liquidity,
     fraud
  5. Compliance/Legal (15 risks): Regulatory fine, lawsuit,
     contract dispute
  6. Reputational (7 risks): PR crisis, customer trust,
     brand damage
  7. People (10 risks): Key person loss, labor shortage,
     workplace safety
  8. ESG (5 risks): Climate, social responsibility,
     governance failure

  Data availability challenges:
  - Historical loss data: Limited (5 years, incomplete
    for most categories)
  - Industry benchmarks: Available for cyber and financial
    risks, sparse for others
  - Expert judgment: Available but subjective
  - Insurance claims: Some data but doesn't cover all risks
  - Near-miss data: Not systematically collected

  Board's requirements:
  - "Every risk quantified in dollars with a range"
  - "Show me total enterprise risk exposure"
  - "Help me decide where to invest the next $10M in risk
    mitigation"
  - "Make risk appetite quantitative — tell me our
    tolerance in dollars, not adjectives"

  Task: Design the enterprise risk quantification framework
  including the methodology for each risk domain, the data
  collection and calibration approach, the Monte Carlo
  simulation design for aggregated risk, the quantitative
  risk appetite framework, and the implementation roadmap.
  Address how to handle domains with limited historical data.

assertions:
  - type: llm_judge
    criteria: "Response designs a rigorous quantification methodology — applies appropriate methods for each risk domain (FAIR for cyber, actuarial methods for insurance-like risks, scenario-based Monte Carlo for strategic risks, market data for financial risks); addresses how to handle limited data (expert judgment calibration, Bayesian updating, reference classes, industry benchmarks); the methodology produces probability distributions (not point estimates); the aggregation approach accounts for correlations between risks (not just summing individual risk estimates)."
    weight: 0.35
    description: "RigorousQuantificationMethodology"
  - type: llm_judge
    criteria: "Response creates a quantitative risk appetite framework — translates qualitative risk appetite into dollar terms (e.g., 'low tolerance for cyber risk' becomes 'maximum acceptable annual cyber loss: $15M at 95% confidence'); establishes risk appetite at enterprise, domain, and individual risk levels; shows how quantified risk appetite drives resource allocation (where risk exceeds appetite, investment is justified); the framework enables the board to make informed trade-off decisions between risk reduction investments."
    weight: 0.35
    description: "QuantitativeRiskAppetite"
  - type: llm_judge
    criteria: "Response includes practical implementation approach — proposes phased rollout (start with highest-impact risk domains, expand to others); addresses the data collection challenge with specific strategies for each domain; designs expert judgment calibration process (anchoring reduction, confidence interval training, reference class forecasting); proposes technology platform requirements; addresses organizational change (risk managers need training in quantitative methods); the implementation is realistic for a company transitioning from qualitative to quantitative risk management."
    weight: 0.30
    description: "PracticalImplementation"
