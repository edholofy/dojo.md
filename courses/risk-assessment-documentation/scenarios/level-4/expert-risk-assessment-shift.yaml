meta:
  id: expert-risk-assessment-shift
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Expert risk assessment shift — handle a systemic vendor failure cascade, a regulatory investigation into risk management practices, and a board-level risk governance crisis simultaneously"
  tags: [shift-simulation, vendor-cascade, regulatory-investigation, governance-crisis, expert]

state: {}

trigger: |
  You're the Group CRO of a $8B financial conglomerate
  (22,000 employees). Three interconnected risk crises
  have erupted simultaneously.

  SITUATION 1 — Systemic Vendor Failure Cascade:
  Your primary cloud infrastructure vendor (used by all
  subsidiaries) has suffered a catastrophic data center
  failure affecting their US-East region. Impact:
  - 60% of your production systems are offline (T+4 hours)
  - Client-facing trading systems: DOWN
  - Regulatory reporting systems: DOWN
  - Internal risk management systems: DOWN (you can't
    monitor your own risk exposure)
  - The vendor says recovery is "24-48 hours" but their
    status page shows no progress
  - 3 other critical vendors (data feeds, authentication,
    communications) are also affected because they use the
    same cloud provider
  - Your DR plan assumes vendor availability — it doesn't
    cover vendor-wide failure
  - Regulatory clock is ticking: SEC, FINRA, FCA all require
    timely trade reporting

  SITUATION 2 — OCC Investigation Into Risk Practices:
  Unrelated to the outage, the OCC has informed you that
  they're conducting a targeted examination of your risk
  management practices. The letter states:
  - "Concerns regarding the adequacy of the enterprise risk
    management framework"
  - "Questions about the independence of the risk management
    function"
  - "Review of risk appetite framework implementation"
  - "Assessment of stress testing methodology and assumptions"
  - They want to interview you personally next week
  - An internal whistleblower has alleged that the head of
    trading pressured your risk analysts to approve limit
    breaches
  - The whistleblower allegation is true — you reported it
    to the audit committee 3 months ago but remediation has
    been slow

  SITUATION 3 — Board Risk Governance Crisis:
  The lead independent director has called an emergency
  board session because:
  - The vendor outage has made national news ("Financial
    Giant Goes Dark")
  - Two board members are questioning whether the risk
    committee (which they chair) has been effective
  - The OCC investigation letter was leaked to a financial
    reporter
  - An activist investor has cited the outage and OCC
    investigation as evidence of "systemic risk governance
    failure"
  - The CEO is privately asking the board chair if the CRO
    should be replaced

  Task: Address all three crises with integrated risk
  responses. For the vendor failure, conduct the real-time
  risk assessment and recovery strategy. For the OCC
  investigation, prepare your interview strategy and
  remediation evidence. For the board crisis, present
  the risk governance defense and improvement plan. Your
  career depends on demonstrating that these events,
  while serious, are being managed by a competent CRO.

assertions:
  - type: llm_judge
    criteria: "Response handles the vendor failure with crisis-level risk assessment — assesses the cascading impact across all subsidiaries; identifies regulatory notification obligations (SEC, FINRA, FCA timelines for trade reporting); proposes immediate workaround strategies (manual processes, alternative systems, inter-subsidiary support); addresses the DR gap (plan didn't cover vendor-wide failure); the response demonstrates calm, systematic crisis management — the hallmark of a competent CRO under extreme pressure."
    weight: 0.35
    description: "VendorFailureCrisisResponse"
  - type: llm_judge
    criteria: "Response prepares for OCC investigation strategically — develops interview preparation that's honest about weaknesses while demonstrating remediation progress; addresses the whistleblower allegation directly (reported to audit committee, remediation underway — this shows the system works); proposes evidence of risk management effectiveness (what has worked well, what is being improved); navigates the tension between transparency with regulators and protecting the institution; the strategy would build OCC confidence in CRO competence."
    weight: 0.35
    description: "OCCInvestigationPreparation"
  - type: llm_judge
    criteria: "Response addresses the board governance crisis with authority — presents to the board with confidence (not defensiveness); proposes immediate risk governance improvements that demonstrate responsiveness; addresses the CEO's private questioning by showing leadership; responds to the activist investor with specific governance enhancements; all three responses are internally consistent and collectively tell the story of a CRO who is managing through a perfect storm — not the cause of one; the response would preserve the CRO's position and credibility."
    weight: 0.30
    description: "BoardGovernanceCrisisResponse"
