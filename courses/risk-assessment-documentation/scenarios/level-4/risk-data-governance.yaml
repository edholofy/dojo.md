meta:
  id: risk-data-governance
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Risk data governance — design a risk data aggregation and reporting framework meeting BCBS 239 principles"
  tags: [risk-data, bcbs-239, data-governance, aggregation, expert]

state: {}

trigger: |
  You're the Chief Data Officer at a $80B global bank
  (32,000 employees, operations in 18 countries). The bank
  has been identified as a Global Systemically Important
  Bank (G-SIB) and must comply with BCBS 239 (Principles
  for Effective Risk Data Aggregation and Risk Reporting).
  A recent self-assessment found the bank is compliant with
  only 4 of 14 BCBS 239 principles.

  Current risk data challenges:
  - 47 different risk systems across business lines
  - No single source of truth for counterparty exposure
  - Market risk, credit risk, and operational risk use
    different data definitions
  - 3,200 manual data reconciliations performed monthly
  - Risk reports take 5-10 business days to produce
    (regulators expect T+1)
  - Data quality: Estimated 8% error rate in risk data
  - 12 separate customer master files across entities
  - Legacy systems (some 20+ years old) can't produce
    required granularity
  - $240M has been spent on data remediation over 5 years
    with limited progress

  BCBS 239 compliance gaps (self-assessment):
  | Principle | Status | Gap |
  |-----------|--------|-----|
  | 1. Governance | Partial | No board-approved risk data framework |
  | 2. Data architecture | Non-compliant | No integrated risk data architecture |
  | 3. Accuracy | Partial | 8% error rate exceeds tolerance |
  | 4. Completeness | Non-compliant | Material gaps in OTC derivatives data |
  | 5. Timeliness | Non-compliant | T+5 to T+10 (target: T+1) |
  | 6. Adaptability | Non-compliant | Can't produce ad hoc reports in stress |
  | 7. Accuracy of reports | Partial | Reports require manual adjustment |
  | 8-11. Reporting principles | Mixed | Various gaps |
  | 12-14. Supervisory review | N/A | Pending |

  Regulatory pressure:
  - Supervisors have set 24-month deadline for material
    remediation
  - Peer banks: 3 of 5 G-SIB peers are fully compliant
  - Failure to comply: Enhanced supervisory scrutiny,
    potential capital surcharges
  - The board is frustrated: "$240M spent and we're still
    non-compliant"

  Task: Design the risk data governance and aggregation
  framework to achieve BCBS 239 compliance. Include the
  data governance structure, the integrated risk data
  architecture, the data quality management program, the
  reporting modernization plan, and the 24-month
  implementation roadmap. Address why previous $240M
  investment failed and how this time will be different.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive BCBS 239 compliance framework — addresses each of the 14 principles with specific initiatives; proposes an integrated risk data architecture that resolves the 47-system fragmentation; designs data governance structure (CDO role, data stewards, data owners, quality management); the framework addresses the fundamental challenges (no single source of truth, manual reconciliations, timeliness) with architectural solutions, not just process fixes."
    weight: 0.35
    description: "ComprehensiveBCBS239Framework"
  - type: llm_judge
    criteria: "Response addresses why previous investment failed and proposes different approach — identifies root causes of the $240M failure (likely: tactical fixes without architectural redesign, no data governance mandate, business line resistance, legacy system workarounds); proposes how this program differs (enterprise architecture approach, executive sponsorship, business line accountability, phased legacy system retirement); the approach builds board confidence that this time will produce results; includes realistic cost estimate for the 24-month program."
    weight: 0.35
    description: "LessonsFromPreviousFailure"
  - type: llm_judge
    criteria: "Response includes practical implementation roadmap — phases the 24-month program realistically (quick wins in first 6 months, foundation building in months 6-12, transformation in months 12-24); prioritizes the highest-impact compliance gaps (timeliness and completeness for immediate regulatory pressure); addresses the 3,200 manual reconciliations with automation strategy; proposes metrics to track compliance progress; the roadmap accounts for organizational change management and resistance; the program is ambitious but achievable given the regulatory deadline."
    weight: 0.30
    description: "PracticalImplementationRoadmap"
