meta:
  id: geopolitical-risk-assessment
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Geopolitical risk assessment — assess and document geopolitical risks for a multinational company with operations in volatile regions"
  tags: [geopolitical, multinational, country-risk, sanctions, expert]

state: {}

trigger: |
  You're the VP of Global Risk at a $4B multinational
  industrial company (18,000 employees, operations in 32
  countries). The board has requested a comprehensive
  geopolitical risk assessment after sanctions escalations,
  trade wars, and political instability have caused $120M
  in losses over the past 2 years. The CEO says "we can't
  keep being surprised by geopolitics — we need to see
  these coming."

  Global operations at risk:
  | Region | Revenue | Employees | Key Risk |
  |--------|---------|-----------|----------|
  | China | $680M | 2,800 | US-China decoupling, IP theft |
  | Russia/CIS | $45M | 180 | Sanctions, asset seizure |
  | Middle East | $320M | 1,200 | Conflict, sanctions complexity |
  | India | $280M | 2,400 | Regulatory unpredictability |
  | Brazil | $195M | 900 | Political instability, currency |
  | Turkey | $110M | 450 | Currency crisis, authoritarianism |
  | Nigeria | $85M | 280 | Security, corruption, FX controls |
  | Southeast Asia | $340M | 1,800 | China influence, military coups |

  Recent geopolitical losses:
  - Russia: $28M in stranded assets after sanctions required
    exit (2022-2023)
  - China: $45M contract cancelled due to US export controls
    on advanced technology
  - Nigeria: $18M in trapped cash due to FX controls
  - Turkey: $15M FX loss in one quarter from lira collapse
  - Myanmar: $14M write-off after military coup disrupted
    operations

  Key geopolitical risks to assess:
  1. US-China technology decoupling: Export controls,
     entity list risk, forced technology transfer
  2. Sanctions expansion: Russia secondary sanctions,
     potential China sanctions, Iran/Syria complexity
  3. Taiwan contingency: Impact on semiconductor supply
     chain and Asia operations
  4. Resource nationalism: Mining and energy sector
     government intervention
  5. Trade bloc fragmentation: BRICS vs G7, supply chain
     reshoring pressure
  6. Domestic political instability in operating countries
  7. Currency and capital controls in emerging markets
  8. Climate policy divergence between jurisdictions

  Task: Conduct the geopolitical risk assessment covering
  all 8 regions with scenario analysis. Include country
  risk ratings, scenario modeling for the top 3 geopolitical
  risks (with financial impact), the early warning indicator
  system, and strategic recommendations for portfolio
  resilience. Address the specific $120M in losses and how
  to prevent recurrence.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured geopolitical risk assessment — rates each country/region across multiple dimensions (political stability, regulatory risk, sanctions exposure, economic risk, security risk, IP protection); uses a consistent rating methodology; identifies which geopolitical risks are acute (could materialize in 6-12 months) vs chronic (ongoing structural risks); the assessment demonstrates genuine geopolitical analysis (not just listing risks but understanding their drivers and interconnections)."
    weight: 0.35
    description: "StructuredGeopoliticalAssessment"
  - type: llm_judge
    criteria: "Response includes scenario modeling with financial impact — develops detailed scenarios for top 3 geopolitical risks (e.g., Taiwan crisis: supply chain disruption + China operations at risk + sanctions implications; US-China decoupling acceleration: revenue loss, forced divestiture, technology restrictions); quantifies financial impact under each scenario (revenue at risk, asset impairment, supply chain costs); identifies timeline and probability estimates; the scenarios are specific enough to drive strategic decisions."
    weight: 0.35
    description: "ScenarioModelingWithFinancialImpact"
  - type: llm_judge
    criteria: "Response proposes an early warning system and strategic resilience — designs specific early warning indicators for each major geopolitical risk (policy signals, political developments, market indicators, intelligence sources); proposes monitoring cadence and escalation triggers; recommends strategic actions for portfolio resilience (geographic diversification, supply chain redundancy, sanctions compliance program, political risk insurance, government relations); addresses the $120M in past losses with specific improvements that would have prevented or mitigated them."
    weight: 0.30
    description: "EarlyWarningAndStrategicResilience"
