meta:
  id: integrated-risk-reporting
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Integrated risk reporting — design a board-level risk reporting system that connects risk to strategy and performance"
  tags: [risk-reporting, board-governance, kri, dashboard, expert]

state: {}

trigger: |
  You're the CRO of a $5B diversified technology company
  (15,000 employees, publicly traded). The board chair has
  told you privately: "I've been on boards for 20 years,
  and your risk reports are the worst I've seen. I get 80
  pages of data, 200 risks, and no insight. I can't tell
  what keeps you up at night, what we should worry about,
  or how risk connects to our strategy. Fix this."

  Current risk reporting problems:
  - 80-page quarterly risk report (board members admit to
    reading only executive summary)
  - 200 risks listed (heat map is a "wall of orange" with
    no differentiation)
  - No connection between risks and strategic objectives
  - KRIs tracked but not linked to risk appetite
  - Risk trends not visible (is risk increasing or
    decreasing?)
  - No forward-looking risk indicators (all backward-looking
    metrics)
  - Different format every quarter (no consistency for trend
    analysis)
  - Emerging risks buried in an appendix
  - No connection to competitor risk events
  - Board meetings spend 15 minutes on risk (vs 90 minutes
    on strategy and performance)

  Company's strategic objectives:
  1. Grow cloud revenue to 60% of total (currently 40%)
  2. Expand into Asia-Pacific (2 new countries per year)
  3. Complete 2-3 acquisitions per year ($500M-1B each)
  4. Achieve 25% operating margin (currently 18%)
  5. Maintain ESG leadership position

  Risk appetite framework (approved but not operationalized):
  - Financial: Maximum acceptable EBITDA impact from risk
    events: $200M per year
  - Operational: Maximum tolerable downtime: 4 hours for
    critical systems
  - Compliance: Zero tolerance for material regulatory
    violations
  - Strategic: Willing to accept moderate risk for growth
    investments
  - Reputational: Low tolerance for events affecting brand
    value

  Task: Redesign the board risk reporting framework from
  scratch. Create a model quarterly risk report (maximum
  10 pages), an executive risk dashboard, KRI framework
  linked to risk appetite, emerging risk radar, and the
  risk-strategy linkage map. The report should make risk
  governance a 30-minute strategic conversation, not a
  15-minute compliance exercise.

assertions:
  - type: llm_judge
    criteria: "Response redesigns reporting from 80 pages to meaningful insight — creates a 10-page-or-fewer quarterly risk report with clear structure (top risks, risk appetite status, emerging risks, risk trend indicators, strategic risk alignment); every page has a purpose and tells part of the risk story; eliminates the 'wall of orange' heat map with differentiated risk visualization; the report design would change board risk discussion from compliance review to strategic conversation."
    weight: 0.35
    description: "MeaningfulRiskReporting"
  - type: llm_judge
    criteria: "Response connects risk to strategy — maps each strategic objective to its associated risks (cloud growth: technology risk, cyber risk, execution risk; APAC expansion: geopolitical, regulatory, execution risk; M&A: integration, valuation, cultural risk); shows how risk management enables or constrains strategic execution; risk appetite is operationalized with specific metrics linked to each strategic objective; the risk-strategy linkage map would be immediately understood by board members."
    weight: 0.35
    description: "RiskStrategyLinkage"
  - type: llm_judge
    criteria: "Response includes forward-looking elements — designs KRI framework with leading indicators (not just trailing metrics); creates an emerging risk radar showing risks on the horizon with timeline and potential impact; includes competitor risk event tracking (what has happened to peers and what it means for us); proposes risk trend analysis showing whether the risk profile is improving or deteriorating; the forward-looking elements enable proactive governance decisions rather than reactive responses; the reporting framework would make the board chair confident in the risk oversight."
    weight: 0.30
    description: "ForwardLookingElements"
