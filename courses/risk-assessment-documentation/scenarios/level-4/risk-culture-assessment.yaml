meta:
  id: risk-culture-assessment
  level: 4
  course: risk-assessment-documentation
  type: output
  description: "Risk culture assessment — evaluate and document an organization's risk culture using behavioral indicators and propose cultural transformation"
  tags: [risk-culture, behavioral-indicators, culture-assessment, transformation, expert]

state: {}

trigger: |
  You're an external consultant hired by the board of a
  $2B energy company (6,000 employees) after a catastrophic
  safety incident (explosion at a processing facility,
  2 fatalities, $180M in damages). The independent
  investigation found that the technical failure was
  preventable — multiple employees had raised concerns
  but were ignored or discouraged from escalating. The
  board wants you to assess the company's "risk culture"
  and determine if cultural factors contributed to the
  incident.

  Investigation findings relevant to risk culture:
  - 3 employees reported the specific equipment failure
    risk in the 12 months before the incident
  - Reports went to a "safety suggestion box" that was
    reviewed monthly by a single safety coordinator
  - The plant manager told one reporter: "That equipment
    has always made that noise — don't worry about it"
  - Production pressure: Plant was running at 115% capacity
    to meet quarterly targets
  - 2 safety inspections had identified the equipment as
    "watch" status but were not escalated
  - The prior year's safety metrics showed "best in company
    history" (because near-miss reporting had declined 40%
    — not because safety improved)
  - The company celebrated "zero incidents" while employees
    had stopped reporting near-misses

  Your assessment scope:
  1. Leadership risk tone (board through frontline managers)
  2. Reporting culture (do employees feel safe raising
     concerns?)
  3. Accountability (are risk owners held accountable?)
  4. Risk awareness (do employees understand risks in
     their roles?)
  5. Decision-making (how are risk-reward trade-offs made?)
  6. Learning culture (does the organization learn from
     incidents and near-misses?)

  Assessment methodology:
  - Interviews: 60 structured interviews (board members,
    C-suite, VPs, managers, frontline workers, safety staff)
  - Survey: 3,200 responses (54% response rate)
  - Document review: Safety reports, incident logs, meeting
    minutes, performance reviews, compensation structures
  - Observation: 10 days of facility observation
  - Benchmarking: Industry risk culture benchmarks

  Survey highlights:
  - "I feel safe reporting safety concerns": 42% agree
    (industry benchmark: 78%)
  - "Management prioritizes safety over production": 28%
    agree (benchmark: 65%)
  - "Near-misses are taken seriously": 35% agree (benchmark: 72%)
  - "I have been discouraged from reporting a safety concern":
    31% agree (benchmark: 8%)
  - "I understand the risks in my role": 71% agree
    (benchmark: 82%)
  - "Leaders walk the talk on safety": 38% agree
    (benchmark: 70%)

  Task: Produce the risk culture assessment report for the
  board. Include findings organized by the 6 assessment
  dimensions, root cause analysis connecting culture to the
  incident, specific behavioral indicators of weak risk
  culture, and a multi-year risk culture transformation
  roadmap. The report must be honest and direct while
  being constructive.

assertions:
  - type: llm_judge
    criteria: "Response produces a rigorous risk culture assessment — evaluates all 6 dimensions with specific evidence (interview quotes, survey data, document findings, observations); identifies behavioral patterns that indicate cultural weakness (discouraged reporting, production over safety, declining near-miss reporting mistaken for improvement); uses benchmark comparisons effectively; the assessment connects cultural factors directly to the incident (not just post-hoc rationalization); the analysis would withstand scrutiny from regulators, plaintiffs' attorneys, and the media."
    weight: 0.35
    description: "RigorousCultureAssessment"
  - type: llm_judge
    criteria: "Response identifies root causes and systemic cultural failures — goes beyond individual blame to identify systemic issues (incentive structures that rewarded production over safety, reporting mechanisms that were ineffective, management behaviors that suppressed risk information, metrics that created false confidence); addresses the paradox of 'best safety year' coinciding with declining near-miss reports; identifies at which organizational levels the culture breakdown is most severe; the root cause analysis connects to specific, addressable cultural and structural factors."
    weight: 0.35
    description: "RootCausesAndSystemicFailures"
  - type: llm_judge
    criteria: "Response proposes a credible cultural transformation roadmap — addresses leadership behavior change (tone at the top, visible commitment, consequences for suppressing reports); redesigns reporting mechanisms (psychological safety, anonymous reporting, rapid response); restructures incentives (decouple safety metrics from production metrics, reward risk identification); proposes measurement framework for culture change (leading indicators, not just survey scores); the transformation plan is multi-year and acknowledges that culture change is slow; the recommendations are honest and direct as the board requested."
    weight: 0.30
    description: "CulturalTransformationRoadmap"
