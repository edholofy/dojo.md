meta:
  id: climate-risk-assessment
  level: 3
  course: risk-assessment-documentation
  type: output
  description: "Climate risk assessment — conduct TCFD-aligned climate risk assessment with physical and transition risk scenarios for a publicly traded company"
  tags: [climate-risk, tcfd, physical-risk, transition-risk, advanced]

state: {}

trigger: |
  You're the Head of Sustainability at a publicly traded
  food and beverage company ($2.8B revenue, 8,500 employees,
  12 manufacturing facilities). The SEC climate disclosure
  rule requires you to file your first climate risk
  assessment, and institutional investors (representing 35%
  of shares) have written demanding TCFD-aligned climate
  risk disclosure.

  Company operations:
  | Facility | Location | Revenue Contribution | Climate Exposure |
  |----------|----------|---------------------|-----------------|
  | HQ/Plant 1 | Houston, TX | 18% | Hurricane, heat |
  | Plant 2 | Sacramento, CA | 15% | Wildfire, drought |
  | Plant 3 | Jacksonville, FL | 12% | Hurricane, flooding |
  | Plant 4 | Manchester, UK | 10% | Minimal physical |
  | Plant 5 | São Paulo, Brazil | 9% | Drought, deforestation |
  | Plant 6 | Bangkok, Thailand | 8% | Flooding, heat |
  | 6 smaller facilities | Various | 28% | Mixed |

  Supply chain climate exposure:
  - Agricultural inputs: $800M/year (cocoa, sugar, wheat,
    dairy, fruit)
  - 40% of agricultural inputs from climate-vulnerable
    regions
  - Cocoa: 80% from West Africa (extreme heat, drought risk)
  - Sugar: 60% from Brazil (deforestation-linked, drought)
  - Dairy: US Midwest (heat stress on cattle, water scarcity)
  - Water usage: 2.5B gallons/year across all operations

  Current emissions:
  - Scope 1: 85,000 tCO2e (manufacturing, fleet)
  - Scope 2: 120,000 tCO2e (purchased electricity)
  - Scope 3: 1,800,000 tCO2e (supply chain, distribution,
    product use/disposal)
  - Targets: 50% reduction by 2030 (Scope 1+2), 30%
    reduction Scope 3

  Financial exposure:
  - Insurance costs increased 28% over 3 years (climate-
    related claims in TX, FL, CA)
  - 3 production disruptions in 2 years due to extreme
    weather ($12M total impact)
  - Carbon pricing risk: EU ETS affects UK operations,
    potential US carbon price
  - $180M in capex planned for energy transition over 5 years

  Task: Conduct the TCFD-aligned climate risk assessment
  covering physical risks (acute and chronic), transition
  risks (policy, technology, market, reputation), scenario
  analysis (1.5°C, 2°C, 4°C pathways), financial impact
  quantification, and the climate strategy. Include the
  assessment of supply chain agricultural vulnerability
  and water risk.

assertions:
  - type: llm_judge
    criteria: "Response follows TCFD framework properly — addresses all 4 TCFD pillars (Governance, Strategy, Risk Management, Metrics & Targets); assesses physical risks (acute: hurricanes, floods, wildfires; chronic: heat stress, drought, sea level rise) with facility-level specificity; assesses transition risks (policy: carbon pricing, regulation; technology: energy transition costs; market: consumer preferences; reputation: ESG ratings); includes scenario analysis across multiple temperature pathways; the assessment would satisfy institutional investors and SEC disclosure requirements."
    weight: 0.35
    description: "ProperTCFDFramework"
  - type: llm_judge
    criteria: "Response quantifies financial impact of climate risks — calculates potential financial impact of physical risks by facility (Houston hurricane scenario: revenue impact, damage costs, insurance implications; Sacramento wildfire: production disruption costs); quantifies transition risk costs (carbon pricing scenarios, energy transition capex, stranded asset risk); assesses supply chain agricultural vulnerability with financial impact (cocoa price volatility from climate stress, water scarcity costs); the quantification enables comparison of climate risk against other enterprise risks."
    weight: 0.35
    description: "FinancialImpactQuantification"
  - type: llm_judge
    criteria: "Response includes actionable climate strategy — proposes specific adaptation measures for high-risk facilities (infrastructure hardening, backup production capacity, supply chain diversification); addresses supply chain resilience (diversifying agricultural sourcing, supporting regenerative practices, securing water rights); outlines the mitigation pathway to emissions targets (Scope 1+2: energy efficiency, renewables; Scope 3: supplier engagement); connects climate strategy to financial planning ($180M capex allocation); the strategy is specific enough to implement, not just aspirational goals."
    weight: 0.30
    description: "ActionableClimateStrategy"
