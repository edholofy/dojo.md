meta:
  id: pandemic-risk-assessment
  level: 3
  course: risk-assessment-documentation
  type: output
  description: "Pandemic and public health risk assessment — design a comprehensive pandemic preparedness risk framework incorporating lessons from COVID-19"
  tags: [pandemic, public-health, preparedness, lessons-learned, advanced]

state: {}

trigger: |
  You're the VP of Risk and Business Resilience at a 3,000-
  person multinational professional services firm ($650M
  revenue, offices in 12 countries). The board's risk
  committee has asked you to create a comprehensive pandemic
  risk assessment and preparedness framework. While COVID
  is no longer an emergency, the board notes that "we
  survived COVID but it was chaotic — next time we need
  to be prepared from day one."

  COVID-19 impact on the firm (for context):
  - Revenue dropped 22% in first 6 months, recovered to
    95% by month 12
  - 3 offices shut for 8+ months (Singapore, London, Mumbai)
  - 42% of staff worked from home with personal devices
    initially (security risk)
  - Client-facing work disrupted for 4 months (travel ban)
  - 180 employees had COVID at peak, 8 hospitalized
  - Mental health concerns: Employee assistance utilization
    increased 340%
  - Technology scramble: VPN capacity insufficient, Zoom
    hadn't been tested at scale
  - Client concentration risk: 3 clients in hospitality
    sector defaulted on $4.2M in receivables
  - Insurance claims: Business interruption claim denied
    (pandemic exclusion)

  Current preparedness:
  - Work-from-home capability: Now 100% remote-ready
  - Technology: VPN upgraded, collaboration tools deployed
  - Office: Flex space model adopted (40% capacity)
  - But: No formal pandemic response plan documented
  - No pandemic-specific risk assessment
  - Supply chain pandemic vulnerability not assessed
  - Client sector concentration risk not formalized
  - No health screening protocols documented

  Board's requirements:
  - "Assess pandemic risk across all dimensions: people,
    operations, technology, financial, client, regulatory"
  - "Consider both respiratory pandemics (like COVID) and
    other scenarios (bioterrorism, antimicrobial resistance)"
  - "Include supply chain and third-party pandemic risk"
  - "Address mental health and workforce resilience"
  - "Create a tiered response framework (Level 1-5) with
    specific triggers"

  Task: Create the pandemic risk assessment and preparedness
  framework. Include a multi-scenario risk analysis, the
  tiered response framework with triggers, workforce
  resilience assessment, supply chain and client
  vulnerability analysis, and financial impact modeling.
  Incorporate lessons learned from COVID-19.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive multi-scenario pandemic risk assessment — considers multiple pandemic types (respiratory viral, novel pathogen, antimicrobial resistance, bioterrorism) with different characteristics (transmission mode, severity, duration); assesses risk across all dimensions (people, operations, technology, financial, client, regulatory, reputational); uses COVID-19 data to calibrate risk estimates; the assessment goes beyond a single pandemic scenario to prepare for various public health emergencies."
    weight: 0.35
    description: "MultiScenarioPandemicAssessment"
  - type: llm_judge
    criteria: "Response designs a tiered response framework — creates clear response levels (e.g., Level 1: Monitoring, Level 2: Preparation, Level 3: Activation, Level 4: Full Response, Level 5: Recovery) with specific triggers for each level (WHO declarations, local case counts, employee infections, government mandates); each level has defined actions across people, operations, technology, clients, and communications; the framework enables rapid response without waiting for executive committee meetings; the triggers are specific enough to be actionable."
    weight: 0.35
    description: "TieredResponseFramework"
  - type: llm_judge
    criteria: "Response addresses workforce resilience and financial modeling — includes mental health and workforce resilience assessment (absenteeism modeling, caregiver impacts, remote work fatigue); proposes proactive wellness programs; models financial impact scenarios (revenue decline curves, cash flow stress tests, client sector vulnerability); assesses supply chain and third-party pandemic risk; addresses the insurance gap (pandemic exclusion) with alternative risk financing; the framework incorporates lessons learned from the firm's COVID experience with specific improvements."
    weight: 0.30
    description: "WorkforceResilienceAndFinancialModeling"
