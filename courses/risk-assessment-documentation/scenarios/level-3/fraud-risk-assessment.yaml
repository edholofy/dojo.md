meta:
  id: fraud-risk-assessment
  level: 3
  course: risk-assessment-documentation
  type: output
  description: "Fraud risk assessment — conduct an enterprise fraud risk assessment following COSO fraud risk management principles"
  tags: [fraud-risk, coso, internal-controls, forensic, advanced]

state: {}

trigger: |
  You're the VP of Internal Audit at a 1,500-person
  healthcare company ($500M revenue). The board's audit
  committee has directed you to conduct an enterprise fraud
  risk assessment after an investigation revealed that a
  regional sales director had been submitting $1.2M in
  fictitious expense reports over 3 years. The existing
  internal controls failed to detect this because the
  director had approval authority over their own expenses
  up to $5K per transaction (they stayed just below the
  threshold).

  Investigation findings from the expense fraud:
  - Director submitted 480 fictitious transactions over 36
    months
  - Average transaction: $2,500 (designed to stay under $5K
    approval limit)
  - Used 8 different vendor names (created fictitious
    companies)
  - Expenses were categorized as "client entertainment" and
    "travel" — categories with less scrutiny
  - No receipts required for transactions under $1K (company
    policy)
  - The director's manager (VP Sales) approved some
    transactions but didn't review them carefully
  - Discovered only when the director went on extended leave
    and a substitute noticed irregularities

  Company fraud risk landscape:
  - Revenue recognition: Complex contracts with multiple
    performance obligations
  - Physician relationships: Anti-kickback statute and
    Stark Law compliance
  - Government billing: 35% of revenue from Medicare/Medicaid
    (False Claims Act exposure)
  - Vendor payments: 2,200 vendors, $180M annual spend
  - Employee expenses: $12M/year, 1,500 submitters
  - Patient data: 2M patient records (identity theft risk)
  - Research data: 3 active clinical trials (data integrity
    risk)
  - International operations: Brazil (FCPA risk), India
    (facilitation payments)

  Existing controls:
  - Annual SOX testing (covers financial reporting fraud only)
  - Ethics hotline (28 reports last year, 4 substantiated)
  - Background checks at hiring (not refreshed)
  - Expense policy (but inadequate thresholds as demonstrated)
  - Annual code of conduct training (low engagement —
    "click-through" format)
  - No dedicated fraud risk assessment performed previously

  Task: Conduct the enterprise fraud risk assessment
  following COSO fraud risk management principles. Identify
  fraud schemes by category (financial reporting, asset
  misappropriation, corruption), assess likelihood and
  impact, evaluate existing control effectiveness, and
  propose a fraud risk management program with enhanced
  controls. Address the specific weaknesses exposed by
  the expense fraud case.

assertions:
  - type: llm_judge
    criteria: "Response conducts a comprehensive fraud risk assessment — identifies fraud schemes across all COSO categories (financial reporting fraud, asset misappropriation, corruption/bribery); assesses healthcare-specific fraud risks (government billing fraud, anti-kickback, Stark Law, clinical trial data integrity, FCPA); each fraud risk has likelihood and impact assessment; evaluates the fraud triangle (pressure, opportunity, rationalization) for each major risk area; the assessment covers the full enterprise, not just the expense process where fraud was discovered."
    weight: 0.35
    description: "ComprehensiveFraudAssessment"
  - type: llm_judge
    criteria: "Response evaluates control effectiveness honestly — assesses existing controls against each fraud risk (identifies where controls are absent, inadequate, or can be overridden); specifically addresses the expense approval threshold weakness; evaluates SOX testing limitations (covers financial reporting but not operational fraud); assesses ethics hotline effectiveness; identifies the 'substitution detection' weakness (fraud only discovered by accident); the control assessment is candid about weaknesses rather than defensive."
    weight: 0.35
    description: "ControlEffectivenessEvaluation"
  - type: llm_judge
    criteria: "Response proposes a comprehensive fraud risk management program — includes enhanced controls addressing the specific expense fraud (lower thresholds, data analytics for pattern detection, receipt requirements, rotation of approval authority); proposes proactive fraud detection (continuous monitoring, data analytics, surprise audits); addresses culture and ethics (meaningful training, whistleblower protection, tone at the top); recommends governance improvements (fraud risk oversight committee, regular fraud risk assessment cadence); the program is proportionate to a $500M healthcare company's risk profile."
    weight: 0.30
    description: "FraudRiskManagementProgram"
