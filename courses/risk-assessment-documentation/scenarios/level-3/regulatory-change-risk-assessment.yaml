meta:
  id: regulatory-change-risk-assessment
  level: 3
  course: risk-assessment-documentation
  type: output
  description: "Regulatory change risk assessment — assess the impact of major regulatory changes on a complex multi-jurisdictional business"
  tags: [regulatory-change, multi-jurisdictional, impact-assessment, compliance, advanced]

state: {}

trigger: |
  You're the Chief Compliance Officer at a $500M fintech
  company (1,800 employees) operating across the US, EU,
  and UK. Three major regulatory changes are converging
  that will significantly impact your business model. The
  CEO has asked you to assess the risk and business impact
  of each.

  Your business:
  - Consumer lending platform (US: 42 states + DC)
  - Payment processing (US, EU, UK)
  - Buy-Now-Pay-Later (BNPL) product (US, UK, Germany)
  - AI-powered credit decisioning (all markets)
  - Revenue: US 65%, EU 20%, UK 15%

  Regulatory change 1 — US CFPB Small Business Lending
  Rule (Section 1071):
  - Requires collection and reporting of demographic data
    on small business lending applications
  - 50+ data fields per application
  - Compliance deadline: 12 months
  - Impact: Your SMB lending product ($120M portfolio) must
    be completely redesigned for data collection
  - Risk: $10K/day penalties for non-compliance
  - Technology investment needed: Estimated $3-5M

  Regulatory change 2 — EU AI Act Implementation:
  - Your AI credit decisioning is classified as "high-risk AI"
  - Requirements: Transparency, explainability, bias testing,
    human oversight, conformity assessment
  - Compliance deadline: 18 months
  - Impact: Your AI models (used for all credit decisions)
    may need fundamental redesign for explainability
  - Risk: Fines up to 3% of global revenue ($15M)
  - Potential impact on approval rates if AI model is
    constrained

  Regulatory change 3 — UK FCA BNPL Regulation:
  - BNPL products becoming regulated lending
  - Requirements: Full creditworthiness assessments,
    affordability checks, complaint handling, advertising
    rules
  - Compliance deadline: 15 months
  - Impact: UK BNPL product ($45M GTV) conversion rates
    will decline 15-25% due to friction
  - Risk: Loss of UK BNPL license if non-compliant
  - Competitor response: Klarna and Afterpay already
    preparing

  Cross-cutting concerns:
  - All 3 regulations affect your AI decisioning systems
  - Limited compliance and technology resources (can't do
    everything simultaneously)
  - Each regulation has different data requirements that
    may conflict
  - Board expects growth despite regulatory headwinds

  Task: Create the regulatory change risk assessment
  covering business impact, implementation requirements,
  resource needs, and timeline for each regulation.
  Include a prioritized compliance roadmap that addresses
  resource constraints, identifies synergies between the
  three programs, and proposes a risk-based approach to
  sequencing the work.

assertions:
  - type: llm_judge
    criteria: "Response assesses each regulatory change comprehensively — for each regulation: identifies specific compliance requirements, quantifies business impact (revenue, cost, operational), assesses implementation complexity, identifies risks of non-compliance (financial penalties, license loss, enforcement action); the assessment demonstrates genuine understanding of each regulation (not just surface-level descriptions); connects regulatory requirements to specific business processes that need to change."
    weight: 0.35
    description: "ComprehensiveRegulatoryAssessment"
  - type: llm_judge
    criteria: "Response creates a prioritized compliance roadmap — sequences the three regulatory programs based on deadline urgency, risk severity, and resource constraints; identifies synergies (AI model changes can serve both EU AI Act and US fair lending requirements); proposes a phased approach that's achievable with limited resources; includes specific resource requirements (headcount, technology, external expertise, budget); addresses the board's growth expectations despite regulatory headwinds."
    weight: 0.35
    description: "PrioritizedComplianceRoadmap"
  - type: llm_judge
    criteria: "Response identifies cross-cutting risks and strategic implications — recognizes that all 3 regulations affect AI decisioning (create a unified AI governance framework); addresses potential conflicts between jurisdictional requirements; evaluates competitive impact (UK BNPL conversion decline vs competitors' readiness); proposes strategic responses (could regulatory compliance become a competitive advantage?); the assessment helps the CEO understand that these aren't just compliance projects — they reshape the business model."
    weight: 0.30
    description: "CrossCuttingRisksAndStrategy"
