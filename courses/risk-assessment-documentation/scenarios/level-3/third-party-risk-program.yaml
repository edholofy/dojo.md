meta:
  id: third-party-risk-program
  level: 3
  course: risk-assessment-documentation
  type: output
  description: "Third-party risk management program — design a comprehensive TPRM program for a financial institution meeting OCC/FFIEC requirements"
  tags: [third-party-risk, tprm, occ, ffiec, advanced]

state: {}

trigger: |
  You're the SVP of Third-Party Risk Management at a $15B
  regional bank with 3,200 employees. The OCC has issued a
  Matter Requiring Attention (MRA) citing "significant
  deficiencies" in your third-party risk management program.
  You have 120 days to remediate and demonstrate a robust
  TPRM program.

  OCC examination findings:
  1. "No comprehensive inventory of third-party relationships
     — bank cannot identify all critical vendors"
  2. "Risk assessments are inconsistent — some vendors have
     detailed assessments, most have none"
  3. "No ongoing monitoring program — vendor due diligence
     performed at onboarding only, not refreshed"
  4. "Concentration risk not assessed — bank has not
     identified single points of failure"
  5. "Board reporting is inadequate — board receives vendor
     list but no risk assessment information"
  6. "Fourth-party risk not considered — bank does not assess
     vendors' subcontractors"
  7. "Contract management is inconsistent — 38% of vendor
     contracts have expired or are on auto-renewal without
     review"

  Current third-party landscape:
  - 680 total vendor relationships identified so far
    (estimate 200+ more undocumented)
  - Critical/high-risk vendors (estimated): ~45
  - Significant vendors: ~120
  - Moderate vendors: ~250
  - Low-risk/routine: ~465
  - Key concentration: Core banking platform (single vendor),
    card processing (single vendor), cloud infrastructure
    (2 vendors)

  Services outsourced to third parties:
  - Core banking system (FIS)
  - Card processing and issuing
  - Cloud infrastructure (AWS + Azure)
  - IT managed services (helpdesk, monitoring)
  - Loan origination system
  - AML/BSA transaction monitoring
  - Customer call center (partially outsourced)
  - Print and mail services
  - Appraisal management
  - Collection agency services

  Task: Design the comprehensive TPRM program addressing
  all 7 OCC findings. Include the risk tiering methodology,
  risk assessment framework for each tier, ongoing
  monitoring program, concentration risk analysis, fourth-
  party risk assessment, board reporting framework, and the
  120-day remediation plan. The program must comply with
  OCC Bulletin 2023-17 and FFIEC guidance.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive TPRM program — includes vendor inventory methodology (how to find the undocumented 200+ vendors), risk tiering criteria (critical, high, moderate, low with clear classification factors), risk assessment framework differentiated by tier (comprehensive assessments for critical vendors, streamlined for low-risk), lifecycle management (planning, due diligence, contract negotiation, ongoing monitoring, termination); the program directly addresses all 7 OCC findings with specific remediation actions."
    weight: 0.35
    description: "ComprehensiveTPRMProgram"
  - type: llm_judge
    criteria: "Response addresses OCC/FFIEC requirements specifically — aligns with OCC Bulletin 2023-17 requirements; includes concentration risk analysis methodology (identifying single points of failure, aggregating exposure across vendor relationships); addresses fourth-party risk (how to assess vendors' subcontractors and key dependencies); proposes contract management remediation (review of expired/auto-renewed contracts); the program would satisfy OCC examiners in a follow-up examination."
    weight: 0.35
    description: "OCCFFIECCompliance"
  - type: llm_judge
    criteria: "Response includes a feasible 120-day remediation plan — prioritizes actions by OCC severity (inventory completion, critical vendor assessments, board reporting first); includes resource requirements (additional staff, technology, external support); proposes interim measures while full program is built; the plan is aggressive but achievable in 120 days; includes board reporting framework that transforms vendor reporting from a list to a risk-informed governance tool; demonstrates the bank is taking the MRA seriously with specific milestones and accountability."
    weight: 0.30
    description: "Feasible120DayRemediation"
