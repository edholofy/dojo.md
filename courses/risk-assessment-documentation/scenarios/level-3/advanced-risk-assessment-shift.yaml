meta:
  id: advanced-risk-assessment-shift
  level: 3
  course: risk-assessment-documentation
  type: output
  description: "Advanced risk assessment shift — handle a ransomware incident risk assessment, a regulatory consent order response, and an activist investor risk challenge simultaneously"
  tags: [shift-simulation, ransomware, consent-order, activist-investor, advanced]

state: {}

trigger: |
  You're the CRO (Chief Risk Officer) of a 1,500-person
  financial services company ($350M revenue). Three major
  risk events have converged in the same week.

  SITUATION 1 — Active Ransomware Incident Assessment:
  Your CISO has confirmed ransomware on 3 servers in the
  Dallas office at 2 AM. The attackers are demanding $2M
  in Bitcoin. Initial assessment:
  - 3 of 12 production servers encrypted (not yet spread
    to others)
  - Backup systems appear intact (last backup: 18 hours ago)
  - Client data exposure unknown (forensics underway)
  - 2,400 client records potentially accessible from
    compromised servers
  - SEC regulation requires notification within 4 business
    days if material
  - State breach notification laws vary (some require 30 days)
  - Cyber insurance: $5M policy, $250K deductible, requires
    pre-approval for ransom payments
  - Business impact: The 3 servers support client reporting —
    200 clients won't receive reports on time

  Your role: Assess the risk level, determine notification
  obligations, evaluate the ransom decision, and document
  the incident for regulatory and insurance purposes.

  SITUATION 2 — Regulatory Consent Order:
  The SEC has proposed a consent order citing deficiencies
  in your firm's risk management practices:
  - "Inadequate supervision of trading activities"
  - "Risk limits exceeded 47 times in 12 months without
    escalation"
  - "Risk committee met 6 times (vs required quarterly +
    ad hoc = expected 8+)"
  - "Model validation not performed on 3 pricing models"
  - Proposed penalties: $4.5M fine, 18-month enhanced
    supervision, required third-party risk assessment

  You need to: Accept, negotiate, or contest the consent
  order, and regardless of outcome, develop the remediation
  plan that demonstrates enhanced risk governance.

  SITUATION 3 — Activist Investor Risk Challenge:
  An activist investor (8% stake) has filed a 13D and
  publicly criticized the company's "failure to manage
  operational risk" — pointing to the ransomware incident
  and SEC consent order as evidence. They're demanding:
  - Replacement of the CRO (you) and 2 board members
  - Independent risk assessment by an external firm
  - "Enterprise-wide risk management transformation"
  - If demands not met: Proxy fight at next annual meeting

  Task: Address all three situations with integrated risk
  responses. For the ransomware, conduct the incident risk
  assessment and recommend actions. For the consent order,
  propose the negotiation strategy and remediation plan.
  For the activist, craft the risk governance defense
  strategy. All three responses must be consistent and
  demonstrate that the CRO is the right person to lead
  through this crisis, not the problem.

assertions:
  - type: llm_judge
    criteria: "Response handles the ransomware incident with proper risk assessment — determines notification obligations (SEC materiality assessment, state breach notification analysis); evaluates the ransom decision with risk analysis (pay vs don't pay — legal, ethical, practical considerations); documents the incident properly for regulatory and insurance purposes; proposes containment and recovery timeline; the incident response demonstrates CRO competence (not panic) and follows established cybersecurity incident frameworks."
    weight: 0.35
    description: "RansomwareIncidentAssessment"
  - type: llm_judge
    criteria: "Response addresses the SEC consent order strategically — proposes negotiation positions (which findings to accept, which to contest, penalty reduction arguments); develops the remediation plan addressing each specific finding (trading supervision enhancement, risk limit escalation procedures, risk committee governance improvement, model validation program); the remediation plan is substantive (not just procedural compliance) and demonstrates genuine risk management improvement; the plan would satisfy the SEC's enhanced supervision requirement."
    weight: 0.35
    description: "ConsentOrderStrategy"
  - type: llm_judge
    criteria: "Response defends against the activist while acknowledging legitimate concerns — doesn't dismiss the activist's points entirely (some risk management improvements are clearly needed) but demonstrates that the CRO's leadership is the best path forward; proposes proactive risk governance improvements that address activist concerns while protecting current leadership; turns the crisis into an opportunity to accelerate risk program improvements; all three responses are internally consistent and project a narrative of competent leadership managing through a challenging period."
    weight: 0.30
    description: "ActivistDefenseStrategy"
