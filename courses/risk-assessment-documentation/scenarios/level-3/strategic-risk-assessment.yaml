meta:
  id: strategic-risk-assessment
  level: 3
  course: risk-assessment-documentation
  type: output
  description: "Strategic risk assessment — identify and document strategic risks using horizon scanning and scenario planning for a company facing market disruption"
  tags: [strategic-risk, horizon-scanning, market-disruption, scenario-planning, advanced]

state: {}

trigger: |
  You're the Chief Strategy Officer at a 2,000-person
  traditional media company ($400M revenue). The company
  owns 12 local TV stations, 8 radio stations, and 3
  digital news properties. Revenue has declined 15% over
  3 years, and the CEO has asked you to conduct a strategic
  risk assessment because "we're being disrupted and we
  need to understand what hits us next, not just react to
  what already happened."

  Current business state:
  | Business Unit | Revenue | Trend | Key Risk |
  |--------------|---------|-------|----------|
  | TV Stations | $240M | -8%/yr | Cord-cutting, local ad decline |
  | Radio | $60M | -12%/yr | Podcasts, streaming music |
  | Digital News | $45M | +15%/yr | Platform dependency, AI content |
  | Retransmission Fees | $55M | +3%/yr | Virtual MVPD renegotiation |

  Revenue composition:
  - Local advertising: 52% (declining 10%/year)
  - National advertising: 18% (declining 5%/year)
  - Retransmission fees: 14% (growing but at risk)
  - Digital revenue: 11% (growing but low margin)
  - Political advertising: 5% (cyclical, election years only)

  Strategic risks already identified:
  1. Cord-cutting acceleration: 15% of pay-TV subscribers
     lost per year nationally
  2. AI-generated content: Could replace local news production
     at fraction of cost (and competitors are experimenting)
  3. Google/Meta advertising dominance: 65% of digital ad
     dollars, growing in local
  4. FCC deregulation: Could allow new competitors or remove
     ownership limits
  5. Generational shift: Under-35 audience 80% smaller than
     over-55
  6. Talent drain: Top journalists leaving for digital-first
     outlets

  Emerging/unknown risks to explore:
  - What if a major tech company launches hyper-local AI news?
  - What if retransmission fee model collapses?
  - What if local advertising shifts entirely to social media?
  - What if AI makes professional content creation free?
  - What if regulatory changes open media ownership to
    tech companies?

  CEO's request:
  - "Don't just tell me what we already know — tell me
    what's coming that we don't see yet"
  - "Use scenario planning — I want 3-4 future scenarios
    with different implications for our business"
  - "Identify which strategic risks could be existential
    vs manageable"
  - "Propose strategic options for each scenario"

  Task: Conduct the strategic risk assessment using horizon
  scanning and scenario planning. Include the identification
  of emerging risks, development of 3-4 future scenarios,
  assessment of strategic risk severity and timeline, and
  strategic response options for each scenario. Distinguish
  between existential risks and manageable challenges.

assertions:
  - type: llm_judge
    criteria: "Response conducts genuine horizon scanning — goes beyond the already-identified risks to explore emerging signals (AI content generation evolution, local information ecosystems, advertiser behavior shifts, regulatory trajectory, demographic changes, technology platform evolution); uses structured horizon scanning methodology (PESTLE or similar); identifies weak signals that could become major forces; the analysis demonstrates the ability to 'see around corners' as the CEO requested."
    weight: 0.35
    description: "GenuineHorizonScanning"
  - type: llm_judge
    criteria: "Response develops distinct, plausible future scenarios — creates 3-4 scenarios that represent genuinely different futures (not just optimistic/pessimistic versions of the same future); each scenario has a coherent internal logic driven by specific combinations of forces; scenarios cover a wide enough range to capture the uncertainty space; for each scenario, identifies what the company looks like in 5 years (revenue, business model, competitive position); the scenarios would provoke strategic thinking, not just analysis."
    weight: 0.35
    description: "DistinctPlausibleScenarios"
  - type: llm_judge
    criteria: "Response distinguishes existential from manageable risks — clearly identifies which risks threaten the company's existence (could make the business model unviable) vs which are painful but manageable; proposes strategic response options for each scenario (not just 'diversify' but specific strategic moves like acquisitions, partnerships, business model pivots); identifies 'no-regret' moves (actions that are valuable regardless of which scenario materializes); the assessment helps the CEO make strategic investment decisions under uncertainty."
    weight: 0.30
    description: "ExistentialVsManageableDistinction"
