meta:
  id: erm-program-design
  level: 3
  course: risk-assessment-documentation
  type: output
  description: "ERM program design — build an enterprise risk management program from scratch for a mid-size company using COSO ERM framework"
  tags: [erm, coso, program-design, governance, advanced]

state: {}

trigger: |
  You're the newly hired Chief Risk Officer at a 1,200-
  person specialty insurance company ($400M gross written
  premium). The company has grown 3x in 5 years through
  acquisitions, and the board has hired you because "we've
  outgrown our informal risk management approach." The
  state insurance regulator has also noted the lack of a
  formal ERM program in their recent examination.

  Current state:
  - No formal ERM framework or risk taxonomy
  - Risk management is siloed: Underwriting manages insurance
    risk, IT manages cyber risk, Finance manages financial
    risk, HR manages people risk — but nobody looks across
  - No risk committee at board or management level
  - Risk appetite: Never defined formally
  - Risk reporting: Each department reports to their VP,
    no consolidated view
  - 3 acquired companies still operating with different risk
    cultures
  - Key risks identified informally by leadership:
    * Catastrophe exposure concentration (Florida, Texas)
    * Reinsurance adequacy (retrocession market tightening)
    * Cyber risk (insured risk + own IT risk)
    * Regulatory compliance across 42 states
    * Integration risk (3 acquisitions, 3 cultures)
    * Talent risk (underwriting talent scarce, 22% turnover)
    * Investment portfolio risk ($850M invested assets)

  Regulatory expectations (state DOI):
  - ORSA (Own Risk and Solvency Assessment) required within
    18 months
  - ERM framework aligned with COSO or ISO 31000
  - Board oversight with documented risk appetite
  - Stress testing and scenario analysis for capital adequacy
  - Enterprise-wide risk identification and assessment

  CEO's mandate:
  - "Build it right the first time — we can't afford to redo
    this"
  - "Make it practical — I don't want a paper exercise"
  - "Get buy-in from the business — risk management should
    help them, not police them"
  - "We need to be ORSA-ready in 18 months"

  Task: Design the complete ERM program including governance
  structure, risk taxonomy, risk appetite framework, risk
  assessment methodology, risk reporting architecture, and
  the 18-month implementation roadmap to ORSA readiness.
  Address how to unify risk culture across 3 acquired
  organizations.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive ERM program — includes governance structure (board risk committee, management risk committee, CRO role, three lines of defense); risk taxonomy covering all risk domains (insurance, market, credit, operational, strategic, compliance, reputational); risk appetite framework with qualitative statements and quantitative metrics; risk assessment methodology (inherent risk, control assessment, residual risk); risk reporting architecture from front-line to board; the program design follows COSO ERM or ISO 31000 principles appropriately."
    weight: 0.35
    description: "ComprehensiveERMDesign"
  - type: llm_judge
    criteria: "Response creates a realistic 18-month implementation roadmap — sequences the implementation logically (governance first, then taxonomy, then assessment, then reporting, then ORSA preparation); includes milestones and deliverables for each phase; addresses resource requirements (staff, technology, external expertise); the roadmap is achievable for a 1,200-person company building ERM from scratch; includes quick wins to build momentum and demonstrate value; addresses how to unify risk culture across 3 acquired organizations without imposing a one-size-fits-all approach."
    weight: 0.35
    description: "RealisticImplementationRoadmap"
  - type: llm_judge
    criteria: "Response addresses insurance-specific risk and ORSA requirements — designs stress testing and scenario analysis for catastrophe exposure; addresses reinsurance risk assessment; covers investment portfolio risk management; prepares for ORSA requirements (risk identification, capital adequacy assessment, prospective solvency assessment); the program design reflects understanding of insurance industry risk management (not generic ERM); would satisfy state insurance regulator expectations."
    weight: 0.30
    description: "InsuranceSpecificAndORSAReady"
