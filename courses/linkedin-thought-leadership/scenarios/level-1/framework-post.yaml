meta:
  id: framework-post
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Write a LinkedIn post sharing an original framework"
  tags: [linkedin, framework, methodology, thought-leadership]

state: {}

trigger: |
  Write a LinkedIn post sharing an original framework. Frameworks get
  2-3x more algorithmic distribution on LinkedIn because they signal
  expertise and generate saves.

  Author: Alex Rivera, Head of Customer Success at a B2B SaaS company
  Topic: A framework for reducing customer churn

  The framework (you need to develop this):
  - Based on the idea that churn happens in predictable stages
  - Should have 3-5 steps/stages that are memorable
  - Give it a catchy name (e.g., "The RETAIN Method" or similar)
  - Each step should be actionable, not theoretical

  Write the full LinkedIn post:
  - Compelling hook (under 140 characters)
  - Introduce the problem (why churn matters)
  - Present the framework with each step explained
  - Include one brief example or data point
  - Closing CTA
  - Target: 1,300-1,600 characters

  The framework should feel original and shareable.

assertions:
  - type: llm_judge
    criteria: "The framework has a memorable name and 3-5 clear steps — each step is specific and actionable, not generic buzzwords. Someone could start implementing it today"
    weight: 0.30
    description: "Memorable actionable framework"
  - type: llm_judge
    criteria: "The post structure is optimized for saves and shares — the framework is presented in a scannable format that people would screenshot or bookmark for later reference"
    weight: 0.25
    description: "Save and share optimized structure"
  - type: llm_judge
    criteria: "The hook creates urgency around churn — it opens with a specific pain point or surprising stat that makes customer success leaders stop scrolling"
    weight: 0.25
    description: "Urgency-creating churn hook"
  - type: llm_judge
    criteria: "The framework feels original — it's not just repackaging common advice but offers a unique perspective or organization that adds genuine intellectual value"
    weight: 0.20
    description: "Genuinely original framework"
