meta:
  id: hashtag-and-cta
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Use hashtags and CTAs effectively in LinkedIn posts"
  tags: [linkedin, hashtags, cta, engagement, fundamentals]

state: {}

trigger: |
  Write 5 different LinkedIn post endings (closing + CTA) for a post
  about "3 lessons from scaling a team from 10 to 100 people."

  The author is a COO at a growth-stage startup.

  For each ending:
  1. Write the closing paragraph (2-3 sentences)
  2. Include a CTA that drives engagement (not sales)
  3. Add 3-5 relevant hashtags
  4. Explain what type of engagement this CTA drives (comments,
     shares, saves, follows)

  CTA approaches to use:
  - Reflection question ("What's your experience with...")
  - Framework share ("I'll share the full playbook in the comments")
  - Debate prompt ("Agree or disagree: [specific claim]")
  - Resource offer ("I wrote a deeper breakdown — DM me for the link")
  - Story invitation ("What's your team-scaling story?")

  Also: explain the debate around hashtags on LinkedIn — do they help
  or hurt reach in 2026? How many is optimal?

assertions:
  - type: llm_judge
    criteria: "All 5 CTAs use different approaches and each naturally follows from the post topic — they feel like organic conversation starters, not forced engagement requests"
    weight: 0.25
    description: "Five distinct organic CTAs"
  - type: llm_judge
    criteria: "The hashtag explanation is nuanced — covers the current debate (some say they help discoverability, others say they don't affect distribution), with a practical recommendation of 3-5 relevant tags"
    weight: 0.25
    description: "Nuanced hashtag guidance"
  - type: llm_judge
    criteria: "Engagement type prediction is logical — reflection questions drive comments, framework shares drive saves and follows, debate prompts drive comments and shares"
    weight: 0.25
    description: "Logical engagement type predictions"
  - type: llm_judge
    criteria: "The closing paragraphs are concise — 2-3 sentences that wrap up the post's lesson and transition smoothly into the CTA without feeling abrupt"
    weight: 0.25
    description: "Concise smooth closing paragraphs"
