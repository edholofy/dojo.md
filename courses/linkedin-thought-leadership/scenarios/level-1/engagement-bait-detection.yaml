meta:
  id: engagement-bait-detection
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Identify and fix engagement bait in LinkedIn posts"
  tags: [linkedin, engagement-bait, algorithm, penalties]

state: {}

trigger: |
  LinkedIn penalizes engagement bait by up to 60% in reach. Review these
  6 posts and identify which ones are engagement bait, which are genuine,
  and fix the ones that would be penalized.

  Post 1: "Comment YES if you agree that remote work is the future! 🙌"

  Post 2: "I asked 50 founders what their biggest hiring mistake was.
  The #1 answer surprised me. Here's what I learned..."

  Post 3: "AGREE or DISAGREE: AI will replace 50% of marketing jobs
  by 2028. Drop your take below! 👇👇👇"

  Post 4: "Tag someone who needs to hear this: You don't need a CS
  degree to break into tech."

  Post 5: "After 12 years in sales, I've learned that the best closers
  don't actually 'close.' They listen. Here's my framework..."

  Post 6: "Like = you prefer remote 🏠 Comment = you prefer hybrid 🏢
  Share = you prefer office 🏛️ Which one are you?"

  For each post:
  1. Verdict: Genuine engagement or engagement bait?
  2. Would LinkedIn's algorithm penalize it? (Yes/No and why)
  3. If it's bait, rewrite it to preserve the intent while making it genuine

assertions:
  - type: llm_judge
    criteria: "Posts 1, 3, 4, and 6 are correctly identified as engagement bait — they explicitly ask for specific engagement actions (comment YES, AGREE/DISAGREE, tag someone, like/comment/share)"
    weight: 0.30
    description: "Correct engagement bait identification"
  - type: llm_judge
    criteria: "Posts 2 and 5 are correctly identified as genuine — they create curiosity or share frameworks that naturally invite engagement without explicitly asking for specific actions"
    weight: 0.25
    description: "Genuine posts correctly identified"
  - type: llm_judge
    criteria: "The rewrites preserve the original intent — the AI topic becomes a genuine discussion starter, the tag-someone becomes shareable insight, the poll format becomes a real poll"
    weight: 0.25
    description: "Intent-preserving rewrites"
  - type: llm_judge
    criteria: "The explanation references LinkedIn's algorithm penalties — 60% reach reduction for bait, how the algorithm detects manipulation, and why authentic engagement performs better long-term"
    weight: 0.20
    description: "Algorithm penalty explanation"
