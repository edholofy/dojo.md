meta:
  id: personal-story-post
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Write a personal story LinkedIn post with a business lesson"
  tags: [linkedin, personal-story, vulnerability, authenticity]

state: {}

trigger: |
  Write a LinkedIn post based on this personal experience. The post
  should be authentic, vulnerable, and extract a valuable business lesson.

  The experience:
  You're a product manager who spent 6 months building a feature that
  your team was incredibly proud of. On launch day, you got zero user
  adoption. Not low adoption — literally zero people used it. After
  talking to 20 customers, you discovered that the feature solved a
  problem that customers had already figured out a workaround for.
  They didn't need it.

  The lesson you want to share is about the danger of building in
  isolation without continuous customer feedback.

  Author: Sarah Chen, Senior Product Manager at a B2B SaaS company,
  7 years in product. 4,200 LinkedIn followers.

  Write the full post:
  - Start with the painful moment (vulnerability)
  - Build the narrative arc (what happened, the realization)
  - Extract the business lesson
  - End with something that invites reflection
  - Target: 1,300-1,600 characters
  - Tone: honest, self-aware, not self-pitying

assertions:
  - type: llm_judge
    criteria: "The post opens with vulnerability — the painful zero-adoption moment is front and center, creating empathy and curiosity rather than starting with the lesson"
    weight: 0.25
    description: "Vulnerability-first opening"
  - type: llm_judge
    criteria: "The narrative arc is compelling — there's a clear progression from pride to launch to shock to discovery to lesson, with enough specific details to feel real"
    weight: 0.25
    description: "Compelling narrative arc"
  - type: llm_judge
    criteria: "The business lesson emerges naturally — it's not preached at the end but grows organically from the story. The reader reaches the conclusion alongside the author"
    weight: 0.25
    description: "Naturally emerging business lesson"
  - type: llm_judge
    criteria: "The tone is self-aware without being self-pitying — the author owns the mistake, shares what they learned, and treats it as growth, not a confession or a humble brag"
    weight: 0.25
    description: "Self-aware non-self-pitying tone"
