meta:
  id: post-diagnosis
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Diagnose why a LinkedIn post underperformed"
  tags: [linkedin, diagnosis, optimization, performance]

state: {}

trigger: |
  This LinkedIn post from a marketing director got only 12 likes and
  0 comments (her average is 80 likes and 15 comments). Diagnose why
  it failed and rewrite it.

  Original post:
  ---
  Excited to share that our team just completed a massive rebranding
  project! After 6 months of hard work, we unveiled our new brand
  identity last week. The new logo, color palette, website, and
  messaging all came together beautifully. Huge shoutout to our
  incredible design team, our agency partners at BrandCo, and our
  CEO who championed this initiative from day one. We couldn't have
  done it without everyone's dedication and late nights. If you're
  going through a rebrand, feel free to reach out — happy to share
  our experience! #rebrand #marketing #branding #teamwork #grateful
  ---

  Provide:
  1. Diagnosis: list every problem with this post
  2. Why each problem hurts engagement
  3. A complete rewrite that would perform 5-10x better
  4. Before/after comparison of the key changes

assertions:
  - type: llm_judge
    criteria: "The diagnosis identifies at least 6 problems — self-congratulatory tone, no valuable insight for the reader, no hook, company-focused not audience-focused, generic hashtags, and no specific lesson or framework"
    weight: 0.30
    description: "Comprehensive diagnosis of problems"
  - type: llm_judge
    criteria: "The rewrite transforms the announcement into a lesson — instead of 'we did a rebrand,' it becomes 'here's what I learned from a 6-month rebrand' with specific insights others can use"
    weight: 0.30
    description: "Announcement transformed to lesson"
  - type: llm_judge
    criteria: "The rewrite has a compelling hook — the first 140 characters create curiosity about rebrand insights rather than announcing a company milestone"
    weight: 0.20
    description: "Compelling rewrite hook"
  - type: llm_judge
    criteria: "The before/after comparison clearly shows why each change matters — connecting formatting, tone, and content changes to specific engagement drivers"
    weight: 0.20
    description: "Clear before/after analysis"
