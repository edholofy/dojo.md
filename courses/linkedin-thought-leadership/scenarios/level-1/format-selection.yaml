meta:
  id: format-selection
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Choose the best LinkedIn post format for different content"
  tags: [linkedin, format, carousel, poll, text, fundamentals]

state: {}

trigger: |
  You have 5 different pieces of content to share on LinkedIn. For each,
  recommend the best post format and explain why.

  Available formats:
  - Text-only (5.2% avg engagement)
  - Carousel/document (6.6% avg engagement, 278% more than video)
  - Poll (40% more reach, 1.64x impression multiplier)
  - Native video (5.6% engagement, declining reach)
  - Multi-image (6.6% engagement)

  Content pieces:
  1. A 5-step framework for pricing SaaS products you developed over 10 years
  2. A personal story about getting fired and how it led to founding your startup
  3. You want to understand your audience's biggest challenge with hiring
  4. A 30-second clip of you speaking at a conference about AI ethics
  5. Breaking news: your company just raised a $50M Series C

  For each:
  - Recommend the format
  - Explain why this format maximizes engagement for THIS specific content
  - Write the opening hook for the post
  - Note any format-specific best practices (e.g., carousel slide count, video length)

assertions:
  - type: llm_judge
    criteria: "Format recommendations match content type — the framework gets carousel (visual, step-by-step), the personal story gets text (narrative dwell time), the question gets poll (audience participation)"
    weight: 0.30
    description: "Format matches content type"
  - type: llm_judge
    criteria: "Explanations reference platform data — engagement rates, reach multipliers, and dwell time advantages are cited to justify each format choice"
    weight: 0.25
    description: "Data-backed format justifications"
  - type: llm_judge
    criteria: "Format-specific best practices are included — carousel slide count (3-5), video length (under 90 seconds), poll option design, and text post character targets"
    weight: 0.25
    description: "Format-specific best practices"
  - type: llm_judge
    criteria: "All 5 hooks are compelling and format-appropriate — the carousel hook previews the framework, the text hook opens with vulnerability, the poll hook frames the question engagingly"
    weight: 0.20
    description: "Compelling format-appropriate hooks"
