meta:
  id: commenting-strategy
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Write strategic LinkedIn comments that build authority"
  tags: [linkedin, comments, engagement, authority, strategy]

state: {}

trigger: |
  LinkedIn comments carry 15x more algorithmic weight than likes, and
  strategic commenting on 10-20 posts per day can increase profile
  views by 50%.

  Write strategic comments for these 5 LinkedIn posts from industry
  leaders. You're a marketing director at a SaaS startup.

  Post 1 (from a CEO): "We just hit $10M ARR. The one thing that
  got us here: obsessing over customer retention, not acquisition."

  Post 2 (from a VC): "Hot take: Most SaaS companies should never
  raise venture capital. Here's why..."

  Post 3 (from a marketing VP): "Our blog generated 2,000 leads
  last month. The secret? We stopped writing about our product and
  started writing about our customers' problems."

  Post 4 (from a sales leader): "Cold calling is dead. Change my mind."

  Post 5 (from an engineer): "We just migrated from a monolith to
  microservices. It took 18 months and I'd do it again."

  For each post, write a comment that:
  - Adds genuine value (not just "Great post!")
  - Shows your expertise without being self-promotional
  - Is 2-4 sentences (not a wall of text)
  - Encourages further conversation

  Then explain your commenting strategy.

assertions:
  - type: llm_judge
    criteria: "Every comment adds genuine value — each brings a new perspective, shares a relevant experience, or asks an insightful follow-up question. No generic 'Great point!' or 'Love this!'"
    weight: 0.30
    description: "Genuine value-adding comments"
  - type: llm_judge
    criteria: "Comments demonstrate expertise naturally — the marketing director's knowledge shows through their perspective, not through self-promotion or credential-dropping"
    weight: 0.25
    description: "Natural expertise demonstration"
  - type: llm_judge
    criteria: "Each comment is conversation-worthy — it could spark a reply from the original poster or other commenters, creating a discussion thread"
    weight: 0.25
    description: "Conversation-sparking comments"
  - type: llm_judge
    criteria: "The overall strategy explanation covers frequency, timing, target selection, and how commenting builds authority over time — not just what to write but how to systematically use comments"
    weight: 0.20
    description: "Strategic commenting framework"
