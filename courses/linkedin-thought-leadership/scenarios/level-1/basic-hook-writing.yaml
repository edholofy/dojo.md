meta:
  id: basic-hook-writing
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Write compelling LinkedIn post hooks"
  tags: [linkedin, hooks, opening-lines, fundamentals]

state: {}

trigger: |
  Write 8 different hooks (opening 1-2 lines) for a LinkedIn post about
  this topic: "Why most companies fail at remote work."

  The author is a VP of People Operations at a tech company with 500
  remote employees. They've been managing remote teams for 7 years.

  For each hook:
  1. Write the first 1-2 lines (under 140 characters — the "See More" cutoff)
  2. Label the hook type: question, bold statement, contrarian take,
     vulnerability, data teaser, or story opener
  3. Rate its expected "See More" click rate (low/medium/high)

  Then pick the best hook and write the full post (1,300-1,600 characters).

assertions:
  - type: llm_judge
    criteria: "All 8 hooks are under 140 characters and create genuine curiosity — each makes the reader want to click 'See More' to learn more"
    weight: 0.25
    description: "Hooks under 140 chars with genuine curiosity"
  - type: llm_judge
    criteria: "Multiple hook types are represented — at least 4 different approaches are used, showing versatility in opening technique"
    weight: 0.20
    description: "Diverse hook types represented"
  - type: llm_judge
    criteria: "The full post is properly structured — short paragraphs, line breaks for readability, 1,300-1,600 characters, and delivers on the hook's promise"
    weight: 0.30
    description: "Well-structured full post"
  - type: llm_judge
    criteria: "The content draws on the author's 7 years of experience — specific observations, real patterns, and insider knowledge make it feel authentic, not generic"
    weight: 0.25
    description: "Authentic experience-based content"
