meta:
  id: post-structure-formatting
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Structure and format a LinkedIn post for maximum readability"
  tags: [linkedin, formatting, structure, readability, mobile]

state: {}

trigger: |
  This LinkedIn post has great content but terrible formatting. Fix it
  for maximum readability and engagement.

  Original (all one block):
  "I've been thinking a lot about why startups fail and after talking to over 100 founders who've been through it I've noticed a pattern that nobody talks about. It's not running out of money that kills startups — that's just the symptom. The real killer is what I call 'consensus paralysis.' Here's what happens: the founding team starts out making fast decisions based on gut instinct. Things are moving. Then they hire their first few senior leaders. Suddenly every decision needs a meeting. Every meeting needs a deck. Every deck needs data. And before you know it, the thing that made the startup fast — decisive action — is buried under process. I saw this happen at my own company. We went from 'let's try it Monday' to 'let's discuss it at the quarterly planning session' in about 8 months. The fix isn't removing process — it's creating a decision framework that scales. I now use a simple rule: if the decision is reversible and costs less than $10K, anyone on the team can make it without approval. No meetings. No decks. No consensus needed. This one change cut our decision time by 70% and we haven't had a single regret. What decision frameworks have worked at your company?"

  Reformat this post:
  1. Proper line breaks and paragraph structure
  2. Hook that works within the 140-character "See More" limit
  3. Optimal length (1,300-1,600 characters)
  4. Mobile-friendly formatting (75% of LinkedIn traffic is mobile)
  5. Strategic use of whitespace
  6. Explain every formatting decision you made

assertions:
  - type: llm_judge
    criteria: "The hook is within 140 characters and creates curiosity — it pulls out the most compelling element (maybe 'consensus paralysis' concept or the counterintuitive pattern) to stop the scroll"
    weight: 0.25
    description: "Effective 140-character hook"
  - type: llm_judge
    criteria: "Paragraphs are 2-3 sentences max with line breaks — the post is scannable on mobile with intentional whitespace between sections"
    weight: 0.25
    description: "Mobile-scannable paragraph structure"
  - type: llm_judge
    criteria: "The content is preserved while being tightened — no valuable insights are lost, but filler words and redundancies are removed to hit the 1,300-1,600 character target"
    weight: 0.25
    description: "Content preserved within character target"
  - type: llm_judge
    criteria: "Formatting decisions are explained — why each line break is placed where it is, how whitespace controls reading pace, and how the structure maximizes dwell time"
    weight: 0.25
    description: "Formatting decisions explained"
