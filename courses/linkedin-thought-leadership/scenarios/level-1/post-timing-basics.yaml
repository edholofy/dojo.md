meta:
  id: post-timing-basics
  level: 1
  course: linkedin-thought-leadership
  type: output
  description: "Choose optimal posting times for LinkedIn"
  tags: [linkedin, timing, algorithm, golden-hour, fundamentals]

state: {}

trigger: |
  You're advising 4 different LinkedIn creators on when to post. Each
  has a different audience and situation. Recommend a posting schedule
  for each.

  Creator 1 — Tech startup founder (US-based)
  - Audience: VCs, other founders, tech executives
  - Followers: 8,500 (80% US, 15% Europe, 5% Asia)
  - Content: startup lessons, fundraising advice, product strategy
  - Capacity: can post 3-4 times per week

  Creator 2 — HR consultant (UK-based)
  - Audience: HR directors, CHROs, people ops managers
  - Followers: 3,200 (60% UK/Europe, 30% US, 10% other)
  - Content: hiring best practices, culture building, DEI
  - Capacity: can post 2-3 times per week

  Creator 3 — Sales trainer (selling to global audience)
  - Audience: SDRs, AEs, sales leaders worldwide
  - Followers: 22,000 (40% US, 25% Europe, 20% Asia, 15% other)
  - Content: sales techniques, cold outreach tips, negotiation frameworks
  - Capacity: can post 5 times per week

  Creator 4 — CEO of a B2B SaaS (brand new to LinkedIn)
  - Audience: potential customers (CFOs at mid-market companies)
  - Followers: 450 (just started building)
  - Content: finance insights, company-building stories
  - Capacity: can post 2 times per week + daily commenting

  For each creator, provide:
  - Specific days and times to post (in their local time)
  - Why this schedule works for their audience
  - "Golden hour" strategy (what to do in the first 60 minutes after posting)
  - How to adapt if engagement data shows different patterns

assertions:
  - type: llm_judge
    criteria: "Timing recommendations account for audience time zones — the UK HR consultant targets European morning hours, the global sales trainer considers multiple time zones"
    weight: 0.25
    description: "Time-zone-aware recommendations"
  - type: llm_judge
    criteria: "The golden hour strategy is specific — not just 'engage in the first hour' but exactly what to do (respond to every comment, engage on other posts, share to relevant communities)"
    weight: 0.25
    description: "Specific golden hour strategy"
  - type: llm_judge
    criteria: "The new CEO (Creator 4) gets a realistic starter strategy — acknowledges that 450 followers means posting alone won't work, and the daily commenting strategy is more important initially"
    weight: 0.25
    description: "Realistic starter strategy for small accounts"
  - type: llm_judge
    criteria: "Tuesday-Thursday 8-10 AM is recommended as the core window, with adjustments per creator based on their audience and content type"
    weight: 0.25
    description: "Core timing window with adjustments"
