meta:
  id: humble-brag-fix
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Transform humble brag announcements into valuable posts"
  tags: [linkedin, humble-brag, authenticity, announcement, rewrite]

state: {}

trigger: |
  These 4 LinkedIn posts are humble brags disguised as thought leadership.
  The LinkedIn community hates humble brags. Rewrite each to deliver
  genuine value while still sharing the accomplishment.

  Post 1 — The "I'm so grateful" brag:
  "Truly humbled and grateful to have been named to Forbes 30 Under 30.
  I couldn't have done it without my amazing team, incredible mentors,
  and supportive family. This wouldn't be possible without all of you.
  #grateful #blessed #forbes30under30"

  Post 2 — The "accidental flex":
  "Just got back from speaking at Davos. Jetlagged but inspired by the
  incredible conversations. Grateful for the opportunity to represent
  our company on the world stage. What conferences are you attending
  this year?"

  Post 3 — The "teaching from the mountaintop":
  "After growing our company from $0 to $100M ARR in 4 years, I've
  learned that the most important thing in business is... people.
  Invest in your team and everything else follows."

  Post 4 — The "concern troll":
  "As someone who's raised $200M in venture capital, I'm really worried
  about all these founders chasing funding instead of building real
  businesses. Money isn't everything, trust me."

  For each:
  1. Explain exactly why it reads as a humble brag
  2. Rewrite it to share the same accomplishment while providing
     genuine audience value
  3. Explain the principle behind the fix

assertions:
  - type: llm_judge
    criteria: "Each humble brag is correctly diagnosed — the specific mechanism of each brag is identified (false humility, social proof dropping, mountaintop lecturing, concern trolling)"
    weight: 0.25
    description: "Correct humble brag diagnoses"
  - type: llm_judge
    criteria: "The rewrites share the accomplishment naturally — the Forbes list, Davos, $100M ARR, and $200M raised still come through but as context for a genuine lesson, not the focus"
    weight: 0.30
    description: "Accomplishment shared as context not focus"
  - type: llm_judge
    criteria: "Each rewrite provides genuine audience value — specific lessons, frameworks, or insights that the reader can use, making the accomplishment proof of credibility rather than the point"
    weight: 0.25
    description: "Genuine audience value in rewrites"
  - type: llm_judge
    criteria: "The principles behind each fix are transferable — the reader learns general rules for turning any achievement announcement into valuable content"
    weight: 0.20
    description: "Transferable rewrite principles"
