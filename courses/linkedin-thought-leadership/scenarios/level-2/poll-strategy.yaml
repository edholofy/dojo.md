meta:
  id: poll-strategy
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Design effective LinkedIn polls for engagement and insights"
  tags: [linkedin, polls, engagement, audience-research, reach]

state: {}

trigger: |
  LinkedIn polls get 40% more reach and a 1.64x impression multiplier.
  But most polls are lazy and add no value. Design 5 strategic polls
  for a Head of Sales who wants to establish thought leadership.

  Author: Rachel Torres, Head of Sales at a $20M ARR SaaS company
  Audience: Sales leaders, AEs, SDRs (15,000 followers)

  For each poll:
  1. Write the poll question
  2. Design 4 answer options (with strategic framing)
  3. Write the accompanying post text (the context before the poll)
  4. Explain the strategic intent (what insight you're gathering
     and how you'll use it)
  5. Plan the follow-up post (sharing results with your analysis)

  The polls should:
  - Generate genuine audience insights (not just engagement)
  - Position Rachel as a thoughtful sales leader
  - Be specific to sales (not generic "agree or disagree")
  - Each take a different approach (debate, benchmark, prediction, preference, experience)

assertions:
  - type: llm_judge
    criteria: "All 5 polls are genuinely insightful — they'd produce data that Rachel could use in future content, not just vanity engagement. Each has a clear strategic purpose"
    weight: 0.25
    description: "Genuinely insightful strategic polls"
  - type: llm_judge
    criteria: "Answer options are carefully designed — each set of 4 options covers the realistic range of perspectives, is balanced (no obviously 'right' answer), and creates curiosity about results"
    weight: 0.25
    description: "Carefully designed answer options"
  - type: llm_judge
    criteria: "The accompanying post text adds context — not just the question but WHY Rachel is asking, what made her curious, or her preliminary hypothesis. This drives both voting and commenting"
    weight: 0.25
    description: "Context-rich accompanying text"
  - type: llm_judge
    criteria: "Follow-up plans are specific — each poll has a planned results analysis post that turns the data into a genuine insight, completing the content cycle"
    weight: 0.25
    description: "Specific follow-up content plans"
