meta:
  id: industry-tech-post
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Write industry-specific LinkedIn posts for tech audiences"
  tags: [linkedin, tech-industry, engineering, product, audience]

state: {}

trigger: |
  Write 3 LinkedIn posts for a CTO audience (engineering leaders at
  tech companies). Tech audiences on LinkedIn expect data-driven,
  framework-based content and have high BS detection.

  Author: Marcus Johnson, CTO at a 300-person SaaS company
  Followers: 18,000 (mostly engineering leaders and senior developers)

  Post 1 — Technical decision:
  Topic: Why you chose to build on a boring tech stack (PostgreSQL,
  Rails, Redis) instead of the latest frameworks. Your company
  processes 2M transactions per day on this "boring" stack.

  Post 2 — Engineering culture:
  Topic: Your policy of "no meetings Wednesday" and how it improved
  engineering output by 28% in 3 months.

  Post 3 — Hiring insight:
  Topic: You stopped requiring CS degrees for engineering roles 2 years
  ago. The results: faster hiring, more diverse team, and no drop
  in code quality.

  Each post should:
  - Be technically credible (CTOs will scrutinize claims)
  - Include specific metrics and data
  - Take a clear stance (not wishy-washy)
  - Be 1,300-1,600 characters with proper formatting

assertions:
  - type: llm_judge
    criteria: "The tech stack post is technically credible — it explains WHY boring tech works (proven, debuggable, vast ecosystem) with specific performance data that CTOs would respect"
    weight: 0.25
    description: "Technically credible boring stack argument"
  - type: llm_judge
    criteria: "The no-meetings post has specific methodology — it's not just 'we tried it and it worked' but explains how they measured the 28% improvement, what 'engineering output' means, and caveats"
    weight: 0.25
    description: "Methodologically rigorous meetings post"
  - type: llm_judge
    criteria: "The no-CS-degree post handles the controversy thoughtfully — acknowledges the counterarguments, presents specific evidence, and avoids signaling virtue while making a genuine case"
    weight: 0.25
    description: "Thoughtful no-degree controversy handling"
  - type: llm_judge
    criteria: "All three posts take clear stances — each has a definitive point of view backed by data, not a 'both sides have merit' cop-out that CTO audiences would find uninteresting"
    weight: 0.25
    description: "Clear data-backed stances"
