meta:
  id: data-driven-insight-post
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Write a data-driven LinkedIn post from raw data"
  tags: [linkedin, data-driven, insights, analysis, storytelling]

state: {}

trigger: |
  Turn this raw data into a compelling LinkedIn post. Research-backed
  content gets 2-3x more algorithmic distribution on LinkedIn.

  Raw data from your company's customer success analysis:
  - Analyzed 500 B2B SaaS customer accounts over 2 years
  - Customers who completed onboarding in the first 7 days had 92%
    retention at month 12
  - Customers who took 8-14 days: 71% retention
  - Customers who took 15-30 days: 43% retention
  - Customers who took 30+ days: 18% retention
  - The #1 predictor of fast onboarding: having an internal champion
    who was involved in the buying decision
  - Fastest onboarding: customers who attended a live kickoff call
    (avg: 4.2 days to complete vs. 11.8 days for self-serve)
  - Most common reason for slow onboarding: "We're waiting for IT
    to set up the integration"

  Author: Elena Rodriguez, VP Customer Success, 8,500 followers

  Write a LinkedIn post that:
  - Leads with the most surprising data point
  - Tells a story WITH the data (not just listing numbers)
  - Makes the data actionable (what should reader DO about it)
  - Formats numbers for impact (contrast, comparison, surprise)
  - Target: 1,300-1,600 characters

assertions:
  - type: llm_judge
    criteria: "The most compelling data point leads the post — the 92% vs 18% retention gap based on onboarding speed is likely the hook, creating immediate 'I need to read more' reaction"
    weight: 0.25
    description: "Most compelling data point as hook"
  - type: llm_judge
    criteria: "Data tells a story, not just a report — the numbers are woven into a narrative about what happens to customer relationships based on onboarding speed, not just listed"
    weight: 0.25
    description: "Data woven into narrative"
  - type: llm_judge
    criteria: "The post is actionable — it doesn't just present the data but tells reader what to DO about it (ensure internal champions, offer live kickoffs, solve the IT integration bottleneck)"
    weight: 0.25
    description: "Actionable data-driven recommendations"
  - type: llm_judge
    criteria: "Numbers are formatted for maximum impact — contrasts and comparisons are used to make the data visceral (e.g., '5x difference in retention between fastest and slowest onboarders')"
    weight: 0.25
    description: "Impact-formatted numbers"
