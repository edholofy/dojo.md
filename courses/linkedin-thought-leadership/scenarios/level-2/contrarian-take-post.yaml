meta:
  id: contrarian-take-post
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Write a data-backed contrarian LinkedIn post"
  tags: [linkedin, contrarian, debate, data-backed, engagement]

state: {}

trigger: |
  Write a contrarian LinkedIn post that challenges a widely accepted
  belief in your industry. Contrarian posts get 2-3x more algorithmic
  distribution — but only if they're backed by evidence.

  Author: Jordan Lee, VP of Engineering at a 200-person SaaS company
  Followers: 12,000 (mostly engineering leaders and developers)

  Contrarian take to argue: "Code reviews are wasting your engineering
  team's time. Here's what we replaced them with."

  Context:
  - Your team replaced mandatory code reviews with pair programming
    and automated quality gates
  - Results: 35% faster deployment cycle, bug rate stayed the same
  - The team of 40 engineers ran this experiment for 6 months
  - You have specific data to back this up
  - You know this will be controversial among engineering leaders

  Write the full post:
  - Bold hook that states the contrarian position
  - Acknowledge the counterargument (you know code reviews have value)
  - Present the evidence from your experiment
  - Nuanced conclusion (not "code reviews are always bad" but
    "here's when they're actually wasteful")
  - CTA that invites debate

  The post must be bold enough to generate comments but substantiated
  enough to maintain credibility.

assertions:
  - type: llm_judge
    criteria: "The contrarian hook is bold but not clickbait — it challenges code reviews directly in the first line, creating immediate desire to argue or learn more"
    weight: 0.25
    description: "Bold non-clickbait contrarian hook"
  - type: llm_judge
    criteria: "The counterargument is acknowledged fairly — the post doesn't dismiss code review advocates but shows understanding of why code reviews are valued before presenting the alternative"
    weight: 0.25
    description: "Fair counterargument acknowledgment"
  - type: llm_judge
    criteria: "The evidence is specific and credible — 35% faster deployments, 6-month experiment, 40 engineers, same bug rate. The data makes the post defensible, not just opinionated"
    weight: 0.25
    description: "Specific credible evidence"
  - type: llm_judge
    criteria: "The conclusion is nuanced, not absolute — the post ends with conditions under which the alternative works best, leaving room for genuine discussion rather than polarization"
    weight: 0.25
    description: "Nuanced conditional conclusion"
