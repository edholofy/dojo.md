meta:
  id: dwell-time-optimization
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Optimize LinkedIn posts for dwell time"
  tags: [linkedin, dwell-time, algorithm, engagement, optimization]

state: {}

trigger: |
  Dwell time is LinkedIn's most powerful engagement signal. Posts with
  61+ seconds of dwell time get 15.6% engagement vs. 1.2% for posts
  with 0-3 seconds (a 13x difference).

  You have 3 draft LinkedIn posts that are good but not optimized for
  dwell time. Rewrite each to maximize how long readers stay on the post.

  Draft 1 (data insight — currently too short):
  "Companies that promote from within have 41% lower turnover. Stop
  overlooking your internal talent."

  Draft 2 (list post — currently too scannable/skippable):
  "5 things I'd tell my younger self about leadership:
  1. Listen more
  2. Hire slow
  3. Give credit
  4. Admit mistakes
  5. Stay curious"

  Draft 3 (opinion post — currently lacks depth):
  "Unpopular opinion: Most company values are meaningless. They're
  just words on a wall."

  For each:
  1. Explain why the current version has low dwell time
  2. Rewrite it to maximize dwell time (target: 60+ seconds of reading)
  3. Explain the specific techniques you used to increase dwell time
  4. Keep the core message intact while expanding depth

assertions:
  - type: llm_judge
    criteria: "Each rewrite is substantially longer and deeper than the original — adding narrative, specifics, examples, and nuance that reward extended reading without being padded"
    weight: 0.25
    description: "Substantially deeper rewrites"
  - type: llm_judge
    criteria: "Dwell time techniques are explicitly identified — narrative tension, progressive revelation, specific examples, curiosity gaps within the post, and strategic pacing that prevents skimming"
    weight: 0.25
    description: "Explicit dwell time techniques"
  - type: llm_judge
    criteria: "The data insight (Draft 1) becomes a story — the stat is unpacked with examples, context, and implications that make the reader think rather than just note the number"
    weight: 0.25
    description: "Data insight expanded to story"
  - type: llm_judge
    criteria: "The list post (Draft 2) is transformed — generic advice becomes specific lessons with enough detail per point to create genuine dwell time, possibly with one point expanded deeply"
    weight: 0.25
    description: "Generic list transformed to specific lessons"
