meta:
  id: posting-frequency-strategy
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Design an optimal posting frequency strategy"
  tags: [linkedin, frequency, consistency, strategy, burnout]

state: {}

trigger: |
  A founder is struggling with LinkedIn consistency. Help them design
  a sustainable posting strategy.

  Situation:
  - Name: David Kim, CEO of a 20-person B2B SaaS startup
  - Current pattern: posts 5x one week, then nothing for 3 weeks
  - When he posts consistently, his content performs well (avg 150 likes)
  - When he returns after a gap, performance drops to 20-30 likes
  - Available time: realistically 3-4 hours per week for LinkedIn
  - Content sources: customer conversations, industry trends, personal
    leadership lessons, company milestones
  - 91% of top LinkedIn creators post at least every 3 days

  Design:
  1. Optimal posting frequency given his constraints
  2. Content batching strategy (how to create a week's content in one sitting)
  3. A "minimum viable LinkedIn presence" for busy weeks
  4. How to rebuild momentum after an unavoidable gap
  5. The commenting strategy that supplements his posts (time-efficient)
  6. A 30-day content calendar with specific post topics and formats
  7. How to measure if the strategy is working

assertions:
  - type: llm_judge
    criteria: "The frequency recommendation is sustainable — 2-3 posts/week with daily 15-minute commenting, not an aspirational 5x/week that will lead to burnout and gaps"
    weight: 0.25
    description: "Sustainable frequency recommendation"
  - type: llm_judge
    criteria: "The batching strategy is practical — describes how to write 3 posts in one 90-minute session using templates, content prompts, and the content pillar framework"
    weight: 0.25
    description: "Practical content batching strategy"
  - type: llm_judge
    criteria: "The minimum viable presence is defined — what to do in a 15-minute time block on a busy day (2-3 strategic comments, reshare with commentary) to maintain algorithm presence"
    weight: 0.25
    description: "Defined minimum viable presence"
  - type: llm_judge
    criteria: "The 30-day calendar has specific topics, not just 'post about X pillar' — actual post ideas with format suggestions that David could execute immediately"
    weight: 0.25
    description: "Specific 30-day content calendar"
