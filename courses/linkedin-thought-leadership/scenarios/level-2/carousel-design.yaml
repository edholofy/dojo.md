meta:
  id: carousel-design
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Design a LinkedIn carousel post for maximum engagement"
  tags: [linkedin, carousel, document, visual, design]

state: {}

trigger: |
  Design a LinkedIn carousel post (document format). Carousels get 278%
  more engagement than video and users spend 15-20 seconds per slide.

  Author: Maria Santos, Head of Product Design at a fintech company
  Topic: "5 UX mistakes that cost fintech companies millions"

  Design the complete carousel:
  1. Cover slide (the hook — what makes someone click to open)
  2. Slides 2-6 (one mistake per slide)
  3. Closing slide (CTA + author info)

  For each slide, provide:
  - Headline text (5-10 words, scannable)
  - Body text (2-3 sentences max per slide)
  - Visual direction (what the slide should look like)
  - Why this slide keeps the reader swiping

  Also write the LinkedIn post caption that accompanies the carousel
  (this is what appears in the feed before they open the document).

  Best practices to follow:
  - 3-8 slides optimal (diminishing returns beyond)
  - Each slide must deliver standalone value
  - Progressive disclosure (each slide builds on the last)
  - Final slide drives action

assertions:
  - type: llm_judge
    criteria: "The cover slide creates irresistible curiosity — the headline is specific enough to promise value ('5 UX mistakes that cost millions') while creating a curiosity gap that demands clicking"
    weight: 0.25
    description: "Irresistible cover slide"
  - type: llm_judge
    criteria: "Each mistake slide delivers standalone value — if someone only sees slide 3, they still learn something useful. But the progression encourages swiping through all slides"
    weight: 0.25
    description: "Standalone value per slide"
  - type: llm_judge
    criteria: "The mistakes are specific to fintech UX — not generic 'bad UX' examples but industry-specific issues (complex onboarding flows, confusing fee displays, poor error states in transactions)"
    weight: 0.25
    description: "Fintech-specific UX mistakes"
  - type: llm_judge
    criteria: "The caption post is optimized separately — it hooks the reader, sets up the carousel topic, and is structured for the LinkedIn feed (not just a description of the document)"
    weight: 0.25
    description: "Separately optimized caption"
