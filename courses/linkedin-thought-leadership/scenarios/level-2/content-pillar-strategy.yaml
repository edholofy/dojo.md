meta:
  id: content-pillar-strategy
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Design content pillars for LinkedIn thought leadership"
  tags: [linkedin, content-pillars, strategy, consistency, planning]

state: {}

trigger: |
  Design a content pillar strategy for a LinkedIn thought leadership
  presence. The author wants to post 4 times per week consistently
  for the next 6 months.

  Author: Priya Sharma, CFO at a Series C SaaS company ($50M ARR)
  Goal: Establish herself as a thought leader in SaaS finance
  Current following: 2,800 (wants to reach 15,000 in 6 months)
  Target audience: SaaS founders, VPs of Finance, CFOs, investors

  Design:
  1. Define 3-5 content pillars with:
     - Pillar name and description
     - Why this pillar resonates with the target audience
     - Example topics (5 per pillar)
     - Recommended post format for each pillar (text, carousel, etc.)

  2. Weekly content calendar template:
     - Which pillar on which day
     - Posting time recommendations
     - Format rotation to keep the feed varied

  3. Write one example post for each pillar (full posts)

  4. How to measure which pillars perform best and adjust over time

  The strategy should feel focused enough to build authority but
  varied enough to keep the audience engaged.

assertions:
  - type: llm_judge
    criteria: "Content pillars are distinct but complementary — each covers a different angle of SaaS finance (operational, strategic, personal, educational) without overlapping excessively"
    weight: 0.25
    description: "Distinct complementary content pillars"
  - type: llm_judge
    criteria: "The pillar topics are specific to SaaS finance — not generic business advice but topics like 'burn rate management,' 'metrics that mislead,' or 'fundraising from the CFO seat'"
    weight: 0.25
    description: "SaaS-finance-specific pillar topics"
  - type: llm_judge
    criteria: "The weekly calendar balances variety and consistency — different formats and pillars across the week prevent monotony while maintaining a recognizable posting pattern"
    weight: 0.25
    description: "Varied yet consistent weekly calendar"
  - type: llm_judge
    criteria: "Example posts demonstrate what each pillar looks like in practice — each is a full, post-ready piece that could be published as-is, showing the pillar's tone and style"
    weight: 0.25
    description: "Full publishable example per pillar"
