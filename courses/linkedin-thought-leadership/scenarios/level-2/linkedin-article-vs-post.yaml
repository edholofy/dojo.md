meta:
  id: linkedin-article-vs-post
  level: 2
  course: linkedin-thought-leadership
  type: output
  description: "Choose between LinkedIn articles and posts for different goals"
  tags: [linkedin, articles, posts, format-strategy, content-decisions]

state: {}

trigger: |
  LinkedIn offers two native long-form formats: regular posts (up to 3,000
  characters) and LinkedIn Articles (unlimited length, blog-style). Each
  serves a different purpose in a thought leadership strategy.

  Author: Dana Park, VP of Engineering at a mid-size fintech company
  Current: 5,200 followers, posts 2x/week (avg 150 likes)
  Goal: Establish authority in engineering leadership and technical strategy

  Dana has 6 content ideas. For each one, recommend whether it should be a
  post or an article, and explain why:

  1. "5 signs your engineering team is burning out" — personal observations
  2. "How we migrated 2M users to a new auth system with zero downtime" —
     detailed technical case study with architecture diagrams
  3. "Hot take: most microservices architectures are premature optimization"
  4. "A complete guide to running effective sprint retrospectives" — step-by-step
  5. "I just promoted my first engineer to staff level. Here's what I learned."
  6. "The engineering manager's toolkit: 12 frameworks I use weekly"

  For each recommendation:
  - Post or Article — and why this format serves the content better
  - How to adapt the content for the chosen format
  - Expected engagement pattern (posts get more immediate engagement,
    articles get more search traffic and long-tail views)

  Then write:
  - A full LinkedIn post version of idea #3 (the hot take)
  - An article outline for idea #2 (the migration case study) including
    title, subtitle, section headers, and a brief description of each section

assertions:
  - type: llm_judge
    criteria: "Format recommendations are well-reasoned — shorter opinion pieces and stories are posts, detailed technical content and comprehensive guides are articles, with clear explanations of why"
    weight: 0.25
    description: "Well-reasoned format recommendations"
  - type: llm_judge
    criteria: "The engagement pattern analysis is accurate — posts get more comments and shares in the first 24 hours, articles rank in Google and LinkedIn search and generate views over months"
    weight: 0.25
    description: "Accurate engagement pattern analysis"
  - type: llm_judge
    criteria: "The hot take post is punchy and debate-worthy — it takes a clear stance on microservices, uses specific examples, and is structured for maximum comment engagement"
    weight: 0.25
    description: "Punchy debate-worthy hot take post"
  - type: llm_judge
    criteria: "The article outline for the migration case study is comprehensive — includes technical context, challenges, solution architecture, results with metrics, and lessons learned sections"
    weight: 0.25
    description: "Comprehensive technical article outline"
