meta:
  id: international-multilingual-strategy
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Build LinkedIn thought leadership across multiple languages and regions"
  tags: [linkedin, international, multilingual, global-strategy, localization]

state: {}

trigger: |
  A thought leader wants to build LinkedIn authority across multiple
  countries and languages simultaneously. Design a global strategy that
  accounts for cultural differences in LinkedIn usage.

  Creator Profile:
  - Name: Sophie Leclerc, Global VP of Customer Experience at a multinational
    software company
  - Based in: Paris, France
  - Languages: Native French, fluent English, conversational German and Spanish
  - LinkedIn: 21,000 followers (40% France, 30% US/UK, 15% DACH, 15% LatAm)
  - Content: Currently posts only in English, 3x/week
  - Goal: Build authority in all 4 regions as THE voice for CX strategy in
    enterprise software

  Design the international LinkedIn strategy:

  1. Regional LinkedIn behavior analysis:
     - How LinkedIn usage differs across France, US/UK, DACH, and Latin America:
       a) Content consumption patterns and peak times
       b) Engagement styles (commenting culture differs significantly)
       c) Content preferences (formal vs informal, data vs stories)
       d) Hashtag and SEO differences
     - What works in the US that fails in France (and vice versa)

  2. Multilingual content strategy:
     - Should Sophie post in multiple languages? (pros/cons analysis)
     - Design option A: Single profile, alternating languages
     - Design option B: English-only with regional content adaptation
     - Design option C: English primary + native-language comments/engagement
     - Recommend the best approach with justification
     - Write the same insight as 3 different posts:
       a) Optimized for US/UK audience (English)
       b) Optimized for French audience (French, culturally adapted)
       c) Optimized for DACH audience (English but culturally adapted)

  3. Regional thought leadership positioning:
     - How CX thought leadership differs by region
     - Regulatory and cultural considerations (GDPR framing in Europe vs
       US approach, labor law differences affecting CX strategy)
     - Local events, conferences, and LinkedIn groups per region
     - Collaboration strategy with local thought leaders

  4. Content calendar and operations:
     - Weekly posting schedule that covers all regions
     - How to time posts for different time zones
     - Translation and localization workflow
     - When to use AI translation vs human translators

  5. Measurement:
     - Regional engagement dashboards
     - How to track growth and authority per market
     - When to double down on a region vs. pull back

assertions:
  - type: llm_judge
    criteria: "The regional behavior analysis reveals genuine cultural differences — not stereotypes, but specific LinkedIn usage patterns like commenting length norms, formality expectations, and content format preferences per region"
    weight: 0.25
    description: "Genuine cultural LinkedIn behavior insights"
  - type: llm_judge
    criteria: "The 3 regionally adapted posts demonstrate real localization — not just translation but cultural adaptation in tone, examples, references, and structure that resonates differently in each market"
    weight: 0.25
    description: "Genuinely localized regional posts"
  - type: llm_judge
    criteria: "The multilingual approach recommendation is well-reasoned — weighs algorithm implications, audience expectations, creator capacity, and engagement patterns to arrive at a practical choice"
    weight: 0.25
    description: "Well-reasoned multilingual approach"
  - type: llm_judge
    criteria: "The operations plan is sustainable for one person with support — acknowledges the complexity of multi-regional content without requiring an unrealistic team or time investment"
    weight: 0.25
    description: "Sustainable multi-regional operations plan"
