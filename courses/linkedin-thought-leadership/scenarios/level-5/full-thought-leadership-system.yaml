meta:
  id: full-thought-leadership-system
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Design a complete LinkedIn thought leadership system from zero to authority"
  tags: [linkedin, system-design, authority, comprehensive, strategy]

state: {}

trigger: |
  Design a complete, end-to-end LinkedIn thought leadership system that takes
  someone from zero presence to recognized industry authority in 12 months.

  Client Profile:
  - Name: Dr. Amara Osei, Chief Data Officer at a Fortune 500 retail company
  - Background: PhD in statistics, 15 years in data/analytics, led a team
    that saved the company $200M through predictive analytics
  - LinkedIn: Has a profile but has never posted. 800 connections (mostly
    former colleagues). No content history.
  - Goal: Become the top voice in retail data strategy within 12 months
  - Time budget: 3 hours/week maximum
  - Available assets: 10 years of case studies, 3 published papers,
    internal talks, a unique framework for retail data maturity

  Design the complete system:

  1. Phase 1 — Foundation (Months 1-3):
     - Profile build-out (full rewrite: headline, about, experience, featured)
     - Content pillar definition (3 pillars with sub-topics)
     - First 30 days posting plan (exact posts for the first 4 weeks)
     - Write 4 posts for Week 1 (each in a different format)
     - Commenting strategy to build initial network
     - Connection request strategy (who to connect with, what message to send)
     - Target metrics: followers, engagement rate, profile views

  2. Phase 2 — Growth (Months 4-6):
     - Content evolution (how posts change as audience grows)
     - Engagement loop design (how content creates more content)
     - LinkedIn newsletter launch (timing, concept, first edition outline)
     - Collaboration strategy (co-created content, tagging, cross-promotion)
     - Target metrics with growth rates

  3. Phase 3 — Authority (Months 7-9):
     - Owned IP: Launch a signature framework on LinkedIn
     - Write the "signature post" — the one piece that defines her brand
     - Media/podcast strategy using LinkedIn as a launchpad
     - Speaking engagement funnel from LinkedIn activity
     - How to handle growing DM volume and opportunities

  4. Phase 4 — Leverage (Months 10-12):
     - Monetization options (consulting, advisory, board seats, courses)
     - Team/delegation plan (when to hire a content manager)
     - Platform diversification (using LinkedIn authority to build on other
       channels)
     - 12-month retrospective metrics and what-to-measure framework

  5. Operating system:
     - Weekly 3-hour time block breakdown (research, writing, engagement)
     - Content production workflow (idea → draft → publish → engage)
     - Tool stack recommendations
     - Emergency protocols (negative comments, controversial posts, competitor
       attacks)

assertions:
  - type: llm_judge
    criteria: "The system is comprehensive yet realistic for 3 hours/week — every activity has a time allocation, and the total doesn't exceed the budget. Prioritization is clear when trade-offs are needed"
    weight: 0.20
    description: "Comprehensive yet time-realistic system"
  - type: llm_judge
    criteria: "The 4 Week 1 posts are excellent and demonstrate range — each shows a different format and content pillar, and they're strong enough to make a memorable first impression on LinkedIn"
    weight: 0.20
    description: "Excellent range-demonstrating Week 1 posts"
  - type: llm_judge
    criteria: "The 12-month progression is logical — each phase builds on the previous one, with clear triggers for transitioning between phases and realistic growth expectations"
    weight: 0.20
    description: "Logical 12-month phase progression"
  - type: llm_judge
    criteria: "The signature framework leverages Amara's unique assets — her PhD background, retail data maturity expertise, and $200M case study are woven into a differentiated brand, not generic data leadership content"
    weight: 0.20
    description: "Unique-asset-leveraging signature framework"
  - type: llm_judge
    criteria: "The operating system is practical and sustainable — the weekly time block, content workflow, and tool stack would actually work for a busy executive, not just look good on paper"
    weight: 0.20
    description: "Practical sustainable operating system"
