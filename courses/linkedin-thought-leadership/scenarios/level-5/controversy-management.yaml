meta:
  id: controversy-management
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Navigate and leverage controversy on LinkedIn for thought leadership growth"
  tags: [linkedin, controversy, reputation, risk-management, polarization]

state: {}

trigger: |
  Controversy on LinkedIn is a double-edged sword — it can accelerate
  authority or destroy reputation. Design a sophisticated strategy for
  navigating the spectrum from safe to provocative content.

  Context:
  - Creator: Jake Morrison, managing partner at a management consulting firm
  - LinkedIn: 40,000 followers, strong engagement in leadership/strategy
  - Situation: Jake recently posted "MBA programs are the biggest scam in
    professional education" and it went semi-viral (8,000 likes, 1,200 comments)
  - Result: 3,000 new followers, 2 speaking invitations, BUT also:
    - 200+ angry comments from MBA holders and business school professors
    - A professor wrote a rebuttal article tagging Jake
    - His firm's managing partners are concerned about client perception
    - He received 15 DMs from prospective clients saying "finally someone
      said it" and 5 DMs from current clients saying "this was unprofessional"

  Navigate this situation and design a controversy management framework:

  1. Immediate crisis response:
     - Should Jake double down, apologize, clarify, or stay silent?
     - Write the optimal follow-up post (within 48 hours)
     - How to respond to the professor's rebuttal article
     - How to handle the concerned managing partners internally
     - What to say to the 5 unhappy current clients

  2. Comment section management:
     - Write responses to 5 types of comments:
       a) The angry MBA grad: "This is insulting to everyone who..."
       b) The thoughtful disagreement: "I see your point, but the data shows..."
       c) The pile-on supporter: "EXACTLY! MBAs are worthless!"
       d) The personal attack: "Easy to say when you had rich parents..."
       e) The nuanced response: "You're right about the cost, wrong about the value"
     - When to respond vs. when to let the conversation play out
     - How to moderate without censoring

  3. Controversy framework for future posts:
     - The "provocation spectrum" — map content from safe to nuclear:
       a) Consensus (everyone agrees) — lowest risk, lowest reward
       b) Contrarian (challenges conventional wisdom) — moderate risk
       c) Provocative (challenges institutions or identities) — high risk
       d) Inflammatory (attacks people or groups) — career risk
     - Where Jake's MBA post fell on this spectrum
     - How to calibrate provocation for maximum growth with manageable risk
     - Topics Jake should be contrarian about vs topics to avoid

  4. Long-term reputation strategy:
     - How to use this controversy to strengthen rather than damage his brand
     - The "controversy cycle" — how to follow provocation with value
     - Building a reputation as "honest and bold" vs "reckless and offensive"
     - How to know when you've crossed the line and course-correct

  5. Scenario planning:
     - Write response plans for 3 escalation scenarios:
       a) A journalist wants to interview Jake about the post
       b) A major client threatens to leave the firm
       c) The post gets picked up by mainstream media with a negative framing

assertions:
  - type: llm_judge
    criteria: "The immediate response strategy is sophisticated — doesn't fully apologize (which would alienate the 3,000 new followers) or double down (which risks more damage), but finds a nuanced middle ground"
    weight: 0.25
    description: "Sophisticated nuanced immediate response"
  - type: llm_judge
    criteria: "The comment responses match the emotional tone of each commenter — the angry MBA grad gets empathy, the personal attacker gets boundaries, the nuanced response gets genuine engagement"
    weight: 0.20
    description: "Emotionally calibrated comment responses"
  - type: llm_judge
    criteria: "The provocation spectrum framework is practical and self-aware — clearly identifies where Jake's post landed, why it triggered stronger reactions than intended, and how to calibrate future posts"
    weight: 0.25
    description: "Practical self-aware provocation framework"
  - type: llm_judge
    criteria: "The escalation scenario plans are realistic and actionable — the journalist response, client retention plan, and media strategy each show specific steps and language to use"
    weight: 0.15
    description: "Realistic escalation scenario plans"
  - type: llm_judge
    criteria: "The long-term strategy shows how controversy, when managed well, accelerates thought leadership — includes the 'controversy cycle' of provocation followed by value-delivery that builds a bold but credible brand"
    weight: 0.15
    description: "Controversy-to-authority long-term strategy"
