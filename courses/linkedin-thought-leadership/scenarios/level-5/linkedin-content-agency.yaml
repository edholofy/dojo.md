meta:
  id: linkedin-content-agency
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Build and operate a LinkedIn content agency from scratch"
  tags: [linkedin, agency, business-model, operations, client-management]

state: {}

trigger: |
  You're building a LinkedIn thought leadership agency from scratch. Design
  the entire business — positioning, services, pricing, operations, and
  client acquisition — using LinkedIn itself as your primary channel.

  Founder Profile:
  - You've been ghostwriting for 3 executives for the past year as a freelancer
  - Results: Grew one client from 2K to 25K followers, another landed a TEDx
    talk and 3 board seats through LinkedIn presence
  - Current revenue: $12K/month (3 clients at $4K each)
  - Goal: Build to $50K/month within 12 months with a team of 5

  Design the complete agency:

  1. Positioning and services:
     - Agency name, tagline, and positioning statement
     - Service tiers with deliverables and pricing:
       a) Done-for-you (full ghostwriting)
       b) Done-with-you (coaching + editing)
       c) DIY (course/templates)
     - Ideal client profile (industry, role, company size, budget)
     - How to differentiate from the 1,000+ "LinkedIn coaches" out there

  2. Client acquisition via LinkedIn:
     - Your own LinkedIn content strategy (practicing what you preach)
     - Write 5 posts that demonstrate expertise and attract clients:
       a) Case study post (anonymized client results)
       b) Behind-the-scenes of ghostwriting
       c) Industry insight that shows you understand the LinkedIn algorithm
       d) Client testimonial/story
       e) Contrarian take on LinkedIn marketing
     - Outreach strategy for high-value prospects
     - Referral program design

  3. Operations and delivery:
     - Client onboarding process (voice discovery, content pillars, approval
       workflow)
     - Content production workflow for 15 clients simultaneously
     - Quality control system (how to maintain voice fidelity at scale)
     - Team structure: roles, responsibilities, hiring criteria
     - Tools and tech stack

  4. Scaling plan:
     - Month 1-3: Foundation (hiring, processes, first clients)
     - Month 4-8: Growth (scaling to 10 clients)
     - Month 9-12: Optimization (15 clients, $50K/month)
     - Revenue model and unit economics per client
     - When to specialize vs. stay generalist

  5. Risk management:
     - What happens when a client's post goes viral for wrong reasons
     - Client churn prevention
     - Protecting against AI commoditizing the service
     - How to handle the "I can just use ChatGPT" objection

assertions:
  - type: llm_judge
    criteria: "The positioning clearly differentiates from generic LinkedIn coaches — the agency has a specific niche, measurable results to point to, and a unique methodology rather than just 'we write LinkedIn posts'"
    weight: 0.20
    description: "Clearly differentiated positioning"
  - type: llm_judge
    criteria: "The 5 client acquisition posts are meta-effective — they simultaneously demonstrate LinkedIn expertise and attract clients, with each post serving a specific stage of the buyer journey"
    weight: 0.20
    description: "Meta-effective client acquisition posts"
  - type: llm_judge
    criteria: "The operations design scales — the workflow for 15 clients is realistic with 5 team members, quality control doesn't become a bottleneck, and the onboarding process captures voice efficiently"
    weight: 0.20
    description: "Scalable operations design"
  - type: llm_judge
    criteria: "The unit economics are sound — pricing, team costs, and margin projections show a viable path from $12K to $50K/month with realistic client counts and retention assumptions"
    weight: 0.20
    description: "Sound unit economics"
  - type: llm_judge
    criteria: "The AI commoditization strategy is thoughtful — acknowledges the real threat and positions human ghostwriting around things AI can't replicate (executive voice, strategic judgment, relationship context)"
    weight: 0.20
    description: "Thoughtful AI commoditization strategy"
