meta:
  id: thought-leadership-measurement-roi
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Build a comprehensive ROI measurement framework for LinkedIn thought leadership"
  tags: [linkedin, roi, measurement, analytics, business-impact]

state: {}

trigger: |
  The hardest question in thought leadership: "What's the ROI?" Design a
  comprehensive measurement framework that connects LinkedIn activity to
  business outcomes.

  Context:
  - Company: Apex Solutions (mid-market B2B SaaS, $30M ARR)
  - The CEO has been posting on LinkedIn for 12 months with strong engagement
  - The board is asking: "Is this worth the CEO's time?"
  - The marketing team believes LinkedIn is driving pipeline but can't prove it
  - The CEO spends 5 hours/week on LinkedIn content and engagement

  Build the measurement framework:

  1. Attribution model:
     - Direct attribution: Track leads who explicitly mention LinkedIn
     - Influenced attribution: Prospects who engaged with LinkedIn content
       before entering the pipeline
     - Dark social attribution: How to capture the "I saw your post" effect
       that doesn't show in analytics
     - Multi-touch attribution model for LinkedIn touchpoints
     - Write survey questions to capture LinkedIn influence at 3 pipeline stages:
       a) Lead form: "How did you hear about us?"
       b) Sales discovery call: LinkedIn-specific qualification questions
       c) Post-close: Win/loss attribution questions

  2. Metrics hierarchy:
     - Vanity metrics (follower count, likes) — why they matter less than
       people think
     - Leading indicators (profile views by target accounts, DM quality,
       speaking invitations)
     - Lagging indicators (attributed pipeline, win rate influence, ACV
       premium)
     - The "authority premium" calculation: how thought leadership affects
       deal size and win rate
     - Design a balanced scorecard with 10 metrics across 4 categories

  3. Data collection infrastructure:
     - What to track in CRM (Salesforce fields and workflow)
     - LinkedIn analytics vs third-party tools
     - How to connect LinkedIn engagement data to CRM contacts
     - Monthly reporting template
     - Quarterly business review presentation template (for the board)

  4. ROI calculation:
     - Build a sample ROI model with realistic numbers:
       - CEO time cost: 5 hours/week × $300/hour loaded cost
       - Content support cost: ghostwriter, tools, etc.
       - Total annual investment
       - Pipeline influenced (with attribution methodology)
       - Revenue attributable to LinkedIn
       - ROI ratio and payback period
     - Sensitivity analysis: what changes the ROI most?
     - Comparison to alternative marketing investments

  5. Board presentation:
     - Write the executive summary slide (bullet points) that convinces
       the board LinkedIn is worth the CEO's time
     - How to frame qualitative benefits (brand, recruitment, partnerships)
       alongside quantitative ROI
     - What to say if the ROI is negative or unclear

assertions:
  - type: llm_judge
    criteria: "The attribution model addresses dark social seriously — LinkedIn's biggest challenge is that most influence is invisible (people see posts but don't click), and the framework captures this through surveys, sales conversations, and proxy metrics"
    weight: 0.25
    description: "Dark social-addressing attribution model"
  - type: llm_judge
    criteria: "The ROI calculation uses realistic numbers — the sample model has plausible costs, pipeline values, and attribution percentages that a CFO would find credible, not inflated marketing estimates"
    weight: 0.25
    description: "CFO-credible ROI calculation"
  - type: llm_judge
    criteria: "The balanced scorecard connects LinkedIn activity to business outcomes through a clear chain — from engagement metrics to pipeline influence to revenue, with each link in the chain measurable"
    weight: 0.25
    description: "Activity-to-outcome balanced scorecard"
  - type: llm_judge
    criteria: "The board presentation is executive-ready — concise, focuses on business impact not social media metrics, and honestly addresses the limitations of attribution while making a compelling case"
    weight: 0.25
    description: "Executive-ready board presentation"
