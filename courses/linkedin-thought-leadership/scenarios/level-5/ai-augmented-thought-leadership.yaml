meta:
  id: ai-augmented-thought-leadership
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Integrate AI tools into LinkedIn thought leadership without losing authenticity"
  tags: [linkedin, ai-tools, authenticity, efficiency, human-ai-collaboration]

state: {}

trigger: |
  AI tools can 10x a thought leader's content output — but LinkedIn's
  audience is increasingly skeptical of AI-generated content. Design a
  strategy that leverages AI for efficiency while maintaining genuine
  human voice and originality.

  Creator Profile:
  - Name: Ryan Mitchell, founder and CEO of a marketing analytics company
  - LinkedIn: 32,000 followers, known for insightful data-driven posts
  - Current process: Writes everything manually, spends 8+ hours/week on
    LinkedIn content
  - Goal: Reduce time to 3 hours/week while maintaining or improving quality
  - Concern: His audience (senior marketers) will immediately detect
    AI-generated content and lose trust

  Design the AI-augmented thought leadership system:

  1. The AI authenticity framework:
     - Define which parts of the content process AI should handle:
       a) Research and data gathering
       b) First drafts and brainstorming
       c) Editing and polishing
       d) Scheduling and analytics
       e) Engagement (comments, DMs)
     - For each: level of AI involvement (none, assist, draft, automate)
     - The "authenticity line" — what should NEVER be AI-generated
     - How to disclose (or not) AI usage on LinkedIn

  2. Practical AI workflow:
     - Design a specific workflow using current AI tools (2026):
       Step 1: Human ideation (what only Ryan can think of)
       Step 2: AI research assistance (finding data, stats, examples)
       Step 3: AI-assisted drafting (with specific prompting approach)
       Step 4: Human voice injection (the critical editing step)
       Step 5: AI optimization (formatting, hashtags, timing)
     - Time allocation per step (must total 3 hours/week for 4 posts)
     - Show a before/after: AI first draft → human-edited final version

  3. Detection avoidance:
     - Common tells of AI-generated LinkedIn content (and how to eliminate them)
     - Write 2 versions of the same post:
       a) A typical AI-generated post (identifying every "AI tell")
       b) The human-AI collaborative version that passes authenticity checks
     - Annotate every change between the two versions

  4. Quality control system:
     - Checklist for reviewing AI-assisted content before posting
     - How to maintain Ryan's unique voice across AI-assisted posts
     - Red flags that suggest over-reliance on AI
     - How to periodically "calibrate" the AI with new voice samples

  5. Ethical considerations:
     - The transparency debate: should creators disclose AI assistance?
     - How LinkedIn's policies may evolve on AI-generated content
     - Building a personal stance that's defensible and authentic
     - What happens if a competitor calls you out for using AI

assertions:
  - type: llm_judge
    criteria: "The AI involvement framework is nuanced — draws clear lines between what should be automated, assisted, and kept fully human, with thoughtful reasoning for each boundary"
    weight: 0.20
    description: "Nuanced AI involvement framework"
  - type: llm_judge
    criteria: "The practical workflow reduces time from 8 to 3 hours realistically — each step has a specific time allocation and the total adds up, with enough human touchpoints to maintain authenticity"
    weight: 0.20
    description: "Realistic time-reducing AI workflow"
  - type: llm_judge
    criteria: "The before/after post comparison is illuminating — clearly identifies AI tells (generic openings, excessive lists, lack of specific personal experience, hedge language) and shows exactly how human editing fixes each one"
    weight: 0.25
    description: "Illuminating AI-tell before/after comparison"
  - type: llm_judge
    criteria: "The ethical considerations section takes a thoughtful stance — doesn't just say 'be transparent' but acknowledges the nuance of AI assistance vs AI generation and proposes a defensible position"
    weight: 0.20
    description: "Thoughtful ethical stance on AI disclosure"
  - type: llm_judge
    criteria: "The voice calibration system is practical — includes specific techniques for maintaining a unique voice when using AI tools, not just 'add your personality' but concrete editing strategies"
    weight: 0.15
    description: "Practical voice calibration system"
