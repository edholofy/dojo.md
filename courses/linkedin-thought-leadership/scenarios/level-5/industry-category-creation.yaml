meta:
  id: industry-category-creation
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Use LinkedIn to create and own a new industry category"
  tags: [linkedin, category-creation, market-positioning, thought-leadership, pioneer]

state: {}

trigger: |
  The most powerful form of thought leadership isn't winning an existing
  conversation — it's creating a new one. Design a LinkedIn-first category
  creation strategy.

  Company/Person:
  - Name: Wei Zhang, CEO and co-founder of a startup that combines behavioral
    science with product analytics
  - The problem: Their product doesn't fit neatly into "product analytics"
    (Amplitude, Mixpanel) or "user research" (UserTesting, Maze) — it's
    something new
  - Proposed category name: "Behavioral Product Intelligence" (BPI)
  - Company: BehaviorStack (Series A, 45 employees, $4M ARR)
  - Wei's LinkedIn: 6,500 followers, posts occasionally about product and
    behavioral science
  - Competitors don't use this terminology — the category doesn't exist yet

  Design the category creation campaign on LinkedIn:

  1. Category definition and manifesto:
     - Write the "category manifesto" as a LinkedIn Article (~1,200 words)
       that defines what Behavioral Product Intelligence is, why it matters,
       and why existing categories fail
     - Define the category's vocabulary (5-7 terms Wei will coin and
       consistently use)
     - The "before BPI vs after BPI" narrative

  2. Content strategy for category evangelism:
     - Write 5 LinkedIn posts that progressively build the category:
       a) Problem-awareness: "Why product analytics is lying to you"
       b) Category introduction: First mention of BPI as a concept
       c) Framework post: The BPI maturity model
       d) Social proof: "How [customer type] used BPI to [outcome]"
       e) Category validation: "Why [analyst type] says BPI is the future"
     - How to sequence these posts over 8 weeks
     - How to get other people to start using the term "BPI"

  3. Ecosystem building:
     - How to recruit "category allies" — other voices who will use the term
     - LinkedIn Group or community strategy around BPI
     - How to get industry analysts to acknowledge the category
     - Event strategy (LinkedIn Live, webinars) to build category momentum

  4. Measuring category creation success:
     - KPIs for category awareness (beyond follower count)
     - How to track when the term starts being used by others
     - Timeline: when does a category go from "one person's idea" to
       "industry-recognized"?

assertions:
  - type: llm_judge
    criteria: "The category manifesto is compelling and logical — it identifies a real gap between product analytics and user research, positions BPI as the necessary bridge, and makes readers feel like they've been missing something"
    weight: 0.25
    description: "Compelling logical category manifesto"
  - type: llm_judge
    criteria: "The 5 posts progressively build category awareness — they follow a narrative arc from problem-awareness to category introduction to social proof, with each post building on the previous"
    weight: 0.25
    description: "Progressive category-building post sequence"
  - type: llm_judge
    criteria: "The coined vocabulary is memorable and specific — terms feel natural enough to be adopted by others, not forced jargon, and each serves a clear purpose in the category framework"
    weight: 0.25
    description: "Memorable adoptable category vocabulary"
  - type: llm_judge
    criteria: "The ecosystem strategy is realistic — acknowledges that category creation takes 12-18 months, identifies specific types of allies to recruit, and has practical tactics for spreading terminology beyond Wei's own posts"
    weight: 0.25
    description: "Realistic ecosystem building strategy"
