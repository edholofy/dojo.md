meta:
  id: multi-platform-authority
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Extend LinkedIn authority to a multi-platform thought leadership ecosystem"
  tags: [linkedin, multi-platform, ecosystem, podcast, newsletter, amplification]

state: {}

trigger: |
  A LinkedIn thought leader with a strong following wants to build a
  multi-platform ecosystem where LinkedIn remains the hub but extends
  to podcasts, newsletters, YouTube, and more.

  Creator Profile:
  - Name: Elena Vasquez, CMO turned marketing advisor
  - LinkedIn: 55,000 followers, 800+ avg likes, 2 years of consistent posting
  - Expertise: B2B marketing strategy, brand positioning, demand generation
  - Content: Posts 4x/week, runs a LinkedIn newsletter (12K subscribers)
  - Revenue: $180K/year from consulting sourced via LinkedIn
  - Goal: Scale to $500K/year by building authority beyond LinkedIn

  Design the multi-platform strategy:

  1. Platform selection and prioritization:
     - Evaluate 6 potential platforms for Elena's goals:
       a) Podcast (own show)
       b) YouTube (long-form and shorts)
       c) Substack/Beehiiv (standalone newsletter)
       d) Twitter/X
       e) Speaking circuit
       f) Book publishing
     - Rank by ROI, effort, and synergy with LinkedIn
     - Recommend a 3-platform stack with LinkedIn as hub

  2. Content ecosystem design:
     - How one core idea flows through all platforms:
       Map the content journey for a topic like "Why brand building is
       the most efficient demand gen strategy"
       - LinkedIn post version
       - Podcast episode outline
       - Newsletter deep-dive structure
       - Short-form video script
     - The publishing cadence across platforms
     - How each platform feeds followers back to the others

  3. LinkedIn as the hub:
     - How to use LinkedIn to promote other platforms without alienating
       the LinkedIn audience
     - Write 3 LinkedIn posts that drive traffic to other platforms:
       a) Post promoting a podcast episode
       b) Post teasing a newsletter deep-dive
       c) Post sharing a YouTube video
     - How to bring non-LinkedIn audiences back to LinkedIn

  4. Revenue architecture:
     - How each platform contributes to the $500K goal
     - Revenue streams per platform (sponsorships, consulting, courses,
       speaking fees)
     - The "authority premium" — how multi-platform presence increases
       consulting rates
     - 12-month revenue projection by platform

  5. Operational sustainability:
     - Team structure needed (VA, editor, podcast producer, etc.)
     - Weekly workflow across all platforms
     - When to delegate vs do personally
     - Burnout prevention strategies for multi-platform creators

assertions:
  - type: llm_judge
    criteria: "The platform ranking is strategic and well-reasoned — considers Elena's specific strengths, audience overlap, effort-to-impact ratio, and synergy with LinkedIn rather than recommending all platforms equally"
    weight: 0.20
    description: "Strategic platform ranking"
  - type: llm_judge
    criteria: "The content ecosystem demonstrates true leverage — shows how one core idea generates 4+ distinct content pieces across platforms, with each version optimized for its medium, not just copy-pasted"
    weight: 0.20
    description: "True content leverage across platforms"
  - type: llm_judge
    criteria: "The 3 cross-promotion posts feel natural on LinkedIn — they promote other platforms by leading with value rather than 'check out my new podcast,' giving LinkedIn readers a reason to follow elsewhere"
    weight: 0.20
    description: "Natural cross-promotion posts"
  - type: llm_judge
    criteria: "The revenue architecture is detailed and realistic — the path from $180K to $500K is broken down by stream with reasonable assumptions, not just 'add a podcast and double revenue'"
    weight: 0.20
    description: "Detailed realistic revenue architecture"
  - type: llm_judge
    criteria: "The operational plan is sustainable — addresses the real risk of multi-platform burnout with specific delegation strategies, team recommendations, and workflow efficiencies"
    weight: 0.20
    description: "Sustainable operational plan"
