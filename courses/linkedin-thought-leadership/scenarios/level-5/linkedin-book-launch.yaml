meta:
  id: linkedin-book-launch
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Design a complete LinkedIn-driven book launch strategy"
  tags: [linkedin, book-launch, publishing, content-marketing, authority]

state: {}

trigger: |
  A LinkedIn thought leader is publishing a business book and wants to use
  LinkedIn as the primary marketing channel. Design the complete
  LinkedIn-driven book launch.

  Author Profile:
  - Name: Mia Chen, former CRO, now author and advisor
  - LinkedIn: 65,000 followers, 1,000+ avg likes
  - Book: "Revenue Architecture" — a framework for building predictable B2B
    revenue engines (publisher: Portfolio/Penguin)
  - Launch date: 3 months away
  - Goal: Bestseller in the business category (3,000+ copies in launch week)
  - Budget: $10K for marketing (modest — relying heavily on organic LinkedIn)
  - Assets: 5 years of LinkedIn content, strong relationships with 50+ other
    LinkedIn thought leaders, email list of 8,000

  Design the complete LinkedIn book launch:

  1. Pre-launch campaign (12 weeks before):
     - Week-by-week content calendar leading to launch
     - Write 6 key pre-launch posts:
       a) Week 12: "I'm writing a book" announcement
       b) Week 8: Behind-the-scenes of the writing process
       c) Week 6: Cover reveal post
       d) Week 4: Preview of a key framework from the book
       e) Week 2: Pre-order campaign launch
       f) Week 1: "Why I wrote this book" personal story
     - How to tease book content without giving it all away
     - Pre-order incentive strategy

  2. Launch week blitz (days -2 to +5):
     - Daily posting schedule for launch week
     - Write the launch day post
     - Influencer activation plan (getting 50 thought leaders to post about
       the book in launch week)
     - How to handle the Amazon algorithm (timing of purchases, reviews)
     - What to do if launch day goes better/worse than expected

  3. Sustained marketing (months 1-6 post-launch):
     - How to keep the book in conversation after launch week
     - Reader testimonial strategy
     - How to turn the book into 100+ pieces of LinkedIn content
     - Speaking/podcast strategy amplified through LinkedIn
     - How to handle negative reviews on LinkedIn

  4. Business impact beyond sales:
     - How the book elevates consulting rates
     - Using the book to open doors (keynotes, board seats, advisory roles)
     - "Book as a business card" strategy
     - How the book changes the LinkedIn content strategy permanently

  5. Influencer coordination:
     - Write 3 different messages to ask thought leaders to support the launch:
       a) Close friend/peer (informal ask)
       b) Acquaintance with large following (value-exchange ask)
       c) Industry legend (respectful cold ask)
     - What to provide them (review copy, talking points, sample posts)
     - How to make it easy for them to post without it feeling coordinated

assertions:
  - type: llm_judge
    criteria: "The 6 pre-launch posts build anticipation progressively — each reveals something new while maintaining mystery, and the sequence creates a narrative arc from 'I'm writing' to 'here's why you need this'"
    weight: 0.20
    description: "Progressive anticipation-building pre-launch posts"
  - type: llm_judge
    criteria: "The launch week blitz is operationally detailed — specific timing for posts, influencer coordination logistics, Amazon algorithm tactics, and contingency plans for different scenarios"
    weight: 0.20
    description: "Operationally detailed launch week blitz"
  - type: llm_judge
    criteria: "The influencer coordination messages are appropriately tailored — the close friend ask is casual, the acquaintance ask offers reciprocal value, and the legend ask is respectful without being sycophantic"
    weight: 0.20
    description: "Appropriately tailored influencer asks"
  - type: llm_judge
    criteria: "The sustained marketing plan turns one book into endless content — shows practical ways to extract 100+ LinkedIn posts from the book through frameworks, stories, reader responses, and behind-the-scenes content"
    weight: 0.20
    description: "Book-to-endless-content marketing plan"
  - type: llm_judge
    criteria: "The business impact section connects book authority to tangible outcomes — shows how publishing elevates consulting rates, opens speaking doors, and fundamentally changes the creator's positioning"
    weight: 0.20
    description: "Tangible business impact connections"
