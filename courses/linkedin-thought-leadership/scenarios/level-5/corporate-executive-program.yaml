meta:
  id: corporate-executive-program
  level: 5
  course: linkedin-thought-leadership
  type: output
  description: "Design a corporate LinkedIn executive branding program at scale"
  tags: [linkedin, corporate, executive-branding, program-design, enterprise]

state: {}

trigger: |
  A Fortune 500 company wants to launch an executive LinkedIn branding
  program for their top 20 leaders. Design the enterprise program.

  Company Context:
  - Name: GlobalTech Industries (enterprise software, 15,000 employees)
  - Industry: Enterprise cloud and data solutions
  - Challenge: Competitors' executives are active on LinkedIn; GlobalTech's
    leadership team is nearly invisible on social media
  - Budget: $200K/year for the program
  - Stakeholders: CEO (sponsor), CMO (budget owner), Legal (compliance),
    HR (employer brand), Comms (PR alignment)

  The 20 executives span:
  - C-suite (5): CEO, CFO, CTO, CMO, CHRO
  - SVPs (8): Engineering, Sales, Product, Marketing, CS, HR, Legal, Operations
  - VPs (7): Various functions, selected for high growth potential

  Design the complete enterprise program:

  1. Program architecture:
     - Governance structure (steering committee, approval workflows)
     - Legal/compliance framework (what executives can/cannot say about
       financials, products, competitors, personnel)
     - Content approval process that doesn't kill authenticity
     - Crisis communication protocols (when an executive goes viral for
       the wrong reasons)
     - How to handle executive departures (content ownership, follower
       transition)

  2. Tiered support model:
     - Tier 1 (C-suite, 5 people): Full ghostwriting + strategy
     - Tier 2 (SVPs, 8 people): Content coaching + templates
     - Tier 3 (VPs, 7 people): Self-service toolkit + monthly group coaching
     - Define deliverables, time investment, and cost per tier
     - How to measure ROI per tier

  3. Content strategy:
     - Company messaging alignment (how 20 executives talk about the same
       company without sounding like bots)
     - Topic ownership map (which executives own which topics)
     - Cross-amplification playbook (commenting, sharing, referencing)
     - Write sample posts for 3 executives showing voice differentiation:
       a) CEO: Visionary industry post
       b) CTO: Technical deep-dive post
       c) CHRO: Culture and people post
     - How to handle competing priorities (PR wants product launches,
       talent wants employer brand, sales wants demand gen)

  4. Measurement framework:
     - Program-level KPIs (aggregate reach, engagement, sentiment)
     - Individual executive scorecards
     - Business impact metrics (pipeline influenced, talent attracted,
       media mentions)
     - Quarterly business review template
     - How to prove ROI to the CFO

  5. Change management:
     - How to get resistant executives to participate
     - The "I don't have time" objection (show them the 15-minute process)
     - The "what if I say something wrong" objection
     - Success stories and quick wins to build momentum
     - How to handle the executive who goes rogue

assertions:
  - type: llm_judge
    criteria: "The governance structure balances compliance with authenticity — the legal framework and approval process are clear but don't turn every post into a corporate press release"
    weight: 0.20
    description: "Compliance-authenticity balanced governance"
  - type: llm_judge
    criteria: "The tiered support model is economically sound — the $200K budget is allocated realistically across 20 executives with clear deliverables per tier and reasonable ghostwriter/coach staffing"
    weight: 0.20
    description: "Economically sound tiered model"
  - type: llm_judge
    criteria: "The 3 sample posts sound like different people — the CEO, CTO, and CHRO each have distinct voices and perspectives, not just the same corporate messaging with different topics"
    weight: 0.20
    description: "Distinctly voiced executive sample posts"
  - type: llm_judge
    criteria: "The measurement framework connects LinkedIn activity to business outcomes — doesn't just track vanity metrics but shows how executive LinkedIn presence influences pipeline, hiring, and media coverage"
    weight: 0.20
    description: "Business-outcome-connected measurement"
  - type: llm_judge
    criteria: "The change management approach is psychologically astute — understands why executives resist social media, addresses specific fears, and uses quick wins and peer proof to build participation"
    weight: 0.20
    description: "Psychologically astute change management"
