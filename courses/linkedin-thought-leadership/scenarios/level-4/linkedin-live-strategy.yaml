meta:
  id: linkedin-live-strategy
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Plan and promote a LinkedIn Live event series for thought leadership"
  tags: [linkedin, live-video, events, audience-building, multimedia]

state: {}

trigger: |
  LinkedIn Live events get 24x more comments and 7x more reactions than
  regular video posts. A thought leader wants to launch a recurring
  LinkedIn Live series to accelerate authority building.

  Creator Profile:
  - Name: Aisha Williams, VP of People at a remote-first tech company
  - Followers: 22,000
  - Expertise: Remote work culture, people ops, DEI, organizational design
  - Video experience: Comfortable on camera, hosts internal all-hands
  - Goal: Launch a biweekly LinkedIn Live show that becomes the go-to
    series for people leaders

  Design a complete LinkedIn Live strategy:

  1. Show concept:
     - Name, format, and positioning (interview, solo, panel, AMA?)
     - Episode length and frequency justification
     - First 6 episode topics with guest suggestions (real types of guests,
       not specific names)
     - How this show differs from the 50 other HR/People LinkedIn Lives

  2. Pre-show promotion (for episode 1):
     - Write 3 promotional posts leading up to the first episode:
       a) Announcement post (2 weeks before)
       b) Guest/topic teaser (1 week before)
       c) Day-of reminder with countdown energy
     - How to get LinkedIn to feature the event in notifications

  3. During-show engagement:
     - How to handle live comments while presenting
     - Audience participation techniques (polls, Q&A, shoutouts)
     - Technical setup recommendations for professional quality

  4. Post-show content flywheel:
     - How to turn 1 LinkedIn Live into 8+ pieces of content:
       a) Full replay with chapters
       b) 3-5 clip posts (write the copy for 3 clips)
       c) Quote graphic posts
       d) Newsletter recap
       e) Thread summarizing key takeaways
     - When to post each piece for maximum reach without cannibalization

assertions:
  - type: llm_judge
    criteria: "The show concept has a clear differentiator — not just 'a show about HR' but a specific angle, format, or niche that makes it stand out from generic people-leadership content"
    weight: 0.25
    description: "Clear show differentiator"
  - type: llm_judge
    criteria: "The 3 promotional posts build anticipation progressively — the announcement creates curiosity, the teaser adds specificity, and the day-of post creates FOMO and urgency"
    weight: 0.25
    description: "Progressive anticipation-building promotion"
  - type: llm_judge
    criteria: "The content flywheel is detailed and practical — shows exactly how one 30-45 minute live session generates a full week of content with specific copy examples for clip posts"
    weight: 0.25
    description: "Detailed practical content flywheel"
  - type: llm_judge
    criteria: "The 6 episode topics are specific and compelling — each would make someone want to tune in, with clear value propositions that go beyond generic HR topics"
    weight: 0.25
    description: "Specific compelling episode topics"
