meta:
  id: linkedin-seo-discoverability
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Optimize LinkedIn profile and content for search discoverability"
  tags: [linkedin, seo, discoverability, search-optimization, keywords]

state: {}

trigger: |
  LinkedIn profiles and posts are indexed by both LinkedIn's internal search
  and Google. SEO-optimized thought leaders get discovered by recruiters,
  journalists, podcast hosts, and potential clients — even when they're not
  actively posting.

  Creator: Natasha Okonkwo, independent management consultant
  Specialties: Digital transformation, change management, enterprise agility
  Followers: 8,500
  Goal: Be the #1 search result on LinkedIn for "digital transformation
  consultant" and related terms

  Design a comprehensive LinkedIn SEO strategy:

  1. Profile SEO audit:
     - Identify the top 15 keywords Natasha should target (primary, secondary,
       long-tail)
     - Show exactly where each keyword should appear in her profile
       (headline, about, experience, skills, featured)
     - Rewrite her headline optimized for search AND human readers
     - Rewrite her about section with natural keyword integration
       (no keyword stuffing)

  2. Content SEO:
     - How LinkedIn's content search works differently from Google
     - Write 3 posts optimized for LinkedIn search discoverability:
       a) A post targeting "digital transformation strategy"
       b) A post targeting "change management framework"
       c) A post targeting "enterprise agility consultant"
     - How to use LinkedIn Articles for long-tail search terms
     - The role of hashtags in search discoverability (current 2026 data)

  3. Google-LinkedIn synergy:
     - Which LinkedIn content gets indexed by Google
     - How to optimize LinkedIn Articles to rank in Google search
     - External linking strategy — when to link to LinkedIn vs personal site

  4. Measurement:
     - How to track search appearances and keyword rankings on LinkedIn
     - Tools and methods for monitoring LinkedIn SEO performance
     - Monthly SEO review checklist

assertions:
  - type: llm_judge
    criteria: "The keyword strategy is specific and hierarchical — primary keywords are competitive but relevant, long-tail keywords are realistic to rank for, and placement across profile sections is strategic"
    weight: 0.25
    description: "Specific hierarchical keyword strategy"
  - type: llm_judge
    criteria: "The rewritten headline and about section integrate keywords naturally — reads well for humans while being optimized for search, avoiding keyword stuffing or awkward phrasing"
    weight: 0.25
    description: "Natural keyword-integrated profile copy"
  - type: llm_judge
    criteria: "The 3 search-optimized posts balance readability with discoverability — they're genuinely good content that people would engage with, not just keyword-loaded text designed for algorithms"
    weight: 0.25
    description: "Readable search-optimized posts"
  - type: llm_judge
    criteria: "The Google-LinkedIn synergy section provides actionable insights — explains which content types get indexed, how to structure Articles for Google ranking, and practical linking strategies"
    weight: 0.25
    description: "Actionable Google-LinkedIn synergy insights"
