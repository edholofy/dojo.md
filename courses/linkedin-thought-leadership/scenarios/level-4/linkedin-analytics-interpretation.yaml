meta:
  id: linkedin-analytics-interpretation
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Interpret LinkedIn analytics data to optimize content strategy"
  tags: [linkedin, analytics, data-interpretation, optimization, metrics]

state: {}

trigger: |
  A LinkedIn creator shares their analytics dashboard data. Interpret the
  numbers and provide actionable strategy adjustments.

  Creator: Rina Patel, Head of Product Marketing at a cybersecurity company
  Followers: 14,500
  Posting for: 6 months, 3x/week

  Last 90 days analytics:

  IMPRESSIONS BY POST TYPE:
  - Text posts (avg): 8,200 impressions
  - Image posts (avg): 5,100 impressions
  - Carousel posts (avg): 12,400 impressions
  - Video posts (avg): 3,800 impressions
  - Polls (avg): 15,600 impressions

  TOP 5 POSTS BY IMPRESSIONS:
  1. Poll: "Biggest cybersecurity myth?" — 42,000 impressions, 380 votes
  2. Carousel: "7 signs your security posture is weaker than you think" — 31,000
  3. Text: Personal story about a breach she managed — 28,000
  4. Carousel: "Security budget breakdown template" — 24,000
  5. Text: Contrarian take on compliance certifications — 19,000

  BOTTOM 5 POSTS:
  1. Video: Quick tip on password management — 1,200 impressions
  2. Image: Conference photo with caption — 2,100
  3. Text: Reshared industry report with brief commentary — 2,400
  4. Video: Interview clip with her CEO — 2,800
  5. Image: Team celebration photo — 3,100

  ENGAGEMENT RATE BY DAY:
  Mon: 4.2%, Tue: 6.8%, Wed: 7.1%, Thu: 5.9%, Fri: 3.1%, Sat: 2.4%, Sun: 1.8%

  FOLLOWER DEMOGRAPHICS:
  - 35% cybersecurity professionals
  - 25% IT leaders/CIOs/CTOs
  - 20% product/marketing in tech
  - 15% sales professionals
  - 5% other

  FOLLOWER GROWTH: 450 new followers/month (down from 600/month 2 months ago)

  Provide:
  1. Data interpretation — what the numbers actually mean (not just restating them)
  2. 5 specific strategic changes based on the data, ranked by expected impact
  3. A revised content calendar for the next month based on findings
  4. Metrics she should track weekly vs. monthly, and red flags to watch for
  5. Write 2 posts optimized based on the analytics insights

assertions:
  - type: llm_judge
    criteria: "The data interpretation goes beyond surface-level observations — identifies patterns like why video underperforms (possibly content type, not format), why polls over-index (low-effort engagement), and what the follower growth decline signals"
    weight: 0.30
    description: "Deep pattern-identifying data interpretation"
  - type: llm_judge
    criteria: "The 5 strategic changes are specific and data-backed — each references specific numbers from the analytics and explains the expected impact, not generic advice like 'post more carousels'"
    weight: 0.25
    description: "Specific data-backed strategic changes"
  - type: llm_judge
    criteria: "The revised content calendar reflects the analytics — heaviest posting on Tue-Thu, more carousels and text posts, fewer videos and images, with specific topic assignments"
    weight: 0.25
    description: "Analytics-reflective content calendar"
  - type: llm_judge
    criteria: "The 2 optimized posts combine the best-performing elements — using formats, topics, and posting patterns that the data shows work, with clear annotations on why each choice was made"
    weight: 0.20
    description: "Data-optimized sample posts"
