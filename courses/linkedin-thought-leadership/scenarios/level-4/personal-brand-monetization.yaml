meta:
  id: personal-brand-monetization
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Design a monetization strategy for LinkedIn thought leadership"
  tags: [linkedin, monetization, consulting, courses, personal-brand, revenue]

state: {}

trigger: |
  A LinkedIn thought leader with strong engagement wants to monetize their
  audience without becoming "that person" who turns every post into a pitch.

  Creator Profile:
  - Name: Rachel Nguyen, former VP of Product, now independent
  - Followers: 45,000 (grew from 5K to 45K in 18 months)
  - Avg engagement: 600 likes, 80 comments per post
  - Expertise: Product management, product-led growth, B2B product strategy
  - Current income: $0 from LinkedIn (consulting referrals come organically)
  - Revenue goal: $250K/year from LinkedIn-adjacent activities
  - Constraints: Does not want to become a "LinkedIn influencer," must maintain
    credibility with senior product leaders as her core audience

  Design a monetization strategy:

  1. Revenue stream design (target: $250K/year total):
     - Identify 3-4 revenue streams with projected revenue per stream
     - For each stream: pricing, capacity, margin, and effort required
     - Prioritize by effort-to-revenue ratio
     - Show how streams complement rather than cannibalize each other

  2. Content-to-revenue bridge:
     - Write 3 LinkedIn posts that naturally lead to a paid offering without
       being salesy (each targets a different revenue stream):
       a) A value-giving post that seeds demand for consulting
       b) A post that drives cohort course enrollment
       c) A post that promotes a paid community or membership
     - For each post, explain the psychology — how value delivery creates
       buying intent without direct selling

  3. Audience segmentation:
     - Map Rachel's 45K followers into segments (lurkers, engagers, potential
       buyers, past clients)
     - Which segments to target for which revenue streams
     - How to move people through the funnel using only LinkedIn content

  4. Credibility preservation:
     - Rules for maintaining thought leader status while monetizing
     - Content ratio: free value vs. promotional posts
     - How to handle the inevitable "she's just selling now" criticism
     - Examples of thought leaders who monetize well vs. poorly

assertions:
  - type: llm_judge
    criteria: "The revenue streams are realistic and well-structured — adds up to $250K with reasonable pricing and capacity assumptions (e.g., not assuming 1000 consulting clients), with clear effort-to-revenue analysis"
    weight: 0.25
    description: "Realistic well-structured revenue streams"
  - type: llm_judge
    criteria: "The 3 posts demonstrate sophisticated soft-selling — each delivers genuine value while naturally creating demand for a paid offering, without CTAs that feel forced or salesy"
    weight: 0.25
    description: "Sophisticated soft-selling posts"
  - type: llm_judge
    criteria: "The audience segmentation is actionable — not just theoretical categories but specific behaviors that indicate buying intent and practical ways to identify and nurture each segment through LinkedIn"
    weight: 0.25
    description: "Actionable audience segmentation"
  - type: llm_judge
    criteria: "The credibility preservation framework is nuanced — acknowledges the tension between monetization and authority, with specific guardrails and a content ratio that keeps the audience engaged"
    weight: 0.25
    description: "Nuanced credibility preservation framework"
