meta:
  id: algorithm-reverse-engineering
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Analyze and exploit LinkedIn's algorithm signals for maximum reach"
  tags: [linkedin, algorithm, distribution, reach-optimization, advanced]

state: {}

trigger: |
  LinkedIn's algorithm in 2026 weighs multiple signals to determine post
  distribution. Understanding these signals is the difference between 500
  and 50,000 impressions on the same content.

  You're advising a LinkedIn creator who consistently gets 200-400 likes
  but wants to break into viral territory (2,000+ likes, 500K+ impressions).

  Creator Profile:
  - Name: Sam Torres, CMO at a $50M revenue SaaS company
  - Followers: 28,000
  - Posting frequency: 4x/week
  - Current avg: 350 likes, 45 comments, 15 shares, 25K impressions
  - Top post ever: 1,200 likes (a personal failure story)
  - Content mix: 40% industry insights, 30% leadership lessons, 20% company
    updates, 10% personal stories

  Provide a comprehensive algorithm analysis and optimization strategy:

  1. Signal breakdown:
     - Rank the top 10 algorithm signals by importance (dwell time, comments,
       shares, saves, profile clicks, external clicks, etc.)
     - For each signal, explain how Sam's content currently performs and
       specific changes to boost that signal
     - Which signals Sam is likely under-optimizing based on the data

  2. Content audit:
     - Analyze why the 1,200-like post outperformed (personal story pattern)
     - What the 40% industry insights are likely doing wrong
     - The "company updates" problem — why 20% of content is killing reach

  3. Optimized content plan:
     - Rewrite Sam's content mix ratio with justification
     - Write 2 posts optimized for different primary signals:
       a) A "dwell time monster" — long, compelling, keeps people reading
       b) A "comment magnet" — structured to generate 100+ comments
     - For each post, annotate which algorithm signals it targets and how

  4. Distribution hacks:
     - First-hour engagement strategy (specific actions, not generic advice)
     - How to leverage Sam's 28K follower network for initial velocity
     - Pod-free engagement strategies that are sustainable and authentic

assertions:
  - type: llm_judge
    criteria: "The algorithm signal ranking is detailed and current — includes dwell time, meaningful comments (not 'great post'), saves, shares, and explains the relative weight of each with practical implications"
    weight: 0.25
    description: "Detailed current algorithm signal ranking"
  - type: llm_judge
    criteria: "The content audit is brutally honest — identifies that company updates suppress reach, industry insights may be too generic, and the personal story pattern is under-utilized, with specific evidence from the data"
    weight: 0.25
    description: "Brutally honest content audit"
  - type: llm_judge
    criteria: "The two optimized posts demonstrate clear signal targeting — the dwell time post uses formatting techniques and narrative tension to keep readers scrolling, the comment magnet uses debate triggers and open questions"
    weight: 0.25
    description: "Signal-targeted optimized posts"
  - type: llm_judge
    criteria: "The distribution strategies are practical and ethical — no engagement pods or fake tactics, but specific actions like strategic commenting timing, DM outreach to superfans, and content seeding approaches"
    weight: 0.25
    description: "Practical ethical distribution strategies"
