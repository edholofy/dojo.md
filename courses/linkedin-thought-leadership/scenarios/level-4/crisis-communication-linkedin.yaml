meta:
  id: crisis-communication-linkedin
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Handle crisis communications and reputation management on LinkedIn"
  tags: [linkedin, crisis-communication, reputation, damage-control, transparency]

state: {}

trigger: |
  A CEO needs to address a company crisis on LinkedIn. The response will be
  scrutinized by employees, customers, investors, media, and the public.

  Scenario: TechBridge (a 1,200-person enterprise SaaS company) just had a
  data breach affecting 50,000 customer records. The breach was discovered
  internally and disclosed to affected customers, but a journalist just
  published an article with additional details, and it's trending on LinkedIn.

  CEO Profile:
  - Name: David Park, CEO and co-founder
  - LinkedIn: 35,000 followers, normally posts about leadership and product
  - The company page has 80,000 followers
  - David has not posted in 3 days since the breach was discovered
  - Employees are posting their own takes (some supportive, some panicked)
  - Competitors are subtly (and not so subtly) posting about "security-first"

  Design a comprehensive LinkedIn crisis response:

  1. Immediate response (within 2 hours):
     - Write David's LinkedIn post addressing the breach
     - Tone calibration: accountable but not panicked, transparent but not
       oversharing legal details
     - What to include and what to explicitly NOT include
     - How to handle the comments section (there will be angry comments)

  2. Company page strategy:
     - Write the official company page post (different tone from CEO's personal)
     - Should the company pause scheduled content? For how long?
     - How employees should handle questions in their own LinkedIn activity

  3. Follow-up communication (days 2-14):
     - Write 3 follow-up posts over 2 weeks that show progress without
       seeming performative:
       a) Day 3: What we've done so far (actions taken)
       b) Day 7: What we're changing (systemic improvements)
       c) Day 14: Lessons and commitments (forward-looking)
     - When to resume normal content posting

  4. Competitor response:
     - How to handle competitors using the situation for marketing
     - Should David or anyone at TechBridge respond to competitor posts?
     - How to rebuild trust through content over the next 90 days

assertions:
  - type: llm_judge
    criteria: "The immediate response post strikes the right tone — takes full accountability without over-apologizing, is specific about what happened and what's being done, and doesn't make promises that can't be kept"
    weight: 0.30
    description: "Right-toned immediate crisis response"
  - type: llm_judge
    criteria: "The company page vs CEO post distinction is clear — the company post is more formal and factual, the CEO post is more personal and accountable, and together they cover different audience needs"
    weight: 0.20
    description: "Clear CEO vs company page distinction"
  - type: llm_judge
    criteria: "The 3 follow-up posts show genuine progress — each adds new information and demonstrates accountability, not just repeating 'we take this seriously' in different words"
    weight: 0.25
    description: "Progress-showing follow-up posts"
  - type: llm_judge
    criteria: "The competitor response strategy is mature — advises against engaging with competitors directly, focuses on rebuilding trust through actions and transparency rather than defensiveness"
    weight: 0.25
    description: "Mature competitor response strategy"
