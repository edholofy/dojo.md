meta:
  id: viral-post-anatomy
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Analyze viral LinkedIn posts and engineer replicable virality patterns"
  tags: [linkedin, viral-content, pattern-analysis, reverse-engineering, growth]

state: {}

trigger: |
  Study these 5 LinkedIn posts that went viral (10,000+ likes each) and
  reverse-engineer what made them work. Then apply those patterns to create
  new content.

  Viral Post 1 (47K likes):
  "I got fired on a Monday. By Friday, I had 3 job offers. Here's what I
  learned about building a career that's layoff-proof:" [followed by 7 lessons
  about skills, network, and personal brand]

  Viral Post 2 (32K likes):
  "I interviewed 100 CEOs. The #1 trait they all shared wasn't intelligence,
  grit, or vision. It was this:" [reveal: ability to simplify complex ideas]

  Viral Post 3 (28K likes):
  "My company just hit $10M in revenue. I'm going to share the exact numbers:
  [detailed P&L breakdown with real revenue, costs, margins, salaries]"

  Viral Post 4 (19K likes):
  "Unpopular opinion: Hustle culture is a scam invented by people who already
  have money. Here's what actually builds wealth:" [5 contrarian points about
  work-life balance and strategic career moves]

  Viral Post 5 (15K likes):
  [Image: whiteboard with a hand-drawn 2x2 matrix]
  "I use this one framework to make every major decision. It takes 5 minutes
  and it's saved me from 3 bad hires, 2 bad investments, and 1 bad marriage."

  For each viral post:
  1. Identify the primary virality mechanism (curiosity gap, radical transparency,
     contrarian take, utility, emotional resonance, or other)
  2. Break down the hook structure (what makes you stop scrolling)
  3. Analyze the engagement driver (what makes people comment)
  4. Identify the share trigger (what makes people reshare)
  5. Rate the "replicability" — can this pattern be used again, or was it a
     one-time context-dependent hit?

  Then:
  - Create a "virality framework" synthesizing the common patterns
  - Write 3 new posts using different viral patterns for a Head of Design
    at a tech company (12K followers)
  - For each new post, annotate which viral mechanism you're using and why

assertions:
  - type: llm_judge
    criteria: "The analysis of each viral post is insightful — goes beyond obvious observations to identify specific psychological triggers (curiosity gap, social proof, transparency signaling) and structural patterns in the hooks"
    weight: 0.25
    description: "Insightful viral post analysis"
  - type: llm_judge
    criteria: "The virality framework synthesizes common patterns into reusable principles — not just a list of what worked but a model for why certain content structures trigger sharing behavior on LinkedIn"
    weight: 0.25
    description: "Synthesized virality framework"
  - type: llm_judge
    criteria: "The 3 new posts feel authentically viral-potential — they use the identified patterns naturally for a Head of Design, not forced copies of the original posts"
    weight: 0.25
    description: "Authentically viral-potential new posts"
  - type: llm_judge
    criteria: "The replicability ratings are honest — acknowledges that some viral patterns (radical financial transparency) are hard to replicate vs others (curiosity gap hooks) that can be used repeatedly"
    weight: 0.25
    description: "Honest replicability ratings"
