meta:
  id: ab-test-content-strategy
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Design A/B tests for LinkedIn content optimization"
  tags: [linkedin, ab-testing, experimentation, content-optimization, methodology]

state: {}

trigger: |
  Unlike email or ads, LinkedIn doesn't have built-in A/B testing. But you
  can design systematic content experiments to optimize performance. Design
  a rigorous testing methodology for a LinkedIn creator.

  Creator: Kevin Li, founder of a product analytics company
  Followers: 19,000
  Posts 4x/week, avg 280 likes, 40 comments

  Design A/B test plans for these 5 variables:

  1. Hook style test:
     - Write 2 versions of the same post — one with a question hook, one
       with a bold statement hook
     - Define: test conditions (same topic, same time, same day of week),
       success metrics, sample size needed, when to call a winner

  2. Post length test:
     - Design a 4-week test comparing short posts (<500 chars) vs long posts
       (>2,000 chars) on the same topics
     - Control for: topic, posting time, day of week
     - Which metrics matter most (impressions ≠ engagement ≠ conversions)

  3. Personal vs professional tone test:
     - Write the same insight delivered in first-person storytelling vs
       third-person analytical format
     - Predict which will get more likes vs more shares vs more profile visits

  4. CTA placement test:
     - Same post with CTA at the end vs CTA woven into the middle
     - Hypothesis for which drives more comments vs more follows

  5. Posting time test:
     - Design a 2-week experiment testing 7 AM vs 9 AM vs 12 PM
     - How to account for LinkedIn's algorithmic delay in showing posts

  For each test, provide:
  - Hypothesis
  - Test design (controls, variables, timeline)
  - How to measure results on a platform without A/B testing tools
  - Statistical significance considerations (when can you trust the data?)
  - Expected learnings and how to apply them

assertions:
  - type: llm_judge
    criteria: "Each test has a clear hypothesis, controlled variables, and defined success metrics — the methodology is rigorous enough to produce actionable insights, not just casual observations"
    weight: 0.30
    description: "Rigorous test methodology"
  - type: llm_judge
    criteria: "The statistical significance discussion is honest — acknowledges that LinkedIn's algorithm makes true A/B testing difficult, recommends sufficient sample sizes, and warns against drawing conclusions from 2-3 posts"
    weight: 0.25
    description: "Honest statistical significance discussion"
  - type: llm_judge
    criteria: "The written post variations are genuinely different — the hook style test shows two distinctly different approaches to the same content, not just minor word changes"
    weight: 0.25
    description: "Genuinely different post variations"
  - type: llm_judge
    criteria: "The overall testing program is practical — a single creator can execute all 5 tests within a realistic timeframe without needing special tools, and the learning compounds across tests"
    weight: 0.20
    description: "Practical executable testing program"
