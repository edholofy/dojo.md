meta:
  id: thought-leadership-audit
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Conduct a comprehensive audit of a LinkedIn thought leadership profile"
  tags: [linkedin, audit, profile-optimization, content-analysis, strategy-review]

state: {}

trigger: |
  Conduct a full LinkedIn thought leadership audit for a creator who feels
  "stuck" — posting consistently but not growing or getting opportunities.

  Audit Subject:
  - Name: Michael Torres, Senior Director of Engineering
  - Company: Mid-size enterprise software company
  - LinkedIn followers: 6,800 (was 5,500 six months ago, growth stalled)
  - Posting: 3x/week for 8 months consistently
  - Avg engagement: 45 likes, 8 comments (hasn't improved in 4 months)
  - Profile headline: "Senior Director of Engineering | Tech Leader | Innovator"
  - About section: 3 paragraphs about his career history
  - Content themes: mix of motivational quotes, tech news reshares, occasional
    original posts about engineering management

  Last 10 posts (summarized):
  1. "Leadership is not about being in charge..." (motivational quote graphic) — 62 likes
  2. Reshared a TechCrunch article about AI with "Interesting read!" — 12 likes
  3. "3 things I learned managing remote teams" (original) — 89 likes
  4. "Happy work anniversary to my amazing team!" — 34 likes
  5. "The future of software engineering is..." (generic prediction) — 28 likes
  6. Reshared company blog post — 15 likes
  7. "We're hiring! Join our engineering team" — 22 likes
  8. "Great panel at [conference]! Thanks @speakers" (selfie photo) — 51 likes
  9. "5 books every engineering leader should read" (original) — 112 likes
  10. "Grateful for another year of growth" — 38 likes

  Provide:

  1. Brutal honest diagnosis:
     - Why growth stalled (be specific, reference the post data)
     - What percentage of his content is "engagement dead weight"
     - His actual vs perceived personal brand
     - The headline and about section problems

  2. Profile overhaul:
     - Rewrite his headline (multiple options)
     - Rewrite his about section
     - Featured section recommendations
     - Profile photo and banner guidance

  3. Content strategy reset:
     - Categorize his 10 posts into "keep," "fix," or "kill"
     - Define 3 content pillars he should own
     - Write a sample post in each pillar to show the difference
     - Posting schedule and format recommendations

  4. 90-day growth plan:
     - Month 1, 2, 3 targets and actions
     - How to measure improvement beyond follower count

assertions:
  - type: llm_judge
    criteria: "The diagnosis is brutally honest with specific evidence — identifies that reshares, motivational quotes, and company content are dead weight, uses the engagement data to prove which posts work and which don't"
    weight: 0.30
    description: "Evidence-based brutal honest diagnosis"
  - type: llm_judge
    criteria: "The profile overhaul is transformative — the new headline and about section position Michael as an expert in specific topics rather than using generic titles like 'Innovator' and 'Tech Leader'"
    weight: 0.20
    description: "Transformative profile overhaul"
  - type: llm_judge
    criteria: "The 3 content pillars are specific and ownable — not generic topics like 'leadership' but narrow enough that Michael could become known for them (e.g., 'scaling engineering orgs past 100 people')"
    weight: 0.25
    description: "Specific ownable content pillars"
  - type: llm_judge
    criteria: "The 90-day plan has concrete milestones — specific follower, engagement, and opportunity targets for each month with clear actions, not vague advice like 'post more consistently'"
    weight: 0.25
    description: "Concrete 90-day milestone plan"
