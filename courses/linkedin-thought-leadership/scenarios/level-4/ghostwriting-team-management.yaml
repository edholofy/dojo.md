meta:
  id: ghostwriting-team-management
  level: 4
  course: linkedin-thought-leadership
  type: output
  description: "Manage a LinkedIn ghostwriting operation for multiple executives"
  tags: [linkedin, ghostwriting, team-management, executive-comms, operations]

state: {}

trigger: |
  A B2B company wants to activate 5 executives on LinkedIn simultaneously.
  You're the content lead managing the ghostwriting operation.

  Company: CloudScale (enterprise cloud infrastructure, 2,000 employees)
  Budget: $15K/month for the executive LinkedIn program

  The 5 executives:

  1. CEO — Sarah Chen (52K followers)
     - Topics: Company vision, industry trends, leadership
     - Voice: Visionary, data-driven, occasionally personal
     - Capacity: 15-min voice memo weekly, reviews drafts in 24h

  2. CTO — James Park (18K followers)
     - Topics: Technical architecture, engineering culture, innovation
     - Voice: Technical but accessible, uses analogies, dry humor
     - Capacity: 20-min voice memo weekly, slow to review (48-72h)

  3. VP Sales — Maria Santos (9K followers)
     - Topics: Enterprise sales, customer relationships, revenue strategy
     - Voice: Energetic, story-driven, uses sports metaphors
     - Capacity: Quick text messages with ideas, reviews same day

  4. CHRO — David Kim (4K followers)
     - Topics: Remote work, culture, talent acquisition, DEI
     - Voice: Warm, empathetic, research-backed
     - Capacity: Monthly 30-min brainstorm, reviews in 24h

  5. VP Product — Lisa Zhang (2K followers)
     - Topics: Product strategy, customer-centric development, roadmapping
     - Voice: Analytical, framework-oriented, detail-focused
     - Capacity: Biweekly 15-min call, very thorough reviewer

  Design the complete operation:

  1. Content strategy per executive:
     - Posting frequency per person (not everyone needs 4x/week)
     - Content pillars per person (with overlap strategy for amplification)
     - Voice differentiation guide (how to keep 5 voices distinct)

  2. Workflow design:
     - End-to-end process from idea to published post
     - How to handle the different input methods and review speeds
     - Content calendar showing all 5 executives across a sample month
     - Quality control and approval process

  3. Amplification strategy:
     - How executives can comment on each other's posts naturally
     - Cross-referencing strategy (CEO references CTO's post, etc.)
     - How to avoid the content looking coordinated or inauthentic

  4. Budget allocation:
     - How to divide $15K/month across writers, tools, and management
     - Staffing: how many ghostwriters needed and their specializations

assertions:
  - type: llm_judge
    criteria: "Posting frequency is tailored to each executive's capacity and follower count — the CEO and CTO post more frequently, the CHRO and VP Product post less, with clear reasoning tied to input availability and growth goals"
    weight: 0.25
    description: "Capacity-tailored posting frequencies"
  - type: llm_judge
    criteria: "The workflow design handles different input methods practically — voice memos, text messages, and calls each have a distinct processing pipeline, and review speed differences are accounted for in the publishing schedule"
    weight: 0.25
    description: "Practical multi-input workflow design"
  - type: llm_judge
    criteria: "The amplification strategy feels organic — cross-commenting and cross-referencing tactics make sense contextually and wouldn't appear coordinated to an outside observer"
    weight: 0.25
    description: "Organic amplification strategy"
  - type: llm_judge
    criteria: "The budget allocation is realistic — breaks down writer costs, tool subscriptions, management overhead, and shows how $15K/month covers the operation sustainably"
    weight: 0.25
    description: "Realistic budget allocation"
