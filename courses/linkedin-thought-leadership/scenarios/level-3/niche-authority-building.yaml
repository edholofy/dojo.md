meta:
  id: niche-authority-building
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Build niche authority on LinkedIn from zero"
  tags: [linkedin, niche, authority, growth, zero-to-authority]

state: {}

trigger: |
  Build a 90-day plan to establish niche authority on LinkedIn from scratch.

  Author: Tom Barrett, Principal Data Engineer transitioning to a
  consulting career focused on data governance for healthcare companies
  Current LinkedIn: 1,200 connections, hasn't posted in 2 years
  Target niche: Data governance for healthcare (HIPAA-regulated environments)
  Goal: Become the go-to LinkedIn voice for healthcare data governance
  within 6 months

  Available assets:
  - 12 years experience in healthcare data engineering
  - Built HIPAA-compliant data platforms at 3 major hospital systems
  - Deep knowledge of healthcare data standards (HL7, FHIR)
  - Can share case studies (anonymized) from past projects
  - Has opinions on AI in healthcare and data privacy

  Design:
  1. Niche positioning statement (what Tom will be known for)
  2. Content pillars (3-4) specific to the niche
  3. 90-day plan with weekly milestones:
     - Days 1-30: Foundation building
     - Days 31-60: Establishing presence
     - Days 61-90: Building authority
  4. Commenting strategy for niche visibility
  5. Write 3 posts that would establish his expertise (one per month)
  6. How to attract the right followers (healthcare data leaders)
  7. Revenue connection: how LinkedIn authority converts to consulting clients

assertions:
  - type: llm_judge
    criteria: "The niche is defined tightly enough to own — 'healthcare data governance' is specific enough that Tom can become THE voice, not just one of many data governance people"
    weight: 0.25
    description: "Tightly defined ownable niche"
  - type: llm_judge
    criteria: "The 90-day plan has specific weekly milestones — not just 'post more' but specific actions like 'comment on 5 healthcare CIO posts daily' and 'publish first carousel framework by Day 14'"
    weight: 0.25
    description: "Specific weekly milestones"
  - type: llm_judge
    criteria: "The 3 posts demonstrate deepening authority — Month 1 establishes credibility, Month 2 shares unique insights, Month 3 presents an original framework. Each builds on the previous"
    weight: 0.25
    description: "Authority-deepening post progression"
  - type: llm_judge
    criteria: "The consulting pipeline connection is clear — how LinkedIn posts lead to DMs, how DMs lead to discovery calls, and what content types drive the most business inquiries"
    weight: 0.25
    description: "Clear consulting pipeline connection"
