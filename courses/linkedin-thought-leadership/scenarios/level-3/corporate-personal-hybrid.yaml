meta:
  id: corporate-personal-hybrid
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Design a hybrid corporate and personal brand LinkedIn strategy"
  tags: [linkedin, corporate-brand, personal-brand, hybrid, strategy]

state: {}

trigger: |
  Design a hybrid corporate + personal brand LinkedIn strategy. Personal
  profiles get 5x more engagement than company pages, and executive posts
  get 561% more engagement than company posts.

  Company: "Stripe" (fictional scenario) — payment processing
  Company page: 800K followers, 0.8% engagement rate
  CEO personal page: 45K followers, 4.2% engagement rate
  VP Engineering: 12K followers, 5.1% engagement rate
  Head of Marketing: 8K followers, 6.3% engagement rate

  The challenge:
  - Company page posts reach many people but get low engagement
  - Executive posts get high engagement but limited reach
  - Currently there's no coordination — executives post independently
  - Some executive posts contradict company messaging
  - The company page feels like a press release feed

  Design:
  1. Content strategy for the company page (what it should post vs. not)
  2. Content strategy for 3 executives (different voices, complementary)
  3. Cross-promotion framework (how personal and company amplify each other)
  4. Governance: how to coordinate without killing authenticity
  5. Write example posts for: company page, CEO, VP Engineering, and
     Head of Marketing — all about the same company milestone
  6. Metrics: how to measure the hybrid approach's total impact

assertions:
  - type: llm_judge
    criteria: "The company page strategy is clearly differentiated from executive pages — company posts focus on culture, product updates, and data, while executives share opinions, stories, and insights"
    weight: 0.25
    description: "Clearly differentiated page strategies"
  - type: llm_judge
    criteria: "The 4 example posts about the same milestone are genuinely different — the company page is factual, the CEO shares strategic vision, the VP Eng shares technical pride, the marketing head shares market impact"
    weight: 0.25
    description: "Four distinct voices on same milestone"
  - type: llm_judge
    criteria: "Governance balances coordination with authenticity — there are guidelines and review processes but executives still have genuine freedom to express their perspective"
    weight: 0.25
    description: "Governance balancing coordination and authenticity"
  - type: llm_judge
    criteria: "The metrics framework captures total impact — combining company page reach with executive engagement, measuring cross-promotion lift, and showing the 300% ROI advantage of hybrid approaches"
    weight: 0.25
    description: "Total impact measurement framework"
