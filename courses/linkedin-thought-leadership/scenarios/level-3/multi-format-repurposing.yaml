meta:
  id: multi-format-repurposing
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Repurpose one idea into multiple LinkedIn content formats"
  tags: [linkedin, repurposing, content-formats, efficiency, content-system]

state: {}

trigger: |
  Content repurposing is how top LinkedIn creators post 5x/week without
  burning out. One core idea can become 7-10 pieces of content across
  different formats.

  Author: Jordan Ellis, Head of Growth at a Series B startup
  Core idea from a recent all-hands presentation:

  "We grew from $2M to $8M ARR in 18 months by focusing on one metric:
  time-to-value. We reduced our onboarding from 14 days to 3 days. Here's
  what we did: simplified the setup wizard from 12 steps to 4, added
  interactive tutorials instead of documentation, assigned a dedicated
  CSM for the first 48 hours, and built an automated health score that
  triggers interventions. Result: activation rate went from 34% to 71%,
  and NRR improved from 95% to 118%."

  Transform this single idea into 8 different LinkedIn content pieces:

  1. Text-only story post (the personal narrative version)
  2. Data-driven insight post (leading with the numbers)
  3. Framework/listicle post (the "4 things we did" format)
  4. Contrarian take post (challenge conventional onboarding wisdom)
  5. Carousel concept (slide-by-slide outline with text for each slide)
  6. Poll + follow-up post combo (poll question + the reveal post)
  7. Comment-bait question post (designed to spark discussion)
  8. "Mistake I made" post (what went wrong before the improvement)

  For each piece:
  - Write the full post content (except carousel, which needs slide outlines)
  - Explain which audience segment it targets
  - Suggest optimal day/time to post (to avoid cannibalizing your own reach)
  - Note which formats to post first vs. last for maximum total reach

  Also provide a 2-week posting schedule that spaces these 8 pieces out
  so they don't feel repetitive to followers who see multiple.

assertions:
  - type: llm_judge
    criteria: "All 8 pieces feel genuinely different — a follower seeing all of them wouldn't feel like they're reading the same post 8 times. Each format highlights a different angle of the core idea"
    weight: 0.30
    description: "Genuinely differentiated content pieces"
  - type: llm_judge
    criteria: "The posting schedule strategically spaces content — formats that overlap most are furthest apart, and the sequence builds rather than repeats (e.g., story first, data post later, contrarian take last)"
    weight: 0.25
    description: "Strategic content spacing schedule"
  - type: llm_judge
    criteria: "Each post is optimized for its specific format — the story post has emotional narrative, the data post leads with metrics, the carousel has visual slide logic, the poll is genuinely debatable"
    weight: 0.25
    description: "Format-optimized content"
  - type: llm_judge
    criteria: "The audience targeting is specific — different formats reach different segments (e.g., data post for analytical leaders, story post for founders, framework post for operators)"
    weight: 0.20
    description: "Specific audience segment targeting"
