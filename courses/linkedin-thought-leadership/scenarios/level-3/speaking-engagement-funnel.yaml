meta:
  id: speaking-engagement-funnel
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Use LinkedIn to land speaking engagements and conference talks"
  tags: [linkedin, speaking, conferences, funnel, authority-building]

state: {}

trigger: |
  A LinkedIn thought leader wants to use their content strategy to land
  paid speaking engagements at industry conferences.

  Speaker Profile:
  - Name: Priya Sharma, Former CTO, now independent consultant
  - Expertise: AI/ML in enterprise, responsible AI, tech leadership
  - LinkedIn: 18,000 followers, avg 350 likes per post
  - Speaking experience: 3 internal company talks, 1 local meetup
  - Goal: Land 5 paid conference speaking slots in the next 12 months
  - Target events: SaaStr, Web Summit, industry-specific AI conferences

  Design a LinkedIn-to-speaking-stage funnel:

  1. Profile optimization for speakers:
     - Rewrite Priya's headline to signal "speaker" without saying "keynote speaker"
     - Featured section strategy (what to showcase)
     - About section structure that positions her as bookable

  2. Content strategy for speaker positioning:
     - Write 3 LinkedIn posts that demonstrate speaking ability:
       a) A "conference recap" post (even from attending, not speaking)
       b) A "hot take on an industry trend" post that shows stage presence in text
       c) A "framework presentation" post formatted like a mini-keynote
     - How to use LinkedIn Live or video posts to showcase presentation skills

  3. Outreach strategy:
     - How to identify and connect with conference organizers on LinkedIn
     - Write 3 different outreach messages to conference organizers
       (cold, warm intro, post-engagement)
     - How to leverage social proof from smaller events to bigger ones

  4. Content flywheel:
     - How each speaking engagement generates 5+ LinkedIn posts
     - Template for "I just spoke at [Conference]" posts that aren't humble-brags
     - How to turn audience Q&A into content ideas

assertions:
  - type: llm_judge
    criteria: "The profile optimization positions Priya as a speaker naturally — the headline and about section signal expertise and availability without reading like a sales pitch or self-proclaimed 'thought leader'"
    weight: 0.25
    description: "Natural speaker positioning"
  - type: llm_judge
    criteria: "The 3 demonstration posts each showcase a different speaking skill — the recap shows industry presence, the hot take shows conviction and stage energy, the framework post shows ability to teach and structure ideas"
    weight: 0.25
    description: "Speaking skill demonstration posts"
  - type: llm_judge
    criteria: "The outreach messages to conference organizers are specific and value-focused — they lead with what Priya offers the audience, not what she wants, and each is tailored to the relationship context"
    weight: 0.25
    description: "Value-focused organizer outreach"
  - type: llm_judge
    criteria: "The content flywheel is practical — shows exactly how one 30-minute talk generates a conference recap post, key takeaway posts, behind-the-scenes content, and audience question follow-ups"
    weight: 0.25
    description: "Practical speaking-to-content flywheel"
