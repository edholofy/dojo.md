meta:
  id: finance-industry-posts
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Write LinkedIn posts for regulated finance industry"
  tags: [linkedin, finance, regulated, compliance, industry-specific]

state: {}

trigger: |
  Write LinkedIn thought leadership content for the finance industry,
  which has a lower engagement rate (1.5-3.2%) due to regulatory
  constraints and a more conservative audience.

  Author: Sarah Park, CFO at a mid-market fintech company ($30M revenue)
  Audience: CFOs, VPs of Finance, controllers, financial analysts
  Followers: 5,500
  Constraint: Content must not constitute financial advice or violate
  SEC/FINRA guidelines for public communications

  Write 4 posts that work within finance industry constraints:

  Post 1 — Demystifying a complex finance topic for a broad audience
  Topic: "Why your SaaS company's revenue recognition is probably wrong"
  (ASC 606 compliance insights from experience)

  Post 2 — A contrarian take on a finance trend
  Topic: "Profitability metrics are misleading. Here's what I actually
  look at." (Rule of 40, CAC payback, etc.)

  Post 3 — Personal career story with finance-specific lesson
  Topic: When Sarah caught a $2M accounting error that would have
  affected the company's fundraise

  Post 4 — Industry prediction with data backing
  Topic: "AI will eliminate 60% of financial reporting work within
  5 years. Here's why that's a good thing for finance teams."

  Each post must be thought-provoking without crossing regulatory lines.

assertions:
  - type: llm_judge
    criteria: "The revenue recognition post makes ASC 606 accessible — it translates a complex accounting standard into plain language insights that non-finance leaders can understand and act on"
    weight: 0.25
    description: "Complex finance made accessible"
  - type: llm_judge
    criteria: "The contrarian metrics post is substantiated — it doesn't just dismiss common metrics but explains what's misleading about them and offers better alternatives with reasoning"
    weight: 0.25
    description: "Substantiated finance contrarian take"
  - type: llm_judge
    criteria: "No post constitutes financial advice — language is carefully framed as 'my experience' and 'what I've observed' rather than 'you should' or 'this will happen to your business'"
    weight: 0.25
    description: "Non-advisory compliant language"
  - type: llm_judge
    criteria: "The posts feel human despite the regulated industry — Sarah's personality comes through while maintaining the professional credibility expected of a CFO"
    weight: 0.25
    description: "Human personality within regulated constraints"
