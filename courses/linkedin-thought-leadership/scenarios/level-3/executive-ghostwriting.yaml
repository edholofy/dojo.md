meta:
  id: executive-ghostwriting
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Ghostwrite LinkedIn content for a C-suite executive"
  tags: [linkedin, ghostwriting, executive, voice-matching, brand]

state: {}

trigger: |
  You've been hired to ghostwrite LinkedIn content for a CEO who wants to
  build thought leadership but doesn't have time to write posts.

  Executive Profile:
  - Name: Marcus Chen, CEO of a 200-person cybersecurity company
  - Background: Former CISO at a Fortune 500, founded his company 5 years ago
  - Communication style: Direct, no-nonsense, uses military analogies
    (he's a veteran), avoids buzzwords, prefers data over opinions
  - Expertise: Enterprise security, zero-trust architecture, security culture
  - Pet peeves: "Security theater," compliance-only thinking, fear-based selling
  - Followers: 12,000 (mostly CISOs, security engineers, enterprise IT leaders)

  You have these raw inputs from a 15-minute voice memo transcript:

  Voice memo excerpt:
  "Look, I had three calls this week with CISOs who are spending millions on
  security tools but haven't trained their people in two years. It's like
  buying the best body armor and never teaching soldiers to take cover. The
  tool obsession in our industry is out of control. We did a study internally
  — 73% of our incident response cases last quarter started with a human
  clicking something they shouldn't have. Not a zero-day. Not an APT. A
  phishing email that a five-minute training could have caught. I'm not saying
  tools don't matter. But the ratio is broken. Companies spend 90% on tools
  and 10% on people. Flip that ratio, even to 60-40, and you'll see a
  material reduction in incidents."

  Deliverables:
  1. Transform the voice memo into a polished LinkedIn post (1,200-1,500 chars)
     that sounds authentically like Marcus — not corporate, not AI-generated
  2. Write a second post on a related topic (security hiring) using the same
     voice and tone, proving you can create content beyond the source material
  3. Create a "voice guide" document (bullet points) that captures Marcus's
     tone, vocabulary, sentence patterns, and do's/don'ts for future posts
  4. Write 3 comment responses as Marcus would reply to:
     - A CISO who disagrees: "Tools are the foundation. People leave."
     - A vendor who agrees for self-serving reasons: "Exactly! Our training platform..."
     - A junior security analyst asking for career advice

assertions:
  - type: llm_judge
    criteria: "The ghostwritten post sounds authentically like Marcus — uses military analogies, includes specific data (73% stat), is direct and opinionated without being preachy, and avoids buzzwords and corporate speak"
    weight: 0.30
    description: "Authentic executive voice matching"
  - type: llm_judge
    criteria: "The second post (security hiring) extends Marcus's voice to a new topic convincingly — it feels like the same person wrote both posts, with consistent tone, analogy style, and directness"
    weight: 0.25
    description: "Consistent voice across topics"
  - type: llm_judge
    criteria: "The voice guide is practical and specific — not generic advice but captures Marcus's actual patterns (short sentences, military metaphors, data-first arguments, anti-buzzword stance) in a way another writer could follow"
    weight: 0.25
    description: "Practical specific voice guide"
  - type: llm_judge
    criteria: "The comment responses match Marcus's personality — the disagreement response is respectful but firm, the vendor response shuts down self-promotion gracefully, and the career advice is mentorship-oriented"
    weight: 0.20
    description: "In-character comment responses"
