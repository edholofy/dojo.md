meta:
  id: trend-hijacking
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Write LinkedIn posts that leverage trending industry topics"
  tags: [linkedin, trends, timeliness, relevance, thought-leadership]

state: {}

trigger: |
  A major industry event just happened and LinkedIn is buzzing about it.
  Write 3 different posts that leverage the trending topic, each taking
  a different angle.

  The trending event: A major tech company (let's say Google) just
  announced they're requiring all employees to return to office 5 days
  a week. LinkedIn is flooded with hot takes.

  Author: Kim Nguyen, VP of People at a 500-person tech company that
  is fully remote. 9,000 followers.

  Write 3 posts:

  Post 1 — The "hot take" response (within 2 hours of the news):
  - Quick, punchy reaction that positions Kim's perspective
  - Under 800 characters (speed matters for trending topics)

  Post 2 — The "data-driven analysis" response (next day):
  - Uses the company's own remote work data to add substance
  - Their data: 94% retention rate, 12% productivity increase since
    going remote, hired from 22 countries
  - 1,300-1,600 characters with proper formatting

  Post 3 — The "framework" response (2-3 days later):
  - Shares a framework for other companies deciding their work model
  - Not pro-remote propaganda but a genuine decision framework
  - Carousel format with slide descriptions

  Each should feel timely without being reactive or preachy.

assertions:
  - type: llm_judge
    criteria: "The hot take is quick and distinctive — it's not the 100th 'RTO is bad' post but offers a unique perspective within the first 800 characters that stands out from the crowd"
    weight: 0.25
    description: "Distinctive quick hot take"
  - type: llm_judge
    criteria: "The data-driven post uses their own data compellingly — the 94% retention and 12% productivity are presented as one company's evidence, not as proof that all companies should be remote"
    weight: 0.25
    description: "Company data as evidence not proof"
  - type: llm_judge
    criteria: "The framework post is genuinely useful — it helps companies make their OWN decision rather than pushing remote work, which builds more credibility than advocacy"
    weight: 0.25
    description: "Genuinely useful decision framework"
  - type: llm_judge
    criteria: "The timing strategy is explicit — hot take within hours (for algorithm boost), analysis next day (for depth), framework 2-3 days later (for evergreen value)"
    weight: 0.25
    description: "Explicit timing strategy"
