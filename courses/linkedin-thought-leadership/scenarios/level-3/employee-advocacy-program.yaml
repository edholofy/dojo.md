meta:
  id: employee-advocacy-program
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Design a LinkedIn employee advocacy program for a company"
  tags: [linkedin, employee-advocacy, employer-brand, amplification, program-design]

state: {}

trigger: |
  A 500-person B2B SaaS company wants to launch an employee advocacy program
  on LinkedIn. The CMO believes that employee posts get 8x more engagement
  than company page posts and wants to activate 50 employees as brand
  ambassadors.

  Company Context:
  - Name: DataFlow (data integration platform)
  - Industry: Enterprise data/analytics
  - Employees: 500 (120 in sales, 80 in engineering, 60 in marketing,
    40 in customer success, rest in ops/admin)
  - Current company page: 15,000 followers, avg 50 likes per post
  - Employee LinkedIn activity: ~20 employees post occasionally, most never post
  - Culture: Engineering-driven, collaborative, remote-first

  Design a complete employee advocacy program:

  1. Program structure:
     - Which 50 employees to recruit first (roles, seniority, existing activity)
     - Opt-in vs opt-out approach and why
     - Incentive structure (gamification, recognition, rewards)
     - Governance: what employees can/cannot post about the company

  2. Content support system:
     - Write 5 "seed posts" employees can customize and share
       (not copy-paste — frameworks they personalize)
     - Create a content calendar template (what types of posts on which days)
     - Design a "post prompt" system — weekly prompts that make it easy
       for non-writers to create content

  3. Training materials:
     - Write a "LinkedIn 101" cheat sheet for employees who've never posted
       (profile optimization, first post template, commenting basics)
     - Common objections and responses:
       "I don't have anything interesting to say"
       "What if I say something wrong?"
       "I don't want to seem like I'm bragging"
       "I'm too busy"

  4. Measurement:
     - KPIs for the first 90 days
     - How to track without making it feel surveillance-like

assertions:
  - type: llm_judge
    criteria: "The recruitment strategy is smart — prioritizes employees who already post occasionally, customer-facing roles, and senior leaders, with a clear rationale for the 50-person cohort composition"
    weight: 0.25
    description: "Smart recruitment strategy"
  - type: llm_judge
    criteria: "The seed posts are customizable frameworks, not copy-paste templates — each provides a structure and prompts that employees personalize with their own experiences, making posts feel authentic"
    weight: 0.25
    description: "Customizable seed post frameworks"
  - type: llm_judge
    criteria: "The objection handling is empathetic and practical — addresses real fears (saying something wrong, seeming braggy) with specific, actionable responses that lower the barrier to participation"
    weight: 0.25
    description: "Empathetic practical objection handling"
  - type: llm_judge
    criteria: "The measurement approach balances accountability with trust — tracks meaningful metrics (participation rate, engagement, reach) without creating a surveillance culture or making posting feel mandatory"
    weight: 0.25
    description: "Balanced measurement approach"
