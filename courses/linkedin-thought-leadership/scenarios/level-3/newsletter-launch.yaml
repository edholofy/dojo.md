meta:
  id: newsletter-launch
  level: 3
  course: linkedin-thought-leadership
  type: output
  description: "Launch and grow a LinkedIn newsletter"
  tags: [linkedin, newsletter, subscriber-growth, content-strategy]

state: {}

trigger: |
  Design a LinkedIn newsletter launch and growth strategy.

  Author: Alex Kim, Director of Product at a B2B SaaS company
  Current: 7,500 followers, posts 3x/week (avg 200 likes)
  Goal: Launch a LinkedIn newsletter on product management for B2B

  Design:
  1. Newsletter concept and positioning:
     - Name (catchy, specific, memorable)
     - Description (what subscribers get)
     - Frequency (weekly, biweekly, monthly)
     - How it's different from his regular posts

  2. Launch strategy:
     - Pre-launch teaser posts (write 2)
     - Launch announcement post
     - How to convert existing followers to subscribers
     - First 30 days subscriber growth targets

  3. Content strategy:
     - Write the first newsletter edition (full content, ~800 words)
     - How newsletter content differs from regular posts
     - Recurring sections/segments
     - How to cross-promote between posts and newsletter

  4. Growth beyond launch:
     - Tactics for growing subscribers month over month
     - How to use newsletter content to create multiple posts

assertions:
  - type: llm_judge
    criteria: "The newsletter has a clear value proposition — it offers something subscribers can't get from regular posts (deeper analysis, exclusive frameworks, curated insights)"
    weight: 0.25
    description: "Clear newsletter value proposition"
  - type: llm_judge
    criteria: "The launch strategy builds anticipation — teaser posts create curiosity about the newsletter before it launches, converting existing engagement into subscriber intent"
    weight: 0.25
    description: "Anticipation-building launch strategy"
  - type: llm_judge
    criteria: "The first edition is compelling enough to retain subscribers — it delivers on the promise, has a clear structure, and ends with a reason to stay subscribed for the next edition"
    weight: 0.25
    description: "Compelling retention-worthy first edition"
  - type: llm_judge
    criteria: "The cross-promotion strategy is bidirectional — posts drive newsletter subscriptions AND newsletter content generates 2-3 posts per edition, creating a content flywheel"
    weight: 0.25
    description: "Bidirectional cross-promotion flywheel"
