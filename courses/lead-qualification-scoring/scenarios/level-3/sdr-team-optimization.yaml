meta:
  id: sdr-team-optimization
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Optimize SDR team performance with data — use qualification and conversion data to improve SDR hiring, training, and performance management"
  tags: [sales, leads, qualification, SDR, team, optimization, performance, advanced]

state: {}

trigger: |
  You're the VP of Sales Development at "NetSecure" — a B2B SaaS
  cybersecurity platform ($2K-20K/month). You manage 40 SDRs who qualify
  inbound and outbound leads. Performance varies wildly and you need to
  use data to optimize the team.

  Team performance data (last quarter):
  Top 5 SDRs (average):
  - MQLs worked: 120/month
  - Meetings booked: 28/month (23% conversion)
  - SQLs created: 22/month (79% of meetings)
  - Average qualification time: 8 minutes per lead
  - Speed to lead (inbound): 4 minutes
  - Pipeline generated: $180K/month

  Middle 25 SDRs (average):
  - MQLs worked: 100/month
  - Meetings booked: 15/month (15% conversion)
  - SQLs created: 9/month (60% of meetings)
  - Average qualification time: 18 minutes per lead
  - Speed to lead (inbound): 2.5 hours
  - Pipeline generated: $72K/month

  Bottom 10 SDRs (average):
  - MQLs worked: 65/month
  - Meetings booked: 5/month (7.7% conversion)
  - SQLs created: 2/month (40% of meetings)
  - Average qualification time: 32 minutes per lead
  - Speed to lead (inbound): 8 hours
  - Pipeline generated: $16K/month

  Call recording analysis (from Gong):
  Top SDRs: Ask 4-6 qualifying questions in first 3 minutes, use
  open-ended questions, listen 55% of the time, address objections
  in 2 sentences, get to next steps quickly
  Middle SDRs: Ask 8-10 questions (feels like interrogation), listen
  35% of the time, spend too long on rapport, miss key BANT signals
  Bottom SDRs: Ask 2-3 questions, talk 75% of the time, can't handle
  objections, don't ask for the meeting

  Other data:
  - SDR tenure: Top performers average 14 months, bottom average 3 months
  - SDR source: Top performers were 60% internal promotion, 40% external
    hire. Bottom performers were 90% external hire
  - Training: All SDRs receive the same 2-week onboarding
  - Compensation: Base + per-meeting bonus, same structure for all
  - SDR-to-AE promotion timeline: 12-18 months

  Annual cost of the SDR team: $3.2M (salaries, tools, management)
  Annual pipeline generated: $38M
  Cost per SQL: $1,800

  Tasks:
  1. Write the "SDR Performance Analysis" — the data-driven assessment
     of team performance. Include: the performance distribution analysis
     (what separates top from bottom), the qualification behavior analysis
     (what top SDRs do differently on calls), the economic analysis
     (ROI of top vs bottom SDRs, cost of bad performance), and the
     root cause analysis (why the bottom 10 underperform — is it skill,
     will, process, or management?).

  2. Design the "SDR Qualification Playbook" — based on what top SDRs
     do. Include: the call structure (how to organize the first 3
     minutes), the qualifying question framework (4-6 questions that
     efficiently uncover BANT), the objection handling guide (2-sentence
     objection responses), the meeting-ask technique (how top SDRs get
     commitment), and the disqualification guide (how to end calls
     quickly when the lead is bad).

  3. Design the "SDR Performance Management System" — how to use data
     to continuously improve the team. Include: the weekly scorecards
     (which metrics each SDR sees), the coaching cadence (call review
     frequency, feedback process), the promotion criteria (data-driven
     criteria for SDR-to-AE promotion), the performance improvement
     plan triggers (when to intervene with struggling SDRs), and the
     compensation redesign (if any changes would better incentivize
     quality over quantity).

assertions:
  - type: llm_judge
    criteria: "Performance analysis is data-rich — uses the specific numbers to show the 10x gap between top and bottom, identifies qualification speed, listening ratio, and question quality as key differentiators, calculates economic impact"
    weight: 0.35
    description: "Data-rich performance analysis"
  - type: llm_judge
    criteria: "Qualification playbook mirrors top SDR behavior — call structure matches the 3-minute qualification pattern, 4-6 questions target BANT efficiently, objection handling is concise, and disqualification is fast"
    weight: 0.35
    description: "Top-SDR-modeled playbook"
  - type: llm_judge
    criteria: "Performance management system is actionable — weekly scorecards with right metrics, coaching cadence, data-driven promotion criteria, PIP triggers, and any compensation changes aligned with quality"
    weight: 0.30
    description: "Actionable performance management"
