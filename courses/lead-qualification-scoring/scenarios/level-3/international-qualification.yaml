meta:
  id: international-qualification
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Adapt lead qualification for international markets — design scoring and qualification processes that account for regional buying behaviors, regulations, and cultural differences"
  tags: [sales, leads, qualification, international, global, EMEA, APAC, advanced]

state: {}

trigger: |
  You're the Global RevOps Director at "CloudPlatform" — a B2B SaaS
  company ($200M ARR) expanding from US-only to 4 regions: North America,
  EMEA, APAC, and LATAM. Your US-designed lead scoring model is failing
  internationally — MQL-to-SQL rates in new regions are 60% below the
  US rate.

  Regional data (first 6 months of international operation):

  North America (established, benchmark):
  - MQL-to-SQL: 25%
  - Average deal size: $45K ACV
  - Sales cycle: 45 days
  - Speed to lead: 4 hours
  - Buying behavior: Direct, fast decisions, budget discussions early

  EMEA (launched 6 months ago):
  - MQL-to-SQL: 10% (60% below NA)
  - Average deal size: $38K ACV
  - Sales cycle: 75 days
  - Speed to lead: 28 hours (time zones + language)
  - Buying behavior: Longer evaluation, consensus-driven decisions,
    GDPR means less behavioral data, prefer local-language content,
    budget discussions late in process
  - Problems: Leads engage with English content but need German/French/
    local-language sales conversations; GDPR opt-in requirements mean
    fewer behavioral signals; decision-making involves more stakeholders

  APAC (launched 4 months ago):
  - MQL-to-SQL: 8% (68% below NA)
  - Average deal size: $22K ACV
  - Sales cycle: 90 days
  - Speed to lead: 36 hours (time zones)
  - Buying behavior: Relationship-first, multiple meetings before
    business discussion, hierarchy-conscious (must engage senior leaders),
    strong partner/referral culture, local competition is fierce
  - Problems: Western-style qualification questions feel aggressive;
    BANT fails because budget is never discussed early; "no" doesn't
    mean "no" (means "not yet" or "let me think")

  LATAM (launched 3 months ago):
  - MQL-to-SQL: 12% (52% below NA)
  - Average deal size: $15K ACV
  - Sales cycle: 60 days
  - Speed to lead: 20 hours
  - Buying behavior: Personal relationships matter, WhatsApp is a key
    channel, price sensitivity higher, prefer local references, lengthy
    procurement processes in enterprise
  - Problems: Leads expect WhatsApp communication but your systems don't
    track it; local competitors offer significantly lower prices; payment
    terms differ (longer payment cycles)

  Tasks:
  1. Design region-specific qualification models for EMEA, APAC, and
     LATAM. For each: adapt the qualification framework to local buying
     behavior, adjust scoring weights (what signals matter differently),
     modify the MQL threshold and definition, account for data limitations
     (GDPR in EMEA, fewer digital signals in APAC), and include the
     cultural adaptations needed.

  2. Design the "Global Qualification Operations" framework — how to
     run a consistent qualification function across 4 regions with
     different models. Include: the global vs local scoring governance
     (what's standardized globally vs adapted locally), the SDR
     operating model by region (team structure, hours, languages), the
     technology adaptations (tracking WhatsApp in LATAM, GDPR-compliant
     scoring in EMEA), and the cross-region lead handling (what happens
     when a US company's EMEA office fills out a form).

  3. Create the "International Qualification KPI Framework" — how to
     measure success across regions fairly. Include: the normalized
     metrics (accounting for different deal sizes and sales cycles),
     the maturity-adjusted targets (new regions vs established regions),
     the regional benchmarks (what "good" looks like for each region
     at each maturity stage), and the investment prioritization model
     (which region gets more resources based on performance data).

assertions:
  - type: llm_judge
    criteria: "Regional models reflect real differences — EMEA accounts for GDPR data limitations and consensus decisions, APAC adapts to relationship-first and hierarchy-conscious buying, LATAM includes WhatsApp and price sensitivity"
    weight: 0.40
    description: "Regionally-adapted qualification models"
  - type: llm_judge
    criteria: "Global operations framework balances consistency and flexibility — standardized global metrics with local model adaptation, SDR coverage across time zones, technology adaptations per region"
    weight: 0.30
    description: "Consistent-yet-flexible global framework"
  - type: llm_judge
    criteria: "KPI framework measures fairly — normalized metrics account for deal size and cycle differences, maturity-adjusted targets don't penalize new regions, investment prioritization is data-driven"
    weight: 0.30
    description: "Fairly-measuring KPI framework"
