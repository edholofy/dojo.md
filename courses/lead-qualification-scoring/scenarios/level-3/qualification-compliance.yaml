meta:
  id: qualification-compliance
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Navigate lead scoring compliance — ensure your lead scoring and qualification practices comply with GDPR, CCPA, CAN-SPAM, and other data privacy regulations"
  tags: [sales, leads, scoring, compliance, GDPR, CCPA, privacy, advanced]

state: {}

trigger: |
  You're the Director of Marketing Operations at "DataCloud" — a B2B SaaS
  company ($120M ARR) that sells globally. Your legal team just flagged
  that your lead scoring practices may violate several data privacy
  regulations. They've given you 60 days to fix the issues or they'll
  shut down your scoring system.

  Identified compliance risks:

  1. GDPR (EU leads — 30% of your database):
  - You track website behavior via cookies without explicit consent for
    scoring purposes
  - You enrich EU leads with third-party data (Clearbit, ZoomInfo)
    without disclosing this in your privacy policy
  - You score leads based on email opens, which uses tracking pixels
    (requires consent under GDPR)
  - You retain behavioral data indefinitely (GDPR requires data
    minimization and retention limits)
  - You share lead scores with your US-based sales team (potential
    cross-border data transfer issue)

  2. CCPA (California leads — 15% of your database):
  - Leads can request deletion but your scoring history persists
  - You use third-party intent data (Bombora) which may constitute
    "selling" personal information under CCPA
  - Your privacy policy doesn't disclose that you use automated
    decision-making for lead scoring

  3. CAN-SPAM/CASL:
  - Your nurture sequences automatically enroll leads who haven't
    opted in to marketing emails
  - Canadian leads (CASL) require express consent for commercial
    electronic messages — you're sending based on implied consent only

  4. AI regulations (emerging):
  - Your predictive scoring model uses AI — the EU AI Act may require
    transparency about how scores are calculated
  - No audit trail exists for why a specific lead received a specific
    score

  Current state:
  - 250,000 EU contacts with no scoring consent mechanism
  - 85,000 California contacts
  - 45,000 Canadian contacts
  - Behavioral tracking: Full tracking on all visitors regardless of
    consent status
  - Third-party enrichment: Applied to all leads globally
  - Data retention: No deletion policy for scoring data

  Tasks:
  1. Design the "Compliant Lead Scoring Framework" — how to make your
     scoring system compliant with GDPR, CCPA, CASL, and emerging AI
     regulations. For each regulation: identify what needs to change,
     the specific technical implementation (consent mechanisms, data
     handling, retention policies), and the impact on scoring accuracy
     (what you lose when you can't track EU leads the same way).

  2. Create the "Consent-Based Scoring Architecture" — the technical
     design for a scoring system that respects consent. Include: the
     consent management integration (how consent status affects scoring),
     the tiered scoring approach (full scoring for consented leads,
     limited scoring for non-consented), the data retention and deletion
     workflows (what happens to scores when a lead requests deletion),
     and the cross-border data handling (how scores are shared across
     regions legally).

  3. Write the "Privacy-First Scoring Playbook" for your SDR team —
     how to qualify leads when you have less data. Include: how to
     handle EU leads with minimal behavioral data, alternative
     qualification signals that don't require tracking consent (first-
     party declarations, direct engagement), and the communication
     templates for explaining data practices to prospects who ask.

assertions:
  - type: llm_judge
    criteria: "Compliance framework addresses all regulations — GDPR consent and retention, CCPA deletion rights and disclosure, CASL express consent, and EU AI Act transparency requirements with specific technical implementations"
    weight: 0.40
    description: "Regulation-addressing compliance framework"
  - type: llm_judge
    criteria: "Consent architecture is technically sound — consent management integration, tiered scoring based on consent, deletion workflows that respect rights, and cross-border handling that maintains compliance"
    weight: 0.30
    description: "Technically sound consent architecture"
  - type: llm_judge
    criteria: "Privacy-first playbook is practical — gives SDRs alternative qualification approaches when behavioral data is limited, with specific techniques and communication templates"
    weight: 0.30
    description: "Practical privacy-first playbook"
