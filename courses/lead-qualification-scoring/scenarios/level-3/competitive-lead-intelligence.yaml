meta:
  id: competitive-lead-intelligence
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Integrate competitive intelligence into lead scoring — use competitor engagement signals to prioritize and route leads who are actively evaluating alternatives"
  tags: [sales, leads, scoring, competitive, intelligence, G2, review-sites, advanced]

state: {}

trigger: |
  You're the Director of Competitive Intelligence at "DocuSign Pro" — a
  B2B SaaS document management platform ($200M ARR). You've identified
  that leads who are actively evaluating competitors convert at 2x the
  rate of regular MQLs — but only if sales engages them within 24 hours.
  After 72 hours, these "competitive leads" actually convert worse than
  average because they've already chosen the competitor.

  Competitive signal sources:
  1. G2 Buyer Intent: 150 accounts/month viewing your G2 profile or
     comparing you with competitors
  2. Review site monitoring: 80 accounts/month reading reviews on
     Capterra, TrustRadius, or G2
  3. Competitor keyword alerts: 200 accounts/month searching for your
     competitor names + your product category
  4. Website competitor page visits: 120 unique companies/month visiting
     your "vs [Competitor]" comparison pages
  5. Gong competitive mentions: 60 accounts/month where competitors are
     mentioned in sales conversations

  Competitive intelligence data:
  - Competitor A (market leader, 40% share): Head-to-head win rate 35%
  - Competitor B (fast-growing, 15% share): Head-to-head win rate 55%
  - Competitor C (cheap alternative, 10% share): Head-to-head win rate 70%
  - Competitor D (enterprise-only, 8% share): Head-to-head win rate 45%

  Conversion data for competitive leads:
  - Competitive lead + contacted within 24 hours: 28% conversion
  - Competitive lead + contacted 24-72 hours: 12% conversion
  - Competitive lead + contacted after 72 hours: 6% conversion
  - Non-competitive MQL average: 14% conversion
  - Competitive leads make up 20% of pipeline but 35% of closed deals

  Current problem:
  - Competitive signals are not integrated into scoring
  - SDRs don't know which leads are evaluating competitors
  - AEs learn about competitive evaluations mid-deal, not at MQL stage
  - No differentiated playbook for competitive vs non-competitive leads

  Tasks:
  1. Design the "Competitive Lead Scoring Layer" — how competitive
     signals integrate into the existing scoring model. Include: the
     signal taxonomy (which competitive signals are strongest, ranked),
     the point values for each competitive signal type, the time-decay
     function (competitive signals lose value faster than regular signals),
     the competitor-specific weighting (how win rates affect scoring —
     a lead evaluating Competitor C is more valuable than one evaluating
     Competitor A), and the routing priority (competitive leads bypass
     normal queue).

  2. Create the "Competitive Lead Playbook" — what SDRs and AEs do
     differently with competitive leads. Include: the speed-to-contact
     protocol (how to achieve sub-24-hour response), the discovery
     approach (questions that uncover competitive evaluation status
     without seeming aggressive), the competitor-specific messaging
     (different positioning depending on which competitor they're
     evaluating), and the content recommendations (which assets to share
     based on the competitor — comparison guides, migration guides,
     specific case studies of customers who switched).

  3. Design the "Competitive Pipeline Dashboard" — real-time visibility
     into competitive dynamics. Include: the competitive lead volume
     trend (by competitor), the competitive conversion rates (by
     competitor and time-to-contact), the competitive win/loss analysis
     (what's working and what isn't), and the early warning system (when
     a competitor is suddenly appearing more in evaluations).

assertions:
  - type: llm_judge
    criteria: "Competitive scoring layer is sophisticated — signal taxonomy ranked, competitor-specific weighting based on win rates, aggressive time-decay for competitive signals, priority routing bypassing normal queue"
    weight: 0.35
    description: "Sophisticated competitive scoring"
  - type: llm_judge
    criteria: "Competitive playbook is actionable — speed protocol, discovery questions, competitor-specific messaging, and content recommendations create a differentiated approach for competitive leads"
    weight: 0.35
    description: "Actionable competitive playbook"
  - type: llm_judge
    criteria: "Dashboard provides strategic visibility — competitive volume trends, per-competitor conversion rates, win/loss analysis, and early warning system for competitive shifts"
    weight: 0.30
    description: "Strategic competitive dashboard"
