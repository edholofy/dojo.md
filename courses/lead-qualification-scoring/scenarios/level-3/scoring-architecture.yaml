meta:
  id: scoring-architecture
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Architect an enterprise lead scoring system — design the complete data architecture, scoring engine, and integration layer for a multi-product, multi-segment company"
  tags: [sales, leads, scoring, architecture, enterprise, data, advanced]

state: {}

trigger: |
  You're the Director of Revenue Operations at "SuiteCloud" — a B2B SaaS
  company with 3 products ($300M ARR total):
  - Product A: CRM ($150M ARR, 5,000 customers, SMB-focused)
  - Product B: Marketing Automation ($100M ARR, 2,000 customers, mid-market)
  - Product C: Analytics Platform ($50M ARR, 500 customers, enterprise)

  Each product has its own sales team, its own marketing team, and its
  own lead scoring model. The problem: the 3 scoring models were built
  independently, use different scales, different definitions of MQL, and
  different tools. Cross-sell leads between products are completely missed.

  Current mess:
  - Product A scores on a 0-100 scale in HubSpot, MQL at 50
  - Product B scores on a 1-5 star rating in Marketo, MQL at 3 stars
  - Product C scores on a High/Medium/Low label in Salesforce, MQL = High
  - No unified view of a prospect across products
  - A prospect who is MQL for Product A and Medium for Product C has
    no way to trigger a cross-sell motion
  - 30% of Product B customers also need Product C, but there's no
    signal detection for this

  Data sources (siloed):
  - HubSpot (Product A): 500K contacts, website behavior, email engagement
  - Marketo (Product B): 200K contacts, content engagement, event data
  - Salesforce (all): 150K accounts, opportunity data, customer data
  - Snowflake data warehouse: Product usage data for all 3 products
  - Bombora: Intent data (company-level, not product-specific)
  - 6sense: Account-level buying signals
  - Website analytics: Separate domains for each product

  Budget: $500K for the unified scoring project (technology + consulting)
  Timeline: 6 months to full deployment

  Tasks:
  1. Design the "Unified Scoring Architecture" — the technical blueprint.
     Include: the data model (how contacts, accounts, and products
     relate), the scoring engine design (single model with product-
     specific weights vs separate models with a unified layer), the
     integration architecture (how data flows from HubSpot, Marketo,
     Salesforce, Snowflake, and intent providers into the scoring
     engine), the cross-sell signal detection (how to identify customers
     of Product A who should buy Product B or C), and the real-time
     vs batch scoring decision (what's scored in real-time vs nightly).

  2. Design the "Unified Score" — the standardized scoring methodology.
     Include: the normalized score scale (converting 0-100, 1-5 stars,
     and H/M/L to a unified metric), the multi-product scoring matrix
     (how a single contact gets scored for each product independently
     and overall), the account-level aggregation (how individual scores
     roll up to account scores across products), and the MQL/SQL
     definitions that work across all 3 products.

  3. Create the "Implementation Roadmap" — the 6-month plan. Include:
     Phase 1 (months 1-2): Data unification and cleansing. Phase 2
     (months 3-4): Model design and testing. Phase 3 (months 5-6):
     Rollout and optimization. For each phase: deliverables, risks,
     team requirements, and success criteria.

assertions:
  - type: llm_judge
    criteria: "Architecture handles multi-product complexity — data model connects contacts across systems, scoring engine supports product-specific and cross-sell scoring, integrations bridge HubSpot/Marketo/Salesforce/Snowflake"
    weight: 0.35
    description: "Multi-product scoring architecture"
  - type: llm_judge
    criteria: "Unified scoring methodology is coherent — normalized scale resolves the 0-100/stars/H-M-L problem, multi-product matrix scores contacts per-product, account rollup and cross-sell signals are captured"
    weight: 0.35
    description: "Coherent unified methodology"
  - type: llm_judge
    criteria: "Implementation roadmap is realistic — 6-month phased plan with data unification first, appropriate risks identified (data quality, team adoption, model accuracy), and clear success criteria per phase"
    weight: 0.30
    description: "Realistic implementation roadmap"
