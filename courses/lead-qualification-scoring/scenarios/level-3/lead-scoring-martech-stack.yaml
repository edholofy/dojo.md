meta:
  id: lead-scoring-martech-stack
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Select and implement the lead scoring technology stack — evaluate and integrate marketing automation, CRM, intent data, and AI scoring tools into a cohesive system"
  tags: [sales, leads, scoring, martech, technology, implementation, advanced]

state: {}

trigger: |
  You're the VP of Marketing Operations at "GrowthStack" — a B2B SaaS
  company ($80M ARR) that has outgrown its current tech stack. The CEO
  approved a $400K annual budget to rebuild your lead scoring technology.

  Current stack (problems):
  - HubSpot Marketing Hub Professional ($800/month): Good for email but
    lead scoring is basic (rule-based only, no predictive)
  - Salesforce Professional ($75/user/month, 60 users): CRM of record
    but lead data is messy — 40% of contacts have incomplete fields
  - No intent data provider
  - No enrichment tool (leads come in with minimal information)
  - Manual lead routing via Salesforce assignment rules (breaks constantly)
  - Reporting: Spreadsheets pulled monthly (no real-time visibility)

  Current performance:
  - 800 inbound leads/month
  - MQL-to-SQL: 15% (below 25% benchmark)
  - Time to score a lead: 24+ hours (batch scoring overnight)
  - Data completeness on new leads: 40%
  - Speed to lead: 18 hours average
  - False positive rate (MQLs rejected by sales): 45%

  Requirements:
  - Real-time lead scoring (under 5 seconds from form submission)
  - Predictive/AI scoring capabilities
  - Data enrichment at point of capture
  - Intent data integration
  - Account-based scoring support
  - Real-time routing to SDRs with mobile alerts
  - Self-serve analytics dashboards
  - Must integrate with Salesforce (non-negotiable CRM)

  Vendors to evaluate:
  1. HubSpot Enterprise upgrade ($3,600/month) — adds predictive scoring,
     better workflows, custom objects
  2. Marketo Engage ($2,500/month) — advanced scoring, Bizible attribution,
     strong Salesforce integration
  3. 6sense ($2,000/month) — AI intent, account identification, predictive
  4. Clearbit ($1,500/month) — data enrichment, reveal anonymous visitors
  5. ZoomInfo ($2,500/month) — enrichment + intent data
  6. LeanData ($500/month) — advanced lead routing
  7. Madkudu ($1,500/month) — predictive lead scoring specifically
  8. ChiliPiper ($500/month) — instant lead routing and scheduling

  Budget: $400K/year (~$33K/month)

  Tasks:
  1. Recommend the technology stack — which vendors to select and why.
     Include: the evaluation criteria and weighting, the vendor scoring
     matrix, the recommended stack with cost breakdown (must stay under
     $33K/month), the integration architecture (how tools connect), and
     the "build vs buy" decisions (what to build custom vs buy off-shelf).

  2. Design the implementation plan — the 4-month rollout. Month 1:
     Data foundation (enrichment + cleansing). Month 2: Scoring engine
     (new model + predictive). Month 3: Routing and automation. Month 4:
     Analytics and optimization. For each month: specific deliverables,
     integration work, testing requirements, and rollback plan.

  3. Build the ROI model — how to justify the $400K investment. Include:
     the expected improvements (MQL-to-SQL from 15% to 25%, false positive
     from 45% to 20%, speed to lead from 18 hours to 5 minutes), the
     revenue impact calculation (more SQLs × current close rate × average
     deal size), the efficiency gains (SDR time saved on bad leads), and
     the breakeven timeline.

assertions:
  - type: llm_judge
    criteria: "Stack recommendation is justified — vendors selected cover all requirements (scoring, enrichment, intent, routing), stay within budget, and evaluation criteria are weighted appropriately"
    weight: 0.35
    description: "Justified stack recommendation"
  - type: llm_judge
    criteria: "Implementation plan is phased and realistic — data foundation first, scoring second, routing third, analytics fourth, with integration work, testing, and rollback plans for each phase"
    weight: 0.35
    description: "Phased realistic implementation"
  - type: llm_judge
    criteria: "ROI model is convincing — revenue impact math is sound (improvement assumptions × pipeline math), efficiency gains quantified, breakeven timeline calculated, investment justified against the $400K spend"
    weight: 0.30
    description: "Convincing ROI model"
