meta:
  id: advanced-qualification-shift
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Handle a multi-front qualification challenge — simultaneously manage a data quality crisis, a scoring model failure, and a marketing-sales alignment breakdown"
  tags: [sales, leads, qualification, scoring, crisis, multi-front, advanced]

state: {}

trigger: |
  It's Monday morning at "TechPlatform" ($180M ARR) and you're the VP
  of Revenue Operations. Three crises have converged:

  CRISIS 1 — Scoring Model Failure:
  Your predictive scoring model broke over the weekend. A data pipeline
  issue corrupted the enrichment data, and the model scored 2,000 leads
  as "High" over the weekend — all incorrectly. Your SDR team has already
  started calling them (working through the weekend to hit Q3 targets).
  By Monday morning, 400 of these bad leads have been contacted.
  - Sales leadership is furious: "We wasted 400 calls on garbage leads"
  - 15 of the bad leads were existing customers who are now confused
    about why an SDR called them about a product they already have
  - The model is currently offline pending fix

  CRISIS 2 — Marketing-Sales Escalation:
  The CMO and VP of Sales have been arguing for 2 weeks. The tension
  from the model failure has escalated it. The CMO says: "We can't be
  held accountable for a tech failure." The VP of Sales says: "This is
  the latest in a pattern of bad leads." The CRO has scheduled a meeting
  for Wednesday and wants you to present a resolution.
  Supporting data:
  - Q1 MQL-to-SQL: 24% (healthy)
  - Q2 MQL-to-SQL: 19% (declining)
  - Q3 (through model failure): 11% (crisis)
  - Sales follow-up time has increased from 8 hours to 22 hours
  - Marketing NPS (rated by sales): 35 (down from 65 a year ago)

  CRISIS 3 — GDPR Audit:
  Your EU DPA (Data Protection Authority) notified you of an audit
  starting in 30 days. They're specifically looking at automated
  decision-making and profiling — which is exactly what lead scoring is.
  Your GDPR compliance is incomplete:
  - No consent mechanism for scoring-related tracking
  - No documentation of scoring logic
  - No process for leads to request explanation of their score
  - Retention policy: None

  You have 5 days to present solutions for all 3 crises. The CRO wants:
  a plan for each crisis and a unified long-term solution.

  Tasks:
  1. Write the "Immediate Response Plan" (days 1-5). For Crisis 1:
     how to fix the model, what to tell the 400 incorrectly contacted
     leads, how to handle the 15 existing customers, and how to prevent
     recurrence. For Crisis 2: what data to present at Wednesday's
     meeting, the proposed resolution framework, and the shared metrics
     going forward. For Crisis 3: the 30-day GDPR preparation plan.

  2. Write the "Wednesday CRO Presentation" — the deck for the
     marketing-sales alignment meeting. Include: the honest assessment
     of what went wrong (data, not blame), the root causes of declining
     MQL-to-SQL (not just the model failure), the proposed shared
     accountability framework, and the 3 specific changes both teams
     will commit to.

  3. Write the "Unified Long-Term Solution" — the architecture that
     solves all 3 crises at their root. Include: the resilient scoring
     architecture (prevents model failures), the marketing-sales
     operating model (prevents alignment breakdowns), the GDPR-compliant
     scoring design (passes audit scrutiny), and the governance framework
     (who owns what, review cadence, escalation process).

assertions:
  - type: llm_judge
    criteria: "Immediate response addresses all 3 crises — model fix with communication to affected leads and customers, data-driven CRO presentation, and actionable 30-day GDPR prep"
    weight: 0.35
    description: "All-crisis immediate response"
  - type: llm_judge
    criteria: "CRO presentation is balanced and constructive — honest about failures, identifies root causes beyond blame, proposes shared accountability, and gets specific commitments from both teams"
    weight: 0.35
    description: "Balanced constructive CRO presentation"
  - type: llm_judge
    criteria: "Long-term solution is unified — single architecture that prevents model failures, aligns teams, and ensures GDPR compliance, with clear governance that stops these crises from recurring"
    weight: 0.30
    description: "Unified long-term solution"
