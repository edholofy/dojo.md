meta:
  id: qualification-data-quality
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Fix lead data quality — diagnose and resolve the data issues that undermine lead scoring accuracy and sales efficiency"
  tags: [sales, leads, data-quality, enrichment, deduplication, CRM, advanced]

state: {}

trigger: |
  You're a Marketing Operations Manager at "SalesForce Pro" (not related
  to Salesforce CRM) — a B2B SaaS sales enablement platform ($150M ARR,
  8,000 customers). Your lead scoring model is theoretically sound but
  practically useless because the underlying data is garbage.

  Data quality audit results:
  - Total contacts in CRM: 850,000
  - Contacts with complete data (all scoring fields populated): 280,000
    (33%)
  - Contacts with valid email: 720,000 (85%)
  - Contacts with company name: 650,000 (76%)
  - Contacts with title: 420,000 (49%)
  - Contacts with company size: 310,000 (36%)
  - Contacts with industry: 290,000 (34%)
  - Duplicate contacts: Estimated 120,000 (14% duplicate rate)
  - Stale contacts (no engagement in 12+ months): 380,000 (45%)

  Impact on lead scoring:
  - 67% of contacts can't be fully scored (missing demographic data)
  - Leads without title data get 0 points for title — making them look
    less qualified than they are
  - Duplicates cause score splitting — 2 records for the same person
    each have half the engagement, so neither reaches MQL threshold
  - Stale contacts inflate the database and skew analytics
  - 15% of "company size" data is wrong (outdated or self-reported)
  - Enrichment costs: Currently spending $0 on enrichment

  Specific problems:
  1. A lead downloads a whitepaper and enters only their email. They get
     scored 5/100. Same person's colleague enters full info and gets
     scored 55/100. The first person might be the VP.
  2. An account has 4 duplicate records for the same person with
     different email addresses. Total engagement across all 4 would
     score 80, but each individual record scores 20-25.
  3. A company grew from 50 to 500 employees 2 years ago. Your CRM
     still says 50, so they score as "too small."

  Budget available: $150K/year for data quality improvement

  Tasks:
  1. Write the "Data Quality Assessment and Remediation Plan." Include:
     the priority ranking (which data problems to fix first based on
     impact on scoring accuracy), the immediate fixes (what can be done
     in 30 days), the enrichment strategy (which vendor to use for
     filling gaps — Clearbit, ZoomInfo, Apollo, or similar; cost-benefit
     of each), the deduplication strategy (how to merge duplicates
     without losing engagement data), and the stale data handling policy.

  2. Design the "Data Quality Prevention System" — how to stop bad data
     from entering the system in the first place. Include: the form
     strategy (progressive profiling, smart defaults, validation rules),
     the enrichment-at-capture workflow (how to auto-enrich leads at
     the moment they enter the system), the ongoing data maintenance
     cadence (how often to refresh, validate, and deduplicate), and the
     data quality scorecard (how to measure and report data health).

  3. Calculate the "Cost of Bad Data" — the business impact of your data
     quality problems. Include: the lost pipeline from under-scored leads
     (leads who should be MQLs but aren't due to missing data), the
     wasted SDR time on duplicates and bad data, the scoring inaccuracy
     impact (how much better your MQL-to-SQL rate would be with clean
     data), and the ROI of the $150K data quality investment.

assertions:
  - type: llm_judge
    criteria: "Remediation plan is prioritized by scoring impact — addresses duplicate merging and title/company enrichment first (biggest scoring impact), includes specific vendor recommendations with cost-benefit analysis"
    weight: 0.35
    description: "Impact-prioritized remediation plan"
  - type: llm_judge
    criteria: "Prevention system stops problems at source — progressive profiling captures data over time, enrichment-at-capture fills gaps immediately, ongoing maintenance prevents decay, data scorecard enables monitoring"
    weight: 0.35
    description: "Source-stopping prevention system"
  - type: llm_judge
    criteria: "Cost analysis quantifies the business impact — calculates lost pipeline from under-scoring, wasted SDR time, scoring accuracy improvement potential, and ROI of $150K investment"
    weight: 0.30
    description: "Quantified business impact"
