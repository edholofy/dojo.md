meta:
  id: vertical-qualification
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Build vertical-specific qualification — design industry-tailored qualification criteria for healthcare, financial services, and technology verticals"
  tags: [sales, leads, qualification, vertical, industry, healthcare, finserv, advanced]

state: {}

trigger: |
  You're the Senior Director of Sales Strategy at "ComplianceAI" — a B2B
  SaaS compliance automation platform ($5K-50K/month) that serves 3
  primary verticals: Healthcare, Financial Services, and Technology.

  Your single qualification model treats all industries the same, but
  your data shows massive differences in buying behavior:

  Healthcare vertical (35% of pipeline):
  - Average deal size: $28K ACV
  - Sales cycle: 90 days (long due to compliance reviews)
  - Win rate: 22%
  - Typical buyer: Chief Compliance Officer or VP of Quality
  - Buying triggers: HIPAA audit findings, CMS regulation changes, OIG
    investigations in their region, Joint Commission survey upcoming
  - Unique requirements: BAA (Business Associate Agreement), HIPAA
    compliance proof, SOC 2 Type II, patient data handling policies
  - Killer question: "Have you had a HIPAA audit finding in the last
    12 months?" (leads who answer yes close at 38%)

  Financial services vertical (40% of pipeline):
  - Average deal size: $42K ACV
  - Sales cycle: 120 days (long due to vendor risk assessment)
  - Win rate: 18%
  - Typical buyer: Chief Risk Officer, Head of Compliance, CISO
  - Buying triggers: Regulatory exam findings (OCC, FDIC, SEC), consent
    orders, new regulations (DORA, Basel III updates), merger/acquisition
    compliance integration
  - Unique requirements: SOC 2 + SOC 1, bank-grade encryption, data
    residency, third-party risk management documentation
  - Killer question: "When is your next regulatory exam?" (leads with
    exam in 90 days close at 45%)

  Technology vertical (25% of pipeline):
  - Average deal size: $18K ACV
  - Sales cycle: 45 days (faster, less compliance burden)
  - Win rate: 30%
  - Typical buyer: VP Engineering, CISO, DPO (Data Protection Officer)
  - Buying triggers: SOC 2 audit preparation, customer demands for
    compliance proof, funding round due diligence, ISO 27001 certification
  - Unique requirements: API-first, CI/CD integration, developer-friendly
    UI, SOC 2 automation specifically
  - Killer question: "Is a customer or investor requiring compliance
    certification?" (leads who answer yes close at 52%)

  Tasks:
  1. Design 3 vertical-specific qualification models. For each vertical:
     the qualification criteria (what must be true to qualify), the
     scoring attributes and weights (what matters most in this industry),
     the "killer questions" (industry-specific questions that predict
     close rates), the disqualification criteria (what immediately rules
     out a lead in this vertical), and the expected conversion improvement.

  2. Design the "Vertical Detection and Routing" system — how to
     automatically detect a lead's vertical and route them to the right
     qualification flow. Include: the detection logic (industry codes,
     company signals, content engagement patterns), the specialist SDR
     assignment (vertical-specialized SDRs vs generalists), and the
     hand-off to vertical AEs.

  3. Create the "Vertical Qualification Playbook" — the SDR guide for
     each vertical. Each playbook should include: the 5-minute discovery
     call script tailored to that industry, the industry-specific
     objections (and responses), the compliance document checklist (what
     to ask for early to prevent late-stage deal death), and the
     competitive landscape per vertical.

assertions:
  - type: llm_judge
    criteria: "Vertical models reflect real buying behavior — healthcare emphasizes HIPAA triggers and BAA requirements, finserv emphasizes regulatory exam timing and vendor risk, tech emphasizes SOC 2 automation and speed"
    weight: 0.40
    description: "Behavior-reflecting vertical models"
  - type: llm_judge
    criteria: "Detection and routing is automated — uses industry signals, content patterns, and company data to auto-detect vertical, with specialist SDR assignment rules"
    weight: 0.30
    description: "Automated vertical detection"
  - type: llm_judge
    criteria: "Playbooks are industry-literate — discovery scripts use correct terminology, objections are industry-specific, compliance checklists are accurate, showing genuine vertical expertise"
    weight: 0.30
    description: "Industry-literate playbooks"
