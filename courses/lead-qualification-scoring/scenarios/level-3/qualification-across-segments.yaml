meta:
  id: qualification-across-segments
  level: 3
  course: lead-qualification-scoring
  type: output
  description: "Design segment-specific qualification — build different qualification frameworks for SMB, mid-market, and enterprise segments that reflect their different buying behaviors"
  tags: [sales, leads, qualification, segmentation, SMB, mid-market, enterprise, advanced]

state: {}

trigger: |
  You're the Head of Revenue Operations at "WorkFlow" — a B2B SaaS
  workflow automation platform ($50-50,000/month) that serves all
  segments. Your single lead scoring model treats a startup CEO the
  same as an enterprise procurement director. This creates problems:

  Segment data:
  SMB (under 100 employees, deals under $500/month):
  - Volume: 2,000 leads/month
  - Sales motion: Self-serve + light SDR touch
  - Average sales cycle: 7 days
  - Buying behavior: CEO/founder makes fast decisions, price-sensitive,
    needs to see product immediately, decision in 1-2 interactions
  - Current conversion: 8% (should be 15%+ with better qualification)
  - Key signals: Free trial activation, product usage in first 48 hours,
    pricing page visit

  Mid-market (100-1,000 employees, deals $500-5,000/month):
  - Volume: 500 leads/month
  - Sales motion: SDR qualification → AE demo → close
  - Average sales cycle: 28 days
  - Buying behavior: Department head evaluates, may need VP approval,
    wants ROI proof, integrations matter
  - Current conversion: 12% (should be 20%+ with better qualification)
  - Key signals: Demo request, case study engagement, integration page
    visits, multi-person engagement from same company

  Enterprise (1,000+ employees, deals $5,000-50,000/month):
  - Volume: 100 leads/month
  - Sales motion: BDR outbound + inbound → AE discovery → SE demo →
    procurement → legal → close
  - Average sales cycle: 120 days
  - Buying behavior: Buying committee (5-8 people), formal evaluation
    process, security/compliance review, legal redlines, procurement
  - Current conversion: 18% (already decent, but $10K+ deals converting
    at only 8%)
  - Key signals: Multi-stakeholder engagement, security page visits,
    enterprise features page, RFP submission, executive briefing request

  Problem with one-size-fits-all model:
  - SMB leads that activate a trial score LOWER than enterprise leads
    who attend a webinar (but SMB trial activation = buying signal)
  - Enterprise leads with 1 contact score the same as enterprise leads
    with 5 contacts from the same company
  - Mid-market leads with demo requests get the same score as SMB
    leads with demo requests (but the mid-market demo request is 3x
    more valuable in ARR)

  Tasks:
  1. Design 3 separate qualification models — one per segment. For each:
     the qualification framework (BANT for SMB? MEDDIC for enterprise?),
     the scoring attributes and weights (what matters in each segment),
     the MQL threshold and definition (different per segment), the
     routing rules (where qualified leads go), and the expected conversion
     rate improvement.

  2. Design the "Segment Detection" logic — how to automatically assign
     incoming leads to the right segment before scoring them. Include:
     the firmographic rules (company size, revenue indicators), the
     behavioral rules (self-serve trial vs enterprise content engagement),
     the override rules (when a lead's behavior suggests a different
     segment than their firmographics), and the ambiguous lead handling
     (what to do when segment is unclear).

  3. Create the "Unified Reporting View" — how leadership sees performance
     across segments despite having 3 different models. Include: the
     normalized metrics (how to compare MQL quality across segments),
     the pipeline contribution by segment, the conversion funnel by
     segment (with different stages per segment), and the capacity
     planning view (how many leads each segment needs to hit revenue
     targets).

assertions:
  - type: llm_judge
    criteria: "Segment models reflect real buying behavior — SMB uses product signals and speed, mid-market uses BANT with ROI proof, enterprise uses MEDDIC with buying committee tracking; each has distinct scoring attributes and thresholds"
    weight: 0.40
    description: "Behavior-reflecting segment models"
  - type: llm_judge
    criteria: "Segment detection is automated and handles edge cases — firmographic rules, behavioral overrides, and ambiguous lead handling create reliable auto-segmentation"
    weight: 0.30
    description: "Automated segment detection"
  - type: llm_judge
    criteria: "Unified reporting enables cross-segment comparison — normalized metrics, per-segment funnels, and capacity planning give leadership a coherent view despite 3 different models"
    weight: 0.30
    description: "Cross-segment unified reporting"
