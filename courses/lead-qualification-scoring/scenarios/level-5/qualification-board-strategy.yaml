meta:
  id: qualification-board-strategy
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Present lead qualification strategy to the board — build the board-level narrative connecting qualification capability to company valuation and IPO readiness"
  tags: [sales, leads, qualification, board, strategy, valuation, IPO, master]

state: {}

trigger: |
  You're the CRO of "BoardReady" ($450M ARR, IPO planned in 12 months).
  Your board has requested a comprehensive presentation on pipeline
  generation efficiency — specifically, how your lead qualification
  capability compares to public company peers and what needs to improve
  before IPO.

  Board context:
  - Target IPO valuation: $5.4B (12x ARR)
  - Current valuation concern: Pipeline generation efficiency below
    peers suggests growth may not be sustainable
  - Key investor question: "Can you generate $200M in new ARR annually
    without proportionally increasing sales cost?"

  Your data vs public company peers:
  - Your MQL-to-close: 2.8% (peer median: 4.5%, top quartile: 6.2%)
  - Your cost per SQL: $3,800 (peer median: $2,200, top quartile: $1,500)
  - Your SDR cost as % of new ARR: 8.5% (peer median: 5.5%)
  - Your pipeline predictability: ±25% (peer median: ±12%)
  - Your speed to lead: 12 hours (peer median: 45 minutes)

  Board members:
  - 2 growth equity directors (focused on efficiency metrics)
  - 1 independent director (former CRO of a public SaaS company)
  - CFO (focused on unit economics for S-1 narrative)
  - CEO (wants confidence that pipeline generation scales)

  The gap:
  If you matched peer median efficiency, you'd save $4.2M/year in SDR
  costs and generate 60% more SQLs from the same lead volume. If you
  matched top quartile, the savings would be $6.8M and SQL generation
  would increase 120%.

  Tasks:
  1. Write the "Board Presentation" — 12 slides. Include: Slide 1:
     Strategic importance of qualification efficiency. Slides 2-4:
     Current state assessment with peer benchmarks. Slides 5-7:
     Transformation plan (what to fix, how, timeline). Slides 8-9:
     Investment ask and expected returns. Slides 10-11: Risk assessment
     and mitigation. Slide 12: IPO readiness timeline.

  2. Write the "Investor Narrative" — how qualification efficiency
     becomes part of the IPO story. Include: the efficiency narrative
     (how improving qualification proves scalable growth), the
     technology narrative (AI-powered qualification as competitive moat),
     the unit economics narrative (how better qualification improves
     CAC payback and LTV:CAC), and the Rule of 40 impact (how
     qualification efficiency improves both growth rate and margin).

  3. Write the "Pre-IPO Qualification Readiness Checklist" — the 20
     items that must be true about your qualification function before
     the S-1 is filed. Group by: technology readiness, process
     readiness, data readiness, team readiness, and reporting readiness.
     For each item: current status, gap, and remediation plan.

assertions:
  - type: llm_judge
    criteria: "Board presentation connects qualification to valuation — 12 slides with peer benchmarks, transformation plan, investment ask, and IPO timeline that show qualification efficiency drives valuation premium"
    weight: 0.35
    description: "Valuation-connecting board presentation"
  - type: llm_judge
    criteria: "Investor narrative is S-1 ready — efficiency, technology, unit economics, and Rule of 40 narratives that would be compelling in an IPO roadshow"
    weight: 0.35
    description: "S-1 ready investor narrative"
  - type: llm_judge
    criteria: "Readiness checklist is comprehensive — 20 items across 5 categories with honest current status and remediation plans that would satisfy pre-IPO due diligence"
    weight: 0.30
    description: "Comprehensive readiness checklist"
