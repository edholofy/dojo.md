meta:
  id: qualification-thought-leadership
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Write the future of lead qualification — create the thought leadership report that defines where B2B lead qualification is headed over the next 5 years"
  tags: [sales, leads, qualification, thought-leadership, future, trends, master]

state: {}

trigger: |
  You're the editor of a major B2B SaaS publication. You've been
  commissioned to write the definitive report: "The Future of B2B Lead
  Qualification: 2026-2031." This report will be cited by CROs, VPs of
  Sales, and RevOps leaders for the next 5 years.

  Trends shaping the future:
  1. AI-native qualification: AI agents autonomously qualifying leads
     (already happening at early-adopter companies)
  2. Death of the MQL: Growing movement arguing MQLs are an outdated
     concept (replaced by buying group signals and intent data)
  3. Product-led qualification: PQLs replacing MQLs as the primary
     qualified lead type in PLG companies
  4. Privacy-first scoring: GDPR, CCPA, and the EU AI Act making
     behavioral tracking increasingly restricted
  5. Buyer-led journeys: 70% of the B2B buying journey happens before
     a buyer talks to sales — qualification must happen in the "dark
     funnel"
  6. AI SDRs: AI agents handling initial qualification conversations
     (text and voice) — some companies already deploying
  7. Real-time everything: Sub-second scoring, instant routing, immediate
     personalized outreach
  8. Community-led qualification: Peer communities (Slack groups, forums,
     Reddit) as qualification signals
  9. Consolidation of RevTech: Fewer, more integrated platforms replacing
     point solutions
  10. Ethical AI in sales: Growing scrutiny of AI-driven sales targeting
      and automated decision-making

  Data points for the report:
  - 12% of B2B SaaS companies currently use AI-powered scoring
  - 35% plan to implement AI scoring within 2 years
  - MQL-to-SQL rates have declined industry-wide from 25% to 18% over
    5 years (suggesting the MQL concept is weakening)
  - Companies with PQL models convert at 5-6x the rate of MQL models
  - SDR hiring has plateaued — companies are investing in technology
    instead of headcount
  - EU AI Act classifies some automated scoring as "high risk"
  - 60% of B2B buyers say they're "mostly decided" before talking to
    sales

  Tasks:
  1. Write the report: "The Future of B2B Lead Qualification: 2026-2031."
     Include: the executive summary (top 10 predictions), the trend
     analysis (each of the 10 trends with current state, trajectory, and
     implications), the technology forecast (which technologies will
     define qualification in 2031), the organizational forecast (how
     qualification teams will be structured), and the bold prediction
     (the one change that will most transform qualification).

  2. Write the "Practitioner Playbook" — what RevOps leaders should do
     NOW to prepare for these changes. Include: the immediate actions
     (what to start doing in 2026), the 1-year plan (investments and
     changes for 2027), the 3-year vision (where to be by 2029), and
     the skills development plan (what qualification professionals need
     to learn).

  3. Write the "Counter-Arguments and Risks" — the other side of each
     prediction. Include: the case against AI-native qualification (why
     it might not work), the defense of the MQL (why it's not dead),
     the technology hype risk (which predicted changes won't happen),
     and the unintended consequences (what could go wrong if these
     trends play out).

assertions:
  - type: llm_judge
    criteria: "Report is visionary yet grounded — 10 predictions backed by current data, trend analysis with specific trajectories, technology and organizational forecasts that are ambitious but plausible"
    weight: 0.35
    description: "Visionary yet grounded future report"
  - type: llm_judge
    criteria: "Practitioner playbook is actionable — immediate actions, 1-year plan, 3-year vision, and skills development that RevOps leaders could actually follow starting today"
    weight: 0.35
    description: "Actionable practitioner playbook"
  - type: llm_judge
    criteria: "Counter-arguments show intellectual honesty — genuine pushback on each trend, defense of current approaches, hype identification, and unintended consequences that add credibility"
    weight: 0.30
    description: "Intellectually honest counter-arguments"
