meta:
  id: qualification-category-creation
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Create a new category around qualification intelligence — position your company as the definitive leader in 'pipeline intelligence' by defining and owning a new market"
  tags: [sales, leads, qualification, category-creation, positioning, market, master]

state: {}

trigger: |
  You're the CEO of "PipelineIQ" — a startup ($12M ARR, Series B) that
  has built an AI-powered platform specifically for lead qualification
  and pipeline intelligence. You compete in the "marketing automation"
  and "revenue intelligence" categories against HubSpot, Marketo, Gong,
  and 6sense. But your board believes you should create and own a new
  category: "Pipeline Intelligence."

  Why category creation:
  - Marketing automation focuses on email campaigns and workflows
  - Revenue intelligence focuses on conversation analysis
  - Your platform focuses on the qualification decision — the most
    critical moment in the pipeline
  - The market groups you with tools that do different things
  - A new category would position you as the leader, not a niche player

  Your differentiation:
  - AI qualification agent (autonomous lead qualification)
  - Predictive pipeline scoring (real-time pipeline health)
  - Qualification conversation intelligence (specialized for discovery)
  - Lead-to-revenue attribution (full funnel attribution focused on
    qualification quality)
  - Scoring model optimization engine (continuously improves scoring)

  Market data:
  - Marketing automation market: $8B, growing 12% YoY
  - Revenue intelligence market: $3B, growing 25% YoY
  - Estimated "pipeline intelligence" market: $1.5B (subset of both +
    RevOps tools + qualification tools)
  - Potential market in 5 years: $6B
  - Your current market share in existing categories: 0.15%
  - Potential share as pipeline intelligence leader: 10-15%

  Tasks:
  1. Write the "Category Definition Document" — the foundation for
     Pipeline Intelligence. Include: the category name and definition,
     the problem statement (why existing categories fail at qualification),
     the buyer persona (who buys this, title, budget), the category
     landscape (who else could be in this category), the evaluation
     criteria (what buyers should look for), and the market sizing.

  2. Write the "Category Creation GTM Plan" — how to launch and
     establish the category. Include: the analyst strategy (Gartner/
     Forrester recognition), the content strategy (thought leadership
     that educates the market), the community building plan, the
     customer advocacy program, the PR strategy, and the competitive
     positioning (how to handle existing players' response).

  3. Write the "Category Economics Thesis" — the investment argument.
     Include: the market creation opportunity ($1.5B → $6B), the
     category leader economics (disproportionate value capture), the
     valuation impact (premium multiples), the customer acquisition
     advantage (default choice), and the competitive moat (why followers
     can't replicate leadership).

assertions:
  - type: llm_judge
    criteria: "Category definition is compelling — name, problem statement, buyer persona, landscape, evaluation criteria, and market sizing that could genuinely establish a new category"
    weight: 0.35
    description: "Compelling category definition"
  - type: llm_judge
    criteria: "GTM plan covers all category creation channels — analyst relations, content, community, advocacy, PR, and competitive positioning for comprehensive market creation"
    weight: 0.35
    description: "Comprehensive category creation GTM"
  - type: llm_judge
    criteria: "Economics thesis justifies investment — market creation, leader economics, valuation impact, acquisition advantage, and competitive moat that would convince investors"
    weight: 0.30
    description: "Investment-justifying economics thesis"
