meta:
  id: qualification-public-company
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Manage qualification as a public company — navigate quarterly reporting, analyst expectations, and Wall Street scrutiny on pipeline generation efficiency"
  tags: [sales, leads, qualification, public-company, Wall-Street, efficiency, master]

state: {}

trigger: |
  You're the CRO of "PublicPipe" ($650M ARR) which IPO'd 8 months ago.
  Pipeline generation efficiency was a headline metric in your S-1
  (MQL-to-SQL of 28%, cost per SQL of $1,800). This quarter, efficiency
  is declining: MQL-to-SQL trending to 20%, cost per SQL rising to $2,600.
  Your earnings call is in 4 weeks.

  Why efficiency is declining:
  1. Post-IPO hiring spree: 25 new SDRs added (ramp takes 4 months,
     diluting overall metrics during ramp period)
  2. Market expansion: Entered 3 new verticals where qualification
     criteria are undefined — conversion rates are 50% below core market
  3. Lead volume surge: Marketing increased spend 40% to hit investor-
     guided growth targets, but incremental leads are lower quality
  4. Competitive pressure: 2 competitors launched aggressive PLG models,
     creating noise in your pipeline (tire-kickers evaluating free options)
  5. Metric composition: S-1 MQL-to-SQL included only "mature" scoring
     model performance — new verticals and SDR ramp dilute the blended
     number

  Analyst expectations:
  - Consensus expects 26% MQL-to-SQL (you'll report ~20%)
  - Analysts will ask: "Is qualification efficiency sustainable as you
    scale, or does it naturally degrade?"
  - Your stock trades at 11x ARR; peer with declining efficiency trades
    at 7x ARR — a multiple compression could wipe $2.6B in market cap

  Board data:
  - Core business MQL-to-SQL: 27% (stable, healthy)
  - New verticals MQL-to-SQL: 12% (expected to improve to 22% by Q4)
  - New SDR MQL-to-SQL: 10% (expected to reach 25% by Q3)
  - Blended MQL-to-SQL: 20% (the headline number that worries everyone)
  - If you reported core only: 27% (above consensus)

  Tasks:
  1. Write the "Efficiency Recovery Plan" — the 2-quarter plan to
     stabilize and recover qualification efficiency. Include: the
     immediate triage (what to do before earnings), the segmented
     reporting strategy (how to present core vs new business metrics),
     the new vertical acceleration plan (how to build qualification
     criteria faster), the SDR ramp acceleration (how to get new hires
     productive faster), and the lead quality improvement (how to
     maintain quality despite 40% volume increase).

  2. Write the "Earnings Call Preparation" — what to say to analysts.
     Include: the prepared remarks (how CEO and CFO address efficiency
     in scripts), the Q&A preparation (10 most likely analyst questions
     with approved answers), the supplemental metrics (positive metrics
     that contextualize the efficiency decline — core business strength,
     vertical expansion investment), the guidance approach (what to
     guide for future efficiency), and the investor communication
     strategy (1:1 meetings with top investors).

  3. Write the "Public Company Qualification Governance" — the ongoing
     framework for managing qualification metrics as a public company.
     Include: the efficiency forecasting methodology (predicting metrics
     2 quarters out), the early warning system (triggers that flag
     efficiency risk), the disclosure framework (what to proactively
     share about qualification vs what's required), the peer
     benchmarking (how to position your metrics vs public peers), and
     the long-term efficiency strategy (sustainable target range).

assertions:
  - type: llm_judge
    criteria: "Recovery plan addresses all decline drivers — SDR ramp, new verticals, lead quality, and competitive pressure with segment-specific strategies and timeline"
    weight: 0.35
    description: "Driver-addressing recovery plan"
  - type: llm_judge
    criteria: "Earnings preparation is investor-ready — prepared remarks, analyst Q&A, supplemental metrics, guidance approach, and investor communication for a sensitive efficiency disclosure"
    weight: 0.35
    description: "Investor-ready earnings preparation"
  - type: llm_judge
    criteria: "Governance enables sustained management — efficiency forecasting, early warnings, disclosure framework, peer benchmarking, and long-term strategy for public company oversight"
    weight: 0.30
    description: "Sustained public company governance"
