meta:
  id: ai-autonomous-qualification
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Design autonomous AI qualification — architect a system where AI agents handle 80% of lead qualification without human intervention"
  tags: [sales, leads, qualification, AI, autonomous, agents, future, master]

state: {}

trigger: |
  You're the Head of AI-Powered Revenue at "AutoQual" ($800M ARR, 30,000
  customers). The CEO's vision: "In 3 years, I want AI to handle 80% of
  lead qualification autonomously. Humans should only touch the top 20%
  of leads — the complex, high-value, multi-stakeholder deals."

  Current state:
  - 80 SDRs qualifying 6,000 leads/month
  - Cost: $9.6M/year for SDR team
  - MQL-to-SQL: 22%
  - Average qualification time: 15 minutes per lead (phone + email)
  - Quality: Top SDRs achieve 35% SQL rate, bottom achieve 8%

  Target state (3-year vision):
  - 16 human "Strategic Qualification Specialists" (top 20% retained)
  - AI qualification agents handling 80% of leads
  - Target cost: $3M/year (16 humans + AI infrastructure)
  - Target MQL-to-SQL: 30%+ (AI should be better than average SDR)
  - Qualification time: Under 2 minutes for AI, under 10 for humans

  AI capabilities available:
  - Conversational AI (can conduct text-based qualification chats)
  - Voice AI (can handle phone qualification calls — early stage)
  - NLP (can analyze lead signals and conversation transcripts)
  - Real-time scoring (can score and route in milliseconds)
  - Personalization engine (can customize outreach based on lead data)
  - Anomaly detection (can flag unusual patterns)

  Constraints:
  - Enterprise customers ($100K+ deals) must interact with humans
  - The AI must identify itself as AI in all communications (ethical req)
  - GDPR and EU AI Act require explainability of automated decisions
  - Customers should be able to request human escalation at any time
  - SDR union concerns (workforce reduction requires careful handling)

  Tasks:
  1. Design the "Autonomous Qualification Architecture" — the technical
     blueprint. Include: the AI qualification agent design (how it
     conducts qualification conversations via chat and email), the
     decision engine (how the AI determines if a lead is qualified,
     what questions it asks, how it handles uncertainty), the human
     escalation triggers (when AI hands off to humans), the quality
     assurance system (how to monitor AI qualification quality), and
     the continuous learning loop (how AI improves from outcomes).

  2. Design the "Human-AI Handoff Model" — how the 16 human specialists
     work alongside AI. Include: the triage logic (which leads go to
     AI vs humans), the handoff protocol (how AI passes leads to humans
     with full context), the human override system (how humans correct
     AI mistakes), the escalation pathways (when a lead asks for a
     human during an AI conversation), and the performance comparison
     (how to measure AI vs human qualification quality).

  3. Design the "Workforce Transition Plan" — how to move from 80 SDRs
     to 16 specialists over 3 years. Include: the selection criteria
     for the 16 (what makes someone a "Strategic Qualification
     Specialist"), the reskilling program (how to prepare the 16 for
     AI-augmented work), the transition support for the 64 who leave
     the SDR role (internal mobility, severance, career transition
     support), the phased timeline (how many SDRs transition each
     quarter), and the change management communication plan.

assertions:
  - type: llm_judge
    criteria: "Architecture is technically sound and ethically compliant — AI agent design, decision engine, human escalation, quality assurance, and continuous learning that respects GDPR, AI Act, and ethical disclosure requirements"
    weight: 0.35
    description: "Sound and ethical autonomous architecture"
  - type: llm_judge
    criteria: "Human-AI handoff is seamless — triage logic, handoff protocol with context, human override, escalation pathways, and performance comparison that create a smooth experience for leads"
    weight: 0.35
    description: "Seamless human-AI handoff"
  - type: llm_judge
    criteria: "Workforce transition is humane — selection criteria, reskilling, transition support for departing SDRs, phased timeline, and communication that handles the sensitive reduction responsibly"
    weight: 0.30
    description: "Humane workforce transition"
