meta:
  id: qualification-maturity-model
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Create the lead qualification maturity model — build the definitive framework that companies use to assess and improve their qualification capabilities"
  tags: [sales, leads, qualification, scoring, maturity-model, framework, master]

state: {}

trigger: |
  You're a thought leader in B2B SaaS revenue operations. A major
  industry research firm has commissioned you to create the definitive
  "Lead Qualification Maturity Model" — a framework that any SaaS company
  can use to assess their qualification capabilities and create an
  improvement roadmap.

  The model must cover 8 dimensions of qualification maturity:
  1. Scoring methodology (rule-based → predictive → AI-native)
  2. Data quality (incomplete → enriched → real-time intelligence)
  3. Technology stack (spreadsheets → basic automation → integrated
     platform → AI-powered)
  4. Process design (ad hoc → documented → optimized → autonomous)
  5. Team and talent (untrained → trained → specialized → expert)
  6. Marketing-sales alignment (adversarial → cooperative → integrated
     → unified)
  7. Analytics and reporting (none → basic → advanced → predictive)
  8. Governance and compliance (none → basic → comprehensive → proactive)

  Each dimension must have 5 maturity levels:
  Level 1: Ad Hoc (no formal process)
  Level 2: Defined (basic processes documented)
  Level 3: Managed (processes measured and optimized)
  Level 4: Advanced (predictive and proactive)
  Level 5: World-class (AI-native, self-improving, competitive advantage)

  You must also provide 3 real-world assessments to demonstrate the model:

  Company A: "StartupFast" ($8M ARR, 2 years old, 3 SDRs)
  - Scoring: Basic HubSpot scoring, updated once
  - Data: 45% complete, no enrichment
  - Tech: HubSpot + Google Sheets
  - Process: SDRs use intuition more than scoring
  - Team: Untrained, learning on the job
  - Alignment: Marketing creates leads, sales complains
  - Analytics: Monthly spreadsheet report
  - Governance: None

  Company B: "MidScale" ($80M ARR, 6 years old, 20 SDRs)
  - Scoring: Marketo scoring, updated quarterly
  - Data: 65% complete, Clearbit enrichment
  - Tech: Marketo + Salesforce + LeanData
  - Process: Documented playbooks, quarterly optimization
  - Team: Trained, some specialization by segment
  - Alignment: Monthly marketing-sales meetings
  - Analytics: Salesforce dashboards, weekly reviews
  - Governance: RevOps owns scoring, quarterly audits

  Company C: "EnterprisePro" ($500M ARR, 12 years old, 60 SDRs)
  - Scoring: AI-powered (custom ML model), real-time
  - Data: 90% complete, multi-source enrichment + intent
  - Tech: Full stack (Salesforce, Marketo, 6sense, custom AI)
  - Process: Automated, exception-based human involvement
  - Team: Specialized by segment and vertical, career paths
  - Alignment: Unified Pipeline Generation function
  - Analytics: Predictive pipeline forecasting, real-time dashboards
  - Governance: Comprehensive, SOX-compliant, GDPR-ready

  Tasks:
  1. Create the "Lead Qualification Maturity Model" — the complete 8×5
     matrix. For each cell (dimension × level): define what "good" looks
     like at that level, provide specific criteria for assessment, and
     include common pitfalls at each transition.

  2. Apply the model to all 3 companies. For each: score them on all
     8 dimensions, calculate an overall maturity score, identify their
     2-3 biggest gaps, and create a prioritized improvement roadmap
     (what to improve first and why).

  3. Write the "Implementation Guide" — how companies use this model.
     Include: the self-assessment process (how to score yourself
     honestly), the benchmarking approach (how to compare to peers),
     the improvement prioritization framework (which dimensions to
     improve first based on company stage), the investment model (what
     each level transition typically costs and delivers), and the
     common progression paths (typical journey from Level 1 to Level 5).

assertions:
  - type: llm_judge
    criteria: "Maturity model is comprehensive and specific — all 8 dimensions × 5 levels with clear criteria, not vague descriptions; each cell is assessable and actionable"
    weight: 0.35
    description: "Comprehensive specific maturity model"
  - type: llm_judge
    criteria: "Company assessments demonstrate the model — StartupFast mostly Level 1-2, MidScale Level 2-3, EnterprisePro Level 4-5 with specific scores, gaps, and improvement roadmaps for each"
    weight: 0.35
    description: "Model-demonstrating company assessments"
  - type: llm_judge
    criteria: "Implementation guide is usable — self-assessment process, benchmarking, prioritization framework, investment model, and progression paths that companies could actually follow"
    weight: 0.30
    description: "Usable implementation guide"
