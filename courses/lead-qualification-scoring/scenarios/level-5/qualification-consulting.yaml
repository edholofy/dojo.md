meta:
  id: qualification-consulting
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Deliver a lead qualification consulting engagement — conduct a comprehensive assessment and transformation for a client struggling with pipeline generation efficiency"
  tags: [sales, leads, qualification, scoring, consulting, engagement, master]

state: {}

trigger: |
  You're a principal consultant at a top B2B SaaS advisory firm. A $400M
  ARR company ("ClientCo") has engaged your firm for a $500K, 16-week
  lead qualification transformation. The CEO's mandate: "Our cost per SQL
  is 3x our competitors. Fix our entire pipeline generation engine."

  ClientCo diagnostics (from your 2-week assessment):
  - 2,500 inbound leads/month, 300 outbound leads/month
  - 45 SDRs, 30 AEs across 3 products and 2 regions (NA + EMEA)
  - MQL-to-SQL: 11% (benchmark: 25%)
  - SQL-to-close: 15% (benchmark: 25%)
  - Cost per SQL: $6,200 (benchmark: $2,000)
  - Speed to lead: 26 hours (benchmark: 5 minutes)
  - SDR turnover: 55% annually
  - Scoring model: 3 years old, rule-based, never updated
  - Data quality: 28% completeness
  - Technology: Marketo + Salesforce (underutilized)
  - No intent data, no enrichment, no predictive scoring
  - Marketing and sales don't agree on MQL definition
  - No routing rules — SDRs self-select leads from a pool
  - No nurture sequences for disqualified leads

  Benchmark data (from your firm's database of 200 SaaS companies):
  - Top quartile MQL-to-SQL: 28%
  - Top quartile cost per SQL: $1,800
  - Top quartile speed to lead: 3 minutes
  - Top quartile SDR turnover: 22%
  - Top quartile data completeness: 85%

  ClientCo's specific challenges (from stakeholder interviews):
  - VP Sales: "I don't trust the scoring model. I tell my AEs to ignore
    it and just call the demo requests."
  - CMO: "We deliver plenty of MQLs. Sales doesn't follow up."
  - SDR Manager: "My team is drowning. They can't tell good leads from
    bad ones. Half quit within 6 months."
  - CTO: "Nobody's asked me for any product usage data for scoring.
    We have it — 200M events/day — but it's not connected."
  - CFO: "Show me the ROI. I've funded 3 'scoring improvement' projects
    in 5 years. None delivered results."

  Tasks:
  1. Write the "Assessment Report" — your findings and recommendations.
     Include: the executive summary (3 paragraphs), the diagnostic
     framework (how you assessed each area), the findings by category
     (scoring model, data quality, technology, process, people, and
     culture), the root cause analysis (why previous improvement projects
     failed), and the prioritized recommendations (ranked by impact and
     feasibility).

  2. Write the "Transformation Plan" — the 16-week engagement plan.
     Weeks 1-4: Quick wins and foundation. Weeks 5-8: Model redesign
     and technology. Weeks 9-12: Process and people. Weeks 13-16:
     Optimization and handoff. For each phase: specific deliverables,
     stakeholder involvement, success criteria, and risk mitigations.
     Address why this project will succeed where the previous 3 failed.

  3. Write the "Value Realization Framework" — how ClientCo measures
     and sustains the improvement after your engagement ends. Include:
     the metric baseline and targets (before/after for every key metric),
     the measurement methodology (how to accurately attribute improvements
     to the transformation), the governance model (who owns what after
     you leave), the sustainability plan (how to prevent regression),
     and the 12-month post-engagement check-in plan.

assertions:
  - type: llm_judge
    criteria: "Assessment is diagnostic and evidence-based — uses specific ClientCo data and stakeholder quotes, compares to benchmarks, identifies root causes including why previous projects failed"
    weight: 0.35
    description: "Evidence-based diagnostic assessment"
  - type: llm_judge
    criteria: "Transformation plan is phased and addresses previous failures — quick wins build credibility, each phase has deliverables and success criteria, explicitly addresses the CFO's concern about past failed projects"
    weight: 0.35
    description: "Failure-addressing transformation plan"
  - type: llm_judge
    criteria: "Value realization ensures sustainability — metric baselines, attribution methodology, governance after engagement, sustainability plan, and check-in schedule that prevent regression"
    weight: 0.30
    description: "Sustainability-ensuring value realization"
