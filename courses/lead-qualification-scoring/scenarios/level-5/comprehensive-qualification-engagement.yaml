meta:
  id: comprehensive-qualification-engagement
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Lead a comprehensive qualification transformation — integrate all qualification disciplines into a cohesive capability that makes pipeline generation the company's competitive advantage"
  tags: [sales, leads, qualification, scoring, comprehensive, transformation, master]

state: {}

trigger: |
  You've been hired as the first Chief Pipeline Officer (CPO) at
  "PipelineMax" ($700M ARR, targeting $2B in 4 years). The CEO created
  this role specifically to make pipeline generation the company's
  primary competitive advantage. Your mandate: build a world-class
  qualification function that generates 2x more SQLs at half the cost.

  Starting position:
  - $700M ARR, 15,000 customers, 30 countries
  - MQL-to-SQL: 14% (target: 30%+ within 3 years)
  - Cost per SQL: $4,500 (target: $1,500)
  - Speed to lead: 18 hours (target: under 5 minutes)
  - Pipeline predictability: ±30% (target: ±8%)
  - SDR turnover: 48% (target: under 20%)
  - Qualification team: 70 SDRs + 12 RevOps (scattered, no unified org)
  - No AI scoring, no intent data, no enrichment
  - 3 separate scoring models for 3 products
  - Estimated annual waste: $12M in SDR time on unqualified leads

  Your budget: $15M over 3 years
  Your headcount authority: Current 82 → redesign to optimal structure

  CEO's vision:
  "In 3 years, I want analysts to say our pipeline generation efficiency
  is best-in-class. I want every dollar we spend on qualification to
  generate $10 in pipeline. I want our scoring to be so good that SDRs
  never waste time on a bad lead. And I want to cut $12M in annual waste."

  The challenge:
  Simultaneously build 10 capabilities:
  1. Unified scoring model (3 products → 1 intelligent system)
  2. AI-powered qualification (predictive scoring + autonomous agents)
  3. Data quality and enrichment (28% → 90%+ completeness)
  4. Intent data integration (Bombora + G2 + first-party signals)
  5. Real-time routing and speed optimization
  6. SDR team redesign (structure, training, compensation)
  7. Marketing-sales alignment and shared metrics
  8. Pipeline forecasting and predictability
  9. Global qualification standardization (30 countries)
  10. Qualification analytics and continuous optimization

  Tasks:
  1. Write the "CPO 100-Day Plan." Days 1-30: Assessment and quick wins.
     Days 31-60: Strategy and design. Days 61-100: Launch and early wins.
     Include deliverables, key hires, stakeholder engagement, and first
     metrics report.

  2. Write the "3-Year Qualification Transformation Roadmap." Year 1:
     Foundation (unified model, data quality, basic AI, routing). Year 2:
     Acceleration (autonomous AI, intent data, global scaling, analytics).
     Year 3: Excellence (predictive pipeline, category leadership,
     public company optimization). For each year: initiatives, budget,
     headcount, technology, expected metric improvements, and risks.

  3. Write the "Competitive Moat Thesis" — how qualification capability
     becomes an unassailable competitive advantage. Include: the data
     advantage (15,000 accounts of qualification data creates AI
     superiority), the efficiency advantage (2x SQLs at half cost),
     the talent advantage (best qualification talent wants to work at
     the best), the technology advantage (proprietary scoring and AI),
     the knowledge advantage (5 years of win/loss patterns), and the
     financial advantage (savings fund more investment, virtuous cycle).

assertions:
  - type: llm_judge
    criteria: "100-day plan builds CPO credibility — assessment, design, and launch phases with quick wins, key hires, and metrics that establish the qualification function's importance"
    weight: 0.35
    description: "Credibility-building 100-day plan"
  - type: llm_judge
    criteria: "3-year roadmap transforms at scale — 10 capabilities built across 3 phases with budget, headcount, technology, and metric projections for a $700M company targeting $2B"
    weight: 0.35
    description: "Scale-appropriate transformation roadmap"
  - type: llm_judge
    criteria: "Competitive moat thesis is compelling — data, efficiency, talent, technology, knowledge, and financial advantages that create a defensible qualification capability"
    weight: 0.30
    description: "Compelling competitive moat thesis"
