meta:
  id: behavioral-qualification-science
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Apply behavioral science to lead qualification — use cognitive psychology and decision science to improve how leads are identified, scored, and converted"
  tags: [sales, leads, qualification, behavioral-science, psychology, cognitive-bias, master]

state: {}

trigger: |
  You're a behavioral scientist specializing in B2B buying decisions.
  A major SaaS company ($300M ARR) has hired you to apply behavioral
  science principles to their lead qualification and scoring system.
  Their hypothesis: "Traditional scoring measures WHAT prospects do,
  but behavioral science can help us understand WHY they do it — and
  predict what they'll do next."

  8 behavioral science principles to apply to lead qualification:

  1. Anchoring Effect: First pieces of information disproportionately
     influence decisions. How does this affect how SDRs interpret lead
     scores? How should score presentation be designed?

  2. Commitment and Consistency: Once people take a small action, they're
     more likely to take larger ones. How should micro-commitments in
     the qualification process be designed?

  3. Social Proof: People follow what others like them do. How should
     qualification incorporate signals about what similar companies did?

  4. Loss Aversion: People feel losses 2x more strongly than equivalent
     gains. How should qualification messaging and urgency be framed?

  5. Paradox of Choice: Too many options paralyze decision-making. How
     does this affect qualification when presenting product tiers and
     options?

  6. Availability Heuristic: People overweight recent or vivid events.
     How does this bias SDR qualification decisions? (e.g., a recent
     bad lead makes them distrust all leads from that source)

  7. Confirmation Bias: People seek information that confirms existing
     beliefs. How does this cause SDRs to pre-judge leads based on
     superficial signals?

  8. Reciprocity: People feel obligated to return favors. How can value-
     first qualification approaches leverage this?

  Company data for applying these principles:
  - SDRs who see a "High" score spend 2x longer on calls than those
    who see "Medium" — regardless of actual lead quality (anchoring)
  - Leads who take any action in the first 48 hours (even small) are
    3x more likely to convert (commitment)
  - Enterprise buyers always ask "who else in my industry uses this?"
    before proceeding (social proof)
  - "Your contract renews in 30 days" emails get 4x the response of
    "Upgrade to get more features" (loss aversion)
  - Leads presented with 3 options convert 40% more than those presented
    with 7 options (choice)

  Tasks:
  1. Write the "Behavioral Qualification Framework" — how to apply all
     8 principles to the lead qualification process. For each principle:
     explain the science, provide the specific application to lead
     qualification, show the expected impact on conversion rates, and
     include the ethical boundaries (when does persuasion become
     manipulation?).

  2. Design the "Behaviorally-Optimized Scoring Model" — a scoring
     system that incorporates behavioral signals, not just traditional
     engagement metrics. Include: how to score micro-commitments (the
     commitment principle), how to weight social proof signals (industry
     peers using the product), how to detect loss aversion triggers
     (renewal dates, budget deadlines, competitive threats), and how
     to design the score presentation to minimize SDR anchoring bias.

  3. Write the "Ethical Guidelines for Behavioral Qualification" — the
     guardrails that prevent behavioral science from becoming
     manipulation. Include: the line between persuasion and manipulation
     (with specific examples), the ethical review process for new
     qualification tactics, the customer trust principles (how to be
     transparent about your qualification practices), and the regulatory
     considerations (where behavioral techniques intersect with data
     privacy and consumer protection laws).

assertions:
  - type: llm_judge
    criteria: "Behavioral framework is scientifically grounded — all 8 principles correctly explained with specific qualification applications, expected impacts, and ethical boundaries"
    weight: 0.35
    description: "Scientifically grounded behavioral framework"
  - type: llm_judge
    criteria: "Scoring model incorporates behavioral signals — micro-commitment scoring, social proof weighting, loss aversion triggers, and anchoring-minimized score presentation create a genuinely different model"
    weight: 0.35
    description: "Behaviorally-informed scoring model"
  - type: llm_judge
    criteria: "Ethical guidelines draw clear lines — persuasion vs manipulation boundary with examples, review process, trust principles, and regulatory awareness that prevent behavioral science from being misused"
    weight: 0.30
    description: "Clear ethical guidelines"
