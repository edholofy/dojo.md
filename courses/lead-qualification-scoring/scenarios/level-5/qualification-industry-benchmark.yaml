meta:
  id: qualification-industry-benchmark
  level: 5
  course: lead-qualification-scoring
  type: output
  description: "Build the industry benchmark for lead qualification — create the definitive benchmarking study that SaaS companies use to evaluate their qualification performance"
  tags: [sales, leads, qualification, benchmarking, industry, research, master]

state: {}

trigger: |
  You're a research director at a SaaS industry research firm. You've
  been tasked with creating the definitive "State of B2B Lead Qualification"
  benchmark report based on data from 400 SaaS companies.

  Dataset:
  - 400 B2B SaaS companies surveyed
  - Revenue range: $5M to $1B ARR
  - Company maturity: Seed to public
  - Geographic coverage: NA (60%), EMEA (25%), APAC (10%), LATAM (5%)

  Key findings from the data:
  - Median MQL-to-SQL: 18% (mean: 21%; top quartile: 30%+)
  - Median cost per SQL: $2,400 (top quartile: $1,200)
  - Median speed to lead: 4.2 hours (top quartile: 8 minutes)
  - Companies with dedicated scoring team: 28%
  - Companies with AI-powered scoring: 15%
  - Companies with intent data: 32%
  - Companies with enrichment: 45%
  - Companies with PQL models: 22%
  - Companies with account-based scoring: 35%
  - SDR-to-AE promotion rate: Median 22%, top quartile 38%
  - SDR turnover: Median 38%, top quartile 18%

  Correlation analysis:
  - AI-powered scoring → +45% higher MQL-to-SQL conversion
  - Intent data integration → +30% higher MQL-to-SQL conversion
  - Data enrichment at capture → +25% higher MQL-to-SQL conversion
  - Speed to lead under 5 min → +400% higher conversion
  - Dedicated scoring team → +35% higher MQL-to-SQL conversion
  - PQL model → +150% higher conversion vs MQL model
  - Account-based scoring → +55% higher enterprise conversion
  - Marketing-sales shared metrics → +40% higher MQL acceptance rate

  Tasks:
  1. Write the "State of B2B Lead Qualification Report." Include: the
     executive summary (top 10 findings), the conversion analysis
     (MQL-to-SQL distribution, trends, drivers), the technology analysis
     (tools, AI adoption, intent data, enrichment), the organizational
     analysis (team structures, headcount, reporting lines, turnover),
     the process analysis (scoring methodologies, routing, nurturing),
     and the financial analysis (unit economics, ROI of qualification
     investments).

  2. Write the "Self-Assessment Framework" — the tool companies use to
     benchmark themselves. Include: the 25-question assessment across
     6 categories, the scoring methodology (how to calculate a company's
     qualification maturity from answers), the peer group matching (how
     to identify the right comparison group by size, model, and
     maturity), and the gap analysis template (where a company over/
     underperforms vs peers).

  3. Write the "Industry Recommendations" — strategic guidance based on
     the data. Include: the top 5 investments for conversion improvement
     (ranked by impact and cost), the common mistakes (what the bottom
     quartile does differently), the emerging practices (what early
     adopters do that will become standard), and the predictions (where
     lead qualification is headed in the next 3 years).

assertions:
  - type: llm_judge
    criteria: "Benchmark report is authoritative — executive summary, conversion analysis, technology analysis, organizational analysis, process analysis, and financial analysis from 400-company dataset"
    weight: 0.35
    description: "Authoritative benchmark report"
  - type: llm_judge
    criteria: "Self-assessment framework is usable — 25-question assessment, scoring methodology, peer matching, and gap analysis that companies could actually use to benchmark themselves"
    weight: 0.35
    description: "Usable self-assessment framework"
  - type: llm_judge
    criteria: "Recommendations are data-grounded — top 5 investments, common mistakes, emerging practices, and predictions backed by the 400-company correlation data"
    weight: 0.30
    description: "Data-grounded recommendations"
