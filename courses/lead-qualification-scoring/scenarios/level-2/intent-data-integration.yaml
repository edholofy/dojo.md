meta:
  id: intent-data-integration
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Integrate intent data into lead scoring — use third-party buyer signals from Bombora, G2, and other intent providers to identify accounts showing purchase interest"
  tags: [sales, leads, scoring, intent-data, Bombora, G2, buyer-signals, intermediate]

state: {}

trigger: |
  You're the Demand Gen Manager at "SecureNet" — a B2B SaaS network
  security platform ($1K-10K/month). Your current scoring model uses
  only first-party data (your own website and email engagement). The
  VP of Marketing has approved a $40K/year budget for third-party intent
  data and wants you to integrate it into your scoring model.

  Your current first-party scoring model:
  - Demo request: 30 pts
  - Pricing page visit: 20 pts
  - Case study download: 15 pts
  - Webinar attendance: 15 pts
  - Blog visit: 5 pts
  - Company email: 10 pts
  - ICP firmographic match: 20 pts
  - MQL threshold: 65 pts
  - Current MQL-to-SQL rate: 18%

  Intent data vendors you're evaluating:
  1. Bombora — Tracks content consumption across 5,000+ B2B websites.
     Provides "topic surge" scores (0-100) when an account researches
     topics more than their baseline. Your relevant topics: "network
     security," "zero trust," "SIEM," "endpoint protection."
  2. G2 Buyer Intent — Captures signals when users actively research
     your category on G2: viewing your profile, reading reviews,
     comparing you to competitors.
  3. ZoomInfo — Provides B2B contact and company data with intent
     signals based on web behavior.

  Pilot data from 30-day Bombora trial:
  - 150 accounts showed high surge scores (70+) for your topics
  - Of those, 35 were already in your pipeline (23%)
  - Of those 35, 12 had gone dark (no first-party engagement in 30+ days)
  - Of accounts with high Bombora scores that became MQLs: 32% converted
    to SQL (vs 18% baseline)
  - Accounts with high Bombora + first-party engagement: 45% SQL conversion

  G2 Buyer Intent pilot (30 days):
  - 80 accounts viewed your G2 profile
  - 25 compared you with competitors on G2
  - 15 read reviews about your product
  - Overlap: 10 accounts showed both Bombora surge AND G2 activity
  - Accounts with G2 competitor comparison activity: 28% converted to SQL

  Tasks:
  1. Recommend which intent data vendor(s) to purchase and why. Consider:
     signal quality, coverage, overlap with your existing data, cost
     (Bombora: $25K/year, G2 Intent: $18K/year, ZoomInfo: $30K/year),
     and expected ROI based on the pilot data. You have $40K to spend.

  2. Design the integrated scoring model — how to combine first-party
     engagement data with third-party intent data. Include: the specific
     point values for each intent signal, how intent scores interact
     with behavioral scores (additive? multiplicative? tiered?), how
     to handle accounts with high intent but no first-party engagement
     (the "dark funnel"), and the new MQL threshold.

  3. Create the "Intent-Triggered Playbook" — what your SDR team should
     do when intent signals fire. Include 4 playbooks:
     a) High intent + high first-party engagement (hot lead)
     b) High intent + no first-party engagement (dark funnel account)
     c) Low intent + high first-party engagement (engaged but not ready)
     d) Competitor comparison activity on G2 (competitive threat)
     For each: the outreach approach, messaging angle, timing, and
     expected outcome.

assertions:
  - type: llm_judge
    criteria: "Vendor recommendation is justified by data — uses pilot conversion rates, cost, coverage, and ROI math to recommend Bombora + G2 (best data within $40K budget) or similar defensible choice"
    weight: 0.30
    description: "Data-justified vendor recommendation"
  - type: llm_judge
    criteria: "Integrated model is coherent — intent signals have appropriate point values, interaction with behavioral scores is logical (not just additive), dark funnel leads are handled, new threshold reflects the improved conversion data"
    weight: 0.40
    description: "Coherent integrated scoring model"
  - type: llm_judge
    criteria: "SDR playbooks are actionable — different approaches for each intent quadrant, with specific messaging, timing, and channels that match the buying signal type"
    weight: 0.30
    description: "Actionable intent playbooks"
