meta:
  id: meddic-framework
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Apply MEDDIC/MEDDPICC for complex deals — qualify enterprise opportunities using Metrics, Economic Buyer, Decision Criteria, Decision Process, Identify Pain, and Champion"
  tags: [sales, leads, qualification, MEDDIC, MEDDPICC, enterprise, intermediate]

state: {}

trigger: |
  You're a mid-market AE at "InsightCloud" — a B2B SaaS business
  intelligence platform ($2K-20K/month). Your team uses MEDDIC for deals
  over $50K ACV and BANT for smaller deals. You've recently been promoted
  to handle enterprise accounts and need to master MEDDIC.

  MEDDIC framework:
  M = Metrics: Quantifiable measures of success the customer expects
  E = Economic Buyer: Person with budget authority and veto power
  D = Decision Criteria: What the customer will evaluate solutions on
  D = Decision Process: Steps, timeline, and people involved in buying
  I = Identify Pain: The business problem driving the evaluation
  C = Champion: Internal advocate who sells on your behalf

  You're working 3 enterprise opportunities simultaneously. After your
  latest round of discovery calls, here's what you know:

  Deal 1 — GlobalBank ($180K ACV, 500 users):
  - M: "We need to reduce report generation from 3 days to 3 hours"
  - E: Unknown — your contact is Director of Analytics but mentions "the
    committee" makes decisions
  - D: Must integrate with their data warehouse (Snowflake), meet SOC 2
    compliance, and support 500 concurrent users
  - D: "We have a formal RFP process. Procurement gets involved after
    the technical team makes a recommendation."
  - I: Regulators cited them for late reporting last quarter; there's
    a regulatory deadline in 90 days
  - C: Your contact seems supportive but cautious — says "I like your
    product but I'm not going to stick my neck out"

  Deal 2 — MediTech ($95K ACV, 200 users):
  - M: "We want to save our data team 20 hours per week on manual analysis"
  - E: VP of Data Science — you've had 2 calls with her directly; she
    confirmed $100K budget approved for this fiscal year
  - D: "We care most about ML integration, ease of use for non-technical
    users, and customer support quality"
  - D: VP makes the decision with input from 2 team leads; legal review
    required for contracts over $50K
  - I: They lost 2 data analysts to competitors; the team is overwhelmed
    and threatening to leave
  - C: One of the team leads, Marcus, attended 3 of your webinars, asked
    detailed questions, and emailed you: "I really want this to work"

  Deal 3 — RetailCorp ($250K ACV, 1,000 users):
  - M: Unknown — contact says "we just want better analytics"
  - E: Unknown — contact is a Senior Analyst
  - D: Unknown — "I'm not sure what we're evaluating on yet"
  - D: Unknown — "I think there's a committee but I'm not involved in
    that part"
  - I: Vague — "Our current tool is slow and people complain"
  - C: No champion identified; your only contact is the Senior Analyst

  Tasks:
  1. For each deal, score every MEDDIC dimension on a 1-5 scale (1 =
     unknown/not started, 5 = fully qualified). Calculate an overall
     deal qualification score. Identify which deals are real, which
     are at risk, and which might be dead.

  2. For each deal, create a "MEDDIC Action Plan" — the specific actions
     you need to take to strengthen the weakest dimensions. For each
     action: what information you need, who you need to talk to, what
     questions to ask, and by when.

  3. Write the internal deal review summary for Deal 2 (your strongest
     deal) in MEDDPICC format (adding Paper Process and Competition).
     This summary should be what you'd present at your weekly pipeline
     review to your VP of Sales.

assertions:
  - type: llm_judge
    criteria: "MEDDIC scores are accurate — Deal 2 scores highest (confirmed Economic Buyer, clear Metrics, strong Champion), Deal 1 is medium (weak Champion, unknown E-buyer), Deal 3 scores lowest (weak on almost every dimension)"
    weight: 0.35
    description: "Accurate MEDDIC scoring"
  - type: llm_judge
    criteria: "Action plans target the right gaps — Deal 1 needs Champion development and E-buyer identification, Deal 2 needs paper process and competitive awareness, Deal 3 needs fundamental qualification on every dimension"
    weight: 0.35
    description: "Gap-targeting action plans"
  - type: llm_judge
    criteria: "Deal review is pipeline-ready — MEDDPICC format with paper process and competition added, presenting a clear picture of deal health, risks, and next steps for VP review"
    weight: 0.30
    description: "Pipeline-ready deal review"
