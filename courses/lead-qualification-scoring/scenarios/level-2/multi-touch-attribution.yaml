meta:
  id: multi-touch-attribution
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Connect attribution to lead scoring — use multi-touch attribution data to improve lead scoring accuracy by understanding which touchpoints actually predict conversion"
  tags: [sales, leads, scoring, attribution, multi-touch, analytics, intermediate]

state: {}

trigger: |
  You're a Marketing Analytics Manager at "CloudOps" — a B2B SaaS
  infrastructure monitoring platform ($500-10,000/month). Your company
  uses last-touch attribution, which means 100% of conversion credit
  goes to the final interaction before a lead becomes an MQL. This
  creates a problem for lead scoring: you're over-weighting last-touch
  activities and under-weighting the content that actually influences
  buying decisions.

  Current last-touch attribution data (misleading):
  - Demo request page: 45% of MQL credit (highest last-touch)
  - Pricing page: 25% of MQL credit
  - Case study page: 15% of MQL credit
  - Webinar registration: 10% of MQL credit
  - Blog post: 5% of MQL credit

  New multi-touch analysis (actual journey data from 200 closed deals):
  Average touchpoints before purchase: 14.5
  Average journey time: 68 days

  First-touch analysis (what starts the journey):
  - Google search → blog post: 40% of closed deals started here
  - LinkedIn ad → whitepaper: 25% started here
  - Referral → homepage: 20% started here
  - Conference/event: 10% started here
  - Direct → pricing page: 5% started here

  Mid-journey analysis (what keeps them engaged):
  - Technical webinars: Present in 65% of closed deal journeys
  - Customer case studies: Present in 58% of closed deal journeys
  - Product comparison guides: Present in 52% of closed deal journeys
  - ROI calculator: Present in 48% of closed deal journeys
  - Blog content (3+ posts): Present in 42% of closed deal journeys

  Late-journey (what triggers buying action):
  - Pricing page visit (2+ times): Present in 85% of closed deal journeys
  - Demo request: Present in 78% of closed deal journeys
  - Free trial: Present in 35% of closed deal journeys
  - Contact sales form: Present in 25% of closed deal journeys

  Key insight: Leads who engaged with both technical webinars AND
  customer case studies before requesting a demo had a 45% close rate
  vs 18% for leads who requested a demo without those mid-journey
  touches.

  Tasks:
  1. Compare 3 attribution models (last-touch, linear, and W-shaped)
     applied to your data. For each model, show how credit would be
     distributed across touchpoints. Then recommend which model should
     inform your lead scoring and why.

  2. Redesign your lead scoring model using the multi-touch insights.
     Specifically: how should first-touch activities be scored (they
     start journeys), how should mid-journey activities be scored (they
     correlate with closing), how should late-journey activities be
     scored (they signal readiness), and how should you handle the
     "engagement depth" insight (webinar + case study + demo = 45%
     close rate)?

  3. Create the "Journey Stage Score" — a supplemental metric that
     tracks where a lead is in their buying journey, separate from the
     qualification score. Include: how to detect journey stage from
     behavior, how journey stage interacts with the lead score (a
     high-score lead in early journey stage vs a medium-score lead in
     late journey stage — which is more valuable?), and how SDRs should
     adjust their approach based on journey stage.

assertions:
  - type: llm_judge
    criteria: "Attribution model comparison is accurate — last-touch over-credits demo requests, linear spreads evenly, W-shaped weights first and last with mid-journey; recommends W-shaped or similar with clear reasoning"
    weight: 0.30
    description: "Accurate attribution comparison"
  - type: llm_judge
    criteria: "Scoring redesign uses multi-touch insights — first-touch gets awareness credit, mid-journey content gets engagement credit, late-journey gets intent credit, and the combination effect (webinar + case study + demo) gets a bonus"
    weight: 0.40
    description: "Multi-touch-informed scoring redesign"
  - type: llm_judge
    criteria: "Journey stage metric adds value — detects stage from behavior patterns, interacts with score in meaningful way (late-stage medium-score may be more actionable than early-stage high-score), and gives SDRs actionable guidance"
    weight: 0.30
    description: "Value-adding journey stage metric"
