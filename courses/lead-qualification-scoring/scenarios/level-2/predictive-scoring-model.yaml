meta:
  id: predictive-scoring-model
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Build a predictive lead scoring model — analyze historical conversion data to create a data-driven scoring system that outperforms rule-based approaches"
  tags: [sales, leads, scoring, predictive, data-driven, analytics, intermediate]

state: {}

trigger: |
  You're a Revenue Operations analyst at "CodeDeploy" — a B2B SaaS CI/CD
  platform ($500-5,000/month). Your current lead scoring model is rule-
  based (static point values) and was built 18 months ago. The VP of
  Sales says: "Our scoring model is broken. High-score leads are converting
  at the same rate as low-score leads."

  You've been asked to build a new predictive model using actual
  conversion data. Here's your dataset from the last 12 months:

  Total leads: 3,600
  Converted to customer: 360 (10% overall conversion)

  Analysis of the 360 wins vs 3,240 losses:

  Firmographic factors:
  - Company size 50-200 emp: 18% conversion (vs 7% for other sizes)
  - Company size 200-1000: 14% conversion
  - Company size under 50: 4% conversion
  - Company size over 1000: 8% conversion
  - Technology industry: 15% conversion
  - Financial services: 12% conversion
  - All other industries: 6% conversion
  - US/Canada: 11% conversion
  - International: 7% conversion

  Title/role factors:
  - VP/Director Engineering: 22% conversion
  - Engineering Manager: 16% conversion
  - DevOps/Platform Engineer: 12% conversion
  - Individual Developer: 3% conversion
  - Non-technical title: 2% conversion

  Behavioral factors:
  - Requested demo: 35% conversion
  - Started free trial: 20% conversion
  - Visited pricing page 2+ times: 25% conversion
  - Downloaded technical whitepaper: 14% conversion
  - Attended webinar only: 8% conversion
  - Read blog only: 3% conversion
  - Used personal email: 2% conversion
  - Company email: 12% conversion

  Engagement recency:
  - Last activity within 7 days: 18% conversion
  - Last activity 8-30 days ago: 9% conversion
  - Last activity 31-60 days ago: 4% conversion
  - Last activity 60+ days ago: 1% conversion

  Combination effects:
  - VP/Dir Engineering + demo request: 48% conversion
  - VP/Dir Engineering + trial started: 32% conversion
  - Individual developer + blog only: 1% conversion
  - 50-200 emp tech company + pricing page: 30% conversion

  Tasks:
  1. Design the new predictive scoring model. For each attribute, assign
     a point value proportional to its conversion lift above the 10%
     baseline. Explain your methodology — how did you translate conversion
     rates into point values? How did you handle combination effects?
     Show the complete scoring rubric.

  2. Validate the model by scoring these 4 test leads and comparing to
     what the old model would have scored:
     - Old model: All ebook downloads = 15 pts, All webinars = 20 pts,
       any company email = 10 pts, any VP title = 15 pts

     Lead A: VP Engineering, 150-person tech company, US, requested demo,
     company email, last activity 3 days ago
     Lead B: Individual developer, 5,000-person bank, EMEA, attended
     webinar, downloaded 3 ebooks, company email, last activity 45 days
     Lead C: Engineering Manager, 300-person SaaS, US, started trial,
     visited pricing 3 times, company email, last activity today
     Lead D: Marketing manager, 100-person retail, US, downloaded 2
     ebooks, attended webinar, company email, last activity 2 days ago

     For each: calculate old score and new score. Show where the models
     agree and disagree. Which model better predicts actual conversion?

  3. Design the model maintenance plan — how to keep the model accurate
     over time. Include: how often to retrain (and what triggers early
     retraining), what metrics to monitor for model drift, how to A/B
     test model changes, and the feedback loop from sales outcomes back
     to the model.

assertions:
  - type: llm_judge
    criteria: "Scoring model is data-driven — point values are proportional to conversion rates, combination effects are handled (VP + demo gets bonus), methodology is explained and replicable"
    weight: 0.35
    description: "Data-driven scoring model"
  - type: llm_judge
    criteria: "Validation reveals improvement — Lead A should score much higher in new model (48% combination), Lead B should drop (individual dev, old activity), correctly identifies where old model over/under-scored"
    weight: 0.35
    description: "Improvement-revealing validation"
  - type: llm_judge
    criteria: "Maintenance plan is practical — retraining cadence, drift monitoring metrics, A/B testing approach, and sales feedback loop that would keep the model accurate"
    weight: 0.30
    description: "Practical maintenance plan"
