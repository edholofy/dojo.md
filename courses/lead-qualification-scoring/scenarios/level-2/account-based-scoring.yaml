meta:
  id: account-based-scoring
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Build account-based scoring — move beyond individual lead scoring to score entire accounts based on collective engagement across the buying committee"
  tags: [sales, leads, scoring, ABM, account-based, buying-committee, intermediate]

state: {}

trigger: |
  You're a Marketing Operations Manager at "CloudGov" — a B2B SaaS
  compliance and governance platform ($5K-50K/month) selling to mid-market
  and enterprise companies. Your sales team has been complaining that
  individual lead scores don't capture the full picture for complex deals.

  Example of the problem:
  - Account: "RegTech Financial" (500 employees, financial services)
  - Lead 1: Compliance Officer, score 45 (attended webinar, read blog)
  - Lead 2: CTO, score 30 (visited features page once)
  - Lead 3: VP of Risk, score 55 (downloaded whitepaper, pricing page)
  - Lead 4: Legal Counsel, score 20 (opened 2 emails)

  Individually, no lead meets the MQL threshold of 65. But collectively,
  this account has 4 people from the buying committee engaging with
  your content — that's a strong buying signal the lead-based model
  completely misses.

  Your deal data shows:
  - Closed deals average 3.8 contacts engaging before purchase
  - Deals with 4+ contacts engaging close at 35% (vs 8% for 1 contact)
  - Deals where the economic buyer engaged close at 42%
  - Average buying committee: CISO/CTO (budget), Compliance Officer
    (user), VP Risk (influencer), Legal (reviewer), IT (implementer)
  - Time from first multi-stakeholder engagement to close: 45 days avg

  Current model gaps:
  - No way to see account-level engagement
  - No buying committee role mapping
  - No collective engagement threshold
  - SDRs only see individual leads, miss the account pattern
  - Enterprise AEs find out about multiple contacts too late

  Target accounts list: 200 named accounts (ABM Tier 1: 50, Tier 2: 150)

  Tasks:
  1. Design the account-based scoring model. Include: how individual
     lead scores roll up to an account score, bonus points for buying
     committee breadth (multiple roles engaging), bonus points for
     buying committee depth (senior roles engaging), the account
     engagement velocity metric (is engagement accelerating or
     decelerating?), and how to handle anonymous website visitors that
     can be matched to target accounts via IP or reverse lookup.

  2. Apply the model to these 3 accounts and calculate their account
     scores:

     Account A — "FinanceMax" (Tier 1 target):
     - CFO: Opened 2 emails (last: 3 days ago)
     - CISO: Downloaded security whitepaper, visited pricing (today)
     - Compliance Director: Attended webinar, read 2 case studies
     - IT Manager: Visited integrations page
     - Anonymous visitor from FinanceMax IP: Viewed demo video

     Account B — "HealthCorp" (Tier 2 target):
     - Office Admin: Downloaded ebook (30 days ago)
     - No other contacts identified

     Account C — "TechStartup" (Not on target list):
     - CTO: Requested demo (yesterday)
     - VP Engineering: Visited pricing, features, and security pages
     - Developer: Started free trial, active daily for 5 days

  3. Design the account-based alerting system — what triggers should
     notify sales that an account is "heating up." Include: the
     threshold triggers (score-based), the velocity triggers (engagement
     acceleration), the buying committee triggers (new role appears),
     and the competitive triggers (comparison page or competitor
     content engagement). For each trigger, specify the alert recipient,
     urgency, and recommended action.

assertions:
  - type: llm_judge
    criteria: "Account scoring model captures collective signals — individual rollup, buying committee breadth bonus, seniority bonus, velocity tracking, and anonymous visitor handling create a meaningful account-level view"
    weight: 0.35
    description: "Collective-signal account scoring"
  - type: llm_judge
    criteria: "Account scores differentiate correctly — Account A scores highest (5 contacts, senior roles, multiple engagement types), Account C scores well (strong signals but not target account), Account B scores lowest (single junior contact, old engagement)"
    weight: 0.35
    description: "Correctly differentiated account scores"
  - type: llm_judge
    criteria: "Alert system captures buying signals — threshold, velocity, committee composition, and competitive triggers with appropriate urgency levels and actions"
    weight: 0.30
    description: "Signal-capturing alert system"
