meta:
  id: intermediate-qualification-shift
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Handle a qualification crisis — manage a quarter where lead quality has dropped, sales is rejecting MQLs, and you need to diagnose and fix the scoring system under pressure"
  tags: [sales, leads, qualification, scoring, crisis, diagnosis, intermediate]

state: {}

trigger: |
  It's the start of Q3 at "ScaleAPI" — a B2B SaaS API management
  platform ($1K-15K/month). The VP of Sales just escalated to the CRO:
  "Marketing is sending us garbage leads. My team's Q2 numbers were
  terrible because they wasted time on unqualified MQLs." The CMO fired
  back: "We delivered 120% of our MQL target. Sales just isn't following
  up fast enough."

  You're the RevOps Director and the CRO wants you to sort this out.

  Q2 data:
  - MQLs delivered: 600 (120% of target)
  - MQLs accepted by sales: 240 (40% — down from 65% in Q1)
  - MQLs rejected by sales: 360 (60%)
  - SQLs created: 108 (18% of MQLs — down from 28% in Q1)
  - Pipeline created: $1.8M (target was $3M)
  - Closed revenue from MQLs: $420K (target was $900K)

  Top reasons sales rejected MQLs (from CRM disposition data):
  - "No real buying intent — just downloaded content": 35%
  - "Wrong persona — not a decision maker": 22%
  - "Company too small / not ICP": 18%
  - "Already a customer / duplicate": 12%
  - "Competitor or consultant": 8%
  - "International — we only sell in NA": 5%

  What changed between Q1 and Q2:
  - Marketing launched a viral blog post series that generated 2,000
    new leads (mostly top-of-funnel researchers)
  - Marketing lowered the MQL threshold from 65 to 45 points to hit
    their MQL volume target (they weren't told MQL acceptance rate was
    the real metric)
  - Two webinars were co-hosted with industry associations, attracting
    a broader (less qualified) audience
  - The free trial launched in Q2, generating trial signups that were
    auto-scored as MQLs regardless of fit
  - 3 senior SDRs left in Q2, replaced by 3 new hires with less
    qualification experience

  You have 2 weeks before the Q3 pipeline review. The CRO wants:
  1. A root cause analysis
  2. An immediate fix
  3. A long-term solution

  Tasks:
  1. Write the "Q2 Lead Quality Root Cause Analysis" — the executive
     summary for the CRO. Include: the data analysis (what the numbers
     actually show), the 5 root causes ranked by impact (using the
     rejection data and what changed), and why this is NOT just a
     "marketing vs sales" problem but a systemic issue.

  2. Design the "Immediate Fix" (deployable this week) — changes that
     will improve Q3 lead quality within days. Include: the scoring
     model adjustments (what to change now), the MQL threshold reset
     (where to set it and why), the trial-to-MQL routing fix (how to
     handle free trial leads properly), and the SDR re-training plan
     (what the 3 new hires need to learn this week).

  3. Design the "Marketing-Sales Alignment Framework" — the long-term
     solution that prevents this from happening again. Include: shared
     definitions (MQL, SQL, SAL agreed by both teams), shared metrics
     (what both teams are measured on), the feedback loop (how sales
     rejection data improves scoring), the governance model (who owns
     the scoring model, review cadence), and the escalation process
     (how to handle disagreements before they reach the CRO).

assertions:
  - type: llm_judge
    criteria: "Root cause analysis is balanced — identifies marketing's threshold reduction, viral content quality dilution, trial auto-scoring, SDR turnover, and webinar audience mismatch as contributing factors without blaming one team"
    weight: 0.35
    description: "Balanced root cause analysis"
  - type: llm_judge
    criteria: "Immediate fixes are deployable — threshold reset to original or higher with data justification, trial leads get separate qualification path, quick SDR training plan, all achievable within days"
    weight: 0.35
    description: "Deployable immediate fixes"
  - type: llm_judge
    criteria: "Alignment framework prevents recurrence — shared definitions, shared metrics (not just MQL volume), feedback loops, governance model, and escalation process that create structural alignment"
    weight: 0.30
    description: "Recurrence-preventing alignment framework"
