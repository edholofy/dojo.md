meta:
  id: lead-nurture-sequences
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Design lead nurturing sequences — build automated email sequences that warm unqualified leads and move them toward sales-readiness"
  tags: [sales, leads, nurture, email, sequences, automation, intermediate]

state: {}

trigger: |
  You're the Email Marketing Manager at "DataPipe" — a B2B SaaS data
  integration platform ($300-3,000/month). Your SDR team disqualifies
  about 60% of inbound MQLs as "not ready" — they have interest but
  lack budget, timeline, or authority. Currently, these leads go into
  a generic monthly newsletter and are essentially forgotten.

  The data:
  - Monthly inbound MQLs: 400
  - SDR-qualified (passed to AE): 160 (40%)
  - Disqualified as "not ready": 240 (60%)
  - Of those 240, how many eventually buy: ~15 per month (6.25%)
  - Average time from "not ready" to purchase: 4.5 months
  - These 15 "delayed converters" receive zero targeted nurturing today

  SDR disqualification reasons (from CRM data):
  - "No budget right now" — 35% of disqualified
  - "Wrong person, no authority" — 25% of disqualified
  - "No timeline / just researching" — 20% of disqualified
  - "Need is unclear" — 15% of disqualified
  - "Too small / bad fit" — 5% of disqualified (true disqualification)

  Your email marketing platform data:
  - Newsletter open rate: 12% (low — generic content)
  - Newsletter click rate: 1.5%
  - Unsubscribe rate: 0.8% per send
  - Best-performing email topics: ROI calculators (28% open), customer
    case studies (22% open), product comparison guides (25% open)
  - Worst-performing: Product updates (8% open), company news (6% open)

  Tools available: HubSpot (email automation, lead scoring, workflows)

  Tasks:
  1. Design 3 targeted nurture sequences based on the disqualification
     reason — one for "no budget," one for "no authority," and one for
     "no timeline." Each sequence should be 5-7 emails over 30-45 days.
     For each email: subject line, content theme, CTA, and the scoring
     event it triggers (what points are added if they engage).

  2. Design the re-qualification trigger system — how nurture leads
     re-enter the sales pipeline. Include: the score threshold that
     triggers SDR re-engagement, the specific behavioral signals that
     indicate readiness (beyond just score), the handoff process (what
     information the SDR receives about the lead's nurture journey),
     and the SLA for re-qualified leads.

  3. Build the nurture performance framework — how to measure if your
     nurture sequences are working. Include: the 6 key metrics to track
     (with benchmarks), the A/B testing plan (what to test first and
     why), the sequence optimization cadence (how often to review and
     update), and the ROI calculation (value of recovered leads vs
     cost of nurture program).

assertions:
  - type: llm_judge
    criteria: "Nurture sequences are reason-specific — 'no budget' gets ROI content and budget justification tools, 'no authority' gets champion-enablement content, 'no timeline' gets urgency-building content with different CTAs per reason"
    weight: 0.40
    description: "Reason-specific nurture sequences"
  - type: llm_judge
    criteria: "Re-qualification triggers are multi-signal — not just score threshold but behavioral signals indicating readiness (pricing page revisit, demo request, content upgrade), with complete handoff information"
    weight: 0.30
    description: "Multi-signal re-qualification triggers"
  - type: llm_judge
    criteria: "Performance framework is measurable — 6 metrics with benchmarks, practical A/B testing plan, optimization cadence, and ROI math showing the value of recovering the 15 monthly delayed converters"
    weight: 0.30
    description: "Measurable performance framework"
