meta:
  id: pql-scoring
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Design product-qualified lead scoring — build a PQL model for a product-led growth company where product usage signals indicate buying intent"
  tags: [sales, leads, scoring, PQL, product-led-growth, PLG, intermediate]

state: {}

trigger: |
  You're the Growth Operations Manager at "DesignHub" — a B2B SaaS
  collaborative design tool with a freemium model ($0 free / $15 per
  user/month Pro / $30 per user/month Business). You have 50,000 free
  accounts and 3,000 paying customers. Your product-led growth model
  means most customers self-serve, but your sales team (8 AEs) handles
  accounts with 10+ potential seats ($150+/month) for the Pro tier.

  The problem: Your sales team is spending equal time on all free trial
  accounts that hit 10+ users. But conversion rates vary wildly:
  - Accounts that convert to paid: 12% of 10+ user free accounts
  - Average time on free before converting: 18 days
  - Sales team capacity: Can work 40 accounts/month
  - 10+ user free accounts per month: 200
  - They can only work 20% of eligible accounts

  Product usage data you have access to:
  - Daily active users (DAU) on the account
  - Features used (design canvas, commenting, prototyping, version
    history, team libraries, handoff mode)
  - Files created per week
  - Collaborators invited (growth signal)
  - Time spent in product per user per day
  - Exports/downloads (output creation)
  - Integrations connected (Slack, Jira, Figma import)
  - Admin actions (team settings, permission changes)

  Analysis of free accounts that converted to paid vs didn't:

  Strong PQL signals (features that correlate with conversion):
  - 5+ DAU on account: 28% conversion (vs 4% for under 5 DAU)
  - Team libraries feature used: 35% conversion (vs 6% without)
  - 3+ integrations connected: 32% conversion (vs 7% without)
  - Admin changed team settings: 40% conversion (vs 5% without)
  - 10+ files created per week: 25% conversion (vs 8% without)
  - Invited 3+ new users in past 7 days: 30% conversion

  Weak/negative signals:
  - Only 1 active user despite 10 invited: 2% conversion
  - No files created in 7+ days: 1% conversion
  - Only used basic canvas (no advanced features): 5% conversion
  - Visited pricing page but didn't convert self-serve: mixed signal
    (18% conversion — higher than average but indicates price friction)

  Tasks:
  1. Design the PQL scoring model for DesignHub. Combine product usage
     signals with firmographic data to score free accounts. Include:
     the specific product signals and their point values, the
     firmographic qualifiers (which accounts are worth sales attention
     even at the free tier), the engagement velocity metric (is product
     usage growing or declining?), and the PQL threshold that identifies
     the top 40 accounts per month for your sales team.

  2. Create the "PQL Dashboard" specification — what the sales team
     sees when they view a PQL account. Include: the account health
     summary (key metrics at a glance), the product usage timeline
     (visual of engagement over time), the feature adoption checklist
     (which features they have/haven't discovered), the growth signals
     (invites, file creation, collaboration patterns), and the
     recommended talk track (how to open a sales conversation based
     on their specific product usage).

  3. Design 3 different outreach templates based on PQL signals:
     a) The "power user" — account with high DAU, advanced features,
        and growing team (likely ready for Pro/Business)
     b) The "growing team" — account adding users rapidly but using
        basic features (need education + upgrade path)
     c) The "stuck admin" — account admin changed settings and visited
        pricing but didn't convert (price friction or needs sales help)
     Each outreach should reference their specific product usage.

assertions:
  - type: llm_judge
    criteria: "PQL model uses product data effectively — point values reflect conversion correlations, combines product signals with firmographics, velocity tracking included, threshold correctly filters to ~40 accounts"
    weight: 0.35
    description: "Effective product-data PQL model"
  - type: llm_judge
    criteria: "Dashboard specification is sales-ready — account health, usage timeline, feature adoption, growth signals, and recommended talk track give AEs everything needed for an informed outreach"
    weight: 0.30
    description: "Sales-ready dashboard specification"
  - type: llm_judge
    criteria: "Outreach templates are personalized to product usage — each references specific features and behaviors, not generic sales pitches; messaging differs meaningfully based on the PQL signal type"
    weight: 0.35
    description: "Usage-personalized outreach templates"
