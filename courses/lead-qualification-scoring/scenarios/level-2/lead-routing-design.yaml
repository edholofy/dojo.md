meta:
  id: lead-routing-design
  level: 2
  course: lead-qualification-scoring
  type: output
  description: "Design lead routing rules — build the assignment logic that matches the right leads to the right sales reps at the right time"
  tags: [sales, leads, routing, assignment, operations, intermediate]

state: {}

trigger: |
  You're a Sales Operations Manager at "FlowCRM" — a B2B SaaS CRM
  platform ($200-5,000/month). You have 25 SDRs and 15 AEs. Currently,
  leads are routed round-robin to SDRs, and then SDRs manually decide
  which AE gets the qualified lead. This creates problems:

  Current issues:
  - Enterprise leads ($100K+ potential) are going to junior SDRs who
    can't handle C-suite conversations
  - West Coast leads are being called at 6am by East Coast SDRs
  - Leads from existing customer accounts go to random SDRs instead of
    the assigned Account Manager
  - When SDRs are at capacity (50+ open leads), new leads sit unworked
    for 3+ days — average speed-to-lead is 47 hours
  - SDRs cherry-pick the best leads and ignore the rest
  - AEs complain about uneven lead distribution — top performer gets
    50% more leads than bottom performer

  Team structure:
  SDRs (25 total):
  - 5 Senior SDRs (handle enterprise, 2+ years experience)
  - 12 Mid-level SDRs (handle mid-market)
  - 8 Junior SDRs (handle SMB, under 6 months)

  AEs (15 total):
  - 4 Enterprise AEs (deals $100K+, vertical specialists: Financial
    Services, Healthcare, Technology, Manufacturing)
  - 6 Mid-market AEs (deals $25K-100K, geographic territories)
  - 5 SMB AEs (deals under $25K, pooled territory)

  Existing customer accounts: 800 (each assigned to 1 of 8 AMs)

  Lead volume: 600 inbound leads/month
  Breakdown: 10% enterprise signals, 35% mid-market, 40% SMB, 15%
  unclassifiable at inbound

  Tasks:
  1. Design the lead routing rules — a complete decision tree for how
     incoming leads get routed. Include: the first-pass classification
     (how to segment incoming leads into enterprise/mid-market/SMB),
     the SDR assignment rules (which SDR gets which lead and why), the
     AE assignment rules (after SDR qualification, how leads get to AEs),
     the existing-customer bypass (how to route leads from existing
     accounts directly to their AM), and the capacity management rules
     (what happens when an SDR is at capacity).

  2. Design the speed-to-lead optimization — how to get response time
     from 47 hours to under 5 minutes for hot leads. Include: the tier
     system (which leads need 5-minute response vs. 24-hour response),
     the alert mechanism (how SDRs get notified of hot leads), the
     backup rules (what happens if the assigned SDR doesn't respond in
     time), and the weekend/after-hours handling.

  3. Create the routing performance dashboard — the 8 metrics you'd
     track to ensure routing is working. For each metric: definition,
     target, how it's measured, and what to do if it's off-target.
     Include metrics for speed, fairness, conversion, and capacity.

assertions:
  - type: llm_judge
    criteria: "Routing rules are comprehensive — covers segmentation logic, SDR tier matching, AE territory/vertical matching, existing customer bypass, capacity overflow, and unclassifiable leads"
    weight: 0.35
    description: "Comprehensive routing rules"
  - type: llm_judge
    criteria: "Speed optimization is practical — tiered response times, alert mechanisms, backup escalation, and after-hours handling that could actually reduce from 47 hours to under 5 minutes for hot leads"
    weight: 0.35
    description: "Practical speed optimization"
  - type: llm_judge
    criteria: "Dashboard metrics are balanced — covers speed (response time), fairness (distribution variance), conversion (by routing path), and capacity (utilization) with targets and remediation"
    weight: 0.30
    description: "Balanced routing dashboard"
