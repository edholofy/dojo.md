meta:
  id: pipeline-predictability
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Build pipeline predictability — design the forecasting system that uses lead scoring, conversion rates, and velocity data to predict pipeline with ±10% accuracy"
  tags: [sales, leads, scoring, pipeline, forecasting, predictability, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "ForecastPro" ($250M ARR, public
  company). Your CEO told the board that pipeline generation would be
  $80M this quarter. At the mid-quarter review, you're tracking to $62M —
  a 22% miss. The stock dropped 8% on the earnings warning.

  The board wants to know: "How can we be 22% off on pipeline generation
  when we have a scoring system and SDR team?"

  Root cause analysis:
  1. Lead volume dropped 15% due to SEO algorithm change (unexpected)
  2. MQL-to-SQL conversion dropped from 24% to 18% (new SDR hires
     performing below average)
  3. Deal cycle lengthened by 12 days (macro headwinds)
  4. The forecast model assumed all metrics would remain constant
  5. No early warning system flagged these changes until week 6 of 13

  Historical data:
  - Q1: Forecast $75M, Actual $72M (4% miss)
  - Q2: Forecast $78M, Actual $74M (5% miss)
  - Q3: Forecast $80M, Tracking $62M (22% miss — current quarter)

  Your current forecasting approach:
  Pipeline forecast = (Lead volume × MQL rate × SQL rate × ACV × close
  rate) — a simple funnel math calculation using trailing 3-month averages
  for each variable. No confidence intervals, no scenario modeling, no
  leading indicators beyond volume.

  Available data for a better model:
  - 5 years of monthly lead, MQL, SQL, and close data
  - Google Search Console data (search volume trends)
  - Advertising spend and CPL by channel
  - SDR productivity metrics (calls, emails, meetings, conversion)
  - Deal stage progression data (velocity by stage)
  - Macro economic indicators (PMI, tech spending indices)
  - Competitor activity (pricing changes, new product launches)
  - Customer health scores (predict expansion pipeline)
  - Seasonal patterns (Q4 strong, Q1 weak historically)

  Tasks:
  1. Design the "Pipeline Prediction Engine" — the forecasting system
     that achieves ±10% accuracy. Include: the multi-variable model
     (which inputs beyond simple funnel math), the confidence intervals
     (how to express forecast range, not just a point estimate), the
     scenario modeling (bull/base/bear cases with probabilities), the
     leading indicators (which metrics predict pipeline 4-8 weeks before
     it materializes), and the machine learning approach (how to use 5
     years of historical data to train a predictive model).

  2. Design the "Early Warning System" — how to detect pipeline risk
     before it's too late. Include: the weekly monitoring cadence (which
     metrics to check and in what order), the trigger thresholds (what
     deviation from plan triggers an alert), the diagnostic framework
     (when an alert fires, how to quickly diagnose root cause), the
     response playbook (what actions to take for each type of pipeline
     risk), and the escalation matrix (who gets notified at each
     severity level).

  3. Write the "Board Pipeline Reporting Package" — how to communicate
     pipeline health to the board going forward. Include: the quarterly
     pipeline review deck (what the board sees), the confidence-range
     approach (presenting ranges not point estimates), the risk register
     (known threats to pipeline), and the variance analysis format (how
     to explain misses without making excuses).

assertions:
  - type: llm_judge
    criteria: "Prediction engine goes beyond funnel math — uses multiple variables, confidence intervals, scenario modeling, leading indicators, and ML on historical data to achieve better accuracy"
    weight: 0.35
    description: "Multi-variable prediction engine"
  - type: llm_judge
    criteria: "Early warning system detects problems early — weekly metrics, specific trigger thresholds, diagnostic framework, response playbooks, and escalation matrix that would have caught the Q3 miss in week 2-3"
    weight: 0.35
    description: "Early-detecting warning system"
  - type: llm_judge
    criteria: "Board reporting is investor-grade — confidence ranges, risk register, variance analysis, presented in a format that builds credibility with a public company board"
    weight: 0.30
    description: "Investor-grade board reporting"
