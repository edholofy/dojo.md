meta:
  id: global-qualification-ops
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Scale qualification operations globally — build the operating model, technology, and governance for a lead qualification function spanning 30+ countries"
  tags: [sales, leads, qualification, global, operations, scale, expert]

state: {}

trigger: |
  You're the Global VP of Pipeline Generation at "WorldSaaS" ($600M ARR,
  public company). You oversee lead qualification across 4 regions, 35
  countries, and 12 languages. Your mandate: standardize qualification
  while respecting regional differences, and deliver a unified pipeline
  number to the Street every quarter.

  Current state by region:
  North America (55% of pipeline):
  - 40 SDRs, 2 SDR managers
  - HubSpot scoring, Salesforce CRM
  - MQL-to-SQL: 26% (strong)
  - Speed to lead: 8 minutes
  - Operating well — the benchmark for other regions

  EMEA (25% of pipeline):
  - 20 SDRs across 5 countries (UK, Germany, France, Netherlands, Nordics)
  - Marketo scoring, Salesforce CRM
  - MQL-to-SQL: 14% (struggling)
  - Speed to lead: 6 hours (language routing delays)
  - Issues: GDPR limits scoring, language fragmentation, different sales
    cultures, scoring model not localized

  APAC (15% of pipeline):
  - 12 SDRs across 4 countries (Australia, Singapore, Japan, India)
  - Basic Salesforce scoring (no marketing automation)
  - MQL-to-SQL: 10% (underperforming)
  - Speed to lead: 18 hours (time zone + capacity)
  - Issues: No marketing automation, manual scoring, Japan requires
    completely different qualification approach (relationship-first)

  LATAM (5% of pipeline):
  - 5 SDRs (Brazil + Mexico)
  - No scoring model — all leads go to SDRs unscored
  - MQL-to-SQL: 8% (lowest)
  - Speed to lead: 36 hours
  - Issues: No technology investment, WhatsApp as primary channel,
    pricing sensitivity requires different qualification criteria

  Board expectation: Unified global pipeline report with regional
  breakdowns, consistent MQL/SQL definitions, and qualification efficiency
  improving 30% within 12 months.

  Budget: $2M for global qualification standardization

  Tasks:
  1. Design the "Global Qualification Architecture" — the standardized
     framework. Include: the global scoring model (what's standardized
     vs locally adapted), the technology standardization plan (one
     marketing automation platform or federated approach), the data
     architecture (how scoring data flows across regions into unified
     reporting), the language and cultural adaptations (how scoring works
     in 12 languages), and the GDPR/privacy compliance by region.

  2. Design the "Regional Operating Models" — how each region runs
     qualification differently within the global framework. For each
     region: the team structure, the qualification process, the
     technology requirements, the localization needs, and the 12-month
     improvement plan with specific metric targets.

  3. Create the "Global Pipeline Governance" — how to govern the
     qualification function at global scale. Include: the global vs
     regional decision rights (who decides what), the quarterly review
     cadence (global review + regional deep dives), the performance
     benchmarking (how regions are compared fairly), the investment
     allocation (how the $2M is distributed), and the escalation process.

assertions:
  - type: llm_judge
    criteria: "Global architecture balances standardization and localization — unified scoring framework with regional adaptations, technology strategy, multi-language support, and privacy compliance per region"
    weight: 0.35
    description: "Standardized-yet-localized global architecture"
  - type: llm_judge
    criteria: "Regional models are tailored — each region gets specific team structure, process, technology, and improvement plans that reflect their unique challenges (GDPR in EMEA, relationship culture in APAC, WhatsApp in LATAM)"
    weight: 0.35
    description: "Tailored regional operating models"
  - type: llm_judge
    criteria: "Governance enables global accountability — decision rights, review cadence, fair benchmarking, budget allocation, and escalation that deliver the unified pipeline number the board expects"
    weight: 0.30
    description: "Accountability-enabling global governance"
