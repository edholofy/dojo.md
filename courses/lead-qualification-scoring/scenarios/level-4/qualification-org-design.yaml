meta:
  id: qualification-org-design
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Design the lead qualification organization — architect the team structure, roles, and operating model for a world-class qualification function"
  tags: [sales, leads, qualification, organization, design, structure, expert]

state: {}

trigger: |
  You're the CRO of "OrgDesign SaaS" ($300M ARR) which is reorganizing
  its entire go-to-market team. The CEO wants you to build a "best-in-
  class lead qualification function" that becomes a competitive advantage.
  Currently, qualification is scattered across 3 teams with no clear
  ownership.

  Current state:
  - SDR team (35 people): Reports to VP of Sales, focused on meeting
    quotas (quantity over quality)
  - Marketing Ops team (8 people): Reports to CMO, manages scoring model
    but has no feedback from sales
  - RevOps team (5 people): Reports to CFO, manages Salesforce and
    reporting but doesn't own the scoring model or process
  - No one owns the full lead lifecycle from capture to qualification

  Performance data:
  - MQL-to-SQL: 16% (below 25% benchmark)
  - SDR turnover: 45% annually (industry is 35%)
  - Time to productivity for new SDRs: 4.5 months
  - SDR-to-AE promotion rate: 18% (most leave before promotion)
  - Average SDR tenure: 11 months
  - SDR satisfaction (eNPS): 12 (low)
  - Marketing-Sales alignment score: 35/100 (poor)

  Budget for the new organization: $6M annually (current total is $4.5M)
  Headcount authority: 60 total (current: 48)

  Best-in-class benchmarks (from a RevOps benchmarking study):
  - Top companies have a unified "Pipeline Generation" function
  - Pipeline Gen reports to CRO (not VP Sales or CMO)
  - Includes SDRs, scoring operations, demand gen, and pipeline analytics
  - Top companies have SDR-to-AE promotion rate of 35%+
  - Top companies SDR turnover: under 25%
  - Top companies MQL-to-SQL: 28%+

  Tasks:
  1. Design the "Pipeline Generation Organization" — the new org
     structure. Include: the organizational chart (who reports to whom),
     the role definitions (every role with responsibilities, KPIs, and
     compensation structure), the career paths (SDR → AE, SDR → SDR
     Manager, Marketing Ops → RevOps, etc.), the cross-functional
     relationships (how this org works with Marketing, Sales, and
     Product), and the governance model (who owns scoring, routing,
     qualification criteria, and process changes).

  2. Design the "Operating Model" — how the organization runs day-to-
     day. Include: the weekly operating rhythm (meetings, reviews,
     cadences), the SDR playbooks (standardized processes for inbound
     and outbound qualification), the scoring model governance (who
     updates the model, how changes are approved, how sales provides
     feedback), the performance management system (weekly scorecards,
     coaching cadence, promotion criteria), and the technology stack
     ownership (who owns which tools and integrations).

  3. Design the "Talent Strategy" — how to attract, develop, and retain
     top qualification talent. Include: the hiring profile for SDRs
     (what to look for), the onboarding program (reduce ramp from 4.5
     to 2 months), the development program (skills progression), the
     retention strategy (reduce turnover from 45% to under 25%), and
     the employer brand (how to position the SDR role as a prestigious
     career launcher, not a dead-end job).

assertions:
  - type: llm_judge
    criteria: "Org structure is unified and well-designed — unified Pipeline Generation function under CRO, clear roles with KPIs, career paths that improve promotion rates, and governance that prevents the current scattered ownership"
    weight: 0.35
    description: "Unified well-designed org structure"
  - type: llm_judge
    criteria: "Operating model is executable — weekly rhythm, standardized playbooks, scoring governance with sales feedback, performance management, and technology ownership that can run day-to-day"
    weight: 0.35
    description: "Executable operating model"
  - type: llm_judge
    criteria: "Talent strategy addresses the retention crisis — hiring profile, faster onboarding, development program, retention strategy, and employer brand that reduce 45% turnover and improve SDR satisfaction"
    weight: 0.30
    description: "Retention-addressing talent strategy"
