meta:
  id: qualification-compensation
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Design qualification-aligned compensation — build incentive structures that reward lead quality, not just quantity, across SDRs, AEs, and marketing"
  tags: [sales, leads, qualification, compensation, incentives, alignment, expert]

state: {}

trigger: |
  You're the VP of Sales Strategy at "IncentiveSaaS" ($220M ARR). The
  CEO identified a fundamental misalignment: "Everyone in our pipeline
  generation chain is incentivized to push volume, not quality. SDRs get
  paid per meeting regardless of quality. Marketing gets bonused on MQL
  volume. AEs blame bad leads for missed quota. Nobody owns lead quality."

  Current compensation structures:

  SDRs (35 people):
  - Base: $55K
  - Variable: $25K (100% based on meetings booked)
  - SPIFs: Occasional $500 for booking most meetings in a week
  - Problem: SDRs book meetings with unqualified leads to hit quota.
    45% of meetings don't progress past first AE call.

  Marketing team (demand gen, 8 people):
  - Base: $95K average
  - Bonus: 15% based on MQL volume target
  - Problem: Marketing lowered MQL threshold to hit volume target.
    MQL-to-SQL dropped from 28% to 16% over 18 months.

  AEs (25 people):
  - Base: $90K
  - Variable: $110K (100% based on closed revenue)
  - Problem: AEs cherry-pick leads and blame SDRs for "bad leads"
    rather than working the full pipeline. 30% of SQLs never get an
    AE follow-up.

  RevOps (5 people):
  - Base: $105K average
  - Bonus: 10% based on "operational efficiency" (vague metric)
  - Problem: No incentive to improve scoring model accuracy.

  The result of this misalignment:
  - $105M in pipeline generated, but $35M never gets worked by AEs
  - 45% of SDR meetings are wasted (no progression)
  - MQL-to-closed conversion: 3.2% (benchmark: 6-8%)
  - SDR turnover: 50% (they burn out booking bad meetings)
  - AE satisfaction with lead quality: 2.8/5

  Budget for compensation redesign: Revenue-neutral (same total comp
  spend, redistributed for better alignment)

  Tasks:
  1. Design the "Quality-Aligned Compensation Framework" for each role.
     For SDRs: redesign variable comp to reward quality (SQL conversion,
     pipeline value) not just meeting volume. For Marketing: redesign
     bonus to include quality metrics alongside volume. For AEs: add
     accountability for working all SQLs, not just cherry-picked ones.
     For RevOps: tie bonus to scoring accuracy and pipeline efficiency.
     For each role: the new comp structure, the metrics, the rationale,
     and the expected behavioral change.

  2. Design the "Shared Pipeline Metrics" — the metrics that all teams
     are held accountable for together. Include: the 3-5 shared KPIs
     (that appear on everyone's scorecard), the weighting (how much of
     each role's variable comp is tied to shared metrics), the reporting
     cadence (how often teams see shared performance), and the conflict
     resolution process (what happens when one team's actions hurt
     another team's shared metrics).

  3. Write the "Compensation Transition Plan" — how to roll out new
     comp plans without causing mass attrition. Include: the communication
     strategy (how to frame the change), the transition period (how long
     to run old and new plans in parallel), the protection mechanisms
     (guaranteed minimum comp during transition), and the success
     criteria (how to know the new plans are working).

assertions:
  - type: llm_judge
    criteria: "Compensation framework aligns incentives with quality — SDRs rewarded for SQL conversion not just meetings, marketing bonused on quality not just volume, AEs accountable for working all leads, RevOps tied to accuracy"
    weight: 0.40
    description: "Quality-aligned compensation framework"
  - type: llm_judge
    criteria: "Shared metrics create cross-functional accountability — 3-5 KPIs that all teams share, appropriate weighting, regular reporting, and conflict resolution that prevents finger-pointing"
    weight: 0.30
    description: "Cross-functional shared metrics"
  - type: llm_judge
    criteria: "Transition plan prevents attrition — communication framing, parallel period, guaranteed minimums, and success criteria that manage change without losing key people"
    weight: 0.30
    description: "Attrition-preventing transition plan"
