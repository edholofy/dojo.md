meta:
  id: scoring-economics
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Model the economics of lead qualification — build the financial model that proves the ROI of scoring investments and optimizes the qualification cost structure"
  tags: [sales, leads, scoring, economics, ROI, financial-model, unit-economics, expert]

state: {}

trigger: |
  You're the CFO of "EconSaaS" ($200M ARR, Series D). The CRO wants
  $3M to overhaul the lead qualification system (AI scoring, intent data,
  enrichment, new SDR hires). You've asked for a rigorous financial model
  before approving the investment. "Show me the math."

  Current unit economics:
  - Lead acquisition cost: $85 per inbound lead (blended across channels)
  - MQL cost: $425 per MQL (20% of leads become MQLs)
  - SQL cost: $2,125 per SQL (20% of MQLs become SQLs)
  - Opportunity cost: $5,312 per opportunity (40% of SQLs become opps)
  - Customer acquisition cost (CAC): $21,250 (25% close rate)
  - Average ACV: $35,000
  - LTV: $122,500 (3.5 year average lifetime × $35K)
  - LTV:CAC ratio: 5.8:1 (healthy but could be better)
  - Payback period: 7.3 months
  - SDR team cost: $4.2M/year (35 SDRs × $120K loaded cost)
  - Pipeline generated: $105M/year
  - Cost of pipeline: 4% of pipeline value

  Proposed investment ($3M):
  - AI scoring platform: $800K (build + first year)
  - Intent data (Bombora + G2): $200K/year
  - Data enrichment (Clearbit): $150K/year
  - 8 additional SDRs: $960K/year loaded cost
  - Technology integration: $400K one-time
  - Training and change management: $150K
  - Contingency: $340K

  Projected improvements (CRO's claims):
  - MQL-to-SQL improvement: 20% → 30% (from better scoring)
  - SQL-to-opportunity improvement: 40% → 50% (from intent data)
  - Speed to lead improvement: 14 hours → 15 minutes (from routing)
  - Lead volume capacity increase: 30% (from 8 additional SDRs)
  - Close rate improvement: 25% → 28% (from better-qualified pipeline)

  Tasks:
  1. Build the "Lead Qualification Financial Model" — the complete unit
     economics model. Include: the current-state economics (fully loaded
     cost per lead, MQL, SQL, opportunity, and customer), the projected
     economics under the $3M investment (new costs and improved conversion
     rates flowing through the funnel), the sensitivity analysis (what
     if improvements are 50%, 75%, or 100% of CRO's projections?), the
     break-even analysis (when does the investment pay for itself?), and
     the 3-year NPV calculation.

  2. Design the "Scoring Investment Optimization Model" — if you only
     had $1.5M instead of $3M, which components deliver the most ROI?
     Rank each investment component by: expected impact on conversion
     rates, implementation risk, time to value, and ROI. Recommend the
     minimum viable investment and the full investment, with the marginal
     ROI of each additional component.

  3. Create the "Ongoing Cost Structure" — the annual cost of running
     the optimized qualification function. Include: the technology costs
     (annual licenses, infrastructure), the people costs (SDRs, RevOps,
     data science), the data costs (enrichment, intent, third-party),
     the total cost as a percentage of pipeline generated, and the
     comparison to industry benchmarks (what best-in-class companies
     spend on pipeline generation as a % of revenue).

assertions:
  - type: llm_judge
    criteria: "Financial model is rigorous — current-state unit economics, projected improvements flowing through the funnel, sensitivity analysis at 50%/75%/100%, break-even timeline, and 3-year NPV that a CFO would trust"
    weight: 0.40
    description: "Rigorous financial model"
  - type: llm_judge
    criteria: "Investment optimization ranks components correctly — AI scoring and intent data likely highest ROI per dollar, ranked by impact/risk/time-to-value with minimum viable and full recommendations"
    weight: 0.30
    description: "Correctly ranked investment optimization"
  - type: llm_judge
    criteria: "Cost structure is complete and benchmarked — all ongoing costs categorized, total as % of pipeline, compared to industry benchmarks, showing the efficiency argument"
    weight: 0.30
    description: "Complete benchmarked cost structure"
