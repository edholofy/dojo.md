meta:
  id: qualification-product-alignment
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Align product and qualification — design the feedback loop between product development and lead qualification that improves both product-market fit and pipeline quality"
  tags: [sales, leads, qualification, product, alignment, PLG, feedback-loop, expert]

state: {}

trigger: |
  You're the Chief Product Officer at "ProductQual" ($180M ARR) with a
  hybrid GTM: product-led growth (40% of new revenue) and sales-led (60%).
  The VP of Sales says: "Product keeps shipping features that don't help
  us qualify or close deals." The VP of Product says: "Sales keeps asking
  for demo features instead of features that drive product adoption."

  The disconnect:
  - Product team measures: DAU, feature adoption, NPS, trial-to-paid
  - Sales team measures: MQLs, SQLs, pipeline, close rate
  - Nobody measures: Product signals that predict sales qualification

  Your data reveals untapped opportunity:
  - Free trial users who use Feature X (workflow builder) convert to
    paid at 32% vs 8% for those who don't — but SDRs don't know who
    used Feature X
  - Users who connect 3+ integrations in trial convert at 28% — but
    the scoring model gives no extra points for integration usage
  - Users who invite team members in the first 48 hours convert at 35%
    — but there's no real-time alert to sales when this happens
  - Enterprise prospects who attend a product webinar AND start a trial
    close at 42% — but marketing and product events aren't linked in
    the scoring model
  - The product roadmap has 0 features planned for "expansion triggers"
    or "qualification signal generation"

  Product telemetry available:
  - 50M events/day from 30,000 free trial accounts and 8,000 customers
  - Feature usage data by user and account
  - Session data (time in product, pages/features visited)
  - Integration connection data
  - Team collaboration metrics (invites, shared workspaces, comments)
  - Onboarding completion metrics
  - Support ticket data linked to product usage

  Tasks:
  1. Design the "Product-Qualification Feedback Loop" — the system that
     connects product usage data to lead scoring in real-time. Include:
     the product signals that should inform qualification (which events,
     at what thresholds), the real-time data pipeline (how product
     telemetry feeds the scoring model within 5 minutes of the event),
     the PQL scoring model updates (how to incorporate product signals
     alongside marketing and intent signals), and the sales alerting
     (which product events trigger immediate SDR action).

  2. Design the "Product Roadmap for Qualification" — features the
     product team should build specifically to improve lead qualification
     and sales efficiency. Include: the "aha moment" acceleration
     features (product changes that get trial users to the conversion-
     correlated features faster), the "expansion trigger" features
     (product capabilities that naturally create upsell qualification
     signals), the "qualification signal" features (product telemetry
     improvements that give scoring more data), and the prioritization
     framework (how to balance these features against core product
     development).

  3. Create the "Product-Sales Operating Model" — how product and sales
     teams collaborate ongoing. Include: the shared metrics dashboard
     (what both teams see), the monthly product-sales review (agenda,
     data reviewed, decisions made), the feature request process (how
     sales requests become product priorities), the win/loss feedback
     to product (how deal outcomes influence product decisions), and
     the joint OKRs (objectives both teams share).

assertions:
  - type: llm_judge
    criteria: "Feedback loop connects product data to scoring — specific product signals identified, real-time pipeline designed, PQL model updated with product events, and sales alerted within minutes of key behaviors"
    weight: 0.35
    description: "Product-to-scoring feedback loop"
  - type: llm_judge
    criteria: "Product roadmap includes qualification features — aha moment acceleration, expansion triggers, signal generation features, with prioritization framework that balances against core product work"
    weight: 0.35
    description: "Qualification-informed product roadmap"
  - type: llm_judge
    criteria: "Operating model creates ongoing collaboration — shared dashboards, monthly reviews, feature request process, win/loss feedback, and joint OKRs that align product and sales continuously"
    weight: 0.30
    description: "Collaborative product-sales operating model"
