meta:
  id: ai-scoring-platform
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Build an AI-powered lead scoring platform — architect and deploy a machine learning-based scoring system that continuously learns from conversion outcomes"
  tags: [sales, leads, scoring, AI, machine-learning, predictive, platform, expert]

state: {}

trigger: |
  You're the Head of Data Science for Revenue at "MLSaaS" — a B2B SaaS
  company ($350M ARR, 15,000 customers). The CRO has given you a $1.5M
  budget and 12 months to build an in-house AI-powered lead scoring
  platform that replaces the rule-based model and third-party tools.

  Why build vs buy:
  - Current vendor (Madkudu) costs $200K/year but treats the model as
    a black box — sales doesn't trust scores they can't explain
  - Your unique data (15,000 customers, 5 years of conversion data,
    product usage telemetry) gives you a major advantage over generic
    models
  - Custom model can incorporate your specific ICP, product signals,
    and industry nuances

  Data assets available:
  - Salesforce: 2M contacts, 500K accounts, 50K opportunities (5 years)
  - Product telemetry: 100M events/day across 15,000 customers
  - Marketing automation: 10M email events, 5M web visits per year
  - Gong: 200K call recordings, conversation intelligence data
  - Intent data: Bombora (2 years of topic surge data)
  - Enrichment: Clearbit data on all contacts
  - Win/loss: 800 structured win/loss interviews

  Target capabilities:
  - Real-time lead scoring (under 3 seconds from event to score)
  - Explainable scores (tell the SDR WHY a lead scored high)
  - Multi-model ensemble (separate models for each segment/product)
  - Self-improving (model retrains automatically as outcomes flow in)
  - Anomaly detection (flags unusual scoring patterns)
  - What-if simulation (predict impact of changing scoring thresholds)

  Technical constraints:
  - Must integrate with Salesforce (scores visible to reps)
  - Must respect GDPR (EU data stays in EU processing)
  - Must have human-in-the-loop override capability
  - Must pass SOX audit (auditable scoring decisions)
  - Latency: Under 3 seconds for real-time, batch ok for daily enrichment
  - Uptime: 99.9% (scoring is mission-critical)

  Team: 3 data scientists, 2 ML engineers, 1 data engineer (to hire)

  Tasks:
  1. Design the "AI Scoring Platform Architecture." Include: the data
     pipeline (how data flows from sources to models), the feature
     engineering layer (what features are extracted and how), the model
     architecture (which ML approaches for which scoring tasks — gradient
     boosting, neural networks, etc.), the real-time scoring engine (how
     to achieve sub-3-second scoring), the explainability module (how to
     generate human-readable score explanations), and the feedback loop
     (how outcomes retrain models automatically).

  2. Design the "Model Development and Validation Plan." Include: the
     training data preparation (how to create labeled datasets from 5
     years of Salesforce data), the model selection process (which
     algorithms to test and how to evaluate), the validation methodology
     (cross-validation, holdout sets, backtesting), the bias detection
     (ensuring the model doesn't discriminate by company size, industry,
     or geography), the A/B testing plan (how to compare AI model to
     the current rule-based model), and the go-live criteria (what
     performance threshold justifies switching to the AI model).

  3. Design the "Trust and Adoption Strategy" — how to get sales to
     trust and use AI-generated scores. Include: the explainability
     UX (what reps see in Salesforce), the calibration communication
     (how to show scores are accurate), the feedback mechanism (how
     reps can flag bad scores), the escalation path (when human judgment
     overrides the model), and the training program (how to teach 100
     reps to work with AI scores).

assertions:
  - type: llm_judge
    criteria: "Platform architecture is technically sound — data pipeline, feature engineering, model architecture, real-time engine, explainability, and feedback loop are designed for the specific data assets and constraints"
    weight: 0.35
    description: "Technically sound platform architecture"
  - type: llm_judge
    criteria: "Model development plan is rigorous — proper training data preparation, model selection, validation methodology, bias detection, A/B testing, and go-live criteria for a production ML system"
    weight: 0.35
    description: "Rigorous model development plan"
  - type: llm_judge
    criteria: "Trust strategy addresses the core adoption challenge — explainability, calibration, feedback, human override, and training that move sales from 'black box' distrust to informed usage"
    weight: 0.30
    description: "Adoption-focused trust strategy"
