meta:
  id: qualification-ma-integration
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Integrate lead qualification across an M&A — harmonize two companies' lead scoring systems, SDR teams, and qualification processes after an acquisition"
  tags: [sales, leads, qualification, scoring, M&A, acquisition, integration, expert]

state: {}

trigger: |
  You're the Chief Revenue Officer of "AcquireCo" ($400M ARR) which just
  acquired "TargetCo" ($80M ARR) for $600M. Your mandate: integrate the
  two companies' go-to-market operations within 6 months, with special
  focus on lead management — the combined company must have a unified
  pipeline generation engine by month 6.

  AcquireCo (parent):
  - 3,000 leads/month inbound
  - MQL-to-SQL: 22%
  - 45 SDRs, 30 AEs
  - HubSpot + Salesforce stack
  - Predictive scoring model (AI-based, Madkudu)
  - ICP: Mid-market technology companies, 100-2,000 employees
  - Average deal size: $48K ACV
  - Products: Data analytics platform (3 products)

  TargetCo (acquired):
  - 800 leads/month inbound
  - MQL-to-SQL: 28%
  - 12 SDRs, 10 AEs
  - Marketo + HubSpot CRM (yes, HubSpot CRM, not Salesforce)
  - Rule-based scoring model (Marketo native)
  - ICP: Enterprise healthcare and financial services, 500+ employees
  - Average deal size: $120K ACV
  - Products: Compliance automation platform (1 product)

  Integration challenges:
  - Different CRMs (Salesforce vs HubSpot CRM)
  - Different marketing automation (HubSpot Marketing vs Marketo)
  - Different scoring models (AI vs rule-based)
  - Different ICPs (mid-market tech vs enterprise regulated industries)
  - Different sales processes (PLG-assisted vs enterprise outbound)
  - 15,000 customer overlap (TargetCo customers that also could buy
    AcquireCo products and vice versa)
  - Brand: TargetCo brand has strong equity in healthcare/finserv

  CEO expectations:
  - Cross-sell $30M in Year 1 from the customer overlap
  - Unified pipeline reporting by month 4
  - Unified scoring model by month 6
  - Zero lead leakage during transition (no leads lost in migration)
  - SDR team integration without attrition of top performers

  Tasks:
  1. Design the "Lead Management Integration Roadmap" — the 6-month
     plan. Month 1: Assessment and parallel operation. Month 2-3:
     Data migration and unification. Month 4-5: Model and process
     integration. Month 6: Optimization and cross-sell launch. For
     each phase: specific deliverables, risks, decision points, and
     success criteria. Address the CRM migration, scoring model
     unification, and SDR team integration.

  2. Design the "Cross-sell Lead Scoring Model" — how to identify and
     score the 15,000 overlapping customers for cross-sell opportunities.
     Include: the cross-sell signal detection (how to identify AcquireCo
     customers who need TargetCo's compliance product), the scoring
     methodology (how to score existing customers for cross-sell
     differently from new prospects), the routing logic (which team
     handles cross-sell — AcquireCo AMs or TargetCo AEs?), and the
     prioritization framework (how to rank the 15,000 for outreach).

  3. Write the "Integration Communication Plan" — how to communicate
     changes to both teams without causing attrition or confusion.
     Include: the SDR team messaging (how to frame integration for both
     teams), the change management for TargetCo (their scoring model,
     CRM, and processes are all changing), the customer communication
     (how to handle leads from customers who are confused about the
     acquisition), and the executive alignment (weekly integration
     meeting agenda, escalation process, decision rights).

assertions:
  - type: llm_judge
    criteria: "Integration roadmap handles technical and human complexity — CRM migration, scoring unification, SDR integration across 6 months with zero lead leakage and top performer retention"
    weight: 0.35
    description: "Technically and humanly complex integration"
  - type: llm_judge
    criteria: "Cross-sell model identifies the $30M opportunity — signal detection, customer-specific scoring, routing logic, and prioritization of 15,000 overlapping accounts for Year 1 cross-sell"
    weight: 0.35
    description: "Opportunity-identifying cross-sell model"
  - type: llm_judge
    criteria: "Communication plan manages change — SDR messaging for both teams, TargetCo change management, customer clarity, and executive alignment that prevent attrition and confusion"
    weight: 0.30
    description: "Change-managing communication plan"
