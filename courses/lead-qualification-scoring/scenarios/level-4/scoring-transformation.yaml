meta:
  id: scoring-transformation
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Lead a scoring system transformation — redesign the entire lead qualification and scoring infrastructure for a $500M company preparing for IPO"
  tags: [sales, leads, scoring, transformation, IPO, enterprise, expert]

state: {}

trigger: |
  You're the newly hired VP of Revenue Operations at "ScaleSaaS" ($500M
  ARR, targeting IPO in 18 months). The CEO told you in your first week:
  "Our lead management is our biggest hidden liability. We're burning $8M
  per year on SDR costs with a 12% MQL-to-SQL rate. Our competitors are
  at 28%. Fix this before IPO — investors will ask about sales efficiency."

  Current state:
  - 4,000 inbound leads/month across 3 product lines
  - 60 SDRs + 40 AEs across 4 regions (NA, EMEA, APAC, LATAM)
  - MQL-to-SQL: 12% (target: 25%+)
  - SQL-to-close: 18% (target: 25%+)
  - Speed to lead: 14 hours average (target: under 15 minutes)
  - SDR cost per SQL: $4,200 (target: under $2,000)
  - Pipeline predictability: ±35% variance (target: ±10%)
  - Lead scoring: 3 separate models, none updated in 18 months

  Technical debt:
  - Salesforce is the CRM but data quality is 35% complete
  - HubSpot for marketing automation (Product A only)
  - Pardot for Products B and C (different instance)
  - No enrichment, no intent data, no predictive scoring
  - Manual lead routing via Salesforce rules (500+ rules, many broken)
  - No unified reporting — each product has different definitions

  IPO-readiness requirements:
  - Auditable pipeline metrics (SOX-ready reporting)
  - Predictable pipeline generation (±10% forecasting accuracy)
  - Efficient unit economics (CAC payback under 18 months)
  - Scalable systems (can handle 2x volume without 2x headcount)

  Budget: $2M over 18 months for the transformation
  Your team: 8 RevOps professionals (need to hire 4 more)

  Tasks:
  1. Write the "Lead Qualification Transformation Business Case" — the
     executive presentation for the board. Include: the current-state
     diagnosis (with specific numbers), the target-state vision, the
     competitive gap analysis, the financial impact ($8M SDR cost at 12%
     vs target), the investment ask ($2M + 4 hires), and the IPO
     readiness implications.

  2. Design the "18-Month Transformation Roadmap." Phase 1 (months 1-6):
     Foundation — data quality, unified scoring model, basic enrichment.
     Phase 2 (months 7-12): Acceleration — predictive scoring, intent
     data, automated routing, real-time scoring. Phase 3 (months 13-18):
     IPO-ready — SOX-compliant reporting, pipeline predictability,
     efficiency targets met. For each phase: specific deliverables,
     technology decisions, headcount plan, budget allocation, expected
     metric improvements, and risks.

  3. Design the "IPO-Ready Pipeline Reporting Package" — the dashboards
     and reports that investors and auditors will scrutinize. Include:
     the pipeline generation report (how leads become pipeline), the
     conversion funnel by segment and region, the efficiency metrics
     (CAC, payback, LTV:CAC), the forecasting accuracy report, and the
     data quality scorecard.

assertions:
  - type: llm_judge
    criteria: "Business case is board-ready — current-state with specific numbers, target-state with benchmarks, financial impact quantified, investment justified, and IPO readiness implications clearly articulated"
    weight: 0.35
    description: "Board-ready business case"
  - type: llm_judge
    criteria: "Roadmap is phased and realistic — foundation before acceleration before IPO-readiness, with specific deliverables, technology decisions, and metric improvement targets per phase within $2M budget"
    weight: 0.35
    description: "Phased realistic transformation roadmap"
  - type: llm_judge
    criteria: "Reporting package is IPO-ready — pipeline generation, conversion funnel, efficiency metrics, forecasting accuracy, and data quality scorecard at the level investors and auditors would expect"
    weight: 0.30
    description: "IPO-ready reporting package"
