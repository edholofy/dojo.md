meta:
  id: expert-qualification-shift
  level: 4
  course: lead-qualification-scoring
  type: output
  description: "Navigate an executive qualification crisis — manage a quarter where pipeline is collapsing, the board is demanding answers, and the entire qualification function needs to be rebuilt under pressure"
  tags: [sales, leads, qualification, scoring, executive, crisis, board, expert]

state: {}

trigger: |
  You're the CRO of "CrisisCloud" ($280M ARR, Series E, IPO planned in
  12 months). It's the start of Q4 — your most important quarter. Three
  simultaneous crises are threatening to derail the IPO timeline:

  CRISIS 1 — Pipeline Collapse:
  Q4 pipeline entering the quarter: $42M (need $70M to hit annual target).
  The pipeline gap is $28M. Analysis shows:
  - Lead volume dropped 25% due to a Google algorithm update that
    crushed organic traffic (your #1 channel, 40% of leads)
  - MQL-to-SQL dropped from 22% to 14% because your AI scoring vendor
    (Madkudu) had a model degradation issue they didn't disclose for
    6 weeks
  - 8 of your top 12 SDRs were poached by a competitor in September
    (they offered 30% higher comp)
  - Q3 pipeline that was supposed to close in Q4 has $12M in stalled
    deals (buyer hesitancy from macro concerns)

  CRISIS 2 — Board Pressure:
  Your lead investor called the CEO: "If you miss Q4 by more than 10%,
  we're pushing the IPO to 2028 and bringing in a new CRO." The board
  meeting is in 3 weeks. They want:
  - An honest assessment of Q4 pipeline
  - A recovery plan with specific numbers
  - Confidence that the qualification function can scale for IPO

  CRISIS 3 — Competitive Threat:
  Your biggest competitor just launched a free version of their product
  targeted at your ICP. Early data shows:
  - 15% of your trial signups are now comparing with the competitor's
    free tier
  - Competitive mentions in sales calls increased 40% in 2 weeks
  - 3 enterprise deals ($500K+ total) are "paused" while evaluating
    the competitor

  Available resources:
  - Emergency budget: $500K (CEO approved for Q4 recovery)
  - Remaining SDR team: 22 SDRs (down from 30)
  - AE team: 20 AEs (fully staffed, but demoralized)
  - Marketing team: Intact but scrambling to replace organic traffic
  - Product team: Can accelerate one feature in Q4

  Tasks:
  1. Write the "Q4 Recovery War Plan" — the specific, week-by-week plan
     to close the $28M pipeline gap. Include: the immediate SDR recovery
     (how to maintain qualification capacity with 8 fewer people), the
     alternative pipeline sources (what channels can generate $28M in
     pipeline in 13 weeks), the scoring model fix (how to fix the
     Madkudu degradation and improve MQL-to-SQL back to 22%+), the
     stalled deal recovery (how to unstick the $12M in stalled deals),
     and the competitive response (how to handle the free competitor).

  2. Write the "Board Presentation" — 10 slides for the board meeting
     in 3 weeks. Include: the honest Q4 assessment (pipeline gap,
     root causes), the recovery plan summary (with probability-weighted
     outcomes), the qualification function maturity assessment (where
     you are vs. IPO-ready), the investment ask (what the $500K buys),
     and the 12-month plan to IPO-ready qualification.

  3. Write the "Post-Crisis Qualification Resilience Plan" — how to
     prevent all 3 crises from recurring. Include: the channel
     diversification strategy (reducing organic dependency), the vendor
     risk management (no single-vendor scoring dependency), the talent
     retention plan (preventing SDR poaching), and the competitive
     intelligence integration (early warning for competitive threats).

assertions:
  - type: llm_judge
    criteria: "Recovery plan is specific and credible — week-by-week actions, alternative pipeline sources with realistic volume estimates, scoring fix, deal recovery tactics, and competitive response that a CRO would present"
    weight: 0.35
    description: "Specific credible recovery plan"
  - type: llm_judge
    criteria: "Board presentation is honest and confidence-building — acknowledges the gap, presents probability-weighted outcomes (not just best case), shows maturity assessment, and articulates path to IPO readiness"
    weight: 0.35
    description: "Honest confidence-building board deck"
  - type: llm_judge
    criteria: "Resilience plan prevents recurrence — channel diversification, vendor risk management, talent retention, and competitive intelligence that address the root causes of all 3 crises"
    weight: 0.30
    description: "Recurrence-preventing resilience plan"
