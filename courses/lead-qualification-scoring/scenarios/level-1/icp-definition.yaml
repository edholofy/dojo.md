meta:
  id: icp-definition
  level: 1
  course: lead-qualification-scoring
  type: output
  description: "Define your Ideal Customer Profile — learn to identify the characteristics of your best-fit customers and use them to qualify incoming leads"
  tags: [sales, leads, qualification, ICP, ideal-customer-profile, beginner]

state: {}

trigger: |
  You're a sales operations analyst at "SecureVault" — a B2B SaaS
  cybersecurity platform for small and mid-market businesses ($500-5,000/
  month). The CEO says the company is "trying to sell to everyone" and
  wants you to define the Ideal Customer Profile (ICP) to focus efforts.

  You have access to the following customer data from the last 2 years:

  Top 20 customers (by LTV and satisfaction):
  - Average company size: 75-300 employees
  - Industries: Financial services (7), Healthcare (5), Legal (4),
    Accounting (3), Insurance (1)
  - All have compliance requirements (SOC 2, HIPAA, PCI, or similar)
  - Average deal size: $2,800/month
  - Average sales cycle: 28 days
  - NPS: 72 average
  - Annual churn: 3%
  - Common trigger: Recent security audit failure or compliance deadline

  Bottom 20 customers (by LTV and satisfaction):
  - Average company size: Under 25 or over 2,000 employees
  - Industries: Retail (6), Hospitality (5), Education (4), Non-profit (3),
    Manufacturing (2)
  - Most have no compliance requirements
  - Average deal size: $600/month
  - Average sales cycle: 65 days
  - NPS: 28 average
  - Annual churn: 22%
  - Common issues: "Too complex," "Too expensive for what we need"

  Churned customers (last 12 months, 45 total):
  - 60% were under 25 employees (too small for the product)
  - 20% were over 2,000 employees (needed enterprise features you don't
    have)
  - 15% had no compliance requirement (didn't see enough value)
  - 5% were a good fit but lost to a competitor

  Current pipeline (150 leads):
  - 40% match top-20 profile
  - 35% match bottom-20 profile
  - 25% are ambiguous

  Tasks:
  1. Define the ICP for SecureVault. Include: company size range,
     industries (tier 1 and tier 2), compliance requirements, budget
     range, buying triggers, and any disqualifying attributes. Explain
     how you derived each criterion from the data.

  2. Create an "ICP Fit Score" rubric — a simple checklist that an SDR
     can use in under 2 minutes to assess whether a new lead matches
     the ICP. Include scoring (e.g., strong fit, moderate fit, poor fit)
     with clear definitions for each category.

  3. Apply the ICP Fit Score to these 3 new leads and recommend an action:
     - Lead X: Law firm, 120 employees, preparing for SOC 2 audit,
       $3,000/month budget, demo requested by Managing Partner
     - Lead Y: Restaurant chain, 15 employees per location (8 locations),
       no compliance requirements, $200/month budget, found you on Google
     - Lead Z: Healthcare clinic network, 180 employees, HIPAA compliance
       required, $1,500/month budget, referred by existing customer

assertions:
  - type: llm_judge
    criteria: "ICP is data-driven — correctly identifies 75-300 employee regulated industries as sweet spot, with compliance requirements as a must-have, derived from top-20 vs bottom-20 comparison"
    weight: 0.35
    description: "Data-driven ICP definition"
  - type: llm_judge
    criteria: "Fit score rubric is practical — simple enough for 2-minute assessment, includes clear criteria and categories (strong/moderate/poor fit) that an SDR can actually use"
    weight: 0.30
    description: "Practical fit score rubric"
  - type: llm_judge
    criteria: "Lead assessments are correct — Lead X is strong fit (law firm, compliance, right size, budget), Lead Y is poor fit (no compliance, tiny budget, wrong industry), Lead Z is strong fit (healthcare, HIPAA, right size)"
    weight: 0.35
    description: "Correct lead assessments"
