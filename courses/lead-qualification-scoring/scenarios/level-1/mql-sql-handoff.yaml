meta:
  id: mql-sql-handoff
  level: 1
  course: lead-qualification-scoring
  type: output
  description: "Execute the MQL-to-SQL handoff — learn the process of passing qualified leads from marketing to sales with complete context"
  tags: [sales, leads, qualification, MQL, SQL, handoff, process, beginner]

state: {}

trigger: |
  You're a marketing operations coordinator at "TeamSync" — a B2B SaaS
  collaboration platform ($100-1,000/month). There's a growing tension
  between marketing and sales:

  Marketing says: "We sent sales 200 MQLs last month. They only followed
  up on 80 of them. That's 120 leads that died because sales was too slow."

  Sales says: "Half the 'MQLs' you send us aren't qualified. I waste 30
  minutes on each one before I realize they're not real buyers. That's
  why I don't rush to call them all."

  Current MQL criteria (what marketing uses):
  - Downloaded any gated content = MQL
  - Attended any webinar = MQL
  - Score > 30 points = MQL

  The result: 200 MQLs/month but only 15% become SQLs (30 leads).
  Industry benchmark for a healthy MQL-to-SQL rate: 25-35%.

  Your VP of Revenue has asked you to fix the handoff process. Here's
  the additional data you have:

  Of the 200 MQLs last month:
  - 30 became SQLs (15%) — these had average score of 72, all had
    pricing page visits, 80% had demo requests
  - 90 were rejected by sales (45%) — most common reason: "no buying
    intent, just wanted content"
  - 80 were never contacted (40%) — average response time for MQLs
    that were contacted: 3.2 days

  Benchmark data:
  - Best-in-class MQL-to-SQL rate: 35%
  - Best-in-class speed-to-lead: under 5 minutes
  - Companies with SLA between marketing and sales have 2x better
    conversion rates

  Tasks:
  1. Redesign the MQL criteria. Define 3 tiers of leads that marketing
     passes to sales:
     - "Hot Lead" (immediate follow-up needed — what criteria?)
     - "Warm Lead" (follow up within 24 hours — what criteria?)
     - "Nurture" (not ready for sales — what criteria?)
     Use the data above to justify each tier's criteria.

  2. Write the "Marketing-Sales SLA" — a one-page agreement that defines:
     - What marketing commits to (lead quality, information provided,
       volume targets)
     - What sales commits to (response time by tier, follow-up cadence,
       feedback on lead quality)
     - How disputes are resolved (what happens when sales says a lead
       is "junk"?)
     - How success is measured (shared metrics both teams own)

  3. Create the "Lead Handoff Template" — the standard information
     package that accompanies every MQL sent to sales. Include all the
     fields an AE needs to prepare for their first outreach. Then fill
     in the template for this sample lead:

     Jenny Park, Head of Product at DesignCo (150 employees, US):
     - Visited pricing page 3 times over 2 weeks
     - Downloaded "Collaboration Platform Buyer's Guide"
     - Attended webinar "Remote Team Productivity"
     - Score: 68 points
     - Source: Google search "team collaboration software comparison"
     - Industry: Design/Creative services

assertions:
  - type: llm_judge
    criteria: "MQL tiers are data-driven — Hot Lead criteria include demo request + pricing page visit (matching the 80% pattern from SQLs), not just content downloads which drove the 45% rejection rate"
    weight: 0.35
    description: "Data-driven MQL tiers"
  - type: llm_judge
    criteria: "SLA is balanced and specific — includes concrete commitments from both sides (not vague), response time requirements, feedback mechanisms, and shared metrics that align incentives"
    weight: 0.35
    description: "Balanced specific SLA"
  - type: llm_judge
    criteria: "Handoff template is comprehensive — includes all context an AE needs (demographics, behaviors, score, source, recommended talking points) and the sample is properly filled out"
    weight: 0.30
    description: "Comprehensive handoff template"
