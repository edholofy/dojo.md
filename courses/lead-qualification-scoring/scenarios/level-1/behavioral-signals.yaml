meta:
  id: behavioral-signals
  level: 1
  course: lead-qualification-scoring
  type: output
  description: "Read behavioral buying signals — learn to interpret website activity, email engagement, and content consumption patterns as indicators of purchase intent"
  tags: [sales, leads, qualification, behavioral, signals, intent, beginner]

state: {}

trigger: |
  You're a demand generation specialist at "MarketFlow" — a B2B SaaS
  marketing automation platform ($300-3,000/month). Your marketing
  automation tool tracks every prospect interaction. Your job is to
  interpret behavioral signals to identify which leads are showing
  buying intent vs. just browsing.

  Here are the engagement histories for 6 leads over the past 30 days.
  All are from companies in your target market (50-500 employees, B2B).

  Lead 1 — Amy Zhang, Marketing Director at TechVentures:
  Week 1: Visited blog post "10 Marketing Automation Tips" (2 min read)
  Week 2: Downloaded ebook "Marketing Automation Buyer's Guide"
  Week 2: Visited features page (4 minutes), pricing page (6 minutes)
  Week 3: Attended live webinar "Switching from HubSpot: A Guide"
  Week 3: Visited case study page (read 3 case studies)
  Week 4: Visited pricing page again, viewed ROI calculator
  Week 4: Opened 5 of 5 nurture emails, clicked 3

  Lead 2 — Bob Miller, Content Writer at MediaCo:
  Week 1: Downloaded ebook "Content Marketing Statistics 2026"
  Week 1: Read blog post "How to Write Better Subject Lines"
  Week 2: Read blog post "Email Marketing Best Practices"
  Week 3: Downloaded template "Editorial Calendar Template"
  Week 4: Read blog post "Content Repurposing Guide"
  No pricing page visits. No feature page visits. 0 of 4 nurture emails
  opened.

  Lead 3 — Carla Ruiz, VP Marketing at ScaleUp:
  Week 1: Nothing
  Week 2: Nothing
  Week 3: Visited homepage, features page, pricing page, integrations
    page — all in one 20-minute session
  Week 3: Downloaded comparison guide "MarketFlow vs Competitors"
  Week 4: Submitted demo request form

  Lead 4 — Dan Lee, Marketing Intern at BigBank:
  Week 1: Visited pricing page
  Week 1: Started free trial
  Week 2: Logged into trial 1 time, spent 3 minutes
  Week 3: No activity
  Week 4: No activity, trial expired

  Lead 5 — Eva Nowak, CMO at RetailBright:
  Week 1: Visited homepage from Google ad click
  Week 2: Opened nurture email, clicked to case study
  Week 3: Forwarded your pricing page to 2 colleagues (tracked via
    email sharing feature)
  Week 3: Her colleague (CTO) visited the integrations and security pages
  Week 4: Eva visited the "Enterprise" page and submitted a contact form
    asking about "annual pricing for 50+ users"

  Lead 6 — Frank Torres, Freelance Consultant:
  Week 1-4: Visited your blog 12 times, read 15 different articles
  Downloaded 4 ebooks and 2 templates
  Attended 2 webinars
  Never visited pricing, features, or product pages
  Uses personal email (frankT@gmail.com)

  Tasks:
  1. For each of the 6 leads, analyze their behavioral signals. Classify
     each behavior as "awareness" (learning about the topic), "consideration"
     (evaluating solutions), or "decision" (ready to buy). Then assign
     an overall intent level: High, Medium, or Low.

  2. Identify the 3 most important behavioral buying signals from the
     data above. For each signal, explain: what makes it a strong buying
     indicator, how you would weight it in a scoring model (high, medium,
     low points), and what action an SDR should take when this signal
     fires.

  3. Design a simple "behavioral alert" system — define 3 trigger
     conditions that should immediately notify an SDR that a lead is
     showing high buying intent. For each trigger, specify the exact
     behavior pattern, why it matters, and the recommended response
     time and action.

assertions:
  - type: llm_judge
    criteria: "Behavioral analysis is accurate — Amy and Eva are high intent (pricing visits, competitor comparison, colleague involvement), Bob and Frank are low intent (content consumption only, no product interest), Carla is high (compressed research + demo request), Dan is low (abandoned trial)"
    weight: 0.40
    description: "Accurate behavioral analysis"
  - type: llm_judge
    criteria: "Buying signals correctly identified — pricing page visits, demo requests, competitor comparison downloads, colleague forwarding/multi-stakeholder engagement as top signals"
    weight: 0.30
    description: "Correctly identified buying signals"
  - type: llm_judge
    criteria: "Alert triggers are practical — specific behavior patterns (not vague), with response times and SDR actions that are actionable"
    weight: 0.30
    description: "Practical alert triggers"
