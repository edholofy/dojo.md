meta:
  id: lead-disqualification
  level: 1
  course: lead-qualification-scoring
  type: output
  description: "Learn when and how to disqualify leads — understand that saying 'no' to bad-fit leads is just as important as saying 'yes' to good ones"
  tags: [sales, leads, qualification, disqualification, efficiency, beginner]

state: {}

trigger: |
  You're an SDR at "PayFlow" — a B2B SaaS payment processing platform
  for mid-market e-commerce companies ($500-5,000/month). You're
  struggling with your numbers: you're making 60 calls a day but only
  converting 2% of leads to meetings. The team average is 8%.

  Your manager pulled your data and found the problem: "You're spending
  too much time on leads that will never buy. You need to learn to
  disqualify faster."

  Here's your data from last month:
  - Total leads worked: 240
  - Meetings booked: 5 (2.1%)
  - Average time per lead before disqualifying: 45 minutes
  - Team average time per lead before disqualifying: 12 minutes
  - Leads that should have been disqualified immediately: 140 (58%)

  Common characteristics of your wasted leads:
  - 35% were companies under 10 employees (your product starts at $500/mo)
  - 20% were in industries you don't serve (physical retail, restaurants)
  - 15% were students or job seekers researching the space
  - 12% were competitors doing research
  - 10% were international (you only serve US and Canada currently)
  - 8% had no e-commerce business

  Your qualification criteria:
  Must-have: B2B or B2C e-commerce, US/Canada, 50+ employees, $1M+ in
  online revenue, using a payment processor (not cash-only)
  Disqualify: Physical-only retail, international, under 10 employees,
  students/researchers, competitors, no online sales

  Here are 8 leads you received this morning. You have 15 minutes total
  to triage all 8.

  1. jane@university.edu — "Researching payment trends for my thesis"
  2. alex@competitor.io — VP of Product at your direct competitor
  3. sarah@shopbig.com — Director of Payments, 200 employees, US e-comm
  4. omar@restaurant-chain.com — 45 locations, no online ordering
  5. wei@startup.co — "Just launched, 3 employees, need payment setup"
  6. maria@fashionretail.com — E-commerce, 80 employees, $5M online rev
  7. raj@enterprise.co.uk — CTO, 500 employees, UK-based
  8. kim@growthshop.com — Marketing Manager, 60 employees, US, e-commerce

  Tasks:
  1. Triage all 8 leads in under 2 minutes each. For each lead: qualify,
     disqualify, or flag for more information. State the specific
     criterion that drove your decision. Keep your analysis brief — this
     exercise is about speed.

  2. Write polite but clear disqualification email templates for the 3
     most common disqualification scenarios at PayFlow (too small, wrong
     industry, wrong geography). Each email should be 3-4 sentences,
     professional, and include an alternative resource or referral
     where possible.

  3. Create a "2-Minute Triage Checklist" — a step-by-step process an
     SDR can follow to decide within 2 minutes whether a lead is worth
     pursuing. Include the exact order of checks, what data to look at,
     and decision rules for each check.

assertions:
  - type: llm_judge
    criteria: "Triage is fast and accurate — correctly disqualifies jane (student), alex (competitor), omar (no e-commerce), wei (too small), raj (UK); qualifies sarah and maria; flags kim for more info (Marketing Manager may not have authority)"
    weight: 0.40
    description: "Fast accurate triage"
  - type: llm_judge
    criteria: "Disqualification emails are professional — polite but clear, 3-4 sentences each, not apologetic or overly wordy, includes alternative resource or referral where possible"
    weight: 0.30
    description: "Professional disqualification emails"
  - type: llm_judge
    criteria: "Triage checklist is efficient — ordered from quickest checks first (email domain, company size, geography) to slower checks (industry, need), with clear pass/fail criteria at each step"
    weight: 0.30
    description: "Efficient triage checklist"
