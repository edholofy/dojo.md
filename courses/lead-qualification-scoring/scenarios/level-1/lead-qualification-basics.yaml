meta:
  id: lead-qualification-basics
  level: 1
  course: lead-qualification-scoring
  type: output
  description: "Learn the fundamentals of lead qualification — understand what makes a lead qualified, the difference between MQLs and SQLs, and how to assess basic lead quality"
  tags: [sales, leads, qualification, MQL, SQL, basics, beginner]

state: {}

trigger: |
  You're a new SDR (Sales Development Representative) at "CloudBase" — a
  B2B SaaS company selling project management software ($50-500/month per
  seat). Your manager has asked you to learn the fundamentals of lead
  qualification before you start making calls.

  You've been given 5 inbound leads that came in this week. Your job is
  to assess each one and determine if they're worth pursuing.

  Lead 1: Sarah Chen, Marketing Manager at TechFlow (50 employees)
  - Downloaded your "Project Management ROI Calculator" whitepaper
  - Visited pricing page twice in the last week
  - Company is in your target industry (technology)
  - Used a company email address

  Lead 2: John Smith, Student at State University
  - Signed up for free trial using gmail.com address
  - Company field: "N/A"
  - Downloaded 3 blog posts about project management tips
  - No pricing page visits

  Lead 3: Maria Rodriguez, VP of Operations at BuildCorp (200 employees)
  - Requested a demo through the website
  - Visited pricing page, features page, and case studies
  - Company is in construction (your second-largest vertical)
  - Left a note: "Evaluating tools to replace our current system by Q3"

  Lead 4: David Kim, IT Administrator at MegaRetail (5,000 employees)
  - Downloaded a technical integration guide
  - Visited the API documentation page
  - No pricing page visits
  - No other engagement in 2 weeks

  Lead 5: Lisa Park, CEO at FreshStart (8 employees)
  - Signed up for free trial
  - Added 3 team members to the trial
  - Used the product daily for 5 days
  - Company is a 2-month-old startup

  Tasks:
  1. Define what "lead qualification" means in your own words. Explain
     the difference between a Marketing Qualified Lead (MQL) and a Sales
     Qualified Lead (SQL). Give 3 examples of signals that indicate each.

  2. For each of the 5 leads, provide a qualification assessment:
     - Is this a good lead, a maybe, or a poor lead? Why?
     - What additional information would you need to qualify them further?
     - What would your recommended next step be (call, email, nurture,
       disqualify)?

  3. Rank the 5 leads from highest to lowest priority. Explain your
     ranking criteria and what factors made the difference.

assertions:
  - type: llm_judge
    criteria: "Correctly defines MQL vs SQL with meaningful examples — MQLs show marketing engagement (downloads, visits), SQLs show buying intent (demo requests, budget confirmation, timeline)"
    weight: 0.30
    description: "Accurate MQL vs SQL definitions"
  - type: llm_judge
    criteria: "Lead assessments are logical — correctly identifies Maria as strongest (demo request, timeline, decision-maker), Sarah as promising, and John as poor fit (student, personal email), with reasonable analysis of David and Lisa"
    weight: 0.40
    description: "Logical lead assessments"
  - type: llm_judge
    criteria: "Ranking is defensible with clear criteria — prioritizes buying intent signals (demo request, timeline) over passive engagement (downloads, blog reads)"
    weight: 0.30
    description: "Defensible priority ranking"
