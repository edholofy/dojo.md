meta:
  id: bant-framework-basics
  level: 1
  course: lead-qualification-scoring
  type: output
  description: "Apply the BANT framework — learn to qualify leads using Budget, Authority, Need, and Timeline criteria"
  tags: [sales, leads, qualification, BANT, framework, beginner]

state: {}

trigger: |
  You're an SDR at "DataSync" — a B2B SaaS analytics platform ($200-2,000/
  month). Your manager introduced the BANT framework for qualifying leads:

  B = Budget: Does the prospect have money to buy?
  A = Authority: Is this person a decision-maker or influencer?
  N = Need: Does the prospect have a genuine problem you solve?
  T = Timeline: Is there urgency or a specific buying timeframe?

  You have 4 discovery calls scheduled today. After each call, use BANT
  to assess the lead. Here are your call notes:

  Call 1 — Rachel Torres, Director of Analytics at FinServe (300 employees)
  - Budget: "We have $30K allocated for analytics tools this year, but
    I'd need to get approval for anything over $15K from the CFO."
  - Authority: Rachel owns the analytics tool decision but CFO approves
    budget over $15K. She mentioned her team of 12 analysts would use it.
  - Need: "We're drowning in spreadsheets. Our current process takes 3
    days to generate monthly reports. We need real-time dashboards."
  - Timeline: "Our board meeting is in 6 weeks and I want to show them
    a real-time dashboard by then."

  Call 2 — Mike Chen, Junior Data Analyst at LogiTech (1,000 employees)
  - Budget: "I don't really know our budget for tools. I just saw your
    ad and thought it looked cool."
  - Authority: "My manager's manager would make this decision. I'm just
    researching options for now."
  - Need: "I use Excel mostly. It would be nice to have something faster
    but it's not urgent."
  - Timeline: "No specific timeline. Maybe next year when we do budget
    planning."

  Call 3 — Priya Sharma, COO at GrowthCo (80 employees)
  - Budget: "We just closed our Series B. We have budget — I'm authorized
    to spend up to $50K on operational tools without board approval."
  - Authority: "I make all operational tool decisions. My word is final."
  - Need: "Honestly, I'm not sure yet. We might need analytics but our
    current BI tool works okay. I'm exploring what's out there."
  - Timeline: "No rush. We're just doing market research."

  Call 4 — James Wright, VP of Sales at RetailMax (500 employees)
  - Budget: "Our current tool costs us $18K/year. I can match that but
    going higher would need CEO approval."
  - Authority: "I own the sales analytics stack. CEO trusts my judgment
    on tools under $25K."
  - Need: "Our current tool doesn't integrate with Salesforce. We lose
    2 hours per rep per week on manual data entry. That's 80 hours/week
    across my team of 40 reps."
  - Timeline: "Our contract renews in 45 days. If we don't switch now,
    we're locked in for another year."

  Tasks:
  1. For each call, score the lead on each BANT dimension (1-5 scale,
     where 1 = unqualified and 5 = fully qualified). Provide a brief
     justification for each score.

  2. Calculate an overall BANT score for each lead and classify them:
     - "Qualified" (ready for AE handoff)
     - "Nurture" (promising but not ready)
     - "Disqualify" (not a fit right now)
     Explain your classification reasoning.

  3. For each lead classified as "Nurture," write a 3-step nurture plan
     (what to send/do over the next 30 days to move them toward
     qualified). For "Qualified" leads, write the AE handoff summary.

assertions:
  - type: llm_judge
    criteria: "BANT scores are reasonable — Rachel and James score highest overall (strong need and timeline), Mike scores lowest (weak on all dimensions), Priya is mixed (budget and authority strong, need and timeline weak)"
    weight: 0.35
    description: "Reasonable BANT scoring"
  - type: llm_judge
    criteria: "Classifications align with scores — Rachel and James as Qualified (or at minimum high Nurture), Mike as Disqualify or low Nurture, Priya as Nurture"
    weight: 0.35
    description: "Aligned classifications"
  - type: llm_judge
    criteria: "Nurture plans and handoff summaries are actionable — specific content, touchpoints, and timelines for nurture; complete context for AE handoffs"
    weight: 0.30
    description: "Actionable next steps"
