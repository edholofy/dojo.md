meta:
  id: sdr-discovery-questions
  level: 1
  course: lead-qualification-scoring
  type: output
  description: "Craft effective SDR discovery questions — learn to ask the right questions that reveal lead quality without sounding like an interrogation"
  tags: [sales, leads, qualification, SDR, discovery, questions, beginner]

state: {}

trigger: |
  You're an SDR at "HelpDeskPro" — a B2B SaaS customer support platform
  ($80-600/month per agent seat). Your qualification criteria are:

  Must-haves (disqualify without these):
  - B2B company with 10+ support agents
  - Currently using a support tool (not just email)
  - Budget authority or access to budget holder
  - Active pain point with current solution

  Nice-to-haves (increase score):
  - Growing support team (hiring plan)
  - Multi-channel support needs (email + chat + phone)
  - Integration requirements (Salesforce, Slack, Jira)
  - Timeline within 6 months
  - Previous vendor evaluation experience

  Your manager reviewed your last 10 discovery calls and gave feedback:
  "You're asking good questions but they feel like a checklist. Prospects
  are getting defensive. You need to make it feel like a conversation,
  not an interrogation. Also, you're missing important information — you
  qualify on the surface but don't dig deep enough to understand if the
  pain is real."

  Tasks:
  1. Write 15 discovery questions that cover all must-have and nice-to-
     have qualification criteria. For each question: state the natural,
     conversational version (how you'd actually say it), the qualification
     criterion it reveals, and a follow-up question if the initial answer
     is vague or positive.

  2. Create a "Discovery Call Flow" — organize your 15 questions into
     a natural conversation structure with an opening (rapport + agenda),
     a middle (qualification questions grouped by topic), and a close
     (summary + next steps). Include transition phrases between topics
     so the conversation flows naturally.

  3. Write qualification notes for these 2 mock call transcripts:

     Transcript A: "We have 25 agents using Zendesk. Honestly, it's fine
     but the reporting is terrible. We can't track first response time
     by channel. My VP of CX asked me to look at alternatives. We don't
     have a specific budget yet but she said to find something better.
     We'd want to move in the next quarter if we find the right fit."

     Transcript B: "I'm the office manager. We have 3 people who answer
     customer emails. We use a shared Gmail inbox. It works but sometimes
     things fall through the cracks. I don't know what our budget would
     be — I'd have to ask my boss. No rush on this, I'm just exploring."

     For each: fill in all qualification criteria, flag what's missing,
     assess overall qualification status, and recommend next steps.

assertions:
  - type: llm_judge
    criteria: "Discovery questions are conversational and effective — natural phrasing (not robotic), covers all must-have criteria, includes meaningful follow-up questions that dig deeper"
    weight: 0.35
    description: "Conversational discovery questions"
  - type: llm_judge
    criteria: "Call flow feels natural — logical topic grouping, smooth transitions, proper opening and closing, questions build on each other rather than feeling like a checklist"
    weight: 0.30
    description: "Natural call flow structure"
  - type: llm_judge
    criteria: "Transcript analysis is accurate — Transcript A is a stronger lead (25 agents, VP sponsor, timeline, identified pain) while Transcript B is weaker (3 people, shared inbox not a tool, no budget authority, no urgency)"
    weight: 0.35
    description: "Accurate transcript analysis"
