meta:
  id: first-qualification-shift
  level: 1
  course: lead-qualification-scoring
  type: output
  description: "Handle your first qualification challenge — manage a morning of rapid lead triage, qualification calls, and handoff decisions simultaneously"
  tags: [sales, leads, qualification, simulation, multi-task, beginner]

state: {}

trigger: |
  It's Monday morning at "AppVault" — a B2B SaaS application security
  platform ($300-3,000/month). You're an SDR and you have a busy day
  ahead. Your quota: book 3 meetings this week. Currently booked: 0.

  Your manager just dropped 3 urgent items on your desk simultaneously:

  ITEM 1 — Overnight Lead Triage (10 new leads from the weekend):
  Triage these and decide which to pursue immediately:
  a) CTO at a 300-person fintech, requested demo at 11pm Friday
  b) "Test User" at test@test.com, downloaded pricing PDF
  c) Security Engineer at a 150-person healthcare company, attended
     your webinar recording on Saturday, then visited pricing page
  d) Marketing intern at a competitor, downloaded your whitepaper
  e) CISO at a 500-person retailer, filled out "Contact Sales" form
     with note: "Urgent — failed PCI audit last week"
  f) Student at .edu email, signed up for free trial
  g) VP Engineering at a 80-person SaaS company, visited 12 pages
     including pricing, integrations, and security features in one session
  h) Office manager at a 20-person law firm, downloaded ebook
  i) Director of IT at a 200-person manufacturer, opened 3 nurture
     emails this week after 2 months of silence
  j) CEO at a 40-person startup, tweeted "anyone know a good appsec
     tool?" and a colleague tagged your company

  ITEM 2 — Qualification Call Prep:
  You have a call in 30 minutes with Pat Rivera, Head of Security at
  MediCorp (400 employees, healthcare). Pat requested a demo 2 days ago.
  Your research shows:
  - MediCorp raised $50M Series C 3 months ago
  - They posted 5 security job openings last month
  - Their competitor had a data breach publicized last week
  - Pat's LinkedIn shows they joined MediCorp 4 months ago
  Prepare your BANT qualification questions for this call.

  ITEM 3 — Handoff Decision:
  Your AE, Jordan, is asking for the handoff notes on a lead you
  partially qualified last week:
  - Name: Chris Nakamura, Director of Engineering at BuildTech (250 emp)
  - Score: 71 points
  - BANT: Budget unclear ("we have budget for security tools but no
    specific number"), Authority confirmed (Chris makes tool decisions),
    Need confirmed (migrating to cloud, need security scanning),
    Timeline unclear ("sometime this quarter, maybe")
  Jordan asks: "Is this really qualified? The budget and timeline are
  soft. Should I take this or should you keep nurturing?"

  Tasks:
  1. Triage all 10 leads in Item 1. For each: qualify (pursue now),
     nurture (add to sequence), or disqualify. List your top 3 in
     priority order. You have 10 minutes — be decisive.

  2. Write your BANT qualification questions for the Pat Rivera call.
     Include 2-3 questions per BANT dimension, tailored to what you
     know about MediCorp from your research.

  3. Make the call on Item 3 — should you hand off Chris to Jordan or
     keep nurturing? Justify your decision. If you hand off, write the
     handoff notes. If you keep nurturing, write your 2-week nurture
     plan to strengthen the weak BANT dimensions.

assertions:
  - type: llm_judge
    criteria: "Lead triage is fast and correct — top 3 should include the CISO with failed PCI audit (e), CTO demo request (a), and VP Engineering with heavy engagement (g); correctly disqualifies test user (b), competitor (d), student (f), and too-small firm (h)"
    weight: 0.35
    description: "Fast correct lead triage"
  - type: llm_judge
    criteria: "BANT questions are tailored to MediCorp context — leverages research (Series C funding for budget, security hiring for need/urgency, competitor breach for timeline, new hire for authority dynamics)"
    weight: 0.35
    description: "Context-tailored BANT questions"
  - type: llm_judge
    criteria: "Handoff decision is reasonable and well-justified — either direction is valid but must be supported with logic; if handoff, notes are complete; if nurture, plan specifically targets budget and timeline weaknesses"
    weight: 0.30
    description: "Justified handoff decision"
