meta:
  id: healthcare-patient-glossary
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write a patient-friendly glossary of common medical and health insurance terms"
  tags: [healthcare-glossary, patient-facing, insurance, medical-terms, beginner]

state: {}

trigger: |
  You're a health literacy specialist at a community
  health center. Many patients leave appointments
  confused by medical terminology and struggle to
  understand their insurance paperwork. Write a
  patient-friendly glossary for the waiting room
  and patient portal.

  Context:
  - Target audience: Adult patients, many with limited
    health literacy (estimated 36% of US adults)
  - Reading level: Target grade 6 or below
  - Languages: English (Spanish translation will follow)
  - Purpose: Help patients understand their care and
    insurance documents

  Write definitions for 20 common terms including:
  Medical terms: Diagnosis, Prognosis, Chronic,
  Acute, Benign, Referral, Lab work, Vital signs,
  Follow-up, Generic (medication)
  Insurance terms: Premium, Deductible, Copay,
  Coinsurance, Out-of-pocket maximum, In-network,
  Out-of-network, Prior authorization, EOB
  (Explanation of Benefits), Formulary

  Each definition should:
  - Use simple, everyday words (grade 6 reading level)
  - Be 1-3 sentences maximum
  - Include a concrete example where helpful
  - Avoid using other medical/insurance jargon

assertions:
  - type: llm_judge
    criteria: "Response creates a complete patient glossary — 20 terms defined covering both medical and insurance terminology; definitions are at grade 6 reading level; examples are concrete and relatable; no unexplained jargon within definitions."
    weight: 0.35
    description: "PatientGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates health literacy expertise — medical terms are explained without medical jargon; insurance terms use money examples patients understand; definitions are genuinely simple (not dumbed down, but clear); the glossary respects the reader's intelligence while ensuring comprehension."
    weight: 0.35
    description: "HealthLiteracyQuality"
  - type: llm_judge
    criteria: "Response would improve patient understanding — patients would understand their diagnosis discussions; insurance paperwork would be less confusing; patients would feel more confident asking questions; the glossary would reduce calls to the billing department."
    weight: 0.30
    description: "PatientComprehensionOutcome"
