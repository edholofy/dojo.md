meta:
  id: sustainability-glossary
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write a sustainability and ESG glossary for employees at a company launching its first sustainability program"
  tags: [sustainability-glossary, esg, corporate, environmental, beginner]

state: {}

trigger: |
  You're the communications coordinator at a mid-size
  manufacturing company that just hired its first
  Sustainability Director. The company is launching
  ESG reporting and sustainability initiatives, but
  most employees don't understand the terminology.
  Write a glossary for the internal sustainability
  education program.

  Context:
  - Target audience: 800 employees across manufacturing,
    sales, office, and warehouse roles
  - Education levels vary widely
  - Many are skeptical of "green jargon"
  - The glossary should be practical, not preachy

  Write definitions for 20 sustainability terms:
  - Carbon footprint, Carbon neutral, Net zero,
    Carbon offset, ESG, Scope 1/2/3 emissions,
    Circular economy, Greenwashing, Lifecycle
    assessment, Renewable energy, Sustainability
    report, Stakeholder, Supply chain transparency,
    Waste diversion, Biodegradable vs Compostable,
    Fair trade, B Corp, Science-based targets,
    Sustainable sourcing, Carbon tax

  Each definition should:
  - Be 2-3 sentences in straightforward language
  - Connect to the manufacturing business context
  - Explain what it means for the employee's daily work
  - Avoid being preachy or moralistic

assertions:
  - type: llm_judge
    criteria: "Response creates a complete sustainability glossary — 20 terms defined; definitions connect to manufacturing context; employee relevance is explained; tone is practical, not preachy; all required terms are covered."
    weight: 0.35
    description: "SustainabilityGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates sustainability communication expertise — definitions are accurate without being academic; manufacturing connections are specific; employee impact is tangible; the tone wins over skeptics; greenwashing is honestly defined; Scope 1/2/3 is clearly differentiated."
    weight: 0.35
    description: "SustainabilityDefinitionQuality"
  - type: llm_judge
    criteria: "Response would build sustainability literacy — employees would understand ESG reporting; daily work connections would drive engagement; skeptics would find the practical approach credible; the company would speak a common sustainability language."
    weight: 0.30
    description: "SustainabilityLiteracyOutcome"
