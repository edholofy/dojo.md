meta:
  id: financial-literacy-glossary
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write a personal finance glossary for young adults opening their first bank accounts and starting to invest"
  tags: [finance-glossary, personal-finance, young-adults, investing, beginner]

state: {}

trigger: |
  You're a content writer at a neobank targeting
  18-25 year olds. User research shows that Gen Z
  customers want to learn about finance but find
  existing glossaries boring and condescending.
  Write a personal finance glossary that's informative
  but speaks their language.

  Context:
  - Target audience: 18-25 year olds, many with their
    first bank account or investment account
  - Tone: Approachable, conversational, slightly
    informal — but accurate (not condescending)
  - Format: For the app's "Learn" section

  Write definitions for 20 personal finance terms:
  - APR, APY, Compound interest, Credit score, ETF,
    Index fund, 401(k), Roth IRA, Capital gains,
    Dividend, Portfolio, Diversification, Dollar-cost
    averaging, Inflation, Net worth, Liability,
    Liquidity, Bull market, Bear market, Budget

  Each definition should:
  - Be 2-3 sentences in conversational tone
  - Include a relatable Gen Z example (streaming
    subscriptions, side hustles, rent, etc.)
  - Explain why this matters for their financial future
  - Be accurate despite the casual tone

assertions:
  - type: llm_judge
    criteria: "Response creates a complete personal finance glossary — 20 terms defined; conversational tone appropriate for 18-25 year olds; relatable examples from Gen Z life; definitions are financially accurate; all required terms are covered."
    weight: 0.35
    description: "FinanceGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates tone-appropriate definition writing — conversational without being cringy; examples genuinely resonate with young adults; financial accuracy is maintained; the glossary doesn't talk down to readers; Gen Z references are natural, not forced."
    weight: 0.35
    description: "ToneAppropriateQuality"
  - type: llm_judge
    criteria: "Response would increase financial literacy — young adults would understand their account statements; investment decisions would be more informed; the glossary would be shared among friends; users would feel empowered rather than intimidated by finance."
    weight: 0.30
    description: "FinancialLiteracyOutcome"
