meta:
  id: basic-tech-glossary
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write a beginner-friendly glossary of essential cloud computing terms for non-technical business users"
  tags: [tech-glossary, cloud-computing, beginner-friendly, non-technical, beginner]

state: {}

trigger: |
  You're a technical writer at CloudFirst, a cloud
  services company. The sales team reports that
  prospects are intimidated by cloud computing jargon
  during sales conversations. Write a glossary of
  25 essential cloud computing terms for non-technical
  business decision-makers.

  Context:
  - Target audience: CEOs, CFOs, and business managers
    evaluating cloud migration
  - Reading level: No technical background assumed
  - Purpose: Reduce jargon anxiety and enable informed
    conversations with IT teams
  - Format: Alphabetical, with each definition 2-3
    sentences

  Terms to include (minimum):
  - API, Bandwidth, Cloud-native, Data center,
    Encryption, Firewall, Hybrid cloud, IaaS,
    Kubernetes, Latency, Microservices, Multi-tenant,
    On-premises, PaaS, Private cloud, Public cloud,
    Redundancy, SaaS, Scalability, SLA, Uptime,
    Virtualization, VPN, Workload

  Each definition should:
  - Start with a plain-English explanation
  - Include a business analogy or real-world comparison
  - Explain why this term matters for their decision
  - Avoid using other jargon in the definition

assertions:
  - type: llm_judge
    criteria: "Response creates a complete cloud computing glossary — 25+ terms defined alphabetically; each definition is 2-3 sentences; definitions use plain English with business analogies; no unexplained jargon appears within definitions; the glossary covers the required terms."
    weight: 0.35
    description: "TechGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates glossary writing expertise — definitions start with accessible explanations; analogies genuinely clarify concepts; business relevance is included; terms are self-contained (not dependent on other glossary entries); the non-technical audience would understand every definition."
    weight: 0.35
    description: "DefinitionQuality"
  - type: llm_judge
    criteria: "Response would reduce jargon anxiety — business decision-makers would feel confident in cloud conversations; the glossary would be bookmarked and referenced; sales conversations would be more productive; prospects would make informed decisions."
    weight: 0.30
    description: "JargonReductionOutcome"
