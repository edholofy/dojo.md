meta:
  id: legal-plain-language-glossary
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write a plain-language legal glossary for tenants to understand their lease agreements and tenant rights"
  tags: [legal-glossary, plain-language, tenant-rights, lease, beginner]

state: {}

trigger: |
  You're a legal aid writer at a tenant advocacy
  nonprofit. Most tenants sign leases they don't
  fully understand because legal terminology is
  intimidating. Write a glossary to accompany the
  nonprofit's "Know Your Rights" guide.

  Context:
  - Target audience: Renters, many first-time, diverse
    backgrounds, varying education levels
  - Purpose: Help tenants understand lease terms and
    their rights
  - Reading level: Grade 7-8 maximum
  - Important: These definitions are informational,
    not legal advice

  Write definitions for 18 common lease and tenant
  rights terms:
  - Lease, Month-to-month, Landlord, Tenant, Security
    deposit, Last month's rent, Subletting, Eviction,
    Notice to vacate, Habitability, Maintenance
    request, Lease violation, Rent increase, Late fee,
    Quiet enjoyment, Lease renewal, Joint and several
    liability, Escrow

  Each definition should:
  - Use plain language (grade 7-8)
  - Include an example scenario where possible
  - Note any common tenant misunderstandings
  - Include a brief "Your Rights" note where relevant
  - Add a disclaimer that this is informational only

assertions:
  - type: llm_judge
    criteria: "Response creates a complete tenant glossary — 18 terms defined in plain language; examples use real rental scenarios; common misunderstandings are flagged; 'Your Rights' notes are included where relevant; informational disclaimer is present."
    weight: 0.35
    description: "TenantGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates legal plain-language expertise — legal terms are accurately defined without legalese; examples reflect real tenant situations; misunderstandings are genuinely common ones; rights notes are helpful without overstepping into legal advice; the disclaimer is clear."
    weight: 0.35
    description: "PlainLanguageLegalQuality"
  - type: llm_judge
    criteria: "Response would empower tenants — renters would understand their lease before signing; tenant rights would be known; common lease traps would be identified; tenants would feel more confident in landlord communications; the glossary would reduce exploitation of uninformed tenants."
    weight: 0.30
    description: "TenantEmpowermentOutcome"
