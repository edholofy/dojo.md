meta:
  id: software-dev-glossary
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write a glossary of software development terms for non-technical project managers and stakeholders"
  tags: [software-glossary, development-terms, project-managers, non-technical, beginner]

state: {}

trigger: |
  You're a technical writer at a software agency.
  Project managers who aren't from technical
  backgrounds struggle in sprint meetings and client
  calls. Write a glossary they can reference.

  Context:
  - Target audience: Project managers, product owners,
    and business stakeholders
  - They need to participate in technical discussions
    without being engineers
  - Format: Quick-reference card + detailed glossary

  Write definitions for 22 software development terms:
  - Agile, Sprint, Scrum, Backlog, User story, MVP,
    Technical debt, Code review, Pull request,
    Deployment, Staging, Production, Bug, Regression,
    Hotfix, CI/CD, Repository, Branch, Merge conflict,
    API endpoint, Frontend, Backend

  Each definition should:
  - Be 2-3 sentences in plain language
  - Include how the PM would encounter this term
    (e.g., "You'll hear this in sprint planning when...")
  - Explain what action, if any, the PM should take
  - Be precise enough that developers would agree
    with the definition

assertions:
  - type: llm_judge
    criteria: "Response creates a complete software development glossary — 22 terms defined; definitions bridge technical concepts for non-technical PMs; contextual usage is included; action items for PMs are noted; definitions are technically accurate."
    weight: 0.35
    description: "SoftwareGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates bridge-building expertise — definitions explain when and where PMs encounter each term; action guidance helps PMs participate meaningfully; technical accuracy would satisfy developers; the glossary respects both audiences."
    weight: 0.35
    description: "BridgeDefinitionQuality"
  - type: llm_judge
    criteria: "Response would improve cross-functional communication — PMs would participate more effectively in sprint meetings; technical discussions would be more productive; PMs would know when to escalate vs when something is routine; client communications would be clearer."
    weight: 0.30
    description: "CrossFunctionalCommunicationOutcome"
