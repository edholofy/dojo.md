meta:
  id: marketing-glossary
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write a digital marketing glossary for small business owners who are new to online marketing"
  tags: [marketing-glossary, digital-marketing, small-business, beginner-friendly, beginner]

state: {}

trigger: |
  You're a content strategist at a digital marketing
  agency. Small business clients constantly ask "What
  does that mean?" during strategy meetings. Write a
  digital marketing glossary for the agency's blog
  that small business owners can reference.

  Context:
  - Target audience: Small business owners running
    their first online marketing campaigns
  - They understand their business but not marketing
    terminology
  - Many are spending money on Google Ads or social
    media without understanding the metrics

  Write definitions for 20 essential digital marketing
  terms including:
  - SEO, SEM, PPC, CPC, CPM, CTR, CTA, ROI,
    Conversion rate, Bounce rate, Organic traffic,
    Paid traffic, Landing page, A/B testing,
    Retargeting, Lead generation, Funnel, Impressions,
    Engagement rate, Domain authority

  Each definition should:
  - Be 2-3 sentences in plain language
  - Include a practical example from a small business
    context (e.g., a bakery, a plumber, a boutique)
  - Mention why the metric or concept matters
  - Use a consistent format throughout

assertions:
  - type: llm_judge
    criteria: "Response creates a complete digital marketing glossary — 20 terms defined; each definition is 2-3 sentences with plain language; practical small business examples are included; all required terms are covered; format is consistent."
    weight: 0.35
    description: "MarketingGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates accessible definition writing — definitions avoid marketing jargon to explain marketing jargon; small business examples are relatable and specific; metrics are explained in terms of what they mean for the business; the glossary helps owners understand their marketing reports."
    weight: 0.35
    description: "AccessibleDefinitionQuality"
  - type: llm_judge
    criteria: "Response would empower small business owners — owners would understand their agency's reports; marketing spending decisions would be more informed; the glossary would reduce 'what does that mean?' questions in meetings; owners would feel confident discussing marketing strategy."
    weight: 0.30
    description: "BusinessEmpowermentOutcome"
