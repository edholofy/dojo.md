meta:
  id: beginner-glossary-shift
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Shift simulation — write three mini-glossaries for different industries with different audiences, formats, and constraints"
  tags: [shift-simulation, multi-industry, format-variety, audience-adaptation, beginner]

state: {}

trigger: |
  You're a freelance writer with three glossary
  projects due this week. Each has different
  requirements.

  === CLIENT 1: BeanCraft Coffee Roasters ===
  Write 8 coffee terminology definitions for the
  back of their retail coffee bags. Space is extremely
  limited — each definition must be 1 sentence max.
  Terms: Single origin, Blend, Light roast, Dark roast,
  Pour over, French press, Cupping, Fair trade
  Format: Ultra-concise (1 sentence each)
  Tone: Artisanal, passionate

  === CLIENT 2: CyberShield Security Training ===
  Write 8 cybersecurity terms for a company-wide
  security awareness training module. Employees range
  from executives to warehouse workers.
  Terms: Phishing, Malware, Ransomware, Two-factor
  authentication, VPN, Social engineering, Firewall,
  Zero-day vulnerability
  Format: Definition + "What to do" action item
  Tone: Serious but not scary

  === CLIENT 3: FitLife Personal Training App ===
  Write 8 fitness terminology definitions for an app's
  in-workout glossary. Users tap a term mid-workout
  for a quick explanation.
  Terms: HIIT, RPE, Superset, Reps, Sets, Time under
  tension, Progressive overload, DOMS
  Format: 1-2 sentences, optimized for quick mobile
  reading during a workout
  Tone: Motivational, energetic

  Write all three glossary sections (24 total
  definitions), each matching its unique constraints.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct glossary sections — 8 coffee terms (1 sentence each), 8 cybersecurity terms (with action items), 8 fitness terms (mobile-optimized); each meets its format constraints; all 24 definitions are present."
    weight: 0.35
    description: "ShiftGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates format and tone adaptability — coffee definitions are artisanal and ultra-concise; cybersecurity definitions include actionable 'what to do' guidance; fitness definitions are quick to read mid-workout; each glossary matches its delivery context and audience."
    weight: 0.35
    description: "FormatAdaptationQuality"
  - type: llm_judge
    criteria: "Each glossary would serve its context — coffee bags would educate buyers; employees would improve security behavior; app users would understand exercises mid-workout; all three demonstrate glossary writing across different industries and constraints."
    weight: 0.30
    description: "ContextualEffectivenessOutcome"
