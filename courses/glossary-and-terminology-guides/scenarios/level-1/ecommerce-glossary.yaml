meta:
  id: ecommerce-glossary
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write an e-commerce glossary for new online sellers starting their first store"
  tags: [ecommerce-glossary, online-selling, new-sellers, marketplace, beginner]

state: {}

trigger: |
  You're a content writer for an e-commerce platform
  (similar to Shopify). New merchants setting up their
  first store are confused by e-commerce terminology.
  Write a glossary for the merchant onboarding guide.

  Context:
  - Target audience: First-time online sellers, often
    transitioning from in-person sales
  - Many are crafters, artisans, or small retailers
  - They know their products but not online selling

  Write definitions for 20 e-commerce terms:
  - SKU, AOV (Average Order Value), Cart abandonment,
    Checkout, Conversion rate, Cross-selling, Upselling,
    Dropshipping, Fulfillment, Inventory management,
    Markup, Margin, Payment gateway, Product listing,
    SEO (for product pages), Shipping label, Storefront,
    Tax nexus, Wholesale, Return rate

  Each definition should:
  - Be 2-3 sentences in friendly, encouraging tone
  - Include a practical e-commerce example
  - Explain why this concept affects their bottom line
  - Use language appropriate for non-technical sellers

assertions:
  - type: llm_judge
    criteria: "Response creates a complete e-commerce glossary — 20 terms defined; friendly and encouraging tone; practical selling examples; business impact explained; all required terms are covered."
    weight: 0.35
    description: "EcommerceGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates e-commerce education expertise — definitions translate online concepts for offline sellers; examples use relatable products; business impact connects to profitability; the tone is welcoming for new sellers; acronyms are properly expanded."
    weight: 0.35
    description: "EcommerceDefinitionQuality"
  - type: llm_judge
    criteria: "Response would accelerate merchant onboarding — new sellers would set up stores faster; pricing and margin decisions would be more informed; sellers would understand their dashboard metrics; the glossary would reduce support tickets during onboarding."
    weight: 0.30
    description: "MerchantOnboardingOutcome"
