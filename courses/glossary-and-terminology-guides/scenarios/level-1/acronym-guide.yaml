meta:
  id: acronym-guide
  level: 1
  course: glossary-and-terminology-guides
  type: output
  description: "Write an acronym and abbreviation reference guide for new employees at a government agency"
  tags: [acronym-guide, government, onboarding, abbreviations, beginner]

state: {}

trigger: |
  You're an onboarding specialist at the US
  Department of Housing and Urban Development (HUD).
  New employees report that internal communications
  are nearly incomprehensible due to the volume of
  acronyms. One new hire described their first week
  as "drowning in alphabet soup." Write an acronym
  reference guide.

  Context:
  - Target audience: New federal employees (GS-5 to
    GS-15) in their first 90 days
  - HUD uses hundreds of acronyms across programs,
    legislation, and internal processes
  - The guide should cover the most essential acronyms
    a new employee encounters

  Write an acronym guide with 25 entries organized
  into categories:
  - Agency & Structure (6): HUD, FHA, OIG, FHEO,
    CPD, PIH
  - Programs & Legislation (7): CDBG, HOME, HMDA,
    FHA, RESPA, NEPA, VAWA
  - Processes & Systems (6): LOCCS, IDIS, DRGR,
    CAIVRS, TOTAL, FOIA
  - General Government (6): OMB, GAO, CFR, USC,
    NOFA, SAM

  Each entry should:
  - Spell out the full name
  - Provide a 1-2 sentence explanation of what it
    does or why it matters
  - Note when/where the new employee will encounter it
  - Include cross-references to related acronyms

assertions:
  - type: llm_judge
    criteria: "Response creates a complete acronym guide — 25 entries organized into 4 categories; each entry spells out the acronym and explains its significance; encounter context is provided; cross-references connect related acronyms."
    weight: 0.35
    description: "AcronymGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates government communication expertise — acronyms are correctly expanded; explanations are accurate for HUD context; encounter contexts are realistic for new employees; cross-references create a web of understanding; the guide helps decode 'alphabet soup.'"
    weight: 0.35
    description: "GovernmentAcronymQuality"
  - type: llm_judge
    criteria: "Response would accelerate new employee onboarding — new hires would understand meetings faster; internal documents would be comprehensible; the acronym guide would be referenced daily in the first 90 days; the 'alphabet soup' feeling would be reduced."
    weight: 0.30
    description: "OnboardingAccelerationOutcome"
