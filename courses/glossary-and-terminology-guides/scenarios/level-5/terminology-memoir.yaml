meta:
  id: terminology-memoir
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Write a professional memoir about a career spent defining the undefinable — 3 chapters on the art, science, and human impact of terminology"
  tags: [memoir, career-reflection, storytelling, terminology-art, master]

state: {}

trigger: |
  You've spent 25 years defining terms for a living.
  From your first job writing a glossary for a
  software manual to mediating a terminology dispute
  that nearly derailed a billion-dollar pharmaceutical
  merger, you've learned that definitions are never
  "just words."

  Write your memoir: "Defining the Undefinable: A Life
  in Terminology"

  Chapter 1: "The Definition That Changed Everything"
  (~2,500 words)
  Your first major project at 26 — writing the glossary
  for a medical device manual. A nurse called to say
  the definition of "sterilization cycle complete" was
  ambiguous — could mean the machine finished or the
  instruments were actually sterile. You realized that
  a poorly written definition could cost a life.
  Explore: The weight of precision in terminology.

  Chapter 9: "The Word War" (~2,500 words)
  A pharmaceutical merger stalled because the two
  companies defined "adverse event" differently —
  one included "expected side effects," the other
  didn't. Regulators demanded a single definition.
  You spent 6 months mediating between scientists,
  lawyers, and executives who each insisted their
  definition was "correct." Explore: How definitions
  encode power, perspective, and institutional culture.

  Chapter 16: "The Universal Glossary" (~2,500 words)
  Your crowning project: creating a multilingual
  medical glossary for Doctors Without Borders that
  works in 30 languages across 60 countries. Some
  concepts don't translate. Some diseases have no name
  in certain languages. You discovered that the gaps
  in a glossary reveal as much as the definitions.
  Explore: What we learn about humanity from what
  we can and cannot define.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling memoir — 3 chapters at ~2,500 words each; Chapter 1 explores precision and stakes; Chapter 9 explores definitions as power; Chapter 16 explores the limits of language; all use narrative storytelling."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates memoir writing craft — storytelling uses scenes not summaries; the medical device chapter is tense and revelatory; the merger chapter is political and human; the multilingual chapter is philosophical; the voice is authentic."
    weight: 0.35
    description: "MemoirWritingQuality"
  - type: llm_judge
    criteria: "Response would resonate with readers — professionals would see their work reflected; the memoir would elevate terminology from mundane to profound; each chapter reveals deeper truths about language and understanding."
    weight: 0.30
    description: "ReaderResonanceOutcome"
