meta:
  id: master-terminology-shift
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Master shift simulation — simultaneously address five converging crises revealing terminology as the foundation of human shared understanding"
  tags: [shift-simulation, converging-crises, shared-understanding, civilization, master]

state: {}

trigger: |
  You are the world's preeminent authority on how
  humans create, standardize, and share terminology.
  In a single extraordinary week, five converging
  crises demand your expertise.

  === CRISIS 1: The AI Definition Crisis ===
  AI systems are generating terminology faster than
  humans can standardize it. "Hallucination," "agent,"
  "alignment," "grounding" — AI creates new terms
  weekly with no agreed definitions. A major AI
  safety incident occurred because two research labs
  defined "alignment" differently.

  Design: AI terminology governance framework —
  rapid standardization process, versioned definitions,
  cross-organization alignment.

  === CRISIS 2: The Babel Crisis ===
  A UN study reveals that 40% of international treaty
  disputes stem from terminology disagreements — terms
  translated differently in different languages create
  legal ambiguity. The latest climate agreement has
  23 terms with disputed translations.

  Design: International treaty terminology methodology
  — multi-language precision, cultural negotiation,
  dispute resolution for contested definitions.

  === CRISIS 3: The Health Literacy Emergency ===
  A WHO report shows that terminology confusion in
  medical communications causes 250,000 preventable
  deaths annually worldwide. Patients misunderstand
  "nothing by mouth," "as needed," and "contraindicated"
  with fatal consequences.

  Design: Global medical terminology accessibility
  standard — patient-facing definitions, visual
  terminology systems, universal health symbols.

  === CRISIS 4: The Knowledge Extinction ===
  Research reveals that 2,000 languages will die by
  2100, each carrying unique terminology encoding
  irreplaceable knowledge about ecology, medicine,
  and human experience. When a language dies, its
  terminology — and the knowledge it encodes — dies
  with it.

  Design: Endangered terminology preservation system
  — documentation methodology, knowledge extraction,
  digital archive with semantic preservation.

  === CRISIS 5: The Legacy Question ===
  After 25 years defining terms, you face the ultimate
  question: What is the relationship between language
  and understanding? Can shared definitions create
  shared reality? Write the document that captures
  what you've learned about the power and limits of
  terminology.

  Task: Write complete responses to all five crises.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises — AI terminology governance; treaty terminology methodology; medical accessibility standard; endangered language preservation; philosophical legacy on language and understanding."
    weight: 0.35
    description: "MasterShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of terminology as civilization infrastructure — the AI crisis reveals that undefined terms create danger; the Babel crisis shows that translation is never just linguistic; the health crisis proves that terminology can kill; language extinction means knowledge extinction; the legacy connects terminology to shared human understanding."
    weight: 0.35
    description: "CivilizationInfrastructureMastery"
  - type: llm_judge
    criteria: "Response would define the future of terminology — the AI framework would prevent terminology-related safety incidents; treaty methodology would unblock international negotiations; medical accessibility would save 250,000 lives; endangered terminology would be preserved; the legacy would inspire the next generation to see terminology as one of humanity's most critical and underappreciated capabilities."
    weight: 0.30
    description: "CivilizationDefiningOutcome"
