meta:
  id: terminology-graduate-program
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Design a graduate academic program in Terminology Science and Knowledge Engineering with curriculum, research center, and industry partnerships"
  tags: [graduate-program, academic, terminology-science, research, master]

state: {}

trigger: |
  You've been appointed to design a new graduate
  program: Master of Science in Terminology Science
  and Knowledge Engineering (MSTKE). This program
  bridges linguistics, information science, AI/NLP,
  and domain expertise.

  University context:
  - School of Information and Library Sciences
  - Strong NLP and computational linguistics research
  - Industry partnerships with 40+ tech companies
  - Research budget: $600K/year for terminology center
  - Target: 25 students per cohort
  - Format: Hybrid (on-campus + online)

  Design the complete program:
  1. Program vision and learning outcomes
  2. Curriculum: 10 courses (30 credits) across 4
     concentrations:
     - Terminology Theory and Practice
     - Ontology and Knowledge Engineering
     - AI/NLP for Terminology
     - Domain Specialization (choose: healthcare,
       legal, financial, technical)
  3. Design 2 courses in detail (syllabi, weekly
     topics, assignments)
  4. Capstone project guidelines
  5. Center for Terminology Research: Mission, 3-year
     research agenda, industry partnerships
  6. Faculty requirements and advisory board
  7. Student recruitment and career outcomes
  8. Program sustainability

assertions:
  - type: llm_judge
    criteria: "Response designs a complete graduate program — vision; 10-course curriculum across 4 concentrations; 2 detailed syllabi; capstone guidelines; research center with 3-year agenda; faculty requirements; recruitment; sustainability."
    weight: 0.35
    description: "GraduateProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic design expertise — curriculum balances theory and practice; 4 concentrations cover the field; syllabi are graduate-level; the research center advances knowledge; faculty requirements blend linguistics, CS, and domain expertise."
    weight: 0.35
    description: "AcademicDesignQuality"
  - type: llm_judge
    criteria: "Response would attract students and partners — graduates would fill real market needs; industry partners would recruit; the research center would produce cited work; the program would be financially sustainable."
    weight: 0.30
    description: "ProgramViabilityOutcome"
