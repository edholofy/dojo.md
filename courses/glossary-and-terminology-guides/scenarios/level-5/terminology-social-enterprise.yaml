meta:
  id: terminology-social-enterprise
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Launch a social enterprise making specialized terminology accessible to underserved populations — immigrants, patients, and workers in safety-critical environments"
  tags: [social-enterprise, accessibility, underserved, terminology-equity, master]

state: {}

trigger: |
  You're founding "Clear Words," a social enterprise
  dedicated to making specialized terminology
  accessible to people whose lives depend on
  understanding it. Your mission: No one should be
  harmed because they didn't understand a critical
  term.

  Target populations:
  - Immigrants navigating legal and government systems
    (visa terms, court procedures, benefits eligibility)
  - Patients with limited health literacy (medical
    terminology, prescription instructions, consent
    forms)
  - Workers in safety-critical industries (construction,
    manufacturing, agriculture) who speak English as a
    second language
  - Elderly adults dealing with financial terminology
    (retirement accounts, Medicare, estate planning)

  Impact data:
  - 25% of medical errors involve patient
    misunderstanding of terminology
  - 40% of workplace injuries in construction involve
    workers who don't understand safety terms
  - 60% of immigrants who miss benefits cite
    terminology confusion

  Design the social enterprise:
  1. Mission, theory of change, and impact model
  2. Glossary design principles for each population
  3. Multi-modal delivery (print cards, audio, visual
     icons, SMS, app)
  4. Write 4 sample glossary entries (one for each
     population) demonstrating adapted content
  5. Partnership strategy (hospitals, legal aid,
     OSHA, immigrant services)
  6. Volunteer and professional linguist model
  7. Impact measurement framework
  8. Funding model and 3-year growth plan

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — mission and theory of change; design principles per population; multi-modal delivery; 4 adapted entries; partnerships; linguist model; impact measurement; funding and growth plan."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates social impact expertise — glossary adaptations address real comprehension barriers; multi-modal delivery accounts for literacy and access differences; impact measurement captures lives saved and harm prevented; the funding model is sustainable."
    weight: 0.35
    description: "SocialImpactQuality"
  - type: llm_judge
    criteria: "Response would save lives — medical terminology errors would decrease; workplace injuries from misunderstanding would reduce; immigrants would access benefits; the enterprise would demonstrate that terminology access is a social justice issue."
    weight: 0.30
    description: "LifeSavingImpactOutcome"
