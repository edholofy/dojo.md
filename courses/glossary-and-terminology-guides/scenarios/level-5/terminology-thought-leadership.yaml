meta:
  id: terminology-thought-leadership
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Establish thought leadership in terminology science — keynote, manifesto, industry article, and TEDx outline on the power of precise language"
  tags: [thought-leadership, keynote, manifesto, precise-language, master]

state: {}

trigger: |
  You've spent 25 years studying how humans define,
  share, and standardize language. You've been invited
  to give the opening keynote at the International
  Terminology Summit (1,500 attendees from 50
  countries). This is your moment to elevate
  terminology from a niche discipline to a recognized
  strategic capability.

  Your thesis: "The Vocabulary of Everything" — Every
  human endeavor — science, law, medicine, technology,
  commerce — depends on shared definitions. When
  definitions fail, everything built on them fails.
  Terminology isn't about words; it's about the
  foundation of shared understanding.

  Create:
  1. Keynote: "The Vocabulary of Everything" (45 min,
     full script with speaker notes and slide concepts)
  2. "The Terminology Manifesto" — 10 principles for
     why precise language matters, each with explanation
  3. HBR article: "Why Your Company's Biggest Problem
     Might Be Its Vocabulary" (~2,000 words)
  4. TEDx outline: "The Word That Cost a Billion
     Dollars" — 15-minute talk about how terminology
     failures cause real-world disasters

assertions:
  - type: llm_judge
    criteria: "Response creates complete thought leadership content — full keynote script; 10-principle manifesto; HBR article (~2,000 words); TEDx outline connecting terminology to real-world consequences."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates visionary thinking — 'The Vocabulary of Everything' thesis is compelling; the manifesto establishes new principles; the HBR article makes a rigorous business case; the TEDx talk uses compelling real-world examples; all four elevate terminology from niche to strategic."
    weight: 0.35
    description: "VisionaryThinkingQuality"
  - type: llm_judge
    criteria: "Response would establish thought leadership — the keynote would inspire 1,500 attendees; the manifesto would be widely shared; the HBR article would be cited in boardrooms; the TEDx talk would reach millions and change perceptions of terminology work."
    weight: 0.30
    description: "IndustryInfluenceOutcome"
