meta:
  id: global-terminology-standards
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Found an international standards body for terminology management with quality standards, certification, and global benchmarking"
  tags: [standards-body, international, quality-framework, certification, master]

state: {}

trigger: |
  You're leading the founding of the Global
  Terminology Standards Council (GTSC), building on
  existing ISO TC 37 (Terminology) work to create
  practical, adoptable standards. ISO standards exist
  but are rarely implemented outside academic and
  government contexts.

  The problem GTSC solves:
  - ISO 704/860/1087 exist but have low industry
    adoption
  - No practical quality standard for glossaries
  - No professional credential for terminologists
  - No cross-industry benchmarking
  - Companies waste billions on terminology-related
    miscommunication

  Design the complete standards body:
  1. GTSC charter, mission, and governance
  2. Terminology Quality Standard (TQS-1000):
     - 8 quality dimensions with measurable criteria
     - Scoring methodology (1-100)
     - Bronze/Silver/Gold/Platinum certification
  3. Relationship to existing ISO TC 37 standards
  4. Industry-specific supplements (healthcare,
     finance, technology, legal, manufacturing)
  5. Certified Terminology Professional (CTP)
     individual credential
  6. Global benchmarking study design
  7. 5-year strategic roadmap
  8. Founding stakeholder value proposition

assertions:
  - type: llm_judge
    criteria: "Response creates a complete standards body — charter and governance; TQS-1000 with 8 dimensions; ISO TC 37 relationship; 5 industry supplements; CTP credential; benchmarking study; 5-year roadmap; stakeholder proposition."
    weight: 0.35
    description: "StandardsBodyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards expertise — the 8 quality dimensions are measurable and practical; ISO TC 37 relationship is complementary, not duplicative; industry supplements address real sector needs; the CTP exam blueprint covers essential competencies; the roadmap is realistic."
    weight: 0.35
    description: "StandardsGovernanceQuality"
  - type: llm_judge
    criteria: "Response would establish industry standards — companies would pursue TQS certification; professionals would earn CTP credentials; the benchmarking study would be cited; the GTSC would bridge the gap between academic ISO standards and industry practice."
    weight: 0.30
    description: "IndustryAdoptionOutcome"
