meta:
  id: terminology-for-existential-challenges
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Design terminology systems for civilization-scale challenges — AI governance, pandemic communication, and climate policy"
  tags: [existential-challenges, ai-governance, pandemic, climate-policy, master]

state: {}

trigger: |
  As the world's leading authority on terminology and
  shared understanding, three global organizations
  need your help creating the vocabulary for
  humanity's biggest challenges.

  === CHALLENGE 1: AI Governance Terminology ===
  The United Nations AI Advisory Body needs a
  standardized glossary of AI governance terms that
  all nations can agree on. Currently, "AI safety,"
  "alignment," "bias," and "fairness" mean different
  things to different countries.

  Design: International AI governance glossary with
  50 core terms, multi-perspective definitions that
  acknowledge cultural differences, and a process for
  updating as AI capabilities evolve.

  === CHALLENGE 2: Pandemic Terminology Framework ===
  The WHO learned from COVID that inconsistent
  terminology kills. "Social distancing," "quarantine,"
  "isolation," "lockdown," "herd immunity" — public
  confusion about these terms led to non-compliance
  and deaths.

  Design: Pandemic communication terminology standard
  with 30 core terms, grade-4 reading level definitions,
  translation guidelines for 20+ languages, and a
  rapid-deployment system for new terms during
  emerging outbreaks.

  === CHALLENGE 3: Climate Policy Vocabulary ===
  The UNFCCC (UN climate body) needs standardized
  definitions for climate finance terms. Currently,
  developed and developing nations use different
  definitions of "climate finance," "loss and damage,"
  and "carbon credit" — stalling negotiations.

  Design: Climate negotiation terminology framework
  with 25 contested terms, showing how different
  definitions reflect different interests, and
  proposing consensus definitions.

  Create complete designs for all three challenges.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three challenges — AI governance glossary with multi-perspective definitions; pandemic terminology standard with plain language and rapid deployment; climate negotiation terminology with contested term analysis and consensus proposals."
    weight: 0.35
    description: "ExistentialChallengesCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of terminology at civilization scale — AI governance terms acknowledge legitimate cultural differences; pandemic terminology would prevent communication-related deaths; climate terms expose how definitions encode political positions; all three reveal that shared vocabulary is prerequisite for shared action."
    weight: 0.35
    description: "CivilizationScaleExpertiseQuality"
  - type: llm_judge
    criteria: "Response would enable global cooperation — AI governance would have common vocabulary; pandemic communication would save lives; climate negotiations would be unblocked; all three demonstrate that terminology is the foundation of international cooperation."
    weight: 0.30
    description: "GlobalCooperationOutcome"
