meta:
  id: terminology-research-handbook
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Author chapters for the definitive academic handbook on Terminology Science — editorial framework and 3 authored chapters"
  tags: [research-handbook, academic, terminology-science, editorial, master]

state: {}

trigger: |
  You're the editor-in-chief of "The Oxford Handbook
  of Terminology Science," commissioned to be the
  definitive academic treatment of terminology as a
  scientific discipline.

  Handbook scope:
  - 28 chapters by 45+ contributing authors
  - Bridges linguistics, information science, AI,
    and domain-specific terminology
  - Target: Researchers, graduate students, senior
    practitioners

  Design the complete handbook:
  1. Editorial introduction: Why terminology deserves
     recognition as a science (~1,500 words)
  2. Table of contents: 28 chapters organized into
     7 parts with descriptions
  3. Write Chapter 1: "The History of Terminology:
     From Wüster to Wikidata" (~3,000 words)
  4. Write Chapter 14: "Computational Terminology:
     AI, NLP, and the Future of Term Extraction"
     (~3,000 words)
  5. Write Chapter 28: "Towards a Unified Theory of
     Terminology" (~3,000 words, proposing an
     integrative theoretical framework)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete handbook — editorial introduction; 28-chapter TOC in 7 parts; Chapter 1 history (~3,000 words); Chapter 14 computational (~3,000 words); Chapter 28 unified theory (~3,000 words)."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic scholarship — the editorial makes a compelling case; chapters reference relevant literature; the historical chapter traces from Wüster to modern computational approaches; the computational chapter engages current AI/NLP; the unified theory proposes an original framework."
    weight: 0.35
    description: "AcademicScholarshipQuality"
  - type: llm_judge
    criteria: "Response would advance the field — the handbook would be adopted in programs; the unified theory would be cited; the 28-chapter structure would comprehensively cover terminology science; the handbook would establish terminology as a rigorous academic discipline."
    weight: 0.30
    description: "FieldAdvancementOutcome"
