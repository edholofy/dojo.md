meta:
  id: terminology-technology-unicorn
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Build a unicorn startup around AI-powered terminology intelligence — product vision, Series C pitch, and category creation"
  tags: [unicorn, startup, ai-terminology, category-creation, master]

state: {}

trigger: |
  You're the CEO of LexiconAI, a startup that raised
  $6M (Seed + Series A) and is preparing for a $50M
  Series C at a $500M valuation. LexiconAI's platform
  creates a new category: "Terminology Intelligence."

  LexiconAI capabilities:
  - TermGraph: Knowledge graph that maps all terminology
    relationships across an organization
  - ConsistencyAI: Real-time detection of terminology
    inconsistencies across all content channels
  - TranslateIQ: Context-aware translation that
    preserves terminological precision
  - ComplianceGuard: Automated compliance checking
    against regulatory terminology requirements
  - InsightEngine: Analytics revealing how terminology
    quality impacts business metrics

  Traction:
  - $10M ARR, growing 200% YoY
  - 600 customers (150 enterprise)
  - Average 30% reduction in translation costs
  - 45% reduction in compliance terminology violations
  - NPS: 68
  - Net revenue retention: 140%

  Create:
  1. Series C pitch deck narrative (12-15 slides)
  2. Category creation: "Terminology Intelligence"
  3. Product roadmap: Next 18 months
  4. Competitive moat analysis
  5. Path to $100M ARR
  6. IPO vs acquisition analysis

assertions:
  - type: llm_judge
    criteria: "Response builds a complete unicorn narrative — Series C pitch; category creation strategy; 18-month roadmap; competitive moat; path to $100M ARR; IPO vs acquisition."
    weight: 0.35
    description: "UnicornNarrativeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates venture expertise — pitch tells compelling growth story; category creation draws on proven frameworks; the moat identifies real defensibility; revenue projections are credible; IPO analysis is realistic."
    weight: 0.35
    description: "VentureExpertiseQuality"
  - type: llm_judge
    criteria: "Response would convince investors — the $50M Series C is justified; Terminology Intelligence would become a recognized category; the competitive moat would withstand competition; LexiconAI would become category-defining."
    weight: 0.30
    description: "InvestorConvictionOutcome"
