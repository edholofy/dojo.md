meta:
  id: terminology-government-policy
  level: 5
  course: glossary-and-terminology-guides
  type: output
  description: "Draft national policy on terminology standardization — plain language requirements, regulatory terminology mandates, and cross-agency vocabulary standards"
  tags: [government-policy, standardization, plain-language, cross-agency, master]

state: {}

trigger: |
  You're the lead policy advisor to a commission on
  "Government Language and Citizen Access." The
  commission found that inconsistent government
  terminology is the #1 barrier to citizens accessing
  services.

  Key findings:
  - 47 federal agencies use different terms for the
    same concepts (e.g., "benefit," "entitlement,"
    "assistance," "aid" all mean different things)
  - Average government document reading level: grade 14
  - 38% of eligible citizens don't apply for benefits
    because they can't understand the terminology
  - Government call centers spend 40% of call time
    explaining terminology
  - Cross-agency data sharing fails because agencies
    define terms differently
  - Cost of terminology confusion: Estimated $8B/year
    in administrative waste

  Draft the policy framework:
  1. Commission report: "The Language Barrier" —
     how inconsistent terminology denies citizens
     access
  2. Government Terminology Standardization Act:
     - Title I: Plain Language Terminology Requirements
     - Title II: Cross-Agency Vocabulary Standards
     - Title III: Citizen-Tested Definitions
     - Title IV: Digital Glossary Infrastructure
     - Title V: Enforcement and Administration
  3. Implementation guidance
  4. Cost-benefit analysis
  5. Model state legislation

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy framework — commission report; 5-title legislative framework; implementation guidance; cost-benefit analysis; model state legislation."
    weight: 0.35
    description: "PolicyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy expertise — plain language requirements are measurable; cross-agency standards are enforceable; citizen testing is built into the process; the cost-benefit analysis quantifies the $8B waste; enforcement is practical."
    weight: 0.35
    description: "PolicyExpertiseQuality"
  - type: llm_judge
    criteria: "Response would improve citizen access — the 38% who don't apply for benefits would be reached; call center terminology explanations would decrease; cross-agency data sharing would improve; the policy would become a model."
    weight: 0.30
    description: "CitizenAccessOutcome"
