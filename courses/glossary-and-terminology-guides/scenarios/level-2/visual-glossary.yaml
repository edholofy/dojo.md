meta:
  id: visual-glossary
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Create a visual glossary combining illustrations, diagrams, and annotations to explain complex architectural and engineering concepts"
  tags: [visual-glossary, illustrations, diagrams, architecture, intermediate]

state: {}

trigger: |
  You're a technical communication designer at
  BuildSmart, a construction technology company.
  The platform serves architects, engineers, and
  contractors who need a shared vocabulary. Many
  terms are spatial or physical and benefit from
  visual explanation rather than text alone.

  Context:
  - Target audience: Mixed technical backgrounds
    (architects understand form, engineers understand
    forces, contractors understand installation)
  - Many terms have different meanings across disciplines
  - Text-only definitions have proven insufficient for
    spatial concepts
  - Platform includes 3D modeling tools where terms
    relate to visual elements

  Create a visual glossary strategy:
  1. Visual glossary design principles (when to use
     illustrations, diagrams, photos, 3D renders)
  2. Term classification system (text-only vs visual
     required vs interactive 3D)
  3. Write 10 glossary entries with visual specifications:
     - 4 entries with illustration/diagram descriptions
       (describe what the visual should show)
     - 3 entries with annotated photo specifications
     - 3 entries with text-only definitions (explaining
       why visuals aren't needed)
  4. Cross-disciplinary term disambiguation (same
     term, different meanings by role)
  5. Accessibility specifications for visual glossary
     (alt text, descriptions for screen readers)
  6. Production workflow for visual glossary assets
  7. Style guide for visual consistency

assertions:
  - type: llm_judge
    criteria: "Response creates a complete visual glossary strategy — design principles; classification system; 10 entries with visual specs (4 illustrated, 3 photo, 3 text-only); cross-disciplinary disambiguation; accessibility specs; production workflow; visual style guide."
    weight: 0.35
    description: "VisualGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates visual communication expertise — the classification system makes logical decisions about when visuals are needed; illustration descriptions would produce useful diagrams; cross-disciplinary disambiguation handles real terminological conflicts; accessibility doesn't sacrifice visual value."
    weight: 0.35
    description: "VisualCommunicationQuality"
  - type: llm_judge
    criteria: "Response would improve cross-disciplinary understanding — architects, engineers, and contractors would share a common visual vocabulary; spatial concepts would be clearly understood; disciplinary term conflicts would be resolved; the visual glossary would be a daily reference tool."
    weight: 0.30
    description: "CrossDisciplinaryUnderstandingOutcome"
