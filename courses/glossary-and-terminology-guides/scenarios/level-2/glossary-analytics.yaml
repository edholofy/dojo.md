meta:
  id: glossary-analytics
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Analyze glossary usage data and create an optimization plan to improve term coverage, findability, and reader comprehension"
  tags: [analytics, optimization, data-driven, usage-analysis, intermediate]

state: {}

trigger: |
  You're the content analyst at TechPulse, a B2B
  technology media company. The online glossary has
  500 terms and gets 80,000 monthly page views, but
  engagement metrics suggest problems.

  Analytics data:
  - Total terms: 500
  - Monthly page views: 80,000
  - Top 10 terms get 45% of all views
  - Bottom 200 terms get less than 10 views each/month
  - Average time on page: 28 seconds
  - "Was this helpful?" rating: 58% Yes
  - Bounce rate: 65%
  - Internal search for undefined terms: 150 unique
    queries/month with no glossary match
  - Top undefined search terms: "AI hallucination,"
    "prompt engineering," "RAG," "edge computing,"
    "digital twin," "quantum computing," "tokenization"
  - External referral: 35% of glossary traffic comes
    from Google
  - Most common exit: 48% leave site entirely after
    viewing a term
  - Mobile vs desktop: 62% mobile
  - Top performing definitions (by helpfulness rating):
    Definitions with examples (72% helpful) vs without
    examples (41% helpful)

  Create:
  1. Performance analysis report
  2. Term coverage gap analysis
  3. Content quality improvement plan (based on the
     examples vs no-examples finding)
  4. Prioritized optimization recommendations
  5. Rewrite 3 low-performing definitions with examples
  6. New term additions (write 5 definitions for the
     top undefined search terms)
  7. Engagement improvement strategy
  8. 90-day improvement plan with targets

assertions:
  - type: llm_judge
    criteria: "Response creates a complete analytics-driven optimization — performance report; gap analysis; quality improvement plan; prioritized recommendations; 3 rewritten definitions; 5 new term definitions; engagement strategy; 90-day plan with targets."
    weight: 0.35
    description: "GlossaryAnalyticsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates data analysis expertise — the 45% concentration in top 10 terms is addressed; the examples vs no-examples correlation is leveraged; 150 undefined searches represent clear content gaps; the 48% exit rate is analyzed; rewritten definitions show clear improvement."
    weight: 0.35
    description: "DataAnalysisExpertiseQuality"
  - type: llm_judge
    criteria: "Response would measurably improve glossary performance — helpfulness would increase above 58%; content gaps would be filled with trending terms; definitions with examples would become the standard; the optimization plan would justify continued glossary investment."
    weight: 0.30
    description: "MeasurableImprovementOutcome"
