meta:
  id: controlled-vocabulary
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Design a controlled vocabulary for a customer support knowledge base to ensure consistent terminology across agents, articles, and chatbots"
  tags: [controlled-vocabulary, support, consistency, terminology-management, intermediate]

state: {}

trigger: |
  You're the Knowledge Manager at CloudDesk, a help
  desk SaaS platform. An audit found that support
  agents, KB articles, and the chatbot all use
  different terms for the same concepts, confusing
  customers.

  Examples of terminology chaos:
  - "ticket" vs "case" vs "issue" vs "request" vs
    "inquiry" (all mean the same thing)
  - "agent" vs "rep" vs "associate" vs "team member"
  - "escalate" vs "transfer" vs "hand off" vs "route"
  - "resolve" vs "close" vs "complete" vs "finish"
  - "workspace" vs "account" vs "organization" vs
    "company"

  Impact: Customers search for "ticket" but articles
  say "case"; chatbot says "escalate" but agents say
  "transfer"; 22% of KB search queries return no
  results due to terminology mismatch.

  Design the controlled vocabulary:
  1. Controlled vocabulary document: Preferred terms
     vs. deprecated synonyms (cover 30+ term groups)
  2. Decision criteria for choosing preferred terms
  3. Term adoption plan for agents, KB articles, and
     chatbot
  4. Customer-facing vs. internal term mapping
  5. Glossary integration with the controlled vocabulary
  6. Search synonym configuration (so "ticket" finds
     "case" articles)
  7. Audit methodology for identifying inconsistencies
  8. Training material for 50 support agents
  9. Governance process for adding/changing terms

assertions:
  - type: llm_judge
    criteria: "Response creates a complete controlled vocabulary — 30+ term groups with preferred vs deprecated; decision criteria; adoption plan; customer vs internal mapping; glossary integration; search configuration; audit methodology; agent training; governance process."
    weight: 0.35
    description: "ControlledVocabularyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates terminology management expertise — preferred term selections are logical; the decision criteria are objective; adoption plan addresses all three channels (agents, KB, chatbot); search synonym configuration would fix the 22% no-results problem; governance prevents future drift."
    weight: 0.35
    description: "TerminologyManagementQuality"
  - type: llm_judge
    criteria: "Response would eliminate terminology chaos — customers would encounter consistent terms; KB search results would improve; chatbot and agent language would align; the 22% no-results rate would decrease dramatically; new agents would learn the correct terms from day one."
    weight: 0.30
    description: "TerminologyConsistencyOutcome"
