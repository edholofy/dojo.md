meta:
  id: glossary-version-control
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Design a glossary version control and change management system for a rapidly evolving technology product"
  tags: [version-control, change-management, product-terminology, evolution, intermediate]

state: {}

trigger: |
  You're the documentation lead at VelocityAI, a
  fast-growing AI platform that ships features weekly.
  The product glossary has become unreliable because
  terminology changes faster than documentation.

  Current problems:
  - Product renamed "Models" to "Agents" in the UI
    but glossary still says "Models"
  - Feature "Smart Routing" was deprecated 3 months
    ago but remains in the glossary
  - New features launch with no glossary entries
  - Different versions of the API use different terms
  - Customers reference old documentation with outdated
    terminology
  - No record of when or why terms changed

  Design a glossary version control system:
  1. Term lifecycle management (proposed → active →
     deprecated → archived)
  2. Change tracking system (what changed, when, why,
     who approved)
  3. Product release integration (glossary updates
     tied to feature releases)
  4. Deprecation workflow (how to sunset terms without
     breaking existing docs)
  5. Historical glossary access (users can view terms
     as they were at any version)
  6. Communication plan for terminology changes
  7. API versioning alignment (different API versions,
     different terms)
  8. Write examples of 5 term change records showing
     the system in action

assertions:
  - type: llm_judge
    criteria: "Response designs a complete version control system — term lifecycle stages; change tracking; product release integration; deprecation workflow; historical access; communication plan; API alignment; 5 example change records."
    weight: 0.35
    description: "VersionControlCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates documentation engineering expertise — the lifecycle stages are complete; change tracking is granular enough to be useful; product release integration would prevent terminology drift; the deprecation workflow protects existing documentation; API version alignment handles real multi-version complexity."
    weight: 0.35
    description: "DocumentationEngineeringQuality"
  - type: llm_judge
    criteria: "Response would eliminate terminology drift — product changes would trigger glossary updates; deprecated terms would be gracefully retired; customers would always find current terminology; the change history would explain past confusion."
    weight: 0.30
    description: "TerminologyDriftEliminationOutcome"
