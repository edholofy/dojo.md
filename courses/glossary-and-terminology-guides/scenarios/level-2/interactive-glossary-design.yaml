meta:
  id: interactive-glossary-design
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Design an interactive, searchable online glossary with hover definitions, contextual tooltips, and progressive disclosure"
  tags: [interactive, searchable, tooltips, ux-design, intermediate]

state: {}

trigger: |
  You're a UX content designer at DocuLearn, an
  enterprise documentation platform. Users reading
  technical documentation encounter unfamiliar terms
  but don't want to leave the page to look them up.
  Design an interactive glossary system.

  Current state:
  - Static glossary page with 300 terms (alphabetical)
  - Users must navigate away from their document to
    look up terms
  - No contextual help within documents
  - Analytics show glossary page gets traffic but
    users bounce back quickly (avg 15 seconds)

  Design the interactive glossary system:
  1. In-context tooltip design (hover/tap on highlighted
     terms shows definition without leaving page)
  2. Glossary search with autocomplete, fuzzy matching,
     and synonym support
  3. Progressive disclosure: Brief definition → full
     definition → related terms → examples
  4. Accessibility specifications (keyboard navigation,
     screen reader support, focus management)
  5. Mobile touch interaction design
  6. Term highlighting rules (when to highlight terms
     in documents, how to avoid visual clutter)
  7. Write 8 sample glossary entries showing all
     interaction levels (tooltip, expanded, full page)
  8. Analytics tracking plan for glossary interactions
  9. Technical implementation approach (CSS, JS,
     ARIA attributes)

assertions:
  - type: llm_judge
    criteria: "Response designs a complete interactive glossary — tooltip design; search with autocomplete; progressive disclosure levels; accessibility specs; mobile design; highlighting rules; 8 sample entries with all levels; analytics plan; technical approach."
    weight: 0.35
    description: "InteractiveGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates UX design expertise — tooltips don't obstruct reading; progressive disclosure has logical levels; accessibility is comprehensive; mobile interactions account for touch; term highlighting avoids visual overload; search handles synonyms and misspellings."
    weight: 0.35
    description: "UXDesignExpertiseQuality"
  - type: llm_judge
    criteria: "Response would improve term comprehension — users would learn terms without leaving their document; the 15-second bounce would be replaced with in-context learning; reading comprehension would improve; glossary engagement would increase measurably."
    weight: 0.30
    description: "ComprehensionImprovementOutcome"
