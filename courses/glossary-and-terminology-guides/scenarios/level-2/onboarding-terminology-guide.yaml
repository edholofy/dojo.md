meta:
  id: onboarding-terminology-guide
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Create a comprehensive onboarding terminology guide for a complex enterprise product with role-based learning paths"
  tags: [onboarding, role-based, enterprise, learning-paths, intermediate]

state: {}

trigger: |
  You're the customer education lead at DataForge,
  an enterprise data analytics platform. New users
  face a 60-day learning curve, and terminology is
  the #1 barrier. Different user roles need different
  subsets of terminology.

  User roles and their terminology needs:
  - Data Analysts: Query language, visualization types,
    data models, calculated fields
  - Admins: Permissions, data sources, governance,
    SSO, audit logs
  - Business Users: Dashboards, reports, KPIs, alerts,
    sharing
  - Data Engineers: ETL, pipelines, schemas, data
    warehouses, APIs

  Current state:
  - One flat glossary of 250 terms — overwhelming for
    new users
  - No indication of which terms matter for which role
  - No learning sequence (foundational → advanced)
  - New users report "glossary is just as confusing
    as the product"

  Create a role-based terminology guide:
  1. Role-based term sets (which terms each role needs)
  2. Learning sequence: Foundational → Intermediate →
     Advanced for each role
  3. "Day 1 Essentials" — the 10 terms every user must
     know regardless of role
  4. Write the complete "Day 1 Essentials" glossary
     (10 terms with rich definitions)
  5. Role-specific starter glossaries (15 terms each
     for 2 roles: Data Analyst and Business User)
  6. Cross-role terminology mapping (same concept,
     different names by role)
  7. Interactive onboarding quiz using glossary terms
  8. Integration with product UI (contextual term help)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete role-based terminology guide — role-based term sets; learning sequences; Day 1 Essentials (10 terms); role-specific glossaries for 2 roles (15 terms each); cross-role mapping; onboarding quiz; product UI integration."
    weight: 0.35
    description: "OnboardingGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates customer education expertise — role-based term sets are accurate; the learning sequence scaffolds complexity; Day 1 Essentials cover true foundational concepts; cross-role mapping addresses real terminology conflicts; the quiz reinforces learning; UI integration reduces context-switching."
    weight: 0.35
    description: "CustomerEducationQuality"
  - type: llm_judge
    criteria: "Response would reduce the 60-day learning curve — new users wouldn't be overwhelmed by 250 terms; each role would focus on relevant terminology; the Day 1 Essentials would provide immediate productivity; the learning sequence would build confidence progressively."
    weight: 0.30
    description: "LearningCurveReductionOutcome"
