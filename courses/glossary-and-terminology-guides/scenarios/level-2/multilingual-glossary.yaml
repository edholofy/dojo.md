meta:
  id: multilingual-glossary
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Create a multilingual glossary for a global product supporting 5 languages with translation standards and cultural adaptation"
  tags: [multilingual, translation, cultural-adaptation, global, intermediate]

state: {}

trigger: |
  You're the Localization Lead at FinFlow, a financial
  management app expanding to 5 markets. The English
  product glossary has 150 terms, but direct
  translation creates confusion because financial
  concepts differ across cultures.

  Markets and languages:
  - English (US) — source language
  - Spanish (Latin America) — FinFlow's largest
    non-English market
  - German — strict financial terminology standards
  - Japanese — significant concept differences in
    financial terms
  - Portuguese (Brazil) — unique financial system
    (Pix, Boleto, etc.)

  Challenges:
  - "Checking account" doesn't translate directly to
    all languages
  - Tax terminology is entirely country-specific
  - Some financial concepts don't exist in all markets
  - Regulatory terms need exact local equivalents
  - UI space constraints limit translation length

  Create:
  1. Multilingual glossary framework (how to structure
     a 5-language glossary)
  2. Translation vs. transcreation decision matrix
  3. Write 10 sample glossary entries showing the same
     term in all 5 languages with cultural notes
  4. Handling untranslatable concepts
  5. Term validation process (financial accuracy per
     market)
  6. UI and UX guidelines for glossary length in
     different scripts
  7. Translation memory and terminology database
     requirements
  8. Quality assurance for multilingual glossaries

assertions:
  - type: llm_judge
    criteria: "Response creates a complete multilingual glossary framework — structure for 5 languages; translation vs transcreation matrix; 10 sample entries in all 5 languages; untranslatable concept handling; validation process; UI guidelines; translation memory requirements; QA process."
    weight: 0.35
    description: "MultilingualGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates multilingual terminology expertise — financial term differences between markets are accurate; the translation vs transcreation matrix makes logical decisions; Japanese and Brazilian examples show real cultural adaptation; UI length constraints are practical."
    weight: 0.35
    description: "MultilingualExpertiseQuality"
  - type: llm_judge
    criteria: "Response would enable global product launch — each market would have accurate financial terminology; cultural missteps would be avoided; the glossary framework would scale to additional languages; term consistency would be maintained across product UI, help docs, and marketing."
    weight: 0.30
    description: "GlobalLaunchOutcome"
