meta:
  id: intermediate-glossary-shift
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Shift simulation — create a medical device glossary for regulatory submission, an API terminology guide for developers, and a wine terminology guide for consumers"
  tags: [shift-simulation, medical-device, api-documentation, wine, intermediate]

state: {}

trigger: |
  You're a senior technical writer handling three
  distinct glossary projects simultaneously.

  === PROJECT 1: MedDevice Regulatory Glossary ===
  A medical device company needs a terminology section
  for their FDA 510(k) submission. Terms must be
  precisely defined according to FDA regulatory
  standards.

  Write 8 glossary entries for:
  - Biocompatibility, Class II device, Predicate device,
    Substantial equivalence, Good Manufacturing Practice,
    Design controls, Risk analysis, Sterilization
    validation
  Format: Formal regulatory style with FDA/ISO
  references where applicable
  Constraints: Legally precise, no ambiguity

  === PROJECT 2: DevConnect API Terminology ===
  A developer tools company needs a terminology guide
  for their REST API documentation. Developers
  coming from different backgrounds (frontend, backend,
  mobile) use terms differently.

  Write 8 glossary entries for:
  - Endpoint, Payload, Authentication token, Rate
    limiting, Webhook, Idempotency, Pagination cursor,
    Schema validation
  Format: Technical but accessible, with code examples
  Constraints: Must be precise enough for implementation

  === PROJECT 3: VinVault Wine Glossary ===
  A premium wine subscription service needs a glossary
  for their app so subscribers can understand tasting
  notes and wine descriptions.

  Write 8 glossary entries for:
  - Tannin, Terroir, Varietal, Vintage, Body (wine),
    Bouquet, Finish, Decanting
  Format: Sensory-focused, experiential language
  Constraints: Sophisticated but not pretentious

  Write all three glossary sections (24 total entries).

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct glossary sections — 8 regulatory medical device terms, 8 API developer terms, 8 wine terms; each follows its prescribed format; all 24 entries are present with appropriate detail level."
    weight: 0.35
    description: "ShiftGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates register and domain adaptability — medical device definitions are legally precise with regulatory references; API definitions include technical precision with code-level examples; wine definitions use sensory language that educates without pretension; each glossary serves its unique professional context."
    weight: 0.35
    description: "DomainAdaptationQuality"
  - type: llm_judge
    criteria: "Each glossary would serve its purpose — the FDA submission glossary would pass regulatory review; developers would implement correctly from the API glossary; wine subscribers would enhance their tasting experience; all three demonstrate intermediate-level terminology expertise."
    weight: 0.30
    description: "ProfessionalEffectivenessOutcome"
