meta:
  id: glossary-style-guide
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Create a comprehensive glossary authoring style guide for a multi-product SaaS company ensuring definition consistency"
  tags: [style-guide, authoring-standards, consistency, multi-product, intermediate]

state: {}

trigger: |
  You're the content standards lead at PlatformOne,
  a SaaS company with 5 products. Each product team
  maintains its own glossary, resulting in the same
  term defined differently across products (e.g.,
  "workspace" means different things in 3 products).
  Create a unified glossary style guide.

  Current problems:
  - 5 separate glossaries with 800+ total definitions
  - 120+ terms defined differently across products
  - No standard definition format or length
  - Some definitions are 1 word, others are paragraphs
  - Acronyms handled inconsistently
  - Cross-references are broken or missing
  - No process for adding or updating terms

  Create a comprehensive glossary style guide:
  1. Definition writing standards (structure, length,
     tone, reading level)
  2. Term selection criteria (what gets a glossary
     entry and what doesn't)
  3. Handling conflicting definitions across products
  4. Acronym and abbreviation standards
  5. Cross-referencing and related terms standards
  6. Formatting rules (capitalization, punctuation,
     bold, italics)
  7. Update process and governance
  8. Include 5 before/after examples showing poor
     definitions rewritten to meet standards

assertions:
  - type: llm_judge
    criteria: "Response creates a complete glossary style guide — definition writing standards; term selection criteria; conflict resolution for multi-product terms; acronym standards; cross-referencing rules; formatting standards; update governance; 5 before/after examples."
    weight: 0.35
    description: "GlossaryStyleGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates terminology governance expertise — standards are specific enough to enforce; the multi-product conflict resolution is practical; before/after examples show clear improvement; the guide would be usable by multiple writing teams; acronym handling is comprehensive."
    weight: 0.35
    description: "TerminologyGovernanceQuality"
  - type: llm_judge
    criteria: "Response would unify glossary quality — the 120+ conflicting definitions would be resolved; new definitions would follow consistent standards; cross-references would work; the 5 product teams would produce consistent glossary entries."
    weight: 0.30
    description: "ConsistencyUnificationOutcome"
