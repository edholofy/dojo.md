meta:
  id: glossary-seo-optimization
  level: 2
  course: glossary-and-terminology-guides
  type: output
  description: "Create an SEO-optimized glossary that drives organic traffic through individual term pages with schema markup and internal linking"
  tags: [seo, organic-traffic, schema-markup, internal-linking, intermediate]

state: {}

trigger: |
  You're an SEO content strategist at LegalEase, an
  online legal services platform. The marketing team
  wants to build a legal glossary that captures search
  traffic from people looking up legal terms. Similar
  glossaries at competitor sites drive 100K+ monthly
  organic visits.

  SEO opportunity:
  - "What is a power of attorney" — 22,000 searches/mo
  - "What is probate" — 18,000 searches/mo
  - "What is an LLC" — 15,000 searches/mo
  - "What does indemnify mean" — 9,500 searches/mo
  - "What is a tort" — 8,200 searches/mo
  - "What is a lien" — 7,800 searches/mo
  - Dozens more terms with 1,000-5,000 searches/mo

  Create:
  1. Glossary page architecture (hub-and-spoke:
     main glossary page → individual term pages)
  2. Individual term page template optimized for SEO
     (structure, schema, meta tags, word count)
  3. Internal linking strategy (term pages → service
     pages → glossary hub)
  4. Write 5 full term pages as examples (500-800 words
     each with schema markup described)
  5. Keyword research methodology for glossary terms
  6. Content update and freshness strategy
  7. Featured snippet optimization for definition
     queries
  8. Success metrics and traffic projection model

assertions:
  - type: llm_judge
    criteria: "Response creates a complete SEO glossary strategy — hub-and-spoke architecture; term page template; internal linking strategy; 5 full term pages; keyword methodology; freshness strategy; featured snippet optimization; traffic projections."
    weight: 0.35
    description: "SEOGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates SEO expertise — hub-and-spoke architecture maximizes crawlability; term pages target real search volume; schema markup is valid; internal linking connects to service conversion; featured snippet format matches Google's definition pattern; keyword methodology is systematic."
    weight: 0.35
    description: "SEOExpertiseQuality"
  - type: llm_judge
    criteria: "Response would drive organic traffic — individual term pages would rank for definition queries; internal linking would drive service page conversions; the glossary would compete with established legal glossaries; traffic projections would justify the content investment."
    weight: 0.30
    description: "OrganicTrafficOutcome"
