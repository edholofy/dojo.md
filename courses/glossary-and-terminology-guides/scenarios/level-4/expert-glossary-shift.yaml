meta:
  id: expert-glossary-shift
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Shift simulation — design glossaries for a quantum computing startup, an indigenous language preservation project, and a space agency mission"
  tags: [shift-simulation, quantum-computing, indigenous-language, space-agency, expert]

state: {}

trigger: |
  You're the world's leading terminology strategist,
  hired for three extraordinary projects.

  === PROJECT 1: QuantumLeap — Quantum Computing ===
  A quantum computing startup needs a glossary for
  its developer documentation and investor pitch
  materials. The glossary must serve two audiences
  with vastly different needs.

  Write 8 terms covering:
  - Qubit, Superposition, Entanglement, Quantum gate,
    Decoherence, Quantum supremacy, Error correction,
    Quantum annealing
  For each term, provide:
  - Developer definition (precise, implementable)
  - Investor definition (accessible, business-oriented)
  - Visual metaphor suggestion

  === PROJECT 2: VoiceKeepers — Indigenous Language ===
  An indigenous language preservation nonprofit needs
  a bilingual glossary documenting 200 ecological
  terms in the Lakota language that have no direct
  English equivalent. These terms encode centuries
  of ecological knowledge.

  Write 6 sample entries showing:
  - The Lakota term (romanized)
  - Literal translation attempt
  - Ecological concept description (what the term
    encodes about the natural world)
  - Cultural context (how the term is used)
  - Why this term matters for ecological science
  Format: Respectful, culturally sensitive, collaborative
  with indigenous scholars

  === PROJECT 3: LunarBase — Space Agency ===
  A space agency is establishing terminology standards
  for its lunar base program. Terms must be precise
  enough for engineering but also work in public
  communications and international partner agreements.

  Write 8 terms covering:
  - Lunar regolith, In-situ resource utilization,
    Habitat module, Extravehicular activity, Cislunar
    space, Life support system, Radiation shielding,
    Crew rotation
  For each: Engineering definition + public
  communication definition + international standard
  alignment note

  Write all three glossary sections (22 total entries).

assertions:
  - type: llm_judge
    criteria: "Response creates three extraordinary glossary sections — 8 quantum terms with dual definitions and metaphors, 6 Lakota ecological terms with cultural context, 8 lunar base terms with engineering/public/international variants; all entries demonstrate expert-level terminology craft."
    weight: 0.35
    description: "ExtraordinaryGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery across unprecedented domains — quantum definitions serve both developers and investors; indigenous language entries respect cultural knowledge while connecting to science; space agency terms bridge engineering precision with public accessibility; each glossary pushes the boundaries of what terminology work can be."
    weight: 0.35
    description: "UnprecedentedDomainMastery"
  - type: llm_judge
    criteria: "Each glossary would serve its groundbreaking context — quantum developers would implement correctly while investors would understand value; indigenous ecological knowledge would be preserved and valued; lunar base operations would be precisely communicated across audiences and nations."
    weight: 0.30
    description: "GroundbreakingEffectivenessOutcome"
