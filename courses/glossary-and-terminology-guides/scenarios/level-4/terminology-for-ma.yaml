meta:
  id: terminology-for-ma
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Design a terminology harmonization program for a major merger integrating two companies with conflicting vocabularies across products, processes, and cultures"
  tags: [merger, terminology-harmonization, integration, cultural, expert]

state: {}

trigger: |
  You're the Integration Terminology Lead for a $3B
  merger between AlphaCloud (enterprise cloud platform,
  5,000 employees) and BetaData (data analytics
  company, 3,000 employees). Both companies have
  mature but completely different terminology for
  overlapping products and processes.

  Terminology conflicts:
  - AlphaCloud's "Workspace" = BetaData's "Project"
  - AlphaCloud's "Pipeline" (CI/CD) ≠ BetaData's
    "Pipeline" (data processing)
  - AlphaCloud's "Team" = BetaData's "Organization"
  - "Dashboard" means different things in each product
  - Internal processes: AlphaCloud's "Sprint Review"
    = BetaData's "Demo Day"
  - Customer-facing: 15,000 customers use AlphaCloud
    terms, 8,000 use BetaData terms

  Constraints:
  - Day 1 deadline for unified customer communications
  - Both products continue to operate independently
    for 12 months (phased integration)
  - 23,000 employees need a shared vocabulary
  - Customer migration must not create confusion
  - Brand decision: New brand "OmniStack" will replace
    both within 18 months

  Design the terminology harmonization program:
  1. Terminology audit and conflict inventory
  2. Decision framework: Keep AlphaCloud term, keep
     BetaData term, create new term, or maintain both
     during transition
  3. Customer communication strategy for terminology
     changes
  4. Employee communication and training plan
  5. Product UI terminology migration roadmap
  6. Documentation and help content update plan
  7. Write 8 sample harmonization decisions with
     rationale
  8. Transition glossary: "Rosetta Stone" document
     mapping old terms to new
  9. Risk register for terminology-related integration
     risks

assertions:
  - type: llm_judge
    criteria: "Response creates a complete harmonization program — audit and inventory; decision framework; customer communication; employee training; UI migration roadmap; documentation update plan; 8 sample decisions; Rosetta Stone document; risk register."
    weight: 0.35
    description: "HarmonizationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates M&A integration expertise — the decision framework handles politically sensitive term choices; customer communication prevents confusion; the Rosetta Stone bridges both vocabularies; the 12-month phased approach is realistic; cultural sensitivity is addressed."
    weight: 0.35
    description: "MAIntegrationQuality"
  - type: llm_judge
    criteria: "Response would enable smooth merger integration — 23,000 employees would share a vocabulary; 23,000 customers wouldn't be confused; product UIs would transition systematically; the OmniStack brand would launch with unified terminology."
    weight: 0.30
    description: "MergerIntegrationOutcome"
