meta:
  id: terminology-book-proposal
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Write a book proposal and two sample chapters for 'The Terminology Advantage' — making the case for strategic terminology management"
  tags: [book-proposal, thought-leadership, publishing, strategic, expert]

state: {}

trigger: |
  You're writing the definitive book on enterprise
  terminology management. After 18 years building
  terminology programs at 3 Fortune 500 companies,
  you've developed the "Terminology Maturity Model"
  (TMM) framework. A major publisher has requested
  a proposal.

  Book concept: "The Terminology Advantage: How
  Precise Language Drives Business Performance"

  Your TMM framework:
  - Level 1: Chaotic (No terminology management,
    everyone uses their own terms)
  - Level 2: Reactive (Glossary exists but isn't
    maintained, used inconsistently)
  - Level 3: Managed (Formal glossary with governance,
    regular updates)
  - Level 4: Optimized (Terminology integrated into
    workflows, measured, automated)
  - Level 5: Strategic (Terminology drives product
    decisions, data quality, and customer experience)

  Create:
  1. Book proposal (overview, audience, chapter outline
     of 12 chapters, comp titles, author platform)
  2. Sample Chapter 1: "The $10 Million Typo" — how
     a terminology inconsistency caused a regulatory
     rejection that cost a company $10M and 18 months
     (~3,000 words)
  3. Sample Chapter 6: "Assessing Your Terminology
     Maturity" — presenting the TMM framework with
     self-assessment tool (~3,000 words)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal and chapters — proposal with overview, audience, 12-chapter outline, comp titles, platform; Chapter 1 with narrative (~3,000 words); Chapter 6 with TMM framework and assessment (~3,000 words)."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates publishing and thought leadership expertise — the proposal follows industry conventions; Chapter 1 hooks with compelling narrative; Chapter 6 presents actionable framework; the TMM is logical and useful; the book fills a genuine gap."
    weight: 0.35
    description: "ThoughtLeadershipQuality"
  - type: llm_judge
    criteria: "Response would get published — the market potential is clear; the TMM framework is quotable and assessable; sample chapters demonstrate writing quality; the target audience would buy the book."
    weight: 0.30
    description: "PublishingViabilityOutcome"
