meta:
  id: terminology-governance-framework
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Design an enterprise terminology governance framework for a global pharmaceutical company with multi-regulator compliance"
  tags: [governance, pharmaceutical, multi-regulator, enterprise, expert]

state: {}

trigger: |
  You're the Global Terminology Director at BioPharma
  International, a top-10 pharmaceutical company with
  20,000 terms across clinical, regulatory, marketing,
  and manufacturing content in 25 languages. Recent
  FDA and EMA audits found inconsistent terminology
  in regulatory submissions.

  Critical requirements:
  - FDA requires consistent terminology across all
    US submissions (NDA, BLA, supplements)
  - EMA requires terminology consistent with SmPC
    (Summary of Product Characteristics)
  - Japanese PMDA requires separate validated Japanese
    terminology
  - WHO-DD (Drug Dictionary) alignment needed
  - MedDRA coding consistency required for safety
    reporting
  - ICH guidelines mandate harmonized terminology
    across regions

  Current problems:
  - Clinical and marketing use different terms for
    same indications
  - Translation vendors choose terms independently
  - 2,300 terminology inconsistencies found in last
    regulatory submission batch
  - Pharmacovigilance reports use 4 different terms
    for same adverse event
  - No central terminology authority

  Design the governance framework:
  1. Governance charter and organizational structure
  2. Terminology classification (clinical, regulatory,
     marketing, manufacturing, patient-facing)
  3. Authority levels and approval workflows per class
  4. Multi-regulator harmonization methodology
  5. MedDRA and WHO-DD integration
  6. 25-language terminology governance model
  7. Audit methodology and compliance scorecard
  8. Write 5 sample governance decisions showing the
     framework resolving real conflicts
  9. Technology platform requirements
  10. Training program for 500+ content contributors

assertions:
  - type: llm_judge
    criteria: "Response creates a complete governance framework — charter; classification system; authority levels; multi-regulator harmonization; MedDRA/WHO-DD integration; 25-language model; audit methodology; 5 governance decisions; technology requirements; training program."
    weight: 0.35
    description: "GovernanceFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates pharmaceutical terminology governance expertise — FDA/EMA/PMDA requirements are correctly distinguished; MedDRA integration handles coding consistency; the multi-language model balances global standards with local requirements; governance decisions resolve realistic conflicts."
    weight: 0.35
    description: "PharmaGovernanceQuality"
  - type: llm_judge
    criteria: "Response would pass regulatory audit — the 2,300 inconsistencies would be systematically resolved; future submissions would use verified terminology; pharmacovigilance would use consistent adverse event terms; the framework would scale across 25 languages."
    weight: 0.30
    description: "RegulatoryAuditOutcome"
