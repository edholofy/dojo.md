meta:
  id: glossary-platform-product
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Design a next-generation terminology management SaaS platform with AI-powered features, marketplace, and enterprise governance"
  tags: [product-design, saas-platform, ai-terminology, marketplace, expert]

state: {}

trigger: |
  You're the co-founder and CPO of TerminusAI, a
  startup building the next-generation terminology
  management platform. You've raised $5M in seed
  funding to build a product that makes spreadsheet-
  based terminology management obsolete.

  Market analysis:
  - 80% of companies manage terminology in spreadsheets
  - Existing TMS tools are built for translators, not
    for entire organizations
  - No tool combines AI-powered term extraction with
    enterprise governance
  - Market size: $1.5B in terminology + data governance
  - Target: 5,000 paying customers in 3 years

  Product vision:
  - TermExtract AI: Auto-discovers undefined terms in
    documentation, code, and communications
  - SmartDefine: AI drafts definitions with confidence
    scores and source citations
  - Consistency Engine: Detects terminology conflicts
    across all company content
  - Terminology Marketplace: Pre-built industry
    glossaries (legal, medical, finance, tech)
  - Enterprise Governance: Approval workflows, audit
    trails, role-based access
  - Integration Hub: Connects with docs (Notion,
    Confluence), CMS (Contentful), code (GitHub),
    translation (memoQ)

  Design the product:
  1. Product requirements document
  2. AI feature specifications
  3. Marketplace model (contributor program, quality
     control, pricing)
  4. Enterprise governance capabilities
  5. Integration architecture
  6. Pricing strategy (freemium → Team → Enterprise)
  7. Go-to-market plan
  8. 12-month product roadmap
  9. Competitive differentiation

assertions:
  - type: llm_judge
    criteria: "Response designs a complete terminology platform — PRD; AI feature specs; marketplace model; governance capabilities; integration architecture; pricing; go-to-market; 12-month roadmap; competitive differentiation."
    weight: 0.35
    description: "PlatformProductCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product management expertise — AI features are technically feasible; the marketplace creates network effects; governance meets enterprise requirements; integrations connect to real tools; pricing balances growth with revenue; competitive positioning is defensible."
    weight: 0.35
    description: "ProductManagementQuality"
  - type: llm_judge
    criteria: "Response would attract customers and investment — the product solves real pain points; AI features differentiate from spreadsheets; the marketplace creates a moat; enterprise governance enables large deals; the go-to-market plan is realistic."
    weight: 0.30
    description: "ProductMarketFitOutcome"
