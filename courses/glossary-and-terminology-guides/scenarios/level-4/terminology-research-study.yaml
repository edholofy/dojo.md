meta:
  id: terminology-research-study
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Design and execute a research study measuring the business impact of terminology management across 150 enterprises"
  tags: [research, business-impact, enterprise, measurement, expert]

state: {}

trigger: |
  You're a research director at a management
  consulting firm conducting the first comprehensive
  study on the business impact of terminology
  management. Companies spend millions on data
  governance but ignore terminology — you want to
  quantify what that costs.

  Study parameters:
  - Sample: 150 enterprises (50 tech, 50 financial
    services, 50 healthcare)
  - Hypothesis: Companies with formal terminology
    programs have measurably better outcomes in data
    quality, translation costs, regulatory compliance,
    and employee productivity
  - Timeline: 8-month study
  - Budget: $200,000
  - Data: Surveys, interviews, terminology audits,
    financial data

  Design the complete study:
  1. Research questions and hypotheses (5-7)
  2. Terminology Maturity Model (TMM): 5 levels with
     assessment criteria
  3. Methodology (mixed methods: quantitative surveys
     + qualitative interviews + terminology audits)
  4. Survey instrument design (30-40 items)
  5. Sample selection and recruitment strategy
  6. Statistical analysis plan
  7. Write a sample findings section with realistic
     data visualizations described
  8. ROI calculation methodology (linking terminology
     to cost savings)
  9. Practical recommendations for executives
  10. Study limitations and future research

assertions:
  - type: llm_judge
    criteria: "Response designs a complete research study — research questions; TMM with 5 levels; mixed methodology; survey instrument; sample strategy; statistical plan; sample findings; ROI methodology; executive recommendations; limitations."
    weight: 0.35
    description: "ResearchStudyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — the TMM captures meaningful maturity progression; mixed methods triangulate findings; the survey instrument measures real business outcomes; statistical analysis is appropriate; ROI calculations link terminology to tangible costs."
    weight: 0.35
    description: "ResearchMethodologyQuality"
  - type: llm_judge
    criteria: "Response would produce actionable findings — executives would understand the cost of poor terminology; the TMM would be adopted for self-assessment; ROI data would justify terminology investments; the study would be cited in business cases for terminology programs."
    weight: 0.30
    description: "ActionableFindingsOutcome"
