meta:
  id: terminology-certification-program
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Design a professional certification program for terminologists with competency model, curriculum, and credentialing system"
  tags: [certification, professional-development, competency-model, credentialing, expert]

state: {}

trigger: |
  You're the founding president of the International
  Terminology Professionals Association (ITPA). The
  field has no standardized credential — terminologists
  come from translation, technical writing, library
  science, or data governance backgrounds with no
  common professional identity.

  Market need:
  - 50,000+ professionals worldwide work with
    terminology (estimated)
  - No certification distinguishes qualified
    terminologists from general writers
  - Employers can't evaluate terminology competency
  - The field is evolving with AI, NLP, and knowledge
    graphs
  - ISO 17100 mentions terminologist role but doesn't
    certify individuals

  Design the certification program:
  1. Certification framework: 3 tiers (Associate
     Terminologist, Certified Terminologist, Master
     Terminologist) with prerequisites
  2. Competency model: 8 core competencies with
     proficiency levels
  3. Curriculum for each tier
  4. Assessment methodology (exam, portfolio, practical
     project)
  5. Write 2 sample exam questions per tier (6 total)
     with scoring rubrics
  6. Recertification requirements
  7. Program governance and advisory board
  8. Revenue model and pricing strategy
  9. Launch and marketing plan

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification program — 3-tier framework; 8 competencies; curriculum per tier; assessment methodology; 6 exam questions with rubrics; recertification; governance; revenue model; launch plan."
    weight: 0.35
    description: "CertificationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates certification design expertise — competencies cover the full breadth of terminology work; tiers represent genuine skill progression; assessments test practical ability; exam questions are rigorous; the curriculum prepares for AI-era terminology work."
    weight: 0.35
    description: "CertificationDesignQuality"
  - type: llm_judge
    criteria: "Response would professionalize the field — employers would recognize the credential; terminologists would invest in certification; the competency model would define the profession; the certification would be financially sustainable."
    weight: 0.30
    description: "ProfessionalizationOutcome"
