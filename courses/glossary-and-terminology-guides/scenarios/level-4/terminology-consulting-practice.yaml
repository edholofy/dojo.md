meta:
  id: terminology-consulting-practice
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Build a terminology consulting practice with diagnostic methodology, service offerings, and client engagement model"
  tags: [consulting, practice-building, diagnostic, service-offerings, expert]

state: {}

trigger: |
  You're launching a boutique consulting practice
  specializing in enterprise terminology management.
  After 15 years at Fortune 500 companies managing
  terminology programs, you've developed a proprietary
  "Terminology Health Index" (THI) methodology.

  Build your consulting practice:
  1. Service catalog: 6 distinct service offerings
     with pricing (assessment, strategy, implementation,
     training, TMS selection, ongoing governance)
  2. Terminology Health Index methodology:
     - 10 dimensions of terminology health
     - Scoring rubric for each dimension (1-10)
     - Data collection and assessment process
     - Benchmarking database structure
  3. Write 3 client proposals:
     - Proposal A: Series C SaaS startup (300 terms,
       no governance, 5 product teams using different
       vocabulary)
     - Proposal B: Global bank (8,000 terms, 4
       languages, regulatory compliance)
     - Proposal C: Government agency (2,000 terms,
       plain language mandate, accessibility)
  4. Client engagement model
  5. Case study template with ROI framework

assertions:
  - type: llm_judge
    criteria: "Response builds a complete consulting practice — 6 service offerings; THI with 10 dimensions and scoring; 3 tailored proposals; client engagement model; case study template with ROI."
    weight: 0.35
    description: "ConsultingPracticeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates consulting expertise — the THI methodology is rigorous and differentiated; proposals are tailored to distinct client situations; pricing is realistic; the engagement model manages expectations; ROI framework quantifies terminology value."
    weight: 0.35
    description: "ConsultingExpertiseQuality"
  - type: llm_judge
    criteria: "Response would win clients — the THI creates a compelling diagnostic tool; proposals demonstrate clear value; the practice would be sustainable and scalable; clients would see measurable improvement from engagement."
    weight: 0.30
    description: "ClientAcquisitionOutcome"
