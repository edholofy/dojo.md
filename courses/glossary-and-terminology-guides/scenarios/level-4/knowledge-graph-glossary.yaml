meta:
  id: knowledge-graph-glossary
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Design a knowledge graph-powered glossary that models semantic relationships between terms, concepts, and domains"
  tags: [knowledge-graph, semantic, relationships, concept-modeling, expert]

state: {}

trigger: |
  You're the Chief Knowledge Architect at ScienceHub,
  a research platform used by 50,000 scientists across
  12 disciplines. The platform's glossary of 5,000
  scientific terms is flat and alphabetical, but
  scientific concepts are deeply interconnected. You
  want to build a knowledge graph that models how
  terms relate to each other across disciplines.

  Vision:
  - A scientist looking up "CRISPR" should see
    connections to gene editing, genomics, bioethics,
    molecular biology, and related techniques
  - Cross-disciplinary connections should reveal that
    "machine learning" in computer science relates to
    "computational biology" in life sciences
  - The graph should identify terminology gaps (missing
    concepts that should be defined)

  Design the knowledge graph glossary:
  1. Ontology design (entity types: Term, Concept,
     Domain, Technique, Application, Relationship)
  2. Relationship types (is-a, part-of, used-in,
     related-to, supersedes, contradicts)
  3. Graph construction methodology for 5,000 terms
  4. Cross-disciplinary connection mapping
  5. Write 8 detailed graph entries showing entities,
     properties, and relationships with connected terms
  6. Visualization design for scientists navigating
     the graph
  7. Search architecture (semantic search over the
     graph)
  8. Term gap detection using graph topology
  9. Technical implementation (Neo4j, RDF, SPARQL)
  10. Maintenance and growth strategy

assertions:
  - type: llm_judge
    criteria: "Response designs a complete knowledge graph glossary — ontology; relationship types; construction methodology; cross-disciplinary mapping; 8 graph entries; visualization design; semantic search; gap detection; technical implementation; maintenance strategy."
    weight: 0.35
    description: "KnowledgeGraphCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates knowledge engineering expertise — the ontology captures real scientific relationships; cross-disciplinary connections are meaningful; the graph construction methodology handles 5,000 terms; visualization helps scientists navigate complexity; gap detection uses graph topology intelligently."
    weight: 0.35
    description: "KnowledgeEngineeringQuality"
  - type: llm_judge
    criteria: "Response would transform scientific term discovery — scientists would discover cross-disciplinary connections; the flat glossary would become a navigable knowledge network; terminology gaps would be identified; the graph would grow organically as new research emerges."
    weight: 0.30
    description: "ScientificDiscoveryOutcome"
