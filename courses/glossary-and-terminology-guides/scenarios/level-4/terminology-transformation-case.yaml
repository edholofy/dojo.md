meta:
  id: terminology-transformation-case
  level: 4
  course: glossary-and-terminology-guides
  type: output
  description: "Execute a complete terminology transformation for a struggling enterprise — audit, strategy, implementation, and executive ROI reporting"
  tags: [transformation, enterprise, audit, executive-reporting, expert]

state: {}

trigger: |
  You're a senior consultant brought in to transform
  the terminology program at DataCorp, an enterprise
  data platform company with $400M ARR. The CEO asked:
  "Why can't our customers understand our product?"

  The reality:
  - Product UI uses 180 unique terms
  - Documentation uses 250 different terms (70+ not
    in the UI)
  - Marketing uses yet another set of terms
  - Customer onboarding survey: 65% cite "confusing
    terminology" as top barrier
  - Support tickets mentioning terminology confusion:
    8,500/month
  - Churn analysis: "couldn't understand the product"
    is #3 churn reason
  - Competitor's product is technically inferior but
    has clearer terminology
  - NPS impact: 15-point drag attributed to confusion
  - Budget: $500K over 12 months

  Execute the complete transformation:
  1. Executive diagnosis (data-driven, 2-page summary)
  2. Terminology audit: Product UI vs docs vs marketing
     vs support — where are the mismatches?
  3. Customer research: What terms do customers use
     vs what the product uses?
  4. Target state: Unified terminology framework
  5. Quick wins: 5 terminology changes that impact
     metrics within 30 days
  6. 12-month transformation roadmap
  7. Content strategy: How to update UI, docs, and
     marketing simultaneously
  8. ROI model: How $500K investment reduces churn
     and support costs
  9. Monthly executive dashboard template
  10. Risk register and mitigation strategies

assertions:
  - type: llm_judge
    criteria: "Response executes a complete terminology transformation — executive diagnosis; terminology audit; customer research; unified framework; quick wins; 12-month roadmap; content strategy; ROI model; executive dashboard; risk register."
    weight: 0.35
    description: "TransformationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates transformation expertise — the diagnosis identifies terminology as a business problem, not just a content problem; customer research bridges the vocabulary gap; quick wins show immediate impact; the ROI model connects terminology to churn reduction and support cost savings."
    weight: 0.35
    description: "TransformationExpertiseQuality"
  - type: llm_judge
    criteria: "Response would deliver measurable results — the 65% confusion rate would decrease; 8,500 monthly terminology tickets would drop; churn from confusion would reduce; NPS would improve; the CEO's question would be answered with data."
    weight: 0.30
    description: "MeasurableTransformationOutcome"
