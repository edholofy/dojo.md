meta:
  id: glossary-content-operations
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Build a glossary content operations program with editorial workflows, subject matter expert collaboration, and automated quality assurance"
  tags: [content-operations, editorial-workflow, sme-collaboration, automation, advanced]

state: {}

trigger: |
  You're the Content Operations Manager at DataVerse,
  an enterprise data platform. The glossary is critical
  (it's embedded in the product UI, documentation,
  training, and marketing) but is managed by one
  person who's leaving next month.

  Current state:
  - 450 glossary terms across 8 product modules
  - Single owner (departing) — no one else knows the
    process
  - SMEs (subject matter experts) are asked to review
    terms but response rate is 20%
  - New terms are requested via Slack messages that
    get lost
  - No quality standards — some definitions are one
    word, others are 500 words
  - Terms appear in product UI, docs, training, and
    marketing — updates must cascade
  - Product team adds new features monthly that need
    glossary coverage
  - Average time from term request to publication:
    45 days

  Build the content operations program:
  1. Operational model: Roles, responsibilities, and
     succession planning
  2. Term request and intake process (formal workflow)
  3. SME collaboration framework (templates, SLAs,
     incentives to improve from 20% response rate)
  4. Quality assurance automation (definition length,
     reading level, cross-reference validation)
  5. Multi-channel publication workflow (product UI →
     docs → training → marketing)
  6. Product release integration (new features trigger
     glossary updates)
  7. Metrics dashboard for glossary operations
  8. Knowledge transfer plan for the departing owner
  9. Tooling and automation recommendations

assertions:
  - type: llm_judge
    criteria: "Response creates a complete content operations program — operational model with succession; intake process; SME collaboration framework; QA automation; multi-channel publication; product release integration; metrics dashboard; knowledge transfer plan; tooling recommendations."
    weight: 0.35
    description: "ContentOpsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates content operations expertise — the operational model eliminates single-point-of-failure risk; SME collaboration addresses the 20% response rate; QA automation enforces quality standards; multi-channel publication ensures consistency; the 45-day turnaround would decrease significantly."
    weight: 0.35
    description: "ContentOpsExpertiseQuality"
  - type: llm_judge
    criteria: "Response would transform glossary operations — the departing owner's knowledge would be captured; new terms would be published faster than 45 days; SME response rate would improve; quality would be consistent; the glossary would stay current with monthly product releases."
    weight: 0.30
    description: "OperationalTransformationOutcome"
