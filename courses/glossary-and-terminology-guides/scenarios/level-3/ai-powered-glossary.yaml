meta:
  id: ai-powered-glossary
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Design an AI-powered terminology system that auto-extracts terms, suggests definitions, detects inconsistencies, and maintains glossary freshness"
  tags: [ai-powered, auto-extraction, nlp, term-detection, advanced]

state: {}

trigger: |
  You're the AI Product Manager at DocuFlow, a
  documentation platform used by 2,000 companies.
  You're building an AI-powered glossary feature that
  automatically manages terminology for customers.

  Feature vision:
  - Auto-Extract: AI scans product documentation and
    identifies undefined terms that should have glossary
    entries
  - Auto-Suggest: AI drafts definitions based on how
    terms are used in context across the documentation
  - Inconsistency Detection: AI flags when the same
    term is used with different meanings in different
    documents
  - Freshness Monitor: AI detects when glossary
    definitions are outdated based on documentation
    changes
  - Synonym Detection: AI identifies when different
    terms are used for the same concept

  Budget: $400K development investment
  Target: Ship MVP in 6 months

  Design the AI glossary system:
  1. System architecture (NLP pipeline, ML models,
     data flow)
  2. Term extraction algorithm design
  3. Definition generation approach (with human review)
  4. Inconsistency detection methodology
  5. Freshness scoring algorithm
  6. Synonym clustering approach
  7. User experience: How customers interact with AI
     suggestions (accept, modify, reject workflow)
  8. Training data and model improvement strategy
  9. Write 5 examples showing AI-generated outputs
     (extracted terms, suggested definitions,
     inconsistency alerts)
  10. MVP scope and 6-month development roadmap

assertions:
  - type: llm_judge
    criteria: "Response designs a complete AI glossary system — system architecture; term extraction; definition generation; inconsistency detection; freshness scoring; synonym clustering; user experience; training strategy; 5 AI output examples; MVP roadmap."
    weight: 0.35
    description: "AIGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates AI/NLP product expertise — the NLP pipeline handles real terminology challenges; definition generation includes human-in-the-loop; inconsistency detection is technically feasible; freshness scoring uses meaningful signals; the MVP scope is realistic for $400K/6 months."
    weight: 0.35
    description: "AINLPExpertiseQuality"
  - type: llm_judge
    criteria: "Response would automate glossary management — customers would discover undefined terms automatically; definitions would be drafted faster; inconsistencies would be caught; outdated definitions would be flagged; the feature would differentiate DocuFlow from competitors."
    weight: 0.30
    description: "AutomationImpactOutcome"
