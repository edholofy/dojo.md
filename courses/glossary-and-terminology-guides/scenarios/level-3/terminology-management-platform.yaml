meta:
  id: terminology-management-platform
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Evaluate and implement a terminology management system for a global organization with multilingual requirements and compliance needs"
  tags: [tms, implementation, multilingual, compliance, advanced]

state: {}

trigger: |
  You're the Terminology Program Manager at GlobalPharma,
  a pharmaceutical company operating in 35 countries
  with 18 languages. The company manages 15,000+
  terms across clinical, regulatory, marketing, and
  patient-facing content. Currently, terminology is
  managed in spreadsheets.

  Business requirements:
  - Centralized terminology database for 15,000+ terms
  - 18-language support with translation workflows
  - Regulatory compliance (FDA, EMA, PMDA require
    consistent terminology in submissions)
  - Integration with translation management system
    (memoQ) and content management system (Veeva)
  - Role-based access (terminologists, translators,
    reviewers, consumers)
  - Audit trail for regulatory compliance
  - API access for automated term checking
  - Term approval workflows with multi-level review

  Evaluate and implement:
  1. Requirements analysis and vendor evaluation matrix
     (evaluate 4 TMS platforms)
  2. Data migration plan (spreadsheets → TMS)
  3. Taxonomy and term structure design for the TMS
  4. Translation workflow integration
  5. Compliance and audit trail specifications
  6. User training plan for 200+ users across roles
  7. Implementation timeline (12 months)
  8. Write sample term entries showing the TMS data
     model (5 terms with all metadata fields)
  9. ROI justification and success metrics

assertions:
  - type: llm_judge
    criteria: "Response creates a complete TMS implementation plan — vendor evaluation matrix; data migration plan; taxonomy design; translation workflow; compliance specs; user training; 12-month timeline; 5 sample entries with metadata; ROI justification."
    weight: 0.35
    description: "TMSImplementationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates terminology management expertise — vendor evaluation criteria are comprehensive; the data migration handles 15,000+ terms; taxonomy design supports 18 languages; compliance specifications address FDA/EMA requirements; the training plan covers 200+ users across diverse roles."
    weight: 0.35
    description: "TerminologyManagementQuality"
  - type: llm_judge
    criteria: "Response would modernize terminology management — spreadsheet chaos would be eliminated; translation consistency would improve; regulatory submissions would use verified terminology; the TMS would integrate with existing tools; the $ROI would justify the investment."
    weight: 0.30
    description: "TerminologyModernizationOutcome"
