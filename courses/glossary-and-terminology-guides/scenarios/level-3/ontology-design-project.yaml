meta:
  id: ontology-design-project
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Design a domain ontology for a healthcare information system connecting medical terminology, clinical workflows, and patient data"
  tags: [ontology, healthcare, domain-modeling, knowledge-representation, advanced]

state: {}

trigger: |
  You're a knowledge engineer at HealthBridge, a
  health information exchange connecting 200 hospitals,
  5,000 clinics, and 50 insurance companies. The
  system needs a unified ontology to ensure that
  when a hospital says "discharge," a clinic says
  "referral received," and an insurer says "claim
  eligible" — the system understands these are related
  events in the same patient journey.

  Current state:
  - Each hospital uses its own medical terminology
  - ICD-10, SNOMED CT, and LOINC are partially adopted
  - Clinical workflows describe similar processes with
    different terminology
  - Patient records can't be reliably matched across
    organizations
  - Insurance claims use different codes than clinical
    records

  Design the healthcare ontology:
  1. Ontology scope and design methodology
  2. Core entity classes (Patient, Provider, Encounter,
     Diagnosis, Procedure, Medication, Claim, etc.)
  3. Relationship types and properties
  4. Mapping to existing standards (ICD-10, SNOMED CT,
     LOINC, HL7 FHIR)
  5. Write 8 detailed ontology entries showing
     entities, properties, and relationships
  6. Terminology harmonization methodology (how to
     map institution-specific terms to the ontology)
  7. Use case demonstrations (show how the ontology
     resolves 3 real integration scenarios)
  8. Governance for ontology maintenance
  9. Technical implementation (OWL, RDF, SPARQL)

assertions:
  - type: llm_judge
    criteria: "Response designs a complete healthcare ontology — scope and methodology; core entity classes; relationship types; standards mapping (ICD-10, SNOMED, LOINC, FHIR); 8 detailed entries; harmonization methodology; 3 use case demos; governance; technical implementation."
    weight: 0.35
    description: "OntologyDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates knowledge engineering expertise — entity classes model real clinical workflows; relationships capture meaningful clinical connections; standards mapping is technically sound; the harmonization methodology would work with diverse institutional vocabularies; technical implementation choices are appropriate."
    weight: 0.35
    description: "KnowledgeEngineeringQuality"
  - type: llm_judge
    criteria: "Response would enable health information exchange — patient journeys would be trackable across 200 hospitals; clinical and insurance terminology would be reconciled; the ontology would scale to new participating organizations; data interoperability would improve dramatically."
    weight: 0.30
    description: "HealthInteroperabilityOutcome"
