meta:
  id: enterprise-terminology-strategy
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Design a unified enterprise terminology management strategy for a multi-division corporation with conflicting vocabularies across business units"
  tags: [enterprise, terminology-management, multi-division, unification, advanced]

state: {}

trigger: |
  You're the Chief Data Officer's terminology advisor
  at OmniCorp, a conglomerate with 4 divisions
  (Financial Services, Healthcare, Manufacturing,
  Technology). A failed data integration project
  revealed that divisions use different terms for
  the same concepts, making cross-division reporting
  impossible.

  The problem:
  - "Customer" means individual in FinServ, patient in
    Healthcare, account in Manufacturing, user in Tech
  - 4 separate glossaries with 2,000+ combined terms
  - 340+ terms with conflicting definitions
  - Data warehouse can't reconcile reports across
    divisions
  - Regulatory filings use inconsistent terminology
  - M&A integration stalls on terminology mapping

  Budget: $1.5M over 18 months
  Stakeholders: 4 division heads, CDO, CIO, legal,
  compliance, 12 business analysts

  Design the enterprise terminology strategy:
  1. Terminology audit framework for 2,000+ terms
  2. Conflict resolution methodology for 340+ conflicts
  3. Enterprise glossary architecture (federated model
     with shared core + division extensions)
  4. Technology platform selection criteria
  5. Governance structure with cross-division authority
  6. Data dictionary integration (terminology → data
     models → reporting)
  7. 18-month implementation roadmap
  8. Change management and adoption plan
  9. ROI model linking terminology to data quality
  10. Write 5 sample conflict resolutions showing
      the methodology in action

assertions:
  - type: llm_judge
    criteria: "Response creates a complete enterprise terminology strategy — audit framework; conflict resolution methodology; federated glossary architecture; technology criteria; governance structure; data dictionary integration; 18-month roadmap; change management; ROI model; 5 conflict resolution examples."
    weight: 0.35
    description: "EnterpriseTerminologyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise data governance expertise — the federated model balances central authority with division autonomy; conflict resolution handles politically sensitive terminology disputes; data dictionary integration connects terminology to actual data systems; the ROI model quantifies data quality improvements."
    weight: 0.35
    description: "DataGovernanceExpertiseQuality"
  - type: llm_judge
    criteria: "Response would enable cross-division reporting — the 340+ conflicts would be resolved systematically; data warehouse reporting would become possible; regulatory filings would use consistent terminology; M&A integration would be faster; the $1.5M investment would be justified."
    weight: 0.30
    description: "DataIntegrationOutcome"
