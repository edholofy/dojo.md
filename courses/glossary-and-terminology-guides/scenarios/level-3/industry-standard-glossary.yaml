meta:
  id: industry-standard-glossary
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Develop an industry-standard glossary for the emerging climate technology sector, establishing common terminology across startups, investors, and regulators"
  tags: [industry-standard, climate-tech, emerging-field, standardization, advanced]

state: {}

trigger: |
  You're the Executive Director of the Climate
  Technology Alliance (CTA), a consortium of 150
  climate tech companies, 30 venture capital firms,
  and 5 government agencies. The sector is growing
  rapidly but lacks standardized terminology —
  companies use different terms for the same
  technologies, investors can't compare products,
  and regulators can't draft effective policy.

  The problem:
  - "Carbon capture" vs "carbon removal" vs "carbon
    sequestration" — used interchangeably but mean
    different things
  - "Net zero" vs "carbon neutral" vs "climate neutral"
    — companies claim all three without clear
    definitions
  - "Green hydrogen" vs "clean hydrogen" vs "renewable
    hydrogen" — confusing for policy
  - Investors can't benchmark because companies
    describe the same technology differently
  - Regulators cite "lack of agreed definitions" as
    barrier to effective policy

  Develop the industry-standard glossary:
  1. Glossary governance charter (who defines terms,
     how decisions are made, dispute resolution)
  2. Term development methodology (research, draft,
     review, ratify)
  3. Write 25 climate tech terms with standardized
     definitions covering:
     - Carbon management (8 terms)
     - Clean energy (8 terms)
     - Climate finance and reporting (9 terms)
  4. Disambiguation guide for commonly confused terms
  5. Adoption strategy (how to get 150 companies to
     use the standard terminology)
  6. Regulatory integration plan
  7. Annual review and update process

assertions:
  - type: llm_judge
    criteria: "Response develops a complete industry-standard glossary — governance charter; term development methodology; 25 standardized definitions across 3 categories; disambiguation guide; adoption strategy; regulatory integration; annual review."
    weight: 0.35
    description: "IndustryStandardCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates domain standardization expertise — climate tech terms are accurately differentiated; the governance charter handles multi-stakeholder decision-making; disambiguation addresses real confusion; adoption strategy acknowledges competitive dynamics; regulatory integration enables policy development."
    weight: 0.35
    description: "StandardizationExpertiseQuality"
  - type: llm_judge
    criteria: "Response would unify climate tech terminology — the 150 companies would adopt standard terms; investors could benchmark products; regulators could draft effective policy; greenwashing would be harder with precise definitions; the glossary would become the industry reference."
    weight: 0.30
    description: "IndustryUnificationOutcome"
