meta:
  id: glossary-migration
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Plan and execute a major glossary migration from a legacy wiki to a modern terminology management platform while preserving cross-references and SEO"
  tags: [migration, platform-change, legacy, cross-references, advanced]

state: {}

trigger: |
  You're the Content Platform Lead at TechNova, a
  B2B software company migrating from Confluence to
  a dedicated terminology management platform
  (TermBase Pro). The glossary section has 800 terms
  built over 8 years with extensive cross-references,
  embedded links from 2,000+ documentation pages, and
  significant organic search traffic.

  Current state:
  - 800 glossary terms in Confluence wiki
  - 3,500+ cross-reference links between terms
  - 2,000+ documentation pages link to glossary terms
  - 25,000 monthly organic visits to glossary pages
  - 150 terms are outdated or redundant
  - No consistent metadata or tagging
  - URL structure: /wiki/glossary/term-name
  - New platform URL: /glossary/term-name (different
    domain structure)
  - Timeline: 12 weeks

  Plan the migration:
  1. Content audit and cleanup (identify what to keep,
     merge, update, remove)
  2. Data mapping: Confluence fields → TermBase Pro
     fields
  3. Cross-reference preservation strategy
  4. URL redirect mapping (maintain SEO traffic)
  5. Documentation link update plan (2,000+ pages)
  6. Quality assurance and validation process
  7. Rollback plan
  8. 12-week migration timeline with phases
  9. Post-migration monitoring (30/60/90 days)
  10. Stakeholder communication plan

assertions:
  - type: llm_judge
    criteria: "Response creates a complete glossary migration plan — content audit; data mapping; cross-reference preservation; URL redirects; doc link updates; QA process; rollback plan; 12-week timeline; post-migration monitoring; stakeholder communication."
    weight: 0.35
    description: "MigrationPlanCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates platform migration expertise — the content audit handles 800 terms systematically; cross-reference preservation maintains 3,500+ links; URL redirects protect 25,000 monthly visits; the 12-week timeline is realistic; the rollback plan is actionable."
    weight: 0.35
    description: "MigrationExpertiseQuality"
  - type: llm_judge
    criteria: "Response would preserve glossary integrity — cross-references would survive migration; organic search traffic would be maintained; 150 outdated terms would be cleaned up; 2,000+ documentation links would work; the new platform would improve glossary management."
    weight: 0.30
    description: "IntegrityPreservationOutcome"
