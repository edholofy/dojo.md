meta:
  id: advanced-glossary-shift
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Shift simulation — design glossaries for a clinical trial, an international trade agreement, and a blockchain protocol"
  tags: [shift-simulation, clinical-trial, trade-agreement, blockchain, advanced]

state: {}

trigger: |
  You're a senior terminology consultant handling
  three high-stakes projects where precise terminology
  is legally or scientifically critical.

  === PROJECT 1: Clinical Trial Glossary ===
  A pharmaceutical company is conducting a multi-site
  clinical trial across 8 countries. Create a glossary
  for the Informed Consent Form that patients must
  understand before participating.

  Write 10 terms covering:
  - Study design: Randomized, double-blind, placebo,
    control group, crossover
  - Patient terms: Informed consent, adverse event,
    withdrawal, confidentiality, compensation
  Format: Patient-facing, grade 6 reading level
  Constraint: IRB (Institutional Review Board)
  compliant — must be comprehensible to all participants

  === PROJECT 2: Trade Agreement Terminology ===
  An international trade organization is drafting a
  new digital commerce agreement between 12 countries.
  Create a definitions section for the treaty.

  Write 8 terms covering:
  - Digital trade: Electronic commerce, digital product,
    data localization, cross-border data flow
  - Trade mechanisms: Most favored nation, tariff,
    customs duty, dispute resolution
  Format: Legal-diplomatic precision
  Constraint: Must be translatable into all 6 UN
  official languages without ambiguity

  === PROJECT 3: Blockchain Protocol Glossary ===
  A new Layer 2 blockchain protocol needs a glossary
  in its technical whitepaper that's accessible to
  both developers and potential investors.

  Write 8 terms covering:
  - Protocol terms: Consensus mechanism, rollup,
    zero-knowledge proof, gas fee
  - Economic terms: Token economics, staking, liquidity
    pool, governance token
  Format: Technically precise but accessible to
  non-technical investors
  Constraint: Must survive SEC scrutiny (avoid terms
  that imply the token is a security)

  Write all three glossary sections (26 total entries).

assertions:
  - type: llm_judge
    criteria: "Response creates three high-stakes glossary sections — 10 clinical trial terms at grade 6, 8 trade agreement terms with legal precision, 8 blockchain terms balancing technical and investor audiences; all constraints are met."
    weight: 0.35
    description: "HighStakesGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates precision across domains — clinical trial definitions are IRB-compliant and truly at grade 6; trade agreement terms are diplomatically precise and translatable; blockchain terms avoid SEC-triggering language while remaining technically accurate."
    weight: 0.35
    description: "CrossDomainPrecisionQuality"
  - type: llm_judge
    criteria: "Each glossary would serve its critical context — patients would understand what they're consenting to; the trade agreement would be unambiguous across 12 countries; the blockchain whitepaper would satisfy both developers and regulators."
    weight: 0.30
    description: "CriticalContextEffectivenessOutcome"
