meta:
  id: accessibility-glossary-program
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Design a fully accessible glossary system meeting WCAG 2.1 AA with cognitive accessibility, plain language levels, and assistive technology optimization"
  tags: [accessibility, wcag, cognitive, plain-language, advanced]

state: {}

trigger: |
  You're an accessibility specialist at GovServe, a
  government technology company building digital
  services for state agencies. The latest Section 508
  audit found that glossary components across 12
  state agency websites fail accessibility standards.
  You need to design an accessible glossary template
  that all agencies can adopt.

  Audit findings:
  - Tooltip glossary definitions not accessible to
    screen readers
  - Definitions written at grade 16+ reading level
  - No keyboard navigation for interactive glossary
  - Color-coded term categories rely solely on color
  - No support for text-to-speech
  - Glossary search not compatible with voice control
  - No cognitive accessibility considerations
  - Missing language attribute for multilingual terms

  Users include:
  - Citizens with visual impairments (screen readers)
  - Citizens with cognitive disabilities
  - Citizens with motor impairments (keyboard/voice)
  - Citizens with low literacy (ESL, limited education)
  - Elderly citizens with multiple accessibility needs

  Design the accessible glossary system:
  1. WCAG 2.1 AA specifications for all glossary
     components
  2. Cognitive accessibility guidelines (beyond WCAG)
  3. Plain language definitions at 3 reading levels
     (grade 4, grade 8, grade 12)
  4. Screen reader optimization specifications
  5. Keyboard and voice navigation design
  6. Write 6 glossary entries at all 3 reading levels
     (18 total definitions for 6 terms)
  7. Color and visual design accessible specifications
  8. Testing plan with assistive technology matrix
  9. Agency adoption guide and implementation checklist

assertions:
  - type: llm_judge
    criteria: "Response designs a complete accessible glossary — WCAG 2.1 AA specs; cognitive accessibility; 3 reading levels; screen reader optimization; keyboard/voice navigation; 6 terms at 3 levels (18 definitions); visual design specs; AT testing plan; agency guide."
    weight: 0.35
    description: "AccessibleGlossaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deep accessibility expertise — WCAG specifications are technically precise; cognitive accessibility goes beyond standard guidelines; the 3 reading levels represent genuine simplification; screen reader specs handle tooltip interaction patterns; voice control design is practical."
    weight: 0.35
    description: "AccessibilityExpertiseQuality"
  - type: llm_judge
    criteria: "Response would pass Section 508 audit — all cited violations would be remediated; citizens with disabilities would have full glossary access; the template would be adoptable by 12 state agencies; cognitive accessibility would serve low-literacy populations."
    weight: 0.30
    description: "Section508ComplianceOutcome"
