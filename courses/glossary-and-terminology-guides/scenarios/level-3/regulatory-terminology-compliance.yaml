meta:
  id: regulatory-terminology-compliance
  level: 3
  course: glossary-and-terminology-guides
  type: output
  description: "Build a regulatory terminology compliance program for a financial services firm ensuring consistent use of SEC/FINRA-approved terminology"
  tags: [regulatory, financial-services, sec-finra, compliance, advanced]

state: {}

trigger: |
  You're the Content Compliance Officer at WealthGuard,
  a wealth management firm with 500 financial advisors
  and a marketing team of 20. FINRA has cited the firm
  for "misleading terminology" in client communications
  — specifically, using terms like "guaranteed returns,"
  "risk-free," and "safe investment" that violate
  advertising rules.

  Regulatory requirements:
  - SEC Rule 206(4)-1: No misleading statements
  - FINRA Rule 2210: Fair, balanced communications
  - FINRA Rule 2111: Suitability obligations
  - State securities regulations (registered in 42
    states)
  - DOL fiduciary rule implications

  Violations found:
  - "Guaranteed returns" used in 15 client letters
  - "Risk-free" in 8 marketing materials
  - "Safe investment" on 3 web pages
  - "Outperform the market" in advisor presentations
  - Inconsistent use of "fee" vs "commission" vs "cost"
  - "Financial planning" used without proper licensing
    disclaimers

  Build the compliance terminology program:
  1. Prohibited terms list with explanations and
     approved alternatives
  2. Approved terminology glossary (40+ terms with
     compliant definitions)
  3. Compliance review workflow for all client-facing
     content
  4. Automated term-checking system specifications
  5. Advisor training curriculum on compliant language
  6. Remediation plan for existing violations
  7. Quarterly compliance audit methodology
  8. Escalation and exception process

assertions:
  - type: llm_judge
    criteria: "Response creates a complete compliance terminology program — prohibited terms with alternatives; 40+ approved terms; review workflow; automated checking specs; advisor training; remediation plan; quarterly audit; escalation process."
    weight: 0.35
    description: "ComplianceTerminologyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates financial compliance expertise — SEC/FINRA rules are correctly applied; prohibited terms are accurately identified; approved alternatives maintain marketing effectiveness; the automated checking system would catch violations before publication; training addresses the 500 advisor challenge."
    weight: 0.35
    description: "FinancialComplianceQuality"
  - type: llm_judge
    criteria: "Response would eliminate compliance violations — the 15+ cited violations would be remediated; future violations would be prevented by automated checking; 500 advisors would use compliant language; FINRA examinations would produce clean findings."
    weight: 0.30
    description: "ComplianceViolationEliminationOutcome"
