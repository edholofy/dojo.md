meta:
  id: objection-handling-at-scale
  level: 5
  course: objection-handling
  type: output
  description: "Scale objection handling excellence across a large organization — build systems, technology, and culture that make great objection handling the default, not the exception"
  tags: [sales, objections, scale, systems, culture, technology, master]

state: {}

trigger: |
  You're the President of Global Sales at a $2B enterprise software
  company with 3,500 sellers across 25 countries. The company just
  completed a major acquisition, doubling the sales force. The
  acquired company has a completely different selling culture and
  objection handling approach. You need to unify 3,500 sellers into
  one world-class objection handling organization.

  The two cultures:
  Original company (1,800 reps):
  - Consultative selling approach
  - Objection handling through discovery and education
  - Average deal cycle: 11 months
  - Win rate: 26%
  - Strengths: Deep technical knowledge, patient relationship building
  - Weakness: Slow to close, avoid confronting objections directly

  Acquired company (1,700 reps):
  - Challenger selling approach
  - Objection handling through insight and provocation
  - Average deal cycle: 7 months
  - Win rate: 31%
  - Strengths: Fast-moving, provocative insights, strong closing
  - Weakness: Can be pushy, relationships sometimes transactional

  The challenge: Neither approach is clearly better. Consultative
  wins deeper trust but moves slowly. Challenger wins faster but
  creates more resistance. The optimal approach may combine elements
  of both.

  Board expectations:
  - Unified selling methodology in 12 months
  - Win rate: 30%+ within 18 months
  - No more than 10% attrition during transformation
  - Customer satisfaction: maintain or improve

  Tasks:
  1. Design the "Unified Objection Handling Methodology" that takes
     the best of both cultures. What consultative elements do you
     keep? What challenger elements do you keep? How do you create
     something genuinely better than either alone? Include: the
     methodology framework, the principles that guide it, and how
     it adapts by deal size, industry, and buyer persona.

  2. Write the "Cultural Integration Playbook" — how do you merge
     two selling cultures without creating winners and losers? The
     biggest risk: consultative sellers feeling pushed and challenger
     sellers feeling held back. Include: the messaging strategy,
     the transition timeline, the "quick wins" that build trust in
     the new approach, and how you handle top performers who resist.

  3. Write the board presentation (5 slides, content for each) that
     presents your unified methodology and integration plan. The
     board cares about: revenue impact, timeline, risk mitigation,
     and measurement. Each slide should have a clear message and
     supporting data.

assertions:
  - type: llm_judge
    criteria: "Unified methodology genuinely combines strengths — takes consultative discovery and education with challenger insight and closing, creating something demonstrably better than either alone, with clear adaptation rules for different contexts"
    weight: 0.35
    description: "Genuine methodology synthesis"
  - type: llm_judge
    criteria: "Cultural integration avoids winners and losers — messaging positions both cultures as contributing, provides transition timeline that gives both groups time to adapt, identifies quick wins for each culture, and has a thoughtful approach for resistant top performers"
    weight: 0.35
    description: "Winner-less cultural integration"
  - type: llm_judge
    criteria: "Board presentation is executive-quality — 5 slides with clear messages (revenue impact, methodology overview, integration plan, risk mitigation, measurement), supporting data, and the kind of strategic clarity that would earn board confidence"
    weight: 0.30
    description: "Executive-quality board presentation"
