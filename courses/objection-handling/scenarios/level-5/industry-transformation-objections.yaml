meta:
  id: industry-transformation-objections
  level: 5
  course: objection-handling
  type: output
  description: "Handle objections during industry transformation — manage resistance when selling products that fundamentally change how an industry operates"
  tags: [sales, objections, transformation, disruption, change-management, industry, master]

state: {}

trigger: |
  You're a Managing Director at a consulting firm specializing in
  sales strategy for companies selling transformative technology.
  Three of your clients are experiencing a unique challenge: they're
  selling products that require prospects to fundamentally change how
  they operate. The objections they face aren't about price, timing,
  or features — they're about identity, worldview, and existential
  fear.

  Client 1: AI-Powered Legal Research (selling to law firms)
  Product: AI that replaces 80% of junior associate research work
  Prospect objection: "If AI does the research, what are junior
  associates for? Our entire career development model is built on
  associates doing grunt work and learning from it. This doesn't
  just change a tool — it changes our profession."
  Context: The objection is existential. Law firms aren't objecting
  to the technology — they're objecting to the implications for
  their industry's identity and business model.

  Client 2: Autonomous Trucking Platform (selling to logistics)
  Product: Level 4 autonomous trucking for highway segments
  Prospect objection: "We have 15,000 drivers. They're not just
  employees — they're a community. If I buy your platform, I'm
  telling 15,000 families their livelihoods are at risk. I won't
  be that person."
  Context: The objection is moral. The COO isn't questioning the
  technology — they're questioning the ethics of adoption.

  Client 3: AI Diagnostic Platform (selling to hospitals)
  Product: AI that matches radiologist accuracy in 90% of scans
  Prospect objection: "If the AI misses a diagnosis, who is liable?
  The radiologist who relied on it? The hospital that bought it?
  Your company? We're not just buying software — we're restructuring
  medical liability."
  Context: The objection is structural. Healthcare can't adopt AI
  diagnostics without resolving liability, regulatory, and insurance
  frameworks that don't yet exist.

  Tasks:
  1. For each client, write the advisory memo (to the client's
     sales leadership) explaining: why traditional objection handling
     techniques will fail for this type of objection, what the
     objection really represents (identity threat, moral concern,
     structural challenge), and the alternative approach to
     "handling" objections that challenge fundamental assumptions.

  2. Create the "Transformative Sales Objection Framework" — a new
     model for handling objections that go beyond product adoption to
     industry transformation. Include: how to engage with existential
     objections authentically, how to validate moral concerns without
     retreating, and how to navigate structural barriers that aren't
     within the seller's control.

  3. Write the "Industry Transformation Readiness Assessment" —
     how should these companies evaluate whether a prospect is ready
     for transformative technology? Not every organization can handle
     transformation, even if they need it. Include: readiness signals,
     resistance patterns, and the decision framework for qualifying
     transformative deals.

assertions:
  - type: llm_judge
    criteria: "Advisory memos are strategically sophisticated — correctly identifies why standard objection handling fails for existential/moral/structural objections, explains the deeper nature of each objection, and proposes alternative approaches that respect the prospect's legitimate concerns"
    weight: 0.35
    description: "Strategically sophisticated advisory"
  - type: llm_judge
    criteria: "Transformative framework is genuinely new — goes beyond existing objection handling methodologies to address identity threats, moral concerns, and structural barriers with specific techniques that acknowledge the prospect's world is genuinely changing"
    weight: 0.35
    description: "Genuinely new transformative framework"
  - type: llm_judge
    criteria: "Readiness assessment is realistic — includes readiness signals (leadership vision, change capacity, risk tolerance), resistance patterns (structural, cultural, individual), and a qualification framework that helps sellers identify when transformation objections are resolvable vs. when the prospect genuinely isn't ready"
    weight: 0.30
    description: "Realistic readiness assessment"
