meta:
  id: objection-economics-model
  level: 5
  course: objection-handling
  type: output
  description: "Build the economics model for objection handling — quantify the revenue impact of objection handling quality across the entire sales organization"
  tags: [sales, objections, economics, ROI, revenue-impact, modeling, master]

state: {}

trigger: |
  You're the Chief Strategy Officer at a $500M B2B SaaS company
  with 800 sales reps. The board has asked you to build a
  comprehensive economic model that quantifies the revenue impact
  of objection handling across the organization. They want to treat
  objection handling as a measurable business capability, not just
  a skill.

  Data available:
  - Annual revenue: $500M (60% new, 40% expansion)
  - 800 reps: 200 SDRs, 400 AEs, 150 Senior AEs, 50 Enterprise AEs
  - Average deal size: $85K new, $35K expansion
  - Pipeline created: $2.1B annually
  - Current win rate: 24% (pipeline to close)
  - Win rate by objection handling quartile:
    Top 25% of handlers: 38% win rate
    Second quartile: 27% win rate
    Third quartile: 19% win rate
    Bottom 25%: 12% win rate
  - Average objections per deal: 4.1
  - Objection resolution rate by quartile:
    Top 25%: 72% resolution
    Bottom 25%: 28% resolution
  - Deal velocity by objection handling skill:
    Top handlers: 67-day average cycle
    Bottom handlers: 112-day average cycle
  - Customer retention by initial objection handling:
    Objections well-handled during sale: 91% year-1 retention
    Objections poorly-handled during sale: 74% year-1 retention
  - Cost of bad objection handling:
    Unnecessary discounting: estimated $12M/year in margin erosion
    Lost deals: estimated $180M/year in pipeline leakage
    Extended cycles: estimated $45M/year in opportunity cost

  Tasks:
  1. Build the "Objection Handling Economics Model" — a comprehensive
     financial model that shows: total revenue impact of objection
     handling (current state), revenue opportunity if bottom half
     performers improve to median, revenue opportunity if entire org
     improves by 1 standard deviation, and the investment required
     to achieve each scenario. Present this as a board-ready
     financial analysis.

  2. Write the "Unit Economics of Objection Handling" — break down
     the value of a single well-handled objection. What is the
     average revenue impact of resolving one additional objection per
     deal? Include: direct revenue (higher win rate), velocity
     benefit (faster close), retention benefit (higher year-1
     retention), and margin benefit (less discounting).

  3. Design the "Objection Handling Investment Framework" — how
     should the company allocate its enablement budget across the
     800 reps? Should you invest equally or concentrate on specific
     segments? Build the investment priority matrix using the data
     above and explain the expected ROI of each investment scenario.

assertions:
  - type: llm_judge
    criteria: "Economics model is board-ready — uses the provided data to build clear scenarios with revenue impact calculations, shows current state cost, improvement opportunity, and investment required, presented in financial language with appropriate assumptions stated"
    weight: 0.35
    description: "Board-ready economics model"
  - type: llm_judge
    criteria: "Unit economics are compelling — calculates the revenue value of one additional resolved objection per deal considering win rate lift, velocity improvement, retention benefit, and margin protection, making the abstract concrete"
    weight: 0.35
    description: "Compelling unit economics"
  - type: llm_judge
    criteria: "Investment framework is data-driven — uses quartile data to identify highest-ROI investment targets (likely second and third quartile), justifies concentration vs. broad investment, and presents expected ROI for different allocation strategies"
    weight: 0.30
    description: "Data-driven investment framework"
