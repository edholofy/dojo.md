meta:
  id: objection-consulting-engagement
  level: 5
  course: objection-handling
  type: output
  description: "Design a consulting engagement to transform a client's objection handling capability — diagnose, design, implement, and measure a complete objection handling system"
  tags: [sales, objections, consulting, transformation, strategy, master]

state: {}

trigger: |
  You're a Managing Partner at a top-tier sales consulting firm.
  MegaCorp (Fortune 100, $15B revenue, 2,000 sales reps globally)
  has hired you for a $2M engagement to transform their objection
  handling capability. Their CEO says: "We lose $400M annually in
  deals where our competitors outperform us at the objection stage."

  Current state assessment:
  - 2,000 reps across 12 countries, 4 divisions (Enterprise, SMB,
    Public Sector, Channel)
  - No standardized objection handling methodology
  - 47 different CRM implementations, fragmented data
  - Win rate declined from 28% to 19% over 3 years
  - Customer churn rate: 18% (industry avg: 12%)
  - Average deal cycle: 14 months (industry avg: 9 months)
  - Objection-related deal losses: estimated 35% of all losses
  - Current training: sporadic, vendor-led, no measurement
  - Technology: No conversation intelligence, basic CRM, no
    content management system for sales
  - Leadership: 45 frontline managers, 12 regional directors,
    4 divisional VPs, 1 CRO

  Constraints:
  - Budget: $2M total (consulting fees + implementation)
  - Timeline: 18 months to measurable results
  - Political: Each division VP thinks their approach works fine
  - Technology: Board approved $500K for new tools as part of this
  - Cultural: 12 countries with different selling cultures
  - Retention: Can't lose top performers during transformation

  Tasks:
  1. Write the "Engagement Proposal" — the scope of work, phases,
     deliverables, team structure, timeline, and success metrics for
     the full $2M engagement. This must read like a real consulting
     proposal that a Fortune 100 CEO would approve.

  2. Design Phase 1: "Diagnostic Assessment" (Months 1-3). How do
     you assess the current state across 2,000 reps in 12 countries?
     Include: assessment methodology, data collection plan, stakeholder
     interviews, call analysis approach, and the diagnostic report
     structure. Address: how do you assess without disrupting
     ongoing sales?

  3. Address the political challenge: 4 divisional VPs think their
     approach works. Write the executive alignment strategy — how
     you get buy-in from resistant leaders without the CEO having to
     mandate participation. Include: the business case for each VP
     (what's in it for them), the governance model, and the
     escalation process.

assertions:
  - type: llm_judge
    criteria: "Engagement proposal is Fortune 100 quality — includes clear scope, phased approach, specific deliverables per phase, consultant team structure, timeline with milestones, success metrics tied to revenue impact, and risk mitigation plan"
    weight: 0.35
    description: "Fortune 100 quality proposal"
  - type: llm_judge
    criteria: "Diagnostic methodology is scalable — assesses 2,000 reps across 12 countries using sampling, technology-assisted analysis, and structured interviews without disrupting sales, with a clear diagnostic report structure"
    weight: 0.30
    description: "Scalable diagnostic methodology"
  - type: llm_judge
    criteria: "Political alignment strategy is sophisticated — creates individual business cases for each resistant VP, designs governance that gives VPs voice without veto, and provides escalation that doesn't rely on CEO mandate"
    weight: 0.35
    description: "Sophisticated political alignment"
