meta:
  id: objection-thought-leadership
  level: 5
  course: objection-handling
  type: output
  description: "Create thought leadership on objection handling — write the definitive perspectives that position you as an industry authority on managing sales resistance"
  tags: [sales, objections, thought-leadership, publishing, authority, master]

state: {}

trigger: |
  You're a recognized authority on sales methodology who has been
  asked to write a book chapter for the industry's most influential
  publication: "The New Science of Sales" (published by Harvard
  Business Press). Your chapter: "Beyond Overcoming: A New Model
  for Understanding and Navigating Buyer Resistance."

  Your thesis: The industry's framing of "objection handling" is
  fundamentally flawed. The word "overcoming" implies a zero-sum
  battle where the seller wins and the buyer loses. The word
  "handling" implies objections are problems to be managed. Both
  frames produce adversarial dynamics that reduce trust and hurt
  close rates.

  Your proposed new frame: "Objection Integration" — treating
  objections as valuable information that should be integrated into
  the solution rather than overcome. In this model, objections make
  deals stronger, not weaker. The best outcomes emerge when sellers
  embrace objections rather than resist them.

  Supporting research you'd cite:
  - Rackham's SPIN Selling research: top performers ask about
    objections (implication questions), mediocre performers avoid
    them
  - Dixon's Challenger Sale data: commercial teaching that provokes
    objections produces 53% higher performance
  - Cialdini's influence research: the "but you are free" effect —
    giving people the freedom to say no increases compliance by 48%
  - Kahneman's prospect theory: loss aversion in objections means
    reframing from loss to gain changes decision architecture
  - Pink's research: "irritation" and "buoyancy" as sales skills —
    the ability to sit with rejection without being derailed

  Tasks:
  1. Write the chapter outline (3,000-word chapter). Include:
     the argument against "overcoming" objections, the case for
     "objection integration," the framework (with 4-5 principles),
     3 case studies from different industries, and the practical
     implementation guide. This must be academically credible AND
     practically useful.

  2. Write the opening 500 words of the chapter — the hook that
     makes a Harvard Business Press reader want to continue. It
     should challenge conventional wisdom, introduce the new frame,
     and promise specific value.

  3. Write the "Objection Integration Assessment" — a tool that
     organizations can use to evaluate how well they integrate (vs.
     overcome) objections. Include 10 assessment questions, a scoring
     system, and interpretation guidelines for each score range.

assertions:
  - type: llm_judge
    criteria: "Chapter outline is publication-quality — makes a compelling case against 'overcoming' framing, presents 'objection integration' as a coherent alternative with 4-5 principles, includes industry-specific case studies, and cites the research credibly"
    weight: 0.35
    description: "Publication-quality chapter outline"
  - type: llm_judge
    criteria: "Opening 500 words hook effectively — challenges conventional wisdom about objection handling in the first paragraph, introduces the new frame compellingly, promises specific value, and reads at Harvard Business Press quality"
    weight: 0.35
    description: "Effective opening hook"
  - type: llm_judge
    criteria: "Assessment tool is rigorous — 10 questions that genuinely measure integration vs. overcoming behavior, a clear scoring system, and interpretation that gives organizations actionable insight into where they fall on the spectrum"
    weight: 0.30
    description: "Rigorous assessment tool"
