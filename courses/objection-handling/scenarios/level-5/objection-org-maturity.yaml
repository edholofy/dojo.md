meta:
  id: objection-org-maturity
  level: 5
  course: objection-handling
  type: output
  description: "Assess and advance organizational objection handling maturity — build the maturity model that helps companies evaluate and improve their objection handling capability"
  tags: [sales, objections, maturity-model, organizational, assessment, capability, master]

state: {}

trigger: |
  You're a sales operations consultant who has assessed objection
  handling maturity at 150+ companies over 15 years. You've been
  asked by the Sales Enablement Society to create the industry-
  standard "Objection Handling Maturity Model" (OHMM) that
  organizations can use to assess and improve their capability.

  Your research has identified 5 maturity levels based on your
  assessments:

  Level 1 — Ad Hoc (40% of companies):
  No formal objection handling process. Reps wing it. Performance
  depends entirely on individual talent. No measurement, no coaching.
  Win rate impact: -15% vs. industry average.

  Level 2 — Reactive (25% of companies):
  Basic objection handling training exists. Some reps use frameworks.
  No systematic measurement. Coaching is sporadic. Playbook exists
  but isn't maintained.
  Win rate impact: -5% vs. industry average.

  Level 3 — Systematic (20% of companies):
  Standardized methodology. Regular training and role-play. Call
  recording analysis. Coaching cadence. Playbook is current.
  Win rate impact: +5% vs. industry average.

  Level 4 — Data-Driven (10% of companies):
  AI/conversation intelligence integration. Objection analytics
  dashboard. Continuous improvement loop. Content strategy aligned
  to objections. Win/loss analysis feeds back to methodology.
  Win rate impact: +12% vs. industry average.

  Level 5 — Predictive (5% of companies):
  AI predicts objections before they arise. Proactive inoculation
  built into every conversation. Behavioral science integration.
  Cross-functional alignment (marketing, product, customer success).
  Win rate impact: +20% vs. industry average.

  Tasks:
  1. Write the complete "OHMM Assessment Framework" — for each of
     the 5 levels, define: the capabilities present, the measurement
     criteria (how you assess what level an org is at), the typical
     organizational characteristics, the common challenges at that
     level, and the specific actions to advance to the next level.

  2. Create the "Maturity Assessment Survey" — a 20-question
     assessment that a VP of Sales can complete in 15 minutes to
     determine their organization's OHMM level. Each question should
     have 5 answer options corresponding to the 5 maturity levels.
     Include scoring methodology.

  3. Write the "Level Advancement Playbook" — for the most common
     transition (Level 2 → Level 3, applicable to 25% of companies),
     create the detailed 6-month advancement plan. Include: the
     organizational changes needed, the technology requirements, the
     training program, the measurement system, and the leadership
     behaviors that must change.

assertions:
  - type: llm_judge
    criteria: "OHMM framework is comprehensive and well-differentiated — each of the 5 levels has distinct capabilities, measurable criteria, organizational characteristics, challenges, and advancement actions that are genuinely different (not just gradations of the same thing)"
    weight: 0.35
    description: "Comprehensive differentiated OHMM"
  - type: llm_judge
    criteria: "Assessment survey is practical and diagnostic — 20 questions that can be completed in 15 minutes, with 5 answer options that clearly map to maturity levels, and a scoring methodology that produces a reliable assessment"
    weight: 0.30
    description: "Practical diagnostic survey"
  - type: llm_judge
    criteria: "Level 2→3 advancement plan is detailed and actionable — 6-month plan with specific organizational changes, technology needs, training approach, measurement system, and leadership behavior changes, representing a realistic transformation"
    weight: 0.35
    description: "Detailed advancement plan"
