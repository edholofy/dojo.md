meta:
  id: comprehensive-objection-engagement
  level: 5
  course: objection-handling
  type: output
  description: "Comprehensive capstone — design, implement, and measure a complete objection handling transformation for a global organization from board strategy to frontline execution"
  tags: [sales, objections, capstone, comprehensive, transformation, master]

state: {}

trigger: |
  You're the newly appointed Chief Revenue Officer at "NovaTech"
  (enterprise software, $1.2B revenue, 4,500 sales reps, 40 countries).
  The board has given you one mandate: "Fix our win rate. We're losing
  deals we should win." After 90 days of analysis, you've determined
  that objection handling is the single largest controllable factor
  in your win rate decline.

  Your 90-day findings:
  - Win rate: 21% (down from 31% three years ago)
  - #1 reason for loss: "Competitor was more responsive to our
    concerns" (cited by 67% of lost prospects)
  - Average deal involves 8.3 stakeholders, 5.2 objections
  - Reps spend 23% of selling time on objection handling
  - No consistent methodology — reps use personal approaches
  - Manager coaching on objections: 12 minutes/month average
  - Objection handling training: 4 hours in initial onboarding, zero
    ongoing
  - Technology: Conversation intelligence deployed 18 months ago but
    adoption at 15%
  - Content: 200+ battlecards exist, but are used in only 8% of deals
  - Cultural issue: "We're a product-led company — the product should
    sell itself" is the prevailing mindset
  - Regional variation: APAC win rate 28%, EMEA 22%, Americas 19%
    (APAC has strongest objection handling culture)
  - Competitive landscape: Top 3 competitors have all invested
    heavily in sales methodology in the past 2 years

  Your budget: $8M over 3 years ($3M Year 1, $3M Year 2, $2M Year 3)
  Your team: 4,500 reps, 180 managers, 45 directors, 8 regional VPs
  Your timeline: Board wants win rate at 28% by end of Year 2

  Tasks:
  1. Write the "3-Year Objection Handling Transformation Strategy"
     — the comprehensive plan to transform NovaTech's objection
     handling capability from ad hoc (current) to world-class. This
     must include:
     a) Year 1: Foundation (methodology, playbook, initial training)
     b) Year 2: Scale (technology integration, coaching systems,
        measurement)
     c) Year 3: Excellence (AI/predictive, continuous improvement,
        competitive advantage)
     For each year: key initiatives, budget allocation, milestones,
     risk factors, and measurement criteria.

  2. Write the "Transformation Business Case" — the document you
     present to the board showing: current revenue impact of poor
     objection handling (using NovaTech's numbers), the investment
     required, the expected return, the competitive urgency, and
     the risk of NOT investing. Use the $1.2B revenue and 21% win
     rate to build a compelling financial case.

  3. Write the "100-Day Quick Wins Plan" — the board expects visible
     progress before the full transformation takes hold. Identify
     5 initiatives you can complete in the first 100 days that show
     measurable improvement and build organizational confidence in
     the transformation. For each: the initiative, the expected
     impact, the resource requirement, and how you'll measure success.

assertions:
  - type: llm_judge
    criteria: "3-year strategy is comprehensive and phased — Year 1 builds foundation without overwhelming the org, Year 2 scales with technology and systems, Year 3 achieves excellence with predictive capability, each year has specific initiatives, realistic budgets, and measurable milestones"
    weight: 0.35
    description: "Comprehensive phased 3-year strategy"
  - type: llm_judge
    criteria: "Business case is board-compelling — translates NovaTech's numbers (21%→28% win rate on $1.2B revenue) into a specific revenue impact, shows clear ROI on the $8M investment, creates competitive urgency, and quantifies the cost of inaction"
    weight: 0.35
    description: "Board-compelling business case"
  - type: llm_judge
    criteria: "100-day quick wins are realistic and impactful — 5 initiatives that can genuinely be completed in 100 days, produce measurable results (not just activities), and build organizational confidence that the transformation is real and working"
    weight: 0.30
    description: "Realistic impactful quick wins"
