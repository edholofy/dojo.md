meta:
  id: objection-board-strategy
  level: 5
  course: objection-handling
  type: output
  description: "Present objection handling strategy at the board level — make the case for investment in objection handling as a strategic revenue capability"
  tags: [sales, objections, board, strategy, investment, revenue-capability, master]

state: {}

trigger: |
  You're the CRO of a $400M B2B SaaS company preparing for the
  quarterly board meeting. The board includes 2 former CEOs, a VC
  partner, and the company's founder. You're presenting a $3M
  investment case for transforming objection handling into a
  measurable competitive advantage.

  The context:
  - Win rate has declined from 30% to 23% over 8 quarters
  - Primary competitor (who is winning) has invested $5M in sales
    excellence including objection handling methodology
  - Your company's NPS from lost prospects: 32 (competitor's: 61)
  - Lost prospect feedback (200 interviews): "Your competitor was
    more responsive to our concerns and made us feel heard"
  - Current sales investment: 78% on headcount, 15% on technology,
    7% on enablement
  - Industry benchmark for enablement: 12-15% of sales budget
  - Revenue at risk: $92M in pipeline where objection handling
    is the primary risk factor

  Board members' known concerns:
  - Former CEO #1: "Sales should hire better, not train more"
  - VC partner: "What's the payback period? I need ROI by Q4"
  - Former CEO #2: "We tried sales training 3 years ago. Nothing
    changed."
  - Founder: "Our product should sell itself. If reps need help
    handling objections, maybe the product is the problem."

  Tasks:
  1. Write the board presentation (6 slides). Each slide must
     anticipate and preemptively address one board member's likely
     objection. Slide content should include: the strategic
     narrative, the financial model, the competitive landscape, the
     implementation plan, the risk mitigation, and the measurement
     framework. This must be a $400M CRO-quality presentation.

  2. Prepare the "Objection Responses for Board Objections" — the
     irony is you're handling objections about investing in objection
     handling. For each of the 4 board members' known concerns, write
     the response using the same principles you're asking to invest
     in. Use data, empathy, and reframing — practice what you preach.

  3. Write the "Post-Board Follow-Up" — the email you send within
     24 hours to the board after the meeting. It should recap the
     key decision, address any unresolved concerns, confirm the
     investment timeline, and include a 90-day milestone chart that
     demonstrates early progress.

assertions:
  - type: llm_judge
    criteria: "Board presentation is CRO-quality — 6 slides that tell a compelling strategic story with financial rigor, competitive urgency, and clear measurement, preemptively addressing each board member's known concern"
    weight: 0.35
    description: "CRO-quality board presentation"
  - type: llm_judge
    criteria: "Board objection responses practice what they preach — addresses each concern (hire vs. train, ROI timeline, past failure, product vs. sales) using the same principles being proposed (empathy, data, reframing), creating meta-credibility"
    weight: 0.35
    description: "Meta-credible board responses"
  - type: llm_judge
    criteria: "Post-board follow-up is executive-appropriate — concise, action-oriented, addresses unresolved concerns, includes 90-day milestones, and maintains momentum without being pushy"
    weight: 0.30
    description: "Executive-appropriate follow-up"
