meta:
  id: behavioral-science-objections
  level: 5
  course: objection-handling
  type: output
  description: "Apply behavioral science to objection handling — use cognitive bias research, decision psychology, and persuasion science to understand and address objections at a deeper level"
  tags: [sales, objections, behavioral-science, psychology, cognition, persuasion, master]

state: {}

trigger: |
  You're a sales psychology researcher who consults for Fortune 500
  sales organizations. You've been asked to write the definitive
  guide on applying behavioral science to objection handling —
  moving beyond techniques to understand the psychological mechanisms
  that create objections and the cognitive principles that resolve
  them.

  The cognitive biases behind common objections:

  1. Status Quo Bias → "We're fine with our current solution"
     The psychological tendency to prefer the current state. Loss
     aversion makes switching feel riskier than staying, even when
     the evidence favors change. Research shows people require
     benefits 2-2.5x greater than costs to switch.

  2. Anchoring Effect → "That's too expensive"
     The first number a prospect encounters anchors all subsequent
     price evaluations. If they researched competitors first
     (anchored low), your higher price feels disproportionate.

  3. Social Proof Bias → "Nobody in our industry uses this"
     Humans rely on others' decisions as evidence of correct action.
     In B2B, this manifests as "who else in my industry bought this?"
     Absence of social proof feels risky.

  4. Authority Bias → "I need to check with my boss"
     Beyond genuine authority issues, this bias means people defer
     to perceived authority figures even when they have independent
     judgment. Junior buyers genuinely believe they need approval
     because authority bias tells them their judgment isn't enough.

  5. Confirmation Bias → "I heard bad things about your product"
     Once a prospect forms an initial negative impression, they
     selectively attend to information that confirms it. A single
     bad Gartner review or negative social media post can anchor
     an entire evaluation.

  Tasks:
  1. For each of the 5 cognitive biases, write: (a) the scientific
     explanation (citing relevant research), (b) how it manifests
     as a specific sales objection, (c) the "bias-aware" response
     that works WITH the bias rather than against it, and (d) the
     ethical boundary (when does using bias awareness cross from
     helping to manipulating?).

  2. Write the "Behavioral Science Objection Handling Framework" —
     a unified model that integrates bias awareness into existing
     objection handling methodologies (LAER, FFF, etc.). Show how
     each step of LAER can be enhanced with behavioral science
     insights. This should be academically grounded but practically
     applicable.

  3. Address the ethics of behavioral science in sales. Write the
     "Ethical Persuasion Guidelines" — clear principles that
     distinguish between using behavioral science to help prospects
     make better decisions (ethical) vs. exploiting biases to
     manipulate prospects into buying something they don't need
     (unethical). Include 3 case studies showing the ethical line.

assertions:
  - type: llm_judge
    criteria: "Bias analysis is scientifically grounded — each of the 5 biases is explained with reference to legitimate research, the sales manifestation is specific and realistic, the bias-aware response works with (not against) the bias, and ethical boundaries are clearly drawn"
    weight: 0.35
    description: "Scientifically grounded bias analysis"
  - type: llm_judge
    criteria: "Framework integration is practical — shows how behavioral science enhances LAER at each step with specific techniques, maintaining academic credibility while being immediately applicable by sales practitioners"
    weight: 0.30
    description: "Practical framework integration"
  - type: llm_judge
    criteria: "Ethics guidelines draw clear lines — distinguishes helping (using bias awareness to surface genuine needs) from manipulating (exploiting biases to create false urgency), with 3 case studies that make the distinction concrete and actionable"
    weight: 0.35
    description: "Clear ethical guidelines"
