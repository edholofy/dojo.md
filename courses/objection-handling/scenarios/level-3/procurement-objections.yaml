meta:
  id: procurement-objections
  level: 3
  course: objection-handling
  type: output
  description: "Navigate procurement-specific objections — handle professional buyers whose job is to object, negotiate, and extract concessions"
  tags: [sales, objections, procurement, negotiation, enterprise, advanced]

state: {}

trigger: |
  You're an Enterprise AE at "SecureCloud" (cloud security platform,
  $90M ARR). Your champion loves the product, the technical team
  approved it, and the budget is allocated. Then the deal goes to
  procurement. Everything changes.

  The procurement manager, Patricia, has 15 years of experience and
  her job performance is measured by how much she saves. She sends
  you an email:

  "Thank you for your proposal. We have several concerns:
  1. Your pricing is 25% above the competitive benchmark we've
     established. We need you to match market rate.
  2. We require a 90-day payment term, not your standard 30-day.
  3. We need the right to terminate with 30-day notice, not the
     annual commitment in your proposal.
  4. We expect a 3-year price lock with no more than 2% annual
     increases.
  5. Your liability cap of 12 months' fees is insufficient. We
     require 24 months.
  6. We need source code escrow in case your company goes bankrupt."

  Context: Some of these are legitimate (payment terms, price lock).
  Some are aggressive negotiation tactics (25% reduction demand,
  30-day termination on annual contract). Some are risk management
  (liability, escrow). You need to know the difference.

  Tasks:
  1. Categorize each of Patricia's 6 demands: is it a legitimate
     business requirement, a standard negotiation tactic, or a
     risk management provision? For each, write the response that
     protects your position while maintaining a collaborative tone.
     Identify which items you'd concede, which you'd negotiate, and
     which you'd hold firm.

  2. Write the "Procurement Playbook" — 5 rules for handling
     professional procurement buyers that differ from handling
     business stakeholders. Include the psychology of procurement
     (they're measured on savings, they use standardized tactics,
     they test your willingness to concede).

  3. Your champion calls you panicked: "Procurement is making this
     impossible. They always do this." Write the coaching script
     for your champion — help them navigate internally by explaining
     which procurement demands are standard (they'll always ask),
     which are serious (you need to address), and how to advocate
     for you without undermining procurement's role.

assertions:
  - type: llm_judge
    criteria: "Categorization is accurate — correctly identifies the 25% discount demand and 30-day termination as negotiation tactics, payment terms and price lock as legitimate business requirements, and liability/escrow as risk management, with appropriate responses for each"
    weight: 0.35
    description: "Accurate demand categorization"
  - type: llm_judge
    criteria: "Procurement playbook captures real dynamics — explains that procurement is measured on savings (not value), uses standardized playbooks, will always ask for more than they expect, and requires different rapport-building than business buyers"
    weight: 0.30
    description: "Real procurement dynamics"
  - type: llm_judge
    criteria: "Champion coaching is strategic — helps the champion understand procurement's role (not adversarial), identify which demands are routine vs. serious, and advocate effectively without creating internal conflict between champion and procurement"
    weight: 0.35
    description: "Strategic champion coaching"
