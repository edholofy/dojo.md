meta:
  id: objection-to-close
  level: 3
  course: objection-handling
  type: output
  description: "Turn objections into closing opportunities — recognize when an objection signals buying intent and use it as a bridge to commitment"
  tags: [sales, objections, closing, buying-signals, conversion, advanced]

state: {}

trigger: |
  You're a Sales Director at "RapidHire" (recruiting platform,
  $60M ARR). You're coaching your team on a counterintuitive insight:
  certain objections are actually buying signals in disguise. A
  prospect who objects is engaged; a prospect who says nothing is
  already gone.

  Buying-signal objections to analyze:

  Signal 1: "What happens if we outgrow your platform?"
  From: VP of HR at a fast-growing startup (200→500 employees)
  Why it's a signal: They're imagining a future WITH your product.
  They're mentally past "should we buy?" and into "what happens
  after we buy?"

  Signal 2: "Can we get out of the contract if it doesn't work?"
  From: CHRO at a 300-person company
  Why it's a signal: They're negotiating exit terms, which means
  they're considering entry. Nobody negotiates termination clauses
  for a product they don't plan to buy.

  Signal 3: "My team will need a lot of training on this."
  From: Director of Talent Acquisition
  Why it's a signal: They're thinking about implementation details,
  not whether to buy. This is a logistical concern, not a strategic
  objection.

  Signal 4: "What if our hiring slows down and we don't need all
  those seats?"
  From: CFO
  Why it's a signal: They're mentally calculating usage scenarios.
  They've accepted the product; they're optimizing the purchase.

  Non-signal objection for contrast:
  "Send me some information and I'll take a look when I have time."
  Why it's NOT a signal: No specificity, no engagement, no future
  planning. This is a brush-off.

  Tasks:
  1. For each of the 4 buying-signal objections, write the response
     that: (a) addresses the concern legitimately (don't dismiss it),
     (b) subtly advances toward closing by using their future-
     oriented thinking, and (c) includes a trial close or next-step
     commitment. Show the transition from objection handling to
     closing.

  2. Create the "Buying Signal vs. Genuine Objection" diagnostic
     framework. Include 6 indicators that distinguish buying signals
     (future-oriented, specific, logistical) from genuine objections
     (past-oriented, vague, strategic/emotional) with examples.

  3. Write the coaching guide for junior reps: "How to Close from
     an Objection." Include the 3-step technique: acknowledge the
     concern, address it, then bridge to commitment. Show 3 "bridge
     to close" phrases that feel natural, not pushy.

assertions:
  - type: llm_judge
    criteria: "Responses address concern AND advance — each legitimately answers the prospect's question while subtly incorporating a trial close or next-step that leverages their forward-looking mindset, without being manipulatively pushy"
    weight: 0.35
    description: "Concern-addressing closers"
  - type: llm_judge
    criteria: "Diagnostic framework is clear and useful — provides 6 specific indicators with examples that help reps distinguish buying signals from genuine objections in real-time, covering temporal orientation, specificity, emotional tone, and engagement level"
    weight: 0.35
    description: "Clear diagnostic framework"
  - type: llm_judge
    criteria: "Coaching guide is practical for juniors — 3-step technique (acknowledge, address, bridge) is simple enough for new reps, with 3 bridge phrases that sound natural and examples of the full acknowledge→address→bridge sequence"
    weight: 0.30
    description: "Junior-friendly coaching guide"
