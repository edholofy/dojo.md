meta:
  id: champion-defense-strategy
  level: 3
  course: objection-handling
  type: output
  description: "Protect and enable your champion when they face internal objections — help them defend your solution against skeptics within their organization"
  tags: [sales, objections, champion, internal-selling, enablement, defense, advanced]

state: {}

trigger: |
  You're a Senior AE at "DataSync" (data integration platform,
  $75M ARR). Your champion, Marcus (VP of Data Engineering at a
  400-person fintech), has been fighting for your deal internally
  for 2 months. Today he calls you frustrated.

  Marcus: "I'm getting killed internally. Here's what I'm up against:

  1. The CTO called your product 'yet another ETL tool' in the
     leadership meeting. He thinks we can build this ourselves with
     Airflow and dbt. I tried to explain the difference but I'm not
     technical enough to argue with him.

  2. The CFO saw the $180K price tag and said 'we already have too
     many data tools.' She pulled up our vendor list and we have 14
     data-related subscriptions. She wants to consolidate, not add.

  3. My peer, the VP of Analytics, is threatened because DataSync
     would give my team capabilities that currently only her team
     has. She's been subtly undermining me in meetings.

  4. The CEO heard CTO and CFO concerns and said 'table this until
     Q3 planning.' That's 5 months away and by then we'll miss the
     compliance deadline that makes this urgent.

  I believe in DataSync but I can't fight all these battles alone."

  Tasks:
  1. For each of Marcus's 4 internal battles, write the specific
     content you create to help him win. This isn't about what YOU
     would say — it's about arming MARCUS with what HE needs to say
     to each stakeholder. Think of yourself as his backstage coach.

  2. Create the "Internal Objection Battle Plan" — a step-by-step
     strategy for Marcus to address all 4 stakeholders. Include: who
     to address first (sequencing matters), what format to use for
     each (1:1 vs. group, email vs. meeting), and the key message
     for each person.

  3. Write the "Champion Resilience Guide" — when champions get
     discouraged by internal pushback, they often give up. Write
     the conversation you have with Marcus to re-energize him. Include:
     normalizing the resistance (this happens in 80% of enterprise
     deals), showing him the progress he's made, and giving him a
     specific next action that feels achievable.

assertions:
  - type: llm_judge
    criteria: "Stakeholder-specific content is tailored — CTO gets technical differentiation vs. Airflow+dbt build, CFO gets consolidation narrative (replace 3 tools with 1), VP of Analytics gets collaboration framing (not competition), CEO gets compliance deadline urgency"
    weight: 0.35
    description: "Tailored stakeholder content"
  - type: llm_judge
    criteria: "Battle plan sequencing is strategic — recommends addressing stakeholders in an order that builds momentum (e.g., CFO first with consolidation story, then CTO with technical proof, then CEO with urgency), with format appropriate for each conversation"
    weight: 0.35
    description: "Strategic battle plan sequencing"
  - type: llm_judge
    criteria: "Champion resilience conversation is genuine — normalizes resistance without being dismissive, acknowledges Marcus's frustration, highlights concrete progress, and provides a single achievable next step that restores momentum"
    weight: 0.30
    description: "Genuine champion resilience"
