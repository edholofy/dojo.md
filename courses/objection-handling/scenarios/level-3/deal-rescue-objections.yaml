meta:
  id: deal-rescue-objections
  level: 3
  course: objection-handling
  type: output
  description: "Rescue stalled and lost deals — handle objections that have already killed a deal and attempt to revive it with new approaches"
  tags: [sales, objections, deal-rescue, revival, stalled-deals, win-back, advanced]

state: {}

trigger: |
  You're a Senior AE at "LogiTrack" (supply chain visibility
  platform, $45M ARR). Your VP of Sales is reviewing the team's
  pipeline and identified 4 "dead" or stalled deals. She wants you
  to attempt to rescue them. Each failed for a different reason.

  Dead Deal 1: Ghosted after proposal (45 days, no response)
  Company: Regional grocery chain (800 employees)
  Last contact: Their VP of Supply Chain said "We'll review and get
  back to you" after receiving the proposal. Three follow-up emails
  got no response.
  Likely cause: They got busy, found a competitor, or the internal
  champion lost enthusiasm.

  Dead Deal 2: Lost to competitor 3 months ago
  Company: Electronics distributor (1,200 employees)
  Lost to: Project44 — they chose them on "better API documentation
  and developer community." Your product has since launched a
  complete API rewrite and developer portal.
  Contact: Their CTO who made the final decision.

  Dead Deal 3: Killed by budget cut 6 months ago
  Company: Automotive parts manufacturer (2,000 employees)
  Their CFO killed all new vendor spend during a cost-cutting
  initiative. Your champion (VP of Operations) said "I still want
  this but there's nothing I can do right now."
  Context: The company just reported a strong quarter and announced
  a new factory opening.

  Dead Deal 4: Champion left the company
  Company: Fashion retailer (600 employees)
  Your champion, the Head of Logistics, left for another company 4
  months ago. You don't have relationships with anyone else there.
  The deal was 80% of the way through when she left.
  Context: Her replacement just started 2 weeks ago.

  Tasks:
  1. For each dead deal, write the outreach message (email or
     LinkedIn) that attempts to revive the conversation. Each needs
     a different approach: re-engagement, win-back, budget-thaw, and
     new-contact introduction. Include subject lines and the specific
     hook for each.

  2. Create the "Deal Rescue Decision Matrix" — not every dead deal
     is worth saving. Write the criteria for evaluating whether a
     stalled deal is rescuable (signals of life) vs. truly dead
     (move on). Include 5 "rescue signals" and 5 "let it go" signals.

  3. Write the "Win-Back Playbook" for Deal 2 (lost to competitor).
     They chose Project44 three months ago. Design the 6-month win-
     back campaign: when to reach out, what value to provide in the
     interim, and the trigger event that reopens the conversation.

assertions:
  - type: llm_judge
    criteria: "Revival outreach is appropriately differentiated — ghosted deal gets curiosity-based re-engagement, lost-to-competitor gets product-update win-back, budget-cut gets timing-based re-approach referencing their strong quarter, champion-left gets new-relationship building"
    weight: 0.35
    description: "Differentiated revival outreach"
  - type: llm_judge
    criteria: "Rescue decision matrix is practical — provides clear rescue signals (champion still engaged, budget returning, competitive dissatisfaction) and let-it-go signals (no champion, wrong fit, company in crisis) that help reps prioritize their time"
    weight: 0.30
    description: "Practical rescue decision matrix"
  - type: llm_judge
    criteria: "Win-back playbook is patient and strategic — spaces touchpoints across 6 months, provides genuine value (industry insights, not just product updates), identifies trigger events (contract renewal, dissatisfaction signals), and has a specific re-engagement approach when the window opens"
    weight: 0.35
    description: "Patient strategic win-back"
