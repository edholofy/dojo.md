meta:
  id: competitive-displacement-objections
  level: 3
  course: objection-handling
  type: output
  description: "Handle objections in competitive displacement deals — overcome the deep resistance when asking prospects to switch from an incumbent vendor"
  tags: [sales, objections, competitive, displacement, switching, incumbent, advanced]

state: {}

trigger: |
  You're a Senior AE at "NexCRM" (mid-market CRM, $65M ARR). 70%
  of your deals involve displacing an incumbent CRM — usually
  Salesforce, HubSpot, or Microsoft Dynamics. Displacement objections
  are uniquely difficult because the prospect has existing investment,
  relationships, workflows, and data in the current system.

  Displacement Scenario 1: Salesforce → NexCRM
  Prospect: VP of Sales at a 300-person tech company
  "We've invested $800K in Salesforce over 3 years — custom objects,
  integrations, training. Even if NexCRM is better, ripping out
  Salesforce would cost us another $200K and 6 months of disruption.
  The math doesn't work."
  Context: The sunk cost is real. Migration is genuinely expensive.
  But they're paying $400K/year for Salesforce and only using 30%
  of its capabilities.

  Displacement Scenario 2: HubSpot → NexCRM
  Prospect: Revenue Operations Manager at a 150-person company
  "HubSpot isn't perfect, but our entire marketing and sales stack
  is built around it. Our marketing team would revolt if we changed
  the CRM and broke their automation."
  Context: The objection is about ecosystem lock-in and internal
  politics (marketing team resistance), not about CRM quality.

  Displacement Scenario 3: Microsoft Dynamics → NexCRM
  Prospect: IT Director at a 500-person manufacturer
  "We're a Microsoft shop. Dynamics integrates with Teams, Outlook,
  and SharePoint natively. Your CRM would be an island in our
  Microsoft ocean."
  Context: The tech stack ecosystem objection. Dynamics isn't their
  best CRM option, but the Microsoft ecosystem creates gravity.

  Tasks:
  1. Write the displacement response for each scenario. Key
     principle: never ask the prospect to admit their previous
     purchase was wrong. Frame the switch as evolution, not
     correction. Show how you handle sunk cost, ecosystem lock-in,
     and internal politics differently.

  2. Create the "Displacement ROI Calculator" framework — show how
     to calculate the true cost of staying (not just the cost of
     switching). Include: current overspend, productivity loss from
     underutilization, opportunity cost of missing features, and
     the compounding effect over 3 years.

  3. Write the "Gradual Displacement Strategy" — for prospects who
     won't do a full rip-and-replace, design a phased migration plan
     that lets them run both systems temporarily. Address the fear of
     "big bang" migrations by showing a 3-phase approach.

assertions:
  - type: llm_judge
    criteria: "Displacement responses respect sunk cost — frames switching as evolution not correction, doesn't ask prospect to admit previous purchase was wrong, and addresses each unique dimension (sunk cost for SF, ecosystem lock-in for HubSpot, tech stack gravity for Dynamics)"
    weight: 0.35
    description: "Sunk-cost-respecting responses"
  - type: llm_judge
    criteria: "ROI calculator is comprehensive — includes current overspend, underutilization waste, opportunity cost, migration cost, productivity dip, and 3-year compounding effect that makes a credible financial case for switching"
    weight: 0.35
    description: "Comprehensive displacement ROI"
  - type: llm_judge
    criteria: "Gradual displacement plan is realistic — provides a 3-phase migration approach (pilot team, partial rollout, full migration) with specific milestones, risk mitigation for each phase, and rollback options that reduce prospect fear"
    weight: 0.30
    description: "Realistic gradual displacement"
