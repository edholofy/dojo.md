meta:
  id: advanced-objection-shift
  level: 3
  course: objection-handling
  type: output
  description: "Shift simulation combining advanced techniques — navigate a complex enterprise deal with executive objections, procurement tactics, competitive pressure, and internal politics"
  tags: [sales, objections, simulation, enterprise, complex, advanced]

state: {}

trigger: |
  You're a Strategic AE at "CloudAI" (enterprise AI operations
  platform, $85M ARR, $250K average deal). You're in the final
  stages of a $400K deal with HealthFirst (4,000-person hospital
  network). The deal has been in play for 5 months. This week,
  everything blows up simultaneously.

  Monday — Your champion calls:
  Marcus (VP of IT): "Bad news. Our new CIO started last week and
  she's reviewing all pending vendor decisions. She came from a
  hospital that used Palantir and she's asking why we're not talking
  to them."
  Impact: New executive, incumbent bias, competitive threat.

  Tuesday — Procurement email:
  "Per our new CIO's directive, all pending vendor contracts over
  $200K must go through a formal RFP process. Please submit your
  response by March 15 (3 weeks). Budget approval is paused until
  the RFP is evaluated."
  Impact: Deal pushed into formal procurement — delays of 3+ months.

  Wednesday — Your champion again:
  Marcus: "The CMO cornered me and said 'AI operations is IT's ego
  project. We need AI for patient engagement, not operations.' She's
  lobbying the CIO to redirect the budget to a marketing AI tool."
  Impact: Internal politics — budget competition from another dept.

  Thursday — From the CIO's office:
  The CIO's EA emails: "Dr. Chen (our CIO) would like to meet with
  your CEO or CTO, not an account executive, to discuss strategic
  partnership. She doesn't take vendor meetings with individual
  salespeople."
  Impact: Authority/seniority escalation — you're being demoted.

  Friday — Your VP of Sales asks:
  "What's your plan to save this deal? I need a written strategy
  by Monday."

  Tasks:
  1. Write the "Deal Save Strategy" your VP requested. Address each
     of the 4 crises (new CIO, RFP process, internal politics,
     seniority demand) with a specific action plan. Show how the
     crises connect and which to address first.

  2. Write the email to the new CIO's executive assistant that
     positions a meeting between your CTO and the CIO. This must
     show respect for the CIO's preference while ensuring you (the
     AE) remain involved in the deal.

  3. Write the "Champion Survival Briefing" for Marcus. He's under
     fire from the CMO and feeling sidelined by the new CIO. Give
     him the 3 things he needs to do this week to protect the deal
     and his own position.

assertions:
  - type: llm_judge
    criteria: "Deal save strategy is comprehensive and sequenced — addresses all 4 crises with specific actions, prioritizes correctly (CIO meeting first as it unlocks everything else), and shows understanding of how the crises interconnect"
    weight: 0.35
    description: "Comprehensive deal save strategy"
  - type: llm_judge
    criteria: "CIO meeting email is executive-appropriate — respects the CIO's seniority preference, positions CTO involvement strategically, maintains AE involvement without overstepping, and frames the meeting as strategic partnership discussion"
    weight: 0.30
    description: "Executive-appropriate CIO email"
  - type: llm_judge
    criteria: "Champion survival briefing is both tactical and supportive — gives Marcus specific actions to protect the deal (address CMO, brief CIO, manage RFP) while also protecting his internal standing, acknowledging his frustration without being patronizing"
    weight: 0.35
    description: "Tactical champion briefing"
