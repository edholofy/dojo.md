meta:
  id: cross-cultural-objections
  level: 3
  course: objection-handling
  type: output
  description: "Handle objections across cultures — understand how objections are expressed differently in various cultural contexts and adapt your approach"
  tags: [sales, objections, culture, international, global, communication, advanced]

state: {}

trigger: |
  You're a Global Account Executive at "ConnectPro" (enterprise
  collaboration platform, $100M ARR). You sell across North America,
  Europe, and Asia-Pacific. You've learned that objections manifest
  very differently across cultures — and your North American playbook
  doesn't work everywhere.

  Scenario 1: Japan — Indirect objection
  Prospect: Division Director at a Japanese manufacturing company
  After your presentation, he says: "Thank you very much. This is
  very interesting. We will need to discuss internally and consider
  various factors. Perhaps we can continue this conversation later."
  Context: In high-context cultures, this may be a polite "no." The
  prospect won't say "no" directly. You heard "let's continue" but
  the signals (lack of specific timeline, no questions about next
  steps) suggest rejection.

  Scenario 2: Germany — Direct technical objection
  Prospect: IT Director at a German engineering company
  He says: "Your uptime guarantee of 99.9% means 8.76 hours of
  downtime per year. That is unacceptable for our production systems.
  What is your actual uptime for the past 36 months, broken down by
  month? And what are the penalty clauses for each hour of downtime
  beyond the SLA?"
  Context: German buyers tend to be highly technical and direct. They
  want precise data, not stories or testimonials. Emotional appeals
  will backfire.

  Scenario 3: Middle East — Relationship objection
  Prospect: CEO of a family-owned conglomerate in UAE
  He says: "Your product may be fine, but we do business with people
  we know and trust. We've been working with SAP for 15 years. My
  father started that relationship. Why would I switch to a company
  nobody here has heard of?"
  Context: Relationship-centric buying. The objection isn't about
  product — it's about trust, reputation, and personal relationships
  that span generations.

  Scenario 4: Brazil — Enthusiasm that masks objection
  Prospect: Marketing Director at a Brazilian media company
  She says: "This is amazing! I love it! My team will love it too!
  Let's definitely do something together! Can you send me everything
  and I'll share with the team?"
  Context: In some Latin American cultures, enthusiasm doesn't equal
  commitment. High warmth with vague next steps may indicate the
  prospect liked you personally but isn't committing to the deal.

  Tasks:
  1. For each cultural scenario, write the adapted response. Show
     how you read the cultural signals differently and adjust your
     approach. The key: don't impose your cultural framework on
     the prospect's communication style.

  2. Create the "Cultural Objection Decoder" — a framework for
     identifying how objections are communicated differently across
     high-context vs. low-context cultures, relationship-oriented
     vs. task-oriented cultures, and direct vs. indirect communication
     styles. Include 3 practical tips for each dimension.

  3. Write the "Global Sales Rep's Cultural Mistakes" — 5 common
     mistakes that North American-trained reps make when selling
     internationally, and the objection handling implications of each.

assertions:
  - type: llm_judge
    criteria: "Cultural adaptations are respectful and accurate — Japan response reads indirect signals correctly, Germany response provides precise data, Middle East response addresses relationship-building, Brazil response gently tests commitment behind enthusiasm — without stereotyping"
    weight: 0.35
    description: "Respectful cultural adaptations"
  - type: llm_judge
    criteria: "Cultural decoder framework is practical — maps high-context vs. low-context, relationship vs. task, and direct vs. indirect dimensions with specific objection-reading tips for each, not just theoretical cultural models"
    weight: 0.30
    description: "Practical cultural decoder"
  - type: llm_judge
    criteria: "Cultural mistakes are realistic — identifies real pitfalls like pushing for commitment too early in relationship cultures, using storytelling instead of data in analytical cultures, or reading enthusiasm as commitment in warm cultures"
    weight: 0.35
    description: "Realistic cultural mistakes"
