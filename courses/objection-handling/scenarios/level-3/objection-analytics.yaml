meta:
  id: objection-analytics
  level: 3
  course: objection-handling
  type: output
  description: "Use data and analytics to improve objection handling — analyze objection patterns, conversion rates, and response effectiveness across your team"
  tags: [sales, objections, analytics, data, optimization, performance, advanced]

state: {}

trigger: |
  You're a Sales Operations Manager at "PipelineIQ" (sales analytics
  platform, $55M ARR, 45-person sales team). Your CRO asks you to
  build an "Objection Analytics Dashboard" and use the data to
  improve team performance. You have access to call recording
  transcripts, CRM data, and win/loss analysis for the past year.

  Raw data you've compiled:
  - 2,400 recorded sales calls analyzed
  - 8,600 objections identified and categorized
  - Average 3.6 objections per deal cycle
  - Win rate when first objection is handled well: 41%
  - Win rate when first objection is handled poorly: 12%
  - Most common objection by stage:
    Discovery: "We already have a solution" (38%)
    Demo: "It doesn't have [feature]" (29%)
    Proposal: "Too expensive" (44%)
    Negotiation: "Can you match competitor price?" (52%)
  - Objection-to-close time varies by type:
    Price: 14 days average
    Timing: 42 days average
    Competitor: 21 days average
    Authority: 28 days average
  - Top 3 reps by objection handling score all use Explore/question
    techniques; bottom 3 all use direct response/feature dump

  Tasks:
  1. Design the "Objection Analytics Dashboard" — specify the 8
     metrics that should be tracked, what each tells you, and what
     action to take when each metric moves in the wrong direction.
     Explain which metrics are leading indicators (predict future
     performance) vs. lagging indicators.

  2. Using the data above, write the "3 Biggest Findings" report
     for the CRO. Each finding should include: the data insight,
     why it matters, and the specific intervention to improve it.
     The CRO cares about revenue impact, not methodology.

  3. Design the "Objection Handling Improvement Program" based on
     the data. The data shows questioning techniques outperform
     direct responses — how do you change behavior across 45 reps?
     Include training approach, measurement plan, and expected
     timeline to see results.

assertions:
  - type: llm_judge
    criteria: "Dashboard metrics are well-chosen — includes objection resolution rate, time-to-resolution, win rate by objection type, first-objection success rate, technique usage distribution, stage-specific objection frequency, and clearly distinguishes leading from lagging indicators"
    weight: 0.35
    description: "Well-chosen dashboard metrics"
  - type: llm_judge
    criteria: "CRO report is revenue-focused — translates data into revenue impact (e.g., improving first-objection handling from 12% to 41% win rate = X additional revenue), with 3 clear interventions tied to the biggest revenue opportunities"
    weight: 0.35
    description: "Revenue-focused CRO report"
  - type: llm_judge
    criteria: "Improvement program is realistic — addresses behavior change across 45 reps with a phased approach (train, practice, measure, reinforce), realistic timeline (months not weeks), and measurement plan that shows correlation between technique adoption and win rate improvement"
    weight: 0.30
    description: "Realistic improvement program"
