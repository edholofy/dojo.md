meta:
  id: executive-objection-handling
  level: 3
  course: objection-handling
  type: output
  description: "Handle C-suite objections — navigate executive-level concerns that blend strategic, financial, and political dimensions"
  tags: [sales, objections, executive, C-suite, strategic, advanced]

state: {}

trigger: |
  You're a Strategic AE at "EnterprisAI" (enterprise AI platform,
  $120M ARR). You sell to C-suite executives at Fortune 500 companies.
  Executive objections are fundamentally different from mid-level
  objections — they're strategic, political, and often about
  organizational risk rather than product features.

  Scenario 1: CEO strategic objection
  Company: $2B manufacturing conglomerate
  CEO says: "Our board just approved a 3-year digital transformation
  roadmap with McKinsey. Your AI platform isn't part of that plan.
  I can't introduce another initiative that competes with a $50M
  consulting engagement."
  Context: You're not competing against another product — you're
  competing against a consulting firm's strategic plan. The CEO
  can't be seen undermining McKinsey's roadmap.

  Scenario 2: CFO investment objection
  Company: $800M professional services firm
  CFO says: "We're about to go public. Every dollar of spend is
  scrutinized by our auditors and future investors. I need to show
  we're disciplined with capital, not that we're buying shiny AI
  tools."
  Context: The objection is about optics and timing relative to
  their IPO, not about the value of your product.

  Scenario 3: CTO legacy objection
  Company: $1.5B healthcare system
  CTO says: "I've spent 5 years building our internal AI capability.
  If I bring in an external platform now, it looks like I failed.
  I won't do that to my team."
  Context: This is a deeply personal/political objection. The CTO's
  identity is tied to their internal build. Any response that
  implies their effort was wasted will end the conversation.

  Tasks:
  1. Write the response to each executive objection. Key constraints:
     you cannot use standard sales techniques (LAER feels patronizing
     to a CEO), you must speak in strategic language (not feature/
     benefit), and you must respect the political dimensions.

  2. Explain the 5 ways executive objections differ from mid-level
     objections. For each difference, explain how it changes your
     approach (e.g., executives evaluate vendors as strategic
     partners, not tool providers).

  3. Write the "Executive Objection Preparation Checklist" — 8
     things you research before any C-suite meeting to anticipate
     and prepare for their likely objections (beyond standard company
     research).

assertions:
  - type: llm_judge
    criteria: "Responses are strategically appropriate — CEO response positions alongside McKinsey (not competing), CFO response addresses IPO optics with financial discipline framing, CTO response honors their build while offering complementary positioning — all in executive language"
    weight: 0.35
    description: "Strategically appropriate responses"
  - type: llm_judge
    criteria: "Executive vs. mid-level differences are substantive — covers strategic framing, political dynamics, time horizon, peer influence, and organizational risk with specific approach changes for each"
    weight: 0.30
    description: "Substantive executive differences"
  - type: llm_judge
    criteria: "Preparation checklist goes beyond basics — includes board priorities, recent earnings calls, consulting engagements, organizational politics, personal career trajectory of the executive, regulatory pressures, and competitive strategic moves"
    weight: 0.35
    description: "Beyond-basics preparation checklist"
