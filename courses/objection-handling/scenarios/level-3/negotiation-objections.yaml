meta:
  id: negotiation-objections
  level: 3
  course: objection-handling
  type: output
  description: "Handle objections during contract negotiations — distinguish between genuine concerns and negotiation tactics during the final stages of a deal"
  tags: [sales, objections, negotiation, contract, closing, tactics, advanced]

state: {}

trigger: |
  You're a Senior AE at "SecureOps" (security operations platform,
  $80M ARR). You've navigated a 4-month enterprise sales cycle with
  GlobalTech (5,000 employees). The champion loves you, the technical
  team approved, and budget is allocated. Now you're in contract
  negotiations and the prospect's negotiation team is using classic
  tactics disguised as objections.

  Tactic 1: The "Higher Authority" bluff
  Negotiator: "Everything looks good but our CEO personally reviews
  all deals over $500K. He's traveling for 3 weeks. Can you extend
  the discount offer until he returns?"
  Reality check: Your deal is $380K — below the threshold. The CEO
  review is likely a stall tactic to get you to extend your quarter-
  end discount.

  Tactic 2: The "Cherry Pick"
  Negotiator: "We love the platform but we only need the detection
  module, not response. Can we buy just detection at 40% of the
  price?"
  Reality check: Your detection module without response is like
  buying smoke detectors without a fire department. They likely want
  the full platform but are trying to unbundle for a lower price.

  Tactic 3: The "Last-Minute Competitor"
  Negotiator: "Before we sign, I should mention that CrowdStrike
  just came back with an aggressive counter-offer. We're 60/40
  leaning toward you but their price is very compelling."
  Reality check: CrowdStrike may or may not have made a real offer.
  This is a classic "phantom competitor" tactic used in 40% of
  enterprise negotiations.

  Tactic 4: The "Scope Creep"
  Negotiator: "We're ready to sign if you include implementation
  services, 24/7 premium support, and a dedicated CSM — all at the
  current price."
  Reality check: They're trying to add $80K of services to a $380K
  deal without increasing the price. These services have real cost.

  Tasks:
  1. For each tactic, write: (a) how to recognize it's a tactic vs.
     a genuine concern, (b) the response that acknowledges it without
     conceding, and (c) the counter-move that advances the deal. You
     must maintain the relationship — these aren't adversaries, they
     have a job to do.

  2. Write the "Negotiation vs. Objection" guide — how to tell the
     difference between a real objection (needs to be resolved) and
     a negotiation tactic (needs to be navigated). Include 5
     diagnostic signals that distinguish the two.

  3. Your VP of Sales says: "Good negotiators never say no directly.
     They redirect." Write 5 "redirect phrases" that let you decline
     a request without creating adversarial tension. For each phrase,
     explain the psychology behind why it works.

assertions:
  - type: llm_judge
    criteria: "Tactic recognition is accurate — correctly identifies Higher Authority as a stall, Cherry Pick as unbundling, Last-Minute Competitor as phantom pressure, Scope Creep as value extraction, with specific signals for each and responses that acknowledge without conceding"
    weight: 0.35
    description: "Accurate tactic recognition"
  - type: llm_judge
    criteria: "Negotiation vs. objection guide is practical — provides 5 clear diagnostic signals (timing, specificity, emotionality, consistency, resolution willingness) that help reps distinguish between genuine concerns requiring resolution and tactical moves requiring navigation"
    weight: 0.35
    description: "Practical negotiation vs objection guide"
  - type: llm_judge
    criteria: "Redirect phrases are sophisticated — 5 phrases that decline without 'no' (e.g., 'Here's what I can do...', 'That's outside our standard terms, but let me suggest...') with explanation of why each preserves the relationship while protecting position"
    weight: 0.30
    description: "Sophisticated redirect phrases"
