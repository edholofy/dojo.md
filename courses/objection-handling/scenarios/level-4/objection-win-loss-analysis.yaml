meta:
  id: objection-win-loss-analysis
  level: 4
  course: objection-handling
  type: output
  description: "Conduct objection-focused win/loss analysis — extract actionable objection handling insights from won and lost deals to improve team performance"
  tags: [sales, objections, win-loss, analysis, continuous-improvement, expert]

state: {}

trigger: |
  You're the Senior Director of Sales Strategy at "CloudMatrix"
  (cloud infrastructure, $200M ARR). The CEO commissioned a
  comprehensive win/loss analysis focused specifically on how
  objection handling influenced deal outcomes. You've completed
  60 win/loss interviews (30 won, 30 lost) and have the results.

  Key findings:

  Won deals (30 interviews):
  - 87% said the rep "listened to our concerns before responding"
  - 73% said the rep "acknowledged our situation was unique"
  - 60% said the rep "connected our concern to business outcomes"
  - Top quote: "They didn't try to overcome our objection — they
    helped us solve the problem behind it"
  - Average objections per won deal: 4.2
  - Objections resolved in first response: 62%

  Lost deals (30 interviews):
  - 63% said the rep was "defensive or dismissive" of concerns
  - 54% said the rep "gave a generic answer that didn't fit us"
  - 47% said the rep "tried to argue instead of understand"
  - 38% said they "told the rep the real concern but rep addressed
    something else"
  - Top quote: "They heard the words but not the meaning"
  - Average objections per lost deal: 3.8
  - Objections resolved in first response: 28%

  Objection-specific win rates:
  - Price objections: Won 35% when reframed to value, 8% when
    discounted
  - Technical objections: Won 55% when addressed with POC, 20%
    when addressed with documentation
  - Timing objections: Won 42% when urgency was genuine, 5%
    when urgency was manufactured
  - Competitive objections: Won 48% when focused on fit, 15%
    when focused on feature comparison
  - Authority objections: Won 40% when champion was enabled, 10%
    when rep tried to go around champion

  Tasks:
  1. Write the "Objection Handling Win/Loss Report" for the CEO
     and leadership team. Translate the raw findings into 5
     strategic insights with specific recommendations. The CEO
     thinks in terms of revenue impact, not methodology.

  2. Create the "Lost Deal Autopsy Template" — a structured
     interview guide for win/loss analysis that focuses specifically
     on objection handling moments. Include: the 10 questions to
     ask, how to probe for specific examples, and how to categorize
     findings for pattern analysis.

  3. Design the "Continuous Improvement Loop" — how do win/loss
     insights feed back into the objection handling playbook, training
     program, and individual coaching? Include: data flow, update
     frequency, accountability, and how you measure whether the
     insights actually improved performance.

assertions:
  - type: llm_judge
    criteria: "CEO report translates data to revenue — 5 insights connect specific findings to revenue impact (e.g., value reframing wins 35% vs. 8% discounting = X revenue opportunity), with recommendations the CEO can act on"
    weight: 0.35
    description: "Revenue-focused CEO report"
  - type: llm_judge
    criteria: "Autopsy template is specific to objections — 10 questions probe specific objection moments, not general deal satisfaction, with follow-up probes that get to specific examples of what was said and how it landed"
    weight: 0.30
    description: "Objection-specific autopsy template"
  - type: llm_judge
    criteria: "Improvement loop is operationally realistic — shows clear data flow from win/loss interviews to playbook updates to training to coaching with specific cadences, ownership, and measurement that would actually work in a 200-person sales org"
    weight: 0.35
    description: "Operationally realistic improvement loop"
