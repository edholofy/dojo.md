meta:
  id: objection-crisis-management
  level: 4
  course: objection-handling
  type: output
  description: "Handle objections during company crises — manage prospect concerns when your company faces negative press, outages, leadership changes, or security incidents"
  tags: [sales, objections, crisis, reputation, damage-control, trust, expert]

state: {}

trigger: |
  You're the VP of Sales at "DataShield" (cybersecurity platform,
  $80M ARR, 40-person sales team). Your company just experienced a
  series of crises, and your prospects are raising objections you've
  never faced before.

  Crisis 1: Data breach (Week 1)
  A security researcher disclosed that DataShield had a vulnerability
  that was exploited for 3 weeks before being patched. Customer data
  wasn't compromised, but the news is everywhere.
  Prospect objection: "You're a CYBERSECURITY company that got
  hacked? How can we trust you to protect us?"

  Crisis 2: CEO controversy (Week 3)
  Your CEO made controversial statements at a conference that went
  viral. Several customers publicly questioned their relationship
  with DataShield. The CEO has apologized but the damage is done.
  Prospect objection: "We align with companies that share our
  values. Your CEO's comments concern our leadership team."

  Crisis 3: Major outage (Week 5)
  Your platform had a 14-hour outage that affected all customers.
  Root cause was a cloud provider failure, but customers blamed
  DataShield. Post-mortem showed your failover didn't work.
  Prospect objection: "14 hours of downtime? Our business can't
  afford that. What guarantee do we have this won't happen again?"

  Crisis 4: Mass layoff (Week 7)
  DataShield laid off 25% of staff including several key engineers.
  It hit the tech press. Remaining team is demoralized.
  Prospect objection: "You just laid off a quarter of your company.
  Who's going to support us? Is DataShield even going to be around
  next year?"

  Tasks:
  1. For each crisis, write the talking points your sales team
     should use when prospects raise these objections. Rules: be
     honest (never deny or minimize what happened), take
     accountability, show what you've learned, and provide a forward-
     looking commitment. Every talking point must pass the "headline
     test" — if quoted in the press, it shouldn't embarrass you.

  2. Create the "Crisis Communication Playbook for Sales" — the
     standard operating procedure for when a company crisis creates
     prospect objections. Include: when to escalate (some objections
     are too sensitive for individual reps), what NOT to say (things
     that will backfire), and the internal briefing process (how
     leadership communicates with the sales team).

  3. Write the email template that goes to all active prospects
     during a crisis. It should be transparent, accountable, and
     confidence-building. Include guidance on when to send proactively
     (before they hear from the news) vs. reactively (after they
     raise the concern).

assertions:
  - type: llm_judge
    criteria: "Talking points are honest and accountable — each acknowledges what happened without denial or minimization, takes responsibility, explains remediation, and provides forward-looking commitment that would survive press scrutiny"
    weight: 0.35
    description: "Honest accountable talking points"
  - type: llm_judge
    criteria: "Crisis playbook is operationally sound — includes clear escalation criteria, specific things to avoid (blame-shifting, unauthorized promises, speculation), and an internal briefing process that gets reps the right information quickly"
    weight: 0.35
    description: "Operationally sound crisis playbook"
  - type: llm_judge
    criteria: "Crisis email is transparent and confidence-building — acknowledges the situation, explains what happened and why, details remediation, and rebuilds trust without being defensive or sycophantic, with clear proactive vs. reactive sending guidance"
    weight: 0.30
    description: "Transparent crisis email"
