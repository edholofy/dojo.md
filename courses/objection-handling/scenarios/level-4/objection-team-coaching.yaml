meta:
  id: objection-team-coaching
  level: 4
  course: objection-handling
  type: output
  description: "Design and run an objection handling coaching program — build team-wide competency through systematic coaching, practice, and feedback loops"
  tags: [sales, objections, coaching, team-development, enablement, expert]

state: {}

trigger: |
  You're the VP of Sales at "ScaleForce" (enterprise SaaS, $120M
  ARR, 60-person sales team). Your team's objection handling
  performance is inconsistent — top quartile reps convert 45% of
  objection-laden deals while bottom quartile converts only 12%.
  The board wants you to close this gap.

  Current team data:
  - 60 reps: 15 SDRs, 30 AEs, 10 Senior AEs, 5 Enterprise AEs
  - Average objection handling score: 5.4/10 (industry avg: 6.2)
  - Win rate after objection: 28% (target: 38%)
  - Most common failure modes:
    * 42% give premature answers (respond before understanding)
    * 31% get defensive or argumentative
    * 18% agree too quickly (concede without exploring)
    * 9% freeze and change the subject
  - Top performers share 3 traits: they ask questions first, they
    validate before responding, and they connect objections to
    business outcomes
  - Training budget: $150K annually
  - Time budget: Reps can dedicate 2 hours/week to training

  Tasks:
  1. Design the "Objection Mastery Program" — a 12-week training
     curriculum that transforms team-wide objection handling. Include:
     weekly topics, practice formats (role-play, call review, peer
     coaching), skill progression milestones, and measurement criteria.
     The program must work for all 4 levels (SDR through Enterprise AE).

  2. Create the "Coaching Playbook for Managers" — your 8 frontline
     managers need to coach objection handling daily, not just during
     training. Write the coaching framework: what to listen for in
     call reviews, how to give feedback on objection handling
     (specific examples, not vague advice), and the 5-minute post-
     call debrief template.

  3. Design the "Objection Handling Certification" — 3 levels
     (Bronze, Silver, Gold) that reps earn by demonstrating
     competency. Include: the skills tested at each level, the
     assessment method (live role-play with rubric), and the
     incentives for certification (public recognition, comp impact,
     deal assignment priority).

assertions:
  - type: llm_judge
    criteria: "12-week program is structured and progressive — starts with fundamentals (listening, acknowledging), builds to frameworks (LAER, reframing), advances to practice (role-play, live coaching), with clear weekly topics, differentiated paths for different rep levels, and measurable milestones"
    weight: 0.35
    description: "Structured progressive program"
  - type: llm_judge
    criteria: "Manager coaching playbook is practical for daily use — provides specific call review criteria, feedback templates that reference observable behaviors (not personality), and a 5-minute debrief format that fits into a manager's actual schedule"
    weight: 0.35
    description: "Practical manager playbook"
  - type: llm_judge
    criteria: "Certification system is motivating and credible — 3 levels with genuinely different skill requirements, assessment via live role-play (not just knowledge tests), and meaningful incentives that create internal motivation without being punitive"
    weight: 0.30
    description: "Motivating certification system"
