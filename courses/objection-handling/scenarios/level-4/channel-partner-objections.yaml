meta:
  id: channel-partner-objections
  level: 4
  course: objection-handling
  type: output
  description: "Handle objections through channel partners — enable partners to handle objections on your behalf when you don't control the customer conversation"
  tags: [sales, objections, channel, partners, indirect, enablement, expert]

state: {}

trigger: |
  You're the VP of Channel Sales at "NetSecure" (network security,
  $110M ARR). 45% of your revenue comes through 200 channel partners
  (MSPs, VARs, and SIs). The problem: your partners sell 15-20
  different vendors' products, and when a customer objects to
  NetSecure, partners often switch to recommending a competitor
  instead of handling the objection.

  Partner performance data:
  - Partners who can handle NetSecure objections: close rate 38%
  - Partners who can't handle objections: close rate 11%
  - Most common objections partners encounter:
    1. "Why NetSecure over Palo Alto?" (52% of partner deals)
    2. "NetSecure is too expensive for our size" (44%)
    3. "We've never heard of NetSecure" (37%)
    4. "Does NetSecure integrate with our existing Cisco stack?" (31%)
  - When partners hear objection #1, 60% recommend Palo Alto instead

  Partner types with different needs:
  - MSPs (80 partners): Sell managed services, need simple objection
    handles they can use in 5-minute conversations
  - VARs (90 partners): Sell products, need competitive positioning
    and technical depth
  - SIs (30 partners): Sell solutions, need strategic business case
    materials and integration architecture

  Tasks:
  1. Design the "Partner Objection Enablement Program" — how do you
     equip 200 partners to handle NetSecure objections when you
     can't be on every call? Include: materials for each partner
     type, training approach (they won't attend long sessions), and
     the incentive structure that rewards objection handling over
     product switching.

  2. Create the "Quick Objection Card" for MSPs — a one-page
     reference card that addresses the top 4 objections in 2-3
     sentences each. This is what an MSP sales rep looks at during
     a customer call when they hear "why not Palo Alto?"

  3. Design the "Partner Escalation Protocol" — when should a
     partner escalate an objection to your direct sales team vs.
     handle it themselves? Include: the escalation criteria, the
     handoff process (warm transfer, not cold), and how you avoid
     undermining the partner relationship when you step in.

assertions:
  - type: llm_judge
    criteria: "Enablement program is differentiated by partner type — MSPs get simple quick-reference tools, VARs get competitive depth, SIs get strategic business case materials, with training approaches that respect each type's time constraints"
    weight: 0.35
    description: "Partner-type differentiated enablement"
  - type: llm_judge
    criteria: "Quick objection card is genuinely usable — one page, 2-3 sentence responses per objection that a busy MSP rep can read during a customer call, with language that sounds natural rather than scripted"
    weight: 0.30
    description: "Genuinely usable quick card"
  - type: llm_judge
    criteria: "Escalation protocol is partnership-preserving — clear criteria for when to escalate, a warm handoff process that keeps the partner involved, and guardrails against undermining the partner relationship when direct sales steps in"
    weight: 0.35
    description: "Partnership-preserving escalation"
