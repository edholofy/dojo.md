meta:
  id: ai-objection-intelligence
  level: 4
  course: objection-handling
  type: output
  description: "Leverage AI and conversation intelligence for objection handling — use technology to analyze, predict, and coach on objection handling at scale"
  tags: [sales, objections, AI, conversation-intelligence, technology, prediction, expert]

state: {}

trigger: |
  You're the Director of Revenue Operations at "InsightCo"
  (conversation intelligence platform, $70M ARR). Your company
  sells AI-powered call analysis, and you use your own product
  internally. You have unprecedented data on how your 50 reps
  handle objections.

  AI-generated insights from your platform (last quarter):
  - 3,200 calls analyzed, 9,800 objections detected
  - AI identified 23 distinct objection "clusters"
  - Objection sentiment analysis shows:
    * 34% of objections are delivered with high confidence (genuine)
    * 41% are delivered with uncertainty (testable)
    * 25% are delivered with resignation (brush-off)
  - Timing analysis:
    * Objections raised in the first 10 minutes: 65% are brush-offs
    * Objections raised after 20 minutes: 78% are genuine
    * Objections raised after prospect asks 3+ questions: 90% genuine
  - Response effectiveness scoring:
    * Responses that start with a question: 52% resolution rate
    * Responses that start with acknowledgment: 44% resolution rate
    * Responses that start with a statement: 23% resolution rate
  - Predictive model: AI can predict with 73% accuracy whether an
    objection will be resolved based on the first 15 seconds of the
    rep's response

  Tasks:
  1. Using this AI-generated data, write the "Objection Intelligence
     Report" that translates these insights into 5 specific behavior
     changes for your team. Each insight should have: the data
     finding, why it matters, the old behavior, the new behavior,
     and how to measure adoption.

  2. Design the "AI-Assisted Objection Coaching" system. How would
     you use real-time AI during calls to help reps handle objections
     better? Include: what the AI would display (suggested responses,
     sentiment analysis, talk track cues), what it would NOT display
     (to avoid cognitive overload), and the privacy/ethical
     considerations.

  3. Your CEO asks: "Can AI replace the need for objection handling
     training entirely?" Write the balanced response that shows
     where AI adds value (pattern recognition, coaching, prediction)
     and where human skill remains essential (empathy, creativity,
     relationship judgment). Include your recommendation for the
     optimal human-AI division.

assertions:
  - type: llm_judge
    criteria: "Intelligence report translates data to behavior — 5 insights each connect specific data findings to actionable behavior changes with measurement plans, not just presenting data and hoping reps draw conclusions"
    weight: 0.35
    description: "Data-to-behavior translation"
  - type: llm_judge
    criteria: "AI coaching system is thoughtful about UX — balances real-time helpfulness with cognitive load management, shows the right information at the right moment, and addresses ethical considerations (consent, recording, AI bias)"
    weight: 0.35
    description: "Thoughtful AI coaching design"
  - type: llm_judge
    criteria: "Human-AI balance is nuanced — avoids both extremes (AI replaces everything vs. AI adds nothing), identifies specific strengths of each (AI: pattern recognition, scale, consistency; Human: empathy, creativity, context) with a practical recommendation"
    weight: 0.30
    description: "Nuanced human-AI balance"
