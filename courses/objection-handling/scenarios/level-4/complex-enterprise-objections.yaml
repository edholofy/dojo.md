meta:
  id: complex-enterprise-objections
  level: 4
  course: objection-handling
  type: output
  description: "Handle complex enterprise objections — navigate multi-threaded deals with conflicting stakeholders, political dynamics, and organizational resistance"
  tags: [sales, objections, enterprise, complex, multi-stakeholder, politics, expert]

state: {}

trigger: |
  You're an Enterprise AE at "DataForge" (enterprise data platform,
  $150M ARR). You're working on a $1.2M deal with NationalBank
  (15,000 employees). The deal involves 8 stakeholders across 4
  departments. After 6 months, the deal is stuck — not because of
  your product, but because of organizational dynamics.

  The stakeholder map:
  1. CTO (Power: decision authority, Stance: supportive)
     "DataForge is technically superior. I want this."
  2. CISO (Power: veto authority, Stance: cautious)
     "I need 6 more months of security review. We can't rush this."
  3. CFO (Power: budget authority, Stance: skeptical)
     "Show me why $1.2M is better than investing in our internal
     team."
  4. COO (Power: operational authority, Stance: neutral)
     "I'll support whatever IT recommends, but my ops team's needs
     must be prioritized."
  5. Head of Data (Power: champion, Stance: enthusiastic)
     "I've been driving this for months. If it falls apart, my
     credibility is shot."
  6. VP of Compliance (Power: regulatory authority, Stance: opposed)
     "Our regulators won't approve a third-party data platform
     without a 12-month assessment."
  7. Head of IT Infrastructure (Power: technical influence, Stance:
     threatened)
     "If DataForge handles data infrastructure, what does my team
     do?"
  8. CEO (Power: ultimate authority, Stance: uninformed)
     Has not been briefed on the deal. Will hear about it only if
     it reaches executive committee.

  The blockers:
  - CISO's 6-month security review is unnecessary (you already
    passed their technical assessment) but she uses it as a delay
    tactic because she's cautious by nature.
  - VP of Compliance is genuinely concerned about regulatory timeline
  - Head of IT Infrastructure is actively working against the deal
    because he sees DataForge as a threat to his team

  Tasks:
  1. Write the "Stakeholder Alignment Strategy" — how do you get
     8 people with conflicting priorities aligned? Include: which
     stakeholders to focus on (you can't give equal attention to
     all 8), the sequence of conversations, and the key message
     for each aligned to their individual concerns.

  2. Address the 3 blockers specifically:
     a) CISO delay tactic: How do you accelerate the review without
        making her feel overridden?
     b) VP of Compliance regulatory concern: How do you satisfy a
        legitimate regulatory timeline while keeping deal momentum?
     c) Head of IT Infrastructure threat: How do you neutralize
        opposition from someone who sees your product as a career
        threat?

  3. Write the "Executive Committee Brief" — a 1-page document that
     your champion (Head of Data) would present to the CEO and
     executive committee. It must address the concerns of ALL
     stakeholders in a unified narrative.

assertions:
  - type: llm_judge
    criteria: "Alignment strategy is realistically prioritized — focuses effort on the 3-4 most influential stakeholders, sequences conversations strategically (e.g., get CTO and COO aligned first, then use them to influence CISO), and tailors messages to each person's self-interest"
    weight: 0.35
    description: "Realistically prioritized alignment"
  - type: llm_judge
    criteria: "Blocker strategies are nuanced — CISO approach respects her caution while creating urgency, Compliance approach addresses real regulatory needs, IT Infrastructure approach acknowledges the career threat and repositions DataForge as complementary rather than replacement"
    weight: 0.35
    description: "Nuanced blocker strategies"
  - type: llm_judge
    criteria: "Executive brief is concise and unified — one page that tells a coherent story addressing security (CISO), ROI (CFO), operations (COO), compliance (VP), and strategic value (CEO) without reading like a list of compromises"
    weight: 0.30
    description: "Concise unified executive brief"
