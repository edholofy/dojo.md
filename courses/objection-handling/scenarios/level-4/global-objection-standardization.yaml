meta:
  id: global-objection-standardization
  level: 4
  course: objection-handling
  type: output
  description: "Standardize objection handling across global sales teams — balance consistent methodology with cultural and market-specific adaptation"
  tags: [sales, objections, global, standardization, localization, scale, expert]

state: {}

trigger: |
  You're the Global VP of Sales Enablement at "UniCloud" (unified
  communications platform, $300M ARR). UniCloud has 200 reps across
  5 regions: North America (80 reps), EMEA (50 reps), APAC (40 reps),
  LATAM (20 reps), and Middle East/Africa (10 reps). Each region
  handles objections differently, and there's no consistent approach.

  Current state:
  - North America: Uses LAER framework, aggressive about handling
    objections in real-time, strong on competitive responses
  - EMEA: Mix of approaches, UK team is similar to NA, DACH team
    is very technical/direct, Southern Europe is relationship-first
  - APAC: Japan team avoids direct objection handling (cultural),
    Australia is similar to UK, India team negotiates heavily on
    price
  - LATAM: Brazil team is enthusiastic but lacks structure, Mexico
    team follows NA playbook loosely
  - MEA: Small team, no formal methodology, relies on relationship
    selling

  Problems identified:
  - 15 different objection handling approaches across regions
  - No shared language for discussing objection handling in QBRs
  - Enterprise deals spanning multiple regions have inconsistent
    customer experiences
  - New hire onboarding differs dramatically by region (NA: 2 weeks,
    APAC: 0 days, EMEA: 1 week)
  - Global accounts report conflicting messages from different
    regional reps

  Tasks:
  1. Design the "Global Objection Handling Framework" — a unified
     methodology that works across all 5 regions. It must have: a
     core methodology (non-negotiable, same everywhere), regional
     adaptations (how the core bends for cultural context), and local
     autonomy zones (what each region decides for itself).

  2. Write the change management plan for rolling this out to 200
     reps across 5 regions. Address: regional resistance (APAC will
     push back on Western frameworks), training sequencing (who goes
     first?), success metrics by region, and the leadership alignment
     process (getting 5 regional VPs to agree).

  3. Design the "Global Account Consistency Protocol" — for deals
     that span multiple regions, how do you ensure the customer gets
     a consistent objection handling experience? Include: the
     handoff process, shared deal language, and escalation procedures
     when regional approaches conflict.

assertions:
  - type: llm_judge
    criteria: "Framework balances consistency and adaptation — clearly separates non-negotiable core methodology from culturally adapted delivery and regionally autonomous elements, avoiding both rigid standardization and chaotic inconsistency"
    weight: 0.35
    description: "Balanced global framework"
  - type: llm_judge
    criteria: "Change management plan is culturally sensitive — addresses regional resistance (especially APAC cultural considerations) thoughtfully, sequences rollout strategically, and includes realistic metrics that account for regional differences"
    weight: 0.35
    description: "Culturally sensitive change management"
  - type: llm_judge
    criteria: "Global account protocol solves the consistency problem — provides practical handoff processes, shared language for multi-region deals, and escalation procedures that prevent conflicting customer messages"
    weight: 0.30
    description: "Practical global account protocol"
