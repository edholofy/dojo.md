meta:
  id: objection-playbook-design
  level: 4
  course: objection-handling
  type: output
  description: "Design a company-wide objection handling playbook — create the definitive reference document that codifies institutional knowledge for all reps"
  tags: [sales, objections, playbook, documentation, enablement, institutional-knowledge, expert]

state: {}

trigger: |
  You're the Head of Sales Enablement at "TechBridge" (integration
  platform, $95M ARR). Your CEO just asked: "Why do we keep losing
  deals to the same objections? Don't we have a playbook for this?"
  You don't. You need to build one.

  The challenge: TechBridge has 80 sales reps across 4 segments
  (SMB, Mid-Market, Enterprise, Strategic) selling to 6 industries.
  Each segment/industry combination faces different objections. A
  generic playbook won't work.

  Data you've collected:
  - 150 hours of call recordings analyzed
  - 45 objection patterns identified
  - 12 objection response techniques documented
  - 8 competitive battlecards exist (but none address objections)
  - Win/loss data shows top objections by segment:
    SMB: Price (58%), "We're too small" (22%), Timing (20%)
    Mid-Market: Competitor (35%), Integration (30%), Authority (25%)
    Enterprise: Procurement (40%), Security (30%), Change mgmt (30%)
    Strategic: Executive alignment (45%), Strategic fit (35%), ROI (20%)

  Tasks:
  1. Design the playbook structure. What sections does it need? How
     is it organized (by objection type? by segment? by sales stage?)?
     Create the table of contents with section descriptions. The
     playbook must be usable in real-time during calls, not just
     as study material.

  2. Write one complete playbook entry as a template. Choose the
     most common objection (SMB price) and write the full entry
     including: trigger phrases (how the prospect says it), root
     cause analysis (why they're saying it), response framework
     (the approach), example scripts (word-for-word), and success
     metrics (how to know if you handled it well).

  3. Design the playbook maintenance system — how does the playbook
     stay current? Include: who updates it, how new objections get
     added, how response effectiveness is measured, and the quarterly
     review process. A playbook that isn't maintained is worse than
     no playbook.

assertions:
  - type: llm_judge
    criteria: "Playbook structure is usable in real-time — organized for quick lookup during calls (objection → response, not theory → practice), with clear navigation path from segment/industry to specific objection to response, not a 200-page document nobody reads"
    weight: 0.35
    description: "Real-time usable structure"
  - type: llm_judge
    criteria: "Template entry is comprehensive and practical — includes trigger phrases, root cause analysis, response framework, word-for-word scripts with variations, and success metrics, serving as a model that can be replicated for all 45 objection patterns"
    weight: 0.35
    description: "Comprehensive practical template"
  - type: llm_judge
    criteria: "Maintenance system is sustainable — defines ownership, update triggers, effectiveness measurement, and quarterly review process that ensures the playbook stays current without requiring excessive effort"
    weight: 0.30
    description: "Sustainable maintenance system"
