meta:
  id: objection-content-strategy
  level: 4
  course: objection-handling
  type: output
  description: "Build a content strategy around objections — create marketing and sales content that preemptively addresses top objections before prospects even raise them"
  tags: [sales, objections, content, marketing, preemptive, thought-leadership, expert]

state: {}

trigger: |
  You're the VP of Marketing at "FinanceAI" (AI-powered financial
  planning platform, $65M ARR). Your Head of Sales comes to you
  with a request: "We keep hearing the same 5 objections. Can
  marketing create content that handles these before they reach us?"

  The top 5 objections sales encounters:
  1. "AI can't replace human financial advisors" (43% of prospects)
  2. "What about data privacy and regulatory compliance?" (38%)
  3. "We tried AI tools before and they didn't work" (29%)
  4. "Our advisors will resist using AI" (25%)
  5. "The ROI of AI in wealth management is unproven" (21%)

  Current content gap:
  - Blog has 200+ articles, zero specifically address objections
  - Case studies exist but don't frame stories around resolved
    objections
  - Webinars are product-focused, not objection-focused
  - Sales has zero content to share when these objections arise

  Tasks:
  1. Design the "Objection-Driven Content Calendar" — a 6-month
     content plan where every piece of content maps to one of the
     5 objections. Include: content format (blog, case study, white
     paper, webinar, social, video), topic and angle, target persona
     (who needs to see this), and which stage of the buyer journey
     it serves. At least 3 pieces per objection.

  2. Write one complete content piece: a 500-word blog post titled
     to address objection #1 ("AI can't replace human financial
     advisors"). The post should reframe the narrative from
     "replacement" to "augmentation" with specific examples and data.
     It must be useful content, not a product pitch.

  3. Design the "Sales-Marketing Objection Feedback Loop" — how does
     sales communicate new objections to marketing, and how does
     marketing's content get into reps' hands at the right moment?
     Include: the submission process, prioritization criteria, content
     distribution to sales, and measurement of content's impact on
     objection resolution.

assertions:
  - type: llm_judge
    criteria: "Content calendar is comprehensive and strategic — maps all 5 objections to multiple content formats, targets the right persona for each, aligns with buyer journey stages, and provides genuine value rather than thinly veiled product promotion"
    weight: 0.35
    description: "Strategic content calendar"
  - type: llm_judge
    criteria: "Blog post is genuinely useful — reframes AI from replacement to augmentation with specific examples and data points, reads as thought leadership rather than a sales pitch, and would actually change a skeptic's perspective"
    weight: 0.30
    description: "Genuinely useful blog post"
  - type: llm_judge
    criteria: "Feedback loop is operationally realistic — provides a clear process for sales to submit objections, marketing to prioritize and create content, and content to reach reps at the right moment (in CRM, as battlecard links, etc.) with impact measurement"
    weight: 0.35
    description: "Realistic feedback loop"
