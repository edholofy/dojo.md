meta:
  id: expert-objection-shift
  level: 4
  course: objection-handling
  type: output
  description: "Shift simulation combining expert techniques — navigate an organizational objection handling transformation across teams, regions, and executive levels"
  tags: [sales, objections, simulation, transformation, organizational, expert]

state: {}

trigger: |
  You're the newly hired CRO at "VelocityCloud" (cloud infrastructure,
  $180M ARR, 150 sales reps). The board hired you because win rates
  have dropped from 32% to 22% in 18 months. After 60 days of
  analysis, you've identified that objection handling is the single
  biggest factor — your reps are consistently losing deals at the
  objection stage.

  Your analysis:
  - 150 reps across 5 segments (SMB, Growth, Mid-Market, Enterprise,
    Strategic)
  - Average objection handling score: 4.2/10 (industry avg: 6.2)
  - Bottom 50% of reps have NEVER had objection handling training
  - No standardized objection playbook exists
  - Managers don't coach on objections (they coach on pipeline only)
  - Sales enablement team has 2 people — overwhelmed
  - Call recording exists but nobody reviews it systematically
  - Competitive intelligence is outdated (last updated 14 months ago)
  - Reps report that most objections they face are "new" — they
    haven't seen them before (analysis shows 85% are actually
    variations of the same 20 objections)

  Budget: $500K for objection handling improvement
  Timeline: Board wants measurable improvement in 2 quarters
  Constraints: Can't replace more than 10% of reps, must use
  existing tech stack

  Tasks:
  1. Write the "90-Day Transformation Plan" that takes objection
     handling score from 4.2 to 6.0+ within 2 quarters. Include:
     Phase 1 (Days 1-30): Quick wins and foundation
     Phase 2 (Days 31-60): Systems and training
     Phase 3 (Days 61-90): Coaching and measurement
     For each phase, specify: activities, owners, budget allocation,
     and measurable milestones.

  2. Present the business case to the board. They gave you $500K
     and want to see ROI. Write the "Objection Handling ROI Model"
     that shows: current revenue leak from poor objection handling,
     projected improvement from the program, expected revenue impact,
     and payback period. Use the company's real numbers ($180M ARR,
     150 reps, 22% win rate target 32%).

  3. Write the "First All-Hands Email" to your 150 reps announcing
     the objection handling transformation. The tone must be:
     honest about current performance without blaming individuals,
     inspiring about the opportunity, specific about what changes,
     and clear about expectations. Reps who've been failing at
     objections need to feel supported, not threatened.

assertions:
  - type: llm_judge
    criteria: "90-day plan is phased and realistic — Phase 1 delivers quick wins (playbook, top 20 objections catalog), Phase 2 builds systems (training, call review, enablement), Phase 3 embeds coaching and measurement, with specific owners, budgets, and milestones per phase"
    weight: 0.35
    description: "Phased realistic transformation plan"
  - type: llm_judge
    criteria: "ROI model is credible — uses real numbers ($180M ARR, 150 reps, 22%→32% win rate) to calculate revenue impact of objection handling improvement, shows payback period, and presents the math in a way that would satisfy a board"
    weight: 0.30
    description: "Credible ROI model"
  - type: llm_judge
    criteria: "All-hands email strikes the right tone — honest about the gap without blaming, inspiring about the opportunity, specific about changes, and supportive rather than threatening to struggling reps, creating buy-in rather than fear"
    weight: 0.35
    description: "Right-toned all-hands email"
