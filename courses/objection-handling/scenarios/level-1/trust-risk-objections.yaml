meta:
  id: trust-risk-objections
  level: 1
  course: objection-handling
  type: output
  description: "Handle trust and risk objections — respond when prospects worry about switching risks, vendor reliability, or data security concerns"
  tags: [sales, objections, trust, risk, security, reliability, beginner]

state: {}

trigger: |
  You're an Account Executive at "DataVault" (cloud data platform,
  $50M ARR). You sell to companies moving from on-premise to cloud.
  Trust and risk objections are your #1 obstacle. Here are 4 scenarios:

  Scenario 1: Security concern
  Prospect: CISO at a 300-person financial services firm
  "We can't put our client data in anyone else's cloud. If there's a
  breach, it's our reputation on the line, not yours."
  Context: Your platform is SOC 2 Type II certified, has bank-grade
  encryption, and serves 40+ financial services companies. But the
  CISO's fear is emotional, not just technical.

  Scenario 2: Company viability concern
  Prospect: CTO at a 200-person company
  "You're a $50M company. What happens if you go under in 2 years?
  We'd be stuck migrating off your platform."
  Context: You've been growing 40% year over year, just raised Series
  C, and have $80M in the bank. But the prospect has been burned by
  a vendor going bankrupt before.

  Scenario 3: Implementation risk
  Prospect: VP of IT at a 500-person manufacturer
  "Our last software migration was a disaster. Took 8 months instead
  of 3, cost double the budget, and we lost productivity for a quarter.
  I can't go through that again."
  Context: Your average implementation is 6 weeks with a 95%
  on-time delivery rate. But their PTSD from the last migration is
  real and valid.

  Scenario 4: Reference concern
  Prospect: Head of Data at a 150-person e-commerce company
  "I've never heard of DataVault. All your case studies are for
  companies nothing like ours. How do I know this works for
  e-commerce?"
  Context: You actually have 12 e-commerce clients but your marketing
  hasn't featured them. You can provide references but need to address
  the unfamiliarity first.

  Tasks:
  1. For each scenario, identify the underlying fear (not just the
     stated objection) and write the response. The key principle: you
     must validate the fear before addressing it with evidence.

  2. Your manager says: "Trust objections are the only objections
     where you should NEVER argue. You can only demonstrate." Explain
     what she means and give 3 examples of 'demonstrating' vs.
     'arguing' when building trust.

  3. Create the "Risk Reversal Toolkit" — 5 things you can offer
     prospects to reduce their perceived risk of buying from you
     (e.g., pilot programs, guarantees, etc.). For each, explain
     when to use it and when NOT to use it.

assertions:
  - type: llm_judge
    criteria: "Identifies underlying fears correctly — CISO fears reputational damage (not just technical breach), CTO fears being stranded (not just company failure), VP fears repeating past trauma (not just timeline), Head of Data fears being an early adopter (not just lack of references) — and validates each fear before presenting evidence"
    weight: 0.35
    description: "Correct fear identification"
  - type: llm_judge
    criteria: "Demonstrate vs. argue distinction is clear — explains that trust is earned through proof (demos, references, pilots, certifications) not claims ('we're the best'), with 3 concrete examples showing the difference"
    weight: 0.30
    description: "Demonstrate vs argue clarity"
  - type: llm_judge
    criteria: "Risk reversal toolkit is practical — includes credible risk-reducing offers (pilot, POC, phased rollout, SLA guarantees, data portability clause) with clear guidance on when each is appropriate vs. when it signals desperation"
    weight: 0.35
    description: "Practical risk reversal toolkit"
