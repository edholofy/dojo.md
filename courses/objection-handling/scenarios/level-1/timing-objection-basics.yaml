meta:
  id: timing-objection-basics
  level: 1
  course: objection-handling
  type: output
  description: "Handle 'not the right time' objections — distinguish between genuine timing issues and polite brush-offs, and respond appropriately to each"
  tags: [sales, objections, timing, urgency, beginner]

state: {}

trigger: |
  You're a Business Development Rep at "AutomateHQ" (workflow
  automation SaaS, $25M ARR). You hear "not the right time" from
  prospects constantly. Your manager wants you to learn to tell the
  difference between a genuine timing issue and a polite "no."

  She gives you 5 real scenarios from this week:

  Scenario 1: After a 30-minute discovery call with a VP of Finance
  "This is really interesting, but we're in the middle of our fiscal
  year-end close. Can you call me back in February?"
  (It's currently November. Their fiscal year ends December 31.)

  Scenario 2: After you pitched at a trade show booth
  "We're definitely interested but now isn't great. Maybe next
  quarter?"
  (No specific reason given. They were polite but vague.)

  Scenario 3: After a demo with a Director of IT
  "We love the product but we just signed a 2-year contract with
  [competitor] six months ago. We can't switch for another 18 months."
  (Genuine contractual obligation.)

  Scenario 4: During a cold call to a VP of Sales
  "I literally don't have time for this. We're in the middle of a
  reorg and I might not even have this job in 3 months."
  (Genuine organizational chaos.)

  Scenario 5: After sending a proposal
  "The proposal looks good but we need to put this on hold. There's
  a company-wide hiring freeze and the CFO isn't approving new
  vendors right now."
  (Budget/approval freeze, timing is real but the reason might shift.)

  Tasks:
  1. For each scenario, classify it: genuine timing issue, polite
     brush-off, or somewhere in between. Explain your reasoning.
     Then write the response for each that either keeps the door
     open or gently tests whether it's really about timing.

  2. Write the "Timing Test" — 3 questions you can ask to determine
     if "not the right time" is real or a brush-off, without being
     confrontational. Show how each question works with an example.

  3. For Scenario 3 (contractual obligation, 18 months out): Design
     the long-term nurture strategy. How do you stay in touch for
     18 months without being annoying? Write the first email and
     the email you send 60 days before their contract renewal.

assertions:
  - type: llm_judge
    criteria: "Classifications are accurate — correctly identifies fiscal year-end as genuine, trade show as likely brush-off, competitor contract as genuine, reorg as genuine, and hiring freeze as genuine but testable, with reasoning for each"
    weight: 0.35
    description: "Accurate timing classification"
  - type: llm_judge
    criteria: "Timing test questions are non-confrontational — provides questions that help distinguish real timing from brush-off without putting the prospect on the defensive (e.g., 'If timing weren't a factor, would this be a priority?')"
    weight: 0.30
    description: "Non-confrontational timing tests"
  - type: llm_judge
    criteria: "18-month nurture is patient and valuable — spaces touchpoints appropriately, provides value (industry insights, product updates) without pushing for a meeting, and the pre-renewal email creates urgency naturally"
    weight: 0.35
    description: "Patient valuable nurture"
