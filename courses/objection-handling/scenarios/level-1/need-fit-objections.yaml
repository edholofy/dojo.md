meta:
  id: need-fit-objections
  level: 1
  course: objection-handling
  type: output
  description: "Handle 'we don't need this' and 'it doesn't fit our needs' objections — distinguish between genuine misfit and undiscovered needs"
  tags: [sales, objections, need, fit, discovery, beginner]

state: {}

trigger: |
  You're a Sales Development Rep at "SecureNet" (cybersecurity SaaS,
  $40M ARR). You encounter "we don't need this" regularly. Your
  manager wants you to understand that this objection has very
  different meanings depending on context.

  Scenario 1: Cold call
  Prospect: IT Director at a 50-person accounting firm
  "We don't really need enterprise cybersecurity. We're a small
  accounting firm, not a bank. Our basic antivirus is fine."
  Context: They absolutely DO need cybersecurity — accounting firms
  are the #3 target for ransomware attacks. But they don't perceive
  the need.

  Scenario 2: After demo
  Prospect: CISO at a 500-person healthcare company
  "Your product is impressive but it doesn't cover our specific
  compliance needs. We need something built for HIPAA environments."
  Context: Your product DOES have a HIPAA compliance module, but
  it wasn't shown in the demo (the SE missed it). This is a
  perception problem, not a real gap.

  Scenario 3: Discovery call
  Prospect: VP of Engineering at a SaaS startup
  "We've built our own security monitoring internally. We don't need
  a vendor solution."
  Context: Homegrown solutions often have gaps. But telling them
  their baby is ugly won't work. You need to uncover the gaps
  respectfully.

  Scenario 4: Proposal review
  Prospect: COO at a logistics company
  "After reviewing your proposal, we honestly don't think the ROI
  justifies the investment. Our current approach works well enough."
  Context: "Works well enough" suggests they see some value but
  not enough. The ROI wasn't made compelling enough.

  Tasks:
  1. For each scenario, diagnose the type of need/fit objection:
     (a) unaware of need, (b) feature misperception, (c) pride in
     current solution, or (d) weak value case. Then write the
     response for each.

  2. For Scenario 1 (accounting firm), the prospect doesn't know
     they're at risk. Write the "education-based response" that
     opens their eyes without being preachy or fear-mongering.
     Include a specific data point that makes the risk real.

  3. Your manager says: "Sometimes 'we don't need this' is actually
     true — the prospect genuinely isn't a good fit." Write the
     criteria for recognizing a genuine non-fit (where you should
     disqualify) vs. an undiscovered need (where you should dig
     deeper).

assertions:
  - type: llm_judge
    criteria: "Diagnoses are correct — accounting firm is unaware of need, healthcare is feature misperception, SaaS startup is pride in current solution, logistics is weak value case, with appropriate responses for each type"
    weight: 0.35
    description: "Correct need-fit diagnosis"
  - type: llm_judge
    criteria: "Education response is informative without fear-mongering — uses a specific data point about accounting firm cybersecurity risk to create awareness, framed as helping them protect their clients rather than scaring them"
    weight: 0.30
    description: "Non-fear-mongering education"
  - type: llm_judge
    criteria: "Fit vs. non-fit criteria are practical — provides clear signals for genuine non-fit (wrong industry, wrong size, wrong problem) vs. undiscovered need (budget exists, pain exists but unrecognized, competitive solution inadequate)"
    weight: 0.35
    description: "Practical fit criteria"
