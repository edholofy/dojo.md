meta:
  id: price-objection-basics
  level: 1
  course: objection-handling
  type: output
  description: "Handle basic price objections — respond when prospects say 'it's too expensive' without immediately offering discounts or getting defensive"
  tags: [sales, objections, price, value, beginner]

state: {}

trigger: |
  You're an Account Executive at "ProjectFlow" (project management
  SaaS, $30M ARR, $50/user/month). You're in a demo with 3 different
  prospects who each give you a price objection, but for different
  underlying reasons.

  Prospect 1: Sarah, Marketing Director at a 40-person agency
  After seeing the pricing slide, she says: "Wow, $50 per user per
  month? That's way more than we expected. We were thinking maybe
  $15-20 per user. Asana is only $10.99."
  Context: She's comparing you to a simpler tool. Her team needs
  your advanced resource planning and client portal features that
  Asana doesn't have. Budget likely exists but she has sticker shock.

  Prospect 2: James, VP of Operations at a 200-person manufacturer
  He says: "I like the product but at $50/user for 200 people,
  that's $120K a year. My boss will never approve that kind of spend
  on a project management tool."
  Context: He's not saying it's too expensive — he's saying he can't
  get it approved. The issue is internal justification, not value.

  Prospect 3: Priya, CTO at a 15-person startup
  She says: "We're a startup. We simply don't have $9,000 a year
  for project management. We're using Notion and it's free."
  Context: This is a genuine budget constraint. They literally may
  not have the money. But she took the demo, so there's interest.

  Tasks:
  1. For each prospect, identify the real objection behind "it's too
     expensive" (sticker shock, internal justification, genuine budget
     constraint). Then write the response for each — using a
     different approach for each situation.

  2. Your manager says: "The worst thing you can do when you hear
     'too expensive' is immediately offer a discount." Explain why,
     and write 3 responses that add value instead of cutting price.

  3. Write the "Price Objection Decision Tree" — a simple framework
     that helps you diagnose which type of price objection you're
     hearing and directs you to the right response technique.

assertions:
  - type: llm_judge
    criteria: "Correctly diagnoses 3 different underlying objections — Sarah has sticker shock (needs value reframing), James has approval concern (needs business case help), Priya has genuine constraint (needs creative pricing), with appropriate responses for each"
    weight: 0.35
    description: "Correct objection diagnosis"
  - type: llm_judge
    criteria: "Anti-discount responses add value — explains why discounting signals low value and creates precedent, then provides 3 alternatives (value reframing, ROI calculation, smaller starting package) that address price without reducing it"
    weight: 0.35
    description: "Value-adding anti-discount responses"
  - type: llm_judge
    criteria: "Decision tree is simple and usable — provides clear diagnostic questions (Is this sticker shock? Budget justification? Genuine constraint? Negotiation tactic?) with different response paths for each"
    weight: 0.30
    description: "Usable decision tree"
