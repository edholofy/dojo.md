meta:
  id: competitor-objection-basics
  level: 1
  course: objection-handling
  type: output
  description: "Handle basic competitor objections — respond when prospects say 'we already use X' or 'your competitor is cheaper' without badmouthing the competition"
  tags: [sales, objections, competitor, differentiation, beginner]

state: {}

trigger: |
  You're an SDR at "CloudCRM" (CRM platform, $45M ARR). You compete
  against Salesforce, HubSpot, and Pipedrive. During outreach and
  demos, you hear competitor objections constantly. Here are 4 you
  got this week:

  Objection 1: "We already use Salesforce."
  From: VP of Sales at a 300-person SaaS company
  Context: Salesforce is the enterprise incumbent. They're probably
  paying $150+ per user/month. Your product is $65/user with similar
  features for mid-market companies.

  Objection 2: "HubSpot is free and does everything we need."
  From: Head of Sales at a 30-person startup
  Context: They're using HubSpot's free CRM. They likely don't need
  your advanced features yet but will as they grow past 50 reps.

  Objection 3: "We looked at your product last year and chose
  Pipedrive. Nothing has changed."
  From: Sales Director at a 60-person company
  Context: They evaluated you and chose a competitor. You don't know
  why they chose Pipedrive. Your product has had 3 major updates
  since then.

  Objection 4: "My team loves our current tool. I don't want to
  deal with the change management headache of switching."
  From: CRO at a 150-person company (using a legacy CRM)
  Context: This isn't about features or price — it's about the pain
  of switching. Even if your product is better, the effort feels
  overwhelming.

  Tasks:
  1. For each objection, write the response. Rules: never badmouth
     the competitor, never say "we're better than X," and always
     acknowledge the prospect's current choice before presenting
     your differentiation.

  2. Your manager says: "The best response to 'we already use X'
     isn't about your product at all." Explain what she means, and
     write the response that focuses on the prospect's business
     problems, not product comparison.

  3. Create the "Competitor Response Cheat Sheet" — for each of your
     3 competitors (Salesforce, HubSpot, Pipedrive), list: their
     strength (that you acknowledge), their weakness (that you
     exploit without naming it), and the 1-sentence positioning
     statement that differentiates CloudCRM.

assertions:
  - type: llm_judge
    criteria: "Responses acknowledge current choice — each response validates the prospect's decision to use their current tool before presenting differentiation, never disparages the competitor directly"
    weight: 0.35
    description: "Choice-acknowledging responses"
  - type: llm_judge
    criteria: "Business-problem focus is explained — understands that 'we already use X' responses should explore whether their business problems are solved, not compare feature lists, with a concrete example"
    weight: 0.30
    description: "Business-problem refocus"
  - type: llm_judge
    criteria: "Cheat sheet is honest — acknowledges real competitor strengths (Salesforce: ecosystem, HubSpot: ease/price, Pipedrive: simplicity) and positions CloudCRM's differentiation against each without making false claims"
    weight: 0.35
    description: "Honest competitor cheat sheet"
