meta:
  id: common-objection-mistakes
  level: 1
  course: objection-handling
  type: output
  description: "Recognize and avoid the most common mistakes reps make when handling objections — from getting defensive to offering premature discounts"
  tags: [sales, objections, mistakes, coaching, self-awareness, beginner]

state: {}

trigger: |
  You're a Sales Manager at "GrowthStack" (marketing automation SaaS,
  $28M ARR). You've been reviewing call recordings and found your team
  making the same 5 mistakes repeatedly. You need to create a training
  document that helps them recognize and fix these patterns.

  Mistake 1: Getting Defensive
  Recording: When a prospect said "Your platform seems really
  complicated," the rep responded: "It's actually not complicated at
  all. You just need training. Every customer we have figured it out."
  Impact: Prospect felt talked down to and went cold.

  Mistake 2: Premature Discounting
  Recording: A prospect said "That's a lot of money" and the rep
  immediately said "I can probably get you 20% off if you sign this
  quarter." The prospect hadn't even finished reviewing the proposal.
  Impact: They signed at 20% off but your VP of Sales says you left
  money on the table. The prospect would have paid full price.

  Mistake 3: Feature Dumping
  Recording: When a prospect said "I'm not sure this fits our needs,"
  the rep launched into a 10-minute monologue listing every feature.
  The prospect checked out after 2 minutes.
  Impact: Prospect said "Let me think about it" and never responded.

  Mistake 4: Ignoring the Objection
  Recording: A prospect said "We're worried about data migration from
  our current system" and the rep said "Anyway, let me show you our
  reporting dashboard." The rep didn't even acknowledge the concern.
  Impact: Prospect brought it up again 5 minutes later, more
  frustrated. Deal stalled.

  Mistake 5: Arguing to Win
  Recording: A prospect said "I've heard your support is slow" and
  the rep said "That's not true. Our response time is under 2 hours.
  Whoever told you that was wrong." The tone was combative.
  Impact: Prospect said "Okay, I'll take another look" but ghosted.

  Tasks:
  1. For each mistake, write: (a) why it happens (the psychology
     behind it), (b) the correct response that should have been
     given, and (c) a one-sentence "rule" that prevents this mistake
     in the future.

  2. Create the "Objection Response Self-Check" — 5 yes/no questions
     a rep should mentally ask themselves before responding to any
     objection. If any answer is "no," they need to pause and reset.

  3. Write the "Recovery Script" for Mistake 2 (premature discount).
     The rep already offered 20% off. How do they walk it back or
     reframe without losing credibility? This is the hardest recovery
     because you can't un-offer a discount.

assertions:
  - type: llm_judge
    criteria: "Psychology behind mistakes is accurate — defensive comes from ego/insecurity, discounting from fear of losing the deal, feature dumping from product knowledge without sales skill, ignoring from nervousness or poor listening, arguing from treating the sale as a debate to win"
    weight: 0.35
    description: "Accurate mistake psychology"
  - type: llm_judge
    criteria: "Self-check questions are practical — covers empathy (did I acknowledge?), understanding (do I know the real concern?), composure (am I reacting emotionally?), strategy (is my response advancing the conversation?), and value (am I adding value or just defending?)"
    weight: 0.30
    description: "Practical self-check questions"
  - type: llm_judge
    criteria: "Discount recovery is realistic — acknowledges the difficulty, provides a credible reframe (e.g., 'that discount applies to the annual plan' or 'let me make sure the full package is right before we discuss pricing'), without suggesting dishonesty"
    weight: 0.35
    description: "Realistic discount recovery"
