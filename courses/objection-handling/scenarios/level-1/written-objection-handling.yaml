meta:
  id: written-objection-handling
  level: 1
  course: objection-handling
  type: output
  description: "Handle objections in written form — craft email and chat responses to objections that are harder to address without tone of voice"
  tags: [sales, objections, email, chat, writing, tone, beginner]

state: {}

trigger: |
  You're an Account Executive at "InvoiceFlow" (invoicing and payments
  SaaS, $18M ARR). Not all objections come on calls — many arrive via
  email or chat. Written objections are trickier because you can't use
  tone of voice, you can't interrupt a negative spiral, and your words
  can be forwarded to others.

  Email 1: Price objection via email
  From: Controller at a 60-person construction company
  Subject: Re: InvoiceFlow Proposal
  "Hi, thanks for the demo yesterday. The team liked what they saw
  but honestly $40/user/month is more than we budgeted. We were
  expecting something in the $15-20 range. Is there any flexibility
  on pricing?"

  Email 2: Competitor comparison via email
  From: CFO at a 100-person professional services firm
  Subject: Quick question
  "We're also looking at Bill.com and they're offering us a pretty
  aggressive deal. What makes InvoiceFlow worth the premium?"

  Chat message 3: Stall via Slack
  From: AP Manager at a prospect company (your champion)
  "Hey, wanted to give you a heads up — my boss wants to put this on
  hold until next quarter. Sorry :( I tried to push for it but she
  said we have other priorities right now."

  Chat message 4: Technical concern via email
  From: IT Director at a 200-person company
  Subject: Integration concerns
  "I spoke with my team and they're concerned about the integration
  with our ERP (SAP). We've had bad experiences with vendors claiming
  'seamless integration' that turns out to be anything but. Can you
  be specific about what the SAP integration actually looks like?"

  Tasks:
  1. Write the email/chat response for each situation. Rules for
     written objection handling: keep it short (under 150 words per
     response), never be defensive in writing (it reads worse than
     it sounds), always end with a clear next step, and never put
     sensitive pricing discussions in writing that can be forwarded.

  2. Compare verbal vs. written objection handling. Write 5 rules
     that apply specifically to written objections that don't apply
     (or apply differently) to phone/video objections. For each,
     explain why the medium changes the approach.

  3. Your champion (Chat message 3) just told you the deal is on
     hold. Write two versions of your response: (a) the Slack reply
     to your champion (warm, supportive, strategic) and (b) the
     email you send to the champion's boss directly (professional,
     value-focused, with a specific reason to reconsider timing).

assertions:
  - type: llm_judge
    criteria: "Written responses are appropriately concise — each response is under 150 words, avoids defensive language, maintains professional warmth, and ends with a clear next step (call, meeting, specific question)"
    weight: 0.35
    description: "Concise written responses"
  - type: llm_judge
    criteria: "Verbal vs. written rules are insightful — identifies real differences like no tone of voice in writing, permanence/forwardability of email, inability to read reactions in real-time, need for shorter responses, and risk of misinterpretation"
    weight: 0.30
    description: "Insightful medium comparison"
  - type: llm_judge
    criteria: "Champion and boss responses are strategically different — champion gets empathy and coaching, boss gets a value-focused email with a specific reason to act now (not a generic 'let's chat'), demonstrating understanding of multi-stakeholder communication"
    weight: 0.35
    description: "Strategic stakeholder responses"
