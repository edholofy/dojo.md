meta:
  id: objection-listening-basics
  level: 1
  course: objection-handling
  type: output
  description: "Practice active listening when handling objections — learn to hear what prospects actually mean before responding"
  tags: [sales, objections, listening, discovery, empathy, beginner]

state: {}

trigger: |
  You're a new SDR at "TeamSync" (team collaboration SaaS, $20M ARR).
  Your manager recorded 4 real objection conversations and wants you
  to analyze them. The key lesson: most reps respond to the WORDS,
  not to the MEANING behind the objection.

  Conversation 1:
  Prospect (HR Director): "We already have Slack for communication."
  Bad rep response: "Oh, TeamSync does way more than Slack! Let me
  show you our project management features..."
  What the prospect actually meant: She's overwhelmed by tools and
  worried about adding another one. The real objection is tool
  fatigue, not feature comparison.

  Conversation 2:
  Prospect (CEO, 25-person startup): "This seems like a lot for a
  small team like ours."
  Bad rep response: "Actually, we have a startup plan that's only
  $8 per user!"
  What the prospect actually meant: He's questioning whether his team
  is sophisticated enough to need this tool, not whether the price
  is right. It's an identity objection — "this isn't for companies
  like us."

  Conversation 3:
  Prospect (Operations Manager): "We tried something similar two
  years ago and nobody used it."
  Bad rep response: "Our adoption rates are 85%! We're much easier
  to use than whatever you tried before."
  What the prospect actually meant: She's afraid of looking bad for
  championing another tool that fails. The real objection is personal
  risk, not product quality.

  Conversation 4:
  Prospect (VP of Engineering): "Can you send me some materials and
  I'll review when I have time?"
  Bad rep response: "Sure! I'll send over our deck and follow up
  next week."
  What the prospect actually meant: This is a polite dismissal. He
  has no intention of reviewing materials. The rep should have tested
  whether there's genuine interest before agreeing to follow up.

  Tasks:
  1. For each conversation, write the GOOD response that addresses
     what the prospect actually means, not just what they said.
     Show the thought process: what you heard → what it means →
     what you say.

  2. Write the "Objection Listening Checklist" — 5 things to do
     BEFORE responding to any objection (e.g., pause, paraphrase,
     ask a clarifying question). For each, explain why it matters
     and give an example.

  3. Your manager says: "The best objection handlers ask 2-3
     questions before they make a single statement." Write the
     questions you'd ask for Conversation 1 (Slack/tool fatigue)
     and Conversation 3 (past adoption failure) before making any
     claims about your product.

assertions:
  - type: llm_judge
    criteria: "Good responses address the real meaning — tool fatigue for Conversation 1, identity/fit for Conversation 2, personal risk for Conversation 3, and polite dismissal for Conversation 4 — not just the surface-level words"
    weight: 0.35
    description: "Meaning-based responses"
  - type: llm_judge
    criteria: "Listening checklist is actionable — includes pause/breathe, paraphrase the objection, ask clarifying question, acknowledge the feeling, and confirm understanding before responding, with practical examples for each"
    weight: 0.30
    description: "Actionable listening checklist"
  - type: llm_judge
    criteria: "Questions before statements are genuine discovery — asks about their current workflow, what happened with the past tool, what would make them comfortable, rather than leading questions designed to set up a pitch"
    weight: 0.35
    description: "Genuine discovery questions"
