meta:
  id: first-objection-shift
  level: 1
  course: objection-handling
  type: output
  description: "Shift simulation combining multiple objection types — handle a realistic sales conversation where objections stack up and shift throughout the call"
  tags: [sales, objections, simulation, multi-objection, conversation-flow, beginner]

state: {}

trigger: |
  You're an Account Executive at "ShipFast" (logistics management
  SaaS, $35M ARR, $75/user/month). You're on a demo call with Dana,
  Operations Director at a 120-person e-commerce fulfillment company.
  The demo went well but now she's hitting you with objection after
  objection. This is realistic — objections rarely come one at a time.

  The conversation unfolds like this:

  Dana: "Great demo. But honestly, $75 per user is steep. We have 80
  people in operations. That's $72K a year."
  [Price objection — but is it sticker shock or genuine constraint?]

  You respond, and then...

  Dana: "Even if we could justify the cost, we just implemented a new
  WMS system 4 months ago. My team is still getting used to it. Adding
  another system right now would be chaos."
  [Timing objection — layered on top of the price concern]

  You respond, and then...

  Dana: "Look, I'd need to get our CEO on board and he's very
  skeptical of SaaS subscriptions. He grew up in logistics — he likes
  things he can see and touch."
  [Authority objection — now there's a skeptical decision maker]

  You respond, and then...

  Dana: "And honestly? I talked to someone at FulfillPro and they said
  ShipFast's routing algorithm isn't as good for multi-warehouse
  operations. We have 4 warehouses."
  [Competitor objection — coming from a third party, possibly biased]

  You respond, and then...

  Dana: "I appreciate your patience. Let me be real — I like your
  product, but I've championed software purchases before that flopped.
  I don't want to put my neck on the line again."
  [Trust/risk objection — the real objection that was hiding
  underneath all the others]

  Tasks:
  1. Write your response to EACH of Dana's objections in sequence.
     Show how each response acknowledges the new concern while
     building on the rapport established in previous responses. The
     conversation should feel natural, not like 5 separate objection
     handles.

  2. Analyze the objection sequence. Which objection was the "real"
     one? How did the earlier objections serve as shields for the
     underlying concern? Write the pattern: Surface Objection →
     Intermediate Objection → Real Objection. Why is the last
     objection usually the real one?

  3. Write the post-call email to Dana (under 200 words) that
     recaps the conversation, addresses her core concern (personal
     risk), and proposes a concrete next step that feels low-risk
     for her.

assertions:
  - type: llm_judge
    criteria: "Sequential responses build rapport — each response acknowledges the new concern without dismissing previous ones, the conversation escalates in trust and depth, and the final response to the real objection (personal risk) is the most empathetic and substantive"
    weight: 0.35
    description: "Rapport-building sequence"
  - type: llm_judge
    criteria: "Objection layering analysis is insightful — correctly identifies that surface objections (price, timing) shield deeper concerns (authority, competition) which shield the real objection (personal risk/fear of failure), and explains why prospects reveal the real objection last"
    weight: 0.35
    description: "Insightful layering analysis"
  - type: llm_judge
    criteria: "Post-call email addresses core fear — focuses on reducing Dana's personal risk (pilot program, references from similar companies, implementation guarantee), not just product features or pricing, and proposes a specific low-commitment next step"
    weight: 0.30
    description: "Risk-focused follow-up email"
