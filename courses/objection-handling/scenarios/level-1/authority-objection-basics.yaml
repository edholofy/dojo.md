meta:
  id: authority-objection-basics
  level: 1
  course: objection-handling
  type: output
  description: "Handle 'I need to check with my boss' objections — navigate authority deflections and help prospects become internal champions"
  tags: [sales, objections, authority, decision-maker, champion, beginner]

state: {}

trigger: |
  You're an Account Executive at "AnalyticsHub" (business analytics
  SaaS, $35M ARR). You keep running into authority objections —
  prospects who are interested but say they can't decide alone.

  Scenario 1: After a demo
  Prospect: Rachel, Marketing Manager at a 100-person company
  She says: "I love this. But I can't approve software purchases
  over $10K. My VP needs to sign off."
  Context: Your annual contract is $15K. Rachel is enthusiastic
  but has genuinely never presented a software purchase to her VP.

  Scenario 2: During discovery
  Prospect: Kevin, Director of BI at a 500-person company
  He says: "This is interesting but I'd need to get my CTO and CFO
  on board. They'll have very different questions than I do."
  Context: Kevin understands the product but knows the CTO cares
  about integration and the CFO cares about ROI.

  Scenario 3: After sending a proposal
  Prospect: Anna, Head of Operations at a 75-person company
  She says: "I shared this with our CEO and he said 'looks nice
  but we have bigger priorities right now.' I'm not sure what to do."
  Context: Anna is your champion but the CEO dismissed it quickly.
  Anna doesn't know how to push back on her CEO.

  Scenario 4: During a cold call
  Prospect: Mike, Sales Manager at a 200-person company
  He says: "You'd really need to talk to our VP of Sales about this.
  I don't make these decisions."
  Context: Mike might actually have influence but is deflecting.
  Or he genuinely can't decide. You need to figure out which.

  Tasks:
  1. For each scenario, write the response that helps you navigate
     to the decision maker WITHOUT making the current prospect feel
     unimportant or bypassed. How do you respect their role while
     advancing the deal?

  2. For Scenario 3 (CEO dismissed it): Rachel needs to be enabled
     as a champion. Write the "Champion Enablement Kit" — the 3
     things you give Anna to help her make the case to her CEO:
     a one-page executive summary, 3 talking points, and a suggested
     email she can send to the CEO.

  3. Write the "Authority Assessment" — 4 questions you can ask
     early in any sales conversation to understand the decision-
     making process before you hit the authority objection later.

assertions:
  - type: llm_judge
    criteria: "Responses respect the current contact — each response values the prospect's role, doesn't bypass them to go directly to the boss, and positions helping them as helping the deal (they become the hero, not a gatekeeper)"
    weight: 0.35
    description: "Contact-respecting responses"
  - type: llm_judge
    criteria: "Champion enablement kit is practical — provides Anna with a CEO-appropriate one-pager (short, outcome-focused), talk tracks addressing 'bigger priorities' framing, and a ready-to-send email that positions the purchase strategically"
    weight: 0.35
    description: "Practical champion enablement"
  - type: llm_judge
    criteria: "Authority assessment questions are natural — asks about decision process, budget authority, stakeholders, and timeline in a way that feels conversational rather than interrogatory"
    weight: 0.30
    description: "Natural authority assessment"
