meta:
  id: intermediate-objection-shift
  level: 2
  course: objection-handling
  type: output
  description: "Shift simulation combining intermediate techniques — apply LAER, FFF, Sandler Reverse, and reframing in a complex multi-stakeholder objection scenario"
  tags: [sales, objections, simulation, multi-technique, stakeholder, intermediate]

state: {}

trigger: |
  You're a Senior AE at "PeopleFirst" (employee engagement platform,
  $48M ARR, $12/employee/month). You're in a critical deal with
  MidWest Manufacturing (2,000 employees, $24K/month contract). The
  deal has been in pipeline for 3 months. You've met with 4
  stakeholders, each with different objections. Today is the committee
  meeting where all 4 are in the room.

  Stakeholder 1: CHRO (your champion)
  Sarah says: "I believe in PeopleFirst, but I need help getting
  everyone aligned. Let's use this meeting productively."
  Context: She's on your side but can't override the others. She
  needs you to win them over.

  Stakeholder 2: CFO
  Tom says: "I'll be blunt. $288K a year for an engagement survey
  tool? Our turnover costs us money, sure, but prove to me this
  isn't just an expensive version of SurveyMonkey."
  Context: Classic value objection. He's a numbers person. He needs
  ROI in his language (turnover cost, productivity, recruitment).

  Stakeholder 3: VP of Operations
  Linda says: "My plant managers are already drowning in systems.
  They spend more time entering data than managing people. Adding
  another platform will face serious resistance."
  Context: Adoption and change fatigue objection. She's not wrong —
  frontline managers are overwhelmed.

  Stakeholder 4: General Counsel
  David says: "Employee engagement data is sensitive. If this data
  ends up in the wrong hands — or gets used in employment decisions
  improperly — we're looking at significant legal exposure."
  Context: Legitimate legal/compliance concern about employee data
  privacy and potential misuse.

  Tasks:
  1. Write your response to each stakeholder in the committee
     meeting. For each, identify which technique is most appropriate
     (LAER, FFF, Reframe, Reverse, or direct) and explain why you
     chose it. Responses should acknowledge each person's concern
     while building a collective case.

  2. Write the "Bridge Statement" — the thing you say AFTER
     addressing all 4 individual concerns that brings the room
     together. This is the moment you pivot from defense to offense.
     It should connect all 4 concerns into one narrative about why
     PeopleFirst addresses their collective situation.

  3. The meeting ends with Tom (CFO) saying: "Okay, I'm less
     skeptical, but I want to see the math before our next budget
     meeting in 3 weeks." Write the ROI analysis you send within
     24 hours — include the structure, the key numbers you'd include
     (using assumptions about a 2,000-person manufacturer), and how
     you frame the investment.

assertions:
  - type: llm_judge
    criteria: "Technique selection is appropriate — uses Reframe or direct ROI for CFO, FFF or empathy for VP Ops adoption concern, LAER or direct address for legal concern, and supports the champion strategically — with clear reasoning for each choice"
    weight: 0.35
    description: "Appropriate technique selection"
  - type: llm_judge
    criteria: "Bridge statement unifies — connects all 4 concerns into a single narrative (e.g., employee engagement impacts retention which addresses CFO's ROI, is simple enough for VPs concern, and handles data responsibly for legal) without dismissing any concern"
    weight: 0.35
    description: "Unifying bridge statement"
  - type: llm_judge
    criteria: "ROI analysis is credible — uses realistic assumptions for a 2,000-person manufacturer (turnover cost, productivity impact, recruitment savings), presents math clearly, and frames the investment in CFO-appropriate language"
    weight: 0.30
    description: "Credible ROI analysis"
