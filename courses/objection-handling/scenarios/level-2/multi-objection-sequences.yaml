meta:
  id: multi-objection-sequences
  level: 2
  course: objection-handling
  type: output
  description: "Handle multiple objections in sequence — manage conversations where prospects raise 3+ objections and maintain momentum without getting derailed"
  tags: [sales, objections, multi-objection, sequencing, momentum, intermediate]

state: {}

trigger: |
  You're an AE at "CloudSecure" (cloud security, $42M ARR). Your
  manager says: "Real deals never have just one objection. The best
  reps manage objection sequences — 3, 4, even 5 objections in a
  single call — without losing control of the conversation."

  She gives you a recorded call to study. The prospect, a VP of
  Infrastructure at a 600-person fintech, raises these objections
  in sequence over a 40-minute call:

  Minute 8 — After pricing is shown:
  "That's significantly more than we budgeted." (Price)

  Minute 15 — During integration discussion:
  "Our AWS environment is heavily customized. Your standard
  integration won't work." (Technical fit)

  Minute 22 — When discussing timeline:
  "Even if we solve the integration, we can't start until after our
  SOC 2 audit in April." (Timing)

  Minute 28 — When asking about next steps:
  "I'd love to move forward but our CISO is very skeptical of
  startups. She'll want to see proof this works at scale."
  (Authority + Trust)

  Minute 35 — Near call end:
  "And honestly, CrowdStrike already reached out with a very
  compelling offer." (Competitor)

  The BAD rep handles each objection in isolation, treating each
  like a new crisis. By minute 35, they're exhausted and the
  prospect has all the power.

  The GOOD rep sees the objection sequence as a story and manages
  the thread connecting them all.

  Tasks:
  1. Write the response to each objection in sequence, showing how
     each response CONNECTS to the previous ones. By the end, your
     responses should tell a coherent story about why CloudSecure is
     the right choice — not 5 separate defenses.

  2. Write the "Objection Threading" technique — how to connect
     multiple objections into a single narrative. Include:
     a) The "parking lot" technique (acknowledge, park, return)
     b) The "connect-the-dots" technique (link objections together)
     c) The "prioritize and address" technique (handle the biggest
        one first, others often dissolve)
     Show when each technique works best.

  3. Write the "Momentum Recovery" playbook — what to do when you're
     3 objections deep and losing energy. Include 3 tactical phrases
     that reset the conversation and regain control without being
     aggressive.

assertions:
  - type: llm_judge
    criteria: "Sequential responses connect — each response references or builds on previous ones, creating a coherent narrative rather than isolated defenses, and by the final response there's a cumulative case for CloudSecure"
    weight: 0.35
    description: "Connected sequential responses"
  - type: llm_judge
    criteria: "Threading techniques are well-differentiated — parking lot, connect-the-dots, and prioritize-and-address are clearly explained with different use cases, not just three names for the same thing"
    weight: 0.30
    description: "Differentiated threading techniques"
  - type: llm_judge
    criteria: "Momentum recovery is practical — provides specific phrases and techniques for regaining control mid-conversation when energy is fading, without being aggressive or dismissive of the prospect's concerns"
    weight: 0.35
    description: "Practical momentum recovery"
