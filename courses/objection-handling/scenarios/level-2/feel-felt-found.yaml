meta:
  id: feel-felt-found
  level: 2
  course: objection-handling
  type: output
  description: "Master the Feel-Felt-Found technique — use social proof and empathy to handle objections without being manipulative or cliché"
  tags: [sales, objections, feel-felt-found, empathy, social-proof, intermediate]

state: {}

trigger: |
  You're a Sales Trainer at "SalesEdge" (sales enablement platform,
  $40M ARR). You're teaching your team the Feel-Felt-Found technique,
  but with a critical update: the classic version ("I understand how
  you feel. Others have felt the same way. What they found was...")
  sounds robotic and manipulative in 2024. You need to modernize it.

  Exercise 1: Classic vs. Modern Feel-Felt-Found
  Prospect objection: "AI-powered sales tools feel like they'll
  replace my team, not help them."
  Write two versions:
  - The BAD classic version (robotic, template-sounding)
  - The GOOD modern version (authentic, conversational, same
    underlying structure)

  Exercise 2: Apply modernized FFF to 3 objections
  A) "We tried sales enablement before and reps ignored it."
     (Past failure objection — needs a 'Found' that addresses
     the adoption problem specifically)
  B) "Your pricing model doesn't work for companies with seasonal
     sales teams that scale from 20 to 200 reps."
     (Legitimate structural concern — needs a 'Found' that shows
     you've solved this before)
  C) "My VP of Sales doesn't believe in technology — he thinks
     sales is all about relationships."
     (Cultural objection — needs a 'Found' that bridges tech
     and relationship selling)

  Exercise 3: When NOT to use Feel-Felt-Found
  Your team has been overusing FFF. Some objections shouldn't get
  this treatment. Identify 3 situations where FFF is the wrong tool
  and explain what to use instead.

  Tasks:
  1. Complete all three exercises above.

  2. Write the "Social Proof Library" — for each of the 3 objections
     in Exercise 2, create the specific customer story (company type,
     their initial concern, what happened, the result) that makes
     the 'Found' compelling. Each story should be 3-4 sentences and
     include a specific metric.

  3. Create the "Authenticity Test" — 5 signs that your Feel-Felt-
     Found response sounds fake, and how to fix each one.

assertions:
  - type: llm_judge
    criteria: "Classic vs. modern contrast is clear — the bad version is obviously scripted and template-like, while the good version uses the same psychological structure (empathy, social proof, resolution) but sounds like genuine human conversation"
    weight: 0.35
    description: "Clear classic vs modern contrast"
  - type: llm_judge
    criteria: "Social proof stories are specific and credible — each includes a recognizable company type, their specific concern, the resolution, and a concrete metric (not vague claims like 'they loved it'), making the 'Found' element persuasive"
    weight: 0.35
    description: "Specific credible social proof"
  - type: llm_judge
    criteria: "When-NOT-to-use guidance is thoughtful — identifies situations like technical/factual questions (use direct answers), genuine product gaps (use honesty), or emergencies/urgency (use action) where FFF is inappropriate, with alternative approaches"
    weight: 0.30
    description: "Thoughtful FFF limitations"
