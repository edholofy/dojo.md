meta:
  id: objection-prevention
  level: 2
  course: objection-handling
  type: output
  description: "Learn to prevent objections before they arise — use inoculation theory and proactive framing to address concerns before prospects voice them"
  tags: [sales, objections, prevention, inoculation, proactive, framing, intermediate]

state: {}

trigger: |
  You're a Senior AE at "ScaleOps" (DevOps automation platform,
  $60M ARR). Your win rate on deals where you handle objections
  reactively is 25%. But on deals where you ADDRESS concerns before
  they become objections, your win rate is 48%. Your manager calls
  this "objection inoculation."

  Your top 5 predictable objections (based on 200 closed-lost
  analyses):
  1. Price: "Too expensive" (appears in 72% of lost deals)
  2. Integration: "Won't work with our stack" (appears in 45%)
  3. Team adoption: "Our team won't use it" (appears in 38%)
  4. Timing: "Not the right time" (appears in 35%)
  5. Competitor: "We're looking at Terraform/Pulumi" (appears in 30%)

  Tasks:
  1. For each of the 5 predictable objections, write the "inoculation
     statement" — the thing you say during discovery or early demo
     that addresses the concern BEFORE it becomes an objection. Show
     where in the sales process you'd insert each statement and why
     timing matters.

  2. Explain the psychology of inoculation theory in sales. Why does
     raising a concern yourself (before the prospect does) actually
     REDUCE its power? Include the 3 conditions that must be met for
     inoculation to work (vs. when it backfires and creates an
     objection that wasn't there).

  3. Write the opening 5 minutes of a demo script for a DevOps team
     that naturally inoculates against the top 3 objections (price,
     integration, adoption) without sounding defensive or presumptuous.
     The inoculation should feel like confident positioning, not
     preemptive excuse-making.

assertions:
  - type: llm_judge
    criteria: "Inoculation statements are well-timed and natural — each addresses the concern proactively with specific placement in the sales process (discovery, early demo, etc.) and sounds like confident positioning rather than defensive pre-emption"
    weight: 0.35
    description: "Natural inoculation statements"
  - type: llm_judge
    criteria: "Psychology explanation is accurate — explains that inoculation works by giving a weakened form of the objection so the prospect 'builds immunity,' includes conditions for success (credibility, timing, proportionality) and when it backfires (raising concerns they hadn't considered)"
    weight: 0.35
    description: "Accurate inoculation psychology"
  - type: llm_judge
    criteria: "Demo script flows naturally — the 5-minute opening addresses price (value framing), integration (mention of ecosystem), and adoption (ease of use positioning) without feeling like a defensive FAQ session"
    weight: 0.30
    description: "Natural demo script flow"
