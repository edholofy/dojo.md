meta:
  id: industry-specific-objections
  level: 2
  course: objection-handling
  type: output
  description: "Handle industry-specific objections — learn how objections differ across healthcare, financial services, government, and tech sectors"
  tags: [sales, objections, industry, healthcare, finance, government, intermediate]

state: {}

trigger: |
  You're an AE at "DocuFlow" (document management and workflow SaaS,
  $50M ARR). You sell across multiple industries and have learned that
  the same product gets very different objections depending on the
  sector. Your manager wants you to document the patterns.

  Healthcare prospect (Hospital CIO):
  "We can't put patient records in a cloud system. HIPAA compliance
  is non-negotiable, and the penalties for violations are up to
  $1.9M per incident. Show me your BAA and your compliance
  certifications."
  Context: Compliance-first objection. They need proof, not
  persuasion. You have a BAA, SOC 2, and HITRUST certification.

  Financial services prospect (Bank COO):
  "Our regulators require all document storage to be auditable and
  encrypted at rest. We've had 3 regulatory audits in the last year.
  Can you handle an OCC examination?"
  Context: Regulatory-specific objection. They speak in regulatory
  alphabet soup (OCC, FFIEC, GLBA). You need to speak their
  language.

  Government prospect (City Administrator):
  "We'd need this to go through our procurement process — it's a
  minimum 9-month RFP cycle. And we need FedRAMP authorization or
  equivalent."
  Context: Procurement-process objection. The objection isn't about
  your product — it's about bureaucratic requirements you must
  navigate.

  Tech startup prospect (VP of Engineering):
  "We need API-first, self-hosted option, SOC 2, and it has to
  integrate with our CI/CD pipeline. If it can't be infrastructure-
  as-code deployed, we won't even evaluate it."
  Context: Technical-stack objection. They care about developer
  experience and automation, not UI or features.

  Tasks:
  1. Write the response for each industry objection. Each must
     demonstrate fluency in the industry's specific concerns,
     language, and decision criteria. A generic response will fail
     in every case.

  2. Create the "Industry Objection Cheat Sheet" — for each of the
     4 industries, list: the #1 concern (what keeps them up at
     night), the language they use (jargon you must know), the
     proof they need (certifications, references, documentation),
     and the common mistake reps make in that industry.

  3. Your company is expanding into education (universities) and
     manufacturing. Based on the patterns above, predict the most
     likely objections from each new industry and write the
     preparation plan for your team.

assertions:
  - type: llm_judge
    criteria: "Industry responses demonstrate sector fluency — healthcare response addresses HIPAA/BAA specifically, financial uses regulatory terminology correctly, government addresses procurement process pragmatically, tech addresses technical stack requirements directly"
    weight: 0.35
    description: "Sector-fluent responses"
  - type: llm_judge
    criteria: "Cheat sheet captures real industry differences — each entry has genuine industry concerns (not generic), correct jargon, appropriate proof requirements, and realistic rep mistakes for each sector"
    weight: 0.35
    description: "Genuine industry differences"
  - type: llm_judge
    criteria: "New industry predictions are logical — predicts education concerns (FERPA, budget cycles, committee decisions) and manufacturing concerns (uptime, shop floor access, legacy integration) based on pattern recognition from the 4 existing industries"
    weight: 0.30
    description: "Logical new industry predictions"
