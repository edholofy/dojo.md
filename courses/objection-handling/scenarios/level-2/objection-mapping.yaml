meta:
  id: objection-mapping
  level: 2
  course: objection-handling
  type: output
  description: "Create objection maps — systematically catalog, categorize, and prepare responses for every objection your team encounters"
  tags: [sales, objections, mapping, preparation, catalog, systematic, intermediate]

state: {}

trigger: |
  You're a Sales Enablement Manager at "FlowHR" (HR tech platform,
  $38M ARR). Your CEO just asked: "Why do our reps keep getting
  surprised by objections? These should be predictable." She's right.
  You need to build the company's first comprehensive objection map.

  You've analyzed 500 sales call recordings from the last quarter and
  identified these patterns:

  Top objection categories (by frequency):
  1. Budget/Price (34% of calls): "Too expensive," "No budget,"
     "Can't justify the ROI"
  2. Current Solution (22%): "We already have Workday," "Our system
     works fine," "We just renewed our contract"
  3. Timing (18%): "Not now," "Maybe next year," "We have other
     priorities"
  4. Authority (12%): "I need to check with...", "I'm not the
     decision maker"
  5. Trust/Risk (8%): "We've never heard of you," "What if it
     doesn't work?"
  6. Need/Fit (6%): "We don't need this," "This doesn't fit our
     use case"

  Additional data:
  - Reps who handle budget objections well have 2.3x higher close
    rates
  - 65% of "timing" objections are actually brush-offs
  - The average deal encounters 3.2 objections before closing
  - Objections in discovery have a 70% resolution rate; objections
    in negotiation only 30%

  Tasks:
  1. Create the "FlowHR Objection Map" — for each of the 6
     categories, provide: the 3 most common specific phrasings,
     the underlying concern behind each phrasing, and the
     recommended response framework (which technique to use: LAER,
     FFF, Reverse, Reframe, or direct address). Include when in the
     sales cycle each typically appears.

  2. Using the data provided, write the "Objection Intelligence
     Brief" for the sales team. Highlight the 3 most actionable
     insights from the data and explain what behavior changes they
     imply (e.g., if most timing objections are brush-offs, what
     should reps do differently?).

  3. Design the "Objection Readiness Score" — a self-assessment that
     reps can take before any important call. Include 8 questions
     that help a rep assess whether they're prepared for the likely
     objections in that specific deal.

assertions:
  - type: llm_judge
    criteria: "Objection map is comprehensive and actionable — each category has specific phrasings (not generic), underlying concerns identified, technique recommendations that match the objection type, and sales cycle timing that reflects real buying behavior"
    weight: 0.35
    description: "Comprehensive objection map"
  - type: llm_judge
    criteria: "Intelligence brief extracts actionable insights — highlights the 2.3x close rate data, the 65% brush-off finding, and the discovery vs. negotiation resolution gap with specific behavior changes each implies"
    weight: 0.35
    description: "Actionable intelligence brief"
  - type: llm_judge
    criteria: "Readiness score is practical — 8 questions that help reps predict likely objections based on deal specifics (stage, stakeholders, budget status, competitive landscape) and prepare responses in advance"
    weight: 0.30
    description: "Practical readiness score"
