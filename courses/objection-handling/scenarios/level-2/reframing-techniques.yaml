meta:
  id: reframing-techniques
  level: 2
  course: objection-handling
  type: output
  description: "Master objection reframing — change the frame of reference to transform objections from roadblocks into stepping stones"
  tags: [sales, objections, reframing, perspective, persuasion, intermediate]

state: {}

trigger: |
  You're a Sales Coach at "RevenueOS" (revenue intelligence platform,
  $70M ARR). You teach "The Reframe" — the technique of changing the
  frame of reference around an objection so the prospect sees it
  differently without feeling manipulated.

  The 4 types of reframes you teach:

  Type 1: Cost → Investment Reframe
  Objection: "We can't spend $200K on a revenue platform."
  Bad reframe: "Think of it as an investment, not a cost!" (cliché)
  Challenge: Write the GOOD reframe that makes the investment case
  with specific, credible math based on their situation (a 200-person
  sales team, $50M in pipeline, 22% close rate).

  Type 2: Risk → Bigger Risk Reframe
  Objection: "Switching platforms is too risky right now."
  Bad reframe: "But NOT switching is even riskier!" (aggressive)
  Challenge: Write the GOOD reframe that helps them see the cost of
  inaction without being fear-based. Use opportunity cost framing.

  Type 3: Feature Gap → Priority Reframe
  Objection: "You don't have the custom reporting our CFO wants."
  Bad reframe: "We're building that in Q3!" (vaporware promise)
  Challenge: Write the GOOD reframe that acknowledges the gap while
  redirecting to the priorities that matter more. When is a feature
  gap a real dealbreaker vs. a nice-to-have?

  Type 4: Competitor → Criteria Reframe
  Objection: "Gong has more customers than you in our industry."
  Bad reframe: "Size doesn't matter!" (dismissive)
  Challenge: Write the GOOD reframe that shifts evaluation criteria
  from installed base to fit, outcomes, and support quality.

  Tasks:
  1. Write the good reframe for each of the 4 types. Each must feel
     natural, be substantiated with logic or data, and leave the
     prospect feeling informed rather than manipulated.

  2. Write the "Reframe Ethics Guide" — 3 rules that separate
     legitimate reframing (helping prospects see new perspectives)
     from manipulation (tricking them into ignoring real concerns).
     Include an example of each: ethical reframe vs. manipulative
     reframe for the same objection.

  3. Explain the "Prospect Permission" concept. Before you reframe,
     you should get implicit permission. Write 3 "permission phrases"
     that signal you're about to offer a different perspective and
     invite the prospect to consider it.

assertions:
  - type: llm_judge
    criteria: "Good reframes are substantive — Cost→Investment uses real math (pipeline × close rate improvement = ROI), Risk→Bigger Risk uses opportunity cost not fear, Feature Gap→Priority uses strategic prioritization, Competitor→Criteria shifts to outcomes — each is credible and non-manipulative"
    weight: 0.35
    description: "Substantive reframes"
  - type: llm_judge
    criteria: "Ethics guide draws clear lines — separates reframing (adding perspective while respecting the objection) from manipulation (dismissing legitimate concerns or creating false urgency), with paired examples showing the difference"
    weight: 0.35
    description: "Clear ethical boundaries"
  - type: llm_judge
    criteria: "Permission phrases are conversational — phrases like 'Can I share a different way to think about this?' or 'Would it be helpful if I walked through the math?' that invite rather than impose a new perspective"
    weight: 0.30
    description: "Conversational permission phrases"
