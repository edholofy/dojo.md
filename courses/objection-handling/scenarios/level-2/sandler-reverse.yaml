meta:
  id: sandler-reverse
  level: 2
  course: objection-handling
  type: output
  description: "Apply the Sandler Reverse technique — use strategic questions to have prospects talk themselves through their own objections"
  tags: [sales, objections, Sandler, reverse, questioning, intermediate]

state: {}

trigger: |
  You're a mid-level AE at "NetGuard" (network security platform,
  $45M ARR). Your sales coach introduced the Sandler Reverse: instead
  of answering objections directly, you ask questions that lead
  prospects to reconsider their own objection. The philosophy: people
  don't argue with their own conclusions.

  Practice scenarios:

  Scenario 1: The price reverse
  Prospect: "Your price is 30% higher than CrowdStrike."
  Sandler approach: Don't justify the price. Instead, explore what
  they're comparing (features? Total cost? Deployment cost?).
  Write the reverse question sequence (3-4 questions) that helps
  them realize the comparison isn't apples-to-apples.

  Scenario 2: The timing reverse
  Prospect: "We need to wait until after our security audit in Q3."
  Sandler approach: Don't argue against waiting. Instead, explore
  what happens during the audit without better security tools.
  Write the reverse question sequence that helps them realize
  waiting might make the audit harder.

  Scenario 3: The authority reverse
  Prospect: "I need to run this by my CISO."
  Sandler approach: Don't ask to meet the CISO directly. Instead,
  explore what the CISO's priorities are and help the prospect
  articulate why this matters.
  Write the reverse question sequence that turns the prospect into
  a prepared champion.

  Scenario 4: The competitor reverse
  Prospect: "We're leaning toward Palo Alto — they have a bigger
  brand presence."
  Sandler approach: Don't defend against brand perception. Instead,
  explore what "bigger brand" actually means for their day-to-day
  security operations.
  Write the reverse question sequence that shifts focus from brand
  to operational fit.

  Tasks:
  1. Write the 3-4 question reverse sequence for each scenario.
     Show the expected prospect response to each question and how
     each question builds toward the "self-discovered" conclusion.

  2. The Sandler Reverse has 3 danger zones: (a) it can feel
     Socratic and patronizing, (b) it can backfire if the prospect's
     answers reinforce their objection, (c) it can stall if the
     prospect gives short answers. For each danger zone, write the
     recovery technique.

  3. Compare the Sandler Reverse to LAER. When should you use each?
     Create a decision matrix: objection type × emotional intensity
     → recommended technique.

assertions:
  - type: llm_judge
    criteria: "Reverse sequences are strategic — each 3-4 question series logically leads the prospect to reconsider their objection through their own reasoning, with realistic expected responses showing the progression"
    weight: 0.35
    description: "Strategic reverse sequences"
  - type: llm_judge
    criteria: "Danger zone recoveries are practical — addresses patronizing tone (soften with genuine curiosity), backfire (pivot gracefully to direct response), and short answers (use open-ended follow-ups) with specific recovery phrases"
    weight: 0.30
    description: "Practical danger zone recoveries"
  - type: llm_judge
    criteria: "Technique comparison is nuanced — creates a useful matrix showing Sandler Reverse works better for logical/low-emotion objections while LAER works better for emotional/trust objections, with clear reasoning"
    weight: 0.35
    description: "Nuanced technique comparison"
