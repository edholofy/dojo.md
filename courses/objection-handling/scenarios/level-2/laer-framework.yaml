meta:
  id: laer-framework
  level: 2
  course: objection-handling
  type: output
  description: "Apply the LAER framework (Listen, Acknowledge, Explore, Respond) to systematically handle objections across different sales situations"
  tags: [sales, objections, LAER, framework, methodology, intermediate]

state: {}

trigger: |
  You're a Senior AE at "ClearView" (business intelligence SaaS,
  $55M ARR). Your company trains all reps on the LAER framework:
  Listen → Acknowledge → Explore → Respond. Your manager wants you
  to demonstrate mastery by applying it to 3 challenging objections.

  Objection 1: Complex price objection
  Prospect: VP of Analytics at a 400-person retail company
  "We've been evaluating BI tools for 6 months. Your product is
  20% more expensive than Looker and 40% more than Metabase. Our
  procurement team has strict budget guidelines and I can't justify
  the premium to them without something concrete."
  Context: They've done deep evaluation. The objection is informed,
  not reflexive. Your advantage is embedded ML predictions that
  neither competitor offers.

  Objection 2: Multi-stakeholder authority objection
  Prospect: Director of Data Engineering
  "I personally love ClearView, but I have three stakeholders who
  all need to sign off: the CFO who only cares about cost, the CMO
  who wants marketing-specific dashboards, and the CTO who insists
  on self-hosted options. Getting all three aligned feels impossible."
  Context: Each stakeholder has a different objection. You need to
  help your champion address all three.

  Objection 3: Emotional trust objection
  Prospect: CEO of a 50-person company
  "I'll be honest. We bought Domo two years ago on a big pitch just
  like this. $200K total investment. Nobody uses it. My board called
  it a waste. I can't make that mistake again."
  Context: This is trauma, not a rational objection. The LAER
  framework's "Listen" and "Acknowledge" steps are critical here —
  skip them and you're dead.

  Tasks:
  1. For each objection, write out the full LAER response. Label
     each step clearly (L: what you listen for, A: your
     acknowledgment, E: your exploratory questions, R: your
     response). Show how each step builds on the previous one.

  2. Explain why each step of LAER matters. What happens if you
     skip "Listen" and go straight to "Respond"? What happens if you
     "Acknowledge" but don't "Explore"? Give a real-world example of
     each failure mode.

  3. The LAER framework has a weakness: it can feel formulaic if done
     rigidly. Write guidelines for making LAER feel natural and
     conversational rather than like a checklist. Include 3 "bridge
     phrases" that transition between steps smoothly.

assertions:
  - type: llm_judge
    criteria: "LAER steps are clearly labeled and substantive — Listen identifies the real concern, Acknowledge validates without agreeing, Explore asks questions that reveal the underlying need, Respond provides a tailored answer that references what was learned in Explore"
    weight: 0.35
    description: "Substantive LAER application"
  - type: llm_judge
    criteria: "Failure mode analysis is specific — shows concrete consequences of skipping steps (e.g., responding without listening leads to addressing wrong objection, acknowledging without exploring leads to surface-level response) with realistic examples"
    weight: 0.30
    description: "Specific failure mode analysis"
  - type: llm_judge
    criteria: "Natural LAER guidelines are practical — addresses the formulaic feel problem with advice on reading the conversation, adjusting pacing, and 3 bridge phrases that make transitions between L→A→E→R feel organic rather than scripted"
    weight: 0.35
    description: "Natural LAER guidelines"
