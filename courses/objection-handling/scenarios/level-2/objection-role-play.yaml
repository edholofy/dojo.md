meta:
  id: objection-role-play
  level: 2
  course: objection-handling
  type: output
  description: "Design and evaluate objection handling role-plays — create practice scenarios for reps and build evaluation rubrics"
  tags: [sales, objections, role-play, practice, training, evaluation, intermediate]

state: {}

trigger: |
  You're a Sales Team Lead at "QuickShip" (shipping/logistics SaaS,
  $30M ARR). You manage 8 SDRs and 4 AEs. Your team's objection
  handling is inconsistent — some reps are excellent, others freeze up.
  You've decided to implement weekly objection role-play sessions.

  Your team's current performance data:
  - Average objection handling score (from call reviews): 5.8/10
  - Top performer: 8.2/10 (Maria, Senior AE)
  - Lowest performer: 3.4/10 (Jake, new SDR)
  - Most common failure: reps answer the stated objection without
    exploring the underlying concern (82% of poor scores)
  - Second most common failure: reps get defensive or argumentative
    (45% of poor scores)

  Tasks:
  1. Design 3 role-play scenarios of increasing difficulty for your
     weekly sessions. Each should include:
     a) The prospect persona (role, company, personality type)
     b) The objection they'll raise
     c) The "hidden objection" underneath (what they really mean)
     d) What a Level 1 response looks like (adequate)
     e) What a Level 3 response looks like (excellent)
     The scenarios should cover price, competitor, and trust.

  2. Create the "Objection Handling Rubric" — a 1-10 scoring system
     with 5 criteria. For each criterion, describe what a 2 looks
     like (poor), what a 5 looks like (adequate), and what an 8+
     looks like (excellent). This rubric should be usable by a
     manager observing live calls or reviewing recordings.

  3. Write the coaching plan for Jake (3.4/10 scorer). He freezes
     when he hears objections and either goes silent or immediately
     pivots to features. Design a 4-week improvement plan with
     specific weekly exercises, expected milestones, and how to
     measure progress.

assertions:
  - type: llm_judge
    criteria: "Role-play scenarios are realistic and progressive — each has a distinct persona, surface + hidden objection, and clear Level 1 vs. Level 3 response benchmarks that show genuine skill progression"
    weight: 0.35
    description: "Realistic progressive role-plays"
  - type: llm_judge
    criteria: "Rubric is specific and usable — 5 criteria with 2/5/8 anchors that are concrete enough for a manager to score consistently (not vague like 'good listening' but specific like 'paraphrased the objection before responding')"
    weight: 0.35
    description: "Specific usable rubric"
  - type: llm_judge
    criteria: "Coaching plan addresses root cause — recognizes Jake's freeze response is likely anxiety-based, provides graduated exposure (start with low-stakes written objections, advance to live practice), with measurable weekly milestones"
    weight: 0.30
    description: "Root-cause coaching plan"
