meta:
  id: action-item-tracking-system
  level: 2
  course: meeting-notes-action-items
  type: output
  description: "Action item tracking system — design and implement a systematic approach to tracking action items across multiple recurring meetings"
  tags: [action-items, tracking, system, recurring, accountability]

state: {}

trigger: |
  You're the operations manager for a growing startup (80
  employees). The CEO has complained that action items from
  meetings "disappear into the void." She wants you to create
  a tracking system. Here's the current situation:

  Recurring meetings that generate action items:
  1. Monday Leadership Team (weekly, 8 people)
  2. Wednesday All-Hands (bi-weekly, full company)
  3. Thursday Product Review (weekly, 12 people)
  4. Friday Sprint Retrospective (bi-weekly, engineering only)
  5. Monthly Board Prep (monthly, CEO + CFO + you)

  Current problems:
  - Action items are captured in Google Docs but nobody checks
    them after the meeting
  - Some meetings don't capture action items at all
  - When items are captured, they're vague: "Follow up on the
    marketing thing" or "Look into the server issue"
  - No one tracks completion — items from 3 months ago are
    still listed as open with no updates
  - Different people use different formats — some use bullets,
    some use checkboxes, some put items in Slack
  - The same items keep coming up meeting after meeting because
    nobody knows if they were completed
  - The CEO estimates that about 40% of action items from
    leadership meetings actually get done

  Available tools: Google Workspace, Slack, Notion, Asana
  (limited licenses), and a shared Google Sheet.

  Budget: $500/month for any new tools if needed.

  Task: Design the action item tracking system and create the
  implementation plan including templates, workflows, and
  accountability mechanisms.

assertions:
  - type: llm_judge
    criteria: "Response designs a practical, implementable tracking system — recommends a specific tool/platform choice with rationale (considering the available tools); creates a standardized action item format that includes: specific description, owner (single person), deadline, source meeting, status, and priority; the format prevents vague items by providing examples of good vs bad action items (e.g., bad: 'follow up on marketing thing' → good: 'Send Q3 campaign performance report to CEO by Friday Sept 20 — Owner: Sarah'); addresses the multi-meeting challenge by creating a unified view across all 5 recurring meetings; includes a workflow for capturing items during meetings (who captures, when items are entered into the system, how they're assigned)."
    weight: 0.35
    description: "SystemDesign"
  - type: llm_judge
    criteria: "Response creates accountability and review mechanisms — includes a regular review cadence for action items (e.g., items reviewed at the start of each leadership meeting); defines escalation paths for overdue items; creates automated reminders or notification workflows (using Slack or the chosen tool); addresses the 'items from 3 months ago still open' problem with aging policies (items older than X weeks without update get escalated or closed); defines status categories (not started, in progress, blocked, completed, cancelled) with clear criteria; includes a role for an action item owner or coordinator; provides metrics to track completion rates and improve from the current 40%."
    weight: 0.35
    description: "AccountabilityMechanisms"
  - type: llm_judge
    criteria: "Response provides a realistic implementation plan — includes a phased rollout (don't try to change all 5 meetings at once); starts with the highest-impact meeting (likely Leadership Team); provides templates ready to use; includes a change management approach (how to get 80 employees to adopt the new system); addresses resistance and adoption challenges; sets measurable success criteria (e.g., completion rate target of 80%+ within 3 months); stays within the $500/month budget; acknowledges this is a culture change, not just a tool change."
    weight: 0.30
    description: "ImplementationPlan"
