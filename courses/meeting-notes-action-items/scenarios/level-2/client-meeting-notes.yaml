meta:
  id: client-meeting-notes
  level: 2
  course: meeting-notes-action-items
  type: output
  description: "Client meeting notes — create both internal and client-facing versions of meeting notes from the same client meeting"
  tags: [client, external, internal, dual-version, stakeholder]

state: {}

trigger: |
  You're an account manager at a digital marketing agency.
  You just had a 60-minute quarterly review meeting with your
  biggest client, FreshBrew Coffee (a regional coffee chain,
  $2M annual contract). You need to create TWO versions of
  meeting notes — one internal (for your team) and one
  client-facing (to send to the client).

  Attendees:
  Agency: You (Account Manager), Sophia (Creative Director),
  Dev (Analytics Lead)
  Client: Karen (VP Marketing), Tyler (Digital Manager),
  Amanda (Brand Manager)

  What happened in the meeting:

  1. Sophia presented the Q3 campaign results:
     - Social media engagement: up 45% (mostly Instagram
       Reels — TikTok underperformed significantly)
     - Website traffic from campaigns: up 22%
     - In-store coupon redemptions from digital campaigns:
       12,400 (up 28% from Q2)
     - Email campaign open rates: 18% (industry avg is 21%)
     - Total ad spend: $165K (budget was $150K — overspent by
       $15K due to a Meta billing error that Sophia didn't
       catch for 3 weeks)

  2. Karen was happy with results overall but pushed back on
     the email performance: "18% open rate is below industry
     average. What are we doing wrong?" Sophia admitted the
     email list hasn't been cleaned in over a year and
     probably has 30-40% dead addresses. Tyler seemed annoyed
     that this wasn't caught earlier.

  3. Dev presented analytics showing that the Instagram
     audience is skewing younger (18-24) while FreshBrew's
     core customer is 25-44. Karen said: "I love the
     engagement but are we reaching the right people?" This
     is a legitimate concern the agency hasn't addressed.

  4. The $15K overspend came up. Karen was gracious about it
     but Tyler asked pointed questions about controls. You
     promised to implement weekly budget checks going forward.
     Internally, you know Sophia's team has been sloppy with
     budget tracking and this isn't the first time.

  5. Karen mentioned they're evaluating their agency
     relationships in Q1. She said it diplomatically: "We
     love working with you all, but our CEO is asking all
     departments to run competitive reviews." Tyler added:
     "We need to see an airtight Q4 plan."

  6. New Q4 initiatives discussed:
     - Holiday campaign (Nov-Dec): $80K budget
     - New store opening in Westfield Mall: needs local
       digital push, $20K budget
     - Loyalty app relaunch: agency to propose creative
       concepts by Oct 15
     - Karen wants a "surprise and delight" social campaign
       for Thanksgiving

  7. After the client left the room, Sophia told you: "We
     need to crush Q4. If we lose this account, that's 40%
     of our revenue. Also, I think Tyler is already talking
     to other agencies — he was weirdly specific about
     deliverable formats, like he's comparing proposals."

  Task: Create both the internal meeting notes and the
  client-facing meeting notes from this same meeting.

assertions:
  - type: llm_judge
    criteria: "Response creates appropriate client-facing meeting notes — professional, polished format suitable for sending to Karen, Tyler, and Amanda; emphasizes positive results (45% social engagement increase, 28% coupon redemption growth, 22% website traffic increase); addresses the email open rate issue with a constructive solution (list cleaning plan) not as a failure admission; handles the $15K overspend with accountability and the specific corrective action (weekly budget checks); does NOT include: the competitive review threat, Tyler's suspected agency shopping, any internal agency concerns, or Sophia's post-meeting comments; lists Q4 deliverables and next steps with clear dates and owners; maintains a confident, solutions-oriented tone."
    weight: 0.35
    description: "ClientFacingNotes"
  - type: llm_judge
    criteria: "Response creates candid internal meeting notes — includes everything the client-facing version has PLUS: the competitive review risk and Karen's Q1 timeline; Tyler's behavior suggesting he may be talking to other agencies; the account retention concern (40% of revenue); Sophia's budget tracking problems and the need to tighten processes; the audience demographic mismatch concern (18-24 skew vs 25-44 target) flagged as a strategic risk to address proactively; honest assessment of email list neglect; internal action items: fix Sophia's team budget tracking, prepare competitive defense, develop an audience realignment strategy; the internal notes are a working document for the team, not a polished external document."
    weight: 0.35
    description: "InternalNotes"
  - type: llm_judge
    criteria: "Response demonstrates understanding of the dual-audience approach — the two versions are clearly distinct documents, not just one redacted version; both cover the same meeting but serve different purposes; client-facing version builds confidence and demonstrates accountability; internal version is a strategic alert and action plan; both include accurate Q4 deliverables (holiday campaign $80K, Westfield opening $20K, loyalty app concepts by Oct 15, Thanksgiving social campaign); the approach demonstrates professional maturity in handling sensitive client dynamics."
    weight: 0.30
    description: "DualAudienceStrategy"
