meta:
  id: cross-functional-meeting-notes
  level: 2
  course: meeting-notes-action-items
  type: output
  description: "Cross-functional meeting notes — capture and organize meeting notes from a meeting involving multiple departments with different priorities and terminology"
  tags: [cross-functional, departments, alignment, collaboration]

state: {}

trigger: |
  You're a project coordinator at a mid-size manufacturing
  company. You need to create comprehensive meeting notes from
  a cross-functional product launch meeting. The following
  departments were represented:

  Attendees:
  - Engineering: Sarah Chen (Lead), Mike Torres
  - Marketing: James Wilson (Director), Priya Patel
  - Sales: David Kim (VP), Lisa Zhang
  - Operations: Rachel Green (Manager)
  - Finance: Tom Anderson (Controller)
  - Quality: Maria Santos (Lead)

  Meeting: Product Launch Review — "ThermoShield Pro" insulation
  product. 90 minutes. Conference Room A + Zoom.

  Key discussions:
  1. Engineering reported the product passed all thermal
     resistance tests (R-value 6.5 vs target 6.0). However,
     the moisture barrier failed the 72-hour submersion test.
     Sarah estimates 3-4 weeks for redesign. Mike disagrees
     and thinks it can be fixed in 2 weeks with a different
     adhesive compound.

  2. Marketing wants to launch at the National Home Builders
     Show in 8 weeks. James argued that missing the show costs
     6 months of market visibility. He proposed launching with
     the current moisture barrier and issuing a "v2 update."
     Maria from Quality strongly objected — "We can't ship a
     product that fails its own spec."

  3. Sales reported 47 pre-orders worth $2.3M from
     distributors based on the preliminary spec sheet. David
     warned that if launch slips past the show, they'll lose
     at least 30% of pre-orders. Lisa noted that their biggest
     distributor (BuildRight) has a competing product launching
     in 10 weeks.

  4. Finance noted the project is $180K over budget already.
     Tom said any timeline extension adds approximately $45K
     per week in engineering costs. The total project budget
     was $1.2M.

  5. Operations said the production line is ready and booked
     for weeks 6-8. Rescheduling would cost $60K in idle
     equipment and contractor penalties.

  6. After heated debate, the group agreed to:
     - Engineering pursues the 2-week fix (Mike's approach)
     - Quality will run accelerated testing (48-hour protocol)
     - If the fix works, launch proceeds on schedule
     - If it fails by week 3, Marketing will negotiate a
       "preview booth" at the show instead of full launch
     - David will communicate revised timeline risk to
       BuildRight distributor personally

  Task: Create the complete cross-functional meeting notes.

assertions:
  - type: llm_judge
    criteria: "Response creates well-organized cross-functional meeting notes — includes proper header with meeting title, date, attendees organized by department, and meeting purpose; organizes discussion by topic rather than chronologically rambling; captures each department's perspective on the moisture barrier issue clearly showing the tension between speed-to-market and quality; documents specific data points (R-value 6.5, $2.3M pre-orders, 47 pre-orders, $180K over budget, $45K/week extension cost, $60K rescheduling cost, BuildRight competitor timeline); distinguishes between facts, opinions, and recommendations from different departments."
    weight: 0.35
    description: "CrossFunctionalOrganization"
  - type: llm_judge
    criteria: "Response captures decisions, action items, and accountability — documents the agreed decision path (2-week fix attempt with fallback plan) clearly as a formal decision; creates specific action items with owners and deadlines: Engineering/Mike to pursue adhesive compound fix (2 weeks), Quality/Maria to run accelerated 48-hour testing protocol, Marketing/James to negotiate preview booth option as contingency, Sales/David to communicate to BuildRight personally, and any other follow-up items; includes a decision checkpoint or gate (week 3 go/no-go); captures dissenting views (Maria's quality objection, the Mike vs Sarah timeline disagreement) appropriately without attributing blame."
    weight: 0.35
    description: "DecisionsAndActionItems"
  - type: llm_judge
    criteria: "Response handles cross-functional complexity professionally — uses neutral, professional language even when describing heated debate and disagreements; makes the notes accessible to someone from any department (explains technical terms or provides context where needed); includes a risk/concern section or flags that captures the financial exposure (budget overrun, potential pre-order loss, competitor timeline); provides a clear next meeting or follow-up checkpoint; the notes serve as an authoritative record that all departments can reference."
    weight: 0.30
    description: "ProfessionalQuality"
