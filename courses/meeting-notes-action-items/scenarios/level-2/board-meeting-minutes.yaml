meta:
  id: board-meeting-minutes
  level: 2
  course: meeting-notes-action-items
  type: output
  description: "Board meeting minutes — create formal board meeting minutes following corporate governance standards and legal requirements"
  tags: [board, minutes, governance, formal, legal]

state: {}

trigger: |
  You're the corporate secretary for a private technology
  company (Series C, $50M revenue, 300 employees). You need
  to create formal board meeting minutes from the following
  quarterly board meeting:

  Meeting: Q3 Board of Directors Meeting
  Date: September 15, 2025
  Location: Company HQ, Board Room + Zoom
  Called to Order: 10:02 AM by Chair Patricia Hayes
  Adjourned: 1:45 PM

  Directors Present:
  - Patricia Hayes (Chair, Independent)
  - Robert Chen (CEO, Director)
  - Amanda Foster (Lead Investor, Sequoia Capital)
  - David Park (Independent Director)
  - Samantha Wells (Founder, Director)
  In Attendance (non-voting):
  - Jennifer Liu (CFO, presenting)
  - Marcus Johnson (General Counsel, recording)
  - Thomas Green (VP Engineering, presenting)

  Quorum: Confirmed (5 of 5 directors present)

  Proceedings:
  1. Call to Order and determination of quorum.

  2. Approval of Q2 minutes — Amanda moved to approve, David
     seconded. Approved unanimously.

  3. CEO Report — Robert presented Q3 performance:
     Revenue $13.2M (vs plan $14.0M, 94%). ARR $52M.
     Net revenue retention 112%. New logos: 28 (vs plan 35).
     Key wins: signed 3 enterprise clients ($500K+ ACV).
     Challenge: SMB segment underperforming, 2 sales reps
     departed. Robert recommended restructuring SMB go-to-market.
     Discussion: Amanda asked about competitive pressure in SMB.
     Robert acknowledged a new competitor (DataSync) taking
     share. Patricia asked for a competitive analysis at next
     meeting.

  4. Financial Report — Jennifer presented:
     Cash position: $28M (18 months runway at current burn).
     Burn rate: $1.5M/month (vs plan $1.3M due to unplanned
     infrastructure costs). Gross margin: 72% (vs 75% target).
     Jennifer flagged that if burn continues at current rate,
     the company should begin Series D preparation by Q1 2026.
     Amanda asked about path to profitability without raising.
     Jennifer presented a scenario showing breakeven possible
     at $70M ARR with current cost structure.

  5. Product/Engineering Update — Thomas presented:
     Launched 3 major features in Q3 (all on schedule).
     Customer-requested AI features are on the Q4 roadmap —
     beta in November, GA in January.
     Platform reliability: 99.97% uptime (best quarter ever).
     Technical debt: reduced by 20% (measured by bug backlog).
     Engineering headcount: 45 (approved for 52, 7 open reqs).
     Thomas requested approval for a 15% increase to engineering
     compensation bands to remain competitive.

  6. Resolution — Compensation Band Adjustment:
     David moved that the Board approve a 15% increase to
     engineering compensation bands effective October 1, 2025.
     Amanda seconded. Discussion: Patricia asked about budget
     impact. Jennifer estimated $800K annual increase. Amanda
     expressed concern about setting precedent for other
     departments. After discussion, the resolution was amended
     to authorize management to increase engineering bands by
     up to 15% at the CEO's discretion, with a report on
     impact at the next board meeting.
     Vote: Approved 4-1 (Samantha opposed, citing preference
     for equity-heavy compensation over cash increases).

  7. Executive Session — Independent directors met without
     management. No actions taken.

  8. Adjournment — Patricia moved to adjourn. Adjourned at
     1:45 PM. Next meeting: December 15, 2025.

  Task: Create the formal board meeting minutes.

assertions:
  - type: llm_judge
    criteria: "Response creates properly formatted formal board meeting minutes — includes all required legal elements: company name, meeting type (Q3 Board of Directors Meeting), date and time (September 15, 2025, 10:02 AM), location, directors present and absent (all 5 present), non-voting attendees, quorum confirmation; follows formal minute-taking conventions with proper parliamentary language; documents approval of prior minutes with motion, second, and vote result; records the executive session noting only that independent directors met and no actions were taken; documents adjournment with time and next meeting date."
    weight: 0.35
    description: "FormalStructure"
  - type: llm_judge
    criteria: "Response properly documents the resolution and voting — the compensation band resolution is documented with full parliamentary procedure: the original motion, who moved and seconded, the discussion that led to amendment, the amended resolution text (authorize management to increase engineering bands by up to 15% at CEO's discretion with impact report at next meeting), the vote result (4-1), and the dissenting director's name and reason (Samantha Wells, preferred equity-heavy compensation); the resolution language is precise and legally sound; any other items requiring board action are properly documented."
    weight: 0.35
    description: "ResolutionDocumentation"
  - type: llm_judge
    criteria: "Response balances appropriate detail with appropriate brevity — board minutes capture substance of discussions without verbatim transcription; documents director questions and management responses at an appropriate level of detail (e.g., Amanda's question about competitive pressure, Patricia's request for competitive analysis at next meeting); captures key financial metrics without reproducing the full presentation; documents items requiring follow-up (competitive analysis, compensation impact report, Series D timing discussion); uses professional corporate governance language throughout; does not include editorial commentary or subjective assessments."
    weight: 0.30
    description: "AppropriateDetail"
