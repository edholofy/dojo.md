meta:
  id: meeting-follow-up-communication
  level: 2
  course: meeting-notes-action-items
  type: output
  description: "Meeting follow-up communication — create effective post-meeting follow-up emails that drive accountability and ensure action items are completed"
  tags: [follow-up, email, accountability, communication, post-meeting]

state: {}

trigger: |
  You're a program manager responsible for a critical
  cross-company integration project. You just led a 90-minute
  project status meeting that revealed several problems. You
  need to write the follow-up communication that will be sent
  to all attendees AND their managers (who weren't in the
  meeting).

  Meeting: Project Phoenix Integration — Week 12 Status
  Attendees: 9 people from 3 companies

  Acquirer (your company, TechCorp):
  - You (Program Manager)
  - Sandra (Engineering Director)
  - Will (Data Migration Lead)

  Target Company (DataFlow, being acquired):
  - Raj (CTO)
  - Elena (Lead Architect)
  - Tomás (Security Lead)

  Integration Partner (CloudBridge Consulting):
  - Jackie (Engagement Manager)
  - Paul (Technical Lead)
  - Kim (QA Manager)

  Context: TechCorp acquired DataFlow 3 months ago. CloudBridge
  was hired to manage the technical integration. The integration
  is supposed to complete in 8 weeks (week 20). Today is week 12.

  What happened in the meeting:

  1. Overall status: RED. The project was GREEN at week 8,
     went to YELLOW at week 10, and is now RED.

  2. Data Migration (Will): 3 of 8 data migration scripts
     are complete. Will said he discovered that DataFlow's
     database schema is "significantly more complex than
     documented." He estimates 4 more weeks for the remaining
     5 scripts (putting completion at week 16). The original
     estimate was week 13.

  3. API Integration (Elena + Paul): The API mapping is 70%
     complete but Elena revealed that DataFlow has 12
     undocumented internal APIs that production systems depend
     on. These were not in the original scope. Paul from
     CloudBridge said this is a "material scope change" that
     requires a change order. Jackie (CloudBridge PM) said
     the change order will take 2 weeks to approve.

  4. Security Review (Tomás): Tomás has not started the
     security assessment. He said he's been pulled onto
     DataFlow production support issues and hasn't had time.
     Sandra from TechCorp was visibly frustrated: "Security
     was supposed to start at week 8. We can't go live
     without it."

  5. Testing (Kim): Kim can't begin integration testing until
     data migration and API integration are complete. She
     currently has no work and is billing at $250/hour. She
     estimates needing 3 weeks for full testing once she can
     start.

  6. Timeline Impact: Even optimistically, the project will
     finish at week 21 (1 week late). Pessimistically, week
     24 (4 weeks late). The week 20 deadline was committed to
     the TechCorp board and has financial implications — a
     $2M earnout payment to DataFlow shareholders is tied to
     "successful integration by week 20."

  7. Agreements reached:
     - Will and Elena will meet daily to accelerate the data
       migration scripts
     - Raj (DataFlow CTO) will free Tomás from production
       support by end of this week
     - Jackie will fast-track the CloudBridge change order
       (target: 1 week instead of 2)
     - Kim will assist with API documentation to stay
       productive while waiting for testing
     - Next check-in moved from weekly to twice-weekly
       (Monday and Thursday)
     - Sandra will escalate the timeline risk to TechCorp
       leadership this week

  Task: Write the follow-up email to all attendees and their
  managers.

assertions:
  - type: llm_judge
    criteria: "Response creates a professional, structured follow-up email — uses appropriate email format with subject line, recipients (attendees + managers), and clear sections; leads with the overall status (RED) and timeline impact without burying the bad news; organizes by workstream (data migration, API integration, security, testing) with current status, issues, and next steps for each; is honest about the problems while maintaining professional relationships across 3 companies; does not assign blame but does create clear accountability; the tone is urgent but not panicked — this is a project status communication, not an alarm bell."
    weight: 0.35
    description: "ProfessionalStructure"
  - type: llm_judge
    criteria: "Response documents all action items with clear accountability — every agreement from the meeting is captured as a specific action item with: owner name and company, deliverable, and deadline; includes: Will+Elena daily syncs starting immediately, Raj freeing Tomás from production by end of week, Jackie fast-tracking change order (1 week), Kim assisting with API documentation, Sandra escalating to TechCorp leadership this week, check-ins moving to Monday/Thursday; each item is unambiguous so managers reading this email know exactly what their people committed to; includes the next meeting date and time."
    weight: 0.35
    description: "ActionItemAccountability"
  - type: llm_judge
    criteria: "Response handles the multi-company dynamics and financial implications appropriately — acknowledges the timeline risk and its range (week 21 optimistic, week 24 pessimistic vs week 20 deadline) without revealing confidential financial details (the $2M earnout) in the broader email — this detail may be appropriate for a separate internal communication or flagged privately; the CloudBridge scope change is documented factually (12 undocumented APIs, change order needed) without creating a contractual dispute; addresses Kim's idle billing diplomatically while creating a productive alternative; the email serves as a documented record that all parties can reference — it creates a shared understanding of reality across the three organizations."
    weight: 0.30
    description: "MultiCompanyDynamics"
