meta:
  id: meeting-notes-template
  level: 1
  course: meeting-notes-action-items
  type: output
  description: "Meeting notes template creation — design reusable meeting notes templates for different meeting types used across the team"
  tags: [template, reusable, standardization, beginner]

state: {}

trigger: |
  Your team lead says: "Everyone takes meeting notes
  differently. Some people write novels, others write nothing.
  I need standard templates for our 4 most common meeting
  types:

  1. Weekly team standup (15 min, 6 people, status updates)
  2. Project kickoff meeting (60 min, cross-functional,
     new project setup)
  3. Client call (30-60 min, external stakeholders, varies
     by purpose)
  4. Retrospective (45 min, team reflection on completed
     sprint)

  The templates should be easy to fill in during the meeting
  and produce notes that anyone can understand afterwards."

  Task: Create the 4 meeting notes templates.

assertions:
  - type: llm_judge
    criteria: "Response creates practical, fillable templates — standup template (designed for speed and brevity: pre-filled header: date, attendees, sprint day; per-person section with 3 simple fields: what they completed, what they're working on, any blockers; an action items section at the bottom; a section for announcements; the template should take 2 minutes to fill in — if it takes longer, it's too complex for a standup), kickoff template (comprehensive for project setup: project name, sponsor, date, attendees, and their roles; project objective and scope; key milestones and timeline; team roles and responsibilities; success criteria; risks and assumptions; communication plan — how and when the team will communicate; immediate next steps and action items; this template ensures no critical project setup information is missed), client call template (flexible for various client interactions: client name, attendees from both sides, date; meeting purpose/objective; key discussion points; client requests or requirements; decisions made; commitments/promises made (important to track what was promised to the client); internal action items; follow-up date and next steps; the client call template emphasizes commitments — these are promises that must be tracked and fulfilled), retrospective template (structured for team reflection: sprint/period being reviewed; what went well (keep doing); what didn't go well (stop doing); what to try next (start doing); the template should encourage honest reflection; action items — specific improvements to implement in the next sprint; each improvement has an owner; the template should include a section for team mood or energy check)."
    weight: 0.35
    description: "TemplateDesign"
  - type: llm_judge
    criteria: "Response demonstrates template design principles — usability (the templates are genuinely easy to use during a meeting: fields are clearly labeled so anyone can fill them in; the structure guides the note-taker — they don't have to decide how to organize information; placeholder text or examples show what goes in each field; the templates work in common tools — Notion, Google Docs, markdown — not tied to a specific platform; the templates are not over-designed — they're functional first), consistency across templates (while each template is different, they share common elements: all templates include: date, attendees, action items section; action items always follow the same format across all templates: who, what, when; the note-taking style is consistent — the same person using all 4 templates produces visually consistent output; the templates create a team-wide standard that makes notes predictable and easy to find)."
    weight: 0.35
    description: "DesignPrinciples"
  - type: llm_judge
    criteria: "Response addresses adoption and customization — adoption guidance (helps the team actually use the templates: brief instructions for each template: when to use it, how to fill it in, how to distribute the notes; storage recommendation — where to save completed notes so the team can find them; naming convention suggestion — so notes are easily searchable; the templates should reduce friction — if they're harder to use than freeform notes, no one will use them), customization flexibility (the templates balance standardization with flexibility: required fields that must be completed every time; optional fields for when they're relevant; space for freeform notes — not everything fits neatly into fields; the templates accommodate different note-taking styles while ensuring minimum information is captured)."
    weight: 0.30
    description: "AdoptionAndCustomization"
