meta:
  id: brainstorm-session-notes
  level: 1
  course: meeting-notes-action-items
  type: output
  description: "Brainstorm session notes — capture ideas from a creative brainstorming session while preserving the thinking process and prioritization"
  tags: [brainstorm, ideas, creative, capture, beginner]

state: {}

trigger: |
  You facilitated a 45-minute brainstorming session about
  improving customer onboarding. The team generated lots
  of ideas rapidly. Here's what was said (in rough order):

  Ideas thrown out:
  - Interactive product tour (like Appcues)
  - Send a welcome video from the CEO
  - Simplify the signup form — too many fields
  - Gamify onboarding with progress bars and badges
  - Assign a dedicated onboarding specialist to each new customer
  - Create a "quick start" template library
  - In-app chat support during first 7 days
  - Weekly onboarding webinar for new users
  - Reduce time-to-value — get users to their first "aha moment" in under 5 minutes
  - Personalized onboarding paths based on user role
  - Email drip campaign with tips for the first 30 days
  - Community forum where new users can ask questions
  - Integration wizard — connect their existing tools during setup
  - Mobile onboarding experience (currently desktop-only)

  After generating ideas, the team voted (each person had 3
  dots): Interactive tour (5 votes), Simplify signup (4),
  Personalized paths (4), Quick start templates (3),
  Integration wizard (2), Reduce time-to-value (2).
  The rest got 0-1 votes.

  Task: Document the brainstorming session results.

assertions:
  - type: llm_judge
    criteria: "Response captures the brainstorm effectively — session documentation (includes proper session metadata: session topic: Improving Customer Onboarding; date, duration: 45 minutes; participants; session format: open brainstorm followed by dot voting; the documentation captures both the divergent phase (all ideas) and the convergent phase (voting results)), complete idea capture (all 14 ideas are documented: each idea is described clearly enough that someone who wasn't in the room understands it; ideas are grouped logically — by theme rather than the order they were mentioned: self-service ideas (tour, templates, signup simplification), support-driven ideas (specialist, chat, webinar), content ideas (welcome video, email drip, community forum), product ideas (gamification, personalized paths, integration wizard, mobile, time-to-value); grouping adds value to the raw brainstorm output)."
    weight: 0.35
    description: "BrainstormCapture"
  - type: llm_judge
    criteria: "Response documents prioritization and next steps — voting results (clearly presents the prioritization: ranked list showing vote counts: Interactive product tour — 5 votes; Simplify signup form — 4 votes; Personalized onboarding paths — 4 votes; Quick start template library — 3 votes; Integration wizard — 2 votes; Reduce time-to-value — 2 votes; remaining ideas — 0-1 votes; the voting results are separated from the full idea list — the prioritized ideas are highlighted as the team's top choices), next steps (captures what happens after the brainstorm: the top 3-4 ideas should be explored further — who will research feasibility for each? when will the team reconvene to review findings? the lower-voted ideas aren't discarded — they're documented in a 'parking lot' or 'idea backlog' for future consideration; the session notes serve as a reference for the follow-up work)."
    weight: 0.35
    description: "PrioritizationAndNextSteps"
  - type: llm_judge
    criteria: "Response preserves brainstorm value — idea preservation (the notes preserve the value of the brainstorm: ideas are described with enough detail to be actionable — not just 'gamification' but 'gamify onboarding with progress bars and badges'; connections between ideas are noted where relevant — several ideas relate to reducing time-to-value; the documentation format makes it easy to return to these ideas later; no ideas are lost or combined without noting the originals; the notes serve as a creative asset for the team, not just a record of what happened)."
    weight: 0.30
    description: "IdeaPreservation"
