meta:
  id: advanced-meeting-shift
  level: 3
  course: meeting-notes-action-items
  type: output
  description: "Advanced meeting shift — manage documentation for a complex week involving a regulatory audit, board meeting preparation, cross-cultural partner negotiations, and an internal crisis"
  tags: [shift, advanced, regulatory, board, crisis]

state: {}

trigger: |
  It's a critical week and you're the executive assistant to
  the CEO. Four major documentation challenges converge:

  1. Board Meeting Preparation (Thursday):
  - The CEO needs a board book compiled from 6 different
    executive presentations
  - The CFO's financial presentation includes projections
    that changed since the draft was sent to board members
    last week — the numbers are now more pessimistic
  - One board member (investor representative) has privately
    told the CEO she wants to discuss the CEO's compensation
    — this wasn't on the agenda
  - You need to prepare the formal agenda and anticipate
    needed documentation

  2. Regulatory Audit (Wednesday-Friday):
  - SOC 2 auditors are on-site
  - They've requested documentation of all change management
    meetings for the past 12 months
  - You discover that Q2 change management meetings were
    documented in a tool that the company no longer uses —
    you need to export and organize those records
  - 3 of the 12 months have gaps in documentation

  3. Partner Negotiation (Tuesday):
  - A meeting with a Japanese partner to discuss a joint
    venture
  - The Japanese delegation includes 5 people; their most
    senior member (CEO-level) will be present
  - The preliminary meeting notes from the last session
    (created by a junior employee) were too informal and
    the Japanese partner's chief of staff called to express
    concern about the "unprofessional documentation"
  - The MOU needs to be discussed but the Japanese side
    follows a consensus-building process

  4. Internal Crisis (Monday):
  - An employee has posted on social media alleging
    workplace discrimination
  - The CEO has called an emergency meeting with HR, Legal,
    and Communications
  - The meeting notes for this discussion are legally
    sensitive and may be subject to discovery

  Task: Create a documentation plan and produce the
  necessary templates and guidelines for this week.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive documentation plan for the week — prioritized documentation schedule (sequences the week's documentation work: Monday — crisis meeting: highest priority because of legal sensitivity; use the confidential meeting documentation framework; restrict access to CEO, HR Director, General Counsel, and Communications Director; Tuesday — partner negotiation: use formal, professional documentation format; brief the note-taker on cultural expectations; prepare a meeting protocol document; Wednesday — regulatory audit prep: export Q2 records from the old tool, organize all 12 months of change management documentation, address the 3 months with gaps; Thursday — board meeting: finalize board book, prepare formal minutes template, handle the last-minute agenda items), documentation templates provided (creates specific templates for each event: crisis meeting template — legally sensitive format with: attendees, privilege markers, factual discussion summary, decisions, action items, confidentiality classification; partner meeting template — formal, professional format appropriate for Japanese business culture: proper name formatting with honorifics, careful representation of each party's positions, next steps with the consensus-building process acknowledged; board meeting minutes template — formal corporate governance format with: quorum confirmation, motion procedures, voting records; audit documentation template — organized chronologically with: meeting dates, attendees, decisions, change details, approval records)."
    weight: 0.35
    description: "DocumentationPlan"
  - type: llm_judge
    criteria: "Response addresses the specific challenges in each situation — crisis documentation (handles the legal sensitivity: the notes are marked as privileged communication prepared at the direction of legal counsel; content is factual and neutral — no speculation, no emotional language; the social media post is referenced but not quoted in detail; decisions and next steps are documented precisely; access is restricted and documented), regulatory audit preparation (addresses the documentation gaps: exports Q2 records from the old system — preserving metadata and timestamps; for the 3 months with gaps: documents what records exist, acknowledges the gaps honestly, provides any alternative evidence of the meetings (calendar invitations, email references, action items completed that prove the meetings occurred); presents the 12-month record organized and indexed for the auditors; does not fabricate documentation to fill gaps — this would be audit fraud), partner negotiation (addresses the cultural documentation concerns: the new documentation format is formal and professional; proper use of honorifics and title formats: 'Tanaka-sama' or 'Tanaka CEO'; each party's positions are represented accurately and respectfully; the MOU discussion is documented with appropriate nuance — noting that the Japanese partner's consensus process is ongoing, not recording their tentative positions as commitments; the documentation quality repair addresses the previous complaint), board meeting (handles the complexities: the board book reflects the updated financial projections — not the outdated draft; a cover note explains what changed and why; the compensation discussion is handled: either added to the formal agenda with appropriate preparation or noted as an executive session item; the minutes template is ready for the secretary to complete during the meeting)."
    weight: 0.35
    description: "SpecificChallenges"
  - type: llm_judge
    criteria: "Response demonstrates risk management through documentation — risk identification (identifies the documentation risks: crisis meeting — if notes are poorly worded, they could be used against the company in litigation; if too sparse, the company can't demonstrate its response; partner meeting — unprofessional documentation has already damaged the relationship; the stakes are higher now; regulatory audit — documentation gaps could result in audit findings or non-compliance; fabricating records would be far worse than acknowledging gaps; board meeting — outdated projections in the board book could constitute misleading board members; the compensation discussion needs proper handling to protect governance integrity), mitigation strategies (proposes specific protections: crisis — legal counsel reviews all notes before distribution; notes are stored in the legal hold system; partner — a senior team member reviews notes before sharing with the Japanese partner; the CEO's chief of staff may coordinate with the partner's chief of staff on documentation approach; audit — present the gaps proactively with explanation and mitigation evidence; prepare a remediation plan showing improved documentation practices; board — the CEO personally reviews the board book before distribution; the cover note explaining projection changes is transparent and factual)."
    weight: 0.30
    description: "RiskManagement"
