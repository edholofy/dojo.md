meta:
  id: meeting-action-accountability
  level: 3
  course: meeting-notes-action-items
  type: output
  description: "Meeting action accountability — design and implement an organization-wide system to ensure meeting action items translate into completed work with measurable outcomes"
  tags: [accountability, tracking, organization-wide, outcomes, culture]

state: {}

trigger: |
  You're the VP of Operations at a 500-person professional
  services firm. The CEO has identified a critical problem:
  "We have 200+ meetings per week across the company and
  I'd estimate less than half of action items actually get
  completed. We're making the same decisions over and over
  because nothing gets done between meetings. It's costing
  us millions in lost productivity and client satisfaction."

  Current state assessment:
  - 47 teams across 6 practice areas
  - Average of 4.3 meetings per employee per day
  - Action items captured inconsistently: some teams use
    Asana, some use Monday.com, some use shared docs, some
    use nothing
  - No cross-team visibility on commitments
  - Client-facing commitments from meetings are tracked
    separately from internal commitments (if tracked at all)
  - Senior partners resist any "bureaucratic overhead" and
    say documentation "slows down client work"
  - A recent client satisfaction survey showed 34% of clients
    cited "poor follow-through on commitments" as a concern
  - The firm lost a $4M client last quarter who said: "Your
    people are smart but nothing gets done after meetings"

  Recent incidents:
  1. A partner committed to delivering a draft report to a
     client "by Friday." Three people heard this differently
     — one thought it was a full draft, one thought it was
     an outline, one didn't hear the commitment at all. The
     client received nothing.

  2. Two teams independently committed to the same client
     for the same deliverable on different timelines. Neither
     team knew about the other's commitment until the client
     asked why they were getting conflicting messages.

  3. A project retrospective revealed that 8 of 12 action
     items from the kickoff meeting were never completed.
     The project manager said: "I wrote them down but nobody
     ever looked at the notes again."

  The CEO wants a firm-wide solution that senior partners
  will actually adopt. Budget: $200K for technology and
  implementation. Timeline: pilot within 60 days, firm-wide
  within 6 months.

  Task: Design the meeting action accountability system.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive accountability system — addresses the root causes (inconsistent tools, no cross-team visibility, no follow-up culture, ambiguous commitments); creates a unified approach that doesn't require everyone to use the same tool but provides cross-system visibility; establishes a commitment language framework that prevents ambiguity (who, what, when, acceptance criteria); addresses the distinction between client-facing and internal commitments with appropriate urgency levels; includes a commitment review cadence (daily/weekly/meeting-start reviews); creates escalation paths for overdue or at-risk items; addresses the partner resistance by making the system lightweight and showing client satisfaction ROI."
    weight: 0.35
    description: "SystemDesign"
  - type: llm_judge
    criteria: "Response creates a practical implementation plan — includes a phased rollout starting with a pilot group (likely client-facing teams where the pain is most acute); addresses change management for senior partners (frame as client service improvement, not bureaucracy); includes technology recommendations within the $200K budget; defines clear roles (commitment owners, trackers, escalation points); provides templates for meeting commitment capture; includes training and onboarding plans; defines success metrics (completion rate targets, client satisfaction improvement, reduction in duplicate commitments); addresses each of the 3 recent incidents and shows how the system would have prevented them."
    weight: 0.35
    description: "ImplementationPlan"
  - type: llm_judge
    criteria: "Response addresses organizational culture and sustainability — recognizes that accountability is a culture problem not just a tools problem; proposes mechanisms to shift the culture (visible commitment dashboards, recognition for high completion rates, accountability discussions in partner meetings); addresses the 'meeting overload' issue (4.3 meetings per day per employee is itself a problem); suggests meeting reduction strategies alongside better action tracking; includes a governance structure for maintaining the system long-term; provides a measurement framework showing ROI (link improved follow-through to client retention and revenue); addresses how to sustain the system after initial enthusiasm fades."
    weight: 0.30
    description: "CultureAndSustainability"
