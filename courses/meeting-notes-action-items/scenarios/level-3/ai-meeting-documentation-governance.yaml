meta:
  id: ai-meeting-documentation-governance
  level: 3
  course: meeting-notes-action-items
  type: output
  description: "AI meeting documentation governance — create policies for using AI transcription and note-taking tools across the organization with privacy, accuracy, and compliance considerations"
  tags: [ai, governance, privacy, transcription, advanced]

state: {}

trigger: |
  Your company (300 employees, B2B SaaS, customers in US,
  EU, and UK) has noticed that employees are independently
  adopting AI meeting tools:

  - 40% of employees use Otter.ai for transcription
  - 20% use Fireflies.ai for meeting summaries
  - 10% use various other AI note-taking tools
  - Some employees have AI bots joining customer calls
    without telling the customer
  - An AI tool transcribed a confidential board meeting and
    the transcript was stored on the vendor's servers
  - A client in Germany complained that their call was
    recorded and transcribed by an AI tool without consent —
    potential GDPR violation
  - HR is concerned about AI tools transcribing disciplinary
    and termination conversations
  - Legal found that one AI vendor's terms allow them to use
    meeting data to train their models

  The CTO says: "We can't ban AI meeting tools — they're
  too useful. But we clearly need governance. Create the
  policy."

  Task: Create the AI meeting documentation governance
  policy.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive AI meeting tool policy — tool approval and standards (establishes which tools can be used: approved tool list — evaluate and approve 1-2 AI meeting tools that meet the company's security, privacy, and compliance requirements; evaluation criteria: data storage location (EU customers require EU data residency); data usage policy (no training on customer data); encryption standards; SOC 2 compliance; GDPR compatibility; data retention and deletion capabilities; unapproved tools — all other AI meeting tools are prohibited; the 40%/20%/10% fragmentation across multiple tools is a security risk; a single approved platform provides: consistent data governance, vendor accountability, and standardized output quality), meeting classification for AI use (defines which meetings can use AI tools: green — AI transcription permitted: internal team meetings, status updates, brainstorms, planning sessions; yellow — AI transcription permitted with additional consent: customer calls (requires explicit customer consent before activating), partner meetings (requires partner notification and consent); red — AI transcription prohibited: board meetings, M&A discussions, HR investigations, disciplinary conversations, legal strategy sessions, executive compensation discussions, any meeting with legal counsel where privilege applies; the classification addresses all the incidents described: the board meeting transcription, the unconsented customer call, and the HR concern)."
    weight: 0.35
    description: "AIToolPolicy"
  - type: llm_judge
    criteria: "Response addresses privacy and compliance — consent framework (creates a consent process: internal meetings: employees consent to AI transcription as part of the company policy; they can opt out of specific meetings with reasonable justification; external meetings: customer/partner consent must be obtained before any AI recording or transcription; consent language — provide a standard consent script: 'We'd like to use an AI tool to help capture meeting notes. The tool will transcribe our conversation. The transcript is stored securely and only accessible to our team. Is that okay with you?'; if consent is denied, the AI tool must not be used — manual note-taking only; the German client situation is a GDPR violation — this must be remedied: notify the client, delete the unauthorized transcript, and report the incident as required), regulatory compliance (addresses specific legal requirements: GDPR — for EU clients and data subjects: explicit consent required before recording; data minimization — only capture what's necessary; right to deletion — clients can request transcript deletion; data processing agreement with the AI vendor; US state laws — California, Florida, Pennsylvania and other two-party consent states require all-party consent before recording; the policy must account for the location of all meeting participants, not just the meeting organizer; data retention — define how long AI transcripts are retained (suggest 90 days for routine meetings, with manual override for important references); vendor data handling — the AI vendor's terms regarding training on customer data must be addressed contractually: negotiate a data exclusion clause or switch to a vendor that doesn't train on customer data)."
    weight: 0.35
    description: "PrivacyAndCompliance"
  - type: llm_judge
    criteria: "Response addresses accuracy, training, and implementation — accuracy and quality governance (ensures AI-generated notes are reliable: AI transcription accuracy — AI meeting tools are not 100% accurate; establish a review process: for routine meetings, the note-taker reviews and corrects the AI transcript before distribution; for important meetings, a second reviewer checks critical details; disclaimer on AI-generated notes: 'These notes were generated with AI assistance and reviewed by [name]. If you notice any inaccuracies, please flag them within 48 hours'; the AI-generated notes should be treated as a draft, not a final record; for legal, financial, or compliance-sensitive meetings, human-generated notes are the official record even if AI transcription is also used), rollout and training (plans the policy implementation: communication — announce the policy company-wide with clear rationale: the German client incident, the board meeting security risk, and the data privacy concerns; training — all employees who use AI meeting tools receive training on: the approved tool, the meeting classification system, how to obtain consent, and how to review AI-generated notes; enforcement — the IT team disables unauthorized AI tool access where possible; managers are responsible for ensuring their teams follow the policy; the transition plan accounts for the current fragmented adoption: migrate all users to the approved tool within 30 days; delete transcripts from unapproved tools; audit existing vendor agreements for data handling terms; the policy is reviewed annually or whenever the regulatory landscape changes)."
    weight: 0.30
    description: "AccuracyAndImplementation"
