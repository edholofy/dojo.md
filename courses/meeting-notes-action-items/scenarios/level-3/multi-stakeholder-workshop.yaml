meta:
  id: multi-stakeholder-workshop
  level: 3
  course: meeting-notes-action-items
  type: output
  description: "Multi-stakeholder workshop documentation — document a full-day strategic workshop with breakout sessions, voting, and synthesized outcomes"
  tags: [workshop, strategic, breakout, synthesis, advanced]

state: {}

trigger: |
  You documented a full-day (8-hour) strategic planning
  workshop with 25 participants from 6 departments. The
  workshop had multiple formats:

  Morning Session 1 (9-10:30 AM): "State of the Business"
  - CEO presented company performance (slides available)
  - CFO presented financial outlook (confidential)
  - Open Q&A — 12 questions asked, some contentious

  Morning Session 2 (10:45 AM-12 PM): Breakout Groups
  5 groups of 5 people, each assigned a strategic challenge:
  - Group A: "How do we grow revenue 30% next year?"
  - Group B: "How do we reduce customer churn below 3%?"
  - Group C: "How do we enter the European market?"
  - Group D: "How do we build an enterprise sales motion?"
  - Group E: "How do we attract and retain top talent?"
  Each group had a facilitator and a note-taker.

  Afternoon Session 1 (1-2:30 PM): Breakout Report-Outs
  Each group presented their top 3 recommendations (15 min
  each). 25 total recommendations across all groups.

  Afternoon Session 2 (2:45-4 PM): Prioritization
  Each participant had 5 votes to distribute across the 25
  recommendations. Top voted recommendations emerged.

  Afternoon Session 3 (4-5 PM): Action Planning
  The top 8 recommendations were assigned executive sponsors
  and 90-day action plans.

  You have: your own notes, 5 breakout group note-taker
  outputs (varying quality), the CEO's slides, voting results,
  and photos of whiteboards.

  Task: Create the comprehensive workshop documentation.

assertions:
  - type: llm_judge
    criteria: "Response creates structured workshop documentation — workshop overview document (produces a comprehensive record: workshop metadata — date, duration, participants (listed by department and role), facilitators, objectives; the document is organized by session, not chronologically within sessions; executive summary — the single most important output: the top 8 prioritized strategic recommendations with their executive sponsors; this goes first because 80% of readers only need this; detailed session documentation follows for those who want depth), breakout group synthesis (consolidates the 5 breakout groups: each group's 3 recommendations are documented with: the recommendation, the rationale, any supporting data or analysis from the group discussion, and the group's proposed approach; the 25 total recommendations are compiled into a single list; cross-group themes are identified — did multiple groups independently recommend similar things? (e.g., Group A's revenue growth and Group D's enterprise sales may overlap); the varying quality of the 5 note-taker outputs is addressed — gaps are filled from your own notes and the whiteboard photos)."
    weight: 0.35
    description: "WorkshopDocumentation"
  - type: llm_judge
    criteria: "Response documents prioritization and action plans — voting results (presents the prioritization clearly: all 25 recommendations ranked by votes; the top 8 recommendations highlighted; vote distribution provides useful signal — was the top recommendation a clear winner or was it close? widely distributed votes suggest alignment; concentrated votes on a few items suggest clear priorities; recommendations that received zero votes are noted but not discarded — they go to a parking lot for future consideration), 90-day action plans (documents the action planning session: each of the top 8 recommendations has: an executive sponsor, a 90-day goal (what 'success' looks like in 90 days), key milestones at 30, 60, and 90 days, required resources, and dependencies on other recommendations; the action plans are specific enough to be tracked — not 'explore European market' but 'complete market analysis for 3 target European countries by day 30')."
    weight: 0.35
    description: "PrioritizationAndActions"
  - type: llm_judge
    criteria: "Response handles logistics and follow-up — source material management (handles the multiple inputs: CEO slides — referenced but not reproduced; linked or attached as a separate document; CFO presentation — noted as confidential; key financial data is mentioned in the notes only if appropriate, or noted as 'see confidential financial briefing'; breakout whiteboards — photos attached or linked; key content transcribed into the notes; the documentation package is self-contained — a reader can understand the workshop without attending), follow-up and distribution plan (plans how the documentation is used: executive summary distributed to all participants within 48 hours; full documentation available in a shared location; the 8 action plan sponsors receive their specific plans with clear expectations; a 30-day check-in meeting is scheduled to review progress on the action plans; the workshop documentation serves as the reference point for all strategic decisions made — when someone asks 'why are we entering Europe?', the answer is in the workshop documentation)."
    weight: 0.30
    description: "LogisticsAndFollowUp"
