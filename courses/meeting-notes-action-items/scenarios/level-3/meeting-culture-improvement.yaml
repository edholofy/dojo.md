meta:
  id: meeting-culture-improvement
  level: 3
  course: meeting-notes-action-items
  type: output
  description: "Meeting culture improvement — analyze meeting documentation patterns to identify systemic meeting effectiveness problems and recommend improvements"
  tags: [culture, improvement, analysis, effectiveness, advanced]

state: {}

trigger: |
  You're the Chief of Staff at a 200-person company. The CEO
  has asked you to analyze the company's meeting culture after
  complaints about "too many meetings" and "meetings that go
  nowhere." You've gathered the following data:

  Meeting Volume:
  - Average employee has 23 meetings per week
  - 40% of meetings have no agenda
  - 65% of meetings have no documented notes or outcomes
  - Average meeting duration: 52 minutes (scheduled for 30)
  - 30% of meetings run over their scheduled time

  Action Item Data (from the 35% that do have notes):
  - Average meeting generates 3.2 action items
  - Only 41% of action items are completed by their deadline
  - 22% of action items have no assigned owner
  - 15% of action items are duplicates from previous meetings

  Meeting Types (company-wide):
  - Status updates: 45% (most common)
  - Decision-making: 15%
  - Brainstorming/planning: 12%
  - 1:1s: 18%
  - All-hands/town halls: 5%
  - Other: 5%

  Qualitative Feedback:
  - "I spend so much time in meetings I do my actual work
    after 6 PM"
  - "Half the meetings I attend don't need me there"
  - "We make decisions in meetings then revisit them in the
    next meeting"
  - "Action items from meetings just disappear"
  - "I take notes but nobody reads them"

  Task: Create the meeting culture analysis report with
  actionable recommendations.

assertions:
  - type: llm_judge
    criteria: "Response creates a data-driven analysis — problem diagnosis (analyzes the data systematically: meeting volume problem: 23 meetings/week × 52 min average = approximately 20 hours/week in meetings; that's 50% of work time spent in meetings; the 40% with no agenda means ~9 meetings/week have no clear purpose; documentation gap: 65% of meetings produce no notes — decisions and action items are lost; of the 35% that do, only 41% of action items are completed; the company is spending massive time in meetings with minimal documented output; meeting type imbalance: 45% are status updates — these are the most likely to be replaceable with async communication; only 15% are decision-making meetings — the highest-value meeting type; recurring patterns: the 15% duplicate action items indicate decisions being revisited; meetings running over (30%) suggests poor agenda management or scope creep), root cause analysis (identifies why meetings are ineffective: no meeting standards — without required agendas, any meeting can drift; no accountability for outcomes — 65% produce no documentation so there's no record of what was decided; no meeting owner training — the people scheduling meetings don't know how to run them effectively; cultural default to meetings — 'let's schedule a meeting' is the default response to any question; missing async alternatives — status updates could be Slack updates or written reports)."
    weight: 0.35
    description: "DataDrivenAnalysis"
  - type: llm_judge
    criteria: "Response provides actionable recommendations — meeting policy recommendations (proposes specific, implementable changes: meeting hygiene rules: every meeting must have an agenda shared 24 hours in advance; every meeting must have a designated note-taker; every meeting must produce documented outcomes within 24 hours; meetings default to 25 minutes (not 30) or 50 minutes (not 60) to allow transition time; meeting reduction strategy: convert 50% of status update meetings to async written updates; implement 'meeting-free' blocks: no meetings Wednesday afternoons or Friday mornings; require a 'meeting necessity test' before scheduling: Could this be an email? Could this be a Slack thread? Is a meeting the only way to achieve this?; action item accountability: all action items must have an owner and deadline; standing agenda item at every recurring meeting: review open action items; weekly action item report to managers), implementation plan (the recommendations include a rollout plan: phase 1 (weeks 1-2): announce the new meeting policy; provide training on effective meeting management; phase 2 (weeks 3-4): implement the meeting hygiene rules; start the meeting-free blocks; phase 3 (months 2-3): convert status meetings to async; implement action item tracking; phase 4 (month 4): measure results against baseline; the plan includes change management — people will resist changes to their meeting habits)."
    weight: 0.35
    description: "ActionableRecommendations"
  - type: llm_judge
    criteria: "Response includes measurement and targets — success metrics (defines how to measure improvement: quantitative targets: reduce average meetings per employee from 23 to 15 per week within 6 months; increase meetings with agendas from 60% to 95%; increase meetings with documented outcomes from 35% to 80%; increase action item completion rate from 41% to 75%; eliminate duplicate action items; employee satisfaction: survey employees quarterly on meeting effectiveness; target: 70% report meetings are 'effective or very effective' (establish current baseline first); time recovery: the goal is to recover 5-8 hours per week per employee; this represents significant productivity gain; the CEO presentation should include the ROI: 200 employees × 6 hours recovered × average hourly rate = annual value of meeting culture improvement), ongoing monitoring (establishes continuous measurement: monthly meeting analytics dashboard: volume, duration, agenda compliance, documentation compliance; quarterly employee survey on meeting satisfaction; action item completion tracking integrated into the team's workflow tool; the meeting culture improvement is not a one-time project — it requires ongoing attention and measurement to prevent backsliding)."
    weight: 0.30
    description: "MeasurementAndTargets"
