meta:
  id: meeting-documentation-standards
  level: 3
  course: meeting-notes-action-items
  type: output
  description: "Meeting documentation standards — create organization-wide standards for meeting documentation including templates, quality criteria, and compliance requirements"
  tags: [standards, organization, quality, compliance, advanced]

state: {}

trigger: |
  You're the Head of Operations at a 500-person company that's
  preparing for a SOC 2 Type II audit. The auditor has flagged
  meeting documentation as a compliance risk:

  "Your change management process requires documented approval
  for all production changes. But 60% of your change approvals
  happen verbally in meetings with no documentation. Your
  access control reviews are supposed to happen quarterly,
  but we can't find meeting records for 2 of the last 4
  quarters. Your incident response procedures require a post-
  incident review meeting — only 3 of 7 incidents this year
  have documented review meetings."

  Additionally:
  - The legal team says they've lost 2 contract disputes
    because meeting notes that would have supported their
    position were never created
  - The product team says decisions made in meetings are
    frequently revisited because there's no record of the
    original decision and its rationale
  - New employees say they can't find historical context for
    ongoing projects because meeting documentation is
    scattered across 4 different tools

  Task: Create the meeting documentation standards that
  address compliance, legal, and operational requirements.

assertions:
  - type: llm_judge
    criteria: "Response creates compliance-driven documentation standards — meeting classification and requirements (defines documentation requirements by meeting type and compliance impact: mandatory documentation meetings — meetings where documentation is legally or regulatory required: change management approval meetings — every production change approval must be documented with: what was approved, who approved it, the date, and the risk assessment; access control review meetings — quarterly reviews must produce a signed-off access review record; incident review meetings — every incident must have a documented post-incident review within 5 business days; board and committee meetings — formal minutes required; meetings with external legal counsel — attorney-client privileged notes with restricted access; recommended documentation meetings — meetings where documentation is strongly recommended but not required: client calls, strategic planning, cross-functional projects, hiring decisions; optional documentation meetings — routine meetings where documentation is at the team's discretion: daily standups, informal brainstorms, social meetings), documentation quality standards (defines what 'good documentation' means: minimum required elements for each meeting type: date, attendees, decisions made, action items with owners and deadlines; for compliance-critical meetings: additional elements: agenda confirming the meeting's purpose, voting or approval records, risk assessments or considerations discussed; documentation must be completed within 24 hours of the meeting for compliance meetings, 48 hours for all others; the documentation must be stored in the designated system — not in personal notes, email, or unauthorized tools)."
    weight: 0.35
    description: "ComplianceStandards"
  - type: llm_judge
    criteria: "Response creates operational standards and tooling — centralized documentation system (addresses the scattered documentation problem: designate a single documentation platform — all meeting notes across the company stored in one searchable system; the 4 different tools currently in use must be consolidated; migration plan for existing documentation from the 4 tools; the system must provide: full-text search across all meeting notes, tagging by project, team, and meeting type, access controls for confidential meetings, audit trail showing when notes were created and by whom; naming convention standard — consistent naming makes notes findable: format: [Date] [Meeting Type] [Topic/Project] — e.g., '2026-01-15 Change Review API v2 Migration'), template library (provides templates for each meeting classification: compliance-critical templates with required fields that cannot be submitted incomplete; standard templates with recommended fields; each template is designed for the specific meeting type: change management approval template includes: change description, risk assessment, approver name and role, approval decision, conditions if any; access review template includes: systems reviewed, access changes made, reviewer names, completion confirmation; incident review template includes: incident timeline, root cause, impact assessment, remediation actions, prevention measures; the templates enforce documentation quality — a filled-in template produces documentation that satisfies compliance requirements)."
    weight: 0.35
    description: "OperationalStandards"
  - type: llm_judge
    criteria: "Response addresses adoption, audit readiness, and legal protection — adoption and enforcement (ensures the standards are actually followed: accountability model — meeting organizers are responsible for ensuring their meeting is documented according to its classification; for compliance-critical meetings, the documentation must be completed before the next compliance review period; compliance dashboard — track documentation rates by meeting type: change management approvals documented: target 100%; access reviews documented: target 100%; incident reviews documented: target 100%; other meeting types documented: target 70%; consequences — if a compliance-critical meeting is not documented, it's treated as if the meeting didn't happen: the change is not approved, the access review is not complete; this makes documentation a prerequisite for action, not an afterthought), audit and legal readiness (prepares the company for audits and legal disputes: audit trail — every compliance-critical meeting note has metadata: creation date, author, last modified date, version history; this proves the documentation was created contemporaneously, not after the fact; legal protection — the documentation standards include guidance for notes that may be legally relevant: be factual and specific; document decisions and their rationale; record who said what when it matters for accountability; don't include speculation, humor, or inflammatory language; retention policy — compliance documentation retained for 7 years; general meeting documentation retained for 3 years; the retention policy aligns with SOC 2 requirements and the company's legal obligations; training — all meeting organizers receive training on documentation standards; compliance-critical meeting owners receive additional training on their specific requirements)."
    weight: 0.30
    description: "AdoptionAndAuditReadiness"
