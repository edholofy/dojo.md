meta:
  id: cross-cultural-meeting-documentation
  level: 3
  course: meeting-notes-action-items
  type: output
  description: "Cross-cultural meeting documentation — document meetings with international participants where cultural differences affect communication, decision-making, and documentation expectations"
  tags: [cross-cultural, international, communication, cultural, advanced]

state: {}

trigger: |
  You're documenting a strategic planning meeting with
  participants from 4 regional offices:

  New York (3 participants, US culture):
  - Direct communication style
  - Expect quick decisions in meetings
  - VP of Sales (Tom) said: "Let's just decide now and
    move on. We're wasting time discussing."

  Tokyo (2 participants, Japanese culture):
  - Consensus-oriented decision making (nemawashi/ringi)
  - The Japan Country Manager (Tanaka-san) said: "This is
    a very interesting proposal. We will need to discuss
    internally." (This likely means significant concerns
    but expressing them indirectly.)
  - The Japan Marketing Lead (Suzuki-san) remained silent
    during most of the discussion despite being a key
    stakeholder.

  Munich (2 participants, German culture):
  - Data-driven, thorough analysis expected
  - The Germany Director (Dr. Schmidt) requested: "We need
    the complete financial model with all assumptions before
    we can evaluate this proposal properly."
  - Expressed concern about the timeline being "optimistic
    without sufficient evidence."

  São Paulo (2 participants, Brazilian culture):
  - Relationship-focused, flexible approach
  - The Brazil Director (Ricardo) said: "This feels right.
    The numbers will work out. Let's focus on the partnership
    opportunity."
  - Started discussing personal connections to potential
    partners.

  The meeting was about entering a new market together.
  Tom (US) pushed for a vote. Tanaka-san didn't vote.
  Dr. Schmidt voted "not yet." Ricardo voted "yes."

  Task: Create meeting notes that accurately represent all
  perspectives and culturally appropriate next steps.

assertions:
  - type: llm_judge
    criteria: "Response creates culturally sensitive documentation — cultural context in documentation (the notes reflect an understanding of cultural communication styles: Tanaka-san's response is not recorded as 'agreed with the proposal' — his 'very interesting proposal' is understood as potential disagreement or at minimum a request for more time; his need to 'discuss internally' reflects the nemawashi process — this is not hesitation but a legitimate decision-making approach; Suzuki-san's silence is not interpreted as agreement or disengagement — in Japanese business culture, junior members often defer to senior members in group settings; the notes acknowledge this and propose a follow-up mechanism for her input; Dr. Schmidt's request for data is not recorded as 'obstructive' — it's a legitimate requirement in German business culture; Ricardo's relationship-focused approach is not dismissed — his partner connections may be the most valuable contribution), balanced representation (all perspectives are documented equally: the US push for a quick decision is not privileged over the Japanese request for internal discussion; each region's input is given appropriate weight regardless of communication style; the notes don't favor the loudest voice (Tom) over the quietest (Suzuki-san); the documentation reflects that different cultures have different decision-making velocities and all are valid)."
    weight: 0.35
    description: "CulturalSensitivity"
  - type: llm_judge
    criteria: "Response proposes culturally appropriate next steps — decision process design (proposes a decision-making approach that works for all cultures: the forced vote was premature — not all cultures make decisions by majority vote in a single meeting; revised approach: provide the complete financial model Dr. Schmidt requested — this satisfies the German need for data and gives the Japanese team material for internal discussion; allow 2 weeks for each regional team to review internally and provide their position — this accommodates nemawashi without being seen as 'slow' by the US team; schedule a follow-up meeting after the review period where each region presents their evaluation and concerns; the next steps respect all 4 cultural approaches while maintaining momentum), stakeholder engagement (ensures all voices are heard: create a mechanism for Suzuki-san to provide input — perhaps a written submission or a separate call with the Japanese team; Tom's desire for speed is acknowledged with a concrete timeline — he gets the decision, just not in this meeting; Ricardo's relationship angle is valued — his partner connections are documented as a potential strategic advantage to be explored in parallel; Dr. Schmidt gets the data he needs to evaluate properly; each person leaves the meeting feeling their contribution was valued and their process was respected)."
    weight: 0.35
    description: "CulturallyAppropriateNextSteps"
  - type: llm_judge
    criteria: "Response addresses documentation distribution and language — documentation format considerations (the notes themselves are culturally appropriate: language is formal enough for Japanese and German audiences while being clear for all; avoids idioms, slang, or culturally specific references that might not translate; if the notes will be translated, identifies which sections need translation and into which languages; the executive summary is written in a way that all 4 cultures would consider appropriate: factual, balanced, and forward-looking), multi-regional distribution (plans distribution across offices: the notes may need to be reviewed by each regional lead before wide distribution — ensuring their team's perspective is accurately represented; the Japanese team may need the notes in advance of a follow-up meeting to prepare their formal response; the German team may request corrections to ensure precision; the distribution timeline accounts for time zones — sending notes at 5 PM New York means they arrive at 6 AM Tokyo the next morning)."
    weight: 0.30
    description: "DistributionAndLanguage"
