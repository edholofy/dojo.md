meta:
  id: master-meeting-shift
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Master meeting shift — navigate an existential corporate crisis where meeting documentation is central to survival, involving congressional testimony, regulatory action, and litigation"
  tags: [shift, master, existential, congressional, litigation]

state: {}

trigger: |
  You're the Chief Operating Officer of a publicly traded
  pharmaceutical company ($8B revenue, 20,000 employees).
  The company is facing a crisis where meeting documentation
  is central to every aspect:

  1. Congressional Investigation:
  - A congressional committee is investigating drug pricing.
    They've subpoenaed all meeting records from the pricing
    committee for the past 5 years.
  - Your pricing committee meetings are well-documented, but
    the notes include candid discussions about "pricing to
    maximize shareholder value" and comparisons to
    competitors' pricing strategies — language that will look
    terrible in a congressional hearing.
  - The CEO must testify next month. Congressional staff will
    use the meeting notes to formulate questions.

  2. FDA Regulatory Action:
  - The FDA has issued a warning letter citing manufacturing
    deficiencies discovered during an inspection.
  - The inspection revealed that quality review meetings were
    not documented for 8 of the past 12 months.
  - The FDA inspector noted: "The absence of quality review
    meeting records suggests that required quality oversight
    may not have been performed."
  - The FDA is considering whether to escalate to a consent
    decree.

  3. Multi-District Litigation:
  - 500 personal injury lawsuits have been consolidated.
    Plaintiffs allege the company knew about a side effect.
  - The plaintiffs' attorneys have obtained meeting notes
    from a clinical team meeting that include the sentence:
    "The adverse event signal is real but manageable within
    the current labeling."
  - This sentence has been highlighted in media coverage as
    evidence the company prioritized profits over safety.

  4. Internal Whistleblower:
  - An employee in the quality department has filed an
    internal whistleblower complaint alleging that the
    manufacturing quality meetings were held but deliberately
    not documented to avoid creating a regulatory record.
  - If true, this transforms the FDA issue from negligence
    to intentional obstruction.

  5. Board Crisis:
  - The board is meeting in emergency session to decide:
    whether to retain special counsel, form a special
    committee, and consider management changes.
  - D&O insurance requires evidence of proper board oversight.
  - The company's market cap has dropped 40% in 3 weeks.

  Budget: unlimited for crisis response. Timeline: the
  congressional testimony is in 30 days.

  Task: Create the comprehensive documentation crisis
  strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates immediate crisis documentation actions — immediate preservation and triage (takes action within 48 hours: company-wide litigation hold — comprehensive hold covering all meeting documentation across all systems, all departments, all formats; this is legally required and must be executed immediately; any destruction of documents at this point is criminal obstruction; document inventory — identify and catalog all meeting documentation that is or may become responsive to: the congressional subpoena, the FDA investigation, and the MDL litigation; this requires coordination across legal, IT, and every affected department; privilege assessment — identify all meeting documentation that may be protected by attorney-client privilege; ensure privilege is not inadvertently waived through broad production; triage the crisis — assign dedicated resources to each front: congressional response team, FDA response team, litigation defense team, whistleblower investigation team, board advisory team; each team needs its own documentation lead to manage the meeting records relevant to their front), congressional testimony preparation (uses meeting documentation strategically: the pricing committee notes are subpoenaed and will be produced — they cannot be altered or destroyed; preparation strategy: review every pricing committee meeting note for the past 5 years; identify the passages that will be used against the company; prepare contextual explanations for the CEO's testimony: 'pricing to maximize shareholder value' is a fiduciary obligation — frame it within the context of R&D investment, patient access programs, and the company's overall value proposition; prepare the CEO with the specific meeting notes congressional staff are likely to reference; anticipate the worst questions and prepare honest, contextual answers; the notes are what they are — the strategy is interpretation, not denial)."
    weight: 0.35
    description: "ImmediateCrisisActions"
  - type: llm_judge
    criteria: "Response addresses each crisis front with appropriate documentation strategy — FDA and whistleblower response (addresses the regulatory and internal crisis: FDA response — the 8 months of missing quality meeting documentation is the company's most dangerous liability; if the meetings occurred but weren't documented: reconstruct what happened through interviews, emails, and other corroborating evidence; present the FDA with honest acknowledgment and a corrective action plan; if the meetings didn't occur: this is a serious quality system failure; acknowledge it, remediate immediately, and demonstrate corrective action; the whistleblower allegation changes everything — if documentation was deliberately omitted, this is not negligence but intentional conduct; the whistleblower investigation must be independent and thorough; engage outside counsel to investigate; protect the whistleblower from retaliation; the investigation findings will determine whether the FDA situation is a documentation failure or an obstruction case), litigation defense (manages the clinical team meeting notes: the 'adverse event signal is real but manageable within the current labeling' sentence is devastating in isolation; the defense strategy uses the complete meeting documentation to provide context: what was the full discussion? what actions were taken? what was the timeline between identifying the signal and any labeling changes? the meeting notes may actually support the defense if they show the company took the signal seriously, investigated it, and took appropriate action; but if the notes show no follow-up action, the defense is much harder; the documentation strategy for the litigation: produce all responsive meeting records (required by law); present the records in chronological context showing the company's response to the safety signal; engage medical and regulatory experts to explain the clinical team's assessment in context; the meeting documentation is both the weapon being used against the company and potentially its best defense)."
    weight: 0.35
    description: "CrisisFrontStrategies"
  - type: llm_judge
    criteria: "Response addresses board governance and long-term reform — board documentation and governance (manages the emergency board meeting: the board meeting documentation is critical for D&O insurance and director liability protection; the minutes must demonstrate: the board is actively overseeing the crisis response; directors are asking substantive questions about each front; the board is making informed decisions about special counsel, special committees, and management accountability; outside counsel should attend the board meeting and review the minutes; the board should consider: forming a special committee of independent directors to oversee the crisis response; the special committee's formation, charter, and membership are documented formally; all board communications about the crisis are preserved and appropriately classified), systemic documentation reform (creates lasting change: the crisis reveals systemic documentation failures across the company; post-crisis, the company needs: comprehensive meeting documentation standards for all regulated functions; mandatory documentation for quality, safety, clinical, and pricing meetings; regular audits of documentation compliance; training on the legal implications of meeting documentation — both the risk of documenting candid discussions and the risk of not documenting required discussions; the reform acknowledges the paradox: the pricing committee notes are being used against the company because they were documented candidly; the quality meetings are a problem because they weren't documented at all; the lesson is not 'don't document' — it's 'document thoughtfully, completely, and in compliance with regulatory requirements'; going forward, the company's meeting documentation practices should be: comprehensive (all required meetings documented), professional (factual, neutral language), compliant (meeting all regulatory documentation requirements), and defensible (able to withstand scrutiny from regulators, courts, and Congress); the documentation reform becomes part of the company's compliance program, reviewed by the board, and subject to regular audit)."
    weight: 0.30
    description: "BoardAndReform"
