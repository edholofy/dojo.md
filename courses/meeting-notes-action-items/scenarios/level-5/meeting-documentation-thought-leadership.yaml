meta:
  id: meeting-documentation-thought-leadership
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Meeting documentation thought leadership — develop industry-leading frameworks for meeting documentation that establish the organization as a thought leader in organizational effectiveness"
  tags: [thought-leadership, frameworks, innovation, industry, master]

state: {}

trigger: |
  You're the SVP of Organizational Effectiveness at a
  management consulting firm. Your CEO wants to develop
  proprietary intellectual property around meeting
  documentation and decision management:

  "Every consulting firm talks about culture, strategy, and
  transformation. Nobody owns the meeting documentation
  space. But meetings are where organizations actually work
  — or fail to work. I want us to develop a comprehensive
  methodology, publish it, and become the authority on
  organizational meeting effectiveness. This could be a
  $50M practice area."

  Context:
  - The firm has 2,000 consultants serving Fortune 500 clients
  - Clients consistently cite meeting overload and poor
    decision documentation as top operational challenges
  - No competitor has a dedicated meeting effectiveness
    practice
  - The firm has 10 years of meeting audit data from 200+
    engagements
  - Academic research on meeting effectiveness exists but
    hasn't been translated into practical methodology
  - Market opportunity: $50M+ annual revenue potential

  Task: Develop the intellectual property, methodology, and
  go-to-market strategy for the meeting documentation and
  decision management practice.

assertions:
  - type: llm_judge
    criteria: "Response creates the proprietary methodology — methodology development (creates a comprehensive, original framework: the methodology name — a branded name for the framework that's memorable and ownable; the framework should have 4-6 pillars covering the full scope of meeting and decision management; suggested pillars: Meeting Architecture — designing the right meetings for the organization (types, frequency, duration, attendees, format); Documentation Design — creating documentation systems matched to meeting types (templates, tools, quality standards); Decision Intelligence — extracting, tracking, and analyzing decisions across the organization; Action Accountability — ensuring meeting outputs translate into organizational action; Knowledge Capture — converting meeting discussions into durable organizational knowledge; Culture Engineering — shaping meeting culture through norms, training, and measurement; each pillar has: a diagnostic tool (assess the client's current state), a framework (the methodology for improvement), templates and tools (practical deliverables), and metrics (how to measure success); the methodology leverages the firm's 10 years of audit data — identify patterns, benchmarks, and best practices from 200+ engagements; the methodology is original and proprietary — not a repackaging of existing frameworks), maturity model (creates a maturity assessment tool: the Meeting Documentation Maturity Model — a diagnostic that assesses organizations on a 5-level scale across the methodology pillars; level 1 (ad hoc) — no consistent meeting practices, documentation is random; level 2 (developing) — some templates exist, compliance is inconsistent; level 3 (standardized) — consistent practices across the organization; level 4 (managed) — practices are measured, optimized, and governed; level 5 (intelligence-driven) — meeting data drives organizational intelligence and continuous improvement; the maturity model enables: a client diagnostic that takes 2-4 weeks, a clear picture of where the client is and where they need to be, a roadmap for improvement with milestones, and benchmarking against industry peers)."
    weight: 0.35
    description: "ProprietaryMethodology"
  - type: llm_judge
    criteria: "Response creates the practice area business plan — service offerings (designs the consulting practice: tier 1 — assessment and diagnostic ($100-250K): meeting audit of the client organization, maturity model assessment, benchmark against peers, recommendations report; 2-4 week engagement; this is the entry point that leads to larger engagements; tier 2 — transformation program ($500K-2M): full implementation of the methodology across the client organization; meeting reduction, documentation system design, platform implementation, training, and change management; 6-18 month engagement; tier 3 — ongoing advisory ($200-500K/year): retained advisory for continuous improvement, quarterly maturity assessments, and executive coaching on meeting leadership; technology partnerships — partner with meeting technology vendors (AI meeting tools, documentation platforms) to provide implementation alongside methodology; academic partnership — collaborate with a business school to validate the methodology with rigorous research; the academic credibility strengthens the thought leadership position), go-to-market strategy (plans the launch and growth: thought leadership content — publish the methodology through: a flagship research report with data from the 200 engagements; a book authored by the SVP (the 'definitive guide to meeting effectiveness'); Harvard Business Review or similar articles; conference keynotes at management and technology conferences; a proprietary benchmark study published annually; digital presence — a dedicated practice website with: the maturity model self-assessment (lead generation), case studies from early clients, research papers and data, and a content library; revenue projections — year 1: $8-10M from 20-25 diagnostic engagements and 5-8 transformation programs; year 2: $20-25M as the practice matures and repeat clients add advisory retainers; year 3+: $40-50M at scale with a global practice team)."
    weight: 0.35
    description: "BusinessPlan"
  - type: llm_judge
    criteria: "Response addresses competitive positioning and team building — competitive differentiation (positions the practice uniquely: the key differentiator is the combination of: proprietary methodology backed by 10 years of data, a maturity model that enables benchmarking, and practical implementation capability; competitors in adjacent spaces: management consultants (McKinsey, BCG, Bain) — they address meeting culture tangentially but don't have a dedicated practice; technology vendors (Otter.ai, Fireflies) — they sell tools but don't provide organizational transformation; organizational effectiveness consultants — they may address meetings but lack the data, the methodology, and the technology partnerships; the practice occupies white space: the intersection of management consulting, organizational design, and meeting technology; the first-mover advantage in this space is significant — owning the intellectual property and the brand position before competitors), practice team building (builds the consulting team: practice leader — the SVP serves as the thought leader and practice head; senior methodology expert — a senior consultant who co-develops and maintains the methodology; engagement managers — experienced consultants who lead client engagements; analysts — support diagnostics, data analysis, and benchmarking; technology specialists — consultants who evaluate and implement meeting technology; content and marketing — dedicated support for thought leadership content; hiring plan: year 1: 15 consultants; year 2: 30 consultants; year 3: 50 consultants; the practice attracts talent by offering a unique specialization — consultants with expertise in organizational effectiveness, change management, and technology implementation; the practice builds institutional knowledge with every engagement — each client's data improves the benchmarks and enriches the methodology)."
    weight: 0.30
    description: "CompetitiveAndTeam"
