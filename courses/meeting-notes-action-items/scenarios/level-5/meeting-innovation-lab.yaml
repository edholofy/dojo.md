meta:
  id: meeting-innovation-lab
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Meeting innovation lab — design a research and innovation program to develop next-generation meeting documentation and collaboration technologies"
  tags: [innovation, research, technology, future, master]

state: {}

trigger: |
  You're the VP of Innovation at a major enterprise software
  company. Your CEO wants to create a "Meeting Innovation Lab"
  — a dedicated R&D initiative to develop next-generation
  meeting documentation and collaboration technologies:

  "Meetings are a $1.4 trillion annual cost across corporate
  America. Everyone hates them but nobody has fundamentally
  reinvented them. Zoom and Teams digitized the conference
  room but didn't make meetings better. AI transcription is
  a feature, not a revolution. I want us to fundamentally
  rethink how organizations meet, decide, and document.
  This could be the biggest product opportunity of the decade."

  Context:
  - The company has $5B revenue and an existing collaboration
    platform used by 200M professionals
  - $50M allocated for the Innovation Lab over 3 years
  - Access to the company's AI research team (150 researchers)
  - Partnership opportunities with 3 major universities
  - The company's platform generates 500M meetings per year
    across all customers — massive data for research (with
    privacy protections)
  - Competitors (Microsoft, Google, Zoom) are all investing
    in AI meeting features but focusing on transcription and
    summarization — commoditized features
  - The Lab should produce: published research, patents,
    prototype products, and at least one launchable product
    within 3 years

  Market research:
  - $25B TAM for meeting technology (growing 15% annually)
  - Key pain points: meeting overload (67% of workers),
    lost decisions (54%), action item follow-through (49%),
    meeting preparation (45%), cross-cultural communication
    (38%)
  - Emerging technologies: spatial computing, ambient
    intelligence, LLMs, knowledge graphs, real-time
    translation, brain-computer interfaces
  - Enterprise buyers want: measurable productivity gains,
    compliance evidence, decision intelligence, integration
    with existing workflows

  Task: Design the Meeting Innovation Lab strategy, research
  agenda, and product roadmap.

assertions:
  - type: llm_judge
    criteria: "Response creates a visionary research agenda — goes beyond incremental AI meeting features to propose fundamental innovations in how organizations meet, decide, and document; identifies 4-6 research tracks covering different dimensions of the meeting problem; suggested tracks: Decision Intelligence — AI that doesn't just transcribe meetings but understands the decision landscape (what decisions are pending, who has decision rights, what information is needed, historical decision patterns and outcomes); Meeting Architecture AI — systems that can analyze an organization's meeting patterns and recommend structural changes (which meetings to eliminate, combine, or restructure; optimal attendee lists; async vs sync recommendations); Ambient Documentation — documentation that happens automatically without human effort (not just transcription but intelligent capture of decisions, commitments, context, and knowledge); Cross-Cultural Communication Intelligence — AI that bridges cultural communication gaps in global meetings (not just translation but communication style adaptation, consensus detection across cultures, inclusive facilitation); Knowledge Continuity — systems that connect meeting discussions to organizational knowledge (linking current discussions to past decisions, surfacing relevant context, building organizational memory); each research track has a clear thesis, methodology, expected outputs, and timeline."
    weight: 0.35
    description: "ResearchAgenda"
  - type: llm_judge
    criteria: "Response creates a product roadmap and commercialization strategy — translates research into products across 3 horizons: Horizon 1 (Year 1, near-term) — enhanced AI features that go beyond commodity transcription: intelligent meeting summaries that include decision analysis, action item confidence scoring, meeting effectiveness metrics; these are features that can be shipped quickly and differentiate from competitors; Horizon 2 (Years 1-2, medium-term) — new product categories: meeting optimization platform (analyzes organizational meeting patterns and recommends changes), decision intelligence dashboard (tracks decisions across meetings over time), compliance documentation engine (auto-generates regulatory-compliant meeting records); Horizon 3 (Years 2-3, long-term) — breakthrough products: organizational intelligence system (ambient capture + knowledge graph + decision analytics), cross-cultural meeting orchestration; includes IP strategy (patents on novel approaches), competitive positioning (differentiation from Microsoft/Google/Zoom commodity AI features), and revenue projections; leverages the 500M meetings/year data advantage for training models and validation."
    weight: 0.35
    description: "ProductRoadmap"
  - type: llm_judge
    criteria: "Response provides Lab operations and talent strategy — designs the Lab structure: research teams organized by track, led by senior researchers with industry and academic credibility; includes academic partnerships with 3 universities (specify what each partnership contributes: one for AI research, one for organizational behavior, one for human-computer interaction); hiring plan across 3 years (researchers, engineers, designers, product managers); allocates the $50M budget across research tracks, headcount, infrastructure, and partnerships; includes a publication strategy (peer-reviewed papers, conference presentations, industry reports) that establishes thought leadership; defines success metrics for the Lab: patents filed, papers published, prototypes shipped, products launched, revenue generated; addresses the tension between research freedom and commercial outcomes; includes an advisory board with leading academics and industry practitioners; creates a technology transfer process from Lab research to product teams."
    weight: 0.30
    description: "LabOperations"
