meta:
  id: meeting-board-effectiveness
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Board meeting effectiveness — advise a public company board on improving board meeting documentation, decision quality, and governance effectiveness"
  tags: [board, effectiveness, governance, public-company, master]

state: {}

trigger: |
  You've been retained by the Lead Independent Director of
  a publicly traded company ($3B market cap) to improve the
  board's meeting effectiveness. The engagement was triggered
  by a shareholder activist's public letter criticizing the
  board's governance:

  "The board of [Company] meets four times per year for six
  hours. In those 24 hours of annual meeting time, the board
  is responsible for overseeing a $3B enterprise. Yet our
  review of publicly available information suggests:
  - Board meetings are dominated by management presentations
    with little time for genuine director deliberation
  - The board has failed to question management's optimistic
    projections, which have missed targets for 3 consecutive
    years
  - Committee reports appear perfunctory — the Audit Committee
    chair's report in the last proxy takes 4 sentences
  - ESG oversight is absent despite growing investor demand
  - The board's response to the recent cybersecurity incident
    suggests a lack of preparedness and poor information flow"

  Internal assessment reveals additional concerns:
  - Board members receive the board book 2 days before
    meetings — insufficient time for preparation
  - 70% of meeting time is management presentations; 30% is
    discussion
  - Minutes are taken by the CEO's executive assistant and
    not reviewed by the corporate secretary or counsel
  - No pre-meeting or post-meeting director communication
    process exists
  - Board evaluations are self-assessments with no external
    facilitation
  - The activist owns 8% and is threatening a proxy contest

  Task: Create the board meeting effectiveness improvement
  plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive board effectiveness strategy — board meeting redesign (transforms how the board meets: meeting structure — flip the ratio: from 70% presentation / 30% discussion to 30% presentation / 70% deliberation; management presentations should be submitted in writing as pre-reads; meeting time is for questions, debate, and decision-making; the CEO and management team should be prepared for substantive questioning, not just one-way presentations; consent agenda — routine items (minutes approval, standard reports, administrative resolutions) are approved as a block; this saves 30-45 minutes per meeting for substantive discussion; strategic deep dives — each meeting includes a 90-minute strategic deep dive on one critical topic: strategy, risk, talent, technology, or ESG; external perspective — at least one meeting per year includes an external expert presentation on industry trends, competitive landscape, or emerging risks; executive sessions — every meeting includes an executive session (independent directors only) with documented outcomes; this is best practice for governance and addresses the activist's concern about management domination), board information and preparation (fixes the information flow: board book timeline — materials distributed 7 days before meetings (not 2); this is standard governance best practice; board book quality — each management presentation includes: a 1-page executive summary with key decisions needed, a dashboard showing performance vs targets (addressing the 3-year miss), and specific questions for director consideration; pre-meeting director briefings — the board chair or committee chairs hold brief calls with directors before meetings to identify questions and concerns; this ensures the meeting is productive, not reactive; digital board portal — replace email attachments with a secure board portal that provides: organized materials, historical reference, annotation capability, and between-meeting access to relevant information)."
    weight: 0.35
    description: "BoardEffectivenessStrategy"
  - type: llm_judge
    criteria: "Response addresses governance documentation and activist response — governance documentation improvement (professionalizes board documentation: minutes quality — engage a professional corporate secretary or outside counsel to take official minutes; the CEO's EA is not qualified for this role; minutes should demonstrate: director engagement and questioning, substantive deliberation on key issues, appropriate exercise of fiduciary duties; committee documentation — each committee produces a substantive report: the Audit Committee report should document: financial statement review, auditor independence assessment, internal control evaluation, and risk oversight; the 4-sentence committee report in the proxy is a governance failure; it should be 1-2 pages covering the committee's key activities and findings; board evaluation — replace self-assessments with externally facilitated board evaluations; the evaluation assesses: individual director effectiveness, committee effectiveness, overall board effectiveness, information quality, and meeting productivity; results are documented and improvement plans are tracked), activist response through governance (addresses the proxy contest threat: the best response to the activist is demonstrable governance improvement; the improvements described above directly address each criticism: meeting time allocation (flip from presentations to deliberation), management oversight (regular performance vs targets review, substantive questioning), committee reporting (professional, comprehensive reports), ESG oversight (establish ESG oversight responsibilities with a designated committee), cybersecurity preparedness (add a technology and cybersecurity deep dive to the board agenda); the board should proactively communicate these improvements: update governance guidelines and post on the company website; discuss improvements in the proxy statement; the message: 'We take governance seriously and are continuously improving')."
    weight: 0.35
    description: "GovernanceAndActivistResponse"
  - type: llm_judge
    criteria: "Response creates measurement and ongoing improvement — board effectiveness measurement (tracks whether improvements work: meeting effectiveness scores — after each meeting, directors provide a brief assessment: was the agenda appropriate? was the pre-read sufficient? was there adequate time for discussion? were the right decisions made?; decision quality tracking — track board-level decisions: what was decided, the outcome 6-12 months later, and whether the decision was well-informed; if management projections continue to miss for a 4th year, the board's oversight is still inadequate; proxy advisor and investor feedback — ISS and Glass Lewis assessments of governance practices; institutional investor feedback during engagement meetings; activist response — if the activist's concerns are genuinely addressed through improved governance, the proxy contest threat diminishes; the board's improved documentation and meeting practices are the most credible defense against governance criticism), continuous improvement program (sustains board effectiveness: annual governance review — the board reviews its own practices annually: are meeting structures working? is the information flow adequate? are committees effective?; director education — ongoing education on emerging governance topics: AI governance, climate risk, cybersecurity oversight; peer benchmarking — compare governance practices against peer companies and best-practice organizations; the Lead Independent Director owns the board effectiveness program and reports annually to shareholders through the proxy statement; the board effectiveness program creates a virtuous cycle: better meetings produce better documentation, which demonstrates better governance, which builds shareholder confidence, which reduces activist risk)."
    weight: 0.30
    description: "MeasurementAndImprovement"
