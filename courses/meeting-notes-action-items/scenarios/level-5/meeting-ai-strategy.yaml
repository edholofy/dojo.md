meta:
  id: meeting-ai-strategy
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Meeting AI strategy — design an enterprise AI meeting documentation strategy including tool selection, governance, integration, and organizational change management"
  tags: [ai, strategy, enterprise, governance, master]

state: {}

trigger: |
  You're the CTO of a 5,000-person enterprise software company.
  The CEO wants to implement AI-powered meeting documentation
  across the entire organization:

  "AI meeting tools could save us millions in documentation
  overhead and improve decision quality. But I've seen horror
  stories — privacy violations, inaccurate transcriptions
  creating legal liability, employees feeling surveilled.
  I need a strategy that captures the benefits while managing
  the risks."

  Current state:
  - 50,000+ meetings per week company-wide
  - Meeting documentation rate: ~20%
  - Estimated cost of manual documentation: $8M/year in
    employee time
  - 12% of documented action items are inaccurate due to
    human note-taking errors
  - Teams in 15 countries with different privacy laws
  - The company handles sensitive client data (healthcare,
    financial services clients)
  - Employee works council in Germany has concerns about
    surveillance
  - Legal department is cautious about AI-generated records
    being discoverable
  - Multiple teams are already using unauthorized AI tools

  Requirements:
  - Reduce documentation cost by 60%
  - Achieve 80% documentation rate (from 20%)
  - Maintain compliance with privacy laws in 15 countries
  - Integrate with existing tools (Zoom, Teams, Slack, Jira)
  - Handle multiple languages (8 primary)
  - Provide analytics and insights

  Task: Create the enterprise AI meeting strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates the strategic framework — AI meeting tool evaluation and selection (evaluates options rigorously: evaluation criteria — data privacy and security: where is data stored? is it encrypted? does the vendor train models on customer data?; multi-language support: quality of transcription across 8 languages; integration capability: Zoom, Teams, Slack, Jira, and existing documentation platforms; accuracy: transcription accuracy by language, speaker identification, action item extraction reliability; compliance: GDPR, HIPAA considerations (healthcare clients), financial services regulations; enterprise features: admin controls, role-based access, audit trails, data retention management; vendor shortlist — evaluate 3-4 enterprise AI meeting platforms; consider: build vs buy for core capabilities; the selection process includes: POC with representative meeting types, security review by CISO, legal review by General Counsel, works council consultation in Germany, accuracy testing across all 8 languages), risk assessment and mitigation (maps all risks: privacy risk — AI tools recording sensitive conversations: healthcare client data, financial services information, employee personal discussions; mitigation: meeting classification system that prohibits AI in sensitive meetings, data handling agreements with vendors, encryption and access controls; legal risk — AI-generated transcripts and summaries as discoverable documents; mitigation: clear policy on what constitutes official records vs AI drafts, legal review of AI output quality, disclaimers on AI-generated documents; accuracy risk — AI misattributing statements, missing key points, or creating inaccurate action items; mitigation: human review workflow for important meetings, accuracy benchmarking, and continuous monitoring; surveillance perception risk — employees feeling monitored; mitigation: transparent communication, opt-out mechanisms for non-regulated meetings, works council agreement in Germany, union consultation where applicable)."
    weight: 0.35
    description: "StrategicFramework"
  - type: llm_judge
    criteria: "Response designs the implementation architecture — technical architecture (designs the system integration: the AI meeting tool integrates with the existing technology stack: calendar integration (Outlook/Google Calendar) — automatically identifies meetings and their classification; video platform integration (Zoom/Teams) — seamless recording and transcription; documentation platform integration — AI-generated notes flow into the existing documentation system; action item integration (Jira/Asana) — extracted action items are automatically created as tasks; the architecture supports: meeting classification-based automation (some meetings get full AI documentation, some get transcription only, some are excluded); multi-language processing with language detection; real-time transcription for synchronous meetings and async processing for recorded meetings), AI output quality management (ensures the AI produces reliable documentation: human-in-the-loop workflow — AI generates a draft; a human reviewer verifies and approves before distribution; the review effort should be 5-10 minutes per meeting, not 30 minutes; for routine meetings, the human review can be optional; for regulated or client meetings, human review is mandatory; accuracy metrics — track AI transcription accuracy by: language (expect variance across 8 languages), meeting type (technical discussions vs general meetings), number of speakers, audio quality; continuous improvement: feed corrections back to improve the system; output standards — AI-generated meeting documentation follows the same templates and quality standards as human-generated documentation; AI output is labeled as AI-generated with a reviewer's name)."
    weight: 0.35
    description: "ImplementationArchitecture"
  - type: llm_judge
    criteria: "Response addresses organizational change and ROI — organizational change management (manages the human transition: employee communication — explain: what the AI tool does and doesn't do, why it's being implemented, how employee privacy is protected, how to opt out for specific meetings; address the surveillance concern directly: 'This tool creates meeting documentation, not employee surveillance. It captures decisions and action items so you don't have to.'; the works council in Germany must be engaged early — their approval may be legally required; roll out in phases: start with voluntary adoption in supportive teams, then expand based on success stories; training — train all employees on: how the AI tool works, how to review AI-generated notes, how to correct errors, when AI documentation is and isn't appropriate), ROI and business case (quantifies the investment value: current cost of manual documentation: $8M/year; AI solution cost: platform + implementation + training + 1 FTE manager; projected savings: 60% reduction in documentation cost ($4.8M saved); additional value: documentation rate from 20% to 80% — capturing decisions and knowledge from 4x more meetings; reduced action item errors from 12% to under 5%; analytics insights enabling better meeting management; total projected ROI: payback within 12-18 months; risk-adjusted ROI accounts for: implementation delays, lower-than-expected accuracy in some languages, and adoption challenges; the CEO presentation should frame this as: 'We're investing $X to save $Y annually, improve documentation compliance from 20% to 80%, and create a meeting intelligence capability that the company has never had')."
    weight: 0.30
    description: "ChangeManagementAndROI"
