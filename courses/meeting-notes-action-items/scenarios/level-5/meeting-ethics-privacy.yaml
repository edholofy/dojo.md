meta:
  id: meeting-ethics-privacy
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Meeting documentation ethics and privacy — navigate the complex ethical and privacy challenges of meeting documentation in an era of AI, surveillance concerns, and global privacy regulations"
  tags: [ethics, privacy, surveillance, gdpr, master]

state: {}

trigger: |
  You're the Chief Privacy Officer at a global technology
  company (10,000 employees, 20 countries). Several ethical
  and privacy crises related to meeting documentation have
  converged:

  1. Employee Surveillance Concerns: The company deployed
     an AI meeting tool that analyzes speaking patterns,
     participation levels, and sentiment. Engineering
     managers used the data to evaluate employee engagement.
     The works council in Germany is threatening legal action,
     and employees across the company feel surveilled.

  2. GDPR Right to Erasure: A former employee in France has
     exercised their right to erasure under GDPR. They want
     all meeting recordings, transcripts, and notes that
     contain their personal data deleted. But many of those
     meetings also contain business decisions that the
     company needs to retain.

  3. Whistleblower Identity Exposure: An AI meeting tool
     identified the likely author of an anonymous
     whistleblower report by analyzing writing patterns
     across meeting notes and the whistleblower submission.
     A manager used this to retaliate against the employee.

  4. Client Data in Meeting Notes: A healthcare client
     discovered that their patient data was discussed in
     internal meetings and the meeting transcripts were
     processed by a third-party AI tool — a potential HIPAA
     violation.

  5. Bias in AI Meeting Analysis: The AI meeting tool's
     sentiment analysis consistently rates non-native English
     speakers as "less confident" and flags their meetings
     as "less productive" — creating discriminatory
     performance data.

  The CEO says: "Fix all of this. And give me a framework
  that prevents these kinds of ethical failures going forward."

  Task: Create the meeting documentation ethics and privacy
  framework.

assertions:
  - type: llm_judge
    criteria: "Response addresses each crisis with appropriate remediation — crisis remediation (handles each situation: employee surveillance — immediately stop using AI engagement analytics for performance evaluation; this crosses the line from documentation to surveillance; acknowledge the overreach publicly to employees; negotiate with the German works council to establish acceptable AI meeting tool usage; GDPR right to erasure — separate the individual's personal data from business records: remove their name and personal identifiers from meeting notes while retaining the business decisions and action items in anonymized form; delete meeting recordings and transcripts where the individual is identifiable; this is technically complex and requires legal guidance; whistleblower exposure — this is the most serious crisis: the manager who retaliated must face consequences; the AI capability that enabled identification must be disabled; the whistleblower must be protected and their identity re-secured; an independent investigation into whether the AI tool vendor was aware this use case was possible; HIPAA violation — assess the scope: what patient data was discussed? was it necessary? was the AI vendor HIPAA-compliant? notify the healthcare client and the relevant authorities as required; implement a 'no PHI in meeting discussions' policy or ensure AI tools are HIPAA-compliant; AI bias — immediately stop using sentiment analysis for performance decisions; audit the AI tool's analysis across different demographics: native vs non-native speakers, different genders, different accents; demand the vendor address the bias or replace the tool)."
    weight: 0.35
    description: "CrisisRemediation"
  - type: llm_judge
    criteria: "Response creates the ethics and privacy framework — ethical principles for meeting documentation (establishes foundational principles: principle 1 — documentation, not surveillance: meeting documentation exists to capture decisions, actions, and knowledge; it does not exist to monitor employee behavior, engagement, or sentiment; any analysis of meeting data for performance evaluation requires explicit disclosure and consent; principle 2 — transparency: employees must know what meeting data is collected, how it's used, who can access it, and how long it's retained; no hidden analysis; no secret monitoring; principle 3 — proportionality: the data collected should be proportional to the legitimate business need; full transcription isn't needed for every meeting; sentiment analysis serves no documentation purpose; principle 4 — human dignity: meeting documentation practices must respect individuals' dignity, privacy, and psychological safety; people should not fear being quoted, recorded, or analyzed in routine business meetings; principle 5 — equity: meeting documentation and analysis tools must not create discriminatory outcomes; AI tools that disadvantage non-native speakers, introverts, or any demographic group violate this principle), privacy governance framework (creates operational privacy controls: data classification for meeting data: Level 1 — metadata only (date, attendees, duration): lowest privacy risk, broadest access; Level 2 — structured notes (decisions, action items): moderate privacy risk, standard access controls; Level 3 — full transcripts and recordings: highest privacy risk, restricted access and retention; Level 4 — analytics and behavioral data: prohibited without explicit consent and legitimate business purpose; the governance framework specifies: which meeting types can be recorded and transcribed, who can access different levels of meeting data, how long each data type is retained, how data subject access requests are handled, and the approval process for any new use of meeting data)."
    weight: 0.35
    description: "EthicsAndPrivacyFramework"
  - type: llm_judge
    criteria: "Response addresses vendor management and organizational accountability — vendor and AI governance (creates controls for AI meeting tool vendors: vendor requirements — any AI meeting tool used by the company must: disclose how meeting data is processed and stored; confirm that meeting data is not used to train models without explicit consent; demonstrate bias testing results across demographics; support data deletion and data subject access requests; provide transparent AI decision-making (explain how sentiment, confidence, and productivity scores are calculated); vendor audit — annual audit of AI meeting tool vendors for: data handling practices, bias in analysis, compliance with privacy regulations, security practices; the whistleblower identification capability should have been caught during vendor evaluation — the evaluation process must include: red-team testing for misuse scenarios, ethics review of AI capabilities, and a 'could this be used for harm?' assessment), organizational accountability (creates consequences and oversight: ethics review board — a standing committee that reviews meeting documentation practices for ethical compliance; the board includes: CPO, General Counsel, HR Director, employee representative, and an external ethics advisor; privacy impact assessments — any new meeting technology or practice requires a privacy impact assessment before deployment; the PIA evaluates: data collected, purpose, proportionality, risks to individuals, mitigation measures; incident response — when a meeting documentation ethics breach occurs (like the whistleblower exposure or the bias issue), a formal incident response process: investigation, remediation, accountability, systemic fix, and communication; training — all employees receive annual training on meeting documentation ethics; managers receive additional training on the line between documentation and surveillance; the framework is reviewed annually and updated based on: regulatory changes, technology evolution, and lessons from incidents; the company's meeting documentation ethics become a competitive advantage — clients and employees trust a company that takes these issues seriously)."
    weight: 0.30
    description: "VendorAndAccountability"
