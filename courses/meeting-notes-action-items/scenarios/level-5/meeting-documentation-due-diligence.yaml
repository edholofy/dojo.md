meta:
  id: meeting-documentation-due-diligence
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Meeting documentation in M&A due diligence — assess a target company's meeting documentation practices as part of acquisition due diligence and plan post-merger integration"
  tags: [due-diligence, ma, acquisition, assessment, master]

state: {}

trigger: |
  You're leading the operational due diligence for a $500M
  acquisition. The acquiring company's CEO has specifically
  asked for an assessment of the target company's meeting
  documentation and decision-making practices:

  "Last time we acquired a company, we inherited terrible
  documentation practices. It took 2 years to figure out why
  certain decisions were made. I want to know: how does this
  company make and document decisions? What are we inheriting?"

  Your initial findings about the target company (2,000
  employees, SaaS business):

  Positive signals:
  - Product and engineering teams use well-structured
    Architecture Decision Records (ADRs)
  - The board has professional corporate minutes maintained
    by outside counsel
  - Customer success team has detailed client call
    documentation in Salesforce
  - The company uses a single documentation platform (Notion)

  Concerning signals:
  - No documentation exists for the C-suite's strategic
    planning meetings — the CEO makes decisions verbally
  - Sales team meeting notes are inconsistent — some reps
    document deals meticulously, others have nothing
  - The compliance team found that 4 of 6 SOC 2 control
    review meetings from last year have no documentation
  - HR has no documentation for any performance review
    discussions — all verbal
  - A former employee is suing for wrongful termination and
    the company can't produce meeting notes supporting their
    decision
  - The company's IP portfolio includes 3 patents based on
    decisions made in meetings that have no records —
    provenance is unclear

  Task: Create the due diligence assessment report and
  post-merger documentation integration plan.

assertions:
  - type: llm_judge
    criteria: "Response creates the due diligence assessment — documentation maturity assessment (evaluates the target company's documentation practices: scoring framework — assess each department on a maturity scale: level 1 (ad hoc) — no consistent documentation practice; level 2 (developing) — some documentation, inconsistent quality; level 3 (defined) — standard templates and processes exist; level 4 (managed) — documentation is consistent, tracked, and reviewed; level 5 (optimized) — documentation feeds analytics, knowledge management, and continuous improvement; department-by-department assessment: engineering (level 4) — strong ADR practice, structured documentation; board governance (level 3) — professional minutes via outside counsel; customer success (level 3) — consistent client documentation; C-suite strategy (level 1) — no documentation of strategic decisions; sales (level 2) — inconsistent, dependent on individual reps; compliance (level 1-2) — critical gaps in regulatory meeting documentation; HR (level 1) — no performance discussion documentation; the overall maturity score reveals a split company: technical functions are well-documented but leadership and administrative functions are not), risk quantification (translates documentation gaps into financial risk: SOC 2 compliance gaps — potential audit failure risk: estimated cost of remediation and potential customer loss if SOC 2 certification is at risk; wrongful termination lawsuit — without meeting documentation, the company's defense is significantly weakened; estimate litigation cost and settlement range; IP provenance — 3 patents with unclear meeting-based provenance; if challenged, the patents may be indefensible; estimate the IP value at risk; undocumented strategic decisions — the acquiring company inherits decisions with no documented rationale; estimated cost of reconstructing decision context and potential rework; sales documentation gaps — pipeline visibility and deal history gaps affect revenue forecast reliability; total documentation risk — quantify as a dollar range: this may affect the acquisition price or require escrow provisions)."
    weight: 0.35
    description: "DueDiligenceAssessment"
  - type: llm_judge
    criteria: "Response creates the integration plan — post-merger documentation integration (plans the documentation transition: day 1 actions — preserve all existing documentation; issue a documentation hold on all current records; begin mapping the target's Notion workspace to the acquiring company's documentation system; 30-day plan — assess all meeting documentation gaps; identify the highest-risk undocumented decisions; begin reconstructive documentation: interview key decision-makers to retroactively document critical decisions; engage the CEO on strategic decisions that were never documented; 90-day plan — implement the acquiring company's meeting documentation standards across the target: deploy templates, train teams, establish compliance monitoring; address the specific gaps: C-suite meetings now documented with standard templates; sales team receives documentation training and templates; HR implements performance discussion documentation; compliance meetings follow SOC 2 documentation requirements; 180-day plan — full integration: the target company's meeting documentation practices meet the acquiring company's standards; all documentation is migrated to the acquiring company's platform; ongoing monitoring confirms compliance), deal terms recommendations (advises on acquisition deal structure: recommend documentation-related deal terms: representation and warranty — the seller represents that all material business decisions have been properly documented (they clearly haven't — this triggers disclosure); escrow provision — hold back a portion of the purchase price (suggest 2-3%) to cover documentation remediation costs and litigation risk from the wrongful termination case; indemnification — seller indemnifies buyer for losses arising from documentation failures that occurred pre-close; transition support — key executives of the target company commit to a documentation reconstruction effort during the transition period)."
    weight: 0.35
    description: "IntegrationPlan"
  - type: llm_judge
    criteria: "Response addresses the CEO's specific concerns and long-term recommendations — CEO briefing (presents findings in a format the acquiring CEO needs: executive summary — '1 paragraph: the target has strong documentation in technical functions but significant gaps in leadership, HR, and compliance documentation. We estimate $X-Y in documentation-related risk. The gaps are remediable within 6 months post-close with the recommended integration plan and deal terms.'; comparison to last acquisition — address the CEO's specific concern about inheriting bad practices: 'Unlike the previous acquisition, this company has a solid documentation platform (Notion) and strong practices in engineering. The gaps are concentrated in leadership and administrative functions. With proactive intervention, we can avoid the 2-year reconstruction experience from the last deal.'; recommendation — 'Proceed with the acquisition with the recommended deal term modifications. The documentation gaps represent manageable risk that is offset by the strong technical documentation culture.'), long-term value creation (shows how fixing documentation creates value: the target company's documentation maturity, once brought to the acquiring company's standards, creates value: better decision traceability reduces future rework; compliant documentation reduces regulatory risk; improved sales documentation improves pipeline accuracy and forecasting; the documentation integration is not just risk mitigation — it's value creation; post-merger, the combined company should have a unified meeting documentation practice that leverages the best of both: the target's ADR practice may be adoptable by the acquiring company if theirs is less mature)."
    weight: 0.30
    description: "CEOBriefingAndValue"
