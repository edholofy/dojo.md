meta:
  id: global-meeting-standardization
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Global meeting standardization — create meeting documentation standards that work across 30+ countries with different languages, cultures, legal systems, and regulatory requirements"
  tags: [global, standardization, multilingual, regulatory, master]

state: {}

trigger: |
  You're the Global Head of Operations for a multinational
  corporation (15,000 employees, 35 countries, 12 languages).
  The board has mandated global meeting documentation
  standards after a series of cross-border failures:

  1. A €5M contract dispute in Germany was lost because the
     German team's meeting notes were informal and didn't
     meet German commercial documentation requirements.

  2. A joint venture negotiation in Japan collapsed because
     the American team's aggressive meeting notes were shared
     with the Japanese partners, damaging trust.

  3. A regulatory audit in Singapore failed because meeting
     records were in English but the regulator required
     documentation in Mandarin for certain proceedings.

  4. An employment lawsuit in Brazil was complicated because
     meeting notes from a termination discussion were taken
     in Portuguese but the legal team in New York couldn't
     assess them.

  5. A merger integration in India stalled because the
     acquired company's meeting culture was fundamentally
     different — oral tradition vs written documentation.

  Current state:
  - 5 different documentation platforms across regions
  - No common template or format
  - Translation happens ad-hoc and inconsistently
  - Legal requirements vary dramatically by country
  - Some cultures don't document meetings at all

  Task: Create the global meeting documentation framework.

assertions:
  - type: llm_judge
    criteria: "Response creates the global framework architecture — tiered global standards (designs a framework that balances global consistency with local adaptation: global mandatory standards — apply everywhere regardless of country: every significant meeting must be documented; documentation must include: date, attendees, decisions, and action items; regulated meetings follow the strictest applicable standard; meeting notes must be stored in the designated platform; retention periods meet the longest applicable requirement; regional adaptation layer — country-specific requirements: language requirements per jurisdiction (Mandarin for Singapore regulatory, Portuguese for Brazilian employment law); cultural adaptation of tone and formality; local regulatory compliance requirements; country-specific data privacy rules for meeting recordings; local customization — market-specific practices: meeting format preferences, communication norms, document storage requirements; the framework is explicitly not one-size-fits-all: the same meeting type may be documented differently in Germany (formal, legally precise) and in the US (concise, action-oriented)), language and translation strategy (addresses the multilingual challenge: documentation language policy — internal company meetings: documented in the language of the majority of participants, with an English summary for cross-border visibility; regulatory meetings: documented in the locally required language; client meetings: documented in the language of the client relationship; translation protocol — for cross-border situations: critical decisions and action items are translated into English for global visibility; full translation is triggered by: cross-border relevance, legal proceedings, or regulatory requirements; translation quality: legal and regulatory translations use professional legal translators, not machine translation; AI translation for routine documents, with human review for sensitive content; template localization: meeting templates are available in all 12 company languages with consistent structure)."
    weight: 0.35
    description: "GlobalFramework"
  - type: llm_judge
    criteria: "Response addresses cultural adaptation and legal compliance — cultural meeting documentation guidelines (prevents cross-cultural documentation failures: high-context cultures (Japan, China, Middle East): documentation should be formal and respectful; decisions should be recorded as group consensus, not attributed to individuals unless requested; indirect communication should be interpreted carefully — 'we will consider this' may mean 'no'; sharing raw meeting notes with external parties requires cultural review; low-context cultures (US, Germany, Netherlands): documentation can be more direct and action-oriented; individual attribution is expected; direct language is appropriate; formal documentation cultures (Germany, Japan, Singapore): meeting minutes may have legal weight; precision in language is critical; casual notes are insufficient for legal purposes; oral tradition cultures (parts of India, Middle East, Latin America): the transition to written documentation requires sensitivity; start with simple templates and build complexity; emphasize the benefits of documentation without implying that oral traditions are inferior), country-specific legal compliance (addresses the specific legal incidents: Germany — meet German commercial documentation standards for contract-related discussions; this may require structured protocols, not informal notes; Japan — cultural review before sharing any documentation with Japanese partners; avoid aggressive or confrontational language; emphasize harmony and mutual benefit; Singapore — maintain bilingual documentation for regulatory proceedings; ensure Mandarin documentation meets regulatory format requirements; Brazil — employment-related meeting documentation must be maintained in Portuguese; legal review of termination-related notes before any HR action; India — the acquired company needs a gradual transition program: introduce documentation practices that respect oral traditions while building written discipline; the legal compliance requirements are compiled into a country-by-country reference guide updated annually)."
    weight: 0.35
    description: "CulturalAndLegal"
  - type: llm_judge
    criteria: "Response creates the operational infrastructure — platform and governance (implements the global system: platform consolidation — migrate from 5 regional platforms to a single global platform with: multi-language support, country-specific templates, role-based access, regulatory compliance features; the platform must support: simultaneous documentation in multiple languages, automated translation for summaries, compliance tracking by jurisdiction, and global search across all languages; governance structure — global meeting documentation officer overseeing the program; regional documentation leads (one per major region) responsible for local compliance and cultural adaptation; country champions for the largest markets; the governance council meets quarterly to review compliance, update standards, and address emerging issues; training — a global training program delivered in all 12 languages: the core curriculum covers the global standards; regional modules cover country-specific requirements; cultural modules address cross-cultural documentation best practices; the training addresses the specific failures: how to document for legal defensibility, how to handle cross-cultural documentation sharing, and how to meet regulatory language requirements), measurement and continuous improvement (tracks global compliance: compliance dashboard by country — documentation rates, regulatory compliance, quality scores; risk tracking — countries or regions with low compliance are flagged for intervention; annual audit — a sample of meeting documentation from each country is audited for quality, compliance, and cultural appropriateness; continuous improvement — the framework evolves as: new countries are entered, regulations change, cultural understanding deepens, and technology improves; the global framework is a living system that improves with experience, not a static document imposed from headquarters)."
    weight: 0.30
    description: "OperationalInfrastructure"
