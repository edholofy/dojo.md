meta:
  id: meeting-cultural-transformation
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Meeting cultural transformation — lead a fundamental transformation of organizational meeting culture across a global enterprise, addressing deep-rooted behavioral patterns and creating a new operating model"
  tags: [culture, transformation, global, behavioral, master]

state: {}

trigger: |
  You're the Global Head of Organizational Effectiveness at
  a multinational corporation (60,000 employees across 40
  countries). The CEO has declared "Meeting Culture
  Transformation" as one of the company's top 5 strategic
  priorities for the year, alongside revenue growth and
  digital transformation:

  "Our meeting culture is killing us. We've calculated that
  we spend $1.2 billion annually on meeting time. Our best
  engineers spend 60% of their time in meetings instead of
  building. Our executives can't think strategically because
  they're back-to-back from 7 AM to 6 PM. Meanwhile, our
  competitors are moving faster because they've figured out
  how to make decisions without assembling 15 people in a
  room. This isn't an HR initiative — this is a business
  survival issue."

  Global complexity:
  - 40 countries with different work cultures (Japan's
    consensus-driven meetings vs Silicon Valley's async-first
    culture vs Germany's structured formality vs Brazil's
    relationship-oriented meetings)
  - 12 time zones making synchronous meetings inherently
    exclusionary
  - 8 languages with translation requirements
  - Unionized workforces in 15 countries with negotiation
    requirements for any work practice changes
  - Post-merger integration: the company acquired a major
    competitor 18 months ago and the two cultures haven't
    merged — they have completely different meeting practices
  - Regulatory requirements in financial services, healthcare,
    and defense divisions requiring documented meetings

  Current state:
  - Average of 62 hours of meetings per manager per week
  - 47% of all-hands meetings are rated "not valuable" by
    employees
  - Decision velocity: average of 23 days from issue
    identification to documented decision
  - Meeting documentation exists for only 31% of meetings
  - The company has already tried and failed twice with
    "meeting reduction" initiatives (2021 and 2023)

  Budget: $15M over 3 years
  Board-mandated targets:
  - 40% reduction in total meeting hours by Year 2
  - Decision velocity improvement to under 10 days by Year 3
  - 80% meeting documentation compliance by Year 2
  - Employee meeting satisfaction score from 2.8/5 to 4.0/5

  Task: Design the global meeting cultural transformation
  strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive global transformation strategy — addresses the scale and complexity of transforming meeting culture across 60,000 employees in 40 countries; designs a multi-year phased program that avoids the mistakes of the two previous failed initiatives (analyzes why they likely failed — top-down mandates without cultural adaptation, no measurement, no sustained attention); creates a framework that adapts to different cultural contexts (Japanese consensus meetings need different optimization than Silicon Valley async workflows); addresses the post-merger culture clash as both a challenge and an opportunity; includes a global operating model for meetings (types, cadences, decision rights, documentation standards) while allowing regional adaptation; addresses the 12-timezone challenge with async-first default and synchronous meetings as the exception requiring justification; proposes technology investments, process changes, and behavioral interventions."
    weight: 0.35
    description: "GlobalTransformationStrategy"
  - type: llm_judge
    criteria: "Response addresses decision velocity and documentation at scale — tackles the 23-day decision velocity with a decision rights framework (RACI/RAPID or similar), decision documentation standards, and escalation paths; creates meeting documentation standards that scale across 8 languages and multiple regulatory environments (financial services, healthcare, defense each have specific documentation requirements); addresses the 31% documentation rate with a realistic path to 80% compliance using technology (AI transcription, templated documentation, automated capture) and culture (documentation as a professional norm, not overhead); designs a decision intelligence system that tracks decision patterns, identifies bottlenecks, and provides leadership with visibility into organizational decision-making effectiveness."
    weight: 0.35
    description: "DecisionVelocityAndDocumentation"
  - type: llm_judge
    criteria: "Response provides governance, measurement, and sustainability — creates a governance structure for the transformation (global program office, regional transformation leads, executive sponsorship model); includes a detailed measurement framework tracking all board-mandated targets (40% meeting reduction, decision velocity under 10 days, 80% documentation compliance, 4.0/5 satisfaction); addresses union negotiation requirements in 15 countries as part of implementation planning; includes a change management approach that addresses the cynicism from two failed initiatives; provides a $15M budget allocation across 3 years with clear investment categories (technology, consulting, training, change management); addresses sustainability (how to prevent meeting creep from returning — permanent governance, ongoing measurement, cultural embedding); includes executive behavior change as a critical success factor (the CEO's calendar must change visibly to signal cultural permission)."
    weight: 0.30
    description: "GovernanceAndSustainability"
