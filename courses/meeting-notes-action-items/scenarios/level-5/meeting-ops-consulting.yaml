meta:
  id: meeting-ops-consulting
  level: 5
  course: meeting-notes-action-items
  type: output
  description: "Meeting operations consulting — advise a Fortune 500 company on transforming their meeting culture and documentation practices as an external consultant"
  tags: [consulting, fortune500, transformation, operations, master]

state: {}

trigger: |
  You've been engaged as a management consultant by a Fortune
  500 financial services company (25,000 employees, 40
  countries) to transform their meeting culture. The board
  has mandated change after an internal audit revealed:

  - Employees average 31 meetings per week (62% of work time)
  - Meeting documentation exists for only 15% of meetings
  - The company estimates $150M annually in meeting-related
    productivity loss
  - 3 regulatory violations in the past year were traced to
    missing meeting documentation
  - A major acquisition failed during integration because
    critical decisions from planning meetings were never
    documented — causing 18 months of rework
  - Employee engagement scores cite "meeting overload" as
    the #2 concern after compensation
  - The company uses 8 different documentation tools across
    regions and divisions

  The CEO's mandate: "Cut meeting time by 40%, ensure 100%
  documentation compliance for regulated meetings, and
  create a meeting culture that makes us more productive, not
  less. You have $5M and 18 months."

  Task: Deliver the comprehensive meeting transformation
  strategy.

assertions:
  - type: llm_judge
    criteria: "Response delivers a consulting-grade transformation strategy — current state assessment (provides a rigorous analysis: the $150M productivity loss is quantified: 25,000 employees × 31 meetings/week × average meeting cost; the ROI of the transformation is clear: a 40% reduction in meeting time represents $60M+ in recovered productivity annually; the $5M investment has a clear payback period; the 15% documentation rate is a regulatory and operational risk: 85% of meetings produce no institutional record; the 3 regulatory violations quantify the cost of non-compliance; the failed acquisition quantifies the cost of knowledge loss; the 8-tool fragmentation quantifies the governance challenge; the assessment is data-driven and compelling enough for a board presentation), transformation architecture (designs the program structure: workstream 1 — meeting reduction: analyze all recurring meetings across the organization; eliminate redundant meetings, convert status meetings to async, reduce meeting duration; target: 31 → 18 meetings/week average; workstream 2 — documentation compliance: implement a meeting classification system tied to documentation requirements; achieve 100% compliance for regulated meetings within 12 months; workstream 3 — platform consolidation: migrate from 8 tools to 1-2 enterprise platforms; select and implement a unified meeting documentation platform with regulatory compliance features; workstream 4 — culture change: training, incentives, and accountability to sustain the new meeting culture; each workstream has a leader, timeline, budget allocation, and success metrics)."
    weight: 0.35
    description: "TransformationStrategy"
  - type: llm_judge
    criteria: "Response creates the implementation roadmap — phased implementation (plans 18 months of execution: phase 1 — assessment and design (months 1-3, $500K): comprehensive meeting audit across all divisions and regions; design the target meeting framework: which meetings stay, which go async, which are eliminated; select the documentation platform; design the compliance framework; phase 2 — pilot (months 4-6, $1M): implement the transformation in 2 pilot divisions (one regulated, one non-regulated); test meeting reduction targets, documentation compliance, and platform adoption; gather data on what works and what needs adjustment; phase 3 — global rollout (months 7-15, $2.5M): systematic rollout across all 40 countries and all divisions; region-by-region deployment with local customization for regulatory and cultural requirements; training programs delivered in all major languages; phase 4 — optimization (months 16-18, $1M): measure results against targets; optimize based on data; hand off to internal team for ongoing management; each phase has clear deliverables, budget, and go/no-go criteria), change management (addresses the human side: executive sponsorship — the CEO must visibly champion the transformation; executive meeting behavior sets the tone for the entire organization; manager training — every people manager receives training on effective meeting management and documentation responsibilities; resistance management — identify departments likely to resist and design specific interventions; the engineering team may resist documentation requirements; the compliance team may resist meeting reduction; each resistance vector has a tailored approach)."
    weight: 0.35
    description: "ImplementationRoadmap"
  - type: llm_judge
    criteria: "Response addresses measurement, sustainability, and consulting deliverables — measurement framework (tracks transformation success: primary metrics — average meetings per employee per week (target: from 31 to 18); documentation compliance for regulated meetings (target: from 15% to 100%); documentation rate for all meetings (target: from 15% to 70%); employee satisfaction with meeting culture (target: top 2 concern to below top 5); regulatory violations from documentation gaps (target: zero); secondary metrics — meeting effectiveness scores, action item completion rates, knowledge retrieval success, platform adoption rates; the metrics are measured monthly during implementation and quarterly afterward; executive dashboard shows progress in real-time), sustainability and handoff (ensures the transformation lasts: internal capability — train an internal Meeting Operations team to own the program after the consulting engagement ends; the team is responsible for: platform management, compliance monitoring, training, and continuous improvement; governance framework — a standing Meeting Governance committee that reviews metrics quarterly and adjusts policies; the committee includes representatives from each division and compliance; technology sustainability — the platform vendor relationship, update schedule, and support structure are documented; the platform contract includes SLAs for uptime, data retention, and regulatory compliance; consulting deliverables — the engagement produces: meeting transformation playbook (reusable for future organizational changes), compliance framework documentation, platform implementation guide, training materials, and measurement dashboard; the deliverables ensure the company can sustain and evolve the transformation independently)."
    weight: 0.30
    description: "MeasurementAndSustainability"
