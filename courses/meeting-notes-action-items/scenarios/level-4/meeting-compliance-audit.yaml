meta:
  id: meeting-compliance-audit
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Meeting compliance audit — design and execute a comprehensive audit of meeting documentation practices across a regulated enterprise to ensure compliance with industry requirements"
  tags: [compliance, audit, regulated, enterprise, standards]

state: {}

trigger: |
  You're the Director of Compliance at a healthcare technology
  company (3,000 employees) that processes protected health
  information (PHI) and is subject to HIPAA, SOC 2, and FDA
  regulations. Your annual compliance audit revealed
  significant meeting documentation deficiencies:

  Audit Findings:
  1. HIPAA Concern: 23% of clinical team meetings that
     discuss patient data have no documentation showing that
     minimum necessary standards were applied — meaning there's
     no record that only necessary PHI was shared.

  2. SOC 2 Gap: 4 of 12 required security review meetings
     have no documentation. The auditor noted: "Without
     meeting records, we cannot verify that security reviews
     were conducted as required by your SOC 2 control
     framework."

  3. FDA Requirement: The company's medical device software
     is subject to FDA design control requirements. 6 design
     review meetings have incomplete documentation — missing
     attendee signatures, no documented design inputs/outputs,
     and no evidence of risk analysis discussion.

  4. Board Governance: The audit committee met 3 times last
     year (requirement is quarterly = 4 times). The 3 meetings
     that occurred have minutes, but the minutes don't
     document the specific financial statements reviewed or
     auditor independence assessments discussed.

  5. Whistleblower: An anonymous report claims that managers
     in the product team deliberately avoid documenting
     meetings where product safety concerns are raised, to
     prevent creating a regulatory record.

  6. Data Retention: Meeting recordings from 2022 were
     auto-deleted by the video platform after 12 months.
     Some of those recordings are now needed for an ongoing
     FDA investigation.

  Current state:
  - No company-wide meeting documentation policy
  - Each team uses their own approach (Notion, Google Docs,
    email summaries, or nothing)
  - No training on regulatory requirements for meeting docs
  - No review or quality assurance of meeting documentation
  - The compliance team has no visibility into meeting
    documentation practices

  The CEO says: "Fix this before our next SOC 2 audit in
  6 months and our FDA inspection in 9 months."

  Task: Design the meeting compliance audit remediation plan
  and ongoing compliance framework.

assertions:
  - type: llm_judge
    criteria: "Response addresses each audit finding with specific remediation — provides concrete fixes for each of the 6 findings: HIPAA minimum necessary documentation (template with PHI access justification), SOC 2 security review gaps (retroactive documentation where possible, prospective controls), FDA design review deficiencies (compliant templates with required fields, attendee sign-off procedures), audit committee gaps (schedule the missing Q4 meeting, enhance minutes template), whistleblower investigation (independent investigation, protection for the reporter, policy prohibiting deliberate documentation avoidance), data retention (implement compliant retention policies, recover what's possible from the deleted 2022 recordings); prioritizes remediations by regulatory risk and timeline (SOC 2 in 6 months, FDA in 9 months)."
    weight: 0.35
    description: "AuditRemediation"
  - type: llm_judge
    criteria: "Response creates a comprehensive compliance framework for meeting documentation — establishes a company-wide meeting documentation policy covering: which meetings require documentation (all regulated, all with PHI, all design reviews, all security reviews, all governance meetings); minimum documentation standards by meeting type; required elements for each regulatory framework (HIPAA: PHI access documentation, SOC 2: control evidence, FDA: design control records, governance: fiduciary duty evidence); a meeting classification system (regulated vs non-regulated, PHI-involved vs not); documentation retention periods aligned with each regulatory requirement; access controls for meeting documentation; quality assurance processes (periodic review of documentation completeness)."
    weight: 0.35
    description: "ComplianceFramework"
  - type: llm_judge
    criteria: "Response provides implementation plan with training and monitoring — includes a phased rollout with the most critical regulatory gaps addressed first; provides a training program covering: regulatory requirements for each team (clinical teams need HIPAA training, engineering needs FDA design control training, security needs SOC 2 training); creates an ongoing monitoring system (compliance dashboard showing documentation rates by team and meeting type, automated alerts for missing documentation, periodic spot-checks); addresses the cultural issue (the whistleblower allegation suggests a culture of avoidance — the framework must make clear that deliberate non-documentation is a compliance violation); includes a technology implementation plan (centralized documentation platform or integration layer); prepares the company for the upcoming SOC 2 and FDA inspections with documented evidence of remediation."
    weight: 0.30
    description: "ImplementationAndMonitoring"
