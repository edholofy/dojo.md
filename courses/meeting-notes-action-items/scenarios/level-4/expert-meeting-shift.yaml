meta:
  id: expert-meeting-shift
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Expert meeting shift — manage a week of critical documentation challenges including a regulatory investigation, board crisis, and organizational restructuring"
  tags: [shift, expert, regulatory, board, restructuring]

state: {}

trigger: |
  You're the Chief of Staff at a public company during the
  most challenging week of the year. Five critical documentation
  needs converge:

  1. Regulatory Investigation (SEC):
  - The SEC has issued a formal request for all meeting
    records related to revenue recognition decisions for
    the past 3 years
  - 7 departments are affected
  - Some meeting records are in a system that was
    decommissioned last year — the data may not be fully
    recoverable
  - The outside counsel says: "Missing records will be
    interpreted as destroyed. We need to find everything."

  2. Emergency Board Meeting:
  - The board is meeting in 48 hours to discuss the SEC
    investigation
  - The board needs a comprehensive briefing package
  - The meeting may result in significant decisions:
    retaining special counsel, forming a special committee,
    and potentially placing a senior executive on leave
  - The minutes of this meeting are almost certain to be
    subpoenaed

  3. Organizational Restructuring:
  - A previously planned restructuring (30% workforce
    reduction) is being announced on Friday
  - The restructuring planning meetings need to be
    documented for legal protection (WARN Act compliance,
    non-discriminatory selection)
  - The communications team needs documented talking points
    approved by legal

  4. Earnings Call Preparation:
  - The quarterly earnings call is next week
  - The script needs board approval
  - The Q&A preparation document includes sensitive
    information about the SEC investigation — what the CEO
    can and cannot say

  5. Whistleblower Report:
  - An anonymous whistleblower has reported potential
    financial irregularities through the company's hotline
  - The Audit Committee chair needs to be briefed
  - All documentation related to the whistleblower report
    is protected and must be handled with extreme care

  Task: Create the documentation strategy and priority plan
  for the week.

assertions:
  - type: llm_judge
    criteria: "Response creates the documentation priority and strategy plan — triage and sequencing (prioritizes the week's documentation needs: immediate priority 1 — SEC document preservation: issue a company-wide litigation hold immediately; begin records recovery from the decommissioned system; engage forensic data recovery if needed; assign a team to organize and catalog all responsive documents across 7 departments; immediate priority 2 — whistleblower report documentation: brief the Audit Committee chair; ensure all whistleblower documentation follows the company's whistleblower protection policy; the whistleblower report may be connected to the SEC investigation — this connection must be documented carefully; 48-hour priority — emergency board meeting: prepare the board briefing package; arrange for experienced corporate minutes-taker; pre-clear the minutes approach with outside counsel; end-of-week priorities — restructuring documentation and earnings call preparation; these are important but have slightly more runway), documentation governance for the week (establishes controls: all documentation this week is potentially subject to legal proceedings; every document should be reviewed by legal before distribution; a document control officer should track all documents created, modified, or distributed; version control is critical — no informal drafts circulating; establish a privilege protocol: which documents are created at the direction of counsel and therefore privileged; which are business documents that happen to involve legal topics)."
    weight: 0.35
    description: "PriorityAndStrategy"
  - type: llm_judge
    criteria: "Response handles each situation with appropriate documentation standards — SEC investigation documentation (addresses the regulatory challenge: litigation hold — issued within hours: no deletion, modification, or destruction of any meeting records company-wide; records recovery — the decommissioned system must be searched: engage IT and potentially forensic data recovery; document the recovery effort thoroughly — the SEC will want to see that the company made a good-faith effort; document gaps honestly — if records can't be recovered, document what was tried and why recovery failed; outside counsel's warning is taken seriously: any appearance of records destruction would be catastrophic), board meeting documentation (handles the high-stakes board meeting: board package — prepared by corporate counsel with input from outside counsel; includes: SEC investigation summary, legal analysis, recommended actions, risk assessment; minutes — taken by experienced corporate secretary or outside counsel; the minutes will be subpoenaed — they must be: factually accurate, professionally written, protective of board deliberation process, and reflective of the board's fulfillment of its fiduciary duties; executive session — if the board discusses placing an executive on leave, this is handled in executive session with separate minutes restricted to the independent directors and counsel; special committee — if formed, the committee's charter, membership, and initial mandate are documented), restructuring and earnings documentation (handles the operational needs: restructuring — meeting documentation shows: the business rationale for the restructuring, the selection criteria used, compliance with WARN Act notice requirements, and non-discriminatory intent; this documentation protects against wrongful termination claims; earnings call — the Q&A prep document is marked as privileged and confidential; the script approval process is documented with board consent; the CEO's guidance on what can be said about the SEC investigation is precisely documented — deviation could create securities law liability)."
    weight: 0.35
    description: "SituationalDocumentation"
  - type: llm_judge
    criteria: "Response addresses whistleblower protection and post-week planning — whistleblower protection (handles the anonymous report: all documentation follows whistleblower protection requirements: the reporter's identity is protected; documents are stored separately from general meeting records with restricted access; the Audit Committee chair is briefed with a formal documented briefing; the investigation process is documented from the start — this creates a defensible record; if the whistleblower report relates to the SEC investigation, this connection is handled with extreme care by outside counsel; retaliation risk — any documentation mentioning the whistleblower report must be reviewed by counsel to ensure nothing could be construed as retaliatory), post-week documentation audit (plans what happens after the crisis week: within 1 week, conduct a comprehensive documentation review: are all litigation hold requirements being followed?; are all documents properly classified and stored?; are there any informal documents (texts, chat messages, personal notes) that should be preserved?; lessons learned — the documentation challenges this week reveal systemic issues: the decommissioned system data loss, the lack of a standing litigation-ready documentation practice, and the ad-hoc approach to board documentation for a public company; recommend permanent improvements to prevent these issues from recurring; the documentation created this week will be reviewed, organized, and cataloged for ongoing legal proceedings)."
    weight: 0.30
    description: "WhistleblowerAndPlanning"
