meta:
  id: async-meeting-documentation
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Async-first meeting documentation — design documentation systems that replace synchronous meetings with structured asynchronous communication while preserving decision quality"
  tags: [async, remote, documentation-first, decision-quality, expert]

state: {}

trigger: |
  Your fully remote company (400 employees, 25 countries,
  every time zone) has decided to become "async-first." The
  CEO's mandate: "We're replacing 60% of our synchronous
  meetings with asynchronous documentation. Same quality of
  decisions, better quality of life."

  Current meeting load: 18 hours/week average per employee.
  Target: 7 hours/week.

  The challenge: meetings currently serve multiple functions
  that async must replace:
  - Information sharing (status updates, announcements)
  - Decision making (evaluating options, voting)
  - Brainstorming (generating ideas collaboratively)
  - Alignment (ensuring everyone understands priorities)
  - Relationship building (human connection, trust)
  - Accountability (checking on commitments)

  Teams that have tried going async informally have reported:
  - "Decisions take longer because people don't respond to
    written proposals"
  - "We lost the nuance — things get misunderstood in text"
  - "Nobody reads the long documents"
  - "I feel disconnected from my team"
  - "We replaced meetings with Slack threads that are worse
    than meetings"

  Task: Design the async-first meeting documentation system.

assertions:
  - type: llm_judge
    criteria: "Response creates async communication frameworks — async replacements for each meeting function (designs specific async formats: status updates → structured async status template: each team member posts a weekly status in a standardized format — what I completed, what I'm working on, blockers, and key metrics; the template takes 10 minutes to write and 2 minutes to read; this replaces the 15-minute standup with a better record; decision making → decision document process: the proposer writes a decision document with: context, options, analysis, and recommendation; stakeholders comment asynchronously within a defined review period (48-72 hours); the decision maker reviews all input and makes the final call in writing; the entire decision is documented by design; brainstorming → async ideation: use a structured ideation format where participants contribute ideas independently over 3-5 days; followed by a consolidation phase and optional 30-minute synchronous discussion of the top ideas; alignment → weekly written briefings: leadership publishes a weekly written update with: priorities, changes, and key decisions made; teams can comment with questions; replaces the all-hands except for quarterly live sessions; accountability → automated action item tracking: action items are tracked in a shared system with automated reminders; weekly automated report showing completion rates; no meeting needed), the meetings that remain synchronous (identifies which meetings should stay: high-complexity decisions requiring real-time debate — keep these but make them better with pre-reads and decision documents prepared in advance; 1:1 meetings — keep for relationship and coaching; team retrospectives — keep for the social and reflective value; client calls — often can't be made async; crisis response — real-time coordination required; the remaining synchronous meetings should be the highest-value meetings, not the default mode)."
    weight: 0.35
    description: "AsyncFrameworks"
  - type: llm_judge
    criteria: "Response addresses the specific failure modes — solving async failure patterns (addresses each reported problem: 'decisions take longer' — solve with a decision document process that includes a deadline: 'Comments due by Wednesday 5 PM UTC. Decision will be made Thursday.' Silence after the deadline is treated as consent. The decision maker commits to deciding within 24 hours of the comment deadline; 'lost nuance' — solve by encouraging video messages (Loom-style) for complex topics where tone and context matter; and by creating a norm of 'assume positive intent' in written communication; 'nobody reads long documents' — solve by standardizing document format: executive summary (3 sentences max) at the top; detailed analysis below; the summary must be self-sufficient — a reader who only reads the summary should understand the core proposal; 'feel disconnected' — solve by preserving social touchpoints: weekly optional video coffee chats, monthly team social calls, quarterly all-hands; isolation is the real risk of async-first, not inefficiency; 'Slack threads worse than meetings' — solve by distinguishing between conversations and decisions: Slack is for quick questions and casual conversation; decisions happen in documents with structure; create a 'no decisions in Slack' policy — if a Slack thread becomes a decision discussion, someone must move it to a decision document)."
    weight: 0.35
    description: "FailureModeResolution"
  - type: llm_judge
    criteria: "Response creates the operational system and measurement — async documentation infrastructure (builds the practical system: document templates — create standardized templates for each async format: status update template, decision document template, ideation template, weekly briefing template; each template is designed for async consumption: scannable, structured, with clear sections and calls to action; notification and engagement system — people need to know when documents need their attention; use a centralized async workflow: new decision documents are posted in a dedicated channel/space; assigned reviewers receive direct notifications; the system tracks who has reviewed and who hasn't; SLA for responses — define expected response times by document type: status updates — no response expected unless there's a question; decision documents — comment within 48 hours; urgent decisions — comment within 24 hours; knowledge base integration — all async documents are stored in a searchable knowledge base; this creates an organizational memory that meetings never could), measurement and iteration (tracks whether async-first is working: quantitative metrics — average meeting hours per employee (target: from 18 to 7); decision velocity (is async faster or slower than meetings for decisions?); action item completion rate; employee satisfaction with async communication; qualitative assessment — quarterly survey: do employees feel informed? do they feel connected? are decisions being made effectively? are they experiencing information overload?; iteration — the async-first system should be adjusted based on data: if certain meeting types don't translate well to async, bring them back; if response rates are low, investigate why — is the format too long? are notifications not working? do people not feel their input matters?; time zone equity — measure whether employees in underrepresented time zones feel more included in async mode than they did in meeting mode; the async-first approach should improve equity for global teams)."
    weight: 0.30
    description: "OperationsAndMeasurement"
