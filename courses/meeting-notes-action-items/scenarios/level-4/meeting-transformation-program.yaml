meta:
  id: meeting-transformation-program
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Meeting transformation program — design and lead an enterprise-wide initiative to fundamentally transform meeting culture, documentation, and decision-making effectiveness"
  tags: [transformation, enterprise, culture-change, program, leadership]

state: {}

trigger: |
  You're an organizational effectiveness consultant hired by
  a mid-size insurance company (5,000 employees, $2B revenue)
  to lead a "Meeting Transformation Program." The CEO's
  mandate:

  "Our company is drowning in meetings. People spend more
  time talking about work than doing work. When they do meet,
  they don't capture decisions or follow up. We need a
  fundamental culture change."

  Diagnostic findings from your 4-week assessment:

  Quantitative data:
  - Average employee: 19 meetings/week (6.5 hours/day)
  - Managers: 27 meetings/week (8+ hours/day)
  - Executives: 31 meetings/week (essentially all day)
  - 41% of meetings are recurring with no regular review
  - 28% of meetings have 10+ attendees
  - Average meeting duration: 52 minutes (most default to
    60-minute slots)
  - Only 35% of meetings have a pre-distributed agenda
  - Only 22% of meetings produce documented action items
  - Meeting time has grown 40% over 3 years

  Qualitative findings from interviews and focus groups:
  - "I attend meetings just so I'm not left out of the loop"
  - "My manager calls a meeting for everything — even things
    that could be an email"
  - "We have meetings to prepare for meetings"
  - "I do my actual work between 6-8 PM after meetings end"
  - "Nobody follows up on what we agreed to — so we have the
    same meeting again next week"
  - "Our meeting culture punishes people who decline meetings"
  - "Remote employees feel they must attend everything to
    stay visible"
  - "The real decisions are made in hallway conversations
    after the meeting"

  Organizational context:
  - Traditional, hierarchical culture (company is 90 years old)
  - Recent CEO (2 years) is driving modernization
  - Middle management layer is large and resistant to change
  - The company is in a competitive industry where speed
    matters increasingly
  - IT infrastructure: Microsoft 365, SharePoint, no modern
    collaboration tools
  - Previous "efficiency initiatives" have been met with
    cynicism: "Another flavor of the month"

  Budget: $1.5M over 18 months
  Success metric: CEO wants to see a 30% reduction in
  meeting time and a 50% improvement in meeting effectiveness
  scores within 18 months.

  Task: Design the comprehensive meeting transformation
  program.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive transformation strategy — addresses the problem systemically (not just meeting reduction but meeting effectiveness, documentation, and decision quality); designs a phased program (not a one-time initiative): Phase 1 diagnostic and quick wins (months 1-3), Phase 2 systematic change (months 4-9), Phase 3 culture embedding (months 10-18); includes meeting reduction strategies (recurring meeting audit — every recurring meeting must be justified or cancelled; meeting-free blocks — protected time for deep work; attendee optimization — distinguish required vs optional attendees; duration defaults — shift from 60 to 25/50 minute defaults; async alternatives — identify meetings that should be emails, Loom videos, or Slack threads); includes meeting effectiveness strategies (agenda requirements, documentation standards, decision capture, action item tracking); addresses the cultural barriers (hierarchical culture, middle management resistance, cynicism about initiatives)."
    weight: 0.35
    description: "TransformationStrategy"
  - type: llm_judge
    criteria: "Response addresses documentation and decision-making improvement — creates meeting documentation standards appropriate for an insurance company (regulated industry); establishes a decision documentation framework (who decided, what was decided, why, what happens next); implements action item tracking with accountability; addresses the 'hallway conversation' problem (decisions made outside meetings must be documented and communicated); provides templates and tools for: meeting agendas, decision records, action item tracking, and meeting effectiveness evaluation; connects meeting documentation to business outcomes (faster decision-making, better compliance evidence, reduced rework from lost decisions); includes technology recommendations within the Microsoft 365 ecosystem (Teams channels, SharePoint templates, Power Automate workflows for reminders)."
    weight: 0.35
    description: "DocumentationAndDecisions"
  - type: llm_judge
    criteria: "Response provides change management and measurement plan — addresses the 'flavor of the month' cynicism with sustained engagement (not a one-time announcement but ongoing program with visible executive sponsorship); includes a change management approach: executive role modeling (CEO and C-suite must change their own meeting behavior first), middle management engagement (they are the key lever — make them champions not resistors), employee empowerment (give people permission to decline meetings, leave early, suggest async alternatives); provides a measurement framework: quantitative (meeting hours per employee, documented decision rate, action item completion rate, meeting effectiveness survey scores) and qualitative (employee sentiment, cultural indicators); tracks progress against the CEO's targets (30% time reduction, 50% effectiveness improvement); includes governance (who owns the program, steering committee, regular reporting to CEO); addresses sustainability (how to prevent meeting creep from returning after the program ends); stays within the $1.5M budget with a clear allocation plan."
    weight: 0.30
    description: "ChangeManagementAndMeasurement"
