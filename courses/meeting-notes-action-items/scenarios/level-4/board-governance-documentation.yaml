meta:
  id: board-governance-documentation
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Board governance documentation — manage the complete documentation lifecycle for a public company board including minutes, resolutions, committee reports, and regulatory filings"
  tags: [board, governance, public-company, regulatory, expert]

state: {}

trigger: |
  You've been hired as the Corporate Secretary for a newly
  public company (IPO completed 6 months ago). The board
  documentation practices that worked when the company was
  private are inadequate for a public company:

  Current problems:
  - Board minutes are taken informally by the CEO's EA — they
    read like casual meeting notes, not legal documents
  - Committee meetings (Audit, Compensation, Nominating) have
    no separate minutes — discussions are folded into main
    board minutes
  - Resolutions are passed verbally with no formal written
    record
  - The board book is assembled manually from email attachments
    3 days before each meeting
  - No consent agenda process — every routine item takes full
    discussion time
  - Board members receive materials in inconsistent formats
  - No process for board action between meetings (written
    consents)
  - Investor relations needs board-approved language for
    earnings calls but there's no documented approval process
  - D&O insurance requires evidence of proper governance
    documentation

  The General Counsel says: "As a public company, our board
  documentation is discoverable by regulators, shareholders,
  and plaintiffs' attorneys. We need a professional corporate
  governance documentation system."

  Task: Design the complete board documentation system.

assertions:
  - type: llm_judge
    criteria: "Response creates professional board minutes standards — board minutes framework (transforms informal notes into legal documents: minutes format — formal corporate minutes structure: call to order with quorum confirmation; approval of prior minutes; committee reports; management presentations (summarized, not transcribed); resolutions with precise language, proposer, seconder, and vote count; executive session notation; adjournment with next meeting date; language standards — factual and neutral: record actions taken, not discussions held; 'The Board discussed the Q3 financial results' not a transcript of what each director said; avoid recording individual director opinions unless they specifically request it for the record; record all votes including dissents and abstentions; never record off-the-record comments, humor, or personal exchanges; resolution documentation — every board action requires a formal resolution: preamble stating the context, operative clauses stating the action, approval record; resolutions are numbered and cross-referenced), committee documentation (creates separate documentation for each committee: Audit Committee minutes — separate meeting, separate minutes, separate retention; includes: financial statement review, auditor communications, internal control assessments; Compensation Committee minutes — executive compensation decisions require detailed documentation for proxy statement preparation; include: benchmarking data considered, performance criteria, specific compensation actions; Nominating/Governance Committee minutes — director nominations, governance policy reviews, board evaluation processes; each committee's minutes follow the same professional standards as main board minutes; committee chairs review and approve their minutes before filing)."
    weight: 0.35
    description: "BoardMinutesStandards"
  - type: llm_judge
    criteria: "Response designs the board book and meeting management system — board book process (creates a professional pre-meeting package: board book structure — consistent format for every meeting: table of contents, agenda, prior meeting minutes for approval, committee reports, management presentations, resolutions for consideration, consent agenda items; content standards — all materials follow a consistent visual format with the company branding; financial data includes period comparisons and variance explanations; management presentations include an executive summary on the first page; distribution — secure board portal replaces email attachments; materials distributed 5-7 days before the meeting; late materials are clearly marked; directors can annotate materials within the portal; the board portal provides: secure access, version control, audit trail, and the ability to restrict access to sensitive materials), consent agenda and efficiency (introduces governance best practices: consent agenda — routine items that don't require discussion are grouped: approval of minutes, ratification of committee actions, routine board resolutions; the consent agenda is approved as a single vote unless a director requests an item be removed for discussion; this saves 30-45 minutes per meeting for substantive discussion; written consent process — for actions between meetings: formal written consent circulated to all directors; the consent documents the resolution, the date, and the signatures; state corporate law may have specific requirements for written consents; the General Counsel reviews all written consents before circulation)."
    weight: 0.35
    description: "BoardBookAndManagement"
  - type: llm_judge
    criteria: "Response addresses regulatory compliance and insurance requirements — public company compliance (addresses the specific regulatory requirements: SEC compliance — quarterly and annual reports reference board actions; earnings call language must be traceable to board-approved statements; the corporate secretary maintains a record of all board-approved public statements; SOX compliance — Audit Committee documentation must demonstrate oversight of financial reporting and internal controls; proxy statement support — Compensation Committee minutes must support the Compensation Discussion and Analysis section; Nominating Committee minutes support the director nomination disclosures; shareholder meeting — annual meeting requires formal preparation: proxy materials, notice of meeting, minutes of the shareholder meeting; all governed by SEC rules and state corporate law), D&O and risk management (addresses insurance and legal protection: D&O insurance requirements — the insurance carrier expects evidence of proper governance: regular board meetings with documented attendance and quorum; documented review of major transactions and risk factors; evidence of director independence and committee oversight; litigation readiness — board minutes may be subpoenaed in shareholder lawsuits, SEC investigations, or derivative actions; the minutes must demonstrate that directors fulfilled their fiduciary duties: the duty of care (were they informed?) and the duty of loyalty (did they act in the company's interest?); the corporate secretary should receive training on the intersection of board documentation and legal liability; annual review — the General Counsel reviews a sample of board and committee minutes annually for quality and compliance)."
    weight: 0.30
    description: "ComplianceAndInsurance"
