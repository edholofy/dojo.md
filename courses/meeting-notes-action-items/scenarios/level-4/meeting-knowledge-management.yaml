meta:
  id: meeting-knowledge-management
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Meeting knowledge management — transform meeting documentation from ephemeral records into a durable organizational knowledge system"
  tags: [knowledge, management, institutional, memory, expert]

state: {}

trigger: |
  Your 800-person technology company has a knowledge crisis
  driven by meeting documentation failures:

  Recent incidents:
  - A senior architect left the company. 3 weeks later, the
    team can't find why a critical design decision was made.
    It was discussed in a meeting 18 months ago but nobody
    can find the notes.
  - Two product teams independently built similar features
    because neither knew the other team had discussed and
    scoped the same capability in their planning meetings.
  - The customer success team spent 2 weeks debugging a
    client issue that was already solved by the support team
    6 months ago — the solution was discussed in a meeting
    but never entered into the knowledge base.
  - A new VP joined and spent her first month asking "why
    do we do it this way?" for every process. The answers
    were in meeting notes that no one could locate.
  - The CEO made a strategic decision 8 months ago with
    specific conditions for revisiting it. Nobody remembers
    the conditions, and the original meeting notes don't
    capture them clearly.

  The CTO says: "Our meeting notes are a graveyard of
  organizational knowledge. Decisions, context, and insights
  go in but never come out. I need meeting documentation to
  feed a living knowledge system."

  Task: Design the meeting-to-knowledge pipeline.

assertions:
  - type: llm_judge
    criteria: "Response designs the knowledge extraction pipeline — knowledge extraction framework (defines what knowledge is extracted from meetings: decision knowledge — every significant decision, with context, rationale, alternatives, and review conditions; extracted from meeting notes and entered into a decision log; tagged by project, team, and topic for searchability; design and architecture knowledge — technical decisions, design rationale, architecture choices; extracted from engineering and product meetings; linked to the relevant codebase, system, or product; process knowledge — how things work and why; extracted from operational and workflow discussions; entered into the process documentation wiki; problem-solution knowledge — issues encountered and how they were resolved; extracted from support, incident, and debugging meetings; entered into the troubleshooting knowledge base; the extraction is not about copying meeting notes — it's about distilling the knowledge from meetings into structured, searchable, reusable formats), extraction process (defines how knowledge moves from meetings to the knowledge system: during the meeting — the note-taker tags knowledge items in real-time: [DECISION], [ARCHITECTURE], [PROCESS], [SOLUTION]; these tags create extraction points; after the meeting — within 48 hours, tagged items are processed: decisions enter the decision log with full context; solutions enter the knowledge base with problem description and resolution steps; architecture decisions enter the ADR (Architecture Decision Record) system; automation — AI-assisted extraction can identify potential knowledge items from meeting notes and flag them for human review; the human reviews, edits, and approves before the knowledge enters the system; quality gate — extracted knowledge is reviewed for accuracy and completeness before publication; the original meeting notes are linked as source material)."
    weight: 0.35
    description: "KnowledgeExtractionPipeline"
  - type: llm_judge
    criteria: "Response creates the knowledge system architecture — knowledge system design (structures the knowledge for retrieval: a federated knowledge system with specialized repositories: decision log — all significant decisions, searchable by date, team, project, and topic; each decision has: context, rationale, alternatives, conditions for review; knowledge base — how-to guides, troubleshooting solutions, process documentation; each article has: the problem/question it addresses, the solution, and the source meeting; architecture decision records (ADRs) — technical design decisions with their context and consequences; project knowledge — per-project knowledge pages that aggregate all relevant decisions, meeting insights, and documentation; the system is cross-referenced — a project page links to relevant decisions, the decision log links to related knowledge base articles, and all entries link back to their source meeting notes), search and discovery (makes knowledge findable: full-text search across all knowledge repositories; AI-powered search — natural language queries: 'Why did we choose PostgreSQL for the payments service?' returns the relevant decision record with context; related knowledge suggestions — when viewing a decision, see related decisions, knowledge articles, and meeting notes; knowledge graph — visualize relationships between decisions, projects, teams, and topics; the search must be better than the alternative — if finding knowledge in the system is harder than asking a colleague or re-debating the decision, the system will be abandoned)."
    weight: 0.35
    description: "KnowledgeSystemArchitecture"
  - type: llm_judge
    criteria: "Response addresses sustainability and incident resolution — resolving the specific incidents (demonstrates how the system prevents each problem: the architect's departure — the ADR system captures the design decision with context; the new team finds the decision record, not the meeting notes; duplicate features — the project knowledge system shows what's been scoped and discussed across all teams; before starting new work, teams check the knowledge system for related projects; the support solution — the knowledge base captures the solution from the meeting; the customer success team finds it through search instead of re-discovering it; the new VP's questions — process documentation and decision records provide the 'institutional memory' that no longer depends on long-tenured employees; the CEO's strategic decision — the decision log captures the specific conditions for revisiting, with a review trigger date), sustainability model (ensures the system stays useful over time: knowledge curators — assign 1 person per department as a knowledge curator; they're responsible for quality and completeness of their team's knowledge entries; freshness management — knowledge entries have review dates; stale entries are flagged for update or retirement; adoption incentives — make the knowledge system the default first step for answering questions; if someone asks 'why do we do X?', the answer is 'check the knowledge system first'; metrics — track: knowledge entries created per month, search queries and results quality, time-to-find-answer, knowledge system NPS; ongoing investment — the knowledge system requires continuous care; it degrades without maintenance; allocate 2-4 hours per week per department for knowledge curation; the meeting-to-knowledge pipeline is a cultural practice, not a one-time project)."
    weight: 0.30
    description: "SustainabilityAndResolution"
