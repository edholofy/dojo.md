meta:
  id: enterprise-meeting-governance
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Enterprise meeting governance — design a meeting documentation governance framework for a large enterprise with regulatory, legal, and operational requirements"
  tags: [enterprise, governance, regulatory, framework, expert]

state: {}

trigger: |
  You're the VP of Operations at a 3,000-person financial
  services company with offices in 8 countries. The company
  faces multiple meeting documentation challenges:

  Regulatory:
  - SEC requires documentation of investment committee
    decisions
  - FINRA requires supervisory meeting records
  - SOX compliance requires documented approval for all
    financial controls changes
  - GDPR affects meeting recordings with EU participants
  - Each country has different data retention requirements

  Operational:
  - 15,000+ meetings per week across the company
  - No standardized documentation platform — teams use Notion,
    Confluence, Google Docs, SharePoint, and email
  - 40% of critical business decisions have no documentation
  - Knowledge loss when employees leave — no meeting history
    accessible to successors
  - The compliance team spends 200 hours/quarter searching
    for meeting records for regulatory reviews

  Legal:
  - General counsel reports that meeting notes have been
    subpoenaed 3 times in the past 2 years
  - Inconsistent documentation quality creates legal risk —
    some notes are too detailed (exposing liability), others
    too sparse (no defense)
  - No policy on privilege protection for meetings with
    legal counsel
  - E-discovery costs are rising due to unstructured meeting
    data

  Task: Design the enterprise meeting governance framework.

assertions:
  - type: llm_judge
    criteria: "Response creates the governance framework — meeting classification system (categorizes all 15,000+ weekly meetings: regulatory-required meetings — investment committee, supervisory reviews, financial controls: mandatory documentation with specific format requirements; template-driven with required fields; retention per regulatory requirements (SEC: 6 years minimum, SOX: 7 years); legally sensitive meetings — meetings with counsel, litigation-related, HR investigations: privilege-protected documentation; restricted access and separate storage; specific guidelines on what to document and what not to; business-critical meetings — board, executive committee, strategic planning, client-facing: required documentation with standard templates; retained for 5 years; standard business meetings — team meetings, project reviews, standups: recommended documentation using standard templates; retained for 2 years; informal meetings — brainstorms, social, ad-hoc: documentation optional; minimal retention), documentation standards by classification (each category has specific requirements: format — template, required fields, approval workflow; quality — minimum content requirements, review process; timing — documentation deadline after meeting (24h for regulatory, 48h for business-critical); storage — designated platform and location; access — who can view, edit, and delete; retention — how long records are kept based on regulatory and legal requirements; the standards are specific enough to be auditable and practical enough to be followed)."
    weight: 0.35
    description: "GovernanceFramework"
  - type: llm_judge
    criteria: "Response addresses platform consolidation and compliance — platform strategy (consolidates from 5 tools to a unified system: evaluate and select a primary meeting documentation platform that supports: role-based access control, audit trails, automated retention enforcement, search across all meeting records, regulatory compliance features, and multi-language support; migration plan from 5 current tools: phase 1 — regulatory and legally sensitive meetings migrate first (highest risk); phase 2 — business-critical meetings; phase 3 — standard meetings; the migration addresses the compliance team's 200 hours/quarter search problem — a unified searchable platform dramatically reduces time to find records; data migration — existing records from all 5 platforms are consolidated; metadata is standardized during migration), regulatory compliance automation (builds compliance into the system: automated alerts — when a regulatory-required meeting hasn't been documented within 24 hours; automated retention — records are retained for the required period and flagged for review before deletion; country-specific compliance — the system enforces different retention periods by jurisdiction; GDPR compliance — meeting recordings and notes involving EU participants follow GDPR data handling requirements; audit-ready reporting — the compliance team can generate documentation compliance reports by meeting type, department, and jurisdiction; this reduces the 200 hours/quarter to a fraction)."
    weight: 0.35
    description: "PlatformAndCompliance"
  - type: llm_judge
    criteria: "Response addresses legal risk and organizational adoption — legal protection framework (reduces legal risk from meeting documentation: documentation guidelines by sensitivity — provide specific guidance on what to include and exclude: include: decisions, rationale, action items, attendees, dates; exclude: speculation, personal opinions, inflammatory language, privileged communications in non-privileged notes; privilege protection — meetings with legal counsel are documented separately with clear privilege markers; the documentation is reviewed by legal before storage; e-discovery preparation — structured documentation with consistent metadata reduces e-discovery costs; the platform supports legal hold functionality; training — all employees who document regulated meetings receive annual training on documentation standards and legal implications), adoption at scale (makes governance work for 3,000 people: the governance framework must be practical — overly complex requirements will be ignored; automation handles as much as possible: template auto-population from calendar data, automated classification based on meeting type, automated retention enforcement; role-based training — regulatory meeting organizers get deep compliance training; general employees get basic documentation standards training; compliance team gets platform administration training; metrics — track documentation compliance rates: target 100% for regulatory meetings, 90% for business-critical, 70% for standard; quarterly governance review — assess compliance rates, update templates as regulations change, address adoption challenges; the governance framework is presented as enabling, not bureaucratic — the alternative to good governance is regulatory penalties, legal exposure, and knowledge loss)."
    weight: 0.30
    description: "LegalAndAdoption"
