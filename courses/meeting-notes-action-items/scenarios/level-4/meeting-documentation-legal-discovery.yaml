meta:
  id: meeting-documentation-legal-discovery
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Meeting documentation for legal discovery — prepare meeting documentation practices that protect the company while ensuring authentic record-keeping in litigation-prone environments"
  tags: [legal, discovery, litigation, protection, expert]

state: {}

trigger: |
  You're the General Counsel at a pharmaceutical company.
  The company is facing multiple legal challenges where
  meeting documentation is central:

  1. Product Liability Lawsuit: Plaintiffs allege the company
     knew about a side effect during development but marketed
     the drug anyway. They've subpoenaed all meeting notes
     from the drug development team for the past 5 years.
     Problematic: a researcher's meeting notes from 3 years
     ago include the phrase "we should probably look into
     this more but timeline pressure is real."

  2. SEC Investigation: The SEC is investigating potential
     insider trading. They've requested all meeting records
     where material non-public information was discussed.
     Problematic: meeting notes from a finance team sync
     mention the upcoming acquisition 2 weeks before it was
     announced, with attendees listed who later traded stock.

  3. Employment Discrimination Suit: A former employee
     alleges discriminatory termination. The plaintiff has
     requested all meeting notes from their performance
     reviews, team meetings, and any meeting where their
     employment was discussed.
     Problematic: a manager's meeting notes from a team
     meeting include the observation "X seems checked out
     lately, wonder if it's a cultural fit issue."

  The CEO says: "Our meeting notes are being used against us.
  How do we fix our documentation practices going forward
  without destroying evidence or appearing to obstruct?"

  Task: Create meeting documentation guidelines for a
  litigation-prone environment.

assertions:
  - type: llm_judge
    criteria: "Response creates legally prudent documentation guidelines — documentation principles (establishes foundational rules: be factual, not editorial — meeting notes should record facts, decisions, and action items, not opinions, speculation, or emotional reactions; 'The team discussed the side effect data and decided to conduct additional studies' not 'we should probably look into this more but timeline pressure is real'; be complete, not selective — document all significant discussions and decisions, not just favorable ones; selective documentation looks worse than complete documentation if it appears the company was hiding unfavorable information; be contemporaneous — notes are created during or immediately after meetings, not weeks later or in response to a legal threat; be consistent — use standard formats and templates across the organization; inconsistent documentation raises suspicion about why certain meetings were documented differently), specific guidance for high-risk meeting types (provides targeted guidance: R&D and development meetings — document all safety and efficacy discussions; record decisions to investigate, defer, or dismiss concerns with explicit rationale; never record pressure to skip safety steps — if such pressure exists, address it through compliance channels, not meeting notes; financial and insider information meetings — clearly mark meetings where MNPI is discussed; maintain the insider list; notes should reference the information policy; HR and personnel meetings — use factual, behavioral language: 'missed 3 of 5 deadlines this quarter' not 'seems checked out' or 'cultural fit issue'; never reference protected characteristics or use language that could imply discriminatory motivation; document performance discussions with specific, measurable observations; board and executive meetings — formal minutes with legal counsel review; the corporate secretary takes official minutes; individual directors' personal notes are not official records)."
    weight: 0.35
    description: "LegalDocumentationGuidelines"
  - type: llm_judge
    criteria: "Response addresses privilege protection and record management — privilege protection (creates a framework for attorney-client privilege: meetings with legal counsel — when in-house or outside counsel attends a meeting for the purpose of providing legal advice, the documentation may be privileged; privilege requirements: the meeting must be for the purpose of obtaining legal advice (not just because a lawyer happens to be present); the notes must be marked 'Attorney-Client Privileged — Confidential'; distribution must be limited to those who need the information; privilege can be waived if the notes are shared too broadly; separate privileged notes — if a meeting has both privileged and non-privileged components, create two sets of notes: the general meeting notes (no privilege) and the legal discussion notes (privileged); privilege is powerful but not absolute — it protects the legal advice, not the underlying facts; never try to make business discussions privileged by inviting a lawyer), document retention and litigation hold (manages records appropriately: retention policy — define how long meeting notes are retained by category: regulatory-required meetings follow regulatory retention periods; standard business meetings: 3 years; routine operational meetings: 1 year; the retention policy must be applied consistently — you cannot delete meeting notes selectively when litigation threatens; litigation hold — when litigation is anticipated or actual, all relevant meeting documentation is preserved; no deletion, no modification, no destruction; the hold applies to: electronic notes, handwritten notes, recordings, AI transcripts, chat logs from meetings; violation of a litigation hold is spoliation — it results in severe legal penalties and adverse inference instructions; the existing problematic notes described in the scenarios cannot be altered or destroyed — they must be addressed through legal strategy, not document manipulation)."
    weight: 0.35
    description: "PrivilegeAndRetention"
  - type: llm_judge
    criteria: "Response addresses training and cultural change — documentation training program (trains employees on legally prudent note-taking: the training covers: why meeting notes matter legally — real examples of notes being used in litigation (without identifying specific cases); how to write factual, neutral notes — before-and-after examples showing problematic language and the corrected version; what to include and exclude — facts, decisions, action items: yes; opinions, speculation, emotional reactions: no; when to consult legal — if a meeting involves a topic that could have legal implications, flag it for legal review; the training is mandatory for all employees who document meetings; annual refresher with updated examples from recent legal developments; department-specific training for high-risk areas: R&D, finance, HR), cultural shift (changes how the organization thinks about meeting documentation: meeting notes are business records, not personal journals — they should be written as if they might be read by a judge, jury, or regulator; this doesn't mean notes should be sanitized or dishonest — it means they should be factual, professional, and relevant; the goal is not to hide problems — it's to document them appropriately: 'The team identified a potential safety signal and initiated additional testing' is both factual and legally appropriate; employees should understand that well-documented meeting notes can protect the company as much as poorly documented notes can harm it; the company's existing problematic notes are addressed through litigation strategy — the going-forward documentation practices prevent similar problems)."
    weight: 0.30
    description: "TrainingAndCulture"
