meta:
  id: meeting-intelligence-platform
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Meeting intelligence platform — design a data-driven meeting intelligence system that extracts insights from meeting documentation to improve organizational decision-making"
  tags: [intelligence, platform, analytics, insights, expert]

state: {}

trigger: |
  You're the Chief of Staff at a 1,500-person technology
  company. The CEO has tasked you with building a "meeting
  intelligence" capability — turning the company's meeting
  documentation into a strategic asset:

  Current state:
  - The company produces approximately 5,000 meeting notes
    per week across all teams
  - Meeting notes live in Notion — they're searchable but
    rarely searched
  - Action items are tracked in 3 different tools (Jira,
    Asana, manual spreadsheets)
  - Decision records are scattered across meeting notes with
    no central decision log
  - The CEO says: "We have thousands of meetings producing
    thousands of documents, but we have zero intelligence
    about what's actually happening in those meetings"

  Desired capabilities:
  1. Decision intelligence — what decisions are being made
     across the company? are they aligned with strategy?
  2. Action intelligence — what's the completion rate? where
     do action items stall?
  3. Meeting effectiveness — which meetings produce outcomes
     and which are wasting time?
  4. Knowledge capture — can we extract organizational
     knowledge from meeting discussions?
  5. Risk detection — can we identify risks, blockers, or
     misalignments from meeting patterns?

  Budget: $200K/year for the platform and 1 FTE to manage it.

  Task: Design the meeting intelligence platform.

assertions:
  - type: llm_judge
    criteria: "Response designs the intelligence architecture — data pipeline (defines how meeting data flows into intelligence: data collection — standardize meeting notes in Notion with structured metadata: meeting type, attendees, department, project tags, decisions made, action items; natural language processing — use AI to extract structured data from unstructured meeting notes: decisions (who decided what, when), action items (owner, deadline, status), topics discussed, sentiment indicators, risk mentions, blockers mentioned; data integration — connect action items across Jira, Asana, and spreadsheets to meeting records: which meeting generated which action item? was it completed? how long did it take?; the pipeline transforms 5,000 weekly meeting notes from passive documents into queryable intelligence), intelligence dashboards (creates actionable dashboards for each capability: decision intelligence dashboard — all significant decisions logged: by team, by project, by decision maker; strategic alignment check: which decisions support which OKRs? are there contradictory decisions?; decision velocity: how quickly is the organization making decisions?; action intelligence dashboard — completion rate by team, by individual, by project; average time-to-completion; overdue action items by age and impact; repeat action items: the same action assigned multiple times signals a systemic blocker; meeting effectiveness dashboard — meetings that produce decisions and action items vs meetings with no documented outputs; meeting duration trends: are meetings getting longer? which teams have the most meeting hours?; attendee analysis: who attends the most meetings? are the right people in the right meetings?)."
    weight: 0.35
    description: "IntelligenceArchitecture"
  - type: llm_judge
    criteria: "Response creates knowledge capture and risk detection — knowledge intelligence (extracts organizational knowledge: topic analysis — what are the most discussed topics across the company? are they aligned with strategic priorities?; expertise mapping — who discusses what topics? this reveals unofficial subject matter experts; institutional memory — when an employee leaves, their meeting history provides context for their successor; searchable knowledge base — meetings become a queryable knowledge source: 'What did we discuss about pricing in Q3?' returns relevant meeting summaries; this transforms meetings from ephemeral conversations into persistent organizational knowledge), risk detection (identifies organizational risks from meeting patterns: misalignment signals — different teams making contradictory decisions about the same topic; teams working on the same problem without knowing about each other; blocker accumulation — increasing mentions of the same blocker across multiple meetings indicates a systemic issue that individual teams can't resolve; customer risk — increasing frequency of customer complaints mentioned in meetings; the system can flag accounts that appear in escalation discussions; resource contention — multiple teams requesting the same engineering resources in different meetings; the risk detection doesn't replace human judgment — it surfaces patterns that would be invisible to any individual meeting attendee)."
    weight: 0.35
    description: "KnowledgeAndRisk"
  - type: llm_judge
    criteria: "Response addresses implementation and privacy — implementation plan (builds the platform within constraints: the $200K budget and 1 FTE must be allocated efficiently: technology — leverage existing Notion API for data extraction; use a mid-tier NLP/AI service for text analysis; build dashboards in an existing BI tool (if available) or a lightweight platform; the 1 FTE manages the platform, curates the intelligence outputs, and partners with teams to act on insights; phased rollout: phase 1 (months 1-3) — standardize meeting note format in Notion, build the data pipeline, create the action item integration; phase 2 (months 4-6) — launch decision intelligence and action intelligence dashboards; begin risk detection; phase 3 (months 7-12) — add knowledge capture, meeting effectiveness analytics, and predictive capabilities; demonstrate ROI after phase 2 to justify continued investment), privacy and ethics (addresses the sensitivity of meeting intelligence: meeting data contains sensitive business information — the platform must have strong access controls; personal privacy — the system tracks organizational patterns, not individual behavior; it should not be used as a surveillance tool for employee monitoring; employees should know the system exists and understand its purpose; opt-out provisions — for meetings with confidential content, participants can exclude notes from the intelligence pipeline; data handling — AI processing of meeting notes must comply with the company's data governance policies; vendor agreements must prevent training on company data; the meeting intelligence platform is a strategic tool, not a compliance or HR surveillance tool — this distinction must be clear in its design and communication)."
    weight: 0.30
    description: "ImplementationAndPrivacy"
