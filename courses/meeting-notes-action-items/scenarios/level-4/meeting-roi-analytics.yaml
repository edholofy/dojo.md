meta:
  id: meeting-roi-analytics
  level: 4
  course: meeting-notes-action-items
  type: output
  description: "Meeting ROI analytics — design and implement a comprehensive analytics framework to measure the return on investment of meetings across an enterprise organization"
  tags: [analytics, roi, measurement, enterprise, optimization]

state: {}

trigger: |
  You're the Chief of Staff at a Fortune 500 financial
  services company (25,000 employees). The CEO saw a
  Harvard Business Review article claiming that "the average
  company wastes $25,000 per employee per year on
  unproductive meetings." She asked you to "figure out what
  meetings are actually costing us, which ones create value,
  and give me a plan to cut the waste."

  Data available:
  - Calendar data: 25,000 employees, all on Microsoft 365
  - Meeting room booking system: 800 conference rooms
  - Video conferencing: Microsoft Teams usage analytics
  - HR data: salary bands (anonymized), department structure
  - Project management: mix of Jira, Asana, and Monday.com
  - Employee engagement survey: quarterly, includes "meeting
    satisfaction" questions (current score: 3.1/5)
  - IT can provide aggregated (not individual) analytics

  Preliminary data points:
  - Average employee has 23 meetings per week
  - Average meeting duration: 47 minutes
  - 31% of meetings have no agenda distributed in advance
  - 64% of meetings end without documented decisions or
    action items
  - Meeting time has increased 34% since 2020 (hybrid work)
  - Executive team (C-suite + SVPs, 40 people) spend 72% of
    their work week in meetings
  - The company estimates $625M in annual meeting costs
    (salary time * meeting hours)
  - Meeting room utilization: rooms are booked 85% of the
    time but sensors show only 42% physical occupancy

  Privacy constraints:
  - Cannot track individual employee meeting behavior
  - Cannot record meetings without consent
  - Works council in Europe restricts meeting analytics
  - Union agreements in some regions limit productivity
    measurement

  Task: Design the meeting ROI analytics framework and
  optimization plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive meeting analytics framework — defines what meeting ROI means in practice (not just cost avoidance but value creation — decisions made, projects unblocked, relationships built, alignment achieved); establishes meeting categories with different ROI expectations (decision meetings, information sharing, brainstorming, status updates, 1:1s, all-hands); creates a measurement methodology that respects privacy constraints (aggregated analytics, opt-in surveys, outcome-based measurement rather than surveillance); addresses the $625M annual cost figure with a more nuanced analysis (not all meeting time is waste — the goal is to identify and eliminate the unproductive portion); provides a cost-of-meeting calculator that helps teams understand the true cost of their meeting practices."
    weight: 0.35
    description: "AnalyticsFramework"
  - type: llm_judge
    criteria: "Response provides specific optimization strategies — addresses the key data points: 31% of meetings without agendas (require agendas or cancel), 64% ending without decisions/actions (implement meeting output requirements), 42% physical occupancy vs 85% booking (optimize room allocation); provides meeting reduction strategies (meeting-free days, async alternatives, meeting time limits, attendee list optimization); addresses the executive meeting burden (72% of week in meetings is unsustainable — propose executive meeting audit and delegation); calculates potential savings from specific interventions (e.g., reducing average meetings from 23 to 18 per week saves X million); provides implementation priorities ranked by impact and feasibility."
    weight: 0.35
    description: "OptimizationStrategies"
  - type: llm_judge
    criteria: "Response addresses privacy, governance, and sustainability — navigates the privacy constraints (European works council, union agreements, individual tracking restrictions) with compliant analytics approaches; proposes a meeting governance structure (who owns meeting culture, how policies are enforced, escalation for meeting overload); includes a change management approach (meeting culture change requires executive sponsorship, manager training, and sustained attention); provides a dashboard design for the CEO showing meeting health metrics; addresses the hybrid work dimension (meetings increased 34% since 2020 — some of this is necessary for distributed teams); includes a measurement plan to track whether optimizations actually improve outcomes (not just reduce meeting hours)."
    weight: 0.30
    description: "PrivacyAndGovernance"
