meta:
  id: master-error-shift
  level: 5
  course: rest-api-error-handling
  type: output
  description: "Master error handling shift — navigate existential threats to API reliability while maintaining business continuity and regulatory compliance"
  tags: [REST, API, error-handling, shift-simulation, crisis, existential, master]

state: {}

trigger: |
  You're the CTO facing a perfect storm of API error handling crises
  that threaten the company's operations, compliance posture, and
  market position simultaneously.

  Crisis 1 — Zero-day in your error handling library:
  A security researcher disclosed a zero-day in the error handling
  middleware used by all 200 of your microservices. The vulnerability
  allows attackers to trigger specially crafted errors that cause the
  middleware to dump environment variables (including secrets) into
  the error response. The CVE was published 6 hours ago. You've
  confirmed that 3 endpoints have been exploited — error responses
  containing database credentials, API keys, and JWT signing secrets
  were captured by an attacker.

  Crisis 2 — Regulatory investigation:
  The EU Data Protection Authority opened an investigation after a
  consumer complaint that your API error messages expose their email
  address and account balance. The investigation found: PII in error
  responses (GDPR Art. 5 violation), error logs with EU citizen data
  stored in US servers (GDPR Art. 44 violation), and no data
  processing record for error data (GDPR Art. 30 violation). The
  authority set a 30-day remediation deadline. Potential fine: 4%
  of global revenue ($40M).

  Crisis 3 — Largest customer's API integration failure:
  Your largest customer ($15M ARR) experienced a critical integration
  failure. Your API returned 200 OK with an error in the body (a
  legacy endpoint that was supposed to be migrated). Their system
  treated it as success, processed $2M in incorrect transactions,
  and they're threatening both contract termination and litigation.

  Crisis 4 — Engineering talent exodus:
  Your VP of Platform Engineering and 4 senior SREs resigned this
  week, citing "unsustainable on-call burden" and "leadership doesn't
  prioritize reliability." They're joining a competitor. The remaining
  team of 8 cannot maintain the error handling infrastructure alone.

  Crisis 5 — Board emergency meeting:
  The board called an emergency session in 48 hours. They want a
  unified briefing. One board member demands "shut down all APIs
  until the security breach is contained." Another demands "no
  downtime — our stock price can't take another incident."

  Task: Navigate all 5 crises simultaneously. Write: the 48-hour
  action plan, the security incident response (credential rotation,
  forensics, disclosure), the GDPR remediation strategy, the customer
  recovery plan, the talent retention emergency measures, and the
  board presentation that unifies everything into a coherent response.

assertions:
  - type: llm_judge
    criteria: "Board presentation unifies all crises — shows interconnections (security breach worsens GDPR case, talent loss reduces remediation capacity, customer litigation increases board pressure), presents a single coherent strategy rather than 5 separate plans, and addresses both extremes (shut down vs no downtime)"
    weight: 0.35
    description: "Unified crisis board presentation"
  - type: llm_judge
    criteria: "Security and regulatory responses are technically and legally sound — rotates all compromised credentials within hours, traces the 3 exploited endpoints to identify all exposed data, GDPR remediation addresses all 3 violations within the 30-day deadline, and both responses coordinate (security evidence supports GDPR good-faith defense)"
    weight: 0.35
    description: "Sound security and regulatory response"
  - type: llm_judge
    criteria: "Customer and talent crises are addressed empathetically — customer recovery includes financial remediation for the $2M incorrect transactions, migration plan for the legacy 200-with-error endpoint, and relationship preservation. Talent retention addresses root causes (on-call burden, reliability investment) not just counter-offers"
    weight: 0.30
    description: "Empathetic customer and talent response"
