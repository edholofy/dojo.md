meta:
  id: error-regulatory-landscape
  level: 5
  course: rest-api-error-handling
  type: output
  description: "Navigate the API error handling regulatory landscape — map how global regulations shape error response and logging requirements"
  tags: [REST, API, regulatory, compliance, global, landscape, master]

state: {}

trigger: |
  You're the Chief Compliance Officer of a global API platform
  company operating in 25 countries. Regulations increasingly
  require specific controls over API error responses and error
  data handling.

  Current regulatory requirements affecting API error handling:

  1. EU GDPR (effective since 2018, enforcement intensifying):
  - Error responses must not expose personal data
  - Error logs containing PII must have retention limits
  - Right to erasure applies to error logs
  - Cross-border transfer of error data restricted
  - Penalty: up to 20M EUR or 4% of global turnover

  2. US State Privacy Laws (CCPA, CPRA, VCDPA, CPA, etc.):
  - Different PII definitions per state
  - Consumer right to know what error data is collected
  - Right to delete error logs containing personal data
  - Your APIs serve consumers in all 50 states

  3. PCI DSS v4.0 (effective March 2025):
  - Error responses must not expose card data (Req 3.4)
  - Error logs must be encrypted (Req 10.5)
  - Audit trails for all error events on cardholder data (Req 10.2)
  - Error monitoring with real-time alerts (Req 10.6)
  - Penalty: fines, loss of processing ability

  4. HIPAA (healthcare data):
  - Error responses must not expose PHI
  - Error logs are considered part of the designated record set
  - Minimum necessary standard applies to error detail
  - 6-year retention requirement for error audit trails

  5. EU Digital Operational Resilience Act (DORA, effective 2025):
  - ICT incident classification and reporting for API errors
  - Operational resilience testing (including error scenarios)
  - Third-party risk management for API dependencies
  - Major incident reporting within 4 hours

  6. India DPDP Act (effective 2025):
  - Data localization requirements for error logs
  - Error data processing requires consent basis
  - Cross-border transfer restrictions

  Emerging regulations:
  - EU AI Act: API error handling for AI model serving
  - Software Liability Directive: liability for API error damages
  - SEC Cybersecurity Rules: API incident disclosure requirements

  Task: Map the regulatory landscape. Write: the regulatory matrix
  (which regulations apply to which API error components), the
  unified compliance framework (one error handling policy satisfying
  all regulations), the conflict resolution approach (when regulations
  conflict), the implementation roadmap, and the board briefing on
  regulatory risk and investment needed.

assertions:
  - type: llm_judge
    criteria: "Regulatory matrix is comprehensive — maps each regulation to specific error handling controls (response sanitization, log encryption, retention periods, audit trails, cross-border data transfer, incident reporting timelines) and identifies overlapping and conflicting requirements"
    weight: 0.35
    description: "Comprehensive regulatory matrix"
  - type: llm_judge
    criteria: "Unified framework handles conflicts — addresses cases where HIPAA requires 6-year retention but GDPR requires deletion on request, where PCI DSS requires logging but GDPR requires minimization, and where DORA requires 4-hour reporting but gathering accurate error data takes longer"
    weight: 0.35
    description: "Conflict-resolving unified framework"
  - type: llm_judge
    criteria: "Board briefing quantifies regulatory risk — estimates potential fines per regulation, prioritizes compliance gaps by risk level, and the implementation roadmap phases work by regulatory deadline and penalty severity. Includes future-proofing for emerging regulations"
    weight: 0.30
    description: "Risk-quantifying board briefing"
