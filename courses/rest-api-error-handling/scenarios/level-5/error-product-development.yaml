meta:
  id: error-product-development
  level: 5
  course: rest-api-error-handling
  type: output
  description: "Build an API error handling product — design and launch a SaaS tool for API error management"
  tags: [REST, API, product, SaaS, startup, error-management, master]

state: {}

trigger: |
  You're founding a startup that builds API error handling tooling.
  Your insight: companies spend $50K-$500K/year on API error handling
  but use fragmented tools (Sentry for tracking, PagerDuty for
  alerting, Datadog for monitoring, custom dashboards for analytics).
  None of these are purpose-built for API error handling.

  Your product vision: "One platform for API error handling — from
  error format standardization to real-time monitoring to AI-powered
  resolution."

  Market research:
  - TAM: $8B (API management market, 15% is error handling)
  - SAM: $1.2B (companies with 50+ APIs)
  - SOM: $120M (companies adopting API-first strategies)
  - Competitors: Sentry (error tracking, not API-specific), Moesif
    (API analytics, not error-focused), Treblle (API observability,
    partial overlap)
  - Gap: No tool combines error format linting, error response
    testing, real-time error analytics, and AI error resolution

  Product features to evaluate:
  1. Error format linter (CI/CD integration, RFC 7807 compliance)
  2. Error response testing (contract testing for errors)
  3. Real-time error dashboard (per-endpoint, per-consumer)
  4. Error SLO tracking and budget management
  5. AI root cause analysis
  6. Error documentation generator (auto-generate error reference)
  7. Error SDK generator (generate client error handlers)
  8. Compliance scanner (PII in errors, audit trail gaps)

  Pricing models to consider:
  - Per API call (like Stripe)
  - Per endpoint monitored (like Datadog)
  - Per team seat (like Sentry)
  - Flat tier (like most SaaS)

  Task: Design the product strategy. Write: the MVP feature set
  (which 3 features to build first and why), the pricing strategy,
  the go-to-market plan (first customers, channels, positioning),
  the product roadmap (12 months), and the pitch deck outline for
  raising a $5M seed round.

assertions:
  - type: llm_judge
    criteria: "MVP feature selection is strategic — chooses 3 features that solve an immediate pain point, are differentiated from competitors, and have a clear path to expansion. The rationale considers build time, market demand, and competitive positioning"
    weight: 0.35
    description: "Strategic MVP selection"
  - type: llm_judge
    criteria: "Pricing strategy matches the market — considers the API-specific nature of the product, aligns pricing with customer value (not just cost), and the model encourages adoption without punishing growth. Includes a free tier for PLG and enterprise pricing for large deals"
    weight: 0.35
    description: "Market-matching pricing"
  - type: llm_judge
    criteria: "Go-to-market and pitch deck are compelling — identifies the ideal first customer profile, channels for reaching API teams (developer communities, conferences, content), and the pitch deck tells a story that resonates with seed investors (problem size, differentiation, team, business model)"
    weight: 0.30
    description: "Compelling GTM and pitch"
