meta:
  id: brand-sustainability-purpose
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Brand sustainability and purpose integration — embed genuine sustainability and social purpose into brand guidelines without greenwashing"
  tags: [sustainability, purpose, esg, authenticity, master]

state: {}

trigger: |
  Your consumer goods company ($3B revenue) has been under
  increasing pressure to integrate sustainability and social
  purpose into the brand:

  - 67% of consumers in key markets say they prefer brands
    with sustainability commitments
  - ESG investors representing 30% of the shareholder base
    want stronger brand-level sustainability communication
  - Two competitors have launched high-profile sustainability
    campaigns that are gaining market share
  - A consumer watchdog group published a report accusing the
    company of "greenwashing" after a marketing campaign
    highlighted a minor recycling initiative while ignoring
    the company's overall environmental footprint
  - Employees (especially under 35) are demanding the company
    take stronger public positions on social issues
  - The legal team is concerned about new EU regulations
    requiring substantiation for environmental claims in
    marketing

  The CEO wants to integrate sustainability and purpose into
  the brand "authentically" — learning from the greenwashing
  accusation — but the leadership team is divided:
  - CMO: "Purpose is our biggest brand opportunity"
  - CFO: "Purpose claims without data are a liability"
  - CLO: "EU Green Claims Directive means we can't say
    anything we can't prove"
  - CSO (Sustainability): "Our actual sustainability progress
    is real but not dramatic enough for marketing"

  Task: Create brand guidelines for sustainability and
  purpose communication that are authentic, compliant, and
  commercially effective.

assertions:
  - type: llm_judge
    criteria: "Response creates the authenticity framework — sustainability communication principles (establishes the foundational approach: authenticity-first framework — every sustainability claim in brand communications must meet 3 tests: is it true? (verifiable with data), is it material? (significant enough to communicate), is it complete? (doesn't cherry-pick while ignoring bigger issues); the greenwashing accusation revealed the danger of highlighting minor initiatives — the antidote is proportionality: the scale of the claim should match the scale of the action; substance before storytelling — the brand should only communicate sustainability achievements after they've been achieved, not aspirations as if they were accomplishments; 'We've reduced packaging waste by 30%' is a claim that requires evidence; 'We're committed to reducing packaging waste' is a commitment that requires a credible plan; both are valid communications but must be clearly distinguished; the tone should be honest and humble — acknowledge progress and shortcomings: 'We've reduced carbon emissions by 25%. We're proud of this progress, and we know there's more to do. Here's our plan for the next 25%'; avoid superlatives and absolutes: not 'the most sustainable' or 'eco-friendly' — these invite challenge and may violate emerging regulations), purpose brand positioning (integrates purpose into the brand identity: the brand's purpose should be authentic to its history, capabilities, and business model — not a cause grafted onto the brand for marketing; define the brand's 'purpose territory' — where do the company's capabilities, the market need, and genuine social/environmental impact intersect?; the purpose should feel inevitable, not opportunistic — 'Of course a consumer goods company that makes food products would care about sustainable agriculture'; purpose hierarchy — company purpose at the top (the big why), brand purpose (how the brand contributes to the company purpose), product purpose (how individual products deliver on the purpose); each level has specific, measurable commitments, not just aspirational statements; employee purpose alignment — the brand purpose must resonate internally before it's communicated externally; if employees don't believe it, customers won't either)."
    weight: 0.35
    description: "AuthenticityFramework"
  - type: llm_judge
    criteria: "Response creates the regulatory-compliant communication guidelines — claim substantiation framework (ensures all sustainability claims are defensible: claim categories — categorize sustainability claims by type: environmental claims (carbon, waste, water, biodiversity), social claims (labor practices, community impact, diversity), product claims (ingredients, sourcing, certifications); each category has different substantiation requirements; evidence requirements by claim type: quantitative claims ('reduced emissions by 25%') require: specific data, measurement methodology, baseline comparison, independent verification if possible; comparative claims ('lower impact than conventional alternatives') require: lifecycle assessment data, transparent methodology, and clear scope definition; aspirational claims ('committed to net zero by 2040') require: a credible roadmap, interim targets, and regular progress reporting; prohibited claims — the brand guidelines explicitly prohibit: vague claims like 'eco-friendly' or 'green' without specific substantiation; claims that highlight minor actions while ignoring larger impacts (the exact mistake that triggered the greenwashing accusation); claims about intentions presented as achievements), EU Green Claims Directive compliance (addresses the specific regulatory requirement: the EU directive requires companies to substantiate environmental claims with scientific evidence; brand guidelines for EU markets must include: mandatory review process — all environmental claims in marketing must be reviewed by the sustainability team and legal before publication; pre-approved claim library — a set of environmental claims that have been substantiated, reviewed, and approved for use; teams can use these claims without additional review; prohibited language list — terms and phrases that cannot be used in EU markets without specific substantiation; the compliance framework should apply globally, not just in the EU — building materials for the highest regulatory standard prevents problems in all markets), visual sustainability communication (guides how sustainability is presented visually: avoid generic green imagery — stock photos of leaves, forests, and blue skies are the visual equivalent of greenwashing; use real imagery: actual packaging, actual facilities, actual people involved in sustainability initiatives; certification and label usage — which certifications has the company earned? how should they be displayed on packaging and marketing? only display certifications that are current and relevant; data visualization — when presenting sustainability data, follow information design best practices: clear labels, honest scales, context for the numbers; sustainability color palette — the brand may use green tones for sustainability content but should also use its primary brand colors to avoid the appearance of a separate 'sustainability brand' that's disconnected from the main brand)."
    weight: 0.35
    description: "ComplianceGuidelines"
  - type: llm_judge
    criteria: "Response addresses stakeholder communication and evolution — stakeholder-specific sustainability messaging (tailors communication for each audience: consumers — focus on product-level sustainability: what does this product's sustainability mean for me? clear, simple claims with easy verification; avoid overwhelming consumers with corporate sustainability data; investors and ESG analysts — detailed sustainability data aligned with reporting frameworks: SASB, GRI, TCFD; brand guidelines for ESG communications: data-rich, transparent about methodology, and honest about challenges; employees — internal sustainability communication that connects daily work to the company's sustainability mission; employees should be able to explain the company's sustainability position in their own words; media — press materials with substantiated claims, data sources, and expert contacts; proactive transparency prevents reactive crisis management; regulators — compliance documentation showing how the company meets current and upcoming regulatory requirements; each stakeholder has different information needs, different trust thresholds, and different response to sustainability messaging; the brand guidelines provide channel-specific templates and language for each audience), ongoing sustainability brand management (creates a sustainable approach to sustainability communication: annual sustainability communication plan — aligned with the company's sustainability milestones and reporting cycle; the communication plan should have a rhythm: quarterly progress updates, annual comprehensive report, milestone announcements as they're achieved; brand guidelines evolution — the sustainability section of the brand guidelines must evolve as: the company's sustainability performance improves, regulations change, consumer expectations shift, and new sustainability topics emerge; review the sustainability guidelines semi-annually; measurement — track whether sustainability communication is working: consumer perception of the brand's sustainability commitment, media sentiment analysis on sustainability coverage, employee understanding and belief in the sustainability mission, investor ESG score trends; greenwashing prevention audit — annual review of all sustainability claims currently in market: are they still accurate? are they still compliant? are they proportionate to the company's actual impact? this annual audit prevents the accumulation of outdated or misleading claims that trigger greenwashing accusations)."
    weight: 0.30
    description: "StakeholderAndEvolution"
