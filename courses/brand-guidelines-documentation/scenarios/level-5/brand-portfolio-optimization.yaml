meta:
  id: brand-portfolio-optimization
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Brand portfolio optimization — rationalize and optimize a complex multi-brand portfolio, deciding which brands to keep, merge, retire, or create"
  tags: [portfolio, optimization, rationalization, multi-brand, master]

state: {}

trigger: |
  You're the Group Brand Director for a holding company that
  has accumulated 23 brands through organic growth and
  acquisitions over 15 years:

  - 5 major brands (each $100M+ revenue, strong market position)
  - 8 mid-tier brands ($20-80M revenue, varying market strength)
  - 6 niche brands ($5-15M revenue, small but loyal audiences)
  - 4 legacy brands (under $5M revenue, declining)

  The problems:
  - Several brands compete with each other in the same markets
  - Customers are confused about which brand to choose
  - Marketing spend is fragmented across 23 brands with no
    economies of scale
  - Brand guidelines exist for 8 of the 23 brands; the rest
    operate informally
  - The total brand management cost is $18M/year across all
    brands
  - Private equity investors want to see the portfolio
    rationalized before the planned IPO in 18 months

  The Group CEO says: "We need to go from 23 brands to a
  portfolio that makes strategic sense. Some brands merge,
  some retire, maybe we create a new corporate brand. But
  every brand decision needs to be data-driven and defensible
  to investors."

  Task: Create the brand portfolio strategy, rationalization
  plan, and guidelines for the optimized portfolio.

assertions:
  - type: llm_judge
    criteria: "Response creates the portfolio analysis framework — brand portfolio assessment (evaluates each brand systematically: scoring matrix — rate each of the 23 brands on: revenue and growth trajectory, brand equity and awareness, market position and differentiation, customer loyalty and retention, strategic fit with portfolio direction, cost to maintain; category mapping — plot brands on a matrix: brand strength (x-axis) vs market attractiveness (y-axis); this reveals which brands are stars, which are cash cows, which are question marks, and which are candidates for retirement; competitive overlap analysis — identify where brands compete with each other: are there 3 brands targeting the same customer segment? which brand has the strongest position in each segment?; customer confusion audit — research reveals where customers struggle to differentiate between portfolio brands; the overlap is destroying value, not creating it), portfolio strategy recommendation (defines the target portfolio: from 23 to approximately 8-12 brands: the 5 major brands — likely retained with clearer positioning and differentiation; the 8 mid-tier brands — evaluated individually: 3-4 merged into major brands, 2-3 retained as distinct brands, 1-2 retired; the 6 niche brands — evaluated for strategic value: 2-3 retained if they serve unique audiences the majors can't reach; 2-3 merged or retired; the 4 legacy brands — likely retired or merged unless they have significant heritage value; new corporate brand — consider creating a holding company brand that endorses the portfolio brands; this creates corporate visibility for the IPO without disrupting individual brand equity; the strategy should be defensible with data — each decision is justified by the scoring matrix, customer research, and financial analysis)."
    weight: 0.35
    description: "PortfolioAnalysis"
  - type: llm_judge
    criteria: "Response designs the execution and transition plan — brand rationalization execution (plans the transition: phase 1 (months 1-3) — immediate actions: retire the 4 legacy brands; they're the lowest-risk changes; redirect their customers to the appropriate major or mid-tier brand; this saves $1-2M annually in brand maintenance costs; phase 2 (months 4-9) — brand mergers: execute the planned mergers; each merger follows a structured integration process: customer communication, visual identity transition, redirect and migration plan, and retention monitoring; phase 3 (months 10-15) — portfolio optimization: position the retained brands with clear, non-overlapping positioning; launch the corporate brand if recommended; update all portfolio brand guidelines; phase 4 (months 16-18) — IPO readiness: the portfolio tells a clear strategic story for investors; each brand has a defined role, target market, and growth trajectory; the brand architecture is documented and presentable; each phase has: specific brand actions, customer migration plans, cost savings projections, and risk mitigation strategies), brand retirement and migration guidelines (manages the sensitive process of ending brands: customer-first approach — every brand retirement starts with the customer: how are they affected? what changes for them? how do they benefit from the migration?; communication sequence: announcement → transition period → migration → legacy brand sunset; customer retention is the primary success metric — if a brand retirement causes significant customer churn, the execution plan needs adjustment; employee impact — employees associated with retired brands need support: their work continues under a different brand name; honor the legacy of the retired brand internally while moving forward; partner and channel communication — partners may have co-branded materials with retired brands; provide clear timelines and support for transitioning to the new brand relationships; digital migration — redirect all retired brand web properties, update SEO, and transfer social media followers where possible)."
    weight: 0.35
    description: "ExecutionPlan"
  - type: llm_judge
    criteria: "Response creates the optimized portfolio brand guidelines — portfolio brand architecture guidelines (documents the rationalized portfolio: brand hierarchy — clear visual diagram of the portfolio: corporate brand at the top, major brands, sub-brands, and product brands; the architecture should be immediately understandable to investors, employees, and customers; positioning map — each retained brand has a clear, non-overlapping positioning statement; a visual market map shows how the brands serve different segments without competing; brand relationship rules — how brands in the portfolio relate to each other: can they be co-marketed? do they cross-reference? how does the corporate brand endorse them?; naming conventions — rules for new products and acquisitions: how are new brands added to the portfolio? what criteria determine whether a new acquisition keeps its brand or is absorbed?), individual brand guidelines within the portfolio (creates guidelines for each retained brand: each major brand gets comprehensive guidelines: visual identity, voice and tone, messaging, applications; mid-tier and niche brands get streamlined guidelines: visual identity, voice basics, key messaging, and template library; shared elements — typography, grid system, and design principles shared across the portfolio create family resemblance; distinct elements — each brand has unique colors, imagery style, and voice that differentiate it within the portfolio; the corporate brand guidelines define: the corporate visual identity, how it endorses portfolio brands, corporate communications voice and tone, and investor-facing brand standards), investor-ready brand documentation (prepares the brand for IPO: brand strategy deck — a concise presentation for investors: the portfolio strategy, brand architecture, market positioning, and brand equity metrics; brand asset valuation — estimated brand equity for the portfolio and individual brands; brand risk assessment — identified risks to brand equity and mitigation strategies; brand governance summary — how the portfolio is managed: governance structure, guidelines infrastructure, compliance measurement; the brand documentation should tell a compelling story — not just 'we have 10 brands' but 'our portfolio of 10 strategically positioned brands serves X markets with Y combined revenue and Z% brand-attributed customer loyalty')."
    weight: 0.30
    description: "PortfolioGuidelines"
