meta:
  id: master-brand-shift
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Master brand shift — navigate an existential brand crisis where the company must fundamentally reimagine its brand identity while managing a live business"
  tags: [shift, master, existential, reimagine, transformation]

state: {}

trigger: |
  You're the Chief Brand Officer of a publicly traded social
  media company ($5B revenue, 15,000 employees, 500M users)
  facing an existential brand crisis:

  1. Congressional Testimony: The CEO testified before Congress
     about the platform's impact on teen mental health. The
     testimony went badly — clips of the CEO's evasive answers
     are viral. The company's brand is now associated with
     "harmful to children" in public perception.

  2. Advertiser Exodus: Major advertisers are pausing campaigns.
     Ad revenue is down 25% this quarter. Advertisers don't
     want their brands associated with the company's reputation.

  3. Regulatory Threat: Three countries are considering banning
     the platform. Regulators in 12 more are introducing
     restrictive legislation specifically targeting the company.

  4. Employee Morale: 30% of employees have updated their
     LinkedIn profiles to remove the company name. Internal
     surveys show record-low pride in working at the company.
     Top talent is leaving for competitors.

  5. User Trust Collapse: User trust surveys show a 40-point
     drop in favorability. While daily active users haven't
     declined significantly yet, engagement time is dropping
     and competitive platforms are growing.

  6. Stock Impact: The stock has dropped 35% since the
     Congressional testimony. The board is considering whether
     a corporate rebrand (like Facebook → Meta) would help
     or be seen as cynical deflection.

  The board chair tells you: "Fix the brand. But don't
  just put lipstick on a pig. We need genuine transformation
  that stakeholders believe. You have 24 months, the CEO's
  full support, and whatever budget you need — but the first
  90 days will determine whether we survive this."

  Task: Create the comprehensive brand transformation
  strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates the crisis stabilization and 90-day plan — immediate crisis response (the first 30 days: brand communication lockdown — pause all marketing that doesn't address the crisis; no happy product updates while the brand is associated with child harm; every external communication must acknowledge the reality; CEO communication — the CEO needs brand coaching immediately: the evasive testimony damaged the brand as much as the underlying issues; the CEO must become the face of accountability and change; draft a CEO public statement that is: genuinely accountable, specific about planned actions, and not defensively corporate; stakeholder triage — identify and prioritize all stakeholder groups: regulators, advertisers, users, employees, parents, press, and investors; each group has different concerns and needs different communication; the first 30 days are about stopping the bleeding and demonstrating that the company understands the severity), 90-day action plan (establishes the foundation for transformation: substance before messaging — the brand can't recover through communication alone; the company must announce and begin implementing meaningful product changes: new safety features for young users, independent safety audits, transparent reporting of safety metrics; these actions give the brand something real to communicate; advertiser confidence — a dedicated program for top advertisers: personal executive outreach, detailed briefings on safety improvements, flexible campaign terms, and brand safety guarantees; the goal is to stop the exodus and begin recovery; employee program — internal town halls where leadership is genuinely transparent about the crisis and the plan; action items employees can contribute to: volunteer for the safety initiative, join the brand recovery task force; give employees reasons to be proud again; 90-day milestones — specific, measurable deliverables for each workstream; weekly progress reviews with the CEO; the 90-day plan must show visible, credible progress that skeptical stakeholders can point to)."
    weight: 0.35
    description: "CrisisStabilization"
  - type: llm_judge
    criteria: "Response addresses long-term brand transformation strategy — brand identity transformation (reimagines the brand for the post-crisis era: rebrand assessment — should the company rebrand? analysis: a corporate name change (like Facebook → Meta) risks being seen as evasion — running from the problem rather than fixing it; however, if the current brand is permanently toxic, continuing under it may be impossible; the decision framework: if the company genuinely transforms its practices, the existing brand can be rehabilitated and the recovery story becomes powerful; if internal research shows the brand is irreparably damaged, a rebrand with genuine transformation (not just a name change) may be necessary; the recommendation should be data-driven and honest about both paths; brand repositioning — regardless of name, the brand must evolve: from 'growth at any cost' to 'responsible innovation'; from 'engagement-optimized' to 'well-being-informed'; from 'connecting the world' to 'connecting the world safely'; the new positioning must be substantiated — the brand can only claim what the product delivers; brand values evolution — the company's values must visibly change: add 'safety' and 'accountability' as non-negotiable brand values; these aren't marketing slogans — they're operational commitments with measurable standards; the brand guidelines must encode these values into every aspect of the brand expression), stakeholder trust reconstruction (rebuilds trust with each audience: user trust — transparent safety dashboard showing real-time metrics: content moderation actions, safety feature usage, user well-being measurements; give users more control over their experience and communicate these controls clearly; parent trust — specific programs and communication for parents: parental controls enhanced and promoted, regular safety reports, parent advisory council; advertiser trust — brand safety infrastructure with transparent reporting; premium ad placements with verified safe content environments; regular advertiser brand safety briefings; regulatory trust — proactive engagement rather than defensive lobbying; share safety data transparently; invite regulatory input on safety features; employee trust — the hardest to rebuild: leadership must be genuinely accountable; communicate the transformation plan with honesty about the timeline and challenges; create opportunities for employees to contribute to the solution; investor trust — present the brand transformation as a long-term value protection strategy; the alternative to transformation is increasing regulation, declining user trust, and continued advertiser departures)."
    weight: 0.35
    description: "LongTermTransformation"
  - type: llm_judge
    criteria: "Response creates the transformed brand guidelines and measurement — transformed brand guidelines (documents the post-crisis brand: the new brand guidelines are a visible artifact of the transformation; brand foundation — completely rewritten: new mission centered on responsible innovation and user well-being; values that include safety, accountability, and transparency as operational commitments, not aspirational slogans; brand voice — evolved from 'optimistic tech company' to 'mature, accountable technology platform'; the voice should project: humility (we hear the criticism and take it seriously), determination (we're committed to doing better), competence (we have the expertise to solve these problems), and transparency (we'll show our work and be honest about our progress); visual identity — if the brand retains its name: an evolution that signals maturity and responsibility without pretending the crisis didn't happen; if the brand renames: a completely new visual identity that signals the genuine transformation; crisis communication section — the brand guidelines now include a comprehensive crisis playbook informed by this experience; the playbook ensures the company never again appears evasive, defensive, or uncaring in a crisis; safety communication guidelines — how the brand communicates about safety features, safety data, and safety commitments; this section didn't exist before and its inclusion signals the brand's transformation), transformation measurement (tracks whether the brand recovers: 30/60/90/180-day milestone tracking — specific metrics at each interval: brand favorability scores, advertiser return rate, employee pride index, user trust surveys, regulatory relationship quality, stock price recovery; 24-month transformation scorecard — the ultimate success metrics: brand favorability returns to pre-crisis levels or higher; advertiser revenue recovers to pre-crisis levels; employee Glassdoor rating improves to 4.0+; user trust metrics stabilize and begin recovering; regulatory relationships are constructive rather than adversarial; the brand is associated with 'safety leadership' rather than 'harmful to children'; honest assessment — if the transformation metrics are not on track at 12 months, the strategy needs fundamental reassessment; the measurement framework must include a mechanism for pivoting if the current approach isn't working; the brand transformation is not a PR campaign — it's a genuine organizational change that the brand guidelines document and reinforce; the guidelines serve as both the aspiration and the accountability mechanism for the transformation)."
    weight: 0.30
    description: "TransformedGuidelinesAndMeasurement"
