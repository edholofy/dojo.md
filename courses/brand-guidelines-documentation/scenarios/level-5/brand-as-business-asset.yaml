meta:
  id: brand-as-business-asset
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Brand as business asset — position and manage brand as a strategic business asset with valuation, protection, and board-level governance"
  tags: [asset, valuation, protection, board, master]

state: {}

trigger: |
  You're the Chief Brand Officer reporting directly to the CEO
  of a publicly traded technology company ($2B market cap).
  The board has asked you to present a comprehensive brand
  asset management strategy because:

  - The company is considering an acquisition where the target's
    brand equity is a significant portion of the purchase price
  - A competitor has filed a trademark challenge against one of
    the company's product names in 3 markets
  - Analysts have noted that the company's brand value has
    declined 15% in the latest Interbrand/Brand Finance rankings
  - The board wants to understand: what is our brand worth, how
    do we protect it, and how do we grow its value?
  - The CFO questions whether brand spending is an expense or
    an investment and wants a framework for evaluating brand
    decisions financially

  The board chair says: "We discuss our financial assets,
  intellectual property, and real estate at every board meeting.
  Brand is our largest intangible asset and we never discuss
  it strategically. That changes now."

  Task: Create the brand asset management framework for
  board-level governance.

assertions:
  - type: llm_judge
    criteria: "Response creates the brand valuation and tracking framework — brand valuation methodology (establishes how to measure brand value: select and implement a brand valuation approach: income approach — isolate the revenue attributable to brand vs product features and pricing; calculate the brand's contribution to customer acquisition, retention, and willingness to pay premium pricing; market approach — benchmark against comparable brand transactions; what have similar brands sold for in M&A?; cost approach — what would it cost to build equivalent brand awareness, perception, and loyalty from scratch?; the company should track brand value using a consistent methodology annually; trend data is critical — the 15% decline needs context: is it a measurement anomaly, a competitive shift, or a genuine brand weakness?; brand value should be reported alongside other intangible asset values: patents, customer relationships, and proprietary technology; present brand value as a percentage of market cap — for many technology companies, brand represents 20-40% of enterprise value), brand health indicators (creates a leading indicator system: brand health should be tracked more frequently than annual valuations: quarterly metrics — brand awareness (aided and unaided), brand consideration in purchase decisions, brand preference vs competitors, customer NPS and loyalty, employee brand advocacy; annual metrics — brand equity valuation, brand contribution to revenue analysis, brand strength index; competitive metrics — share of voice, competitive brand perception comparison, category ownership for key brand attributes; the health indicators serve as early warnings — a decline in brand consideration predicts future revenue impact; by the time brand value drops in annual rankings, the underlying metrics have been declining for quarters; create a 'brand health dashboard' that the board reviews quarterly alongside financial metrics)."
    weight: 0.35
    description: "ValuationFramework"
  - type: llm_judge
    criteria: "Response addresses brand protection and IP management — brand protection strategy (defends the brand asset: trademark portfolio management — audit all trademarks across all markets; identify gaps in protection; file registrations in key markets where the brand operates or plans to expand; the competitor's trademark challenge requires immediate action: engage IP counsel in the 3 affected markets; document prior use, brand confusion risk, and market impact; proactive monitoring — implement a trademark monitoring service that alerts to potential infringements, similar registrations, and unauthorized use; domain name management — protect key domain variations across TLDs; monitor for cybersquatting and typosquatting; brand misuse response protocol — define how the company responds to different types of brand misuse: counterfeits, unauthorized resellers, parody/satire, employee misuse; each type has a different response: cease and desist, legal action, negotiation, or monitoring), digital brand protection (addresses modern brand threats: social media impersonation — monitor for fake accounts and impersonation; rapid response process for takedown requests; search engine brand protection — monitor branded keyword advertising by competitors; protect brand-related search terms; review site management — monitor Glassdoor, G2, Trustpilot, and other review platforms; respond to reviews in brand voice; negative brand content — monitor for damaging content; response protocols by severity and source; AI and brand — monitor how AI tools reference and represent the brand; if AI chatbots provide inaccurate brand information, have a process for correction), brand in M&A (creates the framework for brand valuation in acquisitions: due diligence framework — when evaluating an acquisition target's brand: assess brand equity, trademark strength, customer association, brand consistency, and potential liabilities; determine what percentage of the acquisition premium is attributable to brand value; integration planning — will the acquired brand be retained, merged, or retired? each scenario has different value implications; the decision framework should consider: brand equity value, customer attachment, market positioning, and integration costs; risk assessment — brand liabilities: trademark disputes, negative brand associations, pending litigation, brand promise gaps; these should be quantified and factored into the acquisition price)."
    weight: 0.35
    description: "BrandProtection"
  - type: llm_judge
    criteria: "Response creates board-level governance and brand growth strategy — board-level brand governance (establishes brand as a board-level topic: brand committee — a board sub-committee (like audit or compensation committees) focused on brand and reputation; meets quarterly; reviews: brand health metrics, brand valuation trends, brand risk assessment, and brand investment ROI; brand report format — a standardized quarterly report for the board: 1-page brand health summary with key metrics and trends; brand risk register with new and evolving risks; competitive brand landscape update; brand investment summary with ROI analysis; the report should be as rigorous and data-driven as financial reports; the CBO presents to the board quarterly alongside the CFO and CEO; brand governance policies — board-approved policies for: brand architecture changes, brand extension decisions, brand crisis response authority, brand investment thresholds requiring board approval; these policies ensure brand decisions receive appropriate oversight without creating bottlenecks for operational brand management), brand growth strategy (plans to reverse the 15% decline and grow brand value: diagnose the decline — analyze which brand health metrics are driving the valuation decrease: is it awareness? perception? loyalty? competitive pressure?; invest in the weakest metrics: if awareness is strong but perception is declining, focus on brand experience and communication quality; brand extension evaluation — the company should have a framework for evaluating brand extension opportunities: does the extension strengthen or dilute the brand? is there brand permission for this category? what's the expected impact on brand value?; brand investment optimization — use the valuation data to optimize brand spending: which investments have the highest brand value ROI? reallocate from low-impact to high-impact brand activities; the brand growth strategy should include 3-year projections — what brand value target should the company set for each of the next 3 years? the targets should be ambitious but achievable, supported by specific investment plans; the CFO's question is answered: brand spending is an investment with measurable returns when managed strategically; the framework should demonstrate this with historical data and forward projections)."
    weight: 0.30
    description: "BoardGovernance"
