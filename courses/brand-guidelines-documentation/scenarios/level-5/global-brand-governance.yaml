meta:
  id: global-brand-governance
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Global brand governance — design governance systems for managing brand consistency across 50+ countries with diverse cultural, regulatory, and market requirements"
  tags: [global, governance, international, cultural, master]

state: {}

trigger: |
  You're the Global Brand Director for a consumer technology
  company operating in 52 countries with regional headquarters
  in New York, London, Singapore, São Paulo, and Dubai:

  - 8,000 employees, 200+ involved in brand-related work
  - Products sold through direct channels, retail partners,
    and online marketplaces in each market
  - Each regional HQ has a marketing team of 15-30 people
    with their own creative agencies
  - The brand launched in the US 10 years ago and expanded
    internationally over the last 5 years

  Current state:
  - The US brand experience is excellent — consistent, modern,
    well-executed
  - European markets have adapted the brand well but use
    different agencies with slightly different interpretations
  - APAC markets have made significant unauthorized adaptations:
    different color usage, modified logo, localized taglines
    that weren't approved
  - Latin American markets are 2 versions behind on the brand
    guidelines and are using retired brand assets
  - Middle Eastern markets face unique challenges: right-to-
    left layouts, cultural sensitivities around imagery, and
    different social media platforms
  - Partner and retail materials vary wildly by market
  - Brand guidelines exist only in English — non-English-
    speaking teams work from informal translations

  The CEO says: "We're one company. A customer in Tokyo
  should recognize the same brand they see in New York. But
  we also need to respect local markets. How do we solve
  this?"

  Task: Design the global brand governance system.

assertions:
  - type: llm_judge
    criteria: "Response creates the global-local brand framework — brand flexibility framework (defines what's fixed and what's flexible globally: immutable brand elements — these never change regardless of market: logo mark and wordmark — identical worldwide; master brand colors — primary palette used consistently; core brand voice attributes — the personality DNA is universal; brand values and mission — consistent across all markets; brand architecture — the relationship between master brand and products; adaptable brand elements — these can flex within defined parameters: secondary color usage — regional accent colors may be added with approval; photography and imagery — local talent, local settings, but following the global imagery style guidelines; tagline — may be translated or culturally adapted, not just literally translated; content and messaging — localized for cultural relevance while maintaining brand voice; market-specific elements — created locally within the framework: social media content for local platforms — WeChat, LINE, VK, etc; local partnership and retail materials; market-specific campaign adaptations; for each adaptable element, define: what can change, what can't, who approves changes, and examples of good vs bad adaptations), cultural adaptation guidelines (provides frameworks for cultural sensitivity: imagery guidelines by region — Middle East: guidelines for modest representation, gender portrayal, and cultural symbols to avoid; APAC: guidelines for color symbolism, gesture meanings, and cultural references; Latin America: guidelines for family representation, humor, and cultural celebrations; Europe: guidelines for multilingual markets, privacy sensitivity, and regional identity; RTL layout guidelines — comprehensive rules for Arabic, Hebrew, and Urdu markets: layout mirroring, text direction, icon adjustments, and reading flow; name and terminology guidelines — how brand names, product names, and key terms are handled across languages: which names are transliterated, which are translated, which remain in English; cultural review process — all major campaigns in new markets must be reviewed by a local cultural advisor before launch; this prevents embarrassing cultural missteps that damage the brand)."
    weight: 0.35
    description: "GlobalLocalFramework"
  - type: llm_judge
    criteria: "Response designs the governance infrastructure — organizational governance model (creates the global brand management structure: global brand team — 6-8 people at HQ responsible for: brand strategy, global guidelines, immutable brand element governance, and regional support; regional brand directors — one per regional HQ: responsible for brand management across their markets, adapting global guidelines for regional needs, managing regional agencies, and escalating significant deviations; market brand coordinators — one per major market: the day-to-day brand manager for their country, responsible for local compliance, local content creation within guidelines, and partner/retail brand management; global brand council — quarterly meeting of the global brand director, regional brand directors, and key stakeholders; reviews global brand health metrics, approves significant adaptations, and resolves cross-regional brand conflicts; this structure provides global consistency with local expertise), approval and review workflows (defines who approves what: tier 1 local self-serve — using approved templates and guidelines: local social media content, local event materials, routine partner communications; market brand coordinator reviews; tier 2 regional approval — new materials or significant adaptations: regional campaigns, partner co-branding, new channel launches; regional brand director approves with 5-day SLA; tier 3 global approval — immutable element changes or precedent-setting adaptations: modifications to logo usage in a new context, new tagline adaptations, brand architecture extensions; global brand team approves with 10-day SLA; the tiered system prevents bottlenecks — 80% of materials should be tier 1 self-serve if the templates and guidelines are comprehensive enough), technology platform for global governance (implements the infrastructure: multilingual brand platform — the guidelines must be available in the 10 most common languages across the 52 markets; not machine-translated — professionally localized with cultural context; DAM with regional access — global assets available to all; regional assets available to their region; market-specific assets available to their market; template library by market — templates pre-configured for local formats, languages, and requirements; global analytics dashboard — track brand compliance, asset usage, and guidelines engagement across all markets; identify which markets are most and least compliant and target support accordingly)."
    weight: 0.35
    description: "GovernanceInfrastructure"
  - type: llm_judge
    criteria: "Response addresses remediation and continuous improvement — current-state remediation (fixes the existing problems: APAC unauthorized adaptations — meet with APAC teams to understand why they deviated; often it's because the global guidelines didn't address their needs; incorporate legitimate adaptations into the guidelines framework; replace unauthorized adaptations with approved versions; Latin American guidelines gap — immediately provide updated guidelines in Spanish and Portuguese; conduct training sessions for LATAM teams; assign dedicated support during the transition period; Middle Eastern challenges — develop comprehensive RTL and cultural sensitivity guidelines; these should be created in partnership with the Dubai regional team, not imposed from HQ; partner and retail consistency — create a partner brand portal with market-specific assets; establish partner material approval requirements with local enforcement; the remediation should feel supportive, not punitive — teams deviated because the system didn't serve them, not because they wanted to damage the brand), continuous improvement system (ensures the governance system improves over time: quarterly global brand health report — compliance scores by region and market, brand perception by market, asset usage analytics, and support request patterns; annual global brand summit — bring together all regional brand directors and key market coordinators for: a review of the past year's brand performance, sharing of best practices across regions, collaborative planning for the coming year, and guidelines updates based on regional feedback; feedback loops — regional teams can propose guidelines changes through a formal process; if the Middle Eastern team develops an elegant RTL solution, it should be incorporated into the global guidelines for other RTL markets; the governance system is a partnership, not a hierarchy — the global team sets standards and provides resources; regional teams provide cultural expertise and market knowledge; the best global brand governance systems are built together, evolving through collaboration rather than top-down mandates)."
    weight: 0.30
    description: "RemediationAndImprovement"
