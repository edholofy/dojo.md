meta:
  id: brand-cultural-transformation
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Brand cultural transformation — align organizational culture with brand promise to eliminate the gap between what the brand says and what the company does"
  tags: [culture, transformation, alignment, internal, master]

state: {}

trigger: |
  You're brought in as the Chief Brand Officer for a healthcare
  technology company ($500M revenue, 3,000 employees) where
  a massive gap exists between the external brand and internal
  reality:

  External Brand Promise:
  - "Patient-first technology" — marketing positions the
    company as deeply caring about patient outcomes
  - "Transparency in healthcare" — the brand advocates for
    data transparency and open communication
  - "Innovation that matters" — positioning as a mission-
    driven innovator, not just a tech vendor

  Internal Reality:
  - Revenue targets override patient outcome discussions in
    every product meeting
  - Sales teams are incentivized to upsell features hospitals
    don't need
  - Employee surveys show 60% feel the company prioritizes
    profit over mission
  - The engineering team ships features based on competitive
    pressure, not patient need
  - Internal communication is opaque — employees learn about
    company changes from press releases
  - Glassdoor rating is 2.8 stars with reviews calling the
    company "hypocritical"
  - A recent investigative article highlighted the gap between
    the brand's patient-first messaging and its aggressive
    sales tactics

  The board has given you 18 months and direct CEO support
  to align the culture with the brand — or acknowledge that
  the brand promise needs to change.

  Task: Design the brand-culture alignment program.

assertions:
  - type: llm_judge
    criteria: "Response creates the diagnostic framework and strategic decision — brand-culture gap analysis (systematically maps the disconnect: for each brand promise, document the internal reality: 'Patient-first technology' → reality: product roadmap driven by competitive features, not patient outcomes; sales incentives reward revenue, not patient impact; 'Transparency in healthcare' → reality: internal communication is opaque; employees learn news externally; 'Innovation that matters' → reality: innovation is market-driven, not mission-driven; root cause analysis — is the brand promise wrong, or is the culture wrong? in healthcare technology, a patient-first brand promise is not just marketing — it's a market requirement; hospitals want partners who genuinely prioritize patient outcomes; the brand promise is strategically correct — the culture needs to change; however, acknowledge the tension: culture change is harder and slower than brand change; the program must be genuine, not performative), strategic alignment decision (makes the fundamental choice: the brand promise stays — 'Patient-first technology' is the right positioning for this market; the culture must evolve to match; this is not a branding project — it's a cultural transformation that starts with the brand as the North Star; the brand guidelines become the cultural constitution — they define not just how the company looks and sounds but how it behaves; the program has three pillars: operational alignment — change processes and incentives to reward brand-aligned behavior; communication alignment — make internal communication match external transparency claims; product alignment — ensure product decisions are informed by patient outcomes, not just competitive pressure; success metric — the Glassdoor rating moving from 2.8 to 4.0+ within 18 months, and employee brand belief survey showing 80%+ alignment)."
    weight: 0.35
    description: "DiagnosticAndStrategy"
  - type: llm_judge
    criteria: "Response creates the operational transformation plan — incentive and process redesign (aligns organizational mechanics with brand values: sales incentive restructuring — introduce patient outcome metrics alongside revenue targets; sales compensation includes: customer satisfaction scores, product adoption and usage metrics, and client retention; the incentive change is the most impactful intervention — what gets measured and rewarded gets done; product roadmap governance — create a 'patient impact assessment' for every feature: how does this improve patient outcomes? is there clinical evidence? the assessment doesn't block all competitive features but ensures patient impact is part of every decision; hiring and performance — the brand values become hiring criteria: do candidates demonstrate patient-first thinking? performance reviews include brand-values behavioral assessment; leadership modeling — executives must visibly embody the brand values; their decisions, communications, and priorities set the cultural tone), internal communication transformation (walks the transparency talk: open communication cadence — monthly all-hands with honest updates: business performance, challenges, and decisions with rationale; employees should hear company news internally before they read it in the press; leadership accessibility — regular ask-me-anything sessions where employees can question decisions; the CEO should model the transparency the brand promises; failure and learning culture — share product failures and what was learned; share deals lost and why; the brand promises transparency — internal communication must be genuinely transparent, not corporate PR; employee voice — create channels for employees to raise concerns about brand-culture misalignment without fear of retaliation; if a salesperson sees pressure to upsell unnecessary features, there should be a safe way to flag this), brand-aligned product development (ensures the product reflects the brand promise: patient advisory board — include actual patients and healthcare providers in product planning; their input should visibly influence the roadmap; clinical impact measurement — track and report how the product affects patient outcomes; publish an annual patient impact report — internal and external; this gives the 'patient-first' claim substance; ethical product guidelines — integrated into the brand guidelines: the company will not sell features it doesn't believe improve patient care; the company will prioritize patient data privacy above convenience; these guidelines are aspirational but important — they set the standard the culture is evolving toward)."
    weight: 0.35
    description: "OperationalTransformation"
  - type: llm_judge
    criteria: "Response addresses measurement and brand guidelines integration — transformation measurement (tracks cultural evolution: employee brand belief survey — quarterly measurement: 'Does the company live its brand values?' tracked by department, tenure, and role level; the baseline is 40% agreement; target: 80% within 18 months; Glassdoor and external perception — monthly monitoring of Glassdoor reviews, social media sentiment, and media coverage; track the narrative: is it shifting from 'hypocritical' to 'genuinely mission-driven'?; behavioral metrics — are the operational changes producing results? sales behavior: are upsells decreasing while customer satisfaction increases? product decisions: are patient impact assessments being completed and influencing the roadmap? internal communication: are employees attending all-hands? are they asking questions?; customer validation — do hospital partners perceive the company as more genuinely patient-first? track through NPS, partner satisfaction surveys, and renewal rates), brand guidelines as cultural document (evolves the brand guidelines to serve as cultural standards: the brand guidelines should include a 'brand behaviors' section — not just how we look and sound, but how we act; brand behaviors document: 'When we face a choice between revenue and patient outcomes, we choose patient outcomes and find a way to make the economics work'; this is aspirational but specific — it gives employees guidance for real decisions; internal brand touchpoints — internal communications, onboarding materials, office design, and employee experiences should all reflect the brand values; the brand guidelines become the company's cultural reference document — used in hiring, performance reviews, and strategic decisions; the guidelines should be co-created with employees, not imposed from above — involve people from every department in defining what the brand values mean in their daily work; annual review — each year, assess whether the brand-culture gap is closing; celebrate progress publicly and acknowledge where gaps remain; the goal is not perfection but genuine, visible progress toward alignment)."
    weight: 0.30
    description: "MeasurementAndIntegration"
