meta:
  id: brand-future-proofing
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Brand future-proofing — design brand guidelines that anticipate and adapt to emerging technologies, changing media landscapes, and evolving consumer expectations"
  tags: [future, emerging, technology, adaptation, master]

state: {}

trigger: |
  You're the Head of Brand Strategy for a major consumer
  electronics company. The board has tasked you with ensuring
  the brand guidelines are ready for the next decade:

  Emerging challenges the brand must prepare for:

  1. Spatial Computing & AR/VR: The company is launching
     products for AR/VR environments. How does the brand
     exist in 3D space? What are the brand guidelines for
     virtual environments?

  2. Voice & Conversational AI: 40% of customer interactions
     will be voice-based within 3 years. The brand has no
     "sonic identity" and no guidelines for how AI chatbots
     represent the brand personality.

  3. Generative AI Content: Teams are using AI to generate
     brand content at scale. How do guidelines evolve when
     AI is the primary content creator?

  4. Personalized Brand Experiences: Technology enables
     hyper-personalized brand interactions. How much
     personalization is allowed before the brand loses
     coherence?

  5. Web3 & Digital Ownership: Customers expect to own and
     trade branded digital assets. What are the brand
     guidelines for NFTs, digital collectibles, and
     decentralized brand extensions?

  6. Sustainability as Brand Standard: Carbon labeling,
     lifecycle data, and sustainability disclosure are
     becoming standard brand communication requirements.

  The CEO says: "Our current brand guidelines assume a world
  of websites, ads, and packaging. That world is changing
  fast. I need guidelines that work in 2025 and 2035."

  Task: Create the future-proof brand guidelines framework.

assertions:
  - type: llm_judge
    criteria: "Response addresses spatial and sonic brand dimensions — spatial brand identity (creates guidelines for 3D and immersive environments: brand in 3D space — the logo, colors, and typography must work in three-dimensional environments; define how the logo appears as a 3D object: materials, lighting, animation behavior; brand environment design — when the brand creates virtual spaces (VR showrooms, AR experiences, metaverse presence), what are the design principles? the physical brand environment guidelines (store design, event design) should extend to virtual environments with spatial-specific adaptations: lighting, materials, spatial audio, interaction design; brand avatar/representation — if the brand is represented by a character or entity in virtual spaces, define: appearance, behavior, personality, and interaction guidelines; the avatar embodies the brand personality in a way that feels authentic and consistent; AR brand overlays — when the brand appears in augmented reality (product information overlays, AR packaging experiences, try-before-you-buy features), define: visual treatment, information hierarchy, interaction patterns, and accessibility requirements), sonic brand identity (creates the brand's audio dimension: brand sound logo — a short, distinctive audio signature (like Intel's bong or Netflix's ta-dum); this appears at the beginning or end of all audio and video brand content; brand music system — define the brand's musical personality: genre affinity, tempo range, instrumental palette, emotional quality; this guides all music selection: advertising, hold music, event playlists, product sounds; brand voice (literal) — for voice interfaces and AI assistants: define the vocal characteristics: gender or non-gendered, age range, accent, speaking pace, warmth level; the voice should embody the brand personality audibly; product sounds — UI sounds, notification tones, interaction feedback; each sound should be distinctive, pleasant, and brand-aligned; the sonic identity should be as documented and governed as the visual identity; spatial audio — in VR/AR environments, how does the brand sound in 3D space? spatial audio guidelines for brand environments: ambient sounds, interaction sounds, and audio branding in immersive contexts)."
    weight: 0.35
    description: "SpatialAndSonicBrand"
  - type: llm_judge
    criteria: "Response addresses AI and personalization challenges — AI brand representation (governs how AI represents the brand: AI personality guidelines — the brand's AI chatbot, voice assistant, and automated communications should embody the brand personality; define: knowledge boundaries (what the AI should and shouldn't discuss), personality traits (friendly but professional, helpful but not pushy), escalation behavior (when does AI hand off to a human?), error and uncertainty handling (how does the AI brand voice handle 'I don't know'?); conversational brand voice — extend the written brand voice guidelines to spoken and conversational contexts; conversational voice is different from written voice: shorter sentences, more natural rhythm, contractions, and verbal acknowledgments; response templates — provide the AI with brand-aligned response patterns for common scenarios: greetings, product questions, complaints, and goodbyes; each template reflects the brand personality while maintaining natural conversation flow; AI content generation governance — when AI generates brand content at scale: define which content types can be fully AI-generated vs AI-assisted vs human-only; establish quality checkpoints: AI-generated content is reviewed against the brand voice rubric before publication; the brand's AI-generated content should be indistinguishable from human-created content in voice and quality), personalization framework (defines the boundaries of brand personalization: personalization spectrum — level 1: contextual adaptation — content adapts to the user's context (device, location, time) while the brand expression remains standard; level 2: preference-based — content adapts to user preferences (topics, format preferences) while core brand elements remain fixed; level 3: behavioral — messaging and offers adapt to individual behavior while brand voice and visual identity remain consistent; level 4: identity-level — visual elements, tone, and content fully customized per user; guidelines should define which personalization level is appropriate for each brand touchpoint; coherence boundaries — even with personalization, the brand must remain recognizable; define the immutable elements that never personalize and the flexible elements that can adapt; a customer should be able to show their personalized brand experience to another customer and both should recognize it as the same brand)."
    weight: 0.35
    description: "AIAndPersonalization"
  - type: llm_judge
    criteria: "Response addresses digital ownership and adaptive guidelines architecture — digital ownership and Web3 (creates guidelines for branded digital assets: branded digital collectibles — if the company creates NFTs or digital collectibles, they must follow brand visual identity guidelines; define: approved visual treatments, quality standards, and authentication marks that distinguish official brand NFTs from unofficial ones; digital asset co-creation — customers may create content using brand elements; define what's allowed and what isn't: fan art guidelines, brand asset usage for user-generated content, and community creation boundaries; intellectual property in digital spaces — how brand IP is protected in decentralized environments; respond to unauthorized brand use in Web3 platforms; the guidelines should be flexible enough to evolve with the technology — Web3 is still nascent and the rules will change; establish principles now and detailed guidelines as the technology matures), adaptive guidelines architecture (designs guidelines that can evolve with technology: modular guidelines structure — organize guidelines as independent modules rather than a monolithic document; each module covers a specific domain: visual identity, voice and tone, spatial design, sonic identity, AI interaction, personalization, digital ownership, sustainability; new modules can be added without restructuring the entire system; technology-agnostic principles — alongside technology-specific guidelines, define principles that apply regardless of the medium: the brand should feel [personality attributes] in any context; any brand interaction should leave the user feeling [desired emotional outcome]; these principles guide teams when they encounter a new technology that the guidelines don't yet cover; emerging technology protocol — when a new technology or platform emerges: step 1: assess relevance to the brand and audience; step 2: conduct a small-scale brand experiment; step 3: develop interim guidelines based on brand principles and experiment learnings; step 4: formalize guidelines after 6-12 months of data; this protocol ensures the brand is never caught without guidance but also never creates premature guidelines for unproven technologies; version and evolution tracking — the brand guidelines should have a clear versioning system and changelog; each update documents: what changed, why, and the data or technology shift that prompted the change; historical versions are archived for reference)."
    weight: 0.30
    description: "DigitalOwnershipAndArchitecture"
