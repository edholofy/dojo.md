meta:
  id: brand-innovation-lab
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Brand innovation lab — establish a brand experimentation framework that allows controlled brand innovation while maintaining core brand integrity"
  tags: [innovation, experimentation, lab, evolution, master]

state: {}

trigger: |
  You're the VP of Brand Innovation at a 20-year-old consumer
  technology company. The brand is strong but showing signs of
  stagnation:

  - Brand perception research shows "reliable" and "trusted"
    but also "predictable" and "conservative"
  - The brand hasn't evolved its visual identity in 5 years
  - Competitors are winning cultural relevance with bold brand
    experiments: limited editions, unexpected collaborations,
    experimental campaigns
  - The brand team is risk-averse — any suggestion to try
    something new is met with "that's not on-brand"
  - Gen Z brand awareness is 35% lower than millennials
  - The company's innovation pipeline includes products for
    new categories where the current brand expression feels
    limiting

  The CEO challenges you: "Our competitors are taking creative
  risks and getting rewarded. Our brand guidelines feel like
  a straightjacket. I want a system that allows brand
  experimentation — controlled innovation, not chaos. Show me
  how we can push the brand forward without breaking what
  makes it work."

  Task: Create the brand innovation framework and guidelines
  for controlled brand experimentation.

assertions:
  - type: llm_judge
    criteria: "Response creates the brand innovation framework — brand innovation philosophy (establishes the case for experimentation: the paradox — brand guidelines exist to create consistency, but rigid consistency leads to stagnation; the best brands balance consistency in what they stand for with evolution in how they express it; core vs expression — separate the brand into: brand core (immutable: values, mission, brand DNA, fundamental positioning) and brand expression (evolvable: visual treatments, communication formats, channel strategies, cultural moments); the brand core provides the gravitational center; brand expression can orbit adventurously; innovation zones — define three zones of brand expression: zone 1 heritage — the familiar, proven brand expression for core audiences and established channels; zone 2 evolution — progressive updates to the brand expression that push it forward while remaining recognizable; zone 3 experimentation — bold departures from the usual brand expression for specific audiences, moments, or campaigns; each zone has different guidelines, approval processes, and measurement criteria), experimentation framework (provides the structure for brand experiments: experiment categories — collaborations (brand × unexpected partner), format experiments (new content formats, platforms, experiences), visual experiments (temporary visual treatments, limited edition designs), audience experiments (expressions designed for new demographics), cultural moments (timely brand expressions tied to cultural events); experiment design template — every brand experiment must document: hypothesis (what we think will happen), target audience (who this is for), brand core connection (how this ties back to brand values even if the expression is unfamiliar), measurement criteria (how we'll know if it worked), risk assessment (what could go wrong and how to mitigate), duration and scope (how long and how broadly the experiment runs), rollback plan (how to undo if it doesn't work); go/no-go criteria — an experiment is approved if: it's connected to brand core values, it targets a specific audience or moment, it has clear measurement criteria, the risk is contained, and it doesn't conflict with existing brand commitments)."
    weight: 0.35
    description: "InnovationFramework"
  - type: llm_judge
    criteria: "Response creates practical experimentation tools — brand experiment portfolio (manages experiments as a portfolio: maintain a portfolio of 3-5 active brand experiments at any time; balance the portfolio: 2-3 low-risk zone 2 evolutions and 1-2 higher-risk zone 3 experiments; this portfolio approach ensures the brand is always innovating while limiting total risk exposure; experiment pipeline — a backlog of proposed experiments prioritized by: audience impact, brand growth potential, learning value, and execution feasibility; the pipeline ensures the brand always has experiments ready to launch when current ones conclude), experimentation governance (defines who approves and manages experiments: experiment review board — a cross-functional group: VP Brand Innovation, Head of Creative, consumer insights lead, and a business unit leader; they review proposed experiments against the go/no-go criteria; they don't need to love every experiment — they need to verify it's structured for learning and brand-safe; approval levels by zone: zone 2 evolution — brand team can approve independently; zone 3 experimentation — experiment review board approval required; fast-track process for cultural moments — some experiments need to launch quickly to be culturally relevant; a pre-approved cultural moment framework allows 48-hour execution with brand team approval only), measurement and learning (turns experiments into brand intelligence: experiment scorecard — each experiment is measured on: audience engagement (did the target audience notice and respond?), brand perception impact (did it change how people see the brand? positively or negatively?), cultural relevance (did it generate organic conversation and sharing?), business impact (did it drive any measurable business outcome?), learning value (what did we learn about the brand's flexibility?); success doesn't always mean repeat — some experiments succeed brilliantly but should remain one-time moments; others reveal a new brand expression direction worth incorporating permanently; experiment retrospective — every completed experiment gets a formal retrospective: what worked, what didn't, what surprised us, and what should change in the brand guidelines based on what we learned; successful experiments may graduate from zone 3 to zone 2 to zone 1 — this is how the brand evolves over time)."
    weight: 0.35
    description: "ExperimentationTools"
  - type: llm_judge
    criteria: "Response addresses cultural relevance and guidelines evolution — Gen Z brand strategy (addresses the 35% awareness gap: research — understand why Gen Z awareness is lower: is the brand invisible on their platforms? does the brand expression not resonate with their aesthetic? is the messaging irrelevant to their concerns?; platform strategy — the brand may need platform-specific expressions: TikTok requires a different brand expression than LinkedIn; this isn't inconsistency — it's audience appropriateness; the brand innovation framework should include specific experiments targeting Gen Z: collaborations with creators they follow, content formats they consume, and cultural moments they care about; measurement — track Gen Z brand awareness and perception as a specific metric; the innovation program's success partly depends on closing this gap), new category brand extension (prepares the brand for new product categories: the current brand expression was built for the current product category; new categories may require new brand expressions within the same brand system; brand permission analysis — where does the brand have permission to extend? what adjacent categories feel natural? which would feel forced?; brand expression variants — design category-specific brand expressions that maintain brand core while adapting for the category's audience and context; this is a zone 2 or zone 3 activity depending on how far the category is from the brand's current territory), guidelines evolution process (updates guidelines based on experiments: the brand guidelines should include a 'brand evolution roadmap' — a living document showing how the brand expression is planned to evolve over the next 2-3 years; successful experiments create the evidence base for guidelines updates: 'We tested a more vibrant color palette with Gen Z audiences and saw 40% higher engagement. We're incorporating these colors as a secondary digital palette.'; annual brand evolution review — assess all experiments from the past year and incorporate successful directions into the core guidelines; the brand innovation framework should have a clear path: experiment → measure → learn → integrate into guidelines; this creates a brand that evolves continuously through evidence rather than periodic rebrands driven by stagnation)."
    weight: 0.30
    description: "CulturalAndEvolution"
