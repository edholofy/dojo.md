meta:
  id: brand-thought-leadership
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Brand thought leadership program — create guidelines for establishing and maintaining thought leadership that enhances brand authority and market position"
  tags: [thought-leadership, authority, content, positioning, master]

state: {}

trigger: |
  You're the Chief Communications Officer for a B2B enterprise
  software company ($800M ARR) that wants to establish industry
  thought leadership as a core brand strategy:

  Current state:
  - The company is a market leader by revenue but NOT by
    influence — competitors are quoted in media, invited to
    speak at conferences, and referenced in analyst reports
    more frequently
  - The CEO has strong opinions about the industry's future
    but rarely shares them publicly
  - Individual executives have active LinkedIn accounts but
    post inconsistently with no strategic direction
  - The content team publishes 20 blog posts per month but
    they're mostly product-focused with low engagement
  - The company sponsors 15 conferences per year but only
    has speaking slots at 3
  - Academic and analyst relationships are transactional —
    briefings for product launches only
  - No brand guidelines exist for thought leadership content
    or executive communications

  The CEO says: "McKinsey, Salesforce, and HubSpot aren't just
  companies — they're sources of industry knowledge. When
  people think about our category, I want them to think about
  us first. Not just as a vendor but as the authority on where
  this industry is going."

  Task: Create the brand thought leadership strategy and
  guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates the thought leadership strategy — thought leadership positioning (defines the company's intellectual territory: territory identification — identify 3-5 topics where the company has unique expertise, data, or perspective; these should be: relevant to the target audience's biggest challenges, areas where the company has genuine credibility (customer data, R&D insights, operational expertise), differentiated from what competitors are saying, and forward-looking enough to position the company as a visionary; the topics should overlap with but not be identical to the product — thought leadership isn't product marketing; the company's thought leadership territory should feel inevitable: 'Of course the leading [category] company would have deep expertise in [topic]'; competitive differentiation — map what competitors are saying in thought leadership; identify gaps and unique angles; the company shouldn't compete head-to-head on the same topics — it should own distinct intellectual territory that competitors cede), content strategy for thought leadership (plans the content approach: content hierarchy — tier 1 landmark content: quarterly original research reports, annual industry outlook, definitive guides; these are the flagship pieces that establish authority; they require investment: original research, expert contributions, premium design; tier 2 expert content: monthly executive articles, podcast appearances, conference presentations; these build on the landmark content with practical insights and perspectives; tier 3 amplification content: weekly social media posts, blog articles, and commentary that distribute insights from tiers 1 and 2; the content pyramid ensures a steady cadence without requiring 100% original thought for every piece; editorial calendar — a 12-month content plan aligned with industry events, product milestones, and seasonal trends; each month has a primary topic focus with supporting content across all three tiers), executive platform strategy (positions company leaders as industry authorities: CEO platform — the CEO becomes the primary thought leadership voice; define the CEO's personal brand within the corporate brand: their specific perspectives, communication style, and areas of expertise; CEO content cadence: monthly LinkedIn article, quarterly keynote or panel, biannual major publication placement; executive ensemble — identify 3-5 executives who each own a specific thought leadership topic; CTO owns technology trends, VP Product owns industry transformation, VP Customer Success owns operational excellence; each executive has a personal content plan and communication training; ghostwriting and support — most executives need content support; provide ghostwriting, speech writing, and social media management within brand guidelines; the executive's authentic voice should come through — ghostwriting translates their ideas into polished content, it doesn't replace their thinking)."
    weight: 0.35
    description: "ThoughtLeadershipStrategy"
  - type: llm_judge
    criteria: "Response creates the thought leadership brand guidelines — thought leadership voice and tone (defines how thought leadership content sounds: the thought leadership voice is a specific expression of the brand voice — more personal, more opinionated, and more forward-looking than standard marketing content; voice attributes for thought leadership: authoritative but not arrogant — share expertise without talking down; the company has earned the right to have opinions through market leadership and customer experience; provocative but substantive — challenge conventional thinking but always back it up with data, examples, or logical reasoning; specific but accessible — use concrete examples and data rather than abstract concepts; explain complex ideas clearly without oversimplifying; generous with knowledge — share genuine insights freely; thought leadership that's a thinly veiled product pitch destroys credibility; the ratio should be 90% value and 10% company mention; tone variations by format: research reports are data-driven and analytical; executive articles are personal and perspective-driven; conference presentations are engaging and story-driven; social media is conversational and concise), thought leadership visual identity (creates a distinctive visual treatment: thought leadership content should be visually distinguishable from product marketing while remaining within the brand system; design elements for thought leadership: a specific layout style for research reports, a consistent visual framework for data visualization, a photography style that's more editorial than commercial; executive imagery — professional photography of each executive in the thought leadership program; consistent style across all executive headshots and action shots; branded content formats — templates for: research report covers, executive LinkedIn post graphics, conference presentation slides, podcast cover art, social media quote cards; the visual consistency signals 'this is part of an intentional thought leadership program' rather than random content), quality and editorial standards (ensures thought leadership content is excellent: editorial review process — all thought leadership content is reviewed for: factual accuracy, brand voice alignment, thought leadership vs product marketing balance, competitive sensitivity; no thought leadership content is published without editorial and legal review; quality bar — thought leadership content should be the company's highest-quality content; it represents the company's intellectual contribution to the industry; if a piece doesn't add genuine value to the conversation, it shouldn't be published; attribution and sourcing — all data claims must be sourced; all third-party ideas must be attributed; original research methodology must be transparent; the company's thought leadership should be as rigorous as academic publication while being as accessible as journalism)."
    weight: 0.35
    description: "ThoughtLeadershipGuidelines"
  - type: llm_judge
    criteria: "Response addresses ecosystem development and measurement — ecosystem and relationship strategy (builds the relationships that amplify thought leadership: analyst relations — transform transactional analyst briefings into strategic relationships; regular non-product conversations about industry trends; invite analysts to participate in research; the goal: analysts cite the company as an industry authority, not just a product vendor; media strategy — identify 10-15 target publications and journalists; build relationships through: expert commentary on industry news, exclusive access to research findings, and executive interview availability; the goal: journalists call the company for expert quotes on industry topics; academic partnerships — collaborate with universities on research; sponsor relevant academic conferences; this adds intellectual credibility beyond corporate self-interest; community building — create owned platforms for industry conversation: an executive roundtable series, an industry podcast, or a research community; these platforms position the company as a convener of important conversations, not just a participant), measurement and optimization (tracks thought leadership impact: attention metrics — media mentions as industry expert, conference speaking invitations, analyst report citations, social media engagement on thought leadership content; influence metrics — are target audiences aware of the company's perspectives? do they associate the company with its thought leadership topics? track through periodic brand perception surveys; business metrics — does thought leadership correlate with: pipeline generation, deal velocity, win rate, and customer retention? the correlation is often indirect — thought leadership builds awareness and credibility that influence purchase decisions; competitive benchmarking — track share of voice, speaking slot quality, and media citations relative to key competitors; quarterly review — are the chosen thought leadership topics resonating? is the executive platform strategy working? which content formats perform best? the measurement should inform strategy evolution — double down on what works, iterate on what doesn't, retire what fails)."
    weight: 0.30
    description: "EcosystemAndMeasurement"
