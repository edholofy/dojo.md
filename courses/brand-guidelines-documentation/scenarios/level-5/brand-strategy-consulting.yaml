meta:
  id: brand-strategy-consulting
  level: 5
  course: brand-guidelines-documentation
  type: output
  description: "Brand strategy consulting — advise a Fortune 500 company on comprehensive brand strategy, positioning, and guidelines transformation as an external consultant"
  tags: [consulting, strategy, fortune500, transformation, master]

state: {}

trigger: |
  You've been hired as an external brand strategy consultant
  for a Fortune 500 industrial manufacturer ($12B revenue,
  45,000 employees, 80 countries). The company has:

  - A 75-year-old brand that's well-known but perceived as
    "old-fashioned" and "industrial"
  - 12 product divisions, each with semi-autonomous brand
    management
  - Brand guidelines last updated 6 years ago (a 120-page PDF
    that no one follows)
  - A new CEO who wants to reposition the company as a
    "technology and sustainability leader" without losing the
    heritage brand equity
  - Major competitors who have already modernized their brands
  - A $5M brand transformation budget over 2 years
  - Internal resistance: "We're engineers, not a lifestyle
    brand. Don't make us look like a tech startup."

  The CEO's brief: "I need you to tell me what's wrong with
  our brand, what it should become, and how to get there.
  Then build the guidelines that make it real."

  Task: Deliver the brand strategy assessment, transformation
  plan, and new brand guidelines framework.

assertions:
  - type: llm_judge
    criteria: "Response delivers a strategic brand assessment — brand audit and diagnosis (assesses the current state: brand equity audit — what the 75-year heritage is worth: awareness, trust, reliability, engineering excellence; these are assets to preserve, not liabilities; brand perception gap — how the company sees itself vs how customers, prospects, and employees see it; conduct perception research across all key stakeholder groups: enterprise buyers, specifiers, channel partners, employees, investors, recruits; competitive brand landscape — map all major competitors on a positioning matrix: heritage vs modern, industrial vs technology; identify the white space where the company can credibly position; the 12 division brand architecture — is it branded house, house of brands, or chaotic? map the current state and identify inconsistencies, redundancies, and gaps; internal brand culture — how do employees feel about the brand? the engineering pride should be an asset: 'We're not a lifestyle brand, we're serious engineers' is actually a compelling brand position if articulated correctly; guidelines effectiveness — why isn't anyone following the 120-page PDF? is it outdated, inaccessible, irrelevant, or unenforced? understanding the failure mode prevents repeating it), strategic recommendation (defines the brand's future state: brand positioning — the company should own the intersection of engineering heritage and modern innovation; the positioning shouldn't abandon the industrial identity but reframe it: 'The engineers building tomorrow's sustainable infrastructure'; this positioning respects the engineering culture while adding technology and sustainability dimensions; brand architecture recommendation — rationalize 12 divisions into a coherent architecture: likely a branded house with product category sub-brands; reduce visual and verbal fragmentation while maintaining product-level identity; brand personality evolution — from 'reliable but boring' to 'quietly confident and forward-thinking'; the brand should project the authority that comes from 75 years of solving hard problems, combined with the vision to solve tomorrow's problems; this is not a rebrand — it's a brand evolution: honoring the heritage while updating the expression)."
    weight: 0.35
    description: "StrategicAssessment"
  - type: llm_judge
    criteria: "Response creates the transformation plan — phased transformation roadmap (plans the 2-year, $5M transformation: year 1 — foundation: months 1-3: brand strategy development and stakeholder alignment ($500K); brand research, positioning development, and executive workshop to align on the strategy; months 4-6: brand identity development ($800K); agency partnership to develop the evolved visual identity, typography, imagery style, and brand voice; the identity should feel like a natural evolution, not a rupture; months 7-9: brand guidelines creation and platform setup ($400K); comprehensive digital brand guidelines replacing the 120-page PDF; months 10-12: pilot rollout ($300K); launch the new brand in 2-3 pilot markets and divisions; gather data on reception and effectiveness; year 2 — execution: months 13-18: global rollout ($1.5M); systematic deployment across all 80 countries and 12 divisions; months 19-21: brand training and adoption ($500K); comprehensive training programs for all brand-touching roles; months 22-24: optimization and measurement ($500K); refine based on data, conduct post-launch brand perception study; contingency: $500K reserved for unexpected needs), change management strategy (addresses the internal resistance: the engineering culture is an asset, not an obstacle; engage engineering leaders early: 'This rebrand is about showing the world what you already know — that this company builds the most advanced, sustainable solutions in the industry'; pilot program — start with divisions that are most enthusiastic; success stories build momentum for resistant divisions; brand champions network — identify influential employees across divisions and countries; train them to champion the evolution within their teams; the transformation should feel participatory, not imposed — employees who feel involved in the evolution become advocates rather than resistors)."
    weight: 0.35
    description: "TransformationPlan"
  - type: llm_judge
    criteria: "Response designs the new guidelines framework — guidelines architecture for scale (designs guidelines that work for 45,000 people in 80 countries: tiered guidelines structure — level 1 global standards: non-negotiable elements that apply worldwide — logo, primary colors, core typography, brand voice DNA, brand architecture rules; level 2 divisional guidelines: product-division-specific applications — sub-brand visual treatments, product category photography, division-specific messaging; level 3 regional adaptations: market-specific guidelines — localization frameworks, cultural adaptation rules, regional channel guidelines; the tiered structure allows global consistency with local relevance; digital-first platform — the new guidelines live on a purpose-built brand platform, not a PDF; searchable, always current, with role-based access; asset management integrated with guidelines — every rule links to the assets and templates that implement it; analytics — track which guidelines are accessed, which assets are downloaded, and which sections generate the most support questions), governance for a Fortune 500 (establishes governance at scale: global brand council — C-suite representatives from each major division and region; meets quarterly to review brand strategy and approve significant changes; regional brand directors — one per major region responsible for local brand management and adaptation approval; division brand managers — one per product division responsible for division-specific brand applications; technology layer — the brand platform enforces guidelines through locked templates, automated compliance checks, and approval workflows; measurement — quarterly brand health tracking across all markets and divisions; annual brand equity valuation presented to the board; the governance model must balance control with speed — a Fortune 500 can't have every piece of content reviewed centrally; the tiered approval system empowers local teams while maintaining global standards; consultant handoff — the engagement includes a knowledge transfer plan: document all strategic decisions and rationale; train the internal brand team to maintain and evolve the system; the guidelines should be self-sustaining after the consultant engagement ends)."
    weight: 0.30
    description: "GuidelinesFramework"
