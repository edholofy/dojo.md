meta:
  id: rebrand-strategy-execution
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Rebrand strategy and execution — plan and execute a complete corporate rebrand including new guidelines documentation, stakeholder management, and rollout"
  tags: [rebrand, strategy, execution, rollout, expert]

state: {}

trigger: |
  Your B2B software company is executing a full rebrand. The
  company has evolved significantly since the current brand
  was created 8 years ago:

  - The company has shifted from selling to SMBs to enterprise
  - Revenue has grown from $10M to $200M ARR
  - The team has grown from 50 to 1,200 employees
  - The product has expanded from a single tool to a platform
  - The current brand feels "startup-y" — hand-drawn logo,
    playful colors, casual voice
  - Competitors have matured their brands — the company now
    looks like the junior player despite being market leader

  The rebrand scope:
  - New logo, visual identity, and brand system
  - Updated voice and tone
  - New website (complete redesign)
  - Updated all marketing materials
  - New sales collateral
  - Updated product UI brand elements
  - Partner material updates
  - Internal brand rollout

  The rebrand agency has delivered the new brand assets. Your
  job is to create the new brand guidelines and manage the
  rollout.

  Timeline: 12 weeks to complete rollout. Budget: $500K
  for implementation (agency work is separate).

  Task: Create the new brand guidelines documentation and
  the rollout execution plan.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive new brand guidelines — complete brand guidelines document (documents the new brand comprehensively: brand foundation — updated brand story reflecting the company's evolution from startup to market leader; mission, vision, and values refined for the enterprise positioning; brand positioning statement and key messages for different audiences; visual identity — new logo with all variants, clear space, minimum size, and usage rules; color system with primary, secondary, and accent palettes plus functional colors; typography system with heading, body, and UI typefaces with sizing scales; photography and illustration style that projects enterprise maturity; iconography system; data visualization style; layout and grid system; voice and tone — evolved from startup-casual to confident and authoritative while remaining approachable; the voice should feel like a market leader sharing expertise, not a startup trying to be cool; tone variations by audience: enterprise buyers, technical users, partners, media; content guidelines — messaging frameworks for each product, boilerplate descriptions at various lengths, approved terminology and terms to avoid, competitive positioning language), application guidelines (shows the brand applied across touchpoints: digital applications — website design principles, email templates, social media formats, digital advertising specifications, product UI brand elements; print applications — business cards, letterhead, presentation templates, brochure layouts, trade show materials; environmental — office branding, event booth design, signage; the application guidelines should cover the most common use cases — teams should be able to create 80% of their materials using these examples without needing brand team review)."
    weight: 0.35
    description: "NewBrandGuidelines"
  - type: llm_judge
    criteria: "Response designs the rollout execution plan — phased rollout strategy (plans the 12-week implementation: weeks 1-2 — internal reveal and preparation: launch the new brand internally before any external visibility; all-hands presentation by the CEO explaining the rebrand rationale; distribute new brand guidelines to all teams; begin updating internal systems: email signatures, presentation templates, internal tools; weeks 3-4 — digital rollout: launch the new website with redirect plan for old URLs; update all social media profiles simultaneously: LinkedIn, Twitter, YouTube; update email marketing templates and automated sequences; update the product's brand elements in the UI; weeks 5-8 — marketing and sales materials: replace all active marketing campaigns with rebrand creatives; update sales collateral: pitch decks, proposals, case studies, one-pagers; update partner-facing materials and co-branding guidelines; update advertising across all channels; weeks 9-10 — extended rollout: update print materials: business cards, stationery, trade show materials; update office branding and signage; update third-party listings and directories; weeks 11-12 — cleanup and verification: audit all touchpoints for completeness; address any remaining old-brand materials; post-rollout brand perception survey), budget allocation (distributes the $500K implementation budget: website redesign and development — largest single investment; marketing material production — design and production of new collateral; sales enablement — new pitch decks, proposal templates, and training; environmental and print — office branding, business cards, stationery; partner materials — updated co-branding assets and support; the budget should include a contingency — rebrands always surface unexpected costs)."
    weight: 0.35
    description: "RolloutExecution"
  - type: llm_judge
    criteria: "Response addresses change management and measurement — internal change management (manages the human side of the rebrand: the rebrand is an emotional event — many employees feel connected to the old brand; acknowledge the old brand's legacy before introducing the new one: 'This brand got us from $10M to $200M. The new brand will take us to $1B'; address resistance — some teams will push back; common objections and responses: 'The old brand was fine' → 'The old brand was great for who we were; the new brand reflects who we've become'; brand ambassador program — identify enthusiastic employees across departments to champion the new brand; equip them with talking points and early access to materials; training program — department-specific sessions on how to use the new brand: marketing gets visual identity deep-dive, sales gets messaging and collateral training, engineering gets product UI guidelines, all employees get voice and tone basics), rebrand measurement (tracks whether the rebrand achieves its goals: brand perception — survey target audiences before and after the rebrand: do they perceive the company as more enterprise-ready? more mature? more trustworthy?; internal adoption — are all teams using the new brand correctly? conduct a brand audit 30, 60, and 90 days post-launch; brand consistency — measure compliance across touchpoints during the rollout; the rebrand compliance score should reach 90% within 90 days; business impact — track whether the rebrand affects key metrics: website conversion rate, sales cycle length, win rate, and talent acquisition; stakeholder satisfaction — survey employees, partners, and key customers about the rebrand experience; if any metric moves negatively, investigate and adjust), post-rebrand guidelines maintenance (plans for ongoing brand management after the rebrand: the brand guidelines are a living document — plan the first update for 90 days post-launch to incorporate lessons learned; establish the governance framework — who approves new materials, how are deviations handled, when are guidelines updated; brand team capacity — after the rebrand, the team transitions from rollout mode to maintenance and evolution mode; the brand guidelines platform should be fully populated with all new assets, templates, and guidelines before the internal launch)."
    weight: 0.30
    description: "ChangeManagement"
