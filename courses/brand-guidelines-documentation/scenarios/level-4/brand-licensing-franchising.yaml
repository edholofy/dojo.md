meta:
  id: brand-licensing-franchising
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Brand licensing and franchising guidelines — create frameworks for controlling brand identity when third parties represent and use the brand"
  tags: [licensing, franchising, third-party, control, expert]

state: {}

trigger: |
  Your consumer brand is expanding through two models:

  1. Brand Licensing: You're licensing the brand to 3 product
     categories managed by external partners:
     - A home goods manufacturer producing branded kitchen
       products
     - A clothing brand creating a co-branded activewear line
     - A technology company building branded smart home devices

  2. Franchise Model: You're launching 15 franchise locations
     over the next 18 months, each independently operated but
     required to maintain brand standards.

  Current problems:
  - The home goods licensee's product photography doesn't
    match the brand's visual style
  - The clothing partner is using the logo at sizes that
    violate the minimum size guidelines
  - Early franchise pilot locations have inconsistent
    interior design, staff uniforms, and customer experience
  - There's no clear process for approving licensee marketing
    materials before they go to market
  - One franchisee created their own social media accounts
    with messaging that contradicts the brand values
  - License agreements reference "brand guidelines" but the
    guidelines aren't detailed enough for external parties

  The Head of Brand Partnerships says: "We need guidelines
  that work for people who aren't employees — people who
  don't absorb the brand culture day-to-day."

  Task: Create the brand licensing and franchising guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates licensee brand guidelines — licensing brand standards (defines what licensees must follow: brand asset usage — comprehensive rules for logo placement on products: minimum size by product category, clear space requirements on packaging, color specifications for different materials and printing processes; product design alignment — the licensed product should feel like it belongs to the brand family: design language principles, material quality standards, color palette application to physical products; packaging requirements — packaging design must follow brand templates: layout structure, typography, photography style, required brand elements, and regulatory disclosures; the guidelines must be more explicit than internal guidelines because licensees lack the context and culture that employees have; where internal guidelines might say 'maintain brand quality,' licensee guidelines must define exactly what 'quality' means with measurable standards), licensee marketing guidelines (controls how licensees promote the brand: marketing material approval process — all licensee marketing materials must be approved by the brand team before publication; submission requirements: final designs in specified formats, 10 business days before intended publication; pre-approved templates — provide licensees with templates for common marketing needs: product photography guidelines with example shots, social media post templates, print ad layouts, press release formats; the templates reduce approval volume while ensuring consistency; co-branding rules — how the licensee's brand and the licensed brand appear together: the licensed brand is primary in product contexts, the licensee brand is primary in corporate contexts; sizing, placement, and color rules for co-branding lockups; prohibited uses — explicit list of what licensees may not do with the brand: modify the logo, change brand colors, create new brand slogans, use the brand in political or controversial contexts, or extend the brand to unauthorized product categories), quality control framework (ensures physical product quality matches brand standards: product quality standards — material specifications, manufacturing quality benchmarks, defect tolerance levels; the brand's reputation extends to every product bearing its name; product approval process — licensees submit prototypes for brand review: initial concept review, design development review, pre-production sample approval, production quality spot-checks; packaging and labeling compliance — verify that all products meet packaging guidelines before they ship; the quality control process is contractual — failure to meet standards results in corrective action plans or license termination)."
    weight: 0.35
    description: "LicensingGuidelines"
  - type: llm_judge
    criteria: "Response creates franchise brand guidelines — franchise brand standards (defines comprehensive standards for franchise locations: physical space guidelines — interior design standards: required fixtures, color specifications for walls and surfaces, lighting specifications, furniture standards, signage specifications; floor plans — approved layouts by location size category; exterior branding — storefront signage specifications, window treatments, entrance design; operational branding — staff uniforms: approved styles, colors, and grooming standards; customer greeting and service scripts aligned with brand voice; music and ambient experience standards; packaging and bags: branded materials with specification sheets; these standards are detailed enough that a new franchisee can achieve brand consistency without having experienced the brand firsthand), franchise marketing and communications (controls franchise-level marketing: centralized vs local marketing — what the corporate brand team handles and what franchisees can do locally; centralized: national advertising, social media strategy, email marketing, brand campaigns; local: local events, community sponsorships, location-specific promotions within approved templates; social media governance — franchisees may not create independent social media accounts for their locations; all social media runs through corporate-managed location pages; if location-specific accounts are permitted, they must follow strict templates and content guidelines; local marketing approval — franchisees can run local promotions using approved templates; any custom marketing requires corporate approval; provide a library of pre-approved local marketing templates: flyers, posters, local social posts, community event materials), franchise compliance program (monitors and enforces brand standards: regular brand audits — quarterly inspections of each franchise location covering: visual standards compliance, customer experience evaluation, marketing compliance, operational standards; mystery shopping — anonymous customer experience assessments measuring: brand consistency, service quality, atmosphere, and overall impression; compliance scoring — each location receives a quarterly brand compliance score; scores below threshold trigger a corrective action plan; ongoing non-compliance may result in franchise agreement remediation; franchisee training — initial brand training program covering all guidelines, with annual recertification; the training emphasizes why each standard exists, not just what the standard is)."
    weight: 0.35
    description: "FranchiseGuidelines"
  - type: llm_judge
    criteria: "Response addresses governance and scalability — partnership governance (manages the licensing and franchise ecosystem: brand partnership team — dedicated staff responsible for licensee and franchisee brand support; they're not just enforcers but brand consultants who help partners succeed within the guidelines; approval workflow system — a centralized platform where licensees and franchisees submit materials for review; SLA: 10 business days for standard review, 3 business days for expedited; the system tracks submission history and approval status; escalation process — when a licensee or franchisee disagrees with a brand review decision: first appeal to the brand partnership manager, second appeal to the brand director; the process should be fair and responsive — slow or adversarial approval processes encourage partners to skip the process), contractual integration (connects guidelines to legal agreements: license agreements — must reference specific brand guidelines sections and require compliance as a condition of the license; include the right to audit, the right to approve materials, and the remedies for non-compliance; franchise agreements — incorporate brand standards as operational requirements; define the consequences for brand standard violations: warning, corrective action plan, probation, termination; the guidelines should be written clearly enough that they're enforceable — vague guidelines create disputes; regular updates — when brand guidelines change, licensees and franchisees need notification, updated materials, and a reasonable transition timeline; the contractual framework should include a process for guidelines updates), scaling the program (plans for growth: as the licensing and franchise programs grow, the guidelines must scale; self-service tools — a partner portal where licensees and franchisees can access brand assets, templates, and submission workflows; automated compliance checks — where possible, use technology to verify brand compliance: logo placement verification, color accuracy checking, template validation; regional adaptation — as franchises expand into new markets, the guidelines need localization frameworks: which elements are fixed globally and which can adapt locally; the brand licensing and franchise guidelines should be treated as a living system — reviewed and updated based on partner feedback, compliance data, and brand evolution)."
    weight: 0.30
    description: "GovernanceAndScalability"
