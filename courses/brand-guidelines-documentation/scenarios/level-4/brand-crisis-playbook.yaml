meta:
  id: brand-crisis-playbook
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Brand crisis playbook — create a comprehensive crisis communication framework integrated into brand guidelines covering multiple crisis types and response protocols"
  tags: [crisis, playbook, communication, response, expert]

state: {}

trigger: |
  Your company has been through three brand crises in the past
  18 months, and each time the response was improvised:

  Crisis 1: A data breach exposed customer emails. The comms
  team scrambled for 48 hours, sent a cold legal-reviewed
  notification, and faced backlash for seeming uncaring.

  Crisis 2: A viral social media post accused the company of
  discriminatory hiring practices. The marketing team responded
  defensively, made things worse, and the CEO had to issue a
  personal apology days later.

  Crisis 3: A product bug caused data loss for 200 customers.
  The support team communicated the issue but marketing sent
  a product promotion email the same day, appearing tone-deaf.

  After the third crisis, the board demands a formal crisis
  communication framework. The CCO says: "We need a crisis
  playbook that's part of our brand guidelines — not a
  separate document that nobody finds in the heat of the
  moment."

  Task: Create the brand crisis communication playbook as an
  integrated section of the brand guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates the crisis communication framework — crisis classification system (categorizes crises by type and severity: crisis types — security/data breach, product failure, PR/reputation issue, legal/regulatory issue, personnel/leadership crisis, customer harm; severity levels — level 1 critical: immediate threat to business continuity or customer safety; level 2 high: significant brand reputation damage with media attention; level 3 moderate: localized issue with potential to escalate; level 4 low: minor issue manageable through normal channels; each combination of type and severity maps to a response protocol: who is activated, what is the response timeline, who approves communications, and which channels are used; the classification should be fast — a crisis team member should be able to classify a new crisis within 15 minutes using the framework), crisis response team and activation (defines who responds and how: crisis response team — a pre-identified cross-functional group: CEO or CCO as spokesperson, Head of Communications as coordinator, General Counsel for legal review, Head of the affected department for technical details, Brand Manager for brand voice consistency; activation protocol — how the team is assembled: level 1 and 2 crises: immediate activation within 1 hour; level 3: activation within 4 hours; level 4: handled by the communications team with Brand Manager notification; war room setup — whether physical or virtual, the team needs a dedicated space with: the crisis playbook, template responses, media contact lists, and approval workflows; roles and responsibilities matrix — each team member has a clear role: who drafts, who reviews, who approves, who publishes, who monitors), crisis communication principles (defines the brand's crisis voice: the crisis voice is an extension of the brand voice with specific adaptations: empathy first — lead with acknowledgment and concern, not excuses or legal disclaimers; transparency — share what is known, acknowledge what is unknown, commit to updates; accountability — accept responsibility where appropriate; don't blame customers, partners, or external factors unless that's genuinely accurate; action-orientation — every communication includes what the company is doing to address the situation; timing — speed matters more than perfection; a brief honest statement within 2 hours is better than a polished statement after 48 hours; these principles directly address the failures in the three past crises: the cold data breach notification lacked empathy, the defensive social media response lacked accountability, the product promotion during a crisis lacked cross-channel awareness)."
    weight: 0.35
    description: "CrisisFramework"
  - type: llm_judge
    criteria: "Response provides crisis response templates and protocols — crisis communication templates (provides ready-to-adapt templates for each crisis type: initial acknowledgment template — for use within 2 hours of crisis identification: 'We're aware of [issue]. We take this seriously and are actively investigating. We'll share more details by [time]. If you're affected, [immediate action they can take]'; detailed response template — for use within 24 hours: explains what happened, who is affected, what the company is doing, what customers should do, and when the next update will come; update template — for ongoing communication: what has changed since the last update, what actions have been taken, what is still being investigated, next update timeline; resolution template — for closing the crisis: summary of what happened, what was done, what has been changed to prevent recurrence, ongoing support available; apology template — when the company is at fault: genuine acknowledgment of harm, no 'we're sorry you feel that way' language, specific actions being taken; each template includes: content structure, tone guidance, required approvals, and example language; the templates are starting points, not scripts — they should be adapted to the specific crisis), channel-specific crisis protocols (defines how to communicate across channels during a crisis: website — a crisis banner or dedicated status page; the main website should acknowledge the crisis, not pretend it's not happening; email — direct communication to affected customers; subject lines should be clear and honest, not clickbait; social media — respond to mentions with a consistent message linking to the full statement; do not argue, do not delete negative comments unless they violate community guidelines; do not continue scheduled promotional posts during active crises — pause the content calendar; internal communications — employees should hear about the crisis from the company before they read about it online; provide them with talking points for customer-facing roles; media — designate a single spokesperson; all media inquiries are routed through communications; no one speaks to media without approval; the cross-channel coordination prevents the product-promotion-during-crisis mistake from crisis 3)."
    weight: 0.35
    description: "TemplatesAndProtocols"
  - type: llm_judge
    criteria: "Response addresses preparedness and learning — crisis preparedness program (prevents improvised responses: crisis simulation exercises — conduct tabletop exercises twice annually; simulate different crisis types and practice the response protocol; debrief each simulation: what worked, what was confusing, what needs updating in the playbook; media training — the designated spokesperson and backup receive media training annually; practice delivering difficult messages in a brand-consistent voice; customer-facing team preparation — support, sales, and customer success teams receive crisis communication training; they need to know: what to say, what not to say, and when to escalate; the crisis playbook should be easily accessible — not buried on page 47 of the brand guidelines PDF; it should be a separate section with its own navigation in the digital brand platform, and physical copies should be available in key offices), post-crisis review process (learns from each crisis: within 2 weeks of resolution, conduct a formal post-crisis review: timeline of events and responses; what was the actual vs planned response time?; were the templates useful? what was missing?; how did each channel perform?; what was the public and customer reaction?; what would we do differently?; update the playbook based on findings — each crisis should make the playbook better; track brand perception recovery — how long does it take for brand sentiment to return to pre-crisis levels?; document the crisis and response in a 'crisis history' appendix — future crisis teams can reference how similar situations were handled; the post-crisis review should be honest, not blame-seeking — the goal is to improve the system, not punish individuals), integration with brand guidelines (ensures the crisis playbook is an organic part of the brand system: the crisis voice section references the main voice and tone guidelines — it's an adaptation, not a replacement; the visual crisis templates use the brand's visual identity — crisis communications should look like they come from the same company as regular communications; the crisis playbook links to relevant brand guidelines sections: the voice attributes apply to crisis communication, the approved spokesperson list connects to the brand governance section, the channel guidelines in the playbook extend the main social media and communication guidelines; when the brand guidelines are updated, the crisis playbook is reviewed for consistency)."
    weight: 0.30
    description: "PreparednessAndLearning"
