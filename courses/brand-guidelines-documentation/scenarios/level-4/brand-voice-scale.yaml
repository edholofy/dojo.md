meta:
  id: brand-voice-scale
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Brand voice at scale — create systems for maintaining consistent brand voice across hundreds of content creators, multiple products, and diverse channels"
  tags: [voice, scale, content, consistency, expert]

state: {}

trigger: |
  Your company has 45 people who regularly create content:
  - 12 marketing writers (blog, email, social, ads)
  - 8 product writers (UI copy, help docs, release notes)
  - 6 sales enablement writers (proposals, case studies, decks)
  - 5 customer success writers (onboarding emails, guides)
  - 4 developer relations writers (technical docs, tutorials)
  - 3 HR/internal comms writers (job posts, internal updates)
  - 7 executives who write their own LinkedIn posts and emails

  Current state:
  - The brand voice guidelines are 2 paragraphs: "We're
    professional but approachable. Avoid jargon."
  - Each team has developed their own interpretation — the
    marketing team writes in a completely different voice than
    the product team
  - New writers take 3-6 months to "sound right" — there's
    no way to train them faster because the guidelines are
    too vague
  - Executives' LinkedIn posts sound nothing like the company's
    marketing — some are inspirational, others are technical,
    one posts memes
  - The DevRel team writes in a casual, first-person style
    that feels disconnected from the formal enterprise
    marketing voice
  - Customer-facing communications across teams feel like
    they come from different companies

  The VP of Content says: "We need a voice system, not a voice
  paragraph. Something that 45 different people can follow
  and still sound like one brand."

  Task: Create the comprehensive brand voice system.

assertions:
  - type: llm_judge
    criteria: "Response creates a multi-dimensional voice system — voice architecture (builds a voice framework beyond simple adjectives: brand voice DNA — 3-4 core voice attributes that never change regardless of channel or audience; each attribute is defined with: a clear description, what it sounds like in practice, what it doesn't sound like, and 3 example sentences; for example: 'Confident' — 'We state our expertise directly. We don't hedge with qualifiers or apologize for having opinions. We sound like: We've seen this pattern across 1,000 deployments. Not like: We think maybe this could possibly work for some use cases.'; voice spectrum — each attribute operates on a spectrum that shifts by context; 'Confident' might be dialed up in thought leadership content and slightly down in support communications; the spectrum allows flexibility without losing the core voice; voice principles — overarching rules that guide all content: clarity over cleverness, substance over style, helpfulness over salesiness; these principles resolve conflicts when voice attributes could be interpreted differently), channel and audience voice adaptation (defines how the voice flexes across contexts: channel voice matrix — for each major channel, specify which voice attributes are emphasized and which are dialed back; blog — confident and educational, warmth high; product UI — clear and efficient, confidence medium; sales proposals — authoritative and client-focused, warmth medium; developer docs — precise and peer-level, informality higher; LinkedIn executive — thought leadership, personality high; audience voice adaptations — enterprise buyers hear a more polished, authoritative voice; developers hear a more casual, peer-to-peer voice; new users hear a warmer, more welcoming voice; power users hear a more efficient, direct voice; cross-channel consistency test — despite the adaptations, someone reading a blog post, a help doc, and a sales email should feel these come from the same company; the voice DNA ensures this underlying consistency while channel adaptations ensure contextual appropriateness), vocabulary and language system (defines the brand's linguistic choices: brand vocabulary — a curated glossary of preferred terms and terms to avoid; 'leverage' → 'use'; 'utilize' → 'use'; 'synergy' → describe the specific benefit; 'solution' → only when referring to a specific product offering; product terminology — exact names, capitalizations, and descriptions for all products and features; competitive language — how to reference competitors: never by name in marketing, by name in sales when asked; industry jargon guidance — which technical terms to use, which to explain, which to avoid; sentence construction preferences — active voice, short sentences for clarity, varied length for rhythm; the vocabulary guide should be searchable and regularly updated)."
    weight: 0.35
    description: "VoiceSystem"
  - type: llm_judge
    criteria: "Response creates practical voice tools and training — voice training program (gets 45 writers producing on-brand content: onboarding voice workshop — a 2-hour session for new writers covering: the voice DNA, their channel's specific adaptations, the vocabulary guide, and hands-on exercises; the workshop includes a 'voice ear training' exercise — read 10 sample texts and identify which are on-brand and which aren't; writing buddy system — new writers are paired with experienced on-brand writers for their first month; the buddy reviews their first 10 pieces and provides voice coaching; ongoing calibration — quarterly voice workshops where writers across teams share their work and calibrate on voice consistency; this prevents teams from drifting into their own sub-voices; executive voice coaching — individual sessions helping executives develop their personal voice within the brand framework; their LinkedIn shouldn't sound like the marketing team but should feel unmistakably connected to the brand), voice reference tools (provides practical daily resources: voice decision tree — a flowchart for common writing decisions: 'Am I writing for a technical or non-technical audience?' → 'Is this a first touchpoint or an existing relationship?' → leads to specific voice guidance; before and after examples — for each voice attribute and each channel, provide a 'not this → this' comparison; organized by content type so writers can quickly find relevant examples; voice checklist — a quick self-review checklist before publishing: does this sound like [brand]? are the voice attributes present? is the tone appropriate for this channel and audience? does the vocabulary align with the brand glossary?; AI writing assistant prompts — provide voice-optimized prompts for AI writing tools that incorporate the brand voice attributes, vocabulary preferences, and channel-specific adaptations), content review and feedback (systematizes voice quality: voice review rubric — a scoring system for content review based on voice attributes; each attribute is rated 1-5; a piece must score 3+ on every attribute to be considered on-brand; the rubric provides objectivity — instead of 'this doesn't sound right,' the reviewer can say 'the confidence attribute is a 2 here — try removing the hedging language'; peer review circles — monthly sessions where each team reviews another team's content; marketing reviews product content and vice versa; this cross-pollination maintains cross-team consistency)."
    weight: 0.35
    description: "VoiceToolsAndTraining"
  - type: llm_judge
    criteria: "Response addresses measurement and evolution — voice consistency measurement (tracks whether the system works: quantitative metrics — brand voice audit: quarterly sample of content from each team scored against the voice rubric; track average scores by team, by channel, and by voice attribute; new writer ramp time — measure how quickly new writers achieve consistent on-brand scores; target: 4-week ramp with the training program vs the current 3-6 months; content performance correlation — analyze whether on-brand content outperforms off-brand content: higher engagement, better conversion, more sharing; this data justifies the investment in voice consistency; qualitative assessment — periodic brand perception surveys asking audiences to describe how the brand communicates; compare their descriptions against the intended voice attributes; if the audience says 'professional but cold' and the intended attribute is 'confident but warm,' the voice needs recalibration), voice system evolution (plans for the voice to grow with the company: annual voice review — the voice DNA attributes should be reviewed annually: are they still accurate? has the brand evolved? has the market shifted? do the channel adaptations still map to current needs?; new channel integration — when the brand enters a new channel — podcasts, video scripts, chatbot conversations — develop voice adaptations before launching content; the voice system should have clear guidelines for creating new channel adaptations; vocabulary evolution — the glossary needs regular updates: new products, new industry terms, new competitors; assign a terminology steward who reviews and updates the glossary monthly; voice governance — the voice system owner (VP Content or Head of Brand) has final authority on voice interpretation disputes; they also own the annual voice review and training program updates; the voice system should feel empowering, not constraining — writers should feel that the system helps them write better, not that it limits their creativity)."
    weight: 0.30
    description: "MeasurementAndEvolution"
