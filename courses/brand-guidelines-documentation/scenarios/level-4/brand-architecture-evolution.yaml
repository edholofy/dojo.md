meta:
  id: brand-architecture-evolution
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Brand architecture evolution — restructure a company's brand architecture as it scales from a single product to a multi-product portfolio"
  tags: [architecture, portfolio, evolution, scaling, expert]

state: {}

trigger: |
  Your company started as a single-product business (a project
  management tool called "TaskFlow") with straightforward brand
  guidelines. Over 5 years, the company has grown:

  - TaskFlow — the original project management tool (60% revenue)
  - TaskFlow Analytics — a business intelligence add-on (15%)
  - TaskFlow HR — a people management platform acquired 2 years
    ago, originally called "PeopleSync" (15%)
  - TaskFlow Connect — an integration platform launched last
    year (7%)
  - TaskFlow AI — an AI assistant feature released 3 months
    ago (3%)

  Problems with the current "TaskFlow Everything" approach:
  - TaskFlow HR still feels like a different product — the
    rebrand from PeopleSync was superficial
  - Enterprise customers want to buy TaskFlow Analytics without
    being associated with a "task management" brand
  - TaskFlow AI is a feature, not a product, but it's branded
    like one
  - The sales team struggles — "Is TaskFlow a project management
    tool or a business platform?"
  - The website is confusing — 5 product pages with inconsistent
    messaging and visual treatment
  - Competitors position TaskFlow as "just a task manager" despite
    the expanded product suite

  The CEO says: "We've outgrown the TaskFlow name for some of
  these products. We need a brand architecture that supports
  where we're going, not where we started."

  Task: Design the evolved brand architecture and update
  the brand guidelines accordingly.

assertions:
  - type: llm_judge
    criteria: "Response designs the brand architecture strategy — architecture analysis (evaluates the options: option 1 — branded house: everything stays under TaskFlow; simple but limiting — the 'task' association constrains enterprise positioning; option 2 — create a parent brand: a new umbrella brand like 'Vertex' with TaskFlow as one product; clean but expensive — requires building new brand equity from scratch; option 3 — endorsed brand: a parent brand endorses each product — 'TaskFlow by Vertex', 'Analytics by Vertex'; balances heritage with growth; option 4 — hybrid: TaskFlow remains for the core product, a new parent brand emerges for the platform, and products are organized under the parent; the analysis should consider: customer perception, competitive positioning, migration cost, brand equity preservation, and scalability for future products), architecture recommendation (recommends a specific approach with rationale: for this scenario, a hybrid approach is likely strongest — create a parent brand for the company/platform, keep TaskFlow for the core PM product, and organize other products under the parent; the recommendation should define: what gets the new parent brand name, what retains TaskFlow, how TaskFlow AI is treated differently from standalone products — it's a feature within products, not a separate product brand; name hierarchy — parent brand → product brands → feature names; visual hierarchy — how the parent brand, product brands, and feature names appear together), migration strategy (plans the transition from current to future architecture: phase 1 — introduce the parent brand subtly: 'TaskFlow, part of [Parent Brand]' appears in corporate contexts while product branding remains unchanged; phase 2 — transition product brands: TaskFlow Analytics becomes '[Parent] Analytics', TaskFlow HR becomes '[Parent] People' or a fresh name, TaskFlow Connect becomes '[Parent] Connect'; TaskFlow remains TaskFlow; phase 3 — establish the platform brand: all products are presented as a unified platform under the parent brand with individual product identities; each phase has a timeline, resource requirements, and success criteria; the migration should minimize customer confusion and preserve the brand equity TaskFlow has built)."
    weight: 0.35
    description: "ArchitectureStrategy"
  - type: llm_judge
    criteria: "Response creates the multi-product brand system — visual identity system (designs a flexible identity for the portfolio: parent brand identity — logo, colors, typography that work as an umbrella; product brand identities — each product has a distinct color accent or icon within the parent system; a customer should immediately see that Analytics and TaskFlow are part of the same family while being distinct products; the visual system must scale — when a 6th product launches, the system should accommodate it without redesign; visual hierarchy rules — parent brand logo size relative to product name, color application by product, shared vs unique visual elements; co-marketing — how products appear together in platform marketing vs individually in product-specific marketing), naming and messaging architecture (structures language across the portfolio: naming conventions — product names follow a pattern: descriptive, memorable, and non-limiting; avoid 'TaskFlow [Function]' for everything — that anchored to task management; messaging hierarchy: platform-level — 'The [Parent] Platform: Everything your business runs on'; product-level — each product has its own positioning: TaskFlow: 'The project management tool teams love'; [Parent] Analytics: 'Business intelligence built for operational data'; messaging do's and don'ts — don't describe the parent brand as 'a project management company'; do describe it as 'a business operations platform'; each product page can reference the platform benefits but leads with its own value proposition), guidelines documentation updates (updates the brand guidelines for the new architecture: add a brand architecture section — visual diagram of the brand hierarchy; naming rules for new products and features; for each product: visual identity specifications, voice and tone adaptations, messaging framework, and co-marketing rules; template updates — every template needs a version for each product brand and for the platform brand; guidelines for when to use platform branding vs product branding — platform for corporate, investor, and enterprise sales; product for specific buyer personas and feature marketing)."
    weight: 0.35
    description: "MultiProductSystem"
  - type: llm_judge
    criteria: "Response addresses organizational and operational implications — internal alignment (manages the organizational change: product teams need to understand and adopt the new architecture: each team gets product-specific brand guidelines within the overall system; training — workshops for marketing, sales, product, and customer success on the new architecture; sales enablement — updated pitch decks, battlecards, and messaging for the new positioning; the biggest challenge is the TaskFlow HR team — they've already been through one rebrand from PeopleSync and now face another; handle with empathy and involve them in the naming process), external communication (manages the market transition: customer communication — explain the evolution without causing confusion; enterprise customers hear: 'Your trusted tools are now part of a more comprehensive platform'; analyst and press briefing — position the architecture change as strategic maturity, not identity crisis; partner communication — updated co-marketing guidelines reflecting the new brand hierarchy; website redesign — the site structure should mirror the brand architecture: a platform homepage, individual product pages, and a 'Why [Parent]' page for platform positioning), governance for multi-brand (establishes ongoing management: brand council — expanded to include a representative from each product brand; approval workflows — product teams have autonomy for product-specific materials within guidelines; platform-level materials require central brand team approval; new product launch process — when a new product is added, it follows a defined brand integration checklist: naming committee review, visual identity creation within the system, messaging development, template creation, team training; the brand architecture guidelines should include clear criteria for when something is a feature within a product vs a new product brand — prevent the 'TaskFlow AI' mistake of branding features as products)."
    weight: 0.30
    description: "OrganizationalImplications"
