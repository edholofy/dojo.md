meta:
  id: brand-measurement-roi
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Brand measurement and ROI — create frameworks for measuring brand guidelines impact, brand equity, and demonstrating ROI to leadership"
  tags: [measurement, roi, equity, leadership, expert]

state: {}

trigger: |
  Your company invested $800K last year in brand infrastructure:
  - $200K on a brand guidelines platform (Frontify)
  - $150K on a brand refresh (agency fees)
  - $100K on a design system integration
  - $100K on brand training programs
  - $150K on brand team salaries
  - $100K on brand compliance tooling

  The CFO is asking: "What's the return on this $800K? How do
  I know the brand guidelines are making us money? Show me
  the data."

  The brand team has never been asked to prove ROI before.
  They have anecdotal evidence — "Materials look more
  consistent" and "Fewer ad-hoc review requests" — but no
  quantified metrics.

  Meanwhile, the CEO is deciding next year's budget and
  considering cutting the brand platform subscription because
  "it's expensive and I don't see the impact."

  Task: Create the brand measurement and ROI framework that
  justifies the brand investment and becomes an ongoing
  reporting tool.

assertions:
  - type: llm_judge
    criteria: "Response creates a brand ROI measurement framework — efficiency metrics (quantifies operational savings from brand infrastructure: time savings — before brand platform: how many hours per week did teams spend searching for assets, creating materials from scratch, and waiting for brand team reviews? after: how much time was saved through self-service templates, searchable asset library, and streamlined approval workflows? calculation: hours saved per week × average hourly rate × 52 weeks = annual time savings value; brand team capacity — the brand team was spending 60% of time on ad-hoc reviews; now it's 20%; the 40% freed capacity is redirected to proactive brand initiatives worth $X; material production cost reduction — templates and the asset library reduce design production time; calculate: average production time before vs after × number of materials produced annually × design hourly rate; reduced rework — brand compliance tooling catches violations before production; calculate: average cost of fixing a non-compliant material × number of violations prevented; these efficiency metrics alone may justify the investment), brand consistency impact (connects consistency to business outcomes: conversion rate correlation — track whether marketing materials produced using brand guidelines and templates convert better than off-brand materials; A/B test: branded template vs non-branded template for the same campaign; customer trust and retention — survey-based measurement: do customers who experience consistent brand touchpoints show higher trust scores and retention rates?; sales cycle impact — do sales teams using brand-compliant materials close deals faster? compare sales cycle length before and after brand enablement; talent acquisition — has employer brand consistency improved recruitment metrics? time to hire, offer acceptance rate, and quality of applicants; brand premium — can the company charge more than competitors? brand equity studies measure willingness to pay a premium for the brand vs generic alternatives), brand equity valuation (measures long-term brand value: select a brand equity model — brand valuation methods include: cost-based (what would it cost to rebuild the brand?), market-based (comparable brand transactions), income-based (revenue attributable to brand vs unbranded product); for the CFO presentation, use multiple approaches: operational savings demonstrate immediate ROI; brand equity valuation demonstrates long-term asset value; track brand equity annually — this is the brand equivalent of tracking company valuation; report brand equity alongside financial metrics at board meetings)."
    weight: 0.35
    description: "ROIFramework"
  - type: llm_judge
    criteria: "Response creates the reporting and presentation system — brand performance dashboard (creates an ongoing measurement system: the dashboard tracks: efficiency metrics — monthly: time savings, review requests, template usage, asset downloads; consistency metrics — quarterly: brand compliance scores by department, audit results, deviation request volume; perception metrics — quarterly: brand awareness, NPS, sentiment analysis, competitive share of voice; equity metrics — annually: brand equity valuation, brand premium analysis; the dashboard uses clear visualizations: trend lines show improvement over time, benchmarks show performance vs targets, and red/yellow/green status indicators highlight areas needing attention; the dashboard should be accessible to the leadership team, not just the brand team), CFO and CEO presentation (builds the business case: structure the presentation around business impact, not brand metrics: page 1 — bottom line: the $800K brand investment generated $X in efficiency savings and contributed to $Y in measurable business outcomes; page 2 — efficiency ROI: specific dollar figures for time savings, reduced rework, and increased brand team capacity; page 3 — business impact: conversion rate improvements, sales cycle reduction, and talent acquisition gains correlated with brand consistency; page 4 — brand equity: the brand is an asset valued at $X based on equity analysis; this investment maintains and grows that asset; page 5 — competitive context: how the brand compares to competitors and what happens if brand investment is cut; page 6 — next year plan: recommended investment with projected ROI; the presentation should speak the CFO's language — not 'brand awareness increased 15%' but 'brand investment reduced customer acquisition cost by $50 per customer, saving $500K annually'), benchmark and target setting (establishes goals for ongoing improvement: set baseline measurements for all key metrics in year 1; establish targets for year 2: efficiency targets — 20% improvement in time savings as adoption increases; consistency targets — brand compliance score from current baseline to 90%; perception targets — measurable improvement in brand awareness and NPS; benchmark against industry — how does the brand investment compare to industry benchmarks for companies of similar size?; the targets create accountability and a clear narrative: 'We invested $800K, achieved these results, and next year we'll achieve more')."
    weight: 0.35
    description: "ReportingSystem"
  - type: llm_judge
    criteria: "Response addresses ongoing measurement operations — data collection infrastructure (builds the systems to gather brand data: automated data collection — platform analytics for usage data, template downloads, asset access; integration with marketing analytics — connect brand compliance data with campaign performance data; survey infrastructure — quarterly brand perception pulse surveys to customers, employees, and prospects; the data collection should be mostly automated — the brand team can't spend all their time measuring; it should take less than 4 hours per month to compile the dashboard; data quality — ensure measurement is consistent: same methodology each quarter, same sample sizes, same questions; trend data is only valuable if the methodology is consistent), organizational buy-in for measurement (ensures the measurement program is supported: involve stakeholders in metric selection — each department should care about different metrics: marketing cares about conversion impact, sales cares about deal velocity, HR cares about recruitment metrics; reporting cadence — monthly summaries to the brand team, quarterly reports to marketing leadership, annual ROI report to the C-suite and board; make the data actionable — each report includes not just metrics but recommended actions: 'Sales team compliance is 65% — recommend additional training and updated proposal templates'; celebrate wins — when metrics improve, share the success broadly; this builds organizational support for brand investment), investment optimization (uses measurement to optimize spending: identify which brand investments generate the highest ROI — is the platform worth more than the training program? is the compliance tooling worth more than the design system?; allocate budget based on impact data — invest more in what works, less in what doesn't; scenario planning — model what happens if the brand platform is cut: estimated increase in brand team workload, decrease in consistency scores, and projected impact on conversion and sales metrics; this analysis directly addresses the CEO's consideration of cutting the platform subscription; continuous improvement — use measurement data to refine the brand program: which guidelines need updating, which training is most effective, which tools are most valued)."
    weight: 0.30
    description: "OngoingOperations"
