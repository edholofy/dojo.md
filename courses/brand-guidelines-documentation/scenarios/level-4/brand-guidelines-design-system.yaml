meta:
  id: brand-guidelines-design-system
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Brand guidelines and design system integration — bridge the gap between brand guidelines and a living design system with tokens, components, and developer handoff"
  tags: [design-system, tokens, components, developer, expert]

state: {}

trigger: |
  Your company has two parallel documentation systems that
  are increasingly out of sync:

  1. Brand Guidelines (managed by the brand team in Frontify):
     - Logo usage, color palette, typography, voice and tone
     - Photography and illustration style
     - Co-branding and partnership rules
     - Updated quarterly

  2. Design System (managed by the design engineering team
     in Storybook + Figma):
     - Component library with coded components
     - Design tokens (colors, spacing, typography)
     - Interaction patterns and accessibility standards
     - Updated weekly with each sprint

  The sync problems:
  - The brand team updated the primary blue from #0066CC to
    #0052A3 in the guidelines 6 weeks ago, but the design
    system still uses the old color
  - The design system has 8 shades of gray that the brand
    guidelines don't document
  - Typography in the design system uses a different scale
    than what the brand guidelines specify
  - The brand team defines "tone of voice" but the design
    system's component documentation doesn't reference it
  - Designers follow the design system; marketers follow the
    brand guidelines; sometimes they produce different-looking
    outputs for the same brand

  The VP of Design says: "We need one source of truth, not
  two competing documents. How do we integrate the brand
  guidelines with the design system?"

  Task: Design the integration between brand guidelines and
  the design system.

assertions:
  - type: llm_judge
    criteria: "Response designs the integrated architecture — single source of truth strategy (defines the integration model: principle — design tokens are the bridge between brand guidelines and the design system; the brand team defines the brand-level decisions: primary blue is #0052A3, the primary font is Inter, the brand's personality is approachable and professional; the design system team translates these into tokens and components: --color-primary: #0052A3, font-family: Inter, button border-radius: 8px; the brand guidelines document 'why' and 'what'; the design system documents 'how'; neither replaces the other — they're complementary layers of the same system; the integration should be bidirectional — brand decisions flow into the design system, and design system learnings inform brand guidelines updates), token architecture as bridge (designs the token layer connecting both systems: brand tokens — the highest level, owned by the brand team: brand colors with their meanings and use cases; brand typography choices with rationale; brand spacing and layout principles; semantic tokens — the middle layer, jointly owned: these map brand tokens to functional meanings: --color-action-primary maps to the brand's primary blue; --font-heading maps to the brand's heading typeface; --space-comfortable maps to the brand's preferred spacing feel; component tokens — owned by the design engineering team: specific to components and derived from semantic tokens; --button-background uses --color-action-primary; the token architecture creates a dependency chain: when the brand team changes primary blue, updating one brand token cascades through semantic and component tokens automatically), governance and workflow integration (defines how the two teams collaborate: a shared brand-design sync — biweekly meeting between brand and design system teams to review changes, discuss upcoming updates, and resolve conflicts; change management process — brand changes: the brand team proposes a change → design system team assesses impact on tokens and components → joint decision on implementation timeline → brand guidelines and design system updated in coordination; design system changes: design engineering proposes a new component or pattern → brand team reviews for brand alignment → approved patterns are reflected in brand guidelines as application examples; conflict resolution — when the design system needs something the brand guidelines don't cover (like the 8 shades of gray), the brand team should either document and approve them or provide alternatives; the brand guidelines should evolve to address the design system's legitimate needs)."
    weight: 0.35
    description: "IntegratedArchitecture"
  - type: llm_judge
    criteria: "Response addresses content integration — voice and tone in components (brings brand voice into the design system: component-level content guidelines — each UI component in the design system should include content guidance: button labels follow the brand voice — action-oriented, clear, concise; error messages use the empathetic tone from the brand guidelines; onboarding text reflects the brand's welcoming personality; create a content pattern library — reusable text patterns that are both brand-aligned and UX-optimized; microcopy guidelines — the small text in interfaces: form labels, tooltips, loading states, empty states; these are where the brand voice lives in the product; the design system should reference the brand voice guidelines and provide practical application examples for each component), documentation integration (unifies the documentation experience: cross-linking — brand guidelines reference design system components as implementation examples: 'The primary button uses our brand blue (#0052A3) — see the Button component in Storybook for implementation'; design system documentation references brand guidelines for rationale: 'This color is our brand primary blue — see Brand Guidelines > Color Palette for usage context and accessibility requirements'; shared glossary — terms used in both systems have consistent definitions; unified search — ideally, searching for 'primary color' surfaces results from both the brand guidelines and the design system), visual alignment audit (resolves the current sync issues: conduct a comprehensive audit comparing brand guidelines and design system: list every color, typeface, spacing value, and visual treatment in both; identify discrepancies — the old blue, the undocumented grays, the typography scale differences; resolve each discrepancy: either update the design system to match the guidelines, update the guidelines to reflect design system decisions, or create a joint decision for a new standard; document the resolution — this audit becomes a case study for why the integration is necessary)."
    weight: 0.35
    description: "ContentIntegration"
  - type: llm_judge
    criteria: "Response creates operational sustainability — automation and tooling (implements technical solutions for ongoing sync: automated token sync — when brand tokens are updated in the guidelines platform, the design system's token files are updated automatically or flagged for review; Figma-to-code pipeline — design tokens defined in Figma propagate to CSS variables, Tailwind config, and component styles; visual regression testing — automated tests that detect when implemented components drift from brand specifications; brand compliance linting — a linter or CI check that flags brand violations in code: wrong color values, unauthorized fonts, accessibility failures), team structure and skills (addresses the organizational requirements: the brand team needs basic design system literacy — understanding tokens, components, and how their decisions translate into code; the design system team needs brand awareness — understanding brand strategy, audience considerations, and why certain brand decisions are made; consider a 'brand systems' role — someone who bridges both teams and owns the integration layer; this person attends both team meetings and maintains the token architecture), evolution and scaling (plans for growth: as the product portfolio grows, the integrated system must scale; new products should inherit the shared brand-design token layer but may have product-specific extensions; the integration model should support theming — a dark mode, a partner white-label version, or product-specific color accents should be achievable through token overrides without breaking the brand system; quarterly health check — audit the integration: are tokens in sync? is the change management process working? are both teams satisfied with the collaboration? the integrated brand-design system is a living system that requires ongoing attention, not a one-time setup)."
    weight: 0.30
    description: "OperationalSustainability"
