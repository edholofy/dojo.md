meta:
  id: brand-merger-integration
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Brand merger integration — document guidelines for merging two brand identities during a corporate acquisition while preserving value from both brands"
  tags: [merger, acquisition, integration, expert]

state: {}

trigger: |
  Your SaaS company (Brand A — "Nimbus," a modern, developer-
  focused cloud platform) has acquired a competitor (Brand B —
  "Fortress," an enterprise-focused security platform with
  strong brand recognition among CISOs and IT directors).

  The acquisition strategy calls for a phased integration:
  - Phase 1 (months 1-3): Operate as separate brands with
    "Fortress, a Nimbus company" endorsement
  - Phase 2 (months 4-9): Unified product suite under the
    Nimbus brand with Fortress as a product line
  - Phase 3 (months 10-18): Full brand integration with a
    single visual identity and voice

  Challenges:
  - Fortress customers chose it specifically because it felt
    enterprise-grade and serious — Nimbus's playful developer
    brand makes them nervous
  - Nimbus employees worry the acquisition will make the brand
    feel corporate and boring
  - 200 Fortress employees need to understand and adopt Nimbus
    brand guidelines while mourning their own brand
  - Both brands have partner ecosystems with co-branded materials
  - Fortress has regulatory-approved marketing materials that
    reference the Fortress brand specifically

  Task: Create the brand integration guidelines for all
  three phases.

assertions:
  - type: llm_judge
    criteria: "Response creates phased brand integration guidelines — phase 1 transitional identity (documents the endorsed brand approach: visual treatment — 'Fortress, a Nimbus company' lockup with specific spacing, sizing, and placement rules; the Fortress logo remains primary with a Nimbus endorsement badge; color palette — Fortress retains its existing colors for customer-facing materials; Nimbus colors appear only in the endorsement element; typography — Fortress retains its typeface for continuity; internal documents may begin transitioning to Nimbus typography; voice — Fortress maintains its enterprise voice; communications about the acquisition use a joint voice that respects both brands' tones; the transition should feel like an enhancement, not a takeover — Fortress customers should feel their trusted brand is now backed by more resources), phase 2 unified architecture (documents the product-line integration: visual treatment — Nimbus becomes the master brand; Fortress becomes 'Nimbus Security' or 'Nimbus Fortress' — a product line within the Nimbus ecosystem; the Fortress visual identity evolves to fit within the Nimbus design system while retaining recognizable elements — perhaps Fortress's signature color becomes the product line's accent color; naming conventions — how Fortress product names translate into Nimbus product line names; messaging — the Nimbus brand voice is primary but the security product line uses a more authoritative sub-tone appropriate for enterprise security; the transition messaging emphasizes what customers gain — expanded capabilities, integrated platform — not what they lose), phase 3 full integration (documents the single-brand endpoint: the Nimbus brand system now includes an enterprise dimension that didn't exist before the acquisition; visual identity — a mature Nimbus visual system that can scale from developer-playful to enterprise-serious depending on the audience; voice and tone — expanded tone spectrum: the developer audience gets the original Nimbus voice; the enterprise security audience gets a voice that channels Fortress's authority within the Nimbus framework; brand architecture — a single brand with audience-appropriate expressions rather than a one-size-fits-all identity; this phase represents brand evolution, not just absorption)."
    weight: 0.35
    description: "PhasedIntegration"
  - type: llm_judge
    criteria: "Response addresses stakeholder management in brand integration — internal brand adoption (manages the human side of brand change: Fortress employees — acknowledge the emotional attachment to their brand; involve Fortress brand champions in the integration process; training program: introduce the Nimbus brand, explain how Fortress's brand DNA influenced the evolved Nimbus identity, provide practical guidelines for the current phase; Nimbus employees — communicate how the acquisition enriches the brand rather than diluting it; address the fear that the brand will become 'corporate'; show how the expanded tone spectrum adds capability without losing the original character; brand ambassador program — identify champions from both companies to model brand adoption and support their teams), partner and customer communication (manages external stakeholders: partner co-branding — create a phase-specific co-branding guide; partners need to update materials at each phase transition; provide templates, timelines, and support for each transition; customer communication — each phase transition includes customer-facing communication explaining what's changing and why; the tone should be reassuring and benefit-focused; anticipate customer concerns — especially Fortress customers worried about losing enterprise-grade focus; regulatory materials — work with legal to update regulatory-approved materials; some regulated materials may need to maintain Fortress branding longer for compliance reasons; document the exceptions and their expiration dates), brand equity preservation (ensures value from both brands is retained: audit both brands' equity — what do customers value most about each brand? Nimbus: innovation, developer experience, modern design; Fortress: reliability, security expertise, enterprise trust; the integrated brand must preserve these equity elements; brand tracking — measure brand perception among both customer bases throughout the integration; if Fortress customer satisfaction drops, the integration pace may need to slow; if Nimbus's innovation perception decreases, the brand expression may need adjustment; brand integration success metrics — customer retention rates for both bases, brand perception scores, employee brand sentiment surveys)."
    weight: 0.35
    description: "StakeholderManagement"
  - type: llm_judge
    criteria: "Response creates practical integration tools — brand integration toolkit (provides tangible resources: brand integration timeline — a visual calendar showing what changes when, who is responsible, and what materials are affected; material audit and transition plan — inventory all existing branded materials from both companies; categorize by phase: what changes in phase 1, phase 2, phase 3; template library — transitional templates for each phase: email signatures, presentations, business cards, website pages; each template reflects the current phase's visual treatment; brand integration FAQ — answers common questions from employees, partners, and customers about what's changing and when), asset management during integration (manages the practical challenge of two brand asset libraries: create a unified DAM that includes both brands' assets organized by phase; tagging system — each asset tagged with: original brand, applicable phase, audience, and expiration date; deprecation workflow — as materials transition between phases, old versions are archived, not deleted; they may be needed for reference or regulatory purposes; partner portal — a dedicated section showing partners exactly which assets to use in the current phase; automated notifications when phase transitions require material updates), guidelines documentation for integration (the integration guidelines themselves: create a standalone brand integration guide — separate from but linked to the main Nimbus brand guidelines; the integration guide includes: current phase summary, visual identity rules for this phase, voice and tone guidelines for this phase, material templates, FAQ, and contact information for the brand team; the guide updates at each phase transition — versioned and dated; after phase 3 completion, the integration guide is retired and its learnings are incorporated into the main Nimbus brand guidelines; the main guidelines now include the expanded audience framework and evolved visual system that resulted from the integration)."
    weight: 0.30
    description: "IntegrationTools"
