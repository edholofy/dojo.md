meta:
  id: enterprise-brand-compliance
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Enterprise brand compliance — design and implement a brand compliance program for a large distributed organization with regulatory requirements"
  tags: [compliance, enterprise, regulatory, audit, expert]

state: {}

trigger: |
  You're the Global Brand Director at a 5,000-person financial
  services company with 30 offices across 12 countries. A
  regulatory audit has revealed brand compliance issues:

  - Marketing materials in 4 countries contain outdated
    disclaimer language that violates current regulations
  - The APAC regional team created their own brand guidelines
    "adaptation" that differs significantly from the global
    standards — different fonts, modified logo, and a localized
    tagline that wasn't approved
  - Field sales teams in 8 offices are using materials they
    created themselves — presentations with wrong colors, fact
    sheets with unapproved claims, and proposals with outdated
    logos
  - The compliance team discovers that 3 product brochures
    make performance claims that haven't been reviewed by legal
  - Partner-distributed materials in 6 markets use the old
    logo and reference discontinued products
  - Employee social media posts regularly use the wrong logo
    and unapproved brand descriptions

  The CEO is concerned: "In financial services, brand
  compliance isn't just about aesthetics — it's a regulatory
  risk. Fix this."

  Task: Design the enterprise brand compliance program.

assertions:
  - type: llm_judge
    criteria: "Response creates a compliance assessment and remediation plan — compliance audit framework (systematically identifies all violations: immediate audit — categorize all materials by risk level: high risk — materials with regulatory non-compliance: outdated disclaimers, unapproved performance claims; these must be corrected or removed within 48 hours; medium risk — materials with significant brand deviations: wrong logos, unauthorized modifications, off-brand visual identity; these need correction within 30 days; low risk — minor brand inconsistencies: slightly wrong colors, formatting issues, font substitutions; these need correction within 90 days; the audit covers: all digital materials across 30 offices, all print materials currently in distribution, all partner-distributed materials, employee social media presence; assign audit responsibility by region — each regional office conducts their local audit using a standardized checklist), regulatory compliance integration (addresses the regulatory dimension: work with the legal and compliance team to create a 'regulated content checklist' — every customer-facing material must include: current disclaimer language, approved claims only, required regulatory disclosures; create a regulatory review workflow — all materials in regulated categories must be reviewed by legal before publication; this is non-negotiable and must be built into the approval process; document country-specific regulatory requirements — each market may have different disclosure requirements; the brand guidelines must include a regulatory appendix by country; establish a regulatory update process — when regulations change, the brand team is notified and updates affected materials within the required timeframe), remediation execution (fixes all identified violations: high-risk items — the brand team provides corrected versions immediately; remove non-compliant digital materials within 48 hours; recall and replace print materials with regulatory violations; APAC adaptation — meet with the APAC team to understand their needs; incorporate legitimate local requirements into the global guidelines; replace unauthorized adaptations with approved localized versions; partner materials — contact all partners with updated brand assets and a deadline for replacing outdated materials; provide support for the transition)."
    weight: 0.35
    description: "ComplianceAssessment"
  - type: llm_judge
    criteria: "Response designs the ongoing compliance infrastructure — compliance governance structure (creates a sustainable compliance system: global brand compliance officer — a dedicated role responsible for brand compliance across the organization; regional brand coordinators — one per region responsible for local compliance monitoring and training; compliance review board — monthly cross-functional meeting: brand, legal, compliance, and regional representatives review compliance status; escalation pathway — clear process for reporting and resolving compliance issues; the governance structure must balance control with practicality — overly rigid processes will be circumvented), technology and tools for compliance (implements systems to prevent and detect violations: brand management platform — a centralized platform where all approved materials are stored and distributed; lock templates to prevent unauthorized modifications; version control — automatic alerts when materials become outdated; mandatory retirement of old versions when new versions are published; compliance monitoring tools — automated scanning of digital properties for logo usage, color accuracy, and disclaimer presence; social media monitoring — track employee posts mentioning the company for brand compliance; periodic automated audits supplement manual reviews), material creation and approval workflow (prevents future violations: tiered approval system — tier 1 self-serve: locked templates that cannot be modified beyond designated fields — employees fill in content but the brand elements are fixed; tier 2 regional review: new materials reviewed by the regional brand coordinator before publication; tier 3 global review: campaigns, partner materials, and anything with regulatory implications reviewed by the global brand team and legal; the system should make compliance the path of least resistance — if creating compliant materials is harder than going off-brand, people will go off-brand; invest in making the compliant path easy, fast, and well-supported)."
    weight: 0.35
    description: "ComplianceInfrastructure"
  - type: llm_judge
    criteria: "Response addresses training, culture, and measurement — compliance training program (educates the organization: mandatory brand compliance training — annual certification for all employees who create or distribute brand materials; the training covers: brand guidelines basics, regulatory requirements, how to use templates, how to request new materials, what constitutes a violation; role-specific modules — marketing teams get deeper visual identity training; sales teams focus on approved claims and compliant presentations; executives get a condensed version focused on brand standards in their communications; localization training — regional teams learn which elements can be adapted locally and which are global standards; the training is not a one-time event — quarterly refreshers address common violations and updates), compliance culture (shifts from enforcement to ownership: frame compliance as brand protection, not bureaucracy — 'These guidelines protect our customers, our reputation, and our regulatory standing'; celebrate compliance — recognize teams and individuals who maintain high compliance standards; empower rather than police — the goal is teams that want to be on-brand because they understand the value, not teams that comply only because they fear penalties; address the root causes of non-compliance — often it's not willful violation but lack of access to the right tools, templates, or training; make the brand team approachable — if people are afraid to ask for help, they'll create materials on their own), compliance measurement and reporting (tracks program effectiveness: compliance score by region — quarterly audit results showing compliance percentage; target: 95% compliance within 12 months, up from current baseline; compliance score by material type — which types of materials have the highest violation rates? focus improvement efforts there; time to compliance — when a violation is identified, how quickly is it remedied?; regulatory incident tracking — zero tolerance for regulatory violations; track near-misses to identify systemic risks; ROI of compliance program — reduced regulatory risk, decreased violation rates, decreased time spent on ad-hoc corrections; report to the CEO quarterly with clear metrics showing progress from the current state toward the target)."
    weight: 0.30
    description: "TrainingAndMeasurement"
