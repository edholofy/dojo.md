meta:
  id: expert-brand-shift
  level: 4
  course: brand-guidelines-documentation
  type: output
  description: "Expert brand shift — manage a complex brand transformation involving a merger, regulatory requirements, and market repositioning simultaneously"
  tags: [shift, expert, transformation, merger, complex]

state: {}

trigger: |
  You're the Chief Brand Officer at a mid-size fintech company
  navigating four simultaneous brand challenges:

  1. Acquisition Integration: The company just acquired a
     smaller competitor with a loyal customer base. The
     acquired company's brand must be integrated within 6
     months, but their customers are threatening to leave if
     the brand they trust disappears.

  2. Regulatory Rebrand: New financial regulations require
     that all marketing materials include specific disclosures,
     risk warnings, and licensing information. Current brand
     guidelines don't account for these elements. 400+
     materials need updating within 90 days.

  3. Market Repositioning: The board has decided to move
     upmarket from SMB to enterprise. The current brand —
     which is colorful, informal, and startup-y — needs to
     evolve to credibility with enterprise CFOs without
     alienating the existing SMB customer base.

  4. Internal Brand Fracture: Due to rapid growth (200 to
     800 employees in 18 months), different departments have
     developed their own sub-brands. Engineering has a
     separate logo, the sales team uses different colors,
     and the support team created their own tone of voice.

  Budget: $350K total for all brand work. Team: 3-person
  brand team plus agency support.

  Task: Create the unified brand transformation strategy
  with updated guidelines.

assertions:
  - type: llm_judge
    criteria: "Response prioritizes and sequences the four challenges — strategic triage (determines the order of operations: priority 1 — regulatory compliance (90-day deadline creates urgency): audit all 400+ materials for regulatory compliance gaps; create regulatory disclosure templates that integrate cleanly with the brand identity; the regulatory elements shouldn't feel like afterthoughts — design them as part of the brand system; priority 2 — internal brand unification (foundation for everything else): you can't execute a merger integration or market repositioning if your own house isn't in order; audit all internal sub-brands and create a single brand system; priority 3 — acquisition integration (6-month timeline gives more room): plan the phased integration leveraging the newly unified brand; the acquired brand's strengths should influence the evolution, not just be absorbed; priority 4 — market repositioning (longest timeline, most strategic): this is the ultimate destination — an evolved brand that serves enterprise while retaining SMB; each earlier priority should move toward this end state; the strategy recognizes that these aren't independent — the regulatory compliance work shapes the brand system, the internal unification creates the platform, the acquisition brings new equity, and the repositioning gives direction to all of it), resource allocation (distributes $350K across priorities: regulatory compliance — $80K: material audit, template creation, production of updated materials; internal unification — $60K: brand audit, unified guidelines, training; acquisition integration — $100K: integration guidelines, transitional branding, customer communication; market repositioning — $80K: brand strategy evolution, updated visual and verbal identity; contingency — $30K: unexpected costs across all workstreams; the 3-person brand team needs support: assign one person to each of the first three priorities; the agency handles the repositioning strategy with brand team direction; project management is critical — consider a dedicated PM or PM tool to track 4 parallel workstreams)."
    weight: 0.35
    description: "StrategicPrioritization"
  - type: llm_judge
    criteria: "Response creates the unified brand guidelines — evolved brand identity system (designs guidelines that resolve all four challenges: visual identity — evolve from startup-colorful to mature-confident: retain the brand's energy through accent colors while introducing more sophisticated typography and a cleaner layout system; the visual system must accommodate regulatory disclosures without looking cluttered; design a modular layout system that has designated areas for disclaimers and risk warnings; the acquired brand's visual equity (perhaps a recognizable icon or color) is incorporated as a product-line identifier within the master brand; voice and tone — evolve from informal-startup to confident-authority: the voice should work for both SMB and enterprise audiences; create audience-specific tone adaptations: enterprise communications are more measured and data-driven; SMB communications retain the approachable personality; all communications include regulatory-appropriate language without sounding like legal documents; brand architecture — the unified company uses a branded house model: the master brand with product lines including the acquired product; the architecture eliminates the internal sub-brands: engineering's separate logo is retired, sales adopts the master brand colors, support adopts the unified voice), comprehensive guidelines document (produces the complete updated guidelines: brand foundation — mission, vision, values updated for the combined entity; brand story incorporates the acquisition narrative: 'stronger together'; visual identity — complete specifications including regulatory disclosure integration; voice and tone — expanded voice system with audience and channel adaptations; brand architecture — product hierarchy, naming conventions, visual relationships; regulatory compliance section — mandatory elements, disclosure templates, review requirements; application guidelines — templates for every major touchpoint incorporating all new requirements; the guidelines explicitly address the four challenges: regulatory templates, unified internal brand standards, acquisition brand integration phases, and enterprise-appropriate brand expressions)."
    weight: 0.35
    description: "UnifiedGuidelines"
  - type: llm_judge
    criteria: "Response addresses execution and stakeholder management — stakeholder communication plan (manages all affected parties: acquired company employees — empathetic communication about the brand integration; involvement in the process: their brand DNA is being incorporated, not erased; existing customers — messaging about the evolution: for SMB customers: 'the brand you love is growing to serve you even better'; for acquired customers: 'your trusted product is now backed by a larger platform with more resources'; enterprise prospects — the new brand positioning: professional, credible, and backed by a track record; internal teams — training and adoption program for the unified brand: address the engineering, sales, and support sub-brands directly; explain why unification matters and involve team representatives in the process; regulators — demonstrate compliance with updated materials and proactive communication; board — regular updates on brand transformation progress with ROI metrics), execution timeline and milestones (maps the 6-month transformation: month 1 — regulatory audit and compliance plan; internal brand audit; acquisition integration planning; month 2 — regulatory material updates begin; unified brand guidelines draft; acquisition phase 1 begins; month 3 — regulatory compliance deadline met; unified brand guidelines finalized; internal brand training launches; month 4 — acquisition phase 2: transitional branding; market repositioning strategy finalized; month 5 — updated brand rollout: website, marketing materials, sales collateral; acquisition phase 3: product integration branding; month 6 — full brand transformation complete; acquisition integration complete; enterprise positioning active; measurement — define success metrics for each workstream: regulatory: 100% compliance; unification: 90% brand consistency score; acquisition: customer retention above 85%; repositioning: enterprise pipeline growth)."
    weight: 0.30
    description: "ExecutionAndStakeholders"
