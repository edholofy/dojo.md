meta:
  id: intermediate-brand-shift
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Intermediate brand shift — manage a rebrand rollout while maintaining business continuity across all touchpoints"
  tags: [shift, rebrand, rollout, transition, intermediate]

state: {}

trigger: |
  Your company is rolling out a significant brand refresh
  (not a complete rebrand — same name, updated visual
  identity). The new brand is finalized and guidelines are
  complete. Now you need to execute the transition. Multiple
  issues arise simultaneously:

  1. The website team wants to launch the new brand on the
     website immediately, but the mobile app can't be updated
     for 6 weeks due to the app store review cycle. Customers
     will see two different brands on different platforms.

  2. The sales team has 200+ active proposals and pitch decks
     in the old brand. They refuse to redo them mid-deal:
     "I'm not rebranding a proposal that's in final review
     with a Fortune 500 client."

  3. The company has $50K in printed materials — brochures,
     trade show banners, and business cards — in the old
     brand. The CMO doesn't want to waste them but the CEO
     wants the new brand everywhere immediately.

  4. Three major partners have co-branded materials using
     the old logo. Updating their materials requires their
     cooperation and they're in different time zones.

  Task: Create the brand transition plan that manages all
  these constraints.

assertions:
  - type: llm_judge
    criteria: "Response creates a phased transition plan — transition phases (designs a realistic rollout: phase 1 weeks 1-2 — internal transition: update internal templates, email signatures, and presentation decks; train all teams on the new brand; this ensures internal materials are ready before external-facing changes; phase 2 weeks 3-4 — high-visibility digital: launch the new brand on the website, social media profiles, and email templates; these are the most visible and easiest to update; phase 3 weeks 5-8 — platform alignment: update the mobile app when the new build is ready; align all digital touchpoints; phase 4 weeks 9-12 — physical and partner materials: transition printed materials and partner co-branded content; the phases prevent the 'two different brands' problem by managing customer expectations), handling the platform gap (addresses the website vs app timing mismatch: option 1 — delay the website launch by 2-3 weeks to reduce the gap: launch website week 3, app week 6 = 3-week overlap instead of 6; option 2 — launch the website now with a subtle in-app message: 'We've refreshed our look! Our app update is coming soon.'; option 3 — launch a minimal website update — new colors and logo — while holding the full redesign until the app can match; the chosen approach depends on how different the old and new brands look — a subtle refresh can tolerate a longer gap than a dramatic change), communication plan (manages expectations during the transition: internal — weekly transition updates to all teams showing progress and timeline; customer-facing — a brief announcement: 'We've updated our look — same great product, fresh new brand'; partner communication — advance notice with a timeline for updating co-branded materials; press/media — updated brand assets and a short statement about the brand refresh; the communication should be matter-of-fact, not overly celebratory — most customers care about the product, not the logo)."
    weight: 0.35
    description: "PhasedTransition"
  - type: llm_judge
    criteria: "Response handles sales materials and printed inventory — sales team materials strategy (addresses the 200+ active proposals: active deals in final stages — don't rebrand mid-negotiation; the old brand is fine for deals closing in the next 30 days; new deals starting now — use the new brand from the beginning; provide rebrandable templates that sales can populate quickly; the transition rule: any new document created after the launch date uses the new brand; any document in active review with a client stays as-is; create a 'quick rebrand' service — the design team offers rapid rebranding for critical proposals that need updating; set a hard deadline — all sales materials must be in the new brand by week 12), printed materials strategy (manages the $50K inventory: business cards — order new cards immediately for leadership and customer-facing roles; deplete remaining old cards for internal use or events where brand precision is less critical; brochures and one-pagers — use existing stock for 60 days while new versions are printed; add a sticker or stamp: 'Visit our refreshed brand at [website]' if appropriate; trade show banners — if events are within 60 days, use the old banners; for events beyond 60 days, invest in new banners; the goal is to minimize waste while showing the new brand at high-visibility moments; create a printed materials deprecation schedule showing when each item switches to the new brand)."
    weight: 0.35
    description: "SalesAndPrintedMaterials"
  - type: llm_judge
    criteria: "Response manages partner transition and brand coexistence — partner materials transition (manages the 3 partner co-branded materials updates: send each partner the updated brand kit and co-branding guidelines; provide a 90-day transition window — partners update at their own pace within this timeframe; offer to create updated co-branded materials for key partners: 'We've prepared new versions of our co-branded assets for you'; be flexible with time zones — provide clear written guidelines rather than requiring synchronous meetings; if a partner can't update within 90 days, provide a temporary dual-branding option — old and new logos together with a 'transitioning to' note), brand coexistence guidelines (documents how old and new brands can temporarily coexist: during the transition period, both versions of the brand are acceptable; set a 'sunset date' — the date after which old brand materials must not be used; after the sunset date, any remaining old-brand materials are replaced or destroyed; maintain a transition tracker — a spreadsheet showing every touchpoint, its current brand version, and its transition date; the tracker ensures nothing is missed and the transition has a clear end date), post-transition verification (plans the wrap-up: after the sunset date, conduct a brand audit to verify the transition is complete; check all touchpoints — website, app, social media, sales materials, partner materials, printed items; identify any remaining old-brand materials and update them; update the brand guidelines version number — the new guidelines are now the only valid reference; celebrate the completion with the team — a brand transition is a significant effort and the team's work should be acknowledged)."
    weight: 0.30
    description: "PartnerAndCoexistence"
