meta:
  id: brand-voice-content-matrix
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Brand voice content matrix — create a comprehensive voice and tone system with channel-specific guidelines and content type examples"
  tags: [voice, content-matrix, channels, tone-system, intermediate]

state: {}

trigger: |
  Your fintech company has basic voice and tone guidelines
  but they're not detailed enough for the growing content
  team. The team produces content across 8 channels and
  12 content types, and inconsistencies keep appearing:

  - The blog sounds academic while social media sounds like
    a teenager
  - Error messages in the app are cold and technical while
    the marketing site is warm and friendly
  - Push notifications sound different from email
    notifications about the same events
  - Customer support responses vary wildly between agents

  The Content Director says: "I need a matrix that shows
  exactly how our voice adapts for every channel and content
  type. Not vague guidelines — specific examples for every
  combination."

  Brand voice: trustworthy, clear, empowering, human.
  Channels: website, mobile app, email, social media, blog,
  help center, push notifications, in-product messaging.

  Task: Create the comprehensive voice and tone content
  matrix.

assertions:
  - type: llm_judge
    criteria: "Response creates a detailed content matrix — matrix structure (creates a usable matrix format: rows are content types — headlines, body copy, CTAs, error messages, success messages, notifications, educational content, promotional content, legal and compliance, empty states, onboarding, customer support; columns are key voice dimensions — formality level, energy level, complexity level, emotional warmth; each cell shows the appropriate setting for that content type; example: error messages — formality: medium, energy: calm, complexity: simple, warmth: empathetic), channel-specific voice calibration (defines how the voice adjusts per channel: website — trustworthy and clear, professional tone, focuses on building confidence in the financial product; mobile app — concise and actionable, every word earns its place, users are mid-task; email — warm and personal, addresses the user by name, varied tone based on email type; social media — more casual and human, uses first-person plural 'we', engaging and conversational; blog — knowledgeable and educational, longer-form explanations, thought leadership voice; help center — clear and patient, step-by-step instructions, assumes the reader is frustrated; push notifications — ultra-concise, action-oriented, respectful of attention; in-product messaging — contextual and helpful, appears when the user needs guidance), specific examples for each combination (provides at least one example for key intersections: error message in app — 'We couldn't process your transfer. Your funds are safe — try again or contact us for help.'; error message in email — 'Your scheduled transfer on [date] didn't go through. Here's what happened and how to fix it.'; CTA on website — 'Start investing in minutes'; CTA in email — 'Complete your account setup'; notification in push — 'Your deposit of $500 has arrived'; notification in-product — 'Great news — your deposit of $500 is now available in your account')."
    weight: 0.35
    description: "ContentMatrix"
  - type: llm_judge
    criteria: "Response provides detailed writing guidelines per content type — error and failure states (provides comprehensive error message guidelines: structure — acknowledge the problem, explain impact, provide solution; tone — empathetic and calm, never blame the user; always explain what happened to the user's money or data — in fintech, reassurance about funds is critical; examples of good error messages for different severity levels: minor — 'That didn't work. Try again?'; moderate — 'We couldn't verify your identity. You can try again with a different document or contact support.'; severe — 'Your transfer failed. Your funds have been returned to your account. If this continues, our team can help: [contact].'), onboarding and empty states (guides onboarding and empty state voice: onboarding — welcoming and encouraging, reduce anxiety about financial products; progressive disclosure — don't overwhelm with information; celebrate progress — 'You're all set! Your account is ready.'; empty states — guide the user toward their first action; don't just say 'No transactions yet' — say 'No transactions yet. Ready to make your first transfer?'; empty states are an opportunity to educate and encourage, not just acknowledge absence), customer support templates (creates voice-consistent support response templates: greeting — 'Hi [Name], thanks for reaching out. I can help with that.'; acknowledgment — 'I understand how frustrating that must be. Let me look into this for you.'; resolution — 'I've [fixed the issue]. You should see [expected result] within [timeframe].'; follow-up — 'Is there anything else I can help with? I'm happy to assist.'; each template maintains the brand voice while allowing agents to personalize the response)."
    weight: 0.35
    description: "ContentTypeGuidelines"
  - type: llm_judge
    criteria: "Response addresses consistency mechanisms and training — consistency tools (provides tools for maintaining voice consistency: a 'voice check' checklist that writers use before publishing — 'Does this sound like our brand? Is the formality appropriate for the channel? Would a user feel reassured reading this?'; a terminology glossary — approved and prohibited terms: say 'transfer' not 'remittance', say 'account' not 'wallet', say 'support team' not 'customer service department'; a tone slider tool showing where each content type falls on a spectrum from formal to casual, serious to playful, concise to detailed), writer onboarding and training (creates a process for new content creators: required reading — the voice and tone guidelines, the content matrix, and 10 examples of excellent on-brand writing; writing exercise — rewrite 5 off-brand examples in the correct brand voice; buddy system — pair new writers with experienced ones for the first month; quarterly voice calibration sessions — the content team reviews recent work together and discusses whether it matches the voice guidelines), measuring voice consistency (tracks whether the voice guidelines are working: quarterly content audit — review samples from each channel and score for voice consistency; customer feedback analysis — are customers describing the brand's communication consistently?; A/B testing tone variations — does a warmer email subject line outperform a formal one?; track support satisfaction scores — do voice-consistent support responses receive higher satisfaction ratings?; the matrix is successful when a customer can't tell which team member wrote the content because it all sounds like the same brand)."
    weight: 0.30
    description: "ConsistencyAndTraining"
