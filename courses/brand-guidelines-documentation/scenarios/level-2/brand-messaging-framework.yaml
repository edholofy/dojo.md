meta:
  id: brand-messaging-framework
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Brand messaging framework — create a structured messaging hierarchy from positioning statement through audience-specific messaging"
  tags: [messaging, positioning, framework, audience, intermediate]

state: {}

trigger: |
  Your cybersecurity company has grown from a single product
  to a platform with 4 products. Every team describes the
  company differently:

  - The CEO tells investors: "We're an AI-powered security
    platform"
  - Marketing says: "We protect businesses from cyber
    threats"
  - Sales tells SMBs: "We're like having a security team
    without the cost"
  - Sales tells enterprises: "We provide enterprise-grade
    threat intelligence"
  - Product says: "We detect and respond to threats in
    real-time"
  - The website homepage says: "Next-gen cybersecurity
    solutions for the modern enterprise"

  The VP of Marketing says: "We need a messaging framework
  that gives everyone the right words for every audience.
  Not a single tagline — a system of messages that work
  together."

  Products: Endpoint Protection, Network Security, Cloud
  Security, Threat Intelligence Platform.
  Audiences: SMBs, Mid-market, Enterprise, Channel partners.

  Task: Create the brand messaging framework.

assertions:
  - type: llm_judge
    criteria: "Response builds the messaging hierarchy — positioning statement (creates a foundational positioning statement: format — 'For [target audience] who [need/problem], [company name] is the [category] that [key differentiator] unlike [competitors/alternatives], [company name] [unique value]'; the positioning statement is internal-facing — it's not marketing copy but the foundation that all external messaging builds upon; it should be specific enough to differentiate from competitors and broad enough to encompass all 4 products), messaging pillars (defines 3-4 core messages that support the positioning: each pillar captures a distinct dimension of the brand's value; example pillars for a cybersecurity company: pillar 1 — comprehensive protection: 'One platform that protects endpoints, networks, and cloud — eliminating security gaps between point solutions'; pillar 2 — intelligent detection: 'AI-powered threat detection that identifies and responds to attacks before they cause damage'; pillar 3 — operational efficiency: 'Security that scales with your business without scaling your security team'; pillar 4 — trusted expertise: 'Built by security researchers who've protected the world's most targeted organizations'; each pillar includes a headline, a 2-3 sentence supporting narrative, and proof points), value proposition per audience (creates audience-specific messaging: SMB messaging — focuses on simplicity, affordability, and protection without expertise: 'Enterprise-grade security without the enterprise price tag. Set up in minutes, protect everything.'; Mid-market messaging — focuses on scalability and efficiency: 'Growing businesses face growing threats. Our platform scales your security as fast as your business.'; Enterprise messaging — focuses on depth, integration, and compliance: 'Unified threat intelligence across your entire infrastructure. SOC 2, HIPAA, and FedRAMP compliant.'; Partner messaging — focuses on revenue opportunity and support: 'Sell and deploy cybersecurity with confidence. Training, co-marketing, and margin that rewards your growth.')."
    weight: 0.35
    description: "MessagingHierarchy"
  - type: llm_judge
    criteria: "Response creates product-level messaging — product messaging framework (creates consistent messaging for each of the 4 products: each product gets: a one-sentence description, a 50-word positioning paragraph, 3 key benefits, and 3 proof points; Endpoint Protection — 'Protect every device from advanced threats with AI-powered endpoint detection and response'; Network Security — 'See and secure every connection across your network in real-time'; Cloud Security — 'Secure your cloud infrastructure with the same depth as your on-premise environment'; Threat Intelligence — 'Turn global threat data into actionable intelligence for your security operations'), messaging dos and don'ts (prevents the inconsistencies described in the trigger: don't say 'next-gen' or 'cutting-edge' — these are meaningless buzzwords; don't say 'solutions' without specifying what they are; do say specifically what the product does — 'detects threats in real-time' not 'provides comprehensive security solutions'; don't use fear-based messaging — 'You will be hacked' is not the brand's tone; do use confidence-based messaging — 'Be ready for any threat'; don't mix audience messages — enterprise messaging shouldn't appear in SMB communications; provide a glossary of approved and prohibited terms), competitive messaging (provides guidance for competitive situations: don't disparage competitors by name; do differentiate by highlighting unique capabilities — 'Unlike point solutions, our platform covers endpoints, network, and cloud from a single dashboard'; provide a competitive battle card with approved positioning against the top 3 competitors; when asked 'How are you different from [competitor]?', salespeople should use the approved differentiators, not improvise; the messaging framework should arm every customer-facing team with consistent, compelling competitive responses)."
    weight: 0.35
    description: "ProductMessaging"
  - type: llm_judge
    criteria: "Response ensures messaging adoption and governance — messaging toolkit (creates practical tools for adoption: a one-page messaging cheat sheet — positioning statement, 4 pillars, audience messages summarized; an elevator pitch guide — 15-second, 30-second, and 60-second versions for different contexts; email templates — pre-written sales outreach for each audience segment using the correct messaging; presentation slide templates — pre-built slides with approved messaging for sales decks; social media copy bank — pre-approved posts organized by messaging pillar), training and rollout (plans how to get every team using the framework: all-hands messaging workshop — 60-minute session introducing the framework with practice exercises; role-specific training — sales teams practice elevator pitches, marketing reviews content guidelines, support reviews response templates; certification quiz — each team member should be able to state the company's positioning, list the messaging pillars, and deliver an audience-appropriate pitch; quarterly messaging refresh — review and update messaging as products and market positioning evolve), messaging governance (maintains consistency over time: all public-facing messaging must align with the framework — marketing reviews major campaigns and sales materials; new messaging proposals must reference the framework — show which pillar or audience the new message supports; the framework should be a living document — updated quarterly or when products launch; track message consistency — review the website, recent campaigns, and sales materials against the framework monthly; the VP of Marketing owns the framework and approves any messaging that deviates from it)."
    weight: 0.30
    description: "AdoptionAndGovernance"
