meta:
  id: motion-animation-guidelines
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Motion and animation guidelines — define how the brand moves through transitions, micro-interactions, and animated content"
  tags: [motion, animation, transitions, micro-interactions, intermediate]

state: {}

trigger: |
  Your product design team has been adding animations and
  transitions to the app without any guidelines. The result:

  - Some buttons have a fast 100ms bounce effect while
    others have a slow 800ms fade
  - Loading states vary — some show a spinner, some show
    a skeleton screen, some show nothing
  - Page transitions are inconsistent — some slide, some
    fade, some have no transition at all
  - Marketing videos use motion graphics that feel completely
    different from the product's animations
  - A designer added a playful "confetti" animation for
    achievements that doesn't match the brand's professional
    tone

  The Design Director says: "Motion is part of our brand
  identity. We need guidelines that define how our brand
  moves — from micro-interactions to marketing videos."

  Brand personality: precise, confident, clean, purposeful.

  Task: Create the motion and animation section of the
  brand guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response defines motion principles and timing — motion principles (establishes 3-5 core motion principles that reflect the brand personality: purposeful — every animation should have a reason; decorative animation with no functional purpose is removed; precise — animations should feel controlled and intentional; no wobbly, bouncy, or overshooting effects; swift — the brand moves with confidence; animations are quick enough to not slow the user down; natural — movements follow natural physics; elements don't appear or disappear instantly but transition smoothly; these principles align with the brand's 'precise, confident, clean, purposeful' personality), timing and easing standards (defines the technical specifications: duration scale — micro: 100-150ms for button states and toggles; small: 200-250ms for dropdowns and tooltips; medium: 300-400ms for page transitions and modal appearances; large: 500-700ms for full-screen transitions; maximum — never exceed 800ms for any UI animation; easing curves — enter: ease-out for elements appearing; exit: ease-in for elements disappearing; move: ease-in-out for elements changing position; the 'swift' principle means favoring the faster end of each range; provide CSS easing curves: cubic-bezier values for each motion type), motion hierarchy (defines which elements animate and in what order: primary elements — the main content or action animates first; supporting elements — secondary content follows with a slight stagger; decorative elements — background and ambient motion happens subtly; entrance choreography — when multiple elements appear, they stagger with 50-75ms delays; don't animate everything simultaneously — choreographed motion feels intentional while simultaneous motion feels chaotic)."
    weight: 0.35
    description: "MotionPrinciples"
  - type: llm_judge
    criteria: "Response defines specific animation patterns — micro-interaction patterns (defines how interactive elements respond: button press — subtle scale-down to 0.98 over 100ms, then return; creates a 'press' feeling; hover states — color transition over 150ms, no position change; toggle/switch — slides to new position over 200ms with ease-out; checkbox — check mark draws in with a stroke animation over 150ms; text input focus — border color transition over 150ms, label floats up over 200ms; these patterns should be consistent across the entire product — every button, every input, every toggle behaves the same way), transition patterns (defines how views and content change: page transitions — cross-fade over 300ms; new content fades in while old content fades out; modal/dialog — fade in over 250ms with a subtle scale from 0.95 to 1.0; provides a 'growing' entrance; sheet/drawer — slides in from edge over 300ms with ease-out; notification/toast — slides in from top over 250ms, auto-dismisses with fade over 200ms; loading states — skeleton screens preferred over spinners; skeletons use a subtle shimmer animation at consistent speed and color), motion don'ts (prevents the current problems: don't use bounce or elastic easing — it conflicts with the 'precise and confident' brand; don't add confetti, particle effects, or playful animations — the brand is professional, not playful; don't exceed 800ms for any UI animation — long animations feel slow; don't animate text content in ways that affect readability; don't use motion that triggers vestibular disorders — avoid rapid scaling, spinning, or parallax scrolling; every animation must have a 'prefers-reduced-motion' alternative that provides a simple fade or instant transition)."
    weight: 0.35
    description: "AnimationPatterns"
  - type: llm_judge
    criteria: "Response addresses motion across contexts and accessibility — marketing and video motion (extends motion guidelines beyond the product: marketing videos should use the same easing curves and timing philosophy as the product; transitions between scenes — clean cuts or cross-fades, no star wipes or complex transitions; text animation — words or lines appear with a simple fade or slide, timed to narration; logo animation — the brand logo has one approved animation for video intros: a simple, confident reveal; social media — animated content uses the same motion principles: purposeful, precise, swift; motion graphics — clean geometric movements, consistent with the brand's visual identity), accessibility and reduced motion (ensures motion is inclusive: all animations must respect the 'prefers-reduced-motion' media query; when reduced motion is preferred — replace animations with simple opacity transitions or instant state changes; no animation should be the only way to understand a state change — the end state must be clear without seeing the animation; avoid flashing content — never flash more than 3 times per second; provide pause/stop controls for any animation that plays for longer than 5 seconds; test all animations with vestibular disorder considerations), implementation resources (provides tools for consistent implementation: a motion design token system — timing values, easing curves, and stagger delays as design tokens; CSS/JavaScript code snippets for the most common animation patterns; a Figma motion component library — pre-built animated components for prototyping; motion audit checklist — verify timing, easing, purpose, and accessibility for every new animation; video motion template — After Effects or similar template with pre-configured transitions and text animations)."
    weight: 0.30
    description: "ContextsAndAccessibility"
