meta:
  id: responsive-brand-guidelines
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Responsive brand guidelines — adapt brand elements for different screen sizes, platforms, and contexts"
  tags: [responsive, adaptive, platforms, screens, intermediate]

state: {}

trigger: |
  Your brand guidelines were written primarily for desktop
  web and print materials. As the company expands to mobile
  app, wearable devices, and in-product experiences, the
  guidelines don't address how brand elements adapt:

  - The logo lockup is too wide for mobile navigation bars
  - The type scale designed for desktop creates text that's
    too small on mobile and too large on tablets
  - The color palette doesn't account for dark mode
  - The spacing system breaks down on small screens
  - The brand imagery guidelines assume landscape photos but
    mobile stories and posts need portrait or square formats

  The Head of Design says: "Our brand guidelines need to be
  responsive. The brand should look great on a 4-inch phone
  screen, a 27-inch desktop monitor, and a watch face."

  Task: Create responsive brand guidelines that adapt across
  devices and contexts.

assertions:
  - type: llm_judge
    criteria: "Response creates responsive visual identity rules — responsive logo system (defines logo adaptations across sizes: full lockup — used when width exceeds 200px: displays the complete wordmark and icon; compact lockup — used between 100-200px: abbreviated wordmark or stacked layout; icon only — used below 100px: the brand icon or symbol alone; favicon/app icon — used at 16-64px: simplified icon optimized for small rendering; each version should be a distinct designed asset, not a simple scale-down; the guidelines specify which logo version to use at each breakpoint, not which size to display each version), responsive typography (adapts the type scale across devices: define breakpoints — mobile: 320-767px, tablet: 768-1023px, desktop: 1024px+; at each breakpoint, the type scale adjusts: mobile H1 may be 28px while desktop H1 is 48px; body text minimum — never below 16px on mobile for readability; line length — 45-75 characters per line regardless of screen size, achieved by adjusting container width; provide the responsive type scale as a complete reference table showing every text style at every breakpoint), dark mode color system (extends the color palette for dark mode: don't simply invert colors — a true dark mode requires a redesigned palette; dark backgrounds — specify the dark surface colors: not pure black (#000) but dark gray (#121212 or similar); text on dark — white at 87% opacity for primary text, 60% for secondary; brand colors — the primary brand color may need adjustment for dark backgrounds: slightly lighter or more saturated to maintain visual impact; functional colors — error, success, warning states may need different shades for dark backgrounds; provide the complete dark mode palette alongside the standard palette)."
    weight: 0.35
    description: "ResponsiveVisualIdentity"
  - type: llm_judge
    criteria: "Response addresses responsive spacing and imagery — responsive spacing system (adapts the spacing scale for different devices: use a proportional spacing system — base unit that scales with viewport: base unit on mobile: 4px increments, on desktop: 4px or 8px increments; component padding — reduces on mobile: a card with 24px padding on desktop might use 16px on mobile; section spacing — proportionally larger on desktop to use available space; the spacing system should use the design token architecture — responsive tokens that change value at different breakpoints; document specific spacing values for common patterns: navigation height, content margins, grid gutters at each breakpoint), responsive imagery (adapts photography and illustration for different formats: aspect ratio system — define approved crop ratios: 16:9 for desktop heroes, 1:1 for social feeds and thumbnails, 9:16 for mobile stories, 4:3 for tablet; art direction — when an image is cropped from landscape to square, the focal point must remain visible; provide guidelines for which part of each image type should be preserved when cropping; icon sizing — icons scale with the responsive system: 24px on desktop, 20px on mobile; illustration complexity — detailed illustrations work on desktop but may need simplified versions for mobile), platform-specific adaptations (addresses unique platform needs: wearable devices — ultra-simplified: icon only, 2 colors maximum, type limited to the system font at readable sizes; in-car displays — high contrast, minimal text, large touch targets; TV/large screen — optimized for viewing distance: larger type, bolder colors, minimal detail; each platform may need its own mini brand guide that extracts the relevant responsive rules)."
    weight: 0.35
    description: "ResponsiveSpacingAndImagery"
  - type: llm_judge
    criteria: "Response provides implementation and documentation — responsive guidelines documentation format (structures the responsive guidelines for usability: organize by element, not by device — the logo section shows all responsive versions together; use visual comparison layouts — show the same brand element at mobile, tablet, and desktop side by side; include interactive examples if the guidelines are web-based — a responsive preview that shows how elements adapt; provide developer-ready specifications — exact breakpoints, values at each breakpoint, CSS/Tailwind implementation code; link responsive guidelines to the design token system — responsive tokens are the implementation mechanism), testing and validation (establishes quality checks for responsive brand application: device testing checklist — view every branded page on actual devices: iPhone SE, iPhone 15, iPad, MacBook, and external monitor; check that logos are the correct version at each size; verify text readability — no text below 16px on mobile; confirm color contrast in both light and dark mode; test imagery — are photos cropped well at each aspect ratio?; automated testing — use visual regression tools to catch responsive brand issues during development), future-proofing (prepares for new devices and contexts: the responsive system should be principle-based, not device-specific — 'at widths below 200px, use the compact logo' rather than 'on iPhone, use the compact logo'; new devices will emerge — foldable phones, AR glasses, ambient displays; the responsive brand system should accommodate new contexts by applying the principles to new screen sizes and interaction models; review the responsive guidelines annually as new devices and platforms emerge)."
    weight: 0.30
    description: "ImplementationAndDocumentation"
