meta:
  id: brand-audit-documentation
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Brand audit documentation — conduct and document a brand consistency audit across all touchpoints"
  tags: [audit, consistency, review, touchpoints, intermediate]

state: {}

trigger: |
  Your company launched brand guidelines 6 months ago but
  has no idea if anyone is following them. The CMO says:
  "We invested $100K in a rebrand. I want to know: are we
  getting our money's worth? Is the brand actually consistent
  across our touchpoints?"

  Touchpoints to audit:
  - Website (marketing site + product)
  - Mobile app (iOS and Android)
  - Social media (Instagram, LinkedIn, Twitter, YouTube)
  - Email campaigns (marketing, transactional, drip)
  - Sales materials (pitch decks, one-pagers, proposals)
  - Customer support (help center, chatbot, email responses)
  - Physical (business cards, conference booth, swag)
  - Partner materials (co-branded content, integration pages)

  Previous brand audit: never conducted. The brand team has
  3 people. Budget for the audit: $5K (mostly time, no
  expensive tools).

  Task: Design and document the brand audit methodology,
  conduct the audit, and present findings.

assertions:
  - type: llm_judge
    criteria: "Response designs the audit methodology — audit framework (creates a systematic evaluation approach: define scoring dimensions — logo usage compliance, color accuracy, typography adherence, voice and tone consistency, imagery alignment, overall brand impression; scoring scale — 1-5 for each dimension: 1 = completely off-brand, 3 = partially compliant, 5 = fully compliant; each touchpoint is scored across all dimensions; the aggregate score reveals which touchpoints and which dimensions need the most attention), audit checklist per touchpoint (creates specific checklists: website audit — is the correct logo version used? are brand colors accurate (check hex values)? is the typography correct? does the voice match the guidelines? are images on-brand?; social media audit — are profile pictures consistent across platforms? do posts follow the visual guidelines? is the voice adapted appropriately per platform?; sales materials audit — are pitch decks using the branded template? are one-pagers using correct colors and typography? do proposals follow the voice guidelines?; each checklist should have 10-15 specific items to evaluate), sample selection (defines what to review from each touchpoint: website — homepage, 3 key landing pages, 1 product page, footer; social media — the 10 most recent posts per platform; email — 5 marketing emails, 3 transactional emails, 2 drip sequence emails; sales — the 3 most-used pitch decks, 2 recent proposals; customer support — 10 help center articles, 5 chatbot conversations, 5 support email responses; this sampling approach is thorough without being overwhelming for a 3-person team on a $5K budget)."
    weight: 0.35
    description: "AuditMethodology"
  - type: llm_judge
    criteria: "Response conducts the audit and presents findings — audit execution plan (provides a realistic timeline: week 1 — audit digital touchpoints: website, app, social media, email; week 2 — audit human-created touchpoints: sales materials, support, partner materials; week 3 — compile findings, calculate scores, prepare presentation; with 3 people, assign each person specific touchpoints to avoid duplication; use a shared spreadsheet to log findings consistently across auditors), findings structure (organizes findings for maximum impact: overall brand consistency score — a single number or grade that summarizes the audit; touchpoint rankings — which touchpoints are most and least compliant; dimension analysis — which brand elements are most consistently applied and which are most often violated; top 10 violations — the most common or impactful brand guideline violations found; examples — screenshots or samples of both good and bad brand application; the findings should be honest but constructive — the goal is improvement, not blame), actionable recommendations (provides specific improvement actions: priority 1 critical violations — things that must be fixed immediately: wrong logo, completely wrong colors, misleading messaging; priority 2 consistency gaps — things that should be addressed within 30 days: inconsistent typography, mismatched tone; priority 3 optimization opportunities — things to improve over 90 days: outdated partner materials, inconsistent email templates; each recommendation should include who is responsible and an estimated effort level)."
    weight: 0.35
    description: "AuditExecution"
  - type: llm_judge
    criteria: "Response establishes ongoing audit practices — recurring audit cadence (establishes a sustainable audit process: full audit — annually: comprehensive review of all touchpoints; quarterly spot checks — review 2-3 touchpoints per quarter on rotation; triggered audits — review any touchpoint that undergoes a major update or redesign; the goal is to make brand consistency monitoring routine, not a one-time event; track scores over time — is the brand becoming more consistent with each audit?), automation opportunities (identifies ways to reduce audit effort: automated color checking — browser extensions or scripts that verify hex values on the website; template enforcement — locked templates for presentations and documents prevent many violations; digital asset management — a DAM system ensures people use current, approved assets; social media monitoring — tools like Sprout Social or Hootsuite can flag posts that don't match visual guidelines; these automations allow the 3-person brand team to maintain consistency without manually reviewing everything), connecting audit to guidelines improvement (uses audit findings to improve the guidelines: if a specific violation appears across multiple touchpoints, the guideline may be unclear — rewrite it; if a specific team consistently violates guidelines, they may need training — not just better documentation; if the audit reveals brand elements that nobody applies consistently, consider whether the guideline is realistic; the audit closes the loop — guidelines inform the brand, the audit measures adherence, and the findings improve the guidelines)."
    weight: 0.30
    description: "OngoingAuditPractice"
