meta:
  id: brand-architecture-documentation
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Brand architecture documentation — define how a company's brands, sub-brands, and products relate to each other"
  tags: [architecture, sub-brands, hierarchy, portfolio, intermediate]

state: {}

trigger: |
  Your company started as a single product but has grown
  through acquisitions and new product launches. Now you
  have a confusing brand landscape:

  - Parent company: TechFlow (the original brand)
  - Product 1: TechFlow Analytics (built in-house)
  - Product 2: DataPulse (acquired company, kept their name)
  - Product 3: StreamSync (acquired, rebranded partially)
  - Product 4: TechFlow AI (new product using parent brand)
  - Service: TechFlow Consulting (professional services)

  Customers are confused: "Is DataPulse part of TechFlow?
  Why does StreamSync have a different logo? Is TechFlow AI
  separate from TechFlow Analytics?"

  The CEO wants to decide on a brand architecture model and
  document the relationships clearly.

  Task: Evaluate brand architecture options and document
  the chosen approach.

assertions:
  - type: llm_judge
    criteria: "Response evaluates brand architecture models — architecture options (presents the main brand architecture models and evaluates each for TechFlow's situation: Branded House — everything becomes TechFlow: TechFlow Analytics, TechFlow Data, TechFlow Stream, TechFlow AI, TechFlow Consulting; pros: maximum parent brand leverage, clear relationships, simplified marketing; cons: acquired brands lose their identity and existing customer recognition; House of Brands — each product maintains independent branding: TechFlow, DataPulse, StreamSync each keep their identity; pros: each brand targets its own audience independently; cons: expensive to maintain multiple brands, doesn't leverage TechFlow's reputation; Endorsed Brand — products maintain some identity with TechFlow endorsement: 'DataPulse, a TechFlow company' or 'StreamSync by TechFlow'; pros: balances independence with parent credibility; cons: more complex naming system), recommendation with rationale (recommends the best architecture for TechFlow's situation: likely the Branded House model is strongest — TechFlow is the established brand and unifying under it reduces confusion; the acquired brands should transition: DataPulse becomes TechFlow Data, StreamSync becomes TechFlow Stream; the transition preserves the product's identity through a sub-brand name while leveraging TechFlow's reputation; if DataPulse has strong independent brand equity, an Endorsed Brand model may be better for a transitional period)."
    weight: 0.35
    description: "ArchitectureEvaluation"
  - type: llm_judge
    criteria: "Response documents the brand architecture — visual hierarchy documentation (creates a clear visual representation of the brand relationships: a brand architecture diagram showing TechFlow as the master brand with sub-brands beneath it; each sub-brand shows its relationship to the parent: TechFlow Analytics — organic sub-brand, TechFlow Data — acquired, transitioning from DataPulse; TechFlow Stream — acquired, transitioning from StreamSync; TechFlow AI — new sub-brand; TechFlow Consulting — services brand; the diagram should be simple enough for any employee or customer to understand), naming convention rules (establishes naming rules for current and future products: all products use the format '[TechFlow] [Product Name]'; the product name should be one word that describes the function — Analytics, Data, Stream, AI; new products follow the same pattern — future products are named TechFlow [Function]; acquired brands transition using a dual-branding period: 'DataPulse is now TechFlow Data' for 6-12 months; after the transition period, the old name is retired; the naming convention prevents future confusion as the company continues to grow), sub-brand visual identity (defines how sub-brands look: all sub-brands use the TechFlow logo with the product name appended; the master brand visual identity — colors, typography, imagery — applies to all sub-brands; sub-brands may have a accent color that distinguishes them within the system — Analytics uses blue, Data uses green, AI uses purple; the accent color system creates visual distinction while maintaining brand unity; sub-brand materials always include the TechFlow master brand prominently)."
    weight: 0.35
    description: "ArchitectureDocumentation"
  - type: llm_judge
    criteria: "Response addresses transition and implementation — acquisition transition playbook (creates a process for transitioning acquired brands: phase 1 months 1-3 — dual branding: 'DataPulse, a TechFlow company'; both logos appear, old customers see the connection; phase 2 months 4-6 — brand migration: 'TechFlow Data, formerly DataPulse'; new brand leads, old name provides continuity; phase 3 months 7-12 — full transition: 'TechFlow Data'; old name retired from all materials; customer communication at each phase — explain the change, emphasize continuity of product and support; the playbook should be reusable for future acquisitions), implementation across touchpoints (documents how the architecture appears everywhere: website — TechFlow.com as the main site with product pages for each sub-brand, or individual product sites within the TechFlow domain; marketing materials — all materials use the TechFlow master brand with sub-brand identification; sales — the sales team should be able to explain the product portfolio clearly using the architecture; customer support — support teams understand which products fall under the TechFlow umbrella; the architecture should simplify the customer experience, not add complexity), future-proofing (plans for continued growth: the architecture must accommodate future products and acquisitions without restructuring; new organic products follow the naming convention automatically; acquired brands follow the transition playbook; if a product category doesn't fit the TechFlow brand — say a consumer product — the architecture may need a separate brand; document the criteria for when a new product should be a sub-brand vs a separate brand)."
    weight: 0.30
    description: "TransitionAndImplementation"
