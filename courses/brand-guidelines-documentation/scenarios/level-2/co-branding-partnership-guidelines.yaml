meta:
  id: co-branding-partnership-guidelines
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Co-branding and partnership guidelines — document rules for how the brand appears alongside partner brands"
  tags: [co-branding, partnerships, external, collaboration, intermediate]

state: {}

trigger: |
  Your B2B software company is growing through partnerships,
  and brand consistency is suffering. Recent issues:

  - A technology partner put your logo on a dark red
    background where it's barely visible
  - A reseller created a "powered by [your brand]" badge
    that uses the wrong font and colors
  - A co-marketing campaign used both logos but made your
    logo significantly smaller than the partner's
  - An integration partner wrote product descriptions that
    misrepresent your product's capabilities
  - A conference sponsor used an outdated version of your
    logo from 2 years ago

  The Partnerships Director says: "We have 40+ partners and
  no rules for how they use our brand. Every partnership
  creates a different brand experience. We need co-branding
  guidelines we can share with every partner."

  Task: Create the co-branding and partnership guidelines
  section of the brand guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive co-branding rules — logo co-placement rules (defines how the brand logo appears alongside partner logos: equal sizing — when logos appear together, they should have equal visual weight: match the height of both logos so neither appears dominant; spacing — maintain a minimum gap between logos equal to the width of your logo's icon; logo order — your brand appears on the left or top in co-branded materials you produce; in partner-produced materials, placement is flexible but sizing must remain equal; background rules — specify which backgrounds are approved for the logo when used in co-branded contexts; never place the logo on backgrounds that reduce visibility), 'powered by' and endorsement badges (creates approved badge formats: design 2-3 approved 'powered by' badge variations — horizontal, stacked, and compact; provide the badges as downloadable files — PNG, SVG in all approved color variations; the badges must use the correct logo, font, and colors — partners are not allowed to create their own versions; specify sizing rules — minimum width, proportional scaling; specify placement — typically bottom-right or footer of the partner's material; the badge is a controlled asset, not a suggestion), brand description rules (controls how partners describe the product: provide approved product descriptions in 25-word, 50-word, and 100-word versions; partners must use these descriptions verbatim or submit custom descriptions for approval; prohibited claims — partners cannot claim capabilities the product doesn't have; required disclaimers — specify any legal or regulatory language that must accompany product descriptions; provide a list of approved and prohibited terms — what the product is and what it's not)."
    weight: 0.35
    description: "CoBrandingRules"
  - type: llm_judge
    criteria: "Response creates the partner brand kit and approval process — partner brand kit (creates a shareable package for partners: a digital brand kit containing: approved logo files in all formats and color variations; approved 'powered by' badges; approved product descriptions; co-branding guidelines document — a simplified version of the internal brand guidelines tailored for external partners; visual examples showing correct and incorrect logo usage; the kit should be accessible via a URL — not emailed as attachments that become outdated; when the brand updates, the URL content updates automatically), approval process (establishes how co-branded materials get approved: partner submits co-branded materials to the brand team for review; the brand team reviews for: logo usage compliance, color accuracy, messaging accuracy, and overall brand alignment; turnaround time — 2-3 business days for standard requests; provide clear feedback if changes are needed — specific annotations, not vague 'this doesn't look right'; for recurring partnerships, approve templates once rather than reviewing every individual piece; consider a tiered approval system — tier 1 partners with proven compliance may get pre-approved for certain material types), partner communication (manages the rollout of co-branding guidelines to existing partners: notify all 40+ partners about the new guidelines with a clear timeline — 'Please update any existing materials within 60 days'; provide the brand kit with a brief explanation of why the guidelines matter — 'Consistent branding helps both of us maintain credibility with customers'; offer a 30-minute brand orientation session for key partners; be available for questions during the transition period)."
    weight: 0.35
    description: "PartnerKitAndApproval"
  - type: llm_judge
    criteria: "Response addresses enforcement and edge cases — enforcement strategy (creates mechanisms to maintain compliance: quarterly partner audit — review partner websites and materials for compliance; automated monitoring — use brand monitoring tools to detect unauthorized logo usage or outdated assets; escalation process — first violation gets a friendly reminder with the correct assets; repeated violations get a formal request; persistent violations may affect the partnership agreement; make compliance easy — the easier it is to find and use correct assets, the fewer violations will occur; include brand compliance as a clause in partnership agreements), edge cases and special situations (addresses common co-branding scenarios: event sponsorship — define how the brand appears on conference materials, booth designs, and swag; integration marketplaces — define how the brand appears in app stores and integration directories; joint press releases — define logo placement and messaging approval for PR; customer case studies — define how both brands are represented in shared success stories; white-label agreements — define rules for when a partner sells your product under their own brand; each edge case needs specific guidance because generic rules don't cover these situations), brand asset version control (prevents the outdated logo problem: all partner-facing assets should be versioned and dated; the partner brand kit URL always serves the latest versions; include a note — 'Last updated: [date]. If you're using assets downloaded before this date, please download the latest versions'; when the brand evolves significantly, proactively notify partners and provide a migration timeline; retire old assets from the download location so partners can't accidentally use outdated versions)."
    weight: 0.30
    description: "EnforcementAndEdgeCases"
