meta:
  id: accessibility-brand-guidelines
  level: 2
  course: brand-guidelines-documentation
  type: output
  description: "Accessibility in brand guidelines — ensure the visual identity and content standards meet accessibility requirements"
  tags: [accessibility, wcag, inclusive, contrast, intermediate]

state: {}

trigger: |
  Your company's brand guidelines were designed with
  aesthetics in mind but not accessibility. A recent
  accessibility audit of the website revealed:

  - The primary brand color (#6B9E4F light green) fails WCAG
    AA contrast standards when used as text on white backgrounds
  - The display typeface (a thin-weight decorative font) is
    difficult to read for users with dyslexia or low vision
  - Brand photography relies heavily on color to convey
    meaning — charts and infographics are indistinguishable
    for colorblind users
  - The brand's preferred small text size (12px) is below
    the recommended minimum for body text
  - Social media graphics use text over busy photo backgrounds
    with no contrast overlay

  The Head of Accessibility says: "The brand guidelines need
  an accessibility layer. We can maintain the aesthetic
  while meeting WCAG AA standards — but the guidelines must
  specify how."

  Task: Create the accessibility section of the brand
  guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response addresses color accessibility — contrast requirements (defines minimum contrast ratios per WCAG AA: normal text — 4.5:1 contrast ratio against the background; large text (18px+ or 14px+ bold) — 3:1 contrast ratio; UI components and graphical objects — 3:1 contrast ratio; test every brand color combination and document which pass and which fail; the primary green #6B9E4F on white has a contrast ratio of approximately 3.5:1 — fails for normal text; provide the compliant alternative: use a darker version of the green for text — #4A7A2E passes at 5.2:1 while maintaining the brand's green identity), color-blind-safe palette (ensures the brand works for colorblind users: test the brand palette with protanopia, deuteranopia, and tritanopia simulations; identify combinations that become indistinguishable — red and green pairings are common problems; for charts and infographics — never rely on color alone to convey meaning; use patterns, labels, or icons in addition to color; provide a colorblind-safe palette that includes adjusted versions of brand colors when needed; document which colors are safe to use together and which require additional differentiation), accessible color guidelines (practical rules for the team: provide an approved color pairing chart — every foreground-background combination with its contrast ratio and pass/fail status; specify when to use the adjusted accessible color vs the original brand color; brand color #6B9E4F can still be used for decorative elements, backgrounds, and large text — just not for small body text on white; create a quick contrast-checking workflow — recommend tools like WebAIM Contrast Checker or the Stark Figma plugin)."
    weight: 0.35
    description: "ColorAccessibility"
  - type: llm_judge
    criteria: "Response addresses typography and content accessibility — accessible typography rules (updates typography guidelines for accessibility: minimum body text size — 16px, not the brand's current 12px; the 12px size can be used for legal disclaimers and metadata but never for body content; the thin-weight decorative display font — restrict to large headings only where it's readable; for body text, always use the sans-serif secondary typeface at regular weight; line height — minimum 1.5× the font size for body text; letter spacing — don't use negative tracking on body text; paragraph spacing — minimum 2× the font size between paragraphs; allow users to resize text to 200% without loss of content or functionality), content accessibility guidelines (extends voice and tone guidelines for accessibility: use plain language — aim for a 6th-8th grade reading level for public-facing content; avoid idioms and metaphors that may not translate across cultures or cognitive abilities; provide alt text guidelines for all imagery — descriptive, concise, conveying the image's purpose not just its content; for decorative images — use empty alt text or aria-hidden; for informative images — describe the information the image conveys; for social media — include image descriptions in posts or alt text fields), document and media accessibility (ensures branded materials are accessible: presentations — use high-contrast slides, provide speaker notes for screen readers; PDFs — ensure tagged, structured PDFs with proper reading order; videos — require captions for all brand videos, provide transcripts for audio content; the brand guidelines document itself should be accessible — proper heading structure, alt text on examples, sufficient contrast)."
    weight: 0.35
    description: "TypographyAndContentAccessibility"
  - type: llm_judge
    criteria: "Response provides implementation tools and testing — accessibility design tools (provides practical tools for maintaining accessible brand application: recommended Figma plugins — Stark for contrast checking and colorblind simulation, A11y Focus Order for checking reading order; browser extensions — WAVE, axe DevTools for checking web implementations; a pre-publish accessibility checklist — color contrast verified, text sizes meet minimum, images have alt text, links have descriptive text, headings are properly structured; integrate accessibility checking into the design and development workflow — it should be as routine as spell-checking), social media and marketing accessibility (addresses the specific problems mentioned: social media graphics — always use a semi-transparent overlay between background photos and text; minimum contrast of 4.5:1 for text in graphics; provide accessible social media templates with pre-designed contrast layers; include captions on all video content across social platforms; use CamelCase for multi-word hashtags — #CamelCaseForAccessibility is readable by screen readers while #camelcaseforaccessibility is not), training and enforcement (embeds accessibility into the brand culture: include accessibility guidelines in brand training for all teams; add accessibility as a dimension in brand audits — score touchpoints on accessibility compliance alongside brand consistency; provide before-and-after examples showing how brand materials can be beautiful AND accessible; the accessibility section should be integrated throughout the guidelines, not isolated — every section should reference its accessibility implications; the Head of Accessibility should review guidelines updates before publication)."
    weight: 0.30
    description: "ToolsAndTesting"
