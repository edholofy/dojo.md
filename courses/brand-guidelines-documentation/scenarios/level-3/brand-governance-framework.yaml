meta:
  id: brand-governance-framework
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Brand governance framework — establish organizational structures, processes, and tools for maintaining brand consistency at scale"
  tags: [governance, framework, processes, organization, advanced]

state: {}

trigger: |
  Your mid-size company (800 employees, 6 offices) has
  well-written brand guidelines but no governance structure
  to enforce them. The result:

  - 40% of recent marketing materials have at least one
    brand violation
  - Different teams interpret the guidelines differently —
    the product team's "brand-compliant" looks different
    from sales' version
  - No one knows who approves deviations from the guidelines
  - When guidelines are updated, some teams don't learn
    about the changes for months
  - New hires receive the guidelines during onboarding but
    receive no training on how to apply them
  - The brand team spends 60% of their time on ad-hoc
    review requests instead of proactive brand work

  The VP of Marketing says: "The guidelines are great. The
  problem is adoption and enforcement. We need a governance
  framework."

  Task: Design the brand governance framework.

assertions:
  - type: llm_judge
    criteria: "Response creates organizational governance structure — brand governance roles (defines clear roles and responsibilities: Brand Council — a cross-functional group meeting quarterly: VP Marketing, Head of Design, Head of Product, Head of Sales, HR Director; they set brand strategy and approve significant guideline changes; Brand Manager — the day-to-day brand guardian: reviews and approves brand materials, manages the guidelines, trains teams, conducts audits; Brand Champions — one person per department trained as the local brand expert: they review routine materials within their department, escalate complex questions to the Brand Manager, and communicate guidelines updates to their team; this distributed model scales better than centralizing all reviews with the brand team), approval workflow (creates a tiered review process: tier 1 self-serve — routine materials using approved templates: emails, presentations, social media posts using templates; the Brand Champion reviews within the department; no brand team involvement needed; tier 2 brand team review — new materials, campaigns, or significant deviations: submitted to the Brand Manager with a 3-day turnaround; examples: new marketing campaigns, updated website pages, partner materials; tier 3 Brand Council approval — strategic brand decisions: new brand elements, brand architecture changes, major campaign concepts, crisis communications; the tiered approach reduces the brand team's ad-hoc workload from 60% to under 20%), escalation and deviation process (handles requests to deviate from the guidelines: a 'brand deviation request' form — who's requesting, what guideline they want to deviate from, why, and for how long; the Brand Manager evaluates — is this a legitimate creative need or a lack of understanding?; approved deviations are documented with a scope and expiration — 'This deviation is approved for the Q3 campaign only'; recurring deviation requests indicate a guideline that may need updating; the process ensures flexibility without abandoning standards)."
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Response creates adoption and training programs — brand training program (designs ongoing brand education: new hire brand onboarding — 30-minute session during the first week covering brand basics, where to find guidelines, and who to ask for help; includes a brand quiz to verify understanding; role-specific training — designers get detailed visual identity training, writers get voice and tone workshops, salespeople get messaging and template training; quarterly brand refresher — 15-minute all-hands update on guidelines changes, new templates, and common violations; Brand Champion training — a deeper 2-hour workshop for department brand experts covering the full guidelines, review processes, and common judgment calls), communication strategy (ensures guidelines updates reach everyone: announce updates via email, Slack, and in team meetings — don't assume one channel reaches everyone; maintain a brand updates changelog — a chronological list of what changed and when; use the Brand Champions as multipliers — they communicate updates within their departments and answer initial questions; create a brand FAQ that evolves with common questions — 'Can I use a different font for this?', 'Where do I find the latest templates?', 'Who approves co-branded materials?'), template and self-service tools (reduces the need for brand review by making it easy to be compliant: locked templates for common materials — presentations, emails, one-pagers, social media posts; a brand asset portal — searchable, organized, always current; a brand self-check tool — a checklist or automated tool that helps creators verify brand compliance before submitting for review; the principle: make it easier to follow the guidelines than to violate them; every hour spent on self-service tools saves 10 hours of ad-hoc review)."
    weight: 0.35
    description: "AdoptionAndTraining"
  - type: llm_judge
    criteria: "Response establishes measurement and continuous improvement — compliance measurement (tracks governance effectiveness: monthly brand compliance score — audit 20 random materials per month and score for brand compliance; track compliance by department — which teams are most and least compliant?; track compliance by element — which brand elements are most frequently violated?; the 40% violation rate is the baseline — set targets: 25% in 3 months, 15% in 6 months, under 10% in 12 months; report compliance scores to the Brand Council quarterly), governance program ROI (measures the value of the governance framework: time savings — how much brand team time is freed from ad-hoc reviews?; consistency improvement — are brand audits showing higher compliance scores?; brand perception — are customers and partners experiencing a more consistent brand?; employee satisfaction — do employees feel empowered to create on-brand materials or frustrated by bureaucracy?; the governance framework should feel enabling, not restrictive — if teams feel the process slows them down, the framework needs adjustment), continuous improvement (iterates on the governance framework: quarterly governance review — are approval timelines met? are Brand Champions effective? are templates covering the most common needs?; guidelines evolution — use audit findings and deviation requests to identify guidelines that need updating; technology evaluation — assess whether a DAM, brand compliance tool, or automated review platform would improve efficiency; the governance framework is itself a living system — it should improve with each quarter based on data and feedback)."
    weight: 0.30
    description: "MeasurementAndImprovement"
