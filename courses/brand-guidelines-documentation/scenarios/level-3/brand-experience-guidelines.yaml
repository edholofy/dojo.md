meta:
  id: brand-experience-guidelines
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Brand experience guidelines — extend brand guidelines beyond visual identity to cover the total customer experience including physical spaces, events, and service interactions"
  tags: [experience, physical, events, service, advanced]

state: {}

trigger: |
  Your direct-to-consumer fitness brand has strong digital
  brand guidelines but is expanding into physical experiences:

  - Opening 3 retail stores (first physical presence)
  - Launching a branded fitness studio concept
  - Hosting monthly community events (outdoor workouts,
    nutrition workshops)
  - Creating branded packaging for product shipments
  - Providing in-person customer service at retail locations

  The brand has been digital-only for 5 years. The team
  knows how the brand looks and sounds on screens but has
  no guidance for physical spaces, face-to-face interactions,
  or sensory branding (how the brand smells, sounds, feels).

  The Head of Retail says: "A customer should feel the same
  brand energy walking into our store that they feel using
  our app. How do we translate the digital brand into
  physical experiences?"

  Task: Create brand experience guidelines that extend
  the brand to physical touchpoints.

assertions:
  - type: llm_judge
    criteria: "Response extends the brand to physical spaces — retail environment guidelines (defines how the brand appears in physical stores: store design principles — the brand's digital aesthetic translated to physical: clean lines, energetic color accents, natural materials; the store should feel like walking into the app — the same colors, typography, and visual language but in three dimensions; signage and wayfinding — use brand typography and colors for all in-store signage; product display — how products are arranged, lit, and labeled; fitting room experience — mirrors, lighting, and music that make customers feel good; the physical space should have 'Instagrammable' moments that encourage social sharing while feeling authentic, not manufactured), sensory branding (defines the brand's multi-sensory identity: sound — in-store music style that matches the brand energy; curate playlists that are energetic but not overwhelming; define genre, tempo range, and mood; the same music aesthetic should extend to workout classes and events; scent — a subtle signature scent for stores and events; should complement the brand personality — for a fitness brand, fresh and clean, not heavy or floral; the scent should be subtle — detectable but not dominant; tactile — product packaging textures, shopping bag materials, receipt paper; these should feel premium and aligned with the brand's quality commitment; all sensory elements work together to create a distinctive brand feeling), event and community experience (guides branded events: event format — outdoor workouts, nutrition workshops, product launches; each event type has a template: setup, branding elements, instructor guidelines, participant experience flow; branded elements at events — banners, signage, merchandise, water bottles, mats — all following brand visual guidelines; instructor and host behavior — how event hosts communicate mirrors the brand voice: encouraging, knowledgeable, inclusive; post-event follow-up — branded thank-you emails, photo sharing, community engagement; events extend the brand into lived experiences rather than just visual impressions)."
    weight: 0.35
    description: "PhysicalBrandExtension"
  - type: llm_judge
    criteria: "Response creates service interaction guidelines — in-person service standards (defines how employees embody the brand: greeting style — warm, energetic, and genuine; not scripted but following brand voice principles; employees should feel like brand ambassadors, not sales associates; the tone should match the digital brand voice — if the app is encouraging and knowledgeable, store staff should be too; dress code — brand-aligned apparel that's practical for a fitness environment; name badges follow brand design standards), customer service voice in person (translates the digital voice guidelines for face-to-face interaction: the brand voice attributes apply to verbal communication: be knowledgeable — staff should know products thoroughly; be encouraging — celebrate the customer's fitness journey without being preachy; be honest — don't oversell products; be inclusive — serve all fitness levels and body types equally; body language guidelines — open posture, eye contact, active listening; these are harder to document than digital voice but equally important for brand consistency), packaging and unboxing experience (designs the physical product experience: shipping packaging — branded outer box or mailer with the brand's visual identity; unboxing sequence — the order in which the customer sees elements matters; include a personal touch — a branded card with a handwritten-style message or QR code to a welcome video; product packaging — consistent with the digital brand: clean, clear, premium feel; sustainability alignment — if the brand values sustainability, packaging materials should reflect this; the unboxing experience is a physical brand touchpoint that creates emotional connection and social sharing opportunities)."
    weight: 0.35
    description: "ServiceInteractions"
  - type: llm_judge
    criteria: "Response addresses consistency between digital and physical — digital-physical continuity (ensures a seamless brand experience across channels: a customer who discovers the brand online, visits a store, and attends an event should feel they're experiencing the same brand; visual consistency — the same colors, typography, and imagery style appear in app, website, store, and events; voice consistency — the app's notification tone matches the in-store communication style; experience consistency — the care and quality of the digital experience should match the physical; identify potential gaps — where might the digital and physical experiences feel disconnected?; create a 'brand experience map' showing how customers move between digital and physical touchpoints), measurement and feedback (tracks whether the physical brand experience is effective: in-store feedback — post-visit surveys measuring brand perception; mystery shopping — periodic anonymous visits to evaluate brand standard compliance; social media monitoring — track user-generated content from store visits and events; NPS comparison — compare NPS for digital-only customers vs customers who've experienced physical touchpoints; the physical brand should enhance overall brand perception — if in-store NPS is lower than digital NPS, the physical experience needs improvement), physical brand guidelines maintenance (plans ongoing management: physical environments need periodic brand audits — are stores maintaining the visual standards? is signage current? is the music playlist on-brand?; event templates should be updated based on feedback — which event formats best represent the brand?; as the brand evolves digitally, physical touchpoints must be updated too — new color palette means new store signage, new voice guidelines mean updated staff training; the physical brand guidelines should be reviewed semi-annually, not just when stores open)."
    weight: 0.30
    description: "DigitalPhysicalConsistency"
