meta:
  id: digital-brand-platform
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Digital brand platform — select, configure, and manage a digital brand guidelines platform replacing static PDFs"
  tags: [digital, platform, dam, tooling, advanced]

state: {}

trigger: |
  Your 500-person company's brand guidelines live in a 48-page
  PDF that was last updated 8 months ago. Problems:

  - The PDF is outdated — the color palette was updated 3
    months ago but the PDF still shows the old colors
  - No one can find it — it lives on a shared drive that
    new employees don't have access to
  - It's not searchable — finding the logo clear space rules
    means scrolling through 48 pages
  - Asset downloads require emailing the brand team — "Can
    you send me the logo in SVG?"
  - There's no way to know if anyone reads it — no analytics
  - Partners get an even more outdated version

  The Brand Director says: "We need to move to a digital
  brand platform. I've been evaluating Frontify, Brandfolder,
  and building something custom in Notion. What should we
  do and how should we set it up?"

  Budget: $15K/year for the platform. Team: 1 brand manager
  and 1 designer maintaining it.

  Task: Evaluate platforms, recommend an approach, and
  design the digital brand guidelines architecture.

assertions:
  - type: llm_judge
    criteria: "Response evaluates platform options — platform comparison (evaluates the three options objectively: Frontify — purpose-built brand management platform; pros: designed specifically for brand guidelines, includes DAM, customizable, good analytics, partner portals; cons: can be expensive, learning curve for setup; Brandfolder — more DAM-focused with guidelines features; pros: excellent asset management, strong search, integrations; cons: guidelines are secondary to asset management; Notion — flexible but generic; pros: affordable, customizable, most teams already use it; cons: not purpose-built for brand, no built-in DAM, no asset versioning, limited analytics; with $15K/year budget: Frontify and Brandfolder are likely within range; Notion is significantly cheaper but requires more custom setup), recommendation with rationale (recommends based on the specific situation: for a 500-person company with 1 brand manager: Frontify is likely the best fit — it's purpose-built for brand guidelines, includes asset management, and requires minimal technical setup; the partner portal feature solves the partner version problem; if budget is tight, Notion is a viable alternative with more manual maintenance; the recommendation should consider: 2-person maintenance team means the platform must be low-maintenance; partners need external access; the company's existing tool ecosystem), migration plan (plans the transition from PDF to digital: week 1-2 — set up the platform and configure the information architecture; week 3-4 — migrate guidelines content from the PDF, updating outdated sections; week 5-6 — upload and organize all brand assets; week 7 — internal beta testing with brand champions from each department; week 8 — company-wide launch with training; the migration is also an opportunity to update the guidelines — don't just transfer the PDF content as-is; update the outdated sections and add missing guidelines)."
    weight: 0.35
    description: "PlatformEvaluation"
  - type: llm_judge
    criteria: "Response designs the digital guidelines architecture — information architecture (designs the structure for the digital platform: homepage/dashboard — quick access to the most frequently needed assets and guidelines; brand foundation — story, mission, values, positioning; visual identity — logo, colors, typography, imagery, motion; voice and tone — voice attributes, tone matrix, writing guidelines, glossary; applications — social media, email, presentations, print; assets — downloadable logo files, templates, photos, icons; the navigation should follow how people search for brand information — by element or by application type; include a search function that works across all sections), asset management integration (designs the DAM component: organize assets by type — logos, icons, photos, templates, fonts; each asset includes metadata — format, dimensions, date uploaded, approved usage contexts; version control — when an asset is updated, the old version is archived and the new version replaces it automatically; download options — users can select format and size when downloading; usage tracking — which assets are downloaded most? which are never used?; the asset library should be the single source of truth — all teams download from here, not from emailed files or personal folders), partner and external access (configures access for different audiences: internal employees — full access to all guidelines and assets; partner portal — a curated view showing only what partners need: logo files, co-branding guidelines, approved descriptions; press portal — press kit with logos, executive headshots, company descriptions, and media guidelines; freelancers and agencies — access controlled by project: they see only the sections relevant to their work; each portal serves a different audience with appropriate permissions and content)."
    weight: 0.35
    description: "DigitalArchitecture"
  - type: llm_judge
    criteria: "Response addresses analytics and maintenance — analytics and insights (uses the digital platform's analytics to improve brand management: track page views — which guidelines sections are most visited? which are never viewed?; track downloads — which assets are most popular? are teams downloading the correct versions?; track search queries — what are people searching for? if they search for something that doesn't exist, that's a gap in the guidelines; track user engagement — are people reading the full guidelines or just scanning?; use analytics to prioritize guidelines improvements — invest effort in the sections people actually use), content maintenance workflow (establishes a sustainable update process: the brand manager owns the platform content — they're responsible for keeping it current; update schedule — review all content quarterly; update immediately when brand elements change; each update includes: the change made, the date, and a notification to relevant teams; a changelog page shows all updates — teams can quickly check what's changed since they last visited; the designer handles asset updates — uploading new files, organizing the library, retiring outdated assets), launch and adoption strategy (plans how to get 500 people using the platform: launch announcement — company-wide email and Slack message introducing the platform with key links; training sessions — 3 optional 15-minute sessions covering: how to find what you need, how to download assets, and how to request new materials; incentive — a 'brand challenge' or quiz with prizes for early adopters; measure adoption — track active users in the first 90 days; goal: 80% of employees visit the platform within the first month; if adoption is low, investigate barriers — is the URL hard to find? is the navigation confusing? do people prefer the old PDF?)."
    weight: 0.30
    description: "AnalyticsAndMaintenance"
