meta:
  id: advanced-brand-shift
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Advanced brand shift — manage a complex brand crisis involving regulatory compliance, partner relationships, and public perception simultaneously"
  tags: [shift, advanced, crisis, regulatory, complex]

state: {}

trigger: |
  You're the Brand Director at a healthcare technology
  company. Three brand crises converge in one week:

  1. A regulatory agency flags that your marketing materials
     make claims about your product's medical capabilities
     that exceed what's been clinically validated. They
     require all non-compliant materials to be removed within
     72 hours or face penalties. This affects: the website,
     3 active ad campaigns, 15 sales one-pagers, and 2
     partner co-branded case studies.

  2. An employee-turned-whistleblower posts on social media
     that the company's internal culture doesn't match the
     brand's public values of "transparency and patient-first
     care." The post goes viral with 50K shares.

  3. A major hospital partner calls to say they're receiving
     complaints from doctors who feel the company's recent
     rebranding — which made the product look more
     consumer-friendly — undermines its clinical credibility.
     The partner is considering ending the relationship.

  Task: Develop and execute the brand response across all
  three crises while maintaining brand integrity.

assertions:
  - type: llm_judge
    criteria: "Response triages and addresses the regulatory compliance crisis — immediate regulatory response (the 72-hour deadline makes this the top priority: audit all materials within 24 hours — website copy, ad campaigns, sales materials, partner case studies; identify every claim that exceeds clinical validation; create a compliance review checklist — what can be said vs what cannot; take down non-compliant digital materials immediately — don't wait for replacements; pause ad campaigns within hours; notify the sales team to stop distributing affected one-pagers; this is about risk management, not brand aesthetics), compliant material replacement (creates replacement materials that are both compliant and on-brand: work with the legal and medical affairs team to identify approved claims; rewrite marketing copy using clinically validated language — 'helps manage' instead of 'treats', 'designed to support' instead of 'proven to cure'; the brand can still be compelling with accurate claims — compliance doesn't mean boring; create a 'compliance-approved messaging guide' for the marketing team — a reference of approved claims and language; update the brand guidelines to include a regulatory compliance section — all future healthcare claims must be reviewed by medical affairs before publication), partner case study remediation (the 2 partner co-branded case studies need immediate attention: contact the partners and explain the regulatory requirement; provide corrected versions of the case studies with compliant language; offer to cover any costs associated with updating partner materials; this transparency with partners demonstrates the 'transparency' value that's being questioned in crisis 2)."
    weight: 0.35
    description: "RegulatoryCompliance"
  - type: llm_judge
    criteria: "Response addresses the whistleblower crisis and partner relationship — whistleblower response (handles the culture vs brand gap: don't dismiss or attack the whistleblower — that validates their claims and increases backlash; acknowledge the concern publicly: 'We take feedback about our culture seriously and are committed to living our values internally and externally'; if the claims have any validity, commit to action: 'We're conducting an internal review and will share what we learn'; use the crisis tone from the brand guidelines — empathetic, transparent, and accountable; internally, the CEO should address employees directly — acknowledge the situation and commit to improvement; the brand's 'transparency' value demands a transparent response, not corporate PR deflection), partner relationship management (addresses the hospital partner's credibility concern: schedule an immediate call with the partner's decision-makers; listen to the doctors' specific concerns about the consumer-friendly rebrand; acknowledge the tension — the rebrand was designed to improve patient experience but shouldn't undermine clinical credibility; propose a solution: create clinical-facing materials that maintain professional credibility while the consumer-facing brand serves patients; the product can have different visual treatments for different audiences — a clinical brand layer for healthcare providers and a consumer-friendly layer for patients; offer to co-create clinical materials with the partner's input), connecting the crises (recognizes that all three crises share a root cause: the brand is facing a credibility gap — between marketing claims and clinical reality, between public values and internal culture, between patient-friendly design and clinical credibility; the brand guidelines need an integrity layer — everything the brand says must be verifiable, achievable, and authentic; this crisis is an opportunity to strengthen the brand by addressing the root cause, not just the symptoms)."
    weight: 0.35
    description: "WhistleblowerAndPartner"
  - type: llm_judge
    criteria: "Response produces systemic improvements — brand integrity framework (creates guidelines that prevent future credibility gaps: regulatory compliance integration — all marketing claims must be reviewed by medical affairs and legal before publication; culture-brand alignment audit — quarterly assessment of whether internal culture matches external brand promises; audience-appropriate branding — create distinct brand expressions for clinical audiences and patient audiences, both within the same visual system; a 'brand truth test' for all major communications — 'Is this claim accurate? Would we be comfortable if this appeared in a regulatory filing?'), updated brand guidelines (documents the lessons learned as guidelines updates: new section — regulatory compliance in brand communications; new section — crisis communication protocols; updated voice and tone — includes guidance for crisis situations and regulatory-constrained messaging; updated brand architecture — defines the clinical and consumer-facing brand expressions; partner co-branding guidelines updated with compliance review requirements), stakeholder communication plan (manages communication across all affected parties: regulatory agency — documentation showing compliance actions taken and timeline; partners — personal outreach showing commitment to clinical credibility; employees — internal communication addressing culture concerns and improvement plans; customers and public — measured, transparent communication about the brand's commitment to integrity; media — prepared statements addressing each issue without conflating them; each stakeholder communication uses the appropriate crisis tone and is reviewed by legal before distribution)."
    weight: 0.30
    description: "SystemicImprovements"
