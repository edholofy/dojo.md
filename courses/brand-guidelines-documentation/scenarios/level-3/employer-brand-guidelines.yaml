meta:
  id: employer-brand-guidelines
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Employer brand guidelines — document how the brand appears in recruitment, culture, and employee experience contexts"
  tags: [employer-brand, recruitment, culture, employee, advanced]

state: {}

trigger: |
  Your tech company has strong product brand guidelines but
  zero employer brand guidelines. The talent acquisition team
  has been creating their own materials:

  - Job postings vary wildly in tone — some sound corporate,
    others sound like they're written by a frat house
  - The careers page uses different colors and imagery than
    the main website
  - Interview presentations use a random template from HR
  - Employee testimonial videos on LinkedIn have no
    consistent visual style
  - The Glassdoor profile hasn't been updated in 2 years
  - Offer letters look generic — a Word doc with Times New
    Roman font

  The Head of People says: "We're competing for top talent
  against companies with amazing employer brands. Our
  recruitment experience should feel as polished as our
  product experience."

  Task: Create the employer brand guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates the employer brand identity — employer value proposition (defines what makes the company an attractive employer: the EVP should be authentic — based on real employee experience, not aspirational marketing; framework — 'We offer [unique benefit] for people who [ideal candidate description]'; the EVP connects to the company's product brand — the employer brand should feel like a natural extension, not a separate brand; identify 3-5 employer brand pillars: culture attributes, growth opportunities, mission impact, team dynamics, benefits and flexibility; each pillar should have supporting evidence — employee testimonials, data, and specific examples), employer brand voice (adapts the product brand voice for recruitment: the employer voice is warmer and more personal than the product voice — you're talking to potential colleagues, not customers; tone for job postings — enthusiastic but genuine, specific about the role and expectations, avoids corporate jargon; tone for career content — candid and transparent about what it's really like to work here; don't oversell — honesty in recruitment builds trust and reduces attrition; the employer voice should feel like a current employee explaining why they love working here, not a recruiter selling a position), visual identity for employer brand (creates a visual system for recruitment and culture content: the employer brand uses the same visual identity as the product brand — same logo, colors, and typography; differentiation through imagery — employer brand imagery shows real employees, real offices, real work; avoid stock photography of diverse people in a conference room; define a template system for recruitment materials — job posting layouts, career page sections, interview presentation slides, offer letter templates; social media content for employer brand — consistent visual format for employee spotlights, team events, and company culture posts)."
    weight: 0.35
    description: "EmployerBrandIdentity"
  - type: llm_judge
    criteria: "Response creates recruitment touchpoint guidelines — job posting standards (creates consistent, compelling job postings: structure — a standard format: opening hook, about the role, responsibilities, requirements, why join us, benefits; the opening hook should be compelling and specific — not 'We're looking for a rockstar developer' but 'We're building the search engine that 10M developers use every day. Want to help shape v2?'; requirements section — list 5-7 genuine requirements, not a wish list of 20 items; avoid gendered or exclusionary language — use tools like Textio to check for bias; each posting should include: salary range transparency, location/remote status, and team information; provide job posting templates by level — individual contributor, manager, executive), candidate experience touchpoints (guides every interaction a candidate has with the brand: application confirmation — branded email with timeline expectations; interview scheduling — professional, timely, with clear logistics; interview presentations — use the employer brand template to present the company and role; rejection communications — respectful and constructive, maintaining the brand voice; offer letters — branded templates that feel premium and personal, not generic Word docs; onboarding welcome — a branded welcome kit or digital experience that extends the employer brand into day one), careers page and platforms (standardizes the company's recruitment presence: careers page — uses the product brand visual identity with employer brand content; includes: company culture section, benefits overview, team pages, job listings, employee testimonials; LinkedIn — company page reflects both product and employer brand; job postings match the approved format; Glassdoor — update the company profile, respond to reviews using the employer voice, post employer brand content; Indeed and other platforms — maintain consistent descriptions and branding across all recruitment platforms)."
    weight: 0.35
    description: "RecruitmentTouchpoints"
  - type: llm_judge
    criteria: "Response addresses internal culture branding and measurement — internal brand touchpoints (extends the employer brand to current employees: internal communications — company newsletters, Slack announcements, and all-hands presentations use the employer brand voice and visual identity; employee milestones — work anniversaries, promotions, and achievements are celebrated with branded templates; internal events — team offsites, company parties, and workshops have branded materials; office and remote workspace — branded elements in physical offices and virtual backgrounds for remote employees; the employer brand isn't just for recruiting — it reinforces culture and belonging for current employees), employee advocacy guidelines (guides employees sharing brand content: social media guidelines — employees are encouraged to share their work experiences on personal social media; provide guidelines: what's appropriate to share, what's confidential, and how to represent the company; create shareable content — branded templates employees can customize for their own posts; employee spotlight program — a structured program for featuring employees' stories with their consent; the best employer brand content comes from genuine employee voices, not corporate marketing), employer brand measurement (tracks employer brand effectiveness: application metrics — are quality candidates applying? is the application completion rate improving?; candidate experience surveys — how do candidates rate their interview experience?; employee satisfaction — do employees feel the brand promise matches reality?; Glassdoor ratings — are they improving with consistent employer brand effort?; recruitment metrics — time-to-hire, offer acceptance rate, and new hire 90-day retention; track these metrics quarterly and connect them to employer brand initiatives — are the guidelines making a measurable difference?)."
    weight: 0.30
    description: "InternalBrandAndMeasurement"
