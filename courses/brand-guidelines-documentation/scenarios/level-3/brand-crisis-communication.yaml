meta:
  id: brand-crisis-communication
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Brand crisis communication — document brand guidelines for crisis situations including response templates, visual identity in crisis, and reputation management"
  tags: [crisis, communication, reputation, response, advanced]

state: {}

trigger: |
  Your consumer food brand faces a crisis scenario. A social
  media influencer with 2 million followers posts a video
  showing a foreign object in one of your products. The
  video gets 5 million views in 24 hours. Your existing
  brand guidelines don't address crisis communication at all.

  Simultaneously:
  - Customer support is getting 500+ complaints per hour
  - The PR team is drafting responses but they don't know
    what tone to use — the brand's usual "fun and playful"
    voice feels inappropriate
  - A news outlet is requesting an official statement within
    2 hours
  - Internal employees are posting on their personal social
    media about the situation
  - Your retail partners are asking whether to pull the
    product from shelves

  The CEO says: "We don't have crisis communication
  guidelines. We need them NOW for this crisis and for the
  future. How should our brand communicate during a crisis?"

  Task: Create the crisis communication section of the
  brand guidelines, addressing both the current crisis and
  future preparedness.

assertions:
  - type: llm_judge
    criteria: "Response defines crisis voice and tone — crisis tone adaptation (defines how the brand voice shifts during a crisis: the brand's core values don't change — they become more important; the 'fun and playful' tone suspends during serious situations; crisis tone attributes — empathetic, transparent, accountable, and action-oriented; the brand's personality still shows through in word choice and values, but the energy and humor are replaced with gravity and sincerity; define a 'crisis voice spectrum' — minor issue: concerned and helpful; moderate crisis: serious and proactive; major crisis: empathetic and accountable; each level has different language, pacing, and formality), crisis messaging templates (provides pre-drafted response frameworks: initial acknowledgment — 'We're aware of [situation]. We're taking this seriously and investigating immediately. Your safety is our top priority.'; investigation update — 'Here's what we know so far: [facts]. Here's what we're doing: [actions]. We'll share more information by [timeline].'; resolution statement — 'After investigating, we've determined [finding]. We're taking the following actions: [actions]. We want to make this right: [remedy].'; each template uses the crisis voice — serious, transparent, and action-oriented; templates should be customizable but maintain the approved tone), channel-specific crisis messaging (adapts crisis communication for each channel: social media — brief, empathetic, directing to a full statement; don't delete negative comments; respond to individual complaints with empathy and resolution paths; press statement — formal, factual, includes specific actions being taken; customer support — empathetic scripts with escalation paths for severe complaints; email — personalized outreach to affected customers; internal — honest communication to employees about the situation and their role; website — a banner or dedicated page with the latest information)."
    weight: 0.35
    description: "CrisisVoiceAndTone"
  - type: llm_judge
    criteria: "Response creates a crisis communication framework — crisis severity levels (defines escalation tiers: level 1 minor — negative review or social media complaint; handled by customer support using standard processes; level 2 moderate — local media coverage or viral social media post; marketing and PR coordinate response; level 3 major — national media coverage, safety concern, or significant public backlash; executive team leads response with PR and legal; level 4 critical — regulatory action, product recall, or threat to public safety; CEO leads communication with board and legal involvement; each level has defined response timelines, approval chains, and communication channels), crisis response team (defines who does what during a crisis: spokesperson — typically the CEO for major crises, VP of Marketing for moderate crises; all public statements go through the spokesperson after legal review; social media manager — monitors social channels, responds to individual comments, escalates trending issues; customer support lead — manages the volume of customer complaints, ensures consistent messaging across all agents; internal communications — keeps employees informed and provides guidance on personal social media conduct; legal counsel — reviews all public statements for liability; the crisis team should be pre-defined, not assembled during the crisis), timeline and approvals (defines response speed requirements: initial acknowledgment — within 2 hours of becoming aware of the crisis; this can be brief; first detailed statement — within 12 hours, after initial investigation; ongoing updates — at least daily during an active crisis; approval chain — during a crisis, the approval process is compressed: the spokesperson and legal review in parallel, not sequentially; a level 3+ crisis activates a dedicated communication channel for rapid approvals; the speed of response directly impacts public perception — silence is interpreted as indifference or guilt)."
    weight: 0.35
    description: "CrisisFramework"
  - type: llm_judge
    criteria: "Response addresses employee communication and future preparedness — employee social media guidelines (manages internal communication during crises: employees should not post about the crisis on personal social media — provide clear guidance: 'We understand your concern. Please direct any inquiries to our PR team and refrain from sharing information about the situation online until we have a public statement'; if employees have already posted, don't demand they delete — ask them to defer future questions to the official response; provide employees with the official statement so they feel informed and can reference it in personal conversations; employees are brand ambassadors — their personal commentary during a crisis can help or hurt the brand), future crisis preparedness (builds prevention and readiness: quarterly crisis simulation — practice responding to hypothetical scenarios with the crisis team; media training for spokespersons — practice delivering statements under pressure; a crisis communication toolkit — pre-drafted templates, approval workflows, contact lists, and platform-specific response guides; social media monitoring — track brand mentions and sentiment to detect potential crises early; the crisis guidelines should be reviewed annually and updated based on actual crises and simulations), reputation recovery (plans for after the crisis: once the immediate crisis is resolved, shift to reputation recovery: share the actions taken and the results — 'We implemented X changes and Y safeguards'; user-generated goodwill — encourage satisfied customers to share their positive experiences; thought leadership — publish content about the lessons learned and the company's commitment to improvement; track brand sentiment recovery — monitor social media sentiment and brand perception surveys; measure recovery timeline — how long does it take for brand perception to return to pre-crisis levels?)."
    weight: 0.30
    description: "EmployeesAndPreparedness"
