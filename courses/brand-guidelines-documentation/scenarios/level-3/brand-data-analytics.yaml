meta:
  id: brand-data-analytics
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Brand data and analytics guidelines — define how brand performance is measured, tracked, and reported to inform guidelines evolution"
  tags: [data, analytics, measurement, tracking, advanced]

state: {}

trigger: |
  Your company has comprehensive brand guidelines but no way
  to measure whether they're working. The brand team operates
  on intuition rather than data:

  - Brand awareness is measured annually through an expensive
    survey, but results arrive 3 months after fielding
  - There's no tracking of brand consistency across touchpoints
  - Social media metrics focus on engagement but not brand
    perception
  - The design team doesn't know which brand assets are used
    most or which are ignored
  - Customer feedback about the brand is scattered across
    support tickets, NPS surveys, and social media
  - Competitors' brand moves are tracked informally — someone
    notices a rebrand and mentions it in Slack

  The Head of Brand says: "We need a brand measurement
  framework. I want to know if our brand guidelines are
  actually making the brand stronger, and I want to present
  data to the leadership team — not just mood boards."

  Task: Create the brand analytics and measurement section
  of the brand guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates a brand measurement framework — brand health metrics (defines what to measure: brand awareness — aided and unaided recall; track quarterly rather than annually using lightweight digital surveys or social listening; brand perception — how do target audiences describe the brand? track key brand attributes: innovative, trustworthy, premium, accessible; use sentiment analysis on social mentions and review sites; brand consideration — is the brand in the consideration set when customers evaluate options? track through funnel analytics and survey data; brand loyalty — repeat purchase rate, NPS, customer lifetime value; each metric has: a definition, measurement method, data source, tracking frequency, and target benchmark; create a brand health dashboard that shows all metrics in one view — updated monthly), brand consistency metrics (measures how well guidelines are followed: visual consistency score — audit marketing materials quarterly and score for logo usage, color accuracy, typography compliance, and imagery alignment; voice consistency score — analyze published content for brand voice adherence using rubric based on voice attributes; channel consistency — compare brand presentation across website, social media, email, packaging, and partner materials; identify the channels with highest and lowest consistency scores; asset utilization — track which brand assets are downloaded and used from the DAM; unused assets may indicate guidelines gaps or irrelevant assets; the consistency metrics directly connect to the governance framework — brand audits feed both the measurement dashboard and the governance review process), competitive brand tracking (monitors the competitive landscape: define a competitor set — 3-5 direct competitors and 2-3 aspirational brands; track their brand moves: rebrands, campaign launches, messaging changes, visual identity updates; share of voice — track brand mentions relative to competitors across social media, press, and search; brand differentiation score — survey-based metric measuring how distinct the brand is perceived versus competitors; competitive intelligence should inform guidelines updates — if competitors are converging on a similar visual style, the brand may need to differentiate more aggressively)."
    weight: 0.35
    description: "MeasurementFramework"
  - type: llm_judge
    criteria: "Response creates reporting and analysis systems — brand reporting cadence (establishes regular reporting: weekly — social media brand sentiment and mention volume; a quick pulse check that takes 30 minutes to compile; monthly — brand health dashboard update with all key metrics; shared with the marketing leadership team; quarterly — comprehensive brand report including: brand health metrics trends, consistency audit results, competitive landscape changes, and guidelines effectiveness; presented to the Brand Council or executive team; annually — full brand audit with external research: perception study, brand equity valuation, competitive positioning analysis; this becomes the foundation for annual brand strategy and guidelines updates), data collection and tools (defines the measurement infrastructure: social listening tool — Brandwatch, Sprout Social, or similar; monitors brand mentions, sentiment, and share of voice; survey platform — for brand perception studies; use short pulse surveys quarterly rather than one massive annual study; web analytics — track brand-related search terms, branded vs unbranded traffic, and brand page engagement; DAM analytics — track asset downloads, most-used assets, and search queries; customer feedback aggregation — pull brand-relevant feedback from NPS surveys, support tickets, and review sites into one view; the tool stack should integrate where possible — a unified brand data view is more valuable than scattered reports), insight-to-action framework (turns data into guidelines improvements: when brand awareness drops — investigate which channels are underperforming and whether the brand presence guidelines for those channels need updating; when consistency scores are low in a department — increase training and review whether the guidelines are clear enough for that team's use cases; when competitor differentiation decreases — review visual identity and messaging for distinctiveness; add more distinctive brand elements to the guidelines; when certain assets are never downloaded — retire them or investigate why they're being ignored; every data insight should lead to a specific action — either a guidelines update, a training initiative, or a strategic recommendation)."
    weight: 0.35
    description: "ReportingAndAnalysis"
  - type: llm_judge
    criteria: "Response connects analytics to brand strategy — brand equity tracking (measures long-term brand value: define a brand equity model appropriate for the company — Keller's brand equity pyramid, Aaker's brand equity model, or a custom framework; track: brand salience — is the brand top-of-mind in its category?; brand associations — are the intended brand attributes being perceived?; perceived quality — does the audience believe the brand delivers on its promise?; brand loyalty — behavioral metrics like repeat purchase and advocacy; brand equity should trend upward over time — if it plateaus or declines, the brand strategy and guidelines need significant review), ROI of brand investment (justifies brand spending with data: correlate brand health metrics with business outcomes — does higher brand awareness lead to lower customer acquisition costs?; does brand consistency correlate with higher conversion rates?; track the impact of major brand initiatives — did the rebrand improve perception metrics? did the new brand guidelines reduce the time spent on ad-hoc reviews?; present brand ROI to leadership in business terms — not 'our brand awareness increased 12%' but 'our brand investment reduced customer acquisition cost by $15 per customer'), guidelines evolution driven by data (uses analytics to improve the guidelines themselves: track which guidelines sections are most accessed — invest effort in the sections people actually use; monitor common brand violations — if a specific guideline is consistently violated, the guideline may be unclear or impractical; analyze the correlation between guidelines training and compliance — do teams that receive training show higher consistency scores?; use A/B testing for brand elements when possible — test messaging variations, visual treatments, and content approaches with real audience data; the brand guidelines should be treated as a product — measured, iterated, and improved based on data rather than opinion)."
    weight: 0.30
    description: "StrategicConnection"
