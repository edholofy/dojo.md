meta:
  id: multi-brand-system
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Multi-brand system — design guidelines for a company managing multiple distinct brands within a unified system"
  tags: [multi-brand, portfolio, system, management, advanced]

state: {}

trigger: |
  You're the Brand Director at a consumer goods company that
  owns 5 brands across 3 product categories:

  - Premium skincare: LuxeDerm (high-end, clinical) and
    NatureGlow (natural, organic)
  - Haircare: VoltHair (edgy, youth-focused)
  - Home fragrance: AuraHome (sophisticated, minimal) and
    WildScent (bold, adventurous)

  Each brand has its own visual identity, voice, and
  audience. But the company needs a unified system because:

  - Designers work across all 5 brands and need consistent
    frameworks
  - The corporate website showcases all brands together
  - Cross-brand promotions are increasing (bundles, collabs)
  - New brands may be acquired or created

  The CEO says: "I want each brand to feel unique but I also
  want it clear they're part of the same family. And our
  guidelines shouldn't be 5 separate documents — that's
  unmaintainable."

  Task: Create a multi-brand guidelines system.

assertions:
  - type: llm_judge
    criteria: "Response designs the multi-brand architecture — system structure (creates a hierarchical guidelines structure: tier 1 — corporate foundation: shared principles that apply to all brands — grid systems, spacing scales, accessibility standards, content quality standards, brand governance rules; these are the 'non-negotiable' foundations; tier 2 — brand-specific guidelines: each brand has its own visual identity, voice, color palette, typography, and imagery rules; these live within the corporate framework but express unique brand personalities; tier 3 — application-specific rules: how each brand appears on packaging, digital, social media, retail), shared vs unique elements (clearly defines what's shared and what's brand-specific: shared across all brands — the design token architecture and naming convention; accessibility standards; the design system framework and component structure; brand governance processes; content quality standards and editorial guidelines; unique to each brand — logo and visual identity; color palette; typography choices; voice and tone; imagery and photography style; audience targeting and messaging; the shared elements create efficiency while the unique elements create differentiation), brand relationship mapping (documents how the 5 brands relate: shows each brand's market position on a 2×2 matrix — premium vs accessible, classic vs contemporary; documents target audience overlap — LuxeDerm and AuraHome share affluent consumers; NatureGlow and WildScent share adventure-seeking consumers; identifies cross-promotion opportunities based on audience overlap; the corporate brand appears minimally — 'A [Corporate Name] brand' in footer-level placement; the corporate brand doesn't overshadow individual brand identities)."
    weight: 0.35
    description: "MultiBrandArchitecture"
  - type: llm_judge
    criteria: "Response creates brand-specific guidelines within the system — brand personality differentiation (each brand has a distinct personality captured in the guidelines: LuxeDerm — clinical precision, trust, expertise; palette: deep navy, gold, white; voice: authoritative, scientific, aspirational; NatureGlow — warmth, authenticity, earth connection; palette: sage green, warm cream, terracotta; voice: genuine, knowledgeable, nurturing; VoltHair — energy, rebellion, self-expression; palette: electric purple, neon accents, matte black; voice: bold, direct, irreverent; AuraHome — sophistication, calm, curated beauty; palette: muted neutrals, soft grey, blush; voice: refined, understated, evocative; WildScent — adventure, boldness, untamed nature; palette: forest green, amber, deep orange; voice: daring, vivid, sensory), brand guardrails (defines what each brand cannot do: LuxeDerm cannot use slang or casual language; NatureGlow cannot use synthetic or clinical imagery; VoltHair cannot be formal or conservative; AuraHome cannot be loud or busy; WildScent cannot be minimal or restrained; these guardrails prevent brands from drifting toward each other over time — the most common multi-brand problem), cross-brand guidelines (defines how brands interact: cross-brand promotions — each brand maintains its own visual identity; the shared elements are the offer and the corporate endorsement; on the corporate website — each brand gets its own section with its own visual treatment; the corporate navigation provides a neutral bridge between brand environments; collaborative products — when two brands collaborate, define which brand's visual identity leads based on the product category and target audience)."
    weight: 0.35
    description: "BrandSpecificGuidelines"
  - type: llm_judge
    criteria: "Response addresses operational management — unified tools and templates (creates operational efficiency: a shared design system with brand-specific themes — the same component library renders in 5 different brand styles; a design token system with brand namespaces: luxederm.color.primary, natureglow.color.primary; shared Figma library with brand-specific component variants; a single CMS with brand-specific templates and styling; this architecture means designers learn one system but can work across all 5 brands), governance and quality control (manages quality across 5 brands: a brand review board — meets monthly to review recent work across all brands and ensure distinctiveness is maintained; brand drift monitoring — quarterly checks that brands aren't becoming too similar; new brand onboarding process — when a brand is acquired or created, it's integrated into the multi-brand system using a standardized onboarding template; cross-brand style clashes — a resolution process for when two brands need to appear together and their styles conflict), scalability for future brands (designs the system to accommodate growth: the corporate foundation layer is brand-agnostic — any new brand can adopt it immediately; a 'new brand integration playbook' — steps for adding a brand to the system: define its unique identity, create its design tokens, build its themed components, document its guidelines within the multi-brand framework; acquisition guidelines — when a new brand is acquired, assess whether it maintains its identity or is merged into an existing brand; the system should support 5-10 brands without becoming unwieldy)."
    weight: 0.30
    description: "OperationalManagement"
