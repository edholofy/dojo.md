meta:
  id: global-brand-localization
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Global brand localization — create guidelines for adapting the brand across markets, languages, and cultures while maintaining global consistency"
  tags: [global, localization, international, cultural, advanced]

state: {}

trigger: |
  Your SaaS company is expanding from the US into 5 new
  markets: UK, Germany, Japan, Brazil, and UAE. The brand
  has been US-centric and several localization challenges
  have emerged:

  - The brand name contains a word that has negative
    connotations in Portuguese
  - The brand's signature green color is associated with
    different meanings in Japan (youth/energy) vs UAE
    (Islam/sacred) vs Germany (ecology)
  - The brand's casual, humorous voice doesn't translate
    well to German (perceived as unprofessional) or Japanese
    (perceived as disrespectful)
  - Right-to-left layout requirements for Arabic disrupt
    the logo placement and layout conventions
  - Date, currency, and number formats vary across markets

  The VP of International says: "I don't want 5 different
  brands. I want one brand that feels local in each market."

  Task: Create the global brand localization guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates a localization framework — global vs local elements (defines what stays consistent globally and what adapts locally: global constants — brand name (with noted exceptions), logo design, primary color palette, core brand values, product functionality; locally adaptable — voice and tone calibration, imagery and photography, secondary color emphasis, messaging and copy, layout direction, date and number formats; the framework should give local teams clear boundaries — they know what they can and cannot change; this prevents both over-standardization and brand fragmentation), cultural adaptation guidelines (addresses culture-specific brand adaptations: color meaning matrix — documents how each brand color is perceived in each market; the signature green doesn't need to change but the messaging around it should acknowledge cultural context; the brand name issue in Portuguese — options: use a phonetic adaptation, add a subtitle that clarifies meaning, or use the brand icon more prominently in Brazil; the visual identity should be tested with local audiences before launch — what works in the US may not resonate elsewhere), voice and tone localization (adapts the brand voice for each market: establish a 'voice spectrum' — the brand's core voice stays consistent but the tone adjusts per market; US — casual and humorous as currently defined; UK — slightly more reserved but still warm; Germany — professional and direct, reduce humor, increase precision; Japan — respectful and polite, use honorifics, more formal structure; Brazil — warm and enthusiastic, but address the naming issue; UAE — respectful and professional, culturally sensitive; each market gets specific tone guidelines with examples of appropriate and inappropriate language)."
    weight: 0.35
    description: "LocalizationFramework"
  - type: llm_judge
    criteria: "Response addresses technical localization — layout and design localization (addresses technical design challenges: right-to-left (RTL) layout for Arabic — mirror the entire UI layout; the logo remains in its original orientation but navigational and content placement flips; provide RTL-specific templates for all branded materials; Japanese and German typography — these languages have different character sets and text length requirements; German words are often 30% longer than English equivalents — ensure layouts accommodate longer text; Japanese requires different font recommendations — specify approved Japanese typefaces that complement the brand's Latin typography), format localization (standardizes local format differences: date formats — US: MM/DD/YYYY, UK/Germany: DD/MM/YYYY, Japan: YYYY/MM/DD; currency — display in local currency with proper formatting and symbols; number formats — US: 1,000.00, Germany: 1.000,00; phone numbers — display in local format with country code; addresses — format according to local conventions; these may seem minor but inconsistency in formats damages the professional perception of the brand; create a localization token system that handles formats programmatically), localized asset management (manages brand assets across markets: a localized DAM system with market-specific folders — each market has access to global assets plus their localized versions; localized templates — presentation, email, and social media templates in each language; localized imagery library — photography that represents each market's demographics and environments; a translation management workflow — brand copy is translated by professional translators with brand voice training, not by machine translation alone; all localized assets must be reviewed by the local team AND the global brand team before publication)."
    weight: 0.35
    description: "TechnicalLocalization"
  - type: llm_judge
    criteria: "Response provides governance and quality control — local brand governance (establishes governance for localized brands: each market has a local brand steward — someone who understands both the global brand and the local culture; the local steward reviews all market-specific brand materials before publication; the local steward escalates to the global brand team for significant adaptations — changes to color usage, voice modifications, or naming; quarterly global brand alignment meetings — local stewards share how the brand is performing in their market and identify adaptation needs; an annual global brand audit — review all markets for consistency and cultural appropriateness), quality control processes (ensures localized brand quality: translation review — all translated brand content is reviewed by a native speaker with brand voice training; cultural sensitivity review — a local cultural consultant reviews major campaigns and materials; back-translation check — for critical messaging, translate from the target language back to English to verify meaning is preserved; local user testing — test localized brand messaging with target users in each market before launch; competitive analysis per market — understand how competitors position themselves locally to ensure differentiation is maintained), continuous improvement (builds a learning system: document localization insights and share across markets — what works in Japan may inform the approach in Korea when that market opens; track brand perception metrics per market — awareness, sentiment, and preference; compare global consistency scores across markets — identify which markets are drifting from the brand and which are well-aligned; the localization guidelines should be updated as the company enters new markets and gains experience — the first 5 markets inform the approach for the next 10)."
    weight: 0.30
    description: "GovernanceAndQuality"
