meta:
  id: brand-guidelines-ai-content
  level: 3
  course: brand-guidelines-documentation
  type: output
  description: "Brand guidelines for AI-generated content — create policies and standards for using AI tools to generate on-brand text, images, and designs"
  tags: [ai, content, generation, policy, advanced]

state: {}

trigger: |
  Your company has noticed that teams across the organization
  are increasingly using AI tools to generate content:

  - Marketing uses ChatGPT to draft blog posts and social copy
  - Design uses Midjourney and DALL-E for concept imagery
  - Sales uses AI to generate personalized outreach emails
  - Product uses AI to write help documentation
  - HR uses AI to draft job postings and internal comms

  Problems emerging:
  - AI-generated blog posts use a tone that doesn't match the
    brand voice — they sound generic and corporate
  - AI-generated images use styles that clash with the brand's
    visual identity — wrong color tones, inconsistent aesthetics
  - Sales emails generated by AI make claims about the product
    that haven't been approved
  - Some AI-generated content includes competitor brand names
    or trademarked terms inappropriately
  - There's no disclosure policy — some teams disclose AI use,
    others don't

  The CMO says: "AI is here to stay. We need to integrate it
  into our brand guidelines rather than ban it. How do we ensure
  AI-generated content stays on-brand?"

  Task: Create the AI content section of the brand guidelines.

assertions:
  - type: llm_judge
    criteria: "Response creates AI content policies — AI text content guidelines (establishes rules for AI-generated text: prompt engineering for brand voice — provide AI tools with the brand's voice attributes, tone guidelines, and example content before generating; create a 'brand voice prompt template' that teams can paste before any AI text generation — include voice attributes, dos/don'ts, sample phrases, and the target audience; AI output review checklist — before publishing any AI-generated text, review for: brand voice alignment, factual accuracy, approved messaging only, no competitor mentions, no unverified claims, appropriate tone for the channel; define which content types are appropriate for AI drafting — blog outlines and first drafts: yes; brand manifestos and taglines: no; social media captions: yes with review; legal or compliance content: no; the principle — AI generates drafts, humans refine for brand alignment), AI visual content guidelines (governs AI-generated imagery: style parameters — define the brand's visual style in AI-tool-friendly terms: color palette hex codes, photography style descriptors, illustration style references, mood and atmosphere keywords; create reference image sets that AI tools can use as style anchors; AI image review criteria — does the image match the brand's visual aesthetic? are the colors within the brand palette? does the style align with the brand's imagery guidelines? are there any trademark issues or recognizable faces?; define acceptable AI image use cases — concept exploration and mood boards: yes; final marketing assets: only with designer review and refinement; product photography replacement: no; social media graphics: yes with brand template overlay), content authenticity and disclosure (addresses transparency: disclosure policy — when must the company disclose AI involvement? define the threshold — content substantially generated by AI should be disclosed; recommended disclosure language — subtle but honest: 'Created with AI assistance' or similar brand-appropriate phrasing; never present AI-generated content as human-created when the distinction matters — especially testimonials, expert opinions, or personal stories; intellectual property considerations — ensure AI-generated content doesn't inadvertently reproduce copyrighted material or competitor branding)."
    weight: 0.35
    description: "AIContentPolicies"
  - type: llm_judge
    criteria: "Response provides practical implementation tools — prompt templates and libraries (creates reusable assets for AI content generation: brand voice prompt template — a standardized prompt prefix that includes: brand name, voice attributes with examples, tone for the specific channel, target audience description, content dos and don'ts; channel-specific prompt variations — the social media prompt template differs from the blog prompt template and the email prompt template; a negative prompt library for image generation — terms and styles to exclude: competitor brand aesthetics, off-brand color tones, inappropriate imagery; a positive prompt library — brand-approved style descriptors, color terms, mood keywords; these templates should be stored in the brand guidelines platform and updated as the brand evolves), quality assurance workflow (defines the review process for AI content: tier 1 — low-risk content using approved templates: social posts, internal emails, help docs; department review by Brand Champion is sufficient; tier 2 — medium-risk content: blog posts, marketing emails, sales materials; requires brand team review before publication; tier 3 — high-risk content: press releases, investor communications, legal content; AI drafting discouraged; if used, requires legal and executive review; turnaround times — tier 1: same-day; tier 2: 2-day review; tier 3: 5-day review with multiple approvals; tracking — log which content was AI-generated for quality monitoring), team training and enablement (ensures teams use AI tools effectively: training sessions — teach each team how to use AI tools within brand guidelines; hands-on workshops where teams practice prompting with brand templates; common mistakes training — show examples of off-brand AI output and how to fix it; a 'brand AI toolkit' — curated list of approved AI tools, prompt templates, review checklists, and disclosure language; regular updates — as AI tools evolve, update the guidelines and retrain teams quarterly)."
    weight: 0.35
    description: "ImplementationTools"
  - type: llm_judge
    criteria: "Response addresses governance and evolution — AI brand governance (establishes oversight: an AI content committee — representatives from marketing, legal, design, and product who set AI content policies; quarterly review of AI content quality — sample AI-generated content from each team and evaluate brand alignment; incident response — if AI-generated content causes a brand issue, such as off-brand messaging going viral or AI imagery that misrepresents the brand, define the response process; vendor management — evaluate AI tool providers for brand safety features, data privacy, and content quality), brand protection in AI contexts (safeguards the brand: trademark and IP monitoring — ensure AI tools aren't trained on or generating content that infringes on others' IP or that others use AI to infringe on the company's brand; competitor differentiation — AI tools tend to generate generic content; the brand guidelines should emphasize what makes the brand's voice distinct from AI defaults; brand dilution prevention — if every company uses the same AI tools with similar prompts, content becomes homogeneous; the guidelines should push teams to use AI as a starting point and add genuine brand personality through human editing), future-proofing (plans for AI evolution: as AI capabilities improve, the guidelines will need updating — plan for semi-annual reviews; emerging AI modalities — video generation, voice synthesis, interactive content; prepare guidelines frameworks for these before the team starts using them; the principle — AI is a brand tool, not a brand replacement; the guidelines should ensure AI amplifies the brand's unique identity rather than diluting it into generic AI-generated sameness)."
    weight: 0.30
    description: "GovernanceAndEvolution"
