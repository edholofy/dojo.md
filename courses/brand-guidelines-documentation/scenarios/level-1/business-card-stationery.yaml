meta:
  id: business-card-stationery
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Business card and stationery guidelines — document templates for business cards, letterheads, email signatures, and corporate stationery"
  tags: [business-cards, stationery, templates, corporate, beginner]

state: {}

trigger: |
  Your company recently completed a rebrand, and the brand
  guidelines cover logo, colors, and typography. But no one
  has created templates for everyday business materials:

  - Employees are designing their own business cards with
    inconsistent layouts, fonts, and information
  - The CEO's letterhead doesn't match the brand
  - Email signatures vary wildly — some have photos, some
    have quotes, some have 6 social media icons
  - Meeting agendas and internal memos use default Word
    templates

  The Office Manager says: "Can you create standard templates
  that everyone uses? And document the rules so new hires
  know what to do."

  Company details:
  - 80 employees across 3 offices
  - Industries: technology consulting
  - Brand style: clean, modern, professional
  - Logo: horizontal lockup with icon
  - Colors: Navy (#1B2B4B), Light Gray (#F2F4F7), White,
    Accent Teal (#2BBDBD)

  Task: Create the business stationery guidelines section
  with templates and rules.

assertions:
  - type: llm_judge
    criteria: "Response creates business card guidelines — business card layout (defines a standard business card design: front — company logo positioned top-left or centered; employee name in Plus Jakarta Sans SemiBold 10pt; job title in Regular 8pt; contact info: email, phone, and office location; back — a clean design with the brand pattern, logo, or company website URL; card dimensions — standard 3.5 × 2 inches or 85 × 55 mm; print specifications — paper stock, finish, and color profile), information hierarchy (defines what goes on the card and in what order: name — first and last name only, no middle names or titles unless legally required; title — official job title, abbreviated if needed; email — company email address only; phone — direct line or mobile, not both unless the role requires it; location — city and country for international teams; NOT included — personal phone numbers, personal email, social media handles unless the role is social media focused; optional — QR code linking to digital business card or LinkedIn), consistency rules (ensures all 80 employees have consistent cards: all business cards must use the approved template — no custom designs; name formatting must be consistent — 'Jane Smith' not 'JANE SMITH' or 'jane smith'; when employees change roles, they request new cards rather than hand-writing corrections; the office manager or admin assistant handles ordering through an approved print vendor; provide the template as an editable file with locked design elements and editable text fields)."
    weight: 0.35
    description: "BusinessCards"
  - type: llm_judge
    criteria: "Response creates email signature and letterhead guidelines — email signature standard (creates a uniform email signature for all 80 employees: layout — name, title, company name, phone, email, website; company logo — small horizontal lockup at the top or bottom; optional: office location and booking link; prohibited — inspirational quotes, animated GIFs, personal photos unless leadership-approved, more than 3 social media icons; the signature should be minimal — 4-5 lines maximum; provide HTML code or a generator tool that creates consistent signatures; test the signature across email clients — Gmail, Outlook, Apple Mail), letterhead design (creates a standard letterhead template: layout — logo top-left or top-center; company address and contact info in a footer or header; ample white space — the letterhead frame shouldn't compete with the letter content; paper — specify weight and stock for printed letterheads; digital letterhead — provide a Word and Google Docs template with the letterhead built in; include a standard letter format — font, margin, and spacing specifications that complement the letterhead design), additional stationery (covers other branded materials: envelopes — logo placement, return address formatting, and window envelope compatibility; meeting agenda template — branded header with company logo, consistent formatting for date, attendees, and agenda items; internal memo template — simplified branded header for internal communications; presentation template — already covered in typography guidelines but link to it here; invoice and proposal templates — branded headers that match the stationery system)."
    weight: 0.35
    description: "EmailAndLetterhead"
  - type: llm_judge
    criteria: "Response provides implementation and distribution — template distribution (makes templates accessible to all 80 employees: create a 'Brand Templates' folder on the shared drive accessible to all offices; organize templates by type — business cards, letterheads, signatures, presentations; include instructions for each template — how to edit, what to customize, what not to change; for email signatures, provide a company-wide implementation plan — roll out by department over 2 weeks; for business cards, create an ordering process — employee fills out a form, admin reviews, approved vendor prints), new hire onboarding (integrates stationery into the onboarding process: new hires receive their email signature setup during IT onboarding; business cards are ordered within the first week; new hires receive links to all templates during orientation; the brand guidelines document is shared as part of the onboarding materials; this prevents new hires from creating their own inconsistent materials), quality control (maintains consistency over time: quarterly audit — spot-check email signatures and recent materials for compliance; when templates need updating — update the master template and communicate the change company-wide; lock design elements in templates so users can only edit text fields — don't allow font or color changes; assign a brand steward in each office who can answer template questions locally; make it easier to use the correct template than to create something from scratch — accessibility drives compliance)."
    weight: 0.30
    description: "ImplementationAndDistribution"
