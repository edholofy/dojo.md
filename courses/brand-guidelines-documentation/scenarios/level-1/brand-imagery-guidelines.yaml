meta:
  id: brand-imagery-guidelines
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Brand imagery guidelines — document photography style, illustration rules, and iconography standards"
  tags: [imagery, photography, illustration, iconography, beginner]

state: {}

trigger: |
  Your wellness app brand has a defined visual identity for
  logos and colors, but no guidance for imagery. As a result:

  - The blog uses generic stock photos of people in suits
    (the brand is about casual wellness, not corporate life)
  - Social media posts alternate between ultra-filtered
    Instagram-style photos and unedited phone snapshots
  - The app uses a mix of 3D illustrations and flat 2D icons
    with no consistency
  - The website hero images look like they belong to 5
    different companies

  The Creative Director says: "Our imagery tells the wrong
  story. We need guidelines for photography, illustration,
  and icons that match our brand — natural, approachable,
  and grounded."

  Brand personality: natural, approachable, grounded,
  inclusive, calming.

  Task: Create the imagery guidelines section of the
  brand guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response defines photography style — photography direction (establishes a clear visual direction: subjects — real people in natural, everyday wellness moments: morning stretching, walking in nature, preparing healthy meals, meditating at home; not staged gym sessions or stock-photo smiles; lighting — natural light preferred, warm and soft; avoid harsh studio lighting or heavy flash; the brand's calm energy should come through the lighting; color treatment — photos should feel warm and slightly muted to complement the brand palette; avoid heavy filters, extreme saturation, or trendy presets; a subtle warm color grade is acceptable), diversity and representation (ensures inclusive imagery: photography must represent diverse ages, body types, ethnicities, abilities, and gender expressions; avoid tokenistic representation — diversity should feel natural, not staged; show wellness in accessible contexts — not just expensive studios or exotic retreats; include everyday settings — apartments, parks, kitchens, offices; the brand's message is that wellness is for everyone, and the imagery must reflect that), photography don'ts (prevents the current problems: don't use generic corporate stock photography — people in suits, handshakes, conference rooms; don't use heavily filtered or over-processed images; don't use images with visible brand logos from other companies; don't use images that feel exclusive or aspirational in a way that makes people feel inadequate; don't mix photographic styles on the same page — maintain consistency within each context; provide examples of approved vs rejected photo styles)."
    weight: 0.35
    description: "PhotographyStyle"
  - type: llm_judge
    criteria: "Response defines illustration and iconography — illustration style (establishes a consistent illustration approach: style — flat or semi-flat 2D illustrations with organic shapes and soft edges; no 3D renders, no photorealistic illustrations, no pixel art; color palette — illustrations use the brand color palette with additional muted pastels for variety; line weight — consistent medium stroke weight across all illustrations; character design — if illustrations include people, they should match the inclusive representation guidelines; the illustration style should feel handmade and warm, matching the 'natural and approachable' brand personality), iconography system (defines the icon style: style — outlined icons with rounded corners and consistent 2px stroke weight; they should feel friendly and simple; size — designed on a 24px grid with 20px live area; available in 16px, 24px, and 32px sizes; color — icons use a single color from the brand palette, typically Charcoal for UI or the primary color for emphasis; don't mix outlined and filled icon styles; don't use icons from different icon libraries without adapting them to match the brand's icon style; provide a library of core icons — navigation, actions, categories — for consistent use), illustration and icon don'ts (prevents inconsistency: don't mix 2D and 3D illustration styles; don't use clip art or unbranded free icon sets; don't create icons with inconsistent stroke weights or corner radii; don't use illustrations that conflict with the photography style — both should tell the same visual story; if in doubt, use photography over illustration — it's harder to get illustration wrong when you don't have a dedicated illustrator)."
    weight: 0.35
    description: "IllustrationAndIcons"
  - type: llm_judge
    criteria: "Response provides practical imagery sourcing and usage — sourcing guidelines (helps teams find on-brand imagery: recommended stock photo sources — Unsplash, Pexels with specific search terms that align with the brand: 'natural wellness', 'everyday self-care', 'diverse lifestyle'; custom photography guide — brief for photographers including lighting, styling, and mood direction; illustration commissioning — provide the style guide to illustrators before they begin work; icon resources — specify which icon libraries are closest to the brand's style and can be adapted), image treatment rules (defines how images should be treated across contexts: web — images should be optimized for performance while maintaining quality; social media — consistent aspect ratios per platform: 1:1 for feed posts, 9:16 for stories, 16:9 for covers; print — minimum 300 DPI for printed materials; image overlays — when text appears over images, use a brand-colored overlay at 60-80% opacity to ensure readability; image cropping — show people from the waist up or in full; avoid awkward crops that cut through faces or hands), quick reference and examples (a practical reference section: a mood board showing 8-10 approved image examples that embody the brand's visual direction; a comparison showing 'brand-aligned' vs 'not brand-aligned' images side by side; a checklist for image selection — 'Does this image feel natural? Is it diverse? Does it match our color palette? Would it work alongside our other imagery?'; a link to the brand's curated image library if one exists)."
    weight: 0.30
    description: "SourcingAndUsage"
