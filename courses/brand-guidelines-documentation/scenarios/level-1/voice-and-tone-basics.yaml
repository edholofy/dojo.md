meta:
  id: voice-and-tone-basics
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Voice and tone basics — document the brand's voice personality and how tone adapts across different contexts"
  tags: [voice, tone, personality, writing, beginner]

state: {}

trigger: |
  Your company makes project management software for
  creative teams. The content across different channels
  sounds like it's written by different companies:

  - Website homepage: "Unleash your team's creative genius
    with our revolutionary platform!" (hyperbolic)
  - Error messages: "Error 502: Service unavailable.
    Contact system administrator." (robotic)
  - Blog posts: "Hey friends! We're SO excited to share
    this update! 🎉🎉🎉" (overly casual)
  - Sales emails: "Dear Sir/Madam, I write to inquire
    regarding your interest in our enterprise solution."
    (stuffy and formal)

  The Head of Content says: "We need a consistent voice.
  Our brand should sound like one person, not four different
  companies. Can you define our voice and show how the tone
  changes across contexts?"

  Brand personality: helpful, creative, professional but
  not corporate, warm but not gushing.

  Task: Create the voice and tone section of the brand
  guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response defines brand voice — voice attributes (defines 3-5 core voice characteristics that remain constant: helpful — we explain things clearly and anticipate what people need to know; confident — we know our product and our industry, so we speak with authority without being arrogant; creative — we use language that's interesting and fresh, reflecting the creative teams we serve; warm — we treat our audience like smart colleagues, not like tickets or leads; each attribute should include a brief explanation and a spectrum — 'confident, not arrogant' or 'warm, not gushing'), voice vs tone distinction (explains the difference clearly: voice is the brand's personality — it stays the same everywhere, like a person's personality doesn't change; tone is how the voice adapts to context — like how a person speaks differently at a job interview vs a dinner party; the voice attributes above are constant; the tone shifts based on the situation, audience, and emotional context; example — 'Our voice is always warm, but our tone in an error message is more empathetic and practical, while our tone in a product launch is more excited and energetic'), voice personality description (paints a picture of the brand as a person: 'If our brand were a person, they'd be the colleague who always knows the answer but never makes you feel dumb for asking; they're creative and quick-witted but always professional; they'd never use jargon when a simple word works; they celebrate wins genuinely but don't need three exclamation points to show it; they're the kind of person creative teams trust and enjoy working with')."
    weight: 0.35
    description: "BrandVoice"
  - type: llm_judge
    criteria: "Response defines tone variations by context — tone spectrum (defines how tone shifts across contexts: product marketing — confident and inspiring, showcasing what's possible without hyperbole; product UI — clear and concise, helping users accomplish tasks without getting in the way; error messages and support — empathetic and solution-oriented, acknowledging the problem and guiding toward resolution; blog and thought leadership — knowledgeable and conversational, sharing expertise while being approachable; sales communications — professional and personable, treating prospects as potential colleagues rather than targets; social media — energetic and engaging, showing the brand's personality while staying authentic), before and after examples (rewrites the problematic examples using the defined voice: homepage before — 'Unleash your team's creative genius with our revolutionary platform!'; homepage after — 'Project management that works the way creative teams think. Plan, create, and deliver — without the chaos.'; error message before — 'Error 502: Service unavailable. Contact system administrator.'; error message after — 'We're having trouble connecting right now. This usually resolves in a few minutes. If it persists, our support team can help.'; blog before — 'Hey friends! We're SO excited to share this update! 🎉🎉🎉'; blog after — 'We've been working on something we think you'll love. Here's what's new and why it matters for your workflow.'; sales before — 'Dear Sir/Madam, I write to inquire...'; sales after — 'Hi [Name], I noticed your team at [Company] works on [specific creative projects]. We built [Product] for teams like yours — here's how it might help.'), emotional context guidelines (defines how tone responds to user emotions: user is frustrated — be empathetic first, then practical: 'We understand this is frustrating. Here's how to fix it...'; user is excited — match their energy appropriately: 'Great to have you on board! Let's get you started...'; user is confused — be patient and clear: 'No worries — this feature works like this...'; user is angry — be calm and solution-focused: 'We're sorry about this experience. Here's what we're doing to resolve it...')."
    weight: 0.35
    description: "ToneVariations"
  - type: llm_judge
    criteria: "Response provides practical writing guidance — word choice guidelines (provides specific do's and don'ts for language: use 'you' and 'your' — speak directly to the reader; say 'we' not 'the company' or 'the platform'; prefer simple words — 'use' over 'utilize', 'help' over 'facilitate', 'start' over 'commence'; avoid jargon unless the audience is technical — 'project timeline' not 'Gantt chart' for marketing, 'Gantt chart' is fine for product documentation; avoid superlatives — 'powerful' not 'the most powerful ever'; avoid exclamation points — one per page maximum; avoid emoji in professional contexts — acceptable sparingly in social media), grammar and formatting preferences (establishes consistency: use the Oxford comma; use sentence case for headings — 'How to create a project' not 'How To Create A Project'; contractions are encouraged — 'we're', 'you'll', 'it's' make the voice feel conversational; active voice preferred — 'You can create a project' not 'A project can be created'; keep sentences under 25 words and paragraphs under 3-4 sentences; use bullet points for lists of 3+ items), quick reference card (a one-page voice and tone cheat sheet: brand voice in one sentence — 'We're the helpful, creative colleague who makes project management feel natural'; 3 things we always do — be clear, be warm, be useful; 3 things we never do — use jargon unnecessarily, be condescending, use hype language; tone adjustment guide — a simple table showing context, tone, and an example sentence for the 5 most common writing contexts)."
    weight: 0.30
    description: "WritingGuidance"
