meta:
  id: brand-guidelines-document-structure
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Brand guidelines document structure — organize and structure a complete brand guidelines document"
  tags: [structure, organization, document, template, beginner]

state: {}

trigger: |
  Your company has individual brand elements documented in
  scattered files — logo guidelines in a Google Doc, colors
  in a Figma file, voice and tone in a Wiki page, and
  imagery rules in a PDF from the agency. No one knows
  where to find anything, so most people just guess.

  The Marketing Director says: "We need ONE brand guidelines
  document that's easy to find, easy to navigate, and easy
  to use. I don't want a 100-page PDF that no one reads.
  Make it practical."

  Available brand elements to organize:
  - Brand story and mission (1 page)
  - Logo guidelines (3 pages)
  - Color palette (2 pages)
  - Typography (2 pages)
  - Imagery and photography (2 pages)
  - Voice and tone (3 pages)
  - Social media guidelines (2 pages)
  - Email and presentation templates (1 page)
  - Partner and co-branding rules (1 page)
  - Contact information for brand questions (1 page)

  Total: ~18 pages of existing content.

  Task: Design the structure of the consolidated brand
  guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response designs an effective document structure — table of contents and organization (organizes the 18 pages into a logical structure: 1. Introduction — brand story, mission, and how to use this guide; 2. Logo — versions, usage rules, clear space, sizing, don'ts; 3. Color — palette, combinations, functional colors, accessibility; 4. Typography — type system, hierarchy, platform guidance, don'ts; 5. Imagery — photography, illustration, iconography; 6. Voice and Tone — voice attributes, tone by context, writing guidelines; 7. Applications — social media, email, presentations; 8. Co-branding — partner usage rules; 9. Resources — templates, downloads, contacts; the order follows the most frequently needed information first — logo and color are the most common questions), navigation and accessibility (makes the document easy to use: add page numbers and a clickable table of contents for PDF or web versions; use section tabs or color-coded sections for quick navigation; each section should start with a one-sentence summary of the key rule; include a 'quick start guide' on page 2 — the 5 most important brand rules for someone who won't read the full document; cross-reference between sections — 'See the Color section for approved color combinations'), format and distribution (recommends how to publish and share: digital-first — create a web-based version that's always up-to-date, not a static PDF that becomes outdated; a tool like Frontify, Notion, or a simple branded website works well; if a PDF is needed, create a condensed 1-page quick reference card for daily use and the full PDF for reference; store in a place everyone can access — not a designer's personal folder; share the link during onboarding so new hires know about it immediately)."
    weight: 0.35
    description: "DocumentStructure"
  - type: llm_judge
    criteria: "Response makes the guidelines practical and usable — quick reference materials (creates supplementary quick-use materials: a 1-page brand cheat sheet — logo, primary colors with hex codes, fonts, voice summary; a desk reference card or wallpaper with essential brand info; section-specific reference cards — a color swatch card, a typography cheat sheet, a voice and tone reminder; these quick references are for people who need a fast answer and won't open the full guidelines; they should link to the full document for details), audience-specific paths (recognizes that different teams need different information: marketers — primarily need voice, tone, imagery, and social media sections; designers — primarily need logo, color, typography, and imagery sections; developers — need color values, font stacks, and design tokens; salespeople — need logo files, presentation templates, and co-branding rules; external partners — need a simplified external version covering logo, colors, and co-branding; consider creating audience-specific quick links or a 'start here' guide for each role), templates and downloadable assets (bundles practical tools with the guidelines: logo files in all formats organized in a downloadable folder; color swatch files for Figma, Sketch, and Adobe; branded presentation templates for Google Slides and PowerPoint; email signature template; social media post templates for each platform; business card template; all templates should be linked from the relevant section of the guidelines — when someone reads about typography, they should be able to download the presentation template immediately)."
    weight: 0.35
    description: "PracticalUsability"
  - type: llm_judge
    criteria: "Response addresses maintenance and governance — version control and updates (plans for keeping the guidelines current: assign a brand guidelines owner — someone responsible for updates and questions; version the document — v1.0, v1.1, etc. with a changelog; review the guidelines quarterly — are they still accurate? have new needs emerged?; when the brand evolves, update the guidelines before rolling out changes — the guidelines should lead, not follow; date-stamp the document — 'Last updated: [date]' on the cover and in the footer), feedback and adoption tracking (measures whether the guidelines are working: create a simple feedback mechanism — a form or Slack channel where people can report issues or request clarifications; track common questions — if the same question appears repeatedly, the guidelines need clarification in that area; audit brand consistency quarterly — review recent marketing materials, sales decks, and social media for compliance; the guidelines are successful when the brand feels consistent across all touchpoints), common pitfalls (warns against common brand guidelines mistakes: don't make the document too long or academic — no one reads a 100-page brand manifesto; don't make it too vague — 'use good judgment' is not a guideline; don't make it too rigid — allow for creative interpretation within the rules; don't forget to include the 'why' — people follow rules better when they understand the reasoning; don't create the guidelines and then ignore them — leadership must model compliance)."
    weight: 0.30
    description: "MaintenanceAndGovernance"
