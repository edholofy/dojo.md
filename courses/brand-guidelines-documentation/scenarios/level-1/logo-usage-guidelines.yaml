meta:
  id: logo-usage-guidelines
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Logo usage guidelines — document proper logo usage, clear space, sizing, and placement rules"
  tags: [logo, usage, clear-space, sizing, beginner]

state: {}

trigger: |
  You're a junior brand designer at a B2B SaaS startup that
  just completed a rebrand. The new logo has been designed
  but there are no usage guidelines. Already, you've seen:

  - A sales deck using the logo stretched horizontally
  - The marketing team placed the logo on a busy photograph
    where it's barely visible
  - A partner company used the logo in the wrong color
  - An intern recreated the logo from memory in PowerPoint

  The brand manager says: "We need logo usage guidelines
  before this gets worse. Document the basics — how to use
  the logo correctly and what to avoid."

  Logo details:
  - Primary logo: wordmark + icon (horizontal lockup)
  - Secondary logo: icon only (for small applications)
  - Colors: primary blue (#1A3B5C), white, and black versions
  - The logo was designed by an external agency and delivered
    as SVG, PNG, and EPS files

  Task: Create the logo usage guidelines section of the
  brand guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response documents logo versions and usage — logo versions (documents all available logo versions and when to use each: primary horizontal lockup — use for most applications including website headers, presentations, and printed materials; secondary icon only — use when space is limited such as social media avatars, app icons, and favicons; each version should be documented with a visual example or clear description), clear space and minimum size (defines protection space around the logo: clear space — the minimum area around the logo that must remain free of text, images, or other elements; define using a proportional measurement like 'the height of the letter X in the wordmark' or 'half the icon height'; minimum size — the smallest size at which the logo remains legible: the full lockup should not be used smaller than X pixels wide for digital or X mm for print; the icon can be used smaller because it's simpler; these rules prevent the logo from being crowded or unreadable), color usage rules (documents the three color versions: primary blue version — use on white or light backgrounds; white reverse version — use on dark backgrounds or photographs; black version — use for single-color applications like faxes or embossing; specify the exact color values — hex for digital, Pantone and CMYK for print; rules for background contrast — the logo must always have sufficient contrast to be clearly visible)."
    weight: 0.35
    description: "LogoVersionsAndUsage"
  - type: llm_judge
    criteria: "Response documents logo don'ts — common misuses (creates a clear list of what NOT to do with the logo, directly addressing the observed problems: don't stretch, distort, or change the proportions of the logo; don't place the logo on busy backgrounds where it loses visibility — if placed on a photo, use a solid color bar or overlay to ensure contrast; don't change the logo colors to unapproved colors; don't recreate, redraw, or modify the logo in any way — always use the provided logo files; don't rotate the logo; don't add effects like drop shadows, outlines, or gradients; don't rearrange the elements of the lockup), visual examples of misuse (each don't should be accompanied by a description of the incorrect usage: show the stretched version with a note — 'Don't stretch or compress the logo'; show the logo on a busy background — 'Don't place on low-contrast backgrounds'; show an incorrect color version — 'Don't change logo colors'; show a recreated version — 'Always use official logo files, never recreate'), file management guidance (explains how to access and use logo files: where to find the approved logo files — a shared drive, brand portal, or asset management system; which file format to use for each context — SVG for web development, PNG for presentations and documents, EPS for print production; never screenshot the logo from a website or document — always use the source files; who to contact if a specific format or version is needed — the brand manager or design team)."
    weight: 0.35
    description: "LogoDonts"
  - type: llm_judge
    criteria: "Response provides practical placement and co-branding guidance — logo placement rules (documents where the logo should appear: website — top left header, footer center; presentations — title slide centered, content slides top right or bottom left; business cards — front center or top left; email signatures — left-aligned with consistent sizing across the company; marketing materials — prominent placement with clear space maintained; social media — profile pictures use the icon version, posts use the full lockup when needed), partner and co-branding basics (provides initial rules for how partners should use the logo: partners must use the provided logo files and follow the same usage rules; when the logo appears alongside partner logos, maintain equal sizing and spacing; the company logo should always appear on the left or top in co-branded materials; partners should submit co-branded materials for approval before publishing), document structure and accessibility (the guidelines document itself should be well-organized: use a clear table of contents — logo versions, clear space, minimum size, color usage, placement, don'ts; include a quick reference guide — a one-page summary for people who don't read the full document; provide downloadable logo files directly from the guidelines or link to the asset library; include a contact for questions — 'For logo usage questions, contact the brand team at...')."
    weight: 0.30
    description: "PlacementAndCoBranding"
