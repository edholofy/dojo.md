meta:
  id: social-media-brand-guidelines
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Social media brand guidelines — document how the brand should appear and communicate across social platforms"
  tags: [social-media, platforms, consistency, content, beginner]

state: {}

trigger: |
  Your DTC (direct-to-consumer) skincare brand has 4 people
  posting to social media, and each person's posts look like
  a different brand:

  - Person A uses bright neon overlays and slang
  - Person B posts product photos on white backgrounds with
    formal descriptions
  - Person C shares memes and pop culture references
  - Person D reposts user content without any brand framing

  The social media manager says: "We need guidelines so that
  whether Person A or Person D posts, the result looks and
  sounds like us. But I don't want to kill creativity —
  just channel it."

  Brand info:
  - Target audience: women 25-40, skincare-conscious
  - Brand personality: knowledgeable, approachable, clean,
    trustworthy
  - Primary platforms: Instagram, TikTok, Pinterest
  - Posting frequency: Instagram 5x/week, TikTok 3x/week,
    Pinterest 7x/week

  Task: Create the social media section of the brand
  guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response defines platform-specific visual guidelines — Instagram visual identity (defines how the brand should look on Instagram: grid aesthetic — a cohesive feed with alternating content types; approved content templates — product shots, lifestyle imagery, educational carousels, user testimonials; color treatment — all images should use the brand's warm, clean aesthetic; text overlays use brand typography on a semi-transparent brand-colored background; no neon overlays, no heavy filters, no busy backgrounds; story templates — consistent look with brand colors and fonts for stories), TikTok visual identity (adapts the brand for TikTok's different format: TikTok allows more personality and energy than Instagram; approved content types — skincare routines, ingredient education, behind-the-scenes, myth-busting, GRWM formats; on-screen text uses brand typography when possible but acknowledges TikTok's native text is acceptable; the brand's clean and knowledgeable personality should come through even in casual video content; don't use effects or filters that distort products or skin), Pinterest visual identity (optimizes for Pinterest's discovery format: pin design — tall format with clear product photography, benefit-focused text overlays, and brand colors; every pin should include the brand logo subtly; board organization — curated boards that reflect the brand's expertise areas; pins should be high-quality and searchable — optimize descriptions for Pinterest SEO; Pinterest requires less personality and more utility than Instagram or TikTok)."
    weight: 0.35
    description: "PlatformVisualGuidelines"
  - type: llm_judge
    criteria: "Response defines voice and content guidelines for social — social voice adaptation (adapts the brand voice for social media: the brand voice stays consistent but the tone is more conversational on social; Instagram captions — informative and warm, like advice from a trusted friend; TikTok scripts — energetic and educational, showing personality while sharing expertise; Pinterest descriptions — practical and keyword-rich, focused on utility; across all platforms: no slang that feels inauthentic to the brand, no excessive emojis, no aggressive sales language; the brand should sound like a knowledgeable friend, not a corporation or a teenager), content pillars (defines 4-5 content categories that guide what to post: educate — ingredient breakdowns, skincare routines, myth-busting; inspire — before/after results, customer stories, lifestyle imagery; engage — polls, questions, challenges, interactive content; promote — product launches, sales, bundles with clear but not pushy messaging; behind-the-scenes — how products are made, team introductions, company values; each post should fit one of these pillars; this prevents the random meme problem — if it doesn't fit a pillar, it doesn't get posted), hashtag and caption guidelines (standardizes the written elements: hashtag strategy — define 10-15 branded and community hashtags; use 3-5 per Instagram post, don't overload; branded hashtag for UGC collection; caption structure — hook line that stops scrolling, 2-3 sentences of value, CTA when appropriate; caption length varies by platform — longer on Instagram, shorter on TikTok; always spell-check and proofread before posting — typos undermine the 'trustworthy' brand attribute)."
    weight: 0.35
    description: "VoiceAndContent"
  - type: llm_judge
    criteria: "Response addresses UGC, engagement, and creative freedom — UGC reposting guidelines (addresses Person D's problem of sharing user content without brand framing: always credit the original creator; add a branded frame or caption that connects the UGC to the brand story; obtain permission before reposting — even if the user tagged the brand; curate UGC that matches the brand aesthetic — not every tagged post should be reposted; UGC should feel like a natural part of the feed, not an afterthought), engagement and response guidelines (defines how the brand interacts: respond to comments within 24 hours; use the brand voice in responses — warm and helpful; acknowledge complaints publicly and move to DM for resolution; don't argue with negative comments; don't use canned responses — personalize each reply; emojis are acceptable in responses — limited to 1-2 per reply; don't engage with controversial topics outside the brand's expertise), balancing consistency with creativity (addresses the manager's concern about killing creativity: the guidelines set the boundaries, not the exact content; within the brand's visual and voice framework, each person should bring their perspective; Person A's energy is welcome if channeled through brand templates instead of neon overlays; Person C's pop culture knowledge is valuable if the references align with the target audience; the guidelines should feel like a creative brief, not a restrictive rule book; review new content types with the social media manager before publishing — innovation is encouraged within the brand framework)."
    weight: 0.30
    description: "UGCAndCreativeFreedom"
