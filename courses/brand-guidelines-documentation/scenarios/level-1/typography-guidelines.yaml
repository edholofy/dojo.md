meta:
  id: typography-guidelines
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Typography guidelines — document the brand's type system including font families, sizes, weights, and usage rules"
  tags: [typography, fonts, type-system, hierarchy, beginner]

state: {}

trigger: |
  Your company's marketing team has been using whatever
  fonts they feel like in different materials. You've seen:

  - The website uses Inter for body text
  - Sales decks use Arial because "everyone has it"
  - Marketing emails use Georgia because "it looks nice"
  - The mobile app uses the system default (San Francisco
    on iOS, Roboto on Android)
  - Social media graphics use a decorative script font that
    looks nothing like the brand

  The brand designer has selected the typography system:
  - Primary typeface: Plus Jakarta Sans (headings)
  - Secondary typeface: Source Serif 4 (body text, long-form)
  - System fallback: -apple-system, system-ui, sans-serif
  - Monospace (for code/data): JetBrains Mono

  The designer says: "I need clear rules so people stop
  using random fonts. Include a type scale and hierarchy."

  Task: Create the typography section of the brand
  guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response documents the type system — font family definitions (documents each typeface with its role: Plus Jakarta Sans — the primary display typeface used for headings, subheadings, and UI elements; it conveys modernity and clarity; available weights: Regular 400, Medium 500, SemiBold 600, Bold 700; Source Serif 4 — the secondary serif typeface used for body text, articles, and long-form content; the serif provides readability for extended reading; available weights: Regular 400, SemiBold 600; JetBrains Mono — used exclusively for code snippets, data tables, and technical content; system fallback stack — used when brand fonts cannot be loaded or aren't licensed for a specific platform), type scale and hierarchy (defines a consistent sizing system: Display — Plus Jakarta Sans Bold, 48px/56px line height for hero sections; H1 — Plus Jakarta Sans SemiBold, 36px/44px for page titles; H2 — Plus Jakarta Sans SemiBold, 28px/36px for section headings; H3 — Plus Jakarta Sans Medium, 22px/28px for subsection headings; H4 — Plus Jakarta Sans Medium, 18px/24px for card titles; Body Large — Source Serif 4 Regular, 18px/28px for featured body text; Body — Source Serif 4 Regular, 16px/24px for standard body text; Small — Plus Jakarta Sans Regular, 14px/20px for captions and metadata; provide the scale in both px and rem units for web), font licensing and access (explains how to obtain and use the fonts: where to download — Google Fonts for Plus Jakarta Sans and Source Serif 4, jetbrains.com for JetBrains Mono; licensing — all selected fonts are open source and free for commercial use; installation guide — link to instructions for installing on Mac, Windows, Google Workspace, and Figma; who to contact if fonts aren't working — the design or IT team)."
    weight: 0.35
    description: "TypeSystem"
  - type: llm_judge
    criteria: "Response provides usage rules and context-specific guidance — platform-specific typography (defines typography for each platform: website — use the full type system with web fonts loaded via Google Fonts or self-hosted; mobile app — use Plus Jakarta Sans for headings and UI; body text can use the system default for performance; emails — Plus Jakarta Sans may not render in all clients; use web-safe fallbacks with the same sizing and weight; presentations — use Plus Jakarta Sans for headings and body text; Source Serif is not needed for slide content; social media graphics — use Plus Jakarta Sans only; avoid decorative or script fonts entirely), text styling rules (defines how text should be formatted: line length — body text should be 50-75 characters per line for optimal readability; paragraph spacing — 1.5× the font size between paragraphs; letter spacing — headings use -0.02em tracking, body text uses default tracking; text alignment — left-aligned by default, center-aligned only for short headings or CTAs; never use all caps for more than 3 words; bold and italic usage — bold for emphasis within body text, italic for quotes or citations only; underlines are reserved for links), font pairing rules (explains why the selected fonts work together: Plus Jakarta Sans and Source Serif 4 create contrast between sans-serif headings and serif body — this is a classic pairing that provides visual hierarchy; don't mix additional typefaces without approval; don't use Plus Jakarta Sans for long body text — it's designed for display sizes; don't use Source Serif 4 for UI elements or navigation — it's designed for reading)."
    weight: 0.35
    description: "UsageAndContext"
  - type: llm_judge
    criteria: "Response addresses common mistakes and provides practical tools — typography don'ts (creates a clear list addressing the observed problems: don't use Arial, Times New Roman, or other non-approved fonts in brand materials; don't use decorative or script fonts for any brand communications; don't change the font weights beyond what's specified — don't use Thin or ExtraBold variants; don't use font sizes outside the defined type scale — this prevents the 'I'll just make it a bit bigger' problem; don't use colored text except for links — body text should always be Charcoal or the defined text color; if a team doesn't have the brand fonts installed, contact IT before substituting), practical implementation tools (makes the type system easy to use: provide a Figma typography component library with all styles pre-defined; provide CSS custom properties or a Tailwind config with the type scale; create a Google Docs or Word template with the correct fonts and heading styles pre-configured; for presentations, provide branded PowerPoint and Google Slides templates with the correct typography; the easier it is to use the correct fonts, the less likely people are to use random alternatives), quick reference guide (a one-page summary: a table showing each text style — name, typeface, weight, size, line height, use case; 3-4 visual examples showing correct typography in context — a website page, a presentation slide, a social media post; emergency contact — 'If you're unsure about typography, ask the brand team before publishing')."
    weight: 0.30
    description: "MistakesAndTools"
