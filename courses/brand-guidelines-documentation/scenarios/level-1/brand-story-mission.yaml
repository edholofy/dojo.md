meta:
  id: brand-story-mission
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Brand story and mission — document the brand's founding story, mission, vision, and values for the guidelines"
  tags: [brand-story, mission, vision, values, beginner]

state: {}

trigger: |
  Your company is a sustainable fashion brand that's been
  growing quickly. New employees, partners, and press often
  ask: "What's your brand about?" and get different answers
  depending on who they ask:

  - The founder says: "We're saving the planet through
    fashion"
  - The marketing team says: "We make affordable eco-friendly
    clothes"
  - Sales says: "We're the ethical alternative to fast
    fashion"
  - Customer support says: "We sell sustainable clothing"

  The CMO says: "We need one clear brand story that everyone
  tells consistently. Not a corporate mission statement —
  a story that makes people care."

  Background:
  - Founded in 2021 by a former fast-fashion designer who
    saw the industry's environmental impact firsthand
  - Core commitment: every garment uses 50% less water and
    produces 70% less carbon than conventional equivalents
  - Price point: mid-range (not luxury sustainable, not
    cheap fast fashion)
  - Target audience: environmentally conscious consumers
    ages 25-45 who don't want to sacrifice style for
    sustainability

  Task: Create the brand story and mission section of the
  brand guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response crafts a compelling brand story — founder narrative (tells the brand's origin as a story, not a statement: the founder's personal journey from inside fast fashion to launching a sustainable alternative; what they saw that made them change — the waste, the environmental cost, the realization that the industry could be different; the moment of decision — leaving a successful career to build something better; the story should be honest and specific — '50% less water' is more compelling than 'eco-friendly'; the founder's story gives the brand authenticity that competitors can't replicate), brand purpose (articulates why the brand exists beyond making money: not just 'we sell sustainable clothes' — that's what they do, not why; the purpose should connect to a bigger idea — 'We believe you shouldn't have to choose between looking good and doing good'; the purpose statement should be memorable and usable — employees can repeat it, it fits in a social media bio, it resonates with customers; avoid generic sustainability language — 'making the world better' is too vague; connect to the specific impact — water and carbon reduction with real numbers), story structure (organizes the brand story into a usable format: a 3-sentence version for everyday use — 'We were founded by a former fast-fashion designer who saw the industry's environmental cost firsthand. Every garment we make uses 50% less water and 70% less carbon than conventional alternatives. We're proof that sustainable fashion doesn't mean sacrificing style or breaking the bank.'; a 1-paragraph version for press and partners; a full 1-page version with the founder's story for the website and onboarding; each version tells the same story at different lengths)."
    weight: 0.35
    description: "BrandStory"
  - type: llm_judge
    criteria: "Response defines mission, vision, and values — mission statement (a clear, actionable mission: the mission describes what the company does today; it should be specific to this brand, not a generic sustainability statement; example direction — 'We design clothing that proves sustainability and style are not compromises — they're partners'; the mission should guide daily decisions — 'Does this product/campaign/partnership align with our mission?'), vision statement (a future-focused aspiration: the vision describes where the brand is heading; it should be ambitious but believable — not 'save the planet' but perhaps 'make sustainable fashion the default, not the alternative'; the vision gives the team direction for long-term strategy; it should inspire employees and excite customers — people want to support a brand that's going somewhere), brand values (3-5 core values that guide behavior: each value should be specific to the brand, not generic; examples: 'Transparency' — we share our supply chain, our impact numbers, and our mistakes; 'Quality over quantity' — we make fewer items that last longer; 'Accessible sustainability' — we price for the many, not the few; 'Evidence-based impact' — we measure our environmental impact with data, not marketing claims; each value should have a brief explanation and a behavioral example — what does this value look like in action?)."
    weight: 0.35
    description: "MissionVisionValues"
  - type: llm_judge
    criteria: "Response ensures consistent storytelling — storytelling guidelines (provides rules for how the brand story should be told: always lead with the human story, not the product — people connect with the founder's journey and the brand's purpose before they care about fabric composition; always include specific impact data — '50% less water' not 'eco-friendly'; never claim perfection — the brand is making things better, not perfect; acknowledge the journey: 'We're not perfect, but every garment is better than the conventional alternative'; this honesty builds more trust than green-washing claims), audience-specific messaging (adapts the brand story for different audiences: customers — focus on what the brand means for them: 'style you can feel good about'; press — focus on the founder's story and the industry impact data; investors and partners — focus on the market opportunity and differentiation; employees — focus on the mission and their role in it; each audience gets the same story but with different emphasis), alignment exercise (includes a practical tool for ensuring consistency: a brand story quiz or checklist for employees — 'Can you explain what we do and why in 2 sentences?'; a quarterly brand alignment check — review recent communications to ensure they match the brand story; when the CMO, founder, sales, and support all answer 'What's your brand about?' — they should give essentially the same answer with their own authentic voice; the brand story section should resolve the inconsistency described in the trigger)."
    weight: 0.30
    description: "ConsistentStorytelling"
