meta:
  id: first-brand-shift
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "First brand shift — handle a sudden brand compliance crisis requiring rapid application of all beginner brand guidelines skills"
  tags: [shift, crisis, compliance, multi-challenge, beginner]

state: {}

trigger: |
  You're the brand coordinator at a growing tech startup.
  On Monday morning, three brand emergencies land on your
  desk simultaneously:

  1. A major industry publication is running a feature on
     your company tomorrow. They need: the company logo in
     high-res, the brand color codes, a 100-word brand
     description, and a founder headshot. You have 4 hours
     to deliver.

  2. The sales team just sent out 500 emails to prospects
     using a template that has the old logo, wrong colors,
     and uses the tone of a used car salesman: "DON'T MISS
     THIS INCREDIBLE LIMITED-TIME OFFER!!!" The VP of Sales
     says it's already sent and can't be recalled.

  3. A new employee starts today and needs: business cards,
     email signature, access to presentation templates, and
     a summary of the brand guidelines so they "don't mess
     anything up."

  The brand manager is on vacation. You're the only brand
  person available.

  Task: Triage and handle all three situations using the
  brand guidelines.

assertions:
  - type: llm_judge
    criteria: "Response triages the three emergencies — prioritization (identifies the correct priority order: the press request is most urgent — 4-hour deadline and external visibility; deliver the wrong assets and 50,000 readers see incorrect branding; the new employee is second — they start today and need materials to work; delay means they'll start creating off-brand materials; the sent emails are third — they're already sent and can't be recalled; the damage is done and the response is about preventing future occurrences, not fixing the current one), press request execution (handles the media request efficiently: locate the high-res logo files from the brand asset library — SVG, PNG at 300 DPI minimum, and EPS; provide color codes in hex, RGB, and Pantone; draft the 100-word brand description using the approved brand story — adapt the 1-paragraph version for press use; locate an approved founder headshot — if none exists, coordinate with the founder for a quick professional photo or use their professional LinkedIn photo with permission; send all assets in a branded press kit folder with a brief usage guide — 'Please use the horizontal logo version on light backgrounds'), new employee setup (handles the onboarding brand needs: provide business card template and submit the order to the approved printer; set up the email signature using the standard HTML template; share the link to the brand guidelines document and the template folder; schedule a 15-minute 'brand orientation' — walk through the key guidelines: logo, colors, voice, templates; provide the quick reference brand cheat sheet — the one-page summary of essential brand rules)."
    weight: 0.35
    description: "Triage"
  - type: llm_judge
    criteria: "Response handles the sales email damage control — immediate assessment (evaluates the damage from the off-brand sales email: 500 prospects received an email with the old logo, wrong colors, and aggressive used-car-salesman tone; this contradicts the brand's positioning and could damage credibility with potential customers; the tone violation is worse than the visual violations — recipients will form negative impressions of the brand), damage mitigation strategy (takes practical steps to limit the damage: draft a follow-up email from the VP of Sales that uses the correct branding and a tone correction: 'I wanted to follow up on the email you received — we're excited about [product/offer] and wanted to share how it can help [specific benefit]'; this subtle correction doesn't acknowledge the mistake but resets the tone for the relationship; the follow-up should use the correct logo, brand colors, and approved email template; review the sales team's other templates to identify any additional off-brand materials before they're sent), prevention plan (prevents this from happening again: create approved sales email templates that are pre-branded; conduct a 30-minute brand training session for the sales team; implement a review process for new email campaigns — the first use of any new template must be reviewed by the brand coordinator; add the sales team to the brand template distribution list so they always have the latest materials; address the root cause — the sales team probably didn't have easy access to branded templates, so they created their own)."
    weight: 0.35
    description: "SalesEmailDamageControl"
  - type: llm_judge
    criteria: "Response manages the situation holistically — communication and escalation (manages upward and across: send a brief update to the brand manager — 'Three brand issues today, all handled: press assets delivered, new hire onboarded with brand materials, sales email addressed with follow-up plan'; if the sales email situation is severe, consider escalating to the VP of Marketing — not to blame Sales but to establish a collaborative process; document all three incidents as case studies for why brand guidelines and template access matter), systemic improvements (identifies process improvements from today's crises: create a 'brand emergency kit' — a pre-packaged set of press assets ready to send within minutes; establish a brand asset management system — a central, organized library where anyone can find correct assets; create a brand onboarding checklist — a standard process for every new hire's brand setup; implement a campaign review process for customer-facing communications; these improvements prevent similar crises from recurring), lessons learned (reflects on what the crises reveal about the brand guidelines program: the press request reveals that brand assets aren't easily accessible — improve the asset library; the sales email reveals that not all teams know or follow the brand guidelines — expand training; the new employee situation reveals that brand onboarding isn't formalized — create a standard process; each crisis is a signal about a gap in the brand guidelines program that can be addressed proactively)."
    weight: 0.30
    description: "HolisticManagement"
