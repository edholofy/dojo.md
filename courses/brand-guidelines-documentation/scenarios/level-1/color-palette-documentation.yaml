meta:
  id: color-palette-documentation
  level: 1
  course: brand-guidelines-documentation
  type: output
  description: "Color palette documentation — define and document the brand's color system with primary, secondary, and functional colors"
  tags: [color, palette, system, documentation, beginner]

state: {}

trigger: |
  Your startup's designer created a beautiful color palette
  for the rebrand but hasn't documented it. Different teams
  are interpreting the colors differently:

  - The website uses slightly different blues than the app
  - Marketing materials use 6 different shades of the
    primary green, none of which match the designer's intent
  - A presentation uses a gradient that clashes with the
    brand colors
  - The support team chose their own colors for the help
    center because they "didn't know the brand colors"

  The designer provides you with the palette:
  - Primary: Forest Green (#2D5F2D), Cream White (#F5F0E8)
  - Secondary: Warm Gold (#C4973B), Charcoal (#333333)
  - Accent: Terracotta (#C25B3B)
  - The designer also mentions "functional colors" for UI
    but hasn't defined them yet

  Task: Create the color palette section of the brand
  guidelines document.

assertions:
  - type: llm_judge
    criteria: "Response documents the complete color system — primary colors (documents each primary color with full specifications: Forest Green #2D5F2D — the brand's signature color, used for primary CTAs, headers, and key brand elements; provide all format specifications: hex #2D5F2D, RGB values, CMYK values for print, and Pantone equivalent for physical production; Cream White #F5F0E8 — the primary background color, used for creating a warm, natural feel; full specifications across all formats; explain the role of each color — primary colors carry the most visual weight and appear in every brand touchpoint), secondary and accent colors (documents supporting colors: Warm Gold #C4973B — used for highlights, callouts, and secondary CTAs; Charcoal #333333 — primary text color and used for grounding elements; Terracotta #C25B3B — the accent color used sparingly for emphasis, alerts, and differentiating elements; each with full specifications across formats; define usage proportions — a rough guide like '60% primary, 30% secondary, 10% accent' helps teams understand how much of each color to use), functional UI colors (defines the missing functional colors: success green — a distinct shade from the brand green, used for success messages and confirmations; error red — used for error states and critical alerts; warning amber/yellow — used for warnings and caution states; info blue — used for informational messages; functional colors should be distinguishable from brand colors — they serve a different purpose; include accessible contrast ratios — functional colors must meet WCAG AA standards against their typical backgrounds)."
    weight: 0.35
    description: "ColorSystem"
  - type: llm_judge
    criteria: "Response provides usage rules and color combinations — color combination guidelines (defines which colors work together: approved combinations — Forest Green on Cream White (primary pairing), Charcoal text on Cream White, Warm Gold accents on Forest Green; restricted combinations — never use Terracotta on Forest Green, avoid Gold text on Cream White due to poor contrast; provide background-foreground pairings with contrast ratios; this prevents the gradient and clashing color problems the team has experienced), color proportions by application (guides how much of each color to use in specific contexts: website — Cream White backgrounds, Forest Green navigation and CTAs, Charcoal body text, Gold for secondary actions, Terracotta for sale or alert badges; presentations — Cream White slide backgrounds, Forest Green for titles and section dividers, Charcoal for body text, Gold for data highlights; marketing materials — follow the 60/30/10 rule with primary, secondary, and accent; social media — consistent use of the Forest Green and Cream White pairing for brand recognition), color don'ts (clear rules about what to avoid: don't create new shades of brand colors — use only the specified hex values; don't use colors from outside the defined palette unless approved by the brand team; don't apply gradients to brand colors unless a gradient system is specifically defined; don't use the brand colors for UI functional states — keep brand and functional colors separate; don't use poor contrast combinations that make text unreadable)."
    weight: 0.35
    description: "UsageRulesAndCombinations"
  - type: llm_judge
    criteria: "Response addresses accessibility and practical implementation — accessibility requirements (ensures the color system is accessible: all text-background combinations must meet WCAG AA contrast standards — minimum 4.5:1 for normal text, 3:1 for large text; document the contrast ratios for each approved color combination; if a brand color combination doesn't meet accessibility standards, provide an accessible alternative — for example, if Warm Gold on white fails contrast, specify a darker gold variation for text use; functional colors must be distinguishable by users with color blindness — don't rely on color alone to convey meaning), practical implementation (makes the colors easy to use correctly: provide a downloadable color swatch file — ASE for Adobe, color palette for Figma, theme file for Tailwind/CSS; include CSS custom properties or design tokens: --color-primary: #2D5F2D; create a color reference card — a one-page printable reference with all colors and their specifications; provide a Slack or Teams channel where team members can ask color questions), tints and shades system (defines approved lighter and darker variations: for the primary Forest Green, define 5 tints — 10%, 20%, 40%, 60%, 80% opacity or specific lighter hex values; these tints are used for backgrounds, hover states, and subtle color variations; this prevents teams from creating their own shades — the '6 different blues' problem; each tint should have a name or number for easy reference — Green-100, Green-200, Green-300, etc.)."
    weight: 0.30
    description: "AccessibilityAndImplementation"
