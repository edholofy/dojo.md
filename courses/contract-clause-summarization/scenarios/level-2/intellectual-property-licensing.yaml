meta:
  id: intellectual-property-licensing
  level: 2
  course: contract-clause-summarization
  type: output
  description: "Analyze an IP licensing agreement — summarize grant of rights, restrictions, royalties, sublicensing, and termination provisions for a technology licensing deal"
  tags: [ip-licensing, technology-license, intellectual-property, intermediate]

state: {}

trigger: |
  Analyze an IP licensing agreement where a startup
  is licensing patented technology from a university
  for commercial use.

  KEY TERMS:

  GRANT: "University hereby grants to Licensee an
  exclusive, worldwide license under the Licensed
  Patents to make, have made, use, sell, offer for
  sale, and import Licensed Products in the Field of
  Use."

  FIELD OF USE: "Autonomous vehicle navigation
  systems for commercial delivery applications."

  LICENSED PATENTS: 3 US patents + 2 pending PCT
  applications for sensor fusion algorithms

  ROYALTIES:
  - Running royalty: 4% of Net Sales
  - Minimum annual royalty: $50,000 (Years 1-2),
    $150,000 (Years 3-5), $500,000 (Years 6+)
  - Upfront license fee: $250,000
  - Milestone payments: $100,000 upon first commercial
    sale, $500,000 upon $10M cumulative revenue

  SUBLICENSING: Permitted with prior written consent
  and sublicensing fee equal to 25% of sublicensee
  revenue attributable to Licensed Patents

  DILIGENCE: Licensee must (a) hire at least 2 FTEs
  for commercialization within 12 months; (b) file
  for regulatory approval within 24 months; (c)
  achieve first commercial sale within 36 months

  IMPROVEMENTS: Any improvements to Licensed Patents
  developed by Licensee shall be owned by Licensee
  but University receives a non-exclusive, royalty-free
  license to such improvements for non-commercial
  research purposes

  TERMINATION: University may terminate if Licensee
  fails to meet diligence milestones; Licensee may
  terminate upon 90 days notice with no further
  royalty obligation except for accrued amounts

  Create:
  1. Plain-language summary for founders
  2. Financial modeling of royalty obligations
  3. Diligence milestone risk assessment
  4. IP ownership and improvement analysis
  5. Competitive implications of the Field of Use

assertions:
  - type: llm_judge
    criteria: "Royalty modeling shows the escalating financial commitment — the minimum annual royalty escalates from $50K to $500K regardless of revenue; the 4% running royalty on a successful product could become significant; milestone payments total $600K in addition to the $250K upfront; founders need to see the total IP cost as a function of revenue scenarios."
    weight: 0.35
    description: "RoyaltyFinancialModeling"
  - type: llm_judge
    criteria: "Diligence milestone risk is assessed against startup realities — 2 FTEs in 12 months, regulatory filing in 24 months, and first sale in 36 months are aggressive for a startup; missing any milestone could result in losing the exclusive license; the analysis assesses feasibility and recommends negotiating more flexible timelines or milestone modifications."
    weight: 0.35
    description: "DiligenceMilestoneRisk"
  - type: llm_judge
    criteria: "Field of Use limitation is analyzed for competitive impact — 'autonomous vehicle navigation for commercial delivery' is specific; the startup cannot use the technology for personal vehicles, drones, or other applications without renegotiating; the analysis evaluates whether this is too narrow for the startup's growth ambitions or adequately focused."
    weight: 0.30
    description: "FieldOfUseAnalysis"
