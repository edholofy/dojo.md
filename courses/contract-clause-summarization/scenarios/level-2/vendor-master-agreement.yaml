meta:
  id: vendor-master-agreement
  level: 2
  course: contract-clause-summarization
  type: output
  description: "Analyze a vendor master services agreement — compare terms across multiple vendor proposals, identify deviations from company standards, and create a risk-adjusted comparison matrix"
  tags: [vendor-agreement, comparative-analysis, procurement, intermediate]

state: {}

trigger: |
  Compare three vendor master services agreements
  for outsourced customer support services and create
  a risk-adjusted comparison for the procurement team.

  VENDOR A — "GlobalServe":
  - Liability cap: Greater of $5M or 2x annual fees
  - Indemnification: Mutual, covers IP and data breach
  - Termination: Mutual convenience with 90 days notice
  - Data location: US only, SOC 2 Type II
  - SLA: 95% calls answered in 30 seconds, 90% first
    call resolution
  - Price: $28/hour, 3% annual escalator
  - Term: 2 years, auto-renew 1 year
  - Transition: 120-day transition assistance included

  VENDOR B — "SupportPro":
  - Liability cap: 12 months fees paid
  - Indemnification: Vendor indemnifies client only
  - Termination: Client for convenience with 180 days;
    vendor for convenience with 90 days
  - Data location: US and Philippines, ISO 27001
  - SLA: 90% calls in 45 seconds, 85% first call
    resolution
  - Price: $18/hour, CPI escalator (capped at 5%)
  - Term: 3 years, auto-renew 2 years
  - Transition: 60 days at additional cost

  VENDOR C — "NextLevel CX":
  - Liability cap: $2M flat
  - Indemnification: Mutual, broad carve-outs for
    client-provided content
  - Termination: Mutual for cause only; convenience
    requires 50% remaining term payment
  - Data location: Multi-region (US, EU, APAC), GDPR
    compliant
  - SLA: 98% calls in 20 seconds, 92% first call
    resolution, 24/7 coverage
  - Price: $35/hour, fixed for term
  - Term: 5 years, no auto-renew
  - Transition: 90 days included, knowledge transfer
    guaranteed

  Create:
  1. Side-by-side comparison matrix
  2. Risk analysis for each vendor
  3. Total cost of ownership (3-year and 5-year)
  4. Best-of-breed clause recommendations
  5. Negotiation strategy for preferred vendor

assertions:
  - type: llm_judge
    criteria: "Comparison matrix enables apples-to-apples evaluation — normalizes terms across vendors so the procurement team can compare directly; highlights where each vendor is strongest and weakest; uses a consistent scoring framework (red/yellow/green or numeric) for each contract dimension."
    weight: 0.35
    description: "ComparisonMatrixQuality"
  - type: llm_judge
    criteria: "Total cost of ownership goes beyond hourly rate — includes the impact of escalators (Vendor A's 3% compounds to significantly more than CPI over 5 years), transition costs (Vendor B charges extra), early termination penalties (Vendor C's 50% remaining term), and the hidden cost of lower SLAs (more repeat calls = more hours); the cheapest hourly rate is not necessarily the cheapest total cost."
    weight: 0.35
    description: "TotalCostAnalysis"
  - type: llm_judge
    criteria: "Best-of-breed recommendations cherry-pick the strongest terms from each vendor — recommends Vendor A's liability cap structure, Vendor B's one-way indemnification, Vendor C's SLA standards, and proposes using these as negotiation leverage with the preferred vendor; creates a 'dream contract' composite for negotiation."
    weight: 0.30
    description: "BestOfBreedRecommendations"
