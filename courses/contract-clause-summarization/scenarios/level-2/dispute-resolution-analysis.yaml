meta:
  id: dispute-resolution-analysis
  level: 2
  course: contract-clause-summarization
  type: output
  description: "Analyze dispute resolution clauses — compare arbitration vs. litigation provisions, evaluate forum selection, assess escalation procedures, and recommend optimal dispute mechanisms"
  tags: [dispute-resolution, arbitration, litigation, intermediate]

state: {}

trigger: |
  Compare the dispute resolution clauses from
  three different commercial contracts and advise
  the legal team on which approach best protects
  the company's interests.

  CONTRACT 1 — Enterprise Software License:
  "Any dispute arising out of or relating to this
  Agreement shall be finally resolved by binding
  arbitration administered by JAMS in San Francisco,
  California, under the JAMS Comprehensive
  Arbitration Rules. The arbitration shall be
  conducted by a single arbitrator with expertise
  in technology licensing. The arbitrator's decision
  shall be final and binding. Each party shall bear
  its own costs and attorneys' fees. The arbitration
  shall be confidential. Judgment on the award may
  be entered in any court of competent jurisdiction.
  Notwithstanding the foregoing, either party may
  seek injunctive relief in any court of competent
  jurisdiction to protect its intellectual property
  or confidential information."

  CONTRACT 2 — International Distribution Agreement:
  "The parties shall first attempt to resolve any
  dispute through good-faith negotiation for a
  period of thirty (30) days. If unresolved, the
  dispute shall be submitted to mediation under
  the ICC Mediation Rules. If mediation fails within
  sixty (60) days, the dispute shall be finally
  settled by ICC arbitration in London, England,
  by three arbitrators appointed in accordance with
  the ICC Rules. The language of arbitration shall
  be English. The governing law shall be the laws
  of England and Wales."

  CONTRACT 3 — Domestic Services Agreement:
  "Any dispute arising under this Agreement shall
  be resolved exclusively in the state or federal
  courts located in Delaware. Each party hereby
  consents to the personal jurisdiction of such
  courts and waives any objection to venue. THE
  PARTIES HEREBY WAIVE THEIR RIGHT TO A JURY TRIAL
  in any action arising under this Agreement.
  Prevailing party shall be entitled to recover
  reasonable attorneys' fees and costs."

  Create:
  1. Side-by-side comparison of all three approaches
  2. Cost analysis for each dispute resolution method
  3. Enforceability assessment across jurisdictions
  4. Strategic advantages and disadvantages
  5. Recommended clause for future contracts

assertions:
  - type: llm_judge
    criteria: "Cost-benefit analysis differentiates the three approaches — JAMS single arbitrator is faster and cheaper than ICC three-arbitrator panel; litigation in Delaware is potentially cheapest but unpredictable; the ICC tiered approach (negotiation → mediation → arbitration) is most thorough but slowest; the analysis includes estimated costs, timelines, and when each approach is most appropriate."
    weight: 0.35
    description: "CostBenefitAnalysis"
  - type: llm_judge
    criteria: "Enforceability across jurisdictions is assessed — arbitration awards are enforceable in 170+ countries under the New York Convention; court judgments require bilateral treaties or reciprocity; for international deals the ICC clause is strongest; the analysis explains why the Delaware litigation clause is unsuitable for international counterparties."
    weight: 0.35
    description: "EnforceabilityAssessment"
  - type: llm_judge
    criteria: "Strategic clause recommendation synthesizes the best elements — recommends a tiered approach (negotiation → mediation → arbitration) as best practice; addresses IP carve-outs for injunctive relief; considers confidentiality benefits of arbitration; recommends specific arbitral institutions and seat selection based on counterparty location; includes fee-shifting provisions."
    weight: 0.30
    description: "StrategicRecommendation"
