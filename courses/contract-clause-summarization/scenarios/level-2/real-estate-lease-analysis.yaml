meta:
  id: real-estate-lease-analysis
  level: 2
  course: contract-clause-summarization
  type: output
  description: "Analyze a commercial real estate lease — summarize key business terms, identify hidden costs, compare against market standards, and flag tenant-unfavorable provisions"
  tags: [real-estate-lease, commercial-lease, tenant-review, intermediate]

state: {}

trigger: |
  Analyze a commercial office lease for a growing
  tech company looking to sign a 7-year lease for
  its new headquarters.

  LEASE SUMMARY:

  PREMISES: 25,000 sq ft, Class A office, 12th floor
  TERM: 7 years (84 months), commencement Jan 1, 2027
  BASE RENT: $55/sq ft/year ($1,375,000/year),
  escalating 3% annually
  OPERATING EXPENSES: Triple net (NNN) — tenant pays
  pro-rata share of taxes, insurance, and CAM
  CURRENT ESTIMATED OPEX: $18/sq ft/year ($450,000/year)
  TENANT IMPROVEMENTS: $65/sq ft TI allowance ($1.625M)

  KEY CLAUSES:

  EXPANSION: Right of first refusal on adjacent
  15,000 sq ft, exercisable within 15 days of notice

  SUBLETTING: Permitted with landlord consent (not
  unreasonably withheld), but landlord entitled to
  50% of any sublease profit

  ASSIGNMENT: Requires landlord consent; landlord may
  recapture space in lieu of consenting

  OPERATING EXPENSE CAP: None — tenant absorbs all
  increases

  PERSONAL GUARANTEE: CEO must personally guarantee
  first 24 months of rent

  EARLY TERMINATION: None — no early termination right

  RENEWAL: Two 5-year renewal options at 95% of
  then-prevailing market rate

  PARKING: 3 spaces per 1,000 sq ft included, additional
  at $250/month each

  Create:
  1. Total occupancy cost analysis (7-year projection)
  2. Hidden cost identification
  3. Market comparison for key terms
  4. Risk assessment of unfavorable provisions
  5. Negotiation priority recommendations

assertions:
  - type: llm_judge
    criteria: "7-year cost projection is comprehensive — models base rent with 3% annual escalation, estimates operating expense increases (typically 3-5% annually), includes TI amortization, parking costs, and any other occupancy costs; shows total 7-year commitment exceeds $14M; a tech company needs to understand the full financial exposure."
    weight: 0.35
    description: "TotalCostProjection"
  - type: llm_judge
    criteria: "Hidden costs and unfavorable provisions are clearly flagged — no operating expense cap means unlimited exposure; personal guarantee creates CEO liability; 50% sublease profit sharing removes flexibility value; no early termination means 7-year lock-in; the recapture right on assignment means the landlord can take the space back instead of consenting to transfer."
    weight: 0.35
    description: "HiddenCostIdentification"
  - type: llm_judge
    criteria: "Negotiation recommendations prioritize the most impactful terms — operating expense cap (protect against unlimited increases), removal or reduction of personal guarantee (limit CEO exposure), early termination option (add flexibility for a growing tech company), and sublease profit sharing reduction (preserve flexibility value); each recommendation includes market justification."
    weight: 0.30
    description: "NegotiationPrioritization"
