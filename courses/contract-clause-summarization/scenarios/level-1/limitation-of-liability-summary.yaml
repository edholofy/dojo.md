meta:
  id: limitation-of-liability-summary
  level: 1
  course: contract-clause-summarization
  type: output
  description: "Summarize a limitation of liability clause — explain liability caps, consequential damages exclusions, and carve-outs in plain business language"
  tags: [limitation-of-liability, damages-cap, clause-summary, beginner]

state: {}

trigger: |
  Summarize the following limitation of liability
  clause from a cloud services agreement for a CFO
  who needs to understand the financial risk exposure.

  CLAUSE TEXT:
  "EXCEPT FOR A PARTY'S INDEMNIFICATION OBLIGATIONS,
  BREACH OF CONFIDENTIALITY OBLIGATIONS, OR WILLFUL
  MISCONDUCT: (A) IN NO EVENT SHALL EITHER PARTY BE
  LIABLE TO THE OTHER PARTY FOR ANY INDIRECT, SPECIAL,
  INCIDENTAL, CONSEQUENTIAL, EXEMPLARY, OR PUNITIVE
  DAMAGES, INCLUDING BUT NOT LIMITED TO LOSS OF
  PROFITS, LOSS OF DATA, LOSS OF BUSINESS, OR LOSS
  OF GOODWILL, REGARDLESS OF WHETHER SUCH DAMAGES
  WERE FORESEEABLE AND WHETHER OR NOT SUCH PARTY HAS
  BEEN ADVISED OF THE POSSIBILITY OF SUCH DAMAGES;
  AND (B) EACH PARTY'S AGGREGATE LIABILITY ARISING
  OUT OF OR RELATING TO THIS AGREEMENT SHALL NOT
  EXCEED THE TOTAL AMOUNTS PAID OR PAYABLE BY CLIENT
  TO PROVIDER UNDER THIS AGREEMENT DURING THE TWELVE
  (12) MONTH PERIOD IMMEDIATELY PRECEDING THE EVENT
  GIVING RISE TO THE CLAIM. THE FOREGOING LIMITATION
  SHALL APPLY NOTWITHSTANDING THE FAILURE OF ESSENTIAL
  PURPOSE OF ANY LIMITED REMEDY."

  Context:
  - Annual contract value: $240,000
  - Agreement term: 3 years
  - Client stores sensitive customer data on the platform
  - Client's potential data breach costs: $2-5M

  Create:
  1. Plain-language summary
  2. Financial risk analysis for the CFO
  3. What's excluded from the cap (carve-outs)
  4. Scenario analysis (what happens if things go wrong)
  5. Recommendations for negotiation

assertions:
  - type: llm_judge
    criteria: "Financial risk analysis clearly identifies the gap — with a $240K annual cap but $2-5M potential data breach exposure, the CFO needs to understand that 95%+ of potential losses would be unrecoverable from the provider; this gap analysis is the most important output for decision-making."
    weight: 0.35
    description: "FinancialRiskGapAnalysis"
  - type: llm_judge
    criteria: "Consequential damages exclusion is explained in real-world terms — 'loss of profits, loss of data, loss of business' aren't just legal categories; the summary explains that if the provider's system goes down for a week and the client loses $500K in revenue, the client likely can't recover those lost profits under this clause."
    weight: 0.35
    description: "ConsequentialDamagesExplanation"
  - type: llm_judge
    criteria: "Carve-outs are identified as the key negotiation leverage — indemnification, confidentiality breach, and willful misconduct are excluded from the cap; the summary explains that these carve-outs provide some protection for the most egregious scenarios but may not cover ordinary negligence that leads to data loss."
    weight: 0.30
    description: "CarveOutAnalysis"
