meta:
  id: indemnification-clause-summary
  level: 1
  course: contract-clause-summarization
  type: output
  description: "Summarize an indemnification clause — translate complex legal indemnity language into a plain-language summary explaining who protects whom, against what, and with what limitations"
  tags: [indemnification, plain-language, clause-summary, beginner]

state: {}

trigger: |
  Summarize the following indemnification clause from
  a software vendor agreement in plain language for
  a non-legal business stakeholder.

  CLAUSE TEXT:
  "Vendor shall indemnify, defend, and hold harmless
  Client, its officers, directors, employees, agents,
  successors, and assigns (collectively, 'Client
  Indemnitees') from and against any and all claims,
  demands, actions, suits, proceedings, losses,
  damages, liabilities, costs, and expenses
  (including reasonable attorneys' fees and court
  costs) arising out of or relating to: (a) any
  breach by Vendor of its representations, warranties,
  or obligations under this Agreement; (b) any
  infringement or misappropriation of any patent,
  copyright, trade secret, trademark, or other
  intellectual property right by the Services or
  Deliverables provided by Vendor; (c) any negligent
  or wrongful act or omission of Vendor or its
  personnel in connection with the performance of
  Services; provided, however, that Vendor's
  indemnification obligations shall not apply to the
  extent that any claim arises from (i) Client's
  modification of the Deliverables without Vendor's
  written consent, (ii) Client's use of the Services
  in combination with products or services not
  provided or approved by Vendor, or (iii) Client's
  use of the Services in violation of this Agreement."

  Create:
  1. Plain-language summary (2-3 paragraphs)
  2. "What this means for us" business impact section
  3. Key protection areas identified
  4. Notable exceptions/limitations highlighted
  5. Risk assessment (what's covered vs. what isn't)

assertions:
  - type: llm_judge
    criteria: "Plain-language summary accurately translates legal concepts — 'indemnify, defend, and hold harmless' is explained as the vendor's obligation to cover costs and legal defense; the three triggering conditions (breach, IP infringement, negligence) are clearly distinguished; a non-lawyer can understand the scope of protection."
    weight: 0.35
    description: "PlainLanguageAccuracy"
  - type: llm_judge
    criteria: "Exceptions are highlighted as business-relevant limitations — the three carve-outs (unauthorized modification, unapproved combination, agreement violation) are presented as practical limitations the business team needs to know about; explains that these exceptions mean the client could lose protection if they modify the software without permission."
    weight: 0.35
    description: "ExceptionHighlighting"
  - type: llm_judge
    criteria: "Business impact section connects the clause to practical decision-making — explains what this protection means in real scenarios (e.g., if the vendor's software infringes someone's patent, the vendor pays for the defense); identifies any gaps in protection that the business should be aware of."
    weight: 0.30
    description: "BusinessImpactClarity"
