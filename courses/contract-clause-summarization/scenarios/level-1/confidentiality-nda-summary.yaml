meta:
  id: confidentiality-nda-summary
  level: 1
  course: contract-clause-summarization
  type: output
  description: "Summarize a confidentiality/NDA clause — explain what information is protected, how it must be handled, the duration of obligations, and permitted disclosures"
  tags: [confidentiality, nda, information-protection, beginner]

state: {}

trigger: |
  Summarize the following mutual NDA for a startup
  founder who is about to share proprietary technology
  details with a potential strategic partner.

  CLAUSE TEXT (key provisions):

  "1. DEFINITION: 'Confidential Information' means any
  non-public information disclosed by either Party
  ('Disclosing Party') to the other Party ('Receiving
  Party'), whether orally, in writing, electronically,
  or by inspection, that is designated as confidential
  or that reasonably should be understood to be
  confidential given the nature of the information and
  the circumstances of disclosure. Confidential
  Information includes, but is not limited to, trade
  secrets, business plans, financial data, customer
  lists, technical specifications, source code,
  algorithms, and product roadmaps.

  2. EXCLUSIONS: Confidential Information does not
  include information that: (a) is or becomes publicly
  available through no fault of the Receiving Party;
  (b) was already known to the Receiving Party prior
  to disclosure; (c) is independently developed by
  the Receiving Party without use of Confidential
  Information; (d) is lawfully received from a third
  party without restriction.

  3. OBLIGATIONS: The Receiving Party shall (a) use
  Confidential Information solely for the Purpose;
  (b) restrict disclosure to employees and advisors
  with a need to know; (c) protect Confidential
  Information using at least the same degree of care
  as it uses for its own confidential information,
  but no less than reasonable care.

  4. TERM: This Agreement shall remain in effect for
  two (2) years from the Effective Date. The
  obligations of confidentiality shall survive
  termination for a period of three (3) years, except
  with respect to trade secrets, which shall be
  protected for so long as they remain trade secrets."

  Create:
  1. Plain-language summary of each section
  2. What is protected and what isn't
  3. Practical obligations checklist
  4. Risk areas for the startup founder
  5. Questions to ask before signing

assertions:
  - type: llm_judge
    criteria: "Summary clearly explains the mutual nature — both parties are protected, not just one; the founder needs to understand that they also have obligations when receiving the partner's confidential information; the summary distinguishes between the founder's protections (what happens to their tech details) and obligations (how they handle the partner's information)."
    weight: 0.35
    description: "MutualNatureExplanation"
  - type: llm_judge
    criteria: "Practical obligations checklist translates legal requirements into actionable steps — 'use solely for the Purpose' means don't share with other teams; 'restrict disclosure to need-to-know' means identify who at the company can see the information; 'reasonable care' means at minimum password-protect documents and limit access."
    weight: 0.35
    description: "PracticalObligationsChecklist"
  - type: llm_judge
    criteria: "Risk areas for the startup founder are specific — identifies that 'independently developed' is the most common dispute area; warns that the 3-year survival period means obligations continue after the partnership ends; highlights that oral disclosures should be documented in writing to be covered; these are founder-relevant, not generic legal concerns."
    weight: 0.30
    description: "FounderSpecificRisks"
