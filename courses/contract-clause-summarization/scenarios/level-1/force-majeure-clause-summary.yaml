meta:
  id: force-majeure-clause-summary
  level: 1
  course: contract-clause-summarization
  type: output
  description: "Summarize a force majeure clause — explain what events excuse performance, notification requirements, duration limits, and what happens if the force majeure event persists"
  tags: [force-majeure, performance-excuse, clause-summary, beginner]

state: {}

trigger: |
  Summarize the following force majeure clause from
  a supply chain agreement for a procurement manager
  concerned about supply disruptions.

  CLAUSE TEXT:
  "Neither Party shall be liable for any failure or
  delay in performing its obligations under this
  Agreement to the extent such failure or delay results
  from a Force Majeure Event. 'Force Majeure Event'
  means any event beyond the reasonable control of the
  affected Party, including but not limited to:
  acts of God, flood, fire, earthquake, epidemic,
  pandemic, war, terrorism, civil unrest, government
  sanctions or embargoes, labor strikes (excluding
  strikes of the affected Party's own employees),
  supply chain disruptions caused by the foregoing
  events, and cyberattacks that are not reasonably
  preventable.

  The affected Party shall: (a) provide written notice
  to the other Party within five (5) business days of
  the occurrence of a Force Majeure Event, describing
  the event, its expected duration, and the obligations
  affected; (b) use commercially reasonable efforts
  to mitigate the effects of the Force Majeure Event
  and resume performance; (c) provide periodic updates
  not less than every fourteen (14) days.

  If a Force Majeure Event continues for more than
  ninety (90) consecutive days, either Party may
  terminate this Agreement upon thirty (30) days'
  written notice without liability. Force Majeure
  shall not excuse any obligation to make payments
  for goods or services already delivered."

  Create:
  1. Plain-language summary
  2. Covered vs. not covered events analysis
  3. Notification requirements checklist
  4. Supply chain risk implications
  5. Pandemic/epidemic relevance assessment

assertions:
  - type: llm_judge
    criteria: "Covered vs. not covered events are clearly distinguished — pandemics are covered (relevant post-COVID), but strikes by the supplier's own employees are NOT (important distinction); cyberattacks are covered only if 'not reasonably preventable' (introduces a standard of care); the procurement manager understands exactly which disruptions trigger protection."
    weight: 0.35
    description: "CoveredEventsDistinction"
  - type: llm_judge
    criteria: "Supply chain risk implications are practical — explains that even with force majeure protection, the procurement manager still needs contingency plans because 90 days of non-delivery could be devastating regardless of legal excuses; the mitigation obligation means the supplier can't just stop trying; payment obligations for delivered goods survive."
    weight: 0.35
    description: "SupplyChainRiskAnalysis"
  - type: llm_judge
    criteria: "Notification requirements are presented as actionable steps — the 5 business day notice, 14-day updates, and 90-day termination trigger are converted into a practical response protocol the procurement manager can follow; includes what should be in the notice (event description, expected duration, affected obligations)."
    weight: 0.30
    description: "NotificationActionPlan"
