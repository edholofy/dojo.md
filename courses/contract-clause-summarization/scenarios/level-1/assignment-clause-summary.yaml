meta:
  id: assignment-clause-summary
  level: 1
  course: contract-clause-summarization
  type: output
  description: "Summarize an assignment and change of control clause — explain when and how contract rights can be transferred, consent requirements, and implications for mergers and acquisitions"
  tags: [assignment, change-of-control, transfer-rights, beginner]

state: {}

trigger: |
  Summarize the following assignment clause from a
  key vendor agreement for a business development
  director evaluating the impact of the vendor's
  potential acquisition.

  CLAUSE TEXT:
  "12.1 Assignment. Neither Party may assign, transfer,
  or delegate this Agreement or any rights or
  obligations hereunder without the prior written
  consent of the other Party, which consent shall not
  be unreasonably withheld, conditioned, or delayed;
  provided, however, that either Party may assign this
  Agreement without consent in connection with a
  merger, acquisition, corporate reorganization, or
  sale of all or substantially all of its assets,
  provided that the assignee agrees in writing to be
  bound by the terms of this Agreement.

  12.2 Change of Control. Notwithstanding Section 12.1,
  in the event of a Change of Control of Provider,
  Client shall have the right to terminate this
  Agreement upon sixty (60) days' written notice
  without penalty, exercisable within ninety (90) days
  of Client's receipt of notice of the Change of
  Control. 'Change of Control' means a transaction or
  series of transactions resulting in a change in
  more than fifty percent (50%) of the voting equity
  of Provider.

  12.3 Any purported assignment in violation of this
  Section shall be null and void."

  Create:
  1. Plain-language summary
  2. M&A scenario analysis (what happens if vendor
     is acquired)
  3. Client's rights and options explained
  4. Timeline for exercising termination right
  5. Strategic implications for the business

assertions:
  - type: llm_judge
    criteria: "M&A scenario analysis is practical — walks through the specific scenario of the vendor being acquired: the vendor CAN assign without consent, BUT the client gets a 60-day termination right within 90 days of being notified; the business development director understands the timeline and decision points."
    weight: 0.35
    description: "MandAScenarioClarity"
  - type: llm_judge
    criteria: "Strategic implications identify both the protection and the gap — the termination right protects against unwanted acquirer relationships, but there's no guarantee of contract terms with the new owner; if the client doesn't exercise the termination right within 90 days, they're stuck with the new owner; the time pressure is a significant strategic consideration."
    weight: 0.35
    description: "StrategicImplications"
  - type: llm_judge
    criteria: "Summary distinguishes between assignment (12.1) and change of control (12.2) — these are different concepts; assignment transfers the contract itself, change of control changes who owns the company holding the contract; the client has different rights in each scenario; the business development director needs to understand both."
    weight: 0.30
    description: "AssignmentVsChangeOfControl"
