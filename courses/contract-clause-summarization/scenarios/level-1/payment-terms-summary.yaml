meta:
  id: payment-terms-summary
  level: 1
  course: contract-clause-summarization
  type: output
  description: "Summarize payment and pricing clauses — explain pricing structure, payment terms, late fees, price escalation provisions, and audit rights"
  tags: [payment-terms, pricing, financial-terms, beginner]

state: {}

trigger: |
  Summarize the following payment and pricing clauses
  from a multi-year outsourcing agreement for a
  finance controller who manages vendor payments.

  CLAUSE TEXT:
  "4.1 Fees. Client shall pay Provider the fees set
  forth in Exhibit A ('Fee Schedule') in accordance
  with the payment terms specified herein. Fees are
  based on a monthly minimum of 10,000 transactions.
  Transactions exceeding the monthly minimum shall be
  billed at the per-transaction rate specified in
  Exhibit A.

  4.2 Price Escalation. Provider may increase fees
  annually by the lesser of (a) three percent (3%) or
  (b) the percentage increase in the Consumer Price
  Index for All Urban Consumers (CPI-U) published by
  the Bureau of Labor Statistics for the twelve-month
  period ending September 30 of the preceding year.
  Provider shall provide at least sixty (60) days'
  written notice of any fee increase.

  4.3 Payment Terms. All invoices are due net thirty
  (30) days from the date of invoice. Late payments
  shall accrue interest at the rate of one and one-half
  percent (1.5%) per month or the maximum rate permitted
  by law, whichever is less.

  4.4 Disputed Invoices. Client may dispute any invoice
  in good faith by providing written notice of the
  dispute within fifteen (15) days of receipt. Client
  shall pay the undisputed portion of any invoice by
  the due date. The Parties shall use good faith
  efforts to resolve disputed amounts within thirty
  (30) days.

  4.5 Audit Rights. Client shall have the right, upon
  thirty (30) days' written notice, to audit Provider's
  records related to fees and charges no more than once
  per calendar year. If an audit reveals overcharges
  exceeding five percent (5%), Provider shall bear the
  cost of the audit."

  Create:
  1. Plain-language summary of pricing structure
  2. Annual cost projection (3-year model)
  3. Payment process checklist for accounts payable
  4. Dispute resolution procedure summary
  5. Key financial protections and risks

assertions:
  - type: llm_judge
    criteria: "3-year cost projection accounts for the price escalation — models the worst case (3% annual increase) and likely case (CPI-based, currently ~2-3%) to project Year 1, 2, and 3 costs; includes the impact of transaction volume variability above the 10,000 minimum; gives the finance controller a realistic budget planning tool."
    weight: 0.35
    description: "CostProjectionAccuracy"
  - type: llm_judge
    criteria: "Dispute procedure is presented as a practical workflow — the 15-day dispute window is tight; the summary creates a step-by-step process: receive invoice → review within 10 days → if discrepancy found, submit written dispute by day 15 → pay undisputed amount by day 30; missing the 15-day window likely means accepting the charge."
    weight: 0.35
    description: "DisputeWorkflowClarity"
  - type: llm_judge
    criteria: "Late payment risk is quantified — 1.5% per month equals 18% annually, which is a significant penalty; the summary calculates the cost of late payment on a typical invoice amount; this motivates the finance controller to ensure payments are processed on time."
    weight: 0.30
    description: "LatePaymentQuantification"
