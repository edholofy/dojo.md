meta:
  id: termination-clause-summary
  level: 1
  course: contract-clause-summarization
  type: output
  description: "Summarize a termination clause — explain how and when either party can end the agreement, notice requirements, cure periods, and post-termination obligations"
  tags: [termination, exit-provisions, clause-summary, beginner]

state: {}

trigger: |
  Summarize the following termination clause from a
  managed IT services agreement for an operations
  manager who needs to understand the exit options.

  CLAUSE TEXT:
  "7.1 Term. This Agreement shall commence on the
  Effective Date and continue for an initial term of
  thirty-six (36) months ('Initial Term'). Thereafter,
  this Agreement shall automatically renew for
  successive twelve (12) month periods ('Renewal
  Terms'), unless either Party provides written notice
  of non-renewal at least ninety (90) days prior to
  the end of the then-current term.

  7.2 Termination for Cause. Either Party may terminate
  this Agreement upon thirty (30) days' written notice
  if the other Party materially breaches this Agreement
  and fails to cure such breach within the thirty (30)
  day notice period.

  7.3 Termination for Convenience. Client may terminate
  this Agreement for convenience upon one hundred
  twenty (120) days' written notice, subject to
  payment of an early termination fee equal to fifty
  percent (50%) of the remaining fees due for the
  balance of the then-current term.

  7.4 Termination for Insolvency. Either Party may
  terminate this Agreement immediately upon written
  notice if the other Party becomes insolvent, files
  for bankruptcy, or has a receiver appointed.

  7.5 Effect of Termination. Upon termination, Provider
  shall (a) return or destroy all Client data within
  thirty (30) days; (b) provide reasonable transition
  assistance for a period of up to ninety (90) days
  at Provider's then-current rates; (c) all accrued
  payment obligations shall survive termination."

  Create:
  1. Plain-language summary of each termination option
  2. Timeline visual (key dates and deadlines)
  3. Cost analysis of early termination scenarios
  4. Data and transition provisions summary
  5. Calendar reminder recommendations

assertions:
  - type: llm_judge
    criteria: "Each termination option is explained with practical implications — the 3-year initial term with auto-renewal means the client is locked in unless they act 90 days before the end date; the convenience termination fee is quantified with an example calculation; the operations manager can determine the actual cost of exiting at any given point."
    weight: 0.35
    description: "TerminationOptionClarity"
  - type: llm_judge
    criteria: "Auto-renewal trap is highlighted prominently — the 90-day notice requirement for non-renewal is a common gotcha that operations managers miss; the summary recommends setting calendar reminders well before the deadline; explains that missing the window means another 12-month commitment."
    weight: 0.35
    description: "AutoRenewalWarning"
  - type: llm_judge
    criteria: "Data return and transition provisions are treated as critical — the 30-day data return window and 90-day transition assistance period are practical considerations the operations manager needs for planning; the fact that transition assistance is at 'then-current rates' (not included) is flagged as a potential cost."
    weight: 0.30
    description: "TransitionProvisionAnalysis"
