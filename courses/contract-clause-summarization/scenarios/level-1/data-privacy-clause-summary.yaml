meta:
  id: data-privacy-clause-summary
  level: 1
  course: contract-clause-summarization
  type: output
  description: "Summarize a data privacy and protection clause — explain data processing obligations, security requirements, breach notification, and regulatory compliance commitments"
  tags: [data-privacy, gdpr, security-requirements, beginner]

state: {}

trigger: |
  Summarize the following data privacy clause from
  a HR software vendor agreement for an HR director
  who needs to understand employee data protections.

  CLAUSE TEXT:
  "8.1 Data Processing. Provider shall process Client's
  Personal Data solely for the purpose of providing
  the Services and in accordance with Client's
  documented instructions. Provider shall not process
  Personal Data for any other purpose, including
  Provider's own marketing or product improvement
  purposes, unless required by applicable law.

  8.2 Security. Provider shall implement and maintain
  appropriate technical and organizational measures
  to protect Personal Data against unauthorized access,
  loss, alteration, or destruction, including but not
  limited to: encryption at rest and in transit
  (AES-256), access controls, regular security audits,
  and employee security training.

  8.3 Sub-processors. Provider may engage sub-processors
  to assist with the processing of Personal Data,
  provided that Provider (a) provides Client with prior
  written notice of any new sub-processor at least
  thirty (30) days before the sub-processor begins
  processing; (b) enters into a written agreement with
  each sub-processor imposing data protection obligations
  no less protective than those in this Agreement; and
  (c) remains liable for the acts and omissions of
  its sub-processors.

  8.4 Data Breach Notification. Provider shall notify
  Client of any confirmed data breach involving Personal
  Data within forty-eight (48) hours of becoming aware
  of the breach. Such notification shall include the
  nature of the breach, categories and approximate
  number of individuals affected, and measures taken
  or proposed to address the breach.

  8.5 Data Retention and Deletion. Upon termination of
  this Agreement, Provider shall, at Client's election,
  return or securely delete all Personal Data within
  thirty (30) days and provide written certification
  of deletion."

  Create:
  1. Plain-language summary of each provision
  2. Employee data protection assurance summary
  3. Sub-processor risk analysis
  4. Breach response protocol for HR
  5. Compliance checklist (GDPR/CCPA alignment)

assertions:
  - type: llm_judge
    criteria: "Employee data protection summary reassures the HR director — clearly explains that employee personal data can ONLY be used to provide HR services; the vendor cannot use it for marketing or product development; employees' data is encrypted; the HR director can confidently tell employees their data is protected."
    weight: 0.35
    description: "EmployeeDataAssurance"
  - type: llm_judge
    criteria: "Sub-processor risk is explained practically — the vendor can share employee data with sub-processors (third parties), which means employee data could be in multiple places; the 30-day notice gives the HR director time to evaluate new sub-processors; the vendor remains liable, which provides a single point of accountability."
    weight: 0.35
    description: "SubProcessorRiskExplanation"
  - type: llm_judge
    criteria: "Breach response protocol translates the 48-hour notification into an HR action plan — the HR director needs to know what THEY should do when notified of a breach (notify affected employees, contact legal, assess regulatory reporting obligations); the clause only covers the vendor's notification obligation, not the client's response."
    weight: 0.30
    description: "BreachResponseProtocol"
