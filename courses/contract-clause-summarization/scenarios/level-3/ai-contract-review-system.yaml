meta:
  id: ai-contract-review-system
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Design an AI-powered contract review system — define clause extraction taxonomy, build risk scoring algorithms, create automated review workflows, and establish human-in-the-loop quality controls"
  tags: [ai-contract-review, automation, clause-extraction, advanced]

state: {}

trigger: |
  Design an AI-powered contract review system for
  a legal department that processes 200+ contracts
  per month. The system should automate first-pass
  review and flag high-risk clauses for attorney
  review.

  CURRENT STATE:
  - 3 paralegals spend 80% of time on initial review
  - Average review time: 4 hours per contract
  - Error rate: 15% of risky clauses missed
  - Contract types: NDAs, MSAs, SOWs, amendments,
    vendor agreements, license agreements

  REQUIREMENTS:
  - Clause extraction with 95%+ accuracy
  - Risk scoring on a 1-10 scale per clause
  - Comparison against company playbook standards
  - Deviation flagging with plain-language explanation
  - Attorney dashboard for review queue management
  - Integration with existing CLM (Ironclad)

  CLAUSE TAXONOMY (must support):
  - Indemnification (mutual, one-way, scope)
  - Liability (cap type, amount, carve-outs)
  - Termination (convenience, cause, notice periods)
  - IP (assignment, license, work-for-hire)
  - Confidentiality (scope, duration, exceptions)
  - Data privacy (GDPR, CCPA, breach notification)
  - Payment (terms, late fees, dispute resolution)
  - Warranties (scope, disclaimers, remedies)
  - Force majeure (trigger events, notice, mitigation)
  - Governing law and dispute resolution

  COMPANY PLAYBOOK STANDARDS (examples):
  - Liability cap minimum: Greater of $2M or 2x fees
  - Indemnification: Must be mutual
  - Termination: Must include 30-day convenience right
  - Breach notification: Maximum 48 hours
  - Data location: US or EU only

  Create:
  1. System architecture and data flow design
  2. Clause extraction taxonomy with risk weights
  3. Risk scoring algorithm specification
  4. Human-in-the-loop workflow design
  5. ROI analysis and implementation roadmap

assertions:
  - type: llm_judge
    criteria: "Clause extraction taxonomy is comprehensive and hierarchical — defines parent categories and sub-categories (e.g., Indemnification → mutual/one-way/IP-specific/data breach-specific); each clause type has extraction rules, acceptable ranges, and deviation thresholds; the taxonomy supports the 10 required clause categories with enough granularity for accurate risk scoring."
    weight: 0.35
    description: "ClauseExtractionTaxonomy"
  - type: llm_judge
    criteria: "Risk scoring algorithm accounts for clause interactions — a low liability cap is more dangerous when combined with broad indemnification; missing breach notification is more critical when the vendor handles sensitive data; the algorithm considers clause combinations and contract context, not just individual clause scores; includes weighted scoring methodology."
    weight: 0.35
    description: "RiskScoringAlgorithm"
  - type: llm_judge
    criteria: "ROI analysis is compelling — quantifies time savings (200 contracts × 4 hours × 80% automation = significant paralegal time freed); error reduction from 15% to target rate; faster contract cycle time; reduced legal risk from missed clauses; includes implementation costs, training requirements, and expected payback period."
    weight: 0.30
    description: "ROIAnalysis"
