meta:
  id: contract-risk-scoring-framework
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Build a contract risk scoring framework — create weighted risk models, define risk thresholds, establish escalation criteria, and design dashboards for contract portfolio management"
  tags: [risk-scoring, framework, portfolio-management, advanced]

state: {}

trigger: |
  Design a comprehensive contract risk scoring
  framework for a Fortune 500 company that manages
  3,000+ active vendor contracts across 12 business
  units. The General Counsel wants a standardized
  way to assess and monitor contract risk.

  BUSINESS CONTEXT:
  - Annual vendor spend: $2.8B
  - Contract types: SaaS, professional services,
    manufacturing, logistics, facilities, IP licenses
  - Industries: Technology, healthcare, financial
    services, government
  - Current state: Each business unit uses different
    review criteria with no centralized risk view

  RISK DIMENSIONS TO SCORE:
  1. Financial exposure (liability caps, penalties,
     price escalators, payment terms)
  2. Operational risk (SLAs, business continuity,
     dependency level, concentration risk)
  3. Legal/regulatory risk (compliance clauses,
     governing law, dispute resolution, regulatory
     changes)
  4. Data/security risk (data handling, breach
     notification, security standards, access rights)
  5. Strategic risk (lock-in, exit difficulty,
     competitive restrictions, IP ownership)

  SCORING REQUIREMENTS:
  - 1-100 composite score per contract
  - Red/amber/green classification
  - Weighted by contract value and business criticality
  - Comparable across business units and contract types
  - Auditable methodology with clear scoring rationale
  - Dynamic scoring that updates as conditions change

  Create:
  1. Risk scoring methodology and weights
  2. Scoring rubric for each dimension
  3. Composite score calculation with examples
  4. Dashboard design specifications
  5. Governance model for framework maintenance

assertions:
  - type: llm_judge
    criteria: "Scoring methodology handles heterogeneous contract types — a SaaS contract and a manufacturing contract have fundamentally different risk profiles; the framework uses dimension weights that adjust based on contract type, industry, and business criticality; includes a calibration process to ensure scores are comparable across business units; avoids false equivalences between different contract types."
    weight: 0.35
    description: "HeterogeneousContractScoring"
  - type: llm_judge
    criteria: "Dashboard design enables executive decision-making — includes portfolio-level heat maps, trend analysis over time, concentration risk visualization, top-10 highest-risk contracts, and drill-down capability to individual clause-level risks; the dashboard serves different audiences (GC, business unit leaders, contract managers) with appropriate views for each."
    weight: 0.35
    description: "DashboardDesign"
  - type: llm_judge
    criteria: "Governance model ensures framework sustainability — defines who owns the framework, how often scoring criteria are reviewed, how new contract types are added, how scoring disputes are resolved, and how the framework adapts to regulatory changes; includes training requirements for contract managers and quality assurance processes for score accuracy."
    weight: 0.30
    description: "GovernanceModel"
