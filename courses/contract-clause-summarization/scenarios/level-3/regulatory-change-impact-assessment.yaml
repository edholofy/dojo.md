meta:
  id: regulatory-change-impact-assessment
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Assess regulatory change impact on existing contracts — analyze how new privacy regulations, trade laws, or industry standards require contract modifications across the portfolio"
  tags: [regulatory-change, impact-assessment, contract-amendment, advanced]

state: {}

trigger: |
  A new federal data privacy law (similar to a
  comprehensive US federal privacy law) has been
  enacted with an 18-month compliance deadline.
  Assess the impact on the company's existing
  contract portfolio and develop a remediation plan.

  NEW LAW KEY REQUIREMENTS:
  - Affirmative consent required for data collection
  - Data minimization — collect only necessary data
  - Right to delete within 30 days of request
  - Data portability in machine-readable format
  - Mandatory 48-hour breach notification to regulators
  - Data processing agreements required with all vendors
  - Annual privacy impact assessments
  - $50,000 per violation penalty (no cap)
  - Private right of action for data breaches
  - Controller-processor distinction with specific
    processor obligations

  EXISTING CONTRACT PORTFOLIO AFFECTED:
  - 180 vendor/processor agreements
  - 45 customer agreements (company as processor)
  - 30 data sharing/partnership agreements
  - 15 advertising/marketing technology agreements
  - 10 international data transfer agreements

  CURRENT CONTRACTUAL GAPS (sample):
  - 60% of vendor agreements lack data processing terms
  - 40% have breach notification >72 hours or undefined
  - 75% have no data deletion obligations
  - 90% lack data portability provisions
  - 50% have liability caps that don't contemplate
    per-violation penalties

  Create:
  1. Impact assessment by contract category
  2. Clause-by-clause gap analysis against new law
  3. Prioritized remediation plan with templates
  4. Liability exposure quantification
  5. Compliance timeline and resource requirements

assertions:
  - type: llm_judge
    criteria: "Liability exposure is quantified with realistic scenarios — $50,000 per violation with no cap means a data breach affecting 100,000 records could result in $5B in penalties; existing liability caps in vendor agreements may not cover this exposure; the analysis models exposure scenarios and shows how current contractual protections are inadequate against the new penalty structure."
    weight: 0.35
    description: "LiabilityExposureQuantification"
  - type: llm_judge
    criteria: "Contract category prioritization reflects risk differentiation — advertising/martech agreements are highest priority (most data collection, least privacy protections); customer agreements where company is processor create direct compliance obligations; vendor agreements need DPA addendums; the analysis prioritizes categories by exposure level and compliance gap severity."
    weight: 0.35
    description: "ContractCategoryPrioritization"
  - type: llm_judge
    criteria: "Remediation plan is realistic for 18-month timeline — phases the work by priority and complexity; accounts for negotiation cycles (vendors may resist new terms); includes template DPA language; addresses the 280 total contracts requiring modification; estimates legal resource requirements and identifies where outside counsel may be needed; builds in contingency for difficult negotiations."
    weight: 0.30
    description: "RemediationTimelineRealism"
