meta:
  id: advanced-clause-shift
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Handle an advanced contract analysis shift — manage competing priorities from multiple stakeholders, perform rapid risk assessments, and deliver actionable recommendations under time pressure"
  tags: [shift-simulation, multi-stakeholder, advanced-triage, advanced]

state: {}

trigger: |
  You are a senior contract analyst during a
  critical week. The company just announced a
  major acquisition, and multiple urgent contract
  issues have surfaced simultaneously.

  CONTEXT: Your company (a $500M revenue enterprise
  software company) is acquiring a competitor for
  $200M. The deal is expected to close in 45 days.

  URGENT REQUEST 1 (From: CEO):
  "Our target's largest customer (22% of their
  revenue) has a change-of-control clause that
  allows them to terminate within 60 days of
  closing with no penalty. If they leave, the
  deal economics don't work. I need an analysis
  of our options — can we close the deal and
  retain this customer? What contractual
  protections can we build into the acquisition
  agreement?"

  URGENT REQUEST 2 (From: CFO):
  "I just discovered that 8 of the target's vendor
  contracts have uncapped liability provisions.
  Combined with the target's data processing
  activities, this could represent tens of millions
  in contingent liability. I need this quantified
  for the purchase price adjustment before the
  board meeting on Friday."

  URGENT REQUEST 3 (From: CISO):
  "The target's security vendor contracts are
  inadequate. Their primary SOC monitoring vendor
  has a $50K liability cap, 'best efforts' SLA,
  and no breach notification timeline. Given that
  we're inheriting their security posture, I need
  a risk assessment and remediation plan before
  integration begins."

  URGENT REQUEST 4 (From: General Counsel):
  "Three of the target's key engineers have non-
  compete agreements with their former employer
  (a company we also compete with). The non-
  competes have 18 months remaining. If these
  agreements are enforceable, we may not be able
  to have these engineers work on competing
  products. Assess enforceability and recommend
  a path forward."

  Create:
  1. Prioritized response plan for all four requests
  2. Detailed analysis for each stakeholder request
  3. Interconnected risk assessment (how issues compound)
  4. Deal-level recommendations
  5. Escalation items that could delay or restructure the deal

assertions:
  - type: llm_judge
    criteria: "Interconnected risk analysis shows how the four issues compound — the 22% customer churn risk affects deal valuation; uncapped vendor liability is contingent exposure that should reduce purchase price; inadequate security posture increases breach probability which triggers the uncapped liability; non-compete issues could prevent key engineers from working on the acquired product, reducing its value; the analysis shows these aren't four separate problems but one interconnected deal risk."
    weight: 0.35
    description: "InterconnectedRiskAnalysis"
  - type: llm_judge
    criteria: "CEO request receives a practical retention strategy — analyzes the change-of-control clause for potential exceptions or conditions; recommends pre-closing outreach to the customer with incentives (price lock, enhanced SLA, executive sponsorship); suggests purchase agreement protections (earnout tied to customer retention, escrow for customer churn, rep and warranty about customer relationship status); evaluates whether the deal should be restructured as an asset purchase to avoid triggering the clause."
    weight: 0.35
    description: "CustomerRetentionStrategy"
  - type: llm_judge
    criteria: "CFO request quantifies contingent liability for purchase price adjustment — maps the 8 uncapped liability contracts to their data processing activities; estimates worst-case exposure using industry breach cost data; recommends specific purchase price reduction or escrow amount; provides defensible methodology for the board presentation; suggests representations and warranties that the seller should provide regarding these contracts."
    weight: 0.30
    description: "ContingentLiabilityQuantification"
