meta:
  id: ma-contract-integration
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Manage post-M&A contract integration — assess acquired company's contracts, identify conflicts with acquirer's standards, plan assignment/novation, and harmonize contract portfolios"
  tags: [ma-integration, contract-harmonization, post-merger, advanced]

state: {}

trigger: |
  Following the acquisition of a 200-person
  cybersecurity startup, you must integrate the
  acquired company's contract portfolio into the
  parent company's standards. The deal closed
  30 days ago.

  ACQUIRED COMPANY CONTRACT PORTFOLIO:
  - 85 customer contracts (ARR: $18M)
  - 40 vendor/supplier agreements
  - 25 employment agreements with non-competes
  - 12 IP license agreements
  - 5 partnership/channel agreements
  - 3 government contracts (ITAR-controlled)

  KEY INTEGRATION CHALLENGES:

  CUSTOMER CONTRACTS:
  - 60% have anti-assignment clauses requiring
    customer consent for change of control
  - 30% have "most favored customer" pricing clauses
  - 15% have exclusivity provisions conflicting
    with parent company's existing products
  - Average remaining term: 2.3 years

  VENDOR AGREEMENTS:
  - Parent company has existing relationships with
    12 of the same vendors (different terms)
  - 8 vendor contracts have change-of-control
    termination rights
  - AWS commitment: $2M/year (parent has $15M
    Google Cloud commitment)

  EMPLOYMENT:
  - Non-compete scope conflicts with parent company's
    business lines
  - 5 key employees have change-of-control acceleration
    provisions worth $3.2M total
  - IP assignment clauses vary across employees

  GOVERNMENT CONTRACTS:
  - ITAR compliance requires novation approval from
    contracting officer
  - Facility security clearance transfer needed
  - 6-12 month novation timeline expected

  Create:
  1. Contract integration risk assessment matrix
  2. Anti-assignment clause analysis and strategy
  3. Vendor consolidation opportunity analysis
  4. Employee agreement harmonization plan
  5. Government contract novation timeline

assertions:
  - type: llm_judge
    criteria: "Anti-assignment analysis distinguishes between direct assignment and change-of-control triggers — many anti-assignment clauses are triggered by direct assignment but not by change of control (stock purchase); the analysis identifies which of the 60% actually require consent based on deal structure; recommends proactive customer communication strategy to prevent churn during transition."
    weight: 0.35
    description: "AntiAssignmentAnalysis"
  - type: llm_judge
    criteria: "Vendor consolidation identifies both savings and risks — 12 overlapping vendor relationships present consolidation opportunities but also risks (different SLAs, migration costs, dependency on specific vendor capabilities); the AWS vs. Google Cloud conflict requires careful analysis of migration costs vs. commitment obligations; quantifies potential savings from consolidated negotiations."
    weight: 0.35
    description: "VendorConsolidationAnalysis"
  - type: llm_judge
    criteria: "Government contract novation process is accurately described — ITAR-controlled contracts require specific novation procedures including DDTC notification, facility security clearance transfer, and contracting officer approval; the 6-12 month timeline is acknowledged; the analysis identifies interim operating arrangements to maintain contract performance during novation; addresses the risk of contract termination if novation is denied."
    weight: 0.30
    description: "GovernmentNovationProcess"
