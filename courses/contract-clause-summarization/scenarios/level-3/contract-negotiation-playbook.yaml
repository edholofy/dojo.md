meta:
  id: contract-negotiation-playbook
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Create a contract negotiation playbook — define fallback positions for key clauses, establish acceptable ranges, document trade-off strategies, and build redline guidelines for the legal team"
  tags: [negotiation-playbook, redlining, fallback-positions, advanced]

state: {}

trigger: |
  Create a comprehensive contract negotiation
  playbook for a B2B SaaS company's sales team
  and legal department. The company sells enterprise
  security software with 95% of revenue from
  subscriptions.

  COMPANY CONTEXT:
  - ARR: $120M, growing 40% YoY
  - Average deal size: $250K ARR
  - Enterprise customers: 300+
  - Largest customer: 8% of revenue
  - SOC 2 Type II and ISO 27001 certified
  - Data centers: US (primary), EU (secondary)
  - 15 pending enterprise deals totaling $8M ARR

  CURRENT PAIN POINTS:
  - Legal team redlines 80% of customer contracts
  - Average negotiation cycle: 6 weeks
  - Sales team makes unauthorized concessions
  - No consistency in accepted terms across deals
  - 3 contracts with unlimited liability exposure
  - Customer legal teams frequently propose:
    * Unlimited liability
    * Broad indemnification
    * Custom SLAs with financial penalties
    * Onerous data processing requirements
    * Audit rights with no limitations
    * IP assignment for customizations
    * Source code escrow with liberal release triggers

  Create:
  1. Clause-by-clause playbook with ideal/acceptable/
     walk-away positions
  2. Trade-off matrix (what to concede vs. protect)
  3. Escalation framework for sales team
  4. Pre-approved concession authority levels
  5. Clause language library with approved alternatives

assertions:
  - type: llm_judge
    criteria: "Three-tier position framework is practical and specific — for each key clause, defines: (1) ideal/preferred position with exact language, (2) acceptable fallback with conditions, (3) walk-away threshold requiring VP/GC approval; for example, liability should show ideal (12-month cap), acceptable (24-month cap with cyber carve-outs), walk-away (anything exceeding 3x fees or unlimited); covers all 7 common customer requests."
    weight: 0.35
    description: "ThreeTierPositionFramework"
  - type: llm_judge
    criteria: "Trade-off matrix identifies strategic concession combinations — some concessions are low-cost to give but high-value to the customer (e.g., extended warranty on existing SLA); others are high-risk to give (unlimited liability, IP assignment); the matrix maps concession value to customer against cost/risk to company; identifies package deals where multiple small concessions can replace one large concession."
    weight: 0.35
    description: "TradeOffMatrix"
  - type: llm_judge
    criteria: "Escalation framework reduces the 6-week negotiation cycle — defines clear authority levels (sales rep can approve Tier 1 concessions, sales VP for Tier 2, legal for Tier 3, GC for walk-away terms); includes decision trees for common negotiation scenarios; provides pre-approved language alternatives that sales can offer without legal review; targets reducing cycle time to 2-3 weeks."
    weight: 0.30
    description: "EscalationFramework"
