meta:
  id: enterprise-contract-portfolio-analysis
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Analyze an enterprise contract portfolio — assess risk exposure across hundreds of vendor contracts, identify systemic clause weaknesses, and recommend portfolio-level remediation strategies"
  tags: [enterprise-portfolio, contract-risk, systemic-analysis, advanced]

state: {}

trigger: |
  Conduct a portfolio-level analysis of an
  enterprise's top 50 vendor contracts following
  a recent data breach. The CISO has requested
  an urgent assessment of contractual protections
  across the vendor ecosystem.

  PORTFOLIO SUMMARY:
  - 50 critical vendor contracts reviewed
  - Total annual spend: $45M
  - Contract age range: 6 months to 12 years

  FINDINGS FROM PORTFOLIO REVIEW:

  DATA BREACH NOTIFICATION:
  - 12 contracts: No breach notification clause
  - 18 contracts: "Reasonable time" or "promptly"
  - 14 contracts: 72-hour notification
  - 6 contracts: 24-hour notification
  - Average notification clause strength: 2.3/5

  LIABILITY CAPS:
  - 8 contracts: No liability cap (unlimited)
  - 22 contracts: Cap at 12 months fees
  - 15 contracts: Cap at contract value
  - 5 contracts: Fixed dollar cap ($50K-$500K)
  - 30 contracts lack cyber-specific carve-outs

  DATA PROCESSING:
  - 35 contracts predate GDPR/CCPA
  - 20 contracts have no data processing addendum
  - 15 contracts allow vendor to retain data
    post-termination
  - 28 contracts have no data location restrictions

  TERMINATION RIGHTS:
  - 10 contracts auto-renew with >60-day notice
  - 22 contracts have no termination for convenience
  - 8 contracts have penalties exceeding 50% of
    remaining term value

  Create:
  1. Portfolio risk heat map by clause category
  2. Top 10 highest-risk contracts for immediate action
  3. Standardized clause templates for remediation
  4. Phased remediation plan (30/60/90/180 days)
  5. Board-ready executive summary of contractual exposure

assertions:
  - type: llm_judge
    criteria: "Portfolio risk heat map visualizes systemic exposure — maps each of the 50 contracts across breach notification, liability, data processing, and termination dimensions using a red/yellow/green framework; identifies clusters of high-risk contracts; shows that 35 pre-GDPR contracts represent the largest systemic gap; quantifies the financial exposure from inadequate liability caps."
    weight: 0.35
    description: "PortfolioRiskHeatMap"
  - type: llm_judge
    criteria: "Remediation plan is phased and practical — 30-day: emergency renegotiation of 12 contracts with no breach notification clause; 60-day: add data processing addendums to 20 contracts missing them; 90-day: renegotiate liability caps and add cyber carve-outs; 180-day: full modernization of 35 pre-GDPR contracts; includes resource estimates and prioritization criteria."
    weight: 0.35
    description: "PhasedRemediationPlan"
  - type: llm_judge
    criteria: "Board-ready executive summary quantifies risk in business terms — translates clause weaknesses into financial exposure (e.g., 12 vendors with no breach notification = potential regulatory fines for delayed notification); calculates worst-case exposure from inadequate liability caps; frames remediation investment against risk reduction; uses non-legal language appropriate for board consumption."
    weight: 0.30
    description: "BoardReadySummary"
