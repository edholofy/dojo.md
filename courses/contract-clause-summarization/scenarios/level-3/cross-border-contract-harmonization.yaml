meta:
  id: cross-border-contract-harmonization
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Harmonize contract clauses across jurisdictions — analyze how key provisions must be adapted for US, EU, UK, and APAC regulatory environments while maintaining consistent commercial terms"
  tags: [cross-border, harmonization, multi-jurisdiction, advanced]

state: {}

trigger: |
  A US-headquartered SaaS company is expanding
  globally and needs to adapt its master services
  agreement for use in the EU, UK, Japan, and
  Australia. Analyze how key clauses must change
  across jurisdictions.

  CURRENT US MSA CLAUSES:

  GOVERNING LAW: "This Agreement shall be governed
  by the laws of the State of Delaware."

  LIMITATION OF LIABILITY: "IN NO EVENT SHALL
  EITHER PARTY'S AGGREGATE LIABILITY EXCEED THE
  FEES PAID IN THE TWELVE MONTHS PRECEDING THE
  CLAIM. NEITHER PARTY SHALL BE LIABLE FOR
  INDIRECT, INCIDENTAL, SPECIAL, CONSEQUENTIAL,
  OR PUNITIVE DAMAGES."

  DATA PRIVACY: "Provider shall comply with
  applicable US privacy laws. Customer data shall
  be processed and stored in the United States."

  INDEMNIFICATION: "Customer shall indemnify and
  hold harmless Provider against all claims arising
  from Customer's use of the Service."

  TERMINATION: "Either party may terminate for
  convenience upon 30 days written notice."

  AUTO-RENEWAL: "This Agreement shall automatically
  renew for successive one-year terms unless either
  party provides notice of non-renewal at least
  60 days prior to the end of the then-current term."

  JURY WAIVER: "EACH PARTY HEREBY WAIVES ITS
  RIGHT TO A TRIAL BY JURY."

  NON-SOLICITATION: "During the term and for 12
  months thereafter, neither party shall solicit
  for employment any employee of the other party."

  Create:
  1. Jurisdiction-by-jurisdiction clause adaptation guide
  2. Clauses that are unenforceable in specific jurisdictions
  3. Required additional clauses per jurisdiction
  4. Harmonized template recommendations
  5. Risk assessment for using US-form contracts abroad

assertions:
  - type: llm_judge
    criteria: "EU-specific adaptations are comprehensive — the all-caps liability exclusion may be unenforceable under EU consumer protection directive; GDPR requires specific data processing terms, DPA, SCCs for US transfers, DPIA, and DPO designation; auto-renewal restrictions exist in several EU member states (e.g., France's Chatel Law limits tacit renewal); one-way indemnification may violate unfair contract terms regulations."
    weight: 0.35
    description: "EUJurisdictionalAdaptation"
  - type: llm_judge
    criteria: "Japan and Australia adaptations address unique legal requirements — Japan's Act on the Protection of Personal Information (APPI) has specific cross-border transfer rules different from GDPR; Australia's Privacy Act and Consumer Law prohibit unfair contract terms in standard form contracts; Japanese contract law conventions differ from common law; the analysis covers jurisdiction-specific nuances beyond just data privacy."
    weight: 0.35
    description: "APACJurisdictionalAdaptation"
  - type: llm_judge
    criteria: "Harmonized template balances consistency with local compliance — recommends a modular approach with a core agreement plus jurisdiction-specific addenda; identifies which clauses can remain universal and which must be localized; provides a decision framework for when to use local counsel vs. headquarters templates; addresses language and translation requirements."
    weight: 0.30
    description: "HarmonizedTemplateDesign"
