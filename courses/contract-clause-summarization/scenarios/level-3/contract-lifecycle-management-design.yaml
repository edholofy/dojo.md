meta:
  id: contract-lifecycle-management-design
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Design a contract lifecycle management program — create workflows for contract creation, review, approval, execution, monitoring, and renewal across the enterprise"
  tags: [clm, lifecycle-management, workflow-design, advanced]

state: {}

trigger: |
  Design a contract lifecycle management (CLM)
  program for a rapidly growing fintech company
  that is transitioning from ad hoc contract
  management to a structured enterprise program.

  CURRENT STATE:
  - 500+ active contracts, growing 30% annually
  - Contracts stored in shared drives, email, and
    physical filing cabinets
  - No standardized templates — each business unit
    creates contracts independently
  - Average contract cycle time: 45 days
  - 20% of contracts expire without renewal review
  - No centralized obligation tracking
  - 3 recent compliance failures from missed
    contractual obligations
  - Legal team of 4 handling all contract requests

  DESIRED STATE:
  - Centralized contract repository with search
  - Standardized templates and playbook
  - Automated approval workflows by contract type
    and value
  - Obligation tracking with automated reminders
  - Self-service for low-risk contracts
  - Reporting and analytics on contract metrics
  - Integration with finance (NetSuite) and
    procurement (Coupa)

  REGULATORY REQUIREMENTS:
  - SOX compliance for financial contracts
  - PCI-DSS for payment processing agreements
  - State money transmitter licenses require
    specific contract provisions

  Create:
  1. CLM program design and phased rollout plan
  2. Contract template hierarchy and playbook
  3. Approval workflow by contract type and risk
  4. Obligation tracking and alert system design
  5. Success metrics and KPI framework

assertions:
  - type: llm_judge
    criteria: "Approval workflow balances speed with risk control — low-risk contracts (NDAs, low-value renewals) should be self-service with template guardrails; medium-risk contracts go through paralegal review; high-risk contracts (>$500K, regulatory, IP) require attorney review; the workflow includes escalation paths, SLAs for each review tier, and exception handling for urgent requests."
    weight: 0.35
    description: "ApprovalWorkflowDesign"
  - type: llm_judge
    criteria: "Obligation tracking addresses the 3 recent compliance failures — identifies common obligation types (payment milestones, deliverable deadlines, regulatory filings, insurance renewals, audit rights); designs automated alert escalation (30/60/90-day warnings); assigns obligation owners; includes consequence tracking for missed obligations; the system prevents the 20% expired-without-review problem."
    weight: 0.35
    description: "ObligationTrackingSystem"
  - type: llm_judge
    criteria: "KPI framework measures meaningful outcomes — includes contract cycle time reduction (from 45-day baseline), compliance incident reduction, renewal capture rate improvement, template adoption rate, self-service utilization, and cost savings from standardization; each metric has a baseline, target, and measurement methodology; avoids vanity metrics."
    weight: 0.30
    description: "KPIFramework"
