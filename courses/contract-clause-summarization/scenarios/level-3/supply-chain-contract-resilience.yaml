meta:
  id: supply-chain-contract-resilience
  level: 3
  course: contract-clause-summarization
  type: output
  description: "Assess supply chain contract resilience — analyze force majeure, business continuity, sourcing flexibility, and risk allocation provisions across a multi-tier supply chain"
  tags: [supply-chain, resilience, force-majeure, advanced]

state: {}

trigger: |
  Assess the contractual resilience of a
  manufacturer's critical supply chain following
  lessons learned from recent global disruptions.
  Review force majeure and related provisions
  across Tier 1 suppliers.

  COMPANY: MedDevice Corp (medical device manufacturer)
  REGULATORY ENVIRONMENT: FDA-regulated products
  SUPPLY CHAIN: 24 Tier 1 suppliers across 8 countries

  SUPPLIER A — Critical semiconductor components (Taiwan):
  Force Majeure: "Neither party shall be liable for
  delays caused by acts of God, war, terrorism,
  pandemic, earthquake, or governmental actions.
  Affected party must notify within 30 days. If
  force majeure continues for 90 days, either party
  may terminate without liability."
  Alternative sourcing: None — sole source agreement
  Inventory: 6-week buffer required by contract
  Price: Fixed for 2-year term

  SUPPLIER B — Precision machined parts (Germany):
  Force Majeure: "Force majeure events include only
  natural disasters and armed conflict. Economic
  hardship, supply shortages, and price increases
  do not constitute force majeure."
  Alternative sourcing: Pre-approved secondary
  supplier permitted
  Inventory: Just-in-time, no buffer requirement
  Price: Quarterly adjustment based on material indices

  SUPPLIER C — Sterilization packaging (US):
  Force Majeure: Absent — no force majeure clause
  Alternative sourcing: Exclusive supply agreement
  for 5 years
  Inventory: 90-day safety stock maintained by supplier
  Price: Fixed with annual CPI adjustment

  SUPPLIER D — Software/firmware (India):
  Force Majeure: "Any event beyond the reasonable
  control of the affected party, including but not
  limited to: pandemics, epidemics, quarantine
  restrictions, labor disputes, cyber attacks,
  power failures, internet disruptions, government
  sanctions, and supply chain disruptions."
  Alternative sourcing: Source code escrow in place
  Inventory: N/A (software)
  Price: Time and materials

  Create:
  1. Resilience scorecard for each supplier contract
  2. Gap analysis against best-practice provisions
  3. Scenario modeling (pandemic, natural disaster,
     geopolitical conflict, cyber attack)
  4. Recommended contract amendments
  5. Supply chain contractual risk mitigation strategy

assertions:
  - type: llm_judge
    criteria: "Scenario modeling reveals cascading risks — a Taiwan semiconductor disruption affects Supplier A with no alternative sourcing; Supplier B's JIT model with no buffer creates immediate production stoppage; the analysis models realistic scenarios and traces their contractual implications through the supply chain; identifies which scenarios cause the most severe production disruptions."
    weight: 0.35
    description: "ScenarioModelingCascadingRisks"
  - type: llm_judge
    criteria: "Force majeure clause comparison reveals significant gaps — Supplier A's is standard but 90-day termination right is too slow for critical components; Supplier B's narrow definition excludes pandemics and supply shortages; Supplier C has no force majeure at all, creating ambiguity; Supplier D's is overly broad and may allow avoidance of routine obligations; each contract needs specific amendments."
    weight: 0.35
    description: "ForceMajeureGapAnalysis"
  - type: llm_judge
    criteria: "FDA regulatory requirements are factored into resilience planning — medical device supply chain disruptions can result in FDA enforcement actions; the analysis considers how supply chain clauses interact with regulatory obligations (e.g., design history file requirements, supplier qualification, change notification); contractual remedies must account for regulatory timelines."
    weight: 0.30
    description: "RegulatorySupplyChainIntegration"
