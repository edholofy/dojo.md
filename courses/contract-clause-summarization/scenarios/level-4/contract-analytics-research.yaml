meta:
  id: contract-analytics-research
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Design a contract analytics research program — develop methodologies for studying contract clause patterns across industries, measuring clause effectiveness, and publishing original research on contract risk"
  tags: [contract-analytics, research-methodology, clause-patterns, expert]

state: {}

trigger: |
  Design a research program studying contract
  clause patterns and effectiveness across
  industries. You have access to a dataset of
  10,000 anonymized commercial contracts and
  their associated dispute outcomes.

  RESEARCH CONTEXT:
  - Academic affiliation: Law school research center
  - Dataset: 10,000 contracts from 2015-2025
  - Industries: Technology (35%), healthcare (20%),
    financial services (15%), manufacturing (15%),
    professional services (15%)
  - Dispute data: 800 disputes linked to specific
    clause failures
  - Funding: 3-year grant from legal tech foundation
  - Publication targets: Law reviews, legal tech
    journals, industry white papers

  RESEARCH QUESTIONS:
  1. Which clause formulations most effectively
     prevent disputes?
  2. How do liability cap structures correlate with
     dispute frequency and severity?
  3. What is the relationship between force majeure
     breadth and contract resilience during crises?
  4. How do indemnification structures affect risk
     allocation outcomes in practice?
  5. What clause patterns predict contract disputes?

  METHODOLOGICAL REQUIREMENTS:
  - Quantitative analysis with statistical rigor
  - NLP-based clause extraction and classification
  - Controlling for industry, contract value, and
    party sophistication
  - Longitudinal analysis (pre/post pandemic, pre/post
    GDPR, etc.)
  - Practical implications for practitioners

  Create:
  1. Research program design and timeline
  2. Methodology for each research question
  3. NLP pipeline specification for clause analysis
  4. Statistical analysis framework
  5. Publication and dissemination strategy

assertions:
  - type: llm_judge
    criteria: "Research methodology is statistically rigorous — addresses selection bias (contracts that lead to disputes may be systematically different from those that don't); proposes appropriate statistical methods (regression analysis controlling for confounders, survival analysis for time-to-dispute, NLP classification with validation); acknowledges limitations of the dataset and proposes mitigation strategies."
    weight: 0.35
    description: "StatisticalRigor"
  - type: llm_judge
    criteria: "NLP pipeline design is technically sound for legal text — addresses unique challenges of contract language (archaic phrasing, nested definitions, cross-references, boilerplate variation); proposes appropriate models for clause extraction (legal-domain fine-tuned transformers); includes validation methodology (inter-rater reliability with legal experts); handles clause taxonomy classification with measurable accuracy targets."
    weight: 0.35
    description: "NLPPipelineDesign"
  - type: llm_judge
    criteria: "Practitioner impact is prioritized alongside academic rigor — research outputs include not just academic papers but actionable tools (clause effectiveness scorecards, predictive risk indicators, benchmark data for negotiation); the dissemination strategy reaches both academics and practitioners; the 3-year program produces interim findings that can be applied immediately."
    weight: 0.30
    description: "PractitionerImpact"
