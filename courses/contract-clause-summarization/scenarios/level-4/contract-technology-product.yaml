meta:
  id: contract-technology-product
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Design a contract analysis technology product — define features for AI-powered clause extraction, risk scoring, and benchmark comparison that serves legal teams and business stakeholders"
  tags: [legal-tech-product, contract-ai, product-design, expert]

state: {}

trigger: |
  Design a contract analysis SaaS product that
  uses AI to extract, score, and benchmark
  contract clauses. The product targets mid-market
  legal teams (5-20 attorneys) that cannot afford
  enterprise CLM platforms.

  MARKET ANALYSIS:
  - TAM: $5B contract management software market
  - Mid-market segment underserved: Enterprise CLM
    costs $200K-$1M+/year; mid-market budget is
    $20K-$100K/year
  - Key competitors: Ironclad (enterprise), Icertis
    (enterprise), Juro (SMB), SpotDraft (growth)
  - Gap: No product combines AI clause analysis with
    affordable pricing for mid-market

  PRODUCT REQUIREMENTS:
  - Upload contracts (PDF, Word, scanned images)
  - AI extracts and classifies all clauses
  - Risk scores each clause against configurable
    playbook standards
  - Benchmarks clauses against industry norms
  - Generates plain-language summaries for business
    stakeholders
  - Redline suggestions for non-standard clauses
  - Dashboard showing portfolio-level risk metrics
  - Integration with DocuSign, Salesforce, Google
    Workspace

  TECHNICAL CONSTRAINTS:
  - Must handle 50+ contract types
  - Clause extraction accuracy: >90% F1 score
  - Processing time: <5 minutes per contract
  - Must support multiple languages (English primary,
    Spanish, French, German secondary)
  - SOC 2 Type II required for legal data handling
  - On-premises deployment option for regulated
    industries

  Create:
  1. Product vision and positioning
  2. Feature prioritization (MVP vs. roadmap)
  3. AI/ML architecture for clause analysis
  4. Pricing strategy and packaging
  5. Go-to-market plan for mid-market legal teams

assertions:
  - type: llm_judge
    criteria: "MVP feature set is focused and achievable — prioritizes the highest-value features (upload, extraction, risk scoring, summary) over nice-to-haves (benchmarking, multilingual, integrations); defines clear MVP scope that can be built in 6-9 months; identifies which features drive initial adoption vs. retention vs. expansion; avoids the common legal tech trap of trying to build everything at once."
    weight: 0.35
    description: "MVPFeaturePrioritization"
  - type: llm_judge
    criteria: "AI/ML architecture addresses legal-specific challenges — proposes a multi-stage pipeline (OCR/parsing → clause boundary detection → clause classification → risk scoring → language generation); addresses the unique challenges of legal text (definitions that change clause meaning, cross-references, nested exceptions); includes training data strategy, model selection rationale, and continuous learning from user feedback."
    weight: 0.35
    description: "AIMLArchitecture"
  - type: llm_judge
    criteria: "Pricing strategy captures the mid-market opportunity — positions between enterprise CLM ($200K+) and manual processes ($0); proposes value-based pricing tiers (per-contract, per-seat, or hybrid); includes a self-serve trial or freemium tier for adoption; pricing reflects the ROI of time saved and risk reduced; addresses common mid-market objections (budget constraints, proof of value)."
    weight: 0.30
    description: "PricingStrategy"
