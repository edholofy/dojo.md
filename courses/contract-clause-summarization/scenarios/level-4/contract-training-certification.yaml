meta:
  id: contract-training-certification
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Design a contract analysis training and certification program — create curriculum for legal professionals, business stakeholders, and procurement teams to build contract literacy across the organization"
  tags: [training-program, certification, contract-literacy, expert]

state: {}

trigger: |
  Design a contract analysis training and
  certification program for a large enterprise.
  The program should serve three audiences: legal
  professionals, procurement staff, and business
  stakeholders who negotiate and manage contracts.

  ORGANIZATIONAL CONTEXT:
  - 120 attorneys and paralegals (varying contract
    experience)
  - 200 procurement professionals (mostly non-legal
    backgrounds)
  - 500+ business stakeholders who sign or manage
    contracts (sales, partnerships, engineering)
  - Current issues:
    * Business teams sign contracts without legal
      review
    * Procurement staff don't recognize risky clauses
    * Junior attorneys miss nuanced risk issues
    * No standard for contract competency

  PROGRAM REQUIREMENTS:
  - Role-based curriculum (different tracks for
    different audiences)
  - Online and in-person delivery options
  - Assessment-based certification with renewal
  - Practical exercises using real contract examples
  - Integration with annual compliance training
  - Measurable impact on contract quality metrics
  - Budget: $500K year 1, $200K annually thereafter

  LEARNING OBJECTIVES BY TRACK:
  - Business track: Identify red flags, know when to
    escalate, understand key terms
  - Procurement track: Evaluate vendor contracts,
    negotiate standard terms, manage obligations
  - Legal track: Advanced risk analysis, clause
    drafting, portfolio management

  Create:
  1. Three-track curriculum design
  2. Assessment and certification framework
  3. Training delivery plan and timeline
  4. Content development strategy
  5. Program effectiveness measurement

assertions:
  - type: llm_judge
    criteria: "Business track focuses on practical recognition skills — teaches non-legal professionals to identify the 10-15 most critical clause types and their business implications; uses real-world examples of contracts gone wrong; includes a decision framework for when to escalate vs. when to proceed; does not try to make businesspeople into lawyers but gives them enough knowledge to be effective gatekeepers."
    weight: 0.35
    description: "BusinessTrackDesign"
  - type: llm_judge
    criteria: "Assessment framework validates real-world competency — goes beyond multiple-choice knowledge tests to include practical assessments (review a sample contract and identify risks, draft a clause, negotiate a mock redline); certification levels correspond to signing authority (e.g., business stakeholders certified at Level 1 can sign contracts up to $50K with standard terms); renewal requirements ensure ongoing competency."
    weight: 0.35
    description: "AssessmentFramework"
  - type: llm_judge
    criteria: "Program effectiveness measurement ties to business outcomes — tracks not just training completion and test scores but actual contract quality improvements (fewer unauthorized signatures, reduced clause deviation rates, faster cycle times, fewer disputes traced to poorly reviewed contracts); includes baseline measurement and longitudinal tracking; connects training investment to measurable risk reduction."
    weight: 0.30
    description: "EffectivenessMeasurement"
