meta:
  id: contract-behavioral-economics
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Apply behavioral economics to contract analysis — examine cognitive biases in contract negotiation, design choice architectures for better contract decisions, and develop debiasing strategies for contract review"
  tags: [behavioral-economics, cognitive-bias, contract-decisions, expert]

state: {}

trigger: |
  Apply behavioral economics principles to
  contract analysis and negotiation. Examine how
  cognitive biases affect contract decisions and
  design interventions to improve contract outcomes.

  RESEARCH CONTEXT:
  Analysis of 500 contract negotiations at a
  Fortune 100 company revealed systematic patterns
  of suboptimal decision-making:

  OBSERVED BIASES:
  1. ANCHORING: First-draft terms become anchors;
     82% of final agreements are closer to the
     drafter's initial position than the reviewer's
     preferred position

  2. STATUS QUO BIAS: Auto-renewal rates are 94%
     when opt-out is required vs. 62% when active
     renewal is required; companies are overpaying
     $12M annually on contracts they would not
     actively choose to renew

  3. OPTIMISM BIAS: 78% of contract managers rated
     force majeure risk as "unlikely" in 2019;
     liability caps were set based on "expected"
     rather than "worst case" scenarios

  4. SUNK COST FALLACY: After 4+ weeks of
     negotiation, teams accepted unfavorable terms
     they would have rejected in week 1; the
     "we've invested too much to walk away" effect

  5. COMPLEXITY AVERSION: When contracts exceeded
     30 pages, review thoroughness dropped by 40%;
     key risk provisions in lengthy contracts were
     missed 3x more often than in shorter contracts

  6. FRAMING EFFECTS: "Mutual limitation of
     liability" framed as balanced was accepted 85%
     of the time, even when actual caps were highly
     asymmetric based on relative exposure

  Create:
  1. Bias-by-bias analysis with contract examples
  2. Choice architecture redesign for contract processes
  3. Debiasing intervention toolkit
  4. Measurement framework for bias reduction
  5. Training module design for bias awareness

assertions:
  - type: llm_judge
    criteria: "Choice architecture redesign addresses specific biases — proposes concrete interventions: default contract terms that require active opt-in for risky provisions (addressing status quo bias); contract review checklists that counteract complexity aversion; 'red team' review processes that challenge optimism bias; walk-away criteria defined before negotiation begins (addressing sunk cost fallacy); each intervention is linked to a specific bias with expected impact."
    weight: 0.35
    description: "ChoiceArchitectureRedesign"
  - type: llm_judge
    criteria: "Anchoring analysis provides actionable negotiation guidance — explains how first-draft advantage works in contract negotiations; recommends always preparing the first draft; proposes counter-anchoring techniques (presenting market benchmark data, using playbook standards as counter-anchors); quantifies the financial impact of anchoring bias using the 82% statistic; provides language for reframing negotiations away from initial anchors."
    weight: 0.35
    description: "AnchoringAnalysis"
  - type: llm_judge
    criteria: "Measurement framework enables bias reduction tracking — defines metrics for each bias (e.g., auto-renewal opt-out rates for status quo bias, clause miss rates for complexity aversion, walk-away frequency for sunk cost fallacy); proposes A/B testing of interventions; includes longitudinal tracking to measure whether debiasing training has lasting effects; connects bias reduction to financial outcomes ($12M overpayment reduction)."
    weight: 0.30
    description: "BiasReductionMeasurement"
