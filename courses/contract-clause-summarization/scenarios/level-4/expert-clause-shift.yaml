meta:
  id: expert-clause-shift
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Handle an expert-level contract analysis challenge — design and defend a contract risk management strategy for board presentation, integrating financial, operational, legal, and strategic risk dimensions"
  tags: [shift-simulation, board-presentation, risk-strategy, expert]

state: {}

trigger: |
  The board of directors has requested a
  comprehensive contract risk management
  presentation following a competitor's $200M
  loss from a vendor contract dispute. You are
  the VP of Legal Operations and must present
  the company's contract risk posture and
  improvement plan.

  COMPANY PROFILE:
  - $2B revenue, publicly traded
  - 5,000+ active contracts ($4B total committed)
  - 60-person legal team
  - Current CLM: Partially implemented (60% adoption)
  - Recent incidents:
    * $8M payment to vendor due to overlooked
      auto-renewal (would have switched vendors)
    * 2 regulatory fines from customer contracts
      missing required compliance clauses
    * 6-month delay in product launch due to
      IP ownership dispute with development partner
  - Board expectations: Quantified risk, clear
    mitigation plan, investment requirements

  BOARD PRESENTATION REQUIREMENTS:
  1. Current state of contract risk (with quantification)
  2. Benchmark against industry peers
  3. Root cause analysis of recent incidents
  4. 3-year improvement roadmap with milestones
  5. Investment request with ROI projection
  6. Key risk indicators for ongoing monitoring
  7. Governance recommendations

  AVAILABLE DATA:
  - Contract portfolio analytics (partial — only 60%
    in CLM)
  - Industry benchmark report from legal ops survey
  - Detailed post-mortems on 3 recent incidents
  - Legal department budget and staffing data
  - Competitor loss public filings and analysis

  Create:
  1. Board-ready presentation structure and content
  2. Risk quantification methodology and results
  3. Root cause analysis connecting incidents to
     systemic gaps
  4. Investment case with phased budget request
  5. Ongoing governance and reporting framework

assertions:
  - type: llm_judge
    criteria: "Risk quantification translates contract issues into financial terms the board understands — the $8M auto-renewal loss, regulatory fines, and 6-month product delay are connected to systemic contract management gaps; the analysis extrapolates from known incidents to estimate portfolio-wide exposure; the methodology is defensible and conservative (boards distrust overly aggressive risk projections)."
    weight: 0.35
    description: "BoardLevelRiskQuantification"
  - type: llm_judge
    criteria: "Root cause analysis connects the three incidents to common systemic failures — the auto-renewal was missed because of incomplete CLM adoption (60%); the compliance clause gaps resulted from no minimum standards policy; the IP dispute stemmed from inadequate contract review; the analysis shows these aren't isolated incidents but symptoms of an immature contract management program."
    weight: 0.35
    description: "SystemicRootCauseAnalysis"
  - type: llm_judge
    criteria: "Investment case is compelling and phased appropriately — Year 1 focuses on foundational fixes (complete CLM rollout, minimum standards policy, obligation tracking); Year 2 on optimization (AI-assisted review, risk scoring, self-service); Year 3 on maturity (portfolio analytics, predictive risk, benchmarking); each phase has clear milestones, budget requirements, and expected ROI; total investment is justified against quantified risk reduction."
    weight: 0.30
    description: "InvestmentCaseCompelling"
