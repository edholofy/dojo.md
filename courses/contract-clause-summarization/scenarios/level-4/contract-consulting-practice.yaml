meta:
  id: contract-consulting-practice
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Build a contract analysis consulting practice — design service offerings, methodology frameworks, pricing models, and client engagement approaches for commercial contract advisory"
  tags: [consulting-practice, contract-advisory, service-design, expert]

state: {}

trigger: |
  You are a senior legal operations consultant
  launching a contract analysis advisory practice.
  Design the practice's service offerings,
  methodology, and go-to-market strategy.

  PRACTICE CONTEXT:
  - Target clients: Mid-market companies ($50M-$500M
    revenue) without in-house contract management
  - Market gap: These companies have 200-2,000
    contracts but lack systematic review processes
  - Competition: Big 4 consulting firms (expensive),
    solo practitioners (limited scope), CLM vendors
    (technology-only, no advisory)
  - Your differentiator: Combining legal expertise
    with technology-enabled systematic analysis

  SERVICE DESIGN REQUIREMENTS:
  - Contract portfolio health assessment
  - Risk scoring and remediation planning
  - Template and playbook development
  - CLM selection and implementation support
  - Ongoing contract review as-a-service
  - Regulatory compliance gap analysis
  - M&A contract due diligence support

  PRICING CONSTRAINTS:
  - Must be competitive with Big 4 but not commodity
  - Target engagement size: $50K-$500K
  - Recurring revenue model preferred
  - Must demonstrate clear ROI to justify spend

  Create:
  1. Service portfolio with tiered offerings
  2. Engagement methodology and delivery framework
  3. Pricing model with ROI justification
  4. Client acquisition and marketing strategy
  5. Team structure and capacity planning

assertions:
  - type: llm_judge
    criteria: "Service portfolio has clear tiering and progression — entry-level engagement (portfolio health assessment at $50-75K) creates urgency and builds trust; mid-tier services (remediation, playbook development at $100-250K) address identified gaps; premium services (ongoing review-as-a-service, M&A support at $250-500K) create recurring revenue; each tier naturally leads to the next."
    weight: 0.35
    description: "ServicePortfolioDesign"
  - type: llm_judge
    criteria: "ROI justification is quantifiable and compelling — maps contract analysis investment to measurable outcomes: risk reduction (avoided liability from unfavorable terms), cost savings (renegotiated terms, eliminated auto-renewals), compliance penalty avoidance, reduced outside counsel spend, faster contract cycle times; provides a framework for calculating client-specific ROI before engagement."
    weight: 0.35
    description: "ROIJustification"
  - type: llm_judge
    criteria: "Methodology framework is replicable and scalable — defines a standardized process for contract portfolio assessment that can be executed by junior analysts with senior oversight; includes templates, checklists, scoring rubrics, and reporting formats; balances customization (each client's contracts are different) with standardization (consistent quality across engagements)."
    weight: 0.30
    description: "MethodologyFramework"
