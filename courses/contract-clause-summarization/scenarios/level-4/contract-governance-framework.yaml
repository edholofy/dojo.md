meta:
  id: contract-governance-framework
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Design a contract governance framework — establish policies, standards, roles, and accountability structures for enterprise-wide contract management across business units and geographies"
  tags: [governance-framework, contract-policy, enterprise-standards, expert]

state: {}

trigger: |
  Design a contract governance framework for a
  multinational corporation with operations in
  30 countries, 15 business units, and $8B in
  annual contracted spend. The board has mandated
  improved contract risk management following
  a $45M loss from an unreviewed vendor contract.

  ORGANIZATIONAL CONTEXT:
  - Revenue: $12B
  - Employees: 45,000 across 30 countries
  - Legal team: 120 attorneys + 80 paralegals
  - Active contracts: 25,000+
  - Annual new contracts: 8,000+
  - Current state: Decentralized — each business
    unit and region manages contracts independently
  - $45M loss: A business unit signed a vendor
    contract with unlimited liability and no
    insurance requirements; vendor's data breach
    exposed customer data

  GOVERNANCE OBJECTIVES:
  - Prevent unauthorized contract execution
  - Ensure minimum contractual protections
  - Enable business agility (not slow deals down)
  - Maintain compliance across jurisdictions
  - Provide enterprise-wide visibility to risk
  - Standardize terms while allowing local adaptation

  STAKEHOLDER REQUIREMENTS:
  - Board: Quarterly risk reporting, material
    contract approval
  - CEO: Assurance that contract risks are managed
  - CFO: Financial exposure visibility, commitment
    tracking
  - Business unit leaders: Autonomy to execute
    within guardrails
  - Regional counsel: Flexibility for local law
    compliance
  - Procurement: Streamlined vendor onboarding

  Create:
  1. Governance structure with RACI matrix
  2. Contract authority matrix (who can sign what)
  3. Minimum standards policy for all contracts
  4. Regional adaptation guidelines
  5. Compliance monitoring and enforcement mechanisms

assertions:
  - type: llm_judge
    criteria: "Contract authority matrix prevents the $45M incident from recurring — defines signature authority by contract value, risk level, and type; high-risk contracts (unlimited liability, data processing, >$10M value) require GC or designee approval; includes mandatory clause requirements (liability caps, insurance, breach notification) that cannot be waived without executive approval; addresses the specific failure mode that caused the loss."
    weight: 0.35
    description: "ContractAuthorityMatrix"
  - type: llm_judge
    criteria: "Governance framework balances control with agility — low-risk, standard contracts (NDAs, small vendor agreements) can be executed by business units using approved templates without legal review; medium-risk contracts go through streamlined review; only high-risk contracts require full legal review; includes SLAs for each review tier to prevent governance from becoming a bottleneck; the framework doesn't just add controls but actively speeds up low-risk processes."
    weight: 0.35
    description: "ControlAgilityBalance"
  - type: llm_judge
    criteria: "Regional adaptation addresses multi-jurisdictional complexity — acknowledges that a single global standard won't work (e.g., liability caps may be unenforceable in some EU countries, non-compete clauses vary by state/country); defines core non-negotiable standards and region-specific adaptations; includes a process for regional counsel to request exceptions with appropriate oversight."
    weight: 0.30
    description: "RegionalAdaptation"
