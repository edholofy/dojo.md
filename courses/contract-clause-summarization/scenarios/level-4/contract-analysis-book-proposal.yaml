meta:
  id: contract-analysis-book-proposal
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Develop a book proposal for a practical guide to contract analysis — outline chapters, define the target audience, establish the unique angle, and create sample content demonstrating the approach"
  tags: [book-proposal, contract-guide, publishing, expert]

state: {}

trigger: |
  Develop a book proposal for a practical guide
  to contract clause analysis targeted at business
  professionals, in-house counsel, and legal
  operations teams. The book should bridge the gap
  between academic contract law and practical
  business contract management.

  BOOK CONCEPT:
  Title: "Reading Between the Lines: A Business
  Professional's Guide to Contract Risk"

  TARGET AUDIENCE:
  - In-house counsel (junior to mid-level)
  - Legal operations professionals
  - Procurement managers
  - Business leaders who negotiate contracts
  - Law students preparing for transactional practice

  AUTHOR CREDENTIALS:
  - 15 years in-house counsel experience
  - Former Big Law M&A associate
  - Built contract review programs at 3 companies
  - Regular speaker at legal tech conferences
  - Adjunct professor of contract drafting

  MARKET ANALYSIS:
  - Existing books: Academic contract law (too
    theoretical), general business law (too broad),
    contract drafting manuals (too technical)
  - Gap: No book combines practical clause analysis
    with business context and real-world examples
  - Comparable titles sell 5,000-15,000 copies
  - Target publisher: Legal/business publisher
    (ABA, Wolters Kluwer, or Wiley)

  Create:
  1. Full book proposal with chapter outline
  2. Sample chapter demonstrating the approach
  3. Marketing and positioning strategy
  4. Competing titles analysis
  5. Author platform and promotion plan

assertions:
  - type: llm_judge
    criteria: "Chapter outline covers the full spectrum of contract analysis — progresses from foundational concepts (what is a contract, anatomy of a clause) through specific clause types (liability, indemnification, IP, data privacy) to advanced topics (portfolio management, AI-assisted review, cross-border considerations); each chapter includes real-world examples, checklists, and common pitfalls; the outline demonstrates a logical learning progression."
    weight: 0.35
    description: "ChapterOutlineComprehensiveness"
  - type: llm_judge
    criteria: "Sample chapter demonstrates the book's unique approach — shows how to analyze a specific clause type (e.g., limitation of liability) from both legal and business perspectives; includes before/after examples of clause redlining; uses case studies from real disputes; provides actionable checklists and decision frameworks; the writing style is accessible to non-lawyers while maintaining legal accuracy."
    weight: 0.35
    description: "SampleChapterQuality"
  - type: llm_judge
    criteria: "Market positioning identifies the specific gap being filled — contrasts with academic contract law texts (Adams' 'A Manual of Style for Contract Drafting' is excellent but too technical for business readers), general business law books (too surface-level on contract specifics), and CLM vendor white papers (too narrow and self-serving); positions the book as the 'go-to practical reference' for anyone who reviews, negotiates, or manages contracts."
    weight: 0.30
    description: "MarketPositioning"
