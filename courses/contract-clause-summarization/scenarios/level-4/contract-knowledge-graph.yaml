meta:
  id: contract-knowledge-graph
  level: 4
  course: contract-clause-summarization
  type: output
  description: "Build a contract knowledge graph — design an ontology for contract concepts, map clause relationships, enable semantic search across contract portfolios, and power intelligent contract recommendations"
  tags: [knowledge-graph, contract-ontology, semantic-search, expert]

state: {}

trigger: |
  Design a contract knowledge graph system that
  captures the relationships between contracts,
  clauses, parties, obligations, and risks. The
  system should enable intelligent querying and
  recommendations across a large contract portfolio.

  USE CASES:
  1. "Find all contracts where we have unlimited
     liability with vendors that process personal
     data" (cross-referencing liability + data terms)
  2. "What are all our obligations to Customer X
     across all active contracts?" (obligation
     aggregation)
  3. "If we change our data center location, which
     contracts are affected?" (impact analysis)
  4. "Suggest clause language for a new cybersecurity
     vendor contract based on similar past contracts"
     (recommendation)
  5. "Which contracts have conflicting governing law
     provisions with the same counterparty?"
     (conflict detection)

  ONTOLOGY REQUIREMENTS:
  - Contract entities: Parties, agreements, amendments,
    SOWs, exhibits, schedules
  - Clause entities: Type, text, position, version
  - Obligation entities: Type, deadline, owner,
    status, consequences
  - Risk entities: Category, severity, probability,
    mitigation status
  - Relationship types: Contains, references, amends,
    supersedes, conflicts with, depends on

  TECHNICAL REQUIREMENTS:
  - Graph database (Neo4j or similar)
  - NLP pipeline for automatic knowledge extraction
  - Query interface for legal and business users
  - Visualization of contract relationships
  - Integration with existing CLM and document
    management systems

  Create:
  1. Contract ontology design with entity-relationship model
  2. Knowledge extraction pipeline specification
  3. Query patterns for each use case
  4. Visualization and UI design
  5. Implementation roadmap and data migration strategy

assertions:
  - type: llm_judge
    criteria: "Contract ontology captures the nuances of legal relationships — models the hierarchical nature of contracts (MSA → SOW → amendment → renewal); captures temporal relationships (contract A superseded by contract B on date X); handles multi-party relationships (tripartite agreements, guarantees, assignments); the ontology is flexible enough to accommodate different contract types while maintaining semantic consistency."
    weight: 0.35
    description: "OntologyDesign"
  - type: llm_judge
    criteria: "Query patterns demonstrate practical value — shows exact graph queries for each of the 5 use cases; the cross-referencing query (unlimited liability + personal data processing) demonstrates traversing multiple node types and edge relationships; the impact analysis query shows how changing one attribute propagates through the graph; queries are expressed in both formal graph query language and natural language equivalents."
    weight: 0.35
    description: "QueryPatternDesign"
  - type: llm_judge
    criteria: "Knowledge extraction pipeline handles the messy reality of contract documents — addresses OCR quality issues, inconsistent formatting, cross-references to external documents, defined terms that change meaning across contracts, and amendments that modify but don't replace original clauses; includes human-in-the-loop validation for high-confidence threshold and automated processing for routine extractions."
    weight: 0.30
    description: "KnowledgeExtractionPipeline"
