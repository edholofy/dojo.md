meta:
  id: contract-memoir
  level: 5
  course: contract-clause-summarization
  type: output
  description: "Write a professional memoir about a career in contract analysis — capture lessons learned from decades of contract review, negotiation, and management through compelling stories and practical wisdom"
  tags: [memoir, career-retrospective, professional-wisdom, master]

state: {}

trigger: |
  Write a professional memoir chapter capturing
  the most important lessons from a 25-year career
  in contract analysis and management, from junior
  paralegal to Chief Legal Officer.

  CAREER ARC:
  - Years 1-5: Paralegal at a mid-size law firm,
    reviewing real estate leases and commercial
    contracts. Learned to read contracts by reading
    thousands of them.
  - Years 6-10: In-house counsel at a tech startup
    through IPO. Built the first contract review
    process from scratch. Made every mistake possible.
  - Years 11-15: VP of Legal Operations at a Fortune
    500 company. Led the first CLM implementation.
    Discovered that technology alone doesn't fix
    contract problems.
  - Years 16-20: Chief Legal Officer at a global
    manufacturer. Navigated the pandemic's impact
    on 2,000+ supplier contracts. Learned that
    relationships matter more than clauses.
  - Years 21-25: Independent consultant and professor.
    Trained the next generation while watching AI
    transform the profession.

  KEY STORIES TO TELL:
  1. "The $40M Comma" — how ambiguous punctuation
     in a liability clause led to a 3-year lawsuit
  2. "The Handshake Deal" — a joint venture that
     succeeded despite a terrible contract because
     the relationship was strong
  3. "The Perfect Contract That Failed" — a
     meticulously drafted agreement that couldn't
     survive a pandemic no one anticipated
  4. "The AI Moment" — the day an AI tool caught
     a risk that 3 experienced attorneys missed
  5. "The Next Generation" — teaching students who
     see contracts differently than veterans

  MEMOIR THEMES:
  - Contracts are human documents about human
    relationships
  - The best contract is one that never needs to
    be litigated
  - Technology changes tools, not principles
  - Every clause exists because something went wrong

  Create:
  1. Chapter narrative with compelling storytelling
  2. Practical lessons extracted from each story
  3. Evolution of the profession through the lens
     of one career
  4. Advice for the next generation of practitioners
  5. Reflection on what matters most in contract work

assertions:
  - type: llm_judge
    criteria: "Storytelling brings contract analysis to life — 'The $40M Comma' story makes abstract concepts (ambiguity, drafting precision) visceral and memorable; 'The Handshake Deal' challenges the assumption that good contracts always require good drafting; stories have narrative tension, human characters, and unexpected outcomes; the memoir reads like a compelling narrative, not a textbook with anecdotes."
    weight: 0.35
    description: "CompellingStorytelling"
  - type: llm_judge
    criteria: "Career arc captures the profession's evolution — the progression from manual paralegal review through CLM implementation to AI augmentation mirrors the profession's technology transformation; the pandemic chapter shows how force majeure went from theoretical to existential; the teaching chapter reflects on how digital-native professionals approach contracts differently; the memoir is a history of the profession told through one career."
    weight: 0.35
    description: "ProfessionEvolution"
  - type: llm_judge
    criteria: "Practical wisdom is distilled without being preachy — each story yields actionable lessons that practitioners can apply immediately; the advice for the next generation is forward-looking (embracing AI, developing judgment alongside technical skills, understanding business context) rather than nostalgic; the memoir balances humility (mistakes made) with expertise (lessons learned); the tone is that of a generous mentor sharing hard-won knowledge."
    weight: 0.30
    description: "PracticalWisdom"
