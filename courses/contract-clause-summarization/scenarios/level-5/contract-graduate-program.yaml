meta:
  id: contract-graduate-program
  level: 5
  course: contract-clause-summarization
  type: output
  description: "Design a graduate-level program in contract analysis and management — create curriculum integrating law, business, technology, and data science for the next generation of contract professionals"
  tags: [graduate-program, curriculum-design, interdisciplinary, master]

state: {}

trigger: |
  Design a Master of Science in Contract Analysis
  and Management (MSCAM) program at a top-tier
  business school. The program should produce
  graduates who combine legal knowledge,
  business acumen, technology skills, and
  analytical capabilities.

  PROGRAM CONTEXT:
  - Host institution: Joint program between law
    school and business school
  - Duration: 12 months (full-time) or 24 months
    (part-time/executive)
  - Target enrollment: 40 students per cohort
  - Target students: Mid-career legal professionals,
    legal operations managers, procurement leaders,
    legal tech professionals
  - Tuition: $65,000 (competitive with MBA programs)
  - Accreditation: Must meet both law school and
    business school accreditation requirements

  MARKET DEMAND:
  - Legal operations is the fastest-growing legal
    function (30% annual growth in job postings)
  - No existing degree program specifically for
    contract management professionals
  - Existing options: LLM (too legal), MBA (too
    general), certificates (too shallow)
  - Employer demand survey: 85% of GCs would prefer
    candidates with formal contract management
    education

  CURRICULUM REQUIREMENTS:
  - Contract law fundamentals (across legal systems)
  - Financial analysis of contract terms
  - Technology (CLM, AI/ML, data analytics)
  - Negotiation and dispute resolution
  - Project management and change management
  - Regulatory compliance (cross-border)
  - Capstone project with industry partner

  Create:
  1. Full curriculum design with course descriptions
  2. Faculty recruitment strategy
  3. Industry partnership program
  4. Student recruitment and marketing plan
  5. Program assessment and continuous improvement

assertions:
  - type: llm_judge
    criteria: "Curriculum balances four disciplines — allocates appropriate credit hours to legal foundations (contract law, regulatory compliance), business skills (financial analysis, negotiation, project management), technology (CLM, AI/ML, data science), and practical application (capstone, internship); the program produces T-shaped professionals with depth in contract analysis and breadth across supporting disciplines; no single discipline dominates at the expense of others."
    weight: 0.35
    description: "InterdisciplinaryCurriculumBalance"
  - type: llm_judge
    criteria: "Industry partnership program creates mutual value — partners provide guest lecturers, capstone projects, internship placements, real contract data (anonymized) for analysis exercises, and hiring pipeline; the program provides partners with access to talent, research insights, and continuing education for current employees; partnership tiers (founding, contributing, participating) create clear value propositions; addresses data sensitivity and ethical considerations."
    weight: 0.35
    description: "IndustryPartnershipDesign"
  - type: llm_judge
    criteria: "Program assessment goes beyond student satisfaction — measures graduate career outcomes (placement rates, salary premiums, promotion velocity), employer satisfaction with graduate competencies, industry impact (research publications, standards contributions), and program evolution based on market changes; includes a continuous improvement cycle that adapts curriculum to emerging contract management challenges (AI disruption, new regulations, evolving practices)."
    weight: 0.30
    description: "ProgramAssessment"
