meta:
  id: contract-research-handbook
  level: 5
  course: contract-clause-summarization
  type: output
  description: "Author a research handbook chapter on empirical contract analysis — review the literature, identify research gaps, propose new methodologies, and define the research agenda for the field"
  tags: [research-handbook, empirical-analysis, academic-contribution, master]

state: {}

trigger: |
  Write a chapter for the Oxford Handbook of
  Empirical Contract Analysis. Your chapter covers
  the intersection of computational methods and
  traditional legal analysis in understanding how
  contracts function in practice.

  CHAPTER SCOPE:
  Title: "Computational Contract Analysis:
  Methods, Findings, and Future Directions"

  LITERATURE TO SYNTHESIZE:
  1. Traditional contract theory (Williamson's
     transaction cost economics, Hart & Moore's
     incomplete contracts theory)
  2. Empirical legal studies (Eisenberg's contract
     law empirics, Schwartz & Scott's contract
     theory and empirical research)
  3. Computational legal studies (Surden's
     computable contracts, Katz's computational
     legal analysis)
  4. NLP and AI applications in legal text analysis
  5. Contract management and legal operations
     empirical research

  EMERGING RESEARCH QUESTIONS:
  - Can machine learning predict which contracts
    will result in disputes based on clause patterns?
  - Do AI-generated contract summaries lead to
    better or worse business decisions compared
    to attorney summaries?
  - How do cognitive biases in contract drafting
    correlate with dispute frequency?
  - What is the relationship between contract
    complexity (measured computationally) and
    contractual outcomes?
  - How do cultural and legal system differences
    affect clause effectiveness?

  METHODOLOGICAL CHALLENGES:
  - Accessing contract data (most contracts are
    confidential)
  - Defining and measuring "contract success"
  - Controlling for relationship quality vs.
    contract quality
  - Establishing causation vs. correlation in
    clause-outcome relationships
  - Addressing the selection bias in dispute data

  Create:
  1. Literature synthesis and critical assessment
  2. Methodological framework for computational
     contract analysis
  3. Research agenda with specific proposals
  4. Data access and ethical considerations
  5. Implications for practice and policy

assertions:
  - type: llm_judge
    criteria: "Literature synthesis bridges traditionally separate fields — connects transaction cost economics (why contracts are incomplete) with computational methods (how we can systematically analyze what contracts actually say); identifies where traditional theory predictions have been tested empirically and where gaps remain; critically assesses the limitations of both purely theoretical and purely computational approaches."
    weight: 0.35
    description: "LiteratureSynthesis"
  - type: llm_judge
    criteria: "Research agenda proposes feasible and impactful studies — each proposed study has a clear research question, identifiable data source, appropriate methodology, and expected contribution; addresses the data access challenge creatively (SEC filings for public company contracts, court records for disputed contracts, partnership with CLM vendors for anonymized data); prioritizes studies by feasibility and potential impact on both theory and practice."
    weight: 0.35
    description: "ResearchAgenda"
  - type: llm_judge
    criteria: "Methodological challenges are addressed honestly — acknowledges that computational contract analysis faces fundamental challenges (contracts that lead to disputes are systematically different from those that don't; the absence of a dispute doesn't mean the contract was well-drafted); proposes solutions or workarounds for each challenge rather than ignoring them; maintains academic integrity while advocating for the field's potential."
    weight: 0.30
    description: "MethodologicalHonesty"
