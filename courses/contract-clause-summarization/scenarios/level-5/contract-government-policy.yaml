meta:
  id: contract-government-policy
  level: 5
  course: contract-clause-summarization
  type: output
  description: "Shape government policy on contract transparency and fairness — develop policy proposals for contract disclosure requirements, standard term regulations, and consumer contract protections"
  tags: [government-policy, contract-transparency, consumer-protection, master]

state: {}

trigger: |
  Develop policy proposals for a government
  commission studying contract transparency and
  fairness in the digital economy. The commission
  has been tasked with recommending legislation
  to address concerns about unfair contract terms
  in consumer and small business agreements.

  COMMISSION MANDATE:
  "Recommend legislative and regulatory measures
  to ensure that contracts in the digital economy
  are transparent, fair, and understandable to
  all parties."

  KEY CONCERNS IDENTIFIED BY THE COMMISSION:
  1. CLICK-WRAP OPACITY: 97% of consumers don't read
     terms of service; companies exploit this by
     including unfavorable terms in dense agreements
  2. FORCED ARBITRATION: Pre-dispute mandatory
     arbitration clauses prevent class actions and
     limit consumer remedies
  3. UNILATERAL MODIFICATION: Companies reserve the
     right to change terms at any time with minimal
     notice
  4. DATA EXPLOITATION: Privacy policies that permit
     unlimited data collection and sharing, presented
     as "contracts" that users "agree" to
  5. SMALL BUSINESS INEQUALITY: Enterprise vendors
     impose take-it-or-leave-it contracts on small
     businesses with no negotiating power
  6. ALGORITHMIC CONTRACTING: AI-generated terms
     customized per user, potentially discriminatory,
     with no transparency about personalization

  STAKEHOLDER POSITIONS:
  - Consumer advocates: Want mandatory plain-language
    requirements and banned unfair terms
  - Business lobby: Warns against overregulation that
    increases costs and reduces innovation
  - Legal tech industry: Proposes technology-based
    transparency solutions
  - Academic experts: Divided between disclosure
    requirements and substantive regulation
  - International comparison: EU Unfair Contract
    Terms Directive, Australian Consumer Law,
    UK Consumer Rights Act

  Create:
  1. Policy analysis of each concern
  2. Legislative proposals with specific provisions
  3. Regulatory framework design
  4. Impact assessment for each proposal
  5. Implementation roadmap and enforcement plan

assertions:
  - type: llm_judge
    criteria: "Policy proposals balance consumer protection with business innovation — avoids both extremes of laissez-faire (status quo is clearly harmful) and overregulation (prescriptive requirements that stifle innovation); proposes graduated interventions based on market power asymmetry and harm potential; draws on EU, Australian, and UK precedents while adapting for the US legal context; addresses the business lobby's concerns about compliance costs with proportionality principles."
    weight: 0.35
    description: "PolicyBalance"
  - type: llm_judge
    criteria: "Algorithmic contracting proposal addresses a genuinely novel challenge — recognizes that personalized contract terms (different prices, different arbitration clauses, different return policies for different users) create discrimination risks that existing law doesn't address; proposes transparency requirements for algorithmic term-setting, anti-discrimination safeguards, and audit mechanisms; this is a forward-looking policy proposal, not just a fix for existing problems."
    weight: 0.35
    description: "AlgorithmicContractingPolicy"
  - type: llm_judge
    criteria: "Impact assessment quantifies costs and benefits credibly — estimates compliance costs for businesses (disclosure formatting, plain-language rewriting, arbitration clause modifications); quantifies consumer benefits (reduced unfair term exposure, improved dispute resolution access, data protection improvements); uses evidence from jurisdictions that have implemented similar measures (EU UCTD impact studies); acknowledges uncertainties and proposes monitoring mechanisms."
    weight: 0.30
    description: "ImpactAssessment"
