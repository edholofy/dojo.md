meta:
  id: contract-social-enterprise
  level: 5
  course: contract-clause-summarization
  type: output
  description: "Build a social enterprise for contract access — design a pro bono contract analysis platform for underserved communities, small businesses, and nonprofits that lack access to legal contract review"
  tags: [social-enterprise, access-to-justice, pro-bono, master]

state: {}

trigger: |
  Design a social enterprise that democratizes
  access to contract analysis for underserved
  populations. The mission: "No one should sign
  a contract they don't understand."

  PROBLEM STATEMENT:
  - 60% of small businesses sign contracts without
    legal review (cannot afford attorneys)
  - Low-income individuals sign rental leases,
    employment contracts, and consumer agreements
    without understanding key terms
  - Nonprofit organizations often accept unfavorable
    vendor terms due to limited negotiating power
  - Immigrant communities face language barriers
    in understanding contracts
  - Indigenous communities have been historically
    disadvantaged in contract negotiations with
    corporations and governments

  TARGET POPULATIONS:
  1. Small businesses (<$5M revenue) — vendor
     contracts, leases, employment agreements
  2. Low-income individuals — rental leases,
     employment contracts, consumer agreements
  3. Nonprofit organizations — grant agreements,
     vendor contracts, partnership agreements
  4. Immigrant communities — employment contracts,
     lease agreements, service contracts
  5. Indigenous communities — resource extraction
     agreements, land use contracts, government
     agreements

  SOCIAL ENTERPRISE MODEL:
  - Revenue: Freemium AI-powered contract analysis
    (free basic, paid premium for commercial users)
  - Cross-subsidy: Commercial revenue funds pro bono
    services
  - Pro bono network: Volunteer attorneys provide
    human review for complex cases
  - Technology: AI contract analysis with plain-
    language explanations in multiple languages
  - Distribution: Partnerships with community
    organizations, legal aid societies, SBA offices

  Create:
  1. Social enterprise business model and financial
     sustainability plan
  2. Technology platform design for accessibility
  3. Pro bono attorney network recruitment and
     management
  4. Community partnership and distribution strategy
  5. Impact measurement framework

assertions:
  - type: llm_judge
    criteria: "Financial sustainability model is realistic — the cross-subsidy model (commercial users fund pro bono services) requires careful unit economics; the analysis calculates how many paid users are needed to support free services; identifies multiple revenue streams (freemium, B2B licensing to legal aid orgs, grants, corporate sponsorships); achieves financial sustainability within 3-5 years without depending entirely on donations."
    weight: 0.35
    description: "FinancialSustainability"
  - type: llm_judge
    criteria: "Technology platform addresses real accessibility barriers — designs for low literacy levels (plain-language summaries at 6th-grade reading level), multiple languages (at minimum English, Spanish, Mandarin, Arabic), mobile-first (many target users are mobile-only), offline capability (for areas with limited connectivity); AI explanations are validated for accuracy by legal professionals before deployment; the platform doesn't replace attorneys but makes informed consent possible."
    weight: 0.35
    description: "AccessibilityDesign"
  - type: llm_judge
    criteria: "Impact measurement goes beyond output metrics — measures not just contracts reviewed (outputs) but comprehension improvement (users understand key terms after using the tool), negotiation outcomes (users who renegotiate unfavorable terms), financial impact (money saved from identified unfavorable clauses), and systemic change (shift in contracting practices by frequent counterparties); includes qualitative impact stories alongside quantitative metrics."
    weight: 0.30
    description: "ImpactMeasurement"
