meta:
  id: master-clause-shift
  level: 5
  course: contract-clause-summarization
  type: output
  description: "Handle a master-level contract challenge — advise on a transformative situation where contract analysis, technology, policy, ethics, and business strategy converge in a high-stakes scenario"
  tags: [shift-simulation, transformative-challenge, convergence, master]

state: {}

trigger: |
  You are a world-renowned contract analysis expert
  called to advise on a unprecedented situation
  that challenges everything the profession knows
  about contracts.

  SCENARIO:
  A consortium of 50 major technology companies
  has proposed "The Universal Agreement Protocol"
  (UAP) — a system that would replace traditional
  written contracts with machine-readable agreement
  objects. Under UAP:

  - All commercial agreements between participating
    companies would be expressed in a standardized
    machine-readable format (not PDFs or Word docs)
  - AI systems would negotiate terms, draft
    agreements, and monitor compliance automatically
  - Smart contract execution would handle payments,
    deliverables, and penalties without human
    intervention
  - A dispute resolution AI would adjudicate
    disagreements using precedent data from millions
    of past contracts
  - Human lawyers would only be involved for
    "exception handling" — novel situations the
    AI cannot resolve

  SUPPORT ARGUMENTS:
  - Would reduce global contract processing costs
    by $500B annually
  - Eliminates language barriers in international
    commerce
  - Reduces contract cycle time from weeks to seconds
  - Creates auditable, transparent agreement trails
  - Levels the playing field for small businesses
    (same AI-powered terms for everyone)

  OPPOSITION CONCERNS:
  - Eliminates 2 million legal jobs worldwide
  - Cannot handle nuance, ambiguity, or novel
    situations that make contracts flexible
  - Algorithmic bias could systematically disadvantage
    certain parties
  - Concentration of power in consortium members
  - Legal systems based on human interpretation
    cannot accommodate machine-generated agreements
  - Privacy concerns from centralizing all commercial
    agreement data
  - Sovereignty issues — who governs the UAP?

  ADVISORY REQUESTS:
  1. The consortium wants your endorsement and
     advisory role ($2M/year)
  2. A coalition of bar associations wants you to
     lead opposition
  3. A government commission wants your impartial
     analysis
  4. A law school dean wants you to redesign their
     curriculum in response
  5. A legal tech startup wants you as an advisor
     to build a "UAP compliance" tool

  Create:
  1. Impartial analysis of UAP for the government
     commission
  2. Ethical analysis of the endorsement request
  3. Curriculum redesign recommendations
  4. Future scenarios if UAP succeeds vs. fails
  5. Your personal position statement

assertions:
  - type: llm_judge
    criteria: "Impartial government analysis weighs both sides rigorously — acknowledges the genuine benefits of standardization and automation while identifying serious structural risks (monopoly power, job displacement, algorithmic bias, sovereignty); proposes a regulatory framework that captures UAP's benefits while mitigating risks (phased implementation, mandatory human oversight for high-stakes agreements, open-standard requirements to prevent monopoly, bias auditing); the analysis would be credible to both supporters and opponents."
    weight: 0.35
    description: "ImpartialAnalysis"
  - type: llm_judge
    criteria: "Ethical analysis of endorsement navigates genuine conflicts of interest — the $2M advisory role creates financial incentive; endorsement could accelerate adoption (beneficial) or legitimize a flawed system (harmful); the analysis applies professional ethics principles (independence, duty to the profession, public interest) to evaluate whether acceptance is appropriate; considers whether advisory influence could shape UAP for the better vs. providing cover for the consortium."
    weight: 0.35
    description: "EthicalAnalysis"
  - type: llm_judge
    criteria: "Personal position statement demonstrates intellectual courage — takes a clear position rather than equivocating; the position is nuanced (not simply pro or anti-UAP) but definitive; supports the position with specific reasoning tied to the analysis; acknowledges what would change the author's mind; the statement demonstrates the kind of principled leadership that defines master-level expertise — the willingness to take a stand on a consequential issue."
    weight: 0.30
    description: "IntellectualCourage"
