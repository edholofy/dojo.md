meta:
  id: contract-thought-leadership
  level: 5
  course: contract-clause-summarization
  type: output
  description: "Establish thought leadership in contract analysis — develop original frameworks for contract risk theory, publish influential perspectives on the future of contract management, and shape industry discourse"
  tags: [thought-leadership, contract-theory, industry-influence, master]

state: {}

trigger: |
  Develop a thought leadership platform on the
  future of contract analysis and management.
  Your thesis: "The traditional approach to
  contract review — treating each contract as an
  isolated document — is fundamentally broken.
  Contracts are nodes in a network of business
  relationships, and they must be analyzed as a
  system, not as individual documents."

  PLATFORM COMPONENTS:
  1. Keynote presentation for LegalTech conference
     (2,000 attendees, 45-minute slot)
  2. Long-form article for Harvard Business Review
  3. Research white paper with original data
  4. Podcast series outline (6 episodes)
  5. Social media content strategy for LinkedIn

  SUPPORTING ARGUMENTS:
  - A single vendor contract connects to customer
    obligations, regulatory requirements, insurance
    coverage, and financial commitments — changes
    in one affect all others
  - The average enterprise has 3,000+ contracts but
    reviews each in isolation, missing portfolio-
    level risks like concentration and cascade effects
  - AI enables network analysis of contract portfolios
    for the first time, but most organizations still
    use AI for single-document review
  - The $200M+ in annual contract-related losses at
    large enterprises stems primarily from systemic
    failures, not individual clause mistakes

  CONTRARIAN POSITIONS TO ADDRESS:
  - "Individual clause quality matters most"
  - "AI will replace contract lawyers"
  - "Standardization solves contract risk"
  - "CLM technology is sufficient"

  Create:
  1. Keynote presentation outline with narrative arc
  2. HBR article draft (executive summary + structure)
  3. Research white paper methodology and findings
  4. Podcast episode guide with guest suggestions
  5. 12-month content calendar

assertions:
  - type: llm_judge
    criteria: "Keynote presentation has a compelling narrative arc — opens with a relatable contract failure story, builds the case for systemic thinking with data, challenges conventional wisdom, introduces the network analysis framework, demonstrates practical application, and closes with a vision for the future; the presentation is designed to be memorable and shareable, not just informative."
    weight: 0.35
    description: "KeynoteNarrativeArc"
  - type: llm_judge
    criteria: "HBR article bridges academic rigor with executive accessibility — frames contract network analysis in business strategy terms (not legal jargon); uses analogies from supply chain management or financial portfolio theory; includes executive-friendly visualizations of contract networks; provides a practical framework that C-suite readers can apply immediately; meets HBR's editorial standards for original business thinking."
    weight: 0.35
    description: "HBRArticleQuality"
  - type: llm_judge
    criteria: "Contrarian positions are engaged with respectfully but decisively — acknowledges the grain of truth in each opposing view before presenting counter-evidence; the response to 'AI will replace contract lawyers' is nuanced (AI enables network analysis but human judgment is needed for relationship and context interpretation); avoids strawman arguments and builds credibility through intellectual honesty."
    weight: 0.30
    description: "ContrarianEngagement"
