meta:
  id: contract-technology-unicorn
  level: 5
  course: contract-clause-summarization
  type: output
  description: "Build a contract analysis technology unicorn — design the product strategy, business model, and growth plan for a legal tech company that fundamentally reimagines how contracts are created, analyzed, and managed"
  tags: [technology-unicorn, legal-tech, startup-strategy, master]

state: {}

trigger: |
  Design the business plan for a legal technology
  company that aims to become a unicorn ($1B+
  valuation) by fundamentally reimagining contract
  analysis and management.

  COMPANY VISION:
  "ContractOS" — The operating system for business
  agreements. Replace the document-centric contract
  model with a data-centric, intelligent agreement
  platform.

  CORE INNOVATION:
  Instead of storing contracts as documents (PDFs,
  Word files), ContractOS represents every contract
  as structured data with:
  - Machine-readable clause objects
  - Real-time obligation tracking
  - Automated compliance monitoring
  - Cross-contract relationship mapping
  - Predictive analytics for risk and performance

  MARKET OPPORTUNITY:
  - CLM market: $3B (2025) → $10B (2030)
  - Adjacent markets: Legal AI ($1.5B), RegTech
    ($12B), Procurement ($8B)
  - Total addressable opportunity: $30B+
  - Current leaders (Ironclad, Icertis) are
    document-management tools, not intelligence
    platforms

  COMPETITIVE MOAT:
  - Proprietary contract knowledge graph trained on
    10M+ anonymized contracts
  - Network effects: More contracts = better AI =
    better benchmarks = more contracts
  - Data moat: Industry-specific contract intelligence
    that improves with scale
  - Platform ecosystem: Third-party apps built on
    contract data APIs

  FOUNDING TEAM:
  - CEO: Former GC of a public tech company
  - CTO: Former AI research lead at Google
  - CPO: Former VP Product at DocuSign
  - Initial funding: $5M seed from top-tier VC

  Create:
  1. Product strategy and platform architecture
  2. Business model and unit economics
  3. Go-to-market strategy and growth flywheel
  4. Fundraising roadmap (seed to Series C)
  5. Risk analysis and mitigation strategies

assertions:
  - type: llm_judge
    criteria: "Product strategy differentiates from existing CLM — clearly articulates why 'data-centric agreements' is fundamentally different from 'document management with AI features'; the structured data model enables capabilities impossible with document-centric approaches (real-time portfolio analytics, automated compliance, predictive risk); the architecture supports a platform ecosystem where third-party developers build on contract data APIs; the vision is ambitious but technically grounded."
    weight: 0.35
    description: "ProductDifferentiation"
  - type: llm_judge
    criteria: "Growth flywheel demonstrates network effects — maps the virtuous cycle: more contracts processed → better AI models → more accurate risk scoring → better benchmarks → more value for users → more contracts; identifies the critical mass threshold and strategies to reach it; addresses the cold start problem (how to train AI without initial data); the network effect moat makes the business more defensible over time."
    weight: 0.35
    description: "GrowthFlywheel"
  - type: llm_judge
    criteria: "Fundraising roadmap maps capital needs to milestones — Seed ($5M): build MVP and sign first 10 design partners; Series A ($20-30M): achieve product-market fit with 50+ paying customers; Series B ($80-100M): scale go-to-market and expand internationally; Series C ($150-200M): platform ecosystem launch and adjacent market expansion; each round has clear metrics that justify the next round's valuation; the path to $1B valuation is aggressive but defensible."
    weight: 0.30
    description: "FundraisingRoadmap"
