meta:
  id: voice-consulting-firm
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Build a brand voice consulting firm — firm structure, methodology, team development, client pipeline, and intellectual property portfolio"
  tags: [brand-voice, consulting, firm, business, methodology, mastery]

state: {}

trigger: |
  Building a brand voice consulting firm requires more than
  expertise — it demands a scalable methodology, a team of
  voice specialists, a client acquisition engine, and
  proprietary intellectual property that differentiates the
  firm in the market.

  Design "VoiceCraft Studios" — a brand voice consulting firm:

  Part 1: Firm structure and operations
  1. Business model:
     - Revenue streams (projects, retainers, training, licensing)
     - Pricing strategy (value-based, not hourly)
     - Target revenue: Year 1 ($500K), Year 3 ($2M)
  2. Team structure:
     - Founding team roles (3 partners)
     - First 5 hires and their responsibilities
     - Freelancer network design
     - Growth plan (team at $500K vs. $2M revenue)
  3. Client acquisition:
     - Ideal client profile
     - Marketing and thought leadership strategy
     - Sales process design
     - Case study and portfolio development

  Part 2: Proprietary methodology
  Design VoiceCraft's proprietary voice development methodology:
  1. "The Voice Blueprint Process" (6-phase methodology):
     - Phase 1: Discovery and Research
     - Phase 2: Voice Architecture Design
     - Phase 3: Documentation and Templates
     - Phase 4: Team Training and Enablement
     - Phase 5: Implementation and Monitoring
     - Phase 6: Optimization and Evolution
  2. For each phase:
     - Key activities and deliverables
     - Client involvement requirements
     - Timeline estimates
     - Proprietary tools or frameworks used
  3. Voice Maturity Assessment Model:
     - Level 1: Undefined (no documentation)
     - Level 2: Basic (voice chart exists)
     - Level 3: Documented (comprehensive guide)
     - Level 4: Governed (processes and training)
     - Level 5: Optimized (measured, evolved, embedded)

  Part 3: Intellectual property
  1. The VoiceCraft Framework Library:
     - 5 proprietary frameworks with descriptions
  2. Training program curriculum (licensable)
  3. Voice assessment certification program
  4. Thought leadership content calendar (12 months)
  5. Partnership and referral program design

assertions:
  - type: llm_judge
    criteria: "Business model is financially viable — revenue streams, pricing strategy, and growth projections are realistic for a boutique consulting firm"
    weight: 0.25
    description: "Viable business model"
  - type: llm_judge
    criteria: "The Voice Blueprint Process is a compelling methodology — it's systematic enough to be repeatable yet flexible enough for diverse clients"
    weight: 0.30
    description: "Compelling proprietary methodology"
  - type: llm_judge
    criteria: "Voice Maturity Assessment provides genuine value — clients can self-assess and see a clear path to improvement"
    weight: 0.25
    description: "Value-providing maturity model"
  - type: llm_judge
    criteria: "Intellectual property creates competitive moats — frameworks, certifications, and training programs differentiate VoiceCraft from generic consultants"
    weight: 0.20
    description: "Differentiating intellectual property"
