meta:
  id: comprehensive-voice-engagement
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Complete brand voice client engagement capstone — full 6-month engagement from audit through documentation, training, governance, and measurement"
  tags: [brand-voice, capstone, client-engagement, comprehensive, strategy, mastery]

state: {}

trigger: |
  This capstone simulates a complete 6-month brand voice
  consulting engagement. From initial audit through strategy,
  documentation, training, governance setup, and measurement —
  demonstrate mastery of the entire brand voice lifecycle.

  Client: "Meridian Analytics" — data analytics platform
  Current state: 50 employees, growing fast, voice is whatever
  individual writers decide. No documentation, no governance.
  Goal: Professional, consistent voice across all channels
  Budget: $120,000 for the full engagement
  Team: CMO (sponsor), content lead (day-to-day), 12 content creators

  Part 1: Discovery and audit (Month 1)
  1. Stakeholder interview plan:
     - Who to interview (roles and why)
     - Key questions for each stakeholder type
  2. Content audit:
     - Audit 50 content pieces across 6 channels
     - Scoring methodology and findings
     - Current voice characterization
  3. Competitive voice analysis:
     - 5 competitor voice profiles
     - Differentiation opportunities
  4. Audience research:
     - Customer communication preferences
     - Audience persona voice expectations
  5. Discovery report deliverable outline

  Part 2: Strategy and documentation (Months 2-3)
  1. Voice strategy presentation:
     - Recommended voice descriptors (with rationale)
     - Tone spectrum design
     - Channel adaptation strategy
  2. Complete voice documentation:
     - Style guide (full document structure)
     - Voice chart
     - Word lists and terminology
     - Channel-specific guidelines
     - Content templates (6 templates)
  3. Write sample content showing the voice in action:
     - Website homepage hero
     - Blog post opening
     - Email newsletter excerpt
     - Social media post (LinkedIn)
     - Customer support response
     - Sales deck introduction slide

  Part 3: Training and governance (Months 4-5)
  1. Training program design:
     - Workshop agenda
     - Exercise materials
     - Voice competency assessment
  2. Governance setup:
     - Review workflow design
     - Voice champion program
     - Voice tools and technology recommendations
  3. Implementation support plan

  Part 4: Measurement and handoff (Month 6)
  1. Pre/post voice consistency comparison
  2. Content quality metrics
  3. Team competency scores
  4. Client satisfaction assessment
  5. Handoff documentation:
     - Everything the client receives
     - Self-sufficiency checklist
     - Ongoing recommendations
  6. Renewal proposal for year 2

assertions:
  - type: llm_judge
    criteria: "The engagement follows a professional consulting arc — each phase builds logically on the previous with clear deliverables and timelines"
    weight: 0.25
    description: "Professional engagement structure"
  - type: llm_judge
    criteria: "Sample content demonstrates the documented voice — all 6 samples are recognizably the same brand across different channels"
    weight: 0.25
    description: "Voice-consistent sample content"
  - type: llm_judge
    criteria: "Training and governance are designed for sustainability — the client can maintain voice consistency after the engagement ends"
    weight: 0.25
    description: "Sustainable voice system"
  - type: llm_judge
    criteria: "The engagement justifies its $120K budget — deliverables and scope are proportionate to the investment"
    weight: 0.25
    description: "Budget-justified engagement"
