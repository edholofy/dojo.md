meta:
  id: voice-innovation
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Innovate in brand voice documentation — new frameworks, interactive voice guides, voice-as-a-service models, and next-generation documentation approaches"
  tags: [brand-voice, innovation, frameworks, next-gen, creative, mastery]

state: {}

trigger: |
  Traditional brand voice documentation is a static PDF that
  nobody reads. Innovation in voice documentation means creating
  living, interactive, accessible systems that embed voice into
  workflows rather than requiring people to consult a manual.

  Part 1: Next-generation voice documentation formats
  Design 5 innovative voice documentation approaches:

  1. Interactive voice playground:
     - A web-based tool where writers type copy and get real-time
       voice feedback
     - Design the interface, features, and feedback logic
     - How it integrates with existing workflows

  2. Voice decision tree:
     - An interactive flowchart that guides writers to the right
       tone for any situation
     - Design the decision logic (situation → audience → emotion
       → recommended tone)
     - Write the copy for 15 decision nodes

  3. Voice audio library:
     - Recordings of brand copy read aloud in the correct tone
     - How listening to voice (literally) helps writers internalize it
     - Design the library structure and selection criteria

  4. Voice personality bot:
     - A chatbot trained on brand voice that writers can "ask"
       for voice guidance
     - Design the conversation flows for 5 common questions
     - How to build and maintain it

  5. Collaborative voice wiki:
     - A living, team-maintained voice knowledge base
     - Contribution guidelines and governance
     - How to keep it current and prevent drift

  Part 2: Voice-as-a-service
  Design a "voice-as-a-service" offering:
  1. Voice API concept:
     - Input: raw content + context
     - Output: on-brand content + voice score
  2. Voice integration in content tools:
     - How to embed voice checking in Google Docs, Figma, CMS
  3. Continuous voice monitoring:
     - Automated scanning of all published content
     - Drift alerts and trend reporting

  Part 3: Future of voice documentation
  1. How AI is transforming voice documentation
  2. Voice personalization (adapting voice to individual users)
  3. Multimodal voice (visual + written + audio + video consistency)
  4. Predictive voice analytics (what voice decisions will perform best)
  5. The end of static style guides

assertions:
  - type: llm_judge
    criteria: "Innovative formats are genuinely useful — they solve real problems with traditional voice documentation, not just add novelty"
    weight: 0.30
    description: "Genuinely useful innovations"
  - type: llm_judge
    criteria: "Voice decision tree logic is sound — the decision paths lead to appropriate tone recommendations for diverse situations"
    weight: 0.25
    description: "Sound decision tree logic"
  - type: llm_judge
    criteria: "Voice-as-a-service concept is technically feasible — the API design and tool integration plans are realistic with current technology"
    weight: 0.25
    description: "Technically feasible concepts"
  - type: llm_judge
    criteria: "Future predictions are informed and specific — they reflect actual trends in content technology and AI, not vague speculation"
    weight: 0.20
    description: "Informed future predictions"
