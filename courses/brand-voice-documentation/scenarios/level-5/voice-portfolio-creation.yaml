meta:
  id: voice-portfolio-creation
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Create a professional brand voice strategist portfolio — case studies, methodology showcase, voice samples, and client-ready presentation"
  tags: [brand-voice, portfolio, professional, case-study, career, mastery]

state: {}

trigger: |
  A brand voice strategist's portfolio demonstrates the ability
  to define, document, implement, and measure brand voice across
  diverse clients and industries. It must show strategic thinking,
  creative range, and measurable results.

  Build a complete portfolio for a brand voice strategist:

  Part 1: Case studies (create 4 fictional but realistic ones)

  Case Study 1: Voice creation for a startup
  Client: "ZenPay" — fintech startup, pre-launch
  Challenge: Defining voice from scratch for a regulated industry
  Process: Discovery → competitive analysis → voice definition
  Show: Voice document excerpt, 3 before/after content samples
  Results: Consistent voice across 8 channels from day one

  Case Study 2: Voice transformation
  Client: "Heritage Mills" — 80-year-old flour company
  Challenge: Modernizing voice without losing heritage character
  Process: Voice audit → evolution strategy → phased rollout
  Show: Old vs. new voice comparison across 5 content types
  Results: 40% increase in social engagement, 25% more email opens

  Case Study 3: Multi-brand voice architecture
  Client: "Summit Hospitality" — hotel group with 4 sub-brands
  Challenge: Creating distinct voices while maintaining portfolio coherence
  Process: Brand architecture → individual voice docs → governance
  Show: Same announcement in 4 different brand voices
  Results: Reduced content review cycles by 60%

  Case Study 4: Voice governance at scale
  Client: "TechNova" — enterprise software, 500+ employees
  Challenge: 80 content contributors creating inconsistent content
  Process: Audit → governance design → training → measurement
  Show: Consistency scores before and after
  Results: Voice consistency improved from 52% to 89%

  Part 2: Voice samples demonstrating range
  Create samples showing expertise in:
  1. Voice for 6 industries (one sample each)
  2. Tone adaptation (same brand, 4 emotional contexts)
  3. Channel adaptation (same message, 5 channels)
  4. Voice evolution (before/after transformation)

  Part 3: Portfolio presentation
  1. Portfolio structure and storytelling
  2. About page / personal brand voice
  3. Services and pricing overview
  4. Client testimonial integration
  5. Thought leadership content samples

assertions:
  - type: llm_judge
    criteria: "Case studies are compelling and realistic — they tell clear stories with credible challenges, processes, and results"
    weight: 0.30
    description: "Compelling realistic case studies"
  - type: llm_judge
    criteria: "Voice samples demonstrate genuine range — 6 industries sound distinctly different, tone adaptations are nuanced"
    weight: 0.25
    description: "Genuine demonstrated range"
  - type: llm_judge
    criteria: "Results are specific and credible — metrics like '40% increase in social engagement' and '60% reduced review cycles' are realistic"
    weight: 0.25
    description: "Credible specific results"
  - type: llm_judge
    criteria: "Portfolio presentation is itself well-voiced — the strategist's own brand voice is evident and professional"
    weight: 0.20
    description: "Well-voiced portfolio"
