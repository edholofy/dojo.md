meta:
  id: voice-psychology
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Apply psychology to brand voice — linguistic framing, cognitive biases in voice perception, emotional architecture, and persuasion through voice"
  tags: [brand-voice, psychology, linguistics, perception, persuasion, mastery]

state: {}

trigger: |
  Brand voice isn't just about consistency — it's about
  psychological impact. How a brand communicates shapes
  perception, trust, and behavior at a cognitive level.
  Understanding the psychology behind voice decisions
  elevates documentation from style guide to strategic asset.

  Part 1: The psychology of brand voice perception
  1. How voice creates brand personality in the mind:
     - Anthropomorphism and brand-human parallels
     - Voice familiarity and trust formation
     - The mere-exposure effect in voice consistency
     - How voice shapes memory and recall
  2. Linguistic framing in voice:
     - How word choice frames perception (premium vs. expensive)
     - Active vs. passive voice and agency perception
     - Inclusive language and belonging creation
     - Temporal framing (future-focused vs. present-focused)
  3. Write 5 pairs showing how framing changes perception:
     - Same fact, different voice framing
     - Explain the psychological mechanism at work

  Part 2: Cognitive biases and voice
  Show how 8 cognitive biases apply to voice documentation:
  1. Halo effect (voice quality → product quality perception)
  2. Anchoring (first impression voice sets expectations)
  3. Social proof (voice that signals community belonging)
  4. Authority bias (voice that establishes expertise)
  5. Loss aversion (voice framing for retention)
  6. Mere-exposure effect (consistency builds preference)
  7. Processing fluency (easy-to-read voice is perceived as more trustworthy)
  8. Narrative transportation (storytelling voice bypasses resistance)

  For each:
  - Explain the bias and its voice implications
  - Write a voice guideline based on this insight
  - Provide a do/don't example showing the bias in action

  Part 3: Ethical voice design
  1. The line between influence and manipulation in voice
  2. Dark patterns in voice documentation (what to avoid)
  3. Voice for vulnerable audiences (extra considerations)
  4. Transparency in persuasive voice
  5. Self-audit framework: "Is our voice ethically sound?"

assertions:
  - type: llm_judge
    criteria: "Psychology concepts are accurately applied to brand voice — cognitive biases and linguistic principles are correctly explained and connected to practical voice decisions"
    weight: 0.30
    description: "Accurately applied psychology"
  - type: llm_judge
    criteria: "Framing examples clearly demonstrate psychological impact — the same fact framed differently creates meaningfully different perceptions"
    weight: 0.25
    description: "Impactful framing examples"
  - type: llm_judge
    criteria: "Ethical framework is genuine — it draws clear lines between ethical influence and manipulation with specific criteria"
    weight: 0.25
    description: "Genuine ethical framework"
  - type: llm_judge
    criteria: "Voice guidelines derived from cognitive biases are practical — a writer could implement them without understanding the underlying psychology"
    weight: 0.20
    description: "Practical psychology-based guidelines"
