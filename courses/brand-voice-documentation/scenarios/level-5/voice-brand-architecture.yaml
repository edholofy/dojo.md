meta:
  id: voice-brand-architecture
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Design voice architecture for complex brand ecosystems — conglomerate portfolios, franchise systems, platform brands, and co-branded partnerships"
  tags: [brand-voice, architecture, complex, ecosystem, conglomerate, mastery]

state: {}

trigger: |
  The most complex voice challenges involve brand ecosystems
  where multiple brand types coexist — parent companies,
  subsidiaries, franchises, platforms hosting third-party
  brands, and co-branded partnerships. Each relationship
  type requires a different voice governance model.

  Design voice architecture for 3 complex brand ecosystems:

  Ecosystem 1: Franchise system
  Brand: "GreenLeaf Cafés" — 200 franchise locations
  Challenge: Franchisees create local content but must
  maintain brand consistency

  1. Voice governance for franchise systems:
     - What's centrally controlled vs. locally flexible
     - Template system for franchisee content
     - Local adaptation guidelines (regional language, events)
     - Quality assurance for franchisee-created content
  2. Franchisee voice toolkit:
     - Quick-reference voice card
     - Pre-approved caption templates (20 templates)
     - Local event caption builder
     - Prohibited content guidelines
  3. Write the same promotional message as:
     - Corporate version
     - Texas franchisee adaptation
     - New York City franchisee adaptation
     - Rural Oregon franchisee adaptation

  Ecosystem 2: Platform brand
  Brand: "MarketPlace Pro" — e-commerce platform hosting 10,000 sellers
  Challenge: Platform voice vs. seller voice coexistence

  1. Platform voice zones:
     - Platform-owned content (navigation, help, transactional)
     - Seller content zones (product listings, store pages)
     - Shared zones (reviews, Q&A, community)
  2. Seller voice guidelines:
     - What sellers must follow (safety, compliance, accuracy)
     - What sellers are free to determine (personality, style)
     - How platform voice and seller voice coexist on a page
  3. Platform moderation voice:
     - Content removal notification voice
     - Seller coaching communication voice
     - Policy update announcement voice

  Ecosystem 3: Co-branded partnership
  Brands: "AeroFit" (athletic wear) × "TuneStream" (music app)
  Challenge: Joint campaign where two distinct voices must merge

  1. Co-branded voice framework:
     - How to blend two voices without diluting either
     - Decision matrix (whose voice leads on which elements)
     - Visual-verbal coordination guidelines
  2. Write co-branded content:
     - Campaign landing page header
     - Social media announcement (on AeroFit's account)
     - Social media announcement (on TuneStream's account)
     - Joint email to both audiences
  3. Post-campaign voice separation:
     - How to return to individual voices after campaign ends

assertions:
  - type: llm_judge
    criteria: "Franchise voice governance balances consistency with local relevance — franchisees have enough freedom to be authentic while staying on-brand"
    weight: 0.25
    description: "Balanced franchise governance"
  - type: llm_judge
    criteria: "Platform voice architecture correctly delineates platform, seller, and shared content zones with appropriate guidelines for each"
    weight: 0.25
    description: "Clear platform voice zones"
  - type: llm_judge
    criteria: "Co-branded content successfully blends two distinct voices — neither brand is erased, and the combined voice feels natural"
    weight: 0.25
    description: "Successful voice blending"
  - type: llm_judge
    criteria: "Local franchise adaptations demonstrate genuine regional adaptation — the Texas version feels like Texas, NYC feels like NYC"
    weight: 0.25
    description: "Genuine regional adaptation"
