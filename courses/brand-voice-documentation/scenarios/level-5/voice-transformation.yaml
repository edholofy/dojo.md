meta:
  id: voice-transformation
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Execute a complete brand voice transformation — from legacy voice through research, strategy, documentation, training, rollout, and measurement"
  tags: [brand-voice, transformation, complete, end-to-end, rebrand, mastery]

state: {}

trigger: |
  A complete brand voice transformation touches every part
  of the organization. It requires research, strategy,
  documentation, training, implementation, and measurement —
  all while managing stakeholder expectations and minimizing
  disruption.

  Execute a complete voice transformation for:

  Brand: "Atlas Insurance Group" — regional insurance company
  Current state: 75 years old, 2,000 employees, 150K customers
  Current voice: Corporate, formal, jargon-heavy
  ("We are committed to providing comprehensive risk mitigation
  solutions that deliver superior value to our stakeholders.")
  Target: Modern, clear, human
  ("We make insurance make sense. No jargon, no fine print
  surprises — just straightforward protection for what matters.")

  Part 1: Research and strategy (Months 1-2)
  1. Voice landscape analysis:
     - Current voice assessment (with 10 sample before-examples)
     - Employee perception survey results
     - Customer perception survey results
     - Competitive voice positioning map
  2. Target voice strategy:
     - New voice descriptors with rationale
     - Tone spectrum definition
     - What changes and what stays from the old voice
     - Risk assessment (what could go wrong)

  Part 2: Documentation (Month 3)
  1. Complete new voice documentation:
     - Style guide structure and key sections
     - Voice chart with do/don't examples
     - Channel-specific guidelines (8 channels)
     - Word list with 20 "old → new" swaps
  2. Content transformation examples:
     - Transform 8 real content types from old to new voice:
       a) Policy explanation letter
       b) Claims process webpage
       c) Social media post
       d) Email newsletter
       e) Agent training material
       f) Customer complaint response
       g) Print advertisement
       h) Annual report excerpt

  Part 3: Rollout and measurement (Months 4-8)
  1. Training program:
     - Executive alignment session
     - Department-by-department rollout plan
     - Train-the-trainer program for 2,000 employees
     - Voice certification at 3 levels
  2. Content migration:
     - Priority content to update first
     - Migration timeline and resource plan
     - Quality checkpoints during migration
  3. Measurement:
     - Pre-transformation baseline metrics
     - Monthly progress tracking
     - 6-month transformation results
     - Customer and employee feedback synthesis
  4. Transformation communication:
     - Internal launch communication
     - Customer-facing announcement
     - Media/PR messaging about the change

assertions:
  - type: llm_judge
    criteria: "Before/after content transformations are dramatic yet authentic — old voice is genuinely corporate-stiff, new voice is genuinely clear and human"
    weight: 0.30
    description: "Dramatic authentic transformation"
  - type: llm_judge
    criteria: "The transformation addresses organizational complexity — 2,000 employees, 150K customers, and 75 years of legacy are accounted for"
    weight: 0.25
    description: "Organizationally aware transformation"
  - type: llm_judge
    criteria: "Training and rollout plan is realistic for scale — train-the-trainer for 2,000 employees with certification levels would actually work"
    weight: 0.25
    description: "Scalable training and rollout"
  - type: llm_judge
    criteria: "Measurement connects voice change to business outcomes — not just 'voice is more consistent' but impact on customer satisfaction, efficiency, and brand perception"
    weight: 0.20
    description: "Outcome-connected measurement"
