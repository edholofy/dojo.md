meta:
  id: voice-roi-framework
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Build a comprehensive voice ROI framework — connect voice investment to business outcomes, create executive business cases, and prove voice value"
  tags: [brand-voice, roi, business-case, executive, investment, mastery]

state: {}

trigger: |
  Voice documentation is an investment — and investments
  require ROI justification. Building a voice ROI framework
  means connecting voice quality to measurable business
  outcomes and creating executive-level business cases
  that secure ongoing voice investment.

  Build a comprehensive voice ROI framework:

  Part 1: The voice value chain
  1. Map the complete value chain:
     Voice documentation → Voice consistency → Brand perception →
     Customer behavior → Business outcomes
  2. For each link in the chain:
     - Measurable metrics
     - Data collection methods
     - Attribution methodology
     - Industry benchmarks
  3. Voice investment categories:
     - Initial documentation (one-time)
     - Training and enablement (ongoing)
     - Governance and tools (ongoing)
     - Evolution and optimization (periodic)
     - Calculate total cost of voice ownership (TCVO)

  Part 2: Executive business case
  Create a business case presentation for voice investment:
  Company: "Vertex Technologies" — $50M B2B SaaS company
  Currently spending: $0 on formal voice management
  Proposed investment: $150K year 1, $80K/year ongoing

  1. Executive summary (1 paragraph)
  2. Problem statement with evidence:
     - Content quality inconsistency examples
     - Brand perception survey data
     - Competitive disadvantage evidence
  3. Proposed solution and timeline
  4. Investment breakdown (what the money buys)
  5. Expected returns:
     - Content efficiency gains (reduced revision cycles)
     - Brand perception improvement
     - Customer acquisition cost reduction
     - Customer retention improvement
     - Employee productivity gains
  6. Risk mitigation
  7. ROI calculation with 3 scenarios:
     - Conservative (1.5x ROI)
     - Moderate (3x ROI)
     - Aggressive (5x ROI)
  8. Recommendation and next steps

  Part 3: Ongoing value measurement
  1. Quarterly voice value report template
  2. Annual voice investment review framework
  3. Voice value benchmarking against industry
  4. Connection to brand equity valuation
  5. Long-term voice investment strategy (3-year view)

assertions:
  - type: llm_judge
    criteria: "The value chain is logically connected — each link in voice → consistency → perception → behavior → outcomes is supported with metrics"
    weight: 0.25
    description: "Logically connected value chain"
  - type: llm_judge
    criteria: "Executive business case is compelling — a CFO would find the ROI calculations credible and the investment justified"
    weight: 0.30
    description: "Compelling executive business case"
  - type: llm_judge
    criteria: "ROI scenarios are realistic — conservative returns don't oversell, aggressive returns are achievable, all are backed by reasoning"
    weight: 0.25
    description: "Realistic ROI scenarios"
  - type: llm_judge
    criteria: "Ongoing measurement framework would sustain investment — quarterly reports and annual reviews keep voice on the executive agenda"
    weight: 0.20
    description: "Sustainable measurement framework"
