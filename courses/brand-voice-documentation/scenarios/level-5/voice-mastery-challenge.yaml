meta:
  id: voice-mastery-challenge
  level: 5
  course: brand-voice-documentation
  type: output
  description: "Complete mastery challenge — demonstrate expertise across every aspect of brand voice documentation in a comprehensive multi-brand exercise"
  tags: [brand-voice, mastery, challenge, comprehensive, portfolio, mastery]

state: {}

trigger: |
  This mastery challenge tests your ability to apply brand voice
  documentation expertise across diverse brands, industries,
  and challenges. Each task requires a different combination of
  skills — from foundation building to crisis management to
  measurement.

  Complete 8 brand voice documentation challenges:

  Challenge 1: Voice from scratch
  Brand: "Nimbus" — a cloud storage startup (no existing voice)
  Task: Create a complete voice document in 2 pages (voice descriptors,
  chart, tone spectrum, word lists, style conventions, 3 sample messages)

  Challenge 2: Voice forensics
  Given only these 3 content samples, reverse-engineer the brand voice:
  a) "Your morning coffee shouldn't be complicated. We obsess over
  the details so you can just enjoy the cup."
  b) "Behind every bean is a farmer's story. We pay 40% above fair
  trade because great coffee starts with great partnerships."
  c) "Brewing tip: water temperature matters more than you think.
  195-205°F extracts the best flavors. Too hot, and you'll taste
  bitterness. Too cool, and the flavors stay trapped."
  Define: voice descriptors, archetype, tone, and audience

  Challenge 3: Voice translation
  Same message: "We're raising prices 15% starting March 1"
  Write this message in 5 different brand voices:
  - Luxury watch brand
  - Budget airline
  - Indie game studio
  - Law firm
  - Children's toy company

  Challenge 4: Voice conflict resolution
  A startup's CEO wants "edgy and provocative" voice.
  The CMO wants "professional and trustworthy."
  The head of support wants "warm and empathetic."
  Mediate: create a unified voice that satisfies all three.

  Challenge 5: Voice crisis pivot
  A normally playful pet food brand faces a contamination recall.
  Write the crisis communication and document the voice rules
  for the crisis period.

  Challenge 6: Voice for a regulated industry
  Create voice guidelines for a pharmaceutical company that must
  include FDA-required language in all consumer communications
  while still sounding human and caring.

  Challenge 7: Voice measurement dashboard
  Design a voice performance dashboard showing metrics that
  connect voice consistency to business outcomes.

  Challenge 8: Voice evolution pitch
  A 50-year-old insurance company needs to reach millennials
  without alienating their existing customers. Pitch the voice
  evolution strategy.

assertions:
  - type: llm_judge
    criteria: "All 8 challenges demonstrate mastery — each solution shows deep expertise appropriate to the specific challenge"
    weight: 0.30
    description: "Consistent mastery across challenges"
  - type: llm_judge
    criteria: "Voice translation exercise shows genuine range — the 5 versions of the price increase sound authentically different"
    weight: 0.25
    description: "Genuine voice range"
  - type: llm_judge
    criteria: "Conflict resolution produces a workable unified voice — the compromise doesn't feel like a compromise but a genuine integration"
    weight: 0.25
    description: "Effective voice conflict resolution"
  - type: llm_judge
    criteria: "Voice forensics accurately reverse-engineers the brand — the descriptors and archetype match the evidence in the samples"
    weight: 0.20
    description: "Accurate voice forensics"
