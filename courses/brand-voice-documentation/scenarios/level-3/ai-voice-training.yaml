meta:
  id: ai-voice-training
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Train AI tools on brand voice — create training materials, quality control systems, and human-AI collaboration workflows for voice consistency"
  tags: [brand-voice, ai, training, automation, quality-control, advanced]

state: {}

trigger: |
  AI tools can help maintain brand voice at scale — but only
  if they're trained properly. Poor AI voice training produces
  generic content that sounds like every other AI-generated
  brand. Effective training requires good data, clear guidelines,
  and robust quality control.

  Design an AI voice training system for:
  Brand: "Artisan & Co." — handcrafted home goods brand
  Voice: Warm, craftsmanship-proud, storytelling-focused
  AI use cases: Social media captions, product descriptions,
  email drafts, blog outlines

  Part 1: AI training materials preparation
  1. Training data collection:
     - Minimum content requirements (15,000+ words of on-brand content)
     - Best examples to include (highest-performing, most on-brand)
     - What to exclude (off-brand content, old voice, user-generated)
  2. Voice prompt engineering:
     - Master voice prompt (the voice brief for AI)
     - Channel-specific prompts (social, email, product, blog)
     - Write the actual prompts with voice instructions
  3. Reference examples:
     - 5 "gold standard" examples per content type
     - Annotated with voice notes (why this is on-brand)

  Part 2: AI output quality control
  1. Review checklist for AI-generated content (12 items)
  2. Common AI voice problems and how to fix them:
     - Over-enthusiasm (too many exclamation marks)
     - Generic phrasing ("elevate your experience")
     - Missing brand-specific language
     - Inconsistent tone
     - Lack of specificity
  3. Before/after AI editing:
     - Show 5 AI outputs and their human-edited versions
     - Annotate what was changed and why
  4. Scoring rubric for AI voice accuracy

  Part 3: Human-AI collaboration workflow
  1. Optimal workflow: AI generates → human reviews → human
     personalizes → publish
  2. Which content AI handles well vs. which needs full human writing
  3. How to improve AI output over time (feedback loops)
  4. Voice consistency monitoring for AI-generated content
  5. When to override AI (situations requiring full human voice)

assertions:
  - type: llm_judge
    criteria: "Voice prompts are well-crafted — they capture Artisan & Co.'s specific personality, not generic brand voice instructions"
    weight: 0.25
    description: "Well-crafted voice prompts"
  - type: llm_judge
    criteria: "AI quality control identifies real problems — the common issues listed are actual AI voice weaknesses, not theoretical concerns"
    weight: 0.25
    description: "Real AI voice problems identified"
  - type: llm_judge
    criteria: "Before/after editing examples show meaningful improvements — human edits add genuine brand personality that AI missed"
    weight: 0.25
    description: "Meaningful human editing value"
  - type: llm_judge
    criteria: "Human-AI workflow is practical and honest about limitations — it doesn't oversell AI capabilities or dismiss AI value"
    weight: 0.25
    description: "Practical honest AI workflow"
