meta:
  id: voice-governance
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Design voice governance for organizations — approval workflows, decision rights, compliance frameworks, and voice council structures"
  tags: [brand-voice, governance, organization, compliance, workflows, advanced]

state: {}

trigger: |
  As organizations grow, voice consistency becomes a governance
  challenge. Who approves voice changes? Who decides if content
  is on-brand? How do you enforce consistency without creating
  bottlenecks? Voice governance balances control with agility.

  Design a voice governance framework for:
  "TerraForge" — a mid-size B2B SaaS company (300 employees)
  Content creators: 45 people across marketing (12), sales (15),
  support (10), product (5), HR (3)
  Current state: No formal voice governance, significant inconsistency

  Part 1: Governance structure
  1. Voice Council:
     - Composition (which roles, how many members)
     - Meeting cadence and agenda
     - Decision-making process (consensus, majority, authority)
     - Charter document
  2. Decision rights matrix (RACI):
     - Who decides on voice changes? (Responsible, Accountable,
       Consulted, Informed for 10 different voice decisions)
  3. Escalation path:
     - When content is disputed as off-brand
     - When a department wants to modify voice for their channel
     - When executive requests conflict with voice guidelines

  Part 2: Approval workflows
  Design tiered approval for different content types:
  Tier 1 (Self-approved): Daily social posts, routine emails
  Tier 2 (Peer review): Blog posts, newsletters, sales decks
  Tier 3 (Voice lead): Campaign copy, website changes, press releases
  Tier 4 (Council review): Voice guideline changes, rebrand initiatives

  For each tier:
  - What content falls in this tier
  - Who reviews and how
  - Turnaround time expectations
  - What to do when deadlines conflict with review

  Part 3: Compliance and enforcement
  1. Voice compliance training program (by department)
  2. Consequence framework (what happens when voice is violated)
  3. Voice compliance in vendor/agency management
  4. Legal and regulatory voice considerations
  5. Annual voice governance review and improvement process

assertions:
  - type: llm_judge
    criteria: "Governance structure balances control with agility — it prevents voice drift without creating bureaucratic bottlenecks that slow down content production"
    weight: 0.30
    description: "Balanced governance structure"
  - type: llm_judge
    criteria: "RACI matrix is complete and logical — decision rights for 10 voice decisions are clearly assigned across appropriate roles"
    weight: 0.25
    description: "Complete logical RACI matrix"
  - type: llm_judge
    criteria: "Tiered approval is practical — the tier assignments make sense (routine content needs less oversight than strategic changes)"
    weight: 0.25
    description: "Practical tiered approval"
  - type: llm_judge
    criteria: "Framework accounts for the reality of 45 content creators across 5 departments — it's designed for organizational complexity, not ideal conditions"
    weight: 0.20
    description: "Organizationally realistic"
