meta:
  id: competitive-voice-analysis
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Analyze competitor brand voices — reverse-engineer voice strategies, identify differentiation opportunities, and position your voice in the competitive landscape"
  tags: [brand-voice, competitive, analysis, differentiation, positioning, advanced]

state: {}

trigger: |
  Competitive voice analysis reveals how your brand sounds
  relative to competitors — and where opportunities exist for
  differentiation. If every competitor sounds "friendly and
  innovative," there's an opportunity to sound "bold and direct."

  Conduct a competitive voice analysis for "FinTrack" — a
  personal budgeting app entering a crowded market:

  Competitors to analyze:
  1. Mint (established, educational)
  2. YNAB (methodical, community-driven)
  3. Copilot (modern, premium-feeling)
  4. Monarch Money (sophisticated, comprehensive)
  5. Goodbudget (simple, envelope-method focused)

  Part 1: Voice characterization
  For each competitor, analyze:
  1. Voice descriptors (3-5 adjectives)
  2. Tone spectrum position (on NN's 4 dimensions)
  3. Language register (formal/casual/mixed)
  4. Vocabulary sophistication level
  5. Emotional appeal (logic vs. emotion spectrum)
  6. Personality archetype
  7. Signature voice elements (what makes them recognizable)
  8. One representative sample quote

  Create a competitive voice map (positioning matrix) showing
  all 5 competitors on 2 key dimensions.

  Part 2: White space identification
  1. Voice territories no competitor occupies
  2. Underserved audience voice preferences
  3. Channel-specific voice gaps
  4. Emotional territory not claimed by any competitor
  5. Tonal positions available for FinTrack

  Part 3: FinTrack's differentiated voice
  Based on the analysis:
  1. Define FinTrack's voice descriptors (4)
  2. Explain why this voice differentiates in the market
  3. Write the same message (budget alert notification)
     in all 5 competitor voices, then in FinTrack's voice
  4. Voice positioning statement explaining how FinTrack
     sounds different and why that matters

assertions:
  - type: llm_judge
    criteria: "Competitor voices are accurately characterized — each analysis reflects how these brands actually communicate, not generic assumptions"
    weight: 0.25
    description: "Accurate competitor characterization"
  - type: llm_judge
    criteria: "White space identification reveals genuine differentiation opportunities — the unclaimed territories are specific and actionable"
    weight: 0.25
    description: "Genuine differentiation opportunities"
  - type: llm_judge
    criteria: "The 6 versions of the same message (5 competitors + FinTrack) demonstrate clear voice differences — each sounds distinctly different"
    weight: 0.30
    description: "Demonstrably different voices"
  - type: llm_judge
    criteria: "FinTrack's voice strategy is competitively informed — it clearly responds to gaps identified in the analysis"
    weight: 0.20
    description: "Analysis-informed voice strategy"
