meta:
  id: industry-specific-voice
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Develop industry-specific voice guidelines — navigate regulatory constraints, professional expectations, and sector norms across healthcare, finance, tech, and luxury"
  tags: [brand-voice, industry, healthcare, finance, tech, luxury, advanced]

state: {}

trigger: |
  Different industries impose different voice constraints.
  Healthcare requires compliance with patient communication
  standards. Finance must balance trust with regulations.
  Tech must explain complexity without condescension. Luxury
  must convey exclusivity without alienation.

  Create industry-specific voice documentation for 4 industries:

  Industry 1: Healthcare
  Brand: "MedConnect" — patient portal and telehealth platform
  Create voice guidelines addressing:
  1. Balancing warmth with medical authority
  2. HIPAA-compliant language considerations
  3. Health literacy levels (plain language requirements)
  4. Sensitive health topic communication
  5. Example: Diagnosis follow-up message in brand voice

  Industry 2: Financial services
  Brand: "Pinnacle Wealth" — digital wealth management
  Create voice guidelines addressing:
  1. Building trust through voice (authority without intimidation)
  2. Regulatory disclaimer integration without breaking flow
  3. Explaining complex products in accessible language
  4. Risk communication voice conventions
  5. Example: Market downturn communication in brand voice

  Industry 3: B2B Technology
  Brand: "DataLoom" — enterprise data integration platform
  Create voice guidelines addressing:
  1. Technical expertise without jargon overload
  2. Buyer persona voice adaptation (CTO vs. analyst vs. procurement)
  3. Competitive positioning language rules
  4. Product naming and feature terminology governance
  5. Example: Product launch announcement in brand voice

  Industry 4: Luxury
  Brand: "Maison Aurelia" — luxury skincare
  Create voice guidelines addressing:
  1. Conveying premium positioning through language choices
  2. Exclusivity without arrogance
  3. Sensory and aspirational language guidelines
  4. Cultural sensitivity in luxury messaging
  5. Example: New product launch caption in brand voice

assertions:
  - type: llm_judge
    criteria: "Each industry's voice guidelines reflect genuine sector-specific challenges — healthcare addresses health literacy, finance addresses regulatory compliance"
    weight: 0.30
    description: "Genuine industry challenges"
  - type: llm_judge
    criteria: "Example messages are on-brand AND compliant — the healthcare message is warm yet medically appropriate, the finance message addresses risk responsibly"
    weight: 0.25
    description: "Compliant on-brand examples"
  - type: llm_judge
    criteria: "Voice guidelines would differentiate each brand within their industry — they don't just describe generic industry norms"
    weight: 0.25
    description: "Brand-differentiating guidelines"
  - type: llm_judge
    criteria: "Regulatory and compliance considerations are specific and practical — not just 'follow regulations' but actual language guidance"
    weight: 0.20
    description: "Specific compliance guidance"
