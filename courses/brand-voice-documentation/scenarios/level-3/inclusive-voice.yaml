meta:
  id: inclusive-voice
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Create inclusive voice guidelines — accessible language, cultural sensitivity, neurodiversity considerations, and diverse audience representation"
  tags: [brand-voice, inclusive, accessible, diversity, sensitivity, advanced]

state: {}

trigger: |
  Inclusive voice documentation ensures brand communication
  works for everyone — regardless of ability, background,
  language proficiency, or cultural context. Research shows
  61% of consumers prefer brands that represent various cultures.

  Create inclusive voice guidelines for:
  Brand: "Luminary Learning" — global online education platform
  Audience: Learners worldwide, ages 16-65, diverse backgrounds

  Part 1: Accessibility in voice
  1. Plain language guidelines:
     - Target reading level (with rationale)
     - Sentence length and structure rules
     - Jargon handling policy
     - 5 before/after rewrites (complex → accessible)
  2. Neurodiversity considerations:
     - Consistent terminology (avoid synonyms for key terms)
     - Clear, literal language (avoid idioms that confuse)
     - Predictable structure and formatting
     - Sensory language awareness
  3. Screen reader and assistive technology:
     - Alt text voice guidelines
     - Link text conventions
     - Heading hierarchy voice considerations

  Part 2: Cultural sensitivity
  1. Inclusive language principles:
     - Gender-neutral language standards
     - Race and ethnicity language guidelines
     - Disability and ability language
     - Age-related language
     - Socioeconomic sensitivity
  2. Global audience considerations:
     - Humor that translates (and humor that doesn't)
     - Idioms and colloquialisms policy
     - Cultural reference guidelines
     - Holiday and event sensitivity
  3. "Say this, not that" inclusive language list:
     - 20 pairs showing outdated/insensitive terms and
       their inclusive replacements with explanations

  Part 3: Implementation
  1. Inclusive voice review checklist (15 items)
  2. Training module for content creators
  3. Feedback mechanism for reporting non-inclusive language
  4. Regular audit process for inclusive voice compliance
  5. Staying current with evolving language norms

assertions:
  - type: llm_judge
    criteria: "Accessibility guidelines are specific and implementable — reading level targets, sentence length rules, and before/after examples give writers concrete guidance"
    weight: 0.25
    description: "Specific accessibility guidelines"
  - type: llm_judge
    criteria: "Cultural sensitivity guidelines are nuanced — they avoid both insensitivity AND over-correction that feels performative"
    weight: 0.30
    description: "Nuanced cultural sensitivity"
  - type: llm_judge
    criteria: "Inclusive language list reflects current best practices — terms and recommendations are up-to-date and well-reasoned"
    weight: 0.25
    description: "Current inclusive language"
  - type: llm_judge
    criteria: "Implementation plan is practical — the review checklist, training, and feedback mechanism would work in a real organization"
    weight: 0.20
    description: "Practical implementation plan"
