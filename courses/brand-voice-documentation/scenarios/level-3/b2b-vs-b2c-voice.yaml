meta:
  id: b2b-vs-b2c-voice
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Navigate B2B vs. B2C voice documentation — adapt voice frameworks for enterprise audiences, complex buying committees, and professional contexts"
  tags: [brand-voice, b2b, b2c, enterprise, professional, advanced]

state: {}

trigger: |
  B2B voice documentation faces unique challenges: multiple
  buyer personas, longer sales cycles, complex products, and
  the perception that "professional" means "boring." The best
  B2B voices are authoritative without being stiff, expert
  without being jargon-heavy, and human without being casual.

  Part 1: B2B vs. B2C voice comparison
  Create a detailed comparison across 10 dimensions:
  1. Tone formality spectrum
  2. Emotional vs. rational appeal balance
  3. Technical language handling
  4. Decision-maker adaptation (one buyer vs. buying committee)
  5. Content length and depth expectations
  6. Humor appropriateness
  7. Urgency and CTA conventions
  8. Trust-building mechanisms
  9. Storytelling approaches
  10. Social media voice differences

  Part 2: B2B voice documentation
  For "QuantumScale" (enterprise cloud infrastructure, selling to
  CTOs, VPs of Engineering, and procurement teams):

  1. Audience-specific voice modules:
     - CTO persona: Strategic, visionary, peer-to-peer
     - VP of Engineering persona: Technical, practical, detailed
     - Procurement persona: ROI-focused, clear, compliant
  2. Voice by content type:
     - Website homepage (broad appeal)
     - Technical white paper (deep expertise)
     - Sales deck (persuasive authority)
     - Case study (proof-driven storytelling)
     - LinkedIn post (thought leadership)
  3. Write the same product announcement for each persona,
     showing how voice adapts while staying on-brand

  Part 3: B2B voice pitfalls
  Identify and fix 8 common B2B voice mistakes:
  1. Being too corporate (with correction)
  2. Over-using jargon (with correction)
  3. Hiding behind passive voice (with correction)
  4. Being too casual for enterprise (with correction)
  5. Ignoring emotional drivers in B2B decisions
  6. One-size-fits-all for different personas
  7. Competitor bashing disguised as differentiation
  8. Feature-dumping without benefit framing

assertions:
  - type: llm_judge
    criteria: "B2B vs. B2C comparison is nuanced — it avoids the oversimplification that B2B is just 'more formal B2C'"
    weight: 0.25
    description: "Nuanced B2B-B2C comparison"
  - type: llm_judge
    criteria: "Persona-specific messages for the same announcement sound naturally different — the CTO version is strategic, procurement version is ROI-focused"
    weight: 0.30
    description: "Effective persona adaptation"
  - type: llm_judge
    criteria: "B2B voice pitfalls are insightful — they identify real problems that B2B brands commonly face, not generic advice"
    weight: 0.25
    description: "Insightful pitfall identification"
  - type: llm_judge
    criteria: "QuantumScale's voice across content types is authoritative yet human — white papers and case studies sound expert without being impersonal"
    weight: 0.20
    description: "Authoritative yet human B2B voice"
