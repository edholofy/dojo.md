meta:
  id: voice-for-crisis
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Document voice guidelines for crisis communication — define crisis tone, create response templates, and establish voice protocols for sensitive situations"
  tags: [brand-voice, crisis, communication, sensitive, response, advanced]

state: {}

trigger: |
  Crisis communication requires a distinct voice approach. The
  regular brand voice may be playful or casual — but during a
  crisis, tone must shift dramatically while still sounding
  authentically like the brand. Pre-documented crisis voice
  guidelines prevent panic-driven, off-brand responses.

  Create crisis voice documentation for:
  Brand: "Harmony Music" — music streaming platform (casual,
  creative, music-loving brand voice normally)

  Part 1: Crisis voice framework
  1. How crisis voice differs from everyday voice:
     - What personality traits amplify in crisis (empathy, transparency)
     - What personality traits diminish (humor, playfulness)
     - What new elements appear (accountability, urgency, clarity)
  2. Crisis tone spectrum:
     - Level 1 (Minor): Service hiccup, minor bug (adjusted normal voice)
     - Level 2 (Moderate): Significant outage, billing error (serious but calm)
     - Level 3 (Major): Data breach, safety issue (full crisis mode)
     - Level 4 (Critical): Legal, ethical, or life-safety issue
  3. For each level, define voice adjustments with examples

  Part 2: Crisis communication templates
  Write crisis voice templates for 5 scenarios:

  Scenario 1: Platform outage (Level 2)
  - Initial acknowledgment (social media + app notification)
  - Update communication (email)
  - Resolution announcement
  - Post-mortem follow-up

  Scenario 2: Data breach (Level 3)
  - Disclosure communication (email + website)
  - FAQ communication
  - Recovery narrative (1 week later)

  Scenario 3: Controversial content on platform (Level 2)
  - Response to public criticism
  - Action statement
  - Policy update announcement

  Scenario 4: Artist/partner controversy (Level 2)
  - Acknowledgment statement
  - Decision communication
  - Community response

  Scenario 5: Employee misconduct (Level 3)
  - Public response
  - Internal communication (voice differences)
  - Return to normal guidelines

  Part 3: Crisis voice governance
  1. Who speaks during a crisis (roles and responsibilities)
  2. Approval workflows for crisis communications
  3. Regular content pause protocol
  4. Return to normal voice transition guide
  5. Post-crisis voice assessment process

assertions:
  - type: llm_judge
    criteria: "Crisis voice maintains brand identity — Harmony Music is recognizable even in crisis mode, not replaced by generic corporate speak"
    weight: 0.25
    description: "Brand identity in crisis"
  - type: llm_judge
    criteria: "Crisis levels are well-calibrated — each level requires a proportional voice shift, not an overreaction or underreaction"
    weight: 0.25
    description: "Well-calibrated crisis levels"
  - type: llm_judge
    criteria: "Templates are immediately usable — a team facing a real crisis could adapt these quickly without starting from scratch"
    weight: 0.25
    description: "Immediately usable templates"
  - type: llm_judge
    criteria: "Return to normal guidance is specific — it addresses the awkward transition from crisis voice back to regular brand voice"
    weight: 0.25
    description: "Specific normalization guidance"
