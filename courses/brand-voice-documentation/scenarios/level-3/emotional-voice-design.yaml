meta:
  id: emotional-voice-design
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Design emotionally intelligent voice frameworks — map emotional responses to voice choices, create sentiment-aware guidelines, and build empathy systems"
  tags: [brand-voice, emotional, empathy, sentiment, psychology, advanced]

state: {}

trigger: |
  The best brand voices aren't just consistent — they're
  emotionally intelligent. They read the room, match the
  moment, and create the right feeling. Emotional voice
  design maps voice choices to desired emotional outcomes.

  Design an emotionally intelligent voice framework for:
  Brand: "Waypoint" — a career transition and job search platform
  Users experience: anxiety, frustration, hope, rejection,
  excitement, imposter syndrome, relief

  Part 1: Emotional landscape mapping
  1. Map the emotional journey of a typical user:
     - Stage 1: Considering a career change (uncertainty, hope)
     - Stage 2: Active job searching (motivation, frustration)
     - Stage 3: Applying and interviewing (anxiety, excitement)
     - Stage 4: Facing rejection (disappointment, self-doubt)
     - Stage 5: Getting an offer (relief, excitement, nervousness)
  2. For each stage, define:
     - User's emotional state
     - Voice tone that matches this state
     - Words that help vs. words that hurt
     - 2 example messages appropriate for this stage

  Part 2: Sentiment-responsive voice
  Create voice guidelines for 6 emotional scenarios:
  1. User just got rejected from a job:
     - What to say, what NOT to say
     - Example push notification, email, and in-app message
  2. User hasn't logged in for 2 weeks:
     - Re-engagement without guilt-tripping
     - Example email and push notification
  3. User completed their profile:
     - Encouraging without being condescending
     - Example success message
  4. User's subscription is about to expire:
     - Renewal prompt without desperation
     - Example email and in-app message
  5. User got an interview:
     - Celebrating without overpromising
     - Example notification and email
  6. User has been searching for 3+ months:
     - Sustained encouragement without toxic positivity
     - Example message acknowledging the difficulty

  Part 3: Emotional voice principles
  1. Empathy calibration guide (too little → condescending,
     too much → patronizing — how to find the right level)
  2. Avoiding toxic positivity in brand voice
  3. Acknowledging difficulty without creating despair
  4. When to use humor and when to avoid it
  5. Emotional voice quality assessment rubric

assertions:
  - type: llm_judge
    criteria: "Emotional mapping is psychologically aware — the stages and emotional states reflect genuine user experiences, not oversimplified feelings"
    weight: 0.25
    description: "Psychologically aware mapping"
  - type: llm_judge
    criteria: "Sentiment-responsive messages strike the right emotional tone — rejection messages are supportive without minimizing, success messages celebrate without overpromising"
    weight: 0.30
    description: "Appropriate emotional tone"
  - type: llm_judge
    criteria: "The re-engagement and subscription renewal messages avoid manipulation — they re-engage without guilt and prompt renewal without desperation"
    weight: 0.25
    description: "Non-manipulative engagement"
  - type: llm_judge
    criteria: "Empathy calibration guide is nuanced — it identifies the specific point where empathy becomes patronizing with concrete examples"
    weight: 0.20
    description: "Nuanced empathy calibration"
