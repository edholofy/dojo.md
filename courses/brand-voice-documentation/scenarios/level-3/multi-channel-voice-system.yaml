meta:
  id: multi-channel-voice-system
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Build a cross-channel voice management system — unified voice framework with channel-specific modules, coordination workflows, and consistency monitoring"
  tags: [brand-voice, multi-channel, system, framework, coordination, advanced]

state: {}

trigger: |
  Managing voice across 8-12 channels requires a system, not
  just guidelines. A multi-channel voice system defines the
  relationship between master voice and channel adaptations,
  creates coordination workflows, and monitors consistency
  at scale.

  Build a cross-channel voice management system for:
  Brand: "Elevate Health" — telehealth platform
  Channels: Website, mobile app, email (marketing + transactional),
  social media (4 platforms), blog, help center, chatbot, SMS,
  podcast, print materials

  Part 1: Voice architecture
  1. Master voice document (the unchanging core)
  2. Channel modules (specific adaptations for each of 12 channels):
     - What elements inherit from master vs. what's unique
     - Channel-specific tone positions
     - Format constraints and their voice implications
  3. Voice hierarchy:
     - When channel adaptation conflicts with master voice, which wins?
     - Decision framework for edge cases

  Part 2: Channel coordination
  1. Cross-channel campaign voice planning:
     - How a campaign message adapts across all 12 channels
     - Write a product launch message for 6 different channels
  2. Content repurposing voice guidelines:
     - How to adapt a blog post into social, email, and SMS
     - What changes and what stays
  3. Customer journey voice continuity:
     - Mapping voice across the customer journey touchpoints
     - Ensuring no jarring voice shifts as customers move between channels

  Part 3: Consistency monitoring
  1. Monthly cross-channel consistency audit process
  2. Automated checks (what can be measured systematically)
  3. Voice drift alerts (early warning signs)
  4. Quarterly voice alignment report template

assertions:
  - type: llm_judge
    criteria: "Voice architecture clearly separates master voice from channel adaptations — the hierarchy and inheritance model is logical and practical"
    weight: 0.25
    description: "Clear voice architecture"
  - type: llm_judge
    criteria: "The 6-channel message adaptation demonstrates real adaptation — each version is appropriate for its channel while carrying the same core message"
    weight: 0.30
    description: "Effective cross-channel adaptation"
  - type: llm_judge
    criteria: "Customer journey voice continuity is well-designed — the voice flows naturally as a customer moves from website to app to email to support"
    weight: 0.25
    description: "Smooth journey voice continuity"
  - type: llm_judge
    criteria: "Monitoring systems would catch voice drift before it becomes a problem — audit processes and alerts are specific and actionable"
    weight: 0.20
    description: "Effective drift detection"
