meta:
  id: voice-evolution
  level: 3
  course: brand-voice-documentation
  type: output
  description: "Plan and execute brand voice evolution — refresh strategies, audience testing, rollout plans, and change management for voice updates"
  tags: [brand-voice, evolution, refresh, change-management, strategy, advanced]

state: {}

trigger: |
  Brand voice isn't static — it evolves with the brand, audience,
  and culture. A planned evolution maintains continuity while
  keeping the voice relevant. An unplanned evolution creates
  inconsistency and confusion.

  Plan a voice evolution for:
  Brand: "CoreFit" — fitness app (5 years old, 200K users)
  Current voice: Motivational drill-sergeant ("Push harder!
  No excuses! Crush your goals!")
  Problem: Users report feeling shamed, new audience segment
  (wellness-focused, not just hardcore fitness) is growing
  Target voice: Encouraging coach ("You showed up — that's what
  matters. Let's build on yesterday.")

  Part 1: Voice evolution strategy
  1. Voice audit of current state:
     - What's working (keep this)
     - What's not working (change this)
     - What's missing (add this)
  2. Target voice definition:
     - New voice descriptors
     - New tone spectrum
     - Updated word lists (retired words, new additions)
  3. Evolution timeline:
     - Phase 1: Internal alignment (weeks 1-4)
     - Phase 2: Gradual rollout (weeks 5-12)
     - Phase 3: Full implementation (weeks 13-16)
     - Phase 4: Measurement (weeks 17-20)

  Part 2: Before/after transformations
  Show the voice evolution across 8 content types:
  1. Push notification (workout reminder)
  2. Social media post (motivation Monday)
  3. Email (re-engagement for lapsed users)
  4. In-app message (missed workout)
  5. Blog post opening (new workout program)
  6. Customer support response (cancellation request)
  7. Error message (payment failed)
  8. Success celebration (completed 30-day challenge)

  For each, show the old version and the new version with
  annotations explaining what changed and why.

  Part 3: Change management
  1. Internal communication plan (how to announce the change)
  2. Team training on new voice
  3. Content migration plan (updating existing content)
  4. User communication about the shift
  5. Success metrics for the evolution

assertions:
  - type: llm_judge
    criteria: "The evolution maintains what works while fixing what doesn't — the encouraging coach keeps the energy of the drill sergeant without the shame"
    weight: 0.30
    description: "Balanced evolution"
  - type: llm_judge
    criteria: "Before/after examples clearly demonstrate the shift — old versions feel pushy, new versions feel supportive, but both feel like a fitness brand"
    weight: 0.30
    description: "Clear before/after demonstration"
  - type: llm_judge
    criteria: "The evolution timeline is realistic — phased rollout with measurement prevents jarring transitions"
    weight: 0.20
    description: "Realistic evolution timeline"
  - type: llm_judge
    criteria: "Change management addresses real challenges — team buy-in, content migration, and user communication are practically addressed"
    weight: 0.20
    description: "Practical change management"
