meta:
  id: first-voice-document
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Create a complete basic brand voice document — combine all foundational elements into a cohesive, usable reference guide"
  tags: [brand-voice, document, complete, reference, capstone, basics]

state: {}

trigger: |
  A brand voice document brings together all the elements —
  personality, descriptors, tone spectrum, word lists, voice
  chart, grammar conventions — into a single reference that
  any writer can use to produce on-brand content.

  Create a complete brand voice document for:
  Brand: "Sage & Stone" — a wellness and mindfulness app
  Audience: Stressed professionals seeking calm and balance
  Brand personality: Like a wise friend who's been through it —
  calm, knowing, gently encouraging, never preachy

  The document should include:

  1. Brand voice overview (1 paragraph describing the voice)
  2. Brand personality profile:
     - Primary archetype with explanation
     - Aaker dimension scores
  3. Voice descriptors (4 descriptors):
     - Descriptor, definition, what it means, what it doesn't mean
  4. Voice chart (table format):
     - Descriptor | Description | Do | Don't
  5. Tone spectrum:
     - Default positions on 4 dimensions
     - Tone shifts by scenario (4 scenarios)
  6. Word lists:
     - 8 branded terms
     - 10 "say this, not that" pairs
     - 6 banned words with reasons
  7. Grammar and style conventions (8 rules)
  8. Sample content:
     - Push notification
     - Email subject line + first paragraph
     - App onboarding screen copy
     - Social media post

  The entire document should be 2-4 pages (concise, scannable,
  not a 50-page manual nobody reads).

assertions:
  - type: llm_judge
    criteria: "The document is comprehensive yet concise — it covers all essential elements without becoming a bloated manual"
    weight: 0.25
    description: "Comprehensive yet concise"
  - type: llm_judge
    criteria: "All elements work together cohesively — voice descriptors, word lists, grammar rules, and sample content all reinforce the same personality"
    weight: 0.30
    description: "Cohesive voice system"
  - type: llm_judge
    criteria: "A new freelance writer could produce on-brand content using only this document — it provides enough guidance without overwhelming"
    weight: 0.25
    description: "Practically usable document"
  - type: llm_judge
    criteria: "Sample content demonstrates the documented voice — push notifications, emails, and social posts all sound like Sage & Stone"
    weight: 0.20
    description: "Voice-consistent samples"
