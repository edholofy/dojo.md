meta:
  id: voice-descriptors
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Define 3-5 brand voice descriptors — select the right adjectives, define what each means in practice, and create actionable descriptions"
  tags: [brand-voice, descriptors, definition, adjectives, basics]

state: {}

trigger: |
  Voice descriptors are the 3-5 adjectives that define how your
  brand communicates. "Friendly" means nothing without definition —
  does it mean casual? Warm? Approachable? Humorous? The best
  voice descriptors are specific, actionable, and differentiated.

  Part 1: Selecting voice descriptors
  1. Explain why 3-5 descriptors is the optimal range
  2. Show the process for selecting descriptors:
     - Start with 15-20 candidate adjectives
     - Narrow using differentiation (does this set us apart?)
     - Narrow using clarity (can everyone interpret this the same way?)
     - Final 3-5 that are unique, clear, and complementary
  3. Common descriptor mistakes:
     - Too generic ("friendly," "professional," "innovative")
     - Too similar (all descriptors say the same thing differently)
     - Too aspirational (descriptors don't match actual content)

  Part 2: Defining descriptors in depth
  For a fictional SaaS brand "Beacon Analytics" (data analytics platform):
  Select 4 voice descriptors and for each one:
  1. The descriptor word
  2. What it means for this brand specifically (2-3 sentence definition)
  3. What it does NOT mean (clarifying boundaries)
  4. How it shows up in writing (specific examples)
  5. A "do" example sentence and a "don't" example sentence

  Part 3: Descriptor exercise
  Take the generic descriptors below and make them specific:
  1. "Professional" → What specific kind of professional?
  2. "Friendly" → What specific kind of friendly?
  3. "Innovative" → What specific kind of innovative?
  4. "Trustworthy" → What specific kind of trustworthy?
  For each, provide the upgraded descriptor and explain why
  the specific version is more useful.

assertions:
  - type: llm_judge
    criteria: "Voice descriptors for Beacon Analytics are specific enough that two writers reading them would produce similar-sounding copy"
    weight: 0.30
    description: "Specific actionable descriptors"
  - type: llm_judge
    criteria: "The 'what it does NOT mean' sections add genuine clarity — they prevent common misinterpretations of each descriptor"
    weight: 0.25
    description: "Clear boundary definitions"
  - type: llm_judge
    criteria: "Do/don't examples clearly illustrate the difference between on-brand and off-brand applications of each descriptor"
    weight: 0.25
    description: "Illustrative examples"
  - type: llm_judge
    criteria: "Generic-to-specific upgrades meaningfully improve the descriptors — the upgraded versions are more useful for actual writing"
    weight: 0.20
    description: "Meaningful descriptor upgrades"
