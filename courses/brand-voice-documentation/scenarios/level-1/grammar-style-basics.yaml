meta:
  id: grammar-style-basics
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Define grammar and style conventions for brand voice — punctuation, capitalization, number formatting, and writing mechanics that reinforce personality"
  tags: [brand-voice, grammar, style, conventions, mechanics, basics]

state: {}

trigger: |
  Grammar and style choices are voice decisions. Using the Oxford
  comma, writing in sentence case, preferring contractions — these
  small mechanical choices add up to create a consistent feel.
  Documenting them prevents inconsistency and debate.

  Part 1: Grammar decisions as voice decisions
  Explain how these mechanical choices affect brand personality:
  1. Contractions (we're vs. we are) — casual vs. formal
  2. Oxford comma (or not) — precision vs. flow
  3. Sentence length (short and punchy vs. complex and detailed)
  4. Active vs. passive voice — direct vs. diplomatic
  5. Exclamation marks — enthusiastic vs. restrained
  6. Capitalization style (title case vs. sentence case)
  7. Number formatting (5 vs. five, $5K vs. $5,000)
  8. Em dashes, en dashes, and ellipses
  9. First person (we/our) vs. third person (the company)
  10. Paragraph length and white space

  Part 2: Create a style conventions document
  For "Clearpath Consulting" (management consulting firm,
  authoritative but approachable):

  Document their style conventions covering:
  1. Punctuation preferences (with rationale)
  2. Capitalization rules
  3. Number formatting standards
  4. Pronoun usage (we/you/they)
  5. Abbreviation and acronym rules
  6. Date and time formatting
  7. Sentence structure preferences
  8. Paragraph and formatting conventions

  For each convention, explain WHY this choice matches
  Clearpath's voice personality.

  Part 3: Style edge cases
  Address 5 common style debates with recommended positions:
  1. To Oxford comma or not?
  2. One space or two after a period?
  3. Periods in bulleted lists?
  4. Emoji in professional communication?
  5. How to handle technical terms and product names

assertions:
  - type: llm_judge
    criteria: "Style conventions are connected to brand personality — each choice is explained as a voice decision, not just a grammar rule"
    weight: 0.30
    description: "Voice-connected style choices"
  - type: llm_judge
    criteria: "Clearpath's conventions feel cohesive — all style choices work together to create an authoritative but approachable tone"
    weight: 0.25
    description: "Cohesive style system"
  - type: llm_judge
    criteria: "Rationales are persuasive — a team member would understand and accept the reasoning behind each convention"
    weight: 0.25
    description: "Persuasive rationales"
  - type: llm_judge
    criteria: "Edge case recommendations are practical — they take a clear position rather than offering wishy-washy 'it depends' answers"
    weight: 0.20
    description: "Clear edge case positions"
