meta:
  id: brand-personality-basics
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Identify and define brand personality traits — use frameworks like Aaker's dimensions and brand archetypes to establish personality foundations"
  tags: [brand-voice, personality, archetypes, aaker, fundamentals]

state: {}

trigger: |
  Brand personality is the human characteristics attributed to
  a brand. It's the foundation of voice — you can't define how
  a brand sounds until you know who it is. Two key frameworks
  help: Aaker's Five Dimensions and Jung's 12 Brand Archetypes.

  Part 1: Aaker's Five Dimensions
  Explain each dimension with brand examples:
  1. Sincerity (honest, genuine, wholesome)
  2. Excitement (daring, spirited, imaginative)
  3. Competence (reliable, intelligent, successful)
  4. Sophistication (upper-class, charming)
  5. Ruggedness (outdoorsy, tough)

  Score 3 well-known brands on each dimension (1-5 scale):
  - Apple
  - Patagonia
  - Red Bull

  Part 2: Brand Archetypes
  Explain the 12 brand archetypes with one real-brand example each:
  1. The Innocent, 2. The Everyman, 3. The Hero,
  4. The Outlaw, 5. The Explorer, 6. The Creator,
  7. The Ruler, 8. The Magician, 9. The Lover,
  10. The Caregiver, 11. The Jester, 12. The Sage

  Part 3: Personality-to-voice translation
  For the brand "Bloom & Gather" (artisan flower delivery service):
  1. Score on Aaker's dimensions
  2. Identify primary and secondary archetypes
  3. Translate personality traits into voice characteristics
  4. Show how personality shapes specific word choices, sentence
     structures, and communication style

assertions:
  - type: llm_judge
    criteria: "Both frameworks are accurately explained with appropriate real-brand examples that clearly illustrate each dimension or archetype"
    weight: 0.25
    description: "Accurate framework explanation"
  - type: llm_judge
    criteria: "Brand scoring on Aaker's dimensions is reasonable — Apple scores high on Excitement and Sophistication, not Ruggedness"
    weight: 0.25
    description: "Reasonable brand scoring"
  - type: llm_judge
    criteria: "The personality-to-voice translation is practical — it shows concrete steps from abstract personality traits to specific voice decisions"
    weight: 0.30
    description: "Practical personality translation"
  - type: llm_judge
    criteria: "Bloom & Gather's archetype and dimensions feel authentic for an artisan flower delivery service"
    weight: 0.20
    description: "Authentic brand personality"
