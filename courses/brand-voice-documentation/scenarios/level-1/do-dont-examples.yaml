meta:
  id: do-dont-examples
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Write effective do/don't examples — create pairs that clearly illustrate on-brand vs. off-brand writing with explanations"
  tags: [brand-voice, examples, do-dont, illustration, writing, basics]

state: {}

trigger: |
  Do/don't examples are the most impactful part of voice
  documentation. They show writers exactly what on-brand sounds
  like vs. what it doesn't. The best examples are realistic,
  specific, and demonstrate a single voice principle at a time.

  Part 1: Writing effective do/don't pairs
  Explain the principles of good do/don't examples:
  1. Each pair should illustrate ONE voice principle
  2. The "don't" should be realistic (something someone might
     actually write), not a strawman
  3. Both versions should communicate the same message
  4. The difference should be immediately obvious
  5. Include a brief explanation of WHY one is better

  Part 2: Do/don't examples for 5 voice principles
  For "Mosaic Health" (digital health platform, warm and empowering voice):

  Voice Principle 1: Empowering, not patronizing
  - Write 4 do/don't pairs showing the line between empowering
    and talking down to users

  Voice Principle 2: Warm, not casual
  - Write 4 do/don't pairs showing warmth without being
    unprofessionally informal

  Voice Principle 3: Clear, not clinical
  - Write 4 do/don't pairs showing clarity about health topics
    without sounding like a medical textbook

  Voice Principle 4: Encouraging, not dismissive
  - Write 4 do/don't pairs showing encouragement without
    minimizing user concerns

  Voice Principle 5: Expert, not jargon-heavy
  - Write 4 do/don't pairs showing expertise without
    overwhelming with terminology

  Part 3: Do/don't across content types
  Show how do/don't examples change by content type:
  1. Marketing email (do/don't for subject line and body)
  2. Error message (do/don't for technical communication)
  3. Social media post (do/don't for casual content)

assertions:
  - type: llm_judge
    criteria: "Don't examples are realistic — they represent things someone might actually write, not absurd exaggerations"
    weight: 0.30
    description: "Realistic don't examples"
  - type: llm_judge
    criteria: "Each pair illustrates a single clear principle — the difference between do and don't is instantly recognizable"
    weight: 0.25
    description: "Single-principle illustration"
  - type: llm_judge
    criteria: "Explanations add value — the 'why' behind each pair helps writers internalize the principle, not just copy the example"
    weight: 0.25
    description: "Value-adding explanations"
  - type: llm_judge
    criteria: "Voice principles are specific to Mosaic Health — the line between 'empowering' and 'patronizing' reflects a health platform's unique challenges"
    weight: 0.20
    description: "Health-platform-specific principles"
