meta:
  id: tone-spectrum
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Create a tone spectrum — define how brand voice adapts across emotional and situational contexts while maintaining consistency"
  tags: [brand-voice, tone, spectrum, adaptation, context, basics]

state: {}

trigger: |
  A tone spectrum maps how your brand voice adapts across different
  contexts. Using Nielsen Norman's four dimensions (humor, formality,
  respectfulness, enthusiasm), you can create a visual framework
  showing where your brand sits and how much it flexes.

  Part 1: Nielsen Norman's four tone dimensions
  Explain each dimension with spectrum examples:
  1. Funny ←→ Serious
  2. Formal ←→ Casual
  3. Respectful ←→ Irreverent
  4. Enthusiastic ←→ Matter-of-fact

  For each dimension:
  - Define both ends of the spectrum
  - Give brand examples at each end
  - Explain when a brand might move along the spectrum

  Part 2: Build a tone spectrum
  For "Campfire Coffee Co." (specialty coffee roaster,
  outdoor-adventure brand personality):
  1. Plot the brand's default position on each dimension
  2. Define the range of movement allowed on each dimension
     (e.g., "We can go from moderately funny to serious, but
     never fully irreverent")
  3. Map 6 communication scenarios to positions on the spectrum:
     - New product launch
     - Customer complaint response
     - Social media daily post
     - Website homepage copy
     - Email newsletter
     - Apology for service outage

  Part 3: Tone spectrum documentation
  Create a visual tone spectrum template that could be included
  in a brand voice document:
  - Show the 4 dimensions with default positions marked
  - Include scenario-specific tone positions
  - Add guidance notes for when to shift tone

assertions:
  - type: llm_judge
    criteria: "The four dimensions are accurately explained with appropriate brand examples at each end of the spectrum"
    weight: 0.25
    description: "Accurate dimension explanation"
  - type: llm_judge
    criteria: "Campfire Coffee's tone positions feel authentic — the default position and ranges make sense for an outdoor coffee brand"
    weight: 0.25
    description: "Authentic brand positioning"
  - type: llm_judge
    criteria: "The 6 scenario mappings show meaningful variation — a product launch lands differently on the spectrum than a complaint response"
    weight: 0.25
    description: "Meaningful scenario variation"
  - type: llm_judge
    criteria: "The tone spectrum template is clear enough to be immediately usable in a real brand voice document"
    weight: 0.25
    description: "Usable spectrum template"
