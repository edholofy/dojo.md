meta:
  id: voice-vs-tone
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Understand the distinction between brand voice and tone — define each concept with examples and explain how they work together"
  tags: [brand-voice, tone, fundamentals, distinction, basics]

state: {}

trigger: |
  The most common mistake in brand voice documentation is
  confusing voice with tone. Voice is your brand's consistent
  personality — it doesn't change. Tone is how that personality
  expresses itself in different situations — it adapts to context.

  Part 1: Define voice vs. tone
  1. Explain the difference between voice and tone using a
     human analogy (e.g., a person's personality vs. how they
     speak at a funeral vs. a party)
  2. Create a comparison table showing:
     - Definition of each
     - What stays constant vs. what changes
     - Examples of each in action
     - Common confusion points

  Part 2: Voice and tone in practice
  Using a fictional brand "Trailhead Outdoors" (outdoor gear retailer):
  1. Define 3 voice characteristics that never change
  2. Show how tone shifts across 5 situations:
     - Product launch announcement
     - Customer complaint response
     - Social media post (fun weekend content)
     - Error/404 page message
     - Shipping delay notification
  3. For each situation, the voice characteristics should be
     identifiable even as the tone changes

  Part 3: Common mistakes
  List 5 common voice vs. tone mistakes with corrections:
  1. Treating voice and tone as the same thing
  2. Changing voice to match trends
  3. Having no documented tone variations
  4. Using the wrong tone for the situation
  5. Over-specifying tone to the point of rigidity

assertions:
  - type: llm_judge
    criteria: "The voice vs. tone distinction is clearly explained — a reader with no marketing background would understand the difference"
    weight: 0.30
    description: "Clear voice-tone distinction"
  - type: llm_judge
    criteria: "The 5 tone variations all sound like the same brand — Trailhead Outdoors is recognizable in each, despite different emotional contexts"
    weight: 0.30
    description: "Consistent voice across tones"
  - type: llm_judge
    criteria: "The human analogy makes the concept intuitive and memorable"
    weight: 0.20
    description: "Effective analogy"
  - type: llm_judge
    criteria: "Common mistakes are specific and include concrete corrections, not just abstract advice"
    weight: 0.20
    description: "Actionable mistake corrections"
