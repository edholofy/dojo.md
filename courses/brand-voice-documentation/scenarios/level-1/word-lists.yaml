meta:
  id: word-lists
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Build approved and banned word lists — create terminology guidelines, branded language, and vocabulary that reinforces brand personality"
  tags: [brand-voice, word-lists, terminology, vocabulary, language, basics]

state: {}

trigger: |
  Word lists are one of the most practical voice documentation
  tools. They give writers immediate, concrete guidance on
  language choices. Approved words reinforce brand personality;
  banned words prevent off-brand messaging.

  Part 1: Types of word lists
  Explain the different categories of words to document:
  1. Branded terms (your specific vocabulary)
  2. Preferred alternatives (say "team members" not "employees")
  3. Banned words (never use these)
  4. Industry jargon handling (use, avoid, or define)
  5. Competitor terms to avoid
  6. Inclusive language updates

  Part 2: Build word lists
  For "Kinetic Fitness" (boutique fitness studio chain):
  1. Create a branded terminology list (10 terms):
     - The brand's word for their classes
     - How they refer to members
     - Equipment names or nicknames
     - Brand-specific phrases or catchphrases
  2. Create a "say this, not that" list (15 pairs):
     - The preferred term and the term to avoid
     - Brief reason why the preferred term is better
  3. Create a banned words list (10 words) with explanations:
     - Why each word is banned
     - What to use instead
  4. Create a jargon guide (8 terms):
     - Fitness jargon that's OK to use
     - Jargon that needs to be explained
     - Jargon to avoid entirely

  Part 3: Word list maintenance
  1. How to keep word lists current
  2. Process for adding new terms
  3. How to handle disagreements about terminology
  4. Annual review process

assertions:
  - type: llm_judge
    criteria: "Word lists are specific to Kinetic Fitness — branded terms reflect a boutique fitness brand personality, not generic gym language"
    weight: 0.30
    description: "Brand-specific word lists"
  - type: llm_judge
    criteria: "Say this/not that pairs have clear reasoning — each swap reinforces the brand personality or improves communication"
    weight: 0.25
    description: "Well-reasoned term preferences"
  - type: llm_judge
    criteria: "Banned words list includes genuine pitfalls — terms that would actually damage the brand if used"
    weight: 0.25
    description: "Meaningful banned words"
  - type: llm_judge
    criteria: "Jargon guide appropriately categorizes fitness terms — some jargon is natural for the audience, other jargon alienates"
    weight: 0.20
    description: "Appropriate jargon handling"
