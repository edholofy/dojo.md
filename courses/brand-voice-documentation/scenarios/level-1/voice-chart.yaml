meta:
  id: voice-chart
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Create a brand voice chart — the visual reference document that summarizes voice descriptors, definitions, dos, and don'ts in a scannable format"
  tags: [brand-voice, voice-chart, visual, reference, documentation, basics]

state: {}

trigger: |
  A brand voice chart is a single-page reference that captures
  voice descriptors, their definitions, and do/don't examples
  in a scannable table format. It's the most practical tool in
  a voice document — the thing writers pin above their desk.

  Part 1: Voice chart structure
  Explain the standard voice chart format:
  - Columns: Descriptor | Description | Do | Don't
  - How to write concise, useful descriptions
  - How to select impactful do/don't examples
  - Alternative chart formats (with context/situation rows)

  Part 2: Create a voice chart
  For "Helix Learning" (online education platform for professionals):
  Create a complete voice chart with 4 descriptors:
  - Each descriptor defined in 2-3 sentences
  - 3 "do" examples per descriptor (actual sample sentences)
  - 3 "don't" examples per descriptor (actual sample sentences)
  - A brief context note for each descriptor

  Part 3: Voice chart usage guide
  1. When and how writers should reference the chart
  2. How to use the chart during content review
  3. How to onboard new writers using the chart
  4. When the chart alone is sufficient vs. when to reference
     the full style guide

assertions:
  - type: llm_judge
    criteria: "The voice chart is complete and scannable — a writer could glance at it and immediately understand how Helix Learning should sound"
    weight: 0.30
    description: "Scannable complete chart"
  - type: llm_judge
    criteria: "Do/don't examples are concrete sentences, not abstract descriptions — they demonstrate real writing decisions"
    weight: 0.30
    description: "Concrete example sentences"
  - type: llm_judge
    criteria: "The 4 descriptors work together as a cohesive system — they complement each other without overlap"
    weight: 0.20
    description: "Cohesive descriptor system"
  - type: llm_judge
    criteria: "Usage guide is practical — it tells writers exactly when and how to use the chart in their workflow"
    weight: 0.20
    description: "Practical usage guide"
