meta:
  id: audience-voice-alignment
  level: 1
  course: brand-voice-documentation
  type: output
  description: "Align brand voice with target audience — match communication style to audience expectations, preferences, and needs"
  tags: [brand-voice, audience, alignment, personas, preferences, basics]

state: {}

trigger: |
  Brand voice must resonate with your audience. A voice that's
  perfect for Gen Z consumers will fail with enterprise CTOs.
  Understanding audience communication preferences is essential
  before documenting voice — you're not writing for yourself,
  you're writing for them.

  Part 1: Audience communication preferences
  Explain how different audiences expect different communication:
  1. Generational preferences:
     - Gen Z (authenticity, casual, visual, humor)
     - Millennials (purpose-driven, conversational, inclusive)
     - Gen X (straightforward, value-focused, no-nonsense)
     - Boomers (respectful, informative, trustworthy)
  2. Professional context preferences:
     - C-suite executives (concise, strategic, ROI-focused)
     - Technical professionals (precise, detailed, jargon-comfortable)
     - Creative professionals (expressive, inspiring, collaborative)
     - Frontline workers (clear, actionable, practical)
  3. How to research your audience's voice preferences

  Part 2: Voice-audience mapping
  For "NovaBridge Financial" (personal finance app):
  Primary audience: Millennials and Gen Z (22-38)
  Secondary audience: Their parents (45-65) who co-sign or refer

  1. Create audience personas for each segment
  2. Map voice preferences for each persona
  3. Define voice characteristics that work for BOTH audiences
  4. Identify areas where tone must shift between audiences
  5. Write the same message (new savings feature launch)
     tailored for each audience segment

  Part 3: Avoiding voice-audience mismatch
  Show 4 examples of voice-audience misalignment:
  1. Too casual for a serious topic
  2. Too formal for a casual audience
  3. Too complex for a general audience
  4. Too trendy for a mature audience
  For each, show the misaligned version and the corrected version.

assertions:
  - type: llm_judge
    criteria: "Generational and professional preferences are nuanced — not stereotypes, but research-informed observations about communication expectations"
    weight: 0.25
    description: "Nuanced audience preferences"
  - type: llm_judge
    criteria: "Voice characteristics for NovaBridge work for both audience segments — the core voice resonates with young adults AND their parents"
    weight: 0.30
    description: "Multi-segment voice alignment"
  - type: llm_judge
    criteria: "Tailored messages sound natural for each segment — the millennial version and parent version both feel authentic, not forced"
    weight: 0.25
    description: "Natural audience adaptation"
  - type: llm_judge
    criteria: "Misalignment examples are realistic and the corrections demonstrate clear improvement"
    weight: 0.20
    description: "Clear misalignment corrections"
