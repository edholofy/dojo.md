meta:
  id: voice-for-mergers
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Navigate voice strategy during M&A — brand mergers, acquisitions, and rebrands with voice integration, transition plans, and stakeholder management"
  tags: [brand-voice, mergers, acquisition, rebrand, transition, expert]

state: {}

trigger: |
  When companies merge or acquire, brand voice collision is
  inevitable. Two established voices must become one — or
  coexist in a portfolio. This requires careful analysis,
  stakeholder alignment, and phased transition.

  Design voice strategy for an acquisition:

  Acquiring company: "Apex Financial" — established bank,
  conservative, authoritative voice (500K customers, 120 years old)
  Acquired company: "FinLift" — fintech startup, casual,
  innovative voice (200K users, 4 years old)

  Part 1: Pre-merger voice analysis
  1. Voice comparison matrix:
     - Apex voice profile (descriptors, tone, language register)
     - FinLift voice profile (descriptors, tone, language register)
     - Overlap analysis (what's compatible)
     - Conflict analysis (what's incompatible)
     - Audience expectation mapping for each brand
  2. Stakeholder voice preferences:
     - Apex customers (what they value about the voice)
     - FinLift users (what they'd lose if voice changes)
     - Internal teams (cultural voice attachment)
     - Regulators (compliance voice requirements)
  3. Three strategic options:
     - Option A: Apex voice absorbs FinLift
     - Option B: New blended voice for both
     - Option C: Maintain separate voices (house of brands)
     - Recommendation with rationale

  Part 2: Voice integration plan
  (Assuming Option B — blended voice):
  1. New voice definition:
     - Voice descriptors that honor both brands
     - Tone spectrum that accommodates both audiences
     - Word lists (merged, with deprecated terms from each)
  2. Transition timeline:
     - Phase 1 (months 1-3): Alignment and documentation
     - Phase 2 (months 4-6): Gradual introduction
     - Phase 3 (months 7-9): Full implementation
     - Phase 4 (months 10-12): Measurement and refinement
  3. Content migration plan:
     - Priority order for updating existing content
     - How to handle the "awkward middle" period
     - Communication to customers about the change

  Part 3: Transition communications
  Write actual communications for key transition moments:
  1. Announcement to Apex customers
  2. Announcement to FinLift users
  3. Internal memo to combined workforce
  4. First post-merger social media post
  5. Updated welcome email in the new voice

assertions:
  - type: llm_judge
    criteria: "Voice analysis identifies genuine tensions — conservative banking voice vs. casual fintech voice creates real challenges that are honestly addressed"
    weight: 0.25
    description: "Honest tension identification"
  - type: llm_judge
    criteria: "The blended voice honors both brands — it's not just Apex's voice with FinLift's flavor, but a genuine synthesis"
    weight: 0.25
    description: "Genuine voice synthesis"
  - type: llm_judge
    criteria: "Transition communications are audience-appropriate — the Apex customer letter feels different from the FinLift user message, both addressing legitimate concerns"
    weight: 0.25
    description: "Audience-appropriate transition comms"
  - type: llm_judge
    criteria: "Integration timeline is realistic — 12 months with clear phases and milestones accounts for the complexity of merging two voices"
    weight: 0.25
    description: "Realistic integration timeline"
