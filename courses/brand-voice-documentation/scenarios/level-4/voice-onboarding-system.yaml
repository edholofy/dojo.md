meta:
  id: voice-onboarding-system
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Build a comprehensive voice onboarding system — new hire programs, contractor briefings, agency handoffs, and voice competency assessment"
  tags: [brand-voice, onboarding, training, assessment, competency, expert]

state: {}

trigger: |
  Every new content contributor — employee, freelancer, or agency —
  needs to learn the brand voice. A scalable onboarding system
  ensures quality from day one, reduces revision cycles, and
  builds voice competency systematically.

  Design a voice onboarding system for:
  Brand: "Evergreen Education" — EdTech company
  New contributors: ~20/year (5 employees, 10 freelancers, 5 agency staff)

  Part 1: Tiered onboarding paths
  Design onboarding for 3 contributor types:

  Tier 1: Full-time employees (deepest immersion)
  - Day 1: Voice welcome kit (what's included)
  - Week 1: Self-study module (voice doc walkthrough)
  - Week 2: Guided exercises (with mentor feedback)
  - Week 3: Supervised content creation (real work, reviewed)
  - Week 4: Voice competency assessment
  - Month 2-3: Independent creation with spot-checks
  - Content for each step

  Tier 2: Freelancers (efficient, focused)
  - Pre-engagement: Voice brief and style guide sent
  - Kickoff call: 30-minute voice walkthrough
  - First deliverable: Reviewed with detailed voice feedback
  - Ongoing: Self-service voice reference + quarterly check-ins
  - Content for each step

  Tier 3: Agency partners (collaborative, brand-aligned)
  - Agency briefing document design
  - Brand immersion session (2-hour workshop)
  - Creative brief voice section template
  - Review and feedback framework
  - Content for each step

  Part 2: Voice competency assessment
  Create a voice assessment system:
  1. Written assessment (10 questions):
     - Voice knowledge questions
     - "Which version is on-brand?" comparison questions
     - "Rewrite this in brand voice" exercises
  2. Scoring rubric and passing threshold
  3. Remediation path for those who don't pass
  4. Annual re-assessment requirements

  Part 3: Onboarding support tools
  1. Voice onboarding checklist (manager's guide)
  2. "First 30 days" voice resource library
  3. FAQ document (common voice questions from new contributors)
  4. Voice buddy/mentor matching program
  5. Feedback template for voice coaching conversations

assertions:
  - type: llm_judge
    criteria: "Three onboarding tiers are appropriately scoped — employees get deeper immersion while freelancers get efficient, focused training"
    weight: 0.25
    description: "Appropriately tiered onboarding"
  - type: llm_judge
    criteria: "Voice competency assessment is rigorous — questions test application ability, not just knowledge of rules"
    weight: 0.25
    description: "Application-focused assessment"
  - type: llm_judge
    criteria: "Onboarding materials are specific enough to implement — not just 'do a workshop' but actual content and exercises for each step"
    weight: 0.25
    description: "Implementation-ready materials"
  - type: llm_judge
    criteria: "The system handles 20 new contributors per year efficiently — it's scalable without requiring massive time investment from voice leads"
    weight: 0.25
    description: "Scalably efficient system"
