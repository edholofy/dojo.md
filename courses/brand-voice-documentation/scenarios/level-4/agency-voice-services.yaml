meta:
  id: agency-voice-services
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Build a brand voice consulting practice — service offerings, client engagement models, delivery frameworks, and pricing structures"
  tags: [brand-voice, agency, consulting, services, practice, expert]

state: {}

trigger: |
  Brand voice consulting is a growing specialty. Companies
  recognize voice inconsistency but lack the expertise to fix
  it. Building a voice consulting practice requires defined
  service offerings, repeatable frameworks, and clear value
  propositions.

  Design a brand voice consulting practice:

  Part 1: Service offerings
  Define 6 core service packages:

  1. Voice Discovery Workshop (1-day):
     - What's included
     - Deliverables
     - Methodology
     - Pricing structure

  2. Voice Documentation Package (4-6 weeks):
     - Audit → strategy → documentation process
     - Deliverables (style guide, voice chart, templates)
     - Client involvement requirements
     - Pricing structure

  3. Voice Audit and Optimization (2-3 weeks):
     - Audit methodology
     - Report format and recommendations
     - Follow-up support
     - Pricing structure

  4. Voice Training Program (ongoing):
     - Workshop design
     - Materials created
     - Certification option
     - Pricing structure

  5. Voice Governance Setup (6-8 weeks):
     - Process design
     - Tool recommendations
     - Team structure design
     - Pricing structure

  6. Voice Evolution/Rebrand (12-16 weeks):
     - Research and strategy
     - New voice development
     - Transition planning
     - Implementation support
     - Pricing structure

  Part 2: Client engagement model
  Design the typical client engagement lifecycle:
  1. Discovery call framework (questions to ask)
  2. Proposal template structure
  3. Kick-off meeting agenda
  4. Progress reporting and client communication
  5. Deliverable review and revision process
  6. Handoff and knowledge transfer
  7. Post-engagement follow-up

  Part 3: Intellectual property and frameworks
  1. Proprietary voice assessment framework
  2. Voice maturity model (5 levels of voice sophistication)
  3. Voice ROI calculator for client proposals
  4. Case study template for showcasing results
  5. Thought leadership content plan for the practice

assertions:
  - type: llm_judge
    criteria: "Service packages are well-defined and differentiated — each serves a distinct client need with clear scope, deliverables, and pricing logic"
    weight: 0.30
    description: "Well-defined service packages"
  - type: llm_judge
    criteria: "Client engagement model is professional and practical — the lifecycle from discovery call through handoff reflects real consulting best practices"
    weight: 0.25
    description: "Professional engagement model"
  - type: llm_judge
    criteria: "Proprietary frameworks add genuine value — the voice maturity model and assessment framework provide intellectual property that differentiates the practice"
    weight: 0.25
    description: "Value-adding proprietary frameworks"
  - type: llm_judge
    criteria: "Pricing structures are realistic for the market — they reflect actual consulting rates and value-based pricing principles"
    weight: 0.20
    description: "Realistic pricing structures"
