meta:
  id: global-voice-localization
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Localize brand voice internationally — adapt voice across cultures, languages, and markets while maintaining global brand coherence"
  tags: [brand-voice, localization, international, cultural, global, expert]

state: {}

trigger: |
  Global brand voice localization goes far beyond translation.
  Humor, formality levels, emotional expression, and cultural
  references all vary by market. A voice that's "casual and
  friendly" in the US might be perceived as "disrespectful"
  in Japan or "unprofessional" in Germany.

  Design a global voice localization framework for:
  Brand: "Zenith Productivity" — work management SaaS
  Markets: US (headquarters), UK, Germany, Japan, Brazil, UAE
  Current voice: Casual, encouraging, clever (US-centric)

  Part 1: Cultural voice analysis
  For each of the 6 markets, analyze:
  1. Communication culture:
     - Formality expectations (high-context vs. low-context)
     - Humor appropriateness and style
     - Direct vs. indirect communication preference
     - Power distance and authority language
  2. Voice adaptation requirements:
     - What voice elements translate well
     - What needs fundamental adaptation
     - What should be avoided entirely
  3. Local competitor voice landscape:
     - How competitors sound in each market
     - Local voice expectations for SaaS

  Part 2: Localized voice documentation
  Create voice adaptation guides for 3 markets:

  Market 1: Germany
  - Adapted voice descriptors (maintaining brand DNA)
  - Tone spectrum adjustments
  - Word list adaptations (formal/informal conventions)
  - 3 example messages: onboarding, error, marketing email

  Market 2: Japan
  - Adapted voice descriptors
  - Honorifics and formality level guide
  - Cultural reference handling
  - 3 example messages in the localized voice

  Market 3: Brazil
  - Adapted voice descriptors
  - Warmth and relationship-building in voice
  - Formality calibration
  - 3 example messages in the localized voice

  Part 3: Global voice governance
  1. Master voice vs. local adaptation authority matrix
  2. Translation and transcreation guidelines
  3. Local voice lead role and responsibilities
  4. Global voice consistency measurement across markets
  5. Process for approving local voice adaptations

assertions:
  - type: llm_judge
    criteria: "Cultural analysis is accurate and respectful — German formality, Japanese hierarchy, and Brazilian warmth are described authentically, not stereotypically"
    weight: 0.30
    description: "Accurate cultural analysis"
  - type: llm_judge
    criteria: "Localized voice adaptations maintain brand DNA — all 3 market versions are recognizably Zenith Productivity while sounding culturally appropriate"
    weight: 0.25
    description: "Brand DNA preserved in localization"
  - type: llm_judge
    criteria: "Example messages demonstrate genuine cultural adaptation — not just formal/informal switches but fundamental communication style changes"
    weight: 0.25
    description: "Genuine cultural adaptation"
  - type: llm_judge
    criteria: "Governance framework balances global consistency with local autonomy — local teams have appropriate freedom within clear guardrails"
    weight: 0.20
    description: "Balanced global-local governance"
