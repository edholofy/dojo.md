meta:
  id: enterprise-voice-governance
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Build enterprise-scale voice governance — manage voice across hundreds of contributors, multiple departments, regional offices, and external partners"
  tags: [brand-voice, enterprise, governance, scale, organization, expert]

state: {}

trigger: |
  Enterprise voice governance manages brand voice across thousands
  of content pieces created by hundreds of people. It requires
  systems that scale — technology, processes, training, and
  measurement that work at the complexity level of a Fortune 500.

  Design enterprise voice governance for:
  Company: "Axiom Technologies" — global enterprise software company
  - 8,000 employees across 15 countries
  - 200+ content creators (marketing, sales, support, product, HR, legal)
  - 4 product lines, each with sub-brands
  - External partners: 3 agencies, 25 freelancers, 10 channel partners

  Part 1: Governance infrastructure
  1. Voice governance organizational structure:
     - Chief Voice Officer / Voice Lead role (responsibilities)
     - Regional voice leads (15 countries)
     - Departmental voice champions
     - Voice council composition and charter
  2. Technology stack for voice management:
     - Content management system voice integration
     - AI-powered voice checking tools
     - Brand asset management platform
     - Training and certification platform
  3. Policy framework:
     - Master voice policy document
     - Department-specific voice addenda
     - Partner and vendor voice requirements
     - Compliance and legal voice standards

  Part 2: Operational processes
  1. Content review workflows at enterprise scale:
     - Self-service (automated checks + publish)
     - Peer review (department-level)
     - Expert review (voice team)
     - Legal/compliance review
  2. Voice certification program:
     - Tiered certification (basic, advanced, expert)
     - Testing and assessment methodology
     - Recertification requirements
     - Certification for external partners
  3. Quality metrics and reporting:
     - Dashboard design (metrics, visualizations, drill-downs)
     - Department-level scorecards
     - Executive reporting cadence
     - Benchmarking and trending

  Part 3: Change management at scale
  1. Voice update rollout process (when guidelines change)
  2. Multi-language voice adaptation governance
  3. M&A voice integration playbook
  4. Annual voice governance review
  5. Continuous improvement framework

assertions:
  - type: llm_judge
    criteria: "Governance scales to enterprise complexity — 8,000 employees, 15 countries, and 200+ content creators are addressed with appropriate systems"
    weight: 0.30
    description: "Enterprise-scale governance"
  - type: llm_judge
    criteria: "Voice certification program is rigorous and practical — tiered certification with testing and recertification would ensure quality at scale"
    weight: 0.25
    description: "Rigorous certification program"
  - type: llm_judge
    criteria: "Technology recommendations are specific and realistic — the tools and platforms would actually support enterprise voice management"
    weight: 0.25
    description: "Realistic technology stack"
  - type: llm_judge
    criteria: "External partner governance is addressed — agencies, freelancers, and channel partners have clear voice requirements and oversight"
    weight: 0.20
    description: "External partner governance"
