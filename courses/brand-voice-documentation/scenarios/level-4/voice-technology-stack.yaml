meta:
  id: voice-technology-stack
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Build a voice management technology stack — tools for voice checking, content governance, AI training, analytics, and workflow automation"
  tags: [brand-voice, technology, tools, automation, governance-tech, expert]

state: {}

trigger: |
  Managing brand voice at scale requires technology. From
  AI-powered voice checkers to content governance platforms,
  the right tools automate consistency while freeing humans
  for creative decisions.

  Design a voice management technology stack for:
  Company: "Vertex Solutions" — mid-market SaaS company
  Content volume: 200+ pieces/month across 8 channels
  Team: 15 content creators + 5 external partners
  Budget: $3,000/month for voice management tools

  Part 1: Technology requirements
  1. Core needs assessment:
     - Voice checking and scoring (real-time feedback)
     - Content governance and approval workflows
     - Style guide hosting and distribution
     - AI voice training and generation
     - Analytics and reporting
     - Template management
  2. For each need:
     - Why it matters for voice consistency
     - Manual alternative (without the tool)
     - ROI justification

  Part 2: Tool evaluation and recommendations
  Evaluate tools across categories:

  Category 1: Content governance platforms
  - Evaluate 3 options with pros/cons
  - Best fit for Vertex's needs

  Category 2: AI voice checking tools
  - Evaluate 3 options with pros/cons
  - How they integrate into workflow

  Category 3: Style guide platforms
  - Evaluate 3 options with pros/cons
  - Accessibility and usability considerations

  Category 4: AI content generation with voice
  - Evaluate 3 options with pros/cons
  - Voice training capabilities

  Category 5: Analytics and measurement
  - Evaluate 3 options with pros/cons
  - Metrics they can track

  Part 3: Implementation plan
  1. Phased rollout (which tools first, which later)
  2. Integration architecture (how tools connect)
  3. Team training on new tools
  4. Success metrics for the technology investment
  5. Annual review and optimization process

assertions:
  - type: llm_judge
    criteria: "Tool recommendations are specific and realistic — named tools with actual capabilities, not generic 'find a tool that does X'"
    weight: 0.30
    description: "Specific realistic tool recommendations"
  - type: llm_judge
    criteria: "Technology stack fits the budget — $3,000/month is accounted for across the recommended tools with clear prioritization"
    weight: 0.25
    description: "Budget-appropriate stack"
  - type: llm_judge
    criteria: "Implementation plan is phased and practical — it doesn't try to deploy everything at once but sequences tools logically"
    weight: 0.25
    description: "Practical phased implementation"
  - type: llm_judge
    criteria: "ROI justifications connect tools to voice outcomes — each tool investment is justified by specific voice management benefits"
    weight: 0.20
    description: "Outcome-justified investments"
