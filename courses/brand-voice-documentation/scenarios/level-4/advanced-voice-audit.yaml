meta:
  id: advanced-voice-audit
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Conduct advanced voice audits — multi-stakeholder assessment, competitive benchmarking, perception gap analysis, and strategic recommendations"
  tags: [brand-voice, audit, advanced, perception-gap, strategic, expert]

state: {}

trigger: |
  Advanced voice audits go beyond "is the content on-brand?"
  to explore perception gaps (how you want to sound vs. how
  you actually sound vs. how audiences perceive you),
  competitive positioning, and strategic voice opportunities.

  Conduct an advanced voice audit for:
  Brand: "NexGen Health" — digital health startup (3 years old)
  Stated voice: "Expert yet approachable, empowering, innovative"
  Current state: Voice feels inconsistent across channels,
  engagement declining, new competitors entering market

  Part 1: Multi-dimensional audit
  1. Internal perception survey:
     - Questions for 5 departments (marketing, product, support,
       sales, leadership)
     - How each department describes the voice
     - Alignment gaps between departments
  2. External perception analysis:
     - Customer survey questions (how do customers describe us?)
     - Social listening findings (how does the public talk about us?)
     - Review/testimonial language analysis
  3. Content audit:
     - Score 20 content pieces across 5 channels
     - Voice consistency heat map (which channels are most/least consistent)
     - Trend analysis (has voice drifted over 3 years?)

  Part 2: Gap analysis
  1. Stated voice vs. actual voice gap:
     - Where the brand says "expert" but sounds "uncertain"
     - Where the brand says "approachable" but sounds "corporate"
     - Where the brand says "innovative" but sounds "generic"
  2. Internal perception vs. external perception gap:
     - What the team thinks vs. what customers experience
     - Root causes for the gaps
  3. Competitive voice gap:
     - Where NexGen sounds like competitors
     - Where NexGen has a unique voice advantage
     - Opportunities for differentiation

  Part 3: Strategic recommendations
  1. Priority voice adjustments (ranked by impact and effort)
  2. Channel-specific action plans
  3. Voice consistency improvement roadmap (6 months)
  4. Quick wins (implementable in 2 weeks)
  5. Long-term strategic voice positioning
  6. Resource requirements and budget estimate

assertions:
  - type: llm_judge
    criteria: "Multi-dimensional audit captures perception from multiple angles — internal, external, and content analysis provide a complete picture"
    weight: 0.25
    description: "Multi-dimensional perception capture"
  - type: llm_judge
    criteria: "Gap analysis identifies specific, non-obvious disconnects — not just 'voice is inconsistent' but exactly where and how"
    weight: 0.30
    description: "Specific gap identification"
  - type: llm_judge
    criteria: "Strategic recommendations are prioritized by impact and effort — the roadmap distinguishes quick wins from long-term investments"
    weight: 0.25
    description: "Impact-prioritized recommendations"
  - type: llm_judge
    criteria: "The audit methodology is repeatable — another voice strategist could follow this framework for a different brand"
    weight: 0.20
    description: "Repeatable audit methodology"
