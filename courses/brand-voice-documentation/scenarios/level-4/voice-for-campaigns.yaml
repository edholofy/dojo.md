meta:
  id: voice-for-campaigns
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Modulate brand voice for campaigns — create campaign-specific voice extensions, seasonal adaptations, and cause-marketing voice guidelines"
  tags: [brand-voice, campaigns, modulation, seasonal, cause-marketing, expert]

state: {}

trigger: |
  Marketing campaigns often push voice boundaries — a playful
  brand runs a serious awareness campaign, or a corporate brand
  launches a youth-targeted initiative. Campaign voice modulation
  defines how far the brand can stretch while remaining
  recognizable.

  Design campaign voice modulation guidelines for:
  Brand: "Solaris Energy" — residential solar company
  Core voice: Optimistic, knowledgeable, straightforward

  Part 1: Campaign voice modulation framework
  1. Define the "voice elasticity" model:
     - Core voice (never changes, the 20% that defines you)
     - Flexible zone (can stretch for campaigns, the 60%)
     - Off-limits zone (would break the brand, the 20%)
  2. Campaign voice briefing template:
     - How to define a campaign's voice extension
     - What a creative team needs to know
     - Approval criteria for campaign voice

  Part 2: Campaign voice in practice
  Write voice guidelines and example copy for 5 campaigns:

  Campaign 1: Product launch (new home battery system)
  - Voice modulation: Amp up excitement, maintain expertise
  - Campaign tagline + 3 content pieces
  - What's different from everyday voice

  Campaign 2: Awareness campaign (climate education)
  - Voice modulation: More serious, data-driven, urgent
  - Campaign narrative + 3 content pieces
  - How urgency works without abandoning optimism

  Campaign 3: Seasonal sale (end-of-year tax credit push)
  - Voice modulation: More promotional, time-sensitive
  - Campaign headline + 3 content pieces
  - Promotional voice without sounding pushy

  Campaign 4: Cause partnership (habitat restoration)
  - Voice modulation: Emotional, mission-driven, community
  - Campaign story + 3 content pieces
  - Cause marketing voice authenticity guidelines

  Campaign 5: Youth/next-gen outreach (college campus program)
  - Voice modulation: More casual, aspirational, peer-level
  - Campaign message + 3 content pieces
  - Reaching younger audiences without being inauthentic

  Part 3: Campaign voice post-mortem
  1. How to assess whether a campaign voice worked
  2. What to bring back to the core voice vs. what stays
  3. Campaign voice archive and learnings documentation

assertions:
  - type: llm_judge
    criteria: "Voice elasticity model is clear and useful — the core/flexible/off-limits framework provides practical guidance for creative teams"
    weight: 0.25
    description: "Clear elasticity model"
  - type: llm_judge
    criteria: "All 5 campaigns are recognizably Solaris Energy — the voice stretches differently for each campaign but never breaks"
    weight: 0.30
    description: "Consistent campaign voice stretching"
  - type: llm_judge
    criteria: "Campaign copy demonstrates real modulation — the climate awareness campaign feels meaningfully different from the seasonal sale"
    weight: 0.25
    description: "Meaningful voice modulation"
  - type: llm_judge
    criteria: "Cause marketing and youth outreach voice guidelines address authenticity — they prevent performative or cringeworthy brand behavior"
    weight: 0.20
    description: "Authentic campaign voice"
