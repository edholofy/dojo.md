meta:
  id: multi-brand-voice-architecture
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Design voice architecture for brand portfolios — parent-subsidiary relationships, brand house vs. house of brands, and portfolio voice governance"
  tags: [brand-voice, multi-brand, portfolio, architecture, strategy, expert]

state: {}

trigger: |
  Companies with multiple brands face a complex voice challenge:
  how much voice should sub-brands inherit from the parent? A
  "branded house" (Google) shares voice across products. A
  "house of brands" (P&G) lets each brand have independent
  voices. Most companies fall somewhere in between.

  Design voice architecture for "Constellation Consumer Brands":
  Parent company: Constellation Consumer Brands (B2B-facing, rarely public)

  Sub-brands:
  1. "Harvest Table" — premium organic food (wholesome, trusted)
  2. "QuickFuel" — sports nutrition (energetic, performance-driven)
  3. "Little Sprouts" — baby and toddler food (gentle, reassuring)
  4. "Pure Elements" — clean beauty (sophisticated, science-backed)
  5. "Trail Kitchen" — outdoor and camping food (adventurous, rugged)

  Part 1: Brand architecture voice model
  1. Define the brand architecture type and rationale
  2. Master voice principles (what all brands share):
     - Core values expressed in voice
     - Quality commitment language
     - Safety and transparency standards
  3. Sub-brand voice differentiation:
     - For each of the 5 sub-brands, define:
       a. Unique voice descriptors (3-4 each)
       b. Tone spectrum position
       c. Target audience voice expectations
       d. What it inherits from parent vs. what's unique
       e. One example social media post

  Part 2: Voice governance across the portfolio
  1. Which voice decisions are centralized vs. decentralized
  2. Cross-brand voice coordination:
     - When sub-brands reference each other
     - Portfolio-level announcements
     - Crisis communication across brands
  3. Brand voice conflict resolution:
     - When QuickFuel's energetic voice conflicts with corporate tone
     - When a parent company crisis affects sub-brand voice
     - When sub-brands compete for the same audience

  Part 3: Portfolio voice documentation system
  1. Documentation hierarchy (master → category → brand → channel)
  2. Shared vs. unique voice assets
  3. Template library organized by brand and content type
  4. Annual portfolio voice review process

assertions:
  - type: llm_judge
    criteria: "All 5 sub-brand voices are distinctly different from each other — Harvest Table sounds nothing like QuickFuel, which sounds nothing like Little Sprouts"
    weight: 0.30
    description: "Distinctly different sub-brand voices"
  - type: llm_judge
    criteria: "Voice architecture balances unity and differentiation — there's enough shared DNA that all brands feel like Constellation, but each has its own personality"
    weight: 0.25
    description: "Balanced unity and differentiation"
  - type: llm_judge
    criteria: "Governance handles real tensions — the conflict resolution for competing voices and cross-brand crises is thoughtful and practical"
    weight: 0.25
    description: "Practical conflict resolution"
  - type: llm_judge
    criteria: "Documentation system is scalable — it could accommodate additional sub-brands without restructuring"
    weight: 0.20
    description: "Scalable documentation system"
