meta:
  id: voice-measurement-framework
  level: 4
  course: brand-voice-documentation
  type: output
  description: "Build advanced voice measurement systems — quantify voice impact on business metrics, create scorecards, and prove voice ROI"
  tags: [brand-voice, measurement, roi, analytics, business-impact, expert]

state: {}

trigger: |
  Voice quality affects business outcomes — but proving it
  requires rigorous measurement. Beyond consistency scores,
  advanced voice measurement connects voice decisions to
  brand perception, customer behavior, and revenue impact.

  Build a comprehensive voice measurement framework for:
  Brand: "Catalyst Commerce" — e-commerce platform
  Annual marketing budget: $2.5M
  Revenue: $18M annually
  Challenge: Proving that voice quality investment drives results

  Part 1: Voice measurement model
  1. Leading indicators (predict future performance):
     - Voice consistency score (content audit-based)
     - Brand voice recognition rate (can audiences identify the brand?)
     - Team voice competency scores
     - Content production efficiency
  2. Lagging indicators (measure actual impact):
     - Brand perception shifts (surveys)
     - Content engagement rates by voice quality score
     - Customer sentiment in support interactions
     - NPS correlation with voice consistency
  3. Business impact metrics:
     - Conversion rate by voice quality
     - Customer lifetime value correlation
     - Support ticket resolution satisfaction
     - Brand search volume trends

  Part 2: Voice ROI calculation
  1. Investment side:
     - Voice documentation creation costs
     - Training program costs
     - Review and governance costs
     - Tool and technology costs
  2. Return side:
     - Content production efficiency gains
     - Reduced revision cycles
     - Improved content performance metrics
     - Brand equity value estimation
  3. ROI model with sample calculations:
     - Conservative, moderate, and aggressive scenarios
     - Break-even analysis
     - 3-year projection

  Part 3: Voice performance dashboard
  Design an executive voice performance dashboard:
  1. Top-level KPIs (what the CMO sees)
  2. Department-level drill-downs
  3. Channel-level analysis
  4. Trend visualizations
  5. Competitive benchmarking section
  6. Monthly reporting template with narrative guidance

assertions:
  - type: llm_judge
    criteria: "Measurement model connects voice quality to business outcomes — the chain from consistency scores to engagement to conversion to revenue is logical"
    weight: 0.30
    description: "Voice-to-business connection"
  - type: llm_judge
    criteria: "ROI calculations are realistic — investment costs and return estimates are grounded, not inflated or speculative"
    weight: 0.25
    description: "Realistic ROI calculations"
  - type: llm_judge
    criteria: "Dashboard design would satisfy a CMO — it tells a story about voice impact, not just display metrics"
    weight: 0.25
    description: "CMO-grade dashboard"
  - type: llm_judge
    criteria: "Leading vs. lagging indicators are correctly categorized and each metric is measurable with available tools"
    weight: 0.20
    description: "Correctly categorized measurable metrics"
