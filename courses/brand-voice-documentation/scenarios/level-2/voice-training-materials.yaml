meta:
  id: voice-training-materials
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Create voice training materials — onboarding programs, workshop exercises, and reference tools that help teams internalize brand voice"
  tags: [brand-voice, training, onboarding, workshops, education, intermediate]

state: {}

trigger: |
  Documentation alone doesn't create voice consistency — people
  need training. The best voice training programs use exercises,
  not lectures, to help writers internalize the brand's personality
  until it becomes second nature.

  Create a complete voice training program for:
  Brand: "Northstar Insurance" — modern insurance company (trying
  to differentiate from boring, corporate insurance voice)
  Team: 12 content contributors (marketing, support, sales)

  Part 1: Voice onboarding module
  Design a 90-minute onboarding session for new team members:
  1. Introduction to Northstar's voice (15 min):
     - The voice document walkthrough
     - Why voice matters for insurance (differentiation)
  2. Exercise 1 — Voice recognition (20 min):
     - Present 10 content samples, some on-brand, some off-brand
     - Participants identify which are on-brand and why
  3. Exercise 2 — Voice translation (25 min):
     - Give 5 pieces of generic/corporate insurance copy
     - Participants rewrite each in Northstar's voice
  4. Exercise 3 — Tone shifting (20 min):
     - One message, 4 contexts (celebration, apology, education, urgency)
     - Participants write all 4 versions
  5. Wrap-up and Q&A (10 min)

  Part 2: Ongoing training resources
  1. Voice quick-reference card (wallet-sized cheat sheet)
  2. "Is this on-brand?" decision flowchart
  3. Monthly voice challenge (fun exercises to keep voice top-of-mind)
  4. Before/after gallery (real examples of voice improvements)

  Part 3: Voice champion program
  1. Selecting voice champions in each department
  2. Champion responsibilities and training
  3. Peer review process for voice consistency
  4. Escalation process for voice disagreements
  5. Quarterly voice health assessment

assertions:
  - type: llm_judge
    criteria: "Training exercises are interactive and engaging — they teach through practice, not just reading the voice document"
    weight: 0.30
    description: "Interactive engaging exercises"
  - type: llm_judge
    criteria: "Onboarding session is well-paced and practical — 90 minutes is enough time for the exercises described without feeling rushed"
    weight: 0.25
    description: "Well-paced onboarding"
  - type: llm_judge
    criteria: "Ongoing resources keep voice top-of-mind — monthly challenges and reference tools prevent voice drift after initial training"
    weight: 0.25
    description: "Effective ongoing resources"
  - type: llm_judge
    criteria: "Voice champion program is practical — it creates accountability without bureaucracy for a 12-person team"
    weight: 0.20
    description: "Practical champion program"
