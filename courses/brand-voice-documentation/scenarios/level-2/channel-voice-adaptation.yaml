meta:
  id: channel-voice-adaptation
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Adapt brand voice across channels — create channel-specific guidelines for social, email, website, support, and advertising"
  tags: [brand-voice, channels, adaptation, multi-channel, guidelines, intermediate]

state: {}

trigger: |
  The same brand voice must work across social media, email,
  website copy, customer support, and advertising. Voice stays
  constant; tone and style adapt to each channel's norms,
  audience expectations, and format constraints.

  Part 1: Channel-by-channel voice guidelines
  For "Summit Gear" (premium outdoor equipment brand):
  Create voice guidelines for 6 channels:

  1. Website copy:
     - Tone position on each dimension
     - Sentence length and structure preferences
     - Vocabulary level
     - Example: Homepage hero section copy
     - Example: Product description

  2. Social media (Instagram/TikTok):
     - Tone adjustments from website
     - Emoji and hashtag usage rules
     - Engagement and reply voice
     - Example: Product launch post
     - Example: Reply to a customer comment

  3. Email marketing:
     - Tone for newsletters vs. transactional emails
     - Subject line voice guidelines
     - Example: Welcome email opening paragraph
     - Example: Cart abandonment email

  4. Customer support:
     - Empathy expression guidelines
     - Apology language conventions
     - How to say "no" on-brand
     - Example: Response to complaint
     - Example: Response to feature request

  5. Advertising copy:
     - How voice changes for paid content
     - Headline vs. body copy voice
     - Example: Facebook ad (headline + body)
     - Example: Google Ad (within character limits)

  6. Blog/long-form content:
     - Authority and expertise expression
     - Storytelling voice conventions
     - Example: Blog post opening paragraph
     - Example: Thought leadership piece excerpt

  Part 2: Cross-channel consistency checklist
  Create a 10-item checklist for maintaining voice consistency
  across all channels.

assertions:
  - type: llm_judge
    criteria: "All 6 channels sound like the same brand — Summit Gear is recognizable whether on Instagram, in an email, or in a customer support response"
    weight: 0.30
    description: "Cross-channel voice consistency"
  - type: llm_judge
    criteria: "Channel-specific adaptations are appropriate — social media is more casual than website copy, support is more empathetic than advertising"
    weight: 0.30
    description: "Appropriate channel adaptations"
  - type: llm_judge
    criteria: "Examples are realistic and channel-native — the Instagram post feels like Instagram, the Google Ad fits character limits"
    weight: 0.20
    description: "Channel-native examples"
  - type: llm_judge
    criteria: "The consistency checklist is practical — items are specific enough to actually check during content review"
    weight: 0.20
    description: "Practical consistency checklist"
