meta:
  id: style-guide-creation
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Build a comprehensive brand voice style guide — organize all voice documentation into a professional, navigable reference document"
  tags: [brand-voice, style-guide, comprehensive, documentation, reference, intermediate]

state: {}

trigger: |
  A brand voice style guide is the complete reference document
  that governs all brand communication. Unlike a simple voice
  chart (1 page), a style guide covers voice, tone, grammar,
  channel guidelines, and examples in depth. The best guides
  are comprehensive without being overwhelming — organized for
  quick reference.

  Create a comprehensive brand voice style guide for:
  Brand: "Meridian Travel" — luxury adventure travel company
  Audience: Affluent travelers (35-60) seeking curated experiences
  Voice: Sophisticated yet adventurous, like a well-traveled
  friend who knows the best hidden gems

  The style guide should include:

  Section 1: Voice Foundation (1 page)
  - Brand voice statement
  - Core voice attributes (4 descriptors with definitions)
  - Voice chart

  Section 2: Tone Guidelines (1-2 pages)
  - Tone spectrum
  - Tone by scenario (6 scenarios)
  - Tone by audience segment

  Section 3: Writing Standards (1-2 pages)
  - Grammar and punctuation conventions
  - Formatting standards
  - Number, date, and currency formatting
  - Capitalization rules

  Section 4: Channel Guidelines (2-3 pages)
  - Website copy guidelines with examples
  - Email guidelines with examples
  - Social media guidelines with examples
  - Print/brochure guidelines with examples
  - Customer service guidelines with examples

  Section 5: Word Lists and Terminology (1 page)
  - Branded terms
  - Preferred alternatives
  - Banned words
  - Travel industry terminology guide

  Section 6: Content Templates (1-2 pages)
  - Email template with voice annotations
  - Social media post template
  - Blog post outline with voice notes
  - Customer response template

  Include a "Quick Start" summary on page 1 for writers who
  need the essentials fast.

assertions:
  - type: llm_judge
    criteria: "The style guide is well-organized and navigable — a writer could find what they need quickly without reading the entire document"
    weight: 0.25
    description: "Well-organized navigable guide"
  - type: llm_judge
    criteria: "Voice attributes capture luxury adventure travel — the voice feels sophisticated yet adventurous, not generic 'professional' or 'friendly'"
    weight: 0.25
    description: "Authentic luxury adventure voice"
  - type: llm_judge
    criteria: "Content templates are genuinely useful — they show where voice decisions apply within real content formats"
    weight: 0.25
    description: "Useful content templates"
  - type: llm_judge
    criteria: "The Quick Start summary captures the essentials — a writer in a rush could produce acceptable on-brand content from this alone"
    weight: 0.25
    description: "Effective quick-start summary"
