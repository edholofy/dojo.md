meta:
  id: voice-testing
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Test brand voice with audiences — design surveys, A/B tests, and focus groups to validate voice decisions with real users"
  tags: [brand-voice, testing, research, validation, audience, intermediate]

state: {}

trigger: |
  Voice decisions shouldn't be made in a vacuum. Testing with
  real audiences validates whether your documented voice actually
  resonates. A/B tests measure performance, surveys capture
  perception, and focus groups reveal emotional responses.

  Design a voice testing program for "Finley" — a personal
  finance app launching a voice refresh:
  Current voice: Corporate and educational
  Proposed voice: Friendly and empowering

  Part 1: A/B testing plan
  Design 4 A/B tests comparing old voice vs. new voice:
  1. Email subject lines (open rate comparison):
     - Write 3 old-voice and 3 new-voice subject lines
     - Define sample size and statistical significance threshold
  2. Onboarding screen copy (completion rate comparison):
     - Write old and new versions of 3 onboarding screens
     - Define success metrics
  3. Push notifications (click-through comparison):
     - Write 4 old-voice and 4 new-voice notifications
     - Testing methodology
  4. Error messages (support ticket reduction):
     - Write 3 old-voice and 3 new-voice error messages
     - Measurement approach

  Part 2: Perception survey design
  Create a brand voice perception survey:
  1. 10 survey questions (mix of rating scales and open-ended)
  2. Word selection exercise (participants choose adjectives
     that describe the brand's communication)
  3. Paired comparison (show two versions, ask which feels
     more like the brand they trust)
  4. Analysis methodology (how to interpret results)

  Part 3: Focus group guide
  Design a 60-minute focus group:
  1. Discussion guide with questions and prompts
  2. Content stimulus materials (what to show participants)
  3. Emotional response capture method
  4. Analysis template for synthesizing findings
  5. How to translate findings into voice document updates

assertions:
  - type: llm_judge
    criteria: "A/B tests are methodologically sound — sample sizes, significance thresholds, and success metrics are appropriate"
    weight: 0.25
    description: "Sound A/B test methodology"
  - type: llm_judge
    criteria: "Old voice vs. new voice examples clearly demonstrate the difference — old sounds corporate, new sounds friendly and empowering"
    weight: 0.25
    description: "Clear voice comparison"
  - type: llm_judge
    criteria: "Survey design captures meaningful perception data — questions go beyond satisfaction to measure how the voice is perceived"
    weight: 0.25
    description: "Meaningful survey design"
  - type: llm_judge
    criteria: "Focus group guide would generate useful insights — questions are open-ended enough for rich discussion, structured enough for analysis"
    weight: 0.25
    description: "Effective focus group design"
