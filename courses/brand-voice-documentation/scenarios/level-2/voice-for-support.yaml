meta:
  id: voice-for-support
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Develop customer support voice guidelines — define empathy expression, apology language, escalation tone, and resolution communication"
  tags: [brand-voice, support, customer-service, empathy, guidelines, intermediate]

state: {}

trigger: |
  Customer support is where brand voice is tested most. Angry
  customers, technical problems, billing disputes — support
  agents need clear voice guidelines for situations where
  emotions run high and the stakes feel personal.

  Create customer support voice guidelines for:
  Brand: "CloudSync" (SaaS project management tool, 5,000 customers)
  Support team: 8 agents across 2 time zones
  Voice: Helpful, knowledgeable, human

  Part 1: Support voice fundamentals
  1. How support voice differs from marketing voice
  2. The empathy spectrum: when to be warm vs. professional
  3. Pronoun usage in support (I/we/you conventions)
  4. How to maintain brand voice under pressure

  Part 2: Scenario-specific guidelines
  Write voice guidelines AND example responses for:

  1. First response to a bug report:
     - Acknowledge → empathize → set expectations
     - Template with customization zones

  2. Delivering bad news (feature being deprecated):
     - Lead with empathy → explain → offer alternatives
     - What to say and what NOT to say

  3. Handling an angry customer:
     - De-escalation language
     - Validation without agreement
     - 3 example responses at increasing anger levels

  4. Saying "no" to a feature request:
     - Acknowledge the need → explain the constraint → redirect
     - How to say no without the word "no"

  5. Apologizing for an outage:
     - What a good apology includes (and doesn't include)
     - Template for outage communication
     - Follow-up after resolution

  6. Billing dispute resolution:
     - Professional tone for sensitive money conversations
     - Empathy without liability admission
     - Clear next-steps language

  Part 3: Support voice training
  1. How to train new agents on voice guidelines
  2. QA scoring rubric for support interactions
  3. Common support voice mistakes (with corrections)
  4. Canned response voice review process

assertions:
  - type: llm_judge
    criteria: "Support responses feel human and brand-consistent — they don't sound like robotic templates or generic customer service scripts"
    weight: 0.30
    description: "Human brand-consistent responses"
  - type: llm_judge
    criteria: "Anger de-escalation language is sophisticated — it validates frustration without being defensive or dismissive"
    weight: 0.25
    description: "Effective de-escalation language"
  - type: llm_judge
    criteria: "Guidelines cover the full emotional range — from routine questions to heated disputes, with appropriate tone for each"
    weight: 0.25
    description: "Full emotional range coverage"
  - type: llm_judge
    criteria: "Training and QA elements are practical — a support manager could implement the training program and scoring rubric immediately"
    weight: 0.20
    description: "Implementable training system"
