meta:
  id: tone-scenarios
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Document tone variations for specific scenarios — create a tone map showing how voice adapts across emotional contexts and communication situations"
  tags: [brand-voice, tone, scenarios, emotional-context, adaptation, intermediate]

state: {}

trigger: |
  Voice documents often define voice but forget to document tone
  variations. Writers need to know: "How does our brand sound
  when delivering bad news? When celebrating? When educating?
  When apologizing?" A tone scenario map answers these questions.

  Part 1: Tone scenario categories
  Define 6 emotional/situational categories that require
  different tones:
  1. Celebratory (launches, milestones, wins)
  2. Educational (teaching, explaining, guiding)
  3. Empathetic (acknowledging problems, showing care)
  4. Apologetic (mistakes, outages, issues)
  5. Urgent (deadlines, security, time-sensitive)
  6. Conversational (casual engagement, community)

  Part 2: Complete tone scenario map
  For "Waveform Audio" (music production software company):
  For each of the 6 categories:
  1. Describe how tone shifts from the default position
  2. What changes: vocabulary, sentence structure, emoji,
     punctuation, energy level
  3. What stays the same (core voice characteristics)
  4. Write 3 example messages in this tone:
     - A short message (push notification or headline)
     - A medium message (email paragraph or social post)
     - A long message (full email or blog excerpt)

  Part 3: Tone transition guide
  Address how to handle tone shifts:
  1. When a message needs to shift tone mid-way (e.g., bad news
     followed by a solution)
  2. How to transition from celebratory content to regular content
  3. How to maintain brand voice during emotionally charged situations
  4. When to pause regular content and shift to crisis tone

assertions:
  - type: llm_judge
    criteria: "All 6 tone categories sound distinctly different yet recognizably Waveform Audio — the brand is consistent while the emotion changes"
    weight: 0.30
    description: "Distinct yet consistent tones"
  - type: llm_judge
    criteria: "Tone shifts are clearly documented — what changes vs. what stays the same is specific enough for a writer to implement"
    weight: 0.25
    description: "Clearly documented tone shifts"
  - type: llm_judge
    criteria: "Example messages at all three lengths demonstrate the tone effectively — short messages aren't just truncated long messages"
    weight: 0.25
    description: "Length-appropriate examples"
  - type: llm_judge
    criteria: "Tone transition guidance addresses real challenges — mid-message shifts and crisis transitions are practical"
    weight: 0.20
    description: "Practical transition guidance"
