meta:
  id: voice-audit-process
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Conduct a brand voice audit — systematically evaluate existing content for voice consistency, identify gaps, and create improvement plans"
  tags: [brand-voice, audit, evaluation, consistency, assessment, intermediate]

state: {}

trigger: |
  A voice audit examines all existing brand content to assess
  how consistently the documented voice is applied. It reveals
  gaps, inconsistencies, and opportunities for improvement.

  Conduct a voice audit for "Prism Design Studio" (digital
  design agency, 15 employees):

  Part 1: Audit preparation
  1. Define the audit scope:
     - Which channels to audit (list all touchpoints)
     - Sample size per channel (how many pieces to review)
     - Time period to cover
     - Who conducts the audit
  2. Create the audit criteria:
     - Voice descriptor adherence (does content match descriptors?)
     - Tone appropriateness (right tone for context?)
     - Terminology compliance (approved words used correctly?)
     - Style convention adherence (grammar rules followed?)
     - Overall brand fit (does it feel on-brand?)

  Part 2: Audit execution
  Given these 8 content samples from Prism Design Studio,
  evaluate each for voice consistency:

  Sample 1 (Website homepage): "We craft digital experiences
  that captivate, engage, and convert. Our award-winning team
  brings your vision to life."

  Sample 2 (Instagram post): "omg this project was SO fun to
  work on!! cant wait to share more 🎨🔥🔥🔥"

  Sample 3 (Client email): "Dear Valued Client, We are writing
  to inform you that the project deliverables have been completed
  per the agreed-upon specifications."

  Sample 4 (Blog post): "Here's the thing about great design —
  it's not about making things pretty. It's about solving
  problems that matter."

  Sample 5 (Error page): "404 Error: Page Not Found. Return to
  homepage."

  Sample 6 (Support reply): "Hey! Thanks for reaching out. Let
  me dig into this and get back to you real quick!"

  Sample 7 (Case study): "For ClientCo, we implemented a
  comprehensive UX strategy leveraging cutting-edge design
  methodologies to optimize user engagement metrics."

  Sample 8 (Job posting): "We're looking for a rockstar designer
  who can crush it and bring big energy to our team!")

  For each sample:
  - Score on voice consistency (1-5)
  - Identify what's on-brand and what's off-brand
  - Rewrite the off-brand elements

  Part 3: Audit report
  1. Summary of findings (overall consistency score)
  2. Channel-by-channel breakdown
  3. Top 5 inconsistency patterns identified
  4. Priority recommendations for improvement
  5. Timeline for follow-up audit

assertions:
  - type: llm_judge
    criteria: "Content samples are correctly evaluated — the overly casual Instagram post, jargon-heavy case study, and corporate email should be flagged as inconsistent"
    weight: 0.30
    description: "Correct inconsistency identification"
  - type: llm_judge
    criteria: "Rewrites improve off-brand content while maintaining each channel's appropriate tone — the improved Instagram post is still social, just more on-brand"
    weight: 0.25
    description: "Effective on-brand rewrites"
  - type: llm_judge
    criteria: "The audit report identifies patterns, not just individual issues — it diagnoses systemic voice problems"
    weight: 0.25
    description: "Pattern-level diagnosis"
  - type: llm_judge
    criteria: "Recommendations are prioritized and actionable — they tell the team what to fix first and how"
    weight: 0.20
    description: "Prioritized actionable recommendations"
