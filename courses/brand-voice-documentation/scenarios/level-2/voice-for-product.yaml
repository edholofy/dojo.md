meta:
  id: voice-for-product
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Document voice for product and UX copy — in-app messaging, onboarding flows, error states, empty states, and microcopy"
  tags: [brand-voice, product, ux-copy, microcopy, in-app, intermediate]

state: {}

trigger: |
  Product copy (UX writing) is where brand voice meets user
  experience. Every button label, error message, tooltip, and
  onboarding screen communicates voice. Product voice must
  balance personality with usability — clever copy that confuses
  users is bad copy.

  Create product voice guidelines for:
  Brand: "TaskFlow" (project management app, voice: clear,
  encouraging, and efficient)

  Part 1: Product copy voice principles
  1. How product voice differs from marketing voice
  2. The hierarchy: clarity > personality > brevity
  3. When personality enhances usability vs. hinders it
  4. Accessibility considerations in voice decisions

  Part 2: Product copy by component
  Write voice guidelines and 3 examples for each:

  1. Button labels and CTAs:
     - Action-oriented language guidelines
     - Examples: primary buttons, secondary actions, destructive actions

  2. Error messages:
     - Error message voice formula (what happened → why → what to do)
     - Examples: form validation, server error, permission denied

  3. Empty states:
     - How to encourage without patronizing
     - Examples: first-time empty, no results, cleared inbox

  4. Onboarding copy:
     - Progressive disclosure voice approach
     - Examples: welcome screen, feature introduction, completion

  5. Success states and confirmations:
     - Celebration calibration (don't over-celebrate small actions)
     - Examples: task completed, payment processed, team joined

  6. Tooltips and help text:
     - Concise explanation voice
     - Examples: feature tooltip, setting explanation, shortcut hint

  7. Loading and waiting states:
     - Managing frustration with voice
     - Examples: processing, uploading, generating

  Part 3: Product voice review checklist
  Create a 10-item checklist for reviewing product copy
  against voice guidelines before release.

assertions:
  - type: llm_judge
    criteria: "Product copy examples balance personality with clarity — every message is immediately understandable while still sounding like TaskFlow"
    weight: 0.30
    description: "Personality-clarity balance"
  - type: llm_judge
    criteria: "Error messages are genuinely helpful — they tell users what happened, why, and what to do next, all in brand voice"
    weight: 0.25
    description: "Helpful on-brand error messages"
  - type: llm_judge
    criteria: "Voice guidelines distinguish between high-personality moments (empty states) and low-personality moments (destructive action confirmation)"
    weight: 0.25
    description: "Appropriate personality calibration"
  - type: llm_judge
    criteria: "Product voice principles correctly prioritize clarity over cleverness for UX writing"
    weight: 0.20
    description: "Correct UX voice priorities"
