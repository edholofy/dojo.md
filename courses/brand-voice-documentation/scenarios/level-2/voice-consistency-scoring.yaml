meta:
  id: voice-consistency-scoring
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Build a voice consistency scoring system — create rubrics, metrics, and measurement frameworks to quantify voice adherence"
  tags: [brand-voice, scoring, measurement, consistency, metrics, intermediate]

state: {}

trigger: |
  "Is this on-brand?" shouldn't be a subjective question.
  A scoring system turns voice consistency from a feeling into
  a measurable metric, enabling objective content review and
  tracking improvement over time.

  Part 1: Scoring rubric design
  Create a comprehensive voice consistency scoring rubric:
  1. Define 8 scoring criteria with descriptions:
     - Voice descriptor adherence
     - Tone appropriateness for context
     - Terminology compliance
     - Grammar/style convention adherence
     - Audience appropriateness
     - Channel-native adaptation
     - Emotional resonance
     - Overall brand fit
  2. For each criterion:
     - Define what scores 1, 2, 3, 4, and 5
     - Provide an anchor example for scores 1, 3, and 5
  3. Weight the criteria (not all are equally important)

  Part 2: Apply the scoring system
  Score these 5 content pieces for "Evergreen Learning"
  (online course platform, voice: encouraging, expert, accessible):

  Piece 1: "Ready to level up your skills? Our new data science
  track makes complex concepts click. Start your journey today."

  Piece 2: "The aforementioned curriculum has been meticulously
  crafted to facilitate optimal learning outcomes through
  pedagogically sound methodologies."

  Piece 3: "OMG you guys, this course is literally going to
  change your LIFE!!! Sign up now before spots run out!!!"

  Piece 4: "Not sure where to start? That's completely normal.
  Our learning path quiz matches you with the perfect course
  based on your goals and experience level."

  Piece 5: "Data science. Machine learning. AI. These aren't
  just buzzwords — they're career skills you can master. Here's
  how we make it happen."

  Show the complete scoring for each piece with justification.

  Part 3: Tracking and reporting
  1. How to aggregate scores into a monthly consistency score
  2. Setting benchmark targets (what score is "good enough"?)
  3. Tracking improvement over time
  4. Identifying training needs from low-scoring areas

assertions:
  - type: llm_judge
    criteria: "Scoring rubric is objective enough that two reviewers would score the same content similarly — criteria are specific with clear anchor examples"
    weight: 0.30
    description: "Objective scoring rubric"
  - type: llm_judge
    criteria: "Content scoring is accurate — the jargon-heavy piece and the overly casual piece score low, while natural on-brand pieces score high"
    weight: 0.30
    description: "Accurate content scoring"
  - type: llm_judge
    criteria: "Criteria weights reflect real importance — voice descriptor adherence likely matters more than grammar conventions"
    weight: 0.20
    description: "Appropriate criteria weighting"
  - type: llm_judge
    criteria: "Tracking and reporting framework is practical — monthly scores, benchmarks, and training needs identification would work in a real organization"
    weight: 0.20
    description: "Practical tracking framework"
