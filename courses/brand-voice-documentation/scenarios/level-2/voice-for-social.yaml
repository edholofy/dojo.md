meta:
  id: voice-for-social
  level: 2
  course: brand-voice-documentation
  type: output
  description: "Develop social media voice guidelines — platform-specific adaptation, engagement voice, crisis response tone, and community management"
  tags: [brand-voice, social-media, platforms, engagement, community, intermediate]

state: {}

trigger: |
  Social media voice requires special documentation because it's
  the most public, most frequent, and most interactive expression
  of brand voice. It's also where brands are most likely to go
  off-brand — the pressure to be "relatable" often overrides
  voice consistency.

  Create social media voice guidelines for:
  Brand: "Atlas Robotics" — a consumer robotics company making
  home robots (approachable tech brand, not cold/corporate)

  Part 1: Platform-specific voice adaptation
  Define voice guidelines for each platform:
  1. Instagram: Visual-first, lifestyle tone, community feel
  2. X/Twitter: Quick, witty, conversational, newsy
  3. LinkedIn: Professional but personable, thought leadership
  4. TikTok: Fun, educational, trend-aware, authentic
  5. YouTube: Deeper explanations, tutorial tone, personable

  For each platform:
  - Tone position adjustments
  - Content format preferences
  - Vocabulary and language level
  - One example post demonstrating the platform voice

  Part 2: Engagement and reply voice
  1. How to respond to positive comments (5 examples)
  2. How to respond to negative comments (5 examples)
  3. How to handle trolls or harassment (guidelines + 3 examples)
  4. Proactive engagement guidelines (commenting on others' posts)
  5. DM conversation voice (different from public posts?)

  Part 3: Social media voice governance
  1. Who speaks for the brand on social (roles and permissions)
  2. Real-time content approval process
  3. Trend participation guidelines (which trends to join, which to avoid)
  4. Social media crisis response voice protocols
  5. Personal brand vs. company brand boundaries

assertions:
  - type: llm_judge
    criteria: "Platform voice adaptations are genuinely platform-native — the TikTok voice feels like TikTok, the LinkedIn voice feels like LinkedIn"
    weight: 0.25
    description: "Platform-native voice adaptations"
  - type: llm_judge
    criteria: "Engagement replies demonstrate personality — they don't sound like generic brand responses or chatbot outputs"
    weight: 0.25
    description: "Personality-rich engagement"
  - type: llm_judge
    criteria: "Negative comment and troll handling is sophisticated — responses protect the brand while maintaining the voice and treating people with respect"
    weight: 0.25
    description: "Sophisticated negative engagement"
  - type: llm_judge
    criteria: "Governance guidelines are practical for a growing company — real-time approvals, trend participation, and crisis protocols would actually work"
    weight: 0.25
    description: "Practical governance guidelines"
