meta:
  id: market-research-handbook
  level: 5
  course: market-analysis-summary
  type: output
  description: "Create the definitive research handbook for housing market analysis — comprehensive methodological guide for academics, practitioners, and policymakers"
  tags: [research-handbook, methodology-guide, comprehensive-reference, master]

state: {}

trigger: |
  Oxford University Press has commissioned you to edit
  "The Oxford Handbook of Housing Market Analysis."
  This will be the definitive academic reference work
  in the field. Design the complete handbook.

  Handbook specifications:
  - 800-1,000 pages, 35-40 chapters
  - Contributing authors: Mix of academics (60%) and
    practitioners (40%)
  - Audience: Graduate students, researchers,
    policymakers, senior practitioners
  - Publication timeline: 2 years
  - Must be comprehensive, authoritative, and forward-
    looking

  Competing reference works:
  - "Handbook of Real Estate & Macroeconomy" (2019):
    Macro focus, limited micro-market methodology
  - "Handbook of Regional & Urban Economics Vol. 5":
    Academic, no practitioner guidance
  - "Real Estate Market Analysis" (ULI, 2001):
    Practitioner-focused but dated, no technology
  - "Housing Economics & Policy" (2020): UK-focused
  - Gap: No single work bridges academic methodology,
    practitioner tools, and emerging technology

  Section structure to design:
  Part I: Foundations (theory, history, institutions)
  Part II: Data & Methodology (sources, statistics,
    spatial analysis)
  Part III: Market Analysis in Practice (CMA, segments,
    commercial, investment)
  Part IV: Advanced Analytics (predictive, ML, NLP,
    knowledge graphs)
  Part V: Policy & Society (affordability, equity,
    climate, regulation)
  Part VI: International Perspectives (by region)
  Part VII: Future Directions (AI, blockchain, new
    paradigms)

  Create:
  1. Complete table of contents with chapter descriptions
  2. Contributing author wish list (real scholars,
     justified selections)
  3. Editorial methodology and quality standards
  4. Sample chapter outline (one foundational + one
     cutting-edge)
  5. Cross-chapter integration strategy
  6. Marketing and impact plan

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive table of contents — 35-40 chapters across 7 sections, each chapter has a clear scope that doesn't overlap with others, progressively builds knowledge from foundations to frontier, and identifies genuine gaps in existing literature."
    weight: 0.35
    description: "TableOfContentsComprehensiveness"
  - type: llm_judge
    criteria: "Contributing author selections are credible — references real scholars and practitioners in appropriate fields (e.g., spatial econometrics scholars for methodology chapters, PropTech leaders for technology chapters), with justification based on their published work."
    weight: 0.35
    description: "AuthorSelectionCredibility"
  - type: llm_judge
    criteria: "Sample chapter outlines demonstrate the handbook's distinctive approach — bridges academic rigor with practical application, includes case studies, datasets, and replication code references; cross-chapter integration strategy ensures coherence despite 40+ contributing authors."
    weight: 0.30
    description: "ContentQualityStandard"
