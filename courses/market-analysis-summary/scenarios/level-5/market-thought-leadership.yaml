meta:
  id: market-thought-leadership
  level: 5
  course: market-analysis-summary
  type: output
  description: "Create a market analysis thought leadership platform — develop original frameworks, publish influential research, and establish authority in housing market intelligence"
  tags: [thought-leadership, original-frameworks, industry-influence, master]

state: {}

trigger: |
  You're establishing yourself as the definitive voice
  in real estate market analysis. Design your complete
  thought leadership strategy and create original
  analytical frameworks.

  Your background:
  - 20+ years in real estate market analysis
  - Former chief economist at a top-10 brokerage
  - PhD in Urban Economics
  - Published in Journal of Real Estate Finance & Economics
  - Regular commentator on CNBC, Bloomberg, WSJ
  - 85K Twitter/X followers, 50K LinkedIn

  Current landscape of market analysis thought leaders:
  | Name             | Platform       | Strength          | Gap                |
  |------------------|----------------|-------------------|--------------------|
  | Lawrence Yun     | NAR            | Industry data     | Perceived bias     |
  | Mark Zandi       | Moody's        | Macro integration | Not practitioner   |
  | Robert Shiller   | Yale           | Academic rigor    | Inaccessible       |
  | Ivy Zelman       | Zelman & Assoc | Builder insight   | Wall Street focus  |
  | Logan Mohtashami | HousingWire    | Contrarian data   | Solo operator      |

  Your differentiation: Bridge academia, industry
  practice, and technology with data-driven local
  market intelligence methodology

  Create:
  1. Three original analytical frameworks (named,
     proprietary, publishable)
  2. Content strategy (weekly, monthly, quarterly cadence)
  3. Speaking and media engagement plan
  4. Research agenda (3-year pipeline)
  5. Monetization strategy
  6. Legacy and intellectual property plan

assertions:
  - type: llm_judge
    criteria: "Response creates three genuinely original analytical frameworks — each should have a memorable name, clear methodology, practical application, and differentiation from existing approaches; they should build on the unique bridge between academia, practice, and technology."
    weight: 0.35
    description: "OriginalFrameworks"
  - type: llm_judge
    criteria: "Content strategy has appropriate cadence and depth — weekly data commentary (Twitter/LinkedIn), monthly deep-dive reports, quarterly market forecasts, annual market outlook; each format serves a different audience need and reinforces expertise."
    weight: 0.35
    description: "ContentStrategy"
  - type: llm_judge
    criteria: "Research agenda and monetization are sustainable — 3-year research pipeline builds on prior work, monetization doesn't compromise credibility (consulting, speaking, licensing frameworks, not sponsored content), and legacy plan considers succession and IP protection."
    weight: 0.30
    description: "SustainablePlatform"
