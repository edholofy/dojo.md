meta:
  id: market-social-enterprise
  level: 5
  course: market-analysis-summary
  type: output
  description: "Design a social enterprise using market analysis — create equitable access to housing market intelligence for underserved communities and first-generation homebuyers"
  tags: [social-enterprise, equity, housing-access, master]

state: {}

trigger: |
  Design a social enterprise that uses real estate
  market analysis to address housing inequity. The
  organization should be financially sustainable while
  serving communities that lack access to quality
  market intelligence.

  The equity gap in market analysis:
  - Affluent buyers: Access to agents with market
    expertise, custom CMAs, investment analysis
  - Low-income buyers: Rely on Zillow estimates,
    no agent guidance, vulnerable to predatory
    practices
  - Minority communities: 2.7x more likely to receive
    inflated appraisals in majority-white areas, 3.2x
    more likely to receive deflated appraisals in
    majority-minority areas

  Target communities:
  - First-generation homebuyers (no family RE knowledge)
  - Communities of color (historical redlining impact)
  - Rural communities (limited agent/appraiser access)
  - Immigrant communities (unfamiliar with US RE system)
  - Veterans (transitioning from military housing)

  Market intelligence needs:
  - Neighborhood safety and trend analysis (without
    racial bias)
  - Fair pricing verification (am I paying too much?)
  - Investment potential assessment (wealth building)
  - Predatory lending/practice identification
  - Post-purchase market monitoring (equity tracking)

  Funding sources:
  - Community Development Financial Institutions (CDFIs)
  - HUD Housing Counseling grants
  - CRA-motivated bank partnerships
  - Foundation grants (Ford, Annie E. Casey, JPM Chase)
  - Fee-for-service from participating lenders
  - Social impact investors

  Create:
  1. Mission, theory of change, and impact model
  2. Service design (what market analysis tools/reports)
  3. Technology platform for equitable access
  4. Anti-bias methodology for all analysis
  5. Financial sustainability model
  6. Impact measurement framework

assertions:
  - type: llm_judge
    criteria: "Response designs services that genuinely address the equity gap — not just cheaper versions of existing tools, but fundamentally different approaches: bias-tested neighborhood analysis, fair pricing verification against discriminatory patterns, and wealth-building projections tailored to first-gen buyers."
    weight: 0.35
    description: "EquityFocusedDesign"
  - type: llm_judge
    criteria: "Anti-bias methodology is rigorous — explicitly tests market analysis outputs for disparate impact across protected classes, addresses algorithmic bias in any automated tools, incorporates community input in neighborhood analysis, and avoids perpetuating redlining patterns."
    weight: 0.35
    description: "AntiBiasMethodology"
  - type: llm_judge
    criteria: "Financial model is sustainable without mission drift — revenue streams don't create perverse incentives (e.g., fee-for-service from lenders must not compromise independence), diversified funding reduces single-source risk, and impact measurement connects to ongoing funding eligibility."
    weight: 0.30
    description: "SustainableImpact"
