meta:
  id: master-market-shift
  level: 5
  course: market-analysis-summary
  type: output
  description: "Handle the ultimate shift simulation — integrate thought leadership, global perspective, and systems thinking to address the fundamental transformation of how housing markets are analyzed"
  tags: [shift-simulation, fundamental-transformation, systems-thinking, master]

state: {}

trigger: |
  You've been asked to deliver a keynote address at the
  World Economic Forum's Housing Summit titled: "The
  End of Market Analysis As We Know It: Rebuilding
  Housing Intelligence for a Post-AI World."

  The thesis: The convergence of AI, climate change,
  demographic shifts, and remote work has made
  traditional real estate market analysis methodology
  fundamentally obsolete. We need to rebuild from
  first principles.

  Arguments to address:

  The obsolescence argument:
  - Historical comparables are meaningless when the
    future doesn't resemble the past (climate migration,
    remote work)
  - AI can generate market reports in seconds — what
    value does a human analyst add?
  - AVMs already outperform human appraisals in 60%
    of cases
  - Consumer access to data has eliminated the
    information asymmetry that justified expertise
  - Market segmentation based on geography is
    increasingly arbitrary in a remote-work world

  The counter-argument:
  - AI hallucinates and can't assess unprecedented
    situations
  - Local market knowledge includes qualitative factors
    no data captures
  - The 2008 crisis showed models without human judgment
    are dangerous
  - Equity concerns require human oversight
  - Markets are social systems, not just data systems

  The audience:
  - 500 leaders: central bankers, housing ministers,
    PropTech CEOs, academic leaders, institutional
    investors
  - They want: Vision, not complaints; solutions, not
    problems; humility, not hubris
  - Format: 30-minute keynote + Q&A preparation

  Create:
  1. The complete keynote speech (30 minutes, ~4,000
     words)
  2. A new framework for "Housing Intelligence 2.0"
  3. Three provocative predictions for 2035
  4. Q&A preparation (10 anticipated tough questions)
  5. One-page executive summary for attendees

assertions:
  - type: llm_judge
    criteria: "Response delivers a genuine keynote speech — opening hook, narrative arc, specific examples, emotional moments, call to action; appropriate for WEF audience (global perspective, policy-aware, technology-sophisticated); approximately 4,000 words with natural speaking rhythm."
    weight: 0.35
    description: "KeynoteQuality"
  - type: llm_judge
    criteria: "Housing Intelligence 2.0 framework is intellectually rigorous — goes beyond 'AI + humans = better'; proposes a genuinely new paradigm that integrates real-time data, scenario modeling, equity assessment, and human judgment in a way that addresses the obsolescence argument honestly."
    weight: 0.35
    description: "FrameworkOriginality"
  - type: llm_judge
    criteria: "Three predictions are bold but defensible — not safe extrapolations but genuine predictions that challenge conventional thinking; each is grounded in current trends but extends them in unexpected directions; Q&A preparation anticipates the toughest challenges to the thesis."
    weight: 0.30
    description: "PredictionsAndDefense"
