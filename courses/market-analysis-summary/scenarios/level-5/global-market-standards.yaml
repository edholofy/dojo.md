meta:
  id: global-market-standards
  level: 5
  course: market-analysis-summary
  type: output
  description: "Design global standards for real estate market analysis — harmonize methodologies across countries, currencies, and regulatory frameworks for international comparability"
  tags: [global-standards, international-harmonization, cross-border, master]

state: {}

trigger: |
  The International Real Estate Federation (FIABCI)
  has commissioned you to develop global market analysis
  standards. Currently, every country uses different
  methodologies making cross-border comparison impossible.

  Current fragmentation:
  | Country    | Price Metric    | Area Metric | Inventory  | Data Access   |
  |------------|-----------------|-------------|------------|---------------|
  | USA        | Median price    | Sq ft       | Months     | MLS (private) |
  | UK         | Avg + median    | Sq meters   | Weeks      | Land Registry |
  | Australia  | Median          | Sq meters   | Months     | Govt + private|
  | Canada     | Benchmark HPI   | Sq ft       | Months     | CREA (private)|
  | Germany    | Price/sq meter  | Sq meters   | Not tracked| Notary records|
  | Japan      | Price/tsubo     | Tsubo/sq m  | Not tracked| REINS (private)|
  | Brazil     | Price/sq meter  | Sq meters   | Not tracked| Limited       |
  | UAE        | Price (total)   | Sq ft       | Not tracked| RERA          |

  Challenges to harmonization:
  - Currency fluctuations and PPP adjustments
  - Different ownership structures (leasehold vs
    freehold, strata title, collective ownership)
  - Varying transaction costs (0.5% to 15% of price)
  - Different market cycle positions
  - Privacy laws (GDPR, etc.) limiting data access
  - Cultural differences in housing (home ownership
    rates: 41% Germany vs 88% Romania)
  - Different valuation traditions (comparable vs
    income vs cost approaches)

  Stakeholders:
  - National real estate associations (120+ countries)
  - International investors and REITs
  - Central banks and monetary authorities
  - IMF, World Bank, OECD housing statistics
  - PropTech companies operating globally

  Create:
  1. Core metric definitions (universal)
  2. Conversion and normalization methodology
  3. Market health index (comparable across countries)
  4. Data quality and transparency standards
  5. Governance and adoption framework
  6. Technology platform for implementation

assertions:
  - type: llm_judge
    criteria: "Response creates universal core metrics — defines price, supply, demand, and affordability measures that work across all markets by normalizing for currency (PPP), area (standard sq meter), ownership structure, and transaction costs; includes clear conversion formulas."
    weight: 0.35
    description: "UniversalMetricDesign"
  - type: llm_judge
    criteria: "Market health index is methodologically sound — combines affordability (price/income), supply (inventory or proxy), demand (transaction velocity or proxy), and trend (appreciation relative to fundamentals) into a composite that enables meaningful cross-country comparison."
    weight: 0.35
    description: "MarketHealthIndex"
  - type: llm_judge
    criteria: "Governance framework addresses real adoption barriers — voluntary vs mandatory compliance, phased implementation for countries with limited data infrastructure, privacy law compliance, cultural sensitivity, and a multi-stakeholder governance body with appropriate representation."
    weight: 0.30
    description: "GovernanceAndAdoption"
