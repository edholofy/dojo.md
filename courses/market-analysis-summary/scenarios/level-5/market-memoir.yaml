meta:
  id: market-memoir
  level: 5
  course: market-analysis-summary
  type: output
  description: "Write a professional memoir of a career in market analysis — document the evolution of the field through personal experience, from spreadsheets to AI-driven analytics"
  tags: [memoir, career-narrative, field-evolution, master]

state: {}

trigger: |
  Write the opening chapters of a professional memoir
  titled "Reading the Market: 30 Years of Making Sense
  of Housing Data" for a real estate publisher.

  Career arc to cover:
  
  Chapter 1 — The Spreadsheet Era (1995-2005):
  - Started as a real estate agent in 1995
  - Created first "market report" by hand-counting MLS
    book entries
  - Learned Excel, became the "data person" in the office
  - Built first automated CMA template (1999)
  - Called the 2001 recession impact correctly
  - Key lesson: Data tells stories that opinions can't

  Chapter 2 — The Boom and the Blindspot (2005-2009):
  - Hired as first research analyst at regional brokerage
  - Built monthly market reports reaching 2,000 agents
  - Missed the bubble — confused demand with speculation
  - The crash: watching foreclosures cascade through
    neighborhoods you'd called "hot"
  - The lesson that changed everything: questioning
    your own assumptions is the most important skill

  Chapter 3 — The Recovery and the Revolution (2009-2015):
  - Developed distressed property monitoring system
  - First to identify recovery signals (2012 report)
  - Introduction of big data: Zillow, Redfin changed
    consumer expectations
  - Had to defend professional analysis against "just
    look at Zillow"
  - The tension: democratized data is good, but
    interpretation requires expertise

  Chapter 4 — The Technology Inflection (2015-2025):
  - Built first predictive model using machine learning
  - COVID-19 and the greatest market disruption in
    memory
  - Remote work migration: everything we knew about
    location value questioned
  - AI enters market analysis: tools that can write
    reports, but can they think?
  - The future: what does a market analyst do when AI
    can process data faster?

  Write Chapters 1-2 in full (3,000 words total) and
  detailed outlines for Chapters 3-4.

assertions:
  - type: llm_judge
    criteria: "Response writes compelling narrative prose — Chapter 1 and 2 are written in memoir style with specific anecdotes, emotional moments (especially the humility of missing the bubble), and character development; not a dry recounting but a story about learning through data."
    weight: 0.35
    description: "NarrativeQuality"
  - type: llm_judge
    criteria: "The professional lessons are woven naturally into the story — the evolution from hand-counting to Excel to ML is told through specific projects and clients, each technology shift connected to a specific analytical breakthrough or failure."
    weight: 0.35
    description: "ProfessionalLessons"
  - type: llm_judge
    criteria: "Chapter 3-4 outlines set up compelling themes — the tension between democratized data and professional expertise, the COVID disruption as a test of analytical frameworks, and the existential question of AI's role; the arc from confidence to humility to adaptation is clear."
    weight: 0.30
    description: "ThematicArc"
