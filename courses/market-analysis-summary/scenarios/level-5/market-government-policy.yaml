meta:
  id: market-government-policy
  level: 5
  course: market-analysis-summary
  type: output
  description: "Design a government housing market intelligence system — real-time monitoring, policy impact assessment, and early warning capabilities for federal housing agencies"
  tags: [government-policy, housing-intelligence, federal-system, master]

state: {}

trigger: |
  The Federal Housing Finance Agency (FHFA) has
  contracted you to design a next-generation Housing
  Market Intelligence System (HMIS) for the federal
  government. Create the complete design.

  Current federal housing data landscape:
  | Agency  | Data                    | Frequency  | Lag        |
  |---------|-------------------------|------------|------------|
  | Census  | ACS housing data        | Annual     | 12 months  |
  | FHFA    | House Price Index       | Quarterly  | 2 months   |
  | HUD     | Fair Market Rents       | Annual     | 6 months   |
  | Fed     | Mortgage rates          | Weekly     | 1 week     |
  | HMDA    | Mortgage applications   | Annual     | 8 months   |
  | BLS     | CPI (shelter)           | Monthly    | 2 weeks    |

  Problems to solve:
  - Data is too slow (annual or quarterly vs real-time
    market changes)
  - No integrated view (each agency has siloed data)
  - Can't detect local market stress until it's systemic
  - Policy impact assessment takes years, not months
  - No early warning system for bubbles or crashes
  - Racial equity implications invisible in aggregate data

  Requirements:
  - Near real-time market monitoring (daily/weekly)
  - Integrated view across all federal data sources
  - State and MSA-level granularity (minimum)
  - Census tract-level for equity analysis
  - Policy simulation capabilities
  - Congressional reporting dashboard
  - Interagency data sharing protocols
  - Security: FISMA High baseline

  Budget: $15M over 3 years
  Users: FHFA, HUD, Fed, Treasury, CFPB, Congress

  Create:
  1. System architecture and data integration design
  2. Real-time monitoring and alerting framework
  3. Policy impact simulation engine
  4. Equity analysis capabilities
  5. Security and privacy architecture
  6. Implementation plan and interagency governance

assertions:
  - type: llm_judge
    criteria: "Response designs a robust data integration architecture — connects 6+ federal data sources with private sector feeds (MLS, Zillow, CoreLogic) for real-time monitoring; addresses the fundamental challenge of reducing data lag from months to days/weeks across agencies."
    weight: 0.35
    description: "DataIntegrationArchitecture"
  - type: llm_judge
    criteria: "Policy simulation engine is credible — models the impact of rate changes, lending rule changes, tax policy, and zoning reform on housing markets using econometric models validated against historical policy changes; includes uncertainty quantification."
    weight: 0.35
    description: "PolicySimulationEngine"
  - type: llm_judge
    criteria: "Equity analysis goes beyond aggregate data — Census tract-level analysis reveals disparate impacts by race, income, and geography; addresses the historical redlining data legacy, algorithmic bias in automated systems, and builds equity metrics into all monitoring dashboards."
    weight: 0.30
    description: "EquityAnalysisDepth"
