meta:
  id: market-graduate-program
  level: 5
  course: market-analysis-summary
  type: output
  description: "Design a graduate program in real estate market analytics — curriculum, faculty recruitment, research centers, and industry partnerships for a university setting"
  tags: [graduate-program, academic-design, research-center, master]

state: {}

trigger: |
  A top-25 business school wants to launch a Master of
  Science in Real Estate Market Analytics. Design the
  complete program.

  University context:
  - Strong existing MBA program with real estate
    concentration
  - Data science and analytics department (ranked #15)
  - Urban planning school (ranked #12)
  - Proximity to major real estate market
  - $5M endowment gift from alumni developer
  - Existing relationships: 3 MLS systems, 5 major
    brokerages, 2 REITs, PropTech incubator

  Competitive landscape:
  | Program             | Focus           | Duration | Students |
  |---------------------|-----------------|----------|----------|
  | MIT MSRED           | Development     | 1 year   | 40       |
  | NYU Schack MSRE     | Traditional RE  | 1.5 year | 60       |
  | USC MRED            | Development     | 1 year   | 50       |
  | Wisconsin MS        | Corporate RE    | 1 year   | 25       |

  Gap: No program specifically focused on market
  analytics — the intersection of data science,
  economics, and real estate practice

  Target students:
  - Mid-career real estate professionals (40%)
  - Data scientists entering real estate (30%)
  - Recent graduates with quantitative backgrounds (30%)

  Program goals:
  - 30 students per cohort
  - 3:1 applicant ratio by year 3
  - 95% placement rate within 6 months
  - Industry-funded research center
  - Top-10 ranking in 5 years

  Create:
  1. Curriculum design (core + electives, 36-42 credits)
  2. Faculty recruitment strategy
  3. Research center design and funding model
  4. Industry partnership framework
  5. Student recruitment and admissions strategy
  6. Career placement and alumni network plan

assertions:
  - type: llm_judge
    criteria: "Response designs a distinctive curriculum — combines data science/statistics (machine learning, spatial analysis), economics (urban, housing, behavioral), and real estate practice (CMA, market segmentation, investment analysis); capstone project partners students with industry clients."
    weight: 0.35
    description: "CurriculumDistinction"
  - type: llm_judge
    criteria: "Faculty recruitment balances academic rigor and practitioner credibility — includes tenure-track researchers (urban economics, spatial statistics), clinical faculty (industry practitioners), and adjuncts from PropTech and major brokerages; addresses the challenge of competing with industry salaries."
    weight: 0.35
    description: "FacultyStrategy"
  - type: llm_judge
    criteria: "Research center has a sustainable funding model — industry sponsorships, MLS data partnerships, government grants (HUD, FHFA), and consulting revenue; research agenda addresses industry needs while maintaining academic independence; advisory board includes diverse stakeholders."
    weight: 0.30
    description: "ResearchCenterViability"
