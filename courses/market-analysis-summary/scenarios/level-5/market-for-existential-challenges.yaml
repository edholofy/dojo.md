meta:
  id: market-for-existential-challenges
  level: 5
  course: market-analysis-summary
  type: output
  description: "Apply market analysis to existential challenges — climate change, demographic collapse, and technological disruption reshaping the fundamental nature of housing markets"
  tags: [existential-challenges, climate-impact, future-of-housing, master]

state: {}

trigger: |
  A global think tank on housing futures has
  commissioned you to analyze how existential
  challenges will fundamentally reshape housing
  markets over the next 25 years. Create the analysis.

  Challenge 1 — Climate Change:
  - Sea level rise: 1-3 feet by 2050
  - 13.1 million Americans may need to relocate
  - $1 trillion in coastal property at risk
  - Insurance markets already withdrawing (FL, CA, LA)
  - Extreme heat making some regions less livable
  - Climate migration patterns already emerging
  - Traditional market analysis assumes geographic
    stability — this assumption is breaking

  Challenge 2 — Demographic Transformation:
  - US population growth projected to reach 0% by 2080
  - Japan and parts of Europe already declining
  - Aging society: 25% over 65 by 2060
  - Declining household formation in many markets
  - Immigration as the sole growth driver in many areas
  - Rural depopulation accelerating
  - Traditional analysis assumes demand growth — this
    may not hold

  Challenge 3 — Technological Disruption:
  - Remote work permanently changing location value
  - AI-driven construction could cut costs 30-50%
  - 3D-printed housing entering market ($150K homes)
  - Virtual/augmented reality changing space utilization
  - Autonomous vehicles reshaping commute calculations
  - Smart city infrastructure changing livability metrics
  - Traditional analysis uses historical comps — but
    there are no comps for unprecedented change

  Create:
  1. Climate-adjusted market valuation framework
  2. Demographic decline market analysis methodology
  3. Technology disruption impact assessment
  4. Integrated scenario modeling (25-year horizon)
  5. Implications for current market analysis practice
  6. Recommendations for policymakers and practitioners

assertions:
  - type: llm_judge
    criteria: "Response creates a climate-adjusted valuation framework — incorporates sea level rise projections, insurance availability as a value factor, climate migration patterns, and extreme weather risk into property and market valuation; fundamentally rethinks geographic stability assumptions."
    weight: 0.35
    description: "ClimateAdjustedFramework"
  - type: llm_judge
    criteria: "Demographic decline methodology is genuinely novel — addresses how market analysis works when the underlying assumption of demand growth fails; considers Japan's experience as a case study, identifies which metrics become meaningless and what replaces them."
    weight: 0.35
    description: "DemographicDeclineMethodology"
  - type: llm_judge
    criteria: "Technology disruption assessment is specific and non-speculative — identifies concrete impacts (remote work already measurable, 3D printing entering market) vs speculative (autonomous vehicles), and proposes how current practitioners should adapt their methodology incrementally."
    weight: 0.30
    description: "TechnologyImpactAssessment"
