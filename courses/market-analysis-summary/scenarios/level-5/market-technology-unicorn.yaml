meta:
  id: market-technology-unicorn
  level: 5
  course: market-analysis-summary
  type: output
  description: "Design a billion-dollar market analytics company — from seed to unicorn valuation with technology innovation, market expansion, and competitive moat building"
  tags: [unicorn-strategy, venture-scale, proptech, master]

state: {}

trigger: |
  You're the co-founder/CEO of a real estate market
  analytics company that just raised a $50M Series B.
  Your board wants a plan to reach $1B valuation
  (unicorn) within 4 years. Design the strategy.

  Current state:
  - Revenue: $8M ARR (growing 120% YoY)
  - Users: 15,000 paid (agents, brokers, investors)
  - Markets: 25 US metro areas
  - Team: 65 people (30 engineering, 15 data science,
    10 sales, 10 G&A)
  - Product: AI-powered market analysis platform with
    automated reports, predictive pricing, and
    agent-branded client tools
  - NRR: 135% (strong expansion revenue)
  - Gross margin: 72%

  Valuation math (at 20x forward revenue):
  - Need $50M ARR for $1B valuation
  - Current: $8M → Need 6.25x growth in 4 years
  - Required CAGR: ~58%

  Growth levers identified:
  1. Market expansion (25 → 200+ US metros)
  2. International expansion (UK, Canada, Australia)
  3. New user segments (appraisers, lenders, government)
  4. Platform play (marketplace for market data/reports)
  5. Data licensing (sell insights to hedge funds, insurers)
  6. M&A (acquire complementary analytics companies)

  Key risks:
  - MLS data access (can be restricted/expensive)
  - Zillow/Redfin building competitive features
  - Economic downturn reducing RE professional spend
  - Regulatory changes in AI-generated valuations
  - Key person risk (data science leadership)

  Create the complete unicorn strategy.

assertions:
  - type: llm_judge
    criteria: "Response builds a credible path to $50M ARR — breaks down revenue by segment, shows how market expansion drives land-and-expand, identifies the data licensing and platform plays as margin-expanding opportunities, with year-by-year revenue projections."
    weight: 0.35
    description: "RevenuePathCredibility"
  - type: llm_judge
    criteria: "Competitive moat strategy is defensible — addresses the Zillow/Redfin threat specifically, builds moats through proprietary data (agent usage data creates network effects), AI model superiority (more data = better predictions), and switching costs (CRM integration, historical reports)."
    weight: 0.35
    description: "CompetitiveMoatStrategy"
  - type: llm_judge
    criteria: "Risk mitigation is sophisticated — addresses MLS data dependency (diversify sources, build direct relationships), talent retention (equity, research culture), market cycle risk (counter-cyclical features like distressed analysis), and regulatory risk (proactive compliance, advisory relationships)."
    weight: 0.30
    description: "RiskMitigation"
