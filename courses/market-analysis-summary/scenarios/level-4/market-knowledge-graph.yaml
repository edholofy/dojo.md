meta:
  id: market-knowledge-graph
  level: 4
  course: market-analysis-summary
  type: output
  description: "Design a real estate market knowledge graph — ontology design, entity relationships, and graph-based analytics for market intelligence"
  tags: [knowledge-graph, ontology-design, graph-analytics, expert]

state: {}

trigger: |
  A PropTech company wants to build a knowledge graph
  for real estate market intelligence. Design the
  ontology and analytical applications.

  Vision: Create a connected data model that captures
  relationships between properties, people, markets,
  economics, and events to enable insights impossible
  with traditional tabular data.

  Entity types to model:
  - Properties (with full attribute sets)
  - People (buyers, sellers, agents, developers)
  - Transactions (sales, leases, permits)
  - Locations (neighborhoods, zip codes, school zones)
  - Economic entities (employers, industries)
  - Market metrics (prices, inventory, rates)
  - Events (policy changes, natural disasters, openings)
  - Infrastructure (roads, transit, utilities)

  Relationship types to capture:
  - Property → sold_to → Buyer (with price, date)
  - Property → located_in → Neighborhood
  - Agent → represented → Transaction
  - Employer → located_near → Property
  - School → serves → Neighborhood
  - Event → impacted → Market_Metric
  - Property → comparable_to → Property (with similarity)

  Analytical use cases:
  1. "Why did this neighborhood appreciate 15%?"
     (trace causal chains through graph)
  2. "Which properties will be most affected by this
     employer relocation?" (proximity + employee housing)
  3. "What's the ripple effect of a school rezoning?"
     (connected community impact)
  4. "Find hidden comparables" (graph-based similarity
     beyond geographic proximity)

  Technical constraints:
  - Graph database: Neo4j or Amazon Neptune
  - Initial data: 500K properties, 10M relationships
  - Query response time: <2 seconds for common patterns
  - Update frequency: Daily for transactions, weekly
    for economic data

  Create:
  1. Ontology design with entity-relationship model
  2. Data ingestion and entity resolution strategy
  3. Graph query patterns for each use case
  4. Machine learning on graph (embeddings, link pred.)
  5. Visualization and user interface design
  6. Scalability and performance architecture

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive ontology — entities have appropriate attributes, relationships capture meaningful connections (not just spatial), and the model supports the four analytical use cases with concrete graph traversal patterns."
    weight: 0.35
    description: "OntologyDesign"
  - type: llm_judge
    criteria: "Graph analytics go beyond basic queries — includes community detection for market segmentation, centrality measures for influential properties/agents, path analysis for price diffusion, and graph neural networks for property valuation."
    weight: 0.35
    description: "GraphAnalyticsSophistication"
  - type: llm_judge
    criteria: "Technical architecture is realistic — addresses entity resolution challenges (matching properties across data sources), handles scale (500K nodes, 10M edges), includes incremental update strategy, and considers query performance optimization (indexing, caching)."
    weight: 0.30
    description: "TechnicalFeasibility"
