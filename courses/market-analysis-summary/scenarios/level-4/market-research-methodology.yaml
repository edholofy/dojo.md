meta:
  id: market-research-methodology
  level: 4
  course: market-analysis-summary
  type: output
  description: "Design a peer-reviewed market research methodology — sampling frameworks, statistical validation, and publication-quality analytical standards"
  tags: [research-methodology, statistical-validation, peer-review, expert]

state: {}

trigger: |
  A university real estate research center has invited
  you to collaborate on developing a standardized
  methodology for local housing market analysis. The
  work will be published in a peer-reviewed journal.
  Design the methodology.

  Research question:
  "How can local market analysis methodologies be
  standardized to provide statistically valid,
  reproducible results across different market types?"

  Current problems with industry practice:
  - No standardized definitions (what is "months supply"
    when calculated differently by every MLS?)
  - Selection bias in comparable selection for CMAs
  - Survivorship bias (only closed sales analyzed)
  - Small sample sizes in micro-market analysis
  - No confidence intervals on market statistics
  - Time period cherry-picking to support conclusions
  - Geographic boundary gerrymandering

  Available datasets for validation:
  - 15 MLS systems, 10 years of data each
  - 500,000+ transactions with full attributes
  - Census data at tract level
  - Economic indicators from BLS, BEA, Fed
  - Building permit data from Census Bureau
  - Mortgage data from HMDA

  Deliverables expected:
  1. Standardized metric definitions with formulas
  2. Minimum sample size requirements by analysis type
  3. Statistical validation framework
  4. Reproducibility protocol
  5. Confidence interval methodology
  6. Bias identification and mitigation strategies
  7. Peer review and replication guidelines

assertions:
  - type: llm_judge
    criteria: "Response provides rigorous standardized definitions — defines key metrics (months supply, absorption rate, DOM, list/sale ratio) with precise formulas that handle edge cases (withdrawn listings, relisted properties, expired-and-relisted); addresses current inconsistencies."
    weight: 0.35
    description: "MetricStandardization"
  - type: llm_judge
    criteria: "Statistical framework is publication-quality — includes minimum sample sizes for significance, confidence interval calculations for small markets, hypothesis testing for trend identification, and addresses the unique challenges of housing data (non-normal distributions, spatial autocorrelation)."
    weight: 0.35
    description: "StatisticalRigor"
  - type: llm_judge
    criteria: "Bias mitigation strategies are comprehensive — addresses selection bias in CMAs (randomized comparable selection), survivorship bias (including expired/withdrawn), time period bias (standardized windows), and geographic boundary bias (sensitivity analysis across definitions)."
    weight: 0.30
    description: "BiasMitigation"
