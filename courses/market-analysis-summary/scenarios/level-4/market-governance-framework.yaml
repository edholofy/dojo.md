meta:
  id: market-governance-framework
  level: 4
  course: market-analysis-summary
  type: output
  description: "Design a market data governance framework — data quality standards, ethical guidelines, and regulatory compliance for real estate market analysis"
  tags: [data-governance, ethics, compliance, expert]

state: {}

trigger: |
  The National Association of Realtors is developing
  market data governance standards. You've been asked
  to draft the framework. Create it.

  Governance challenges identified:
  
  Data quality issues:
  - 23% of MLS listings have inaccurate square footage
  - 15% of sold prices include undisclosed concessions
  - DOM manipulation (withdraw and relist: 12% of sales)
  - Inconsistent property type classifications
  - Missing or incorrect geocoding (8% of records)
  - Delayed reporting (avg 5 days, range 0-45 days)

  Ethical concerns:
  - Market reports used to steer buyers to/from areas
  - Data cherry-picking to justify predetermined prices
  - Algorithmic bias in automated valuations (AVM)
  - Privacy concerns with granular transaction data
  - Selective disclosure of market conditions
  - Fair Housing implications of neighborhood analysis

  Regulatory landscape:
  - RESPA: Restrictions on value-influencing communications
  - Fair Housing Act: Anti-steering provisions
  - State licensing: Scope of practice for market opinions
  - Dodd-Frank: AVM quality control requirements
  - GDPR-like state privacy laws: Data use restrictions
  - MLS rules: Data use and display agreements

  Stakeholders:
  - MLS organizations (580+ in the US)
  - Real estate associations (state and national)
  - Appraisal boards and organizations
  - Consumer advocacy groups
  - Technology companies (AVMs, portals)
  - Federal regulators (CFPB, HUD)

  Create:
  1. Data quality standards and enforcement mechanisms
  2. Ethical guidelines for market analysis
  3. Regulatory compliance checklist
  4. AVM quality control framework
  5. Fair Housing compliance in market reporting
  6. Stakeholder governance structure

assertions:
  - type: llm_judge
    criteria: "Response establishes concrete data quality standards — addresses square footage verification, concession disclosure, DOM manipulation detection, and creates audit mechanisms with consequences for non-compliance across MLS systems."
    weight: 0.35
    description: "DataQualityStandards"
  - type: llm_judge
    criteria: "Ethical guidelines address real-world harms — anti-steering provisions in market reporting, AVM bias auditing (testing across protected classes), responsible disclosure of negative market conditions, and boundaries between market analysis and appraisal."
    weight: 0.35
    description: "EthicalGuidelines"
  - type: llm_judge
    criteria: "Governance structure balances stakeholder interests — creates a multi-stakeholder body with enforcement authority, consumer representation, technology company obligations, and a complaint/appeal process; addresses the tension between data access and privacy."
    weight: 0.30
    description: "GovernanceStructure"
