meta:
  id: expert-market-shift
  level: 4
  course: market-analysis-summary
  type: output
  description: "Handle an expert-level shift simulation — integrate organizational strategy, technology design, and market theory to address systemic challenges in market analysis practice"
  tags: [shift-simulation, systemic-challenge, organizational-strategy, expert]

state: {}

trigger: |
  You've been appointed Chief Market Intelligence
  Officer for a national brokerage with 8,000 agents
  across 200 offices. The CEO has identified market
  analysis as a critical competitive disadvantage.
  Design the transformation.

  Current state assessment:
  - Market reports: Each office creates independently,
    no standardization, inconsistent methodology
  - Data sources: 45 different MLS feeds, no unified
    data warehouse
  - Technology: Excel-based, some agents use third-party
    tools individually
  - Talent: 3 research analysts at HQ, no local capacity
  - Quality: CEO received complaints from clients about
    inaccurate market data in listing presentations
  - Competitive gap: Top competitor has a 15-person
    research team producing weekly reports and a
    proprietary analytics platform

  Budget: $1.5M annually (year 1), growing to $3M by Y3
  Timeline: Board wants measurable improvement in
  12 months, full transformation in 36 months

  Constraints:
  - Agents are independent contractors (can't mandate
    tool adoption)
  - 45 MLS systems with different data formats and rules
  - Significant technology debt (legacy CRM, no API layer)
  - Cultural resistance: "We've always done it this way"
  - Regulatory: Must comply with 50 state regulations
    for market opinions

  Transformation goals:
  1. Standardized, defensible market analysis methodology
  2. Centralized data platform with local customization
  3. Agent-facing tools that improve listing presentations
  4. Client-facing market reports that drive brand value
  5. Predictive capabilities that give competitive edge
  6. Revenue generation from market intelligence assets

  Create the complete transformation strategy.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased transformation — Year 1 focuses on quick wins (standardized reports, data warehouse foundation, pilot offices), Year 2 scales technology and builds agent tools, Year 3 adds predictive analytics and revenue generation; each phase has measurable milestones."
    weight: 0.35
    description: "TransformationStrategy"
  - type: llm_judge
    criteria: "Response addresses the change management challenge realistically — agents are independent contractors so adoption requires value demonstration, not mandates; includes incentive structures, champion programs, training plans, and metrics that show ROI to skeptical agents."
    weight: 0.35
    description: "ChangeManagement"
  - type: llm_judge
    criteria: "Technical architecture handles real-world complexity — 45 MLS feeds requiring normalization, legacy CRM integration, compliance with 50 state regulations, and a data platform that enables both centralized quality control and local market customization."
    weight: 0.30
    description: "TechnicalComplexity"
