meta:
  id: market-behavioral-economics
  level: 4
  course: market-analysis-summary
  type: output
  description: "Apply behavioral economics to real estate market analysis — cognitive biases, heuristics, and irrational market behavior patterns that affect pricing and transactions"
  tags: [behavioral-economics, cognitive-bias, market-psychology, expert]

state: {}

trigger: |
  A behavioral economics research lab wants to partner
  on studying cognitive biases in real estate market
  analysis. Design the research framework and practical
  applications.

  Documented biases in real estate markets:
  
  Agent/Analyst biases:
  | Bias                | Description                   | Market Impact        |
  |---------------------|-------------------------------|---------------------|
  | Anchoring           | Over-relying on list price    | Mis-pricing 12-18%  |
  | Recency bias        | Weighting recent sales too    | Trend extrapolation |
  |                     | heavily                       |                     |
  | Confirmation bias   | Selecting comps that confirm  | CMA accuracy ↓ 8%   |
  |                     | predetermined value           |                     |
  | Survivorship bias   | Ignoring expired/withdrawn    | Overestimating      |
  |                     | listings                      | market strength     |
  | Herd behavior       | Following market consensus    | Bubble amplification|
  | Loss aversion       | Sellers refusing to accept    | Stale inventory     |
  |                     | losses (2x pain of gains)     |                     |

  Buyer/Seller biases:
  | Bias                | Description                   | Impact              |
  |---------------------|-------------------------------|---------------------|
  | Endowment effect    | Owners overvalue their home   | Avg 5-10% overprice |
  | Availability heuristic| Recent dramatic sale shapes | Unrealistic expect. |
  |                     | expectations                  |                     |
  | Status quo bias     | Inertia prevents action       | Missed opportunities|
  | Framing effect      | "Price reduced" vs "new price"| 15% more showings   |
  | Round number bias   | Pricing at $500K vs $499K     | 3% more views       |

  Research data available:
  - 50,000 transactions with full listing history
  - Agent CMA vs actual sale price (variance data)
  - Listing price changes and timing
  - DOM by initial pricing strategy
  - Buyer offer patterns and concession requests

  Create:
  1. Research framework for quantifying bias impact
  2. Agent de-biasing intervention design
  3. Consumer communication strategies
  4. Technology solutions for bias reduction
  5. Market analysis methodology improvements
  6. Publication-ready research proposal

assertions:
  - type: llm_judge
    criteria: "Response designs a rigorous research framework — identifies testable hypotheses for each bias (e.g., 'agents who view expired listings produce CMAs within 3% of sale price more often'), with control groups and statistical methods appropriate for the dataset."
    weight: 0.35
    description: "ResearchFrameworkRigor"
  - type: llm_judge
    criteria: "De-biasing interventions are practical and evidence-based — includes structured CMA checklists that force consideration of counter-evidence, blind comparable selection, algorithmic second opinions, and pre-mortem analysis for pricing decisions."
    weight: 0.35
    description: "DeBiasingInterventions"
  - type: llm_judge
    criteria: "Technology solutions address bias at the system level — automated comparable selection to reduce confirmation bias, historical base rate dashboards to counter recency bias, A/B testing frameworks for listing presentation, and consumer-facing tools for endowment effect awareness."
    weight: 0.30
    description: "TechnologySolutions"
