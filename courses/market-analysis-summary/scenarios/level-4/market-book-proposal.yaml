meta:
  id: market-book-proposal
  level: 4
  course: market-analysis-summary
  type: output
  description: "Write a book proposal for a practitioner guide on real estate market analysis — chapter outline, sample content, and positioning for a professional publisher"
  tags: [book-proposal, practitioner-guide, publishing, expert]

state: {}

trigger: |
  A major real estate publisher (Dearborn/Kaplan) has
  invited you to submit a proposal for "The Complete
  Guide to Real Estate Market Analysis." Write the
  full proposal.

  Publisher requirements:
  - Target: 350-400 pages
  - Audience: Working real estate professionals
  - Tone: Authoritative but accessible
  - Include: Case studies, templates, checklists
  - Unique angle required (what's not already covered?)

  Competing titles:
  - "Real Estate Market Analysis" (Schmitz, ULI, 2001):
    Academic, commercial-focused, dated
  - "Residential Market Analysis" (Fanning, AI, 2014):
    Appraisal-focused, limited practical tools
  - "Housing Market Analysis" (Myers, HUD handbook):
    Government perspective, affordable housing
  - Gap: No practitioner-focused guide that covers
    modern analytics, technology tools, and AI

  Your unique positioning:
  - Bridges traditional analysis with modern tech
  - Includes AI and machine learning applications
  - Provides reproducible templates and frameworks
  - Covers both residential and commercial
  - Written by a practitioner for practitioners

  Create:
  1. Book proposal with market positioning
  2. Detailed chapter outline (15-18 chapters)
  3. Sample chapter introduction (Chapter 1)
  4. Template and toolkit appendix overview
  5. Author platform and marketing plan
  6. Comparable title analysis and differentiation

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling book proposal — identifies the market gap (no modern practitioner guide), positions against competing titles specifically, and proposes a unique angle that combines traditional methodology with AI/technology applications."
    weight: 0.35
    description: "ProposalCompelling"
  - type: llm_judge
    criteria: "Chapter outline is comprehensive and well-structured — progresses from foundations to advanced topics, each chapter has clear learning objectives and practical deliverables (templates, checklists), covers both residential and commercial contexts."
    weight: 0.35
    description: "ChapterOutlineQuality"
  - type: llm_judge
    criteria: "Sample chapter content demonstrates the author's voice — authoritative yet accessible, uses real-world examples, includes a practical exercise, and shows the 'practitioner for practitioners' angle; marketing plan leverages speaking, content, and industry connections."
    weight: 0.30
    description: "ContentAndMarketing"
