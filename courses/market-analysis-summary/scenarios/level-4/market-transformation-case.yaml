meta:
  id: market-transformation-case
  level: 4
  course: market-analysis-summary
  type: output
  description: "Write a detailed case study of a market transformation — document how a major market shift unfolded, was analyzed, and what lessons emerged for practitioners"
  tags: [case-study, market-transformation, lessons-learned, expert]

state: {}

trigger: |
  Write a detailed case study of the Boise, Idaho
  housing market transformation (2018-2024) for a
  professional development course. This market
  experienced one of the most dramatic boom-bust
  cycles in recent history.

  Timeline data to incorporate:

  Phase 1 — Pre-Boom (2018-2019):
  - Median price: $265K → $285K (+7.5%)
  - Population growth: 2.5% annually
  - Tech sector arrival (HP, Micron expansion)
  - Inventory: 2.8 months (balanced)

  Phase 2 — Boom (2020-2022):
  - Median price: $285K → $550K (+93%)
  - California migration surge (15K+ households/year)
  - Inventory: dropped to 0.5 months
  - Bidding wars: 85% of transactions
  - New construction couldn't keep pace
  - National media coverage amplified demand

  Phase 3 — Correction (2022-2023):
  - Median price: $550K → $450K (-18%)
  - Rate shock (3% → 7% mortgage rates)
  - Migration slowed by 60%
  - Inventory: rose to 4.5 months
  - Builder cancellation rate: 35%

  Phase 4 — Stabilization (2023-2024):
  - Median price: $450K → $465K (+3.3%)
  - New equilibrium forming
  - Local buyers re-entering
  - Inventory: 3.2 months (balanced)
  - Fundamentals reasserting (jobs, population)

  Key analytical questions:
  1. What signals preceded each phase transition?
  2. Which analysts got it right, and what methodology
     did they use?
  3. What were the most common analytical failures?
  4. What frameworks would have identified the bubble?
  5. How should agents have advised clients at each phase?

assertions:
  - type: llm_judge
    criteria: "Response documents the full cycle with analytical depth — identifies specific leading indicators at each phase transition (migration data preceded the boom, rate shock preceded correction), not just describing what happened but analyzing WHY the signals were missed."
    weight: 0.35
    description: "CycleAnalysisDepth"
  - type: llm_judge
    criteria: "Response identifies specific analytical failures — anchoring to recent appreciation rates, ignoring price/income divergence, confusing migration-driven demand with sustainable demand, and the media amplification cycle; connects each failure to a correctable methodology gap."
    weight: 0.35
    description: "AnalyticalFailureAnalysis"
  - type: llm_judge
    criteria: "Lessons for practitioners are specific and actionable — includes a framework for identifying bubble conditions (price/income ratio thresholds, migration dependency, inventory extremes), client advisory scripts for each market phase, and personal risk management strategies."
    weight: 0.30
    description: "PractitionerLessons"
