meta:
  id: market-analytics-product
  level: 4
  course: market-analysis-summary
  type: output
  description: "Design a market analytics SaaS product — product requirements, data architecture, user experience, and go-to-market strategy for a real estate analytics platform"
  tags: [saas-product, product-design, analytics-platform, expert]

state: {}

trigger: |
  A PropTech venture fund has given you $2M seed funding
  to build a real estate market analytics platform.
  Design the product.

  Vision: "Democratize institutional-grade market
  analysis for every real estate professional"

  Target users (in priority order):
  1. Individual agents (500K+ in target markets)
  2. Team leaders and brokers (50K+)
  3. Appraisers (80K+)
  4. Mortgage loan officers (300K+)
  5. Real estate investors (1M+)

  Competitive analysis:
  | Competitor     | Strength          | Weakness           | Price      |
  |----------------|-------------------|--------------------|------------|
  | Zillow         | Consumer brand    | Agent-unfriendly   | Free       |
  | Redfin Data    | Accuracy          | No customization   | Free       |
  | CoreLogic      | Comprehensive     | Expensive, complex | $500+/mo   |
  | ATTOM          | Data depth        | Not agent-focused  | $200+/mo   |
  | Altos Research | Real-time         | Limited visuals    | $50/mo     |
  | RPR (NAR)      | NAR integration   | Slow, dated UI     | Free/NAR   |

  Your differentiators:
  - AI-powered narrative generation (turn data into
    stories, not just charts)
  - Micro-market precision (neighborhood-level, not
    just zip code)
  - Client-ready report generation (white-labeled)
  - Predictive scoring (market direction indicators)
  - Mobile-first design

  Product constraints:
  - MVP in 6 months with $2M
  - Must show product-market fit for Series A
  - Target: 1,000 paying users in first year
  - Pricing: $29-99/month (agent tier)

  Create:
  1. Product requirements document (core features)
  2. Data architecture and source strategy
  3. AI/ML feature specifications
  4. User experience flow (key screens)
  5. Go-to-market strategy
  6. Unit economics and Series A metrics

assertions:
  - type: llm_judge
    criteria: "Response designs a focused MVP — prioritizes features that differentiate (AI narratives, micro-market precision, client-ready reports) over trying to build everything; makes hard trade-offs about what to defer to post-Series A."
    weight: 0.35
    description: "ProductStrategy"
  - type: llm_judge
    criteria: "Data architecture addresses the fundamental challenge — MLS data access (IDX/RETS licensing complexity), data normalization across markets, update frequency, and storage/compute costs; the AI narrative feature has a realistic specification."
    weight: 0.35
    description: "TechnicalArchitecture"
  - type: llm_judge
    criteria: "Go-to-market and unit economics are venture-grade — CAC/LTV calculations, channel strategy (MLS partnerships, agent conferences, content marketing), freemium vs paid conversion assumptions, and Series A metrics (ARR target, growth rate, NRR)."
    weight: 0.30
    description: "GoToMarketStrategy"
