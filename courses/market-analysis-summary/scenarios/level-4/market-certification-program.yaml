meta:
  id: market-certification-program
  level: 4
  course: market-analysis-summary
  type: output
  description: "Design a professional certification program for real estate market analysts — curriculum, assessment criteria, continuing education, and accreditation standards"
  tags: [certification, professional-development, curriculum-design, expert]

state: {}

trigger: |
  A national real estate education provider wants to
  create a "Certified Real Estate Market Analyst" (CREMA)
  designation. Design the complete program.

  Market need:
  - No standardized certification for market analysis
  - Appraisers have ASA/MAI but focus on individual
    property valuation, not market analysis
  - CMAs are done by agents with no analytical training
  - Brokers need qualified people for market reports
  - Investors want credentialed analysts

  Competitive certifications:
  | Cert    | Focus              | Time    | Cost    |
  |---------|--------------------|---------| --------|
  | CRS     | Residential skills | 40 hrs  | $1,500  |
  | CCIM    | Commercial invest. | 200 hrs | $12,000 |
  | MAI     | Appraisal          | 400 hrs | $15,000 |
  | CFA     | Financial analysis | 900 hrs | $5,000  |
  | GRI     | General real estate| 90 hrs  | $2,000  |

  Target audience:
  - Experienced agents (5+ years) wanting specialization
  - Brokerage research department staff
  - MLS research analysts
  - PropTech company analysts
  - Career changers from finance/analytics

  Program constraints:
  - Must be completable while working full-time
  - Online + in-person hybrid
  - Proctored final assessment
  - Ongoing CE requirements
  - Revenue-neutral within 2 years

  Create:
  1. Multi-level curriculum (foundations → advanced)
  2. Assessment and examination framework
  3. Practicum/capstone requirements
  4. Continuing education and recertification
  5. Accreditation and quality assurance
  6. Marketing and launch strategy

assertions:
  - type: llm_judge
    criteria: "Response designs a rigorous multi-level curriculum — foundations (statistics, economics, data literacy), intermediate (CMA methodology, market segmentation, trend analysis), advanced (predictive modeling, risk assessment, research design); each level has clear learning outcomes."
    weight: 0.35
    description: "CurriculumDesign"
  - type: llm_judge
    criteria: "Assessment framework tests both knowledge and practical skill — includes proctored exams for theory, practical case studies for applied analysis, and a capstone project requiring a real market analysis that is peer-reviewed; rubrics are detailed and objective."
    weight: 0.35
    description: "AssessmentFramework"
  - type: llm_judge
    criteria: "Program logistics are feasible — 120-160 total hours completable in 6-12 months part-time, pricing positioned between CRS ($1,500) and CCIM ($12,000), with clear value proposition for each target audience segment."
    weight: 0.30
    description: "ProgramFeasibility"
