meta:
  id: market-consulting-practice
  level: 4
  course: market-analysis-summary
  type: output
  description: "Design a market analysis consulting practice — service offerings, pricing models, client acquisition, and methodology documentation for a real estate analytics firm"
  tags: [consulting-practice, business-model, methodology, expert]

state: {}

trigger: |
  You're launching a real estate market analysis
  consulting firm. Design the complete business model
  and service framework.

  Target clients:
  - Regional brokerages (50-500 agents)
  - Home builders and developers
  - Municipal planning departments
  - Real estate investment trusts (REITs)
  - Mortgage lenders (regional)

  Service tiers to design:
  1. Standard Market Reports (subscription)
  2. Custom Market Studies (project-based)
  3. Predictive Analytics Platform (SaaS)
  4. Strategic Advisory (retainer)
  5. Expert Witness / Litigation Support

  Competitive landscape:
  - National firms (CoreLogic, ATTOM, Zillow Research):
    High-level data, not local expertise
  - MLS research departments: Free but basic
  - Individual analysts: Inconsistent quality
  - Your edge: Deep local expertise + analytical rigor
    + actionable recommendations

  Financial targets:
  - Year 1 revenue: $350,000
  - Year 3 revenue: $1.2M
  - Target margins: 45% by year 3
  - Team: Solo year 1, 4 people by year 3

  Create:
  1. Service catalog with detailed descriptions
  2. Pricing model for each tier
  3. Methodology documentation framework
  4. Client acquisition strategy
  5. Technology stack and infrastructure
  6. 3-year business plan with financial projections

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive service catalog — each tier has clear deliverables, turnaround times, and value propositions; pricing is market-appropriate (subscription reports $500-2K/mo, custom studies $5-25K, advisory retainer $3-8K/mo)."
    weight: 0.35
    description: "ServiceCatalogDesign"
  - type: llm_judge
    criteria: "Methodology documentation is rigorous — establishes standardized frameworks for data collection, analysis, quality assurance, and reporting that ensure consistency and defensibility, especially for litigation support work."
    weight: 0.35
    description: "MethodologyFramework"
  - type: llm_judge
    criteria: "Business plan is realistic — Year 1 focuses on subscription revenue and 2-3 anchor clients, Year 2 adds custom studies and first hire, Year 3 achieves scale through SaaS platform; client acquisition strategy leverages thought leadership and referral networks."
    weight: 0.30
    description: "BusinessPlanRealism"
