meta:
  id: cross-market-comparative
  level: 3
  course: market-analysis-summary
  type: output
  description: "Create a cross-market comparative study — benchmark your market against regional and national peers using standardized metrics and economic indicators"
  tags: [cross-market, benchmarking, comparative-analysis, advanced]

state: {}

trigger: |
  A relocation company wants to understand how your
  market compares to 5 competitor markets for their
  corporate transferees. Create a comprehensive
  comparative analysis.

  Markets to compare:
  
  | Metric              | Your Market | Market B | Market C | Market D | Market E | National |
  |---------------------|-------------|----------|----------|----------|----------|----------|
  | Median Price         | $372K       | $425K    | $298K    | $510K    | $345K    | $412K    |
  | Price/Income Ratio   | 4.8         | 5.9      | 3.6      | 6.8      | 4.2      | 5.1      |
  | Inventory (months)   | 2.8         | 1.9      | 4.2      | 2.1      | 3.5      | 3.8      |
  | YoY Price Change     | +3.2%       | +6.1%    | -1.2%    | +2.8%    | +4.5%    | +2.1%    |
  | Avg DOM              | 24          | 14       | 42       | 18       | 31       | 34       |
  | Population Growth    | 2.8%        | 4.2%     | 0.8%     | 1.5%     | 3.1%     | 0.5%     |
  | Job Growth           | 3.1%        | 5.0%     | 1.2%     | 2.0%     | 2.8%     | 1.8%     |
  | Cost of Living Index | 98          | 112      | 85       | 128      | 94       | 100      |
  | Property Tax Rate    | 1.15%       | 0.85%    | 1.45%    | 0.72%    | 1.28%    | 1.10%    |
  | Rental Yield         | 5.8%        | 4.2%     | 7.1%     | 3.5%     | 6.2%     | 4.8%     |

  Quality of life data:
  | Factor              | Your Mkt | B    | C    | D    | E    |
  |---------------------|----------|------|------|------|------|
  | School Rating (1-10)| 7.2      | 8.1  | 5.8  | 8.5  | 7.0  |
  | Crime Index         | 32       | 28   | 45   | 22   | 35   |
  | Commute (avg min)   | 24       | 38   | 18   | 42   | 22   |
  | Healthcare Access   | Good     | Exc  | Fair | Exc  | Good |

  Create:
  1. Market positioning analysis (where your market
     ranks and why)
  2. Affordability-adjusted comparison
  3. Investment potential ranking with rationale
  4. Quality of life composite scoring
  5. Transferee recommendation by profile type
  6. 3-year market trajectory comparison

assertions:
  - type: llm_judge
    criteria: "Response creates a meaningful market positioning — identifies your market as a balanced value play (below-national price, strong growth, good affordability) vs Market B (hot but expensive) vs Market C (affordable but stagnant), with nuanced rankings."
    weight: 0.35
    description: "MarketPositioning"
  - type: llm_judge
    criteria: "Response uses affordability-adjusted metrics — price/income ratio and cost of living index are used to normalize comparisons; rental yield and property tax rate factor into total ownership cost analysis; not just headline prices."
    weight: 0.35
    description: "AdjustedComparison"
  - type: llm_judge
    criteria: "Transferee recommendations are profile-specific — a young professional prioritizes different factors than a family with school-age children or a pre-retiree; each profile gets a ranked recommendation with trade-off explanation."
    weight: 0.30
    description: "ProfileBasedRecommendations"
