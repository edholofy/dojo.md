meta:
  id: commercial-market-analysis
  level: 3
  course: market-analysis-summary
  type: output
  description: "Create a commercial real estate market analysis — office, retail, industrial, and multifamily sectors with cap rate trends and tenant demand analysis"
  tags: [commercial-analysis, cap-rates, sector-analysis, advanced]

state: {}

trigger: |
  A commercial real estate investor is evaluating your
  market for portfolio expansion. Create a comprehensive
  multi-sector analysis.

  Office Market:
  | Metric           | CBD      | Suburban | Flex/Cowork |
  |------------------|----------|----------|-------------|
  | Vacancy Rate     | 18.2%    | 12.5%    | 8.3%        |
  | Asking Rent/SF   | $28.50   | $22.00   | $35.00      |
  | Net Absorption   | -45K SF  | +28K SF  | +52K SF     |
  | Cap Rate         | 7.2%     | 6.8%     | 5.5%        |
  | New Supply       | 0 SF     | 85K SF   | 25K SF      |

  Retail Market:
  | Metric           | Strip    | Power Ctr| Neighborhood|
  |------------------|----------|----------|-------------|
  | Vacancy Rate     | 6.8%     | 9.2%     | 3.5%        |
  | Asking Rent/SF   | $18.00   | $15.50   | $24.00      |
  | Net Absorption   | +12K SF  | -8K SF   | +18K SF     |
  | Cap Rate         | 6.5%     | 7.8%     | 5.8%        |

  Industrial/Warehouse:
  | Metric           | Warehouse| Light Ind| Distribution|
  |------------------|----------|----------|-------------|
  | Vacancy Rate     | 3.2%     | 4.8%     | 2.1%        |
  | Asking Rent/SF   | $8.50    | $10.25   | $7.75       |
  | Net Absorption   | +120K SF | +45K SF  | +200K SF    |
  | Cap Rate         | 5.2%     | 5.8%     | 4.8%        |

  Multifamily:
  | Metric           | Class A  | Class B  | Class C     |
  |------------------|----------|----------|-------------|
  | Vacancy Rate     | 5.5%     | 3.2%     | 2.8%        |
  | Avg Rent/Unit    | $1,650   | $1,250   | $950        |
  | Rent Growth      | +2.8%    | +5.2%    | +6.8%       |
  | Cap Rate         | 4.5%     | 5.2%     | 6.0%        |
  | Pipeline Units   | 450      | 120      | 0           |

  Create:
  1. Sector-by-sector market conditions analysis
  2. Risk-adjusted return comparison across sectors
  3. Supply/demand dynamics and pipeline impact
  4. Market cycle positioning for each sector
  5. Investment thesis and sector allocation recommendation

assertions:
  - type: llm_judge
    criteria: "Response provides thorough sector analysis — identifies industrial/distribution as strongest (2.1% vacancy, massive absorption), CBD office as weakest (18.2% vacancy, negative absorption), with each subsector correctly characterized."
    weight: 0.35
    description: "SectorAnalysisDepth"
  - type: llm_judge
    criteria: "Risk-adjusted return comparison is sophisticated — considers cap rate compression risk in industrial, CBD office recovery potential vs structural decline, Class C multifamily's yield advantage vs pipeline risk in Class A, and retail bifurcation."
    weight: 0.35
    description: "RiskAdjustedComparison"
  - type: llm_judge
    criteria: "Investment thesis is actionable — provides specific allocation recommendation with rationale (e.g., overweight industrial/distribution, selective multifamily Class B, avoid CBD office), considers market cycle timing and portfolio diversification."
    weight: 0.30
    description: "InvestmentThesis"
