meta:
  id: advanced-market-shift
  level: 3
  course: market-analysis-summary
  type: output
  description: "Handle a complex shift simulation — integrate multiple advanced analytical frameworks to address a multi-dimensional market challenge requiring cross-functional expertise"
  tags: [shift-simulation, multi-dimensional, cross-functional, advanced]

state: {}

trigger: |
  You've been hired as a market analyst consultant by
  a city that is experiencing three simultaneous forces
  reshaping its housing market. Create a comprehensive
  integrated analysis.

  Force 1 — Remote Work Migration:
  - 4,200 remote workers relocated to the area in the
    past 18 months (from HCOL markets)
  - Average income: $135,000 (local median: $62,000)
  - Purchasing homes at 15-25% above asking price
  - Concentrated in historic downtown and waterfront
  - Local median price up 28% in these areas (vs 8%
    market-wide)

  Force 2 — Climate Migration:
  - Insurance costs up 45% in 3 years (flood/fire zones)
  - 12% of insured properties lost coverage entirely
  - FEMA flood map revision expanding risk zones by 20%
  - Coastal properties depreciating 5-8% annually
  - Interior properties appreciating 12%+ as substitutes

  Force 3 — Aging Housing Stock Crisis:
  - 40% of homes built before 1970
  - Average deferred maintenance: $35,000
  - Lead paint/asbestos remediation needed in 15%
  - 22% of homes have failing septic systems
  - New construction costs up 30% (labor shortage)

  The mayor wants:
  1. How these forces interact and compound each other
  2. Who is being displaced and where they're going
  3. What the market will look like in 5 years
  4. What policy interventions could help
  5. How to communicate this to the public honestly

assertions:
  - type: llm_judge
    criteria: "Response identifies interaction effects between forces — remote workers driving up prices compounds with aging stock crisis (fewer affordable options), while climate migration creates geographic winners/losers that overlay on the income displacement pattern."
    weight: 0.35
    description: "InteractionAnalysis"
  - type: llm_judge
    criteria: "Displacement analysis is specific — identifies vulnerable populations (longtime residents with fixed incomes, coastal homeowners who can't sell, owners of aging homes who can't afford repairs or compete with well-capitalized remote workers)."
    weight: 0.35
    description: "DisplacementAnalysis"
  - type: llm_judge
    criteria: "Policy recommendations address root causes — not just band-aids; includes zoning reform, housing trust funds, infrastructure investment for aging systems, insurance market interventions, and public communication strategy that avoids panic."
    weight: 0.30
    description: "PolicyAndCommunication"
