meta:
  id: enterprise-market-intelligence
  level: 3
  course: market-analysis-summary
  type: output
  description: "Build an enterprise market intelligence platform — automated data pipelines, real-time dashboards, and predictive analytics for a large brokerage"
  tags: [enterprise-analytics, market-intelligence, dashboard-design, advanced]

state: {}

trigger: |
  A top-20 brokerage with 450 agents across 12 offices
  wants to build a market intelligence platform. Design
  the comprehensive system.

  Current pain points:
  - Each office creates its own market reports manually
  - Data is 2-3 weeks stale by publication
  - No standardized methodology across offices
  - Agents lack micro-market insights for listing
    presentations
  - Leadership can't identify market shifts quickly
  - Competitive intelligence is informal/anecdotal

  Requirements:
  - Real-time data integration from MLS, public records,
    economic indicators, and building permits
  - Automated report generation (daily, weekly, monthly,
    quarterly) at market, submarket, and neighborhood levels
  - Agent-facing dashboards with CMA automation
  - Leadership dashboards with predictive indicators
  - Mobile-friendly alert system for market shifts
  - API integration with existing CRM (Salesforce)
  - White-label reports for client distribution

  Budget: $250,000 first year (build + license)
  Timeline: 6-month phased rollout
  Tech stack preferences: Cloud-based, existing BI tool
  integration (Tableau or Power BI)

  Create:
  1. Platform architecture and data flow design
  2. Dashboard hierarchy (leadership → office → agent)
  3. Automated report templates and cadence
  4. Predictive analytics model framework
  5. Implementation roadmap (6-month phases)
  6. ROI projection and success metrics

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive data architecture — MLS feed integration, public records API, economic data sources, with ETL pipeline, data warehouse, and visualization layer; addresses data freshness (real-time vs batch) and standardization across 12 offices."
    weight: 0.35
    description: "PlatformArchitecture"
  - type: llm_judge
    criteria: "Dashboard hierarchy is well-differentiated — leadership sees market-wide trends and predictive indicators; office managers see submarket comparisons and agent performance; agents see neighborhood-level data and automated CMA tools; each level has appropriate detail."
    weight: 0.35
    description: "DashboardDesign"
  - type: llm_judge
    criteria: "Implementation roadmap is realistic for $250K budget — phases are logical (data integration first, then dashboards, then predictive), includes change management and agent training, and ROI projection connects to agent productivity and listing win rate."
    weight: 0.30
    description: "ImplementationFeasibility"
