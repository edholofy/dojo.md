meta:
  id: predictive-market-modeling
  level: 3
  course: market-analysis-summary
  type: output
  description: "Design a predictive market model — leading indicators, regression analysis, and machine learning approaches for forecasting local housing market trends"
  tags: [predictive-modeling, forecasting, leading-indicators, advanced]

state: {}

trigger: |
  Your brokerage's research team wants to build a
  predictive model for local housing market trends.
  Design the analytical framework.

  Historical data available (10 years):
  - Monthly: median price, sales volume, inventory,
    DOM, new listings, price reductions, pending sales
  - Quarterly: mortgage rates, employment, permits,
    population, income, rent levels
  - Annual: migration data, school ratings, crime stats

  Known leading indicators from academic research:
  | Indicator              | Lead Time | Correlation |
  |------------------------|-----------|-------------|
  | Mortgage applications  | 2-3 months| 0.78        |
  | Building permits       | 12-18 mo  | 0.65        |
  | Consumer confidence    | 3-6 months| 0.58        |
  | Employment growth      | 6-9 months| 0.72        |
  | Pending sales          | 1-2 months| 0.89        |
  | Inventory change rate  | 2-4 months| 0.74        |
  | Price reduction %      | 1-3 months| 0.71        |
  | Showing activity       | 1-2 months| 0.82        |

  Recent model performance (competing models):
  - Simple moving average: MAPE 8.2%
  - Multiple regression: MAPE 5.1%
  - ARIMA: MAPE 4.3%
  - Random forest: MAPE 3.8%
  - Neural network: MAPE 3.5% (but black box)

  Create:
  1. Feature selection and engineering approach
  2. Model architecture recommendation
  3. Validation and backtesting methodology
  4. Confidence intervals and uncertainty communication
  5. Operationalization plan (monthly forecast updates)
  6. Limitations and ethical considerations

assertions:
  - type: llm_judge
    criteria: "Response demonstrates sophisticated feature engineering — selects indicators based on lead time and correlation, considers interaction effects (e.g., rate changes × inventory), addresses multicollinearity, and recommends ensemble or hybrid approaches."
    weight: 0.35
    description: "ModelDesignSophistication"
  - type: llm_judge
    criteria: "Validation methodology is rigorous — uses walk-forward validation (not random split for time series), addresses overfitting, includes out-of-sample testing, and establishes performance benchmarks against simpler models."
    weight: 0.35
    description: "ValidationMethodology"
  - type: llm_judge
    criteria: "Operationalization is practical — addresses how forecasts are communicated to non-technical agents, includes confidence intervals, explains when the model should NOT be trusted (structural breaks, unprecedented events), and includes ethical concerns about self-fulfilling prophecies."
    weight: 0.30
    description: "PracticalImplementation"
