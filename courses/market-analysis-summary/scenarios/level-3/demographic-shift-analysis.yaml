meta:
  id: demographic-shift-analysis
  level: 3
  course: market-analysis-summary
  type: output
  description: "Analyze demographic shifts and their housing market implications — migration patterns, generational preferences, and household formation trends"
  tags: [demographics, migration-analysis, generational-trends, advanced]

state: {}

trigger: |
  Your regional association has asked for a demographic
  impact study to understand how population changes will
  reshape the housing market over the next decade. Create
  the analysis.

  Population & Migration Data:
  | Source           | Annual Net Migration | Avg Age | Avg Income |
  |------------------|---------------------|---------|------------|
  | Domestic In      | +3,200              | 34      | $78,000    |
  | Domestic Out     | -1,800              | 62      | $65,000    |
  | International In | +1,500              | 29      | $52,000    |
  | Net Change       | +2,900              | --      | --         |

  Generational breakdown (current):
  | Generation   | % of Buyers | Avg Purchase | Preference      |
  |------------- |-------------|--------------|-----------------|
  | Gen Z (18-28)| 12%         | $245,000     | Urban, small    |
  | Millennial   | 42%         | $365,000     | Suburban, 3BR+  |
  | Gen X        | 28%         | $425,000     | Established     |
  | Boomer       | 15%         | $340,000     | Downsizing      |
  | Silent       | 3%          | $280,000     | Senior living   |

  Household formation trends:
  - New households/year: 1,850 (up from 1,200 five
    years ago)
  - Single-person households: 34% (up from 28%)
  - Multi-generational households: 8% (up from 4%)
  - Work-from-home permanent: 28% of workforce
  - Average household size: 2.4 (down from 2.7)

  Housing preference shifts (survey of recent buyers):
  - Home office: 72% (required), up from 25% (2019)
  - Outdoor space: 68% (important)
  - Walkability: 45% (important), up from 30%
  - EV charging: 22% (required), up from 3%
  - ADU/in-law suite: 18% (desired)
  - Smart home features: 55% (desired)

  Create:
  1. Migration impact analysis (who's coming/going)
  2. Generational demand forecast (5-10 year)
  3. Housing type demand projections
  4. Neighborhood preference shifts
  5. Builder/developer recommendations
  6. Investment implications

assertions:
  - type: llm_judge
    criteria: "Response identifies key migration dynamics — younger, higher-income in-migration (avg 34, $78K) replacing older out-migration (avg 62, $65K) means rising demand for family housing, higher price points, and suburban growth; international migration adds workforce housing demand."
    weight: 0.35
    description: "MigrationAnalysis"
  - type: llm_judge
    criteria: "Generational demand forecast connects demographics to housing types — Millennials (42% of buyers) driving suburban 3BR+ demand, Gen Z emergence creating starter home pressure, Boomers downsizing releasing inventory, with remote work reshaping location preferences."
    weight: 0.35
    description: "GenerationalForecast"
  - type: llm_judge
    criteria: "Builder/developer recommendations are specific — addresses the gap between what's being built and what demographics demand (more ADUs, home offices, smaller lots with outdoor space, EV-ready homes, walkable communities); identifies underserved segments."
    weight: 0.30
    description: "DeveloperRecommendations"
