meta:
  id: economic-impact-study
  level: 3
  course: market-analysis-summary
  type: output
  description: "Create an economic impact study for a major development — quantify the housing market effects of a large employer, infrastructure project, or policy change"
  tags: [economic-impact, development-analysis, policy-impact, advanced]

state: {}

trigger: |
  A major tech company announced a new campus that will
  bring 5,000 jobs over 5 years to your market. The
  county planning commission wants an economic impact
  study focused on housing. Create the analysis.

  Announcement details:
  - Company: TechCorp (Fortune 500)
  - Jobs: 5,000 direct over 5 years
    - Year 1: 800 | Year 2: 1,200 | Year 3: 1,500
    - Year 4: 1,000 | Year 5: 500
  - Average salary: $125,000 (range: $55K-$250K)
  - Campus location: North corridor (3 miles from
    downtown)
  - Construction timeline: 18 months (starts Q2)

  Multiplier effects (Bureau of Economic Analysis):
  - Each tech job creates 2.3 indirect/induced jobs
  - Total employment impact: ~16,500 over 5 years
  - Indirect job avg salary: $48,000

  Current housing supply:
  - Annual new construction: 1,200 units/year
  - Current vacancy: 4.2% (owned), 3.8% (rental)
  - Available lots: 3,500 (5-year pipeline)
  - Construction labor capacity: maxed at current pace
  - Infrastructure (water/sewer): 85% capacity

  Comparable campus impacts:
  - Austin (Samsung, 2021): 20% price increase within
    5 miles over 3 years
  - Nashville (Amazon, 2018): 15% price increase,
    rent up 22%
  - Pittsburgh (Google, 2019): 8% price increase,
    gentrification concerns

  Create:
  1. Housing demand projection (5-year model)
  2. Supply gap analysis (can the market absorb?)
  3. Price impact projection by distance from campus
  4. Rental market impact analysis
  5. Infrastructure strain assessment
  6. Policy recommendations for balanced growth

assertions:
  - type: llm_judge
    criteria: "Response builds a credible housing demand model — 5,000 direct + 11,500 indirect jobs, with relocation rates, household size assumptions, and ownership/rental split, yielding specific annual unit demand that likely exceeds the 1,200/year construction pace."
    weight: 0.35
    description: "DemandProjectionRigor"
  - type: llm_judge
    criteria: "Supply gap analysis identifies constraints — construction labor bottleneck, infrastructure at 85% capacity, lot pipeline adequacy, permitting timeline, and quantifies the gap between projected demand and realistic supply; uses comparable campus data."
    weight: 0.35
    description: "SupplyGapAnalysis"
  - type: llm_judge
    criteria: "Policy recommendations address equity concerns — acknowledges displacement risk for existing residents, suggests inclusionary zoning, workforce housing incentives, infrastructure investment priorities, and transit-oriented development to distribute impact."
    weight: 0.30
    description: "PolicyRecommendations"
