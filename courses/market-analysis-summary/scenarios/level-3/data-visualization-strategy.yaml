meta:
  id: data-visualization-strategy
  level: 3
  course: market-analysis-summary
  type: output
  description: "Design a data visualization strategy for market reports — chart selection, dashboard layout, and storytelling through visual data presentation"
  tags: [data-visualization, dashboard-design, visual-storytelling, advanced]

state: {}

trigger: |
  Your brokerage wants to overhaul how market data is
  presented to clients, agents, and leadership. Current
  reports are text-heavy with basic tables. Design a
  modern visual communication strategy.

  Current report types to redesign:
  1. Monthly market snapshot (1 page, clients)
  2. Quarterly market review (4 pages, agents)
  3. Annual market forecast (12 pages, leadership)
  4. Listing presentation market section (3 slides)
  5. Buyer consultation market overview (2 slides)
  6. Social media market graphics (Instagram/LinkedIn)

  Data elements to visualize:
  - Price trends (24-month time series)
  - Inventory levels vs absorption rate
  - Days on market distribution
  - Price range segmentation (pie/bar)
  - Geographic heat maps
  - Year-over-year comparison metrics
  - Forecast with confidence intervals
  - Competitive market position

  Audience considerations:
  - Clients: Low data literacy, need clear takeaways
  - Agents: Moderate, need actionable insights
  - Leadership: High, need detailed drill-down capability
  - Social media: Scannable in 3 seconds

  Brand guidelines:
  - Primary: Navy (#1B365D), Gold (#C5A572)
  - Secondary: Slate (#64748B), White
  - Font: Montserrat (headers), Open Sans (body)
  - Logo placement: Bottom right, small

  Create:
  1. Chart type recommendations for each data element
  2. Dashboard layout designs for each report type
  3. Color and typography standards for data viz
  4. Interactive vs static recommendations
  5. Social media template designs
  6. Implementation toolkit (tools, templates, training)

assertions:
  - type: llm_judge
    criteria: "Response selects appropriate chart types for each data element — line charts for time series, bar charts for comparisons, heat maps for geographic data, bullet charts for KPIs, and avoids pie charts for more than 5 categories; each choice is justified."
    weight: 0.35
    description: "ChartTypeSelection"
  - type: llm_judge
    criteria: "Dashboard layouts are audience-appropriate — client-facing reports use large numbers and simple trends with clear takeaways; agent dashboards balance detail with scannability; leadership gets drill-down capability and comparative views."
    weight: 0.35
    description: "AudienceAppropriateDesign"
  - type: llm_judge
    criteria: "Social media templates are designed for rapid consumption — uses the 3-second rule, features one key metric prominently, includes proper branding within the color palette, and considers platform-specific dimensions (Instagram square, LinkedIn landscape)."
    weight: 0.30
    description: "SocialMediaDesign"
