meta:
  id: market-risk-assessment
  level: 3
  course: market-analysis-summary
  type: output
  description: "Create a comprehensive market risk assessment — identify vulnerabilities, stress-test scenarios, and build early warning indicators for market corrections"
  tags: [risk-assessment, stress-testing, early-warning, advanced]

state: {}

trigger: |
  The regional housing authority has commissioned a
  market risk assessment. They want to understand
  potential vulnerabilities and prepare contingency
  plans. Create the analysis.

  Current market health indicators:
  | Indicator                    | Value    | Threshold | Status    |
  |------------------------------|----------|-----------|-----------|
  | Price/Income Ratio           | 5.2      | >6.0      | Moderate  |
  | Mortgage Delinquency (90+)   | 1.8%     | >3.0%     | Healthy   |
  | Speculative Purchases        | 8%       | >15%      | Low       |
  | Construction as % of GDP     | 5.8%     | >8%       | Moderate  |
  | Price Deviation from Trend   | +12%     | >20%      | Moderate  |
  | Months Supply                | 2.8      | <1.5/>6.0 | Balanced  |
  | Foreclosure Pipeline         | 0.4%     | >1.5%     | Healthy   |
  | ARM Share of Mortgages       | 6%       | >20%      | Low       |
  | Investor Purchase Share      | 14%      | >25%      | Moderate  |
  | Days on Market Trend         | +18%     | >50%      | Watch     |

  Economic vulnerability factors:
  - Top 3 employers: 22% of jobs (concentration risk)
  - Federal/military employment: 12% (budget dependent)
  - Tourism revenue dependency: 8% of GDP
  - Student loan exposure: $42K avg among buyers 25-35
  - Climate risk (flood/fire): 15% of properties in
    moderate-high risk zones

  Historical correction data (local market):
  - 2008-2011: -28% peak-to-trough, 6 years to recover
  - 2001-2002: -8% correction, 18-month recovery
  - 1990-1992: -12% correction, 3-year recovery

  Create:
  1. Risk scorecard with current assessment
  2. Vulnerability analysis (top 5 risks ranked)
  3. Stress test scenarios (mild, moderate, severe)
  4. Early warning indicator dashboard
  5. Contingency recommendations for stakeholders
  6. Comparison to pre-2008 conditions

assertions:
  - type: llm_judge
    criteria: "Response creates a meaningful risk scorecard — correctly assesses most indicators as healthy-to-moderate but identifies concerning trends (DOM increasing 18%, price 12% above trend, employer concentration at 22%); compares favorably to 2008 (no ARM bubble, low speculation)."
    weight: 0.35
    description: "RiskScorecardAccuracy"
  - type: llm_judge
    criteria: "Stress test scenarios are quantified — mild (5-8% correction triggers), moderate (12-15% with recession), severe (20%+ with employer departure + rate spike); each scenario includes probability assessment and estimated recovery timeline based on historical data."
    weight: 0.35
    description: "StressTestRigor"
  - type: llm_judge
    criteria: "Early warning dashboard is actionable — identifies specific leading indicators to monitor (delinquency rate, speculative share, construction permits, DOM acceleration), with trigger thresholds that prompt specific contingency actions."
    weight: 0.30
    description: "EarlyWarningSystem"
