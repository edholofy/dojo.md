meta:
  id: market-segmentation-framework
  level: 3
  course: market-analysis-summary
  type: output
  description: "Build a market segmentation framework — define micro-markets using clustering analysis, lifestyle demographics, and housing stock characteristics"
  tags: [market-segmentation, micro-markets, clustering-analysis, advanced]

state: {}

trigger: |
  Your MLS board wants to move beyond traditional
  geographic boundaries for market reporting. Design
  a modern market segmentation framework that groups
  areas by actual market behavior, not just zip codes.

  Current geographic segments (traditional):
  - 15 zip codes, 8 MLS areas, 4 school districts
  - Problem: Zip 30042 contains $180K starter homes
    AND $800K waterfront estates — same "market" in
    current reporting

  Available data for segmentation:
  - Property characteristics: size, age, style, lot,
    bedrooms, quality grade
  - Transaction data: prices, DOM, list/sale ratio,
    turnover rate
  - Demographics: income, age, education, household
    composition, commute patterns
  - Amenity proximity: schools, parks, transit,
    shopping, medical
  - Market behavior: appreciation rate, volatility,
    seasonality, investor activity

  Sample cluster analysis results:
  | Cluster      | Homes  | Med Price | Avg Age | Key Trait           |
  |------------- |--------|-----------|---------|---------------------|
  | Starter      | 2,800  | $215K     | 35 yrs  | First-time buyers   |
  | Family Core  | 4,200  | $345K     | 22 yrs  | School-driven       |
  | Move-Up      | 2,100  | $485K     | 15 yrs  | Upgraders           |
  | Estate       | 850    | $725K     | 18 yrs  | Premium amenities   |
  | Urban Condo  | 1,400  | $265K     | 8 yrs   | Young professionals |
  | Retiree      | 1,200  | $310K     | 12 yrs  | 55+ communities     |
  | Rural        | 1,800  | $275K     | 40 yrs  | Acreage/privacy     |
  | Investment   | 2,400  | $195K     | 45 yrs  | Investor-dominated  |

  Create:
  1. Segmentation methodology (variables, weighting)
  2. Cluster profiles with market behavior patterns
  3. Segment-specific reporting templates
  4. Cross-segment migration patterns (who moves where)
  5. Implementation plan for MLS adoption
  6. Agent training materials for using segments

assertions:
  - type: llm_judge
    criteria: "Response designs a rigorous segmentation methodology — explains variable selection, weighting scheme (market behavior > demographics > geography), clustering approach (k-means or hierarchical), and validation methods for segment stability."
    weight: 0.35
    description: "MethodologyDesign"
  - type: llm_judge
    criteria: "Cluster profiles include actionable market behavior patterns — each segment has distinct appreciation rates, seasonal patterns, buyer types, and competitive dynamics; e.g., Starter segment has fastest turnover and most multiple offers."
    weight: 0.35
    description: "ClusterProfileDepth"
  - type: llm_judge
    criteria: "Implementation plan addresses real MLS adoption challenges — system integration, agent training and buy-in, transition period from old to new segments, boundary disputes, and ongoing validation/recalibration schedule."
    weight: 0.30
    description: "ImplementationPracticality"
