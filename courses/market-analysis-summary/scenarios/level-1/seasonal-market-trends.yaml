meta:
  id: seasonal-market-trends
  level: 1
  course: market-analysis-summary
  type: output
  description: "Analyze seasonal market trends — identify patterns in sales volume, pricing, and inventory across 12 months"
  tags: [seasonal-trends, annual-patterns, timing-strategy, beginner]

state: {}

trigger: |
  A seller asks: "When is the best time to list my
  home?" Analyze the following 12-month data for
  your market and provide a recommendation.

  Monthly data (prior year):
  | Month | Sold | Median Price | Avg DOM | Inventory |
  |-------|------|-------------|---------|-----------|
  | Jan   |  22  | $338K       |  38     |  4.2      |
  | Feb   |  25  | $342K       |  35     |  3.8      |
  | Mar   |  38  | $348K       |  28     |  3.1      |
  | Apr   |  52  | $355K       |  21     |  2.4      |
  | May   |  58  | $362K       |  18     |  2.0      |
  | Jun   |  61  | $368K       |  16     |  1.8      |
  | Jul   |  55  | $365K       |  19     |  2.1      |
  | Aug   |  48  | $359K       |  22     |  2.5      |
  | Sep   |  35  | $352K       |  27     |  3.0      |
  | Oct   |  30  | $348K       |  31     |  3.4      |
  | Nov   |  24  | $340K       |  36     |  3.9      |
  | Dec   |  18  | $335K       |  42     |  4.5      |

  Create:
  1. Seasonal trend analysis with key patterns
  2. Best listing window recommendation with data
  3. Off-season strategy for sellers who can't wait
  4. Visual description of the seasonal cycle
  5. How to present this data to the seller

assertions:
  - type: llm_judge
    criteria: "Response correctly identifies seasonal patterns — spring/summer peak (May-June) with highest prices and lowest DOM; winter trough (Dec-Jan) with fewer sales and longest DOM; transitional months and their characteristics."
    weight: 0.35
    description: "SeasonalPatternIdentification"
  - type: llm_judge
    criteria: "Response provides data-backed recommendations — identifies the optimal listing window, quantifies the price difference between peak and off-season, and offers a practical off-season strategy for sellers who can't wait."
    weight: 0.35
    description: "DataBackedRecommendation"
  - type: llm_judge
    criteria: "The presentation strategy would help the seller understand timing — uses the data to tell a story, acknowledges trade-offs (off-season has less competition), and empowers the seller to make a timing decision."
    weight: 0.30
    description: "SellerPresentationStrategy"
