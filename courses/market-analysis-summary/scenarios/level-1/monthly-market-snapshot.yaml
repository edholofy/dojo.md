meta:
  id: monthly-market-snapshot
  level: 1
  course: market-analysis-summary
  type: output
  description: "Write a monthly market snapshot for a local area — key statistics, trends, and buyer/seller implications"
  tags: [monthly-snapshot, local-market, statistics, beginner]

state: {}

trigger: |
  Write a monthly market snapshot for "Oakridge
  Heights" based on the following January data:

  January Statistics:
  - Homes sold: 28 (vs 22 last January, +27%)
  - Median sale price: $372,500 (vs $358,000 last
    Jan, +4.1%)
  - Average DOM: 24 days (vs 35 last Jan, -31%)
  - Active listings: 45 (vs 68 last Jan, -34%)
  - New listings: 31 (vs 28 last Jan, +10.7%)
  - Months of inventory: 1.6 (vs 3.1 last Jan)
  - List-to-sale price ratio: 99.2% (vs 97.8%)
  - Price per sq ft: $185 (vs $174, +6.3%)
  - Closed volume: $10.43M (vs $7.88M, +32.4%)

  Price range breakdown:
  - Under $300K: 8 sold (down from 12)
  - $300-400K: 14 sold (up from 7)
  - $400-500K: 4 sold (up from 2)
  - Over $500K: 2 sold (up from 1)

  Write a market snapshot that:
  1. Summarizes key statistics clearly
  2. Identifies the market trend (buyer's/seller's)
  3. Explains what the data means for buyers
  4. Explains what the data means for sellers
  5. Provides a brief forecast
  6. Is suitable for a real estate newsletter

assertions:
  - type: llm_judge
    criteria: "Response accurately presents the key statistics — median price, DOM, inventory, list-to-sale ratio — and correctly identifies this as a strong seller's market based on 1.6 months of inventory, declining DOM, and rising prices."
    weight: 0.35
    description: "StatisticalAccuracy"
  - type: llm_judge
    criteria: "Response provides meaningful interpretation — explains what low inventory means for buyers (competition), what rising prices mean for sellers (opportunity), and identifies the shift from last year's more balanced market."
    weight: 0.35
    description: "DataInterpretation"
  - type: llm_judge
    criteria: "Response is newsletter-ready — professional but accessible language, organized for easy scanning, appropriate length, and actionable advice for both buyers and sellers."
    weight: 0.30
    description: "NewsletterReadiness"
