meta:
  id: inventory-supply-analysis
  level: 1
  course: market-analysis-summary
  type: output
  description: "Analyze housing inventory and supply — explain months of supply, absorption rate, and what they mean for market conditions"
  tags: [inventory, absorption-rate, supply-demand, beginner]

state: {}

trigger: |
  A client asks: "I keep hearing about 'months of
  supply' and 'low inventory.' What does that
  actually mean?" Create an educational market
  analysis around inventory and supply metrics.

  Current market data:
  - Active listings: 185
  - Homes sold last month: 72
  - Months of supply: 2.6 (185 ÷ 72)
  - New listings this month: 68
  - Expired/withdrawn: 12
  - Absorption rate: 38.9% (72 ÷ 185)

  Historical months of supply (same month, prior
  years):
  - 2021: 1.2 months (extreme seller's market)
  - 2022: 1.8 months (strong seller's market)
  - 2023: 3.4 months (balanced leaning seller)
  - 2024: 4.1 months (balanced)
  - 2025: 3.2 months (seller's leaning)
  - 2026 (current): 2.6 months (seller's market)

  Market condition benchmarks:
  - Under 3 months: Seller's market
  - 3-6 months: Balanced market
  - Over 6 months: Buyer's market

  Create an analysis that:
  1. Explains inventory, months of supply, and
     absorption rate in plain language
  2. Shows the historical trend
  3. Explains what it means for buyers (competition)
  4. Explains what it means for sellers (pricing power)
  5. Provides an analogy to make it memorable

assertions:
  - type: llm_judge
    criteria: "Response explains all three metrics clearly — inventory (homes available), months of supply (how long until all homes sell at current pace), and absorption rate (percentage of inventory selling each month) — in language any client would understand."
    weight: 0.35
    description: "MetricExplanation"
  - type: llm_judge
    criteria: "Response uses the historical data to tell a trend story — shows the market swinging from extreme seller's (2021) to balanced (2024) and back to seller's (2026), and explains what drove those changes."
    weight: 0.35
    description: "TrendNarrative"
  - type: llm_judge
    criteria: "Response includes a memorable analogy and actionable advice — the analogy makes the abstract concrete; buyers understand what competition looks like at 2.6 months; sellers understand their pricing power."
    weight: 0.30
    description: "MemorableAndActionable"
