meta:
  id: price-per-sqft-analysis
  level: 1
  course: market-analysis-summary
  type: output
  description: "Conduct a price per square foot analysis — compare properties by efficiency metric and explain its uses and limitations"
  tags: [price-per-sqft, valuation-metric, analysis, beginner]

state: {}

trigger: |
  A buyer asks: "I keep hearing about price per
  square foot. What does it mean and should I use
  it to evaluate homes?" Use the following data to
  create an educational market analysis.

  Properties in the buyer's target area:

  | Address     | Price   | Sq Ft | $/SqFt | Notes             |
  |-------------|---------|-------|--------|-------------------|
  | 12 Oak St   | $340K   | 1,600 | $213   | Updated, small lot|
  | 88 Pine Ave | $385K   | 2,100 | $183   | Original, big lot |
  | 45 Elm Dr   | $362K   | 1,750 | $207   | Partial update    |
  | 203 Maple   | $410K   | 1,900 | $216   | Fully renovated   |
  | 77 Cedar Ct | $298K   | 1,400 | $213   | Dated, good bones |
  | 550 Birch   | $425K   | 2,300 | $185   | Large, some updates|

  Market averages:
  - Median $/sq ft: $205
  - Range: $175-$230
  - $/sq ft varies by: condition, lot size, location,
    age, layout efficiency

  Create:
  1. Explanation of price per square foot (plain
     language)
  2. Analysis of the 6 properties using this metric
  3. When $/sq ft is useful and when it's misleading
  4. Other metrics to consider alongside $/sq ft
  5. Practical buying advice using this knowledge

assertions:
  - type: llm_judge
    criteria: "Response explains price per square foot clearly — what it measures, how to calculate it, and what the market average means — in language accessible to a buyer unfamiliar with the metric."
    weight: 0.35
    description: "MetricExplanation"
  - type: llm_judge
    criteria: "Response analyzes all 6 properties using $/sq ft and explains variations — why 12 Oak St is high (updated, small lot), why 88 Pine Ave is low (original condition, big lot) — and when the metric is misleading."
    weight: 0.35
    description: "PropertyAnalysis"
  - type: llm_judge
    criteria: "Response provides balanced guidance — $/sq ft is useful for quick comparisons but has limitations (doesn't account for lot size, location, condition); the buyer would understand how to use it as one tool among several."
    weight: 0.30
    description: "BalancedGuidance"
