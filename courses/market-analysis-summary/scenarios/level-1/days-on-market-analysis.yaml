meta:
  id: days-on-market-analysis
  level: 1
  course: market-analysis-summary
  type: output
  description: "Analyze days-on-market patterns — explain what DOM reveals about pricing, demand, and market conditions"
  tags: [days-on-market, market-speed, pricing-indicator, beginner]

state: {}

trigger: |
  You're preparing a market report focused on days
  on market (DOM) for your local area. Analyze the
  following data and create an educational report.

  DOM Distribution (last 6 months, 180 sales):
  - 0-7 days: 42 homes (23%) — avg 98.5% of list
  - 8-14 days: 35 homes (19%) — avg 99.1% of list
  - 15-30 days: 48 homes (27%) — avg 98.8% of list
  - 31-60 days: 32 homes (18%) — avg 97.2% of list
  - 61-90 days: 15 homes (8%) — avg 95.5% of list
  - 90+ days: 8 homes (4%) — avg 92.1% of list

  DOM by price range:
  - Under $300K: Average 16 days
  - $300-400K: Average 24 days
  - $400-500K: Average 32 days
  - $500K+: Average 48 days

  DOM trends (quarterly):
  - Q1 last year: 35 days average
  - Q2 last year: 22 days average
  - Q3 last year: 28 days average
  - Q4 last year: 31 days average
  - Q1 this year: 24 days average

  Create a DOM analysis report that:
  1. Explains what DOM means and why it matters
  2. Analyzes the distribution and list-to-sale
     relationship
  3. Explains DOM by price range
  4. Identifies DOM trends
  5. Provides actionable insights for buyers and
     sellers

assertions:
  - type: llm_judge
    criteria: "Response explains DOM clearly — what it measures, how it relates to pricing strategy, and why the inverse relationship between DOM and list-to-sale percentage is significant (homes priced right sell fast and close to asking)."
    weight: 0.35
    description: "DOMExplanation"
  - type: llm_judge
    criteria: "Response analyzes the data meaningfully — the distribution shows 69% of homes sell within 30 days; the price range analysis shows higher prices = longer DOM; the quarterly trend shows a tightening market."
    weight: 0.35
    description: "DataAnalysis"
  - type: llm_judge
    criteria: "Insights are actionable — sellers learn that pricing right leads to faster sales at higher percentages of asking; buyers understand urgency varies by price range; both understand the seasonal and trend patterns."
    weight: 0.30
    description: "ActionableInsights"
