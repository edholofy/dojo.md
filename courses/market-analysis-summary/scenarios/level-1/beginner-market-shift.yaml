meta:
  id: beginner-market-shift
  level: 1
  course: market-analysis-summary
  type: output
  description: "Shift simulation — create market analyses for three different audiences simultaneously from the same data"
  tags: [shift-simulation, multi-audience, beginner]

state: {}

trigger: |
  Using the following market data, create three
  different market analysis summaries for three
  different audiences:

  Market data (Oakville, February):
  - Median price: $385,000 (+5.2% YoY)
  - Average DOM: 21 days (-8 days YoY)
  - Active listings: 92 (-28% YoY)
  - Months of supply: 1.8
  - List-to-sale ratio: 100.3%
  - Closed sales: 51 (+12% YoY)
  - New listings: 48 (-5% YoY)
  - Price per sq ft: $198 (+7.1% YoY)
  - Cash sales: 18% of transactions
  - 42% sold above asking price

  === AUDIENCE 1: Newsletter for Past Clients ===
  Friendly, informative, positions you as the expert.
  Should make them feel smart about their home
  investment. (~300 words)

  === AUDIENCE 2: Seller Listing Presentation ===
  Data-driven, persuasive, shows why now is a great
  time to sell. Should support your pricing strategy.
  (~500 words)

  === AUDIENCE 3: Social Media Post (Instagram) ===
  Eye-catching, brief, shareable. Should drive
  engagement and position you as a market authority.
  (~100 words + suggested visual)

  Write all three from the same data, each tailored
  to its audience and purpose.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct market analyses from the same data — a 300-word newsletter, a 500-word listing presentation section, and a 100-word Instagram post — each using the data differently for its purpose."
    weight: 0.35
    description: "ThreeAudienceAdaptation"
  - type: llm_judge
    criteria: "Each piece matches its audience — the newsletter is warm and celebratory about home values; the listing presentation is persuasive with pricing support; the Instagram post is concise, engaging, and includes a visual concept."
    weight: 0.35
    description: "AudienceMatching"
  - type: llm_judge
    criteria: "All three are accurate and consistent — the same data tells different stories for different purposes without contradiction; no statistics are misrepresented; each serves its intended goal."
    weight: 0.30
    description: "AccuracyAndConsistency"
