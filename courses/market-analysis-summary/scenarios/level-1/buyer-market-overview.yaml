meta:
  id: buyer-market-overview
  level: 1
  course: market-analysis-summary
  type: output
  description: "Create a market overview for first-time buyers — translate complex market data into actionable buying guidance"
  tags: [buyer-education, first-time-buyers, market-overview, beginner]

state: {}

trigger: |
  Your first-time buyer clients, Marcus and Aisha,
  are nervous about buying in the current market.
  They keep asking: "Is now a good time to buy?"
  Create a market overview that educates without
  pressuring.

  Current market conditions:
  - Mortgage rates: 6.8% (down from 7.4% peak)
  - Median home price: $345,000 (local market)
  - Inventory: 2.3 months (up from 1.5 months
    6 months ago)
  - Homes selling in avg 22 days
  - 35% of homes sell above asking
  - New listings increasing 15% month-over-month
  - Their budget: $300-350K
  - Pre-approved at 6.8%, monthly payment ~$2,200
    on $340K home
  - Renting at $1,850/month currently

  Create a buyer market overview that:
  1. Explains current market conditions in plain
     language
  2. Compares rent vs buy for their situation
  3. Addresses their "is now a good time" question
     honestly
  4. Provides strategies for buying in this market
  5. Avoids pressuring them to act

assertions:
  - type: llm_judge
    criteria: "Response explains market conditions in plain language — translates metrics like months of inventory, DOM, and list-to-sale ratio into what they mean for Marcus and Aisha's specific situation and budget."
    weight: 0.35
    description: "PlainLanguageExplanation"
  - type: llm_judge
    criteria: "Response provides an honest rent vs buy comparison — acknowledges the $350/month premium of buying over renting while discussing equity building, tax benefits, and long-term considerations without oversimplifying."
    weight: 0.35
    description: "RentVsBuyHonesty"
  - type: llm_judge
    criteria: "Response empowers without pressuring — presents data for informed decision-making, doesn't make the 'is now a good time?' answer a simple yes, and respects their agency as first-time buyers navigating a major life decision."
    weight: 0.30
    description: "EmpowermentWithoutPressure"
