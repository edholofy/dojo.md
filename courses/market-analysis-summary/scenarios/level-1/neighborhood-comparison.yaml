meta:
  id: neighborhood-comparison
  level: 1
  course: market-analysis-summary
  type: output
  description: "Compare three neighborhoods for a buyer — price trends, amenities, schools, and lifestyle fit analysis"
  tags: [neighborhood-comparison, buyer-education, lifestyle, beginner]

state: {}

trigger: |
  Your buyers, the Chens, are relocating and
  considering three neighborhoods. Create a
  comparison analysis to help them decide.

  Budget: $375,000-$425,000
  Priorities: Good schools, safe area, commute under
  30 minutes to downtown, family-friendly

  Neighborhood 1: Riverside Park
  - Median price: $389,000
  - Avg DOM: 18 days
  - Schools: 8/10 elementary, 7/10 middle, 8/10 high
  - Commute: 22 minutes
  - Style: Established 1980s-90s homes, mature trees
  - HOA: None
  - 5-year appreciation: +24%

  Neighborhood 2: Meadowbrook Estates
  - Median price: $412,000
  - Avg DOM: 28 days
  - Schools: 9/10 elementary, 9/10 middle, 8/10 high
  - Commute: 35 minutes
  - Style: Newer construction 2005-2015, planned
    community with pool and playground
  - HOA: $175/month
  - 5-year appreciation: +19%

  Neighborhood 3: Downtown Heights
  - Median price: $398,000
  - Avg DOM: 14 days
  - Schools: 6/10 elementary, 7/10 middle, 7/10 high
  - Commute: 8 minutes
  - Style: Mix of renovated older homes and new
    townhouses, walkable to restaurants/shops
  - HOA: Varies ($0-250)
  - 5-year appreciation: +31%

  Create:
  1. Side-by-side comparison matrix
  2. Pros and cons for each based on the Chens'
     priorities
  3. Market trend analysis for each neighborhood
  4. Recommendation with rationale

assertions:
  - type: llm_judge
    criteria: "Response creates a clear comparison matrix and evaluates each neighborhood against the Chens' stated priorities — schools, safety, commute, and family-friendliness — with honest pros and cons."
    weight: 0.35
    description: "ComparisonQuality"
  - type: llm_judge
    criteria: "Market analysis is data-driven — references median prices relative to budget, DOM patterns, appreciation rates, and how each metric affects the Chens' decision; notes Meadowbrook exceeds commute preference."
    weight: 0.35
    description: "DataDrivenAnalysis"
  - type: llm_judge
    criteria: "The recommendation is well-reasoned — considers trade-offs between priorities, acknowledges what the Chens would gain and sacrifice in each neighborhood, and empowers them to make an informed decision."
    weight: 0.30
    description: "RecommendationQuality"
