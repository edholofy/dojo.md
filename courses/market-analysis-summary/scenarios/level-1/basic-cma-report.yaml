meta:
  id: basic-cma-report
  level: 1
  course: market-analysis-summary
  type: output
  description: "Create a basic comparative market analysis for a single-family home — select comparables, make adjustments, and recommend a listing price"
  tags: [cma, comparables, pricing, beginner]

state: {}

trigger: |
  You're preparing a CMA for a seller consultation.
  The subject property is:

  Subject: 245 Elm Street
  - 3 bed / 2 bath, 1,650 sq ft
  - Built 1998, ranch style
  - Updated kitchen (2022), original bathrooms
  - 0.25-acre lot, attached 2-car garage
  - Central air, gas heat
  - Good condition overall

  Available comparable sales (last 6 months, within
  1 mile):

  Comp 1: 189 Oak Ave — Sold $355,000
  - 3/2, 1,580 sq ft, built 2001, ranch
  - Updated kitchen and bathrooms, 0.22 acres
  - Sold in 18 days, conventional financing

  Comp 2: 312 Maple Dr — Sold $342,000
  - 3/2, 1,700 sq ft, built 1996, ranch
  - Original kitchen, updated baths, 0.28 acres
  - Sold in 32 days, FHA financing

  Comp 3: 78 Pine Ct — Sold $368,000
  - 4/2.5, 1,850 sq ft, built 2000, colonial
  - Fully updated, 0.30 acres, finished basement
  - Sold in 8 days, cash buyer

  Comp 4: 501 Cedar Ln — Sold $329,000
  - 3/1.5, 1,520 sq ft, built 1994, ranch
  - Dated throughout, 0.20 acres, carport only
  - Sold in 45 days, conventional financing

  Create a CMA report including:
  1. Comparable selection rationale
  2. Adjustment grid (price adjustments for
     differences)
  3. Adjusted price range
  4. Recommended listing price with rationale
  5. Market context summary

assertions:
  - type: llm_judge
    criteria: "Response creates a proper CMA — selects appropriate comparables with rationale, builds an adjustment grid with reasonable dollar adjustments for bedrooms, bathrooms, square footage, condition, and lot size, and arrives at an adjusted price range."
    weight: 0.35
    description: "CMAMethodology"
  - type: llm_judge
    criteria: "Adjustments are logical and consistent — updated features add value, extra bedrooms/bathrooms are adjusted appropriately, square footage adjustments use a reasonable per-sq-ft rate, and Comp 3 is adjusted downward for extra bedroom and finished basement."
    weight: 0.35
    description: "AdjustmentLogic"
  - type: llm_judge
    criteria: "The recommended listing price is defensible — it's supported by the adjusted comparable range, considers market context (DOM patterns), and provides a clear rationale the seller would understand and trust."
    weight: 0.30
    description: "PriceRecommendation"
