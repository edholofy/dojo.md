meta:
  id: listing-presentation-market-section
  level: 1
  course: market-analysis-summary
  type: output
  description: "Write the market analysis section of a listing presentation — convince sellers with data-backed pricing strategy"
  tags: [listing-presentation, pricing-strategy, seller-education, beginner]

state: {}

trigger: |
  You're preparing the market analysis section of a
  listing presentation for prospective sellers, the
  Johnsons. Their home is a 4 bed/2.5 bath colonial
  at 88 Heritage Lane. They believe it's worth
  $475,000 based on Zillow's Zestimate.

  Your market analysis data:
  - Recent sales in their subdivision (6 months):
    $425K, $438K, $442K, $451K, $460K
  - Active listings: $449K, $465K, $479K
  - Pending: $445K, $458K
  - Market trend: Prices up 3.2% year-over-year
  - Average DOM: 26 days
  - List-to-sale ratio: 98.1%
  - Zillow Zestimate: $475,000 (historically 5-8%
    inaccurate in this area)

  Write the market section that:
  1. Presents the data clearly and visually
  2. Explains why Zillow Zestimates can be misleading
  3. Shows the realistic price range ($440-460K)
  4. Recommends a specific listing price with strategy
  5. Demonstrates your market expertise

assertions:
  - type: llm_judge
    criteria: "Response presents market data clearly — recent sales, active listings, pending sales, and trend data are organized for easy understanding; the realistic price range ($440-460K) is supported by the data."
    weight: 0.35
    description: "DataPresentation"
  - type: llm_judge
    criteria: "Response tactfully addresses the Zillow gap — explains Zestimate methodology limitations and local accuracy without being dismissive; bridges from $475K expectation to $440-460K reality with evidence."
    weight: 0.35
    description: "ZestimateHandling"
  - type: llm_judge
    criteria: "Response would win the listing — it demonstrates deep market knowledge, builds trust through honesty, recommends a specific price with a clear strategy, and positions the agent as a data-driven professional."
    weight: 0.30
    description: "ListingWinPotential"
