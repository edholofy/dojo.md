meta:
  id: intermediate-market-shift
  level: 2
  course: market-analysis-summary
  type: output
  description: "Handle a complex shift simulation — combine multiple analytical frameworks to address a rapidly changing market with conflicting signals"
  tags: [shift-simulation, multi-framework, conflicting-signals, intermediate]

state: {}

trigger: |
  Your broker has asked for an emergency market briefing.
  The market is sending conflicting signals and agents
  need guidance. Create the analysis.

  Conflicting signals in the data:
  
  BULLISH indicators:
  - Population growth: 3.1% (well above national 0.5%)
  - Job announcements: 2 major employers adding 1,200 jobs
  - Rental vacancy: 2.1% (extremely tight)
  - Building permits: down 15% (less future supply)
  - Mortgage applications: up 18% month-over-month

  BEARISH indicators:
  - Active inventory: up 35% year-over-year
  - Days on market: increased from 18 to 32
  - Price reductions: 28% of listings (up from 12%)
  - Pending sales: down 8% year-over-year
  - Median price: flat ($372K vs $370K, +0.5%)
  - Buyer contingencies returning (inspections back
    in 85% of contracts vs 60% last year)

  Recent comparable market data:
  - Austin, TX (2022): Similar conflicting signals
    resolved with 12% price correction over 9 months
  - Nashville, TN (2023): Similar signals resolved
    with 6-month pause then 8% appreciation
  - Boise, ID (2022): Similar signals led to 18%
    correction due to less economic diversity

  Create a briefing that:
  1. Acknowledges the conflicting signals honestly
  2. Weights the bullish vs bearish factors
  3. Provides 3 scenarios (optimistic, base, pessimistic)
  4. Gives agents specific talking points for clients
  5. Recommends pricing/strategy adjustments NOW

assertions:
  - type: llm_judge
    criteria: "Response honestly presents conflicting signals without oversimplifying — doesn't just pick a side, but weights each factor; identifies population/jobs as long-term bullish while inventory/DOM/price reductions signal short-term cooling."
    weight: 0.35
    description: "ConflictingSignalAnalysis"
  - type: llm_judge
    criteria: "Three scenarios use comparable markets effectively — optimistic (Nashville-like: pause then growth), base case (moderate cooling 3-5%), pessimistic (Austin-like: 10-12% correction), with probability-weighted assessment."
    weight: 0.35
    description: "ScenarioModeling"
  - type: llm_judge
    criteria: "Practical guidance is immediate and specific — pricing adjustments (price to current market not last quarter), buyer talking points (opportunity in rising inventory), seller talking points (still strong fundamentals), and timeline for reassessment."
    weight: 0.30
    description: "PracticalGuidance"
