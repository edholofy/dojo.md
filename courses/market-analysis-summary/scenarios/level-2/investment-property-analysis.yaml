meta:
  id: investment-property-analysis
  level: 2
  course: market-analysis-summary
  type: output
  description: "Create an investment property market analysis — cap rates, cash flow projections, ROI comparisons, and market opportunity assessment"
  tags: [investment-analysis, cap-rate, cash-flow, intermediate]

state: {}

trigger: |
  An investor client wants to compare rental property
  opportunities in your market. Create a market
  analysis focused on investment metrics.

  Three target properties:

  Property A: Duplex — $285,000
  - 2 units: 2/1 each, fully occupied
  - Rent: $1,150/unit ($2,300 total monthly)
  - Operating expenses: $680/month
  - Condition: Good, needs $8K in deferred maintenance

  Property B: Single Family Rental — $225,000
  - 3/2, 1,400 sq ft, rented at $1,650/month
  - Operating expenses: $520/month
  - Condition: Updated, no immediate repairs needed

  Property C: 4-Unit Building — $520,000
  - 4 units: mix of 1/1 and 2/1
  - Rent: $4,800 total monthly (avg $1,200/unit)
  - Operating expenses: $1,850/month
  - Condition: Fair, needs $25K in capital improvements

  Market rental data:
  - Average cap rate: 6.2%
  - Rental vacancy rate: 4.8%
  - Rent growth: 5.1% annually
  - Property appreciation: 3.5% annually

  Create:
  1. Cap rate analysis for each property
  2. Cash flow projections (monthly and annual)
  3. 5-year ROI comparison (25% down payment)
  4. Risk assessment for each property
  5. Recommendation with investment strategy rationale

assertions:
  - type: llm_judge
    criteria: "Response correctly calculates cap rates, NOI, and cash flow for all three properties — using the formula (NOI/Purchase Price) for cap rate, accounting for vacancy and operating expenses."
    weight: 0.35
    description: "InvestmentCalculationAccuracy"
  - type: llm_judge
    criteria: "The 5-year ROI comparison accounts for appreciation, rent growth, mortgage paydown, and deferred maintenance costs — Property A and C need capital expenditure factored in; all use consistent assumptions."
    weight: 0.35
    description: "ROIComparisonCompleteness"
  - type: llm_judge
    criteria: "The recommendation is well-reasoned — considers the investor's risk tolerance, capital available, management complexity, and long-term wealth-building goals; doesn't just pick the highest cap rate."
    weight: 0.30
    description: "InvestmentRecommendation"
