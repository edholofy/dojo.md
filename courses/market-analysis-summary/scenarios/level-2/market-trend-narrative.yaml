meta:
  id: market-trend-narrative
  level: 2
  course: market-analysis-summary
  type: output
  description: "Write a quarterly market trend narrative — transform 12 months of data into a compelling story about where the market is heading"
  tags: [trend-narrative, quarterly-report, storytelling, intermediate]

state: {}

trigger: |
  Write a quarterly market report narrative for your
  brokerage's Q4 report using the following data:

  Quarterly trends (year-over-year):
  | Metric          | Q1    | Q2    | Q3    | Q4    |
  |-----------------|-------|-------|-------|-------|
  | Median Price    | $348K | $362K | $358K | $352K |
  | Units Sold      | 142   | 198   | 175   | 128   |
  | Avg DOM         | 32    | 18    | 22    | 34    |
  | Inventory       | 3.8mo | 1.9mo | 2.4mo | 3.6mo |
  | List/Sale Ratio | 97.8% | 100.2%| 99.1% | 97.5% |
  | New Listings    | 165   | 142   | 158   | 180   |

  Year-over-year comparison (Q4):
  - Median price: $352K vs $341K (+3.2%)
  - Units sold: 128 vs 135 (-5.2%)
  - DOM: 34 vs 28 (+21.4%)
  - Inventory: 3.6 vs 2.8 months (+28.6%)

  Macro factors:
  - Mortgage rates rose from 6.2% to 6.9% during Q4
  - Local unemployment: 3.8% (stable)
  - 2 major employers announced expansions (500+ jobs)
  - New apartment complex opening Q2 next year

  Write a 1,000-word narrative that:
  1. Tells the story of the year through data
  2. Explains Q4's cooling in context
  3. Identifies what's driving the trends
  4. Provides a Q1 forecast
  5. Offers specific advice for buyers and sellers

assertions:
  - type: llm_judge
    criteria: "Response creates a ~1,000-word narrative that tells a coherent year-long story — the spring surge, summer cooling, autumn stabilization — using data to support each chapter of the narrative."
    weight: 0.35
    description: "NarrativeCoherence"
  - type: llm_judge
    criteria: "Response contextualizes Q4's cooling — connects rising rates to buyer pullback, explains increasing inventory as seasonal + affordability-driven, and identifies the employer expansions as a counterbalancing positive signal."
    weight: 0.35
    description: "ContextualAnalysis"
  - type: llm_judge
    criteria: "The Q1 forecast and advice are data-supported — the forecast considers rate trends, employer expansion, and seasonal patterns; advice for buyers and sellers is specific and actionable based on the projected market conditions."
    weight: 0.30
    description: "ForecastAndAdvice"
