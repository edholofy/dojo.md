meta:
  id: rental-vs-buy-analysis
  level: 2
  course: market-analysis-summary
  type: output
  description: "Create a rent vs. buy market analysis — affordability comparison, break-even timelines, and local rental market conditions"
  tags: [rent-vs-buy, affordability, break-even-analysis, intermediate]

state: {}

trigger: |
  First-time buyers keep asking: "Should I rent or buy
  in this market?" Create a data-driven analysis they
  can use to make their decision.

  Current market conditions:
  - Median home price: $365,000
  - Median monthly rent (3BR): $2,150
  - Mortgage rate: 6.5% (30-year fixed)
  - Property tax rate: 1.15%
  - HOI average: $1,800/year
  - HOA (if applicable): $175/month average

  Buying scenario (median price, 10% down):
  | Cost Component      | Monthly    |
  |---------------------|------------|
  | Principal & Interest | $2,077     |
  | Property Tax         |   $350     |
  | Insurance            |   $150     |
  | PMI                  |   $165     |
  | Maintenance (est)    |   $300     |
  | Total                | $3,042     |

  Renting scenario:
  | Cost Component      | Monthly    |
  |---------------------|------------|
  | Rent                | $2,150     |
  | Renter's Insurance  |    $25     |
  | Total               | $2,175     |

  Additional factors:
  - Annual rent increase: 4.8% (last 3 years avg)
  - Home appreciation: 3.5% annually
  - Tax benefit (est): $180/month (itemized)
  - Opportunity cost of down payment: $36,500
    invested at 7% = ~$213/month
  - Average tenure in first home: 5.2 years
  - Closing costs (buying): ~$12,000
  - Closing costs (selling in 5 years): ~$22,000

  Create:
  1. Monthly cost comparison (buy vs rent)
  2. 5-year total cost analysis
  3. Break-even timeline calculation
  4. Sensitivity analysis (what if rates/prices change)
  5. Decision framework for different buyer profiles

assertions:
  - type: llm_judge
    criteria: "Response accurately compares monthly costs — buying ($3,042 gross, ~$2,862 net of tax benefit) vs renting ($2,175), showing the $687-867/month premium for buying, then factors in equity buildup and appreciation."
    weight: 0.35
    description: "CostComparisonAccuracy"
  - type: llm_judge
    criteria: "Response calculates a realistic break-even point — accounts for closing costs ($12K buy + $22K sell = $34K), rent escalation at 4.8%, equity buildup, appreciation, PMI removal, and opportunity cost of down payment."
    weight: 0.35
    description: "BreakEvenCalculation"
  - type: llm_judge
    criteria: "Decision framework is personalized — identifies profiles where buying makes sense (staying 5+ years, values stability, can afford premium) vs renting (shorter timeline, career mobility, wants flexibility), with specific thresholds."
    weight: 0.30
    description: "DecisionFramework"
