meta:
  id: absorption-rate-deep-dive
  level: 2
  course: market-analysis-summary
  type: output
  description: "Deep dive into absorption rate analysis — segment by price range, property type, and neighborhood to reveal micro-market conditions"
  tags: [absorption-rate, micro-market, segmented-analysis, intermediate]

state: {}

trigger: |
  Your overall market shows 2.8 months of inventory
  (seller's market). But a deeper look reveals very
  different conditions by segment. Analyze the data.

  Absorption by price range:
  | Price Range    | Active | Monthly Sales | Months Supply |
  |----------------|--------|---------------|---------------|
  | Under $250K    |   18   |     12        |     1.5       |
  | $250-350K      |   42   |     18        |     2.3       |
  | $350-450K      |   55   |     15        |     3.7       |
  | $450-600K      |   48   |      8        |     6.0       |
  | $600K+         |   35   |      4        |     8.8       |

  Absorption by property type:
  | Type           | Active | Monthly Sales | Months Supply |
  |----------------|--------|---------------|---------------|
  | Single Family  |  105   |     38        |     2.8       |
  | Condo/TH       |   45   |     12        |     3.8       |
  | Multi-Family   |   22   |      5        |     4.4       |
  | Land           |   26   |      2        |    13.0       |

  Absorption by neighborhood:
  | Area           | Active | Monthly Sales | Months Supply |
  |----------------|--------|---------------|---------------|
  | Riverside      |   28   |     14        |     2.0       |
  | Downtown       |   35   |      8        |     4.4       |
  | Meadowbrook    |   42   |     18        |     2.3       |
  | Cedar Hills    |   32   |     10        |     3.2       |
  | Lakeview       |   18   |      4        |     4.5       |
  | Industrial Pk  |   43   |      3        |    14.3       |

  Create a segmented market analysis that:
  1. Explains why the overall number (2.8) is
     misleading
  2. Identifies which segments are hot, balanced,
     and cold
  3. Provides strategic implications for buyers and
     sellers in each segment
  4. Visualizes the data effectively

assertions:
  - type: llm_judge
    criteria: "Response demonstrates why the 2.8 overall number masks dramatic segment differences — under $250K is extremely competitive (1.5 months) while $600K+ is a strong buyer's market (8.8 months); land market is almost frozen (13.0)."
    weight: 0.35
    description: "SegmentedInsight"
  - type: llm_judge
    criteria: "Response correctly classifies each segment — identifies hot (under $250K, Riverside), balanced ($350-450K, Cedar Hills), and cold ($600K+, land, Industrial Park) segments with appropriate strategic advice."
    weight: 0.35
    description: "SegmentClassification"
  - type: llm_judge
    criteria: "Strategic implications are specific and actionable — a seller at $450K+ should expect longer DOM and price competition; a buyer under $250K needs to be prepared for bidding wars; land sellers may need to consider alternative strategies."
    weight: 0.30
    description: "StrategicImplications"
