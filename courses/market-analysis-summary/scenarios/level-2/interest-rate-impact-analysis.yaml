meta:
  id: interest-rate-impact-analysis
  level: 2
  course: market-analysis-summary
  type: output
  description: "Analyze the impact of interest rate changes on your local market — affordability shifts, buyer behavior, and pricing implications"
  tags: [interest-rates, affordability, buyer-impact, intermediate]

state: {}

trigger: |
  Mortgage rates dropped from 7.2% to 6.1% over the
  past 3 months. Your clients are asking: "What does
  this mean for me?" Create an analysis showing the
  local market impact.

  Affordability impact at median price ($365,000):
  | Rate  | Monthly P&I | Buying Power at $2,000/mo |
  |-------|-------------|--------------------------|
  | 7.2%  | $1,985      | $368,000                 |
  | 6.8%  | $1,906      | $385,000                 |
  | 6.4%  | $1,829      | $401,000                 |
  | 6.1%  | $1,774      | $414,000                 |

  Market response (since rate drop began):
  - Mortgage applications: +28%
  - Showing activity: +35%
  - New listings: +12%
  - Days on market: decreased from 28 to 19
  - Multiple offer situations: increased from 22%
    to 41% of transactions
  - Median price: increased from $365K to $378K
  - First-time buyer percentage: increased from 26%
    to 34%

  Create:
  1. Affordability impact analysis with specific
     dollar amounts
  2. Market behavior changes documented with data
  3. Buyer and seller strategy recommendations
  4. Forward-looking scenarios (what if rates drop
     further vs. rise again)
  5. Client-ready presentation of findings

assertions:
  - type: llm_judge
    criteria: "Response clearly shows the affordability impact — $46K increase in buying power from 7.2% to 6.1%; the monthly payment savings on the median price; and how the rate drop unlocked first-time buyers (26% to 34%)."
    weight: 0.35
    description: "AffordabilityImpactClarity"
  - type: llm_judge
    criteria: "Response connects rate changes to market behavior — more applications led to more showings, which increased competition (multiple offers), which drove prices up 3.6%, partially offsetting the rate benefit."
    weight: 0.35
    description: "CausalChainAnalysis"
  - type: llm_judge
    criteria: "Forward-looking scenarios are balanced — considers both further rate drops (more competition, higher prices) and rate increases (reduced demand, price stabilization); advice is practical for both buyers and sellers."
    weight: 0.30
    description: "ScenarioPlanning"
