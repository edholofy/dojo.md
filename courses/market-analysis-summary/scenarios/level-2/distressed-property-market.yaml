meta:
  id: distressed-property-market
  level: 2
  course: market-analysis-summary
  type: output
  description: "Analyze distressed property market conditions — foreclosure trends, short sale opportunities, and REO inventory impact on neighborhood values"
  tags: [distressed-properties, foreclosure-analysis, market-impact, intermediate]

state: {}

trigger: |
  An investor client wants to understand the distressed
  property landscape. Create a comprehensive analysis
  of foreclosure and distressed property activity.

  Distressed property data (current quarter):
  | Category          | Count | % of Sales | Avg Discount |
  |-------------------|-------|------------|--------------|
  | Pre-foreclosure   |   45  |    N/A     |     N/A      |
  | Bank-owned (REO)  |   12  |    4.2%    |    -18%      |
  | Short Sales       |    8  |    2.8%    |    -12%      |
  | Auction           |    6  |    2.1%    |    -22%      |
  | Total Distressed  |   71  |    9.1%    |    -17%      |

  Trend over last 4 quarters:
  | Quarter | Pre-Foreclosure | REO | Short Sale | Auction |
  |---------|-----------------|-----|------------|---------|
  | Q1      |       28        |  6  |     5      |    3    |
  | Q2      |       32        |  8  |     6      |    4    |
  | Q3      |       38        | 10  |     7      |    5    |
  | Q4      |       45        | 12  |     8      |    6    |

  Geographic concentration:
  - Eastside neighborhoods: 42% of all distressed
  - Downtown corridor: 25% of all distressed
  - Suburban west: 18% of all distressed
  - Rural north: 15% of all distressed

  Neighborhood impact (within 0.5 miles of distressed):
  - Average value impact: -3.2% per distressed property
  - Recovery time after distressed sale: 8-14 months
  - Impact diminishes beyond 3 comparable distressed
    sales in immediate area

  Create:
  1. Distressed market trend analysis (rising/stable)
  2. Geographic concentration and neighborhood impact
  3. Investment opportunity assessment by category
  4. Risk factors for non-distressed homeowners
  5. Forecast for next 2 quarters

assertions:
  - type: llm_judge
    criteria: "Response identifies a clearly rising distressed trend — pre-foreclosures up 61% over 4 quarters (28→45), all categories increasing, and projects continued growth, not stabilization."
    weight: 0.35
    description: "DistressedTrendAnalysis"
  - type: llm_judge
    criteria: "Response analyzes geographic concentration and neighborhood impact — Eastside has 42% of distressed activity, and the -3.2% per-property value impact means clustered areas face compounding devaluation."
    weight: 0.35
    description: "GeographicImpactAnalysis"
  - type: llm_judge
    criteria: "Investment opportunity assessment is nuanced — REO offers most discount but competition; short sales take longest; auctions highest risk/reward; advice considers investor's capital, risk tolerance, and timeline."
    weight: 0.30
    description: "InvestmentOpportunityAssessment"
