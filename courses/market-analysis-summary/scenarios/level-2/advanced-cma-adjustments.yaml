meta:
  id: advanced-cma-adjustments
  level: 2
  course: market-analysis-summary
  type: output
  description: "Perform advanced CMA adjustments — handle non-standard comparables, time adjustments, and market condition modifiers"
  tags: [advanced-cma, adjustments, time-correction, intermediate]

state: {}

trigger: |
  You're preparing a CMA for a unique property that
  makes comparable selection difficult. The subject
  is a 4 bed/3 bath, 2,400 sq ft mid-century modern
  on 0.5 acres with a pool.

  Available comparables (limited — only 6 sales in
  the relevant area in 12 months):

  Comp 1: Sold 2 months ago, $485K
  - 3/2, 1,900 sq ft, ranch, 0.35 acres, no pool
  - Standard condition, conventional sale

  Comp 2: Sold 8 months ago, $510K
  - 4/2.5, 2,200 sq ft, colonial, 0.40 acres, pool
  - Updated throughout, conventional sale

  Comp 3: Sold 11 months ago, $465K
  - 4/3, 2,500 sq ft, mid-century modern, 0.45 acres
  - Dated condition, estate sale (sold as-is)

  Comp 4: Sold 4 months ago, $525K
  - 5/3.5, 2,800 sq ft, craftsman, 0.60 acres, pool
  - Excellent condition, bidding war (+$30K over ask)

  Market appreciation: 0.4% per month over past year

  Create an advanced CMA with:
  1. Time adjustments for older sales
  2. Condition and feature adjustments
  3. Sale condition adjustments (estate, bidding war)
  4. Reconciliation methodology (weighted approach)
  5. Confidence interval for the final estimate

assertions:
  - type: llm_judge
    criteria: "Response applies time adjustments to older sales using the 0.4%/month appreciation rate, makes appropriate condition adjustments for estate sale and bidding war, and adjusts for feature differences (bedrooms, sq ft, lot, pool)."
    weight: 0.35
    description: "AdvancedAdjustmentQuality"
  - type: llm_judge
    criteria: "Response uses a weighted reconciliation approach — assigns higher weight to more similar comparables (Comp 3 is the only mid-century modern) and explains the weighting rationale; provides a confidence interval."
    weight: 0.35
    description: "ReconciliationMethodology"
  - type: llm_judge
    criteria: "The final value estimate is defensible — the adjustment logic is consistent and documented; the confidence interval acknowledges the limited comparable set; an appraiser or client would find the methodology credible."
    weight: 0.30
    description: "EstimateDefensibility"
