meta:
  id: luxury-market-analysis
  level: 2
  course: market-analysis-summary
  type: output
  description: "Create a luxury market analysis — high-end property dynamics, international buyer trends, and premium pricing strategies"
  tags: [luxury-market, premium-pricing, high-end-analysis, intermediate]

state: {}

trigger: |
  A luxury listing agent needs a market analysis for
  the $800K+ segment. This market behaves very
  differently from the general market. Create the
  analysis.

  Luxury segment data ($800K+):
  | Metric              | Current    | Year Ago   | Change   |
  |---------------------|------------|------------|----------|
  | Active Listings     | 42         | 35         | +20.0%   |
  | Closed Sales (Q)    | 18         | 22         | -18.2%   |
  | Median Price        | $1,050,000 | $985,000   | +6.6%    |
  | Avg DOM             | 78         | 52         | +50.0%   |
  | List/Sale Ratio     | 94.2%      | 96.8%      | -2.6pts  |
  | Months Supply       | 7.0        | 4.8        | +45.8%   |

  Price tier breakdown within luxury:
  | Tier           | Active | Sold (Q) | Avg DOM | L/S Ratio |
  |----------------|--------|----------|---------|-----------|
  | $800K-$1M      |   15   |    10    |   45    |   96.1%   |
  | $1M-$1.5M      |   14   |     5    |   82    |   93.8%   |
  | $1.5M-$2M      |    8   |     2    |  115    |   91.2%   |
  | $2M+           |    5   |     1    |  180    |   88.5%   |

  Luxury buyer profile shifts:
  - Cash purchases: 38% (up from 30%)
  - Out-of-state buyers: 22% (up from 15%)
  - Average buyer age: 52 (down from 58)
  - Most requested: home office, outdoor living,
    multi-generational suites, EV charging

  Create:
  1. Luxury market conditions assessment
  2. Sub-tier analysis showing different dynamics
  3. Buyer profile and demand trends
  4. Pricing strategy for new luxury listings
  5. Marketing recommendations for this segment

assertions:
  - type: llm_judge
    criteria: "Response identifies the luxury market as shifting to buyer's market (7.0 months supply) with dramatically longer DOM at higher price points — 45 days at $800K-$1M vs 180 days at $2M+ — showing the market isn't monolithic."
    weight: 0.35
    description: "LuxuryMarketDiagnostics"
  - type: llm_judge
    criteria: "Response analyzes buyer profile shifts meaningfully — younger buyers (52 vs 58), more cash purchases (38%), more out-of-state buyers (22%), and lifestyle feature demands indicate a market transition that affects marketing strategy."
    weight: 0.35
    description: "BuyerProfileAnalysis"
  - type: llm_judge
    criteria: "Pricing and marketing recommendations are luxury-appropriate — advises aggressive pricing in $1.5M+ tiers given 91-88% L/S ratios and 115-180 DOM, with targeted marketing toward cash buyers, out-of-state purchasers, and lifestyle-driven messaging."
    weight: 0.30
    description: "LuxuryStrategyRecommendations"
