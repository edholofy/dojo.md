meta:
  id: new-construction-market-impact
  level: 2
  course: market-analysis-summary
  type: output
  description: "Analyze the impact of new construction on existing home values — supply dynamics, price competition, and neighborhood effects"
  tags: [new-construction, supply-impact, competitive-analysis, intermediate]

state: {}

trigger: |
  A large builder is developing 250 new homes in
  three phases over 3 years in your market. Existing
  homeowners are concerned about the impact on their
  property values. Create an analysis.

  New development: "Summit Ridge"
  - Phase 1 (now): 80 homes, $340-420K, 3-4 bedrooms
  - Phase 2 (Year 2): 90 homes, $380-460K, 4-5 bedrooms
  - Phase 3 (Year 3): 80 homes, $420-520K, premium lots

  Current market context:
  - Existing median price in area: $375,000
  - Annual demand: ~400 home sales in the area
  - Current inventory: 2.4 months
  - Population growth: 2.8% annually
  - New household formation: ~120/year

  Comparable developments in other areas:
  - "Oak Park": 200 homes built 2019-2022
    Result: Existing home prices increased 8% faster
    than areas without new construction
  - "River Bend": 300 homes built 2018-2021
    Result: Initial 3% price softening in year 1,
    then 12% appreciation over 3 years
  - "Pine Valley": 150 homes built 2020-2022
    Result: Oversupply, 5% price decline for existing
    homes within 1 mile

  Create:
  1. Supply/demand impact analysis
  2. Price impact projection (3-year model)
  3. Comparison to similar developments elsewhere
  4. Risk factors and mitigants
  5. Recommendations for existing homeowners

assertions:
  - type: llm_judge
    criteria: "Response creates a thorough supply/demand analysis — 250 new homes over 3 years against 400 annual sales and 120 new households shows the development can be absorbed, and the projection accounts for population growth."
    weight: 0.35
    description: "SupplyDemandAnalysis"
  - type: llm_judge
    criteria: "Response uses comparable development data effectively — references Oak Park (positive), River Bend (initially negative then positive), and Pine Valley (negative) to create a realistic projection with multiple scenarios."
    weight: 0.35
    description: "ComparableDevelopmentAnalysis"
  - type: llm_judge
    criteria: "Recommendations for existing homeowners are practical and calming — addresses their concern honestly, identifies short-term risks (price competition in Phase 1) and long-term benefits (improved amenities, higher demand area), with specific advice."
    weight: 0.30
    description: "HomeownerRecommendations"
