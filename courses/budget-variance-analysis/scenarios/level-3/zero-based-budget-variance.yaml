meta:
  id: zero-based-budget-variance
  level: 3
  course: budget-variance-analysis
  type: output
  description: "Implement zero-based budget variance analysis — design a ZBB-specific variance framework that evaluates spending against justified baselines rather than historical budgets"
  tags: [zero-based-budgeting, zbb, cost-optimization, advanced]

state: {}

trigger: |
  A consumer goods company ($2B revenue) is
  implementing zero-based budgeting for all SG&A
  expenses. Design the ZBB-specific variance
  analysis framework.

  CONTEXT:
  - SG&A is $600M annually (30% of revenue)
  - Previous budgets were "last year + inflation"
  - CEO wants 500 basis points of SG&A margin
    improvement over 3 years
  - ZBB has been implemented for Q1 2026 across
    all functions
  - Finance, HR, IT, Legal, Marketing, and Sales
    are all in scope
  - Every dollar must be justified against a
    "decision package" with a specific business
    case

  ZBB Q1 2026 RESULTS:

  Marketing ($45M annual ZBB budget, $11.25M Q1):
  - Approved packages: Brand advertising $4.5M,
    Digital marketing $3.2M, Trade promotions $2.5M,
    Market research $0.6M, Marketing ops $0.45M
  - Q1 Actual: $12.1M (+$850K over ZBB budget)
  - Overages: Brand +$200K (agency fees), Digital
    +$350K (performance marketing), Trade +$400K
    (retailer demands), Research -$100K

  IT ($32M annual ZBB budget, $8M Q1):
  - Approved packages: Infrastructure $3.2M,
    Applications $2.8M, Security $1.2M, Help desk
    $0.8M
  - Q1 Actual: $8.6M (+$600K over ZBB budget)
  - Overages: Security +$450K (incident response),
    Infrastructure +$200K, Help desk -$50K

  Design:
  1. ZBB variance analysis methodology
  2. Decision package variance tracking
  3. "Cost creep" detection framework
  4. Accountability and escalation process
  5. Quarterly ZBB review process
  6. Write a Q1 ZBB variance report (400 words)

assertions:
  - type: llm_judge
    criteria: "ZBB variance methodology differs meaningfully from traditional variance analysis — the framework recognizes that ZBB variances are fundamentally different from traditional budget variances: in ZBB, every dollar was justified through a decision package — a variance against a ZBB budget means spending occurred WITHOUT explicit business case approval (or the business case was wrong); the methodology classifies ZBB variances into 4 categories: (1) Approved Package Overage — the activity was approved but cost more than the decision package estimated (e.g., Marketing agency fees $200K over — was the estimate wrong or did scope creep?); (2) Unapproved Spending — spending on activities NOT in any approved decision package (this is the most concerning category in ZBB); (3) Package Reallocation — spending shifted between approved packages (trade promotions pulled from brand budget) — acceptable if approved by the package owner; (4) External Shock — spending driven by events outside management control (e.g., IT security incident response $450K); each category triggers a different response: Approved Overages require revised estimates and explanation; Unapproved Spending requires immediate escalation to the cost center owner and CFO; Reallocations require documentation; External Shocks require a supplemental decision package."
    weight: 0.35
    description: "ZBBVarianceMethodology"
  - type: llm_judge
    criteria: "Cost creep detection framework addresses the primary ZBB failure mode — cost creep is the gradual return to pre-ZBB spending levels, which is the number one reason ZBB implementations fail; the detection framework: (1) Monthly run-rate monitoring: compare each function's monthly spending rate to the ZBB-approved annual budget ÷ 12; flag if the run rate exceeds the ZBB rate by more than 10% for 2 consecutive months; (2) Decision package tracking: every approved package has a budgeted amount and timeline; packages that are completed should show reduced spending — if the spending continues after the package is 'done,' that's cost creep; (3) Incremental headcount monitoring: ZBB approved specific headcounts by function; any addition must go through a new decision package; unapproved headcount additions are the fastest path to SG&A creep; (4) Vendor proliferation tracking: ZBB consolidates vendors; if the vendor count increases, new spending is likely occurring outside approved packages; (5) Quarter-over-quarter trend: if Q2 spending exceeds Q1 without new approved packages, cost creep is occurring; the framework creates an 'SG&A Cost Creep Score' for each function that the CFO reviews monthly — a single metric that summarizes whether the function is maintaining ZBB discipline."
    weight: 0.35
    description: "CostCreepDetection"
  - type: llm_judge
    criteria: "Q1 ZBB variance report is specific and maintains ZBB discipline — the 400-word report: analyzes Marketing ($850K over) and IT ($600K over) against their ZBB decision packages; for Marketing: Brand advertising +$200K is an Approved Package Overage (agency negotiation needs improvement — the package underestimated agency fees); Digital marketing +$350K needs scrutiny: was this approved incremental spend for performance marketing that showed positive ROI, or unauthorized scope expansion? If the ROAS (return on ad spend) justifies it, a supplemental package should be approved retroactively; Trade promotions +$400K is classified as External Shock/Market Response (retailers demanded higher promotional spending as a condition of shelf placement — this needs strategic discussion, not just variance explanation); for IT: Security +$450K is External Shock (incident response to a cybersecurity event — a supplemental decision package should be created retroactively with full documentation); Infrastructure +$200K needs investigation: is this cost creep or a legitimate need that the original package underestimated?; the report's tone maintains ZBB discipline: every dollar above the approved package is treated as requiring justification, not simply 'explained'; the $1.45M combined Q1 overage represents a 3.8% annualized increase in SG&A — which would consume 38% of the CEO's 500-basis-point improvement target; the report recommends: tighter agency fee controls, retroactive decision packages for justified overages, and a process improvement for trade promotion budgeting."
    weight: 0.30
    description: "Q1ZBBReport"
