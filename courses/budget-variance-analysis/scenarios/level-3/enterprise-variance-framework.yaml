meta:
  id: enterprise-variance-framework
  level: 3
  course: budget-variance-analysis
  type: output
  description: "Design an enterprise-wide variance analysis framework — establish standards for variance reporting, investigation, and corrective action across a multi-segment organization"
  tags: [enterprise-framework, standards, multi-segment, advanced]

state: {}

trigger: |
  The CFO of a $3B diversified industrial company
  has asked you to redesign the variance analysis
  framework. The current process is inconsistent
  across the 5 business segments and takes too long.

  CURRENT PROBLEMS:
  - Each segment defines "material variance"
    differently (ranging from 3% to 15%)
  - Variance reports arrive between Day 8 and Day 18
    of close (CFO wants all by Day 7)
  - Commentary quality ranges from "Revenue was
    below budget" to detailed driver analysis
  - No standard root cause categories
  - No corrective action tracking
  - Board gets a 40-page variance package that takes
    2 hours to review
  - The CFO spends 3 days per month reconciling
    conflicting variance explanations from segments

  COMPANY PROFILE:
  - 5 segments: Aerospace ($800M), Automotive ($700M),
    Industrial ($600M), Energy ($500M), Healthcare
    ($400M)
  - 120 finance professionals involved in variance
    reporting
  - SAP ERP across all segments
  - Quarterly board presentations
  - Annual budget process (top-down/bottom-up hybrid)

  Design:
  1. Standardized variance framework
  2. Materiality thresholds by segment
  3. Variance commentary standards
  4. Root cause taxonomy and corrective action process
  5. Reporting timeline and deliverables
  6. Board-level reporting redesign

assertions:
  - type: llm_judge
    criteria: "The framework establishes standardized yet appropriately scaled variance analysis — the framework applies consistent principles across all 5 segments while scaling thresholds appropriately: materiality thresholds scaled by segment revenue: Aerospace ($800M): $2M or 5% (whichever is lower for each line item); Automotive ($700M): $1.75M or 5%; Industrial ($600M): $1.5M or 5%; Energy ($500M): $1.25M or 5%; Healthcare ($400M): $1M or 5%; the thresholds use both dollar AND percentage criteria (dual gate) to catch both large-dollar variances in big lines and significant-percentage variances in smaller lines; the framework establishes 3 investigation tiers: Tier 1 (Commentary Only): variances below threshold — noted in the summary table, no commentary required; Tier 2 (Standard Investigation): variances exceeding one threshold — 2-3 sentence commentary with driver identification; Tier 3 (Deep Investigation): variances exceeding both thresholds OR trending unfavorable for 3+ months — full root cause analysis with corrective action plan required; the framework addresses the current inconsistency by providing a single standard that all 120 finance professionals follow."
    weight: 0.35
    description: "StandardizedFramework"
  - type: llm_judge
    criteria: "Commentary standards and root cause taxonomy eliminate the quality gap — commentary standards mandate the 'WHAT-WHY-SO WHAT' structure: WHAT (the variance amount and affected line item), WHY (the business driver — not 'revenue was below budget' but 'Aerospace revenue was $2.3M below budget due to delayed delivery of 3 aircraft units to Boeing, representing $1.8M of the shortfall, with the remainder from lower aftermarket parts volume'), SO WHAT (is this timing or permanent? what's the forward impact? what action is being taken?); root cause taxonomy provides standardized categories: Volume/Demand (customer orders, market conditions, competitive losses), Price/Rate (selling price changes, input cost changes, FX), Mix (product mix, customer mix, channel mix), Timing (revenue recognition timing, cost phasing, delivery schedules), Efficiency (productivity, yield, utilization), One-Time/Non-Recurring (restructuring, legal, asset write-offs), Budget Error (incorrect assumptions in original budget); each variance must be tagged with a root cause category from this taxonomy — this enables trend analysis across segments and over time (e.g., are all segments experiencing price pressure? is volume weakness concentrated or systemic?)."
    weight: 0.35
    description: "CommentaryAndTaxonomy"
  - type: llm_judge
    criteria: "Reporting timeline and board package redesign address the CFO's core concerns — the reporting timeline: Day 1-3: segment finance teams prepare preliminary variance data and flag Tier 2/3 items; Day 4-5: segment controllers review and approve commentary, enter root cause codes; Day 6: corporate FP&A consolidates all segments, identifies cross-segment themes, prepares the board package; Day 7: CFO review and approval of consolidated variance report; this timeline requires: SAP automated variance extraction (no manual spreadsheets), pre-populated templates, and a 'no surprises' policy where segment controllers flag material variances verbally on Day 2; the board package is redesigned from 40 pages to a maximum of 10: Page 1 — Executive Dashboard (company-wide P&L with traffic lights); Pages 2-6 — One page per segment (key metrics, top 3 variances, corrective actions); Pages 7-8 — Cross-segment themes and trends (root cause analysis across segments); Pages 9-10 — Full-year outlook and reforecast implications; supporting detail is available in an appendix but NOT presented to the board unless requested; the redesign reduces the board review from 2 hours to 30-45 minutes by focusing on decisions and actions, not data."
    weight: 0.30
    description: "TimelineAndBoardRedesign"
