meta:
  id: acquisition-variance-integration
  level: 3
  course: budget-variance-analysis
  type: output
  description: "Manage variance analysis through an acquisition — integrate an acquired company's results into the variance framework, separate organic from inorganic performance"
  tags: [acquisition, organic-inorganic, integration, advanced]

state: {}

trigger: |
  Your company ($1.5B revenue) acquired a $200M
  revenue company on February 1, 2026. You need
  to redesign the variance framework to incorporate
  the acquisition.

  PRE-ACQUISITION BUDGET (2026, parent only):
  Revenue: $1,500,000,000
  EBITDA: $225,000,000 (15% margin)

  ACQUIRED COMPANY (at acquisition):
  Revenue run rate: $200M annually
  EBITDA run rate: $20M (10% margin)
  Deal closed: February 1, 2026

  REVISED COMBINED BUDGET (Feb-Dec):
  Revenue: Original $1,500M + 11 months acquired
    ($183M) = $1,683M
  EBITDA: Original $225M + acquired $18.3M -
    integration costs $8M = $235.3M

  Q1 ACTUAL RESULTS:
  Parent organic: Revenue $372M, EBITDA $56M
  Acquired (Feb-Mar only): Revenue $38M, EBITDA $2.5M
  Integration costs: $3.2M
  Total: Revenue $410M, EBITDA $55.3M

  Q1 BUDGET:
  Parent organic: Revenue $375M, EBITDA $56.3M
  Acquired (Feb-Mar): Revenue $36.7M, EBITDA $3.3M
  Integration costs: $2M
  Total: Revenue $411.7M, EBITDA $57.6M

  COMPLEXITY FACTORS:
  - The acquired company used different cost
    categories
  - Purchase price allocation added $12M annual
    intangible amortization
  - 3 months of synergy targets start Q3
  - The board wants to see organic vs. inorganic
    performance separately

  Design:
  1. Organic/inorganic variance reporting framework
  2. Synergy tracking methodology
  3. Integration cost variance analysis
  4. Board-level variance presentation approach
  5. Write a 350-word Q1 combined variance report

assertions:
  - type: llm_judge
    criteria: "Organic/inorganic reporting framework correctly separates performance — the framework establishes a 'waterfall' approach to variance reporting: (1) Organic Variance (parent company only, apples-to-apples): Parent Q1 Revenue: $372M vs. $375M budget = -$3M U (0.8%); Parent Q1 EBITDA: $56M vs. $56.3M = -$0.3M U (0.5%); this is the primary measure of underlying business performance; (2) Inorganic Contribution (acquired company): Acquired Q1 Revenue: $38M vs. $36.7M budget = +$1.3M F (3.5%); Acquired Q1 EBITDA: $2.5M vs. $3.3M budget = -$0.8M U (24.2%); the revenue outperformance but EBITDA underperformance suggests the acquired company has higher costs than modeled — either operational issues or incomplete cost structure understanding at acquisition; (3) Integration Costs: $3.2M vs. $2M budget = -$1.2M U (60%); integration is running hot — needs investigation; (4) Combined: Revenue $410M vs. $411.7M = -$1.7M U; EBITDA $55.3M vs. $57.6M = -$2.3M U; the waterfall shows that organic performance is nearly on plan, but the acquisition is underperforming on profitability and integration costs are elevated."
    weight: 0.35
    description: "OrganicInorganicFramework"
  - type: llm_judge
    criteria: "Synergy tracking methodology is specific and measurable — the synergy tracking framework: synergies start Q3 with an annual run-rate target; the methodology tracks synergies in 4 categories: (1) Revenue synergies (cross-selling, new market access) — tracked as incremental revenue attributable to the combination (requires specific deal tagging in CRM); (2) Cost synergies (duplicate function elimination, procurement savings) — tracked against a baseline of combined standalone costs; (3) Operational synergies (facility consolidation, system integration) — tracked as headcount and facility cost reductions against a mapped org chart; (4) Financial synergies (tax optimization, working capital improvement) — tracked by treasury and tax; for each synergy, the tracker records: planned timing, planned annual value, actual achievement date, actual value, and confidence level; the framework addresses the accounting complexity: PPA amortization ($12M annually) is excluded from 'operating' EBITDA for variance analysis but included in GAAP reporting; the board sees both views; integration cost variance is tracked separately from synergies — overspending on integration is acceptable if it accelerates synergy capture."
    weight: 0.35
    description: "SynergyTracking"
  - type: llm_judge
    criteria: "The 350-word Q1 combined report tells a clear story — the report: (1) opens with the combined headline (EBITDA of $55.3M, -$2.3M or 4% below combined budget); (2) immediately separates organic from inorganic: the parent business is essentially on plan (EBITDA -$0.3M or 0.5% below, revenue -$3M or 0.8% below); the acquired company contributed $38M revenue (above the $36.7M budget) but only $2.5M EBITDA vs. $3.3M budget — the revenue is coming in but the margins are not; integration costs of $3.2M vs. $2M budget are $1.2M over — the additional spend is attributed to [specific factors: IT integration complexity, retention bonuses, facility integration delays]; (3) identifies the key risk: the acquired company's 6.6% EBITDA margin (vs. 10% at acquisition) needs immediate investigation — is this a structural margin issue, integration disruption, or seasonality in the acquired business?; (4) looks forward: Q3 synergy targets require that the acquired company's operations be stabilized by Q2 — the current margin underperformance raises questions about synergy achievability; (5) recommends: a deep-dive integration review with the integration management office, a revised margin forecast for the acquired company, and potentially rebasing the integration cost budget; the board-level presentation approach shows the waterfall: organic performance, inorganic contribution, integration costs, and combined result — making it clear that the parent business is healthy and the variance is concentrated in the acquisition."
    weight: 0.30
    description: "CombinedReport"
