meta:
  id: advanced-variance-shift
  level: 3
  course: budget-variance-analysis
  type: output
  description: "Advanced shift simulation — manage variance analysis through a major event: prepare the quarterly close variance package while handling a profit warning, a budget holder revolt, and an M&A variance integration"
  tags: [shift-simulation, profit-warning, multi-crisis, advanced]

state: {}

trigger: |
  It's the last week of Q1 close and three
  variance-related crises are happening
  simultaneously.

  TASK 1 — PROFIT WARNING ANALYSIS (urgent)
  The CEO has just been briefed that Q1 EBITDA will
  miss guidance by 15-20%. She needs a 1-page
  variance bridge to prepare for the board call
  tonight.

  Q1 Results:
  - Revenue: $82M vs. $92M guidance (-$10M, 10.9%)
  - Gross Margin: 42% vs. 46% guidance (-4 pts)
  - EBITDA: $8.2M vs. $10M guidance midpoint
    (-$1.8M, 18%)

  Key drivers:
  - Customer A delayed $4M contract to Q2
  - Commodity costs spiked 8% above forecast
  - FX headwind of $1.5M (EUR depreciation)
  - R&D costs $800K above plan (accelerated project)

  Prepare the EBITDA bridge (200 words).

  TASK 2 — BUDGET HOLDER PUSHBACK (angry email)
  The VP of Operations sent this to the CFO:

  "The variance report says my department is $2.3M
  over budget. That's because the budget was set
  using last year's volumes, but we processed 25%
  more units this quarter. Of course my costs are
  higher. Your report makes me look incompetent
  when I've actually been more efficient. Fix this."

  The CFO asks you to respond. Prepare a flexible
  budget analysis and a 150-word response.

  Operations data:
  - Budget: 1,000,000 units at $12.00/unit = $12.0M
  - Actual: 1,250,000 units at $11.44/unit = $14.3M
  - Static budget variance: $2.3M unfavorable

  TASK 3 — ACQUISITION FIRST-MONTH VARIANCE
  The company closed an acquisition on March 1.
  The first month of combined results is in and the
  integration costs are higher than planned.

  Acquired company (March only):
  - Revenue: $5.2M vs. $4.8M integration model
  - EBITDA: $0.3M vs. $0.8M integration model
  - Integration costs: $1.2M vs. $0.5M budget

  Write a 150-word first-month integration variance
  note.

  Handle all three tasks.

assertions:
  - type: llm_judge
    criteria: "EBITDA bridge for the profit warning is clear and board-ready — the bridge walks from $10M guidance midpoint to $8.2M actual in a logical sequence: $10.0M guidance → Customer A contract delay -$4.0M revenue impact → at ~46% margin = -$1.84M EBITDA → Commodity cost spike -$0.8M to -$1.0M EBITDA → FX headwind -$1.5M revenue → at margin ~$0.6M EBITDA → R&D acceleration -$0.8M → partial offsets from other favorable items → $8.2M actual; the bridge reconciles (the components sum to approximately -$1.8M); the 200-word narrative: (1) frames the miss as primarily timing-driven (the $4M contract delay represents 40% of the revenue shortfall and is expected in Q2), (2) separates controllable from non-controllable (FX and commodities are non-controllable; R&D was a deliberate acceleration), (3) provides the CEO with talking points for the board: 'Q1 missed guidance by 18% on EBITDA, primarily due to one large contract deferral and external cost headwinds; the underlying business trajectory remains on track with the contract expected in Q2'; the bridge is board-ready: clean, quantified, and honest without being alarmist."
    weight: 0.35
    description: "ProfitWarningBridge"
  - type: llm_judge
    criteria: "Flexible budget analysis validates the VP's point and the response is diplomatic — the flexible budget analysis: Flexible budget for 1,250,000 units = 1,250,000 × $12.00 = $15.0M; Flexible budget variance (actual vs. flexible): $14.3M - $15.0M = -$700K FAVORABLE; Volume variance (flexible vs. static): $15.0M - $12.0M = +$3.0M UNFAVORABLE (but this is simply the cost of processing 25% more volume — a good thing if revenue grew proportionally); the VP is correct: the $2.3M static budget variance is misleading; the operations team is actually $700K FAVORABLE on a flexible budget basis because they achieved a lower cost per unit ($11.44 vs. $12.00 = $0.56 savings per unit, a 4.7% efficiency improvement); the 150-word response: acknowledges the VP's valid concern, presents the flexible budget analysis showing the department is $700K favorable when adjusted for volume, commits to presenting the flexible budget view in future reports (with the static budget view for reference), and thanks the VP for flagging the issue — this is exactly the kind of feedback that improves the variance process; the tone is respectful and collaborative — the analyst admits the reporting was misleading and proposes to fix it."
    weight: 0.35
    description: "FlexibleBudgetResponse"
  - type: llm_judge
    criteria: "Acquisition first-month variance note is appropriately cautious — the 150-word note: (1) presents the acquired company's first month: revenue was $400K above the integration model (8.3% favorable — a positive signal about the business), but EBITDA was $500K below model ($0.3M vs. $0.8M — a 62.5% miss); (2) identifies the integration cost overrun as the primary EBITDA driver: $1.2M vs. $0.5M budgeted = $700K over (140%); the $700K explains the entire EBITDA shortfall and then some; (3) correctly cautions that one month is too early to draw conclusions about the acquired company's run-rate profitability — March may include transaction-related costs that should be classified as integration rather than ongoing operations; (4) recommends: detailed classification of the $1.2M integration costs (which are one-time vs. which may recur), and a revised integration cost budget for Q2 based on March experience; all three tasks demonstrate the ability to produce variance analysis under pressure with different levels of urgency and different stakeholder needs."
    weight: 0.30
    description: "AcquisitionVarianceNote"
