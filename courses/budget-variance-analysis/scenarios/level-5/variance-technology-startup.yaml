meta:
  id: variance-technology-startup
  level: 5
  course: budget-variance-analysis
  type: output
  description: "Write a Series A pitch for a variance analytics startup — create a comprehensive investment narrative for an AI-powered platform that transforms how organizations perform budget variance analysis"
  tags: [startup, series-a, investment, master]

state: {}

trigger: |
  You are the founder/CEO of "VarianceIQ" — an
  AI-powered variance analytics platform. You are
  preparing for your Series A fundraise.

  COMPANY BACKGROUND:
  - Founded 18 months ago by you (ex-VP FP&A at
    Fortune 500) and a CTO (ex-Google ML engineer)
  - Seed round: $3M from FP&A angels and a fintech
    fund
  - Product: AI platform that connects to ERP/GL
    systems, automatically detects anomalies,
    generates root cause hypotheses, and produces
    natural language variance commentary
  - Current traction: 35 paying customers,
    $1.2M ARR, 140% net revenue retention
  - Customers range from $50M to $5B in revenue
  - Average deal: $35K ACV, expanding to $55K in
    Year 2
  - Key differentiation: pre-trained on millions of
    financial variance patterns from anonymized data

  FUNDRAISE:
  - Target: $15M Series A
  - Use of proceeds: expand engineering (AI/ML team),
    build enterprise sales team, launch 3 new
    industry verticals
  - Target investors: B2B SaaS-focused VCs with
    fintech or enterprise software experience

  Write a 3,000-word investment memo covering:
  1. Executive summary
  2. Problem and market opportunity
  3. Product and technology
  4. Business model and unit economics
  5. Competitive landscape
  6. Team
  7. Financial projections and use of proceeds
  8. Key risks and mitigants

assertions:
  - type: llm_judge
    criteria: "The investment memo presents a compelling problem-market-product narrative — the problem section quantifies the pain: FP&A teams spend 75% of their time on data gathering and variance calculation, and only 25% on insight generation; the average company takes 10+ business days from month-end to variance report; manual variance commentary is inconsistent, shallow, and often wrong; the $50B+ EPM market is dominated by planning tools (Anaplan, Adaptive) that help CREATE budgets but don't help ANALYZE variances — VarianceIQ fills the 'last mile' gap; the market opportunity: TAM of $8B (all organizations with ERP systems that do budget variance analysis), SAM of $2B (mid-market and enterprise in English-speaking markets), SOM of $200M (initial target verticals: manufacturing, healthcare, retail); the product section explains the technology clearly: (1) Data Integration Layer: pre-built connectors to SAP, Oracle, NetSuite, Sage, QuickBooks — automated GL data extraction and normalization; (2) Anomaly Detection Engine: ML models trained on millions of variance patterns that flag unusual variances before humans notice them; (3) Root Cause Hypothesis Generator: AI that suggests probable causes based on pattern matching, seasonal analysis, and correlation with operational data; (4) NLG Commentary Engine: generates first-draft variance commentary that analysts review and refine — reducing commentary time by 70%."
    weight: 0.35
    description: "ProblemMarketProduct"
  - type: llm_judge
    criteria: "The business model, unit economics, and competitive analysis demonstrate investment readiness — business model: annual SaaS subscriptions priced by number of cost centers/entities analyzed; land with 1-2 business units at $35K ACV, expand to enterprise-wide at $80-150K; professional services for implementation (15% of revenue, declining as product matures); unit economics: CAC $45K (blended), LTV $175K (based on 5-year lifetime, 140% NRR, 85% gross margin), LTV/CAC of 3.9x; payback period: 14 months; gross margin: 82% (cloud infrastructure + data processing costs); competitive landscape mapped on a 2x2 matrix (breadth of EPM functionality vs. depth of variance analytics): Anaplan/Adaptive (broad EPM, shallow variance), legacy BI tools like Tableau/Power BI (visualization without financial intelligence), point solutions like Vena/DataRails (moderate on both axes), VarianceIQ (narrow focus, deepest variance analytics); moat: the proprietary variance pattern database grows with every customer (network effect without data sharing — each customer's patterns improve the model's ability to recognize anomalies for all customers); team section highlights the complementary founder backgrounds and key hires (Head of ML, VP Sales, VP Customer Success)."
    weight: 0.35
    description: "BusinessModelAndCompetition"
  - type: llm_judge
    criteria: "Financial projections and risk analysis are credible and investor-appropriate — 3-year projections: Year 1 (current): $1.2M ARR, 35 customers, -$2.5M net burn; Year 2: $4.5M ARR (3.8x growth), 95 customers, -$4M net burn (investing ahead of revenue); Year 3: $12M ARR (2.7x growth), 200 customers, approaching cash flow break-even; key assumptions stated: 60 net new customers in Year 2 (5/month), ACV growth from $35K to $45K (product expansion), NRR maintained at 130%+ (conservative from current 140%), sales team scaling from 2 to 8 AEs; use of proceeds: Engineering 45% ($6.75M — expand ML team from 4 to 12, build industry-specific models for healthcare, manufacturing, retail), Sales & Marketing 35% ($5.25M — build enterprise sales team, content marketing, conference presence), G&A 10% ($1.5M — SOC 2 Type II, legal, finance), Reserve 10% ($1.5M — runway buffer); key risks and mitigants: (1) Platform risk — EPM vendors add AI variance features; mitigant: depth of focus vs. breadth of platform, plus switching costs once integrated; (2) Data sensitivity — customers nervous about financial data in cloud; mitigant: SOC 2 certification, on-premise deployment option, data anonymization architecture; (3) AI accuracy — incorrect variance explanations erode trust; mitigant: human-in-the-loop design (AI suggests, analyst confirms), accuracy metrics published to customers; (4) Sales cycle length — enterprise deals take 6-9 months; mitigant: land-and-expand model starts with departmental sale requiring only VP-level approval; the memo is approximately 3,000 words."
    weight: 0.30
    description: "FinancialsAndRisks"
