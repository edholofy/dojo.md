meta:
  id: global-budgeting-standards
  level: 5
  course: budget-variance-analysis
  type: output
  description: "Propose global management accounting standards for budgeting and variance analysis — develop an international framework that establishes best practices for performance management"
  tags: [global-standards, management-accounting, international, master]

state: {}

trigger: |
  CIMA (Chartered Institute of Management
  Accountants) has commissioned you to draft a
  Global Management Accounting Practice (GMAP)
  guideline on "Budgeting, Forecasting, and
  Variance Analysis."

  CONTEXT:
  - CIMA's existing GMAPs cover strategy, risk,
    and decision-making but not operational
    performance management
  - No global standard exists for budgeting and
    variance analysis practices
  - Management accounting practices vary enormously:
    some organizations use AI-driven rolling
    forecasts; others rely on annual spreadsheet
    budgets
  - The standard should be applicable to
    organizations of all sizes and industries
  - It should be principles-based (not prescriptive)

  WORKING GROUP:
  - 20 members from 15 countries
  - Mix of corporate CFOs, consultants, academics,
    and professional body representatives
  - Must achieve consensus while being meaningful

  Produce:
  1. The GMAP guideline (core principles, application
     guidance)
  2. Maturity model for self-assessment
  3. Implementation guide for organizations at
     different maturity levels
  4. Basis for conclusions

assertions:
  - type: llm_judge
    criteria: "The GMAP guideline establishes universally applicable principles for budgeting and variance analysis — the guideline proposes 8-10 core principles: (1) Purpose Alignment: budgeting and variance processes should serve the organization's strategic objectives, not become ends in themselves; (2) Driver Focus: budgets should be built from operational drivers (not financial line items) and variance analysis should explain driver-level performance; (3) Timeliness: performance information should be available quickly enough to influence decisions — a variance identified a month after it occurred has limited value; (4) Proportionality: the depth of variance investigation should be proportional to the materiality and controllability of the variance; (5) Forward Orientation: variance analysis should focus on future implications, not just historical explanations; (6) Continuous Improvement: variance patterns should feed back into better budgets, forecasts, and operational processes; (7) Behavioral Awareness: the budgeting and variance process should be designed to encourage honest reporting and learning, not blame avoidance or gaming; (8) Technology Enablement: organizations should leverage appropriate technology to automate routine calculations and enable analytical focus; each principle includes application guidance explaining how it applies in different organizational contexts (large/small, manufacturing/service, public/private)."
    weight: 0.35
    description: "CorePrinciples"
  - type: llm_judge
    criteria: "The maturity model provides a practical self-assessment tool — the maturity model has 5 levels across the 8 principles: Level 1 (Basic): annual budget, static variance reporting, no formal investigation process, spreadsheet-based; Level 2 (Developing): budget with quarterly reforecasts, basic variance commentary standards, some driver identification, basic EPM tool; Level 3 (Established): rolling forecasts, driver-based budgeting, standardized variance investigation with root cause taxonomy, automated variance reporting, corrective action tracking; Level 4 (Advanced): continuous forecasting, predictive variance analysis, AI-augmented investigation, cross-functional performance intelligence, behavioral awareness in process design; Level 5 (Leading): fully integrated performance intelligence platform, real-time driver monitoring with predictive alerts, organizational learning from variance patterns embedded in culture, variance analysis as a strategic asset rather than a compliance process; for each level, the model specifies: typical practices, technology requirements, organizational capabilities, and specific improvement actions to advance to the next level; the model allows organizations to assess their current level honestly and create a realistic improvement roadmap — most organizations are at Level 1-2, and reaching Level 3 would be a significant achievement."
    weight: 0.35
    description: "MaturityModel"
  - type: llm_judge
    criteria: "Implementation guide and basis for conclusions demonstrate practical wisdom — the implementation guide provides specific roadmaps for organizations at different starting points: For Level 1 organizations (moving to Level 2): priority actions are implementing a standard variance commentary template, establishing investigation thresholds, and introducing a quarterly reforecast cycle; estimated timeline: 6-12 months; investment: minimal (process change, not technology); For Level 2 organizations (moving to Level 3): priority actions are implementing driver-based budgeting, deploying an EPM tool, creating a root cause taxonomy, and establishing corrective action tracking; estimated timeline: 12-18 months; investment: $200K-$1M (EPM tool + implementation); For Level 3 organizations (moving to Level 4): priority actions are implementing predictive analytics, AI-augmented investigation, and behavioral process design; estimated timeline: 18-24 months; investment: $500K-$2M (AI/ML development + organizational change); the basis for conclusions addresses key working group debates: (1) Why principles-based over prescriptive: management accounting practices are too diverse for one-size-fits-all rules, and what works for a $50B manufacturer is inappropriate for a $10M nonprofit; (2) Why the maturity model matters: organizations need to understand where they are before they can improve — jumping from Level 1 to Level 4 always fails; (3) The 'beyond budgeting' debate: the guideline deliberately does not prescribe whether to use annual budgets, rolling forecasts, or beyond-budgeting approaches — it provides principles that apply regardless of the specific methodology."
    weight: 0.30
    description: "ImplementationAndBFC"
