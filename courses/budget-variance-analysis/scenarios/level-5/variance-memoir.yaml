meta:
  id: variance-memoir
  level: 5
  course: budget-variance-analysis
  type: output
  description: "Write a professional memoir reflecting on a 30-year career in FP&A and performance management — capture the evolution of the field from spreadsheet-based budgeting to AI-driven performance intelligence"
  tags: [memoir, career-reflection, field-evolution, master]

state: {}

trigger: |
  You are retiring after 30 years in FP&A and
  performance management. IMA's Strategic Finance
  magazine has asked you to write a 2,500-word
  reflective essay:

  "From Lotus 1-2-3 to AI: A Performance
  Management Career"

  YOUR CAREER ARC (1995-2025):
  - 1995-2000: Junior analyst, manufacturing company
    (Lotus 1-2-3, then Excel, fax-based reporting)
  - 2000-2005: Senior analyst, then FP&A manager at
    a tech company (dot-com bust, SOX implementation)
  - 2005-2010: Controller at a mid-market company
    (first ERP implementation, Great Recession)
  - 2010-2015: VP of FP&A at a Fortune 500
    (Hyperion to Anaplan migration, rolling forecasts)
  - 2015-2020: CFO of a PE-backed company
    (13-week cash flow, covenant compliance, exit)
  - 2020-2025: Chief Performance Officer at a
    global company (AI/ML, real-time analytics,
    COVID disruption, remote FP&A)

  Write the 2,500-word memoir reflecting on how
  variance analysis and performance management
  evolved, what changed and what didn't, and what
  advice you'd give the next generation.

assertions:
  - type: llm_judge
    criteria: "The memoir authentically captures each career era with specific, believable details — 1995-2000: the manufacturing company where variance reports were printed on green-bar paper, where the monthly close took 15 business days, where the analyst's primary tool was a 3-ring binder of budget sheets and a calculator for checking variances by hand before entering them into Lotus 1-2-3; the moment Excel arrived and felt revolutionary; the fax machine that received plant production reports at 6 AM; 2000-2005: the tech company where revenue variance analysis was meaningless during the bubble (everything was favorable because everything was growing 40% YoY) and then became terrifying during the bust (every month was worse than the last); SOX implementation changed everything — suddenly variance analysis wasn't just management information, it was auditable controls; 2005-2010: the first ERP implementation where the promise was 'one version of the truth' but the reality was 18 months of parallel reporting and arguing about data definitions; the Great Recession where the company went from 'why is revenue 5% below budget?' to 'will we make payroll next Friday?' — variance analysis was irrelevant when survival was the question; each era feels real and specific, not generic."
    weight: 0.35
    description: "AuthenticCareerNarrative"
  - type: llm_judge
    criteria: "The memoir captures the evolution of variance analysis practice through personal experience — 2010-2015: the Fortune 500 where the author championed the migration from Hyperion (batch processing, overnight cube builds, static reports distributed as PDFs) to Anaplan (real-time calculation, self-service reporting, scenario modeling); the political battle to implement rolling forecasts over the CFO's objection that 'the board expects an annual budget'; the moment when the first rolling forecast proved its value by catching a revenue shortfall 3 months earlier than the static budget would have; 2015-2020: the PE-backed company where variance analysis served a completely different master — not management insight but covenant compliance and investor reporting; the 13-week cash flow forecast that became the most important document in the company; the exit process where 3 years of clean variance history and forecast accuracy data became part of the value story; 2020-2025: COVID as the event that finally killed the annual budget for many organizations (how do you explain a 'variance' when the entire world changed overnight?); the rise of AI/ML — the first time an algorithm flagged an anomaly in procurement spend that the team had missed for 6 months; the philosophical question of what the FP&A professional's role is when the machine does the calculation and commentary."
    weight: 0.35
    description: "FieldEvolution"
  - type: llm_judge
    criteria: "The memoir offers wisdom about what changed and what didn't, with advice for the next generation — what changed: technology (from calculators to AI), speed (from monthly to real-time), scope (from financial reporting to business intelligence), tools (from spreadsheets to cloud platforms), skills (from data entry to data science); what didn't change: the fundamental purpose (helping organizations understand their performance and make better decisions), the importance of business acumen (no tool replaces understanding the business), the human element (the best variance analysis still requires judgment, curiosity, and the courage to deliver bad news), the political dimension (budgets are still negotiations, variances are still interpreted through the lens of organizational power); advice for the next generation: (1) Learn the math but master the story — the variance calculation is the easy part; explaining it so the CEO changes behavior is the hard part; (2) Build relationships with operations — the best FP&A professionals spend more time on the factory floor or in sales meetings than in the finance office; (3) Embrace technology but don't worship it — AI will do the calculation, but you must provide the judgment; (4) Remember that every number represents a human decision — behind every variance is someone who made a choice, and understanding that choice is the real job; (5) The field is better than it was and will be better than it is — performance management is evolving from a compliance function to a strategic capability, and the people who drive that evolution will have extraordinary careers; the memoir is approximately 2,500 words and maintains a warm, reflective tone throughout."
    weight: 0.30
    description: "WisdomAndAdvice"
