meta:
  id: master-variance-shift
  level: 5
  course: budget-variance-analysis
  type: output
  description: "Master shift simulation — deliver expert testimony on budget variance methodology to a congressional committee, write a CFO advisory memo on transforming performance management, and synthesize global variance practices at an international summit"
  tags: [shift-simulation, congressional-testimony, advisory, master]

state: {}

trigger: |
  Three high-stakes engagements require your
  expertise this week.

  ENGAGEMENT 1 — CONGRESSIONAL TESTIMONY (Monday)
  The House Financial Services Committee is
  investigating whether current public company
  disclosure requirements adequately serve investors.
  You are testifying as an expert on performance
  management and variance analysis.

  Write 400-word prepared testimony addressing:
  - Whether current MD&A requirements produce
    meaningful variance analysis for investors
  - 3 specific improvements to disclosure rules
  - The role of technology (AI) in improving
    financial transparency

  ENGAGEMENT 2 — CFO ADVISORY MEMO (Wednesday)
  The CEO of a Fortune 100 company has asked you
  to write a memo to the incoming CFO outlining a
  vision for transforming the company's performance
  management function. The company currently has a
  traditional annual budget with monthly variance
  reporting and 200 FP&A professionals globally.

  Write a 500-word strategic advisory memo covering:
  - Current state diagnosis (typical enterprise
    weaknesses)
  - Target state vision (3-5 year horizon)
  - Transformation roadmap (phased approach)
  - Investment requirements and expected ROI
  - Talent strategy for the FP&A function

  ENGAGEMENT 3 — GLOBAL SUMMIT SYNTHESIS (Friday)
  You are chairing the closing session of the Global
  Performance Management Summit in Zurich. 300
  delegates from 40 countries have spent 3 days
  discussing the future of budgeting and variance
  analysis.

  Write a 400-word closing synthesis that:
  - Captures the 5 key themes from the summit
  - Identifies areas of consensus and debate
  - Proposes a collaborative action agenda
  - Inspires delegates to drive change

  Handle all three engagements.

assertions:
  - type: llm_judge
    criteria: "Congressional testimony demonstrates policy expertise and credible authority — the 400-word testimony: opens with a clear statement of qualifications and position; addresses the adequacy question directly — current MD&A requirements under Reg S-K Item 303 require discussion of 'known trends and uncertainties' but do not specify the quality or methodology of variance analysis; the result is a wide range of disclosure quality across public companies; some provide detailed driver-based analysis while others offer boilerplate explanations that add little investor value; 3 specific improvements: (1) Require companies to disclose the operational drivers behind material financial variances, not just the financial impact — 'revenue declined 8% due to loss of 3 enterprise customers representing $45M in annual contract value' is far more useful than 'revenue declined due to market softness'; (2) Mandate a forecast accuracy table in annual reports showing historical guidance vs. actual results for the past 3 years — this allows investors to calibrate management credibility; (3) Extend safe harbor protections to detailed variance explanations that include forward-looking driver analysis — current litigation risk discourages informative disclosure; the technology section addresses AI's potential to improve transparency: AI can generate consistent, comprehensive variance commentary at scale, enable real-time performance monitoring, and detect anomalies earlier — but cautions that AI-generated disclosure requires human oversight and clear labeling; the tone is appropriately measured for congressional testimony — authoritative, nonpartisan, focused on investor protection."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "CFO advisory memo demonstrates strategic consulting capability — the 500-word memo: diagnoses the typical enterprise weaknesses: annual budget cycle consuming 4-6 months and 40% of FP&A capacity, static variance reports delivered 10+ business days after month-end, variance commentary that describes what happened without explaining why, siloed BU analysis with no cross-enterprise pattern recognition, technology stack of 15+ disconnected spreadsheet models with a legacy EPM tool; target state vision (3-5 years): continuous planning with rolling 18-month forecasts updated monthly, driver-based performance intelligence with real-time monitoring of 50 key operational KPIs, AI-augmented variance analysis that detects anomalies in real-time and generates first-draft root cause hypotheses, cross-functional performance teams that combine financial and operational expertise, variance report available within 3 business days of month-end; transformation roadmap: Phase 1 (Year 1) — Foundation: standardize variance methodology, implement root cause taxonomy, pilot rolling forecast in 2 BUs, select and deploy cloud EPM platform; Phase 2 (Year 2) — Scale: roll out driver-based planning and rolling forecasts enterprise-wide, implement automated variance calculations, launch AI pilot for anomaly detection; Phase 3 (Year 3) — Transform: full AI-augmented performance intelligence, real-time dashboards for C-suite, predictive variance modeling, FP&A talent retrained as business intelligence professionals; investment: $15-25M over 3 years (technology, implementation, change management); expected ROI: 30% FP&A productivity improvement, 5-day reduction in close-to-insight cycle, 20% improvement in forecast accuracy; talent strategy: reskill 60% of current analysts, recruit 20% with data science skills, allow 20% natural attrition of transactional roles."
    weight: 0.35
    description: "CFOAdvisoryMemo"
  - type: llm_judge
    criteria: "Global summit synthesis demonstrates thought leadership and the ability to inspire action — the 400-word closing synthesis: captures 5 key themes: (1) The Annual Budget Is Evolving, Not Dying: delegates agreed that the annual budget as a static document is obsolete, but disagreed on what replaces it — rolling forecasts, driver-based planning, and beyond-budgeting approaches were all championed, with the consensus that the specific methodology matters less than the principles of agility, driver-focus, and continuous improvement; (2) AI Is a Tool, Not a Replacement: every panel discussed AI, but the consensus was clear — AI excels at pattern detection and routine calculation but cannot replace the judgment, context, and business acumen that human analysts bring; the winning model is human-AI partnership; (3) The Behavioral Challenge Outweighs the Technical Challenge: multiple sessions highlighted that the biggest barrier to better variance analysis is organizational culture, not technology — fear of unfavorable variances, budget gaming, and blame cultures were identified as universal obstacles regardless of country or industry; (4) Global Standards Would Help: delegates from developing markets noted that they lack the frameworks and training infrastructure available in mature markets; a set of global principles-based guidelines for performance management would accelerate maturity worldwide; (5) The FP&A Role Is Being Reinvented: the traditional variance analyst is becoming a performance intelligence professional — this requires new skills (data science, business partnering, communication) and new organizational structures; areas of debate: whether AI can be trusted for external variance reporting, whether performance management should be centralized or federated, and whether non-financial variance analysis (ESG, customer, employee) should follow the same frameworks as financial variance analysis; the action agenda proposes: form a working group on global performance management principles, create an open-source variance pattern library, and launch a joint industry-academic research program on AI-augmented variance analysis; the synthesis ends with an inspiring call to action."
    weight: 0.30
    description: "SummitSynthesis"
