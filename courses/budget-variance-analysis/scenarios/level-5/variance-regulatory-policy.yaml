meta:
  id: variance-regulatory-policy
  level: 5
  course: budget-variance-analysis
  type: output
  description: "Write a policy paper proposing regulatory standards for budget variance reporting in public companies — develop recommendations for improving the quality and consistency of performance management disclosures"
  tags: [regulatory-policy, public-company, disclosure, master]

state: {}

trigger: |
  The IMA (Institute of Management Accountants)
  has asked you to write a policy paper for their
  advocacy committee:

  "Improving Performance Management Disclosure in
  Public Company Reporting"

  CONTEXT:
  - SEC requires MD&A discussion of results but
    provides limited guidance on variance analysis
    quality
  - Companies vary enormously in how they explain
    performance vs. budget/expectations
  - Earnings calls include forward-looking guidance
    but little systematic variance explanation
  - Investors increasingly demand transparency about
    operational drivers, not just financial results
  - ESG and non-financial metrics add complexity to
    performance reporting

  AUDIENCE: IMA Board, SEC staff, congressional
  aides, corporate finance executives, audit
  committee chairs

  Write a 3,500-word policy paper with:
  1. Executive summary
  2. Current state assessment
  3. Analysis of the problem
  4. 5-7 specific policy recommendations
  5. Implementation considerations
  6. Cost-benefit analysis
  7. International comparisons

assertions:
  - type: llm_judge
    criteria: "The policy paper presents a rigorous analysis of the current state and problems with performance management disclosure — the current state section documents: SEC Regulation S-K Item 303 requires MD&A to discuss 'known trends and uncertainties' and explain material changes in financial statements, but provides no specific guidance on how companies should analyze or present variance information; the result is enormous variation in disclosure quality — some companies provide detailed driver-based analysis ('Revenue increased 12%, driven by 8% volume growth in the consumer segment and 15% pricing improvement in industrial, partially offset by 5% decline in government contracts'), while others provide boilerplate ('Revenue increased due to favorable market conditions and strong execution'); earnings call guidance practices are similarly inconsistent — some companies provide detailed quarterly guidance with specific assumptions, others refuse to guide on principle, and most fall somewhere in between; the problem analysis identifies 4 specific failures: (1) Information Asymmetry: management has detailed variance analysis internally but discloses only a fraction to investors; (2) Comparability Gap: investors cannot compare performance management quality across companies because there is no standard framework; (3) Forward-Looking Disconnect: companies explain past variances without connecting them to future implications; (4) Non-Financial Blindness: traditional MD&A focuses on financial metrics while operational and non-financial drivers are often more predictive."
    weight: 0.35
    description: "CurrentStateAnalysis"
  - type: llm_judge
    criteria: "The 5-7 policy recommendations are specific, feasible, and well-reasoned — recommendations include: (1) Standardized Variance Disclosure Framework: SEC should issue interpretive guidance requiring companies to disclose the top 3-5 drivers of material variances in revenue, operating income, and cash flow — not just the direction ('increased') but the magnitude and cause; this builds on existing MD&A requirements without requiring new legislation; (2) Key Performance Indicator Registry: companies should be required to identify and consistently report on the 5-10 operational KPIs most relevant to their business and explain variances in these KPIs alongside financial variances — this connects financial results to operational performance; (3) Forecast Accuracy Disclosure: companies that provide forward-looking guidance should be required to include a historical forecast accuracy table — showing actual vs. guidance for the past 3 years — so investors can calibrate the reliability of management's projections; (4) Variance Analysis Methodology Disclosure: just as companies disclose their critical accounting policies, they should disclose their performance management methodology — how they budget, how they analyze variances, what drives management decision-making; (5) Non-Financial Performance Integration: as ISSB standards require sustainability disclosures, variance analysis should extend to material non-financial metrics with the same analytical rigor applied to financial variances; (6) Safe Harbor Enhancement: expand the PSLRA safe harbor to explicitly cover driver-based variance explanations and operational predictions, encouraging more informative disclosure without litigation risk; each recommendation includes implementation specifics and addresses potential objections."
    weight: 0.35
    description: "PolicyRecommendations"
  - type: llm_judge
    criteria: "Implementation considerations, cost-benefit analysis, and international comparisons demonstrate policy sophistication — implementation: phased approach over 3 years — Year 1: SEC issues interpretive guidance and comment period; Year 2: voluntary early adoption with safe harbor protections; Year 3: mandatory compliance for large accelerated filers, followed by smaller filers in Year 4; cost-benefit analysis: costs include incremental disclosure preparation ($50K-$200K per company annually, depending on size and current practices), audit committee oversight expansion, and potential litigation exposure from more detailed disclosures; benefits include: improved market efficiency (research shows that companies with better variance disclosure have lower cost of capital and less earnings surprise volatility), reduced information asymmetry, better capital allocation decisions by investors, and improved internal performance management practices (the discipline of external disclosure drives internal improvement); net benefit estimated at $2-5B annually across the public company ecosystem; international comparisons: UK Companies Act requires a strategic report with specific performance discussion; German management report (Lagebericht) requires forward-looking variance analysis; Japan's EDINET system requires specific KPI disclosure; the paper notes that the US trails major markets in performance disclosure requirements and provides examples from each jurisdiction that could inform US policy; the paper is approximately 3,500 words with professional policy paper formatting."
    weight: 0.30
    description: "ImplementationAndComparisons"
