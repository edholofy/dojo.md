meta:
  id: variance-thought-leadership
  level: 5
  course: budget-variance-analysis
  type: output
  description: "Deliver a keynote on the future of budgeting and variance analysis — articulate a vision for how performance management will evolve beyond traditional budget-to-actual comparisons"
  tags: [thought-leadership, keynote, future-vision, master]

state: {}

trigger: |
  You have been invited to deliver the opening
  keynote at the IMA's Annual Conference on
  Performance Management. Your topic:

  "Beyond Budget vs. Actual: The Future of
  Performance Intelligence"

  AUDIENCE: 800 attendees — CFOs, controllers,
  FP&A directors, management accountants,
  technology vendors, academics

  KEY THEMES TO ADDRESS:
  1. Why the annual budget is becoming obsolete
  2. The shift from variance analysis to performance
     intelligence
  3. AI and predictive analytics transforming the
     function
  4. The human role in an automated world
  5. What the FP&A professional of 2030 looks like

  Write a 3,500-word keynote script that proposes
  an original framework or model.

assertions:
  - type: llm_judge
    criteria: "The keynote proposes an original framework that advances thinking about performance management — the speech introduces a model (e.g., 'The Performance Intelligence Pyramid' or 'The Continuous Performance Loop') that transcends traditional budget-vs-actual thinking; the framework addresses: (1) the temporal dimension — moving from backward-looking variance analysis to real-time performance monitoring with predictive capabilities, (2) the analytical dimension — moving from simple comparison (budget vs. actual) to multi-dimensional driver analysis that explains performance causally, (3) the organizational dimension — moving from finance-owned reporting to cross-functional performance intelligence that integrates financial and operational data, (4) the technological dimension — AI as a partner in variance detection, root cause identification, and corrective action recommendation; the framework is memorable and practical — something an FP&A team could use as a roadmap for transforming their function; the keynote draws on specific evidence and examples, not just abstract vision."
    weight: 0.35
    description: "OriginalFramework"
  - type: llm_judge
    criteria: "The keynote addresses the 'death of the budget' debate with nuance and the AI transformation with practical insight — the speech engages honestly with the 'beyond budgeting' movement: acknowledges that the annual budget process (4-6 months to produce a document that's obsolete by Q2) is genuinely broken, but also recognizes that organizations need targets, accountability mechanisms, and resource allocation frameworks — the question is not 'budget or no budget' but 'what replaces the planning and control functions that the budget served?'; the proposed answer integrates rolling forecasts (for prediction), driver-based planning (for understanding), and continuous variance monitoring (for control) into a unified system; the AI section provides specific, realistic examples: AI detecting a revenue variance pattern in POS data 3 weeks before month-end close, a natural language model auto-generating first-draft variance commentary, and a predictive model that forecasts next quarter's variances based on current trends; the speech honestly addresses limitations: AI excels at pattern recognition but struggles with novel situations, and the human analyst's role shifts from calculation to judgment, interpretation, and business partnering; the FP&A professional of 2030 is a 'Performance Intelligence Officer' who combines data science literacy, business acumen, and communication skills."
    weight: 0.35
    description: "BeyondBudgetingAndAI"
  - type: llm_judge
    criteria: "The keynote is well-structured, engaging, and actionable — the speech follows a compelling arc: opens with a provocative anecdote (perhaps a company that abolished its budget and what happened), builds through the case for change, presents the framework as the way forward, and closes with a call to action; the tone is appropriate for an IMA conference — professionally ambitious but grounded, forward-looking but not dismissive of current practices; the speech addresses each audience segment: CFOs (the strategic case for transforming performance management), FP&A professionals (what their career path looks like in this new world — it's better, not extinct), technology vendors (what the market needs from them), and academics (the research agenda); the call to action includes 3-4 specific, achievable steps: (1) Kill one report (identify the least valuable variance report and eliminate it — free up analyst time for insight), (2) Automate one process (pick the most repetitive variance calculation and automate it this quarter), (3) Add one driver (for each major variance, require the business driver, not just the financial explanation), (4) Predict one thing (build a simple model that predicts next month's biggest variance); the keynote is approximately 3,500 words."
    weight: 0.30
    description: "StructureAndActionability"
