meta:
  id: variance-social-enterprise
  level: 5
  course: budget-variance-analysis
  type: output
  description: "Create a social enterprise that democratizes budget variance analysis capabilities — design an organization that makes professional-quality performance management accessible to small businesses, nonprofits, and developing-world organizations"
  tags: [social-enterprise, democratization, accessibility, master]

state: {}

trigger: |
  You are founding a B-Corp called "ClearBudget" —
  a social enterprise whose mission is to
  democratize budget variance analysis.

  THE PROBLEM:
  - 95% of small businesses (<$10M revenue) have no
    formal variance analysis process
  - Most nonprofits track budget vs. actual at the
    annual level only, missing operational insights
  - Developing-world organizations often lack the
    expertise to implement basic performance
    management
  - Professional EPM tools cost $50K-$500K+, putting
    them out of reach
  - FP&A consulting costs $200-500/hour

  YOUR VISION:
  - Make variance analysis accessible to any
    organization with a spreadsheet
  - Build AI-powered tools that generate
    professional-quality variance commentary
  - Create free educational resources
  - Sustainable business model (not dependent on
    grants)

  Produce:
  1. Business plan (3,000 words) covering mission,
     product, market, revenue model, and impact
     measurement
  2. Product specification for the core SaaS tool
  3. Free tier vs. paid tier structure
  4. Impact measurement framework
  5. 3-year financial projections with key assumptions

assertions:
  - type: llm_judge
    criteria: "The business plan presents a viable social enterprise with a compelling product — the plan addresses: Mission: every organization deserves to understand its financial performance, not just track it; the current state where small organizations do 'budget vs. actual' reporting without understanding WHY variances occurred means they cannot learn or improve; Product: a SaaS platform with 3 layers: (1) Budget Builder — guided budget creation using industry benchmarks (a restaurant enters revenue, food cost %, labor %, rent and the tool creates a month-by-month budget using seasonal patterns from thousands of similar businesses); (2) Variance Engine — connects to accounting software (QuickBooks, Xero, Wave) via API, automatically calculates variances, and generates natural language commentary ('Your food costs were $3,200 over budget this month. The primary driver appears to be a 15% increase in protein prices — this matches an industry-wide trend. Consider: menu price adjustment, portion review, or supplier renegotiation'); (3) Action Recommender — based on variance patterns, suggests specific actions with examples of what similar organizations did; market sizing: 30M small businesses in the US alone, plus nonprofits and international organizations; revenue model: freemium — free tier for organizations under $1M revenue (attracts volume, builds brand), Starter tier $49/month, Professional $149/month, Nonprofit pricing at 50% discount; the 3-year projections show a path to sustainability: Year 1 focus on product development and early adopters (burn $800K), Year 2 growth (break-even at ~2,000 paid subscribers), Year 3 expansion ($2M ARR, positive cash flow)."
    weight: 0.35
    description: "BusinessPlan"
  - type: llm_judge
    criteria: "The product specification and tier structure demonstrate understanding of both the technology and the target users — the product spec includes: data integration layer (QuickBooks Online, Xero, Wave, CSV upload as fallback), budget creation wizard (industry-specific templates, seasonal patterns, guided assumptions), automated variance calculation engine (revenue, COGS, operating expenses, with price/volume/mix decomposition where data permits), NLG commentary generator (AI-powered natural language variance explanations, calibrated by industry and organization size — a $500K nonprofit gets different commentary depth than a $5M restaurant chain), action recommendation engine (pattern matching against anonymized variance data from the platform's user base — 'organizations like yours that experienced this variance pattern found success with these 3 actions'); free tier includes: budget creation for 1 entity, monthly variance reports, basic commentary (top 3 variances explained), community forum access; Starter tier adds: unlimited entities, weekly variance monitoring, full commentary on all line items, email alerts for significant variances, phone support; Professional tier adds: driver-based analysis, rolling forecast capability, board-ready report generation, API access, dedicated success manager; nonprofit tier: Professional features at Starter pricing; the specification addresses the key UX challenge: making variance analysis understandable to non-financial users — every number is accompanied by a plain-English explanation, every chart has an interpretation, and every variance links to a 'What should I do?' recommendation."
    weight: 0.35
    description: "ProductAndTiers"
  - type: llm_judge
    criteria: "Impact measurement framework and financial projections demonstrate social enterprise rigor — the impact measurement framework tracks: Output metrics: number of organizations using the platform (target: 10,000 by Year 3, of which 60% free tier), number of variance reports generated, number of action recommendations delivered; Outcome metrics: user financial literacy improvement (pre/post survey), budget accuracy improvement (measured by tracking forecast error over time for platform users), time savings (hours spent on budget analysis before vs. after adoption); Impact metrics: revenue growth correlation for platform users vs. control group, nonprofit program delivery improvement attributable to better financial management, developing-world organization sustainability rates; the framework uses Theory of Change: Access to variance analysis tools → Better understanding of financial performance → More informed decisions → Improved organizational outcomes; 3-year financial projections include: revenue build-up by tier (free users converting to paid at 5-8% rate), cost structure (cloud infrastructure, AI/ML costs, customer support, development team), unit economics (CAC, LTV, payback period), cash flow with fundraising needs (seed round of $1.5M to fund Year 1-2, Series A of $5M if growth targets met); key assumptions are explicitly stated and sensitivity-tested: conversion rate ±2%, churn rate assumptions, average revenue per user."
    weight: 0.30
    description: "ImpactAndFinancials"
