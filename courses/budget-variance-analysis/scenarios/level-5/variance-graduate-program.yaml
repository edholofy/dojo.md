meta:
  id: variance-graduate-program
  level: 5
  course: budget-variance-analysis
  type: output
  description: "Design a graduate-level course on performance management and variance analysis — create a rigorous MBA elective that prepares future CFOs to design and lead organizational performance management systems"
  tags: [graduate-program, mba-course, curriculum-design, master]

state: {}

trigger: |
  A top-20 business school has asked you to design
  a new MBA elective:

  "Performance Management Systems: From Budgets to
  Business Intelligence"

  COURSE PARAMETERS:
  - 14-week semester, 3-hour sessions
  - Target enrollment: 45 second-year MBA students
  - Prerequisites: Financial Accounting, Managerial
    Accounting
  - Mix of students heading to: corporate finance
    (40%), consulting (30%), entrepreneurship (20%),
    banking (10%)
  - School emphasizes case method and experiential
    learning
  - Must include technology component (students
    should use actual EPM/BI tools)

  DEAN'S REQUIREMENTS:
  - Course must bridge theory and practice
  - Include at least 3 guest speakers from industry
  - Assessment should include both individual and
    team components
  - Course should differentiate from existing
    offerings at peer schools

  Produce:
  1. Complete 14-week syllabus with session topics,
     readings, and deliverables
  2. Assessment design (grading breakdown with
     rationale)
  3. Three detailed lesson plans (Sessions 1, 7, 14)
  4. Capstone project specification
  5. Guest speaker strategy

assertions:
  - type: llm_judge
    criteria: "The 14-week syllabus creates a coherent learning arc from fundamentals to mastery — the syllabus progresses through phases: Weeks 1-3 (Foundations): Session 1: The Performance Management Challenge — why organizations budget and what goes wrong; Session 2: Budget Architecture — fixed, flexible, zero-based, activity-based, and beyond-budgeting approaches compared; Session 3: Variance Analysis Mechanics — the mathematics and logic of decomposing performance differences; Weeks 4-6 (Driver-Based Thinking): Session 4: From Financial Variances to Business Drivers — connecting budget line items to operational causes; Session 5: Forecasting and Rolling Budgets — replacing the annual ritual with continuous planning; Session 6: Industry Guest Speaker — real-world variance challenges; Weeks 7-9 (Technology and Analytics): Session 7: EPM Systems Lab — hands-on with Anaplan, Adaptive, or similar tool; Session 8: Predictive Analytics for Variance — ML approaches to anomaly detection and forecasting; Session 9: Dashboard Design — visualizing performance data for decision-making; Weeks 10-12 (Organizational Design): Session 10: Behavioral Dimensions — gaming, sandbagging, ratcheting, and organizational dysfunction; Session 11: Performance Management in Different Contexts — manufacturing, services, healthcare, government, startups; Session 12: Industry Guest Speaker — transformation case study; Weeks 13-14 (Integration): Session 13: The Future of Performance Intelligence — AI, real-time monitoring, continuous forecasting; Session 14: Capstone Presentations — team projects presented to faculty and industry judges; each session includes required readings (mix of academic papers, practitioner articles, and cases), preparation questions, and clear learning objectives."
    weight: 0.35
    description: "SyllabusDesign"
  - type: llm_judge
    criteria: "Assessment design and lesson plans demonstrate pedagogical sophistication — assessment breakdown: Individual (50%): class participation 15% (quality of contribution, not just frequency), midterm case analysis 15% (individual written analysis of a complex variance scenario), reflection journal 10% (weekly entries connecting course concepts to current business events or personal experience), technology lab report 10% (individual EPM tool exercise); Team (50%): capstone project 35% (see specification), peer evaluation adjustment ±5% (teammates rate contribution); the rationale explains why heavy weighting on the capstone: performance management is fundamentally about judgment, communication, and system design — skills best demonstrated through an extended project; Session 1 lesson plan: opens with an exercise where students receive actual (disguised) variance reports from 3 different companies and try to figure out what happened — demonstrating that variance analysis is detective work, not just math; the debrief leads into the course framework; Session 7 lesson plan: EPM lab where students build a simple rolling forecast model, run scenarios, and see how technology enables driver-based planning; Session 14: capstone presentations with structured feedback from industry judges."
    weight: 0.35
    description: "AssessmentAndLessonPlans"
  - type: llm_judge
    criteria: "Capstone project and guest speaker strategy create real-world learning — the capstone specification: teams of 4-5 students partner with a real organization (the school's career services, a local nonprofit, or a willing corporate partner) to diagnose their current budgeting and variance analysis practices, assess maturity, and propose a performance management improvement roadmap; deliverables include: (1) Current State Assessment (5-page report documenting existing practices, interviewing at least 3 stakeholders), (2) Maturity Assessment (using a framework from the course), (3) Improvement Roadmap (prioritized recommendations with implementation timeline and expected benefits), (4) Executive Presentation (20 minutes to faculty and industry panel); grading rubric evaluates: analytical rigor, practical feasibility, communication quality, and stakeholder engagement; guest speaker strategy: Speaker 1 (Week 6): Corporate CFO or VP of FP&A from a Fortune 500 company — topic: 'How variance analysis actually drives decisions in a large organization'; Speaker 2 (Week 12): EPM transformation consultant or technology vendor — topic: 'From spreadsheets to intelligent performance management'; Speaker 3 (Week 13 or embedded in capstone): Startup CFO or fractional CFO — topic: 'Performance management when resources are scarce and uncertainty is high'; each speaker session includes pre-reading, prepared student questions, and a post-session reflection assignment."
    weight: 0.30
    description: "CapstoneAndSpeakers"
