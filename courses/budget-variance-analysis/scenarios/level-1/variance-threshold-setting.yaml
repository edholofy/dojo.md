meta:
  id: variance-threshold-setting
  level: 1
  course: budget-variance-analysis
  type: output
  description: "Set appropriate variance investigation thresholds — determine which variances are significant enough to warrant investigation and reporting"
  tags: [variance-thresholds, materiality, investigation, beginner]

state: {}

trigger: |
  The Controller has asked you to establish variance
  investigation thresholds for the monthly reporting
  process. Currently, every variance is reported
  regardless of size, creating "analysis paralysis."

  COMPANY CONTEXT:
  - Annual revenue: $50M
  - Annual operating expenses: $42M
  - Monthly operating budget: ~$3.5M
  - Finance team: 4 analysts responsible for
    variance reporting
  - Average time spent on variance analysis: 3 days
    per monthly close
  - Controller's complaint: "We spend too much time
    explaining $500 variances and not enough time on
    the ones that matter"

  CURRENT VARIANCE REPORT (last month):
  Total line items reported: 127
  - Variances > $50K: 4
  - Variances $10K-$50K: 18
  - Variances $1K-$10K: 52
  - Variances < $1K: 53

  Tasks:
  1. Propose variance thresholds (dollar and
     percentage) by expense category
  2. Define investigation criteria (when to dig
     deeper vs. note and move on)
  3. Create a simple decision framework for analysts
  4. Estimate the time savings from implementing
     thresholds
  5. Write a 200-word memo proposing the new
     thresholds to the Controller

assertions:
  - type: llm_judge
    criteria: "Proposed thresholds are reasonable for a $50M company — the thresholds should be tiered by category size and risk: for major categories (revenue, COGS, payroll — individually >$500K/month): investigate if variance exceeds both $10,000 AND 5% of budget for that line; for medium categories ($100K-$500K/month, e.g., marketing, R&D): investigate if variance exceeds both $5,000 AND 10% of budget; for small categories (<$100K/month, e.g., office supplies, travel): investigate if variance exceeds $2,500 OR 15% of budget; the thresholds use both dollar AND percentage criteria (a $10K variance on a $1M line is 1% and may not be significant, but $10K on a $50K line is 20% and warrants attention); the framework should also include mandatory investigation triggers regardless of threshold: any new line item not in budget, any variance that has been unfavorable for 3+ consecutive months (trending), and any variance in a high-risk area (regulatory, contractual)."
    weight: 0.35
    description: "ThresholdDesign"
  - type: llm_judge
    criteria: "The decision framework provides clear, actionable guidance for analysts — the framework should be a simple flowchart or decision tree: Step 1: Does the variance exceed the dollar AND percentage threshold for its category? If No → document the variance amount in the summary table but no commentary required; If Yes → proceed to Step 2; Step 2: Is the variance a known/expected item? (e.g., timing difference that will reverse, pre-approved budget change, seasonal pattern) If Yes → write a one-line explanation and mark as 'known/expected'; If No → proceed to Step 3; Step 3: Full investigation — identify the root cause, quantify the impact, determine if it's one-time or recurring, and write a 2-3 sentence explanation with recommended action; the framework should estimate time savings: currently 127 line items reported, under the new thresholds approximately 22-30 would require commentary (the 4 large + 18 medium + some small that exceed the percentage threshold), reducing commentary writing from ~127 items to ~25; at an average of 15 minutes per investigation, this saves approximately 25 hours per month, reducing the 3-day close process to approximately 1.5 days for variance analysis."
    weight: 0.35
    description: "DecisionFramework"
  - type: llm_judge
    criteria: "The Controller memo is persuasive and practical — the 200-word memo: (1) opens with the problem (the team spends 3 days analyzing 127 variances, including 53 under $1K that represent noise, not signal), (2) proposes the tiered threshold system with clear dollar and percentage criteria by category, (3) estimates the impact (reduce investigated variances from 127 to approximately 25-30, saving ~25 hours per month), (4) addresses the Controller's concern directly (analysts will spend time on the variances that matter), (5) includes a safeguard: trending analysis catches small but persistent variances that individually fall below thresholds but collectively indicate a problem, (6) proposes a 3-month trial period to calibrate the thresholds (are we catching the important variances? are we missing anything?); the tone acknowledges that setting thresholds requires judgment — they should be reviewed quarterly as the business changes."
    weight: 0.30
    description: "ControllerMemo"
