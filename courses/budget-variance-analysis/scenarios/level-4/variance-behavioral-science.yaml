meta:
  id: variance-behavioral-science
  level: 4
  course: budget-variance-analysis
  type: output
  description: "Apply behavioral science to variance analysis — understand how cognitive biases affect budgeting behavior, variance investigation, and organizational response to budget misses"
  tags: [behavioral-science, cognitive-bias, organizational-behavior, expert]

state: {}

trigger: |
  A management accounting research team is studying
  how behavioral factors affect the quality and
  effectiveness of variance analysis processes.
  Design the research program and translate findings
  into practical organizational recommendations.

  RESEARCH QUESTIONS:
  1. How do cognitive biases affect budget-setting
     behavior? (anchoring, optimism bias, sandbagging)
  2. How do managers react to variance information?
     (blame avoidance, information filtering, excuse-
     making)
  3. How do investigation biases affect variance
     analysis quality? (confirmation bias, recency
     bias, threshold fixation)
  4. How does organizational culture affect variance
     analysis effectiveness? (blame vs. learning,
     transparency vs. concealment)

  EXISTING RESEARCH:
  - Budgetary slack: managers pad budgets to ensure
    favorable variances (Merchant, 1985)
  - Self-serving attribution: managers attribute
    favorable variances to skill and unfavorable to
    luck/external factors (Staw, 1975)
  - Threshold effects: managers focus effort on
    variances just above the investigation threshold,
    potentially ignoring important below-threshold
    patterns (Horngren et al.)
  - Loss aversion: unfavorable variances of a given
    size receive more attention than equally-sized
    favorable variances (Kahneman & Tversky, 1979)

  Design:
  1. Four behavioral studies (one per research
     question)
  2. Practical organizational recommendations
  3. "Behavioral variance analysis audit" checklist
  4. Training program for debiasing

assertions:
  - type: llm_judge
    criteria: "Research designs are methodologically rigorous — each study addresses a specific behavioral phenomenon: (1) Budget-Setting Biases: hypothesis — managers who receive last year's budget as a reference point set budgets within 10% of that anchor, regardless of changed business conditions; methodology — between-subjects experiment with 200+ budget managers, half receive prior-year budget as reference (anchored condition), half receive only forward-looking market data (unanchored condition); both groups budget for the same scenario; measures — budget accuracy relative to actual results 12 months later; finding expected — anchored budgets are more conservative and less accurate; (2) Variance Response Biases: hypothesis — managers attribute unfavorable variances to external factors (market, economy) and favorable variances to internal actions (good management, team effort) at significantly different rates; methodology — content analysis of 500+ variance commentaries coded for attribution (internal skill vs. external luck) × favorability; supplemented by experimental study where managers explain hypothetical variances; (3) Investigation Biases: hypothesis — analysts spend disproportionate time investigating variances just above the threshold while ignoring cumulative below-threshold variances that may be more material; methodology — eye-tracking and time-allocation study with 100 FP&A analysts presented with identical variance reports; (4) Culture Effects: hypothesis — organizations with 'learning' cultures produce higher-quality variance analysis (more specific root causes, more forward-looking corrective actions) than organizations with 'blame' cultures; methodology — survey 50+ organizations, classify culture type, score variance analysis quality."
    weight: 0.35
    description: "ResearchDesigns"
  - type: llm_judge
    criteria: "Practical recommendations translate behavioral insights into organizational design — recommendations organized by bias: (1) Counter anchoring in budgets: implement zero-based or driver-based budgeting that forces managers to build up from business drivers rather than adjusting from prior year; rotate budget preparers periodically to break anchor dependence; (2) Counter self-serving attribution: require managers to provide evidence for both internal and external variance drivers; implement peer review of variance commentary (another department reads and challenges the explanations); standardize the root cause taxonomy so managers can't invent vague categories; (3) Counter investigation bias: supplement threshold-based investigation with trend analysis (any variance below threshold for 3+ months gets escalated); require investigation of significant favorable variances (not just unfavorable); use cumulative reporting alongside monthly to catch patterns; (4) Build learning culture: separate variance analysis from performance evaluation (don't penalize managers for honest reporting of unfavorable variances); reward early identification of problems (a manager who flags a variance in January is contributing more than one who hides it until March); conduct quarterly 'lessons learned' sessions where the best root cause analyses are recognized, not just the best results; the 'Behavioral Variance Analysis Audit' checklist: 15 questions that an organization can use to assess whether their variance process is susceptible to behavioral biases."
    weight: 0.35
    description: "PracticalRecommendations"
  - type: llm_judge
    criteria: "Debiasing training program addresses the human side of variance analysis — the training program targets 3 audiences: (1) Budget Preparers: 2-hour workshop on anchoring and optimism bias in budget-setting; exercises include: setting a budget for a scenario without receiving the prior year (then comparing to a group that received it), identifying 'sandbagging' patterns in real (anonymized) budget submissions; (2) Variance Analysts: 2-hour workshop on confirmation bias and threshold fixation; exercises include: analyzing a variance report designed with subtle below-threshold patterns that together represent a major issue, writing variance commentary for the same data with 'skill' vs. 'luck' framing to see how attribution changes the narrative; (3) Senior Leaders: 1-hour session on how their response to variances shapes organizational culture — if the CEO punishes the messenger, variance commentary becomes defensive and uninformative; if the CEO asks 'what did we learn?' the commentary becomes honest and forward-looking; the training includes a 'Variance Analysis Code of Conduct' that commits the organization to: honest attribution, timely reporting of bad news, investigation of both favorable and unfavorable variances, separation of variance analysis from blame, and continuous improvement of budget accuracy rather than consistent favorable outcomes."
    weight: 0.30
    description: "DebiasingTraining"
