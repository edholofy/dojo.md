meta:
  id: variance-governance-framework
  level: 4
  course: budget-variance-analysis
  type: output
  description: "Design a variance analysis governance framework — establish policies, standards, and accountability for budgeting and variance processes across a decentralized organization"
  tags: [governance, policy, standards, expert]

state: {}

trigger: |
  After an internal audit found significant
  weaknesses in the budgeting and variance analysis
  processes, the CFO has directed you to establish
  a comprehensive governance framework.

  INTERNAL AUDIT FINDINGS:
  1. No formal policy governing budget preparation
     timelines, approval authorities, or amendment
     processes
  2. Variance investigation thresholds vary from
     $5K to $500K across business units with no
     documented rationale
  3. Variance commentary quality ranges from "N/A"
     to detailed driver analysis — no minimum standard
  4. Budget amendments are made informally with no
     approval trail
  5. No formal process for budget reforecasts —
     some BUs reforecast quarterly, some never
  6. Corrective actions from variance analysis are
     documented but never tracked to completion
  7. The board receives different variance formats
     from each committee (audit, finance, operations)

  COMPANY: $2.5B revenue, 6 business units, 3
  geographic regions, 85 cost center managers with
  budget responsibility, publicly traded

  Design:
  1. Budget governance policy
  2. Variance analysis standards
  3. Accountability and escalation framework
  4. Corrective action management
  5. Board reporting standards
  6. Compliance and monitoring

assertions:
  - type: llm_judge
    criteria: "Budget governance policy addresses each audit finding with specific standards — the policy establishes: (1) Budget Calendar: mandatory timeline with milestones — strategic planning (July-August), budget kickoff with targets (September), BU budget submissions (October), consolidation and challenge sessions (November), CFO approval and board presentation (December); amendments require written justification and CFO approval for changes >$500K, BU controller approval for $100-500K; (2) Variance Thresholds: standardized using a formula tied to BU revenue — investigation threshold = greater of (a) 0.5% of BU annual revenue or (b) $250K; this eliminates the current $5K-$500K inconsistency by scaling thresholds to BU size while maintaining a minimum floor; the thresholds are documented and reviewed annually; (3) Commentary Standards: minimum requirements for all variances exceeding the threshold — must include: the variance amount ($ and %), the root cause category (from a standardized taxonomy), the specific business driver, whether it's timing or permanent, the expected forward impact, and the corrective action (if any); 'N/A' is explicitly prohibited for above-threshold variances; (4) Reforecast Policy: mandatory quarterly reforecasts for all BUs by the 10th business day of the month following quarter-end; reforecasts must use the same templates and driver assumptions as the original budget."
    weight: 0.35
    description: "BudgetGovernancePolicy"
  - type: llm_judge
    criteria: "Accountability framework and corrective action management create real consequences — the accountability framework: each of the 85 cost center managers is formally designated as 'Budget Owner' with documented responsibilities: timely budget submission, accurate variance commentary, participation in challenge sessions, and implementation of corrective actions; the escalation protocol: Level 1 — BU Controller reviews all above-threshold variances and signs off on commentary quality; Level 2 — Corporate FP&A reviews consolidated BU reports and identifies cross-BU themes; Level 3 — CFO reviews the consolidated package and escalates board-reportable items; Level 4 — Board receives the standardized variance package through a single format (resolving the current problem of different formats from different committees); corrective action management: every Tier 3 variance investigation must produce a Corrective Action Plan (CAP) with: specific actions, responsible owner, target date, and expected financial impact; CAPs are tracked in a central register reviewed monthly by BU controllers and quarterly by the CFO; overdue CAPs are escalated; completion rates are reported as a KPI; the framework includes non-compliance consequences: repeated failure to meet commentary standards or timeline results in escalation to the BU President, and budget owner performance reviews include a 'budget management effectiveness' component."
    weight: 0.35
    description: "AccountabilityAndCAP"
  - type: llm_judge
    criteria: "Board reporting standards and compliance monitoring close the loop — the board reporting standard mandates: a single, consistent variance format for all board committees (audit committee sees the detailed financial variances, operations committee sees the operational KPI variances, but both use the same data and format); the board package is limited to 8 pages maximum: Page 1 — Executive P&L with traffic lights; Pages 2-7 — One page per BU with key variances; Page 8 — Risk register of variances with potential future-period impact; the format is approved by the board finance committee and changes require committee approval; compliance monitoring: the FP&A team conducts quarterly compliance audits of the variance process — checking: were all above-threshold variances commented? did commentary meet the WHAT-WHY-SO WHAT standard? were thresholds correctly applied? were CAPs created and tracked? were reforecasts submitted on time?; compliance scores are reported to the CFO by BU; the governance framework itself is reviewed annually and updated to reflect changing business conditions, and the internal audit team includes variance process compliance in their annual audit plan."
    weight: 0.30
    description: "BoardReportingAndCompliance"
