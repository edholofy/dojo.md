meta:
  id: expert-variance-shift
  level: 4
  course: budget-variance-analysis
  type: output
  description: "Expert shift simulation — serve as interim CFO managing a severe budget crisis: lead an emergency reforecast, present to the board on a profit miss, redesign the variance process, and negotiate with lenders on covenant compliance"
  tags: [shift-simulation, interim-cfo, budget-crisis, expert]

state: {}

trigger: |
  You are the interim CFO of a $1.2B company after
  the previous CFO departed suddenly. The company
  is facing a budget crisis. Four critical tasks
  require your attention this week.

  TASK 1 — EMERGENCY REFORECAST (due Monday)
  Q2 results just came in and the company will miss
  its annual EBITDA guidance of $120M by a significant
  margin. Prepare an emergency reforecast.

  H1 Actual: Revenue $540M (vs. $600M budget),
  EBITDA $42M (vs. $60M budget)
  H1 run rate annualized: Revenue $1.08B, EBITDA $84M

  Key drivers of the miss:
  - Lost 2 major customers ($25M annual revenue each)
  - Input costs up 12% vs. 5% budgeted
  - Product launch delayed by 6 months ($15M
    revenue impact in H2)

  Prepare optimistic/base/pessimistic H2 scenarios
  and full-year forecast (250 words).

  TASK 2 — BOARD PRESENTATION (due Wednesday)
  The board wants a 10-minute presentation on "what
  went wrong and what we're doing about it."

  Write the presentation narrative (300 words)
  covering: the variance bridge, root causes, and
  the corrective action plan.

  TASK 3 — LENDER COVENANT (due Thursday)
  The company has a $200M credit facility with a
  minimum EBITDA covenant of $100M (LTM basis).

  LTM EBITDA through Q2: $42M (H1 2026) + $58M
  (H2 2025) = $100M — exactly at the covenant
  threshold.

  If H2 2026 EBITDA is below $58M (which the base
  case suggests), the company will breach the
  covenant.

  Draft a 200-word proactive lender communication.

  TASK 4 — PROCESS REDESIGN (due Friday)
  The board asked: "How did we not see this coming?"
  Propose 3 specific process improvements that would
  have caught the budget deterioration earlier.

  Write the 200-word process improvement memo.

  Handle all four tasks.

assertions:
  - type: llm_judge
    criteria: "Emergency reforecast provides realistic scenarios with clear assumptions — Optimistic: H2 revenue $570M (assumes partial customer recovery and product launch in Q4), H2 EBITDA $52M, Full-year EBITDA approximately $94M (22% below guidance); Base: H2 revenue $530M (lost customers are permanent, product launch delays to Q1 2027, input costs remain elevated), H2 EBITDA $42M, Full-year EBITDA approximately $84M (30% below guidance); Pessimistic: H2 revenue $490M (further customer losses, continued cost pressure), H2 EBITDA $32M, Full-year EBITDA approximately $74M (38% below guidance); the scenarios are built on identified drivers (customer loss quantified at $50M annual, input cost impact quantified, product launch timing quantified); the 250-word narrative presents the scenarios clearly and identifies the key swing factors: whether any of the lost revenue can be replaced, whether input costs moderate or escalate, and whether the product launch can be accelerated."
    weight: 0.35
    description: "EmergencyReforecast"
  - type: llm_judge
    criteria: "Board presentation and lender communication demonstrate executive-level communication — the 300-word board narrative: provides the EBITDA variance bridge ($120M guidance → $42M H1 actual + estimated $42-52M H2 = $84-94M full year), explains root causes honestly (the 2 customer losses were not anticipated in the budget because the relationships were considered stable; the 12% input cost increase vs. 5% assumption was a forecast error; the product launch delay was known internally but its revenue impact was not adequately reflected in the forecast), and presents a corrective action plan with specific actions and timeline; the narrative is board-appropriate: honest, strategic, and focused on recovery rather than blame; the 200-word lender communication: proactively informs the lender that the covenant may be at risk in Q3-Q4 based on the revised outlook; requests a meeting to discuss options (covenant amendment, waiver, or equity cure); demonstrates good faith by providing the reforecast scenarios; emphasizes the company's liquidity position and strategic actions; the tone is professional and proactive — lenders respond much better to early notification than to a surprise breach."
    weight: 0.35
    description: "BoardAndLender"
  - type: llm_judge
    criteria: "Process improvement memo answers 'how did we not see this coming?' with specific fixes — the 200-word memo proposes 3 specific improvements: (1) Customer Concentration Risk Monitoring: implement a monthly dashboard tracking revenue concentration by customer — the 2 lost customers represented approximately 4% of revenue each; any customer above 3% should trigger enhanced monitoring with quarterly relationship health assessments and proactive diversification planning; (2) Input Cost Sensitivity Analysis: the budget assumed 5% input cost inflation with no scenario testing; implement mandatory sensitivity analysis on key assumptions — if input costs are ±5% of budget, what is the EBITDA impact? This would have flagged $10M+ risk at budget time; (3) Rolling Forecast with Driver Alerts: replace the annual static budget with a monthly rolling forecast that updates key drivers (customer pipeline, input cost indices, product launch milestones) — the H1 deterioration was visible by January in the leading indicators, but the static budget process didn't surface it until the Q2 close in July; all four tasks demonstrate the ability to operate at CFO level during a crisis — combining analytical rigor with executive communication and stakeholder management."
    weight: 0.30
    description: "ProcessImprovement"
