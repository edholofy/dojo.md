meta:
  id: variance-transformation-case-study
  level: 4
  course: budget-variance-analysis
  type: output
  description: "Write a detailed case study of a budget and variance analysis transformation — document the journey from spreadsheet-based annual budgeting to driver-based rolling forecasts with automated variance analysis"
  tags: [case-study, transformation, driver-based, expert]

state: {}

trigger: |
  Write a publication-ready case study documenting
  the budget and variance analysis transformation
  at "TechManufacture Inc." (fictional $1.5B
  precision manufacturing company).

  TRANSFORMATION TIMELINE: 18 months (Q1 2025 -
  Q2 2026)

  BEFORE STATE (Q4 2024):
  - Annual budget cycle: 5 months (August-December)
  - 150 budget contributors using Excel templates
  - Monthly variance reporting delivered Day 15
  - Variance commentary: numbers restated without
    drivers
  - No formal investigation process
  - Budget considered "stale" by March
  - CFO: "We spend 5 months building a budget that's
    obsolete in 3"
  - Oracle Hyperion on-premise (15 years old)
  - Forecast accuracy: ±12% at revenue level,
    ±18% at EBITDA level

  AFTER STATE (Q2 2026):
  - Rolling 18-month forecast, updated monthly
  - Driver-based model (units, pricing, headcount,
    utilization drive the P&L)
  - Variance reporting delivered Day 5
  - Automated variance alerting (threshold-triggered)
  - Root cause taxonomy with corrective action
    tracking
  - Anaplan platform (cloud-based)
  - Forecast accuracy: ±4% revenue, ±7% EBITDA

  Write the full case study (approximately
  2,500 words) suitable for publication in
  Strategic Finance magazine (IMA).

assertions:
  - type: llm_judge
    criteria: "The case study follows a compelling narrative arc and is specific about the transformation journey — the case study structure: (1) Executive Summary: TechManufacture transformed its budgeting and variance process from a 5-month annual exercise to a continuous rolling forecast with automated variance analysis, reducing forecast error from ±12% to ±4% on revenue and from ±18% to ±7% on EBITDA; (2) The Burning Platform: specific description of why the transformation was necessary — a quarterly earnings miss that the budget process failed to predict (the budget showed a $30M revenue quarter but actuals were $26M — the variance was obvious in the drivers by Month 2 but the static budget process didn't surface it until the quarterly close); the CFO's frustration quote anchors the problem; (3) The Transformation Journey: phased approach — Phase 1 (Months 1-6): driver model design and Anaplan implementation; Phase 2 (Months 7-12): rollout to all 150 users, training, first rolling forecast cycle; Phase 3 (Months 13-18): automation (variance alerting, dashboards, root cause tracking); (4) Results: specific metrics showing improvement; (5) Lessons Learned: honest reflection on what went well and what was harder than expected."
    weight: 0.35
    description: "NarrativeArc"
  - type: llm_judge
    criteria: "The driver-based model design and variance automation are technically detailed — the case study describes the driver model architecture: the P&L is built from operational drivers rather than financial line items — revenue is driven by units × price × mix for each product family (15 families); COGS is driven by material cost per unit × units + labor hours × rate + overhead allocation; OpEx is driven by headcount × fully-loaded cost + discretionary spending by category; this means that when revenue is below forecast, the model automatically identifies whether the miss is price, volume, or mix — there's no need to manually decompose variances after the fact; the variance alerting system: thresholds are set for each driver (e.g., if actual units produced falls more than 5% below the rolling forecast, an alert fires immediately — not at month-end); this provides 'early warning' capability that the old system never had; the case study includes a specific example: in Month 6 of the new process, the Automotive Products division's order backlog dropped below the rolling forecast threshold, triggering an alert that led to a proactive cost reduction 6 weeks before the revenue shortfall hit the P&L — saving an estimated $2M in margin by avoiding ramp-up costs for production that wasn't needed."
    weight: 0.35
    description: "TechnicalDetail"
  - type: llm_judge
    criteria: "Lessons learned and change management insights provide genuine value to readers — the case study honestly addresses the challenges: (1) Change management was harder than technology: the Anaplan implementation took 4 months; getting 150 budget contributors to change their behavior took 12; the hardest transition was moving from 'build a budget once and forget it' to 'update the forecast monthly with real operational data'; (2) Driver identification required operational partnership: the finance team couldn't build a driver model alone — they needed manufacturing operations, sales, and supply chain to identify the real drivers of their costs and revenue; this cross-functional collaboration was the most valuable part of the transformation; (3) 'Perfect is the enemy of good' in driver modeling: the initial model had 200+ drivers, which was too complex for monthly updates; they simplified to 45 key drivers that explained 85% of variance — the remaining 15% was acceptable noise; (4) Forecast accuracy improvement was not linear: accuracy actually got worse in the first 3 months of rolling forecasts (±15% vs. ±12%) because teams were learning the new process; improvement came after the second quarter once teams calibrated their driver assumptions; (5) The cultural shift from 'meeting budget' to 'accuracy': under the old system, managers were rewarded for hitting budget; under the new system, they're rewarded for forecast accuracy — this changed behavior more than any technology; the case study is approximately 2,500 words and reads as a credible IMA Strategic Finance article."
    weight: 0.30
    description: "LessonsAndChangeManagement"
