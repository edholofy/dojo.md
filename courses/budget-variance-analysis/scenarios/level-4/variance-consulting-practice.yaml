meta:
  id: variance-consulting-practice
  level: 4
  course: budget-variance-analysis
  type: output
  description: "Build a budget and variance analysis consulting practice — design advisory offerings, diagnostic methodologies, and go-to-market strategy for improving corporate budgeting and variance processes"
  tags: [consulting, advisory, practice-building, expert]

state: {}

trigger: |
  You are launching a Performance Management
  Advisory practice within a mid-tier consulting
  firm, specializing in budgeting, forecasting,
  and variance analysis.

  MARKET OPPORTUNITY:
  - 80% of CFOs rate their budgeting process as
    "needs significant improvement" (Deloitte survey)
  - Average budget cycle: 4-6 months (best practice
    is 4-6 weeks)
  - 65% of companies still use spreadsheets as their
    primary budgeting tool
  - Variance analysis identified as the #1 area
    where FP&A adds value (AFP survey)
  - EPM software market growing 12% annually
  - Growing demand for driver-based budgeting and
    rolling forecasts

  COMPETITIVE LANDSCAPE:
  - Big 4 firms (enterprise focus, $500K+ projects)
  - EPM software vendors (tool-focused, not process)
  - FP&A training organizations (education, not
    implementation)
  - No dedicated variance analysis advisory firm

  Design:
  1. Service offerings and positioning
  2. Budget and variance maturity assessment model
  3. Diagnostic methodology
  4. Deliverable frameworks
  5. Pricing model and team requirements
  6. Go-to-market strategy

assertions:
  - type: llm_judge
    criteria: "Service offerings fill a genuine market gap and the maturity model is original — the practice positions between Big 4 (too expensive, too broad) and software vendors (tool without process): offerings: (1) Budget & Variance Maturity Assessment ($25-40K): 2-week diagnostic using a proprietary maturity model scoring the organization across 8 dimensions: budget cycle time, forecast accuracy, variance investigation quality, reporting timeliness, technology utilization, stakeholder engagement, driver-based methodology adoption, and continuous improvement culture; each scored 1-5 with detailed rubrics; produces a scorecard, benchmark comparison, and improvement roadmap; (2) Process Redesign ($75-150K): redesign the end-to-end budgeting, forecasting, and variance analysis process based on the assessment findings; includes: process mapping, timeline compression, template standardization, commentary quality standards, and reporting redesign; (3) EPM Implementation Advisory ($50-100K): vendor-neutral guidance for selecting and implementing EPM tools (Anaplan, Adaptive, Hyperion) — the firm advises on requirements and process, not software implementation; (4) Variance Excellence Program ($30-50K): intensive 3-month program focused specifically on improving variance analysis quality — includes commentary standards, root cause taxonomy, investigation protocols, and training for 20-50 finance professionals; (5) Rolling Forecast Transformation ($100-200K): transition from annual budget to rolling forecast with integrated variance analysis."
    weight: 0.35
    description: "ServiceOfferings"
  - type: llm_judge
    criteria: "Diagnostic methodology creates proprietary IP and repeatable value — the Budget & Variance Maturity Assessment is the practice's key differentiator: the 8-dimension maturity model (Budget Cycle Efficiency, Forecast Accuracy, Variance Investigation Quality, Reporting Timeliness, Technology Utilization, Stakeholder Engagement, Driver-Based Methodology, Continuous Improvement) with 5 maturity levels: Level 1 (Ad Hoc): spreadsheet-based, annual budget, static variance reporting, no investigation standards; Level 2 (Developing): basic EPM tool, monthly variance reports, some commentary standards; Level 3 (Defined): integrated EPM, rolling forecasts, standardized commentary, root cause taxonomy; Level 4 (Managed): driver-based budgeting, automated variance alerting, predictive analytics, continuous improvement loops; Level 5 (Optimized): AI-augmented variance analysis, real-time dashboards, zero-based budgeting integration, industry-leading cycle times; the diagnostic process: interviews with CFO and 10-15 finance professionals, review of 3 months of variance packages, budget timeline analysis, technology assessment, benchmark comparison against APQC data; the maturity score becomes a benchmark clients track over time — creating an ongoing relationship and switching costs."
    weight: 0.35
    description: "DiagnosticMethodology"
  - type: llm_judge
    criteria: "Practice economics and go-to-market are viable — Year 1 plan: team of 5 (practice lead with 15+ years CFO/FP&A experience, 2 senior consultants, 1 EPM specialist, 1 analyst); target: 20 Maturity Assessments ($500-800K), 5 Process Redesigns ($375-750K), 3 Variance Excellence Programs ($90-150K) = $965K-$1.7M Year 1 revenue; by Year 3: $3-5M revenue with 10-15 person team; go-to-market: leverage CFO roundtable events (present 'State of Budget & Variance Practices' research), publish annual benchmarking report, partner with IMA and AFP for speaking and certification content, target companies that are evaluating EPM software (they need process advice before tool selection), offer free 30-minute 'Budget Health Check' at FP&A conferences; the unique selling proposition differentiates from Big 4 (focused expertise at mid-market pricing) and from software vendors (process first, tool second)."
    weight: 0.30
    description: "EconomicsAndGTM"
