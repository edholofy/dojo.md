meta:
  id: variance-technology-evaluation
  level: 4
  course: budget-variance-analysis
  type: output
  description: "Lead an enterprise EPM technology evaluation — evaluate and recommend budgeting, forecasting, and variance analysis platforms for a large organization"
  tags: [epm-evaluation, technology, rfp, expert]

state: {}

trigger: |
  The CFO of a $5B manufacturing company has
  authorized an EPM platform replacement to
  modernize the budgeting, forecasting, and
  variance analysis capabilities. Lead the
  evaluation.

  CURRENT STATE:
  - SAP ERP (source of financial data)
  - Oracle Hyperion Planning (12 years old, on-prem,
    reaching end of support)
  - Excel for 60% of variance analysis
  - 200 budget contributors across 8 business units
  - Annual budget cycle: 5 months (too long)
  - Monthly variance reporting: Day 12 (too slow)
  - No automated variance alerting
  - No scenario modeling capability
  - $1.2M annual Hyperion support costs

  REQUIREMENTS:
  - Cloud-based (eliminate on-prem infrastructure)
  - Integrated budgeting, forecasting, and variance
  - Driver-based budgeting capability
  - Rolling forecast support
  - Automated variance detection and alerting
  - Self-service reporting and dashboards
  - SAP integration (real-time if possible)
  - Support for 200+ users
  - Implementation within 12 months

  SHORTLISTED VENDORS:
  1. Anaplan
  2. Workday Adaptive Planning
  3. Oracle Cloud EPM
  4. SAP Analytics Cloud (SAC)
  5. OneStream

  Design:
  1. Evaluation framework and scoring criteria
  2. Vendor assessment (pros/cons for each)
  3. TCO comparison (5-year)
  4. Implementation risk assessment
  5. Recommendation with rationale
  6. Write a 400-word executive summary for the CFO

assertions:
  - type: llm_judge
    criteria: "Evaluation framework is comprehensive and weighted appropriately — the framework scores vendors across 8 categories: (1) Functional Fit (25%): budgeting, forecasting, variance analysis, consolidation, reporting — does the tool support driver-based budgeting, rolling forecasts, and automated variance detection? (2) SAP Integration (20%): critical for this company — SAC has native SAP integration, others require middleware; real-time vs. batch data flow; (3) Ease of Use (15%): for 200+ budget contributors who are not power users — UI quality, training requirements, self-service capability; (4) Total Cost of Ownership (15%): license, implementation, ongoing support over 5 years; (5) Implementation Speed (10%): time to value for a 200-user deployment with 8 BUs; (6) Scalability (5%): can it handle growth, M&A additions, and additional use cases? (7) Vendor Viability (5%): financial stability, roadmap, customer base; (8) Analytics/AI Capability (5%): predictive variance detection, ML-powered forecasting, anomaly detection; each vendor is scored 1-5 on each criterion with specific evidence."
    weight: 0.35
    description: "EvaluationFramework"
  - type: llm_judge
    criteria: "Vendor assessment provides genuine differentiation and the TCO comparison is credible — each vendor has honest pros and cons: Anaplan: PRO — most flexible modeling engine, strong driver-based budgeting, excellent user community; CON — expensive, complex to implement, SAP integration requires custom connectors, learning curve for model builders; Workday Adaptive: PRO — easiest to use, fastest implementation, good mid-market fit; CON — less powerful for complex modeling, limited consolidation, may not scale for $5B company complexity; Oracle Cloud EPM: PRO — strong consolidation, natural migration from Hyperion, comprehensive financial close suite; CON — UI less intuitive than competitors, implementation can be complex, vendor lock-in; SAP SAC: PRO — native SAP integration (major advantage for this company), combined analytics and planning, real-time data; CON — planning capabilities less mature than purpose-built EPM tools, still evolving; OneStream: PRO — unified platform (budgeting + consolidation + reporting), strong financial close, corporate performance management; CON — smaller market share, fewer implementation partners, requires more specialized skills; 5-year TCO comparison estimates for each vendor considering: license/subscription, implementation services, internal IT resources, training, ongoing support, and data integration costs."
    weight: 0.35
    description: "VendorAssessmentAndTCO"
  - type: llm_judge
    criteria: "Executive summary provides a clear recommendation with rationale — the 400-word summary: (1) recommends one or two finalists (the recommendation should logically follow from the evaluation criteria — for a SAP shop, SAC has a natural integration advantage, but if functional depth is prioritized, Anaplan or OneStream may score higher); (2) explains the rationale: weighted score results, key differentiating factors, and how the recommendation aligns with the company's specific context (SAP ERP, 200 users, 5-month budget cycle to compress); (3) addresses the top risk for the recommended vendor (e.g., if SAC: planning maturity concerns require validation through a proof-of-concept; if Anaplan: SAP integration complexity needs to be proven); (4) proposes next steps: proof-of-concept with the top 2 vendors (4-6 weeks each), reference calls with similar-size manufacturing companies, and final selection by quarter-end; (5) provides the financial context: the current Hyperion costs $1.2M/year with declining support — the new platform investment should pay for itself through efficiency gains (budget cycle reduction from 5 months to 6 weeks, variance reporting from Day 12 to Day 5) within 2-3 years; the summary is CFO-appropriate: strategic, financial, and decision-oriented."
    weight: 0.30
    description: "ExecutiveSummary"
