meta:
  id: variance-knowledge-management
  level: 4
  course: budget-variance-analysis
  type: output
  description: "Design a knowledge management system for variance analysis — capture institutional knowledge about variance drivers, investigation techniques, and corrective actions to accelerate analyst effectiveness"
  tags: [knowledge-management, institutional-memory, analyst-development, expert]

state: {}

trigger: |
  The FP&A director has noticed that when experienced
  analysts leave, the variance analysis quality drops
  significantly. The knowledge about WHY variances
  occur and HOW to investigate them lives in people's
  heads, not in any system.

  CURRENT PROBLEMS:
  - New analysts take 6-12 months to produce
    acceptable variance commentary
  - When the Aerospace analyst left, it took 3
    quarters for the replacement to understand
    the BU's variance patterns
  - Root cause knowledge is not shared across BUs
    (the Healthcare team solved a vendor pricing
    issue that Manufacturing is still investigating)
  - Historical variance patterns are lost — the same
    variance explanations are "discovered" repeatedly
  - The annual budget process doesn't incorporate
    lessons from prior-year variances

  COMPANY: $3B company, 6 BUs, 35 FP&A analysts,
  average tenure 3.2 years (significant turnover)

  Design:
  1. Variance knowledge base architecture
  2. Knowledge capture process
  3. Searchable variance pattern library
  4. Onboarding accelerator for new analysts
  5. Cross-BU learning mechanisms
  6. Integration with the budget process

assertions:
  - type: llm_judge
    criteria: "Knowledge base architecture captures the right types of variance knowledge — the architecture has 3 layers: (1) Variance Pattern Library: a structured database of recurring variance patterns, each documented with: the variance description (what it looks like in the data), the root cause (what actually causes it), the investigation approach (how to confirm the root cause), the corrective action (what to do about it), historical frequency (how often it occurs), and the business context (which BUs/seasons/products are affected); examples: 'Q4 revenue acceleration followed by Q1 revenue decline — driven by customer pull-forward purchases to meet annual volume rebate thresholds' or 'Maintenance expense spikes every 18 months in manufacturing BUs — driven by planned equipment overhaul cycles that are not properly reflected in monthly budget phasing'; (2) Investigation Playbooks: step-by-step guides for investigating common variance types — 'Revenue variance investigation playbook: Step 1: check volume vs. price vs. mix; Step 2: if volume, check by customer/product/channel; Step 3: if customer-specific, check CRM for deal status; Step 4: if market-wide, check industry data'; (3) Expert Network Map: who in the organization has deep knowledge of which variance areas — so that a new Manufacturing analyst can quickly find the retired Aerospace analyst's replacement who understood vendor pricing patterns."
    weight: 0.35
    description: "KnowledgeBaseArchitecture"
  - type: llm_judge
    criteria: "Knowledge capture and cross-BU learning mechanisms are practical — the knowledge capture process: (1) Automatic capture: every variance commentary submitted through the variance reporting tool is automatically tagged and indexed in the knowledge base — over time, this creates a searchable history of thousands of variance explanations; NLP categorizes them by root cause type; (2) Structured capture: after each quarterly close, each BU's lead analyst spends 30 minutes documenting any NEW variance patterns discovered that quarter — what was the variance, what caused it, and what would they tell a future analyst about investigating it; (3) Exit interviews: when an analyst leaves, a 2-hour knowledge transfer session is conducted specifically about variance knowledge — what are the patterns in this BU? What are the 'tricks' for investigating common variances? What should the replacement know?; cross-BU learning: (1) Monthly 'Variance Insights' newsletter: the FP&A director highlights the most interesting or instructive variance investigation from any BU each month — 'The Healthcare team discovered that their pharmacy cost variance was driven by a new generic drug availability — this same pattern may appear in other BUs with healthcare benefit costs'; (2) Quarterly cross-BU variance review: representatives from each BU share their top 3 variance patterns; this has directly solved the problem of siloed knowledge (the vendor pricing issue example); (3) Variance analysis 'office hours': experienced analysts hold weekly open sessions where junior analysts can bring challenging variances for collaborative investigation."
    weight: 0.35
    description: "KnowledgeCaptureAndSharing"
  - type: llm_judge
    criteria: "Onboarding accelerator and budget integration create measurable value — the onboarding program for new analysts: Week 1: overview of the knowledge base, assigned 'investigation playbooks' for their BU's top 20 variance patterns (the analyst reads and studies the patterns before encountering them in real data); Week 2-3: shadow the departing analyst (if available) or work through 6 months of historical variance reports with the knowledge base open — annotating each variance with what they've learned; Week 4: produce a 'practice' variance report for the most recent month with mentor review; Weeks 5-8: produce real variance reports with mentor review and quality scoring; target: reduce time-to-competency from 6-12 months to 8-12 weeks; budget integration: the knowledge base feeds directly into the annual budget process — (1) before budget season, each BU reviews its variance pattern library to identify which patterns were due to budget errors (wrong assumptions) vs. genuine business changes; (2) budget assumptions are explicitly linked to variance lessons — 'Q4 seasonality factor increased from 1.15 to 1.20 based on 3 years of consistent unfavorable variance data suggesting the old factor was too low'; (3) the budget includes a 'Known Variance Risk Register' — patterns that are likely to cause variances even in the best budget (e.g., commodity price volatility) with estimated ranges; success metrics: time-to-competency for new analysts, repeat investigation rate (how often the same root cause is 'discovered' for the first time), cross-BU pattern sharing frequency, and forecast accuracy improvement attributed to budget lessons learned."
    weight: 0.30
    description: "OnboardingAndBudgetIntegration"
