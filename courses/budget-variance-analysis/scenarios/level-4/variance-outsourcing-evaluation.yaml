meta:
  id: variance-outsourcing-evaluation
  level: 4
  course: budget-variance-analysis
  type: output
  description: "Evaluate outsourcing the variance analysis function — assess build vs. buy vs. outsource options for FP&A variance analysis in a shared services model"
  tags: [outsourcing, shared-services, build-vs-buy, expert]

state: {}

trigger: |
  The CFO is considering outsourcing the transactional
  variance analysis function to a shared services
  center or BPO provider. Evaluate the options.

  CURRENT STATE:
  - 25 FP&A analysts across 6 regions perform
    variance analysis
  - 15 analysts focus primarily on variance
    calculation, data compilation, and first-draft
    commentary (transactional)
  - 10 analysts focus on insight generation,
    business partnering, and strategic analysis
  - Total FP&A variance analysis cost: $4.5M/year
    (fully loaded)
  - Monthly close to variance report: 10 business
    days
  - Quality varies significantly by region

  OPTIONS:
  1. Status Quo: maintain current decentralized model
  2. Internal Shared Services: consolidate the 15
     transactional roles into a centralized hub
     (likely India or Costa Rica)
  3. BPO Provider A: Tier 1 provider (Genpact/Accenture)
     offering end-to-end FP&A services; cost: $2.8M/year
  4. BPO Provider B: Niche FP&A outsourcer with
     industry specialization; cost: $2.2M/year
  5. Hybrid: outsource data/calculation to BPO,
     retain commentary and insight internally

  CONSTRAINTS:
  - CFO insists on maintaining quality and control
  - Board has a cost reduction target of 15%
  - SOX compliance requirements for financial
    reporting controls
  - Some regions have data residency requirements
  - Employee morale is a concern (restructuring)

  Evaluate:
  1. Detailed comparison of all 5 options
  2. Risk assessment for each
  3. SOX and compliance implications
  4. Transition plan for the recommended option
  5. Change management and communication strategy
  6. Write a 400-word recommendation memo

assertions:
  - type: llm_judge
    criteria: "Option comparison is thorough and balanced — each option evaluated across 8 criteria: cost (annual fully loaded), quality (variance report accuracy and insight depth), speed (days to variance report), control (management oversight capability), compliance (SOX, data residency), scalability, talent (access to skilled analysts), and risk (execution, vendor dependency, knowledge loss); Status Quo: cost $4.5M (highest), quality varies, speed 10 days, full control, full compliance; no risk but doesn't meet cost target; Internal Shared Services: cost approximately $3.2M (30% savings from labor arbitrage), standardized quality, speed 7-8 days (follow-the-sun), high control, manageable compliance, requires $800K setup investment, execution risk medium; BPO Provider A: cost $2.8M (38% savings), quality governed by SLA, speed 7 days (contractual), reduced control (vendor manages team), compliance requires careful contract structure, low setup cost, medium-high vendor dependency risk; BPO Provider B: cost $2.2M (51% savings), specialized quality, speed 6-7 days, limited control, compliance concerns (smaller provider, less mature SOX experience), lowest cost but highest risk; Hybrid: cost approximately $3.0M (33% savings — outsource $1.5M of the $4.5M and retain $1.5M of insight roles), maintains quality on insight generation, speed 6-7 days (outsourced data ready Day 4, internal commentary by Day 7), good control split, manageable compliance, moderate risk."
    weight: 0.35
    description: "OptionComparison"
  - type: llm_judge
    criteria: "Risk assessment and compliance analysis are specific to variance analysis outsourcing — risks by option: BPO risks: (1) Knowledge Loss: the transactional analysts have deep institutional knowledge about why variances occur — this context is hard to transfer to an external provider; the first 6 months post-transition will likely see quality degradation; (2) SOX Implications: if variance analysis feeds into financial reporting (which it does for quarterly filings), the outsourced process must be included in the company's SOX scope; the BPO provider must maintain ISAE 3402/SOC 1 certification; management retains responsibility for the outsourced controls; (3) Data Residency: some regions (EU, certain APAC) have data residency requirements; if the BPO operates from India, financial data transfer requires compliance with local data protection laws and potentially Data Processing Agreements; (4) Vendor Lock-in: transitioning back from BPO is costly and disruptive; the hybrid model mitigates this by only outsourcing the commoditized calculation layer; Internal Shared Services risks: (1) Execution: building a shared services center takes 12-18 months and requires significant management attention; (2) Retention: existing analysts in the regions will need to be either relocated, retrained, or separated — all are disruptive; (3) Cultural: regional business units may resist losing 'their' analysts; the compliance analysis explicitly addresses SOX requirements: which controls transfer, which stay, and how management maintains oversight."
    weight: 0.35
    description: "RiskAndCompliance"
  - type: llm_judge
    criteria: "The recommendation memo is decisive and addresses all stakeholder concerns — the 400-word memo recommends one option (likely the Hybrid model based on the criteria, though other recommendations are acceptable if well-reasoned): (1) the recommendation achieves the 15% cost reduction target while maintaining quality and control; (2) it separates the variance function into 'commoditizable' (data extraction, variance calculation, template population) and 'non-commoditizable' (root cause analysis, business partnering, strategic insight); (3) the commoditizable work is outsourced (or moved to shared services), reducing costs through labor arbitrage; (4) the insight-generating roles are retained and elevated — these analysts become business partners rather than data compilers; (5) SOX compliance is maintained through a robust Service Organization Control framework; (6) the transition plan phases the change over 9-12 months: Month 1-3 process documentation and vendor selection, Month 4-6 parallel operations, Month 7-9 phased transition by region, Month 10-12 stabilization and optimization; (7) the change management section addresses the human impact directly: affected employees are offered relocation to the shared services center, transition to the retained insight roles (with retraining), or a generous severance package; communication is transparent from Day 1; the memo acknowledges that cost savings come with risk and that the transition period will require additional investment in quality assurance."
    weight: 0.30
    description: "RecommendationMemo"
