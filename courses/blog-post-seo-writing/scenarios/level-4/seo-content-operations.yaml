meta:
  id: seo-content-operations
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Build scalable SEO content operations for a growing content team"
  tags: [seo, content-operations, workflow, scaling, team-management]

state: {}

trigger: |
  As content teams grow, SEO quality often drops. Individual expertise
  doesn't scale — you need systems, templates, and quality gates that
  maintain SEO standards across 20+ writers.

  You're the Head of Content at a Series B SaaS company. Your team:
  - 3 full-time content writers
  - 5 freelance writers
  - 1 SEO specialist
  - 1 editor
  Current output: 30 posts/month. Target: 60 posts/month in 6 months.

  Design the content operations system:

  1. SEO content brief template:
     Create a comprehensive brief template that any writer can follow:
     - Target keyword and secondary keywords
     - Search intent classification
     - Competitor analysis summary (top 3 ranking posts)
     - Required H2/H3 structure
     - Minimum word count and content depth requirements
     - Required internal links
     - E-E-A-T requirements (expert quotes, data sources, examples)
     - Featured snippet opportunity notes
     - Mandatory SEO checklist items

  2. Quality gate system:
     Design a 4-stage review process:
     - Stage 1: Brief approval (before writing starts)
     - Stage 2: Draft review (content quality + SEO compliance)
     - Stage 3: SEO audit (technical optimization check)
     - Stage 4: Final approval (editor sign-off)
     For each stage: who reviews, what they check, pass/fail criteria,
     and turnaround time expectations

  3. Writer onboarding and training:
     - SEO writing guide for new writers (key rules in 1 page)
     - Common mistakes new writers make and how to prevent them
     - SEO scoring rubric for self-assessment
     - Feedback loop: how to learn from post-publication performance

  4. Performance measurement:
     - Per-writer SEO metrics (which writers' posts rank best?)
     - Content pipeline metrics (throughput, quality scores, revision rates)
     - SEO impact metrics (organic traffic growth, keyword rankings)
     - How to identify bottlenecks in the content pipeline

  5. Tool stack recommendation:
     - Content brief generation
     - SEO optimization during writing
     - Editorial workflow management
     - Performance tracking
     - How tools connect in the workflow

assertions:
  - type: llm_judge
    criteria: "The content brief template is detailed enough for any writer to produce SEO-optimized content without deep SEO knowledge — includes specific keyword targets, structure requirements, and a clear checklist"
    weight: 0.30
    description: "Self-sufficient content brief template"
  - type: llm_judge
    criteria: "The quality gate system has clear pass/fail criteria at each stage — not just 'review for quality' but specific checkpoints (keyword density range, internal link minimum, meta tag compliance)"
    weight: 0.25
    description: "Clear pass/fail quality criteria"
  - type: llm_judge
    criteria: "The scaling plan is realistic — doubling output from 30 to 60 posts/month with this team size requires specific efficiency gains, and the plan identifies where those gains come from"
    weight: 0.25
    description: "Realistic scaling plan"
  - type: llm_judge
    criteria: "Per-writer performance metrics are actionable — tracking which writers produce posts that rank best allows for targeted coaching and assignment optimization"
    weight: 0.20
    description: "Actionable per-writer metrics"
