meta:
  id: ai-overview-optimization
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Optimize blog content for Google's AI Overviews and generative search"
  tags: [seo, ai-overviews, generative-search, sge, future-seo]

state: {}

trigger: |
  Google's AI Overviews (formerly SGE) generate AI-powered summaries at
  the top of search results, citing sources. This changes SEO fundamentally:
  your content needs to be good enough to be cited by AI, not just ranked.

  In 2026, AI Overviews appear for roughly 40% of informational queries
  and are expanding to more query types.

  You're adapting a technology media site's SEO strategy for AI Overviews.

  Provide the complete AI Overview optimization strategy:

  1. How AI Overviews change SEO:
     - Which query types trigger AI Overviews (and which don't)
     - How AI Overviews select and cite sources
     - Impact on organic CTR (data and estimates for 2026)
     - Which content types benefit from AI Overviews (getting cited)
     - Which content types are hurt (traffic stolen by the summary)

  2. Content optimization for AI citation:
     - What makes content "citable" by Google's AI
     - Structural elements that increase citation probability
     - Writing style that AI summaries prefer to quote
     - How to format data, statistics, and expert opinions for citation
     - Write a 300-word blog section optimized for AI citation on the
       topic "What is quantum computing?" — annotate why each element
       is optimized for AI citation

  3. Query classification framework:
     Classify these queries by AI Overview impact:
     a) "what is kubernetes" — full AI Overview likely
     b) "best CRM software 2026" — partial AI Overview with product links
     c) "how to configure nginx reverse proxy" — code-focused, less likely
     d) "is Salesforce worth the price" — opinion-based, variable
     e) "[specific error code] fix" — AI Overview with solution steps

     For each: expected AI Overview behavior, impact on organic traffic,
     and content strategy adaptation

  4. Defensive strategies:
     - How to maintain traffic when AI Overviews answer the query
     - Creating content that goes beyond what AI can summarize
     - Building brand recognition so users click through anyway
     - Long-tail and niche queries where AI Overviews don't appear
     - Original research and unique data that AI must cite

  5. Measurement and adaptation:
     - How to track AI Overview citations
     - Metrics that matter in an AI Overview world
     - When to pivot content strategy based on AI Overview changes
     - Future-proofing: what happens as AI Overviews expand further

assertions:
  - type: llm_judge
    criteria: "The AI Overview analysis is current and accurate — correctly represents 2026 AI Overview behavior, including which queries trigger them, how sources are selected, and the real impact on CTR"
    weight: 0.30
    description: "Current accurate AI Overview analysis"
  - type: llm_judge
    criteria: "The citation-optimized writing sample is clearly annotated — each element (clear definitions, structured data, expert attribution, specific statistics) is explained in terms of why it increases AI citation probability"
    weight: 0.25
    description: "Clearly annotated citation-optimized writing"
  - type: llm_judge
    criteria: "The defensive strategies are substantive — goes beyond 'write better content' to specific tactics like creating content AI can't summarize, building brand recognition, and targeting AI Overview-free query types"
    weight: 0.25
    description: "Substantive defensive strategies"
  - type: llm_judge
    criteria: "The query classification is nuanced — different query types get different AI Overview treatments, and the content strategy adapts accordingly rather than applying one approach to all queries"
    weight: 0.20
    description: "Nuanced query classification"
