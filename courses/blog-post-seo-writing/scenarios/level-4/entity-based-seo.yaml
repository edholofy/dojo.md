meta:
  id: entity-based-seo
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Optimize blog content for Google's entity-based understanding and Knowledge Graph"
  tags: [seo, entities, knowledge-graph, semantic-seo, advanced]

state: {}

trigger: |
  Google's Knowledge Graph understands entities (people, places, concepts,
  brands) and their relationships. Entity-based SEO means writing content
  that helps Google connect your content to its entity understanding,
  improving relevance signals beyond keywords.

  You're optimizing a healthcare technology blog for entity-based SEO.

  Provide the complete entity optimization strategy:

  1. Entity identification for your niche:
     - Map the key entities in healthcare technology
     - Primary entities: your brand, products, key personnel
     - Related entities: technologies, conditions, regulations, organizations
     - Show the entity relationship map (brand → products → use cases →
       conditions → regulations)
     - How Google's Knowledge Graph connects these entities

  2. Content optimization for entities:
     Take this blog post topic: "How Telehealth Is Transforming
     Chronic Disease Management"

     - Identify all entities in the topic (telehealth, chronic disease,
       specific conditions, technologies, regulatory bodies)
     - Write a 500-word section that naturally incorporates entity
       relationships
     - Show how to use co-occurring entities to strengthen topical relevance
     - Demonstrate entity-first writing vs keyword-first writing

  3. Author entity building:
     - How to establish your authors as recognized entities
     - Google Scholar, Wikipedia, professional profiles
     - Structured data for author entities (Person schema)
     - Why author entities matter more post-E-E-A-T update
     - Building author pages that Google can connect to external profiles

  4. Brand entity optimization:
     - How to get your brand into Google's Knowledge Graph
     - Knowledge panel triggering strategies
     - Consistent entity signals across the web (Wikipedia, Wikidata,
       Crunchbase, LinkedIn)
     - How brand entity strength affects all content rankings

  5. Entity-based content planning:
     - How to use entity research to find content topics
     - Tools and methods for entity analysis
     - Building content that fills entity relationship gaps
     - Measuring entity-based SEO progress

assertions:
  - type: llm_judge
    criteria: "The entity relationship map is coherent — shows how healthcare technology entities connect to each other in ways that reflect Google's actual Knowledge Graph structure"
    weight: 0.25
    description: "Coherent entity relationship map"
  - type: llm_judge
    criteria: "The entity-optimized writing sample demonstrates the difference — shows how mentioning related entities (specific conditions, FDA, specific telehealth platforms) strengthens topical relevance compared to keyword-only optimization"
    weight: 0.30
    description: "Clear entity vs keyword writing difference"
  - type: llm_judge
    criteria: "The author entity strategy is actionable — specific steps for building author recognition that Google can verify (not just 'create a bio page' but linking to external authority sources)"
    weight: 0.25
    description: "Actionable author entity strategy"
  - type: llm_judge
    criteria: "The Knowledge Graph entry strategy is realistic — accurately represents how brands enter the Knowledge Graph (consistent structured data, Wikipedia notability, Wikidata entries) rather than oversimplifying"
    weight: 0.20
    description: "Realistic Knowledge Graph entry strategy"
