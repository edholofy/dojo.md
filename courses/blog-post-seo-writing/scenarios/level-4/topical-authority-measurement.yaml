meta:
  id: topical-authority-measurement
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Measure and build topical authority through strategic content coverage"
  tags: [seo, topical-authority, measurement, content-strategy, expertise]

state: {}

trigger: |
  Topical authority is Google's assessment of how comprehensively and
  expertly your site covers a subject area. Sites with high topical
  authority rank individual posts more easily than sites covering
  topics randomly.

  You're building topical authority for a cybersecurity company blog
  that currently publishes content across too many unrelated topics.

  Design the topical authority strategy:

  1. Topical authority audit:
     Current content coverage (100 posts total):
     - 25 posts on network security (your core business)
     - 15 posts on cloud security
     - 12 posts on compliance and regulations
     - 10 posts on general IT tips (off-topic)
     - 10 posts on company news (off-topic)
     - 8 posts on cybersecurity careers
     - 8 posts on data privacy
     - 7 posts on endpoint security
     - 5 posts on AI in cybersecurity

     Assess:
     - Which topic areas contribute to topical authority?
     - Which dilute it?
     - What's the "topic coverage score" for your core areas?
     - What gaps exist in your core topic coverage?

  2. Topical authority building plan:
     - Define 3-4 core topic pillars to dominate
     - For each pillar: current coverage, target coverage, content gaps
     - Content needed to achieve comprehensive coverage per pillar
     - Timeline to build authority (how many posts, over what period)
     - What to do with off-topic content (delete, redirect, or noindex)

  3. Measurement framework:
     - Proxy metrics for topical authority (since Google doesn't expose it):
       a) Average position for topic cluster keywords
       b) Number of keywords ranking in top 10 per topic
       c) Share of voice vs competitors per topic
       d) New content indexing speed per topic area
       e) Featured snippet ownership per topic
     - How to track these metrics over time
     - Benchmarks: what "strong" vs "weak" topical authority looks like

  4. Content velocity strategy:
     - How fast to publish to build authority without sacrificing quality
     - Depth vs breadth: when to go deeper on existing topics vs expand
     - Content format mix for authority building
     - How to outpace competitors' authority in specific niches

  5. Case study analysis:
     - Analyze how a hypothetical competitor with 200 posts focused
       entirely on "cloud security" outranks your site's cloud security
       posts despite having lower domain authority
     - What this reveals about topical authority vs domain authority

assertions:
  - type: llm_judge
    criteria: "The audit correctly identifies off-topic content as a dilution problem — general IT tips and company news don't contribute to cybersecurity topical authority and should be addressed"
    weight: 0.25
    description: "Correctly identified topic dilution"
  - type: llm_judge
    criteria: "The measurement framework uses practical proxy metrics — since topical authority isn't directly measurable, the proposed metrics (cluster keyword positions, share of voice, indexing speed) are valid proxies with clear tracking methods"
    weight: 0.25
    description: "Practical proxy measurement metrics"
  - type: llm_judge
    criteria: "The building plan is strategic, not just 'publish more' — identifies specific gaps in core topic coverage, prioritizes high-impact content, and includes a realistic timeline"
    weight: 0.25
    description: "Strategic authority building plan"
  - type: llm_judge
    criteria: "The case study correctly explains topical authority vs domain authority — a focused site with lower DA can outrank a broader site with higher DA for specific topics, demonstrating why focus matters"
    weight: 0.25
    description: "Correct topical vs domain authority explanation"
