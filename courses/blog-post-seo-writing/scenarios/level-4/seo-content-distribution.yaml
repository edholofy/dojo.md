meta:
  id: seo-content-distribution
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Distribute blog content strategically to build backlinks and amplify SEO"
  tags: [seo, content-distribution, link-building, amplification, outreach]

state: {}

trigger: |
  Publishing great content isn't enough — distribution determines whether
  it earns backlinks, social signals, and the initial engagement that
  Google uses as early ranking signals.

  You've just published a major piece of original research:
  "State of Developer Productivity 2026" — a 5,000-word report with
  25 original data points from surveying 2,000 developers.

  Design the complete distribution strategy to maximize SEO impact:

  1. Pre-launch preparation (1 week before publishing):
     - Teaser content strategy (social, email, community)
     - Influencer seeding (who to share with early and why)
     - Press/media embargo strategy
     - Landing page optimization for the report
     - Email list segmentation for launch announcement

  2. Launch day distribution (24-hour plan):
     - Hour-by-hour launch sequence
     - Platform-specific content for: LinkedIn, Twitter/X, Hacker News,
       Reddit, dev communities, email newsletter
     - How to adapt the same content for each platform (not copy-paste)
     - Engagement response strategy (replying to comments, shares)

  3. Outreach for backlinks (weeks 1-4):
     - Journalist outreach: which publications cover developer productivity
     - Blogger outreach: identify 50 potential linking sites
     - Outreach email template (personalized, not spammy)
     - Follow-up cadence
     - What to offer: exclusive data points, expert quotes, custom graphics
     - Expected response rate and link acquisition targets

  4. Content atomization for long-tail SEO:
     - Break the report into 8 derivative blog posts
     - Each derivative targets a different long-tail keyword
     - How derivatives link back to the main report
     - Social media micro-content from key data points
     - Infographic and visual asset creation plan

  5. Syndication strategy:
     - Where to syndicate (Medium, LinkedIn Articles, industry publications)
     - Canonical tag strategy to prevent duplicate content issues
     - How syndication builds backlinks without hurting original rankings
     - When syndication helps vs hurts SEO

  6. Measuring distribution ROI:
     - Backlinks acquired per channel
     - Referral traffic by source
     - Social signals and their indirect SEO impact
     - Total earned media value calculation

assertions:
  - type: llm_judge
    criteria: "The outreach strategy is specific and actionable — identifies actual publication types and blogger categories to target, with a personalized email approach rather than mass-blast outreach"
    weight: 0.25
    description: "Specific actionable outreach strategy"
  - type: llm_judge
    criteria: "The content atomization plan creates genuinely distinct derivative pieces — each targets a different keyword and angle, not just the same content repackaged 8 times"
    weight: 0.25
    description: "Genuinely distinct derivative content"
  - type: llm_judge
    criteria: "The syndication strategy correctly handles duplicate content — explains canonical tags, publication timing, and when to use full syndication vs excerpts to protect SEO value"
    weight: 0.25
    description: "Correct syndication duplicate handling"
  - type: llm_judge
    criteria: "The launch sequence is realistic and well-timed — the hour-by-hour plan accounts for platform-specific optimal posting times and engagement patterns"
    weight: 0.25
    description: "Realistic well-timed launch sequence"
