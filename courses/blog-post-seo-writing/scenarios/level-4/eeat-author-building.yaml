meta:
  id: eeat-author-building
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Build comprehensive E-E-A-T author profiles that boost content rankings"
  tags: [seo, eeat, author-authority, expertise, trust-signals]

state: {}

trigger: |
  Google's E-E-A-T (Experience, Expertise, Authoritativeness, Trustworthiness)
  framework heavily weights WHO writes the content. Author entities with
  verifiable expertise rank better, especially for YMYL topics.

  You're building E-E-A-T author profiles for a health and wellness
  publication with 5 authors:

  Author 1: Dr. Lisa Park — Board-certified dermatologist, 15 years practice
  Author 2: Mike Torres — Certified personal trainer, NASM-CPT, 8 years
  Author 3: Sarah Kim — Registered dietitian, MS Nutrition, 6 years
  Author 4: Alex Chen — Health journalist, no medical credentials, 10 years writing
  Author 5: Jordan Wright — New hire, recently graduated nutrition science degree

  For each author, design their E-E-A-T optimization:

  1. Author page design:
     - What to include on the author bio page
     - Credentials display (degrees, certifications, affiliations)
     - Experience signals (years of practice, patient count, publications)
     - External verification links (medical board, LinkedIn, publications)
     - Author schema markup (Person schema with credentials)

  2. Cross-platform authority signals:
     - Which external platforms each author should have profiles on
     - How Google connects author profiles across the web
     - Publication history and citation building
     - Speaking engagements, podcast appearances, media quotes

  3. Content-level E-E-A-T signals:
     - How authors should demonstrate Experience in their writing
       (first-person clinical examples for Dr. Park, client stories for Mike)
     - Expert review badges for content reviewed by credentialed authors
     - Medical review disclosure format for health content
     - How to handle Author 4 (journalist) writing YMYL content
       (expert review process, disclosure, co-authoring strategies)

  4. Building E-E-A-T for Author 5 (new hire):
     - How to build authority for someone without established credentials
     - Co-authoring strategy with senior authors
     - Content types appropriate for their experience level
     - 6-month E-E-A-T building roadmap

  5. E-E-A-T audit checklist:
     - How to audit existing content for E-E-A-T signals
     - Common E-E-A-T deficiencies and fixes
     - Priority: which content needs E-E-A-T upgrades most urgently
     - How to measure E-E-A-T improvement impact on rankings

assertions:
  - type: llm_judge
    criteria: "The author page designs include verifiable credentials — not just self-reported claims but links to medical boards, certification databases, and external publications that Google can verify"
    weight: 0.25
    description: "Verifiable credential display"
  - type: llm_judge
    criteria: "The journalist (Author 4) YMYL strategy is sound — correctly addresses that a non-credentialed writer needs expert review processes, medical disclaimers, and co-authoring with credentialed experts for health content"
    weight: 0.25
    description: "Sound journalist YMYL strategy"
  - type: llm_judge
    criteria: "The new author (Author 5) roadmap is realistic — building E-E-A-T takes time, and the plan acknowledges this with appropriate content restrictions early on and gradual authority building"
    weight: 0.25
    description: "Realistic new author E-E-A-T roadmap"
  - type: llm_judge
    criteria: "The content-level Experience signals are specific — shows how each author type can demonstrate first-hand experience (clinical cases, client transformations, dietary consultations) rather than generic expertise claims"
    weight: 0.25
    description: "Specific Experience signal demonstrations"
