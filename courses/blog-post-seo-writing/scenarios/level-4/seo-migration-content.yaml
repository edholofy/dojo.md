meta:
  id: seo-migration-content
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Manage blog content during a site migration without losing SEO value"
  tags: [seo, site-migration, redirects, content-preservation, technical-seo]

state: {}

trigger: |
  Site migrations are one of the riskiest events for SEO. Even well-planned
  migrations typically see a 10-20% temporary traffic dip. Poor migrations
  can destroy years of SEO work permanently.

  Your company is migrating from a WordPress blog (blog.company.com) to
  a new headless CMS on the main domain (company.com/blog/). The blog has:
  - 300 published posts
  - 45,000 organic visits/month
  - 2,500 referring domains
  - 150 posts ranking in top 10 for target keywords

  Design the content migration plan:

  1. Pre-migration audit:
     - Complete URL inventory (old URL → new URL mapping)
     - Content to migrate vs content to retire
     - Criteria for deciding what to keep, merge, or delete
     - Backlink audit: which pages have the most valuable backlinks?
     - Current ranking snapshot for benchmarking

  2. URL mapping strategy:
     - URL structure change: blog.company.com/post-slug →
       company.com/blog/post-slug
     - 301 redirect map (every old URL to new URL)
     - Handling URL pattern changes (categories, tags, pagination)
     - Edge cases: broken links, orphaned pages, internal redirects
     - Show 10 example URL mappings covering different scenarios

  3. Content optimization during migration:
     - Should you update content during migration or migrate first?
     - Which content to improve simultaneously (high-potential posts)
     - How to handle date changes (published date vs modified date)
     - Canonical tag strategy during and after migration
     - XML sitemap updates and submission timing

  4. Technical SEO preservation:
     - Internal link update plan (300 posts × average 5 internal links each)
     - Image URL handling (moved images, CDN changes)
     - Schema markup migration
     - Robots.txt and meta robots changes
     - Google Search Console property setup for new domain

  5. Post-migration monitoring:
     - Day 1, Week 1, Month 1, Month 3 checkpoints
     - Metrics to monitor at each checkpoint
     - Red flags that indicate migration problems
     - Recovery plan if traffic drops more than 20%
     - When to expect full traffic recovery (realistic timeline)

assertions:
  - type: llm_judge
    criteria: "The redirect strategy is comprehensive — covers not just post URLs but also categories, tags, pagination, feed URLs, and image URLs, preventing redirect chains and loops"
    weight: 0.30
    description: "Comprehensive redirect strategy"
  - type: llm_judge
    criteria: "The pre-migration audit prioritizes high-value content — identifies which of the 300 posts have the most backlinks and rankings, ensuring these get the most careful migration treatment"
    weight: 0.25
    description: "Value-prioritized pre-migration audit"
  - type: llm_judge
    criteria: "The monitoring plan has clear checkpoints and thresholds — specific metrics at Day 1, Week 1, Month 1, Month 3 with defined red flags (e.g., '404 errors exceeding X, ranking drops on Y pages')"
    weight: 0.25
    description: "Clear monitoring checkpoints and thresholds"
  - type: llm_judge
    criteria: "The recovery plan is realistic — acknowledges a 10-20% temporary dip is normal, specifies when to worry vs when to wait, and provides specific actions if traffic doesn't recover within expected timelines"
    weight: 0.20
    description: "Realistic recovery plan"
