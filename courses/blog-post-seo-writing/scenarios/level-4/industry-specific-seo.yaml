meta:
  id: industry-specific-seo
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Adapt SEO blog strategies for different industries with unique challenges"
  tags: [seo, industry-specific, ymyl, regulated, vertical-seo]

state: {}

trigger: |
  SEO blog strategies vary significantly by industry. A health blog faces
  different challenges than a SaaS blog, which differs from an e-commerce
  blog. Cookie-cutter SEO advice fails when industry-specific factors
  aren't accounted for.

  Provide industry-specific SEO blog strategies for 4 verticals:

  1. Healthcare / Medical (YMYL):
     - Why Google applies stricter scrutiny (YMYL classification)
     - Required E-E-A-T signals (medical credentials, peer review)
     - Content types that work (condition guides, treatment comparisons)
     - Content types that are risky (diagnostic tools, symptom checkers)
     - Medical disclaimer requirements
     - Schema markup specific to medical content (MedicalCondition,
       MedicalWebPage)
     - Write a sample meta description for: "Type 2 Diabetes: Symptoms,
       Causes, and Treatment Options" — showing YMYL-compliant copy

  2. Financial Services (YMYL):
     - Regulatory compliance in content (SEC, FINRA disclaimers)
     - How to write about investments without giving financial advice
     - Keyword challenges: high CPC keywords, strong competition
     - Content angles that differentiate (calculators, data analysis)
     - Trust signals specific to finance (credentials, firm registration)

  3. SaaS / Technology:
     - Product-led content vs editorial content
     - Bottom-of-funnel blog posts that drive conversions
     - Comparison and alternative posts (ethical competitor mentions)
     - Technical content for developers vs business decision-makers
     - Integration and use-case content strategies

  4. E-commerce:
     - Blog vs product page SEO (avoiding cannibalization)
     - Buying guide content strategy
     - Seasonal content planning and temporal SEO
     - User-generated content integration
     - How to use blog content to support product page rankings

  For each industry:
  - Top 3 content types that work
  - Top 3 SEO mistakes specific to that industry
  - Key metrics to track
  - Sample content brief for one blog post

assertions:
  - type: llm_judge
    criteria: "The YMYL strategies for healthcare and finance are substantively different from non-YMYL strategies — demonstrate understanding of heightened E-E-A-T requirements, regulatory compliance, and the higher quality bar Google applies"
    weight: 0.30
    description: "Substantive YMYL strategy differentiation"
  - type: llm_judge
    criteria: "Industry-specific mistakes are genuinely specific — not generic SEO mistakes applied to different industries but actual pitfalls unique to each vertical (e.g., medical content without peer review, financial advice without disclaimers)"
    weight: 0.25
    description: "Genuinely industry-specific mistakes"
  - type: llm_judge
    criteria: "The SaaS content strategy correctly balances product-led and editorial content — explains when to create 'vs competitor' posts, integration guides, and use-case content, and how these drive different stages of the buyer journey"
    weight: 0.25
    description: "Balanced SaaS content strategy"
  - type: llm_judge
    criteria: "The e-commerce strategy addresses blog vs product page cannibalization — clearly explains how to target different keywords with blog content vs product pages so they complement rather than compete"
    weight: 0.20
    description: "Addressed e-commerce cannibalization"
