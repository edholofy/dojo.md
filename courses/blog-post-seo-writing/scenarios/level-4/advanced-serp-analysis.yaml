meta:
  id: advanced-serp-analysis
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Analyze SERPs deeply to reverse-engineer Google's ranking preferences"
  tags: [seo, serp-analysis, ranking-factors, competitive-analysis, advanced]

state: {}

trigger: |
  Advanced SERP analysis goes beyond "check what's ranking" — it reverse-
  engineers WHY certain content ranks to identify the exact content
  attributes Google prefers for specific queries.

  Perform deep SERP analysis for 3 different query types:

  1. Informational query: "how does machine learning work"
     Analyze the hypothetical top 5 results:
     - #1: University .edu comprehensive guide (8,000 words)
     - #2: Tech publication beginner's guide (3,000 words)
     - #3: YouTube video (embedded in search)
     - #4: Company blog with interactive examples (2,500 words)
     - #5: Wikipedia article

     Analyze:
     - Why does the .edu outrank the tech publication?
     - What content attributes are common across all top 5?
     - What SERP features appear (AI Overview, video carousel,
       People Also Ask, knowledge panel)?
     - What content type should you create to rank here?
     - Content blueprint: specific structure, depth, and format needed

  2. Commercial query: "best CRM software for small business"
     Analyze hypothetical top 5:
     - #1: G2 comparison page with user reviews
     - #2: Forbes Advisor listicle (updated monthly)
     - #3: PCMag comprehensive review (expert-tested)
     - #4: Capterra comparison with pricing
     - #5: Individual blog with personal experience

     Analyze:
     - Why do review aggregators dominate this query?
     - Can a single-author blog compete? What angle?
     - Commercial intent signals Google looks for
     - How to differentiate when 4/5 results are similar listicles

  3. Navigational/transactional query: "Salesforce pricing 2026"
     Analyze hypothetical top 5:
     - #1: Salesforce.com official pricing page
     - #2: Salesforce pricing comparison blog post
     - #3: G2 Salesforce pricing and plans
     - #4: Blog: "Salesforce Pricing Explained (Hidden Costs)"
     - #5: YouTube: Salesforce pricing breakdown

     Analyze:
     - Why does the official page rank first?
     - What angle lets blogs compete for branded queries?
     - The "hidden costs" and "explained" angles — why they work
     - How to create content that adds value beyond the official page

  For each analysis provide:
  - Content attribute comparison table (word count, format, freshness, authority, E-E-A-T signals)
  - The "ranking formula" Google seems to use for this query type
  - Specific content blueprint to compete

assertions:
  - type: llm_judge
    criteria: "The analysis identifies different ranking factors per query type — informational queries prioritize depth and authority, commercial queries prioritize comprehensiveness and freshness, navigational queries prioritize brand authority and unique angles"
    weight: 0.30
    description: "Distinct ranking factors per query type"
  - type: llm_judge
    criteria: "The competitive analysis is nuanced — explains why specific result types outrank others (e.g., .edu domain authority for informational, review aggregators' data for commercial) rather than generic authority claims"
    weight: 0.25
    description: "Nuanced competitive ranking analysis"
  - type: llm_judge
    criteria: "The content blueprints are actionable — not just 'write comprehensive content' but specific structure, word count ranges, content elements, and differentiation strategies for each query type"
    weight: 0.25
    description: "Actionable content blueprints"
  - type: llm_judge
    criteria: "SERP features are analyzed — identifies which features appear for each query type (AI Overviews, video carousels, PAA, knowledge panels) and how they affect the organic click-through opportunity"
    weight: 0.20
    description: "SERP feature impact analysis"
