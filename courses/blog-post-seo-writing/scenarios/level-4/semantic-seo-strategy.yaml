meta:
  id: semantic-seo-strategy
  level: 4
  course: blog-post-seo-writing
  type: output
  description: "Implement semantic SEO using NLP-informed content optimization"
  tags: [seo, semantic-seo, nlp, content-optimization, advanced]

state: {}

trigger: |
  Google uses natural language processing (NLP) models like BERT and MUM
  to understand content meaning, not just keywords. Semantic SEO means
  optimizing for meaning, context, and comprehensiveness rather than
  exact keyword matches.

  You're optimizing a financial advisory firm's blog using semantic SEO
  principles.

  Provide the semantic SEO strategy:

  1. Semantic keyword research:
     Target topic: "retirement planning"
     - Primary keyword and search intent
     - Semantic keyword clusters (related concepts Google associates):
       a) Financial concepts: 401k, IRA, Roth, pension, Social Security
       b) Life stage concepts: early retirement, FIRE, pre-retirement
       c) Action concepts: savings rate, investment allocation, withdrawal
       d) Concern concepts: inflation, healthcare costs, longevity risk
     - How to map semantic relationships between these concepts
     - How Google's BERT understands query context
       (e.g., "retirement plan" as financial product vs retirement planning
       as an activity)

  2. Content optimization using NLP principles:
     Write a 600-word section on "How Much Do I Need to Retire?" that:
     - Covers the core concept plus semantic satellites naturally
     - Answers related questions within the flow (People Also Ask targets)
     - Uses varied semantic expressions (not just keyword repetition)
     - Demonstrates topical completeness for the subtopic
     - Annotate: which parts satisfy which semantic signals

  3. TF-IDF and content gap analysis:
     - How to analyze top-ranking content for semantic completeness
     - Finding concepts that competitors cover but you don't
     - The difference between keyword density and topical coverage
     - When adding semantic depth hurts vs helps (diminishing returns)

  4. Passage-level optimization:
     - How Google indexes individual passages (passage ranking)
     - Writing passages that can independently answer specific queries
     - Structuring long content so each section is a self-contained answer
     - How passage ranking changes long-form content strategy

  5. Voice search and conversational SEO:
     - How NLP understanding changes with voice queries
     - Conversational keyword targeting
     - FAQ content that matches natural language patterns
     - Schema markup for speakable content

assertions:
  - type: llm_judge
    criteria: "The semantic keyword clusters are logically organized — groups related concepts by category and shows how they connect to the primary topic, not just a random list of related keywords"
    weight: 0.25
    description: "Logically organized semantic clusters"
  - type: llm_judge
    criteria: "The written section demonstrates semantic SEO in practice — naturally incorporates related concepts, varied expressions, and topical depth without keyword stuffing"
    weight: 0.30
    description: "Practical semantic SEO demonstration"
  - type: llm_judge
    criteria: "Passage ranking optimization is practical — explains how to structure content so individual sections can rank for specific queries, with clear formatting guidelines"
    weight: 0.25
    description: "Practical passage ranking optimization"
  - type: llm_judge
    criteria: "The distinction between keyword density and topical coverage is clearly explained — shows why covering related concepts is more important than repeating the primary keyword"
    weight: 0.20
    description: "Clear density vs coverage distinction"
