meta:
  id: international-seo-expansion
  level: 5
  course: blog-post-seo-writing
  type: output
  description: "Plan and execute international SEO content expansion across multiple markets"
  tags: [seo, international, global-expansion, localization, market-entry]

state: {}

trigger: |
  Your US-based SaaS company (HR software) is expanding into 5 international
  markets. The US blog generates $2M in pipeline annually from organic
  traffic. The CEO wants to replicate this success globally.

  Target markets (in priority order):
  1. United Kingdom (English, but different terminology and market)
  2. Germany (German, strong data privacy culture)
  3. France (French, strict labor law context)
  4. Japan (Japanese, completely different search behavior)
  5. Brazil (Portuguese, emerging market)

  Current state: English-only blog with 400 posts, 500K organic visits/month
  Budget: $150K for Year 1 international content expansion

  Design the complete international SEO expansion:

  1. Market prioritization and phasing:
     - Year 1 plan: which markets to enter first and why
     - Budget allocation across markets
     - Expected ROI timeline per market
     - Go/no-go criteria for expanding to additional markets
     - UK first (same language, different market) as learning ground

  2. Content strategy per market:
     For each of the 5 markets:
     - Search behavior differences (Google market share, alternative engines)
     - Content that can be adapted from US blog (% of content transferable)
     - Content that must be created locally (legal, cultural, market-specific)
     - Local keyword research approach
     - Competitor landscape in local market
     - Required local expertise (employment law, market practices)

  3. Technical infrastructure:
     - Domain strategy: .co.uk, .de, .fr, .jp, .com.br vs subdirectories
     - Hreflang implementation plan across 6 language versions
     - CMS setup for multi-language content management
     - CDN and hosting for local page speed optimization
     - Local search engine optimization (Yahoo Japan, Baidu considerations)

  4. Content production model:
     - Centralized vs distributed content creation
     - Local writer hiring strategy (freelance vs agency vs in-house)
     - Quality assurance for non-English content
     - Style guide localization (brand voice in different cultures)
     - Translation workflow: human vs AI translation vs transcreation
     - Review process with local market experts

  5. Measurement and scaling:
     - Per-market SEO KPIs and benchmarks
     - How to compare performance across markets with different search volumes
     - When to increase investment in a market vs pull back
     - Scaling from 5 markets to 15 markets
     - Organizational structure for global SEO as the team grows

assertions:
  - type: llm_judge
    criteria: "The market prioritization is well-reasoned — UK first (same language, test localization process), then high-value European markets, with Japan requiring most cultural adaptation and thus coming later"
    weight: 0.25
    description: "Well-reasoned market prioritization"
  - type: llm_judge
    criteria: "Japan's unique search landscape is addressed — acknowledges that Yahoo Japan still has significant market share, search behavior differs from Western markets, and content needs go beyond translation"
    weight: 0.25
    description: "Japan search landscape addressed"
  - type: llm_judge
    criteria: "The $150K budget is allocated realistically — distributes budget across markets in proportion to market size and expected ROI, not equally, with clear cost estimates per market"
    weight: 0.25
    description: "Realistic budget allocation"
  - type: llm_judge
    criteria: "The content transferability analysis is honest — correctly estimates that a significant portion of HR software content needs local rewriting due to different employment laws and market practices per country"
    weight: 0.25
    description: "Honest content transferability analysis"
