meta:
  id: seo-content-roi-measurement
  level: 5
  course: blog-post-seo-writing
  type: output
  description: "Build a comprehensive SEO content ROI measurement framework"
  tags: [seo, roi, measurement, analytics, attribution, business-impact]

state: {}

trigger: |
  The #1 challenge for SEO teams is proving ROI. Unlike paid channels with
  direct attribution, SEO content contributes to revenue through complex,
  multi-touch journeys over long time horizons.

  You're building the SEO ROI measurement framework for a B2B SaaS company
  with $20M ARR and a $500K annual content marketing budget.

  Current funnel:
  - 200,000 organic visits/month
  - 2% visit-to-lead conversion (4,000 leads/month from organic)
  - 5% lead-to-opportunity conversion
  - 20% opportunity-to-customer conversion
  - Average deal size: $12,000/year
  - Customer LTV: $36,000

  Design the complete measurement framework:

  1. Attribution modeling for SEO content:
     - First-touch attribution (SEO as acquisition channel)
     - Multi-touch attribution (SEO content in the buyer journey)
     - Assisted conversion analysis (blog posts that assist but don't
       close deals)
     - Content journey mapping: typical paths from blog → lead → customer
     - Which model to use when (and why no single model is "correct")
     - Calculate: revenue attributable to SEO content under each model

  2. Content-level ROI analysis:
     - How to calculate ROI per blog post
     - Formula: (Revenue attributed - Cost to create - Cost to maintain)
       / Cost to create
     - Cost components: writer time, editor time, SEO research, design,
       promotion, ongoing updates
     - Revenue components: direct conversions, assisted conversions,
       backlink value, brand value
     - Categorize content by ROI: top performers, break-even, underwater
     - What to do with each category

  3. Forecasting organic revenue:
     - Model: keyword volume × expected CTR × conversion rate × deal value
     - Build a 12-month organic revenue forecast
     - Confidence intervals and assumptions
     - How to present forecasts to the CFO (conservative vs optimistic)
     - When forecasts should trigger strategy changes

  4. Competitive value analysis:
     - Calculate the paid search equivalent value of organic traffic
     - How much would you pay in Google Ads for the same traffic?
     - Using this to justify SEO budget increases
     - Market share of search: your organic visibility vs competitors

  5. Reporting for different audiences:
     - CMO report: pipeline impact, revenue contribution, CAC comparison
     - CFO report: ROI, payback period, organic vs paid efficiency
     - Board report: market position, competitive moat, growth trajectory
     - Content team report: performance by topic, author, and content type
     - Create a sample one-page executive dashboard layout

assertions:
  - type: llm_judge
    criteria: "The attribution models are correctly explained — first-touch, multi-touch, and assisted conversions are each calculated with the provided funnel data, showing how the same SEO effort gets different revenue credit under each model"
    weight: 0.30
    description: "Correctly calculated attribution models"
  - type: llm_judge
    criteria: "The per-post ROI calculation is complete — includes all real costs (creation, editing, promotion, maintenance) and revenue components (direct, assisted, link value), not just traffic × conversion rate"
    weight: 0.25
    description: "Complete per-post ROI calculation"
  - type: llm_judge
    criteria: "The audience-specific reports are genuinely different — the CFO cares about payback period and efficiency, the CMO cares about pipeline, and the board cares about competitive position, and each report is tailored accordingly"
    weight: 0.25
    description: "Genuinely audience-tailored reports"
  - type: llm_judge
    criteria: "The paid search equivalent calculation is useful for budget justification — clearly shows how organic traffic's value compares to what the same visibility would cost in Google Ads"
    weight: 0.20
    description: "Useful paid search equivalent calculation"
