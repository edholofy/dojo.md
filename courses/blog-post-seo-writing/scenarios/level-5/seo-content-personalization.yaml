meta:
  id: seo-content-personalization
  level: 5
  course: blog-post-seo-writing
  type: output
  description: "Implement content personalization strategies that enhance SEO performance"
  tags: [seo, personalization, dynamic-content, user-experience, advanced]

state: {}

trigger: |
  Content personalization and SEO have traditionally been at odds —
  personalized content changes per user while Google sees one version.
  But modern approaches can deliver personalized experiences while
  maintaining SEO performance.

  You're implementing personalization for a B2B software company's blog
  (500+ posts, 400K organic visits/month).

  Design the personalization strategy that enhances (not hurts) SEO:

  1. SEO-safe personalization framework:
     - What can be personalized without affecting crawlability:
       a) Related content recommendations
       b) CTA variations based on visitor segment
       c) Industry-specific examples and case studies
       d) Content depth (beginner vs advanced toggle)
       e) Social proof elements (testimonials by industry)
     - What CANNOT be personalized without SEO risk:
       a) Primary content body
       b) Heading structure and keywords
       c) URL-based content variations
     - Technical implementation: server-side vs client-side personalization
       and when Google sees the base vs personalized version

  2. Segmented content experiences:
     Design personalization for 4 visitor segments:
     a) First-time visitors from organic search
        - What they see: broad, educational, trust-building
        - CTA: newsletter signup, free guide download
     b) Returning visitors (2-5 visits)
        - What they see: deeper content, product mentions
        - CTA: demo request, free trial
     c) Known leads (in CRM)
        - What they see: case studies from their industry, ROI data
        - CTA: personalized demo, consultation
     d) Existing customers
        - What they see: advanced tips, integration guides
        - CTA: upgrade, add-on features

     For each: what changes, what stays the same, and how Googlebot
     is handled

  3. Dynamic content components:
     - Personalized sidebar recommendations (based on reading history)
     - Industry-specific content modules within blog posts
     - Progressive profiling: gathering data through content interaction
     - Smart internal linking based on visitor journey stage
     - Implementation: which CMS/personalization tool combinations work

  4. Measuring personalization impact on SEO:
     - A/B testing personalization without confusing Google
     - Engagement metric improvements (time on page, pages per session)
     - Conversion rate lift per segment
     - Ensuring personalization doesn't create crawl budget issues
     - Core Web Vitals impact of personalization JavaScript

  5. Privacy and compliance:
     - GDPR and CCPA implications of content personalization
     - Cookie consent requirements
     - Server-side personalization for cookie-less visitors
     - How privacy regulations will shape future personalization

assertions:
  - type: llm_judge
    criteria: "The SEO-safe framework correctly separates what can and can't be personalized — primary content and URL structure must stay consistent for Googlebot while CTAs, recommendations, and supplementary elements can vary"
    weight: 0.30
    description: "Correct SEO-safe personalization boundaries"
  - type: llm_judge
    criteria: "The segmented experiences are genuinely different — each visitor segment gets a meaningfully different experience that matches their journey stage, not just minor CTA swaps"
    weight: 0.25
    description: "Genuinely different segment experiences"
  - type: llm_judge
    criteria: "The technical implementation addresses Googlebot handling — explains how to ensure Google crawls the base (unpersonalized) version while users see personalized content, avoiding cloaking concerns"
    weight: 0.25
    description: "Correct Googlebot handling"
  - type: llm_judge
    criteria: "Privacy compliance is substantively addressed — not just 'comply with GDPR' but specific requirements for consent, data handling, and how privacy regulations affect personalization capabilities"
    weight: 0.20
    description: "Substantive privacy compliance"
