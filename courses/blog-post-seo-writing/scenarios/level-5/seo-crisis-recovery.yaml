meta:
  id: seo-crisis-recovery
  level: 5
  course: blog-post-seo-writing
  type: output
  description: "Diagnose and recover from major SEO traffic losses and Google penalties"
  tags: [seo, crisis-recovery, penalties, algorithm-updates, traffic-loss]

state: {}

trigger: |
  Your company's blog just lost 65% of organic traffic overnight after
  a Google core algorithm update. Organic traffic dropped from 300,000
  visits/month to 105,000 visits/month. Revenue from organic is down
  40% and the CEO is demanding answers.

  Additional context:
  - The drop occurred after Google's March 2026 core update
  - 200 blog posts are affected (some gained, most lost)
  - Your main competitor saw a 30% INCREASE from the same update
  - You recently scaled content production using AI (50% of new content
    was AI-generated with light human editing)
  - No manual action in Google Search Console (algorithmic, not penalty)

  Design the complete crisis response and recovery plan:

  1. Emergency diagnosis (Day 1-3):
     - How to analyze which pages were hit and which weren't
     - Pattern identification: what do losing pages have in common?
     - Compare losing pages vs gaining pages on your own site
     - Compare your content vs competitor content that gained
     - Likely diagnosis: based on the context clues (AI content +
       core update + competitor gains), what probably happened?
     - Communicate findings to stakeholders (honest assessment)

  2. Triage and immediate actions (Week 1):
     - Prioritize: which pages to fix first (highest revenue impact)
     - What NOT to do (common panic mistakes that make things worse)
     - Emergency content audit: flag all AI-generated content for review
     - Pause content production until quality standards are established
     - Stakeholder communication: what to tell the CEO, the board,
       and the content team

  3. Recovery strategy (Months 1-3):
     - Content quality improvement plan:
       a) AI content that needs human rewriting (quality criteria)
       b) Thin content that needs expansion
       c) Content missing E-E-A-T signals
       d) Outdated content that needs refreshing
     - Prioritization: which fixes will recover the most traffic
     - Timeline: realistic recovery expectations per content batch
     - Resource allocation: team assignments and capacity planning

  4. Quality system overhaul:
     - New content production standards (post-crisis)
     - AI content guidelines: what AI can do vs what humans must do
     - Quality scoring rubric for all new and updated content
     - Pre-publication quality gates
     - Ongoing monitoring: early warning system for future drops

  5. Long-term resilience:
     - How to build an SEO strategy that survives algorithm updates
     - Diversifying traffic sources to reduce Google dependency
     - Creating genuine competitive advantages in content quality
     - When the next core update happens: response playbook
     - Lessons learned: what to communicate to the organization

assertions:
  - type: llm_judge
    criteria: "The diagnosis correctly connects the AI content scaling to the core update impact — identifies that light-edited AI content likely triggered quality signals that the core update targeted"
    weight: 0.25
    description: "Correct AI content impact diagnosis"
  - type: llm_judge
    criteria: "The triage plan identifies common panic mistakes — things like deleting all content, disavowing backlinks, or making massive site changes that could compound the problem instead of helping"
    weight: 0.25
    description: "Identified common panic mistakes"
  - type: llm_judge
    criteria: "The recovery timeline is realistic — acknowledges that algorithmic recovery typically takes 3-6+ months (until the next core update), not days or weeks, and sets appropriate stakeholder expectations"
    weight: 0.25
    description: "Realistic recovery timeline expectations"
  - type: llm_judge
    criteria: "The quality system overhaul addresses root causes — creates new standards that prevent the same crisis from recurring, including specific AI content guidelines and quality gates"
    weight: 0.25
    description: "Root cause addressing quality overhaul"
