meta:
  id: seo-content-moat
  level: 5
  course: blog-post-seo-writing
  type: output
  description: "Build a defensible content moat that competitors and AI cannot replicate"
  tags: [seo, content-moat, competitive-advantage, defensibility, strategy]

state: {}

trigger: |
  In the age of AI-generated content, anyone can produce thousands of blog
  posts in days. The barrier to entry for content creation has collapsed.
  To win at SEO long-term, you need a content moat — competitive advantages
  that are expensive, time-consuming, or impossible for competitors to copy.

  You're the content strategist for a mid-market analytics platform
  competing against 20+ similar tools. All competitors have blogs. All
  use similar keywords. AI makes it easy for anyone to produce "good
  enough" content.

  Design the content moat strategy:

  1. Identify 6 types of content moats:
     For each moat type, explain what it is, why it's defensible, how to
     build it, and provide a specific example for the analytics platform:

     a) Proprietary data moat:
        - Content built on data only you have (product usage data, surveys)
        - Why competitors can't replicate it
        - Examples of companies doing this well

     b) Expert network moat:
        - Exclusive relationships with industry experts and practitioners
        - Expert-contributed content that AI can't generate
        - How to build and maintain the expert network

     c) Community-generated moat:
        - User forums, comments, contributions that create unique content
        - Network effects: more users → more content → more value
        - How to incentivize community content creation

     d) First-mover depth moat:
        - Being the most comprehensive resource on specific topics
        - Years of accumulated content depth and internal linking
        - Why it takes years to replicate even with AI

     e) Brand and trust moat:
        - When people search for "[topic] + [your brand name]"
        - Brand-associated search demand
        - How trust signals compound over time

     f) Technical/interactive moat:
        - Interactive tools, calculators, and applications
        - Dynamic content based on real-time data
        - Content that requires engineering, not just writing

  2. Moat implementation plan:
     - Which moats to prioritize (build 2-3, not all 6)
     - Investment required for each (time, money, team)
     - Timeline to build a defensible position
     - How to measure moat strength

  3. Content moat audit:
     - How to assess your current moat (likely thin or nonexistent)
     - Competitor moat analysis: what advantages do they have?
     - Gap analysis: where you can build advantages fastest
     - Vulnerability assessment: what could erode your moat?

  4. AI-proofing your content:
     - What makes content resistant to AI replication
     - How to embed proprietary insights that AI can't fake
     - The role of E-E-A-T in moat building
     - Why accumulated authority takes years to build
     - Content formats that AI struggles with

  5. Long-term content investment thesis:
     - Present to the CFO: why content is an appreciating asset
     - Content compound interest: how SEO value accumulates over time
     - The cost of NOT building a moat (commoditized content spiral)
     - 3-year investment plan with expected returns

assertions:
  - type: llm_judge
    criteria: "The 6 moat types are genuinely distinct and defensible — each represents a different kind of competitive advantage that requires significant investment to replicate, not just 'write better content'"
    weight: 0.25
    description: "Distinct defensible moat types"
  - type: llm_judge
    criteria: "The proprietary data moat is concrete — shows how an analytics platform can use its own product data, customer surveys, and industry benchmarks to create content that competitors literally cannot replicate"
    weight: 0.25
    description: "Concrete proprietary data moat"
  - type: llm_judge
    criteria: "The AI-proofing strategy is substantive — identifies specific content attributes that AI can't replicate (proprietary data, real experiences, expert relationships, interactive tools) rather than generic advice"
    weight: 0.25
    description: "Substantive AI-proofing strategy"
  - type: llm_judge
    criteria: "The CFO investment thesis is compelling — presents content as a compounding asset with clear ROI projections, comparison to paid channels, and the cost of not investing in a moat"
    weight: 0.25
    description: "Compelling CFO investment thesis"
