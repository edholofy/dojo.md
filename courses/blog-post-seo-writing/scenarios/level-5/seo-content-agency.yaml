meta:
  id: seo-content-agency
  level: 5
  course: blog-post-seo-writing
  type: output
  description: "Build and operate an SEO content agency serving multiple clients"
  tags: [seo, agency, business, client-management, scalable-operations]

state: {}

trigger: |
  You're launching an SEO content agency. You need to productize your
  SEO blog writing expertise into repeatable client engagements.

  Design the complete agency operation:

  1. Service packages:
     Design 3 service tiers:
     a) Starter ($3,000/month):
        - What's included (content volume, strategy, reporting)
        - Ideal client profile
        - Expected results timeline
     b) Growth ($7,500/month):
        - Enhanced offering
        - Ideal client profile
        - Expected results timeline
     c) Enterprise ($15,000+/month):
        - Full-service offering
        - Ideal client profile
        - Expected results timeline

     For each tier: deliverables, team allocation, profit margins,
     and scope boundaries (what's NOT included)

  2. Client onboarding process:
     - Discovery call framework (questions to ask)
     - SEO audit and content assessment (first 2 weeks)
     - Strategy presentation template
     - Content calendar development
     - Setting realistic expectations (month-by-month)
     - Red flags: clients to decline (unrealistic expectations, YMYL
       without expert access, industries you shouldn't serve)

  3. Production system for multiple clients:
     - How to manage 10 concurrent clients
     - Writer assignment strategy (industry specialists vs generalists)
     - Quality consistency across different writers and clients
     - Content brief templates that standardize output quality
     - Review workflow: writer → editor → SEO review → client approval
     - Tools for multi-client project management

  4. Reporting and retention:
     - Monthly SEO report template (client-facing)
     - How to show ROI when SEO results take 6+ months
     - Handling client expectations during "the SEO valley of patience"
     - Upselling strategies (content → technical SEO → link building)
     - Client retention: why clients churn and how to prevent it

  5. Scaling the agency:
     - From solo consultant to 5-person team to 20-person agency
     - When to hire vs when to use freelancers
     - AI tools that increase team efficiency without reducing quality
     - Revenue targets at each stage
     - The most common agency failure points and how to avoid them

assertions:
  - type: llm_judge
    criteria: "The service packages have realistic pricing, deliverables, and margins — a $3K/month package can't include unlimited content, and an enterprise package should include strategic services beyond content production"
    weight: 0.25
    description: "Realistic service package design"
  - type: llm_judge
    criteria: "The production system handles multi-client complexity — addresses how to maintain quality across 10+ clients with shared team resources, including content brief standardization and quality gates"
    weight: 0.25
    description: "Multi-client production system"
  - type: llm_judge
    criteria: "Client expectations management is addressed — specifically handles the 'SEO valley of patience' (months 1-6 with little visible results) and how to retain clients during this period"
    weight: 0.25
    description: "Client expectations management"
  - type: llm_judge
    criteria: "The scaling plan identifies real failure points — common agency problems like quality dilution, key person dependency, client concentration risk, and cash flow challenges are addressed"
    weight: 0.25
    description: "Real agency failure points identified"
