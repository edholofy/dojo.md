meta:
  id: full-seo-content-system
  level: 5
  course: blog-post-seo-writing
  type: output
  description: "Design a complete SEO content engine from strategy to measurement"
  tags: [seo, content-system, full-stack, strategy, mastery]

state: {}

trigger: |
  You've been hired as VP of Content at a Series C B2B SaaS company
  (marketing automation platform). The blog currently gets 50,000 organic
  visits/month. The CEO wants 500,000 organic visits/month within 18 months.

  Current state:
  - 200 existing blog posts (mixed quality, no clear strategy)
  - Domain Rating: 55 (decent, not exceptional)
  - 3 content writers, 1 SEO manager, 1 editor
  - Monthly content budget: $25,000
  - Main competitor gets 2M organic visits/month

  Design the complete SEO content system:

  1. Strategic foundation (Month 1):
     - Content audit of 200 existing posts (categorize: keep, update,
       merge, delete — provide the framework)
     - Keyword universe mapping: total addressable keyword market
     - Competitor content gap analysis (what they rank for, you don't)
     - Topic cluster architecture (3-5 pillar topics, each with 20-30
       cluster opportunities)
     - Content differentiation strategy: why will YOUR content rank
       over established competitors?

  2. Team and process (Month 1-2):
     - Hiring plan: what roles to add and when
     - Content production workflow from brief to publication
     - Quality assurance system (SEO checklist, editorial standards)
     - Freelancer management (when to use, how to brief, quality control)
     - AI-assisted content workflow (where AI helps vs where humans must lead)

  3. Content roadmap (18-month plan):
     - Phase 1 (Months 1-3): Foundation — what to create first and why
     - Phase 2 (Months 4-8): Scaling — increasing volume while maintaining
       quality
     - Phase 3 (Months 9-14): Authority building — becoming the go-to
       resource
     - Phase 4 (Months 15-18): Optimization — maximizing existing content
     - Monthly content targets (posts published, keywords targeted)
     - Quarterly milestones (traffic, rankings, backlinks)

  4. Content types and their SEO roles:
     - Bottom-of-funnel comparison posts (revenue impact)
     - Middle-of-funnel educational guides (traffic growth)
     - Top-of-funnel thought leadership (brand awareness + backlinks)
     - Original research and data studies (backlink magnets)
     - How to balance the content mix across the funnel

  5. Measurement and reporting:
     - KPIs at each level: content team, SEO, business impact
     - Monthly reporting template
     - How to connect organic traffic to revenue (attribution)
     - When to pivot strategy based on data
     - Board-level SEO reporting (translating SEO metrics to business metrics)

  6. Risk mitigation:
     - Algorithm update preparedness
     - Competitor response scenarios
     - Content quality degradation as you scale
     - Budget justification if results are slower than expected

assertions:
  - type: llm_judge
    criteria: "The 10x traffic growth plan is plausible — the 18-month roadmap with phased approach, team scaling, and content volume projections could realistically achieve 500K visits from 50K given the starting domain authority and budget"
    weight: 0.25
    description: "Plausible 10x growth plan"
  - type: llm_judge
    criteria: "The system design is comprehensive — covers strategy, team, process, content, measurement, and risk in a way that could be executed by a real content team without further strategic guidance"
    weight: 0.25
    description: "Comprehensive executable system design"
  - type: llm_judge
    criteria: "The budget allocation is realistic — $25K/month across writers, freelancers, tools, and potentially paid distribution, with clear ROI expectations at each stage"
    weight: 0.25
    description: "Realistic budget allocation"
  - type: llm_judge
    criteria: "The measurement framework connects SEO to business outcomes — not just traffic and rankings but how to attribute organic traffic to pipeline, revenue, and board-level metrics"
    weight: 0.25
    description: "SEO to business outcome measurement"
