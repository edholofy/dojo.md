meta:
  id: enterprise-seo-strategy
  level: 5
  course: blog-post-seo-writing
  type: output
  description: "Design enterprise-level SEO content strategy for a Fortune 500 company"
  tags: [seo, enterprise, large-scale, governance, global-strategy]

state: {}

trigger: |
  Enterprise SEO operates at a fundamentally different scale and complexity
  than SMB SEO. The challenges are organizational (multiple teams, brand
  guidelines, legal review), technical (millions of pages, complex CMS),
  and strategic (global markets, multiple product lines).

  You're the Head of SEO Content for a Fortune 500 enterprise software
  company with:
  - 50,000+ pages across 12 regional domains
  - 15 product lines, each with their own marketing team
  - Content published in 8 languages
  - 5 different CMS platforms across the organization
  - Current organic traffic: 8M visits/month
  - Target: 15M visits/month in 24 months

  Design the enterprise SEO content strategy:

  1. Governance framework:
     - SEO content standards document (what every team must follow)
     - Approval workflows across product teams
     - How to enforce SEO standards without blocking content velocity
     - Role of centralized SEO team vs embedded SEO in product teams
     - Training program for 50+ content contributors

  2. Content architecture at scale:
     - Taxonomy and categorization across 15 product lines
     - URL architecture that scales to 100,000+ pages
     - Cross-product content strategy (shared topics, distinct approaches)
     - Preventing internal cannibalization across product line blogs
     - Content consolidation: reducing 50,000 pages to improve quality

  3. Global content strategy:
     - Central content creation with local adaptation vs local creation
     - Translation workflow with SEO preservation
     - Regional keyword differences for the same products
     - Hreflang management at scale (12 domains × thousands of pages)
     - Measuring SEO performance per region

  4. Technology and infrastructure:
     - SEO requirements for CMS evaluation and migration
     - Content API strategy for headless CMS environments
     - Automated SEO monitoring across 50,000+ pages
     - Edge SEO: server-side optimizations at the CDN level
     - Performance budgets for Core Web Vitals at scale

  5. Stakeholder management:
     - Getting C-suite buy-in for SEO investment
     - Quarterly business review template (SEO to revenue)
     - Managing competing priorities across product teams
     - Budget allocation across product lines
     - How to demonstrate SEO ROI at the enterprise level

assertions:
  - type: llm_judge
    criteria: "The governance framework balances control with velocity — enforces SEO standards without creating bottlenecks that slow down 50+ content contributors across 15 teams"
    weight: 0.25
    description: "Balanced governance framework"
  - type: llm_judge
    criteria: "The content architecture handles real enterprise complexity — addresses multi-product taxonomy, internal cannibalization, and content consolidation challenges specific to large organizations"
    weight: 0.25
    description: "Enterprise-complexity content architecture"
  - type: llm_judge
    criteria: "The global strategy addresses real localization challenges — not just translation but regional keyword differences, local market needs, and hreflang management at massive scale"
    weight: 0.25
    description: "Real localization challenges addressed"
  - type: llm_judge
    criteria: "The stakeholder management approach is business-focused — presents SEO in terms executives understand (revenue attribution, competitive market share, customer acquisition cost) rather than technical metrics"
    weight: 0.25
    description: "Business-focused stakeholder management"
