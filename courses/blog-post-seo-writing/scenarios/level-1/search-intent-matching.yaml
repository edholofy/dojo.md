meta:
  id: search-intent-matching
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Match blog content to search intent for better rankings"
  tags: [seo, search-intent, content-matching, user-intent, fundamentals]

state: {}

trigger: |
  Search intent is the single most important SEO concept in 2026. Google
  doesn't just match keywords — it matches the PURPOSE behind searches.
  If your content doesn't match intent, it won't rank regardless of
  how well it's optimized.

  Classify the search intent for these 10 keywords and recommend the
  right content format for each:

  1. "what is content marketing"
  2. "best email marketing software 2026"
  3. "mailchimp login"
  4. "buy standing desk"
  5. "how to write a cover letter"
  6. "hubspot vs salesforce"
  7. "project management certification worth it"
  8. "download slack"
  9. "customer retention strategies for SaaS"
  10. "shopify pricing plans"

  For each keyword:
  - Intent type (informational, commercial, navigational, transactional)
  - The ideal content format (blog post, comparison page, landing page, etc.)
  - What the searcher actually wants (not just the surface-level query)
  - A suggested blog post title that matches the intent
  - Common intent mismatch: what WRONG content type people often create

  Then explain:
  - Why ranking for "buy standing desk" with a blog post is nearly impossible
  - How to identify intent by looking at what currently ranks in Google
  - The difference between informational and commercial investigation intent
  - How intent mismatches lead to high bounce rates

assertions:
  - type: llm_judge
    criteria: "All 10 keywords are correctly classified — navigational (mailchimp login, download slack), transactional (buy standing desk), commercial (best email software, hubspot vs salesforce), informational (what is content marketing)"
    weight: 0.30
    description: "Correctly classified search intents"
  - type: llm_judge
    criteria: "The content format recommendations match the intent — informational keywords get blog posts, commercial keywords get comparison pages, transactional keywords get product/landing pages"
    weight: 0.25
    description: "Intent-matched content format recommendations"
  - type: llm_judge
    criteria: "The 'what the searcher actually wants' analysis goes deeper than the query — identifies that 'project management certification worth it' seeks validation and ROI analysis, not just a list of certifications"
    weight: 0.25
    description: "Deep searcher-want analysis"
  - type: llm_judge
    criteria: "The intent mismatch explanations are specific — explains why creating a blog post for transactional queries fails (Google shows product pages, not articles)"
    weight: 0.20
    description: "Specific intent mismatch explanations"
