meta:
  id: blog-post-introduction
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Write SEO-optimized blog post introductions that reduce bounce rate"
  tags: [seo, introduction, hook, bounce-rate, engagement, fundamentals]

state: {}

trigger: |
  73% of users abandon pages within 10 seconds if readability is poor.
  Your introduction determines whether readers stay or bounce — and bounce
  rate signals to Google that your content isn't satisfying user intent.

  Write introductions for these 3 blog posts using the APP formula
  (Agree, Promise, Preview):

  1. Keyword: "how to negotiate salary"
     Topic: Complete guide to salary negotiation for your next job offer
     Audience: Mid-career professionals

  2. Keyword: "best project management tools"
     Topic: 12 project management tools compared (features, pricing, use cases)
     Audience: Team leads and managers

  3. Keyword: "content marketing strategy"
     Topic: How to build a content marketing strategy from scratch
     Audience: Marketing managers at small companies

  For each introduction:
  - Write 3-4 sentences using the APP formula
  - Include the primary keyword in the first 100 words
  - Start with a hook (stat, question, or relatable problem)
  - End with a preview of what the reader will learn
  - Keep it under 100 words (don't bury the content)

  Then explain:
  - Why the first 100 words matter for SEO (keyword placement signal)
  - The APP formula breakdown (Agree with the problem, Promise the solution,
    Preview what's coming)
  - How introduction quality affects dwell time and bounce rate
  - Common intro mistakes (too long, too vague, no keyword, no hook)

assertions:
  - type: llm_judge
    criteria: "All 3 introductions follow the APP formula — each agrees with a relatable problem, promises a clear solution, and previews what the article covers"
    weight: 0.30
    description: "APP-formula-following introductions"
  - type: llm_judge
    criteria: "The primary keyword appears naturally in the first 100 words of each introduction — placed strategically without feeling forced"
    weight: 0.25
    description: "Natural early keyword placement"
  - type: llm_judge
    criteria: "Each hook is compelling and different — one uses a statistic, one uses a question, one uses a relatable problem, demonstrating range in intro techniques"
    weight: 0.25
    description: "Compelling varied hook techniques"
  - type: llm_judge
    criteria: "The intro mistakes section identifies real issues — overly long introductions, missing the keyword entirely, vague promises, and starting with 'In this article we will discuss...'"
    weight: 0.20
    description: "Real intro mistake identification"
