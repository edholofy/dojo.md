meta:
  id: seo-blog-mistakes
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Identify and fix common SEO blog writing mistakes"
  tags: [seo, mistakes, diagnosis, common-errors, fundamentals]

state: {}

trigger: |
  Here are 5 blog posts that are making common SEO mistakes. Diagnose
  each problem and provide the fix.

  Blog 1 — Keyword stuffing:
  Title: "Best Coffee Makers: The Best Coffee Makers for the Best Coffee"
  First paragraph: "If you're looking for the best coffee makers, our
  guide to the best coffee makers will help you find the best coffee makers
  for your home. These best coffee makers are rated by experts."

  Blog 2 — Thin content:
  Title: "What Is Project Management?"
  Content: 300 words that define project management in 3 short paragraphs.
  Competing pages are 2,000+ words with frameworks, examples, and tools.

  Blog 3 — Intent mismatch:
  Title: "Buy Our CRM Software Today"
  Ranking attempt: "best CRM for small business" (commercial intent)
  Problem: The page is a hard-sell landing page, not a comparison/review

  Blog 4 — Missing E-E-A-T:
  Title: "How to Treat Lower Back Pain at Home"
  Author: No author listed, no credentials, no sources cited,
  published on a general lifestyle blog

  Blog 5 — Ignoring technical SEO:
  Title: "Complete Guide to Email Marketing"
  Issues: 8-second load time, images not compressed (4MB hero image),
  not mobile-responsive, no schema markup, URL: /p?id=47829

  For each blog:
  1. Identify the specific SEO mistake
  2. Explain why it hurts rankings (algorithm signal or user behavior)
  3. Provide the specific fix
  4. Rate severity (1-10) and explain

assertions:
  - type: llm_judge
    criteria: "Each diagnosis is specific and distinct — keyword stuffing, thin content, intent mismatch, E-E-A-T failure, and technical SEO issues are each correctly identified with clear evidence"
    weight: 0.30
    description: "Specific distinct mistake diagnoses"
  - type: llm_judge
    criteria: "The explanations connect mistakes to ranking impact — keyword stuffing triggers spam signals, thin content can't compete, intent mismatch causes high bounce rates, missing E-E-A-T fails quality review"
    weight: 0.25
    description: "Mistake-to-ranking-impact connections"
  - type: llm_judge
    criteria: "The fixes are actionable and specific — not just 'add more content' but 'expand to 2,000+ words covering X, Y, Z sections to match competing content depth'"
    weight: 0.25
    description: "Actionable specific fixes"
  - type: llm_judge
    criteria: "The severity ratings are calibrated — E-E-A-T for medical content is rated highest (YMYL), keyword stuffing and technical issues are high, thin content is medium-high"
    weight: 0.20
    description: "Calibrated severity ratings"
