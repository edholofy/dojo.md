meta:
  id: heading-hierarchy
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Structure blog posts with proper heading hierarchy for SEO"
  tags: [seo, headings, structure, h1-h3, content-organization, fundamentals]

state: {}

trigger: |
  Heading hierarchy (H1, H2, H3) tells Google what your content is about
  and helps readers scan. Properly structured headings also increase your
  chances of winning featured snippets.

  Create the heading structure for a blog post:

  Topic: "How to Build a Personal Budget (Step-by-Step Guide)"
  Primary keyword: "how to build a personal budget"
  Secondary keywords: "budgeting for beginners," "50/30/20 rule,"
  "budget spreadsheet template," "monthly budget plan"

  Deliverables:
  1. Write the complete heading hierarchy:
     - H1 (1 only — the main title)
     - H2s (6-8 main sections)
     - H3s under each H2 (2-3 subsections where appropriate)
     - Include keywords naturally in headings without stuffing

  2. For each H2, write a 2-sentence description of what that section covers

  3. Identify which headings are optimized for featured snippets:
     - Question-format headings that match common searches
     - Headings that could trigger list or paragraph snippets

  4. Explain:
     - Why there should only be one H1 per page
     - How heading hierarchy helps Google understand content structure
     - The relationship between headings and featured snippets
     - Common heading mistakes (skipping levels, keyword stuffing, too many H2s)

assertions:
  - type: llm_judge
    criteria: "The heading hierarchy is logical and complete — H1 is the main title, H2s cover distinct major sections, H3s provide relevant subsections, and the flow makes sense for a reader scanning the article"
    weight: 0.30
    description: "Logical complete heading hierarchy"
  - type: llm_judge
    criteria: "Keywords are integrated naturally into headings — the primary and secondary keywords appear in H1 and H2s without feeling forced or stuffed"
    weight: 0.25
    description: "Naturally integrated heading keywords"
  - type: llm_judge
    criteria: "Featured snippet opportunities are correctly identified — question-format headings like 'What is the 50/30/20 rule?' are tagged as paragraph snippet targets, and step-by-step headings as list snippet targets"
    weight: 0.25
    description: "Correctly identified featured snippet opportunities"
  - type: llm_judge
    criteria: "The heading mistakes section is practical — identifies real issues like using H2 for styling instead of structure, skipping from H1 to H3, and having 15+ H2s that make the article feel scattered"
    weight: 0.20
    description: "Practical heading mistake identification"
