meta:
  id: keyword-research-basics
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Conduct basic keyword research for a blog post topic"
  tags: [seo, keyword-research, long-tail, search-volume, fundamentals]

state: {}

trigger: |
  You're a content marketer at a project management SaaS company. Your
  manager wants a blog post that can rank on Google and drive organic traffic.

  The broad topic is: "project management for remote teams"

  Conduct keyword research and provide:

  1. Primary keyword selection:
     - Suggest 5 potential primary keywords with estimated search volume
       and keyword difficulty
     - Recommend one primary keyword with justification
     - Explain the trade-off between search volume and competition

  2. Long-tail keyword opportunities:
     - Generate 10 long-tail variations (4+ words) related to the primary keyword
     - Explain why long-tail keywords convert 2.5x higher than head terms
     - Which long-tail keywords would be easiest to rank for as a new blog

  3. Search intent classification:
     - Classify each keyword as informational, commercial, navigational,
       or transactional
     - Explain why search intent matters more than search volume in 2026
     - What type of content matches each intent type

  4. Competitor analysis:
     - Describe how to check what currently ranks for the primary keyword
     - What to look for in competing content (word count, structure, topics covered)
     - How to find content gaps competitors have missed

assertions:
  - type: llm_judge
    criteria: "The keyword recommendations are specific and realistic — includes estimated search volumes and difficulty scores, with a clear explanation of why the chosen primary keyword balances opportunity and achievability"
    weight: 0.30
    description: "Specific realistic keyword recommendations"
  - type: llm_judge
    criteria: "The long-tail variations are genuinely different approaches to the topic — not just the primary keyword with extra words added, but distinct search queries people would actually type"
    weight: 0.25
    description: "Genuinely different long-tail variations"
  - type: llm_judge
    criteria: "The search intent classification is accurate and insightful — correctly identifies that 'best project management tools for remote teams' is commercial intent while 'how to manage remote team projects' is informational"
    weight: 0.25
    description: "Accurate insightful intent classification"
  - type: llm_judge
    criteria: "The competitor analysis framework is actionable — explains specific steps to evaluate competing content and find gaps, not just 'look at what ranks'"
    weight: 0.20
    description: "Actionable competitor analysis framework"
