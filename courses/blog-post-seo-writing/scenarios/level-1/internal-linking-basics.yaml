meta:
  id: internal-linking-basics
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Build an internal linking strategy for blog posts"
  tags: [seo, internal-linking, site-structure, topical-authority, fundamentals]

state: {}

trigger: |
  Internal linking helps Google understand your site structure, distributes
  page authority, and keeps readers on your site longer. A strong internal
  linking strategy can improve rankings more than building external links.

  You manage a blog for a marketing automation company with these existing
  blog posts:
  1. "What Is Marketing Automation?" (pillar page, 3,000 words)
  2. "Email Marketing Best Practices" (1,800 words)
  3. "Lead Scoring Guide" (1,500 words)
  4. "How to Set Up Drip Campaigns" (2,000 words)
  5. "Marketing Automation vs CRM" (1,200 words)
  6. "B2B Lead Generation Strategies" (2,200 words)
  7. "Customer Segmentation Guide" (1,600 words)
  8. "Marketing ROI Calculator Guide" (1,000 words)

  You're writing a new blog post: "How to Choose the Right Marketing
  Automation Platform" (2,500 words planned).

  Provide:
  1. Internal linking plan for the new post:
     - Which existing posts to link TO from the new post (and where)
     - Suggested anchor text for each link (natural, not over-optimized)
     - Why each link makes sense contextually

  2. Reverse linking plan:
     - Which existing posts should link TO the new post
     - Where in each existing post the link should go
     - Suggested anchor text

  3. Topic cluster map:
     - Draw the topic cluster showing the pillar page and cluster pages
     - How the new post fits into the cluster
     - Content gaps in the cluster that need new posts

  4. Internal linking rules:
     - Optimal number of internal links per post (3-10)
     - How to write natural anchor text (avoid exact-match keyword anchors)
     - Common internal linking mistakes

assertions:
  - type: llm_judge
    criteria: "The internal linking plan is contextual — each suggested link makes sense in the content flow, not randomly placed. The anchor text is natural and varies rather than using the same keyword phrase"
    weight: 0.30
    description: "Contextual natural internal linking plan"
  - type: llm_judge
    criteria: "The reverse linking strategy is specific — identifies exact existing posts that should link to the new post, with realistic suggestions for where in those posts the link fits"
    weight: 0.25
    description: "Specific reverse linking strategy"
  - type: llm_judge
    criteria: "The topic cluster map shows clear hub-and-spoke structure — the pillar page at the center with cluster pages linking to and from it, and the new post correctly positioned"
    weight: 0.25
    description: "Clear hub-and-spoke topic cluster map"
  - type: llm_judge
    criteria: "The internal linking rules are practical — covers ideal link count, natural anchor text variation, and mistakes like orphan pages and over-optimized anchor text"
    weight: 0.20
    description: "Practical internal linking rules"
