meta:
  id: meta-title-description
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Write SEO-optimized meta titles and descriptions"
  tags: [seo, meta-tags, title-tags, ctr, serp, fundamentals]

state: {}

trigger: |
  Meta titles and descriptions are the first thing searchers see in Google
  results. They directly impact click-through rate (CTR), and the #1
  organic result gets more clicks than positions #3-#10 combined.

  Write meta titles and descriptions for these 5 blog posts:

  1. Primary keyword: "how to start a podcast"
     Blog topic: Complete beginner's guide to launching a podcast in 2026

  2. Primary keyword: "email marketing best practices"
     Blog topic: 15 email marketing strategies backed by data

  3. Primary keyword: "remote work productivity tips"
     Blog topic: How to stay productive working from home (from a remote worker of 5 years)

  4. Primary keyword: "best CRM for small business"
     Blog topic: Comparison of 8 CRM tools for businesses under 50 employees

  5. Primary keyword: "content marketing ROI"
     Blog topic: How to measure and prove content marketing ROI to your CEO

  For each:
  - Write 2 title tag options (under 60 characters)
  - Write 2 meta description options (under 155 characters)
  - Include the primary keyword naturally
  - Use power words, numbers, or brackets where appropriate
  - Explain which version you'd choose and why

  Also explain:
  - Why title tags are still a ranking factor in 2026
  - The difference between title tags and H1 tags
  - How to use numbers and brackets to boost CTR
  - Common meta tag mistakes

assertions:
  - type: llm_judge
    criteria: "All title tags are under 60 characters and include the primary keyword — they're compelling enough to click without being clickbait, using numbers or power words where appropriate"
    weight: 0.30
    description: "Compelling keyword-rich title tags"
  - type: llm_judge
    criteria: "Meta descriptions are under 155 characters and include a clear value proposition — they tell the searcher exactly what they'll get from clicking, not just describe the topic"
    weight: 0.25
    description: "Value-proposition meta descriptions"
  - type: llm_judge
    criteria: "The explanations demonstrate SEO knowledge — correctly notes that title tags are ranking factors, H1s can differ from title tags, and brackets/numbers increase CTR by 20-40%"
    weight: 0.25
    description: "Demonstrating SEO meta tag knowledge"
  - type: llm_judge
    criteria: "The common mistakes section is specific — identifies real issues like keyword stuffing in titles, duplicate meta descriptions across pages, and descriptions that are too vague to compel clicks"
    weight: 0.20
    description: "Specific common meta tag mistakes"
