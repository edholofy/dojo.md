meta:
  id: seo-content-brief
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Create an SEO content brief for a blog post writer"
  tags: [seo, content-brief, planning, writer-guidelines, fundamentals]

state: {}

trigger: |
  An SEO content brief is the document you give to a writer that ensures
  the blog post will be optimized for search before a single word is written.

  Create a complete SEO content brief for this blog post:

  Target keyword: "how to create a social media strategy"
  Company: Social media management tool (B2B SaaS)
  Target audience: Marketing managers at companies with 50-500 employees
  Goal: Rank on page 1 for the primary keyword

  The content brief should include:

  1. Keyword information:
     - Primary keyword and search volume estimate
     - 5-8 secondary keywords to include naturally
     - 3-5 related questions to answer (from "People Also Ask")

  2. Content specifications:
     - Recommended word count (based on competing content analysis)
     - Content format (how-to guide, listicle, etc.)
     - Tone and reading level
     - Target audience description

  3. Outline:
     - Suggested H1
     - Complete H2/H3 structure with brief notes on each section
     - Which sections should answer featured snippet questions

  4. SEO requirements:
     - Meta title and description
     - URL slug
     - Image requirements (number, alt text guidelines)
     - Internal linking suggestions
     - External source requirements (E-E-A-T)

  5. Competitive analysis summary:
     - What the top 3 ranking articles cover
     - Content gaps your article should fill
     - Unique angle or differentiator

assertions:
  - type: llm_judge
    criteria: "The content brief is comprehensive enough that a freelance writer could produce an SEO-optimized article without additional guidance — all requirements are clear and specific"
    weight: 0.30
    description: "Comprehensive self-sufficient content brief"
  - type: llm_judge
    criteria: "The outline includes question-format H2s for featured snippet targeting — 'People Also Ask' questions are integrated as natural section headers"
    weight: 0.25
    description: "Featured-snippet-targeting outline"
  - type: llm_judge
    criteria: "The competitive analysis identifies specific content gaps — not just 'write better content' but 'top articles miss X, Y, Z that we should cover to differentiate'"
    weight: 0.25
    description: "Specific competitive gap identification"
  - type: llm_judge
    criteria: "The SEO requirements are practical — word count, keyword placement guidelines, image specs, and internal linking suggestions are specific enough to follow but not overly prescriptive"
    weight: 0.20
    description: "Practical SEO requirements"
