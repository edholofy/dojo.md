meta:
  id: readability-optimization
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Optimize blog post readability for SEO and user engagement"
  tags: [seo, readability, formatting, user-experience, fundamentals]

state: {}

trigger: |
  Readability isn't a direct Google ranking factor, but it indirectly
  affects SEO through dwell time, bounce rate, and engagement signals.
  Content that's hard to read drives users away.

  Here's a poorly formatted blog post excerpt (400 words). Rewrite it
  for maximum readability:

  "Content marketing is one of the most important things that any business
  can do in 2026 because it helps build trust with potential customers and
  it also helps improve your search engine rankings which can drive more
  organic traffic to your website and generate leads that you can then
  convert into paying customers through your sales funnel. There are many
  different types of content marketing including blog posts, videos, podcasts,
  social media posts, infographics, case studies, whitepapers, webinars,
  and email newsletters, and each type of content serves a different purpose
  in your overall marketing strategy. The first step in creating a content
  marketing strategy is to identify your target audience because you need to
  know who you're creating content for before you can create content that
  resonates with them. The second step is to define your goals because you
  need to know what you want to achieve with your content marketing efforts
  whether that's brand awareness, lead generation, customer retention, or
  something else. The third step is to create a content calendar so that
  you can plan your content in advance and ensure that you're publishing
  consistently which is one of the most important factors in content
  marketing success according to research from HubSpot and other leading
  marketing platforms."

  Deliverables:
  1. Rewrite the excerpt using SEO-friendly formatting:
     - Short paragraphs (2-3 sentences max)
     - Bullet points or numbered lists where appropriate
     - Subheadings to break up content
     - Bold key phrases for scanning
     - Transition words between sections

  2. Before/after analysis:
     - Word count comparison
     - Sentence length comparison (avg words per sentence)
     - Readability score estimate
     - Which version keeps readers longer and why

  3. Formatting guidelines:
     - Create a 10-rule readability checklist for blog writers
     - Explain the "F-pattern" of how people read web content
     - How formatting affects mobile readers specifically

assertions:
  - type: llm_judge
    criteria: "The rewritten version is dramatically more readable — short paragraphs, bullet points, subheadings, and bold keywords make it scannable. The same information is easier to consume"
    weight: 0.30
    description: "Dramatically improved readability"
  - type: llm_judge
    criteria: "The before/after analysis is quantitative — includes specific sentence length reductions, paragraph counts, and explains how the changes affect dwell time and engagement"
    weight: 0.25
    description: "Quantitative before/after analysis"
  - type: llm_judge
    criteria: "The 10-rule checklist is practical — covers paragraph length, sentence variety, lists, white space, subheadings, and mobile considerations in a reusable format"
    weight: 0.25
    description: "Practical 10-rule readability checklist"
  - type: llm_judge
    criteria: "The F-pattern explanation is correct — users scan headlines first, then the first few words of each paragraph, meaning front-loading key information is critical"
    weight: 0.20
    description: "Correct F-pattern scanning explanation"
