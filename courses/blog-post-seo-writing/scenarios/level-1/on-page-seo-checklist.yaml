meta:
  id: on-page-seo-checklist
  level: 1
  course: blog-post-seo-writing
  type: output
  description: "Apply on-page SEO best practices to a blog post"
  tags: [seo, on-page, optimization, checklist, fundamentals]

state: {}

trigger: |
  You've written a blog post but haven't optimized it for SEO yet. Apply
  on-page optimization to the following draft.

  Blog post draft summary:
  - Title: "Remote Work Tips"
  - Topic: 10 tips for being productive while working from home
  - Primary keyword: "remote work productivity tips"
  - Word count: 1,800 words
  - Current issues: No internal links, no images, no schema markup,
    generic URL (/blog/post-47), no meta description

  Provide a complete on-page SEO optimization plan:

  1. Title tag and H1 optimization:
     - Rewrite the title to include the keyword and be compelling
     - Write the H1 (can differ from title tag)

  2. URL structure:
     - Suggest the optimized URL slug
     - Explain why /blog/remote-work-productivity-tips beats /blog/post-47

  3. Keyword placement strategy:
     - Where to place the primary keyword (first 100 words, H2s, conclusion)
     - Ideal keyword density (1-1.5%, not stuffing)
     - How to use secondary/related keywords naturally

  4. Internal linking plan:
     - Suggest 5 hypothetical internal links to other blog posts
     - Where to place them in the content (contextually, not randomly)
     - How many internal links are optimal (3-10 per post)

  5. Image optimization:
     - Suggest 3 images with alt text for each
     - File naming convention (remote-work-home-office-setup.webp)
     - Compression and format recommendations (WebP, AVIF)

  6. Schema markup:
     - What schema type applies (Article, FAQ, HowTo)
     - Key fields to include (author, datePublished, dateModified)

  Create a 15-point on-page SEO checklist that could be used for any blog post.

assertions:
  - type: llm_judge
    criteria: "The on-page optimization covers all critical elements — title tag, URL, keyword placement, internal links, images, meta description, and schema markup with specific recommendations for each"
    weight: 0.25
    description: "Comprehensive on-page optimization coverage"
  - type: llm_judge
    criteria: "The keyword placement strategy is modern — advocates for natural integration at 1-1.5% density, not stuffing, with strategic placement in the first 100 words, headings, and conclusion"
    weight: 0.25
    description: "Modern keyword placement strategy"
  - type: llm_judge
    criteria: "The image optimization includes specific alt text examples — descriptive, keyword-relevant, under 125 characters, and accessibility-friendly"
    weight: 0.25
    description: "Specific image optimization with alt text"
  - type: llm_judge
    criteria: "The 15-point checklist is reusable — covers all on-page elements in a logical order that any content marketer could follow for any blog post"
    weight: 0.25
    description: "Reusable 15-point on-page SEO checklist"
