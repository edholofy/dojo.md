meta:
  id: ai-content-seo
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Use AI to assist blog writing without hurting SEO rankings"
  tags: [seo, ai-content, human-first, content-quality, google-compliance]

state: {}

trigger: |
  Google's stance in 2026: content quality matters more than method of
  production. High-quality AI content receives normal treatment. But
  low-quality AI content faces ranking limitations.

  You're a content manager at a SaaS company that needs to publish 12 blog
  posts per month with a 2-person content team. You need to use AI
  to scale without losing quality or rankings.

  Design the AI-augmented content production system:

  1. The AI workflow:
     - Step 1: Human research and outline (what AI can't do)
     - Step 2: AI first draft with specific prompting approach
     - Step 3: Human expertise injection (experience, examples, opinions)
     - Step 4: AI editing pass (grammar, flow, formatting)
     - Step 5: Human final review (E-E-A-T, accuracy, voice)
     - Time allocation per step for one 2,000-word post

  2. AI content quality control:
     - Write a 500-word blog excerpt in typical AI style (identify AI tells)
     - Rewrite the same excerpt with human quality (eliminate AI tells)
     - Annotate every change:
       a) Removed hedging language ("It's important to note...")
       b) Added specific experience ("When I tested this...")
       c) Replaced generic advice with specific examples
       d) Added opinion and perspective

  3. What to NEVER let AI do:
     - Generate claims without verification
     - Write YMYL content without expert review
     - Create content with fabricated statistics or sources
     - Publish without human review

  4. Google compliance:
     - Google's official stance on AI content (cite their guidelines)
     - How to add E-E-A-T signals to AI-assisted content
     - When to disclose AI assistance (and when not to)
     - How to audit for AI-content quality issues

assertions:
  - type: llm_judge
    criteria: "The workflow realistically scales from 2 people to 12 posts/month — the time allocations are realistic and the division between AI and human work preserves quality"
    weight: 0.25
    description: "Realistic scaling workflow"
  - type: llm_judge
    criteria: "The before/after comparison clearly identifies AI tells — generic language, hedging, lack of specificity, missing personal experience, and overly balanced equivocation are all flagged and fixed"
    weight: 0.30
    description: "Clearly identified AI tells with fixes"
  - type: llm_judge
    criteria: "Google's official stance is accurately represented — correctly notes that Google evaluates quality regardless of creation method, but low-quality AI content gets deprioritized"
    weight: 0.25
    description: "Accurately represented Google AI stance"
  - type: llm_judge
    criteria: "The NEVER list is practical and specific — identifies real risks (fabricated sources, unreviewed YMYL content) rather than generic warnings"
    weight: 0.20
    description: "Practical specific AI risk identification"
