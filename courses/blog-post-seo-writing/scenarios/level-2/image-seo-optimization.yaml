meta:
  id: image-seo-optimization
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Optimize blog post images for SEO and Core Web Vitals"
  tags: [seo, images, alt-text, compression, core-web-vitals, optimization]

state: {}

trigger: |
  Google Images delivers 22.6% of all web traffic, and images affect
  Core Web Vitals (LCP, CLS). Image optimization is critical for both
  rankings and user experience.

  You're optimizing images for a travel blog post: "10 Best Hiking Trails
  in Colorado" (primary keyword: "best hiking trails in Colorado").

  The post has 12 images currently:
  - 1 hero image (uncompressed JPEG, 4.2 MB, 4000x3000px)
  - 10 trail photos (uncompressed JPEGs, 2-3 MB each)
  - 1 trail map (PNG, 1.5 MB)

  Current page load time: 8.2 seconds (failing Core Web Vitals)

  Provide:
  1. Image optimization plan:
     - File format recommendations (WebP vs AVIF vs JPEG for each image type)
     - Compression targets (file size goals per image)
     - Dimension recommendations (max width for blog layout)
     - Lazy loading implementation plan
     - Expected page load improvement

  2. Alt text for all 12 images:
     - Descriptive, keyword-relevant, under 125 characters each
     - Accessibility-friendly (useful for screen readers)
     - Show an example of good vs bad alt text

  3. File naming convention:
     - Current: IMG_4827.jpg, DSC_0039.jpg
     - Optimized: descriptive, keyword-relevant names
     - Provide new file names for all 12 images

  4. Additional image SEO:
     - Image sitemap considerations
     - Caption text strategy
     - Image schema markup
     - How to get images into Google Image Search results

assertions:
  - type: llm_judge
    criteria: "The optimization plan would realistically improve page load — converting to WebP/AVIF with proper compression and lazy loading could bring the 8.2-second load time under 3 seconds"
    weight: 0.25
    description: "Realistic page load improvement plan"
  - type: llm_judge
    criteria: "All 12 alt texts are descriptive and unique — each describes the specific image content while naturally including relevant keywords, not just 'hiking trail Colorado' repeated 12 times"
    weight: 0.25
    description: "Descriptive unique alt text per image"
  - type: llm_judge
    criteria: "The file naming convention is SEO-friendly — descriptive, hyphenated, keyword-relevant names that help Google understand the image content before crawling"
    weight: 0.25
    description: "SEO-friendly file naming convention"
  - type: llm_judge
    criteria: "The good vs bad alt text example clearly demonstrates the difference — bad alt text is either empty, keyword-stuffed, or too vague, while good alt text is specific and useful"
    weight: 0.25
    description: "Clear good vs bad alt text demonstration"
