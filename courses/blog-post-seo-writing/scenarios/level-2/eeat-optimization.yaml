meta:
  id: eeat-optimization
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Optimize blog content for E-E-A-T signals"
  tags: [seo, eeat, expertise, authority, trust, content-quality]

state: {}

trigger: |
  E-E-A-T (Experience, Expertise, Authoritativeness, Trustworthiness) is
  the foundation of Google's quality assessment in 2026. Sites that clearly
  demonstrate E-E-A-T consistently outperform those that don't.

  You're optimizing a health and wellness blog that publishes content about
  nutrition, exercise, and mental health. Currently, the blog has:
  - No author bios
  - No credentials listed
  - No sources cited
  - Generic "admin" as the author
  - No about page explaining who runs the blog
  - Content that could have been written by anyone

  Design the E-E-A-T optimization strategy:

  1. Experience signals:
     - How to demonstrate first-hand experience in blog posts
     - Write an example paragraph that shows experience vs one that doesn't
     - Why "I tried this for 30 days" outranks "studies show" in 2026

  2. Expertise signals:
     - Author bio template for health/wellness writers
     - How to display credentials (certifications, degrees, years of experience)
     - Where to place author information (top of post, sidebar, schema)
     - Write a sample author bio for a registered dietitian

  3. Authoritativeness signals:
     - How external citations and backlinks demonstrate authority
     - The role of the about page and editorial policy
     - How to reference authoritative sources (medical journals, government sites)

  4. Trustworthiness signals:
     - Medical disclaimer template
     - How to cite sources inline (not just a list at the bottom)
     - Fact-checking process documentation
     - Editorial review disclosure

  5. YMYL considerations:
     - Why health content is "Your Money or Your Life" and held to higher standards
     - Specific requirements for YMYL content vs regular blog content
     - How to audit existing content for E-E-A-T compliance

assertions:
  - type: llm_judge
    criteria: "The experience vs no-experience comparison is clear — the 'experience' paragraph includes specific personal details, sensory language, and lessons learned from actual practice"
    weight: 0.25
    description: "Clear experience vs no-experience comparison"
  - type: llm_judge
    criteria: "The author bio template is comprehensive — includes credentials, relevant experience, published work, and links to professional profiles, specific to the health/wellness niche"
    weight: 0.25
    description: "Comprehensive health-niche author bio template"
  - type: llm_judge
    criteria: "The YMYL section correctly identifies higher standards — health content requires medical professional review, authoritative sourcing (PubMed, WHO), and disclaimers"
    weight: 0.25
    description: "Correctly identified YMYL standards"
  - type: llm_judge
    criteria: "The trust signals are practical to implement — inline citations, editorial policies, and fact-checking documentation are all actionable improvements any blog could make"
    weight: 0.25
    description: "Practical implementable trust signals"
