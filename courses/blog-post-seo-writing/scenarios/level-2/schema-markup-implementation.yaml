meta:
  id: schema-markup-implementation
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Implement schema markup for blog posts to earn rich results"
  tags: [seo, schema-markup, structured-data, rich-results, json-ld]

state: {}

trigger: |
  Schema markup helps Google understand your content and can earn rich
  results (star ratings, FAQ dropdowns, how-to steps) that increase CTR
  by 20-40%.

  Implement schema markup for these 3 blog post types:

  1. Article with FAQ:
     Blog post: "What Is Cloud Computing? (Complete Guide)"
     Author: Sarah Chen, Cloud Architecture Lead (10 years experience)
     Published: 2026-01-15, Last modified: 2026-02-20
     FAQs: 4 common questions with answers
     - Write the complete JSON-LD Article schema
     - Write the FAQPage schema for the 4 FAQ items
     - Show how to combine both on one page

  2. How-To article:
     Blog post: "How to Set Up Google Analytics 4 in 5 Steps"
     - Write the HowTo schema with 5 steps
     - Include estimated time, tools needed, and supply list
     - Show how HowTo results appear in Google

  3. Product review/comparison:
     Blog post: "Best Project Management Tools 2026 (12 Reviewed)"
     - Write the Review/ItemList schema
     - Include rating data for 3 of the tools
     - How to mark up pros/cons and pricing

  For each, provide:
  - Complete JSON-LD code block
  - Where to place it on the page (head vs body)
  - How to test with Google's Rich Results Test
  - Common schema mistakes that invalidate markup

assertions:
  - type: llm_judge
    criteria: "The JSON-LD code is syntactically correct — proper JSON formatting, correct schema.org types and properties, and would pass Google's Rich Results Test"
    weight: 0.30
    description: "Syntactically correct JSON-LD schema"
  - type: llm_judge
    criteria: "All three schema types are complete — Article schema includes author, dates, and publisher; HowTo includes steps and time; FAQ includes question-answer pairs"
    weight: 0.25
    description: "Complete schema types per blog format"
  - type: llm_judge
    criteria: "The testing and validation guidance is practical — explains how to use Google's Rich Results Test and Search Console's enhancements report to verify markup"
    weight: 0.25
    description: "Practical testing and validation guidance"
  - type: llm_judge
    criteria: "Common mistakes are identified — missing required properties, mismatched content (schema says one thing, page says another), and over-marking content that doesn't qualify"
    weight: 0.20
    description: "Identified common schema mistakes"
