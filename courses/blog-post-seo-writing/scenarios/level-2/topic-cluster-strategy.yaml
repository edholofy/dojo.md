meta:
  id: topic-cluster-strategy
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Build a topic cluster strategy for topical authority"
  tags: [seo, topic-clusters, pillar-content, topical-authority, strategy]

state: {}

trigger: |
  Topic clusters build topical authority — when Google sees that your site
  comprehensively covers a subject, individual posts rank better. The
  structure: one pillar page + multiple cluster pages, all interlinked.

  Build a topic cluster for a B2B marketing automation company:

  Broad topic: "Marketing Automation"

  Design the complete cluster:

  1. Pillar page:
     - Title, URL, target keyword
     - Outline (H2s covering all major subtopics)
     - Word count recommendation
     - How the pillar page links to every cluster page

  2. Cluster pages (design 10):
     For each cluster page:
     - Title and target keyword
     - How it relates to the pillar page
     - Unique angle (what this page covers that the pillar doesn't)
     - Internal link: how it links back to the pillar

  3. Internal linking map:
     - Pillar → cluster links (every cluster page)
     - Cluster → pillar links (every cluster page links back)
     - Cluster → cluster links (related cluster pages link to each other)
     - Draw the visual map showing all connections

  4. Content calendar:
     - Publishing order (pillar first? or clusters first?)
     - How to build the cluster over 3 months
     - When to update the pillar page as clusters are published

  5. Competitive advantage:
     - Why topic clusters outrank individual blog posts
     - How to identify topics where you can build authority faster
     - Measuring topical authority progress

assertions:
  - type: llm_judge
    criteria: "The pillar page is comprehensive — covers marketing automation broadly (what, why, how, tools, best practices) while leaving room for cluster pages to go deeper on each subtopic"
    weight: 0.25
    description: "Comprehensive breadth-covering pillar page"
  - type: llm_judge
    criteria: "The 10 cluster pages each have a distinct focus — no overlap between cluster pages, each targeting a unique long-tail keyword that the pillar mentions but doesn't deeply cover"
    weight: 0.25
    description: "Distinctly focused non-overlapping cluster pages"
  - type: llm_judge
    criteria: "The internal linking map creates a true web — not just pillar-to-cluster spokes but also cluster-to-cluster connections where topics are related"
    weight: 0.25
    description: "Web-structured internal linking map"
  - type: llm_judge
    criteria: "The publishing strategy is well-reasoned — explains whether to publish the pillar first (establishes the hub) or clusters first (builds authority before the pillar), with justification"
    weight: 0.25
    description: "Well-reasoned publishing strategy"
