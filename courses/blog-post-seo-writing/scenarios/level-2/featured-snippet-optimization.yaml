meta:
  id: featured-snippet-optimization
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Write content specifically designed to win featured snippets"
  tags: [seo, featured-snippets, position-zero, serp-features, optimization]

state: {}

trigger: |
  Featured snippets ("position zero") appear above organic results and
  can dramatically increase traffic. There are 3 main types: paragraph
  snippets (40-60 words), list snippets, and table snippets.

  For each of these 5 keywords, write content optimized to win the
  featured snippet:

  1. "what is agile methodology" — Target: paragraph snippet
  2. "how to write a business plan" — Target: ordered list snippet
  3. "email marketing platforms comparison" — Target: table snippet
  4. "why do startups fail" — Target: paragraph snippet
  5. "steps to launch a podcast" — Target: ordered list snippet

  For each:
  - Write the heading (question format)
  - Write the snippet-optimized content block (the exact text you want
    Google to pull into the snippet)
  - Explain why this format targets the correct snippet type
  - How to structure the surrounding content to support the snippet

  Then provide:
  - The paragraph snippet formula (question heading + 40-50 word answer)
  - The list snippet formula (how-to heading + numbered steps)
  - The table snippet formula (comparison heading + structured table)
  - How to check if a keyword has featured snippet opportunity
  - Why snippets matter less with AI Overviews and how to adapt

assertions:
  - type: llm_judge
    criteria: "Each snippet-optimized block matches the correct format — paragraph snippets are 40-60 words with direct answers, list snippets use clear numbered steps, table snippets have structured comparison data"
    weight: 0.30
    description: "Correctly formatted snippet-optimized blocks"
  - type: llm_judge
    criteria: "The content is genuinely useful — the snippet answers are accurate and valuable, not just formatted for bots. A reader would learn from the answer even without clicking through"
    weight: 0.25
    description: "Genuinely useful snippet answers"
  - type: llm_judge
    criteria: "The formulas are clear and reusable — someone could apply the paragraph, list, and table snippet formulas to any keyword and produce snippet-worthy content"
    weight: 0.25
    description: "Clear reusable snippet formulas"
  - type: llm_judge
    criteria: "The AI Overview adaptation is current — acknowledges that featured snippets are being partially replaced by AI Overviews but explains how to optimize for both"
    weight: 0.20
    description: "Current AI Overview adaptation"
