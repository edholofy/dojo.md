meta:
  id: comparison-post-seo
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Write an SEO-optimized comparison blog post"
  tags: [seo, comparison-post, commercial-intent, product-review, content-type]

state: {}

trigger: |
  Comparison posts target commercial investigation intent — users who are
  actively comparing options before making a purchase decision. These
  posts have high conversion potential.

  Write a complete SEO-optimized comparison blog post:

  Topic: "Notion vs Asana vs Monday.com"
  Primary keyword: "notion vs asana vs monday"
  Audience: Team leads evaluating project management tools
  Content type: Detailed comparison with clear recommendation

  Write the full post outline with key sections:
  1. SEO-optimized title and meta description
  2. Introduction (establish credibility — "We tested all 3 for 30 days")
  3. Quick comparison table (features, pricing, best for)
  4. Individual reviews of each tool (H2 per tool):
     - Key features
     - Pros and cons
     - Best for (use case)
     - Pricing breakdown
  5. Head-to-head comparison sections:
     - Ease of use
     - Collaboration features
     - Integrations
     - Pricing value
  6. Verdict: "Which should you choose?" with clear recommendations
     by use case (not just "it depends")
  7. FAQ section

  Also provide:
  - Table schema markup for the comparison table
  - How to make the post fair and unbiased (even if you have a preference)
  - The "verdict framework" — how to give clear recommendations without
    alienating users of the other tools
  - How comparison posts earn affiliate revenue

assertions:
  - type: llm_judge
    criteria: "The comparison is genuinely balanced — each tool gets fair treatment with real pros and cons, not just a setup to recommend one product over others"
    weight: 0.25
    description: "Genuinely balanced comparison"
  - type: llm_judge
    criteria: "The verdict gives clear use-case recommendations — not just 'it depends' but specific guidance like 'choose Notion if you need a flexible workspace, Asana for structured project management'"
    weight: 0.25
    description: "Clear use-case-specific verdict"
  - type: llm_judge
    criteria: "The comparison table is structured for table snippet eligibility — clean rows and columns with standardized data that Google could pull as a featured snippet"
    weight: 0.25
    description: "Table-snippet-eligible comparison structure"
  - type: llm_judge
    criteria: "The content demonstrates experience — references like 'we tested all 3 for 30 days' and specific observations create E-E-A-T signals for commercial content"
    weight: 0.25
    description: "Experience-demonstrating commercial content"
