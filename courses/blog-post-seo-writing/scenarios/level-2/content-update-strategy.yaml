meta:
  id: content-update-strategy
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Update existing blog posts to improve rankings and freshness"
  tags: [seo, content-update, freshness, optimization, existing-content]

state: {}

trigger: |
  Updating existing content is often more effective than writing new posts.
  A well-optimized update can reclaim lost rankings and drive significant
  traffic gains.

  You have 5 existing blog posts that have lost rankings over the past
  6 months. Diagnose each and provide an update plan.

  Post 1: "Best CRM Software 2024" — was ranking #3, now #15
  - Problem hint: outdated year in title and content
  - Still getting 200 visits/month (down from 1,500)

  Post 2: "How to Start a Blog" — was ranking #5, now #22
  - Problem hint: 1,200 words, competitors average 3,000+ words
  - Content is thin and generic

  Post 3: "Email Marketing Statistics" — was ranking #2, now #8
  - Problem hint: statistics are from 2023-2024
  - Was a top link magnet, backlinks declining

  Post 4: "SEO Checklist for Beginners" — was ranking #4, now #12
  - Problem hint: still references old Google algorithm updates
  - Missing sections on AI content and Core Web Vitals

  Post 5: "Social Media Marketing Guide" — was ranking #6, now #25
  - Problem hint: doesn't mention Threads, AI tools, or 2026 platform changes
  - Structure hasn't changed in 2 years

  For each post:
  1. Diagnose why rankings dropped
  2. Specific update actions (what to add, remove, or restructure)
  3. Whether to update in-place or create a new post (and when each is appropriate)
  4. Expected ranking impact timeline
  5. Priority ranking (which to update first for maximum impact)

assertions:
  - type: llm_judge
    criteria: "Each diagnosis correctly identifies the specific reason for ranking loss — outdated dates, thin content, stale data, missing current topics, and outdated platform coverage"
    weight: 0.30
    description: "Correctly diagnosed ranking loss reasons"
  - type: llm_judge
    criteria: "The update plans are specific and actionable — not just 'make it longer' but 'add sections on X, update stats to 2026, restructure H2s to match current search intent'"
    weight: 0.25
    description: "Specific actionable update plans"
  - type: llm_judge
    criteria: "The update vs new post decision is well-reasoned — updates for posts with existing backlinks and authority, new posts only when the topic has fundamentally changed"
    weight: 0.25
    description: "Well-reasoned update vs new post decisions"
  - type: llm_judge
    criteria: "The priority ranking considers ROI — posts with highest traffic potential and most backlinks get updated first, with clear reasoning"
    weight: 0.20
    description: "ROI-considered update priority ranking"
