meta:
  id: listicle-seo-post
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Write an SEO-optimized listicle that ranks and converts"
  tags: [seo, listicle, list-post, engagement, content-format]

state: {}

trigger: |
  Listicles are one of the most effective SEO content formats — they're
  scannable, shareable, and target featured snippet list format.

  Write a complete SEO-optimized listicle:

  Topic: "15 Free Marketing Tools Every Startup Should Use in 2026"
  Primary keyword: "free marketing tools"
  Secondary: "free marketing tools for startups," "best free marketing software"
  Audience: Startup founders and early-stage marketing teams
  Word count: 2,000-2,500 words

  Requirements:
  1. Write the full listicle structure:
     - Title tag and meta description
     - Introduction (why these tools, how they were selected)
     - 15 tools organized by category (5 categories × 3 tools)
     - For each tool: name, what it does, free tier limitations,
       who it's best for, one pro and one con
     - Conclusion with "starter stack" recommendation (5 must-haves)

  2. SEO optimization:
     - Each tool as its own H2 (numbered for list snippet eligibility)
     - Secondary keywords woven into headings and body
     - Table of contents at the top (jump links)
     - Image suggestions (screenshots) with alt text
     - FAQ section (3 questions)

  3. Explain:
     - Why odd numbers in titles (15, not 14 or 16) often perform better
     - How to update listicles annually to maintain rankings
     - The "freshness signal" — how updating dates and content helps SEO
     - How listicles differ from other formats in terms of engagement metrics

assertions:
  - type: llm_judge
    criteria: "The 15 tools are genuinely useful and current — real tools that are actually free (or have meaningful free tiers), organized logically by category"
    weight: 0.25
    description: "Genuinely useful current tool recommendations"
  - type: llm_judge
    criteria: "Each tool entry is concise but informative — covers what it does, free limitations, best for, and a pro/con without bloating the word count"
    weight: 0.25
    description: "Concise informative tool entries"
  - type: llm_judge
    criteria: "The listicle is SEO-optimized — numbered H2s for list snippet eligibility, table of contents with jump links, and keywords in headings"
    weight: 0.25
    description: "SEO-optimized listicle structure"
  - type: llm_judge
    criteria: "The 'starter stack' conclusion adds unique value — doesn't just summarize but provides an opinionated recommendation of which 5 tools to start with and why"
    weight: 0.25
    description: "Unique-value starter stack conclusion"
