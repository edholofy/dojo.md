meta:
  id: how-to-guide-seo
  level: 2
  course: blog-post-seo-writing
  type: output
  description: "Write a complete how-to blog post optimized for SEO"
  tags: [seo, how-to-guide, tutorial, step-by-step, content-writing]

state: {}

trigger: |
  How-to guides are the most consistent traffic-driving format in SEO.
  They match informational intent, target long-tail keywords, and can
  win featured snippets.

  Write a complete SEO-optimized how-to blog post:

  Topic: "How to Create a Content Calendar"
  Primary keyword: "how to create a content calendar"
  Secondary keywords: "content calendar template," "content planning,"
  "editorial calendar," "social media content calendar"
  Target: Marketing managers at small businesses (10-50 employees)
  Word count: 1,800-2,200 words

  Write the full blog post including:
  1. SEO-optimized title tag and meta description
  2. Introduction (APP formula, keyword in first 100 words)
  3. Step-by-step body content with:
     - H2s for each major step (6-8 steps)
     - H3s for sub-steps where needed
     - Practical examples and templates
     - Screenshot/image descriptions for key steps
  4. FAQ section (3-4 questions from "People Also Ask")
  5. Conclusion with CTA
  6. Internal linking suggestions (hypothetical)

  Also provide:
  - The HowTo schema markup structure for this post
  - Which sections target featured snippets
  - Image alt text for 4 suggested images

assertions:
  - type: llm_judge
    criteria: "The blog post is genuinely useful — someone could follow the steps and actually create a content calendar. The advice is specific and actionable, not theoretical"
    weight: 0.25
    description: "Genuinely useful actionable how-to content"
  - type: llm_judge
    criteria: "SEO best practices are integrated naturally — keywords appear in headings, first 100 words, and throughout without disrupting readability. The structure is optimized for featured snippets"
    weight: 0.25
    description: "Naturally integrated SEO optimization"
  - type: llm_judge
    criteria: "The FAQ section targets real 'People Also Ask' questions — questions like 'How often should I update my content calendar?' and 'What's the difference between a content calendar and editorial calendar?'"
    weight: 0.25
    description: "Real PAA-targeting FAQ section"
  - type: llm_judge
    criteria: "The word count is within range (1,800-2,200 words) and every section adds value — no fluff or padding to hit word count"
    weight: 0.25
    description: "Value-dense within-range word count"
