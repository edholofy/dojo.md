meta:
  id: programmatic-seo-content
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Design programmatic SEO strategies for scalable content creation"
  tags: [seo, programmatic-seo, scalable-content, templates, automation]

state: {}

trigger: |
  Programmatic SEO creates hundreds or thousands of pages from templates
  and data. Companies like Zapier (integration pages), NomadList (city pages),
  and Wise (currency converter pages) drive millions of visits this way.

  You're building programmatic SEO for a job board platform.

  Design the programmatic content system:

  1. Page type identification:
     Design 3 programmatic page types:
     a) "[Job Title] Salary in [City]" pages (e.g., "Software Engineer
        Salary in Austin")
        - Data sources needed
        - Template structure
        - Unique content elements per page
        - Estimated page count: ~5,000 pages

     b) "[Job Title] Job Description Template" pages
        - Template structure with variable sections
        - How each page is unique (not just city swapped)
        - Estimated page count: ~500 pages

     c) "[Company] Reviews and Salaries" pages
        - Data integration requirements
        - User-generated content component
        - Estimated page count: ~10,000 pages

  2. Template design (for the salary page type):
     - Write the full page template with variables marked
     - H1, meta title, meta description templates
     - Body content sections (mix of templated + dynamic data)
     - How to make each page genuinely useful (not thin/doorway)
     - Minimum unique content threshold per page

  3. Quality at scale:
     - How to avoid Google's "thin content" penalty with templated pages
     - Minimum quality bar per page
     - When to noindex low-value pages (low search volume locations)
     - Internal linking strategy across thousands of pages
     - Sitemap management for large page sets

  4. Risks and mitigation:
     - Doorway page penalty risk
     - Index bloat and crawl budget
     - Duplicate content across similar pages
     - How Google's helpful content system evaluates programmatic content
     - When programmatic SEO is appropriate vs when it's spam

assertions:
  - type: llm_judge
    criteria: "The page templates create genuinely unique pages — not just swapping a city name but including unique data, insights, and context that make each page useful on its own"
    weight: 0.30
    description: "Genuinely unique templated pages"
  - type: llm_judge
    criteria: "The quality-at-scale strategy is realistic — addresses the real tension between creating thousands of pages and maintaining quality, with specific thresholds and noindex criteria"
    weight: 0.25
    description: "Realistic quality-at-scale strategy"
  - type: llm_judge
    criteria: "The risk assessment correctly identifies doorway page penalties — explains what makes programmatic SEO legitimate (unique value per page) vs spammy (thin template pages with swapped variables)"
    weight: 0.25
    description: "Correct doorway page risk assessment"
  - type: llm_judge
    criteria: "The internal linking strategy handles scale — explains how to link across thousands of pages without creating an unmanageable link structure, using hub pages, breadcrumbs, and related page suggestions"
    weight: 0.20
    description: "Scalable internal linking strategy"
