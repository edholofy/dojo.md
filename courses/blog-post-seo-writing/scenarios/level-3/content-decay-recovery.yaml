meta:
  id: content-decay-recovery
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Identify and recover blog posts suffering from content decay"
  tags: [seo, content-decay, traffic-loss, recovery, optimization]

state: {}

trigger: |
  Content decay is the gradual loss of organic traffic over time. Every
  blog post has a "freshness half-life" — the point where rankings begin
  declining without updates. Identifying and recovering decaying content
  is one of the highest-ROI SEO activities.

  Your B2B SaaS blog has 150 posts. You've identified these decay patterns:

  Decay Pattern A — Freshness decay:
  Post: "Best Video Conferencing Tools 2025"
  Peak: 8,000 visits/mo (March 2025) → Now: 2,100 visits/mo
  Cause: Year in title is outdated, competitors updated for 2026

  Decay Pattern B — Intent shift:
  Post: "How to Work from Home Productively"
  Peak: 12,000 visits/mo (2021) → Now: 1,800 visits/mo
  Cause: Search intent shifted from "how to start" to "how to optimize"
  as remote work became normal

  Decay Pattern C — Competition increased:
  Post: "Project Management Methodologies Explained"
  Peak: 5,500 visits/mo → Now: 2,200 visits/mo
  Cause: 5 new competitors published more comprehensive guides

  Decay Pattern D — Algorithm update impact:
  Post: "Quick Guide to Agile" (800 words, thin content)
  Peak: 3,000 visits/mo → Now: 400 visits/mo
  Cause: Google's helpful content update penalized thin content

  For each decay pattern:
  1. Detailed diagnosis (why traffic dropped)
  2. Recovery strategy (specific content changes)
  3. Expected recovery timeline and traffic target
  4. How to prevent this decay pattern in the future

  Also provide:
  5. Content decay detection system:
     - Metrics to monitor and alert thresholds
     - How to automate decay detection
     - Quarterly review process
     - Prioritization: which decaying posts to fix first

assertions:
  - type: llm_judge
    criteria: "Each decay pattern gets a distinct recovery strategy — freshness decay needs date updates and new tools, intent shift needs content restructuring, competition needs depth expansion, and algorithm impact needs quality improvement"
    weight: 0.30
    description: "Distinct recovery strategies per pattern"
  - type: llm_judge
    criteria: "The intent shift diagnosis is nuanced — correctly identifies that the same keyword can change meaning over time as user needs evolve, requiring content reframing not just updating"
    weight: 0.25
    description: "Nuanced intent shift diagnosis"
  - type: llm_judge
    criteria: "Recovery timelines are realistic — freshness updates recover faster (2-4 weeks) while algorithm penalty recovery takes longer (3-6 months) and may require significant rewrites"
    weight: 0.25
    description: "Realistic recovery timelines"
  - type: llm_judge
    criteria: "The detection system is automated and actionable — includes specific metrics (traffic drop thresholds, position monitoring), tools or methods for automation, and a clear review cadence"
    weight: 0.20
    description: "Automated actionable detection system"
