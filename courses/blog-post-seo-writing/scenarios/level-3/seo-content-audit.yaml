meta:
  id: seo-content-audit
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Audit a blog's content library to identify what to update, merge, or delete"
  tags: [seo, content-audit, content-pruning, optimization, strategy]

state: {}

trigger: |
  A content audit identifies which posts to update, merge, redirect, or
  delete. Most blogs have 30-40% of content that's hurting overall site
  quality and cannibalizing rankings.

  You're auditing a SaaS company blog with 200 published posts over 4 years.

  Here's a sample of 10 posts with their metrics:

  Post 1: "What Is CRM?" — 15,000 visits/mo, position #4, 85 backlinks
  Post 2: "CRM Software Guide" — 3,200 visits/mo, position #8, 42 backlinks
  Post 3: "What Is CRM Software?" — 400 visits/mo, position #28, 5 backlinks
  Post 4: "Best CRM for Small Business 2023" — 800 visits/mo, position #14, 22 backlinks
  Post 5: "CRM Implementation Steps" — 1,100 visits/mo, position #6, 18 backlinks
  Post 6: "CRM vs Spreadsheets" — 200 visits/mo, position #35, 2 backlinks
  Post 7: "Our Company Update — New Office" — 15 visits/mo, no ranking, 0 backlinks
  Post 8: "Top 10 CRM Features" — 900 visits/mo, position #11, 12 backlinks
  Post 9: "CRM for Real Estate" — 2,400 visits/mo, position #3, 30 backlinks
  Post 10: "CRM Pricing Comparison" — 1,800 visits/mo, position #7, 25 backlinks

  Perform the full audit:

  1. Categorize each post (with reasoning):
     - Keep as-is (performing well)
     - Update (has potential but needs refresh)
     - Merge (overlapping with another post)
     - Redirect & delete (low value, hurting site quality)
     - Repurpose (wrong format but good topic)

  2. Identify cannibalization issues:
     - Which posts are competing for the same keywords?
     - How to resolve: merge, differentiate, or redirect?
     - The correct redirect strategy (301 to the winner)

  3. Content consolidation plan:
     - Which posts should be merged and into what?
     - How to preserve backlinks during merges (redirect strategy)
     - Expected traffic impact of consolidation

  4. Update priority matrix:
     - Rank posts by update priority
     - Scoring: (current traffic + backlinks + keyword potential) / update effort
     - Which posts give the highest ROI for update effort?

  5. Blog health score:
     - What percentage of these posts are healthy vs unhealthy?
     - Extrapolate to the full 200-post blog
     - Recommended audit frequency

assertions:
  - type: llm_judge
    criteria: "Posts 1, 2, and 3 are correctly identified as a cannibalization cluster — three posts targeting variations of 'what is CRM / CRM software' should be consolidated, with the strongest post (Post 1) as the winner"
    weight: 0.30
    description: "Correctly identified cannibalization cluster"
  - type: llm_judge
    criteria: "Post 7 (company update) is correctly flagged for deletion or noindex — it has no SEO value, no backlinks, and dilutes crawl budget and site quality"
    weight: 0.20
    description: "Correctly flagged low-value content"
  - type: llm_judge
    criteria: "The redirect strategy preserves link equity — when merging posts, 301 redirects from deleted posts to the consolidated post are specified, and backlink preservation is addressed"
    weight: 0.25
    description: "Link equity preserving redirect strategy"
  - type: llm_judge
    criteria: "The priority matrix correctly identifies Post 4 as a high-ROI update target — it has decent backlinks and traffic but is outdated (2023), making a year update likely to recover significant rankings"
    weight: 0.25
    description: "Correct high-ROI update identification"
