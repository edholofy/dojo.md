meta:
  id: long-form-pillar-content
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Write a comprehensive pillar page that ranks for high-volume keywords"
  tags: [seo, pillar-content, long-form, comprehensive-guide, topical-authority]

state: {}

trigger: |
  Pillar pages are comprehensive resources (3,000-7,000+ words) that cover
  a broad topic completely. They rank for high-volume head terms and serve
  as the hub for topic cluster strategies.

  Write a pillar page plan and partial draft for:
  Topic: "Email Marketing: The Complete Guide"
  Target keyword: "email marketing" (110,000 monthly searches)
  Target audience: Marketing managers at SMBs

  Provide:

  1. Complete pillar page outline:
     - Title tag and H1 (optimized for "email marketing")
     - All H2 sections (8-12 sections covering the topic comprehensively)
     - H3 subsections under each H2
     - Estimated word count per section
     - Total target word count with justification

  2. Write 2 sections in full (500-700 words each):
     - Section 1: An introductory/definitional section
     - Section 2: A tactical/how-to section
     - Both should demonstrate:
       a) Natural keyword integration (primary + semantically related)
       b) Scannable formatting (bullets, bold, short paragraphs)
       c) Internal link placement opportunities (marked with [LINK: topic])
       d) E-E-A-T signals woven into the content

  3. On-page optimization for the pillar:
     - Meta title and description
     - URL structure
     - Table of contents implementation
     - Jump link strategy
     - Featured snippet targeting within sections
     - Schema markup recommendations

  4. How pillar pages differ from regular blog posts:
     - Depth vs breadth balance
     - When to go deep vs when to link to cluster pages
     - Update frequency requirements
     - How to prevent keyword cannibalization with cluster pages

assertions:
  - type: llm_judge
    criteria: "The outline is genuinely comprehensive — covers all major aspects of email marketing (strategy, list building, segmentation, automation, copywriting, deliverability, analytics, compliance) without major gaps"
    weight: 0.25
    description: "Genuinely comprehensive outline"
  - type: llm_judge
    criteria: "The two written sections demonstrate excellent SEO writing — natural keyword usage, scannable formatting, internal link opportunities clearly marked, and content that's genuinely useful rather than keyword-stuffed"
    weight: 0.30
    description: "Excellent SEO writing in drafted sections"
  - type: llm_judge
    criteria: "The pillar page correctly balances breadth and depth — covers each subtopic enough to be useful on its own but leaves room for cluster pages to go deeper"
    weight: 0.25
    description: "Correct breadth-depth balance"
  - type: llm_judge
    criteria: "The cannibalization prevention strategy is practical — explains how the pillar targets the head term while cluster pages target long-tail variations, with clear linking to avoid competition"
    weight: 0.20
    description: "Practical cannibalization prevention"
