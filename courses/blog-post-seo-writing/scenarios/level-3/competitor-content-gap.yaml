meta:
  id: competitor-content-gap
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Analyze competitor content to find ranking opportunities they've missed"
  tags: [seo, competitor-analysis, content-gap, keyword-opportunity, strategy]

state: {}

trigger: |
  Content gap analysis reveals keywords your competitors rank for that you
  don't — and topics none of them cover well. This is where the biggest
  SEO opportunities hide.

  You're doing a content gap analysis for an email marketing platform
  competing against Mailchimp, ConvertKit, and ActiveCampaign.

  Perform the analysis:

  1. Competitor content audit (for each of the 3 competitors):
     - Estimate their blog content volume and publishing frequency
     - Identify their strongest content pillars (what topics they dominate)
     - Find their weakest areas (topics with thin or outdated coverage)
     - Note their content formats (guides, comparisons, templates, etc.)

  2. Gap identification — find 10 content opportunities:
     For each opportunity:
     - Target keyword and estimated monthly search volume
     - Which competitors rank for it (and their position)
     - Why there's an opportunity (weak content, outdated, missing angle)
     - Your competitive advantage (what you can do better)
     - Content type to create (guide, comparison, tool, etc.)
     - Difficulty assessment (easy win vs long-term play)

  3. Prioritization framework:
     - Score each opportunity on: search volume, competition difficulty,
       business relevance, and content creation effort
     - Rank all 10 from highest to lowest priority
     - Explain the scoring methodology

  4. Quick wins vs long-term plays:
     - Which 3 opportunities could rank within 60 days?
     - Which 3 require 6+ months of content investment?
     - What's the difference in approach?

  5. Content differentiation strategy:
     - How to create content that's genuinely better (not just longer)
     - Angles competitors haven't covered
     - Unique data or expertise you can leverage

assertions:
  - type: llm_judge
    criteria: "The 10 content opportunities are specific and realistic — real keyword targets with plausible search volumes for the email marketing space, not generic topics"
    weight: 0.25
    description: "Specific realistic content opportunities"
  - type: llm_judge
    criteria: "The prioritization framework balances multiple factors — not just search volume but also difficulty, business relevance, and effort, with clear reasoning for the final ranking"
    weight: 0.25
    description: "Multi-factor prioritization framework"
  - type: llm_judge
    criteria: "Quick wins are genuinely quick — low competition keywords with weak existing content, not high-competition terms optimistically labeled as quick wins"
    weight: 0.25
    description: "Genuinely achievable quick wins"
  - type: llm_judge
    criteria: "The differentiation strategy goes beyond 'write longer content' — suggests unique angles, original data, better structure, or expert perspectives that create genuine competitive advantage"
    weight: 0.25
    description: "Substantive differentiation strategy"
