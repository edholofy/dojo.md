meta:
  id: link-building-content
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Create content specifically designed to earn backlinks naturally"
  tags: [seo, link-building, linkable-assets, content-strategy, backlinks]

state: {}

trigger: |
  Backlinks remain Google's strongest ranking signal. But "write great content
  and links will come" is a myth — you need to create specific content types
  designed to attract links.

  You're the SEO lead for a project management SaaS. Your domain has 500
  referring domains. Top competitors have 2,000+. You need to close the gap.

  Create 5 linkable asset concepts:

  1. Original research / data study:
     - Topic: "State of Remote Project Management 2026"
     - Data source strategy (survey, product data, public data)
     - Key findings to target (what journalists and bloggers would cite)
     - Report structure with shareable statistics
     - Outreach angle: who would link to this and why

  2. Free tool / calculator:
     - Concept: interactive tool related to project management
     - What it calculates or generates
     - Why people link to tools (utility value)
     - How to make it embeddable

  3. Definitive guide / resource page:
     - Topic that has no single comprehensive resource yet
     - Why this becomes the "go-to" reference
     - Structure that makes it link-worthy (not just long)

  4. Infographic / visual asset:
     - Data visualization concept
     - Why visual content earns links (easy to embed, shareable)
     - Embed code strategy

  5. Contrarian / newsworthy content:
     - A data-backed take that challenges conventional wisdom
     - Why controversial (but accurate) content earns press links
     - Risk management: being provocative without being wrong

  For each concept:
  - Estimated links it could earn (with reasoning)
  - Content creation cost and timeline
  - Outreach strategy (who to pitch and how)
  - How to measure link-building ROI

assertions:
  - type: llm_judge
    criteria: "Each linkable asset has a clear reason WHY someone would link to it — not just because it's good content but because it serves a specific need (citation, utility, reference, embed, newsworthy)"
    weight: 0.30
    description: "Clear link-earning rationale per asset"
  - type: llm_judge
    criteria: "The outreach strategies are specific — identifies actual target audiences (journalists covering remote work, PM bloggers, HR publications) rather than generic 'reach out to bloggers'"
    weight: 0.25
    description: "Specific outreach strategies"
  - type: llm_judge
    criteria: "The original research concept is feasible — the data sources are realistic and the findings would genuinely interest journalists and industry bloggers"
    weight: 0.25
    description: "Feasible original research concept"
  - type: llm_judge
    criteria: "Cost and timeline estimates are realistic — an original research study takes months and significant budget, while a definitive guide is faster and cheaper"
    weight: 0.20
    description: "Realistic cost and timeline estimates"
