meta:
  id: seo-ab-testing
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Design and interpret A/B tests for SEO content elements"
  tags: [seo, ab-testing, experimentation, data-driven, optimization]

state: {}

trigger: |
  SEO A/B testing lets you make data-driven decisions about content changes
  instead of relying on best practices alone. But SEO testing is different
  from conversion testing — you can't split traffic at the Google level.

  You're the SEO manager for a large e-commerce blog (500+ posts).

  Design SEO A/B tests for these elements:

  1. Title tag test:
     - Hypothesis: Adding the year to title tags increases CTR
     - Test group: 50 product review posts
     - Control: "Best Running Shoes (Expert Reviewed)"
     - Variant: "Best Running Shoes 2026 (Expert Reviewed)"
     - How to measure: CTR from Search Console
     - Duration: minimum test period and why
     - How to determine statistical significance for SEO tests

  2. Content length test:
     - Hypothesis: Expanding thin content from 800 to 2,000 words
       improves rankings
     - Test group: 30 posts currently at 600-900 words
     - What to expand (not just fluff — substantive additions)
     - How to isolate the length variable from other changes
     - Measurement: position change, traffic change, engagement metrics

  3. Internal linking test:
     - Hypothesis: Adding 5 contextual internal links per post improves
       linked page rankings
     - Test group: 40 posts with 0-1 internal links
     - Control: no changes
     - Variant: add 5 relevant internal links
     - How to measure the impact on BOTH the linking and linked pages

  4. Content structure test:
     - Hypothesis: Adding a TL;DR summary at the top improves engagement
       and reduces bounce rate
     - How to implement without hurting featured snippet targeting
     - Metrics to track

  For each test:
  - Clear hypothesis and expected outcome
  - Test design (groups, duration, sample size)
  - Measurement methodology
  - How to account for SEO confounding variables
  - Decision criteria: when to roll out vs roll back

assertions:
  - type: llm_judge
    criteria: "The testing methodology accounts for SEO-specific challenges — Google doesn't allow traditional traffic splitting, so the approach uses time-based or page-group-based testing with appropriate controls"
    weight: 0.30
    description: "SEO-specific testing methodology"
  - type: llm_judge
    criteria: "Statistical significance is addressed correctly — SEO tests need longer durations (4-8 weeks minimum) due to Google's indexing and ranking update cycles, and this is explained"
    weight: 0.25
    description: "Correct statistical significance approach"
  - type: llm_judge
    criteria: "Confounding variables are identified — seasonality, algorithm updates, competitor changes, and other ranking factors that could skew results are acknowledged with mitigation strategies"
    weight: 0.25
    description: "Confounding variables identified"
  - type: llm_judge
    criteria: "Decision criteria are clear — specific thresholds for when to declare a test successful, when to extend, and when to roll back changes"
    weight: 0.20
    description: "Clear decision criteria"
