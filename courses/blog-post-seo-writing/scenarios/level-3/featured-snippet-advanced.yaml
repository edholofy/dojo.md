meta:
  id: featured-snippet-advanced
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Advanced techniques for winning and defending featured snippet positions"
  tags: [seo, featured-snippets, serp-features, position-zero, advanced]

state: {}

trigger: |
  Featured snippets appear above organic results ("position zero") and can
  dramatically increase CTR. But in 2026, Google's AI Overviews compete
  with traditional featured snippets. You need strategies for both.

  You're optimizing a cybersecurity company's blog for featured snippets.

  Provide advanced snippet strategies:

  1. Snippet type targeting (with examples for each):
     a) Paragraph snippets:
        - Target query: "what is zero trust security"
        - Write the optimized paragraph (40-60 words, direct answer)
        - HTML structure that triggers paragraph snippets
     b) List snippets:
        - Target query: "steps to secure a network"
        - Write the optimized list (H2 + ordered list structure)
        - Why Google prefers H2-anchored lists
     c) Table snippets:
        - Target query: "firewall comparison"
        - Write the optimized HTML table
        - Data formatting that triggers table snippets
     d) Video snippets:
        - When video snippets appear instead of text
        - How to optimize video content for snippet selection

  2. Snippet defense strategies:
     - You currently hold 15 featured snippets
     - Competitors are stealing them — what to do
     - How to monitor snippet ownership
     - Content freshness signals that protect snippet positions
     - "Double snippet" strategy (holding both snippet and first organic)

  3. AI Overview vs Featured Snippet:
     - How Google's AI Overviews affect featured snippet traffic
     - Which queries still show traditional featured snippets
     - How to optimize for both AI Overviews and featured snippets
     - When to pursue featured snippets vs when to focus on other SERP features

  4. Featured snippet content templates:
     - "What is X" template (definition snippet)
     - "How to X" template (process snippet)
     - "X vs Y" template (comparison snippet)
     - "Best X" template (list snippet)
     - Show the exact content structure for each

assertions:
  - type: llm_judge
    criteria: "The snippet-optimized content examples are correctly formatted — paragraph snippets are 40-60 words with a direct answer, list snippets use proper H2 + list HTML structure, and table snippets use properly formatted HTML tables"
    weight: 0.30
    description: "Correctly formatted snippet content"
  - type: llm_judge
    criteria: "The AI Overview analysis is current — correctly explains that AI Overviews have reduced traditional snippet traffic for some queries while others still show traditional snippets, and provides strategies for both"
    weight: 0.25
    description: "Current AI Overview analysis"
  - type: llm_judge
    criteria: "The defense strategies are practical — monitoring snippet ownership, freshness updates, and content improvements to prevent competitors from stealing existing snippets"
    weight: 0.25
    description: "Practical snippet defense strategies"
  - type: llm_judge
    criteria: "The content templates are reusable — each template shows a clear structure that could be applied to any topic, not just the cybersecurity examples"
    weight: 0.20
    description: "Reusable content templates"
