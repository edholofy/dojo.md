meta:
  id: local-seo-blog-strategy
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Create a blog strategy optimized for local search rankings"
  tags: [seo, local-seo, blog-strategy, geo-targeting, local-business]

state: {}

trigger: |
  Local SEO blog content targets location-specific keywords and helps
  businesses rank in local search results. The strategy differs significantly
  from national SEO blog writing.

  You're the marketing manager for a multi-location dental practice with
  5 offices across Denver, Colorado (Downtown Denver, Aurora, Lakewood,
  Boulder, Fort Collins).

  Design the local SEO blog strategy:

  1. Local keyword strategy:
     - 10 local blog post topics with target keywords
     - Mix of: "[service] + [location]" posts, local event content,
       community-focused content, and location-specific FAQ posts
     - Search volume estimates for local keywords vs national keywords
     - How local intent differs from informational intent

  2. Location page + blog integration:
     - How blog posts support individual location pages
     - Internal linking between location pages and blog content
     - Avoiding duplicate content across 5 locations
     - When to create location-specific versions vs single posts

  3. Write one complete local SEO blog post (800 words):
     - Topic: "Emergency Dentist in Denver: What to Do When You Need
       Urgent Dental Care"
     - Include: local schema markup, NAP consistency, local landmarks,
       neighborhood references, driving directions context
     - Show how local signals are woven into natural content

  4. Google Business Profile + blog synergy:
     - How blog content supports GBP rankings
     - Using blog posts for GBP updates
     - Q&A content that mirrors GBP questions
     - Review response content strategy

  5. Local content calendar (3 months):
     - Mix of evergreen local content and timely local content
     - How to cover all 5 locations without being repetitive
     - Seasonal local content opportunities

assertions:
  - type: llm_judge
    criteria: "The local keyword topics are genuinely location-specific — not just national keywords with a city name appended, but topics that reflect actual local search behavior (emergency services, neighborhood-specific queries, local event tie-ins)"
    weight: 0.25
    description: "Genuinely location-specific keywords"
  - type: llm_judge
    criteria: "The multi-location strategy correctly handles duplicate content — explains when to create unique pages per location vs single posts, and how to differentiate content for 5 offices without thin duplicate pages"
    weight: 0.25
    description: "Correct multi-location duplicate handling"
  - type: llm_judge
    criteria: "The sample blog post naturally integrates local signals — mentions neighborhoods, landmarks, and local context without keyword stuffing, and reads like content written for local residents"
    weight: 0.25
    description: "Naturally integrated local signals"
  - type: llm_judge
    criteria: "The GBP integration strategy is actionable — specific tactics for using blog content to enhance Google Business Profile performance, not just generic advice"
    weight: 0.25
    description: "Actionable GBP integration strategy"
