meta:
  id: multilingual-seo-content
  level: 3
  course: blog-post-seo-writing
  type: output
  description: "Create SEO blog content for multiple languages and regions"
  tags: [seo, multilingual, international, hreflang, localization]

state: {}

trigger: |
  International SEO requires more than translation — it requires
  localization of keywords, search intent, and content structure for
  each target market. A direct translation often targets the wrong
  keywords entirely.

  You're expanding a fintech company's blog from English (US) to:
  - Spanish (Spain + Latin America)
  - German (Germany)
  - Portuguese (Brazil)

  Design the multilingual SEO content strategy:

  1. Keyword localization (not just translation):
     Take this English blog post: "How to Build an Emergency Fund"
     (target keyword: "emergency fund", 40,000 monthly searches US)

     For each language:
     - Research the correct local keyword (not direct translation)
     - Explain why direct translation often targets wrong keywords
     - Local search volume comparison
     - Cultural context differences that affect content angle
     - Example: In Germany, "Notgroschen" vs "Notfallfonds" — which
       people actually search for and why

  2. Content adaptation strategy:
     - What content can be translated with localization
     - What content needs to be rewritten from scratch
     - Cultural differences that change the content angle
     - Local regulations that affect financial content (YMYL compliance per region)
     - Local examples, currencies, and financial systems

  3. Technical implementation:
     - Hreflang tag implementation (show exact code)
     - URL structure decision: subdirectories (/es/) vs subdomains (es.site.com)
       vs ccTLDs (site.es) — pros/cons of each
     - Canonical tag handling for similar content across languages
     - XML sitemap structure for multilingual content

  4. Content production workflow:
     - Native speakers vs AI translation vs professional translation
     - SEO review process per language
     - How to maintain consistency across languages
     - Publishing cadence for 4 language versions

  5. Common international SEO mistakes:
     - Auto-translation without keyword research
     - Same content for Spain Spanish and Latin American Spanish
     - Missing hreflang tags causing wrong language pages to rank
     - Ignoring local search engines (not just Google)

assertions:
  - type: llm_judge
    criteria: "The keyword localization demonstrates genuine understanding — shows that direct translation misses actual search behavior, with specific examples of how people in different countries search differently for the same concept"
    weight: 0.30
    description: "Genuine keyword localization understanding"
  - type: llm_judge
    criteria: "The hreflang implementation is technically correct — proper tag syntax, correct language-region codes (es-ES vs es-MX), and handles the x-default tag for fallback"
    weight: 0.25
    description: "Technically correct hreflang implementation"
  - type: llm_judge
    criteria: "The URL structure recommendation is well-reasoned — explains trade-offs between subdirectories (easier management) and ccTLDs (stronger local signal) with a clear recommendation based on the scenario"
    weight: 0.25
    description: "Well-reasoned URL structure recommendation"
  - type: llm_judge
    criteria: "The Spain vs Latin America distinction is addressed — correctly notes that Spanish content needs separate versions for different regional markets with different keywords, idioms, and financial contexts"
    weight: 0.20
    description: "Correct regional Spanish distinction"
