meta:
  id: compliance-behavioral-science
  level: 5
  course: compliance-checklist-creation
  type: output
  description: "Write a comprehensive book chapter on applying behavioral science to compliance checklist design, drawing on experimental research and organizational psychology"
  tags: [behavioral-science, psychology, checklist-design, master]

state: {}

trigger: |
  You're a professor of organizational behavior at a
  top business school, jointly appointed in the
  psychology department, and a leading researcher on
  decision-making in compliance contexts. You've been
  invited to write a chapter for "The Oxford Handbook
  of Corporate Compliance" titled:

  "Thinking About Checklists: A Behavioral Science
  Approach to Compliance Tool Design"

  Your chapter draws on:

  1. Your experimental research program (12 published
     studies):
     - Study 1: Compliance checklist framing effects —
       checklists framed as "requirements to meet"
       generated 23% more thorough compliance than
       identical items framed as "violations to avoid"
     - Study 2: Checklist length and completion quality —
       non-linear relationship; completion quality peaks
       at 12-15 items, then declines; but artificially
       truncated lists miss critical items
     - Study 3: Checklist ordering effects — regulatory
       items presented in decreasing perceived severity
       order received more attention throughout than
       alphabetical or random ordering
     - Study 4: Checkpoint checklists vs comprehensive
       checklists — breaking compliance checks into
       process-embedded checkpoints yielded 34% higher
       compliance than end-of-process comprehensive
       review
     - Study 5: Social proof in compliance — showing
       peer completion rates increased compliance
       checklist thoroughness by 18% but created
       herding effects in judgment items
     - Study 6: Compliance fatigue — after completing 3+
       checklists in a day, quality of last checklist
       dropped 41% compared to first
     - Studies 7-12: Additional findings on accountability
       cues, automation bias, moral licensing after
       checklist completion, default effects in
       compliance choices, narrative vs itemized
       compliance guidance, time pressure effects

  2. Meta-analysis of 84 studies on checklist
     effectiveness across domains (aviation, surgery,
     construction, nuclear, financial compliance)

  3. Field experiments with 3 Fortune 500 companies
     testing behavioral interventions in real compliance
     programs (approved by IRB, conducted over 3 years)

  Task: Write this comprehensive book chapter presenting
  your research findings, their theoretical foundations,
  and practical design principles for creating
  behaviorally-informed compliance checklists that
  actually change behavior rather than just document it.

assertions:
  - type: llm_judge
    criteria: "Response produces a substantive academic book chapter — presents the 12 experimental studies with methodological rigor (sample sizes, effect sizes, statistical significance, replication status); synthesizes findings into a coherent theoretical framework for behavioral compliance; discusses the meta-analysis findings across domains (what makes checklists effective in aviation/surgery vs what translates to compliance contexts); presents field experiment results with ecological validity discussion; integrates relevant behavioral science theories (dual-process theory, bounded rationality, prospect theory, social norms theory, decision fatigue, cognitive load theory); addresses the fundamental tension between compliance as rule-following and compliance as risk-management judgment; the chapter would meet Oxford Handbook editorial standards."
    weight: 0.35
    description: "SubstantiveAcademicChapter"
  - type: llm_judge
    criteria: "Response addresses the 'checklist paradox' with theoretical depth — explores when checklists help (well-defined processes, verifiable items, safety-critical operations) vs when they harm (complex judgment situations, rapidly changing risk environments, novel compliance challenges); addresses the 'moral licensing' effect (completing a checklist reduces subsequent compliance vigilance); analyzes automation bias in compliance (over-reliance on automated checklist systems); examines the relationship between checklist completion and actual compliance behavior (correlation vs causation); addresses compliance theater (performative checklist completion without behavioral change); integrates Atul Gawande's checklist manifesto findings with compliance-specific research; discusses the 'dark side' of checklists (false assurance, gaming, minimum compliance mentality); the analysis demonstrates genuine behavioral science expertise."
    weight: 0.35
    description: "ChecklistParadoxDepth"
  - type: llm_judge
    criteria: "Response provides actionable design principles grounded in research — translates research findings into specific checklist design principles (optimal length, framing, ordering, checkpoint embedding, social proof integration, fatigue mitigation strategies); provides design templates or examples showing how to apply each principle; addresses the practical constraints compliance professionals face (regulatory requirements for specific checklist items, audit expectations, scalability across organizations); creates a decision framework for when to use checklists vs alternative compliance tools; addresses technology implications (how digital checklist platforms should incorporate behavioral insights); provides recommendations for organizations considering redesigning their compliance checklists; addresses implementation challenges and change management; the design principles are specific enough for a CCO to implement, not just theoretically interesting."
    weight: 0.30
    description: "ActionableDesignPrinciples"
