meta:
  id: compliance-consulting-practice
  level: 5
  course: compliance-checklist-creation
  type: output
  description: "Design a compliance consulting practice business plan including service offerings, methodology, go-to-market strategy, and delivery frameworks"
  tags: [consulting, compliance-practice, methodology, master]

state: {}

trigger: |
  You're a former Fortune 100 Chief Compliance Officer
  with 25 years of regulatory experience (DOJ, SEC, OCC,
  and in-house) launching a compliance advisory firm
  called "ComplianceForge." You've secured $3M in seed
  funding from a group of former regulators and General
  Counsels.

  Your vision: Build a next-generation compliance
  consulting firm that combines deep regulatory expertise
  with technology-enabled delivery, competing against
  Big 4 firms (Deloitte, PwC, EY, KPMG), boutique
  compliance shops, and emerging RegTech companies.

  Market analysis:
  - Global compliance spending estimated at $270B (2025)
  - Compliance consulting market growing 12% CAGR
  - Key growth drivers: AI governance, ESG compliance,
    privacy regulation proliferation, sanctions
    complexity, crypto/DeFi regulation
  - Client pain points: Big 4 too expensive and
    generalist; boutiques lack scale; RegTech lacks
    advisory judgment; in-house teams understaffed
  - Target market: Mid-market companies ($500M-$10B
    revenue) across financial services, healthcare,
    technology, and manufacturing

  Competitive advantages to develop:
  - Proprietary "Compliance Maturity Index" (CMI)
    methodology for assessing and benchmarking programs
  - "Compliance-as-Code" approach translating regulatory
    requirements into automated monitoring rules
  - Former regulator network for regulatory intelligence
  - Industry-specific compliance playbooks (not generic
    frameworks)
  - Outcome-based pricing models (vs hourly billing)

  You need to create:
  1. Service offering architecture (practice areas,
     engagement types, delivery models)
  2. Proprietary methodology (CMI assessment framework)
  3. Go-to-market strategy for Year 1-3
  4. Delivery team structure and talent acquisition plan
  5. Technology platform requirements
  6. Financial projections and pricing strategy
  7. Quality assurance and engagement management
     framework

  Task: Write a comprehensive business plan for
  ComplianceForge that a Board of Directors and investors
  would find compelling, including the proprietary
  methodology, service catalog, competitive positioning,
  financial projections, and growth strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive compliance consulting business plan — designs a coherent service offering architecture organized by practice area (regulatory compliance, financial crime, privacy/data protection, ESG/sustainability, AI governance, cybersecurity compliance) and engagement type (maturity assessment, program design, implementation, ongoing advisory, examination/enforcement response, independent monitoring); creates the Compliance Maturity Index (CMI) proprietary methodology with specific dimensions, scoring criteria, and benchmarking approach; designs a go-to-market strategy differentiating from Big 4, boutiques, and RegTech competitors; the business plan would be credible to investors and prospective clients."
    weight: 0.35
    description: "ComprehensiveBusinessPlan"
  - type: llm_judge
    criteria: "Response addresses operational and delivery frameworks — designs engagement delivery methodology (scoping, staffing, quality review, client deliverables, knowledge management); creates quality assurance framework (engagement review, peer review, methodology adherence, client satisfaction measurement); designs technology platform requirements (CMI assessment tool, engagement management, knowledge base, compliance-as-code engine, client portal); creates talent acquisition and development plan (experienced hires from regulators, industry, and Big 4; training curriculum; career progression; compensation benchmarking); designs pricing strategy with specific models (outcome-based pricing examples, subscription advisory, fixed-fee assessments, retainer arrangements); addresses professional liability and insurance; the operational plan demonstrates how to deliver high-quality compliance advisory at scale."
    weight: 0.35
    description: "OperationalDeliveryFrameworks"
  - type: llm_judge
    criteria: "Response provides realistic financial projections and growth strategy — creates 3-year financial projections (revenue ramp, headcount growth, utilization targets, margin evolution from startup to steady-state); Year 1 targets and milestones (number of engagements, anchor clients, team size, revenue); Year 2-3 expansion strategy (geographic, industry vertical, service line expansion); estimates realistic billing rates, utilization, and realization rates for compliance consulting; addresses cash flow management and capital allocation; creates partnership strategy (RegTech vendors, law firms, industry associations); designs thought leadership and marketing program; addresses risks and contingencies (client concentration, talent retention, regulatory change, competitive response); the financial model is realistic for a compliance consulting startup with $3M seed funding."
    weight: 0.30
    description: "FinancialProjectionsGrowth"
