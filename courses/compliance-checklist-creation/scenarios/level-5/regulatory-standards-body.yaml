meta:
  id: regulatory-standards-body
  level: 5
  course: compliance-checklist-creation
  type: output
  description: "Lead the development of an international compliance program standard as chair of a multi-stakeholder standards body working group"
  tags: [standards, international, iso-compliance, master]

state: {}

trigger: |
  You've been elected Chair of the International
  Organization for Standardization (ISO) Technical
  Committee TC 309 Working Group on "Compliance
  Management Systems." You're leading the development
  of a major revision to ISO 37301:2021 (Compliance
  Management Systems) and a new standard ISO 37305
  "Compliance Effectiveness Assessment" — the first
  international standard for measuring whether compliance
  programs actually work.

  Working group composition (85 delegates, 35 countries):
  - National standards bodies: US (ANSI), UK (BSI),
    Germany (DIN), Japan (JISC), Australia (SA),
    Brazil (ABNT), China (SAC), India (BIS)
  - Regulatory representatives: DOJ (observer), UK SFO,
    French AFA, Brazilian CGU, Singapore CAD
  - Industry associations: SCCE, ICA (International
    Compliance Association), ECI (Ethics & Compliance
    Initiative)
  - Practitioner experts: CCOs from Fortune 500,
    compliance consultants from Big 4
  - Academic researchers: Compliance scholars from 8
    universities
  - Civil society: Transparency International, OECD
    Anti-Corruption Division

  Key tensions and challenges:
  - Prescriptive vs performance-based: US/UK delegates
    favor flexible, outcomes-based standards; German/
    French delegates want prescriptive requirements with
    specific compliance checklists
  - Regulatory recognition: Can an ISO standard satisfy
    regulatory requirements? DOJ maintains compliance
    programs must be individually assessed; some
    jurisdictions (Italy 231, France Sapin II) could
    reference ISO standards
  - Measurement challenge: How to standardize compliance
    effectiveness measurement when "effectiveness" means
    different things across legal systems
  - SME applicability: Standard must work for 50-person
    companies and Fortune 500; current ISO 37301 seen as
    designed for large enterprises
  - Cultural differences: Compliance culture concepts
    (speak-up, tone at the top) don't translate directly
    across cultures; Asian delegates concerned about
    Western-centric assumptions
  - Technology integration: How to incorporate AI/ML,
    RegTech, and automated compliance monitoring without
    making the standard obsolete quickly
  - Relationship to other standards: ISO 37001 (anti-
    bribery), ISO 37002 (whistleblowing), ISO 31000
    (risk management), ISO 27001 (information security)

  Deliverables required:
  1. Revised ISO 37301 framework addressing modern
     compliance challenges
  2. New ISO 37305 compliance effectiveness measurement
     standard
  3. Guidance annex on compliance checklist design
     principles
  4. SME implementation guide
  5. Regulatory recognition strategy

  Task: Develop the complete framework for both standards,
  including the compliance management system requirements,
  the effectiveness measurement methodology, the checklist
  design guidance, and a strategy for achieving regulatory
  recognition — while navigating the multi-stakeholder
  political dynamics.

assertions:
  - type: llm_judge
    criteria: "Response develops credible international compliance standards — creates a revised ISO 37301 framework with modern compliance management system requirements (governance, risk assessment, compliance obligations, operational controls, performance evaluation, improvement); develops the ISO 37305 effectiveness measurement standard with specific assessment dimensions, measurement methods, maturity levels, and scoring criteria; creates a guidance annex on compliance checklist design principles (behavioral vs documentary checklists, risk-based checklist adaptation, checklist verification methodology); designs an SME implementation guide with scalable requirements; the standards follow ISO high-level structure (Annex SL) and would be credible to the international standards community."
    weight: 0.35
    description: "CredibleInternationalStandards"
  - type: llm_judge
    criteria: "Response navigates multi-stakeholder dynamics with sophistication — addresses the prescriptive vs performance-based tension with a framework that includes mandatory performance outcomes with optional prescriptive guidance annexes; addresses regulatory recognition strategy (how to position the standard so DOJ, SFO, AFA, and other regulators reference it without replacing individual assessment); addresses cultural differences in compliance concepts (adapting speak-up and tone-at-the-top requirements for different cultural contexts without diluting effectiveness); addresses technology integration through technology-neutral requirements with technology-specific guidance; designs the relationship between ISO 37305 and existing standards (37001, 37002, 31000, 27001) creating a coherent compliance standards ecosystem; the political navigation strategy demonstrates understanding of international standards body dynamics."
    weight: 0.35
    description: "MultiStakeholderNavigation"
  - type: llm_judge
    criteria: "Response provides the effectiveness measurement methodology and practical implementation — designs a compliance effectiveness measurement framework with specific dimensions (program design, program implementation, program outcomes, culture and behavior, continuous improvement); creates measurable indicators for each dimension (quantitative metrics, qualitative assessments, maturity scales); addresses the measurement validity challenge (how to measure misconduct prevention, the counterfactual problem); designs assessment methodology (self-assessment, independent assessment, certification options); creates implementation guidance for organizations adopting the standards; designs a pilot testing strategy for validating the standards before publication; proposes a revision cycle and maintenance approach; the effectiveness measurement methodology represents a genuine advancement over current compliance assessment approaches (DOJ guidance, monitor evaluations)."
    weight: 0.30
    description: "EffectivenessMethodology"
