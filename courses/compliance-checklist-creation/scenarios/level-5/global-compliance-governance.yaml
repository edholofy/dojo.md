meta:
  id: global-compliance-governance
  level: 5
  course: compliance-checklist-creation
  type: output
  description: "Design the compliance operating model for a newly formed global corporation resulting from a mega-merger of two Fortune 200 companies in different industries"
  tags: [global-governance, mega-merger, operating-model, master]

state: {}

trigger: |
  You've been appointed the inaugural Global Chief
  Compliance Officer of "NovaCorp" — a $92B revenue
  entity formed by the mega-merger of a US-based
  financial services conglomerate ($48B, 95,000 employees,
  40 countries) and a European-based industrial/energy
  company ($44B, 82,000 employees, 55 countries).

  The merger creates extraordinary compliance complexity:

  Combined regulatory footprint:
  - Financial services regulators: OCC, FDIC, SEC, FINRA,
    FCA, BaFin, MAS, HKMA, JFSA + 35 state regulators
  - Energy regulators: FERC, NRC, EPA, EU ETS, national
    energy authorities in 18 countries
  - Defense/dual-use: ITAR, EAR, EU dual-use regulation,
    Wassenaar Arrangement, 15 national export control
    authorities
  - Data protection: GDPR, CCPA/CPRA, PIPL, LGPD + 30
    national privacy laws
  - Anti-corruption: FCPA, UK Bribery Act, French Sapin
    II, Brazilian Clean Company Act + 20 national laws
  - Sanctions: OFAC, EU, UK, UN + national sanctions in
    12 countries
  - ESG: SEC climate disclosure, EU CSRD, EU taxonomy,
    national ESG reporting in 8 countries
  - AI governance: EU AI Act, proposed US federal, 5
    state-level AI laws
  - Labor/employment: Laws in 65 countries, 12 collective
    bargaining agreements, 4 works councils

  Pre-merger compliance state:
  - Financial services company: Mature compliance program
    (12 on COSO scale), $380M annual compliance budget,
    1,200 compliance staff, 3 active consent orders (BSA,
    fair lending, fiduciary), GRC platform (Archer)
  - Industrial company: Developing compliance program (6
    on COSO scale), €120M compliance budget, 280
    compliance staff, 1 active corporate integrity
    agreement (FCPA), separate national compliance
    functions, no centralized GRC
  - Combined: 1,480 compliance staff, ~$520M budget,
    overlapping jurisdictions in 28 countries, 4 active
    enforcement actions, 2 different compliance cultures,
    fundamentally different risk profiles

  Board mandate:
  - Design unified compliance operating model within 12
    months of merger close
  - Achieve 15% compliance cost synergies within 24
    months ($78M savings target)
  - Satisfy all regulators that the combined entity
    maintains effective compliance programs (regulators
    are watching closely — several expressed concerns
    about the merger)
  - Integrate compliance cultures without losing domain
    expertise
  - Present to the Board within 90 days

  Task: Design the comprehensive compliance operating
  model for NovaCorp including organizational design,
  governance framework, technology integration strategy,
  regulatory engagement plan, compliance culture
  integration, cost synergy roadmap, and the unified
  compliance checklist architecture — while maintaining
  specialized compliance capabilities for each business
  sector.

assertions:
  - type: llm_judge
    criteria: "Response designs a credible global compliance operating model for a $92B merged entity — creates a federated compliance organizational structure (Global CCO, sector compliance heads for financial services and industrial/energy, regional compliance directors, shared services, centers of excellence); designs governance framework (Global Compliance Committee, sector compliance committees, regulatory coordination council, Board compliance committee charter); creates a unified compliance policy architecture (enterprise-wide vs sector-specific vs regional policies); designs the compliance checklist architecture (enterprise-level checklists for common requirements, sector-specific operational checklists, jurisdiction-specific regulatory checklists, dynamic checklist framework that adapts to regulatory changes); addresses how to maintain financial services compliance maturity (12/COSO) while elevating industrial compliance (6/COSO) without regressing either; the operating model is appropriate for a $92B, 177,000-person, 65-country organization."
    weight: 0.35
    description: "GlobalComplianceOperatingModel"
  - type: llm_judge
    criteria: "Response addresses merger-specific compliance challenges — designs regulatory engagement strategy for all major regulators (proactive communication plan for OCC, FDIC, SEC, FCA, BaFin, FERC, NRC, export control authorities addressing merger-related compliance concerns); addresses integration of active enforcement actions (3 consent orders + 1 corporate integrity agreement — ensuring remediation continues during merger integration); designs compliance culture integration strategy (assessment methodology, culture gap analysis between mature financial services program and developing industrial program, harmonization plan that doesn't dilute the stronger culture); addresses Day 1 compliance requirements (what must be unified immediately vs phased integration); creates a technology integration strategy (Archer expansion vs new enterprise GRC, data migration, integration timeline); addresses the tension between cost synergy targets and compliance effectiveness (which synergies are achievable vs where cost reduction would create regulatory risk)."
    weight: 0.35
    description: "MergerSpecificChallenges"
  - type: llm_judge
    criteria: "Response provides a realistic implementation timeline and synergy roadmap — creates a phased implementation plan: Phase 1 (Day 1-90: operating model design, organizational structure announcement, regulatory engagement, Day 1 compliance essentials, Board presentation); Phase 2 (months 4-12: policy harmonization, technology assessment, first-wave synergies, culture assessment, training integration); Phase 3 (months 13-24: GRC platform integration, advanced synergies, organizational maturity elevation, regulatory relationship normalization, $78M synergy target achievement); designs the 90-day Board presentation (executive summary, organizational structure, governance framework, risk assessment, budget, timeline, key decisions needed); estimates synergy sources (technology consolidation, organizational efficiency, vendor consolidation, process standardization, shared services) with realistic savings attribution; addresses change management for 1,480 compliance professionals; the timeline balances speed with regulatory safety and is realistic for a mega-merger integration."
    weight: 0.30
    description: "TimelineAndSynergies"
