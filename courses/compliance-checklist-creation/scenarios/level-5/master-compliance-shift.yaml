meta:
  id: master-compliance-shift
  level: 5
  course: compliance-checklist-creation
  type: output
  description: "Handle a master-level compliance crisis involving a systemic compliance failure discovered during an IPO process, triggering cascading regulatory, legal, and market consequences"
  tags: [systemic-failure, ipo-crisis, cascading-compliance, master]

state: {}

trigger: |
  You're the Chief Compliance Officer at a high-growth
  technology conglomerate ($14B revenue, 38,000 employees,
  operations in 42 countries) that is 6 weeks from its
  planned $28B IPO — the largest tech IPO in 3 years.
  During the SEC S-1 review process, a series of
  discoveries has created a cascading compliance crisis
  that threatens not just the IPO but the company's
  operating viability.

  Discovery 1 — Revenue Recognition Fraud:
  The SEC staff's comments on the S-1 triggered an
  internal review that discovered a systematic revenue
  recognition scheme across the enterprise software
  division ($4.2B of $14B revenue):
  - Side letters granting customers undisclosed return
    rights, effectively making $680M in recognized
    revenue contingent
  - Channel stuffing to distributors near quarter-end
    with undocumented agreements to accept returns
  - 14 sales executives involved; VP of Sales aware and
    directed the practice
  - Revenue overstatement estimated at $1.2B over 3
    fiscal years
  - All prior-year audited financial statements affected
  - Audit committee and external auditor were not aware
  - Potential restatement required; IPO timeline in
    jeopardy
  - SEC Enforcement Division has been notified and opened
    a formal investigation
  - DOJ has issued a voluntary disclosure invitation

  Discovery 2 — International Corruption Network:
  The revenue investigation uncovered a parallel scheme
  in the government contracts division ($2.1B revenue):
  - Agent network in 8 countries (India, Brazil, Nigeria,
    Indonesia, Saudi Arabia, UAE, Kenya, Philippines)
    receiving commissions with no legitimate services
    rendered — classic FCPA/UK Bribery Act violations
  - Estimated $45M in improper payments over 5 years
  - Government contracts obtained through corruption
    may be voidable (risk of contract termination and
    debarment)
  - Some contracts involve classified government
    information (ITAR/NISPOM implications)
  - UK subsidiary separately liable under UK Bribery Act
    Section 7 (failure to prevent)

  Discovery 3 — Data Practices:
  The forensic investigation into the revenue scheme
  accessed employee communications, revealing:
  - The company's consumer data division has been
    selling user data to data brokers in violation of
    its own privacy policy and without user consent
  - Affected users: 180M globally (45M EU, 32M California)
  - Data included precise location data, browsing
    history, health app data, and financial information
  - Revenue from unauthorized data sales: $340M over 4
    years (not disclosed as a revenue stream)
  - Children's data included without COPPA compliance
  - Multiple employees reported concerns through the
    ethics hotline over 2 years; reports were closed
    without investigation

  Discovery 4 — Compliance Program Systemic Failure:
  External counsel's preliminary assessment concluded:
  - The compliance program was "designed to appear
    effective to auditors and regulators while lacking
    mechanisms to detect or prevent the misconduct"
  - Compliance checklists existed for all relevant areas
    but were completed mechanically without substance
  - Internal audit scoped away high-risk areas at
    management's direction
  - Ethics hotline was administered by the general
    counsel's office (same office directing revenue
    practices)
  - Board received quarterly compliance certifications
    from management that were materially misleading
  - Several Board members may face personal liability
    for oversight failures

  Immediate consequences:
  - IPO underwriter counsel demanding emergency meeting
  - Lead underwriter considering withdrawing
  - 3 Board members have tendered resignation letters
  - CFO placed on administrative leave
  - VP of Sales and 3 regional directors terminated
  - External auditor assessing withdrawal of prior audit
    opinions
  - Media reports emerging (leaked by departing employee)
  - Major customers requesting meetings about data
    practices
  - 2 class action complaints filed (securities fraud,
    consumer privacy)
  - EU DPA emergency inquiry initiated
  - Stock in pre-IPO secondary markets dropped 40%

  Task: Create comprehensive compliance checklists and
  action plans for navigating every dimension of this
  crisis — SEC/DOJ engagement strategy, FCPA voluntary
  disclosure, privacy breach response across
  jurisdictions, Board governance remediation, compliance
  program reconstruction, IPO decision framework,
  stakeholder communications, and long-term corporate
  rehabilitation — demonstrating how compliance
  checklists should have been designed to prevent these
  failures and how to design them going forward.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive action plans for all four crisis dimensions with strategic integration — for revenue fraud: SEC engagement strategy, DOJ voluntary self-disclosure decision analysis, restatement process, auditor coordination, D&O insurance notification; for FCPA: multi-jurisdiction anti-corruption response (FCPA, UK Bribery Act Section 7, local law compliance), agent termination protocol, government contract preservation strategy, debarment risk mitigation; for data practices: global privacy breach notification (GDPR 72-hour, CCPA, COPPA, 35+ jurisdictions), consumer remediation, FTC engagement, class action defense coordination; for compliance program failure: complete program reconstruction methodology; identifies cross-crisis connections (revenue fraud discovery methodology informing FCPA investigation, data practices revenue impacting restatement, compliance program failure underlying all three substantive issues); the response demonstrates mastery-level crisis management."
    weight: 0.35
    description: "ComprehensiveCrisisManagement"
  - type: llm_judge
    criteria: "Response addresses the meta-level compliance program failure with sophistication — analyzes why the compliance checklists failed (mechanical completion without substance, designed for audit appearance rather than detection, scoped to avoid high-risk areas, hotline capture by conflicted parties); designs the compliance program reconstruction (independence mechanisms, substantive testing vs checkbox verification, risk-based scoping that cannot be overridden by management, hotline independence, Board direct access); addresses Board governance failures (Caremark duties, personal liability analysis for directors, governance remediation including new director recruitment, enhanced committee structures, compliance committee charter); designs compliance checklists for the future that incorporate behavioral safeguards against the specific failure modes discovered (gaming prevention, escalation requirements, independence verification, substantive completion evidence); the analysis bridges the gap between compliance theory and the practical reality of compliance program manipulation."
    weight: 0.35
    description: "SystemicFailureAnalysis"
  - type: llm_judge
    criteria: "Response provides a realistic corporate rehabilitation roadmap — creates an IPO decision framework (delay vs withdraw vs restructure analysis, with specific criteria for each path); designs a stakeholder communication strategy (Board, employees, customers, regulators, underwriters, media, pre-IPO investors); creates a 24-month corporate rehabilitation plan: Phase 1 (months 1-3: crisis containment, regulatory engagement, leadership changes, interim controls); Phase 2 (months 4-9: investigation completion, remediation implementation, compliance program rebuild, governance restructuring); Phase 3 (months 10-18: sustained compliance demonstration, regulatory resolution, reputation rebuilding, potential IPO re-engagement); Phase 4 (months 19-24: new compliance culture evidence, program effectiveness testing, market re-entry assessment); estimates total financial impact (penalties, restatement, lost revenue, remediation costs, legal fees — potentially $3-5B+); the rehabilitation plan is realistic for a company facing existential compliance failures and demonstrates how properly designed compliance checklists and programs would prevent recurrence."
    weight: 0.30
    description: "CorporateRehabilitationRoadmap"
