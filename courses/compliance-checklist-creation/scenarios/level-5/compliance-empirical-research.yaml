meta:
  id: compliance-empirical-research
  level: 5
  course: compliance-checklist-creation
  type: output
  description: "Design a large-scale empirical research study on compliance program effectiveness, analyzing enforcement outcomes, program design elements, and measurable compliance culture indicators"
  tags: [research, empirical, compliance-effectiveness, master]

state: {}

trigger: |
  You're a tenured professor at a top-10 law school
  specializing in corporate compliance and white-collar
  crime. You've received a $4.2M grant from the National
  Science Foundation (NSF) and the Ethics & Compliance
  Initiative (ECI) to conduct the largest empirical study
  ever attempted on compliance program effectiveness.

  Your study: "Does Compliance Work? A Multi-Method
  Empirical Analysis of Corporate Compliance Program
  Design, Implementation, and Outcomes (2010-2025)"

  Research questions:
  1. Do specific compliance program design elements
     (as identified in DOJ guidance) correlate with
     reduced enforcement frequency and severity?
  2. What is the relationship between compliance program
     maturity and organizational misconduct rates?
  3. Do compliance checklists improve or impair actual
     compliance behavior? (The checklist paradox)
  4. Which compliance culture indicators are most
     predictive of future compliance failures?
  5. How do regulatory enforcement approaches affect
     compliance program investment and design?

  Available data sources:
  - DOJ enforcement database: All corporate enforcement
    actions (DPAs, NPAs, declinations, guilty pleas)
    2010-2025 (estimated 2,800 cases)
  - SEC enforcement database: All corporate enforcement
    actions 2010-2025
  - Monitor reports: 180 publicly available independent
    monitor reports with compliance program assessments
  - ECI Global Business Ethics Survey data: 15 years of
    employee surveys across 18 countries (2.1M responses)
  - Corporate compliance program descriptions: From 10-K
    filings, proxy statements, compliance reports
  - OSHA, EPA, FDA enforcement databases: Sector-specific
    compliance failures
  - International: UK SFO DPAs, French AFA evaluations,
    Brazilian Lava Jato outcomes
  - Company-level data: 500 Fortune 1000 companies have
    agreed to share anonymized compliance program metrics

  Methodological considerations:
  - Selection bias: Companies with enforcement actions
    may differ fundamentally from non-enforced companies
  - Survivorship bias: Only observing companies that
    still exist
  - Causation vs correlation: Does compliance investment
    cause better outcomes or do better companies invest
    in compliance?
  - Measurement challenges: "Compliance effectiveness"
    is not directly observable
  - The counterfactual problem: How do you measure
    misconduct that was prevented?

  Task: Design the complete research study including
  research methodology, variable operationalization,
  data collection protocols, analytical framework,
  expected findings framework, and practical implications
  for compliance program design — with specific attention
  to how the findings would inform checklist design and
  compliance program architecture.

assertions:
  - type: llm_judge
    criteria: "Response designs a rigorous empirical research study — creates a multi-method research design (quantitative analysis of enforcement data, qualitative analysis of monitor reports, survey research, case studies); addresses all 5 research questions with specific hypotheses and analytical approaches; operationalizes key variables (compliance program maturity measurement, compliance culture indicators, enforcement outcome severity scoring, checklist effectiveness metrics); designs data collection protocols for each data source; addresses methodological challenges (selection bias through propensity score matching, survivorship bias analysis, causal inference through instrumental variables or natural experiments, counterfactual estimation); the research design would pass peer review at a top-tier journal."
    weight: 0.35
    description: "RigorousResearchDesign"
  - type: llm_judge
    criteria: "Response addresses the 'checklist paradox' and compliance culture measurement with sophistication — designs experiments or quasi-experiments to test whether checklists improve or impair compliance behavior (examining mechanical compliance vs genuine risk management, the role of checklist design in driving behavior change vs documentation compliance); creates a compliance culture measurement framework (leading indicators: speak-up rates, management responsiveness, ethical climate survey scores, compliance training engagement; lagging indicators: enforcement actions, internal investigation findings, audit results); proposes a compliance program design taxonomy that goes beyond DOJ guidance elements; addresses the relationship between organizational culture research (Schein, Trevino) and compliance outcomes; the analysis would contribute new knowledge to the compliance field."
    weight: 0.35
    description: "ChecklistParadoxAndCulture"
  - type: llm_judge
    criteria: "Response provides practical implications and a dissemination strategy — translates expected research findings into actionable compliance program design recommendations; creates a framework for evidence-based compliance program design; proposes a compliance program effectiveness index that practitioners can use; designs a dissemination strategy (academic publications, practitioner guidance, regulatory engagement, industry conference presentations); addresses how findings would inform DOJ evaluation criteria, regulatory expectations, and Board oversight; provides specific recommendations for checklist design based on the research (when to use checklists, how to design behavioral checklists, how to avoid the compliance theater trap); estimates study timeline (3-year research period with interim publications); the practical implications bridge the gap between academic research and compliance practice."
    weight: 0.30
    description: "PracticalImplications"
