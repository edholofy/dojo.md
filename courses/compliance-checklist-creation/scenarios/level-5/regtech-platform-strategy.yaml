meta:
  id: regtech-platform-strategy
  level: 5
  course: compliance-checklist-creation
  type: output
  description: "Write a strategic plan for a RegTech startup building an AI-powered compliance automation platform, including product strategy, regulatory positioning, and scaling plan"
  tags: [regtech, product-strategy, startup, master]

state: {}

trigger: |
  You're the CEO and co-founder of "ComplianceOS," a
  Series B RegTech startup ($32M raised, $8.5M ARR, 85
  employees, 120 enterprise customers). Your platform
  automates compliance checklist creation, regulatory
  change management, and compliance monitoring using
  AI/ML. Your Board has requested a strategic plan for
  the path to $50M ARR and Series C fundraising.

  Current product capabilities:
  - Regulatory Intelligence Engine: NLP-powered scanning
    of regulatory publications across 45 regulators;
    automatic identification of compliance impacts
  - Dynamic Checklist Generator: AI creates compliance
    checklists tailored to company profile (industry,
    size, geography, risk factors); checklists update
    automatically when regulations change
  - Compliance Monitoring: Continuous control testing
    against generated checklists; integration with 40+
    enterprise systems (ERP, HRIS, cloud infrastructure)
  - Evidence Collection: Automated evidence gathering
    mapped to compliance requirements; audit-ready
    documentation
  - Reporting: Multi-framework compliance dashboards;
    Board-level reporting; regulatory examination
    preparation packages

  Product challenges:
  - AI accuracy: Regulatory interpretation accuracy at
    87% (target 95%+); hallucination risk in checklist
    generation; customer trust concerns
  - Coverage: Strong in financial services and healthcare;
    weak in manufacturing, defense, energy
  - International: US-focused; clients requesting EU,
    UK, APAC regulatory coverage
  - Enterprise: Largest customer has 50,000 employees;
    scalability concerns at Fortune 100 level
  - Competitive: Vanta (SOC 2 focused), Drata (automated
    compliance), Workiva (reporting), OneTrust (privacy)
    all expanding into adjacent compliance areas
  - Regulatory acceptance: No regulator has formally
    endorsed AI-generated compliance checklists; some
    examiners skeptical

  Market opportunity:
  - TAM: $42B global regulatory compliance technology
  - SAM: $12B mid-market and enterprise compliance
    automation
  - Fastest growing segments: AI governance compliance,
    ESG reporting, privacy compliance, crypto regulation
  - Customer acquisition cost: $185K; LTV: $780K
  - Net revenue retention: 118%
  - Win rate against Big 4 advisory: 42% (on price/speed)
  - Win rate against other RegTech: 58% (on AI capability)

  Task: Write a comprehensive strategic plan addressing
  product roadmap, AI accuracy improvement strategy,
  international expansion, enterprise scaling,
  competitive positioning, regulatory engagement
  strategy, and path to $50M ARR — with specific
  attention to how the platform should handle compliance
  checklist creation as regulations become more complex
  and AI-generated compliance artifacts face regulatory
  scrutiny.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive RegTech strategic plan — designs a product roadmap prioritizing AI accuracy improvement (from 87% to 95%+), international regulatory coverage expansion, enterprise scalability, and new compliance domain coverage; creates a competitive positioning strategy against Vanta, Drata, Workiva, OneTrust, and Big 4 advisory; designs a go-to-market strategy for new verticals (manufacturing, defense, energy); addresses pricing strategy evolution; creates a partnership strategy (system integrators, law firms, GRC platforms); designs a customer success framework maximizing net revenue retention above 118%; the strategic plan would be compelling to Series C investors."
    weight: 0.35
    description: "ComprehensiveStrategicPlan"
  - type: llm_judge
    criteria: "Response addresses AI-powered compliance challenges with sophistication — designs an AI accuracy improvement strategy (training data expansion, human-in-the-loop validation workflows, regulatory expert review processes, confidence scoring for generated checklists, hallucination detection and mitigation); addresses the regulatory acceptance challenge (strategy for engaging regulators to accept AI-generated compliance artifacts, transparency in AI methodology, explainability features, regulatory sandbox participation); designs a responsible AI framework for the platform (bias detection in compliance recommendations, version control for AI-generated checklists, auditability of AI reasoning, human override capabilities); addresses the tension between automation and professional judgment (when AI should generate vs recommend vs flag for human review); creates a trust-building strategy with compliance officers and auditors; the AI strategy is technically credible and addresses real regulatory scrutiny concerns."
    weight: 0.35
    description: "AIComplianceChallenges"
  - type: llm_judge
    criteria: "Response provides realistic financial projections and scaling strategy — creates a path from $8.5M to $50M ARR with specific growth levers (new customer acquisition, expansion revenue, new product modules, international, enterprise tier); estimates timeline to $50M ARR (2-3 years); designs international expansion phased approach (UK/EU first, then APAC, identifying regulatory coverage priorities); creates an enterprise scaling plan (architecture, implementation methodology, customer success for Fortune 100); designs talent acquisition plan (regulatory domain experts, AI/ML engineers, enterprise sales, customer success); addresses operational scaling challenges (professional services leverage, implementation partner ecosystem, support organization); provides realistic unit economics at scale; creates a Series C fundraising strategy (target valuation, investor profile, use of proceeds); the financial model is realistic for a B2B RegTech company."
    weight: 0.30
    description: "FinancialProjectionsScaling"
