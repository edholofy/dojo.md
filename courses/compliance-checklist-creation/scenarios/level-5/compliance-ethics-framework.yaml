meta:
  id: compliance-ethics-framework
  level: 5
  course: compliance-checklist-creation
  type: output
  description: "Develop a professional ethics framework for compliance practitioners addressing AI-era challenges, conflicts of interest, and the boundaries of compliance advice"
  tags: [ethics, professional-responsibility, compliance-profession, master]

state: {}

trigger: |
  You're the Chair of the Society of Corporate Compliance
  and Ethics (SCCE) Professional Ethics Committee. The
  SCCE Board has tasked your committee with developing
  "Professional Standards and Ethical Guidelines for
  Compliance Practitioners in the AI Era" — the first
  comprehensive professional responsibility framework
  for the compliance profession.

  The initiative was prompted by five emerging ethical
  challenges:

  Challenge 1 — AI-Generated Compliance:
  Compliance professionals are increasingly using AI to
  generate compliance checklists, policies, risk
  assessments, and regulatory interpretations. Questions:
  - What is the compliance officer's professional
    responsibility when using AI-generated compliance
    artifacts?
  - Can a CCO certify the adequacy of an AI-generated
    compliance program?
  - What validation obligations exist before deploying
    AI-generated checklists?
  - How should AI-assisted compliance work be disclosed
    to regulators and Board?
  - What happens when AI-generated compliance advice is
    wrong and a violation occurs?

  Challenge 2 — Independence and Conflicts:
  - CCO dual-hatting as General Counsel (39% of companies)
  - CCO reporting to CEO rather than Board
  - Pressure to certify compliance program adequacy
    when resources are insufficient
  - CCO liability for program failures they reported but
    couldn't fix
  - Conflicts between compliance obligations in different
    jurisdictions

  Challenge 3 — Whistleblower Gatekeeping:
  - CCO receives information about executive misconduct
    — obligation to escalate vs investigate vs report
    externally?
  - When does the CCO's duty to the organization require
    external reporting despite management direction?
  - CCO as witness in enforcement proceedings
  - Privilege considerations (compliance vs legal)

  Challenge 4 — Competence and Credential:
  - No mandatory licensure for compliance officers
  - Varying competence standards across jurisdictions
  - Compliance officers practicing in areas outside their
    expertise (e.g., technology compliance without
    cybersecurity knowledge)
  - Continuing education obligations

  Challenge 5 — Compliance Checklist Integrity:
  - Pressure to create "audit-friendly" checklists that
    obscure actual compliance gaps
  - Designing checklists to demonstrate compliance
    rather than achieve compliance
  - Responsibility for checklist accuracy and completeness
  - Checklist design that inadvertently creates legal
    liability vs genuine compliance

  Task: Develop the comprehensive professional ethics
  framework including ethical principles, specific rules
  of professional conduct, guidance for each challenge
  area, enforcement mechanism design, and a model code
  of ethics for the compliance profession — with specific
  attention to AI-era challenges and the integrity of
  compliance checklist creation.

assertions:
  - type: llm_judge
    criteria: "Response develops a comprehensive professional ethics framework — creates foundational ethical principles for the compliance profession (independence, competence, integrity, confidentiality, objectivity, professional skepticism, public interest); designs specific rules of professional conduct addressing each of the five challenge areas; creates guidance for AI-generated compliance (validation obligations, disclosure requirements, professional responsibility for AI outputs, certification standards); addresses independence and conflict-of-interest rules (dual-hatting guidance, reporting line requirements, resource advocacy obligations, personal liability protections); addresses whistleblower gatekeeping obligations (escalation protocols, external reporting triggers, privilege boundaries); the framework is structurally comparable to other professional ethics codes (legal, accounting, medical) while addressing compliance-specific challenges."
    weight: 0.35
    description: "ComprehensiveEthicsFramework"
  - type: llm_judge
    criteria: "Response addresses checklist integrity and AI-era challenges with depth — creates specific ethical rules for compliance checklist design (prohibition on designing checklists to obscure gaps, obligation to accurately represent compliance status, duty to update checklists when regulations or risks change); addresses the tension between 'compliance theater' checklists and genuine compliance tools; creates ethical guidance for AI-assisted compliance work (human review requirements, accuracy validation protocols, disclosure of AI involvement to regulators and auditors, accountability when AI-generated compliance artifacts fail); addresses emerging questions about CCO liability for AI-generated compliance programs; examines the professional responsibility implications of compliance automation (skill atrophy, over-reliance, diminished professional judgment); the ethical analysis demonstrates genuine engagement with the philosophical tensions in compliance practice."
    weight: 0.35
    description: "ChecklistIntegrityAndAI"
  - type: llm_judge
    criteria: "Response provides an enforcement mechanism and practical implementation — designs an enforcement framework for professional ethics violations (complaint procedures, investigation process, disciplinary actions, sanctions, appeals); addresses the practical challenge that compliance is not a licensed profession (how to enforce ethical standards without licensure authority); proposes credential integration (alignment with existing certifications like CCEP, CHC, CRCM); creates case study examples illustrating how the ethical principles would apply to real-world dilemmas; designs a continuing education framework for ethical competence; addresses international applicability (adapting ethical standards across legal systems and cultural contexts); proposes adoption strategy (SCCE endorsement, regulatory reference, corporate governance integration); the enforcement mechanism is realistic for a professional association without statutory authority."
    weight: 0.30
    description: "EnforcementAndImplementation"
