meta:
  id: first-compliance-shift
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Handle a simulated shift creating multiple compliance checklists under time pressure with competing regulatory deadlines"
  tags: [shift-simulation, multi-compliance, time-pressure, beginner]

state: {}

trigger: |
  You're the Office Manager at a 50-person home
  healthcare agency. It's Monday morning and three
  compliance situations have converged:

  SITUATION 1 — State Licensing Renewal:
  Your state healthcare license renewal is due in 14
  days. The renewal application requires attestation
  that you have current documentation for:
  - All employee licenses and certifications (RN, LPN,
    CNA, HHA credentials)
  - Background check records (state and federal for all
    patient-facing staff)
  - Proof of liability insurance ($1M/$3M)
  - Current HIPAA compliance program documentation
  - Patient complaint log and resolution records
  - Quality assurance program documentation
  - TB screening records for all staff
  You've just discovered that 8 employees have expired
  credentials and 12 are missing updated background
  checks.

  SITUATION 2 — OSHA Recordkeeping:
  Your workers' comp carrier just notified you that
  OSHA is conducting area-wide recordkeeping audits
  of home healthcare agencies. You need to verify:
  - OSHA 300 Log is current and accurate
  - OSHA 300A Summary was posted February 1-April 30
  - All workplace injuries are properly classified
  - Sharps injury log is maintained (bloodborne
    pathogens standard)
  - Employee safety training records are documented
  Last year's OSHA 300 Log has not been updated since
  March.

  SITUATION 3 — Medicare Conditions of Participation:
  A Medicare survey is scheduled for next month. Your
  clinical director just resigned, and you need to
  verify compliance with:
  - Patient care plan documentation (all active patients)
  - Supervisory visit documentation (RN supervision of
    HHA every 60 days)
  - Patient rights documentation and signed acknowledgments
  - Emergency preparedness plan (updated annually)
  - Infection control plan
  Your clinical director was the only person who knew
  where these records were kept.

  Task: Write a prioritized action plan with compliance
  checklists for all three situations, identifying which
  items need immediate attention, which can wait, and
  how to manage with limited resources.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three situations with appropriate checklists — creates specific checklists for state licensing renewal (employee credential tracker, background check status, documentation inventory), OSHA recordkeeping (300 Log audit, 300A posting verification, sharps log, training records), and Medicare CoP preparation (patient care plans, supervisory visit documentation, patient rights, emergency preparedness); each checklist has specific actionable items, not vague categories."
    weight: 0.35
    description: "AllThreeSituationsAddressed"
  - type: llm_judge
    criteria: "Response correctly prioritizes by deadline and severity — identifies the state licensing renewal as most urgent (14 days, operating without a license = shutdown risk); prioritizes the expired credentials and missing background checks as immediate (some may need to be suspended from patient care); recognizes the OSHA 300 Log update can be back-filled but needs attention; identifies the Medicare survey preparation as important but has more time (next month); correctly identifies which items require stopping work (unlicensed employees providing patient care) vs items that can be addressed in parallel."
    weight: 0.35
    description: "CorrectPrioritization"
  - type: llm_judge
    criteria: "Response provides practical resource management advice — acknowledges the 50-person agency's limited administrative resources; suggests delegation strategies (who handles credential verification, who updates OSHA logs, who locates Medicare documentation); addresses the clinical director departure impact (knowledge transfer, record location, interim leadership); provides a daily/weekly work plan for the next 14 days; identifies when to ask for help (temporary staffing, consultant, clinical director handoff); the plan is realistic for a single Office Manager managing three simultaneous compliance challenges."
    weight: 0.30
    description: "PracticalResourceManagement"
