meta:
  id: small-business-tax-compliance
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create an annual tax compliance checklist for a small business covering federal, state, and payroll tax obligations"
  tags: [tax-compliance, small-business, payroll, beginner]

state: {}

trigger: |
  You're the bookkeeper at a 15-person landscaping
  company (S-Corp, $1.8M revenue). Last year, the
  company was assessed $14,000 in IRS penalties for
  late payroll tax deposits and a $3,200 state penalty
  for filing the annual report late. The owner just
  found out that the company also failed to issue 1099s
  to 6 subcontractors. He's furious and wants a
  comprehensive tax compliance calendar.

  Company details:
  - Entity type: S-Corporation (Ohio)
  - 15 W-2 employees (seasonal fluctuation: 8-22)
  - 6-10 subcontractors per year (various trades)
  - Payroll: Bi-weekly via ADP
  - Fiscal year: Calendar year
  - Sales tax: Exempt (services, but sells some
    materials — this is unclear)
  - Equipment: 8 trucks, 2 trailers, mowers and
    equipment (personal property tax)
  - Owner's salary: $95,000 (reasonable compensation)
  - Distributions: $120,000 annually
  - State registrations: Ohio, occasional work in
    Kentucky and Indiana

  Task: Create a month-by-month tax compliance calendar
  for the full year covering all federal, state, and
  local tax obligations, with specific filing deadlines,
  forms required, and responsible parties.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive tax compliance calendar — covers all major federal obligations: quarterly payroll tax deposits (941/944), annual W-2/W-3 filing, 1099-NEC filing, S-Corp tax return (Form 1120-S, March 15 deadline), estimated tax payments (if applicable), FUTA (Form 940), and ACA reporting (if applicable when over 50 employees seasonally); covers state obligations: Ohio CAT (commercial activity tax), state withholding, unemployment tax (SUTA), annual report/franchise tax, personal property tax; addresses multi-state issues (Kentucky and Indiana occasional work — nexus, withholding, reciprocity agreements)."
    weight: 0.35
    description: "ComprehensiveTaxCalendar"
  - type: llm_judge
    criteria: "Response directly addresses the prior year failures — includes specific controls for payroll tax deposit timing (semi-weekly vs monthly deposit schedule based on lookback period); includes 1099-NEC preparation process (W-9 collection at hiring, threshold tracking, January deadline); includes annual report filing reminders with lead time; addresses the sales tax question (materials sold with services may trigger sales tax obligations — recommends clarification); provides buffer days before deadlines to prevent last-minute failures."
    weight: 0.35
    description: "PriorFailuresAddressed"
  - type: llm_judge
    criteria: "Response is practical for a small business — assigns responsibilities clearly (bookkeeper, ADP, CPA, owner); includes preparation steps before each deadline (not just the filing date but when to start preparing); addresses seasonal staffing changes and their tax implications; includes reminders for year-end planning (owner's salary optimization, equipment purchases for depreciation); provides a simple format that can be posted or added to a calendar system; includes cost of non-compliance for each obligation (penalty amounts) to motivate timely filing."
    weight: 0.30
    description: "PracticalForSmallBusiness"
