meta:
  id: financial-audit-prep-checklist
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create a year-end financial audit preparation checklist for a small business getting its first external audit"
  tags: [financial-audit, year-end, small-business, beginner]

state: {}

trigger: |
  You're the Controller at a 40-person software company
  ($6M revenue). The company is preparing for its first
  external financial audit — a requirement from a new
  investor who just put in $2M in Series A funding. The
  audit firm will begin fieldwork in 6 weeks. You've
  never been through an external audit before (only
  internal compilations with your CPA). The CFO says:
  "The auditors will ask for everything. I want us to
  be completely organized so we don't look incompetent."

  Your current state:
  - Accounting system: QuickBooks Online
  - Bank accounts: 2 operating accounts, 1 savings, 1
    PayPal business account
  - Revenue: SaaS subscriptions (monthly/annual), some
    professional services revenue
  - Payroll: Gusto (45 employees + 5 contractors)
  - Expenses: Corporate credit cards (3 cards, no formal
    expense policy)
  - AR: 28 active customers, Net 30 terms
  - AP: About 40 vendors
  - Fixed assets: Office furniture, computer equipment,
    leasehold improvements (~$180,000 in total)
  - Equity: Common stock, Series A preferred stock,
    stock option pool
  - Contracts: SaaS subscription agreements, employee
    offer letters, office lease, vendor agreements
  - No formal internal controls documentation
  - Year-end: December 31, 2025

  Task: Create a comprehensive audit preparation
  checklist organized by timeline (6 weeks out, 4 weeks,
  2 weeks, day-of) and by audit area, covering all
  documents to gather, reconciliations to complete, and
  schedules to prepare.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive audit prep checklist — covers all major audit areas: cash and bank reconciliations, revenue recognition (especially ASC 606 for SaaS — deferred revenue), accounts receivable (aging, allowance for doubtful accounts), accounts payable (completeness, cutoff), payroll (tax filings, contractor classification), fixed assets (depreciation schedules, additions/disposals), equity (cap table, stock option grants, Series A docs), expenses (corporate card reconciliation), debt and commitments (lease, any borrowings); organized by timeline with clear deadlines."
    weight: 0.35
    description: "ComprehensiveAuditPrep"
  - type: llm_judge
    criteria: "Response addresses SaaS-specific audit items — includes ASC 606 revenue recognition analysis (performance obligations, timing of recognition for monthly vs annual subscriptions); addresses deferred revenue calculation and reconciliation; includes contract review for revenue recognition (standard terms vs custom arrangements); addresses professional services revenue recognition; includes SaaS metrics the auditors may request (MRR, ARR, churn, customer count); identifies the need for an ASC 842 lease analysis; addresses stock option valuation (409A) documentation."
    weight: 0.35
    description: "SaaSSpecificItems"
  - type: llm_judge
    criteria: "Response provides practical first-audit guidance — explains what auditors typically request in a PBC (Prepared by Client) list; provides tips for working with auditors effectively; recommends setting up a shared folder structure; addresses common first-audit issues (missing documentation, informal processes that need to be formalized, management representation letter); includes internal controls self-assessment items; recommends specific reconciliations to complete before auditors arrive; the checklist would genuinely help a first-time Controller prepare without embarrassment."
    weight: 0.30
    description: "FirstAuditGuidance"
