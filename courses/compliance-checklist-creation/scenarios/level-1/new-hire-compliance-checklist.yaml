meta:
  id: new-hire-compliance-checklist
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create a new hire compliance checklist covering employment eligibility, tax forms, and required training for a growing small business"
  tags: [new-hire, employment, i-9, beginner]

state: {}

trigger: |
  You're the Office Manager at a 55-person accounting
  firm. The firm is growing quickly and plans to hire
  15 new employees over the next 6 months. Last year,
  an ICE audit found I-9 errors for 8 employees
  (resulting in a $12,000 fine), and the firm discovered
  that 3 employees never completed required anti-money
  laundering (AML) training. The Managing Partner wants
  a standardized new hire compliance checklist to ensure
  nothing is missed.

  Your firm's requirements:
  - Federal: I-9 verification (within 3 business days),
    W-4, E-Verify enrollment, required labor law posters
  - State: Ohio withholding form (IT-4), workers' comp
    coverage confirmation, state new hire reporting
    (within 20 days)
  - Industry: BSA/AML training (required for all staff
    at accounting firms handling financial transactions),
    CPE tracking setup for licensed CPAs
  - Company: Employee handbook acknowledgment, IT
    security policy acknowledgment, confidentiality
    agreement, emergency contact form, benefits
    enrollment (within 30 days), direct deposit setup
  - Training: Sexual harassment prevention (within 30
    days), cybersecurity awareness, client data handling,
    AML/BSA basics (within 60 days)

  Task: Create a comprehensive new hire compliance
  checklist that covers all federal, state, industry,
  and company requirements with specific deadlines,
  responsible parties, and verification steps.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive new hire checklist — covers all federal requirements (I-9 with Section 1 day-of-hire/Section 2 within 3 days, W-4, E-Verify, labor law posters); covers state requirements (Ohio IT-4, workers' comp, new hire reporting deadline); covers industry requirements (AML/BSA training, CPE setup); covers company requirements (handbook, IT policy, confidentiality, benefits enrollment); each item has a specific deadline referenced from the hire date; items are organized in chronological order (pre-hire, day one, first week, first 30 days, first 60 days)."
    weight: 0.35
    description: "ComprehensiveNewHireChecklist"
  - type: llm_judge
    criteria: "Response includes accountability and tracking elements — assigns a responsible party for each item (HR, IT, hiring manager, employee); includes verification method (signature, electronic acknowledgment, completion certificate); includes a status tracking mechanism (complete/pending/overdue); addresses what happens if deadlines are missed (corrective action, who to notify); includes a final sign-off confirming all items are complete; addresses the specific I-9 and AML failures from last year with extra verification steps."
    weight: 0.35
    description: "AccountabilityAndTracking"
  - type: llm_judge
    criteria: "Response is practical for a growing firm — scales for 15 hires over 6 months (batch processing tips, template approach); includes tips for common errors (I-9 Section 2 timing mistakes, acceptable document list reminders); provides a storage/filing system recommendation (what to keep in personnel file vs I-9 file vs training records); the checklist could be handed to a new HR assistant and used without additional guidance; addresses the remote hire scenario if applicable."
    weight: 0.30
    description: "PracticalAndScalable"
