meta:
  id: restaurant-health-inspection
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create a daily and weekly food safety compliance checklist for a restaurant preparing for health department inspections"
  tags: [food-safety, health-inspection, restaurant, beginner]

state: {}

trigger: |
  You're the General Manager of a 60-seat fast-casual
  restaurant. Your last health department inspection
  scored 78/100 (a "B" rating, down from your usual
  "A"). The inspector cited:
  - Cold holding temperatures above 41°F in the prep
    cooler (critical violation)
  - No date labels on prepared foods in walk-in cooler
  - Handwashing sink blocked by a bus tub
  - Sanitizer concentration too low at the dish station
  - Employee handling ready-to-eat food without gloves
  - Missing manager food safety certification (yours
    expired last month)

  Your owner is furious — the B rating is posted on
  the door and reviews on Google mention it. She wants
  a daily and weekly compliance checklist that kitchen
  staff can follow to maintain an A rating. Your team
  includes: 2 cooks, 3 prep workers, 2 dishwashers,
  and 4 servers. Turnover is high (average tenure 8
  months), so the checklist needs to work for new
  employees with minimal training.

  Task: Create a comprehensive food safety compliance
  checklist with daily opening tasks, ongoing monitoring
  throughout service, daily closing tasks, and weekly
  deep-check items. Address all cited violations and
  proactively cover other common health code requirements.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive food safety checklist — directly addresses all 6 cited violations (temperature monitoring, date labeling, handwashing access, sanitizer concentration, glove use, food safety certification); organizes by daily rhythm (opening, during service, closing) plus weekly items; covers FDA Food Code essentials: temperature control (cold ≤41°F, hot ≥135°F), time/temperature abuse prevention, cross-contamination prevention, personal hygiene, cleaning and sanitizing, pest control, chemical storage; each item is specific and measurable (not 'check temperatures' but 'record walk-in cooler temperature — must be 41°F or below')."
    weight: 0.35
    description: "ComprehensiveFoodSafetyChecklist"
  - type: llm_judge
    criteria: "Response includes temperature logging and corrective actions — includes specific temperature check points (walk-in, prep cooler, hot holding, cold holding, dish machine final rinse); provides corrective actions for out-of-range readings (what to do if cooler is above 41°F — how long food is safe, when to discard); includes sanitizer concentration test procedures (chlorine 50-100 ppm or quat 200-400 ppm with test strips); includes a date labeling system (how to label, what to label, when to discard); provides a simple temperature log format that can be posted on the cooler."
    weight: 0.35
    description: "TemperatureAndCorrective"
  - type: llm_judge
    criteria: "Response is designed for high-turnover restaurant staff — uses simple language and visual formatting; organizes tasks so they can be completed quickly during a busy service; assigns responsibilities by role (opening cook, prep team, dishwasher, closing manager); includes training tips for new employees; is concise enough to post in the kitchen (not a 10-page document); includes a manager verification sign-off; addresses how to handle the checklist when short-staffed; could be implemented by the current team starting tomorrow."
    weight: 0.30
    description: "DesignedForRestaurantStaff"
