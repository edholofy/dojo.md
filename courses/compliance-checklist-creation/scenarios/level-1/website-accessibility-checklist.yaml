meta:
  id: website-accessibility-checklist
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create a website accessibility compliance checklist based on ADA and WCAG 2.1 guidelines for a small business website"
  tags: [accessibility, ada, wcag, beginner]

state: {}

trigger: |
  You're the Marketing Manager at a 20-person law firm.
  A competitor firm just received a demand letter from
  an ADA compliance plaintiff's attorney alleging their
  website is not accessible to people with disabilities.
  Your managing partner is worried about the same thing
  happening to your firm and wants you to audit your
  website for accessibility compliance immediately.

  Your website:
  - Built on WordPress with a custom theme (2 years old)
  - 35 pages (home, practice areas, attorney bios, blog,
    contact, client portal login)
  - Includes: contact forms, embedded videos (YouTube),
    downloadable PDF documents, image galleries, a
    chatbot widget
  - Mobile responsive (but not tested for screen readers)
  - No accessibility statement or policy
  - No alt text on most images
  - Color scheme: Dark blue text on light gray background

  Task: Create a comprehensive website accessibility
  compliance checklist based on WCAG 2.1 Level AA
  guidelines that your web developer can use to audit
  and fix the site. Organize by priority (critical
  issues first) and include specific testing methods
  for each item.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive WCAG 2.1 AA checklist — covers the four WCAG principles (Perceivable, Operable, Understandable, Robust) with specific success criteria; addresses images (alt text for all meaningful images, decorative images handled correctly), videos (captions, audio descriptions), forms (labels, error messages, keyboard accessibility), color contrast (minimum 4.5:1 for normal text, 3:1 for large text), keyboard navigation (all interactive elements focusable and operable), document accessibility (PDFs must be tagged/accessible), and responsive design; each item references the specific WCAG success criterion."
    weight: 0.35
    description: "ComprehensiveWCAGChecklist"
  - type: llm_judge
    criteria: "Response addresses the specific website elements — provides specific guidance for: WordPress theme accessibility (heading structure, skip navigation, ARIA landmarks), contact forms (label associations, error handling, focus management), YouTube embeds (caption requirements, player controls), downloadable PDFs (tagged PDFs, alternative HTML versions), image galleries (alt text, keyboard navigation), chatbot widget (keyboard accessibility, screen reader compatibility), client portal login (form accessibility, error messages, session timeout warnings); the checklist is specific to the described website, not generic."
    weight: 0.35
    description: "SiteSpecificGuidance"
  - type: llm_judge
    criteria: "Response includes testing methods and tools — recommends specific testing tools (WAVE, axe DevTools, Lighthouse, screen readers like NVDA/VoiceOver); provides manual testing procedures (keyboard-only navigation test, screen reader test, color contrast verification); prioritizes fixes by severity (critical: keyboard traps, missing form labels; high: missing alt text, insufficient contrast; medium: missing skip navigation; low: decorative issues); includes guidance on creating an accessibility statement; provides estimated effort levels for fixes."
    weight: 0.30
    description: "TestingMethodsIncluded"
