meta:
  id: employee-termination-compliance
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create a compliant employee termination checklist covering legal requirements, IT security, benefits continuation, and documentation"
  tags: [hr, termination, cobra, beginner]

state: {}

trigger: |
  You're the HR Manager at a 75-person marketing agency.
  Last month, a terminated employee filed an EEOC
  complaint and a wage claim, alleging the company
  failed to pay out accrued PTO and didn't provide
  COBRA information. Investigation revealed:
  - The employee's manager conducted the termination
    alone without HR present
  - No termination documentation was prepared
  - IT was not notified — the employee still had email
    and Slack access for 3 weeks after termination
  - Final paycheck was issued 2 pay periods later
    (violating state law requiring payment within 72
    hours of involuntary termination)
  - COBRA notification was never sent
  - The employee's company laptop was never returned

  The CEO wants a standardized termination checklist
  that prevents these failures from happening again.
  Your agency has employees in California (45), New York
  (20), and Texas (10).

  Task: Create a comprehensive employee termination
  compliance checklist covering pre-termination
  preparation, the termination meeting, same-day actions,
  and post-termination follow-up, addressing legal
  requirements for all three states.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive termination checklist — covers pre-termination (documentation review, legal exposure assessment, HR/legal consultation, severance decision, final paycheck preparation); termination meeting (who attends, what to say, documentation to provide, separation agreement if applicable); same-day actions (IT access revocation, property collection, final paycheck, benefits information); post-termination (COBRA notification, unemployment claim response, reference policy, file retention); each item has a responsible party and deadline."
    weight: 0.35
    description: "ComprehensiveTerminationChecklist"
  - type: llm_judge
    criteria: "Response addresses multi-state legal requirements — identifies California's strict final pay rules (immediate payment for involuntary termination, 72 hours for voluntary with no notice); identifies New York's requirements (next regular payday for involuntary termination); identifies Texas requirements (within 6 days for involuntary); addresses state-specific PTO payout requirements (California: always required; New York and Texas: per company policy); addresses COBRA notification timeline (44 days from qualifying event for employer notification to plan administrator); addresses state mini-COBRA if applicable; correctly differentiates involuntary vs voluntary termination requirements."
    weight: 0.35
    description: "MultiStateLegalRequirements"
  - type: llm_judge
    criteria: "Response addresses IT security and practical operations — includes specific IT access revocation steps (email, Slack, VPN, cloud storage, project management tools, building access, parking); includes company property return process (laptop, phone, keys, badges, credit cards); addresses data security (remote wipe capability, file audit); includes notification list (payroll, IT, building security, team members, clients if customer-facing); addresses the specific failures from the prior incident with preventive measures; the checklist could be used starting with the next termination."
    weight: 0.30
    description: "ITSecurityAndOperations"
