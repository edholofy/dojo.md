meta:
  id: workplace-safety-checklist
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create a basic workplace safety compliance checklist for a small manufacturing shop based on OSHA general industry standards"
  tags: [osha, workplace-safety, manufacturing, beginner]

state: {}

trigger: |
  You're the Operations Manager at a 28-person metal
  fabrication shop. OSHA conducted a walk-through
  inspection last month after an employee complaint and
  cited you for 4 violations (total penalties: $42,000):
  - Missing lockout/tagout procedures on 3 machines
  - Inadequate fire extinguisher maintenance
  - No written hazard communication program
  - Blocked emergency exit in the welding bay

  Your owner wants you to create a monthly safety
  compliance checklist to prevent future violations.
  The shop has: 12 CNC machines, a welding station,
  a paint booth, a loading dock, and a break room.
  Most employees don't have a college degree, so the
  checklist needs to be practical and straightforward.

  Task: Create a comprehensive monthly workplace safety
  compliance checklist that directly addresses the cited
  violations AND proactively covers other common OSHA
  general industry standards. Include specific items to
  check, who is responsible, and how to document findings.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical safety checklist — directly addresses all 4 cited violations (LOTO procedures for machines, fire extinguisher inspection, hazcom program, emergency exit clearance); includes additional OSHA general industry standards relevant to a metal fabrication shop (PPE, machine guarding, electrical safety, noise exposure, first aid, forklift safety); each checklist item is specific and actionable (not vague like 'check safety' but specific like 'Verify LOTO lockout devices present and functional on CNC machines #1-12'); the checklist is organized logically by area or category."
    weight: 0.35
    description: "PracticalSafetyChecklist"
  - type: llm_judge
    criteria: "Response includes proper compliance documentation elements — assigns responsibility for each section (who inspects); includes a documentation method (checkboxes, pass/fail, corrective action column, date completed); specifies frequency for each item (monthly, weekly, or daily as appropriate); includes an escalation process for findings; references specific OSHA standards (29 CFR 1910.147 for LOTO, 1910.157 for fire extinguishers, 1910.1200 for hazcom); includes a signature/verification section for accountability."
    weight: 0.35
    description: "DocumentationElements"
  - type: llm_judge
    criteria: "Response is accessible to the target audience — uses plain language appropriate for a shop floor environment (not legal jargon); organizes the checklist for easy use during a walk-through (grouped by physical area: CNC area, welding station, paint booth, loading dock, break room, general); includes visual formatting that would work as a printed checklist; provides brief guidance on what to do when a non-compliance is found; the checklist could be used by a shop supervisor without additional training."
    weight: 0.30
    description: "AccessibleFormat"
