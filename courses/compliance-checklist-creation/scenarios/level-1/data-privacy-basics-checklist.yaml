meta:
  id: data-privacy-basics-checklist
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create a basic data privacy compliance checklist for a small e-commerce business handling customer personal information"
  tags: [data-privacy, ccpa, e-commerce, beginner]

state: {}

trigger: |
  You're the owner of a 12-person e-commerce company
  that sells specialty pet supplies online. You process
  about 2,000 orders per month and have a customer
  database of 45,000 records (names, email addresses,
  shipping addresses, payment information, purchase
  history). A customer recently asked to have their
  data deleted, and you realized you have no formal
  privacy compliance process. Your website developer
  says you might need to comply with CCPA since you
  have customers in California.

  Your current setup:
  - Website: Shopify store with Google Analytics
  - Email marketing: Mailchimp with 28,000 subscribers
  - Payment: Stripe (handles PCI compliance)
  - Customer service: Zendesk
  - Shipping: ShipStation
  - Advertising: Meta Pixel, Google Ads conversion
    tracking
  - Social media: Instagram, TikTok (customer DMs
    handled by 2 employees)
  - Data storage: Google Workspace (Gmail, Drive)
  - No privacy policy (or generic template from 2020)
  - No data processing documentation
  - No employee training on data handling
  - No process for handling data deletion requests

  Task: Create a practical data privacy compliance
  checklist covering what you need to do immediately,
  what to address within 30 days, and what to maintain
  ongoing — focused on CCPA requirements and general
  data privacy best practices for a small e-commerce
  business.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical privacy checklist — evaluates whether CCPA applies (threshold: $25M revenue, or 100K+ consumers/households, or 50%+ revenue from selling data — may not meet thresholds but should still implement best practices); covers key areas: privacy policy creation/update, cookie consent, data inventory (listing all systems holding personal data), data subject request process (access, deletion), vendor data processing assessment, marketing consent (CAN-SPAM, TCPA), payment data security; items are prioritized by urgency (immediate actions vs 30-day vs ongoing)."
    weight: 0.35
    description: "PracticalPrivacyChecklist"
  - type: llm_judge
    criteria: "Response addresses the specific tech stack — identifies data touchpoints across Shopify, Google Analytics, Mailchimp, Stripe, Zendesk, ShipStation, Meta Pixel, and Google Ads; addresses cookie tracking and consent requirements for analytics and advertising pixels; evaluates Mailchimp email consent and unsubscribe compliance; addresses data sharing with advertising platforms; identifies where customer data is stored across all systems; provides specific configuration recommendations for each platform (e.g., Shopify privacy settings, Google Analytics data retention settings, Mailchimp GDPR tools)."
    weight: 0.35
    description: "TechStackSpecific"
  - type: llm_judge
    criteria: "Response is actionable for a small business owner — uses plain language without excessive legal jargon; provides specific steps rather than vague requirements; includes template or outline for a privacy policy; provides a simple process for handling data deletion requests; includes employee training topics (what's personal data, how to handle requests, what not to do with customer data); recommends low-cost or free tools where applicable; acknowledges the resource constraints of a 12-person company; the checklist could be implemented by the owner without hiring a privacy lawyer for every step."
    weight: 0.30
    description: "SmallBusinessActionable"
