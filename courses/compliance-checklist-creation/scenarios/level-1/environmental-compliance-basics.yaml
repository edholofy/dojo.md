meta:
  id: environmental-compliance-basics
  level: 1
  course: compliance-checklist-creation
  type: output
  description: "Create a basic environmental compliance checklist for a small manufacturing facility covering waste disposal, air quality, and stormwater permits"
  tags: [environmental, epa, waste-management, beginner]

state: {}

trigger: |
  You're the Plant Manager at a 35-person custom
  cabinetry and woodworking shop. The state environmental
  agency conducted a surprise inspection and found:
  - Used wood stains and solvents being poured down the
    shop drain (hazardous waste violation)
  - Sawdust collection system not properly maintained
    (air quality concern)
  - No Stormwater Pollution Prevention Plan despite the
    outdoor lumber storage yard
  - Paint booth exhaust not meeting VOC emission limits
  - No hazardous waste generator documentation
  - Chemical inventory not maintained (no SDS binder)

  The inspector gave you 90 days to come into compliance
  or face formal enforcement. The violations could
  result in penalties up to $25,000 per day per
  violation. Your shop processes include: wood cutting,
  sanding, staining, painting (solvent-based and water-
  based), lacquering, and gluing.

  Task: Create a comprehensive environmental compliance
  checklist for the shop covering hazardous waste
  management, air quality, stormwater, chemical
  inventory, and employee training, with specific items
  to address each cited violation.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive environmental checklist — directly addresses all 6 cited violations with specific corrective actions; covers hazardous waste management (generator status determination, proper storage, labeling, manifesting, disposal through licensed haulers); covers air quality (VOC emissions tracking, paint booth maintenance, sawdust collection system inspection); covers stormwater (SWPPP development, BMPs for outdoor storage, inspection schedule); covers chemical management (SDS binder, chemical inventory, proper storage, spill prevention); includes regulatory references (RCRA, Clean Air Act, Clean Water Act)."
    weight: 0.35
    description: "ComprehensiveEnvironmentalChecklist"
  - type: llm_judge
    criteria: "Response provides woodworking-specific guidance — identifies specific hazardous wastes from woodworking (spent solvents, stain and lacquer waste, contaminated rags); addresses wood dust as both an air quality and fire hazard; evaluates whether the shop is a small quantity generator (SQG) or large quantity generator (LQG) based on typical waste volumes; provides specific VOC emission control methods for paint booths; addresses the proper disposal alternatives (solvent recycling, hazardous waste pickup schedule); identifies wood finishing products that may be switched to reduce regulatory burden (water-based alternatives)."
    weight: 0.35
    description: "WoodworkingSpecificGuidance"
  - type: llm_judge
    criteria: "Response includes a 90-day compliance timeline — prioritizes actions by severity and deadline (immediate: stop pouring chemicals down drain; week 1: contact hazardous waste hauler, start SDS binder; month 1: submit SWPPP, schedule paint booth evaluation; month 2: implement monitoring; month 3: verify compliance); includes employee training requirements (hazardous waste handling, spill response, proper waste segregation); provides ongoing monitoring frequency (daily, weekly, monthly, annual); the checklist is practical for a 35-person shop without a dedicated environmental staff person."
    weight: 0.30
    description: "NinetyDayTimeline"
