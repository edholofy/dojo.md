meta:
  id: iso27001-implementation-checklist
  level: 2
  course: compliance-checklist-creation
  type: output
  description: "Create an ISO 27001 implementation checklist for a technology company pursuing certification for the first time"
  tags: [iso27001, isms, certification, intermediate]

state: {}

trigger: |
  You're the CISO at a 200-person cybersecurity company
  that sells managed detection and response (MDR)
  services. Your largest prospects (government agencies
  and financial institutions) require ISO 27001
  certification. The board has approved a 12-month
  certification timeline with a $350,000 budget
  (consultant, auditor, tools, and internal resources).

  Current state assessment:
  - Security posture: Strong technical controls (it's
    a cybersecurity company) but informal processes
  - Risk management: Ad hoc risk discussions in
    engineering meetings; no formal risk assessment
    methodology or risk register
  - Policies: Security policy exists but hasn't been
    reviewed in 2 years; missing 8 of the 14 Annex A
    control area policies
  - Asset management: No formal asset inventory; CMDB
    partially populated
  - Access control: Strong (MFA everywhere, PAM for
    privileged access) but no formal access review
    process
  - Incident management: Excellent detection capabilities
    (it's the company's product) but no formal incident
    management procedure documented
  - HR security: Background checks at hiring; no formal
    security in onboarding/offboarding procedures
  - Supplier management: No formal supplier security
    assessment process
  - Business continuity: DR tested annually; no formal
    BCP or BIA
  - Internal audit: Never conducted a formal ISMS
    internal audit
  - Management review: No formal management review of
    security program
  - Metrics: SOC dashboards exist but no ISMS
    performance metrics
  - Training: Annual security awareness; no ISMS-
    specific training

  Task: Create a comprehensive ISO 27001:2022
  implementation checklist organized by clause
  (4-10) and Annex A controls, with a 12-month
  project plan for achieving certification.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive ISO 27001:2022 checklist — covers all mandatory clauses: Clause 4 (context, interested parties, scope), Clause 5 (leadership, policy, roles), Clause 6 (risk assessment, risk treatment, objectives), Clause 7 (resources, competence, awareness, communication, documented information), Clause 8 (operational planning, risk assessment execution, risk treatment), Clause 9 (monitoring, internal audit, management review), Clause 10 (nonconformity, continual improvement); covers Annex A controls organized by the 4 themes (Organizational, People, Physical, Technological — 93 controls in 2022 version); each item specifies the deliverable or evidence required."
    weight: 0.35
    description: "ComprehensiveISO27001Checklist"
  - type: llm_judge
    criteria: "Response addresses the company's specific gaps — leverages existing strengths (strong technical controls, detection capabilities, MFA/PAM) while addressing process gaps (formal risk assessment methodology, documented procedures, management review process); creates a Statement of Applicability approach for the 93 Annex A controls; addresses the missing policies (identifies which 8 of the 14 control areas likely lack policies); addresses the asset inventory gap; creates a formal access review process; formalizes the incident management procedure; addresses supplier security assessment for vendors; creates BIA and BCP frameworks; designs the internal audit program."
    weight: 0.35
    description: "CompanySpecificGaps"
  - type: llm_judge
    criteria: "Response provides a realistic 12-month certification timeline — phases the work: Phase 1 (months 1-3: gap analysis, scope definition, risk methodology, policy framework); Phase 2 (months 4-6: risk assessment, SoA, control implementation, procedure documentation); Phase 3 (months 7-9: training, internal audit, management review, corrective actions); Phase 4 (months 10-12: Stage 1 audit, gap remediation, Stage 2 audit); allocates the $350K budget across activities; identifies resource requirements (consultant selection, internal team commitment, tool investment); the timeline accounts for the typical ISO 27001 certification process including surveillance audits."
    weight: 0.30
    description: "TwelveMonthTimeline"
