meta:
  id: aml-kyc-compliance-checklist
  level: 2
  course: compliance-checklist-creation
  type: output
  description: "Create an AML/KYC compliance checklist for a fintech company implementing customer due diligence and transaction monitoring programs"
  tags: [aml, kyc, bsa, intermediate]

state: {}

trigger: |
  You're the Chief Compliance Officer at a fintech
  startup (85 employees) that provides a payment
  processing platform for small businesses. You're
  regulated as a Money Services Business (MSB) by
  FinCEN and have state money transmitter licenses in
  22 states. Your bank partner (sponsor bank) has just
  completed their annual BSA/AML examination and
  received criticism from the OCC examiner regarding
  the adequacy of your compliance program.

  OCC examination findings relayed by your bank partner:
  - Customer Due Diligence (CDD) procedures are
    inadequate: "No risk-based approach to CDD; same
    level of diligence applied to all customers
    regardless of risk profile"
  - Beneficial ownership identification incomplete:
    "25% of business accounts missing beneficial
    ownership information required under the CDD Rule"
  - Transaction monitoring: "Rules-based monitoring
    system has not been tuned in 18 months; alert
    volumes are unsustainable (2,400 alerts/month for
    3 analysts); 85% false positive rate"
  - SAR filing: "Several suspicious activity patterns
    identified by examiners that were not detected by
    the monitoring system or investigated by staff"
  - Training: "BSA/AML training is generic; no role-
    specific training for customer-facing staff or
    technology team"

  Your bank partner has given you 120 days to remediate
  or they will terminate the partnership (which would
  shut down your business).

  Task: Create a comprehensive AML/KYC compliance
  remediation checklist covering customer due diligence,
  beneficial ownership, transaction monitoring, SAR
  filing, and training, with specific corrective actions
  for each examination finding.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive AML/KYC checklist — covers all BSA/AML program pillars: (1) internal controls (policies, procedures, risk assessment), (2) BSA compliance officer designation, (3) training program, (4) independent testing, (5) customer due diligence including beneficial ownership; addresses CDD requirements (customer identification, risk rating methodology, enhanced due diligence for high-risk customers, ongoing monitoring, beneficial ownership under the CDD Rule); addresses transaction monitoring (scenarios, thresholds, alert management, investigation procedures); addresses SAR filing (identification, investigation, filing within 30 days, 90-day continuing activity review); references specific regulations (31 CFR 1022, FinCEN CDD Rule)."
    weight: 0.35
    description: "ComprehensiveAMLChecklist"
  - type: llm_judge
    criteria: "Response directly addresses each examination finding — for CDD: creates a risk-based customer classification system (low, medium, high, prohibited) with different diligence levels and monitoring intensity; for beneficial ownership: creates remediation plan for the 25% gap (outreach program, account restriction timeline); for transaction monitoring: recommends scenario tuning methodology (reduce 85% false positive rate, add scenarios for missed patterns, analyst productivity targets); for SAR filing: creates a SAR decision matrix and investigation workflow; for training: designs role-specific training curriculum (customer-facing vs technology vs management); each remediation is specific and measurable."
    weight: 0.35
    description: "ExaminationFindingsAddressed"
  - type: llm_judge
    criteria: "Response provides a 120-day remediation timeline — prioritizes by examination severity and bank partner urgency; includes milestones for bank partner reporting (30-day progress report, 60-day interim assessment, 90-day pre-completion review, 120-day final submission); addresses the resource gap (3 analysts for 2,400 alerts — staffing plan or technology solution needed); identifies which items need immediate action (beneficial ownership remediation, monitoring tuning) vs phased implementation; includes sustainability plan (how to maintain compliance after remediation); the plan is realistic for an 85-person fintech facing an existential timeline."
    weight: 0.30
    description: "RemediationTimeline"
