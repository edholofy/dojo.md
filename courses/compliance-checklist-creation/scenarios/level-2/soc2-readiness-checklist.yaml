meta:
  id: soc2-readiness-checklist
  level: 2
  course: compliance-checklist-creation
  type: output
  description: "Create a SOC 2 Type II readiness checklist for a SaaS company preparing for its first audit"
  tags: [soc2, information-security, saas, intermediate]

state: {}

trigger: |
  You're the VP of Engineering at a 120-person B2B
  SaaS company ($15M ARR). Your three largest enterprise
  prospects (combined potential: $2.8M ARR) all require
  SOC 2 Type II certification before signing. Your CEO
  has approved the budget and wants the audit completed
  within 9 months. You've selected an auditor (a mid-
  size CPA firm) and need to prepare.

  Your current state:
  - Infrastructure: AWS (multi-region), managed via
    Terraform; 85% of services containerized (EKS)
  - Application: Node.js backend, React frontend,
    PostgreSQL (RDS), Redis cache, S3 for file storage
  - CI/CD: GitHub Actions; automated testing covers 72%
    of codebase; deployments 3-4x per day
  - Access management: Okta SSO for corporate apps;
    AWS IAM for infrastructure; no formal access review
    process; 12 engineers have production access
  - Security: WAF enabled, encryption at rest and in
    transit, but no formal vulnerability management
    program; last penetration test was 18 months ago
  - Monitoring: Datadog for infrastructure; PagerDuty
    for alerts; no formal incident response plan
  - HR: Background checks for new hires; annual security
    training (30-minute video); no formal onboarding/
    offboarding security checklist
  - Vendor management: No formal vendor risk assessment
    process; using 45+ SaaS tools
  - Policies: Basic acceptable use policy and privacy
    policy; no information security policy, change
    management policy, or incident response policy
  - Data: Customer data includes company names, user
    profiles, financial metrics, and API keys
  - Physical: Fully remote workforce; no physical office

  Trust Services Criteria selected: Security (required)
  and Availability.

  Task: Create a comprehensive SOC 2 Type II readiness
  checklist covering all controls that need to be
  implemented, policies that need to be written, evidence
  that needs to be collected, and a timeline for achieving
  audit readiness within 9 months.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive SOC 2 readiness checklist — maps controls to the SOC 2 Trust Services Criteria for Security (CC1-CC9: control environment, communication, risk assessment, monitoring, logical/physical access, system operations, change management) and Availability (A1: availability commitments); identifies specific controls needed: access management (reviews, least privilege, MFA, onboarding/offboarding), change management (approvals, testing, rollback), incident response (plan, communication, post-mortems), risk assessment (formal process, vendor risk), monitoring (logging, alerting, anomaly detection); each control has an implementation requirement and evidence requirement."
    weight: 0.35
    description: "ComprehensiveSOC2Checklist"
  - type: llm_judge
    criteria: "Response addresses the company's specific gaps — prioritizes the missing policies (information security, change management, incident response, access control, vendor management, data classification, business continuity); addresses the 12 engineers with production access (access reviews, role-based access, justification documentation); addresses the 18-month-old pen test (annual requirement); addresses the lack of formal vulnerability management; addresses vendor risk assessment for 45+ SaaS tools; addresses the remote workforce (endpoint security, BYOD policy, home network considerations); addresses the evidence collection strategy for a 3-4x daily deployment environment."
    weight: 0.35
    description: "SpecificGapsAddressed"
  - type: llm_judge
    criteria: "Response provides a realistic 9-month timeline — breaks the 9 months into phases (months 1-2: gap assessment, policy writing, tool selection; months 3-4: control implementation, process changes; months 5-6: evidence collection begins, dry run; months 7-9: Type II observation period; or explains why a longer observation period may be needed); identifies which controls need to be operating for the observation period (minimum 3-6 months); recommends compliance automation tools (Vanta, Drata, Secureframe); identifies quick wins vs longer-term implementations; the timeline is realistic for a 120-person engineering organization."
    weight: 0.30
    description: "RealisticTimeline"
