meta:
  id: nonprofit-compliance-checklist
  level: 2
  course: compliance-checklist-creation
  type: output
  description: "Create a comprehensive compliance checklist for a nonprofit organization covering IRS requirements, state registrations, and governance obligations"
  tags: [nonprofit, irs-990, governance, intermediate]

state: {}

trigger: |
  You're the Executive Director of a mid-size nonprofit
  organization ($4.5M annual budget, 28 employees, 150
  active volunteers). The organization provides youth
  mentoring and after-school programs in 3 cities. A
  new board member (a retired corporate attorney) just
  reviewed the organization's compliance status and
  found significant gaps:

  Identified issues:
  - Form 990 has been filed late 2 of the last 3 years
    (automatic revocation risk after 3 consecutive years)
  - No conflict of interest policy (required by Form 990)
  - Board meetings not properly documented (no minutes
    for 4 of the last 12 meetings)
  - Charitable solicitation registrations lapsed in 2
    of 5 states where you fundraise
  - Volunteer background checks: Only 60% of volunteers
    working with minors have current background checks
  - Grant compliance: 2 federal grants have unspent
    funds approaching the expenditure deadline
  - Donor privacy: Donor list was shared with a partner
    organization without donor consent
  - Employment practices: Volunteer vs employee
    classification unclear for 8 regular volunteers who
    receive stipends
  - Insurance: D&O insurance expired 3 months ago;
    sexual abuse/molestation coverage not verified
  - Board composition: No term limits; 3 of 9 board
    members haven't attended a meeting in over a year

  Task: Create a comprehensive nonprofit compliance
  checklist covering IRS requirements, state
  registration, governance, program compliance, and
  risk management, with an annual compliance calendar.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive nonprofit compliance checklist — covers IRS compliance (Form 990 filing, maintaining tax-exempt status, UBIT assessment, public support test, excess benefit transactions, required disclosures); state compliance (charitable solicitation registration, state annual reports, state tax exemption renewals); governance (board meetings, minutes, conflict of interest policy, document retention policy, whistleblower policy, compensation review); program compliance (grant reporting, restricted fund management, outcome tracking); financial (annual audit or review, internal controls, payroll compliance, 1099 filing for contractors); the checklist is specific to 501(c)(3) organizations."
    weight: 0.35
    description: "ComprehensiveNonprofitChecklist"
  - type: llm_judge
    criteria: "Response addresses the specific identified issues — creates a Form 990 filing process with early preparation timeline (avoid late filing and revocation risk); develops a conflict of interest policy with annual disclosure forms; creates board meeting governance standards (quorum, minutes, attendance tracking, inactive member removal process); addresses the charitable solicitation registration lapse (reinstatement process, unified registration statement); creates a volunteer background check compliance program (especially critical for youth-serving organization — mandatory checks before working with minors); addresses the grant expenditure deadline issue; addresses the donor privacy violation; evaluates the volunteer/employee classification for stipend recipients."
    weight: 0.35
    description: "SpecificIssuesAddressed"
  - type: llm_judge
    criteria: "Response includes an annual compliance calendar and risk management — creates a month-by-month calendar of filing deadlines, registration renewals, and recurring compliance tasks; addresses insurance gaps (D&O, abuse/molestation coverage critical for youth organization); includes volunteer management compliance (screening, training, supervision, incident reporting); addresses fundraising compliance (gift acknowledgment letters, quid pro quo disclosure, endowment restrictions); the checklist could be used by an Executive Director without a dedicated compliance officer; includes board training recommendations."
    weight: 0.30
    description: "CalendarAndRiskManagement"
