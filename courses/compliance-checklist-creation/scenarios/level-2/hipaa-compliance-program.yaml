meta:
  id: hipaa-compliance-program
  level: 2
  course: compliance-checklist-creation
  type: output
  description: "Create a comprehensive HIPAA compliance checklist covering Privacy Rule, Security Rule, and Breach Notification requirements for a mid-size medical practice"
  tags: [hipaa, healthcare, privacy-security, intermediate]

state: {}

trigger: |
  You're the Practice Administrator at a multi-specialty
  medical practice (8 physicians, 45 total staff, 3
  locations). The practice just signed a contract with
  a large health system that requires documented HIPAA
  compliance as a condition of participation. Your
  current HIPAA program consists of a generic policy
  manual purchased online 4 years ago that no one has
  read. You've never conducted a HIPAA risk assessment.

  Current technology and operations:
  - EHR: Athenahealth (cloud-based)
  - Patient portal: Active, 60% patient adoption
  - Email: Microsoft 365 (some staff email PHI in
    unencrypted emails)
  - Fax: Still used heavily for referrals and records
  - Mobile devices: 5 physicians use personal phones
    for patient communication (text messages, photos)
  - Paper records: Some legacy paper charts in storage
  - Billing: In-house billing department (5 staff)
  - Business associates: Lab companies, billing
    clearinghouse, IT support vendor, shredding company,
    cloud backup provider
  - Physical security: Keycard entry at main location;
    other 2 locations use standard keys
  - Training: Last HIPAA training was 2 years ago
  - Incidents: One laptop left in a car was stolen last
    year (unknown if PHI was on it); one staff member
    accessed a neighbor's medical record

  Task: Create a comprehensive HIPAA compliance checklist
  covering the Privacy Rule, Security Rule, and Breach
  Notification Rule, organized by compliance area with
  specific action items, responsible parties, and
  deadlines for bringing the practice into full
  compliance within 6 months.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive HIPAA checklist — covers all three rules: Privacy Rule (Notice of Privacy Practices, minimum necessary standard, patient rights, authorization requirements, training), Security Rule (administrative safeguards, physical safeguards, technical safeguards, risk assessment), and Breach Notification Rule (breach identification, notification procedures, documentation requirements); addresses all 18 implementation specifications of the Security Rule; includes specific regulatory references (45 CFR 164.xxx); organized by compliance area with clear priorities."
    weight: 0.35
    description: "ComprehensiveHIPAAChecklist"
  - type: llm_judge
    criteria: "Response addresses the practice's specific risks — flags physician personal phone use for patient communication (major Security Rule violation: no encryption, no remote wipe, no access controls); addresses unencrypted email of PHI; evaluates the laptop theft incident (should have been assessed as potential breach — breach risk assessment required under 45 CFR 164.402); addresses the unauthorized record access (sanctions required); identifies all business associates needing BAAs; addresses the legacy paper records (secure storage, access controls, destruction procedures); evaluates physical security differences across 3 locations."
    weight: 0.35
    description: "PracticeSpecificRisks"
  - type: llm_judge
    criteria: "Response provides a practical 6-month implementation plan — prioritizes actions (month 1: risk assessment, stop unencrypted PHI communications, address BYOD policy; month 2: update/create policies, BAA inventory; month 3: staff training, technical safeguards; months 4-6: documentation, testing, ongoing monitoring); assigns responsibilities (practice administrator, physicians, IT vendor, compliance officer designation); includes cost estimates where relevant (encryption tools, training programs, risk assessment consultant); the plan is realistic for a 45-person practice with limited administrative resources."
    weight: 0.30
    description: "SixMonthImplementation"
