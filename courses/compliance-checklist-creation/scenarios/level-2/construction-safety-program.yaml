meta:
  id: construction-safety-program
  level: 2
  course: compliance-checklist-creation
  type: output
  description: "Create a comprehensive construction site safety compliance program with daily, weekly, and project-phase checklists for OSHA compliance"
  tags: [construction-safety, osha, site-safety, intermediate]

state: {}

trigger: |
  You're the Safety Director at a mid-size commercial
  general contractor ($120M annual revenue, 280
  employees). OSHA cited your company for 3 willful
  violations and 5 serious violations on a recent
  project, resulting in $485,000 in proposed penalties:

  Willful violations ($156K each):
  - Fall protection: Workers on a 28-foot scaffold
    without guardrails or personal fall arrest systems
  - Trenching: Workers in a 6-foot trench without
    protective systems (sloping, shoring, or shield)
  - Scaffolding: Scaffold erected without competent
    person inspection

  Serious violations ($15K-$25K each):
  - Electrical: Temporary wiring without GFCI protection
  - PPE: Workers without hard hats in active work zone
  - Housekeeping: Debris and trip hazards throughout site
  - Hazard communication: No SDS available for concrete
    additives
  - Ladder safety: Extension ladder not secured at top

  Your CEO has mandated a company-wide safety program
  overhaul. The company works on commercial office
  buildings, retail build-outs, and light industrial
  projects, typically 5-8 active projects simultaneously.

  Task: Create a comprehensive construction safety
  compliance program with checklists for: daily site
  inspections, weekly safety meetings, project startup
  safety planning, and monthly safety audits. Address
  OSHA's "Focus Four" hazards (falls, struck-by, caught-
  in/between, electrocution) plus all cited violations.

assertions:
  - type: llm_judge
    criteria: "Response creates a multi-layered safety program — includes daily pre-task checklists (job hazard analysis, equipment inspection, PPE verification, housekeeping); weekly safety meeting topics and format (toolbox talks, near-miss review, hazard identification); project startup safety planning (site-specific safety plan, competent person designation, emergency action plan, subcontractor safety requirements); monthly safety audits (comprehensive site audit form, corrective action tracking, trend analysis); each layer addresses the Focus Four hazards specifically and includes the cited violations."
    weight: 0.35
    description: "MultiLayeredSafetyProgram"
  - type: llm_judge
    criteria: "Response addresses all cited violations with specific controls — for falls: fall protection plan requirements (guardrails, PFAS, safety nets), competent person training, scaffold erection/inspection procedures; for trenching: soil classification, protective system selection, daily trench inspection by competent person; for electrical: GFCI requirements, assured grounding conductor program; for PPE: site entry requirements, enforcement procedures; for ladders: proper setup, securing, 3-point contact; for hazcom: SDS access on-site, container labeling, training; for housekeeping: daily cleanup standards, debris removal schedule; each control references the applicable OSHA standard (29 CFR 1926.xxx)."
    weight: 0.35
    description: "CitedViolationsAddressed"
  - type: llm_judge
    criteria: "Response includes enforcement and accountability — defines competent person requirements and qualifications for each hazard area; includes disciplinary policy for safety violations (progressive discipline); includes subcontractor safety requirements and monitoring; creates a safety performance tracking system (incident rates, inspection scores, near-miss reporting); includes corrective action procedures (who documents, who follows up, timeline for completion); addresses the culture change needed (from the $485K penalty, management commitment must be visible); the program would demonstrate good faith compliance efforts to OSHA."
    weight: 0.30
    description: "EnforcementAndAccountability"
