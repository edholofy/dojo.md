meta:
  id: hr-labor-law-compliance
  level: 2
  course: compliance-checklist-creation
  type: output
  description: "Create an HR and labor law compliance checklist for a multi-state employer covering wage/hour, anti-discrimination, and leave management"
  tags: [hr, labor-law, multi-state, intermediate]

state: {}

trigger: |
  You're the HR Director at a 350-person technology
  company with employees in 8 states (CA, NY, TX, IL,
  WA, CO, MA, FL). The company just settled a class
  action wage and hour lawsuit for $1.2M (California
  employees were misclassified as exempt and denied
  overtime). The CEO has asked you to create a
  comprehensive HR compliance program to prevent future
  lawsuits.

  Current compliance gaps identified:
  - Employee classification: 45 employees classified
    as exempt that may not meet FLSA or state exemption
    tests
  - Meal and rest breaks: California and Washington
    employees not receiving compliant meal periods
  - Pay equity: No pay equity analysis conducted despite
    California (SB 973), Colorado, and Illinois
    requirements
  - Pay transparency: Colorado and Washington require
    salary ranges in job postings — current postings
    don't include them
  - Leave management: Inconsistent application of FMLA,
    state leave laws, and company PTO policy across
    states
  - Anti-harassment training: California and Illinois
    require annual training — last training was 18
    months ago
  - I-9 compliance: Last I-9 audit found errors in 15%
    of forms
  - Personnel files: Inconsistent maintenance; some
    states require employee access to personnel files
    upon request
  - Final pay: Different states have different timing
    requirements — payroll department uses one-size-
    fits-all approach
  - Job descriptions: 40% of positions have no current
    job description

  Task: Create a comprehensive multi-state HR compliance
  checklist covering all major employment law areas,
  organized by compliance area with state-specific
  requirements highlighted, and including an annual
  compliance calendar.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive HR compliance checklist — covers all major employment law areas: wage and hour (FLSA and state law exemption tests, overtime, minimum wage, meal/rest breaks, pay frequency); anti-discrimination and harassment (Title VII, ADA, ADEA, state equivalents, training requirements); leave management (FMLA, state family leave, sick leave, voting leave, jury duty); employee classification (exempt/non-exempt, independent contractor); hiring and onboarding (I-9, background checks, ban-the-box, drug testing); separation (final pay, COBRA, non-compete/non-solicitation enforceability); recordkeeping (personnel files, payroll records, retention periods); each area identifies federal requirements and state variations."
    weight: 0.35
    description: "ComprehensiveHRChecklist"
  - type: llm_judge
    criteria: "Response addresses state-specific requirements for all 8 states — identifies California's unique requirements (meal/rest breaks, CFRA, paid sick leave, pay data reporting, salary history ban, anti-harassment training); identifies New York requirements (NYLL overtime, paid family leave, sexual harassment training); identifies Colorado requirements (COMPS Order, FAMLI, pay transparency, Equal Pay for Equal Work Act); identifies Washington requirements (paid family medical leave, L&I meal/rest break rules, salary transparency); differentiates which states have requirements beyond federal law for each compliance area; creates a state-by-state comparison matrix for key requirements."
    weight: 0.35
    description: "StateSpecificRequirements"
  - type: llm_judge
    criteria: "Response provides a remediation plan for identified gaps — creates an employee classification audit checklist (duties test analysis for all 45 potentially misclassified employees); designs a meal and rest break compliance program for CA and WA; creates a pay equity analysis framework; addresses pay transparency compliance for CO and WA job postings; designs a leave management decision tree by state; creates a training calendar for state-mandated training; includes an I-9 self-audit checklist; the remediation plan prioritizes by litigation risk and addresses the root cause of the $1.2M settlement."
    weight: 0.30
    description: "RemediationPlan"
