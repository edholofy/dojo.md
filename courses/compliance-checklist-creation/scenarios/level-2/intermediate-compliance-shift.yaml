meta:
  id: intermediate-compliance-shift
  level: 2
  course: compliance-checklist-creation
  type: output
  description: "Handle an intermediate shift with overlapping compliance frameworks, a regulatory examination, and a data breach creating simultaneous compliance obligations"
  tags: [shift-simulation, multi-framework, examination, intermediate]

state: {}

trigger: |
  You're the Compliance Manager at a 180-person
  healthcare staffing company. It's Tuesday morning
  and three compliance situations have converged:

  SITUATION 1 — Joint Commission Survey (Surprise):
  Your company just received a phone call: The Joint
  Commission is conducting an unannounced survey of
  your staffing agency starting tomorrow morning. They
  will review:
  - Credential verification for all placed healthcare
    workers (licenses, certifications, background checks,
    drug screens, immunization records)
  - Competency assessment documentation
  - Complaint and incident reporting processes
  - Quality improvement program
  - You have 800 active healthcare workers placed across
    42 client facilities
  - Your credentialing database shows 65 workers with
    at least one expired credential
  - 120 workers are missing updated TB test results

  SITUATION 2 — Payroll Tax Audit:
  The IRS has scheduled a payroll employment tax
  examination starting next Monday. They want to review:
  - Worker classification (employee vs independent
    contractor) for the past 3 years
  - Your company uses a mix of W-2 employees and 1099
    contractors (140 W-2, 660 "1099 contractors")
  - The ratio is unusual and likely to trigger scrutiny
  - Employer tax deposits and filings (941s, W-2s,
    1099s, FUTA, SUTA)
  - Benefits compliance for the W-2 employees (ACA
    applicable large employer?)

  SITUATION 3 — Client Data Breach:
  Your IT department discovered that a phishing attack
  compromised an HR coordinator's email account. The
  compromised mailbox contained:
  - Worker credential files (including SSNs, dates of
    birth, license numbers) for approximately 350
    healthcare workers
  - Client facility contracts with patient volume data
  - Placement schedules that could identify patient
    care assignments
  The breach may have exposed PHI indirectly (worker
  assignments to specific patient care units).

  Task: Write a prioritized compliance response plan
  with specific checklists for each situation, identifying
  interconnections and resource allocation for the next
  7 days.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three situations with specific checklists — creates a Joint Commission survey preparation checklist (credential verification audit, TB test remediation, competency documentation review, complaint/incident file preparation); creates an IRS examination preparation checklist (worker classification analysis, payroll tax document assembly, ACA compliance verification); creates a data breach response checklist (containment, assessment, notification obligations, evidence preservation); each checklist has specific, actionable items appropriate for the timeframe."
    weight: 0.35
    description: "AllSituationsAddressed"
  - type: llm_judge
    criteria: "Response identifies interconnections and compound risks — connects the worker classification issue to the Joint Commission survey (if workers are misclassified as 1099s, who is responsible for credentialing? the staffing agency may have reduced oversight obligations for contractors); connects the data breach to both other situations (breach notification to 350 workers may trigger credential re-verification; IRS examiners may discover the misclassification during breach investigation records review); identifies that the compromised worker credential files create identity theft obligations beyond HIPAA; identifies the ACA applicable large employer question (140 W-2 + potentially reclassified 1099s could exceed 50 FTE threshold)."
    weight: 0.35
    description: "InterconnectionsIdentified"
  - type: llm_judge
    criteria: "Response provides realistic resource allocation for 7 days — creates a day-by-day priority plan (Tuesday: breach containment and JC prep; Wednesday: JC survey management and breach assessment; Thursday-Friday: continued JC survey and IRS prep; weekend: IRS document preparation; Monday: IRS examination); identifies which staff handle each situation (who manages JC survey, who prepares IRS documents, who manages breach response); acknowledges that a 180-person company has limited compliance resources; recommends when to engage outside help (breach counsel, employment tax attorney); the plan is realistic under extreme time pressure."
    weight: 0.30
    description: "RealisticResourceAllocation"
