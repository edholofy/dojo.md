meta:
  id: banking-regulatory-compliance
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Design a comprehensive regulatory compliance program for a community bank responding to examination findings from multiple regulators"
  tags: [banking, regulatory, fdic, advanced]

state: {}

trigger: |
  You're the Chief Compliance Officer at a community bank
  ($2.8B assets, 42 branches across 3 states, 680
  employees). Your bank has just completed concurrent
  examinations by the FDIC and your state banking
  department. The examination resulted in:

  FDIC findings:
  - Matter Requiring Attention (MRA): BSA/AML program
    deficiencies — suspicious activity monitoring system
    generated 12,000 alerts in 12 months but only 340
    SARs filed; inadequate investigation documentation;
    no risk-based customer due diligence for higher-risk
    customer segments (MSBs, foreign correspondents)
  - MRA: Fair lending — statistical analysis showed
    pricing disparities in auto lending by race/ethnicity
    that cannot be explained by creditworthiness factors;
    no second-review process for denied applications in
    majority-minority census tracts
  - MRA: Information security — vulnerability scanning
    not performed quarterly; 3 critical patches older
    than 90 days; no multi-factor authentication for
    remote access to core banking system
  - Violation: Regulation E — error resolution procedures
    not completed within 10-business-day initial
    investigation period for 23% of disputes; provisional
    credits not issued timely

  State findings:
  - Consumer complaint response times exceed 15-day
    requirement (average 28 days)
  - CRA (Community Reinvestment Act) performance
    downgraded from "Satisfactory" to "Needs to Improve"
  - Trust department — 4 accounts with self-dealing
    conflicts not properly disclosed

  You have 60 days to submit a Board-approved corrective
  action plan. The Board has expressed concern that failure
  to remediate could result in a formal enforcement action
  (consent order).

  Task: Design a comprehensive regulatory compliance
  remediation program with specific checklists for each
  finding, including root cause analysis, corrective
  actions, policy/procedure enhancements, monitoring
  metrics, Board reporting framework, and sustainability
  plan to prevent recurrence.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive banking regulatory remediation program — addresses each FDIC MRA and violation and each state finding with specific corrective actions; for BSA/AML: redesigns alert tuning methodology, investigation procedures, SAR decision documentation, and risk-based CDD program; for fair lending: designs statistical monitoring program, second-review process, pricing oversight; for information security: designs vulnerability management program, patch management SLA, MFA implementation; for Reg E: redesigns dispute resolution workflow with tracking and escalation; addresses state findings (complaint management, CRA action plan, trust department controls); the program demonstrates institutional commitment to compliance."
    weight: 0.35
    description: "ComprehensiveBankingRemediation"
  - type: llm_judge
    criteria: "Response addresses banking-specific regulatory nuances — distinguishes between MRAs and violations and prioritizes accordingly; references specific regulations (BSA/31 CFR 1020, ECOA/Reg B, GLBA/Reg P, Reg E/12 CFR 1005, CRA/12 CFR 345); designs a BSA/AML risk assessment methodology (customer risk scoring, geographic risk, product risk); addresses fair lending statistical analysis methodology (regression analysis, matched-pair testing, comparative file review); creates an information security program aligned with FFIEC guidance; addresses the Board's fiduciary oversight responsibilities; the response would be credible to bank examiners."
    weight: 0.35
    description: "BankingRegulatoryNuances"
  - type: llm_judge
    criteria: "Response provides a realistic remediation timeline and governance framework — creates a phased remediation plan within the 60-day Board response deadline and beyond (immediate: containment within 30 days; short-term: systemic fixes within 90 days; medium-term: program enhancements within 180 days; ongoing: monitoring and sustainability); designs Board and committee oversight structure (compliance committee charter, reporting cadence, escalation triggers); estimates resource requirements (additional compliance staff, technology investments, third-party consultants); creates key risk indicators and compliance metrics dashboard; the plan is realistic for a $2.8B community bank."
    weight: 0.30
    description: "TimelineAndGovernance"
