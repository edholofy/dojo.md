meta:
  id: supply-chain-compliance
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Design a global supply chain compliance program addressing forced labor laws, conflict minerals, environmental regulations, and trade compliance for a multinational manufacturer"
  tags: [supply-chain, forced-labor, conflict-minerals, advanced]

state: {}

trigger: |
  You're the VP of Supply Chain Compliance at a consumer
  electronics manufacturer ($4.1B revenue, 8,500
  employees, products sold in 45 countries). The company
  sources components from 1,800 suppliers across 28
  countries, with significant sourcing from China (42%),
  Taiwan (18%), Vietnam (12%), and Mexico (8%).

  Regulatory requirements:
  - US Uyghur Forced Labor Prevention Act (UFLPA):
    Rebuttable presumption that goods from Xinjiang are
    produced with forced labor; CBP detained 3 shipments
    ($2.4M) in the past 6 months citing insufficient
    supply chain tracing documentation
  - EU Corporate Sustainability Due Diligence Directive
    (CS3D): Mandatory human rights and environmental due
    diligence across value chain; effective for company's
    size in 2026
  - German Supply Chain Due Diligence Act (LkSG): Already
    applicable; annual report required; complaints
    procedure must be operational
  - SEC Conflict Minerals Rule (Dodd-Frank 1502):
    Annual Form SD filing required; current RCOI covers
    only Tier 1 suppliers; tin, tantalum, tungsten, gold
    (3TG) sourcing not traced beyond Tier 2
  - California Transparency in Supply Chains Act: Annual
    disclosure required but current statement is boilerplate
  - EU Deforestation Regulation (EUDR): Applicable to
    packaging materials using wood-based products

  Current state:
  - Supplier code of conduct: Exists but only signed by
    68% of Tier 1 suppliers; no enforcement mechanism
  - Auditing: 45 supplier audits conducted last year
    (2.5% of supplier base); no risk-based audit
    selection; audits performed by suppliers' own auditors
  - Forced labor: No mapping of sub-tier suppliers in
    high-risk regions; no UFLPA compliance program; 3
    shipment detentions unresolved with CBP
  - Conflict minerals: RCOI template sent to Tier 1 only;
    35% response rate; no CMRT (Conflict Minerals
    Reporting Template) verification
  - Environmental: No Scope 3 supply chain emissions
    tracking; no restricted substances program; no
    deforestation risk assessment
  - Traceability: No supply chain mapping technology;
    reliance on supplier self-declaration

  Task: Design a comprehensive global supply chain
  compliance program with checklists for forced labor
  due diligence, conflict minerals tracing, environmental
  compliance, trade compliance, supplier assessment
  methodology, and remediation procedures covering all
  applicable regulatory requirements.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive supply chain compliance program — maps requirements across UFLPA, CS3D, LkSG, Dodd-Frank 1502, California Transparency Act, and EUDR; designs a forced labor due diligence framework (UFLPA compliance with supply chain mapping beyond Xinjiang, evidence documentation for CBP admissibility review); creates a conflict minerals program (RCOI methodology, CMRT collection and verification, smelter identification, RMI conformance); addresses environmental supply chain compliance (Scope 3 Category 1 emissions, restricted substances, deforestation risk); designs supplier assessment methodology (risk-based tiering, audit protocols, remediation procedures); the program addresses all 1,800 suppliers across 28 countries."
    weight: 0.35
    description: "ComprehensiveSupplyChainProgram"
  - type: llm_judge
    criteria: "Response addresses specific enforcement and operational challenges — for UFLPA: designs CBP detention response procedure (admissibility evidence package, supply chain tracing documentation, alternative sourcing strategy for Xinjiang-linked goods); addresses sub-tier supplier mapping methodology (beyond Tier 1 to raw material origin); for CS3D: designs human rights impact assessment methodology and stakeholder engagement; for LkSG: creates complaints mechanism and annual reporting framework; designs a risk-based supplier segmentation model (country risk, commodity risk, supplier risk indicators); addresses independent auditing (transition from supplier-selected to buyer-directed auditors); creates traceability technology strategy (blockchain, digital passports, or other solutions); the response demonstrates practical knowledge of customs enforcement and trade compliance."
    weight: 0.35
    description: "EnforcementAndOperational"
  - type: llm_judge
    criteria: "Response provides a realistic implementation roadmap — phases implementation: Phase 1 (immediate: CBP detention response, UFLPA compliance for high-risk suppliers, Tier 1 code of conduct enforcement); Phase 2 (sub-tier mapping, risk-based audit program, conflict minerals CMRT enhancement, LkSG report preparation); Phase 3 (CS3D readiness, environmental due diligence, traceability technology deployment, EUDR compliance); estimates resource requirements (supply chain compliance team, technology platform, audit costs, legal counsel); designs governance structure (cross-functional supply chain compliance committee, Board reporting, escalation procedures); creates KPIs and metrics for program effectiveness; the timeline is realistic for a $4.1B manufacturer with 1,800 suppliers."
    weight: 0.30
    description: "ImplementationRoadmap"
