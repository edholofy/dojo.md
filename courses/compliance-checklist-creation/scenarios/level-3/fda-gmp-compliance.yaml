meta:
  id: fda-gmp-compliance
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Create a comprehensive FDA GMP compliance checklist for a pharmaceutical manufacturer responding to a Warning Letter"
  tags: [fda, gmp, pharmaceutical, advanced]

state: {}

trigger: |
  You're the VP of Quality at a mid-size pharmaceutical
  manufacturer (600 employees, 2 manufacturing sites).
  The company produces generic oral solid dosage forms
  (tablets and capsules). FDA issued a Warning Letter
  following a recent inspection citing 6 observations:

  FDA Warning Letter observations:
  1. "Laboratory controls — Out-of-specification (OOS)
     results were not adequately investigated per 21 CFR
     211.192. In 23 of 45 OOS investigations reviewed,
     the root cause determination was 'laboratory error'
     without supporting evidence"
  2. "Production controls — Batch production records
     lacked complete documentation of in-process controls.
     In-process weight check results were not recorded
     for 15 of 42 batches reviewed (21 CFR 211.188)"
  3. "Equipment cleaning — Cleaning validation studies
     were not performed for 3 of 8 production equipment
     items used for multiple products. No assessment of
     cleaning effectiveness to prevent cross-contamination
     (21 CFR 211.67)"
  4. "CAPA system — 40% of CAPAs (52 of 130) were overdue
     with no documented justification for extension.
     Effectiveness checks were not performed for 65% of
     closed CAPAs (21 CFR 211.192)"
  5. "Computer system validation — The Laboratory
     Information Management System (LIMS) used for batch
     release decisions was not validated per 21 CFR Part
     11. Audit trail functionality was not enabled"
  6. "Stability program — Annual stability studies were
     not conducted for 4 of 18 commercial products.
     Stability data trending was not performed (21 CFR
     211.166)"

  You have 15 business days to respond to the Warning
  Letter with a comprehensive corrective action plan.
  FDA has stated that failure to address the observations
  could result in import alerts, consent decree, or
  product seizure.

  Task: Create a comprehensive FDA GMP compliance
  remediation checklist addressing each Warning Letter
  observation with specific corrective actions,
  preventive actions, evidence of implementation, and
  effectiveness verification, suitable for inclusion
  in the Warning Letter response.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive GMP remediation checklist — addresses each of the 6 Warning Letter observations with specific corrective actions (immediate containment), root cause analysis, preventive actions (systemic fixes), implementation timeline, evidence of completion, and effectiveness verification metrics; references specific 21 CFR 211 sections for each observation; follows FDA's expected format for Warning Letter responses (acknowledge the observation, describe the corrective action, provide timeline, demonstrate commitment to sustained compliance); the response would be credible to FDA reviewers."
    weight: 0.35
    description: "ComprehensiveGMPRemediation"
  - type: llm_judge
    criteria: "Response addresses each observation with technical specificity — for OOS: designs a scientifically sound OOS investigation procedure (Phase I laboratory investigation, Phase II manufacturing investigation, per FDA OOS Guidance); for batch records: creates in-process control documentation requirements and verification procedures; for cleaning validation: designs a cleaning validation protocol (residue limits, sampling methods, analytical methods, worst-case product identification); for CAPA: redesigns the CAPA system with escalation procedures, effectiveness check methodology, and aging metrics; for CSV: creates a 21 CFR Part 11 validation plan for LIMS including audit trail requirements; for stability: creates a stability program with annual study scheduling and trend analysis methodology."
    weight: 0.35
    description: "TechnicalSpecificity"
  - type: llm_judge
    criteria: "Response provides a realistic implementation timeline and sustainability plan — creates a phased remediation timeline (immediate: containment actions within 15 days; short-term: systemic corrective actions within 90 days; medium-term: preventive actions and validation within 180 days; long-term: effectiveness verification over 12 months); identifies resource requirements (additional QA staff, validation consultants, LIMS vendor support); includes a management oversight structure for remediation tracking; designs ongoing compliance monitoring to prevent recurrence; the plan demonstrates to FDA that the company takes the observations seriously and has the capability to sustain compliance."
    weight: 0.30
    description: "TimelineAndSustainability"
