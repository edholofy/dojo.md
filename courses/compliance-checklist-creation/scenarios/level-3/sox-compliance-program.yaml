meta:
  id: sox-compliance-program
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Design a SOX Section 404 compliance program for a newly public company, including internal control documentation, testing methodology, and remediation tracking"
  tags: [sox, internal-controls, section-404, advanced]

state: {}

trigger: |
  You're the VP of Internal Audit at a technology
  company ($420M revenue, 1,800 employees) that
  completed its IPO 6 months ago. The company has never
  been subject to SOX requirements. Your external
  auditor has communicated that the first SOX Section
  404(b) attestation will cover the fiscal year ending
  December 31, 2026. You have 12 months to design and
  implement an internal control framework.

  The auditor's preliminary assessment identified:
  - No formal entity-level controls documentation
  - No IT general controls (ITGC) framework
  - Revenue recognition is complex (multi-element
    arrangements with software, professional services,
    and ongoing support — ASC 606)
  - 4 material business processes identified: Revenue
    (order-to-cash), Procurement (procure-to-pay),
    Financial Close (close and reporting), Payroll
  - 14 IT applications in scope (ERP, CRM, billing
    system, HRIS, banking applications, reporting tools)
  - Significant reliance on spreadsheets for financial
    reporting ($45M+ in journal entries via Excel)
  - No segregation of duties framework — CEO can
    approve any transaction
  - 3 acquisitions in the past 2 years — acquired
    companies still use legacy systems
  - International operations in 4 countries with local
    books
  - No formal fraud risk assessment

  The company's Board Audit Committee is requesting a
  detailed program plan and quarterly progress updates.

  Task: Design a comprehensive SOX Section 404
  compliance program with a control framework, testing
  methodology, remediation tracking, and 12-month
  implementation timeline. Include specific checklists
  for entity-level controls, process-level controls, and
  IT general controls.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive SOX program — covers all required elements: entity-level controls (COSO 2013 framework: control environment, risk assessment, control activities, information/communication, monitoring); process-level controls for all 4 material processes (revenue, procurement, financial close, payroll) with specific key controls and assertions (existence, completeness, valuation, rights/obligations, presentation/disclosure); IT general controls (access management, change management, computer operations, program development) for all 14 in-scope applications; the framework follows PCAOB AS 2201 requirements."
    weight: 0.35
    description: "ComprehensiveSOXProgram"
  - type: llm_judge
    criteria: "Response addresses the company's specific risks — creates a revenue recognition control framework for multi-element arrangements (ASC 606 performance obligations, standalone selling price allocation, contract modification accounting); addresses the spreadsheet risk ($45M in journal entries — designs spreadsheet controls or ERP migration strategy); addresses the segregation of duties gap (compensating controls, access matrix design); addresses the acquired company integration (legacy system controls, data migration controls, interim controls); designs a fraud risk assessment program; addresses international subsidiary controls (local books reconciliation, inter-company elimination); each risk area has specific control procedures."
    weight: 0.35
    description: "CompanySpecificRisks"
  - type: llm_judge
    criteria: "Response provides a testing methodology and timeline — defines testing approach (walkthrough methodology, test of design, test of operating effectiveness); specifies sample sizes for testing (per PCAOB guidance); creates a deficiency evaluation framework (deficiency, significant deficiency, material weakness classification criteria); designs a remediation tracking process with Audit Committee reporting format; provides a 12-month implementation timeline (Q1: scoping, risk assessment, control identification; Q2: documentation, walkthrough testing; Q3: control implementation, initial testing; Q4: formal testing, remediation, management assessment); the timeline accounts for the auditor's parallel testing and is realistic for a first-year SOX program."
    weight: 0.30
    description: "TestingAndTimeline"
