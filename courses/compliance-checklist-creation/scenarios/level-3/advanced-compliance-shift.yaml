meta:
  id: advanced-compliance-shift
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Handle a complex compliance day involving simultaneous regulatory examination, data breach notification, and whistleblower investigation requiring cross-functional coordination"
  tags: [multi-crisis, cross-functional, compliance-management, advanced]

state: {}

trigger: |
  You're the Chief Compliance Officer at a mid-size
  fintech company ($380M revenue, 900 employees, licensed
  in 38 states as a money transmitter, operating a
  peer-to-peer payments platform and small business
  lending product).

  Three simultaneous compliance crises have emerged today:

  Crisis 1 — Multi-State Regulatory Examination:
  The Conference of State Bank Supervisors (CSBS) has
  initiated a multi-state examination (coordinated by
  8 states) of your money transmission operations. The
  examination scope covers:
  - Permissible investments and safeguarding of customer
    funds ($145M in customer float)
  - Transaction monitoring and SAR filing adequacy
  - State-specific consumer disclosure compliance
  - Complaint handling across jurisdictions
  - Cybersecurity program (NY DFS 23 NYCRR 500)
  You have 10 business days to produce documentation.
  Your compliance team has never been through a multi-
  state coordinated examination.

  Crisis 2 — Data Breach and Notification:
  Your CISO has confirmed a data breach affecting 340,000
  customers across all 38 states. Compromised data
  includes names, email addresses, last 4 of SSN,
  transaction history, and bank account numbers (for
  12,000 customers). The breach was caused by a
  misconfigured API endpoint that was exploitable for
  approximately 45 days before detection.
  - Breach notification deadlines vary by state (24 hours
    for some states if financial data involved)
  - You must notify state regulators, affected customers,
    and potentially the CFPB
  - Your cyber insurance carrier requires notification
    within 72 hours
  - You have no pre-drafted breach notification templates
  - Your incident response plan was last updated 2 years
    ago and doesn't address API-related breaches

  Crisis 3 — Whistleblower Complaint:
  Your Board received an anonymous whistleblower complaint
  alleging that the small business lending product has
  been charging undisclosed fees to borrowers (estimated
  $2.3M over 18 months), the VP of Lending instructed
  staff to manipulate APR calculations in marketing
  materials to appear below state usury caps, and that
  compliance concerns were raised internally 6 months
  ago but suppressed by management.
  - TILA/Reg Z implications for fee disclosure
  - Potential UDAP/UDAAP violations (CFPB authority)
  - State usury law violations in multiple jurisdictions
  - Whistleblower anti-retaliation protections apply
  - If substantiated, could trigger SAR filing
    obligations for the conduct itself

  Task: Create comprehensive compliance checklists for
  managing all three crises simultaneously, including
  triage and prioritization framework, specific action
  items for each crisis with regulatory requirements and
  deadlines, resource allocation across crises, Board
  and external communications strategy, and cross-crisis
  dependency identification.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive checklists for all three crises — for the multi-state examination: creates document production checklist organized by examination scope area (permissible investments, transaction monitoring, disclosures, complaints, cybersecurity); for the data breach: creates a breach notification compliance matrix by state with specific deadlines and requirements, customer notification content, regulatory notification procedures, forensic investigation steps; for the whistleblower complaint: creates investigation protocol (preservation of evidence, independent investigation, anti-retaliation measures, TILA/UDAAP analysis framework); provides a triage framework that prioritizes actions by regulatory deadline and severity; the checklists are specific enough for a compliance team to execute."
    weight: 0.35
    description: "ComprehensiveTripleCrisis"
  - type: llm_judge
    criteria: "Response identifies cross-crisis dependencies and regulatory interactions — identifies that the data breach may be discoverable during the multi-state examination and plans for proactive disclosure; recognizes that the whistleblower allegations could trigger additional examination scope; addresses whether the lending fee practices require SAR filings (structuring the analysis); identifies that the breach notification to state regulators overlaps with the examination states; addresses potential CFPB interest in both the breach and the lending practices; evaluates whether the breach affects the examination documentation production timeline; designs a unified external communications strategy that avoids contradictions across crises; addresses attorney-client privilege considerations for the whistleblower investigation."
    weight: 0.35
    description: "CrossCrisisDependencies"
  - type: llm_judge
    criteria: "Response provides a realistic resource allocation and governance framework — creates a crisis management organizational structure (incident commander, crisis teams for each workstream, escalation matrix); allocates the compliance team across three concurrent workstreams with specific role assignments; identifies when outside resources are needed (breach response counsel, forensic firm, independent investigator for whistleblower, examination preparation consultant); creates a Board reporting framework (immediate notification content, ongoing cadence, decision points requiring Board action); designs a timeline showing parallel workstreams with milestones and deadlines across all three crises; addresses documentation and privilege logging; the resource plan is realistic for a 900-person fintech with a compliance team likely numbering 15-25 people."
    weight: 0.30
    description: "ResourceAllocationAndGovernance"
