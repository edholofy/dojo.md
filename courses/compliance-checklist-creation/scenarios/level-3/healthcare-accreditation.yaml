meta:
  id: healthcare-accreditation
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Design a comprehensive healthcare facility accreditation readiness program for Joint Commission and CMS compliance across a multi-site health system"
  tags: [healthcare, joint-commission, cms, advanced]

state: {}

trigger: |
  You're the Chief Quality Officer at a regional health
  system (4 hospitals, 12 ambulatory clinics, 2 long-term
  care facilities, 6,200 employees, 850 credentialed
  providers). Your Joint Commission triennial survey is
  scheduled for 8 months from now. The last survey
  resulted in 14 Requirements for Improvement (RFIs)
  across multiple standards chapters.

  Previous survey RFIs (partially remediated):
  - Environment of Care: 5 RFIs — fire safety deficiencies
    (blocked fire doors, expired extinguishers), ligature
    risk assessment gaps in behavioral health unit, utility
    systems management deficiencies, hazardous materials
    storage non-compliance
  - Infection Prevention: 3 RFIs — hand hygiene compliance
    at 62% (target 90%+), sterilization process monitoring
    gaps, construction infection control risk assessment
    not performed for 2 renovation projects
  - Medication Management: 2 RFIs — high-alert medication
    protocols not followed (insulin, heparin); medication
    storage temperature monitoring gaps in 3 satellite
    pharmacies
  - Human Resources: 2 RFIs — competency assessment
    documentation incomplete for 18% of clinical staff;
    orientation checklist not standardized across sites
  - Patient Rights: 1 RFI — informed consent process
    deficiency (interpreter services not consistently
    offered for LEP patients)
  - Performance Improvement: 1 RFI — OPPE/FPPE data
    collection insufficient for 4 low-volume specialties

  Current compliance concerns:
  - CMS Conditions of Participation: Recent state survey
    cited deficiencies in discharge planning and patient
    assessment documentation
  - Leapfrog Hospital Safety Grade: Dropped from A to C
    at 2 of 4 hospitals
  - EMTALA: 2 complaints under investigation related to
    psychiatric patient transfers
  - Sentinel events: 3 in past 12 months (wrong-site
    surgery, patient elopement from behavioral health,
    medication error resulting in death); root cause
    analyses completed but action plans partially
    implemented

  Task: Design a comprehensive accreditation readiness
  program with specific checklists for each Joint
  Commission standards chapter, CMS Conditions of
  Participation alignment, sentinel event action plan
  tracking, continuous readiness monitoring, and a
  multi-site implementation strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive accreditation readiness program — addresses all major Joint Commission standards chapters (Environment of Care, Life Safety, Infection Prevention and Control, Medication Management, Human Resources, Patient Rights, Performance Improvement, Leadership, Medical Staff, Provision of Care, Information Management, Emergency Management, Record of Care); specifically remediates each of the 14 previous RFIs with evidence of sustained compliance; addresses CMS Conditions of Participation alignment (discharge planning, patient assessment); creates a multi-site standardization approach across 4 hospitals, 12 clinics, and 2 long-term care facilities; the program is comprehensive for a regional health system."
    weight: 0.35
    description: "ComprehensiveAccreditationProgram"
  - type: llm_judge
    criteria: "Response addresses high-priority clinical and safety issues — for sentinel events: designs robust corrective action tracking (wrong-site surgery universal protocol compliance, behavioral health elopement prevention, medication safety high-alert drug protocols); addresses EMTALA compliance for psychiatric transfers (medical screening examination, stabilization requirements, appropriate transfer documentation); designs infection prevention program (hand hygiene improvement strategy with specific interventions — direct observation, electronic monitoring, accountability; construction ICRA process); addresses ligature risk assessment methodology for behavioral health; designs the OPPE/FPPE program for low-volume specialties; creates a Leapfrog improvement strategy; addresses informed consent and language access services; each area includes specific measurable targets."
    weight: 0.35
    description: "ClinicalSafetyPriorities"
  - type: llm_judge
    criteria: "Response provides a realistic 8-month timeline and continuous readiness model — phases preparation: Months 1-2 (gap assessment, tracer methodology training, immediate life safety remediation, sentinel event action plan completion); Months 3-5 (policy standardization across sites, competency assessment remediation, mock surveys, department-level readiness); Months 6-7 (system-wide mock tracer surveys, document readiness verification, staff education); Month 8 (final readiness assessment, survey logistics preparation); designs continuous readiness infrastructure (ongoing tracer program, compliance rounding, dashboard monitoring); estimates resource requirements (accreditation coordinator at each site, consultant support); creates Board quality committee reporting; the timeline is realistic for an 18-facility health system."
    weight: 0.30
    description: "TimelineAndContinuousReadiness"
