meta:
  id: esg-compliance-program
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Design an ESG compliance and reporting program with checklists for SEC climate disclosure, EU CSRD, and voluntary reporting frameworks"
  tags: [esg, climate-disclosure, csrd, advanced]

state: {}

trigger: |
  You're the Chief Sustainability Officer at a publicly
  traded manufacturing company ($3.2B revenue, NYSE
  listed, 12,000 employees, 8 manufacturing plants in
  5 countries). The Board has directed you to design a
  comprehensive ESG compliance program addressing:

  Regulatory requirements:
  - SEC Climate-Related Disclosure Rules (finalized):
    Scope 1 and 2 GHG emissions disclosure, climate-
    related risks in 10-K, governance disclosures,
    financial statement impacts
  - EU Corporate Sustainability Reporting Directive
    (CSRD): Double materiality assessment, ESRS
    standards, limited assurance (moving to reasonable
    assurance), value chain due diligence
  - California Climate Corporate Data Accountability
    Act (SB 253): Scope 1, 2, and 3 emissions reporting
    for companies with >$1B revenue doing business in CA

  Voluntary frameworks in use:
  - TCFD (Task Force on Climate-related Financial
    Disclosures): Currently publish TCFD-aligned report
  - GRI (Global Reporting Initiative): Used for annual
    sustainability report
  - CDP (Carbon Disclosure Project): Annual disclosure,
    currently rated B

  Current state:
  - Scope 1 emissions: Tracked at 6 of 8 plants; 2
    plants in developing countries have limited data
  - Scope 2 emissions: Partially tracked (location-based
    only, no market-based)
  - Scope 3 emissions: Not tracked (estimated to be 60%
    of total footprint)
  - Environmental data systems: Disparate spreadsheets
    at each plant; no centralized ESG data platform
  - Social metrics: Employee diversity data collected
    annually; supply chain labor practices not assessed
  - Governance: Board ESG committee exists but meets
    only twice per year; no ESG-linked executive
    compensation
  - Assurance: No third-party assurance on ESG data
  - Supply chain: 2,400 suppliers; no ESG due diligence
    program

  Task: Design a comprehensive ESG compliance program
  with specific checklists for data collection, reporting
  requirements mapping across all applicable frameworks,
  gap remediation, and a 2-year implementation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive ESG compliance program — maps requirements across SEC, CSRD/ESRS, SB 253, TCFD, GRI, and CDP; creates a unified disclosure calendar aligning all reporting deadlines; designs a data collection framework covering environmental (GHG Scope 1/2/3, energy, water, waste), social (workforce diversity, safety, supply chain labor, community impact), and governance (board oversight, executive compensation, ethics, lobbying) metrics; addresses the double materiality assessment required by CSRD; identifies which disclosures overlap across frameworks and which are unique; the program is comprehensive enough for a $3.2B public company."
    weight: 0.35
    description: "ComprehensiveESGProgram"
  - type: llm_judge
    criteria: "Response addresses the specific data and systems gaps — designs Scope 3 emissions estimation methodology (GHG Protocol Corporate Value Chain Standard, identifying material Scope 3 categories: purchased goods, transportation, employee commuting, product use); addresses the 2 plants lacking Scope 1 data (estimation methodology, data collection implementation); designs market-based Scope 2 calculation approach; creates a centralized ESG data platform strategy (requirements for data quality, audit trail, automated collection); addresses supply chain ESG due diligence for 2,400 suppliers (risk-based tiering, assessment methodology, monitoring); designs third-party assurance readiness program."
    weight: 0.35
    description: "DataAndSystemsGaps"
  - type: llm_judge
    criteria: "Response provides a realistic 2-year implementation roadmap — phases the work: Year 1 (double materiality assessment, data infrastructure, Scope 1/2 data quality improvement, Scope 3 baseline estimation, supply chain risk assessment, governance enhancements); Year 2 (assurance readiness, CSRD-compliant reporting, enhanced Scope 3 tracking, supply chain due diligence program, ESG-linked compensation design); estimates budget and resource requirements; addresses organizational structure (CSO team, plant-level data coordinators, supply chain ESG manager); creates Board reporting cadence and format; the roadmap is realistic for a manufacturing company transitioning from voluntary to mandatory ESG reporting."
    weight: 0.30
    description: "TwoYearRoadmap"
