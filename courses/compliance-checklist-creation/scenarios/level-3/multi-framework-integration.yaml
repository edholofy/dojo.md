meta:
  id: multi-framework-integration
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Design an integrated compliance checklist mapping controls across SOC 2, ISO 27001, HIPAA, and GDPR for a healthcare technology company"
  tags: [multi-framework, control-mapping, integration, advanced]

state: {}

trigger: |
  You're the VP of Compliance at a 500-person healthcare
  SaaS company ($65M ARR) that processes PHI for 200
  hospital clients in the US and is expanding to Europe.
  Currently, you maintain separate compliance programs
  for SOC 2 Type II and HIPAA. Now you need to add ISO
  27001 certification (required by EU hospital clients)
  and GDPR compliance. Your CEO is concerned about
  "compliance fatigue" — the compliance team of 6 people
  can't maintain 4 separate programs.

  Current state:
  - SOC 2 Type II: Certified for 3 years; audit in 4
    months; 112 controls documented
  - HIPAA: BAA program established; risk assessment
    conducted annually; 89 controls
  - ISO 27001: Not started; 93 Annex A controls needed
  - GDPR: Basic DPA template exists; no formal ROPA or
    DPIA process
  - Total unique controls if maintained separately:
    estimated 380+ (with significant overlap)
  - Compliance tools: Vanta for SOC 2; manual
    spreadsheets for HIPAA; nothing for ISO/GDPR
  - Audit burden: 4 separate audit cycles per year;
    estimated 2,800 hours of compliance team time

  The Board wants you to design an integrated compliance
  framework that reduces control duplication, streamlines
  evidence collection, and can be managed by the current
  6-person team.

  Task: Design an integrated multi-framework compliance
  checklist with a unified control matrix mapping
  overlapping requirements across SOC 2, ISO 27001,
  HIPAA, and GDPR, identifying common controls,
  framework-specific requirements, and an implementation
  strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a credible unified control matrix — maps overlapping controls across all 4 frameworks (access control: SOC 2 CC6.1 = ISO 27001 A.8.3/A.8.5 = HIPAA §164.312(a) = GDPR Art. 32; incident management: SOC 2 CC7.3-7.5 = ISO 27001 A.5.24-5.28 = HIPAA §164.308(a)(6) = GDPR Art. 33-34; risk assessment: SOC 2 CC3.1-3.4 = ISO 27001 Clause 6.1 = HIPAA §164.308(a)(1)(ii)(A) = GDPR Art. 35); identifies the percentage of controls that can be harmonized (typically 60-70% overlap); identifies framework-specific controls that cannot be mapped; the mapping is technically accurate."
    weight: 0.35
    description: "UnifiedControlMatrix"
  - type: llm_judge
    criteria: "Response reduces compliance burden practically — proposes a unified control catalog (estimated reduction from 380+ to 180-220 unique controls); designs a common evidence collection strategy (single evidence artifact satisfying multiple frameworks); creates a unified audit calendar (coordinating SOC 2, ISO 27001, and HIPAA assessments to share evidence and reduce redundancy); recommends a GRC platform strategy (consolidating from Vanta + spreadsheets to integrated platform); estimates the compliance team time savings; provides a practical approach that a 6-person team can actually execute."
    weight: 0.35
    description: "PracticalBurdenReduction"
  - type: llm_judge
    criteria: "Response provides an implementation strategy — phases the integration (Phase 1: control mapping and gap analysis; Phase 2: unified policy framework; Phase 3: evidence automation; Phase 4: ISO 27001 certification; Phase 5: GDPR formal compliance); addresses the 4-month SOC 2 audit timeline (ensure integration doesn't disrupt upcoming audit); identifies gaps between current HIPAA/SOC 2 coverage and ISO 27001/GDPR requirements; recommends organizational changes (roles, responsibilities, reporting); estimates budget for integration (tools, consulting, training); the strategy is realistic for a 500-person healthcare SaaS company."
    weight: 0.30
    description: "ImplementationStrategy"
