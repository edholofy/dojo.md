meta:
  id: ai-governance-compliance
  level: 3
  course: compliance-checklist-creation
  type: output
  description: "Design an AI governance and compliance program addressing the EU AI Act, NIST AI RMF, and emerging US state AI regulations for an enterprise deploying AI across multiple business functions"
  tags: [ai-governance, eu-ai-act, nist-ai-rmf, advanced]

state: {}

trigger: |
  You're the Chief AI Officer at a financial services
  company ($8.5B assets under management, 3,200 employees,
  operations in US and EU). The company has deployed AI/ML
  across multiple business functions and the Board has
  directed you to establish a comprehensive AI governance
  program. Current AI deployments:

  High-risk AI systems:
  - Credit scoring model: ML model used for consumer
    lending decisions (15,000 decisions/month); no
    documented bias testing; model developed by internal
    data science team with limited documentation
  - Anti-money laundering: AI-powered transaction
    monitoring processing $2.1B daily; vendor-provided
    "black box" model; limited explainability
  - Insurance underwriting: Automated risk assessment
    using alternative data sources (social media, IoT
    devices); no impact assessment conducted
  - HR talent screening: Resume screening AI used since
    2023; no adverse impact analysis; vendor claims
    "bias-free" without supporting evidence

  Regulatory landscape:
  - EU AI Act: Company serves EU clients; credit scoring
    and AML models likely classified as "high-risk AI
    systems" requiring conformity assessment
  - NIST AI Risk Management Framework: Board wants
    alignment with NIST AI RMF as baseline
  - Colorado AI Act (SB 24-205): Applies to insurance
    underwriting AI decisions; requires impact assessments
    and consumer notification
  - NYC Local Law 144: Applies to HR screening tool for
    NYC-based positions; requires annual bias audit
  - CFPB guidance on AI in lending: Adverse action notice
    requirements for AI-driven credit decisions
  - SEC examination priorities: AI/ML in investment
    advisory noted as examination focus area

  Current gaps:
  - No AI model inventory or registry
  - No model risk management framework (SR 11-7 gaps)
  - No algorithmic impact assessments conducted
  - No AI-specific incident response procedures
  - No human oversight protocols for automated decisions
  - Vendor AI contracts lack transparency requirements
  - No employee AI acceptable use policy
  - Training data governance not established

  Task: Design a comprehensive AI governance and compliance
  program with checklists covering AI model inventory and
  risk classification, regulatory compliance mapping across
  all applicable frameworks, bias testing and fairness
  protocols, transparency and explainability requirements,
  human oversight procedures, and vendor AI management.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive AI governance program — establishes an AI model inventory and risk classification framework (mapping each deployment to EU AI Act risk categories); creates a regulatory compliance matrix mapping requirements across EU AI Act, NIST AI RMF, Colorado AI Act, NYC LL144, CFPB guidance, and SEC priorities; designs bias testing and fairness protocols for each high-risk system (credit scoring, AML, insurance, HR); establishes transparency and explainability requirements differentiated by audience (regulators, consumers, internal stakeholders); creates human oversight procedures (human-in-the-loop vs human-on-the-loop based on risk); designs vendor AI due diligence and contract requirements; the program is comprehensive for a regulated financial services company."
    weight: 0.35
    description: "ComprehensiveAIGovernance"
  - type: llm_judge
    criteria: "Response addresses each AI system's specific compliance challenges — for credit scoring: ECOA/Reg B adverse action requirements with AI, fair lending testing methodology, model documentation per SR 11-7; for AML: vendor model validation requirements, explainability for SAR decisions, regulatory expectations for AI in BSA; for insurance underwriting: Colorado AI Act impact assessment methodology, alternative data fairness evaluation, actuarial justification; for HR screening: NYC LL144 bias audit requirements (selection rate, impact ratio by race/gender), published summary requirements, candidate notification; establishes AI-specific model risk management aligned with SR 11-7 and OCC 2011-12; addresses training data governance (data quality, representativeness, bias detection in training sets)."
    weight: 0.35
    description: "SystemSpecificCompliance"
  - type: llm_judge
    criteria: "Response provides a realistic implementation framework — phases implementation: Phase 1 (AI inventory, risk classification, governance structure, immediate compliance for NYC LL144 and Colorado requirements); Phase 2 (model documentation, bias testing programs, human oversight protocols, vendor assessment); Phase 3 (EU AI Act conformity preparation, ongoing monitoring, maturity assessment); designs organizational structure (AI ethics committee, model risk management function, roles and responsibilities); creates Board reporting framework for AI risk; estimates resource requirements (AI governance team, tools, external auditors); addresses change management and AI literacy training; the timeline accounts for regulatory deadlines (EU AI Act phased implementation, existing LL144 requirements)."
    weight: 0.30
    description: "ImplementationFramework"
