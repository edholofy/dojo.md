meta:
  id: privacy-program-maturity
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design a global privacy compliance program maturity model and implementation checklist addressing 15+ privacy laws across jurisdictions for a multinational technology company"
  tags: [privacy, gdpr, global-privacy, expert]

state: {}

trigger: |
  You're the Global Chief Privacy Officer at a
  multinational technology company ($6.2B revenue, 18,000
  employees, consumer and enterprise products, processing
  data from 800M users across 120 countries). The company
  is facing a privacy compliance crisis:

  Regulatory actions:
  - GDPR: Irish DPC investigation into cross-border data
    transfers (potential fine up to 4% global revenue);
    Belgian DPA €12M fine for cookie consent violations
  - CCPA/CPRA: California AG investigation into data
    broker activities and opt-out mechanism compliance
  - Brazil LGPD: ANPD audit notification for data
    processing of 45M Brazilian users
  - India DPDP Act: New law effective 2025; 200M Indian
    users; no compliance program in place
  - China PIPL: Cross-border data transfer assessment
    required; 85M Chinese users
  - Japan APPI: PPC inquiry into third-party data sharing
  - South Korea PIPA: Amendment compliance gap

  Privacy program gaps:
  - No unified global privacy framework — each region
    operates independently with inconsistent standards
  - Data mapping/ROPA: Partial for EU only; no global
    data inventory covering all processing activities
  - Cookie/tracking: 23 different consent management
    implementations across properties; 40% non-compliant
  - Data subject rights: Average response time 38 days
    (exceeds GDPR 30-day requirement); manual process;
    no automated DSR portal
  - Vendor management: 4,200 data processors; DPAs
    executed with only 60%; no ongoing monitoring
  - Data retention: No automated enforcement; estimated
    40% of stored data exceeds retention schedules
  - Privacy engineering: No privacy-by-design framework;
    DPIAs conducted reactively
  - International transfers: SCCs not updated to new EU
    standard; no Transfer Impact Assessments; reliance
    on Privacy Shield legacy (invalidated)
  - Breach notification: 3 breaches in past year with
    delayed notification (exceeded 72-hour GDPR window)
  - Children's privacy: COPPA compliance gaps in US;
    UK Age-Appropriate Design Code not addressed
  - Privacy team: 12 privacy professionals for 120
    countries; no embedded privacy champions

  Task: Design a comprehensive global privacy compliance
  program with a maturity model, unified control
  framework, jurisdiction-specific compliance checklists,
  technology strategy, organizational design, and 3-year
  roadmap to achieve measurable privacy program maturity.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive global privacy program — creates a unified privacy control framework mapping requirements across GDPR, CCPA/CPRA, LGPD, DPDP Act, PIPL, APPI, PIPA, and other applicable laws; designs a privacy program maturity model (levels 1-5 from ad hoc to optimized, with measurable criteria at each level); creates jurisdiction-specific compliance checklists identifying unique requirements (GDPR DPO appointment, PIPL government assessment for cross-border transfers, DPDP Act Data Fiduciary obligations, LGPD legal bases, CCPA data broker registration); addresses all identified gaps (data mapping, consent management, DSR automation, vendor management, data retention, privacy engineering, international transfers, breach notification, children's privacy); the program is comprehensive for an 800M user technology company."
    weight: 0.35
    description: "ComprehensiveGlobalPrivacy"
  - type: llm_judge
    criteria: "Response addresses specific privacy engineering and operational challenges — designs a global data mapping methodology covering all processing activities (automated discovery tools, business process interviews, data flow mapping); creates a unified consent management architecture (global consent preference center, jurisdiction-aware consent logic, cookie compliance remediation); designs an automated DSR fulfillment platform (identity verification, data retrieval across systems, right to deletion cascading to processors, response time SLA monitoring); addresses international data transfer mechanisms (updated SCCs, Transfer Impact Assessments, PIPL government assessments, adequacy decisions tracking, binding corporate rules consideration); designs privacy-by-design framework (DPIA triggers, privacy engineering standards, threat modeling); creates a vendor privacy management program (risk-based DPA requirements, ongoing monitoring, sub-processor management); addresses each pending regulatory action with specific remediation steps."
    weight: 0.35
    description: "PrivacyEngineeringOperational"
  - type: llm_judge
    criteria: "Response provides a realistic 3-year roadmap with organizational design — Year 1 (crisis stabilization: address pending enforcement actions, global data mapping, consent remediation, DSR automation, breach notification process redesign, updated SCCs/TIAs); Year 2 (program build: privacy-by-design integration, vendor management program, data retention automation, children's privacy compliance, India/China/Brazil program establishment, privacy champion network); Year 3 (maturity and optimization: continuous monitoring, privacy analytics, program effectiveness metrics, regulatory relationship management, privacy culture assessment); designs organizational structure (regional privacy leads, embedded privacy engineers, privacy champion network of 50-100 across business units); estimates budget ($15-25M over 3 years including technology, personnel, legal counsel); creates Board and executive reporting framework; the roadmap accounts for the urgency of pending enforcement actions while building sustainable program."
    weight: 0.30
    description: "ThreeYearRoadmap"
