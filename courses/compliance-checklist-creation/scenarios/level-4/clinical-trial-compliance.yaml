meta:
  id: clinical-trial-compliance
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design a global clinical trial compliance program for a pharmaceutical company managing multi-site, multi-country trials under FDA, EMA, and ICH-GCP requirements"
  tags: [clinical-trial, fda, ema, ich-gcp, expert]

state: {}

trigger: |
  You're the VP of Regulatory Compliance at a mid-size
  pharmaceutical company ($3.8B revenue, 9,500 employees)
  conducting 28 active clinical trials across 340 sites
  in 32 countries. You're designing a comprehensive
  clinical trial compliance program after an FDA
  inspection resulted in a Warning Letter and an EMA
  GCP inspection found critical findings.

  FDA Warning Letter (from Phase III oncology trial):
  - Failure to ensure proper informed consent (21 CFR
    50): 3 sites enrolled patients without IRB-approved
    consent forms; consent forms did not adequately
    describe risks identified in the Investigator's
    Brochure update
  - Failure to report serious adverse events timely
    (21 CFR 312.32): 12 SAEs reported to FDA beyond
    15-calendar-day requirement; 3 unexpected fatal SAEs
    reported beyond 7-day requirement
  - Inadequate monitoring of clinical investigators
    (21 CFR 312.56): Sponsor monitoring visits at 8 sites
    were >6 months overdue; source document verification
    conducted on <10% of data points vs. protocol-
    specified 20%
  - Data integrity concerns (21 CFR 11): eClinical system
    audit trail gaps; data corrections made without
    documented rationale; 2 sites using paper source
    documents with no data verification plan

  EMA GCP Inspection critical findings:
  - Inadequate investigator oversight by sponsor across
    EU sites
  - IMP (Investigational Medicinal Product) accountability
    deficiencies at 5 sites
  - Protocol deviations not reported or assessed per SOPs
  - TMF (Trial Master File) incomplete; essential
    documents missing for 15% of sites

  Current state:
  - CRO management: 4 CROs managing different trials;
    inconsistent oversight and quality metrics
  - CTMS: Clinical Trial Management System outdated;
    monitoring visit scheduling manual
  - Safety database: SAE processing workflow has 3-day
    average internal processing time before regulatory
    reporting clock starts
  - EDC systems: 3 different electronic data capture
    platforms across trials
  - TMF: Hybrid paper/electronic TMF; no eTMF platform
  - Quality management: No centralized CAPA system for
    clinical operations; quality events tracked in
    spreadsheets
  - Training: No standardized GCP training curriculum;
    site training documentation inconsistent

  Task: Design a comprehensive clinical trial compliance
  program with checklists for GCP compliance across all
  active trials, FDA/EMA inspection readiness, CRO
  oversight, safety reporting, data integrity, TMF
  management, and a remediation plan addressing all
  Warning Letter and inspection findings.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive clinical trial compliance program — addresses FDA (21 CFR 50, 312, Part 11) and EMA/ICH-GCP (E6(R2)) requirements; creates detailed remediation plans for each Warning Letter observation and EMA finding; designs an informed consent compliance framework (consent form version control, IRB/EC approval tracking, consent monitoring, IB update communication); creates a safety reporting compliance program (SAE processing workflow redesign, expedited reporting timelines, SUSAR identification, DSMC interaction); designs a monitoring oversight program (risk-based monitoring per ICH E6(R2) addendum, centralized statistical monitoring, KRI dashboards); addresses data integrity (21 CFR Part 11 compliance, audit trail requirements, source document verification plans, EDC validation); designs TMF completeness program (DIA TMF Reference Model alignment); the program covers all 28 trials across 340 sites in 32 countries."
    weight: 0.35
    description: "ComprehensiveClinicalTrialCompliance"
  - type: llm_judge
    criteria: "Response addresses operational and quality management challenges — designs a CRO oversight framework (quality agreements, KPI-based performance monitoring, escalation procedures, CRO audit program, joint quality governance); creates a centralized quality management system for clinical operations (CAPA system, deviation management, quality event classification, trend analysis); addresses multi-country regulatory requirements (country-specific consent requirements, local regulatory authority reporting, IMP import/accountability procedures, ethics committee variations); designs a clinical systems strategy (CTMS modernization, eTMF implementation, EDC platform rationalization, safety database optimization); creates an inspection readiness program (standing inspection team, site inspection preparation, back room procedures, investigator coaching without coaching — FDA prohibited practices); addresses training program redesign (role-based GCP training, investigator training documentation, sponsor staff competency)."
    weight: 0.35
    description: "OperationalQualityManagement"
  - type: llm_judge
    criteria: "Response provides a realistic remediation timeline and sustainability plan — creates a phased remediation plan: Immediate (30 days: SAE reporting process fix, informed consent remediation at affected sites, FDA Warning Letter response); Short-term (90 days: monitoring visit backlog resolution, TMF remediation, CAPA system implementation); Medium-term (6 months: CRO oversight framework, eTMF deployment, risk-based monitoring implementation, training program rollout); Long-term (12 months: systems integration, quality culture program, continuous improvement metrics); estimates resource requirements (additional monitors, quality assurance staff, systems investment); designs FDA regulatory commitment tracking (ensuring all Warning Letter commitments are met and documented); creates Board/executive reporting framework for clinical compliance; the timeline accounts for ongoing trial operations and patient safety priorities."
    weight: 0.30
    description: "RemediationTimeline"
