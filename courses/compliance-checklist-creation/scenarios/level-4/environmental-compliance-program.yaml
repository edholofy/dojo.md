meta:
  id: environmental-compliance-program
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design a comprehensive environmental compliance management system for a chemical manufacturer facing EPA enforcement action and expanding regulatory requirements"
  tags: [environmental, epa, rcra, clean-air, expert]

state: {}

trigger: |
  You're the VP of Environmental Health and Safety at a
  specialty chemical manufacturer ($2.6B revenue, 5,800
  employees, 14 manufacturing facilities across 8 US
  states and 3 international locations). The company is
  under a Consent Decree with EPA and the Department of
  Justice following a multi-media enforcement action.

  Consent Decree requirements:
  - $42M civil penalty
  - Supplemental Environmental Project ($8M)
  - 5-year compliance period with quarterly reporting
  - Independent environmental auditor appointed
  - Environmental Management System (EMS) implementation
    required within 18 months

  Enforcement findings:
  - Clean Air Act: 6 facilities operating without
    required Title V permits or with expired permits;
    MACT/NESHAP compliance deficiencies for HAP
    emissions; fugitive emissions monitoring program
    (LDAR) not implemented at 3 facilities; emission
    calculations using outdated emission factors
  - RCRA: Hazardous waste storage exceeding 90-day
    accumulation limits at 4 facilities; incomplete waste
    characterization for 12 waste streams; land disposal
    restriction (LDR) notifications missing; 3 corrective
    action sites with contamination migration beyond
    facility boundaries
  - Clean Water Act: NPDES permit exceedances at 2
    facilities (pH, BOD, TSS); stormwater pollution
    prevention plans outdated; spill prevention controls
    not maintained
  - EPCRA/Tier II: TRI reporting errors identified for
    3 reporting years; Tier II chemical inventory
    reports incomplete; Risk Management Plans (RMP)
    not updated after process changes
  - TSCA: New chemical notification requirements not met
    for 4 chemical substances; TSCA Section 8(e)
    substantial risk information not reported

  Current state:
  - No centralized EMS — each facility manages
    environmental compliance independently
  - 14 different compliance tracking systems (mostly
    spreadsheets)
  - No standardized audit program; 3 facilities have
    never been internally audited
  - Permit management: No centralized permit tracking;
    multiple expired permits discovered during
    enforcement
  - Environmental data management: Emissions calculations
    performed manually; no continuous emissions monitoring
    data validation
  - Environmental staffing: 22 total EHS staff across 14
    facilities; 5 facilities have no dedicated
    environmental professional
  - Training: No standardized environmental compliance
    training curriculum
  - Corrective action sites: 3 RCRA corrective action
    sites with ongoing groundwater monitoring; remediation
    costs estimated at $35M over 10 years

  Task: Design a comprehensive Environmental Management
  System and compliance program with checklists for
  air emissions compliance, hazardous waste management,
  water discharge compliance, chemical reporting, permit
  management, audit program, corrective action oversight,
  and Consent Decree compliance tracking.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive Environmental Management System — creates an ISO 14001-aligned EMS framework covering all 14 facilities; designs media-specific compliance programs for each finding area (Clean Air Act: Title V permit applications/renewals, MACT/NESHAP compliance strategy, LDAR program design, emission calculation methodology update; RCRA: 90-day accumulation area management, waste characterization program, LDR compliance, corrective action management; Clean Water Act: NPDES permit compliance monitoring, stormwater pollution prevention plan updates, SPCC plan maintenance; EPCRA: TRI reporting procedures, Tier II inventory management, RMP updates; TSCA: new chemical review process, Section 8(e) reporting protocol); creates a centralized permit management system; the EMS is comprehensive enough to satisfy the Consent Decree requirement."
    weight: 0.35
    description: "ComprehensiveEMS"
  - type: llm_judge
    criteria: "Response addresses operational and technical compliance challenges — designs emission calculation methodology (updated emission factors, continuous emissions monitoring data quality assurance, stack testing schedules, fugitive emissions estimation); creates a hazardous waste management program (waste characterization decision tree, satellite accumulation area inspections, manifest tracking, transporter and TSDF qualification, land ban notifications); designs water discharge compliance monitoring program (sampling protocols, analytical method validation, DMR preparation, benchmark monitoring for stormwater); creates an environmental data management strategy (centralized platform requirements, automated calculations, data validation workflows, regulatory reporting automation); designs an environmental audit program (risk-based audit schedule, standardized audit protocols, finding classification and tracking); addresses corrective action site management (groundwater monitoring program oversight, remediation progress tracking, cost estimation and financial assurance)."
    weight: 0.35
    description: "TechnicalCompliancePrograms"
  - type: llm_judge
    criteria: "Response provides a realistic 18-month EMS implementation timeline — phases implementation aligned with Consent Decree requirements: Phase 1 (months 1-4: gap assessment across all facilities, immediate compliance corrections, expired permit applications, environmental staffing plan, Consent Decree reporting procedures); Phase 2 (months 5-10: EMS policy and procedure development, centralized data management deployment, LDAR program implementation, audit program launch, training curriculum rollout); Phase 3 (months 11-15: EMS implementation at all facilities, internal audit cycle, management review process, corrective action program); Phase 4 (months 16-18: EMS verification, independent auditor initial assessment, continuous improvement program, Consent Decree milestone completion); estimates budget (environmental staff additions, technology, consulting, remediation); designs governance structure (corporate EHS committee, facility environmental coordinators, management review cadence); creates quarterly Consent Decree reporting framework; the timeline is realistic for a 14-facility chemical manufacturer."
    weight: 0.30
    description: "EighteenMonthTimeline"
