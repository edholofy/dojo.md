meta:
  id: enterprise-compliance-architecture
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design an enterprise-wide compliance management architecture for a Fortune 500 conglomerate operating across highly regulated industries"
  tags: [enterprise, compliance-architecture, multi-industry, expert]

state: {}

trigger: |
  You're the Group Chief Compliance Officer at a Fortune
  500 conglomerate ($28B revenue, 85,000 employees, 42
  countries) with four operating divisions:

  Division profiles:
  1. Financial Services ($9.2B): Banking, insurance, and
     asset management — subject to OCC, FDIC, SEC, FINRA,
     state insurance regulators, and international
     financial regulators (FCA, BaFin, MAS)
  2. Healthcare ($7.8B): Medical devices, hospital
     management, and digital health — subject to FDA,
     CMS, HIPAA, EU MDR, state health departments
  3. Defense/Aerospace ($6.4B): Military components and
     satellite systems — subject to ITAR, EAR, DFARS,
     CMMC, DoD Inspector General, NATO security
  4. Technology ($4.6B): Enterprise SaaS and data
     analytics — subject to SOC 2, GDPR, CCPA, sector-
     specific data regulations, AI governance frameworks

  Current compliance state:
  - 23 separate compliance teams across divisions with
    no standardized methodology or shared infrastructure
  - $142M annual compliance spend (estimated 35%
    redundant across divisions)
  - 4 different GRC platforms (Archer, ServiceNow,
    OneTrust, custom-built)
  - 380+ regulatory examinations and audits annually
  - 12 open consent orders/enforcement actions across
    divisions
  - 6 separate whistleblower/ethics hotlines
  - No enterprise-wide compliance risk assessment
  - Board Audit Committee receives fragmented compliance
    reporting from each division separately
  - Recent DOJ investigation in Healthcare division
    (False Claims Act) revealed compliance program
    deficiencies that could affect corporate-wide
    DOJ evaluation under the Evaluation of Corporate
    Compliance Programs guidance

  The CEO and Board have directed you to design an
  integrated enterprise compliance architecture that
  maintains division-specific regulatory expertise while
  creating shared infrastructure, standardized processes,
  and unified reporting — with a mandate to reduce
  compliance costs by 20% within 3 years.

  Task: Design a comprehensive enterprise compliance
  management architecture with checklists for operating
  model design, technology consolidation, standardized
  compliance processes, regulatory relationship
  management, enterprise risk assessment methodology,
  Board reporting framework, and the DOJ compliance
  program evaluation readiness.

assertions:
  - type: llm_judge
    criteria: "Response designs a credible enterprise compliance architecture — creates a federated compliance operating model (Group CCO with division compliance heads, shared services center of excellence, matrix reporting to both division presidents and Group CCO); designs standardized core compliance processes applicable across all divisions (risk assessment methodology, policy management lifecycle, training and awareness, monitoring and testing, issue management and escalation, regulatory change management); identifies division-specific compliance functions that must remain specialized (FDA submission expertise, ITAR security, financial regulation, etc.); creates a technology consolidation strategy (from 4 GRC platforms to unified architecture); designs an enterprise-wide compliance risk assessment integrating all regulatory domains; the architecture is appropriate for a $28B multi-industry conglomerate."
    weight: 0.35
    description: "EnterpriseComplianceArchitecture"
  - type: llm_judge
    criteria: "Response addresses cross-divisional compliance synergies and conflicts — identifies shared regulatory themes across divisions (data privacy, anti-corruption/FCPA, sanctions/export controls, ESG, cybersecurity, whistleblower programs); addresses information barriers between divisions (defense classified information vs. financial regulatory requirements); designs a unified third-party risk management program spanning all divisions; creates a consolidated ethics and whistleblower program; addresses the DOJ Evaluation of Corporate Compliance Programs criteria (commitment by senior management, autonomy and resources, policies and procedures, risk assessment, training, confidential reporting and investigation, third-party management, mergers and acquisitions, monitoring and testing, analysis and remediation); designs metrics to demonstrate the 20% cost reduction while maintaining or improving compliance effectiveness."
    weight: 0.35
    description: "CrossDivisionalSynergies"
  - type: llm_judge
    criteria: "Response provides a realistic transformation roadmap — phases the 3-year transformation: Year 1 (operating model design, Group CCO team build-out, enterprise risk assessment, technology assessment, quick wins for cost reduction, DOJ compliance program remediation); Year 2 (GRC platform consolidation, process standardization rollout, shared services launch, training program redesign, regulatory relationship management framework); Year 3 (full integration, advanced analytics, continuous monitoring, cost reduction targets achieved, maturity assessment); estimates budget for transformation (technology, personnel, change management) offset by projected savings; addresses change management challenges (division resistance, cultural integration, talent retention); creates Board reporting framework with enterprise-wide compliance dashboard; the transformation plan is realistic for a Fortune 500 organization."
    weight: 0.30
    description: "TransformationRoadmap"
