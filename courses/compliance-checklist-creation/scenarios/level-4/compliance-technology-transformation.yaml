meta:
  id: compliance-technology-transformation
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design a compliance technology transformation program including GRC platform selection, automation strategy, and AI-powered compliance monitoring for a large financial institution"
  tags: [regtech, grc, compliance-technology, expert]

state: {}

trigger: |
  You're the Chief Compliance Technology Officer at a
  large financial institution ($180B AUM, 12,000
  employees, full-service broker-dealer, registered
  investment adviser, and insurance operations). The
  Board has approved a $45M, 3-year compliance technology
  transformation program after regulatory examinations
  identified pervasive compliance monitoring deficiencies.

  Current compliance technology landscape:
  - 37 separate compliance applications across business
    lines (many legacy, some end-of-life)
  - Trade surveillance: 3 different systems for equities,
    fixed income, and derivatives; 85% false positive
    rate; 2,400 alerts/day with 18 analysts
  - Communications surveillance: Email archiving only;
    no monitoring of Bloomberg chat, Teams, WhatsApp,
    or voice; recent SEC examination cited deficiency
  - KYC/AML: Manual CDD process averaging 14 days for
    new account opening; no ongoing customer risk
    reassessment; PEP screening only at onboarding
  - Regulatory change management: Manual tracking via
    email; no impact assessment methodology; 3 regulatory
    changes missed in past year causing violations
  - Policy management: 420 policies in shared drive with
    no version control; 35% outdated; no attestation
    tracking
  - Compliance testing: Manual sample-based testing;
    results tracked in spreadsheets; no risk-based test
    plan methodology
  - Regulatory reporting: 180+ regulatory filings per
    year across 12 regulators; multiple near-misses on
    filing deadlines; no automated data aggregation
  - Whistleblower/ethics: Phone hotline only; no case
    management system; investigation files in paper
    folders
  - Training: Annual compliance training via LMS; no
    role-specific training; completion tracking manual

  Regulatory expectations:
  - SEC: Expects modernized surveillance capabilities
    including off-channel communications monitoring
  - FINRA: Examination findings on trade surveillance
    gaps and supervisory control deficiencies
  - State insurance regulators: Market conduct examination
    cited inadequate suitability monitoring
  - DOL: Fiduciary rule compliance monitoring insufficient

  Task: Design a comprehensive compliance technology
  transformation program with checklists for GRC platform
  selection, trade and communications surveillance
  modernization, RegTech implementation, AI/ML compliance
  monitoring strategy, data architecture, vendor
  evaluation framework, change management, and a 3-year
  implementation roadmap with measurable outcomes.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive compliance technology transformation — creates a target-state compliance technology architecture covering all major domains (trade surveillance, communications surveillance, KYC/AML, regulatory change management, policy management, compliance testing, regulatory reporting, whistleblower/case management, training); designs a GRC platform selection methodology (requirements definition, vendor evaluation criteria, RFP process, proof-of-concept approach, integration architecture); creates an AI/ML compliance monitoring strategy (supervised learning for alert tuning, NLP for communications surveillance, anomaly detection for trading patterns, model validation and governance); addresses data architecture (compliance data lake, data quality framework, cross-system data integration, regulatory reporting data aggregation); the architecture consolidates 37 systems into a rationalized technology stack."
    weight: 0.35
    description: "ComprehensiveTechTransformation"
  - type: llm_judge
    criteria: "Response addresses specific surveillance and monitoring challenges — for trade surveillance: designs unified surveillance platform requirements (cross-asset class coverage, custom alert logic, ML-based false positive reduction targeting <30% false positive rate, market manipulation patterns, insider trading indicators); for communications surveillance: designs omni-channel monitoring (email, chat, voice, social media, personal device policies, off-channel communications detection per SEC marketing rule); for KYC/AML: designs automated CDD workflow (digital identity verification, risk scoring, ongoing monitoring, adverse media screening, beneficial ownership verification); addresses regulatory change management automation (regulatory feed integration, impact assessment workflow, control mapping, implementation tracking); designs automated regulatory reporting (data aggregation, filing calendar management, quality checks, submission tracking); creates compliance testing automation strategy (continuous monitoring vs periodic testing, automated control testing, exception-based reviews); each solution includes specific vendor landscape analysis or build-vs-buy considerations."
    weight: 0.35
    description: "SurveillanceAndMonitoring"
  - type: llm_judge
    criteria: "Response provides a realistic 3-year roadmap with ROI framework — Year 1 (foundation: GRC platform selection and initial deployment, communications surveillance expansion, KYC automation pilot, data architecture design, quick wins for regulatory examination findings); Year 2 (build: trade surveillance unification, AI/ML models development and validation, regulatory change management automation, policy management digitization, compliance testing automation, regulatory reporting automation); Year 3 (optimize: advanced analytics deployment, continuous monitoring capabilities, program effectiveness measurement, AI model maturity, full platform integration); estimates ROI (analyst productivity gains, false positive reduction, faster account opening, filing accuracy improvement, reduced regulatory findings); addresses change management (user adoption strategy, training, organizational design changes, compliance team upskilling); creates governance framework for technology program (steering committee, workstream leads, vendor management); the $45M budget allocation across years and workstreams is realistic for a financial institution of this size."
    weight: 0.30
    description: "ThreeYearRoadmapWithROI"
