meta:
  id: expert-compliance-shift
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Handle an expert-level compliance day involving a congressional investigation, cross-border regulatory crisis, and compliance program credibility challenge requiring strategic decision-making"
  tags: [multi-crisis, strategic, expert-shift, expert]

state: {}

trigger: |
  You're the Group Chief Compliance Officer at a
  multinational pharmaceutical and medical device company
  ($18B revenue, 52,000 employees, products sold in 90
  countries). You're facing four simultaneous compliance
  crises that threaten the company's operating licenses,
  market access, and corporate reputation.

  Crisis 1 — Congressional Investigation:
  The US Senate Finance Committee has launched an
  investigation into the company's drug pricing practices
  and physician payment relationships. You've received a
  document preservation notice and a request for
  production of 5 years of records covering:
  - All physician speaker programs and consulting
    arrangements (4,200 HCPs under contract)
  - Internal pricing committee deliberations for top 15
    drugs by revenue ($8.2B combined)
  - Sunshine Act (Open Payments) reporting accuracy
  - Patient assistance program design and administration
  - Copay coupon program structure and PBM relationships
  The committee's letter references a whistleblower
  complaint from a former sales director. Your
  preliminary review suggests some speaker programs may
  have lacked legitimate business purpose and served
  primarily as inducements for prescribing.

  Crisis 2 — EU Regulatory Action:
  The European Commission has notified the company of
  formal proceedings under the EU's new pharmaceutical
  legislation and competition law:
  - Potential abuse of dominant position through "pay for
    delay" patent settlement agreements (Article 102
    TFEU)
  - Evergreening strategy for key biologic (questionable
    patent extensions)
  - Risk Sharing Agreements with 8 EU member states
    found to contain non-transparent pricing provisions
  - Parallel import restrictions through supply quota
    manipulation in 3 countries
  Potential fine: up to 10% EU revenue ($1.8B)

  Crisis 3 — Manufacturing Compliance Emergency:
  FDA has issued an Import Alert (Red List) on your
  Indian manufacturing facility (largest API production
  site, supplying 40% of US product volume):
  - Data integrity fraud discovered — plant employees
    created "shadow" testing systems to generate
    compliant results
  - 14 products affected; 3 under consideration for
    mandatory recall
  - Patient safety implications for products already in
    distribution
  - Supply chain disruption: 60-day estimated stockout
    for 8 products if facility remains on Import Alert
  - Qualified Person at EU site has raised concerns about
    API quality from the same facility affecting EU batch
    releases

  Crisis 4 — Internal Compliance Program Challenge:
  The company's DOJ-appointed independent monitor (from a
  prior False Claims Act settlement) has issued a
  preliminary report finding that:
  - The company's compliance program remains "inadequate"
    (17 of 25 benchmarks rated "needs improvement")
  - Speaker program controls identified as deficient
    "mirror the same issues raised in the congressional
    investigation"
  - Monitor recommends extending the monitorship by 2
    years and expanding scope
  - Board members privately expressing loss of confidence
    in compliance leadership

  Task: Create comprehensive compliance checklists for
  managing all four crises, including strategic
  prioritization framework, cross-crisis legal and
  compliance coordination, Board communication strategy,
  regulatory engagement approach for each crisis, and
  organizational resilience planning.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive checklists for all four crises with strategic coordination — for congressional investigation: document preservation plan, privilege review protocol, production timeline, congressional testimony preparation, proactive remediation of speaker programs; for EU proceedings: competition law defense strategy, pharmaceutical regulatory engagement, settlement vs litigation analysis; for manufacturing emergency: patient safety assessment, recall decision framework, supply continuity plan, facility remediation, regulatory engagement with FDA and EU authorities; for monitor challenge: compliance program enhancement plan, Board confidence restoration, monitorship scope management; identifies cross-crisis connections (speaker programs appear in both congressional inquiry and monitor findings; manufacturing crisis affects both FDA and EU regulators; compliance program adequacy is questioned across all crises); the strategic framework prioritizes patient safety and legal exposure."
    weight: 0.35
    description: "ComprehensiveFourCrisisManagement"
  - type: llm_judge
    criteria: "Response demonstrates expert-level strategic compliance judgment — addresses privilege and confidentiality across crises (congressional production vs DOJ monitor access vs EU regulatory disclosure, potential waiver implications); evaluates whether manufacturing data integrity findings trigger additional disclosure obligations (SEC materiality analysis, 10-K risk factor updates, Sunshine Act corrections, FDA field alert reports); addresses potential personal liability for executives and Board members; evaluates voluntary self-disclosure strategy (DOJ for potential FCA violations from speaker programs, FDA for data integrity); designs a regulatory triage that considers which agencies can share information; addresses the intersection of the whistleblower complaint with monitor findings; evaluates whether any crisis requires public disclosure (press release, 8-K filing); the strategic analysis demonstrates understanding of how regulatory proceedings interact and compound."
    weight: 0.35
    description: "StrategicComplianceJudgment"
  - type: llm_judge
    criteria: "Response provides a realistic governance and communication framework — designs crisis governance structure (crisis management committee, legal coordination across jurisdictions, external counsel strategy for each workstream); creates a Board communication plan (emergency Board meeting agenda, ongoing reporting cadence, risk matrix with financial exposure estimates, decision points requiring Board approval); designs external communications strategy (investor relations, media, employee communications, customer/patient communications for recall scenario); creates a resource allocation plan (internal team assignments, external counsel and consultant engagement, budget authorization); addresses organizational resilience (ensuring business continuity during multi-front crisis, employee morale, talent retention); creates a timeline showing parallel workstreams and decision points across all four crises; the governance framework is realistic for a $18B pharmaceutical company facing existential compliance challenges."
    weight: 0.30
    description: "GovernanceAndCommunication"
