meta:
  id: compliance-culture-assessment
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design a comprehensive compliance culture assessment and transformation program for an organization recovering from a major compliance failure"
  tags: [compliance-culture, ethics, organizational-design, expert]

state: {}

trigger: |
  You're the newly appointed Chief Ethics and Compliance
  Officer at a major automotive manufacturer ($42B
  revenue, 110,000 employees globally, 48 manufacturing
  plants in 18 countries). You were hired following a
  massive emissions cheating scandal that resulted in
  $14.7B in criminal and civil penalties, executive
  criminal convictions, and appointment of an independent
  compliance monitor for 3 years.

  The independent monitor's initial culture assessment
  found:
  - "Culture of fear" — employees afraid to raise
    concerns; 78% of surveyed employees said raising
    compliance concerns would negatively impact their
    careers
  - Middle management actively suppressed bad news;
    compliance concerns were viewed as "business
    obstacles"
  - Engineering culture prioritized "making it work" over
    regulatory compliance; emission testing treated as a
    target to beat rather than a regulatory requirement
  - Compliance function was understaffed (1 compliance
    officer per 4,400 employees) and had no authority to
    stop non-compliant products from reaching market
  - Executive compensation had no compliance/ethics
    component; 100% based on financial performance
  - Whistleblower hotline received 12 reports in prior
    year (benchmarked companies of similar size receive
    400-600); reports that were received had average
    closure time of 280 days
  - Third-party code of conduct compliance: not assessed
  - Board received compliance reporting annually in a
    single slide within legal department update
  - No speak-up protection policy; 3 employees who
    raised concerns were transferred to less desirable
    roles
  - Ethics training: 30-minute annual online video with
    no assessment or discussion

  Monitor requires:
  - Comprehensive compliance culture assessment
    methodology
  - Culture transformation plan with measurable outcomes
  - Quarterly progress metrics reported to monitor
  - Independent speak-up mechanism redesign
  - Compliance governance restructuring

  Task: Design a comprehensive compliance culture
  assessment and transformation program with checklists
  for culture measurement methodology, organizational
  governance redesign, speak-up program design,
  compliance training redesign, incentive structure
  reform, middle management accountability framework,
  and measurable culture transformation metrics — all
  designed to satisfy the independent monitor and prevent
  recurrence of systemic compliance failures.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive compliance culture assessment and transformation program — creates a multi-dimensional culture assessment methodology (anonymous surveys, focus groups, behavioral observation, compliance incident analysis, hotline data analytics, exit interview analysis, tone-at-the-top evaluation, middle management assessment); designs organizational governance restructuring (CCO reporting line directly to Board audit/compliance committee, compliance authority to stop products/transactions, compliance budget independence, staffing model targeting appropriate ratio); creates a comprehensive speak-up program (multiple reporting channels, anti-retaliation policy with teeth, investigation SOP with 60-day closure target, whistleblower protection, independent investigation capability); addresses compliance training transformation (interactive scenario-based training, role-specific modules, dilemma discussions, leader-led sessions); the program addresses the root causes of the emissions scandal."
    weight: 0.35
    description: "ComprehensiveCultureTransformation"
  - type: llm_judge
    criteria: "Response addresses the specific cultural dysfunction factors — designs a middle management accountability framework (compliance KPIs in performance reviews, 360-degree feedback on ethical leadership, consequences for suppressing concerns, promotion criteria including compliance behavior); creates incentive structure reform (compliance/ethics component in executive compensation at meaningful weight, clawback provisions for compliance failures, balanced scorecard approach); addresses the engineering culture transformation (compliance integration into product development lifecycle, regulatory compliance treated as design requirement not obstacle, quality gates with compliance checkpoints); designs a program to address the 'fear factor' (leadership commitment actions not just words, visible consequences for retaliation, celebrate speak-up success stories, psychological safety training); creates a third-party compliance program (supplier code of conduct, monitoring, capacity building); addresses Board-level compliance governance (dedicated compliance committee, meeting frequency, information flow, director training)."
    weight: 0.35
    description: "CulturalDysfunctionRemediation"
  - type: llm_judge
    criteria: "Response provides measurable culture metrics and realistic timeline — defines specific culture metrics with baseline and target values (speak-up reports per 1,000 employees, fear of retaliation percentage, investigation closure time, compliance training effectiveness scores, employee engagement on ethics questions, middle management compliance behavior scores, retaliation incidents); creates a culture measurement cadence (annual comprehensive assessment, quarterly pulse surveys, continuous monitoring of leading indicators); designs a phased transformation: Year 1 (assessment, governance restructuring, speak-up redesign, tone-at-the-top campaign, immediate training redesign); Year 2 (middle management program, incentive restructuring, engineering culture integration, supplier program); Year 3 (sustainability, advanced metrics, monitor satisfaction, culture embedding); estimates resource requirements ($50-80M transformation budget for a company of this size); creates quarterly monitor reporting framework; the transformation plan is realistic for a 110,000-person global manufacturer."
    weight: 0.30
    description: "MetricsAndTimeline"
