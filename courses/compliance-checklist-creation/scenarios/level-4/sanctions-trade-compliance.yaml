meta:
  id: sanctions-trade-compliance
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design a global sanctions and trade compliance program for a multinational company navigating complex sanctions regimes, export controls, and anti-boycott requirements"
  tags: [sanctions, export-controls, ofac, trade-compliance, expert]

state: {}

trigger: |
  You're the Global Head of Trade Compliance at a
  multinational industrial equipment manufacturer ($9.4B
  revenue, 32,000 employees, manufacturing in 12
  countries, sales in 85 countries). The company
  manufactures precision industrial equipment including
  items controlled under the Export Administration
  Regulations (EAR) and some items on the Commerce
  Control List (CCL) requiring export licenses.

  Triggering events:
  - OFAC has issued a pre-penalty notice for $18.5M
    alleging 47 apparent violations of the Russia/Belarus
    sanctions programs — equipment and spare parts shipped
    to Russian end-users through intermediaries in Turkey,
    UAE, and Kazakhstan (sanctions evasion through
    transshipment)
  - BIS has opened an investigation into potential EAR
    violations related to unlicensed exports of controlled
    items to China (Entity List end-users)
  - A routine compliance audit discovered 23 transactions
    with parties later designated on the SDN List (between
    initial order and delivery dates)
  - EU has notified the company of potential violations
    of the EU Russia sanctions (Regulation 833/2014) at
    the German subsidiary

  Current compliance state:
  - Screening: Automated screening against OFAC SDN/SSI
    lists only; no screening against BIS Entity List,
    UN sanctions, EU consolidated list, or UK sanctions
  - Export controls: No systematic ECCN classification
    of products; export licenses obtained reactively;
    no deemed export program for foreign national
    employees
  - End-use monitoring: No post-shipment verification;
    no end-use/end-user certificates required
  - Transshipment risk: No enhanced due diligence for
    orders to transshipment-risk countries despite 15%
    of revenue from Turkey, UAE, Singapore, and Malaysia
  - Anti-boycott: No program to identify and report
    boycott requests per EAR Part 760 and IRS requirements
  - Intracompany transfers: No controls on technology
    transfers between subsidiaries in different countries
  - Training: Annual online training in English only;
    no role-specific training for sales, logistics, or
    engineering
  - Voluntary self-disclosure: Company has not filed VSD
    with OFAC or BIS for the discovered violations

  Task: Design a comprehensive global sanctions and trade
  compliance program with checklists for sanctions
  screening, export classification, license management,
  transshipment risk mitigation, end-use monitoring,
  anti-boycott compliance, voluntary self-disclosure
  strategy, and ongoing compliance monitoring.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive global trade compliance program — covers all major sanctions regimes (OFAC, EU, UK, UN, country-specific) with screening against all relevant lists; designs export control classification program (ECCN determination for all products, EAR99 documentation, license exception eligibility analysis, deemed export controls for foreign national employees); creates end-use/end-user due diligence framework (red flag indicators, end-use certificates, post-shipment verification for high-risk destinations); designs anti-boycott compliance procedures (identification, reporting to BIS and IRS, contract clause review); addresses intracompany technology transfer controls between subsidiaries; creates a sanctions evasion detection program specifically addressing transshipment risk through intermediary countries; the program covers sales in 85 countries with manufacturing in 12 countries."
    weight: 0.35
    description: "ComprehensiveTradeCompliance"
  - type: llm_judge
    criteria: "Response addresses the specific enforcement actions with strategic remediation — designs OFAC voluntary self-disclosure strategy (Initial VSD filing, comprehensive internal investigation methodology, transaction-level analysis of the 47 apparent violations, penalty mitigation factors under OFAC Enforcement Guidelines); addresses BIS VSD strategy for Entity List violations (evaluating VSD under BIS guidelines, penalty calculation factors); designs remediation for the transshipment evasion scheme (enhanced KYC for intermediary countries, end-user verification, re-export/transfer controls); addresses EU sanctions violations at German subsidiary (coordination with EU member state authorities, potential EU blocking statute implications); designs an internal investigation framework (document preservation, forensic transaction analysis, interview protocols, privilege considerations); addresses the 23 transactions with subsequently designated parties (temporal analysis, retroactive screening, going-forward screening frequency); the enforcement response strategy is legally sophisticated."
    weight: 0.35
    description: "EnforcementResponse"
  - type: llm_judge
    criteria: "Response provides a realistic implementation plan with technology and organizational design — phases implementation: Immediate (30 days: stop-ship analysis for high-risk transactions, VSD filings, enhanced manual screening); Short-term (90 days: comprehensive sanctions screening platform deployment covering all lists, ECCN classification project initiation, transshipment risk country enhanced due diligence); Medium-term (6 months: full product classification, license management system, deemed export program, anti-boycott training, end-use monitoring program); Long-term (12 months: advanced analytics for sanctions evasion detection, intracompany transfer controls, compliance culture program, program effectiveness testing); designs organizational structure (Global Head of Trade Compliance, regional trade compliance officers, product classification specialists, screening operations team); estimates technology investment (screening platform, license management, training); creates Board reporting framework; the plan is realistic for a $9.4B global manufacturer under active enforcement proceedings."
    weight: 0.30
    description: "ImplementationPlan"
