meta:
  id: regulated-fintech-compliance
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design a comprehensive compliance program for a fintech company navigating multiple regulatory regimes including banking-as-a-service partnerships, state licensing, and federal oversight"
  tags: [fintech, banking, state-licensing, expert]

state: {}

trigger: |
  You're the Chief Compliance Officer at a rapidly
  growing fintech company ($520M revenue, 2,100 employees)
  that offers:
  - Consumer checking/savings accounts (via BaaS partner
    bank, FDIC-insured)
  - Consumer and small business lending (direct lender,
    licensed in 42 states)
  - Cryptocurrency trading (licensed as MSB federally,
    state MTLs in 35 states, NY BitLicense)
  - Payment processing (PCI-compliant payment facilitator)
  - Buy Now Pay Later (BNPL) product (launched 6 months
    ago, regulatory classification uncertain)

  Regulatory landscape:
  - OCC: Partner bank received MRA citing inadequate
    oversight of fintech partnership (OCC Bulletin
    2023-17 third-party risk management); threatening to
    terminate BaaS relationship (90-day cure period)
  - CFPB: Examination scheduled in 60 days covering
    lending and BNPL; recent CFPB interpretive rule
    classifying BNPL as credit subject to TILA/Reg Z
  - State regulators: 3 states have issued examination
    findings on lending practices; 7 state MTL renewal
    applications pending with deficiency letters
  - FinCEN: BSA examination by IRS (delegated examiner)
    found SAR filing deficiencies in crypto operations
  - SEC: Inquiry letter regarding whether certain crypto
    assets offered constitute securities
  - State AGs: Consumer complaints trending up 340% YoY;
    2 state AG investigations into lending fee disclosures

  Compliance gaps:
  - BaaS oversight: Partner bank compliance requirements
    not fully integrated into fintech operations; no
    joint risk assessment; customer complaint handling
    split between fintech and bank creates gaps
  - Lending: Fair lending monitoring limited; no HMDA-LAR
    equivalent analysis for non-mortgage lending; rate
    and fee disclosures vary across channels
  - Crypto: SAR filing threshold confusion between fiat
    and crypto transactions; no Travel Rule compliance
    program; custody procedures not formalized
  - BNPL: No Reg Z disclosures being provided; no adverse
    action notices for denied applications; dispute
    resolution process not established
  - Consumer complaints: No unified complaint management
    system; response times average 22 days across
    products
  - Compliance technology: Separate compliance monitoring
    for each product line; no enterprise view of
    regulatory risk
  - Staffing: Compliance team of 28 supporting 5 product
    lines across 42+ state jurisdictions

  Task: Design a comprehensive multi-product compliance
  program with checklists for BaaS partnership management,
  lending compliance, cryptocurrency regulatory
  compliance, BNPL compliance, state licensing management,
  complaint management, and examination readiness across
  all regulatory touchpoints.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive multi-product compliance program — addresses each product line's regulatory requirements (BaaS: OCC third-party risk management expectations, partner bank oversight framework, FDIC insurance compliance; lending: TILA/Reg Z, ECOA/Reg B, fair lending, state-specific rate caps and licensing requirements; crypto: BSA/AML for virtual assets, state MTL requirements, BitLicense compliance, potential securities classification; BNPL: TILA/Reg Z applicability, adverse action notices, dispute resolution under Reg E or Reg Z; payments: PCI DSS, Reg E, NACHA rules); creates unified compliance processes where possible; designs state licensing management system for 42+ jurisdictions; the program covers the full regulatory spectrum of a multi-product fintech."
    weight: 0.35
    description: "ComprehensiveMultiProductCompliance"
  - type: llm_judge
    criteria: "Response addresses urgent regulatory priorities with specific remediation — for the OCC BaaS MRA: designs partner bank oversight program within the 90-day cure period (joint risk assessment, information sharing, performance monitoring, complaint resolution protocol, audit rights); for CFPB examination: creates examination readiness checklist for lending and BNPL (document production, CMS documentation, fair lending analysis, BNPL Reg Z compliance implementation); for FinCEN/BSA: redesigns crypto SAR filing program (transaction monitoring tuning, filing thresholds, Travel Rule compliance for crypto transfers); for SEC inquiry: designs securities analysis framework for crypto assets (Howey test application, potential registration requirements); for state AG investigations: designs fee disclosure remediation; creates a unified complaint management system with regulatory reporting; each remediation has specific deliverables and deadlines."
    weight: 0.35
    description: "UrgentRegulatoryRemediation"
  - type: llm_judge
    criteria: "Response provides a realistic implementation framework and organizational design — creates a phased implementation plan: Phase 1 (90-day crisis: BaaS remediation, CFPB examination prep, BNPL Reg Z compliance, BSA remediation); Phase 2 (6 months: unified complaint management, state licensing remediation, fair lending program, crypto securities analysis); Phase 3 (12 months: enterprise compliance monitoring, advanced analytics, ongoing examination management, compliance culture program); designs organizational structure for 28-person team across 5 product lines (product compliance leads, shared services for licensing/complaints/training, regulatory affairs function); estimates additional resource requirements; creates a regulatory relationship management strategy; designs Board and executive reporting with enterprise compliance dashboard; addresses scalability as company grows into new products and states."
    weight: 0.30
    description: "ImplementationAndOrganization"
