meta:
  id: global-anti-corruption-program
  level: 4
  course: compliance-checklist-creation
  type: output
  description: "Design a global anti-corruption compliance program following DOJ/SEC FCPA enforcement action and monitorship requirements"
  tags: [fcpa, anti-corruption, monitorship, expert]

state: {}

trigger: |
  You're the Chief Ethics and Compliance Officer at a
  multinational engineering and construction company
  ($12B revenue, 45,000 employees, projects in 65
  countries). The company recently resolved a DOJ/SEC
  FCPA enforcement action with a $285M combined penalty
  (criminal fine + disgorgement + prejudgment interest).
  The resolution included a 3-year Deferred Prosecution
  Agreement (DPA) with an independent compliance monitor.

  Enforcement action findings:
  - Bribery payments totaling $48M to government officials
    in 7 countries (Nigeria, Brazil, Indonesia, India,
    Kazakhstan, Algeria, Mozambique) over 8 years
  - Payments funneled through 23 third-party agents and
    consultants with no legitimate business purpose
  - Falsified books and records (payments disguised as
    "consulting fees" and "facilitation payments")
  - Senior regional executives aware of and directed
    payments; regional compliance officers failed to
    escalate red flags
  - Previous compliance program found to be "paper
    program" — policies existed but not implemented
  - Internal audit failed to identify red flags despite
    auditing high-risk regions
  - Whistleblower complaints received but not properly
    investigated

  Monitor's initial assessment requirements:
  - Complete redesign of anti-corruption compliance
    program within 12 months
  - Quarterly progress reports to the monitor
  - Monitor will conduct 3 reviews over the DPA term
    with specific benchmarks
  - Program must meet DOJ Evaluation of Corporate
    Compliance Programs criteria
  - Program must satisfy the "Hallmarks of Effective
    Compliance Programs" (DOJ Criminal Division)

  Current state:
  - 3,200 third-party agents/consultants globally
  - $380M annually in government-facing contracts
  - Operations in 14 countries rated "high" or "very
    high" corruption risk (Transparency International CPI)
  - No centralized third-party due diligence process
  - Training limited to annual online module in English
  - No gift, hospitality, or travel approval workflow
  - Internal investigations handled ad hoc by regional
    counsel with no standardized methodology
  - No data analytics capability for transaction
    monitoring

  Task: Design a comprehensive global anti-corruption
  compliance program with checklists for third-party due
  diligence, gift and hospitality controls, government
  interaction protocols, training program, investigation
  methodology, monitoring and testing, and compliance
  program effectiveness metrics — designed to satisfy
  the independent monitor and DOJ requirements.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive anti-corruption compliance program — addresses all DOJ Evaluation of Corporate Compliance Programs elements (analysis and remediation of underlying misconduct, senior and middle management commitment, autonomy and resources, policies and procedures, risk assessment, training and communications, confidential reporting structure and investigation process, third-party management, mergers and acquisitions, monitoring and testing, analysis and remediation of compliance program); creates a risk-based third-party due diligence program for 3,200 agents (risk tiering, enhanced due diligence for high-risk relationships, ongoing monitoring, renewal requirements); designs gift/hospitality/travel approval workflow; creates government interaction protocols; the program addresses the root causes of the misconduct (regional autonomy without oversight, paper compliance, whistleblower suppression)."
    weight: 0.35
    description: "ComprehensiveAntiCorruption"
  - type: llm_judge
    criteria: "Response addresses monitorship-specific requirements and FCPA technical elements — designs the compliance program to satisfy monitor review benchmarks; creates quarterly progress reporting framework for the monitor; addresses FCPA-specific compliance elements (books and records/internal controls under Exchange Act, agent payment red flags, facilitation payment policy, commercial vs government bribery, UK Bribery Act overlap for UK operations); designs a data analytics program for transaction monitoring (high-risk payment patterns, unusual consulting fees, gifts/entertainment anomalies, travel expense analysis); creates a compliance culture assessment methodology; designs internal investigation protocols (preservation, witness interviews, document review, root cause analysis, disciplinary framework); addresses the role of internal audit in anti-corruption monitoring; the program would withstand scrutiny by an experienced DOJ-appointed monitor."
    weight: 0.35
    description: "MonitorshipAndFCPA"
  - type: llm_judge
    criteria: "Response provides a realistic implementation plan for the 12-month deadline — phases implementation: Months 1-3 (tone at the top messaging, risk assessment, third-party inventory and initial risk tiering, investigation protocol design, policy redesign); Months 4-6 (third-party due diligence platform deployment, training program rollout in local languages, gift/hospitality approval system, whistleblower system enhancement); Months 7-9 (monitoring and testing program launch, data analytics deployment, compliance culture survey, first monitor progress report preparation); Months 10-12 (effectiveness testing, remediation of gaps, second monitor progress report, sustained compliance infrastructure); addresses organizational redesign (reporting line changes, regional compliance officer empowerment, compliance committee structure); estimates budget ($15-25M implementation); the plan is realistic for a 45,000-person global company under monitorship pressure."
    weight: 0.30
    description: "TwelveMonthImplementation"
