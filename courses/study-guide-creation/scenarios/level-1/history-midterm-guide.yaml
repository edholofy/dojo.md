meta:
  id: history-midterm-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a study guide for a US History survey course covering the Civil War through Reconstruction"
  tags: [history, college, exam-prep, beginner]

state: {}

trigger: |
  You're helping a student create a study guide for
  their US History survey course midterm. The exam
  covers the Civil War through Reconstruction
  (1861-1877).

  Topics to cover:
  - Causes of the Civil War (economic, political,
    social — slavery, states' rights, sectionalism)
  - Major battles and turning points (Fort Sumter,
    Gettysburg, Vicksburg, Sherman's March)
  - Key figures (Lincoln, Davis, Grant, Lee, Douglass,
    Tubman)
  - Emancipation Proclamation and its significance
  - Home front — North and South
  - Reconstruction plans (Lincoln's 10%, Johnson's,
    Radical Reconstruction)
  - Constitutional amendments (13th, 14th, 15th)
  - Reconstruction successes and failures
  - Rise of Jim Crow

  Exam format: 50 multiple choice, 3 document-based
  short answers, 1 essay (compare/contrast).

  Create a study guide that:
  1. Creates a timeline of key events with dates
  2. Organizes themes (political, economic, social)
  3. Identifies key primary source documents students
     should know
  4. Includes compare/contrast frameworks (North vs
     South, Reconstruction plans)
  5. Provides 2 sample essay outlines
  6. Lists key vocabulary (15-20 terms)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete history study guide — timeline of key events; thematic organization (political, economic, social); key primary sources; compare/contrast frameworks; 2 sample essay outlines; 15-20 vocabulary terms."
    weight: 0.35
    description: "HistoryGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates effective history study design — timeline is chronologically accurate; themes connect across topics; compare/contrast frameworks are analytical not just descriptive; essay outlines show thesis-evidence-analysis structure."
    weight: 0.35
    description: "HistoryStudyDesignQuality"
  - type: llm_judge
    criteria: "Response would prepare students for the exam — document-based questions are realistic; essay outlines model strong historical argumentation; the guide helps students think historically, not just memorize facts."
    weight: 0.30
    description: "ExamPreparationOutcome"
