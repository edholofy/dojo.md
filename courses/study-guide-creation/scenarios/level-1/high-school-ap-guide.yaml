meta:
  id: high-school-ap-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a study guide for AP Psychology covering research methods, biological bases, and sensation/perception"
  tags: [ap-exam, high-school, psychology, college-board, beginner]

state: {}

trigger: |
  You're an AP Psychology teacher creating a study
  guide for your students preparing for the AP exam.
  This guide covers Units 1-3 (the first third of
  the course).

  Unit 1: Scientific Foundations of Psychology (10-14%)
  - History and approaches (structuralism,
    functionalism, behaviorism, psychoanalysis,
    humanistic, cognitive, biological, sociocultural)
  - Research methods (experimental, correlational,
    case study, survey, naturalistic observation)
  - Statistics basics (mean, median, mode, standard
    deviation, correlation coefficient)
  - Ethics in research (APA guidelines, informed
    consent, deception, debriefing)

  Unit 2: Biological Bases of Behavior (8-10%)
  - Nervous system structure (CNS, PNS, neurons)
  - Neural communication (action potential,
    neurotransmitters, synaptic transmission)
  - Brain structure and function (lobes, limbic
    system, brain stem)
  - Endocrine system and hormones

  Unit 3: Sensation and Perception (6-8%)
  - Sensation basics (thresholds, signal detection)
  - Vision (eye anatomy, color theories)
  - Hearing (ear anatomy, sound localization)
  - Gestalt principles and perceptual organization

  AP exam format: 100 multiple choice (70 minutes)
  and 2 free-response questions (50 minutes).

  Create a study guide that:
  1. Organizes concepts with AP exam weight percentages
  2. Defines key psychologists and their contributions
  3. Includes diagrams descriptions (neuron, brain,
     eye, ear)
  4. Provides AP-style multiple choice questions
     (3 per unit)
  5. Includes a sample free-response question with
     a model answer
  6. Creates flashcard-ready term lists

assertions:
  - type: llm_judge
    criteria: "Response creates a complete AP Psychology study guide — all 3 units organized with exam weights; key psychologists identified; diagram descriptions for neuron/brain/eye/ear; 3 AP-style MC questions per unit; sample FRQ with model answer; flashcard-ready term lists."
    weight: 0.35
    description: "APGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates AP exam expertise — content aligns with College Board AP Psychology framework; multiple choice questions match AP difficulty and style; the FRQ model answer demonstrates proper AP scoring rubric format; exam weights inform study prioritization."
    weight: 0.35
    description: "APExamExpertise"
  - type: llm_judge
    criteria: "Response would help students score 4 or 5 — the guide connects concepts across units; flashcard lists enable efficient memorization; the FRQ model shows students how to earn maximum points; study strategies are AP-specific."
    weight: 0.30
    description: "APScoreOutcome"
