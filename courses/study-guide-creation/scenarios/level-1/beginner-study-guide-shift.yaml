meta:
  id: beginner-study-guide-shift
  level: 1
  course: study-guide-creation
  type: output
  description: "Shift simulation — create three different study guides for a chemistry final, a real estate licensing exam, and a children's Sunday school class"
  tags: [shift-simulation, multi-context, beginner]

state: {}

trigger: |
  You're a freelance educational content creator.
  Three clients contact you on the same day, each
  needing a study guide for a completely different
  context.

  === CLIENT 1: Chemistry Final ===
  A college sophomore needs a study guide for their
  Organic Chemistry I final. Topics: functional groups,
  nomenclature (IUPAC naming), reaction mechanisms
  (SN1, SN2, E1, E2), stereochemistry (R/S, E/Z),
  and acid-base chemistry. The exam is 60% written
  reactions and 30% multiple choice and 10% spectroscopy
  interpretation. The student is a visual learner who
  struggles with 3D molecular visualization.

  Create: A study guide with reaction mechanism
  flowcharts, functional group reference table,
  nomenclature decision tree, and 4 practice
  problems.

  === CLIENT 2: Real Estate Licensing Exam ===
  A career changer (former teacher, age 42) needs a
  study guide for their state real estate licensing
  exam. Topics: property ownership types, contracts
  and agency, real estate finance (mortgages, points,
  amortization), property valuation, and fair housing
  laws. The exam is 150 multiple choice questions,
  3.5 hours, 70% to pass. They have 3 weeks to
  prepare while working part-time.

  Create: A study guide with key term definitions
  (20 terms), math formula reference sheet, fair
  housing quick-reference, and a 3-week study
  schedule.

  === CLIENT 3: Sunday School ===
  A volunteer Sunday school teacher needs a study
  guide for 8-10 year olds learning about the parables
  of Jesus. Topics: Parable of the Good Samaritan,
  Parable of the Prodigal Son, Parable of the Sower.
  The "test" is a fun review game at the end of the
  4-week unit. Kids have varying reading levels
  (grades 2-5).

  Create: A kid-friendly study guide with simple
  summaries of each parable, discussion questions,
  a fill-in-the-blank activity, and a matching
  activity connecting parables to their lessons.

  Write all three study guides.

assertions:
  - type: llm_judge
    criteria: "Response creates all three study guides — organic chemistry with reaction flowcharts, functional group table, nomenclature tree, and 4 problems; real estate with 20 terms, math formulas, fair housing reference, and 3-week schedule; Sunday school with parable summaries, discussion questions, fill-in-the-blank, and matching activity."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response adapts appropriately to each context — the chemistry guide addresses visual learning and 3D visualization; the real estate guide is realistic for a working adult with 3 weeks; the Sunday school guide is age-appropriate for 8-10 year olds with varying reading levels."
    weight: 0.35
    description: "ContextAdaptationQuality"
  - type: llm_judge
    criteria: "Response would serve each learner — the chemistry student could use the flowcharts to navigate reaction mechanisms; the career changer could follow the schedule to pass at 70%; the kids would engage with the activities and remember the parables."
    weight: 0.30
    description: "LearnerSuccessOutcome"
