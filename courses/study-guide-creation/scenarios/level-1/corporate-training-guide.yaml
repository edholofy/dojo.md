meta:
  id: corporate-training-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a study guide for employees preparing for a corporate compliance training assessment"
  tags: [corporate, compliance, training, assessment, beginner]

state: {}

trigger: |
  You're an L&D specialist creating a study guide for
  employees who must pass an annual compliance training
  assessment. The company (a 2,000-employee financial
  services firm) requires a 90% score to pass.

  Compliance topics:
  - Anti-Money Laundering (AML)
    (suspicious activity reporting, KYC requirements,
    red flags)
  - Data Privacy and Security
    (GDPR basics, PII handling, breach reporting,
    password policies)
  - Code of Conduct
    (conflicts of interest, gifts and entertainment,
    confidentiality, social media policy)
  - Workplace Safety
    (harassment prevention, reporting procedures,
    retaliation protections)

  Assessment format: 40 questions, multiple choice
  and scenario-based, open-book, 60-minute time limit.

  Employee demographics: Mix of technical and non-
  technical staff, ages 22-65, varying education
  levels.

  Create a study guide that:
  1. Summarizes each compliance topic in plain language
  2. Provides real-world scenario examples for each
     topic
  3. Lists "what to do" and "what NOT to do" for each
     area
  4. Includes a quick-reference cheat sheet (1 page)
  5. Provides 3 practice scenarios with correct
     answers and explanations
  6. Highlights the most commonly failed questions
     from prior years

assertions:
  - type: llm_judge
    criteria: "Response creates a complete compliance study guide — all 4 topics summarized in plain language; real-world scenarios for each topic; do/don't lists; 1-page cheat sheet; 3 practice scenarios with explanations; commonly failed questions highlighted."
    weight: 0.35
    description: "ComplianceGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates compliance training expertise — AML red flags are realistic; data privacy guidance reflects GDPR; scenario examples mirror actual workplace situations; the guide is accessible to varying education levels."
    weight: 0.35
    description: "ComplianceExpertise"
  - type: llm_judge
    criteria: "Response would help employees pass at 90% — the cheat sheet enables quick reference during the open-book exam; practice scenarios build recognition skills; commonly failed questions are proactively addressed."
    weight: 0.30
    description: "PassRateOutcome"
