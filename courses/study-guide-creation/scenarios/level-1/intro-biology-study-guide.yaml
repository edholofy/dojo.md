meta:
  id: intro-biology-study-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a study guide for an introductory biology college course covering cell biology, genetics, and evolution"
  tags: [biology, college, exam-prep, beginner]

state: {}

trigger: |
  You're a teaching assistant for Biology 101 at a
  community college. The midterm exam is in 2 weeks
  and covers 3 units:

  Unit 1: Cell Biology
  - Cell structure (prokaryotic vs eukaryotic)
  - Cell membrane and transport
  - Cellular respiration and photosynthesis
  - Cell division (mitosis and meiosis)

  Unit 2: Genetics
  - Mendelian genetics and Punnett squares
  - DNA structure and replication
  - Transcription and translation
  - Genetic mutations

  Unit 3: Evolution
  - Natural selection
  - Evidence for evolution
  - Speciation
  - Hardy-Weinberg equilibrium

  The class has 120 students, mostly freshmen with
  no prior biology background. The exam format is
  40 multiple choice, 10 short answer, and 2 essay
  questions.

  Create a comprehensive study guide that:
  1. Organizes key concepts by unit with clear headings
  2. Includes key vocabulary with definitions (at least
     8 terms per unit)
  3. Provides practice questions for each unit (3-5 per
     unit matching exam format)
  4. Highlights common mistakes and misconceptions
  5. Suggests study strategies for each question type

assertions:
  - type: llm_judge
    criteria: "Response creates a complete study guide covering all 3 units — cell biology, genetics, and evolution — with organized key concepts, vocabulary definitions (8+ per unit), and practice questions (3-5 per unit)."
    weight: 0.35
    description: "StudyGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates effective study guide design — concepts are clearly organized with headings; vocabulary definitions are accessible to freshmen; practice questions match exam format (multiple choice, short answer, essay); common misconceptions are identified."
    weight: 0.35
    description: "StudyGuideDesignQuality"
  - type: llm_judge
    criteria: "Response would help students succeed — a freshman with no biology background could use this guide to prepare effectively; study strategies are practical; the guide bridges lecture content to exam performance."
    weight: 0.30
    description: "StudentSuccessOutcome"
