meta:
  id: certification-exam-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a study guide for CompTIA A+ certification exam covering hardware and troubleshooting"
  tags: [certification, comptia, it, exam-prep, beginner]

state: {}

trigger: |
  You're an IT instructor creating a study guide for
  students preparing for the CompTIA A+ Core 1
  (220-1101) certification exam. Most students are
  career changers with limited IT background.

  Exam domains to cover:
  - Mobile Devices (15%): Laptop hardware, displays,
    mobile device accessories
  - Networking (20%): TCP/IP, ports, protocols,
    wireless standards, network troubleshooting
  - Hardware (25%): Motherboards, CPUs, RAM, storage,
    power supplies, peripherals
  - Virtualization and Cloud (11%): Cloud models,
    virtual machines, containers
  - Troubleshooting (29%): Hardware, network, mobile,
    printer troubleshooting methodology

  Exam format: 90 questions, 90 minutes, multiple
  choice and performance-based questions (PBQs).
  Passing score: 675/900.

  Create a study guide that:
  1. Breaks down each domain with key concepts
  2. Lists critical port numbers and protocols to
     memorize
  3. Creates comparison charts (e.g., RAM types,
     cable types, wireless standards)
  4. Provides troubleshooting flowcharts for common
     scenarios
  5. Includes 5 practice questions per domain
  6. Offers a 30-day study plan with daily topics

assertions:
  - type: llm_judge
    criteria: "Response creates a complete CompTIA A+ study guide — all 5 exam domains covered with key concepts; critical port numbers and protocols listed; comparison charts for hardware; troubleshooting flowcharts; 5 practice questions per domain (25 total); 30-day study plan."
    weight: 0.35
    description: "CertGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates IT certification expertise — domain weights are reflected in study emphasis; port numbers and protocols are accurate; comparison charts cover exam-relevant distinctions; troubleshooting follows CompTIA methodology."
    weight: 0.35
    description: "CertificationExpertise"
  - type: llm_judge
    criteria: "Response would help career changers pass — technical concepts are explained accessibly; the 30-day plan is realistic for someone working full-time; practice questions mirror actual exam difficulty; PBQ preparation is included."
    weight: 0.30
    description: "CareerChangerSuccessOutcome"
