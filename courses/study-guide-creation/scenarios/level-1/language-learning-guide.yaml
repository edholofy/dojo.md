meta:
  id: language-learning-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a study guide for a Spanish 201 intermediate course covering grammar, vocabulary, and conversation"
  tags: [language-learning, spanish, college, beginner]

state: {}

trigger: |
  You're creating a study guide for students in
  Spanish 201 (Intermediate Spanish) preparing for
  their oral and written final exam.

  Grammar topics:
  - Preterite vs imperfect tense usage
  - Subjunctive mood (present subjunctive)
  - Direct and indirect object pronouns
  - Reflexive verbs in past tenses
  - Por vs para
  - Ser vs estar (advanced uses)

  Vocabulary themes:
  - Travel and transportation (30 words)
  - Health and body (25 words)
  - Environment and nature (20 words)

  Exam format:
  - Listening comprehension (20%)
  - Reading comprehension (20%)
  - Written essay (30%) — 200-word essay on a prompt
  - Oral interview (30%) — 5-minute conversation with
    instructor

  Create a study guide that:
  1. Explains each grammar concept with rules and
     3 example sentences
  2. Groups vocabulary by theme with English
     translations
  3. Provides conjugation charts for key irregular
     verbs
  4. Includes practice essay prompts with model
     outlines
  5. Lists conversation phrases for the oral exam
  6. Suggests study activities (flashcards, practice
     dialogues, etc.)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete Spanish study guide — all 6 grammar topics with rules and examples; vocabulary grouped by theme with translations; conjugation charts; practice essay prompts with outlines; oral exam conversation phrases; study activities."
    weight: 0.35
    description: "LanguageGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates language teaching expertise — grammar explanations distinguish tricky concepts (preterite vs imperfect, por vs para); conjugation charts cover key irregulars; conversation phrases are natural and useful; study activities promote active practice."
    weight: 0.35
    description: "LanguageTeachingQuality"
  - type: llm_judge
    criteria: "Response would prepare students for all exam components — listening, reading, writing, and speaking are all addressed; essay outlines model strong intermediate writing; conversation phrases build oral confidence."
    weight: 0.30
    description: "ExamReadinessOutcome"
