meta:
  id: math-final-study-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a study guide for a college algebra final covering functions, polynomials, and logarithms"
  tags: [mathematics, college-algebra, exam-prep, beginner]

state: {}

trigger: |
  You're a math tutor creating a study guide for a
  College Algebra final exam. Many students struggle
  with math anxiety and need clear, step-by-step
  guidance.

  Topics covered:
  - Linear functions and graphing
  - Quadratic functions (factoring, completing the
    square, quadratic formula)
  - Polynomial functions (degree, end behavior,
    zeros)
  - Rational functions and asymptotes
  - Exponential functions and growth/decay
  - Logarithmic functions and properties
  - Systems of equations (2 and 3 variable)

  Exam format: 25 problems, no calculator allowed
  for first 10, calculator allowed for remaining 15.
  Must show all work.

  Create a study guide that:
  1. Lists key formulas and when to use each one
  2. Provides step-by-step worked examples for each
     topic (at least 1 per topic)
  3. Identifies the most common calculation errors
  4. Includes "no calculator" strategies for the
     first section
  5. Creates a difficulty ranking of topics to help
     students prioritize study time
  6. Provides 5 practice problems with answers

assertions:
  - type: llm_judge
    criteria: "Response creates a complete math study guide — key formulas listed; step-by-step worked examples for each topic (7 topics minimum); common calculation errors identified; no-calculator strategies; difficulty ranking; 5 practice problems with answers."
    weight: 0.35
    description: "MathGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates effective math study design — formulas include context for when to use them; worked examples show clear step-by-step reasoning; no-calculator strategies are practical; difficulty ranking helps prioritize limited study time."
    weight: 0.35
    description: "MathStudyDesignQuality"
  - type: llm_judge
    criteria: "Response would reduce math anxiety and improve performance — explanations are accessible to struggling students; the guide builds confidence through progressive difficulty; practice problems mirror exam format."
    weight: 0.30
    description: "StudentConfidenceOutcome"
