meta:
  id: nursing-nclex-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a study guide for NCLEX-RN exam preparation focusing on fundamentals of nursing"
  tags: [nursing, nclex, certification, healthcare, beginner]

state: {}

trigger: |
  You're helping a nursing student prepare for the
  NCLEX-RN exam. They're in their final semester and
  need a focused study guide on Fundamentals of
  Nursing, which typically makes up 15-21% of the
  exam.

  Key content areas:
  - Patient safety and infection control
    (hand hygiene, standard precautions, isolation)
  - Basic care and comfort (nutrition, hygiene,
    mobility, pain management)
  - Vital signs and assessment techniques
  - Medication administration (rights of medication
    administration, routes, calculations)
  - Documentation and communication (SBAR, nursing
    process)
  - Patient rights and ethical practice
  - Delegation and prioritization (RN vs LPN vs UAP
    scope)

  NCLEX format: Computer adaptive testing (CAT),
  next-generation item types (case studies, drag-and-
  drop, select-all-that-apply).

  Create a study guide that:
  1. Organizes content by NCLEX test plan categories
  2. Highlights "need to know" vs "nice to know"
  3. Includes memory aids and mnemonics for key
     concepts
  4. Provides 5 NCLEX-style practice questions with
     rationales
  5. Creates a 2-week study schedule
  6. Lists common NCLEX "tricks" and test-taking
     strategies

assertions:
  - type: llm_judge
    criteria: "Response creates a complete NCLEX study guide — content organized by test plan categories; need-to-know prioritization; mnemonics and memory aids; 5 NCLEX-style questions with rationales; 2-week study schedule; test-taking strategies."
    weight: 0.35
    description: "NCLEXGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates nursing exam expertise — content aligns with NCLEX-RN test plan; practice questions use next-generation item types; rationales explain why wrong answers are wrong; delegation and prioritization rules are accurate."
    weight: 0.35
    description: "NursingExamExpertise"
  - type: llm_judge
    criteria: "Response would help a nursing student pass — the guide focuses on high-yield content; mnemonics are memorable and accurate; the study schedule is realistic; test-taking strategies address NCLEX-specific challenges like select-all-that-apply."
    weight: 0.30
    description: "NCLEXPassOutcome"
