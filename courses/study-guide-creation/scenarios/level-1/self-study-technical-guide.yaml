meta:
  id: self-study-technical-guide
  level: 1
  course: study-guide-creation
  type: output
  description: "Create a self-study guide for learning Python programming fundamentals from scratch"
  tags: [self-study, programming, python, technical, beginner]

state: {}

trigger: |
  You're creating a self-study guide for someone
  learning Python programming from scratch. The
  learner is a 35-year-old marketing professional
  who wants to learn Python for data analysis. They
  have no programming experience and can dedicate
  5-7 hours per week.

  Topics to cover (first 8 weeks):
  - Week 1-2: Variables, data types, basic operators
  - Week 3-4: Control flow (if/else, loops), functions
  - Week 5-6: Data structures (lists, dictionaries,
    tuples, sets)
  - Week 7-8: File I/O, basic data analysis with
    pandas introduction

  Create a study guide that:
  1. Breaks each week into daily study sessions
     (45-60 minutes each)
  2. Lists specific learning objectives per week
  3. Recommends free resources for each topic (with
     brief descriptions of why each is useful)
  4. Provides 3 practice exercises per week (building
     in difficulty)
  5. Includes "checkpoint" self-assessments at weeks
     2, 4, 6, and 8
  6. Suggests a capstone mini-project for week 8
     (marketing data analysis)
  7. Lists common beginner mistakes and how to
     avoid them

assertions:
  - type: llm_judge
    criteria: "Response creates a complete self-study guide — 8-week plan with daily sessions; specific learning objectives per week; free resources recommended; 3 practice exercises per week; checkpoint assessments at weeks 2/4/6/8; capstone project; common mistakes listed."
    weight: 0.35
    description: "SelfStudyGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates effective self-study design — daily sessions fit 45-60 minutes; topics build progressively; the capstone project connects Python to marketing data analysis; checkpoints help learners gauge progress without an instructor."
    weight: 0.35
    description: "SelfStudyDesignQuality"
  - type: llm_judge
    criteria: "Response would keep a busy professional motivated — the pace is realistic for 5-7 hours/week; exercises are relevant to their marketing career; the guide provides enough structure for self-directed learning without overwhelming."
    weight: 0.30
    description: "LearnerMotivationOutcome"
