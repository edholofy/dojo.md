meta:
  id: study-guide-analytics
  level: 3
  course: study-guide-creation
  type: output
  description: "Build a data-driven study guide optimization system using learning analytics to continuously improve guide effectiveness"
  tags: [analytics, data-driven, optimization, learning-analytics, advanced]

state: {}

trigger: |
  You're a learning analytics specialist at a large
  online university (85,000 students, 200+ courses).
  The provost wants to use data to improve study
  guide effectiveness across the institution.

  Available data:
  - Study guide usage metrics (page views, time on
    page, download counts, section completion rates)
  - Student performance data (quiz scores, exam
    grades, course pass rates)
  - Student survey data (helpfulness ratings, format
    preferences, improvement suggestions)
  - LMS engagement data (login frequency, resource
    access patterns, assignment submission timing)
  - Demographic data (age, program, prior GPA,
    enrollment status — full/part-time)

  Current findings:
  - Only 34% of students access study guides before
    exams
  - Students who use guides score 12% higher on
    average
  - Most-used guide sections: practice questions
    (78%), key terms (65%), summaries (52%)
  - Least-used: recommended readings (8%), extended
    examples (15%)
  - Guide usage drops 40% after week 8 of 16-week
    courses

  Build the analytics-driven optimization system:
  1. KPI dashboard — metrics that indicate guide
     effectiveness
  2. Correlation analysis framework — connecting
     guide usage patterns to learning outcomes
  3. A/B testing methodology for guide improvements
  4. Predictive model — identifying students who
     would benefit most from guide usage
  5. Content optimization recommendations based on
     current data
  6. Faculty reporting template showing guide impact
     on their course outcomes
  7. Continuous improvement cycle with quarterly
     review process

assertions:
  - type: llm_judge
    criteria: "Response builds a complete analytics system — KPI dashboard; correlation analysis framework; A/B testing methodology; predictive model for at-risk students; content optimization recommendations; faculty reporting template; quarterly review process."
    weight: 0.35
    description: "AnalyticsSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates learning analytics expertise — KPIs measure meaningful outcomes (not just vanity metrics); correlations address confounding variables; A/B tests are properly designed; predictive models use available data appropriately; content recommendations are specific and actionable."
    weight: 0.35
    description: "AnalyticsExpertise"
  - type: llm_judge
    criteria: "Response would improve guide adoption and outcomes — the 34% usage rate would increase; the 12% performance advantage would be extended to more students; the week-8 dropout would be addressed; least-used sections would be redesigned or removed."
    weight: 0.30
    description: "DataDrivenOutcome"
