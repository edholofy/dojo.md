meta:
  id: cross-disciplinary-guide
  level: 3
  course: study-guide-creation
  type: output
  description: "Create a cross-disciplinary study guide for a capstone course integrating biology, chemistry, statistics, and ethics for biomedical engineering students"
  tags: [cross-disciplinary, capstone, integration, biomedical, advanced]

state: {}

trigger: |
  You're an instructional designer for a biomedical
  engineering department creating a study guide for
  the senior capstone comprehensive exam. The exam
  tests integration across 4 disciplines, which is
  where students struggle most — they know each
  subject in isolation but can't synthesize across
  fields.

  Disciplines and key topics:
  - Biology: Cell biology, tissue engineering,
    biomaterials interaction with living systems
  - Chemistry: Polymer chemistry, surface chemistry,
    biocompatibility, degradation mechanisms
  - Statistics: Experimental design, hypothesis
    testing, regression analysis, FDA statistical
    requirements
  - Ethics: Human subjects research, regulatory
    compliance (FDA 510(k), PMA), informed consent,
    device recall ethics

  Integration scenarios tested:
  - Design a biocompatible implant (requires all 4)
  - Evaluate a clinical trial for a new device
    (statistics + biology + ethics)
  - Troubleshoot a failed biomaterial (chemistry +
    biology + statistics)

  Create a cross-disciplinary study guide:
  1. Knowledge integration matrix showing how concepts
     connect across all 4 disciplines
  2. Cross-disciplinary case studies with study
     questions requiring multi-field synthesis
  3. Concept bridging guides — explicit connections
     between related concepts in different fields
  4. Integration practice problems with worked
     solutions
  5. "Think like an engineer" decision frameworks
     for multi-factor problems
  6. Discipline-specific quick-reference sheets that
     cross-reference related concepts in other fields

assertions:
  - type: llm_judge
    criteria: "Response creates a complete cross-disciplinary guide — integration matrix connecting all 4 disciplines; case studies requiring multi-field synthesis; concept bridging guides; integration practice problems with solutions; decision frameworks; cross-referenced quick-reference sheets."
    weight: 0.35
    description: "CrossDisciplinaryCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates integration expertise — the matrix shows genuine conceptual connections (not just topic lists); case studies require applying multiple disciplines simultaneously; concept bridges make implicit connections explicit; decision frameworks guide multi-factor reasoning."
    weight: 0.35
    description: "IntegrationExpertise"
  - type: llm_judge
    criteria: "Response would solve the synthesis problem — students would move from isolated knowledge to integrated thinking; the capstone exam integration scenarios would be well-prepared for; the guide creates biomedical engineers who think across disciplines."
    weight: 0.30
    description: "SynthesisOutcome"
