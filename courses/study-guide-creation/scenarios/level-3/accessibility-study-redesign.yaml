meta:
  id: accessibility-study-redesign
  level: 3
  course: study-guide-creation
  type: output
  description: "Redesign a university's study guide system for full accessibility — WCAG 2.1 AA compliance, UDL principles, and accommodations for diverse disabilities"
  tags: [accessibility, udl, wcag, disabilities, advanced]

state: {}

trigger: |
  You're an accessibility specialist hired by a
  large state university (35,000 students) after
  a Department of Education compliance review found
  that 78% of course study guides fail WCAG 2.1 AA
  standards. The university has 2,400 students with
  documented disabilities.

  Audit findings:
  - 85% of study guides are image-heavy PDFs without
    alt text
  - Math/science study guides use images of equations
    (not MathML or LaTeX)
  - No study guides have screen reader compatible
    structure
  - Color-coded content lacks text alternatives
  - No study guides accommodate cognitive disabilities
    (ADHD, dyslexia, processing disorders)
  - Foreign language study guides lack audio
    components
  - Timed practice tests have no accommodation
    options

  Disability categories to address:
  - Visual (blind, low vision, color blind): 320 students
  - Hearing (deaf, hard of hearing): 180 students
  - Motor (limited fine motor, mobility): 250 students
  - Cognitive (ADHD, dyslexia, autism, TBI): 1,200 students
  - Multiple/other: 450 students

  Design the accessible study guide system:
  1. Universal study guide template meeting WCAG 2.1 AA
  2. Specific accommodations for each disability category
  3. Faculty training program on creating accessible
     study materials
  4. Technology stack for accessible content authoring
  5. Quality assurance checklist for accessibility review
  6. Implementation timeline (remediate existing
     guides + create new standard)
  7. Student feedback mechanism for reporting barriers

assertions:
  - type: llm_judge
    criteria: "Response creates a complete accessible system — WCAG 2.1 AA template; accommodations for all 5 disability categories; faculty training program; technology stack; QA checklist; implementation timeline; student feedback mechanism."
    weight: 0.35
    description: "AccessibilitySystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates accessibility expertise — WCAG 2.1 AA requirements are accurately applied; cognitive accessibility addresses ADHD and dyslexia specifically; math accessibility uses proper standards (MathML/LaTeX); the template is truly universal, not just compliant."
    weight: 0.35
    description: "AccessibilityExpertise"
  - type: llm_judge
    criteria: "Response would pass DOE compliance — the 78% failure rate would be eliminated; 2,400 students with disabilities would have equitable access; faculty would have tools and training to maintain standards; the system is sustainable long-term."
    weight: 0.30
    description: "ComplianceOutcome"
