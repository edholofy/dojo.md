meta:
  id: adaptive-learning-guide
  level: 3
  course: study-guide-creation
  type: output
  description: "Design an AI-powered adaptive study guide system that personalizes content based on learner performance and knowledge gaps"
  tags: [adaptive-learning, ai-powered, personalization, advanced]

state: {}

trigger: |
  You're the lead instructional designer for an
  ed-tech startup building an adaptive study guide
  platform for medical school board exams (USMLE
  Step 1). The platform must personalize study
  content for each student based on their performance
  data.

  Platform requirements:
  - Content coverage: 18 organ systems, 7 foundational
    science disciplines, 2,800+ learning objectives
  - 40,000+ question bank with difficulty ratings
  - Student performance data: practice question
    accuracy, time per question, topic history
  - Adaptive algorithm must determine: what to study
    next, difficulty level, review timing

  Student personas:
  - High performer (85%+ accuracy): Needs challenge,
    integration questions, test-day stamina
  - Average performer (65-84%): Needs targeted
    weakness remediation, concept reinforcement
  - Struggling performer (<65%): Needs foundational
    review, confidence building, smaller study chunks

  Design the adaptive study guide system:
  1. Knowledge mapping architecture — how the system
     represents what a student knows and doesn't know
  2. Adaptive algorithm logic — how it selects the
     next study content based on performance
  3. Personalized study guide generation — what a
     daily study session looks like for each persona
  4. Spaced repetition integration — how review
     scheduling adapts to individual forgetting curves
  5. Performance analytics — student-facing dashboard
     showing strengths, weaknesses, predicted score
  6. Intervention triggers — when the system
     recommends changing study strategies

assertions:
  - type: llm_judge
    criteria: "Response designs a complete adaptive system — knowledge mapping architecture; adaptive algorithm logic for content selection; personalized daily sessions for all 3 personas; adaptive spaced repetition; student analytics dashboard with predicted score; intervention triggers."
    weight: 0.35
    description: "AdaptiveSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates adaptive learning expertise — knowledge mapping captures concept relationships and prerequisite chains; the algorithm balances weakness remediation with confidence maintenance; spaced repetition adapts to individual forgetting curves; intervention triggers are evidence-based."
    weight: 0.35
    description: "AdaptiveLearningQuality"
  - type: llm_judge
    criteria: "Response would improve USMLE outcomes — high performers would reach 250+ scores; average performers would close knowledge gaps efficiently; struggling students would build foundations without drowning; predicted scores would correlate with actual performance."
    weight: 0.30
    description: "USMLEOutcome"
