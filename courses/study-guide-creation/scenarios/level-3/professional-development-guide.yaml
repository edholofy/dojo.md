meta:
  id: professional-development-guide
  level: 3
  course: study-guide-creation
  type: output
  description: "Design a study guide system for a hospital's continuing medical education program covering 8 specialties and regulatory requirements"
  tags: [cme, healthcare, professional-development, regulatory, advanced]

state: {}

trigger: |
  You're the CME (Continuing Medical Education)
  Director at a 600-bed academic medical center.
  You need to redesign the study guide system for
  the hospital's mandatory education program.

  Requirements:
  - 2,400 clinical staff must complete annual
    education requirements
  - 8 departments with specialty-specific content:
    Emergency Medicine, Surgery, Internal Medicine,
    Pediatrics, OB/GYN, Psychiatry, Radiology,
    Anesthesiology
  - Regulatory mandates: Joint Commission, CMS,
    state licensing board, specialty board MOC
    (Maintenance of Certification)
  - Staff work 12-hour shifts with limited study time
  - Current completion rate: 71% (below 90% target)
  - CME credits must be trackable and reportable

  Content categories:
  - Universal (all staff): Infection control, patient
    safety, cultural competency, documentation (8 hrs)
  - Specialty-specific: Board review content (12 hrs)
  - Elective: New research, emerging treatments (4 hrs)
  - Skills-based: Procedural competency (hands-on)

  Design the CME study guide system:
  1. Study guide architecture — universal + specialty
     + elective pathways
  2. Microlearning modules designed for shift-based
     schedules (10-15 minute units)
  3. Specialty board review study guide templates
  4. CME credit tracking and compliance dashboard
  5. Assessment strategy — knowledge checks aligned
     with regulatory requirements
  6. Annual education calendar with milestone deadlines
  7. Non-compliance escalation process

assertions:
  - type: llm_judge
    criteria: "Response designs a complete CME system — architecture with universal/specialty/elective paths; microlearning modules for shift workers; specialty board templates for 8 departments; CME tracking dashboard; assessment strategy; annual calendar; escalation process."
    weight: 0.35
    description: "CMESystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates healthcare education expertise — Joint Commission and CMS requirements are addressed; microlearning fits 12-hour shift schedules; board review content aligns with MOC requirements; assessments meet regulatory mandates; CME credits are properly tracked."
    weight: 0.35
    description: "HealthcareEducationExpertise"
  - type: llm_judge
    criteria: "Response would achieve compliance — the 71% completion rate would reach 90%+; regulatory requirements would be met; staff would find the microlearning manageable; the system would pass Joint Commission survey."
    weight: 0.30
    description: "ComplianceAchievementOutcome"
