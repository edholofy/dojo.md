meta:
  id: study-guide-for-neurodiverse
  level: 3
  course: study-guide-creation
  type: output
  description: "Create specialized study guides for neurodiverse learners — ADHD, dyslexia, and autism spectrum — with evidence-based accommodations"
  tags: [neurodiversity, adhd, dyslexia, autism, accommodations, advanced]

state: {}

trigger: |
  You're a learning specialist at a university
  disability services office. The number of students
  with neurodevelopmental conditions has increased
  300% over the past decade. Current study guides
  don't account for how neurodiverse students
  actually learn.

  Student populations:
  - ADHD (680 students): Struggle with sustained
    attention, working memory, task initiation, time
    management. Strength: hyperfocus when interested
  - Dyslexia (420 students): Struggle with reading
    speed, text-heavy materials, spelling. Strength:
    big-picture thinking, visual-spatial reasoning
  - Autism Spectrum (310 students): Struggle with
    ambiguous instructions, unstructured materials,
    social learning contexts. Strength: pattern
    recognition, deep focus, systematic thinking

  Current problems:
  - Standard study guides are 15-20 pages of dense
    text
  - No chunking or visual breaks
  - Instructions are vague ("review the chapter")
  - Practice questions lack structure
  - Study group expectations assume neurotypical
    social skills
  - 62% of neurodiverse students report study guides
    are "unhelpful"

  Design specialized study guide frameworks:
  1. ADHD-optimized study guide format — chunked
     content, time-boxed sections, engagement
     triggers, reward checkpoints
  2. Dyslexia-friendly study guide format — font
     choices, spacing, text alternatives, audio
     components, visual organization
  3. Autism-friendly study guide format — explicit
     structure, unambiguous instructions, predictable
     layout, reduced social demands
  4. Universal overlay — elements that benefit all
     neurodiverse learners
  5. Faculty guide for creating neuroinclusive study
     materials
  6. Student self-advocacy toolkit — how to adapt
     any study guide for their needs

assertions:
  - type: llm_judge
    criteria: "Response creates specialized frameworks for all 3 populations — ADHD format with chunking, time-boxing, engagement triggers; dyslexia format with font/spacing/audio accommodations; autism format with explicit structure and unambiguous instructions; universal overlay; faculty guide; student self-advocacy toolkit."
    weight: 0.35
    description: "NeurodiversityCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates neurodiversity expertise — ADHD accommodations address working memory and task initiation specifically; dyslexia accommodations follow evidence-based typography guidelines; autism accommodations respect sensory and processing differences; recommendations are strengths-based, not deficit-focused."
    weight: 0.35
    description: "NeurodiversityExpertise"
  - type: llm_judge
    criteria: "Response would reduce the 62% 'unhelpful' rate — neurodiverse students would find guides usable and effective; the universal overlay would benefit neurotypical students too; faculty would have practical tools; students would gain self-advocacy skills."
    weight: 0.30
    description: "InclusionOutcome"
