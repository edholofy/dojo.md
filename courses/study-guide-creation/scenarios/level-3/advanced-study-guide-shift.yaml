meta:
  id: advanced-study-guide-shift
  level: 3
  course: study-guide-creation
  type: output
  description: "Shift simulation — create study guides for a military promotion board, a medical residency in-training exam, and a K-12 standardized test prep program"
  tags: [shift-simulation, multi-context, advanced]

state: {}

trigger: |
  You're an instructional design consultant working
  on three simultaneous projects.

  === PROJECT 1: Military Promotion Board ===
  The U.S. Army needs study guides for Sergeants
  First Class (E-7) preparing for the Master Sergeant
  (E-8) promotion board. The board evaluates:
  - Army Doctrine (ADP 1, 3-0, 5-0, 6-0, 6-22, 7-0)
  - Military history (selected campaigns)
  - Leadership and counseling
  - Training management
  - Current events and Army transformation
  - Uniform regulations (AR 670-1)
  - Personnel actions and evaluations

  Board format: 30-minute oral examination by a panel
  of 3 senior NCOs. Questions range from doctrinal
  knowledge to situational leadership scenarios.

  Create: A 60-day study guide with doctrinal
  reference cards, scenario-based practice questions
  (10 questions with model responses), a board
  rehearsal protocol, and a daily study schedule.

  === PROJECT 2: Medical Residency In-Training Exam ===
  An Internal Medicine residency program (36 residents
  across PGY-1, PGY-2, PGY-3) needs study guides for
  the annual IM-ITE (In-Training Examination).

  Challenge: Residents work 60-80 hours/week with
  minimal dedicated study time. Current ITE scores
  average at the 38th percentile (goal: 60th+).

  Topics: Cardiology, pulmonology, gastroenterology,
  nephrology, endocrinology, hematology/oncology,
  infectious disease, rheumatology, general medicine.

  Create: A year-round study guide system with weekly
  10-minute "micro-study" sessions tied to clinical
  rotations, high-yield topic summaries for the top
  5 tested areas, 15 ITE-style questions with
  explanations, and a PGY-level-appropriate study
  progression.

  === PROJECT 3: K-12 Standardized Test Prep ===
  A school district (22 schools, 15,000 students)
  needs study guides for 3rd, 5th, and 8th grade
  state standardized testing (ELA and Math).

  Demographics: 45% free/reduced lunch, 30% English
  learners, 12% special education. Current
  proficiency rates: 3rd grade 52%, 5th grade 48%,
  8th grade 41%.

  Create: Grade-level study guides with parent
  companion guides (in English and Spanish), teacher
  facilitation guides for in-class review sessions,
  practice test sections with grade-appropriate
  formatting, and a 6-week test prep calendar.

  Write all three study guide systems.

assertions:
  - type: llm_judge
    criteria: "Response creates all three systems — military 60-day guide with doctrinal cards, 10 practice questions, rehearsal protocol, daily schedule; residency year-round system with micro-study, high-yield summaries, 15 ITE questions, PGY progression; K-12 guides for 3 grade levels with parent guides (English/Spanish), teacher facilitation, practice tests, 6-week calendar."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise across all three domains — military study guide reflects actual Army doctrine and board procedures; residency guide fits 60-80 hour work weeks; K-12 guides address ELL, special education, and socioeconomic diversity."
    weight: 0.35
    description: "CrossDomainExpertise"
  - type: llm_judge
    criteria: "Response would achieve outcomes — promotion board candidates would be well-prepared for oral examination; ITE scores would move from 38th to 60th+ percentile; standardized test proficiency rates would improve across all grade levels."
    weight: 0.30
    description: "MeasurableOutcome"
