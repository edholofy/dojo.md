meta:
  id: enterprise-study-program
  level: 3
  course: study-guide-creation
  type: output
  description: "Design an enterprise-wide study guide program for a Fortune 500 company's professional certification initiative across 4 business units"
  tags: [enterprise, certification, multi-unit, advanced]

state: {}

trigger: |
  You're the Director of Learning & Development at
  a Fortune 500 insurance company (12,000 employees,
  4 business units). The CEO mandated that all
  customer-facing employees earn relevant professional
  certifications within 18 months.

  Business units and required certifications:
  - Claims (3,200 employees): AIC (Associate in Claims)
  - Underwriting (1,800 employees): CPCU (Chartered
    Property Casualty Underwriter)
  - Sales (2,500 employees): CIC (Certified Insurance
    Counselor)
  - Risk Management (800 employees): ARM (Associate
    in Risk Management)

  Current state:
  - Only 22% of employees hold relevant certifications
  - Past study materials: outdated PDFs from 2019
  - No centralized study program or support
  - Average pass rate on first attempt: 45%
  - Budget: $1.2M for the 18-month initiative
  - Employees study on personal time (no paid study
    hours currently)

  Design the enterprise study guide program:
  1. Program architecture — centralized platform with
     unit-specific study paths
  2. Study guide templates standardized across all
     4 certifications
  3. Blended learning model — self-study guides +
     study groups + instructor-led reviews
  4. Progress tracking and analytics dashboard
  5. Incentive structure to motivate completion
  6. ROI projection — certification impact on
     claims accuracy, underwriting quality, sales
     conversion, and risk assessment
  7. 18-month implementation timeline with milestones

assertions:
  - type: llm_judge
    criteria: "Response designs a complete enterprise program — centralized platform architecture with 4 certification paths; standardized study guide templates; blended learning model; analytics dashboard; incentive structure; ROI projection; 18-month timeline with milestones."
    weight: 0.35
    description: "EnterpriseProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise L&D expertise — the $1.2M budget is allocated realistically; the blended model addresses different learning preferences; analytics track meaningful metrics; incentives balance intrinsic and extrinsic motivation; study time policy is addressed."
    weight: 0.35
    description: "EnterpriseLDExpertise"
  - type: llm_judge
    criteria: "Response would achieve the mandate — pass rates would improve from 45% toward 80%+; certification rates would reach the CEO's goal; the ROI projection justifies the $1.2M investment; employees would be motivated to participate."
    weight: 0.30
    description: "CertificationMandateOutcome"
