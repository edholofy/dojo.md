meta:
  id: multilingual-study-program
  level: 3
  course: study-guide-creation
  type: output
  description: "Create a multilingual study guide program for an international medical school with students from 40+ countries studying in English"
  tags: [multilingual, international, medical, language-barriers, advanced]

state: {}

trigger: |
  You're the Director of Academic Support at an
  international medical school in the Caribbean that
  attracts students from 40+ countries. All
  instruction is in English, but 55% of students
  are non-native English speakers. These students
  score 18% lower on average on exams — not because
  they lack medical knowledge, but because study
  materials don't account for language barriers.

  Student language demographics:
  - Native English: 45%
  - Spanish-speaking: 18%
  - Hindi/Urdu-speaking: 12%
  - Arabic-speaking: 8%
  - Chinese-speaking: 7%
  - Other languages: 10%

  Current problems:
  - Study guides use complex medical English without
    glossing key terms
  - Idioms and colloquialisms in study materials
    confuse non-native speakers
  - Students translate study guides themselves
    (inaccurate, time-consuming)
  - Study groups form along language lines, reducing
    cross-cultural learning
  - USMLE prep disadvantages non-native speakers

  Design the multilingual study guide program:
  1. Multilingual medical glossary framework — key
     terms in English + 5 other languages with
     contextual usage
  2. "Clear English" study guide standards for all
     faculty-created materials
  3. Supplementary study guide modules in top 5
     non-English languages
  4. Cross-language study group facilitation toolkit
  5. Language-aware assessment strategies
  6. USMLE preparation guide specifically addressing
     language-based challenges
  7. Budget and resource allocation ($200K annual)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete multilingual program — medical glossary in 6 languages; Clear English standards; supplementary modules in 5 languages; cross-language study group toolkit; language-aware assessment; USMLE language preparation; $200K budget allocation."
    weight: 0.35
    description: "MultilingualProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates multilingual education expertise — the glossary addresses medical terminology nuances across languages; Clear English standards are specific and implementable; cross-language study groups are facilitated meaningfully; USMLE language challenges are addressed specifically."
    weight: 0.35
    description: "MultilingualExpertise"
  - type: llm_judge
    criteria: "Response would close the 18% performance gap — non-native speakers would have equitable study resources; study groups would become cross-cultural; USMLE prep would level the playing field; the investment produces measurable improvement."
    weight: 0.30
    description: "EquityOutcome"
