meta:
  id: competency-based-guide
  level: 3
  course: study-guide-creation
  type: output
  description: "Design a competency-based study guide system for a nursing program transitioning from content coverage to demonstrated competency"
  tags: [competency-based, nursing, mastery, assessment, advanced]

state: {}

trigger: |
  You're a curriculum designer helping a nursing
  program transition from traditional content-based
  study guides to competency-based mastery guides.
  The accrediting body (ACEN) now requires evidence
  of competency achievement, not just content
  exposure.

  Program context:
  - 4-year BSN program, 480 students
  - 12 core nursing competencies mapped to AACN
    Essentials
  - Students currently "check boxes" on study guides
    without demonstrating mastery
  - Preceptors report new graduates lack clinical
    judgment despite passing exams
  - NCLEX pass rate dropped from 92% to 84% over
    3 years

  Core competencies to map (select 4 for deep design):
  1. Clinical judgment and critical thinking
  2. Patient-centered care across the lifespan
  3. Evidence-based practice
  4. Pharmacological knowledge and medication safety

  Design the competency-based study guide system:
  1. Competency framework with observable milestones
     (novice → advanced beginner → competent)
  2. Study guide template that replaces "read chapter"
     with "demonstrate ability to..."
  3. Self-assessment rubrics for each competency level
  4. Clinical scenario libraries that test competency
     application (3 scenarios per competency)
  5. Portfolio evidence requirements — what artifacts
     demonstrate competency
  6. Remediation pathways for students not meeting
     competency milestones
  7. Faculty calibration guide for consistent
     competency assessment

assertions:
  - type: llm_judge
    criteria: "Response designs a complete competency system — framework with observable milestones for 4 competencies; study guide template focused on demonstration; self-assessment rubrics; clinical scenario library (12 scenarios); portfolio requirements; remediation pathways; faculty calibration guide."
    weight: 0.35
    description: "CompetencySystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates nursing education expertise — competencies align with AACN Essentials; milestones progress from novice to competent realistically; clinical scenarios test genuine judgment; rubrics distinguish performance levels meaningfully; the system addresses the clinical judgment gap."
    weight: 0.35
    description: "NursingEducationExpertise"
  - type: llm_judge
    criteria: "Response would improve outcomes — NCLEX pass rates would recover toward 92%+; preceptors would see improved clinical judgment; the 'checkbox' problem would be eliminated; ACEN competency requirements would be met."
    weight: 0.30
    description: "NursingOutcome"
