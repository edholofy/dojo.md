meta:
  id: study-guide-transformation-case
  level: 4
  course: study-guide-creation
  type: output
  description: "Write a detailed transformation case study — how a struggling test prep company reinvented its study guides and recovered from declining pass rates"
  tags: [transformation, case-study, test-prep, turnaround, expert]

state: {}

trigger: |
  You're the new VP of Content at PrepMaster, a
  test preparation company that's been losing market
  share for 3 years. The board hired you to turn
  around the study guide product line.

  Company situation:
  - Revenue: $45M (down from $62M three years ago)
  - Products: Study guides for CPA, PMP, Series 7,
    LSAT, MCAT
  - 180,000 active subscribers
  - Market share dropped from 28% to 19%
  - NPS: 22 (industry average: 45)
  - Pass rate claims: "90%+" but actual tracked rate
    is 67%
  - Content: Mostly unchanged since 2020
  - Technology: Static PDF study guides, basic
    flashcard app
  - Team: 12 content writers, 2 instructional
    designers, no data scientist

  Competitor analysis:
  - Competitor A: AI-powered adaptive learning, $8B
    valuation
  - Competitor B: Video-first with micro-lessons,
    growing 40% YoY
  - Competitor C: Community-driven with user-generated
    content

  Write the transformation plan:
  1. Diagnostic assessment — root cause analysis of
     the decline
  2. 18-month transformation roadmap with phases
  3. Study guide product reinvention — from static
     PDFs to adaptive learning platform
  4. Content strategy — how to modernize 5 product
     lines simultaneously
  5. Team restructuring and hiring plan
  6. Technology investment and build-vs-buy decisions
  7. Financial projections — cost of transformation
     vs expected revenue recovery
  8. Risk assessment and mitigation strategies

assertions:
  - type: llm_judge
    criteria: "Response creates a complete transformation plan — root cause diagnostic; 18-month roadmap with phases; product reinvention strategy; content modernization across 5 products; team restructuring; technology decisions; financial projections; risk assessment."
    weight: 0.35
    description: "TransformationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates turnaround expertise — root causes go beyond surface symptoms; the roadmap balances quick wins with long-term transformation; technology choices are realistic for a $45M company; financial projections are credible; team restructuring addresses skill gaps."
    weight: 0.35
    description: "TurnaroundExpertise"
  - type: llm_judge
    criteria: "Response would recover the business — pass rates would improve from 67% toward 85%+; NPS would recover from 22 toward 45+; market share decline would reverse; the transformation justifies the investment and positions PrepMaster competitively."
    weight: 0.30
    description: "BusinessRecoveryOutcome"
