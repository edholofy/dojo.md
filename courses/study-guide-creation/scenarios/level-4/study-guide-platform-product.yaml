meta:
  id: study-guide-platform-product
  level: 4
  course: study-guide-creation
  type: output
  description: "Build a product strategy for an AI-powered study guide generation platform — product vision, technical architecture, and go-to-market plan"
  tags: [product, platform, ai-powered, startup, expert]

state: {}

trigger: |
  You're the co-founder and CPO of StudyForge, an
  AI-powered platform that generates personalized
  study guides from any course material. You've
  raised $3M in seed funding and need to build the
  product strategy.

  Platform capabilities:
  - Upload: Students upload syllabi, lecture notes,
    textbooks (PDF/DOCX), and lecture recordings
  - AI Processing: GPT-based extraction of key
    concepts, learning objectives, and relationships
  - Generation: Auto-creates study guides in multiple
    formats (outline, Cornell, flashcards, mind map,
    practice questions)
  - Personalization: Adapts to individual learning
    style, pace, and knowledge gaps
  - Social: Study group features, shared annotations,
    peer explanations

  Market research:
  - TAM: $12B global test prep and study tools market
  - Target: 20M US college students
  - Competitors: Quizlet ($1B valuation), Chegg Study,
    Course Hero, Notion AI
  - Differentiator: Full study guide generation (not
    just flashcards or Q&A)

  Build the product strategy:
  1. Product vision and mission statement
  2. User personas (3 detailed personas)
  3. Feature prioritization (MVP vs V2 vs V3)
  4. Technical architecture — AI pipeline from upload
     to generated study guide
  5. Monetization strategy (freemium, pricing tiers)
  6. Go-to-market plan — campus ambassador program
     and growth strategy
  7. Success metrics and KPIs
  8. 12-month product roadmap

assertions:
  - type: llm_judge
    criteria: "Response builds a complete product strategy — vision/mission; 3 user personas; feature prioritization (MVP/V2/V3); technical architecture; monetization strategy; go-to-market plan; KPIs; 12-month roadmap."
    weight: 0.35
    description: "ProductStrategyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product management expertise — personas represent real student segments; MVP is focused and shippable; technical architecture is feasible with $3M; monetization balances growth with revenue; go-to-market leverages network effects; KPIs measure what matters."
    weight: 0.35
    description: "ProductExpertise"
  - type: llm_judge
    criteria: "Response would attract users and investors — the platform differentiates meaningfully from Quizlet and Chegg; the campus ambassador program would drive viral growth; the $3M seed is allocated efficiently; the roadmap builds toward Series A milestones."
    weight: 0.30
    description: "MarketSuccessOutcome"
