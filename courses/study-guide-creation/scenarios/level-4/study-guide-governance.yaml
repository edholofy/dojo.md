meta:
  id: study-guide-governance
  level: 4
  course: study-guide-creation
  type: output
  description: "Design a governance framework for study guide quality, accuracy, and currency across a large healthcare education system"
  tags: [governance, quality-assurance, healthcare, standards, expert]

state: {}

trigger: |
  You're the Chief Learning Officer of a healthcare
  education system spanning 12 hospitals, 3 medical
  schools, and 8 nursing programs. A near-miss
  patient safety incident was traced to an outdated
  study guide that still referenced a withdrawn drug
  protocol.

  Current state:
  - 4,200+ study guides across the system
  - No centralized review or update process
  - Average guide age: 3.2 years (some over 8 years)
  - 340 guides reference outdated clinical guidelines
  - No version control or change tracking
  - 28 different authoring platforms in use
  - No accuracy verification process
  - Clinical guidelines update every 2-3 years

  Regulatory context:
  - ACGME requires current evidence-based education
  - Joint Commission standards on staff competency
  - State nursing boards mandate current curricula
  - Specialty boards require updated MOC materials

  Design the governance framework:
  1. Study guide lifecycle management policy — from
     creation through retirement
  2. Quality standards with accuracy verification
     requirements
  3. Review and update cycle (triggered by guideline
     changes, scheduled reviews, incident reports)
  4. Centralized study guide repository with version
     control
  5. Content accuracy review board — composition,
     charter, review process
  6. Author accountability and training requirements
  7. Compliance reporting dashboard
  8. Incident response protocol — what happens when
     an inaccurate guide is discovered

assertions:
  - type: llm_judge
    criteria: "Response creates a complete governance framework — lifecycle management policy; quality standards with accuracy verification; review/update cycle with multiple triggers; centralized repository with version control; content review board; author accountability; compliance dashboard; incident response protocol."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates healthcare governance expertise — ACGME and Joint Commission requirements are addressed; the review cycle responds to clinical guideline updates; the incident response protocol prevents patient safety risks; the system scales across 12 hospitals and 11 academic programs."
    weight: 0.35
    description: "HealthcareGovernanceExpertise"
  - type: llm_judge
    criteria: "Response would prevent future incidents — the 340 outdated guides would be identified and remediated; the 3.2-year average age would decrease; the near-miss incident could not recur; regulatory compliance would be maintained continuously."
    weight: 0.30
    description: "SafetyOutcome"
