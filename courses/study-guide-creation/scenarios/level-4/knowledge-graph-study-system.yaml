meta:
  id: knowledge-graph-study-system
  level: 4
  course: study-guide-creation
  type: output
  description: "Build a knowledge graph-powered study guide system that maps prerequisite relationships and generates personalized learning paths"
  tags: [knowledge-graph, prerequisites, learning-paths, ai, expert]

state: {}

trigger: |
  You're the VP of Product at an ed-tech company
  building a knowledge graph-powered study system
  for computer science education. The system maps
  every concept's prerequisite relationships and
  generates optimal study paths.

  Knowledge graph scope:
  - 2,500 CS concepts from introductory to graduate
    level
  - 8,000+ prerequisite relationships
  - Covers: programming fundamentals, data structures,
    algorithms, databases, networking, OS, AI/ML,
    software engineering
  - Each concept has: definition, difficulty level,
    estimated study time, associated practice problems

  Use cases:
  - University student: "I need to learn machine
    learning. What prerequisites am I missing?"
  - Bootcamp grad: "I know JavaScript and React.
    What CS fundamentals should I study?"
  - Career changer: "I'm a data analyst. Build me a
    study path to become a backend engineer."
  - Professor: "Generate a study guide for my
    Algorithms course that builds on Data Structures."

  Design the knowledge graph study system:
  1. Knowledge graph architecture — concept nodes,
     prerequisite edges, difficulty levels, clusters
  2. Prerequisite gap analysis algorithm — how the
     system identifies what a learner is missing
  3. Learning path generation — how optimal study
     sequences are created
  4. Dynamic study guide generation — how the system
     creates personalized guides from the graph
  5. Example outputs for each of the 4 use cases
  6. Content recommendation engine — how the system
     suggests specific resources for each concept
  7. Progress tracking — how mastery updates the
     graph and unlocks new concepts

assertions:
  - type: llm_judge
    criteria: "Response builds a complete knowledge graph system — graph architecture with nodes/edges/clusters; gap analysis algorithm; learning path generation; dynamic guide generation; example outputs for all 4 use cases; content recommendation engine; mastery-based progress tracking."
    weight: 0.35
    description: "KnowledgeGraphCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates graph-based learning expertise — prerequisite relationships are meaningful (not just topological sort); gap analysis considers partial knowledge; learning paths optimize for time and prerequisites; dynamic guides are genuinely personalized; progress tracking is granular."
    weight: 0.35
    description: "KnowledgeGraphExpertise"
  - type: llm_judge
    criteria: "Response would transform CS education — the 4 use case examples demonstrate clear value; students would efficiently fill knowledge gaps; professors would save time generating aligned guides; the system would reveal hidden prerequisites."
    weight: 0.30
    description: "TransformativeOutcome"
