meta:
  id: study-guide-book-proposal
  level: 4
  course: study-guide-creation
  type: output
  description: "Write a book proposal for 'The Science of Study Guides' — framework for evidence-based study material design with 2 sample chapters"
  tags: [book-proposal, publishing, evidence-based, expert]

state: {}

trigger: |
  You're proposing a book to a major academic
  publisher: "The Science of Study Guides: Evidence-
  Based Design for Effective Learning."

  Book premise: Study guides are the most widely used
  learning tool in the world, yet most are designed
  by intuition rather than evidence. This book bridges
  learning science research with practical study
  guide design.

  Target audience: Instructional designers, educators,
  corporate L&D professionals, ed-tech product
  managers, and graduate students in education.

  Proposed structure (12 chapters):
  Part I: The Science (Ch 1-4)
  Part II: The Design (Ch 5-8)
  Part III: The Practice (Ch 9-12)

  Write the book proposal:
  1. Query letter to the publisher (1 page)
  2. Full book proposal with chapter-by-chapter
     outline and descriptions
  3. Market analysis — competing titles, market gap,
     target audience size
  4. Author platform and qualifications
  5. Write Chapter 1: "Why Most Study Guides Fail"
     (~3,000 words — explores common design mistakes
     through the lens of cognitive science)
  6. Write Chapter 7: "Designing for Retention: The
     Spaced Repetition Study Guide" (~3,000 words —
     practical framework for integrating spaced
     repetition into study guide design)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal — query letter; chapter-by-chapter outline for all 12 chapters; market analysis with competitors and gaps; author platform; Chapter 1 (~3,000 words) on why guides fail; Chapter 7 (~3,000 words) on spaced repetition design."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates publishing and learning science expertise — the query letter hooks the publisher; chapter outline shows logical progression; Chapter 1 grounds common failures in cognitive science (dual coding, cognitive load, testing effect); Chapter 7 provides actionable spaced repetition frameworks."
    weight: 0.35
    description: "PublishingScholarshipQuality"
  - type: llm_judge
    criteria: "Response would get published — the market analysis identifies a genuine gap; the book would be adopted in instructional design programs; Chapter 1 would compel readers to redesign their study guides; Chapter 7 would become a reference for spaced repetition implementation."
    weight: 0.30
    description: "PublishingOutcome"
