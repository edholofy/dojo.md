meta:
  id: study-guide-for-crisis
  level: 4
  course: study-guide-creation
  type: output
  description: "Design rapid-deployment study guide systems for crisis education — pandemic response, disaster preparedness, and emergency workforce training"
  tags: [crisis-education, rapid-deployment, emergency, pandemic, expert]

state: {}

trigger: |
  You're the Chief Education Officer for a global
  health NGO. A new pandemic has emerged and you need
  to create study guide systems that can train
  healthcare workers across 30 countries within weeks,
  not months.

  Crisis context:
  - Novel respiratory pathogen with 3% mortality rate
  - 30 countries affected, 15 languages needed
  - Healthcare workers need training on: diagnosis,
    treatment protocol, PPE procedures, patient
    triage, ventilator management, infection control
  - Many frontline workers have limited formal
    medical training (community health workers)
  - Internet connectivity varies (some areas have
    no reliable internet)
  - Existing training materials are irrelevant to
    this new pathogen

  Constraints:
  - Content must be created in 72 hours (initial
    version)
  - Must work offline (print, SMS, basic feature
    phone)
  - Must accommodate varying literacy levels
    (grade 4 to postgraduate)
  - Must be updatable as the science evolves
  - Budget: $500K emergency allocation
  - WHO guidelines change weekly during early pandemic

  Design the crisis study guide system:
  1. Rapid content development process — from WHO
     guidelines to deployable study guide in 72 hours
  2. Tiered study guides by healthcare worker level
     (community, nurse, physician)
  3. Multi-channel delivery (print, SMS, app, radio
     scripts)
  4. Translation and localization pipeline for 15
     languages
  5. Version management for rapidly evolving guidance
  6. Assessment system verifying competency before
     deployment
  7. Field feedback mechanism for reporting guide
     problems

assertions:
  - type: llm_judge
    criteria: "Response creates a complete crisis education system — 72-hour development process; tiered guides for 3 worker levels; 4-channel delivery (print/SMS/app/radio); 15-language pipeline; version management for evolving guidance; competency assessment; field feedback mechanism."
    weight: 0.35
    description: "CrisisSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates crisis education expertise — the 72-hour timeline is operationally realistic; tiered content matches varying training levels; offline delivery addresses connectivity constraints; version management handles weekly WHO updates; literacy levels are accommodated."
    weight: 0.35
    description: "CrisisEducationExpertise"
  - type: llm_judge
    criteria: "Response would save lives — healthcare workers would be competent to treat patients safely; community health workers would recognize cases and triage correctly; the system would scale across 30 countries; rapid updates would keep guidance current as science evolves."
    weight: 0.30
    description: "LifeSavingOutcome"
