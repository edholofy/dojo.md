meta:
  id: study-guide-consulting-practice
  level: 4
  course: study-guide-creation
  type: output
  description: "Launch a consulting practice specializing in study guide design — methodology, service offerings, and client proposals for 3 different sectors"
  tags: [consulting, methodology, practice-launch, expert]

state: {}

trigger: |
  You're launching "LearnCraft Consulting," a
  boutique firm specializing in study guide design
  and learning material optimization. After 15 years
  as an instructional designer, you're building a
  consulting practice around your proprietary
  methodology.

  Your methodology: The GUIDE Framework
  - G: Gap analysis (identify knowledge gaps and
    learning objectives)
  - U: User research (understand learner profiles,
    preferences, constraints)
  - I: Information architecture (organize content
    for optimal retention)
  - D: Design and development (create multi-format
    study materials)
  - E: Evaluation and iteration (measure effectiveness,
    refine continuously)

  Build the consulting practice:
  1. The GUIDE Framework methodology document —
     detailed description of each phase with
     deliverables, tools, and timelines
  2. Service catalog (5-7 service offerings with
     descriptions, deliverables, and pricing tiers)
  3. Write 3 proposals for different client types:
     a. University (redesign study guides for a
        nursing program, $75K budget)
     b. Corporation (create certification study
        materials for 2,000 employees, $150K budget)
     c. Test prep company (audit and improve their
        study guide product line, $200K budget)
  4. Case study template showing ROI of study guide
     improvements
  5. Competitive positioning — how you differentiate
     from generic instructional design firms

assertions:
  - type: llm_judge
    criteria: "Response builds a complete consulting practice — GUIDE Framework methodology with phases/deliverables/tools; 5-7 service offerings with pricing; 3 detailed proposals (university $75K, corporation $150K, test prep $200K); case study template; competitive positioning."
    weight: 0.35
    description: "ConsultingPracticeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates consulting expertise — the GUIDE Framework is rigorous and practical; proposals are tailored to each client's context; pricing reflects market reality; the competitive positioning identifies genuine differentiators; the case study template quantifies ROI."
    weight: 0.35
    description: "ConsultingExpertise"
  - type: llm_judge
    criteria: "Response would win clients — the university proposal addresses nursing program needs specifically; the corporate proposal scales to 2,000 employees; the test prep audit proposal demonstrates product improvement expertise; all proposals justify their budgets with expected outcomes."
    weight: 0.30
    description: "ClientAcquisitionOutcome"
