meta:
  id: study-guide-certification-program
  level: 4
  course: study-guide-creation
  type: output
  description: "Create a professional certification program for study guide designers — competency framework, curriculum, and credentialing"
  tags: [certification, professional-development, credentialing, expert]

state: {}

trigger: |
  You're founding the International Association for
  Learning Material Design (IALMD) and creating the
  first professional certification for study guide
  designers: the Certified Learning Material
  Designer (CLMD) credential.

  Market need:
  - No existing certification for study guide design
  - Employers can't verify candidate quality
  - Self-taught designers lack standardized knowledge
  - Ed-tech companies need qualified content creators
  - Healthcare and legal sectors need accuracy
    assurance

  Certification tiers:
  - CLMD-Foundation: Entry-level, demonstrates basic
    competency
  - CLMD-Professional: Mid-career, demonstrates
    advanced skills
  - CLMD-Master: Expert level, demonstrates thought
    leadership and mentorship

  Design the certification program:
  1. Competency framework — 8 core competencies with
     proficiency levels mapped to each tier
  2. Certification requirements for each tier
     (education, experience, exam, portfolio)
  3. Exam blueprint — domains, weights, question
     types, passing scores
  4. Study guide (meta: a study guide for the study
     guide certification) for the Foundation exam
  5. Recertification requirements (continuing
     education, portfolio updates)
  6. Program governance — board composition,
     standard-setting process, appeals
  7. Launch strategy and first-year enrollment targets

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification program — 8-competency framework with proficiency levels; requirements for all 3 tiers; exam blueprint with domains/weights/question types; Foundation study guide; recertification requirements; governance structure; launch strategy."
    weight: 0.35
    description: "CertificationProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates credentialing expertise — competencies cover the full scope of study guide design; the exam blueprint follows psychometric best practices; the 3-tier progression is logical; governance includes standard-setting and appeals; recertification maintains currency."
    weight: 0.35
    description: "CredentialingExpertise"
  - type: llm_judge
    criteria: "Response would establish a recognized credential — employers would value CLMD certification; the competency framework would become the industry standard; the certification would elevate study guide design as a profession; the launch strategy is realistic."
    weight: 0.30
    description: "ProfessionalRecognitionOutcome"
