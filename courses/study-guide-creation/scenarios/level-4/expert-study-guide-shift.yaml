meta:
  id: expert-study-guide-shift
  level: 4
  course: study-guide-creation
  type: output
  description: "Shift simulation — design study guide systems for astronaut training, judicial continuing education, and indigenous knowledge preservation"
  tags: [shift-simulation, multi-context, expert]

state: {}

trigger: |
  You're a world-renowned instructional designer
  consulting on three extraordinary projects.

  === PROJECT 1: Astronaut Training ===
  NASA is redesigning study materials for the
  Artemis lunar mission crew. Astronaut candidates
  must master:
  - Spacecraft systems (Orion capsule, SLS, Gateway)
  - Lunar surface operations (EVA procedures, geology
    sampling, habitat setup)
  - Emergency procedures (rapid decompression, fire,
    medical emergencies in space)
  - Scientific experiments (20 experiments across
    biology, physics, geology)

  Constraints: Study must be possible during transit
  (limited screen time, no internet), high-stress
  environment, life-critical accuracy. Training
  period: 24 months. Crew: 4 astronauts with
  different specialties.

  Create: A study guide system with mission-specific
  quick-reference cards, emergency procedure
  checklists (memorize and verify format), science
  experiment protocols, and a cross-training matrix
  ensuring all 4 crew members can perform critical
  tasks.

  === PROJECT 2: Judicial Continuing Education ===
  The Federal Judicial Center needs study guides for
  600 federal judges on emerging areas of law:
  - AI and algorithmic decision-making in courts
  - Cryptocurrency and digital asset cases
  - Climate litigation and standing issues
  - Social media evidence authentication

  Challenge: Judges average 25+ years of experience,
  are highly resistant to being "taught," and have
  extremely limited time (max 2 hours per topic).
  Materials must respect their expertise while
  filling genuine knowledge gaps.

  Create: Study guides for each topic that use a
  "bench memo" format familiar to judges, include
  case law summaries and hypothetical scenarios, and
  provide quick-reference decision frameworks.

  === PROJECT 3: Indigenous Knowledge Preservation ===
  An Aboriginal community in Australia wants to create
  study guides to teach traditional ecological
  knowledge to their youth (ages 12-18). Knowledge
  areas: fire management (cool burning), medicinal
  plants, water finding, seasonal food gathering,
  and star navigation.

  Challenge: Knowledge is traditionally oral, not
  written. Elders are aging (only 8 fluent knowledge
  holders remain). The study guide must preserve
  cultural authenticity while making knowledge
  accessible to youth raised with smartphones.

  Create: A culturally respectful study guide
  framework that honors oral traditions while
  creating durable learning materials — including
  elder interview protocols, bilingual terminology
  guides, land-based activity instructions, and a
  digital storytelling component.

  Write all three study guide systems.

assertions:
  - type: llm_judge
    criteria: "Response creates all three systems — NASA study guides with quick-reference cards, emergency checklists, science protocols, and cross-training matrix; judicial bench memo-style guides for 4 emerging law topics with case summaries and decision frameworks; indigenous knowledge guides with elder protocols, bilingual terminology, land-based activities, and digital storytelling."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise across all domains — NASA materials are mission-critical accurate; judicial materials respect judge expertise and use familiar formats; indigenous materials honor oral traditions and cultural protocols; each guide matches its unique constraints."
    weight: 0.35
    description: "CrossDomainMastery"
  - type: llm_judge
    criteria: "Response would serve each community — astronauts could perform emergency procedures from memory; judges could make informed decisions on novel legal issues; indigenous youth could learn and preserve traditional knowledge for future generations."
    weight: 0.30
    description: "CommunityImpactOutcome"
