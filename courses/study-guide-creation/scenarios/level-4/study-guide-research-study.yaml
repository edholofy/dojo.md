meta:
  id: study-guide-research-study
  level: 4
  course: study-guide-creation
  type: output
  description: "Design a multi-institution research study measuring the impact of different study guide formats on learning outcomes, retention, and exam performance"
  tags: [research, multi-institution, effectiveness, evidence-based, expert]

state: {}

trigger: |
  You're a principal investigator at an education
  research center designing a landmark study on
  study guide effectiveness. No large-scale study
  has ever compared study guide formats head-to-head
  with rigorous methodology.

  Research questions:
  1. Which study guide format (outline, Cornell,
     concept map, flashcard, interactive digital)
     produces the highest exam scores?
  2. Which format produces the best long-term
     retention (30 days, 90 days)?
  3. How do learner characteristics (learning style,
     prior knowledge, motivation) moderate format
     effectiveness?
  4. What is the cost-effectiveness of each format?

  Study parameters:
  - 5 participating universities (diverse
    demographics)
  - Target sample: 2,500 students across introductory
    psychology courses
  - 5 study guide conditions + 1 control (no guide)
  - Funding: $350K NSF grant over 2 years

  Design the research study:
  1. Literature review framework — key prior research
     and theoretical foundations
  2. Methodology — experimental design, random
     assignment, controls for confounders
  3. Instruments — how you measure learning outcomes,
     retention, learner characteristics
  4. Data analysis plan — statistical methods for
     each research question
  5. Timeline — 2-year project with phases
  6. Expected contributions to the field
  7. Limitations and ethical considerations (IRB)

assertions:
  - type: llm_judge
    criteria: "Response designs a complete research study — literature review framework; experimental methodology with randomization and controls; measurement instruments; data analysis plan addressing all 4 research questions; 2-year timeline; expected contributions; ethical considerations."
    weight: 0.35
    description: "ResearchStudyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research methodology expertise — the experimental design controls for confounders (instructor effects, course difficulty); randomization is properly structured; statistical methods are appropriate (ANOVA, regression, mixed-effects models); instruments have established validity; IRB considerations are thorough."
    weight: 0.35
    description: "ResearchMethodologyQuality"
  - type: llm_judge
    criteria: "Response would advance the field — the study would produce publishable findings in top education journals; results would inform evidence-based study guide design; the $350K investment is justified by expected impact; the multi-institution design increases generalizability."
    weight: 0.30
    description: "FieldAdvancementOutcome"
