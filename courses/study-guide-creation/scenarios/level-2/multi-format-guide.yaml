meta:
  id: multi-format-guide
  level: 2
  course: study-guide-creation
  type: output
  description: "Create a study guide in multiple formats for different learning preferences — outline, Cornell, mind map, and flashcard versions"
  tags: [multi-format, learning-styles, study-methods, intermediate]

state: {}

trigger: |
  You're designing study materials for a college
  Economics 101 midterm. The professor wants the same
  content presented in 4 different study guide formats
  so students can choose the format that works best
  for them.

  Content to cover:
  - Supply and demand (equilibrium, shifts, elasticity)
  - Market structures (perfect competition, monopoly,
    oligopoly, monopolistic competition)
  - GDP and economic indicators (unemployment,
    inflation, CPI)
  - Fiscal policy (government spending, taxation,
    budget deficits)
  - Monetary policy (Federal Reserve, interest rates,
    money supply)

  Create the same study guide content in 4 formats:
  1. Outline format: Hierarchical bullet points with
     main topics, subtopics, and key details
  2. Cornell notes format: Left column (cue
     questions), right column (notes/answers),
     bottom (summary)
  3. Mind map format: Text description of a mind map
     with central concepts, branches, and connections
  4. Flashcard set: 25 front/back flashcard pairs
     covering the most testable concepts

  For each format, explain:
  - When this format works best
  - What type of learner benefits most
  - How to use this format for self-testing

assertions:
  - type: llm_judge
    criteria: "Response creates all 4 formats covering the same economics content — outline with hierarchical structure; Cornell notes with cue questions and summaries; mind map description with branches and connections; 25 flashcard pairs. Each format includes usage guidance."
    weight: 0.35
    description: "MultiFormatCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates study format expertise — each format leverages its unique strengths; Cornell notes have effective cue questions; the mind map shows meaningful concept relationships; flashcards isolate testable knowledge; format recommendations match learning science."
    weight: 0.35
    description: "FormatExpertiseQuality"
  - type: llm_judge
    criteria: "Response would serve diverse learners — visual learners would gravitate to the mind map; detail-oriented learners to the outline; self-testers to Cornell notes; on-the-go studiers to flashcards; each format independently covers the essential content."
    weight: 0.30
    description: "LearnerDiversityOutcome"
