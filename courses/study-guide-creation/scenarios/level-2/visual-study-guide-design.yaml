meta:
  id: visual-study-guide-design
  level: 2
  course: study-guide-creation
  type: output
  description: "Design a visual study guide using concept maps, infographics, and diagrams for an anatomy course"
  tags: [visual-design, concept-maps, anatomy, intermediate]

state: {}

trigger: |
  You're an educational designer working with an
  anatomy professor who wants to create a highly
  visual study guide for the cardiovascular system
  unit. Research shows anatomy students retain 65%
  more information when studying with visual aids
  versus text-only materials.

  Content to visualize:
  - Heart anatomy (4 chambers, valves, great vessels)
  - Cardiac cycle (systole, diastole, electrical
    conduction)
  - Blood vessel types (arteries, veins, capillaries)
  - Major circulatory pathways (pulmonary,
    systemic, coronary)
  - Blood pressure regulation (neural, hormonal,
    renal mechanisms)
  - Common cardiovascular pathologies (atherosclerosis,
    MI, heart failure, arrhythmias)

  Design a visual study guide that:
  1. Describes concept maps showing relationships
     between cardiovascular structures and functions
  2. Creates comparison tables (arteries vs veins,
     systole vs diastole)
  3. Designs flowcharts for the cardiac cycle and
     blood pressure regulation
  4. Describes infographic layouts for pathology
     progression
  5. Includes labeled diagram descriptions with
     annotation guides for students to practice
  6. Provides "draw it yourself" exercises where
     students recreate diagrams from memory
  7. Creates a visual vocabulary linking medical terms
     to their Greek/Latin roots with visual mnemonics

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive visual study guide — concept maps for structure-function relationships; comparison tables (arteries/veins, systole/diastole); cardiac cycle flowcharts; pathology infographic descriptions; labeled diagram guides; draw-it-yourself exercises; visual vocabulary with etymological roots."
    weight: 0.35
    description: "VisualGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates visual learning design expertise — concept maps show meaningful relationships not just labels; flowcharts accurately represent physiological sequences; comparison tables highlight clinically relevant differences; visual mnemonics are memorable and accurate."
    weight: 0.35
    description: "VisualDesignQuality"
  - type: llm_judge
    criteria: "Response would improve anatomy retention — the 65% visual advantage would be realized; draw-it-yourself exercises promote active recall; students could use these visuals to study independently; the guide bridges memorization with understanding."
    weight: 0.30
    description: "AnatomyRetentionOutcome"
