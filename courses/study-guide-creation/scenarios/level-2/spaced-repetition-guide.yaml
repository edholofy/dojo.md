meta:
  id: spaced-repetition-guide
  level: 2
  course: study-guide-creation
  type: output
  description: "Design a study guide system with integrated spaced repetition scheduling for medical terminology"
  tags: [spaced-repetition, medical, scheduling, intermediate]

state: {}

trigger: |
  You're an instructional designer at a medical
  school creating a study guide system for first-year
  students learning medical terminology (Anatomy &
  Physiology I). The course covers 450+ terms across
  8 body systems over 16 weeks.

  Current problem:
  - Students cram before exams and forget 60% within
    2 weeks
  - Average exam scores drop 15 points between
    midterm and cumulative final
  - Students report feeling overwhelmed by volume

  Body systems covered (in order):
  1. Integumentary (35 terms)
  2. Skeletal (65 terms)
  3. Muscular (60 terms)
  4. Nervous (70 terms)
  5. Endocrine (45 terms)
  6. Cardiovascular (55 terms)
  7. Respiratory (50 terms)
  8. Digestive (70 terms)

  Design a study guide system that:
  1. Integrates spaced repetition intervals (1-day,
     3-day, 7-day, 14-day, 30-day review cycles)
  2. Creates a 16-week study calendar showing when
     each body system's terms should be reviewed
  3. Designs flashcard templates with front/back
     format optimized for medical terms (term, root
     breakdown, definition, clinical example)
  4. Includes "interleaving" — mixing terms from
     different systems in review sessions
  5. Provides self-assessment checkpoints every 2
     weeks
  6. Addresses the cumulative final by building
     long-term retention from week 1

assertions:
  - type: llm_judge
    criteria: "Response creates a complete spaced repetition study system — specific review intervals defined; 16-week study calendar showing review timing for all 8 body systems; flashcard templates with medical-specific format; interleaving strategy; biweekly checkpoints; cumulative final preparation built in."
    weight: 0.35
    description: "SpacedRepetitionCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates learning science expertise — spaced repetition intervals follow evidence-based patterns; interleaving enhances discrimination between similar terms; the system addresses the forgetting curve; flashcard design promotes active recall over recognition."
    weight: 0.35
    description: "LearningSciencelQuality"
  - type: llm_judge
    criteria: "Response would solve the retention problem — students would retain terms long-term instead of cramming; the 15-point final exam drop would be reduced; the system manages 450+ terms without overwhelming students."
    weight: 0.30
    description: "RetentionOutcome"
