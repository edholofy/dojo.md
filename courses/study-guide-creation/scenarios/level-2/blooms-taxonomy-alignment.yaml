meta:
  id: blooms-taxonomy-alignment
  level: 2
  course: study-guide-creation
  type: output
  description: "Redesign a study guide using Bloom's taxonomy to progress from recall to higher-order thinking"
  tags: [blooms-taxonomy, cognitive-levels, redesign, intermediate]

state: {}

trigger: |
  You're a curriculum consultant reviewing a study
  guide for a college-level Environmental Science
  course. The current guide is entirely recall-based
  — just lists of facts and definitions. The
  professor wants the guide redesigned to develop
  higher-order thinking skills.

  Current guide problems:
  - All questions are "define" or "list" (Remember
    level only)
  - No application to real-world scenarios
  - Students can pass the exam but can't apply
    knowledge
  - The course has a capstone project requiring
    analysis and evaluation

  Course topics:
  - Ecosystems and biodiversity
  - Climate change science and policy
  - Water resources and pollution
  - Energy systems (fossil fuels, renewables)
  - Waste management and circular economy

  Redesign the study guide to include all 6 levels
  of Bloom's taxonomy:
  1. Map each topic to learning objectives at all
     6 cognitive levels (Remember, Understand, Apply,
     Analyze, Evaluate, Create)
  2. Write 2 study questions per topic per Bloom's
     level (60 questions total)
  3. Create a visual "Bloom's ladder" showing how
     concepts build from recall to creation
  4. Design a self-assessment rubric students can
     use to gauge their cognitive level
  5. Include scaffolding tips — how to move from
     lower to higher levels

assertions:
  - type: llm_judge
    criteria: "Response redesigns the guide with all 6 Bloom's levels — learning objectives mapped for each topic at each level; 2 questions per topic per level (60 total across 5 topics × 6 levels); Bloom's ladder visualization; self-assessment rubric; scaffolding tips."
    weight: 0.35
    description: "BloomsAlignmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates Bloom's taxonomy mastery — questions genuinely represent each cognitive level (not just relabeled recall); the progression from Remember to Create is logical; self-assessment rubric accurately distinguishes levels; scaffolding bridges gaps between levels."
    weight: 0.35
    description: "BloomsTaxonomyQuality"
  - type: llm_judge
    criteria: "Response would develop higher-order thinking — students using this guide would move beyond memorization; the capstone project would be better supported; the guide creates thinkers, not just test-takers."
    weight: 0.30
    description: "HigherOrderThinkingOutcome"
