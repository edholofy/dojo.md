meta:
  id: intermediate-study-guide-shift
  level: 2
  course: study-guide-creation
  type: output
  description: "Shift simulation — create study guides for a bar exam taker, a corporate onboarding program, and an ESL student preparing for TOEFL"
  tags: [shift-simulation, multi-context, intermediate]

state: {}

trigger: |
  You're an educational consultant hired by three
  very different clients in the same week.

  === CLIENT 1: Bar Exam Preparation ===
  A recent law graduate is preparing for the Uniform
  Bar Exam (UBE). They failed their first attempt by
  12 points (scored 258, needed 270). Their weakness
  analysis shows:
  - MEE (Multistate Essay Exam): Scored 3.2/6 average
    (needed 4.0+) — weak in Constitutional Law and
    Evidence
  - MBE (Multistate Bar Exam): Scored 135/200 — weak
    in Civil Procedure and Torts
  - MPT (Multistate Performance Test): Scored well

  Create: A targeted 8-week study guide that focuses
  on their specific weaknesses, includes daily
  practice essay schedules, MBE question strategies,
  and a score improvement tracking system.

  === CLIENT 2: Corporate Sales Onboarding ===
  A SaaS company (CRM platform, 500 employees) needs
  a study guide for new sales reps' product
  certification. New reps must pass a product
  knowledge assessment (85% to certify) within their
  first 30 days. Current pass rate: 62%.

  Product areas: CRM features (contacts, deals,
  pipelines), integrations (email, calendar, API),
  pricing and packaging (3 tiers), competitive
  differentiators, and common objection handling.

  Create: A 30-day study guide with daily learning
  modules, product knowledge cheat sheets, role-play
  scenario scripts, and a practice assessment with
  answer key.

  === CLIENT 3: TOEFL Preparation ===
  An international student from South Korea (native
  Korean speaker, intermediate English) needs to
  score 100+ on the TOEFL iBT for graduate school
  admission. Current practice score: 78. Weakest
  sections: Speaking (16/30) and Writing (18/30).

  Create: A 12-week study guide focusing on Speaking
  and Writing improvement, with daily practice
  activities, template responses for common prompts,
  pronunciation practice strategies, and progress
  checkpoints every 2 weeks.

  Write all three study guides.

assertions:
  - type: llm_judge
    criteria: "Response creates all three study guides — bar exam 8-week plan targeting Constitutional Law, Evidence, Civil Procedure, Torts with essay schedules and MBE strategies; corporate 30-day guide with daily modules, cheat sheets, role-plays, and practice assessment; TOEFL 12-week plan focused on Speaking and Writing with templates and pronunciation practice."
    weight: 0.35
    description: "ShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise across all three domains — bar exam guide targets specific score gaps; corporate guide addresses the 62% pass rate problem with structured learning; TOEFL guide addresses Speaking and Writing weaknesses with language-specific strategies for Korean speakers."
    weight: 0.35
    description: "CrossDomainExpertise"
  - type: llm_judge
    criteria: "Response would achieve measurable outcomes — the bar exam taker would gain 12+ points; the sales pass rate would improve from 62% toward 85%+; the TOEFL student would progress from 78 toward 100+."
    weight: 0.30
    description: "MeasurableOutcome"
