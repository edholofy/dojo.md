meta:
  id: collaborative-study-guide
  level: 2
  course: study-guide-creation
  type: output
  description: "Design a collaborative study guide system where a study group of 6 students creates and shares study materials"
  tags: [collaborative, study-group, peer-learning, intermediate]

state: {}

trigger: |
  You're the study group leader for a Biochemistry
  course. Your group of 6 students wants to create a
  collaborative study guide for the final exam, but
  past attempts have resulted in uneven quality,
  duplicated effort, and missing topics.

  Group members and strengths:
  - Alex: Strong in protein structure and enzymology
  - Brianna: Strong in metabolism and bioenergetics
  - Carlos: Strong in molecular biology (DNA/RNA)
  - Diana: Strong in cell signaling and membranes
  - Ethan: Good at creating visual summaries/diagrams
  - Fatima: Good at writing practice questions

  Final exam coverage:
  - Amino acids and protein structure (Chapters 3-6)
  - Enzymes and kinetics (Chapters 7-8)
  - Metabolism: glycolysis, TCA, ETC (Chapters 14-19)
  - Nucleic acids and gene expression (Chapters 25-28)
  - Cell signaling and membrane transport (Chapters 9-12)
  - Integration of metabolism (Chapter 23)

  Design a collaborative study guide system:
  1. Task assignment matrix — who creates what, based
     on strengths
  2. Quality standards template — consistent format
     all members must follow
  3. Peer review process — how members review each
     other's contributions
  4. Integration plan — how individual sections become
     a unified guide
  5. Group study session agenda (2-hour session using
     the completed guide)
  6. "Teach-back" protocol — each member teaches
     their section to the group

assertions:
  - type: llm_judge
    criteria: "Response creates a complete collaborative system — task assignments matching member strengths; quality standards template with consistent format; peer review process; integration plan; 2-hour group study session agenda; teach-back protocol."
    weight: 0.35
    description: "CollaborativeSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates peer learning expertise — task assignments leverage individual strengths (Ethan on visuals, Fatima on questions); quality standards prevent uneven contributions; the peer review catches errors; the teach-back protocol deepens everyone's understanding."
    weight: 0.35
    description: "PeerLearningQuality"
  - type: llm_judge
    criteria: "Response would produce a better guide than individual effort — the division of labor covers all topics without gaps; peer review ensures accuracy; the teach-back session fills knowledge gaps; the integrated guide is comprehensive and consistent."
    weight: 0.30
    description: "CollaborativeOutcome"
