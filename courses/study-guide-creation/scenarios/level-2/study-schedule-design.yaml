meta:
  id: study-schedule-design
  level: 2
  course: study-guide-creation
  type: output
  description: "Create a comprehensive study schedule and guide for a student taking 5 courses with overlapping exam periods"
  tags: [study-schedule, time-management, multi-course, intermediate]

state: {}

trigger: |
  You're a learning coach at a university academic
  success center. A student comes to you overwhelmed
  — they have 5 final exams in 8 days and no study
  plan.

  Student's courses and exam dates:
  - Intro to Sociology (Dec 9, 8:00 AM) — 4 chapters,
    multiple choice + short answer
  - Calculus II (Dec 10, 1:00 PM) — integration
    techniques, series, applications, problem-solving
  - English Composition (Dec 12, 10:00 AM) — in-class
    essay, argument/analysis
  - Microeconomics (Dec 14, 8:00 AM) — graphs,
    calculations, theory application
  - General Psychology (Dec 16, 3:00 PM) — 6 chapters,
    cumulative, multiple choice

  Student constraints:
  - Works part-time M/W/F mornings (8-12)
  - Studies best in the evening (6-10 PM)
  - Strongest in English and Psychology, weakest in
    Calculus and Economics
  - Has not started studying for any exam
  - Current date: December 1

  Create:
  1. A day-by-day study schedule from Dec 1-16 showing
     exactly what to study each session
  2. A prioritization framework (which subjects need
     the most time and why)
  3. A condensed study guide outline for each course
     (key topics, format-specific strategies)
  4. "Day before exam" review strategies for each
     course
  5. Stress management and self-care reminders
  6. A "triage plan" if the student falls behind
     schedule

assertions:
  - type: llm_judge
    criteria: "Response creates a complete study plan — day-by-day schedule Dec 1-16 respecting work constraints; prioritization framework; condensed study guide outlines for all 5 courses; day-before strategies; stress management; triage plan for falling behind."
    weight: 0.35
    description: "StudyScheduleCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates time management expertise — Calculus and Economics get more hours than English and Psychology; study sessions fit 6-10 PM evenings and free mornings; spaced review prevents cramming; the schedule accounts for diminishing returns."
    weight: 0.35
    description: "TimeManagementQuality"
  - type: llm_judge
    criteria: "Response would reduce overwhelm and improve performance — the student would know exactly what to study each day; the triage plan provides a safety net; stress management prevents burnout during the 16-day marathon."
    weight: 0.30
    description: "StudentWellbeingOutcome"
