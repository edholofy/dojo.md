meta:
  id: active-recall-integration
  level: 2
  course: study-guide-creation
  type: output
  description: "Transform a passive textbook summary into an active recall study guide for a psychology course"
  tags: [active-recall, transformation, psychology, intermediate]

state: {}

trigger: |
  You're a learning specialist at a university
  tutoring center. A psychology professor brings you
  a study guide that's essentially a condensed
  version of the textbook — paragraphs of text
  students highlight and re-read. Research shows
  re-reading is one of the least effective study
  strategies.

  Current guide format (for Abnormal Psychology):
  - 15 pages of dense text summaries
  - Topics: anxiety disorders, mood disorders,
    personality disorders, schizophrenia spectrum,
    substance use disorders
  - Each topic covers: diagnostic criteria, etiology
    (biological, psychological, social), treatment
    approaches, prognosis
  - Students report spending 3-4 hours reading the
    guide but scoring poorly on application questions

  Transform this passive guide into an active recall
  study guide:
  1. Replace text summaries with retrieval practice
     questions (write 4 per topic — 20 total)
  2. Create "case study snapshots" — brief patient
     descriptions where students must identify the
     disorder and justify their diagnosis
  3. Design a "compare and contrast" matrix for
     disorders with overlapping symptoms
  4. Build "explain it to a friend" prompts that test
     deep understanding
  5. Include self-testing score tracking sheets
  6. Provide a study session template (25 minutes)
     that maximizes active recall

assertions:
  - type: llm_judge
    criteria: "Response transforms passive content into active recall — 20 retrieval practice questions (4 per topic); case study snapshots with diagnostic reasoning; compare/contrast matrix for overlapping disorders; explain-it prompts; score tracking sheets; 25-minute study session template."
    weight: 0.35
    description: "ActiveRecallCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates active recall expertise — questions require retrieval not recognition; case studies demand clinical reasoning; the compare/contrast matrix addresses real diagnostic confusion (e.g., GAD vs panic); the study session template structures effective practice."
    weight: 0.35
    description: "ActiveRecallDesignQuality"
  - type: llm_judge
    criteria: "Response would improve exam performance — students would score better on application questions; the 3-4 hours of study time would be more productive; the guide builds clinical reasoning skills not just memorization."
    weight: 0.30
    description: "PerformanceImprovementOutcome"
