meta:
  id: digital-interactive-guide
  level: 2
  course: study-guide-creation
  type: output
  description: "Design a digital interactive study guide with embedded quizzes, progress tracking, and multimedia for a chemistry course"
  tags: [digital, interactive, multimedia, chemistry, intermediate]

state: {}

trigger: |
  You're an ed-tech instructional designer creating
  a digital interactive study guide for General
  Chemistry II. The university adopted a new LMS
  (Canvas) and wants to move beyond static PDF study
  guides.

  Content areas:
  - Chemical kinetics (rate laws, reaction mechanisms,
    Arrhenius equation)
  - Chemical equilibrium (Le Chatelier's principle,
    Kp vs Kc, ICE tables)
  - Acids and bases (pH calculations, buffers,
    titration curves)
  - Thermodynamics (enthalpy, entropy, Gibbs free
    energy)
  - Electrochemistry (galvanic cells, electrolysis,
    Nernst equation)

  Design specifications:
  - Must work on mobile devices (60% of students
    study on phones)
  - Should take 20-30 minutes per topic to complete
  - Must include accessibility features (screen
    reader compatible)

  Design the digital study guide:
  1. Information architecture — how content is
     organized and navigated
  2. Interactive elements for each topic (embedded
     quizzes, drag-and-drop, calculation practice)
  3. Progress tracking system (completion percentage,
     quiz scores, weak area identification)
  4. Multimedia integration plan (which topics benefit
     from video, animation, or simulation)
  5. Adaptive pathways — how the guide adjusts based
     on quiz performance
  6. Mobile-first design specifications

assertions:
  - type: llm_judge
    criteria: "Response designs a complete digital study guide — information architecture defined; interactive elements for each of 5 topics; progress tracking system; multimedia integration plan; adaptive pathways based on performance; mobile-first specifications."
    weight: 0.35
    description: "DigitalGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates ed-tech expertise — interactive elements match content type (calculation practice for kinetics, drag-and-drop for equilibrium); progress tracking identifies weaknesses meaningfully; adaptive pathways respond intelligently to performance; accessibility is built in."
    weight: 0.35
    description: "EdTechDesignQuality"
  - type: llm_judge
    criteria: "Response would improve learning outcomes — the 20-30 minute sessions are achievable on mobile; progress tracking motivates continued study; adaptive pathways prevent students from wasting time on mastered content; multimedia enhances difficult concepts."
    weight: 0.30
    description: "LearningOutcomeImprovement"
