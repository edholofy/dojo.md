meta:
  id: assessment-aligned-guide
  level: 2
  course: study-guide-creation
  type: output
  description: "Create a study guide reverse-engineered from exam format and past exam analysis for a law school course"
  tags: [assessment-alignment, exam-analysis, law-school, intermediate]

state: {}

trigger: |
  You're a law school academic success advisor
  creating a study guide for 1L students preparing
  for their Contracts final exam. You've analyzed
  the professor's past 5 exams to identify patterns.

  Exam format analysis:
  - 3-hour exam, open-book, open-notes
  - Always includes: 2 long essay hypotheticals
    (45 min each), 1 short essay (20 min), and
    15 multiple choice (30 min)
  - Essay hypotheticals always involve: formation
    issues + performance/breach + remedies
  - Common traps: students spend too long on essays,
    miss MC points; students recite rules without
    applying to facts

  Topics most tested (by frequency):
  1. Contract formation (offer, acceptance,
     consideration) — every exam
  2. Statute of Frauds — 4 of 5 exams
  3. Parol evidence rule — 3 of 5 exams
  4. Conditions and breach — every exam
  5. Remedies (expectation, reliance, restitution)
     — every exam
  6. UCC vs common law distinctions — 4 of 5 exams
  7. Promissory estoppel — 3 of 5 exams

  Create a study guide that:
  1. Prioritizes topics by exam frequency
  2. Creates "issue-spotting checklists" for each
     major topic
  3. Provides IRAC (Issue, Rule, Application,
     Conclusion) templates for essay writing
  4. Includes time management strategy for the
     3-hour exam
  5. Writes a sample essay answer for a practice
     hypothetical
  6. Creates a quick-reference outline for open-book
     use during the exam

assertions:
  - type: llm_judge
    criteria: "Response creates an exam-aligned study guide — topics prioritized by frequency; issue-spotting checklists for each major topic; IRAC templates for essays; time management strategy for 3-hour exam; sample essay answer; quick-reference open-book outline."
    weight: 0.35
    description: "AssessmentAlignmentCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates law school exam expertise — issue-spotting checklists cover common exam traps; IRAC templates show proper legal analysis format; the sample essay applies rules to facts (not just recites); the open-book outline is organized for rapid reference."
    weight: 0.35
    description: "LawSchoolExpertise"
  - type: llm_judge
    criteria: "Response would improve exam performance — the time management strategy prevents the common mistake of spending too long on essays; issue-spotting checklists catch frequently missed issues; the guide bridges studying with exam execution."
    weight: 0.30
    description: "ExamPerformanceOutcome"
