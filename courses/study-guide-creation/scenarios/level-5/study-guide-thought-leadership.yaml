meta:
  id: study-guide-thought-leadership
  level: 5
  course: study-guide-creation
  type: output
  description: "Establish thought leadership in learning material design — keynote speech, manifesto, Harvard Business Review article, and TEDx talk"
  tags: [thought-leadership, keynote, manifesto, master]

state: {}

trigger: |
  You're the world's foremost authority on study
  guide design. After 20 years of research and
  practice, you've been invited to share your vision
  for the future of learning materials.

  Create 4 thought leadership pieces:

  1. Keynote speech: "The Learning Material
     Revolution" for the International Conference
     on Educational Technology (2,000 attendees)
     (~1,500 words). Argue that study guides are the
     most underinvested, underresearched, and
     undervalued tool in all of education — and that
     this must change.

  2. "The Study Guide Manifesto" — 10 principles for
     evidence-based study material design that
     challenges conventional wisdom. Each principle
     should be provocative and actionable.

  3. Harvard Business Review article: "The $50 Billion
     Study Guide Problem" (~2,000 words). Make the
     business case that poorly designed study
     materials cost organizations billions in failed
     certifications, extended training timelines, and
     workforce incompetence.

  4. TEDx talk outline: "What If We Designed Study
     Guides Like We Design Products?" (18-minute
     talk). Apply product design thinking (user
     research, prototyping, iteration, UX) to study
     guide creation.

assertions:
  - type: llm_judge
    criteria: "Response creates all 4 pieces — keynote (~1,500 words) arguing for study guide investment; 10-principle manifesto; HBR article (~2,000 words) on business costs; TEDx outline applying product design to study guides."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates thought leadership — the keynote makes a compelling case for change; manifesto principles are genuinely provocative; the HBR article quantifies business impact convincingly; the TEDx talk bridges design thinking and education engagingly."
    weight: 0.35
    description: "ThoughtLeadershipQuality"
  - type: llm_judge
    criteria: "Response would influence the field — the keynote would be shared widely; the manifesto would become a reference document; the HBR article would change corporate L&D investment; the TEDx talk would inspire educators to redesign their materials."
    weight: 0.30
    description: "FieldInfluenceOutcome"
