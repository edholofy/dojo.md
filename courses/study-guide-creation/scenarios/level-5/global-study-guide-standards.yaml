meta:
  id: global-study-guide-standards
  level: 5
  course: study-guide-creation
  type: output
  description: "Found a global standards body for learning material quality — charter, standards framework, and international credentialing program"
  tags: [standards-body, global, credentialing, master]

state: {}

trigger: |
  You're founding the International Council for
  Learning Material Standards (ICLMS), a global body
  that will set quality standards for study guides
  and learning materials worldwide.

  Context:
  - No global standards for learning material quality
  - Healthcare study guide errors cause patient harm
  - Test prep industry is unregulated ($15B market)
  - Universities have no benchmarks for guide quality
  - Corporate training materials vary wildly in
    effectiveness
  - AI-generated study guides flood the market with
    no quality control

  Create the standards body:
  1. ICLMS charter — mission, vision, governance
     structure, founding board composition (15
     members from academia, industry, government,
     international orgs)
  2. Learning Material Quality Standard (LMQS-1000)
     — comprehensive standard with domains:
     a. Content accuracy and currency
     b. Pedagogical effectiveness
     c. Accessibility and inclusion
     d. Assessment alignment
     e. User experience and design
     f. Evidence-based methodology
  3. Certification program: Certified Learning
     Material Specialist (CLMS) — requirements,
     exam domains, specialization tracks
  4. Accreditation framework for organizations
     producing learning materials
  5. Relationship to existing standards (ISO 21001,
     QM rubric, WCAG, SCORM)
  6. 5-year strategic plan with membership targets
     and funding model

assertions:
  - type: llm_judge
    criteria: "Response creates a complete standards body — charter with governance and board; LMQS-1000 standard with 6 domains; CLMS certification with requirements and tracks; organizational accreditation; relationship to existing standards; 5-year strategic plan."
    weight: 0.35
    description: "StandardsBodyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards expertise — the charter follows international standards body conventions; LMQS-1000 domains are comprehensive and measurable; certification requirements are rigorous; accreditation framework is practical; existing standard relationships are accurately mapped."
    weight: 0.35
    description: "StandardsExpertise"
  - type: llm_judge
    criteria: "Response would establish global influence — ICLMS would become the recognized authority; LMQS-1000 would be adopted by universities and corporations; CLMS would become a valued credential; the standards would address the AI-generated content quality crisis."
    weight: 0.30
    description: "GlobalInfluenceOutcome"
