meta:
  id: study-guide-social-enterprise
  level: 5
  course: study-guide-creation
  type: output
  description: "Found a social enterprise providing free, high-quality study guides to underserved populations — refugees, incarcerated learners, rural students, and first-generation college students"
  tags: [social-enterprise, equity, underserved, access, master]

state: {}

trigger: |
  You're founding "StudyBridge," a social enterprise
  whose mission is: "No learner should fail because
  they couldn't access quality study materials."

  Target populations:
  1. Refugees (2M globally pursuing education):
     Study guides for language acquisition, credential
     recognition exams, and host-country professional
     certifications in 10 languages
  2. Incarcerated learners (700K in US taking courses):
     Study guides that work without internet, limited
     paper, no technology — for GED, college courses,
     and vocational certifications
  3. Rural students (15M US students in rural areas):
     Study guides for AP exams and college prep that
     compensate for limited tutoring and teacher
     availability
  4. First-generation college students (4.5M in US):
     Study guides that include "hidden curriculum"
     knowledge — how to study, how to use office
     hours, how to read a syllabus

  Create the social enterprise:
  1. Mission, theory of change, and impact metrics
  2. Study guide design principles for each population
     (addressing unique barriers)
  3. Content creation model — how to produce
     high-quality guides affordably
  4. Distribution strategy for each population
     (considering access constraints)
  5. Funding model (grants, corporate partnerships,
     cross-subsidy)
  6. Impact measurement framework
  7. 3-year growth plan (pilot → scale)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — mission and theory of change; design principles for all 4 populations; affordable content creation model; distribution strategy addressing each population's access constraints; funding model; impact measurement; 3-year plan."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates social impact expertise — theory of change is logical; design principles address real barriers (no internet for incarcerated, language for refugees, no tutors for rural, hidden curriculum for first-gen); distribution strategies are practical; impact metrics measure meaningful outcomes."
    weight: 0.35
    description: "SocialImpactExpertise"
  - type: llm_judge
    criteria: "Response would achieve equitable access — refugees would pass credential exams; incarcerated learners would earn GEDs and degrees; rural students would access AP-quality prep; first-gen students would bridge the hidden curriculum gap; the enterprise would be financially sustainable."
    weight: 0.30
    description: "EquityOutcome"
