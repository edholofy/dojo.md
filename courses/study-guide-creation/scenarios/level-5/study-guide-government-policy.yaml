meta:
  id: study-guide-government-policy
  level: 5
  course: study-guide-creation
  type: output
  description: "Draft national policy on learning material standards — quality requirements, accessibility mandates, and public investment in study guide infrastructure"
  tags: [government-policy, standards, accessibility, public-investment, master]

state: {}

trigger: |
  You're the lead policy advisor to a commission on
  "Educational Material Quality and Student Access."
  The commission found that inequitable access to
  quality study materials is a major driver of
  achievement gaps.

  Key findings:
  - Students at wealthy schools have $2,400/year in
    supplementary study materials; students at
    Title I schools average $180
  - 62% of free/open educational resources lack
    pedagogical design
  - Commercial test prep (SAT, AP, professional
    exams) gives affluent students a 15-point
    average advantage
  - Military and government training programs use
    study guides averaging 6 years old
  - No federal standards for learning material quality
  - States spend $0 on study guide research vs $850M
    on textbook adoption

  Draft the policy framework:
  1. Commission report: "The Study Material Gap" —
     how unequal access to quality study guides
     perpetuates achievement gaps
  2. Educational Material Quality Act:
     - Title I: National Learning Material Quality
       Standards
     - Title II: Public Study Guide Digital Library
     - Title III: Accessibility Requirements (WCAG,
       UDL, multilingual)
     - Title IV: Research and Innovation Fund ($50M)
     - Title V: Professional Development for
       Educators in Material Design
     - Title VI: Enforcement and Administration
  3. Implementation guidance for states
  4. Cost-benefit analysis
  5. Model state legislation

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy framework — commission report on the study material gap; 6-title legislative framework; implementation guidance; cost-benefit analysis; model state legislation."
    weight: 0.35
    description: "PolicyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy expertise — quality standards are measurable; the public library addresses the access gap; accessibility requirements are comprehensive; the $50M research fund is justified; enforcement is practical; the cost-benefit analysis quantifies the achievement gap impact."
    weight: 0.35
    description: "PolicyExpertise"
  - type: llm_judge
    criteria: "Response would reduce the achievement gap — the $2,400 vs $180 disparity would be addressed; free materials would meet quality standards; military and government materials would be modernized; the policy would become a model for other nations."
    weight: 0.30
    description: "EquityPolicyOutcome"
