meta:
  id: study-guide-research-handbook
  level: 5
  course: study-guide-creation
  type: output
  description: "Author chapters for the definitive academic handbook on Learning Material Science — editorial framework and 3 authored chapters"
  tags: [research-handbook, academic, learning-material-science, master]

state: {}

trigger: |
  You're the editor-in-chief of "The Cambridge
  Handbook of Learning Material Science," commissioned
  to be the definitive academic treatment of study
  guide and learning material design as a scientific
  discipline.

  Handbook scope:
  - 25 chapters by 40+ contributing authors
  - Bridges cognitive science, instructional design,
    ed-tech, and assessment
  - Target: Researchers, graduate students, senior
    practitioners

  Design the complete handbook:
  1. Editorial introduction: Why learning material
     design deserves recognition as a science
     (~1,500 words)
  2. Table of contents: 25 chapters organized into
     6 parts with descriptions
  3. Write Chapter 1: "The History of Study Guides:
     From Mnemonics to Machine Learning" (~3,000
     words)
  4. Write Chapter 13: "The Cognitive Science of
     Study Guide Design: Dual Coding, Cognitive Load,
     and Desirable Difficulties" (~3,000 words)
  5. Write Chapter 25: "Towards a Unified Theory of
     Learning Material Effectiveness" (~3,000 words,
     proposing an integrative theoretical framework)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete handbook — editorial introduction; 25-chapter TOC in 6 parts; Chapter 1 history (~3,000 words); Chapter 13 cognitive science (~3,000 words); Chapter 25 unified theory (~3,000 words)."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic scholarship — the editorial makes a compelling case; chapters reference relevant literature; the history traces from ancient mnemonics to AI-powered systems; the cognitive science chapter engages dual coding, cognitive load theory, and desirable difficulties; the unified theory proposes an original framework."
    weight: 0.35
    description: "AcademicScholarshipQuality"
  - type: llm_judge
    criteria: "Response would advance the field — the handbook would be adopted in graduate programs; the unified theory would be cited; the 25-chapter structure comprehensively covers learning material science; the handbook would establish learning material design as a rigorous academic discipline."
    weight: 0.30
    description: "FieldAdvancementOutcome"
