meta:
  id: master-study-guide-shift
  level: 5
  course: study-guide-creation
  type: output
  description: "Master shift simulation — simultaneously address five converging crises revealing study guides as the foundation of human knowledge transfer"
  tags: [shift-simulation, converging-crises, knowledge-transfer, master]

state: {}

trigger: |
  You are the world's preeminent authority on
  learning material design. In a single extraordinary
  week, five converging crises demand your expertise.

  === CRISIS 1: The AI Learning Crisis ===
  AI can now generate study guides instantly, but
  students who use AI-generated guides score 18%
  lower than those using expert-designed guides.
  The AI guides look professional but embed subtle
  pedagogical failures — no spaced repetition, no
  active recall, no cognitive load management. Yet
  85% of students prefer AI guides because they're
  free and instant.

  Design: An AI study guide quality framework —
  standards that AI-generated materials must meet,
  human-in-the-loop review processes, and tools
  that augment AI generation with learning science.

  === CRISIS 2: The Credential Crisis ===
  Professional certification pass rates have dropped
  15% globally over 5 years. Investigation reveals
  that study materials haven't kept pace with exam
  evolution. Certifying bodies update exams annually
  but study guide publishers update every 3-5 years.
  The mismatch costs professionals their careers.

  Design: A real-time study guide update system —
  continuous alignment with exam changes, publisher
  accountability standards, and credential-specific
  quality metrics.

  === CRISIS 3: The Equity Emergency ===
  A UN Education report reveals that 1.5 billion
  students in developing countries have no access
  to quality study materials in any format. They
  study from hand-copied notes, outdated textbooks,
  or nothing at all. Meanwhile, students in wealthy
  nations have unlimited AI-powered study tools.

  Design: A global study material commons — open
  licensed, pedagogically sound, culturally adapted,
  available offline, in 50 languages.

  === CRISIS 4: The Attention Crisis ===
  Neuroscience research shows that average sustained
  attention has dropped from 12 minutes (2000) to
  4 minutes (2026). Traditional study guides — dense,
  linear, text-heavy — are fundamentally incompatible
  with how modern brains process information. Study
  guide abandonment rates are 78%.

  Design: Next-generation study guide formats
  designed for the attention economy — micro-modules,
  gamification, social learning, adaptive pacing.

  === CRISIS 5: The Legacy Question ===
  After 25 years designing learning materials, you
  face the ultimate question: What is the
  relationship between study guides and human
  potential? Write the document that captures what
  you've learned about the power of a well-designed
  learning tool to change a life, a profession, a
  society.

  Task: Write complete responses to all five crises.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises — AI study guide quality framework; real-time credential update system; global study material commons; attention-economy formats; philosophical legacy on learning materials and human potential."
    weight: 0.35
    description: "MasterShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of learning materials as civilization infrastructure — the AI crisis reveals that pedagogy can't be automated naively; the credential crisis shows that outdated materials cost careers; the equity crisis proves that knowledge access is a human right; the attention crisis demands format evolution; the legacy connects study guides to human potential."
    weight: 0.35
    description: "CivilizationInfrastructureMastery"
  - type: llm_judge
    criteria: "Response would define the future of learning materials — the AI framework would ensure quality in the AI era; the credential system would save careers; the global commons would reach 1.5 billion students; attention-economy formats would reduce the 78% abandonment rate; the legacy would inspire a new generation to see learning material design as one of humanity's most important and undervalued disciplines."
    weight: 0.30
    description: "CivilizationDefiningOutcome"
