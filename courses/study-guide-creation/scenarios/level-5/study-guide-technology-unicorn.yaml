meta:
  id: study-guide-technology-unicorn
  level: 5
  course: study-guide-creation
  type: output
  description: "Build a unicorn startup around AI-powered personalized study guide generation — product vision, Series C pitch, and category creation"
  tags: [unicorn, startup, ai-powered, category-creation, master]

state: {}

trigger: |
  You're the CEO of LearnForge, a startup that
  raised $8M (Seed + Series A) and is preparing for
  a $60M Series C at a $600M valuation. LearnForge
  creates a new category: "Intelligent Learning
  Material Systems."

  Platform capabilities:
  - ContentAI: Transforms any educational content
    (textbooks, lectures, slides) into optimized
    study guides using NLP and learning science
  - AdaptiveEngine: Personalizes study guides based
    on individual learning patterns, knowledge gaps,
    and forgetting curves
  - AssessmentIQ: Generates calibrated practice
    assessments aligned to any certification or exam
  - CollabSpace: Social study features with AI-
    facilitated study groups
  - AnalyticsDash: Institutional analytics showing
    study guide impact on learning outcomes

  Traction:
  - $12M ARR, growing 180% YoY
  - 450 institutional customers (200 universities,
    150 corporate, 100 test prep)
  - 2.3M active student users
  - Average 23% improvement in exam scores
  - NPS: 72
  - Net revenue retention: 145%

  Create:
  1. Series C pitch deck narrative (12-15 slides)
  2. Category creation: "Intelligent Learning
     Material Systems" — why this is a category
  3. Product roadmap: Next 18 months
  4. Competitive moat analysis
  5. Path to $100M ARR
  6. IPO vs acquisition analysis

assertions:
  - type: llm_judge
    criteria: "Response builds a complete unicorn narrative — Series C pitch; category creation for Intelligent Learning Material Systems; 18-month roadmap; competitive moat; path to $100M ARR; IPO vs acquisition analysis."
    weight: 0.35
    description: "UnicornNarrativeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates venture expertise — pitch tells compelling growth story; category creation draws on proven frameworks; the moat identifies real defensibility (data network effects, institutional switching costs); revenue projections are credible; IPO analysis is realistic."
    weight: 0.35
    description: "VentureExpertise"
  - type: llm_judge
    criteria: "Response would convince investors — the $60M Series C is justified by metrics; Intelligent Learning Material Systems would become a recognized category; the competitive moat would withstand incumbents; LearnForge would become category-defining."
    weight: 0.30
    description: "InvestorConvictionOutcome"
