meta:
  id: study-guide-memoir
  level: 5
  course: study-guide-creation
  type: output
  description: "Write a professional memoir about a career creating study guides — 3 chapters on the art, science, and human impact of learning materials"
  tags: [memoir, career-reflection, storytelling, master]

state: {}

trigger: |
  You've spent 25 years creating study guides. From
  your first job writing flashcards for a GRE prep
  company to leading the redesign of a nation's
  medical education materials, you've discovered
  that study guides shape who gets to learn, who
  gets to pass, and who gets to become.

  Write your memoir: "The Guide Maker: A Life in
  Learning Materials"

  Chapter 1: "The Flashcard That Changed a Life"
  (~2,500 words)
  Your first year at a test prep company, you wrote
  a GRE vocabulary flashcard set. Three years later,
  a woman found you to say those flashcards helped
  her score high enough to get into graduate school
  — the first in her family. She's now a professor.
  You realized that a well-designed study tool isn't
  just information transfer — it's a ladder.
  Explore: The invisible power of learning materials.

  Chapter 8: "The Study Guide That Killed" (~2,500
  words)
  A hospital hired you to review their nursing
  competency study guides after a medication error
  caused a patient death. You found that the study
  guide's drug dosage calculation section was
  ambiguous — "mg/kg" without specifying actual vs
  ideal body weight. You spent 6 months redesigning
  every clinical study guide, haunted by the
  knowledge that clarity is a life-or-death skill.
  Explore: The weight of accuracy in learning
  materials.

  Chapter 15: "Teaching the World to Read Its Own
  Health" (~2,500 words)
  Your crowning project: creating health literacy
  study guides for the WHO across 40 countries and
  25 languages. Some health concepts don't translate.
  Some communities trust healers over doctors. You
  discovered that the best study guide for maternal
  health in rural Uganda looked nothing like the
  best study guide for diabetes management in urban
  Tokyo — and that was the entire point.
  Explore: The universality and particularity of
  learning.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling memoir — 3 chapters at ~2,500 words each; Chapter 1 explores learning materials as social mobility tools; Chapter 8 explores accuracy as life-or-death; Chapter 15 explores global learning and cultural adaptation; all use narrative storytelling."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates memoir writing craft — storytelling uses scenes not summaries; the flashcard chapter is hopeful and revelatory; the hospital chapter is tense and morally serious; the WHO chapter is philosophical and culturally sensitive; the voice is authentic."
    weight: 0.35
    description: "MemoirWritingQuality"
  - type: llm_judge
    criteria: "Response would resonate with readers — educators would see their work reflected; the memoir would elevate learning material design from mundane to profound; each chapter reveals deeper truths about knowledge, access, and human potential."
    weight: 0.30
    description: "ReaderResonanceOutcome"
