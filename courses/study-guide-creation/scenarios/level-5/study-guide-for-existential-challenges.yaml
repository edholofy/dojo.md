meta:
  id: study-guide-for-existential-challenges
  level: 5
  course: study-guide-creation
  type: output
  description: "Create study guide systems for humanity's greatest challenges — AI workforce transition, climate adaptation, and global health literacy"
  tags: [existential, ai-workforce, climate, health-literacy, master]

state: {}

trigger: |
  You're the Special Advisor on Education to the
  UN Secretary-General. Three existential challenges
  require unprecedented mass education through study
  guides.

  === CHALLENGE 1: AI Workforce Transition ===
  AI will displace 300M jobs globally by 2035. A
  study guide system must help displaced workers
  retrain for AI-adjacent careers: AI supervision,
  data annotation, human-AI collaboration, prompt
  engineering, AI ethics oversight.

  Design: A modular study guide system that takes
  workers from any background to AI-ready in 6
  months, available in 20 languages, adapted for
  varying digital literacy levels.

  === CHALLENGE 2: Climate Adaptation ===
  2 billion people in climate-vulnerable regions need
  practical knowledge for adaptation: water
  conservation, drought-resistant agriculture, flood
  preparedness, heat illness prevention, renewable
  energy basics.

  Design: Study guides that work without electricity,
  in 30 languages, for communities with limited
  formal education (grade 4 literacy), using visual
  and oral formats.

  === CHALLENGE 3: Global Health Literacy ===
  WHO identifies health literacy as a "critical
  determinant of health outcomes." 4.5 billion
  people lack basic health literacy. Topics:
  vaccination understanding, chronic disease
  management, mental health basics, nutrition,
  sanitation and hygiene.

  Design: Health literacy study guides that combat
  misinformation, work across cultural contexts,
  respect traditional medicine while promoting
  evidence-based practices, in 25 languages.

  Create study guide systems for all three challenges.

assertions:
  - type: llm_judge
    criteria: "Response creates systems for all 3 challenges — AI workforce transition (6-month modular system, 20 languages, varying digital literacy); climate adaptation (no-electricity guides, 30 languages, grade 4 literacy, visual/oral); health literacy (anti-misinformation, culturally respectful, 25 languages)."
    weight: 0.35
    description: "ExistentialChallengesCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global education expertise — AI retraining is realistic for displaced workers; climate guides work without infrastructure; health literacy guides navigate misinformation and cultural contexts; each system accounts for its population's unique constraints."
    weight: 0.35
    description: "GlobalEducationExpertise"
  - type: llm_judge
    criteria: "Response would address existential scale — 300M workers could retrain; 2B climate-vulnerable people could adapt; 4.5B health-illiterate people could gain critical knowledge; the systems are scalable, sustainable, and culturally appropriate."
    weight: 0.30
    description: "ExistentialScaleOutcome"
