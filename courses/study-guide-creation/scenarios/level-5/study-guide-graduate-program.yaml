meta:
  id: study-guide-graduate-program
  level: 5
  course: study-guide-creation
  type: output
  description: "Design a graduate program in Learning Material Science — curriculum, research center, and faculty recruitment for a new academic discipline"
  tags: [graduate-program, academic, curriculum, research, master]

state: {}

trigger: |
  You've been appointed the founding director of
  the Center for Learning Material Science at a
  major research university. You're creating the
  first graduate program dedicated to the science
  of study guide and learning material design.

  Program vision: Establish Learning Material Science
  as a rigorous academic discipline combining
  cognitive science, instructional design, data
  science, and UX design.

  Design the graduate program:
  1. Academic rationale — why learning material design
     deserves its own discipline (not just a
     subspecialty of education)
  2. MS degree curriculum:
     - Core courses (8 courses)
     - 4 concentration tracks: Cognitive Design,
       Health Professions Education, Corporate
       Learning, Ed-Tech Product Design
     - Capstone project requirements
     - Industry practicum
  3. PhD program:
     - Research areas and dissertation topics
     - Qualifying exam structure
     - Teaching requirements
  4. Research center agenda — 5 flagship research
     projects
  5. Faculty recruitment plan — 8 positions with
     interdisciplinary profiles
  6. Industry advisory board — composition and role
  7. Student recruitment and career outcomes

assertions:
  - type: llm_judge
    criteria: "Response designs a complete graduate program — academic rationale; MS curriculum with 8 core courses and 4 concentrations; capstone and practicum; PhD program with research areas and qualifying exam; 5 research projects; 8 faculty positions; advisory board; student recruitment."
    weight: 0.35
    description: "GraduateProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic program design expertise — courses build logically from foundations to specialization; the 4 concentrations address distinct career paths; PhD research areas are novel and significant; faculty profiles are interdisciplinary; the rationale makes a compelling case for a new discipline."
    weight: 0.35
    description: "AcademicDesignQuality"
  - type: llm_judge
    criteria: "Response would establish a new field — the program would attract top students; research projects would produce publishable findings; graduates would fill a genuine market need; the center would become the academic home for learning material science."
    weight: 0.30
    description: "FieldEstablishmentOutcome"
