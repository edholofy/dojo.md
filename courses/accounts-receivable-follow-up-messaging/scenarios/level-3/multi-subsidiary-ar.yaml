meta:
  id: multi-subsidiary-ar
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design AR follow-up communications for a multi-subsidiary corporate group — manage cross-entity billing, netting agreements, and coordinated collection strategies"
  tags: [multi-subsidiary, corporate-group, netting, advanced]

state: {}

trigger: |
  Your company has 4 subsidiaries that each sell to
  the same corporate group. The customer's AP
  department is receiving separate collection emails
  from each subsidiary, creating confusion and
  frustration.

  YOUR SUBSIDIARIES:
  1. TechPro Solutions (software licensing) — owed
     $180,000 by the customer (45 days past due)
  2. TechPro Services (consulting) — owed $95,000
     (30 days past due)
  3. TechPro Hardware (equipment) — owed $62,000
     (20 days past due)
  4. TechPro Cloud (hosting) — current, customer
     owes $28,000 (not yet due)

  CUSTOMER: Meridian Corp (Fortune 500 company,
  $8M annual combined revenue across all 4
  subsidiaries)

  COMPLICATION: Meridian has a $50,000 credit from
  TechPro Hardware for returned equipment, which
  they want applied against the TechPro Solutions
  balance. Your subsidiaries don't currently have a
  cross-entity netting process.

  Design:
  1. Consolidated customer communication (300 words)
  2. Internal coordination process (200 words)
  3. Netting/offset resolution proposal (150 words)

assertions:
  - type: llm_judge
    criteria: "The consolidated customer communication presents a unified view and resolves the netting issue — the 300-word letter to Meridian's AP department presents a single consolidated view of all outstanding balances across the 4 subsidiaries; it acknowledges the confusion caused by receiving separate communications and apologizes; it provides a clear table: subsidiary, invoice numbers, amounts, aging status; it addresses the $50,000 credit offset request directly — either agreeing to apply it cross-entity (preferred, builds goodwill) or explaining the process for doing so; the communication has a single point of contact going forward — no more 4 different people emailing about 4 different invoices; the tone recognizes Meridian's significance as an $8M customer — this is a relationship management communication, not a standard dunning email."
    weight: 0.35
    description: "ConsolidatedCommunication"
  - type: llm_judge
    criteria: "The internal coordination process prevents future fragmented outreach — the 200-word internal process defines: a single AR lead designated for each major multi-entity customer; a consolidated monthly statement sent from the parent company (not individual subsidiaries); an internal communication protocol — before any subsidiary contacts a shared customer, they check the centralized customer record; a cross-entity escalation process — if one subsidiary has a collection issue, all subsidiaries are notified and coordinate their approach; regular internal alignment meetings for top 20 shared customers; a shared customer relationship dashboard showing all balances, communications, and disputes across entities."
    weight: 0.35
    description: "InternalCoordination"
  - type: llm_judge
    criteria: "The netting/offset resolution is practical and customer-friendly — the 150-word netting proposal: establishes a formal cross-entity netting agreement that allows credits from one subsidiary to offset balances at another; defines the process: quarterly netting settlement, approved by controllers of both entities; for the immediate situation, proposes applying the $50,000 Hardware credit against the Solutions balance, reducing the past-due amount from $180,000 to $130,000; positions this as a policy improvement, not a one-time exception; the proposal balances customer convenience with internal accounting requirements (transfer pricing, intercompany settlement, entity-level P&L impact); the overall response demonstrates that the company prioritizes the customer relationship and is willing to fix internal processes that create customer friction."
    weight: 0.30
    description: "NettingResolution"
