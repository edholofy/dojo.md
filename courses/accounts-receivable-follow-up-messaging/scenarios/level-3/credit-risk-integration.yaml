meta:
  id: credit-risk-integration
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Integrate credit risk assessment into AR follow-up strategy — design a system where credit intelligence drives collection approach and communication tone"
  tags: [credit-risk, intelligence-driven, proactive, advanced]

state: {}

trigger: |
  Your company wants to shift from reactive
  collections (follow up after invoices are late) to
  proactive, intelligence-driven AR management. Design
  a credit-risk-integrated AR communication strategy.

  COMPANY CONTEXT:
  - $600M company, 2,800 customers
  - Current approach: same dunning sequence for all
    customers regardless of risk profile
  - Available data: D&B credit scores, trade payment
    data, internal payment history, financial
    statements (for large customers), industry data

  Design:
  1. Customer risk scoring model (how to calculate
     and categorize risk)
  2. Risk-differentiated dunning strategies (how
     follow-up differs by risk category)
  3. Early warning indicator system
  4. Pre-shipment credit review triggers
  5. Sample communications for each risk category

assertions:
  - type: llm_judge
    criteria: "The risk scoring model combines external and internal data into actionable categories — the scoring model weights: internal payment history (40%) — average days to pay, trend direction, dispute frequency, broken promise rate; external credit data (30%) — D&B PAYDEX score, credit limit recommendations, number of suits/liens/judgments; financial indicators (20%) — revenue trend, profitability, leverage ratios, working capital (where available); industry/macro factors (10%) — industry health, sector outlook, concentration risk; the model produces a composite score (1-100) mapped to risk categories: Low Risk (80-100, green), Moderate Risk (60-79, yellow), Elevated Risk (40-59, orange), High Risk (1-39, red); the model is transparent (collectors understand why a customer is rated as they are) and dynamic (updated monthly or when triggered by events)."
    weight: 0.35
    description: "RiskScoringModel"
  - type: llm_judge
    criteria: "Risk-differentiated dunning strategies treat different customers differently — Low Risk customers: standard automated dunning, longer grace periods (first outreach at Day 10), friendly tone throughout, minimal collector time; Moderate Risk: standard dunning with earlier first touch (Day 5), second reminder at Day 15 instead of Day 20, phone call at Day 25; Elevated Risk: accelerated dunning (first touch Day 3), shorter escalation intervals, phone call by Day 15, supervisor involvement at Day 30, collection agency referral at Day 60 (vs. Day 90 for low risk); High Risk: pre-shipment approval required, COD or advance payment preferred, first dunning touch on the due date itself, supervisor-led collection from Day 15, collection agency referral at Day 45; the strategy explicitly links risk category to: dunning timing, channel mix, escalation speed, collector assignment (senior collectors handle high-risk accounts), and settlement authority."
    weight: 0.35
    description: "DifferentiatedDunning"
  - type: llm_judge
    criteria: "Early warning system and sample communications demonstrate practical implementation — the early warning system monitors: payment trend deterioration (average days-to-pay increasing over 3 months), D&B score drops (monthly monitoring), industry distress signals (sector downgrades, major competitor bankruptcy), customer-specific events (management changes, layoffs, legal actions), internal signals (increasing disputes, decreasing order volume, contact avoidance); pre-shipment credit review triggers: any order from a High Risk customer, any order exceeding the customer's credit limit, any order from a customer with past-due balance exceeding 30 days; sample communications show the tone difference: Low Risk reminder is warm and assumes oversight, High Risk reminder is professional and urgent with explicit consequences mentioned early; the system represents a fundamental shift from 'wait and chase' to 'predict and prevent.'"
    weight: 0.30
    description: "EarlyWarningAndSamples"
