meta:
  id: bankruptcy-and-insolvency
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Navigate AR communications when a customer files for bankruptcy — understand the automatic stay, proof of claim process, and appropriate communications during insolvency proceedings"
  tags: [bankruptcy, insolvency, legal, advanced]

state: {}

trigger: |
  Three of your customers are in different stages
  of financial distress. Handle each situation
  appropriately.

  SITUATION A — CHAPTER 11 FILING
  GrandTech Solutions, which owes you $185,000 across
  6 invoices, has filed for Chapter 11 bankruptcy
  protection. You received the notice yesterday.
  - $120,000 is pre-petition (invoiced before filing)
  - $65,000 is post-petition (services delivered
    after filing date under an existing contract)
  - You are an unsecured creditor
  - Your dunning sequence was about to send an
    escalation email

  Write: (a) Internal memo to AR team (150 words)
  explaining what to do, and (b) the proof of claim
  cover letter (150 words).

  SITUATION B — CUSTOMER INSOLVENCY WARNING SIGNS
  Horizon Manufacturing has been a $2M annual
  customer but you've noticed: payments slowing from
  Net 30 to Net 75 over the past 6 months, their
  AP team stopped returning calls, and industry
  rumors suggest layoffs.

  Write: a 200-word risk assessment and recommended
  actions memo for the credit committee.

  SITUATION C — PREFERENCE PAYMENT DEMAND
  A bankruptcy trustee has sent a letter demanding
  return of $45,000 paid to your company 80 days
  before another customer's (DataFlow Corp) Chapter 7
  filing, claiming it was a preferential transfer.

  Write: a 150-word response strategy memo for your
  attorney.

assertions:
  - type: llm_judge
    criteria: "Situation A correctly handles the Chapter 11 automatic stay and pre/post-petition distinction — the internal memo to the AR team: immediately halts ALL collection activity on GrandTech (the automatic stay under §362 prohibits any collection efforts); distinguishes between pre-petition debt ($120,000 — must be filed as a proof of claim, will be paid per the bankruptcy plan at pennies on the dollar likely) and post-petition debt ($65,000 — treated as an administrative expense with priority over pre-petition claims, much more likely to be paid in full); instructs the team to stop the automated dunning sequence immediately; notes that any collection activity during the automatic stay is a federal violation; the proof of claim cover letter is professional and includes: the total pre-petition claim amount, a list of supporting invoices, and contact information; it is addressed to the bankruptcy court with copies to the debtor's counsel."
    weight: 0.35
    description: "Chapter11Response"
  - type: llm_judge
    criteria: "Situation B identifies warning signs and recommends proactive action — the credit committee memo: documents the specific warning signs (payment terms slipping from Net 30 to Net 75 over 6 months, unresponsive AP team, industry layoff rumors); quantifies the exposure ($2M annual revenue, current outstanding balance); recommends specific actions: (1) immediately reduce credit limit or switch to COD/advance payment terms, (2) request financial statements or references, (3) increase monitoring frequency (weekly aging review), (4) engage the sales team to gather intelligence on the customer's financial health, (5) consider purchasing credit insurance on this account, (6) prepare a contingency plan for potential bankruptcy filing; the memo does NOT recommend cutting off the customer immediately — that could trigger the very bankruptcy you're trying to avoid and would damage a $2M relationship."
    weight: 0.35
    description: "InsolvencyWarningResponse"
  - type: llm_judge
    criteria: "Situation C provides a defensible strategy for the preference payment demand — the attorney memo: explains the preference payment framework (§547 — trustee can claw back payments made within 90 days before filing that benefit one creditor over others); identifies potential defenses: (1) Ordinary Course of Business defense — if the $45,000 payment was consistent with prior payment patterns between the companies, it may be exempt; (2) New Value defense — if your company provided new goods/services after receiving the payment, the preference may be offset; (3) Contemporaneous Exchange defense — if the payment was for a delivery made at the same time; recommends gathering evidence: historical payment patterns with DataFlow, invoices and delivery records around the payment date, and any correspondence; notes that settling for a fraction of the demand (e.g., 50-60%) may be more cost-effective than litigation; the memo demonstrates understanding of bankruptcy preference law without being overly legalistic."
    weight: 0.30
    description: "PreferencePaymentStrategy"
