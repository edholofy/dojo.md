meta:
  id: ar-automation-implementation
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design the implementation plan for an AI-powered AR automation platform — evaluate vendors, design workflows, and plan the transition from manual to automated collections"
  tags: [automation, ai-powered, implementation, advanced]

state: {}

trigger: |
  The CFO has approved a $500K budget to automate
  AR collections. You need to design the
  implementation plan.

  CURRENT STATE:
  - $800M company, 4,200 active customers
  - AR team: 18 people (12 collectors, 4 analysts,
    2 managers)
  - Current tools: SAP ERP + Excel spreadsheets +
    Outlook email
  - Manual dunning: collectors decide who to contact
    and when
  - No payment portal for customers
  - DSO: 54 days, target: 40 days

  REQUIREMENTS:
  - Automated dunning sequences (email + SMS)
  - Customer self-service payment portal
  - AI-powered prioritization (which accounts to
    focus on)
  - Automated cash application
  - Real-time dashboards and reporting
  - Integration with SAP

  Design:
  1. Vendor evaluation framework (compare 3 leading
     platforms)
  2. Implementation roadmap (phased approach)
  3. Workflow design for automated dunning
  4. Change management plan for the AR team
  5. ROI projections

assertions:
  - type: llm_judge
    criteria: "The vendor evaluation framework compares platforms on relevant criteria — the evaluation compares 3 leading AR automation platforms (e.g., HighRadius, Billtrust, and Esker or similar credible options) across: functionality (dunning automation, cash application, payment portal, AI capabilities, credit management), integration (SAP compatibility, API availability, data migration complexity), scalability (customer volume, transaction volume, multi-entity support), user experience (collector workflow, customer portal UX, mobile capabilities), implementation (timeline, resource requirements, vendor support), cost (licensing, implementation, ongoing maintenance, total 3-year TCO), and security/compliance (SOC 2, data encryption, FDCPA compliance features); each platform is scored and a recommendation is made with clear rationale; the evaluation acknowledges trade-offs — the cheapest option may lack AI capabilities, the most feature-rich may be overkill for the company's size."
    weight: 0.35
    description: "VendorEvaluation"
  - type: llm_judge
    criteria: "The implementation roadmap and workflow design are practical and phased — the roadmap spans 9-12 months: Phase 1 (Month 1-3): SAP data integration, customer data cleansing, dunning template creation, pilot with 1 business unit; Phase 2 (Month 4-6): rollout automated dunning to all business units, launch customer payment portal, implement automated cash application; Phase 3 (Month 7-9): deploy AI prioritization, implement SMS dunning, advanced reporting dashboards; Phase 4 (Month 10-12): optimization, training completion, full automation; the dunning workflow design includes: trigger rules (invoice age, customer segment, amount), channel selection logic (email for first 2 touches, phone for 30+ days on high-value, SMS for younger demographics), pause/resume rules (payment received, dispute filed, payment plan active), escalation rules (automatic escalation after X days with no response), and exception handling (VIP customers excluded from automated dunning, new customers get softer sequence)."
    weight: 0.35
    description: "RoadmapAndWorkflow"
  - type: llm_judge
    criteria: "Change management plan and ROI projections address the human and financial dimensions — the change management plan recognizes that 12 manual collectors will be most affected; the plan includes: redefining roles (collectors become 'AR business partners' focused on high-value accounts and complex disputes while automation handles routine follow-up), training program (4-week system training + ongoing coaching), communication plan (transparent about changes, emphasize career growth not job loss), potential headcount impact (estimate 4-6 positions may be eliminated through attrition over 18 months, remaining staff upskilled); ROI projections: DSO improvement from 54 to 40 days = $30M+ in freed working capital (at current AR levels), bad debt reduction from X% to Y%, estimated annual savings of $200K-$400K in labor efficiency, payment portal adoption reduces payment processing costs; payback period: 12-18 months on the $500K investment; the ROI model includes conservative/base/optimistic scenarios."
    weight: 0.30
    description: "ChangeManagementAndROI"
