meta:
  id: enterprise-ar-playbook
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design a comprehensive enterprise AR collections playbook — create the complete framework of policies, procedures, templates, and escalation paths for a large organization"
  tags: [enterprise-playbook, policy-framework, comprehensive, advanced]

state: {}

trigger: |
  You've been hired as the AR transformation
  consultant for a $2B manufacturing company. The
  CFO wants a comprehensive collections playbook.

  CURRENT STATE:
  - 6 business units across 4 regions
  - 3,500 active customers
  - Total AR: $280M
  - DSO: 58 days (industry benchmark: 42 days)
  - Bad debt write-off: 2.1% (industry: 0.8%)
  - 45 AR staff with inconsistent practices
  - No standardized templates or escalation paths
  - Collections efforts vary by region and analyst

  Design the playbook covering:
  1. Customer segmentation strategy (by risk/value)
  2. Standard communication templates (all stages)
  3. Escalation matrix with clear ownership
  4. Performance metrics and targets
  5. Technology requirements
  6. Training and onboarding guide

assertions:
  - type: llm_judge
    criteria: "The customer segmentation strategy differentiates approach by risk and value — the playbook segments customers on a 2x2 matrix: High Value/Low Risk (strategic accounts — dedicated AR manager, white-glove service, CFO-level escalation only), High Value/High Risk (watch list — enhanced monitoring, weekly review, proactive outreach), Low Value/Low Risk (standard process — automated dunning, minimal manual intervention), Low Value/High Risk (accelerated collection — shorter dunning cycle, faster escalation to collections agency); segmentation criteria defined: Value = annual revenue, strategic importance, growth potential; Risk = payment history, credit score, industry, financial health indicators; the segmentation drives differentiated treatment: a $5M strategic customer 15 days late gets a personal call from their account manager, while a $10K transactional customer 15 days late gets an automated email; the playbook includes quarterly re-segmentation based on updated data."
    weight: 0.35
    description: "CustomerSegmentation"
  - type: llm_judge
    criteria: "Standard communication templates and escalation matrix create consistency — the playbook includes templates for every stage of the collection lifecycle: pre-due reminder, 1st/2nd/3rd past-due email, phone call scripts (warm/standard/firm), formal demand letter, collection agency referral notification, and payment plan agreement; each template includes: the actual text (with merge fields for personalization), the appropriate tone, when to use it, and when NOT to use it; the escalation matrix defines: who owns each stage (AR analyst → AR supervisor → AR manager → VP Finance → CFO), what triggers escalation (days past due, dollar amount, customer segment), required actions at each level, and maximum time at each level before automatic escalation; specific rules: any account over $500K past due 30 days escalates to VP Finance; any strategic account past due 15 days triggers account manager notification; any account past due 90 days with no payment plan automatically referred to collections agency."
    weight: 0.35
    description: "TemplatesAndEscalation"
  - type: llm_judge
    criteria: "Performance metrics, technology requirements, and training guide are practical — metrics: DSO target 42 days (from 58), bad debt target 0.8% (from 2.1%), CEI target 90%+, aging bucket targets (90% current/1-30 days), collector productivity (contacts per day, resolution rate); technology requirements: cloud-based AR automation platform (Billtrust, HighRadius, or similar), integrated with ERP, automated dunning workflows, customer payment portal, real-time aging dashboards, automated credit scoring; training guide: 4-week onboarding program for new AR analysts covering the playbook, system training, communication skills, legal compliance (FDCPA basics, company escalation policies), and shadowing; ongoing training: monthly team meetings reviewing difficult accounts, quarterly skill workshops, annual compliance refresher; the playbook acknowledges that implementation will take 12-18 months and proposes a phased rollout: Phase 1 (Month 1-3) standardize templates, Phase 2 (Month 4-8) implement technology, Phase 3 (Month 9-12) deploy segmentation and metrics, Phase 4 (Month 13-18) optimize and mature."
    weight: 0.30
    description: "MetricsTechTraining"
