meta:
  id: ar-analytics-dashboard
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design an AR collections analytics dashboard — specify metrics, visualizations, alerts, and predictive capabilities for monitoring collection effectiveness"
  tags: [analytics, dashboard, predictive, advanced]

state: {}

trigger: |
  The VP of Finance wants a real-time AR collections
  analytics dashboard that goes beyond basic aging
  reports.

  COMPANY CONTEXT:
  - $1.5B company with 5,000 customers
  - AR team: 25 collectors, 3 supervisors, 1 manager
  - Current tools: SAP + manual Excel reports
    (produced weekly, usually 3 days behind)
  - Pain points: no real-time visibility, no early
    warning system, no collector performance tracking,
    no predictive capabilities

  Design the dashboard covering:
  1. Executive overview page (CFO view)
  2. Collector performance page
  3. Customer risk page with predictive scoring
  4. Collection effectiveness analytics
  5. Alert and notification system
  6. Data requirements and refresh frequency

assertions:
  - type: llm_judge
    criteria: "The executive overview page gives the CFO actionable insight at a glance — the CFO dashboard includes: total AR balance with trend line (rolling 12 months), DSO current vs. target vs. prior year (large KPI card), aging bucket distribution (stacked bar chart, current month vs. prior), cash collections this month vs. target (progress bar), top 10 past-due accounts (ranked by amount, with days past due and last action), bad debt reserve vs. actual write-offs (quarterly trend), promise-to-pay pipeline (total commitments expected this week/month), and a 'health score' that synthesizes multiple metrics into a single indicator (green/yellow/red); the design principles: no more than 6-8 visualizations per page, color-coded for instant recognition (red = needs attention, green = on track), drill-down capability from summary to detail, mobile-friendly for executives who review on iPad."
    weight: 0.35
    description: "ExecutiveOverview"
  - type: llm_judge
    criteria: "Collector performance and customer risk pages enable operational management — the collector performance page: contacts per day (calls + emails), resolution rate (% of contacted accounts that result in payment or plan), promise-to-pay conversion rate, average days-to-resolve by collector, collector workload balance (open accounts per collector vs. team average), leaderboard (gamified ranking to motivate performance); the customer risk page: AI-powered risk scoring for each customer based on payment history, aging trends, industry health, credit data, and behavioral signals (response to dunning, contact frequency); risk scores predict likelihood of paying within 30/60/90 days; visual heat map showing risk concentration by industry, region, or customer segment; early warning alerts when a previously good customer starts showing deterioration patterns; the dashboard enables proactive intervention before accounts become seriously delinquent."
    weight: 0.35
    description: "PerformanceAndRiskPages"
  - type: llm_judge
    criteria: "Collection effectiveness analytics and alert system are data-driven — effectiveness analytics: dunning sequence performance (open rates, response rates, payment rates by email position in sequence), optimal contact timing (which day/time produces best results), channel effectiveness (email vs. phone vs. SMS by customer segment), payment method preferences by customer segment, dispute resolution metrics (average time to resolve, first-contact resolution rate); alert system: real-time alerts when a high-value customer misses a payment, alert when DSO exceeds threshold, alert when a collector's resolution rate drops below baseline, alert when payment promise is broken, weekly digest of top risks; data requirements: real-time SAP integration (at minimum daily batch, ideally continuous), bank feed integration for cash application, email/call tracking integration, credit bureau data feed (quarterly), customer master data; refresh frequency: executive dashboard daily, collector dashboard real-time, risk scores updated weekly."
    weight: 0.30
    description: "EffectivenessAndAlerts"
