meta:
  id: professional-services-ar
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design AR follow-up strategies for professional services firms — navigate the unique challenges of collecting from clients where the relationship is ongoing and personal"
  tags: [professional-services, law-firm, consulting, advanced]

state: {}

trigger: |
  You are the billing manager for a mid-size law
  firm. Attorney-client collections have unique
  sensitivities. Handle three scenarios.

  SCENARIO A — MAJOR CORPORATE CLIENT
  Wilson & Associates (a Fortune 500 GC office) owes
  $285,000 in legal fees across 3 matters. 60 days
  past due. The billing partner has been reluctant
  to follow up because "they're our biggest client
  and I don't want to damage the relationship."
  - Annual billing to Wilson: $1.8M
  - This is the first time they've been this late
  - Your firm's AR policy requires follow-up at
    30 days regardless of client size

  Write a 200-word email from the billing partner
  to the client's GC.

  SCENARIO B — CONTINGENT FEE DISPUTE
  A personal injury client is disputing the firm's
  33% contingency fee on a $450,000 settlement
  ($148,500). The client says their "friend who is
  a lawyer" told them the fee should be 25%.
  - The engagement letter clearly states 33%
  - The client signed it 18 months ago

  Write a 200-word response to the client.

  SCENARIO C — UNBILLED WORK-IN-PROGRESS
  A partner has $180,000 in unbilled WIP for a
  client whose matter concluded 4 months ago. The
  partner keeps saying "I'll get to the bill this
  week" but never does.

  Write a 150-word internal escalation email from
  you to the managing partner about the aging WIP.

assertions:
  - type: llm_judge
    criteria: "The corporate client email balances collection with relationship preservation — the email from the billing partner to Wilson's GC: acknowledges the strong relationship and the firm's appreciation for the business; frames the follow-up as routine rather than confrontational ('As part of our standard billing process, I wanted to check in on the status of three outstanding invoices'); provides the details (3 matters, $285,000 total, 60 days past due); asks if there are any issues with the bills that need to be addressed; notes that this is unusual for Wilson (which signals awareness without accusing); suggests a brief call to discuss if needed; the tone is peer-to-peer (partner to GC), not collector-to-debtor; the email does NOT apologize for following up — the firm has a right and obligation to collect; it's an example of how to have the collection conversation without it feeling like a collection call."
    weight: 0.35
    description: "CorporateClientEmail"
  - type: llm_judge
    criteria: "The contingency fee dispute response is clear, empathetic, and legally sound — the response to the personal injury client: thanks them for raising the concern; explains that the 33% fee was agreed to in the signed engagement letter from 18 months ago and references the specific agreement; notes that 33% is standard and common for the type of case; addresses the 'friend who is a lawyer' claim diplomatically — 'Different attorneys may charge different rates depending on the complexity and risk of the case, but our agreement specifies 33%'; explains what the firm did to earn the fee (the work, the risk, the outcome); the tone is firm but empathetic — the client just received a large settlement and may not understand why $148,500 goes to the firm; the response does NOT get defensive or dismissive about the client questioning the fee; it protects the firm's legal position while maintaining the attorney-client relationship."
    weight: 0.35
    description: "ContingencyFeeDispute"
  - type: llm_judge
    criteria: "The internal escalation about unbilled WIP is diplomatically assertive — the 150-word email to the managing partner: quantifies the problem ($180,000 in unbilled WIP, matter concluded 4 months ago); notes the financial impact (unbilled WIP impacts revenue recognition, cash flow, and aging metrics); references the firm's billing policy (bills should be sent within 30 days of matter conclusion); asks the managing partner to intervene with the partner; suggests a specific solution (have a billing coordinator prepare a draft bill for the partner's review within the week); the tone recognizes the internal political dynamics (billing managers don't directly tell partners what to do) but escalates firmly through the appropriate channel; all three scenarios demonstrate the unique challenge of professional services AR: the people who do the work are often the same people who must collect, and the relationship is the product."
    weight: 0.30
    description: "WIPEscalation"
