meta:
  id: legal-compliance-framework
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design a legal compliance framework for AR collections communications — ensure all customer-facing collection messages comply with FDCPA, state regulations, and industry standards"
  tags: [legal-compliance, fdcpa, regulatory, advanced]

state: {}

trigger: |
  Your company has both B2B and B2C accounts
  receivable. After a competitor was fined $2.3M
  for FDCPA violations in their collection
  communications, your general counsel wants a
  comprehensive compliance framework.

  COMPANY CONTEXT:
  - $500M company with B2B (70%) and B2C (30%) AR
  - Operates in 38 US states
  - Uses both internal collectors and 2 external
    collection agencies
  - Recently started SMS-based reminders
  - Has an offshore AR team in India that makes
    collection calls

  Design:
  1. Compliance policy for AR communications (cover
     email, phone, SMS, letter, and portal channels)
  2. Prohibited language and practices list
  3. Channel-specific compliance rules
  4. Training and certification requirements
  5. Monitoring and audit procedures
  6. Vendor (collection agency) compliance standards

assertions:
  - type: llm_judge
    criteria: "The compliance policy correctly distinguishes B2B and B2C requirements and covers all channels — the framework recognizes that FDCPA applies primarily to consumer (B2C) debt collection, but establishes that the company will apply professional standards to all collections; for B2C communications: detailed FDCPA compliance requirements including Mini-Miranda warnings, validation notice requirements, cease-and-desist procedures, prohibited contact times (before 8 AM/after 9 PM local time), and third-party disclosure restrictions; for B2B communications: although FDCPA doesn't technically apply, the framework establishes professional standards, UCC considerations, and state-specific regulations; for SMS: TCPA compliance requiring prior express written consent, opt-out mechanisms, content limitations, and timing restrictions; the framework addresses data privacy (CCPA for California residents, state privacy laws), and notes special requirements for the India-based offshore team (time zone compliance, cultural training, quality monitoring)."
    weight: 0.35
    description: "CompliancePolicy"
  - type: llm_judge
    criteria: "Prohibited language list and channel-specific rules are specific and practical — the prohibited language list includes specific phrases and categories: never threaten arrest or criminal prosecution, never use profanity or insults, never misrepresent the amount owed or add unauthorized fees, never claim to be an attorney or law enforcement, never discuss the debt with unauthorized third parties, never threaten actions you cannot or will not take, never contact at workplace if told employer prohibits; specific prohibited phrases: 'You will go to jail,' 'We will garnish your wages' (unless you actually have a judgment), 'Everyone at your company will know about this,' 'This is your last chance' (when it's not actually the last communication); channel-specific rules: email (include unsubscribe option for B2C, no misleading subject lines, include company identification), phone (identify yourself and company at start of call, record calls only with consent where required, document all conversations), SMS (opt-in required, max 3 messages per week, include opt-out instructions in every message, no debt amount in SMS in case phone is shared), letters (include validation notice on first communication, use company letterhead, certified mail for escalations)."
    weight: 0.35
    description: "ProhibitedLanguageAndChannelRules"
  - type: llm_judge
    criteria: "Training, monitoring, and vendor compliance standards create accountability — training requirements: all AR staff complete FDCPA compliance training within 30 days of hire, annual recertification required, training covers all channels, documented testing with 80% passing score required; specialized training for offshore team covering US regulations, cultural sensitivity, and recording/documentation requirements; monitoring procedures: 10% of collection calls randomly reviewed monthly, 5% of outbound emails audited quarterly, all SMS campaigns reviewed before launch, complaint tracking and trending (any complaint triggers immediate investigation), annual third-party compliance audit; vendor compliance standards: all collection agency contracts include compliance representations and warranties, right to audit, requirement to maintain FDCPA training records, reporting on complaints and regulatory actions, termination clause for compliance violations; vendor performance reviewed quarterly; the framework includes a compliance calendar with key dates for training, audits, and regulatory updates."
    weight: 0.30
    description: "TrainingMonitoringVendor"
