meta:
  id: government-ar-management
  level: 3
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Manage AR follow-up for government and public sector customers — navigate unique payment processes, prompt payment acts, and political sensitivities"
  tags: [government, public-sector, prompt-payment, advanced]

state: {}

trigger: |
  Your company provides IT services to government
  agencies. Government AR has unique challenges.
  Handle three scenarios.

  SCENARIO A — FEDERAL AGENCY
  The Department of Veterans Affairs owes $320,000
  for IT consulting services. The invoice is 55 days
  past due despite Net 30 terms.
  - Contract: firm-fixed-price, properly invoiced
    through IPP (Invoice Processing Platform)
  - COR (Contracting Officer's Representative)
    confirmed services were accepted
  - VA's prompt payment contact is unresponsive

  Write a 200-word follow-up leveraging the Prompt
  Payment Act (31 U.S.C. § 3901-3907).

  SCENARIO B — STATE AGENCY BUDGET FREEZE
  The State Department of Education owes $85,000.
  They responded: "The Governor has imposed a
  temporary spending freeze. We cannot process
  payments until the freeze is lifted."
  - No timeline given for freeze lifting
  - Your cash flow depends on this payment

  Write a 200-word response.

  SCENARIO C — MUNICIPAL DISPUTE
  A city government disputes $42,000 of your $75,000
  invoice for a cybersecurity assessment, claiming
  the scope exceeded what was authorized by the city
  council.

  Write a 200-word dispute resolution letter.

assertions:
  - type: llm_judge
    criteria: "The federal agency follow-up correctly leverages the Prompt Payment Act — the letter references the specific statute (31 U.S.C. § 3901-3907) which requires federal agencies to pay within 30 days of receipt of a proper invoice and receipt/acceptance of goods/services; notes that 55 days exceeds the statutory deadline by 25 days; calculates interest owed under the Prompt Payment Act (the Treasury rate for the applicable period); references that the invoice was properly submitted through IPP and services were accepted by the COR; the letter is addressed to both the agency's finance office and the Contracting Officer (not just the unresponsive prompt payment contact); it requests payment within 10 business days plus accrued interest; the tone is professional and regulatory — citing federal law, not making emotional appeals; it notes that continued non-payment may require escalation to the agency Inspector General or GAO."
    weight: 0.35
    description: "FederalPromptPayment"
  - type: llm_judge
    criteria: "The state budget freeze response is firm but politically aware — the letter to the state Department of Education: acknowledges the budget freeze as a real constraint but asks for specific information (expected timeline for freeze lifting, whether the obligation is recognized and will be paid when the freeze is lifted, whether the agency can provide written confirmation of the debt); references the state's own prompt payment statute (most states have one); proposes practical solutions: interim partial payment if possible, a written payment commitment with a specific date; notes the impact on your company's ability to continue providing services to the state; the tone recognizes the political reality (a contractor cannot bully a state agency) while firmly protecting financial interests; it does NOT threaten legal action against a government entity (politically unwise and often practically futile)."
    weight: 0.35
    description: "StateBudgetFreezeResponse"
  - type: llm_judge
    criteria: "The municipal dispute resolution is specific and navigates government procurement rules — the letter addresses the scope dispute by: referencing the original contract/purchase order and the scope of work as approved; documenting how the work performed aligned with the SOW; addressing the 'city council authorization' issue — noting that the contract was signed by the authorized procurement officer, which constitutes city authorization; proposing a meeting to review the deliverables against the scope, perhaps with the city's IT director who supervised the engagement; for the undisputed $33,000, requesting immediate payment (the dispute should not delay payment on the agreed portion); the letter demonstrates understanding that municipal procurement has layers of approval and political oversight that corporate contracts don't; all three responses show understanding of government-specific AR challenges: bureaucratic processes, political dynamics, statutory protections, and the reality that government customers can be slow but generally do pay."
    weight: 0.30
    description: "MunicipalDisputeResolution"
