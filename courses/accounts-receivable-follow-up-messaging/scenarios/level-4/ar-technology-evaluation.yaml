meta:
  id: ar-technology-evaluation
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Evaluate and recommend AR automation technology — conduct a comprehensive vendor assessment for an enterprise AR platform with specific focus on collection communication capabilities"
  tags: [technology-evaluation, vendor-assessment, enterprise, expert]

state: {}

trigger: |
  As the AR technology strategist, evaluate AR
  automation platforms for a $1.5B company.

  REQUIREMENTS:
  - Must integrate with Oracle ERP Cloud
  - Automated multi-channel dunning (email, SMS,
    phone workflow, letter generation)
  - Customer self-service payment portal
  - AI-powered collection prioritization
  - Automated cash application
  - Multi-entity, multi-currency support
  - SOC 2 Type II certified
  - Budget: $800K Year 1, $300K/year ongoing

  EVALUATE:
  1. HighRadius Autonomous Receivables
  2. Billtrust Order-to-Cash
  3. Esker Accounts Receivable
  4. Quadient AR Automation
  5. BlackLine AR Intelligence

  Produce:
  1. Detailed comparison matrix (evaluate each
     platform across 10 criteria)
  2. Strengths and weaknesses analysis
  3. TCO comparison (3-year)
  4. Recommendation memo (300 words)

assertions:
  - type: llm_judge
    criteria: "The comparison matrix evaluates all 5 platforms across meaningful criteria — the matrix covers 10 criteria: (1) dunning automation capabilities (template flexibility, channel support, sequence customization, A/B testing), (2) AI/ML capabilities (collection prioritization, payment prediction, anomaly detection), (3) cash application automation (match rate, exception handling, ML learning), (4) customer portal (UX, payment methods, self-service features), (5) Oracle Cloud integration (depth of integration, implementation complexity, data sync frequency), (6) multi-entity/multi-currency (consolidation, intercompany, currency handling), (7) analytics and reporting (dashboards, custom reports, predictive analytics), (8) scalability and performance (transaction volumes, user capacity, uptime SLA), (9) implementation (timeline, resource requirements, vendor support quality), (10) security and compliance (SOC 2, data encryption, FDCPA features); each platform is scored numerically and qualitatively on each criterion."
    weight: 0.35
    description: "ComparisonMatrix"
  - type: llm_judge
    criteria: "Strengths and weaknesses analysis and TCO comparison are specific and useful — for each platform: specific strengths and weaknesses, not generic descriptions; for example, HighRadius may excel in AI capabilities and large enterprise deployments but be complex to implement; Billtrust may have strong payment portal and mid-market focus but weaker multi-currency support; the analysis should feel like it's based on real product knowledge, not abstract categorizations; the 3-year TCO comparison includes: licensing costs (per user, per transaction, or flat), implementation costs (vendor + internal resources), ongoing maintenance and support, customization costs, and hidden costs (data migration, training, integration maintenance); the TCO analysis reveals the true cost beyond the initial quote — often implementation is 1.5-2x the licensing cost."
    weight: 0.35
    description: "StrengthsAndTCO"
  - type: llm_judge
    criteria: "The recommendation memo is decisive and addresses all stakeholder concerns — the 300-word memo recommends one platform (based on the evaluation) with clear rationale; the recommendation addresses: functional fit (which platform best meets the 10 criteria), financial fit (within the $800K Year 1 / $300K ongoing budget), strategic fit (alignment with the company's Oracle Cloud environment and growth trajectory), risk assessment (implementation risk, vendor stability, lock-in considerations); the memo acknowledges the runner-up and explains why it was not selected; it identifies the key risk with the recommended platform and the mitigation approach; it proposes next steps: vendor demo for the shortlisted 2-3 options, reference calls with similar-sized companies, contract negotiation strategy; the memo is written for a C-suite audience — concise, decisive, and focused on business outcomes rather than technical specifications."
    weight: 0.30
    description: "RecommendationMemo"
