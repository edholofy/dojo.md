meta:
  id: ar-ai-strategy
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design an AI/ML strategy for AR collections — specify use cases for natural language generation, predictive analytics, and intelligent automation in collection communications"
  tags: [ai-strategy, machine-learning, nlg, expert]

state: {}

trigger: |
  The Chief Digital Officer wants an AI strategy
  specifically for the AR collections function.

  COMPANY CONTEXT:
  - $2B company, 6,000 customers
  - AR team: 40 people
  - 300,000 dunning communications per year
  - Current technology: SAP + HighRadius (basic
    automation deployed 2 years ago)
  - Historical data: 5 years of collection activity,
    payment patterns, customer interactions

  Design:
  1. AI use case portfolio (5 specific use cases with
     expected impact)
  2. NLG strategy for automated collection
     commentary (200 words)
  3. Predictive analytics model design (200 words)
  4. Ethical AI framework for collections (150 words)
  5. Implementation roadmap and investment (200 words)

assertions:
  - type: llm_judge
    criteria: "The 5 AI use cases are specific, realistic, and quantify expected impact — Use Case 1: Predictive Payment Scoring — ML model predicting which invoices will be paid on time, late, or not at all, enabling proactive outreach for at-risk invoices (expected: 15% reduction in DSO for targeted accounts); Use Case 2: NLG-Powered Dunning — AI generates personalized collection emails based on customer history, relationship, and behavioral patterns rather than using static templates (expected: 20% improvement in payment response rates); Use Case 3: Intelligent Prioritization — AI ranks collector work queues by likelihood of collection success, directing effort where it has the highest ROI (expected: 25% improvement in collector productivity); Use Case 4: Automated Cash Application — ML matches incoming payments to invoices with 95%+ accuracy, reducing manual reconciliation (expected: 70% reduction in cash application time); Use Case 5: Churn and Credit Risk Early Warning — AI detects payment pattern changes that predict customer financial distress 3-6 months before default (expected: 30% reduction in bad debt through early intervention)."
    weight: 0.35
    description: "AIUseCases"
  - type: llm_judge
    criteria: "NLG strategy and predictive analytics model are technically sound — the 200-word NLG strategy: describes how the system generates personalized collection emails using customer context (payment history, communication history, relationship value, industry, known disputes); the NLG model is trained on the company's 5 years of successful collection communications — learning which tone, framing, and specificity produced the best payment outcomes; the system generates draft communications that collectors review and approve (human-in-the-loop, not fully autonomous); quality controls include: sentiment analysis to prevent inappropriate tone, compliance checks for FDCPA language, and A/B testing to continuously improve; the 200-word predictive analytics model: describes the features (customer demographics, payment history, invoice characteristics, external credit data, macroeconomic indicators), the model architecture (gradient boosting or similar for tabular data), training approach (supervised learning on 5 years of payment outcome data), performance metrics (AUC-ROC, precision/recall for late payment prediction), and deployment (real-time scoring integrated into HighRadius workflow)."
    weight: 0.35
    description: "NLGAndPredictiveAnalytics"
  - type: llm_judge
    criteria: "Ethical AI framework and implementation plan address responsible deployment — the 150-word ethical framework: addresses bias (model must not discriminate based on geography, industry, or company size in ways that disadvantage certain groups), transparency (customers should not be deceived by AI-generated communications — if asked, the company confirms AI assistance), accountability (a human is always responsible for collection decisions, even when AI-recommended), fairness (AI should not recommend more aggressive tactics for customers in certain demographics), data privacy (customer data used for AI training must comply with privacy regulations, data minimization principle), and governance (quarterly model review, bias testing, performance monitoring); the 200-word implementation roadmap: Phase 1 (Month 1-6): data preparation and model development for predictive scoring; Phase 2 (Month 7-12): deploy scoring + NLG pilot; Phase 3 (Month 13-18): full NLG deployment + intelligent prioritization; Phase 4 (Month 19-24): early warning system + continuous optimization; investment: $1.5-2.5M over 24 months; expected ROI: $4-8M in annual value from DSO reduction, bad debt reduction, and productivity gains."
    weight: 0.30
    description: "EthicsAndImplementation"
