meta:
  id: ar-training-certification
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design a professional certification program for AR collection professionals — create a comprehensive training and assessment program that elevates the collections function"
  tags: [training, certification, professional-development, expert]

state: {}

trigger: |
  NACM (National Association of Credit Management)
  has engaged you to design a new professional
  certification:

  "Certified Collections Communication Professional
  (CCCP)"

  CERTIFICATION PARAMETERS:
  - Target audience: AR analysts, collectors, credit
    managers (2-10 years experience)
  - Global applicability (US focus with international
    modules)
  - Competency-based with practical assessments
  - 120 hours of learning content
  - 3-tier certification: Associate, Professional,
    Master

  Design:
  1. Certification framework (6 competency domains)
  2. Curriculum outline for each tier
  3. Assessment methodology
  4. Practical examination design (2 sample scenarios)
  5. Continuing education requirements

assertions:
  - type: llm_judge
    criteria: "The certification framework defines meaningful competency domains — 6 competency domains: (1) Communication Fundamentals: business writing, tone calibration, channel selection, email/phone/letter proficiency; (2) Legal and Regulatory Compliance: FDCPA, TCPA, UCC, state regulations, international collection law, data privacy; (3) Customer Relationship Management: dispute resolution, negotiation, payment plan structuring, de-escalation techniques; (4) Technology and Analytics: AR automation platforms, reporting, data analysis, AI-assisted collection; (5) Industry and Sector Expertise: healthcare, construction, government, SaaS, professional services — industry-specific collection practices and regulations; (6) Strategic Collections Management: portfolio management, risk assessment, credit policy design, team leadership, process improvement; each domain has defined competency levels for each tier: Associate (foundational knowledge and basic application), Professional (advanced application and independent judgment), Master (strategic leadership and program design)."
    weight: 0.35
    description: "CertificationFramework"
  - type: llm_judge
    criteria: "Curriculum and assessment methodology are rigorous and practical — Associate tier (40 hours): core modules in communication fundamentals and legal compliance, basic customer relationship skills, introduction to technology; assessed by written exam (60% pass) plus 3 practical scenarios (supervised); Professional tier (additional 50 hours): advanced negotiation, industry specialization (choose 2 sectors), analytics and reporting, cross-cultural collections; assessed by comprehensive written exam (70% pass) plus portfolio of 10 real-world case analyses plus a live role-play assessment (negotiation with an actor playing a difficult customer); Master tier (additional 30 hours): strategic collections management, program design, leadership, thought leadership; assessed by written research paper on a collections topic (5,000 words), design of a complete AR communications program for a case study company, and presentation to a panel of certified professionals; the assessment design emphasizes practical skills over rote knowledge — the ability to write an effective collection email matters more than memorizing FDCPA section numbers."
    weight: 0.35
    description: "CurriculumAndAssessment"
  - type: llm_judge
    criteria: "Practical examination scenarios and CE requirements demonstrate real-world focus — the 2 sample practical exam scenarios: Scenario 1 (Associate level): given a customer profile (60-day past-due invoice, prior communication history, customer dispute claim), write the appropriate follow-up email, identify the applicable legal constraints, and propose next steps — graded on tone, compliance, completeness, and actionability; Scenario 2 (Professional level): given a complex multi-stakeholder situation (a strategic customer with a disputed invoice, an internal sales team pushing to write it off, and a credit insurance claim deadline approaching), write the customer communication, the internal recommendation memo, and the credit insurance notification — graded on strategic thinking, stakeholder management, and communication quality; continuing education: 20 hours annually for all tiers, must include at least 4 hours of legal/regulatory updates, can be earned through conferences, webinars, published articles, or teaching; recertification every 3 years."
    weight: 0.30
    description: "PracticalExamsAndCE"
