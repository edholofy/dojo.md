meta:
  id: ar-governance-framework
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design an AR governance framework for a global organization — establish policies, approval matrices, quality standards, and accountability mechanisms for collection communications"
  tags: [governance, policy-framework, global, expert]

state: {}

trigger: |
  After an incident where an AR analyst sent a
  threatening email to a major customer (resulting
  in a formal complaint to the CEO), the CFO wants
  a comprehensive governance framework for all AR
  communications.

  COMPANY:
  - $5B global company, 12 business units
  - 8,000 active customers across 40 countries
  - 120 AR staff in 6 collection centers
  - Mixed B2B (85%) and B2C (15%)
  - Annual dunning volume: 500,000+ communications
  - Current state: no communication standards, no
    quality review, no approval process for
    escalated messages

  Design:
  1. AR communication policy (250 words)
  2. Approval and escalation matrix (200 words)
  3. Quality assurance framework (200 words)
  4. Communication standards by customer segment
     (200 words)
  5. Incident response protocol (150 words)

assertions:
  - type: llm_judge
    criteria: "The AR communication policy establishes clear standards and prohibited practices — the 250-word policy: states the core principle (all AR communications must be professional, compliant, and proportionate to the situation); defines communication standards: all outbound communications must use approved templates; any deviation from templates requires supervisor approval; prohibited language is explicitly listed (threats, profanity, personal attacks, false claims about legal consequences); B2C communications must comply with FDCPA regardless of jurisdiction; B2B communications must comply with UCC and local regulations; all communications must be logged in the AR system; customers have the right to designate a preferred communication channel; data privacy requirements by region (GDPR for EU, CCPA for California, etc.); the policy applies to all channels (email, phone, SMS, letter, portal) and all collection centers globally."
    weight: 0.35
    description: "CommunicationPolicy"
  - type: llm_judge
    criteria: "The approval matrix and QA framework create appropriate controls without bureaucratic gridlock — the approval matrix defines: standard dunning (Days 1-30): automated, no approval needed; escalated communication (Days 31-60): supervisor review before sending; collection agency referral: manager approval required; legal demand letters: AR Director + Legal approval; any communication to a Top 100 customer: manager approval; any communication mentioning legal action: Legal department review; settlement offers: manager approval up to $10K, director up to $100K, VP for $100K+; the QA framework: random monthly audit of 5% of all outbound communications (scored against quality rubric), 100% review of all complaints and escalations, quarterly tone analysis of dunning emails (NLP-based sentiment scoring), bi-annual customer survey on collection experience, mystery shopper program (internal audit calls the collection team posing as customers); quality scores are tracked by collector, team, and region with minimum standards and improvement plans for underperformers."
    weight: 0.35
    description: "ApprovalAndQA"
  - type: llm_judge
    criteria: "Customer segment standards and incident response protocol are practical — the 200-word segment standards: Strategic customers ($1M+ annual revenue): dedicated AR contact, personal outreach only (no automated dunning), CFO-level escalation path, quarterly account health reviews; Major customers ($100K-$1M): semi-automated dunning with personal phone follow-up at Day 15, VP-level escalation; Standard customers ($10K-$100K): fully automated dunning, phone follow-up at Day 30, manager escalation; Small customers (<$10K): fully automated dunning, collection agency referral at Day 60 if no response; B2C customers: FDCPA-compliant communications only, additional sensitivity training required for collectors; the 150-word incident response protocol: immediate response when a customer complaint about AR communication is received — acknowledge complaint within 24 hours, investigate the communication in question, escalate to AR Director and Legal if complaint involves potential legal violation, respond to customer with findings and corrective action within 5 business days, document in incident log, implement process improvement to prevent recurrence, report quarterly to CFO on incident trends."
    weight: 0.30
    description: "SegmentStandardsAndIncidentResponse"
