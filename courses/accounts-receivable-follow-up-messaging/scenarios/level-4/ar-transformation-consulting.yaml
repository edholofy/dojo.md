meta:
  id: ar-transformation-consulting
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Lead an AR transformation consulting engagement — diagnose a company's collection inefficiencies, design the future state, and present a transformation roadmap to the C-suite"
  tags: [consulting, transformation, diagnostic, expert]

state: {}

trigger: |
  You are a collections optimization consultant
  engaged by a $3B industrial company. Their AR
  performance has deteriorated significantly.

  CLIENT SITUATION:
  - DSO increased from 42 to 67 days in 2 years
  - Bad debt write-offs: $18M last year (0.6% of
    revenue, up from 0.2%)
  - AR team: 60 people across 8 regions, no
    standardization
  - Technology: 3 different ERP systems (legacy
    acquisitions), no AR automation
  - Customer complaints about collection practices
    have increased 300%
  - The VP of AR was terminated last month

  Conduct:
  1. Diagnostic assessment findings (300 words)
  2. Root cause analysis (200 words)
  3. Future state design (250 words)
  4. Transformation roadmap (200 words)
  5. Business case for investment (150 words)

assertions:
  - type: llm_judge
    criteria: "The diagnostic assessment identifies specific, evidence-based issues — the 300-word findings cover: process diagnosis (no standard dunning sequence, regions use different approaches ranging from aggressive to passive, no escalation matrix, collection activity not documented consistently), technology diagnosis (3 ERPs create fragmented customer views, no cross-system aging report, manual Excel reconciliation takes 5 days per month, no payment portal), people diagnosis (inconsistent training, no performance metrics, high turnover in AR roles, collectors handling 500+ accounts each with no prioritization), customer experience diagnosis (complaints trace to aggressive communications in 2 regions and nonresponsive follow-up in 3 others, no single point of contact for customers with multi-entity relationships), financial impact (DSO increase of 25 days on $3B revenue = approximately $200M in additional working capital tied up, bad debt increase of $12M per year); the assessment is data-driven and specific, not generic consulting platitudes."
    weight: 0.35
    description: "DiagnosticAssessment"
  - type: llm_judge
    criteria: "Root cause analysis and future state design are insightful — the 200-word root cause analysis identifies 4 interconnected root causes: (1) Acquisition Integration Failure: 3 acquisitions were never operationally integrated, leaving 3 ERPs and 3 different AR processes; (2) Leadership Gap: the prior VP of AR focused on cost-cutting (reducing headcount) rather than process optimization, resulting in overwhelmed collectors making poor decisions; (3) Technology Underinvestment: no AR automation, no customer portal, no analytics — the team is fighting with spreadsheets while the AR balance grows; (4) Customer Segmentation Absence: a $50M strategic customer and a $10K transactional customer get identical treatment; the 250-word future state design describes: unified AR platform consolidating all 3 ERPs, AI-powered customer segmentation driving differentiated collection strategies, self-service customer portal reducing routine inquiries by 40%, automated dunning with human intervention only for complex cases, real-time analytics dashboard for management, and a restructured team of 40 (down from 60 through automation, not layoffs — attrition plus redeployment to business partnering roles)."
    weight: 0.35
    description: "RootCauseAndFutureState"
  - type: llm_judge
    criteria: "Transformation roadmap and business case are actionable and compelling — the 200-word roadmap covers 18 months in 4 phases: Phase 1 (Month 1-4): quick wins — standardize dunning templates, implement escalation matrix, create unified aging report across ERPs, launch collector training; Phase 2 (Month 5-9): technology — select and implement AR automation platform, deploy customer payment portal, integrate with all 3 ERPs; Phase 3 (Month 10-14): optimization — deploy AI prioritization, implement risk-differentiated dunning, restructure team roles, launch analytics dashboard; Phase 4 (Month 15-18): maturity — predictive analytics, continuous improvement, performance-based compensation for collectors; the 150-word business case: investment of $4-6M over 18 months (technology $3M, implementation $1.5M, change management $1M); expected returns: DSO reduction from 67 to 45 days = $180M working capital release, bad debt reduction from $18M to $8M = $10M annual savings, AR headcount optimization saving $2M annually through attrition; payback period: 8-12 months; NPV positive by Month 10."
    weight: 0.30
    description: "RoadmapAndBusinessCase"
