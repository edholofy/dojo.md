meta:
  id: ar-behavioral-science
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Apply behavioral science to AR follow-up messaging — design experiments testing nudge theory, framing effects, social proof, and loss aversion in collection communications"
  tags: [behavioral-science, nudge-theory, experimentation, expert]

state: {}

trigger: |
  Your company wants to apply behavioral science
  principles to improve collection rates. Design a
  research program.

  COMPANY CONTEXT:
  - $400M B2B company with 1,800 customers
  - Current dunning emails achieve a 12% payment
    rate within 7 days of sending
  - Collection call promise-to-pay conversion: 45%
  - 150,000 dunning emails sent annually
  - Sufficient volume for statistically significant
    A/B testing

  Design:
  1. Four behavioral science experiments (150 words
     each) testing different principles in AR
     communications
  2. Implementation methodology (200 words)
  3. Expected outcomes and measurement plan (150
     words)

assertions:
  - type: llm_judge
    criteria: "The four experiments apply distinct behavioral science principles to AR messaging — Experiment 1 (Social Proof): test whether including 'Most of our customers pay within 30 days' or '94% of invoices are paid on time' increases payment rate — based on Cialdini's social proof principle; control group gets standard reminder, test group gets social proof version; Experiment 2 (Loss Aversion): test framing the consequence of non-payment as a loss ('You will lose your preferred customer status and early access to new products') vs. the current gain framing ('Pay on time to maintain your preferred status') — based on Kahneman and Tversky's prospect theory; Experiment 3 (Commitment Consistency): test whether asking the customer to confirm a payment date in their reply (creating a commitment) increases follow-through vs. standard 'please pay' language — based on Cialdini's commitment principle; Experiment 4 (Specificity Effect): test whether specific deadlines ('Please pay by Thursday, March 5') outperform vague ones ('Please pay promptly') — based on implementation intentions research by Gollwitzer."
    weight: 0.35
    description: "BehavioralExperiments"
  - type: llm_judge
    criteria: "The implementation methodology is rigorous and practical — the 200-word methodology: defines the experimental design (randomized controlled trials with control and treatment groups), sample size calculations (with 150,000 annual emails, each experiment can run on 10,000-15,000 emails with sufficient statistical power), randomization approach (customers randomly assigned at account level to prevent contamination), measurement period (minimum 60 days per experiment to capture payment behavior), primary metric (payment rate within 7 days of dunning email), secondary metrics (payment rate within 30 days, customer satisfaction, complaint rate), statistical approach (chi-square test for payment rates, t-test for days-to-pay), controls (hold constant: amount owed, days past due, customer segment, send time), sequencing (run experiments sequentially to avoid interaction effects, or in parallel on non-overlapping customer groups), ethical considerations (no experiment should use deceptive or manipulative language, all must comply with FDCPA and company policy)."
    weight: 0.35
    description: "ImplementationMethodology"
  - type: llm_judge
    criteria: "Expected outcomes and measurement plan demonstrate analytical rigor — the 150-word outcomes section: sets realistic expectations (behavioral nudges typically produce 5-15% improvement in target behavior based on published research); estimates that improving the 12% payment rate by even 3 percentage points (to 15%) across 150,000 emails would generate significant additional cash flow; defines success criteria for each experiment (statistically significant at p < 0.05 with a minimum practical significance of 2 percentage point improvement); measurement plan includes: weekly monitoring of payment rates during the experiment, segmented analysis (does the nudge work differently for different customer segments, amounts, or aging categories), long-term tracking (does the nudge effect persist or does it decay over time), and qualitative feedback (customer complaints or positive comments about the new messaging); the program also captures organizational learning — even failed experiments provide insight about customer behavior."
    weight: 0.30
    description: "OutcomesAndMeasurement"
