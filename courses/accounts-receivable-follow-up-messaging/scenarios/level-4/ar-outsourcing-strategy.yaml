meta:
  id: ar-outsourcing-strategy
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Evaluate outsourcing the AR collections function — assess build vs. buy vs. outsource options including collection agency selection, SLA design, and quality monitoring"
  tags: [outsourcing, collection-agency, vendor-management, expert]

state: {}

trigger: |
  The CFO is considering outsourcing the transactional
  AR collection function. Evaluate the options.

  CURRENT STATE:
  - $1B company with 3,500 customers
  - 22 AR collectors handling follow-up and
    collections
  - 8 analysts handling cash application and
    reporting
  - Total AR department cost: $3.2M/year
  - DSO: 51 days, bad debt: 1.4% of revenue
  - Customer satisfaction with billing: 3.2/5.0

  OPTIONS:
  1. Status Quo: maintain all in-house
  2. Full Outsource: transfer all collection
     activities to a BPO (estimated $1.8M/year)
  3. Hybrid: outsource routine dunning (0-60 days)
     to BPO, retain complex collections (60+ days,
     disputes, strategic accounts) in-house
  4. Collection Agency Network: use 3 specialized
     agencies for different segments (healthcare,
     construction, general B2B)
  5. Technology-First: invest $500K in automation,
     reduce headcount by 40% through attrition

  Produce:
  1. Option comparison (300 words)
  2. Risk assessment (200 words)
  3. Recommendation memo (300 words)
  4. SLA framework for the recommended option (150
     words)

assertions:
  - type: llm_judge
    criteria: "The option comparison evaluates each option across relevant criteria with specific analysis — each option evaluated on: cost, quality (collection effectiveness), speed (DSO impact), control, compliance risk, customer experience, scalability, and transition risk; Status Quo: $3.2M, known quality, DSO 51 (no improvement), full control, low compliance risk, 3.2/5 satisfaction; Full Outsource: $1.8M (44% savings), quality dependent on SLA, DSO target 45, reduced control, elevated compliance risk (FDCPA), satisfaction risk (outsourced agents may not understand customer relationships); Hybrid: approximately $2.3M (28% savings), maintains quality for complex cases, DSO target 43, good control split, moderate compliance risk, satisfaction maintained for key accounts; Collection Agency Network: cost varies (25-50% of collections), specialized expertise by industry, variable DSO impact, limited control, agencies have FDCPA expertise, satisfaction varies by agency; Technology-First: $500K Year 1 + $2.0M ongoing (38% savings at steady state), improved quality through automation, DSO target 40, full control, low compliance risk, improved customer satisfaction (portal, self-service)."
    weight: 0.35
    description: "OptionComparison"
  - type: llm_judge
    criteria: "Risk assessment and recommendation are specific and well-reasoned — risk assessment covers: Full Outsource risks: knowledge loss (institutional knowledge about customers doesn't transfer), quality degradation during transition (6-12 months), customer backlash (they'll notice the change in communication style and responsiveness), compliance exposure (you're still liable for the BPO's FDCPA violations); Collection Agency risks: brand dilution (agencies collect in your name), variable quality, customer relationship damage for repeat collections; Technology-First risks: implementation failure (40% of AR automation projects fail to meet ROI targets), change management (staff resistance), upfront investment with delayed returns; the recommendation memo (likely recommending Technology-First or Hybrid based on the criteria, though other recommendations are acceptable if well-reasoned) provides clear rationale aligned with the company's priorities (cost reduction, quality improvement, customer experience), includes implementation timeline, acknowledges risks and mitigations, and addresses the human impact on the 22 collectors."
    weight: 0.35
    description: "RiskAndRecommendation"
  - type: llm_judge
    criteria: "The SLA framework for the recommended option defines measurable performance standards — the 150-word SLA framework includes: DSO target (specific number by quarter), collection effectiveness rate (% of AR collected within 30/60/90 days), customer satisfaction score (minimum threshold), communication quality score (based on random audits), compliance rate (100% — zero tolerance for FDCPA violations), response time (customer inquiries acknowledged within X hours), reporting requirements (frequency, format, content), penalty/incentive structure (financial consequences for missing SLAs, bonuses for exceeding), measurement methodology (how each metric is calculated and verified), review cadence (monthly operational review, quarterly business review), termination triggers (which SLA failures allow contract termination); the SLA framework is practical — measurable, enforceable, and aligned with the company's actual performance goals."
    weight: 0.30
    description: "SLAFramework"
