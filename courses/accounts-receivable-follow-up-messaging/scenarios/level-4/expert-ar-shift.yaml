meta:
  id: expert-ar-shift
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Expert shift simulation — serve as interim AR Director managing a crisis: handle a major customer bankruptcy, present to the audit committee on AR reserves, redesign the collection process after regulatory findings, and negotiate a troubled account settlement"
  tags: [shift-simulation, interim-director, ar-crisis, expert]

state: {}

trigger: |
  You are the interim AR Director after the
  previous director was let go. Four critical
  situations need your attention this week.

  TASK 1 — MAJOR CUSTOMER BANKRUPTCY (Monday)
  Your 2nd largest customer, National Distribution
  Corp ($4.2M annual, $680K outstanding), filed
  Chapter 11 at 9 AM. Write a 200-word action plan
  covering immediate steps, communication to
  stakeholders, and financial impact assessment.

  TASK 2 — AUDIT COMMITTEE PRESENTATION (Wednesday)
  The external auditors questioned the adequacy of
  your bad debt reserve. Current reserve: $2.1M
  (1.2% of AR). They believe it should be $3.8M
  based on aging analysis. Write a 200-word
  presentation narrative explaining either why the
  current reserve is adequate or proposing an
  adjustment.

  TASK 3 — REGULATORY REMEDIATION (Thursday)
  An internal audit found that your B2C collection
  emails violated FDCPA requirements (missing
  validation notices, incorrect debt amount in 12%
  of communications). Write a 200-word remediation
  plan.

  TASK 4 — SETTLEMENT NEGOTIATION (Friday)
  A customer owes $125,000 (180 days past due) and
  offers to settle for $75,000 (60 cents on the
  dollar). They claim it's "all they can afford."
  Write a 150-word counter-proposal and negotiation
  strategy.

  Handle all four tasks.

assertions:
  - type: llm_judge
    criteria: "The bankruptcy action plan is immediate and comprehensive — the 200-word plan covers: immediate actions (stop all shipments, halt dunning, place litigation hold, notify legal, mark account in ERP), financial impact ($680K at risk — assess pre-petition vs. post-petition split, calculate bad debt reserve impact, estimate recovery rate for unsecured claims in Chapter 11), stakeholder communications (internal alert to CEO, CFO, Sales VP, Credit Insurance provider; file proof of claim within deadline), and next steps (review contract for favorable terms, assess reclamation rights for recent shipments, evaluate customer's reorganization plan when filed, determine whether to continue selling post-petition under new payment terms); the plan demonstrates the ability to act decisively in a crisis while managing multiple stakeholder interests simultaneously."
    weight: 0.35
    description: "BankruptcyActionPlan"
  - type: llm_judge
    criteria: "The audit committee narrative and FDCPA remediation plan demonstrate leadership — the 200-word audit committee presentation: either defends the $2.1M reserve with specific evidence (historical write-off rates, account-specific analysis, economic conditions) or recommends the $3.8M adjustment with a clear explanation of methodology; provides the aging-based analysis the auditors used; addresses the gap honestly — if the reserve is inadequate, acknowledges it and proposes the adjustment; if defensible, provides the evidence; the narrative is appropriate for an audit committee (non-defensive, transparent, data-driven); the 200-word FDCPA remediation plan: immediately halts all non-compliant B2C communications, conducts a full audit of all templates and active dunning sequences, identifies the root cause (were templates wrong? Did the system populate incorrect amounts? Was training insufficient?), fixes the templates and data issues, retrains all B2C collectors, implements QA review of 100% of B2C communications for 90 days, and reports findings to legal counsel to assess any notification obligations."
    weight: 0.35
    description: "AuditAndRemediation"
  - type: llm_judge
    criteria: "The settlement negotiation strategy is commercially savvy — the 150-word counter-proposal: does not accept the $75,000 offer outright; proposes a structured counter: perhaps $95,000 (76 cents on the dollar) paid over 3 months, or $85,000 lump sum within 10 business days; the strategy includes: requesting financial documentation to verify the 'all they can afford' claim, identifying the BATNA (if they won't settle, what's the collection agency or legal recovery estimate — probably 30-50% after fees, making 60 cents not unreasonable), calculating the time value of money (is $75,000 today worth more than $125,000 in 18 months of litigation?), and establishing a settlement authority range ($80-95K acceptable, $75K as walk-away minimum only if truly their maximum); all four tasks demonstrate the ability to operate at AR Director level during a crisis — combining operational urgency with strategic judgment."
    weight: 0.30
    description: "SettlementNegotiation"
