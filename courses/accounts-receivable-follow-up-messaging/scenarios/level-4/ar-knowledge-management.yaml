meta:
  id: ar-knowledge-management
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design a knowledge management system for AR collections — capture institutional knowledge about customer payment patterns, successful collection strategies, and dispute resolution precedents"
  tags: [knowledge-management, institutional-memory, best-practices, expert]

state: {}

trigger: |
  When your most experienced collector retired after
  25 years, the team's collection effectiveness
  dropped 18% in 3 months. The knowledge about
  which approaches work with which customers was in
  her head, not in any system.

  COMPANY: $800M company, 2,200 customers, 15 AR
  staff, average AR tenure: 2.8 years

  Design:
  1. Customer payment intelligence database (200
     words)
  2. Collection strategy library (200 words)
  3. Dispute resolution precedent system (150 words)
  4. New collector onboarding accelerator (200 words)
  5. Continuous learning mechanisms (150 words)

assertions:
  - type: llm_judge
    criteria: "The customer payment intelligence database captures actionable knowledge about each customer — the 200-word database design: stores for each customer: preferred communication channel and contact, optimal contact time and day, payment patterns (which day of month they typically pay, which months are slow), known internal processes (their AP runs payments every other Thursday, their approval requires 3 signatures for amounts over $50K), relationship notes (the controller responds to email but the AP clerk responds to phone calls), historical collection strategies that worked (this customer always pays after a phone call from their account manager, never responds to email), dispute history and resolution precedents (they always dispute shipping charges — we resolved by including PO reference on every invoice), and escalation contacts (if AP is unresponsive, their VP Finance Jane Smith at x4521 resolves within 24 hours); the database is searchable and updated after every customer interaction; it transforms 25 years of one collector's knowledge into an organizational asset."
    weight: 0.35
    description: "PaymentIntelligenceDatabase"
  - type: llm_judge
    criteria: "Collection strategy library and dispute precedent system create reusable organizational knowledge — the 200-word strategy library: organized by situation type (first-time late, chronic late, financial hardship, dispute-related delay, seasonal payer, unresponsive customer, hostile customer), each strategy includes: the approach (what to do and say), the evidence (success rate from historical data), the conditions (when to use this strategy vs. alternatives), and example communications (actual emails and call scripts that worked); for example: 'Unresponsive Customer — Send 3 emails, then switch to phone + certified letter simultaneously; this approach has a 65% contact rate vs. 22% for email-only after 30 days'; the 150-word dispute precedent system: catalogs every dispute resolution as a searchable precedent — the issue, the customer's claim, the evidence reviewed, the resolution, and the outcome; tagged by dispute type (pricing, quality, scope, delivery, billing error) and customer industry; enables new collectors to resolve common disputes in hours rather than weeks by referencing how similar situations were resolved."
    weight: 0.35
    description: "StrategyAndPrecedents"
  - type: llm_judge
    criteria: "Onboarding accelerator and continuous learning reduce time-to-competency — the 200-word onboarding program: Week 1: system training + study the customer intelligence database for assigned accounts (read every note for their top 20 customers); Week 2: shadow an experienced collector on calls and emails (observe 20+ customer interactions); Week 3: handle assigned accounts with mentor review of all outbound communications before sending; Week 4: independent with daily check-ins; Weeks 5-8: independent with weekly coaching; target: reduce time-to-competency from 6 months to 8 weeks; the 150-word continuous learning section: after every significant collection interaction, the collector spends 2 minutes updating the customer intelligence database and flagging any new strategy or precedent; monthly team learning session where collectors share their most challenging case and how it was resolved; quarterly review of strategy library effectiveness (which strategies are working, which need updating); gamification: recognition for collectors who contribute the most knowledge to the database; success metrics: time-to-competency for new hires, collection effectiveness stability when staff turns over, knowledge base utilization rate."
    weight: 0.30
    description: "OnboardingAndLearning"
