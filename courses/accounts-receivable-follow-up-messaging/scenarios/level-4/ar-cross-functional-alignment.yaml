meta:
  id: ar-cross-functional-alignment
  level: 4
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design a cross-functional alignment framework between AR, Sales, Legal, and Customer Success — resolve the inherent tensions and create a unified approach to customer financial relationships"
  tags: [cross-functional, alignment, stakeholder-management, expert]

state: {}

trigger: |
  The CEO is tired of the constant conflicts between
  AR and Sales. Design a cross-functional alignment
  framework.

  THE CONFLICTS:
  1. Sales says AR is "too aggressive" and damages
     customer relationships
  2. AR says Sales makes "side deals" with customers
     that AR never hears about until the invoice is
     disputed
  3. Legal says both teams send communications that
     create legal risk without review
  4. Customer Success says customers are confused by
     receiving messages from 3 different departments
     about the same issue

  SPECIFIC RECENT INCIDENTS:
  - A sales VP promised a customer 90-day terms; AR
    sent a dunning email at Day 35 because the system
    shows Net 30 — customer furious
  - AR sent a collection threat to a customer who had
    a legitimate dispute filed with Customer Success
    — the dispute had not been communicated to AR
  - Sales closed a $2M deal with a customer who had
    $180K past due with no credit check — customer
    defaulted on the new order within 60 days

  Design:
  1. Cross-functional governance structure (200 words)
  2. Communication protocol (250 words)
  3. Customer financial relationship policy (200
     words)
  4. Conflict resolution framework (150 words)

assertions:
  - type: llm_judge
    criteria: "The governance structure creates accountability without bureaucracy — the 200-word governance structure establishes: a Customer Financial Health Committee (monthly meeting: AR Director, VP Sales, Legal counsel, Customer Success Director, chaired by CFO); committee responsibilities: review high-risk accounts, resolve escalated disputes, approve policy changes, review incidents; a shared customer relationship CRM that all departments can access and update — no more 'we didn't know about the dispute'; defined roles: Sales owns the commercial relationship, AR owns the financial relationship, Customer Success owns the service relationship, Legal provides compliance oversight; escalation path: department leads attempt bilateral resolution → Committee if unresolved → CFO for final decision; the structure prevents the recent incidents by ensuring information flows across departments."
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "The communication protocol prevents the specific incidents that triggered the redesign — the 250-word protocol: addresses the payment terms incident: any non-standard payment terms MUST be entered into the ERP before the invoice is generated — Sales cannot promise terms without system approval; AR dunning is triggered by system terms, so correct terms = correct dunning; addresses the dispute/dunning conflict: when any department logs a dispute in the CRM, AR dunning is automatically paused on the affected invoice until the dispute is resolved; AR cannot send collection communications on invoices with open disputes; addresses customer confusion: a single point of contact is designated for each major customer for all financial matters; outbound communications are coordinated through the CRM — if Customer Success is addressing a service issue, AR is notified and adjusts its follow-up timing; credit check protocol: all new orders above $50K from customers with past-due balances above $25K require AR sign-off before order acceptance; this prevents the $2M deal with the $180K past-due customer."
    weight: 0.35
    description: "CommunicationProtocol"
  - type: llm_judge
    criteria: "Customer financial relationship policy and conflict resolution are practical — the 200-word policy: defines the customer financial lifecycle (credit approval → invoicing → payment → dispute resolution → escalation) with clear ownership at each stage; establishes credit limits and monitoring (Sales proposes, AR approves, Finance reviews quarterly); defines dispute handling SLAs (Customer Success must log disputes within 24 hours, AR is auto-notified, resolution target: 15 business days); requires mutual KPIs — AR is measured on collection effectiveness AND customer satisfaction, Sales is measured on revenue AND credit quality of customers sold; the 150-word conflict resolution framework: Level 1: department leads discuss and resolve (target: 48 hours); Level 2: Customer Financial Health Committee review (monthly, or emergency session within 48 hours for high-value situations); Level 3: CFO decision (binding, within 5 business days); ground rules: no department may take unilateral action on a shared customer issue after a conflict has been escalated; all decisions documented; post-resolution review to prevent recurrence."
    weight: 0.30
    description: "PolicyAndConflictResolution"
