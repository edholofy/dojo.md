meta:
  id: ar-graduate-program
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Design a graduate-level course on credit management and collection communications — create a rigorous MBA elective that prepares future finance leaders to manage the order-to-cash cycle"
  tags: [graduate-program, mba-course, curriculum-design, master]

state: {}

trigger: |
  A top business school has asked you to design a
  new MBA elective:

  "Credit, Collections, and Customer Financial
  Relationships"

  COURSE PARAMETERS:
  - 14-week semester, 3-hour sessions
  - Target enrollment: 40 second-year MBA students
  - Prerequisites: Financial Accounting, Corporate
    Finance
  - School emphasizes case method and experiential
    learning
  - Must include a technology practicum

  Produce:
  1. Complete 14-week syllabus with session topics
     and readings
  2. Assessment design with rationale
  3. Three detailed lesson plans (Sessions 1, 7, 14)
  4. Capstone project specification

assertions:
  - type: llm_judge
    criteria: "The 14-week syllabus creates a coherent arc from credit fundamentals to strategic customer financial management — Weeks 1-3 (Foundations): credit risk assessment, payment terms design, the order-to-cash cycle; Weeks 4-6 (Communication and Collection): collection communication strategy, dunning design, tone calibration, multi-channel approach; Weeks 7-9 (Technology and Analytics): AR automation, AI in collections, predictive analytics, behavioral science in messaging; Weeks 10-12 (Complexity): international collections, legal compliance (FDCPA, global), industry-specific challenges (healthcare, construction, SaaS, government), dispute resolution and negotiation; Weeks 13-14 (Integration): the future of customer financial relationships, capstone presentations; each session includes readings from a mix of academic research (behavioral economics, communication theory), practitioner publications (Credit Today, NACM Business Credit), and case studies."
    weight: 0.35
    description: "SyllabusDesign"
  - type: llm_judge
    criteria: "Assessment design and lesson plans demonstrate pedagogical rigor — assessment: individual components (50%): participation 15%, midterm case analysis 15% (write the complete AR communication strategy for a company in crisis), collection email portfolio 10% (write 10 collection emails demonstrating mastery of tone progression), technology lab report 10%; team components (50%): capstone project 35%, peer evaluation ±5%; Session 1 lesson plan: opens with an exercise where students receive 5 real collection emails (anonymized) and rate them on effectiveness, professionalism, and likely customer response — demonstrates that collection communication is a skill, not just a task; Session 7: technology practicum where students use an AR automation platform to build a dunning sequence, run it against simulated customer data, and compare results; Session 14: capstone presentations to a panel including an industry CFO."
    weight: 0.35
    description: "AssessmentAndLessons"
  - type: llm_judge
    criteria: "The capstone project creates real-world learning — teams of 4-5 students partner with a real organization (small business, nonprofit, or university department) to: (1) assess their current AR and collection practices, (2) design an improved collection communication strategy (templates, escalation paths, channel selection), (3) implement one improvement during the semester and measure the result, (4) present findings to the class and a panel; the capstone requires students to apply every major concept from the course in a real setting; grading rubric: analytical depth (25%), practical feasibility (25%), communication quality (25%), measurable impact (25%); the project demonstrates that AR collections is a strategic function that combines finance, communication, psychology, technology, and management — not a back-office clerical activity."
    weight: 0.30
    description: "CapstoneProject"
