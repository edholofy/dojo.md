meta:
  id: ar-memoir
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write a professional memoir reflecting on a 30-year career in credit and collections — capture the evolution from paper-based dunning to AI-powered customer financial engagement"
  tags: [memoir, career-reflection, field-evolution, master]

state: {}

trigger: |
  You are retiring after 30 years in credit
  management and collections. NACM's Business
  Credit magazine has asked you to write a 2,500-
  word reflective essay:

  "From Carbon Copies to AI: A Collections Career"

  YOUR CAREER ARC (1995-2025):
  - 1995-2000: Junior collector at a manufacturing
    company (typewritten dunning letters, paper aging
    reports, rotary phone)
  - 2000-2005: AR supervisor, technology company
    (email revolution, dot-com bust, writing off
    millions)
  - 2005-2010: Credit manager, distribution company
    (first ERP, Great Recession, creative collections)
  - 2010-2015: AR Director, healthcare company
    (medical billing complexity, patient collections
    regulation, ACA changes)
  - 2015-2020: VP of Order-to-Cash, Fortune 500
    (global collections, automation implementation,
    200-person team)
  - 2020-2025: Chief Credit Officer, PE-backed
    company (AI/ML deployment, COVID collections
    crisis, ethical collections movement)

  Write the 2,500-word memoir.

assertions:
  - type: llm_judge
    criteria: "The memoir authentically captures each career era with specific, believable details — 1995-2000: the manufacturing company where dunning letters were typed on IBM Selectrics with carbon copies, where the aging report was printed on green-bar paper every Monday morning and the team spent Tuesday marking it up with red pen, where you learned to dial 50 numbers a day from a printed call list and track promises on index cards; the customer who taught you that a personal visit to their office collected more than 100 letters; 2000-2005: the email revolution that seemed miraculous (send a dunning email and get a response in hours instead of waiting 2 weeks for mail), then the dot-com bust when your company's AR went from $8M to $22M in uncollectable receivables in 6 months and you spent a year writing off accounts from companies that no longer existed; each era feels real and specific."
    weight: 0.35
    description: "AuthenticNarrative"
  - type: llm_judge
    criteria: "The memoir captures the evolution of collection communication through personal experience — 2005-2010: the first ERP that promised to automate dunning but instead created 'batch email chaos' (hundreds of identical emails sent to every customer regardless of relationship), the Great Recession when creative collection communication became survival — learning that empathy and flexibility collected more than threats when everyone was struggling; 2010-2015: healthcare collections where you learned that patient financial communication is fundamentally different from B2B — compassion isn't optional, it's required, and federal regulations mean one wrong sentence in a collection letter can cost millions; 2015-2020: scaling collections globally and discovering that your American dunning templates were offensive in Japan, confusing in Germany, and ineffective in Brazil; 2020-2025: deploying AI that could predict which customers would pay late 30 days before the invoice was due, and the philosophical question of whether an AI should be allowed to write a collection email without human review."
    weight: 0.35
    description: "FieldEvolution"
  - type: llm_judge
    criteria: "The memoir offers wisdom about what changed and what didn't, with advice for the next generation — what changed: technology (from typewriters to AI), speed (from monthly to real-time), reach (from local to global), regulation (from minimal to comprehensive), professionalism (from 'collectors' to 'customer financial engagement professionals'); what didn't change: the fundamental human dynamics (people who can't pay need help, people who won't pay need pressure, and the art is telling the difference), the importance of listening (the best collection strategy in 1995 and 2025 is the same — understand the customer's situation before demanding payment), the relationship between collections and trust (every collection interaction either builds or destroys commercial trust); advice: (1) Learn the technology but master the conversation — AI will write the email but you must make the phone call that saves the relationship; (2) Treat every customer interaction as a relationship moment, not a transaction; (3) The field is finally being recognized as strategic — embrace that; the memoir is approximately 2,500 words."
    weight: 0.30
    description: "WisdomAndAdvice"
