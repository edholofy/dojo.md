meta:
  id: master-ar-shift
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Master shift simulation — deliver expert testimony on collection practices to a congressional committee, write a CFO advisory memo on transforming AR collections, and synthesize global collection practices at an international summit"
  tags: [shift-simulation, congressional-testimony, advisory, master]

state: {}

trigger: |
  Three high-stakes engagements require your
  expertise this week.

  ENGAGEMENT 1 — CONGRESSIONAL TESTIMONY (Monday)
  The Senate Commerce Committee is investigating
  debt collection practices. You are testifying as
  an expert on collection communication practices.

  Write 400-word prepared testimony addressing:
  - Whether current FDCPA regulations adequately
    protect consumers in the digital age
  - 3 specific regulatory modernization proposals
  - The role of AI in collection communications
    (promise and peril)

  ENGAGEMENT 2 — CFO ADVISORY MEMO (Wednesday)
  A Fortune 100 company's CEO has asked you to
  advise the incoming CFO on transforming their
  collections function. The company has $800M in AR,
  DSO of 62 days, and a 150-person AR organization
  using outdated processes.

  Write a 500-word strategic advisory memo covering:
  - Diagnosis of typical enterprise AR dysfunction
  - Vision for the future state
  - Transformation roadmap
  - Investment and expected ROI
  - Talent strategy

  ENGAGEMENT 3 — GLOBAL SUMMIT SYNTHESIS (Friday)
  You are chairing the closing session of the
  Global Credit Management Summit in Singapore. 250
  delegates from 35 countries discussed the future
  of collection communications for 3 days.

  Write a 400-word closing synthesis capturing key
  themes, debates, and an action agenda.

  Handle all three engagements.

assertions:
  - type: llm_judge
    criteria: "Congressional testimony demonstrates policy expertise — the 400-word testimony: opens with credentials and a clear position; addresses the FDCPA question directly — the Act was written in 1977 for a world of phone calls and paper letters; it does not adequately address email, SMS, social media, AI-generated communications, or cross-border collections; 3 specific proposals: (1) extend FDCPA communication standards to all digital channels with channel-appropriate rules, (2) establish AI governance requirements for collection communications (human oversight, explainability, bias testing), (3) create a federal framework for B2B collection communications (currently unregulated) that establishes baseline professional standards; the AI section acknowledges both promise (personalization, efficiency, consistency) and peril (scale of non-compliant communications, algorithmic bias, loss of human judgment in sensitive situations); the tone is measured and nonpartisan."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "CFO advisory memo demonstrates strategic consulting capability — the 500-word memo: diagnoses typical enterprise AR dysfunction (150-person team doing manual work that should be automated, no customer segmentation, static templates, reactive approach, siloed from Sales and Customer Success, technology 10 years behind the state of the art); vision: customer financial engagement function (not collections department) with AI-powered communication, predictive intervention, and business partnership capabilities; roadmap: Phase 1 (6 months) standardize and automate, Phase 2 (6-12 months) deploy AI and analytics, Phase 3 (12-18 months) transform to customer financial engagement; investment: $15-25M over 18 months; ROI: DSO reduction from 62 to 42 days = $440M+ in freed working capital, bad debt reduction, productivity gains; talent strategy: reskill 60% as customer financial engagement professionals, recruit 20% with data science capabilities, allow 20% natural attrition from transactional roles eliminated by automation."
    weight: 0.35
    description: "CFOAdvisoryMemo"
  - type: llm_judge
    criteria: "Global summit synthesis demonstrates thought leadership — the 400-word closing: captures 5 key themes: (1) collections is becoming customer financial engagement, (2) AI is the most significant force transforming the function but requires ethical guardrails, (3) cultural intelligence is non-negotiable for global collections, (4) the profession needs formal standards and certifications, (5) the best collection communication is the one you never have to send (proactive, preventive approaches); areas of debate: whether AI should be allowed to make autonomous collection decisions, whether aggressive collection tactics are ever justified, how to balance consumer protection with commercial necessity across different legal systems; action agenda: form a working group on global collection communication standards, create an open-source behavioral science toolkit for collection professionals, launch a joint industry-academic research center on AI ethics in collections; the synthesis ends with an inspiring close."
    weight: 0.30
    description: "SummitSynthesis"
