meta:
  id: global-ar-standards
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Propose global standards for AR collection communications — develop an international framework establishing best practices for ethical, effective, and culturally appropriate collection messaging"
  tags: [global-standards, international, ethical-collections, master]

state: {}

trigger: |
  The International Credit Association (ICA) has
  commissioned you to draft a Global Standard for
  Collection Communications (GSCC).

  CONTEXT:
  - No global standard exists for how organizations
    should communicate with customers about past-due
    payments
  - Practices vary enormously: some organizations
    use aggressive tactics that damage relationships;
    others are so passive they never collect
  - The standard should be applicable globally,
    across industries and cultures
  - It should be principles-based, not prescriptive

  WORKING GROUP:
  - 25 members from 18 countries
  - Mix of credit managers, regulators, consumer
    advocates, technology vendors, and academics

  Produce:
  1. The GSCC framework (8-10 core principles with
     application guidance)
  2. Maturity model for self-assessment
  3. Cultural adaptation guidelines
  4. Basis for conclusions

assertions:
  - type: llm_judge
    criteria: "The GSCC establishes universally applicable principles for collection communications — the framework proposes 8-10 core principles: (1) Respect: all collection communications must treat the recipient with dignity regardless of the amount owed or the stage of collection; (2) Clarity: communications must clearly identify the creditor, the amount owed, and the basis for the obligation; (3) Proportionality: the intensity and frequency of collection activity should be proportionate to the amount, age, and nature of the debt; (4) Honesty: no misrepresentation of consequences, identity, or the debtor's legal obligations; (5) Timeliness: communications should be sent at appropriate times and intervals, allowing reasonable time for response; (6) Privacy: debt-related communications should protect the debtor's privacy and not disclose the debt to unauthorized parties; (7) Cultural Sensitivity: communications should be adapted to the cultural context of the recipient; (8) Technology Responsibility: automated collection systems should be designed with the same ethical standards as human communications; each principle includes application guidance explaining how it applies in different contexts (B2B vs. B2C, domestic vs. international, small vs. large amounts)."
    weight: 0.35
    description: "CorePrinciples"
  - type: llm_judge
    criteria: "The maturity model and cultural adaptation guidelines provide practical tools — the maturity model has 5 levels: Level 1 (Basic): ad hoc collection practices, no standard templates, reactive approach; Level 2 (Developing): standardized templates, basic escalation process, some training; Level 3 (Established): automated dunning, customer segmentation, compliance monitoring, regular training, quality assurance; Level 4 (Advanced): AI-assisted collection, predictive analytics, behavioral science-informed communications, cross-functional integration; Level 5 (Leading): fully integrated customer financial engagement platform, real-time intelligence, organizational learning from collection interactions, collections as a competitive advantage; cultural adaptation guidelines: address specific adaptations needed for major cultural zones (Northern Europe — direct, efficient; Southern Europe — relationship-first; Asia — face-saving, indirect; Americas — varies by country; Middle East — relationship and trust paramount; Africa — community consideration); for each zone: recommended tone adjustments, timing considerations, channel preferences, escalation sensitivity, and common pitfalls for foreign collectors."
    weight: 0.35
    description: "MaturityAndCulturalAdaptation"
  - type: llm_judge
    criteria: "The basis for conclusions addresses key working group debates — the document addresses debates: (1) Why principles-based over prescriptive: collection practices are too diverse across industries, cultures, and legal systems for one-size-fits-all rules; (2) The consumer advocate vs. business tension: consumer advocates wanted stronger restrictions on contact frequency and channels; business representatives argued for flexibility; the compromise is proportionality — intensity should match the situation; (3) Technology and AI: the working group debated whether AI-generated collection communications should be labeled as such; the standard recommends transparency but does not mandate labeling; (4) Cross-border enforcement: the standard is voluntary — it cannot be enforced across jurisdictions; its value comes from industry adoption and potential incorporation into national regulations; (5) B2B vs. B2C: some working group members argued that B2B collections need less protection; the standard applies the same ethical principles to both but acknowledges different application contexts."
    weight: 0.30
    description: "BasisForConclusions"
