meta:
  id: ar-research-handbook
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write the introduction chapter for an academic handbook on collection communication research — synthesize literature across communication theory, behavioral economics, and credit management"
  tags: [academic, research-handbook, literature-synthesis, master]

state: {}

trigger: |
  Cambridge University Press has commissioned "The
  Handbook of Debt Collection Communication Research."
  You are writing the introductory chapter:

  "Collection Communication as a Field of Study:
  Foundations, Frontiers, and Future Directions"

  CHAPTER REQUIREMENTS:
  - 3,000 words
  - Targeted at PhD students and researchers
  - Synthesize across disciplines: communication
    studies, behavioral economics, consumer
    psychology, business ethics, information systems
  - Define the intellectual boundaries of the field
  - Review major research streams
  - Propose a research agenda

  Write the introductory chapter.

assertions:
  - type: llm_judge
    criteria: "The chapter defines the field and presents a conceptual framework — the definition: collection communication research encompasses the scholarly study of how organizations communicate with customers about financial obligations — including the design, delivery, and impact of messages intended to facilitate payment of outstanding debts; the field sits at the intersection of communication studies, behavioral economics, consumer psychology, business ethics, and information systems; the conceptual framework organizes research around 4 dimensions: (1) Message Dimension: the content, tone, framing, and structure of collection communications — drawing on persuasion theory (Petty and Cacioppo's Elaboration Likelihood Model), framing effects (Tversky and Kahneman), and rhetoric; (2) Behavioral Dimension: how recipients respond to collection communications — the psychology of debt, avoidance behavior, mental accounting, and the emotional impact of collection messages; (3) Ethical Dimension: the moral obligations of creditors in communication, power asymmetry, dignity, and fairness — drawing on business ethics and philosophy; (4) Technological Dimension: how technology shapes collection communication — from mass-produced letters to AI-generated personalized messages."
    weight: 0.35
    description: "FieldDefinitionAndFramework"
  - type: llm_judge
    criteria: "The literature review synthesizes major research streams with scholarly depth — the chapter reviews: Communication Effectiveness Research: studies on which message elements produce higher payment rates — the UK's Behavioural Insights Team's tax collection experiments, research on deadline specificity (Gollwitzer's implementation intentions), social proof in financial communications; Consumer Psychology of Debt: the emotional experience of debt and how it affects response to collection communications — financial shame (Braucher, 2006), debt avoidance behavior (Gathergood, 2012), the relationship between financial stress and mental health (Sweet et al., 2013); Regulatory and Legal Research: the evolution of collection regulation from the original FDCPA (1977) through Regulation F (2024), comparative studies of collection regulation across jurisdictions; Technology and Automation Research: the emerging literature on AI in collections, NLG for financial communication, and the ethical implications of automated collection systems; each stream is reviewed critically."
    weight: 0.35
    description: "LiteratureSynthesis"
  - type: llm_judge
    criteria: "The research agenda identifies gaps and proposes specific directions — identified gaps: (1) the B2B gap — virtually all collection communication research focuses on consumer debt; B2B collection communication is unstudied despite representing the majority of collection volume by dollar amount; (2) the AI gap — AI is rapidly being deployed in collection communication but we have almost no research on its impact on communication quality, debtor behavior, or ethical outcomes; (3) the cross-cultural gap — collection communication research is almost exclusively conducted in English-speaking Western countries; (4) the longitudinal gap — most studies measure immediate payment response but not long-term effects on the creditor-debtor relationship; proposed research directions: (1) large-scale field experiments comparing AI-generated vs. human-generated collection communications, (2) cross-cultural studies of collection communication effectiveness, (3) longitudinal studies tracking how collection communication quality affects customer retention and lifetime value, (4) ethical frameworks for AI deployment in collection communication; the chapter is approximately 3,000 words."
    weight: 0.30
    description: "ResearchAgenda"
