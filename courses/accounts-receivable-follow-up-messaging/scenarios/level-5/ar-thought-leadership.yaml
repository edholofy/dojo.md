meta:
  id: ar-thought-leadership
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Deliver a keynote on the future of AR collections — articulate a vision for how collection communications will evolve from transactional follow-up to intelligent customer financial engagement"
  tags: [thought-leadership, keynote, future-vision, master]

state: {}

trigger: |
  You have been invited to deliver the opening
  keynote at NACM's Annual Credit Congress. Topic:

  "Beyond Dunning: The Future of Customer Financial
  Engagement"

  AUDIENCE: 600 attendees — credit managers, AR
  directors, CFOs, collection agency leaders,
  technology vendors, academics

  KEY THEMES TO ADDRESS:
  1. Why traditional dunning is becoming obsolete
  2. The shift from collection to customer financial
     engagement
  3. AI and predictive analytics transforming AR
  4. The human role in an automated collections world
  5. What the AR professional of 2030 looks like

  Write a 3,500-word keynote script that proposes
  an original framework or model.

assertions:
  - type: llm_judge
    criteria: "The keynote proposes an original framework that advances thinking about AR collections — the speech introduces a model (e.g., 'The Customer Financial Engagement Pyramid' or 'The Predictive Collections Loop') that transcends traditional dunning; the framework addresses: (1) the temporal dimension — moving from reactive follow-up to predictive intervention (contacting customers before they're late based on payment pattern analysis), (2) the communication dimension — moving from templated emails to personalized, context-aware communications that treat each customer interaction as relationship-building, (3) the analytical dimension — moving from aging reports to real-time financial health monitoring that integrates internal payment data with external signals, (4) the organizational dimension — moving from siloed AR departments to integrated customer financial engagement teams that combine credit, collections, and customer success; the framework is memorable and practical — something an AR director could use as a roadmap for transforming their function."
    weight: 0.35
    description: "OriginalFramework"
  - type: llm_judge
    criteria: "The keynote addresses the evolution of dunning with nuance and the AI transformation with practical insight — the speech engages honestly with the state of the profession: acknowledges that the typical dunning process (automated email → second email → phone call → demand letter → collection agency) hasn't fundamentally changed in 30 years despite massive technological advancement; the question is not 'automate the dunning sequence faster' but 'replace the adversarial collection model with a collaborative financial engagement model'; the AI section provides specific, realistic examples: AI detecting payment pattern deterioration 45 days before a customer goes past due, NLG generating personalized communications that reference the specific customer's history and context, predictive models that recommend the optimal channel, time, and message for each customer interaction; the speech honestly addresses limitations: AI can predict who will pay late but cannot replace the human judgment needed to manage a strategic customer through financial difficulty; the AR professional of 2030 is a 'Customer Financial Intelligence Officer' who combines data literacy, financial acumen, negotiation skills, and emotional intelligence."
    weight: 0.35
    description: "EvolutionAndAI"
  - type: llm_judge
    criteria: "The keynote is well-structured, engaging, and actionable — the speech follows a compelling arc: opens with a story (perhaps a customer who received 47 automated dunning emails and one human phone call — which one produced the payment?), builds through the case for change, presents the framework, and closes with a call to action; the tone is appropriate for NACM — professionally ambitious but grounded, forward-looking but respectful of current practitioners; the call to action includes 3-4 specific steps: (1) Kill one template (identify your least effective dunning email and replace it with a personalized approach), (2) Predict one customer (build a simple model that flags customers likely to pay late next month), (3) Call one customer proactively (reach out before the invoice is due to a customer whose payment pattern has changed), (4) Measure one outcome (track whether your collection communications are improving customer relationships or damaging them); the keynote is approximately 3,500 words."
    weight: 0.30
    description: "StructureAndActionability"
