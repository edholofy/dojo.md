meta:
  id: ar-social-enterprise
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Create a social enterprise that transforms debt collection into a humane, effective process — design an organization that proves compassionate collections outperform aggressive ones"
  tags: [social-enterprise, ethical-collections, innovation, master]

state: {}

trigger: |
  You are founding a B-Corp called "CollectWell" —
  a social enterprise that proves compassionate
  collection communications produce better outcomes
  than aggressive ones.

  THE PROBLEM:
  - Traditional collection agencies recover 15-20%
    of referred accounts
  - Aggressive tactics damage customer relationships,
    create legal risk, and contribute to financial
    anxiety and mental health issues
  - Small businesses lose $1.5T annually in unpaid
    invoices globally
  - The collection industry has the worst consumer
    satisfaction ratings of any service sector

  YOUR THESIS:
  - Behavioral science-informed, compassionate
    collection communications recover MORE money, not
    less, compared to aggressive approaches
  - Research supports this: UK HMRC studies showed
    behavioral nudges improved tax collection by 15%

  Produce:
  1. Business plan (3,000 words) covering mission,
     methodology, market, and revenue model
  2. The "CollectWell Method" (your proprietary
     collection approach)
  3. Impact measurement framework
  4. 3-year financial projections

assertions:
  - type: llm_judge
    criteria: "The business plan presents a viable social enterprise with a compelling methodology — the mission: prove that treating debtors with dignity and using behavioral science produces superior collection outcomes; the CollectWell Method: (1) Understanding Phase — before any contact, analyze the debtor's situation (payment history, financial indicators, likely barriers to payment); (2) Empathetic First Contact — open with understanding, not demands; acknowledge that situations arise; offer solutions; (3) Behavioral Nudges — use social proof ('most people in your situation resolve this within 2 weeks'), specific deadlines, loss aversion framing, and implementation intentions ('what day will you make the payment?'); (4) Solution Architecture — proactively offer payment plans, hardship programs, and mediation before escalating; (5) Continuous Measurement — A/B test every communication to continuously improve; the market opportunity: $18B collection agency industry in the US alone, growing demand for ethical collections from ESG-conscious companies; revenue model: contingency fee (20-35% of collections) competitive with industry but with proven superior recovery rates."
    weight: 0.35
    description: "BusinessPlanAndMethod"
  - type: llm_judge
    criteria: "The impact measurement framework demonstrates dual bottom line rigor — output metrics: number of accounts managed, communications sent, recovery rate vs. industry benchmark; outcome metrics: debtor experience survey (NPS, anxiety levels before/after), client satisfaction, complaint rate vs. industry, payment plan completion rates; impact metrics: mental health impact (partnership with academic researchers to measure stress/anxiety reduction), financial rehabilitation (% of debtors who return to good standing within 12 months after resolution), relationship preservation (% of creditor-debtor relationships maintained after collection); the framework includes a rigorous comparison methodology: for each client, CollectWell and the client's previous agency handle comparable portfolios, and recovery rates are compared head-to-head; the business plan includes academic partnerships to publish results, creating both credibility and marketing."
    weight: 0.35
    description: "ImpactMeasurement"
  - type: llm_judge
    criteria: "The financial projections are realistic and show a path to sustainability — Year 1: focus on pilot clients (5-10 companies willing to test the approach), invest in methodology development and measurement infrastructure, $500K revenue, -$800K net; Year 2: scale with published results from pilots, 25 clients, $2M revenue, approaching break-even; Year 3: expand nationally with proven results, 60 clients, $5M revenue, $500K net income; key assumptions: recovery rate 25-30% (vs. industry 15-20%), contingency fee 25% average, client retention 85%+ (clients stay because results are better), average portfolio size $500K per client; funding: seed round $1.5M from impact investors, Series A $5M if Year 2 results support the thesis; the projections acknowledge the key risk: if compassionate collections don't actually produce superior recovery rates, the thesis fails — but pilot data and academic research strongly suggest they will."
    weight: 0.30
    description: "FinancialProjections"
