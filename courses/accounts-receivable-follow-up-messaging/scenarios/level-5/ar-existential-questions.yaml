meta:
  id: ar-existential-questions
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write a philosophical essay on the ethics of debt collection communication — explore the tension between commercial obligation and human dignity in collection messaging"
  tags: [philosophy, ethics, debt-communication, master]

state: {}

trigger: |
  Harvard Business Review has commissioned a 3,000-
  word essay for their special issue on "Business
  Ethics in Practice."

  Your assigned topic:

  "The Language of Debt: How Collection
  Communications Shape Human Dignity and Commercial
  Trust"

  EDITORIAL GUIDANCE:
  - HBR readers are senior executives and academics
  - The essay should be intellectually rigorous but
    accessible
  - Draw on philosophy, behavioral science, and
    business ethics
  - Include specific examples
  - Propose a resolution, not just critique

  THEMES TO EXPLORE:
  1. The power asymmetry in collection communications
  2. How language choices affect debtor behavior and
     well-being
  3. The commercial case for ethical collections
  4. Technology's amplification of both good and bad
     collection practices
  5. Toward a new social contract for debt
     communication

  Write the 3,000-word essay.

assertions:
  - type: llm_judge
    criteria: "The essay presents an original thesis about the ethics of collection communication — the essay argues something provocative yet defensible: that the language used in debt collection is one of the most powerful and underexamined forces in commercial relationships — it can either reinforce commercial trust and maintain productive business relationships, or destroy them; the thesis draws on relevant intellectual traditions: the power dynamics of communication (Habermas), the ethics of care (Noddings), behavioral economics (Thaler and Sunstein on nudges), and the sociology of debt (Graeber's 'Debt: The First 5,000 Years'); the essay uses specific examples: a collection email that caused a small business owner to close their business rather than face the perceived shame, versus a collection approach that helped a struggling customer restructure payments and ultimately become a loyal, profitable client; the writing is HBR-quality: clear, engaging, using concrete examples to illustrate abstract concepts."
    weight: 0.35
    description: "OriginalThesis"
  - type: llm_judge
    criteria: "The essay explores each theme with depth — the power asymmetry section: in most collection scenarios, the creditor holds all the power — they control the communication channel, frequency, tone, and consequences; the debtor's only power is to not respond, which triggers escalation; this dynamic mirrors other power imbalances that business ethics addresses (employer-employee, company-consumer); the language effects section: behavioral science demonstrates that the words chosen in collection communications directly affect debtor behavior — threatening language triggers fight-or-flight responses (avoidance, dispute, complaint), while problem-solving language triggers approach behavior (payment, negotiation, resolution); the commercial case section: companies that adopt ethical collection practices see 15-30% higher recovery rates, 50% fewer complaints, and significantly better customer retention — ethics and effectiveness are aligned, not opposed; the technology section: AI and automation amplify whatever approach a company takes — if the approach is aggressive, automation sends thousands of aggressive emails per hour; if compassionate, it personalizes thousands of supportive communications; the ethical imperative for AI in collections is especially high because of this amplification effect."
    weight: 0.35
    description: "ThematicDepth"
  - type: llm_judge
    criteria: "The essay proposes a resolution — a new social contract for debt communication — the proposed resolution: a new social contract between creditors and debtors based on 4 principles: (1) Transparency: creditors clearly communicate the obligation, the consequences of non-payment, and the options available — no hidden fees, no misleading threats, no ambiguity; (2) Proportionality: the intensity of collection activity matches the situation — a $500 invoice 10 days late does not warrant a threatening legal letter; (3) Agency: debtors are treated as agents capable of making decisions, not as adversaries to be coerced — offer options, not ultimatums; (4) Dignity: regardless of the amount owed or the reason for non-payment, every communication maintains the recipient's dignity; the essay concludes that this social contract is not just an ethical ideal — it's a commercially superior strategy; companies that adopt it will outperform those that don't; the essay is approximately 3,000 words."
    weight: 0.30
    description: "Resolution"
