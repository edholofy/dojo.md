meta:
  id: ar-technology-startup
  level: 5
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write a Series A pitch for an AR collections technology startup — create a comprehensive investment narrative for an AI-powered platform that transforms collection communications"
  tags: [startup, series-a, investment, master]

state: {}

trigger: |
  You are the founder/CEO of "CollectIQ" — an
  AI-powered collection communications platform.
  You are preparing for your Series A fundraise.

  COMPANY BACKGROUND:
  - Founded 18 months ago by you (ex-AR Director at
    Fortune 500) and a CTO (ex-Google NLP engineer)
  - Seed round: $2.5M from fintech angels
  - Product: AI platform that generates personalized
    collection communications based on customer
    behavioral analysis, optimizes channel and timing,
    and predicts payment likelihood
  - Current traction: 28 paying customers, $900K ARR,
    135% net revenue retention
  - Key differentiation: NLG engine trained on 10M+
    collection communications with outcome data

  FUNDRAISE: $12M Series A

  Write a 3,000-word investment memo covering:
  1. Executive summary
  2. Problem and market opportunity
  3. Product and technology
  4. Business model and unit economics
  5. Competitive landscape
  6. Financial projections and use of proceeds

assertions:
  - type: llm_judge
    criteria: "The investment memo presents a compelling problem-market-product narrative — the problem: companies send 2B+ collection emails annually in the US alone; the vast majority are generic templates that produce 8-12% response rates; manual phone collections cost $25-50 per contact; the average AR team spends 60% of time on routine follow-up that could be automated and personalized; the market: $12B AR automation market growing 15% annually, but existing tools (HighRadius, Billtrust) focus on workflow automation, not communication intelligence — CollectIQ fills the communication personalization gap; the product: (1) Behavioral Analysis Engine — analyzes each customer's historical response patterns to determine optimal channel (email, SMS, phone), timing (day of week, time of day), and tone (formal, friendly, urgent); (2) NLG Communication Generator — produces personalized collection messages that reference the specific customer's history, relationship, and situation; (3) Predictive Payment Model — scores each invoice for payment probability, enabling collectors to focus on accounts where intervention makes the biggest difference; (4) Continuous Optimization — every communication outcome feeds back into the model, improving performance over time."
    weight: 0.35
    description: "ProblemMarketProduct"
  - type: llm_judge
    criteria: "Business model, unit economics, and competitive analysis demonstrate investment readiness — business model: annual SaaS subscriptions priced by volume of collection communications processed; land at $30K ACV with mid-market companies, expand to $80-150K with enterprise accounts; unit economics: CAC $40K, LTV $150K (5-year, 135% NRR, 83% gross margin), LTV/CAC 3.8x, payback period 15 months; competitive landscape: HighRadius and Billtrust are workflow platforms that automate the dunning process but use static templates — CollectIQ makes the communications themselves intelligent; traditional collection agencies charge 25-50% of collections — CollectIQ helps companies collect more in-house at a fraction of the cost; point solutions like YayPay and Gaviti offer basic dunning but without the NLG or behavioral intelligence; moat: the NLG model improves with every customer interaction — the proprietary dataset of 10M+ communications with outcome data is impossible for competitors to replicate."
    weight: 0.35
    description: "BusinessModelAndCompetition"
  - type: llm_judge
    criteria: "Financial projections and use of proceeds are credible — 3-year projections: Year 1 (current): $900K ARR, 28 customers; Year 2: $3.2M ARR, 75 customers (land 47 net new, ACV growth to $40K); Year 3: $8.5M ARR, 150 customers, approaching cash flow break-even; use of proceeds ($12M): Engineering 40% ($4.8M — expand NLG team, build industry-specific models, enhance predictive analytics), Sales & Marketing 35% ($4.2M — build enterprise sales team, content marketing, conference presence), Customer Success 15% ($1.8M — onboarding, implementation support), G&A and Reserve 10% ($1.2M — compliance, legal, runway buffer); key risks and mitigants: (1) Platform risk — HighRadius/Billtrust add NLG features; mitigant: depth of NLG expertise and data advantage; (2) AI trust — customers hesitant to let AI write collection messages; mitigant: human-in-the-loop approval for all communications initially; (3) Data quality — model performance depends on training data quality; mitigant: rigorous data pipeline with quality scoring; the memo is approximately 3,000 words."
    weight: 0.30
    description: "FinancialsAndRisks"
