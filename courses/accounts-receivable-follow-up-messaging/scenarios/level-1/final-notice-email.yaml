meta:
  id: final-notice-email
  level: 1
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write a final notice email for a seriously past-due invoice — communicate consequences clearly while maintaining professionalism"
  tags: [final-notice, escalation, consequences, beginner]

state: {}

trigger: |
  Invoice #2199 for $6,200 is now 75 days past due.
  Three prior reminders have been sent and one phone
  call was made. The customer acknowledged the debt
  on the phone call but has not paid.

  CUSTOMER DETAILS:
  - Company: Greenfield Landscaping LLC
  - Contact: Tom Reeves, Owner
  - Relationship: occasional client, 3 past invoices
    all paid late (average 40 days late)
  - Payment terms: Net 30
  - Invoice date: November 20, 2025
  - Due date: December 20, 2025
  - Services: Landscape design consultation
  - Follow-up history:
    - Day 5: friendly email reminder (no response)
    - Day 20: second email reminder (no response)
    - Day 45: phone call — Tom said "I'll take care
      of it this week" (did not)
    - Day 60: third email reminder (no response)

  Write a final notice email before the account is
  referred to a collection agency. The email must:
  1. State this is a final notice
  2. Reference the follow-up history
  3. State the consequence (collection agency referral)
  4. Give a specific deadline
  5. Offer one last opportunity to resolve

assertions:
  - type: llm_judge
    criteria: "The email clearly communicates this is a final notice with consequences — the subject line unambiguously signals urgency ('FINAL NOTICE: Invoice #2199 — Immediate Action Required' or 'Final Notice Before Collection Referral — Invoice #2199'); the email states clearly that this is the final communication before the account is referred to a third-party collection agency; it provides a specific deadline (e.g., 'If payment is not received by [date, approximately 10 business days out], we will have no choice but to refer this matter to our collection agency'); the email explains what collection agency referral means for the customer — potential impact on credit rating, additional fees, and loss of the opportunity to resolve the matter directly."
    weight: 0.35
    description: "FinalNoticeClarity"
  - type: llm_judge
    criteria: "The email references the complete follow-up history to establish the pattern — the email documents the prior attempts: the friendly email on Day 5, the second reminder on Day 20, the phone conversation on Day 45 where Tom committed to paying 'this week,' the third email on Day 60, and now this final notice on Day 75; this documentation serves two purposes: it demonstrates to Tom that the company has been patient and reasonable, and it creates a written record that supports the collection referral; the email references Tom's phone commitment specifically — 'During our phone conversation on [date], you confirmed the balance and indicated payment would be sent that week' — making it clear that a promise was made and broken."
    weight: 0.35
    description: "FollowUpHistoryDocumentation"
  - type: llm_judge
    criteria: "The email offers one final opportunity to resolve while remaining firm — despite the serious tone, the email includes: 'If you are experiencing financial difficulty, I'm willing to discuss a payment arrangement — but I need to hear from you before [deadline]' or 'If there is any reason you are unable to make this payment, please contact me immediately so we can explore options'; the email provides direct contact information (phone and email) for reaching the sender; the tone is firm and professional throughout — not angry, not personal, not threatening beyond the stated consequence; the email does NOT use ALL CAPS excessively, exclamation marks, or emotionally charged language; it reads as a business decision ('we will need to refer this to collections') not a personal grievance; the email is 200-300 words — detailed enough to document the situation but not a lengthy lecture."
    weight: 0.30
    description: "FinalOpportunityAndTone"
