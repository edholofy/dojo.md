meta:
  id: late-fee-notification
  level: 1
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write a notification email informing a customer that a late fee has been applied to their overdue invoice — communicate the charge clearly and professionally"
  tags: [late-fee, notification, policy, beginner]

state: {}

trigger: |
  Your company's payment terms include a 1.5%
  monthly late fee on invoices past 30 days. A
  customer's invoice has triggered this penalty.

  DETAILS:
  - Company: Pacific Coast Distributors
  - Contact: Angela Martinez, AP Supervisor
  - Invoice #7012: $35,000 for wholesale product
    shipment
  - 32 days past due (just crossed the 30-day
    threshold)
  - Late fee: 1.5% = $525
  - New balance: $35,525
  - Payment terms: Net 30, 1.5%/month late fee
    (stated on invoice and in contract)
  - One prior friendly reminder sent at Day 10
    (Angela replied: "In our payment queue")
  - No payment received since

  Write the late fee notification email that:
  1. Informs the customer about the applied late fee
  2. References the contractual basis for the fee
  3. Provides the updated balance
  4. Creates urgency to prevent additional fees
  5. Remains professional and factual

assertions:
  - type: llm_judge
    criteria: "The email clearly communicates the late fee and its contractual basis — the email states that a 1.5% monthly late fee of $525 has been applied to Invoice #7012, bringing the total balance to $35,525; it references that the late fee is per the agreed payment terms (Net 30, 1.5%/month) as stated in the contract and on the invoice; the email is factual, not apologetic — the company is enforcing a contractual term, not being punitive; the subject line clearly indicates the nature of the email ('Late Fee Applied: Invoice #7012 — Updated Balance $35,525' or 'Invoice #7012 — Late Fee Notification')."
    weight: 0.35
    description: "LateFeeClarity"
  - type: llm_judge
    criteria: "The email creates urgency without being heavy-handed — the email notes that additional late fees will continue to accrue monthly until the balance is paid; it references Angela's prior response that the invoice was 'in the payment queue' and notes that 22 days have passed since then; the email asks for an update on the payment status and expected date; the tone is matter-of-fact and business-like — late fees are a contractual reality, and the email treats them as such without excessive apology or excessive aggression."
    weight: 0.35
    description: "UrgencyCreation"
  - type: llm_judge
    criteria: "The email is professional, offers to discuss, and includes the updated invoice details — the email offers to send an updated invoice/statement reflecting the new balance; it provides contact information if Angela has questions about the fee or the balance; the email may note that if payment is received promptly, the company may consider waiving the late fee as a one-time courtesy (this is a judgment call — appropriate for a regular customer but should be positioned as an exception, not a precedent); the email is concise (150-250 words) — a late fee notification should be clear and brief, not a lengthy collection letter."
    weight: 0.30
    description: "ProfessionalismAndOffer"
