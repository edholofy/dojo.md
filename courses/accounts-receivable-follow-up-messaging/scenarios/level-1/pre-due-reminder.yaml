meta:
  id: pre-due-reminder
  level: 1
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write a pre-due payment reminder sent before an invoice's due date — proactively remind a customer that payment will be due soon"
  tags: [pre-due, proactive, prevention, beginner]

state: {}

trigger: |
  Your company has started sending proactive
  pre-due reminders to reduce late payments. Write
  a reminder email for an invoice due in 7 days.

  DETAILS:
  - Company: Atlas Digital Marketing
  - Contact: Priya Sharma, Finance Director
  - Invoice #5220: $45,000
  - Services: February 2026 digital advertising
    management and media spend
  - Payment terms: Net 45
  - Invoice date: January 20, 2026
  - Due date: March 6, 2026
  - This reminder is being sent: February 27, 2026
    (7 days before due)
  - Customer history: large client, sometimes pays
    5-10 days late

  Write the pre-due reminder email that:
  1. Feels helpful, not pushy
  2. Confirms invoice receipt
  3. Provides payment details
  4. Offers early payment options if applicable
  5. Keeps it brief

assertions:
  - type: llm_judge
    criteria: "The email positions the reminder as helpful service, not a demand — the subject line frames it as a courtesy ('Upcoming Payment Reminder: Invoice #5220' or 'Invoice #5220 — Due March 6'); the opening is service-oriented: 'Just a quick note to let you know that Invoice #5220 for $45,000 is coming due on March 6' or 'As a courtesy reminder, your invoice for February digital advertising services is due next week'; the email does NOT use language suggesting the customer might forget or be irresponsible — it's framed as 'making sure you have everything you need to process payment on time'; the tone is lighter and more casual than a past-due reminder because the invoice is NOT yet late."
    weight: 0.35
    description: "HelpfulTone"
  - type: llm_judge
    criteria: "The email confirms details and provides everything needed to pay — the email includes: invoice number (#5220), amount ($45,000), due date (March 6, 2026), and a brief description of services (February digital advertising management and media spend); it offers to resend the invoice or provide additional documentation if needed; it includes or references payment methods/instructions; for a $45,000 invoice, the email might confirm banking details for wire/ACH or reference the payment portal; the email may ask if the customer has received the invoice and if all details are correct — catching potential disputes before the due date rather than after."
    weight: 0.35
    description: "DetailsAndPaymentPath"
  - type: llm_judge
    criteria: "The email is appropriately brief and positions the company as organized and proactive — the email is short (100-175 words) — a pre-due reminder should be quick to read and easy to act on; it does not discuss consequences of late payment or mention late fees — that would be inappropriate for an invoice that isn't even due yet; the closing is light: 'Please don't hesitate to reach out if you have any questions' or 'Happy to help if you need anything'; the overall impression is of a well-organized company that communicates proactively — this reflects well on the sender and subtly signals that the company takes timely payment seriously without being heavy-handed."
    weight: 0.30
    description: "BrevityAndProfessionalism"
