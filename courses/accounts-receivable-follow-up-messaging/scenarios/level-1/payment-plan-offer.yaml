meta:
  id: payment-plan-offer
  level: 1
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write an email offering a payment plan to a customer experiencing financial difficulty — balance compassion with the need to collect"
  tags: [payment-plan, hardship, empathy, beginner]

state: {}

trigger: |
  During a collection call, your customer revealed
  they are experiencing cash flow difficulties and
  cannot pay the full amount immediately.

  DETAILS:
  - Company: Sunrise Bakery & Café
  - Contact: Maria Gonzalez, Owner
  - Invoice #6610: $9,800 for commercial kitchen
    equipment maintenance
  - 40 days past due
  - Maria said on the phone: "Business has been slow
    since the road construction started in front of
    our shop. I want to pay but I just can't right
    now. Can we work something out?"
  - Maria has been a customer for 5 years and has
    never been late before
  - Your company's policy allows payment plans for
    invoices over $5,000 with manager approval

  Write a follow-up email to Maria that:
  1. Confirms the conversation
  2. Expresses understanding
  3. Proposes a specific payment plan
  4. Outlines the terms clearly
  5. Requires written acceptance

assertions:
  - type: llm_judge
    criteria: "The email expresses genuine empathy while maintaining a business framework — the email references the phone conversation warmly: 'Thank you for speaking with me today and for being open about the challenges Sunrise Bakery is facing'; it acknowledges the difficulty without being condescending: something about understanding that the road construction has been tough on business and appreciating her commitment to paying; the email recognizes her 5-year history of on-time payment — 'Given our 5-year relationship and your excellent payment history, we're happy to work with you on a plan'; the tone is supportive and solution-oriented — treating Maria as a valued partner going through a temporary difficulty, not a deadbeat avoiding payment."
    weight: 0.35
    description: "EmpathyAndTone"
  - type: llm_judge
    criteria: "The payment plan proposal is specific, realistic, and clearly structured — the email proposes a concrete plan: perhaps 3 monthly installments of approximately $3,267 or 4 installments of $2,450; the plan includes: the total amount owed ($9,800), the number of payments, the amount of each payment, the due dates for each payment, and the payment method; the plan is realistic for a small business experiencing a cash flow crunch — not requiring a large upfront payment that defeats the purpose; the email may mention whether interest or late fees will be waived as part of the arrangement (for a 5-year customer with no prior issues, waiving would be appropriate); the terms are clear enough that there is no ambiguity about what is expected."
    weight: 0.35
    description: "PaymentPlanStructure"
  - type: llm_judge
    criteria: "The email requires written acceptance and explains what happens if the plan is not followed — the email asks Maria to confirm acceptance in writing (reply to the email or sign an attached agreement); it explains what happens if a payment is missed: 'If a scheduled payment is missed, the remaining balance will become due immediately' or similar; the email includes a deadline for accepting the plan (e.g., within 5 business days); the closing is encouraging: 'We value your business and look forward to continuing to work with Sunrise Bakery' or 'I hope the road construction wraps up soon and business picks up'; the email is professional but warm — appropriate for a small business owner who is a long-term customer facing a temporary setback."
    weight: 0.30
    description: "AcceptanceAndTerms"
