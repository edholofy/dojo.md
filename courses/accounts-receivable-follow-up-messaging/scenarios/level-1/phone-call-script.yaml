meta:
  id: phone-call-script
  level: 1
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write a phone call script for following up on a past-due invoice — prepare talking points for a professional collections call"
  tags: [phone-script, talking-points, verbal-collection, beginner]

state: {}

trigger: |
  You need to make a phone call to follow up on a
  past-due invoice. Your manager wants you to
  prepare a call script.

  ACCOUNT DETAILS:
  - Company: Cedar Valley Construction
  - Contact: Mike Torres, Office Manager
  - Invoice #4501: $22,000 for equipment rental
  - 35 days past due (Net 30 terms)
  - Two emails sent (Day 5 and Day 20) — no response
  - Company is a regular customer, typically reliable
  - No known disputes or complaints

  Write a phone call script that includes:
  1. Professional opening/introduction
  2. Purpose of the call stated clearly
  3. Key talking points
  4. Responses to common objections
  5. Closing with confirmed next steps

assertions:
  - type: llm_judge
    criteria: "The script has a clear opening and states the purpose professionally — the opening includes: identification ('Hi Mike, this is [Name] from [Company] in the accounts receivable department'), a brief pleasantry, and a clear statement of purpose ('I'm calling to follow up on Invoice #4501 for $22,000 which was due on [date]'); the script notes that two prior emails were sent without response — 'I sent a couple of emails but wanted to reach out by phone to make sure everything is okay'; the opening is friendly but purposeful — not overly chatty, not immediately demanding; the script includes a note to verify you are speaking to the right person before discussing account details."
    weight: 0.35
    description: "OpeningAndPurpose"
  - type: llm_judge
    criteria: "The script includes key talking points and objection handling — talking points cover: the specific invoice details (number, amount, due date, days past due), that the account has been in good standing historically, that this is unusual for them, and a direct question about payment timing; objection responses include: 'We never received the invoice' → offer to resend immediately via email while on the phone; 'We're having cash flow issues' → express understanding, ask about a partial payment or payment plan; 'There's an issue with the invoice' → ask for specific details, offer to investigate and get back to them within 24 hours; 'The person who handles this is out' → ask when they return and schedule a callback; 'We already sent the check' → ask for the date sent, check number, and amount to verify."
    weight: 0.35
    description: "TalkingPointsAndObjections"
  - type: llm_judge
    criteria: "The script closes with confirmed next steps and includes practical call guidance — the closing confirms: the specific action the customer will take, the specific date by which it will happen, and your follow-up action if it doesn't happen; example: 'So just to confirm, you'll process the payment by Friday the 28th, and I'll follow up Monday if we haven't received it'; the script includes practical notes for the caller: speak slowly and clearly, have the invoice details ready before calling, take notes during the call, stay calm if the customer is frustrated, always be polite regardless of the response; the script acknowledges that this is a construction company (may be on a job site, may need to call early morning or during lunch); the overall script is structured with clear sections that a junior AR specialist could follow."
    weight: 0.30
    description: "ClosingAndGuidance"
