meta:
  id: construction-retainage
  level: 2
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write AR follow-up communications for construction industry retainage and progress billing — navigate the unique complexities of construction payment practices"
  tags: [construction, retainage, progress-billing, intermediate]

state: {}

trigger: |
  You are the AR manager for a commercial electrical
  subcontractor. Handle two construction-specific
  collection scenarios.

  SCENARIO A — RETAINAGE RELEASE
  A project completed 90 days ago. The general
  contractor is holding $85,000 in retainage (10%
  of your $850,000 contract).
  - Project: Riverside Office Complex
  - GC: Morrison & Partners Construction
  - Contact: Karen Cho, Project Accountant
  - Substantial completion: November 15, 2025
  - Punch list completed: December 10, 2025
  - Final inspection passed: December 20, 2025
  - Retainage due: 30 days after final inspection
    = January 19, 2026
  - Current date: February 27, 2026 (39 days late)
  - GC's excuse: "Waiting for owner retainage release"

  Write the retainage release demand (200 words).

  SCENARIO B — DISPUTED PAY APPLICATION
  Your Pay Application #7 for $120,000 of progress
  billing was reduced by $35,000 by the GC without
  explanation.
  - Project: Downtown Medical Center (ongoing)
  - GC: Hartfield Builders
  - Contact: Steve Rodriguez, Project Manager
  - Pay App #7 submitted: February 1, 2026
  - Amount requested: $120,000
  - Amount approved: $85,000
  - Reduction: $35,000 (no documentation provided)
  - Payment terms: Net 30 from approval

  Write the pay application dispute letter (200
  words).

assertions:
  - type: llm_judge
    criteria: "The retainage release demand demonstrates construction industry knowledge — the letter references the specific contractual and regulatory framework: the contract terms requiring retainage release 30 days after final inspection, the fact that all completion milestones have been met (substantial completion, punch list, final inspection), and that the retainage is now 39 days past the contractual release date; the letter addresses the GC's excuse directly — 'While we understand that owner retainage release may affect your cash flow, our subcontract provides for retainage release based on our completion milestones, not the owner's payment schedule' (this is a common and important distinction in construction law); the letter may reference the applicable state prompt payment act for subcontractors, which typically provides for interest penalties on withheld retainage; the tone is firm and legally informed — retainage disputes are common in construction and the letter should demonstrate knowledge of the contractor's rights."
    weight: 0.35
    description: "RetainageDemand"
  - type: llm_judge
    criteria: "The pay application dispute letter is specific and demands documentation — the letter notes the $35,000 reduction from Pay App #7 without supporting documentation; it requests a detailed written explanation of which line items were reduced and why; it references the standard construction billing process (AIA G702/G703 or equivalent) which requires the GC to document any reductions to pay applications; the letter establishes a deadline for the explanation (e.g., 10 business days); it notes that unjustified reductions to progress billing can constitute a contract violation and may trigger stop-work provisions; the tone is professional but assertive — on an active project, the subcontractor has leverage because stopping work creates project delays; the letter preserves the working relationship while firmly protecting financial rights."
    weight: 0.35
    description: "PayAppDispute"
  - type: llm_judge
    criteria: "Both letters demonstrate construction-specific AR expertise — they use industry terminology correctly: retainage, pay application, substantial completion, punch list, GC/subcontractor relationship, progress billing; they reflect understanding of the construction payment chain (owner → GC → sub → sub-sub) and the common delays at each level; they reference relevant legal protections (mechanic's lien rights, prompt payment statutes, contract provisions) without being overly legalistic; they recognize that construction AR is fundamentally different from standard B2B collections because of the ongoing project relationship, the retainage structure, and the multi-party payment chain; both are approximately 200 words each."
    weight: 0.30
    description: "ConstructionExpertise"
