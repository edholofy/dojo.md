meta:
  id: collection-agency-referral-letter
  level: 2
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write the collection agency referral package — prepare the handoff documentation and customer notification when an account is sent to collections"
  tags: [collection-agency, referral, handoff, intermediate]

state: {}

trigger: |
  After exhausting internal collection efforts, you
  are referring an account to your collection agency.
  Prepare the complete referral package.

  ACCOUNT DETAILS:
  - Company: Westfield Manufacturing Inc.
  - Contact: Bill Crawford, Controller
  - Outstanding: $48,000 (2 invoices: #2901 for
    $28,000 and #2955 for $20,000)
  - Oldest invoice: 95 days past due
  - Follow-up history:
    - 7 emails sent over 90 days
    - 4 phone calls (2 reached Bill, 2 voicemail)
    - 1 certified letter (signed for by receptionist)
    - Bill's last communication (Day 45): "We're
      working on it, payments are slow right now"
    - No response since Day 45

  YOUR COLLECTION AGENCY: National Credit Services
  AGENCY CONTACT: Patricia Holmes, Account Manager

  Prepare:
  1. Customer notification letter (200 words) — the
     letter to Westfield informing them of the
     referral
  2. Agency referral memo (250 words) — the internal
     document for National Credit Services with all
     information they need
  3. Follow-up email to your VP of Sales (100 words)
     — informing the sales team about the referral

assertions:
  - type: llm_judge
    criteria: "The customer notification letter is firm, factual, and gives one final opportunity — the letter to Bill Crawford clearly states that the account is being referred to National Credit Services for collection; it provides a specific last-chance deadline (e.g., 10 business days) to pay directly and avoid the referral; it documents the collection history (number of attempts, Bill's last communication); it explains the consequences of collection agency involvement (additional fees, potential credit impact); the tone is firm and final but not hostile — this is a business decision, not a personal attack; the letter provides direct contact information for one last payment; it is sent via certified mail for documentation purposes."
    weight: 0.35
    description: "CustomerNotification"
  - type: llm_judge
    criteria: "The agency referral memo provides everything the collection agency needs — the memo to Patricia Holmes at National Credit Services includes: full company legal name, address, contact person (Bill Crawford, Controller), phone, email; invoice details (numbers, amounts, dates, services provided); complete follow-up history with dates and outcomes; Bill's last known statement; the customer's payment history (were they ever a good payer?); any known disputes or partial payments; recommended approach (Bill responded to phone calls but not emails — suggest prioritizing phone contact); the company's willingness to accept a payment plan or settlement; the authorized settlement threshold (if applicable); the memo is organized for easy reference and actionability."
    weight: 0.35
    description: "AgencyReferralMemo"
  - type: llm_judge
    criteria: "The VP of Sales notification is concise and considers the sales relationship — the email to the VP of Sales is brief (approximately 100 words), informs that Westfield Manufacturing has been referred to collections, explains the collection history and why internal efforts failed, notes the outstanding amount ($48,000), and asks if there are any relationship considerations the sales team wants to flag before proceeding; the email recognizes that the sales team may have a different relationship with the customer and may want to intervene; the tone is informational and collaborative — the AR team is keeping sales in the loop, not going rogue."
    weight: 0.30
    description: "SalesNotification"
