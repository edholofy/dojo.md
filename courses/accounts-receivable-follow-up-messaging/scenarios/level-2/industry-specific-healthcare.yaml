meta:
  id: industry-specific-healthcare
  level: 2
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write AR follow-up messages for healthcare/medical billing scenarios — navigate insurance complexities, patient responsibility, and regulatory requirements"
  tags: [healthcare, medical-billing, insurance, intermediate]

state: {}

trigger: |
  You work in the billing department of a regional
  medical practice. Handle two AR follow-up
  scenarios.

  SCENARIO A — INSURANCE FOLLOW-UP
  A claim for $8,200 was submitted to BlueCross
  BlueSheild 45 days ago and has not been processed.
  - Patient: James Wilson
  - Service date: January 10, 2026
  - Procedure: Outpatient knee arthroscopy
  - Claim #: BC-2026-44891
  - Status on insurance portal: "In Review"
  - This is the third time this payer has delayed
    processing for this practice

  Write a professional follow-up letter/email to the
  insurance company (200 words).

  SCENARIO B — PATIENT BALANCE FOLLOW-UP
  After insurance payment, a patient owes $1,850 as
  their share (deductible + copay). The first
  statement was sent 30 days ago with no response.
  - Patient: Sandra Lee
  - Total bill: $8,200
  - Insurance paid: $6,350
  - Patient responsibility: $1,850
  - Sandra is a long-time patient of the practice
  - No financial hardship indicated

  Write a patient-friendly follow-up message (150
  words) that complies with healthcare billing
  best practices.

assertions:
  - type: llm_judge
    criteria: "The insurance follow-up is specific, assertive, and includes all required claim details — the letter to BlueCross includes: the claim number (BC-2026-44891), patient name, date of service, procedure description, amount billed, date of submission, and number of days since submission; the letter notes the state's prompt payment statute (most states require processing within 30-45 days) and that 45 days exceeds this timeline; the tone is professional but assertive — this is a business-to-business communication between a provider and a payer; the letter requests a specific action and timeline: 'Please process this claim within 10 business days or provide a written explanation for the delay'; the letter may reference that this is a pattern with this payer, which strengthens the urgency."
    weight: 0.35
    description: "InsuranceFollowUp"
  - type: llm_judge
    criteria: "The patient balance follow-up is empathetic, clear, and compliant with healthcare billing practices — the message to Sandra explains the balance clearly: total bill, insurance payment, and her remaining responsibility; it does NOT use aggressive collection language (healthcare patient communications must be more sensitive than standard B2B collections); the message offers payment options: online portal, phone payment, payment plan if needed; it provides a contact number for billing questions; the tone is helpful and informative — many patients are confused by medical billing and the message should clarify rather than intimidate; the message does not threaten collection agency referral at this early stage (only 30 days, first follow-up for a patient balance); it complies with healthcare billing norms by being factual, offering assistance, and respecting the patient relationship."
    weight: 0.35
    description: "PatientBalanceFollowUp"
  - type: llm_judge
    criteria: "Both messages demonstrate understanding of healthcare-specific AR challenges — the insurance letter shows awareness of: the prompt payment regulation landscape, the need to document communication for potential appeals or regulatory complaints, the importance of including specific claim and procedure identifiers, and the leverage a practice has when payers violate processing timelines; the patient message shows awareness of: the sensitivity of medical debt, the complexity of insurance EOBs that patients may not understand, the importance of offering payment assistance before escalating, and the regulatory environment around patient billing (No Surprises Act, state balance billing protections); both messages are appropriately different in tone and approach — insurance follow-up is business-assertive, patient follow-up is empathetic and supportive."
    weight: 0.30
    description: "HealthcareAwareness"
