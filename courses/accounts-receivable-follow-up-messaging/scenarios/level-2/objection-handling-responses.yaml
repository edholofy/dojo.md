meta:
  id: objection-handling-responses
  level: 2
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write responses to common debtor objections — craft professional replies to excuses and pushback during the collection process"
  tags: [objections, rebuttals, negotiation, intermediate]

state: {}

trigger: |
  During your AR follow-up this week, you've
  received five different objections from customers.
  Write a professional email response to each.

  OBJECTION 1: "We never received the invoice"
  - Customer: TechForge Inc., Invoice #3300, $18,000
  - 30 days past due, two reminders sent
  - Contact claims they never got the invoice or the
    reminders

  OBJECTION 2: "We already paid this"
  - Customer: Harbor Logistics, Invoice #3455, $27,500
  - 25 days past due
  - Contact insists payment was sent 2 weeks ago
  - Your records show no payment received

  OBJECTION 3: "I need to check with my boss"
  - Customer: ClearView Analytics, Invoice #3510,
    $14,000
  - 35 days past due
  - Contact has said this on the last 3 calls over
    3 weeks

  OBJECTION 4: "Your product/service was defective"
  - Customer: Pinnacle Design Studio, Invoice #3622,
    $9,500
  - 20 days past due
  - Contact claims the deliverables were substandard
    (first time hearing this)

  OBJECTION 5: "We're having cash flow problems"
  - Customer: Sunrise Events Co., Invoice #3700,
    $22,000
  - 40 days past due
  - Contact is honest about financial difficulties

  Write a 100-150 word response to each objection.

assertions:
  - type: llm_judge
    criteria: "Responses to 'never received' and 'already paid' are helpful and fact-based — for 'never received': the response does not argue or accuse of lying; instead, it immediately offers to resend the invoice (asking to confirm the best email address), attaches a copy, and provides all the invoice details in the email body; it also confirms the email address used for prior reminders and asks if there might be a spam filter issue; for 'already paid': the response takes the claim seriously, asks for specific payment details (date sent, method, check number or transaction reference) to trace the payment, offers to have accounting investigate immediately, and suggests that if it was sent by check, it may still be in transit; both responses maintain a helpful, collaborative tone while keeping the collection process moving."
    weight: 0.35
    description: "NeverReceivedAndAlreadyPaid"
  - type: llm_judge
    criteria: "Responses to the repeated delay tactic and the quality complaint are professionally assertive — for 'need to check with boss' (3rd time): the response acknowledges the previous conversations but firmly notes this has been pending for 3 weeks; it offers to contact the decision-maker directly, requests the boss's name and contact information, and sets a firm deadline ('I need a resolution by [date] or I'll need to escalate'); the tone is respectful but no longer patient with the delay; for 'service was defective': the response takes the complaint seriously (first time hearing it), expresses concern, and asks for specific details about what was defective; it separates the dispute from the payment obligation — the undisputed portion should still be paid while the dispute is investigated; it proposes a timeline for investigating and resolving the quality claim."
    weight: 0.35
    description: "DelayTacticAndQualityClaim"
  - type: llm_judge
    criteria: "Response to cash flow problems shows empathy balanced with firmness — the response to Sunrise Events acknowledges the difficulty, appreciates the honesty, and proposes a concrete solution: a payment plan (perhaps $22,000 over 3-4 months); it asks specific questions about what they can afford and when; the tone is empathetic but businesslike — understanding does not mean the debt is forgiven; the response requires a commitment: 'I need your acceptance of the payment plan by [date]'; all five responses share common qualities: they are professional, avoid personal judgment, keep the conversation moving toward resolution, and include a specific next step with a deadline."
    weight: 0.30
    description: "CashFlowResponse"
