meta:
  id: international-collection-email
  level: 2
  course: accounts-receivable-follow-up-messaging
  type: output
  description: "Write AR follow-up emails adapted for different cultural contexts — customize tone, approach, and content for international customers"
  tags: [international, cultural-adaptation, global-ar, intermediate]

state: {}

trigger: |
  Your company has three international customers
  with past-due invoices. Each requires a culturally
  adapted approach.

  CUSTOMER A — GERMANY
  - Company: Schmidt Maschinenbau GmbH
  - Contact: Herr Klaus Weber, Leiter Finanzen
  - Invoice: €45,000, 15 days past due
  - Payment terms: Net 30
  - Context: German businesses expect direct,
    efficient communication. Formality is valued.
    Punctuality in payment is a cultural norm.

  CUSTOMER B — JAPAN
  - Company: Tanaka Electronics Co., Ltd.
  - Contact: Yamamoto-san, Finance Department
  - Invoice: ¥5,500,000 (~$38,000), 25 days past due
  - Payment terms: Net 60 (standard in Japan)
  - Context: Japanese business culture values harmony
    (wa), indirect communication, and saving face.
    Direct confrontation is avoided.

  CUSTOMER C — BRAZIL
  - Company: Silva & Costa Consultoria Ltda.
  - Contact: Carlos Mendes, Diretor Financeiro
  - Invoice: R$180,000 (~$32,000), 20 days past due
  - Payment terms: Net 45
  - Context: Brazilian business culture is
    relationship-oriented. Warm, personal
    communication is expected. Building rapport
    matters as much as the business request.

  Write a payment reminder email for each customer
  (150-200 words each), adapted to their cultural
  context.

assertions:
  - type: llm_judge
    criteria: "The German email is direct, formal, and efficient — it uses formal German business conventions: addresses Herr Weber formally, gets to the point quickly, references the specific invoice with all details, states the payment expectation clearly, and provides payment instructions; the email is structured and concise — German business communication values Sachlichkeit (objectivity/matter-of-factness); it does not include excessive pleasantries or relationship-building language — that would feel unprofessional in the German business context; the email may reference Zahlungsfrist (payment deadline) and acknowledges that timely payment is a standard expectation; the tone is professional and respectful but not warm — appropriate for German B2B communication."
    weight: 0.35
    description: "GermanCulturalAdaptation"
  - type: llm_judge
    criteria: "The Japanese email preserves face and uses indirect communication — it avoids direct accusation of late payment; instead, it might reference 'confirming the status of our invoice' or 'ensuring there are no issues with the processing'; the email is highly formal and polite, using respectful language throughout; it avoids putting Yamamoto-san in a position where they would lose face by being explicitly called out for lateness; the email may suggest that perhaps there was an administrative oversight or processing delay — offering face-saving explanations; it includes an expression of gratitude for the business relationship before mentioning the invoice; the email closes with an offer to assist with anything needed — maintaining the harmony (wa) of the relationship; it does NOT use phrases like 'overdue' or 'past due' prominently — those would be too confrontational for Japanese business culture."
    weight: 0.35
    description: "JapaneseCulturalAdaptation"
  - type: llm_judge
    criteria: "The Brazilian email is warm, personal, and relationship-focused — it opens with genuine warmth and personal connection before transitioning to the business matter; it may reference the partnership or previous successful work together; the email is more conversational than the German or Japanese versions — Brazilian business culture values personal relationships (jeitinho brasileiro); it addresses Carlos by first name (appropriate in Brazilian business culture after initial introduction) or uses the professional-but-warm approach; the invoice details are included but woven into the relationship context; the email offers to discuss over a call or meeting — personal contact is valued; the tone avoids being cold or purely transactional; all three emails demonstrate understanding that effective AR communication requires cultural intelligence — one approach does not fit all markets."
    weight: 0.30
    description: "BrazilianCulturalAdaptation"
