meta:
  id: segmentation-ab-testing
  level: 3
  course: customer-segmentation
  type: output
  description: "Segmentation A/B testing — validate segment-specific strategies through controlled experiments and measure incremental impact"
  tags: [ab-testing, experimentation, validation, measurement, advanced]

state: {}

trigger: |
  A growth experimentation lead says: "We have 6 customer segments and
  we've designed different strategies for each — different onboarding
  flows, different pricing offers, different feature recommendations,
  and different retention campaigns.

  But how do I know if these segment-specific strategies actually work
  better than our one-size-fits-all approach? Maybe some segments
  respond to differentiation and others don't. I need to measure the
  incremental value of segmentation.

  We have 50,000 customers, well-defined segments, and an A/B testing
  platform. What experiments should I run?"

  Task: Design an experimentation framework to validate segment-specific
  strategies, measure the incremental lift of segmented vs non-segmented
  approaches, and optimize segment treatment over time.

assertions:
  - type: llm_judge
    criteria: "Response designs proper experiments for validating segmentation — for each segment, randomize customers into treatment (segment-specific strategy) and control (generic strategy). Addresses statistical considerations: sample size per segment (small segments may not have enough power for meaningful tests), test duration (need enough time for behavior change to manifest), and how to handle multiple simultaneous tests across segments (family-wise error rate). Explains holdout group design — keeping a percentage of ALL customers on the generic approach as a permanent baseline"
    weight: 0.35
    description: "ExperimentDesign"
  - type: llm_judge
    criteria: "Response explains how to measure incremental lift — comparing segment-specific vs generic treatment on key metrics (conversion, retention, revenue, engagement), calculating lift per segment (some segments may benefit greatly from differentiation, others may not), determining statistical significance per segment, and aggregating to measure the total incremental value of segmentation across all segments. Shows how to calculate the ROI of segmentation effort"
    weight: 0.35
    description: "MeasuringLift"
  - type: llm_judge
    criteria: "Response addresses iterative optimization — how to use test results to refine segment strategies (double down on high-lift segments, simplify or abandon differentiation for low-lift segments), multi-armed bandit approaches for continuously optimizing segment treatments, how to test new segment definitions against old ones (is a new segmentation better than the current one?), and how to build a culture of experimentation around segmentation"
    weight: 0.30
    description: "Optimization"
