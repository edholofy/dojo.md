meta:
  id: segmentation-with-feature-engineering
  level: 3
  course: customer-segmentation
  type: output
  description: "Feature engineering for segmentation — create powerful derived features from raw data to improve segment quality and predictive power"
  tags: [feature-engineering, derived-features, data-transformation, advanced]

state: {}

trigger: |
  A machine learning engineer says: "Our segmentation uses raw features
  directly — login count, revenue, feature count, etc. But I suspect
  we can create much better segments with derived features. For example,
  instead of just 'login count,' what about 'login trend over last 90
  days' or 'login consistency (coefficient of variation)?'

  We have 25,000 SaaS customers with event-level data: every login,
  every feature interaction, every support ticket, every payment, going
  back 18 months. That's millions of events per month.

  How do I engineer features from this raw event data that will produce
  better, more predictive customer segments?"

  Task: Design a feature engineering strategy for customer segmentation,
  showing how to transform raw event data into powerful derived features
  that capture customer behavior dynamics.

assertions:
  - type: llm_judge
    criteria: "Response covers key feature engineering categories — trend features (slope of usage over time, growing vs declining), consistency features (coefficient of variation, regularity of behavior), recency features (time since last action, freshness of engagement), velocity features (rate of change, acceleration/deceleration), breadth features (number of distinct features used, diversity of behavior), depth features (intensity of usage within core features), ratio features (engagement per dollar spent, support tickets per usage hour), and time-series features (seasonality, day-of-week patterns, burst patterns)"
    weight: 0.35
    description: "FeatureCategories"
  - type: llm_judge
    criteria: "Response explains how to aggregate event-level data into customer-level features — choosing appropriate time windows (last 7/30/90/180 days), computing rolling aggregates (mean, median, standard deviation, min, max), creating comparison features (this month vs last month, this quarter vs same quarter last year), handling different event types (logins are frequency-based, revenue is sum-based, features are count-distinct-based), and dealing with sparse events (customers with few data points need different treatment than high-activity customers)"
    weight: 0.35
    description: "Aggregation"
  - type: llm_judge
    criteria: "Response shows the impact on segment quality — demonstrates how derived features produce more predictive segments than raw features (trend features separate growing from declining customers that raw averages miss, consistency features identify reliable users vs erratic ones), how to validate feature importance (which derived features actually contribute to segment separation), and how to avoid feature engineering pitfalls (overfitting to noise, creating leaky features that use future data, feature explosion creating too many dimensions)"
    weight: 0.30
    description: "QualityImpact"
