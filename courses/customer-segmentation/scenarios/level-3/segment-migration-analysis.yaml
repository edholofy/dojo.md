meta:
  id: segment-migration-analysis
  level: 3
  course: customer-segmentation
  type: output
  description: "Segment migration analysis — track how customers move between segments over time and use migration patterns for strategic insights"
  tags: [migration, movement, transition, dynamics, advanced]

state: {}

trigger: |
  A customer analytics director says: "We've been running our segmentation
  for 12 months with quarterly refreshes. I'm noticing that customers
  move between segments — a 'power user' last quarter might be 'at-risk'
  this quarter. Some segments are growing, others are shrinking.

  I want to understand these migration patterns:
  - Which segments do customers typically migrate to and from?
  - Are there common pathways (e.g., new → growing → power user)?
  - Are there warning paths (e.g., power user → declining → churned)?
  - What triggers migration between segments?

  We have 35,000 customers, 5 segments, 4 quarterly snapshots."

  Task: Design a segment migration analysis that tracks how customers
  move between segments, identifies common pathways and migration
  triggers, and uses migration insights for proactive intervention.

assertions:
  - type: llm_judge
    criteria: "Response explains how to build a migration matrix — tracking customer segment membership at each time point, creating a transition matrix showing the probability of moving from segment A to segment B between periods, visualizing flows using Sankey diagrams or alluvial plots, calculating net flows (which segments are growing/shrinking), and identifying stable segments (high self-retention rate) vs volatile segments (high migration rate)"
    weight: 0.35
    description: "MigrationMatrix"
  - type: llm_judge
    criteria: "Response identifies common migration pathways — positive pathways (new → active → power user → champion), negative pathways (active → declining → at-risk → churned), and non-linear paths (dormant → re-activated → active). Analyzes which transitions are most common, which are most concerning, and the typical time between transitions. Shows how to identify early warning signals by looking at what happens right before negative migrations"
    weight: 0.35
    description: "Pathways"
  - type: llm_judge
    criteria: "Response shows how to use migration insights for proactive intervention — identifying customers currently in a segment that has a high probability of migrating to a worse segment next quarter (pre-emptive intervention), understanding what triggers positive migrations (to replicate for more customers), designing segment-specific retention programs based on likely migration destinations, and setting up automated alerts when a customer's behavior suggests imminent negative migration"
    weight: 0.30
    description: "ProactiveIntervention"
