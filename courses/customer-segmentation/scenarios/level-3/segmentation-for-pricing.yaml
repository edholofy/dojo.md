meta:
  id: segmentation-for-pricing
  level: 3
  course: customer-segmentation
  type: output
  description: "Segmentation for pricing — use customer segments to inform pricing strategy, tier design, packaging, and willingness-to-pay analysis"
  tags: [pricing, willingness-to-pay, tier-design, packaging, advanced]

state: {}

trigger: |
  A VP of product says: "We're redesigning our pricing tiers and we want
  to use customer segmentation to inform the design. Currently we have
  a one-size-fits-all pricing model ($49/user/month) but we're seeing:

  - Small teams (<10 users) say we're too expensive
  - Large teams (50+ users) would pay more for premium features
  - Some customers use us heavily for project management, others mainly
    for communication, others for document collaboration
  - Usage patterns vary wildly — some power users log in daily, some
    monthly

  We have 15,000 customers, 150,000 total users. Data: company size,
  user count, feature usage by module, login frequency, industry, and
  NPS scores.

  How do I use segmentation to design better pricing tiers?"

  Task: Use customer segmentation to inform pricing strategy, including
  identifying distinct value segments, estimating willingness to pay,
  and designing pricing tiers that maximize revenue while serving each
  segment's needs.

assertions:
  - type: llm_judge
    criteria: "Response identifies distinct value segments relevant to pricing — segmenting by usage pattern (which modules they use most), company size (different willingness-to-pay thresholds), and intensity (heavy vs light users). Should create segments like: small team communicators (small company, use mainly communication), enterprise project managers (large company, deep project management use), heavy collaborators (all modules, high usage across the board), light users (infrequent, limited feature use). Each segment should have different value perceptions and price sensitivity"
    weight: 0.35
    description: "ValueSegments"
  - type: llm_judge
    criteria: "Response explains how to estimate willingness-to-pay per segment — methods include Van Westendorp price sensitivity analysis (too cheap, cheap, expensive, too expensive), conjoint analysis (feature-price tradeoff preferences), usage-based value estimation (value delivered per feature × usage), competitive benchmarking by segment, and historical price sensitivity data (churn response to price changes by segment). Should provide estimated WTP ranges for each segment"
    weight: 0.35
    description: "WillingnessToP"
  - type: llm_judge
    criteria: "Response designs pricing tiers informed by segments — such as a Starter tier (for small teams, essential communication features, lower price point), Professional tier (for growing teams, project management + collaboration, current price point), and Enterprise tier (for large teams, all modules + admin/governance features, premium price). Explains the mapping between segments and tiers, how to set price points based on WTP analysis, feature gating decisions (which features drive tier separation), and revenue impact modeling (projected revenue change vs current flat pricing)"
    weight: 0.30
    description: "TierDesign"
