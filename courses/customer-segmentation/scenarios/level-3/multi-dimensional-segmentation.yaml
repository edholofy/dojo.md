meta:
  id: multi-dimensional-segmentation
  level: 3
  course: customer-segmentation
  type: output
  description: "Multi-dimensional segmentation — combine demographic, behavioral, attitudinal, and value dimensions into a unified segmentation framework"
  tags: [multi-dimensional, unified, framework, integration, advanced]

state: {}

trigger: |
  A VP of customer insights says: "We have four different segmentations
  running simultaneously and they're confusing everyone:

  1. Marketing uses a demographic segmentation (6 segments by age/income)
  2. Product uses a behavioral segmentation (4 segments by usage patterns)
  3. Customer success uses a health score segmentation (3 tiers)
  4. Finance uses a value segmentation (4 tiers by revenue)

  A single customer can be in 4 different segments across teams. A
  'high-value' customer to finance might be 'at-risk' to CS and in the
  'casual user' segment for product. Nobody knows which segmentation
  to prioritize.

  Can we build ONE unified segmentation that captures multiple dimensions?
  We have 60,000 customers."

  Task: Design a unified multi-dimensional segmentation framework that
  integrates demographic, behavioral, health, and value dimensions into
  a single coherent system the whole organization can use.

assertions:
  - type: llm_judge
    criteria: "Response diagnoses the problem with parallel segmentations — conflicting signals (a customer is simultaneously high-value and at-risk), no clear priority when segments conflict, different teams making contradictory decisions about the same customer, and organizational friction. Proposes a unified approach that either creates a single primary segmentation incorporating all dimensions or establishes a clear hierarchy of segmentations with explicit rules for conflicts"
    weight: 0.35
    description: "ProblemDiagnosis"
  - type: llm_judge
    criteria: "Response designs a unified segmentation methodology — options include: creating a composite feature set from all four dimension types and clustering on the combined features, building a two-tier system (primary segmentation on the most business-critical dimension with secondary overlays for tactical decisions), or a matrix approach (value tier × engagement tier creates a 2D grid). Should address practical challenges: how to weight different dimensions, how to handle cases where dimensions conflict, and how to keep the segmentation simple enough for organizational adoption"
    weight: 0.35
    description: "UnifiedMethodology"
  - type: llm_judge
    criteria: "Response addresses organizational alignment — how to get four teams to adopt a single segmentation, who owns the unified segmentation (a cross-functional governance team), how each team's specific needs are still served within the unified framework, how to transition from four segmentations to one without disrupting existing workflows, and how to maintain the unified segmentation over time (refresh cadence, change management, feedback loops)"
    weight: 0.30
    description: "OrganizationalAlignment"
