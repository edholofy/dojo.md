meta:
  id: advanced-segmentation-shift
  level: 3
  course: customer-segmentation
  type: output
  description: "Advanced segmentation shift — combine advanced methods to solve a complex cross-functional segmentation challenge"
  tags: [shift, combined, assessment, advanced]

state: {}

trigger: |
  You are the head of customer analytics at a fintech company with
  200,000 retail banking customers and 5,000 business banking customers.
  The company offers: checking accounts, savings accounts, credit cards,
  personal loans, business loans, and investment accounts.

  The CPO, CMO, and CFO each have a request:

  CPO: "I need segments that tell me which products to cross-sell to
  which customers. Our cross-sell rate is 1.3 products per customer
  and I want 2.0."

  CMO: "I need segments for our new referral program. Who are our
  advocates? Who brings in the most valuable referrals?"

  CFO: "I need to know which customer segments are profitable and which
  are loss-leaders. Our customer acquisition cost varies wildly and I
  suspect some segments destroy value."

  Build a segmentation that serves all three executives. You have:
  product holdings, transaction data, NPS, referral history, channel
  usage, acquisition cost, account profitability, demographics, and
  12 months of behavioral data.

  Task: Create a unified segmentation serving cross-sell optimization,
  referral targeting, and profitability analysis simultaneously.

assertions:
  - type: llm_judge
    criteria: "Response creates a multi-purpose segmentation with at least 6 distinct segments relevant to all three goals — segments like 'Profitable Advocates' (high profitability, high NPS, active referrers — maximize referral incentives), 'Growth Potential' (young accounts, single product, growing transaction volume — prime cross-sell targets), 'Premium Engaged' (multi-product, high balance, low cost-to-serve — protect and grow), 'Cost-Center Customers' (high servicing costs, low revenue, frequent support — address profitability), 'Dormant High-Value' (high balance but minimal engagement — re-activate), 'Digital Natives' (mobile-first, low cost-to-serve, moderate revenue — scalable growth). Each segment has clear implications for all three executives"
    weight: 0.35
    description: "UnifiedSegments"
  - type: llm_judge
    criteria: "Response addresses the CPO's cross-sell challenge with segment-specific product recommendations — uses product affinity analysis (which products are commonly held together), next-best-product modeling per segment (based on similar customers' adoption paths), and cross-sell propensity scoring. Identifies which segments have the highest cross-sell potential and the specific product recommendations for each. Includes expected impact on the 1.3 → 2.0 products-per-customer goal"
    weight: 0.35
    description: "CrossSell"
  - type: llm_judge
    criteria: "Response addresses the CMO's referral and CFO's profitability needs — for referrals: identifies which segments are natural advocates (high NPS + social proof behavior), which segments bring in the most valuable referrals (not just most referrals but highest-quality referred customers), and referral incentive optimization per segment. For profitability: calculates segment-level profitability (revenue minus acquisition cost minus servicing cost), identifies value-destroying segments with remediation strategies (increase revenue, reduce cost, or accept as loss-leaders that feed other segments), and lifetime profitability projections per segment"
    weight: 0.30
    description: "ReferralProfitability"
