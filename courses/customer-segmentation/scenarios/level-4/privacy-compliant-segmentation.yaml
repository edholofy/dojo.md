meta:
  id: privacy-compliant-segmentation
  level: 4
  course: customer-segmentation
  type: output
  description: "Privacy-compliant segmentation — build segmentation systems that comply with GDPR, CCPA, and ethical data use requirements"
  tags: [privacy, GDPR, CCPA, compliance, ethics, expert]

state: {}

trigger: |
  A chief privacy officer says: "Our customer segmentation uses personal
  data extensively — demographics, behavioral tracking, third-party data
  enrichment, and predictive modeling. I have concerns about:

  1. GDPR and CCPA compliance — are we allowed to segment customers
     this way? Do customers need to consent to being segmented?
  2. Discriminatory outcomes — could our segments inadvertently
     discriminate based on protected characteristics?
  3. Third-party data — we buy demographic data from data brokers.
     Is this still viable under current privacy regulations?
  4. Right to explanation — if a customer asks why they were put in
     a specific segment, can we explain it?

  We operate in the US and EU with 300,000 customers."

  Task: Design a privacy-compliant segmentation approach that addresses
  GDPR/CCPA requirements, avoids discriminatory outcomes, handles
  third-party data restrictions, and supports the right to explanation.

assertions:
  - type: llm_judge
    criteria: "Response addresses GDPR and CCPA compliance for segmentation — legal basis for processing (legitimate interest vs consent for segmentation), the difference between segmentation for service delivery (likely legitimate interest) vs segmentation for marketing targeting (may require consent), data minimization (only use data necessary for the segmentation purpose), right to opt out of automated profiling, CCPA's opt-out right for sale of personal information, and how privacy regulations affect different segmentation data sources differently (first-party behavioral data vs third-party enrichment data)"
    weight: 0.35
    description: "Compliance"
  - type: llm_judge
    criteria: "Response addresses discriminatory outcomes and fairness — how segmentation can inadvertently create proxy discrimination (zip code as a proxy for race, browsing behavior as a proxy for age), methods to test for discriminatory impact (disparate impact analysis, segment composition vs population composition for protected classes), techniques for fair segmentation (removing or constraining features correlated with protected characteristics, fairness constraints in clustering), and the business and legal risks of discriminatory segmentation (regulatory fines, reputational damage, lawsuits)"
    weight: 0.35
    description: "Fairness"
  - type: llm_judge
    criteria: "Response addresses third-party data viability and explainability — the evolving landscape of third-party data (cookie deprecation, data broker regulations, growing opt-out rates), alternatives to third-party data (first-party data enrichment, zero-party data collection, contextual signals), how to build explainable segmentation models (feature importance per customer, plain-language segment descriptions, customer-facing explanations for why they receive certain treatments), and privacy-by-design principles for segmentation systems (data protection impact assessments, privacy-enhancing technologies like differential privacy or federated learning)"
    weight: 0.30
    description: "DataAndExplainability"
