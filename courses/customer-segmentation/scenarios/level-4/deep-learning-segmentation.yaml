meta:
  id: deep-learning-segmentation
  level: 4
  course: customer-segmentation
  type: output
  description: "Deep learning for segmentation — use autoencoders, embeddings, and neural networks to discover customer segments from complex behavioral data"
  tags: [deep-learning, autoencoders, embeddings, neural-networks, expert]

state: {}

trigger: |
  A head of AI/ML says: "Our traditional clustering struggles with our
  data complexity. We have 500,000 customers with:
  - 200+ behavioral features (event sequences, not just aggregates)
  - Temporal patterns (not just current state but sequences of actions)
  - Multi-modal data (numeric usage + text from support tickets +
    categorical firmographic data)
  - High-dimensional sparse data (many features with low variance)

  I want to explore deep learning approaches — specifically autoencoders
  for learning customer representations and then clustering on the
  learned embeddings. How does this compare to traditional clustering,
  and when is the complexity justified?"

  Task: Explain deep learning approaches to customer segmentation
  including autoencoders for representation learning, embedding-based
  clustering, and when these methods outperform traditional approaches.

assertions:
  - type: llm_judge
    criteria: "Response explains autoencoder-based segmentation — autoencoders compress high-dimensional customer data into a low-dimensional latent representation (embedding) that captures the most important patterns. The encoder learns to compress, the decoder learns to reconstruct. The bottleneck layer (latent space) becomes the new feature space for clustering. Explains: architecture choices (number of layers, bottleneck size), training process, how to cluster on the latent representations (apply k-means or DBSCAN on embeddings), and how variational autoencoders (VAE) add probabilistic structure to the latent space"
    weight: 0.35
    description: "Autoencoders"
  - type: llm_judge
    criteria: "Response covers handling complex data types — sequence embeddings for temporal behavioral data (RNNs or Transformers that learn representations from action sequences), text embeddings for support ticket data (pre-trained language models for ticket content), multi-modal fusion (combining numeric, text, and categorical embeddings into a unified representation), and handling sparse high-dimensional features (the autoencoder naturally learns dimensionality reduction). Shows how deep learning handles data that traditional clustering methods struggle with"
    weight: 0.35
    description: "ComplexDataHandling"
  - type: llm_judge
    criteria: "Response provides an honest assessment of when deep learning is justified vs overkill — justified when: data is truly high-dimensional and multi-modal, temporal sequences contain important patterns that aggregation loses, dataset is large enough to train neural networks (>100K customers), and traditional methods have been tried and produce suboptimal results. Overkill when: data is primarily tabular with moderate dimensions, dataset is small, interpretability is critical (deep learning segments are harder to explain), and when simpler methods produce comparable results. Recommends always comparing against traditional baselines"
    weight: 0.30
    description: "HonestAssessment"
