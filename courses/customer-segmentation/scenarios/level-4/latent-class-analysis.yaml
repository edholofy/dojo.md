meta:
  id: latent-class-analysis
  level: 4
  course: customer-segmentation
  type: output
  description: "Latent class analysis — use probabilistic modeling to discover hidden customer subgroups from observed behavioral patterns"
  tags: [latent-class, probabilistic, LCA, statistical-modeling, expert]

state: {}

trigger: |
  A principal data scientist says: "Our k-means segmentation assigns
  every customer to exactly one cluster, but reality is messier. Some
  customers exhibit behaviors consistent with multiple segments. A
  customer might be 60% 'power user' and 40% 'social connector.'

  I want to use latent class analysis (LCA) to discover hidden customer
  types from our observed data. We have 45,000 customers with both
  categorical variables (industry, plan type, acquisition channel) and
  continuous variables (usage metrics, revenue, engagement scores).

  How does LCA work for customer segmentation? When is it better than
  k-means? And how do I interpret and operationalize the results?"

  Task: Explain latent class analysis for customer segmentation, compare
  it to k-means clustering, and show how to implement, interpret, and
  operationalize LCA results.

assertions:
  - type: llm_judge
    criteria: "Response explains how LCA works — latent classes are unobserved subgroups inferred from patterns in observed variables. Unlike k-means (which assigns hard cluster membership based on distance), LCA uses a probabilistic model where each customer has a probability of belonging to each class. Explains: the generative model (each class has its own probability distribution over observed variables), the EM algorithm for estimation, model selection using BIC/AIC to choose the number of classes, and how to interpret class-conditional probabilities (what behaviors characterize each class)"
    weight: 0.35
    description: "LCAExplained"
  - type: llm_judge
    criteria: "Response compares LCA to k-means with clear guidance on when to use each — LCA advantages: handles mixed data types (categorical + continuous), provides probabilistic membership (useful for borderline customers), statistically rigorous model selection, can handle different variable distributions. K-means advantages: simpler, faster, easier to explain, works well for continuous data with spherical clusters. When LCA is better: mixed data types, when soft assignment matters, when you need statistical model comparison. When k-means is better: large datasets, all continuous features, need for simplicity"
    weight: 0.35
    description: "Comparison"
  - type: llm_judge
    criteria: "Response shows how to operationalize LCA results — interpreting class-conditional probabilities (each class profile), handling probabilistic membership in practice (modal assignment vs weighted assignment), using posterior probabilities for customer scoring, how to classify new customers into latent classes (scoring new data with the fitted model), and monitoring class stability over time. Includes practical challenges: LCA can be computationally expensive for large datasets, solutions include sampling and approximation methods"
    weight: 0.30
    description: "Operationalization"
