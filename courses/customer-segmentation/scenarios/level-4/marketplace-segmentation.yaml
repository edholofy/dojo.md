meta:
  id: marketplace-segmentation
  level: 4
  course: customer-segmentation
  type: output
  description: "Marketplace segmentation — segment both sides of a two-sided marketplace (buyers and sellers) and model their interactions"
  tags: [marketplace, two-sided, buyers, sellers, platform, expert]

state: {}

trigger: |
  A VP of strategy at a freelancer marketplace says: "We're a two-sided
  marketplace connecting 500,000 buyers (companies hiring freelancers)
  with 2 million sellers (freelancers). Traditional segmentation only
  looks at one side at a time, but our business depends on the
  interaction between buyer and seller segments.

  Some buyer segments prefer certain seller types. Some seller segments
  thrive in certain marketplace conditions. The right match between
  buyer and seller segments drives satisfaction, repeat usage, and
  revenue.

  How do I segment BOTH sides of the marketplace and model the
  interactions between them?"

  Task: Design a dual-sided marketplace segmentation that segments both
  buyers and sellers, models their interactions, and optimizes matching
  between segment pairs.

assertions:
  - type: llm_judge
    criteria: "Response segments both sides with marketplace-specific dimensions — buyer segments based on: project size and frequency, category preference, price sensitivity, quality expectations, platform tenure and loyalty, self-serve vs managed preferences. Seller segments based on: skill category and depth, price point and positioning, availability and responsiveness, quality ratings and consistency, platform dependency (marketplace as primary vs supplementary income), career stage. Each side should have 4-6 clear segments"
    weight: 0.35
    description: "DualSidedSegments"
  - type: llm_judge
    criteria: "Response models buyer-seller segment interactions — creates an interaction matrix showing which buyer segments naturally match with which seller segments (high satisfaction, repeat engagement, fair pricing), identifies mismatches (buyer segments whose expectations don't align with available seller segments — supply gap), analyzes marketplace dynamics by segment pair (which pairings generate the highest GMV, highest repeat rate, highest satisfaction on both sides), and how to identify and address liquidity imbalances (too many sellers for certain buyer segments, not enough sellers for others)"
    weight: 0.35
    description: "InteractionModeling"
  - type: llm_judge
    criteria: "Response optimizes marketplace operations using dual segmentation — improving search and matching algorithms to prioritize high-affinity buyer-seller pairs, designing segment-specific marketplace features (premium tier for high-value buyer-seller matches, managed service for enterprise buyers), pricing optimization per segment pair (different take rates based on segment value and price sensitivity), and growth strategy by segment (which buyer segments to acquire to activate underutilized seller capacity, which seller segments to recruit to serve underserved buyer demand)"
    weight: 0.30
    description: "MarketplaceOptimization"
