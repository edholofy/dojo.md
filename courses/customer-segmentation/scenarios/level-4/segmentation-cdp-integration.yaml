meta:
  id: segmentation-cdp-integration
  level: 4
  course: customer-segmentation
  type: output
  description: "Segmentation and CDP integration — integrate segmentation into a customer data platform for activation across all customer touchpoints"
  tags: [CDP, integration, activation, martech, expert]

state: {}

trigger: |
  A VP of marketing technology says: "We just implemented a Customer
  Data Platform (Segment, mParticle, or similar). It unifies customer
  data from 15 sources and can push audience segments to 25+ downstream
  tools (email, ads, CRM, support, analytics, personalization engine).

  Now I need to integrate our data science segmentation into the CDP so
  that every customer touchpoint uses the same segment-aware logic.
  Currently, our segmentation lives in a data warehouse and only the
  analytics team can access it.

  How do I operationalize segmentation through the CDP so it drives
  real-time personalization across all 25 tools?"

  Task: Design the integration architecture between a data science
  segmentation and a CDP, enabling segment-aware activation across
  all customer touchpoints in real-time.

assertions:
  - type: llm_judge
    criteria: "Response designs the integration architecture — how to push segmentation results from the data warehouse into the CDP (batch sync for segment assignments, real-time scoring API for dynamic segments), data model design (segment as a customer attribute vs segment as a computed audience), how to handle segment updates (when a customer's segment changes, how quickly should downstream tools reflect the change), and how to manage multiple segmentation types (marketing segments, CS health segments, product usage segments) as different customer attributes in the CDP"
    weight: 0.35
    description: "IntegrationArchitecture"
  - type: llm_judge
    criteria: "Response covers activation across touchpoints — how each downstream tool uses segment data differently (email: different content per segment, ads: different audiences and bid strategies, CRM: segment-specific workflows, support: priority routing by segment, website: personalized experience per segment, analytics: segment as a dimension for all reports). Addresses audience building in the CDP (combining segment membership with real-time behavioral triggers for hyper-targeted audiences), and how to ensure consistency (customer sees the same segment-appropriate experience across email, web, and ads)"
    weight: 0.35
    description: "Activation"
  - type: llm_judge
    criteria: "Response addresses practical challenges — identity resolution across 15 data sources (ensuring the same customer is recognized everywhere), handling segment conflicts between sources, privacy compliance (honoring opt-outs across all activation channels), measuring end-to-end performance (did segment-driven activation actually improve outcomes across touchpoints), and avoiding over-personalization (when segment-specific treatment becomes creepy or creates filter bubbles)"
    weight: 0.30
    description: "PracticalChallenges"
