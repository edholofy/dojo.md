meta:
  id: segmentation-at-scale
  level: 4
  course: customer-segmentation
  type: output
  description: "Segmentation at scale — handle the technical and organizational challenges of segmenting millions of customers across multiple products and regions"
  tags: [scale, enterprise, multi-product, multi-region, expert]

state: {}

trigger: |
  A chief data officer at a global e-commerce company says: "We have
  50 million customers across 12 countries, 8 product categories, and
  3 platforms (web, mobile app, marketplace). Our current segmentation
  was built when we had 500,000 customers in one country — it doesn't
  scale.

  Challenges:
  1. Computational: clustering 50M customers with 100+ features
  2. Cross-market: segments that work in the US don't apply in Japan
  3. Multi-platform: a customer on web looks different from the same
     customer on mobile
  4. Data volume: 2B events per day across all platforms
  5. Organizational: 15 teams across 12 countries need segments

  How do we redesign our segmentation for enterprise scale?"

  Task: Design a segmentation architecture that handles tens of millions
  of customers across multiple markets, platforms, and product lines,
  addressing computational, cross-market, and organizational scaling
  challenges.

assertions:
  - type: llm_judge
    criteria: "Response addresses computational scaling — distributed clustering approaches (mini-batch k-means, parallel implementations on Spark/Dask), hierarchical segmentation strategy (global segments refined by regional sub-segments), sampling strategies for initial model development (train on a sample, score the full population), incremental model updates (don't recluster from scratch each time), and infrastructure requirements (compute clusters, feature stores, model serving at scale). Shows how to handle 50M customers × 100 features efficiently"
    weight: 0.35
    description: "ComputationalScale"
  - type: llm_judge
    criteria: "Response addresses cross-market and multi-platform challenges — how customer behavior varies by market (purchasing power, cultural preferences, category preferences), whether to build global segments (same segments everywhere) vs local segments (market-specific) vs a hybrid (global framework with local adaptation), how to unify customer identity across platforms (identity resolution for web + mobile + marketplace), and how to combine platform-specific behavioral signals into a unified customer view"
    weight: 0.35
    description: "CrossMarketPlatform"
  - type: llm_judge
    criteria: "Response addresses organizational scaling — how 15 teams across 12 countries access and use segments (self-serve segment explorer, API access, CRM integration), balancing global consistency with local flexibility (global segment definitions with local activation strategies), governance across geographies (who owns what, how changes are coordinated), training and enablement (making segments usable by non-technical teams worldwide), and segment performance tracking across markets"
    weight: 0.30
    description: "OrganizationalScale"
