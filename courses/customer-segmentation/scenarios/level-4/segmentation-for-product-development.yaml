meta:
  id: segmentation-for-product-development
  level: 4
  course: customer-segmentation
  type: output
  description: "Segmentation for product development — use customer segments to inform product roadmap, feature prioritization, and product-market fit assessment"
  tags: [product-development, roadmap, feature-prioritization, PMF, expert]

state: {}

trigger: |
  A chief product officer says: "We have too many feature requests and
  not enough engineering capacity. Our product team builds features
  based on whichever customer or prospect shouts loudest, not based on
  data.

  I want to use our customer segments to drive product decisions:
  - Which features should we build for which segments?
  - Which segments have the weakest product-market fit?
  - If we have to choose between serving segment A or segment B
    with a feature, which creates more value?
  - How do we avoid building a 'Franken-product' that tries to
    please everyone and pleases no one?

  We're a B2B SaaS with 10,000 customers, 6 segments, and a backlog
  of 200+ feature requests."

  Task: Design a segment-driven product prioritization framework that
  uses customer segmentation to make better product decisions and
  allocate engineering resources to the highest-value opportunities.

assertions:
  - type: llm_judge
    criteria: "Response creates a segment-value framework for feature prioritization — assessing each feature request by: which segments request it (or would use it), the revenue value of those segments (ARR per segment, growth trajectory), the strategic importance of those segments (retention of high-value segments vs acquisition of growth segments), the cost of NOT building it (churn risk if unaddressed), and the effort to build it. Creates a scoring matrix that weighs segment value × feature impact × strategic alignment × feasibility"
    weight: 0.35
    description: "PrioritizationFramework"
  - type: llm_judge
    criteria: "Response addresses product-market fit by segment — how to measure PMF per segment (usage depth, NPS, retention rate, organic growth within the segment), how to identify which segments have weak PMF (signs: high churn, low usage, negative NPS, high support tickets), and the strategic decision of whether to double down on strong-PMF segments or invest in fixing weak-PMF segments. Includes the concept of segment-specific product experiences (different onboarding, different feature defaults, different UX per segment)"
    weight: 0.35
    description: "ProductMarketFit"
  - type: llm_judge
    criteria: "Response addresses the Franken-product risk — how too many segment-specific features create complexity, the concept of core features (serve all segments) vs differentiating features (serve specific segments), using segmentation to define the product's primary persona (which 1-2 segments are the core audience), and how to say no to feature requests from secondary segments without losing them. Includes practical guidance on communicating segment-based product decisions to customers and internal stakeholders"
    weight: 0.30
    description: "FrankenProduct"
