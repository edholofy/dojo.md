meta:
  id: expert-segmentation-shift
  level: 4
  course: customer-segmentation
  type: output
  description: "Expert segmentation shift — solve an enterprise-scale segmentation challenge combining technical complexity with organizational dynamics"
  tags: [shift, combined, assessment, expert]

state: {}

trigger: |
  You are the chief analytics officer at a healthcare SaaS company that
  just acquired a competitor. The combined entity now has:

  - Your company: 15,000 B2B accounts (hospitals, clinics), 6 products,
    well-established 5-segment behavioral segmentation
  - Acquired company: 8,000 accounts (hospitals, clinics, pharma), 3
    products (2 overlap with yours), different 4-segment firmographic
    segmentation

  Customer overlap: ~2,000 accounts are customers of both companies.

  The CEO wants a unified segmentation within 90 days for the combined
  entity. Challenges:
  1. Different data schemas and definitions between companies
  2. Overlapping customers need identity resolution
  3. Product portfolios are different — segmentation basis changes
  4. Each company's sales and CS teams are attached to their segments
  5. Must maintain customer experience during transition

  Task: Design a unified segmentation strategy for the merged entity
  that resolves data, identity, methodology, and organizational
  challenges within the 90-day timeline.

assertions:
  - type: llm_judge
    criteria: "Response addresses the technical data challenges — identity resolution for the 2,000 overlapping accounts (matching on company name, domain, unique identifiers), data schema harmonization (mapping different field names and definitions to a unified schema), handling different behavioral data availability (your company has deep usage data, acquired company may not), product portfolio mapping (how to compare usage across different product sets), and creating a unified customer feature table from heterogeneous sources. Includes a realistic timeline for data work within the 90-day constraint"
    weight: 0.35
    description: "DataResolution"
  - type: llm_judge
    criteria: "Response designs the unified segmentation methodology — options: extend your 5-segment model to the acquired base, create entirely new segments for the combined entity, or a phased approach (quick mapping in month 1, refined segmentation in month 2-3). Addresses the methodology tradeoffs: reusing your segmentation is faster but may not fit the acquired company's customer profile; building new is better but takes longer and disrupts both teams. Recommends a specific approach with rationale and details the segment definitions for the combined entity"
    weight: 0.35
    description: "UnifiedMethodology"
  - type: llm_judge
    criteria: "Response addresses the organizational and customer experience challenges — how to transition two sales teams from different segment frameworks without disrupting pipeline, change management for CS teams (their workflow depends on segment assignments), maintaining customer experience during the transition (no customer should feel deprioritized because the segmentation changed), communicating the new segments to both organizations, and quick wins that demonstrate value of the unified segmentation (e.g., identifying cross-sell opportunities between the two customer bases using the unified view)"
    weight: 0.30
    description: "OrganizationalTransition"
