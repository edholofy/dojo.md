meta:
  id: segmentation-governance-framework
  level: 4
  course: customer-segmentation
  type: output
  description: "Segmentation governance framework — build the organizational infrastructure to manage, maintain, and evolve segmentation over time"
  tags: [governance, maintenance, evolution, organizational, expert]

state: {}

trigger: |
  A chief analytics officer says: "We've built 7 different segmentations
  over 3 years. Some are actively used, some are orphaned, some conflict
  with each other. Nobody knows which is the 'official' segmentation.
  The data science team keeps building new ones without retiring old ones.

  We need segmentation governance — rules for who can create segmentations,
  how they're validated, how they're maintained, and when they're retired.

  Our company has 150,000 customers, 4 business units, 3 analytics teams,
  and 12 different systems that consume segment data."

  Task: Design a comprehensive segmentation governance framework covering
  creation, validation, maintenance, distribution, and retirement of
  customer segmentations across the organization.

assertions:
  - type: llm_judge
    criteria: "Response establishes governance structure — a segmentation governance committee with representation from analytics, marketing, sales, product, and CS. Defines roles: segmentation owner (accountable for each segmentation's accuracy and relevance), governance committee (approves new segmentations, reviews existing ones quarterly), data steward (ensures data quality feeding segmentations), and consumers (teams that use segments in their workflows). Establishes a segmentation registry that catalogs all active segmentations with their purpose, methodology, owner, refresh schedule, and consuming systems"
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Response defines lifecycle management processes — creation process (business case, methodology review, validation requirements before production deployment), maintenance process (regular accuracy checks, stability monitoring, model retraining schedules, data quality monitoring), evolution process (how to update segmentation methodology when business changes, versioning approach, backward compatibility), and retirement process (when to sunset a segmentation, migration plan for consuming systems, archival of historical segment data). Includes SLAs for segmentation freshness and accuracy"
    weight: 0.35
    description: "LifecycleManagement"
  - type: llm_judge
    criteria: "Response addresses the practical challenge of 12 consuming systems — managing segment distribution to downstream systems (CRM, marketing automation, data warehouse, analytics tools), ensuring consistency across systems (same customer has the same segment everywhere), handling segment updates across systems (propagation timing, eventual consistency), access control (who can see which segmentation data), and audit trails (tracking when and why segments change). Includes a plan to rationalize the existing 7 segmentations down to a manageable set"
    weight: 0.30
    description: "Distribution"
