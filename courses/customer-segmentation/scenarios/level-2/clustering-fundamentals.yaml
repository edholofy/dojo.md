meta:
  id: clustering-fundamentals
  level: 2
  course: customer-segmentation
  type: output
  description: "Clustering fundamentals — understand k-means clustering for customer segmentation including data preparation, choosing k, and interpreting results"
  tags: [clustering, k-means, algorithm, data-preparation, intermediate]

state: {}

trigger: |
  A data analyst says: "I've been told to use k-means clustering to
  segment our SaaS customers. I have 15,000 customers with these
  features: monthly usage (hours), number of features used, support
  tickets filed, account age (months), monthly revenue, and number
  of users on the account.

  I understand the basic concept — group similar customers together.
  But how do I actually prepare the data, choose the right number of
  clusters, run the algorithm, and interpret what the clusters mean?"

  Task: Walk through the complete k-means clustering process for
  customer segmentation, from data preparation to interpretation,
  with practical guidance on each step.

assertions:
  - type: llm_judge
    criteria: "Response covers essential data preparation steps — handling missing values, feature scaling/normalization (critical because k-means is distance-based and features with larger scales dominate), standardization (z-score or min-max), handling outliers (capping or log transformation for skewed features like revenue), feature selection (removing highly correlated features), and why raw unscaled data produces poor clusters"
    weight: 0.35
    description: "DataPrep"
  - type: llm_judge
    criteria: "Response explains how to choose the number of clusters (k) — the elbow method (plot within-cluster sum of squares vs k, look for the bend), silhouette analysis (measuring how similar a point is to its own cluster vs neighboring clusters, higher is better), gap statistic, and practical business considerations (the optimal mathematical k may not be the best business k — 3-7 segments is typically actionable). Includes guidance on trying multiple values and comparing"
    weight: 0.35
    description: "ChoosingK"
  - type: llm_judge
    criteria: "Response explains how to interpret and profile clusters — examining cluster centroids to understand what each cluster represents, naming clusters with business-meaningful labels (not Cluster 0/1/2), profiling each cluster with key characteristics and metrics, validating clusters make business sense (do the groups represent real customer types?), and communicating cluster profiles to non-technical stakeholders"
    weight: 0.30
    description: "Interpretation"
