meta:
  id: segment-profiling-and-personas
  level: 2
  course: customer-segmentation
  type: output
  description: "Segment profiling and personas — transform data-driven segments into rich profiles and buyer personas that the whole organization can use"
  tags: [profiling, personas, buyer-persona, communication, intermediate]

state: {}

trigger: |
  A customer insights manager says: "Our data science team created a
  beautiful 6-cluster segmentation using k-means. The problem is nobody
  outside of data science understands or uses it. The segments are called
  'Cluster 0' through 'Cluster 5' and are described by centroids like
  'mean usage hours: 47.3, mean feature count: 12.1.'

  The sales team, marketing team, and product team all ignored it. They
  said it wasn't useful for their work.

  How do I transform data clusters into something the business actually
  uses? How do I create personas from segments?"

  Task: Explain how to transform raw clustering output into rich segment
  profiles and buyer personas that drive decisions across the organization.

assertions:
  - type: llm_judge
    criteria: "Response explains the profiling process — examining cluster centroids and distributions to identify distinguishing characteristics, giving segments memorable and descriptive names (not Cluster 0), creating one-page segment profiles with key demographics, behaviors, motivations, goals, pain points, and preferred channels. Shows how to enrich clusters with qualitative data (interviews, support tickets, sales call notes) to understand the 'why' behind the data patterns"
    weight: 0.35
    description: "ProfilingProcess"
  - type: llm_judge
    criteria: "Response explains how to build personas from segments — creating fictional representative characters for each segment with a name, photo, job title, company context, day-in-the-life narrative, goals, frustrations, and decision-making process. Distinguishes between data-driven segments (what the numbers show) and personas (human stories that make segments relatable). Shows how personas help non-technical teams empathize with different customer types"
    weight: 0.35
    description: "PersonaCreation"
  - type: llm_judge
    criteria: "Response addresses organizational adoption — creating tailored segment materials for different teams (sales needs talk tracks per persona, marketing needs channel and messaging guidance, product needs feature usage patterns and pain points, CS needs health indicators and risk signals per segment). Covers how to socialize segments across the organization through workshops, internal presentations, printed persona cards, CRM tagging, and regular segment performance reviews"
    weight: 0.30
    description: "OrganizationalAdoption"
