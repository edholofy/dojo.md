meta:
  id: intermediate-segmentation-shift
  level: 2
  course: customer-segmentation
  type: output
  description: "Intermediate segmentation shift — combine multiple segmentation approaches to solve a multi-faceted business challenge"
  tags: [shift, combined, assessment, intermediate]

state: {}

trigger: |
  You are a customer analytics manager at a B2B SaaS company with 5,000
  accounts. The company sells a marketing automation platform with three
  pricing tiers: Starter ($99/mo), Professional ($499/mo), and Enterprise
  ($2,000+/mo).

  The CEO has three goals:
  1. Reduce churn from 15% annual to 10% within 12 months
  2. Increase upsell revenue by 30% (from $2M to $2.6M annually)
  3. Improve NPS from 32 to 45

  You have: firmographic data (industry, company size, revenue),
  behavioral data (feature usage, login frequency, campaign volume),
  financial data (plan tier, payment history, expansion history), and
  satisfaction data (NPS scores, support tickets, CSAT).

  Build a segmentation that addresses all three goals simultaneously.
  Which customers are at risk? Which are ready to upsell? And which
  are most dissatisfied?

  Task: Create a multi-dimensional segmentation that identifies segments
  relevant to all three goals (churn reduction, upsell, NPS improvement)
  and recommends prioritized actions for each segment.

assertions:
  - type: llm_judge
    criteria: "Response creates a segmentation that serves multiple goals — not three separate segmentations but an integrated view that identifies which customers are at churn risk AND upsell-ready (the overlap matters — some at-risk customers are at risk because they've outgrown their tier). Should combine behavioral engagement, financial health, and satisfaction signals into a multi-dimensional segmentation with at least 5-6 distinct segments that have clear implications for all three goals"
    weight: 0.35
    description: "IntegratedSegmentation"
  - type: llm_judge
    criteria: "Response identifies specific segment profiles with quantified characteristics — e.g., 'Thriving Champions' (high usage, high NPS, on Professional plan, strong upsell potential — 15% of base), 'Frustrated Power Users' (high usage but low NPS and high support tickets — churn risk despite engagement — 10% of base), 'Underutilizers' (low usage, moderate NPS, on higher tier — churn risk due to low perceived value — 20% of base), 'Growth Ready' (increasing usage, approaching plan limits, positive NPS — prime upsell targets — 12% of base). Each segment should have estimated size and key differentiating metrics"
    weight: 0.35
    description: "SegmentProfiles"
  - type: llm_judge
    criteria: "Response provides prioritized action plans per segment mapped to the three goals — showing which segments to address first for maximum impact across all three KPIs. Includes specific interventions (e.g., for Frustrated Power Users: escalation to support engineering fixes churn AND improves NPS simultaneously), expected impact on each goal (e.g., retaining the Underutilizer segment alone reduces churn by 4 percentage points), and a 12-month implementation roadmap that sequences segment-specific initiatives"
    weight: 0.30
    description: "ActionPlans"
