meta:
  id: b2b-firmographic-segmentation
  level: 2
  course: customer-segmentation
  type: output
  description: "B2B firmographic segmentation — segment business customers by company characteristics including industry, size, revenue, growth stage, and technology stack"
  tags: [B2B, firmographic, technographic, ICP, intermediate]

state: {}

trigger: |
  A B2B sales operations manager says: "We sell HR software to mid-market
  and enterprise companies. We have 2,000 customers and 50,000 prospects
  in our CRM. Our sales team treats every lead the same — same outreach
  sequence, same pitch, same demo.

  We know: company size (employees), annual revenue, industry, location,
  technology stack (from third-party data), funding stage, growth rate,
  and number of job postings (as a growth signal).

  How do I build a firmographic segmentation that helps our sales team
  prioritize the right accounts and tailor their approach?"

  Task: Design a firmographic segmentation for B2B sales that defines
  an ideal customer profile (ICP), creates prioritized account tiers,
  and guides differentiated sales approaches.

assertions:
  - type: llm_judge
    criteria: "Response explains how to define an ICP from existing customer data — analyzing which firmographic characteristics correlate with the best customer outcomes (highest contract values, fastest sales cycles, highest NRR, lowest churn). Should include: industry analysis (which verticals convert best), size analysis (sweet spot in employee count and revenue), technology fit (which tech stacks indicate readiness), and growth indicators (companies in growth mode are more likely to buy). Creates a scored ICP with weighted criteria"
    weight: 0.35
    description: "ICPDefinition"
  - type: llm_judge
    criteria: "Response creates actionable account tiers — Tier 1 (strong ICP fit: right industry, right size, right tech stack, high growth signals), Tier 2 (partial fit: some ICP criteria met, potential with nurturing), Tier 3 (poor fit: few ICP criteria met, deprioritize or disqualify). Each tier should have clear scoring criteria, expected conversion rates, and recommended deal sizes. Should also address how to handle accounts that don't fit neatly into any tier"
    weight: 0.35
    description: "AccountTiers"
  - type: llm_judge
    criteria: "Response guides differentiated sales approaches per tier — Tier 1: dedicated AE, custom pitch, executive-level engagement, multi-threading. Tier 2: SDR outreach, templated sequences with light customization, standard demo. Tier 3: automated nurture sequences, inbound-only engagement. Also addresses industry-specific messaging (HR software value prop differs for healthcare vs technology vs manufacturing) and how to adjust the approach for different company sizes"
    weight: 0.30
    description: "SalesApproach"
