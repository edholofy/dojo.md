meta:
  id: rfm-advanced-scoring
  level: 2
  course: customer-segmentation
  type: output
  description: "Advanced RFM scoring — go beyond basic quintiles to weighted RFM, custom scoring rules, and RFM-based customer lifecycle mapping"
  tags: [RFM, advanced-scoring, weighted, lifecycle, intermediate]

state: {}

trigger: |
  An e-commerce analytics lead says: "We implemented basic RFM with
  quintile scoring but it's not working well. Our product is a luxury
  watch retailer — customers buy once every 2-3 years by design. The
  frequency dimension unfairly penalizes perfectly loyal customers who
  buy expensive watches infrequently.

  Also, our RFM treats a $500 purchase the same as a $15,000 purchase
  if they're in the same quintile. We need a smarter RFM approach.

  Customer base: 30,000 customers, average purchase: $3,200, median
  purchase frequency: 1.4 purchases over 5 years."

  Task: Design an advanced RFM approach that handles low-frequency,
  high-value businesses with weighted dimensions, custom scoring,
  and lifecycle-appropriate segment definitions.

assertions:
  - type: llm_judge
    criteria: "Response addresses the limitations of standard RFM for low-frequency businesses — explains why equal-weight quintile scoring fails when purchase cycles are naturally long, proposes solutions such as weighted RFM (increasing monetary weight, decreasing frequency weight for luxury), custom recency windows (2-3 year recency instead of 90 days), adjusted frequency buckets (1 purchase vs 2+ is meaningful rather than quintile-based), and continuous scoring rather than discrete quintiles"
    weight: 0.35
    description: "WeightedRFM"
  - type: llm_judge
    criteria: "Response creates meaningful segments for a luxury watch retailer — segments like VIP collectors (multiple high-value purchases), one-time luxury buyers (single high-value purchase, may return), gift buyers (purchased once as a gift, different motivation), aspirational buyers (lower-value watches, may trade up), and lapsed VIPs (historically high value but haven't purchased within expected cycle). Each segment should have clear business implications"
    weight: 0.35
    description: "LuxurySegments"
  - type: llm_judge
    criteria: "Response maps RFM segments to lifecycle stages appropriate for luxury retail — new customer engagement, relationship building, purchase anniversary timing, upgrade opportunities, re-engagement timing based on expected purchase cycles, and VIP relationship management. Shows how modified RFM drives different actions than standard RFM"
    weight: 0.30
    description: "LifecycleMapping"
