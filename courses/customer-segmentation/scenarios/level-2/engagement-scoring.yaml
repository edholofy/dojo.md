meta:
  id: engagement-scoring
  level: 2
  course: customer-segmentation
  type: output
  description: "Engagement scoring — build a composite engagement score from multiple behavioral signals to segment customers by engagement level"
  tags: [engagement, scoring, composite, behavioral, intermediate]

state: {}

trigger: |
  A product analytics manager says: "We need a single 'engagement score'
  for each customer that captures how deeply they're using our product.
  Right now, different teams use different metrics — marketing looks at
  email opens, product looks at DAU/MAU, sales looks at feature adoption,
  and customer success looks at support tickets.

  We're a project management SaaS with 20,000 accounts. Behavioral data
  includes: login frequency, projects created, tasks completed, team
  members invited, integrations connected, files uploaded, comments
  posted, and mobile app usage.

  How do I combine all these signals into a single meaningful score?"

  Task: Design a composite engagement scoring system that combines
  multiple behavioral signals into a single score, explain how to
  weight the signals, and show how to use the score for segmentation.

assertions:
  - type: llm_judge
    criteria: "Response identifies which behavioral signals to include and which to exclude — distinguishing between leading indicators (signals that predict future value like integration connections, team invites) and lagging indicators (signals that reflect past engagement like login count). Explains how to avoid double-counting correlated signals (e.g., tasks completed and projects created are correlated), and how to balance frequency metrics (how often) with depth metrics (how deeply)"
    weight: 0.35
    description: "SignalSelection"
  - type: llm_judge
    criteria: "Response explains weighting methodologies — options include: expert judgment (product team ranks signal importance), correlation analysis (weight by correlation with desired outcomes like retention or expansion), regression-based weights (use retention or expansion as dependent variable, derive weights from model coefficients), and equal weighting as a starting point. Shows how to normalize each signal to a common scale (0-100) before combining, and how to validate the composite score against actual outcomes"
    weight: 0.35
    description: "Weighting"
  - type: llm_judge
    criteria: "Response shows how to use the engagement score for segmentation — creating engagement tiers (highly engaged, moderately engaged, low engagement, disengaged), setting threshold breakpoints with data-driven rationale, mapping engagement segments to actions (upsell highly engaged, nurture moderate, re-engage low, intervene for disengaged), and how to track score changes over time to identify trending up vs trending down accounts"
    weight: 0.30
    description: "SegmentApplication"
