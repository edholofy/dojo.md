meta:
  id: segmentation-for-marketing-campaigns
  level: 2
  course: customer-segmentation
  type: output
  description: "Segmentation for marketing campaigns — apply customer segments to design targeted campaigns with differentiated messaging, channels, and offers"
  tags: [marketing, campaigns, targeting, messaging, intermediate]

state: {}

trigger: |
  A marketing manager says: "We've built customer segments but I'm
  struggling to translate them into actual marketing campaigns. We
  have 5 segments:

  1. Power users (high engagement, high spend) — 15% of customers
  2. Growing accounts (moderate use, increasing over time) — 25%
  3. Steady users (consistent but flat usage and spend) — 30%
  4. At-risk users (declining engagement) — 20%
  5. Dormant users (minimal recent activity) — 10%

  Our product is a B2B analytics platform ($50-500/mo plans). We
  have email, in-app messaging, webinars, and paid retargeting
  available as channels. How do I build different campaigns for
  each segment?"

  Task: Design segment-specific marketing campaigns with differentiated
  goals, messaging, channels, and success metrics for each of the five
  customer segments.

assertions:
  - type: llm_judge
    criteria: "Response sets different campaign goals per segment — power users: advocacy and referrals, upsell to higher tiers. Growing accounts: accelerate adoption, expand usage. Steady users: increase engagement, prevent stagnation. At-risk: re-engage and retain. Dormant: win back or identify as churned. Shows how campaign objectives differ fundamentally by segment and why the same campaign would be inappropriate for all segments"
    weight: 0.35
    description: "SegmentGoals"
  - type: llm_judge
    criteria: "Response designs specific campaigns with messaging examples — different value propositions per segment (power users hear about advanced features and ROI validation, growing accounts hear about feature discovery, at-risk hear about success stories and support availability), different channel strategies (power users via in-app and personal outreach, dormant via email and retargeting), and different call-to-actions tailored to each segment's likely motivation"
    weight: 0.35
    description: "CampaignDesign"
  - type: llm_judge
    criteria: "Response defines segment-specific success metrics — power users measured by referral rate and upsell conversion, growing accounts by feature adoption breadth and plan upgrade rate, steady users by engagement score change, at-risk by reactivation rate and churn prevention, dormant by win-back rate. Includes expected benchmarks for each metric and how to measure campaign lift vs baseline for each segment"
    weight: 0.30
    description: "SuccessMetrics"
