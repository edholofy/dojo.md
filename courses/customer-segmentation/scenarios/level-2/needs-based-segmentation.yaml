meta:
  id: needs-based-segmentation
  level: 2
  course: customer-segmentation
  type: output
  description: "Needs-based segmentation — segment customers by their underlying needs, jobs-to-be-done, and desired outcomes rather than demographics or behavior"
  tags: [needs-based, jobs-to-be-done, JTBD, outcomes, intermediate]

state: {}

trigger: |
  A product strategy director says: "Our demographic and behavioral
  segments are useful for marketing, but they don't help us make
  product decisions. Two customers can have identical demographics
  and similar usage patterns but use our product for completely
  different reasons.

  We're a cloud storage platform. Some customers use us for personal
  photo backup, some for business file sharing, some for creative
  asset management, and some for compliance archiving. The product
  needs for each are totally different.

  How do I build a needs-based segmentation that helps the product
  team prioritize features and roadmap decisions?"

  Task: Explain needs-based segmentation using the jobs-to-be-done
  framework, how to identify distinct customer needs, and how to
  use needs segments for product strategy.

assertions:
  - type: llm_judge
    criteria: "Response explains the jobs-to-be-done framework for segmentation — customers 'hire' products to accomplish specific jobs. The same product serves different jobs for different customers. Segments should be based on the job the customer is trying to accomplish, not their demographic profile. Explains functional jobs (what they need to do), emotional jobs (how they want to feel), and social jobs (how they want to be perceived)"
    weight: 0.35
    description: "JTBDFramework"
  - type: llm_judge
    criteria: "Response shows how to identify needs segments — through customer interviews (ask about the circumstances that led them to adopt the product), usage pattern analysis (different jobs manifest as different usage patterns), support ticket analysis (what customers ask for reveals what they need), feature request clustering (group requests to identify underlying needs), and survey-based conjoint analysis (which features and capabilities matter most). Creates clear needs segments for the cloud storage example"
    weight: 0.35
    description: "IdentifyingNeeds"
  - type: llm_judge
    criteria: "Response applies needs segments to product strategy — prioritizing features based on segment size and value (which job serves the most valuable customer base?), designing differentiated product experiences per needs segment (e.g., different default views, different onboarding flows), informing pricing and packaging decisions (bundle features by job rather than by tier), guiding product positioning and messaging, and making build-vs-buy-vs-partner decisions based on which jobs are core vs adjacent"
    weight: 0.30
    description: "ProductStrategy"
