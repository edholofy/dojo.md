meta:
  id: first-segmentation-shift
  level: 1
  course: customer-segmentation
  type: output
  description: "First segmentation shift — combine multiple segmentation concepts to solve a real business problem with customer segments"
  tags: [shift, combined, assessment, basics]

state: {}

trigger: |
  You are a marketing analyst at a fitness app with 75,000 users. The
  CEO says: "Our churn rate is 40% annually and I think it's because
  we treat everyone the same. We send identical push notifications,
  identical emails, and identical in-app messages to all users.

  Here's what we know about our users:
  - Demographics: age, gender, location (city)
  - Behavior: workouts per week, features used (tracking, social,
    nutrition, coaching), streak length, last login date
  - Subscription: free trial, monthly, annual, lifetime
  - Engagement: push notification response rate, email open rate

  Build me a segmentation that helps us reduce churn. I need to know
  who our users are, which ones are most at risk, and what to do
  differently for each group."

  Task: Create a multi-dimensional customer segmentation for a fitness
  app that combines demographic, behavioral, and subscription data to
  identify at-risk segments and recommend targeted retention strategies.

assertions:
  - type: llm_judge
    criteria: "Response creates meaningful segments using multiple dimensions — combining behavioral engagement (workout frequency, feature usage, streak length) with subscription type and recency of activity. Should identify at least 4-6 clear segments such as: committed athletes (high frequency, multiple features, long streaks), social exercisers (moderate frequency, heavy social feature use), new year resolvers (high initial activity that dropped off), at-risk users (declining activity, short or broken streaks, low feature adoption), and dormant users (no recent activity)"
    weight: 0.35
    description: "Segments"
  - type: llm_judge
    criteria: "Response identifies which segments are most at risk of churning and why — correlating segment characteristics with churn risk (e.g., declining workout frequency is the strongest churn predictor, free trial users who haven't engaged social features churn at 70%, annual subscribers with broken streaks in month 8-10 churn at renewal). Quantifies or estimates the churn risk for each segment"
    weight: 0.35
    description: "ChurnRisk"
  - type: llm_judge
    criteria: "Response provides specific, differentiated retention strategies for each segment — not generic advice but segment-specific actions (e.g., for declining users: re-engagement campaign with workout buddy matching; for social exercisers: community challenges and leaderboards; for new year resolvers: simplified beginner programs and achievable micro-goals; for committed athletes: advanced features and coaching upsell). Each strategy should be clearly tied to the segment's characteristics and motivations"
    weight: 0.30
    description: "Strategies"
