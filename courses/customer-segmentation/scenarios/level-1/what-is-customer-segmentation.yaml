meta:
  id: what-is-customer-segmentation
  level: 1
  course: customer-segmentation
  type: output
  description: "Introduction to customer segmentation — understand why businesses divide customers into groups and the fundamental approaches to segmentation"
  tags: [fundamentals, introduction, basics, segmentation-types]

state: {}

trigger: |
  A new marketing analyst asks: "I keep hearing about customer segmentation
  but I'm not sure what it really means beyond 'grouping customers.' Why
  can't we just treat all customers the same? What are the main ways
  companies segment their customers, and when would you use each approach?"

  Task: Explain what customer segmentation is, why it matters, and introduce
  the main segmentation approaches with examples of when to use each one.

assertions:
  - type: llm_judge
    criteria: "Response clearly defines customer segmentation, explains why treating all customers the same is suboptimal (different needs, different value, different behaviors, resource allocation efficiency), and provides concrete examples of how segmentation improves business outcomes such as better marketing ROI, improved customer experience, more efficient resource allocation, and higher retention"
    weight: 0.35
    description: "Definition"
  - type: llm_judge
    criteria: "Response introduces the main segmentation approaches — demographic segmentation (age, gender, income, education, occupation), geographic segmentation (location, region, urban vs rural, climate), behavioral segmentation (purchase history, usage patterns, engagement level, loyalty), psychographic segmentation (values, lifestyle, interests, attitudes), firmographic segmentation for B2B (company size, industry, revenue, number of employees), and needs-based segmentation (customer problems, desired outcomes, jobs-to-be-done)"
    weight: 0.35
    description: "Approaches"
  - type: llm_judge
    criteria: "Response explains when to use each approach with practical examples — demographic for broad consumer targeting, behavioral for personalization and retention, psychographic for brand messaging and content strategy, firmographic for B2B sales prioritization, and needs-based for product development and positioning"
    weight: 0.30
    description: "WhenToUse"
