meta:
  id: segmentation-data-requirements
  level: 1
  course: customer-segmentation
  type: output
  description: "Segmentation data requirements — understand what data you need for different segmentation approaches and how to handle common data quality issues"
  tags: [data, data-quality, collection, preparation, basics]

state: {}

trigger: |
  A junior data analyst says: "I've been asked to build our first customer
  segmentation. We're a B2C subscription service with 25,000 customers.
  I have access to our database but I'm not sure what data I actually need.

  Our systems: CRM (contact info), billing system (payments), product
  analytics (usage events), support tool (tickets), and email platform
  (engagement). Data is spread across 5 systems and I'm not sure how
  clean it is.

  What data do I need to collect, how do I combine it, and what data
  quality issues should I watch out for?"

  Task: Guide a beginner through identifying the right data for customer
  segmentation, combining data from multiple sources, and handling common
  data quality challenges.

assertions:
  - type: llm_judge
    criteria: "Response identifies specific data to collect from each system — CRM: demographics, signup date, location, acquisition channel. Billing: plan type, payment history, revenue, upgrade/downgrade history. Product analytics: login frequency, feature usage, session duration, key actions. Support: ticket volume, CSAT scores, issue categories. Email: open rates, click rates, unsubscribe history. Explains which data is most valuable for segmentation and what's nice-to-have"
    weight: 0.35
    description: "DataIdentification"
  - type: llm_judge
    criteria: "Response explains how to combine data from multiple sources — creating a unified customer ID across systems, building a customer-level feature table with one row per customer, handling different data granularities (event-level data needs to be aggregated to customer-level), choosing the right time windows for behavioral data (e.g., last 90 days vs all-time), and creating a data pipeline or manual process to bring it together"
    weight: 0.35
    description: "DataCombination"
  - type: llm_judge
    criteria: "Response covers common data quality issues and solutions — missing values (imputation strategies vs excluding), duplicate records (deduplication), inconsistent formats (standardization), outliers (capping or removing extreme values), sparse data for new customers (minimum data thresholds), and data freshness (how often to refresh segmentation data)"
    weight: 0.30
    description: "DataQuality"
