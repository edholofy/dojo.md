meta:
  id: segmentation-vs-personalization
  level: 1
  course: customer-segmentation
  type: output
  description: "Segmentation vs personalization — understand the spectrum from mass marketing to one-to-one personalization and where segmentation fits"
  tags: [segmentation, personalization, one-to-one, spectrum, basics]

state: {}

trigger: |
  A growth marketer says: "I'm confused about the relationship between
  segmentation and personalization. My CEO wants 'personalized experiences
  for every customer.' My data team says we should focus on segmentation
  first. My marketing automation vendor says their AI can personalize
  everything automatically.

  What's the difference between segmentation and personalization? Do I
  need segmentation if I can just personalize at the individual level?
  And where should a company with limited resources start?"

  Task: Explain the spectrum from mass marketing to one-to-one
  personalization, clarify how segmentation and personalization
  relate to each other, and recommend where to start.

assertions:
  - type: llm_judge
    criteria: "Response explains the marketing spectrum — mass marketing (same message to everyone), segmented marketing (different messages to different groups, typically 3-10 segments), micro-segmentation (many small segments, 20-100 groups), one-to-one personalization (unique experience per individual). Explains that each step requires more data, more technology, and more content creation capacity"
    weight: 0.35
    description: "Spectrum"
  - type: llm_judge
    criteria: "Response clarifies the relationship between segmentation and personalization — segmentation is a foundation for personalization (you need to understand groups before you can personalize to individuals), personalization uses segmentation as a starting point then adds individual-level signals, true 1:1 personalization is often impractical (you need unique content for each person), and that segmentation gives 80% of the value with 20% of the effort compared to full personalization"
    weight: 0.35
    description: "Relationship"
  - type: llm_judge
    criteria: "Response recommends a practical starting path — start with 3-5 broad segments based on available data (behavioral is usually most impactful), build segment-specific campaigns and measure lift over mass marketing, gradually refine segments as you learn what drives differences, add individual-level personalization for high-value interactions (e.g., product recommendations, website experience), and avoid the trap of trying to personalize everything from day one"
    weight: 0.30
    description: "StartingPath"
