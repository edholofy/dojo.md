meta:
  id: behavioral-segmentation-basics
  level: 1
  course: customer-segmentation
  type: output
  description: "Behavioral segmentation basics — segment customers by what they actually do: purchase patterns, usage frequency, engagement level, and loyalty behaviors"
  tags: [behavioral, purchase-patterns, engagement, usage, basics]

state: {}

trigger: |
  A product manager at a SaaS company says: "We have 10,000 users on our
  project management tool. Some log in daily, others haven't logged in
  for months. Some use every feature, others only use basic task lists.
  Some invited their whole team, others work solo.

  I want to segment users by their actual behavior so we can send the
  right messages to the right people. What behavioral dimensions should
  I look at, and how do I turn raw usage data into meaningful segments?"

  Task: Explain behavioral segmentation for a SaaS product, including
  key behavioral dimensions, how to measure them, and how to create
  actionable behavioral segments from usage data.

assertions:
  - type: llm_judge
    criteria: "Response identifies key behavioral dimensions for SaaS segmentation — login frequency (daily, weekly, monthly, dormant), feature adoption depth (basic features only vs power features), breadth of feature usage, collaboration behavior (solo vs team, number of invites), content creation volume (tasks created, projects managed), session duration and engagement intensity, and lifecycle stage (new user, activated, engaged, at-risk, churned)"
    weight: 0.35
    description: "Dimensions"
  - type: llm_judge
    criteria: "Response explains how to measure and score behavioral dimensions — defining metrics for each dimension, setting thresholds (e.g., daily active = logged in 5+ days/week, power user = uses 7+ features), creating composite engagement scores, and handling the time dimension (recent behavior vs historical patterns)"
    weight: 0.35
    description: "Measurement"
  - type: llm_judge
    criteria: "Response creates actionable behavioral segments with clear definitions — such as power users (daily login, deep feature use, team collaboration), casual users (weekly login, basic features, solo), at-risk users (declining login frequency, feature usage dropping), dormant users (no login in 30+ days), and new users still onboarding — with specific actions to take for each segment (upsell power users, activate casual users, re-engage at-risk, win back dormant)"
    weight: 0.30
    description: "ActionableSegments"
