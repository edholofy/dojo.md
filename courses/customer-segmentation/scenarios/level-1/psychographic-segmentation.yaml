meta:
  id: psychographic-segmentation
  level: 1
  course: customer-segmentation
  type: output
  description: "Psychographic segmentation — segment customers by values, attitudes, interests, lifestyle, and personality traits"
  tags: [psychographic, values, lifestyle, attitudes, basics]

state: {}

trigger: |
  A brand strategist at a sustainable fashion company says: "We sell
  eco-friendly clothing. Our demographic data says our customers are
  mostly women aged 25-45, but that doesn't help us understand WHY
  they buy from us. Some care about the environment, some just like
  the style, some want to signal their values to others.

  I've heard that psychographic segmentation can help us understand
  motivations and values. But how do you actually measure psychographics?
  Demographics are easy — you can see age and location. How do you
  measure someone's values or lifestyle?"

  Task: Explain psychographic segmentation, how to measure attitudes
  and values, and how to apply psychographic insights to brand and
  marketing strategy.

assertions:
  - type: llm_judge
    criteria: "Response explains what psychographic segmentation captures that demographics cannot — underlying motivations, values (environmental consciousness, social responsibility, status), lifestyle choices (active lifestyle, minimalism, wellness), personality traits (adventurous, conservative, trend-following), and attitudes toward the product category. Explains why two demographically identical customers can have completely different psychographic profiles and buying motivations"
    weight: 0.35
    description: "WhatItCaptures"
  - type: llm_judge
    criteria: "Response explains practical methods to measure psychographics — surveys (Likert scale questions about values and attitudes), social media analysis (interests, follows, engagement patterns), purchase behavior inference (what they buy reveals what they value), content engagement (what topics they click on, what emails they open), customer interviews and focus groups, and third-party psychographic data providers. Acknowledges that psychographic data is harder to collect than demographic data"
    weight: 0.35
    description: "Measurement"
  - type: llm_judge
    criteria: "Response shows how to apply psychographic segments for a sustainable fashion brand — different messaging for environmentally motivated vs style-motivated vs status-motivated buyers, content strategy aligned to values (environmental impact data vs fashion inspiration vs social proof), channel strategy (where each psychographic segment spends time), product development informed by lifestyle preferences, and brand positioning that resonates with primary psychographic segments"
    weight: 0.30
    description: "Application"
