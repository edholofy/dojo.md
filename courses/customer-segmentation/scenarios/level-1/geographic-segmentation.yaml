meta:
  id: geographic-segmentation
  level: 1
  course: customer-segmentation
  type: output
  description: "Geographic segmentation — segment customers by location including region, urban vs rural, climate, and cultural factors"
  tags: [geographic, location, regional, basics]

state: {}

trigger: |
  A marketing director at a food delivery service says: "We operate in
  15 cities across the US. We've been running the same promotions and
  restaurant partnerships everywhere. But I suspect customer behavior
  varies hugely by location.

  We have data on: customer zip code, order frequency, average order
  value, cuisine preferences, delivery time expectations, and peak
  ordering hours. Total customers: 200,000.

  How should I segment customers geographically? I'm not sure if it's
  just by city or if there are smarter ways to think about it."

  Task: Explain geographic segmentation for a food delivery service,
  including different levels of geographic analysis and how location
  interacts with customer behavior.

assertions:
  - type: llm_judge
    criteria: "Response explains multiple levels of geographic segmentation — macro level (region: Northeast vs Southeast vs West), metro level (city-level differences in cuisine preference and price sensitivity), micro level (neighborhood-level differences in density, income, restaurant availability), and how to choose the right level based on business needs and data availability"
    weight: 0.35
    description: "Levels"
  - type: llm_judge
    criteria: "Response shows how geography interacts with behavior — different peak ordering times by time zone, cuisine preferences varying by region and local demographics, price sensitivity varying by local cost of living, delivery time expectations varying by urban density, weather impacts on ordering patterns, and how geographic segments can reveal hidden behavioral patterns"
    weight: 0.35
    description: "Interaction"
  - type: llm_judge
    criteria: "Response provides practical applications — geo-targeted promotions (different offers for different cities), localized restaurant partnerships (partner with cuisines that match local preferences), delivery zone optimization, regional pricing strategies, expansion planning (which new cities resemble high-performing existing markets), and seasonal adjustments by climate zone"
    weight: 0.30
    description: "Applications"
