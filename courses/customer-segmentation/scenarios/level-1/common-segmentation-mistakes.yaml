meta:
  id: common-segmentation-mistakes
  level: 1
  course: customer-segmentation
  type: output
  description: "Common segmentation mistakes — learn the most frequent errors beginners make when segmenting customers and how to avoid them"
  tags: [mistakes, pitfalls, anti-patterns, basics]

state: {}

trigger: |
  A data analyst presents their first customer segmentation to their
  manager. The manager reviews it and says: "I've seen several
  segmentation projects fail. Before we invest in this, walk me
  through the most common segmentation mistakes so we can make sure
  we're not falling into any of these traps.

  Specifically, what mistakes do people make when: (1) choosing how
  to segment, (2) building the segments, and (3) trying to use
  segments in practice?"

  Task: Identify and explain the most common customer segmentation
  mistakes across the entire segmentation lifecycle — from design
  to implementation to operationalization.

assertions:
  - type: llm_judge
    criteria: "Response covers design-phase mistakes — segmenting on convenient data rather than meaningful differences (e.g., segmenting by state when behavior doesn't vary by state), creating too many segments (10+ segments that the team can't act on differently), creating too few segments (only 2 segments that are too broad to be useful), segmenting on a single dimension when multiple dimensions interact, and not having a clear business objective for the segmentation (segmenting for the sake of segmenting)"
    weight: 0.35
    description: "DesignMistakes"
  - type: llm_judge
    criteria: "Response covers building-phase mistakes — not validating segment stability (segments that change completely month to month are not useful), ignoring segment size (a segment with 50 customers out of 100,000 is not actionable), not checking if segments actually differ in meaningful ways (statistically significant differences in key metrics), overfitting to historical data that doesn't predict future behavior, and not handling outliers and edge cases (customers that don't fit any segment)"
    weight: 0.35
    description: "BuildingMistakes"
  - type: llm_judge
    criteria: "Response covers operationalization mistakes — creating segments that can't be identified in real-time (if you can't classify a new customer into a segment, it's useless), not updating segments as customer behavior changes (static segments become stale), not measuring the business impact of segmentation (did revenue actually improve?), building segments that the marketing or sales team can't act on (too complex or too abstract), and treating segments as permanent identities rather than current states (customers move between segments)"
    weight: 0.30
    description: "OperationMistakes"
