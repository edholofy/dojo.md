meta:
  id: rfm-analysis-introduction
  level: 1
  course: customer-segmentation
  type: output
  description: "RFM analysis introduction — learn the foundational recency, frequency, monetary value framework for customer segmentation"
  tags: [RFM, recency, frequency, monetary, basics, framework]

state: {}

trigger: |
  An e-commerce analyst says: "My manager mentioned RFM analysis as a way
  to segment our 50,000 customers. I have transaction data going back 2
  years — every purchase with date, amount, and customer ID.

  What is RFM analysis? How do I calculate the scores? And what do the
  resulting segments actually tell me about my customers?"

  Task: Explain RFM analysis from scratch, including how to calculate
  each dimension, how to create RFM scores, and what the resulting
  segments mean for business decisions.

assertions:
  - type: llm_judge
    criteria: "Response clearly explains each RFM dimension — Recency: how recently a customer made a purchase (measured in days since last purchase, lower is better), Frequency: how often they purchase (total number of purchases in the period), Monetary: how much they spend (total or average purchase value). Includes how to calculate each from transaction data with concrete examples"
    weight: 0.35
    description: "RFMExplained"
  - type: llm_judge
    criteria: "Response explains how to create RFM scores — typically scoring each dimension on a 1-5 scale using quintiles (divide customers into 5 equal groups ranked by each dimension), creating combined RFM scores (e.g., 555 = best customers, 111 = least engaged), and how to interpret common RFM score combinations such as 555 (champions/best customers), 511 (new high-value customers), 155 (at-risk loyal customers who haven't purchased recently), 111 (lost/churned customers)"
    weight: 0.35
    description: "Scoring"
  - type: llm_judge
    criteria: "Response maps RFM segments to business actions — champions (555): reward and retain, request referrals. Loyal customers (X5X): upsell and cross-sell. At-risk (1XX with high F and M): re-engagement campaigns. New customers (5X1): nurture and activate. Lost customers (111): win-back campaigns or accept churn. Includes the practical value of RFM as a simple, data-driven segmentation that requires only transaction data"
    weight: 0.30
    description: "BusinessActions"
