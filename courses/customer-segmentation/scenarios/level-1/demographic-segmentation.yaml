meta:
  id: demographic-segmentation
  level: 1
  course: customer-segmentation
  type: output
  description: "Demographic segmentation — segment customers by observable characteristics like age, gender, income, education, and household composition"
  tags: [demographic, age, income, gender, basics]

state: {}

trigger: |
  A retail brand marketing manager says: "We sell clothing across all age
  groups and income levels. Our email campaigns go to everyone with the
  same message. Open rates are 8% and conversion is 0.3%.

  Customer data available: age, gender, household income (from zip code
  data), marital status, number of children. We have 500,000 customers.

  How would I use demographic segmentation to improve our marketing?
  Walk me through the process step by step."

  Task: Explain how to perform demographic segmentation for a retail
  clothing brand, including how to define segments, what data to use,
  and how to apply segments to improve marketing performance.

assertions:
  - type: llm_judge
    criteria: "Response explains how to create meaningful demographic segments for a clothing retailer — not just listing variables but showing how to combine them into actionable segments such as young professionals (25-34, single, higher income), parents with young children (30-45, married, children), budget-conscious seniors (55+, lower income), etc. Includes guidance on segment sizing (segments should be large enough to be actionable, typically >5% of the base)"
    weight: 0.35
    description: "Segments"
  - type: llm_judge
    criteria: "Response walks through the practical process — collecting and cleaning demographic data, analyzing purchase patterns by demographic group, identifying statistically significant differences in behavior across groups, creating segment definitions, and profiling each segment with key characteristics and preferences"
    weight: 0.35
    description: "Process"
  - type: llm_judge
    criteria: "Response shows how to apply demographic segments to improve the 8% open rate and 0.3% conversion — tailored email content per segment, different product recommendations, adjusted send times, segment-specific promotions, and expected improvement ranges (e.g., segmented emails typically achieve 14-20% open rates and 1-2% conversion)"
    weight: 0.30
    description: "Application"
