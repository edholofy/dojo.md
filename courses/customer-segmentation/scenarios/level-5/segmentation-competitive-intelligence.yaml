meta:
  id: segmentation-competitive-intelligence
  level: 5
  course: customer-segmentation
  type: output
  description: "Segmentation for competitive intelligence — use segmentation to analyze competitive dynamics, identify vulnerable competitor segments, and time market moves"
  tags: [competitive-intelligence, market-analysis, competitive-dynamics, master]

state: {}

trigger: |
  A chief strategy officer says: "We're in a 5-player market and I want
  to use customer segmentation to gain competitive advantage. Specifically:

  1. Can we segment the TOTAL MARKET (not just our customers) to identify
     segments where we're strong vs weak?
  2. Can we identify competitor customers who are in segments we serve
     better — prime targets for competitive displacement?
  3. Can we predict which market segments our competitors will pursue
     next, and pre-empt them?

  We're a $300M ARR CRM company. We know our 20,000 customers well. We
  have partial data on the broader market of 200,000 potential accounts
  through third-party data, review sites, and competitive intelligence.

  How do I use segmentation for competitive strategy?"

  Task: Design a competitive segmentation strategy that maps the total
  addressable market, identifies competitive vulnerabilities, and
  informs market strategy.

assertions:
  - type: llm_judge
    criteria: "Response explains how to segment the total addressable market — using available data (third-party firmographic data, review site profiles, job posting analysis, technology stack data from tools like BuiltWith or HG Insights) to segment the 200,000 potential accounts by: industry, company size, current CRM vendor (if identifiable), tech stack maturity, and growth stage. Maps our penetration by segment (where we have high market share vs low), identifies white-space segments (large segments where no vendor dominates), and contested segments (where multiple vendors compete intensely)"
    weight: 0.35
    description: "MarketSegmentation"
  - type: llm_judge
    criteria: "Response identifies competitive displacement opportunities — analyzing which segments competitors serve poorly (signals: low NPS scores on review sites, high complaint volumes, product gaps in specific use cases), identifying competitor customers in our strong segments (companies that match our ICP but use a competitor), estimating switching propensity by segment (based on contract renewal timing, competitor satisfaction data, feature gap analysis), and prioritizing target accounts based on segment-level competitive advantage and account-level switching signals"
    weight: 0.35
    description: "CompetitiveDisplacement"
  - type: llm_judge
    criteria: "Response addresses competitive pre-emption — predicting competitor moves by analyzing their product roadmap signals (job postings, patent filings, partnership announcements), identifying which market segments competitors are investing in (hiring patterns, marketing spend shifts, conference sponsorships), and designing pre-emptive strategies (if a competitor is entering our strong segment: fortify with deeper feature investment and lock-in; if entering a segment we haven't prioritized: decide whether to compete or concede). Includes competitive monitoring by segment and trigger-based response playbooks"
    weight: 0.30
    description: "CompetitivePreemption"
