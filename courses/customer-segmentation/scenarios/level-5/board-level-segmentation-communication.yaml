meta:
  id: board-level-segmentation-communication
  level: 5
  course: customer-segmentation
  type: output
  description: "Board-level segmentation communication — present customer segmentation insights to the board of directors in a way that drives strategic decisions"
  tags: [board, communication, executive, strategic, master]

state: {}

trigger: |
  A CEO says: "I have 15 minutes at our next board meeting to present
  our customer segmentation insights and get approval for a strategic
  shift. The board includes:

  - 2 VC partners (focused on growth metrics and market opportunity)
  - 1 independent director with PE background (focused on profitability)
  - 1 industry expert (focused on competitive positioning)
  - Our CFO (focused on unit economics)

  Our segmentation reveals that 70% of our revenue comes from 15% of
  our customers (enterprise segment). But 80% of our sales and marketing
  spend goes to acquiring mid-market customers that have 3x higher churn.

  I want board approval to shift 40% of our mid-market budget to
  enterprise. This is controversial — it means slower customer count
  growth but better unit economics.

  How do I present this in 15 minutes and win board approval?"

  Task: Design a 15-minute board presentation that uses segmentation
  data to make the case for a strategic resource reallocation, addressing
  each board member's perspective.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling board presentation structure — opening with the strategic question (not data), presenting the segmentation insight in 2-3 slides maximum (the 70/15 revenue concentration, the 3x churn differential, the unit economics gap), framing the proposed action clearly (shift 40% of mid-market budget to enterprise), presenting the expected financial impact (revenue impact, profitability improvement, customer count implications), addressing risks, and closing with a clear ask. Follows the 'situation → insight → recommendation → impact' arc"
    weight: 0.35
    description: "PresentationDesign"
  - type: llm_judge
    criteria: "Response tailors the message to each board member's perspective — for VC partners: frames the shift as accelerating ARR growth by focusing on higher-ACV deals and better NRR in enterprise; addresses the customer count concern (fewer new logos but higher quality). For PE director: shows the margin improvement and unit economics (lower CAC payback, higher LTV/CAC ratio). For industry expert: positions the shift as competitive differentiation (competitors are fighting for mid-market, we'll own enterprise). For CFO: presents detailed unit economics comparison by segment"
    weight: 0.35
    description: "AudienceTailoring"
  - type: llm_judge
    criteria: "Response addresses objections and provides decision support — anticipates key objections (won't this slow growth? what about mid-market customers who refer enterprise deals? can our sales team actually sell enterprise?), prepares data-driven responses to each, includes a risk mitigation plan (phased rollout, monitoring triggers to reverse if needed), presents the alternative scenarios (do nothing, aggressive shift, moderate shift), and structures the board discussion to reach a decision within the 15-minute slot"
    weight: 0.30
    description: "ObjectionHandling"
