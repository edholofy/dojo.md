meta:
  id: master-segmentation-shift
  level: 5
  course: customer-segmentation
  type: output
  description: "Master segmentation shift — the ultimate assessment combining strategic segmentation, organizational transformation, competitive intelligence, ethical governance, and board-level communication"
  tags: [shift, combined, assessment, comprehensive, master]

state: {}

trigger: |
  You are the Chief Customer Officer of a $1.5B ARR enterprise software
  company preparing for IPO in 18 months. The situation:

  Customer base: 50,000 accounts across 5 products, 6 regions, and
  12 industries. NRR: 112%. Gross churn: 9%. Growing 20% YoY.

  Challenges:
  1. The company has 4 different segmentations used by different teams —
     no unified view. This is flagged by the IPO bankers as a risk.
  2. Customer concentration: top 50 accounts = 25% of ARR ($375M). The
     SEC filing requires disclosure and narrative around concentration risk.
  3. An activist investor is pushing to cut the SMB segment (40% of
     customers, 10% of ARR, highest churn) to improve unit economics.
  4. Two board members disagree: one wants to double down on enterprise
     (higher LTV), the other says mid-market is the growth engine.
  5. A competitor just hired away 3 of your top enterprise sales reps —
     they're targeting your highest-value segment.

  Deliver the comprehensive customer segmentation strategy covering:
  unified segmentation, concentration risk management, SMB debate
  resolution, board strategy recommendation, and competitive defense.

  Task: Build the complete segmentation strategy addressing all five
  challenges simultaneously — the ultimate test of segmentation mastery.

assertions:
  - type: llm_judge
    criteria: "Response addresses the unified segmentation and IPO preparation — designs a single authoritative segmentation that replaces the 4 conflicting ones, with methodology appropriate for IPO-grade reporting (auditable, consistent definitions, defensible methodology). Addresses the customer concentration disclosure: analyzes the top-50 account risk (what happens if the largest account churns? the top 5? the top 10?), designs a concentration monitoring framework, and creates the narrative for the S-1 filing that acknowledges concentration while presenting mitigation strategies. Shows how unified segmentation directly supports IPO readiness"
    weight: 0.35
    description: "IPOReadiness"
  - type: llm_judge
    criteria: "Response resolves the SMB debate and board disagreement with data — analyzes the SMB segment's true economics (is it really unprofitable or just lower margin? does it serve as a pipeline for mid-market upgrades? does cutting it affect market perception?), presents the enterprise vs mid-market analysis with segment-level unit economics (CAC, LTV, payback, margin, NRR by segment), models the financial impact of different allocation strategies (cut SMB entirely, maintain SMB with lower investment, accelerate enterprise), and provides a data-driven recommendation that resolves the board disagreement. The recommendation should include a balanced approach with clear metrics for evaluating success"
    weight: 0.35
    description: "StrategicResolution"
  - type: llm_judge
    criteria: "Response addresses competitive defense and organizational execution — designs a competitive defense strategy for the enterprise segment (how to protect high-value accounts targeted by the competitor who hired the sales reps: executive sponsorship, multi-threading, contract extensions, enhanced service for at-risk accounts), creates an implementation plan for the unified segmentation with change management across 4 previously independent teams, and presents the board-ready strategy deck that ties together all five challenges into a coherent narrative. Shows how segmentation becomes the organizing principle for the company's IPO preparation"
    weight: 0.30
    description: "CompetitiveDefense"
