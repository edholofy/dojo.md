meta:
  id: segmentation-as-strategy
  level: 5
  course: customer-segmentation
  type: output
  description: "Segmentation as strategy — use customer segmentation as the foundation for corporate strategy, resource allocation, and competitive positioning"
  tags: [strategy, corporate, resource-allocation, competitive, master]

state: {}

trigger: |
  A CEO says: "We're a $500M ARR B2B SaaS company with 25,000 customers
  across 4 products. Our board is pushing us to choose: do we pursue the
  enterprise market (fewer, larger deals) or the mid-market (more, smaller
  deals)? We can't resource both equally.

  I don't want to make this decision based on intuition. I want our
  customer segmentation to tell us where the value is, where we have
  the strongest competitive position, and where the growth opportunity
  lies.

  Use segmentation to drive our corporate strategy for the next 3 years."

  Task: Use customer segmentation as the foundation for corporate
  strategy, informing market focus, resource allocation, product
  investment, and competitive positioning decisions.

assertions:
  - type: llm_judge
    criteria: "Response builds a strategic segmentation that goes beyond marketing — segments defined by value creation potential, competitive position, and market dynamics. Includes analysis of: segment-level economics (CAC, LTV, payback period, margin by segment), competitive position per segment (where we win vs lose, win rate by segment), market size and growth by segment (TAM/SAM/SOM per segment), product-market fit per segment (NRR, NPS, usage depth by segment). Uses this analysis to make a data-driven recommendation on enterprise vs mid-market focus"
    weight: 0.35
    description: "StrategicAnalysis"
  - type: llm_judge
    criteria: "Response translates segmentation into resource allocation — how to distribute R&D investment across segments (which product features serve which segments), sales and marketing budget allocation by segment (CAC-efficient segments get more investment), customer success resource allocation (high-value segments get premium service), and hiring plans aligned to segment strategy. Shows the financial impact of different allocation scenarios (invest in enterprise vs invest in mid-market vs balanced)"
    weight: 0.35
    description: "ResourceAllocation"
  - type: llm_judge
    criteria: "Response addresses the board presentation and strategic communication — how to present segment-driven strategy to the board (segment economics, competitive positioning, growth trajectories), how to frame the enterprise vs mid-market decision as a portfolio allocation rather than a binary choice, how to set segment-level targets and track progress, and how to build organizational alignment around a segment-driven strategy (every team understands their role in serving target segments)"
    weight: 0.30
    description: "BoardPresentation"
