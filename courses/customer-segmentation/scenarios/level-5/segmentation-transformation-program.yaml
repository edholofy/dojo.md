meta:
  id: segmentation-transformation-program
  level: 5
  course: customer-segmentation
  type: output
  description: "Segmentation transformation program — lead an organization-wide transformation from ad-hoc segmentation to a world-class, data-driven customer intelligence capability"
  tags: [transformation, organizational, capability-building, program, master]

state: {}

trigger: |
  A newly appointed chief customer officer at a $2B revenue financial
  services company says: "Our segmentation is embarrassing for a company
  our size. We have:

  - 5 million customers across banking, insurance, and wealth management
  - 3 business units that each have different customer definitions
  - No unified customer view — a banking customer and insurance customer
    might be the same person but we don't know
  - Segmentation is done in Excel by each product team independently
  - No predictive capabilities — all segmentation is backward-looking
  - Customer insights team of 8 people buried in the marketing department

  The board has given me 18 months and a $10M budget to transform our
  customer intelligence capability. Design the transformation program."

  Task: Design an 18-month transformation program that takes a large
  financial services company from ad-hoc segmentation to a world-class
  customer intelligence capability.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased transformation roadmap — Phase 1 (months 1-6): foundation — unified customer identity (identity resolution across 3 BUs), centralized data platform (customer data warehouse/CDP), standardized definitions (what is a customer, what is an account, what is a product relationship), and quick-win segmentation on the unified data. Phase 2 (months 7-12): advanced capabilities — predictive models (CLV, churn, propensity), real-time scoring, cross-BU segmentation. Phase 3 (months 13-18): strategic integration — segment-driven strategy, organizational alignment, continuous improvement. Each phase has specific deliverables, milestones, and success metrics"
    weight: 0.35
    description: "TransformationRoadmap"
  - type: llm_judge
    criteria: "Response addresses organizational design and change management — building the customer intelligence team (from 8 to target state: team structure, roles, hiring plan), organizational placement (reporting to CCO, not buried in marketing), cross-BU governance (how to get 3 business units to adopt a unified segmentation when each has their own priorities), executive sponsorship and stakeholder management, training and enablement for hundreds of segment consumers across the organization, and change management for moving from Excel-based to platform-based segmentation"
    weight: 0.35
    description: "OrganizationalChange"
  - type: llm_judge
    criteria: "Response addresses budget allocation and ROI — how to spend the $10M budget across technology (CDP/data platform), people (hiring, training), consulting (implementation support), and change management. Includes expected ROI: cross-BU cross-sell opportunities (identifying banking customers who should also have insurance), churn reduction through predictive segmentation, marketing efficiency gains (better targeting reduces waste), and strategic value of unified customer intelligence. Provides a business case that shows the $10M investment returning multiples in value"
    weight: 0.30
    description: "BudgetAndROI"
