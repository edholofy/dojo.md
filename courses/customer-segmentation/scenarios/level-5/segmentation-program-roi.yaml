meta:
  id: segmentation-program-roi
  level: 5
  course: customer-segmentation
  type: output
  description: "Segmentation program ROI — quantify the business value of customer segmentation and build the business case for continued investment"
  tags: [ROI, business-case, value, investment, measurement, master]

state: {}

trigger: |
  A CFO says: "We've spent $3M over 2 years building our customer
  segmentation capability — data infrastructure, analytics team,
  segmentation tools, and organizational training. The analytics
  team says it's been transformative but I need numbers.

  What's the actual ROI? How much incremental revenue has segmentation
  generated? How much cost has it saved? And should I keep investing?

  Company: $400M ARR, 30,000 customers, B2B SaaS with 4 products.
  Pre-segmentation: one-size-fits-all marketing, same CSM coverage
  for all accounts, generic product recommendations.
  Post-segmentation: segment-specific campaigns, tiered CSM coverage,
  personalized product recommendations, segment-driven pricing."

  Task: Quantify the ROI of the segmentation capability across all
  value dimensions and build the business case for continued investment.

assertions:
  - type: llm_judge
    criteria: "Response quantifies direct revenue impact — incremental revenue from segment-specific marketing campaigns (higher conversion rates × campaign volume = incremental deals), churn reduction from segment-based retention programs (reduced churn rate × average ACV = saved revenue), upsell/cross-sell improvement from personalized recommendations (higher expansion rate × base revenue = incremental expansion), and pricing optimization from segment-based pricing (higher ARPU from willingness-to-pay aligned pricing). Each dimension should have specific calculations or reasonable estimates with clear methodology"
    weight: 0.35
    description: "DirectRevenue"
  - type: llm_judge
    criteria: "Response quantifies cost savings and efficiency gains — marketing efficiency (higher ROI per dollar spent through better targeting, reduced waste on untargeted campaigns), CSM efficiency (tiered coverage model serves more customers with same headcount, or same coverage quality with fewer CSMs), sales efficiency (higher win rates from segment-aligned sales approaches, shorter sales cycles for better-qualified leads), and product development efficiency (building features that serve the highest-value segments, avoiding features that serve low-value segments). Aggregates into total ROI calculation against the $3M investment"
    weight: 0.35
    description: "CostSavings"
  - type: llm_judge
    criteria: "Response builds the continued investment business case — the compounding value of segmentation (benefits increase as the organization gets better at using segments), diminishing returns analysis (where further segmentation investment adds less value), the risk of NOT investing (models degrade, segments become stale, competitive advantage erodes), specific investment recommendations for the next phase (what to spend and expected returns), and a clear comparison: what happens if we invest $1.5M more vs stop investing entirely"
    weight: 0.30
    description: "ContinuedInvestment"
