meta:
  id: next-generation-segmentation
  level: 5
  course: customer-segmentation
  type: output
  description: "Next-generation segmentation — explore the future of customer segmentation with AI-driven micro-segmentation, contextual segments, and self-evolving models"
  tags: [next-generation, AI-driven, micro-segmentation, future, master]

state: {}

trigger: |
  A chief innovation officer says: "Our segmentation was state-of-the-art
  5 years ago. Now I see competitors talking about AI-driven
  micro-segmentation, contextual segments that change based on the
  customer's current situation, self-evolving segments that automatically
  adapt, and foundation models for customer understanding.

  We're a $1B e-commerce company with 10 million customers. What does
  next-generation customer segmentation look like? What should we invest
  in over the next 3 years?

  And please separate genuine advances from marketing hype — I don't
  want to invest in buzzwords."

  Task: Design a next-generation segmentation vision that evaluates
  emerging approaches, separates hype from genuine advances, and
  provides a practical adoption roadmap.

assertions:
  - type: llm_judge
    criteria: "Response evaluates emerging segmentation technologies — AI-driven micro-segmentation (segment-of-one using individual-level predictions rather than group assignments), contextual segmentation (segments that change based on the customer's current context: time of day, device, recent behavior, mood inferred from interaction patterns), self-evolving segments (models that automatically detect when segments are drifting and adapt without manual retraining), foundation models for customer understanding (large models pre-trained on diverse customer data that can be fine-tuned for specific segmentation tasks), and graph-based customer networks (using social connections and interaction patterns). Provides honest assessment of maturity and practical applicability for each"
    weight: 0.35
    description: "EmergingTechnologies"
  - type: llm_judge
    criteria: "Response separates hype from genuine value — genuinely valuable now: contextual personalization (adjusting treatment based on real-time context within established segments), automated segment monitoring (detecting drift and triggering retraining), and ensemble methods that combine multiple segmentation approaches. Emerging but promising: individual-level predictions replacing group segments for specific use cases (recommendation engines, risk scoring). Overhyped: fully autonomous segmentation that requires no human judgment, claims of 'segment of one' replacing all group-level analysis, foundation models for customer understanding (not yet proven for this application). Provides specific criteria for evaluating new segmentation technology claims"
    weight: 0.35
    description: "HypeVsReality"
  - type: llm_judge
    criteria: "Response provides a practical 3-year roadmap — Year 1: build the data and infrastructure foundation (unified customer data, real-time feature pipelines, ML platform), add contextual signals to existing segmentation, implement automated monitoring. Year 2: deploy individual-level predictions for key use cases (next-best-action, churn prevention), build adaptive segmentation that self-adjusts, experiment with graph-based approaches. Year 3: integrate emerging methods that have proven value, build competitive advantage through segmentation sophistication, invest in AI-native capabilities. Includes budget estimates and expected ROI per phase"
    weight: 0.30
    description: "Roadmap"
