meta:
  id: segmentation-ethics-and-fairness
  level: 5
  course: customer-segmentation
  type: output
  description: "Segmentation ethics and fairness — address the ethical dimensions of customer segmentation including fairness, discrimination, transparency, and societal impact"
  tags: [ethics, fairness, discrimination, transparency, societal-impact, master]

state: {}

trigger: |
  A board member raises a concern: "I've been reading about algorithmic
  bias and I'm worried about our customer segmentation. We use it to
  determine pricing, credit offers, service levels, and marketing
  targeting. If our segments correlate with race, gender, or income
  in unfair ways, we could face regulatory action, lawsuits, or
  reputational damage.

  Specific concerns:
  1. Our 'high-value' segment is disproportionately white and male
  2. Our 'low service' tier correlates with lower-income zip codes
  3. Our pricing optimization charges different prices to different
     segments — is that discrimination?
  4. We use third-party data that may embed historical biases
  5. Customers don't know they're segmented or what it means for them

  We're a financial services company — this isn't just ethical, it's
  regulatory. How do we ensure our segmentation is fair?"

  Task: Analyze the ethical and fairness dimensions of customer
  segmentation in financial services, design fairness audits and
  controls, and build a framework for ethical segmentation practices.

assertions:
  - type: llm_judge
    criteria: "Response analyzes each concern with depth — explains how segmentation can create disparate impact even without discriminatory intent (using behavioral features that correlate with protected classes), the difference between disparate treatment (intentionally using protected characteristics) and disparate impact (neutral criteria that disproportionately affect protected groups), how historical data embeds historical biases (if past lending was discriminatory, models trained on that data perpetuate discrimination), and the specific regulatory landscape for financial services (ECOA, Fair Housing Act, UDAP/UDAAP, state fair lending laws)"
    weight: 0.35
    description: "EthicalAnalysis"
  - type: llm_judge
    criteria: "Response designs fairness audits and controls — disparate impact testing (compare segment composition to population demographics, flag segments with significant demographic skew), feature audit (identify features that serve as proxies for protected characteristics — zip code, browsing language, name-based signals), fairness metrics (demographic parity, equalized odds, predictive parity — which metric is appropriate for each use case), regular audit cadence (quarterly fairness reviews), and corrective actions (constraining models to reduce disparate impact, removing proxy features, adjusting segment boundaries)"
    weight: 0.35
    description: "FairnessControls"
  - type: llm_judge
    criteria: "Response builds a comprehensive ethical framework — transparency principles (should customers know they're segmented? what level of explanation is required?), consent and opt-out mechanisms (especially for consequential segmentation like credit and pricing), the ethics of differential treatment (when is treating segments differently acceptable vs discriminatory?), governance structure (ethics review board for new segmentation use cases, escalation procedures for fairness concerns), and proactive approaches (fairness-aware machine learning, bias testing in development, diverse teams building segmentation models)"
    weight: 0.30
    description: "EthicalFramework"
