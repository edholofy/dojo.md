meta:
  id: segmentation-market-entry
  level: 5
  course: customer-segmentation
  type: output
  description: "Segmentation for market entry — use segmentation to identify and prioritize new market opportunities, design go-to-market strategies, and predict market receptivity"
  tags: [market-entry, expansion, go-to-market, new-markets, master]

state: {}

trigger: |
  A chief growth officer says: "We're a $200M ARR B2B SaaS company
  with strong product-market fit in North America. We're evaluating
  three expansion opportunities:

  1. Geographic: expand to Europe (UK, Germany, France)
  2. Vertical: enter healthcare (currently serve tech, finance, retail)
  3. Segment: move upmarket from mid-market to enterprise

  We can't afford to pursue all three simultaneously. I want to use
  our existing customer segmentation to predict which expansion will
  be most successful and design the go-to-market approach.

  Our current customer data: 10,000 accounts with detailed segment
  profiles, win/loss data, usage patterns, and satisfaction scores."

  Task: Use customer segmentation insights to evaluate and prioritize
  three market expansion opportunities, and design a segmentation-driven
  go-to-market strategy for the recommended expansion.

assertions:
  - type: llm_judge
    criteria: "Response uses existing segmentation to evaluate each expansion — for geographic expansion: do our successful customer segments exist in European markets? How does the competitive landscape differ? For vertical expansion: which of our current segments overlap with healthcare buyers? What unique healthcare needs require product adaptation? For upmarket move: do we have any enterprise customers today? What's their retention and satisfaction? What are the segment-level economics of enterprise vs mid-market? Creates a scoring framework that ranks the three opportunities on: addressable market, competitive advantage, execution complexity, revenue potential, and time-to-impact"
    weight: 0.35
    description: "ExpansionEvaluation"
  - type: llm_judge
    criteria: "Response designs a segmentation-driven go-to-market for the recommended expansion — defining the target segments in the new market (not just the market overall but the specific customer segments that match our strengths), designing the ICP for the new market based on what works in our existing market, identifying early adopter segments (who will buy first) vs mass market segments (who will buy once proven), mapping the product-market fit of our current offering to each segment in the new market (gaps, adaptations needed), and planning the sales and marketing approach per segment"
    weight: 0.35
    description: "GoToMarket"
  - type: llm_judge
    criteria: "Response addresses the sequencing and learning strategy — start with the segment that has highest probability of success (beachhead strategy), define success metrics per segment that signal whether to expand to adjacent segments, build learning loops (what works in segment A informs the approach for segment B), design a staged investment plan (invest more as segments prove out, pull back if they don't), and create early warning indicators that signal when a market expansion is failing at the segment level before overall metrics show it"
    weight: 0.30
    description: "SequencingStrategy"
