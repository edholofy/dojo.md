meta:
  id: newsletter-automation
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Build newsletter automation systems — triggered sequences, behavioral flows, dynamic content, and lifecycle campaigns"
  tags: [newsletter, automation, workflows, triggers, dynamic-content, advanced]

state: {}

trigger: |
  Newsletter automation goes beyond simple scheduling. Modern
  email platforms support behavioral triggers, conditional
  content, dynamic personalization, and complex workflow
  sequences that deliver the right content at the right time
  based on subscriber behavior.

  Design automation systems for:

  Newsletter: "ProductCraft Pro" — a newsletter for product managers
  Platform: Kit (ConvertKit) — supports visual automations
  Subscribers: 10,000 across free and paid tiers
  Content: Weekly newsletter + paid premium content + course

  Part 1: Lifecycle automation
  Design the complete subscriber lifecycle automation:

  1. Acquisition → Onboarding:
     - Signup trigger → Welcome sequence (design the 4-email flow)
     - Segment based on signup source (organic, referral, paid ad)
     - Tag based on lead magnet downloaded

  2. Onboarding → Engagement:
     - Monitor engagement over first 30 days
     - If engaged: Fast-track to segment-specific content
     - If not engaging: Trigger re-engagement attempt
     - Design the branching logic diagram

  3. Engagement → Monetization:
     - After 4+ opens in a row: Trigger paid tier soft pitch
     - After clicking premium content tease: Trigger upgrade sequence
     - After attending webinar: Trigger course offer
     - Design the upgrade sequence (3 emails)

  4. Active → At-risk → Churned:
     - Define "at-risk" criteria (no opens in 30 days)
     - Design the win-back automation (5-step flow)
     - Define "churned" criteria and list cleanup automation

  Part 2: Behavioral triggers
  Design 6 behavioral trigger automations:

  Trigger 1: Subscriber clicks on "hiring" content 3+ times
  → Tag as "interested in hiring" → Add to hiring-focused segment

  Trigger 2: Subscriber replies to newsletter
  → Tag as "highly engaged" → Send thank-you → Fast-track to VIP

  Trigger 3: Subscriber refers 3+ friends
  → Tag as "advocate" → Send exclusive content → Invite to community

  Trigger 4: Subscriber clicks unsubscribe but doesn't confirm
  → Show preference center → Offer reduced frequency option

  Trigger 5: Paid subscriber's renewal date is 7 days away
  → Send renewal reminder → Highlight value received this month

  Trigger 6: New subscriber hasn't opened first 3 emails
  → Try different subject line style → Move to re-engagement

  For each trigger, write the email copy and define the automation logic.

  Part 3: Dynamic content
  1. Design a newsletter template with 3 dynamic content blocks:
     - Block A: Varies by subscriber's interest tags
     - Block B: Varies by subscriber's engagement level
     - Block C: Varies by subscriber's paid/free status
  2. Write content for each variant of each block
  3. Explain the personalization logic and fallback defaults

  Part 4: Automation testing and monitoring
  1. Define the testing protocol for each automation
  2. Create the automation monitoring dashboard
  3. Set up error detection (bounced triggers, stuck sequences)
  4. Build the quarterly automation audit checklist

assertions:
  - type: llm_judge
    criteria: "Lifecycle automation covers the complete subscriber journey — from acquisition through monetization to churn recovery with clear branching logic"
    weight: 0.25
    description: "Complete lifecycle coverage"
  - type: llm_judge
    criteria: "Behavioral triggers are well-designed — each trigger responds to meaningful subscriber actions with appropriate and proportionate responses"
    weight: 0.25
    description: "Well-designed behavioral triggers"
  - type: llm_judge
    criteria: "Dynamic content blocks demonstrate real personalization — the variants are meaningfully different, not just cosmetic changes"
    weight: 0.25
    description: "Meaningful dynamic content"
  - type: llm_judge
    criteria: "Automation testing and monitoring are thorough — the system would catch broken automations before they affect subscribers"
    weight: 0.25
    description: "Thorough automation monitoring"
