meta:
  id: advanced-curation-techniques
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Master advanced curation — thematic curation, contrarian picks, trend spotting, source diversification, and editorial voice"
  tags: [newsletter, curation, advanced, editorial, trend-spotting, advanced]

state: {}

trigger: |
  Advanced curation goes beyond "here are interesting links."
  It requires developing an editorial perspective, spotting trends
  before they're obvious, diversifying sources beyond the usual
  suspects, and adding commentary that makes curation feel like
  original thinking.

  Demonstrate advanced curation techniques for:

  Newsletter: "Future of Work Weekly" — curated newsletter on
  remote work, workplace technology, and organizational design
  Audience: HR leaders, CHROs, workplace strategists (12,000 subs)

  Part 1: Thematic curation
  Instead of a random collection of links, curate this week's
  issue around a single theme: "The hybrid work backlash."

  Write a complete themed issue:
  1. Editor's note (200 words) setting up the theme and your thesis
  2. 5 curated items that build an argument around the theme:
     - Item 1: The corporate return-to-office push (data/news)
     - Item 2: Employee resistance and attrition data
     - Item 3: The technology gap in hybrid meetings
     - Item 4: A case study of a company that found a middle ground
     - Item 5: A contrarian take (why offices might actually be better)
  3. Closing editorial (100 words) synthesizing the theme
  4. 2-3 bonus links (non-themed but noteworthy)

  Part 2: Source diversification
  1. Map the "source ecosystem" for workplace content:
     - Tier 1: Major publications everyone reads
     - Tier 2: Industry publications and trade media
     - Tier 3: Academic research and reports
     - Tier 4: International and non-English sources
     - Tier 5: Social media and emerging voices
  2. Design a source rotation strategy to avoid echo chambers
  3. Explain how to discover and vet new sources
  4. Create a "source health check" to audit diversity quarterly

  Part 3: Trend spotting methodology
  1. Explain how to identify emerging trends before they're mainstream:
     - Signal detection (where trends first appear)
     - Pattern recognition (connecting dots across sources)
     - Timing (when a trend is ready for newsletter coverage)
  2. Demonstrate by identifying 3 emerging workplace trends:
     - For each, cite the signals you'd watch
     - Write the newsletter introduction you'd use when covering it
     - Estimate when it becomes mainstream conversation

  Part 4: Editorial voice in curation
  1. Show 3 levels of editorial commentary for the same curated link:
     - Level 1: Basic summary (what most curators do)
     - Level 2: Contextual analysis (connecting to broader trends)
     - Level 3: Opinionated take (disagreeing with or challenging the source)
  2. Define when each level of commentary is appropriate
  3. Create guidelines for maintaining editorial independence while
     curating content from potential sponsors or partners

assertions:
  - type: llm_judge
    criteria: "Themed curation builds a coherent narrative — the 5 items create an argument arc rather than just sharing links on a similar topic"
    weight: 0.30
    description: "Coherent thematic narrative"
  - type: llm_judge
    criteria: "Source diversification goes beyond obvious publications — the source ecosystem mapping includes genuinely non-obvious sources that add unique value"
    weight: 0.25
    description: "Genuinely diverse sources"
  - type: llm_judge
    criteria: "The 3 levels of editorial commentary are clearly distinct — each adds progressively more curator value and the examples demonstrate real editorial thinking"
    weight: 0.25
    description: "Distinct editorial commentary levels"
  - type: llm_judge
    criteria: "Trend spotting methodology is practical — signal detection and pattern recognition are explained with specific enough examples to apply"
    weight: 0.20
    description: "Practical trend spotting"
