meta:
  id: serialized-content-strategy
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Design serialized newsletter content — multi-part series, ongoing narratives, and episodic formats that build anticipation"
  tags: [newsletter, serialized, series, narrative, retention, advanced]

state: {}

trigger: |
  Serialized content creates anticipation and builds reading habits.
  Multi-part series give subscribers a reason to open every issue
  and create a sense of progression that standalone issues can't match.

  Design serialized content strategies for 3 different newsletters:

  Newsletter 1: "Startup Chronicles" — original content newsletter
  Audience: Aspiring and early-stage founders
  Concept: A 12-part series following a fictional startup from
  idea to Series A, teaching real lessons through narrative

  Design the series:
  1. Write the series overview (what readers will learn)
  2. Outline all 12 installments with titles and key lessons:
     - Part 1: The idea (validation and market research)
     - Part 2: The co-founder search (team building)
     - Through to Part 12: Series A (fundraising)
  3. Write the complete first installment (400-500 words)
  4. Write the cliffhanger ending and teaser for Part 2
  5. Design the series landing page copy
  6. Create the mid-series recap format (for new subscribers)

  Newsletter 2: "Design Systems Weekly" — curated newsletter
  Concept: A 6-part deep-dive series on building a design system,
  alternating with regular curated issues

  Design the series integration:
  1. How to weave a series into a regular weekly newsletter
  2. Outline the 6 parts with clear progression
  3. Write the series introduction (announcing the upcoming series)
  4. Design the archive and catch-up mechanism
  5. Plan what happens after the series ends

  Newsletter 3: "Data Stories" — data journalism newsletter
  Concept: Ongoing investigative series that publishes findings
  as they emerge, over weeks or months

  Design the ongoing narrative:
  1. How to structure an open-ended investigative series
  2. Write the series launch email (setting expectations)
  3. Design the "previously on" recap format
  4. Plan how to handle the conclusion and wrap-up
  5. Create the series index/table of contents approach

  For each serialized strategy, also address:
  - How to handle new subscribers who join mid-series
  - How serialization affects open rates and retention
  - When to run a series vs. standalone content
  - How to measure series-specific engagement

assertions:
  - type: llm_judge
    criteria: "The 12-part startup series is well-structured — each installment teaches a real lesson through narrative, and the progression from idea to Series A is logical"
    weight: 0.25
    description: "Well-structured series"
  - type: llm_judge
    criteria: "The first installment is genuinely compelling — it hooks the reader into a narrative while teaching a real startup lesson"
    weight: 0.25
    description: "Compelling first installment"
  - type: llm_judge
    criteria: "Series integration with regular content is practical — the design for weaving serialized content into weekly newsletters is clear and sustainable"
    weight: 0.25
    description: "Practical series integration"
  - type: llm_judge
    criteria: "Mid-series subscriber handling is addressed — new subscribers joining mid-series have a clear path to catch up without overwhelming them"
    weight: 0.25
    description: "Mid-series subscriber handling"
