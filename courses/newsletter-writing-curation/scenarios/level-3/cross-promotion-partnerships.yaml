meta:
  id: cross-promotion-partnerships
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Design newsletter cross-promotion and partnership strategies — swaps, bundles, co-created content, and network effects"
  tags: [newsletter, cross-promotion, partnerships, growth, network, advanced]

state: {}

trigger: |
  Cross-promotion is one of the most effective newsletter growth
  strategies because it introduces your newsletter to an audience
  that already reads newsletters — the exact behavior you want.
  Strategic partnerships can accelerate growth beyond what organic
  content alone achieves.

  Design a cross-promotion strategy for:

  Newsletter: "Marketing Mind" — a weekly newsletter on marketing
  strategy for marketing directors and CMOs
  Subscribers: 6,000
  Open rate: 44%, CTR: 3.5%
  Niche: B2B marketing strategy (not tactics, not tools)

  Part 1: Partner identification
  1. Define ideal cross-promotion partner criteria:
     - Audience overlap sweet spot (complementary, not competitive)
     - Size parity (how much bigger/smaller is acceptable)
     - Quality signals to evaluate before partnering
     - Red flags to avoid
  2. Identify 10 types of complementary newsletters:
     - For each, explain why the audiences complement each other
     - Rate the partnership value (high, medium, low)
  3. Create the partner research template (how to evaluate a potential partner)

  Part 2: Cross-promotion formats
  Design 5 different cross-promotion formats:

  Format A: Newsletter swap (simplest)
  - Write the blurb you'd include about a partner newsletter
  - Write the blurb a partner would include about Marketing Mind
  - Guidelines for placement (header, mid-roll, footer)

  Format B: Co-created content
  - Design a joint issue concept (both newsletters publish)
  - Write the collaboration pitch to a partner
  - Outline the joint content piece

  Format C: Guest curation
  - Design a "guest curator" program (invite partners to curate one issue)
  - Write the guest curator introduction template
  - Define editorial guidelines for guest curators

  Format D: Referral partnership
  - Design a mutual referral reward system
  - Write the referral messaging for each partner
  - Define tracking and attribution methodology

  Format E: Bundle offering
  - Design a multi-newsletter bundle subscription
  - Write the bundle landing page copy
  - Define revenue sharing and logistics

  Part 3: Outreach and management
  1. Write the initial partnership outreach email (cold pitch)
  2. Write the follow-up after a successful swap (building relationship)
  3. Create the partnership tracking spreadsheet structure
  4. Design the performance review process (when to continue vs. end)

  Part 4: Results measurement
  1. Define how to measure cross-promotion ROI
  2. Calculate cost-per-subscriber for each format
  3. Measure subscriber quality from cross-promotion vs. other channels
  4. Build the partnership performance dashboard

assertions:
  - type: llm_judge
    criteria: "Partner identification criteria are strategic — the complementary vs. competitive distinction is clear and the 10 newsletter types are well-reasoned"
    weight: 0.25
    description: "Strategic partner identification"
  - type: llm_judge
    criteria: "Cross-promotion formats are varied and creative — each format serves a different purpose and the written examples are publication-ready"
    weight: 0.30
    description: "Varied creative formats"
  - type: llm_judge
    criteria: "Outreach emails are professional and compelling — a newsletter operator would actually want to partner after reading the pitch"
    weight: 0.25
    description: "Compelling outreach emails"
  - type: llm_judge
    criteria: "ROI measurement connects cross-promotion to subscriber quality and retention, not just raw subscriber count"
    weight: 0.20
    description: "Quality-focused ROI measurement"
