meta:
  id: community-building
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Build community around a newsletter — reader participation, user-generated content, events, and two-way engagement"
  tags: [newsletter, community, engagement, ugc, events, advanced]

state: {}

trigger: |
  The most successful newsletters aren't just broadcasts — they're
  communities. Reader participation transforms passive subscribers
  into active community members who contribute, share, and stick
  around longer. The newsletter becomes the center of a community
  ecosystem.

  Design a community strategy for:

  Newsletter: "Climate Action Weekly" — a newsletter on climate
  technology and sustainability for professionals
  Subscribers: 15,000
  Audience: Climate tech founders, sustainability officers, investors
  Current engagement: 42% open rate, 3.8% CTR, 15 replies/issue
  Goal: Transform from broadcast to community

  Part 1: Reader participation mechanisms
  Design 5 ways to get readers actively participating:

  1. Reader Q&A section:
     - How to solicit questions
     - Write the Q&A call-to-action template
     - Design the Q&A section format for the newsletter
     - Show a sample Q&A exchange

  2. Reader surveys and polls:
     - Weekly micro-poll design (1-question format)
     - Monthly deeper survey structure
     - How to share results (and make them interesting)
     - Write 5 sample poll questions for climate tech audience

  3. Reader-submitted content:
     - How to solicit reader stories, tips, and case studies
     - Write the submission guidelines
     - Design the reader spotlight section format
     - Quality control and editing process

  4. Challenges and prompts:
     - Design a "30-day sustainability challenge" run through the newsletter
     - Write the challenge announcement and weekly check-ins
     - Create the completion celebration format

  5. Reply-driven engagement:
     - How to write prompts that generate meaningful replies
     - Write 5 reply prompts on different climate topics
     - Design the system for featuring best replies in future issues

  Part 2: Community extension beyond email
  1. Private community platform (Slack, Discord, Circle — which and why)
  2. Virtual events (webinars, AMAs, roundtables)
  3. In-person meetups (scaling from local to multi-city)
  4. Community directory (member profiles and connections)
  5. Annual community report or survey

  Part 3: Community-powered content
  Write a complete newsletter issue that is 50% community-generated:
  - Reader spotlight (1 featured story)
  - Reader poll results from last week
  - Top 3 reader-submitted resources
  - Community job board (3 listings)
  - Reply of the week
  - Original editorial commentary connecting community contributions

  Part 4: Measurement
  Define community health metrics:
  - Reply rate, UGC submission rate, event attendance
  - How to measure community impact on retention and growth
  - Warning signs of community decline

assertions:
  - type: llm_judge
    criteria: "Participation mechanisms are varied and creative — each of the 5 approaches creates a different type of engagement that appeals to different subscriber personas"
    weight: 0.25
    description: "Varied creative participation"
  - type: llm_judge
    criteria: "The community-powered issue demonstrates how reader contributions create compelling content — not filler but genuinely interesting material"
    weight: 0.25
    description: "Compelling community content"
  - type: llm_judge
    criteria: "Community extension beyond email is practical — the platform, event, and meetup strategies account for the realities of building community as a newsletter operator"
    weight: 0.25
    description: "Practical community extension"
  - type: llm_judge
    criteria: "Community health metrics go beyond vanity numbers — they measure genuine engagement and its impact on newsletter business outcomes"
    weight: 0.25
    description: "Meaningful health metrics"
