meta:
  id: newsletter-rebranding
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Execute a newsletter rebrand — new name, repositioning, design refresh, and subscriber communication without losing audience"
  tags: [newsletter, rebrand, repositioning, design, transition, advanced]

state: {}

trigger: |
  Rebranding a newsletter is risky — change too much and you lose
  subscribers who liked the old version. Change too little and the
  rebrand feels pointless. The key is communicating the "why"
  transparently while making the transition feel exciting rather
  than alarming.

  Execute a newsletter rebrand for:

  Current newsletter: "Tech Bytes" — a daily tech news digest
  Problems: Name feels dated, audience has shifted from general
  tech enthusiasts to more senior tech professionals, content
  has evolved beyond news bites to include analysis
  Subscribers: 25,000 (built over 3 years)
  Open rate: 35% (declining from 42% a year ago)

  New positioning: Transitioning from "daily tech news bites" to
  "weekly strategic technology intelligence for tech leaders"

  Part 1: Brand strategy
  1. Propose 3 new newsletter names with pros and cons for each
  2. Define the new value proposition and positioning statement
  3. Map the old audience → new audience transition:
     - Who will love the new direction
     - Who might leave (and is that acceptable)
     - How to attract the new target audience
  4. Define the new content pillars (what the newsletter covers)

  Part 2: Communication plan
  Write the complete communication sequence:

  Email 1 (2 weeks before): "Something's changing" teaser
  - Build anticipation without alarming subscribers
  - Hint at improvements coming

  Email 2 (1 week before): Full rebrand announcement
  - Explain the why honestly
  - Show what's changing and what's staying
  - Address the frequency change (daily → weekly)
  - Give subscribers a choice (opt-in to new format or unsubscribe gracefully)

  Email 3 (launch day): The first issue of the rebranded newsletter
  - Design the first issue under the new brand
  - Include a brief "welcome to the new [name]" section
  - Deliver exceptional content to prove the change was worth it

  Email 4 (1 week after): Check-in
  - Ask for feedback on the new format
  - Share early positive responses
  - Remind about preference center

  Part 3: Design refresh
  1. Describe the new visual identity:
     - New header/masthead design direction
     - Updated typography and color scheme
     - New section structure and content hierarchy
  2. Compare old vs. new design elements
  3. Ensure design continuity (enough familiar elements to feel like an evolution)

  Part 4: Risk mitigation
  1. Predict and plan for:
     - Expected unsubscribe spike (how much, how long)
     - Subscriber complaint handling
     - Metric dips and recovery timeline
  2. Define rollback criteria (when would you reverse the rebrand?)
  3. Create the 90-day post-rebrand monitoring plan

assertions:
  - type: llm_judge
    criteria: "Communication sequence handles the rebrand transparently — subscribers understand why the change is happening and feel respected throughout the transition"
    weight: 0.30
    description: "Transparent respectful communication"
  - type: llm_judge
    criteria: "Brand strategy is sound — the new positioning addresses real problems with the old newsletter while targeting a viable new audience"
    weight: 0.25
    description: "Sound brand strategy"
  - type: llm_judge
    criteria: "Risk mitigation is realistic — expected unsubscribe rates, recovery timelines, and rollback criteria show mature planning"
    weight: 0.25
    description: "Realistic risk mitigation"
  - type: llm_judge
    criteria: "The first rebranded issue demonstrates the new value — it's noticeably better than a typical 'Tech Bytes' issue would have been"
    weight: 0.20
    description: "Value-demonstrating first issue"
