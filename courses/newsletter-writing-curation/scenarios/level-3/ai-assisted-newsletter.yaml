meta:
  id: ai-assisted-newsletter
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Use AI tools to accelerate newsletter creation — content discovery, drafting, editing, personalization, and workflow automation"
  tags: [newsletter, ai, automation, tools, workflow, advanced]

state: {}

trigger: |
  AI tools can reduce newsletter creation time by 40-60% and
  enable 2-3x more content output with the same effort. But
  using AI effectively requires understanding where it adds
  value and where human judgment remains essential.

  Design an AI-assisted newsletter workflow for:

  Newsletter: "Insight Brief" — a curated and original content
  newsletter covering business strategy
  Frequency: 3x per week (Mon/Wed/Fri)
  Author: 1 person with limited time (needs AI to sustain frequency)
  Current time per issue: 4 hours (unsustainable at 3x/week)
  Target time per issue: 1.5 hours with AI assistance

  Part 1: AI-assisted curation workflow
  1. Content discovery:
     - How to use AI to scan 100+ sources and surface relevant content
     - Prompt templates for content relevance scoring
     - Tools and setup (RSS + AI filtering pipeline)
  2. Content summarization:
     - Prompt templates for summarizing articles for newsletter inclusion
     - How to add human editorial voice on top of AI summaries
     - Quality control checklist (catching AI hallucinations)
  3. Trend detection:
     - Using AI to identify emerging themes across curated sources
     - Prompt templates for trend analysis

  Part 2: AI-assisted writing
  1. First draft generation:
     - Prompt templates for newsletter section drafts
     - How to provide context and constraints to get better output
     - The editing pass (what to always change in AI-generated drafts)
  2. Subject line generation:
     - Prompt template that generates 10 subject line options
     - How to evaluate and select from AI-generated options
  3. CTA writing:
     - Prompt templates for generating CTAs matched to content
  4. Editing and polish:
     - Using AI for grammar, clarity, and consistency checking
     - Prompt for adapting tone to match your established voice

  Part 3: AI-assisted personalization
  1. Dynamic content generation:
     - Using AI to create segment-specific content variations
     - Prompt templates for adapting content to different audience segments
  2. Send time optimization:
     - AI-powered send time prediction
  3. Subject line personalization:
     - AI-driven personalization beyond first-name insertion

  Part 4: Quality control and ethics
  1. The "human in the loop" framework:
     - What must always be human-reviewed
     - What can be fully automated
     - Where AI assists but human decides
  2. Disclosure policy:
     - When to tell subscribers about AI assistance
     - How transparency builds rather than erodes trust
  3. Voice preservation:
     - How to prevent AI from homogenizing your unique voice
     - Maintaining authenticity while using AI tools

  Part 5: Demonstrate the workflow
  Walk through creating one complete newsletter issue using the
  AI-assisted workflow:
  - Show the AI prompts used at each step
  - Show the AI output and human edits
  - Track time spent at each stage
  - Compare quality to a fully human-written issue

assertions:
  - type: llm_judge
    criteria: "AI workflow is practical and specific — prompt templates, tool recommendations, and step-by-step processes could be implemented immediately"
    weight: 0.25
    description: "Practical specific workflow"
  - type: llm_judge
    criteria: "Human-AI boundaries are clearly defined — the framework identifies where AI adds value and where human judgment is non-negotiable"
    weight: 0.25
    description: "Clear human-AI boundaries"
  - type: llm_judge
    criteria: "The walkthrough demonstration is convincing — it shows a realistic workflow that achieves the 4-hour to 1.5-hour time reduction target"
    weight: 0.25
    description: "Convincing time reduction"
  - type: llm_judge
    criteria: "Quality control and ethics are taken seriously — disclosure, voice preservation, and hallucination checking are built into the workflow"
    weight: 0.25
    description: "Serious quality and ethics"
