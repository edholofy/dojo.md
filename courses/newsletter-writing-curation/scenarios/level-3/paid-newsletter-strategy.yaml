meta:
  id: paid-newsletter-strategy
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Design and launch a paid newsletter tier — pricing, content differentiation, conversion funnels, and retention"
  tags: [newsletter, paid, subscription, pricing, conversion, advanced]

state: {}

trigger: |
  Launching a paid newsletter tier is one of the biggest decisions
  a newsletter creator makes. Paid subscriptions can account for
  16-67% of newsletter income, but getting the free-to-paid balance
  wrong can kill growth or undervalue your work.

  Design a complete paid newsletter launch for:

  Newsletter: "Deep Tech Digest" — a newsletter on deep technology
  (AI, biotech, quantum computing, space tech, energy storage)
  Current state: 20,000 free subscribers, 48% open rate, 4.5% CTR
  Author: Former tech VC with deep industry knowledge
  Revenue goal: $10,000/month within 6 months of launch
  Platform: Beehiiv (supports paid subscriptions)

  Part 1: Content architecture
  Design the free vs. paid content split:
  1. What stays free (and the strategic reason for each):
     - Weekly curated news roundup
     - Monthly industry overview
     - [Define additional free content]
  2. What goes behind the paywall:
     - Deep analysis reports (why these are worth paying for)
     - Deal flow and investment insights
     - [Define additional paid content]
  3. How to create "taste" content — free samples that demonstrate
     paid content value without giving it all away
  4. The content calendar showing free and paid content rhythm

  Part 2: Pricing strategy
  1. Analyze pricing options:
     - Monthly pricing (3 options with reasoning)
     - Annual pricing (discount strategy)
     - Founding member pricing (early adopter incentive)
  2. Competitive analysis: what similar newsletters charge
  3. Value-based pricing calculation (what is this insight worth
     to the target audience?)
  4. Price testing strategy

  Part 3: Conversion funnel
  1. Write the paid tier announcement email (to existing free subscribers)
  2. Write the sales page copy for the paid tier:
     - Headline and value proposition
     - What's included (feature list)
     - Social proof and testimonials approach
     - Pricing display
     - FAQ section (5 questions)
     - Money-back guarantee language
  3. Design the in-newsletter upgrade CTAs:
     - Soft CTA (subtle, ongoing)
     - Hard CTA (direct, promotional)
     - Teaser CTA (showing locked content preview)
  4. Write the post-purchase onboarding sequence (3 emails)

  Part 4: Retention strategy
  1. Design the paid subscriber retention program:
     - Month 1-3 engagement milestones
     - Exclusive community or access perks
     - Annual retention incentives
  2. Write the cancellation save flow:
     - Exit survey (what to ask)
     - Retention offer options
     - Graceful goodbye email
  3. Define churn metrics and warning signals
  4. Build the winback campaign for churned paid subscribers

  Part 5: Financial projections
  1. Project conversion rates (free to paid) at different price points
  2. Calculate break-even timeline
  3. Model monthly revenue for months 1-12
  4. Define the reinvestment strategy (when to hire, improve, expand)

assertions:
  - type: llm_judge
    criteria: "Free vs. paid split is strategically sound — free content drives growth while paid content is genuinely worth paying for, with clear value differentiation"
    weight: 0.25
    description: "Strategic free-paid split"
  - type: llm_judge
    criteria: "Sales page copy is persuasive — the value proposition, feature list, and FAQ would convince a qualified subscriber to pay"
    weight: 0.25
    description: "Persuasive sales page"
  - type: llm_judge
    criteria: "Retention strategy addresses churn proactively — cancellation save flows, engagement milestones, and winback campaigns are well-designed"
    weight: 0.25
    description: "Proactive retention strategy"
  - type: llm_judge
    criteria: "Financial projections are realistic — conversion rates, pricing, and revenue projections align with industry benchmarks for paid newsletters"
    weight: 0.25
    description: "Realistic financial projections"
