meta:
  id: long-form-newsletter-writing
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Write compelling long-form newsletter essays — structure, storytelling, argument building, and reader retention across 1,500+ words"
  tags: [newsletter, long-form, essay, writing, storytelling, advanced]

state: {}

trigger: |
  Long-form newsletter writing (1,500+ words) is a different
  skill from short curated newsletters. Readers who subscribe to
  essay-style newsletters expect depth, original thinking, and
  a compelling voice. The challenge is keeping readers engaged
  through a longer piece in their inbox.

  Part 1: Long-form structure techniques
  Explain 4 structural approaches for long-form newsletters:
  1. The argument essay (thesis → evidence → counter → conclusion)
  2. The narrative essay (story → lesson → application)
  3. The analysis essay (data → interpretation → implication)
  4. The exploration essay (question → journey → insight)

  For each, provide:
  - When to use this structure
  - How to outline it before writing
  - How to maintain momentum through 1,500+ words
  - An example opening paragraph demonstrating the approach

  Part 2: Write 2 complete long-form newsletter essays

  Essay A (1,500 words): The argument essay
  Newsletter: "Stratechery" style — business strategy analysis
  Topic: "Why most companies fail at AI adoption — and what the
  successful ones do differently"
  Requirements:
  - Strong opening hook that establishes the argument
  - 3-4 supporting sections with evidence and examples
  - A counterargument section (steelman the other side)
  - A conclusion that ties back to the opening
  - Section breaks and subheadings for scannability

  Essay B (1,200 words): The narrative essay
  Newsletter: Personal growth and career development
  Topic: "The worst career advice I ever received — and how
  ignoring it changed everything"
  Requirements:
  - Start with a personal story (the advice and its context)
  - Build tension (the consequences of following the advice)
  - The turning point (what changed)
  - Extract universal lessons from the personal experience
  - End with a takeaway readers can apply to their own careers

  Part 3: Readability techniques for long-form
  1. How to use white space, subheadings, and visual breaks
  2. Sentence variety (short sentences for impact, long for flow)
  3. The "thread of tension" — keeping readers scrolling
  4. When to use examples, data, and anecdotes
  5. How to write an ending that satisfies (not just stops)

assertions:
  - type: llm_judge
    criteria: "Both essays are genuinely compelling long-form writing — they demonstrate the skill being taught, not just describe it"
    weight: 0.30
    description: "Genuinely compelling essays"
  - type: llm_judge
    criteria: "The argument essay has a clear thesis, evidence, and counterargument — it would hold up as a real strategy analysis piece"
    weight: 0.25
    description: "Clear argument structure"
  - type: llm_judge
    criteria: "The narrative essay uses storytelling effectively — the personal story serves the lesson rather than being self-indulgent"
    weight: 0.25
    description: "Effective storytelling"
  - type: llm_judge
    criteria: "Readability techniques are practical — the guidance on maintaining reader engagement through 1,500+ words is actionable"
    weight: 0.20
    description: "Practical readability techniques"
