meta:
  id: industry-specific-newsletters
  level: 3
  course: newsletter-writing-curation
  type: output
  description: "Write newsletters for specific industries — finance, healthcare, legal, and creative — adapting voice, compliance, and content for each"
  tags: [newsletter, industry-specific, finance, healthcare, legal, advanced]

state: {}

trigger: |
  Industry-specific newsletters require adapting everything —
  voice, compliance requirements, content depth, and reader
  expectations. What works for a casual tech newsletter fails
  completely for a financial compliance newsletter.

  Write sample newsletter issues for 4 different industries,
  demonstrating how the approach changes for each:

  Industry 1: Financial services
  Newsletter: "Wealth Advisor Weekly" — for financial advisors
  Compliance: SEC/FINRA marketing rules, no performance guarantees,
  required disclaimers
  Topic: New retirement savings legislation and its implications
  Write:
  - Subject line and preheader
  - 400-word newsletter body with compliant language
  - Required disclaimer text
  - CTA (inviting readers to a compliant webinar)
  Note all compliance considerations that shaped the writing

  Industry 2: Healthcare
  Newsletter: "Clinical Update" — for healthcare professionals
  Compliance: HIPAA considerations, medical accuracy, evidence-based
  Topic: New treatment guidelines for Type 2 diabetes
  Write:
  - Subject line and preheader
  - 400-word newsletter body with appropriate medical terminology
  - References section (citing studies/guidelines)
  - CTA (link to full guidelines with CME credit)
  Note how medical writing differs from general newsletter writing

  Industry 3: Legal
  Newsletter: "Practice Points" — for corporate attorneys
  Compliance: Attorney advertising rules, no legal advice disclaimers
  Topic: New data privacy regulation and what it means for corporate compliance
  Write:
  - Subject line and preheader
  - 400-word newsletter body with appropriate legal analysis
  - Disclaimer ("this is not legal advice")
  - CTA (consultation offer within ethical bounds)
  Note the balance between valuable analysis and liability protection

  Industry 4: Creative / design
  Newsletter: "Studio Notes" — for graphic designers and illustrators
  Compliance: Minimal regulatory concerns
  Topic: The impact of AI image generation on the design profession
  Write:
  - Subject line and preheader
  - 400-word newsletter body with creative, visual-thinking voice
  - Community call-to-action (inviting discussion)
  Note how the creative industry voice differs dramatically from
  the other 3 industries

  For each industry newsletter, also provide:
  - Voice and tone guidelines specific to that industry
  - Common mistakes newsletter writers make in that industry
  - Key metrics that matter most for that audience

assertions:
  - type: llm_judge
    criteria: "Each industry newsletter authentically adapts to its audience — the financial newsletter sounds like finance, the healthcare newsletter sounds like healthcare"
    weight: 0.30
    description: "Authentic industry adaptation"
  - type: llm_judge
    criteria: "Compliance requirements are correctly addressed — SEC/FINRA, HIPAA, attorney advertising, and creative industry norms are accurately reflected"
    weight: 0.25
    description: "Correct compliance handling"
  - type: llm_judge
    criteria: "The same newsletter format produces 4 dramatically different results — demonstrating that industry context fundamentally shapes newsletter writing"
    weight: 0.25
    description: "Dramatically different results"
  - type: llm_judge
    criteria: "Industry-specific mistakes and metrics show genuine understanding of each sector's newsletter challenges"
    weight: 0.20
    description: "Genuine industry understanding"
