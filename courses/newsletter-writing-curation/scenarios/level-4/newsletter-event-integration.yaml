meta:
  id: newsletter-event-integration
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Integrate events into newsletter strategy — virtual summits, webinars, AMAs, IRL meetups, and conference-driven content"
  tags: [newsletter, events, webinars, summit, community, integration, expert]

state: {}

trigger: |
  Events and newsletters are a powerful combination. Events drive
  subscriber growth, deepen engagement, create content, and
  generate revenue. The best newsletter operators use events as
  a growth and monetization multiplier.

  Design an event integration strategy for:

  Newsletter: "Sales Intelligence" — a newsletter for B2B sales leaders
  Subscribers: 28,000
  Revenue: $18,000/month (sponsorships + paid tier)
  Audience: VP Sales, CROs, sales directors at mid-large companies
  Events experience: None (launching events for the first time)

  Part 1: Event portfolio design
  Design 4 event types for the newsletter:

  Event 1: Monthly virtual roundtable (recurring)
  - Format: 60-min moderated discussion, 15 participants max
  - Topic: Rotating monthly themes from newsletter content
  - Revenue model: Free for paid subscribers, $49 for free subscribers
  - Write the invitation email and registration page copy
  - Design the follow-up email sequence (post-event)

  Event 2: Quarterly webinar (recurring)
  - Format: 45-min presentation + 15-min Q&A, open attendance
  - Speaker: Industry expert or thought leader
  - Revenue model: Sponsored (1 presenting sponsor at $5,000)
  - Write the webinar promotion email sequence (3 emails)
  - Write the sponsor integration guidelines
  - Design the attendee-to-subscriber conversion flow

  Event 3: Annual virtual summit (flagship)
  - Format: 1-day event, 8-10 sessions, keynote + panels + workshops
  - Revenue model: Ticket ($99-$199) + sponsors (5-8 at $3K-$10K each)
  - Write the summit announcement email
  - Design the speaker recruitment outreach
  - Create the sponsor prospectus summary
  - Plan the content repurposing strategy (summit → newsletter content)

  Event 4: Semi-annual IRL dinner (exclusive)
  - Format: 20-person private dinner in major city
  - Revenue model: Invitation-only for top subscribers + 1 sponsor
  - Write the invitation email
  - Design the event format and discussion framework
  - Plan the content capture strategy (photos, quotes, insights)

  Part 2: Event-to-newsletter content pipeline
  1. How each event type generates newsletter content:
     - Roundtable insights → newsletter article
     - Webinar recording → blog post + social clips
     - Summit sessions → 4-6 weeks of newsletter content
     - Dinner conversations → exclusive insights column
  2. Write a sample newsletter section featuring event highlights
  3. Design the content repurposing calendar

  Part 3: Event-driven growth
  1. How events drive new subscriber acquisition
  2. The attendee-to-subscriber-to-paid conversion funnel
  3. Community building through events
  4. Event-based referral programs

  Part 4: Event operations
  1. Technology stack for each event type
  2. Budget and P&L projection for Year 1 events
  3. Success metrics for each event type
  4. The 12-month event calendar

assertions:
  - type: llm_judge
    criteria: "Event portfolio is diverse and strategically designed — each event type serves a different purpose (engagement, revenue, growth, exclusivity)"
    weight: 0.25
    description: "Diverse strategic event portfolio"
  - type: llm_judge
    criteria: "Event-to-content pipeline is well-designed — each event generates reusable content that enhances the newsletter for weeks"
    weight: 0.25
    description: "Well-designed content pipeline"
  - type: llm_judge
    criteria: "Event promotion emails are compelling — the webinar sequence and summit announcement would drive registrations"
    weight: 0.25
    description: "Compelling event promotion"
  - type: llm_judge
    criteria: "Budget and P&L projections are realistic for a first-time event operator with a newsletter-first business"
    weight: 0.25
    description: "Realistic event economics"
