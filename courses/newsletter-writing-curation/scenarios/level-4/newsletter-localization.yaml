meta:
  id: newsletter-localization
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Localize newsletters for international audiences — translation, cultural adaptation, local content, and multi-market coordination"
  tags: [newsletter, localization, international, cultural, multi-market, expert]

state: {}

trigger: |
  Newsletter localization goes far beyond translation. Different
  markets have different reading habits, content preferences,
  cultural sensitivities, and regulatory requirements. A newsletter
  that works in the US may fail in Japan, Germany, or Brazil
  without deep adaptation.

  Localize a newsletter for international expansion:

  Newsletter: "Startup Briefing" — daily startup ecosystem newsletter
  Current market: US (English), 100,000 subscribers
  Expansion markets: UK, Germany, Japan, Brazil, India
  Format: Daily curated news + 1 original analysis piece

  Part 1: Market analysis
  For each of the 5 expansion markets, analyze:
  1. Newsletter reading habits:
     - Preferred frequency (daily vs. weekly)
     - Preferred send time
     - Mobile vs. desktop reading patterns
     - Email client distribution (Gmail vs. Outlook vs. local clients)
  2. Content preferences:
     - Local startup ecosystem coverage expectations
     - Level of detail and formality expected
     - Attitude toward US-centric vs. local content
  3. Regulatory requirements:
     - Email marketing laws (GDPR, local equivalents)
     - Consent and opt-in requirements
     - Required legal elements in each market

  Part 2: Content localization
  Take this sample US newsletter issue excerpt and localize for
  all 5 markets:

  Original US version:
  "Today's lead story: Stripe just raised $6.5B at a $65B valuation,
  making it the most valuable US startup. Here's why this matters
  for fintech founders everywhere. [400-word analysis about the
  implications for payment processing, competition with PayPal,
  and what this signals about the late-stage funding environment.]"

  For each market:
  1. Rewrite the lead-in to be locally relevant
  2. Adapt the analysis angle (UK: FCA implications, Germany: EU
     competition law angle, Japan: cross-border payment context,
     Brazil: PIX and local fintech scene, India: UPI comparison)
  3. Adjust the voice and formality level
  4. Add local context that the US version wouldn't include
  5. Write a locally relevant subject line

  Part 3: Operational model
  1. Define 3 possible operating models:
     - Model A: Single team, translated content
     - Model B: Local editors who adapt centralized content
     - Model C: Fully independent local teams with shared brand
  2. Recommend the best model with detailed reasoning
  3. Design the editorial workflow for the recommended model
  4. Create the quality control process for localized editions
  5. Define the technology infrastructure requirements

  Part 4: Launch strategy
  Design the market entry sequence:
  1. Which market to launch first (and why)
  2. The launch timeline (staggered over 12 months)
  3. Local audience acquisition strategy for each market
  4. Success metrics and go/no-go criteria for each market

assertions:
  - type: llm_judge
    criteria: "Market analysis shows genuine understanding of reading habits and preferences in each market — not just stereotypes but specific, actionable differences"
    weight: 0.25
    description: "Genuine market understanding"
  - type: llm_judge
    criteria: "Content localization demonstrates deep adaptation — each market version leads with a locally relevant angle, not just translated text"
    weight: 0.30
    description: "Deep content adaptation"
  - type: llm_judge
    criteria: "Operating model recommendation is well-reasoned — the comparison of 3 models considers cost, quality, speed, and cultural authenticity"
    weight: 0.25
    description: "Well-reasoned operating model"
  - type: llm_judge
    criteria: "Launch strategy is sequential and risk-aware — the market entry order and success criteria show strategic thinking about international expansion"
    weight: 0.20
    description: "Strategic launch sequence"
