meta:
  id: advanced-sponsorship-strategy
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Master newsletter sponsorship sales — pricing models, media kits, sponsor relations, native advertising, and programmatic deals"
  tags: [newsletter, sponsorship, advertising, sales, native-ads, expert]

state: {}

trigger: |
  Newsletter sponsorships are a primary revenue stream, with
  CPM rates ranging from $5-$50+ depending on niche, audience
  quality, and engagement. Sponsorships offer 3-10x better CTR
  than display ads. But maximizing sponsorship revenue requires
  sophisticated sales, pricing, and relationship management.

  Design an advanced sponsorship program for:

  Newsletter: "The CFO Stack" — a newsletter for finance leaders
  Subscribers: 35,000 (85% are VP Finance or higher)
  Open rate: 48%, CTR: 5.2%
  Audience: High-value B2B (CFOs, VP Finance, Controllers)
  Current sponsorship revenue: $12,000/month (2 sponsors/month)
  Goal: $40,000/month through optimized sponsorship program

  Part 1: Sponsorship product design
  Design a tiered sponsorship product lineup:
  1. Premium Placement (1 per issue):
     - Position, word count, format, creative guidelines
     - Pricing model (CPM vs. flat rate vs. performance)
     - Minimum commitment and frequency caps
  2. Mid-Roll Feature (1-2 per issue):
     - Different from premium — explain the value proposition
     - Pricing relative to premium placement
  3. Classified / Job Board:
     - Format and pricing
     - Self-serve vs. managed
  4. Dedicated Send:
     - Full-issue sponsorship concept
     - Pricing and frequency limits
  5. Custom Integration:
     - Co-created content with sponsor
     - Pricing methodology for custom work
     - Editorial independence safeguards

  Part 2: Media kit creation
  Write the complete media kit including:
  1. Newsletter overview and audience value story
  2. Audience demographics and firmographics
  3. Engagement metrics with benchmarks
  4. Sponsorship options with pricing
  5. Case studies (write 2 hypothetical sponsor success stories)
  6. Testimonials format
  7. Booking process and calendar
  8. Terms and conditions summary

  Part 3: Sales process
  1. Sponsor prospecting strategy:
     - Ideal sponsor profile definition
     - Where to find sponsors (beyond cold outreach)
     - How to identify sponsors from reader behavior
  2. Write the outbound sales sequence:
     - Email 1: Introduction and value proposition
     - Email 2: Social proof and case study
     - Email 3: Special offer for first-time sponsors
  3. Design the sponsor onboarding process:
     - Creative brief and guidelines
     - Ad copy review and approval workflow
     - Tracking and reporting setup
  4. Build the sponsor retention program:
     - Post-campaign performance report template
     - Re-booking incentives
     - Annual partnership deals

  Part 4: Native advertising excellence
  Write 3 examples of excellent native sponsor integrations:
  1. A fintech tool (seamlessly woven into editorial content)
  2. A consulting firm (thought leadership style integration)
  3. An event sponsorship (conference promotion in context)

  For each, show the "bad" version (obvious ad) and the "good"
  version (native, valuable, still clearly marked as sponsored).

  Part 5: Pricing optimization
  1. A/B test strategy for sponsorship pricing
  2. Seasonal pricing adjustments (Q4 premium, summer discounts)
  3. Volume discount structure for multi-month commitments
  4. Performance-based pricing models (CPC, CPA options)

assertions:
  - type: llm_judge
    criteria: "Sponsorship products are well-differentiated — each tier serves a different advertiser need and the pricing reflects genuine value differences"
    weight: 0.25
    description: "Well-differentiated products"
  - type: llm_judge
    criteria: "The media kit is professional and data-driven — it would convince a B2B marketer that 'The CFO Stack' audience is worth premium CPMs"
    weight: 0.25
    description: "Professional data-driven media kit"
  - type: llm_judge
    criteria: "Native advertising examples demonstrate the difference between intrusive ads and valuable integrations — the 'good' versions add genuine reader value"
    weight: 0.25
    description: "Valuable native integrations"
  - type: llm_judge
    criteria: "The path from $12K to $40K/month is credible — the optimization levers would actually close the revenue gap"
    weight: 0.25
    description: "Credible revenue growth path"
