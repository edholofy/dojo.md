meta:
  id: newsletter-crisis-management
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Handle newsletter crises — accidental sends, data breaches, controversial content, platform failures, and audience backlash"
  tags: [newsletter, crisis, damage-control, reputation, recovery, expert]

state: {}

trigger: |
  Newsletter crises happen to every operator eventually — an email
  goes out with the wrong content, subscriber data is compromised,
  a piece of content generates backlash, or the platform goes down
  on send day. How you respond defines your newsletter's reputation.

  Handle 5 newsletter crisis scenarios:

  Crisis 1: The accidental send
  Situation: Your 50,000-subscriber newsletter accidentally sends
  a draft version with placeholder text ("[INSERT HEADLINE HERE]"),
  broken links, and a test subject line that reads "TEST - ignore"
  Timing: It went out at 7am, you discovered it at 7:15am
  Tasks:
  1. Write the correction email (subject line + body)
  2. Define the immediate action checklist
  3. Decide: send corrected version immediately or wait?
  4. Write the social media acknowledgment (Twitter/X)
  5. Create the post-mortem to prevent recurrence

  Crisis 2: Subscriber data leak
  Situation: Your newsletter platform had a vulnerability that
  exposed subscriber email addresses and reading habits. 2,000
  subscribers affected. You're not a public company.
  Tasks:
  1. Write the subscriber notification email (within 24 hours)
  2. Write the public statement for your website
  3. Design the remediation plan
  4. Write the follow-up email (1 week later with updates)
  5. Address GDPR notification requirements

  Crisis 3: Controversial content backlash
  Situation: Your weekly marketing newsletter (30,000 subs) published
  an opinion piece that inadvertently used an analogy many readers
  found offensive. You're receiving angry replies and social media
  criticism. The analogy was tone-deaf but not intentionally harmful.
  Tasks:
  1. Decide: apologize in next issue, send a special email, or both?
  2. Write the apology/acknowledgment
  3. Design the social media response strategy
  4. Write the internal team brief (how to respond to individual complaints)
  5. Create guidelines to prevent similar issues

  Crisis 4: Platform outage on send day
  Situation: Your email platform is down on the day your daily
  newsletter is supposed to go out. Your 80,000 subscribers expect
  it at 7am. It's now 9am with no ETA for platform recovery.
  Tasks:
  1. Design the contingency plan:
     - Alternative delivery methods
     - Subscriber communication strategy
     - Content preservation approach
  2. Write the "we're delayed" communication for social media
  3. Write the "we're back" email when the newsletter finally sends
  4. Create the platform redundancy plan to prevent future incidents

  Crisis 5: Sponsorship credibility crisis
  Situation: A product you featured as a paid sponsor turns out to
  be fraudulent. Several subscribers invested money based on your
  newsletter recommendation. They're demanding accountability.
  Tasks:
  1. Write the immediate disclosure to subscribers
  2. Design the sponsor vetting process (to prevent recurrence)
  3. Write the policy on newsletter recommendations and disclaimers
  4. Address potential legal liability considerations
  5. Create the trust recovery plan

assertions:
  - type: llm_judge
    criteria: "Crisis responses are appropriately calibrated — the accidental send is handled with humor, the data leak with seriousness, the content backlash with genuine accountability"
    weight: 0.25
    description: "Appropriately calibrated responses"
  - type: llm_judge
    criteria: "Communications are well-written — apology emails, notifications, and corrections strike the right tone for each situation"
    weight: 0.25
    description: "Well-written crisis communications"
  - type: llm_judge
    criteria: "Prevention and process improvements follow each crisis — post-mortems and new procedures show learning from each incident"
    weight: 0.25
    description: "Prevention-focused learning"
  - type: llm_judge
    criteria: "The sponsorship credibility crisis addresses the hardest question — accountability for third-party products recommended to subscribers"
    weight: 0.25
    description: "Sponsorship accountability addressed"
