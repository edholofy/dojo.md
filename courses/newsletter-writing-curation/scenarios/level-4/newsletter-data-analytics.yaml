meta:
  id: newsletter-data-analytics
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Build advanced newsletter analytics — cohort analysis, predictive modeling, attribution, and data-driven content optimization"
  tags: [newsletter, analytics, data, cohort, predictive, attribution, expert]

state: {}

trigger: |
  Advanced newsletter analytics goes beyond open rates and CTR.
  Cohort analysis reveals retention patterns, predictive modeling
  forecasts churn, attribution connects newsletters to revenue,
  and data-driven optimization improves every aspect of performance.

  Build an advanced analytics system for:

  Newsletter: "Growth Insider" — a newsletter on growth marketing
  Subscribers: 45,000
  Revenue: $25,000/month (sponsorships + paid tier)
  Data available: 2 years of email performance data, website
  analytics, subscriber demographics, payment data
  Analytics capability: Intermediate (uses platform analytics,
  no custom data warehouse)

  Part 1: Cohort analysis
  1. Design cohort analysis for subscriber retention:
     - Monthly acquisition cohorts (track engagement over time)
     - How to identify the "aha moment" (when subscribers become engaged)
     - Calculate cohort retention curves
     - Compare acquisition channels by cohort quality
  2. Demonstrate with sample data:
     - Create a cohort retention table (12 months × 6 cohorts)
     - Identify patterns (which cohorts retain best and why)
     - Recommend actions based on cohort insights

  Part 2: Predictive analytics
  1. Churn prediction model:
     - Identify leading indicators of subscriber churn
     - Define risk scoring criteria (behavioral signals)
     - Design the intervention triggers (when to act)
     - Write the intervention emails for different risk levels
  2. Content performance prediction:
     - What attributes predict high-performing issues?
     - How to build a content scoring model
     - Using historical data to optimize future content planning

  Part 3: Attribution and ROI
  1. Design the newsletter revenue attribution model:
     - First-touch vs. multi-touch attribution
     - How to track newsletter → website → conversion paths
     - Sponsor ROI measurement (helping sponsors measure their results)
  2. Calculate newsletter ROI:
     - Total cost of newsletter operations
     - Direct revenue (sponsorships, paid subscribers)
     - Indirect revenue (leads generated, brand awareness)
     - Cost per engaged subscriber
  3. Create the quarterly business review report
     showing analytics-driven recommendations

  Part 4: Data-driven content optimization
  1. Content performance analysis framework:
     - Which topics generate highest engagement?
     - Optimal content length analysis
     - Best content formats (curated vs. original vs. hybrid)
     - Day-of-week and time-of-day analysis
  2. Write the analytics-informed editorial calendar:
     - How data shapes content planning
     - Balancing data-driven decisions with editorial instinct
     - When to override the data (and when to trust it)
  3. Design the content experimentation framework:
     - Hypothesis → test → measure → learn → iterate
     - Sample experiment: "Does adding a personal anecdote
       to the opening increase CTOR?"

  Part 5: Dashboard design
  Design 3 analytics dashboards:
  1. Daily operations dashboard (5 metrics, checked daily)
  2. Weekly performance dashboard (15 metrics, team review)
  3. Monthly executive dashboard (8 metrics, business review)

  For each, specify the exact metrics, visualization types,
  and what actions each metric should trigger.

assertions:
  - type: llm_judge
    criteria: "Cohort analysis is properly designed — retention curves, cohort comparison, and acquisition channel quality analysis would produce actionable insights"
    weight: 0.25
    description: "Properly designed cohort analysis"
  - type: llm_judge
    criteria: "Predictive models are grounded in realistic behavioral signals — churn indicators and content scoring use data that's actually available to newsletter operators"
    weight: 0.25
    description: "Realistically grounded predictions"
  - type: llm_judge
    criteria: "Dashboard designs have clear hierarchies — daily, weekly, and monthly views contain appropriate metrics at the right level of detail"
    weight: 0.25
    description: "Clear dashboard hierarchies"
  - type: llm_judge
    criteria: "Data-driven content optimization balances analytics with editorial judgment — showing when to trust data and when instinct should override"
    weight: 0.25
    description: "Balanced data-editorial approach"
