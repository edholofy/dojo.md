meta:
  id: newsletter-acquisition
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Evaluate, acquire, and integrate an existing newsletter — valuation, due diligence, transition planning, and subscriber retention"
  tags: [newsletter, acquisition, valuation, due-diligence, integration, expert]

state: {}

trigger: |
  Newsletter acquisitions have become a viable growth strategy.
  Buying an existing newsletter with an established audience can
  be faster and more cost-effective than building from scratch.
  But poor due diligence or botched transitions can destroy the
  value you're acquiring.

  Execute a newsletter acquisition for:

  Acquirer: "MediaStack" — a newsletter media company with 3 existing
  newsletters and 120,000 total subscribers
  Target: "DevTools Weekly" — a solo-creator newsletter covering
  developer tools and productivity
  Stats: 18,000 subscribers, 52% open rate, weekly frequency
  Revenue: $4,500/month (sponsorships), creator wants to sell
  Age: 3 years, consistently published
  Asking price: $250,000

  Part 1: Valuation analysis
  1. Apply 3 valuation methodologies:
     - Revenue multiple (typical newsletter multiples)
     - Subscriber value ($X per subscriber)
     - Discounted cash flow (projected future earnings)
  2. Calculate a fair price range for DevTools Weekly
  3. Identify value drivers (what makes this newsletter worth more)
  4. Identify value risks (what could reduce its worth)
  5. Make a recommendation: buy, negotiate, or walk away

  Part 2: Due diligence checklist
  Design a comprehensive due diligence process:
  1. Audience quality verification:
     - Subscriber growth history (organic vs. paid vs. giveaway)
     - Engagement trends over 12 months
     - List hygiene (bounce rates, inactive subscribers)
     - Geographic and demographic analysis
  2. Revenue verification:
     - Sponsor contracts and renewal rates
     - Revenue consistency over 12 months
     - Sponsor satisfaction and pipeline
  3. Content and brand assessment:
     - Content quality consistency
     - Creator dependency (how tied is the brand to the person?)
     - Competitive positioning
  4. Technical and legal:
     - Email list ownership and consent verification
     - Platform and tool contracts
     - Intellectual property considerations
     - Privacy compliance (GDPR consent history)

  Part 3: Transition plan
  Design the 90-day post-acquisition transition:
  1. Week 1-2: Announcement and handoff
     - Write the acquisition announcement (from both seller and buyer)
     - Write the subscriber communication (why this is good for them)
     - Design the creator handoff process
  2. Week 3-6: Gradual transition
     - Content style evolution (maintaining voice while integrating)
     - New team introduction
     - Cross-promotion with existing MediaStack newsletters
  3. Week 7-12: Full integration
     - Platform migration (if needed)
     - Sponsorship sales integration
     - Performance benchmarking against pre-acquisition metrics

  Part 4: Subscriber retention strategy
  1. Predict expected subscriber loss during transition (%)
  2. Design the retention campaign:
     - What to do if open rates drop
     - Re-engagement strategy for at-risk subscribers
     - Content quality commitment
  3. Define success metrics for the acquisition:
     - 30-day subscriber retention target
     - 90-day revenue target
     - 6-month audience growth target

assertions:
  - type: llm_judge
    criteria: "Valuation analysis applies multiple methodologies rigorously and arrives at a well-reasoned price recommendation with clear rationale"
    weight: 0.25
    description: "Rigorous valuation analysis"
  - type: llm_judge
    criteria: "Due diligence is comprehensive — the checklist would catch real problems like inflated subscriber counts, unsustainable revenue, or legal risks"
    weight: 0.25
    description: "Comprehensive due diligence"
  - type: llm_judge
    criteria: "Transition plan manages the creator dependency risk — the handoff process prevents losing subscribers who were loyal to the original creator"
    weight: 0.25
    description: "Creator dependency management"
  - type: llm_judge
    criteria: "Subscriber communications are well-written — the announcement and transition emails would reassure rather than alarm existing subscribers"
    weight: 0.25
    description: "Reassuring subscriber communications"
