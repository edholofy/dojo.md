meta:
  id: multi-newsletter-portfolio
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Manage a portfolio of multiple newsletters — editorial strategy, audience overlap, cross-promotion, and unified operations"
  tags: [newsletter, portfolio, multi-newsletter, editorial, operations, expert]

state: {}

trigger: |
  Media companies and prolific creators often operate multiple
  newsletters targeting different audiences. Managing a portfolio
  requires unified operations, strategic audience management,
  and avoiding cannibalization while maximizing cross-pollination.

  Design a multi-newsletter portfolio strategy for:

  Company: "Insight Media" — a digital media company
  Current newsletters:
  1. "Morning Markets" — daily financial markets briefing (80,000 subs)
  2. "Tech Radar" — weekly technology news digest (45,000 subs)
  3. "Founder Daily" — daily startup and entrepreneurship (30,000 subs)
  4. "Climate Brief" — bi-weekly climate and energy (15,000 subs)
  5. "Health Digest" — weekly health and wellness (20,000 subs)
  Team: 12 people (3 editors, 5 writers, 2 sales, 1 ops, 1 growth)
  Revenue: $180K/month across all newsletters (mostly sponsorships)

  Part 1: Portfolio strategy
  1. Analyze audience overlap across the 5 newsletters:
     - Which audiences are most complementary?
     - Where is there cannibalization risk?
     - Which newsletter is the "gateway" that feeds others?
  2. Define the portfolio positioning map:
     - How each newsletter serves a different need
     - The unified Insight Media brand story
     - Content pillars unique to each newsletter
  3. Identify gaps in the portfolio:
     - What audience segments are underserved?
     - Propose 1-2 new newsletters to fill gaps
     - Kill/merge recommendation for underperforming newsletters

  Part 2: Cross-promotion system
  1. Design the inter-newsletter promotion strategy:
     - When Morning Markets promotes Tech Radar (and vice versa)
     - Cross-promotion placement and frequency rules
     - How to avoid "newsletter fatigue" from too much cross-promotion
  2. Create the unified signup flow:
     - Multi-newsletter preference center design
     - Bundle subscription options
     - Recommendation engine logic ("subscribers to X also read Y")
  3. Write cross-promotion copy for each newsletter pair

  Part 3: Unified operations
  1. Design the editorial workflow:
     - Shared editorial calendar across all 5 newsletters
     - Content deconfliction process (same story in multiple newsletters)
     - Shared resource pool (images, data, research)
  2. Create the unified sales strategy:
     - Cross-newsletter sponsorship packages
     - Audience bundling for advertisers
     - Pricing strategy for multi-newsletter buys
  3. Build the shared technology infrastructure:
     - Subscriber data management (unified vs. separate lists)
     - Analytics dashboard (portfolio-level view)
     - Content management system requirements

  Part 4: Performance management
  1. Define portfolio-level KPIs vs. individual newsletter KPIs
  2. Create the monthly portfolio review framework
  3. Design the resource allocation model (how to invest in growth
     across newsletters with different economics)
  4. Build the newsletter lifecycle management plan (launch, grow,
     mature, sunset criteria)

assertions:
  - type: llm_judge
    criteria: "Portfolio strategy demonstrates systems thinking — audience overlap analysis, positioning map, and gap identification treat the newsletters as an interconnected system"
    weight: 0.25
    description: "Systems thinking in portfolio"
  - type: llm_judge
    criteria: "Cross-promotion system balances growth with subscriber experience — promotion rules prevent newsletter fatigue while maximizing cross-pollination"
    weight: 0.25
    description: "Balanced cross-promotion"
  - type: llm_judge
    criteria: "Unified operations are practical for a 12-person team — workflows, shared resources, and infrastructure would actually work at this scale"
    weight: 0.25
    description: "Practical unified operations"
  - type: llm_judge
    criteria: "Performance management includes portfolio-level decisions — resource allocation, lifecycle management, and kill/merge recommendations show business maturity"
    weight: 0.25
    description: "Mature performance management"
