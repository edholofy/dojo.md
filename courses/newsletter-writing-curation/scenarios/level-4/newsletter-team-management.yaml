meta:
  id: newsletter-team-management
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Build and manage a newsletter team — hiring writers, editorial processes, quality control, and scaling content production"
  tags: [newsletter, team, hiring, editorial, management, scaling, expert]

state: {}

trigger: |
  Scaling a newsletter beyond solo creation requires building a
  team — hiring writers who can match your voice, creating editorial
  processes that maintain quality, and designing workflows that
  allow multiple contributors without losing consistency.

  Build a newsletter team for:

  Newsletter: "The Commerce Report" — a daily e-commerce newsletter
  Current state: Solo founder writes everything (unsustainable)
  Subscribers: 60,000
  Revenue: $35,000/month
  Budget for team: $15,000/month initially
  Content: Daily curated news + weekly deep-dive analysis

  Part 1: Team design
  1. Define the roles needed (phased hiring plan):
     Phase 1 (months 1-3): First hires
     - Role descriptions, responsibilities, compensation ranges
     Phase 2 (months 4-8): Scaling hires
     - Additional roles as revenue grows
     Phase 3 (months 9-12): Full team
     - Complete team structure
  2. Create the org chart with reporting lines
  3. Define the founder's evolving role (from writer to editor-in-chief)
  4. Decide: full-time vs. freelance vs. contractor for each role

  Part 2: Writer hiring
  1. Write the job description for a newsletter writer:
     - Required skills and experience
     - Voice and style requirements
     - Portfolio and writing sample expectations
  2. Design the hiring process:
     - Writing test prompt (what to give candidates)
     - Evaluation criteria and rubric
     - Trial period structure
  3. Create the writer onboarding program:
     - Week 1: Voice and style immersion
     - Week 2: Supervised writing with feedback
     - Week 3: First published piece with editor review
     - Week 4: Independent writing with editorial oversight
  4. Write the style guide excerpt for new writers:
     - Voice and tone guidelines
     - Formatting standards
     - Do's and don'ts with examples

  Part 3: Editorial workflow
  1. Design the daily production workflow:
     - Content planning and assignment (when?)
     - First draft deadline
     - Editorial review process
     - Final approval and scheduling
     - Send and post-send monitoring
  2. Create the editorial calendar template (2 weeks ahead)
  3. Design the quality review checklist (pre-send)
  4. Build the feedback system (how editors give notes to writers)
  5. Define the escalation process (when the founder needs to step in)

  Part 4: Quality at scale
  1. Define newsletter quality standards:
     - Writing quality metrics (readability, accuracy, voice consistency)
     - Factual accuracy verification process
     - Source attribution standards
  2. Create the writer performance review framework:
     - Quantitative metrics (engagement on their pieces)
     - Qualitative assessment (voice, creativity, reliability)
     - Review cadence and format
  3. Design the continuous improvement process:
     - Weekly team content review
     - Monthly "best of" analysis
     - Quarterly voice and strategy refresh

assertions:
  - type: llm_judge
    criteria: "Team design is financially realistic — the phased hiring plan works within the $15K/month budget and scales with revenue growth"
    weight: 0.25
    description: "Financially realistic team design"
  - type: llm_judge
    criteria: "Writer hiring process is thorough — the writing test, evaluation rubric, and trial period would identify writers who can match an established voice"
    weight: 0.25
    description: "Thorough writer hiring process"
  - type: llm_judge
    criteria: "Editorial workflow supports daily publishing — the production timeline and quality gates are fast enough for daily content without sacrificing quality"
    weight: 0.25
    description: "Daily-capable editorial workflow"
  - type: llm_judge
    criteria: "Style guide excerpt demonstrates how to codify voice — the guidelines would help a new writer produce content that sounds consistent with the existing newsletter"
    weight: 0.25
    description: "Effective voice codification"
