meta:
  id: newsletter-business-model
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Design a complete newsletter business model — revenue diversification, unit economics, hiring, and scaling to profitability"
  tags: [newsletter, business-model, revenue, scaling, economics, expert]

state: {}

trigger: |
  A newsletter business is more than great writing — it requires
  sound unit economics, diversified revenue, operational efficiency,
  and a growth model that scales. The best newsletter businesses
  generate $1-5+ revenue per subscriber per year.

  Design a complete newsletter business model for:

  Newsletter: "The Protocol" — a daily technology and crypto newsletter
  Current state: 50,000 free subscribers, 45% open rate
  Revenue: $8,000/month (sponsorships only)
  Team: 1 founder + 1 part-time writer
  Goal: $50,000/month revenue within 18 months

  Part 1: Unit economics analysis
  1. Calculate current revenue per subscriber
  2. Define target revenue per subscriber
  3. Model subscriber lifetime value (LTV):
     - Average subscription length
     - Revenue per subscriber per month (across all streams)
     - Subscriber acquisition cost (CAC) by channel
  4. Calculate the LTV:CAC ratio for each acquisition channel
  5. Determine the break-even point for paid acquisition

  Part 2: Revenue diversification
  Design 5 revenue streams with projections:
  1. Sponsorships (current):
     - Current pricing and optimization opportunities
     - Sponsor tier structure (headline, mid-roll, classified)
     - Target CPM at 50K, 100K, 200K subscribers
  2. Paid premium tier:
     - Content differentiation strategy
     - Pricing and projected conversion rates
     - Revenue projection (months 1-18)
  3. Events and webinars:
     - Sponsored virtual events model
     - Ticket pricing for premium events
     - Revenue projection
  4. Courses and digital products:
     - Product concepts for the audience
     - Pricing and launch strategy
     - Revenue projection
  5. Affiliate and referral:
     - Partner identification
     - Commission structures
     - Revenue projection

  Part 3: Operational scaling
  1. Hiring plan (months 1-18):
     - When to hire each role and why
     - Role 1: Full-time writer (when and what they do)
     - Role 2: Sales/partnerships (when and what they do)
     - Role 3: Operations (when and what they do)
  2. Technology stack evolution:
     - Current tools and costs
     - Tools needed at 100K subscribers
     - Tools needed at 200K subscribers
  3. Content production process:
     - How daily publishing scales with a team
     - Editorial calendar and workflow design
     - Quality control as output increases

  Part 4: Growth model
  1. Organic growth projections (current trajectory)
  2. Paid growth budget and channels
  3. Partnership and cross-promotion growth
  4. Subscriber growth targets (monthly for 18 months)
  5. The growth ceiling — when does growth slow and what to do about it

  Part 5: Financial projections
  Create a 18-month P&L projection showing:
  - Revenue by stream (monthly)
  - Costs (team, tools, content, paid acquisition)
  - Net profit/loss by month
  - Break-even month
  - Cash flow considerations

assertions:
  - type: llm_judge
    criteria: "Unit economics are rigorous — LTV, CAC, revenue per subscriber, and break-even calculations are mathematically sound and clearly explained"
    weight: 0.25
    description: "Rigorous unit economics"
  - type: llm_judge
    criteria: "Revenue diversification is realistic — each stream has plausible revenue projections grounded in industry benchmarks"
    weight: 0.25
    description: "Realistic revenue diversification"
  - type: llm_judge
    criteria: "Operational scaling plan is practical — hiring timeline, role definitions, and process design would work for a small team growing a daily newsletter"
    weight: 0.25
    description: "Practical operational scaling"
  - type: llm_judge
    criteria: "Financial projections tell a coherent story — the P&L shows a believable path from $8K/month to $50K/month with realistic assumptions"
    weight: 0.25
    description: "Coherent financial projections"
