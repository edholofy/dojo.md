meta:
  id: enterprise-newsletter-program
  level: 4
  course: newsletter-writing-curation
  type: output
  description: "Design an enterprise newsletter program — internal communications, thought leadership, customer nurture, and multi-department coordination"
  tags: [newsletter, enterprise, internal-comms, thought-leadership, multi-department, expert]

state: {}

trigger: |
  Enterprise organizations operate multiple newsletter programs
  across departments — marketing sends customer newsletters,
  HR sends internal communications, sales sends prospect nurture
  sequences, and executives publish thought leadership. Without
  coordination, subscribers receive conflicting messages and
  brand consistency suffers.

  Design a unified enterprise newsletter program for:

  Company: "Axiom Systems" — enterprise software company
  Profile: $500M revenue, 3,000 employees, B2B SaaS
  Current newsletters (uncoordinated):
  1. Marketing: Monthly product newsletter to customers (40,000)
  2. Marketing: Weekly thought leadership digest (12,000 prospects)
  3. Sales: Bi-weekly prospect nurture (8,000)
  4. Customer Success: Monthly tips & tricks (25,000 customers)
  5. HR: Weekly internal company newsletter (3,000 employees)
  6. CEO: Quarterly industry insights (5,000 executives)
  Problem: No coordination — customers sometimes receive 3 emails
  in one day from different departments

  Part 1: Unified newsletter governance
  1. Map all current newsletters with audience, frequency, and owner
  2. Identify overlaps and conflicts:
     - Audience overlap between marketing and customer success
     - Frequency overload for customers on multiple lists
     - Brand voice inconsistency across departments
  3. Design the governance structure:
     - Newsletter program owner (role and responsibilities)
     - Editorial board (cross-department, quarterly meetings)
     - Approval workflow by newsletter type
     - Send calendar coordination (no more than 2 emails/week per contact)

  Part 2: Preference management
  1. Design the unified preference center:
     - How contacts choose which newsletters they receive
     - Frequency preferences (daily, weekly, monthly, digest)
     - Topic preferences (product, industry, thought leadership)
     - Channel preferences (email, blog, social)
  2. Write the preference center copy and UX flow
  3. Design the contact suppression rules:
     - Global suppression (unsubscribe from all)
     - Category suppression (unsubscribe from marketing only)
     - Frequency capping (max emails per time period)
  4. Create the cross-departmental data sharing protocol

  Part 3: Content strategy alignment
  1. Define the content pillar framework across all newsletters:
     - What each newsletter covers (and doesn't cover)
     - How the same topic is handled differently by different newsletters
     - Content deconfliction process
  2. Write sample issues showing brand consistency:
     - Marketing newsletter excerpt about a new feature
     - Customer success newsletter excerpt about the same feature
     - Show how both maintain brand voice while serving different needs
  3. Design the shared content asset library
  4. Create the editorial calendar template (all 6 newsletters visible)

  Part 4: Performance measurement
  1. Design the program-level dashboard:
     - Portfolio engagement metrics
     - Per-contact communication frequency
     - Cross-newsletter journey tracking
     - Revenue attribution by newsletter
  2. Create the quarterly program review template
  3. Define optimization priorities for the next 12 months

assertions:
  - type: llm_judge
    criteria: "Governance structure is practical for a multi-department organization — it creates coordination without creating bureaucracy"
    weight: 0.25
    description: "Practical multi-department governance"
  - type: llm_judge
    criteria: "Preference management respects subscriber experience — frequency capping, category suppression, and unified preferences prevent email overload"
    weight: 0.25
    description: "Subscriber-respecting preferences"
  - type: llm_judge
    criteria: "Content alignment shows how the same topic is handled differently by marketing vs customer success — maintaining brand voice while serving different needs"
    weight: 0.25
    description: "Aligned yet differentiated content"
  - type: llm_judge
    criteria: "The unified editorial calendar and coordination processes would actually prevent the '3 emails in one day' problem"
    weight: 0.25
    description: "Effective coordination solution"
