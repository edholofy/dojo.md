meta:
  id: newsletter-structure
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Learn the fundamental structure of an effective newsletter — header, body sections, CTAs, and footer"
  tags: [newsletter, structure, fundamentals, layout, beginner]

state: {}

trigger: |
  A well-structured newsletter guides readers from subject line
  to action. Understanding the anatomy of a newsletter is the
  foundation for everything else.

  Explain the fundamental structure of an effective newsletter
  and demonstrate it with a real example.

  Cover these structural elements:
  1. Pre-header text (the preview text readers see before opening)
  2. Header/masthead (brand identity, issue number, date)
  3. Table of contents or section preview (for longer newsletters)
  4. Lead story or featured content (the hook that justifies opening)
  5. Body sections (2-4 content blocks with clear hierarchy)
  6. Calls to action (primary and secondary CTAs)
  7. Footer (unsubscribe link, social links, legal requirements)

  For each element explain:
  - Its purpose and why it matters
  - Best practices (length, formatting, placement)
  - Common mistakes to avoid

  Then write a complete sample newsletter for:
  Newsletter: "The Weekly Brief" — a curated marketing news digest
  Audience: Marketing managers at mid-size companies
  Frequency: Weekly (Tuesday morning)
  Issue: #47 — covering 3 marketing stories from this week

  The sample should demonstrate all 7 structural elements
  with clear annotations showing where each element appears.

assertions:
  - type: llm_judge
    criteria: "All 7 structural elements are explained clearly with their purpose, best practices, and common mistakes"
    weight: 0.25
    description: "Complete structural element coverage"
  - type: llm_judge
    criteria: "The sample newsletter demonstrates all 7 elements in a realistic, publication-ready format"
    weight: 0.30
    description: "Realistic sample demonstration"
  - type: llm_judge
    criteria: "Best practices include specific details — character counts, formatting rules, placement guidance — not just generic advice"
    weight: 0.25
    description: "Specific actionable best practices"
  - type: llm_judge
    criteria: "Common mistakes are genuinely common and the advice for avoiding them is practical"
    weight: 0.20
    description: "Practical mistake avoidance"
