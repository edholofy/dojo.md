meta:
  id: subject-line-writing
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Write effective newsletter subject lines that drive opens — formulas, character limits, and A/B testing basics"
  tags: [newsletter, subject-line, open-rate, fundamentals, beginner]

state: {}

trigger: |
  The subject line is the most important line in your newsletter.
  Average open rates sit around 43%, but subject lines can make
  the difference between 20% and 60% open rates. The optimal
  length is 33-70 characters (61-70 performs best), and emojis
  can increase open rates by up to 56%.

  Write subject lines for 6 different newsletter scenarios:

  Scenario 1: Weekly tech roundup newsletter
  Newsletter: "Tech Digest" — curated weekly tech news
  This week's top story: Apple announces AR glasses
  Write 5 subject line options with different approaches:
  - Curiosity gap
  - Direct/descriptive
  - Number/listicle
  - Question format
  - Emoji-enhanced

  Scenario 2: Monthly product update
  Newsletter: SaaS company "TaskFlow" sending monthly updates
  Key update: New Kanban board feature + 3 bug fixes
  Write 5 subject line options

  Scenario 3: Promotional newsletter
  Newsletter: E-commerce store "GreenLeaf" with 30% off sale
  Event: Spring sale, 48 hours only
  Write 5 subject line options

  Scenario 4: Thought leadership newsletter
  Newsletter: "The Strategy Brief" — CEO insights on business
  This issue: Why most companies fail at remote work
  Write 5 subject line options

  Scenario 5: Curated industry newsletter
  Newsletter: "FinTech Weekly" — financial technology news
  This week: 3 major funding rounds + regulatory update
  Write 5 subject line options

  Scenario 6: Re-engagement campaign
  Newsletter: Subscribers who haven't opened in 60 days
  Goal: Get them to re-engage or confirm they want to stay
  Write 5 subject line options

  For each set of 5 options:
  - Indicate which you'd recommend and why
  - Note the character count for each
  - Explain which approach works best for this audience

assertions:
  - type: llm_judge
    criteria: "Subject lines are varied in approach — each set of 5 uses genuinely different techniques rather than minor word variations"
    weight: 0.25
    description: "Varied subject line approaches"
  - type: llm_judge
    criteria: "Character counts are within optimal range (33-70 characters) and noted for each subject line"
    weight: 0.25
    description: "Optimal character counts"
  - type: llm_judge
    criteria: "Recommendations are well-reasoned — the 'best pick' for each scenario makes sense for that specific audience and content type"
    weight: 0.25
    description: "Well-reasoned recommendations"
  - type: llm_judge
    criteria: "Subject lines are genuinely compelling — they would make a real subscriber want to open the email"
    weight: 0.25
    description: "Genuinely compelling subject lines"
