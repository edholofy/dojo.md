meta:
  id: email-design-basics
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Understand newsletter email design fundamentals — mobile optimization, width limits, font sizes, and template structures"
  tags: [newsletter, design, mobile, layout, formatting, beginner]

state: {}

trigger: |
  Newsletter design directly impacts readability and engagement.
  55% of emails are opened on mobile devices, and emails that
  take longer than 3 seconds to load see 40% bounce rates. The
  standard newsletter width is 600px, with a 60:40 text-to-image
  ratio recommended.

  Part 1: Design fundamentals
  Explain the key design principles for newsletters:
  1. Width and layout (600px standard, single vs. multi-column)
  2. Typography (16-18px body, 22-26px headers, web-safe fonts)
  3. Images (alt text, file size limits, image blocking fallbacks)
  4. White space and scanning patterns (F-pattern, Z-pattern)
  5. CTA buttons (44×44px minimum tap target, contrast, placement)
  6. Color usage (brand consistency, accessibility, dark mode)
  7. Mobile responsiveness (stacking, font scaling, thumb zones)

  Part 2: Template design exercise
  Design (describe in detail) 3 newsletter templates:

  Template A: Minimalist text newsletter
  For: A personal essay newsletter (like a Substack)
  Describe: Layout, typography, spacing, header/footer design
  Show: How the same template works on desktop and mobile

  Template B: Visual-rich curated newsletter
  For: A design inspiration newsletter with lots of images
  Describe: Image grid approach, caption styling, link formatting
  Show: How images stack/resize on mobile

  Template C: Corporate product newsletter
  For: A SaaS company's monthly update
  Describe: Branded header, feature sections, CTA placement, footer
  Show: How the multi-column layout adapts to mobile

  Part 3: Common design mistakes
  List and explain the top 10 newsletter design mistakes:
  - With before/after descriptions of how to fix each one
  - Focus on mistakes that hurt readability or engagement

assertions:
  - type: llm_judge
    criteria: "Design fundamentals cover all 7 areas with specific measurements, rules, and rationale — not just generic 'make it look good' advice"
    weight: 0.25
    description: "Specific design fundamentals"
  - type: llm_judge
    criteria: "Template descriptions are detailed enough to implement — a designer could build these templates from the descriptions"
    weight: 0.25
    description: "Implementable template descriptions"
  - type: llm_judge
    criteria: "Mobile optimization is addressed throughout — not as an afterthought but as a primary design consideration"
    weight: 0.25
    description: "Mobile-first design thinking"
  - type: llm_judge
    criteria: "Design mistakes are genuinely common and the fixes are practical — focused on real problems rather than theoretical concerns"
    weight: 0.25
    description: "Practical mistake fixes"
