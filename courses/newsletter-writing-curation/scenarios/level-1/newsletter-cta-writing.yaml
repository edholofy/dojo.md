meta:
  id: newsletter-cta-writing
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Write effective newsletter calls-to-action — button copy, inline CTAs, and multi-CTA hierarchy"
  tags: [newsletter, cta, calls-to-action, conversion, beginner]

state: {}

trigger: |
  Calls to action are where newsletter engagement converts into
  action — clicks, purchases, sign-ups, or replies. Personalized
  CTAs perform 202% better than generic ones, and CTA placement
  affects click-through rates significantly.

  Part 1: CTA types and placement
  Explain the different CTA types used in newsletters:
  1. Button CTAs (primary actions — design and copy guidelines)
  2. Inline text CTAs (embedded links within paragraphs)
  3. Image CTAs (clickable images or banners)
  4. Reply CTAs (asking readers to reply to the email)
  5. Social CTAs (share, follow, forward)

  For each type, explain when to use it and provide 3 example
  copy variations.

  Part 2: CTA writing exercise
  Write CTAs for 5 different newsletter goals:

  Goal 1: Drive traffic to a blog post
  Newsletter: Marketing tips newsletter
  Article: "10 Ways to Improve Your Landing Page Conversion Rate"
  Write: 3 button CTA options + 2 inline CTA options

  Goal 2: Get product signups
  Newsletter: SaaS company "CloudDash" — analytics platform
  Offer: Free 14-day trial, no credit card required
  Write: 3 button CTA options + 2 inline CTA options

  Goal 3: Encourage replies for engagement
  Newsletter: Personal finance newsletter
  Topic: This week's essay on index fund investing
  Write: 3 reply-prompt CTA options

  Goal 4: Drive event registration
  Newsletter: Tech community newsletter
  Event: Free webinar on AI in product management, next Thursday
  Write: 3 button CTA options + 2 urgency-enhanced options

  Goal 5: Encourage social sharing
  Newsletter: Curated startup newsletter
  Goal: Get subscribers to share the newsletter with peers
  Write: 3 forward/share CTA options + referral program CTA

  Part 3: Multi-CTA hierarchy
  Explain how to structure newsletters with multiple CTAs:
  - Primary vs. secondary vs. tertiary CTAs
  - Visual hierarchy and placement strategy
  - How many CTAs is too many (and why)
  - The "one email, one primary action" principle

assertions:
  - type: llm_judge
    criteria: "CTA types are clearly differentiated with appropriate use cases — the reader understands when buttons vs inline vs reply CTAs are most effective"
    weight: 0.25
    description: "Clear CTA type differentiation"
  - type: llm_judge
    criteria: "CTA copy is specific and action-oriented — avoids generic 'Click Here' and 'Learn More' in favor of benefit-driven, context-specific language"
    weight: 0.30
    description: "Specific action-oriented copy"
  - type: llm_judge
    criteria: "Multi-CTA hierarchy guidance is practical — explains how to prioritize when a newsletter has competing goals"
    weight: 0.25
    description: "Practical multi-CTA guidance"
  - type: llm_judge
    criteria: "CTAs are varied in approach — urgency, curiosity, benefit, social proof, and exclusivity techniques are all represented"
    weight: 0.20
    description: "Varied CTA techniques"
