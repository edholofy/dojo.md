meta:
  id: content-curation-basics
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Learn the fundamentals of content curation — sourcing, filtering, adding value, and presenting curated content effectively"
  tags: [newsletter, curation, sourcing, filtering, value-add, beginner]

state: {}

trigger: |
  Content curation is more than collecting links. The framework
  is: Search → Aggregate → Filter → Add Value → Promote. The
  critical step most beginners skip is adding personal context
  beyond aggregation — that's what makes a curated newsletter
  worth subscribing to when readers could find the same links
  themselves.

  Part 1: Curation methodology
  Explain the complete curation workflow:
  1. Source identification (where to find content worth curating)
  2. Aggregation tools (Feedly, Pocket, RSS, Twitter lists, etc.)
  3. Filtering criteria (how to decide what makes the cut)
  4. Value-add techniques (commentary, context, connections)
  5. Presentation formats (link roundups, annotated bibliographies,
     thematic groupings, best-of selections)

  Part 2: Curation exercise
  You're launching "Product Insider" — a curated weekly newsletter
  for product managers. Your first issue needs 7 curated items.

  For each of these 7 topics, write the curated entry as it would
  appear in the newsletter:
  1. A new product management framework article
  2. A startup post-mortem (lessons from failure)
  3. A data-driven study on user behavior
  4. A useful tool or resource for PMs
  5. A podcast episode worth listening to
  6. A contrarian opinion piece on product strategy
  7. A job listing or career advice piece

  Each curated entry should include:
  - Headline/title of the source
  - 2-3 sentence summary
  - Your editorial commentary (why this matters, what to take from it)
  - Source attribution

  Part 3: Curation quality standards
  Create a checklist for high-quality curation:
  - Source diversity (avoiding echo chambers)
  - Recency and relevance balance
  - Attribution and credit best practices
  - How many items per issue (and when less is more)
  - Ethical considerations in curation

assertions:
  - type: llm_judge
    criteria: "Curation methodology covers all 5 steps with specific tools, criteria, and techniques at each stage"
    weight: 0.25
    description: "Complete curation methodology"
  - type: llm_judge
    criteria: "Curated entries add genuine value — commentary goes beyond summary to provide insight, context, or a unique take on each piece"
    weight: 0.30
    description: "Genuine value-add commentary"
  - type: llm_judge
    criteria: "The 7 curated items demonstrate variety — different content types (article, tool, podcast, opinion) create a well-rounded issue"
    weight: 0.25
    description: "Varied content types"
  - type: llm_judge
    criteria: "Quality standards checklist addresses source diversity, attribution ethics, and practical guidance on issue length"
    weight: 0.20
    description: "Comprehensive quality standards"
