meta:
  id: writing-voice-tone
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Develop a consistent newsletter voice — personal vs brand, conversational vs professional, and finding your authentic tone"
  tags: [newsletter, voice, tone, writing-style, personality, beginner]

state: {}

trigger: |
  Newsletter voice is what makes readers feel like they're hearing
  from a person, not a brand. Personalized content generates 202%
  higher conversion rates, and first-person writing creates stronger
  rapport. But finding the right voice depends on your audience,
  topic, and goals.

  Part 1: Voice spectrum analysis
  Explain the key dimensions of newsletter voice:
  1. Personal vs. Brand (first person singular vs. company voice)
  2. Conversational vs. Professional (casual tone vs. authoritative)
  3. Opinionated vs. Objective (strong takes vs. balanced reporting)
  4. Warm vs. Direct (relationship-building vs. efficient)

  For each dimension, give examples of newsletters that sit at
  different points on the spectrum.

  Part 2: Voice development exercise
  Develop distinct newsletter voices for 4 different scenarios:

  Newsletter A: "Morning Brew" style — business news for millennials
  Audience: 25-35 year old professionals
  Write a 150-word sample in this voice covering: "Fed raises
  interest rates by 0.25%"

  Newsletter B: "The Hustle" style — tech and business with attitude
  Audience: Entrepreneurs and startup enthusiasts
  Write a 150-word sample covering the same story

  Newsletter C: "McKinsey Quarterly" style — serious business strategy
  Audience: C-suite executives
  Write a 150-word sample covering the same story

  Newsletter D: Personal creator style — individual expert sharing
  Audience: Freelance designers
  Write a 150-word sample from a design expert covering: "Why
  every designer should understand business strategy"

  Part 3: Voice consistency checklist
  Create a practical checklist for maintaining consistent voice:
  - Word choice guidelines (words to use vs. avoid)
  - Sentence structure patterns
  - How to handle humor, slang, and cultural references
  - Adapting voice for different content types within the same newsletter

assertions:
  - type: llm_judge
    criteria: "Voice dimensions are clearly explained with real newsletter examples that illustrate each end of the spectrum"
    weight: 0.25
    description: "Clear voice dimension examples"
  - type: llm_judge
    criteria: "The 4 sample voices are genuinely distinct — each sounds like a different person or brand writing about the same topic"
    weight: 0.30
    description: "Genuinely distinct voices"
  - type: llm_judge
    criteria: "The voice consistency checklist is practical and actionable — a writer could use it to maintain their chosen voice across issues"
    weight: 0.25
    description: "Practical consistency checklist"
  - type: llm_judge
    criteria: "The same news story told in 3 different voices demonstrates how voice transforms identical information into different reader experiences"
    weight: 0.20
    description: "Voice transforms information"
