meta:
  id: newsletter-frequency-timing
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Choose the right newsletter frequency and send timing for maximum engagement"
  tags: [newsletter, frequency, timing, scheduling, engagement, beginner]

state: {}

trigger: |
  Frequency and timing significantly impact newsletter performance.
  61% of subscribers prefer weekly newsletters, and 85% want at
  least monthly. The best send days are Tuesday through Thursday,
  with 9-11am and 2-4pm being optimal windows. Sending more than
  2 emails per week causes subscriber fatigue.

  Part 1: Frequency strategy
  Explain the frequency options and when each works best:
  1. Daily newsletters (who should do this, sustainability concerns)
  2. Multiple times per week (2-3x, content volume requirements)
  3. Weekly (the most popular choice — why it works)
  4. Bi-weekly (when this makes sense)
  5. Monthly (best use cases, risk of being forgotten)
  6. Irregular/event-driven (when consistency matters less)

  For each frequency, provide:
  - Ideal content type and newsletter format
  - Engagement benchmarks (how open rates change with frequency)
  - Time investment required to sustain
  - Examples of successful newsletters at that frequency

  Part 2: Timing optimization
  Explain send time optimization:
  1. Best days of the week (with data for different audiences)
  2. Best times of day (morning, midday, evening — who reads when)
  3. Time zone considerations (single zone vs. multi-zone audiences)
  4. How to A/B test send times
  5. Seasonal variations (holidays, summers, year-end)

  Part 3: Frequency decision framework
  Create a decision framework for choosing the right frequency:

  Apply it to these 4 scenarios:
  Scenario A: Solo creator writing about personal finance
  Resources: 5 hours/week for newsletter, no team
  Audience: 2,000 subscribers, mostly US professionals

  Scenario B: SaaS company product updates
  Resources: Full marketing team, lots of product news
  Audience: 15,000 users across global time zones

  Scenario C: Curated AI news newsletter
  Resources: 10 hours/week, 1 assistant
  Audience: 8,000 subscribers, tech professionals

  Scenario D: Local restaurant's customer newsletter
  Resources: Owner writes it, 2 hours/week max
  Audience: 500 subscribers, local community

  For each, recommend frequency, send day, send time, and explain
  the reasoning.

assertions:
  - type: llm_judge
    criteria: "Frequency options include specific engagement benchmarks and sustainability analysis — not just 'weekly is best' but why and when each frequency works"
    weight: 0.25
    description: "Data-backed frequency analysis"
  - type: llm_judge
    criteria: "Timing optimization includes specific data points for days, times, and time zones rather than generic advice"
    weight: 0.25
    description: "Specific timing data"
  - type: llm_judge
    criteria: "The decision framework applied to 4 scenarios produces different recommendations that are well-reasoned for each situation"
    weight: 0.30
    description: "Well-reasoned scenario recommendations"
  - type: llm_judge
    criteria: "Practical concerns like creator burnout, content quality vs. frequency trade-offs, and audience expectations are addressed"
    weight: 0.20
    description: "Practical sustainability concerns"
