meta:
  id: newsletter-types
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Understand the major newsletter types — curated, original content, hybrid, product updates, and industry roundups"
  tags: [newsletter, types, formats, curated, original, beginner]

state: {}

trigger: |
  Not all newsletters are the same. Understanding the major types
  helps you choose the right format for your goals and audience.
  Curated newsletters average ~15% CTR, original content reaches
  20-30% CTR, and hybrid formats sit around 18-25% CTR.

  Explain the 5 major newsletter types and demonstrate each with
  a sample issue:

  Type 1: Curated newsletter
  - Definition: Collecting and commenting on content from other sources
  - Example: Write a sample issue of "Design Links" — a weekly
    collection of the best design articles, tools, and inspiration
  - Include 5-7 curated items with your commentary on each

  Type 2: Original content newsletter
  - Definition: Written entirely by the author with original insights
  - Example: Write a sample issue of "Growth Notes" — a weekly
    essay on startup growth tactics from a founder's perspective
  - Include a 400-500 word original essay on one growth topic

  Type 3: Hybrid newsletter
  - Definition: Mix of original content and curated links
  - Example: Write a sample issue of "AI Briefing" — original
    analysis + curated AI news
  - Include 200-word original analysis + 4-5 curated items

  Type 4: Product update newsletter
  - Definition: Company updates, feature releases, tips
  - Example: Write a sample issue from "Pixelcraft" — a design
    tool sending monthly product updates
  - Include feature update, tip of the month, and community highlight

  Type 5: Industry roundup newsletter
  - Definition: Comprehensive summary of industry developments
  - Example: Write a sample issue of "Healthcare Week" — weekly
    healthcare industry recap
  - Include 3 major stories summarized with context and implications

  For each type, also explain:
  - Best audience fit
  - Time investment required to produce
  - Monetization potential
  - Growth characteristics

assertions:
  - type: llm_judge
    criteria: "All 5 newsletter types are clearly defined with distinct characteristics — a reader could immediately identify which type any newsletter belongs to"
    weight: 0.25
    description: "Clear type definitions"
  - type: llm_judge
    criteria: "Sample issues are realistic and demonstrate the unique qualities of each type — the curated newsletter feels different from the original content newsletter"
    weight: 0.30
    description: "Realistic distinct samples"
  - type: llm_judge
    criteria: "Practical guidance on audience fit, time investment, monetization, and growth is specific and helpful for someone choosing a format"
    weight: 0.25
    description: "Specific practical guidance"
  - type: llm_judge
    criteria: "The curated items add genuine value beyond just linking — commentary, context, or insight accompanies each curated piece"
    weight: 0.20
    description: "Value-added curation"
