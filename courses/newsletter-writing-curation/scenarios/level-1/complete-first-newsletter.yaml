meta:
  id: complete-first-newsletter
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Write a complete first newsletter issue from scratch — from concept to publication-ready draft"
  tags: [newsletter, complete, first-issue, launch, beginner]

state: {}

trigger: |
  Your first newsletter issue sets the tone for everything that
  follows. It needs to deliver value, establish your voice, set
  expectations, and give readers a reason to come back.

  Create a complete first newsletter issue for:

  Newsletter: "Indie Hacker Weekly"
  Concept: Curated and original content for solo founders and
  indie hackers building profitable internet businesses
  Audience: Solo founders, side-project builders, bootstrappers
  Frequency: Weekly (Friday afternoon — "weekend reading")
  Format: Hybrid (1 original essay + 5 curated items + 1 tool)
  Voice: Friendly, direct, slightly irreverent, founder-to-founder
  Subscriber count at launch: 200 (from pre-launch waitlist)

  Write the complete first issue including:

  1. Subject line (with 2 alternatives)
  2. Pre-header text
  3. Welcome header (brief — who you are, what they'll get, frequency)
  4. Original essay (300-400 words):
     Topic: "Why I'm starting this newsletter (and what I won't do)"
     Tone: Personal, honest about what motivated the newsletter
  5. Curated section header and introduction
  6. 5 curated items, each with:
     - Source title and link placeholder
     - 2-3 sentence summary
     - Your editorial take (why this matters)
  7. Tool of the week:
     - Tool name and what it does
     - Why you recommend it
     - One specific use case
  8. Primary CTA (what you want readers to do)
  9. Footer with:
     - How to share the newsletter
     - Social links
     - Unsubscribe link mention
     - Brief "about" line

  Also provide:
  - A launch checklist (10 things to verify before sending issue #1)
  - How this first issue differs from ongoing issues
  - What to measure to know if issue #1 was successful

assertions:
  - type: llm_judge
    criteria: "The complete newsletter is publication-ready — every section is written, formatted, and flows naturally from start to finish"
    weight: 0.25
    description: "Publication-ready completeness"
  - type: llm_judge
    criteria: "The voice is consistent throughout — friendly, direct, and founder-to-founder tone is maintained from subject line to footer"
    weight: 0.25
    description: "Consistent voice throughout"
  - type: llm_judge
    criteria: "The original essay is compelling — it's personal, honest, and gives readers a reason to keep subscribing"
    weight: 0.25
    description: "Compelling original essay"
  - type: llm_judge
    criteria: "The launch checklist and success metrics are practical — a first-time newsletter creator could follow this guidance"
    weight: 0.25
    description: "Practical launch guidance"
