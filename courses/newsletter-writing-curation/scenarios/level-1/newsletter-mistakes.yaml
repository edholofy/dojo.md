meta:
  id: newsletter-mistakes
  level: 1
  course: newsletter-writing-curation
  type: output
  description: "Identify and fix the most common newsletter writing mistakes that kill engagement and drive unsubscribes"
  tags: [newsletter, mistakes, engagement, unsubscribe, quality, beginner]

state: {}

trigger: |
  The average unsubscribe rate is 0.22%, but poorly written
  newsletters can see rates 5-10x higher. Understanding common
  mistakes helps you avoid them from the start.

  Part 1: Diagnose these newsletters
  Review 3 example newsletters and identify what's wrong with each.

  Newsletter A (too promotional):
  "Subject: 🔥 HUGE SALE — Don't Miss Out!!!
  Hi there! We have an AMAZING offer for you today! Our best-
  selling product is now 50% OFF! But wait — there's MORE! If
  you buy today, you'll also get FREE shipping AND a bonus gift!
  This offer expires in 24 HOURS so ACT NOW! Click here to buy!
  P.S. Forward this to a friend for an EXTRA 10% off!"

  Newsletter B (too long and unfocused):
  "Subject: Weekly Update — Issue #23
  Happy Monday everyone! Hope you had a great weekend. I went
  hiking and it was beautiful. Anyway, let me share some thoughts
  on 14 different topics today. First, let me talk about AI
  (2,000 words). Then I want to discuss the economy (1,500 words).
  Also, here are 25 links I found interesting this week. Oh, and
  I'm launching a course (details at the bottom of this very
  long email). PS — I also wanted to mention..."

  Newsletter C (boring and generic):
  "Subject: Newsletter — February Issue
  Dear Valued Subscriber, We are pleased to present our monthly
  newsletter. In this edition, we will discuss industry trends.
  The industry continues to evolve. Many companies are adopting
  new technologies. Innovation is important. We remain committed
  to excellence. Please find attached our latest whitepaper.
  Best regards, The Marketing Team"

  For each newsletter:
  1. List every mistake you can identify
  2. Explain why each mistake hurts engagement
  3. Rewrite the subject line and opening paragraph to fix it

  Part 2: Common mistakes checklist
  Create a comprehensive checklist of the top 15 newsletter mistakes:
  - Grouped by category (content, design, delivery, strategy)
  - With severity rating (minor, moderate, critical)
  - With specific fix for each mistake

  Part 3: Self-audit template
  Create a pre-send checklist that newsletter writers can use to
  catch mistakes before hitting send.

assertions:
  - type: llm_judge
    criteria: "All 3 newsletter diagnoses are thorough — multiple specific mistakes are identified in each example, not just the obvious ones"
    weight: 0.25
    description: "Thorough diagnosis"
  - type: llm_judge
    criteria: "Rewrites demonstrate clear improvement — the fixed subject lines and opening paragraphs are genuinely better and show what good looks like"
    weight: 0.30
    description: "Clear improvement demonstrated"
  - type: llm_judge
    criteria: "The 15-mistake checklist covers content, design, delivery, and strategy — with practical, specific fixes for each"
    weight: 0.25
    description: "Comprehensive mistake checklist"
  - type: llm_judge
    criteria: "The pre-send audit template is practical enough to use before every newsletter send"
    weight: 0.20
    description: "Practical pre-send template"
