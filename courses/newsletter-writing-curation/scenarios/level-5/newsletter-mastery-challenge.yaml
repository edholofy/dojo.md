meta:
  id: newsletter-mastery-challenge
  level: 5
  course: newsletter-writing-curation
  type: output
  description: "Complete a comprehensive newsletter mastery challenge — writing 6 newsletters across formats, industries, and business models"
  tags: [newsletter, mastery, challenge, comprehensive, portfolio, mastery]

state: {}

trigger: |
  This mastery challenge tests every newsletter skill — writing,
  curation, strategy, monetization, and audience understanding.
  Each newsletter must be complete, distinctive, and demonstrate
  mastery of its specific format and audience.

  Write 6 complete newsletter issues, each demonstrating a
  different skill:

  Newsletter 1: The curated digest (speed and selection)
  "AI Pulse" — daily AI news for executives (not technical)
  Write a complete issue: 5 curated items with commentary
  Constraint: Must be scannable in under 3 minutes
  Show: Expert curation — selection quality and concise commentary

  Newsletter 2: The long-form essay (depth and voice)
  "Against the Grain" — contrarian business thinking
  Write a complete issue: 1,500-word essay
  Topic: "Why 'move fast and break things' is the worst advice
  in business history"
  Show: Compelling argument, distinctive voice, memorable writing

  Newsletter 3: The paid premium (value justification)
  "Deal Flow Daily" — $25/month venture capital intelligence
  Write a complete issue: Market analysis + 3 deal deep-dives
  Constraint: Must be worth $25/month to a VC professional
  Show: Depth of analysis that justifies premium pricing

  Newsletter 4: The community newsletter (participation-driven)
  "Indie Founders Circle" — community-driven founder newsletter
  Write a complete issue: 40% reader-contributed content
  Include: Reader Q&A, community wins, member spotlight, poll results
  Show: A newsletter that feels like a community, not a broadcast

  Newsletter 5: The corporate newsletter (brand and value)
  "Shopify Insights" — from Shopify's content marketing team
  Write a complete issue: E-commerce tips and product updates
  Constraint: Must serve the business (drive product usage) while
  providing genuine value to readers
  Show: The balance between marketing and genuine helpfulness

  Newsletter 6: The crisis-mode newsletter (tone and restraint)
  "HealthWatch Alert" — urgent public health newsletter
  Write a complete issue: Major food safety recall affecting
  3 popular products across 20 states
  Constraint: Must be factual, clear, actionable, and calm
  Show: How newsletter writing changes under crisis conditions

  For each newsletter:
  - Complete subject line, preheader, and full body
  - Self-assessment: what makes this issue effective
  - One thing you'd improve with more time
  - The ideal audience and monetization strategy

assertions:
  - type: llm_judge
    criteria: "All 6 newsletters are complete and publication-ready — each has subject line, preheader, and full body content that could be sent today"
    weight: 0.25
    description: "Complete publication-ready newsletters"
  - type: llm_judge
    criteria: "Each newsletter has a genuinely distinct voice and format — the curated digest sounds nothing like the long-form essay or the crisis alert"
    weight: 0.25
    description: "Genuinely distinct voices"
  - type: llm_judge
    criteria: "The paid premium newsletter justifies its price — the depth of analysis and exclusivity of information would convince a VC professional to pay $25/month"
    weight: 0.25
    description: "Premium value justified"
  - type: llm_judge
    criteria: "Self-assessments demonstrate critical awareness — the analysis of each newsletter shows understanding of what makes it work and where it could improve"
    weight: 0.25
    description: "Critical self-awareness"
