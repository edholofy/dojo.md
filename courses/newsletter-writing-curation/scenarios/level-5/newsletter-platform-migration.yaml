meta:
  id: newsletter-platform-migration
  level: 5
  course: newsletter-writing-curation
  type: output
  description: "Execute a complex newsletter platform migration — from legacy system to modern platform with zero subscriber loss and minimal disruption"
  tags: [newsletter, migration, platform, technical, operations, mastery]

state: {}

trigger: |
  Platform migration is one of the highest-risk operations in
  newsletter management. A botched migration can lose subscribers,
  break automations, damage deliverability, and disrupt revenue.
  But staying on the wrong platform can limit growth, increase
  costs, and prevent innovation.

  Execute a platform migration for:

  Current setup: "TechLeaders Daily" newsletter
  Current platform: Mailchimp (legacy, hitting feature limitations)
  Subscribers: 85,000 across 3 lists and 12 segments
  Automations: 8 active automation sequences
  Integrations: Stripe (paid subs), Zapier (5 zaps), CRM, website embed
  Revenue: $50K/month (sponsorships + 2,000 paid subscribers at $10/month)
  Target platform: Beehiiv (selected after evaluation)
  Timeline: Must complete within 6 weeks

  Part 1: Pre-migration planning
  1. Complete migration inventory:
     - Subscriber lists with all tags, segments, and custom fields
     - Active automations (document each workflow)
     - Email templates and design assets
     - Integration dependencies (what breaks when you switch)
     - Historical data (campaign analytics, subscriber history)
  2. Risk assessment:
     - Identify the top 10 migration risks
     - Probability and impact rating for each
     - Mitigation strategy for each risk
  3. Communication plan:
     - Internal team briefing
     - Subscriber communication (should you tell them?)
     - Sponsor communication (how migration affects active campaigns)
  4. Rollback plan:
     - Define rollback triggers (what would cause you to abort)
     - Data preservation strategy
     - Rollback timeline

  Part 2: Technical migration (6-week plan)
  Week 1-2: Setup and parallel operation
  - New platform configuration
  - Domain authentication (SPF, DKIM, DMARC updates)
  - Template recreation
  - Automation rebuilding
  - Integration setup (Stripe, CRM, website)

  Week 3: Data migration
  - Subscriber export/import with all metadata
  - Segment recreation and verification
  - Tag mapping (old tags → new tags)
  - Data validation checklist

  Week 4: Testing
  - Send test emails to internal team
  - Test all automations with test subscribers
  - Verify all integrations work correctly
  - Deliverability testing (inbox placement checks)
  - Load testing (can the new platform handle your send volume?)

  Week 5: Soft launch
  - Send to 10% of subscribers from new platform
  - Monitor deliverability, opens, clicks
  - Compare performance to Mailchimp baseline
  - Fix any issues identified

  Week 6: Full migration
  - Switch all sends to new platform
  - Disable Mailchimp sends
  - Monitor closely for 7 days
  - Final verification of all systems

  Part 3: Paid subscriber migration
  The hardest part — migrating 2,000 paying subscribers without
  disrupting their billing:
  1. Billing migration strategy (Stripe can stay as payment processor)
  2. Subscriber notification about the change
  3. How to handle mid-cycle subscriptions
  4. Failure recovery (what if some billing connections break)
  5. Revenue reconciliation post-migration

  Part 4: Deliverability preservation
  1. IP warming strategy for the new platform
  2. Domain reputation monitoring during transition
  3. Engagement dip mitigation (expected during migration)
  4. Authentication record updates and validation
  5. Blacklist monitoring during and after migration

  Part 5: Post-migration
  1. 30-day post-migration monitoring plan
  2. Performance comparison (old vs. new platform)
  3. Team training on new platform features
  4. Documentation of new processes and workflows
  5. Lessons learned and migration post-mortem

assertions:
  - type: llm_judge
    criteria: "The 6-week plan is detailed and realistic — each week has specific tasks that account for the complexity of migrating 85,000 subscribers"
    weight: 0.25
    description: "Detailed realistic migration plan"
  - type: llm_judge
    criteria: "Paid subscriber migration is handled with care — billing continuity, subscriber notification, and failure recovery show understanding of revenue risk"
    weight: 0.25
    description: "Careful paid subscriber handling"
  - type: llm_judge
    criteria: "Deliverability preservation is comprehensive — IP warming, domain reputation, and authentication updates would prevent the email going to spam"
    weight: 0.25
    description: "Comprehensive deliverability preservation"
  - type: llm_judge
    criteria: "Risk assessment and rollback plan show mature project management — the migration could be aborted safely if critical issues arise"
    weight: 0.25
    description: "Mature risk management"
