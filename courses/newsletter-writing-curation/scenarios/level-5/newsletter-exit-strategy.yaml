meta:
  id: newsletter-exit-strategy
  level: 5
  course: newsletter-writing-curation
  type: output
  description: "Plan newsletter exit strategies — selling a newsletter business, transitioning to new ownership, and maximizing sale value"
  tags: [newsletter, exit, acquisition, valuation, transition, mastery]

state: {}

trigger: |
  Every newsletter business needs an exit strategy — whether
  selling the business, transitioning to a team, or winding down
  gracefully. Newsletter acquisitions have exploded, with deals
  ranging from $10K for small lists to $100M+ for media companies.
  Planning for exit from the beginning maximizes optionality.

  Design exit strategies for 3 newsletter businesses at different
  stages:

  Business 1: Solo creator exit
  Newsletter: "Remote Work Report" — weekly remote work newsletter
  Profile: 25,000 subscribers, $8K/month revenue, 1 person
  Situation: Creator wants to pursue a new venture
  Tasks:
  1. Valuation assessment (what is this newsletter worth?)
  2. Sale preparation:
     - What makes this newsletter attractive to buyers
     - What to fix before listing (warts and all)
     - Documentation to prepare (financials, metrics, processes)
  3. Buyer identification:
     - Types of buyers (individuals, media companies, competitors)
     - Where to list the newsletter for sale
     - Write the sales listing/prospectus
  4. Transition plan:
     - Creator-to-new-owner handoff timeline
     - Subscriber communication (write the announcement)
     - Voice and brand transition strategy
     - Post-sale involvement (consulting period)

  Business 2: Media company exit (strategic acquisition)
  Newsletter: "FinanceStack" — portfolio of 4 finance newsletters
  Profile: 200,000 total subscribers, $80K/month revenue, 8 person team
  Situation: Approached by a large financial media company
  Tasks:
  1. Pre-negotiation preparation:
     - Valuation range (multiple methodologies)
     - Deal structure options (cash, earn-out, equity swap)
     - Non-negotiables vs. flexible terms
  2. Due diligence package preparation:
     - Complete financial documentation
     - Audience quality proof
     - Team retention plan
     - Technology and IP inventory
  3. Integration planning:
     - How newsletters integrate into acquirer's portfolio
     - Team retention strategy and key-person agreements
     - Brand preservation vs. absorption decision
  4. Subscriber retention through acquisition:
     - Communication strategy
     - Quality commitment during transition
     - Measuring post-acquisition subscriber health

  Business 3: Graceful wind-down
  Newsletter: "Local Arts Weekly" — community arts newsletter
  Profile: 3,000 subscribers, $500/month revenue, 1 person
  Situation: Creator moving cities, newsletter is too local to continue
  Tasks:
  1. Wind-down options analysis:
     - Sell to a local buyer
     - Transition to a volunteer or community group
     - Archive and close
  2. Write the farewell sequence:
     - Email 1: Announcement (4 weeks before final issue)
     - Email 2: Gratitude and highlights (2 weeks before)
     - Email 3: Final issue (celebration + alternatives for readers)
  3. Archive and legacy:
     - How to preserve the newsletter archive
     - Redirecting subscribers to alternative newsletters
     - Maintaining the brand as a community resource

  For each exit scenario, also address:
  - Tax and legal considerations
  - Timeline from decision to completion
  - Emotional aspects of letting go
  - Post-exit restrictions (non-compete, non-solicit)

assertions:
  - type: llm_judge
    criteria: "Valuation methodologies are applied correctly — the solo creator and media company valuations use appropriate multiples and produce realistic price ranges"
    weight: 0.25
    description: "Correct valuation methodologies"
  - type: llm_judge
    criteria: "Subscriber communications handle transitions with care — announcements, farewell sequences, and transition emails respect the reader relationship"
    weight: 0.25
    description: "Caring subscriber communications"
  - type: llm_judge
    criteria: "The graceful wind-down is treated with as much strategic thinking as the $80K/month exit — showing that every newsletter deserves a thoughtful conclusion"
    weight: 0.25
    description: "Thoughtful wind-down"
  - type: llm_judge
    criteria: "Deal structures and negotiation guidance are sophisticated — earn-outs, key-person agreements, and non-competes show real transaction knowledge"
    weight: 0.25
    description: "Sophisticated deal structures"
