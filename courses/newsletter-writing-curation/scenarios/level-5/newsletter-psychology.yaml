meta:
  id: newsletter-psychology
  level: 5
  course: newsletter-writing-curation
  type: output
  description: "Apply behavioral psychology to newsletter writing — habit formation, cognitive biases, social dynamics, and persuasion in email"
  tags: [newsletter, psychology, behavioral, habits, persuasion, mastery]

state: {}

trigger: |
  The best newsletter writers understand the psychology behind
  why people open, read, click, and stay subscribed. Behavioral
  science principles — from habit formation to cognitive biases
  to social dynamics — can be applied ethically to create
  newsletters that readers genuinely value and can't quit.

  Apply behavioral psychology to newsletter optimization:

  Part 1: Habit formation
  Using the Habit Loop (Cue → Routine → Reward):
  1. Design the habit loop for a daily newsletter:
     - Cue: What triggers the reader to check for the newsletter?
     - Routine: The reading behavior itself
     - Reward: What dopamine hit does the reader get?
  2. Apply Nir Eyal's Hook Model to newsletter engagement:
     - Trigger (external and internal)
     - Action (minimal effort to engage)
     - Variable reward (what keeps it interesting)
     - Investment (what the reader puts in that makes leaving harder)
  3. Write 3 newsletter opening lines designed to create habitual opening:
     - The "ritual opener" (same format every time, creates anticipation)
     - The "variable opener" (different every time, creates curiosity)
     - The "progress opener" (shows accumulation over time)

  Part 2: Cognitive biases in newsletter writing
  Explain and demonstrate 8 cognitive biases in newsletter context:

  1. Curiosity gap: Write 3 subject lines using this bias
  2. Loss aversion: Write a CTA using fear of missing out (ethically)
  3. Social proof: Design a "most popular this week" section
  4. Anchoring: Write a pricing section for a paid newsletter upgrade
  5. The IKEA effect: Design reader participation that creates ownership
  6. Mere exposure effect: How frequency builds preference
  7. Peak-end rule: Design a newsletter ending that shapes memory
  8. Commitment and consistency: Design a micro-commitment sequence

  For each bias:
  - Explain the psychological principle
  - Show the newsletter application
  - Write the actual copy that applies it
  - Note the ethical boundary (when does application become manipulation?)

  Part 3: Social dynamics
  1. Tribal identity:
     - How to create a sense of belonging among subscribers
     - Write copy that reinforces in-group identity
     - Design the "we" vs. "they" framing (ethically)
  2. Reciprocity:
     - How giving value first creates obligation to engage
     - Design the "gift" strategy for key newsletter moments
  3. Scarcity and exclusivity:
     - How to create perceived scarcity in digital content
     - Write an exclusive content teaser that drives upgrades

  Part 4: Ethical framework
  1. Define the line between persuasion and manipulation
  2. Create the "psychological ethics checklist" for newsletter writers
  3. Identify 5 dark patterns in newsletter marketing and why to avoid them
  4. Design the "reader-first persuasion" framework:
     - Every psychological technique must genuinely serve the reader
     - Transparency about techniques used
     - Respect for reader autonomy

assertions:
  - type: llm_judge
    criteria: "Psychological principles are correctly applied — each cognitive bias is accurately described and the newsletter application is genuine, not forced"
    weight: 0.25
    description: "Correctly applied psychology"
  - type: llm_judge
    criteria: "Copy examples demonstrate real psychological impact — subject lines, CTAs, and newsletter sections would actually influence reader behavior"
    weight: 0.25
    description: "Impactful copy examples"
  - type: llm_judge
    criteria: "Ethical boundaries are clearly drawn — the framework distinguishes between ethical persuasion and manipulation with specific examples"
    weight: 0.25
    description: "Clear ethical boundaries"
  - type: llm_judge
    criteria: "Habit formation strategies are practical — the Habit Loop and Hook Model applications could be implemented immediately to improve reader retention"
    weight: 0.25
    description: "Practical habit strategies"
