meta:
  id: newsletter-portfolio-creation
  level: 5
  course: newsletter-writing-curation
  type: output
  description: "Build a professional newsletter writing portfolio demonstrating mastery across formats, industries, and business models"
  tags: [newsletter, portfolio, career, professional, mastery]

state: {}

trigger: |
  A professional newsletter portfolio demonstrates your ability
  to write, strategize, grow, and monetize newsletters. Whether
  you're seeking a Head of Content role, launching a newsletter
  consultancy, or pitching newsletter management services, your
  portfolio is your proof of capability.

  Build a complete newsletter professional portfolio:

  Part 1: Portfolio strategy
  1. Define the portfolio purpose:
     - Target audience (who will review this portfolio?)
     - Key capabilities to demonstrate
     - Competitive differentiation
  2. Portfolio structure:
     - How to organize by skill vs. by project
     - Ideal number of portfolio pieces
     - How to present results and metrics
  3. Portfolio format:
     - Web-based vs. PDF vs. interactive
     - Mobile optimization considerations
     - How to keep it updated

  Part 2: Portfolio pieces (create 5 complete samples)

  Sample 1: Newsletter launch case study
  - Write the complete case study for launching a B2B newsletter
  - Include: strategy, first 3 issues (excerpts), growth tactics,
    and results (with hypothetical but realistic metrics)
  - Show the before/after (concept → 5,000 subscribers in 6 months)

  Sample 2: Newsletter redesign
  - Write the case study for redesigning an underperforming newsletter
  - Include: the diagnosis, strategy changes, content evolution,
    and design improvements
  - Show metric improvements (open rate, CTR, revenue)

  Sample 3: Curated newsletter writing sample
  - Write a complete curated issue on a specific topic
  - Show the curation methodology and editorial voice
  - Include self-annotation (why each piece was selected)

  Sample 4: Growth strategy document
  - Write a strategic growth plan for a 10,000-subscriber newsletter
  - Include: audience analysis, channel strategy, content strategy,
    and 6-month growth projections
  - Show strategic thinking, not just tactical execution

  Sample 5: Newsletter monetization strategy
  - Write the monetization playbook for a niche newsletter
  - Include: revenue stream analysis, pricing strategy, media kit
    excerpt, and financial projections
  - Show business acumen alongside writing skills

  Part 3: Professional positioning
  1. Write the portfolio introduction:
     - Your newsletter philosophy in 200 words
     - What makes your approach distinctive
     - Results-focused positioning statement
  2. Write the "About" bio (150 words)
  3. Create 3 tailored cover messages:
     - For a Head of Content role at a media company
     - For a newsletter consulting engagement
     - For a fractional newsletter operator role

  Part 4: Testimonial and social proof strategy
  1. How to gather and present testimonials
  2. How to present metrics without revealing confidential data
  3. How to use case studies from personal projects (not just client work)

assertions:
  - type: llm_judge
    criteria: "Portfolio pieces demonstrate genuine range — each sample showcases a different skill (launch, redesign, curation, growth, monetization)"
    weight: 0.25
    description: "Genuine skill range"
  - type: llm_judge
    criteria: "Case studies include realistic metrics and results — the numbers are plausible and the narrative connects strategy to outcomes"
    weight: 0.25
    description: "Realistic metrics and results"
  - type: llm_judge
    criteria: "Professional positioning is distinctive — the portfolio introduction and cover messages differentiate from generic newsletter professionals"
    weight: 0.25
    description: "Distinctive positioning"
  - type: llm_judge
    criteria: "The portfolio as a whole tells a career story — it demonstrates progression, breadth, and depth in newsletter expertise"
    weight: 0.25
    description: "Compelling career story"
