meta:
  id: newsletter-media-company
  level: 5
  course: newsletter-writing-curation
  type: output
  description: "Build a newsletter-first media company — from solo newsletter to multi-product media business with team, revenue, and brand"
  tags: [newsletter, media-company, business, scaling, brand, mastery]

state: {}

trigger: |
  The most ambitious newsletter operators build media companies.
  Morning Brew, The Hustle, and The Skimm started as newsletters
  and scaled into multi-product media businesses worth hundreds
  of millions. This requires evolving from content creator to
  media executive.

  Build a newsletter-first media company from scratch:

  Concept: "Upstream" — a media brand covering the creator economy
  (creators, platforms, monetization, tools, culture)
  Founder: Former creator with 50,000 social media followers
  Starting point: Zero subscribers, zero revenue
  3-year ambition: $3M annual revenue, 10-person team

  Part 1: Year 1 — Foundation (0 to 15,000 subscribers)
  1. Pre-launch strategy:
     - Newsletter concept validation
     - Landing page and waitlist campaign
     - Content format and voice development
     - Launch email sequence (write it)
  2. Growth engine design:
     - Organic growth channels and priorities
     - Content-to-subscriber flywheel
     - First 1,000 subscribers strategy
  3. Content strategy:
     - Write the first 4 newsletter issues (complete)
     - Content calendar for the first quarter
     - Voice and brand guidelines document
  4. First revenue:
     - When to introduce monetization
     - First sponsorship (write the outreach email)
     - Revenue targets by month

  Part 2: Year 2 — Scaling (15,000 to 80,000 subscribers)
  1. Team building:
     - First 3 hires (roles, timing, compensation)
     - Freelancer network design
     - Editorial process for multi-contributor content
  2. Product expansion:
     - Newsletter → podcast → events → courses
     - Launch sequence and cross-promotion strategy
     - Write the podcast launch announcement
  3. Revenue diversification:
     - Sponsorship scaling (from $5K to $30K/month)
     - Paid tier launch (strategy and pricing)
     - Events revenue model
     - Course/community revenue model
  4. Brand building:
     - Visual identity evolution
     - Thought leadership positioning
     - Media partnerships and co-productions

  Part 3: Year 3 — Maturity ($3M revenue target)
  1. Organizational design:
     - 10-person team structure
     - Content operations workflow
     - Sales and partnerships team
  2. Multiple revenue streams at scale:
     - Revenue mix targets (% from each stream)
     - Unit economics at scale
     - Profitability analysis
  3. Strategic options:
     - Continue independent growth
     - Seek investment (and what for)
     - Acquisition opportunities (buying smaller newsletters)
     - Potential exit scenarios and valuations
  4. Brand extension:
     - Annual conference
     - Awards program for creators
     - Industry report (annual)
     - Talent network / job board

  Part 4: The founding document
  Write "Upstream's" foundational documents:
  1. Mission and values statement
  2. Editorial charter (what we cover, how, and why)
  3. Audience manifesto (who we serve and what we promise them)
  4. Business model canvas (all elements)
  5. 3-year financial projection summary

assertions:
  - type: llm_judge
    criteria: "The 3-year journey is realistic and detailed — each phase builds on the previous with specific milestones, hires, and revenue targets"
    weight: 0.25
    description: "Realistic detailed 3-year plan"
  - type: llm_judge
    criteria: "Year 1 content is actually written — the first 4 newsletter issues demonstrate the voice and quality that would attract 15,000 subscribers"
    weight: 0.25
    description: "Quality founding content"
  - type: llm_judge
    criteria: "Product expansion strategy is sequenced intelligently — each new product builds on the existing audience and creates synergies"
    weight: 0.25
    description: "Intelligent product sequencing"
  - type: llm_judge
    criteria: "Foundational documents are inspiring and strategic — the mission statement, editorial charter, and audience manifesto would attract great talent and loyal readers"
    weight: 0.25
    description: "Inspiring foundational documents"
