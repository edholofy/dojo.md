meta:
  id: comprehensive-newsletter-engagement
  level: 5
  course: newsletter-writing-curation
  type: output
  description: "Execute a complete 12-month newsletter engagement — from launch through growth, monetization, community building, and optimization"
  tags: [newsletter, engagement, 12-month, comprehensive, capstone, mastery]

state: {}

trigger: |
  This capstone scenario simulates a complete 12-month newsletter
  journey from launch to established publication. It requires
  integrating every skill from the course — writing, curation,
  growth, monetization, analytics, community, and optimization.

  Execute a full-year newsletter engagement:

  Newsletter: "The Operator" — a newsletter for operations leaders
  (COOs, VP Ops, Directors of Operations) at growth-stage companies
  Concept: Weekly original essay + curated ops resources
  Author: Former COO of a $200M company
  Starting point: 0 subscribers, pre-launch

  Part 1: Pre-launch (Month 0)
  1. Validate the concept:
     - Audience research and competitive analysis
     - Positioning statement and unique angle
     - Content pillar definition (3-4 pillars)
  2. Build the foundation:
     - Write the brand voice guidelines
     - Design the newsletter template (describe in detail)
     - Create the landing page copy
     - Build the pre-launch waitlist campaign
  3. Pre-write content:
     - Write the complete first 3 newsletter issues
     - Create the 4-email onboarding sequence
     - Draft the referral program copy

  Part 2: Launch and early growth (Months 1-3)
  Write newsletter issues for key milestones:
  4. Month 1 Issue 1: The launch issue (write complete)
  5. Month 2: First milestone (500 subscribers) celebration
  6. Month 3: First monetization experiment announcement
  Include for each: Growth tactics used, metrics achieved, lessons learned

  Part 3: Growth phase (Months 4-6)
  7. Month 4: Cross-promotion launch with a complementary newsletter
  8. Month 5: Introduce reader participation section
  9. Month 6: Launch paid premium tier
  Write the key communications for each milestone and track
  cumulative subscriber growth and engagement trends.

  Part 4: Optimization phase (Months 7-9)
  10. Month 7: Major A/B test results and content pivot
  11. Month 8: First virtual event (webinar with operations leaders)
  12. Month 9: Rebrand/refresh based on 9 months of data
  Show how data from months 1-9 informs optimization decisions.

  Part 5: Maturity phase (Months 10-12)
  13. Month 10: Sponsorship program launch
  14. Month 11: Annual predictions and year-end content
  15. Month 12: Year-in-review and Year 2 strategy
  Write:
  - The annual performance report (key metrics for all 12 months)
  - The Year 2 strategy document
  - The state of "The Operator" community

  Throughout all 12 months:
  - Track subscriber count, open rate, CTR, and revenue monthly
  - Show how content quality and voice evolved
  - Demonstrate how early decisions created foundations for later success
  - Include at least 1 challenge/setback and how it was handled

assertions:
  - type: llm_judge
    criteria: "The 12-month arc shows genuine progression — the newsletter in Month 12 is noticeably more mature, confident, and valuable than Month 1"
    weight: 0.25
    description: "Genuine 12-month progression"
  - type: llm_judge
    criteria: "Written newsletter issues are high quality — the launch issue, milestone issues, and key communications are all publication-ready"
    weight: 0.25
    description: "High quality written issues"
  - type: llm_judge
    criteria: "Growth and optimization decisions are data-informed — A/B test results, metric trends, and audience feedback drive the strategy changes"
    weight: 0.25
    description: "Data-informed decisions"
  - type: llm_judge
    criteria: "The Year 2 strategy builds on Year 1 learnings — it's not a generic plan but a specific strategy informed by 12 months of real data"
    weight: 0.25
    description: "Learning-informed Year 2 strategy"
