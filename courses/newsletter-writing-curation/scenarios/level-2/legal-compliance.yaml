meta:
  id: legal-compliance
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Navigate newsletter legal compliance — CAN-SPAM, GDPR, CCPA, unsubscribe requirements, and consent management"
  tags: [newsletter, compliance, can-spam, gdpr, legal, intermediate]

state: {}

trigger: |
  Newsletter legal compliance is non-negotiable. CAN-SPAM
  violations can cost $53,000 per email. GDPR penalties reach
  €20M or 4% of global revenue. Key requirements include:
  one-click unsubscribe, valid sender address, 10-day unsubscribe
  processing for CAN-SPAM (immediate for GDPR), and explicit
  consent for EU subscribers.

  Part 1: Regulatory overview
  Explain the key regulations affecting newsletters:
  1. CAN-SPAM Act (US):
     - Required elements in every email
     - Opt-out processing requirements
     - Penalties and enforcement
  2. GDPR (EU/UK):
     - Consent requirements (explicit opt-in)
     - Right to erasure
     - Data processing transparency
     - Lawful basis for sending
  3. CCPA/CPRA (California):
     - Disclosure requirements
     - Opt-out rights
     - Data sale implications
  4. CASL (Canada):
     - Express vs. implied consent
     - Consent expiry rules

  For each regulation, provide:
  - Who it applies to
  - What you must do
  - What you must not do
  - Penalties for violations

  Part 2: Compliance implementation
  For a newsletter with subscribers in the US, EU, and Canada:

  1. Design the compliant signup process:
     - Signup form requirements (consent language, checkboxes)
     - Double opt-in vs. single opt-in (when to use each)
     - Privacy policy requirements
     - Cookie consent considerations

  2. Write the required email elements:
     - Compliant footer template (with all required information)
     - Unsubscribe process design
     - Sender identification requirements
     - Physical address display options

  3. Create the consent management system:
     - How to record and prove consent
     - How to handle subscribers across jurisdictions
     - Re-consent campaigns (when and how)

  Part 3: Common compliance mistakes
  Identify the top 10 compliance mistakes newsletter operators make:
  - With specific fixes and examples of compliant alternatives
  - Include real-world examples of enforcement actions

  Part 4: Compliance checklist
  Create a comprehensive pre-launch compliance checklist for
  a newsletter that will have subscribers globally.

assertions:
  - type: llm_judge
    criteria: "Regulatory differences are clearly explained — the reader understands how CAN-SPAM, GDPR, CCPA, and CASL differ in their requirements"
    weight: 0.25
    description: "Clear regulatory distinctions"
  - type: llm_judge
    criteria: "Implementation guidance is specific enough to act on — signup forms, footer templates, and consent management are described at implementation detail"
    weight: 0.30
    description: "Implementation-ready guidance"
  - type: llm_judge
    criteria: "Multi-jurisdiction handling is addressed — the guide explains how to comply when subscribers span US, EU, and Canada"
    weight: 0.25
    description: "Multi-jurisdiction handling"
  - type: llm_judge
    criteria: "Compliance mistakes include real risks that newsletter operators commonly face, not just theoretical concerns"
    weight: 0.20
    description: "Realistic compliance mistakes"
