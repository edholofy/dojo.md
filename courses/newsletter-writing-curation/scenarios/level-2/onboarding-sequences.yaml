meta:
  id: onboarding-sequences
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Design new subscriber onboarding sequences that reduce early churn and build engagement habits"
  tags: [newsletter, onboarding, welcome, retention, automation, intermediate]

state: {}

trigger: |
  The first 7 days after someone subscribes are critical. Welcome
  emails have the highest open rates of any email type (up to 83%),
  and a well-designed onboarding sequence reduces early unsubscribes
  and builds the reading habit.

  Design onboarding sequences for 3 different newsletters:

  Newsletter A: "Startup Weekly" — curated startup news
  Subscribers: Growing at 200/week
  First issue arrives: Next scheduled send (weekly, Tuesdays)
  Gap: Some subscribers wait up to 6 days for their first issue

  Design a 4-email onboarding sequence:
  Email 1 (immediate): Welcome + what to expect + best past content
  Email 2 (Day 2): Your story / why you write this newsletter
  Email 3 (Day 4): Preference survey (what topics interest them?)
  Email 4 (Day 6): Top 3 "best of" past issues before first regular send

  Write the complete copy for all 4 emails.

  Newsletter B: "Code Review" — paid technical newsletter ($10/month)
  Subscribers: Converting from free trial
  Goal: Demonstrate value quickly to prevent cancellation

  Design a 3-email onboarding sequence:
  Email 1 (immediate): Welcome + how to get max value + exclusive resource
  Email 2 (Day 3): Feature walkthrough + community access instructions
  Email 3 (Day 7): Check-in + ask for feedback + showcase what's coming

  Write the complete copy for all 3 emails.

  Newsletter C: "Local Eats" — restaurant review newsletter
  Subscribers: Mix of foodies and casual readers
  Goal: Build local community engagement

  Design a 3-email onboarding sequence:
  Email 1 (immediate): Welcome + your top 5 restaurant picks
  Email 2 (Day 3): How the reviews work + invite to share favorites
  Email 3 (Day 5): Neighborhood preference survey + social follow CTA

  Write the complete copy for all 3 emails.

  For each sequence:
  - Include subject lines for each email
  - Note the optimal send time for each email
  - Explain the strategic purpose of each email's timing and content
  - Define success metrics (what to measure)

assertions:
  - type: llm_judge
    criteria: "All onboarding emails are fully written with subject lines, body copy, and CTAs — not just outlines or descriptions"
    weight: 0.25
    description: "Fully written onboarding emails"
  - type: llm_judge
    criteria: "Each sequence is strategically sequenced — every email has a clear purpose that builds on the previous one and moves toward engagement"
    weight: 0.25
    description: "Strategically sequenced emails"
  - type: llm_judge
    criteria: "The 3 sequences are distinct — startup curated, paid technical, and local restaurant newsletters have genuinely different onboarding approaches"
    weight: 0.25
    description: "Distinct onboarding approaches"
  - type: llm_judge
    criteria: "The gap problem (subscribers waiting days for first content) is explicitly solved in each sequence"
    weight: 0.25
    description: "First-content gap solved"
