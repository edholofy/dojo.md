meta:
  id: newsletter-seo-repurposing
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Optimize newsletters for SEO and repurpose newsletter content across blog posts, social media, and other channels"
  tags: [newsletter, seo, repurposing, content, distribution, intermediate]

state: {}

trigger: |
  Newsletter content doesn't have to live and die in the inbox.
  Repurposing newsletter content for SEO, social media, and other
  channels multiplies the return on your writing investment and
  drives new subscriber growth through organic discovery.

  Part 1: Newsletter SEO strategy
  Explain how to make newsletter content discoverable:
  1. Newsletter archive pages (SEO-optimized web versions)
  2. Meta titles and descriptions for archived issues
  3. Internal linking between newsletter archives
  4. Keyword strategy for newsletter topics
  5. Schema markup for newsletter content
  6. RSS feed optimization
  7. Substack/Beehiiv/Ghost SEO features and how to use them

  Part 2: Content repurposing system
  Take this sample newsletter issue about "5 Pricing Strategies
  for SaaS Startups" and show how to repurpose it into:

  1. Blog post version:
     - How to expand the newsletter into a 1,500-word SEO blog post
     - What to add (examples, data, visuals, internal links)
     - Write the blog post headline, meta description, and outline

  2. LinkedIn post:
     - Convert the key insight into a 1,200-character LinkedIn post
     - Write the complete post with hook and CTA

  3. Twitter/X thread:
     - Convert into a 7-tweet thread
     - Write all 7 tweets with the first tweet as the hook

  4. Short-form video script:
     - Convert the core idea into a 60-second video script
     - Write the hook, body, and CTA

  5. Podcast talking points:
     - Convert into a 10-minute podcast segment outline
     - Include discussion questions and key points

  Part 3: Repurposing workflow
  Design a weekly repurposing workflow:
  1. Which content to repurpose (not everything should be repurposed)
  2. The repurposing sequence (newsletter → blog → social → video)
  3. Timing strategy (when to post each repurposed piece)
  4. Tools to streamline the process
  5. How to track which repurposed content drives newsletter signups

assertions:
  - type: llm_judge
    criteria: "Newsletter SEO strategy covers technical implementation — archive pages, schema markup, and platform-specific features are addressed"
    weight: 0.25
    description: "Technical SEO implementation"
  - type: llm_judge
    criteria: "Repurposed content is genuinely adapted to each platform — the LinkedIn post feels like LinkedIn, the tweets feel like Twitter, not copy-pasted newsletter text"
    weight: 0.30
    description: "Platform-adapted repurposing"
  - type: llm_judge
    criteria: "The repurposing workflow is sustainable — designed for a single person to execute weekly without burnout"
    weight: 0.25
    description: "Sustainable repurposing workflow"
  - type: llm_judge
    criteria: "Content selection criteria for repurposing are clear — not everything gets repurposed, and the guidance explains how to identify high-repurposing-value content"
    weight: 0.20
    description: "Clear selection criteria"
