meta:
  id: newsletter-monetization
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Monetize newsletters through sponsorships, paid tiers, affiliate marketing, and premium content"
  tags: [newsletter, monetization, sponsorship, paid, affiliate, intermediate]

state: {}

trigger: |
  Newsletter monetization has multiple paths. Paid subscriptions
  account for 16-67% of newsletter income (highest contributor),
  sponsorships offer 3-10x better CTR than display ads with CPM
  rates of $5-$20+, and the best strategy diversifies: 40%
  sponsorships, 40% paid subscriptions, 20% affiliate/other.

  Design a monetization strategy for:

  Newsletter: "Product Craft" — a weekly newsletter on product
  management for senior PMs and product leaders
  Subscribers: 8,000 (free)
  Open rate: 45%, CTR: 4.2%
  Audience: Senior PMs, Directors of Product, VPs (high-value B2B)
  Current revenue: $0 (launching monetization)

  Part 1: Sponsorship strategy
  1. Create the media kit / sponsorship one-pager:
     - Audience demographics and value proposition
     - Sponsorship placement options (header, mid-roll, footer)
     - Pricing (CPM and flat rate for each placement)
     - Minimum and maximum sponsor frequency
  2. Write 3 sample sponsor integrations:
     - Header sponsor (50-75 words) for a project management tool
     - Mid-roll sponsor (100-150 words) for a PM certification program
     - Classified listing for a product leadership job
  3. Create the sponsor outreach email template
  4. Define sponsor acceptance criteria (who to accept, who to reject)

  Part 2: Paid subscription tier
  1. Design the free vs. paid structure:
     - What stays free (and why)
     - What goes behind the paywall (and why it's worth paying for)
     - Pricing ($X/month, $Y/year — with reasoning)
  2. Write the upgrade pitch (in-newsletter CTA)
  3. Design the paid subscriber onboarding sequence (3 emails)
  4. Create the annual vs. monthly pricing strategy

  Part 3: Affiliate marketing
  1. Identify 5 affiliate opportunities relevant to the PM audience
  2. Write natural affiliate integrations for 2 products:
     - A PM tool (project management software)
     - A PM book or course
  3. Design the disclosure and transparency policy
  4. Calculate expected revenue per recommendation

  Part 4: Revenue projections
  1. Project monthly revenue for each stream at current subscriber count
  2. Model revenue at 15,000 and 25,000 subscribers
  3. Calculate revenue per subscriber across all streams
  4. Define the "sustainability threshold" (when this becomes a full-time income)

assertions:
  - type: llm_judge
    criteria: "The media kit is professional and persuasive — it would convince a B2B advertiser that this newsletter is worth sponsoring"
    weight: 0.25
    description: "Professional persuasive media kit"
  - type: llm_judge
    criteria: "Sponsor integrations feel natural — they add value for readers rather than feeling like intrusive ads"
    weight: 0.25
    description: "Natural sponsor integrations"
  - type: llm_judge
    criteria: "Free vs. paid structure is strategically sound — the free tier is valuable enough to grow, the paid tier is compelling enough to convert"
    weight: 0.25
    description: "Strategic free-paid balance"
  - type: llm_judge
    criteria: "Revenue projections are realistic — CPM rates, conversion rates, and growth assumptions are grounded in industry benchmarks"
    weight: 0.25
    description: "Realistic revenue projections"
