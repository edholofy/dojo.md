meta:
  id: newsletter-growth-strategies
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Design newsletter growth strategies — signup forms, lead magnets, referral programs, and cross-promotion"
  tags: [newsletter, growth, signup, referral, lead-magnet, intermediate]

state: {}

trigger: |
  Growing a newsletter requires systematic strategies beyond
  "write great content and hope people find it." Referral
  programs can drive explosive growth — Milk Road gained 26,000
  subscribers in 6 months through referral incentives. Multi-step
  signup forms outperform single-page forms, and checklists
  convert best as lead magnets.

  Design a comprehensive growth plan for:

  Newsletter: "Data Driven" — a weekly newsletter on data science
  and analytics for business professionals
  Current subscribers: 1,500
  Goal: Reach 10,000 subscribers in 6 months
  Budget: $500/month for growth activities
  Team: 1 person (the author)

  Part 1: Signup optimization
  1. Design the newsletter landing page copy:
     - Headline and subheadline
     - 3-4 bullet points on what subscribers get
     - Social proof elements
     - Signup form design (fields, CTA button copy)
  2. Create a lead magnet:
     - Propose 3 lead magnet options with pros/cons
     - Write the signup flow copy for the winning option
     - Design the delivery sequence (signup → delivery → onboarding)
  3. Optimize existing conversion points:
     - Website popup strategy (timing, trigger, copy)
     - Blog post CTAs (inline and end-of-post)
     - Social media bio and link optimization

  Part 2: Referral program
  1. Design a tiered referral program:
     - Tier 1 (1 referral): What reward?
     - Tier 2 (5 referrals): What reward?
     - Tier 3 (15 referrals): What reward?
     - Tier 4 (50 referrals): What reward?
  2. Write the referral CTA copy for each newsletter issue
  3. Write the referral tracking email (showing progress)
  4. Identify potential risks (gaming, fake signups) and mitigations

  Part 3: Cross-promotion and partnerships
  1. Identify 5 types of newsletters to cross-promote with
  2. Write the cross-promotion outreach email
  3. Write the cross-promotion blurb (how you'd promote a partner)
  4. Design the "newsletter swap" framework

  Part 4: Content-driven growth
  1. Design the SEO strategy for newsletter content
  2. Create the social media distribution plan (repurposing content)
  3. Build the guest contribution strategy (writing for other publications)
  4. Plan the community engagement approach (Reddit, Twitter, LinkedIn)

  Part 5: 6-month growth roadmap
  Create a month-by-month growth plan with:
  - Target subscriber count for each month
  - Primary growth channel to focus on
  - Specific actions to take
  - Budget allocation

assertions:
  - type: llm_judge
    criteria: "Growth strategies are specific and actionable — not generic 'create great content' advice but detailed tactics with implementation steps"
    weight: 0.25
    description: "Specific actionable strategies"
  - type: llm_judge
    criteria: "The referral program is well-designed — tiers are motivating, rewards are appropriate for a 1-person operation with $500/month budget"
    weight: 0.25
    description: "Well-designed referral program"
  - type: llm_judge
    criteria: "The 6-month roadmap is realistic — growth targets are achievable and the channel mix evolves appropriately over time"
    weight: 0.25
    description: "Realistic growth roadmap"
  - type: llm_judge
    criteria: "Landing page copy and signup flow are persuasive — the value proposition is clear and the conversion path is frictionless"
    weight: 0.25
    description: "Persuasive signup experience"
