meta:
  id: deliverability-optimization
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Optimize newsletter deliverability — SPF, DKIM, DMARC authentication, inbox placement, and list hygiene"
  tags: [newsletter, deliverability, authentication, inbox, list-hygiene, intermediate]

state: {}

trigger: |
  A newsletter that lands in spam is worse than no newsletter at
  all. Deliverability depends on sender authentication (SPF, DKIM,
  DMARC), sender reputation, list hygiene, and content quality.
  Even well-written newsletters fail if they don't reach the inbox.

  Part 1: Authentication setup
  Explain the 3 email authentication protocols:
  1. SPF (Sender Policy Framework):
     - What it does
     - How to set it up (DNS record format)
     - Common mistakes
  2. DKIM (DomainKeys Identified Mail):
     - What it does
     - How to set it up
     - Key rotation best practices
  3. DMARC (Domain-based Message Authentication):
     - What it does
     - Policy options (none, quarantine, reject)
     - How to implement progressively

  Part 2: Sender reputation management
  Explain the factors that affect sender reputation:
  1. Bounce rate management (hard bounces vs. soft bounces)
  2. Complaint rate monitoring (feedback loops)
  3. Engagement signals (opens, clicks, replies)
  4. Spam trap avoidance
  5. Sending volume consistency
  6. Domain and IP reputation monitoring tools

  For each factor, provide:
  - How to measure it
  - What healthy looks like
  - Warning signs of problems
  - Remediation steps if things go wrong

  Part 3: List hygiene program
  Design a list hygiene program for a 20,000 subscriber newsletter:
  1. Regular list cleaning schedule (when and how often)
  2. Bounce handling automation (remove after X bounces)
  3. Re-engagement campaigns for inactive subscribers
  4. Sunset policy (when to remove unengaged subscribers)
  5. List verification tools and processes

  Write the re-engagement email sequence (3 emails) for subscribers
  who haven't opened in 90 days:
  - Email 1: "We miss you" — re-engagement attempt
  - Email 2: "Last chance" — final engagement attempt
  - Email 3: "Goodbye" — confirming removal unless they re-engage

  Part 4: Content deliverability
  List the content factors that trigger spam filters:
  - Words and phrases to avoid
  - Image-to-text ratio guidelines
  - Link best practices
  - HTML coding considerations

assertions:
  - type: llm_judge
    criteria: "Authentication protocols are explained clearly enough that a non-technical newsletter operator could understand and implement them"
    weight: 0.25
    description: "Clear authentication guidance"
  - type: llm_judge
    criteria: "Sender reputation factors are comprehensive and include specific monitoring tools and remediation steps"
    weight: 0.25
    description: "Comprehensive reputation management"
  - type: llm_judge
    criteria: "The re-engagement email sequence is well-written — each email escalates appropriately and gives subscribers a clear path to re-engage"
    weight: 0.25
    description: "Well-written re-engagement sequence"
  - type: llm_judge
    criteria: "List hygiene program is systematic — includes schedules, automation rules, and clear policies rather than one-time cleanup advice"
    weight: 0.25
    description: "Systematic list hygiene"
