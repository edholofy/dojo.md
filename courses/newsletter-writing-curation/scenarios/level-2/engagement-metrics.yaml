meta:
  id: engagement-metrics
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Understand and optimize newsletter engagement metrics — open rates, CTR, CTOR, unsubscribes, and benchmarks by industry"
  tags: [newsletter, metrics, analytics, open-rate, ctr, intermediate]

state: {}

trigger: |
  Newsletter success is measured by more than subscriber count.
  Key metrics include open rate (43.46% average), click-through
  rate (2.09% average), click-to-open rate (6.81%), and
  unsubscribe rate (0.22%). Segmented email lists see +14.31%
  higher open rates and +101% higher CTR.

  Part 1: Metrics deep dive
  Explain each key newsletter metric:
  1. Open rate — what it means, what affects it, Apple MPP impact
  2. Click-through rate (CTR) — calculation, benchmarks, optimization
  3. Click-to-open rate (CTOR) — why it's more useful than CTR
  4. Unsubscribe rate — healthy ranges, warning signs
  5. Bounce rate (hard vs. soft) — list hygiene implications
  6. Forward/share rate — growth indicator
  7. Reply rate — engagement quality signal
  8. List growth rate — net growth calculation
  9. Revenue per subscriber — for monetized newsletters

  For each metric, provide:
  - How to calculate it
  - Industry benchmarks (tech, B2B, e-commerce, media, creator)
  - What "good," "average," and "needs improvement" look like
  - Top 3 levers to improve it

  Part 2: Dashboard interpretation exercise
  Given these metrics for "Design Weekly" newsletter (5,000 subs):

  Last 4 issues:
  Issue #45: Open 38%, CTR 3.2%, Unsub 0.15%, Replies 12
  Issue #46: Open 42%, CTR 4.1%, Unsub 0.08%, Replies 28
  Issue #47: Open 35%, CTR 1.8%, Unsub 0.31%, Replies 5
  Issue #48: Open 40%, CTR 2.9%, Unsub 0.12%, Replies 18

  1. Analyze trends across these 4 issues
  2. Identify what likely happened with Issue #47 (spike in unsubs,
     drop in CTR and replies)
  3. Identify what likely worked well in Issue #46
  4. Recommend 3 specific actions to improve overall performance
  5. Create a weekly metrics report template

  Part 3: Apple Mail Privacy Protection
  Explain how Apple's Mail Privacy Protection (MPP) affects
  open rate tracking and what alternative engagement signals
  to prioritize.

assertions:
  - type: llm_judge
    criteria: "All 9 metrics are clearly explained with accurate calculations, industry benchmarks, and specific improvement levers"
    weight: 0.25
    description: "Complete metric explanations"
  - type: llm_judge
    criteria: "Dashboard interpretation shows analytical thinking — the analysis of Issues #46 and #47 goes beyond surface numbers to identify likely causes"
    weight: 0.30
    description: "Insightful dashboard interpretation"
  - type: llm_judge
    criteria: "Apple MPP impact is accurately explained with practical alternatives for measuring engagement"
    weight: 0.20
    description: "Accurate MPP analysis"
  - type: llm_judge
    criteria: "Improvement recommendations are specific and tied to the actual metrics data, not generic advice"
    weight: 0.25
    description: "Data-tied recommendations"
