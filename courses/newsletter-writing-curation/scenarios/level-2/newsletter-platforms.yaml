meta:
  id: newsletter-platforms
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Compare and choose newsletter platforms — Substack, ConvertKit/Kit, Beehiiv, Mailchimp, and Ghost"
  tags: [newsletter, platforms, substack, beehiiv, convertkit, mailchimp, intermediate]

state: {}

trigger: |
  Choosing the right newsletter platform affects growth, monetization,
  and workflow. Key differences: Substack is easiest to start but
  takes 10% of paid subscriptions. Kit (formerly ConvertKit) has the
  best automation with free tier up to 1K subscribers. Beehiiv is
  growth-focused with no fees on paid subscriptions and 2,500 free
  tier. Mailchimp is SMB-friendly with 500 free tier. Ghost is
  content-first with self-hosted or managed options.

  Part 1: Platform comparison
  Create a detailed comparison of 5 platforms across these dimensions:

  For each platform (Substack, Kit, Beehiiv, Mailchimp, Ghost):
  1. Pricing tiers (free and paid, what's included at each level)
  2. Key features (editor, templates, analytics, automation)
  3. Growth tools (referral programs, SEO, recommendations)
  4. Monetization support (paid subs, ads, sponsorships)
  5. Deliverability reputation
  6. Data ownership and portability
  7. Customization and design flexibility
  8. Best audience (who should use this platform)
  9. Biggest limitation

  Part 2: Platform selection exercise
  Recommend the best platform for each of these 5 creators:

  Creator A: Solo writer starting a personal essay newsletter
  Needs: Simple setup, built-in audience discovery, free to start
  Goal: Build an audience of readers who love long-form writing

  Creator B: SaaS marketer building a company newsletter
  Needs: Advanced automation, segmentation, branded templates
  Goal: Nurture leads through the marketing funnel

  Creator C: Media company launching a paid newsletter business
  Needs: No revenue share, growth tools, multiple newsletters
  Goal: Build a profitable media business with 50K+ subscribers

  Creator D: Developer creating a technical tutorial newsletter
  Needs: Code block support, API access, customization
  Goal: Self-hosted, full control, tech-savvy audience

  Creator E: Small business owner sending monthly updates
  Needs: Easy to use, basic design tools, affordable
  Goal: Stay in touch with 500 local customers

  For each, recommend a platform with specific reasoning.

  Part 3: Migration guide
  Write a platform migration checklist for someone moving from
  Mailchimp to Beehiiv, covering:
  - Subscriber export/import process
  - Content migration
  - DNS/domain setup
  - Automation recreation
  - Testing before going live
  - Communication to subscribers about the change

assertions:
  - type: llm_judge
    criteria: "Platform comparison is accurate and specific — pricing, features, and limitations reflect current platform capabilities rather than generic descriptions"
    weight: 0.25
    description: "Accurate specific comparison"
  - type: llm_judge
    criteria: "Platform recommendations match each creator's needs — the reasoning considers their specific goals, technical skills, and budget constraints"
    weight: 0.30
    description: "Needs-matched recommendations"
  - type: llm_judge
    criteria: "The comparison format is clear and scannable — a reader can quickly find the information they need to make a decision"
    weight: 0.20
    description: "Clear scannable format"
  - type: llm_judge
    criteria: "Migration guide is comprehensive and practical — covers technical steps, subscriber communication, and risk mitigation"
    weight: 0.25
    description: "Comprehensive migration guide"
