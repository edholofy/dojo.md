meta:
  id: newsletter-segmentation
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Implement audience segmentation for newsletters — behavioral, demographic, preference-based, and engagement-based segments"
  tags: [newsletter, segmentation, personalization, targeting, intermediate]

state: {}

trigger: |
  Segmented newsletter lists generate +14.31% higher open rates,
  +101% higher CTR, and +760% higher revenue compared to
  non-segmented sends. But effective segmentation requires
  strategy — not just splitting your list randomly.

  Design a segmentation strategy for:

  Newsletter: "Founder's Playbook" — a newsletter for startup founders
  Subscribers: 12,000
  Content: Mix of fundraising, growth, product, hiring, and mindset
  Platform: ConvertKit (supports tags, segments, automations)
  Current approach: Same email to everyone, every week

  Part 1: Segmentation framework
  Design segments across 4 dimensions:
  1. Stage-based (idea → pre-revenue → revenue → scaling → exit)
  2. Interest-based (fundraising, growth, product, hiring, mindset)
  3. Engagement-based (active, passive, at-risk, dormant)
  4. Source-based (organic, referral, lead magnet, paid acquisition)

  For each dimension:
  - Define the segments
  - Explain how to identify which segment a subscriber belongs to
  - Describe what different content each segment should receive

  Part 2: Implementation
  1. Design the preference center (what subscribers can choose)
  2. Create the welcome survey (3-5 questions to segment new subscribers)
  3. Write the behavioral tagging rules (auto-segment based on clicks)
  4. Design 3 automated segment-specific email sequences:
     - Sequence for new founders (idea stage)
     - Sequence for scaling founders ($1M+ revenue)
     - Re-engagement sequence for dormant subscribers

  Part 3: Content adaptation
  Take this week's newsletter topic: "How to hire your first
  engineer" and write 3 versions:
  1. Version for pre-revenue founders (budget-conscious, first hire)
  2. Version for scaling founders (have hired before, building teams)
  3. Version for non-technical founders (different pain points)

  Show how the subject line, lead, body, and CTA change for each.

  Part 4: Measurement
  1. Define how to measure segmentation effectiveness
  2. Set benchmarks for each segment's performance
  3. Create the quarterly segmentation review process

assertions:
  - type: llm_judge
    criteria: "Segmentation framework covers all 4 dimensions with clear segment definitions and actionable identification criteria"
    weight: 0.25
    description: "Complete segmentation framework"
  - type: llm_judge
    criteria: "The 3 content versions demonstrate real adaptation — not just minor word changes but genuinely different framing, examples, and CTAs for each segment"
    weight: 0.30
    description: "Genuine content adaptation"
  - type: llm_judge
    criteria: "Implementation is practical for a ConvertKit setup — tags, automations, and preference centers are described in a way that could be built immediately"
    weight: 0.25
    description: "Practical implementation"
  - type: llm_judge
    criteria: "The welcome survey and behavioral tagging create a system that improves segmentation over time without requiring manual effort"
    weight: 0.20
    description: "Self-improving segmentation"
