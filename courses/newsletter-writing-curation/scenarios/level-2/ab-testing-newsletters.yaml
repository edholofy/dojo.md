meta:
  id: ab-testing-newsletters
  level: 2
  course: newsletter-writing-curation
  type: output
  description: "Design and run A/B tests for newsletter optimization — subject lines, content, CTAs, send times, and format"
  tags: [newsletter, ab-testing, optimization, experimentation, intermediate]

state: {}

trigger: |
  A/B testing is how you move from guessing to knowing what works.
  But newsletter A/B testing has unique constraints — smaller sample
  sizes than web traffic, one-shot sends, and the need for
  statistical significance.

  Part 1: A/B testing fundamentals for newsletters
  Explain the key principles:
  1. What to test (subject lines, preheader, content, CTAs, timing)
  2. How to set up a proper test (control vs. variant, sample size)
  3. Statistical significance for email (minimum sample sizes)
  4. How long to run before declaring a winner
  5. One variable at a time vs. multivariate testing
  6. Common testing pitfalls and how to avoid them

  Part 2: Design 5 A/B tests
  For "SaaS Insider" newsletter (10,000 subscribers, weekly):

  Test 1: Subject line test
  - Define the hypothesis
  - Write the control and variant subject lines
  - Calculate minimum sample size needed
  - Define the success metric
  - Set the decision criteria

  Test 2: Content format test
  - Hypothesis: Short summary format vs. deep-dive single topic
  - Design the two versions (brief outlines of each)
  - Define what "winning" looks like (open rate? CTR? replies?)

  Test 3: CTA test
  - Hypothesis: Button CTA vs. inline text CTA
  - Write both versions
  - Define measurement approach

  Test 4: Send time test
  - Hypothesis: Tuesday 9am vs. Thursday 2pm
  - Design the testing protocol (how to isolate time from content)
  - Define the measurement window

  Test 5: Personalization test
  - Hypothesis: Personalized subject line (with first name) vs. generic
  - Design the test with proper controls
  - Address potential confounders

  Part 3: Testing calendar
  Create a 3-month A/B testing calendar:
  - Which tests to run in what order (sequential, not overlapping)
  - How results from each test inform the next
  - How to document and apply learnings
  - Template for recording test results

assertions:
  - type: llm_judge
    criteria: "A/B testing fundamentals are accurately explained — sample sizes, statistical significance, and one-variable isolation are correctly addressed"
    weight: 0.25
    description: "Accurate testing fundamentals"
  - type: llm_judge
    criteria: "Each of the 5 tests has a clear hypothesis, well-designed variants, and appropriate success metrics"
    weight: 0.30
    description: "Well-designed test plans"
  - type: llm_judge
    criteria: "The testing calendar is sequential and logical — tests build on each other and results compound over the 3-month period"
    weight: 0.25
    description: "Logical testing calendar"
  - type: llm_judge
    criteria: "Common pitfalls are addressed — including testing too many variables, declaring winners too early, and not accounting for list quality"
    weight: 0.20
    description: "Pitfalls addressed"
