meta:
  id: competitive-market-intelligence
  level: 4
  course: competitive-battlecards
  type: output
  description: "Build market-level competitive intelligence — go beyond individual competitor tracking to understand market trends, category shifts, and emerging threats"
  tags: [sales, battlecards, market-intelligence, trends, emerging-threats, strategy, expert]

state: {}

trigger: |
  You're the Chief Strategy Officer at "WorkflowPro" (enterprise
  workflow automation, $130M ARR). Your CI program is good at
  tracking your 5 known competitors. But the CEO says: "I don't
  worry about the competitors I know. I worry about the ones I
  don't see coming." She's right — 3 years ago, nobody was worried
  about Zapier in the enterprise space. Now they have $350M ARR.

  Market signals you're tracking:
  1. VC funding: 4 new workflow automation startups raised $50M+
     in the last 6 months, all positioning around "AI-native"
  2. Platform plays: Salesforce, Microsoft, and ServiceNow are
     all building native workflow automation into their platforms
  3. Open source: An open-source workflow engine (n8n) just hit
     50,000 GitHub stars and is launching an enterprise version
  4. Adjacent category: RPA vendors (UiPath, Automation Anywhere)
     are expanding into workflow automation, blurring category lines
  5. Customer behavior: 30% of your customers are using AI coding
     tools (Cursor, Copilot) to build custom automations instead
     of buying workflow platforms

  Tasks:
  1. Write the "Market Intelligence Report" — a strategic analysis
     of all 5 signals and what they mean for WorkflowPro's
     competitive position. For each: the signal, the potential
     impact (existential, significant, or minor), the timeline
     (1 year, 2-3 years, 5+ years), and the recommended response.
     This is a board-level document, not a sales tool.

  2. Create the "Emerging Competitor Assessment Framework" — how
     you identify, evaluate, and track potential competitors BEFORE
     they become threats. Include: early warning signals (funding,
     hiring, product launches), the evaluation criteria (market
     overlap, technical capability, go-to-market strength), and the
     response playbook (when to ignore, when to monitor, when to
     act).

  3. Update the battlecard strategy to address platform plays
     (Signal 2). Salesforce building native workflow automation
     is different from competing against a standalone vendor. Write
     the "Anti-Platform Battlecard" that helps reps position
     WorkflowPro against customers who say "we'll just use what
     comes with Salesforce/Microsoft/ServiceNow."

assertions:
  - type: llm_judge
    criteria: "Market intelligence report is strategically valuable — assesses all 5 signals with honest impact ratings and timelines, identifies which threats are existential vs. manageable, and provides specific recommended responses"
    weight: 0.35
    description: "Strategically valuable market report"
  - type: llm_judge
    criteria: "Emerging competitor framework catches threats early — includes specific early warning signals, practical evaluation criteria, and a tiered response playbook that prevents both over-reaction and under-reaction"
    weight: 0.35
    description: "Early-warning competitor framework"
  - type: llm_judge
    criteria: "Anti-platform battlecard is credible — addresses the 'just use what comes with Salesforce' argument with real advantages of best-of-breed (depth, flexibility, multi-platform) that prospects find compelling"
    weight: 0.30
    description: "Credible anti-platform battlecard"
