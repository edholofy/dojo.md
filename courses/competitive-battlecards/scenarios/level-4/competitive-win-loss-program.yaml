meta:
  id: competitive-win-loss-program
  level: 4
  course: competitive-battlecards
  type: output
  description: "Build a systematic win/loss program — design the research methodology that continuously feeds competitive intelligence into battlecards"
  tags: [sales, battlecards, win-loss, research, methodology, program, expert]

state: {}

trigger: |
  You're the VP of Strategy at "PlatformOne" (enterprise SaaS,
  $150M ARR, 120 reps). The CEO has mandated a formal win/loss
  program after a devastating Q3 where competitive win rate dropped
  to 18%. "I want to know exactly why we're losing," she says.

  Current state:
  - 400 competitive deals per quarter (win rate: 18%)
  - Win/loss data: CRM "closed-lost" reason dropdown (unreliable —
    reps select random reasons)
  - No formal win/loss interviews conducted
  - Sales managers review losses in pipeline reviews but focus on
    forecast impact, not root cause
  - No feedback loop from losses to product, marketing, or enablement

  Resources available:
  - Budget: $100K for win/loss program
  - Option A: Third-party win/loss firm ($75K/quarter, 30 interviews)
  - Option B: Internal program (hire analyst, build process)
  - Option C: Hybrid (outsource interviews, analyze internally)

  Data you need to capture:
  - Why did we win/lose? (the real reason, not the CRM dropdown)
  - What role did the competitor play? (primary reason or secondary?)
  - When in the cycle did we lose? (discovery, demo, proposal, final)
  - What would have changed the outcome? (pricing, features, team)
  - How was our team perceived vs. the competitor's team?

  Tasks:
  1. Design the "Win/Loss Research Methodology" — the complete
     program design. Choose the model (A, B, or C) and justify.
     Include: interview target (who to interview, sample size),
     question guide (10 core questions), analysis framework (how
     to code and categorize responses), and the reporting cadence.
     The program must be statistically meaningful, not anecdotal.

  2. Create the "Win/Loss → Battlecard Pipeline" — the process for
     turning win/loss insights into specific battlecard updates.
     Include: how insights are categorized (by competitor, by deal
     stage, by objection type), the review and validation process,
     the battlecard update trigger (what finding warrants a
     change?), and the feedback confirmation (did the update
     improve win rate?).

  3. Write the first "Win/Loss Competitive Report" — based on
     hypothetical Q3 interview data, create the executive report
     that shows: top 3 reasons for competitive losses, top 3
     competitive advantages in wins, the pattern analysis (where
     in the cycle are we weakest?), and 5 specific recommendations.
     This is the template for quarterly reporting going forward.

assertions:
  - type: llm_judge
    criteria: "Methodology is statistically sound — justified model choice, appropriate sample size for meaningful insights, structured question guide that captures real reasons not surface answers, and analysis framework that produces patterns not just anecdotes"
    weight: 0.35
    description: "Statistically sound methodology"
  - type: llm_judge
    criteria: "Win/loss to battlecard pipeline is systematic — clear categorization, validation process, specific triggers for battlecard updates, and a feedback loop that confirms whether updates improved outcomes"
    weight: 0.35
    description: "Systematic pipeline design"
  - type: llm_judge
    criteria: "Executive report template is useful — top losses, top advantages, pattern analysis, and 5 specific recommendations formatted for executive consumption, usable as a repeatable quarterly template"
    weight: 0.30
    description: "Useful executive report template"
