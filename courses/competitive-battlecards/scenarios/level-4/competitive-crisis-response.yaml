meta:
  id: competitive-crisis-response
  level: 4
  course: competitive-battlecards
  type: output
  description: "Manage competitive crises — respond when your company faces negative competitive events like losing a major account, negative press, or analyst downgrades"
  tags: [sales, battlecards, crisis, response, damage-control, reputation, expert]

state: {}

trigger: |
  You're the CRO at "SecureNet" (cybersecurity, $90M ARR). This
  week, three competitive crises hit simultaneously:

  Crisis 1: Lost your largest customer
  Your biggest customer (Fortune 500 bank, $1.2M/year contract)
  publicly announced they're switching to CrowdStrike. The bank's
  CISO posted on LinkedIn: "After evaluating our options, we've
  decided to move to CrowdStrike for their superior endpoint
  detection capabilities." The post has 3,000 likes.

  Crisis 2: Negative analyst report
  Gartner published a critical note saying SecureNet "struggles with
  enterprise-scale deployments" and "lacks the breadth of endpoint
  coverage offered by market leaders." This will be in every
  prospect's hands within days.

  Crisis 3: Competitor's viral marketing
  Palo Alto launched a comparison page titled "SecureNet vs. Palo
  Alto: Why Companies Are Switching" featuring 3 customer testimonials
  from companies that left SecureNet. It's ranking #1 for "SecureNet
  review" and "SecureNet alternative."

  Immediate impact:
  - 5 active deals requested emergency meetings
  - 3 existing customers called asking about your "stability"
  - Sales team morale has tanked — Slack is full of panic
  - Your stock price dropped 8% on the news

  Tasks:
  1. Create the "Competitive Crisis Response Plan" — your immediate
     actions (24 hours), short-term responses (1 week), and medium-
     term recovery (1 month). For each timeline: the specific actions,
     the responsible owners, the internal and external communications,
     and the battlecard updates needed.

  2. Write the emergency battlecard updates for all 3 crises. For
     each: the talking points reps should use (honest, not defensive),
     what to say when prospects bring it up, what NOT to say (things
     that will make it worse), and the evidence that counters the
     negative narrative.

  3. Write the "Competitive Counter-Strategy" for Crisis 3 (Palo
     Alto's comparison page). Your options include: creating your
     own comparison content, requesting takedown of false claims,
     SEO strategy to outrank their page, or ignoring it. Evaluate
     each option's risk/reward and recommend the best approach.

assertions:
  - type: llm_judge
    criteria: "Crisis response plan is comprehensive and timed — 24-hour actions address immediate bleeding (active deals, team morale), 1-week responses address external narrative, 1-month recovery addresses structural issues"
    weight: 0.35
    description: "Comprehensive timed crisis plan"
  - type: llm_judge
    criteria: "Emergency battlecard updates are honest — talking points acknowledge the negative events without denial, provide evidence that counters the narrative, and include clear 'do not say' guidance that prevents reps from making it worse"
    weight: 0.35
    description: "Honest emergency battlecard updates"
  - type: llm_judge
    criteria: "Counter-strategy evaluation is balanced — assesses each option for Crisis 3 (own comparison, takedown, SEO, ignore) with honest risk/reward analysis and a clear recommendation with rationale"
    weight: 0.30
    description: "Balanced counter-strategy evaluation"
