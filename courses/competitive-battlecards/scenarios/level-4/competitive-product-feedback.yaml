meta:
  id: competitive-product-feedback
  level: 4
  course: competitive-battlecards
  type: output
  description: "Use competitive intelligence to influence product strategy — build the feedback loop between battlecard insights and product roadmap decisions"
  tags: [sales, battlecards, product, roadmap, feedback, strategy, expert]

state: {}

trigger: |
  You're the Director of Competitive Strategy at "DataBridge" (data
  integration platform, $100M ARR). You sit between sales and
  product. Your battlecards reveal a recurring problem: 3 competitive
  gaps that cost you deals repeatedly.

  Gap 1: No native reverse ETL capability
  Impact: Lost 12 deals ($1.8M) last quarter to Hightouch and
  Census, which offer reverse ETL as a core feature.
  Product team's response: "Reverse ETL is a separate category.
  We shouldn't build it."
  Sales team's response: "We HAVE to build it. We're losing deals."

  Gap 2: Slower processing speed for large datasets
  Impact: Lost 8 deals ($2.1M) to Fivetran, which processes 3x
  faster on datasets over 10TB.
  Product team's response: "Architecture redesign would take 18
  months and cost $3M in engineering."
  Sales team's response: "We need to match Fivetran's speed or
  we'll keep losing enterprise deals."

  Gap 3: Limited connector ecosystem (150 vs. Fivetran's 300+)
  Impact: 15 deals ($1.2M) where missing connectors were cited,
  but only 3 specific connectors kept coming up (SAP, Snowflake
  optimization, Databricks).
  Product team's response: "We can't build 150 connectors. We need
  to prioritize."
  Sales team's response: "Just build the ones we keep losing on."

  Tasks:
  1. Write the "Competitive Gap Analysis Report" for the product
     leadership team. For each gap: present the data (deals lost,
     revenue impact), the competitive context (what competitors
     offer), the customer perspective (what buyers actually need
     vs. what they say they need), and your recommendation (build,
     buy, partner, or position around). This must be balanced — not
     just "sales says build it."

  2. Design the "Competitive Product Feedback Loop" — the ongoing
     process for routing competitive intelligence from battlecards
     to product decisions. Include: the data collection (how
     competitive losses are captured), the analysis (how individual
     deal losses become product patterns), the prioritization
     framework (how product decides what to build), and the
     communication (how product decisions get back to battlecards).

  3. Write the "Competitive Positioning While We Build" strategy —
     for gaps that will take 6-18 months to close, how do you
     position in the meantime? For Gap 1 (no reverse ETL), write
     the battlecard content that acknowledges the gap while
     positioning your alternative approach.

assertions:
  - type: llm_judge
    criteria: "Gap analysis is balanced — presents sales revenue data alongside product engineering reality, recommends different approaches for each gap (build for high-impact, partner for ecosystem, position around for architectural), not just 'build everything'"
    weight: 0.35
    description: "Balanced gap analysis"
  - type: llm_judge
    criteria: "Feedback loop is systematic — captures competitive losses in a structured way, aggregates individual deals into product patterns, provides a prioritization framework product can use, and closes the loop back to battlecards"
    weight: 0.35
    description: "Systematic feedback loop"
  - type: llm_judge
    criteria: "Interim positioning is honest and effective — acknowledges the reverse ETL gap without dismissing customer need, positions DataBridge's alternative approach credibly, and provides reps with a talk track that doesn't feel evasive"
    weight: 0.30
    description: "Honest effective interim positioning"
