meta:
  id: battlecard-team-building
  level: 4
  course: competitive-battlecards
  type: output
  description: "Build and structure a competitive intelligence team — hire, organize, and develop the team that creates and maintains battlecards at scale"
  tags: [sales, battlecards, team, hiring, organization, capability-building, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "ScaleSoft" (enterprise
  SaaS, $200M ARR). The board approved a $1.2M annual budget to
  build a dedicated competitive intelligence team from scratch.
  Currently, CI is "everyone's job" — which means it's nobody's job.

  Budget breakdown available:
  - $1.2M annual total
  - Current CI capability: zero dedicated headcount
  - Sales team: 120 reps, 12 managers
  - Competitors tracked: 12 across 3 market segments
  - Expected deliverables: battlecards, win/loss analysis, CI
    platform, sales training, executive briefings

  Hiring market data:
  - CI Director: $180-220K (base + bonus)
  - CI Analyst: $90-120K
  - Competitive Content Specialist: $80-100K
  - CI tools budget: $100-200K/year
  - Outsourced win/loss firm: $75K/quarter

  Organization design options:
  - Option A: Centralized CI team (all CI resources report to CI Director)
  - Option B: Embedded model (CI analysts embedded in each segment)
  - Option C: Hybrid (central core + embedded specialists)
  - Option D: Outsourced (external CI firm + internal coordinator)

  Tasks:
  1. Design the optimal CI team structure for ScaleSoft. Choose from
     the 4 options (or create a hybrid) and justify. Include: the
     org chart (who reports to whom), the role descriptions (what
     each person does daily), the interaction model with sales
     (how the team serves 120 reps), and the career path (how CI
     roles grow within the company).

  2. Write the job descriptions for the first 2 hires (CI Director
     and CI Analyst). Each must include: role summary, key
     responsibilities, required skills, success metrics (not just
     activities), and the 90-day onboarding plan. These should
     attract strong candidates, not just fill a seat.

  3. Design the "Team Operating Model" — how the CI team operates
     day-to-day, week-to-week, and quarter-to-quarter. Include:
     daily monitoring responsibilities, weekly deliverables (CI
     briefs, battlecard updates), monthly activities (win/loss
     analysis, executive briefings), and quarterly reviews
     (competitive landscape report, program effectiveness).

assertions:
  - type: llm_judge
    criteria: "Team structure is well-justified — chooses an appropriate model for ScaleSoft's size and needs, with clear org chart, realistic role descriptions, a viable interaction model with 120 reps, and career growth paths"
    weight: 0.35
    description: "Well-justified team structure"
  - type: llm_judge
    criteria: "Job descriptions attract talent — CI Director and Analyst roles have compelling summaries, specific responsibilities, measurable success metrics, and realistic 90-day onboarding that sets new hires up for success"
    weight: 0.30
    description: "Talent-attracting job descriptions"
  - type: llm_judge
    criteria: "Operating model is sustainable — daily/weekly/monthly/quarterly cadence is realistic for a small team, deliverables are achievable, and the model doesn't require heroic effort to maintain"
    weight: 0.35
    description: "Sustainable operating model"
