meta:
  id: ai-powered-battlecards
  level: 4
  course: competitive-battlecards
  type: output
  description: "Leverage AI for competitive intelligence and battlecard creation — use AI tools to monitor competitors, generate content, and personalize battlecards at scale"
  tags: [sales, battlecards, AI, automation, intelligence, personalization, expert]

state: {}

trigger: |
  You're the Director of Revenue Operations at "InsightPro"
  (revenue intelligence platform, $80M ARR). Your CEO wants to
  "AI-enable" the competitive intelligence program. Currently,
  your CI analyst spends 30 hours/week manually monitoring
  competitors and updating battlecards. The CEO says: "AI should
  do 80% of this."

  Current CI workflow (manual):
  - 15 hours/week: Monitoring competitor websites, news, social
  - 8 hours/week: Analyzing changes and writing FIA briefs
  - 5 hours/week: Updating battlecard content
  - 2 hours/week: Responding to field requests

  AI capabilities available:
  - LLM-powered content generation (GPT-4, Claude)
  - Competitive intelligence platforms with AI (Crayon, Klue)
  - Web scraping and monitoring tools
  - Natural language processing for review/sentiment analysis
  - CRM integration APIs

  Your budget: $150K for AI-powered CI tools (annual)

  Tasks:
  1. Design the "AI-Powered CI Workflow" — map how AI transforms
     each of the 4 current workflow components. For each: what AI
     handles (automated monitoring, draft generation, pattern
     detection), what humans still handle (validation, strategy,
     nuanced analysis), and the expected time savings. Be realistic —
     AI hallucination risk is real in competitive content.

  2. Write the "AI Battlecard Generation" specification — how you'd
     use AI to auto-generate battlecard drafts from competitive
     intelligence signals. Include: the prompt engineering approach,
     the human review process (AI drafts, human validates), the
     quality gates (what must be human-verified before publishing),
     and the risk mitigation for AI-generated competitive claims.

  3. Design the "AI Personalization Engine" — a system that
     generates deal-specific battlecard content in real-time. When a
     rep enters a deal (competitor X, industry Y, persona Z), the
     system generates a personalized battlecard. Include: the data
     inputs, the generation logic, the accuracy validation, and the
     UX for reps. Address the risk: what happens when AI generates
     an incorrect competitive claim and a rep uses it?

assertions:
  - type: llm_judge
    criteria: "AI workflow is realistic about capabilities — clearly separates what AI can do (monitoring, draft generation, pattern detection) from what requires human judgment (validation, strategy, nuance), with honest time savings expectations"
    weight: 0.35
    description: "Realistic AI workflow"
  - type: llm_judge
    criteria: "AI generation spec addresses hallucination risk — includes prompt engineering, mandatory human review, quality gates for competitive claims, and specific risk mitigation for AI-generated content that could be factually wrong"
    weight: 0.35
    description: "Hallucination-aware AI generation"
  - type: llm_judge
    criteria: "Personalization engine is practical — describes inputs, generation logic, and validation that would work at deal-level personalization, with clear risk mitigation for incorrect AI claims"
    weight: 0.30
    description: "Practical personalization engine"
