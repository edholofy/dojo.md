meta:
  id: expert-battlecard-shift
  level: 4
  course: competitive-battlecards
  type: output
  description: "Shift simulation — transform a company's entire competitive strategy when a new market entrant disrupts the landscape"
  tags: [sales, battlecards, simulation, disruption, transformation, expert]

state: {}

trigger: |
  You're the CRO of "TradeSafe" (trade compliance software, $75M
  ARR, 100 sales reps). Your market has been stable for years —
  you and 3 competitors (Amber Road, Integration Point, Thomson
  Reuters) dominate. Then OpenAI announces "TradeGPT" — an AI-
  powered trade compliance assistant that can answer regulatory
  questions, classify products, and generate compliance documents
  at 1/10th the price of your software.

  The market reaction:
  - Your stock dropped 15% on the announcement
  - 10 of your top 20 prospects have paused evaluations "to see
    what TradeGPT can do"
  - Your largest customer (Fortune 50) called asking about your
    AI strategy
  - Industry media is running "Is traditional trade compliance
    software dead?" stories
  - Your board has called an emergency meeting

  Reality check (what you know that the market doesn't yet):
  - TradeGPT can answer 70% of compliance questions correctly
    (impressive for a demo, dangerous for actual compliance)
  - It has no audit trail (critical for regulatory compliance)
  - It can't integrate with ERP systems for automated screening
  - It hallucinates classification codes 15% of the time (this
    could mean millions in customs penalties)
  - But... it will get better. The 70% accuracy will become 90%+
    within 18 months

  Tasks:
  1. Write the board presentation (5 slides) addressing the TradeGPT
     threat. Include: honest assessment of the threat level, your
     AI strategy (build, buy, or partner), the short-term competitive
     response (next 90 days), the medium-term strategy (12 months),
     and the long-term positioning (how the market evolves).

  2. Create the "TradeGPT Battlecard" — this is unlike any
     battlecard you've built because the competitor isn't a
     traditional software vendor. Include: what TradeGPT does well
     (acknowledge the innovation), what it can't do yet (regulatory
     gaps), the risk narrative (what happens when AI makes a $10M
     compliance error?), and the coexistence positioning ("use both"
     as a transition strategy).

  3. Write the "Market Disruption Playbook" — the template any
     company can use when an AI-native disruptor enters their
     traditional software market. Include: the 5 stages of market
     disruption, the battlecard strategy for each stage, and the
     signals that indicate when you're moving from one stage to the
     next. This should be generalizable beyond trade compliance.

assertions:
  - type: llm_judge
    criteria: "Board presentation is honest and strategic — doesn't downplay the threat, presents a realistic AI strategy, and provides a phased response (90 days, 12 months, long-term) that shows the board the CRO has a plan"
    weight: 0.35
    description: "Honest strategic board presentation"
  - type: llm_judge
    criteria: "TradeGPT battlecard handles the AI disruptor format — acknowledges AI innovation, highlights regulatory risks credibly (not FUD), provides coexistence positioning, and gives reps specific talk tracks for 'why not just use TradeGPT?'"
    weight: 0.35
    description: "AI-disruptor battlecard format"
  - type: llm_judge
    criteria: "Disruption playbook is generalizable — 5 stages of market disruption with battlecard strategy per stage and transition signals, applicable beyond trade compliance to any AI-disrupted software market"
    weight: 0.30
    description: "Generalizable disruption playbook"
