meta:
  id: channel-competitive-enablement
  level: 4
  course: competitive-battlecards
  type: output
  description: "Enable channel partners with competitive tools — create battlecards and training for partners who sell your product alongside 10-20 other vendors"
  tags: [sales, battlecards, channel, partners, enablement, indirect, expert]

state: {}

trigger: |
  You're the VP of Channel Sales at "NetSecure" (network security,
  $110M ARR). 40% of your revenue comes through 150 channel partners
  (MSPs, VARs, and system integrators). The problem: your partners
  sell 15-20 vendors' products, and competitive intelligence is the
  last thing on their minds. When a customer asks "why NetSecure over
  Palo Alto?", your partners often just switch to recommending Palo
  Alto because it's easier.

  Partner competitive data:
  - Partners who receive competitive training: 28% competitive win rate
  - Partners who don't: 9% competitive win rate
  - Partner competitive content usage: 11% (of partners provided)
  - Top reason partners switch recommendations: "I don't know enough
    about NetSecure to defend it against [competitor]" (64%)
  - Partner attention span for vendor training: 15 minutes max

  Partner types and needs:
  - MSPs (60 partners): Need 2-minute objection handlers they can
    use in quick customer conversations
  - VARs (60 partners): Need feature comparisons and pricing
    positioning for formal evaluations
  - SIs (30 partners): Need strategic positioning materials for
    large enterprise deals with multiple stakeholders

  Tasks:
  1. Design the "Partner Competitive Enablement Program" — how you
     equip 150 partners with competitive tools without expecting
     them to study like your direct reps. Include: the content
     strategy (different formats for MSP/VAR/SI), the delivery
     mechanism (where partners access competitive tools), the
     training approach (15-minute maximum), and the incentive
     structure (MDF, deal registration, spiffs for competitive wins).

  2. Create the "Partner Quick Card" for MSPs — the simplest possible
     competitive tool. For each of your 3 main competitors (Palo
     Alto, Fortinet, CrowdStrike), provide: 1 sentence to say when
     the competitor is mentioned, 1 question to ask the customer,
     and 1 reason to recommend NetSecure. Total length: fits on a
     business card or phone screen.

  3. Design the "Partner Competitive Dashboard" — the real-time tool
     that shows: which partners are winning competitive deals, which
     partners are losing to which competitors, which competitive
     content is being used, and where intervention is needed. Include
     the alert triggers for when a partner deal is at risk of
     competitive loss.

assertions:
  - type: llm_judge
    criteria: "Enablement program is partner-realistic — respects 15-minute attention span, provides different content for MSP/VAR/SI, uses delivery mechanisms partners already use, and has meaningful incentives for competitive engagement"
    weight: 0.35
    description: "Partner-realistic enablement program"
  - type: llm_judge
    criteria: "Quick card is genuinely minimal — fits on business card/phone screen, provides immediately usable 1-sentence responses, 1 question, and 1 reason per competitor that a busy MSP tech could reference during a customer call"
    weight: 0.30
    description: "Genuinely minimal quick card"
  - type: llm_judge
    criteria: "Dashboard design is actionable — tracks partner competitive performance, identifies at-risk deals, and includes alert triggers that enable timely intervention, not just reporting"
    weight: 0.35
    description: "Actionable partner dashboard"
