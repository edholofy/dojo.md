meta:
  id: enterprise-battlecard-operations
  level: 4
  course: competitive-battlecards
  type: output
  description: "Design enterprise-scale battlecard operations — build the systems, processes, and team structure to maintain battlecards for 100+ reps across multiple segments"
  tags: [sales, battlecards, enterprise, operations, scale, systems, expert]

state: {}

trigger: |
  You're the VP of Sales Enablement at "GlobalTech" (enterprise
  software, $300M ARR, 200 sales reps). You manage battlecards for
  15 competitors across 4 market segments (SMB, Mid-Market,
  Enterprise, Strategic) and 3 geographic regions (Americas, EMEA,
  APAC). That's potentially 180 battlecard variants (15 × 4 × 3).

  Current state:
  - 45 battlecards exist (about 25% coverage)
  - 3 people on your enablement team (you + 2 specialists)
  - Battlecard usage: 31% of reps report using them monthly
  - Win rate in competitive deals: 22% (company avg: 28%)
  - Average battlecard age: 4.2 months (target: <1 month)
  - Competitor price changes detected after battlecard update: avg 6 weeks lag
  - Sales team feedback: "The cards don't match what I actually hear"

  Budget: $500K annually for competitive enablement (including
  headcount, tools, and content)
  Goal: Increase competitive win rate from 22% to 30% in 12 months

  Tasks:
  1. Design the "Battlecard Operations Model" — the system for
     creating, maintaining, and distributing 180 battlecard variants
     with a team of 3. You obviously can't maintain 180 individually.
     Include: the tiering strategy (which battlecards get full
     treatment vs. lightweight versions), the modular content
     architecture (shared components that reduce maintenance), and
     the update workflow.

  2. Write the "Battlecard Program Business Case" — justify the
     $500K annual investment to the CFO. Show: current competitive
     revenue leakage, expected improvement from the program, ROI
     calculation, and the headcount/tool investment breakdown. Use
     GlobalTech's numbers ($300M ARR, 22% competitive win rate).

  3. Design the "Battlecard Effectiveness Measurement Framework" —
     how you prove the program is working. Include: leading metrics
     (usage, freshness, feedback scores), lagging metrics (competitive
     win rate, deal velocity, discount rate), attribution methodology
     (how you isolate battlecard impact from other factors), and the
     quarterly business review format.

assertions:
  - type: llm_judge
    criteria: "Operations model is scalable — tiering strategy prevents maintaining 180 individual cards, modular architecture shares components across variants, and update workflow is sustainable for a team of 3"
    weight: 0.35
    description: "Scalable operations model"
  - type: llm_judge
    criteria: "Business case is financially rigorous — uses $300M ARR and win rate data to calculate revenue leakage, shows clear ROI on $500K investment, and breaks down the investment across headcount, tools, and content"
    weight: 0.30
    description: "Financially rigorous business case"
  - type: llm_judge
    criteria: "Measurement framework isolates impact — includes leading and lagging metrics, addresses attribution challenge (battlecards vs. other factors), and provides a QBR format that demonstrates program value"
    weight: 0.35
    description: "Impact-isolating measurement framework"
