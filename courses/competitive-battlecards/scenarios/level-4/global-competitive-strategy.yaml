meta:
  id: global-competitive-strategy
  level: 4
  course: competitive-battlecards
  type: output
  description: "Build global competitive battlecard strategy — manage competitive positioning across regions where competitor landscapes differ significantly"
  tags: [sales, battlecards, global, regional, localization, strategy, expert]

state: {}

trigger: |
  You're the Global Head of Competitive Intelligence at "UnifiedCloud"
  (cloud platform, $200M ARR, 300 reps across 20 countries). Your
  competitive landscape is completely different by region:

  Americas (150 reps, $120M ARR):
  Top competitors: AWS, Azure, Google Cloud
  Competitive dynamic: Hyperscaler dominance, price wars
  Key battlecard need: How to compete on specialization vs. breadth

  EMEA (80 reps, $50M ARR):
  Top competitors: SAP, OVHcloud, Scaleway (European sovereignty)
  Competitive dynamic: Data sovereignty laws (GDPR), preference for
  EU-hosted solutions, local competitors gaining market share
  Key battlecard need: Sovereignty positioning, GDPR compliance

  APAC (50 reps, $25M ARR):
  Top competitors: Alibaba Cloud, Tencent Cloud, NHN Cloud (Korea)
  Competitive dynamic: Local cloud providers with government backing,
  language barriers, different buying processes
  Key battlecard need: Local competitor intelligence (limited English
  resources), government compliance (China's cybersecurity law)

  India (20 reps, $5M ARR):
  Top competitors: Jio Cloud, CtrlS, AWS (India region)
  Competitive dynamic: Extreme price sensitivity, government "India
  first" preference, rapid digital transformation
  Key battlecard need: Price-competitive positioning, government
  tender support

  Tasks:
  1. Design the "Global Battlecard Architecture" — how you structure
     battlecards that work globally while adapting regionally.
     Include: the global core (universal content shared across
     regions), regional adaptations (competitor-specific content),
     and local customizations (language, compliance, cultural
     selling differences). Show the content governance model.

  2. Create battlecard excerpts for the same positioning topic
     ("Why UnifiedCloud over the local market leader") adapted for
     3 regions: Americas (vs. AWS), EMEA (vs. OVHcloud), APAC (vs.
     Alibaba Cloud). Show how the same core message adapts
     dramatically based on regional competitive dynamics.

  3. Write the "Regional CI Network" design — you can't be a CI
     expert for 20 countries. How do you build a network of regional
     CI contributors? Include: the hub-and-spoke model, regional
     CI champion roles, the intelligence collection and sharing
     process, and the incentive structure for regional contributors.

assertions:
  - type: llm_judge
    criteria: "Global architecture balances consistency and adaptation — clear separation between universal core, regional adaptations, and local customizations, with a governance model that prevents both chaos and over-standardization"
    weight: 0.35
    description: "Balanced global architecture"
  - type: llm_judge
    criteria: "Regional adaptations are genuinely different — Americas focuses on specialization vs. breadth, EMEA on sovereignty and compliance, APAC on local competitor knowledge, showing how the same core message transforms by region"
    weight: 0.35
    description: "Genuinely different regional adaptations"
  - type: llm_judge
    criteria: "Regional CI network is operationally viable — hub-and-spoke model with realistic champion roles, collection processes, and incentives that would work across 20 countries without requiring full-time CI staff in each region"
    weight: 0.30
    description: "Operationally viable CI network"
