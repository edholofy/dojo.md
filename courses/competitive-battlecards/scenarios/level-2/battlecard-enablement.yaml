meta:
  id: battlecard-enablement
  level: 2
  course: competitive-battlecards
  type: output
  description: "Drive battlecard adoption across the sales team — train reps to use battlecards effectively and measure whether they actually improve win rates"
  tags: [sales, battlecards, enablement, adoption, training, measurement, intermediate]

state: {}

trigger: |
  You're the Sales Enablement Lead at "DataSafe" (data privacy
  platform, $40M ARR, 25-person sales team). You spent 3 months
  building beautiful battlecards for your 4 main competitors. You
  launched them 6 weeks ago. The results: only 6 of 25 reps have
  opened them. Win rates against competitors haven't changed.

  Your VP of Sales says: "Building battlecards is the easy part.
  Getting reps to actually use them is the hard part."

  Current adoption data:
  - 6 of 25 reps have opened battlecards (24% adoption)
  - Of those 6, only 2 report using them on actual calls
  - The 2 who use them: top performers who would have won anyway
  - Reps who haven't adopted say:
    "I didn't know they existed" (30%)
    "They're too long to use during a call" (25%)
    "I have my own approach that works" (20%)
    "I couldn't find them when I needed them" (15%)
    "The content doesn't match what I actually hear" (10%)

  Tasks:
  1. Design the "Battlecard Adoption Campaign" — a 30-day plan to
     get adoption from 24% to 80%. Address each of the 5 non-
     adoption reasons with a specific tactic. Include: launch event,
     accessibility improvements, peer champions, integration into
     existing workflows, and gamification elements.

  2. Create the "Battlecard Training Session" plan — a 30-minute
     session that teaches reps how to use battlecards in live
     situations. Include: the agenda, 3 role-play exercises (rep
     uses battlecard to respond to competitive objection in real-
     time), and the take-home reference card. The session must
     be hands-on, not lecture-based.

  3. Design the "Battlecard Effectiveness Dashboard" — the metrics
     that prove battlecards are working (or not). Include: leading
     indicators (usage, search frequency) and lagging indicators
     (win rate vs. competitors, deal velocity). Explain what you'd
     change if the leading indicators are good but lagging indicators
     don't improve.

assertions:
  - type: llm_judge
    criteria: "Adoption campaign addresses all 5 barriers — awareness (didn't know), usability (too long), resistance (own approach), accessibility (couldn't find), and relevance (content mismatch) with specific tactics for each"
    weight: 0.35
    description: "Barrier-addressing adoption campaign"
  - type: llm_judge
    criteria: "Training session is hands-on — 30-minute agenda that's mostly practice (role-play, live scenarios), not lecture, with exercises that simulate real competitive situations reps face"
    weight: 0.30
    description: "Hands-on training session"
  - type: llm_judge
    criteria: "Effectiveness dashboard has leading and lagging indicators — tracks usage and search frequency (leading) plus win rate and deal velocity (lagging), with a diagnostic framework for when leading indicators are good but results don't follow"
    weight: 0.35
    description: "Leading/lagging effectiveness dashboard"
