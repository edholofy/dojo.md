meta:
  id: battlecard-maintenance
  level: 2
  course: competitive-battlecards
  type: output
  description: "Maintain and update battlecards — build the process for keeping competitive content fresh as markets, competitors, and products evolve"
  tags: [sales, battlecards, maintenance, updates, freshness, process, intermediate]

state: {}

trigger: |
  You're a Competitive Intelligence Manager at "AppScale" (application
  performance monitoring, $55M ARR). Your battlecards were excellent
  when launched 6 months ago. But markets move fast. Here's what's
  changed since your last update:

  Competitor changes (last 6 months):
  - Datadog: Launched AI-powered anomaly detection (your key
    differentiator is now matched), raised prices 15%, acquired
    a security monitoring startup
  - New Relic: Switched to consumption-based pricing (was per-host),
    launched a free tier for developers, released new Kubernetes
    monitoring features
  - Dynatrace: Won Gartner Magic Quadrant "Leader" position (you're
    in "Visionary"), launched a self-service deployment option
    (was enterprise-only), appointed new CRO from Salesforce

  Your current battlecard problems:
  - Datadog card still says "no AI capabilities" — now false
  - New Relic pricing section is completely wrong
  - Dynatrace card doesn't mention Gartner position — reps are
    getting blindsided when prospects bring it up
  - 3 customer proof points reference customers who have since
    churned to competitors

  Tasks:
  1. Create the "Battlecard Update Audit" — review all the changes
     above and prioritize which updates are critical (fix today),
     important (fix this week), and nice-to-have (fix this month).
     For each update, explain why it's that priority level.

  2. Design the "Battlecard Maintenance System" — the ongoing
     process for keeping battlecards current. Include: monitoring
     triggers (what events require immediate updates), update
     cadence (monthly reviews with quarterly deep dives), ownership
     (who's responsible for what), and the feedback loop from sales
     (how reps report outdated content).

  3. Write the "Competitive Intelligence Monitoring Setup" — the
     specific sources you monitor, the alerts you configure, and
     the weekly competitive intelligence report format. The goal:
     never be surprised by a competitor change again. Include tool
     recommendations and the time investment required.

assertions:
  - type: llm_judge
    criteria: "Update audit is correctly prioritized — false claims (Datadog AI) and wrong pricing (New Relic) are critical, Gartner positioning is important, churned proof points are important, with clear rationale for each priority"
    weight: 0.35
    description: "Correctly prioritized update audit"
  - type: llm_judge
    criteria: "Maintenance system is sustainable — defines monitoring triggers, update cadence, clear ownership, and a rep feedback mechanism that would actually work month after month without requiring heroic effort"
    weight: 0.35
    description: "Sustainable maintenance system"
  - type: llm_judge
    criteria: "CI monitoring setup is practical — specifies sources, alert configurations, and a weekly report format with realistic time investment, including tool recommendations appropriate for a mid-size company"
    weight: 0.30
    description: "Practical CI monitoring setup"
