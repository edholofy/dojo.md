meta:
  id: multi-competitor-deals
  level: 2
  course: competitive-battlecards
  type: output
  description: "Handle multi-competitor evaluations — create battlecard strategies for deals where the prospect is evaluating 3 or more vendors simultaneously"
  tags: [sales, battlecards, multi-competitor, evaluation, strategy, intermediate]

state: {}

trigger: |
  You're an AE at "CloudCRM Pro" (CRM platform, $70M ARR). You're
  in a competitive evaluation where the prospect (a 400-person
  financial services company) is evaluating 4 CRM vendors: you,
  Salesforce, HubSpot, and Freshsales. The evaluation will take
  8 weeks with a decision at the end.

  The evaluation structure:
  Week 1-2: RFP response and documentation review
  Week 3-4: Product demos (1 hour each)
  Week 5-6: Technical proof of concept (POC)
  Week 7: Finalist presentations
  Week 8: Decision committee meeting

  Evaluation committee:
  - VP of Sales (decision maker) — cares about pipeline visibility
  - VP of IT (technical approver) — cares about integration/security
  - CFO (budget holder) — cares about TCO and ROI
  - Sales Operations Manager (primary evaluator) — cares about
    automation and reporting

  Your competitive position:
  - Salesforce: Enterprise standard but over-engineered for mid-market
  - HubSpot: Easy to use, great marketing integration, lacks
    financial services-specific features
  - Freshsales: Cheapest option, decent basic CRM, limited enterprise
    features and integrations
  - CloudCRM Pro (you): Purpose-built for financial services, strong
    compliance features, mid-range pricing

  Tasks:
  1. Create the "Multi-Competitor Deal Strategy" — your battlecard
     approach when facing 3 competitors simultaneously. You can't
     run 3 separate competitive plays. Design the unified strategy
     that positions you favorably against all 3 while addressing
     each evaluator's priorities. Include: the win theme that works
     against all competitors, the evaluation criteria you want to
     emphasize, and how to handle head-to-head comparisons.

  2. For each stage of the evaluation (RFP, Demo, POC, Finalist,
     Decision), identify: the competitive threat at that stage (which
     competitor is strongest?), your competitive advantage at that
     stage, and the specific battlecard content you'd reference.
     Show how competitive strategy evolves through the deal cycle.

  3. Write the "Evaluation Criteria Influencing" strategy — how do
     you shape the prospect's evaluation criteria to favor your
     strengths? You can't do this obviously, but you can ask
     questions and provide materials that naturally highlight criteria
     where you excel. Include 5 specific criteria you'd try to add
     and how to introduce each.

assertions:
  - type: llm_judge
    criteria: "Unified strategy works against all 3 — identifies a single win theme (financial services specialization) that simultaneously differentiates from Salesforce (enterprise complexity), HubSpot (generic), and Freshsales (basic), with evaluator-specific messaging"
    weight: 0.35
    description: "Unified multi-competitor strategy"
  - type: llm_judge
    criteria: "Stage-specific analysis is accurate — correctly identifies competitive threats by stage (e.g., Salesforce strongest in RFP, HubSpot in demo UX, Freshsales in pricing) with appropriate battlecard content for each stage"
    weight: 0.30
    description: "Accurate stage-specific analysis"
  - type: llm_judge
    criteria: "Criteria influencing is subtle and strategic — 5 evaluation criteria that genuinely favor CloudCRM Pro's strengths (compliance, financial services features, implementation speed) introduced through natural questions and materials, not obvious manipulation"
    weight: 0.35
    description: "Subtle criteria influencing"
