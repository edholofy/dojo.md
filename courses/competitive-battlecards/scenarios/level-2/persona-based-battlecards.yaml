meta:
  id: persona-based-battlecards
  level: 2
  course: competitive-battlecards
  type: output
  description: "Create persona-targeted battlecards — tailor competitive messaging for different buyer personas who care about different things"
  tags: [sales, battlecards, persona, targeting, customization, intermediate]

state: {}

trigger: |
  You're a Product Marketing Manager at "FinTechPro" (financial
  technology platform, $65M ARR). You sell against Plaid and Stripe
  Connect. Your current battlecards are one-size-fits-all, but your
  reps report that the same competitor gets very different objections
  depending on who they're talking to.

  Your buyer personas:
  1. CTO/VP of Engineering — Cares about: API quality, developer
     experience, documentation, uptime SLA, data architecture
  2. CFO/VP of Finance — Cares about: pricing model, total cost of
     ownership, compliance costs, revenue impact, contract terms
  3. Chief Compliance Officer — Cares about: regulatory compliance,
     data residency, audit trail, SOC 2/PCI DSS, vendor risk
  4. Product Manager — Cares about: time to market, feature velocity,
     user experience, competitive features, integration ecosystem

  When competing against Plaid:
  - CTO asks: "Plaid has better API documentation and SDKs."
  - CFO asks: "Plaid charges per connection. Your pricing is higher."
  - CCO asks: "Plaid is used by every major bank. You're a risk."
  - PM asks: "Plaid has instant bank verification. Do you?"

  Tasks:
  1. Create 4 persona-specific battlecard variants for the Plaid
     competition. Each should contain: persona-specific positioning
     statement (what matters to THIS person), the top 3 objections
     this persona raises, the response to each, and the persona-
     specific proof point. Show how the SAME competitor gets
     completely different battlecard content based on audience.

  2. Write the "Persona Targeting Guide" — how do reps identify
     which persona they're selling to and which battlecard variant
     to pull? Include: persona identification questions (ask in
     first 2 minutes of call), persona signals (title, questions
     they ask, concerns they raise), and the CRM workflow for
     surfacing the right variant.

  3. Your VP of Sales asks: "Do we really need 4 versions of every
     battlecard? That's 12 total across 3 competitors." Write the
     argument for why persona-targeting is worth the maintenance
     effort. Include the data: which personas have the highest win
     rate variance between targeted and generic battlecards.

assertions:
  - type: llm_judge
    criteria: "Persona variants are genuinely different — each battlecard addresses what THAT persona cares about (CTO gets API depth, CFO gets TCO analysis, CCO gets compliance proof, PM gets feature comparison) not just the same content with different headers"
    weight: 0.35
    description: "Genuinely different persona variants"
  - type: llm_judge
    criteria: "Persona targeting guide is practical — provides quick identification signals (title, initial questions, concern patterns) and a CRM workflow that surfaces the right variant, usable in the first 2 minutes of a call"
    weight: 0.35
    description: "Practical persona targeting"
  - type: llm_judge
    criteria: "Maintenance argument is data-backed — makes the case with projected win rate improvement, acknowledges the maintenance cost, and suggests prioritization (which persona variants deliver the most impact) rather than doing all 12 at once"
    weight: 0.30
    description: "Data-backed maintenance argument"
