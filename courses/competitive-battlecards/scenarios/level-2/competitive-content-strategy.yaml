meta:
  id: competitive-content-strategy
  level: 2
  course: competitive-battlecards
  type: output
  description: "Build a content strategy around competitive positioning — create marketing content that supports battlecard messaging and influences buyer perception before sales engagement"
  tags: [sales, battlecards, content, marketing, positioning, SEO, intermediate]

state: {}

trigger: |
  You're a Content Marketing Manager at "CloudSync" (data
  synchronization platform, $42M ARR). Your competitive intelligence
  team has excellent battlecards for 3 competitors: Fivetran,
  Stitch Data, and Airbyte. But these only help AFTER a prospect
  is in the sales cycle. Your VP of Marketing wants to "extend the
  battlecard upstream" — creating content that shapes competitive
  perception before prospects ever talk to sales.

  The insight: 70% of your prospects have already researched
  competitors before their first sales call. By then, they've formed
  opinions based on competitor marketing, review sites, and peer
  recommendations. Battlecards only work for the 30% of perception
  that happens during the sales cycle.

  Your competitors' content positions:
  - Fivetran: Dominates SEO for "automated data pipelines" and
    "ELT tools" — ranks #1-3 for most relevant keywords
  - Stitch Data (Talend): Heavy analyst marketing — featured in
    every Gartner/Forrester report, runs analyst events
  - Airbyte: Massive developer community — open-source, 15,000
    GitHub stars, developer evangelism program

  Tasks:
  1. Design the "Competitive Content Strategy" — a 6-month plan
     that creates content targeting each competitor's perception
     advantage. Include: SEO content (blog posts targeting
     comparison keywords like "CloudSync vs Fivetran"), thought
     leadership (analyst-facing and community), and social proof
     content (case studies, community building). For each piece,
     specify the competitive goal.

  2. Write 3 specific content pieces (outlines with key messages):
     a) "CloudSync vs Fivetran: Honest Comparison" blog post that
        ranks for comparison searches — must be genuinely balanced
     b) "The Data Pipeline Buyer's Guide" white paper that positions
        your evaluation criteria favorably
     c) "Why We Switched from Airbyte to CloudSync" customer story
        targeting developer-audience

  3. Address the ethics question: Your VP wants you to write "why
     [competitor] is bad" content. Explain why attack content
     backfires (credibility loss, SEO penalties, brand damage) and
     propose the alternative: comparison content that is genuinely
     balanced and useful. Include the content guidelines that keep
     competitive content ethical and effective.

assertions:
  - type: llm_judge
    criteria: "Content strategy targets each competitor's advantage — SEO content counters Fivetran's search dominance, thought leadership counters Stitch's analyst position, community content counters Airbyte's developer base, with specific competitive goals per piece"
    weight: 0.35
    description: "Competitor-targeted content strategy"
  - type: llm_judge
    criteria: "Content pieces are genuinely balanced — comparison blog acknowledges competitor strengths honestly, buyer's guide provides objective criteria (not rigged), and customer story feels authentic rather than scripted"
    weight: 0.30
    description: "Genuinely balanced content pieces"
  - type: llm_judge
    criteria: "Ethics argument is convincing — explains why attack content backfires (credibility, SEO, brand) with evidence, and provides alternative guidelines for competitive content that is both ethical and effective"
    weight: 0.35
    description: "Convincing ethics argument"
