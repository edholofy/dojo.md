meta:
  id: deal-stage-battlecards
  level: 2
  course: competitive-battlecards
  type: output
  description: "Create deal-stage-specific battlecards — tailor competitive content for discovery, demo, proposal, and negotiation stages"
  tags: [sales, battlecards, deal-stage, sales-cycle, timing, intermediate]

state: {}

trigger: |
  You're a Sales Enablement Manager at "NetGuard" (network security,
  $48M ARR). Your reps report that the same battlecard doesn't work
  across the entire sales cycle. During discovery, prospects ask
  different competitive questions than during negotiation.

  Your sales cycle stages and typical competitive dynamics:

  Stage 1: Discovery (Week 1-2)
  Typical competitive question: "How are you different from Palo
  Alto / CrowdStrike?"
  What reps need: High-level differentiation, category positioning,
  questions to ask. NOT detailed feature comparisons.

  Stage 2: Demo/Evaluation (Week 3-5)
  Typical competitive question: "Can you show me how your threat
  detection compares to CrowdStrike's Falcon?"
  What reps need: Feature-level proof points, POC comparison
  frameworks, technical differentiation. NOT high-level messaging.

  Stage 3: Proposal (Week 6-7)
  Typical competitive question: "CrowdStrike quoted $X, you're $X+20%.
  Justify the premium."
  What reps need: TCO analysis, ROI comparison, pricing positioning.
  NOT feature lists or discovery questions.

  Stage 4: Negotiation (Week 8-10)
  Typical competitive question: "CrowdStrike just sweetened their
  offer. Can you match?"
  What reps need: Negotiation tactics, discount guidelines, value
  holds, walk-away criteria. NOT discovery or demo content.

  Tasks:
  1. Create 4 mini-battlecards for CrowdStrike — one per deal stage.
     Each should contain only the content relevant to that stage
     (not a full battlecard truncated, but purpose-built for the
     stage). Include the content and explain what was excluded and
     why.

  2. Design the "Stage-Triggered Battlecard System" — how the CRM
     automatically surfaces the right battlecard variant when a deal
     moves to a new stage. Include: CRM integration design, the
     trigger logic, and how it works for reps on mobile during calls.

  3. Write the "Competitive Moment Map" — a visual timeline showing
     when competitive threats are highest in your sales cycle, which
     competitor is most dangerous at each stage, and what your team's
     competitive advantage is at each stage. This becomes the master
     reference for your battlecard strategy.

assertions:
  - type: llm_judge
    criteria: "Stage-specific cards are purposefully different — discovery card has positioning and questions, demo card has feature proof, proposal card has TCO/ROI, negotiation card has tactics and guidelines, each containing ONLY stage-relevant content"
    weight: 0.35
    description: "Purposefully different stage cards"
  - type: llm_judge
    criteria: "CRM integration design is practical — describes trigger logic that surfaces the right variant automatically when deal stage changes, works on mobile, and doesn't require reps to search or select manually"
    weight: 0.30
    description: "Practical CRM integration"
  - type: llm_judge
    criteria: "Competitive moment map is insightful — correctly identifies when competitive threats peak, which competitor is most dangerous at each stage, and your advantage at each point, creating a strategic overview of the competitive landscape across the deal cycle"
    weight: 0.35
    description: "Insightful competitive moment map"
