meta:
  id: intermediate-battlecard-shift
  level: 2
  course: competitive-battlecards
  type: output
  description: "Shift simulation — respond to a major competitive threat by creating an emergency battlecard and executing a rapid competitive response"
  tags: [sales, battlecards, simulation, emergency, competitive-threat, intermediate]

state: {}

trigger: |
  You're the Competitive Intelligence Manager at "SignFlow"
  (e-signature and document management, $35M ARR). It's Monday
  morning and DocuSign just made a major announcement: they're
  launching a free tier that includes 5 signatures per month and
  basic templates — features that overlap with 60% of your product.
  They're also cutting their paid plans by 30%.

  The impact is immediate:
  - Your Slack is blowing up — 20 reps are reporting that prospects
    are mentioning DocuSign's announcement in calls THIS MORNING
  - 5 active deals are asking for a pricing response
  - Your CEO wants to know "our strategy" by 2pm today
  - Your current DocuSign battlecard doesn't address free tier or
    the price cut (it was last updated 3 months ago)
  - Social media is full of "RIP SignFlow?" posts

  Your resources:
  - You have 4 hours until the CEO meeting
  - Product team can provide feature comparison in 1 hour
  - Pricing team can provide analysis in 2 hours
  - You have win/loss data from last quarter (before the change)

  Tasks:
  1. Write the "Emergency Competitive Response Plan" — what you do
     in the next 4 hours. Include: Hour 1 (immediate triage and
     messaging), Hour 2 (battlecard update), Hour 3 (sales team
     enablement), Hour 4 (CEO strategy brief). For each hour,
     specify the deliverable and who's responsible.

  2. Write the updated DocuSign battlecard that addresses the free
     tier and price cut. This must: acknowledge DocuSign's move
     honestly (it IS a big deal), reposition SignFlow's value for
     your target market, provide specific talk tracks for the 5
     scenarios reps are hearing ("why should I pay when DocuSign
     is free?"), and include a pricing response framework.

  3. Write the CEO strategy brief (1 page) — the strategic analysis
     of DocuSign's move and your recommended response. Include: what
     they're trying to accomplish (freemium land-grab), what it means
     for SignFlow short-term and long-term, and your recommended
     strategic response (not just tactical battlecard updates but
     strategic positioning).

assertions:
  - type: llm_judge
    criteria: "Emergency plan is timed and realistic — 4-hour plan with specific deliverables per hour, clear ownership, and prioritizes getting messaging to reps FIRST (they're in live calls) before strategic analysis"
    weight: 0.35
    description: "Timed realistic emergency plan"
  - type: llm_judge
    criteria: "Updated battlecard is honest and strategic — acknowledges DocuSign's free tier without panic, repositions SignFlow for paid value (security, compliance, workflow), provides specific talk tracks for 'why pay?' questions"
    weight: 0.35
    description: "Honest strategic battlecard update"
  - type: llm_judge
    criteria: "CEO brief is strategically insightful — analyzes DocuSign's move beyond surface level (freemium strategy, market share play), assesses short/long-term impact, and recommends a strategic response, not just price matching"
    weight: 0.30
    description: "Strategically insightful CEO brief"
