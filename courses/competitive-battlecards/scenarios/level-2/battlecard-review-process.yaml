meta:
  id: battlecard-review-process
  level: 2
  course: competitive-battlecards
  type: output
  description: "Build the battlecard review and quality assurance process — ensure accuracy, relevance, and effectiveness through cross-functional review"
  tags: [sales, battlecards, review, quality, cross-functional, process, intermediate]

state: {}

trigger: |
  You're a Senior Product Marketing Manager at "DevOps360" (DevOps
  platform, $58M ARR). Your team just created battlecards for 5
  competitors. Before launching them to 40 sales reps, you need
  a review process. Last time you launched battlecards without review,
  3 had factual errors that embarrassed reps in front of prospects.

  The battlecard review challenge:
  - 5 competitor battlecards to review
  - Each has: positioning, win themes, landmines, talk tracks,
    objection handlers, proof points
  - Review stakeholders needed: Sales (are they usable?), Product
    (are claims accurate?), Legal (any risk?), Marketing (is
    messaging on-brand?), Sales Engineering (are technical claims
    correct?)

  Past review failures:
  - The GitLab battlecard claimed "no CI/CD integration" — GitLab
    actually has CI/CD built in. A rep used this in a demo and
    the prospect corrected them.
  - The CircleCI battlecard used a customer quote from a customer
    who had since churned. The prospect called that customer for
    a reference and heard they left.
  - The Jenkins battlecard pricing was from 2023 — Jenkins is now
    free and open source. The pricing comparison was meaningless.

  Tasks:
  1. Design the "Battlecard Review Workflow" — the step-by-step
     process from draft to launch. Include: who reviews what (each
     stakeholder's review scope), the review timeline (realistic —
     reviewers are busy), the feedback format (structured, not
     open-ended), and the approval gate (who gives final sign-off).

  2. Create the "Battlecard Accuracy Checklist" — 15 specific items
     that must be verified before any battlecard goes live. Cover:
     factual claims, pricing accuracy, customer references (are they
     still customers?), competitive claims (can the prospect verify
     them?), and legal review items (any defamation risk?).

  3. Write the "Post-Launch Feedback Loop" — how you collect feedback
     from reps after they use the battlecards in real deals. Include:
     the feedback mechanism (quick, not burdensome), the review
     cadence (weekly for first month, monthly ongoing), and the
     criteria for triggering an emergency update (when a claim
     turns out to be wrong during a live deal).

assertions:
  - type: llm_judge
    criteria: "Review workflow is practical — stakeholders have defined review scopes, the timeline is realistic (not expecting same-day turnaround from busy reviewers), feedback is structured, and there's a clear final approval gate"
    weight: 0.35
    description: "Practical review workflow"
  - type: llm_judge
    criteria: "Accuracy checklist catches real problems — 15 items that would have caught the past failures (false claims, churned references, stale pricing) with specific verification steps for each"
    weight: 0.35
    description: "Problem-catching accuracy checklist"
  - type: llm_judge
    criteria: "Post-launch feedback loop is quick for reps — feedback mechanism takes under 1 minute, has clear review cadences, and includes emergency update triggers for when errors are discovered in live deals"
    weight: 0.30
    description: "Quick post-launch feedback"
