meta:
  id: fact-impact-act-framework
  level: 2
  course: competitive-battlecards
  type: output
  description: "Apply the Fact-Impact-Act framework — structure battlecard updates as actionable intelligence briefs that tell reps what changed, why it matters, and what to do"
  tags: [sales, battlecards, FIA, framework, intelligence, actionable, intermediate]

state: {}

trigger: |
  You're a Competitive Intelligence Lead at "SecureCloud" (cloud
  security platform, $75M ARR). Your manager introduced the FIA
  (Fact-Impact-Act) framework for battlecard content: every piece
  of competitive intelligence must answer three questions:
  - Fact: What changed? (objective, verifiable)
  - Impact: Why does it matter? (to your deals, your prospects)
  - Act: What should reps do? (specific action, not just awareness)

  You have 5 competitive intelligence signals to process:

  Signal 1: Zscaler raised their enterprise pricing by 18% effective
  next quarter.

  Signal 2: CrowdStrike published a Gartner-sponsored report claiming
  "endpoint-first" security is superior to "cloud-first" approaches
  (your approach).

  Signal 3: Palo Alto Networks just acquired a startup that does
  exactly what your biggest differentiating feature does (AI-powered
  threat prediction).

  Signal 4: A major Fortinet customer (Fortune 100 bank) publicly
  criticized their product for missing a zero-day attack. The story
  is trending on security Twitter.

  Signal 5: SentinelOne just posted a job listing for 50 enterprise
  AEs in your territory, suggesting an aggressive expansion.

  Tasks:
  1. Write the FIA analysis for each of the 5 signals. For each:
     Fact (1-2 sentences, objective), Impact (2-3 sentences, what
     this means for your deals), Act (1-2 specific actions for reps).
     Show how the same framework handles different types of signals
     (pricing, content, acquisition, PR, hiring).

  2. Not all signals are equal. Rank the 5 signals by urgency and
     explain: which require immediate battlecard updates, which can
     wait for the monthly review, and which are "watch and wait"
     (monitor but no action yet). Include the criteria you use for
     urgency ranking.

  3. Design the "Weekly Competitive Intelligence Brief" — a template
     using FIA format that you send to the sales team every Monday.
     It should be: scannable in 2 minutes, prioritized by deal
     impact, actionable (every item has an "Act"), and not more
     than 1 page. Write a sample brief using 3 of the 5 signals.

assertions:
  - type: llm_judge
    criteria: "FIA analyses are well-structured — Facts are objective and verifiable, Impacts connect to specific deal scenarios, and Acts are specific enough for reps to execute (not just 'be aware')"
    weight: 0.35
    description: "Well-structured FIA analyses"
  - type: llm_judge
    criteria: "Urgency ranking is defensible — correctly prioritizes the acquisition threat and pricing change as most urgent (competitive positioning changes), with clear criteria for immediate vs. monthly vs. watch-and-wait"
    weight: 0.30
    description: "Defensible urgency ranking"
  - type: llm_judge
    criteria: "Weekly brief template is practical — 1-page format, scannable in 2 minutes, FIA-structured with clear prioritization and specific actions, with a realistic sample brief using 3 signals"
    weight: 0.35
    description: "Practical weekly brief template"
