meta:
  id: win-loss-to-battlecard
  level: 2
  course: competitive-battlecards
  type: output
  description: "Turn win/loss analysis into battlecard content — extract actionable competitive insights from deal outcomes and translate them into rep-ready materials"
  tags: [sales, battlecards, win-loss, analysis, insights, intermediate]

state: {}

trigger: |
  You're a Competitive Intelligence Analyst at "LogicFlow" (workflow
  automation SaaS, $50M ARR). You've completed 40 win/loss interviews
  for deals involving your top competitor, Zapier. Here are the raw
  findings:

  Won deals (20 interviews):
  - 75% cited LogicFlow's enterprise security features as decisive
  - 60% said your implementation team was a differentiator
  - 55% mentioned that Zapier felt "too consumer-grade" for their needs
  - Key quote: "Zapier is great for simple automations but breaks
    down when you need conditional logic across 10+ systems"
  - Average deal size: $85K, Average cycle: 62 days

  Lost deals (20 interviews):
  - 65% said Zapier's self-serve model let them start immediately
  - 50% said Zapier's marketplace of pre-built integrations was
    decisive (6,000 vs. your 200)
  - 40% said LogicFlow's pricing was "opaque" — they couldn't find
    pricing on your website
  - Key quote: "We liked LogicFlow more but we needed something
    running by Friday. Zapier was live in 20 minutes."
  - Average deal size: $35K, Average cycle: 44 days

  Pattern insights:
  - You win larger deals ($85K avg) but lose smaller ones ($35K avg)
  - You win when the prospect needs complexity; you lose when they
    need speed
  - Your biggest gap: time-to-value (Zapier: minutes, LogicFlow: weeks)

  Tasks:
  1. Translate these win/loss findings into specific battlecard
     content. Write the Zapier battlecard sections that would be
     DIFFERENT based on this data vs. generic competitive research.
     Include: 3 win themes, 3 landmine questions, the positioning
     statement, and the talk track — all derived from actual deal
     outcomes, not assumptions.

  2. Create the "Win/Loss → Battlecard Translation Guide" — a
     framework that any analyst can use to convert raw win/loss
     interview data into battlecard content. Include: how to
     identify patterns from interviews, how to prioritize findings,
     how to write them in rep-ready language, and the minimum sample
     size needed for reliable insights.

  3. The data shows you lose on speed-to-value. Write the honest
     acknowledgment section of the battlecard that addresses this
     weakness. Reps need to know: when to acknowledge the speed gap,
     how to reframe it as a "right tool for the right job" message,
     and when to disqualify (prospect needs speed, not complexity).

assertions:
  - type: llm_judge
    criteria: "Battlecard content is data-derived — win themes, landmines, positioning, and talk track clearly trace back to specific win/loss findings rather than generic competitive assumptions"
    weight: 0.35
    description: "Data-derived battlecard content"
  - type: llm_judge
    criteria: "Translation guide is replicable — provides a clear framework for converting any win/loss dataset to battlecard content, with pattern identification, prioritization, rep-ready language conversion, and sample size guidance"
    weight: 0.30
    description: "Replicable translation guide"
  - type: llm_judge
    criteria: "Honest weakness acknowledgment is useful — addresses the speed-to-value gap without being defensive, provides a clear reframe for the right situations, and includes disqualification criteria for speed-sensitive deals"
    weight: 0.35
    description: "Useful weakness acknowledgment"
