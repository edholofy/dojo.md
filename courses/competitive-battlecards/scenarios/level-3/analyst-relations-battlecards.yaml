meta:
  id: analyst-relations-battlecards
  level: 3
  course: competitive-battlecards
  type: output
  description: "Leverage analyst relations for competitive advantage — use Gartner, Forrester, and IDC positioning to strengthen battlecards and influence buyer perception"
  tags: [sales, battlecards, analyst-relations, Gartner, Forrester, influence, advanced]

state: {}

trigger: |
  You're the Director of Analyst Relations and Competitive
  Intelligence at "CloudOps" (cloud operations platform, $80M ARR).
  The Gartner Magic Quadrant for Cloud Management just came out.
  Results:

  - Leaders: VMware, ServiceNow
  - Challengers: IBM, BMC
  - Visionaries: CloudOps (you), Flexera
  - Niche Players: Morpheus, Scalr

  Your sales team is both excited ("We're in the MQ!") and
  frustrated ("Why aren't we a Leader?"). Meanwhile, your top
  competitor VMware is plastering "Gartner Leader" across every
  piece of marketing. Your second competitor ServiceNow is citing
  their MQ position in every sales call.

  Additional analyst coverage:
  - Forrester Wave for Cloud Cost Management: CloudOps ranked "Strong
    Performer" (VMware is Leader)
  - IDC MarketScape for Cloud Optimization: CloudOps ranked "Major
    Player" (ServiceNow is Leader)
  - GigaOm Radar for Cloud Observability: CloudOps ranked "Leader"
    (finally, you lead something)

  Tasks:
  1. Write the analyst-integrated battlecard content for VMware and
     ServiceNow. For each: how to acknowledge their Leader position
     without conceding (Gartner evaluates 15 criteria — you may lead
     on the ones that matter to THIS prospect), how to leverage your
     Visionary position ("Visionary means innovation — Leaders often
     mean legacy"), and when to cite the GigaOm report where you're
     the Leader.

  2. Create the "Analyst Intelligence Playbook" — how reps should
     use and NOT use analyst reports in competitive selling. Include:
     the 3 things you CAN say about analyst reports ("we're
     recognized by Gartner in this market"), the 3 things you should
     NEVER say ("Gartner says we're better"), and how to respond
     when a prospect says "but Gartner says VMware is the Leader."

  3. Write the analyst relations strategy for moving from Visionary
     to Leader in the next MQ cycle. Include: the 5 criteria Gartner
     uses that you're weakest on, the specific actions to improve
     each, and how this strategy feeds into your battlecards (future
     competitive positioning based on where you'll be in 12 months).

assertions:
  - type: llm_judge
    criteria: "Analyst-integrated content is sophisticated — acknowledges competitor Leader status without conceding, reframes Visionary as innovation-focused, strategically uses GigaOm where advantageous, and helps reps navigate analyst positioning conversations"
    weight: 0.35
    description: "Sophisticated analyst integration"
  - type: llm_judge
    criteria: "Analyst playbook has clear do's and don'ts — 3 permitted uses that are accurate and ethical, 3 prohibited uses that would be misleading, and a specific response for 'Gartner says they're Leader' that redirects to prospect-specific criteria"
    weight: 0.35
    description: "Clear analyst playbook"
  - type: llm_judge
    criteria: "MQ advancement strategy is realistic — identifies specific Gartner criteria, proposes actionable improvements, and connects the 12-month analyst strategy to future battlecard positioning"
    weight: 0.30
    description: "Realistic MQ advancement strategy"
