meta:
  id: category-creation-battlecards
  level: 3
  course: competitive-battlecards
  type: output
  description: "Create battlecards for category creation — position your product as a new category rather than competing in an existing one where incumbents dominate"
  tags: [sales, battlecards, category-creation, positioning, strategy, advanced]

state: {}

trigger: |
  You're the VP of Product Marketing at "Synapse" (AI-powered
  revenue intelligence platform, $45M ARR). You're stuck in the
  "conversation intelligence" category alongside Gong ($250M ARR)
  and Chorus ($100M ARR, now part of ZoomInfo). You can't win a
  feature comparison against Gong — they have 5x your R&D budget.

  Your CEO's strategy: "Stop competing in conversation intelligence.
  Create the 'Revenue Intelligence' category where we're the
  leader." Synapse does more than call recording — you analyze
  pipeline data, CRM activity, email sentiment, and market signals
  to predict deal outcomes. Gong and Chorus focus on calls.

  The challenge: Your reps keep getting pulled into conversation
  intelligence comparisons. Prospects say "we're evaluating Gong
  and Synapse" — framing you as a Gong alternative. Your battlecards
  need to REFRAME the evaluation, not just compete within it.

  Tasks:
  1. Create the "Category Creation Battlecard" — a fundamentally
     different type of battlecard that doesn't compare features
     but redefines the evaluation. Include: the category narrative
     (why "conversation intelligence" is limited), the new category
     definition ("revenue intelligence" — what it includes that CI
     doesn't), the positioning against Gong that's NOT a comparison
     but a reframe, and the questions reps ask to shift the
     prospect's frame of reference.

  2. Write the "Evaluation Reframe Talk Track" — the specific words
     reps use when a prospect says "we're evaluating you against
     Gong." The talk track must: not disparage Gong, acknowledge
     their strength in conversation intelligence, and expand the
     evaluation criteria to include pipeline intelligence, deal
     prediction, and revenue forecasting where Gong doesn't compete.

  3. Address the risk: category creation can confuse prospects who
     came looking for a specific solution. Write the "When to
     Compete vs. When to Create" decision framework — situations
     where you should compete head-to-head on conversation
     intelligence (the prospect only wants call recording) vs.
     when you should reframe to revenue intelligence (the prospect
     wants broader revenue visibility).

assertions:
  - type: llm_judge
    criteria: "Category creation battlecard reframes rather than compares — defines the new category compellingly, positions Gong as a subset rather than a competitor, and provides questions that naturally expand evaluation criteria"
    weight: 0.35
    description: "Reframing category battlecard"
  - type: llm_judge
    criteria: "Evaluation reframe talk track is natural — acknowledges Gong's strength, expands the conversation without disparaging, and provides a credible reason to evaluate on broader criteria"
    weight: 0.35
    description: "Natural evaluation reframe"
  - type: llm_judge
    criteria: "Compete vs. create decision framework is practical — identifies clear signals for when to compete (narrow need) vs. reframe (broad need), preventing category creation confusion in prospects who just want a simple solution"
    weight: 0.30
    description: "Practical compete vs create framework"
