meta:
  id: competitive-review-sites
  level: 3
  course: competitive-battlecards
  type: output
  description: "Leverage review site intelligence for battlecards — mine G2, Capterra, and TrustRadius for competitive insights and integrate them into your battlecard strategy"
  tags: [sales, battlecards, reviews, G2, Capterra, social-proof, advanced]

state: {}

trigger: |
  You're a CI Manager at "CloudHR" (HR platform, $55M ARR). Review
  sites are a goldmine of competitive intelligence, but your team
  hasn't systematically used them. You have access to G2 (4,200
  reviews across 5 competitors), Capterra (2,800 reviews), and
  TrustRadius (950 reviews).

  Your competitive landscape on G2:
  - CloudHR: 4.3 stars (380 reviews), ranked #5 in category
  - Workday: 4.0 stars (1,200 reviews), ranked #1 (volume matters)
  - BambooHR: 4.5 stars (2,100 reviews), ranked #2
  - Rippling: 4.8 stars (580 reviews), ranked #3
  - Gusto: 4.3 stars (1,200 reviews), ranked #4

  Key review insights you've extracted:
  - CloudHR's top positive theme: "Best customer support" (mentioned
    in 68% of positive reviews)
  - CloudHR's top negative theme: "Limited reporting" (mentioned in
    42% of negative reviews)
  - Rippling's hidden weakness: "Terrible for companies over 500
    employees" (mentioned in 35% of negative reviews, not visible
    from their marketing)
  - Workday's cost complaint: "You need consultants for everything"
    (mentioned in 55% of negative reviews)

  Tasks:
  1. Create the "Review Site Intelligence Protocol" — how you
     systematically extract competitive insights from review sites.
     Include: what to look for (themes, not individual reviews),
     how to quantify findings (thematic analysis), how often to
     refresh (quarterly minimum), and how to validate review data
     (incentivized reviews, competitor manipulation detection).

  2. Write the battlecard sections powered by review site data.
     For each competitor, create: the "What Their Customers Say"
     section (citing real review themes), the "Hidden Weaknesses"
     section (things you learn from reviews that aren't in their
     marketing), and the "Social Proof Comparison" (how to use your
     review positioning in sales conversations).

  3. Write the "G2 Strategy" — how to improve your own G2 ranking
     to support competitive selling. Include: ethical review
     generation (asking happy customers, not incentivizing), response
     strategy for negative reviews, and how to use G2 badges and
     reports in battlecards. Address the ethics: what's acceptable
     review management vs. review manipulation.

assertions:
  - type: llm_judge
    criteria: "Intelligence protocol is systematic — provides a replicable method for extracting thematic insights from review sites, with quantification, refresh cadence, and validation for fake or incentivized reviews"
    weight: 0.35
    description: "Systematic review intelligence protocol"
  - type: llm_judge
    criteria: "Review-powered battlecard sections add unique value — competitor sections cite real review themes that aren't in marketing materials, providing intelligence reps can't get from competitor websites"
    weight: 0.35
    description: "Unique review-powered sections"
  - type: llm_judge
    criteria: "G2 strategy is ethical — review generation approach respects platform rules, addresses negative reviews constructively, and draws clear line between legitimate review management and manipulation"
    weight: 0.30
    description: "Ethical G2 strategy"
