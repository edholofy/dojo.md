meta:
  id: competitive-intelligence-program
  level: 3
  course: competitive-battlecards
  type: output
  description: "Build a comprehensive competitive intelligence program — create the organizational capability that feeds battlecards with continuous, validated intelligence"
  tags: [sales, battlecards, competitive-intelligence, program, organization, advanced]

state: {}

trigger: |
  You're the newly hired Director of Competitive Intelligence at
  "TechBridge" (integration platform, $95M ARR, 80 sales reps).
  You're the company's first CI hire. Currently, competitive
  intelligence is scattered: marketing has some competitor info,
  product has feature comparisons, and individual reps have tribal
  knowledge that they don't share.

  Your mandate: Build TechBridge's competitive intelligence program
  from scratch. Your budget: $200K/year (1 FTE — you, plus tools
  and resources).

  Current state:
  - No CI tools — monitoring is manual
  - Battlecards: 3 exist (outdated, created by a former PMM)
  - Win/loss analysis: None formal, occasional anecdotes
  - Competitive data sources: Reps' personal knowledge, competitor
    websites, occasional Gartner reports
  - Cross-functional alignment: Zero — product, sales, and marketing
    have different views of the competitive landscape
  - Competitors tracked: 8 (but should probably be 4-5 priority)
  - Sales feedback: No mechanism for reps to share competitive intel

  Key competitors by revenue impact:
  1. MuleSoft (Salesforce): 35% of lost competitive deals
  2. Boomi (Dell): 25% of lost competitive deals
  3. Workato: 20% of lost competitive deals
  4. Tray.io: 10% of lost competitive deals
  5-8. Long tail (10% combined)

  Tasks:
  1. Design the "CI Program Launch Plan" — your first 90 days. Break
     it into 3 phases:
     Phase 1 (Days 1-30): Quick wins — what you deliver immediately
     Phase 2 (Days 31-60): Systems — what infrastructure you build
     Phase 3 (Days 61-90): Scale — what ongoing processes you establish
     Each phase must have deliverables, cross-functional dependencies,
     and success metrics.

  2. Create the "Competitive Intelligence Technology Stack" — with
     $200K budget (minus your salary), recommend the tools you'd
     invest in. Evaluate: CI platforms (Crayon, Klue, Kompyte),
     monitoring tools, CRM integration, and content distribution.
     Justify each investment with expected ROI.

  3. Write the "Cross-Functional CI Charter" — the document that
     defines how product, marketing, sales, and customer success
     each contribute to and benefit from the CI program. Include:
     each team's CI responsibilities, what they receive in return,
     the meeting cadence, and the escalation path for competitive
     emergencies.

assertions:
  - type: llm_judge
    criteria: "90-day plan delivers quick wins first — Phase 1 produces immediately usable deliverables (top 4 battlecards, basic monitoring), Phase 2 builds infrastructure (tools, processes, feedback loops), Phase 3 establishes sustainable operations"
    weight: 0.35
    description: "Quick-win-first 90-day plan"
  - type: llm_judge
    criteria: "Technology stack is budget-appropriate — recommends tools that fit within the $200K budget (after salary), with clear ROI justification for each investment, not just listing every CI tool available"
    weight: 0.30
    description: "Budget-appropriate tech stack"
  - type: llm_judge
    criteria: "Cross-functional charter is realistic — defines specific responsibilities for each team (not just 'share information'), what each team gets in return, and a meeting cadence that busy teams will actually follow"
    weight: 0.35
    description: "Realistic cross-functional charter"
