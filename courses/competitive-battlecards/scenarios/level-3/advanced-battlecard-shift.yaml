meta:
  id: advanced-battlecard-shift
  level: 3
  course: competitive-battlecards
  type: output
  description: "Shift simulation — navigate a complex competitive landscape shift where a major acquisition changes the competitive dynamics for your entire company"
  tags: [sales, battlecards, simulation, acquisition, market-shift, advanced]

state: {}

trigger: |
  You're the Head of Competitive Intelligence at "AppFlow" (workflow
  automation, $85M ARR). BREAKING NEWS: Salesforce just announced
  the acquisition of your #2 competitor, Workato, for $3.5B. This
  changes everything.

  Before the acquisition:
  - Your competitive landscape: MuleSoft (#1 threat), Workato (#2),
    Tray.io (#3), Boomi (#4)
  - Your battlecards addressed each separately with clear positioning

  After the acquisition:
  - MuleSoft (already Salesforce) + Workato = One mega-competitor
    with the Salesforce ecosystem behind it
  - Workato's independent positioning is gone — it will become
    "Salesforce Workato" or similar
  - Salesforce now owns BOTH of your top 2 competitors
  - Tray.io and Boomi may respond with their own pivots
  - Your customers are panicking: "Should we switch to Salesforce
    now that they own everything?"
  - Your prospects are confused: "If Salesforce bought Workato,
    should we just buy the Salesforce stack?"

  Immediate impacts:
  - 15 active deals where Workato is a competitor: all paused
  - 8 active deals where MuleSoft is a competitor: prospects are
    asking about Workato integration
  - Customer retention: 5 accounts on annual renewal are asking
    about Salesforce's combined offering
  - Your sales team is demoralized: "How do we compete against
    Salesforce + Workato?"

  Tasks:
  1. Write the "Competitive Landscape Restructure" — completely
     rethink your competitive positioning in light of the acquisition.
     Include: what changes (Salesforce now owns your top 2
     competitors), what stays the same (independent vendor advantages),
     new competitive angles (acquisition disruption, customer
     confusion, integration uncertainty), and the updated battlecard
     strategy.

  2. Create 3 emergency deliverables (needed within 48 hours):
     a) Updated Workato battlecard reflecting Salesforce ownership
     b) Internal FAQ for sales team addressing their concerns
     c) Customer email template for at-risk accounts reassuring
        them about AppFlow's independence

  3. Write the "Anti-Platform Play" — the strategic positioning for
     AppFlow as the independent, best-of-breed alternative to the
     Salesforce monopoly. This becomes your new competitive narrative
     for ALL battlecards. Include: the independence value proposition,
     the anti-lock-in message, and the proof that best-of-breed
     outperforms platform bundles in your category.

assertions:
  - type: llm_judge
    criteria: "Landscape restructure is strategically sound — correctly identifies new dynamics (Salesforce monopoly, integration uncertainty, customer confusion), new competitive angles (independence, focus, integration flexibility), and how all battlecards need to evolve"
    weight: 0.35
    description: "Strategically sound restructure"
  - type: llm_judge
    criteria: "Emergency deliverables are usable — battlecard addresses Salesforce ownership realistically, internal FAQ calms team concerns with data and strategy, customer email provides genuine reassurance without dismissing the acquisition's significance"
    weight: 0.35
    description: "Usable emergency deliverables"
  - type: llm_judge
    criteria: "Anti-platform positioning is compelling — makes a credible case for independent best-of-breed over platform bundles, with specific arguments (focus, innovation speed, no lock-in, integration flexibility) that resonate with prospects"
    weight: 0.30
    description: "Compelling anti-platform positioning"
