meta:
  id: cross-functional-battlecards
  level: 3
  course: competitive-battlecards
  type: output
  description: "Build battlecards with cross-functional input — integrate insights from product, customer success, marketing, and engineering into competitive content"
  tags: [sales, battlecards, cross-functional, collaboration, product, CS, advanced]

state: {}

trigger: |
  You're the Senior CI Analyst at "DataFlow" (data pipeline SaaS,
  $60M ARR). Your battlecards have been good but one-dimensional —
  built entirely from sales perspective. Your CRO says: "Product
  knows things sales doesn't. CS hears things product doesn't. We
  need cross-functional battlecards."

  Cross-functional intelligence you need to integrate:

  From Product team:
  - Detailed technical comparison (API performance, architecture
    differences, scalability benchmarks) that reps can't assess
  - Roadmap items that will close competitive gaps in 3-6 months
  - Technical limitations your competitors have that aren't visible
    in demos but matter in production

  From Customer Success:
  - Why customers considered switching to competitors (churn risk
    intelligence — "they evaluated Airbyte because of...")
  - What existing customers love that you should emphasize more
  - Real implementation timelines vs. competitor promises

  From Marketing:
  - How competitors position themselves (messaging analysis)
  - What keywords competitors are targeting (SEO competitive data)
  - What content resonates with prospects evaluating your category

  From Engineering:
  - Security and compliance differences (real, not marketing claims)
  - Performance benchmarks (how your system actually performs under
    load vs. competitors)
  - Integration depth (surface-level vs. deep API integration)

  Tasks:
  1. Design the "Cross-Functional Battlecard Intelligence System" —
     how each team contributes to battlecards. For each team: what
     intelligence they provide (specific, not vague), the collection
     mechanism (meeting, Slack channel, quarterly review), and how
     their input gets translated into rep-usable battlecard content.

  2. Write the battlecard section that comes from each team. Create
     one section sourced from Product (technical differentiation),
     one from CS (customer-validated proof points), one from
     Marketing (positioning and messaging), and one from Engineering
     (security/performance claims). Show how each section is
     different from what sales alone would produce.

  3. Address the coordination challenge: "Getting 4 teams to
     contribute regularly is hard. They all think it's someone else's
     job." Write the incentive structure and accountability framework
     that makes cross-functional CI contribution sustainable.

assertions:
  - type: llm_judge
    criteria: "Intelligence system has specific contributions per team — each team provides distinct, named intelligence types with clear collection mechanisms, not vague 'share competitive info' mandates"
    weight: 0.35
    description: "Specific team contributions"
  - type: llm_judge
    criteria: "Team-sourced sections are distinctly valuable — Product section has technical depth sales can't provide, CS section has real customer validation, Marketing section has messaging intelligence, Engineering section has verified performance claims"
    weight: 0.30
    description: "Distinctly valuable team sections"
  - type: llm_judge
    criteria: "Coordination framework is sustainable — incentive structure and accountability make cross-functional contribution feel like part of each team's job (not extra work), with realistic expectations for time commitment"
    weight: 0.35
    description: "Sustainable coordination framework"
