meta:
  id: ethical-competitive-intelligence
  level: 3
  course: competitive-battlecards
  type: output
  description: "Navigate ethical boundaries in competitive intelligence — understand what's acceptable, what crosses lines, and how to build a CI program with integrity"
  tags: [sales, battlecards, ethics, competitive-intelligence, integrity, legal, advanced]

state: {}

trigger: |
  You're the VP of Marketing at "SecureNet" (cybersecurity SaaS,
  $75M ARR). Your Competitive Intelligence team has brought you
  5 intelligence-gathering scenarios and wants your ruling on
  whether each is ethical, unethical, or in a gray area.

  Scenario 1: Mystery shopping
  Your CI analyst created a fake email address and signed up for a
  CrowdStrike demo pretending to be a prospect. They recorded the
  demo and extracted pricing, positioning, and product capabilities.
  The CI analyst's reasoning: "This is public information — anyone
  can sign up for a demo."

  Scenario 2: Social media intelligence
  Your team found a competitor's VP of Product posting about their
  upcoming product roadmap on LinkedIn. They screenshotted it and
  shared it internally. A week later, the VP deleted the post.
  CI analyst's reasoning: "It was public. We didn't hack anything."

  Scenario 3: Former competitor employee
  You just hired an engineer who worked at Palo Alto for 3 years.
  Your CI team wants to interview her about Palo Alto's architecture,
  product roadmap, and internal challenges.
  CI analyst's reasoning: "She's our employee now. Her knowledge is
  her knowledge."

  Scenario 4: Customer reference manipulation
  Your CI team found that a key Fortinet customer (listed as a
  case study on Fortinet's website) is unhappy and considering
  leaving. Your team wants to contact them directly to gather
  negative intelligence about Fortinet.
  CI analyst's reasoning: "They're a prospect for us too. We're
  doing outreach."

  Scenario 5: Competitive bidding intelligence
  A prospect accidentally included you on an email thread that
  contained CrowdStrike's pricing proposal. You now know exactly
  what CrowdStrike bid.
  CI analyst's reasoning: "They sent it to us. We didn't steal it."

  Tasks:
  1. For each scenario, provide the ethics ruling: ethical, unethical,
     or gray area. For each, explain: the principle at stake, the
     risk if caught, the industry standard (SCIP Code of Ethics),
     and your recommended action. Be specific — "it depends" is not
     an answer.

  2. Write the "Competitive Intelligence Ethics Policy" for SecureNet.
     Include: the 5 principles of ethical CI, the specific practices
     that are approved (with examples), the specific practices that
     are prohibited (with examples), the gray areas that require
     management approval, and the consequences for violations.

  3. Your CI analyst argues: "Our competitors don't play fair. Why
     should we?" Write the business case for ethical CI — why
     integrity is a competitive advantage, not a disadvantage.
     Include: reputational risk, legal exposure, customer trust
     impact, and talent attraction.

assertions:
  - type: llm_judge
    criteria: "Ethics rulings are well-reasoned — each scenario gets a clear ruling with principle-based reasoning, not just opinion, referencing SCIP ethics standards and distinguishing between public information, deception, trade secrets, and accidental disclosure"
    weight: 0.35
    description: "Well-reasoned ethics rulings"
  - type: llm_judge
    criteria: "Ethics policy is comprehensive and specific — 5 clear principles with specific approved and prohibited practices, gray area guidance, and enforcement consequences, usable as an actual company policy"
    weight: 0.35
    description: "Comprehensive ethics policy"
  - type: llm_judge
    criteria: "Business case for ethical CI is convincing — explains why integrity is strategically advantageous (reputation, legal protection, customer trust, talent) rather than just morally right, making the case in business language"
    weight: 0.30
    description: "Convincing ethics business case"
