meta:
  id: competitive-pricing-strategy
  level: 3
  course: competitive-battlecards
  type: output
  description: "Build pricing-focused battlecard content — create the TCO analyses, ROI models, and pricing positioning that help reps win price-sensitive competitive deals"
  tags: [sales, battlecards, pricing, TCO, ROI, value, advanced]

state: {}

trigger: |
  You're a Pricing Strategy Manager at "CloudGuard" (cloud security,
  $70M ARR). Your pricing is $85/endpoint/month. Your competitors:
  - CrowdStrike: $110/endpoint/month (enterprise premium)
  - SentinelOne: $70/endpoint/month (your closest price competitor)
  - Carbon Black (VMware): $45/endpoint/month (budget option)
  - Open-source alternatives: Free (ClamAV, OSSEC)

  Your pricing position: mid-range. You're cheaper than CrowdStrike
  but more expensive than SentinelOne and Carbon Black. Prospects
  constantly ask "why should I pay $85 when I can get SentinelOne
  for $70 or Carbon Black for $45?"

  Pricing data you have:
  - Average deployment cost: CloudGuard $15K, CrowdStrike $45K,
    SentinelOne $20K, Carbon Black $30K (requires more customization)
  - Annual maintenance cost: CloudGuard $0 (included), CrowdStrike
    $12K, SentinelOne $5K, Carbon Black $15K
  - Average time to deploy: CloudGuard 2 weeks, CrowdStrike 8 weeks,
    SentinelOne 3 weeks, Carbon Black 6 weeks
  - False positive rate: CloudGuard 2%, CrowdStrike 1%, SentinelOne
    5%, Carbon Black 8% (each 1% = $8K/year in analyst time)
  - 3-year TCO for 500 endpoints (all-in):
    CloudGuard: $1.53M
    CrowdStrike: $2.38M
    SentinelOne: $1.47M
    Carbon Black: $1.71M

  Tasks:
  1. Create the "Pricing Battlecard Section" for each competitor.
     Each must include: the per-unit price comparison (honest), the
     TCO comparison (where you win against CrowdStrike and Carbon
     Black), the value comparison (when per-unit price is the wrong
     metric), and the specific pricing objection handler.

  2. Build the "TCO Calculator Talk Track" — the 3-minute
     conversation where reps walk prospects through total cost of
     ownership. Include: the opening question, the data points to
     present, the visual framework (how to sketch this on a
     whiteboard or share screen), and the closing that connects
     TCO to the prospect's budget.

  3. Write the "Pricing Positioning Decision Matrix" — when to
     compete on price (vs. Carbon Black: show TCO), when to compete
     on value (vs. SentinelOne: show better outcomes), and when to
     compete on premium (vs. CrowdStrike: show same quality, lower
     price). Include the diagnostic questions that tell you which
     pricing conversation to have.

assertions:
  - type: llm_judge
    criteria: "Pricing battlecard sections are competitor-specific — CrowdStrike section shows TCO advantage, SentinelOne section pivots to value, Carbon Black section exposes hidden costs, each with honest per-unit comparison and specific objection handler"
    weight: 0.35
    description: "Competitor-specific pricing sections"
  - type: llm_judge
    criteria: "TCO calculator talk track is executable — 3-minute conversation with specific opening, data points, visual framework, and closing that a rep could actually deliver during a call"
    weight: 0.30
    description: "Executable TCO talk track"
  - type: llm_judge
    criteria: "Pricing decision matrix is clear — provides distinct strategies for each competitive situation (TCO, value, premium) with diagnostic questions that tell reps which conversation to have"
    weight: 0.35
    description: "Clear pricing decision matrix"
