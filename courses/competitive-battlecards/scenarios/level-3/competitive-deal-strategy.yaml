meta:
  id: competitive-deal-strategy
  level: 3
  course: competitive-battlecards
  type: output
  description: "Use battlecards for competitive deal strategy — move beyond reactive objection handling to proactive competitive deal planning"
  tags: [sales, battlecards, deal-strategy, proactive, planning, advanced]

state: {}

trigger: |
  You're a Strategic Account Manager at "InnoSec" (cybersecurity
  platform, $90M ARR). You've just learned that your biggest prospect
  (Fortune 500 bank, potential $2M deal) is running a formal
  evaluation with 4 vendors: you, CrowdStrike, Palo Alto, and
  Microsoft Defender.

  The evaluation timeline: 16 weeks
  Your champion: CISO, recently hired, wants to make a bold choice
  Your competitor intelligence:
  - CrowdStrike: Already has 2 departments in this bank. Incumbent
    advantage. Their enterprise AE has been selling here for 3 years.
  - Palo Alto: The bank's CTO is a former Palo Alto VP. Strong
    relationship at the top.
  - Microsoft Defender: "Free" with existing Microsoft E5 license.
    The CFO is pushing this as the "no additional cost" option.

  Your battlecards tell you WHAT each competitor's strengths and
  weaknesses are. But for a $2M deal, you need a competitive DEAL
  STRATEGY — how to use competitive intelligence proactively across
  16 weeks.

  Tasks:
  1. Create the "Competitive Deal Strategy Map" for this specific
     deal. For each of the 16 weeks, identify: the primary
     competitive threat, your competitive move, the battlecard
     content you deploy, and the risk if you don't act. This is
     a chess game — you need to think 3 moves ahead.

  2. Write the "Competitor Neutralization Plan" for each competitor:
     - CrowdStrike: How do you neutralize their incumbent advantage?
     - Palo Alto: How do you neutralize the CTO's personal
       relationship?
     - Microsoft Defender: How do you neutralize the "free" argument?
     Each plan must be specific, ethical, and actionable within the
     evaluation timeline.

  3. Design the "Competitive Win Room" — a cross-functional war room
     for this specific deal. Who needs to be involved (AE, SE, exec
     sponsor, CI analyst, product), what each person's competitive
     role is, the meeting cadence, and the intelligence-gathering
     assignments for each team member.

assertions:
  - type: llm_judge
    criteria: "Deal strategy map is proactive — 16-week plan shows specific competitive moves timed to evaluation phases, anticipates competitor actions, and positions proactively rather than reacting to competitor tactics"
    weight: 0.35
    description: "Proactive deal strategy map"
  - type: llm_judge
    criteria: "Neutralization plans are specific and ethical — addresses CrowdStrike's incumbency (redefine requirements), Palo Alto's relationship (earn CISO's trust through value), Microsoft's 'free' (expose hidden costs) with actionable, ethical tactics"
    weight: 0.35
    description: "Specific ethical neutralization plans"
  - type: llm_judge
    criteria: "Win room design is operationally realistic — cross-functional team with clear competitive roles, realistic meeting cadence, and specific intelligence-gathering assignments that add value without being busywork"
    weight: 0.30
    description: "Realistic win room design"
