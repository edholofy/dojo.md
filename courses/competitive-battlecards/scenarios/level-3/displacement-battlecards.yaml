meta:
  id: displacement-battlecards
  level: 3
  course: competitive-battlecards
  type: output
  description: "Build displacement battlecards — create specialized cards for ripping out incumbents that address switching costs, migration, and change management"
  tags: [sales, battlecards, displacement, switching, migration, incumbent, advanced]

state: {}

trigger: |
  You're the Head of Competitive Strategy at "NextGen ERP" (cloud
  ERP platform, $120M ARR). 80% of your target market is running
  SAP or Oracle ERP on-premise. Your product is cloud-native,
  mid-market focused, and 60% less expensive. But displacement deals
  are your hardest — incumbents have deep roots.

  The displacement challenge:
  - SAP/Oracle have been installed for 10-20 years
  - Custom integrations, workflows, and reports built on top
  - Thousands of users trained on the old system
  - IT teams whose jobs are maintaining the incumbent
  - Sunk cost psychology: "We've invested $5M in SAP, we can't
    walk away"
  - Risk aversion: "Nobody ever got fired for buying SAP"

  Your displacement success data:
  - Win rate in greenfield (no incumbent): 45%
  - Win rate displacing SAP: 12%
  - Win rate displacing Oracle: 18%
  - Average displacement cycle: 14 months (vs. 5 months greenfield)
  - Displaced customers report 40% cost reduction after migration

  Tasks:
  1. Create the "Displacement Battlecard for SAP" — this is NOT a
     standard competitive battlecard. It must address: the emotional
     barriers (sunk cost, fear of change), the practical barriers
     (migration cost, data transfer, user retraining), the political
     barriers (SAP consultants and IT team resistance), and the
     financial case (TCO comparison including migration costs). Each
     section needs specific content, not just categories.

  2. Write the "Displacement Deal Qualification Criteria" — not
     every SAP/Oracle customer is ready to switch. Create the
     scoring framework (10 criteria) that helps reps identify
     which accounts are displacement-ready (high pain, contract
     expiring, new leadership) vs. which are too deeply entrenched.
     Include the score threshold for "pursue" vs. "nurture" vs.
     "avoid."

  3. Design the "Phased Displacement Strategy" — for accounts scored
     as displacement-ready, map the battlecard content to a 14-month
     deal cycle. Show which battlecard content is used in each phase:
     awareness (months 1-3), evaluation (months 4-7), decision
     (months 8-11), and migration commitment (months 12-14).

assertions:
  - type: llm_judge
    criteria: "Displacement battlecard addresses all barrier types — emotional (sunk cost, fear), practical (migration, retraining), political (IT resistance, consultant influence), and financial (TCO with migration costs included) with specific content for each"
    weight: 0.35
    description: "Complete displacement battlecard"
  - type: llm_judge
    criteria: "Qualification criteria are discriminating — 10 criteria that genuinely separate displacement-ready accounts from entrenched ones, with a clear scoring system and threshold that prevents reps from wasting time on unwinnable deals"
    weight: 0.35
    description: "Discriminating qualification criteria"
  - type: llm_judge
    criteria: "Phased strategy maps content to timeline — shows which battlecard content is relevant at each stage of a 14-month cycle, reflecting the reality that displacement messaging evolves significantly from awareness to migration commitment"
    weight: 0.30
    description: "Timeline-mapped phased strategy"
