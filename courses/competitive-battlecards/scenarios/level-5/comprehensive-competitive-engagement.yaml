meta:
  id: comprehensive-competitive-engagement
  level: 5
  course: competitive-battlecards
  type: output
  description: "Comprehensive capstone — design, implement, and measure a complete competitive intelligence transformation for a global organization"
  tags: [sales, battlecards, capstone, comprehensive, transformation, master]

state: {}

trigger: |
  You're the newly appointed Chief Revenue Officer at "NovaTech"
  (enterprise cloud platform, $800M ARR, 2,000 sales reps, 25
  countries). Your predecessor was fired because the company's
  competitive win rate has declined from 30% to 18% over 3 years.
  The board's mandate: "Fix our competitive selling or we'll find
  someone who can."

  Your 90-day diagnostic findings:
  - 2,000 reps across 5 segments: SMB, Mid-Market, Enterprise,
    Strategic, Channel
  - 25 named competitors across segments (top 5 account for 80%
    of competitive deals)
  - Existing battlecards: 8 (for 25 competitors — stale, unused)
  - Competitive win rate: 18% (industry avg: 27%)
  - Revenue from competitive wins: $288M last year
  - Revenue lost to competitors: $880M in pipeline
  - CI team: 0 dedicated headcount (CI is "marketing's job")
  - Win/loss program: None
  - Technology: No CI platform, no conversation intelligence
  - Cross-functional alignment: Product and sales disagree on
    competitive positioning
  - Channel: 500 partners have ZERO competitive enablement
  - Global: 15 countries have different competitive landscapes
  - Customer perception: "NovaTech reps don't understand our
    competitive alternatives" (NPS survey feedback)

  Budget: $5M over 3 years ($2M Y1, $2M Y2, $1M Y3)
  Timeline: Board wants competitive win rate at 25% by end of Y2

  Tasks:
  1. Write the "3-Year Competitive Intelligence Transformation
     Strategy" covering:
     a) Year 1: Foundation (CI team, technology, battlecards,
        training, win/loss program)
     b) Year 2: Scale (AI integration, global rollout, channel
        enablement, analytics)
     c) Year 3: Excellence (predictive CI, dynamic battlecards,
        industry leadership)
     For each year: key initiatives, budget allocation, headcount
     plan, milestones, and risk factors.

  2. Write the "Transformation Business Case" — the document that
     makes the $5M investment case to the board. Use NovaTech's
     numbers: $800M ARR, 18% competitive win rate, $880M in lost
     competitive pipeline, to calculate the revenue impact of
     improvement and ROI of the investment.

  3. Write the "100-Day Quick Wins Plan" — 5 initiatives in the
     first 100 days that show measurable competitive improvement
     and build organizational confidence. Include the board update
     you'd present at Day 100 showing progress.

assertions:
  - type: llm_judge
    criteria: "3-year strategy is comprehensive and phased — Year 1 builds foundation without overwhelming, Year 2 scales with technology and global rollout, Year 3 achieves excellence, each with specific initiatives, budgets, headcount, and milestones"
    weight: 0.35
    description: "Comprehensive phased 3-year strategy"
  - type: llm_judge
    criteria: "Business case is board-compelling — translates NovaTech's numbers into specific revenue impact, shows clear ROI on $5M investment, creates competitive urgency, and quantifies the cost of inaction"
    weight: 0.35
    description: "Board-compelling business case"
  - type: llm_judge
    criteria: "100-day quick wins are realistic and measurable — 5 initiatives that produce visible results (not just plans), with a Day 100 board update that demonstrates momentum and builds confidence"
    weight: 0.30
    description: "Realistic measurable quick wins"
