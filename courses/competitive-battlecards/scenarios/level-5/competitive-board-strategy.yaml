meta:
  id: competitive-board-strategy
  level: 5
  course: competitive-battlecards
  type: output
  description: "Present competitive strategy at the board level — make the case for investing in competitive intelligence as a strategic revenue capability"
  tags: [sales, battlecards, board, strategy, investment, governance, master]

state: {}

trigger: |
  You're the CRO of a $350M enterprise SaaS company preparing for
  the quarterly board meeting. You're presenting a $2M investment
  case for transforming competitive intelligence from ad hoc
  battlecards into a strategic, AI-powered competitive advantage.

  Context:
  - Win rate in competitive deals: 20% (down from 28% three years ago)
  - Competitive deals: 60% of all pipeline
  - Revenue at risk: $130M in competitive pipeline this quarter
  - Current CI investment: $200K/year (1 person, no tools)
  - Industry benchmark for CI investment: 0.5-1% of revenue
  - Top 3 competitors have all publicly discussed CI investments:
    Competitor A: Hired Head of CI, deployed Crayon
    Competitor B: Published win rate improvement from CI program
    Competitor C: Announced "AI-powered competitive selling" initiative

  Board composition:
  - Chair: Former CEO of a $2B company, values strategic thinking
  - VC Partner: Focused on capital efficiency, wants ROI data
  - Independent Director: Former CMO, understands competitive dynamics
  - Founder/CEO: Built the company, believes product should win on merit

  Tasks:
  1. Write the board presentation (6 slides). Slide 1: The
     competitive threat (win rate decline + competitor CI investments).
     Slide 2: Revenue impact model ($130M at risk). Slide 3: Current
     vs. proposed CI capability. Slide 4: The investment case ($2M
     over 2 years). Slide 5: Implementation plan. Slide 6:
     Measurement framework and expected ROI.

  2. Anticipate and prepare for each board member's likely objection.
     Chair: "Is this strategic or just operational?" VC: "What's
     the payback period?" CMO Director: "How does this integrate
     with marketing?" Founder: "If our product was better, we
     wouldn't need this." Write the response for each.

  3. Write the "Post-Board Follow-Up" strategy — the 30/60/90 day
     plan that demonstrates progress to the board after they approve
     the investment. Each milestone must produce a visible result,
     not just activity metrics.

assertions:
  - type: llm_judge
    criteria: "Board presentation is CRO-quality — 6 slides tell a compelling strategic story linking win rate decline to revenue risk to investment case, with each slide building on the previous one"
    weight: 0.35
    description: "CRO-quality board presentation"
  - type: llm_judge
    criteria: "Board member responses are tailored — each addresses the specific concern behind the objection (strategic vs. operational, ROI timeline, marketing integration, product vs. sales) with data and logic"
    weight: 0.30
    description: "Tailored board member responses"
  - type: llm_judge
    criteria: "Follow-up plan produces visible results — 30/60/90 day milestones show tangible progress (battlecards deployed, win rate trending, pipeline impact) not just activity"
    weight: 0.35
    description: "Visible-results follow-up plan"
