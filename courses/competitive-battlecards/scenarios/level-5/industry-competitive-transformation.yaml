meta:
  id: industry-competitive-transformation
  level: 5
  course: competitive-battlecards
  type: output
  description: "Navigate industry-level competitive transformation — manage competitive strategy when entire market categories are being redefined by technology or regulation"
  tags: [sales, battlecards, transformation, industry, category, disruption, master]

state: {}

trigger: |
  You're a Managing Director at a competitive strategy consultancy.
  Three clients face the same challenge: their entire competitive
  landscape is being redefined. Traditional battlecards are useless
  because the competitors of yesterday aren't the competitors of
  tomorrow.

  Client 1: Traditional bank ($50B assets)
  Old competitors: Other banks (Chase, BofA, Wells Fargo)
  New competitors: Neobanks (Chime, SoFi), embedded finance (Shopify
  Balance, Apple Pay), crypto platforms (Coinbase)
  Challenge: "How do I create battlecards when my competitor isn't
  a bank anymore? Our compliance team doesn't even categorize
  fintechs as competitors."

  Client 2: Enterprise software company ($500M ARR)
  Old competitors: SAP, Oracle, Microsoft
  New competitors: Open-source alternatives (PostgreSQL, Linux
  Foundation projects), cloud-native startups, AI-native platforms
  Challenge: "Our battlecards compare features. How do you create
  a battlecard against 'free and open source'? Or against an AI
  that generates custom software?"

  Client 3: Healthcare system (15 hospitals)
  Old competitors: Other hospital systems
  New competitors: Telehealth platforms (Teladoc), retail health
  (CVS MinuteClinic, Amazon Clinic), AI diagnostics, home health tech
  Challenge: "Our competitors used to be other hospitals within
  50 miles. Now we're competing against apps on people's phones.
  What does a 'battlecard' even mean in this context?"

  Tasks:
  1. For each client, write the advisory memo explaining: why
     traditional battlecards fail in their situation, how to
     redefine the competitive landscape (expand the definition of
     "competitor"), and the new competitive strategy framework
     that works when categories are dissolving.

  2. Create the "Category Disruption Competitive Framework" — a
     generalizable model for building competitive strategy when
     market categories are being redefined. Include: how to identify
     your REAL competitive set (not just named competitors), how to
     build battlecards against categories rather than companies, and
     how to position against "the status quo" and "the future state"
     simultaneously.

  3. Write the "Board-Level Competitive Landscape Presentation" —
     the template any company can use to explain to their board that
     their competitive landscape has fundamentally changed. Include:
     the old competitive map, the new competitive map, the strategic
     implications, and the investment required to compete in the
     new reality.

assertions:
  - type: llm_judge
    criteria: "Advisory memos are strategically sophisticated — each correctly diagnoses why traditional battlecards fail in the client's situation and proposes a new competitive framework appropriate for category disruption"
    weight: 0.35
    description: "Strategically sophisticated advisory"
  - type: llm_judge
    criteria: "Category disruption framework is genuinely new — goes beyond traditional competitive strategy to address dissolved categories, non-traditional competitors, and the simultaneous competition against status quo and future state"
    weight: 0.35
    description: "Genuinely new disruption framework"
  - type: llm_judge
    criteria: "Board presentation template is executive-ready — shows the transformation from old to new competitive landscape with strategic implications and investment requirements in a format any company could adapt"
    weight: 0.30
    description: "Executive-ready board template"
