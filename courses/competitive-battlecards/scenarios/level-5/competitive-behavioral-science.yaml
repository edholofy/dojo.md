meta:
  id: competitive-behavioral-science
  level: 5
  course: competitive-battlecards
  type: output
  description: "Apply behavioral science to competitive selling — use decision psychology to understand why buyers choose competitors and design battlecards that address cognitive biases"
  tags: [sales, battlecards, behavioral-science, psychology, decision-making, bias, master]

state: {}

trigger: |
  You're a sales psychology researcher consulting for enterprise
  software companies. You've been asked to write the definitive
  guide on applying behavioral science to competitive battlecards.

  Your research has identified 6 cognitive biases that determine
  competitive deal outcomes:

  1. Status Quo Bias: Buyers stick with incumbents even when
     alternatives are superior. Loss aversion means switching
     feels 2-2.5x riskier than staying.

  2. Social Proof: Buyers follow peers. "Nobody ever got fired for
     buying Salesforce" is social proof in action. Small vendors
     lose not because they're worse but because they lack proof.

  3. Anchoring: The first vendor a buyer evaluates anchors all
     subsequent evaluations. If they see your competitor first,
     your pricing and features are judged relative to the anchor.

  4. Confirmation Bias: Once a buyer forms an initial impression
     of your competitor (positive or negative), they selectively
     attend to information that confirms it.

  5. Choice Overload: When evaluating 5+ vendors, buyers default
     to the safest choice (usually the market leader) rather than
     the best choice. Paradox of choice reduces quality decisions.

  6. Endowment Effect: Buyers overvalue what they already own.
     Current CRM data, workflows, and integrations feel more
     valuable than they are, making displacement harder.

  Tasks:
  1. For each bias, write: the scientific explanation, how it
     manifests in competitive deals (with specific example), the
     "bias-aware" battlecard content that works WITH the bias, and
     the ethical boundary for leveraging bias awareness.

  2. Create the "Behavioral Battlecard Framework" — a new battlecard
     format that integrates bias awareness into every section. Show
     how traditional battlecard sections (positioning, talk tracks,
     proof points) change when designed with behavioral science.
     Compare a traditional vs. behavioral battlecard for the same
     competitor.

  3. Write the ethics guide: "Ethical Competitive Persuasion." When
     does understanding buyer biases cross from helping them make
     better decisions to manipulating them? Include 5 principles
     and 3 case studies showing the ethical line.

assertions:
  - type: llm_judge
    criteria: "Bias analysis is scientifically grounded — each of the 6 biases is explained accurately with research basis, realistic competitive sales manifestation, bias-aware battlecard content, and clear ethical boundaries"
    weight: 0.35
    description: "Scientifically grounded bias analysis"
  - type: llm_judge
    criteria: "Behavioral battlecard framework is genuinely new — shows how every traditional section transforms when designed with bias awareness, with a compelling traditional vs. behavioral comparison"
    weight: 0.35
    description: "Genuinely new behavioral framework"
  - type: llm_judge
    criteria: "Ethics guide draws clear lines — 5 principles and 3 case studies that distinguish helping buyers make better decisions from manipulating them through bias exploitation"
    weight: 0.30
    description: "Clear ethical guidelines"
