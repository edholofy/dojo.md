meta:
  id: competitive-org-maturity
  level: 5
  course: competitive-battlecards
  type: output
  description: "Assess and advance organizational competitive intelligence maturity — build the maturity model for evaluating and improving CI capability"
  tags: [sales, battlecards, maturity-model, organizational, assessment, CI, master]

state: {}

trigger: |
  You're a sales operations consultant who has assessed competitive
  intelligence maturity at 200+ companies. The Sales Enablement
  Society has asked you to create the industry-standard "Competitive
  Intelligence Maturity Model" (CIMM).

  Your research has identified 5 maturity levels:

  Level 1 — Absent (30% of companies):
  No formal CI capability. Reps rely on personal knowledge. No
  battlecards. No competitive win/loss tracking. Competitive deals
  are essentially random outcomes.

  Level 2 — Ad Hoc (30% of companies):
  Some battlecards exist but are stale. One person occasionally
  updates competitive content. No systematic monitoring. Win/loss
  is anecdotal. Competitive awareness depends on individual reps.

  Level 3 — Organized (25% of companies):
  Dedicated CI resource. Battlecards for top 5 competitors, updated
  quarterly. Win/loss analysis exists. CRM captures competitive data.
  Sales team trained on competitive positioning.

  Level 4 — Data-Driven (10% of companies):
  CI platform deployed. Real-time competitor monitoring. Battlecards
  updated monthly. Win/loss program with statistical significance.
  Competitive analytics dashboard. Cross-functional CI input.

  Level 5 — Predictive (5% of companies):
  AI-augmented CI. Dynamic, deal-personalized battlecards. Predictive
  competitive alerts. Integrated product-CI feedback loop. Competitive
  win rate significantly above industry average.

  Tasks:
  1. Write the complete CIMM assessment framework — for each level:
     capabilities present, measurement criteria, organizational
     characteristics, common challenges, and specific actions to
     advance. Include the expected competitive win rate impact at
     each level.

  2. Create the "CIMM Assessment Survey" — 20 questions that a VP
     of Sales can complete in 15 minutes to determine their
     organization's maturity level. Scoring methodology included.

  3. Write the "Level 2 → Level 3 Advancement Playbook" — the most
     common transition (applicable to 30% of companies). 6-month
     plan with organizational changes, technology requirements,
     content creation plan, and measurement system.

assertions:
  - type: llm_judge
    criteria: "CIMM framework is comprehensive and differentiated — each level has genuinely different capabilities, measurable criteria, and advancement actions, with expected win rate impact that makes the business case for advancing"
    weight: 0.35
    description: "Comprehensive differentiated CIMM"
  - type: llm_judge
    criteria: "Assessment survey is practical — 20 questions completable in 15 minutes with clear scoring that reliably maps to maturity levels, designed for VP-level self-assessment"
    weight: 0.30
    description: "Practical assessment survey"
  - type: llm_judge
    criteria: "Level 2→3 playbook is detailed — 6-month plan covering organizational changes, technology, content, and measurement that represents a realistic transformation for the 30% of companies at Level 2"
    weight: 0.35
    description: "Detailed advancement playbook"
