meta:
  id: future-of-competitive-intelligence
  level: 5
  course: competitive-battlecards
  type: output
  description: "Envision the future of competitive intelligence — how AI, market dynamics, and evolving buyer behavior will transform competitive selling in the next decade"
  tags: [sales, battlecards, future, AI, innovation, vision, master]

state: {}

trigger: |
  You're a keynote speaker at CompeteX, the world's largest
  competitive intelligence conference. Your topic: "The Future of
  Competitive Selling: Why Battlecards Are Just the Beginning."
  Your audience: 3,000 CI professionals, sales leaders, and product
  marketers.

  Trends reshaping competitive intelligence:

  1. AI Competitive Agents:
  Within 5 years, AI agents will conduct continuous competitive
  monitoring, draft real-time battlecard updates, and suggest
  competitive moves during live calls. The CI analyst's role shifts
  from intelligence gathering to intelligence strategy.

  2. Buyer-Side AI:
  Buyers are using AI to evaluate vendors. When an AI assistant
  compares 10 vendors in seconds, traditional battlecard messaging
  designed for human persuasion may not work. How do you compete
  when the "buyer" is an algorithm?

  3. Radical Transparency:
  Review sites, social media, and community forums mean competitors
  know your pricing, strengths, and weaknesses in real-time. Your
  battlecards about them? They probably have your battlecards too.
  Competitive advantage shifts from information asymmetry to
  execution quality.

  4. Platform Consolidation:
  The "best of breed vs. platform" battle intensifies. Companies
  like Salesforce, Microsoft, and Google are building everything
  in-house. Competing against a platform isn't like competing
  against a point solution — the battlecard is different.

  5. Ethical CI Arms Race:
  As CI tools become more powerful (AI scraping, signal monitoring,
  predictive analytics), the ethical boundaries become more important
  and more blurred. The industry needs ethical standards for the
  AI era.

  Tasks:
  1. Write the keynote outline (45 minutes). For each trend: current
     state, future state, what changes for CI teams, and specific
     predictions for 2030. End with a provocative thesis about where
     competitive intelligence is headed.

  2. Write the "2030 Competitive Intelligence Playbook" — what CI
     looks like in 5 years. Include: the role of the CI professional
     (strategist, not researcher), the technology stack (AI-first),
     the relationship with sales (embedded, not separate), and the
     new competitive battlecard format (dynamic, contextual, AI-
     generated).

  3. Write the "Action Plan for Today" — 5 investments CI leaders
     should make NOW to prepare for these trends. Each must be
     practical (not "wait for AI to arrive") and future-proof
     competitive intelligence programs.

assertions:
  - type: llm_judge
    criteria: "Keynote outline is engaging and substantive — addresses all 5 trends with current/future analysis, makes specific predictions for 2030, and ends with a provocative thesis that would generate conference discussion"
    weight: 0.35
    description: "Engaging substantive keynote"
  - type: llm_judge
    criteria: "2030 playbook is imaginative yet grounded — describes a future CI function that's realistically achievable given AI trends, with specific role evolution, technology assumptions, and new battlecard formats"
    weight: 0.30
    description: "Imaginative grounded future playbook"
  - type: llm_judge
    criteria: "Action plan is immediately practical — 5 investments that start today, connect clearly to future trends, and are implementable by CI leaders without waiting for technology that doesn't exist yet"
    weight: 0.35
    description: "Immediately practical action plan"
