meta:
  id: competitive-consulting-engagement
  level: 5
  course: competitive-battlecards
  type: output
  description: "Design a consulting engagement to transform a client's competitive intelligence capability — from assessment through implementation to measurement"
  tags: [sales, battlecards, consulting, transformation, CI-program, master]

state: {}

trigger: |
  You're a Managing Partner at a top-tier sales strategy consulting
  firm. MegaCorp (Fortune 200, $8B revenue, 1,500 sales reps) has
  hired you for a $1.5M engagement to transform their competitive
  intelligence and battlecard capability. Their CRO says: "We lose
  $200M+ annually to competitors and we don't even know why."

  Current state assessment:
  - 1,500 reps across 8 product lines, 30 countries
  - 45 named competitors across product lines
  - Existing battlecards: 12 (for 45 competitors — 27% coverage)
  - Average battlecard age: 11 months
  - Win/loss program: None
  - CI team: 1 person (overwhelmed)
  - Competitive win rate: 19% (industry avg: 28%)
  - Technology: No CI platform, manual monitoring
  - Cross-functional alignment: None (product, marketing, sales
    operate independently on competitive matters)
  - Budget approved: $1.5M over 18 months

  Tasks:
  1. Write the "Engagement Proposal" — the full scope of work
     including: diagnostic phase (months 1-3), design phase
     (months 4-8), implementation phase (months 9-14), and
     optimization phase (months 15-18). For each phase: deliverables,
     team structure, dependencies, and success metrics. This must
     read like a real consulting proposal.

  2. Design the diagnostic methodology for Phase 1. How do you
     assess CI maturity across 1,500 reps, 8 product lines, and
     30 countries? Include: the assessment framework, sampling
     strategy, interview guide, data collection plan, and the
     diagnostic report structure. You can't interview everyone —
     how do you get a representative picture?

  3. Write the "Quick Wins" deliverable — what you produce in the
     first 60 days that shows immediate value and builds
     organizational confidence. Include 5 quick wins with expected
     impact, resource requirements, and how they demonstrate the
     program's potential to skeptical stakeholders.

assertions:
  - type: llm_judge
    criteria: "Engagement proposal is consulting-grade — 4 clear phases with specific deliverables, realistic timelines, team structure, dependencies, and measurable success metrics that a Fortune 200 CRO would approve"
    weight: 0.35
    description: "Consulting-grade engagement proposal"
  - type: llm_judge
    criteria: "Diagnostic methodology is scalable — assessment framework works across 1,500 reps and 30 countries using sampling and representative data collection, not trying to interview everyone"
    weight: 0.30
    description: "Scalable diagnostic methodology"
  - type: llm_judge
    criteria: "Quick wins deliver immediate value — 5 deliverables achievable in 60 days that produce visible results (not just plans) and build stakeholder confidence in the larger engagement"
    weight: 0.35
    description: "Immediate-value quick wins"
