meta:
  id: competitive-economics-model
  level: 5
  course: competitive-battlecards
  type: output
  description: "Build the economics model for competitive intelligence — quantify the revenue impact of competitive readiness across the sales organization"
  tags: [sales, battlecards, economics, ROI, revenue-impact, modeling, master]

state: {}

trigger: |
  You're the Chief Strategy Officer at a $600M B2B SaaS company
  with 500 sales reps. The board has asked you to build a
  comprehensive economic model that quantifies the revenue impact
  of competitive intelligence and battlecard effectiveness.

  Data available:
  - Annual revenue: $600M (65% new, 35% expansion)
  - 500 reps across 5 segments
  - Pipeline: $2.8B annually
  - Competitive deals: 55% of pipeline ($1.54B) involves a named
    competitor
  - Competitive win rate: 21%
  - Non-competitive win rate: 34%
  - Win rate by battlecard usage:
    Heavy users (top quartile): 32% competitive win rate
    Light users: 22% competitive win rate
    Non-users: 14% competitive win rate
  - Average deal size in competitive deals: $120K
  - Deal velocity: competitive deals take 40% longer than non-competitive
  - Discount rate in competitive deals: avg 18% vs. 9% non-competitive
  - Battlecard program cost: $800K/year (4 FTEs + tools)
  - Revenue from competitive wins last year: $323M ($1.54B × 21%)
  - Revenue lost to competitors: $1.22B in pipeline

  Tasks:
  1. Build the "Competitive Intelligence Economics Model" — the
     board-ready financial analysis showing: total revenue impact
     of competitive readiness (current), revenue opportunity if
     non-users moved to light users, revenue opportunity if light
     users moved to heavy users, revenue opportunity from reducing
     competitive discount rates, and the velocity benefit. Present
     as scenarios with investment required for each.

  2. Calculate the "Unit Economics of Battlecard Usage" — what is
     the revenue value of: one additional rep becoming a heavy
     battlecard user? One additional competitor being covered by a
     battlecard? One percentage point of competitive win rate
     improvement? Make the abstract concrete with specific dollar
     values.

  3. Design the "Competitive Investment Optimization Model" — given
     the $800K budget, how should you allocate across: CI headcount,
     technology, content creation, training, and analytics? Build the
     allocation recommendation using the data above and expected
     ROI per investment area.

assertions:
  - type: llm_judge
    criteria: "Economics model is board-ready — uses provided data to build clear scenarios showing revenue impact, investment required, and ROI for each improvement scenario, presented in financial language with stated assumptions"
    weight: 0.35
    description: "Board-ready economics model"
  - type: llm_judge
    criteria: "Unit economics are compelling — calculates specific dollar values for each improvement unit (per rep, per competitor covered, per win rate point), making investment decisions concrete and defensible"
    weight: 0.35
    description: "Compelling unit economics"
  - type: llm_judge
    criteria: "Investment optimization is data-driven — recommends budget allocation across 5 areas with ROI justification for each, prioritizing investments that produce the highest return on the $800K budget"
    weight: 0.30
    description: "Data-driven investment optimization"
