meta:
  id: competitive-thought-leadership
  level: 5
  course: competitive-battlecards
  type: output
  description: "Create thought leadership on competitive intelligence — write the definitive perspectives that advance the industry's understanding of competitive enablement"
  tags: [sales, battlecards, thought-leadership, publishing, CI-innovation, master]

state: {}

trigger: |
  You're a recognized authority on competitive intelligence who has
  been invited to write a chapter for "The Sales Enablement
  Handbook" (the industry's most respected publication). Your
  chapter: "The Death of Static Battlecards: How AI, Real-Time
  Intelligence, and Buyer Empowerment Are Transforming Competitive
  Selling."

  Your thesis: Static, PDF-based battlecards are a relic of a
  pre-AI era. They were designed for a world where:
  - Competitive intelligence changed quarterly, not daily
  - Reps needed memorized talk tracks, not real-time guidance
  - Buyers learned about competitors from sales reps, not the internet
  - One battlecard fit all deals, personas, and stages

  None of these assumptions are true anymore. The future of
  competitive selling is:
  1. Dynamic intelligence (updated in real-time, not quarterly)
  2. Contextual delivery (personalized to deal/persona/stage)
  3. AI-augmented (AI suggests competitive moves during live calls)
  4. Buyer-aware (acknowledges buyers already know about competitors)
  5. Outcome-measured (effectiveness tracked per competitive play)

  Tasks:
  1. Write the chapter outline (4,000-word chapter). Include: the
     case against static battlecards (with data), the 5 principles
     of modern competitive selling, 3 case studies of companies
     that transformed their approach, and the practical
     implementation guide. Academic credibility + practical utility.

  2. Write the opening 500 words — the hook that challenges the
     reader's assumptions about how competitive selling works.
     It should be provocative enough to be quotable at conferences
     but substantive enough for a practitioner audience.

  3. Write the "Modern Competitive Selling Maturity Model" — a
     framework organizations can use to assess where they fall on
     the spectrum from static battlecards to AI-augmented competitive
     intelligence. Include 5 maturity levels with specific
     capabilities and transition criteria for each.

assertions:
  - type: llm_judge
    criteria: "Chapter outline is publication-quality — makes a compelling case against static battlecards with data, presents 5 principles with case studies, and provides practical implementation guidance that practitioners can follow"
    weight: 0.35
    description: "Publication-quality chapter outline"
  - type: llm_judge
    criteria: "Opening 500 words are provocative and substantive — challenges assumptions in the first paragraph, introduces the thesis compellingly, and sets up the chapter's value proposition for a practitioner audience"
    weight: 0.30
    description: "Provocative substantive opening"
  - type: llm_judge
    criteria: "Maturity model is well-differentiated — 5 levels from static PDF battlecards to AI-augmented real-time competitive intelligence with genuinely different capabilities and clear transition criteria at each level"
    weight: 0.35
    description: "Well-differentiated maturity model"
