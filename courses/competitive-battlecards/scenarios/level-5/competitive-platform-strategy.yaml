meta:
  id: competitive-platform-strategy
  level: 5
  course: competitive-battlecards
  type: output
  description: "Compete against platform bundling — develop the strategic and battlecard approach for independent vendors competing against platform incumbents who bundle your category for free"
  tags: [sales, battlecards, platform, bundling, strategy, independence, master]

state: {}

trigger: |
  You're the CEO of a $100M independent SaaS company. Your product
  category is being absorbed by platform vendors. Three of your
  largest competitors are now "free" — bundled into Salesforce,
  Microsoft, and Google platforms.

  The competitive reality:
  - Salesforce: Added your functionality as a standard feature in
    their Enterprise license. It's "free" for their 150,000+ customers.
  - Microsoft: Built a competitor into Microsoft 365. It's basic but
    functional and accessible to 300M+ users.
  - Google: Launched a competing product in Google Workspace.
    Developer-friendly and free for existing users.

  Your situation:
  - $100M ARR, growing 25% YoY before the platform threat
  - 2,500 customers who chose you for depth and specialization
  - 400 sales reps (150 direct, 250 partners)
  - Product is genuinely deeper and better than platform alternatives
  - But "free" is a powerful price point, and "already included" is
    a powerful distribution advantage
  - Growth has slowed from 25% to 15% as platform competition takes hold
  - Board is nervous: "How do you compete against free?"

  Historical parallels:
  - Slack vs. Microsoft Teams (Teams won on bundling)
  - Zoom vs. Teams (Zoom survived through product excellence)
  - Box vs. SharePoint (Box survived through enterprise focus)
  - Dropbox vs. iCloud/OneDrive (Dropbox struggled)

  Tasks:
  1. Write the "Anti-Platform Competitive Strategy" — the complete
     strategic plan for competing against bundled platform offerings.
     Include: where you can't win (stop competing), where you must
     win (double down), the positioning narrative ("why best-of-breed
     beats bundled"), the pricing strategy (can't be "free" but can
     be "worth it"), and the market segment focus.

  2. Create the "Platform Competitor Battlecard Template" — a new
     battlecard format specifically designed for competing against
     platform bundles (different from vendor-vs-vendor battlecards).
     Include: the "free isn't free" TCO argument, the "breadth vs.
     depth" positioning, the "vendor lock-in risk" angle, and the
     migration story (customers who tried the platform version and
     came back).

  3. Write the board presentation that addresses "how do you compete
     against free?" Analyze the historical parallels (Slack, Zoom,
     Box, Dropbox) and extract lessons for your strategy. Which
     pattern does your company follow, and why?

assertions:
  - type: llm_judge
    criteria: "Anti-platform strategy is honest and strategic — identifies where to stop competing (commodity features), where to double down (depth, specialization), with a pricing strategy and segment focus that creates a viable path forward"
    weight: 0.35
    description: "Honest strategic anti-platform plan"
  - type: llm_judge
    criteria: "Platform battlecard template is distinct from vendor battlecards — addresses 'free' with TCO, 'bundled' with depth/specialization, 'lock-in' with independence, and includes win-back stories from platform refugees"
    weight: 0.35
    description: "Distinct platform battlecard template"
  - type: llm_judge
    criteria: "Board presentation extracts real lessons — analyzes Slack/Zoom/Box/Dropbox parallels honestly (some survived, some didn't), identifies which pattern applies, and uses the lessons to support a credible strategy"
    weight: 0.30
    description: "Real-lessons board presentation"
