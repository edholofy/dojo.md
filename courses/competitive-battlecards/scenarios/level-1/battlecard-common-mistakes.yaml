meta:
  id: battlecard-common-mistakes
  level: 1
  course: competitive-battlecards
  type: output
  description: "Recognize and avoid common battlecard mistakes — from stale information to competitor badmouthing to feature-focused instead of value-focused content"
  tags: [sales, battlecards, mistakes, best-practices, quality, beginner]

state: {}

trigger: |
  You're a new Head of Competitive Intelligence at "SalesEngine"
  (sales engagement platform, $60M ARR). Your predecessor left
  behind 12 battlecards. Your VP of Sales says: "These are terrible.
  Nobody uses them. Figure out why and fix them."

  You review the battlecards and find 6 common problems:

  Problem 1: Stale data
  The Outreach.io battlecard references their 2023 pricing and
  features they launched 18 months ago. The product has changed
  significantly since then.

  Problem 2: Competitor badmouthing
  The SalesLoft battlecard says: "SalesLoft is poorly designed,
  their support is terrible, and they're losing market share." This
  is both unprofessional and factually questionable.

  Problem 3: Feature comparison overload
  The Apollo.io battlecard is a 3-page feature comparison matrix
  with 85 features checked/unchecked. It's impossible to scan and
  tells reps nothing about what to SAY.

  Problem 4: Internal language
  The HubSpot battlecard uses phrases like "our AI-ML engine
  leverages proprietary NLP" — language no prospect would understand
  or care about.

  Problem 5: Missing "so what?"
  The Reply.io battlecard lists advantages ("We have multi-channel
  sequences") but never explains why the prospect should care
  ("Which means your reps reach 40% more prospects").

  Problem 6: One-size-fits-all
  All 12 battlecards are identical in structure, whether the
  prospect is an SMB founder or an enterprise VP of Sales. No
  persona targeting.

  Tasks:
  1. For each of the 6 problems, write: (a) why it happens (the
     root cause), (b) the fix (what the battlecard should look
     like instead), and (c) the prevention rule (how to avoid this
     mistake in future battlecards).

  2. Create the "Battlecard Quality Checklist" — 10 yes/no questions
     that anyone can use to evaluate a battlecard's quality before
     publishing it. If any answer is "no," the card needs revision.

  3. Take Problem 5 (missing "so what?") and rewrite 5 feature
     claims as value claims. Show the transformation from "We have
     X feature" to "Which means Y outcome for your business."

assertions:
  - type: llm_judge
    criteria: "Root cause analysis is accurate — identifies why each problem occurs (stale data from no update process, badmouthing from insecurity, feature overload from engineering mindset, etc.) with practical fixes and prevention rules"
    weight: 0.35
    description: "Accurate root cause analysis"
  - type: llm_judge
    criteria: "Quality checklist is comprehensive — 10 questions that catch all 6 problem types plus additional quality issues, binary yes/no format that makes evaluation quick and objective"
    weight: 0.30
    description: "Comprehensive quality checklist"
  - type: llm_judge
    criteria: "Feature-to-value transformations are compelling — 5 examples that show clear conversion from internal feature language to customer outcome language, with the 'which means' connector making the value explicit"
    weight: 0.35
    description: "Compelling feature-to-value transformations"
