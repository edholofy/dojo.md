meta:
  id: win-themes-landmines
  level: 1
  course: competitive-battlecards
  type: output
  description: "Create win themes and competitive landmines — develop the key messages that win deals and the strategic questions that expose competitor weaknesses"
  tags: [sales, battlecards, win-themes, landmines, strategy, beginner]

state: {}

trigger: |
  You're a Competitive Intelligence Analyst at "DataPipe" (data
  integration platform, $50M ARR). You're building battlecards
  against your top 2 competitors: Informatica and Fivetran. Your
  sales team needs two critical sections for each battlecard:

  1. "Win Themes" — the 3-4 key messages that, when delivered
     effectively, consistently win deals against each competitor.

  2. "Landmines" — strategic questions reps ask prospects that
     expose competitor weaknesses without directly attacking them.

  Your competitive intelligence:
  DataPipe vs. Informatica:
  - You win on: ease of use, faster implementation (4 weeks vs. 16
    weeks), modern architecture, lower TCO
  - They win on: brand recognition, breadth of connectors (400 vs.
    your 200), enterprise trust, on-premise support
  - Your won deals commonly cite: "DataPipe was up and running in
    weeks while Informatica quoted months"

  DataPipe vs. Fivetran:
  - You win on: data transformation capabilities, custom connector
    support, security features, enterprise-grade SLA
  - They win on: ease of use for analysts, self-serve model,
    developer community, transparent pricing
  - Your won deals commonly cite: "Fivetran was great for simple
    pipelines but couldn't handle our complex transformations"

  Tasks:
  1. Write 4 win themes for each competitor battlecard (8 total).
     Each win theme must: be one sentence, be customer-outcome
     focused (not feature-focused), be supported by proof (reference
     what evidence supports this claim), and be testable (if the rep
     says it, the prospect should be able to validate it).

  2. Write 3 landmine questions for each competitor (6 total). Each
     landmine must: sound like a genuine discovery question (not a
     gotcha), expose a real competitor weakness, be impossible for
     the competitor to answer well, and not feel manipulative if the
     prospect realizes your intent. Include the expected competitor
     response and how the landmine shifts the evaluation.

  3. Your manager warns: "Landmines can backfire if the prospect
     feels manipulated." Write the 3 rules for ethical landmine
     deployment and give an example of a landmine that crossed the
     line from strategic to manipulative.

assertions:
  - type: llm_judge
    criteria: "Win themes are outcome-focused and specific — each is one sentence focused on customer benefit (not feature comparison), supported by evidence, and testable through proof points like case studies or POC results"
    weight: 0.35
    description: "Outcome-focused win themes"
  - type: llm_judge
    criteria: "Landmines are strategic and ethical — questions sound like genuine discovery, expose real weaknesses, include expected competitor responses, and show how they shift evaluation criteria without feeling like gotcha traps"
    weight: 0.35
    description: "Strategic ethical landmines"
  - type: llm_judge
    criteria: "Ethical landmine rules are clear — 3 rules that separate strategic questioning (helping prospects evaluate thoroughly) from manipulation (trick questions designed to embarrass), with a concrete example of crossing the line"
    weight: 0.30
    description: "Clear ethical landmine rules"
