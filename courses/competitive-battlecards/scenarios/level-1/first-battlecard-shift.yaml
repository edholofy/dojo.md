meta:
  id: first-battlecard-shift
  level: 1
  course: competitive-battlecards
  type: output
  description: "Shift simulation — create a complete battlecard from scratch for a real competitive situation and present it to the sales team"
  tags: [sales, battlecards, simulation, complete, presentation, beginner]

state: {}

trigger: |
  You're a Sales Enablement Specialist at "InvoicePro" (invoicing
  and billing SaaS for small businesses, $20M ARR, $25/user/month).
  Your CEO just called an emergency meeting: "Stripe just launched
  Stripe Invoicing and it's getting massive press coverage. Our sales
  team is panicking. I need a battlecard by end of day."

  What you know about the competitive situation:
  - Stripe Invoicing: Free for existing Stripe users, basic invoicing
    features, integrates natively with Stripe Payments, limited
    customization, no accounts receivable automation
  - Your product (InvoicePro): $25/user/month, full AR automation,
    multi-currency, advanced payment reminders, custom branding,
    accounting integrations (QuickBooks, Xero), reporting dashboard
  - Your target market: Growing businesses (10-100 employees) that
    need more than basic invoicing
  - The panic: Reps are reporting that 30% of prospects this week
    mentioned Stripe Invoicing. Three deals in the pipeline are now
    "on hold" because prospects want to evaluate Stripe first.

  Tasks:
  1. Build the complete Stripe Invoicing battlecard. Include all
     sections you've learned about: competitor overview, strengths
     to acknowledge, weaknesses to exploit, positioning statement,
     win themes, landmine questions, talk track, objection handlers,
     and proof points. This must be a real, usable battlecard.

  2. Write the internal email to the sales team introducing the
     battlecard. The email must: calm the panic (Stripe entering
     is actually validating your market), give the key message (what
     to say when Stripe comes up), and link to the full battlecard.
     Keep it under 200 words — reps don't read long emails.

  3. Write the specific talk track for the 3 deals that went "on
     hold." These prospects are re-evaluating — they need a reason
     to come back. Write the outreach message (email) that
     acknowledges Stripe's launch, positions InvoicePro's value
     for their specific stage of growth, and proposes a comparison
     call.

assertions:
  - type: llm_judge
    criteria: "Battlecard is complete and usable — includes all required sections with real content, acknowledges Stripe's strengths (free, payment integration), positions InvoicePro for growing businesses, and could be used by a rep today"
    weight: 0.35
    description: "Complete usable battlecard"
  - type: llm_judge
    criteria: "Internal email calms panic effectively — under 200 words, reframes Stripe's entry positively (market validation), gives the key talking point, and is action-oriented rather than fear-based"
    weight: 0.30
    description: "Panic-calming internal email"
  - type: llm_judge
    criteria: "On-hold outreach is strategic — acknowledges Stripe without dismissing it, positions InvoicePro for the prospect's growth stage, and proposes a comparison that favors InvoicePro's deeper capabilities"
    weight: 0.35
    description: "Strategic on-hold outreach"
