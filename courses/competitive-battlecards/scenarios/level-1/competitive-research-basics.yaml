meta:
  id: competitive-research-basics
  level: 1
  course: competitive-battlecards
  type: output
  description: "Learn to gather competitive intelligence for battlecards — research competitors using public sources, customer feedback, and internal knowledge"
  tags: [sales, battlecards, research, competitive-intelligence, sources, beginner]

state: {}

trigger: |
  You're a Product Marketing Manager at "QuickBooks Pro" (accounting
  SaaS for small businesses, $25M ARR). You need to build battlecards
  for 3 competitors: FreshBooks, Xero, and Wave. But first, you need
  to research them. Your manager says: "Good battlecards are only as
  good as the intelligence behind them."

  Available research sources:
  - Competitor websites (product pages, pricing, case studies)
  - G2 and Capterra reviews (1,000+ reviews per competitor)
  - Your CRM (200 competitive win/loss records from past year)
  - Sales team knowledge (30 reps who sell against these daily)
  - Industry analyst reports (Gartner, Forrester)
  - Job postings (competitor hiring patterns)
  - Social media and community forums
  - Customer interviews (5 customers who switched FROM each
    competitor, 5 who switched TO each competitor)

  Your win/loss data summary:
  vs. FreshBooks: Win 45%, Lose 35%, No Decision 20%
  vs. Xero: Win 30%, Lose 50%, No Decision 20%
  vs. Wave: Win 60%, Lose 20%, No Decision 20%

  Tasks:
  1. Create the "Competitive Research Plan" — which sources do you
     use for what? For each of the 8 sources listed, explain:
     what information it provides, its reliability level (high/
     medium/low), how often to check it, and the specific
     intelligence gaps it fills. Prioritize the sources — you don't
     have time for everything.

  2. Based on the win/loss data, identify the research priorities.
     You're losing most to Xero (50% loss rate). Write the
     "Xero Deep Dive" research brief — the 10 questions you need
     answered to understand WHY you're losing to Xero, and which
     sources you'll use to answer each question.

  3. Write the "Sales Team Intelligence Survey" — a 10-question
     survey you send to your 30 reps to extract their competitive
     knowledge. The survey must be completable in 5 minutes (reps
     won't do more) and focus on actionable intelligence, not
     opinions.

assertions:
  - type: llm_judge
    criteria: "Research plan is prioritized and practical — sources are ranked by reliability, assigned specific intelligence objectives, given update cadences, and prioritized based on time constraints rather than trying to use everything equally"
    weight: 0.35
    description: "Prioritized practical research plan"
  - type: llm_judge
    criteria: "Xero deep dive is focused — 10 questions target the specific reasons for the 50% loss rate (pricing? features? positioning? target market overlap?) with each question tied to a research source"
    weight: 0.30
    description: "Focused Xero deep dive"
  - type: llm_judge
    criteria: "Sales survey is quick and actionable — 10 questions completable in 5 minutes, focused on specific competitive situations reps encounter (not general impressions), and designed to extract intelligence that directly improves battlecard content"
    weight: 0.35
    description: "Quick actionable sales survey"
