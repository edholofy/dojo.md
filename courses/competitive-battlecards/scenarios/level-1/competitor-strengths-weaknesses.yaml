meta:
  id: competitor-strengths-weaknesses
  level: 1
  course: competitive-battlecards
  type: output
  description: "Analyze competitor strengths and weaknesses honestly — learn to assess competitors objectively and turn analysis into actionable battlecard content"
  tags: [sales, battlecards, strengths, weaknesses, analysis, honesty, beginner]

state: {}

trigger: |
  You're a Competitive Intelligence Analyst at "ProjectHub" (project
  management SaaS, $45M ARR). Your manager says: "The hardest part
  of building battlecards is being honest about competitor strengths.
  If your battlecard says 'we're better at everything,' reps won't
  trust it and prospects will see through it."

  Your competitor analysis challenge:
  You compete against Monday.com, Asana, and Jira. For each, you
  need to identify genuine strengths (that you acknowledge) and
  genuine weaknesses (that you can ethically exploit).

  What you know:
  ProjectHub strengths: Resource management, client-facing portals,
  time tracking, agency/services focus
  ProjectHub weaknesses: Fewer integrations (120 vs. Monday's 200+),
  smaller community, less brand recognition

  Monday.com: Beautiful UI, strong marketing, 200+ integrations,
  flexible for many use cases but not deep in any one area
  Asana: Strong task management, great for team collaboration,
  free tier attracts starters, weak on resource management and
  time tracking
  Jira: Dominant in software development, powerful workflows,
  Atlassian ecosystem, terrible UX for non-technical users,
  steep learning curve

  Tasks:
  1. Create the "Honest Competitor Assessment" for each of the 3
     competitors. For each: list 3 genuine strengths (things they
     do better than you), 3 genuine weaknesses (things they do
     worse), and 3 "spin zones" (areas that could be positioned as
     strength or weakness depending on the prospect's needs).

  2. Your VP of Product Marketing says: "Every competitor weakness
     has a mirror — it's also the absence of one of our strengths."
     For each of the 9 weaknesses you identified (3 per competitor),
     write the corresponding ProjectHub strength that fills the gap.
     This creates the natural talking point for reps.

  3. Write the "Intellectual Honesty Test" — 5 questions to ask
     yourself before putting any claim on a battlecard. If a claim
     fails any question, it shouldn't be on the card. Example: "Would
     I be comfortable if this prospect Googled this claim right now?"

assertions:
  - type: llm_judge
    criteria: "Competitor assessment is genuinely honest — strengths listed are real competitive advantages (not backhanded compliments), weaknesses are exploitable but real (not invented), and spin zones show nuanced understanding"
    weight: 0.35
    description: "Genuinely honest assessment"
  - type: llm_judge
    criteria: "Weakness-to-strength mapping is useful — each competitor weakness is paired with a corresponding ProjectHub strength, creating natural talking points that feel organic rather than scripted"
    weight: 0.30
    description: "Useful weakness-to-strength mapping"
  - type: llm_judge
    criteria: "Honesty test is rigorous — 5 questions that prevent exaggeration, outdated claims, cherry-picked data, and false comparisons, ensuring battlecard credibility"
    weight: 0.35
    description: "Rigorous honesty test"
