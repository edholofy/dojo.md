meta:
  id: battlecard-formatting
  level: 1
  course: competitive-battlecards
  type: output
  description: "Design battlecard layout and formatting — create visually scannable documents that reps can use in real-time during calls"
  tags: [sales, battlecards, design, formatting, layout, usability, beginner]

state: {}

trigger: |
  You're a Sales Enablement Designer at "MarketPro" (marketing
  automation platform, $28M ARR). You've been asked to redesign
  the company's battlecards. The current versions are 5-page Word
  documents with walls of text that nobody uses. Your manager gives
  you the design brief:

  "A battlecard that takes more than 30 seconds to scan is useless.
  Our reps are on live calls when they need this. Design for speed."

  Design constraints:
  - Must fit on a single page (front only — no flipping)
  - Must be readable on a laptop screen and a printed sheet
  - Will be accessed from the CRM (embedded as a link)
  - 4 competitors need individual battlecards: HubSpot, Marketo,
    Mailchimp, and ActiveCampaign
  - Content per card: competitor overview (2 sentences), 3 strengths
    to acknowledge, 3 weaknesses to exploit, positioning statement,
    3 talk track snippets, 2 proof points, 2 landmine questions

  Reps were surveyed about their needs:
  - "I need to find the right response in under 10 seconds"
  - "Bold the most important sentences"
  - "Color coding helps me scan faster"
  - "Include the competitor's pricing so I don't have to look it up"

  Tasks:
  1. Design the battlecard layout — describe the visual structure
     in detail (header area, section placement, visual hierarchy,
     color coding system, typography choices). Explain why each
     design decision supports the "30-second scan" requirement. You
     don't need to create the actual graphic — describe the layout
     precisely enough that a designer could build it.

  2. Write the content for the MarketPro vs. HubSpot battlecard
     using your layout. Fill in every section with real content.
     Bold the key phrases a rep would scan for. Mark which sections
     are "must-read" vs. "reference only."

  3. Write the "Battlecard Usability Test" — 5 questions you'd ask
     reps after giving them the new battlecard to evaluate whether
     the design actually works in practice. Include what metrics
     you'd track (time to find answer, usage rate, competitive win
     rate improvement).

assertions:
  - type: llm_judge
    criteria: "Layout design supports rapid scanning — describes clear visual hierarchy, logical section placement, color coding system, bold text strategy, and typography choices that enable finding information in under 10 seconds"
    weight: 0.35
    description: "Rapid-scanning layout design"
  - type: llm_judge
    criteria: "HubSpot battlecard content is complete and scannable — all required sections filled with real content, key phrases bolded, must-read vs. reference sections marked, fitting on a single page with appropriate density"
    weight: 0.35
    description: "Complete scannable content"
  - type: llm_judge
    criteria: "Usability test is practical — 5 questions that evaluate real-world usability (not design preferences), with specific metrics like time-to-find, usage frequency, and win rate correlation"
    weight: 0.30
    description: "Practical usability test"
