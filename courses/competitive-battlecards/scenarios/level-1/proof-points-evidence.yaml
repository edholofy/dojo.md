meta:
  id: proof-points-evidence
  level: 1
  course: competitive-battlecards
  type: output
  description: "Build proof points and evidence for battlecards — collect and organize the customer stories, data, and third-party validation that make competitive claims credible"
  tags: [sales, battlecards, proof-points, evidence, case-studies, credibility, beginner]

state: {}

trigger: |
  You're a Product Marketing Associate at "SecureNet" (cybersecurity
  SaaS, $55M ARR). You've written strong positioning statements for
  your battlecards, but your VP of Sales says: "Positioning without
  proof is just opinion. Nobody believes claims without evidence."

  Your competitive claims that need proof:
  1. "SecureNet deploys 3x faster than CrowdStrike" (positioning
     against CrowdStrike's complex enterprise deployment)
  2. "Our customers see 60% fewer false positives than SentinelOne
     users" (positioning against SentinelOne's alert fatigue)
  3. "SecureNet's total cost of ownership is 40% lower than Palo
     Alto over 3 years" (positioning against Palo Alto's pricing)

  Available evidence:
  - 3 case studies from customers who switched from competitors
  - Internal deployment time data (avg: 2 weeks vs. industry 6 weeks)
  - Customer survey results (250 respondents on false positive rates)
  - G2 reviews (350+ reviews, 4.6 stars)
  - Gartner peer insights data
  - 2 customers willing to be phone references
  - Your own product benchmarks (internal testing)

  Tasks:
  1. For each of the 3 competitive claims, identify the best proof
     point(s) from the available evidence. Rate the credibility of
     each type of evidence (customer story > third-party data >
     internal data) and explain why. If a claim lacks strong proof,
     flag it and suggest what additional evidence you need.

  2. Write the "Proof Point Library" for the battlecards — for each
     competitor, provide: 1 customer story (30-word summary a rep
     can cite), 1 data point (specific number with source), and 1
     third-party validation (analyst or review site quote). Format
     each for quick verbal delivery during a sales call.

  3. Your VP of Marketing says: "The biggest mistake in competitive
     proof points is using internal data and calling it objective."
     Explain why, and write guidelines for what makes a proof point
     credible vs. questionable. Include the "Proof Point Credibility
     Spectrum" from most to least credible.

assertions:
  - type: llm_judge
    criteria: "Evidence mapping is thoughtful — matches strongest available evidence to each claim, correctly ranks credibility (customer story > third-party > internal), and identifies claims that need additional evidence"
    weight: 0.35
    description: "Thoughtful evidence mapping"
  - type: llm_judge
    criteria: "Proof point library is rep-ready — customer stories are 30 words or less, data points include specific numbers with attributable sources, and third-party validations are quotable, all formatted for verbal delivery"
    weight: 0.35
    description: "Rep-ready proof point library"
  - type: llm_judge
    criteria: "Credibility spectrum is accurate — correctly ranks proof from most credible (named customer reference) to least credible (internal testing), explains why objectivity matters, and provides guidelines for when proof is strong enough to use"
    weight: 0.30
    description: "Accurate credibility spectrum"
