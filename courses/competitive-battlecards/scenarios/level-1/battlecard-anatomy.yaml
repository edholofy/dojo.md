meta:
  id: battlecard-anatomy
  level: 1
  course: competitive-battlecards
  type: output
  description: "Understand the anatomy of an effective battlecard — learn the essential components and how each section helps reps win competitive deals"
  tags: [sales, battlecards, structure, components, fundamentals, beginner]

state: {}

trigger: |
  You're a new Sales Enablement Specialist at "CloudStack" (cloud
  infrastructure SaaS, $40M ARR). Your VP of Sales says: "Our reps
  keep losing to AWS, Azure, and Google Cloud because they don't know
  how to position against them. Build us battlecards."

  You've never created a battlecard before. Your manager gives you a
  terrible example — a 15-page document with every feature comparison
  imaginable — and says: "This is what NOT to do. Nobody reads this.
  I need something a rep can use in 30 seconds during a live call."

  Your competitor landscape:
  - AWS: Market leader, broadest feature set, complex pricing
  - Azure: Strong with Microsoft shops, enterprise integration
  - Google Cloud: Best for data/ML, developer-friendly
  - CloudStack (you): Mid-market focused, simpler pricing, faster
    deployment, dedicated support included

  Tasks:
  1. Define the anatomy of an effective battlecard. List the 8
     essential sections every battlecard needs, explain what goes in
     each section, and explain WHY each section matters for a rep
     in a live selling situation. The goal: a 1-page document (front
     and back) that a rep can scan in 30 seconds.

  2. Create the CloudStack vs. AWS battlecard using your anatomy.
     Fill in every section with real content. This should be a
     complete, usable battlecard — not a template with placeholders.
     Remember: never badmouth the competitor, always acknowledge
     their strengths, and focus on what makes CloudStack the right
     choice for YOUR target market (mid-market companies).

  3. Your VP asks: "What's the difference between a battlecard and
     a feature comparison spreadsheet?" Write the explanation that
     shows why battlecards are about positioning and messaging
     (helping reps say the right thing) rather than feature checklists
     (which prospects can Google themselves).

assertions:
  - type: llm_judge
    criteria: "Anatomy is complete and practical — includes 8 essential sections (competitor overview, their strengths, their weaknesses to exploit, positioning statement, talk track, objection handles, proof points, landmines to plant) with clear explanations of each"
    weight: 0.35
    description: "Complete practical anatomy"
  - type: llm_judge
    criteria: "AWS battlecard is usable — filled with specific content (not placeholders), acknowledges AWS strengths honestly, positions CloudStack for mid-market specifically, and could actually be used by a rep on a live call"
    weight: 0.35
    description: "Usable AWS battlecard"
  - type: llm_judge
    criteria: "Battlecard vs. feature comparison distinction is clear — explains that battlecards provide messaging and positioning (what to say) while feature comparisons provide data (what exists), and why reps need the former more than the latter"
    weight: 0.30
    description: "Clear battlecard distinction"
