meta:
  id: talk-tracks-objections
  level: 1
  course: competitive-battlecards
  type: output
  description: "Write competitive talk tracks and objection handlers — create the specific language reps use when prospects mention competitors"
  tags: [sales, battlecards, talk-tracks, objections, scripts, language, beginner]

state: {}

trigger: |
  You're a Sales Enablement Manager at "TalentView" (talent
  management SaaS, $30M ARR). Your reps hear competitor mentions
  every day but struggle with what to say. They either freeze,
  badmouth the competitor, or launch into a feature comparison
  monologue. You need to write the talk tracks.

  Your competitors and how prospects mention them:
  - Workday HCM: "We're already evaluating Workday."
  - BambooHR: "BambooHR is half the price."
  - Rippling: "Rippling does HR and IT in one platform."

  Context for each:
  - Workday: Enterprise incumbent, extremely powerful but complex,
    12-18 month implementations, $100K+ deals. You win against
    Workday with mid-market companies who don't need that complexity.
  - BambooHR: SMB-focused, simple and affordable, limited analytics
    and performance management. You win against BambooHR when
    companies outgrow basic HRIS and need performance/analytics.
  - Rippling: Combines HR, IT, and Finance. Broad but shallow in
    each area. You win against Rippling on depth of talent management
    (performance reviews, succession planning, L&D).

  Tasks:
  1. Write the talk track for each competitor mention. Each talk
     track must follow this structure:
     a) Acknowledge: respect the competitor mention (2 seconds)
     b) Bridge: transition to curiosity (1 question)
     c) Differentiate: position TalentView (2-3 sentences)
     d) Evidence: offer proof (1 specific reference or data point)
     e) Advance: propose a next step

  2. Write the objection handler for each competitor's strongest
     argument:
     - Workday: "Workday is the industry standard for enterprise HR."
     - BambooHR: "BambooHR costs half what you charge."
     - Rippling: "Rippling gives us one platform for everything."
     Each handler must acknowledge the strength before pivoting.

  3. Create the "Competitor Response Quick Reference" — a table
     format that a rep can stick on their monitor. Columns:
     Competitor, What They'll Say, Your Response (1 sentence),
     What to Ask Next. Keep it to 3 rows (one per competitor) that
     fits on a sticky note.

assertions:
  - type: llm_judge
    criteria: "Talk tracks follow the structure — each has Acknowledge (respectful), Bridge (question), Differentiate (positioned for their segment), Evidence (specific), Advance (next step), and sounds natural when spoken aloud"
    weight: 0.35
    description: "Structured natural talk tracks"
  - type: llm_judge
    criteria: "Objection handlers address competitor strengths — each acknowledges the real strength (Workday's enterprise standard, BambooHR's price, Rippling's breadth) before pivoting to TalentView's advantage in a non-defensive way"
    weight: 0.35
    description: "Strength-acknowledging handlers"
  - type: llm_judge
    criteria: "Quick reference is genuinely brief — 3 rows, each with a 1-sentence response and follow-up question, concise enough to reference during a live call without losing attention"
    weight: 0.30
    description: "Genuinely brief quick reference"
