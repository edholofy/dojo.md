meta:
  id: positioning-statements
  level: 1
  course: competitive-battlecards
  type: output
  description: "Write competitive positioning statements — craft the core messaging that differentiates your product from each competitor"
  tags: [sales, battlecards, positioning, messaging, differentiation, beginner]

state: {}

trigger: |
  You're a Junior Product Marketer at "HelpDesk360" (customer support
  platform, $35M ARR). You compete against Zendesk, Intercom, and
  Freshdesk. Your manager says the most important part of any
  battlecard is the positioning statement — the 2-3 sentences that
  tell a rep exactly how to position against each competitor.

  Your product facts:
  - HelpDesk360: AI-powered support automation, 50% faster ticket
    resolution, built-in knowledge base, $45/agent/month
  - Target market: Mid-market companies (100-500 employees)
  - Key differentiator: Only platform that combines ticketing,
    knowledge base, and AI automation in one tool

  Competitor profiles:
  - Zendesk: Enterprise-focused, $89/agent/month for comparable
    features, extremely configurable but complex to set up, 6+
    month implementation typical
  - Intercom: Conversational support, $74/agent/month, strong chat
    and bot capabilities, weaker on email/phone support, startup
    and SMB focused
  - Freshdesk: Budget option, $29/agent/month, good basic
    ticketing, limited AI, limited knowledge base, Indian
    development team (some buyers have quality concerns)

  Tasks:
  1. Write the positioning statement for each of the 3 competitors.
     Each statement must: be 2-3 sentences, acknowledge the
     competitor's strength, pivot to HelpDesk360's advantage, and
     be usable by a rep in a live conversation (not marketing
     jargon). Rules: never badmouth, never say "we're better,"
     always focus on what's best for the customer.

  2. Your manager says: "A great positioning statement answers three
     questions: Why change? Why us? Why now?" Show how each of your
     3 positioning statements answers all three questions. If any
     statement is missing an answer, revise it.

  3. Write the "Positioning Do's and Don'ts" — 5 rules for writing
     competitive positioning statements that work in real sales
     conversations. For each rule, give a DO example and a DON'T
     example using your HelpDesk360 competitors.

assertions:
  - type: llm_judge
    criteria: "Positioning statements are specific and usable — each is 2-3 sentences, acknowledges competitor strength, pivots naturally to HelpDesk360's advantage for mid-market, and sounds like something a rep would actually say on a call"
    weight: 0.35
    description: "Specific usable positioning"
  - type: llm_judge
    criteria: "Why Change/Why Us/Why Now framework is applied — each positioning statement addresses all three questions, with revisions if any are missing, showing how the framework strengthens the messaging"
    weight: 0.30
    description: "Complete positioning framework"
  - type: llm_judge
    criteria: "Do's and Don'ts are practical — 5 rules with paired examples using HelpDesk360's actual competitive landscape, covering common mistakes like badmouthing, being too generic, or using internal jargon"
    weight: 0.35
    description: "Practical positioning rules"
