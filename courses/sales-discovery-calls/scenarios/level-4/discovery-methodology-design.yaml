meta:
  id: discovery-methodology-design
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Design a custom discovery methodology for your organization — combine frameworks, create playbooks, and build scalable processes"
  tags: [sales, methodology, process-design, playbook, expert]

state: {}

trigger: |
  You're the VP of Sales at "GrowthStack" (vertical SaaS platform
  serving financial services, $80M ARR, 45 AEs). Your company has
  grown from selling a single product to SMBs to selling a platform
  to enterprises across 3 verticals. Your existing discovery process
  (basic BANT checklist from 4 years ago) is broken.

  Current problems:
  - Win rate dropped from 28% to 19% over the past year
  - Average deal size increased 3x but discovery approach didn't change
  - AEs skip discovery for "warm" inbound leads (45% of inbound
    demos happen without proper discovery)
  - Enterprise deals stall at an average of 120 days (target: 75)
  - 60% of lost deals cite "didn't understand our needs" as the reason
  - New reps take 6 months to become proficient at discovery
  - No standardized CRM data capture — every rep logs different info

  Your sales segments:
  - SMB ($10K-50K deals): 1-2 stakeholders, fast decisions, 15
    AEs handling
  - Mid-Market ($50K-200K deals): 3-5 stakeholders, moderate
    complexity, 20 AEs
  - Enterprise ($200K-$1M+ deals): 6-12 stakeholders, formal
    procurement, 10 AEs

  Available frameworks your team has been trained on (partially):
  SPIN, BANT, MEDDPICC, Challenger, Sandler, Value Selling

  Tasks:
  1. Design a unified discovery methodology for GrowthStack that
     adapts by segment. Which elements from which frameworks do you
     combine? Create a 1-page visual framework showing the stages,
     key questions, and outputs for each segment.

  2. Build the "Discovery Quality Standard" — mandatory fields and
     questions that must be completed before ANY deal can advance to
     the demo stage. Design it for CRM enforcement.

  3. Create the 3-week new-hire discovery training curriculum. Include
     topics, activities, role-plays, and how you'll certify reps are
     ready for live calls.

  4. How do you get 45 AEs to actually adopt this new methodology?
     Most sales methodology rollouts fail. What's your change
     management plan?

assertions:
  - type: llm_judge
    criteria: "Methodology combines frameworks intelligently — selects appropriate elements per segment (BANT for SMB speed, SPIN+Value Selling for mid-market, MEDDPICC for enterprise complexity) rather than forcing one framework on all"
    weight: 0.25
    description: "Intelligent framework combination"
  - type: llm_judge
    criteria: "Quality standard is enforceable — specifies mandatory CRM fields (pain points, decision maker confirmed, budget range, timeline, next steps) with clear definitions and stage-gate requirements"
    weight: 0.25
    description: "Enforceable quality standard"
  - type: llm_judge
    criteria: "Training curriculum is progressive — builds from theory (Week 1) to practice (Week 2: role-plays, call shadowing) to certification (Week 3: live calls with coaching), with clear milestones"
    weight: 0.25
    description: "Progressive training curriculum"
  - type: llm_judge
    criteria: "Change management plan is realistic — addresses resistance from top performers, includes enablement support, uses data to show impact, creates accountability through pipeline reviews, and rolls out gradually"
    weight: 0.25
    description: "Realistic change management"
