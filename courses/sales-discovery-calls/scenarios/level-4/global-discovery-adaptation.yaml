meta:
  id: global-discovery-adaptation
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Adapt discovery calls for global and cross-cultural sales — navigate cultural differences, time zones, language barriers, and regional buying patterns"
  tags: [sales, global, cross-cultural, international, expert]

state: {}

trigger: |
  You're the VP of International Sales at "GlobalSaaS" (enterprise
  collaboration platform, $200M ARR). Your company is expanding from
  North America into 3 new regions. Each region requires a different
  discovery approach.

  Region 1: Japan
  Prospect: "TechNihon" (electronics manufacturer, 5,000 employees)
  Contact: Division General Manager, Tanaka-san
  Context: Introduced through a mutual business partner (very
  important in Japan). Initial meeting was formal. Tanaka-san spoke
  little and deferred to his team. He asked detailed technical
  questions and requested documentation before any further meetings.
  Cultural considerations:
  - Relationship-first culture. Direct questioning feels aggressive.
  - Silence is comfortable and means "thinking," not "awkward."
  - Consensus decision-making (nemawashi) — the person you're
    talking to rarely decides alone.
  - Business cards (meishi) exchange is a critical ritual.
  - "Yes" doesn't always mean agreement — it often means "I hear you."

  Region 2: Germany
  Prospect: "AutoWerk" (automotive supplier, 2,000 employees)
  Contact: Head of Digital Transformation, Dr. Klaus Weber
  Context: Dr. Weber responded to a cold email. He's direct,
  detail-oriented, and asked for a technical architecture document
  before the first call. He values punctuality and data.
  Cultural considerations:
  - Direct communication is valued. Get to the point.
  - Titles and credentials matter. Use "Dr. Weber" not "Klaus."
  - Engineering mindset — they want to understand HOW it works.
  - Decisions are methodical and thorough. Expect long evaluation.
  - Data privacy (GDPR) is critical. They'll ask about data residency.

  Region 3: Brazil
  Prospect: "TechBrasil" (financial services company, 3,000 employees)
  Contact: VP of Innovation, Ana Carolina Silva
  Context: Met at a conference in São Paulo. Very warm and
  enthusiastic. Invited you to a dinner meeting (common in Brazil).
  Wants to "explore possibilities" but hasn't defined a specific need.
  Cultural considerations:
  - Relationship is everything. Business comes after personal trust.
  - Flexibility with time — meetings start late, agendas are fluid.
  - Hierarchy matters but communication is informal and expressive.
  - Decision-making can be centralized at the top.
  - Creative, storytelling-based pitches resonate more than data.

  Tasks:
  1. Design a culturally-adapted discovery approach for each region.
     For each, specify: how you open the call, question style,
     pacing, agenda flexibility, and follow-up protocol.

  2. Write 5 discovery questions for each region that respect
     cultural norms while still gathering the information you need.
     Explain how each question differs from what you'd ask in the US.

  3. Create a "Global Discovery Playbook" one-pager that your AEs
     can reference before calls in any region. Include the top 3
     do's and don'ts for each region.

  4. How do you handle the challenge of a 12-person consensus
     committee in Japan vs. a single-decision-maker culture in
     Brazil? Design the multi-call discovery strategy for each.

assertions:
  - type: llm_judge
    criteria: "Cultural adaptations are specific and respectful — adjusts pace, directness, question style, and formality for each region without stereotyping or being superficial about cultural differences"
    weight: 0.25
    description: "Respectful cultural adaptation"
  - type: llm_judge
    criteria: "Regional questions differ meaningfully — Japan questions are indirect and group-focused, Germany questions are direct and technical, Brazil questions are relationship-first, each reflecting genuine cultural intelligence"
    weight: 0.25
    description: "Culturally intelligent questions"
  - type: llm_judge
    criteria: "Global playbook is practical and actionable — provides clear do's/don'ts that an AE could use immediately, covering communication style, meeting etiquette, and decision-making expectations"
    weight: 0.25
    description: "Actionable global playbook"
  - type: llm_judge
    criteria: "Consensus vs. single-decision strategies are realistic — maps the Japanese nemawashi process (multiple touchpoints, building agreement gradually) vs. Brazil's top-down approach with appropriate multi-call plans"
    weight: 0.25
    description: "Realistic decision-structure strategies"
