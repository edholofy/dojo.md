meta:
  id: discovery-enablement-architecture
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Architect a discovery enablement system — build templates, automation, CRM workflows, and AI-assisted prep tools for the entire sales organization"
  tags: [sales, enablement, architecture, automation, expert]

state: {}

trigger: |
  You're the Head of Sales Enablement at "ScaleUp" (enterprise SaaS,
  $300M ARR, 200 AEs). The CRO is investing $1M in sales enablement
  this year and wants you to architect a discovery enablement system
  that reduces prep time by 50% and improves discovery quality by 30%.

  Current state:
  - Average pre-call research time: 45 minutes per call
  - AEs use 6 different tools for research (LinkedIn, ZoomInfo,
    6sense, company website, CRM, Slack)
  - No standardized discovery templates — each AE has their own
  - CRM data from discovery is inconsistent (varies by rep)
  - Call recordings exist but are rarely reviewed (500+ calls/month)
  - New hire enablement takes 3 weeks on discovery alone
  - Manager coaching is inconsistent — some managers coach weekly,
    others never

  Tech stack available:
  - CRM: Salesforce Enterprise
  - Sales intelligence: ZoomInfo, 6sense
  - Communication: Outreach (sequences), Gong (call recording)
  - Content: Highspot (content management)
  - AI: GPT-4 API access available

  Budget breakdown:
  - $300K for technology/tools
  - $400K for content creation and training
  - $300K for headcount (2 enablement hires)

  Tasks:
  1. Design the "Discovery Command Center" — a unified workspace
     that gives AEs everything they need for pre-call prep in one
     place. What data sources does it pull from? What does the
     interface look like? How does it reduce prep time from 45 to
     20 minutes?

  2. Build the AI-assisted discovery prep system. Using GPT-4 API
     access, design the prompts and workflows that auto-generate:
     pre-call briefs, suggested questions (based on prospect data),
     and competitive intelligence summaries. How do you ensure quality?

  3. Design the post-call automation: after every discovery call,
     what data gets captured automatically vs. manually? How does
     Gong data flow into Salesforce? What quality checks exist?

  4. Present the ROI case for this $1M investment. If 200 AEs each
     save 25 minutes per call and run 8 calls per week, what's the
     time savings? If discovery quality improves win rates by 3
     percentage points, what's the revenue impact?

assertions:
  - type: llm_judge
    criteria: "Command Center design is practical — consolidates data from listed tools into a unified view, shows prospect data, suggested questions, competitive intel, and prior interactions in a logical layout"
    weight: 0.25
    description: "Practical unified workspace"
  - type: llm_judge
    criteria: "AI system has quality guardrails — includes prompt engineering details, human-in-the-loop review, feedback loops to improve suggestions, and acknowledges AI limitations rather than trusting output blindly"
    weight: 0.25
    description: "Quality-guardrailed AI system"
  - type: llm_judge
    criteria: "Post-call automation balances automation with human input — auto-captures call metrics and transcript data, requires rep to validate key fields, and integrates Gong insights into Salesforce opportunity records"
    weight: 0.25
    description: "Balanced post-call automation"
  - type: llm_judge
    criteria: "ROI model is quantified — calculates time savings (200 AEs × 25 min × 8 calls × 50 weeks), converts to revenue capacity, and models the win-rate improvement impact on pipeline with realistic assumptions"
    weight: 0.25
    description: "Quantified ROI model"
