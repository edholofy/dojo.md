meta:
  id: ai-augmented-discovery
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Leverage AI tools to enhance discovery calls — real-time coaching, automated research, call scoring, and predictive deal intelligence"
  tags: [sales, AI, augmentation, technology, innovation, expert]

state: {}

trigger: |
  You're the VP of Sales Strategy at "NexGen Sales" (sales tech
  company, $180M ARR). Your CEO wants you to pilot an "AI-Augmented
  Discovery" program that uses AI at every stage of the discovery
  process. Budget: $150K for a 6-month pilot with 20 AEs.

  AI tools available:
  1. Pre-call AI: Generates prospect briefs by aggregating data
     from LinkedIn, news, earnings calls, job postings, and tech
     stack databases. Can draft personalized opening statements
     and suggested questions.

  2. Real-time AI: During the call, provides live suggestions in a
     sidebar — recommended follow-up questions, objection responses,
     competitive intelligence alerts when competitors are mentioned,
     and talk-ratio monitoring.

  3. Post-call AI: Automatically generates call summaries, extracts
     MEDDPICC fields, scores discovery quality, identifies next-best
     actions, and flags deals at risk based on conversation signals.

  4. Predictive AI: Analyzes historical patterns to predict which
     deals will close, which will stall, and what discovery behaviors
     correlate with winning.

  Concerns from your sales team:
  - "I don't want a robot telling me what to say on a call."
  - "Will my manager use this to micromanage me?"
  - "What if the AI suggests something wrong mid-call?"
  - "Is this replacing my job?"
  - "What about prospect privacy — recording and AI-analyzing calls?"

  Tasks:
  1. Design the 6-month pilot program. Which AI tool do you deploy
     first and why? How do you select the 20 pilot AEs? What are
     the success metrics, and what results would justify scaling?

  2. Address each of the 5 team concerns. For each, write the honest
     answer that acknowledges the concern while showing the value.
     How do you position AI as an assistant, not a replacement?

  3. Design the real-time AI coaching interface. What information
     appears during a live call? How intrusive is it? How do you
     prevent it from distracting the AE? Create a wireframe
     description of the sidebar.

  4. What are the ethical boundaries? When does AI-augmented sales
     become manipulative? Where do you draw the line? Write the
     "AI Ethics Policy for Sales" covering data usage, prospect
     consent, and AI-assisted decision boundaries.

assertions:
  - type: llm_judge
    criteria: "Pilot design is methodical — starts with lowest-risk tool (pre-call or post-call AI), selects diverse pilot group (mix of performers), defines clear success metrics (time saved, quality improvement, win rate), and has go/no-go criteria"
    weight: 0.25
    description: "Methodical pilot design"
  - type: llm_judge
    criteria: "Concern responses are authentic — doesn't dismiss concerns but provides honest, thoughtful answers that acknowledge risks while showing how AI augments human skills rather than replacing judgment"
    weight: 0.25
    description: "Authentic concern responses"
  - type: llm_judge
    criteria: "Real-time interface is non-intrusive — keeps suggestions minimal and contextual, allows AE to ignore them, uses visual hierarchy to avoid overwhelming, and triggers only on specific moments (competitor mention, silence, etc.)"
    weight: 0.25
    description: "Non-intrusive interface design"
  - type: llm_judge
    criteria: "Ethics policy has clear boundaries — addresses data privacy, prospect consent for recording, limits on AI manipulation (no emotional exploitation), transparency requirements, and human override authority"
    weight: 0.25
    description: "Clear ethical boundaries"
