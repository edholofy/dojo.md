meta:
  id: conversation-intelligence-program
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Build and run a conversation intelligence program — implement call recording analytics, establish coaching cadences, and drive team-wide improvement"
  tags: [sales, conversation-intelligence, analytics, program-design, expert]

state: {}

trigger: |
  You're the Director of Sales Enablement at "RevTech" (revenue
  operations platform, $150M ARR, 80 AEs across 4 teams). The CRO
  just approved a $200K investment in Gong for conversation
  intelligence. You need to design the program that makes this
  investment pay off.

  Current state:
  - No call recording or analytics today
  - Managers do 1:1 coaching based on deal outcomes, not call quality
  - Top performers close at 3x the rate of average performers but
    no one can articulate what they do differently
  - Discovery calls average 24 minutes (should be 30-35)
  - Team talk-to-listen ratio: unknown (suspected 60:40)
  - No standardized discovery framework across teams
  - New hire ramp: 8 months to full productivity

  Your goals:
  - Reduce ramp time from 8 months to 4 months
  - Increase team win rate from 22% to 30%
  - Create data-driven coaching cadence for all managers
  - Build a library of "best call" examples for training
  - Identify the behaviors that differentiate top performers

  Teams:
  - Team A (SMB): 25 reps, avg deal $25K, short cycle
  - Team B (Mid-Market): 30 reps, avg deal $80K, 60-day cycle
  - Team C (Enterprise): 15 reps, avg deal $250K, 120-day cycle
  - Team D (Expansion): 10 reps, avg deal $100K, existing customers

  Tasks:
  1. Design the 90-day rollout plan for the conversation intelligence
     program. Include: implementation phases, change management,
     manager training, and rep communication. Address privacy/recording
     consent concerns.

  2. Define the 10 key metrics you'll track and the benchmarks for
     each. How do these differ across the 4 teams? Create the
     "Discovery Scorecard."

  3. Design the coaching cadence: How often do managers review calls?
     What's the review process? How do you ensure coaching is
     data-driven, not opinion-driven? Build the manager playbook.

  4. Build the "Hall of Fame" library: How do you identify, curate,
     and organize the best discovery calls? What makes a call worth
     studying? Design the criteria and categorization system.

assertions:
  - type: llm_judge
    criteria: "90-day rollout is phased and realistic — starts with pilot team, addresses recording consent early, trains managers before reps, and builds momentum through quick wins rather than trying to change everything at once"
    weight: 0.25
    description: "Phased realistic rollout"
  - type: llm_judge
    criteria: "Metrics are segment-appropriate — includes talk ratio, question count, discovery depth, but adjusts benchmarks by team (SMB calls shorter, Enterprise needs more stakeholder discovery), with clear 'good/great/elite' tiers"
    weight: 0.25
    description: "Segment-appropriate metrics"
  - type: llm_judge
    criteria: "Coaching cadence is sustainable — proposes realistic frequency (not 'review every call'), uses AI-flagged highlights to focus manager attention, and includes specific questions managers should ask during call reviews"
    weight: 0.25
    description: "Sustainable coaching cadence"
  - type: llm_judge
    criteria: "Hall of Fame criteria are specific — defines what makes a call exemplary (technique demonstration, deal outcome, creative problem-solving), organizes by skill/scenario, and makes calls discoverable for self-paced learning"
    weight: 0.25
    description: "Specific Hall of Fame criteria"
