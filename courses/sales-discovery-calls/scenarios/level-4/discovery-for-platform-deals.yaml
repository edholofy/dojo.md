meta:
  id: discovery-for-platform-deals
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Conduct discovery for complex platform deals — land-and-expand strategy, multi-product discovery, and enterprise platform positioning"
  tags: [sales, platform, land-expand, multi-product, expert]

state: {}

trigger: |
  You're a Strategic Account Executive at "UnifiedCloud" (enterprise
  cloud platform with 5 product modules, $400M ARR). Your platform
  includes: Compute, Storage, Security, Analytics, and DevOps. Most
  deals start with 1-2 modules and expand over time.

  Target account: "MegaFinance" (global bank, 50,000 employees,
  $20B revenue). They currently use AWS for compute, a legacy
  on-prem storage system, CrowdStrike for security, Splunk for
  analytics, and Jenkins for DevOps.

  Your initial engagement:
  The VP of Cloud Architecture, David Park, is frustrated with
  managing 5 separate vendors. He reached out asking about your
  Security module specifically, because CrowdStrike pricing
  increased 40% at renewal.

  The strategic opportunity:
  - Security module: $500K/year (David's immediate ask)
  - Compute module: $2M/year (if they migrate from AWS — huge lift)
  - Storage module: $800K/year (replacing legacy system)
  - Analytics module: $400K/year (replacing Splunk)
  - DevOps module: $300K/year (replacing Jenkins)
  - Total platform opportunity: $4M/year

  Challenge: David only asked about Security. How do you conduct
  discovery that opens the door to the full platform without
  overwhelming him or losing the immediate deal?

  Tasks:
  1. Design the "land" discovery strategy for the Security module.
     How do you win the $500K deal while planting seeds for platform
     expansion? What questions surface cross-module opportunities
     without being pushy?

  2. During discovery, David mentions: "Our storage migration is a
     nightmare project that keeps getting delayed." How do you
     explore this organically while staying focused on his Security
     request? Write the transition.

  3. Create the 12-month expansion discovery plan. After landing
     Security, what discovery conversations do you need across which
     stakeholders to open Compute, Storage, Analytics, and DevOps
     opportunities? Map the sequence and stakeholders.

  4. How do you position "platform value" (integrated, single vendor)
     vs. "best of breed" (specialized tools for each function)? This
     is the fundamental question MegaFinance will ask. Prepare the
     discovery questions that help them arrive at the platform answer
     themselves.

assertions:
  - type: llm_judge
    criteria: "Land strategy stays focused on Security — wins the immediate deal while asking natural questions that reveal pain in adjacent areas, without turning a Security conversation into a 5-product pitch"
    weight: 0.25
    description: "Focused landing strategy"
  - type: llm_judge
    criteria: "Storage transition is organic — uses David's own mention as a bridge, explores the storage pain briefly, and suggests a separate conversation rather than derailing the current call"
    weight: 0.25
    description: "Organic cross-sell transition"
  - type: llm_judge
    criteria: "12-month expansion plan is stakeholder-mapped — identifies different buyers for each module (Cloud Architect for Compute, CTO for Storage, CISO for expanded Security, Data team for Analytics) with discovery timing"
    weight: 0.25
    description: "Stakeholder-mapped expansion plan"
  - type: llm_judge
    criteria: "Platform vs. best-of-breed discovery helps the prospect decide — asks about vendor management costs, integration challenges, and total cost of ownership rather than asserting platform superiority"
    weight: 0.25
    description: "Self-discovery platform positioning"
