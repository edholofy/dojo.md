meta:
  id: expert-discovery-shift
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Handle an expert-level discovery shift combining methodology design, crisis management, global adaptation, and organizational transformation"
  tags: [sales, simulation, expert, comprehensive, shift]

state: {}

trigger: |
  You're the Chief Revenue Officer at "OmniSaaS" (enterprise
  platform, $250M ARR, 300 sales reps globally). It's the start of
  the fiscal year and you face 3 interconnected challenges that all
  relate to discovery quality.

  Challenge 1: The Q4 Post-Mortem
  Last quarter, 40% of forecasted deals slipped to this quarter.
  Your analysis shows:
  - 65% of slipped deals had incomplete MEDDPICC scorecards
  - 78% had discovery done with only 1 stakeholder
  - Average discovery depth score (from Gong): 3.2/10
  - Your biggest deal ($1.2M) was lost because the champion left
    and no one had built relationships with other stakeholders

  Challenge 2: The Expansion Mandate
  The board wants to expand into EMEA and APAC this year (currently
  US-only). You need to hire 50 new reps across London, Frankfurt,
  Singapore, and Tokyo. They need to be trained on discovery for
  culturally diverse markets within 8 weeks of hiring.

  Challenge 3: The Product Launch
  Your company is launching a new AI module in 60 days. The product
  team says: "It changes the entire value proposition." Your current
  discovery playbooks are built around the existing 4 modules. You
  need to update everything — discovery questions, qualification
  criteria, competitive positioning, and talk tracks.

  Tasks:
  1. Design the "Discovery Transformation Program" for the entire
     org. How do you address the Q4 failures, prepare for global
     expansion, and incorporate the new product launch — without
     overwhelming 300 reps? Prioritize ruthlessly.

  2. Create the 90-day roadmap with specific milestones for each
     challenge. What happens in parallel? What's sequential? Where
     are the dependencies?

  3. You need buy-in from 12 regional sales directors who each
     think their team "is fine." Write the business case presentation
     that shows them why discovery transformation is urgent, using
     the Q4 data.

  4. How do you measure success? Define the 5 KPIs that would tell
     you in 6 months whether the transformation is working. Include
     leading indicators (not just lagging outcomes like win rate).

assertions:
  - type: llm_judge
    criteria: "Transformation program is prioritized — addresses Q4 failures first (immediate revenue impact), then product launch prep (60-day deadline), then global expansion (8-week ramp), with clear sequencing rationale"
    weight: 0.25
    description: "Ruthlessly prioritized program"
  - type: llm_judge
    criteria: "90-day roadmap is operationally realistic — identifies parallel workstreams, resource constraints, and dependencies (e.g., playbooks must be updated before global training can begin)"
    weight: 0.25
    description: "Operationally realistic roadmap"
  - type: llm_judge
    criteria: "Director business case uses Q4 data persuasively — shows the financial impact of discovery failures ($1.2M lost deal, 40% slippage), makes it personal to each director's team, and proposes support rather than blame"
    weight: 0.25
    description: "Data-persuasive business case"
  - type: llm_judge
    criteria: "KPIs include leading indicators — measures discovery quality scores, multi-stakeholder engagement rates, MEDDPICC completeness, and question depth alongside lagging indicators like win rate and deal velocity"
    weight: 0.25
    description: "Leading-indicator KPIs"
