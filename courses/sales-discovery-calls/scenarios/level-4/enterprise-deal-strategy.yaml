meta:
  id: enterprise-deal-strategy
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Orchestrate discovery across a complex enterprise deal — plan multi-threaded outreach, manage buying committees, and build executive alignment"
  tags: [sales, enterprise, deal-strategy, multi-threading, expert]

state: {}

trigger: |
  You're a Strategic Account Executive at "CloudScale" (enterprise
  cloud platform, $500M ARR). You've been assigned the biggest deal
  in your pipeline: "NationalHealth" (healthcare conglomerate, 30,000
  employees, $4B revenue, 12 hospitals, 200 clinics). Potential deal
  size: $2.5M annually.

  The opportunity:
  NationalHealth is consolidating from 6 different cloud providers
  to 2. They want to reduce infrastructure costs by 30% and improve
  security posture across all facilities. This is a board-level
  initiative sponsored by the CIO.

  What you know after initial outreach:
  - CIO Maria Santos: Executive sponsor. Met her at a conference.
    She's open to CloudScale but has relationships with AWS and Azure.
  - VP of Infrastructure, Tom Richards: Technical evaluator. Strong
    AWS loyalty. Skeptical of CloudScale. Your biggest blocker.
  - CISO, Dr. Ahmed Hassan: Security is non-negotiable. HIPAA/HITRUST
    certification required. Will evaluate separately.
  - CFO, Robert Park: Needs hard ROI. Previous cloud migration at
    another company went 2x over budget. Burned badly.
  - VP of Clinical Systems, Lisa Kim: End user representative. Cares
    about uptime (99.99%+) for clinical applications.
  - Head of Procurement, Janet Lee: Manages vendor relationships.
    Has existing enterprise agreements with AWS and Azure that provide
    volume discounts. Switching costs are real.
  - Board member (unnamed): Reportedly asking "Why not just stay
    with AWS?" at board meetings.

  You need to plan discovery across 6+ stakeholders over the next
  60 days.

  Tasks:
  1. Create the discovery campaign plan: who do you talk to in what
     order, what do you need to learn from each person, and how do
     you handle the stakeholders who are hostile or skeptical?

  2. Tom (VP of Infrastructure) is your biggest blocker. Design a
     3-call discovery sequence specifically for him that converts
     him from skeptic to neutral. What do you discover in each call?

  3. The CFO was burned by a previous cloud migration. How do you
     conduct discovery with him in a way that addresses his trauma
     and builds trust? Write the conversation approach.

  4. How do you handle the unnamed board member's objection without
     direct access to them? Design an influence strategy through
     your champion (CIO Maria).

assertions:
  - type: llm_judge
    criteria: "Campaign plan is strategically sequenced — talks to friendly stakeholders first to build intelligence, engages skeptics with preparation, and addresses the CFO with data, not pressure"
    weight: 0.25
    description: "Strategically sequenced campaign"
  - type: llm_judge
    criteria: "Tom's conversion sequence is empathetic and technical — starts by understanding his AWS loyalty and concerns, provides technical credibility, and finds common ground rather than arguing against AWS"
    weight: 0.25
    description: "Empathetic skeptic conversion"
  - type: llm_judge
    criteria: "CFO approach addresses past trauma — acknowledges the failed migration explicitly, asks what went wrong and what safeguards he'd need, and offers risk-mitigation strategies like phased rollout"
    weight: 0.25
    description: "Trauma-aware CFO engagement"
  - type: llm_judge
    criteria: "Board influence strategy uses indirect approach — coaches Maria on how to frame CloudScale's value for the board, provides her with data and talking points, and helps build internal business case"
    weight: 0.25
    description: "Indirect board influence strategy"
