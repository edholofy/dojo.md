meta:
  id: discovery-crisis-management
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Manage discovery during organizational crises — navigate prospect layoffs, budget freezes, leadership changes, and market disruptions"
  tags: [sales, crisis, adaptability, recession-selling, expert]

state: {}

trigger: |
  You're a VP of Sales at "AdaptiveSaaS" ($60M ARR). The market
  just shifted dramatically and 3 of your biggest pipeline deals
  are affected. You need to adapt your discovery approach to new
  realities.

  Crisis 1: Prospect Layoffs
  Deal: "TechGiant" ($300K, was at proposal stage)
  What happened: TechGiant announced 15% layoffs yesterday. Your
  champion (Director of Ops) was among those laid off. The VP who
  was your executive sponsor is now "acting COO" with double the
  responsibilities. Your deal was in the final evaluation round.

  Crisis 2: Budget Freeze
  Deal: "ManufactureCorp" ($200K, was at discovery stage)
  What happened: ManufactureCorp's board imposed a company-wide
  spending freeze for all new software until next fiscal year
  (9 months away). Your prospect (VP of Supply Chain) texted:
  "Bad news — all budgets frozen. Sorry."

  Crisis 3: Market Disruption
  Deal: "RetailChain" ($150K, was at discovery stage)
  What happened: A major competitor to RetailChain just launched
  an AI-powered product that's dominating the news. RetailChain's
  stock dropped 20% in a week. The CEO declared "all hands on
  competitive response" and non-essential projects are deprioritized.

  Your pipeline:
  Before crises: $3.2M in weighted pipeline
  After crises: $2.5M at risk
  Quarterly target: $1.5M (you're at $800K closed)

  Tasks:
  1. For each crisis, design the "re-discovery" strategy. How do
     you re-qualify the deal under new circumstances? What has
     changed about BANT/MEDDPICC? What questions do you need
     answered before you invest more time?

  2. For TechGiant (lost champion), you need to find a new champion
     fast. Who do you reach out to, how, and what's your message?
     Write the outreach strategy for the first 48 hours.

  3. For ManufactureCorp (budget freeze), the deal isn't dead — it's
     delayed. How do you stay relevant for 9 months without being
     annoying? Design the nurture strategy with specific touchpoints.

  4. How do you present this pipeline risk to your CEO? Be honest
     about what's at risk while showing you have a plan. Write the
     pipeline review narrative.

assertions:
  - type: llm_judge
    criteria: "Re-discovery strategies assess new reality — re-qualifies each deal against updated criteria (new champion needed, budget timeline reset, priority shift), not just hoping things go back to normal"
    weight: 0.25
    description: "Reality-based re-discovery"
  - type: llm_judge
    criteria: "Champion recovery is urgent but thoughtful — identifies who to reach out to within 48 hours (surviving stakeholders, the acting COO), with messaging that acknowledges the situation and offers genuine help"
    weight: 0.25
    description: "Thoughtful champion recovery"
  - type: llm_judge
    criteria: "Nurture strategy adds value over 9 months — proposes regular touchpoints with genuine value (industry insights, benchmarks, case studies) not just 'checking in,' with specific monthly cadence"
    weight: 0.25
    description: "Value-adding nurture strategy"
  - type: llm_judge
    criteria: "CEO narrative is transparent and actionable — honestly presents the risk, shows what's still viable, proposes specific actions to close the gap, and doesn't sugarcoat the situation"
    weight: 0.25
    description: "Transparent CEO narrative"
