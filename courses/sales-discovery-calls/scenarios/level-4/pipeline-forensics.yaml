meta:
  id: pipeline-forensics
  level: 4
  course: sales-discovery-calls
  type: output
  description: "Conduct pipeline forensics using discovery data — diagnose why deals are lost, identify systemic discovery failures, and prescribe organizational fixes"
  tags: [sales, pipeline, forensics, analytics, loss-analysis, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "SalesAccel" (sales
  acceleration platform, $120M ARR). The CRO is alarmed: Q3 win
  rate dropped to 16% (from 24% a year ago). She wants you to
  analyze the pipeline data and determine if the root cause is
  discovery quality.

  Data you have access to:

  Win/loss analysis (last 2 quarters, 600 deals):
  - Won deals: Average 3.2 discovery calls per deal
  - Lost deals: Average 1.4 discovery calls per deal
  - Won deals: 87% had multi-stakeholder discovery
  - Lost deals: Only 34% had multi-stakeholder discovery
  - Won deals: Average 14 questions asked per call
  - Lost deals: Average 7 questions asked per call
  - Won deals: 92% had quantified pain documented in CRM
  - Lost deals: 23% had quantified pain documented
  - Won deals: Champion identified in 89% of cases
  - Lost deals: Champion identified in 31% of cases

  Loss reasons reported by prospects (from loss surveys):
  - "Didn't understand our business" — 38%
  - "Price too high" — 27%
  - "Chose competitor" — 22%
  - "No decision / timing" — 13%

  Conversation intelligence data (from Gong):
  - Top 10% of reps: Talk ratio 40:60, ask 12+ questions, always
    set agenda, always confirm next steps
  - Bottom 10% of reps: Talk ratio 65:35, ask 5-6 questions, skip
    agenda setting, vague next steps

  Segment breakdown:
  - SMB win rate: 25% (stable)
  - Mid-market win rate: 18% (down from 26%)
  - Enterprise win rate: 8% (down from 20%)

  Tasks:
  1. Conduct the forensic analysis. What does the data tell you
     about the root cause of the win-rate decline? Build the
     narrative that connects discovery behavior to deal outcomes.
     Is discovery the real problem, or is it masking something else?

  2. The mid-market and enterprise segments declined the most.
     What specific discovery failures do you hypothesize for each
     segment? Design the investigation plan to confirm or deny
     your hypotheses.

  3. "Price too high" is the #2 loss reason, but is it really a
     pricing problem? Using the discovery data, make the argument
     that it's actually a discovery problem. What evidence supports
     this?

  4. Present your findings and recommendations to the CRO. Include:
     root causes, evidence, 5 specific interventions ranked by
     impact, expected timeline to see improvement, and how you'll
     measure success.

assertions:
  - type: llm_judge
    criteria: "Forensic analysis connects data to causation — doesn't just present correlations but builds a causal narrative (fewer questions → shallow discovery → unquantified pain → lost deals), with specific data points as evidence"
    weight: 0.25
    description: "Causation-based forensics"
  - type: llm_judge
    criteria: "Segment-specific hypotheses are differentiated — identifies that mid-market likely lacks multi-threading (team growth outpaced training) while enterprise likely lacks MEDDPICC rigor and executive engagement"
    weight: 0.25
    description: "Differentiated segment hypotheses"
  - type: llm_judge
    criteria: "Pricing argument is data-backed — shows that 'price too high' correlates with low pain quantification (if prospect doesn't understand cost of status quo, any price feels too high), supported by the 92% vs. 23% quantified pain gap"
    weight: 0.25
    description: "Data-backed pricing reframe"
  - type: llm_judge
    criteria: "CRO presentation is executive-ready — leads with the headline finding, provides 5 ranked interventions with expected impact and timeline, includes measurement framework, and is concise enough for an executive audience"
    weight: 0.25
    description: "Executive-ready presentation"
