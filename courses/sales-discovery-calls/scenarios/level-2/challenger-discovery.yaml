meta:
  id: challenger-discovery
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Apply the Challenger Sale approach to discovery — lead with insights, reframe prospect thinking, and teach rather than just ask questions"
  tags: [sales, challenger, insight-selling, reframing, intermediate]

state: {}

trigger: |
  You're an AE at "SupplyVision" (supply chain analytics SaaS, $40M
  ARR). Your VP of Sales just introduced the Challenger Sale method
  to complement your SPIN training.

  Challenger approach in discovery:
  - Don't just ask about pain — teach the prospect something new
  - Lead with a "commercial insight" that reframes how they think
  - Use "warmer" questions after the insight to explore implications
  - Your research should be deeper than the prospect's own analysis

  Commercial insight for your product:
  "Most supply chain teams focus on optimizing individual nodes
  (warehouse, transport, inventory). But our data shows that 68%
  of supply chain cost comes from the connections between nodes —
  handoff delays, information gaps, and coordination failures.
  Companies that optimize connections see 23% cost reduction vs.
  8% from optimizing individual nodes."

  Prospect: "GlobalParts" (automotive parts distributor, 1,200
  employees, $300M revenue)
  Contact: SVP of Supply Chain, Marcus Johnson
  Context: Marcus posted on LinkedIn about "supply chain resilience"
  after they experienced 3 major disruptions last year. They use
  SAP for ERP and Excel for supply chain planning. 40 warehouse
  locations across 8 countries.

  Tasks:
  1. Design a Challenger-style discovery call that leads with the
     commercial insight. How do you deliver the insight in the first
     5 minutes without it feeling like a pitch? Write the script.

  2. After delivering the insight, Marcus says: "That's interesting.
     We've always focused on individual warehouse efficiency." Write
     your next 5 questions that build on the reframe and explore how
     "connection optimization" applies to GlobalParts specifically.

  3. Compare Challenger discovery vs. traditional SPIN discovery for
     this same prospect. What questions would you ask differently?
     When is each approach more effective?

  4. The risk with Challenger is coming across as arrogant or
     lecture-like. What are 3 guardrails to ensure your insight
     delivery is collaborative, not condescending?

assertions:
  - type: llm_judge
    criteria: "Insight delivery is teaching not pitching — presents the commercial insight as an industry observation backed by data, invites Marcus to react, and connects it to his LinkedIn posts about resilience rather than selling product features"
    weight: 0.25
    description: "Teaching-oriented insight delivery"
  - type: llm_judge
    criteria: "Follow-up questions build on the reframe — each question helps Marcus apply the 'connection optimization' lens to GlobalParts specifically, exploring handoff delays, cross-warehouse coordination, and information gaps"
    weight: 0.25
    description: "Reframe-building questions"
  - type: llm_judge
    criteria: "Framework comparison is nuanced — identifies that SPIN discovers existing pain while Challenger creates new understanding, and recommends using each based on prospect's level of self-awareness about the problem"
    weight: 0.25
    description: "Nuanced framework comparison"
  - type: llm_judge
    criteria: "Guardrails prevent arrogance — includes specific techniques like asking permission to share an observation, using 'we've seen' instead of 'you should,' and checking in with 'Does that resonate?' after the insight"
    weight: 0.25
    description: "Anti-arrogance guardrails"
