meta:
  id: discovery-shift-simulation
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Handle a full day of diverse discovery calls — switch between frameworks, adapt to different prospect types, and maintain quality across multiple conversations"
  tags: [sales, simulation, multi-call, adaptability, intermediate]

state: {}

trigger: |
  You're an AE at "PlatformX" (all-in-one business platform, $55M
  ARR). You have 4 discovery calls today, each requiring a different
  approach. Your manager will review all 4 and evaluate your
  adaptability.

  Call 1 (9:00 AM): SMB — Quick Decision
  Prospect: "LocalBrew" (craft brewery, 15 employees, $2M revenue)
  Contact: Owner, Jake Thompson (sole decision maker)
  Context: Found you through Google search. Needs help managing
  orders, inventory, and customer relationships. Currently uses
  pen and paper. Budget: "Whatever makes sense." Timeline: "Soon."
  Challenge: Jake is impatient and practical. He wants to know
  if you can help in 15 minutes.

  Call 2 (11:00 AM): Mid-Market — Competitive Eval
  Prospect: "GreenEnergy" (renewable energy company, 300 employees)
  Contact: Head of Operations, Maria Santos
  Context: Evaluating PlatformX, Monday.com, and Asana for project
  management. Has formal evaluation criteria. Budget: $50K/year.
  Timeline: Decision in 60 days. 3 stakeholders involved.
  Challenge: Maria is analytical and wants data, not stories.

  Call 3 (2:00 PM): Enterprise — Complex Bureaucracy
  Prospect: "NationalInsurance" (insurance company, 5,000 employees)
  Contact: Director of Digital Transformation, Robert Chen
  Context: Enterprise-wide transformation initiative. 12-month
  evaluation. $500K budget. 8+ stakeholders. Procurement, legal,
  IT security all involved. Currently using 7 different tools.
  Challenge: Robert can't make a decision — he needs to build
  consensus across 8 people.

  Call 4 (4:00 PM): Startup — Speed & Budget Constraints
  Prospect: "LaunchPad" (pre-revenue startup, 5 employees)
  Contact: Co-founder/CEO, Amy Liu
  Context: Just raised $2M seed round. Needs to get organized
  before scaling. Budget: "Minimal — every dollar matters."
  Timeline: Yesterday. Team is using Notion, Slack, and Google
  Sheets held together by duct tape.
  Challenge: Amy can't afford much but her needs are real.

  Tasks:
  1. For each call, choose the best discovery framework (SPIN, BANT,
     MEDDPICC, Challenger, or Sandler) and explain why. Then write
     your top 5 questions for that call.

  2. Your call with Jake (SMB) lasts only 12 minutes because he's
     busy. Write a "speed discovery" script that covers the essentials
     in that time.

  3. After all 4 calls, rank the deals by priority. Which gets your
     time this week, and which goes to nurture? Justify your ranking.

  4. What's the hardest part about switching between these 4 very
     different prospect types in one day? What do you do between
     calls to reset?

assertions:
  - type: llm_judge
    criteria: "Framework selection is appropriate — BANT or Sandler for SMB (speed), SPIN or Challenger for mid-market (analytical), MEDDPICC for enterprise (complexity), and adapted approach for startup (speed + budget sensitivity)"
    weight: 0.25
    description: "Appropriate framework selection"
  - type: llm_judge
    criteria: "Speed discovery covers essentials efficiently — identifies the 3-4 most critical questions for Jake, gets to qualification quickly, proposes clear next step, all within a 12-minute conversational flow"
    weight: 0.25
    description: "Efficient speed discovery"
  - type: llm_judge
    criteria: "Deal prioritization reflects sales acumen — likely ranks GreenEnergy or NationalInsurance highest by value, considers LaunchPad for nurture given budget, and factors in likelihood-to-close not just deal size"
    weight: 0.25
    description: "Acumen-based prioritization"
  - type: llm_judge
    criteria: "Context-switching awareness is practical — identifies the challenge of shifting between casual (brewery) and formal (enterprise), and suggests specific reset techniques between calls"
    weight: 0.25
    description: "Practical context-switching"
