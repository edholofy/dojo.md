meta:
  id: spin-selling-framework
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Apply the SPIN Selling framework systematically — design Situation, Problem, Implication, and Need-Payoff questions for complex sales scenarios"
  tags: [sales, SPIN, framework, methodology, intermediate]

state: {}

trigger: |
  You're an AE at "FinanceFlow" (financial planning SaaS, $50M ARR).
  Your company just adopted SPIN Selling as the official discovery
  methodology. Your sales trainer gives you 2 scenarios to practice.

  SPIN Framework recap:
  - Situation: Understand the prospect's current state (don't overdo it)
  - Problem: Uncover difficulties and dissatisfactions
  - Implication: Explore consequences of the problems
  - Need-Payoff: Get the prospect to articulate the value of solving

  Key research finding: Reps who ask 10+ implication questions close
  at 2x the rate of those who ask 0-2 implication questions.

  Scenario A: Mid-market
  Prospect: "GrowthRetail" ($30M revenue, 200 employees)
  Contact: CFO, Laura Chen
  Context: They use spreadsheets for financial planning. 3 FP&A
  analysts spend 2 weeks per month building reports manually.
  Board meeting is in 6 weeks and Laura needs better forecasting.

  Scenario B: Enterprise
  Prospect: "NationalBank" ($2B revenue, 5,000 employees)
  Contact: VP of Finance, James Wright
  Context: They use an on-premise legacy system (SAP BPC) that's
  being sunset. They need to migrate to a cloud solution. 40 users
  across 8 departments rely on the current system.

  Tasks:
  1. For Scenario A, write a complete SPIN sequence: 3 Situation,
     4 Problem, 5 Implication, and 3 Need-Payoff questions. Explain
     why the order matters.

  2. For Scenario B, write a SPIN sequence adjusted for enterprise
     complexity. How do the questions change when the prospect is
     larger and has more stakeholders?

  3. Laura (Scenario A) answers your implication question: "If our
     forecasts are wrong again, we might miss our debt covenants.
     That would be catastrophic." Write your next 3 responses using
     SPIN principles — how do you deepen this without being pushy?

  4. Compare how SPIN works differently for mid-market vs. enterprise.
     Where do most AEs go wrong with each segment?

assertions:
  - type: llm_judge
    criteria: "SPIN sequence follows correct progression — Situation questions are brief and research-informed, Problem questions uncover real pain, Implication questions explore business consequences, Need-Payoff gets prospect to articulate value"
    weight: 0.25
    description: "Correct SPIN progression"
  - type: llm_judge
    criteria: "Enterprise SPIN is appropriately adjusted — includes questions about multiple stakeholders, migration risk, cross-department impact, and compliance requirements that wouldn't apply to mid-market"
    weight: 0.25
    description: "Enterprise-adjusted SPIN"
  - type: llm_judge
    criteria: "Debt covenant follow-up deepens without pushing — uses implication questions to explore the severity (what happens if covenants are breached?) before transitioning to need-payoff, showing empathy not urgency"
    weight: 0.25
    description: "Empathetic deepening technique"
  - type: llm_judge
    criteria: "Segment comparison is insightful — identifies that mid-market reps often skip implication and jump to solution, while enterprise reps often over-index on situation questions and lose momentum"
    weight: 0.25
    description: "Insightful segment comparison"
