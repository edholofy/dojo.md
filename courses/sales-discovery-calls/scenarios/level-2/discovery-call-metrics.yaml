meta:
  id: discovery-call-metrics
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Analyze discovery call performance metrics — talk-to-listen ratio, question count, conversion rates, and self-coaching from call recordings"
  tags: [sales, metrics, analytics, self-coaching, intermediate]

state: {}

trigger: |
  You're an AE at "ConvoAI" (conversation intelligence platform,
  $45M ARR). Your sales manager pulls your call analytics for the
  last month and asks you to self-evaluate.

  Your metrics (last 30 days, 40 discovery calls):
  - Talk-to-listen ratio: 62:38 (you talk 62%, prospect 38%)
  - Average questions asked per call: 7
  - Average call duration: 22 minutes
  - Discovery-to-demo conversion: 18% (7 of 40 advanced to demo)
  - Longest monologue: 4 minutes 30 seconds
  - Filler words per call: 23 ("um", "like", "you know")
  - Next steps agreed on call: 45% (18 of 40)

  Industry benchmarks:
  - Top performers talk-to-listen: 43:57
  - Optimal questions: 11-14 per call
  - Average call duration: 30-35 minutes
  - Top discovery-to-demo conversion: 35-40%
  - Longest monologue (top reps): under 1 minute 30 seconds
  - Filler words (top reps): under 8 per call
  - Next steps agreed: 80%+

  Your manager also shares 2 call snippets:

  Snippet A (from a lost deal):
  You: "So our platform uses AI to analyze every call, and we can
  identify patterns, and then we have this dashboard that shows
  talk ratios, and keyword tracking, and we integrate with Salesforce
  and HubSpot, and our customers see a 30% improvement in close
  rates, and we also have coaching features..." [continued for 3 min]
  Prospect: "Okay, that's a lot. Let me think about it."

  Snippet B (from a won deal):
  You: "What's happening today that made you look into conversation
  intelligence?"
  Prospect: [talked for 2 minutes about their challenges]
  You: "It sounds like you're concerned that managers don't have
  visibility into what's actually being said on calls?"
  Prospect: "Exactly! And it's not just visibility..."

  Tasks:
  1. Analyze each of your 7 metrics against benchmarks. For each,
     explain what the gap means in practical terms (not just "it's
     below benchmark" — what behavior is causing it?).

  2. Create a 4-week self-coaching plan to improve your 3 weakest
     metrics. Include specific daily/weekly actions.

  3. Why did Snippet A fail and Snippet B succeed? What specific
     techniques made the difference?

  4. Design a pre-call reminder card (5 bullet points) you'd tape
     to your monitor to fix your biggest habits.

assertions:
  - type: llm_judge
    criteria: "Metric analysis connects data to behavior — explains that 62:38 ratio means over-talking, 7 questions means shallow discovery, 18% conversion means poor qualification, and traces each to specific behaviors"
    weight: 0.25
    description: "Behavior-connected analysis"
  - type: llm_judge
    criteria: "Self-coaching plan is actionable and time-bound — provides specific weekly goals (e.g., 'Week 1: Reduce talk ratio to 55:45 by pausing 2 seconds before responding') rather than vague improvement targets"
    weight: 0.25
    description: "Actionable coaching plan"
  - type: llm_judge
    criteria: "Snippet analysis is technique-specific — identifies Snippet A as feature dumping with a 3-min monologue, Snippet B as using open-ended question + labeling + letting prospect elaborate"
    weight: 0.25
    description: "Technique-specific snippet analysis"
  - type: llm_judge
    criteria: "Reminder card is concise and behavioral — contains 5 specific, actionable reminders like 'Ask, don't tell' or 'Pause 2 seconds after every answer' rather than generic advice"
    weight: 0.25
    description: "Concise behavioral reminders"
