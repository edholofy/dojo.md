meta:
  id: sandler-pain-funnel
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Use the Sandler Pain Funnel to move from surface-level problems to deep business pain during discovery calls"
  tags: [sales, sandler, pain-funnel, deep-discovery, intermediate]

state: {}

trigger: |
  You're an AE at "ServiceDesk360" (IT service management SaaS,
  $30M ARR). Your company trains on the Sandler Pain Funnel — a
  technique to move from surface pain to deep emotional pain that
  drives buying decisions.

  Sandler Pain Funnel levels:
  Level 1 (Surface): "Tell me more about that..."
  Level 2 (Specifics): "Can you be more specific? Give me an example."
  Level 3 (Impact): "How long has that been going on?"
  Level 4 (Consequences): "What have you tried to do about it?"
  Level 5 (Personal): "How does that affect you personally?"
  Level 6 (Decision): "Have you given up trying to fix this?"

  Prospect: "MegaCorp IT" (financial services company, 2,000 emp)
  Contact: VP of IT Operations, Dave Chen

  Dave's opening statement: "Our ticketing system is outdated.
  Response times are slow."

  Watch how the Pain Funnel deepens:

  Level 1 — You ask: "Tell me more about the response time issue."
  Dave: "Our average response time is 48 hours. It should be 4."

  Level 2 — You ask: "Can you give me an example of when this was
  a real problem?"
  Dave: "Last month, a C-suite exec couldn't access the trading
  platform for 6 hours. He went directly to my boss."

  Level 3 — You ask: "How long has the response time been this bad?"
  Dave: "It's been getting worse for 18 months. We lost 2 good
  engineers because they were burnt out from the chaos."

  Level 4 — You ask: "What have you tried to do about it?"
  Dave: "We tried hiring more people, but the labor market is
  terrible. We tried upgrading the current tool, but it's end-of-life."

  Level 5 — You ask: "How does this affect you personally, Dave?"
  Dave: [pause] "Honestly? My job might be on the line. The CTO
  told me I have until Q3 to fix this or they'll bring in someone
  who can."

  Tasks:
  1. Analyze the Pain Funnel above. At each level, what new
     information did you learn? Map the journey from "surface pain"
     to "buying urgency."

  2. Dave didn't give you a Level 6 response. Write the Level 6
     question and predict how Dave might answer. Why is this level
     so powerful?

  3. Now practice on a fresh scenario. A prospect says: "Our
     onboarding process for new employees takes too long." Write
     a full 6-level Pain Funnel conversation, making up realistic
     responses at each level.

  4. What's the difference between the Sandler Pain Funnel and SPIN
     Selling's approach to pain discovery? When would you use each?

assertions:
  - type: llm_judge
    criteria: "Pain Funnel analysis shows progressive deepening — maps from surface (slow response times) → business impact (C-suite disruption) → organizational impact (attrition) → personal impact (job at risk) with clear explanation of why each level matters"
    weight: 0.25
    description: "Progressive deepening analysis"
  - type: llm_judge
    criteria: "Level 6 question and prediction are realistic — asks something like 'Have you given up trying to fix this on your own?' and predicts Dave acknowledging he needs external help, creating buying commitment"
    weight: 0.25
    description: "Realistic Level 6 completion"
  - type: llm_judge
    criteria: "Fresh scenario Pain Funnel is complete and natural — all 6 levels with realistic prospect responses, progressively deepening from surface problem to personal/emotional impact"
    weight: 0.25
    description: "Complete fresh Pain Funnel"
  - type: llm_judge
    criteria: "Sandler vs. SPIN comparison is accurate — identifies that Pain Funnel goes deeper into personal/emotional territory while SPIN focuses more on business implications, and each has appropriate use cases"
    weight: 0.25
    description: "Accurate methodology comparison"
