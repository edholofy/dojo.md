meta:
  id: competitive-discovery
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Conduct competitive discovery — uncover what competitors prospects are evaluating, their criteria, and how to position without bashing"
  tags: [sales, competitive, positioning, discovery, intermediate]

state: {}

trigger: |
  You're an AE at "AnalyticsHub" (business intelligence platform,
  $60M ARR). You're in a competitive market against Tableau, Looker,
  and Power BI. Your discovery calls frequently involve competitive
  situations.

  Scenario 1: Known competitor
  Prospect: "DataDriven Inc" (e-commerce analytics company, 200 emp)
  Contact: VP of Analytics, Sarah Kim
  Sarah says in the first 5 minutes: "Full transparency — we're
  also evaluating Tableau and Looker. We have demos with both next
  week. We want to make a decision by end of month."

  Scenario 2: Incumbent replacement
  Prospect: "RetailChain" (brick-and-mortar retailer, 500 emp)
  Contact: Director of BI, Michael Torres
  Michael says: "We've been using Power BI for 3 years. It's fine
  but we're curious what else is out there. Our license is up for
  renewal in 90 days."

  Scenario 3: Hidden competitor
  Prospect: "HealthTech" (healthcare analytics, 150 emp)
  Contact: Head of Data, Priya Shah
  Priya seems engaged but is vague about timeline. You suspect
  she's evaluating other options but hasn't mentioned any.

  Tasks:
  1. For Scenario 1, write your response to Sarah's transparency.
     Then design 5 questions to understand her evaluation criteria,
     process, and what would make her choose you over Tableau/Looker.

  2. For Scenario 2, how do you discover dissatisfaction with Power
     BI without bashing it? Write a sequence of 5 questions that
     explore gaps naturally.

  3. For Scenario 3, how do you surface the hidden competitor?
     Write 4 questions that invite Priya to share her evaluation
     process without making it feel like an interrogation.

  4. Create a "competitive discovery cheat sheet" — a quick-reference
     guide for any AE on your team with the top 10 competitive
     discovery questions that work regardless of who the competitor is.

assertions:
  - type: llm_judge
    criteria: "Known-competitor response is confident not defensive — thanks Sarah for transparency, shows respect for the evaluation process, and uses competitive awareness to ask better discovery questions"
    weight: 0.25
    description: "Confident competitive response"
  - type: llm_judge
    criteria: "Incumbent exploration is curiosity-driven — asks about what Power BI does well (not just badly), explores what triggered the evaluation, and discovers specific limitations through the prospect's own words"
    weight: 0.25
    description: "Curiosity-driven incumbent exploration"
  - type: llm_judge
    criteria: "Hidden competitor questions are indirect and natural — uses process questions ('How are you approaching this evaluation?') rather than direct 'Who else are you talking to?' which feels aggressive"
    weight: 0.25
    description: "Natural hidden-competitor surfacing"
  - type: llm_judge
    criteria: "Cheat sheet is universally applicable — provides 10 questions that work against any competitor, covering evaluation criteria, decision process, what's been tried before, and what success looks like"
    weight: 0.25
    description: "Universal competitive cheat sheet"
