meta:
  id: industry-specific-discovery
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Adapt discovery call approach for different industries — understand unique buying cycles, compliance needs, and decision-making patterns"
  tags: [sales, industry, vertical, adaptation, intermediate]

state: {}

trigger: |
  You're an AE at "CloudSecure" (cloud security platform, $70M ARR).
  You sell across multiple industries and each requires a different
  discovery approach. Your enablement team asks you to design
  industry-specific discovery playbooks.

  Industry 1: Healthcare (HIPAA-regulated)
  Prospect: "MedGroup" (hospital network, 3,000 employees)
  Contact: CISO, Dr. Robert Kim
  Context: Migrating patient records to the cloud. Board mandated
  "zero-compromise" on patient data security. Budget: $500K.
  Timeline: 12 months. Buying committee: 8 people including legal.

  Industry 2: Financial Services (SOX/PCI-regulated)
  Prospect: "Pacific Credit Union" (credit union, 800 employees)
  Contact: VP of IT, Angela Martinez
  Context: Modernizing their core banking security. Just passed a
  regulatory audit with findings. Budget: $200K. Timeline: 6 months.
  Buying committee: 5 people.

  Industry 3: SaaS/Tech (fast-moving, less regulated)
  Prospect: "ScaleApp" (B2B SaaS startup, 150 employees, Series C)
  Contact: Head of Engineering, Jake Patel
  Context: Growing rapidly, just had their first security incident.
  Board is demanding SOC 2 Type II. Budget: $100K. Timeline: ASAP.
  Buying committee: 2-3 people.

  Tasks:
  1. For each industry, write 6 discovery questions that are specific
     to that industry's unique concerns. Generic questions don't
     count — they must reflect industry knowledge.

  2. How does the buying cycle differ across these 3 industries?
     Create a comparison table showing: typical cycle length, key
     stakeholders, primary concerns, and deal-killers.

  3. For the healthcare prospect, compliance is critical. Write a
     mini-script showing how you'd weave HIPAA-specific questions
     into your discovery naturally (not as a compliance checklist).

  4. The SaaS prospect wants speed. How do you do thorough discovery
     when the prospect says "We need this yesterday"? Write your
     approach for compressing discovery without sacrificing quality.

assertions:
  - type: llm_judge
    criteria: "Industry questions reflect genuine domain knowledge — healthcare questions address HIPAA, ePHI, BAA requirements; financial asks about SOX/PCI/audit findings; SaaS focuses on SOC 2, CI/CD pipeline security, and rapid scaling"
    weight: 0.25
    description: "Domain-specific questions"
  - type: llm_judge
    criteria: "Buying cycle comparison is accurate — healthcare (12-18 months, 8+ stakeholders, compliance primary), financial (6-9 months, procurement-heavy), SaaS (1-3 months, engineering-led, speed-focused)"
    weight: 0.25
    description: "Accurate cycle comparison"
  - type: llm_judge
    criteria: "HIPAA discovery feels conversational — integrates compliance questions into natural flow rather than reading a checklist, e.g., 'Walk me through how patient data flows today' instead of 'Are you HIPAA compliant?'"
    weight: 0.25
    description: "Conversational compliance discovery"
  - type: llm_judge
    criteria: "Compressed discovery maintains quality — proposes techniques like combining calls, sending pre-call questionnaire, focusing on top 3 critical questions, or parallel stakeholder conversations"
    weight: 0.25
    description: "Quality-preserving compression"
