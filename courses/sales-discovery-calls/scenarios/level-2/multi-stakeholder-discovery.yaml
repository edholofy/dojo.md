meta:
  id: multi-stakeholder-discovery
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Navigate discovery calls with multiple stakeholders — tailor questions by role, manage competing priorities, and identify the real decision maker"
  tags: [sales, stakeholders, buying-committee, multi-threading, intermediate]

state: {}

trigger: |
  You're an AE at "WorkflowPro" (business process automation SaaS,
  $35M ARR). You have a discovery call with 4 people from "FastGrow
  Manufacturing" (industrial manufacturer, 400 employees, $60M rev).

  Attendees and their likely priorities:
  1. Tom Harris — VP of Operations (your main contact, set up the call)
     Likely cares about: efficiency, reducing manual work, error rates
  2. Lisa Nguyen — IT Director
     Likely cares about: security, integrations, technical requirements
  3. Mark Sullivan — CFO
     Likely cares about: ROI, cost, payback period
  4. Priya Sharma — Operations Manager (reports to Tom)
     Likely cares about: daily usability, team adoption, training

  Context: FastGrow's current process is paper-based. Work orders,
  quality checks, and inventory are all done on paper forms. They
  have a 4% error rate on work orders, which costs them ~$200K/year
  in rework. Tom submitted the lead saying "We need to digitize."

  Challenges:
  - The CFO joined last minute — you didn't expect finance on the call
  - Lisa and Tom don't always see eye-to-eye (IT vs. Ops tension)
  - You have 45 minutes for 4 people
  - Everyone will want to talk about different things

  Tasks:
  1. Design the call agenda for 45 minutes. How do you allocate time
     across the 4 stakeholders? What's the opening that acknowledges
     everyone's presence?

  2. Write 3 tailored questions for each stakeholder (12 total) that
     address their specific priorities while keeping the conversation
     relevant for everyone.

  3. Mid-call, Tom says "We just need something simple" but Lisa says
     "We need enterprise-grade security and SOC 2 compliance." How
     do you navigate this conflict without alienating either person?

  4. After the call, which stakeholder is most likely your champion?
     Which one could block the deal? What's your follow-up strategy
     for each of the 4 people?

assertions:
  - type: llm_judge
    criteria: "Agenda balances all stakeholders — allocates time for each person's concerns, starts with shared context, and includes a section where each stakeholder can voice their priorities"
    weight: 0.25
    description: "Balanced multi-stakeholder agenda"
  - type: llm_judge
    criteria: "Questions are genuinely tailored — each stakeholder gets questions relevant to their role (ROI for CFO, integrations for IT, usability for ops manager) rather than generic questions asked to each person"
    weight: 0.25
    description: "Role-specific question design"
  - type: llm_judge
    criteria: "Conflict navigation validates both perspectives — acknowledges Tom's simplicity need AND Lisa's security requirements, reframes as complementary rather than competing, and finds common ground"
    weight: 0.25
    description: "Diplomatic conflict navigation"
  - type: llm_judge
    criteria: "Post-call strategy is differentiated — identifies Tom or Priya as likely champion, Lisa as potential blocker, tailors follow-up content per role (ROI analysis for CFO, security docs for IT, etc.)"
    weight: 0.25
    description: "Differentiated follow-up strategy"
