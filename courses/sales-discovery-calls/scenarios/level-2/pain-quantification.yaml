meta:
  id: pain-quantification
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Quantify prospect pain during discovery — help prospects calculate the cost of their problem to build urgency and justify investment"
  tags: [sales, pain, quantification, ROI, business-case, intermediate]

state: {}

trigger: |
  You're an AE at "RecruitFlow" (recruiting automation SaaS, $20M
  ARR, pricing $500-5,000/month based on team size). Your sales
  trainer says: "If you can't quantify the pain, you can't justify
  the price."

  Pain quantification framework:
  - Time cost: Hours spent × hourly rate × frequency
  - Revenue cost: Deals/customers lost due to the problem
  - Error cost: Mistakes × cost per mistake
  - Opportunity cost: What could they do with that time instead?

  Prospect: "TalentFirst" (tech staffing agency, 50 recruiters,
  $40M revenue, 15% profit margin)

  During discovery, the prospect (VP of Recruiting, Dan Morris) says:

  Statement 1: "Our recruiters spend about 3 hours a day on
  administrative tasks — scheduling interviews, sending follow-ups,
  updating the ATS. They should be sourcing candidates."

  Statement 2: "We lose about 20% of our candidates because we're
  too slow. By the time we schedule an interview, they've accepted
  another offer."

  Statement 3: "Our time-to-fill is 45 days. The industry average
  is 30. Every extra day costs us — the client pays us when we fill
  the role, not before."

  Statement 4: "We had 3 compliance issues last year with EEOC
  reporting because our data is scattered across spreadsheets."

  Tasks:
  1. For each of Dan's 4 statements, calculate the estimated annual
     cost of the problem. Show your math. Use reasonable assumptions
     where needed (document your assumptions).

  2. What's the total annual cost of all 4 problems combined? How
     does this compare to your product's likely price point? What's
     the ROI multiple?

  3. Write the questions you'd ask Dan to get him to calculate
     these costs himself (rather than you telling him). Why is it
     more powerful when the prospect does the math?

  4. Dan says: "Those numbers sound right but I can't go to my
     CEO with rough estimates." How do you help him build a formal
     business case?

assertions:
  - type: llm_judge
    criteria: "Cost calculations are reasonable and well-documented — provides clear math with stated assumptions (recruiter salary, placement fee, etc.), arriving at plausible annual costs for each pain point"
    weight: 0.25
    description: "Reasonable cost calculations"
  - type: llm_judge
    criteria: "ROI narrative is compelling — totals the annual cost, compares against product pricing, shows clear ROI multiple (likely 5-10x+), framing the investment as obvious"
    weight: 0.25
    description: "Compelling ROI narrative"
  - type: llm_judge
    criteria: "Self-discovery questions guide the prospect — asks questions like 'What does a recruiter's time cost per hour?' and 'How many candidates did you lose last month?' so Dan arrives at the numbers himself"
    weight: 0.25
    description: "Self-discovery quantification"
  - type: llm_judge
    criteria: "Business case guidance is practical — offers to provide a formal ROI template, suggests specific data points Dan should gather, and proposes a joint session to build the case together"
    weight: 0.25
    description: "Practical business case support"
