meta:
  id: meddpicc-qualification
  level: 2
  course: sales-discovery-calls
  type: output
  description: "Apply MEDDPICC qualification framework for complex enterprise deals — identify metrics, economic buyers, decision criteria, and champions"
  tags: [sales, MEDDPICC, qualification, enterprise, intermediate]

state: {}

trigger: |
  You're a mid-market AE at "SecureNet" (cybersecurity platform,
  $80M ARR). Your company just upgraded from BANT to MEDDPICC for
  qualifying deals over $50K. You need to learn the framework and
  apply it to a real deal.

  MEDDPICC Framework:
  - Metrics: Quantifiable business outcomes the prospect wants
  - Economic Buyer: Person with final budget authority
  - Decision Criteria: Requirements they'll evaluate vendors against
  - Decision Process: Steps from evaluation to signed contract
  - Paper Process: Legal, procurement, security review steps
  - Identify Pain: The core business problem driving urgency
  - Champion: Internal advocate who will sell for you
  - Competition: Everything competing for their budget/attention

  Current deal:
  Company: "MedDevice Corp" (medical device manufacturer, 800
  employees, $150M revenue)
  Opportunity: $120K annual deal

  Here's what you know after your first discovery call with Karen
  Patel (IT Security Manager):

  "We had a ransomware attempt last month. It was stopped by our
  antivirus but barely. The CEO is terrified — we handle patient
  data and a breach could shut us down. We need endpoint protection,
  email security, and incident response. The CISO wants proposals
  by March 15. IT has a $200K security budget this year. We're also
  talking to CrowdStrike and SentinelOne. Our procurement takes
  6-8 weeks after vendor selection. Karen says she 'loves your
  product' and wants to set up a meeting with the CISO."

  Tasks:
  1. Fill out the MEDDPICC scorecard for this deal. For each of
     the 8 criteria, score it 1-3 (1=unknown, 2=partially known,
     3=fully confirmed) and explain what you know vs. what's missing.

  2. You scored some criteria as "partially known" or "unknown."
     Write the specific questions you'd ask in your next call to
     fill those gaps.

  3. Karen seems like a champion. What are the 5 tests to confirm
     she's a real champion vs. just a friendly contact? How does
     she stack up?

  4. You're competing against CrowdStrike (market leader) and
     SentinelOne. How does this affect your discovery strategy?
     What competitive intelligence questions should you ask?

assertions:
  - type: llm_judge
    criteria: "MEDDPICC scorecard is thorough — scores each criteria with reasoning, correctly identifies gaps like Economic Buyer (CISO not yet confirmed as EB), Decision Criteria (unknown formal requirements), and Paper Process (procurement timeline known but not steps)"
    weight: 0.25
    description: "Thorough MEDDPICC scoring"
  - type: llm_judge
    criteria: "Gap-filling questions are targeted — asks specific questions to confirm the Economic Buyer (Is the CISO the final sign-off?), Decision Criteria (What evaluation criteria will you use?), and Paper Process (What approvals are needed after vendor selection?)"
    weight: 0.25
    description: "Targeted gap-filling questions"
  - type: llm_judge
    criteria: "Champion validation tests are rigorous — includes tests like: does she have access to power, will she share internal information, will she coach you on competitors, will she advocate in meetings you're not in, and does she have credibility internally"
    weight: 0.25
    description: "Rigorous champion validation"
  - type: llm_judge
    criteria: "Competitive strategy is practical — proposes questions to understand evaluation criteria, differentiators they care about, and competitor weaknesses without bashing, while positioning unique value"
    weight: 0.25
    description: "Practical competitive strategy"
