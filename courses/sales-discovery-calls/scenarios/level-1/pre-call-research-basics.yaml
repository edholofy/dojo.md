meta:
  id: pre-call-research-basics
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Conduct basic pre-call research on a prospect to prepare meaningful discovery questions"
  tags: [sales, pre-call-research, preparation, beginner]

state: {}

trigger: |
  You're a junior SDR at "SalesForce CRM" (CRM SaaS, mid-market
  focus). You have a discovery call tomorrow at 2 PM with a prospect.
  Your manager says: "Never go into a call blind. Research first."

  Prospect details from the inbound form:
  - Name: Sarah Chen, Director of Sales Operations
  - Company: "GrowthTech Solutions"
  - Email: sarah@growthtech.com
  - Phone: Provided
  - Form comment: "Looking to improve our sales pipeline visibility"

  Information you can find:
  - GrowthTech Solutions website: B2B SaaS company, 150 employees,
    Series B funded ($25M), sells project management software
  - LinkedIn: Sarah has been in role 8 months, previously at a
    larger company. She posts about "sales ops modernization."
  - Glassdoor: 3.8 stars, reviews mention "disorganized sales process"
  - CrunchBase: Revenue estimated at $12M ARR
  - Tech stack (from job postings): Currently using HubSpot CRM,
    Outreach for sequences, Excel for reporting

  Tasks:
  1. Create a pre-call research brief. What are the 5 most important
     things you learned, and how does each inform a discovery question?

  2. Based on your research, write 8 discovery questions ordered from
     broad to specific.

  3. Sarah mentioned "pipeline visibility." What deeper pain might
     this signal? Write 3 follow-up questions that dig beneath the
     surface.

  4. You notice they already use HubSpot CRM. How does this change
     your approach? You're selling a competing CRM.

assertions:
  - type: llm_judge
    criteria: "Research brief connects findings to questions — doesn't just list facts but explains how each finding informs the conversation (e.g., Series B = growth pressure = pipeline needs)"
    weight: 0.25
    description: "Findings-to-questions connection"
  - type: llm_judge
    criteria: "Questions follow a logical flow — starts broad (role, goals) and narrows to specific pain points, without jumping straight to product features"
    weight: 0.25
    description: "Logical question flow"
  - type: llm_judge
    criteria: "Pipeline visibility follow-ups dig deeper — explores what's behind the request (missed forecasts, lost deals, rep accountability, board pressure)"
    weight: 0.25
    description: "Deep pain discovery"
  - type: llm_judge
    criteria: "Competitive situation is handled thoughtfully — acknowledges the existing CRM, asks about pain points with it, and doesn't bash HubSpot"
    weight: 0.25
    description: "Thoughtful competitive handling"
