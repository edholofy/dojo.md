meta:
  id: call-structure-basics
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Structure a basic discovery call with proper opening, agenda setting, discovery sections, and closing with clear next steps"
  tags: [sales, call-structure, agenda, next-steps, beginner]

state: {}

trigger: |
  You're an SDR at "SecureCloud" (cybersecurity SaaS). You have a
  30-minute discovery call scheduled for tomorrow. Your manager gives
  you a call framework to follow.

  Call framework:
  - Opening (3 min): Introduction, rapport, set agenda
  - Discovery (20 min): Questions about their situation, pains, goals
  - Summary (3 min): Recap what you learned
  - Next steps (4 min): Agree on follow-up actions

  Prospect info:
  - Name: Alex Rivera, IT Manager
  - Company: "MedTech Corp" (medical device manufacturer, 200 employees)
  - Context: Inbound lead — downloaded a whitepaper on "Ransomware
    Protection for Healthcare"
  - Their current setup: Basic antivirus, no dedicated security team,
    compliance requirements (HIPAA, FDA)

  Tasks:
  1. Write the opening 3 minutes: How do you introduce yourself, set
     the agenda, and build rapport without sounding scripted?

  2. Design the 20-minute discovery section. What questions do you
     ask, in what order, and how much time for each topic?

  3. Write the summary/recap. Assume you learned: They had a
     ransomware scare last month, they're worried about HIPAA
     compliance, and their CEO is pushing for better security.

  4. Design the next steps close. What specific next step do you
     propose, and how do you get commitment?

assertions:
  - type: llm_judge
    criteria: "Opening is natural — introduces a clear agenda, asks permission to proceed, and includes a brief rapport-building element without forced small talk"
    weight: 0.25
    description: "Natural call opening"
  - type: llm_judge
    criteria: "Discovery section is structured — allocates time across topics (current state, pain points, goals, decision process) with specific questions for each"
    weight: 0.25
    description: "Structured discovery allocation"
  - type: llm_judge
    criteria: "Summary reflects active listening — accurately captures the key pain points (ransomware scare, HIPAA compliance, CEO pressure) and confirms understanding"
    weight: 0.25
    description: "Accurate active listening summary"
  - type: llm_judge
    criteria: "Next steps are specific — proposes a concrete next action (demo, technical assessment, meeting with security team) with a specific date/time rather than vague 'let's follow up'"
    weight: 0.25
    description: "Specific next step commitment"
