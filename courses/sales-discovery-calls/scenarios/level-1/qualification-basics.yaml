meta:
  id: qualification-basics
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Qualify prospects using BANT criteria during discovery calls to determine if they're a good fit"
  tags: [sales, qualification, BANT, fit-assessment, beginner]

state: {}

trigger: |
  You're a junior AE at "HRPlatform" (HR software, $20M ARR). After
  each discovery call, you need to score the prospect on qualification
  criteria. Your company uses a modified BANT framework.

  Qualification scorecard:
  - Budget (1-5): Is there budget allocated or a business case?
  - Authority (1-5): Are you talking to the decision maker?
  - Need (1-5): Is there a genuine, urgent problem?
  - Timeline (1-5): When do they need a solution?
  Score: 15-20 = hot, 10-14 = warm, <10 = cold

  Score these 4 discovery call outcomes:

  Call 1: "FastGrow" (startup, 50 employees)
  Spoke to: CEO (decision maker)
  Budget: "We don't have a formal budget but I can approve up to $5K/month"
  Need: "Our HR processes are manual. We use spreadsheets for everything."
  Timeline: "We need something by Q2 — we're hiring 30 people."
  Competition: Not evaluating anyone else yet.

  Call 2: "BigCo" (enterprise, 2,000 employees)
  Spoke to: HR Coordinator (not decision maker)
  Budget: "I don't know the budget. My boss handles that."
  Need: "Our current HR system is old but it works okay."
  Timeline: "No specific timeline. Maybe next year."
  Competition: Already talking to Workday and BambooHR.

  Call 3: "RetailChain" (retail, 500 employees)
  Spoke to: VP of HR (decision maker)
  Budget: "We've approved $50K this quarter for HR technology."
  Need: "We had a compliance violation. The board mandated new HR systems."
  Timeline: "Need to be live by July 1 (3 months)."
  Competition: Evaluating 2 others.

  Call 4: "Agency" (marketing agency, 25 employees)
  Spoke to: Office Manager
  Budget: "$500/month maximum"
  Need: "It would be nice to have better onboarding."
  Timeline: "Whenever. No rush."
  Competition: Looking at free tools.

  Tasks:
  1. Score each prospect on the BANT scorecard. Show your scoring
     for each criteria.

  2. Rank the 4 prospects by priority. Where should you invest your
     time?

  3. Call 2 (BigCo) has the biggest potential deal but scored low.
     What do you do — disqualify or develop? Design the next step.

  4. Call 4 (Agency) is a poor fit for your product. Write the
     graceful disqualification email.

assertions:
  - type: llm_judge
    criteria: "Scoring is consistent and justified — provides specific scores for each criteria with reasoning, ranking RetailChain and FastGrow highest"
    weight: 0.25
    description: "Consistent justified scoring"
  - type: llm_judge
    criteria: "Priority ranking reflects deal reality — considers both score and potential, putting RetailChain first (high score + urgency) and FastGrow second"
    weight: 0.25
    description: "Reality-based priority ranking"
  - type: llm_judge
    criteria: "BigCo strategy is to develop, not disqualify — proposes multi-threading to the decision maker and gathering more information rather than giving up"
    weight: 0.25
    description: "Strategic BigCo development"
  - type: llm_judge
    criteria: "Disqualification email is professional — thanks them, suggests alternative solutions, and leaves the door open without wasting their time"
    weight: 0.25
    description: "Professional disqualification"
