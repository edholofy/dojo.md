meta:
  id: virtual-discovery-basics
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Adapt discovery call techniques for virtual settings — Zoom etiquette, engagement tactics, screen sharing, and managing technical issues"
  tags: [sales, virtual, zoom, remote-selling, beginner]

state: {}

trigger: |
  You're a junior AE at "TeamBoard" (project management SaaS). All
  your discovery calls are virtual (Zoom). Your sales enablement
  team is creating a guide for virtual discovery best practices.

  Scenario: You have a Zoom discovery call in 1 hour with:
  - Prospect: Diana Park, Operations Manager at "FastRetail"
    (e-commerce company, 80 employees)
  - Context: Inbound lead — requested a "workflow automation" demo
  - Diana mentioned she has "hard stop at 2:30" (you have 30 min)
  - Two other team members may join (names unknown)

  Challenges you've faced in past virtual calls:
  - Prospect had camera off the entire call (hard to read reactions)
  - Prospect was clearly multitasking (typing sounds, delayed responses)
  - Screen share didn't work during a critical moment
  - Awkward silence when prospect's audio cut out
  - Prospect's colleagues joined late and you had to restart context

  Tasks:
  1. Write your pre-call checklist: What do you do in the 15 minutes
     before the call to ensure a smooth virtual discovery?

  2. How do you handle each of these 5 challenges during a live call?
     Write specific scripts or actions for each situation.

  3. You want to share your screen to show a quick diagram of their
     workflow. When in the call should you do this, and how do you
     transition smoothly?

  4. Compare virtual vs. in-person discovery: What are 3 things that
     are harder virtually, and 3 things that are actually easier?
     How do you leverage the advantages?

assertions:
  - type: llm_judge
    criteria: "Pre-call checklist is comprehensive — covers technical setup (audio, video, internet, backup plan), content prep (agenda, research, notes ready), environment (background, lighting, distractions), and early join"
    weight: 0.25
    description: "Comprehensive virtual prep"
  - type: llm_judge
    criteria: "Challenge responses are practical — provides specific scripts or actions for camera-off, multitasking, screen share failure, audio issues, and late joiners, not just generic advice"
    weight: 0.25
    description: "Practical challenge handling"
  - type: llm_judge
    criteria: "Screen sharing is strategically timed — recommends sharing after initial discovery (not immediately), using it briefly to add visual context, and returning to face-to-face for continued conversation"
    weight: 0.25
    description: "Strategic screen share timing"
  - type: llm_judge
    criteria: "Virtual comparison is balanced — honestly identifies disadvantages (reading body language, building rapport, attention) and genuine advantages (recording, screen sharing data, scheduling ease)"
    weight: 0.25
    description: "Balanced virtual comparison"
