meta:
  id: post-call-documentation
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Document discovery call findings effectively — write CRM notes, follow-up emails, and next-step summaries"
  tags: [sales, documentation, CRM, follow-up, beginner]

state: {}

trigger: |
  You're a junior AE at "ProposalPro" (proposal automation SaaS).
  You just finished a 30-minute discovery call. Your manager requires
  you to complete 3 post-call deliverables within 24 hours.

  Call details:
  - Prospect: Rachel Kim, Director of Sales Ops at "ScaleUp Inc"
    (B2B SaaS, 300 employees, $40M ARR)
  - How they found you: Attended your webinar on "Automating Sales
    Proposals"
  - Current state: Reps build proposals manually in Google Docs.
    Takes 2-3 hours per proposal. No template library. No approval
    workflow.
  - Pain points uncovered:
    1. Proposals take too long — deals stall while reps build docs
    2. Inconsistent branding — every rep's proposals look different
    3. No visibility — Rachel can't see which proposals are out or
       their status
    4. Pricing errors — reps sometimes quote wrong prices (happened
       3 times last quarter, cost them $45K)
  - Decision process: Rachel makes the recommendation, CFO approves
    anything over $20K. IT does a security review.
  - Timeline: Want to implement before Q3 (4 months away)
  - Budget: "We have budget allocated for sales tools this year"
  - Competition: Also looking at PandaDoc
  - Next step agreed: Technical demo next Thursday with Rachel + 2
    senior AEs

  Tasks:
  1. Write the CRM opportunity notes. Include: BANT summary, key
     pain points, competitive intel, stakeholders, and next steps.
     Keep it scannable — your manager reads 20 of these per day.

  2. Write the follow-up email to Rachel. Summarize the call, confirm
     the next step, and reinforce value without being salesy.

  3. Write a brief internal Slack message to your SE (solutions
     engineer) prepping them for the demo. What should they focus on?

  4. What information did you NOT get on this call that you need
     before the demo? List 3-5 gaps and how you'll fill them.

assertions:
  - type: llm_judge
    criteria: "CRM notes are scannable and complete — uses structured format (bullets, headers, or fields) covering BANT, pain points, competition, stakeholders, and next steps without walls of text"
    weight: 0.25
    description: "Scannable CRM documentation"
  - type: llm_judge
    criteria: "Follow-up email is professional and value-reinforcing — thanks Rachel, accurately summarizes key discussion points, confirms the demo date, and subtly connects pain points to value"
    weight: 0.25
    description: "Professional follow-up email"
  - type: llm_judge
    criteria: "SE prep message is actionable — highlights specific pain points to demo against, competitive context (PandaDoc), and key stakeholders who'll attend"
    weight: 0.25
    description: "Actionable SE prep"
  - type: llm_judge
    criteria: "Information gaps are genuinely missing — identifies real unknowns like specific deal sizes, number of proposals per month, IT security requirements, or CFO's criteria, with plans to gather them"
    weight: 0.25
    description: "Genuine gap identification"
