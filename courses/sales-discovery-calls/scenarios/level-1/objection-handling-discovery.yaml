meta:
  id: objection-handling-discovery
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Handle common prospect objections during discovery calls — 'just send me info,' premature pricing requests, and brush-off tactics"
  tags: [sales, objection-handling, discovery, brush-offs, beginner]

state: {}

trigger: |
  You're a junior SDR at "CloudSync" (cloud integration SaaS, $15M ARR).
  Your manager warns you about 5 common objections that kill discovery
  calls. You need to learn how to handle each one without losing the
  prospect.

  Objection 1: "Just send me some info"
  Context: You're 2 minutes into the call. You've barely introduced
  yourself and the prospect says: "Look, I'm really busy. Can you
  just email me something?"

  Objection 2: "How much does it cost?"
  Context: You asked your first discovery question and instead of
  answering, the prospect says: "Before we go further, what's the
  price?"

  Objection 3: "We're already using [competitor]"
  Context: During discovery, the prospect says: "We already use
  Zapier for our integrations. We're pretty happy with it."

  Objection 4: "I need to talk to my boss first"
  Context: The call is going well, but when you suggest next steps,
  the prospect says: "This sounds interesting but I'd need to run
  it by my VP."

  Objection 5: "We don't have budget right now"
  Context: You've uncovered a real pain point, but the prospect
  says: "We just did our annual planning. There's no budget for
  new tools until next fiscal year."

  Tasks:
  1. For each objection, write a response that acknowledges the
     concern, redirects back to discovery, and keeps the conversation
     going. Do NOT be pushy or dismissive.

  2. For Objection 1 ("just send me info"), what's the difference
     between a brush-off and a genuine request? How do you tell?

  3. For Objection 3 (competitor), how do you explore dissatisfaction
     with their current solution without bashing the competitor?

  4. What's the underlying principle behind handling all 5 objections?
     What do they have in common?

assertions:
  - type: llm_judge
    criteria: "Responses acknowledge before redirecting — each response validates the prospect's concern first, then bridges back to discovery rather than pushing past the objection"
    weight: 0.25
    description: "Acknowledge-then-redirect pattern"
  - type: llm_judge
    criteria: "Brush-off vs genuine distinction is practical — provides specific verbal and contextual cues that differentiate a real 'send info' request from a polite dismissal"
    weight: 0.25
    description: "Brush-off identification skills"
  - type: llm_judge
    criteria: "Competitor exploration is curiosity-driven — asks about gaps, limitations, or wishes without criticizing the competitor, framing questions around the prospect's experience"
    weight: 0.25
    description: "Respectful competitor exploration"
  - type: llm_judge
    criteria: "Underlying principle is correctly identified — recognizes that objections signal incomplete discovery, and the solution is to provide value and earn the right to continue asking questions"
    weight: 0.25
    description: "Core objection principle"
