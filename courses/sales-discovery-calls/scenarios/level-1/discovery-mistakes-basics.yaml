meta:
  id: discovery-mistakes-basics
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Identify and correct common discovery call mistakes — talking too much, leading questions, skipping pain discovery, and premature pitching"
  tags: [sales, mistakes, self-assessment, coaching, beginner]

state: {}

trigger: |
  You're a junior SDR at "MarketWave" (marketing analytics SaaS).
  Your sales manager recorded 3 mock discovery calls and wants you
  to identify what went wrong in each one.

  Call Transcript 1: "The Feature Dump"
  SDR: "Hi Tom, thanks for taking my call. So MarketWave is an amazing
  platform — we have real-time analytics, AI-powered attribution,
  multi-touch campaign tracking, and we integrate with over 50 tools.
  We just launched our new predictive analytics module. Companies
  like Shopify and HubSpot use us. Does any of that sound interesting?"
  Prospect: "Uh, sure, sounds cool. Can you send me a one-pager?"
  SDR: "Absolutely! I'll send it right over."
  [Call lasted 4 minutes]

  Call Transcript 2: "The Interrogation"
  SDR: "What's your current marketing stack? What's your budget?
  Who's the decision maker? When do you need a solution? What are
  your pain points? How many people on your team? What's your
  biggest challenge?"
  Prospect: "Whoa, that's a lot of questions. I feel like I'm in
  a job interview."
  SDR: "Sorry, just a few more — what's your annual revenue?"
  [Prospect ended the call]

  Call Transcript 3: "The Yes-Man"
  SDR: "It sounds like you're struggling with attribution, right?"
  Prospect: "Um, I guess so."
  SDR: "And I bet your CEO wants better ROI reporting?"
  Prospect: "Maybe, yeah."
  SDR: "You're probably spending too much on underperforming channels?"
  Prospect: "I'm not sure about that."
  SDR: "Well, MarketWave solves all of those problems! Let me
  schedule a demo."
  [Prospect never responded to the demo invite]

  Tasks:
  1. For each call, identify every mistake the SDR made. Be specific
     — don't just say "talked too much." Explain what the impact of
     each mistake was on the prospect.

  2. Rewrite each call's opening 2 minutes to demonstrate the correct
     approach. Show what a skilled SDR would have said instead.

  3. Call 2 asked good questions but delivered them poorly. How should
     those same questions be asked? Reorder and rephrase them.

  4. What's the ideal talk-to-listen ratio for a discovery call?
     Which call violated it most, and what was the likely ratio?

assertions:
  - type: llm_judge
    criteria: "Mistake analysis is specific and impact-focused — identifies precise errors (feature dumping, rapid-fire questions, leading questions) and explains how each one caused the prospect to disengage"
    weight: 0.25
    description: "Specific mistake identification"
  - type: llm_judge
    criteria: "Rewritten openings follow best practices — include rapport, agenda setting, permission to ask questions, and start with open-ended questions rather than pitching or interrogating"
    weight: 0.25
    description: "Best-practice rewrites"
  - type: llm_judge
    criteria: "Call 2 questions are resequenced logically — reorganizes from broad to specific, adds context/transitions between questions, and spaces them conversationally"
    weight: 0.25
    description: "Logical question resequencing"
  - type: llm_judge
    criteria: "Talk-to-listen ratio is accurately described — cites approximately 30:70 or 40:60 as ideal, correctly identifies Call 1 as worst violator (near 95:5), and explains why listening matters"
    weight: 0.25
    description: "Accurate talk-listen analysis"
