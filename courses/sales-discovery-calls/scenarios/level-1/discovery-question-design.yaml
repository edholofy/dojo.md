meta:
  id: discovery-question-design
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Design effective discovery questions that uncover pain, budget, authority, and timeline without sounding like an interrogation"
  tags: [sales, questions, discovery, pain-finding, beginner]

state: {}

trigger: |
  You're a junior AE at "DataViz Pro" (data visualization SaaS,
  $30M ARR). Your sales trainer gives you a list of "bad" discovery
  questions and asks you to rewrite them.

  Bad questions to fix:
  1. "Do you have budget for this?" (Too direct, puts prospect on
     the defensive)
  2. "Are you the decision maker?" (Offensive, implies they might
     not matter)
  3. "What's your timeline?" (Vague, gets vague answers)
  4. "What are your pain points?" (Generic, sounds like a script)
  5. "Would you be interested in a demo?" (Premature, skips discovery)

  Additionally, write discovery questions for this scenario:

  Prospect: "MarketAnalytics Inc" ($8M ARR, 60 employees)
  Contact: James, Head of Marketing
  Context: They manually create monthly reports in PowerPoint using
  data from 5 different sources. James submitted a form saying
  "Need better reporting."

  Product: DataViz Pro automates data visualization, connects to
  multiple sources, and generates interactive dashboards.

  Tasks:
  1. Rewrite each of the 5 bad questions into effective discovery
     questions. Explain why your version is better.

  2. Write 10 discovery questions for the MarketAnalytics scenario,
     organized into categories: Situation, Problem, Impact, and
     Need-Payoff.

  3. James says: "Just show me a demo." You haven't done any
     discovery yet. How do you redirect to discovery without losing
     the prospect?

  4. What's the ideal talk-to-listen ratio for a discovery call?
     How do you maintain it?

assertions:
  - type: llm_judge
    criteria: "Rewritten questions are open-ended and conversational — transform closed/direct questions into ones that invite the prospect to share context naturally"
    weight: 0.25
    description: "Open-ended question rewrites"
  - type: llm_judge
    criteria: "SPIN-style questions build logically — Situation questions establish context, Problem uncovers pain, Impact quantifies consequences, Need-Payoff connects to solutions"
    weight: 0.25
    description: "Logical SPIN-style progression"
  - type: llm_judge
    criteria: "Demo redirect is tactful — acknowledges the request, explains why a few minutes of discovery will make the demo more relevant, and offers a compromise"
    weight: 0.25
    description: "Tactful demo redirect"
  - type: llm_judge
    criteria: "Talk-to-listen guidance is specific — recommends a ratio (typically 30:70 or 40:60 talk:listen) and provides practical techniques to maintain it"
    weight: 0.25
    description: "Specific talk-listen guidance"
