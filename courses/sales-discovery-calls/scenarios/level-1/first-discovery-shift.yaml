meta:
  id: first-discovery-shift
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Complete a full discovery call simulation combining research, questions, active listening, qualification, and follow-up"
  tags: [sales, discovery, simulation, comprehensive, beginner]

state: {}

trigger: |
  You're a junior SDR at "LogiTrack" (logistics software SaaS, $25M
  ARR). It's your first week handling discovery calls solo. You have
  a call in 30 minutes and need to prepare, execute, and follow up.

  What you know from the CRM:
  - Lead source: Inbound form submission
  - Contact: Mike Torres, Director of Operations
  - Company: "QuickShip Logistics" (3PL company, 120 employees,
    estimated $18M revenue)
  - Form comment: "Our tracking is a mess. Customers are complaining."
  - Website: QuickShip handles last-mile delivery for 200+ e-commerce
    brands. They operate in 12 states. Recently won "Fastest Growing
    3PL" award.
  - LinkedIn: Mike joined 6 months ago from FedEx. Posts about
    "operational excellence" and "customer experience."

  Your product: LogiTrack provides real-time shipment tracking,
  automated customer notifications, route optimization, and delivery
  analytics. Pricing: $2-5 per shipment depending on volume.

  PART 1 — PRE-CALL (15 min before)
  Prepare your research brief, call agenda, and opening questions.

  PART 2 — DISCOVERY CALL
  Here's what happens during the call:

  Mike says: "Thanks for calling. I've got 25 minutes. What do
  you want to cover?"

  After you set the agenda, Mike shares:
  "We're growing fast — 40% year-over-year. But our tracking system
  is from 2018. Customers can't see where their packages are in
  real time. I get 50 support tickets a day just about tracking.
  My team of 8 spends half their time answering 'Where's my package?'
  calls instead of doing actual logistics work."

  When you ask about impact:
  "We lost 2 major accounts last quarter — about $800K combined.
  They went to a competitor with better visibility. My CEO told me
  if we lose one more big account, heads will roll."

  When you ask about decision process:
  "I own the ops budget. For anything under $100K annually, I can
  sign off. Our CTO would need to approve the technical integration.
  I want something live before peak season in October."

  PART 3 — POST-CALL
  Write your CRM notes, follow-up email, and BANT qualification.

  Tasks:
  1. Complete all three parts: pre-call prep, discovery call
     execution (write your side of the conversation), and post-call
     documentation.

  2. Score QuickShip on the BANT framework (1-5 each). What's
     the total score and what does it mean?

  3. What active listening technique would you use after Mike's
     statement about losing $800K in accounts? Write the response.

  4. Design your follow-up email to Mike and a separate internal
     email to your AE manager explaining why this deal matters.

assertions:
  - type: llm_judge
    criteria: "Pre-call prep leverages available research — uses LinkedIn, website, and form data to inform specific questions and shows understanding of 3PL industry context"
    weight: 0.25
    description: "Research-informed preparation"
  - type: llm_judge
    criteria: "Discovery conversation demonstrates learned techniques — uses agenda setting, open-ended questions, active listening, and avoids common mistakes like feature dumping or leading questions"
    weight: 0.25
    description: "Technique application"
  - type: llm_judge
    criteria: "BANT scoring is accurate — scores Budget high (under $100K authority), Authority high (decision maker), Need high (customer churn, CEO pressure), Timeline high (before October peak)"
    weight: 0.25
    description: "Accurate BANT scoring"
  - type: llm_judge
    criteria: "Post-call deliverables are complete and professional — CRM notes are scannable, follow-up email confirms next steps, internal email makes a compelling case for deal priority"
    weight: 0.25
    description: "Complete post-call execution"
