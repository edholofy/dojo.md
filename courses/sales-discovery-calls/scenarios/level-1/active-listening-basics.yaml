meta:
  id: active-listening-basics
  level: 1
  course: sales-discovery-calls
  type: output
  description: "Practice active listening techniques during discovery calls — mirroring, labeling emotions, summarizing, and using silence"
  tags: [sales, active-listening, mirroring, labeling, beginner]

state: {}

trigger: |
  You're an SDR at "InsightCRM" (sales intelligence SaaS). Your
  sales coach is training you on active listening techniques.

  Technique 1: Mirroring
  Repeat the last 1-3 words of what the prospect said as a question.
  This encourages them to elaborate.

  Technique 2: Labeling
  Name the emotion or concern behind what they said.
  Format: "It sounds like..." or "It seems like..."

  Technique 3: Summarizing
  Periodically summarize what you've heard to confirm understanding.
  Format: "So what I'm hearing is..."

  Technique 4: Strategic Silence
  After asking a question or getting an answer, pause for 3-5 seconds.
  Most people will fill the silence with additional detail.

  Practice scenario:
  You're on a discovery call with Lisa, Sales Director at "TechCorp."
  Here's what she says at different points in the call:

  Statement 1: "We've been struggling with our sales forecasting.
  Last quarter we were off by 30%. My CEO was furious."

  Statement 2: "We tried implementing Salesforce but our reps hate
  it. They won't enter data, so the reports are useless."

  Statement 3: "I've been looking at tools for 6 months but honestly,
  I'm overwhelmed by all the options."

  Statement 4: "Our biggest issue is that I don't know which deals
  are real and which are just wishful thinking from my reps."

  Tasks:
  1. For each statement, write the appropriate active listening
     response using the technique indicated:
     - Statement 1: Use Mirroring
     - Statement 2: Use Labeling
     - Statement 3: Use Labeling + Summarizing
     - Statement 4: Use Summarizing

  2. After each response, what follow-up question do you ask?

  3. When would you use Strategic Silence in this conversation?
     Identify 2 moments.

  4. How do you avoid the common trap of jumping to your product's
     solution too early when you hear a pain point?

assertions:
  - type: llm_judge
    criteria: "Mirroring response repeats key words naturally — mirrors the most important phrase (e.g., 'Off by 30%?') to invite elaboration"
    weight: 0.25
    description: "Natural mirroring response"
  - type: llm_judge
    criteria: "Labeling responses name the underlying emotion — identifies frustration, overwhelm, or distrust appropriately for each statement"
    weight: 0.25
    description: "Accurate emotion labeling"
  - type: llm_judge
    criteria: "Follow-up questions deepen the conversation — each follow-up digs into the impact, cause, or consequence of what was shared"
    weight: 0.25
    description: "Deepening follow-up questions"
  - type: llm_judge
    criteria: "Premature solution trap is addressed — recommends completing discovery before positioning product, and offers specific techniques to resist the urge"
    weight: 0.25
    description: "Solution-restraint technique"
