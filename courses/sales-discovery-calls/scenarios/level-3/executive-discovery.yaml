meta:
  id: executive-discovery
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Conduct discovery calls with C-suite executives — adjust language, pace, and question depth for senior decision makers"
  tags: [sales, executive, C-suite, strategic-selling, advanced]

state: {}

trigger: |
  You're a senior AE at "EnterpriseAI" (enterprise AI platform,
  $120M ARR). You've secured a 20-minute discovery call with the
  CEO of "MegaRetail" ($3B revenue, 15,000 employees). This is
  unusual — CEOs rarely take first calls.

  Context:
  - CEO: Patricia Wong, 12 years as CEO, former McKinsey consultant
  - Why she's on the call: She personally reached out after reading
    your company's report on "AI in Retail 2026"
  - Her LinkedIn shows she's spoken at NRF about "customer experience
    transformation" and recently posted about "making data-driven
    decisions faster"
  - MegaRetail just reported flat same-store sales for 3 consecutive
    quarters and activist investors are pushing for digital transformation
  - They have a $10M technology budget allocated for this fiscal year
  - Your typical deal at this size: $500K-$2M annually

  Key differences when selling to executives:
  - They have 20 minutes, not 45. Every question must earn its place.
  - They think in business outcomes, not features or technology.
  - They won't tolerate being "qualified" — they qualify YOU.
  - They expect you to have done your homework.
  - Wrong move: asking "What keeps you up at night?" (cliché)
  - Wrong move: leading with product capabilities.

  Tasks:
  1. Design the 20-minute call structure for Patricia. How do you
     open differently with a CEO vs. a VP or Director? Write the
     first 3 minutes word-for-word.

  2. Write 6 executive-level discovery questions. Each should
     demonstrate industry knowledge, reference their specific
     situation, and invite strategic conversation (not tactical
     Q&A).

  3. Patricia says: "I've seen 10 AI vendors this month. They all
     say the same thing. Why should I keep talking to you?" Write
     your response. You have 60 seconds.

  4. The call goes well and Patricia says: "Have your team talk to
     my Chief Digital Officer." How do you ensure this handoff
     doesn't kill momentum? Design the multi-threading strategy.

assertions:
  - type: llm_judge
    criteria: "CEO call structure respects the executive's time — opens with a brief, relevant insight (not small talk), asks permission for the agenda, and front-loads the most important questions in the first 10 minutes"
    weight: 0.25
    description: "Time-respecting executive structure"
  - type: llm_judge
    criteria: "Questions demonstrate business acumen — reference flat same-store sales, activist pressure, or digital transformation strategy rather than asking generic discovery questions a junior rep would ask"
    weight: 0.25
    description: "Business-acumen questions"
  - type: llm_judge
    criteria: "Differentiation response is concise and unique — doesn't list features, instead offers a specific insight or perspective that's different from what other vendors likely said, within the 60-second constraint"
    weight: 0.25
    description: "Concise differentiation"
  - type: llm_judge
    criteria: "Multi-threading strategy preserves CEO engagement — proposes keeping Patricia informed via executive summary, scheduling a CDO meeting quickly, and creating a reason for Patricia to stay involved in the evaluation"
    weight: 0.25
    description: "Momentum-preserving multi-threading"
