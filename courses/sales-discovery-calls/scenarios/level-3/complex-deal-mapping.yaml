meta:
  id: complex-deal-mapping
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Map complex buying committees during discovery — identify power dynamics, influence networks, and hidden stakeholders"
  tags: [sales, deal-mapping, buying-committee, stakeholder-analysis, advanced]

state: {}

trigger: |
  You're a senior AE at "DataPlatform" (enterprise data management,
  $90M ARR). You're 3 weeks into a $400K deal with "HealthNet"
  (healthcare network, 4,000 employees). You've had 5 discovery
  conversations so far but the deal feels "stuck."

  What you know about the buying committee:

  Stakeholder 1: Dr. Sarah Kim — Chief Medical Information Officer
  Role: Executive sponsor. She initiated the project after a data
  quality issue delayed a clinical trial by 3 months.
  Attitude toward you: Very positive. "This is exactly what we need."
  Power: High (reports to CEO). Controls clinical IT budget.

  Stakeholder 2: James Martinez — VP of IT Infrastructure
  Role: Technical evaluator. Responsible for integration and security.
  Attitude: Skeptical. "We've been burned by vendors who promise
  easy integration. It took us 18 months to implement Epic."
  Power: Medium. Can't approve budget but CAN veto on technical grounds.

  Stakeholder 3: Lisa Park — Director of Procurement
  Role: Leads the RFP process. Manages vendor contracts.
  Attitude: Neutral. "I need to see 3 competitive bids minimum."
  Power: Medium. Controls procurement process and timeline.

  Stakeholder 4: David Chen — CFO
  Role: Final budget approval for anything over $200K.
  Attitude: Unknown. You haven't spoken to him. Sarah says he's
  "focused on cost reduction this year."
  Power: Very high. Can kill the deal.

  Stakeholder 5: Rachel Torres — Data Analyst (end user)
  Role: Would use the platform daily. Influential with Sarah.
  Attitude: Excited. She found your product and recommended it to Sarah.
  Power: Low formal power, but high influence on Sarah.

  Unconfirmed: You heard there's a new Chief Digital Officer starting
  next month who might take over all technology decisions.

  Tasks:
  1. Create a stakeholder map for this deal. For each person, rate
     their influence (1-5), support (1-5), and engagement level.
     Who are your champions, supporters, neutrals, and blockers?

  2. James (VP of IT) is your biggest risk. Design a discovery
     conversation specifically for him that addresses his skepticism
     about integration. Write 6 questions plus your approach.

  3. You haven't reached the CFO (David). Sarah offered to introduce
     you, but should you take it? What are the risks? If yes, design
     the 15-minute CFO conversation. If no, what's your alternative?

  4. The incoming CDO could disrupt everything. What's your strategy
     for managing this unknown variable? How do you protect the deal?

assertions:
  - type: llm_judge
    criteria: "Stakeholder map correctly categorizes roles — identifies Sarah and Rachel as champions, James as a blocker to convert, Lisa as neutral to engage, David as unknown to reach, with accurate influence/support ratings"
    weight: 0.25
    description: "Accurate stakeholder categorization"
  - type: llm_judge
    criteria: "James's discovery addresses skepticism directly — asks about the Epic implementation experience, integration requirements, security concerns, and what success criteria he'd set, showing empathy for past vendor failures"
    weight: 0.25
    description: "Skepticism-addressing discovery"
  - type: llm_judge
    criteria: "CFO strategy is nuanced — considers whether Sarah's introduction helps or hurts (CFO might dismiss as biased), proposes preparation for the CFO meeting focused on cost-reduction framing"
    weight: 0.25
    description: "Nuanced CFO strategy"
  - type: llm_judge
    criteria: "CDO strategy is proactive — proposes accelerating the timeline before CDO arrives, building enough internal consensus to make the project hard to stop, or getting early introductions to the CDO"
    weight: 0.25
    description: "Proactive CDO risk management"
