meta:
  id: deal-velocity-optimization
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Use discovery calls to accelerate deal velocity — identify urgency drivers, create compelling events, and compress evaluation timelines"
  tags: [sales, deal-velocity, urgency, compelling-events, advanced]

state: {}

trigger: |
  You're a senior AE at "AutomateHQ" (business automation platform,
  $65M ARR). Your pipeline review shows 3 deals that are "stuck" —
  discovery went well but nothing is moving. Your VP of Sales wants
  you to use your next discovery touchpoint to create urgency.

  Deal 1: "FoodChain" ($80K deal, 60 days in pipeline, no movement)
  Prospect: COO, Lisa Martinez (restaurant chain, 50 locations)
  Status: Great first discovery call 2 months ago. She said "We
  definitely need this." Since then: 3 emails, 1 voicemail, 1
  "let me check with my team" response.
  What you know: They're opening 10 new locations in Q3 and their
  current manual processes won't scale.

  Deal 2: "InsureTech" ($150K deal, 90 days in pipeline, slow)
  Prospect: VP of Ops, Robert Kim (insurance company, 1,000 emp)
  Status: Completed discovery and demo. Robert said "We love it."
  Then asked for a "pilot." Then asked for references. Then went
  quiet. Each step takes 2-3 weeks.
  What you know: New compliance regulations take effect January 1
  and their current system can't generate required reports.

  Deal 3: "RetailGroup" ($200K deal, 45 days, promising but slow)
  Prospect: CTO, Angela Park (retail conglomerate, 3,000 employees)
  Status: Good engagement but Angela keeps adding stakeholders to
  the evaluation. Started with 3, now at 7. Each new stakeholder
  requires a separate discovery conversation.
  What you know: Their competitor just launched a superior customer
  experience platform, putting competitive pressure on RetailGroup.

  Tasks:
  1. For each deal, identify the "compelling event" — the real or
     potential consequence of NOT buying. Then write the specific
     question or statement you'd use in your next conversation to
     surface that urgency.

  2. Deal 1 has gone dark. Write a "break-up email" or voicemail
     that either reactivates Lisa or gets a clear no. Don't be
     passive-aggressive.

  3. Deal 2 is in "evaluation loop" — endless pilots, references,
     questions. How do you politely compress the timeline by
     connecting the January 1 compliance deadline to their
     evaluation pace?

  4. Deal 3 keeps expanding stakeholders. When does this signal
     genuine thoroughness vs. a stall tactic? What questions do
     you ask Angela to find out, and how do you regain control of
     the process?

assertions:
  - type: llm_judge
    criteria: "Compelling events are specific and real — identifies Q3 expansion for FoodChain, January 1 compliance deadline for InsureTech, and competitive pressure for RetailGroup, not generic urgency tactics"
    weight: 0.25
    description: "Real compelling event identification"
  - type: llm_judge
    criteria: "Break-up email is professional and effective — offers a clear exit, references the original value discussion, suggests a specific next step or acknowledges they may have chosen another path, without guilt-tripping"
    weight: 0.25
    description: "Professional reactivation email"
  - type: llm_judge
    criteria: "Timeline compression connects deadline to action — works backward from January 1 to show implementation, onboarding, and decision time needed, creating natural urgency through math rather than pressure"
    weight: 0.25
    description: "Deadline-driven timeline compression"
  - type: llm_judge
    criteria: "Stakeholder expansion diagnosis is nuanced — asks questions to determine if new stakeholders add real value or signal indecision, and proposes solutions like group presentations or executive alignment meetings"
    weight: 0.25
    description: "Nuanced stakeholder diagnosis"
