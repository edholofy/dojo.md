meta:
  id: value-selling-discovery
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Use discovery to build a business case — connect pain points to financial outcomes, build ROI narratives, and present value in executive language"
  tags: [sales, value-selling, ROI, business-case, advanced]

state: {}

trigger: |
  You're a senior AE at "TalentSuite" (talent management platform,
  $75M ARR, pricing $15-50 per employee per month). Your sales
  methodology emphasizes "selling value, not features." You need
  to build a financial business case during discovery.

  Prospect: "GlobalLogistics" (freight and logistics company, 8,000
  employees, $1.2B revenue, 35% annual employee turnover)

  Discovery findings from 3 calls:
  - HR team of 25 handles all talent processes manually
  - Time-to-hire: 62 days (industry average: 38 days)
  - Cost-per-hire: $8,500 (industry average: $4,700)
  - Employee turnover: 35% (industry average: 22%)
  - Exit interviews cite "no career development" as top reason
  - Annual training budget: $2M but only 40% utilized because
    managers don't assign courses
  - Performance reviews: Annual, paper-based, 60% completion rate
  - HR team spends 30 hours/week on manual data entry
  - 2 compliance fines last year ($150K total) due to incomplete
    employee documentation

  Your product pricing for 8,000 employees:
  Estimated annual contract: $1.4M ($15/emp/month base tier)

  Tasks:
  1. Build the financial business case. Calculate the total cost of
     each problem (time-to-hire, turnover, training waste, compliance,
     manual labor). Show the total annual cost of the status quo.

  2. Calculate the expected ROI of your solution. What assumptions
     do you make? What improvement percentages are realistic vs.
     aspirational? Build a conservative, moderate, and aggressive
     scenario.

  3. Write the "value narrative" — a 2-minute verbal summary you'd
     deliver to the CHRO that connects discovery findings to business
     outcomes. No feature names, only business impact.

  4. The CFO challenges your ROI model: "These numbers look too
     good. What are the risks?" Write your response that's honest
     about limitations while maintaining credibility.

assertions:
  - type: llm_judge
    criteria: "Financial model is thorough with clear math — calculates each cost center (turnover at $8,500 × 35% × 8,000, training waste, compliance fines, manual labor hours) with documented assumptions"
    weight: 0.25
    description: "Thorough financial modeling"
  - type: llm_judge
    criteria: "ROI scenarios are realistic — conservative scenario shows modest improvements (e.g., 10% turnover reduction), moderate shows industry-average improvements, aggressive shows best-case, all with clear justification"
    weight: 0.25
    description: "Realistic ROI scenarios"
  - type: llm_judge
    criteria: "Value narrative speaks executive language — focuses on business outcomes (cost reduction, risk mitigation, employee retention) without mentioning product features, framed as strategic advantage"
    weight: 0.25
    description: "Executive-language value narrative"
  - type: llm_judge
    criteria: "CFO challenge response is credible — acknowledges that ROI models have assumptions, identifies the biggest risk factors (adoption, change management), and offers to validate with a pilot or phased approach"
    weight: 0.25
    description: "Credible CFO challenge response"
