meta:
  id: discovery-coaching
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Coach junior reps on discovery call technique — review call recordings, provide constructive feedback, and build repeatable skill development plans"
  tags: [sales, coaching, management, skill-development, advanced]

state: {}

trigger: |
  You're a Sales Team Lead at "SalesEngine" (sales enablement
  platform, $50M ARR). You manage 4 SDRs and are responsible for
  their discovery call quality. Your VP of Sales wants you to build
  a coaching program based on actual call reviews.

  Rep 1: Alex — "The Enthusiast" (3 months experience)
  Call recording notes:
  - Opened with genuine enthusiasm but spent 5 minutes on rapport
    (talked about prospect's college alma mater for 3 minutes)
  - Asked 18 questions in 25 minutes (too many, no depth)
  - Every question was followed immediately by another question
    before the prospect finished answering
  - Never summarized what he heard
  - Proposed a demo without understanding their decision process
  - Talk ratio: 55:45 (him talking too much despite asking questions)
  Result: Prospect agreed to a demo but ghosted

  Rep 2: Maya — "The Robot" (6 months experience)
  Call recording notes:
  - Opened by reading the agenda word-for-word from a script
  - Asked all the right questions (BANT, SPIN) but in exact textbook
    order, making it feel like a checklist
  - No follow-up questions when prospect gave interesting answers
  - Monotone delivery — no energy variation
  - Perfect talk ratio (42:58) but prospect sounded bored
  - Closed with a next step but it was vague ("I'll follow up")
  Result: Prospect said they'd "think about it"

  Rep 3: Jordan — "The Avoider" (4 months experience)
  Call recording notes:
  - Good opening and rapport
  - Asked broad questions but avoided going deep when prospect
    mentioned uncomfortable topics (budget, competition, timeline)
  - When prospect said "We don't really have a budget," Jordan
    said "That's okay!" and moved on
  - Never asked about the decision maker or process
  - Ended the call without proposing any next step
  - Talk ratio: 30:70 (great listening, but didn't drive anywhere)
  Result: Fun conversation, zero qualification data

  Tasks:
  1. For each rep, write a coaching feedback document that: identifies
     the top 3 issues, explains the impact on deal outcomes, provides
     specific improvement actions, and gives 1 thing they're doing well.

  2. Design a 30-day improvement plan for Jordan (the biggest gap).
     Include weekly milestones, practice exercises, and how you'll
     measure progress.

  3. Create a "Discovery Call Quality Scorecard" with 8-10 criteria
     that you'd use to evaluate any discovery call. Include scoring
     scale and what "good" looks like for each.

  4. How do you balance giving direct feedback with not crushing a
     new rep's confidence? Write the opening 2 minutes of your
     1:1 coaching session with Alex.

assertions:
  - type: llm_judge
    criteria: "Coaching feedback is specific and actionable — identifies exact behaviors (not vague 'improve discovery'), explains business impact (ghosting, no qualification), and provides drill-level improvement actions for each rep"
    weight: 0.25
    description: "Specific actionable feedback"
  - type: llm_judge
    criteria: "Jordan's 30-day plan has progressive milestones — starts with awareness (Week 1: recognize avoidance moments), builds to practice (Week 2: role-play budget conversations), and ends with live application and measurement"
    weight: 0.25
    description: "Progressive coaching plan"
  - type: llm_judge
    criteria: "Quality scorecard covers key dimensions — includes criteria like agenda setting, question quality, active listening, pain discovery depth, qualification completeness, next steps, and talk ratio with clear scoring rubric"
    weight: 0.25
    description: "Comprehensive quality scorecard"
  - type: llm_judge
    criteria: "Coaching session opening builds trust — leads with something Alex did well, asks Alex for self-assessment before giving feedback, and frames coaching as growth rather than criticism"
    weight: 0.25
    description: "Trust-building coaching approach"
