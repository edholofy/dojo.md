meta:
  id: rescue-stalled-discovery
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Rescue discovery calls that go wrong — recover from prospect disengagement, bad questions, technical failures, and hostile responses"
  tags: [sales, recovery, stalled-calls, adaptability, advanced]

state: {}

trigger: |
  You're a senior AE at "SecureVault" (data security platform, $55M
  ARR). You're about to handle 4 discovery calls that each go wrong
  in a different way. Your ability to recover determines the deal.

  Situation 1: "The Wall"
  10 minutes into the call with the CISO of "FinServ Corp," every
  question you ask gets a one-word answer:
  You: "What's driving your search for a new security solution?"
  CISO: "Compliance."
  You: "Can you tell me more about your compliance requirements?"
  CISO: "SOX and PCI."
  You: "How are you handling those requirements today?"
  CISO: "Manually."
  You can tell he's on his phone doing something else.

  Situation 2: "The Ambush"
  You scheduled a discovery call with the VP of IT at "TechCorp."
  When you join the Zoom, there are 6 people on the call — including
  a procurement director and legal counsel. The VP says: "We brought
  the whole team so we only need one meeting. Can you demo now?"

  Situation 3: "The Hostile Prospect"
  You're calling "ManufactureCo" and the IT Director says: "I don't
  know why my boss scheduled this call. We already have a security
  solution and it works fine. I have 15 minutes before my next
  meeting. What do you want?"

  Situation 4: "The Oversharer"
  The prospect at "MediaGroup" (CMO) won't stop talking. She's been
  going for 12 minutes about company history, culture, her career,
  and office renovations. She hasn't mentioned anything related to
  your product. You have 18 minutes left and zero discovery data.

  Tasks:
  1. For each situation, write your recovery strategy. What do you
     say or do in the next 30-60 seconds to get the call back on
     track?

  2. For Situation 2 (the ambush), how do you pivot from a pure
     discovery call to a hybrid discovery-demo format that satisfies
     6 people? Design the modified agenda.

  3. For Situation 3 (hostile prospect), write the full 15-minute
     conversation. Turn this from hostile to curious. What techniques
     do you use to disarm the prospect?

  4. Which of these 4 situations is the hardest to recover from, and
     why? What's the one universal skill that helps in all 4 cases?

assertions:
  - type: llm_judge
    criteria: "Recovery strategies are immediate and specific — provides exact words to say within 30-60 seconds for each situation, not general advice like 'build rapport' but specific pivots and reframes"
    weight: 0.25
    description: "Immediate specific recovery"
  - type: llm_judge
    criteria: "Ambush pivot preserves discovery — modifies the agenda to include both discovery and demo elements, perhaps doing rapid discovery for 10 minutes then showing targeted capabilities, not just caving to the demo request"
    weight: 0.25
    description: "Discovery-preserving ambush pivot"
  - type: llm_judge
    criteria: "Hostile prospect conversation shows disarming technique — starts by validating their satisfaction, asks genuinely curious questions about what's working, and finds a wedge through their own words rather than pushing"
    weight: 0.25
    description: "Effective disarming technique"
  - type: llm_judge
    criteria: "Universal skill identification is insightful — identifies the common thread (likely adaptability, curiosity, or the ability to read and redirect) with specific reasoning"
    weight: 0.25
    description: "Insightful universal skill"
