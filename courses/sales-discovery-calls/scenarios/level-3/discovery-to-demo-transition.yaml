meta:
  id: discovery-to-demo-transition
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Master the transition from discovery to demo — know when discovery is complete, set up a compelling demo, and handle prospects who want to skip discovery"
  tags: [sales, discovery-to-demo, transition, demo-prep, advanced]

state: {}

trigger: |
  You're a senior AE at "ProjectFlow" (project management SaaS,
  $45M ARR). Your conversion rate from discovery to demo is 42%
  (team average is 35%), but your demo-to-close rate is only 15%
  (team average is 25%). Your manager suspects poor discovery is
  setting up bad demos.

  Scenario 1: Discovery complete — good transition
  After a thorough 35-minute discovery with "BuildCorp" (construction
  company, 400 employees), you've learned:
  - They manage 20 active projects simultaneously
  - Current tool (Basecamp) lacks resource allocation and Gantt views
  - VP of Ops needs real-time visibility across all projects
  - Budget approved: $40K/year, decision by end of Q2
  - Key pain: 3 projects went over budget last quarter due to
    resource conflicts no one could see
  - Demo attendees: VP of Ops, 2 Project Managers, IT Director

  Scenario 2: Prospect wants to skip discovery
  "TechStartup" (SaaS company, 80 employees) CEO says on the call:
  "I already know what you do. I watched your demo video. I want
  to see how it handles our specific workflow — portfolio-level
  reporting across 5 product teams."

  Scenario 3: Discovery revealed poor fit
  "SmallAgency" (creative agency, 12 employees) uses your competitor
  and loves it. Their "pain" is actually just curiosity because they
  saw your ad. Budget: "We'd need it to be cheaper than what we pay
  now ($99/month)." Your minimum pricing: $299/month.

  Tasks:
  1. For Scenario 1, write the demo setup email to BuildCorp. It
     should: confirm attendees, preview what you'll show (tied to
     their specific pains), set expectations for the demo format,
     and propose a clear agenda.

  2. For Scenario 2, how do you handle the CEO's request? You need
     SOME discovery. Write a response that respects their knowledge
     while still getting critical information. What 5 questions are
     non-negotiable before a demo?

  3. For Scenario 3, the deal is a bad fit. Write the conversation
     where you gracefully disqualify them without damaging the
     relationship. Include follow-up email.

  4. What's your "discovery completeness checklist"? What 8-10
     questions must be answered before you should EVER schedule
     a demo?

assertions:
  - type: llm_judge
    criteria: "Demo setup email is discovery-driven — references specific BuildCorp pains (resource conflicts, budget overruns, Gantt needs), customizes what will be shown, and sets clear expectations rather than sending a generic demo invite"
    weight: 0.25
    description: "Discovery-driven demo setup"
  - type: llm_judge
    criteria: "Skip-discovery response balances respect with rigor — acknowledges the CEO's research, asks the 5 most critical questions efficiently, and explains how this makes the demo more valuable for them"
    weight: 0.25
    description: "Respectful discovery insistence"
  - type: llm_judge
    criteria: "Disqualification is honest and helpful — explains pricing gap transparently, suggests alternatives that fit their budget, leaves the door open, and doesn't waste anyone's time pretending it could work"
    weight: 0.25
    description: "Honest helpful disqualification"
  - type: llm_judge
    criteria: "Discovery completeness checklist covers fundamentals — includes pain points, decision maker, budget, timeline, evaluation criteria, current solution, success metrics, and stakeholders as minimum requirements"
    weight: 0.25
    description: "Comprehensive completeness checklist"
