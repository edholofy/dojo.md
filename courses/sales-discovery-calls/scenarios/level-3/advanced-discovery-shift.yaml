meta:
  id: advanced-discovery-shift
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Handle an advanced discovery shift with complex scenarios — executive selling, deal recovery, competitive positioning, and multi-stakeholder orchestration"
  tags: [sales, simulation, advanced, comprehensive, shift]

state: {}

trigger: |
  You're a senior AE at "UnifiedPlatform" (enterprise SaaS, $110M
  ARR). You have a challenging day ahead with 3 high-stakes discovery
  situations that test different advanced skills simultaneously.

  Situation 1: The Second Discovery Call
  You had a strong first discovery call with "GlobalBank" ($500K
  potential) 2 weeks ago. The VP of Digital asked for a second
  discovery call — this time with the CTO and Head of Risk. These
  are new stakeholders who weren't on the first call and have
  different priorities.

  What you know from call 1 (VP of Digital, Karen Lee):
  - Need to modernize their customer-facing digital experience
  - Current tech stack is 8+ years old
  - Lost 15% of Gen Z customers to digital-native competitors
  - Budget: $500K approved in principle, pending CTO sign-off
  - Karen is your champion

  The new stakeholders:
  - CTO Michael Rodriguez: Known for being risk-averse. Cancelled
    a vendor mid-implementation last year due to "security concerns."
  - Head of Risk, Patricia Chen: Focused on regulatory compliance.
    GlobalBank is under consent decree from OCC for a previous
    data incident.

  Situation 2: Competitive Bake-Off
  "RetailNation" ($300K deal) is doing a head-to-head evaluation.
  Your competitor (MarketLeader) demoed first and the prospect was
  impressed. The CTO tells you: "MarketLeader showed us their AI
  features and they were incredible. What's your AI story?"

  Your product's AI is newer and less mature than MarketLeader's,
  but your integration capabilities and implementation speed are
  significantly better.

  Situation 3: Discovery for Expansion
  "CurrentClient" (existing $100K customer, using only 1 of your 4
  modules) has a new CHRO who wants to "evaluate whether to expand
  or replace your platform." You need to do discovery with someone
  who already has opinions about your product.

  Tasks:
  1. Design the second discovery call for GlobalBank. How do you
     bring the CTO and Head of Risk up to speed without repeating
     the entire first call? How do you tailor questions for each
     new stakeholder while keeping Karen engaged?

  2. Handle the competitive AI question from RetailNation. How do
     you acknowledge MarketLeader's strength while pivoting to your
     advantages? Write the 2-minute response and follow-up questions.

  3. Design the expansion discovery for CurrentClient. How is this
     different from new-customer discovery? What unique risks and
     opportunities exist when the prospect already knows your product?

  4. Across all 3 situations, what's the common thread that makes
     advanced discovery different from basic discovery?

assertions:
  - type: llm_judge
    criteria: "Second call handles multiple stakeholders elegantly — provides a brief recap without being redundant, asks CTO risk-focused questions, asks Patricia compliance-focused questions, and keeps Karen involved as champion"
    weight: 0.25
    description: "Elegant multi-stakeholder second call"
  - type: llm_judge
    criteria: "Competitive response is honest and strategic — acknowledges MarketLeader's AI without bashing, pivots to integration/implementation advantages, and asks questions to understand what the prospect actually needs AI for"
    weight: 0.25
    description: "Honest strategic competitive handling"
  - type: llm_judge
    criteria: "Expansion discovery leverages existing knowledge — asks about what's working and what's not with current module, explores new CHRO's vision, and identifies both expansion opportunities and retention risks"
    weight: 0.25
    description: "Knowledge-leveraging expansion discovery"
  - type: llm_judge
    criteria: "Advanced vs. basic distinction is insightful — identifies that advanced discovery requires strategic thinking, stakeholder orchestration, competitive awareness, and the ability to adapt frameworks to context rather than following scripts"
    weight: 0.25
    description: "Insightful advancement distinction"
