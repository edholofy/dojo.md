meta:
  id: cross-functional-discovery
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Navigate cross-functional discovery between sales, SE, and customer success — coordinate handoffs, share intelligence, and maintain deal continuity"
  tags: [sales, cross-functional, SE-handoff, customer-success, advanced]

state: {}

trigger: |
  You're a senior AE at "CloudOps" (cloud infrastructure platform,
  $100M ARR). Your sales process involves multiple team members at
  different stages, and poor handoffs are costing your team deals.

  Current deal: "FinTechPro" ($250K annual deal)
  Prospect: VP of Engineering, Chris Park
  Stage: Post-discovery, pre-demo

  Your discovery findings:
  - Currently on AWS with custom Terraform scripts
  - 3 engineers spend 40% of their time on infrastructure management
  - Had 2 major outages last quarter (cost: $300K in lost revenue)
  - Need: Reduce infrastructure complexity, improve uptime, free
    engineers for product work
  - Decision: Chris makes the technical decision, CFO approves budget
  - Timeline: Decision in 6 weeks, implementation before year-end
  - Competitor: Also evaluating Pulumi and HashiCorp

  Handoff recipients:
  1. Sarah (Solutions Engineer): Will run the technical demo. She
     has 50 SEs do this across 100 demos/month. She needs to know
     what to show and what NOT to show.
  2. Mike (Customer Success Manager): If the deal closes, he onboards.
     He needs to understand expectations and success criteria early.
  3. David (Sales Director, your manager): Needs deal intelligence
     for pipeline review and may join the CFO conversation.

  Tasks:
  1. Write the SE handoff brief for Sarah. What must she know about
     FinTechPro to run an effective demo? Include: key pain points,
     technical environment, what to demonstrate, what to avoid, and
     competitive positioning notes.

  2. Write the CS handoff brief for Mike. Even though the deal hasn't
     closed, what should he know now so he can plan onboarding and
     set realistic expectations?

  3. Prepare the pipeline review summary for David. Include:
     deal health assessment, risk factors, competitive threats,
     and what support you need from him (specifically the CFO intro).

  4. Chris (the prospect) says: "I talked to 3 people at your
     company last week and had to explain my situation each time."
     How do you prevent this? Design a system for maintaining
     discovery continuity across your team.

assertions:
  - type: llm_judge
    criteria: "SE brief is demo-ready — includes specific pain points to address, technical environment details, demo scenarios to prepare, competitive landmines to avoid, and the 'don't show' list based on discovery gaps"
    weight: 0.25
    description: "Demo-ready SE brief"
  - type: llm_judge
    criteria: "CS brief enables proactive onboarding — includes success criteria, technical complexity, stakeholder expectations, and potential risk areas so CS can plan implementation before the deal closes"
    weight: 0.25
    description: "Proactive CS handoff"
  - type: llm_judge
    criteria: "Pipeline review is strategic — assesses deal probability, identifies the CFO gap as the biggest risk, proposes specific actions for David, and frames competitive threat with clear next steps"
    weight: 0.25
    description: "Strategic pipeline summary"
  - type: llm_judge
    criteria: "Discovery continuity system is practical — proposes concrete solutions like shared deal briefs, CRM templates, pre-meeting syncs, or a living discovery document that all team members can reference"
    weight: 0.25
    description: "Practical continuity system"
