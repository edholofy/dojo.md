meta:
  id: data-driven-discovery
  level: 3
  course: sales-discovery-calls
  type: output
  description: "Use data and analytics to drive discovery conversations — leverage conversation intelligence, prospect data, and industry benchmarks"
  tags: [sales, data-driven, analytics, conversation-intelligence, advanced]

state: {}

trigger: |
  You're a senior AE at "InsightPlatform" (revenue intelligence SaaS,
  $85M ARR). Your company uses its own product to analyze discovery
  calls. You've been given access to team-wide analytics and your
  personal data to improve your approach.

  Your team's conversation intelligence data (last quarter):

  Team-wide patterns:
  - Deals that closed had 2.3x more "implication" questions in
    discovery than lost deals
  - Prospects who used the word "frustrated" in discovery had
    a 73% close rate vs. 28% for those who didn't
  - Deals where pricing was discussed in the first call closed
    10% more often than those where pricing was avoided
  - Deals with 3+ stakeholders engaged by discovery end closed
    at 2x the rate of single-stakeholder deals
  - The #1 predictor of a deal going dark: prospect says "send
    me more info" in the first call (82% of these never respond)

  Your personal patterns:
  - You use "So what I'm hearing is..." 8 times per call (too much)
  - Your average monologue is 45 seconds (good — team average is 90)
  - You rarely ask about competitive evaluation (only 30% of calls)
  - Your best-performing calls have one thing in common: you ask
    about the prospect's personal stake in the outcome
  - Your worst calls: you skip the summary/recap section

  Upcoming call:
  Prospect: "ScaleRetail" (retail technology company, 500 employees)
  Contact: VP of Sales, Jennifer Walsh
  Context: Jennifer posted on LinkedIn about "struggling to get
  accurate pipeline data." They use HubSpot CRM.

  Tasks:
  1. Using the team data, redesign your discovery call approach.
     What 5 specific changes would you make based on these analytics?

  2. Using your personal data, create a self-improvement plan.
     Address each weakness and protect each strength.

  3. Design the discovery call for Jennifer at ScaleRetail. Use the
     data insights to craft questions that maximize your probability
     of advancing the deal. Write the full question sequence.

  4. How would you present this data to your sales team in a
     15-minute training session? What are the 3 most actionable
     insights, and what role-play exercise would you design?

assertions:
  - type: llm_judge
    criteria: "Data-driven changes are specific — maps each insight to a behavioral change (e.g., 'ask about frustration explicitly,' 'discuss pricing on first call,' 'always multi-thread'), not just acknowledging the data"
    weight: 0.25
    description: "Insight-to-behavior mapping"
  - type: llm_judge
    criteria: "Self-improvement plan addresses personal patterns — reduces over-use of 'So what I'm hearing is,' adds competitive discovery questions, and reinforces the personal-stake question technique"
    weight: 0.25
    description: "Pattern-specific self-improvement"
  - type: llm_judge
    criteria: "Jennifer's call incorporates data insights — includes frustration-surfacing questions, pricing discussion, competitive evaluation, personal stake question, and summary recap, all informed by the analytics"
    weight: 0.25
    description: "Analytics-informed call design"
  - type: llm_judge
    criteria: "Training presentation is engaging and practical — selects the 3 highest-impact insights, presents them with data backing, and designs a role-play that lets reps practice the new behaviors"
    weight: 0.25
    description: "Engaging data-driven training"
