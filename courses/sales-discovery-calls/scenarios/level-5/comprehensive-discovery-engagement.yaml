meta:
  id: comprehensive-discovery-engagement
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Run a comprehensive multi-week engagement covering the full spectrum of discovery excellence — from individual technique to organizational transformation"
  tags: [sales, comprehensive, engagement, multi-session, master]

state: {}

trigger: |
  You're a world-class Sales Transformation Advisor. "OmniCorp"
  (Fortune 500 technology conglomerate, $8B revenue, 40,000
  employees, 500 sales reps across 6 business units) has engaged
  you for a 12-week discovery transformation engagement.

  Background:
  OmniCorp acquired 4 companies in 3 years. Each brought its own
  sales methodology, CRM configuration, and discovery approach.
  The result is chaos: 6 business units with 6 different ways of
  doing discovery, no shared customer intelligence, and cross-sell
  between units is near zero.

  The CEO's vision: "One OmniCorp." A unified customer experience
  regardless of which business unit the customer engages with.

  Business units:
  1. Cloud (150 reps, $3B rev) — Uses MEDDPICC, Salesforce CRM
  2. Security (80 reps, $2B rev) — Uses SPIN, HubSpot CRM
  3. Analytics (100 reps, $1.5B rev) — Uses Challenger, Salesforce
  4. IoT (50 reps, $800M rev) — No methodology, spreadsheets
  5. Services (80 reps, $500M rev) — Uses Sandler, custom CRM
  6. AI/ML (40 reps, $200M rev) — No methodology, startup culture

  Current state metrics:
  - Overall win rate: 19% (ranges from 14% for IoT to 26% for Cloud)
  - Cross-sell rate: 3% (industry leader is 22%)
  - Customer NPS for sales experience: 31 (below industry avg of 45)
  - Average discovery depth score: 4.8/10
  - Reps who completed discovery training this year: 28%

  Engagement constraints:
  - Budget: $8M over 12 months
  - Timeline: Board expects measurable results in 6 months
  - Politics: Each BU head thinks their methodology is best
  - Technology: Migrating to unified CRM takes 18 months (already
    in progress)
  - Culture: Startup (AI/ML) and enterprise (Cloud) cultures clash
  - Union: Services BU has unionized workforce with training
    restrictions

  Tasks:
  1. Design the 12-week engagement plan. Week by week, what do
     you do? Include: diagnostic assessments, stakeholder alignment,
     methodology design, pilot programs, and scaling plan. Account
     for political dynamics between BU heads.

  2. Design "Discovery 2.0" — the unified methodology that works
     across all 6 business units without forcing everyone into the
     same box. How do you create a common framework with BU-specific
     adaptations?

  3. Solve the cross-sell problem. If a Cloud customer also needs
     Security and Analytics, how does discovery intelligence flow
     across BUs? Design the data architecture and process that
     enables cross-sell discovery.

  4. Present your engagement proposal to the CEO and 6 BU heads in
     a single 30-minute meeting. They will resist — each thinks
     their approach is fine. Write the presentation that gets
     unanimous buy-in. Include how you address the unionized
     workforce constraint and the startup culture clash.

assertions:
  - type: llm_judge
    criteria: "12-week plan is politically sophisticated — starts with listening (diagnostic, stakeholder interviews), builds coalition before proposing changes, pilots with willing BUs first, and doesn't force change on resistant units"
    weight: 0.25
    description: "Politically sophisticated plan"
  - type: llm_judge
    criteria: "Unified methodology balances standardization with flexibility — creates a common discovery language and data model while allowing BU-specific question sets, pacing, and depth appropriate to their markets"
    weight: 0.25
    description: "Balanced unified methodology"
  - type: llm_judge
    criteria: "Cross-sell architecture solves data flow — designs a practical system where discovery insights in one BU trigger notifications and hand-offs in others, with clear data structures and ownership rules"
    weight: 0.25
    description: "Practical cross-sell architecture"
  - type: llm_judge
    criteria: "Presentation gets buy-in through shared pain — doesn't lecture BU heads about their failures but shows how unified discovery helps each BU (more cross-sell revenue, better customer NPS, higher win rates), addressing union and culture constraints"
    weight: 0.25
    description: "Shared-pain buy-in strategy"
