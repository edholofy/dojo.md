meta:
  id: revenue-architecture
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Design revenue architecture around discovery — align marketing, sales, CS, and product around a unified discovery-informed customer journey"
  tags: [sales, revenue-architecture, cross-functional, GTM, master]

state: {}

trigger: |
  You're the Chief Revenue Officer at "RevPlatform" ($400M ARR,
  enterprise SaaS). You're redesigning the entire go-to-market
  motion around a "discovery-first" philosophy. Currently,
  marketing, sales, CS, and product operate in silos — each has
  their own view of the customer but they don't share intelligence.

  Current state:
  - Marketing generates 5,000 MQLs/month but only 12% convert to
    SQLs. Marketing doesn't know what sales learns in discovery.
  - Sales runs discovery calls but the insights die in CRM notes
    that no one reads.
  - Customer Success starts every engagement by re-discovering what
    sales already learned. Customers hate repeating themselves.
  - Product builds features based on support tickets and gut
    instinct, not systematic discovery data from sales conversations.

  The vision: "Continuous Discovery" — every customer interaction
  (marketing form, sales call, CS check-in, support ticket) feeds
  into a unified customer intelligence system. Discovery isn't a
  sales stage — it's an organizational capability.

  Revenue architecture components:
  1. Marketing → Sales handoff: What discovery data does marketing
     capture before sales gets the lead?
  2. Sales discovery: How does the methodology capture structured
     data that's useful beyond the individual deal?
  3. Sales → CS handoff: How does discovery intelligence transfer
     to ensure seamless customer experience?
  4. CS → Product feedback: How does ongoing customer discovery
     feed product development?
  5. Product → Marketing: How do product insights inform marketing
     messaging and targeting?

  Your resources:
  - 150 AEs, 80 CSMs, 50 marketers, 200 product/engineering
  - $3M annual budget for RevOps and Enablement
  - Tech stack: Salesforce, Marketo, Gong, Gainsight, Productboard
  - Executive buy-in from CEO and board

  Tasks:
  1. Design the "Continuous Discovery" architecture. Map each
     of the 5 handoff points above with specific data flows,
     required fields, automation, and human touchpoints.

  2. Create the unified "Customer Intelligence Model" — what data
     is captured at each stage, where does it live, who has access,
     and how is it kept current? Design the data schema.

  3. The biggest organizational challenge: getting 4 departments
     to agree on a shared system. Sales says "this is our data."
     Marketing says "you're not using our leads right." CS says
     "sales over-promises." Product says "no one gives us real
     feedback." Design the governance model and alignment process.

  4. Model the financial impact. If MQL-to-SQL conversion improves
     from 12% to 20%, and CS retention improves by 3 points because
     handoffs are better, what's the total revenue impact? Build
     the business case for the board.

assertions:
  - type: llm_judge
    criteria: "Architecture is end-to-end — maps all 5 handoff points with specific data flows, not just sales discovery in isolation, showing how intelligence moves across the entire customer lifecycle"
    weight: 0.25
    description: "End-to-end architecture"
  - type: llm_judge
    criteria: "Customer Intelligence Model is practical — defines specific data fields, storage locations (CRM, Gong, Gainsight), access rules, and update cadences that could actually be implemented"
    weight: 0.25
    description: "Practical intelligence model"
  - type: llm_judge
    criteria: "Governance model addresses real conflicts — creates shared ownership, data access rules, joint KPIs, and escalation paths that handle the inter-departmental tensions described"
    weight: 0.25
    description: "Conflict-addressing governance"
  - type: llm_judge
    criteria: "Financial model is comprehensive — quantifies MQL conversion improvement, retention improvement, and compound effects (better discovery → better product → better marketing → more MQLs), showing total revenue impact"
    weight: 0.25
    description: "Comprehensive financial model"
