meta:
  id: discovery-economics-model
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Model the economics of discovery call investment — optimize resource allocation, predict revenue impact, and build the financial case for discovery excellence"
  tags: [sales, economics, modeling, ROI, optimization, master]

state: {}

trigger: |
  You're the Chief Strategy Officer at "SalesMetrics" (revenue
  intelligence platform, $250M ARR). The board asked you to build
  an economic model that quantifies the financial impact of discovery
  quality on company valuation.

  Company data:
  - 200 AEs, average OTE $200K (50% base, 50% variable)
  - Average 8 discovery calls per AE per week
  - Average 45 minutes per discovery call (including prep)
  - Current win rate: 22%
  - Average deal size: $85K ACV
  - Sales cycle: 75 days
  - Customer LTV: $340K (4-year average retention)
  - CAC: $45K per customer acquired
  - ARR multiple for valuation: 10x

  Conversation intelligence data:
  - AEs who score 8+/10 on discovery quality: 34% win rate
  - AEs who score 5-7/10: 20% win rate
  - AEs who score below 5/10: 11% win rate
  - Correlation between discovery question count and deal size:
    each additional discovery question correlates with $2,800
    increase in ACV
  - Multi-stakeholder discovery: 2.3x higher win rate
  - Pre-call research (30+ min): 43% higher qualification accuracy
  - Calls with pain quantification: 67% higher close rate

  Investment scenarios:
  A) Status quo: No additional investment
  B) $500K: Conversation intelligence platform + basic training
  C) $1.5M: Full discovery transformation (methodology, tools,
     coaching, certification)
  D) $3M: Enterprise-grade program with AI augmentation, dedicated
     enablement team, and custom technology

  Tasks:
  1. Build the financial model. For each investment scenario,
     calculate: expected win rate improvement, revenue impact,
     impact on deal size, impact on sales cycle, and net ROI.
     Model conservatively and aggressively.

  2. Calculate the "cost of a bad discovery call." If a rep runs
     a poor discovery call on a $100K opportunity, what's the
     expected value lost? How does this compound across 200 AEs
     doing 8 calls per week?

  3. Build the discovery quality → company valuation bridge. If
     you improve discovery quality from average 5.5/10 to 7.5/10,
     what's the impact on ARR, and therefore on company valuation
     (at 10x ARR multiple)?

  4. Present the board deck: 5 slides that tell the story from
     "discovery is underinvested" to "here's the return." Include
     the data visualizations you'd create and the narrative arc.

assertions:
  - type: llm_judge
    criteria: "Financial model is rigorous — calculates each scenario with clear assumptions, shows sensitivity analysis, and demonstrates that even conservative improvements in win rate generate significant ROI"
    weight: 0.25
    description: "Rigorous financial modeling"
  - type: llm_judge
    criteria: "Bad discovery cost is quantified compellingly — calculates expected value lost per call, scales to team-wide impact, and shows the cumulative cost of mediocre discovery over a year"
    weight: 0.25
    description: "Compelling cost quantification"
  - type: llm_judge
    criteria: "Valuation bridge is clear — traces from discovery quality improvement → win rate improvement → ARR increase → valuation impact at 10x multiple, showing a direct path from training investment to enterprise value"
    weight: 0.25
    description: "Clear valuation bridge"
  - type: llm_judge
    criteria: "Board deck narrative is compelling — follows a logical arc (problem → data → solution → ROI), uses visualizations appropriate for board audiences, and ends with a clear recommendation"
    weight: 0.25
    description: "Compelling board narrative"
