meta:
  id: discovery-consulting-engagement
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Lead a sales consulting engagement to transform a client's discovery practice — diagnose organizational weaknesses, design custom methodology, and drive adoption"
  tags: [sales, consulting, transformation, methodology, master]

state: {}

trigger: |
  You're a Sales Transformation Consultant hired by "TechVentures"
  (private equity firm, $5B AUM) to fix the discovery process at
  their latest portfolio company, "CloudBridge" (enterprise SaaS,
  $180M ARR, acquired 6 months ago for $900M at 5x ARR).

  TechVentures' mandate: Double CloudBridge's ARR to $360M in 3
  years. The PE firm's operating partner says: "The product is
  great. The sales team is the bottleneck."

  Your diagnostic assessment (first 2 weeks):

  Current CloudBridge sales org:
  - 120 AEs (80 SMB, 30 mid-market, 10 enterprise)
  - Win rate: 18% overall (SMB: 22%, MM: 14%, Enterprise: 8%)
  - Average deal size: $65K (need to increase to $120K)
  - Sales cycle: 90 days average (industry benchmark: 60 days)
  - Discovery call-to-demo ratio: 0.4 (40% of discovery calls
    advance to demo)
  - Rep productivity: $750K ARR per rep (top quartile does $1.5M)

  Discovery-specific findings:
  1. No formal discovery methodology — each rep does their own thing
  2. Average discovery call: 18 minutes (top reps: 32 minutes)
  3. Talk-to-listen ratio: 64:36 across the team
  4. Only 15% of deals have multi-stakeholder discovery
  5. CRM data from discovery is unusable — no standardized fields
  6. No call recording or conversation intelligence
  7. Manager coaching: 2 of 12 managers do regular call reviews
  8. Training: 1 day of discovery training at onboarding, then nothing
  9. Competitive intelligence: ad hoc, no systematic capture
  10. Pre-call research: varies wildly (5 minutes to 60 minutes)

  Market context:
  - 3 competitors with mature enterprise motions
  - CloudBridge's product is technically superior but undersold
  - Customer NPS is 72 (product is loved once implemented)
  - Churn is low (5% annual) — the problem is getting new deals

  Budget: $2M over 18 months for the transformation

  Tasks:
  1. Present your diagnostic findings to the PE operating partner
     and CloudBridge CEO. Frame the discovery gap as the #1 lever
     to hit the $360M target. Build the business case with specific
     revenue projections.

  2. Design the 18-month transformation roadmap. Phase 1 (0-6
     months): Foundation. Phase 2 (6-12 months): Scale. Phase 3
     (12-18 months): Optimize. For each phase, specify: actions,
     investments, expected outcomes, and risk mitigation.

  3. Design the custom discovery methodology for CloudBridge.
     Consider their product, market, buyer personas, deal sizes,
     and growth targets. Don't just apply a textbook framework —
     build something tailored.

  4. How do you handle the resistance you'll inevitably face?
     The top-performing AEs will say "My number is fine, why change?"
     The managers will say "We don't have time for more process."
     The CEO will want results in 90 days. Write your stakeholder
     management plan.

assertions:
  - type: llm_judge
    criteria: "Business case connects discovery to revenue — calculates that improving win rate from 18% to 25% with 120 reps would add $X in ARR, ties discovery improvement to deal size increase, and shows path to $360M"
    weight: 0.25
    description: "Revenue-connected business case"
  - type: llm_judge
    criteria: "18-month roadmap is phased and achievable — Foundation builds infrastructure (tools, methodology, training), Scale drives adoption (coaching, metrics, certification), Optimize fine-tunes (data-driven iteration, advanced skills)"
    weight: 0.25
    description: "Phased achievable roadmap"
  - type: llm_judge
    criteria: "Custom methodology is tailored — adapts frameworks to CloudBridge's specific situation (strong product, weak discovery, need to increase deal size), not just a generic MEDDPICC or SPIN implementation"
    weight: 0.25
    description: "Genuinely tailored methodology"
  - type: llm_judge
    criteria: "Stakeholder management is politically savvy — engages top performers as co-designers, gives managers coaching tools rather than more work, and creates quick wins for the CEO while building long-term change"
    weight: 0.25
    description: "Politically savvy management"
