meta:
  id: discovery-thought-leadership
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Create thought leadership content on discovery excellence — write definitive frameworks, publish research, and present at industry conferences"
  tags: [sales, thought-leadership, research, content, speaking, master]

state: {}

trigger: |
  You're a recognized sales thought leader who literally wrote the
  book on discovery calls. "SalesConf 2026" (the largest B2B sales
  conference, 5,000 attendees) invited you to deliver a 45-minute
  keynote and a 90-minute workshop. The theme is "The Death and
  Rebirth of Discovery."

  Your thesis: The traditional discovery call is obsolete, but
  discovery itself has never been more important. The format must
  evolve, not disappear.

  Your research (compiled from 10,000+ analyzed calls):

  Finding 1: The Question Paradox
  AEs who ask 11-14 questions have the highest win rate, but AEs
  who ask 15+ questions have LOWER win rates than those who ask 8.
  The issue isn't quantity — it's quality and depth.

  Finding 2: The Listening Myth
  Everyone says "listen more." But top performers don't just listen
  — they actively intervene. They interrupt (constructively) 2.3x
  more than average performers. They use tactical silence, mirroring,
  and labeling to guide the conversation.

  Finding 3: The Multi-Stakeholder Imperative
  Buying committees have doubled in size in 5 years. But 72% of
  deals only have 1 stakeholder in discovery. This single variable
  is the #1 predictor of lost enterprise deals.

  Finding 4: The AI Opportunity
  AI can automate 60% of pre-call research and 40% of post-call
  documentation. But reps who use AI for real-time call coaching
  are 15% less effective than those who don't — the distraction
  outweighs the value. The future is AI prep + human conversation.

  Finding 5: The Buyer's Perspective
  Only 23% of buyers say their vendor's discovery call was "valuable."
  The #1 complaint: "They asked questions they should have known
  the answer to." The #2 complaint: "They didn't listen to my
  answers." Buyers want to be taught, not interrogated.

  Tasks:
  1. Write the 45-minute keynote outline. Structure it as a narrative
     that challenges conventional wisdom, presents your 5 findings,
     and proposes a new model. Include specific audience engagement
     points and memorable takeaways.

  2. Design the 90-minute workshop. Attendees should leave with an
     actionable framework they can implement Monday morning. Include:
     exercises, group activities, templates, and a self-assessment.

  3. Write the "Discovery Excellence Manifesto" — a 10-point
     declaration of principles that redefines what great discovery
     looks like. Each point should be provocative, evidence-based,
     and actionable.

  4. How do you turn this conference appearance into lasting impact?
     Design the content strategy: LinkedIn posts, a whitepaper, a
     webinar series, and an online course. How does each piece
     build on the conference material?

assertions:
  - type: llm_judge
    criteria: "Keynote is a compelling narrative — has a strong opening hook, challenges assumptions, builds tension through counterintuitive findings, and delivers a clear new model, not just a data dump"
    weight: 0.25
    description: "Compelling keynote narrative"
  - type: llm_judge
    criteria: "Workshop is truly interactive — includes hands-on exercises (not just lecture), group activities where attendees practice techniques, and a framework/template they take with them"
    weight: 0.25
    description: "Genuinely interactive workshop"
  - type: llm_judge
    criteria: "Manifesto points are provocative and evidence-based — each point challenges a commonly held belief (e.g., 'Stop listening more — start intervening better'), backed by the research findings"
    weight: 0.25
    description: "Provocative evidence-based manifesto"
  - type: llm_judge
    criteria: "Content strategy has a coherent funnel — maps from conference keynote (awareness) → LinkedIn (engagement) → whitepaper (consideration) → webinar (conversion) → course (monetization)"
    weight: 0.25
    description: "Coherent content funnel"
