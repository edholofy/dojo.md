meta:
  id: discovery-psychology-masterclass
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Master the psychology behind effective discovery — understand cognitive biases, influence principles, trust-building neuroscience, and ethical persuasion"
  tags: [sales, psychology, influence, trust, neuroscience, master]

state: {}

trigger: |
  You're a Sales Psychology Researcher and Trainer who consults for
  Fortune 500 sales organizations. A top SaaS company ($500M ARR)
  hired you to create a "Discovery Psychology Masterclass" for their
  150 enterprise AEs.

  Research foundation:
  - Cialdini's 6 Principles of Influence: Reciprocity, Commitment,
    Social Proof, Authority, Liking, Scarcity
  - Kahneman's System 1/System 2 thinking
  - Chris Voss's negotiation psychology (FBI hostage negotiation
    applied to sales)
  - Neuroscience of trust (oxytocin, mirror neurons)
  - Loss aversion (people fear losing $1 more than gaining $1.50)
  - Status quo bias (preference for current state)
  - Dunning-Kruger in purchasing decisions

  Real-world application scenarios:

  Scenario A: The Reluctant Prospect
  A CFO on a discovery call keeps saying "We're fine with what we
  have" despite data showing their current system costs them $500K/
  year in inefficiency. Status quo bias is strong.

  Scenario B: The Committee Paralysis
  A 7-person buying committee can't agree on priorities. Each
  stakeholder anchors to their own department's needs. Social
  dynamics prevent anyone from yielding. Decision is stalled.

  Scenario C: The Price-Anchored Buyer
  The prospect's first question is "How much?" and when you say
  "$200K," they immediately say "That's way too expensive" — even
  though the problem costs them $800K/year. The anchor bias has
  already set in.

  Tasks:
  1. Design the "Discovery Psychology Masterclass" curriculum.
     Organize it into 4 modules: Trust Building, Bias Navigation,
     Influence Ethics, and Emotional Intelligence. For each module,
     list the key concepts, real-world applications, and practice
     exercises.

  2. For each of the 3 scenarios, explain the psychological
     mechanism at play and design the discovery approach that works
     WITH the psychology (not against it). Include specific language
     patterns and techniques.

  3. Write the "Ethical Influence Framework." Where's the line
     between understanding buyer psychology to help them make better
     decisions vs. manipulating them? Provide 5 principles and 5
     red-line examples.

  4. How do you teach experienced AEs about psychology without them
     feeling like they're being psychoanalyzed or taught manipulation?
     Design the workshop delivery approach that makes this material
     feel empowering, not creepy.

assertions:
  - type: llm_judge
    criteria: "Curriculum is psychologically grounded — each module references specific research (Kahneman, Cialdini, Voss), connects theory to sales-specific applications, and includes practice exercises that build real skills"
    weight: 0.25
    description: "Research-grounded curriculum"
  - type: llm_judge
    criteria: "Scenario solutions work with psychology — addresses status quo bias through loss framing, committee paralysis through facilitation/alignment techniques, and price anchoring through value reframing, all with specific scripts"
    weight: 0.25
    description: "Psychology-aligned solutions"
  - type: llm_judge
    criteria: "Ethical framework draws clear lines — distinguishes helping prospects overcome cognitive biases (ethical) from exploiting them (unethical), with concrete examples of each and principles that guide judgment calls"
    weight: 0.25
    description: "Clear ethical framework"
  - type: llm_judge
    criteria: "Workshop design is respectful and empowering — positions psychology knowledge as understanding rather than manipulation, uses self-awareness exercises, and frames techniques as helping buyers make better decisions"
    weight: 0.25
    description: "Respectful empowering design"
