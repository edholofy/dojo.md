meta:
  id: discovery-board-strategy
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Present discovery strategy to the board of directors — connect sales process improvement to company valuation, competitive moat, and long-term growth"
  tags: [sales, board, strategy, valuation, executive, master]

state: {}

trigger: |
  You're the CEO of "SalesForce Pro" (not Salesforce — a $150M ARR
  enterprise sales platform company). You're presenting to your
  board of directors at the quarterly board meeting. The board
  includes: 2 PE partners, 1 independent SaaS operator (former
  CRO of a $1B company), and your co-founder/CTO.

  The board's question: "You're asking for $5M in sales enablement
  investment this year — triple last year's budget. Why?"

  Your thesis: The #1 lever to hit your $300M ARR target in 2 years
  is discovery excellence, and the market is about to bifurcate
  between companies that get this right and those that don't.

  Data you're presenting:

  Internal data:
  - Current ARR: $150M, target: $300M in 24 months
  - Current win rate: 22%, needed: 32% to hit target with current
    pipeline generation capacity
  - Discovery quality score: 5.2/10 average across 120 AEs
  - Top quartile AEs (score 8+): 36% win rate, $180K avg deal
  - Bottom quartile AEs (score <4): 11% win rate, $55K avg deal
  - Fixing discovery quality alone could add $45M-75M in incremental
    ARR based on modeling
  - Current enablement spend: $1.7M (1.1% of ARR — industry average
    is 2.5%)

  Market data:
  - Companies that invest 2.5%+ of ARR in enablement grow 15%
    faster than those below 1.5%
  - Conversation intelligence adoption increased 200% in 2 years
  - 40% of B2B sales orgs now use AI in some part of their process
  - Your top 2 competitors both invested heavily in discovery
    programs last year (public earnings call mentions)

  The $5M investment breakdown:
  - $1.5M: Conversation intelligence platform (Gong enterprise)
  - $1M: Custom discovery methodology development and rollout
  - $800K: AI-augmented research and coaching tools
  - $700K: 3 new enablement headcount
  - $500K: New hire training program redesign
  - $500K: Manager coaching certification program

  Tasks:
  1. Write the board presentation (6 slides). Each slide should have
     a clear headline, supporting data, and a narrative that builds
     toward the $5M ask. Remember: boards want to understand risk,
     return, and how this fits into the growth plan.

  2. The PE partners will ask: "What's the payback period?" and
     "What happens if it doesn't work?" Prepare answers with
     specific financial modeling and risk mitigation strategies.

  3. The independent director (former CRO) will ask: "I've seen
     methodology rollouts fail. What makes yours different?" Prepare
     the answer that shows you've learned from industry failures.

  4. Your CTO co-founder will ask: "Can't we just build this into
     the product instead of spending $5M on process?" Prepare the
     answer that explains why process and technology are complementary,
     not substitutes.

assertions:
  - type: llm_judge
    criteria: "Board presentation builds a logical case — progresses from market context → internal diagnosis → solution → investment → expected returns → risk mitigation, with each slide supporting the next"
    weight: 0.25
    description: "Logical board presentation"
  - type: llm_judge
    criteria: "PE partner answers are financially rigorous — provides specific payback period calculation, scenarios for underperformance, and contractual safeguards or phase gates that limit downside risk"
    weight: 0.25
    description: "Financially rigorous PE answers"
  - type: llm_judge
    criteria: "Methodology failure response is experienced — references common failure modes (no manager buy-in, no enforcement, no measurement) and explains specific countermeasures for each"
    weight: 0.25
    description: "Experienced methodology response"
  - type: llm_judge
    criteria: "CTO response is diplomatically collaborative — acknowledges that technology helps but explains that process, coaching, and behavior change are human problems that software alone can't solve, proposing combined approach"
    weight: 0.25
    description: "Diplomatically collaborative CTO response"
