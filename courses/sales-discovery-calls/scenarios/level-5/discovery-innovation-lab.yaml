meta:
  id: discovery-innovation-lab
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Design next-generation discovery experiences — rethink the discovery call format with AI, async discovery, interactive assessments, and buyer-led processes"
  tags: [sales, innovation, future, technology, buyer-experience, master]

state: {}

trigger: |
  You're the VP of Sales Innovation at "FutureSales" (sales
  technology company, $300M ARR). The CEO has given you a mandate:
  "The traditional discovery call is dying. Buyers don't want to
  be interrogated. Design the future of discovery."

  Market signals:
  - 75% of B2B buyers prefer a rep-free buying experience (Gartner)
  - Buyers complete 70% of their research before talking to sales
  - Average buyer spends only 5-6% of their buying journey with
    any one vendor's sales rep
  - Millennials and Gen Z buyers expect self-service options
  - AI chatbots can qualify leads 24/7
  - Interactive ROI calculators, product tours, and assessments
    can capture discovery data without a live call

  Current discovery model at FutureSales:
  - Traditional: SDR qualifies via call → AE runs discovery call
    → AE runs demo → AE presents proposal
  - Average discovery call: 35 minutes, live, 1:1
  - Problems: Hard to schedule, prospects ghost, data captured
    inconsistently, reps ask the same questions every time

  Concepts to explore:
  1. "Async Discovery" — replace live calls with interactive
     questionnaires, video messages, and self-service assessments
  2. "AI-First Discovery" — AI agent conducts initial discovery
     via chat, escalates to human rep for complex situations
  3. "Buyer-Led Discovery" — give prospects a self-guided journey
     where they reveal their own needs through interactive tools
  4. "Collaborative Discovery" — shared workspace where prospect
     and seller build the business case together in real time
  5. "Continuous Discovery" — ongoing data capture from product
     usage, intent signals, and digital body language

  Tasks:
  1. Design 3 "Next-Gen Discovery" experiences (choose 3 of the 5
     concepts). For each, create: the buyer journey, technology
     requirements, data captured, and how it connects to the rest
     of the sales process.

  2. What role does the human AE play in each model? Are AEs
     eliminated, or do they evolve? Design the "AE of 2030" role
     description that reflects these changes.

  3. Run a risk assessment: What could go wrong with each approach?
     What do buyers lose when discovery becomes automated? When
     is a live human conversation still irreplaceable?

  4. Design a 12-month pilot plan to test one of these models with
     a subset of your customer base. Include: pilot criteria,
     control group, success metrics, and decision criteria for
     scaling vs. killing the experiment.

assertions:
  - type: llm_judge
    criteria: "Next-gen experiences are genuinely innovative — goes beyond 'add a chatbot' to reimagine the buyer journey, with detailed technology requirements and data flows for each model"
    weight: 0.25
    description: "Genuinely innovative designs"
  - type: llm_judge
    criteria: "AE evolution is thoughtful — doesn't predict AE elimination but describes how the role shifts to higher-value activities (strategic consulting, executive relationships, complex negotiations) as routine discovery is automated"
    weight: 0.25
    description: "Thoughtful AE evolution"
  - type: llm_judge
    criteria: "Risk assessment is honest — identifies real risks like loss of human connection, buyer frustration with automation, data quality issues, and identifies specific situations where live discovery remains essential"
    weight: 0.25
    description: "Honest risk assessment"
  - type: llm_judge
    criteria: "Pilot plan is experimentally rigorous — includes clear hypotheses, control groups, sample sizes, success metrics, timeline, and pre-defined go/no-go criteria for scaling"
    weight: 0.25
    description: "Rigorous pilot methodology"
