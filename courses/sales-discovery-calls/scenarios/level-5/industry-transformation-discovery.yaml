meta:
  id: industry-transformation-discovery
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Transform discovery practices for an entire industry vertical — design industry-specific methodologies, train partner ecosystems, and create market-wide standards"
  tags: [sales, industry, transformation, ecosystem, standards, master]

state: {}

trigger: |
  You're the Global Head of Sales Strategy at "HealthTech Platform"
  ($800M ARR, healthcare technology). The healthcare SaaS industry
  has a unique discovery challenge: buying cycles are 12-18 months,
  involve 15-25 stakeholders per deal, regulatory compliance drives
  decisions, and clinical staff (doctors, nurses) have zero tolerance
  for vendor sales calls.

  Your CEO has asked you to "redefine how healthcare SaaS is sold"
  and create a discovery methodology that becomes the industry
  standard — not just for your company, but potentially for the
  entire healthcare SaaS ecosystem.

  Healthcare-specific challenges:
  - Clinicians won't attend vendor calls during clinical hours
  - IT makes technical decisions but physicians have clinical veto
  - Procurement runs formal RFP processes with rigid timelines
  - Compliance (HIPAA, HITRUST, FDA 21 CFR Part 11) adds 3-6
    months to any evaluation
  - Budget cycles are annual and rigid — miss the cycle, wait a year
  - Clinical champions are hard to identify — they're busy saving lives
  - "Evidence-based purchasing" requires clinical validation studies
  - Health system consolidation means your point of contact might
    get absorbed into a larger organization mid-deal

  Your company's current state:
  - 60 enterprise AEs, all selling to health systems
  - Average deal: $1.2M, 14-month sales cycle
  - Win rate: 15% (healthcare industry average: 12%)
  - Discovery calls: average 8 per deal (across stakeholders)
  - Biggest loss reason: "Went with incumbent" (38%)
  - Second: "No decision" (27%)

  Ecosystem:
  - 40 channel partners (consulting firms, system integrators)
  - 200 healthcare SaaS companies in adjacent markets
  - Industry associations: HIMSS, CHIME, AHIMA

  Tasks:
  1. Design the "Healthcare Discovery Methodology" — a complete
     framework built for healthcare's unique buying environment.
     Include: stakeholder mapping template, compliance discovery
     framework, clinical validation conversation guide, and
     procurement navigation playbook.

  2. Address the "clinician availability" problem. Doctors and
     nurses can't (and won't) spend 30 minutes on a vendor call.
     Design an alternative discovery approach for clinical
     stakeholders that respects their time constraints.

  3. Create the partner enablement program. How do you train 40
     channel partners to follow your discovery methodology so the
     customer experience is consistent whether they buy direct or
     through a partner?

  4. Your CEO wants this to become an "industry standard." How do
     you evangelize your methodology through HIMSS and CHIME?
     Design the go-to-market plan for making your discovery
     framework the de facto standard in healthcare SaaS.

assertions:
  - type: llm_judge
    criteria: "Healthcare methodology addresses unique buying patterns — includes compliance-integrated discovery, clinical validation requirements, multi-year budget planning, and procurement RFP navigation rather than just applying generic sales frameworks"
    weight: 0.25
    description: "Healthcare-specific methodology"
  - type: llm_judge
    criteria: "Clinician approach respects time constraints — proposes alternatives like 5-minute micro-surveys, observation-based discovery, clinical champion intermediaries, or evidence-based content that clinicians review on their schedule"
    weight: 0.25
    description: "Time-respecting clinician approach"
  - type: llm_judge
    criteria: "Partner enablement is scalable — provides certification program, templatized tools, quality control mechanisms, and ongoing support that can work across 40 diverse partners"
    weight: 0.25
    description: "Scalable partner enablement"
  - type: llm_judge
    criteria: "Industry standard strategy is credible — leverages conference presentations, published research, open-source frameworks, and association partnerships to build industry adoption"
    weight: 0.25
    description: "Credible standardization strategy"
