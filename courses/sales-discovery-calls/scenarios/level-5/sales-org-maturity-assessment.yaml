meta:
  id: sales-org-maturity-assessment
  level: 5
  course: sales-discovery-calls
  type: output
  description: "Assess and benchmark a sales organization's discovery maturity — build assessment frameworks, diagnose organizational gaps, and create transformation roadmaps"
  tags: [sales, maturity-model, assessment, benchmarking, master]

state: {}

trigger: |
  You're a Sales Strategy Partner at a top consulting firm. You've
  developed a "Discovery Maturity Model" used by 50+ SaaS companies.
  A PE firm asks you to assess 3 of their portfolio companies and
  recommend where to invest in discovery improvement.

  Discovery Maturity Model (5 levels):
  Level 1 — Ad Hoc: No formal discovery process. Each rep does their
  own thing. No tools, no coaching, no measurement.

  Level 2 — Defined: Basic methodology exists (BANT or SPIN). Some
  training at onboarding. CRM has discovery fields but completion
  is optional. Limited coaching.

  Level 3 — Managed: Formal methodology with stage gates. Conversation
  intelligence deployed. Regular coaching cadence. CRM data is
  enforced. Win/loss analysis includes discovery quality.

  Level 4 — Optimized: Data-driven methodology that adapts by
  segment. AI-augmented prep and coaching. Discovery quality is a
  KPI for managers. Continuous improvement through data analysis.

  Level 5 — Transformative: Discovery is an organizational capability.
  Cross-functional intelligence sharing. Buyer experience design.
  Predictive analytics. Discovery insights drive product, marketing,
  and strategy decisions.

  Portfolio Company A: "GrowthSaaS" ($80M ARR, 50 AEs)
  - No formal methodology (each rep has their own approach)
  - Salesforce CRM — discovery fields exist but 30% completion
  - No call recording. Managers coach ad hoc.
  - Win rate: 20%. Pipeline velocity: 85 days.
  - Recent 360 review: "Reps are passionate but inconsistent."
  - PE firm invested 18 months ago. Target: $200M ARR in 3 years.

  Portfolio Company B: "EnterpriseTech" ($250M ARR, 100 AEs)
  - MEDDPICC methodology. Gong deployed 2 years ago.
  - CRM data is enforced — can't advance without completing fields.
  - Managers do weekly call reviews.
  - Win rate: 28%. Pipeline velocity: 65 days.
  - Challenge: Methodology works for enterprise but mid-market
    reps find it too heavy. 40% of revenue comes from mid-market.
  - PE firm invested 3 years ago. Target: IPO readiness.

  Portfolio Company C: "ScaleUp" ($30M ARR, 20 AEs)
  - BANT qualification used. No conversation intelligence.
  - 2 of 4 managers were promoted from top IC roles — great sellers
    but inconsistent coaches.
  - Win rate: 25%. Pipeline velocity: 45 days (short sales cycle).
  - Challenge: Scaling from 20 to 50 AEs in 12 months. Need to
    codify what the founders do intuitively.
  - PE firm invested 6 months ago. Target: Triple ARR in 2 years.

  Tasks:
  1. Score each company on the Discovery Maturity Model (Level 1-5).
     For each, provide the score with detailed justification across
     dimensions: methodology, tools, coaching, data, and culture.

  2. For each company, design a tailored improvement plan that moves
     them 1-2 maturity levels in 12 months. What specific investments
     do they need? How much should they spend?

  3. If the PE firm can only invest in one company's discovery
     improvement, which one generates the highest ROI? Build the
     financial case comparing all 3.

  4. Create the "Discovery Maturity Assessment Toolkit" — a
     standardized questionnaire (20 questions) that any company
     could use to self-assess their discovery maturity. Include
     scoring rubric and interpretation guide.

assertions:
  - type: llm_judge
    criteria: "Maturity scores are accurate and justified — likely scores GrowthSaaS at Level 1-2, EnterpriseTech at Level 3, ScaleUp at Level 2, with dimension-by-dimension reasoning for each"
    weight: 0.25
    description: "Accurately justified scores"
  - type: llm_judge
    criteria: "Improvement plans are tailored to each company — GrowthSaaS needs foundational methodology, EnterpriseTech needs segment-specific adaptation, ScaleUp needs scalable codification of founder intuition"
    weight: 0.25
    description: "Company-tailored plans"
  - type: llm_judge
    criteria: "Investment recommendation is data-backed — compares ROI across all 3 using metrics like potential ARR impact, cost of intervention, time to value, and alignment with growth targets"
    weight: 0.25
    description: "Data-backed investment recommendation"
  - type: llm_judge
    criteria: "Assessment toolkit is comprehensive and usable — 20 questions cover all maturity dimensions, scoring is clear (e.g., 1-5 per question), interpretation guide maps scores to maturity levels with actionable next steps"
    weight: 0.25
    description: "Comprehensive usable toolkit"
