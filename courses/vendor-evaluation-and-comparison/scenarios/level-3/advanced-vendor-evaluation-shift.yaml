meta:
  id: advanced-vendor-evaluation-shift
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Advanced vendor evaluation shift — handle a vendor crisis, procurement ethics challenge, and board presentation simultaneously"
  tags: [shift-simulation, crisis, ethics, board-presentation, advanced]

state: {}

trigger: |
  You're the Chief Procurement Officer at a 1,800-person
  technology company. Today you're facing 3 critical
  situations simultaneously.

  Situation 1 — Vendor Crisis:
  Your critical payroll processing vendor (PayCore) has
  been hit by a ransomware attack. They notified you at
  6am that "some systems are affected" and they're
  "working to restore services." Payroll for 1,800
  employees is due to process in 48 hours. You don't have
  a backup payroll vendor.

  What you know:
  - PayCore's status page shows "Major Incident —
    Investigating"
  - Your CISO says there's a risk your employee data
    (SSNs, bank accounts, salaries) was compromised
  - PayCore won't confirm or deny data breach
  - Your contract requires them to notify you of breaches
    within 24 hours
  - You have employees in 12 states (notification laws
    vary)
  - HR is panicking about payroll — employees expect
    direct deposits Friday
  - Last backup payroll option: manual checks, but you
    haven't done that in 5 years

  Situation 2 — Procurement Ethics Issue:
  A whistleblower report came in through your ethics
  hotline yesterday. A senior buyer on your team allegedly:
  - Accepted 4 trips to vendor conferences (fully paid by
    vendors) without disclosure
  - Awarded 3 contracts to a vendor where his brother-in-
    law is a sales director
  - The contracts total $1.2M and the evaluation
    documentation appears complete, but 2 of the 3
    losing vendors have informally complained about the
    process

  The senior buyer has been with the company for 8 years,
  is well-liked, and manages your most complex vendor
  category (IT infrastructure). Firing him immediately
  would disrupt $15M in active vendor relationships.

  Situation 3 — Board Presentation:
  You have a board meeting tomorrow where you need to
  present the annual vendor management report. The board
  wants to know:
  - Total vendor spend ($68M) and year-over-year trend
  - Vendor risk posture (how exposed are we?)
  - Savings achieved through procurement ($2.1M this year)
  - Key vendor relationship health
  - Recommendation for the vendor management program

  The irony: You were going to present a "strong vendor
  management posture" — but Situations 1 and 2 undermine
  that narrative.

  Task: Address all 3 situations. For the vendor crisis,
  outline immediate actions for the next 48 hours. For the
  ethics issue, recommend an investigation and response
  plan. For the board presentation, advise how to present
  honestly given the current crises.

assertions:
  - type: llm_judge
    criteria: "Response handles the payroll crisis with urgency and structure — prioritizes getting payroll processed (backup plan: manual checks, alternative payroll provider emergency onboarding, extending PayCore's deadline if possible); addresses the data breach concern (engage CISO, prepare breach notification, invoke contract notification clause); establishes a communication cadence with PayCore; the crisis response protects employees (they need to get paid) while managing the cybersecurity risk."
    weight: 0.35
    description: "CrisisResponse"
  - type: llm_judge
    criteria: "Response handles the ethics issue with appropriate seriousness — recommends investigation before action (preserve evidence, review the 3 contracts independently, interview the buyer); addresses the conflict of interest (brother-in-law relationship) and gift policy violations separately; balances due process for the employee with protecting the company; considers the operational risk of removing him immediately vs the legal/ethical risk of leaving him in place; recommends interim measures (restrict his authority during investigation)."
    weight: 0.35
    description: "EthicsInvestigation"
  - type: llm_judge
    criteria: "Response advises honest board communication — recommends transparency about the current crises rather than hiding them; frames the crises as 'proving our vendor management program needs to be stronger, not that it's failed'; includes specific program improvements the crises reveal (business continuity for critical vendors, procurement ethics training, vendor security assessments); the presentation approach builds board confidence through honesty and actionable improvement plans, not through hiding problems."
    weight: 0.30
    description: "HonestBoardPresentation"
