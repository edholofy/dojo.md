meta:
  id: vendor-benchmarking
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor benchmarking — design and execute a vendor benchmarking program to ensure competitive pricing and performance"
  tags: [benchmarking, competitive-analysis, pricing, performance, advanced]

state: {}

trigger: |
  You're the Director of Strategic Sourcing at a 2,000-
  person retail company. The CFO suspects the company is
  overpaying for several major vendor contracts because
  "we've been with the same vendors for years and never
  benchmark." She wants you to build a vendor benchmarking
  program, starting with the 5 largest vendor relationships.

  Top 5 vendor relationships by spend:

  1. CloudHost (cloud infrastructure): $1.8M/year
  - With them for 6 years, annual price increases of 5-8%
  - Currently on a legacy pricing plan
  - Competitors: AWS, Azure, GCP
  - Contract renews in 5 months

  2. DataGuard (cybersecurity managed services): $960K/year
  - With them for 4 years, pricing hasn't been reviewed
  - Bundle: SIEM, endpoint protection, SOC monitoring,
    vulnerability scanning, incident response
  - Competitors: CrowdStrike, Palo Alto, Arctic Wolf
  - Contract renews in 8 months

  3. ShipFast (logistics and fulfillment): $2.4M/year
  - With them for 7 years, pricing based on volume that
    was accurate 4 years ago (volume has 3x since)
  - Per-shipment pricing: $4.50/shipment domestic,
    $12/shipment international
  - Industry average: $3.20 domestic, $9.50 international
  - No contract — month-to-month (rare leverage point)

  4. AdPlatform (digital advertising management): $720K/yr
  - Agency model: 15% of ad spend ($4.8M annual spend)
  - Industry benchmark: 8-12% for companies your size
  - With them for 3 years, good results but expensive
  - Contract renews in 14 months

  5. TalentSearch (recruiting/staffing): $540K/year
  - Contingency model: 22% of first-year salary per hire
  - Made 35 placements last year (avg salary $70K)
  - Industry range: 15-20% for similar roles
  - Relationship-based (CEO knows the founder)
  - No contract, ongoing engagement

  Available benchmarking data sources:
  - Gartner pricing benchmarks (the company has a
    subscription)
  - Industry peer network (you know sourcing directors at
    3 comparable retailers)
  - Recent RFP responses from competitors (for 2 of the
    5 categories)
  - Public pricing pages (for cloud and some SaaS)

  Task: Design the benchmarking methodology, analyze each
  vendor against market rates, quantify the potential
  savings, and create a prioritized action plan for
  renegotiation or competitive bidding.

assertions:
  - type: llm_judge
    criteria: "Response designs a sound benchmarking methodology — establishes how to collect comparable pricing data (Gartner benchmarks, peer comparison, competitive RFPs, public pricing); normalizes for differences (scope, service levels, volumes); uses multiple data points rather than just one source; accounts for total value (not just unit price — includes service quality, switching costs, relationship value); the methodology would produce defensible results that vendors can't easily dismiss."
    weight: 0.35
    description: "BenchmarkingMethodology"
  - type: llm_judge
    criteria: "Response quantifies potential savings for each vendor — calculates the gap between current pricing and market rates (ShipFast: $1.30/shipment domestic overpayment; AdPlatform: 3-7% overcharge on percentage; TalentSearch: 2-7% above market); estimates total annual savings opportunity across all 5 vendors; identifies which vendors have the largest gaps; the analysis is specific enough to use in negotiation (not just 'we're paying too much')."
    weight: 0.35
    description: "SavingsQuantification"
  - type: llm_judge
    criteria: "Response creates a prioritized action plan — sequences vendor negotiations by opportunity size and contract timing (ShipFast is month-to-month with biggest gap = highest priority; CloudHost renews in 5 months = urgent; AdPlatform has time); recommends appropriate strategy for each (competitive bid vs renegotiation vs relationship conversation); acknowledges the CEO-TalentSearch relationship dynamic; considers the cost and risk of actually switching vendors vs just using benchmarks as leverage; the plan is actionable and politically aware."
    weight: 0.30
    description: "PrioritizedActionPlan"
