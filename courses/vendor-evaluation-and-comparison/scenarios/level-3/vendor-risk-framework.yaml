meta:
  id: vendor-risk-framework
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor risk framework — build a comprehensive third-party risk management program for a regulated industry"
  tags: [risk-framework, third-party-risk, compliance, regulated, advanced]

state: {}

trigger: |
  You're the Chief Risk Officer at a 1,200-person regional
  bank. Federal regulators (OCC) have issued a Matter
  Requiring Attention (MRA) citing deficiencies in your
  third-party risk management program. You have 90 days to
  present a remediation plan. The MRA specifically cites:

  1. "Inadequate risk assessment of critical third-party
     relationships"
  2. "No ongoing monitoring program for existing vendors"
  3. "Incomplete business continuity planning for critical
     service providers"
  4. "Insufficient board oversight of third-party risk"

  Current state:
  - 180 active vendor relationships
  - 22 classified as critical (core banking system,
    payment processing, cybersecurity monitoring, cloud
    hosting, loan origination, mobile banking, ATM
    network, card processing, etc.)
  - Third-party spend: $28M annually
  - Current process: Vendors reviewed at onboarding only,
    no ongoing monitoring
  - Last comprehensive vendor risk assessment: 3 years ago
  - Board receives a "vendor summary" annually — 2 pages,
    no risk analysis
  - Recent incidents prompting the MRA:
    * Core banking vendor had a 6-hour outage — bank had
      no BCP for this scenario
    * Cybersecurity vendor was acquired by a foreign
      entity — bank learned from the news, not the vendor
    * Two critical vendors use the same cloud provider —
      concentration risk not identified
    * A fintech partnership vendor's data practices
      violated state privacy laws — bank was liable

  Regulatory guidance you must align to:
  - OCC Bulletin 2023-17 (Third-Party Relationships)
  - FFIEC IT Examination Handbook
  - Bank's existing Enterprise Risk Management framework
  - State banking regulations (operate in 4 states)

  Task: Design the comprehensive third-party risk
  management program that addresses every point in the MRA.
  Include the risk assessment methodology, ongoing
  monitoring framework, board reporting structure, and
  90-day remediation plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a risk assessment methodology aligned with OCC/FFIEC guidance — includes vendor risk tiering (critical, significant, moderate, low) with clear criteria; covers all risk domains (operational, compliance, financial, cybersecurity, strategic, concentration, reputation); establishes due diligence requirements proportional to risk tier; includes inherent risk assessment and residual risk scoring; the methodology would satisfy the OCC's MRA point about inadequate risk assessment."
    weight: 0.35
    description: "RegulatoryAlignedMethodology"
  - type: llm_judge
    criteria: "Response creates a comprehensive ongoing monitoring program — defines monitoring frequency by risk tier (quarterly for critical, semi-annual for significant, annual for others); specifies what to monitor (financial health, cyber posture, compliance status, performance metrics, subcontractor changes, M&A activity); establishes trigger events requiring immediate reassessment; addresses the specific failures cited (foreign acquisition of cyber vendor, concentration risk, vendor BCP testing); the program is systematic, not reactive."
    weight: 0.35
    description: "OngoingMonitoringProgram"
  - type: llm_judge
    criteria: "Response includes board governance and a credible 90-day remediation plan — establishes board-level oversight structure (committee charter, reporting cadence, escalation criteria, board-approved risk appetite for third-party risk); the remediation plan is phased with specific milestones at 30/60/90 days; prioritizes the 22 critical vendors for immediate assessment; is realistic about what can be accomplished in 90 days vs what requires longer-term implementation; would demonstrate to regulators that the bank is taking the MRA seriously."
    weight: 0.30
    description: "GovernanceAndRemediation"
