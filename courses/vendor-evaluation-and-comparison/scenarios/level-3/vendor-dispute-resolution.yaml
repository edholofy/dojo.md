meta:
  id: vendor-dispute-resolution
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor dispute resolution — manage a complex vendor performance dispute with financial and legal implications"
  tags: [dispute, performance, escalation, resolution, advanced]

state: {}

trigger: |
  You're the VP of Operations at an 800-person logistics
  company. You're in a serious dispute with your warehouse
  automation vendor, RoboLogistics, over a $4.5M warehouse
  automation project that has gone badly wrong. Both sides
  believe they're right, and the relationship is
  deteriorating rapidly.

  Project background:
  - Contract: $4.5M fixed-price for full warehouse
    automation (conveyor systems, pick-to-light, WMS
    integration, robotic palletizers)
  - Timeline: 9 months from contract signing to go-live
  - Current status: 14 months in, system is "80% complete"
  - Your company has paid $3.6M (80% of contract value,
    per milestone payments)

  Your perspective (the customer):
  - System was supposed to handle 10,000 orders/day;
    currently peaks at 6,500 before errors occur
  - Integration with your WMS is incomplete — requires
    manual data entry for 30% of orders
  - 3 of 8 robotic palletizers fail daily, requiring
    manual intervention
  - Go-live delayed 5 months and counting
  - You've spent $680K on temporary staff to work around
    system failures
  - Lost 2 major customer contracts ($1.2M annual
    revenue) due to fulfillment delays attributed to
    the automation project
  - Your warehouse manager says the conveyor layout
    doesn't match the approved design

  RoboLogistics' perspective (the vendor):
  - They claim your warehouse floor wasn't level to spec
    (which you dispute — you had it surveyed)
  - They say you changed requirements 4 times during
    implementation (you acknowledge 2 changes, which you
    believe were within scope)
  - They blame WMS integration issues on your WMS vendor,
    not their system
  - They say the 10,000 order/day specification was
    "aspirational" and not a contractual guarantee
  - They've offered to send additional engineers at
    $250/hour to "finish the project"
  - They've hinted at filing a mechanics lien on your
    warehouse

  Contract provisions:
  - Performance guarantees: System shall process "up to
    10,000 orders per day" (ambiguous language)
  - Change orders: Documented changes require mutual
    written agreement
  - Dispute resolution: 30-day negotiation, then
    mediation, then arbitration
  - Liquidated damages: $5,000/day for delays beyond
    30 days of schedule (you haven't invoked this yet)
  - Warranty: 1 year from acceptance (system hasn't been
    accepted)
  - Payment: Milestone-based, final 20% due at acceptance

  Task: Develop a comprehensive dispute resolution
  strategy. Assess the strengths and weaknesses of your
  position, propose a resolution approach, and prepare
  for negotiation including your ideal outcome, realistic
  outcome, and walk-away position.

assertions:
  - type: llm_judge
    criteria: "Response assesses both sides' positions objectively — identifies the strengths of your case (5-month delay, performance shortfall at 6,500 vs 10,000 orders, daily equipment failures, $680K in workaround costs) and weaknesses (ambiguous 'up to' language, acknowledged requirement changes, haven't yet invoked liquidated damages); also fairly assesses the vendor's legitimate points (floor leveling dispute, WMS integration blame); the analysis would prepare you for a realistic negotiation, not just validate your anger."
    weight: 0.35
    description: "ObjectivePositionAssessment"
  - type: llm_judge
    criteria: "Response develops a multi-track resolution strategy — proposes a negotiation approach with specific asks (complete the system to spec, compensation for delays and workaround costs, revised timeline with penalties); prepares for mediation and arbitration if negotiation fails; addresses the mechanics lien threat; considers whether to withhold the remaining $900K payment as leverage; identifies when to involve attorneys; the strategy has escalation paths and doesn't prematurely jump to litigation."
    weight: 0.35
    description: "MultiTrackStrategy"
  - type: llm_judge
    criteria: "Response defines clear negotiation positions — articulates ideal outcome (system completed to spec + partial refund for delays + compensation for losses), realistic outcome (system completed to spec + timeline for remaining work + mutual release of claims beyond a settlement amount), and walk-away position (terminate and seek another vendor, accepting some sunk costs); considers the practical reality that you need the system working regardless of who's right; the positions are pragmatic, not just principled."
    weight: 0.30
    description: "NegotiationPositions"
