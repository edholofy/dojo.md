meta:
  id: global-vendor-evaluation
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Global vendor evaluation — evaluate vendors across multiple countries with different regulatory, cultural, and operational requirements"
  tags: [global, international, regulatory, cultural, advanced]

state: {}

trigger: |
  You're the Global Head of IT at a 3,000-person
  manufacturing company with operations in the US,
  Germany, Japan, Brazil, and India. You're selecting a
  unified ITSM (IT Service Management) platform to replace
  5 different tools currently used across regions. Each
  region has strong preferences and different requirements.

  Current state:
  - US (1,200 employees): ServiceNow, $180K/year, IT team
    loves it but it's expensive
  - Germany (600 employees): OTRS (open source), €25K/year
    support, works council has approved it, strict data
    residency requirements (GDPR + BSI standards)
  - Japan (500 employees): Locally developed tool, free
    but unsupported, Japanese-only UI required
  - Brazil (400 employees): Freshservice, $35K/year,
    needs Portuguese interface, LGPD compliance
  - India (300 employees): Zoho Desk, $15K/year, team
    wants to keep it because it's cheap

  Requirements across all regions:
  - ITIL-aligned service desk
  - Asset management
  - Change management with approval workflows
  - Knowledge base (multi-language)
  - SLA tracking by region
  - Integration with Active Directory + Azure AD
  - Reporting: Global dashboards with regional drill-down

  Region-specific requirements:
  - US: Advanced automation, AI-powered ticket routing
  - Germany: Data must stay in EU, works council must
    approve employee monitoring features, BSI C5 or
    equivalent certification
  - Japan: Full Japanese localization (not just
    translation), local phone support during JST business
    hours
  - Brazil: LGPD-compliant data processing, Portuguese
    interface, local entity for invoicing
  - India: Low cost, mobile-first (field technicians use
    phones not laptops)

  Vendor options:
  1. ServiceNow (expand existing US deployment globally):
     $350K/year, global presence, all features, 3-month
     per-region rollout, EU data center available
  2. Freshservice (expand Brazil deployment): $120K/year,
     good localization, growing enterprise features, EU
     data center, no BSI certification yet
  3. ManageEngine (Zoho enterprise version): $85K/year,
     self-hosted option (solves data residency), less
     polished UI, supports all languages, Indian company
  4. OTRS (commercial version of German tool): $95K/year,
     EU-based company, BSI certified, limited AI features,
     basic mobile

  Budget: $200K/year maximum (CEO mandate to reduce from
  current combined ~$255K)

  Task: Evaluate all 4 options considering global
  requirements, regional constraints, and budget. Address
  the change management challenge of forcing regional
  teams to abandon their preferred tools. Recommend a
  solution with an implementation approach.

assertions:
  - type: llm_judge
    criteria: "Response evaluates vendors against global AND regional requirements — systematically checks each vendor against data residency (Germany/Brazil), localization (Japan/Brazil), certification (Germany BSI), mobile capability (India), and budget constraints; identifies which vendors meet which regional requirements and which have gaps; doesn't just pick the 'most features' vendor but considers feasibility across all regions; the evaluation framework handles the complexity of multi-country requirements."
    weight: 0.35
    description: "GlobalRegionalEvaluation"
  - type: llm_judge
    criteria: "Response addresses the change management challenge realistically — acknowledges that each region will resist losing their preferred tool; proposes strategies for each region (e.g., show Germany that their data concerns are addressed, demonstrate Japanese localization quality, address India's cost concern); considers the works council approval requirement in Germany; plans for training and transition support per region; the approach would minimize resistance while achieving standardization."
    weight: 0.35
    description: "ChangeManagementStrategy"
  - type: llm_judge
    criteria: "Response makes a pragmatic recommendation within budget — works within the $200K budget constraint; considers phased implementation approach; may recommend partial standardization (e.g., most regions on one platform with an exception for Germany or Japan if requirements can't be met); addresses the trade-off between standardization benefits and regional needs; the implementation plan is sequenced by risk and impact; the recommendation is achievable, not aspirational."
    weight: 0.30
    description: "PragmaticRecommendation"
