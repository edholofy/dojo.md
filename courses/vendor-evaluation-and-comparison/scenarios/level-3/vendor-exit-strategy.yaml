meta:
  id: vendor-exit-strategy
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor exit strategy — plan a complex vendor exit from a deeply embedded critical system"
  tags: [exit-strategy, vendor-lock-in, migration, business-continuity, advanced]

state: {}

trigger: |
  You're the COO of a 900-person insurance company. Your
  core policy administration system vendor, InsureTech
  Systems, has been acquired by a competitor's parent
  company. This creates an untenable conflict of interest —
  your competitor will now have visibility into your
  pricing models, policy structures, and customer data.
  You need to exit this vendor relationship, but InsureTech
  is deeply embedded in your operations.

  Current dependency on InsureTech:
  - Core policy administration: All 340,000 active
    policies managed in their system
  - Billing integration: Premium billing, payment
    processing, commission calculations
  - Claims integration: First notice of loss flows through
    InsureTech to your claims system
  - Rating engine: All policy pricing calculations run on
    InsureTech's proprietary engine
  - Agent portal: 2,400 independent agents access your
    products through InsureTech's portal
  - Regulatory reporting: State filing data generated from
    InsureTech
  - Data: 12 years of policy history, 8 years of claims
    history, all in InsureTech's proprietary database
    format
  - Customizations: $3.2M invested in custom modules over
    8 years
  - Staff expertise: 45 employees trained specifically on
    InsureTech

  Contract situation:
  - Current contract: 18 months remaining
  - Termination clause: 12 months notice required, $2M
    early termination fee
  - Data clause: Vendor must provide data export in
    "commercially reasonable format" within 90 days of
    termination
  - No change-of-control termination right (this was an
    oversight)
  - SLA: Guarantees continue through contract end

  Replacement options (preliminary research):
  - Option A: Major vendor (Guidewire) — 18-24 month
    implementation, $8M-$12M
  - Option B: Modern InsurTech platform (Socotra) —
    12-18 month implementation, $4M-$6M, less proven at
    scale
  - Option C: Build in-house — 24-36 months, $15M+,
    full control

  Constraints:
  - Cannot have any gap in policy administration (would
    violate insurance regulations)
  - Must maintain agent access throughout transition
  - Regulatory filings cannot be disrupted
  - Board approved $10M budget for the exit over 3 years
  - State insurance regulators must approve any system
    change

  Task: Develop a comprehensive vendor exit strategy
  covering legal positioning, replacement evaluation,
  migration planning, risk mitigation, and stakeholder
  communication (including regulators and agents).

assertions:
  - type: llm_judge
    criteria: "Response addresses the legal and contractual dimensions — analyzes whether the acquisition triggers any contract provisions (change of control, assignment clauses); recommends legal strategy (negotiate exit terms using the conflict-of-interest leverage even without a formal change-of-control clause); addresses the data export challenge (proprietary format, ensuring complete data transfer); considers the competitive intelligence risk during the remaining 18 months; the legal strategy is practical and protects the company's interests."
    weight: 0.35
    description: "LegalContractualStrategy"
  - type: llm_judge
    criteria: "Response evaluates replacement options thoughtfully — compares Guidewire, Socotra, and build-in-house against the $10M budget and timeline constraints; considers the company's specific needs (340K policies, agent portal, rating engine, regulatory reporting); weighs proven vs modern platforms; identifies which option minimizes risk while staying within budget; the evaluation goes beyond feature comparison to assess migration complexity and organizational readiness."
    weight: 0.35
    description: "ReplacementEvaluation"
  - type: llm_judge
    criteria: "Response creates a credible migration plan — addresses the 'no gap in policy administration' constraint (parallel running, phased migration by product line or state); plans for agent communication and portal transition; includes regulatory notification and approval process; accounts for the 45 employees who need retraining; identifies the highest-risk migration points (rating engine, regulatory reporting); the plan would give the board confidence that the exit won't disrupt operations."
    weight: 0.30
    description: "CredibleMigrationPlan"
