meta:
  id: enterprise-vendor-strategy
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Enterprise vendor strategy — design a company-wide vendor management strategy and governance framework"
  tags: [strategy, governance, enterprise, vendor-management, advanced]

state: {}

trigger: |
  You're the VP of Procurement at a 2,500-person financial
  services company. The CEO has asked you to develop an
  enterprise vendor management strategy after a series of
  problems: a critical vendor went bankrupt without warning,
  two departments independently purchased the same software
  (different pricing), and a compliance audit found 3
  vendors processing customer data without proper contracts.

  Current state:
  - 340 active vendors across the company
  - Total annual vendor spend: $42M
  - No centralized vendor database — each department
    manages their own
  - No standard evaluation process — ranges from formal
    RFP to "someone's friend recommended them"
  - No regular vendor reviews — contracts auto-renew by
    default
  - 15 vendors classified as "critical" (represent $18M
    of spend)
  - Recent incidents:
    * Cloud analytics vendor (DataViz) filed bankruptcy —
      3-week scramble to migrate 800 dashboards
    * Marketing and Sales both bought Tableau licenses —
      Marketing paying $70/user, Sales paying $45/user
    * Compliance found customer PII being processed by 3
      vendors with no DPA (data processing agreement)
    * IT discovered an unsanctioned SaaS tool used by 40
      employees that stored credentials in the vendor's
      cloud

  Regulatory environment:
  - Subject to SEC/FINRA regulations
  - SOX compliance required
  - State privacy laws in 15 operating states
  - OCC guidance on third-party risk management applies

  The CEO's mandate:
  - "I never want to be surprised by a vendor failure
    again"
  - "Every dollar spent on vendors should be tracked and
    optimized"
  - "We need to be audit-ready at all times"
  - Budget for the program: $800K first year (including
    headcount, tools, consulting)

  Task: Design a comprehensive enterprise vendor management
  strategy covering governance structure, vendor tiering
  and lifecycle management, risk assessment framework,
  technology recommendations, and an implementation roadmap.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive governance framework — establishes vendor management office (VMO) with clear roles and authority; creates vendor tiering (critical/strategic/tactical/commodity) with different management rigor per tier; defines policies for vendor selection, onboarding, ongoing management, and offboarding; establishes approval thresholds and escalation paths; addresses the shadow IT/rogue purchasing problem; the governance would prevent the specific incidents described."
    weight: 0.35
    description: "ComprehensiveGovernance"
  - type: llm_judge
    criteria: "Response includes risk management framework appropriate for financial services — addresses third-party risk assessment aligned with OCC/FFIEC guidance; creates risk categories (operational, financial, compliance, cybersecurity, concentration, strategic); establishes ongoing monitoring cadence based on vendor tier; includes business continuity planning for critical vendors; addresses the data processing agreement gap; the framework would satisfy regulators."
    weight: 0.35
    description: "RegulatoryRiskFramework"
  - type: llm_judge
    criteria: "Response provides a realistic implementation roadmap — phases the rollout (quick wins first: vendor inventory, critical vendor assessment; then: governance policies, technology platform; then: full lifecycle management); works within the $800K budget; identifies staffing needs; includes change management for departments that will resist centralization; estimates timeline with milestones; the roadmap acknowledges that transforming 340 vendor relationships takes time."
    weight: 0.30
    description: "RealisticImplementation"
