meta:
  id: cross-functional-evaluation
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Cross-functional evaluation — lead a complex vendor evaluation with competing departmental priorities and organizational politics"
  tags: [cross-functional, stakeholder-management, politics, evaluation, advanced]

state: {}

trigger: |
  You're the Director of Enterprise Applications at a
  1,500-person pharmaceutical company. You're leading the
  evaluation of a new enterprise resource planning (ERP)
  system — the largest technology investment the company
  will make this decade ($5M-$15M depending on vendor).
  Seven departments are involved, and the evaluation has
  become politically charged.

  The political landscape:

  VP of Manufacturing (most vocal stakeholder):
  - Insists on SAP because "that's what pharma companies
    use"
  - His team wrote requirements that only SAP can fully
    meet (suspected of tailoring requirements)
  - Threatens to "do his own thing" if the selection
    doesn't go his way
  - Has the CEO's ear — they golf together

  CFO (budget authority):
  - Favors Oracle Cloud because it integrates with
    existing Oracle financials
  - Concerned about SAP's $12M implementation estimate
  - "We've already invested $3M in Oracle — why throw
    that away?"
  - Controls the budget approval

  VP of R&D:
  - Wants a modern cloud-native platform (like Infor
    CloudSuite)
  - "SAP and Oracle are dinosaurs — we need innovation"
  - R&D has 200 employees with unique requirements (lab
    management, regulatory submissions)
  - Concerned about GxP validation requirements

  Head of Supply Chain:
  - Doesn't care which vendor, just wants "something that
    works for demand planning"
  - Frustrated that current evaluation is "all politics"
  - Only stakeholder focused purely on functionality

  VP of HR:
  - Wants to know if the ERP includes HCM or if they keep
    their current Workday
  - Worried about change management for 1,500 employees
  - "The last system rollout was a disaster — we can't
    repeat that"

  Chief Compliance Officer:
  - FDA 21 CFR Part 11 compliance is non-negotiable
  - GxP validation requirements for manufacturing modules
  - "Whatever you pick, I need to validate it, and that
    adds 6 months and $500K minimum"

  CIO (your boss):
  - Wants you to "make everyone happy" — which is
    impossible
  - Privately told you Oracle is probably the right answer
    but doesn't want to override the VP of Manufacturing
  - Expects you to run a fair process that builds
    consensus

  Vendors shortlisted:
  1. SAP S/4HANA: $10-12M, 18-24 months, best pharma
     industry fit
  2. Oracle Cloud ERP: $6-8M, 12-18 months, integrates
     with existing Oracle
  3. Infor CloudSuite: $5-7M, 12-15 months, modern but
     less pharma-specific

  Task: Design an evaluation process that is defensibly
  fair, manages the political dynamics, addresses each
  stakeholder's legitimate concerns, and produces a
  recommendation the organization can align behind. Include
  how you'd handle the suspected requirement-tailoring and
  the VP of Manufacturing's threats.

assertions:
  - type: llm_judge
    criteria: "Response designs a defensibly fair evaluation process — creates transparent methodology (weighted criteria with stakeholder input on weights, structured demos with standardized scenarios, independent scoring); addresses the requirement-tailoring concern (review requirements with all stakeholders to ensure they're genuine business needs, not vendor-specific); establishes governance rules (how decisions are made, how disagreements are resolved, who has what vote); the process would withstand challenge from any stakeholder."
    weight: 0.35
    description: "DefensiblyFairProcess"
  - type: llm_judge
    criteria: "Response navigates the political dynamics skillfully — addresses each stakeholder's concerns legitimately (Manufacturing's pharma needs, CFO's Oracle investment, R&D's innovation needs, Compliance's validation requirements) without letting politics override the process; handles the VP of Manufacturing's threats constructively (acknowledge his expertise without ceding control); manages the CIO's private preference transparently; creates an environment where the best decision can emerge from the process."
    weight: 0.35
    description: "PoliticalNavigation"
  - type: llm_judge
    criteria: "Response addresses the pharma-specific complexity — recognizes that FDA/GxP compliance significantly constrains the ERP decision; accounts for validation costs and timeline in the TCO comparison; addresses the Workday HCM question (integrate vs replace); considers the change management challenge for 1,500 employees; the evaluation framework accounts for industry-specific requirements that make this more complex than a standard ERP selection."
    weight: 0.30
    description: "IndustrySpecificComplexity"
