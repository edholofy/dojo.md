meta:
  id: multi-vendor-integration
  level: 3
  course: vendor-evaluation-and-comparison
  type: output
  description: "Multi-vendor integration — evaluate and orchestrate a solution requiring multiple vendors to work together"
  tags: [integration, multi-vendor, orchestration, ecosystem, advanced]

state: {}

trigger: |
  You're the CTO at a 700-person healthcare company
  building a new patient engagement platform. No single
  vendor can deliver the entire solution — you need to
  assemble a multi-vendor ecosystem. The challenge is
  ensuring the vendors work together seamlessly while
  maintaining HIPAA compliance across all integrations.

  Required capabilities and vendor options:

  1. Patient Portal (front-end):
  Vendor A1 — PatientFirst: Best UX, modern React-based,
    strong mobile. API-first architecture. No backend
    healthcare logic. $180K/year.
  Vendor A2 — HealthGate: Mature portal, built-in patient
    scheduling, messaging. Legacy UI but deep healthcare
    features. Monolithic architecture with limited APIs.
    $140K/year.

  2. EHR Integration (data layer):
  Vendor B1 — InteropHealth: FHIR-native, connects to
    Epic/Cerner/Athena. Strong API documentation. Startup
    (Series A, 30 employees). $120K/year.
  Vendor B2 — DataBridge Health: HL7v2 + FHIR, broader
    legacy EHR support. Established company (15 years).
    Complex setup but proven. $200K/year.

  3. Telehealth:
  Vendor C1 — VirtualCare: Best video quality, HIPAA
    compliant, embedded SDK. No scheduling — needs portal
    integration. $95K/year.
  Vendor C2 — TeleHealth360: End-to-end telehealth with
    scheduling, video, notes. But uses its own patient
    identity system (doesn't use your master patient
    index). $150K/year.

  4. Patient Messaging (notifications):
  Vendor D1 — HealthComm: HIPAA-compliant SMS, email,
    push. Template-based, easy API. Doesn't support
    two-way messaging. $60K/year.
  Vendor D2 — PatientReach: Full bidirectional messaging,
    sentiment analysis, escalation workflows. Complex
    integration. $110K/year.

  Integration challenges:
  - Patient identity must be consistent across all systems
  - All data flows must be HIPAA-compliant (BAAs required)
  - Single sign-on needed for patients
  - Audit trail must span all vendor boundaries
  - If one vendor has an outage, others must degrade
    gracefully
  - Total budget: $500K/year for all vendor licenses

  Task: Evaluate the vendor combinations, recommend the
  optimal ecosystem, design the integration architecture,
  and identify the risks of a multi-vendor approach. Map
  the data flows and identify where HIPAA compliance is
  most at risk.

assertions:
  - type: llm_judge
    criteria: "Response evaluates vendor combinations systematically — doesn't just pick the 'best' in each category independently; considers how vendors work together (e.g., PatientFirst's API-first architecture pairs better with InteropHealth's FHIR-native approach; TeleHealth360's separate identity system creates integration headaches); evaluates total cost of combinations against $500K budget; identifies which combinations are technically feasible vs which create integration nightmares."
    weight: 0.35
    description: "SystematicCombinationEvaluation"
  - type: llm_judge
    criteria: "Response designs the integration architecture — maps data flows between vendors (patient identity, clinical data, messaging triggers, telehealth sessions); identifies the integration middleware/orchestration layer needed; addresses the cross-vendor concerns (SSO, audit trail, graceful degradation); specifies where APIs connect and what data format is used (FHIR vs proprietary); the architecture diagram or description would help an engineering team actually build the integrations."
    weight: 0.35
    description: "IntegrationArchitecture"
  - type: llm_judge
    criteria: "Response maps HIPAA compliance risks across vendor boundaries — identifies where PHI crosses vendor boundaries (the riskiest points); specifies BAA requirements for each vendor and data flow; addresses the audit trail gap when actions span multiple systems; considers the risk of InteropHealth being a startup handling PHI; identifies the data residency and breach notification coordination challenges of multi-vendor healthcare data processing; the analysis would satisfy a compliance officer."
    weight: 0.30
    description: "HIPAAComplianceMapping"
