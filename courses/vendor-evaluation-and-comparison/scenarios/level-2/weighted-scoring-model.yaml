meta:
  id: weighted-scoring-model
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Weighted scoring model — design and apply a multi-criteria weighted evaluation framework with stakeholder input"
  tags: [weighted-scoring, evaluation-framework, stakeholders, criteria, intermediate]

state: {}

trigger: |
  You're a Project Manager at a 250-person logistics
  company. You're leading the selection of a new warehouse
  management system (WMS) and have 4 vendors in the final
  round. Your evaluation committee has 5 members with
  different priorities, and they can't agree on what matters
  most. You need to create a weighted scoring model that
  balances everyone's input fairly.

  Evaluation committee:
  1. VP of Operations (sponsor): Cares most about
     throughput, accuracy, and scalability
  2. IT Director: Cares about integration with existing
     ERP (SAP), security, and vendor support
  3. Warehouse Manager: Cares about ease of use, training
     time, and mobile/scanner support
  4. CFO: Cares about total cost, ROI timeline, and
     contract flexibility
  5. HR Director: Cares about impact on workforce (will
     it reduce headcount?) and training requirements

  After a facilitation session, you've gathered these
  criteria and each stakeholder's priority rating (1-5):

  Criteria and stakeholder ratings (1=low, 5=critical):
  | Criteria | VP Ops | IT Dir | WH Mgr | CFO | HR Dir |
  |----------|--------|--------|--------|-----|--------|
  | Throughput/Performance | 5 | 3 | 4 | 2 | 1 |
  | Order Accuracy | 5 | 2 | 5 | 3 | 1 |
  | ERP Integration | 3 | 5 | 2 | 2 | 1 |
  | Security/Compliance | 2 | 5 | 1 | 3 | 2 |
  | Ease of Use | 2 | 1 | 5 | 1 | 4 |
  | Mobile/Scanner Support | 3 | 2 | 5 | 1 | 2 |
  | Total Cost (5-yr) | 2 | 2 | 1 | 5 | 3 |
  | Implementation Speed | 3 | 3 | 4 | 4 | 3 |
  | Vendor Stability | 2 | 4 | 1 | 4 | 2 |
  | Scalability | 4 | 3 | 2 | 3 | 1 |

  Vendor evaluation scores (from demos, references, RFPs)
  rated 1-10 by the committee:

  | Criteria | Vendor A | Vendor B | Vendor C | Vendor D |
  |----------|----------|----------|----------|----------|
  | Throughput/Performance | 9 | 7 | 8 | 6 |
  | Order Accuracy | 8 | 9 | 7 | 7 |
  | ERP Integration | 6 | 8 | 9 | 5 |
  | Security/Compliance | 7 | 8 | 9 | 6 |
  | Ease of Use | 5 | 8 | 6 | 9 |
  | Mobile/Scanner Support | 6 | 9 | 7 | 8 |
  | Total Cost (5-yr) | 7 | 6 | 5 | 9 |
  | Implementation Speed | 6 | 7 | 5 | 8 |
  | Vendor Stability | 9 | 7 | 8 | 4 |
  | Scalability | 8 | 6 | 9 | 5 |

  Task: Build the weighted scoring model. Calculate weights
  from stakeholder input, apply them to vendor scores,
  determine the winner, and present the results in a way
  that builds consensus. Also run a sensitivity analysis —
  does the winner change if you adjust the weights?

assertions:
  - type: llm_judge
    criteria: "Response correctly builds the weighted scoring model — derives weights from stakeholder ratings (averaging or aggregating the priority scores across stakeholders); normalizes weights to sum to 100%; applies weights to each vendor's scores; calculates weighted totals; shows the work transparently so stakeholders can verify; the methodology is sound and reproducible."
    weight: 0.35
    description: "CorrectWeightedModel"
  - type: llm_judge
    criteria: "Response includes meaningful sensitivity analysis — tests what happens if different stakeholder perspectives are given more influence (e.g., what if we weight the VP of Ops and CFO perspectives more heavily?); identifies which criteria changes would flip the winner; shows whether the result is robust or fragile; this helps the committee understand how sensitive the decision is to subjective weight choices."
    weight: 0.35
    description: "SensitivityAnalysis"
  - type: llm_judge
    criteria: "Response presents results for consensus-building — acknowledges different stakeholder perspectives rather than dismissing minority views; shows how each stakeholder's priorities influence the outcome; identifies where vendors are close (making the choice subjective) vs clearly differentiated; suggests next steps if the quantitative results don't produce a clear winner; the presentation would help a real committee reach agreement."
    weight: 0.30
    description: "ConsensusPresentation"
