meta:
  id: proof-of-concept-design
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Proof of concept design — structure a vendor POC/pilot to validate claims before committing"
  tags: [poc, pilot, proof-of-concept, validation, intermediate]

state: {}

trigger: |
  You're a Data Engineering Manager at a 300-person
  e-commerce company. You've narrowed your data warehouse
  modernization to 2 vendors after RFP evaluation. Both
  look good on paper, but your CTO wants proof before
  committing to a $500K+ annual investment. She's approved
  a 6-week proof of concept (POC) with both vendors running
  in parallel.

  Current state:
  - Legacy data warehouse: On-premise PostgreSQL, 8TB of
    data, 150+ reports, 12 data pipelines
  - Pain points: Queries over 2TB take 30+ minutes, can't
    handle real-time data, struggles during Black Friday
    (4x normal load), maintenance requires specialized DBA
  - Team: 4 data engineers, 2 data analysts, 1 DBA
  - Key data sources: Shopify (orders), Stripe (payments),
    Zendesk (support), Google Analytics, internal APIs

  Vendor A — SnowVault (cloud data warehouse):
  - Claims: "10x faster queries," "zero maintenance,"
    "unlimited scalability," "native connectors for all
    your sources"
  - POC offering: Free 6-week trial with $5K in compute
    credits, dedicated solutions architect for 20 hours

  Vendor B — DataLake Pro (lakehouse architecture):
  - Claims: "50% cost savings vs traditional warehouses,"
    "real-time and batch in one platform," "ML-ready out
    of the box," "open format — no lock-in"
  - POC offering: Free 6-week trial with $3K in credits,
    self-service setup with documentation, office hours
    2x/week

  Your CTO's requirements for the POC:
  1. Must test with real production data (not sample data)
  2. Must prove query performance improvement
  3. Must demonstrate handling of peak load
  4. Must show total effort to migrate
  5. Must include cost projection at full scale

  Task: Design the POC evaluation plan for both vendors.
  Define the test scenarios, success criteria (with
  specific metrics), evaluation timeline, data subset to
  use, team assignments, and a scoring framework for
  comparing POC results.

assertions:
  - type: llm_judge
    criteria: "Response designs rigorous test scenarios — includes specific, measurable tests (benchmark the same complex queries on both platforms, simulate Black Friday peak load, test real-time ingestion, measure migration effort for a representative subset); defines concrete success criteria with numbers (e.g., query performance < X seconds, handle Y concurrent users, ingest Z events/second); tests the vendor claims specifically rather than running generic benchmarks."
    weight: 0.35
    description: "RigorousTestDesign"
  - type: llm_judge
    criteria: "Response structures the POC for fair comparison — uses the same data subset and queries for both vendors; accounts for the different POC support levels (SnowVault has 20 hours of architect time, DataLake Pro is more self-service); creates a timeline that allows adequate setup and testing; assigns team members with clear roles; identifies what data to migrate for the POC vs leave for later; the design would produce comparable, objective results."
    weight: 0.35
    description: "FairComparisonStructure"
  - type: llm_judge
    criteria: "Response includes practical POC management — addresses common POC pitfalls (vendors optimizing for the test, not testing edge cases, running out of credits before completing tests, team members not having enough time); includes a scoring framework to evaluate POC results objectively; plans for documenting learnings during the POC; considers what happens after the POC (how results translate to a final decision and full migration plan)."
    weight: 0.30
    description: "PracticalPOCManagement"
