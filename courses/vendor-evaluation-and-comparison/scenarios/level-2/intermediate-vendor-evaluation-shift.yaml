meta:
  id: intermediate-vendor-evaluation-shift
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Intermediate vendor evaluation shift — handle escalating vendor evaluation challenges including political pressure and conflicting data"
  tags: [shift-simulation, multi-task, pressure, politics, intermediate]

state: {}

trigger: |
  You're a Senior Procurement Analyst at a 400-person
  manufacturing company. It's a high-pressure week with
  3 vendor-related situations demanding your attention.

  Situation 1 — Political Pressure on Vendor Selection:
  You've completed a rigorous evaluation of 4 IT managed
  services providers. Your analysis clearly shows Vendor B
  (TechServe) as the winner — they scored highest on
  technical capability, references, and value. However,
  the VP of Sales just called you to say that Vendor C
  (NetManage) is owned by his college roommate and he's
  "strongly recommending" NetManage. NetManage scored 3rd
  out of 4 in your evaluation.

  Your scoring summary:
  - Vendor A: 72/100
  - Vendor B (TechServe): 89/100
  - Vendor C (NetManage): 68/100
  - Vendor D: 61/100

  The VP of Sales has influence with the CEO. He says
  NetManage will "give us a great deal" and "I can vouch
  for their quality personally."

  Situation 2 — Contradictory Reference Data:
  You're finalizing the evaluation of 2 payroll vendors.
  Reference checks produced contradictory results:

  PayrollPro references:
  - Reference 1 (similar industry): "Best payroll vendor
    we've ever had. Flawless implementation."
  - Reference 2 (similar size): "Implementation was a
    nightmare. Took 6 months instead of 3. Their support
    is terrible — 2-day response times."
  - Reference 3 (different industry): "Good product,
    average support, fair pricing."

  PayrollPlus references:
  - Reference 1: "Solid vendor, nothing special but
    reliable. No complaints."
  - Reference 2: "Very good. Their support team knows
    payroll compliance inside and out."
  - Reference 3: "We had some issues with their tax
    filing module in multi-state scenarios."

  Your company operates in 8 states. PayrollPro scored
  higher in the RFP evaluation (82 vs 76).

  Situation 3 — Vendor Protest:
  You selected a packaging supplier 2 weeks ago and
  notified the losing vendors. One of the losing vendors
  (PackRight) has filed a formal protest claiming your
  evaluation was "biased and predetermined." They allege:
  - The winning vendor's sales rep had a lunch meeting
    with your Procurement Director before the RFP was
    issued
  - One of the evaluation criteria ("experience with
    automotive packaging") unfairly favored the winner
  - Their lower price should have given them the contract

  You need to respond to the protest. Your evaluation was
  fair — the lunch meeting was a routine industry event,
  the automotive experience criterion was legitimate (you
  are an automotive parts manufacturer), and price was
  only 25% of the evaluation weight.

  Task: Address all 3 situations with specific actions,
  communications, and recommendations.

assertions:
  - type: llm_judge
    criteria: "Response handles the political pressure ethically and pragmatically — doesn't simply cave to the VP's pressure or dismiss it rudely; suggests transparent approaches (invite the VP to review the scoring, offer to let NetManage address specific gaps, document the evaluation methodology); protects the integrity of the procurement process while managing the political relationship; provides a path that the VP and CEO can accept even if it doesn't result in choosing NetManage."
    weight: 0.35
    description: "PoliticalPressureHandling"
  - type: llm_judge
    criteria: "Response navigates the contradictory references thoughtfully — doesn't average the contradictions or dismiss outliers; suggests investigating why Reference 2's experience with PayrollPro was so different (was it a different product version? different scope? different implementation team?); considers the multi-state tax filing concern for PayrollPlus given the company's 8-state operations; recommends specific next steps to resolve the ambiguity (additional references, site visits, implementation team interviews)."
    weight: 0.35
    description: "ContradictoryDataNavigation"
  - type: llm_judge
    criteria: "Response addresses the vendor protest professionally — drafts or outlines a formal response addressing each allegation with facts; documents the legitimate basis for each evaluation criterion; explains the weight given to price vs other factors; takes the protest seriously without being defensive; addresses the lunch meeting perception issue constructively; the response would withstand scrutiny and protect the company from procurement challenges."
    weight: 0.30
    description: "VendorProtestResponse"
