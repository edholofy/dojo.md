meta:
  id: tco-analysis
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Total cost of ownership analysis — build a comprehensive 5-year TCO model comparing vendor solutions"
  tags: [tco, total-cost, financial-model, long-term, intermediate]

state: {}

trigger: |
  You're an IT Director at a 400-person financial services
  company. The CFO has asked you to build a 5-year total
  cost of ownership (TCO) model to compare 2 ERP systems.
  She's tired of "surprise costs" and wants every dollar
  accounted for.

  Context:
  - Current system: Legacy on-premise ERP, 15 years old,
    maintenance contract expires in 8 months
  - Users: 400 today, projected 550 in 5 years (growth
    plan)
  - Current annual spend on legacy ERP: $320K (hosting
    $80K, maintenance $120K, internal IT support 2 FTEs
    $120K)
  - Compliance: SOX, SEC reporting requirements

  Vendor A — CloudERP (SaaS):
  Known costs:
  - License: $150/user/month ($720K/year at 400 users)
  - Implementation: $280K (quoted, fixed price)
  - Data migration: $45K
  - Training: $30K (vendor-led, 3 days for power users)
  - Integration with existing systems: $60K (middleware)

  Likely additional costs (based on your research):
  - Customization: Vendor says "minimal needed" but your
    processes are complex — estimate $80K-$150K
  - Additional modules for SOX compliance: $25/user/month
  - API calls above free tier: ~$500/month based on volume
  - Premium support: $3,000/month (needed for compliance)
  - Annual price escalation: Contract allows up to 7%
  - Internal IT support: Still need 1 FTE ($60K)
  - Change management/productivity loss during transition:
    Estimate 15% productivity drop for 3 months across 400
    employees (average salary $75K)

  Vendor B — FlexERP (Hybrid — on-premise + cloud):
  Known costs:
  - License: $500K perpetual + $100K/year maintenance
  - Implementation: $350K-$450K (T&M, estimated)
  - Data migration: $65K
  - Training: $50K (mix of vendor and internal)
  - Integration: $40K (native connectors available)

  Likely additional costs:
  - Hardware refresh (year 3): $80K
  - Database licensing: $45K/year
  - Customization: More flexible but estimate $50K-$80K
  - Internal IT support: Need 2 FTEs ($120K)
  - Annual maintenance escalation: 3% per year
  - Hosting/infrastructure: $60K/year
  - Disaster recovery setup: $25K initial + $10K/year
  - Change management: Same productivity impact

  Task: Build the 5-year TCO model for both vendors. Show
  year-by-year costs, account for growth (users increasing
  to 550), identify which costs are certain vs estimated,
  and present a clear comparison with your recommendation.

assertions:
  - type: llm_judge
    criteria: "Response builds a comprehensive year-by-year TCO model — includes all cost categories (licensing, implementation, migration, training, customization, support, infrastructure, personnel, hidden costs); accounts for growth from 400 to 550 users over 5 years; applies escalation rates; includes one-time vs recurring costs properly; the math is reasonable and the model structure would be reusable for other vendor comparisons."
    weight: 0.35
    description: "ComprehensiveTCOModel"
  - type: llm_judge
    criteria: "Response distinguishes certain costs from estimates — clearly marks which costs are contractual/fixed vs estimated/variable; uses ranges where appropriate; identifies the biggest cost uncertainty drivers (customization scope, price escalation, user growth rate); includes the often-forgotten productivity loss cost during transition; the analysis helps the CFO understand where financial risk lies."
    weight: 0.35
    description: "CostCertaintyAnalysis"
  - type: llm_judge
    criteria: "Response makes a nuanced recommendation — compares cumulative 5-year TCO including all hidden costs; considers the SaaS vs perpetual license trade-off (SaaS has lower upfront but higher ongoing; perpetual has higher upfront but may be cheaper long-term); factors in strategic considerations beyond raw cost (flexibility, scalability, compliance, risk); the recommendation acknowledges that cheapest isn't always best for a regulated financial services company."
    weight: 0.30
    description: "NuancedRecommendation"
