meta:
  id: vendor-transition-plan
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor transition plan — create a structured plan for switching from one vendor to another with minimal disruption"
  tags: [transition, migration, vendor-switch, planning, intermediate]

state: {}

trigger: |
  You're the Head of Customer Success at a 200-person
  SaaS company. After evaluating alternatives, you've
  decided to switch your customer support platform from
  TicketMaster (current) to SupportNow (new vendor). The
  transition needs to happen without impacting your
  customers — you handle 800 tickets/day and can't afford
  downtime.

  Current state (TicketMaster):
  - 3 years of ticket history (450,000 tickets)
  - 25 support agents using the platform daily
  - 15 custom automation workflows (auto-routing, SLA
    alerts, escalation rules)
  - Integrations: Salesforce CRM (bi-directional), Slack
    (notifications), Jira (bug tracking), knowledge base
    (internal)
  - Customer-facing: Self-service portal with 200+ help
    articles, ticket submission form embedded on website
  - SLA tracking: 3 SLA tiers based on customer plan
  - Reporting: 12 custom dashboards, weekly executive
    report auto-generated
  - Contract: TicketMaster contract ends in 90 days,
    month-to-month after that

  New vendor (SupportNow) capabilities:
  - Can import ticket history via CSV or API
  - Has Salesforce and Slack integrations (native)
  - Jira integration available via marketplace add-on
  - Supports automation workflows but uses different logic
  - Knowledge base migration: Can import HTML/Markdown
  - Training: 2-day on-site training included
  - Implementation support: Dedicated project manager for
    60 days

  Key risks:
  - Agents will resist change (they know TicketMaster well)
  - Customer-facing portal URLs will change (SEO impact)
  - Automation workflows need to be rebuilt, not migrated
  - Historical reporting continuity during transition
  - Risk of dropped tickets during cutover

  Task: Create a detailed transition plan covering timeline,
  workstreams, risk mitigation, rollback procedures, and
  communication plans for both internal teams and customers.

assertions:
  - type: llm_judge
    criteria: "Response creates a phased transition plan — includes distinct phases (preparation/setup, parallel run, cutover, post-migration validation, decommission); the timeline is realistic given the 90-day contract window and 60 days of vendor support; identifies workstreams (data migration, integration setup, workflow rebuild, training, testing); assigns ownership for each workstream; includes specific milestones and go/no-go decision points."
    weight: 0.35
    description: "PhasedTransitionPlan"
  - type: llm_judge
    criteria: "Response addresses each identified risk with specific mitigation — plans for agent resistance (early involvement, training, champion users); customer-facing URL changes (redirects, communication); workflow rebuild (document current workflows first, prioritize critical automations); reporting continuity (maintain access to TicketMaster data during transition); dropped tickets (parallel run period, ticket reconciliation checks); includes a rollback plan if the cutover fails."
    weight: 0.35
    description: "RiskMitigationPlanning"
  - type: llm_judge
    criteria: "Response includes communication plans for stakeholders — internal communications (agent training schedule, feedback channels, go-live preparation); customer communications (advance notice of portal changes, updated help articles, temporary support for transition period); executive updates (status reporting, escalation paths); the communication plan would prevent the transition from surprising anyone and would maintain trust with customers."
    weight: 0.30
    description: "StakeholderCommunication"
