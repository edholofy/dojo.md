meta:
  id: multi-stakeholder-rfp
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Multi-stakeholder RFP — design an RFP process that captures diverse stakeholder needs and produces comparable vendor responses"
  tags: [rfp, stakeholders, requirements, process-design, intermediate]

state: {}

trigger: |
  You're a Business Analyst at a 350-person insurance
  company. You've been asked to lead the RFP process for
  a new claims management system. The challenge: you have
  6 stakeholder groups with different (sometimes
  conflicting) priorities, and the last RFP the company
  issued (2 years ago for an HR system) was a disaster —
  vendors complained the requirements were contradictory,
  and the evaluation took 5 months because nobody could
  agree on criteria.

  Stakeholder groups and their stated priorities:

  1. Claims Adjusters (25 people):
  - "We need it to be fast — the current system takes 8
    clicks to open a claim"
  - "Mobile access is essential — we're in the field 50%
    of the time"
  - "Stop making us re-enter data that's already in the
    system"
  - Priority: Speed, mobile, usability

  2. Claims Managers (5 people):
  - "I need real-time dashboards showing claim status,
    cycle times, and adjuster workloads"
  - "Automated assignment rules based on claim type and
    adjuster expertise"
  - "Exception alerts when claims exceed authority limits"
  - Priority: Visibility, automation, controls

  3. IT Department (8 people):
  - "Must integrate with our PolicyCenter (Guidewire) and
    billing system"
  - "Cloud-hosted, SOC 2 Type II minimum"
  - "Open API for custom integrations"
  - "We don't want to maintain another on-premise server"
  - Priority: Integration, security, low maintenance

  4. Compliance & Legal (3 people):
  - "Complete audit trail for every claim action"
  - "Configurable workflows that enforce regulatory
    requirements by state"
  - "Document retention policies — we're in 12 states
    with different rules"
  - Priority: Audit trail, regulatory compliance

  5. Finance (CFO + controller):
  - "Reserve tracking and reporting"
  - "Total cost under $400K/year including implementation"
  - "3-year ROI must be positive"
  - Priority: Cost, financial reporting

  6. Executive team (CEO + COO):
  - "Whatever we pick has to last 10 years"
  - "Need analytics to identify fraud patterns"
  - "Must support our growth plan (acquiring 2 agencies
    next year)"
  - Priority: Longevity, analytics, scalability

  Task: Design the RFP document structure, write the key
  sections (requirements organized by category, evaluation
  criteria with weights, vendor response format), and
  create a process timeline that will produce a decision
  within 10 weeks. Address the conflicting priorities.

assertions:
  - type: llm_judge
    criteria: "Response designs a well-structured RFP — organizes requirements into logical categories that map to stakeholder needs without duplication; distinguishes mandatory requirements from nice-to-haves; resolves conflicting priorities transparently (e.g., CFO's cost constraint vs executives' 10-year longevity); creates a vendor response format that enables apples-to-apples comparison; the RFP would attract quality vendor responses, not generic proposals."
    weight: 0.35
    description: "WellStructuredRFP"
  - type: llm_judge
    criteria: "Response creates evaluation criteria that balance stakeholder interests — assigns weights that reflect business priorities (not just averaging everyone's preferences); explains how weights were determined; groups criteria logically (functional, technical, financial, vendor viability); includes scoring methodology that multiple evaluators can apply consistently; addresses how to handle the adjusters' usability concerns alongside compliance's audit requirements."
    weight: 0.35
    description: "BalancedEvaluationCriteria"
  - type: llm_judge
    criteria: "Response includes a realistic 10-week process timeline — covers RFP drafting, stakeholder review, vendor Q&A period, evaluation period, shortlist demos, reference checks, and decision; assigns roles (who evaluates what based on expertise); builds in stakeholder alignment checkpoints to avoid the 5-month evaluation problem; includes governance for resolving disagreements; the process would actually produce a decision within the timeframe."
    weight: 0.30
    description: "RealisticProcessTimeline"
