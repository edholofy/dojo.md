meta:
  id: security-assessment
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Security assessment — evaluate vendor security posture for handling sensitive data"
  tags: [security, compliance, data-protection, assessment, intermediate]

state: {}

trigger: |
  You're an Information Security Manager at a 450-person
  fintech company. You need to evaluate the security
  posture of a vendor (DataAnalytics Inc.) that will
  process customer financial data for your fraud detection
  system. The vendor will have access to transaction
  records, account numbers (masked), and behavioral
  patterns for 2 million customers.

  Vendor's security questionnaire responses:

  Infrastructure:
  - Hosting: AWS us-east-1, single region
  - Encryption at rest: AES-256
  - Encryption in transit: TLS 1.2+
  - Network: VPC with security groups, no WAF mentioned
  - Backup: Daily automated, 30-day retention, same region
  - DR: "We can restore from backup within 24 hours"

  Access Controls:
  - Authentication: Username/password for admin portal,
    MFA "available but not required"
  - Authorization: Role-based access control with 3 roles
    (admin, analyst, viewer)
  - Employee access: "Approximately 15 engineers have
    production database access"
  - Access reviews: "Performed as needed"
  - Privileged access: "Senior engineers have root access
    to production servers"

  Compliance & Certifications:
  - SOC 2 Type I (completed 6 months ago, Type II
    "planned for next year")
  - No PCI-DSS certification
  - No ISO 27001
  - Privacy policy: "We follow industry best practices"
  - Data retention: "Customer data retained for the
    duration of the contract plus 2 years"

  Incident Response:
  - Incident response plan: "Yes, documented"
  - Last security incident: "Minor unauthorized access
    attempt 8 months ago, blocked by firewall"
  - Breach notification: "Within 72 hours as required by
    applicable law"
  - Penetration testing: "Last performed 18 months ago by
    internal team"

  Vendor's team:
  - No dedicated CISO (CTO handles security)
  - 2 security engineers (out of 60 total employees)
  - Security training: "Annual security awareness training
    for all employees"

  Subprocessors:
  - Uses 3 third-party tools for data processing (not
    named in questionnaire)
  - "Subprocessors are bound by our terms of service"

  Your company's requirements:
  - SOC 2 Type II or equivalent
  - Data must be encrypted at rest and in transit
  - MFA required for all access to customer data
  - Annual penetration testing by independent third party
  - Breach notification within 24 hours
  - Data residency: US only
  - Right to audit

  Task: Evaluate the vendor's security posture, identify
  gaps between their current state and your requirements,
  assess the risk level of each gap, and recommend whether
  to proceed (with conditions) or reject the vendor.

assertions:
  - type: llm_judge
    criteria: "Response identifies all significant security gaps — MFA not required (critical gap for financial data access); SOC 2 Type I only, no Type II (audit gap); no PCI-DSS for financial data processing; 15 engineers with production access + root access (excessive privilege); penetration testing 18 months ago by internal team (inadequate); single-region deployment (DR risk); access reviews 'as needed' not scheduled; no WAF; subprocessors unnamed; the analysis is thorough and prioritizes gaps by severity."
    weight: 0.35
    description: "SecurityGapIdentification"
  - type: llm_judge
    criteria: "Response assesses risk levels appropriately — classifies gaps as critical (MFA, excessive access), high (no independent pen testing, single region DR), medium (SOC 2 Type I vs II, unnamed subprocessors), or low; explains the actual risk each gap creates for the fintech company's customer data; connects gaps to potential regulatory exposure (financial data regulations); the risk assessment helps decision-makers understand what could actually go wrong."
    weight: 0.35
    description: "RiskAssessment"
  - type: llm_judge
    criteria: "Response makes a clear recommendation with specific conditions — if recommending conditional approval, specifies exact remediation requirements with timelines (e.g., MFA within 30 days, independent pen test within 60 days, SOC 2 Type II within 12 months); if recommending rejection, explains which gaps are non-negotiable; includes contractual protections to add (right to audit, enhanced breach notification, data processing agreement); the recommendation is actionable, not just 'more work needed.'"
    weight: 0.30
    description: "ActionableRecommendation"
