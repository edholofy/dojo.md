meta:
  id: vendor-consolidation
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor consolidation — evaluate opportunities to reduce vendor count and streamline procurement"
  tags: [consolidation, vendor-management, cost-reduction, efficiency, intermediate]

state: {}

trigger: |
  You're the Director of Operations at a 500-person
  professional services firm. The CFO has tasked you with
  reducing the company's vendor count. An audit revealed
  the firm has 47 active software vendors, many with
  overlapping functionality. The CFO wants you to develop
  a consolidation plan that reduces costs and complexity
  without disrupting operations.

  Current vendor landscape (key overlaps identified):

  Category 1 — Communication & Collaboration:
  - Slack ($12/user/month, 500 users) = $72K/year
  - Microsoft Teams (included in M365 license, $36/user/
    month for full suite, 500 users) = $216K/year
  - Zoom ($20/user/month, 200 meeting hosts) = $48K/year
  - Usage data: 60% of employees use Slack daily, 40% use
    Teams, 80% use Zoom for external meetings

  Category 2 — Project Management:
  - Asana ($25/user/month, 150 users) = $45K/year
  - Monday.com ($20/user/month, 120 users) = $28.8K/year
  - Jira ($8/user/month, 80 users, engineering only) =
    $7.7K/year
  - Smartsheet ($32/user/month, 50 users, finance) =
    $19.2K/year
  - Usage: Marketing uses Asana, consulting uses Monday,
    engineering uses Jira, finance uses Smartsheet

  Category 3 — File Storage:
  - Google Workspace ($14/user/month, 200 users, marketing
    + consulting) = $33.6K/year
  - Microsoft 365 (already counted above, used by finance
    + HR + engineering)
  - Dropbox Business ($20/user/month, 50 users, executive
    team) = $12K/year

  Category 4 — CRM/Sales:
  - Salesforce ($150/user/month, 80 users) = $144K/year
  - HubSpot ($50/user/month, 30 users, marketing) =
    $18K/year
  - Usage: Sales uses Salesforce, marketing uses HubSpot
    for campaigns but data doesn't sync well

  Total annual spend on these 11 tools: ~$644K
  Overall software spend (47 vendors): $1.8M/year

  Constraints:
  - Engineering refuses to give up Jira
  - M365 is under a 3-year enterprise agreement (2 years
    remaining)
  - Salesforce contract renews in 4 months
  - Several teams have built custom workflows on their
    current tools
  - CFO target: 20% cost reduction on total software spend

  Task: Analyze the vendor landscape, identify consolidation
  opportunities, estimate potential savings, and create a
  prioritized consolidation roadmap with risk assessment.

assertions:
  - type: llm_judge
    criteria: "Response identifies clear consolidation opportunities — spots the obvious overlaps (Slack vs Teams, Google Workspace vs M365, multiple PM tools, Salesforce vs HubSpot); proposes logical consolidation targets (e.g., standardize on M365 since it's already paid for, merge HubSpot into Salesforce, reduce PM tools); quantifies potential savings for each consolidation; the analysis is systematic rather than just cutting the cheapest tools."
    weight: 0.35
    description: "ConsolidationOpportunities"
  - type: llm_judge
    criteria: "Response creates a realistic implementation roadmap — sequences consolidations by priority (quick wins vs complex migrations); accounts for contract timelines (Salesforce renewal in 4 months is an opportunity, M365 EA is locked in); estimates migration effort and risk for each consolidation; identifies dependencies (can't remove Google Workspace until files are migrated); the roadmap is practical, not just theoretical cost-cutting."
    weight: 0.35
    description: "RealisticRoadmap"
  - type: llm_judge
    criteria: "Response addresses change management and political realities — acknowledges that departments chose their tools for reasons (not just waste); plans for user resistance (marketing won't want to give up Asana, executives won't want to lose Dropbox); proposes transition support; respects the engineering Jira constraint; considers productivity costs during migration; the plan would survive contact with real organizational politics."
    weight: 0.30
    description: "ChangeManagementRealism"
