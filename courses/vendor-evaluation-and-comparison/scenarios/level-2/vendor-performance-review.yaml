meta:
  id: vendor-performance-review
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor performance review — conduct a structured annual review of an existing vendor's performance"
  tags: [performance-review, vendor-management, kpis, accountability, intermediate]

state: {}

trigger: |
  You're a Facilities Manager at a 600-person corporate
  campus. It's time for the annual performance review of
  your outsourced janitorial services vendor, CleanCorp.
  They've been your vendor for 2 years and the contract
  renews in 3 months. You need to conduct a thorough review
  to decide whether to renew, renegotiate, or replace them.

  Contract terms:
  - 2-year contract at $28,000/month ($336K/year)
  - Scope: Daily cleaning of 85,000 sq ft office space,
    restroom maintenance, trash removal, recycling, floor
    care (weekly), window cleaning (monthly)
  - Staffing: 12 cleaners (8 day, 4 evening), 1 site
    supervisor
  - KPIs in contract: Inspection score ≥ 90/100, complaint
    response within 2 hours, monthly reporting

  Performance data (last 12 months):

  Inspection scores (your team's monthly walk-throughs):
  - Average: 82/100 (below 90 target)
  - Trend: Started at 88, dropped to 76 by month 8,
    recovered to 85 after you escalated
  - Recurring issues: Restroom supplies running out,
    inconsistent floor care, common areas neglected on
    Fridays

  Complaint log:
  - Total complaints: 47 (up from 28 last year)
  - Average response time: 3.5 hours (contract says 2
    hours)
  - Categories: Restroom cleanliness (18), trash overflow
    (12), floor stains (8), odor issues (5), other (4)
  - Notable: 3 complaints from C-suite executives about
    boardroom conditions before client meetings

  Staffing:
  - Turnover: 8 of 12 cleaners replaced during the year
  - Site supervisor changed twice
  - 3 occasions where fewer than minimum staff showed up
    (no advance notice)

  Positive notes:
  - Handled 2 emergency cleanups (burst pipe, office party)
    quickly and professionally
  - Recycling program compliance improved from 60% to 85%
  - New evening supervisor (started month 9) has been
    excellent
  - Always invoiced accurately, no billing disputes

  Financial:
  - CleanCorp has proposed a 6% price increase for renewal
  - Market rate for comparable service: $25K-$32K/month
  - Getting a new vendor would cost ~$15K in transition
    (re-keying, training, etc.)

  Task: Prepare the annual vendor performance review
  document. Score their performance against contract KPIs,
  identify trends, and make a recommendation (renew as-is,
  renegotiate with conditions, or replace) with a specific
  action plan.

assertions:
  - type: llm_judge
    criteria: "Response conducts a thorough performance review against contract KPIs — scores inspection performance (82 vs 90 target = failing), response time (3.5 hrs vs 2 hr target = failing), tracks complaint trends (47 vs 28 = 68% increase); identifies the performance dip and partial recovery pattern; acknowledges positive performance areas (emergency response, recycling, billing accuracy); the review is fair and data-driven, not just negative."
    weight: 0.35
    description: "ThoroughPerformanceReview"
  - type: llm_judge
    criteria: "Response identifies root causes and patterns — connects high staff turnover (8 of 12 replaced) to inconsistent service quality; notes site supervisor instability (2 changes) as a management issue; identifies Friday neglect pattern; recognizes the improvement trend since new evening supervisor started; the analysis goes beyond symptoms to understand why performance has been inconsistent, which informs whether the problems are fixable."
    weight: 0.35
    description: "RootCauseAnalysis"
  - type: llm_judge
    criteria: "Response makes a practical recommendation with specific conditions — likely recommends renegotiation rather than immediate replacement (improvement trend is positive, transition costs exist); proposes specific conditions (performance improvement plan with milestones, staffing stability requirements, rejection of 6% increase given underperformance, enhanced KPI monitoring); if recommending renewal, includes accountability mechanisms; the recommendation balances pragmatism with accountability."
    weight: 0.30
    description: "PracticalRecommendation"
