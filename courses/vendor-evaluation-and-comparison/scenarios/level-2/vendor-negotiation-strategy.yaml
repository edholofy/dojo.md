meta:
  id: vendor-negotiation-strategy
  level: 2
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor negotiation strategy — develop a negotiation plan to improve contract terms with a selected vendor"
  tags: [negotiation, contract, strategy, leverage, intermediate]

state: {}

trigger: |
  You're a Procurement Manager at a 350-person healthcare
  technology company. You've selected your preferred vendor
  for a new customer relationship management (CRM) platform
  after a 3-month evaluation. Now you need to negotiate the
  best possible deal before signing.

  Selected vendor: SalesPlatform Pro
  Their initial proposal:
  - 3-year contract, auto-renewing for 2-year periods
  - 350 user licenses at $95/user/month = $399,000/year
  - Implementation: $120,000 (includes configuration,
    data migration, training)
  - Premium support: $4,500/month ($54,000/year)
  - Annual price escalation: Up to 10% per renewal
  - Payment terms: Annual prepayment, net 15
  - SLA: 99.5% uptime, credits capped at 15% monthly fee
  - Data: Vendor may use anonymized data for benchmarking
  - Termination: 90-day cure period, early termination
    requires payment of remaining contract value

  Your leverage points:
  - You're at the end of vendor's fiscal quarter (they want
    to close the deal)
  - The runner-up vendor (CRMNext) quoted $75/user/month
    with similar features
  - You're willing to commit to 3 years if the price is
    right
  - Your company is well-known in healthtech — good logo
    for their marketing
  - You have 3 weeks before your current CRM contract
    expires (some urgency, but the old vendor will do
    month-to-month)

  Market intelligence:
  - Average CRM discount from list price: 20-30% for
    companies your size
  - Standard implementation should be $80K-$100K for your
    scope
  - Premium support is typically 15-18% of license fees
    (theirs is ~13.5%, which is fair)
  - Industry standard price escalation: 3-5% or CPI-based
  - Most CRM vendors offer net 30 or net 45 payment terms

  Task: Develop a comprehensive negotiation strategy.
  Identify your key negotiation objectives, prioritize them
  (must-have vs nice-to-have), outline your tactics, and
  prepare your specific counter-proposals for each contract
  term.

assertions:
  - type: llm_judge
    criteria: "Response develops a strategic negotiation plan — identifies key objectives (price reduction, better escalation terms, improved SLA, data protection, flexible termination); prioritizes them as must-have vs nice-to-have; sequences the negotiation topics strategically; identifies BATNA (CRMNext as alternative, month-to-month on current system); the strategy shows understanding of negotiation dynamics, not just a wish list."
    weight: 0.35
    description: "StrategicNegotiationPlan"
  - type: llm_judge
    criteria: "Response prepares specific counter-proposals — proposes concrete alternative terms for each issue (e.g., $75-80/user based on competitor pricing, 3-5% escalation cap, 99.9% uptime SLA, mutual data restrictions, net 30 payment, lower early termination penalty); explains the justification for each counter (market data, competitor quote, industry standard); counter-proposals are ambitious but realistic enough that the vendor would consider them."
    weight: 0.35
    description: "SpecificCounterProposals"
  - type: llm_judge
    criteria: "Response includes tactical negotiation advice — discusses how to use end-of-quarter timing; how to leverage the competitor quote without bluffing; when to trade concessions (e.g., commit to 3 years in exchange for better pricing); identifies what to concede on and what to hold firm on; warns about common vendor negotiation tactics (artificial urgency, 'final offer' pressure, unbundling features); the advice would help a real procurement manager negotiate effectively."
    weight: 0.30
    description: "TacticalAdvice"
