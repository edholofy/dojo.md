meta:
  id: vendor-reference-check
  level: 1
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor reference check — prepare and conduct structured reference checks for shortlisted vendors"
  tags: [reference-check, due-diligence, questions, verification, beginner]

state: {}

trigger: |
  You're an HR Manager at a 300-person retail company.
  You've shortlisted 2 vendors for a new HRIS (Human
  Resource Information System) and need to conduct reference
  checks before making a final decision. Each vendor has
  provided 3 references.

  Vendor A — PeopleSync:
  References provided:
  1. TechStart Inc. (150 employees, SaaS company, 2 years
     as customer)
  2. GreenLeaf Retail (500 employees, retail chain, 3 years
     as customer)
  3. MedCare Solutions (200 employees, healthcare, 1 year
     as customer)

  Vendor B — HRCloud:
  References provided:
  1. DataDrive Corp (400 employees, data analytics, 4 years
     as customer)
  2. UrbanBites (100 employees, restaurant chain, 2 years
     as customer)
  3. BlueSky Financial (800 employees, financial services,
     3 years as customer)

  Your company's key requirements:
  - Payroll integration with ADP
  - Benefits administration
  - Time and attendance tracking
  - Employee self-service portal
  - Reporting and compliance (multi-state)
  - Implementation within 3 months
  - Budget: $50K implementation + $30K annual

  What you know from the RFP:
  - PeopleSync quoted $42K implementation + $28K annual
  - HRCloud quoted $55K implementation + $25K annual
  - Both claim ADP integration
  - PeopleSync says 8-week implementation
  - HRCloud says 12-week implementation

  Task: Create a structured reference check questionnaire
  (the same questions for all references). Then, based on
  the reference profiles, identify which references are
  most relevant to your situation and explain what specific
  information you'd prioritize learning from each.

assertions:
  - type: llm_judge
    criteria: "Response creates a thorough, structured reference check questionnaire — includes questions about implementation experience (timeline accuracy, challenges, hidden costs), system functionality (does it actually work as promised?), vendor support quality (responsiveness, problem resolution), ADP integration experience, and overall satisfaction; questions are specific and would elicit useful information, not just yes/no answers."
    weight: 0.35
    description: "ThoroughQuestionnaire"
  - type: llm_judge
    criteria: "Response identifies the most relevant references and explains why — GreenLeaf Retail (similar industry) and MedCare Solutions (similar size + multi-state compliance needs) are most relevant for PeopleSync; DataDrive Corp (similar size) and UrbanBites (retail/hourly workers) are relevant for HRCloud; explains what specific information to prioritize from each reference based on their relevance."
    weight: 0.35
    description: "RelevanceAnalysis"
  - type: llm_judge
    criteria: "Response includes practical reference check best practices — advises asking about actual vs quoted implementation timeline, actual vs quoted costs, what the vendor doesn't do well, whether they'd choose the vendor again, and what they wish they'd known before signing; suggests asking for references the vendor didn't provide; the approach would uncover real vendor performance, not just curated success stories."
    weight: 0.30
    description: "PracticalBestPractices"
