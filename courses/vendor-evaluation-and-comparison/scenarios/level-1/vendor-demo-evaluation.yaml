meta:
  id: vendor-demo-evaluation
  level: 1
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor demo evaluation — prepare for, observe, and evaluate vendor product demonstrations"
  tags: [demo, product-evaluation, hands-on, assessment, beginner]

state: {}

trigger: |
  You're a Marketing Director at a 150-person B2B SaaS
  company. You're evaluating 3 email marketing platforms
  and have scheduled product demos with each vendor. You
  need to prepare a structured evaluation approach so your
  team of 4 evaluators can assess the demos consistently.

  Your team evaluators:
  - You (Marketing Director): Strategy and reporting
  - Email Marketing Manager: Daily operations and campaigns
  - Web Developer: Integration and technical capabilities
  - Sales Ops Analyst: CRM integration and data flow

  Key use cases to evaluate:
  1. Create and send a segmented email campaign to 50,000
     contacts
  2. Build a 5-email automated nurture sequence triggered
     by form submission
  3. A/B test subject lines and content blocks
  4. Generate a report showing campaign ROI with revenue
     attribution
  5. Integrate with Salesforce CRM (bi-directional sync)
  6. Manage email preferences and compliance (CAN-SPAM,
     GDPR)

  Vendor A demo notes (just completed):
  - Polished presentation, clearly rehearsed
  - Showed pre-built campaigns, didn't create anything live
  - When asked about Salesforce integration, said "we have
    a native integration" but didn't demo it
  - UI looked modern but complex — many clicks to perform
    simple tasks
  - Presenter couldn't answer technical questions about API
    rate limits
  - Showed impressive-looking reports but used sample data,
    not clear if real
  - Demo lasted 90 minutes (scheduled for 60)

  Vendor B demo notes (just completed):
  - Less polished but more authentic
  - Built a campaign live during the demo, showed actual
    workflow
  - Demonstrated Salesforce integration with a test account
  - UI was simpler, fewer features but more intuitive
  - Presenter was the actual product manager, answered all
    technical questions
  - Reports were basic — acknowledged "advanced reporting
    is on our Q2 roadmap"
  - Demo lasted 55 minutes, left time for questions

  Vendor C demo (scheduled for tomorrow)

  Task: Create the demo evaluation framework (scoring
  rubric for all evaluators), evaluate Vendors A and B
  based on the demo notes, and prepare specific questions
  and scenarios to request during Vendor C's demo.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured demo evaluation framework — includes specific evaluation criteria aligned with the 6 use cases; assigns different criteria to different evaluators based on their expertise; uses a consistent scoring scale; the framework would produce comparable, objective results across demos; includes space for both quantitative scores and qualitative observations."
    weight: 0.35
    description: "EvaluationFramework"
  - type: llm_judge
    criteria: "Response evaluates Vendors A and B insightfully — identifies red flags in Vendor A's demo (pre-built rather than live, avoiding technical questions, overrunning time); recognizes Vendor B's authenticity advantages (live demo, product manager presenting, honest about roadmap gaps); the evaluation goes beyond surface impressions to assess what the demo behavior tells you about the vendor relationship you'd have."
    weight: 0.35
    description: "InsightfulEvaluation"
  - type: llm_judge
    criteria: "Response prepares specific, valuable questions for Vendor C — requests live demonstrations of specific use cases (not canned demos); asks technical questions that Vendor A couldn't answer; prepares scenarios that test claimed capabilities; includes questions designed to reveal limitations; the preparation would maximize the value of the Vendor C demo."
    weight: 0.30
    description: "VendorCPreparation"
