meta:
  id: contract-red-flags
  level: 1
  course: vendor-evaluation-and-comparison
  type: output
  description: "Contract red flags — identify problematic clauses in a vendor contract and recommend changes"
  tags: [contract, red-flags, review, negotiation, beginner]

state: {}

trigger: |
  You're an Operations Manager at a 100-person digital
  agency. You've selected a vendor for your new CRM system
  and they've sent their standard contract. Your company
  doesn't have in-house legal counsel, so your CEO has asked
  you to review the contract and flag any concerns before
  they bring in an attorney for final review.

  Contract excerpts (key clauses):

  Clause 3.1 — Term and Renewal:
  "This Agreement shall be for an initial term of 36
  months. The Agreement shall automatically renew for
  successive 24-month periods unless either party provides
  written notice of non-renewal at least 180 days prior to
  the end of the then-current term."

  Clause 4.2 — Pricing:
  "Monthly subscription fees are subject to annual
  adjustment. Vendor reserves the right to increase fees
  by up to 15% upon each renewal period. Additional
  features or modules activated during the term will be
  billed at the then-current list price."

  Clause 5.1 — Data Ownership:
  "All data entered into the Platform by Customer shall
  remain the property of Customer. However, Vendor shall
  have the right to use anonymized and aggregated Customer
  data for product improvement, benchmarking, and marketing
  purposes."

  Clause 6.3 — Service Level:
  "Vendor shall use commercially reasonable efforts to
  maintain 99% uptime. In the event of downtime exceeding
  24 consecutive hours, Customer may request a service
  credit equal to one day of the monthly fee."

  Clause 7.1 — Limitation of Liability:
  "In no event shall Vendor's total aggregate liability
  exceed the fees paid by Customer in the 3 months
  preceding the claim. Vendor shall not be liable for any
  indirect, incidental, consequential, or punitive damages."

  Clause 8.2 — Termination:
  "Customer may terminate this Agreement for cause only
  after providing Vendor with 60 days written notice and
  an opportunity to cure. Early termination for convenience
  shall require payment of all remaining fees for the
  balance of the current term."

  Clause 9.1 — Data Migration:
  "Upon termination, Vendor shall provide Customer with a
  data export in CSV format within 30 days. Vendor reserves
  the right to charge a reasonable fee for data migration
  assistance. After 30 days post-termination, all Customer
  data will be permanently deleted."

  Clause 10.1 — Indemnification:
  "Customer shall indemnify, defend, and hold harmless
  Vendor against any claims arising from Customer's use of
  the Platform, including but not limited to claims related
  to data stored by Customer."

  Task: Review each clause, identify the red flags and
  concerning provisions, and recommend specific changes
  you would request during negotiation.

assertions:
  - type: llm_judge
    criteria: "Response identifies the major red flags — the 180-day non-renewal notice is excessive (industry standard: 30-60 days); 15% annual price increase cap is too high (should be 3-5% or CPI-based); data usage for 'marketing purposes' goes beyond product improvement; 99% uptime with 'commercially reasonable efforts' is weak (should be a commitment, not best-effort); liability capped at 3 months is low (should be 12 months); the indemnification is one-sided (customer indemnifies vendor but not vice versa)."
    weight: 0.35
    description: "RedFlagIdentification"
  - type: llm_judge
    criteria: "Response recommends specific, practical changes — proposes concrete alternative language for each problematic clause (e.g., reduce non-renewal notice to 60 days, cap price increases at CPI+3%, remove 'marketing purposes' from data usage, increase liability cap to 12 months annual fees, add mutual indemnification); the recommendations are reasonable and would be standard in fair vendor contracts."
    weight: 0.35
    description: "PracticalRecommendations"
  - type: llm_judge
    criteria: "Response explains why each clause matters — connects each red flag to potential business impact (e.g., being locked in without realizing it, data being used in ways you didn't expect, having no meaningful recourse if the vendor fails); the explanations would help the CEO understand the risks; the analysis would prepare the company for an informed negotiation."
    weight: 0.30
    description: "BusinessImpactExplanation"
