meta:
  id: vendor-selection-memo
  level: 1
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor selection memo — write a recommendation memo summarizing evaluation findings for decision-makers"
  tags: [recommendation, memo, decision-making, summary, beginner]

state: {}

trigger: |
  You're a Procurement Coordinator at a 175-person
  accounting firm. After a 6-week evaluation process, you
  need to write a vendor selection memo recommending a
  document management system (DMS) to the Managing Partner
  and the IT Committee. They weren't involved in the
  detailed evaluation — they need a clear, concise summary
  that supports a confident decision.

  Evaluation summary:

  Vendor A — DocuVault:
  - Price: $18/user/month ($37,800/year for 175 users)
  - Strengths: Best security features (SOC 2 Type II,
    encryption at rest and in transit, granular permissions),
    strong audit trail, excellent compliance reporting,
    integrates natively with 2 of your 3 tax software tools
  - Weaknesses: Dated UI (several evaluators called it
    "clunky"), slower search performance on large document
    sets, no mobile app (web-only, but responsive)
  - Demo score: 7.2/10 (average across 5 evaluators)
  - Reference checks: 3/3 positive, one noted "implementation
    took longer than quoted"
  - Implementation: 10 weeks quoted, references said 14-16
    weeks actual
  - Support: Phone + email, 4-hour response for critical
    issues
  - Contract: 2-year minimum, 5% annual increase cap

  Vendor B — CloudDocs:
  - Price: $24/user/month ($50,400/year for 175 users)
  - Strengths: Modern, intuitive UI (evaluators loved it),
    excellent search with AI-powered classification, native
    mobile app, integrates with all 3 of your tax software
    tools, built-in e-signature
  - Weaknesses: SOC 2 Type I only (Type II "expected Q3"),
    no on-premise option, limited audit trail customization,
    newer company (founded 2020)
  - Demo score: 8.8/10 (average across 5 evaluators)
  - Reference checks: 2/3 positive, one reference (a law
    firm) reported data migration issues and said "support
    was slow to resolve them"
  - Implementation: 6 weeks quoted, references said 6-8
    weeks actual
  - Support: Chat + email + phone, 1-hour response for
    critical, dedicated CSM
  - Contract: 1-year minimum, 8% annual increase cap

  Vendor C — FileForce:
  - Price: $14/user/month ($29,400/year for 175 users)
  - Strengths: Lowest cost, simple to use, fast
    implementation (4 weeks), good basic document storage
    and retrieval
  - Weaknesses: Limited compliance features (no audit
    trail, no retention policies), no integration with any
    of your tax software (would need manual or Zapier
    workarounds), no OCR or AI features, limited to 5GB
    per user storage
  - Demo score: 5.5/10 (average across 5 evaluators)
  - Reference checks: 2/3 positive, one said "we outgrew
    it within a year"
  - Implementation: 4 weeks, references confirmed
  - Support: Email only, 24-hour response time
  - Contract: Month-to-month

  Additional context:
  - The firm handles sensitive client financial data
  - You're growing ~15% annually
  - Two partners specifically asked about mobile access
  - The firm has a compliance audit coming in 6 months
  - Budget approved: up to $55K/year

  Task: Write the vendor selection memo with your
  recommendation. The memo should be structured, evidence-
  based, and give the Managing Partner and IT Committee
  enough information to make a confident decision.

assertions:
  - type: llm_judge
    criteria: "Response writes a professional, well-structured recommendation memo — includes executive summary with clear recommendation upfront, evaluation methodology overview, side-by-side comparison of key criteria, detailed analysis of the recommended vendor's strengths and risks, and next steps; the format is appropriate for senior decision-makers who need to quickly understand the recommendation and rationale."
    weight: 0.35
    description: "ProfessionalMemoStructure"
  - type: llm_judge
    criteria: "Response makes an evidence-based recommendation with honest trade-off acknowledgment — the recommendation is supported by specific evaluation data (demo scores, reference feedback, pricing); acknowledges weaknesses of the recommended vendor rather than presenting it as perfect; explains why the recommended vendor is best despite its limitations; addresses the eliminated vendors' merits fairly; a decision-maker reading this would feel informed, not sold to."
    weight: 0.35
    description: "EvidenceBasedRecommendation"
  - type: llm_judge
    criteria: "Response connects recommendation to business context — addresses the firm's specific needs: sensitive financial data (security matters), upcoming compliance audit (compliance features critical), 15% growth (scalability needed), partner interest in mobile access, tax software integration requirements; includes implementation timeline considerations and risk mitigation steps for the recommended vendor; the memo would actually help this specific firm make the right decision."
    weight: 0.30
    description: "BusinessContextAlignment"
