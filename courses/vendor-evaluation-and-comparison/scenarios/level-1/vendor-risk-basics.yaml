meta:
  id: vendor-risk-basics
  level: 1
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor risk basics — assess and compare the risk profiles of 3 vendors for a critical business function"
  tags: [risk-assessment, due-diligence, vendor-stability, comparison, beginner]

state: {}

trigger: |
  You're the Finance Manager at a 200-person healthcare
  services company. You're selecting a payment processing
  vendor, which is critical because payment processing
  failures directly impact revenue. You need to assess the
  risk profile of 3 shortlisted vendors.

  Vendor A — PaymentPro:
  - Founded: 2008, 16 years in business
  - Revenue: $85M/year
  - Employees: 450
  - Funding: Bootstrapped, profitable for 10 years
  - Uptime last 12 months: 99.97%
  - Major incidents: 0 in last 2 years
  - Certifications: PCI-DSS Level 1, SOC 2 Type II, HIPAA
  - Data centers: 3 (US East, US West, EU)
  - Customer count: 12,000
  - Key client concentration: No client > 3% of revenue
  - Insurance: $10M E&O, $5M cyber liability
  - Risk: CEO is founder and sole decision-maker, no
    succession plan disclosed

  Vendor B — QuickPay:
  - Founded: 2019, 5 years in business
  - Revenue: $12M/year (growing 80% YoY)
  - Employees: 85
  - Funding: Series B ($45M raised, last round 18 months
    ago)
  - Uptime last 12 months: 99.91%
  - Major incidents: 2 in last 2 years (one 4-hour outage,
    one data breach affecting 500 records — all remediated)
  - Certifications: PCI-DSS Level 1, SOC 2 Type I (Type
    II in progress)
  - Data centers: 1 (US East, AWS)
  - Customer count: 1,800
  - Key client concentration: Top client = 15% of revenue
  - Insurance: $2M E&O, $1M cyber liability
  - Risk: Cash burn rate suggests 18 months of runway;
    needs to raise Series C or reach profitability

  Vendor C — GlobalPay Solutions:
  - Founded: 1995, 29 years in business
  - Revenue: $2.1B/year (publicly traded)
  - Employees: 8,500
  - Uptime last 12 months: 99.99%
  - Major incidents: 1 (minor — 45-minute processing
    delay)
  - Certifications: PCI-DSS Level 1, SOC 2 Type II, HIPAA,
    ISO 27001
  - Data centers: 12 globally
  - Customer count: 180,000
  - Key client concentration: No client > 0.5% of revenue
  - Insurance: $100M aggregate
  - Risk: Acquired 3 companies in last 2 years; integration
    causing support quality complaints; recent CFO departure

  Task: Create a risk assessment for all 3 vendors. For
  each, identify key risks, assign a risk level (Low,
  Medium, High) for each risk category, and make a
  recommendation that balances risk with capability and
  cost.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured risk assessment — evaluates each vendor across consistent risk categories (financial stability, operational reliability, security/compliance, concentration risk, business continuity, leadership risk); assigns risk levels with specific justification; the assessment framework would be reusable for future vendor evaluations."
    weight: 0.35
    description: "StructuredAssessment"
  - type: llm_judge
    criteria: "Response identifies the specific risks for each vendor — PaymentPro's key-person risk (founder dependency); QuickPay's financial runway risk (18 months cash), data breach history, single data center, and customer concentration; GlobalPay's integration risk from acquisitions, CFO departure, and potential support quality degradation; the analysis shows understanding of different risk types."
    weight: 0.35
    description: "SpecificRiskIdentification"
  - type: llm_judge
    criteria: "Response makes a risk-informed recommendation — the recommendation considers that this is a healthcare company handling patient payments (high stakes, HIPAA compliance critical); weighs risk tolerance against vendor capabilities; suggests risk mitigation strategies for the chosen vendor; acknowledges trade-offs rather than presenting a simple 'best option' answer."
    weight: 0.30
    description: "RiskInformedRecommendation"
