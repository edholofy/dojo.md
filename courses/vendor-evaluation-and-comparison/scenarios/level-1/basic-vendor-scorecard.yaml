meta:
  id: basic-vendor-scorecard
  level: 1
  course: vendor-evaluation-and-comparison
  type: output
  description: "Basic vendor scorecard — create a weighted evaluation scorecard to compare 3 software vendors"
  tags: [scorecard, weighted-criteria, comparison, software, beginner]

state: {}

trigger: |
  You're an Office Manager at a 75-person marketing agency.
  The company needs a new project management tool, and
  you've been asked to evaluate 3 options and make a
  recommendation. This is your first time formally
  evaluating vendors.

  Company needs:
  - 75 users (50 full-time, 25 contractors)
  - Must integrate with Slack and Google Workspace
  - Need task management, time tracking, and basic reporting
  - Budget: $15,000/year maximum
  - Easy to learn (no IT department to manage complex tools)
  - Client-facing capabilities (share project status with
    clients)

  Vendor A — TaskFlow Pro:
  - Price: $12/user/month ($10,800/year for 75 users)
  - Integrations: Slack, Google Workspace, Zoom, Figma
  - Features: Tasks, time tracking, Gantt charts, reporting,
    client portal
  - Free trial: 14 days
  - Support: Email only (24-hour response time)
  - Contract: Annual commitment, no monthly option
  - User reviews: 4.2/5 on G2 (850 reviews)
  - Onboarding: Self-service documentation only
  - Mobile app: Yes (iOS and Android, rated 3.8/5)

  Vendor B — ProjectHub:
  - Price: $18/user/month ($16,200/year for 75 users)
  - Integrations: Slack, Google Workspace, HubSpot,
    Salesforce, 200+ via Zapier
  - Features: Tasks, time tracking, resource planning,
    advanced reporting, client collaboration, AI assistant
  - Free trial: 30 days
  - Support: Chat + phone (business hours)
  - Contract: Month-to-month or annual (15% discount)
  - User reviews: 4.6/5 on G2 (2,100 reviews)
  - Onboarding: Dedicated onboarding specialist included
  - Mobile app: Yes (iOS and Android, rated 4.5/5)

  Vendor C — SimpleTask:
  - Price: $8/user/month ($7,200/year for 75 users)
  - Integrations: Slack, basic Google Calendar sync
  - Features: Tasks, basic time tracking, simple reports
  - Free trial: Free forever for up to 10 users, paid
    for rest
  - Support: Community forum + email (48-hour response)
  - Contract: Month-to-month
  - User reviews: 3.9/5 on G2 (320 reviews)
  - Onboarding: YouTube tutorials
  - Mobile app: iOS only (rated 3.2/5)

  Task: Create a weighted evaluation scorecard, score all
  3 vendors, and make a recommendation with justification.

assertions:
  - type: llm_judge
    criteria: "Response creates a well-designed scorecard — includes relevant evaluation criteria (functionality, price, integrations, support, ease of use, client capabilities, mobile); assigns reasonable weights based on the company's stated priorities; scoring methodology is clear and consistent; the scorecard format would be reusable for future vendor evaluations."
    weight: 0.35
    description: "ScorecardDesign"
  - type: llm_judge
    criteria: "Response scores vendors accurately and makes a justified recommendation — scores reflect the actual data provided for each vendor; the recommendation follows logically from the scores; addresses the budget constraint (Vendor B exceeds budget); considers trade-offs explicitly (cost vs. features vs. support); the recommendation would help the agency make the right decision."
    weight: 0.35
    description: "AccurateRecommendation"
  - type: llm_judge
    criteria: "Response considers practical factors beyond the scorecard — addresses the contractor user management, migration effort, vendor stability (review count as proxy), total cost implications, the 'no IT department' constraint, and client-facing needs specifically; the analysis shows practical thinking about what matters for a 75-person agency."
    weight: 0.30
    description: "PracticalConsiderations"
