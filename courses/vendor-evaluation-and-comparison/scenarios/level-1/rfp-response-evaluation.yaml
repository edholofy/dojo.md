meta:
  id: rfp-response-evaluation
  level: 1
  course: vendor-evaluation-and-comparison
  type: output
  description: "RFP response evaluation — evaluate and compare vendor responses to a Request for Proposal"
  tags: [rfp, response-evaluation, comparison, procurement, beginner]

state: {}

trigger: |
  You're a Facilities Coordinator at a 200-person
  accounting firm. You sent an RFP for office cleaning
  services and received 3 responses. Your office is 15,000
  sq ft across 2 floors with a kitchen, 4 conference rooms,
  and 3 restrooms. Current contract expires in 30 days.

  RFP requirements:
  - Daily cleaning (Mon-Fri after 6 PM)
  - Weekly deep cleaning (weekends)
  - Quarterly carpet and window cleaning
  - Green/eco-friendly products preferred
  - Background checks for all staff
  - Insurance: $2M general liability minimum
  - Must provide own equipment and supplies
  - Service start date: within 30 days

  Vendor 1 — CleanPro Services:
  Response quality: Professional, 12-page document
  - Price: $4,200/month ($50,400/year)
  - Staff: Team of 3 (dedicated to your account)
  - Green products: "We can use green products upon request
    at additional cost (+$300/month)"
  - Background checks: Yes, all employees
  - Insurance: $5M general liability
  - Equipment: All provided
  - References: 4 accounting/law firms provided
  - Experience: 15 years, 200+ commercial clients
  - Contract: 2-year minimum
  - SLA: "Any complaints addressed within 24 hours"
  - Did not address quarterly cleaning pricing separately

  Vendor 2 — GreenShine Cleaning:
  Response quality: 5-page document, some sections left
  blank
  - Price: $3,600/month ($43,200/year)
  - Staff: "We will assign appropriate staff"
  - Green products: "100% eco-friendly, EPA-certified
    products — it's our brand"
  - Background checks: "Available upon request"
  - Insurance: $1M general liability
  - Equipment: All provided, HEPA-filtered
  - References: 2 references (a yoga studio and a café)
  - Experience: 3 years, 25 commercial clients
  - Contract: 1-year minimum
  - SLA: Not addressed
  - Quarterly cleaning: Included in monthly price

  Vendor 3 — FacilityFirst:
  Response quality: Thorough, 18-page proposal with photos
  - Price: $5,100/month ($61,200/year)
  - Staff: Team of 4 (dedicated, with named supervisor)
  - Green products: "Standard green cleaning included;
    medical-grade disinfection available"
  - Background checks: All employees, updated annually
  - Insurance: $5M general liability + workers' comp
  - Equipment: Commercial-grade, all provided
  - References: 6 references (3 CPA firms, 2 law firms,
    1 financial advisor)
  - Experience: 22 years, 500+ commercial clients
  - Contract: 1-year, auto-renew with 60-day notice
  - SLA: "4-hour response for urgent issues, guaranteed
    re-clean within same day for any quality concern"
  - Quarterly cleaning: Detailed separately ($800/quarter)

  Task: Evaluate all 3 vendor responses against the RFP
  requirements. Identify strengths, weaknesses, red flags,
  and gaps. Make a recommendation with justification.

assertions:
  - type: llm_judge
    criteria: "Response evaluates each vendor systematically against RFP requirements — identifies that GreenShine has red flags (insurance below requirement, background checks not standard, vague staffing, weak references, no SLA); recognizes CleanPro's strengths but notes the 2-year lock-in and green product upcharge; acknowledges FacilityFirst's premium quality and relevant references but higher cost; the evaluation is thorough and requirement-by-requirement."
    weight: 0.35
    description: "SystematicEvaluation"
  - type: llm_judge
    criteria: "Response identifies red flags and gaps — calls out GreenShine's $1M insurance (below the $2M requirement), 'available upon request' background checks (should be standard), missing SLA, blank sections, and irrelevant references; identifies CleanPro's missing quarterly pricing; recognizes response quality as an indicator of service quality; the analysis shows critical thinking, not just comparison."
    weight: 0.35
    description: "RedFlagIdentification"
  - type: llm_judge
    criteria: "Response makes a well-justified recommendation — the recommendation accounts for both cost and risk; addresses the 30-day timeline constraint; considers the total cost including quarterly cleaning; the recommendation would serve the firm well; suggests follow-up questions or negotiation points for the preferred vendor."
    weight: 0.30
    description: "JustifiedRecommendation"
