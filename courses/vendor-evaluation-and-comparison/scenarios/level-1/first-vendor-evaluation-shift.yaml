meta:
  id: first-vendor-evaluation-shift
  level: 1
  course: vendor-evaluation-and-comparison
  type: output
  description: "First vendor evaluation shift — handle multiple vendor evaluation challenges simultaneously in a realistic work scenario"
  tags: [shift-simulation, multi-task, vendor-evaluation, pressure, beginner]

state: {}

trigger: |
  You're an Office Manager at a 60-person marketing agency.
  It's Monday morning and you have 3 vendor-related tasks
  that all need attention today.

  Task 1 — Urgent Vendor Replacement:
  Your current office supply vendor (SupplyDirect) just
  notified you they're going out of business in 30 days.
  You need to find and evaluate a replacement quickly. You
  spend $4,500/month on office supplies. You've identified
  2 potential replacements:

  OfficeMax Business:
  - Pricing: 10% discount off retail with business account
  - Delivery: Next-day for orders before 2pm
  - Minimum order: $100
  - Account manager: Yes, dedicated
  - Return policy: 30 days, free returns
  - Online ordering: Full catalog online

  BulkSupply Co:
  - Pricing: 25% discount off retail for bulk orders
  - Delivery: 3-5 business days
  - Minimum order: $500
  - Account manager: No, call center support
  - Return policy: 14 days, restocking fee 15%
  - Online ordering: Phone/email only

  Your boss wants a recommendation by end of day.

  Task 2 — Demo Evaluation Gone Wrong:
  You scheduled a demo of a new visitor management system
  for today at 2pm. The vendor (LobbyTrack) just emailed
  saying their "senior solutions consultant" can't make it,
  and they're sending a junior sales rep instead. Also,
  they want to reschedule from 60 minutes to 30 minutes
  because "they can cover the highlights." Your facilities
  director specifically cleared her schedule for this demo.
  You need to decide how to handle this and respond to the
  vendor.

  Task 3 — Reference Check Surprise:
  You're finalizing a contract with a cleaning service
  vendor (CleanPro). During your reference check calls this
  morning, one reference (a law firm) mentioned that
  CleanPro had a "staffing issue" 6 months ago where they
  sent a temporary worker who wasn't background-checked,
  and the worker was found in a restricted area after
  hours. CleanPro's contract is already on your CEO's desk
  for signature. You need to decide how to handle this
  information.

  Task: Address all 3 situations. For Task 1, make a quick
  but sound vendor recommendation. For Task 2, draft your
  response to the vendor. For Task 3, recommend how to
  handle the reference check concern before the contract
  is signed.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 effectively — makes a clear recommendation between OfficeMax Business and BulkSupply Co considering the agency's needs (60 people, $4,500/month, urgency of 30-day transition); weighs convenience vs savings appropriately; considers practical factors like delivery speed for a fast-paced agency, minimum order constraints, and the value of online ordering vs phone/email; the recommendation is quick but justified."
    weight: 0.35
    description: "UrgentVendorDecision"
  - type: llm_judge
    criteria: "Response handles Task 2 professionally — recognizes the vendor's behavior as a red flag (deprioritizing the demo suggests how they'll treat you as a customer); drafts a firm but professional response; either insists on the original terms (senior consultant, 60 minutes) or reschedules entirely; considers the facilities director's time; the response protects the company's position without burning bridges."
    weight: 0.35
    description: "DemoSituationHandling"
  - type: llm_judge
    criteria: "Response handles Task 3 with appropriate seriousness — recognizes the security implications (background check failure, unauthorized access to restricted area); recommends pausing the contract signing; suggests specific follow-up actions (ask CleanPro directly about the incident and their corrective actions, request proof of background check policy, add contractual protections); doesn't overreact (cancel entirely) or underreact (ignore it); balances due diligence with practical vendor management."
    weight: 0.30
    description: "ReferenceCheckEscalation"
