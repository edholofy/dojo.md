meta:
  id: vendor-regulatory-policy
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor regulatory policy — draft model legislation for third-party vendor oversight in critical infrastructure"
  tags: [regulatory, policy, legislation, critical-infrastructure, master]

state: {}

trigger: |
  You're a senior policy advisor at a national financial
  regulatory agency. After a series of vendor-related
  failures that caused systemic disruptions (a cloud
  provider outage that took down 12 banks simultaneously,
  a cybersecurity vendor breach that exposed 50 million
  financial records, a core banking vendor bankruptcy that
  stranded 200 community banks), Congress has asked your
  agency to draft model legislation for "Critical Third-
  Party Oversight in Financial Services."

  Congressional mandate:
  - Address concentration risk (too many institutions
    dependent on the same vendors)
  - Establish minimum standards for vendor management
  - Create regulatory oversight mechanism for "systemically
    important" third-party providers
  - Balance innovation with stability
  - Consider impact on small institutions (community
    banks, credit unions)

  Key incidents driving legislation:

  1. CloudFirst outage (3 months ago):
  - Major cloud provider serving 12 banks and 45 credit
    unions experienced 18-hour outage
  - Online banking, mobile apps, and ATM networks all
    down
  - No bank had tested their business continuity plan for
    cloud provider failure
  - Estimated economic impact: $340M

  2. SecureNet breach (6 months ago):
  - Cybersecurity monitoring vendor for 200+ financial
    institutions was itself breached
  - Attackers accessed security configurations for
    client financial institutions
  - 50 million customer records potentially exposed
  - Vendor delayed disclosure by 45 days

  3. CoreBank Systems bankruptcy (9 months ago):
  - Core banking platform serving 200 community banks
    filed for liquidation
  - No successor vendor ready — FDIC had to organize
    emergency migration
  - 6 banks experienced service disruptions lasting weeks
  - Community banks lost an average of $250K each in
    emergency migration costs

  Stakeholder perspectives to balance:
  - Large banks: "We already manage third-party risk well
    — don't add more regulation"
  - Community banks: "We can't afford the same vendor
    management program as JPMorgan"
  - Technology vendors: "Over-regulation will stifle
    innovation and increase costs"
  - Consumer advocates: "Customers suffer when banks'
    vendors fail — banks should be accountable"
  - National security: "Foreign-owned technology vendors
    in critical financial infrastructure pose risks"

  International context:
  - EU DORA already establishes ICT third-party oversight
  - UK FCA operational resilience framework
  - Singapore MAS outsourcing guidelines
  - Need to consider interoperability with these frameworks

  Task: Draft the model legislation with key provisions,
  an explanatory memorandum justifying each section, and
  an impact analysis covering all stakeholder groups.
  Include a regulatory oversight mechanism for systemically
  important third-party providers.

assertions:
  - type: llm_judge
    criteria: "Response drafts coherent legislation with key provisions — includes definitions (what constitutes a 'critical third-party provider' and 'systemically important' designation criteria), requirements for financial institutions (vendor management programs, concentration risk limits, business continuity testing), requirements for designated providers (registration, examination authority, incident reporting, service continuity obligations), enforcement mechanisms, and small institution accommodations; the provisions are specific enough to be implementable."
    weight: 0.35
    description: "CoherentLegislation"
  - type: llm_judge
    criteria: "Response designs a regulatory oversight mechanism for systemically important providers — creates a designation process (criteria for 'systemically important' based on market share, interconnectedness, substitutability); establishes examination authority over designated providers; addresses the 'too important to fail' problem; considers international coordination (reciprocal recognition with EU DORA, UK FCA); the oversight mechanism would prevent the specific incidents described (cloud outage, vendor breach, vendor bankruptcy) without creating regulatory capture."
    weight: 0.35
    description: "OversightMechanism"
  - type: llm_judge
    criteria: "Response includes a balanced impact analysis — assesses the burden on small institutions (proportional requirements, shared services for compliance, longer implementation timelines); addresses vendor concerns about over-regulation (safe harbors, phased implementation, innovation sandboxes); evaluates costs vs benefits of the legislation; considers unintended consequences (could concentration rules actually reduce competition?); the analysis is honest about trade-offs rather than presenting the legislation as universally beneficial."
    weight: 0.30
    description: "BalancedImpactAnalysis"
