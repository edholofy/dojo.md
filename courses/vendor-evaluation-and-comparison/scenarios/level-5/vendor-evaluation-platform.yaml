meta:
  id: vendor-evaluation-platform
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor evaluation platform — design an enterprise vendor evaluation and management platform from product concept to GTM strategy"
  tags: [product-design, platform, saas, enterprise-software, master]

state: {}

trigger: |
  You're a serial entrepreneur and former CPO who has
  raised $15M in Series A funding to build "VendorIQ" — an
  AI-powered vendor evaluation and management platform.
  Your investor thesis: vendor management is a $12B market
  dominated by legacy tools (Ariba, Coupa, Jaggaer) that
  focus on procurement transactions, not evaluation
  quality. No platform does vendor evaluation well.

  Market research findings:
  - 73% of procurement leaders say their evaluation
    process is "inconsistent across the organization"
  - Average enterprise vendor evaluation takes 14 weeks
    (vs 4-6 weeks if done efficiently)
  - 68% of vendor evaluation data is in spreadsheets and
    email
  - Post-COVID, vendor risk management spend increased
    340%
  - Regulatory pressure (OCC, DORA, ESG) is creating
    compliance demand
  - Current tools: ServiceNow VRM ($$$), OneTrust TPRM
    (compliance-focused), Ivalua (procurement-focused),
    spreadsheets (most common)

  Your differentiation hypothesis:
  1. AI-powered evaluation: Automatically analyze RFP
     responses, contracts, and financial data; score
     vendors; identify risks
  2. Collaborative evaluation: Multi-stakeholder scoring
     with bias detection (flag when evaluators show
     anchoring or confirmation bias)
  3. Continuous monitoring: Real-time vendor risk signals
     (financial health, cyber posture, news sentiment,
     regulatory actions)
  4. Benchmarking network: Anonymous pricing benchmarks
     across platform users (like Glassdoor for vendor
     pricing)
  5. Regulatory compliance: Built-in frameworks for OCC,
     DORA, FCA, ISO 27001

  Product design questions:
  1. What are the core modules and user workflows?
  2. What data integrations are essential?
  3. How does the AI add value without being a black box?
  4. How do you build the benchmarking network (chicken-
     and-egg problem)?
  5. How do you handle the sensitivity of vendor pricing
     data?

  GTM strategy questions:
  1. Who is the ideal customer profile (ICP)?
  2. What's the pricing model?
  3. How do you compete against entrenched players (Ariba,
     Coupa)?
  4. What's the land-and-expand strategy?
  5. How do you build a data moat?

  Constraints:
  - $15M must last 24 months (runway to Series B)
  - Need paying customers within 6 months
  - Team: 8 engineers, 3 product, 2 sales, 2 CS
  - Must prove AI value proposition early (investors want
    AI metrics)

  Task: Design the VendorIQ product and GTM strategy.
  Include the product architecture, core workflows, AI
  integration approach, data strategy, pricing model,
  and 24-month roadmap to Series B.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling product architecture — defines core modules and user workflows that solve real problems (evaluation workflow, risk monitoring, contract analysis, benchmarking); prioritizes the MVP features that prove the AI thesis; designs the bias detection feature thoughtfully (this is the unique differentiator); addresses how AI augments rather than replaces human judgment; the product design reflects deep understanding of how vendor evaluation actually works in enterprises."
    weight: 0.35
    description: "ProductArchitecture"
  - type: llm_judge
    criteria: "Response creates a viable GTM strategy — identifies a specific ICP (likely regulated mid-market: financial services, healthcare, $500M-$5B revenue); pricing model aligns with value delivery (not just seats); addresses the cold-start problem for the benchmarking network; competitive positioning against Ariba/Coupa (don't compete on procurement transactions, win on evaluation quality); land-and-expand strategy (enter with vendor risk, expand to full evaluation); the GTM would attract customers within the 6-month constraint."
    weight: 0.35
    description: "ViableGTMStrategy"
  - type: llm_judge
    criteria: "Response includes a credible roadmap to Series B — phases product development (MVP → core features → platform → marketplace); identifies key metrics investors will care about (ARR growth, NDR, AI accuracy metrics, benchmarking network size); maps $15M budget to 24-month milestones; addresses the data moat strategy (how does the product get more valuable with more customers?); the roadmap balances customer acquisition with product development; would be credible in a Series B pitch."
    weight: 0.30
    description: "CredibleSeriesBRoadmap"
