meta:
  id: vendor-ethics-framework
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor ethics framework — develop an industry-standard ethical framework for vendor evaluation and procurement practices"
  tags: [ethics, responsible-procurement, standards, industry-framework, master]

state: {}

trigger: |
  You're the Chair of the Ethics Committee at the
  Institute for Supply Management (ISM), the world's
  largest procurement professional association (50,000
  members). The ISM board has asked you to develop a
  comprehensive "Ethical Vendor Evaluation Standard" after
  several high-profile procurement ethics failures:

  Recent ethics failures prompting this initiative:

  1. The "Pay-to-Play" Scandal:
  A Fortune 500 company's procurement team was found to
  have a systematic practice of favoring vendors who
  sponsored procurement team events, conferences, and
  training. 40% of contracts over $1M went to vendors
  who spent more on "relationship building" with the
  procurement team. The company settled an SEC
  investigation for $85M.

  2. The Diversity Procurement Fraud:
  A government agency's supplier diversity program was
  exploited — 60% of "diverse vendors" were front
  companies (owned by majority-owned businesses funneling
  contracts through diverse-certified shell companies).
  The agency had no verification process. $200M in
  contracts were misclassified over 5 years.

  3. The Sustainability Greenwashing:
  A consumer goods company published a "100% sustainable
  supply chain" report. Investigation revealed that their
  vendor sustainability assessments were based entirely on
  vendor self-reporting with no verification. 30% of
  "sustainably sourced" materials came from suppliers with
  documented environmental violations.

  4. The AI Bias in Vendor Scoring:
  A financial institution deployed an AI-powered vendor
  evaluation tool that systematically disadvantaged
  vendors from developing countries. The AI was trained
  on historical procurement data that reflected decades
  of preferential treatment for US and European vendors.
  Small and minority-owned businesses were scored 25%
  lower on average.

  5. The Conflict of Interest Network:
  A hospital system's procurement decisions were mapped by
  journalists. They found that 8 of 12 committee members
  had financial relationships (consulting, board seats,
  stock ownership) with vendors they evaluated. $150M in
  annual spend was influenced by undisclosed conflicts.

  Standard requirements:
  - Must be applicable across industries and company sizes
  - Must address both traditional and AI-powered
    procurement
  - Must include verification mechanisms (not just
    aspirational principles)
  - Must be practical enough for a 50-person company and
    rigorous enough for a Fortune 100
  - Must include a certification program for
    organizations
  - Must address global differences in ethics standards

  Task: Develop the comprehensive "ISM Ethical Vendor
  Evaluation Standard." Include ethical principles, specific
  requirements, verification mechanisms, certification
  criteria, and an implementation guide. Address each of
  the 5 failure scenarios with specific preventive
  measures.

assertions:
  - type: llm_judge
    criteria: "Response develops a comprehensive ethics standard — establishes clear ethical principles (transparency, fairness, accountability, independence, due diligence); translates principles into specific, auditable requirements (not vague aspirations); addresses each of the 5 failure scenarios with targeted provisions (gift/entertainment limits, diversity verification, sustainability auditing, AI bias testing, conflict disclosure); the standard is structured like a real professional standard (ISO-like structure with requirements, guidance, and examples)."
    weight: 0.35
    description: "ComprehensiveEthicsStandard"
  - type: llm_judge
    criteria: "Response includes practical verification and certification mechanisms — designs a certification program with levels (self-assessment, third-party audit, continuous monitoring); creates verification procedures for each requirement (how do you verify that conflicts are actually disclosed? how do you audit diversity vendor authenticity?); addresses the AI ethics dimension (bias testing requirements, transparency obligations, human oversight mandates); the verification mechanisms are practical and proportional to company size."
    weight: 0.35
    description: "VerificationMechanisms"
  - type: llm_judge
    criteria: "Response addresses implementation across different contexts — provides scaled requirements for different organization sizes (small company vs enterprise); addresses global differences in ethics standards (gift customs vary culturally, diversity definitions differ by country); includes an implementation guide with templates and tools; considers how to enforce the standard (incentives for compliance, consequences for violation); the standard would be adoptable globally without being so rigid that it's impractical."
    weight: 0.30
    description: "ScalableImplementation"
