meta:
  id: vendor-behavioral-economics
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor behavioral economics — apply behavioral science to understand and improve vendor evaluation decision-making"
  tags: [behavioral-economics, decision-science, bias, psychology, master]

state: {}

trigger: |
  You're a professor of Organizational Decision Science
  at a top business school. A major procurement industry
  association has commissioned you to write a research
  guide: "The Psychology of Vendor Selection: How
  Cognitive Biases Systematically Distort Procurement
  Decisions."

  Your research has identified that vendor evaluation
  decisions are among the most bias-prone decisions in
  organizations. You've studied 500 vendor selection
  processes across 200 companies and identified systematic
  patterns.

  Key research findings to incorporate:

  1. Anchoring in price evaluation:
  - First vendor price seen anchors all subsequent
    evaluations (your data: vendors presenting first
    are 23% more likely to be selected when their price
    is competitive)
  - "Decoy pricing" by vendors: Including a deliberately
    overpriced option to make the preferred option look
    reasonable
  - Scope anchoring: Initial scope estimates anchor
    negotiation even when proven wrong

  2. Status quo bias in vendor retention:
  - Your data: Existing vendors are retained 78% of the
    time even when new vendors score higher in evaluation
  - Switching cost overestimation: Teams estimate
    switching costs at 3x actual costs on average
  - "The devil you know" effect: Known vendor
    imperfections weighted less than unknown vendor risks

  3. Confirmation bias in demos and references:
  - Evaluators who have a preferred vendor (from
    pre-research) rate that vendor's demo 35% higher
  - Reference checks confirm pre-existing preferences
    94% of the time (evaluators unconsciously interpret
    ambiguous information to support their preference)
  - "Halo effect": Strong vendor performance in one area
    inflates scores in unrelated areas

  4. Social proof and authority bias:
  - "Gartner Magic Quadrant" effect: Vendors in the
    "Leaders" quadrant selected 4x more often regardless
    of fit
  - Peer decisions: "If [prestigious company] uses this
    vendor, it must be good"
  - Sales rep charisma: Personable sales reps increase
    vendor scores by an average of 15% independent of
    product quality

  5. Loss aversion in contract negotiation:
  - Fear of making the "wrong choice" leads to longer
    evaluation cycles (average: 40% longer than necessary)
  - Committees add evaluation criteria to feel more
    thorough (diminishing returns after 8-10 criteria)
  - "Analysis paralysis" increases with purchase value —
    $1M+ decisions take 2.3x longer per dollar than $100K
    decisions

  6. Sunk cost fallacy in vendor management:
  - Companies continue investing in failing vendor
    relationships due to prior investment ("We've already
    spent $2M on customizations")
  - Implementation delay tolerance: Teams accept 3x
    schedule overruns before considering termination
  - "We've come too far to switch" — average sunk cost
    tolerance: $500K before action

  Task: Write the research guide (comprehensive paper).
  Document each bias with examples, explain the
  psychological mechanisms, provide debiasing strategies
  for procurement professionals, and design organizational
  interventions that can be implemented at scale. Include
  a bias audit tool that procurement teams can use.

assertions:
  - type: llm_judge
    criteria: "Response documents biases with academic rigor — explains the psychological mechanisms behind each bias (not just naming them); uses the research data provided (23% anchor effect, 78% retention rate, 35% demo inflation, etc.) as evidence; connects each bias to specific vendor evaluation decision points; the analysis would be credible in an academic or professional setting; distinguishes between biases that can be reduced and those that must be structurally mitigated."
    weight: 0.35
    description: "AcademicRigor"
  - type: llm_judge
    criteria: "Response provides practical debiasing strategies — proposes specific techniques for each bias (e.g., blind scoring for price anchoring, mandatory structured evaluation for demo assessment, pre-commitment to evaluation criteria before seeing vendor responses); the strategies are implementable by procurement teams (not just 'be aware of your biases'); includes both individual-level techniques (checklists, structured decision protocols) and organizational-level interventions (process design, governance)."
    weight: 0.35
    description: "PracticalDebiasingStrategies"
  - type: llm_judge
    criteria: "Response designs a bias audit tool — creates a practical instrument that procurement teams can use to assess their own evaluation processes for bias; includes specific questions or checks for each bias type; can be applied before, during, and after vendor evaluations; produces actionable insights (not just 'you might be biased'); the tool would be adopted by procurement organizations because it's practical and not overly academic."
    weight: 0.30
    description: "BiasAuditTool"
