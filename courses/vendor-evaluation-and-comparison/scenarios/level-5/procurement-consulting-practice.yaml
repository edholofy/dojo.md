meta:
  id: procurement-consulting-practice
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Procurement consulting practice — design a boutique consulting firm specializing in strategic vendor evaluation and procurement transformation"
  tags: [consulting, practice-building, methodology, go-to-market, master]

state: {}

trigger: |
  You're a former Global CPO with 25 years of procurement
  experience across financial services, technology, and
  healthcare. You're launching a boutique consulting firm,
  "Procurement Reimagined," that will focus exclusively on
  helping mid-market companies ($500M-$5B revenue)
  transform their vendor evaluation and management
  capabilities.

  Market opportunity:
  - Mid-market companies typically lack sophisticated
    procurement — 70% don't have a dedicated CPO
  - Big consulting firms (McKinsey, Deloitte) focus on
    Fortune 500 — mid-market is underserved
  - Regulatory pressure (DORA, OCC, ESG reporting) is
    forcing mid-market companies to formalize vendor
    management
  - AI disruption is creating demand for new evaluation
    frameworks
  - Total addressable market: 8,000 companies in the US
    alone

  Your competitive advantages:
  - Deep practitioner experience (not just consulting)
  - Proprietary vendor evaluation methodology developed
    over 25 years
  - Network of former procurement leaders who can serve
    as fractional CPOs
  - Understanding of regulated industries (financial
    services, healthcare)

  Design requirements:

  1. Service offerings (differentiated from big firms):
  - What specific services will you offer?
  - How do you price them (project-based, retainer,
    outcome-based)?
  - What's your typical engagement look like?

  2. Proprietary methodology:
  - Codify your vendor evaluation methodology into a
    replicable framework
  - Create maturity model for assessing procurement
    organizations
  - Design a rapid assessment tool (how do you diagnose
    a client's procurement health in 2 weeks?)

  3. Technology-enabled delivery:
  - What technology platform or tools would you build or
    license to deliver your methodology?
  - How do you scale beyond founder-dependent delivery?
  - How do you incorporate AI into your client offerings?

  4. Go-to-market:
  - First 10 clients: How do you get them?
  - Content strategy: How do you build thought leadership?
  - Partnerships: Who do you partner with?
  - Revenue target: $3M year 1, $8M year 3

  5. Team:
  - Who are your first 5 hires?
  - How do you build a bench of consultants?
  - Fractional CPO model: How does it work?

  Task: Create the comprehensive business plan for
  Procurement Reimagined. Include all 5 design elements
  with enough specificity that you could present this to
  investors or partners.

assertions:
  - type: llm_judge
    criteria: "Response creates differentiated service offerings — defines services that are clearly different from big consulting firms (practical, implementation-focused, not just strategy decks); pricing models align with mid-market budgets; service tiers allow entry points at different commitment levels; engagement structures reflect real procurement transformation timelines; the offerings would attract mid-market companies who feel underserved by big firms and overwhelmed by the complexity of modern vendor management."
    weight: 0.35
    description: "DifferentiatedServices"
  - type: llm_judge
    criteria: "Response codifies a proprietary methodology — creates a vendor evaluation framework that's replicable across clients; includes a procurement maturity model with clear levels and assessment criteria; designs a rapid diagnostic approach (2-week assessment); the methodology is specific enough to train new consultants on, not just generic advice; includes a tool or template for the maturity assessment; would differentiate the firm from competitors who don't have a codified approach."
    weight: 0.35
    description: "ProprietaryMethodology"
  - type: llm_judge
    criteria: "Response includes a credible go-to-market and financial plan — specific strategy for first 10 clients (leveraging personal network, industry events, content marketing); realistic revenue path to $3M year 1 (this means roughly 12-15 engagements at $200-250K); content strategy that builds thought leadership (articles, speaking, webinars); hiring plan that scales delivery beyond the founder; the business plan is realistic about startup challenges and doesn't assume frictionless growth."
    weight: 0.30
    description: "CredibleBusinessPlan"
