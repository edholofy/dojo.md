meta:
  id: vendor-cross-industry-research
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor cross-industry research — conduct a landmark study on vendor evaluation maturity across industries and identify best practices"
  tags: [research, cross-industry, benchmarking, best-practices, master]

state: {}

trigger: |
  You're the Research Director at a global procurement
  research firm. You're leading the "State of Vendor
  Evaluation 2026" — the definitive annual report that
  500+ CPOs reference when benchmarking their programs.
  This year's report will be based on data from 1,200
  organizations across 8 industries in 20 countries.

  Survey data highlights (from 1,200 respondents):

  Maturity distribution:
  - Level 1 (Ad hoc): 28% — No formal process, decisions
    based on relationships and price
  - Level 2 (Developing): 35% — Some standard processes
    but inconsistently applied
  - Level 3 (Defined): 22% — Standardized processes, some
    technology, basic risk management
  - Level 4 (Managed): 11% — Data-driven evaluation,
    continuous monitoring, integrated risk management
  - Level 5 (Optimized): 4% — AI-augmented, predictive,
    strategic vendor management as competitive advantage

  Industry breakdown (average maturity score 1-5):
  - Financial services: 3.4 (highest — driven by
    regulation)
  - Healthcare: 2.8 (improving due to HIPAA/FDA pressure)
  - Technology: 2.7 (surprising — good at buying tech,
    bad at managing vendors)
  - Manufacturing: 2.6 (strong in supply chain, weak in
    services procurement)
  - Retail: 2.3 (merchandise procurement mature, IT/
    services immature)
  - Government: 2.1 (process-heavy but outcome-poor)
  - Education: 1.9 (minimal procurement function)
  - Non-profit: 1.6 (lowest — resource constraints)

  Key findings from the data:

  1. Correlation analysis:
  - Companies at maturity Level 4+ achieve 8.2% savings
    on vendor spend vs 2.1% for Level 1
  - Vendor-related risk incidents: Level 4+ = 1.3/year
    vs Level 1 = 7.8/year
  - Evaluation cycle time: Level 4+ = 4.2 weeks vs
    Level 1 = 18.6 weeks

  2. AI adoption:
  - 12% currently using AI in vendor evaluation
  - 45% planning to adopt within 2 years
  - Top AI use cases: Contract analysis (38%), risk
    monitoring (29%), RFP scoring (22%), price
    benchmarking (11%)
  - Barrier: "We don't trust AI decisions for high-value
    selections" (67%)

  3. ESG integration:
  - 34% include ESG criteria in vendor evaluation
  - But only 8% verify ESG claims independently
  - 52% say ESG is "important but we don't know how to
    measure it"
  - Companies with ESG integration report 15% lower
    supply chain disruptions

  4. Biggest challenges (ranked):
  1. Stakeholder alignment (cited by 78%)
  2. Data quality (72%)
  3. Technology gaps (68%)
  4. Talent shortage (65%)
  5. Regulatory compliance (58%)
  6. Vendor cooperation (54%)

  5. Best practices from Level 5 organizations:
  - Center-led procurement with category expertise
  - Continuous vendor monitoring (not annual reviews)
  - AI-augmented evaluation with human decision authority
  - Cross-functional evaluation committees with trained
    evaluators
  - Vendor development programs (invest in improving
    vendors, not just scoring them)
  - Data-driven negotiation with real-time benchmarks

  Task: Write the executive summary and key findings
  section of the "State of Vendor Evaluation 2026" report.
  Include analysis of each major finding, cross-industry
  comparisons, trend analysis, and actionable
  recommendations for each maturity level. The report
  should be authoritative enough to be cited by CPOs in
  board presentations.

assertions:
  - type: llm_judge
    criteria: "Response presents findings with analytical depth — goes beyond reporting numbers to interpret what they mean; explains why financial services leads in maturity (regulation) and why technology lags (culture of building vs buying); identifies the most significant correlations (maturity → savings, maturity → risk reduction); highlights surprising findings; the analysis would give CPOs genuine insights, not just data tables; uses the data to tell a story about the state of vendor evaluation."
    weight: 0.35
    description: "AnalyticalDepth"
  - type: llm_judge
    criteria: "Response provides actionable recommendations by maturity level — doesn't just say 'get better'; gives specific next steps for each level (Level 1: implement basic evaluation framework and vendor register; Level 2: standardize processes and add risk assessment; Level 3: invest in technology and continuous monitoring; Level 4: adopt AI augmentation and predictive analytics); recommendations are achievable (not 'jump from Level 1 to Level 5'); includes resource estimates for advancing one maturity level."
    weight: 0.35
    description: "ActionableRecommendations"
  - type: llm_judge
    criteria: "Response identifies meaningful trends and predictions — analyzes AI adoption trajectory and what it means for vendor evaluation (productivity gains but trust gap); ESG integration gap (34% include but 8% verify — the next frontier); the stakeholder alignment challenge (why this is #1 and what to do about it); predictions for the next 3-5 years of vendor evaluation; the trend analysis would help CPOs prepare for emerging challenges rather than just react; the report tone is authoritative and evidence-based."
    weight: 0.30
    description: "TrendAnalysis"
