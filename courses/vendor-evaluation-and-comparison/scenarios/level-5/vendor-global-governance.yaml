meta:
  id: vendor-global-governance
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor global governance — design the vendor governance framework for a Fortune 50 multinational undergoing digital transformation"
  tags: [global-governance, fortune-50, digital-transformation, enterprise-architecture, master]

state: {}

trigger: |
  You're the Global Chief Procurement Officer at a Fortune
  50 industrial conglomerate (120,000 employees, $45B
  revenue, operations in 60 countries). The CEO has
  launched "Transform 2030" — a $2B digital transformation
  initiative — and you must design the vendor governance
  framework to manage $800M in new technology vendor
  relationships over 5 years, while also rationalizing
  $3.2B in existing vendor spend.

  Company structure:
  - 8 business groups (aerospace, energy, healthcare
    equipment, industrial automation, transportation,
    financial services, digital solutions, corporate
    services)
  - Each BG has its own P&L, CIO, and procurement team
  - Current total vendor spend: $18B (materials $12B,
    services $4B, technology $2B)
  - Technology vendor count: 4,800 (yes, 4,800)
  - No two BGs use the same ERP (SAP, Oracle, Microsoft
    Dynamics, proprietary, and 2 legacy systems)

  Transform 2030 technology decisions:
  - Cloud strategy: Multi-cloud (AWS primary, Azure for
    Microsoft workloads, GCP for AI/ML)
  - Data platform: Databricks (selected after 18-month
    evaluation)
  - ERP consolidation: SAP S/4HANA for all BGs (7-year
    program, $600M)
  - AI/ML: Partnership with 3 AI vendors + internal
    capabilities
  - Cybersecurity: Consolidation from 23 vendors to 5
  - Digital workplace: Microsoft 365 + ServiceNow

  Governance challenges:
  1. BG autonomy vs enterprise standards (BG Presidents
     are essentially mini-CEOs)
  2. Multiple regulatory environments (ITAR for aerospace,
     FDA for healthcare equipment, SOX for financial
     services, GDPR/DORA for EU operations)
  3. Existing vendor relationships worth $3.2B — can't
     disrupt while transforming
  4. 4,800 technology vendors need rationalization (target:
     1,200 in 5 years)
  5. M&A activity: Company acquires 3-5 companies annually
     (each brings more vendors)
  6. Geopolitical constraints: ITAR prohibits certain
     foreign vendors for aerospace, China operations
     require local vendors
  7. Labor considerations: 12 countries have works councils
     or unions that must approve vendor changes affecting
     employees
  8. Board expectation: $400M in vendor-related savings
     over 5 years

  Current governance state:
  - Decentralized procurement (each BG independent)
  - No enterprise vendor management technology
  - No standard evaluation methodology
  - No cross-BG vendor visibility
  - Board receives minimal procurement reporting
  - 3 recent vendor failures caused $50M in combined
    business impact

  Task: Design the enterprise vendor governance framework
  for this conglomerate. Include the governance model,
  operating structure, technology architecture, vendor
  rationalization approach, and implementation roadmap.
  This framework must work across 8 business groups, 60
  countries, and multiple regulatory regimes while
  delivering $400M in savings.

assertions:
  - type: llm_judge
    criteria: "Response designs a governance model appropriate for a Fortune 50 conglomerate — creates a federated governance structure that respects BG autonomy while establishing enterprise standards; defines clear decision rights (what's centralized: strategic sourcing, enterprise contracts, risk management; what's BG-level: BG-specific vendors, day-to-day purchasing); establishes governance bodies (enterprise procurement council, BG procurement leads, category councils); the governance model would function in a complex organization where BG Presidents have significant power."
    weight: 0.35
    description: "ConglomerateGovernanceModel"
  - type: llm_judge
    criteria: "Response addresses the vendor rationalization challenge (4,800 to 1,200) — creates a phased rationalization approach (categorize, prioritize, consolidate, monitor); addresses the M&A vendor onboarding problem (standardized process for integrating acquired companies' vendors); considers regulatory constraints (ITAR, FDA, GDPR prevent certain consolidations); quantifies savings from rationalization with realistic estimates; acknowledges that vendor reduction has operational risks and addresses change management; the approach would actually reduce vendor count while maintaining operational continuity."
    weight: 0.35
    description: "VendorRationalization"
  - type: llm_judge
    criteria: "Response creates a credible implementation roadmap toward $400M in savings — phases the transformation over 5 years aligned with Transform 2030; maps savings sources to specific initiatives (vendor consolidation, volume leverage, demand management, process automation); accounts for investment required (technology, headcount, change management); considers the interaction with the SAP consolidation program; includes governance for tracking and reporting savings; the roadmap is achievable given the organizational complexity and would satisfy the board's expectations."
    weight: 0.30
    description: "ImplementationRoadmap"
