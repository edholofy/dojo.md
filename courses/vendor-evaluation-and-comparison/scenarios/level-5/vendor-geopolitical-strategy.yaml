meta:
  id: vendor-geopolitical-strategy
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor geopolitical strategy — navigate vendor evaluation and supply chain decisions amid geopolitical fragmentation"
  tags: [geopolitics, supply-chain, sovereignty, strategic, master]

state: {}

trigger: |
  You're the Chief Strategy Officer at a 20,000-person
  global technology company ($8B revenue) with operations
  in 35 countries. The board has asked you to develop a
  "Vendor Geopolitical Strategy" after several disruptions:

  Recent disruptions:
  - US export controls on AI chips forced you to redesign
    products for China market (12-month delay, $40M cost)
  - EU GDPR/DORA requirements forced you to repatriate
    data from US cloud providers for EU operations
  - India's data localization rules required building
    local data centers ($25M investment)
  - Sanctions on Russia forced you to terminate 15 vendor
    relationships and find alternatives in 30 days
  - Taiwan strait tensions have your board worried about
    semiconductor supply chain concentration

  Your vendor landscape:
  - Total vendor spend: $1.8B annually
  - US-headquartered vendors: 55% of spend
  - China-connected vendors: 12% of spend (components,
    manufacturing)
  - EU vendors: 18% of spend
  - India vendors: 8% of spend (IT services, BPO)
  - Other: 7%

  Key vendor geopolitical exposures:

  1. Cloud infrastructure:
  - AWS (US): Primary cloud, $120M/year
  - Alibaba Cloud (China): Used for China operations,
    $15M/year
  - EU requirement: "Sovereign cloud" for regulated data
  - Risk: US CLOUD Act allows US government access to
    data on US clouds anywhere in the world (EU concern)

  2. Semiconductor supply:
  - TSMC (Taiwan): 80% of your custom chips
  - Samsung (South Korea): 15%
  - Intel (US): 5%
  - Risk: Taiwan contingency would disrupt 80% of chip
    supply

  3. Software development:
  - Infosys/TCS (India): $85M/year in IT services
  - Epam (originally Belarus/Ukraine, now distributed):
    $30M/year
  - Risk: Geopolitical events in these regions affect
    service continuity

  4. Manufacturing:
  - Foxconn (Taiwan/China): Assembly of 3 product lines
  - Vietnamese manufacturers: 2 product lines
  - Mexico: Nearshore assembly, 1 product line
  - Risk: US-China tensions could disrupt Foxconn
    operations

  5. AI/ML:
  - OpenAI/Anthropic (US): Core AI integration
  - Chinese AI alternatives exist but are subject to
    export controls and data restrictions
  - EU AI Act imposes different requirements
  - Risk: AI regulation diverging across jurisdictions

  Board questions:
  1. How do we evaluate vendors through a geopolitical
     lens without being paralyzed by uncertainty?
  2. Should we pursue "geo-diversification" for critical
     vendors? At what cost premium?
  3. How do we build flexibility to respond quickly when
     the next geopolitical event hits?
  4. What's the right balance between efficiency (single
     global vendors) and resilience (regional vendors)?

  Task: Develop the comprehensive vendor geopolitical
  strategy. Include a geopolitical risk assessment
  framework for vendor evaluation, geo-diversification
  recommendations for each critical category, cost-benefit
  analysis of resilience strategies, and a governance
  model for rapid response to geopolitical events.

assertions:
  - type: llm_judge
    criteria: "Response creates a geopolitical risk assessment framework for vendors — defines geopolitical risk dimensions (regulatory divergence, sanctions exposure, data sovereignty, supply chain disruption, IP/technology transfer risk); creates a vendor-level assessment methodology (not just country-level); applies the framework to the specific vendor exposures identified (TSMC, AWS, Foxconn, etc.); the framework is practical enough for procurement teams to use in vendor evaluation, not just a geopolitical analysis."
    weight: 0.35
    description: "GeopoliticalRiskFramework"
  - type: llm_judge
    criteria: "Response provides specific geo-diversification recommendations — addresses each critical category (cloud: sovereign cloud strategy; semiconductors: diversification beyond TSMC; manufacturing: nearshoring acceleration; IT services: multi-region sourcing; AI: multi-model/multi-provider approach); quantifies the cost premium for resilience; prioritizes which diversifications to pursue based on probability × impact; acknowledges that complete diversification is impossible and focuses on the highest-risk dependencies."
    weight: 0.35
    description: "GeoDiversificationStrategy"
  - type: llm_judge
    criteria: "Response designs a governance model for rapid geopolitical response — creates a decision framework for when geopolitical events occur (who decides, how fast, what authority levels); establishes scenario playbooks (Taiwan contingency, new sanctions regime, data sovereignty rule change); includes vendor contract provisions that enable flexibility (geographic portability clauses, force majeure updates, termination rights for sanctions); the governance model would enable the company to respond in days, not months, to the next geopolitical disruption."
    weight: 0.30
    description: "RapidResponseGovernance"
