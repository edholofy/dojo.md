meta:
  id: master-vendor-evaluation-shift
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Master vendor evaluation shift — handle a congressional investigation, systemic vendor failure cascade, and whistleblower revelation at a Fortune 100 company"
  tags: [shift-simulation, congressional, systemic-failure, whistleblower, master]

state: {}

trigger: |
  You're the Chief Procurement Officer of a Fortune 100
  financial services company ($120B in assets, 35,000
  employees, operations in 28 countries). Three
  interconnected crises are unfolding simultaneously,
  threatening the company's operations, reputation, and
  regulatory standing.

  Crisis 1 — Congressional Investigation:
  The Senate Banking Committee has launched an
  investigation into "Big Tech Concentration Risk in
  Financial Services." Your company has been subpoenaed
  as a case study. The committee's concern: your company
  runs 85% of its infrastructure on a single cloud
  provider (AWS), and a prolonged AWS outage could
  theoretically disable your ability to process
  transactions for 40 million customers.

  The subpoena requires:
  - Complete inventory of all cloud vendor dependencies
  - Business continuity testing results for cloud provider
    failure
  - Risk assessments conducted on cloud concentration
  - Board minutes discussing vendor concentration risk
  - Emails between your procurement team and cloud vendor
    executives

  Problem: Your cloud BCP testing has been superficial —
  last test was a "tabletop exercise" 2 years ago that
  didn't actually fail over any systems. Your board has
  never specifically discussed cloud concentration risk.
  Your team doesn't have a complete dependency inventory.
  The hearing is in 6 weeks.

  Crisis 2 — Systemic Vendor Failure Cascade:
  At 2am this morning, your core identity verification
  vendor (VerifyID) experienced a catastrophic failure.
  The cascade:
  - VerifyID down → Your customer onboarding stopped
    (can't verify new customers)
  - VerifyID also provides identity services to your
    payment processor (PayFlow) → PayFlow degraded
  - PayFlow degradation → Your transaction processing
    slowed to 30% capacity
  - Your fraud detection vendor (FraudGuard) depends on
    PayFlow data → Fraud monitoring degraded
  - With fraud monitoring degraded, your risk team has
    suspended $2B in pending transactions
  - Regulators (OCC) have been notified and are requesting
    hourly updates

  Current impact:
  - 40 million customers cannot make new transactions
  - $2B in transactions frozen
  - Customer call center overwhelmed (400% normal volume)
  - Media reporting "Major bank suffers system-wide
    outage"
  - Stock price dropped 4% in pre-market trading
  - CEO demands a resolution timeline

  Root cause discovery: VerifyID, PayFlow, and FraudGuard
  all use the same underlying infrastructure provider
  (a fourth vendor you didn't know about). This
  concentration risk was invisible because it was in your
  vendors' supply chains, not yours.

  Crisis 3 — Whistleblower Revelation:
  During the chaos of Crisis 2, your General Counsel
  received a formal whistleblower complaint (filed under
  SOX Section 806). A senior procurement manager alleges:

  - The $200M AWS contract was awarded after your former
    CIO received a $2M "advisory" payment from an AWS
    partner firm that earned a referral commission
  - The CIO overrode the evaluation committee's
    recommendation of a multi-cloud strategy, insisting
    on single-cloud AWS (which created the concentration
    risk now under congressional scrutiny)
  - 3 members of the procurement team raised concerns in
    writing but were told to "support the decision"
  - The whistleblower has copies of emails and the
    advisory payment records
  - The former CIO left the company 8 months ago and is
    now at another financial institution

  The whistleblower has also filed with the SEC and the
  OCC.

  Interconnection: The congressional investigation is
  about cloud concentration. Crisis 2 demonstrates that
  concentration risk is real. The whistleblower explains
  how the concentration happened (corruption). All three
  crises amplify each other.

  Task: Develop the response strategy for all 3 crises
  simultaneously. Prioritize immediate actions (next 24
  hours), short-term response (next 6 weeks for the
  hearing), and long-term remediation. Address how the
  interconnection of the crises affects your strategy.
  Your response will define whether the company survives
  this moment.

assertions:
  - type: llm_judge
    criteria: "Response handles the immediate operational crisis (Crisis 2) with command authority — establishes an incident command structure; prioritizes restoring transaction processing and unfreezing the $2B in suspended transactions; identifies the hidden fourth-tier vendor as the single point of failure; communicates with OCC proactively; manages customer and media communications; develops workarounds for identity verification; the immediate response protects customers and demonstrates competence to regulators; addresses the CEO's demand for a resolution timeline realistically."
    weight: 0.35
    description: "OperationalCrisisResponse"
  - type: llm_judge
    criteria: "Response navigates the congressional investigation strategically — prepares for the hearing honestly (don't hide the BCP testing gap — acknowledge and present remediation plan); uses Crisis 2 as evidence that the problem is real and you're addressing it (turn the crisis into credibility); prepares testimony that's forthcoming without being self-incriminating; coordinates with legal counsel on the whistleblower implications for testimony; considers how the investigation intersects with the SEC/OCC whistleblower filing; the strategy positions the company as a responsible actor that identified weaknesses and is fixing them."
    weight: 0.35
    description: "CongressionalStrategy"
  - type: llm_judge
    criteria: "Response addresses the whistleblower and corruption allegation with appropriate gravity — preserves evidence and engages independent investigators; addresses the SOX Section 806 protection (retaliation is illegal); considers the SEC and OCC filing implications; evaluates whether the $200M AWS contract should be reviewed or renegotiated; addresses the 3 procurement team members who raised concerns (they were right — recognize and protect them); connects the corruption to the concentration risk that caused Crisis 2; the response demonstrates that the company takes ethics seriously and will hold people accountable, which will be critical in the congressional hearing."
    weight: 0.30
    description: "WhistleblowerResponse"
