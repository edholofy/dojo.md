meta:
  id: procurement-thought-leadership
  level: 5
  course: vendor-evaluation-and-comparison
  type: output
  description: "Procurement thought leadership — write a landmark article on the future of vendor evaluation in the age of AI and platform economics"
  tags: [thought-leadership, future-of-procurement, ai, platform-economics, master]

state: {}

trigger: |
  You're a globally recognized procurement strategist and
  former CPO of a Fortune 100 company. Harvard Business
  Review has commissioned you to write a feature article:
  "The Death of the RFP: How AI, Platform Economics, and
  Geopolitical Fragmentation Are Rewriting Vendor
  Evaluation."

  Your thesis: The traditional vendor evaluation model
  (RFP → evaluation matrix → selection → contract) was
  designed for a world of stable supply chains, clear
  vendor categories, and predictable technology. That
  world no longer exists. You need to propose what
  replaces it.

  Key trends to address:

  1. AI-powered procurement:
  - AI can now analyze vendor proposals in minutes (not
    weeks)
  - Predictive models can forecast vendor financial
    distress 12 months in advance
  - Natural language AI can review contracts and identify
    risks automatically
  - But: AI can also be gamed by vendors who optimize for
    AI evaluation criteria
  - Question: Does AI make vendor evaluation better, or
    does it just make it faster?

  2. Platform economics:
  - Vendors are no longer standalone — they're nodes in
    platform ecosystems (AWS/Azure/GCP, Salesforce/
    HubSpot, etc.)
  - Evaluating a vendor now means evaluating its
    ecosystem
  - Switching costs are no longer just contractual —
    they're architectural
  - Winner-take-all dynamics mean fewer vendor options in
    critical categories
  - Question: How do you evaluate vendors when the real
    decision is which platform ecosystem to commit to?

  3. Geopolitical fragmentation:
  - US-China technology decoupling
  - EU digital sovereignty regulations (DORA, AI Act,
    GDPR, Data Act)
  - India's data localization requirements
  - Russia/Ukraine disrupting supply chains
  - Question: How does vendor evaluation change when
    geography determines technology access?

  4. Sustainability integration:
  - Scope 3 reporting making vendor emissions data
    mandatory
  - EU CSRD/CSDDD requiring supply chain due diligence
  - ESG becoming a procurement criterion, not just a
    reporting exercise
  - Question: How do you weight sustainability against
    cost and capability?

  5. The blurring of build vs buy:
  - Open-source + cloud services + composable architecture
    = custom solutions from vendor components
  - Low-code platforms let business users "build" without
    engineering
  - API-first vendors enable "best of breed" assemblies
  - Question: Is "vendor evaluation" even the right
    frame when you're assembling solutions from pieces?

  Task: Write the HBR article (3,000-4,000 words).
  Diagnose why traditional vendor evaluation is failing,
  propose a new framework for the emerging landscape, and
  include practical recommendations that CPOs can
  implement. Use specific examples and data points to
  support your arguments.

assertions:
  - type: llm_judge
    criteria: "Response presents a compelling, original thesis — goes beyond 'procurement is changing' to articulate a specific vision of what replaces traditional vendor evaluation; addresses all 5 trends with interconnected analysis (not 5 separate sections); uses concrete examples and data to support arguments; the article would be intellectually stimulating for senior procurement leaders and would advance the discourse, not just summarize existing thinking."
    weight: 0.35
    description: "CompellingThesis"
  - type: llm_judge
    criteria: "Response proposes a new evaluation framework — moves beyond criticism to construct something new; the framework addresses platform ecosystem evaluation (not just vendor evaluation), continuous assessment (not point-in-time selection), geopolitical risk integration, sustainability weighting, and the build-vs-buy spectrum; the framework is specific enough that a CPO could adapt it, not just a set of principles; includes practical implementation guidance."
    weight: 0.35
    description: "NewFrameworkProposal"
  - type: llm_judge
    criteria: "Response is written at HBR quality — appropriate tone (authoritative, evidence-based, forward-looking), proper structure (compelling opening, structured argument, practical conclusion), uses real-world examples or realistic case studies, acknowledges counterarguments and complexity, avoids jargon and buzzwords; the article would be credible coming from a former Fortune 100 CPO; it balances academic rigor with practical relevance."
    weight: 0.30
    description: "HBRWritingQuality"
