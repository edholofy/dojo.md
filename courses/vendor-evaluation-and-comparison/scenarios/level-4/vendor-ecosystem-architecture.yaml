meta:
  id: vendor-ecosystem-architecture
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor ecosystem architecture — design a strategic vendor ecosystem for a platform business model"
  tags: [ecosystem, platform, strategic, architecture, expert]

state: {}

trigger: |
  You're the Chief Strategy Officer at a 4,000-person
  healthcare technology company that's transitioning from
  selling individual products to operating a healthcare
  data platform. The CEO wants you to design the vendor
  ecosystem strategy — determining which capabilities to
  build, which to partner for, and how to create a vendor
  ecosystem that becomes a competitive moat.

  Company context:
  - Current products: EHR, practice management, billing
    (all built in-house)
  - Revenue: $600M, 35% growth
  - Customer base: 15,000 healthcare practices, 200
    hospital systems
  - Engineering: 800 engineers, stretched thin
  - Platform vision: Open healthcare data platform that
    third-party apps integrate with

  Capabilities needed for the platform:

  Tier 1 — Core (must control):
  - Healthcare data model and API layer
  - Identity and access management
  - Compliance engine (HIPAA, HITRUST)
  - Core EHR/PM/billing (existing products)

  Tier 2 — Strategic (build or deep partnership):
  - Telehealth integration
  - AI/ML for clinical decision support
  - Patient engagement (portal, messaging, scheduling)
  - Revenue cycle management optimization
  - Interoperability (FHIR, HL7, care quality measures)

  Tier 3 — Ecosystem (marketplace/partners):
  - Specialty-specific workflows (dermatology, cardiology,
    etc.)
  - Medical device integrations
  - Lab result integration
  - Prescription management
  - Population health analytics
  - Patient financial tools (payment plans, eligibility)

  Current vendor relationships to evaluate:
  1. TeleHealth vendor (VirtualCare): $2M/year, white-
     label embedded in your product, good quality but
     vendor wants to go direct to your customers
  2. AI vendor (ClinicalAI): $3M/year, provides clinical
     NLP. Raised Series D, likely acquisition target.
     Your data trains their models (shared IP concern)
  3. Interoperability vendor (HealthConnect): $1.5M/year,
     provides FHIR APIs. Small company (40 people),
     essential capability, they're your only option
  4. Payment platform (PayHealth): $800K/year, patient
     payment processing. Competitor just acquired a
     similar company

  Strategic questions:
  - Which Tier 2 capabilities should you acquire vs
    partner vs build?
  - How do you prevent vendors from competing with you?
  - How do you handle single-source dependency
    (HealthConnect)?
  - Should you acquire any current vendors?
  - How do you build an app marketplace that attracts
    third-party developers?

  Task: Design the vendor ecosystem strategy addressing
  all strategic questions. Include partnership models,
  acquisition recommendations, competitive protection
  strategies, and the marketplace architecture.

assertions:
  - type: llm_judge
    criteria: "Response provides a strategic framework for build/partner/acquire decisions — applies clear criteria to each Tier 2 capability (strategic importance, competitive differentiation, vendor market maturity, build feasibility given engineering constraints); recommends specific actions for each (e.g., acquire interoperability capability to eliminate single-source risk, build AI in-house to protect data IP, deep-partner for telehealth); the framework is principled and reusable, not just ad hoc decisions."
    weight: 0.35
    description: "StrategicFramework"
  - type: llm_judge
    criteria: "Response addresses competitive dynamics and vendor risks — develops strategies for preventing VirtualCare from going direct to customers (contractual restrictions, deeper integration, potential acquisition); addresses ClinicalAI's shared IP concern and acquisition risk; creates a plan for HealthConnect single-source dependency (develop alternative, acquire, or build in-house); considers the competitor's acquisition of a payment company; the strategy anticipates vendor competitive moves."
    weight: 0.35
    description: "CompetitiveDynamics"
  - type: llm_judge
    criteria: "Response designs a credible marketplace/ecosystem strategy — defines the value proposition for third-party developers (API access, customer distribution, revenue share model); establishes governance (app certification, data access controls, quality standards); addresses the platform tension (you want ecosystem partners but also compete with them); considers how to build network effects; the marketplace design would attract developers while protecting your platform business."
    weight: 0.30
    description: "MarketplaceStrategy"
