meta:
  id: expert-vendor-evaluation-shift
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Expert vendor evaluation shift — handle a vendor bankruptcy, data sovereignty crisis, and board-level procurement scandal simultaneously"
  tags: [shift-simulation, crisis, bankruptcy, data-sovereignty, expert]

state: {}

trigger: |
  You're the Chief Procurement Officer at a 6,000-person
  global financial services company. Three simultaneous
  crises are unfolding.

  Crisis 1 — Critical Vendor Bankruptcy:
  Your core trade execution platform vendor, TradeTech,
  filed for Chapter 11 bankruptcy protection this morning.
  TradeTech processes $2B in daily trade volume for your
  firm. Their platform is the backbone of your trading
  operations — 450 traders use it every day.

  Immediate concerns:
  - Will TradeTech continue operating? (Chapter 11 allows
    continued operations, but there's uncertainty)
  - Your contract has a bankruptcy termination clause —
    but exercising it would shut down your trading
  - TradeTech owes you $1.2M in prepaid annual fees
  - Your proprietary trading algorithms are embedded in
    TradeTech's platform (co-developed, IP is disputed)
  - 3 competitors also use TradeTech — they're in the
    same situation
  - SEC requires continuous trading capability — any
    disruption triggers regulatory reporting
  - Your DR plan for TradeTech: "Manual trading processes"
    — last tested 4 years ago, can handle 10% of volume

  Crisis 2 — Data Sovereignty Violation:
  Your CISO just discovered that your European customer
  data analytics vendor, DataInsight (German company), has
  been routing EU customer data through servers in India
  for processing. This violates:
  - GDPR data transfer requirements (no adequacy decision
    for India, no Standard Contractual Clauses in place)
  - Your contract which specifies "data processed
    exclusively within the EU"
  - Your representations to the ECB about data residency
  - Potentially affects 3.2 million European customer
    records

  You need to decide:
  - Do you self-report to regulators or wait?
  - Do you terminate DataInsight immediately (losing
    analytics capability) or demand remediation?
  - What do you tell affected customers?
  - What's your exposure? (GDPR fines up to 4% of global
    turnover = potentially $240M)

  Crisis 3 — Procurement Scandal:
  A journalist has contacted your PR team about a story
  they're publishing tomorrow. The story alleges that your
  former VP of IT Procurement (who left 6 months ago)
  awarded a $15M cloud migration contract to a vendor
  where he subsequently became a board member. The
  journalist has:
  - Email evidence showing the VP and the vendor's CEO
    discussing the board seat during the procurement
    process
  - The vendor's bid was 30% higher than the next
    competitor
  - The contract bypassed your standard evaluation
    process (VP claimed "emergency procurement authority")

  Implications:
  - Potential FCPA/anti-corruption violation
  - Board will demand accountability
  - Cloud migration is 60% complete — unwinding would
    cost $8M and delay the project 18 months
  - Current vendor relationship: Their technical team is
    excellent, project is going well
  - Media coverage will damage your company's reputation

  Task: Develop response strategies for all 3 crises.
  Prioritize actions, identify decision points, and
  provide specific recommendations for each. Address how
  the simultaneous nature of these crises affects your
  response capacity.

assertions:
  - type: llm_judge
    criteria: "Response handles the TradeTech bankruptcy with appropriate urgency — establishes a crisis team; assesses immediate operational continuity (can TradeTech continue operating under Chapter 11?); develops a short-term plan (keep trading operational while preparing alternatives); addresses the IP dispute; considers the SEC reporting obligation; doesn't trigger the bankruptcy termination clause prematurely; the response protects daily trading operations while preparing for worst-case scenarios."
    weight: 0.35
    description: "BankruptcyCrisisResponse"
  - type: llm_judge
    criteria: "Response addresses the data sovereignty violation with legal and regulatory sophistication — considers the self-reporting decision carefully (GDPR mitigation for self-reporting vs risk of regulator discovering independently); assesses the actual exposure (is 4% of turnover realistic or can it be mitigated?); addresses the ECB representation issue; proposes immediate data routing remediation; considers customer notification requirements; the response balances legal risk mitigation with operational reality."
    weight: 0.35
    description: "DataSovereigntyResponse"
  - type: llm_judge
    criteria: "Response handles the procurement scandal proactively — recommends engaging PR and legal immediately before the story publishes; proposes an internal investigation; addresses the cloud migration reality (project is going well — evaluate on merit, not just the tainted procurement); considers anti-corruption law implications; prepares a board communication; the response is honest and proactive rather than defensive, while also making practical decisions about the ongoing project; acknowledges that resource constraints from handling 3 crises simultaneously require triage and prioritization."
    weight: 0.30
    description: "ScandalResponseAndTriage"
