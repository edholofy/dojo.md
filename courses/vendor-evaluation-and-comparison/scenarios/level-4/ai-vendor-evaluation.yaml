meta:
  id: ai-vendor-evaluation
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "AI vendor evaluation — evaluate AI/ML vendors with unique challenges around data rights, model transparency, and rapidly evolving technology"
  tags: [ai, ml, emerging-technology, data-rights, expert]

state: {}

trigger: |
  You're the Chief Digital Officer at a 3,500-person
  insurance company. The board has mandated an "AI
  strategy" and you need to evaluate AI vendors for 3
  use cases. The challenge: AI vendor evaluation requires
  different frameworks than traditional software — model
  transparency, data rights, bias risk, and regulatory
  uncertainty make this unlike any vendor selection you've
  done before.

  Use cases:
  1. Claims fraud detection (automate review of $2B in
     annual claims)
  2. Underwriting risk assessment (augment 200
     underwriters' decision-making)
  3. Customer service automation (handle 40% of 500K
     annual inquiries)

  Vendors evaluated for claims fraud:

  Vendor A — FraudShield AI:
  - Model: Proprietary deep learning, "black box"
  - Accuracy: Claims 95% fraud detection rate, 3% false
    positive rate
  - Training: Trained on "insurance industry data from
    multiple carriers" (your data would be added to
    training pool)
  - Explainability: "AI-generated risk scores" — no
    explanation of why a claim is flagged
  - Bias testing: "We test for bias" — no methodology
    or results shared
  - Pricing: $1.2M/year + $500K implementation
  - Data rights: Vendor retains right to use your claims
    data (anonymized) to improve their models
  - Track record: 15 insurance customers, 4 years in
    market

  Vendor B — ClaimsIQ:
  - Model: Gradient boosted trees + rules engine, fully
    explainable
  - Accuracy: 88% fraud detection rate, 1.5% false
    positive rate
  - Training: Trained exclusively on your data (no shared
    training pool)
  - Explainability: Provides specific factors driving each
    fraud score with confidence intervals
  - Bias testing: Annual third-party bias audit, results
    shared with customers, remediation documented
  - Pricing: $800K/year + $350K implementation
  - Data rights: Your data is yours, models trained on
    your data are yours
  - Track record: 8 insurance customers, 6 years in
    market

  Vendor C — InsureAI (startup):
  - Model: Large language model fine-tuned for insurance,
    "generative AI approach"
  - Accuracy: "Early results show 92% detection" — no
    independent validation
  - Training: Foundation model trained on public data,
    fine-tuned on customer data
  - Explainability: "Natural language explanations" for
    each decision
  - Bias testing: "Built into our model architecture"
  - Pricing: $600K/year + $200K implementation
  - Data rights: Fine-tuned model weights belong to you,
    but base model updates may incorporate learnings
  - Track record: 3 customers (2 in insurance), 18 months
    in market, $25M Series A

  Regulatory context:
  - State insurance regulators increasingly scrutinizing
    AI in claims and underwriting
  - NAIC Model Bulletin on AI requires insurers to
    demonstrate non-discriminatory outcomes
  - Colorado's SB21-169 requires bias testing for
    insurance AI
  - EU AI Act classifies insurance underwriting as
    "high-risk" AI (relevant for your UK subsidiary)

  Task: Create an AI-specific vendor evaluation framework,
  evaluate the 3 fraud detection vendors, and establish
  principles that will guide evaluation for the other 2
  use cases (underwriting and customer service).

assertions:
  - type: llm_judge
    criteria: "Response creates an AI-specific evaluation framework — goes beyond standard vendor evaluation to address AI-unique dimensions: model transparency/explainability, bias and fairness testing methodology, data rights and IP ownership, model drift monitoring, regulatory compliance (NAIC, Colorado SB21-169, EU AI Act), training data provenance, accuracy metrics validation; the framework would work for evaluating any AI vendor in insurance, not just these 3."
    weight: 0.35
    description: "AISpecificFramework"
  - type: llm_judge
    criteria: "Response evaluates the 3 vendors with AI-informed analysis — identifies FraudShield's black box problem (regulators will require explainability), shared training data risk (your competitors' data trains the same model), and high false positive cost; recognizes ClaimsIQ's explainability and data ownership advantages despite lower accuracy; assesses InsureAI's startup risk and the unvalidated LLM approach; connects the accuracy vs explainability trade-off to regulatory reality (a model you can't explain may be illegal to use)."
    weight: 0.35
    description: "AIInformedEvaluation"
  - type: llm_judge
    criteria: "Response addresses the regulatory dimension comprehensively — explains how NAIC, Colorado, and EU AI Act requirements constrain vendor choice; identifies that underwriting AI has even stricter requirements than claims (fair lending analogs); establishes ongoing compliance requirements (bias monitoring, model documentation, adverse action explanations); considers how regulatory requirements differ by use case (claims fraud, underwriting, customer service have different risk profiles); the regulatory analysis would satisfy a Chief Compliance Officer."
    weight: 0.30
    description: "RegulatoryCompliance"
