meta:
  id: outsourcing-decision-framework
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Outsourcing decision framework — evaluate whether to outsource a major business function and design the vendor selection and governance"
  tags: [outsourcing, strategic-sourcing, governance, decision-framework, expert]

state: {}

trigger: |
  You're the COO of a 3,000-person software company
  ($500M revenue). The CEO has proposed outsourcing the
  entire customer support function (currently 280 in-house
  agents across 3 locations) to reduce costs. The board
  wants a thorough analysis before approving. This is the
  most controversial decision the company has faced —
  support is a key differentiator, and the proposal has
  already leaked to employees, causing anxiety.

  Current customer support operation:
  - 280 agents (200 US, 50 Philippines, 30 Ireland)
  - Annual cost: $32M (salaries $22M, facilities $4M,
    technology $3M, management $3M)
  - CSAT score: 92% (industry top quartile)
  - First contact resolution: 78%
  - Average handle time: 8.5 minutes
  - Agent tenure: Average 3.2 years (low turnover)
  - Channels: Phone 40%, chat 35%, email 20%, social 5%
  - Tier structure: Tier 1 (general), Tier 2 (technical),
    Tier 3 (engineering escalation)
  - Revenue impact: Support-influenced renewals = $45M
    (9% of revenue)

  Outsourcing vendor proposals (3 BPO providers):

  Vendor A — GlobalSupport (India/Philippines):
  - Price: $18M/year (44% savings)
  - Proposed staffing: 350 agents (more agents, lower cost)
  - Locations: Manila, Hyderabad
  - CSAT guarantee: 85% minimum
  - Transition: 6 months, vendor handles hiring/training
  - Languages: English, Spanish
  - Experience: 15 enterprise software clients

  Vendor B — PremiumCare (US + nearshore):
  - Price: $24M/year (25% savings)
  - Proposed staffing: 250 agents
  - Locations: Austin TX, Guadalajara Mexico
  - CSAT guarantee: 90% minimum
  - Transition: 4 months, takes your top 80 agents as
    vendor employees
  - Languages: English, Spanish, Portuguese
  - Experience: 8 enterprise software clients, known for
    quality

  Vendor C — HybridServe (blended model):
  - Price: $22M/year (31% savings)
  - Proposed: Keep 50 in-house agents for Tier 2/3,
    outsource 230 Tier 1 agents
  - Locations: Your existing + Manila for Tier 1
  - CSAT guarantee: 88% minimum (Tier 1 only)
  - Transition: 5 months
  - Keeps your management structure for complex issues
  - Experience: 20+ clients, 5 in software

  Employee impact:
  - 280 jobs affected (200 US, potentially including
    long-tenured loyal employees)
  - Outsourcing already leaked — union organizing
    discussions starting in the US support center
  - Key Tier 2/3 agents have deep product knowledge that
    takes 12-18 months to develop
  - 15 support agents have been promoted into product and
    engineering roles in the last 2 years

  Task: Create the comprehensive outsourcing analysis.
  Determine whether to outsource (fully, partially, or
  not at all), evaluate the vendor options, quantify
  risks, and address the employee impact. Your analysis
  must be honest enough to present to both the board and
  the employees.

assertions:
  - type: llm_judge
    criteria: "Response conducts a rigorous outsourcing analysis beyond cost savings — quantifies the risk of CSAT decline (92% to 85-90% guarantee = potential revenue impact on $45M support-influenced renewals); considers hidden costs (transition costs, knowledge transfer, management overhead, quality monitoring); evaluates what happens to the talent pipeline (15 agents promoted to product/engineering); the analysis reveals whether the cost savings justify the strategic risks for a company where support is a differentiator."
    weight: 0.35
    description: "RigorousOutsourcingAnalysis"
  - type: llm_judge
    criteria: "Response evaluates vendors and outsourcing models thoughtfully — compares full outsource (Vendors A/B), hybrid (Vendor C), and potentially no outsource as legitimate options; recognizes the hybrid model's advantages (retains Tier 2/3 knowledge, maintains career path); considers PremiumCare's approach of absorbing existing agents (retention benefit); addresses the quality vs cost trade-off specific to each vendor; the evaluation helps the board understand the true range of options, not just 'outsource or don't.'"
    weight: 0.35
    description: "VendorModelEvaluation"
  - type: llm_judge
    criteria: "Response addresses the employee impact ethically and practically — acknowledges the human cost (280 livelihoods); considers the union organizing risk and legal implications; proposes transition support (severance, job placement, retraining); addresses the morale impact on remaining employees; considers the reputational risk (customers learning their support was outsourced); the analysis is honest enough to present to employees without being dismissive of their concerns, while also giving the board the financial analysis they need."
    weight: 0.30
    description: "EmployeeImpactAnalysis"
