meta:
  id: vendor-compliance-program
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor compliance program — design an enterprise vendor compliance program spanning multiple regulatory frameworks"
  tags: [compliance, regulatory, program-design, multi-framework, expert]

state: {}

trigger: |
  You're the Chief Compliance Officer at a 4,500-person
  global fintech company. Regulators in 3 jurisdictions
  have raised concerns about your vendor oversight during
  recent examinations:

  - US (OCC/FDIC): "Third-party risk management program
    lacks maturity. Critical vendors not subject to
    adequate ongoing due diligence."
  - EU (ECB/EBA): "Outsourcing arrangements do not comply
    with EBA Guidelines on outsourcing. ICT third-party
    risk management does not align with DORA requirements
    (enforcement begins January 2025)."
  - UK (FCA): "Operational resilience testing does not
    adequately cover critical third-party dependencies."

  Current vendor landscape:
  - 580 vendors globally
  - 45 classified as "critical" or "important" under
    various regulatory definitions
  - Spend: $165M annually on third-party services
  - Categories: Cloud (AWS, Azure), payment processing,
    identity verification, fraud detection, customer
    communications, data analytics, consulting, staffing

  Specific regulatory requirements to address:

  1. US (OCC Bulletin 2023-17):
  - Lifecycle management (planning, due diligence,
    contract negotiation, ongoing monitoring, termination)
  - Board oversight and reporting
  - Independent risk assessments for critical vendors
  - Business continuity planning

  2. EU (DORA — Digital Operational Resilience Act):
  - ICT third-party risk management framework
  - Register of all ICT third-party arrangements
  - Exit strategies for critical ICT providers
  - Incident reporting for third-party ICT incidents
  - Oversight framework for critical ICT third-party
    providers
  - Concentration risk assessment

  3. UK (FCA operational resilience):
  - Important business services identification
  - Impact tolerances for disruption
  - Third-party mapping for important business services
  - Scenario testing including third-party failures

  Current gaps:
  - No unified vendor register (3 different systems
    across regions)
  - No DORA-compliant ICT register
  - No exit strategies documented for critical vendors
  - Business continuity testing doesn't include vendor
    failure scenarios
  - Board reporting is inconsistent across regions
  - No concentration risk analysis (3 critical vendors
    all use AWS)
  - Vendor contracts don't include required regulatory
    clauses in 40% of cases
  - No cross-border data transfer impact assessments

  Budget: $2.5M for program development and first year
  of operations
  Timeline: DORA enforcement in 10 months, must show
  progress to all 3 regulators within 6 months

  Task: Design the unified vendor compliance program that
  satisfies all 3 regulatory frameworks. Include the
  governance structure, risk assessment methodology,
  monitoring cadence, board reporting, and implementation
  roadmap.

assertions:
  - type: llm_judge
    criteria: "Response designs a unified framework that satisfies all 3 regulatory regimes — maps requirements across OCC, DORA, and FCA to identify commonalities and unique requirements; creates a single program with regional overlays rather than 3 separate programs; addresses each specific gap identified; the ICT register satisfies DORA while also serving OCC and FCA reporting needs; the framework is efficient (doesn't duplicate effort across jurisdictions) while being compliant in each."
    weight: 0.35
    description: "UnifiedRegulatoryFramework"
  - type: llm_judge
    criteria: "Response addresses DORA-specific requirements comprehensively — creates the ICT third-party register with required data fields; establishes exit strategies for critical ICT providers; designs the concentration risk analysis (AWS dependency across 3 critical vendors); addresses ICT incident reporting from third parties; considers the DORA oversight framework for critical ICT providers; the DORA compliance approach would withstand ECB/EBA examination given the 10-month deadline."
    weight: 0.35
    description: "DORACompliance"
  - type: llm_judge
    criteria: "Response creates a realistic implementation roadmap within constraints — works within $2.5M budget; phases critical deliverables to show progress at 6 months (regulator examination readiness) and DORA compliance at 10 months; identifies what requires technology investment vs process/policy changes; staffing plan for the ongoing program; board reporting structure that satisfies all 3 jurisdictions; the roadmap acknowledges trade-offs and prioritizes regulatory risk."
    weight: 0.30
    description: "RealisticImplementation"
