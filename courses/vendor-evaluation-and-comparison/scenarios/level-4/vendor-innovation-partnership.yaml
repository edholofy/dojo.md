meta:
  id: vendor-innovation-partnership
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor innovation partnership — evaluate and structure strategic innovation partnerships with technology vendors"
  tags: [innovation, partnership, strategic, co-development, expert]

state: {}

trigger: |
  You're the Chief Innovation Officer at a 5,500-person
  global logistics company ($4B revenue). The CEO wants to
  accelerate innovation by partnering with technology
  vendors rather than building everything internally. You
  need to evaluate 3 potential strategic innovation
  partnerships and design the partnership structure for the
  most promising one.

  Company context:
  - Innovation budget: $25M/year (technology + people)
  - Internal R&D team: 60 engineers, 8 data scientists
  - Key innovation priorities: autonomous vehicle routing,
    predictive demand forecasting, warehouse robotics
  - Current approach: Build everything in-house (slow —
    average 18 months from concept to pilot)
  - Competitive pressure: 2 competitors announced
    partnerships with tech companies last quarter

  Partnership candidates:

  Partnership A — AutonomousTech (autonomous vehicle):
  Proposed partnership:
  - Co-develop autonomous last-mile delivery vehicles
  - Your contribution: Routes, delivery data, testing
    fleet, regulatory relationships
  - Their contribution: AV technology, engineering team,
    hardware
  - Investment required: $5M/year for 3 years
  - Revenue model: Joint venture with 50/50 split on
    licensing to other logistics companies
  - IP: Jointly owned, with restrictions on competitive
    use
  - Risk: Technology is 3-5 years from commercial
    viability. AutonomousTech has burned through $200M
    in VC funding with no revenue yet.
  - Exclusivity requested: 3-year exclusive in logistics
    vertical

  Partnership B — PredictAI (demand forecasting):
  Proposed partnership:
  - Integrate PredictAI's forecasting platform with your
    operations
  - Your contribution: Historical demand data (10 years),
    operational feedback, co-marketing
  - Their contribution: ML platform, data science team,
    pre-built models
  - Investment required: $2M/year license + $500K
    integration
  - Revenue model: You get better forecasting; they get
    to use anonymized learnings for their product
  - IP: Models trained on your data are yours; platform
    improvements belong to PredictAI
  - Risk: PredictAI is Series B ($30M raised), solid
    traction, but 3 larger competitors (including Google)
    entering this market
  - Exclusivity: None requested, they serve competitors

  Partnership C — RoboWare (warehouse robotics):
  Proposed partnership:
  - Pilot next-generation picking robots in 3 of your
    warehouses
  - Your contribution: Warehouse access, operational
    data, pilot funding
  - Their contribution: Robots (50 units), integration
    engineering, maintenance
  - Investment required: $4M for pilot (18 months),
    $15M for full deployment
  - Revenue model: You get productivity gains (estimated
    30% labor reduction); they get a flagship customer
    and case study
  - IP: Robot technology stays with RoboWare, operational
    optimizations are yours
  - Risk: RoboWare is established (10 years, $100M
    revenue, profitable) but their technology is unproven
    in your type of warehouse (ambient temperature, large
    parcels)
  - Exclusivity: 12-month exclusivity in your segment

  Task: Evaluate all 3 partnerships, recommend which to
  pursue (may be more than one), and design the governance
  structure, success metrics, and risk mitigation for the
  recommended partnership(s). Address the IP and data
  sharing implications.

assertions:
  - type: llm_judge
    criteria: "Response evaluates partnerships on strategic fit, not just financial terms — assesses alignment with innovation priorities (autonomous vehicles, forecasting, robotics); considers competitive implications (PredictAI serves competitors, AutonomousTech wants exclusivity); evaluates partner viability (AutonomousTech's burn rate, PredictAI's competitive market, RoboWare's proven business model); considers time-to-impact (PredictAI = months, RoboWare = 18 months, AutonomousTech = 3-5 years); the evaluation framework balances innovation potential with execution risk."
    weight: 0.35
    description: "StrategicPartnershipEvaluation"
  - type: llm_judge
    criteria: "Response addresses IP and data implications thoughtfully — analyzes the data sharing risks (PredictAI using your demand data to serve competitors, AutonomousTech's joint IP creating lock-in); considers what happens if the partnership ends (who keeps what?); addresses the competitive intelligence risk of sharing operational data; proposes protective structures (data clean rooms, use restrictions, termination IP allocation); the analysis protects the company's most valuable asset — its operational data and domain knowledge."
    weight: 0.35
    description: "IPAndDataProtection"
  - type: llm_judge
    criteria: "Response designs partnership governance — establishes joint steering committee, success metrics with stage gates, escalation paths, exit clauses; defines how decisions are made when partners disagree; addresses how to manage the cultural differences between a logistics company and a tech startup; includes financial controls (milestone-based funding, not blank checks); the governance structure would enable innovation while protecting the company's interests; considers portfolio approach (pursuing multiple partnerships to diversify innovation risk)."
    weight: 0.30
    description: "PartnershipGovernance"
