meta:
  id: procurement-transformation
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Procurement transformation — redesign a dysfunctional procurement organization for a large enterprise"
  tags: [transformation, procurement, organizational-design, governance, expert]

state: {}

trigger: |
  You're the newly hired Chief Procurement Officer at a
  5,000-person industrial conglomerate with 4 business
  units. The CEO hired you because procurement is "broken"
  and wants a transformation plan within 60 days.

  Current state assessment (from your first 30 days):

  Organization:
  - No centralized procurement function — each BU has its
    own buyers (38 procurement staff total across 4 BUs)
  - No common processes, tools, or standards
  - Total vendor spend: $380M annually across ~2,200
    vendors
  - Estimated 40% of vendors overlap across BUs (same
    vendors, different contracts, different pricing)
  - No vendor management technology — everything in
    spreadsheets and email

  Business Units:
  - BU1 (Automotive Parts, $1.2B revenue): Most mature
    procurement, 15 staff, some formal processes, SAP for
    PO management
  - BU2 (Industrial Equipment, $800M revenue): Informal
    procurement, 8 staff, engineering drives vendor
    selection, procurement just processes POs
  - BU3 (Electronics, $600M revenue): Recently acquired
    (18 months ago), still operating independently, 10
    staff, Oracle-based
  - BU4 (Services Division, $400M revenue): Mostly labor
    and consulting spend, 5 staff, no system

  Key problems identified:
  1. Maverick spending: 35% of purchases made outside any
     procurement process
  2. Duplicate vendors: 180 vendors serve multiple BUs
     with different contract terms
  3. No spend visibility: Nobody knows total company spend
     by category
  4. No strategic sourcing: All procurement is tactical/
     reactive
  5. Vendor risk: 3 critical vendor failures in 18 months
     (no risk monitoring)
  6. Compliance gaps: Missing contracts for 120 vendors
     ($22M spend with no formal agreements)
  7. Talent: Procurement seen as "order takers," not
     strategic partners
  8. Technology: 3 different PO systems, no contract
     management, no spend analytics

  CEO expectations:
  - $15M in annual savings within 2 years (4% of spend)
  - Centralized visibility and control
  - Risk management program
  - "Make procurement a competitive advantage"
  - Budget for transformation: $4M over 2 years

  Constraints:
  - BU Presidents are protective of their autonomy
  - BU1's procurement team considers themselves superior
    and may resist reporting to corporate
  - BU3 still has integration challenges from the
    acquisition
  - Union labor agreements in BU2 affect vendor selection
    for contracted services

  Task: Design the procurement transformation plan
  covering organizational design, process standardization,
  technology strategy, savings roadmap, and change
  management approach.

assertions:
  - type: llm_judge
    criteria: "Response designs a practical organizational model — proposes a structure that balances centralization with BU needs (likely center-led or federated model); defines what's centralized (strategic sourcing, contracts, vendor risk, spend analytics, technology) vs what stays local (day-to-day purchasing, BU-specific requirements); addresses the political reality that BU Presidents won't accept full centralization; staffing plan works within budget; the org design would actually function in this conglomerate."
    weight: 0.35
    description: "PracticalOrgDesign"
  - type: llm_judge
    criteria: "Response creates a credible savings roadmap — identifies quick-win savings (consolidate duplicate vendors, leverage combined volume, address maverick spending) vs longer-term strategic savings (category management, demand management, process automation); quantifies savings estimates by initiative; sequences initiatives to build momentum; the $15M target is mapped to specific actions, not just hoped for; acknowledges that some savings require investment (technology, talent) before they materialize."
    weight: 0.35
    description: "CredibleSavingsRoadmap"
  - type: llm_judge
    criteria: "Response addresses change management for all stakeholder groups — plans for BU resistance (demonstrate value before demanding compliance); addresses BU1's superiority complex (leverage their expertise, make them champions); handles BU3's integration challenges (align procurement integration with broader acquisition integration); considers the talent development need (elevating procurement from order-takers to strategic partners); the change management approach recognizes that organizational transformation is harder than process design."
    weight: 0.30
    description: "ChangeManagementApproach"
