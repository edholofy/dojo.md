meta:
  id: supply-chain-resilience
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Supply chain resilience — design a multi-vendor strategy that balances cost efficiency with supply chain resilience"
  tags: [supply-chain, resilience, multi-vendor, risk-mitigation, expert]

state: {}

trigger: |
  You're the Chief Supply Chain Officer at a 7,000-person
  medical device manufacturer. After COVID-19 exposed
  critical vulnerabilities in your supply chain (you lost
  $180M in revenue due to component shortages), the board
  has mandated a supply chain resilience overhaul. Your
  current single-source strategy prioritized cost; the new
  strategy must balance cost with resilience.

  Current supply chain profile:
  - Revenue: $2.8B
  - COGS: $1.4B (50% of revenue)
  - Tier 1 suppliers: 85
  - Critical components: 340 unique parts
  - Single-sourced critical components: 127 (37% — this is
    the vulnerability)
  - Manufacturing: 3 plants (US, Mexico, Ireland)
  - Regulatory: FDA Class II and III devices (supplier
    changes require regulatory notification/approval)

  Top 10 single-source vulnerabilities:

  1. Specialty semiconductor (Vendor: ChipTech Taiwan):
     $45M/year, 6-month lead time, used in 60% of
     products. Alternative qualification: 18 months + $2M
     FDA validation

  2. Titanium alloy (Vendor: MetalWorks Germany): $28M/
     year, sole source due to proprietary alloy formula.
     MetalWorks owns the IP. No direct alternative.

  3. Sterilization pouching (Vendor: PackSafe US): $12M/
     year, used for all sterile products. FDA-registered
     packaging. 2 alternatives exist but require 12-month
     qualification

  4. Custom injection molding (Vendor: PrecisionMold
     Mexico): $35M/year, 8 proprietary molds, vendor owns
     the molds (this was a contract oversight)

  5. PCB assemblies (Vendor: CircuitPro China): $22M/year,
     excellent quality and price, but increasing
     geopolitical risk (tariffs, export controls)

  Remaining 5: Similar single-source risks totaling $60M

  Resilience strategy options:
  A. Dual-source everything: Qualify second sources for
     all 127 single-source components. Cost: $15M+ in
     qualification, 2-3 years. Ongoing premium: 5-8%
     higher COGS from split volumes.

  B. Strategic inventory: Build 6-month safety stock for
     critical components. Cost: $80M in working capital.
     Risk: Obsolescence, storage, cash flow impact.

  C. Nearshoring: Move critical supply to US/Mexico/EU.
     Cost: 15-25% premium vs current Asian sources.
     Timeline: 3-5 years for full transition.

  D. Hybrid approach: Tier the components by criticality
     and apply different strategies per tier.

  Constraints:
  - Can't increase COGS by more than 3% ($42M)
  - FDA qualification for alternative suppliers takes
     12-18 months per component
  - Board wants measurable progress within 12 months
  - Must maintain quality standards (ISO 13485)

  Task: Design the supply chain resilience strategy.
  Prioritize which single-source risks to address first,
  recommend the optimal approach for each category, create
  a multi-year roadmap, and quantify the cost vs risk
  trade-off.

assertions:
  - type: llm_judge
    criteria: "Response prioritizes risks using a clear framework — considers impact (revenue dependency), probability (geopolitical, financial, operational risks), qualification complexity (FDA timeline), and cost to mitigate; doesn't try to fix everything at once; identifies the top 3-5 risks to address immediately (likely ChipTech semiconductor and CircuitPro PCBs due to geopolitical risk, MetalWorks titanium due to IP dependency); the prioritization framework is transparent and defensible to the board."
    weight: 0.35
    description: "RiskPrioritization"
  - type: llm_judge
    criteria: "Response recommends a hybrid strategy with component-specific approaches — applies dual-sourcing where feasible (semiconductors, PCBs), strategic inventory where qualification is impractical (titanium alloy), and contractual protections where alternatives don't exist; addresses the mold ownership problem with PrecisionMold; considers nearshoring for geopolitically exposed suppliers; works within the 3% COGS constraint; the strategy is differentiated by component, not one-size-fits-all."
    weight: 0.35
    description: "HybridStrategy"
  - type: llm_judge
    criteria: "Response addresses the FDA regulatory constraint realistically — acknowledges that supplier qualification for medical devices is not like switching software vendors; incorporates 12-18 month FDA timelines into the roadmap; identifies which changes require regulatory notification vs full re-validation; considers the ISO 13485 quality system implications; the roadmap shows measurable progress at 12 months while acknowledging that full resilience takes 3-5 years; the cost-risk trade-off is quantified to help the board make informed decisions."
    weight: 0.30
    description: "RegulatoryAwareRoadmap"
