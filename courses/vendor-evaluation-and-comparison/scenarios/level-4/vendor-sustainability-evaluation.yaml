meta:
  id: vendor-sustainability-evaluation
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor sustainability evaluation — integrate ESG criteria into vendor evaluation and management for a company with sustainability commitments"
  tags: [sustainability, esg, responsible-sourcing, environmental, expert]

state: {}

trigger: |
  You're the VP of Sustainable Procurement at a 8,000-
  person consumer goods company ($3.2B revenue). The
  company has committed to Science Based Targets and
  pledged to achieve net-zero Scope 3 emissions by 2040.
  Since Scope 3 (supply chain) represents 85% of your
  total emissions, vendor evaluation must fundamentally
  change. The CEO wants a new vendor evaluation framework
  that integrates sustainability without killing
  competitiveness.

  Current state:
  - 1,200 suppliers globally
  - Scope 3 emissions: 2.8M metric tons CO2e annually
  - Top 100 suppliers = 78% of emissions
  - Current ESG assessment: Annual self-assessment
    questionnaire (40% response rate)
  - Only 15% of suppliers have set their own science-
    based targets
  - No sustainability criteria in vendor selection
    (separate process from procurement)

  Regulatory landscape:
  - EU CSRD: Requires Scope 3 reporting starting 2025
  - EU CSDDD: Corporate sustainability due diligence
    across supply chain
  - California Climate Accountability Act: Scope 3
    disclosure for companies doing business in CA
  - SEC climate disclosure rules: Scope 3 material
    emissions disclosure
  - Customer pressure: 5 largest retail customers
    (representing $800M in revenue) now require supply
    chain sustainability data

  Key vendor evaluation challenges:

  1. Raw materials suppliers (agricultural):
  - 200 suppliers in developing countries
  - Deforestation risk in palm oil and soy supply chains
  - Child labor allegations in 2 sourcing regions
  - Limited data availability — many are small farms

  2. Manufacturing partners:
  - 50 contract manufacturers in China, Vietnam, India
  - Energy-intensive processes, mostly coal-powered
  - Water use in water-stressed regions
  - Some using banned chemicals (discovered in audit)

  3. Logistics providers:
  - 30 transportation and warehousing vendors
  - Fleet composition data unavailable from most
  - Emissions vary 5x between most and least efficient
  - Only 3 vendors have electrification plans

  4. Packaging suppliers:
  - 45 packaging vendors
  - Only 20% offer recycled/recyclable materials
  - Plastics reduction target: 50% virgin plastic
    reduction by 2030
  - Compostable alternatives cost 2.5x more

  Competitive constraint: Procurement can't increase COGS
  by more than 2% ($64M) for sustainability improvements.

  Task: Design the integrated ESG vendor evaluation
  framework. Include scoring methodology, data collection
  approach, integration with existing procurement
  processes, supplier development programs for lagging
  vendors, and the roadmap to achieve Scope 3 targets.

assertions:
  - type: llm_judge
    criteria: "Response designs a practical ESG vendor evaluation framework — creates sustainability scoring integrated with traditional procurement criteria (not a separate process); weights ESG factors proportionally to impact (energy-intensive manufacturers weighted higher than office supply vendors); addresses the data challenge (how to assess 200 small-farm agricultural suppliers with limited reporting capacity); tiered approach based on supplier materiality; the framework is rigorous enough to drive change but practical enough to implement across 1,200 suppliers."
    weight: 0.35
    description: "PracticalESGFramework"
  - type: llm_judge
    criteria: "Response addresses Scope 3 reduction strategically — prioritizes the top 100 suppliers representing 78% of emissions; creates supplier development programs (training, technical assistance, transition financing) rather than just penalizing non-compliance; addresses the agricultural supply chain uniquely (deforestation monitoring, child labor due diligence); considers the logistics electrification opportunity; the strategy would make measurable progress toward the 2040 net-zero target; acknowledges that switching away from non-compliant suppliers isn't always feasible."
    weight: 0.35
    description: "Scope3ReductionStrategy"
  - type: llm_judge
    criteria: "Response balances sustainability with commercial reality — works within the 2% COGS constraint; phases investments by ROI and impact (some sustainability improvements reduce cost — energy efficiency; others increase cost — recyclable packaging); addresses the regulatory compliance requirements (CSRD, CSDDD, California) as minimum baseline; responds to customer pressure from the 5 retailers representing $800M in revenue; the strategy is commercially viable, not just aspirational."
    weight: 0.30
    description: "CommercialViability"
