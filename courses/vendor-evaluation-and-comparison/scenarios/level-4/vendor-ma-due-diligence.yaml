meta:
  id: vendor-ma-due-diligence
  level: 4
  course: vendor-evaluation-and-comparison
  type: output
  description: "Vendor M&A due diligence — evaluate vendor relationships during a corporate acquisition"
  tags: [ma, due-diligence, acquisition, vendor-assessment, expert]

state: {}

trigger: |
  You're the VP of Procurement at a 6,000-person technology
  company that is acquiring a 2,000-person competitor
  (TargetCo). You've been pulled into the M&A due diligence
  team to assess TargetCo's vendor relationships. The deal
  is valued at $850M and closes in 75 days. Your assessment
  will affect the purchase price, integration plan, and
  Day 1 readiness.

  TargetCo's vendor landscape (from data room review):
  - Total vendor spend: $95M annually
  - Active vendors: 420
  - Critical vendors: 18

  Key findings from your initial review:

  1. Change-of-control clauses:
  - 6 critical vendor contracts have change-of-control
    provisions that allow the vendor to terminate upon
    acquisition
  - Most significant: Their cloud hosting vendor (AWS
    Enterprise Agreement, $8M/year) has a change-of-
    control clause requiring consent
  - Their ERP vendor (NetSuite) contract auto-terminates
    on change of control — they'd need to renegotiate

  2. Overlapping vendors with your company:
  - 85 vendors are shared between your company and
    TargetCo
  - Combined Salesforce spend: $4.2M (you) + $1.8M
    (TargetCo) = $6M — potential volume leverage
  - Conflicting terms: Your AWS agreement has 30% better
    pricing than TargetCo's
  - Duplicate tools in 12 categories (estimated $3.5M
    in redundancy)

  3. Risk findings:
  - TargetCo has $12M in annual spend with a single
    vendor (DataCore) for their core data platform —
    DataCore is private, $30M revenue, TargetCo is 40%
    of DataCore's business (mutual dependency)
  - 3 vendors have expired contracts but services
    continue (estimated $4M in uncommitted spend)
  - 2 vendor contracts have most-favored-nation clauses
    that could be triggered by combining pricing
  - TargetCo's cybersecurity vendor had a breach 6 months
    ago that wasn't disclosed in initial due diligence
  - 5 key vendors have personal relationships with
    TargetCo's departing CEO (flight risk)

  4. Integration complexity:
  - TargetCo uses Oracle financials, you use SAP —
    different chart of accounts, different PO systems
  - Their procurement team (6 people) has no formal
    processes — mostly relationship-based purchasing
  - $15M in IT vendor spend needs to be rationalized
    against your IT portfolio

  Timeline:
  - Deal close: 75 days
  - Day 1 readiness: Must have all critical vendor
    relationships secured
  - Integration plan: 18 months post-close
  - Synergy targets: Board expects $8M in vendor-related
    savings within 2 years

  Task: Complete the vendor due diligence assessment.
  Identify deal risks, quantify financial impacts, create
  a Day 1 vendor readiness plan, and design the post-close
  vendor integration strategy to achieve synergy targets.

assertions:
  - type: llm_judge
    criteria: "Response identifies and quantifies deal risks — assesses the change-of-control clauses' impact (particularly AWS and NetSuite — what happens if these vendors terminate?); quantifies the DataCore concentration risk (40% of their revenue = mutual dependency, what if they raise prices or fail?); evaluates the undisclosed cybersecurity breach as a potential liability; considers how MFN clauses could increase costs when combining; estimates potential purchase price adjustments based on findings; the risk assessment would influence deal negotiations."
    weight: 0.35
    description: "DealRiskAssessment"
  - type: llm_judge
    criteria: "Response creates a credible Day 1 readiness plan — prioritizes securing critical vendors with change-of-control clauses before close (particularly AWS and NetSuite); plans for vendor communications at deal announcement; addresses the departing CEO's vendor relationships (introductions to your team before departure); ensures all critical services continue uninterrupted; identifies which vendor conversations must happen pre-close vs can wait; the plan prevents operational disruption at deal close."
    weight: 0.35
    description: "Day1ReadinessPlan"
  - type: llm_judge
    criteria: "Response designs a vendor integration strategy targeting $8M in savings — maps specific synergy sources (duplicate vendor elimination: $3.5M estimate; volume leverage on shared vendors: Salesforce, AWS; renegotiation of TargetCo's below-market contracts); creates a phased approach (quick wins in months 1-6, complex integrations in months 6-18); accounts for integration costs (system consolidation, change management); the savings targets are traceable to specific actions, not just aspirational."
    weight: 0.30
    description: "SynergyStrategy"
