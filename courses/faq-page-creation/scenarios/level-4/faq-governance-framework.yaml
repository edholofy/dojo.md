meta:
  id: faq-governance-framework
  level: 4
  course: faq-page-creation
  type: output
  description: "Design an enterprise FAQ governance framework for a global pharmaceutical company with multi-regulator compliance and content review boards"
  tags: [governance, pharmaceutical, multi-regulator, content-review, expert]

state: {}

trigger: |
  You're the Global Content Governance Director at
  PharmaCo, a top-20 pharmaceutical company with
  products in 40 countries. The company has 1,500 FAQ
  entries across patient-facing, HCP-facing, and
  internal support channels. Recent FDA and EMA audits
  found compliance issues in FAQ content.

  Regulatory landscape:
  - FDA (US): Promotional material review, fair balance
    requirements, adverse event reporting obligations
  - EMA (EU): SmPC-consistent information, GDPR data
    handling, multi-language requirements
  - PMDA (Japan): Strict drug information standards
  - TGA (Australia): Therapeutic goods advertising code
  - Each market has Medical-Legal-Regulatory (MLR)
    review requirements

  Current problems:
  - No centralized FAQ governance — each country
    operates independently
  - MLR review takes 6-8 weeks, FAQ content is often
    published without review
  - Adverse event mentions in FAQs aren't consistently
    reported to pharmacovigilance
  - Patient FAQs sometimes cross the line from
    information to medical advice
  - HCP FAQs reference off-label uses
  - Internal support FAQs contain confidential data

  Design the enterprise governance framework:
  1. FAQ governance charter and organizational structure
  2. Content classification system (patient, HCP,
     internal) with approval requirements per class
  3. MLR review workflow optimized for FAQ content
     (target: 2-week turnaround)
  4. Pharmacovigilance integration for adverse event
     detection in FAQ interactions
  5. Write 4 sample FAQ entries showing compliant
     patient-facing content for a diabetes medication
  6. Global-local content governance model (global
     standards, local adaptation)
  7. Audit methodology and compliance scorecard
  8. Technology platform requirements for governed FAQ
  9. Training program for 80+ content contributors

assertions:
  - type: llm_judge
    criteria: "Response creates a complete governance framework — charter; content classification; MLR workflow; pharmacovigilance integration; 4 compliant sample entries; global-local model; audit methodology; technology requirements; training program."
    weight: 0.35
    description: "GovernanceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates pharmaceutical governance expertise — FDA/EMA requirements are correctly distinguished; MLR review optimization is realistic; pharmacovigilance integration addresses real regulatory obligations; patient vs HCP content boundaries are clear; the global-local model balances consistency with market requirements."
    weight: 0.35
    description: "PharmaGovernanceQuality"
  - type: llm_judge
    criteria: "Response would pass regulatory audit — FDA/EMA findings would be remediated; MLR review time would decrease from 6-8 weeks to target; adverse events would be properly reported; content contributors would be trained; the governance framework would scale across 40 countries."
    weight: 0.30
    description: "RegulatoryComplianceOutcome"
