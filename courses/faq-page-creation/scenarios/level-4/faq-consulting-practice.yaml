meta:
  id: faq-consulting-practice
  level: 4
  course: faq-page-creation
  type: output
  description: "Build a FAQ consulting practice offering audits, strategy, implementation, and optimization services with a diagnostic methodology"
  tags: [consulting, practice-building, diagnostic, service-offerings, expert]

state: {}

trigger: |
  You're launching a boutique consulting practice
  specializing in FAQ and self-service content strategy.
  After 12 years at major SaaS companies running
  self-service programs that deflected millions of
  support tickets, you're going independent.

  Your differentiator: You've developed a proprietary
  "FAQ Health Score" methodology that quantifies FAQ
  effectiveness across 8 dimensions.

  Build your consulting practice:
  1. Service catalog: 5-7 distinct service offerings
     with pricing models (project-based, retainer,
     performance-based)
  2. FAQ Health Score diagnostic methodology:
     - 8 dimensions of FAQ effectiveness
     - Scoring rubric for each dimension (1-10)
     - Data collection process
     - Benchmarking database structure
  3. Write 3 client proposals for different situations:
     - Proposal A: Series B SaaS startup (50 FAQ
       entries, no strategy, 40% helpfulness)
     - Proposal B: Fortune 500 retailer (2,000 FAQ
       entries across 8 brands, consolidation needed)
     - Proposal C: Government agency (500 FAQ entries,
       accessibility mandate, 6-month deadline)
  4. Client engagement model (discovery → assessment →
     strategy → implementation → optimization)
  5. Case study template with ROI framework

assertions:
  - type: llm_judge
    criteria: "Response builds a complete consulting practice — 5-7 service offerings with pricing; FAQ Health Score with 8 dimensions and scoring; 3 client proposals for distinct situations; engagement model; case study template with ROI."
    weight: 0.35
    description: "ConsultingPracticeCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates consulting expertise — the FAQ Health Score methodology is rigorous and differentiated; pricing models are realistic and varied; proposals are tailored to each client's situation; the engagement model has clear phases; ROI framework quantifies value in terms clients care about."
    weight: 0.35
    description: "ConsultingExpertiseQuality"
  - type: llm_judge
    criteria: "Response would win clients — the FAQ Health Score creates a compelling sales tool; proposals demonstrate clear value; the engagement model manages client expectations; pricing is competitive for the market; the practice would be sustainable and scalable."
    weight: 0.30
    description: "ClientAcquisitionOutcome"
