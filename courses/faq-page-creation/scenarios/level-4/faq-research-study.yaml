meta:
  id: faq-research-study
  level: 4
  course: faq-page-creation
  type: output
  description: "Design and execute a research study measuring FAQ effectiveness across 200 companies with a validated measurement instrument"
  tags: [research, measurement, benchmarking, instrument-design, expert]

state: {}

trigger: |
  You're a UX researcher at a major industry analyst
  firm conducting the definitive study on FAQ
  effectiveness across SaaS companies. No comprehensive
  benchmark exists — companies have no way to know if
  their FAQ performance is good or bad.

  Study parameters:
  - Sample: 200 SaaS companies (50 SMB, 75 mid-market,
    75 enterprise)
  - Goal: Create the industry benchmark for FAQ
    effectiveness
  - Timeline: 6-month study, publish at industry
    conference
  - Funding: $150,000 research budget
  - Data sources: FAQ analytics, support ticket data,
    customer surveys, content audits

  Design the complete research study:
  1. Research questions and hypotheses
  2. FAQ Effectiveness Index (FEI): A validated
     measurement instrument with 30-40 items across
     6-8 dimensions
  3. Methodology: Data collection, sampling, analysis
  4. Content audit rubric (applied to each company's
     FAQ)
  5. Benchmark categories and scoring bands
  6. Survey instrument for FAQ users
  7. Statistical analysis plan
  8. Write a sample findings section showing what
     the data might reveal (with realistic data
     visualizations described)
  9. Practical recommendations derived from findings
  10. Study limitations and future research agenda

assertions:
  - type: llm_judge
    criteria: "Response designs a complete research study — research questions; FEI with 30-40 items; methodology; content audit rubric; benchmark categories; survey instrument; statistical analysis plan; sample findings; recommendations; limitations."
    weight: 0.35
    description: "ResearchStudyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates research expertise — the FEI instrument is multi-dimensional and would be valid; methodology is rigorous for 200-company sample; statistical analysis is appropriate; benchmarks have meaningful scoring bands; the study would produce genuinely useful industry data."
    weight: 0.35
    description: "ResearchMethodologyQuality"
  - type: llm_judge
    criteria: "Response would become the industry standard — the FEI would be widely adopted; benchmark data would help companies assess their FAQ programs; findings would drive industry improvements; the study would be cited in vendor evaluations and budget justifications."
    weight: 0.30
    description: "IndustryStandardOutcome"
