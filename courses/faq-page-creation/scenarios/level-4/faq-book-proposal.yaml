meta:
  id: faq-book-proposal
  level: 4
  course: faq-page-creation
  type: output
  description: "Write a book proposal and two sample chapters for 'The FAQ Advantage' — a definitive guide to self-service content strategy"
  tags: [book-proposal, thought-leadership, publishing, self-service, expert]

state: {}

trigger: |
  You're writing the definitive book on FAQ and
  self-service content strategy. After 15 years in
  the field, you've developed a framework called the
  "Self-Service Maturity Model" (SSMM) with 5 stages.
  A publisher has requested a book proposal.

  Book concept: "The FAQ Advantage: How Self-Service
  Content Drives Growth, Reduces Costs, and Delights
  Customers"

  Your SSMM framework:
  - Stage 1: Reactive (FAQ as afterthought, minimal
    content, no strategy)
  - Stage 2: Organized (Categorized FAQ, basic
    analytics, some ownership)
  - Stage 3: Optimized (Data-driven FAQ, search
    optimization, ticket deflection measured)
  - Stage 4: Strategic (Self-service as competitive
    advantage, AI integration, personalization)
  - Stage 5: Transformative (Self-service drives product
    decisions, customer success integration, predictive
    content)

  Create:
  1. Complete book proposal:
     - Overview and positioning
     - Target audience and market analysis
     - Chapter outline (12-15 chapters)
     - Author platform and credentials
     - Comparable titles and differentiation
  2. Sample Chapter 1: "Why Your FAQ Page Is Costing
     You Millions" (the problem chapter — make the
     business case, ~3,000 words)
  3. Sample Chapter 7: "The SSMM Assessment — Where
     Are You Today?" (the framework chapter — present
     the maturity model with assessment tool, ~3,000
     words)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete book proposal and chapters — proposal with overview, audience, chapter outline, author platform, comp titles; Chapter 1 makes business case (~3,000 words); Chapter 7 presents SSMM framework with assessment (~3,000 words)."
    weight: 0.35
    description: "BookProposalCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates publishing and thought leadership expertise — the proposal follows industry conventions; Chapter 1 hooks readers with compelling business case; Chapter 7 presents the SSMM framework with practical assessment; the 5-stage maturity model is logical and actionable; the book fills a genuine market gap."
    weight: 0.35
    description: "ThoughtLeadershipQuality"
  - type: llm_judge
    criteria: "Response would get published — a publisher would see market potential; the SSMM framework is distinctive and quotable; the sample chapters demonstrate writing quality; the target audience would buy the book; the author platform is credible."
    weight: 0.30
    description: "PublishingViabilityOutcome"
