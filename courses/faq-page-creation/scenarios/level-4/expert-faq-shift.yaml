meta:
  id: expert-faq-shift
  level: 4
  course: faq-page-creation
  type: output
  description: "Shift simulation — design FAQs for a space tourism company, an autonomous vehicle manufacturer, and a decentralized finance protocol"
  tags: [shift-simulation, space-tourism, autonomous-vehicles, defi, expert]

state: {}

trigger: |
  You're the world's leading FAQ strategist, hired
  for three unprecedented projects where no FAQ
  template exists.

  === PROJECT 1: Stellar Voyages — Space Tourism ===
  The first commercial space tourism company is
  launching passenger flights to low Earth orbit.
  Passengers pay $250,000 for a 3-day experience
  (2 days training + 1 day in orbit). You need to
  create the FAQ for potential passengers.

  Write 8 FAQ questions covering:
  - Safety and medical requirements (age 21-75, must
    pass physical, 2-day pre-flight training)
  - The experience (zero-gravity, Earth views, meals,
    spacesuit)
  - Booking and payment ($50K deposit, 6-month advance
    booking, full refund if medically disqualified)
  - Practical concerns (insurance, what to bring,
    communication with Earth)
  No template exists — you're writing the first
  space tourism FAQ ever.

  === PROJECT 2: AutoDrive — Autonomous Vehicles ===
  A Level 4 autonomous vehicle manufacturer is
  launching direct-to-consumer sales. The public has
  massive confusion about self-driving cars. Create
  an FAQ that educates and builds trust.

  Write 7 FAQ questions covering:
  - How the technology works (LiDAR, cameras, AI —
    explained simply)
  - Safety (200M+ miles tested, what happens in
    emergencies, insurance implications)
  - Legal (where autonomous mode is legal, liability,
    software updates)
  - Ownership (OTA updates, subscription for autonomy
    features $199/month, maintenance)

  === PROJECT 3: YieldVault — DeFi Protocol ===
  A decentralized finance protocol needs an FAQ page
  for users who may be completely unfamiliar with
  blockchain, wallets, and DeFi concepts.

  Write 7 FAQ questions covering:
  - Getting started (wallet setup, connecting, depositing)
  - How it works (yield farming, APY calculation,
    impermanent loss — explained simply)
  - Risks (smart contract risk, audit status, no FDIC
    insurance, regulatory uncertainty)
  - Security (non-custodial, multi-sig, bug bounty)

  Write all three FAQ sections (22 total questions),
  each pioneering FAQ content for an emerging industry.

assertions:
  - type: llm_judge
    criteria: "Response creates three pioneering FAQ sections — 8 space tourism questions, 7 autonomous vehicle questions, 7 DeFi questions; each addresses an industry with no existing FAQ template; all include specific technical details made accessible to general audiences."
    weight: 0.35
    description: "PioneeringFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates expertise in explaining emerging technology — space tourism FAQ balances excitement with safety reality; autonomous vehicle FAQ builds trust through education; DeFi FAQ makes blockchain concepts accessible without oversimplifying risks; each FAQ would be the definitive reference for its industry."
    weight: 0.35
    description: "EmergingTechExpertiseQuality"
  - type: llm_judge
    criteria: "Each FAQ would serve its unprecedented context — space tourism passengers would feel informed and excited; autonomous vehicle buyers would feel safe; DeFi users would understand both opportunities and risks; all three demonstrate the ability to create FAQ content where none existed before."
    weight: 0.30
    description: "PioneerEffectivenessOutcome"
