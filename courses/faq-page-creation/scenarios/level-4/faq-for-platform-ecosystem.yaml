meta:
  id: faq-for-platform-ecosystem
  level: 4
  course: faq-page-creation
  type: output
  description: "Design an FAQ architecture for a multi-sided platform ecosystem serving merchants, developers, partners, and end consumers"
  tags: [platform-ecosystem, multi-sided, merchants, developers, expert]

state: {}

trigger: |
  You're the Head of Self-Service at ShopSphere, a
  global e-commerce platform serving 4 distinct
  audience segments. Each segment has fundamentally
  different FAQ needs, technical sophistication, and
  relationship with the platform.

  Platform ecosystem:
  - Merchants (150,000): Store owners selling products,
    need help with store setup, payments, shipping,
    marketing tools
  - Developers (25,000): Building apps and integrations,
    need API docs, SDK references, webhook guides
  - Partners (500): Agencies and consultants building
    for merchants, need program guidelines, certifications,
    co-marketing resources
  - Consumers (15M): End shoppers, need help with
    orders, returns, account issues — but ShopSphere
    doesn't own the merchant relationship

  Current state:
  - Merchant FAQ: 400 questions, managed by merchant
    success team
  - Developer FAQ: 150 questions, managed by DevRel
  - Partner FAQ: 50 questions, managed by partnerships
  - Consumer FAQ: None (merchants handle their own)
  - No cross-audience coordination
  - Same questions answered differently for different
    audiences

  Design the platform FAQ architecture:
  1. Unified information architecture that serves all
     4 audiences from a shared content foundation
  2. Content model: Shared base content with audience-
     specific layers
  3. Cross-audience FAQ coordination (e.g., "How does
     shipping work?" has 4 different answers)
  4. Consumer FAQ strategy (providing tools for merchants
     to create their own FAQ pages)
  5. Developer FAQ with code samples and API references
  6. Write 4 sample FAQ entries showing how one topic
     is answered for each audience segment
  7. Governance model across 3 content teams
  8. Self-service FAQ builder for merchants (white-label)
  9. Analytics architecture for cross-audience insights

assertions:
  - type: llm_judge
    criteria: "Response creates a complete platform FAQ architecture — unified IA for 4 audiences; content model with shared base and audience layers; cross-audience coordination; consumer FAQ strategy; developer FAQ; 4 sample entries with audience variants; governance; merchant FAQ builder; analytics."
    weight: 0.35
    description: "PlatformArchitectureCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates platform thinking — the shared content foundation avoids duplication; each audience's unique needs are addressed; the consumer FAQ strategy respects the merchant relationship; developer FAQ includes technical specificity; the merchant FAQ builder is a product feature; governance handles 3 independent content teams."
    weight: 0.35
    description: "PlatformThinkingQuality"
  - type: llm_judge
    criteria: "Response would serve all 4 audiences effectively — merchants would build better stores; developers would integrate faster; partners would operate independently; consumers would get help through merchant FAQ pages; the architecture would scale as the platform grows."
    weight: 0.30
    description: "EcosystemEffectivenessOutcome"
