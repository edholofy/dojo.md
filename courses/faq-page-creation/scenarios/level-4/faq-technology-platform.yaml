meta:
  id: faq-technology-platform
  level: 4
  course: faq-page-creation
  type: output
  description: "Design a next-generation FAQ SaaS platform with AI authoring, analytics, multi-channel delivery, and a marketplace business model"
  tags: [product-design, saas-platform, ai-authoring, marketplace, expert]

state: {}

trigger: |
  You're the co-founder and CPO of FAQly, a startup
  building the next-generation FAQ platform. You've
  raised $4M in seed funding to build a product that
  makes traditional FAQ tools obsolete.

  Market analysis:
  - Existing tools (Zendesk, HelpScout, Intercom) treat
    FAQ as a feature, not a product
  - No tool offers AI-powered authoring, analytics,
    or multi-channel FAQ delivery
  - Market size: $2B in self-service software
  - Target: 10,000 paying customers in 3 years

  Core product vision:
  - AI Author: Auto-generate FAQ answers from support
    tickets, product docs, and conversation logs
  - Smart Analytics: Beyond pageviews — semantic
    analysis of user intent, content gaps, and
    deflection impact
  - Multi-Channel: Deploy FAQs to web, in-app, email,
    chatbot, and voice (Alexa/Google) from single source
  - FAQ Marketplace: Pre-built FAQ templates for
    industries (legal, healthcare, e-commerce, SaaS)
  - Collaboration: Workflow for content teams, SMEs,
    and legal reviewers

  Design the complete product:
  1. Product requirements document (key features per
     module)
  2. AI authoring system specifications
  3. Analytics dashboard design (key metrics, views,
     reports)
  4. Multi-channel delivery architecture
  5. FAQ template marketplace model (pricing, quality
     control, contributor program)
  6. Pricing strategy (freemium → Pro → Enterprise)
  7. Go-to-market plan for first 1,000 customers
  8. Competitive differentiation matrix
  9. 12-month product roadmap with milestones

assertions:
  - type: llm_judge
    criteria: "Response designs a complete FAQ platform product — PRD with feature specs; AI authoring system; analytics dashboard; multi-channel architecture; marketplace model; pricing strategy; go-to-market plan; competitive matrix; 12-month roadmap."
    weight: 0.35
    description: "PlatformDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates product management expertise — AI authoring is technically feasible; analytics go beyond vanity metrics; multi-channel delivery solves a real problem; the marketplace creates a moat; pricing balances growth with revenue; the competitive matrix identifies real differentiation."
    weight: 0.35
    description: "ProductManagementQuality"
  - type: llm_judge
    criteria: "Response would attract users and investors — the product solves real problems FAQ managers face; the AI authoring would save significant time; the marketplace would create network effects; the go-to-market plan would reach 1,000 customers; the $4M seed funding would be deployed effectively."
    weight: 0.30
    description: "ProductMarketFitOutcome"
