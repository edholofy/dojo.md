meta:
  id: faq-certification-program
  level: 4
  course: faq-page-creation
  type: output
  description: "Design a professional certification program for FAQ and self-service content professionals with curriculum, assessment, and credentialing"
  tags: [certification, professional-development, curriculum, credentialing, expert]

state: {}

trigger: |
  You're the Executive Director of the Self-Service
  Content Institute (SSCI), a new professional
  organization. There's no certification for FAQ and
  self-service content professionals — no standards,
  no credentials, no professional development path.
  You're creating the industry's first certification.

  Market need:
  - 250,000+ professionals work on FAQ/self-service
    content globally (estimated)
  - No formal education or certification exists
  - Skills range from basic copywriting to complex
    information architecture and AI integration
  - Employers have no way to evaluate self-service
    content competency
  - The field is evolving rapidly with AI, chatbots,
    and personalization

  Design the certification program:
  1. Certification framework: 3-tier system (Associate,
     Professional, Expert) with prerequisites
  2. Competency model: 8-10 core competencies with
     proficiency levels
  3. Curriculum for each tier (modules, hours, topics)
  4. Assessment methodology (exam design, practical
     projects, portfolio review)
  5. Write 2 sample exam questions for each tier
     (6 total) with answer rubrics
  6. Recertification requirements (continuing education)
  7. Program governance and advisory board structure
  8. Revenue model and pricing strategy
  9. Launch plan and marketing strategy for year 1

assertions:
  - type: llm_judge
    criteria: "Response creates a complete certification program — 3-tier framework; 8-10 competencies; curriculum per tier; assessment methodology; 6 sample exam questions with rubrics; recertification; governance; revenue model; launch plan."
    weight: 0.35
    description: "CertificationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates certification design expertise — competencies cover the full breadth of self-service content skills; tiers represent genuine progression; assessments test real-world ability not just knowledge; exam questions are rigorous; the curriculum prepares candidates for evolving AI landscape."
    weight: 0.35
    description: "CertificationDesignQuality"
  - type: llm_judge
    criteria: "Response would establish a professional standard — employers would recognize the credential; professionals would invest in certification; the competency model would define the field; the certification would drive quality improvement; the program would be financially sustainable."
    weight: 0.30
    description: "ProfessionalStandardOutcome"
