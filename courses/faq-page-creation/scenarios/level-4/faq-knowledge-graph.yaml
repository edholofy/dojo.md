meta:
  id: faq-knowledge-graph
  level: 4
  course: faq-page-creation
  type: output
  description: "Design a knowledge graph-powered FAQ system that understands relationships between questions, topics, and user journeys"
  tags: [knowledge-graph, semantic-web, relationships, user-journeys, expert]

state: {}

trigger: |
  You're the Chief Knowledge Architect at LearnFlow,
  an enterprise learning management system. The
  company wants to move beyond flat FAQ pages to a
  knowledge graph that understands how questions,
  topics, products, and user journeys interconnect.

  Current limitations:
  - 500 FAQ entries treated as isolated Q&A pairs
  - No relationship between related questions
  - Users often need to read 3-4 FAQ entries to solve
    one problem but can't discover the right sequence
  - Search returns individual answers, not journeys
  - Content gaps aren't visible because there's no
    map of the knowledge domain

  Knowledge graph vision:
  - Every FAQ entry is a node connected to related
    entries, product features, user roles, and
    troubleshooting paths
  - Users can navigate naturally between related
    questions
  - The system suggests "You might also need..." paths
  - Content gaps are visible as missing nodes in the
    graph
  - New content can be automatically positioned in the
    graph

  Design the knowledge graph FAQ system:
  1. Knowledge graph ontology (entity types, relationship
     types, properties)
  2. Graph construction methodology (how to convert
     500 flat FAQs into a knowledge graph)
  3. User journey mapping through the graph
  4. "Related questions" recommendation algorithm
  5. Content gap detection using graph analysis
  6. Write 6 sample FAQ entries with their graph
     relationships shown (nodes and edges)
  7. Search architecture that returns paths, not just
     individual answers
  8. Visualization concept for internal content teams
  9. Technical implementation approach (graph database,
     APIs, front-end)

assertions:
  - type: llm_judge
    criteria: "Response designs a complete knowledge graph FAQ system — ontology; construction methodology; journey mapping; recommendation algorithm; gap detection; 6 sample entries with relationships; search architecture; visualization concept; technical implementation."
    weight: 0.35
    description: "KnowledgeGraphCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates knowledge engineering expertise — the ontology captures meaningful relationships; graph construction from flat FAQs is practical; the recommendation algorithm goes beyond keyword matching; gap detection uses graph topology; the visualization helps content teams understand coverage; technical choices are appropriate."
    weight: 0.35
    description: "KnowledgeEngineeringQuality"
  - type: llm_judge
    criteria: "Response would transform FAQ navigation — users would discover related answers naturally; the 3-4 FAQ problem would be solved through journey paths; content gaps would be identified automatically; the knowledge graph would scale as content grows; the system would be more intelligent than traditional FAQ."
    weight: 0.30
    description: "NavigationTransformationOutcome"
