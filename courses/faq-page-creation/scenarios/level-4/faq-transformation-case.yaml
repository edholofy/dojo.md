meta:
  id: faq-transformation-case
  level: 4
  course: faq-page-creation
  type: output
  description: "Execute a complete FAQ transformation for a struggling enterprise — audit, strategy, implementation, measurement, and executive reporting"
  tags: [transformation, enterprise, executive-reporting, roi, expert]

state: {}

trigger: |
  You're a senior consultant brought in to transform
  the FAQ program at NetGuard, a cybersecurity company
  with $500M ARR. The CEO has asked: "Why do we spend
  $12M/year on support when our FAQ exists?"

  The reality:
  - FAQ page: 280 questions, last major update 18
    months ago
  - Support cost: $12M/year (650 agents)
  - Monthly tickets: 95,000
  - FAQ visits: 150,000/month but only 8% ticket
    deflection rate
  - Industry benchmark: 25-35% deflection rate
  - Customer satisfaction: 3.2/5 for self-service
  - NPS impact: Detractors cite "couldn't find answer"
    as #2 reason (after product issues)
  - Budget for transformation: $800K over 12 months

  Execute the complete transformation:
  1. Executive diagnosis: What's broken and why (data-
     driven, 2-page executive summary)
  2. Current state audit findings with scoring
  3. Target state vision with measurable goals
  4. 12-month transformation roadmap (4 phases)
  5. Quick wins: 5 changes that can impact metrics
     within 30 days
  6. Technology and tooling recommendations
  7. Content strategy: What to keep, rewrite, add,
     remove from the 280 questions
  8. Team and skills plan (who needs to be hired/trained)
  9. ROI model: How $800K investment saves $3M+/year
  10. Monthly executive dashboard template
  11. Risk register and mitigation strategies

assertions:
  - type: llm_judge
    criteria: "Response executes a complete FAQ transformation — executive diagnosis; audit findings; target state; 12-month roadmap; quick wins; technology recommendations; content strategy; team plan; ROI model; executive dashboard; risk register."
    weight: 0.35
    description: "TransformationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates transformation consulting expertise — the diagnosis identifies root causes (not symptoms); the ROI model connects $800K investment to measurable savings; quick wins show impact within 30 days; the content strategy handles 280 questions systematically; the executive dashboard tells a clear story."
    weight: 0.35
    description: "TransformationExpertiseQuality"
  - type: llm_judge
    criteria: "Response would deliver measurable results — deflection rate would increase from 8% toward the 25-35% benchmark; the $800K investment would generate $3M+ in annual savings; customer satisfaction would improve; the CEO's question would be answered with data; the transformation would be sustainable beyond the 12-month project."
    weight: 0.30
    description: "MeasurableROIOutcome"
