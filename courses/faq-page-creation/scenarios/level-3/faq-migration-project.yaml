meta:
  id: faq-migration-project
  level: 3
  course: faq-page-creation
  type: output
  description: "Plan and execute a major FAQ migration from a legacy CMS to a modern knowledge platform while preserving SEO and user experience"
  tags: [migration, platform-change, seo-preservation, content-strategy, advanced]

state: {}

trigger: |
  You're the Content Platform Lead at InsurePlus, a
  mid-size insurance company migrating from a 10-year-
  old custom CMS to Contentful. The FAQ section has
  350 entries across 6 product lines generating 120,000
  organic search visits/month. The CEO's mandate: "Do
  not lose a single visitor during migration."

  Current state:
  - 350 FAQ entries across: Auto, Home, Life, Health,
    Pet, Travel insurance
  - 120,000 organic monthly visits (FAQ is #1 traffic
    source)
  - 850 inbound links from external sites
  - 200 FAQ entries rank in Google's top 10 for their
    target queries
  - Legacy URL structure: /faq/auto/question-slug
  - New platform: Contentful headless CMS
  - Timeline: 16 weeks (hard deadline, new CMS goes
    live)

  Risks:
  - URL changes could break 850 inbound links
  - Schema markup could be lost in migration
  - Content could be corrupted during transfer
  - Rankings could drop if Google re-crawls during
    transition
  - Internal links throughout the site reference FAQ
    URLs

  Create:
  1. Migration strategy with phased approach
  2. Content audit and cleanup plan (pre-migration)
  3. URL redirect mapping strategy (301 redirects)
  4. SEO preservation checklist (schema, meta tags,
     canonical URLs, sitemap)
  5. Content modeling in Contentful (content types,
     fields, references)
  6. Quality assurance and testing plan
  7. Rollback plan if something goes wrong
  8. Post-migration monitoring (30/60/90 day checks)
  9. Stakeholder communication plan
  10. Risk mitigation matrix

assertions:
  - type: llm_judge
    criteria: "Response creates a complete migration plan — phased strategy; content audit; URL redirect mapping; SEO preservation checklist; Contentful content model; QA/testing plan; rollback plan; post-migration monitoring; stakeholder communication; risk matrix."
    weight: 0.35
    description: "MigrationPlanCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates platform migration expertise — 301 redirects are comprehensive; Contentful content modeling is technically sound; SEO preservation addresses schema, canonicals, and sitemaps; the 16-week timeline is realistic; the rollback plan is actionable; risk mitigation addresses the CEO's zero-visitor-loss mandate."
    weight: 0.35
    description: "MigrationExpertiseQuality"
  - type: llm_judge
    criteria: "Response would preserve traffic during migration — 120,000 monthly organic visits would be maintained; 850 inbound links would be redirected; Google rankings for 200 queries would be preserved; the migration would complete within 16 weeks; the Contentful model would improve FAQ management going forward."
    weight: 0.30
    description: "TrafficPreservationOutcome"
