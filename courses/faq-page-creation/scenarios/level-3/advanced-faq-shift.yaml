meta:
  id: advanced-faq-shift
  level: 3
  course: faq-page-creation
  type: output
  description: "Shift simulation — design FAQs for a crisis communications scenario, a product sunset, and a marketplace with dual-sided audiences"
  tags: [shift-simulation, crisis-communications, product-sunset, marketplace, advanced]

state: {}

trigger: |
  You're a senior FAQ strategist handling three complex
  client situations simultaneously.

  === SCENARIO 1: Crisis Communications FAQ ===
  A food delivery app (QuickEats) experienced a data
  breach affecting 2.3 million users. Names, email
  addresses, and encrypted passwords were exposed.
  No payment data was compromised. The breach was
  discovered 48 hours ago.

  Write a crisis FAQ (8 questions) that:
  - Acknowledges the breach transparently
  - Explains exactly what data was exposed (and not)
  - Provides clear action steps for affected users
  - Addresses legal/regulatory obligations
  - Maintains trust while being honest
  Tone: Serious, transparent, empathetic

  === SCENARIO 2: Product Sunset FAQ ===
  A SaaS company (DocuSign alternative called SignEasy)
  is discontinuing its free tier on July 1. 180,000
  free users will need to upgrade to the $9/month
  Starter plan or lose access. Data will be preserved
  for 90 days after sunset.

  Write a product sunset FAQ (6 questions) that:
  - Explains the change clearly
  - Provides timeline and migration path
  - Addresses data preservation concerns
  - Offers incentives to convert (25% off first year)
  - Handles emotional reactions (anger, betrayal)
  Tone: Respectful, understanding, solution-focused

  === SCENARIO 3: Marketplace Dual-Sided FAQ ===
  A freelance marketplace (TalentBridge) needs FAQs
  that serve both buyers (companies hiring freelancers)
  and sellers (freelancers seeking work) from a single
  FAQ page.

  Write a dual-audience FAQ (8 questions — 4 buyer-
  focused, 4 seller-focused) covering:
  - Buyers: Pricing (15% service fee), hiring process,
    contracts, payment protection
  - Sellers: Getting started, payment (Net-15, $500
    minimum payout), profile optimization, dispute
    resolution
  Design the FAQ to clearly indicate which audience
  each question serves.

  Write all three FAQ sections (22 total questions).

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct FAQ sections — 8 crisis questions, 6 product sunset questions, and 8 marketplace questions (4 buyer + 4 seller); each includes specific details; all three are clearly labeled; total of 22 questions."
    weight: 0.35
    description: "ShiftFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates advanced FAQ expertise — crisis FAQ balances transparency with legal caution; product sunset FAQ handles emotional users without being dismissive; marketplace FAQ clearly differentiates buyer and seller audiences; each scenario's tone matches its sensitivity level."
    weight: 0.35
    description: "AdvancedFAQExpertiseQuality"
  - type: llm_judge
    criteria: "Each FAQ would manage its situation effectively — the crisis FAQ would reduce panic and maintain trust; the product sunset FAQ would maximize free-to-paid conversion; the marketplace FAQ would serve both audiences without confusion; all three demonstrate strategic FAQ thinking."
    weight: 0.30
    description: "SituationalEffectivenessOutcome"
