meta:
  id: faq-content-operations
  level: 3
  course: faq-page-creation
  type: output
  description: "Build an FAQ content operations program with editorial workflows, SME collaboration, content sprints, and lifecycle management"
  tags: [content-operations, editorial-workflow, sme-collaboration, lifecycle, advanced]

state: {}

trigger: |
  You're the Content Operations Manager at FinEdge,
  a fintech company with 200 FAQ entries that are
  chronically outdated. The product ships bi-weekly,
  support has identified 45 FAQ gaps, and 30% of
  existing FAQs reference deprecated features. There
  are 2 content writers supporting 6 product teams.

  Current problems:
  - No process for updating FAQs when product changes
  - SMEs (subject matter experts) don't respond to
    content review requests
  - No one owns the FAQ page as a product
  - Content writers discover product changes through
    customer complaints
  - No version control or change tracking
  - Seasonal spikes (tax season, year-end) require
    temporary FAQs that never get removed
  - Average FAQ age: 14 months (some are 3+ years old)

  Build the FAQ content operations program:
  1. FAQ ownership model and RACI matrix
  2. Content sprint methodology: How to tackle the 45
     FAQ gaps and 30% outdated content in 90 days
  3. Product-content integration: Process for FAQ
     updates tied to product releases
  4. SME collaboration framework (templates, SLAs,
     incentives)
  5. Content lifecycle management (creation, review,
     update, sunset, archive)
  6. Seasonal content calendar and temporary FAQ
     process
  7. Quality metrics and review cadence
  8. Tooling recommendations for 2 writers managing
     200+ FAQs
  9. Escalation process when content falls out of date

assertions:
  - type: llm_judge
    criteria: "Response creates a complete content operations program — ownership model with RACI; content sprint plan; product-content integration; SME collaboration framework; lifecycle management; seasonal calendar; quality metrics; tooling recommendations; escalation process."
    weight: 0.35
    description: "ContentOpsCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates content operations expertise — the RACI matrix assigns realistic ownership; the 90-day sprint is achievable with 2 writers; SME collaboration addresses the non-response problem; lifecycle management handles the deprecated content; seasonal FAQ process prevents permanent temporary content."
    weight: 0.35
    description: "ContentOpsExpertiseQuality"
  - type: llm_judge
    criteria: "Response would fix the chronically outdated FAQ problem — the 30% deprecated FAQs would be addressed in 90 days; the 45 content gaps would be filled; future product changes would trigger FAQ updates; the 2 writers would have a sustainable workflow; FAQ average age would decrease significantly."
    weight: 0.30
    description: "ContentFreshnessOutcome"
