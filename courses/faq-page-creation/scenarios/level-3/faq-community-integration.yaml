meta:
  id: faq-community-integration
  level: 3
  course: faq-page-creation
  type: output
  description: "Design an FAQ-community hybrid system where community answers supplement official FAQs with moderation and quality control"
  tags: [community, user-generated, moderation, hybrid-system, advanced]

state: {}

trigger: |
  You're the Community & Content Lead at GameForge,
  an online gaming platform with 8 million players.
  The official FAQ has 200 questions but the community
  forums have 50,000+ threads where players answer
  each other's questions — often more helpfully than
  the official FAQ. You want to bridge the two.

  Current state:
  - Official FAQ: 200 questions, maintained by 3-person
    content team, 58% helpfulness rating
  - Community forums: 50,000+ threads, 2,000+ active
    contributors, 78% helpfulness rating
  - Player support tickets: 85,000/month
  - Community moderators: 25 volunteer mods
  - Top community contributors answer 40% of questions
    within 15 minutes (faster than official support)

  The problem:
  - Official FAQ answers are accurate but generic
  - Community answers are specific but sometimes wrong
  - Players don't know which to trust
  - Community knowledge isn't discoverable via FAQ
  - Top contributors aren't recognized or incentivized
  - Some community answers become outdated after
    game updates

  Design the FAQ-community hybrid system:
  1. Integration architecture: How official FAQ and
     community answers coexist
  2. Community answer promotion workflow (community →
     verified → official)
  3. Moderation and quality control framework
  4. Contributor recognition and incentive program
  5. Content freshness system (flagging after game
     updates)
  6. Trust indicators for different answer sources
  7. Search that surfaces both official and community
     answers
  8. Write 4 sample FAQ entries showing the hybrid
     format (official answer + community tips)
  9. Governance model for community-contributed content
  10. Metrics to track hybrid system success

assertions:
  - type: llm_judge
    criteria: "Response designs a complete hybrid FAQ-community system — integration architecture; promotion workflow; moderation framework; contributor program; freshness system; trust indicators; unified search; 4 sample entries; governance model; success metrics."
    weight: 0.35
    description: "CommunityIntegrationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates community management expertise — the promotion workflow has clear quality gates; moderation handles the accuracy problem; contributor incentives are meaningful; trust indicators help players evaluate answer reliability; the freshness system ties to game update cycles; governance protects against toxic or incorrect content."
    weight: 0.35
    description: "CommunityManagementQuality"
  - type: llm_judge
    criteria: "Response would unlock community knowledge — the 78% community helpfulness would boost the 58% official FAQ; top contributors would be retained and recognized; 85,000 monthly tickets would decrease; players would trust the hybrid system; the gaming community's unique knowledge would be preserved."
    weight: 0.30
    description: "CommunityKnowledgeOutcome"
