meta:
  id: multilingual-faq-program
  level: 3
  course: faq-page-creation
  type: output
  description: "Build a multilingual FAQ program for a global marketplace supporting 10 languages with cultural adaptation and translation workflows"
  tags: [multilingual, global, translation, cultural-adaptation, advanced]

state: {}

trigger: |
  You're the Global Content Director at MarketBridge,
  an international B2B marketplace connecting buyers
  and sellers across 30 countries. The English FAQ
  page has 120 questions but only 3 other languages
  are partially supported (French 40%, German 30%,
  Spanish 25% of content translated).

  Expansion requirements:
  - Must support 10 languages within 12 months:
    English, French, German, Spanish, Portuguese (BR),
    Japanese, Korean, Mandarin Chinese, Arabic, Hindi
  - Budget: $200K for year 1, $80K/year ongoing
  - Current translation vendor: Slow (6-week turnaround)
  - Right-to-left language support needed (Arabic)
  - Cultural adaptation required (payment methods,
    business customs, legal requirements vary by region)
  - FAQ must be maintained in all 10 languages ongoing
  - Regional content: Some markets need unique FAQ
    questions not applicable globally

  Design the multilingual FAQ program:
  1. Language prioritization and rollout schedule
  2. Translation vs. transcreation decision framework
  3. Translation workflow (tools, vendors, review)
  4. Cultural adaptation guidelines per language/region
  5. RTL design specifications for Arabic
  6. Regional content management (global vs. local FAQs)
  7. Quality assurance process for translations
  8. Write 3 sample FAQs adapted for 4 markets
     (English, Japanese, Arabic, Portuguese-BR)
  9. Ongoing maintenance model and budget allocation
  10. Technology requirements (CMS, TMS, translation
      memory)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete multilingual FAQ program — language prioritization; translation workflow; cultural adaptation guidelines; RTL specifications; regional content management; QA process; 3 sample FAQs in 4 markets; maintenance model; technology requirements."
    weight: 0.35
    description: "MultilingualProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates global content expertise — language prioritization is market-driven; translation vs transcreation decisions are nuanced; Japanese and Arabic cultural adaptations are specific and accurate; RTL design goes beyond text direction; the $200K budget is allocated realistically across 10 languages."
    weight: 0.35
    description: "GlobalContentExpertiseQuality"
  - type: llm_judge
    criteria: "Response would achieve global FAQ coverage — all 10 languages would be supported within 12 months; cultural missteps would be avoided; translation quality would be professional; the ongoing $80K/year budget would sustain the program; users in all markets would have a native-quality FAQ experience."
    weight: 0.30
    description: "GlobalCoverageOutcome"
