meta:
  id: faq-for-regulated-industry
  level: 3
  course: faq-page-creation
  type: output
  description: "Create a compliant FAQ system for a healthcare insurance company navigating CMS, HIPAA, and state regulatory requirements"
  tags: [regulated-industry, healthcare, insurance, compliance, advanced]

state: {}

trigger: |
  You're the Content Compliance Director at ClearHealth,
  a health insurance company offering plans in 15 US
  states. CMS (Centers for Medicare & Medicaid Services)
  has flagged your member FAQ pages for multiple
  compliance violations during the annual audit.

  Regulatory requirements:
  - CMS marketing guidelines for Medicare Advantage
    plans (strict language requirements)
  - HIPAA: No PHI can appear in FAQ examples
  - ACA (Affordable Care Act): Benefits must be
    accurately described
  - State-specific regulations: 15 states with varying
    requirements for insurance disclosures
  - Accessibility: Section 508 compliance required for
    any federally funded program
  - Language access: FAQs must be available in English
    and Spanish, with taglines in 15 additional languages

  CMS violations found:
  - Using superlatives ("best plan," "lowest cost")
  - Missing required disclaimers on benefit descriptions
  - Inaccurate cost-sharing examples
  - Failure to include non-discrimination notice
  - Missing multi-language taglines

  Create:
  1. Compliance remediation plan for all CMS violations
  2. Rewrite 8 FAQ questions that are fully CMS/HIPAA/
     ACA compliant
  3. Compliance review checklist specific to healthcare
     FAQ content
  4. Approved language library for insurance FAQ writers
  5. State-specific content variation framework
  6. Annual compliance audit schedule and process
  7. Writer training curriculum for regulatory
     compliance

assertions:
  - type: llm_judge
    criteria: "Response creates a complete regulatory compliance solution — remediation plan; 8 compliant FAQ questions; compliance checklist; approved language library; state variation framework; audit schedule; writer training curriculum."
    weight: 0.35
    description: "RegulatoryComplianceCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates healthcare compliance expertise — CMS marketing guidelines are correctly applied; HIPAA requirements avoid PHI in examples; ACA benefit descriptions are accurate; state-specific variations are practical; the approved language library addresses specific prohibited terms; writer training is comprehensive."
    weight: 0.35
    description: "HealthcareComplianceQuality"
  - type: llm_judge
    criteria: "Response would pass the CMS audit — all cited violations are remediated; FAQ content would be approved on review; the compliance framework would prevent future violations; members would understand their benefits despite compliance constraints; the system would scale across 15 states."
    weight: 0.30
    description: "CMSAuditPassOutcome"
