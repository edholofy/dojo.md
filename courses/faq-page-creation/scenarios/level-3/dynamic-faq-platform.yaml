meta:
  id: dynamic-faq-platform
  level: 3
  course: faq-page-creation
  type: output
  description: "Design a dynamic FAQ platform that personalizes content based on user context, product usage, and lifecycle stage"
  tags: [dynamic-content, personalization, user-context, lifecycle, advanced]

state: {}

trigger: |
  You're the Product Manager for Self-Service at
  StreamLine, a project management SaaS with 50,000
  active organizations. You're replacing the static
  FAQ page with a dynamic, personalized FAQ system.

  User research findings:
  - New users (first 30 days) ask setup/onboarding
    questions — but see advanced feature FAQs
  - Enterprise users on the Business plan see FAQs
    about features not in their plan
  - Admin users need different answers than regular
    members for the same question
  - Mobile users see desktop-focused answers
  - Users who just performed an action need contextual
    help, not general FAQ

  Personalization signals available:
  - User role: Admin, Member, Guest
  - Plan tier: Free, Pro ($12/user/month), Business
    ($20/user/month), Enterprise (custom)
  - Account age: New (0-30 days), Established (30-180
    days), Mature (180+ days)
  - Device: Desktop, Mobile, Tablet
  - Last action: What the user just did in the app
  - Feature usage: Which features they've used/not used
  - Support history: Previous tickets and their topics

  Design the dynamic FAQ platform:
  1. Personalization architecture: How signals combine
     to determine which FAQs to show
  2. Content modeling: How FAQ entries are tagged and
     structured for dynamic delivery
  3. Contextual FAQ triggers (in-app help based on
     user action)
  4. Write 6 FAQ entries showing how the same question
     has different answers based on user context (show
     3 variants for each)
  5. Fallback strategy when personalization data is
     unavailable
  6. A/B testing framework for personalization rules
  7. Privacy considerations for user data usage
  8. Technical implementation specifications

assertions:
  - type: llm_judge
    criteria: "Response designs a complete dynamic FAQ platform — personalization architecture; content modeling; contextual triggers; 6 FAQ entries with 3 variants each; fallback strategy; A/B testing framework; privacy considerations; technical specs."
    weight: 0.35
    description: "DynamicFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates personalization product expertise — signals combine logically; content modeling supports dynamic delivery; contextual triggers are specific to user actions; FAQ variants show meaningful differences; the fallback strategy degrades gracefully; A/B testing is rigorous."
    weight: 0.35
    description: "PersonalizationExpertiseQuality"
  - type: llm_judge
    criteria: "Response would dramatically improve self-service — new users would see relevant onboarding FAQs; enterprise users would see plan-appropriate answers; contextual help would prevent tickets before they're created; the personalization would increase FAQ helpfulness significantly."
    weight: 0.30
    description: "PersonalizedSelfServiceOutcome"
