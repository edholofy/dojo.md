meta:
  id: accessible-faq-redesign
  level: 3
  course: faq-page-creation
  type: output
  description: "Redesign a government services FAQ for full WCAG 2.1 AA accessibility, plain language compliance, and assistive technology support"
  tags: [accessibility, wcag, government, plain-language, advanced]

state: {}

trigger: |
  You're an accessibility consultant hired by a state
  Department of Motor Vehicles (DMV) to redesign their
  online FAQ. A Section 508 audit found 32 violations.
  The state attorney general has mandated WCAG 2.1 AA
  compliance within 6 months.

  Current violations (top issues):
  - No heading hierarchy (everything is same size)
  - Color-only indicators for important information
  - Accordion components not keyboard accessible
  - Images of text instead of actual text
  - No skip navigation links
  - Reading level is grade 14+ (government/legal prose)
  - No alternative text on instructional images
  - Form instructions not associated with form fields
  - Focus indicators are removed by CSS
  - Timeouts with no warning on session-based forms

  DMV FAQ scope:
  - 75 questions about: Driver's licenses, vehicle
    registration, titles, ID cards, commercial licenses,
    fees, appointments, online services
  - 2.5 million monthly visitors
  - 45% of visitors are over 55
  - 18% of visitors use assistive technology
  - 30% of visitors have limited English proficiency

  Create:
  1. Accessibility remediation plan prioritized by
     severity and impact
  2. WCAG 2.1 AA compliance specifications for the
     FAQ page components
  3. Plain language rewrite guidelines (target: grade 6
     reading level)
  4. Rewrite 6 FAQ entries demonstrating accessible,
     plain language content
  5. Assistive technology testing plan
  6. Screen reader compatibility specifications
  7. Color contrast and visual design requirements
  8. Keyboard navigation specifications
  9. Ongoing accessibility monitoring plan

assertions:
  - type: llm_judge
    criteria: "Response creates a complete accessibility redesign — prioritized remediation plan; WCAG 2.1 AA specifications; plain language guidelines; 6 rewritten FAQ entries; AT testing plan; screen reader specs; color contrast requirements; keyboard navigation specs; monitoring plan."
    weight: 0.35
    description: "AccessibilityRedesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates deep accessibility expertise — remediation prioritizes critical issues first; WCAG specifications are technically precise; plain language rewrites are genuinely at grade 6 level; screen reader specs address real AT challenges; keyboard navigation handles accordion interaction patterns."
    weight: 0.35
    description: "AccessibilityExpertiseQuality"
  - type: llm_judge
    criteria: "Response would achieve WCAG 2.1 AA compliance — all 32 violations would be remediated; the 18% using assistive technology would have full access; the 45% over 55 demographic would benefit from plain language; the FAQ would pass a re-audit; the DMV would meet the attorney general's mandate."
    weight: 0.30
    description: "ComplianceAchievementOutcome"
