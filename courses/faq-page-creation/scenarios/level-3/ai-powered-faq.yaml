meta:
  id: ai-powered-faq
  level: 3
  course: faq-page-creation
  type: output
  description: "Design an AI-powered FAQ system with semantic search, auto-generated answers, content suggestion, and quality assurance"
  tags: [ai-powered, semantic-search, auto-generation, machine-learning, advanced]

state: {}

trigger: |
  You're the Director of Knowledge Management at
  SupportHub, a customer support platform serving
  500 B2B clients. The board has approved $750K to
  build an AI-powered FAQ system that goes beyond
  traditional static FAQ pages.

  Current state:
  - 500 B2B clients each manage their own FAQ pages
    on SupportHub
  - Average client has 45 FAQ questions
  - Total: ~22,500 FAQ entries across all clients
  - 60% of support tickets are answerable by existing
    FAQ content (but customers don't find it)
  - Average keyword search relevance: 35% accuracy
  - Clients spend 15 hours/month maintaining FAQs

  AI capabilities to design:
  1. Semantic search: Replace keyword search with
     intent-based search (understand "can't login"
     means "password reset")
  2. Auto-answer generation: Suggest FAQ answers from
     support ticket resolutions
  3. Content gap detection: Identify questions customers
     ask that have no FAQ answer
  4. FAQ quality scoring: Automatically rate answer
     clarity, completeness, and freshness
  5. Personalized FAQ: Show different questions based
     on user's product plan, history, and behavior

  Design the complete AI-powered FAQ system:
  1. System architecture and AI/ML components
  2. Semantic search implementation plan
  3. Auto-answer generation workflow with human review
  4. Content gap detection algorithm design
  5. FAQ quality scoring rubric and automation
  6. Personalization engine specifications
  7. Data privacy and AI ethics considerations
  8. Rollout plan (beta clients → general availability)
  9. Success metrics and benchmarks

assertions:
  - type: llm_judge
    criteria: "Response designs a complete AI-powered FAQ system — system architecture; semantic search plan; auto-answer workflow; gap detection; quality scoring; personalization specs; privacy/ethics; rollout plan; success metrics."
    weight: 0.35
    description: "AIFAQSystemCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates AI/ML product expertise — semantic search addresses the 35% accuracy problem; auto-answer generation includes human-in-the-loop; gap detection uses real ticket data; quality scoring is objective and automated; personalization is meaningful; privacy considerations address B2B data concerns."
    weight: 0.35
    description: "AIProductExpertiseQuality"
  - type: llm_judge
    criteria: "Response would dramatically improve FAQ effectiveness — the 60% deflectable tickets would be addressed; search accuracy would increase far above 35%; clients would spend less than 15 hours/month on maintenance; the system would justify the $750K investment within 12 months."
    weight: 0.30
    description: "AITransformationOutcome"
