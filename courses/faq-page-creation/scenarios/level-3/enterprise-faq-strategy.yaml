meta:
  id: enterprise-faq-strategy
  level: 3
  course: faq-page-creation
  type: output
  description: "Design a unified FAQ strategy across a multi-product enterprise with cross-functional governance, content operations, and self-service integration"
  tags: [enterprise, strategy, multi-product, governance, advanced]

state: {}

trigger: |
  You're the VP of Customer Experience at OmniCloud,
  an enterprise software company with 5 products, 3
  audience segments, and 12,000 FAQ questions across
  disparate systems. The CEO has mandated a unified
  self-service strategy.

  Current state:
  - Products: CRM, Marketing Automation, Commerce,
    Analytics, Service Cloud
  - Audience segments: SMB, Mid-Market, Enterprise
  - FAQ systems: Each product has its own FAQ page
    built by different teams using different tools
  - Total FAQ questions: 12,000 (estimated 40%
    duplicated or outdated)
  - Support tickets: 180,000/month, 35% could be
    deflected by better self-service
  - Customer satisfaction with self-service: 42%
  - 8 content teams, no shared standards
  - Budget: $2M for the transformation (18 months)

  Create a comprehensive enterprise FAQ strategy:
  1. Audit framework for the 12,000 existing questions
  2. Unified content architecture across 5 products
  3. Governance model with roles, responsibilities,
     and cross-product coordination
  4. Content operations workflow (creation, review,
     publish, retire)
  5. Technology platform recommendations
  6. Audience segmentation strategy (how FAQs differ
     for SMB vs Enterprise)
  7. Integration plan with support ticketing system
  8. 18-month implementation roadmap with phases
  9. ROI model and success metrics
  10. Change management plan for 8 content teams

assertions:
  - type: llm_judge
    criteria: "Response creates a complete enterprise FAQ strategy — audit framework; unified architecture; governance model; content operations; technology recommendations; audience segmentation; ticketing integration; 18-month roadmap; ROI model; change management plan."
    weight: 0.35
    description: "EnterpriseStrategyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates enterprise content expertise — the audit framework would handle 12,000 questions systematically; governance balances centralization with product team autonomy; the roadmap is realistic for $2M/18 months; ROI calculation addresses the 63,000 deflectable tickets; audience segmentation is meaningful not superficial."
    weight: 0.35
    description: "EnterpriseExpertiseQuality"
  - type: llm_judge
    criteria: "Response would transform self-service — customer satisfaction would increase above 42%; ticket deflection would approach the 35% target; duplicate content would be eliminated; 8 teams would operate with shared standards; the transformation would pay for itself through ticket reduction."
    weight: 0.30
    description: "SelfServiceTransformationOutcome"
