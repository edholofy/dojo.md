meta:
  id: global-faq-standards
  level: 5
  course: faq-page-creation
  type: output
  description: "Found an international standards body for self-service content quality with certification, benchmarking, and a global quality framework"
  tags: [standards-body, international, certification, quality-framework, master]

state: {}

trigger: |
  You're leading the founding of the International
  Self-Service Content Standards Council (ISCSSC),
  a global body that will define quality standards
  for FAQ and self-service content across industries.
  Founding sponsors include 3 Fortune 100 companies,
  2 government agencies, and the world's largest
  customer support association.

  The problem the ISCSSC solves:
  - No agreed-upon definition of "good" FAQ content
  - No cross-industry benchmarks
  - No professional standards for self-service writers
  - Companies waste billions on ineffective self-service
  - Consumers can't distinguish quality self-service
    from poor self-service

  Design the complete standards body:
  1. ISCSSC charter, mission, and governance structure
  2. Self-Service Content Quality Standard (SCQS-1000):
     - 7 quality dimensions with measurable criteria
     - Scoring methodology (1-100)
     - Certification levels: Bronze, Silver, Gold,
       Platinum
  3. Industry-specific supplements (healthcare, finance,
     government, technology, e-commerce)
  4. Certified Self-Service Professional (CSSP)
     individual credential with exam blueprint
  5. Global benchmarking study design (annual)
  6. 5-year strategic roadmap with milestones
  7. Founding document and stakeholder value proposition

assertions:
  - type: llm_judge
    criteria: "Response creates a complete standards body — charter and governance; SCQS-1000 with 7 dimensions; 4-tier certification; industry supplements for 5 sectors; CSSP individual credential; benchmarking study; 5-year roadmap; founding document."
    weight: 0.35
    description: "StandardsBodyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates standards governance expertise — the 7 quality dimensions are comprehensive and measurable; certification levels represent genuine quality progression; industry supplements address real sector-specific needs; the CSSP exam blueprint covers essential competencies; the roadmap is realistic."
    weight: 0.35
    description: "StandardsGovernanceQuality"
  - type: llm_judge
    criteria: "Response would establish an industry standard — companies would pursue SCQS certification; professionals would earn CSSP credentials; the benchmarking study would be cited; industry supplements would address real compliance needs; the ISCSSC would become the recognized authority."
    weight: 0.30
    description: "IndustryStandardOutcome"
