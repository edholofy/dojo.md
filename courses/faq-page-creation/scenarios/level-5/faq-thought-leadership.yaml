meta:
  id: faq-thought-leadership
  level: 5
  course: faq-page-creation
  type: output
  description: "Establish thought leadership in self-service content — keynote address, manifesto, industry article, and TEDx outline redefining FAQ as a strategic discipline"
  tags: [thought-leadership, keynote, manifesto, industry-influence, master]

state: {}

trigger: |
  You've spent 20 years revolutionizing how companies
  think about FAQ and self-service content. You've
  been invited to give the opening keynote at the
  first-ever Global Self-Service Summit (2,500
  attendees from 40 countries). This is your moment
  to redefine the field.

  Your thesis: "The Question Economy" — We live in an
  economy where the ability to answer questions at
  scale determines competitive advantage. Companies
  that master self-service content don't just reduce
  costs — they build trust, drive growth, and create
  knowledge assets that appreciate over time.

  Create:
  1. Keynote address: "The Question Economy" (45
     minutes, full script with speaker notes, audience
     engagement moments, and slide descriptions)
  2. "The Self-Service Manifesto" — 10 principles
     that should guide every organization's approach
     to FAQ and self-service content, each with a
     paragraph of explanation
  3. Industry article: "Why Your FAQ Page Is Your
     Most Strategic Asset" for Harvard Business Review
     (~2,000 words)
  4. TEDx talk outline: "What Questions Reveal" —
     a 15-minute talk connecting FAQ creation to
     empathy, understanding, and human connection

assertions:
  - type: llm_judge
    criteria: "Response creates complete thought leadership content — full keynote script with speaker notes; 10-principle manifesto with explanations; HBR article (~2,000 words); TEDx outline connecting FAQ to empathy and human connection."
    weight: 0.35
    description: "ThoughtLeadershipCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates visionary thinking — 'The Question Economy' thesis is compelling and novel; the manifesto establishes new principles; the HBR article makes a rigorous business case; the TEDx talk connects FAQ to deeper human themes; all four pieces elevate FAQ from tactical to strategic."
    weight: 0.35
    description: "VisionaryThinkingQuality"
  - type: llm_judge
    criteria: "Response would establish thought leadership — the keynote would inspire 2,500 attendees; the manifesto would be shared widely; the HBR article would be cited in boardrooms; the TEDx talk would reach millions; the speaker would be recognized as the definitive voice in self-service content."
    weight: 0.30
    description: "IndustryInfluenceOutcome"
