meta:
  id: faq-government-policy
  level: 5
  course: faq-page-creation
  type: output
  description: "Draft national policy on digital information access — citizen self-service standards, plain language mandates, and accountability requirements for government FAQ systems"
  tags: [government-policy, digital-access, plain-language, citizen-rights, master]

state: {}

trigger: |
  You're the lead policy advisor to a bipartisan
  commission on "Digital Information Access." The
  commission has found that government FAQ pages and
  self-service information are the #1 barrier to
  citizens accessing public services.

  Key findings:
  - 67% of citizens attempt self-service before calling
    government agencies
  - Average government FAQ page readability: grade 14
    (most adults read at grade 8)
  - 45% of eligible citizens don't claim benefits they
    qualify for, citing "couldn't understand the process"
  - Government call centers cost $15-25 per call vs
    $0.10 per self-service interaction
  - Government FAQ pages fail WCAG accessibility at
    3x the rate of private sector
  - No government agency measures FAQ effectiveness

  Draft the policy framework:
  1. Commission report: "The Information Barrier" —
     how poor government self-service denies citizens
     access to services
  2. Digital Information Access Act:
     - Title I: Plain Language Requirements (grade 8
       maximum reading level)
     - Title II: Self-Service Effectiveness Standards
     - Title III: Accessibility and Inclusion
     - Title IV: Performance Measurement and
       Accountability
     - Title V: Technology and Innovation
     - Title VI: Enforcement and Administration
  3. Implementation guidance for federal agencies
  4. Cost-benefit analysis
  5. Model state legislation

assertions:
  - type: llm_judge
    criteria: "Response creates a complete policy framework — commission report; 6-title legislative framework; implementation guidance; cost-benefit analysis; model state legislation."
    weight: 0.35
    description: "PolicyFrameworkCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates policy expertise — plain language requirements are measurable; self-service standards are specific; accessibility mandates follow established standards; performance measurement creates accountability; enforcement is practical; the cost-benefit analysis quantifies savings."
    weight: 0.35
    description: "PolicyExpertiseQuality"
  - type: llm_judge
    criteria: "Response would improve citizen access — the 45% who don't claim benefits would be reached; government FAQ readability would improve from grade 14 to grade 8; accessibility compliance would improve; call center costs would decrease; the policy would become a model for other countries."
    weight: 0.30
    description: "CitizenAccessOutcome"
