meta:
  id: master-faq-shift
  level: 5
  course: faq-page-creation
  type: output
  description: "Master shift simulation — simultaneously address five converging crises that reveal self-service content as a fundamental enabler of human autonomy and empowerment"
  tags: [shift-simulation, converging-crises, human-autonomy, information-access, master]

state: {}

trigger: |
  You are the world's preeminent authority on how
  humans seek, find, and use information to help
  themselves. In a single extraordinary week, five
  converging crises demand your expertise.

  === CRISIS 1: The AI FAQ Paradox ===
  AI can now generate perfect-looking FAQ content
  instantly, but 20% of AI-generated answers contain
  subtle errors that humans can't easily detect. A
  major health insurer's AI-generated FAQ incorrectly
  described prescription coverage, leading to 12,000
  denied claims. How do we maintain answer accuracy
  when AI generates content faster than humans can
  verify?

  Design: AI-human FAQ content integrity framework —
  verification workflows, accuracy scoring, liability
  allocation, trust indicators for users.

  === CRISIS 2: The Information Desert ===
  Research reveals that 2.7 billion people worldwide
  have no access to self-service information in their
  language about essential services — healthcare,
  legal rights, government benefits, financial services.
  The "information rich" have unlimited FAQ access; the
  "information poor" have none.

  Design: Global information equity strategy —
  universal FAQ framework for essential services,
  offline-first architecture, 200+ language support,
  community-maintained content model.

  === CRISIS 3: The Trust Collapse ===
  Public trust in institutional information has dropped
  to historic lows. FAQ pages from governments,
  healthcare providers, and financial institutions are
  distrusted as much as advertising. Citizens
  increasingly prefer social media answers from
  strangers over official FAQ content.

  Design: Trust restoration framework — content
  provenance, source verification, community
  validation, radical transparency in FAQ creation.

  === CRISIS 4: The Cognitive Accessibility Crisis ===
  Studies show that 50% of adults in developed
  countries cannot understand standard FAQ content.
  This isn't a literacy issue — it's a cognitive load
  and information design failure. The people who need
  self-service most are the ones least served by it.

  Design: Universal comprehension framework — cognitive
  accessibility standards beyond WCAG, multi-modal
  answers (text + audio + video + visual), adaptive
  complexity, reading level personalization.

  === CRISIS 5: The Legacy Question ===
  You've spent your career making information
  accessible. Now you face the ultimate question:
  What does the future of self-service look like when
  AI can answer any question? Is the FAQ obsolete?
  Or does the human need to find answers independently
  represent something deeper than technology?

  Design: Your philosophy of self-service — why the
  ability to find answers matters beyond efficiency,
  what makes great self-service content timeless,
  and the document that captures what you've learned
  about helping people help themselves.

  Task: Write complete responses to all five crises,
  revealing how they interconnect and expose self-
  service content as a fundamental enabler of human
  autonomy.

assertions:
  - type: llm_judge
    criteria: "Response addresses all five crises — AI integrity framework with verification and liability; information equity strategy with 200+ languages; trust restoration with provenance and transparency; cognitive accessibility beyond WCAG; legacy philosophy connecting self-service to human autonomy."
    weight: 0.35
    description: "MasterShiftCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of self-service as human empowerment — the AI crisis reveals that accuracy is the foundation of trust; the information desert shows self-service as a human right; the trust collapse proves that institutional credibility must be earned through transparency; cognitive accessibility shows the field has failed its most important users; the legacy connects self-service to human dignity and independence."
    weight: 0.35
    description: "HumanAutonomyMasteryQuality"
  - type: llm_judge
    criteria: "Response would define the future of self-service — the AI integrity framework would become the standard; the equity strategy would reach 2.7 billion underserved people; trust restoration would rebuild institutional credibility; cognitive accessibility would make information truly universal; the legacy would inspire the next generation to see self-service as a calling, not just a job."
    weight: 0.30
    description: "CivilizationImpactOutcome"
