meta:
  id: faq-technology-unicorn
  level: 5
  course: faq-page-creation
  type: output
  description: "Build a unicorn startup around AI-powered self-service — product vision, Series C pitch, category creation, and path to $1B valuation"
  tags: [unicorn, startup, ai-platform, category-creation, master]

state: {}

trigger: |
  You're the CEO of AnswerIQ, a startup that has
  raised $8M (Seed + Series A) and is preparing for
  a $60M Series C at a $600M valuation. AnswerIQ's
  AI platform generates, optimizes, and personalizes
  FAQ content automatically — creating a new category
  called "Intelligent Self-Service."

  AnswerIQ's AI capabilities:
  - Answer Engine: Ingests product docs, support
    tickets, and user behavior to auto-generate FAQ
    entries with 95% accuracy
  - Optimization AI: Continuously A/B tests answer
    phrasing, structure, and format to maximize
    helpfulness
  - Personalization Layer: Shows different answers
    based on user context (plan, tenure, behavior)
  - Gap Predictor: Identifies questions customers
    will ask before they ask them (based on product
    usage patterns)
  - Translation AI: Real-time translation and cultural
    adaptation for 50+ languages

  Current traction:
  - $12M ARR, growing 180% YoY
  - 800 customers (200 enterprise)
  - Average 45% ticket deflection improvement
  - Customer NPS: 72
  - Net revenue retention: 145%

  Create:
  1. Series C pitch deck narrative (12-15 slides
     described with key messages)
  2. Category creation strategy: How to establish
     "Intelligent Self-Service" as a recognized
     category
  3. Product roadmap: Next 18 months with AI
     capabilities expansion
  4. Competitive moat analysis (data network effects,
     AI model advantages)
  5. Path to $100M ARR and $1B+ valuation
  6. IPO vs acquisition scenario analysis

assertions:
  - type: llm_judge
    criteria: "Response builds a complete unicorn narrative — Series C pitch deck; category creation strategy; 18-month product roadmap; competitive moat analysis; path to $100M ARR; IPO vs acquisition analysis."
    weight: 0.35
    description: "UnicornBuildCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates startup and venture expertise — the pitch deck tells a compelling growth story; category creation strategy draws on proven frameworks; the moat analysis identifies real defensibility; revenue projections are credible given 180% growth; IPO analysis considers realistic timelines."
    weight: 0.35
    description: "VentureExpertiseQuality"
  - type: llm_judge
    criteria: "Response would convince investors — the $60M Series C at $600M valuation is justified; the category creation strategy would establish market leadership; the path to $100M ARR is achievable; the competitive moat would withstand incumbent competition; AnswerIQ would become the category-defining company."
    weight: 0.30
    description: "InvestorConvictionOutcome"
