meta:
  id: faq-social-enterprise
  level: 5
  course: faq-page-creation
  type: output
  description: "Launch a social enterprise providing self-service content for underserved populations — immigrants, elderly, rural communities, and people with disabilities"
  tags: [social-enterprise, accessibility, underserved, digital-equity, master]

state: {}

trigger: |
  You're founding "Answers For All," a social
  enterprise dedicated to making essential information
  accessible to populations that traditional FAQ
  systems fail. Your mission: No one should be denied
  access to important information because of language,
  literacy, disability, or digital access.

  Target populations:
  - Immigrants and refugees (language barriers, cultural
    unfamiliarity with systems, legal complexity)
  - Elderly adults (digital literacy gaps, vision/
    hearing impairments, cognitive changes)
  - Rural communities (limited internet, fewer in-person
    resources, different information needs)
  - People with disabilities (screen readers,
    cognitive accessibility, motor impairments)

  Services focus areas:
  - Government benefits enrollment (Social Security,
    Medicare, SNAP, housing assistance)
  - Healthcare navigation (insurance, appointments,
    medication, rights)
  - Legal rights (tenant rights, employment rights,
    immigration processes)

  Design the social enterprise:
  1. Mission, theory of change, and impact model
  2. Content design principles for each underserved
     population
  3. Accessibility-first content architecture
  4. Write 4 sample FAQ entries (one for each
     population) demonstrating adapted content
  5. Multi-channel delivery (web, SMS, phone IVR,
     printed materials, community centers)
  6. Partnership strategy (government agencies, NGOs,
     libraries, healthcare systems)
  7. Volunteer and professional content creator model
  8. Impact measurement framework
  9. Funding model (grants, government contracts,
     earned revenue)
  10. 3-year growth plan

assertions:
  - type: llm_judge
    criteria: "Response creates a complete social enterprise — mission and theory of change; content design for 4 populations; accessibility architecture; 4 adapted sample entries; multi-channel delivery; partnerships; creator model; impact measurement; funding model; 3-year plan."
    weight: 0.35
    description: "SocialEnterpriseCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates social impact expertise — content adaptations are specific to each population's needs; accessibility goes beyond WCAG compliance to true inclusion; multi-channel delivery accounts for digital divides; impact measurement captures real outcomes; the funding model is sustainable."
    weight: 0.35
    description: "SocialImpactQuality"
  - type: llm_judge
    criteria: "Response would improve information access — immigrants would navigate benefits systems; elderly would access healthcare information; rural communities would overcome distance barriers; people with disabilities would have fully accessible content; the enterprise would be replicable and scalable."
    weight: 0.30
    description: "InformationEquityOutcome"
