meta:
  id: faq-for-existential-challenges
  level: 5
  course: faq-page-creation
  type: output
  description: "Design FAQ systems for civilization-scale challenges — pandemic public health, climate migration, and AI workforce displacement"
  tags: [existential-challenges, pandemic, climate, ai-displacement, master]

state: {}

trigger: |
  As the world's foremost authority on making complex
  information accessible, three global organizations
  have simultaneously asked for your help with
  civilization-scale information challenges.

  === CHALLENGE 1: Pandemic Preparedness FAQ System ===
  The WHO wants a global FAQ template that any country
  can deploy within 48 hours of a pandemic declaration.
  Lessons from COVID: misinformation filled the FAQ
  vacuum when governments were too slow.

  Design: Rapid-deploy FAQ system with pre-written
  templates for 8 pandemic scenarios, translation
  framework for 20+ languages, misinformation
  counter-FAQ strategy, and community health worker
  FAQ toolkit.

  === CHALLENGE 2: Climate Migration Information Hub ===
  The UNHCR estimates 200M+ climate migrants by 2050.
  These people need to understand complex legal,
  practical, and survival information in extreme
  circumstances.

  Design: Climate migration FAQ architecture with
  content for 4 phases (pre-displacement, active
  displacement, arrival, integration), offline-first
  design (limited internet), multilingual with 30+
  languages, and integration with emergency services.

  === CHALLENGE 3: AI Workforce Transition FAQ ===
  The ILO (International Labour Organization) projects
  85M jobs displaced by AI by 2030. Workers need to
  understand reskilling options, benefits, rights,
  and transition paths.

  Design: Workforce transition FAQ with personalized
  paths based on industry/role, reskilling program
  directory, benefits navigation, psychological
  support resources, and employer responsibility FAQ.

  Create complete designs for all three challenges.

assertions:
  - type: llm_judge
    criteria: "Response addresses all three challenges — pandemic FAQ system with rapid deployment and misinformation strategy; climate migration hub with 4 phases and offline design; AI workforce transition with personalized paths; each design is comprehensive and actionable."
    weight: 0.35
    description: "ExistentialChallengesCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mastery of information design at scale — pandemic templates would deploy in 48 hours; climate migration design accounts for extreme conditions; AI transition FAQ personalizes by industry; all three address real human needs in crisis; misinformation strategies are sophisticated."
    weight: 0.35
    description: "CivilizationScaleExpertiseQuality"
  - type: llm_judge
    criteria: "Response would save lives and livelihoods — pandemic FAQ would outpace misinformation; climate migrants would navigate displacement successfully; displaced workers would find transition paths; all three demonstrate that information access is a fundamental human need."
    weight: 0.30
    description: "HumanitarianImpactOutcome"
