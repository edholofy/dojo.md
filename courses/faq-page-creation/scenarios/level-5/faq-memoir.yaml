meta:
  id: faq-memoir
  level: 5
  course: faq-page-creation
  type: output
  description: "Write a professional memoir about a career spent making information accessible — 3 chapters exploring the art and impact of answering questions well"
  tags: [memoir, career-reflection, storytelling, professional-legacy, master]

state: {}

trigger: |
  You've spent 20 years helping organizations answer
  their customers' questions. From your first job
  writing a 10-question FAQ for a pizza shop to
  leading a $5M self-service transformation at a
  Fortune 100 company, you've learned that the
  seemingly simple act of answering questions is
  one of the most undervalued skills in business.

  Write your professional memoir: "Every Question
  Matters: A Career in the Art of Answers"

  Chapter 1: "The Pizza Shop FAQ" (~2,500 words)
  Your first content job at 22 — writing FAQ for a
  local pizza chain. The owner said "just write what
  people ask." You discovered that the most frequently
  asked question ("Is the dough made fresh?") was the
  one the owner least wanted to answer honestly. This
  taught you that FAQ is about truth, not marketing.
  Explore the tension between what companies want to
  say and what customers need to hear.

  Chapter 8: "The Day the FAQ Saved a Life" (~2,500
  words)
  A pharmaceutical company's patient FAQ about drug
  interactions was unclear. A patient misunderstood
  the answer about mixing medications. After the
  near-miss, you rewrote every patient-facing FAQ
  with the principle: "Write as if the reader's life
  depends on understanding this — because sometimes
  it does." Explore the ethical weight of FAQ content.

  Chapter 15: "The $50 Million Question" (~2,500 words)
  Your crowning project: proving to a skeptical CEO
  that investing $5M in self-service content would
  save $50M over 5 years. You built the business case,
  led the transformation, and watched the numbers
  prove you right. But the real victory wasn't the
  money — it was when a customer wrote: "For the first
  time, I could help myself." Explore the business
  case for empowering customers with information.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling memoir — 3 chapters at ~2,500 words each; Chapter 1 explores truth vs marketing; Chapter 8 explores ethical weight; Chapter 15 explores business case for self-service; all chapters use narrative storytelling with specific scenes and dialogue."
    weight: 0.35
    description: "MemoirCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates memoir writing craft — storytelling uses scenes not summaries; characters are vivid; the pizza shop chapter is charming and relatable; the pharmaceutical chapter is emotionally gripping; the $50M chapter balances business and human impact; the author's voice is consistent and authentic."
    weight: 0.35
    description: "MemoirWritingQuality"
  - type: llm_judge
    criteria: "Response would resonate with readers — professionals would see their own work reflected; the memoir would elevate FAQ work from mundane to meaningful; each chapter reveals a deeper truth about information access; the book would inspire others to take self-service content seriously."
    weight: 0.30
    description: "ReaderResonanceOutcome"
