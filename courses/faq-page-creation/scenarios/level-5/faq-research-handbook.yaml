meta:
  id: faq-research-handbook
  level: 5
  course: faq-page-creation
  type: output
  description: "Author chapters for the definitive academic handbook on Self-Service Information Science — editorial framework and 3 authored chapters"
  tags: [research-handbook, academic, information-science, editorial, master]

state: {}

trigger: |
  You're the editor-in-chief of "The Handbook of
  Self-Service Information Science," commissioned by
  a major academic publisher. This is the first
  comprehensive academic treatment of FAQ, knowledge
  bases, chatbots, and self-service content as a
  unified field of study.

  Handbook scope:
  - 25 chapters by 40+ contributing authors
  - Target audience: Researchers, graduate students,
    and senior practitioners
  - Publication: Both print and open-access digital

  Design the complete handbook:
  1. Editorial introduction: Why self-service
     information science deserves academic recognition
     as a field (~1,500 words)
  2. Table of contents: 25 chapters organized into
     6 parts with descriptions and target authors
  3. Write Chapter 1: "A History of Self-Service
     Information: From Library Card Catalogs to AI
     Chatbots" (~3,000 words, tracing the evolution)
  4. Write Chapter 12: "The Psychology of Self-Service:
     Why People Prefer to Find Answers Themselves"
     (~3,000 words, cognitive science perspective)
  5. Write Chapter 25: "The Future of Self-Service:
     An Integrative Theory" (~3,000 words, proposing
     a unified theoretical framework)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete academic handbook — editorial introduction; 25-chapter table of contents in 6 parts; Chapter 1 history (~3,000 words); Chapter 12 psychology (~3,000 words); Chapter 25 future/theory (~3,000 words)."
    weight: 0.35
    description: "HandbookCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic expertise — the editorial introduction makes a compelling case for the field; chapters are properly structured with literature references; the historical chapter traces meaningful evolution; the psychology chapter engages cognitive science; the integrative theory chapter proposes an original framework."
    weight: 0.35
    description: "AcademicScholarshipQuality"
  - type: llm_judge
    criteria: "Response would advance the field — the handbook would be adopted in graduate programs; the integrative theory would be cited; the 25-chapter structure would comprehensively cover the field; the handbook would legitimize self-service information science as an academic discipline."
    weight: 0.30
    description: "FieldAdvancementOutcome"
