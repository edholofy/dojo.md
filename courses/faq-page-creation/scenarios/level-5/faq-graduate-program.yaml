meta:
  id: faq-graduate-program
  level: 5
  course: faq-page-creation
  type: output
  description: "Design a graduate academic program in Self-Service Information Design with curriculum, research center, and industry partnership model"
  tags: [graduate-program, academic, curriculum, research-center, master]

state: {}

trigger: |
  You've been appointed to design a new graduate
  program at a top-25 university: the Master of
  Science in Self-Service Information Design (MSSID).
  This is the first academic program dedicated to the
  science and practice of helping people find answers
  independently — combining information science,
  cognitive psychology, UX design, and AI.

  University context:
  - School of Information Sciences (existing programs
    in Library Science and Data Analytics)
  - Strong partnerships with 50+ tech companies
  - Research budget: $500K/year for the new center
  - Target enrollment: 30 students per cohort
  - Format: Hybrid (on-campus + online)

  Design the complete graduate program:
  1. Program vision and learning outcomes
  2. Curriculum: 10 courses (30 credit hours) across
     4 concentrations:
     - Self-Service Content Design
     - Information Architecture & Search
     - AI & Conversational Design
     - Analytics & Optimization
  3. Design 2 courses in detail: syllabus, weekly
     topics, assignments, readings
  4. Capstone project guidelines
  5. Center for Self-Service Research: Mission, 3-year
     research agenda, industry partnership model
  6. Faculty requirements and advisory board
  7. Student recruitment and career outcomes
  8. Program sustainability and growth plan

assertions:
  - type: llm_judge
    criteria: "Response designs a complete graduate program — vision and outcomes; 10-course curriculum across 4 concentrations; 2 detailed course syllabi; capstone guidelines; research center with 3-year agenda; faculty requirements; recruitment plan; sustainability model."
    weight: 0.35
    description: "GraduateProgramCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates academic program design expertise — curriculum balances theory and practice; 4 concentrations cover the field comprehensively; detailed syllabi are graduate-level; capstone projects produce original work; the research center agenda advances knowledge; faculty requirements are realistic."
    weight: 0.35
    description: "AcademicDesignQuality"
  - type: llm_judge
    criteria: "Response would attract students and industry partners — graduates would fill a real market need; the research center would produce cited work; industry partners would recruit graduates; the program would be financially sustainable at 30 students/cohort; this would become the gold-standard program."
    weight: 0.30
    description: "ProgramViabilityOutcome"
