meta:
  id: beginner-faq-shift
  level: 1
  course: faq-page-creation
  type: output
  description: "Shift simulation — write three different FAQ pages for distinct business types, each with its own tone, audience, and objectives"
  tags: [shift-simulation, multi-business, faq-variety, tone-adaptation, beginner]

state: {}

trigger: |
  You're a freelance content writer who just landed
  three FAQ page projects due this week. Each client
  is a different business type with different needs.

  === CLIENT 1: PawPals Pet Daycare ===
  Write 5 FAQ questions for a pet daycare website.
  Context:
  - Full day: $45, half day: $28
  - Hours: 7am-7pm M-F, 8am-5pm Sat
  - Dogs only, must be spayed/neutered and vaccinated
    (rabies, DHPP, bordetella)
  - Temperament assessment required for first visit
  - Webcams available for pet parents
  - Outdoor play area, indoor rest areas, small dog
    section
  - Medication administration: $5/dose
  Tone: Fun, warm, pet-parent friendly

  === CLIENT 2: SecureVault Data Backup ===
  Write 5 FAQ questions for a B2B cloud backup service.
  Context:
  - Plans: Starter (100GB, $19/month), Business (1TB,
    $49/month), Enterprise (unlimited, custom pricing)
  - SOC 2 Type II certified, AES-256 encryption
  - Automatic daily backups, point-in-time recovery
  - 99.9% uptime SLA
  - 30-day free trial, no credit card required
  - Supports Windows, Mac, Linux servers
  - 24/7 phone support for Business+ plans
  Tone: Professional, trust-building, technical
    but accessible

  === CLIENT 3: Little Sprouts Preschool ===
  Write 5 FAQ questions for a preschool enrollment page.
  Context:
  - Ages: 2.5-5 years old
  - Programs: Half day (8:30am-12pm, $750/month),
    Full day (8:30am-3:30pm, $1,200/month), Extended
    care until 5:30pm ($300/month add-on)
  - Licensed by state, NAEYC accredited
  - Max class size: 12 children, 2 teachers
  - Curriculum: Play-based, Reggio Emilia inspired
  - Enrollment: Rolling, waitlist for some ages
  - Potty training: Not required for 2.5-year-olds
  - Nut-free facility
  Tone: Warm, reassuring, parent-focused

  Write all three FAQ sections (15 total questions),
  clearly labeled by client, each matching the
  appropriate tone.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct FAQ sections — 5 questions each for pet daycare, data backup, and preschool; each includes specific business details; all three are clearly labeled and organized; total of 15 questions with relevant answers."
    weight: 0.35
    description: "ShiftFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates tone adaptability — pet daycare is fun and warm; data backup is professional and trust-building; preschool is reassuring and parent-focused; each FAQ matches its audience and industry while maintaining quality; vocabulary and sentence structure shift appropriately between clients."
    weight: 0.35
    description: "ToneAdaptationQuality"
  - type: llm_judge
    criteria: "Each FAQ would serve its business effectively — pet parents would feel confident leaving their dog; IT decision-makers would trust the backup service; parents would feel comfortable enrolling their child; all three FAQs would reduce the respective businesses' most common inquiries."
    weight: 0.30
    description: "MultBusinessEffectivenessOutcome"
