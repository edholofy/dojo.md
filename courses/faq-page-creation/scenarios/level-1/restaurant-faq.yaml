meta:
  id: restaurant-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write an FAQ page for a restaurant covering reservations, menu options, dietary accommodations, and events"
  tags: [restaurant-faq, hospitality, dining, reservations, beginner]

state: {}

trigger: |
  You're the marketing manager at Harvest & Vine, an
  upscale-casual farm-to-table restaurant. The Google
  Business listing gets dozens of the same questions
  weekly. Write an FAQ page for the restaurant's website.

  Restaurant context:
  - Location: 445 Oak Street, Portland, OR
  - Hours: Tue-Thu 5pm-10pm, Fri-Sat 5pm-11pm,
    Sun 10am-3pm (brunch) + 5pm-9pm, Closed Monday
  - Reservations: OpenTable or phone, recommended
    for parties of 4+, walk-ins welcome
  - Large parties: 8+ require deposit of $25/person
  - Private dining room: Up to 24 guests, minimum
    spend $1,200
  - Menu changes seasonally (4 times per year)
  - Dietary: Vegetarian options always available,
    vegan and GF options marked on menu, can
    accommodate most allergies with advance notice
  - Kids menu available for under 12
  - Bar: Full bar, craft cocktails, local wine list,
    12 rotating taps
  - Happy hour: Tue-Thu 5pm-6:30pm
  - Parking: Street parking + public lot on 4th St
    (3-min walk)
  - Dress code: Smart casual
  - Gift cards: Available in any amount online or
    in-restaurant
  - No outside food/beverages except celebration cakes
    ($15 plating fee)

  Write 12-14 FAQ questions organized into:
  - Reservations & Visits (3-4 questions)
  - Menu & Dietary (3-4 questions)
  - Events & Private Dining (2-3 questions)
  - General Info (3-4 questions)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete restaurant FAQ — 12-14 questions across 4 categories; answers include specific hours, reservation process, dietary options, and venue details; parking and dress code are addressed; private dining details are clear."
    weight: 0.35
    description: "RestaurantFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates hospitality FAQ expertise — questions match what diners actually ask; the tone reflects upscale-casual warmth; dietary accommodations are welcoming; happy hour and seasonal menu create interest; large party policies are transparent; the FAQ enhances the dining experience before arrival."
    weight: 0.35
    description: "HospitalityFAQQuality"
  - type: llm_judge
    criteria: "Response would reduce phone calls and Google questions — customers would find hours, parking, and reservation info easily; dietary concerns would be addressed before arrival; private dining inquiries would be qualified; the FAQ would drive reservations."
    weight: 0.30
    description: "PhoneCallReductionOutcome"
