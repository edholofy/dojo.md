meta:
  id: saas-pricing-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write a pricing FAQ page for a SaaS product that clearly explains plans, features, billing, and upgrade/downgrade policies"
  tags: [pricing-faq, saas, billing, plans, beginner]

state: {}

trigger: |
  You're a copywriter at CloudNote, a note-taking
  and knowledge management app. The pricing page
  has high traffic but also high bounce rate and
  many support tickets asking about pricing. Write
  a pricing FAQ that sits below the pricing table.

  Pricing context:
  - Free: 50 notes, 100MB storage, 1 device, basic
    search
  - Personal ($8/month or $79/year): Unlimited notes,
    5GB storage, 3 devices, advanced search, offline
    access
  - Team ($12/user/month or $119/user/year): Everything
    in Personal + shared workspaces, admin controls,
    team templates, priority support
  - Enterprise: Custom pricing, SSO, advanced security,
    dedicated success manager, SLA
  - 14-day free trial on Personal and Team (no credit
    card required)
  - Annual billing saves ~17%
  - 30-day money-back guarantee
  - Upgrades take effect immediately (prorated)
  - Downgrades take effect at end of billing period
  - Student discount: 50% off Personal plan
  - Nonprofit discount: 30% off Team plan
  - Data is retained for 30 days after cancellation

  Write 12-15 pricing FAQ questions covering:
  - Plan comparison (3-4 questions)
  - Billing and payments (3-4 questions)
  - Upgrades and downgrades (2-3 questions)
  - Discounts and special pricing (2-3 questions)
  - Trial and cancellation (2-3 questions)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete pricing FAQ — 12-15 questions across 5 categories; answers include specific pricing details, billing dates, and policies; plan differences are clearly explained; discounts are mentioned with eligibility; trial and cancellation terms are transparent."
    weight: 0.35
    description: "PricingFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates pricing FAQ expertise — questions anticipate real buyer concerns; pricing is presented clearly without confusion; the annual savings value proposition is highlighted; upgrade/downgrade mechanics are specific; student/nonprofit discounts show social responsibility; the FAQ reduces pricing friction in the purchase funnel."
    weight: 0.35
    description: "PricingFAQQuality"
  - type: llm_judge
    criteria: "Response would reduce pricing confusion — prospects would understand which plan to choose; billing surprises would be eliminated; the FAQ would increase conversion by removing purchase hesitation; pricing-related support tickets would decrease significantly."
    weight: 0.30
    description: "ConversionImpactOutcome"
