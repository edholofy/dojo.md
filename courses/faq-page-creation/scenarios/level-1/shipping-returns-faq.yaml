meta:
  id: shipping-returns-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write a shipping and returns FAQ page for an online retailer that covers delivery timelines, costs, return policies, and exchanges"
  tags: [shipping-faq, returns, e-commerce, retail, beginner]

state: {}

trigger: |
  You're a customer experience writer at UrbanThreads,
  an online clothing retailer. The #1 reason customers
  contact support is about shipping and returns. Write
  an FAQ page focused entirely on shipping and returns.

  Business context:
  - Standard shipping: Free on orders $75+, otherwise
    $7.95 (5-7 business days)
  - Express shipping: $14.95 (2-3 business days)
  - Next-day shipping: $24.95 (order by 2pm EST)
  - Ships from warehouse in Atlanta, GA
  - Delivers to all 50 US states + Puerto Rico
  - International shipping: Canada and UK only ($19.95
    flat rate, 10-14 business days)
  - Returns: 30 days from delivery, unworn with tags
  - Free return shipping via prepaid label
  - Refund to original payment method (5-7 business
    days after receipt)
  - Exchanges: Same item, different size/color only
  - Final sale items: Marked on product page, no returns
  - Holiday extended returns: Orders Nov 15 - Dec 31
    can be returned until Jan 31
  - Order tracking: Email with tracking link sent when
    shipped
  - Lost/damaged packages: File claim within 7 days

  Write 14-16 FAQ questions organized into:
  - Shipping (5-6 questions)
  - Returns (4-5 questions)
  - Exchanges (2-3 questions)
  - Order Issues (2-3 questions)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete shipping/returns FAQ — 14-16 questions across 4 categories; answers include specific timelines, costs, and policies; return window and process are clearly explained; international shipping is addressed."
    weight: 0.35
    description: "ShippingReturnsFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates e-commerce FAQ expertise — questions match how real shoppers ask; shipping tiers and free threshold are clear; return process is step-by-step; final sale items are clearly flagged; holiday policy is mentioned; the tone builds confidence to purchase."
    weight: 0.35
    description: "EcommerceFAQQuality"
  - type: llm_judge
    criteria: "Response would reduce support contacts — customers would find shipping times before asking; return process would be self-service; common edge cases (lost packages, final sale) are addressed; the FAQ would reduce cart abandonment by clarifying costs upfront."
    weight: 0.30
    description: "SupportDeflectionOutcome"
