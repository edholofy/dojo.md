meta:
  id: service-business-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write an FAQ page for a home cleaning service that addresses scheduling, pricing, trust/safety, and service details"
  tags: [service-faq, home-cleaning, local-business, trust, beginner]

state: {}

trigger: |
  You're a marketing coordinator at SparkleHome, a
  professional home cleaning service operating in
  the Denver metro area. You're building the website
  and need an FAQ page that answers the questions
  potential customers ask before booking.

  Business context:
  - Standard Clean: $120-180 (based on home size)
  - Deep Clean: $200-350 (first-time or seasonal)
  - Move-In/Move-Out: $250-400
  - Recurring discount: 10% weekly, 5% biweekly
  - All cleaners are W-2 employees (not contractors)
  - Background-checked, bonded, and insured
  - Eco-friendly cleaning products standard
  - Service area: Denver metro within 25 miles
  - Booking: Online, phone, or app
  - Cancellation: Free if 24+ hours notice, $50 fee
    if less than 24 hours
  - Satisfaction guarantee: Re-clean within 48 hours
  - Teams of 2-3 cleaners per visit
  - Average clean time: 2-3 hours (standard)
  - Supplies provided (clients can request their own)
  - Pet-friendly

  Write 12-15 FAQ questions organized into:
  - Service & Pricing (4-5 questions)
  - Booking & Scheduling (3-4 questions)
  - Trust & Safety (3-4 questions)
  - During the Clean (2-3 questions)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete service FAQ — 12-15 questions across 4 categories; answers include specific pricing, policies, and service details; trust and safety information builds confidence; booking process is clear."
    weight: 0.35
    description: "ServiceFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates service business FAQ expertise — questions reflect real customer concerns; pricing is transparent without being confusing; trust signals (background checks, insurance, W-2) are highlighted; the tone is professional yet approachable; pet-friendliness and eco-friendly products are mentioned."
    weight: 0.35
    description: "ServiceFAQQuality"
  - type: llm_judge
    criteria: "Response would convert browsers to bookers — pricing objections are addressed; trust barriers are removed; the satisfaction guarantee reduces risk; the FAQ builds confidence to book online; cancellation policy is fair and transparent."
    weight: 0.30
    description: "BookingConversionOutcome"
