meta:
  id: basic-product-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write a clear, well-organized FAQ page for a subscription box service covering the most common customer questions"
  tags: [product-faq, subscription, e-commerce, beginner, customer-questions]

state: {}

trigger: |
  You're a copywriter at FreshBite, a monthly meal
  kit subscription box. The customer service team
  is overwhelmed with repetitive questions. Write
  an FAQ page that covers the 15 most common
  questions customers ask.

  Product context:
  - Monthly meal kit delivery: $69.99/month for 3
    meals (2 servings each)
  - Dietary options: Classic, Vegetarian, Pescatarian,
    Keto, Family Plan (4 servings)
  - Delivery: Ships Monday, arrives Wednesday-Friday
    depending on location
  - Skip or cancel anytime (must do so by Friday
    for the following week)
  - Ingredients are pre-portioned, recipes included
  - Allergen info on every recipe card
  - Packaging is recyclable and insulated
  - Money-back guarantee on first box
  - Delivery area: Continental US only (no Alaska/
    Hawaii yet)

  Write the FAQ page with 15 questions organized
  into categories:
  - Getting Started (3-4 questions)
  - Orders and Delivery (4-5 questions)
  - Dietary and Allergens (3-4 questions)
  - Account Management (3-4 questions)

  Each answer should be:
  - 2-4 sentences for simple questions
  - Specific with real details (prices, days, etc.)
  - Written in a warm, friendly tone
  - Include a clear call-to-action where relevant

assertions:
  - type: llm_judge
    criteria: "Response creates a complete FAQ page — 15 questions organized into 4 categories (Getting Started, Orders/Delivery, Dietary/Allergens, Account Management); answers are concise (2-4 sentences), include specific product details, and use warm friendly tone; CTAs are included where relevant."
    weight: 0.35
    description: "ProductFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates FAQ writing expertise — questions are phrased as customers would actually ask them; answers get to the point immediately; categories are intuitive; the tone matches a consumer subscription brand; specific details (prices, days, deadlines) are included; edge cases (Alaska/Hawaii, allergens) are addressed honestly."
    weight: 0.35
    description: "FAQWritingQuality"
  - type: llm_judge
    criteria: "Response would reduce support tickets — customers would find answers to common questions before contacting support; the FAQ builds confidence in purchasing; the cancellation/skip policy is transparent; the page would be bookmarked by existing subscribers."
    weight: 0.30
    description: "TicketReductionOutcome"
