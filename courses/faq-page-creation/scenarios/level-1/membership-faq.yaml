meta:
  id: membership-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write an FAQ page for a coworking space membership covering plans, amenities, access, and community"
  tags: [membership-faq, coworking, amenities, access, beginner]

state: {}

trigger: |
  You're the community manager at HubSpace, a
  coworking space with 3 locations in Chicago.
  Prospective members visit the website but many
  drop off before booking a tour. Write an FAQ page
  that answers their questions and encourages tours.

  Business context:
  - Locations: Loop, Wicker Park, Evanston
  - Membership plans:
    * Day Pass: $35/day (any location)
    * Flex (10 days/month): $249/month
    * Dedicated Desk: $449/month (assigned desk)
    * Private Office: Starting at $899/month (2-person)
    * Virtual Membership: $99/month (mail handling +
      2 day passes + meeting room credits)
  - All memberships include: WiFi (500Mbps), coffee/
    tea, printing (100 pages/month), kitchen access,
    member events
  - Meeting rooms: $25/hour or 2 free hours/month
    for Dedicated Desk+
  - Hours: Flex/Day Pass 8am-8pm M-F, Dedicated Desk+
    24/7 access
  - Free trial: 1 free day pass (no credit card)
  - Contract: Month-to-month, 30 days notice to cancel
  - Phone booths, wellness room, bike storage
  - Community: Monthly networking events, lunch & learns
  - Guest policy: 1 guest/day included, additional
    $15/guest

  Write 13-15 FAQ questions organized into:
  - Membership Plans (4-5 questions)
  - Amenities & Access (3-4 questions)
  - Getting Started (3-4 questions)
  - Community & Policies (2-3 questions)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete membership FAQ — 13-15 questions across 4 categories; answers include specific pricing, amenities, hours, and policies; membership tiers are clearly differentiated; the free trial and cancellation terms are transparent."
    weight: 0.35
    description: "MembershipFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates coworking FAQ expertise — questions address real prospective member concerns; plan differences justify price jumps; 24/7 access is highlighted for Dedicated+; community and networking benefits sell the experience; the virtual membership is clearly explained; the tone is energetic and welcoming."
    weight: 0.35
    description: "CoworkingFAQQuality"
  - type: llm_judge
    criteria: "Response would drive tour bookings — the free day pass is prominently featured; membership objections are addressed; the FAQ helps prospects self-select the right plan; community benefits differentiate from working at home; the month-to-month commitment reduces sign-up friction."
    weight: 0.30
    description: "TourBookingOutcome"
