meta:
  id: event-registration-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write an FAQ page for an annual tech conference covering registration, logistics, schedule, and participation"
  tags: [event-faq, conference, registration, logistics, beginner]

state: {}

trigger: |
  You're the communications lead for DevConnect 2026,
  a 3-day tech conference happening June 15-17 in
  Austin, TX. The event page is live and registrations
  are open. Write an FAQ page for potential attendees.

  Event context:
  - Dates: June 15-17, 2026 (Mon-Wed)
  - Venue: Austin Convention Center
  - Expected attendance: 3,000
  - Ticket types:
    * Early Bird: $399 (until March 31)
    * Regular: $549 (April 1 - May 31)
    * Late/Door: $699
    * Student: $199 (valid .edu email required)
    * Virtual: $149 (livestream all keynotes + sessions)
  - All in-person tickets include: 3 days access,
    lunch daily, networking reception Day 1, swag bag
  - Workshops: $99 each (separate registration)
  - Venue hotel partner: Hilton Austin, $189/night
    (code DEVCON26)
  - Cancellation: Full refund 30+ days before, 50%
    refund 15-29 days, no refund under 15 days
  - Transfer: Tickets transferable up to June 1
  - COVID policy: Following local guidelines at time
    of event
  - Parking: $25/day at convention center garage
  - Airport: Austin-Bergstrom (AUS), 15 min from venue

  Write 12-14 FAQ questions organized into:
  - Registration & Tickets (3-4 questions)
  - Event Details (3-4 questions)
  - Travel & Logistics (3-4 questions)
  - Virtual Attendance (2-3 questions)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete event FAQ — 12-14 questions across 4 categories; answers include specific dates, prices, venue details, and policies; ticket types are clearly differentiated; cancellation and transfer policies are transparent."
    weight: 0.35
    description: "EventFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates event FAQ expertise — questions anticipate real attendee concerns; pricing tiers and deadlines create urgency; hotel and travel info reduces planning friction; virtual option is clearly explained; the tone is excited but informative."
    weight: 0.35
    description: "EventFAQQuality"
  - type: llm_judge
    criteria: "Response would drive registrations — early bird pricing creates urgency; the FAQ removes barriers to attending; logistics questions are answered before they arise; the virtual option captures those who can't travel; the student discount encourages emerging talent."
    weight: 0.30
    description: "RegistrationConversionOutcome"
