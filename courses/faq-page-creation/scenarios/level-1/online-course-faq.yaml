meta:
  id: online-course-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write an FAQ page for an online learning platform covering enrollment, course format, certificates, and technical requirements"
  tags: [education-faq, online-learning, courses, certificates, beginner]

state: {}

trigger: |
  You're a content writer at SkillBridge, an online
  learning platform that offers professional
  development courses. The sales team reports that
  prospects ask the same questions repeatedly before
  enrolling. Write an FAQ page for the platform.

  Platform context:
  - Course formats: Self-paced video (most courses),
    live cohort-based (premium), hybrid
  - Pricing: Individual courses $49-299, All-Access
    subscription $29/month or $249/year
  - Free courses: 15 introductory courses available
  - Certificates: Digital certificate on completion,
    LinkedIn-compatible, CEU credits for select courses
  - Course length: 4-12 hours (self-paced), 4-8 weeks
    (cohort-based)
  - Instructors: Industry professionals, not academics
  - Content updates: Courses updated at least annually
  - Refund: 14-day money-back guarantee on individual
    purchases, cancel subscription anytime
  - Technical: Works on any modern browser, mobile app
    (iOS/Android), downloadable for offline viewing
    (Premium/All-Access)
  - Team plans: 5+ users, volume discounts, admin
    dashboard, progress tracking
  - Support: Email support (24hr response), live chat
    M-F 9am-6pm EST

  Write 13-15 FAQ questions organized into:
  - Courses & Learning (3-4 questions)
  - Pricing & Plans (3-4 questions)
  - Certificates & Credentials (3-4 questions)
  - Technical & Support (3-4 questions)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete online learning FAQ — 13-15 questions across 4 categories; answers include specific pricing, course formats, certificate details, and technical requirements; subscription vs individual pricing is clear; refund policy is transparent."
    weight: 0.35
    description: "OnlineLearningFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates education FAQ expertise — questions address real learner hesitations; the value of certificates and CEU credits is explained; self-paced vs cohort differences are clear; team plans target business buyers; the free courses serve as a low-risk entry point; the tone is encouraging and professional."
    weight: 0.35
    description: "EducationFAQQuality"
  - type: llm_judge
    criteria: "Response would increase enrollment — prospects would understand which plan fits their needs; certificate value is clear for career advancement; the 14-day guarantee reduces purchase risk; the FAQ addresses both individual learners and team buyers; free courses drive exploration."
    weight: 0.30
    description: "EnrollmentConversionOutcome"
