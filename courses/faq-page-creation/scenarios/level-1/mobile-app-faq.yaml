meta:
  id: mobile-app-faq
  level: 1
  course: faq-page-creation
  type: output
  description: "Write an FAQ page for a fitness tracking mobile app covering setup, features, subscriptions, and troubleshooting"
  tags: [app-faq, mobile, fitness, subscription, beginner]

state: {}

trigger: |
  You're a content writer at FitTrack, a fitness
  tracking app available on iOS and Android. The app
  has 500K downloads but a 2.8-star rating partly
  due to user confusion about features and the
  freemium model. Write an FAQ page for the app's
  website and in-app help section.

  App context:
  - Free tier: Step tracking, basic workout logging,
    daily activity summary
  - Premium ($9.99/month or $59.99/year): Advanced
    analytics, custom workout plans, nutrition tracking,
    Apple Watch/Wear OS sync, trainer chat
  - 7-day free trial for Premium (credit card required)
  - Requires iOS 15+ or Android 11+
  - Syncs with Apple Health, Google Fit, Garmin,
    Fitbit, Strava
  - Data export: CSV or PDF (Premium only)
  - Account: Email or Sign in with Apple/Google
  - Offline mode: Workouts sync when back online
  - Data privacy: No data sold to third parties,
    GDPR compliant
  - Cancel Premium: Through App Store/Google Play
    subscription settings (not in-app)
  - Family plan: Up to 5 members, $14.99/month

  Write 13-15 FAQ questions organized into:
  - Getting Started (3-4 questions)
  - Features & Premium (3-4 questions)
  - Device & Syncing (3-4 questions)
  - Account & Privacy (3-4 questions)

assertions:
  - type: llm_judge
    criteria: "Response creates a complete mobile app FAQ — 13-15 questions across 4 categories; answers include specific OS requirements, pricing, sync partners, and privacy details; free vs premium differences are clear; cancellation process is explained step by step."
    weight: 0.35
    description: "AppFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates mobile app FAQ expertise — questions reflect common user frustrations; premium value proposition is clear without being pushy; sync and compatibility issues are addressed; privacy concerns are handled transparently; the tone is helpful and supportive."
    weight: 0.35
    description: "AppFAQQuality"
  - type: llm_judge
    criteria: "Response would improve app ratings — confused users would find answers before leaving bad reviews; the freemium model would be understood; sync issues would be self-resolved; the FAQ would reduce support emails and improve user retention."
    weight: 0.30
    description: "AppRatingImpactOutcome"
