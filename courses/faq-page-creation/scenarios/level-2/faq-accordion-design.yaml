meta:
  id: faq-accordion-design
  level: 2
  course: faq-page-creation
  type: output
  description: "Design an interactive accordion FAQ page with UX specifications, accessibility requirements, and content hierarchy"
  tags: [accordion, ux-design, accessibility, interactive, intermediate]

state: {}

trigger: |
  You're a UX content designer at BrightPath, an
  online therapy platform. The current FAQ page is a
  long scrolling list of 40+ questions that users
  abandon before finding answers. You're redesigning
  it as an interactive accordion-style FAQ with search.

  Platform context:
  - Services: Individual therapy, couples therapy,
    teen therapy (13-17), psychiatry
  - Users: Mix of tech-savvy millennials and less
    technical older adults
  - Sensitive topic: Mental health requires extra
    care in tone and accessibility
  - Mobile traffic: 68% of FAQ visitors
  - Current FAQ bounce rate: 72%
  - Target: Reduce bounce to under 40%

  Accessibility requirements:
  - WCAG 2.1 AA compliant
  - Many users may have cognitive or visual impairments
  - Screen reader compatible
  - Keyboard navigable

  Design the new FAQ page including:
  1. Information architecture: How to organize 40+
     questions into accordion sections (suggest 5-7
     categories with 5-8 questions each)
  2. UX specifications for the accordion component
     (expand/collapse behavior, animations, icons)
  3. Search functionality design (predictive search,
     no-results handling)
  4. Accessibility specifications (ARIA roles, keyboard
     navigation, screen reader behavior)
  5. Mobile-specific design considerations
  6. Write 8-10 sample FAQ entries organized in the
     new structure
  7. Content migration plan for moving from flat list
     to accordion

assertions:
  - type: llm_judge
    criteria: "Response creates a complete accordion FAQ design — information architecture with 5-7 categories; UX specifications for accordion behavior; search functionality design; accessibility specs with ARIA roles and keyboard navigation; mobile design; 8-10 sample entries; content migration plan."
    weight: 0.35
    description: "AccordionDesignCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates UX and accessibility expertise — accordion behavior handles edge cases (multiple open, deep links); WCAG 2.1 AA requirements are specifically addressed; mental health tone sensitivity is maintained; mobile-first approach is evident; search handles synonyms and misspellings."
    weight: 0.35
    description: "UXAccessibilityQuality"
  - type: llm_judge
    criteria: "Response would reduce the 72% bounce rate — users would find answers faster; mobile experience would be dramatically improved; accessibility would serve users with cognitive impairments; the search function would provide immediate answers; the migration plan would maintain SEO value."
    weight: 0.30
    description: "BounceRateReductionOutcome"
