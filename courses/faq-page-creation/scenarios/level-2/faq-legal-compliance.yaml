meta:
  id: faq-legal-compliance
  level: 2
  course: faq-page-creation
  type: output
  description: "Create a legally compliant FAQ page for a financial services product, balancing accessibility with regulatory requirements"
  tags: [legal-compliance, financial-services, regulatory, disclaimers, intermediate]

state: {}

trigger: |
  You're a content compliance specialist at WealthPath,
  an online investment platform for beginners. The
  marketing team wrote an FAQ page that legal has
  flagged for multiple compliance issues. You need to
  rewrite it to be legally compliant while remaining
  accessible to non-financial audiences.

  Regulatory context:
  - SEC regulations: Cannot make forward-looking
    statements or guarantee returns
  - FINRA advertising rules: Must be fair, balanced,
    and not misleading
  - Must include appropriate risk disclosures
  - Cannot provide personalized financial advice in
    FAQ (general education only)
  - Fee disclosures must be prominent and clear
  - Account insurance (SIPC) must be accurately stated
  - Terms like "safe," "guaranteed," and "risk-free"
    are prohibited in most contexts

  Platform context:
  - Products: Self-directed investing, robo-advisory,
    retirement accounts (IRA, Roth IRA)
  - Fees: $0 stock/ETF trades, robo-advisory 0.25%
    annual fee, no account minimums
  - SIPC insured up to $500,000
  - Not FDIC insured (must be clearly stated)
  - Target audience: Millennials new to investing

  Create:
  1. Rewrite 10 FAQ questions that are legally
     compliant AND beginner-friendly
  2. Compliance checklist for FAQ content writers
  3. Approved language guide: Terms to use vs. terms
     to avoid
  4. Disclaimer placement strategy (where and how to
     include required disclosures without burying content)
  5. Review workflow: How FAQ content moves through
     legal review
  6. Quarterly compliance audit template

assertions:
  - type: llm_judge
    criteria: "Response creates a complete compliant FAQ — 10 legally compliant questions; compliance checklist for writers; approved language guide; disclaimer placement strategy; legal review workflow; quarterly audit template."
    weight: 0.35
    description: "ComplianceFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates financial compliance expertise — SEC/FINRA requirements are correctly applied; risk disclosures are present but not overwhelming; prohibited terms are identified; disclaimers are strategically placed; the content remains accessible to beginners despite compliance requirements; the approved language guide is specific and practical."
    weight: 0.35
    description: "FinancialComplianceQuality"
  - type: llm_judge
    criteria: "Response would pass legal review — no compliance violations in the FAQ content; risk disclosures are adequate; the balance between compliance and readability would satisfy both legal and marketing teams; the audit process would catch future issues."
    weight: 0.30
    description: "LegalApprovalOutcome"
