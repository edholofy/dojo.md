meta:
  id: faq-video-integration
  level: 2
  course: faq-page-creation
  type: output
  description: "Create a multimedia FAQ strategy integrating video tutorials, screenshots, and interactive elements alongside text answers"
  tags: [multimedia, video-faq, visual, interactive, intermediate]

state: {}

trigger: |
  You're the content strategist at BuilderPro, a
  website builder platform. User research shows that
  40% of FAQ visitors prefer video answers, 35% prefer
  text with screenshots, and 25% prefer text only.
  The current FAQ is text-only. You need to create a
  multimedia FAQ strategy.

  Platform context:
  - BuilderPro is a drag-and-drop website builder
  - 200,000 active users, ranging from complete
    beginners to experienced designers
  - Current FAQ: 60 text-only questions, 55%
    helpfulness rating
  - Support tickets: 3,500/month, 40% are "how do I"
    questions
  - Video production budget: $5,000/month
  - Average video production time: 2 days per tutorial
  - Existing YouTube channel: 15,000 subscribers

  Create a multimedia FAQ strategy including:
  1. Decision framework: Which questions get video,
     screenshots, text-only, or interactive demos
  2. Video production guidelines (length, format,
     script template, hosting)
  3. Screenshot annotation standards (tools, style,
     alt text)
  4. Write 6 multimedia FAQ entries showing the mix:
     - 2 with video script + text answer
     - 2 with annotated screenshot descriptions + text
     - 2 text-only (explaining why video isn't needed)
  5. Content production workflow and timeline
  6. Accessibility requirements for multimedia FAQ
  7. Success metrics to track multimedia impact

assertions:
  - type: llm_judge
    criteria: "Response creates a complete multimedia FAQ strategy — decision framework for format selection; video production guidelines; screenshot standards; 6 sample entries showing format mix; production workflow; accessibility requirements; success metrics."
    weight: 0.35
    description: "MultimediaFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates multimedia content expertise — the decision framework makes logical format choices; video guidelines include realistic lengths and budget considerations; screenshot standards ensure consistency; accessibility covers captions, alt text, and transcripts; the production workflow is sustainable with the $5,000/month budget."
    weight: 0.35
    description: "MultimediaExpertiseQuality"
  - type: llm_judge
    criteria: "Response would reduce the 3,500 monthly support tickets — the 40% 'how do I' tickets would be deflected; helpfulness would improve above 55%; videos would serve the 40% who prefer visual learning; the strategy would be sustainable with available budget and resources."
    weight: 0.30
    description: "TicketDeflectionOutcome"
