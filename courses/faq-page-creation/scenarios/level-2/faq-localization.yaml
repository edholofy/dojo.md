meta:
  id: faq-localization
  level: 2
  course: faq-page-creation
  type: output
  description: "Create a localized FAQ strategy for an international product, adapting content for cultural and regional differences"
  tags: [localization, international, multilingual, cultural-adaptation, intermediate]

state: {}

trigger: |
  You're the localization content manager at PayGlobe,
  an international payment processing platform
  expanding from the US to 4 new markets: UK, Germany,
  Japan, and Brazil. The US FAQ page has 35 questions
  and needs to be adapted for each market.

  Localization challenges:
  - Currency and pricing differ per market
  - Payment methods vary (ACH in US, SEPA in EU,
    Pix in Brazil, bank transfer in Japan)
  - Regulatory requirements differ (PCI DSS global,
    GDPR in EU, LGPD in Brazil, APPI in Japan)
  - Business hours and support channels vary
  - Cultural communication styles differ significantly
  - Legal disclaimers and compliance vary
  - Some features aren't available in all markets yet

  Create:
  1. Localization strategy framework: What to translate
     vs. transcreate vs. create net-new
  2. Market-specific FAQ adaptation guidelines for
     each of the 4 markets
  3. Content matrix showing which of the 35 US FAQs
     apply to each market (keep, adapt, remove, add new)
  4. Write 3 sample FAQ entries showing how the same
     question is adapted across US, UK, Germany, and
     Brazil
  5. Cultural tone and style guidelines per market
  6. Localization workflow and quality assurance process
  7. Common localization mistakes to avoid

assertions:
  - type: llm_judge
    criteria: "Response creates a complete localization strategy — framework for translate vs transcreate; market-specific guidelines for all 4 markets; content matrix for 35 FAQs; 3 sample entries adapted across 4 markets; cultural tone guidelines; localization workflow; common mistakes."
    weight: 0.35
    description: "LocalizationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates international content expertise — cultural differences are specific not generic; payment method variations are addressed; regulatory requirements are correct; the translate vs transcreate decision framework is practical; tone guidelines reflect real cultural communication preferences."
    weight: 0.35
    description: "InternationalExpertiseQuality"
  - type: llm_judge
    criteria: "Response would enable successful market entry — customers in each market would find locally relevant answers; regulatory compliance would be maintained; cultural missteps would be avoided; the workflow would scale to additional markets."
    weight: 0.30
    description: "MarketEntryOutcome"
