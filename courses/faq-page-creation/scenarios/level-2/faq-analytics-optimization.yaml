meta:
  id: faq-analytics-optimization
  level: 2
  course: faq-page-creation
  type: output
  description: "Analyze FAQ page performance data and create an optimization plan to improve engagement and ticket deflection"
  tags: [analytics, optimization, data-driven, ticket-deflection, intermediate]

state: {}

trigger: |
  You're a content analyst at CloudDesk, a help desk
  SaaS product. The FAQ page exists but leadership
  wants proof it's working and a plan to improve it.
  You have 3 months of analytics data.

  Analytics data:
  - FAQ page views: 45,000/month
  - Unique visitors: 32,000/month
  - Average time on page: 1:42
  - Bounce rate: 58%
  - Mobile vs desktop: 55% mobile, 45% desktop
  - Top 5 viewed questions (by clicks):
    1. "How do I reset my password?" (8,200 views)
    2. "Can I cancel my subscription?" (5,100 views)
    3. "What's included in the free plan?" (4,800 views)
    4. "How do I add team members?" (3,900 views)
    5. "Why isn't my email sending?" (3,200 views)
  - Bottom 5 questions: Each under 50 views/month
  - "Was this helpful?" ratings: 62% Yes, 38% No
  - Questions with lowest helpfulness: "Integrations"
    category (48% Yes)
  - Support tickets created after FAQ visit: 28% of
    visitors still submit a ticket
  - Search queries with no results: "API," "webhook,"
    "SSO," "white label," "GDPR"
  - Exit pages after FAQ: 40% leave site, 30% go to
    contact page, 30% go to product pages

  Create:
  1. Performance analysis report with key findings
  2. Benchmarking: How these metrics compare to
     industry standards
  3. Optimization recommendations (prioritized)
  4. Content gap analysis based on search data
  5. A/B testing plan for FAQ improvements
  6. Rewrite the 3 lowest-performing FAQ answers
  7. Success metrics and 90-day improvement targets

assertions:
  - type: llm_judge
    criteria: "Response creates a complete analytics-driven optimization — performance report with key findings; industry benchmarking; prioritized recommendations; content gap analysis; A/B testing plan; 3 rewritten answers; 90-day targets with specific metrics."
    weight: 0.35
    description: "AnalyticsOptimizationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates data analysis expertise — metrics are interpreted correctly (not just reported); benchmarks are realistic; the 28% ticket creation rate is addressed; no-results searches identify clear content gaps (API, SSO, GDPR); A/B tests are specific and measurable; rewritten answers show clear improvement."
    weight: 0.35
    description: "DataAnalysisQuality"
  - type: llm_judge
    criteria: "Response would measurably improve FAQ performance — the 28% ticket creation rate would decrease; helpfulness ratings would improve above 62%; content gaps would be filled; the optimization plan would justify continued investment in FAQ content."
    weight: 0.30
    description: "MeasurableImprovementOutcome"
