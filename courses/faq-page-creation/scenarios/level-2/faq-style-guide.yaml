meta:
  id: faq-style-guide
  level: 2
  course: faq-page-creation
  type: output
  description: "Create a comprehensive FAQ writing style guide for a multi-brand company ensuring consistency across product lines"
  tags: [style-guide, multi-brand, consistency, writing-standards, intermediate]

state: {}

trigger: |
  You're the content lead at Horizon Digital, a
  company with 4 SaaS products. Each product team
  writes their own FAQs, resulting in wildly
  inconsistent quality — some are 3 sentences, others
  are essays; tones range from casual to corporate;
  formatting is all over the place. You need to create
  a unified FAQ style guide.

  Company context:
  - Products: TaskMaster (project management), PayFlow
    (invoicing), HireRight (recruiting), DataSync
    (data integration)
  - Total FAQ pages: 180+ across all products
  - Writers: 12 content creators across 4 product teams
  - Audience ranges from non-technical SMB owners to
    developer-focused enterprise buyers
  - Brand voice: "Confident, clear, helpful — never
    condescending"
  - Current problems: No consistent Q format, answer
    lengths vary 1-20 sentences, no categorization
    standard, outdated answers not flagged, no SEO
    consideration

  Create a comprehensive FAQ style guide covering:
  1. Question formatting standards (how to write Q's)
  2. Answer structure and length guidelines
  3. Tone and voice rules with examples
  4. Categorization taxonomy standard
  5. Formatting rules (lists, links, bold, etc.)
  6. SEO guidelines for FAQ content
  7. Review and update schedule
  8. Common mistakes to avoid (with before/after examples)

  Include 3-4 before/after examples showing poor FAQ
  answers rewritten to meet the new standards.

assertions:
  - type: llm_judge
    criteria: "Response creates a complete FAQ style guide — covers all 8 sections; question formatting standards are specific; answer length guidelines have ranges; tone rules include examples; categorization taxonomy is defined; SEO guidelines are actionable; review schedule is concrete; before/after examples demonstrate improvements."
    weight: 0.35
    description: "StyleGuideCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates content governance expertise — standards are specific enough to enforce but flexible enough for 4 different audiences; the multi-brand challenge is addressed; before/after examples show clear improvement; the guide would actually be usable by 12 writers; common mistakes are realistic."
    weight: 0.35
    description: "ContentGovernanceQuality"
  - type: llm_judge
    criteria: "Response would unify FAQ quality — writers would produce consistent output; FAQ quality across 4 products would converge; the guide would reduce editorial review time; SEO improvements would increase organic traffic to FAQ pages."
    weight: 0.30
    description: "QualityUnificationOutcome"
