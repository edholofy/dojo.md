meta:
  id: faq-schema-markup
  level: 2
  course: faq-page-creation
  type: output
  description: "Create an SEO-optimized FAQ page with proper schema markup, keyword strategy, and search visibility optimization"
  tags: [seo, schema-markup, structured-data, search-optimization, intermediate]

state: {}

trigger: |
  You're an SEO content specialist at LegalShield, an
  online legal services marketplace. The company wants
  to capture search traffic from people looking for
  answers to common legal questions. Your task is to
  create an FAQ page that maximizes search visibility.

  Business context:
  - Services: Document preparation, legal consultation,
    business formation, trademark filing, estate planning
  - Target audience: Small business owners and
    individuals who can't afford traditional lawyers
  - Competitors rank for legal FAQ queries and get
    significant traffic
  - The company has domain authority of 45 (moderate)
  - Current FAQ page has no schema markup and poor
    keyword targeting

  SEO data:
  - High-volume searches:
    * "do I need an LLC" (12,000/month)
    * "how to trademark a name" (8,500/month)
    * "what is a living will" (6,200/month)
    * "how much does a lawyer cost" (5,800/month)
    * "how to write a will" (4,900/month)

  Create:
  1. 10 SEO-optimized FAQ questions targeting high-value
     search queries
  2. JSON-LD FAQ schema markup for all 10 questions
  3. SEO strategy document explaining keyword targeting,
     internal linking, and content optimization
  4. Recommendations for FAQ page structure to maximize
     search visibility
  5. Plan for monitoring and improving FAQ search
     performance

assertions:
  - type: llm_judge
    criteria: "Response creates a complete SEO FAQ package — 10 optimized questions targeting search queries; valid JSON-LD FAQ schema markup; SEO strategy with keyword targeting; page structure recommendations; monitoring plan with specific metrics."
    weight: 0.35
    description: "SEOFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates SEO expertise — questions target real search intent; schema markup is valid JSON-LD FAQPage format; keyword strategy balances volume with competition; internal linking strategy connects FAQ to service pages; monitoring plan includes actionable KPIs."
    weight: 0.35
    description: "SEOExpertiseQuality"
  - type: llm_judge
    criteria: "Response would improve search visibility — FAQ questions would capture featured snippets; schema markup would enable rich results; the page would rank for high-volume legal queries; organic traffic to the FAQ page would increase significantly."
    weight: 0.30
    description: "SearchVisibilityOutcome"
