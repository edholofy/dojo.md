meta:
  id: faq-chatbot-integration
  level: 2
  course: faq-page-creation
  type: output
  description: "Design FAQ content that serves both a static web page and an AI chatbot, with conversation flows and escalation paths"
  tags: [chatbot, ai-integration, conversational, dual-purpose, intermediate]

state: {}

trigger: |
  You're the support content designer at TravelEase,
  an online travel booking platform. The company is
  implementing an AI chatbot that will answer FAQ
  questions conversationally. You need to create FAQ
  content that works for both the static FAQ page and
  the chatbot.

  Platform context:
  - Products: Flights, hotels, car rentals, vacation
    packages, travel insurance
  - Monthly support volume: 25,000 tickets
  - Top ticket categories: Booking changes (30%),
    cancellations/refunds (25%), payment issues (20%),
    travel documentation (15%), general inquiries (10%)
  - Chatbot platform: Supports decision trees, natural
    language, and human handoff
  - Goal: Deflect 40% of tickets through chatbot +
    FAQ combination

  Create:
  1. Content architecture that serves both static FAQ
     and chatbot (single source of truth)
  2. Write 8 FAQ entries in dual format:
     - Static web version (traditional Q&A)
     - Chatbot conversation flow (decision tree with
       follow-up questions and conditional responses)
  3. Escalation framework: When and how the chatbot
     hands off to a human agent
  4. Chatbot personality and tone guidelines
  5. Intent mapping: How user questions map to FAQ
     answers (include synonyms and variations)
  6. Edge cases: Questions the chatbot should NOT
     attempt to answer
  7. Success metrics for the combined FAQ + chatbot
     system

assertions:
  - type: llm_judge
    criteria: "Response creates a complete dual-purpose FAQ system — content architecture for single source of truth; 8 entries in both static and chatbot formats; escalation framework; chatbot personality guidelines; intent mapping with synonyms; edge cases identified; success metrics defined."
    weight: 0.35
    description: "ChatbotIntegrationCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates conversational design expertise — chatbot flows use decision trees effectively; escalation triggers are well-defined; intent mapping covers real query variations; edge cases protect against harmful chatbot responses; the chatbot personality is appropriate for travel support; static and chatbot versions complement each other."
    weight: 0.35
    description: "ConversationalDesignQuality"
  - type: llm_judge
    criteria: "Response would achieve the 40% ticket deflection goal — common booking and cancellation questions would be self-served; the chatbot would handle follow-up questions; escalation to humans would be smooth; the combined system would reduce the 25,000 monthly tickets significantly."
    weight: 0.30
    description: "TicketDeflectionOutcome"
