meta:
  id: intermediate-faq-shift
  level: 2
  course: faq-page-creation
  type: output
  description: "Shift simulation — redesign a healthcare FAQ for accessibility, create an internal HR FAQ, and build an API FAQ for developers"
  tags: [shift-simulation, healthcare, internal-hr, api-faq, intermediate]

state: {}

trigger: |
  You're a senior content strategist consulting for
  three clients simultaneously. Each needs a different
  type of FAQ with different constraints.

  === PROJECT 1: MedConnect Patient Portal ===
  The patient portal FAQ has been flagged in an
  accessibility audit. It fails WCAG 2.1 AA on
  multiple criteria. Redesign the FAQ for accessibility.

  Write 6 FAQ questions about the patient portal
  (appointments, test results, messaging doctors,
  prescription refills, billing) with:
  - WCAG 2.1 AA compliant content structure
  - Plain language (6th-grade reading level)
  - Screen reader-optimized formatting notes
  - Accessibility specifications for each element

  === PROJECT 2: TechCorp Internal HR FAQ ===
  A 2,000-person tech company needs an internal FAQ
  for employees about HR policies. This is for the
  company intranet, not external customers.

  Write 6 FAQ questions covering:
  - PTO policy (unlimited PTO with 2-week minimum)
  - Remote work policy (hybrid: 3 days office/2 remote)
  - Parental leave (16 weeks paid, all parents)
  - Benefits enrollment (annual open enrollment Nov 1-15)
  - Performance review cycle (quarterly check-ins,
    annual review in January)
  - Expense reimbursement (submit within 30 days,
    manager approval over $500)
  Tone: Casual-professional, internal voice

  === PROJECT 3: DevAPI Developer FAQ ===
  A developer tools company needs a technical FAQ
  for their REST API product.

  Write 6 FAQ questions covering:
  - Authentication (API keys + OAuth 2.0)
  - Rate limits (1,000 requests/minute, 429 response)
  - Webhooks (setup, retry logic, signature verification)
  - Versioning (URL-based, v1 deprecated March 2027)
  - SDKs (Python, Node.js, Go, Ruby)
  - Error handling (standard HTTP codes + custom
    error objects)
  Include code snippets where appropriate.
  Tone: Technical, precise, developer-friendly

  Write all three FAQ sections with distinct formats
  and tones appropriate to each audience.

assertions:
  - type: llm_judge
    criteria: "Response creates three distinct FAQ sections — 6 questions each for healthcare accessibility, internal HR, and developer API; each includes specific details from the brief; all three are clearly labeled; total of 18 questions with appropriate formatting."
    weight: 0.35
    description: "ShiftFAQCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates audience adaptation — healthcare FAQ meets accessibility standards with plain language; HR FAQ uses internal casual-professional tone; developer FAQ includes code snippets and technical precision; each FAQ serves its audience without compromising quality."
    weight: 0.35
    description: "AudienceAdaptationQuality"
  - type: llm_judge
    criteria: "Each FAQ would serve its purpose — patients would navigate the portal successfully regardless of ability; employees would understand HR policies without contacting HR; developers would integrate the API without contacting support; all three demonstrate intermediate-level FAQ design expertise."
    weight: 0.30
    description: "MultiAudienceEffectivenessOutcome"
