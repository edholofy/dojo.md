meta:
  id: faq-taxonomy-design
  level: 2
  course: faq-page-creation
  type: output
  description: "Design an FAQ categorization taxonomy for a multi-product e-commerce platform with overlapping customer questions"
  tags: [taxonomy, categorization, information-architecture, e-commerce, intermediate]

state: {}

trigger: |
  You're the UX content strategist at GearUp, an
  outdoor recreation e-commerce platform selling
  equipment across 6 categories: Camping, Hiking,
  Climbing, Cycling, Water Sports, and Snow Sports.
  The current FAQ is a flat list of 85 questions with
  no organization — customers can't find answers and
  search returns irrelevant results.

  Current problems:
  - Many questions apply to multiple categories (e.g.,
    "What's your return policy?" applies to all)
  - Some questions are product-specific, others are
    store-wide
  - Shipping questions mix with product care questions
  - The flat list forces scrolling through 85 items
  - Mobile users bounce from the FAQ page at 78%

  Customer data:
  - Top 5 FAQ searches: "return policy," "shipping
    time," "size chart," "warranty," "order tracking"
  - 40% of FAQ visitors are pre-purchase, 60% are
    post-purchase
  - 35% of visitors arrive on mobile

  Design a comprehensive FAQ taxonomy including:
  1. Category hierarchy (2-3 levels)
  2. Category naming conventions
  3. Tagging system for cross-category questions
  4. Priority ordering within categories
  5. Search optimization strategy
  6. Mobile navigation design recommendations
  7. Content audit: Which of the 85 questions to keep,
     merge, or retire (provide framework, not all 85)
  8. Write 5 sample FAQ entries that demonstrate the
     new taxonomy in action

assertions:
  - type: llm_judge
    criteria: "Response creates a complete FAQ taxonomy — category hierarchy with 2-3 levels; naming conventions are defined; tagging system handles cross-category questions; priority ordering logic is explained; search strategy is included; mobile recommendations are specific; content audit framework is actionable; 5 sample entries demonstrate the taxonomy."
    weight: 0.35
    description: "TaxonomyCompleteness"
  - type: llm_judge
    criteria: "Response demonstrates information architecture expertise — the taxonomy handles the multi-product overlap problem; pre-purchase and post-purchase paths are distinct; mobile-first design is addressed; the content audit framework would identify which questions to merge or retire; search optimization accounts for customer vocabulary."
    weight: 0.35
    description: "InformationArchitectureQuality"
  - type: llm_judge
    criteria: "Response would fix the FAQ findability problem — mobile bounce rate would decrease; customers would find answers faster; cross-category questions wouldn't be duplicated; the search experience would improve; the taxonomy would scale as new product categories are added."
    weight: 0.30
    description: "FindabilityImprovementOutcome"
