meta:
  id: thread-to-product-pipeline
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Use thread engagement to validate and launch digital products"
  tags: [twitter, product-validation, launch, digital-products, market-research]

state: {}

trigger: |
  Threads are the ultimate product validation tool — you can test demand
  for a product idea with zero investment before building anything.

  Creator: Emily Zhao, sales enablement consultant
  Followers: 35,000
  Top-performing thread topics: sales playbooks, objection handling, cold email
  Product idea: A "Sales Playbook Builder" — template kit + video course

  Design the thread-to-product pipeline:

  1. Validation through threads:
     - Write 3 "validation threads" that test demand without explicitly selling:
       a) "Framework reveal" thread: Share part of the playbook methodology,
          gauge saves and replies asking for more
       b) "Problem exploration" thread: Ask audience about their biggest sales
          enablement pain points
       c) "Behind-the-scenes" thread: Show the product being built, measure
          excitement
     - For each: success metrics that indicate real demand (not just likes)
     - What level of engagement means "build it" vs "don't bother"

  2. Pre-launch thread sequence:
     - Write a 5-thread pre-launch sequence over 3 weeks:
       a) Week 1: Problem thread (why most sales playbooks fail)
       b) Week 2: Teaser thread (what she's building and why)
       c) Week 2.5: Social proof thread (beta tester results)
       d) Week 3: Waitlist thread (capture emails)
       e) Launch day: Launch thread with offer
     - For each: full thread content or detailed outline

  3. Launch day thread:
     - Write the complete launch thread (10 tweets)
     - Pricing reveal strategy (when in the thread to mention price)
     - Urgency elements (launch discount, limited availability)
     - How to handle the "this should be free" crowd

  4. Post-launch content strategy:
     - How to use buyer testimonials in threads
     - Ongoing content that drives sales without being constant promotion
     - When to re-launch or offer discounts
     - How to turn product buyers into thread amplifiers

assertions:
  - type: llm_judge
    criteria: "The validation threads genuinely test demand — the success metrics go beyond likes to track specific signals like DMs asking where to buy, 'I need this' replies, and bookmark rates as purchase intent proxies"
    weight: 0.25
    description: "Genuine demand-testing validation threads"
  - type: llm_judge
    criteria: "The pre-launch sequence builds anticipation progressively — each thread adds new information and creates more urgency, with the waitlist thread capturing real purchase intent"
    weight: 0.25
    description: "Progressive anticipation pre-launch sequence"
  - type: llm_judge
    criteria: "The launch thread balances value delivery with selling — provides enough free value that non-buyers still engage, while making the product's value proposition compelling for potential buyers"
    weight: 0.25
    description: "Value-balanced launch thread"
  - type: llm_judge
    criteria: "The 'this should be free' handling is graceful — acknowledges the value of free content while explaining why structured, comprehensive products justify a price"
    weight: 0.25
    description: "Graceful free-vs-paid objection handling"
