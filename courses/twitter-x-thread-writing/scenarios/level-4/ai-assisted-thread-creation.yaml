meta:
  id: ai-assisted-thread-creation
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Use AI tools to enhance thread creation without losing authenticity"
  tags: [twitter, ai-tools, efficiency, authenticity, workflow]

state: {}

trigger: |
  AI can help create threads faster, but Twitter/X audiences are increasingly
  skeptical of AI-generated content. Design a workflow that uses AI for
  efficiency while maintaining human authenticity.

  Creator: Marketing executive, 30,000 followers
  Current process: 4 hours per thread (research, draft, edit, format)
  Goal: Reduce to 1 hour per thread without quality loss
  Concern: Audience will detect and disengage from AI content

  Design the AI-augmented thread creation system:

  1. The AI workflow:
     - Step 1: Human ideation (what AI CANNOT do) — 15 min
     - Step 2: AI-assisted research and data gathering — 10 min
     - Step 3: AI first draft with specific prompting approach — 10 min
     - Step 4: Human voice injection and editing — 20 min
     - Step 5: AI formatting and optimization — 5 min
     - Show the prompting strategy for Step 3 (what makes a good AI prompt
       for thread drafts)

  2. AI-generated vs human-edited comparison:
     - Write an AI-style thread (with all the AI tells): 5 tweets on
       "The future of remote work"
     - Rewrite it with human voice: same 5 tweets, human-edited
     - Annotate every AI tell you eliminated and why:
       a) Generic openings ("In today's fast-paced world...")
       b) Listicle patterns without personality
       c) Hedge language ("It's important to note...")
       d) Lack of specific personal experience
       e) Overly balanced "on the other hand" equivocation

  3. Quality control checklist:
     - 10-point checklist for reviewing AI-assisted threads before posting
     - Red flags that suggest over-reliance on AI
     - How to maintain your unique voice across AI-assisted content

  4. Tool recommendations:
     - Specific AI tools for each step of the workflow
     - How to use tools for research without regurgitating AI content
     - Thread-specific AI tools (Typefully, Tweet Hunter, etc.)

  5. Ethical considerations:
     - Should you disclose AI use in thread creation?
     - What's the difference between AI-assisted and AI-generated?
     - How Twitter/X's policies may evolve on AI content

assertions:
  - type: llm_judge
    criteria: "The workflow realistically reduces time from 4 hours to 1 hour — the time allocations per step add up, and the human touchpoints are sufficient to maintain quality"
    weight: 0.25
    description: "Realistic time-reducing AI workflow"
  - type: llm_judge
    criteria: "The AI-generated vs human-edited comparison is illuminating — clearly identifies 5+ specific AI tells and shows exactly how human editing eliminates each one"
    weight: 0.30
    description: "Illuminating AI-tell comparison"
  - type: llm_judge
    criteria: "The quality control checklist is practical — 10 specific items that catch AI patterns before posting, not generic advice but specific phrases and patterns to watch for"
    weight: 0.25
    description: "Practical AI quality control checklist"
  - type: llm_judge
    criteria: "The ethical considerations take a nuanced position — acknowledges that AI assistance in research and ideation is different from pure AI generation, with a defensible stance on disclosure"
    weight: 0.20
    description: "Nuanced ethical AI disclosure position"
