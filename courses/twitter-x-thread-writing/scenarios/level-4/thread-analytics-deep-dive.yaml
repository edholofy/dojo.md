meta:
  id: thread-analytics-deep-dive
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Interpret thread analytics and optimize content strategy from data"
  tags: [twitter, analytics, data-interpretation, optimization, strategy]

state: {}

trigger: |
  A creator shares their last 30 days of thread analytics. Interpret the
  data and design strategy adjustments.

  Creator: Product marketing manager, 16,000 followers
  Posted 12 threads in 30 days

  THREAD PERFORMANCE DATA:
  Thread 1: "5 positioning mistakes" — 8,200 impressions, 420 likes, 65 replies, 85 RTs, 210 bookmarks
  Thread 2: "My career pivot story" — 22,000 impressions, 890 likes, 145 replies, 120 RTs, 95 bookmarks
  Thread 3: "Tools I use daily" — 15,400 impressions, 560 likes, 40 replies, 95 RTs, 340 bookmarks
  Thread 4: "Hot take on brand strategy" — 31,000 impressions, 1,200 likes, 310 replies, 180 RTs, 75 bookmarks
  Thread 5: "How to write a positioning doc" — 6,800 impressions, 280 likes, 25 replies, 45 RTs, 190 bookmarks
  Thread 6: "Industry predictions 2026" — 9,100 impressions, 350 likes, 55 replies, 70 RTs, 60 bookmarks
  Thread 7: "Behind the scenes of a launch" — 18,500 impressions, 720 likes, 100 replies, 90 RTs, 150 bookmarks
  Thread 8: "Pricing psychology explained" — 12,300 impressions, 480 likes, 45 replies, 75 RTs, 280 bookmarks
  Thread 9: "Conference recap thread" — 4,200 impressions, 150 likes, 20 replies, 30 RTs, 25 bookmarks
  Thread 10: "Why founders should learn marketing" — 26,000 impressions, 950 likes, 200 replies, 150 RTs, 110 bookmarks
  Thread 11: "Marketing stack comparison" — 11,600 impressions, 390 likes, 35 replies, 60 RTs, 255 bookmarks
  Thread 12: "Reshared old blog post" — 3,500 impressions, 120 likes, 15 replies, 20 RTs, 15 bookmarks

  POSTING TIMES:
  Threads posted Tue-Thu 8-9 AM: avg 18,200 impressions
  Threads posted Mon/Fri 8-9 AM: avg 7,400 impressions
  Threads posted weekend: avg 3,850 impressions

  FOLLOWER GROWTH: +1,800 (11.25% growth in 30 days)

  Provide:
  1. Performance pattern analysis (what's working, what's not, and why)
  2. Content type ranking (which thread types to do more/less of)
  3. Engagement type analysis (reply-heavy vs bookmark-heavy threads and implications)
  4. 5 specific strategy changes ranked by expected impact
  5. Next month's content calendar based on findings
  6. Metrics to track weekly and red flags to watch for

assertions:
  - type: llm_judge
    criteria: "The pattern analysis identifies non-obvious insights — like the story/contrarian threads drive impressions but list/framework threads drive bookmarks, suggesting different types serve different goals"
    weight: 0.30
    description: "Non-obvious pattern analysis insights"
  - type: llm_judge
    criteria: "The 5 strategy changes are specific, data-backed, and actionable — each references specific thread performance data and explains the expected improvement, not generic advice"
    weight: 0.25
    description: "Specific data-backed strategy changes"
  - type: llm_judge
    criteria: "The engagement type analysis distinguishes between vanity and value — bookmarks signal future reference value while replies signal debate value, and the creator should optimize for different signals depending on goals"
    weight: 0.25
    description: "Vanity-vs-value engagement analysis"
  - type: llm_judge
    criteria: "The next month's calendar reflects the analytics — heavily weights Tue-Thu posting, increases story/contrarian threads, reduces conference recaps and reshares, and maintains bookmark-magnet threads"
    weight: 0.20
    description: "Analytics-reflective next month calendar"
