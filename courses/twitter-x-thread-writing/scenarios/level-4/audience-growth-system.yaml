meta:
  id: audience-growth-system
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Design a systematic audience growth strategy using threads as the engine"
  tags: [twitter, growth, audience, system, follower-acquisition]

state: {}

trigger: |
  Threads are the primary growth driver on Twitter/X — accounts that post
  regular threads see 3.2x higher follower growth. Design a complete
  growth system.

  Creator Profile:
  - Name: Leo Chen, startup CFO turned financial advisor
  - Current: 5,800 followers (been posting for 3 months)
  - Niche: Financial strategy for startup founders
  - Content: 2 threads/week + daily tweets
  - Avg thread: 150 likes, 20 replies
  - Goal: 25,000 followers in 6 months

  Design the growth system:

  1. Growth math:
     - Calculate the required growth rate (5,800 → 25,000 in 6 months)
     - How many threads per week needed at current conversion rates
     - What improvement in thread performance would close the gap
     - Realistic vs aspirational targets per month

  2. Content strategy for growth:
     - Which thread types drive the most new followers (vs engaging existing)
     - Write 3 "growth threads" — threads specifically designed to attract
       new followers (not just engage current ones):
       a) "Evergreen reference" thread that gets shared beyond Leo's network
       b) "Trending topic" thread that piggybacks on what's happening now
       c) "Collaboration" thread that tags and involves other creators
     - How to balance growth content with audience-deepening content

  3. Network effects strategy:
     - How to identify and engage with adjacent creators for cross-pollination
     - The "strategic reply" approach (commenting on bigger accounts' threads)
     - How to earn retweets from large accounts
     - Collaboration formats (joint threads, Spaces, mutual shoutouts)

  4. Conversion optimization:
     - Profile optimization for converting thread readers to followers
     - Pinned tweet strategy (what converts best)
     - Bio optimization for the financial strategy niche
     - The "discovery → follow" psychology

  5. Growth accelerators:
     - X Premium benefits for reach
     - When and how to use paid promotion for threads
     - Community engagement (quote tweets, Spaces, mutual shoutouts)
     - Content timing optimization for maximum new-follower exposure

assertions:
  - type: llm_judge
    criteria: "The growth math is honest — calculates that 5,800 to 25,000 in 6 months requires ~15% monthly growth, acknowledges this is ambitious, and shows what thread volume and quality improvements are needed"
    weight: 0.25
    description: "Honest growth math calculations"
  - type: llm_judge
    criteria: "The 3 growth threads are strategically different — the evergreen thread creates long-term discovery, the trending thread captures current attention, and the collaboration thread borrows audience"
    weight: 0.25
    description: "Strategically different growth threads"
  - type: llm_judge
    criteria: "The network effects strategy is specific — identifies exactly how to engage with larger accounts (thoughtful replies, adding value to their threads, not just tagging them hoping for a retweet)"
    weight: 0.25
    description: "Specific network effects strategy"
  - type: llm_judge
    criteria: "The profile optimization advice is conversion-focused — the bio, pinned tweet, and header are all designed to answer 'why should I follow this person' for someone who just read a great thread"
    weight: 0.25
    description: "Conversion-focused profile optimization"
