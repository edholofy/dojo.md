meta:
  id: thread-ab-testing
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Design systematic A/B tests for thread optimization"
  tags: [twitter, ab-testing, experimentation, methodology, optimization]

state: {}

trigger: |
  Twitter/X doesn't have built-in A/B testing, but you can design
  systematic content experiments to optimize thread performance.

  Creator: Growth marketer, 22,000 followers, posts 4 threads/week

  Design A/B test plans for these 5 variables:

  1. Hook format test:
     - Hypothesis: Curiosity gap hooks outperform bold statement hooks
     - Design: Write the same thread topic with 2 different hooks
     - Write both hook versions for: "Lessons from scaling to $1M ARR"
     - Controls: same day of week, same time, 2 weeks apart
     - How to measure: impressions, click-through to full thread, replies

  2. Thread length test:
     - Hypothesis: 7-tweet threads outperform 12-tweet threads
     - Design: Same content, condensed vs expanded format
     - Write the condensed version outline and expanded version outline
     - How to control for content quality when changing length

  3. Visual vs text-only test:
     - Hypothesis: Threads with images every 3rd tweet outperform text-only
     - Design: Alternate visual and text-only threads over 4 weeks
     - What visuals to include (screenshots, charts, hand-drawn)
     - Metrics: completion rate (proxy: engagement on last tweet vs first)

  4. CTA placement test:
     - Hypothesis: Mid-thread CTAs outperform end-of-thread CTAs
     - Design: Same thread with CTA at tweet 4 vs tweet 8
     - What to measure (newsletter signups, profile visits, follows)

  5. Posting time test:
     - Hypothesis: 7 AM outperforms 9 AM for this audience
     - Design: 4-week rotation between 7 AM and 9 AM
     - How to account for topic differences between test threads

  For each test:
  - Null hypothesis and alternative hypothesis
  - Sample size needed for meaningful results
  - How many weeks to run the test
  - Statistical significance considerations (when to trust the data)
  - Expected learnings and how to apply them

assertions:
  - type: llm_judge
    criteria: "Each test has a clear hypothesis with proper null and alternative statements — demonstrates understanding of experimental design, not just 'try two things and see what happens'"
    weight: 0.25
    description: "Clear hypothesis-driven experimental design"
  - type: llm_judge
    criteria: "The control variables are well-identified — acknowledges that topic, time, day, audience mood, and current events all confound results, and proposes specific ways to control for each"
    weight: 0.25
    description: "Well-identified control variables"
  - type: llm_judge
    criteria: "The statistical significance discussion is honest — notes that with 4 threads/week, getting statistically significant results takes 4-8 weeks minimum, and warns against drawing conclusions from 2-3 tests"
    weight: 0.25
    description: "Honest statistical significance discussion"
  - type: llm_judge
    criteria: "The written hook variations (test 1) are genuinely different approaches — curiosity gap vs bold statement should be clearly distinguishable, not just minor word changes"
    weight: 0.25
    description: "Genuinely different hook variations"
