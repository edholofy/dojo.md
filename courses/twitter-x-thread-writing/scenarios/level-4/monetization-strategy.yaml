meta:
  id: monetization-strategy
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Design a complete monetization strategy built on thread content"
  tags: [twitter, monetization, revenue, business-model, creator-economy]

state: {}

trigger: |
  A Twitter/X creator wants to monetize their thread-writing expertise.
  Design the complete revenue strategy.

  Creator Profile:
  - Name: Kara Montez, B2B marketing strategist
  - Followers: 42,000 (grown from 5K in 18 months through threads)
  - Avg thread: 800 likes, 100 replies
  - Audience: CMOs, VPs of Marketing, growth marketers, founders
  - Current income from Twitter: $0 (all organic, no monetization)
  - Goal: $200K/year from Twitter-adjacent revenue within 12 months

  Design the monetization strategy:

  1. Revenue stream analysis (rank by ROI):
     - X ad revenue share (impressions-based)
     - Paid newsletter (via Substack or Beehiiv)
     - Online course or cohort
     - Consulting/advisory retainers
     - Sponsored threads
     - Digital products (templates, frameworks)
     - Speaking engagements
     - For each: pricing, capacity, margin, effort, timeline to revenue

  2. Thread-to-revenue bridges:
     - Write 3 threads that each drive a different revenue stream:
       a) Thread that demonstrates expertise → consulting inquiry
       b) Thread that teases deeper content → paid newsletter signup
       c) Thread that showcases a framework → template/course purchase
     - For each: full thread content + the monetization mechanic

  3. Pricing strategy:
     - How to determine price points for each stream
     - The "premium positioning" effect of thought leadership on pricing
     - How 42K followers translates to realistic customer numbers
     - Conversion funnel: impressions → followers → subscribers → buyers

  4. Content balance:
     - How much free value vs paid content
     - The "give away the what, sell the how" principle
     - When monetization starts hurting organic growth
     - How to maintain credibility while selling

  5. 12-month revenue ramp:
     - Month-by-month plan from $0 to $200K run rate
     - Launch sequence for each revenue stream
     - When to add vs cut streams based on performance

assertions:
  - type: llm_judge
    criteria: "The revenue streams are ranked by realistic ROI — consulting and courses likely outrank ad revenue for a 42K-follower creator, with clear effort-to-revenue analysis for each"
    weight: 0.25
    description: "Realistically ranked revenue streams"
  - type: llm_judge
    criteria: "The 3 monetization threads deliver genuine value while naturally creating buying intent — they don't feel salesy but create demand through demonstrated expertise"
    weight: 0.25
    description: "Value-delivering monetization threads"
  - type: llm_judge
    criteria: "The conversion funnel math is realistic — 42K followers doesn't mean 42K potential customers, and the model accounts for realistic conversion rates at each stage (1-3% engagement to conversion)"
    weight: 0.25
    description: "Realistic conversion funnel math"
  - type: llm_judge
    criteria: "The 12-month plan is achievable — doesn't assume immediate massive revenue but shows a realistic ramp from first consulting clients to diversified revenue streams"
    weight: 0.25
    description: "Achievable 12-month revenue plan"
