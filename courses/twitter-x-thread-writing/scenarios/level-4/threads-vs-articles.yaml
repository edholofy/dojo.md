meta:
  id: threads-vs-articles
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Choose between threads and X Articles/long-form posts strategically"
  tags: [twitter, articles, long-form, format-strategy, seo]

state: {}

trigger: |
  Twitter/X now offers Articles (up to 25,000 characters) alongside
  traditional threads. Articles get indexed by Google (SEO advantage),
  while threads get better immediate engagement. Design a strategy that
  uses both formats optimally.

  Creator: DevOps engineer and tech writer
  Followers: 28,000
  Content: Technical tutorials, engineering culture, career advice
  Goal: Build authority as a technical thought leader

  Analyze and strategize:

  1. Format comparison for 6 content ideas:
     For each, recommend thread or article and why:
     a) "5 Kubernetes mistakes I made in production" — war stories
     b) "Complete guide to setting up a CI/CD pipeline from scratch"
     c) "Hot take: Microservices are premature optimization for 95% of teams"
     d) "Detailed comparison: AWS vs GCP vs Azure for startups in 2026"
     e) "The story of how I debugged a production outage at 3 AM"
     f) "A reference guide to Docker networking commands"

  2. Write a full thread version of idea (c) — the microservices hot take
  3. Write an article outline for idea (d) — the cloud comparison
     - Title, subtitle, section headers, key data points per section

  4. Hybrid strategy:
     - How to use a thread to promote an article
     - How to turn an article into multiple threads
     - Write a "promotional thread" that teases an article
     - When to publish on X Articles vs your own blog

  5. SEO considerations:
     - Which topics benefit from Google indexing (articles)
     - Long-tail keyword strategy for X Articles
     - How Articles compete with traditional blogs for search traffic

assertions:
  - type: llm_judge
    criteria: "The format recommendations are well-reasoned — war stories and hot takes are threads (immediate engagement), comprehensive guides and reference materials are articles (searchability and depth)"
    weight: 0.25
    description: "Well-reasoned format recommendations"
  - type: llm_judge
    criteria: "The microservices hot take thread is punchy and debate-worthy — takes a clear stance, uses specific examples, and is structured to generate replies and quote tweets"
    weight: 0.25
    description: "Punchy debate-worthy hot take thread"
  - type: llm_judge
    criteria: "The cloud comparison article outline is comprehensive — includes pricing comparisons, feature matrices, use-case recommendations, and practical decision frameworks"
    weight: 0.25
    description: "Comprehensive cloud comparison article outline"
  - type: llm_judge
    criteria: "The hybrid strategy shows genuine synergy — demonstrates how threads and articles feed each other, with the promotional thread giving enough value to click through without being a pure teaser"
    weight: 0.25
    description: "Genuine thread-article synergy strategy"
