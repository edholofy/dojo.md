meta:
  id: thread-content-audit
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Conduct a comprehensive content audit of a creator's thread history"
  tags: [twitter, audit, content-strategy, diagnosis, improvement]

state: {}

trigger: |
  A creator with 20K followers feels "stuck" — posting threads consistently
  but not growing. Conduct a full content audit.

  Creator: Sarah Kim, operations consultant
  Twitter: 20,000 followers (was 18,000 six months ago — growth stalled)
  Posts 3 threads/week + 2-3 daily tweets
  Avg thread: 250 likes, 30 replies (hasn't changed in 4 months)

  Last 12 threads (summarized):
  1. "5 ops frameworks I use with every client" — 380 likes (best performer)
  2. "Happy to announce I'm speaking at OpsCon!" — 85 likes
  3. "Thread on supply chain optimization basics" — 190 likes
  4. "Lessons from my worst consulting engagement" — 410 likes (best ever)
  5. "Reshared my blog post on workflow automation" — 75 likes
  6. "3 books every ops leader should read" — 220 likes
  7. "My take on the return-to-office debate" — 290 likes
  8. "How to conduct a process audit (step by step)" — 340 likes
  9. "So grateful for 20K followers! Thank you all" — 150 likes
  10. "What I learned at [Conference Name]" — 95 likes
  11. "Unpopular opinion: most companies don't need a COO" — 520 likes (top ever)
  12. "Weekend reading thread: ops articles worth your time" — 130 likes

  Provide:
  1. Brutally honest diagnosis of why growth stalled
  2. Categorize each thread: "keep," "fix," or "kill" with reasoning
  3. Identify her actual best content vs what she thinks is best
  4. Define 3 focused content pillars
  5. Write a sample thread in each pillar showing the difference
  6. 90-day turnaround plan with monthly milestones

assertions:
  - type: llm_judge
    criteria: "The diagnosis is brutally honest — identifies that announcement threads, gratitude posts, reshared blogs, and conference recaps are dead weight that dilute her brand and suppress algorithmic reach"
    weight: 0.30
    description: "Brutally honest growth stall diagnosis"
  - type: llm_judge
    criteria: "The keep/fix/kill categorization is evidence-based — uses engagement data to justify each decision, noting that frameworks and contrarian threads massively outperform announcements and reshares"
    weight: 0.25
    description: "Evidence-based keep/fix/kill categorization"
  - type: llm_judge
    criteria: "The 3 content pillars are specific and ownable — narrow enough for Sarah to become the go-to person in operations, not generic topics every consultant covers"
    weight: 0.25
    description: "Specific ownable content pillars"
  - type: llm_judge
    criteria: "The 90-day plan has concrete milestones — specific follower, engagement, and content quality targets per month with actions, not vague advice"
    weight: 0.20
    description: "Concrete 90-day turnaround milestones"
