meta:
  id: multi-account-strategy
  level: 4
  course: twitter-x-thread-writing
  type: output
  description: "Design a thread strategy for a company with personal and brand accounts"
  tags: [twitter, multi-account, brand, personal-brand, corporate]

state: {}

trigger: |
  A startup wants to coordinate thread content across the founder's
  personal account and the company brand account.

  Company: FlowMetrics (revenue intelligence platform, Series A, 80 employees)
  CEO: Nina Patel (14,000 personal followers)
  Company account: @FlowMetrics (3,200 followers)
  Other active employees: VP Sales (6,000 followers), Head of Product (4,500)

  Design the multi-account thread strategy:

  1. Content differentiation:
     - What threads go on Nina's personal account vs @FlowMetrics vs employees
     - Topic ownership map (who writes about what)
     - Voice differentiation (personal vs corporate vs functional expertise)
     - Write a sample thread for each account on the same topic:
       "Why revenue intelligence is the next big category in B2B"
       a) Nina's version (visionary, founder's perspective)
       b) @FlowMetrics version (product/market perspective)
       c) VP Sales version (practitioner perspective)

  2. Cross-amplification playbook:
     - How accounts reference each other naturally
     - Quote-tweet strategy (when Nina QTs company, when company QTs Nina)
     - Reply chain coordination (employees commenting on each other's threads)
     - How to avoid looking coordinated/inauthentic

  3. Company thread templates:
     - Product launch thread template
     - Customer success story thread template
     - Hiring/culture thread template
     - Industry analysis thread template
     - Write one full example of the product launch thread

  4. Employee advocacy program:
     - How to encourage employees to write threads (without mandating it)
     - Content support: prompts, outlines, editing help
     - Recognition and incentive systems
     - What employees can/cannot say about the company publicly

assertions:
  - type: llm_judge
    criteria: "The 3 versions of the same topic sound authentically different — Nina's is visionary and personal, the company account is factual and product-focused, the VP Sales is practical and customer-driven"
    weight: 0.30
    description: "Authentically differentiated multi-account voices"
  - type: llm_judge
    criteria: "The cross-amplification strategy feels organic — the coordination tactics wouldn't be obvious to an outside observer, avoiding the 'corporate astroturfing' perception"
    weight: 0.25
    description: "Organic cross-amplification strategy"
  - type: llm_judge
    criteria: "The company thread templates are usable — specific enough that any marketing team member could fill in the blanks, with clear guidance on tone, structure, and CTAs"
    weight: 0.25
    description: "Usable company thread templates"
  - type: llm_judge
    criteria: "The employee advocacy approach is voluntary and supportive — provides tools and incentives without mandating participation, and clearly defines boundaries around company information"
    weight: 0.20
    description: "Voluntary supportive employee advocacy"
