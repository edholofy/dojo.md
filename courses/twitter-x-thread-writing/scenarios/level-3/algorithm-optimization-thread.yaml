meta:
  id: algorithm-optimization-thread
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Optimize threads for Twitter/X algorithm signals"
  tags: [twitter, algorithm, optimization, signals, distribution]

state: {}

trigger: |
  Twitter/X's algorithm weights engagement signals differently:
  - Replies that get author replies: +75 weight
  - Retweets: 20x a like
  - Replies: 13.5x a like
  - Bookmarks: 10x a like
  - Profile clicks: 12x a like
  - Likes: 1x baseline

  A creator with 20,000 followers consistently gets 300 likes on threads
  but wants to break through to 2,000+ likes by optimizing for the
  algorithm's weighted signals.

  Design an algorithm-optimized thread strategy:

  1. Thread optimized for REPLIES (highest weight signal):
     - Write a 7-tweet thread where every tweet is designed to generate replies
     - Techniques: open-ended questions, controversial micro-takes, fill-in-
       the-blank prompts, "agree or disagree" stakes
     - Write the full thread on: "The most overrated business advice"

  2. Thread optimized for RETWEETS (20x multiplier):
     - Write a 7-tweet thread designed to maximize shares
     - Techniques: universally relatable insights, screenshot-worthy formats,
       reference posts others want to co-sign
     - Write the full thread on: "Lessons I'd give my younger self about money"

  3. Thread optimized for BOOKMARKS (save triggers):
     - Write a 7-tweet thread designed for maximum saves
     - Techniques: reference material, templates, checklists, "save for later"
     - Write the full thread on: "The complete cold email framework (copy this)"

  For each:
  - Full thread content
  - Annotate which specific algorithm signal each tweet targets
  - Predict the engagement mix (% likes, replies, retweets, bookmarks)
  - How the first 30 minutes of post-thread engagement matters

assertions:
  - type: llm_judge
    criteria: "Each thread is clearly optimized for its target signal — the reply-optimized thread has debate-worthy prompts in every tweet, the retweet-optimized thread has universally shareable insights, the bookmark thread is a reference tool"
    weight: 0.30
    description: "Signal-specific optimization per thread"
  - type: llm_judge
    criteria: "The algorithm signal annotations are accurate — each tweet is correctly mapped to the signal it targets, with explanations of why that element triggers that specific behavior"
    weight: 0.25
    description: "Accurate algorithm signal annotations"
  - type: llm_judge
    criteria: "The engagement mix predictions are differentiated and realistic — the reply thread predicts high reply:like ratio, the bookmark thread predicts high save:like ratio"
    weight: 0.25
    description: "Differentiated realistic engagement predictions"
  - type: llm_judge
    criteria: "The first-30-minutes strategy is actionable — specific steps like replying to every comment to trigger the 75x signal, self-QTing, and DM-sharing with engaged followers"
    weight: 0.20
    description: "Actionable first-30-minutes strategy"
