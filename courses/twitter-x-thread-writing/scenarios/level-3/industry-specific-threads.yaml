meta:
  id: industry-specific-threads
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Write industry-specific threads for different professional audiences"
  tags: [twitter, industry-specific, b2b, tech, finance, audience-targeting]

state: {}

trigger: |
  Different industries have different engagement patterns on Twitter/X.
  What works for tech Twitter doesn't work for FinTwit, which doesn't
  work for marketing Twitter.

  Write a thread for each of these 4 industry audiences using the same
  core insight: "Why the best leaders focus on systems, not goals."

  Adapt the thread for:

  1. Tech Twitter (audience: developers, CTOs, startup founders):
     - Use technical analogies (systems engineering, architecture)
     - Reference specific tools and frameworks
     - Tone: Direct, slightly irreverent, technical but accessible

  2. FinTwit (audience: investors, traders, finance professionals):
     - Use financial analogies (compounding, portfolio allocation)
     - Reference specific market behaviors or investment strategies
     - Tone: Data-driven, analytical, backed by numbers

  3. Marketing Twitter (audience: CMOs, growth marketers, content creators):
     - Use marketing analogies (funnels, flywheels, attribution)
     - Reference specific campaigns or marketing systems
     - Tone: Strategic, creative, results-oriented

  4. Leadership Twitter (audience: executives, managers, HR leaders):
     - Use management analogies (team dynamics, culture, org design)
     - Reference specific leadership frameworks
     - Tone: Thoughtful, empathetic, experience-backed

  For each:
  - Write a complete 7-tweet thread
  - Different hook optimized for that audience
  - Explain the cultural norms of that Twitter sub-community
  - How hashtags and tagging differ by industry community

assertions:
  - type: llm_judge
    criteria: "All 4 threads deliver the same core insight but feel like they were written by 4 different people — the analogies, examples, and tone authentically match each industry community"
    weight: 0.30
    description: "Authentically industry-matched thread versions"
  - type: llm_judge
    criteria: "The cultural norm explanations are specific — identifies real differences (tech Twitter values irreverence and code examples, FinTwit values data and contrarian bets, marketing Twitter values case studies)"
    weight: 0.25
    description: "Specific cultural norm explanations"
  - type: llm_judge
    criteria: "Each hook is optimized for its audience — the tech hook might reference a system architecture metaphor, while the FinTwit hook might lead with a market data point"
    weight: 0.25
    description: "Audience-optimized hooks per industry"
  - type: llm_judge
    criteria: "The hashtag and tagging strategy differs appropriately — tech uses different hashtags than finance, and the tagging etiquette (who to tag, when) varies by community"
    weight: 0.20
    description: "Appropriately different hashtag strategies"
