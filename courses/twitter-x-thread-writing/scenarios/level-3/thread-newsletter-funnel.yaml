meta:
  id: thread-newsletter-funnel
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Use threads to drive newsletter subscribers and monetize"
  tags: [twitter, newsletter, funnel, subscriber-growth, monetization]

state: {}

trigger: |
  Twitter/X threads are the #1 organic channel for newsletter growth.
  The strategy: deliver 80% of the value in the thread, then drive
  subscribers to the newsletter for the remaining 20%.

  Creator Profile:
  - Name: Jake Rivera, fintech analyst
  - Twitter: 25,000 followers, posts 4 threads/week
  - Newsletter: 3,200 subscribers (Substack), free tier
  - Goal: Grow to 15,000 subscribers in 6 months and launch a paid tier

  Design the thread-to-newsletter growth system:

  1. Thread types that drive subscribers:
     - Write 3 complete threads with built-in newsletter CTAs:
       a) "Deep analysis" thread: Full analysis in thread, newsletter has
          the raw data and extended model
       b) "Teaser" thread: Hook with key findings, newsletter has the full
          breakdown
       c) "Series" thread: Part 1 in thread, Part 2 as newsletter exclusive
     - For each: where exactly does the newsletter CTA go? How is it worded?

  2. CTA optimization:
     - Write 5 different newsletter CTA tweets (closing tweets):
       a) Value-first CTA
       b) Curiosity-gap CTA
       c) Social-proof CTA (subscriber count or testimonial)
       d) Exclusive-content CTA
       e) Community CTA
     - Which CTA type converts best and why

  3. Free-to-paid conversion strategy:
     - How to use free threads to justify a paid newsletter
     - Pricing recommendation and launch timeline
     - Write the "paid tier launch" thread (announcing the paid newsletter)

  4. Content ecosystem:
     - How newsletter content becomes threads (and vice versa)
     - Weekly workflow: thread → newsletter → thread recycling
     - How to avoid cannibalizing (giving away too much vs too little)

assertions:
  - type: llm_judge
    criteria: "The 3 thread-to-newsletter strategies are distinctly different — each uses a different mechanism (depth extension, teaser reveal, serialized content) to drive subscriptions"
    weight: 0.25
    description: "Distinctly different newsletter conversion strategies"
  - type: llm_judge
    criteria: "The 5 CTA variations are genuinely different and each explains why it works — not just different words but different psychological approaches to conversion"
    weight: 0.25
    description: "Genuinely different CTA variations"
  - type: llm_judge
    criteria: "The free-to-paid conversion strategy is realistic — acknowledges that 3,200 free subscribers doesn't automatically convert to paid, and outlines specific tactics to justify the price"
    weight: 0.25
    description: "Realistic free-to-paid conversion strategy"
  - type: llm_judge
    criteria: "The content ecosystem shows true leverage — demonstrates how one piece of analysis generates both a thread and newsletter content without making either feel like a duplicate"
    weight: 0.25
    description: "True content leverage ecosystem"
