meta:
  id: thread-series-strategy
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Design a recurring thread series that builds anticipation and loyalty"
  tags: [twitter, series, recurring-content, anticipation, brand-building]

state: {}

trigger: |
  The most successful Twitter/X creators have recurring thread series —
  content formats their audience expects and looks forward to. This
  builds habit loops and drives consistent engagement.

  Creator: Maya Johnson, product design lead at a tech company
  Followers: 18,000
  Goal: Grow to 50K in 6 months through consistent thread content

  Design 3 recurring thread series for Maya:

  1. Weekly series — "Design Roast" (every Tuesday):
     - Format: Maya takes a popular app's UX and identifies 5 design issues
       + suggests fixes
     - Write the first full episode (choose a well-known app)
     - Design the branding: consistent hook format, visual style, hashtag
     - How to handle when the app's designers respond

  2. Biweekly series — "Design Decision" (every other Friday):
     - Format: Present a real design challenge with 2-3 possible approaches,
       let the audience vote, then reveal which was chosen and why
     - Write the first episode structure
     - How to use polls to drive participation

  3. Monthly series — "Designer's Bookshelf" (1st of each month):
     - Format: Deep-dive thread reviewing a design/product book with
       key takeaways applied to real products
     - Write the first episode outline
     - How to cross-promote with the book's author

  For each series:
  - Full first episode (or detailed outline)
  - Branding and consistency elements
  - How the series builds anticipation over time
  - Growth projections and engagement benchmarks
  - When to retire or evolve a series

assertions:
  - type: llm_judge
    criteria: "Each series has a distinct format and cadence that matches its complexity — weekly for lightweight roasts, biweekly for interactive decisions, monthly for deep dives"
    weight: 0.25
    description: "Distinct format-matched series cadences"
  - type: llm_judge
    criteria: "The Design Roast first episode is specific and constructive — identifies real UX issues in a specific app with actionable redesign suggestions, not just complaining"
    weight: 0.25
    description: "Specific constructive Design Roast episode"
  - type: llm_judge
    criteria: "The series branding creates recognition — consistent hook formats, visual patterns, and hashtags that followers would recognize instantly in their feed"
    weight: 0.25
    description: "Recognition-creating series branding"
  - type: llm_judge
    criteria: "The growth projections are realistic — doesn't promise 50K followers purely from series content but shows how recurring threads compound with new follower acquisition strategies"
    weight: 0.25
    description: "Realistic compounding growth projections"
