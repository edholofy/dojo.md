meta:
  id: thread-ghostwriting
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Ghostwrite Twitter/X threads for executives and founders"
  tags: [twitter, ghostwriting, executive, voice-matching, content-service]

state: {}

trigger: |
  You're ghostwriting threads for a CEO who wants to build an audience
  on Twitter/X but doesn't have time to write.

  CEO Profile:
  - Name: James Whitfield, CEO of a 400-person enterprise sales platform
  - Background: 20 years in B2B sales, built and sold 2 companies
  - Voice: No-BS, uses sports analogies (played college basketball), data-driven
  - Pet peeves: "Growth hacking" buzzwords, vanity metrics, "LinkedIn bros"
  - Twitter: 4,200 followers, rarely posts
  - Goal: Build authority in enterprise sales strategy

  Raw input from a 10-minute voice note:

  "So I had this conversation with a VP of Sales yesterday who was bragging
  about his team hitting 120% of quota. I asked him one question: what's your
  win rate? Dead silence. Turns out it was 8%. They were just spraying and
  praying — a thousand outbound activities a day and celebrating the few
  deals that fell through the cracks. That's not sales excellence, that's
  a volume play. The best sales teams I've built had win rates above 35%.
  How? We were picky about who we talked to. We didn't chase every lead.
  We qualified ruthlessly. It's like basketball — you don't win by taking
  every shot. You win by taking the RIGHT shots."

  Deliverables:
  1. Transform the voice note into a 7-tweet thread in James's voice
  2. Write a second thread on a related topic (hiring sales reps) in the
     same voice, proving you can extend beyond the source material
  3. Create a voice guide: tone, vocabulary, do's/don'ts, sentence patterns
  4. Write 3 standalone tweet ideas in his voice (not threads, single tweets)

assertions:
  - type: llm_judge
    criteria: "The ghostwritten thread sounds authentically like James — uses sports analogies, data-driven arguments, no-BS tone, and the basketball metaphor feels natural rather than forced"
    weight: 0.30
    description: "Authentic executive voice matching"
  - type: llm_judge
    criteria: "The second thread (hiring sales reps) is consistent in voice — same sentence patterns, analogy style, and directness as the first thread, demonstrating true voice capture"
    weight: 0.25
    description: "Consistent voice across topics"
  - type: llm_judge
    criteria: "The voice guide is specific enough to be followed by another ghostwriter — not generic 'be direct' but captures James's actual patterns (short declarative sentences, rhetorical questions, data-then-analogy structure)"
    weight: 0.25
    description: "Specific replicable voice guide"
  - type: llm_judge
    criteria: "The 3 standalone tweets feel like mini-thoughts from the same person — they share James's perspective on sales without needing a full thread, each tweet-worthy on its own"
    weight: 0.20
    description: "Voice-consistent standalone tweets"
