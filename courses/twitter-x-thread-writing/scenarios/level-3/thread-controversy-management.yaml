meta:
  id: thread-controversy-management
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Handle controversy and backlash from thread content"
  tags: [twitter, controversy, crisis, backlash, reputation]

state: {}

trigger: |
  A tech executive posted a thread that went viral for the wrong reasons:

  Thread: "Why I stopped hiring from top universities (and you should too)"
  - 15,000 likes but also 3,000 quote tweets (mostly negative)
  - Key backlash: people calling it elitist in reverse, saying it dismisses
    real achievement, mocking the "I hire for grit, not degrees" narrative
  - A prominent professor wrote a rebuttal thread (went viral too)
  - Major tech publication wants a comment for an article
  - Two current employees (who went to top universities) posted that they
    feel devalued

  Navigate this situation:

  1. Immediate assessment:
     - Was the original thread wrong, partially right, or correctly positioned
       but poorly communicated?
     - What specifically triggered the backlash?
     - The "intention vs impact" gap analysis

  2. Response strategy:
     - Write a follow-up thread that addresses the backlash (within 24 hours)
     - Tone: Not apologizing for the position, but acknowledging the valid
       criticisms and adding nuance
     - How to handle the professor's rebuttal (engage, ignore, or bridge?)
     - What to tell the journalist

  3. Employee communication:
     - How to address the internal concerns from employees
     - Write a brief internal message to the team

  4. Long-term strategy:
     - How to use this controversy to strengthen (not damage) the brand
     - The "controversy recovery playbook" for future threads
     - How to calibrate provocation: the spectrum from boring to career-ending

  5. What NOT to do:
     - Common mistakes people make when threads go wrong
     - When to delete a thread vs leave it up
     - Why apologizing for having an opinion is worse than the controversy

assertions:
  - type: llm_judge
    criteria: "The follow-up thread strikes the right balance — adds nuance and acknowledges valid criticisms without fully retreating from the original position. It shows intellectual humility without weakness"
    weight: 0.30
    description: "Balanced nuanced follow-up thread"
  - type: llm_judge
    criteria: "The assessment correctly identifies that the backlash likely stems from poor framing (appearing anti-education) rather than the underlying point (skills matter more than credentials)"
    weight: 0.25
    description: "Correctly identified framing problem"
  - type: llm_judge
    criteria: "The employee communication is empathetic and specific — validates their feelings while explaining the intent, without undermining the public position"
    weight: 0.25
    description: "Empathetic specific employee communication"
  - type: llm_judge
    criteria: "The 'what NOT to do' section identifies real mistakes — panic-deleting, over-apologizing, doubling down aggressively, or going silent — with explanations of why each makes things worse"
    weight: 0.20
    description: "Real mistake identification in crisis"
