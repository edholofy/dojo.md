meta:
  id: thread-repurposing-system
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Repurpose one thread into multiple content formats across platforms"
  tags: [twitter, repurposing, multi-platform, content-system, efficiency]

state: {}

trigger: |
  A single great thread should generate 10+ pieces of content. Design
  the complete repurposing system.

  Original thread (10 tweets) topic: "The 7 pricing mistakes I made that
  cost my SaaS $500K in revenue"
  Author: SaaS founder, $2M ARR

  Show how this one thread becomes:

  1. Twitter/X native content (5 pieces):
     a) Self-quote-tweet with new insight (write it)
     b) 3 standalone tweets extracted from individual thread points (write them)
     c) Poll based on one of the pricing mistakes (write it)

  2. LinkedIn adaptation (2 pieces):
     a) Full LinkedIn post version of the thread (write it, ~1,500 chars)
     b) Short LinkedIn post teasing one key insight (write it)

  3. Newsletter content (1 piece):
     a) Newsletter section outline expanding on the thread with additional
        data and case studies

  4. Visual content (2 pieces):
     a) Carousel concept (8 slides) — describe each slide's content
     b) Infographic concept — describe the visual layout

  5. Audio/video content (2 pieces):
     a) Podcast episode outline based on the thread
     b) Short-form video script (60 seconds) for TikTok/Reels

  Provide:
  - A publishing schedule across platforms (when to post each piece)
  - How to adapt voice/format for each platform
  - Total estimated reach multiplication vs thread alone

assertions:
  - type: llm_judge
    criteria: "Each repurposed piece is genuinely adapted for its platform — the LinkedIn version has longer paragraphs and professional tone, the video script is conversational and visual, the newsletter adds depth"
    weight: 0.30
    description: "Genuinely platform-adapted repurposed content"
  - type: llm_judge
    criteria: "The publishing schedule spaces content strategically — doesn't publish everything at once but sequences pieces across 2-3 weeks to maximize reach without audience fatigue"
    weight: 0.25
    description: "Strategically spaced publishing schedule"
  - type: llm_judge
    criteria: "The standalone tweets extracted from the thread work independently — they don't require context from the full thread and each could go viral on its own"
    weight: 0.25
    description: "Independently viable standalone tweets"
  - type: llm_judge
    criteria: "The reach multiplication estimate is realistic — doesn't promise 100x but shows how 12+ pieces across platforms realistically multiply total impressions by 5-8x vs thread alone"
    weight: 0.20
    description: "Realistic reach multiplication estimate"
