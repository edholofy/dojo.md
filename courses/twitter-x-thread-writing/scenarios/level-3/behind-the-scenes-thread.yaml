meta:
  id: behind-the-scenes-thread
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Write a behind-the-scenes building-in-public thread"
  tags: [twitter, building-in-public, transparency, behind-the-scenes, startup]

state: {}

trigger: |
  "Building in public" threads are uniquely powerful on Twitter/X because
  they combine transparency with storytelling. The key is sharing enough
  to be interesting without revealing competitive advantages.

  Creator: Indie hacker building an AI writing tool
  - Product: WriteMate (AI-powered writing assistant for marketers)
  - Stage: 6 months in, 500 paying users, $8K MRR
  - Twitter: 6,200 followers

  Write 3 different building-in-public thread types:

  1. "Monthly revenue update" thread (transparency):
     - Write a full 8-tweet thread sharing real numbers:
       MRR, growth rate, churn, acquisition channels, biggest expense
     - Include a screenshot description for the MRR chart
     - Balance transparency with not oversharing (what to hide)

  2. "How I built [feature]" thread (technical BTS):
     - Write a full 10-tweet thread about building a specific feature
       (e.g., the AI tone-matching algorithm)
     - Include: the problem, approaches considered, what they chose, results
     - Technical enough to be credible, accessible enough for non-developers

  3. "What went wrong this month" thread (vulnerability):
     - Write a full 7-tweet thread about a real failure
       (e.g., a pricing experiment that lost 15% of customers)
     - The lesson learned and what they're doing differently
     - Why vulnerability threads outperform pure success stories

  For each thread, explain:
  - What to share vs what to keep private
  - How BIP threads drive both followers and customers
  - The fine line between authentic and performative transparency

assertions:
  - type: llm_judge
    criteria: "The revenue update thread shares specific, credible numbers — not vague 'we're growing' but actual MRR, churn rate, and growth percentages that indie hackers and founders would find genuinely useful"
    weight: 0.25
    description: "Specific credible revenue numbers"
  - type: llm_judge
    criteria: "The technical BTS thread balances depth and accessibility — a developer would learn something, but a non-technical founder would also understand the decision-making process"
    weight: 0.25
    description: "Balanced technical-accessible BTS thread"
  - type: llm_judge
    criteria: "The vulnerability thread is honest without being self-pitying — shares a real failure with specific numbers but focuses on the lesson and recovery, not on generating sympathy"
    weight: 0.25
    description: "Honest non-self-pitying vulnerability thread"
  - type: llm_judge
    criteria: "The privacy boundaries are well-defined — clearly explains what to share (aggregated revenue, growth trends, lessons) vs what to keep private (customer names, proprietary algorithms, specific pricing strategy)"
    weight: 0.25
    description: "Well-defined privacy boundaries"
