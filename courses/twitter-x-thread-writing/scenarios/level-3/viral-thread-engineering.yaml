meta:
  id: viral-thread-engineering
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Reverse-engineer viral thread patterns and apply them systematically"
  tags: [twitter, viral, patterns, reverse-engineering, growth]

state: {}

trigger: |
  Analyze these 4 viral threads (10,000+ likes each) and extract replicable
  patterns. Then create new threads using those patterns.

  Viral Thread 1 (52K likes):
  Hook: "I spent $100K on Facebook ads so you don't have to. Here are the
  10 most expensive lessons:"
  Pattern: [specific investment] → [clear count of lessons] → numbered list

  Viral Thread 2 (38K likes):
  Hook: "My company almost died 3 times. Each time, one decision saved us.
  Here's what they were:"
  Pattern: [dramatic setup] → [implied secrets] → reveal structure

  Viral Thread 3 (25K likes):
  Hook: "I interviewed 50 millionaires. They all agreed on one thing:"
  Pattern: [research-backed credibility] → [curiosity gap] → delayed reveal

  Viral Thread 4 (18K likes):
  Hook: "Unpopular opinion: College degrees will be worthless in 10 years.
  Here's my evidence:"
  Pattern: [contrarian claim] → [promise of proof] → argument structure

  Deliverables:
  1. For each viral thread:
     - Identify the primary virality mechanism
     - Identify the psychological trigger (curiosity, FOMO, controversy, utility)
     - Rate replicability (can this pattern be used again?)
     - Identify the "shareability trigger" (why people retweet this)

  2. Create a "viral thread formula" synthesizing the common patterns

  3. Write 4 new threads using each pattern for a marketing consultant:
     - Apply Viral Thread 1 pattern to "email marketing"
     - Apply Viral Thread 2 pattern to "client management"
     - Apply Viral Thread 3 pattern to "successful agencies"
     - Apply Viral Thread 4 pattern to "content marketing"
     - For each: write the hook + first 3 tweets + closing tweet

assertions:
  - type: llm_judge
    criteria: "The pattern analysis is insightful — goes beyond surface observations to identify the psychological triggers (sunk cost curiosity, survival narrative, research authority, identity challenge) that drive virality"
    weight: 0.25
    description: "Insightful psychological pattern analysis"
  - type: llm_judge
    criteria: "The viral formula synthesizes common elements into a reusable model — identifies that all viral threads combine credibility, curiosity gaps, specific promises, and emotional stakes"
    weight: 0.25
    description: "Reusable synthesized viral formula"
  - type: llm_judge
    criteria: "The 4 new threads authentically apply the patterns — each uses the same structural formula as its source thread but feels natural for the marketing consultant context, not forced"
    weight: 0.30
    description: "Authentically applied viral patterns"
  - type: llm_judge
    criteria: "The replicability ratings are honest — acknowledges that some patterns (like the $100K investment) require real credibility to replicate, while others (contrarian opinion) are more universally applicable"
    weight: 0.20
    description: "Honest replicability ratings"
