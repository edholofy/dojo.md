meta:
  id: twitter-spaces-thread-combo
  level: 3
  course: twitter-x-thread-writing
  type: output
  description: "Combine Twitter/X Spaces with threads for multi-format engagement"
  tags: [twitter, spaces, audio, multi-format, cross-promotion]

state: {}

trigger: |
  Twitter/X Spaces (live audio) and threads are complementary formats.
  Spaces drive real-time engagement; threads create evergreen content.
  Combined, they create a powerful authority-building flywheel.

  Creator: Sarah Lin, cybersecurity expert and startup advisor
  Followers: 14,000
  Goal: Use the Spaces+thread combo to build authority and drive consulting leads

  Design the combined strategy:

  1. Pre-Space thread (builds anticipation):
     - Write a 5-tweet thread promoting an upcoming Space on "The 3 biggest
       cybersecurity threats small businesses ignore"
     - Include: topic teaser, guest introduction, time/date, why to attend
     - How to use the thread to seed questions in advance

  2. During-Space engagement:
     - How to reference thread content during the live conversation
     - Real-time engagement tactics (responding to audience questions,
       inviting speakers up)
     - How to capture key moments for later content

  3. Post-Space thread (captures value):
     - Write a complete 10-tweet recap thread:
       "Just hosted a Space with 200 listeners on cybersecurity for SMBs.
       Here are the 7 biggest insights we discussed:"
     - How to tag guests and participants
     - Include the recording link strategy

  4. Content multiplication:
     - Show how one 45-minute Space generates:
       a) Pre-Space promo thread (5 tweets)
       b) Post-Space recap thread (10 tweets)
       c) 3-5 individual insight tweets (pulled from key moments)
       d) Newsletter recap
     - Write copy for 3 individual insight tweets from the Space

  5. Scheduling cadence:
     - How often to host Spaces (weekly vs biweekly vs monthly)
     - How to build a recurring audience
     - When Spaces hurt more than help

assertions:
  - type: llm_judge
    criteria: "The pre-Space thread builds genuine anticipation — creates enough curiosity about the cybersecurity topics that followers would actually set a reminder to attend"
    weight: 0.25
    description: "Genuine anticipation-building pre-Space thread"
  - type: llm_judge
    criteria: "The post-Space recap thread captures key insights in a standalone format — someone who missed the Space gets value from the thread alone, not just 'great Space today!'"
    weight: 0.25
    description: "Standalone-valuable post-Space recap"
  - type: llm_judge
    criteria: "The content multiplication math is practical — shows exactly how one Space generates 20+ pieces of content with specific examples, creating true leverage from the time investment"
    weight: 0.25
    description: "Practical content multiplication from Spaces"
  - type: llm_judge
    criteria: "The scheduling cadence recommendation considers sustainability — doesn't default to weekly but weighs the creator's capacity, audience size, and quality vs frequency trade-off"
    weight: 0.25
    description: "Sustainability-considering scheduling cadence"
