meta:
  id: visual-elements-threads
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Use images, screenshots, and media to boost thread engagement"
  tags: [twitter, visuals, images, screenshots, media, fundamentals]

state: {}

trigger: |
  Threads with images get 40% higher completion rates. But not every tweet
  needs an image, and the wrong image can hurt engagement.

  You're writing a 10-tweet thread: "How I redesigned my SaaS onboarding
  and increased activation by 40%."

  Author: Product manager at a B2B SaaS company

  For each of the 10 tweets:
  1. Write the tweet text
  2. Decide: image, screenshot, chart, GIF, or no visual
  3. If visual: describe exactly what it should show
  4. Explain why this tweet does or doesn't need a visual

  Visual types to consider:
  - Screenshots (product UI, metrics dashboards, before/after)
  - Charts/graphs (data visualization)
  - Hand-drawn diagrams (whiteboard-style frameworks)
  - GIFs (short demonstrations)
  - No visual (when text alone is stronger)

  Also explain:
  - The "visual rhythm" principle — why alternating text-only and image
    tweets improves readability
  - When images hurt engagement (e.g., stock photos, decorative images)
  - How image alt-text improves accessibility and SEO on Twitter/X

assertions:
  - type: llm_judge
    criteria: "The visual decisions are strategic — screenshots and charts appear at key data points, before/after visuals highlight the transformation, and text-only tweets are used for narrative transitions"
    weight: 0.30
    description: "Strategic visual placement decisions"
  - type: llm_judge
    criteria: "The visual descriptions are specific enough to create — not 'a chart showing improvement' but 'bar chart comparing 7-day activation rates before (34%) and after (48%) with clear labels'"
    weight: 0.25
    description: "Specific actionable visual descriptions"
  - type: llm_judge
    criteria: "The visual rhythm explanation demonstrates understanding — alternating visual and text tweets prevents fatigue and creates a scannable flow that keeps readers scrolling"
    weight: 0.25
    description: "Understanding-demonstrating visual rhythm explanation"
  - type: llm_judge
    criteria: "The thread itself is compelling — beyond the visual strategy, the onboarding redesign story has a clear narrative arc with specific metrics and actionable insights"
    weight: 0.20
    description: "Compelling onboarding redesign thread"
