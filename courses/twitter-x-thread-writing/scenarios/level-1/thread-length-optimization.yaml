meta:
  id: thread-length-optimization
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Choose the optimal thread length for different content types"
  tags: [twitter, thread-length, optimization, pacing, fundamentals]

state: {}

trigger: |
  Thread length affects completion rate and engagement. Data shows 7-10 tweets
  is the sweet spot, but different content needs different lengths.

  You have 5 content ideas. For each, recommend the optimal thread length
  and explain why. Then write the first 3 tweets and the closing tweet
  to demonstrate the pacing.

  Content ideas:
  1. "3 negotiation tactics I use in every deal" — short, punchy tips
  2. "The complete story of how I got fired and built a $1M business" — narrative
  3. "10 Chrome extensions every developer should know" — curated list
  4. "Why I think remote work is dying (and what's replacing it)" — hot take
  5. "The step-by-step process for landing your first freelance client" — tutorial

  For each:
  - Recommended length (number of tweets) with justification
  - First 3 tweets written out
  - Closing tweet written out
  - Where the "drop-off point" likely is (which tweet people stop reading)
  - How to prevent drop-off at that point

assertions:
  - type: llm_judge
    criteria: "Thread length recommendations vary appropriately — the 3-tip thread is shorter than the curated list, the narrative is mid-length, and recommendations are tied to content density not arbitrary rules"
    weight: 0.30
    description: "Content-appropriate length recommendations"
  - type: llm_judge
    criteria: "The drop-off analysis is specific — identifies exactly which tweet is the danger zone (usually tweet 4-5 for longer threads) and provides concrete retention strategies like teasing upcoming value"
    weight: 0.25
    description: "Specific drop-off analysis with retention strategies"
  - type: llm_judge
    criteria: "The opening 3 tweets and closing tweet for each thread demonstrate good pacing — the hook grabs, tweets 2-3 deliver value quickly to build momentum, and the closer wraps up with a CTA"
    weight: 0.25
    description: "Well-paced opening and closing demonstrations"
  - type: llm_judge
    criteria: "Each tweet stays within 280 characters and each contains exactly one clear point — no cramming multiple ideas into a single tweet"
    weight: 0.20
    description: "Single-point focused tweets within character limits"
