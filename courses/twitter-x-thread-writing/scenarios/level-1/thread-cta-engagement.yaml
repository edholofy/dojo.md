meta:
  id: thread-cta-engagement
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Write effective CTAs and engagement drivers in threads"
  tags: [twitter, cta, engagement, replies, retweets, bookmarks]

state: {}

trigger: |
  The closing tweet determines whether your thread drives follows, replies,
  retweets, or bookmarks. Each engagement type requires a different CTA.

  Write 5 different closing tweets for a thread about "How I grew my
  newsletter from 0 to 10,000 subscribers in 6 months."

  Author: Content creator and marketing consultant

  Each closing tweet should target a different engagement action:

  1. Reply-optimized: Drive people to share their own experience
  2. Retweet-optimized: Make the thread worth sharing with others
  3. Bookmark-optimized: Position the thread as a reference to save
  4. Follow-optimized: Give a reason to follow for more content
  5. Link-click-optimized: Drive traffic to the newsletter itself

  For each closing tweet:
  - Write the full tweet (under 280 characters)
  - Explain the psychology behind why this CTA works
  - Rate which engagement type it primarily drives (and secondary effects)
  - Note the algorithm impact (replies = 13.5x, retweets = 20x, bookmarks = 10x a like)

  Also explain:
  - Why you should never ask for multiple actions in one CTA
  - The "give before you ask" principle in thread CTAs
  - How to embed soft CTAs throughout the thread (not just at the end)

assertions:
  - type: llm_judge
    criteria: "All 5 CTAs are genuinely different in approach — each targets its specific action through distinct psychological triggers, not just different words asking for the same thing"
    weight: 0.30
    description: "Genuinely different CTA approaches"
  - type: llm_judge
    criteria: "The algorithm impact analysis is accurate — correctly notes that retweets (20x) are the most algorithmically valuable, bookmarks (10x) signal deep value, and replies (13.5x) drive conversation"
    weight: 0.25
    description: "Accurate algorithm impact analysis"
  - type: llm_judge
    criteria: "The psychological explanations are specific — not just 'this creates engagement' but explains why reply CTAs work through reciprocity, bookmark CTAs through loss aversion, etc."
    weight: 0.25
    description: "Specific psychological CTA explanations"
  - type: llm_judge
    criteria: "The soft CTA embedding advice is practical — shows how to sprinkle engagement hooks throughout the thread (e.g., 'more on this below' to maintain reading, mid-thread questions to prompt replies)"
    weight: 0.20
    description: "Practical soft CTA embedding advice"
