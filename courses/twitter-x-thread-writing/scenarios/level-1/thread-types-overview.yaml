meta:
  id: thread-types-overview
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Understand the main thread types and when to use each"
  tags: [twitter, thread-types, educational, storytelling, listicle]

state: {}

trigger: |
  There are 6 main thread types on Twitter/X, each suited for different
  content and goals. Demonstrate your understanding by writing a mini-thread
  (3-4 tweets) for each type on the same core topic.

  Core topic: "Lessons from building a SaaS product"
  Author: Indie hacker with a $30K MRR product

  Write a mini-thread in each format:

  1. Educational/How-To thread: Step-by-step, teaching a specific skill
  2. Storytelling thread: Personal narrative with emotional arc
  3. Listicle thread: Curated list of tools, tips, or resources
  4. Contrarian/Hot take thread: Challenge conventional wisdom
  5. Data/Research thread: Lead with numbers and analysis
  6. Behind-the-scenes thread: Show the process, not just the result

  For each mini-thread:
  - Write 3-4 tweets
  - Explain what makes this format different from the others
  - When to use this format (what goal it serves)
  - Expected engagement pattern (which gets more replies vs retweets vs bookmarks)

assertions:
  - type: llm_judge
    criteria: "All 6 formats are clearly distinct — the same core topic feels genuinely different in each format. The educational thread teaches, the story thread moves emotionally, the contrarian thread provokes"
    weight: 0.30
    description: "Clearly distinct format demonstrations"
  - type: llm_judge
    criteria: "The engagement pattern predictions are logical — educational threads drive bookmarks, storytelling drives replies and retweets, contrarian drives quote tweets and debate, data drives shares"
    weight: 0.25
    description: "Logical engagement pattern predictions"
  - type: llm_judge
    criteria: "The 'when to use' explanations show strategic thinking — not just format preference but understanding of which format serves which audience and goal"
    weight: 0.25
    description: "Strategic format selection explanations"
  - type: llm_judge
    criteria: "The indie hacker voice is consistent across all 6 formats — authentic, scrappy, and specific to the $30K MRR context rather than generic business advice"
    weight: 0.20
    description: "Consistent authentic indie hacker voice"
