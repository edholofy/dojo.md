meta:
  id: educational-thread
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Write an educational how-to thread that gets bookmarked and shared"
  tags: [twitter, educational, how-to, bookmarks, teaching]

state: {}

trigger: |
  Educational threads are the highest-performing thread type on Twitter/X.
  They get 3x more engagement than single tweets and drive the most
  bookmarks (saves).

  Write a complete educational thread:

  Topic: "How to write a one-page business plan (step by step)"
  Author: Startup advisor who has reviewed 500+ business plans
  Target audience: First-time founders, side-project builders

  Requirements:
  - 8-10 tweets total
  - Hook tweet that establishes credibility and promises value
  - Each step should be immediately actionable
  - Include one real-world example or template
  - Use formatting tricks (line breaks, caps for emphasis, bullet points)
  - Close with a CTA that drives bookmarks ("Save this thread")
  - Each tweet under 280 characters

  Write the full thread, then provide:
  - Why educational threads outperform other types
  - The "bookmark trigger" — what makes people save rather than just like
  - How to structure each teaching tweet (Principle → Example → Action)

assertions:
  - type: llm_judge
    criteria: "The thread teaches something genuinely useful — someone could follow these steps and actually create a one-page business plan. The advice is specific and actionable, not generic platitudes"
    weight: 0.30
    description: "Genuinely useful actionable teaching"
  - type: llm_judge
    criteria: "The formatting is optimized for Twitter/X — line breaks create white space, emphasis marks highlight key concepts, and each tweet is scannable on mobile without feeling cluttered"
    weight: 0.25
    description: "Twitter-optimized formatting"
  - type: llm_judge
    criteria: "The bookmark trigger analysis is insightful — explains that people save content they plan to reference later, which means threads need to be structured as reusable references, not one-time reads"
    weight: 0.25
    description: "Insightful bookmark trigger analysis"
  - type: llm_judge
    criteria: "The thread follows the Principle → Example → Action structure — each teaching tweet states the concept, illustrates it, and tells the reader exactly what to do"
    weight: 0.20
    description: "Principle-example-action teaching structure"
