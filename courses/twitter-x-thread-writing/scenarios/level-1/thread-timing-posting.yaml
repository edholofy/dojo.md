meta:
  id: thread-timing-posting
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Choose optimal posting times and understand the golden hour for threads"
  tags: [twitter, timing, scheduling, golden-hour, algorithm, fundamentals]

state: {}

trigger: |
  Thread timing matters more than single-tweet timing because threads need
  sustained engagement over 5-10 minutes of reading time. The first 30-90
  minutes after posting determine whether the algorithm amplifies your thread.

  You're advising 3 different thread creators:

  Creator 1 — Tech founder (US West Coast)
  - Audience: Other founders, VCs, engineers (80% US, 15% Europe, 5% Asia)
  - Thread style: Educational, building-in-public
  - Posting capacity: 3 threads per week

  Creator 2 — Finance educator (UK-based)
  - Audience: Retail investors, finance professionals (50% UK/EU, 40% US, 10% global)
  - Thread style: Data-driven market analysis, explainers
  - Posting capacity: 2 threads per week

  Creator 3 — Marketing consultant (Singapore)
  - Audience: Global marketers, startup teams (30% Asia, 35% US, 25% EU, 10% other)
  - Thread style: Case studies, marketing frameworks
  - Posting capacity: 4 threads per week

  For each creator:
  - Recommended posting days and times (in their local timezone)
  - Why these times work for their specific audience
  - "Golden 30 minutes" strategy — exactly what to do in the first 30 min:
    a) How to seed initial engagement
    b) How to respond to early replies
    c) Whether to quote-tweet their own thread
  - How to adapt if analytics show different patterns
  - Should they post all at once or drip-tweet the thread?

assertions:
  - type: llm_judge
    criteria: "Timing recommendations account for audience time zones — the Singapore creator needs to balance Asia-Pacific mornings with US evenings, the UK creator targets European mornings and US mornings"
    weight: 0.25
    description: "Time-zone-aware recommendations"
  - type: llm_judge
    criteria: "The golden 30 minutes strategy is specific — not just 'engage with replies' but tactical actions like responding to every comment, asking follow-up questions, and sharing the thread in DMs to superfans"
    weight: 0.25
    description: "Specific golden 30 minutes strategy"
  - type: llm_judge
    criteria: "The all-at-once vs drip-tweet recommendation is well-reasoned — explains that posting all at once is generally better for threads (readers want the full content) with exceptions for very long threads"
    weight: 0.25
    description: "Well-reasoned posting method recommendation"
  - type: llm_judge
    criteria: "Wednesday-Thursday are recommended as peak days with Tuesday as secondary, and the reasoning ties back to platform data (mid-week professional engagement patterns)"
    weight: 0.25
    description: "Data-backed peak day recommendations"
