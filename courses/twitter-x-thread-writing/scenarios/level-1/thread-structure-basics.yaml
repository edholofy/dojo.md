meta:
  id: thread-structure-basics
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Learn basic thread structure — opening, body, and closing patterns"
  tags: [twitter, structure, formatting, pacing, fundamentals]

state: {}

trigger: |
  A well-structured thread has three parts: hook, body, and closer. The
  body should alternate between short and long tweets for rhythm, and
  each tweet should contain exactly one clear point.

  Write a complete 8-tweet thread on this topic:

  "5 mistakes that kill your first 90 days at a new job"

  Author: Career coach with 15 years in tech recruiting
  Audience: Mid-career professionals, job changers

  Requirements:
  - Tweet 1: Hook (use a credibility + curiosity formula)
  - Tweets 2-6: One mistake per tweet, each with:
    - The mistake (bolded or caps for emphasis)
    - Why people make it (1 sentence)
    - What to do instead (1 sentence)
  - Tweet 7: Bonus insight or the overarching lesson
  - Tweet 8: CTA (drive engagement — reply, retweet, follow)

  Also:
  - Number each tweet (1/8, 2/8, etc.)
  - Note which tweets should have images/screenshots and what they'd show
  - Explain the pacing — why certain tweets are short vs long
  - Show where you'd add line breaks within tweets for readability

assertions:
  - type: llm_judge
    criteria: "The thread reads smoothly from start to finish — transitions between tweets feel natural, not jarring. Each tweet stands alone but also flows as part of the larger narrative"
    weight: 0.30
    description: "Smooth flowing thread narrative"
  - type: llm_judge
    criteria: "Each mistake tweet has a clear, consistent structure — the mistake is immediately identifiable, the reason is empathetic, and the alternative is actionable"
    weight: 0.25
    description: "Clear consistent mistake-tweet structure"
  - type: llm_judge
    criteria: "The pacing explanation demonstrates understanding — short tweets create emphasis and breathing room, long tweets deliver the substance, and the rhythm keeps readers scrolling"
    weight: 0.25
    description: "Understanding-demonstrating pacing explanation"
  - type: llm_judge
    criteria: "The CTA in the closing tweet is specific and natural — not just 'Follow me for more' but a question or invitation that relates to the thread topic and encourages replies"
    weight: 0.20
    description: "Specific natural closing CTA"
