meta:
  id: storytelling-thread
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Write a personal storytelling thread that drives emotional engagement"
  tags: [twitter, storytelling, narrative, emotional, personal-brand]

state: {}

trigger: |
  Storytelling threads drive the most replies and retweets because they
  create emotional connection. The key is narrative tension — each tweet
  should make the reader NEED to know what happens next.

  Write a complete storytelling thread:

  Story: "How I got rejected from 47 jobs, then accidentally landed my
  dream role"
  Author: Product designer, now at a top tech company
  Real details to weave in:
  - Applied to 47 companies over 6 months after a layoff
  - Got 3 interviews, all rejections
  - Started a side project (a design tool) out of frustration
  - The side project went viral on Twitter
  - A VP of Design at a major company DM'd after seeing the project
  - Got hired without a formal interview

  Requirements:
  - 10-12 tweets
  - Use narrative tension (cliffhangers between tweets)
  - Include emotional beats: frustration, despair, unexpected hope, triumph
  - The lesson should emerge naturally, not feel tacked on
  - Make it feel like talking to a friend, not writing an essay

  Then explain:
  - How narrative tension works in threads (each tweet is a mini-cliffhanger)
  - The emotional arc template: Status quo → Disruption → Struggle → Turn → Resolution
  - Why first-person ("I") generates 23% more engagement than third-person
  - How to end a story thread without being preachy

assertions:
  - type: llm_judge
    criteria: "The thread creates genuine narrative tension — each tweet ends in a way that makes you need to read the next one. The story unfolds naturally with reveals timed for maximum impact"
    weight: 0.30
    description: "Genuine narrative tension throughout"
  - type: llm_judge
    criteria: "The emotional arc is well-crafted — the frustration of 47 rejections feels real, the despair is palpable, and the accidental success feels earned rather than lucky"
    weight: 0.25
    description: "Well-crafted emotional arc"
  - type: llm_judge
    criteria: "The tone is conversational and authentic — reads like a friend telling a story over coffee, not a polished LinkedIn post or a motivational speech"
    weight: 0.25
    description: "Conversational authentic storytelling tone"
  - type: llm_judge
    criteria: "The lesson emerges naturally from the story — it's not 'moral of the story: never give up' but a nuanced insight about building in public, luck, and preparation meeting opportunity"
    weight: 0.20
    description: "Naturally emerging nuanced lesson"
