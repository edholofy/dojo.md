meta:
  id: hook-tweet-writing
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Write compelling hook tweets that make people click 'Show this thread'"
  tags: [twitter, hooks, first-tweet, attention, fundamentals]

state: {}

trigger: |
  The hook tweet determines whether anyone reads your thread. You have
  2-3 seconds to convince someone to click "Show this thread."

  Write hook tweets for these 6 thread topics. For each, write 3 different
  hook variations using different formulas:

  Topic 1: How to negotiate a salary increase
  Topic 2: Lessons from building a startup that failed
  Topic 3: Why most productivity advice is wrong
  Topic 4: 7 tools that changed how I work
  Topic 5: The hiring mistake that cost my company $500K
  Topic 6: What I learned reading 50 business books this year

  Hook formulas to use (rotate through all 6):
  - Credibility hook: "After [experience]..." / "I've [done X]..."
  - Curiosity gap: "Here's what nobody tells you about..."
  - Bold statement: "Everything you know about X is wrong"
  - Specific promise: "Here's exactly how I [achieved result]"
  - Surprising stat: "[Number]% of people make this mistake"
  - Story opener: "Last year, I [dramatic event]..."

  For each hook tweet:
  - Keep it under 280 characters
  - Explain why this hook works for this topic
  - Rate its "scroll-stopping power" (1-10) and explain why

assertions:
  - type: llm_judge
    criteria: "All 18 hook tweets are genuinely different — each uses its formula distinctly, not just swapping in keywords. The hooks create real curiosity or urgency that would make someone stop scrolling"
    weight: 0.30
    description: "Genuinely different scroll-stopping hooks"
  - type: llm_judge
    criteria: "The hook formulas are correctly applied — credibility hooks establish authority, curiosity gaps open loops, bold statements are provocative, and story openers are dramatic"
    weight: 0.25
    description: "Correctly applied hook formulas"
  - type: llm_judge
    criteria: "The explanations show understanding of why hooks work — they reference psychological triggers (curiosity, fear of missing out, social proof) not just 'this sounds good'"
    weight: 0.25
    description: "Psychology-grounded hook explanations"
  - type: llm_judge
    criteria: "The scroll-stopping ratings are calibrated realistically — not all hooks are rated 9-10, and lower-rated hooks have honest explanations of what makes them weaker"
    weight: 0.20
    description: "Realistically calibrated scroll-stopping ratings"
