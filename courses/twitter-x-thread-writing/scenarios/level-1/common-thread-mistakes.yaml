meta:
  id: common-thread-mistakes
  level: 1
  course: twitter-x-thread-writing
  type: output
  description: "Identify and fix common thread writing mistakes"
  tags: [twitter, mistakes, diagnosis, improvement, fundamentals]

state: {}

trigger: |
  Here are 5 poorly written threads. Diagnose what's wrong with each and
  rewrite the problem tweets to fix them.

  Thread 1 (weak hook):
  Tweet 1: "A thread about marketing tips."
  Tweet 2: "Tip 1: Know your audience."
  Tweet 3: "Tip 2: Be consistent."

  Thread 2 (cramming):
  Tweet 1: "Here's everything I know about fundraising: find the right
  investors, prepare your pitch deck with clear financials and a strong
  team slide, practice your delivery, follow up within 48 hours, negotiate
  terms carefully, and don't take the first offer."

  Thread 3 (no value):
  Tweet 1: "I just raised $5M for my startup!"
  Tweet 2: "It was really hard work."
  Tweet 3: "The team is amazing."
  Tweet 4: "So grateful for this opportunity!"
  Tweet 5: "Follow me for more startup content."

  Thread 4 (wall of text):
  Tweet 1: "After spending three years building products in the AI space I have
  come to realize that most people fundamentally misunderstand what artificial
  intelligence can and cannot do and this has led to a massive disconnect
  between expectations and reality especially in the enterprise software market"

  Thread 5 (bait and switch):
  Tweet 1: "The #1 secret to making $100K/month online (this changed everything):"
  Tweet 2: "Buy my course to find out! Link in bio."

  For each thread:
  - Identify all mistakes (be specific)
  - Explain why each mistake kills engagement
  - Rewrite the problematic tweets to fix them
  - Rate the original vs rewritten version (engagement prediction)

assertions:
  - type: llm_judge
    criteria: "The diagnosis is specific and thorough — identifies the exact mistake pattern in each thread (generic hook, information cramming, no value delivery, poor formatting, bait-and-switch) with clear explanations"
    weight: 0.30
    description: "Specific thorough mistake diagnosis"
  - type: llm_judge
    criteria: "The rewrites are dramatically better — each fixed version follows best practices (strong hooks, one point per tweet, value delivery, proper formatting) and would clearly outperform the original"
    weight: 0.30
    description: "Dramatically improved rewrites"
  - type: llm_judge
    criteria: "The explanations teach the principle — for each mistake, the explanation goes beyond 'this is bad' to explain WHY it kills engagement (algorithm signals, reader psychology, trust erosion)"
    weight: 0.25
    description: "Principle-teaching explanations"
  - type: llm_judge
    criteria: "The engagement predictions are realistic — doesn't promise viral results but explains the relative improvement expected from fixing each mistake"
    weight: 0.15
    description: "Realistic engagement improvement predictions"
