meta:
  id: thread-formatting-advanced
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Master advanced formatting techniques for maximum readability"
  tags: [twitter, formatting, readability, whitespace, emphasis]

state: {}

trigger: |
  Formatting is the difference between a thread that gets read and one
  that gets scrolled past. Twitter/X supports limited formatting, but
  creative use of line breaks, caps, symbols, and structure can make
  threads dramatically more readable.

  Take this raw, unformatted thread content and format it for maximum
  readability on Twitter/X:

  Raw content (each bullet = one tweet):
  1. After helping 200+ founders raise their first round, I noticed that
  the best pitches all share 5 specific patterns that most founders miss
  2. Pattern 1 is that great pitches start with the customer's problem not
  the product solution. Most founders lead with "we built X" when they
  should lead with "customers struggle with Y"
  3. Pattern 2 is that successful pitchers use specific numbers instead of
  vague claims. Don't say "huge market" when you can say "$47B market
  growing 23% annually"
  4. Pattern 3 is the demo moment. The best pitches include a 30-second live
  demonstration that makes the investor go "oh wow, that's clever"
  5. Pattern 4 is the competitive moat explanation. Not "we have no
  competition" but "here's why this is hard to replicate even if
  someone tries"
  6. Pattern 5 is the ask clarity. Tell investors exactly how much you're
  raising, what you'll do with it, and what milestones you'll hit
  7. The meta pattern across all 5 is specificity. Vague pitches get vague
  responses. Specific pitches get specific term sheets.

  For each tweet:
  - Apply formatting (line breaks, caps, symbols, numbering)
  - Show before and after versions side by side
  - Explain each formatting choice

  Also provide:
  - A formatting cheat sheet (10 formatting techniques for Twitter/X)
  - Common formatting mistakes (wall of text, over-formatting, emoji abuse)
  - How formatting differs for mobile vs desktop readers

assertions:
  - type: llm_judge
    criteria: "The reformatted tweets are dramatically more readable — proper line breaks create scannable structure, emphasis highlights key points, and white space prevents wall-of-text fatigue"
    weight: 0.30
    description: "Dramatically improved readability formatting"
  - type: llm_judge
    criteria: "The formatting cheat sheet covers practical techniques — line breaks for emphasis, ALL CAPS for key words (sparingly), numbered lists, arrow symbols, dash separators, and tweet-within-tweet quoting"
    weight: 0.25
    description: "Practical formatting techniques cheat sheet"
  - type: llm_judge
    criteria: "The before/after comparisons clearly show the improvement — each formatting choice is explained in terms of readability impact, not just aesthetic preference"
    weight: 0.25
    description: "Clear before/after formatting comparisons"
  - type: llm_judge
    criteria: "The mobile vs desktop explanation is practical — notes that 80%+ of Twitter users are on mobile, line breaks matter more on smaller screens, and long words can break awkwardly"
    weight: 0.20
    description: "Practical mobile vs desktop formatting guidance"
