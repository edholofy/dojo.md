meta:
  id: engagement-reply-strategy
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Manage thread replies and build conversations for algorithmic boost"
  tags: [twitter, replies, conversations, algorithm, engagement-strategy]

state: {}

trigger: |
  On Twitter/X, a reply that gets an author reply back is worth 75x a like
  in algorithm weight. The most successful thread creators don't just post
  threads — they actively build conversations in the replies.

  You just posted a thread about "Why I left my $300K/year job to start a
  company." It's gaining traction: 400 likes, 60 replies in the first 2 hours.

  Here are 8 actual replies. Write your response to each and explain your
  strategy:

  Reply 1 (supportive): "This is so inspiring! Following your journey now."
  Reply 2 (questioning): "What about your family? Did they support this decision?"
  Reply 3 (hostile): "Easy to quit a $300K job when you probably have $500K saved."
  Reply 4 (value-add): "I did something similar. The hardest part was the
  identity shift from 'employee' to 'founder.'"
  Reply 5 (snarky): "Another 'I quit my cushy job' story. Very original."
  Reply 6 (asking for advice): "I'm in a similar situation. How did you know
  when it was the right time to leave?"
  Reply 7 (disagree): "You could have started the company while keeping
  your job. Why risk everything?"
  Reply 8 (spam/self-promo): "Great thread! Check out my course on
  entrepreneurship — link in bio!"

  For each response:
  - Write your reply (keep it conversational, 1-3 sentences)
  - Explain the strategy behind your response
  - Rate priority (which replies to respond to first for max algorithm impact)

  Also explain:
  - The "reply waterfall" technique (how replying to one person encourages others)
  - When to reply vs when to let a reply stand
  - How to handle hostile replies without escalating
  - The 30-minute reply blitz: what to do immediately after posting

assertions:
  - type: llm_judge
    criteria: "The replies are conversational and human — not corporate or defensive. The hostile reply response is calm and confident, the advice-seeker response is genuinely helpful, the supportive reply response is warm but brief"
    weight: 0.30
    description: "Conversational human reply responses"
  - type: llm_judge
    criteria: "The prioritization strategy is algorithmically sound — prioritizes replying to thoughtful comments (value-add, questions, disagreements) over simple supportive comments, with clear reasoning about the 75x algorithm weight"
    weight: 0.25
    description: "Algorithmically sound reply prioritization"
  - type: llm_judge
    criteria: "The hostile reply handling is mature — doesn't ignore, doesn't attack back, but addresses the valid concern (privilege) while redirecting to the substance of the thread"
    weight: 0.25
    description: "Mature hostile reply handling"
  - type: llm_judge
    criteria: "The reply waterfall technique is well-explained — shows how strategic early replies encourage more people to comment, creating a virtuous cycle of engagement"
    weight: 0.20
    description: "Well-explained reply waterfall technique"
