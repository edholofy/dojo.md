meta:
  id: curated-list-thread
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Write a curated list thread that becomes a go-to resource"
  tags: [twitter, curated-list, resources, tools, bookmarks]

state: {}

trigger: |
  Curated list threads ("10 tools that..." / "7 books that..." / "5 resources
  for...") are the most bookmarked thread type. They work because they
  save people research time.

  Write a complete curated list thread:

  Topic: "9 free tools I use to run my entire business (saving $2,000/month)"
  Author: Solopreneur running a $15K/month consulting business

  Requirements:
  - 12 tweets total (hook + 9 tools + summary + CTA)
  - For each tool:
    - Name and what it does (1 sentence)
    - How the author specifically uses it (personal context, not generic)
    - What it replaces (the paid alternative and its cost)
  - Tools should span: project management, design, writing, analytics,
    communication, automation, finance, scheduling, email
  - Include the total savings calculation in the closing tweet

  Then explain:
  - Why curated lists outperform other thread types for bookmarks
  - The "personal context" principle — why "I use X for Y" outperforms
    "X is a tool that does Y"
  - How to avoid sounding like a paid promotion
  - The "listicle trap" — when curated threads feel lazy vs valuable
  - How to refresh and re-post list threads every 3-6 months

assertions:
  - type: llm_judge
    criteria: "Each tool recommendation includes specific personal context — not just 'Notion is a project management tool' but how the solopreneur specifically uses it in their workflow"
    weight: 0.30
    description: "Specific personal context per tool"
  - type: llm_judge
    criteria: "The tools are genuinely free and useful — not outdated recommendations or tools with misleading 'free' tiers that require payment for basic features"
    weight: 0.25
    description: "Genuinely free and useful tools"
  - type: llm_judge
    criteria: "The savings calculation is specific and credible — breaks down what each paid alternative costs and totals to approximately $2,000/month with reasonable estimates"
    weight: 0.25
    description: "Specific credible savings calculation"
  - type: llm_judge
    criteria: "The thread doesn't feel like a sponsored post — the tone is peer recommendation, not product review, and the author's genuine experience comes through"
    weight: 0.20
    description: "Authentic peer recommendation tone"
