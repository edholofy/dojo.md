meta:
  id: contrarian-thread
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Write a contrarian hot-take thread that sparks debate without being inflammatory"
  tags: [twitter, contrarian, hot-take, debate, engagement]

state: {}

trigger: |
  Contrarian threads drive the most quote-tweets and replies because they
  challenge beliefs. But there's a fine line between "thought-provoking"
  and "engagement bait."

  Write a complete contrarian thread on this topic:
  "Why hustle culture is actually holding back your career"

  Author: CEO who built a $20M company working 40-hour weeks
  Audience: Ambitious professionals, startup founders, career-driven people

  Requirements:
  - 10 tweets
  - Hook: Bold opening statement that challenges the hustle narrative
  - Present 5 contrarian arguments, each backed by evidence or personal experience
  - Acknowledge the strongest counterargument (steel-man the opposition)
  - Close with a nuanced position (not "hustle = bad" but a more sophisticated take)

  Then provide:
  - The difference between contrarian and inflammatory content
  - How to steel-man the opposition (and why this increases credibility)
  - Engagement prediction: which tweets will generate the most replies and why
  - How to manage the comment section when people strongly disagree
  - Warning signs that a contrarian thread has crossed into "rage bait"

assertions:
  - type: llm_judge
    criteria: "The contrarian arguments are substantive — backed by logic, evidence, or experience, not just provocative for provocation's sake. Each point could genuinely change someone's mind"
    weight: 0.30
    description: "Substantive evidence-backed contrarian arguments"
  - type: llm_judge
    criteria: "The opposition is steel-manned fairly — the thread acknowledges that hustle culture has real benefits in specific contexts, showing intellectual honesty rather than one-sided takedowns"
    weight: 0.25
    description: "Fairly steel-manned opposition"
  - type: llm_judge
    criteria: "The closing tweet lands on a nuanced position — not binary 'hustle bad' but a sophisticated synthesis that respects complexity and leaves room for reader interpretation"
    weight: 0.25
    description: "Nuanced sophisticated closing position"
  - type: llm_judge
    criteria: "The engagement management advice is practical — how to respond to strong disagreements without backing down or escalating, turning debate into constructive conversation"
    weight: 0.20
    description: "Practical engagement management advice"
