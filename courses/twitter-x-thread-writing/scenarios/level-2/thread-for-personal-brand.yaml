meta:
  id: thread-for-personal-brand
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Build a personal brand through consistent thread topics and positioning"
  tags: [twitter, personal-brand, positioning, consistency, authority]

state: {}

trigger: |
  Threads are the fastest way to build authority on Twitter/X. But random
  threads about different topics don't build a brand — you need consistent
  content pillars.

  Creator Profile:
  - Name: Alex Chen, senior data scientist at a fintech company
  - Goal: Become known as "the person to follow for practical ML engineering"
  - Current: 2,400 followers, posts sporadically, no consistent themes
  - Strengths: Deep technical skills, good at explaining complex concepts,
    has built ML systems processing $1B+ in transactions

  Design Alex's thread-based personal brand strategy:

  1. Define 3 content pillars with thread topics for each:
     - Pillar 1: [technical expertise area] — 5 thread ideas
     - Pillar 2: [career/industry perspective] — 5 thread ideas
     - Pillar 3: [behind-the-scenes/personal] — 5 thread ideas

  2. Write the "signature thread" — the one thread that defines Alex's brand:
     - Full 10-tweet thread that showcases expertise and personality
     - This thread should be pin-worthy (goes in the pinned tweet spot)

  3. Create a 4-week thread calendar:
     - Which pillar on which day
     - How threads build on each other over time
     - How to balance technical depth with accessibility

  4. Profile optimization for the thread strategy:
     - Headline rewrite
     - Bio rewrite
     - Pinned tweet strategy

assertions:
  - type: llm_judge
    criteria: "The 3 content pillars are specific and ownable — not generic topics like 'machine learning' but narrow enough that Alex could become the go-to person (e.g., 'ML in production at scale' vs 'how to learn ML')"
    weight: 0.25
    description: "Specific ownable content pillars"
  - type: llm_judge
    criteria: "The signature thread showcases both expertise and personality — it demonstrates deep ML engineering knowledge while being accessible to non-experts and revealing Alex's unique perspective"
    weight: 0.30
    description: "Expertise-and-personality signature thread"
  - type: llm_judge
    criteria: "The 4-week calendar balances the 3 pillars — technical threads are interspersed with personal/career threads to avoid being one-dimensional, and threads reference each other"
    weight: 0.25
    description: "Balanced pillar-rotating calendar"
  - type: llm_judge
    criteria: "The profile optimization aligns with the thread strategy — the headline and bio reinforce the content pillars and give visitors a clear reason to follow"
    weight: 0.20
    description: "Strategy-aligned profile optimization"
