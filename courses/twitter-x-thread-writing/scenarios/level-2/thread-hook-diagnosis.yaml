meta:
  id: thread-hook-diagnosis
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Diagnose why threads underperform and fix the hook"
  tags: [twitter, diagnosis, hooks, underperformance, optimization]

state: {}

trigger: |
  A tech creator with 15,000 followers posted 5 threads last month. All
  underperformed expectations. Diagnose why and fix each one.

  Thread 1 (92 likes, expected 500+):
  Hook: "Some thoughts on building products in 2026."
  Topic: How AI changes product development
  Thread was 8 tweets of good insights

  Thread 2 (145 likes, expected 400+):
  Hook: "I've been thinking a lot about hiring lately. Thread incoming 🧵"
  Topic: Hiring mistakes that cost the company money
  Thread was 10 tweets with specific dollar amounts and stories

  Thread 3 (210 likes, expected 600+):
  Hook: "Hot take: startups don't need product managers."
  Topic: Why early-stage startups should skip the PM role
  Thread was 7 tweets but the argument was weak after the hook

  Thread 4 (78 likes, expected 300+):
  Hook: "Let me tell you about the time I almost lost everything.
  This happened back in 2019 when I was running my second startup.
  We had just raised our Series A and things were looking good until..."
  Topic: A near-death startup experience
  Thread was 12 tweets, very detailed

  Thread 5 (320 likes, expected 500+):
  Hook: "10 lessons from scaling a team from 5 to 50 people."
  Topic: Leadership lessons from rapid growth
  Thread was 12 tweets, solid content

  For each thread:
  1. Diagnose the specific hook problem
  2. Rewrite the hook tweet
  3. Identify any structural issues beyond the hook
  4. Predict the rewritten version's performance improvement
  5. Rank the 5 threads by potential (which has the best underlying content)

assertions:
  - type: llm_judge
    criteria: "The diagnoses are specific and different — Thread 1's problem is a generic opener, Thread 4's problem is a hook that's too long, Thread 3's problem is a strong hook with weak follow-through, each with distinct fixes"
    weight: 0.30
    description: "Specific differentiated diagnoses"
  - type: llm_judge
    criteria: "The rewritten hooks are dramatically stronger — each follows a proven formula and creates immediate curiosity or urgency that the original lacked"
    weight: 0.30
    description: "Dramatically stronger rewritten hooks"
  - type: llm_judge
    criteria: "The structural analysis goes beyond hooks — identifies issues like Thread 3's bait-and-switch problem (strong hook, weak argument) and Thread 4's over-length"
    weight: 0.25
    description: "Beyond-hooks structural analysis"
  - type: llm_judge
    criteria: "The ranking of threads by potential is well-reasoned — considers both content quality and audience appeal, not just which hook is best"
    weight: 0.15
    description: "Well-reasoned potential ranking"
