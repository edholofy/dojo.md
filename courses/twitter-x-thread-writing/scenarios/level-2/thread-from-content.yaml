meta:
  id: thread-from-content
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Transform long-form content into engaging Twitter/X threads"
  tags: [twitter, repurposing, blog-to-thread, content-transformation]

state: {}

trigger: |
  Most great threads start as blog posts, newsletters, or presentations.
  The skill is extracting the thread-worthy parts and restructuring them
  for Twitter's format.

  Transform this blog post excerpt into a Twitter/X thread:

  Blog post: "The Death of the Traditional Sales Funnel" (1,200 words)

  "The traditional sales funnel is a relic of a pre-internet era. It assumes
  buyers move linearly from awareness to consideration to decision, guided by
  a salesperson at each stage. But modern B2B buyers complete 70% of their
  journey before ever talking to sales. They read reviews, compare alternatives,
  and form opinions through peer recommendations — all without entering your
  'funnel.' We need a new model.

  Instead of a funnel, think of it as a network. Buyers don't move linearly —
  they bounce between research, social proof, and peer conversations. A CMO
  might see a LinkedIn post about your product, mention it to their VP of
  Marketing at lunch, who then Googles you, reads a G2 review, and circles
  back to the CMO. None of this touches your 'funnel.'

  The implications are massive. First, content marketing needs to be
  ungated — stop hiding your best content behind forms. Second, your
  existing customers are your best salespeople — invest in customer
  marketing. Third, measure influence, not just attribution — the LinkedIn
  post that started the conversation will never show up in your attribution
  model. Fourth, sales enablement needs to shift from 'qualifying leads'
  to 'entering conversations already in progress.' The companies that
  understand this will win the next decade."

  Deliverables:
  1. A complete 8-tweet thread extracted from this blog post
  2. Explain what you kept, cut, and why (not everything blog-worthy is thread-worthy)
  3. Write an alternative hook tweet (the blog intro is NOT a good thread hook)
  4. Explain the "blog-to-thread" transformation framework:
     - What to extract (insights, data, frameworks)
     - What to cut (transitions, caveats, filler)
     - How to restructure for tweet-by-tweet reading
     - How to add thread-native elements (questions, visuals, CTAs)

assertions:
  - type: llm_judge
    criteria: "The thread captures the blog's key insights without feeling like a copy-paste — it restructures the content for Twitter's format with punchy tweets, not just paragraphs split across tweets"
    weight: 0.30
    description: "Restructured not copy-pasted thread"
  - type: llm_judge
    criteria: "The cutting decisions are well-explained — identifies that blog transitions, hedging language, and detailed caveats should be removed, while the core insights and provocative claims are kept"
    weight: 0.25
    description: "Well-explained cutting decisions"
  - type: llm_judge
    criteria: "The alternative hook is dramatically better than the blog intro — creates curiosity and urgency rather than slowly introducing the concept"
    weight: 0.25
    description: "Dramatically improved alternative hook"
  - type: llm_judge
    criteria: "The transformation framework is reusable — someone could apply it to any blog post to create a thread, with clear principles for extraction, restructuring, and adding thread-native elements"
    weight: 0.20
    description: "Reusable transformation framework"
