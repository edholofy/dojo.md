meta:
  id: poll-thread-combo
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Combine polls with threads for maximum algorithmic boost"
  tags: [twitter, polls, threads, algorithm, engagement-combo]

state: {}

trigger: |
  Polls get the highest raw impressions on Twitter/X, and threads get the
  deepest engagement. Combining them creates a powerful 1-2 punch.

  Design 3 different poll + thread combinations:

  Combo 1 — Poll-first approach:
  - Topic: "Is remote work better for productivity?"
  - Write the poll tweet (4 options, engaging question)
  - Write a 6-tweet follow-up thread posted 24 hours later revealing
    insights from the poll results
  - Explain the timing and why delayed follow-up works

  Combo 2 — Thread-first approach:
  - Topic: "5 pricing mistakes SaaS founders make"
  - Write a 7-tweet educational thread
  - End with a poll as the CTA tweet: "Which mistake have you made?"
  - Explain why polls as CTAs drive more engagement than text CTAs

  Combo 3 — Poll-within-thread approach:
  - Topic: "The debate about 4-day work weeks"
  - Write a 5-tweet thread with a poll embedded as tweet 3
  - The poll creates a mid-thread engagement boost
  - Explain how mid-thread polls prevent drop-off

  For each combo:
  - Full tweet/thread content
  - Algorithm rationale (how each engagement type compounds)
  - Expected performance vs thread-only or poll-only

assertions:
  - type: llm_judge
    criteria: "All 3 combinations are structurally different — poll-first, thread-first, and poll-within-thread each serve a different purpose and the rationale for each approach is clear"
    weight: 0.30
    description: "Structurally different poll-thread combinations"
  - type: llm_judge
    criteria: "The poll questions are genuinely engaging — not yes/no with obvious answers but questions where each option is defensible and people would want to see how others voted"
    weight: 0.25
    description: "Genuinely engaging poll questions"
  - type: llm_judge
    criteria: "The algorithm rationale explains compounding — polls drive impressions, threads drive dwell time and replies, and combining them creates multiple algorithm signals that amplify each other"
    weight: 0.25
    description: "Compounding algorithm rationale"
  - type: llm_judge
    criteria: "The poll-within-thread approach includes a practical explanation of how mid-thread polls prevent the tweet 4-5 drop-off by creating an interactive engagement moment"
    weight: 0.20
    description: "Practical mid-thread poll drop-off prevention"
