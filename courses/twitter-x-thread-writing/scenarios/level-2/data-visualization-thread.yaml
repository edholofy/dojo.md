meta:
  id: data-visualization-thread
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Write a data-driven thread with charts, stats, and analysis"
  tags: [twitter, data, visualization, analysis, research-thread]

state: {}

trigger: |
  Data threads get the highest share rates because people love forwarding
  interesting statistics. But raw numbers are boring — the insight matters
  more than the data.

  Write a complete data-driven thread:

  Topic: "I analyzed 1,000 SaaS companies. Here's what separates the
  top 10% from everyone else."

  Author: SaaS analyst with access to public financial data
  Data points to include (you construct the narrative around these):
  - Top 10% grow revenue 3x faster than average
  - They spend 40% less on customer acquisition
  - Net revenue retention: top 10% average 130% vs 95% for rest
  - Customer onboarding time: top 10% average 3 days vs 14 days
  - Top 10% have 2x the number of integrations
  - Support response time: top 10% average 2 hours vs 24 hours
  - Top 10% ship features 4x faster

  Requirements:
  - 12 tweets
  - Hook: Establish the analysis scope (1,000 companies creates credibility)
  - Present each finding with context (what it means, not just the number)
  - Describe a chart/visualization for 4 of the data points
  - Draw actionable conclusions from the patterns
  - Close with the #1 takeaway and a CTA

  Then explain:
  - How to make data threads shareable (insight > numbers)
  - The "so what?" test for every data point
  - How to cite sources without cluttering tweets
  - Why hand-drawn charts outperform polished ones on Twitter/X

assertions:
  - type: llm_judge
    criteria: "Each data point is presented with insight, not just numbers — the thread explains WHY top SaaS companies have these metrics, creating a narrative that connects the dots across findings"
    weight: 0.30
    description: "Insight-driven data presentation"
  - type: llm_judge
    criteria: "The chart descriptions are specific and would create compelling visuals — bar charts, scatter plots, or comparisons that make the gap between top 10% and average viscerally clear"
    weight: 0.25
    description: "Specific compelling chart descriptions"
  - type: llm_judge
    criteria: "The thread builds to a cohesive thesis — the individual data points aren't random but tell a story about what drives SaaS excellence (customer obsession, speed, integration)"
    weight: 0.25
    description: "Cohesive data-driven thesis"
  - type: llm_judge
    criteria: "The 'so what?' test explanation is practical — shows how to transform a boring stat ('NRR is 130%') into an insight ('this means they make more money from existing customers than they lose')"
    weight: 0.20
    description: "Practical so-what test explanation"
