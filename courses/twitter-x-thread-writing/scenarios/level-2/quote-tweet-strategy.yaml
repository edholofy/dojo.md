meta:
  id: quote-tweet-strategy
  level: 2
  course: twitter-x-thread-writing
  type: output
  description: "Use quote tweets and retweets strategically to amplify threads"
  tags: [twitter, quote-tweets, amplification, self-promotion, distribution]

state: {}

trigger: |
  Quote tweets (QTs) are worth 20x a like in the algorithm. Knowing how to
  quote-tweet your own threads and others' content strategically can
  dramatically increase your reach.

  You've just posted a thread about "Why most product roadmaps fail."
  It's getting decent engagement (200 likes, 30 replies after 4 hours).

  Design a quote-tweet amplification strategy:

  1. Self-QT strategy (quoting your own thread):
     - Write 3 different quote tweets of your own thread:
       a) 4 hours after posting: Highlight a key insight from the thread
       b) Next day: Share a follow-up thought that adds new value
       c) 3 days later: Reference the thread in context of a trending topic
     - Explain the timing rationale for each
     - When self-QTing helps vs when it looks desperate

  2. Strategic QT of others (building on related content):
     - Write quote tweets responding to these 3 posts from others:
       a) A PM influencer posted: "The best roadmaps are just a list of bets"
       b) A CEO shared: "We threw out our roadmap and revenue grew 40%"
       c) A VC tweeted: "Show me your roadmap and I'll show you your problems"
     - Each QT should add value, reference your thread, and position your expertise
     - How to QT without looking like you're hijacking someone's post

  3. When NOT to quote tweet:
     - Negative attention-seeking QTs
     - QTs that add no value ("THIS!")
     - QTs of controversial takes that could backfire
     - Over-QTing your own content (how many is too many?)

assertions:
  - type: llm_judge
    criteria: "The self-QT strategy is well-timed — each quote tweet adds new value rather than just resharing, with spacing that extends the thread's lifecycle without being spammy"
    weight: 0.25
    description: "Well-timed value-adding self-QTs"
  - type: llm_judge
    criteria: "The QTs of others' posts add genuine value — each builds on the original tweet with a new insight, references the thread naturally, and positions expertise without being self-promotional"
    weight: 0.30
    description: "Genuine value-adding QTs of others"
  - type: llm_judge
    criteria: "The 'when NOT to QT' advice shows maturity — identifies specific anti-patterns (one-word QTs, controversy-baiting, over-QTing) with clear reasoning"
    weight: 0.25
    description: "Mature anti-pattern identification"
  - type: llm_judge
    criteria: "The algorithm impact is explained clearly — QTs create new distribution opportunities because they're shown to both your followers and the original poster's followers"
    weight: 0.20
    description: "Clear algorithm impact explanation"
