meta:
  id: international-thread-strategy
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Build thread authority across international audiences and languages"
  tags: [twitter, international, global, multilingual, localization]

state: {}

trigger: |
  A thought leader wants to build Twitter/X authority across multiple
  regions and potentially multiple languages.

  Creator Profile:
  - Name: Carlos Mendez, Global VP of Engineering at a multinational company
  - Based in: Madrid, Spain
  - Languages: Native Spanish, fluent English, conversational Portuguese
  - Twitter: 15,000 followers (45% US/UK, 30% LatAm, 15% Spain/EU, 10% other)
  - Content: Currently English only, threads about engineering leadership
  - Goal: Become the top voice for engineering leadership in both English and
    Spanish-speaking tech communities

  Design the international thread strategy:

  1. Regional Twitter culture analysis:
     - How Tech Twitter differs: US/UK vs Spain vs Latin America
     - Engagement patterns (threading culture, reply norms, hashtag usage)
     - Content preferences (what resonates in each community)
     - Key influencers and communities in each region

  2. Multilingual approach:
     - Option A: English-only with cultural adaptations
     - Option B: Alternating English and Spanish threads
     - Option C: English primary + Spanish translations
     - Option D: Two separate accounts
     - Recommend the best approach with pros/cons analysis

  3. Content adaptation:
     - Write the same engineering leadership insight as 2 different threads:
       a) English version for US/UK tech audience
       b) Spanish version for LatAm/Spain tech audience
     - Each adapted for cultural context, not just translated
     - Explain the cultural adaptation decisions

  4. Growth strategy per region:
     - How to grow in Spanish-speaking tech Twitter
     - How to leverage English authority to boost Spanish presence
     - Cross-pollination tactics between communities
     - Regional events and Spaces strategy

  5. Operational plan:
     - Weekly schedule for multi-language content
     - When to use AI translation vs human adaptation
     - How to manage engagement in both languages simultaneously

assertions:
  - type: llm_judge
    criteria: "The regional analysis reveals genuine cultural differences — not stereotypes but specific Twitter usage patterns, threading norms, and engagement styles per region"
    weight: 0.25
    description: "Genuine cultural Twitter differences"
  - type: llm_judge
    criteria: "The 2 thread versions demonstrate real localization — the Spanish version adapts cultural references, examples, and tone, not just language. The engineering challenges referenced resonate differently"
    weight: 0.25
    description: "Real cultural localization in threads"
  - type: llm_judge
    criteria: "The multilingual approach recommendation is well-reasoned — weighs algorithm implications, audience expectations, creator capacity, and community norms"
    weight: 0.25
    description: "Well-reasoned multilingual approach"
  - type: llm_judge
    criteria: "The operational plan is sustainable — doesn't assume Carlos can produce double the content, but shows efficient ways to serve both audiences"
    weight: 0.25
    description: "Sustainable multilingual operations plan"
