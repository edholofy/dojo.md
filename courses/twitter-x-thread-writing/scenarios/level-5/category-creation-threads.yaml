meta:
  id: category-creation-threads
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Use threads to create and own a new industry category"
  tags: [twitter, category-creation, market-positioning, pioneer, thought-leadership]

state: {}

trigger: |
  The most powerful use of threads isn't winning existing conversations —
  it's starting new ones. Design a thread-first category creation campaign.

  Company/Person:
  - Name: Ana Torres, CEO of a startup combining behavioral economics with
    pricing software
  - Product doesn't fit into "pricing optimization" (too narrow) or
    "revenue management" (too broad)
  - Proposed category: "Behavioral Pricing Intelligence" (BPI)
  - Company: PriceMinds (Seed stage, 20 employees, $800K ARR)
  - Ana's Twitter: 8,200 followers, threads about pricing and psychology
  - Competitors don't use this terminology

  Design the category creation campaign:

  1. Category definition:
     - Write the "category manifesto" as a thread (12-15 tweets) that defines
       what BPI is, why it matters, and why existing approaches fail
     - Define 5-7 new terms Ana will coin (the category's vocabulary)
     - The "before BPI vs after BPI" narrative

  2. Content sequence for category evangelism:
     - Write 5 threads that progressively build the category:
       a) Problem thread: "Why traditional pricing is broken"
       b) Introduction thread: First mention of BPI as a concept
       c) Framework thread: The BPI maturity model
       d) Proof thread: "How [customer type] used BPI to [outcome]"
       e) Validation thread: "Why analysts are watching BPI"
     - 10-week publishing schedule with rationale

  3. Ecosystem building:
     - How to get other people to start using the term "BPI"
     - Identifying and recruiting "category allies" on Twitter
     - How to make the term spread through academic, analyst, and
       practitioner networks
     - Event strategy (Spaces, webinars) for category momentum

  4. Measurement:
     - How to track category awareness beyond follower count
     - When the term starts appearing in others' tweets
     - Timeline from "one person's term" to "industry-recognized category"

assertions:
  - type: llm_judge
    criteria: "The category manifesto thread is compelling — identifies a real gap in the market, makes readers feel like they've been missing something, and positions BPI as the inevitable next evolution"
    weight: 0.25
    description: "Compelling category manifesto thread"
  - type: llm_judge
    criteria: "The 5 threads follow a narrative arc — problem to introduction to framework to proof to validation, each building on the previous and making the category feel increasingly real"
    weight: 0.25
    description: "Narrative-arc category building threads"
  - type: llm_judge
    criteria: "The coined vocabulary is memorable and natural — terms feel like they belong in business conversation, not forced jargon, and each serves a clear purpose in the category framework"
    weight: 0.25
    description: "Memorable natural category vocabulary"
  - type: llm_judge
    criteria: "The ecosystem strategy is realistic — category creation takes 18+ months, and the plan acknowledges this timeline while providing practical short-term tactics"
    weight: 0.25
    description: "Realistic timeline ecosystem strategy"
