meta:
  id: thread-roi-measurement
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Build a comprehensive ROI framework for Twitter/X thread investment"
  tags: [twitter, roi, measurement, business-impact, attribution]

state: {}

trigger: |
  The hardest question: "Is time spent on Twitter/X threads worth it?"
  Build a measurement framework that connects thread activity to business
  outcomes.

  Context:
  - Company: DataStack (enterprise analytics platform, $25M ARR)
  - The CTO has been writing threads for 9 months, spending 6 hours/week
  - The board wants to know: "Is this worth the CTO's time?"
  - Marketing believes threads drive pipeline but can't prove it
  - CTO's Twitter: 38,000 followers, avg 600 likes per thread

  Build the measurement framework:

  1. Attribution model:
     - Direct: leads who mention Twitter in form submissions
     - Influenced: prospects who follow or engage before entering pipeline
     - Dark social: the "I saw your thread" effect that never shows in analytics
     - Multi-touch model for Twitter touchpoints
     - Write survey/form questions to capture Twitter influence:
       a) Website form: "How did you hear about us?"
       b) Sales discovery: Twitter-specific qualification questions
       c) Post-close: Win/loss attribution questions

  2. Metrics hierarchy:
     - Vanity metrics (likes, impressions) — why they're misleading
     - Leading indicators (DMs from target accounts, speaking invitations,
       media mentions)
     - Lagging indicators (pipeline influenced, deal size impact, win rate)
     - The "authority premium" calculation
     - Design a balanced scorecard: 10 metrics across 4 categories

  3. ROI calculation:
     - CTO time cost: 6 hours/week at loaded rate
     - Content support costs
     - Total annual investment
     - Pipeline influenced (with attribution methodology)
     - Revenue attributable to Twitter threads
     - ROI ratio and payback period
     - Comparison to alternative marketing spend

  4. Board presentation:
     - Write the executive summary (bullet points) that justifies the CTO's
       Twitter investment to the board
     - How to frame qualitative benefits alongside quantitative
     - What to say if ROI is unclear or negative

assertions:
  - type: llm_judge
    criteria: "The attribution model addresses dark social seriously — most thread influence is invisible, and the framework captures this through surveys, sales conversations, and proxy metrics"
    weight: 0.25
    description: "Dark-social-addressing attribution model"
  - type: llm_judge
    criteria: "The ROI calculation uses realistic numbers — CTO time cost, pipeline attribution percentages, and conversion rates that a CFO would find credible"
    weight: 0.25
    description: "CFO-credible ROI calculation"
  - type: llm_judge
    criteria: "The balanced scorecard connects thread metrics to business outcomes — clear chain from engagement to pipeline influence to revenue, with each link measurable"
    weight: 0.25
    description: "Activity-to-outcome balanced scorecard"
  - type: llm_judge
    criteria: "The board presentation is executive-ready — concise, focuses on business impact not social media metrics, honestly addresses attribution limitations while making a compelling case"
    weight: 0.25
    description: "Executive-ready board presentation"
