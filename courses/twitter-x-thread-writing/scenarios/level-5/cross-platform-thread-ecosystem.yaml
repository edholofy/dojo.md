meta:
  id: cross-platform-thread-ecosystem
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Extend Twitter/X thread authority to a multi-platform content ecosystem"
  tags: [twitter, multi-platform, ecosystem, content-strategy, scale]

state: {}

trigger: |
  A Twitter/X thread creator with a strong following wants to build a
  multi-platform ecosystem where Twitter threads are the content engine
  that powers everything else.

  Creator Profile:
  - Name: Marcus Lee, tech industry analyst
  - Twitter: 68,000 followers, avg 1,200 likes per thread
  - Content: Industry analysis, startup breakdowns, tech trend predictions
  - Newsletter: 18,000 subscribers (free, Substack)
  - Revenue: $120K/year (newsletter sponsorships + consulting)
  - Goal: Scale to $400K/year by expanding to other platforms

  Design the multi-platform strategy:

  1. Platform evaluation (rank by ROI for Marcus):
     - LinkedIn (cross-post threads as posts?)
     - YouTube (long-form analysis videos?)
     - Podcast (industry analysis show?)
     - Substack (upgrade to paid tier?)
     - Instagram/TikTok (short-form clips?)
     - Book publishing
     - Recommend a 3-platform stack with Twitter as hub

  2. Content ecosystem architecture:
     - How one core analysis flows through all platforms:
       Map the journey for: "Why Stripe will dominate fintech in 2027"
       - Twitter thread version (write it)
       - LinkedIn adaptation (key differences)
       - YouTube video outline
       - Newsletter deep-dive structure
       - Short-form video script
     - Weekly publishing cadence across platforms

  3. Revenue architecture:
     - How each platform contributes to the $400K goal
     - Revenue streams: sponsorships, paid newsletter, consulting, courses,
       speaking, affiliate
     - The "authority premium" from multi-platform presence
     - 12-month revenue projection by platform

  4. Operational sustainability:
     - Team structure (VA, editor, video producer, etc.)
     - Weekly workflow across all platforms
     - When to delegate vs do personally
     - Burnout prevention for multi-platform creators

  5. Twitter as the hub:
     - How to drive traffic from Twitter to other platforms
     - Write 3 cross-promotion tweets:
       a) Promoting a YouTube video
       b) Teasing a paid newsletter edition
       c) Announcing a podcast episode
     - How to bring non-Twitter audiences back to Twitter

assertions:
  - type: llm_judge
    criteria: "The platform ranking is strategic — considers Marcus's strengths (analytical writing), audience overlap, effort-to-revenue ratio, and synergy with Twitter rather than adding platforms for the sake of it"
    weight: 0.20
    description: "Strategic platform ranking"
  - type: llm_judge
    criteria: "The Stripe analysis thread is genuinely well-written — demonstrates the kind of analytical content Marcus produces, with data points, industry context, and a clear thesis"
    weight: 0.20
    description: "Genuinely well-written analysis thread"
  - type: llm_judge
    criteria: "The revenue architecture is detailed and realistic — the path from $120K to $400K is broken down by stream with reasonable assumptions, showing how multi-platform presence creates compounding revenue"
    weight: 0.20
    description: "Detailed realistic revenue architecture"
  - type: llm_judge
    criteria: "The cross-promotion tweets feel natural — they promote other platforms by leading with value rather than just 'check out my video,' giving Twitter followers a reason to follow elsewhere"
    weight: 0.20
    description: "Natural value-leading cross-promotion"
  - type: llm_judge
    criteria: "The operational plan is sustainable — addresses burnout risk with specific delegation strategies, team recommendations, and efficiency workflows"
    weight: 0.20
    description: "Sustainable operational plan"
