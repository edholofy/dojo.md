meta:
  id: thread-agency-business
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Build a Twitter/X thread writing agency from scratch"
  tags: [twitter, agency, business-model, ghostwriting, operations]

state: {}

trigger: |
  You're building a Twitter/X thread ghostwriting agency. Design the
  complete business — from positioning to operations to scaling.

  Founder Profile:
  - You've been ghostwriting threads for 5 clients for the past year
  - Results: One client grew from 3K to 45K followers, another landed
    a book deal and TED talk through Twitter presence
  - Current revenue: $15K/month (5 clients at $3K each)
  - Goal: Scale to $60K/month within 12 months with a team of 6

  Design the complete agency:

  1. Positioning and services:
     - Agency name, positioning, and differentiator
     - Service tiers with pricing:
       a) Full service (4 threads/week + daily tweets + engagement management)
       b) Thread-only (2 threads/week + strategic guidance)
       c) Strategy + editing (client writes, you optimize)
     - Ideal client profile and industry focus
     - How to differentiate from AI-powered thread tools

  2. Client acquisition:
     - Your own thread strategy (meta: using threads to sell thread services)
     - Write 5 threads that demonstrate expertise:
       a) Case study thread (anonymized client results)
       b) "How I write threads" behind-the-scenes
       c) Industry analysis showing thread expertise
       d) Common thread mistakes (showing you know what doesn't work)
       e) The "anti-AI" thread (why human ghostwriting beats AI)
     - Outreach strategy and referral program

  3. Operations and delivery:
     - Client onboarding: voice discovery, topic ideation, workflow setup
     - Production workflow for 15+ clients simultaneously
     - Quality control: maintaining unique voice per client
     - Team roles: writers, editors, strategists, engagement managers
     - Tool stack for production and analytics

  4. Scaling plan:
     - Month-by-month from $15K to $60K/month
     - Hiring plan and writer training program
     - When to specialize vs stay generalist
     - Unit economics per client tier

  5. Risk management:
     - Client who wants to go viral at any cost
     - Client whose thread gets negative attention
     - Writer turnover and voice continuity
     - AI commoditization defense strategy

assertions:
  - type: llm_judge
    criteria: "The positioning clearly differentiates from AI tools — the agency's value proposition centers on authentic voice capture, strategic judgment, and relationship context that AI cannot replicate"
    weight: 0.20
    description: "AI-differentiated agency positioning"
  - type: llm_judge
    criteria: "The 5 client acquisition threads are meta-effective — they simultaneously demonstrate thread expertise and attract potential clients at different stages of the buyer journey"
    weight: 0.20
    description: "Meta-effective acquisition threads"
  - type: llm_judge
    criteria: "The operations design scales — the workflow handles 15+ clients with a 6-person team, quality control prevents voice blending, and the onboarding process captures voice efficiently"
    weight: 0.20
    description: "Scalable operations design"
  - type: llm_judge
    criteria: "The unit economics are sound — pricing, team costs, and margin projections show a viable path from $15K to $60K/month with realistic client retention"
    weight: 0.20
    description: "Sound unit economics"
  - type: llm_judge
    criteria: "The risk management addresses real scenarios — not hypothetical but practical responses to common agency challenges like voice continuity during writer turnover"
    weight: 0.20
    description: "Real-scenario risk management"
