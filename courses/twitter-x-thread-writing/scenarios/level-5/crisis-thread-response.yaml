meta:
  id: crisis-thread-response
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Navigate a Twitter/X crisis through strategic thread communication"
  tags: [twitter, crisis, reputation, damage-control, communication]

state: {}

trigger: |
  A CEO needs to use Twitter/X threads to address a company crisis that's
  playing out in real-time on the platform.

  Scenario: CloudVault (cloud storage company, 500 employees) experienced
  a 6-hour service outage affecting 100,000 customers. The outage was caused
  by a botched database migration. During the outage:
  - #CloudVaultDown trended for 2 hours
  - Competitors posted thinly-veiled "we never go down" tweets
  - A frustrated customer's angry tweet got 15,000 likes
  - An employee tweeted "this is what happens when you skip QA" (now deleted)
  - Tech journalists are DMing for comment
  - Stock dropped 3% in after-hours trading

  CEO: James Park, 45,000 followers, normally tweets about leadership and product

  Design the complete crisis thread response:

  1. Real-time crisis threads (during the outage):
     - Write the first acknowledgment tweet (within 30 minutes of trending)
     - Write the "we're aware and working on it" thread (3-5 tweets)
     - How to provide updates without over-promising
     - When to tweet vs when to stay quiet during recovery

  2. Post-crisis accountability thread (within 24 hours):
     - Write a complete 12-tweet accountability thread:
       What happened, why, what was done, what's being changed
     - Tone: Accountable, transparent, not defensive
     - Technical detail level (enough for engineers, accessible to customers)
     - How to address the employee's deleted tweet without making it bigger

  3. Recovery thread series (days 2-14):
     - Write 3 follow-up threads:
       a) Day 3: Specific technical improvements implemented
       b) Day 7: Customer impact assessment and remediation
       c) Day 14: Systemic changes and new reliability commitments
     - When to resume normal content

  4. Competitive response:
     - How to handle competitors' opportunistic tweets
     - Should James or anyone respond to competitor shade?
     - Write a thread that reclaims the narrative 30 days later

  5. Employee communication:
     - What to tell employees about public posting during crises
     - How to handle the "deleted tweet" situation internally
     - Social media crisis guidelines for the team

assertions:
  - type: llm_judge
    criteria: "The real-time acknowledgment strikes the right tone — acknowledges the issue immediately, takes ownership, and provides an honest timeline without over-promising a fix"
    weight: 0.25
    description: "Right-toned real-time acknowledgment"
  - type: llm_judge
    criteria: "The accountability thread is specific and honest — explains what went wrong (botched migration), doesn't blame individuals, and commits to specific improvements with timelines"
    weight: 0.25
    description: "Specific honest accountability thread"
  - type: llm_judge
    criteria: "The recovery thread series shows genuine progress — each thread adds new information (technical fixes, customer remediation, systemic changes), not just repeating 'we're sorry'"
    weight: 0.25
    description: "Genuine-progress recovery series"
  - type: llm_judge
    criteria: "The employee communication advice is practical — balances supporting employees' right to post with the need for coordinated messaging during crises, without being authoritarian"
    weight: 0.25
    description: "Practical employee crisis communication"
