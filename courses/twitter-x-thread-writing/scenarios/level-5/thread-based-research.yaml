meta:
  id: thread-based-research
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Use threads as a public research and thinking tool"
  tags: [twitter, research, public-thinking, intellectual-authority, learning-in-public]

state: {}

trigger: |
  Some of the most powerful threads aren't polished takes — they're
  thinking-in-public. Using Twitter as a research notebook builds
  intellectual authority and attracts a high-quality audience.

  Creator: Former academic turned venture capital investor
  Background: PhD in economics, 8 years as a professor, now partner at a
  $200M VC fund focused on fintech
  Twitter: 22,000 followers
  Goal: Use threads as a public research process to develop investable
  theses and attract deal flow

  Design the research-through-threads system:

  1. Research thread types:
     Write 3 complete threads demonstrating different research formats:
     a) "Question thread": Start with an open question and explore it
        in real-time across 10 tweets, arriving at a tentative conclusion
        Topic: "Why are B2B fintech companies achieving profitability
        faster than B2C?"
     b) "Deep dive" thread: Comprehensive analysis of a specific company
        or market, synthesizing public data into a thesis
        Topic: "Analyzing Plaid's competitive position in 2026"
     c) "Counter-thesis" thread: Take a popular investment thesis and
        argue against it, testing the logic publicly
        Topic: "Why 'embedded finance is eating banking' might be wrong"

  2. The research flywheel:
     - How public research attracts quality replies (smart people correct
       and extend your thinking)
     - How thread discussions become investment theses
     - How founders discover you through your research threads
     - How to turn thread research into published essays or reports

  3. Intellectual credibility mechanics:
     - Showing your work (methodology transparency)
     - Admitting when you're wrong and updating publicly
     - The "strong opinions, loosely held" approach in threads
     - How to cite sources in tweets without being pedantic

  4. Deal flow from threads:
     - How research threads attract founders building in the space
     - Write a thread designed to attract founders (without being explicit):
       "What I'm looking for in the next generation of [category] startups"
     - How public thinking differentiates from other VCs

  5. Risk management:
     - When public research reveals competitive insights (what to keep private)
     - Handling corrections from domain experts
     - Securities regulations: what a VC can/cannot say publicly about companies

assertions:
  - type: llm_judge
    criteria: "The 3 research threads demonstrate genuine intellectual depth — the question thread explores uncertainty honestly, the deep dive uses real-world data points, the counter-thesis challenges logic rigorously"
    weight: 0.30
    description: "Genuine intellectual depth in research threads"
  - type: llm_judge
    criteria: "The research flywheel is well-articulated — shows how public research attracts expert replies that improve thinking, which creates better research threads, which attracts more experts"
    weight: 0.25
    description: "Well-articulated research flywheel"
  - type: llm_judge
    criteria: "The deal flow strategy is subtle — the thread designed to attract founders provides genuine market insight and implicitly signals what the VC values, without being a pitch deck in thread form"
    weight: 0.25
    description: "Subtle deal-flow-attracting strategy"
  - type: llm_judge
    criteria: "The risk management section addresses securities regulations seriously — notes that public comments about specific companies could have legal implications for a VC"
    weight: 0.20
    description: "Securities-aware risk management"
