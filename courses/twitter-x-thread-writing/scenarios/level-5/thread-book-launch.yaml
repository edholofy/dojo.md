meta:
  id: thread-book-launch
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Design a complete Twitter/X thread-driven book launch campaign"
  tags: [twitter, book-launch, publishing, campaign, authority]

state: {}

trigger: |
  A Twitter thought leader is publishing a business book and wants to use
  threads as the primary marketing channel.

  Author Profile:
  - Name: Diana Wu, former CRO turned sales strategist
  - Twitter: 55,000 followers, avg 900 likes per thread
  - Book: "The Revenue Architect" — framework for building predictable B2B
    revenue (major publisher)
  - Launch: 3 months away
  - Goal: 5,000+ copies in launch week (bestseller territory)
  - Budget: $8K marketing (modest — relying on organic Twitter)
  - Assets: 3 years of thread content, relationships with 40+ big accounts

  Design the complete thread-driven book launch:

  1. Pre-launch campaign (12 weeks):
     - Week-by-week thread calendar building to launch
     - Write 6 key pre-launch threads:
       a) Week 12: "I'm writing a book" announcement
       b) Week 8: Behind-the-scenes of writing/publishing
       c) Week 6: Cover reveal with story behind the design
       d) Week 4: Preview a key framework from the book
       e) Week 2: Pre-order campaign with incentive
       f) Week 1: "Why I wrote this book" personal story
     - How to tease content without giving everything away

  2. Launch week blitz (days -2 to +5):
     - Daily thread schedule for launch week
     - Write the launch day thread (12 tweets)
     - Influencer activation: getting 40 accounts to tweet about the book
     - Amazon algorithm optimization (timing purchases for rank)
     - Contingency plans (better or worse than expected)

  3. Post-launch sustained marketing (months 1-6):
     - How to keep the book relevant after launch week
     - Turning the book into 100+ threads
     - Reader testimonial strategy
     - How to handle negative reviews publicly

  4. Influencer coordination:
     - Write 3 outreach messages for different relationship levels:
       a) Close friend (casual ask)
       b) Acquaintance with big following (value-exchange)
       c) Cold outreach to industry legend
     - What to provide them (talking points, sample tweets, review copies)

  5. Business impact beyond book sales:
     - How the book elevates consulting rates
     - Speaking circuit strategy amplified through Twitter
     - "Book as a business card" — using it to open doors

assertions:
  - type: llm_judge
    criteria: "The 6 pre-launch threads build anticipation progressively — each reveals something new while maintaining mystery, creating a 12-week narrative arc"
    weight: 0.20
    description: "Progressive anticipation pre-launch threads"
  - type: llm_judge
    criteria: "The launch day thread is operationally detailed — combines emotional storytelling, clear purchase CTA, and social proof in a way that drives same-day sales"
    weight: 0.20
    description: "Operationally detailed launch day thread"
  - type: llm_judge
    criteria: "The influencer coordination is appropriately tiered — the close friend ask is casual, the acquaintance ask offers value exchange, the legend ask is respectful without being sycophantic"
    weight: 0.20
    description: "Appropriately tiered influencer asks"
  - type: llm_judge
    criteria: "The sustained marketing plan shows how one book generates endless content — practical ways to extract 100+ threads from the book's frameworks, stories, and reader responses"
    weight: 0.20
    description: "Book-to-endless-content marketing plan"
  - type: llm_judge
    criteria: "The business impact section connects book authority to tangible outcomes — shows how publishing changes consulting rates, speaking fees, and overall positioning"
    weight: 0.20
    description: "Tangible business impact connections"
