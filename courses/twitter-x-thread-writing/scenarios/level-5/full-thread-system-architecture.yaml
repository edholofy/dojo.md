meta:
  id: full-thread-system-architecture
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Design a complete thread-based content system from zero to authority"
  tags: [twitter, system-design, authority, comprehensive, content-machine]

state: {}

trigger: |
  Design a complete, end-to-end Twitter/X thread system that takes someone
  from zero presence to recognized industry authority in 12 months.

  Client Profile:
  - Name: Dr. Raj Patel, former VP of AI at a Fortune 500 company
  - Background: PhD in machine learning, 18 years in enterprise AI, led teams
    that deployed AI at scale across 3 major corporations
  - Twitter: Has an account but never tweets. 340 followers (all personal contacts)
  - Goal: Become the top voice in enterprise AI strategy within 12 months
  - Time budget: 5 hours/week maximum
  - Available assets: 50+ internal presentations, 8 published papers, dozens
    of war stories about AI deployments that failed and succeeded

  Design the complete system:

  1. Phase 1 — Foundation (Months 1-3):
     - Profile optimization (bio, header, pinned tweet)
     - Content pillar definition (3 pillars with thread topic ideas)
     - First 30 days: exact posting plan (threads + daily tweets)
     - Write 4 threads for Week 1-2 (each different format)
     - Strategic following and engaging strategy
     - Target metrics per month

  2. Phase 2 — Momentum (Months 4-6):
     - Content evolution (how threads change as audience grows)
     - Collaboration and network-building strategy
     - Newsletter launch plan
     - Thread series introduction
     - Target metrics with growth rates

  3. Phase 3 — Authority (Months 7-9):
     - Owned IP: signature framework launch
     - Write the "signature thread" that defines the brand
     - Media and podcast strategy
     - Speaking engagement funnel
     - How to handle growing influence

  4. Phase 4 — Leverage (Months 10-12):
     - Monetization launch (which streams first)
     - Platform diversification plan
     - Team/delegation structure
     - Long-term sustainability plan

  5. Operating system:
     - Weekly 5-hour time block breakdown
     - Content production workflow
     - Tool stack
     - Emergency protocols (viral threads, controversies, mistakes)

assertions:
  - type: llm_judge
    criteria: "The system is comprehensive yet fits within 5 hours/week — every activity has a time allocation and the total doesn't exceed the budget. Trade-offs are clear"
    weight: 0.20
    description: "Comprehensive yet time-realistic system"
  - type: llm_judge
    criteria: "The 4 Week 1-2 threads demonstrate range and quality — each shows a different format and content pillar, strong enough to make a memorable first impression"
    weight: 0.20
    description: "Range-demonstrating Week 1-2 threads"
  - type: llm_judge
    criteria: "The 12-month progression is logical and realistic — each phase builds on the previous, with clear triggers for transitions and honest growth expectations"
    weight: 0.20
    description: "Logical realistic 12-month progression"
  - type: llm_judge
    criteria: "The signature framework leverages Raj's unique assets — PhD background, enterprise AI war stories, and scale experience create a differentiated brand, not generic AI takes"
    weight: 0.20
    description: "Unique-asset-leveraging brand"
  - type: llm_judge
    criteria: "The operating system is sustainable — workflow, tools, and processes would actually work for a busy executive, not just look good on paper"
    weight: 0.20
    description: "Sustainable practical operating system"
