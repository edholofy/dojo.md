meta:
  id: thread-community-building
  level: 5
  course: twitter-x-thread-writing
  type: output
  description: "Build a dedicated community around thread content"
  tags: [twitter, community, loyalty, engagement, superfans]

state: {}

trigger: |
  Beyond followers, the most successful thread creators build communities —
  a core group of engaged readers who amplify, discuss, and contribute to
  their content ecosystem.

  Creator: Ava Nguyen, product strategy consultant
  Twitter: 48,000 followers, strong engagement (avg 800 likes, 120 replies)
  Observation: ~200 accounts consistently engage (the "inner circle")
  Goal: Formalize this community for retention, revenue, and influence

  Design the community strategy:

  1. Community identification and mapping:
     - How to identify the "inner circle" from analytics
     - Segment the community: superfans, consistent engagers, lurker-to-
       engagers, industry peers, potential clients
     - What each segment values and how to serve them differently

  2. Community activation through threads:
     - Write 3 threads designed to build community (not just audience):
       a) "Community thread": Ask readers to introduce themselves and what
          they're working on — facilitate connections between followers
       b) "Crowdsourced thread": Pose a question and build a thread from
          the best replies, crediting each contributor
       c) "Challenge thread": Launch a 7-day challenge where followers
          post about a specific topic and Ava amplifies the best ones
     - How each format deepens community bonds vs just growing followers

  3. Off-Twitter community extension:
     - Private community options: Discord, Circle, Slack, paid membership
     - Which platform for Ava's audience and why
     - Write the "community launch" thread announcing the private community
     - Free vs paid membership — pricing and access strategy

  4. Community-powered content:
     - How to turn community discussions into threads
     - AMA threads with community members
     - Community spotlight threads (featuring a member's work weekly)
     - How community engagement boosts algorithmic reach

  5. Community monetization:
     - Revenue models: membership fees, community sponsorship, premium access
     - How community strengthens consulting pipeline
     - The "community premium" — how a community increases rates
     - Risk: when community management becomes overwhelming

assertions:
  - type: llm_judge
    criteria: "The community identification goes beyond follower counts — segments by engagement depth, value alignment, and potential (consistent engagers, industry peers, potential clients)"
    weight: 0.25
    description: "Depth-segmented community identification"
  - type: llm_judge
    criteria: "The 3 community threads foster genuine connection — the introduction thread creates peer connections, the crowdsourced thread gives recognition, the challenge thread creates shared experience"
    weight: 0.25
    description: "Genuine connection-fostering community threads"
  - type: llm_judge
    criteria: "The off-Twitter extension strategy is well-reasoned — selects the right platform for the audience type and explains the trade-offs between free/paid, open/gated models"
    weight: 0.25
    description: "Well-reasoned off-Twitter extension"
  - type: llm_judge
    criteria: "The monetization approach balances revenue with community health — doesn't over-extract from the community but shows sustainable revenue models that enhance rather than diminish community value"
    weight: 0.25
    description: "Community-health-balanced monetization"
