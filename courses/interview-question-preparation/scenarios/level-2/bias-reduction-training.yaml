meta:
  id: bias-reduction-training
  level: 2
  course: interview-question-preparation
  type: output
  description: "Bias reduction training — create interviewer training materials to reduce unconscious bias in interviews"
  tags: [bias, unconscious-bias, training, debiasing, intermediate]

state: {}

trigger: |
  You're an HR Business Partner at a 400-person financial
  services company. An internal audit revealed concerning
  patterns in hiring:

  Data findings:
  - Women who negotiate salary in interviews receive lower
    overall evaluation scores than men who negotiate (same
    behaviors, different ratings)
  - Candidates from top-20 universities receive 23% higher
    "culture fit" scores than equally qualified candidates
    from other schools
  - Interviewers who share a hobby or background with a
    candidate rate them 31% higher on "communication skills"
  - First impressions (formed in the first 30 seconds) predict
    the final hiring decision 72% of the time — regardless
    of interview performance
  - Interviewers who are tired (afternoon slots) rate candidates
    15% lower than morning interviewers

  The CHRO has asked you to create interviewer bias training
  that addresses these specific patterns. The training will
  be mandatory for all 60 hiring managers.

  Types of bias to address:
  1. Affinity bias (similarity attraction)
  2. Anchoring bias (first impression dominance)
  3. Halo/horns effect (one trait coloring everything)
  4. Confirmation bias (seeking evidence for initial impression)
  5. Gender bias in evaluation (different standards for same
     behaviors)
  6. Pedigree bias (school/company prestige weighting)
  7. Fatigue bias (time-of-day effects)

  Task: Create the interviewer bias training program. Include
  the training content, interactive exercises, and practical
  debiasing tools interviewers can use during actual
  interviews.

assertions:
  - type: llm_judge
    criteria: "Response creates comprehensive bias training — addresses all 7 bias types with explanations, real examples from the audit data, and research backing; each bias type includes a practical debiasing technique that interviewers can use in real interviews; the training doesn't just raise awareness (which research shows is insufficient) but provides behavioral tools; interactive exercises allow interviewers to experience their own biases."
    weight: 0.35
    description: "ComprehensiveTraining"
  - type: llm_judge
    criteria: "Response includes practical debiasing tools — provides specific, usable techniques for each bias (delayed scoring, structured notes, calibration questions, blind resume review, counterargument exercises); addresses the fatigue bias with scheduling recommendations; includes a 'bias checklist' interviewers can reference before making decisions; the tools are realistic for a financial services environment (professional, evidence-based)."
    weight: 0.35
    description: "PracticalTools"
  - type: llm_judge
    criteria: "Response would actually change behavior — goes beyond lecture-style content to include interactive exercises, self-assessment activities, and practice scenarios; uses the company's own audit data to make it personal and relevant; addresses likely resistance ('I'm not biased'); provides accountability mechanisms (how to measure if training is working); the program is designed for 60 busy hiring managers (not too long, engaging, practical)."
    weight: 0.30
    description: "BehavioralChange"
