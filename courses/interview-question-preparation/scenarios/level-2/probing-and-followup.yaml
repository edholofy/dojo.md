meta:
  id: probing-and-followup
  level: 2
  course: interview-question-preparation
  type: output
  description: "Probing and follow-up techniques — master the art of asking effective follow-up questions during interviews"
  tags: [probing, follow-up, deep-dive, technique, intermediate]

state: {}

trigger: |
  You're a Senior Recruiter training 3 new recruiters. They
  all have the same problem: they ask the prepared questions,
  get surface-level answers, and move on. They never probe
  deeper, so they miss critical information about candidates.

  Examples of the problem:

  Scenario A:
  Q: "Tell me about a time you led a difficult project."
  A: "I led our office move last year. It went well."
  New recruiter response: "Great. Next question..."
  (Should have probed: What made it difficult? What went wrong?
  How many people involved? What was your specific role?)

  Scenario B:
  Q: "Why are you leaving your current role?"
  A: "I'm looking for new challenges."
  New recruiter response: "Makes sense. Next question..."
  (Should have probed: What kind of challenges? What's missing
  currently? Have you discussed this with your manager?)

  Scenario C:
  Q: "Describe your management style."
  A: "I'm a servant leader. I believe in empowering my team."
  New recruiter response: "That's great. Next question..."
  (Should have probed: Can you give a specific example? How do
  you handle underperformers? What does 'empowering' look like
  in practice?)

  Task: Create a comprehensive training guide on probing and
  follow-up techniques. Include the 3 scenarios above with
  model follow-up questions, plus 7 additional common
  interview scenarios where probing is critical. For each
  scenario, provide the initial question, a typical surface
  answer, and 3-5 effective probing follow-ups.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive probing guide — addresses the 3 provided scenarios with detailed follow-up questions; adds 7 more common scenarios where probing is critical; each scenario includes the initial question, a typical surface answer, and 3-5 specific probing follow-ups; the probing questions go deeper without being aggressive; teaches the skill of probing as a technique, not just providing a question list."
    weight: 0.35
    description: "ComprehensiveGuide"
  - type: llm_judge
    criteria: "Response teaches probing as a skill — explains the principles behind effective probing (specificity, evidence, impact, learning); categorizes probing techniques (clarification probes, elaboration probes, behavioral probes, contradiction probes, silence as a probe); provides general frameworks the recruiter can apply to ANY answer, not just the listed scenarios; includes the concept of 'peeling the onion' — each follow-up goes one layer deeper."
    weight: 0.35
    description: "SkillTeaching"
  - type: llm_judge
    criteria: "Response is practical for training new recruiters — written at the right level (not too academic, not too basic); includes practice exercises the new recruiters can do with each other; addresses common fears ('What if I seem rude?' 'What if the candidate doesn't have more to say?'); includes tips for reading when to probe vs. when to move on; the guide would measurably improve the new recruiters' interview quality."
    weight: 0.30
    description: "PracticalTraining"
