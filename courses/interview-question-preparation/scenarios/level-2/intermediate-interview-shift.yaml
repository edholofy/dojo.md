meta:
  id: intermediate-interview-shift
  level: 2
  course: interview-question-preparation
  type: output
  description: "Intermediate interview shift — handle a situation where the interview reveals something unexpected that changes the evaluation"
  tags: [shift, unexpected-revelation, ethical-dilemma, adaptation, intermediate]

state: {}

trigger: |
  You're a Senior Recruiter at a consulting firm. During a
  final-round interview for a Senior Consultant position, three
  unexpected things happen that force you to adapt:

  Event 1 — Competency surprise:
  The candidate was assessed as "strong" in all prior rounds
  for analytical skills. But in the case study presentation,
  they reveal that their "award-winning analysis" at their
  current firm was actually done by a team of 6 analysts —
  they managed the project but didn't do the analysis
  themselves. Their individual analytical skills are actually
  mid-level, not senior-level.

  Event 2 — Reference conflict:
  Between interviews, a back-channel reference (someone on
  your team knows the candidate's current manager) reveals
  that the candidate is on a PIP (Performance Improvement
  Plan) at their current company. The candidate said they
  were leaving for "growth opportunities." You're unsure if
  using this back-channel information is appropriate.

  Event 3 — Competing candidate complication:
  Your second-choice candidate (who scored slightly lower)
  just received an offer from a competitor and needs a
  decision from you by end of day. You were planning to make
  an offer to the first-choice candidate, but now you're
  unsure given Events 1 and 2.

  Context:
  - Role: Senior Consultant, $120K-$145K
  - The first-choice candidate is more diverse (would improve
    team demographics)
  - The second-choice candidate has stronger individual
    technical skills
  - You have 4 hours to make a decision

  Task: For each event, explain how you would handle it
  ethically and practically. Then make your hiring
  recommendation with a clear rationale that addresses all
  three complications.

assertions:
  - type: llm_judge
    criteria: "Response handles all 3 events thoughtfully — addresses the competency misrepresentation (is management of analysis enough for 'senior'? Is this a dealbreaker or a recalibration?); confronts the ethical dilemma of back-channel references (should you use this information? legal and ethical implications); manages the time pressure from the competing offer without making a rushed decision; each event analysis shows nuanced thinking, not reflexive reactions."
    weight: 0.35
    description: "ThoughtfulHandling"
  - type: llm_judge
    criteria: "Response addresses ethical dimensions — the back-channel reference raises real ethical questions (candidate consent, fairness, accuracy of informal information, potential bias); the response acknowledges that diversity considerations are important but cannot be the sole factor; the competency misrepresentation is handled fairly (is it deception or reasonable framing?); the overall approach would withstand ethical scrutiny."
    weight: 0.35
    description: "EthicalDimensions"
  - type: llm_judge
    criteria: "Response makes a clear, defensible recommendation — commits to a decision (hire candidate 1, hire candidate 2, or reject both and keep searching); the rationale addresses all three complications; the decision is not driven by time pressure alone; includes risk mitigation for whichever path is chosen; addresses the diversity consideration honestly; the recommendation demonstrates the kind of judgment a senior recruiter should show."
    weight: 0.30
    description: "DefensibleRecommendation"
