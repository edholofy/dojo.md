meta:
  id: post-interview-calibration
  level: 2
  course: interview-question-preparation
  type: output
  description: "Post-interview calibration — design and facilitate a calibration session where interviewers align on candidate evaluation"
  tags: [calibration, debrief, evaluation, alignment, intermediate]

state: {}

trigger: |
  You're the Recruiting Manager at a tech company. A candidate
  for Senior Software Engineer just completed a full interview
  loop (5 interviewers), and the feedback is split:

  Interviewer feedback:
  1. Engineering Manager (hiring manager): "Strong Hire — great
     system design, asked insightful questions about our
     architecture. Exactly what we need."
  2. Senior Engineer (tech screen): "Hire — solid coding skills,
     solved the medium problem and made good progress on the
     hard one. Communication was clear."
  3. Staff Engineer (architecture): "No Hire — couldn't explain
     trade-offs between SQL and NoSQL for our use case. Seemed
     to have rehearsed answers rather than deep understanding."
  4. Product Manager (cross-functional): "Strong Hire — amazing
     product sense for an engineer. Asked the right questions
     about user impact. Would love to work with this person."
  5. HR Business Partner (culture): "Lean Hire — values aligned,
     but I noticed the candidate interrupted me twice and
     seemed dismissive of a question about collaboration.
     Minor concern."

  Score summary: 2 Strong Hire, 1 Hire, 1 Lean Hire, 1 No Hire

  Additional context:
  - This is your strongest candidate for a role that's been
    open for 3 months
  - The Staff Engineer who said "No Hire" has the highest
    rejection rate on the team (rejects 80% of candidates)
  - The Engineering Manager really wants this person and has
    been pressuring the team

  Task: Design and facilitate the calibration session. Create
  the session agenda, facilitation guide, decision framework,
  and ultimately make a recommendation. Address the underlying
  team dynamics.

assertions:
  - type: llm_judge
    criteria: "Response designs an effective calibration session — includes a clear agenda and facilitation process; ensures all 5 voices are heard (not just the loudest); addresses each interviewer's feedback specifically; separates fact from opinion in the discussion; uses a structured decision framework (not just majority vote); the calibration process produces a defensible hiring decision."
    weight: 0.35
    description: "EffectiveCalibration"
  - type: llm_judge
    criteria: "Response addresses the team dynamics — handles the Engineering Manager's pressure without letting it dominate; addresses the Staff Engineer's unusually high rejection rate (is this a calibration issue or a quality standard?); weighs each interviewer's feedback based on what they assessed (tech feedback on tech questions, culture feedback on culture); doesn't dismiss the 'No Hire' or the 'Lean Hire' — investigates them; the facilitation approach would produce a fair outcome."
    weight: 0.35
    description: "TeamDynamics"
  - type: llm_judge
    criteria: "Response makes a reasoned recommendation — synthesizes all feedback into a clear recommendation with rationale; addresses whether the technical concern from the Staff Engineer is a deal-breaker or a development area; factors in the 3-month open requisition without letting urgency override quality; the recommendation is honest about trade-offs; includes next steps (if hire: onboarding focus areas; if no-hire: what to look for in the next candidate)."
    weight: 0.30
    description: "ReasonedRecommendation"
