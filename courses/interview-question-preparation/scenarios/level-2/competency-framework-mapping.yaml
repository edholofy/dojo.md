meta:
  id: competency-framework-mapping
  level: 2
  course: interview-question-preparation
  type: output
  description: "Competency framework mapping — map organizational competencies to specific interview questions across multiple roles"
  tags: [competency-framework, mapping, organizational, consistency, intermediate]

state: {}

trigger: |
  You're the Head of Talent at a 300-person consulting firm.
  The firm has defined 6 core competencies that apply to every
  role, but there's no systematic connection between these
  competencies and interview questions. Each hiring manager
  invents their own questions, resulting in inconsistent hiring
  standards across the firm.

  The firm's 6 core competencies:
  1. Client Orientation — Understanding and anticipating client
     needs, building trusted relationships
  2. Analytical Rigor — Breaking down complex problems, using
     data to inform decisions
  3. Communication Excellence — Clear verbal and written
     communication, adapting to audience
  4. Collaborative Leadership — Working effectively across
     teams, influencing without authority
  5. Adaptability — Thriving in ambiguity, adjusting to
     changing priorities
  6. Growth Mindset — Seeking feedback, continuous learning,
     coaching others

  Roles to map (4 levels):
  1. Analyst (entry-level, 0-2 years)
  2. Consultant (mid-level, 2-5 years)
  3. Manager (senior, 5-10 years)
  4. Principal (leadership, 10+ years)

  Task: Create the competency-to-question mapping for all 4
  levels. Each competency should have 2 questions per level
  (48 questions total), with the complexity and expectations
  escalating appropriately by level. Include evaluation
  criteria that scale by level.

assertions:
  - type: llm_judge
    criteria: "Response creates a comprehensive competency mapping — all 6 competencies × 4 levels × 2 questions = 48 questions; questions escalate appropriately by level (Analyst: execution-focused; Consultant: independent judgment; Manager: team leadership; Principal: strategic impact); the same competency looks different at each level; questions are behavioral (past experience) not hypothetical; the mapping is organized clearly."
    weight: 0.35
    description: "ComprehensiveMapping"
  - type: llm_judge
    criteria: "Response shows clear level progression — for each competency, the expectation escalates logically across levels; Analyst questions focus on learning and contribution; Consultant questions focus on independent delivery; Manager questions focus on leading others and client relationships; Principal questions focus on firm-wide impact and strategy; a reader can clearly see how the same competency manifests differently at each seniority level."
    weight: 0.35
    description: "LevelProgression"
  - type: llm_judge
    criteria: "Response includes scalable evaluation criteria — provides what 'good' looks like at each level for each competency; evaluation expectations match the level (an Analyst showing 'growth mindset' looks different from a Principal showing it); the criteria are specific enough for consistent scoring; the overall framework could be used across the firm as the standard interview guide; includes implementation guidance for rolling this out to hiring managers."
    weight: 0.30
    description: "ScalableEvaluation"
