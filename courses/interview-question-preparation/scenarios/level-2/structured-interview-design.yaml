meta:
  id: structured-interview-design
  level: 2
  course: interview-question-preparation
  type: output
  description: "Structured interview design — create a complete structured interview process for a critical hire"
  tags: [structured, process-design, consistency, predictive-validity, intermediate]

state: {}

trigger: |
  You're the Director of Talent Acquisition at a 500-person
  SaaS company. After a costly mis-hire (a VP of Sales who
  lasted 4 months and cost the company ~$500K), the CEO has
  mandated that all hiring must use structured interviews.

  Your current state: Completely unstructured. Hiring managers
  ask whatever they want, there are no scorecards, no
  calibration sessions, and hiring decisions are made based
  on "gut feel" in 5-minute post-interview conversations.

  The CEO wants a structured interview process for the next
  critical hire: Director of Customer Success.

  Role context:
  - Manages 12 CSMs across 3 tiers (SMB, Mid-Market, Enterprise)
  - Owns $18M ARR in renewals and expansion
  - Reports to CRO
  - Salary: $160K-$190K + bonus
  - Key challenge: Churn increased from 8% to 14% in the past
    year — this hire needs to reverse that trend

  Interview stages:
  1. Recruiter screen (30 min)
  2. Hiring manager interview - CRO (60 min)
  3. Peer interview - VP of Sales (45 min)
  4. Cross-functional - VP of Product (45 min)
  5. Case study presentation (60 min)
  6. Team meet - 2 Senior CSMs (30 min each)
  7. Final - CEO (30 min)

  Task: Design the complete structured interview process.
  Include specific questions for each stage, scorecards,
  the case study assignment, and the calibration process.

assertions:
  - type: llm_judge
    criteria: "Response designs a complete structured interview — each of the 7 stages has a clear purpose, specific questions, and a scorecard; questions are distributed across stages to avoid redundancy; competencies are assigned to specific interviewers; the case study is well-designed and relevant to the churn challenge; the process would produce consistent, comparable evaluations across candidates."
    weight: 0.35
    description: "CompleteStructuredProcess"
  - type: llm_judge
    criteria: "Response includes practical scorecards and calibration — scorecards have clear rating scales with behavioral anchors; each interviewer knows exactly what they're assessing; the calibration session process is detailed (who participates, how scores are discussed, how decisions are made, how to handle disagreements); the overall evaluation framework would prevent the 'gut feel' problem that led to the mis-hire."
    weight: 0.35
    description: "ScorecardsAndCalibration"
  - type: llm_judge
    criteria: "Response addresses the specific role needs — questions assess the churn reduction capability specifically; the case study tests strategic thinking about customer retention; cross-functional interviews assess collaboration skills; the process evaluates both strategic vision (CRO/CEO rounds) and tactical execution (team/peer rounds); the candidate experience is considered (7 stages is a lot — are they all necessary?)."
    weight: 0.30
    description: "RoleSpecificDesign"
