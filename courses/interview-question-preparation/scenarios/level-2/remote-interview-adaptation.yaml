meta:
  id: remote-interview-adaptation
  level: 2
  course: interview-question-preparation
  type: output
  description: "Remote interview adaptation — adapt interview processes for fully virtual environments while maintaining assessment quality"
  tags: [remote, virtual, video-interview, adaptation, intermediate]

state: {}

trigger: |
  You're the Director of Recruiting at a fully remote company
  (200 employees across 30 US states). All interviews are
  conducted virtually, but your team has been using the same
  interview process designed for in-person interviews —
  just over Zoom. This causes problems:

  Current issues:
  1. "Zoom fatigue" — candidates have 4 back-to-back video
     calls with no breaks (the in-person schedule had natural
     walk-between-rooms breaks)
  2. Technical difficulties — 15% of interviews have audio/
     video issues that eat into interview time
  3. Reading the room — interviewers report difficulty assessing
     communication skills and "presence" over video
  4. Whiteboard exercises — the team still does "virtual
     whiteboard" coding exercises that candidates hate
  5. Culture assessment — hard to demonstrate company culture
     when there's no office to tour
  6. Candidate experience — candidates can't meet the team
     informally (no lunch, no hallway conversations)
  7. Accessibility — one recent candidate was deaf and the
     team had no accommodations prepared

  Current interview process (4 stages, all virtual):
  - Stage 1: Recruiter screen (30 min, Zoom)
  - Stage 2: Hiring manager (60 min, Zoom)
  - Stage 3: Technical assessment (90 min, Zoom, live coding)
  - Stage 4: Team interviews (3 × 30 min, back-to-back Zoom)

  Role: Senior Product Manager
  Salary: $140K-$170K

  Task: Redesign the entire interview process for a remote-
  first environment. Address all 7 issues with specific
  solutions. The redesigned process should be better than an
  in-person adaptation, not just a compromise.

assertions:
  - type: llm_judge
    criteria: "Response redesigns the process for remote-first — addresses all 7 issues with specific solutions; eliminates back-to-back Zoom fatigue (breaks, asynchronous components, shorter sessions); includes a technical contingency plan; replaces whiteboard with better remote assessment options; introduces creative ways to demonstrate culture virtually; includes accessibility accommodations as standard (not afterthought); the redesigned process is genuinely better than the in-person adaptation."
    weight: 0.35
    description: "RemoteFirstRedesign"
  - type: llm_judge
    criteria: "Response improves assessment quality in virtual context — addresses the 'reading the room' challenge with specific techniques; includes asynchronous assessment components (take-home work sample, async video responses) where appropriate; the PM-specific assessment tests product sense, communication, and strategic thinking effectively over video; the process produces reliable hiring signals despite the virtual medium."
    weight: 0.35
    description: "AssessmentQuality"
  - type: llm_judge
    criteria: "Response creates a great candidate experience — the redesigned process respects candidate time and energy; includes 'virtual culture' touchpoints (informal team chat, video office tour, values showcase); addresses accessibility proactively; provides clear communication about what to expect; the process would leave candidates excited about the remote-first culture rather than feeling like they missed the 'real' experience."
    weight: 0.30
    description: "CandidateExperience"
