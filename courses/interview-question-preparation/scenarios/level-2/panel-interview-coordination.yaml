meta:
  id: panel-interview-coordination
  level: 2
  course: interview-question-preparation
  type: output
  description: "Panel interview coordination — design and coordinate a panel interview that is fair, effective, and doesn't overwhelm the candidate"
  tags: [panel, coordination, multi-interviewer, fairness, intermediate]

state: {}

trigger: |
  You're the Talent Acquisition Manager at a healthcare
  company. You're coordinating a panel interview for a
  Clinical Operations Director position. Panel interviews
  are required for all director-level hires, but they've
  been going poorly — candidates report feeling "interrogated"
  and interviewers often talk over each other or ask redundant
  questions.

  Panel composition (5 people):
  1. VP of Clinical Operations (hiring manager)
  2. Medical Director (clinical expertise assessor)
  3. VP of HR (culture and leadership assessor)
  4. Director of IT (cross-functional partner)
  5. Senior Clinical Manager (peer/team assessor)

  Role context:
  - Oversees clinical operations for 3 outpatient facilities
  - Manages 45 clinical staff (nurses, techs, coordinators)
  - Responsible for quality metrics, compliance, and patient
    satisfaction
  - Salary: $135K-$165K
  - Must have clinical background (RN or related) plus
    management experience

  Problems from past panels:
  - All 5 panelists ask similar questions (redundancy)
  - Medical Director dominates the conversation
  - IT Director feels their questions aren't relevant and
    disengages
  - Candidates can't tell who's the decision-maker
  - No structured evaluation — panelists just email "thumbs
    up" or "thumbs down" after
  - Panel runs 90 minutes but could be 60

  Task: Redesign the panel interview process. Include question
  assignments for each panelist, a facilitation guide, timing
  structure, and post-panel evaluation process.

assertions:
  - type: llm_judge
    criteria: "Response redesigns the panel effectively — assigns specific competencies and questions to each panelist based on their expertise; eliminates redundancy; includes a facilitation guide (who leads, how to manage dominant speakers, transition between panelists); structures the 60-90 minute session with clear timing; includes an introduction protocol that helps the candidate understand who everyone is and why they're there."
    weight: 0.35
    description: "EffectivePanelDesign"
  - type: llm_judge
    criteria: "Response addresses past problems specifically — solves the redundancy issue with clear question assignments; addresses the Medical Director's dominance with facilitation guidelines; gives the IT Director relevant questions (clinical systems, technology adoption, cross-functional collaboration); clarifies the decision-making process for candidates; replaces 'thumbs up/down' with structured evaluation."
    weight: 0.35
    description: "ProblemResolution"
  - type: llm_judge
    criteria: "Response improves the candidate experience — the redesigned panel feels like a conversation, not an interrogation; includes candidate introduction time (let them present themselves); builds in time for the candidate to ask questions to each panelist; considers the power dynamic (5 interviewers vs. 1 candidate); the process would leave candidates feeling respected and fairly evaluated; includes pre-panel logistics (room setup, introductions, agenda sharing)."
    weight: 0.30
    description: "CandidateExperience"
