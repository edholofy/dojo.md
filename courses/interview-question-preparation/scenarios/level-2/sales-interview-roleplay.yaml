meta:
  id: sales-interview-roleplay
  level: 2
  course: interview-question-preparation
  type: output
  description: "Sales interview roleplay — design roleplay-based interview assessments for a sales team"
  tags: [sales, roleplay, simulation, assessment, intermediate]

state: {}

trigger: |
  You're the VP of Sales at a B2B SaaS company selling HR
  software. You're hiring 5 Account Executives and want to
  include roleplay exercises in the interview process. Your
  current interviews rely entirely on behavioral questions,
  but you've found that candidates who interview well don't
  always sell well.

  Product context:
  - HR management platform (payroll, benefits, time tracking)
  - Average deal size: $45K ARR
  - Sales cycle: 60-90 days
  - ICP: Companies with 100-500 employees
  - Competitive landscape: BambooHR, Gusto, Rippling, Paylocity
  - Common objections: Price (higher than Gusto), implementation
    time (6 weeks), existing contract with competitor

  Roleplay exercises to design (3 scenarios):
  1. Discovery Call (15 min) — Candidate plays the AE,
     interviewer plays a prospect (HR Director at a 250-person
     manufacturing company currently using spreadsheets)
  2. Objection Handling (10 min) — Candidate handles 3 common
     objections from an interviewer playing a skeptical CFO
  3. Closing Scenario (10 min) — Candidate is in the final
     meeting with a prospect who is also considering Rippling;
     needs to close without discounting

  Task: Design all 3 roleplay scenarios with detailed
  interviewer scripts (what the "prospect" says and how to
  respond to different approaches), evaluation rubrics, and
  guidance for interviewers on how to run roleplays fairly.

assertions:
  - type: llm_judge
    criteria: "Response designs 3 realistic roleplay scenarios — each scenario has a detailed interviewer script with specific character motivations, pain points, and responses to different approaches; the scenarios test different sales skills (discovery, objection handling, closing); the prospect personas are realistic (not cartoonish obstacles); the scenarios use the actual product context (HR software, specific competitors, real objections)."
    weight: 0.35
    description: "RealisticRoleplays"
  - type: llm_judge
    criteria: "Response includes fair evaluation rubrics — each scenario has specific criteria (discovery: question quality, active listening, pain identification; objection handling: empathy, reframing, evidence use; closing: urgency creation, value articulation, negotiation skill); rubrics distinguish between excellent, good, and poor performance; the rubrics assess sales skills, not personality or style; a structured interviewer can score consistently."
    weight: 0.35
    description: "FairEvaluation"
  - type: llm_judge
    criteria: "Response provides interviewer guidance — explains how to run roleplays fairly (consistent prospect behavior across candidates, avoid 'gotcha' escalations, give candidates time to prepare); includes warm-up guidance; addresses how to handle candidates who freeze up; explains how to debrief after the roleplay; the guidance ensures roleplays test ability, not just comfort with roleplay exercises."
    weight: 0.30
    description: "InterviewerGuidance"
