meta:
  id: case-study-interview-design
  level: 2
  course: interview-question-preparation
  type: output
  description: "Case study interview design — create a work-sample case study for evaluating candidates on real job scenarios"
  tags: [case-study, work-sample, assessment, practical, intermediate]

state: {}

trigger: |
  You're the VP of Marketing at a D2C (direct-to-consumer)
  e-commerce brand ($30M revenue). You're hiring a Head of
  Growth Marketing and want to use a case study to assess
  candidates' strategic thinking and execution ability.

  You've seen too many marketing hires who interview well
  but can't actually do the work. You want a take-home case
  study that simulates a real challenge your team faces.

  Real business context (to base the case on):
  - CAC (customer acquisition cost) has increased 40% YoY
  - Paid social (Meta, TikTok) drives 65% of new customers
  - Email/SMS drives 25% of revenue but is underleveraged
  - Organic/SEO is minimal (brand is 3 years old)
  - LTV:CAC ratio dropped from 3.5:1 to 2.1:1
  - Blended ROAS target: 4:1 (currently at 2.8:1)
  - Monthly marketing budget: $500K
  - Target: Grow revenue 50% while improving CAC efficiency

  Case study requirements:
  - Should take 3-4 hours to complete (be respectful of time)
  - Due back in 5 business days
  - Candidate presents findings in a 30-minute meeting
  - Should test strategic thinking, analytical ability, and
    communication skills
  - Must be fair — don't ask for a free strategy you'll steal

  Task: Design the complete case study including the brief
  given to candidates, the evaluation rubric, presentation
  guidelines, and guardrails to ensure fairness.

assertions:
  - type: llm_judge
    criteria: "Response designs a realistic, fair case study — the brief provides enough context for candidates to demonstrate strategic thinking without doing free consulting; uses real-but-disguised business data; is scoped for 3-4 hours (not a week of work); tests the right skills (strategy, analysis, prioritization, communication); includes clear deliverable expectations and format guidance; the case study would differentiate between strategic and tactical thinkers."
    weight: 0.35
    description: "RealisticFairCase"
  - type: llm_judge
    criteria: "Response includes a comprehensive evaluation rubric — defines specific criteria for the presentation evaluation; includes rating scales for strategic thinking, analytical depth, prioritization, communication quality, and feasibility of recommendations; distinguishes between excellent, good, and weak responses with examples; the rubric ensures consistent evaluation across multiple candidates; includes guidance for the presentation Q&A."
    weight: 0.35
    description: "EvaluationRubric"
  - type: llm_judge
    criteria: "Response addresses fairness and candidate experience — includes guardrails to prevent 'free work' (the case is based on past, not current, challenges); respects candidate time (3-4 hours, 5-day deadline); provides equal context to all candidates; addresses how to handle candidates who ask clarifying questions; considers candidates who may have less D2C experience but strong transferable skills; the process would leave candidates with a positive impression regardless of outcome."
    weight: 0.30
    description: "FairnessAndExperience"
