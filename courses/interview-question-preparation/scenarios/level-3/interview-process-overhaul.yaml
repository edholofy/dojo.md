meta:
  id: interview-process-overhaul
  level: 3
  course: interview-question-preparation
  type: output
  description: "Interview process overhaul — redesign an entire company's interview process from unstructured to evidence-based"
  tags: [process-overhaul, evidence-based, company-wide, transformation, advanced]

state: {}

trigger: |
  You're the newly hired VP of People at a 600-person retail
  technology company. The CEO hired you specifically to fix
  hiring — the company's 1-year turnover rate is 35% and exit
  interviews consistently cite "the role wasn't what I expected
  in the interview" as the top reason.

  Current interview audit findings:
  - 45 hiring managers, each with their own approach
  - Average time-to-hire: 52 days (industry average: 36)
  - Offer acceptance rate: 58% (industry: 72%)
  - 1-year retention: 65% (industry: 82%)
  - No interview training program exists
  - No scorecards or evaluation standards
  - 70% of interview questions are unstructured ("Tell me about
    yourself," "What's your greatest weakness")
  - Candidate experience rating: 3.1/5 on Glassdoor
  - Cost of a bad hire estimate: $150K average

  Your mandate: Redesign the entire interview process. Budget
  of $200K for implementation (training, technology, consulting).

  The company hires across 4 functions:
  1. Engineering (15 hires/quarter, technical + behavioral)
  2. Sales (20 hires/quarter, roleplay + behavioral)
  3. Product (5 hires/quarter, case study + behavioral)
  4. Corporate (10 hires/quarter, behavioral + situational)

  Task: Design the company-wide interview transformation.
  Include the standard process for each function, the training
  program, technology recommendations, success metrics, and a
  phased rollout plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive company-wide interview overhaul — creates function-specific interview processes for engineering, sales, product, and corporate; each process includes structured questions, evaluation criteria, and assessment methods appropriate to the function; the overall system has consistent principles but function-specific execution; addresses the root causes of the 35% turnover and 58% offer acceptance rate."
    weight: 0.35
    description: "ComprehensiveOverhaul"
  - type: llm_judge
    criteria: "Response includes a practical training and rollout plan — the training program addresses the skill gaps of 45 hiring managers; the rollout is phased (pilot → scale, not big-bang); $200K budget is allocated realistically across training, technology, and change management; includes technology recommendations (ATS enhancements, interview scheduling, scorecards); the timeline accounts for behavior change (not just training delivery)."
    weight: 0.35
    description: "PracticalRollout"
  - type: llm_judge
    criteria: "Response defines success metrics tied to the problems — metrics directly address the current failures (time-to-hire, offer acceptance, 1-year retention, candidate experience); includes leading indicators (scorecard completion rate, interviewer training completion, candidate NPS); the metrics create accountability; includes a baseline and targets; the overall plan would demonstrably improve hiring quality within 6-12 months."
    weight: 0.30
    description: "MeasurableSuccess"
