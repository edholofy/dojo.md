meta:
  id: high-volume-interview-scaling
  level: 3
  course: interview-question-preparation
  type: output
  description: "High-volume interview scaling — design an interview process for hiring 500+ people in a quarter while maintaining quality"
  tags: [high-volume, scaling, mass-hiring, quality-at-scale, advanced]

state: {}

trigger: |
  You're the Head of Talent Acquisition at a rapidly growing
  fintech company. The company just closed Series D ($200M)
  and needs to hire 500 people in Q3 — nearly doubling the
  current headcount of 600.

  Hiring breakdown:
  - 200 Customer Support Representatives (entry-level)
  - 100 Software Engineers (mix of levels)
  - 80 Sales Development Representatives (entry-level)
  - 50 Operations Staff (various roles)
  - 40 Product & Design (mid to senior)
  - 30 Corporate Functions (finance, HR, legal, marketing)

  Current capacity:
  - Recruiting team: 8 recruiters
  - Interviewing capacity: ~40 interviews per week total
  - To hit 500 hires in 12 weeks: Need ~150 interviews/week
    (assuming 3:1 interview-to-hire ratio)
  - Current capacity is 25% of what's needed

  Constraints:
  - Quality cannot drop (1-year retention must stay above 85%)
  - Candidate experience must be maintained (4.0+ Glassdoor)
  - Budget for external recruiting: $500K
  - No full RPO (recruitment process outsourcing) — CEO wants
    this in-house

  Task: Design the high-volume interview strategy that scales
  to 500 hires while maintaining quality. Include process
  design for each hiring category, interviewer mobilization
  plan, technology leverage, and quality control mechanisms.

assertions:
  - type: llm_judge
    criteria: "Response designs a scalable process — differentiates between high-volume entry-level hiring (CSRs, SDRs) and selective senior hiring; uses different interview approaches for different categories (group interviews, video screening, assessment centers for volume; structured 1:1 for senior); the math works (150 interviews/week is achievable with the plan); technology leverage is specific (one-way video, automated scheduling, AI screening for volume roles)."
    weight: 0.35
    description: "ScalableProcess"
  - type: llm_judge
    criteria: "Response maintains quality at scale — includes quality control mechanisms (scorecard compliance, random audits, quality-of-hire tracking); addresses the risk of 'warm body' hiring under pressure; the entry-level hiring process still predicts performance; senior hiring isn't rushed to keep pace with volume hiring; the 85% retention target has specific safeguards; includes calibration processes that work at scale."
    weight: 0.35
    description: "QualityAtScale"
  - type: llm_judge
    criteria: "Response addresses capacity realistically — the interviewer mobilization plan scales from 40 to 150 interviews/week; includes cross-training non-recruiting employees as interviewers; the $500K budget is allocated effectively; explains how 8 recruiters manage 500 hires (automation, process efficiency, coordinator support); the plan accounts for recruiter burnout and sustainable workload; timeline milestones are realistic."
    weight: 0.30
    description: "CapacityPlan"
