meta:
  id: hiring-manager-certification
  level: 3
  course: interview-question-preparation
  type: output
  description: "Hiring manager certification — design a certification program that ensures all interviewers meet quality standards"
  tags: [certification, training, standards, quality-assurance, advanced]

state: {}

trigger: |
  You're the Director of Talent at a 800-person company. After
  analyzing 2 years of hiring data, you found that 30% of
  interviewers account for 80% of hiring failures (defined as
  new hires who leave or are terminated within 1 year). The
  CHRO has approved a mandatory interviewer certification
  program — no one interviews without being certified.

  Data supporting the program:
  - 120 active interviewers across the company
  - Bottom 30% of interviewers (by predictive accuracy) have
    zero correlation between their scores and 1-year retention
  - Top 20% of interviewers have 0.6 correlation (very strong)
  - Uncertified interviewers ask 3x more illegal/inappropriate
    questions
  - New managers have never been trained to interview

  Certification program requirements:
  1. Initial certification (must complete before interviewing)
  2. Annual recertification
  3. Multiple levels:
     - Level 1: Phone screen certified
     - Level 2: Full interview certified
     - Level 3: Lead interviewer/calibrator certified
  4. Must include both knowledge AND demonstrated skill
  5. Must be practical (can't pull people from work for days)

  Expected resistance:
  - "I've been interviewing for 20 years, I don't need
    certification"
  - "This is bureaucratic overhead"
  - "VPs shouldn't have to be certified like everyone else"
  - Engineering managers: "We should evaluate our own people"

  Task: Design the complete certification program with
  curriculum, assessment methods, certification levels,
  recertification process, and the change management plan
  to overcome resistance.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive certification program — includes curriculum for all 3 levels with clear learning objectives; assessment includes both knowledge tests and practical demonstration (mock interviews, not just quizzes); the program is efficient (not days of training); initial certification and annual recertification are differentiated; the curriculum covers legal compliance, structured interviewing, bias reduction, evaluation skills, and calibration."
    weight: 0.35
    description: "ComprehensiveCertification"
  - type: llm_judge
    criteria: "Response addresses resistance directly — provides specific counterarguments for each objection; the data case is compelling (30% of interviewers cause 80% of failures); explains why VPs are included (everyone's interviews should predict performance); frames certification as a quality standard, not bureaucracy; includes executive sponsorship and communication strategy; the change management plan would actually overcome organizational resistance."
    weight: 0.35
    description: "ResistanceManagement"
  - type: llm_judge
    criteria: "Response includes ongoing quality assurance — explains how certification improves interview quality over time; includes mechanisms for identifying and coaching underperforming interviewers; the recertification process includes review of actual interview performance data; addresses what happens when a senior leader fails certification; the program creates accountability and continuous improvement; success metrics measure both certification adoption and hiring quality improvement."
    weight: 0.30
    description: "QualityAssurance"
