meta:
  id: cross-cultural-interview
  level: 3
  course: interview-question-preparation
  type: output
  description: "Cross-cultural interview design — create interview processes that work effectively across different cultural contexts"
  tags: [cross-cultural, global, cultural-adaptation, international, advanced]

state: {}

trigger: |
  You're the Global Head of Talent Acquisition at a
  multinational company (8,000 employees across US, Japan,
  Germany, India, and Brazil). The company uses the same
  interview process worldwide, but it was designed by the
  US team and doesn't work well in other cultures.

  Cultural friction points:

  Japan:
  - STAR method doesn't work — Japanese candidates emphasize
    team contribution over individual achievement
  - Self-promotion is culturally inappropriate — strong
    candidates undersell their accomplishments
  - Direct questions feel aggressive in Japanese business
    culture
  - Candidates expect to be evaluated on potential, not just
    past performance

  Germany:
  - German candidates expect highly structured, formal
    interviews (the US casual style is perceived as
    unprofessional)
  - Works council must approve the interview process
  - Candidates provide detailed CVs with photos (standard in
    Germany, unusual in US)
  - Questions about career gaps are sensitive (Elternzeit/
    parental leave is common and protected)

  India:
  - Candidates may defer to authority (agree with interviewer
    rather than debate)
  - Family and personal questions are common and expected
    (culturally normal, legally risky in US)
  - Negotiation dynamics differ (candidates may accept lower
    offers due to different power dynamics)
  - English proficiency varies — strong technical skills may
    be hidden behind language barriers

  Brazil:
  - Interviews are more relational (building rapport matters
    more than in US/Germany)
  - Punctuality norms differ (15-minute delays are common)
  - Emotional expressiveness is valued (US-style poker face
    is seen as cold)
  - CLT labor law impacts what can be asked and how offers
    are made

  Task: Redesign the interview process for each of the 4
  non-US markets while maintaining consistent assessment
  standards. Include cultural adaptation guidelines for US-
  based hiring managers who interview international candidates.

assertions:
  - type: llm_judge
    criteria: "Response creates culturally adapted processes for all 4 markets — each market has specific modifications to the standard process that respect cultural norms; Japan: accommodates team-oriented answers and indirect communication; Germany: provides the formality and structure expected; India: accounts for deference dynamics and language barriers; Brazil: allows for relational rapport-building; modifications are respectful and based on cultural understanding, not stereotypes."
    weight: 0.35
    description: "CulturalAdaptation"
  - type: llm_judge
    criteria: "Response maintains assessment consistency — despite cultural adaptations, the same competencies are being assessed across all markets; provides calibration guidance so that a 'strong' candidate in Japan is equivalent to a 'strong' candidate in the US; explains how to evaluate team-oriented answers on the same rubric as individual-achievement answers; the assessment framework produces globally comparable results."
    weight: 0.35
    description: "AssessmentConsistency"
  - type: llm_judge
    criteria: "Response includes practical guidelines for cross-cultural interviewing — provides US-based hiring managers with cultural intelligence training materials; addresses common cross-cultural misunderstandings; includes legal compliance differences by country; the guidelines prevent cultural misinterpretation of candidate behavior (silence as respect vs. uncertainty, emotional expression as engagement vs. lack of composure); would help the company hire effectively across all 5 markets."
    weight: 0.30
    description: "PracticalGuidelines"
