meta:
  id: dei-interview-framework
  level: 3
  course: interview-question-preparation
  type: output
  description: "DEI interview framework — design an interview process that maximizes diversity, equity, and inclusion without sacrificing assessment quality"
  tags: [dei, diversity, equity, inclusion, framework, advanced]

state: {}

trigger: |
  You're the VP of Talent at a 1,000-person enterprise
  software company. The CEO has committed to specific
  diversity goals: increase underrepresented minorities in
  engineering from 12% to 25% and women in leadership from
  18% to 35% within 3 years. Current interview processes are
  identified as a key barrier.

  Data from your hiring analytics:
  - Diverse candidates pass resume screening at equal rates
  - They pass phone screens at equal rates
  - They drop off at on-site interviews at 2x the rate of
    non-diverse candidates
  - When diverse candidates reach the offer stage, they accept
    at equal rates
  - Conclusion: The on-site interview is where bias enters

  Specific findings from interview analysis:
  1. "Culture fit" questions eliminate diverse candidates at
     higher rates
  2. Interviewers rate candidates higher who share their alma
     mater (54% of engineering interviewers are from 5 schools)
  3. Panel interviews with all-male panels rate female
     candidates lower on "technical confidence"
  4. Case study presentations disadvantage candidates who are
     non-native English speakers (content is equal, delivery
     is penalized)
  5. Unstructured portions of interviews (lunch, hallway
     conversations) disproportionately influence decisions

  Task: Redesign the on-site interview process to address
  each of these 5 bias points. Create the new process,
  interviewer selection guidelines, evaluation reform, and
  measurement plan. The solution must improve diversity
  outcomes without lowering the quality bar.

assertions:
  - type: llm_judge
    criteria: "Response addresses all 5 bias points with specific interventions — replaces 'culture fit' with values-based assessment; removes alma mater visibility from evaluation; requires diverse interview panels; adapts case study evaluation to separate content from delivery; eliminates or structures informal interactions; each intervention is evidence-based and would demonstrably reduce bias at the on-site stage."
    weight: 0.35
    description: "BiasInterventions"
  - type: llm_judge
    criteria: "Response maintains assessment quality — the redesigned process assesses the same competencies through less biased methods; demonstrates that reducing bias doesn't mean lowering standards; includes evidence that structured, debiased interviews actually improve hiring quality (better predictive validity); addresses likely pushback ('we're lowering the bar') with data; the process would produce higher-quality hires, not just more diverse ones."
    weight: 0.35
    description: "QualityMaintenance"
  - type: llm_judge
    criteria: "Response includes measurement and accountability — defines metrics for tracking whether interventions reduce the 2x drop-off rate; includes interviewer selection guidelines (panel composition requirements); establishes accountability mechanisms (who monitors, how often); the measurement plan would demonstrate progress toward the CEO's diversity goals; includes a control for quality (hire quality metrics alongside diversity metrics)."
    weight: 0.30
    description: "MeasurementPlan"
