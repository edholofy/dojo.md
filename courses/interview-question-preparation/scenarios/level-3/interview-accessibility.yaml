meta:
  id: interview-accessibility
  level: 3
  course: interview-question-preparation
  type: output
  description: "Interview accessibility — design an interview process that is fully accessible to candidates with diverse disabilities"
  tags: [accessibility, disability, accommodation, ada, inclusive, advanced]

state: {}

trigger: |
  You're the Head of DEI at a 500-person company that has
  committed to becoming a disability-inclusive employer. A
  recent partnership with a disability employment organization
  highlighted that your interview process has significant
  accessibility barriers.

  Identified barriers:
  1. Timed coding assessments disadvantage candidates with ADHD,
     dyslexia, and processing speed differences
  2. Video interviews without captions exclude deaf/hard-of-
     hearing candidates
  3. Whiteboard interviews are inaccessible to candidates with
     motor disabilities or visual impairments
  4. Panel interviews can be overwhelming for neurodivergent
     candidates (sensory overload, social anxiety)
  5. Take-home assignments with tight deadlines don't account
     for candidates managing chronic conditions
  6. Office visits assume physical mobility (stairs, no
     accessible parking documented)
  7. No proactive communication about available accommodations
     — candidates must self-advocate, which many are reluctant
     to do

  Your company hires across engineering, design, sales, and
  operations roles.

  Task: Redesign the interview process to be universally
  accessible by default (not just "accommodations available
  upon request"). Create the accessible interview framework,
  interviewer training on disability awareness, and the
  accommodation request process. The goal: a process where
  candidates with disabilities have an equally excellent
  experience without having to ask for special treatment.

assertions:
  - type: llm_judge
    criteria: "Response redesigns for universal accessibility — addresses all 7 barriers with specific solutions; the solutions are built into the standard process (universal design), not bolt-on accommodations; timed assessments are replaced or restructured; video interviews include captions by default; whiteboard alternatives are provided; panel dynamics are managed for neurodivergent candidates; communication about accommodations is proactive, not reactive."
    weight: 0.35
    description: "UniversalAccessibility"
  - type: llm_judge
    criteria: "Response creates interviewer training — training covers disability awareness without being patronizing; includes specific scenarios (how to interview a candidate who uses a screen reader, who has a speech impediment, who uses a wheelchair); addresses unconscious disability bias; teaches interviewers to focus on abilities, not limitations; includes guidance on appropriate vs. inappropriate responses to disclosed disabilities."
    weight: 0.35
    description: "InterviewerTraining"
  - type: llm_judge
    criteria: "Response designs a dignified accommodation process — candidates can request accommodations without stigma; the process is simple and responsive (not bureaucratic); accommodations don't draw attention or create awkwardness; the process works for visible and invisible disabilities; includes a commitment to confidentiality; the overall approach would make candidates with disabilities feel genuinely welcome, not just legally accommodated."
    weight: 0.30
    description: "DignifiedProcess"
