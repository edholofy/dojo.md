meta:
  id: advanced-interview-shift
  level: 3
  course: interview-question-preparation
  type: output
  description: "Advanced interview shift — navigate a scenario where systemic interview failures are exposed by a wrongful termination lawsuit"
  tags: [shift, lawsuit, systemic-failure, remediation, advanced]

state: {}

trigger: |
  You're the CHRO of a 400-person company. A former employee
  who was terminated after 6 months has filed a wrongful
  termination lawsuit. Their attorney has obtained your
  interview records through discovery, and the findings are
  devastating:

  Discovery findings:
  1. The plaintiff's interview scorecard was lost — no one can
     document why they were hired or what was assessed
  2. The interviewing manager asked the plaintiff about their
     pregnancy plans during the interview (the plaintiff is a
     woman in her 30s who was later terminated while pregnant)
  3. Of 20 interviews conducted by this manager in the past
     year, zero men were asked about family plans
  4. Interview notes from 3 other recent hires contain
     comments like "great culture fit — went to same school
     as me" and "felt like someone I'd grab a beer with"
  5. The company has no documented interview standards, no
     training records, and no consistent process
  6. The plaintiff's skills assessment (which was the stated
     reason for termination) was never conducted during the
     interview — there's no evidence the skills gap was
     identified pre-hire

  The company's legal exposure is significant. The lawsuit
  alleges gender discrimination, and the interview records
  support the claim.

  You need to:
  1. Assess the damage and advise the CEO on the situation
  2. Create an immediate remediation plan
  3. Design the interview reforms that would prevent this
     from happening again
  4. Prepare talking points for the all-hands meeting where
     you announce interview process changes (without revealing
     the lawsuit details)

  Task: Create all 4 deliverables.

assertions:
  - type: llm_judge
    criteria: "Response provides an honest damage assessment — clearly explains the legal exposure (pregnancy discrimination, gender-based questioning pattern, lack of documentation creates inference of discrimination); advises the CEO on the severity without sugarcoating; identifies the systemic failures that enabled this situation; recommends immediate consultation with employment litigation counsel; the assessment would help leadership understand why this is serious."
    weight: 0.35
    description: "HonestAssessment"
  - type: llm_judge
    criteria: "Response creates comprehensive remediation and reform — immediate actions include documentation requirements, manager coaching/removal, scorecard implementation; long-term reforms include structured interview training, certification, legal compliance audits, documentation standards; the reforms directly address each discovery finding; the plan would demonstrate to a court that the company took corrective action."
    weight: 0.35
    description: "ComprehensiveRemediation"
  - type: llm_judge
    criteria: "Response handles the internal communication skillfully — the all-hands talking points announce interview reforms without revealing the lawsuit; frames changes as proactive improvement (not reactive compliance); builds employee confidence that the company cares about fair hiring; addresses likely employee questions; the communication would not create additional legal exposure; balances transparency with legal prudence."
    weight: 0.30
    description: "InternalCommunication"
