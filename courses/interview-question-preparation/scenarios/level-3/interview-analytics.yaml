meta:
  id: interview-analytics
  level: 3
  course: interview-question-preparation
  type: output
  description: "Interview analytics — build an analytics framework that measures and improves interview effectiveness"
  tags: [analytics, data-driven, measurement, improvement, advanced]

state: {}

trigger: |
  You're the Director of People Analytics at a 2,000-person
  technology company. The CHRO wants you to build an interview
  analytics program that answers: "Are our interviews actually
  predicting job performance?"

  Available data:
  - 3 years of interview scorecards (12,000 interviews across
    3,000 candidates)
  - Interviewer identity and demographics
  - Candidate demographics (where legally collected)
  - Hiring outcomes (hired, rejected, withdrew)
  - Performance reviews for all hires (1-5 rating, annual)
  - 90-day and 1-year retention data
  - Time-to-productivity estimates from managers
  - Promotion data (who was promoted within 2 years)

  Questions the CHRO wants answered:
  1. Predictive validity: Do our interview scores predict
     actual job performance? (correlation analysis)
  2. Interviewer effectiveness: Which interviewers are the
     best predictors? Which are noise?
  3. Question effectiveness: Which interview questions have
     the highest predictive value?
  4. Bias detection: Are there demographic patterns in scoring
     that suggest bias?
  5. Process optimization: Are all our interview stages adding
     signal, or are some redundant?
  6. Speed vs. quality: Does our interview speed (time-to-hire)
     correlate with hire quality?

  Task: Design the complete interview analytics program.
  Include the analysis framework, key metrics and dashboards,
  the methodology for answering each of the 6 questions, and
  recommendations for how to use the findings to improve
  interviewing.

assertions:
  - type: llm_judge
    criteria: "Response designs a rigorous analytics framework — provides specific methodologies for answering each of the 6 questions; uses appropriate statistical approaches (correlation analysis for predictive validity, disparate impact analysis for bias detection, signal-to-noise for interviewer effectiveness); acknowledges data limitations and confounding variables; the framework is sophisticated but explainable to non-technical stakeholders."
    weight: 0.35
    description: "RigorousFramework"
  - type: llm_judge
    criteria: "Response creates actionable dashboards and metrics — defines key metrics (interview-to-performance correlation, interviewer signal ratio, question predictive value, adverse impact ratios, stage redundancy scores); describes dashboard visualizations; the metrics are specific enough to drive decisions (e.g., 'remove interviewer X from panels' or 'eliminate Stage 3 which adds no signal'); includes benchmarks and targets."
    weight: 0.35
    description: "ActionableMetrics"
  - type: llm_judge
    criteria: "Response addresses the sensitive aspects — bias detection is handled with appropriate legal and ethical considerations; interviewer effectiveness data is used constructively (coaching, not punishment); privacy considerations are addressed; the analytics program improves the system, not just measures it; includes recommendations for action based on likely findings; the program would create a culture of continuous improvement in interviewing."
    weight: 0.30
    description: "SensitiveHandling"
