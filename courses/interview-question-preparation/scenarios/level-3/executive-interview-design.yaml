meta:
  id: executive-interview-design
  level: 3
  course: interview-question-preparation
  type: output
  description: "Executive interview design — create an interview process for C-suite and VP-level hires that assesses leadership, strategy, and organizational fit"
  tags: [executive, c-suite, leadership-assessment, strategic, advanced]

state: {}

trigger: |
  You're a Partner at an executive search firm. Your client
  (a $500M healthcare company, 2,500 employees) needs to hire
  a Chief Technology Officer. The previous CTO left after 18
  months — a costly failure attributed to poor culture fit
  despite strong technical credentials.

  Board context:
  - The company is transitioning from legacy systems to cloud
  - $30M technology budget, needs to grow to $50M
  - 120-person technology team (demoralized from previous CTO's
    leadership style)
  - Competing with tech companies for talent
  - Healthcare regulatory requirements (HIPAA, SOC 2)

  The failed CTO:
  - Brilliant technologist from a FAANG company
  - Tried to impose Silicon Valley culture on a healthcare org
  - Alienated the existing team by calling their work "legacy
    garbage"
  - Didn't understand healthcare compliance requirements
  - Board realized too late that technical skill wasn't enough

  Your interview process must assess:
  1. Technical vision (cloud transformation strategy)
  2. Healthcare industry acumen (regulatory, compliance)
  3. Leadership style (building vs. replacing teams)
  4. Stakeholder management (board, clinical leaders, IT team)
  5. Cultural intelligence (adapting to organizational context)
  6. Change management approach (transformation without alienation)

  Interview stages:
  - Board interview (Chair + 2 members, 90 min)
  - CEO 1:1 (60 min)
  - CIO peer interview (60 min)
  - CMO (Chief Medical Officer) cross-functional (45 min)
  - Technology team meeting (3 senior leaders, 60 min)
  - Reference deep-dives (5 references, 30 min each)

  Task: Design the complete executive interview process with
  questions, evaluation criteria, and the reference check
  protocol that would have caught the previous CTO's failure.

assertions:
  - type: llm_judge
    criteria: "Response designs a sophisticated executive interview process — each stage has a clear purpose and unique questions; the Board interview focuses on strategic vision and governance; the CEO interview assesses partnership dynamics; the CMO interview evaluates cross-functional capability; the tech team meeting assesses leadership style and team-building approach; questions are executive-appropriate (strategic, not tactical)."
    weight: 0.35
    description: "SophisticatedProcess"
  - type: llm_judge
    criteria: "Response specifically addresses the previous failure — includes questions that would detect cultural mismatch (how they approach legacy systems, how they've adapted their style across different organizations); the reference check protocol probes for the specific failure patterns (alienating teams, ignoring organizational context); the process assesses cultural intelligence alongside technical competence; the evaluation framework weights culture/leadership as highly as technical ability."
    weight: 0.35
    description: "FailurePreventionDesign"
  - type: llm_judge
    criteria: "Response includes robust reference checking — the 5 reference deep-dives are structured with specific questions tailored to different reference types; probes for leadership style, team treatment, and adaptability; includes techniques for getting honest feedback about executive candidates (who are typically well-rehearsed); the reference protocol would have caught the previous CTO's pattern of alienating teams; demonstrates executive search expertise."
    weight: 0.30
    description: "RobustReferences"
