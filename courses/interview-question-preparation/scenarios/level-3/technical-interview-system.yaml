meta:
  id: technical-interview-system
  level: 3
  course: interview-question-preparation
  type: output
  description: "Technical interview system design — create a comprehensive technical interview program for an engineering organization"
  tags: [technical, engineering, system-design, coding, program, advanced]

state: {}

trigger: |
  You're the VP of Engineering at a 300-person company with
  80 engineers. Your technical interview process has three
  problems:
  1. It's modeled after Google's process (which doesn't fit
     your company)
  2. It takes 6 hours of interviewer time per candidate
     (expensive)
  3. Your best interviewers are burned out and want to stop

  Current process (per candidate):
  - Phone screen: 1 hour (algorithm question)
  - On-site round 1: 1 hour (whiteboard algorithm)
  - On-site round 2: 1 hour (system design)
  - On-site round 3: 1 hour (coding exercise, live)
  - On-site round 4: 1 hour (behavioral)
  - Debrief: 1 hour (all 5 interviewers)
  Total: 6 hours of interviewer time, 5 hours of candidate time

  Your engineering work:
  - Not FAANG-style algorithms; you build a B2B SaaS product
  - Tech stack: Python, Django, React, PostgreSQL, AWS
  - Engineering work is: feature development, bug fixing, code
    review, database queries, API design, team collaboration
  - You've never needed anyone to reverse a binary tree on a
    whiteboard

  Hiring volume: 15-20 engineers per year across 3 levels
  (junior, mid, senior)

  Task: Redesign the technical interview process to:
  1. Test skills that actually matter for your work
  2. Reduce interviewer time from 6 hours to 3 hours max
  3. Be more predictive of actual job performance
  4. Create a sustainable interviewer rotation that doesn't
     burn people out
  Include the complete technical assessment framework, question
  bank, and interviewer rotation system.

assertions:
  - type: llm_judge
    criteria: "Response redesigns the technical assessment to test relevant skills — replaces algorithm-focused assessments with practical evaluations (code review, pair programming on real problems, take-home with actual tech stack, API design discussions); the assessment tests skills used in daily work (Django, React, SQL, API design, debugging); system design questions are relevant to B2B SaaS scale (not Google-scale); the redesigned process is more predictive of on-the-job performance."
    weight: 0.35
    description: "RelevantAssessment"
  - type: llm_judge
    criteria: "Response achieves the 3-hour target — the redesigned process fits within 3 hours of interviewer time per candidate; explains which stages were combined, shortened, or replaced with asynchronous assessments; the efficiency gains don't sacrifice assessment quality; includes a comparison of old vs. new process; the candidate experience is also improved (shorter, less stressful)."
    weight: 0.35
    description: "EfficiencyTarget"
  - type: llm_judge
    criteria: "Response creates a sustainable interviewer system — designs an interviewer rotation that distributes load fairly across the 80-person engineering team; addresses burnout with rotation limits (max N interviews per month per person); includes interviewer training for the new process; creates a question bank that interviewers can draw from; the system scales for 15-20 hires per year without overloading any individual."
    weight: 0.30
    description: "SustainableSystem"
