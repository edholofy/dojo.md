meta:
  id: interview-predictive-analytics
  level: 5
  course: interview-question-preparation
  type: output
  description: "Interview predictive analytics — build a predictive model that uses interview data to forecast candidate success and organizational outcomes"
  tags: [predictive-analytics, data-science, modeling, outcomes, master]

state: {}

trigger: |
  You're the Chief People Analytics Officer at a Fortune 100
  company (80,000 employees). You have the largest interview
  dataset in corporate history: 15 years of data from 500,000
  interviews, with matched outcome data (performance, promotion,
  retention, revenue impact).

  Your mandate: Build a predictive analytics system that
  transforms interview data from a selection tool into a
  strategic asset.

  Available data:
  - 500,000 interviews with structured scorecard data
  - Interviewer metadata (tenure, role, demographics, interview
    history)
  - Candidate metadata (anonymized demographics, experience,
    education)
  - Post-hire outcomes: Performance ratings (1-5, annual),
    promotion timing, retention, revenue attribution, manager
    satisfaction, peer ratings
  - Interview recordings (100,000 transcribed via AI)
  - Organizational data: Team composition, manager quality
    scores, business unit performance

  Research questions:
  1. Can interview scores predict 3-year career trajectory?
  2. Which interview competencies are most predictive of which
     outcomes (performance vs. retention vs. promotion)?
  3. Do interviewer characteristics moderate the predictive
     validity of interviews?
  4. Can NLP analysis of interview transcripts predict
     outcomes better than structured scores?
  5. What is the ROI of improving interview quality by 1
     standard deviation?
  6. Can interview data predict team-level outcomes (not just
     individual)?

  Deliverables:
  1. Predictive model architecture
  2. Feature engineering framework
  3. Model validation and fairness audit methodology
  4. Dashboard specification for HR and business leaders
  5. Ethical guidelines for using predictive interview analytics

  Task: Design the complete predictive analytics system.

assertions:
  - type: llm_judge
    criteria: "Response designs a sophisticated predictive model — addresses all 6 research questions with appropriate modeling approaches; the feature engineering framework extracts meaningful signals from interview data; model architecture accounts for temporal data (career trajectories over years); validation methodology is rigorous (out-of-sample testing, cross-validation); the system is technically sound while being explainable to HR leaders."
    weight: 0.35
    description: "SophisticatedModel"
  - type: llm_judge
    criteria: "Response addresses fairness and ethics rigorously — the fairness audit methodology checks for disparate impact across protected groups; NLP analysis of transcripts addresses accent, language, and cultural bias; ethical guidelines define appropriate and inappropriate uses of predictive scores; the system includes human oversight requirements; addresses the risk that predictive models perpetuate historical biases; compliant with emerging AI regulations."
    weight: 0.35
    description: "FairnessAndEthics"
  - type: llm_judge
    criteria: "Response creates actionable analytics tools — the dashboard specification translates complex models into usable insights for HR and business leaders; the ROI analysis demonstrates concrete business value; team-level predictions offer novel strategic insights; the system improves interviews over time (feedback loops); the analytics would transform how the organization thinks about hiring quality; demonstrates mastery of both data science and HR strategy."
    weight: 0.30
    description: "ActionableAnalytics"
