meta:
  id: interview-ethical-framework
  level: 5
  course: interview-question-preparation
  type: output
  description: "Interview ethics framework — develop a comprehensive ethical framework for talent assessment addressing AI, privacy, equity, and power dynamics"
  tags: [ethics, ai, privacy, equity, power-dynamics, master]

state: {}

trigger: |
  You're the Chief Ethics Officer at a major HR technology
  company whose products are used by 50,000 employers and
  process 200 million candidate assessments annually. A
  whistleblower and subsequent investigation have revealed
  serious ethical issues in your interview technology products.

  Findings:
  1. Your AI interview scoring tool rates candidates with
     Southern US accents 15% lower on "professionalism" and
     candidates with non-native English accents 23% lower
  2. Your video interview analysis tool penalizes candidates
     with facial differences, autism spectrum indicators, and
     visual impairments because it interprets atypical eye
     contact and facial expressions as "low engagement"
  3. Your interview scheduling AI routes candidates with
     "ethnic-sounding names" to less experienced recruiters
     18% more often
  4. Your interview data platform stores 200M candidate
     recordings with inadequate consent — many candidates
     don't know their interviews are recorded and analyzed
  5. Your "culture fit" scoring algorithm was trained on
     historical hire data that reflects decades of homogeneous
     hiring — it perpetuates the biases of its training data
  6. Employers using your "interview intelligence" dashboard
     can see candidate engagement scores in real-time, creating
     a surveillance dynamic that candidates aren't aware of

  The CEO has asked you to:
  1. Create an AI Ethics Framework for interview products
  2. Design a bias audit methodology
  3. Develop candidate rights and transparency standards
  4. Write the public-facing Responsible AI Report
  5. Recommend product changes for each finding

  Regulatory context: NYC LL144, EU AI Act, EEOC AI guidance,
  state biometric privacy laws (IL BIPA, TX CUBI)

  Task: Create all 5 deliverables.

assertions:
  - type: llm_judge
    criteria: "Response creates a rigorous AI ethics framework — addresses all 6 findings with specific principles and guardrails; the framework is specific to interview/assessment AI (not generic AI ethics); includes accountability mechanisms; defines the boundary between AI augmentation and AI decision-making; addresses the unique power dynamics of employment assessment; the framework is informed by established AI ethics principles while being practically implementable."
    weight: 0.35
    description: "EthicsFramework"
  - type: llm_judge
    criteria: "Response designs a comprehensive bias audit — specifies what to measure for each type of bias (accent bias, facial analysis bias, name bias, training data bias); includes statistical methods appropriate for detecting each bias type; defines audit frequency and triggers; the methodology addresses the unique challenges of auditing interview AI (unstructured data, cultural variation, disability accommodation); could be implemented by a real AI ethics team."
    weight: 0.35
    description: "BiasAudit"
  - type: llm_judge
    criteria: "Response addresses candidate rights and transparency — defines what candidates should know about AI in their assessment; creates consent standards that are genuine (not buried in terms); product change recommendations address root causes; the Responsible AI Report is honest about failures; the overall deliverable set would rebuild trust with employers, candidates, regulators, and the public; demonstrates deep understanding of the ethical dimensions of AI-powered hiring."
    weight: 0.30
    description: "CandidateRights"
