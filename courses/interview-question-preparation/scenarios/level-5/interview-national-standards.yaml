meta:
  id: interview-national-standards
  level: 5
  course: interview-question-preparation
  type: output
  description: "National interview standards — develop model legislation and industry standards for fair interview practices"
  tags: [national-standards, legislation, policy, regulation, master]

state: {}

trigger: |
  You're the Chair of a US Department of Labor task force on
  "Fair Hiring Assessment Practices." Following high-profile
  discrimination cases involving AI-powered interviews and
  systemic interview bias, Congress has directed the DOL to
  develop model standards.

  Context:
  - 73 million Americans are interviewed for jobs each year
  - No federal standards exist for interview practices
  - NYC Local Law 144 (AI bias audit) is the most advanced
    regulation but only covers automated tools
  - EEOC issues guidance but has limited enforcement for
    interview practices specifically
  - EU AI Act classifies employment AI as "high risk"
  - Multiple state laws address specific interview issues
    (salary history bans, ban-the-box) but no comprehensive
    framework

  Your task force includes:
  - Employer representatives (SHRM, Chamber of Commerce, NRF)
  - Worker advocates (AFL-CIO, NAACP, National Disability
    Rights Network)
  - I/O psychologists (SIOP representatives)
  - Technology companies (HR tech vendors)
  - State regulators (labor commissioners from CA, NY, IL)
  - Academic researchers

  Deliverables:
  1. Model Fair Interview Practices Act (legislative text,
     12-15 provisions)
  2. Implementation guidance for employers
  3. AI in interviews addendum (specific rules for automated
     assessment tools)
  4. Small business impact analysis
  5. Dissenting perspectives with responses

  The standards must balance:
  - Worker protection and fair assessment
  - Employer flexibility and hiring efficiency
  - Innovation in assessment methods
  - Small business practicality
  - Constitutional considerations (free speech, due process)
  - Enforceability and compliance costs

  Task: Create all 5 deliverables.

assertions:
  - type: llm_judge
    criteria: "Response drafts credible model legislation — includes 12-15 specific provisions covering structured interview requirements, documentation standards, bias auditing, AI disclosure and accountability, candidate rights, accommodation requirements, and enforcement mechanisms; provisions are structured like actual legislation; balances employer and worker interests; could realistically serve as model state or federal legislation."
    weight: 0.35
    description: "ModelLegislation"
  - type: llm_judge
    criteria: "Response addresses AI in interviews comprehensively — the AI addendum covers automated screening, video analysis, chatbot interviews, AI scoring, and predictive analytics; requires bias audits, candidate disclosure, human oversight, and appeal processes; distinguishes between AI-assisted and AI-decided assessments; addresses the unique challenges of regulating evolving technology; informed by NYC LL144 and EU AI Act."
    weight: 0.35
    description: "AIAddendum"
  - type: llm_judge
    criteria: "Response includes balanced impact analysis and dissent — small business analysis honestly addresses compliance costs with mitigation (phased implementation, size thresholds, free resources); dissenting perspectives represent real arguments from employer and worker sides; responses to dissent are substantive; the overall package demonstrates the complexity of employment policy; credible as a government task force output."
    weight: 0.30
    description: "BalancedAnalysis"
