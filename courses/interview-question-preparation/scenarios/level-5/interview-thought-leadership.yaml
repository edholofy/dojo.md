meta:
  id: interview-thought-leadership
  level: 5
  course: interview-question-preparation
  type: output
  description: "Interview thought leadership — write a definitive industry report on the future of interviewing"
  tags: [thought-leadership, future, industry-report, master]

state: {}

trigger: |
  You're a Partner at McKinsey's People & Organizational
  Performance practice. The World Economic Forum has
  commissioned you to write a report: "The Future of Talent
  Assessment: Why the Job Interview Must Be Reinvented."

  Your research covers:

  1. The Validity Crisis: Meta-analyses show structured
     interviews have 0.43 predictive validity — better than
     unstructured (0.24) but far from perfect. Meanwhile,
     work sample tests achieve 0.54. Why do we rely so heavily
     on the least valid method?

  2. The Bias Paradox: Despite decades of bias training,
     interview bias hasn't meaningfully decreased. The tools
     (structured interviews, diverse panels) help, but the
     fundamental format — a conversation between strangers
     making high-stakes judgments — is inherently biased.

  3. The AI Disruption: AI can now assess speech patterns,
     facial expressions, word choice, and response quality.
     But AI introduces new biases while claiming objectivity.
     The "black box" problem makes AI assessment harder to
     audit than human bias.

  4. The Candidate Revolt: 72% of candidates say interview
     processes are "dehumanizing." The power imbalance, the
     performance theater, the lack of transparency — candidates
     are demanding change.

  5. The Skills Shift: When skills have a 5-year half-life,
     assessing current skills matters less than assessing
     learning ability, adaptability, and potential. Current
     interviews are backward-looking in a forward-moving world.

  6. The Remote Revolution: Remote interviews changed the
     dynamics permanently. Asynchronous assessment, AI
     screening, and video-first processes are the new normal
     — but were they designed or just happened?

  The report should:
  - Diagnose the fundamental problems with interviewing
  - Present 5-7 evidence-based alternatives or evolutions
  - Include case studies from innovative companies
  - Be provocative but actionable
  - Address policy implications

  Task: Write the WEF report (3,000-4,000 words).

assertions:
  - type: llm_judge
    criteria: "Response writes a compelling WEF-quality report — has a strong thesis about interviewing reinvention; engages from the opening; uses research and data effectively across all 6 themes; presents 5-7 genuinely innovative alternatives; includes case studies (real or realistic); the writing is McKinsey-quality (evidence-based, structured, authoritative); appropriate length and depth for a WEF publication."
    weight: 0.35
    description: "WEFQualityReport"
  - type: llm_judge
    criteria: "Response proposes genuinely innovative alternatives — goes beyond 'do better structured interviews' to envision fundamentally different assessment approaches; considers work trials, simulation-based assessment, skills portfolios, continuous assessment, AI-human hybrid models, and other innovations; each alternative includes implementation guidance and evidence; the proposals would advance the field."
    weight: 0.35
    description: "InnovativeAlternatives"
  - type: llm_judge
    criteria: "Response addresses policy and systemic implications — considers regulatory frameworks for AI in hiring; addresses equity implications of new assessment methods; discusses employer-candidate power dynamics; includes recommendations for policymakers, employers, and technology providers; the report would influence how organizations, governments, and technology companies think about talent assessment."
    weight: 0.30
    description: "PolicyImplications"
