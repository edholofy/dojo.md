meta:
  id: interview-cross-industry-research
  level: 5
  course: interview-question-preparation
  type: output
  description: "Cross-industry interview research — conduct a landmark cross-industry study on interview practices and their impact on hiring outcomes"
  tags: [cross-industry, research, landmark-study, outcomes, master]

state: {}

trigger: |
  You're the Research Director at a workforce analytics
  consortium funded by 50 major employers. Your consortium
  has access to the largest cross-industry interview dataset
  ever assembled: 5 million interviews across 20 industries
  in 30 countries, with matched 3-year outcome data.

  Your Board has commissioned a landmark study: "The State
  of Interviewing 2026 — What the Data Says About How We
  Hire."

  Your analysis framework:

  1. Predictive Validity by Method:
     - Structured behavioral interviews
     - Unstructured interviews
     - Case studies and work samples
     - Technical coding assessments
     - Panel interviews
     - AI-assisted interviews
     - Simulation-based assessments

  2. Industry Comparison:
     - Which industries have the best interview practices?
     - Where are the biggest gaps between practice and evidence?
     - How do industry-specific methods (medical OSCEs,
       consulting case studies, tech coding challenges) compare?

  3. Bias Analysis:
     - Which interview methods produce the least bias?
     - Do structured interviews reduce demographic disparities
       in practice (not just theory)?
     - How does AI involvement affect bias patterns?

  4. Candidate Experience Impact:
     - Does candidate experience correlate with hire quality?
     - What interview practices drive positive vs. negative
       candidate experience?
     - How does interview experience affect employer brand?

  5. The AI Effect (2023-2026):
     - How has AI changed interview practices in 3 years?
     - Are AI-assisted interviews producing better outcomes?
     - The homogenization concern: Are all interviews converging?

  6. Actionable Rankings:
     - What are the 10 most impactful interview improvements?
     - Can you create a universal interview quality index?
     - What's the dollar value of improving interview quality?

  Task: Write the comprehensive research report.

assertions:
  - type: llm_judge
    criteria: "Response writes a comprehensive research report — covers all 6 analysis areas with specific findings and data; includes cross-industry comparisons with meaningful differences; the report reads like a genuine workforce analytics publication; data points are realistic and specific; the length and depth reflect a landmark annual report; includes description of data visualizations."
    weight: 0.35
    description: "ComprehensiveReport"
  - type: llm_judge
    criteria: "Response provides actionable rankings and recommendations — the '10 most impactful improvements' are specific, ranked, and evidence-based; the universal interview quality index is well-designed; the dollar value of improvement is calculated with methodology; recommendations distinguish between quick wins and strategic investments; the findings would be cited by CHROs making interview strategy decisions."
    weight: 0.35
    description: "ActionableFindings"
  - type: llm_judge
    criteria: "Response demonstrates research rigor — acknowledges limitations and confounding variables; distinguishes correlation from causation; the AI analysis is nuanced (benefits AND risks); bias analysis uses appropriate statistical methods; findings include surprises and counter-intuitive results; the report advances understanding beyond conventional wisdom about interviewing."
    weight: 0.30
    description: "ResearchRigor"
