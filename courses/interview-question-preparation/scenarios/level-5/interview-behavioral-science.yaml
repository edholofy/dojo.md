meta:
  id: interview-behavioral-science
  level: 5
  course: interview-question-preparation
  type: output
  description: "Behavioral science of interviews — apply behavioral economics and cognitive science to fundamentally improve interview decision-making"
  tags: [behavioral-science, cognitive-bias, decision-making, research, master]

state: {}

trigger: |
  You're a behavioral scientist and I/O psychologist. A
  consortium of Fortune 500 companies has funded your $5M,
  5-year research program: "The Cognitive Science of Hiring
  Decisions — Why Smart People Make Bad Hires."

  Your research questions:

  1. The Confidence Illusion: Interviewers report high
     confidence in their assessments (avg 4.2/5) but their
     predictions correlate with performance at only 0.25.
     Why the disconnect? How does overconfidence in interview
     judgment resist correction?

  2. Information Processing Limits: Interviewers make
     judgments within the first 4 minutes, then spend the
     remaining time confirming their initial impression
     (confirmation bias). How can interview structure overcome
     this cognitive shortcut?

  3. The Narrative Fallacy: Interviewers prefer candidates
     with coherent career narratives ("I've always wanted to
     work in X") over those with non-linear paths, even when
     non-linear candidates have superior skills. How does
     storytelling ability bias evaluation?

  4. Group Decision Dynamics: In calibration sessions, the
     highest-status interviewer's opinion predicts the hiring
     decision 78% of the time, regardless of other
     evaluations. How do group dynamics corrupt collective
     judgment?

  5. Emotional Contagion: Interviewer mood at the start of
     the interview predicts candidate scores more strongly
     than candidate qualifications. How does emotional state
     contaminate assessment?

  6. The Similarity Trap: Interviewers rate candidates 40%
     higher when they share educational background, hobbies,
     or communication style. This isn't conscious bias — it's
     fundamental human psychology. Can it be overcome, or must
     it be designed around?

  Year 1 deliverable: Comprehensive research framework with
  literature review, experiment designs for questions 1-6,
  and a "Cognitively-Informed Interview Protocol" based on
  existing evidence.

  Task: Write the Year 1 research report.

assertions:
  - type: llm_judge
    criteria: "Response writes a credible research report — includes a literature review with plausible citations; experiment designs are methodologically sound for each of the 6 research questions; addresses each question with appropriate depth; the writing is academic but accessible; references relevant work in behavioral economics, cognitive psychology, and I/O psychology; the report would be credible as a university research deliverable."
    weight: 0.35
    description: "AcademicCredibility"
  - type: llm_judge
    criteria: "Response produces an actionable interview protocol — the 'Cognitively-Informed Interview Protocol' translates research into practical interview design; addresses each cognitive bias with a structural intervention; the protocol is usable by trained interviewers (not just psychologists); each design element is backed by the research evidence; the protocol represents a genuine advancement over standard structured interviews."
    weight: 0.35
    description: "ActionableProtocol"
  - type: llm_judge
    criteria: "Response demonstrates deep interdisciplinary expertise — integrates behavioral economics (Kahneman, Thaler), social psychology (group dynamics, conformity), cognitive science (information processing, attention), and I/O psychology (personnel selection, predictive validity); the experiment designs are creative and feasible; findings are nuanced (not all biases are equally addressable); the research program would advance the field meaningfully."
    weight: 0.30
    description: "InterdisciplinaryExpertise"
