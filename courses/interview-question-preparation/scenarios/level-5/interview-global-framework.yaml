meta:
  id: interview-global-framework
  level: 5
  course: interview-question-preparation
  type: output
  description: "Global interview framework — design a unified interview framework for a 100,000-person multinational across 50 countries"
  tags: [global, multinational, 100k-org, cultural, regulatory, master]

state: {}

trigger: |
  You're the Global CHRO of a 100,000-person multinational
  conglomerate with operations in 50 countries across
  manufacturing, technology, financial services, and
  healthcare divisions. The CEO has mandated a unified
  interview framework after discovering that the company has
  no visibility into how it hires globally.

  Current state:
  - 3,000+ active hiring managers
  - Each country/division has its own interview practices
  - No global quality standards or metrics
  - Hiring quality varies dramatically (1-year retention
    ranges from 55% to 92% across regions)
  - 12,000 hires per year globally
  - No global technology platform for interviews
  - Legal compliance is managed locally (creating blind spots)

  Major regional challenges:
  - Americas (40K employees): Litigious environment, heavy
    regulation, strong candidate expectations
  - Europe (30K employees): Works councils, GDPR, varied
    labor laws, strong candidate protections
  - Asia-Pacific (20K employees): Cultural differences in
    interview norms, varying regulatory environments
  - Middle East/Africa (10K employees): Nationalization
    requirements (Saudization, Emiratization), diverse
    cultural norms

  Industry-specific challenges:
  - Manufacturing: High-volume hourly hiring alongside
    executive search
  - Technology: Competing with FAANG for scarce talent
  - Financial services: Regulatory fitness requirements
    (FINRA, FCA)
  - Healthcare: Licensure verification, clinical competency
    assessment

  Budget: $10M over 3 years
  Team: Global project team of 30

  Task: Design the global unified interview framework that
  achieves consistency without rigidity. Include the governance
  model, regional adaptation guidelines, technology strategy,
  and phased implementation plan.

assertions:
  - type: llm_judge
    criteria: "Response designs a sophisticated global framework — identifies universal principles and standards while allowing regional and industry-specific adaptation; the governance model distributes ownership appropriately (global center of excellence + regional leads + industry specialists); the framework accommodates manufacturing's high-volume needs alongside healthcare's licensure requirements; the design is scalable for 12,000 hires per year across 50 countries."
    weight: 0.35
    description: "SophisticatedFramework"
  - type: llm_judge
    criteria: "Response addresses regional complexity — Americas, Europe, APAC, and MEA each have specific adaptations; GDPR implications for interview data are addressed; works council requirements in Europe are accommodated; nationalization requirements in MEA are integrated; cultural interview norms across Asia-Pacific are respected; the framework would pass legal review in all major jurisdictions; regional challenges are treated as design constraints, not afterthoughts."
    weight: 0.35
    description: "RegionalComplexity"
  - type: llm_judge
    criteria: "Response includes realistic implementation — $10M budget is allocated across technology, training, consulting, and change management with justification; 3-year timeline is phased by region and division; the 30-person project team is structured effectively; includes change management for 3,000+ hiring managers across diverse cultures; success metrics measure both global consistency and regional effectiveness; the plan accounts for competing priorities and integration fatigue."
    weight: 0.30
    description: "RealisticImplementation"
