meta:
  id: interview-cultural-transformation
  level: 5
  course: interview-question-preparation
  type: output
  description: "Cultural transformation through interviews — use the interview process as a lever for transforming organizational culture"
  tags: [cultural-transformation, organizational-change, values, master]

state: {}

trigger: |
  You're an organizational psychologist engaged by the CEO of
  a 15,000-person defense contractor undergoing mandatory
  cultural transformation. The company lost a $5B government
  contract because the DoD cited "organizational culture that
  suppresses innovation and diverse perspectives" as a
  disqualifying factor.

  Culture assessment findings:
  - Interview process selects for conformity over creativity
  - "Culture fit" has been operationalized as "thinks like us"
  - Technical expertise is valued above all else — leadership,
    collaboration, and innovation are not assessed
  - Interview panels are 92% white male (reflecting leadership)
  - Candidates with military backgrounds are favored regardless
    of role relevance
  - Non-traditional candidates (career changers, boot camp
    graduates, non-STEM degrees) are systematically screened out
  - The interview process reinforces the existing culture
    rather than building the future culture

  CEO's mandate: "Our interview process is a mirror of our
  culture. It selects for the culture we have, not the culture
  we need. Fix the interview process and you start to fix the
  culture."

  The future culture (aspiration):
  - Innovation-driven (not just process-driven)
  - Diverse perspectives valued (not just diversity numbers)
  - Leadership at every level (not just hierarchy)
  - Customer-focused (not contract-focused)
  - Learning organization (not know-it-all organization)

  Budget: $3M over 24 months for interview transformation
  Constraint: Can't alienate 15,000 current employees who
  were hired under the old system

  Task: Design the interview-driven cultural transformation.
  Include the cultural diagnosis of current interview
  practices, the redesigned interview framework that selects
  for the future culture, the change management plan, and
  measurement strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling cultural transformation strategy — the diagnosis connects specific interview practices to cultural reinforcement; the redesigned interview framework explicitly assesses innovation, diverse thinking, learning ability, and collaboration; new competency models reflect the future culture, not the current one; the transformation is framed as culture-building, not just interview-fixing; the strategy addresses the root cause (hiring for conformity)."
    weight: 0.35
    description: "TransformationStrategy"
  - type: llm_judge
    criteria: "Response navigates the change management challenge — respects current employees who were hired under the old system; doesn't frame the transformation as 'you were all wrong'; involves current employees as change agents; addresses the military background preference sensitively (honor service while broadening what's valued); the communication plan builds buy-in across 15,000 employees; the approach would reduce resistance while driving genuine change."
    weight: 0.35
    description: "ChangeManagement"
  - type: llm_judge
    criteria: "Response includes measurement and accountability — defines metrics for cultural change through hiring (diversity of thinking, innovation scores, leadership indicators); tracks whether new hires bring the future culture; measures impact on organizational culture surveys over time; the $3M budget is allocated realistically; 24-month timeline has meaningful milestones; the measurement strategy would demonstrate to the DoD that the culture is genuinely changing."
    weight: 0.30
    description: "MeasurableChange"
