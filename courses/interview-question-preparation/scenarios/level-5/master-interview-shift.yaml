meta:
  id: master-interview-shift
  level: 5
  course: interview-question-preparation
  type: output
  description: "Master interview shift — navigate a scenario where a company's interview practices become the center of a federal investigation and industry reckoning"
  tags: [shift, federal-investigation, industry-reckoning, systemic-reform, master]

state: {}

trigger: |
  You're the Chief People Officer of a Fortune 100 technology
  company (120,000 employees, $150B market cap). A former
  recruiter has become a federal whistleblower, providing the
  DOJ, EEOC, and FTC with 5 years of internal data showing
  systematic interview manipulation.

  The whistleblower's evidence:

  1. Score manipulation: Internal communications show hiring
     managers routinely adjusted interview scores to match
     their preferred candidate — the structured interview
     was theater, decisions were made beforehand

  2. AI screening fraud: The company's public claim that its
     AI interview screening "reduces bias by 40%" is based on
     a study the company funded, using cherry-picked data.
     Internal analysis shows the AI actually increases racial
     bias by 12%

  3. Coordinated lowballing: Recruiters used interview data to
     systematically offer women and minorities lower starting
     salaries. The "interview performance justification"
     masked wage discrimination

  4. Reference back-channels: A network of recruiters at 8
     major tech companies shared candidate information
     informally — violating candidate consent, potentially
     constituting an antitrust violation (wage-fixing through
     information sharing)

  5. Interview data misuse: Rejected candidates' interview
     recordings were used to train AI products without consent
     — 5 million recordings monetized without disclosure

  6. Retaliation documentation: 3 internal HR employees who
     raised concerns about interview practices were given
     poor performance reviews and managed out

  Simultaneous pressures:
  - DOJ antitrust investigation (reference sharing network)
  - EEOC pattern-or-practice investigation (systematic bias)
  - FTC investigation (deceptive AI claims, data misuse)
  - Congressional hearing scheduled in 4 weeks
  - Class-action lawsuit by 10,000+ rejected candidates
  - Employee walkout organized by internal ethics advocates
  - Stock dropped 12% on the news
  - 3 board members called emergency session

  Task: Create the complete crisis response — congressional
  testimony preparation, immediate remediation (30 days),
  systemic reform (12 months), internal communication, and
  board presentation.

assertions:
  - type: llm_judge
    criteria: "Response creates a credible congressional testimony — acknowledges failures without creating additional legal liability across 3 federal investigations; addresses each finding honestly; demonstrates accountability and concrete action; the testimony is prepared for hostile questioning from both parties; distinguishes between company-level responsibility and individual accountability; reflects understanding of how congressional hearings work."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "Response provides comprehensive remediation — 30-day plan addresses immediate risks (score manipulation suspension, AI screening halt, salary equity emergency review, reference network dissolution, data misuse investigation, retaliation remediation); 12-month reform plan addresses systemic root causes; both plans are specific enough to be verifiable by investigators; addresses all 6 findings with dedicated remediation; the plans would demonstrate genuine reform to DOJ, EEOC, and FTC."
    weight: 0.35
    description: "ComprehensiveRemediation"
  - type: llm_judge
    criteria: "Response navigates the multi-stakeholder crisis — employee communication addresses the walkout concerns honestly; board presentation covers legal exposure, financial impact, and leadership accountability; the response balances legal caution with moral accountability; addresses the whistleblower's treatment (retaliation finding is the most legally dangerous); the overall response demonstrates the courage to propose real change while managing existential legal and business risks."
    weight: 0.30
    description: "CrisisNavigation"
