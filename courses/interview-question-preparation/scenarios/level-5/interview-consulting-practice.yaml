meta:
  id: interview-consulting-practice
  level: 5
  course: interview-question-preparation
  type: output
  description: "Interview consulting practice — build a consulting practice specializing in interview process design and optimization"
  tags: [consulting, practice-building, business, master]

state: {}

trigger: |
  You're a former CHRO and I/O psychologist launching a
  boutique consulting firm specializing in Interview Process
  Design & Talent Assessment Optimization. Your thesis:
  companies invest millions in recruiting (sourcing, employer
  branding, ATS technology) but almost nothing in the
  assessment itself — the interview is the weakest link in
  the talent acquisition chain.

  Your firm will offer 5 service lines:

  1. Interview Process Audit ($30K-$100K per engagement)
     - Predictive validity analysis
     - Bias detection and adverse impact analysis
     - Interviewer effectiveness assessment
     - Candidate experience evaluation
     - Benchmark against industry standards

  2. Interview Transformation Program ($150K-$400K)
     - Full process redesign
     - Competency framework development
     - Interviewer training and certification
     - Technology implementation
     - 12-month measurement program

  3. Interviewer Training & Certification ($20K-$60K)
     - Structured interview methodology
     - Bias reduction techniques
     - Legal compliance
     - Assessment skills (scoring, calibration)
     - Certification program design

  4. Executive Assessment Design ($25K-$50K per role)
     - C-suite and board assessment frameworks
     - Executive interview design
     - Reference and due diligence protocols
     - Assessment center design

  5. Interview Analytics Platform (SaaS, $1K-$5K/month)
     - Interview scoring and calibration software
     - Predictive validity tracking
     - Bias monitoring dashboard
     - Interviewer effectiveness analytics

  Build:
  1. Firm positioning and go-to-market strategy
  2. Sample engagement proposal for Service Line 2
  3. Case study demonstrating ROI
  4. First-year content marketing plan

  Task: Create all 4 deliverables.

assertions:
  - type: llm_judge
    criteria: "Response creates a credible consulting firm strategy — positioning differentiates from generalist HR consulting and I/O psychology firms; go-to-market identifies target clients (tech companies, professional services, healthcare) and channels; pricing is justified and competitive; the 5 service lines have clear value propositions; demonstrates understanding of the consulting business model."
    weight: 0.35
    description: "ConsultingStrategy"
  - type: llm_judge
    criteria: "Response writes a professional engagement proposal — structured like a real consulting proposal (executive summary, methodology, deliverables, team, timeline, pricing); the specific engagement is detailed and compelling; addresses client-specific challenges; demonstrates expertise in interview process transformation; the proposal would win business from a CHRO evaluating interview consulting options."
    weight: 0.35
    description: "EngagementProposal"
  - type: llm_judge
    criteria: "Response creates compelling case study and content plan — the case study demonstrates measurable ROI (improved predictive validity, reduced bias, better retention, time savings); the content marketing plan builds authority (topics, channels, cadence, lead generation); both demonstrate deep subject matter expertise; would establish the firm as a thought leader in interview optimization."
    weight: 0.30
    description: "CaseStudyAndContent"
