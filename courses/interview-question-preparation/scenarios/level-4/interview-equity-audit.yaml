meta:
  id: interview-equity-audit
  level: 4
  course: interview-question-preparation
  type: output
  description: "Interview equity audit — conduct a comprehensive equity audit of an organization's interview practices and outcomes"
  tags: [equity, audit, disparate-impact, analytics, remediation, expert]

state: {}

trigger: |
  You're a senior consultant at a workforce analytics firm.
  A 4,000-person healthcare company has engaged you to
  conduct a comprehensive interview equity audit after their
  annual diversity report showed declining representation
  despite increased diverse applicant flow.

  Data provided:
  - 3 years of interview data (8,000 interviews, 2,400 hires)
  - Demographics: Race, gender, age, disability status (where
    legally collected)
  - Interview scores by stage (phone screen, technical,
    behavioral, panel, final)
  - Interviewer identity and demographics
  - Hire/reject decisions with stated reasons
  - 1-year performance ratings for all hires
  - Retention data by demographic group

  Preliminary findings from your data team:
  1. Four-fifths rule violation: Black candidates pass the
     panel interview stage at 62% the rate of white candidates
     (below the 80% EEOC threshold)
  2. Gender disparity: Women receive lower "leadership
     potential" scores despite equal "current performance"
     scores
  3. Age pattern: Candidates over 45 receive lower "culture
     fit" scores but equal or higher technical scores
  4. Interviewer effect: 5 interviewers (out of 200) account
     for 40% of the adverse impact — their scores for minority
     candidates are 1.5 standard deviations below the mean
  5. Post-hire paradox: Diverse hires who do get through have
     HIGHER 1-year performance ratings than non-diverse hires,
     suggesting the interview is over-screening diverse talent

  Task: Create the complete equity audit report. Include the
  statistical analysis framework, findings presentation,
  remediation recommendations, and monitoring plan.

assertions:
  - type: llm_judge
    criteria: "Response creates a rigorous audit report — uses appropriate statistical methods (four-fifths rule analysis, disparate impact calculations, standardized score comparisons); presents all 5 findings with supporting statistical evidence; the analysis distinguishes between correlation and causation; addresses confounding variables; the report format is appropriate for executive and legal audiences; includes confidence intervals and significance levels."
    weight: 0.35
    description: "RigorousAudit"
  - type: llm_judge
    criteria: "Response provides actionable remediation — addresses each finding with specific interventions; the 5 high-impact interviewers are handled with appropriate sensitivity (coaching vs. removal from panels); 'culture fit' and 'leadership potential' evaluations are reformed; the panel interview stage receives targeted intervention; remediation plan is phased and prioritized; includes legal counsel coordination."
    weight: 0.35
    description: "ActionableRemediation"
  - type: llm_judge
    criteria: "Response addresses the post-hire paradox — explains the significance of diverse hires outperforming (the interview is a biased filter, not a quality filter); uses this finding to argue that reducing bias will improve, not reduce, hiring quality; includes ongoing monitoring metrics that track both equity and quality; the monitoring plan would catch emerging disparities before they become systemic; demonstrates deep expertise in employment equity analytics."
    weight: 0.30
    description: "PostHireParadox"
