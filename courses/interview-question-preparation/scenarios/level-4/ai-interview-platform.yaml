meta:
  id: ai-interview-platform
  level: 4
  course: interview-question-preparation
  type: output
  description: "AI interview platform — design an AI-powered interview intelligence platform that augments human interviewers"
  tags: [ai, platform, technology, augmentation, expert]

state: {}

trigger: |
  You're the VP of HR Technology at a 5,000-person company.
  The CEO saw a demo of AI-powered interview tools and wants
  to "AI-enable our entire interview process." You need to
  design a thoughtful strategy that leverages AI where it
  helps and protects against where it harms.

  Available AI capabilities (from vendor evaluations):
  1. AI note-taking: Real-time transcription and summarization
     of interviews (e.g., Metaview, BrightHire)
  2. AI question generation: Generate interview questions based
     on JD and competency frameworks
  3. AI scoring assistance: Suggest scores based on candidate
     responses (compared to rubric)
  4. AI bias detection: Flag potentially biased questions or
     evaluation patterns in real-time
  5. Video analysis: Assess candidate engagement, communication
     style through video (controversial)
  6. Predictive analytics: Predict candidate success based on
     interview data patterns
  7. Candidate chatbot: AI-powered scheduling and FAQ for
     candidates

  Ethical and legal concerns:
  - NYC Local Law 144: Requires bias audit for automated
    employment decision tools
  - Illinois BIPA: Restrictions on video analysis and biometric
    data
  - EU AI Act: High-risk classification for employment AI
  - EEOC guidance: AI tools must not cause disparate impact
  - Candidate consent: When must candidates be told AI is used?
  - Data privacy: Interview recordings and transcriptions
  - Human oversight: At what point does AI cross from tool to
    decision-maker?

  Task: Design the AI-powered interview intelligence strategy.
  Include which capabilities to adopt (and which to reject),
  the ethical framework, the human-AI workflow, regulatory
  compliance plan, and pilot program design. Be specific about
  where AI adds value and where it creates unacceptable risk.

assertions:
  - type: llm_judge
    criteria: "Response creates a nuanced AI strategy — evaluates all 7 capabilities individually with clear adopt/reject/pilot recommendations; provides specific rationale for each decision; identifies where AI adds genuine value (note-taking, scheduling, bias detection) and where it creates risk (video analysis, autonomous scoring); the strategy is informed by current AI capabilities and limitations, not hype."
    weight: 0.35
    description: "NuancedStrategy"
  - type: llm_judge
    criteria: "Response addresses ethical and legal concerns comprehensively — creates an ethical framework specific to interview AI; addresses NYC LL144, BIPA, EU AI Act, and EEOC requirements; includes candidate consent protocols; addresses data privacy for recordings and transcriptions; defines the human-AI boundary clearly (AI assists, humans decide); the compliance approach would pass regulatory review in all relevant jurisdictions."
    weight: 0.35
    description: "EthicalLegalFramework"
  - type: llm_judge
    criteria: "Response includes a practical pilot and rollout plan — the pilot program tests adopted AI capabilities with measurable success criteria; includes control groups for comparing AI-assisted vs. traditional interviews; measures both efficiency gains and quality/fairness outcomes; the rollout is phased based on pilot results; includes ongoing monitoring and kill switches; the plan manages the CEO's expectations about what AI can and cannot do."
    weight: 0.30
    description: "PracticalPilot"
