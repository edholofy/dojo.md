meta:
  id: enterprise-interview-governance
  level: 4
  course: interview-question-preparation
  type: output
  description: "Enterprise interview governance — design a governance framework for interviewing standards across a 10,000-person organization"
  tags: [governance, enterprise, standards, compliance, expert]

state: {}

trigger: |
  You're the Chief People Officer of a 10,000-person global
  financial services company. An internal audit revealed that
  the company has no consistent interview standards, creating
  legal, quality, and equity risks across 40 offices in 12
  countries.

  Audit findings:
  - 800 hiring managers, each with different interview approaches
  - 15 different interview formats in use (some with no
    structure whatsoever)
  - No centralized scorecard system — 60% of interviews have
    no documentation
  - Compliance violations detected in 3 countries (Germany:
    works council not consulted; US: ADA violations; Japan:
    inappropriate personal questions)
  - Adverse impact analysis shows statistically significant
    bias against candidates over 50 across multiple functions
  - Interview-to-hire ratio varies from 2:1 (best teams) to
    12:1 (worst teams) — massive efficiency gap
  - No interviewer training or certification exists

  Board mandate: Implement enterprise interview governance
  within 18 months. Budget: $1.5M.

  Requirements:
  1. Global interview standards with local compliance adaptations
  2. Interviewer certification program (all 800 managers)
  3. Technology platform for scorecard, scheduling, and analytics
  4. Quality assurance and continuous improvement mechanisms
  5. Regulatory compliance across all 12 countries
  6. Change management for 800 managers across diverse cultures

  Task: Design the complete enterprise interview governance
  framework with all 6 requirements addressed.

assertions:
  - type: llm_judge
    criteria: "Response designs enterprise-scale governance — addresses all 6 requirements with specific, implementable designs; global standards allow for local legal and cultural adaptation; the certification program scales to 800 managers across 12 countries; technology recommendations are realistic (ATS integration, scorecard platform, analytics); quality assurance includes ongoing monitoring, not just initial implementation; the framework addresses the specific audit findings."
    weight: 0.35
    description: "EnterpriseGovernance"
  - type: llm_judge
    criteria: "Response addresses multi-country compliance — provides specific compliance requirements for each major market (US ADA/EEOC, German works council/AGG, Japan labor law, and others); the governance framework accommodates legal differences without creating chaos; includes a legal review process for interview questions by jurisdiction; the framework would pass regulatory scrutiny in all 12 countries."
    weight: 0.35
    description: "MultiCountryCompliance"
  - type: llm_judge
    criteria: "Response includes realistic implementation and budget — $1.5M is allocated across technology, training, consulting, and change management with justification; 18-month timeline is phased logically; change management addresses cultural differences across 40 offices; includes executive sponsorship model; success metrics measure both compliance and quality improvement; the plan is ambitious but achievable."
    weight: 0.30
    description: "RealisticImplementation"
