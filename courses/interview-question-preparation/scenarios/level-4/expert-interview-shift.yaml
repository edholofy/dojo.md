meta:
  id: expert-interview-shift
  level: 4
  course: interview-question-preparation
  type: output
  description: "Expert interview shift — navigate a crisis where a viral social media post exposes systemic interview discrimination"
  tags: [shift, social-media-crisis, viral, systemic-discrimination, expert]

state: {}

trigger: |
  You're the CHRO of a 1,500-person technology company. A
  viral TikTok video (2.5M views and counting) from a
  rejected candidate has exposed your interview process.

  The video shows:
  1. The candidate (Black woman, experienced software engineer)
     recorded her phone screen audio (legal in her state)
  2. The recruiter's first question: "So, is [candidate's
     name] your real name? That's unusual." (her name is
     Adesola — a common Yoruba name)
  3. The recruiter asked about her university (Howard, an HBCU)
     with surprise: "Oh, Howard? Do they have a strong CS
     program?"
  4. When discussing salary, the recruiter quoted $120K —
     $30K below the posted range minimum of $150K
  5. The recruiter ended with: "I'll be honest, your background
     is a bit unconventional for us, but we try to be open-
     minded"

  The aftermath:
  - #NameIsAdesola trending on Twitter/X
  - 3 current employees posted corroborating stories of
     microaggressions in their own interviews
  - The Head of Engineering (who is Black) publicly criticized
     the company on LinkedIn
  - Glassdoor reviews mentioning racism jumped from 2 to 47
     in 48 hours
  - 4 engineering candidates withdrew from active processes
  - The recruiter was a 2-year employee with positive reviews
     and no prior complaints
  - CEO is getting calls from board members and investors

  Task: Create the immediate response plan (first 72 hours),
  the systemic remediation plan, the recruiter accountability
  process, and the long-term interview reform program.
  Address both the PR crisis and the underlying systemic
  issues it exposed.

assertions:
  - type: llm_judge
    criteria: "Response creates an effective immediate response — the first 72 hours include public acknowledgment, internal communication to employees, direct outreach to the candidate, CEO statement that's authentic (not corporate PR), social media response strategy, and protection of the recruiter from online harassment while holding them accountable; the response is swift, genuine, and doesn't minimize the harm."
    weight: 0.35
    description: "ImmediateResponse"
  - type: llm_judge
    criteria: "Response addresses systemic issues — goes beyond the individual incident to examine what system allowed this to happen; the remediation includes recruiter training reform, interview process audit, compensation equity review (the lowball offer), name bias training, HBCU and non-traditional pipeline development; addresses the 3 current employees' corroborating stories; the reforms are structural, not just individual coaching."
    weight: 0.35
    description: "SystemicRemediation"
  - type: llm_judge
    criteria: "Response handles the recruiter accountability thoughtfully — addresses whether the recruiter's behavior was conscious bias, unconscious bias, or systemic failure (probably all three); the accountability process is fair but clear; doesn't scapegoat the individual while ignoring the system; addresses that the recruiter had positive reviews (the system didn't detect the problem); the long-term reform program would prevent similar incidents; demonstrates genuine crisis leadership."
    weight: 0.30
    description: "AccountabilityAndReform"
