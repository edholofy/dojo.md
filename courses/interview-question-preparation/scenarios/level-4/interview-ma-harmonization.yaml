meta:
  id: interview-ma-harmonization
  level: 4
  course: interview-question-preparation
  type: output
  description: "M&A interview harmonization — merge two companies' interview processes during a post-acquisition integration"
  tags: [ma, merger, integration, harmonization, expert]

state: {}

trigger: |
  You're the CHRO leading people integration for a major
  acquisition. AcquirerCo (4,000 employees, enterprise
  software, mature processes) acquired StartupCo (300
  employees, consumer app, minimal processes). Both companies
  need to continue hiring through the integration — you can't
  pause hiring for 6 months to figure things out.

  AcquirerCo's interview process:
  - Highly structured: 6-stage process for all roles
  - Interviewer certification required (Level 1-3)
  - Standardized scorecards with 5-point rubrics
  - Panel calibration sessions for every candidate
  - Average time-to-hire: 45 days
  - 1-year retention: 88%
  - Candidate experience rating: 3.8/5 (candidates say it's
    thorough but slow and impersonal)

  StartupCo's interview process:
  - Minimal structure: Coffee chat + working session + team
    hang
  - No formal scorecards (Slack DM: "thumbs up / thumbs down")
  - Founders interview every candidate personally
  - Average time-to-hire: 12 days
  - 1-year retention: 72%
  - Candidate experience rating: 4.6/5 (candidates love the
    speed and personal touch)

  Integration challenges:
  1. StartupCo's founders refuse to use "corporate" interview
     processes ("This is why we built our own company")
  2. AcquirerCo's hiring managers think StartupCo's process is
     "unprofessional and risky"
  3. StartupCo candidates (in pipeline) are being lost to the
     slower AcquirerCo process
  4. Two teams are hiring for overlapping roles with different
     standards
  5. Cultural identity: StartupCo employees fear losing their
     culture through process standardization

  Hiring needs during integration:
  - AcquirerCo: 50 hires over next 6 months
  - StartupCo: 25 hires over next 6 months
  - 10 roles span both organizations

  Task: Design the interview integration strategy that merges
  the best of both processes. Address each challenge directly.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical integration strategy — proposes a unified process that takes the best of both (AcquirerCo's structure + StartupCo's speed and personal touch); the integration is phased, not immediate; addresses all 5 challenges with specific solutions; the unified process has clear standards while allowing for cultural expression; the strategy would maintain hiring velocity during integration."
    weight: 0.35
    description: "PracticalIntegration"
  - type: llm_judge
    criteria: "Response handles the cultural conflict — addresses the founders' resistance with empathy and pragmatism; shows AcquirerCo managers what they can learn from StartupCo (speed, candidate experience); doesn't simply impose AcquirerCo's process on StartupCo; preserves elements of both cultures; the integration approach would reduce resentment from both sides; includes specific compromises and non-negotiables."
    weight: 0.35
    description: "CulturalConflictResolution"
  - type: llm_judge
    criteria: "Response addresses the immediate hiring needs — provides a transitional process for the 6-month integration period; solves the pipeline candidate loss problem; handles the 10 overlapping roles with consistent standards; the 75 total hires during integration aren't compromised by process uncertainty; includes communication to candidates about what to expect during the transition."
    weight: 0.30
    description: "ImmediateHiringNeeds"
