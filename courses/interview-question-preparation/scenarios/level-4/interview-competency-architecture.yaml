meta:
  id: interview-competency-architecture
  level: 4
  course: interview-question-preparation
  type: output
  description: "Interview competency architecture — design the competency-based interview architecture for an entire 5,000-person organization"
  tags: [competency-architecture, organizational, systematic, expert]

state: {}

trigger: |
  You're an organizational psychologist consulting for a
  5,000-person professional services firm. The firm has decided
  to build a competency-based talent system, and interviews
  are the centerpiece. Currently, every practice group hires
  differently — you need to create a unified competency
  architecture that connects hiring to development to
  promotion.

  The firm's structure:
  - 5 practice groups: Strategy, Technology, Operations, Risk,
    and Digital
  - 6 career levels: Analyst, Consultant, Senior Consultant,
    Manager, Senior Manager, Partner
  - 1,000 hires per year across all levels and practices

  Your deliverables:
  1. Universal competency model (competencies that apply to
     all roles across all practices)
  2. Practice-specific competency overlay (technical
     competencies unique to each practice)
  3. Level-specific behavioral indicators (how each competency
     manifests at each of the 6 levels)
  4. Interview question library mapped to the competency model
     (at least 3 questions per competency per level)
  5. Assessment methodology (how to combine competency scores
     across interviewers into a hiring decision)
  6. Connection to development (how interview-identified
     strengths and gaps feed into onboarding and development
     plans)

  Constraint: The model must be simple enough for 500 hiring
  managers to use consistently, but rigorous enough to produce
  valid assessments.

  Task: Create the complete competency-based interview
  architecture.

assertions:
  - type: llm_judge
    criteria: "Response creates a coherent competency architecture — universal competencies are genuinely universal (apply across Strategy, Technology, Operations, Risk, and Digital); practice-specific overlays add relevant technical dimensions without creating excessive complexity; the 6-level behavioral indicators show clear progression; the overall model is comprehensive yet manageable; a hiring manager can quickly find the right competencies and questions for their hire."
    weight: 0.35
    description: "CoherentArchitecture"
  - type: llm_judge
    criteria: "Response provides a usable question library — at least 3 questions per competency per level (minimum 90+ questions); questions are behavioral and varied (not just rephrased versions of the same question); the library is organized for easy retriewer; questions genuinely differentiate between levels; the library scales across 1,000 hires per year; includes guidance on selecting questions from the library for specific roles."
    weight: 0.35
    description: "UsableQuestionLibrary"
  - type: llm_judge
    criteria: "Response connects interviews to the talent lifecycle — interview-identified competency gaps feed into onboarding plans; the same competency model is used for development conversations and promotion decisions; this creates consistency from hiring through career progression; the assessment methodology produces competency profiles, not just pass/fail decisions; the architecture would transform the firm's talent management."
    weight: 0.30
    description: "TalentLifecycleConnection"
