meta:
  id: interview-candidate-experience
  level: 4
  course: interview-question-preparation
  type: output
  description: "Interview candidate experience transformation — redesign the interview experience to become a competitive advantage in talent acquisition"
  tags: [candidate-experience, employer-brand, nps, competitive-advantage, expert]

state: {}

trigger: |
  You're the VP of Talent Experience at a 2,500-person
  technology company. Your Glassdoor interview rating is 2.8/5,
  and candidate NPS (Net Promoter Score) is -15. This is
  actively hurting your ability to hire — candidates share
  their bad experiences on social media, and you've lost 3
  senior engineering candidates to competitors who cited the
  interview experience as the reason.

  Candidate feedback themes (from 500 survey responses):
  1. "The process took 6 weeks and nobody communicated with me
     for 2 weeks in the middle" (communication gaps)
  2. "I took a full day off work for 5 interviews and 3 of
     them asked the same questions" (redundancy/disrespect)
  3. "The interviewer was 15 minutes late and seemed unprepared"
     (interviewer accountability)
  4. "I was rejected with a generic email after 4 rounds — no
     feedback at all" (impersonal rejection)
  5. "The case study took me 8 hours but they clearly didn't
     read it" (free work perception)
  6. "I felt like I was being interrogated, not having a
     conversation" (power imbalance)
  7. "The office visit was disorganized — I sat in a lobby for
     30 minutes and nobody came to get me" (logistics failures)

  Your goals:
  - Candidate NPS: -15 → +30 within 12 months
  - Glassdoor interview rating: 2.8 → 4.2 within 12 months
  - Offer acceptance rate: 62% → 78% within 12 months
  - No increase in time-to-hire (currently 38 days)

  Budget: $150K for the transformation

  Task: Design the candidate experience transformation
  program. Address each of the 7 feedback themes, create the
  new experience framework, and include the measurement and
  accountability system.

assertions:
  - type: llm_judge
    criteria: "Response addresses all 7 feedback themes — each theme has a specific intervention; communication gaps get an automated + human touchpoint system; redundancy is solved through interview planning; interviewer accountability is established; rejection experience is redesigned; case study issues are resolved; the interrogation feel is replaced with genuine conversation; logistics are fixed; each solution is practical and implementable."
    weight: 0.35
    description: "ThemeResolution"
  - type: llm_judge
    criteria: "Response creates a measurable transformation program — includes specific metrics for each goal (NPS, Glassdoor, acceptance rate); the measurement system captures candidate feedback at multiple touchpoints; accountability mechanisms hold interviewers and recruiters to experience standards; the $150K budget is allocated across technology, training, and process changes; 12-month timeline has quarterly milestones."
    weight: 0.35
    description: "MeasurableTransformation"
  - type: llm_judge
    criteria: "Response positions candidate experience as a competitive advantage — goes beyond fixing problems to creating a differentiated experience; includes elements that would make candidates talk positively about the company (regardless of outcome); addresses the relationship between candidate experience and employer brand; the transformed experience would help win competitive offers; demonstrates understanding that rejected candidates are also part of the employer brand."
    weight: 0.30
    description: "CompetitiveAdvantage"
