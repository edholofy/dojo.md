meta:
  id: board-level-hiring
  level: 4
  course: interview-question-preparation
  type: output
  description: "Board-level hiring — design the assessment process for board director recruitment at a public company"
  tags: [board, directors, governance, public-company, expert]

state: {}

trigger: |
  You're a Senior Partner at a board governance consulting
  firm. A Fortune 500 industrial company ($12B revenue,
  35,000 employees) needs to recruit 2 new independent board
  directors. The Nominating and Governance Committee has
  engaged you.

  Board context:
  - Current board: 11 directors (2 vacancies due to retirement)
  - Board demographics: 9 men, 2 women; 10 white, 1 Asian
  - ISS and Glass Lewis have flagged the board for lack of
    diversity
  - Activist investor (12% stake) is pushing for board refresh
  - Proxy season is 6 months away

  Skills gaps on the current board:
  1. Cybersecurity expertise (no director has cyber background;
     company had a data breach last year)
  2. Digital transformation experience (company needs to
     modernize; current board is traditional industrial)
  3. ESG/sustainability knowledge (increasing regulatory and
     investor pressure)

  Candidate assessment is fundamentally different for board
  directors than for employees:
  - You can't ask a sitting CEO to take a test
  - Board candidates are evaluating the company as much as
    you're evaluating them
  - The assessment is relational, not transactional
  - References come from public record and networks, not
    candidate-provided lists
  - Compensation is disclosed publicly (stock grants, retainer)

  Assessment dimensions:
  1. Domain expertise (cyber, digital, ESG)
  2. Board governance experience
  3. Independence and judgment
  4. Cultural fit with existing board dynamics
  5. Diversity contribution
  6. Time commitment and potential conflicts

  Task: Design the complete board director assessment process.
  Include candidate identification strategy, the assessment
  methodology, interview guide for Nominating Committee
  meetings, reference and due diligence protocol, and the
  recommendation framework.

assertions:
  - type: llm_judge
    criteria: "Response designs a sophisticated board assessment process — recognizes that board recruitment is fundamentally different from employee hiring; the assessment methodology is appropriate for senior executives (relational, not testing); interview guides are designed for Nominating Committee use; due diligence includes public record review, network references, and potential conflicts; the process addresses ISS/Glass Lewis diversity concerns and activist investor pressure."
    weight: 0.35
    description: "SophisticatedProcess"
  - type: llm_judge
    criteria: "Response addresses the specific board needs — prioritizes the 3 skills gaps (cyber, digital, ESG); considers how 2 new directors can address multiple gaps; addresses the diversity imperative without making it the sole criterion; considers the activist investor's perspective; the candidate identification strategy targets the right pools (current/former CISOs, CDOs, CSOs); the process is designed to complete before proxy season."
    weight: 0.35
    description: "SpecificBoardNeeds"
  - type: llm_judge
    criteria: "Response demonstrates board governance expertise — understands the nuances of board dynamics (how new directors interact with existing members); addresses independence requirements (NYSE listing standards, SEC rules); considers director compensation and time commitment; includes the mutual evaluation aspect (candidate evaluating the company); the recommendation framework helps the Nominating Committee make defensible choices; reflects how top governance firms approach board recruitment."
    weight: 0.30
    description: "GovernanceExpertise"
