meta:
  id: interview-innovation-lab
  level: 4
  course: interview-question-preparation
  type: output
  description: "Interview innovation lab — design and run experiments to test new interview methods and measure their effectiveness"
  tags: [innovation, experimentation, research, methodology, expert]

state: {}

trigger: |
  You're the VP of People Science at a 3,000-person technology
  company known for innovation. The CEO has funded an
  "Interview Innovation Lab" — a dedicated team to research,
  design, and test new interview methods. Budget: $300K/year.
  Team: 2 I/O psychologists, 1 data scientist, 1 UX researcher.

  The CEO's thesis: "Traditional interviews haven't changed in
  50 years. We spend billions on product R&D but zero on
  hiring R&D. I want us to invent the future of interviewing."

  Current state:
  - Standard structured behavioral interviews (effective but
    not innovative)
  - Predictive validity of current process: 0.38 (good, but
    room for improvement)
  - 1-year retention: 84%
  - Time-to-hire: 32 days

  Experimental ideas to test:
  1. "Day-in-the-Life" immersion: Candidates spend 4 hours
     doing actual work with the team before a formal interview
  2. Reverse interview: Candidates interview the team first
     (30 min), then the team interviews them (30 min)
  3. Async video + AI scoring: Candidates record responses to
     5 standardized questions; AI provides initial scoring
  4. Peer-selected hiring: The team votes on candidates after
     working sessions (no manager veto)
  5. Skills-only blind review: All demographic info removed;
     assessment based entirely on work sample and skills test
  6. Simulation-based assessment: Candidates work through a
     realistic job simulation (inbox exercise, meeting
     simulation, prioritization exercise)

  For each experiment, you need:
  - Hypothesis
  - Experimental design (treatment vs. control)
  - Sample size and statistical power requirements
  - Measurement criteria (validity, candidate experience,
    diversity impact, efficiency)
  - Ethical considerations
  - Go/no-go decision framework

  Task: Design the Interview Innovation Lab's Year 1 research
  agenda with at least 3 experiments fully designed.

assertions:
  - type: llm_judge
    criteria: "Response designs a rigorous research agenda — selects at least 3 experiments with clear rationale for prioritization; each experiment has a specific hypothesis, experimental design with proper controls, sample size calculations, and measurement criteria; the research methodology is scientifically sound (I/O psychology standards); the agenda balances ambitious innovation with practical constraints."
    weight: 0.35
    description: "RigorousResearch"
  - type: llm_judge
    criteria: "Response addresses ethical and practical considerations — each experiment considers candidate consent, fairness implications, potential adverse impact on protected groups, data privacy, and operational feasibility; the go/no-go framework includes ethical checkpoints; acknowledges that not all experiments will succeed; the lab's approach would withstand scrutiny from an ethics review board."
    weight: 0.35
    description: "EthicalPractical"
  - type: llm_judge
    criteria: "Response demonstrates I/O psychology expertise — uses appropriate research methodology (experimental design, statistical validity, predictive validity measurement); references relevant research on interview effectiveness; the experiments are genuinely innovative, not just repackaged existing methods; the Year 1 agenda is realistic for a 4-person team with $300K; the lab would produce publishable findings and practical improvements."
    weight: 0.30
    description: "IOPsychExpertise"
