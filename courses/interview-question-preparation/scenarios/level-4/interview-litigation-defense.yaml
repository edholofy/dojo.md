meta:
  id: interview-litigation-defense
  level: 4
  course: interview-question-preparation
  type: output
  description: "Interview litigation defense — build an interview process designed to withstand legal scrutiny and support employment litigation defense"
  tags: [litigation, legal-defense, documentation, compliance, expert]

state: {}

trigger: |
  You're an employment law consultant advising a 2,000-person
  company. The company has faced 3 discrimination lawsuits in
  2 years — all related to interview practices — and settled
  2 of them for a combined $1.2M. The Board has mandated a
  "litigation-proof" interview process.

  Cases that led to the mandate:
  1. Age discrimination (settled $800K): 55-year-old candidate
     rejected after interviewer notes said "may not keep up
     with our pace" and "probably overqualified"
  2. Disability discrimination (settled $400K): Candidate
     with visible disability was asked "Can you really handle
     this job?" during interview; no documentation of skills
     assessment
  3. Pregnancy discrimination (ongoing): Candidate was asked
     about childcare plans; was rejected after interview;
     filed EEOC charge; company has no documentation showing
     legitimate rejection reason

  Common failures across all cases:
  - No consistent documentation standards
  - No interviewer training records
  - Subjective, legally problematic language in interview notes
  - No evidence that rejection decisions were based on job-
    related criteria
  - "Culture fit" used as rejection reason with no definition
  - No adverse impact monitoring

  Task: Design the litigation-resistant interview framework.
  Include documentation standards, legal training requirements,
  interviewer guidelines for note-taking, adverse impact
  monitoring, and a decision documentation template that
  would withstand discovery in employment litigation.

assertions:
  - type: llm_judge
    criteria: "Response designs a litigation-resistant framework — addresses each of the 3 case failures with specific preventive measures; documentation standards require job-related evidence for every evaluation; interviewer training includes legal compliance certification; note-taking guidelines specify what language to use and avoid; the decision documentation template creates a defensible record; adverse impact monitoring catches patterns before they become lawsuits."
    weight: 0.35
    description: "LitigationResistantFramework"
  - type: llm_judge
    criteria: "Response provides specific documentation guidance — includes templates for interview notes that use legally safe language; provides examples of problematic notes vs. proper notes; explains what should and shouldn't be written down; the decision template requires evidence-based justification tied to job requirements; documentation is practical enough that busy interviewers will actually complete it; records would withstand discovery."
    weight: 0.35
    description: "DocumentationGuidance"
  - type: llm_judge
    criteria: "Response demonstrates employment law expertise — references relevant statutes (ADA, ADEA, Title VII, Pregnancy Discrimination Act); addresses both individual case prevention and systemic risk reduction; includes adverse impact analysis methodology; explains how proper interview documentation supports legitimate business defense; the framework balances legal protection with hiring effectiveness; would satisfy the Board's mandate."
    weight: 0.30
    description: "LegalExpertise"
