meta:
  id: situational-questions
  level: 1
  course: interview-question-preparation
  type: output
  description: "Situational questions — prepare hypothetical scenario-based interview questions for a customer service role"
  tags: [situational, hypothetical, customer-service, beginner]

state: {}

trigger: |
  You're the Customer Service Team Lead at an e-commerce
  company. You're hiring a Customer Service Representative
  and want to use situational (hypothetical) questions to
  assess how candidates would handle real scenarios they'll
  face on the job.

  Common situations this rep will encounter:
  1. Angry customer whose order arrived damaged
  2. Customer requesting a refund outside the return window
  3. Customer who has been transferred 3 times and is frustrated
  4. Customer with a language barrier
  5. Customer threatening to post a negative review unless they
     get a full refund plus credit
  6. System outage during peak hours with customers waiting
  7. Discovering a colleague gave a customer incorrect info

  Company policies:
  - 30-day return window (14 days for electronics)
  - Refunds processed within 5-7 business days
  - Reps can offer up to $25 credit without manager approval
  - Reps cannot offer refunds over $200 without manager approval
  - Average handle time target: 8 minutes
  - Customer satisfaction target: 90%+

  Task: Write 7 situational interview questions (one for each
  scenario) with an evaluation rubric. Include what an
  excellent, acceptable, and poor answer looks like for each.

assertions:
  - type: llm_judge
    criteria: "Response writes 7 clear situational questions — each presents a specific, realistic scenario the candidate would face on the job; questions are framed as 'What would you do if...' or 'How would you handle...'; scenarios incorporate the company policies provided (return window, credit limits, approval thresholds); questions progress from straightforward to more nuanced; the scenarios would genuinely differentiate between strong and weak candidates."
    weight: 0.35
    description: "ClearSituationalQuestions"
  - type: llm_judge
    criteria: "Response includes a 3-tier evaluation rubric — for each question, describes what excellent, acceptable, and poor answers look like; excellent answers demonstrate empathy, policy knowledge, creative problem-solving, and de-escalation skills; poor answers show rigidity, lack of empathy, or policy violations; the rubric is specific enough to score consistently across different interviewers; accounts for the fact that candidates won't know internal policies."
    weight: 0.35
    description: "ThreeTierRubric"
  - type: llm_judge
    criteria: "Response is realistic and useful — questions reflect real customer service challenges (not textbook scenarios); the evaluation guidance is practical for a team lead conducting interviews; includes notes on how to introduce the company context (policies) to candidates before asking; the question set would predict actual job performance in a customer service role; appropriate difficulty for an entry-level hire."
    weight: 0.30
    description: "RealisticAndUseful"
