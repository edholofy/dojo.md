meta:
  id: basic-behavioral-questions
  level: 1
  course: interview-question-preparation
  type: output
  description: "Basic behavioral questions — prepare behavioral interview questions using the STAR method for a common role"
  tags: [behavioral, star-method, basics, beginner]

state: {}

trigger: |
  You're a hiring manager at a mid-size marketing agency.
  You're interviewing candidates for a Marketing Coordinator
  position (entry-level, 0-2 years experience). You've never
  conducted a behavioral interview before and need help
  preparing questions.

  Role requirements:
  - Manage social media calendars across 5 client accounts
  - Coordinate with designers and copywriters on deliverables
  - Track campaign performance metrics
  - Communicate with clients on project updates
  - Handle multiple deadlines simultaneously

  Key competencies you're assessing:
  1. Organization and time management
  2. Communication skills
  3. Teamwork and collaboration
  4. Adaptability and problem-solving
  5. Attention to detail

  Task: Write 10 behavioral interview questions (2 per
  competency) using the STAR framework (Situation, Task,
  Action, Result). For each question, include what a strong
  answer looks like and red flags to watch for.

assertions:
  - type: llm_judge
    criteria: "Response writes 10 behavioral questions properly structured — each question starts with 'Tell me about a time when...' or similar behavioral prompt; questions are specific enough to elicit real examples, not hypothetical answers; each question maps clearly to one of the 5 competencies; questions are appropriate for entry-level candidates (don't assume extensive work experience — allow for academic, volunteer, or internship examples); includes 2 questions per competency."
    weight: 0.35
    description: "ProperBehavioralQuestions"
  - type: llm_judge
    criteria: "Response includes evaluation guidance for each question — describes what a strong STAR answer looks like (specific situation, clear actions taken by the candidate, measurable results); identifies red flags (vague answers, blaming others, no results, hypothetical responses instead of real examples); the guidance would help a first-time interviewer distinguish between strong and weak answers; evaluation criteria are specific to each competency."
    weight: 0.35
    description: "EvaluationGuidance"
  - type: llm_judge
    criteria: "Response is practical for a first-time interviewer — explains the STAR method briefly; questions flow naturally in conversation order; includes tips for follow-up probes; acknowledges that entry-level candidates may have limited professional experience; the overall question set covers the role's requirements without being exhausting (appropriate for a 45-60 minute interview); would help the hiring manager conduct a fair, effective interview."
    weight: 0.30
    description: "PracticalForBeginners"
