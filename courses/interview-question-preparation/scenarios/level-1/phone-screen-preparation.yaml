meta:
  id: phone-screen-preparation
  level: 1
  course: interview-question-preparation
  type: output
  description: "Phone screen preparation — prepare a structured phone screen template for initial candidate assessment"
  tags: [phone-screen, initial-assessment, structured, template, beginner]

state: {}

trigger: |
  You're a recruiter at a mid-size company. You conduct 10-15
  phone screens per week across different roles. Currently,
  each screen is ad-hoc — you wing it based on the resume.
  Your manager wants you to create a standardized phone screen
  template that you can adapt for any role.

  Phone screen parameters:
  - Duration: 30 minutes
  - Purpose: Determine if candidate should advance to on-site
  - Not meant to be comprehensive — just filter obviously
    mismatched candidates

  What you need to assess in every phone screen:
  1. Role fit — Does the candidate understand what they're
     applying for? Are they qualified?
  2. Motivation — Why are they looking? Why this company?
  3. Logistics — Salary expectations, start date, location/
     remote preferences, visa status
  4. Communication — Can they articulate clearly and
     professionally?
  5. Red flags — Gaps, frequent job changes, mismatched
     expectations

  You currently phone screen for these types of roles:
  - Engineering (software, data, DevOps)
  - Sales (AEs, SDRs, managers)
  - Operations (coordinators, managers)
  - Marketing (content, demand gen, product marketing)

  Task: Create a standardized phone screen template with a
  core section (same for all roles) and customizable sections
  for different role types. Include a pass/fail decision
  framework.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical phone screen template — includes a clear structure for a 30-minute call (intro, core questions, role-specific questions, logistics, candidate questions, close); core section covers role fit, motivation, and logistics; the template can be completed within 30 minutes; includes time allocations for each section; the template is structured enough for consistency but flexible enough for natural conversation."
    weight: 0.35
    description: "PracticalTemplate"
  - type: llm_judge
    criteria: "Response includes customizable sections for different role types — provides role-specific questions for at least engineering, sales, operations, and marketing; the role-specific questions are brief (3-5 per type, fitting within the 30-minute window); questions are appropriate for a phone screen (high-level, not deep technical); each role type's questions assess the most important differentiators for that function."
    weight: 0.35
    description: "RoleCustomization"
  - type: llm_judge
    criteria: "Response includes a pass/fail decision framework — provides clear criteria for advancing vs. rejecting candidates; uses a simple scoring or yes/no system; identifies deal-breakers (salary mismatch, location mismatch, missing critical qualifications); includes a 'maybe' category with guidance on when to advance borderline candidates; the framework helps make consistent, defensible decisions across 10-15 screens per week."
    weight: 0.30
    description: "DecisionFramework"
