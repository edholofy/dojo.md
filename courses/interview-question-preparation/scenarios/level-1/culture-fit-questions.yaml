meta:
  id: culture-fit-questions
  level: 1
  course: interview-question-preparation
  type: output
  description: "Culture fit questions — prepare interview questions that assess cultural alignment without being discriminatory"
  tags: [culture-fit, values, alignment, inclusion, beginner]

state: {}

trigger: |
  You're the Head of HR at a 75-person tech startup. The
  founders keep saying they want to hire for "culture fit,"
  but you're concerned this is becoming code for "people who
  are like us" — which has resulted in a homogeneous team
  (mostly young, white, male engineers who went to the same
  types of schools).

  You want to shift from "culture fit" to "culture add" —
  assess whether candidates share the company's values while
  bringing diverse perspectives.

  Company values (these are genuine, not aspirational):
  1. Radical transparency — We share financials with all
     employees, give direct feedback, and default to open
  2. Ownership mentality — Everyone acts like an owner; no
     "that's not my job" attitude
  3. Continuous learning — We invest in growth; everyone gets
     $3K/year for learning
  4. Customer obsession — We talk to customers weekly and make
     decisions based on their needs
  5. Disagree and commit — We encourage healthy debate but
     move fast once decided

  The role: Product Designer
  Salary: $95K-$120K

  Task: Write 10 interview questions that assess alignment
  with these 5 values (2 per value) using the "culture add"
  approach. Explain the difference between "culture fit" and
  "culture add" for the founders, and include guidance on what
  to look for in answers.

assertions:
  - type: llm_judge
    criteria: "Response writes 10 questions assessing values alignment — 2 questions per value; questions assess whether candidates share the VALUES, not the demographics or social preferences of the current team; questions are behavioral (based on past experience) not hypothetical; questions are specific to each value (not generic 'tell me about yourself'); the questions would identify candidates who embody the values but may bring different perspectives and backgrounds."
    weight: 0.35
    description: "ValuesAlignedQuestions"
  - type: llm_judge
    criteria: "Response explains culture fit vs culture add clearly — defines both concepts; explains how 'culture fit' can become exclusionary (similarity bias, in-group preference); describes how 'culture add' assesses values alignment while valuing diverse perspectives; provides concrete examples of the difference; the explanation would persuade founders to shift their approach; references research on how diverse teams outperform homogeneous ones."
    weight: 0.35
    description: "FitVsAddExplanation"
  - type: llm_judge
    criteria: "Response includes evaluation guidance — for each question, describes what a strong 'culture add' answer looks like; identifies red flags (candidates who only thrive in environments identical to their previous one); helps interviewers distinguish between genuine values alignment and surface-level similarity; the guidance would help the startup diversify its team while maintaining its values; practical enough for non-HR interviewers (the founders) to use."
    weight: 0.30
    description: "EvaluationGuidance"
