meta:
  id: interview-scorecard-basics
  level: 1
  course: interview-question-preparation
  type: output
  description: "Interview scorecard basics — create a simple interview scorecard for consistent candidate evaluation"
  tags: [scorecard, rubric, evaluation, consistency, beginner]

state: {}

trigger: |
  You're the Office Manager at a growing company (50 people).
  The CEO has noticed that hiring decisions are inconsistent —
  different interviewers focus on different things, and post-
  interview discussions devolve into "I liked them" vs. "I
  didn't get a good vibe." The CEO wants you to create a
  standardized interview scorecard.

  The role being hired: Account Manager
  - Manages relationships with 20-30 client accounts
  - Upsells and cross-sells products/services
  - Resolves client issues and escalations
  - Collaborates with delivery team on client projects
  - Salary: $65K-$80K + commission

  Interview panel (each person interviews separately):
  1. Sales Director (hiring manager) — 45 minutes
  2. Senior Account Manager (peer) — 30 minutes
  3. Head of Delivery (cross-functional partner) — 30 minutes

  Competencies to evaluate:
  1. Client relationship management
  2. Communication and presentation skills
  3. Problem-solving and resourcefulness
  4. Sales acumen (upselling, identifying opportunities)
  5. Teamwork and cross-functional collaboration

  Task: Create the interview scorecard with a clear rating
  scale, scoring criteria for each competency, and questions
  assigned to each interviewer (so they don't all ask the same
  things). Include instructions for how interviewers should
  use the scorecard.

assertions:
  - type: llm_judge
    criteria: "Response creates a clear, usable scorecard — includes a rating scale with defined anchors (e.g., 1-5 with descriptions for each level); each of the 5 competencies has specific scoring criteria (what does a 3 look like vs. a 5?); the scorecard is simple enough for non-HR interviewers to use; includes space for notes and evidence; the overall format would produce consistent, comparable evaluations across the 3 interviewers."
    weight: 0.35
    description: "ClearScorecard"
  - type: llm_judge
    criteria: "Response assigns questions appropriately across interviewers — distributes competencies logically (Sales Director assesses sales acumen and relationship management; peer assesses day-to-day collaboration; Delivery Head assesses cross-functional teamwork); provides specific questions for each interviewer; avoids redundancy (interviewers aren't asking the same questions); time allocation is realistic (45 min and 30 min slots); each interviewer has a clear focus area."
    weight: 0.35
    description: "InterviewerAssignment"
  - type: llm_judge
    criteria: "Response includes practical usage instructions — explains how to complete the scorecard during/after the interview; describes the debrief process (compare scores, discuss discrepancies, make decision); addresses common pitfalls (anchoring on first impression, halo effect, recency bias); explains how to aggregate scores across interviewers; the instructions would make the scorecard actually useful, not just another form to fill out."
    weight: 0.30
    description: "UsageInstructions"
