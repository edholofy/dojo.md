meta:
  id: technical-screening-questions
  level: 1
  course: interview-question-preparation
  type: output
  description: "Technical screening questions — prepare technical interview questions for a junior software developer role"
  tags: [technical, screening, software-developer, beginner]

state: {}

trigger: |
  You're a Senior Developer at a startup. Your team is hiring
  a Junior Frontend Developer, and the CTO has asked you to
  prepare the technical screening questions. This is a 45-
  minute technical phone screen (not a whiteboard coding
  interview — that's the next round).

  Role requirements:
  - Build UI components with React and TypeScript
  - Write CSS/Tailwind for responsive designs
  - Consume REST APIs and handle async data
  - Write unit tests with Jest/React Testing Library
  - Use Git for version control

  What you need to assess:
  1. JavaScript fundamentals (closures, promises, array methods)
  2. React basics (components, state, props, hooks, lifecycle)
  3. CSS knowledge (flexbox, grid, responsive design)
  4. Problem-solving approach (not just right/wrong answers)
  5. Learning mindset (how they handle what they don't know)

  Important context:
  - This is a junior role — candidates are expected to have
    gaps in knowledge
  - You want to see how they think, not just what they've
    memorized
  - The CTO wants to avoid "gotcha" questions that test
    trivia rather than understanding
  - Phone screen, so no live coding — verbal explanations
    and conceptual questions only

  Task: Prepare 12-15 technical screening questions organized
  by topic. Include the expected answer (brief), what strong
  vs. weak answers sound like, and follow-up probes for each.

assertions:
  - type: llm_judge
    criteria: "Response prepares 12-15 technical questions organized by topic — covers JavaScript fundamentals, React basics, CSS knowledge, problem-solving, and learning mindset; questions test understanding, not trivia memorization; questions are appropriate for a junior developer (not senior-level system design); includes a mix of conceptual and scenario-based questions; avoids gotcha questions as instructed."
    weight: 0.35
    description: "AppropriateTechnicalQuestions"
  - type: llm_judge
    criteria: "Response includes evaluation guidance — provides brief expected answers for each question; distinguishes between strong answers (demonstrates understanding of WHY, not just WHAT) and weak answers (memorized definitions without understanding); includes follow-up probes to dig deeper; helps the interviewer assess problem-solving approach and learning mindset beyond just technical knowledge."
    weight: 0.35
    description: "TechnicalEvaluation"
  - type: llm_judge
    criteria: "Response is practical for a phone screen — questions can be answered verbally without a whiteboard or IDE; questions flow logically (easy to hard, by topic); the set can be completed in 45 minutes (not too many questions); includes warm-up questions to put the candidate at ease; accounts for the fact that junior candidates will have knowledge gaps; the overall approach would identify candidates who can learn and grow."
    weight: 0.30
    description: "PhoneScreenPractical"
