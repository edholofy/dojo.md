meta:
  id: manager-interview-prep
  level: 1
  course: interview-question-preparation
  type: output
  description: "Manager interview prep — prepare a first-time manager for conducting effective interviews"
  tags: [manager-training, first-time, basics, preparation, beginner]

state: {}

trigger: |
  You're an HR Business Partner. A newly promoted engineering
  manager (Sarah) has come to you panicked — she's conducting
  her first interview tomorrow for a Software Engineer on her
  team and has no idea what to do. She's been an IC (individual
  contributor) her entire career.

  Sarah's concerns:
  - "I don't know what questions to ask"
  - "What if I accidentally ask something illegal?"
  - "How do I take notes while also having a conversation?"
  - "What if the candidate asks me something I don't know?"
  - "How do I evaluate someone objectively — not just based on
     whether I like them?"
  - "I'm nervous about the power dynamic — I want candidates
     to feel comfortable"

  Interview details:
  - Role: Software Engineer (mid-level, Python/Django)
  - Interview slot: 45 minutes (technical + behavioral)
  - Other interviewers: 2 senior engineers (coding rounds)
  - Sarah's focus: Team fit, communication, problem-solving
     approach
  - The interview is tomorrow — she needs practical, not
     theoretical, help

  Task: Create a complete "First-Time Interviewer Survival
  Guide" for Sarah, including specific questions she can ask
  tomorrow, a note-taking template, and tips for the 6
  concerns she raised.

assertions:
  - type: llm_judge
    criteria: "Response creates a practical survival guide — addresses all 6 of Sarah's specific concerns with actionable advice; provides 8-10 ready-to-use questions for her 45-minute slot; the questions focus on her assigned areas (team fit, communication, problem-solving) and avoid duplicating the coding rounds; the guide is concise enough to review in one evening; organized so she can reference it during the interview."
    weight: 0.35
    description: "PracticalSurvivalGuide"
  - type: llm_judge
    criteria: "Response includes a note-taking template and evaluation method — provides a simple template she can print or use on her laptop; explains how to take notes without losing eye contact or natural conversation flow; includes a basic rating system for evaluating candidates; addresses the concern about objectivity (comparing answers to criteria, not gut feeling); the template is simple enough for a first-time user."
    weight: 0.35
    description: "NotesTakingAndEvaluation"
  - type: llm_judge
    criteria: "Response is empathetic and confidence-building — acknowledges that interviewing is a skill that takes practice; normalizes her nervousness; provides specific tips for creating a comfortable atmosphere for candidates; addresses the power dynamic concern thoughtfully; explains that it's okay not to have all the answers; the overall tone would make Sarah feel prepared and confident for tomorrow's interview."
    weight: 0.30
    description: "ConfidenceBuilding"
