meta:
  id: reference-check-questions
  level: 1
  course: interview-question-preparation
  type: output
  description: "Reference check questions — prepare structured reference check questions that yield honest, useful feedback"
  tags: [reference-check, verification, feedback, beginner]

state: {}

trigger: |
  You're an HR Generalist conducting reference checks for a
  final candidate for a Sales Manager position. The candidate
  provided 3 references:
  1. Former direct manager at their previous company
  2. Former peer (fellow sales manager)
  3. Former direct report

  You've done reference checks before, but they always end up
  being useless — references just say generic positive things
  like "They're great!" and you never get actionable info.

  The candidate's interview performance:
  - Strengths shown: Strong communication, confident, claims
    to have exceeded quota every quarter
  - Concerns from the interview panel:
    a. May be too aggressive with team (one answer suggested
       they push people hard)
    b. Claims about quota attainment seem inflated
    c. Left their last 2 jobs after ~18 months each

  Role context:
  - Sales Manager leading 6 reps
  - Quota: $3M team quarterly revenue
  - Reports to VP of Sales
  - Salary: $120K base + $80K variable

  Task: Prepare a structured reference check questionnaire
  that will elicit honest, useful responses (not generic
  praise). Include questions that specifically verify the
  interview concerns. Provide tips for getting references to
  be candid.

assertions:
  - type: llm_judge
    criteria: "Response prepares questions that elicit honest, specific answers — questions are specific enough that generic praise doesn't suffice ('On a scale of 1-10, how would you rate their people management? What would it take to be a 10?'); includes verification questions for each interview concern (management style aggressiveness, quota attainment claims, reasons for short tenures); questions are tailored differently for each reference type (manager, peer, direct report)."
    weight: 0.35
    description: "HonestEliciting"
  - type: llm_judge
    criteria: "Response includes techniques for getting candid responses — provides tips for building rapport with references; suggests specific techniques (silence after answers, comparison questions, 'if you could change one thing' framing); explains how to read between the lines (what references DON'T say is as important as what they do say); addresses the reality that references are pre-selected to be positive; includes how to probe when you get vague answers."
    weight: 0.35
    description: "CandidnesssTechniques"
  - type: llm_judge
    criteria: "Response is structured and practical — provides a clear template the HR Generalist can use on the phone; questions flow naturally in conversation; includes time estimate (references are busy — keep it to 15-20 minutes); includes documentation guidance (how to record and summarize findings); helps connect reference feedback to the hiring decision; the questionnaire would yield information that genuinely informs the hiring decision."
    weight: 0.30
    description: "StructuredAndPractical"
