meta:
  id: first-interview-shift
  level: 1
  course: interview-question-preparation
  type: output
  description: "First interview shift — handle a situation where the interview plan falls apart and you need to adapt on the fly"
  tags: [shift, adaptation, unexpected, problem-solving, beginner]

state: {}

trigger: |
  You're a recruiter at a tech company. You've carefully
  prepared a structured interview day for a Product Manager
  candidate. Everything was set — 5 interviewers, questions
  assigned, scorecards printed. Then the day started:

  What happened:

  9:00 AM — The hiring manager (Interviewer 1) calls in sick.
  She was supposed to do the 60-minute deep-dive on product
  strategy. You have 30 minutes to find a replacement or
  restructure the day.

  10:00 AM — During Interviewer 2's session, the candidate
  mentions they have a competing offer with a deadline of
  Friday (3 days away). The original timeline had a 2-week
  decision process.

  11:00 AM — Interviewer 3 (a VP) goes off-script and asks
  the candidate "So, are you planning to start a family soon?
  We have great parental leave!" with good intentions but
  terrible execution.

  12:00 PM — During the working lunch with the team, the
  candidate reveals they're actually looking for a more
  senior role (Senior PM) than the one posted (PM). The
  posted salary range is $120K-$140K; they want $160K+.

  1:00 PM — Interviewer 4 reports that the candidate couldn't
  answer basic SQL questions, but the other interviews have
  been strong. Interviewer 4 wants to reject; others want to
  advance.

  Task: For each of the 5 disruptions, explain how you would
  handle the situation in real-time. Then write a post-
  interview summary that addresses all the complications and
  recommends a path forward.

assertions:
  - type: llm_judge
    criteria: "Response handles all 5 disruptions with practical solutions — the hiring manager replacement is realistic (substitute interviewer or restructure the day, don't cancel); the competing offer is escalated appropriately (accelerate process, don't pressure or lowball); the illegal question is addressed immediately (document it, coach the VP privately, assess legal exposure); the level mismatch is handled honestly (can we accommodate? Is there a Senior PM opening?); the split evaluation is resolved with a framework (how to weigh one weak area against overall strong performance)."
    weight: 0.35
    description: "PracticalDisruptionHandling"
  - type: llm_judge
    criteria: "Response writes a coherent post-interview summary — synthesizes all 5 complications into a clear recommendation; addresses whether to advance the candidate despite complications; provides a decision framework (not just an opinion); the summary would help the hiring team make an informed decision; addresses the timeline pressure from the competing offer; the recommendation accounts for level/salary mismatch and the technical gap."
    weight: 0.35
    description: "CoherentSummary"
  - type: llm_judge
    criteria: "Response demonstrates recruiting judgment — shows understanding of when to escalate vs. handle independently; addresses the VP's illegal question with appropriate urgency (legal risk) and diplomacy; recognizes the competing offer as both a pressure tactic and a real constraint; doesn't panic about the disruptions — treats them as normal recruiting challenges; the overall response shows the kind of adaptability a good recruiter needs."
    weight: 0.30
    description: "RecruitingJudgment"
