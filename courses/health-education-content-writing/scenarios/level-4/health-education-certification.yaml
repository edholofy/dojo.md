meta:
  id: health-education-certification
  level: 4
  course: health-education-content-writing
  type: output
  description: "Design a professional certification for health education content writing — create competency standards, examination blueprints, and credentialing programs for health education writers"
  tags: [certification, professional-development, credentialing, expert]

state: {}

trigger: |
  Design a professional certification program for
  health education content writers — a specialized
  credential that doesn't currently exist.

  Context:
  - Existing certifications: CHES/MCHES (health
    education specialists), health writing certificates
    (academic), AMWA medical writing certification
  - Gap: No credential specifically for people who
    WRITE patient-facing health education content
  - The role uniquely combines: clinical knowledge,
    writing skill, health literacy expertise, cultural
    competency, regulatory awareness, and design thinking
  - Growing demand as digital health and patient
    engagement expand
  - No quality standard for who produces patient
    education materials

  Proposed certification: "Certified Health Education
  Content Specialist" (CHECS)

  Sponsoring partnership: Society for Public Health
  Education (SOPHE) + American Medical Writers
  Association (AMWA)

  Target audience (25,000+ nationally):
  - Patient education writers in health systems
  - Health communication specialists
  - Medical writers transitioning to patient content
  - Digital health content creators
  - Public health communicators
  - Freelance health writers

  Create:
  1. Certification program charter
  2. Competency framework
  3. Examination blueprint and content outline
  4. Practical portfolio assessment component
  5. Study guide and preparation resources
  6. Continuing education requirements
  7. Program launch strategy
  8. Psychometric validation plan

assertions:
  - type: llm_judge
    criteria: "Competency framework captures the unique cross-disciplinary nature of the role — includes health and medical knowledge (enough to write accurately, not to practice), writing and communication skills (plain language, persuasive writing, content strategy), health literacy science (readability, comprehension, cultural competency), technology skills (CMS, digital content, accessibility), and regulatory knowledge (FDA, FTC, HIPAA)."
    weight: 0.35
    description: "CrossDisciplinaryCompetencies"
  - type: llm_judge
    criteria: "Practical portfolio assessment evaluates real-world capability — requires candidates to submit and defend a portfolio of health education materials; includes a live writing exercise (rewrite a complex clinical document for a specific audience); evaluates readability, accuracy, accessibility, cultural appropriateness, and engagement; uses standardized rubrics for consistent evaluation."
    weight: 0.35
    description: "PortfolioAssessmentDesign"
  - type: llm_judge
    criteria: "Dual sponsorship strategy leverages both organizations — SOPHE provides health education credibility and member access while AMWA provides medical writing expertise and infrastructure; the partnership creates a credential with broader recognition than either organization could achieve alone; addresses potential organizational politics and shared governance."
    weight: 0.30
    description: "DualSponsorshipStrategy"
