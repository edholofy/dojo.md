meta:
  id: health-education-technology-product
  level: 4
  course: health-education-content-writing
  type: output
  description: "Design a health education technology product — create a SaaS platform for creating, managing, and delivering personalized, accessible health education content at scale"
  tags: [technology-product, saas-design, product-management, expert]

state: {}

trigger: |
  Design a SaaS product that transforms how healthcare
  organizations create, manage, and deliver patient
  education content.

  Product: "HealthWords" — Intelligent Health Education
  Platform

  Market opportunity:
  - US patient education content market: $2.1B
  - Average health system spends $500K-$2M annually
    on patient education materials
  - 72% of patient education materials exceed
    recommended reading levels
  - No purpose-built platform for end-to-end health
    education lifecycle
  - Current solutions: Word/InDesign + manual review
    + static distribution
  - TAM: $2.1B | SAM: $800M | SOM: $80M (Year 5)

  Product capabilities:
  - AI-assisted content creation (guided by clinical
    evidence and health literacy standards)
  - Automated readability and accessibility checking
  - Multi-language content management with cultural
    adaptation
  - EHR-integrated contextual delivery
  - Patient engagement analytics and outcomes tracking
  - Regulatory compliance checking (FDA, FTC, HIPAA)
  - Content versioning and approval workflows
  - Personalization engine (literacy level, language,
    condition, preferences)

  Target users:
  - Health education departments
  - Clinical teams (need patient materials at point of
    care)
  - Marketing/communications teams
  - Compliance officers
  - Patients (end users of delivered content)

  Create:
  1. Product requirements document
  2. System architecture
  3. AI content assistance specification
  4. User experience design for each persona
  5. Integration strategy (EHR, CMS, LMS)
  6. Pricing and packaging model
  7. Product roadmap (MVP through Year 3)
  8. Competitive positioning and differentiation

assertions:
  - type: llm_judge
    criteria: "AI content assistance is designed for health education's unique constraints — goes beyond generic AI writing to incorporate clinical accuracy validation, automated readability scoring with real-time suggestions, health literacy plain language rules, and evidence source citation; the AI augments health education writers rather than replacing them."
    weight: 0.35
    description: "AIContentAssistance"
  - type: llm_judge
    criteria: "EHR integration enables contextual content delivery — integrates with Epic, Cerner/Oracle Health, and other major EHRs to automatically surface relevant patient education based on diagnoses, medications, procedures, and language preferences; enables point-of-care education delivery, after-visit summary integration, and patient portal content personalization."
    weight: 0.35
    description: "EHRIntegrationDesign"
  - type: llm_judge
    criteria: "Product roadmap prioritizes by value and feasibility — MVP focuses on the biggest pain point (content creation + readability checking); Phase 2 adds distribution and EHR integration; Phase 3 adds personalization and analytics; each phase delivers standalone value while building toward the full vision; the roadmap is credible for a startup timeline."
    weight: 0.30
    description: "ProductRoadmapPrioritization"
