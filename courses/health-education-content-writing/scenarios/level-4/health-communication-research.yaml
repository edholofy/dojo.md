meta:
  id: health-communication-research
  level: 4
  course: health-education-content-writing
  type: output
  description: "Design a health communication research program — develop multi-method studies measuring how health education content affects patient knowledge, behavior, and health outcomes"
  tags: [research-program, health-communication, evidence-building, expert]

state: {}

trigger: |
  Design a comprehensive research program studying
  how the design and delivery of health education
  content affects patient outcomes, to establish an
  evidence base for health education best practices.

  Research center: Center for Health Education
  Effectiveness (CHEE) — newly established at a
  research university

  Research questions:
  1. What readability level optimizes patient
     comprehension across different health literacy
     populations?
  2. How does content personalization (demographic,
     condition-specific, literacy-adapted) affect
     health behavior change compared to generic content?
  3. What is the impact of AI-generated vs. human-written
     health education on patient trust and comprehension?
  4. How do different content formats (text, video,
     interactive, pictographic) compare in effectiveness
     for medication adherence?
  5. What role does cultural adaptation play in health
     education effectiveness across diverse populations?

  Resources:
  - $5M in startup funding (3 years)
  - Partnership with 8 health systems for data access
  - 15 faculty investigators (multidisciplinary)
  - Student research assistants
  - Access to patient populations for research

  Create:
  1. Research center strategic plan
  2. Study designs for each research question
  3. Measurement instruments for health education
     effectiveness
  4. Data infrastructure and analytics capabilities
  5. Ethical framework for health education research
  6. Industry partnership and translation model
  7. Publication and dissemination strategy
  8. Funding diversification and sustainability plan

assertions:
  - type: llm_judge
    criteria: "Study designs use appropriate methods for each question — readability optimization uses a dose-response design with multiple reading levels; personalization uses cluster-randomized trials; AI vs. human comparison uses blinded assessment; format comparison uses crossover design; cultural adaptation uses community-based participatory research; each question gets the methodology it deserves."
    weight: 0.35
    description: "MethodologicalAppropriateness"
  - type: llm_judge
    criteria: "Measurement instruments go beyond knowledge tests — develops validated measures for patient comprehension (not just recall), self-efficacy for health management, actual behavior change (medication adherence, appointment keeping), patient-provider communication quality, and health outcomes; acknowledges that knowledge alone doesn't predict behavior."
    weight: 0.35
    description: "MeasurementInstrumentation"
  - type: llm_judge
    criteria: "Industry translation model bridges research and practice — creates a pathway from research findings to practical guidelines that health systems can implement; includes rapid-cycle dissemination (not just academic publications), practitioner-friendly toolkits, and implementation support; addresses the research-to-practice gap that plagues health education."
    weight: 0.30
    description: "ResearchToTranslation"
