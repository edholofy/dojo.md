meta:
  id: expert-health-writing-shift
  level: 4
  course: health-education-content-writing
  type: output
  description: "Expert shift simulation — serve as interim Chief Health Education Officer managing a national health literacy crisis, AI content controversy, regulatory investigation, and industry disruption"
  tags: [shift-simulation, executive-crisis, multi-scenario, expert]

state: {}

trigger: |
  You have been appointed interim Chief Health
  Education Officer for a national health system
  during a period of extraordinary challenge. Handle
  these simultaneous crises during your first two
  weeks.

  SITUATION 1 — AI content controversy:
  Your health system deployed an AI chatbot that
  provides health education to patients through the
  patient portal. A patient followed the chatbot's
  dietary advice for managing her gestational diabetes
  and ended up in the hospital with dangerously high
  blood sugar. The chatbot had provided advice that
  contradicted current clinical guidelines. The patient's
  family has contacted the media and a lawyer. It turns
  out the AI content was never clinically validated —
  it went live when the technology team bypassed the
  health education review process.

  SITUATION 2 — Health literacy crisis data:
  A new nationwide health literacy assessment reveals
  that your health system's patient population has an
  average health literacy level significantly lower
  than assumed. 62% of your patients cannot understand
  basic medication instructions as currently written.
  This finding has implications for patient safety,
  informed consent validity, and potential liability.

  SITUATION 3 — FDA investigation:
  The FDA has opened an investigation into your health
  system's wellness program content, which has been
  making health claims about supplements sold through
  the health system's pharmacy. Claims like "immune
  system booster" and "heart health support" lack
  adequate substantiation. The wellness program generates
  $4M annually in revenue.

  SITUATION 4 — Publisher crisis:
  Your primary patient education content vendor
  (Healthwise) has announced it is being acquired and
  will discontinue its current platform in 6 months.
  40% of your patient education materials come from
  this vendor. You need a transition plan that doesn't
  leave patients without educational resources.

  Handle all four situations:
  1. AI chatbot incident response
  2. Health literacy crisis remediation
  3. FDA investigation response
  4. Content vendor transition plan
  5. Integrated risk management approach
  6. Board and executive communication

assertions:
  - type: llm_judge
    criteria: "AI chatbot response addresses patient safety first — immediately suspends the chatbot, conducts a clinical review of all content it provided, identifies other patients who may have received harmful advice, implements a clinical validation requirement for ALL AI-generated health content; addresses the process failure (technology bypassing clinical review) as a systemic issue."
    weight: 0.35
    description: "AIChatbotSafetyResponse"
  - type: llm_judge
    criteria: "Health literacy crisis response treats 62% as a patient safety emergency — implements immediate harm reduction (medication teach-back verification, simplified critical documents), launches a systematic content remediation program, and addresses informed consent validity concerns with legal counsel; recognizes that this finding means the health system has been providing education that most patients can't understand."
    weight: 0.35
    description: "HealthLiteracyCrisisResponse"
  - type: llm_judge
    criteria: "Content vendor transition plan ensures continuity — creates a phased approach to either find an alternative vendor, build in-house capability, or both; prioritizes the highest-use materials for immediate replacement; includes a content audit to identify which vendor materials are still clinically current; doesn't wait until the 6-month deadline to start."
    weight: 0.30
    description: "VendorTransitionPlan"
