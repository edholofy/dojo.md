meta:
  id: health-education-governance
  level: 4
  course: health-education-content-writing
  type: output
  description: "Design a health education governance framework — establish organizational structures, quality standards, and accountability mechanisms for enterprise-level health education operations"
  tags: [governance, organizational-design, quality-standards, expert]

state: {}

trigger: |
  Design a comprehensive health education governance
  framework for a newly merged national health system
  where patient education practices are fragmented
  and uncoordinated across its legacy organizations.

  Organization: Alliance Health (post-merger)
  - 12 hospitals, 80 clinics across 6 states
  - 3 legacy organizations with different approaches:
    * System A: Centralized health education department,
      high-quality but slow to produce (12-week cycle)
    * System B: Department-level content creation,
      fast but inconsistent quality
    * System C: Outsourced to vendor (Healthwise),
      consistent but generic
  - Combined patient education inventory: 8,000+
    documents
  - No unified quality standards
  - No shared content taxonomy
  - Duplicate content for same conditions
  - Different readability standards (6th grade vs.
    8th grade vs. no standard)
  - Three different patient education platforms
  - $3.2M combined annual spend

  Create:
  1. Health education governance structure
  2. System-wide quality and style standards
  3. Content harmonization plan
  4. Shared services vs. departmental decision framework
  5. Technology platform consolidation roadmap
  6. Clinical content review committee charter
  7. Performance metrics and accountability framework
  8. Budget optimization through centralization

assertions:
  - type: llm_judge
    criteria: "Governance structure resolves the three-way tension — creates a model that captures System A's quality, System B's speed, and System C's consistency; establishes clear authority for content standards while allowing clinical departments to maintain subject matter expertise; includes a Clinical Content Review Committee with defined membership, decision rights, and escalation paths."
    weight: 0.35
    description: "GovernanceStructureDesign"
  - type: llm_judge
    criteria: "Content harmonization plan is realistic about the 8,000+ document inventory — doesn't try to rewrite everything at once; prioritizes by patient volume, clinical risk, and regulatory requirement; implements a sunset policy for legacy content; creates a 'gold standard' template system so new content is consistent from day one; estimates timeline and resource requirements honestly."
    weight: 0.35
    description: "ContentHarmonizationPlan"
  - type: llm_judge
    criteria: "Budget optimization demonstrates savings from centralization — quantifies the current inefficiency (duplicate content creation, inconsistent vendor relationships, multiple platform licenses); projects cost savings from consolidated content management, shared platform, and standardized processes; reinvests savings into quality improvement rather than just cutting costs."
    weight: 0.30
    description: "BudgetOptimization"
