meta:
  id: health-education-book-proposal
  level: 4
  course: health-education-content-writing
  type: output
  description: "Write a book proposal on health education innovation — develop a manuscript concept for a definitive work on transforming patient education in the age of AI, misinformation, and health equity"
  tags: [book-proposal, thought-leadership, publishing, expert]

state: {}

trigger: |
  Write a book proposal for a definitive work on
  the future of health education in a transformed
  healthcare landscape.

  Working title: "Words That Heal: How Better Health
  Communication Can Save Lives"

  Author credentials:
  - 25 years in health education and health literacy
  - Directed health communication at CDC for 8 years
  - Led patient education transformation at 3 health
    systems
  - Published in Health Affairs, JAMA, Lancet Global
    Health
  - TED talk on health literacy (3M views)
  - Advisor to WHO on health literacy standards
  - Won the Surgeon General's Medallion for health
    communication innovation

  Book concept:
  - Thesis: Health education is the most under-invested
    and under-appreciated tool in healthcare — better
    communication could prevent more suffering than
    most medical interventions
  - Audience: Healthcare leaders, public health
    professionals, policymakers, educated general readers
  - Approach: Data + patient stories + practical
    framework + future vision
  - Comparables: "Being Mortal" (Gawande), "Nudge"
    (Thaler/Sunstein), "The Informed Patient" (Berger)

  Create:
  1. Book proposal overview and positioning
  2. Chapter-by-chapter outline (14 chapters)
  3. Sample chapter (most compelling)
  4. Author platform and marketing strategy
  5. Competitive analysis
  6. Publisher targeting strategy
  7. Supplemental materials (toolkit, assessment)
  8. Media and speaking strategy

assertions:
  - type: llm_judge
    criteria: "Chapter outline tells a compelling narrative arc — moves from the human cost of poor health communication (patient stories of harm) through the science of health literacy, the current failures of the system, evidence for what works, emerging innovations (AI, personalization), and a vision for transformation; each chapter has a clear throughline and builds toward the conclusion."
    weight: 0.35
    description: "NarrativeArcQuality"
  - type: llm_judge
    criteria: "Thesis that health education prevents more suffering than most interventions is supported with evidence — cites data on medication non-adherence costs ($100-300B annually), preventable readmissions, preventable chronic disease, vaccine hesitancy, and care avoidance due to misunderstanding; positions health communication as a clinical intervention, not just a nice-to-have."
    weight: 0.35
    description: "ThesisEvidenceSupport"
  - type: llm_judge
    criteria: "Sample chapter hooks readers with a compelling patient story — opens with a specific person whose health outcome was determined by the quality of health communication they received (or didn't); weaves in systemic analysis without losing the human thread; demonstrates the author's unique voice and ability to bridge clinical expertise with accessible storytelling."
    weight: 0.30
    description: "SampleChapterHook"
