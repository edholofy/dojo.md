meta:
  id: health-education-knowledge-system
  level: 4
  course: health-education-content-writing
  type: output
  description: "Design a health education knowledge management system — create a structured repository of health education evidence, best practices, and resources that supports content creation decisions"
  tags: [knowledge-management, evidence-repository, decision-support, expert]

state: {}

trigger: |
  Design a comprehensive knowledge management system
  for health education content creation that captures,
  organizes, and makes accessible the evidence base
  for effective patient education.

  Context:
  - Health education evidence is scattered across
    journals, government reports, guidelines, and
    practitioner experience
  - Content writers spend 40% of their time searching
    for evidence and guidelines
  - Same clinical questions get re-researched for each
    new piece of content
  - No systematic way to capture what works (effective
    messaging, formats, approaches)
  - Regulatory requirements change frequently
  - Cultural competency insights exist as tribal
    knowledge

  System requirements:
  - Evidence repository linking clinical guidelines to
    patient-facing content recommendations
  - Effectiveness database tracking which messages,
    formats, and approaches work
  - Regulatory tracker for FDA, FTC, state requirements
  - Cultural competency resource library
  - Reading level and plain language reference tools
  - Content template library (condition-specific)
  - Quality metrics dashboard
  - Workflow integration with content creation tools

  User types:
  - Health education writers
  - Clinical reviewers
  - Health literacy specialists
  - Cultural competency consultants
  - Compliance officers

  Create:
  1. Knowledge system architecture
  2. Evidence taxonomy and classification
  3. Effectiveness tracking methodology
  4. Data collection and curation workflow
  5. Search and discovery interface design
  6. Integration with content creation workflow
  7. Maintenance and currency assurance process
  8. Adoption and change management strategy

assertions:
  - type: llm_judge
    criteria: "Evidence taxonomy connects clinical knowledge to content decisions — organizes evidence by condition, intervention, population, format, and outcome; a writer creating diabetes education can quickly find: which messages improve A1C, what reading level works best, which formats drive medication adherence, and what cultural adaptations are needed for specific populations."
    weight: 0.35
    description: "EvidenceTaxonomyDesign"
  - type: llm_judge
    criteria: "Effectiveness tracking creates a learning system — captures which specific patient education approaches (messages, formats, delivery methods) produce measurable outcomes; over time, builds an organizational evidence base that improves every new piece of content; transforms health education from opinion-based to evidence-based practice."
    weight: 0.35
    description: "EffectivenessTrackingSystem"
  - type: llm_judge
    criteria: "Workflow integration reduces the 40% evidence-search time — embeds the knowledge system into the content creation process so evidence, templates, and guidelines surface contextually as writers work; doesn't require writers to leave their workflow to search a separate system; provides AI-assisted recommendations based on the content being created."
    weight: 0.30
    description: "WorkflowIntegration"
