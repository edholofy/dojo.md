meta:
  id: health-education-transformation-case
  level: 4
  course: health-education-content-writing
  type: output
  description: "Write a comprehensive health education transformation case study — document a multi-year patient education overhaul including methodology, outcomes, and replicable lessons"
  tags: [case-study, transformation, documentation, expert]

state: {}

trigger: |
  Write a comprehensive case study documenting a
  health education transformation that dramatically
  improved patient outcomes, suitable for publication
  in the Journal of Health Communication.

  Transformation subject: Metro Community Health Center
  - 12-site FQHC serving 85,000 patients
  - 75% patients at or below 200% FPL
  - 60% Spanish-speaking, 15% Haitian Creole
  - Transformation period: 2022-2025

  Before (2022):
  - Patient education materials: English-only, 11th
    grade reading level
  - Medication comprehension (teach-back): 28%
  - Diabetes A1C control (<7%): 35%
  - Preventive screening rates: 22%
  - 30-day readmission rate: 18%
  - Patient satisfaction (education): 2.4/5
  - No health literacy assessment at intake

  After (2025):
  - Materials: 6 languages, 5th grade reading level
  - Medication comprehension (teach-back): 82%
  - Diabetes A1C control (<7%): 64%
  - Preventive screening rates: 58%
  - 30-day readmission rate: 7%
  - Patient satisfaction (education): 4.6/5
  - Universal health literacy screening and adaptive
    content delivery

  Key interventions:
  - Year 1: Health literacy infrastructure (assessment,
    content rewrite, staff training)
  - Year 2: Multilingual content + community health
    worker integration
  - Year 3: Technology platform + personalized content
    delivery + behavioral nudges

  Total investment: $2.8M over 3 years

  Create:
  1. Case study executive summary
  2. Methodology and intervention description
  3. Year-by-year results with statistical analysis
  4. Cost-effectiveness analysis
  5. Patient stories illustrating impact
  6. Challenges and lessons learned
  7. Replicable framework for other FQHCs
  8. Implications for policy and practice

assertions:
  - type: llm_judge
    criteria: "Case study demonstrates causal attribution — uses appropriate methods (interrupted time series, pre-post with comparison sites) to link specific interventions to specific outcomes; the medication comprehension improvement is linked to teach-back implementation, the A1C improvement to multilingual diabetes education, the readmission reduction to discharge education redesign."
    weight: 0.35
    description: "CausalAttribution"
  - type: llm_judge
    criteria: "Patient stories are ethically told and structurally important — illustrate the quantitative findings with real human experiences; show how a patient who previously couldn't understand their medication instructions gained literacy and health agency; told with dignity and consent; serve as evidence, not sentimentality."
    weight: 0.35
    description: "PatientStoryIntegration"
  - type: llm_judge
    criteria: "Replicable framework adapts for the FQHC context — recognizes that FQHCs have limited resources, high patient turnover, and diverse populations; provides a phased approach that starts with low-cost, high-impact interventions; identifies funding sources (HRSA, state grants, quality incentive payments); the framework is immediately actionable for other community health centers."
    weight: 0.30
    description: "FQHCReplicableFramework"
