meta:
  id: health-education-behavioral-science
  level: 4
  course: health-education-content-writing
  type: output
  description: "Apply behavioral science to health education design — integrate behavioral economics, cognitive psychology, and persuasion science into health education content to maximize behavior change"
  tags: [behavioral-science, cognitive-psychology, persuasion, expert]

state: {}

trigger: |
  Apply behavioral science principles to redesign a
  health system's entire patient education approach,
  transforming passive information delivery into active
  behavior change support.

  Organization: Innovate Health System
  - $2.5B health system, 6 hospitals, 40 clinics
  - Patient education currently achieves:
    * Post-discharge instruction comprehension: 42%
    * Medication adherence (self-reported): 55%
    * Preventive screening completion: 35%
    * Lifestyle modification follow-through: 12%
  - Target: Double each metric within 18 months

  Behavioral insights from patient research:
  - Present bias: Patients prioritize immediate over
    future health
  - Information overload: 60+ pages of discharge
    paperwork
  - Optimism bias: "Heart disease won't happen to me"
  - Default effect: Patients rarely change initial
    behavior
  - Social proof: Patients influenced by peer behavior
  - Loss aversion: Fear of loss motivates more than
    potential gain
  - Implementation intentions: Specific plans increase
    follow-through
  - Cognitive load: Stressed patients can't process
    complex information

  Create:
  1. Behavioral audit of current education materials
  2. Behaviorally-informed content design framework
  3. Nudge portfolio for each health outcome
  4. Content redesign specifications (4 priority areas)
  5. A/B testing methodology for behavioral interventions
  6. Ethical framework for behavioral health education
  7. Staff training on behavioral content design
  8. Measurement and optimization plan

assertions:
  - type: llm_judge
    criteria: "Behavioral content design framework transforms each identified bias into a design principle — present bias is countered with immediate micro-rewards and loss framing; information overload is countered with progressive disclosure; optimism bias is countered with personalized risk communication; default effects are leveraged through pre-scheduled appointments and auto-enrollment; each bias gets a specific design response."
    weight: 0.35
    description: "BiasToDesignPrinciple"
  - type: llm_judge
    criteria: "Nudge portfolio includes specific, testable interventions — implementation intentions ('I will take my medication when I brush my teeth'), social proof messaging ('8 out of 10 patients in your situation completed their screening'), commitment devices (signed action plans), choice architecture (pre-selected healthy defaults); each nudge is mapped to a specific behavioral target."
    weight: 0.35
    description: "NudgePortfolioSpecificity"
  - type: llm_judge
    criteria: "Ethical framework distinguishes helpful nudges from manipulation — defines boundaries (nudges should make healthy choices easier, not restrict autonomy); addresses informed consent for behavioral interventions; considers equity implications (do nudges work differently across populations?); ensures transparency about the use of behavioral science in patient materials."
    weight: 0.30
    description: "EthicalBehavioralFramework"
