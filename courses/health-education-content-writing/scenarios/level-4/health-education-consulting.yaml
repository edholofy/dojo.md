meta:
  id: health-education-consulting
  level: 4
  course: health-education-content-writing
  type: output
  description: "Launch a health education consulting practice — develop service offerings, assessment methodologies, and thought leadership for advising healthcare organizations on patient education transformation"
  tags: [consulting, practice-building, methodology, expert]

state: {}

trigger: |
  Launch a health education consulting practice
  after 20 years leading health education and health
  literacy programs at major health systems and
  public health organizations.

  Your background:
  - VP of Patient Education at a $5B health system
  - Led health literacy transformation reducing
    readmissions 22%
  - Former CDC health communication specialist
  - Board member, Health Literacy Society
  - Published 40+ peer-reviewed articles on health
    communication
  - CHES, MCHES certified
  - Keynote speaker at APHA, SOPHE, IHA conferences

  Target market:
  - Health systems seeking patient education
    transformation
  - Pharma/biotech companies needing patient-facing
    content
  - Digital health companies building health education
    features
  - Government agencies (CDC, state health departments)
  - Health plans investing in member engagement
  - Non-profits with health education missions

  Create:
  1. Consulting firm business plan
  2. Service offering portfolio (6-8 core services)
  3. Proprietary health education assessment methodology
  4. Engagement delivery models
  5. Pricing strategy
  6. Go-to-market strategy
  7. Thought leadership and publishing strategy
  8. Team building and scaling plan

assertions:
  - type: llm_judge
    criteria: "Proprietary assessment methodology differentiates from competitors — creates a comprehensive health education maturity model that evaluates organizations across content quality (readability, accuracy, accessibility), processes (creation, review, distribution), technology (CMS, personalization, analytics), and outcomes (patient understanding, behavior change, health impact); produces an actionable maturity score with benchmarks."
    weight: 0.35
    description: "ProprietaryMethodology"
  - type: llm_judge
    criteria: "Service offerings span the full health education value chain — includes assessment and strategy, content development, technology consulting, training and workforce development, evaluation and research, and regulatory compliance; each service naturally leads to others, creating long-term client relationships rather than one-off projects."
    weight: 0.35
    description: "ServiceOfferingBreadth"
  - type: llm_judge
    criteria: "Go-to-market strategy leverages the founder's unique position — uses the 22% readmission reduction case study, CDC experience, and publishing record to establish credibility; targets specific market segments where health education ROI is most demonstrable (readmission reduction, medication adherence, chronic disease management)."
    weight: 0.30
    description: "GoToMarketStrategy"
