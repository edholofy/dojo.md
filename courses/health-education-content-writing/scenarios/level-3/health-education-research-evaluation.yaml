meta:
  id: health-education-research-evaluation
  level: 3
  course: health-education-content-writing
  type: output
  description: "Design health education program evaluation research — develop rigorous evaluation methodologies to measure the effectiveness of health education interventions on knowledge, behavior, and health outcomes"
  tags: [research-evaluation, program-assessment, outcomes-measurement, advanced]

state: {}

trigger: |
  Design a comprehensive evaluation research program
  for a national health education initiative aimed at
  reducing childhood obesity through school-based and
  community education programs.

  Initiative: "Healthy Futures" — National Childhood
  Obesity Prevention Program
  - Funded by CDC ($12M over 5 years)
  - Implemented in 200 schools across 15 states
  - Community component in 50 neighborhoods
  - Target: Children aged 6-12 and their families
  - Multi-component: Nutrition education, physical
    activity promotion, family engagement, food
    environment change, policy advocacy

  Current state:
  - 3 years into implementation
  - Anecdotal reports of success but no rigorous data
  - Congress demanding evidence of impact for continued
    funding
  - Previous evaluation plan was inadequate (pre/post
    surveys only)
  - Need comprehensive evaluation before Year 5 funding
    review

  Evaluation questions:
  1. Does the program improve children's nutrition
     knowledge and food choices?
  2. Does the program increase physical activity levels?
  3. Does the program reduce BMI z-scores over 2 years?
  4. Which components are most effective and for whom?
  5. What is the cost-effectiveness compared to
     alternative interventions?
  6. Are there differential effects across demographics?

  Create:
  1. Evaluation research design (quasi-experimental)
  2. Logic model for the intervention
  3. Measurement instruments and data collection plan
  4. Analysis strategy for each evaluation question
  5. Process evaluation methodology
  6. Health equity analysis plan
  7. Dissemination strategy for findings
  8. Year 5 Congressional reporting framework

assertions:
  - type: llm_judge
    criteria: "Evaluation design is rigorous enough for Congressional scrutiny — uses quasi-experimental methods (propensity score matching, difference-in-differences) with comparison schools; addresses selection bias; includes both immediate outcomes (knowledge, behavior) and long-term outcomes (BMI, health); the design can credibly attribute changes to the program."
    weight: 0.35
    description: "EvaluationDesignRigor"
  - type: llm_judge
    criteria: "Logic model connects program activities to outcomes through a clear causal chain — maps inputs (funding, staff, materials) → activities (nutrition education, PE programs, family workshops) → outputs (sessions delivered, participants reached) → short-term outcomes (knowledge, attitudes) → intermediate outcomes (behavior change) → long-term outcomes (BMI reduction, health improvement); identifies key assumptions."
    weight: 0.35
    description: "LogicModelDesign"
  - type: llm_judge
    criteria: "Health equity analysis examines differential effects — evaluates whether the program works equally well for children across racial/ethnic groups, income levels, urban/rural settings, and family structures; identifies whether the program inadvertently widens disparities by benefiting already-advantaged children more; provides equity-focused recommendations."
    weight: 0.30
    description: "HealthEquityAnalysis"
