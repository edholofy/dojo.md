meta:
  id: regulatory-health-claims-compliance
  level: 3
  course: health-education-content-writing
  type: output
  description: "Navigate health claims regulatory compliance — develop content guidelines for health claims in marketing, education, and digital media that meet FDA, FTC, and state regulatory requirements"
  tags: [regulatory-compliance, health-claims, fda-ftc, advanced]

state: {}

trigger: |
  Develop a comprehensive health claims compliance
  framework for a health and wellness company that
  produces both educational health content and
  consumer health products.

  Organization: VitalLife Health & Wellness
  - Consumer health product line (supplements,
    functional foods, wellness devices)
  - Health education platform (blog, podcast, social
    media, 500K followers)
  - Telehealth service integration
  - Annual marketing budget: $15M
  - Previous FTC warning letter for unsubstantiated
    claims on social media

  Regulatory landscape:
  - FDA: Dietary supplement health claims (structure/
    function vs. disease claims)
  - FTC: Advertising substantiation (Health Products
    Compliance Guidance 2022)
  - State consumer protection laws
  - NAD (National Advertising Division) self-regulatory
    guidance
  - Social media and influencer marketing regulations
  - HIPAA considerations for health content connected
    to telehealth

  Problematic content examples:
  1. Blog post: "Our turmeric supplement cures joint
     inflammation" (disease claim without FDA approval)
  2. Influencer post: "I lost 30 lbs using VitalLife
     pills!" (testimonial without typical results)
  3. Instagram ad: "Clinically proven to boost immunity"
     (vague clinical proof citation)
  4. Podcast: "Studies show our supplement prevents
     cancer" (cherry-picked, non-peer-reviewed study)

  Create:
  1. Health claims compliance framework
  2. Content review and approval process
  3. Permissible vs. prohibited claims taxonomy
  4. Influencer marketing compliance guidelines
  5. Evidence substantiation standards
  6. Corrective action plan for existing violations
  7. Staff and creator training program
  8. Regulatory monitoring and change management

assertions:
  - type: llm_judge
    criteria: "Claims taxonomy clearly distinguishes between permissible and prohibited claims — provides specific examples of structure/function claims ('supports joint health') vs. disease claims ('cures arthritis'); explains the FDA disclaimer requirements for structure/function claims; gives writers a practical reference for evaluating any proposed claim before publication."
    weight: 0.35
    description: "ClaimsTaxonomy"
  - type: llm_judge
    criteria: "Corrective action plan addresses the existing FTC warning letter and problematic content — identifies all four problematic examples and provides specific corrections; includes a timeline for remediation, a process for reviewing all existing content, and proactive engagement with FTC to demonstrate good faith compliance; doesn't just fix examples but systematically audits all content."
    weight: 0.35
    description: "CorrectiveActionPlan"
  - type: llm_judge
    criteria: "Influencer marketing guidelines address the unique compliance challenges of social media — requires specific disclosure language (#ad, sponsorship disclosure), prohibits testimonials that imply atypical results without disclaimers, establishes an approval process for influencer content before posting, and includes contract provisions for compliance; addresses FTC endorsement guidelines specifically."
    weight: 0.30
    description: "InfluencerComplianceGuidelines"
