meta:
  id: advanced-health-writing-shift
  level: 3
  course: health-education-content-writing
  type: output
  description: "Advanced shift simulation — manage enterprise health education crises including a vaccine misinformation viral event, regulatory violation discovery, health literacy lawsuit, and multi-language content emergency"
  tags: [shift-simulation, enterprise-crisis, multi-scenario, advanced]

state: {}

trigger: |
  You are the Chief Health Education Officer for a
  national health system. Handle these concurrent
  crises during an intense week.

  SITUATION 1 — Viral misinformation crisis:
  A prominent social media influencer (8M followers)
  has posted a video claiming your health system's
  patient education materials about childhood vaccines
  contain "hidden ingredients designed to alter DNA."
  The video has 4M views and counting. Parents are
  calling your clinics demanding answers. Your existing
  vaccine education materials, while accurate, are
  text-heavy and fail to address the specific claims.
  Anti-vaccine groups are organizing protests at your
  facilities.

  SITUATION 2 — FTC compliance violation:
  Your compliance team has discovered that your digital
  wellness platform has been making unsubstantiated
  health claims in its marketing content for 8 months.
  Claims include "clinically proven to reduce anxiety
  by 60%" based on a single pilot study. The FTC has
  not contacted you yet, but similar companies have
  received enforcement actions recently.

  SITUATION 3 — Health literacy lawsuit:
  A patient who suffered a medication overdose is
  suing your health system, claiming the medication
  instructions were written at a 12th grade reading
  level and she couldn't understand them. Her attorney
  has expert witnesses in health literacy. Discovery
  reveals that most of your medication guides exceed
  a 10th grade reading level.

  SITUATION 4 — Emergency multilingual content:
  A factory explosion in a community served by your
  health system has resulted in toxic chemical exposure
  for 500+ workers. 70% of the affected workers speak
  only Spanish, Burmese, or Karen languages. You need
  emergency health education about chemical exposure
  symptoms, decontamination, and when to seek emergency
  care — in languages you don't currently produce
  content in.

  Handle all four situations:
  1. Misinformation crisis response
  2. FTC proactive compliance remediation
  3. Health literacy lawsuit defense strategy
  4. Emergency multilingual content production
  5. Resource allocation and prioritization
  6. Board communication plan

assertions:
  - type: llm_judge
    criteria: "Misinformation crisis response is rapid and multi-channel — creates a direct video response from a trusted physician (not corporate communications); develops shareable fact-check content for social media; provides clinic staff with talking points for parent conversations; engages trusted community voices; doesn't just publish a press release but meets the misinformation where it lives."
    weight: 0.35
    description: "MisinformationCrisisResponse"
  - type: llm_judge
    criteria: "FTC compliance response is proactive — initiates voluntary self-disclosure before FTC contacts you; immediately takes down unsubstantiated claims; commissions a comprehensive content audit; implements a claims review process to prevent recurrence; the proactive approach is both ethically appropriate and strategically sound for reducing potential penalties."
    weight: 0.35
    description: "ProactiveFTCCompliance"
  - type: llm_judge
    criteria: "Emergency multilingual response addresses languages the system doesn't normally serve — identifies rapid translation resources (community interpreters, professional translation services, community organizations) for Burmese and Karen languages; creates pictographic/visual materials that work regardless of language; prioritizes getting critical safety information out immediately, even if imperfect, over waiting for perfect translations."
    weight: 0.30
    description: "EmergencyMultilingualResponse"
