meta:
  id: public-health-crisis-communication
  level: 3
  course: health-education-content-writing
  type: output
  description: "Design public health crisis communication — develop comprehensive communication frameworks for disease outbreaks, environmental health emergencies, and public health crises"
  tags: [crisis-communication, public-health, emergency-response, advanced]

state: {}

trigger: |
  Design a comprehensive public health crisis
  communication framework for a state health department,
  drawing on lessons from COVID-19 and other recent
  public health emergencies.

  Organization: State Department of Health
  - Population served: 8.5 million
  - 67 counties with varying demographics and politics
  - 3 major metropolitan areas, large rural regions
  - Multiple Native American tribal communities
  - Previous crisis communications criticized for:
    * Inconsistent messaging across state agencies
    * Delayed community engagement
    * Poor multilingual communication
    * Trust deficit in underserved communities
    * Inability to combat social media misinformation
    * One-size-fits-all messaging that failed diverse
      populations

  Crisis scenarios the framework must address:
  1. Novel infectious disease outbreak (pandemic-scale)
  2. Environmental health emergency (chemical spill,
     water contamination)
  3. Bioterrorism event
  4. Mental health crisis (mass casualty event response)
  5. Food safety emergency (multistate outbreak)

  Create:
  1. Crisis communication framework (adaptable to
     any scenario)
  2. Audience segmentation and message tailoring
  3. Multilingual and multicultural communication plan
  4. Social media and misinformation response protocol
  5. Community partner activation strategy
  6. Risk communication training curriculum for
     spokespersons
  7. Message testing and rapid feedback mechanisms
  8. Post-crisis communication evaluation

assertions:
  - type: llm_judge
    criteria: "Framework applies CDC's Crisis and Emergency Risk Communication (CERC) principles — structures communication across the crisis lifecycle (pre-crisis, initial, maintenance, resolution, evaluation); addresses the key CERC principles of being first, being right, being credible, expressing empathy, promoting action, and showing respect."
    weight: 0.35
    description: "CERCFrameworkApplication"
  - type: llm_judge
    criteria: "Audience segmentation reflects the real population diversity — creates distinct communication strategies for urban vs. rural, tribal communities, immigrant populations, politically diverse regions, low-literacy populations, and digitally disconnected communities; recognizes that 'one message for all' failed during COVID-19 and provides audience-specific channels, messengers, and framing."
    weight: 0.35
    description: "AudienceSegmentation"
  - type: llm_judge
    criteria: "Misinformation response protocol is proactive, not just reactive — monitors social media for emerging false narratives before they go viral, has pre-drafted responses for predictable misinformation categories, identifies and partners with trusted community voices who can amplify accurate information, and uses the same channels where misinformation spreads."
    weight: 0.30
    description: "ProactiveMisinformationResponse"
