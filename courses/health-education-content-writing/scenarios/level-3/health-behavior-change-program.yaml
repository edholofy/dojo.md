meta:
  id: health-behavior-change-program
  level: 3
  course: health-education-content-writing
  type: output
  description: "Design a health behavior change communication program — apply evidence-based behavioral science frameworks to create communications that motivate and sustain healthy behavior changes"
  tags: [behavior-change, behavioral-science, health-promotion, advanced]

state: {}

trigger: |
  Design a comprehensive health behavior change
  communication program to reduce tobacco use in
  a rural county with smoking rates double the
  national average.

  Setting: Rural Appalachian county
  - Population: 45,000
  - Adult smoking rate: 32% (national: 11%)
  - Smokeless tobacco use: 18% (men)
  - Youth vaping rate: 28%
  - Median household income: $32,000
  - Uninsured rate: 15%
  - Limited cessation services (nearest specialist
    is 60 miles away)
  - Cultural identity tied to tobacco (tobacco farming
    history, social bonding)
  - Previous "quit smoking" campaigns had no measurable
    impact
  - High distrust of government health messaging

  Behavioral science frameworks to apply:
  - Health Belief Model
  - Transtheoretical Model (stages of change)
  - Social Cognitive Theory
  - Motivational Interviewing principles
  - COM-B model (Capability, Opportunity, Motivation)

  Create:
  1. Community behavioral assessment
  2. Multi-stage communication campaign design
  3. Stage-matched messaging (pre-contemplation through
     maintenance)
  4. Culturally appropriate content for Appalachian
     community
  5. Peer champion recruitment and training program
  6. Digital support tools design
  7. Environmental and policy change advocacy
  8. 3-year evaluation plan

assertions:
  - type: llm_judge
    criteria: "Stage-matched messaging addresses each stage of change differently — pre-contemplators receive awareness messaging without pressure to quit; contemplators receive decisional balance content; preparation-stage smokers receive practical quit tools and cessation resources; action-stage quitters receive support and reinforcement; maintenance focuses on relapse prevention; the campaign meets people where they are."
    weight: 0.35
    description: "StageMatchedMessaging"
  - type: llm_judge
    criteria: "Cultural approach respects Appalachian identity — doesn't talk down to the community or dismiss tobacco's cultural significance; uses local voices, stories, and contexts; addresses the economic reality (can't afford cessation medications, limited access to specialists); builds on existing community strengths (tight-knit social networks, faith communities, self-reliance values)."
    weight: 0.35
    description: "CulturalRespectAndRelevance"
  - type: llm_judge
    criteria: "Peer champion program creates sustainable local infrastructure — trains respected community members (not outsiders) as cessation support providers; creates a support network that persists beyond the campaign; addresses the 60-mile distance to cessation specialists by building local capacity; includes ongoing training and support for peer champions."
    weight: 0.30
    description: "PeerChampionProgram"
