meta:
  id: ai-health-content-generation
  level: 3
  course: health-education-content-writing
  type: output
  description: "Design an AI-powered health education content generation system — build responsible AI tools that assist in creating, personalizing, and translating patient education materials"
  tags: [ai-content, generative-ai, responsible-ai, advanced]

state: {}

trigger: |
  Design a responsible AI-powered system for generating
  and personalizing health education content at scale.

  Organization: National Health Education Collaborative
  - Serves 200+ healthcare organizations
  - Produces 500+ new patient education documents
    annually
  - Current content production takes 4-6 weeks per
    document (clinical review, literacy editing,
    design, translation)
  - Backlog of 800+ content requests
  - Content personalization demand exceeds human capacity

  AI system goals:
  - Accelerate content creation (days instead of weeks)
  - Personalize content to patient demographics,
    literacy level, language, and health condition
  - Maintain clinical accuracy and evidence-based content
  - Ensure health literacy standards are met consistently
  - Support translation and cultural adaptation
  - Reduce production costs while improving quality

  Responsible AI concerns:
  - Clinical accuracy is non-negotiable (hallucination
    risk)
  - Health misinformation generation is unacceptable
  - Bias in health recommendations across demographics
  - Over-reliance on AI without clinical validation
  - Patient trust in AI-generated health content
  - Regulatory compliance (FDA, FTC)
  - Accessibility and equity in AI-personalized content

  Create:
  1. AI system architecture for health content generation
  2. Responsible AI framework (accuracy, bias, safety)
  3. Human-in-the-loop clinical validation workflow
  4. Content personalization engine design
  5. Quality assurance and hallucination detection
  6. Bias detection and mitigation strategy
  7. Patient transparency and disclosure policy
  8. Evaluation methodology (AI vs. human content)

assertions:
  - type: llm_judge
    criteria: "Responsible AI framework treats clinical accuracy as the paramount concern — implements multiple layers of hallucination detection, clinical fact-checking, and evidence source verification; AI-generated content never reaches patients without clinical human review; the system is designed to fail safe (reject uncertain content rather than publish it)."
    weight: 0.35
    description: "ClinicalAccuracySafeguards"
  - type: llm_judge
    criteria: "Content personalization engine goes beyond simple variable substitution — adapts reading level, cultural references, examples, and health literacy approach based on patient profile; a 25-year-old college graduate receives different content framing than a 70-year-old with limited English; personalization improves comprehension without changing clinical accuracy."
    weight: 0.35
    description: "IntelligentPersonalization"
  - type: llm_judge
    criteria: "Bias detection strategy addresses health education's unique risks — identifies biases in health recommendations across demographics (body image assumptions, dietary assumptions, access assumptions, cultural assumptions); tests whether AI-generated content inadvertently provides different quality of education to different populations; includes ongoing monitoring and correction."
    weight: 0.30
    description: "BiasDetectionStrategy"
