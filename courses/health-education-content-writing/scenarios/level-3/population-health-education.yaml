meta:
  id: population-health-education
  level: 3
  course: health-education-content-writing
  type: output
  description: "Design a population health education strategy — create data-driven, targeted health education interventions for specific population segments based on health risk profiles and social determinants"
  tags: [population-health, data-driven, targeted-intervention, advanced]

state: {}

trigger: |
  Design a population health education strategy for
  a health plan serving 2.5 million members, using
  claims data and social determinants to target
  interventions where they'll have the greatest impact.

  Organization: Commonwealth Health Plan
  - 2.5 million commercial and Medicare Advantage members
  - Population health analytics team with rich data
  - Health education budget: $8M annually
  - Current approach: Generic wellness mailings to all
    members with 2% engagement rate

  Population segmentation data:
  - Segment A (320K): Rising risk — pre-diabetic,
    pre-hypertensive, overweight; average age 48;
    80% engaged with employer; responsive to digital
  - Segment B (180K): Complex chronic — 3+ conditions,
    high ED utilization, medication adherence <60%;
    average age 67; 40% rural; digital divide issues
  - Segment C (95K): Behavioral health — depression,
    anxiety, substance use; average age 38; high
    no-show rate; stigma barriers
  - Segment D (210K): Maternal/pediatric — pregnant
    women and children 0-5; diverse; 30% Medicaid
    dual-eligible; high-risk pregnancy indicators
  - Segment E (1.7M): Generally healthy — routine
    preventive care needs; low engagement with health
    education; opportunity for prevention

  Create:
  1. Population health education strategy
  2. Segment-specific intervention designs
  3. Channel strategy by segment
  4. Content personalization framework
  5. Member engagement and activation model
  6. Outcome measurement by segment
  7. Cost-effectiveness analysis framework
  8. Scale-up and sustainability plan

assertions:
  - type: llm_judge
    criteria: "Segment-specific interventions are tailored to each population's needs and channels — Segment A gets digital nudges and gamified wellness; Segment B gets in-home community health worker visits with simplified materials; Segment C gets stigma-free digital tools and peer support; Segment D gets culturally diverse prenatal education; the strategy doesn't just personalize content but personalizes the entire intervention approach."
    weight: 0.35
    description: "SegmentSpecificInterventions"
  - type: llm_judge
    criteria: "Engagement model moves beyond the 2% response rate — identifies why generic mailings fail (irrelevant, impersonal, passive); designs multi-touch, multi-channel campaigns with personalized triggers (post-claim, post-prescription, pre-appointment); uses behavioral nudges, preferred channels, and relevant timing to dramatically increase engagement."
    weight: 0.35
    description: "EngagementActivationModel"
  - type: llm_judge
    criteria: "Cost-effectiveness analysis connects education investment to health outcomes and cost savings — models the ROI of preventing diabetes progression in Segment A, reducing ED visits in Segment B, improving adherence in Segment C, and reducing NICU admissions in Segment D; the $8M budget is allocated based on impact per dollar, not equal distribution."
    weight: 0.30
    description: "CostEffectivenessAnalysis"
