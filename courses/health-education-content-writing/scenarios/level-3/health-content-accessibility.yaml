meta:
  id: health-content-accessibility
  level: 3
  course: health-education-content-writing
  type: output
  description: "Design an accessible health education program — create comprehensive accessibility standards for health content serving patients with disabilities, cognitive impairments, and diverse learning needs"
  tags: [accessibility, disability-inclusion, universal-design, advanced]

state: {}

trigger: |
  Design a comprehensive accessibility program for
  health education content at a national health
  organization, ensuring all patient education materials
  are usable by people with diverse abilities.

  Organization: American Health Education Alliance
  - Produces 2,000+ patient education resources annually
  - Content distributed through 500+ member organizations
  - Serves 50M+ patients annually
  - Recent ADA compliance audit found 72% of materials
    fail accessibility standards
  - Growing legal liability (3 lawsuits filed in past year)
  - No existing accessibility standards or review process

  Populations to serve:
  - Visual impairments (blindness, low vision, color
    blindness): 12M Americans
  - Hearing impairments (deaf, hard of hearing): 48M
    Americans
  - Cognitive disabilities (intellectual, learning
    disabilities, TBI, dementia): 15M+ Americans
  - Motor disabilities (limited dexterity for digital
    interaction): 20M Americans
  - Low literacy (below 6th grade reading level): 54M
    adults
  - Aging population (declining vision, hearing,
    cognition): 54M aged 65+

  Content types to make accessible:
  - Print materials (brochures, handouts, posters)
  - Digital content (website, PDFs, apps)
  - Video content (educational videos, animations)
  - Audio content (podcasts, phone messages)
  - Interactive tools (health assessments, calculators)
  - Emerging formats (AR/VR health education)

  Create:
  1. Universal design principles for health content
  2. Accessibility standards by content type
  3. WCAG 2.1 AA compliance roadmap for digital content
  4. Plain language and cognitive accessibility guidelines
  5. Assistive technology compatibility specifications
  6. Accessibility testing protocol and tools
  7. Staff training and certification program
  8. Remediation plan for existing non-compliant content

assertions:
  - type: llm_judge
    criteria: "Universal design principles go beyond legal compliance — applies Universal Design for Learning (UDL) principles to provide multiple means of engagement, representation, and action/expression; the goal is not just 'accessible' but 'usable and effective for everyone'; content designed for accessibility improves the experience for all users."
    weight: 0.35
    description: "UniversalDesignPrinciples"
  - type: llm_judge
    criteria: "Cognitive accessibility guidelines address the most overlooked population — provides specific standards for content structure (short sentences, one idea per paragraph), navigation (predictable layouts), comprehension aids (glossaries, summaries), and interaction design (simple forms, clear error messages); applies equally to dementia patients, people with learning disabilities, and patients under stress."
    weight: 0.35
    description: "CognitiveAccessibilityGuidelines"
  - type: llm_judge
    criteria: "Remediation plan prioritizes the 72% non-compliant content realistically — creates a risk-based prioritization (highest-use materials first, legally required materials next, then everything else); provides estimated timeline and resources needed; includes automated scanning tools for quick wins and manual review process for complex remediation."
    weight: 0.30
    description: "RemediationPrioritization"
