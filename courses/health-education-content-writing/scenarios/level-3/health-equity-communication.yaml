meta:
  id: health-equity-communication
  level: 3
  course: health-education-content-writing
  type: output
  description: "Design health equity-centered communication strategies — create frameworks for addressing health disparities through targeted, culturally responsive health education that reduces inequities"
  tags: [health-equity, disparities, culturally-responsive, advanced]

state: {}

trigger: |
  Design a health equity-centered communication
  strategy for a metropolitan health department
  addressing stark disparities in maternal health
  outcomes.

  City demographics and disparities:
  - Population: 1.2 million
  - Black maternal mortality rate: 4.3x higher than
    white rate
  - Latina women receive prenatal care on average
    6 weeks later than white women
  - Black infants have 2.3x higher mortality rate
  - Indigenous women face highest rates of preterm birth
  - Immigrant women face language and documentation
    barriers
  - Low-income women across all races face transportation
    and scheduling barriers

  Root causes identified:
  - Implicit bias in healthcare settings
  - Medical mistrust rooted in historical and ongoing
    racism
  - Structural barriers (transportation, childcare,
    work policies)
  - Insurance gaps and coverage confusion
  - Cultural disconnect between providers and patients
  - Social determinants (housing, food, safety)
  - Inadequate health education that doesn't reach
    highest-risk populations

  Create:
  1. Health equity communication framework
  2. Community-specific maternal health campaigns
    (4 distinct communities)
  3. Community doula program communication and
    recruitment materials
  4. Provider implicit bias awareness content
  5. Systemic barrier navigation resources
  6. Community storytelling project design
  7. Policy advocacy communication strategy
  8. Evaluation framework focused on equity metrics

assertions:
  - type: llm_judge
    criteria: "Community-specific campaigns are genuinely distinct — the Black maternal health campaign addresses medical racism and builds on community strength and sisterhood; the Latina campaign addresses language access and cultural integration; the Indigenous campaign respects tribal sovereignty and traditional birth practices; each campaign is designed WITH the community, not FOR them."
    weight: 0.35
    description: "CommunitySpecificCampaigns"
  - type: llm_judge
    criteria: "Communication framework addresses the upstream causes of disparities — doesn't just provide more health education to underserved populations (which implies the problem is their knowledge); addresses systemic issues like implicit bias, structural barriers, and policy failures; positions health education as one tool within a broader equity strategy."
    weight: 0.35
    description: "UpstreamDisparityFocus"
  - type: llm_judge
    criteria: "Community storytelling project amplifies lived experience — creates a platform for women from affected communities to share their stories in their own voices; these stories serve both as community validation and as advocacy tools; the project includes ethical protocols for informed consent, privacy protection, and community ownership of narratives."
    weight: 0.30
    description: "CommunityStorytellingDesign"
