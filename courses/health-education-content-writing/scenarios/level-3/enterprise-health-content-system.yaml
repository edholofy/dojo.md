meta:
  id: enterprise-health-content-system
  level: 3
  course: health-education-content-writing
  type: output
  description: "Design an enterprise health education content management system — create a scalable platform for producing, managing, and distributing evidence-based patient education across a multi-facility health system"
  tags: [enterprise-system, content-management, scalable-platform, advanced]

state: {}

trigger: |
  Design an enterprise health education content
  management system for a large health system that
  currently has fragmented, inconsistent patient
  education across its facilities.

  Organization: Summit Health Partners
  - 8 hospitals, 60 clinics, 1,200 providers
  - 15 specialty departments
  - Current state: Each department creates its own
    patient education materials independently
  - Result: 4,000+ patient education documents,
    many contradictory, outdated, or duplicative
  - No centralized review or approval process
  - No version control
  - No readability or accessibility standards enforced
  - Translation happens ad hoc (quality varies)
  - $1.2M spent annually on patient education materials
    with no quality assurance

  System requirements:
  - Centralized content repository with taxonomy
  - Workflow for creation, review, approval, distribution
  - Version control and document lifecycle management
  - Automated readability and accessibility checking
  - Translation management (8 languages)
  - Integration with EHR (auto-print relevant materials)
  - Analytics on content usage and patient outcomes
  - Mobile and web delivery channels

  Create:
  1. System architecture and requirements document
  2. Content taxonomy and metadata schema
  3. Workflow design (creation through distribution)
  4. Quality standards and style guide
  5. EHR integration specification
  6. Translation management process
  7. Analytics and outcomes measurement framework
  8. Implementation roadmap and change management

assertions:
  - type: llm_judge
    criteria: "Content taxonomy enables findability and prevents duplication — organizes 4,000+ documents by condition, procedure, audience, language, department, and content type; implements a tagging system that connects related content; enables a provider to find the right patient education material for a specific clinical context within seconds."
    weight: 0.35
    description: "ContentTaxonomy"
  - type: llm_judge
    criteria: "Quality workflow prevents the current problems — every document goes through clinical review (accuracy), health literacy review (readability), legal review (liability), and cultural review (appropriateness) before publication; automated readability scoring catches documents above target level; version control ensures patients never receive outdated information."
    weight: 0.35
    description: "QualityWorkflowDesign"
  - type: llm_judge
    criteria: "EHR integration makes patient education contextual — automatically surfaces relevant education materials based on patient's diagnoses, medications, and upcoming procedures; prints or delivers digitally at point of care; tracks which materials were provided to which patients; enables teach-back documentation."
    weight: 0.30
    description: "EHRIntegration"
