meta:
  id: multilingual-health-content
  level: 2
  course: health-education-content-writing
  type: output
  description: "Design multilingual health education content — create culturally adapted health materials for diverse populations considering linguistic nuance, cultural health beliefs, and health literacy across languages"
  tags: [multilingual, cultural-adaptation, health-disparities, intermediate]

state: {}

trigger: |
  Design a multilingual, culturally adapted health
  education program about prenatal care for a community
  health center serving a diverse immigrant population.

  Community demographics:
  - Spanish-speaking (Mexican, Central American): 40%
  - Haitian Creole-speaking: 20%
  - Arabic-speaking (various countries): 15%
  - Mandarin/Cantonese-speaking: 10%
  - English-speaking: 15%

  Cultural considerations:
  - Mexican community: Strong family involvement in
    pregnancy, traditional remedies (teas, herbs),
    may delay prenatal care due to cost/documentation
    fears
  - Haitian community: Cultural beliefs about pregnancy
    diet restrictions, spiritual practices during
    pregnancy, distrust of medical system
  - Arabic-speaking: Gender-concordant care preferences,
    modesty considerations, Ramadan fasting during
    pregnancy concerns
  - Chinese community: Traditional Chinese medicine
    practices during pregnancy, postpartum "sitting
    month" (zuo yue zi), dietary temperature beliefs

  Content to create:
  1. Core prenatal care content (adaptable across
     cultures)
  2. Cultural adaptation guidelines for each community
  3. Community health worker training materials
  4. Visual/pictographic materials for low-literacy
     populations
  5. Integration of traditional practices with
     evidence-based care

assertions:
  - type: llm_judge
    criteria: "Cultural adaptations go beyond translation — doesn't just translate English content; adapts health messages to align with each community's cultural health beliefs and practices; for example, the Mexican community materials integrate rather than dismiss traditional remedies, noting which are safe and which may interact with prenatal care."
    weight: 0.35
    description: "CulturalAdaptationDepth"
  - type: llm_judge
    criteria: "Materials respectfully integrate traditional practices with evidence-based care — doesn't frame traditional practices as 'wrong' or 'superstition'; acknowledges their cultural significance; provides evidence-based guidance on safety (e.g., which herbal teas are safe during pregnancy, how to observe Ramadan fasting safely while pregnant, which TCM practices complement prenatal care)."
    weight: 0.35
    description: "TraditionalPracticeIntegration"
  - type: llm_judge
    criteria: "Visual/pictographic materials serve low-literacy populations across all languages — uses images, icons, and minimal text to convey essential prenatal care information; a patient who cannot read in any language can still understand the key messages about prenatal visits, nutrition, warning signs, and when to seek emergency care."
    weight: 0.30
    description: "PictographicAccessibility"
