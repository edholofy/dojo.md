meta:
  id: intermediate-health-writing-shift
  level: 2
  course: health-education-content-writing
  type: output
  description: "Intermediate shift simulation — manage complex health education writing projects including a multilingual vaccination campaign, patient decision aid revision, and an outbreak communication response"
  tags: [shift-simulation, complex-projects, multi-scenario, intermediate]

state: {}

trigger: |
  You are the health education director for a county
  health department. Handle these concurrent projects
  during a challenging week.

  PROJECT 1 — Measles outbreak communication:
  A measles outbreak has been confirmed (12 cases,
  2 hospitalizations) centered in a community with
  low vaccination rates. The community includes both
  vaccine-hesitant families and recent immigrants who
  missed childhood vaccinations. You need to create
  emergency health communications that are informative
  without causing panic, culturally sensitive, and
  available in English, Spanish, and Somali. The local
  news is already covering the story.

  PROJECT 2 — Opioid overdose prevention:
  The county has seen a 35% increase in opioid overdose
  deaths this year. The county commission has requested
  a public-facing naloxone (Narcan) education campaign
  targeting: (a) people who use opioids, (b) their
  family members, and (c) the general public. The
  campaign must be non-stigmatizing and practically
  useful. County commissioners are politically
  conservative and sensitive about "enabling drug use."

  PROJECT 3 — ADA-compliant health materials:
  A disability rights organization has filed a formal
  complaint that the health department's patient
  education materials are not accessible to people
  with visual impairments, hearing impairments, or
  cognitive disabilities. You need to audit existing
  materials and create an accessibility remediation plan.

  Handle all three projects:
  1. Measles outbreak communication materials
  2. Naloxone education campaign design
  3. ADA accessibility audit and remediation plan
  4. Stakeholder management across all three
  5. Resource allocation and timeline

assertions:
  - type: llm_judge
    criteria: "Measles communication balances urgency with cultural sensitivity — provides clear, factual information about measles risk and vaccination without blaming unvaccinated communities; differentiates messaging for vaccine-hesitant families (trust-building) vs. immigrant families who missed vaccinations (access-focused); includes specific guidance on exposure response."
    weight: 0.35
    description: "MeaslesOutbreakCommunication"
  - type: llm_judge
    criteria: "Naloxone campaign navigates political sensitivity without compromising public health — frames naloxone as life-saving medication (comparable to EpiPen or AED), not as 'enabling'; addresses the commissioner concern by presenting overdose reversal as consistent with conservative values (saving lives, reducing emergency costs, supporting families); the campaign is practically useful for all three target audiences."
    weight: 0.35
    description: "NaloxoneCampaignNavigation"
  - type: llm_judge
    criteria: "ADA remediation plan is comprehensive and systematic — addresses visual (screen reader compatibility, alt text, large print), hearing (captioning, visual alternatives to audio), and cognitive (plain language, simplified layouts) accessibility; creates a prioritized timeline for remediating existing materials and standards for all new materials."
    weight: 0.30
    description: "ADARemediationPlan"
