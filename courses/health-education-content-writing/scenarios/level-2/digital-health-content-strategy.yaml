meta:
  id: digital-health-content-strategy
  level: 2
  course: health-education-content-writing
  type: output
  description: "Design a digital health education content strategy — create a multi-platform approach to patient education including website, patient portal, social media, and mobile app content"
  tags: [digital-content, multi-platform, content-strategy, intermediate]

state: {}

trigger: |
  Design a comprehensive digital health education
  content strategy for a health system launching a
  patient-facing digital health platform.

  Organization: Coastal Health System
  - 3 hospitals, 20 clinics, 300 providers
  - Patient population: 180,000 active patients
  - Current digital presence: Basic website, patient
    portal (MyChart) with 35% adoption
  - No social media health education strategy
  - No mobile health content
  - Patient satisfaction with health education: 2.8/5

  Patient digital behavior analysis:
  - 72% of patients search health info online before
    or after appointments
  - 45% use smartphones as primary internet device
  - 38% follow health-related social media accounts
  - 60% prefer video content over text
  - Top searched topics: medications, conditions,
    procedures, nutrition, mental health

  Content gaps identified:
  - Website: Outdated, text-heavy, not mobile-friendly
  - Patient portal: No educational content, just
    appointment/results
  - Social media: Promotional only (no health education)
  - Video: No patient education video library
  - Personalization: Same content for all patients

  Create:
  1. Multi-platform content strategy
  2. Content calendar (monthly themes, posting cadence)
  3. Website health education section redesign
  4. Patient portal integration plan
  5. Social media health education playbook
  6. Video content production guidelines
  7. Content personalization approach
  8. Analytics and measurement framework

assertions:
  - type: llm_judge
    criteria: "Multi-platform strategy recognizes that different platforms serve different purposes — website for comprehensive reference content, patient portal for personalized condition-specific education, social media for awareness and engagement, video for complex topics and procedures; content is adapted for each platform, not just cross-posted."
    weight: 0.35
    description: "PlatformDifferentiation"
  - type: llm_judge
    criteria: "Content personalization approach leverages patient data appropriately — uses diagnosis, medications, upcoming procedures, and demographics to serve relevant health education content through the patient portal; a diabetic patient sees diabetes management content, not generic wellness; addresses HIPAA considerations for personalized health content delivery."
    weight: 0.35
    description: "PersonalizationApproach"
  - type: llm_judge
    criteria: "Social media playbook addresses health misinformation — includes guidelines for responding to health misinformation in comments, creating shareable evidence-based content that competes with misinformation, and establishing the health system as a trusted source; doesn't just post content but engages with patient questions and concerns."
    weight: 0.30
    description: "SocialMediaMisinformation"
