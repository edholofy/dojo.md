meta:
  id: shared-decision-making-aid
  level: 2
  course: health-education-content-writing
  type: output
  description: "Create a patient decision aid — design evidence-based decision support materials that help patients make informed choices between treatment options"
  tags: [decision-aid, shared-decision-making, treatment-options, intermediate]

state: {}

trigger: |
  Create a patient decision aid for women diagnosed
  with early-stage breast cancer (Stage I or II) who
  need to choose between breast-conserving surgery
  (lumpectomy + radiation) and mastectomy.

  Clinical context:
  - For early-stage breast cancer, research shows
    equivalent survival rates between both options
  - The choice is preference-sensitive — there is no
    "right answer"
  - Many patients feel overwhelmed and default to what
    their surgeon recommends
  - Informed patients report higher satisfaction with
    their decision regardless of choice

  Content requirements (IPDAS standards):
  - Present both options fairly and completely
  - Include survival statistics for both options
  - Include quality-of-life considerations
  - Include risks and side effects of each option
  - Include reconstruction options (if mastectomy)
  - Address common concerns and misconceptions
  - Include values clarification exercise
  - NOT designed to persuade toward either option

  Target audience:
  - Women aged 35-75 newly diagnosed
  - Emotionally distressed and information-overloaded
  - May have varying health literacy levels
  - Support persons (partners, family) may also use it
  - Different cultural perspectives on body image

  Create:
  1. Decision aid document (8-12 pages)
  2. Side-by-side comparison of options
  3. Values clarification exercise
  4. Personal decision worksheet
  5. Questions to ask your surgeon
  6. Glossary of terms used

assertions:
  - type: llm_judge
    criteria: "Decision aid presents both options with genuine neutrality — doesn't subtly favor one option through language, emphasis, or framing; presents the same depth of information for both lumpectomy+radiation and mastectomy; uses balanced visual layout; the values clarification exercise helps patients identify THEIR priorities without suggesting which choice better serves those priorities."
    weight: 0.35
    description: "NeutralPresentation"
  - type: llm_judge
    criteria: "Statistics are presented in a way that supports understanding — uses absolute numbers rather than percentages ('Out of 100 women like you, X...'), presents both benefit and harm statistics in the same format, includes visual aids (icon arrays or pictographs) for risk communication, avoids framing effects by presenting survival AND mortality data."
    weight: 0.35
    description: "StatisticalPresentation"
  - type: llm_judge
    criteria: "Values clarification exercise helps patients identify what matters most to THEM — explores trade-offs between body image preservation, minimizing treatment time, anxiety about recurrence, physical recovery, impact on daily life, and reconstruction considerations; produces a personal preference profile that the patient can discuss with their surgeon."
    weight: 0.30
    description: "ValuesClarificationDesign"
