meta:
  id: adolescent-health-content
  level: 2
  course: health-education-content-writing
  type: output
  description: "Write adolescent-specific health education content — create age-appropriate, engaging health materials for teenagers on sensitive topics using youth-centered communication approaches"
  tags: [adolescent-health, youth-engagement, sensitive-topics, intermediate]

state: {}

trigger: |
  Write health education content about substance use
  prevention for teenagers, to be used in a high
  school health program and distributed through school
  counselor offices.

  Target audience:
  - High school students aged 14-18
  - Diverse socioeconomic backgrounds
  - Exposed to substance use through peers and media
  - Skeptical of authority-driven "just say no" messaging
  - Active on social media (TikTok, Instagram, Snapchat)
  - Mental health challenges are common in this age group

  Topics to cover:
  - Vaping/e-cigarettes (highest teen usage)
  - Cannabis (increasing legalization confusion)
  - Alcohol (social pressure, binge drinking)
  - Prescription drug misuse (stimulants, opioids)
  - Fentanyl awareness (unknowing exposure)
  - Connection between substance use and mental health
  - How to help a friend who's struggling
  - Resources for help (confidential, teen-friendly)

  Tone requirements:
  - NOT preachy, moralistic, or fear-based
  - Honest about why people use substances (doesn't
    pretend there's no appeal)
  - Science-based but accessible
  - Respects teen autonomy and intelligence
  - Uses teen-appropriate language (authentic, not
    cringe-worthy)

  Create:
  1. Main educational content (print/digital)
  2. Social media content series (5 posts)
  3. Peer-led discussion guides
  4. Help-seeking resource card (wallet-sized)
  5. Fentanyl-specific safety content

assertions:
  - type: llm_judge
    criteria: "Content respects teen intelligence without being preachy — acknowledges that substance use can feel appealing (stress relief, social belonging, curiosity) while presenting evidence about risks; doesn't use scare tactics that teens dismiss; treats readers as capable of making informed decisions when given honest information."
    weight: 0.35
    description: "RespectfulToneForTeens"
  - type: llm_judge
    criteria: "Fentanyl content addresses the unique danger appropriately — fentanyl contamination of other drugs is a genuine life-threatening issue; the content communicates this urgency without undermining the non-fear-based approach of the rest; includes practical harm reduction information (naloxone awareness, never using alone, fentanyl test strips) alongside prevention messaging."
    weight: 0.35
    description: "FentanylSafetyContent"
  - type: llm_judge
    criteria: "Help-seeking resources are genuinely teen-accessible — provides confidential text lines (not just phone numbers), apps, and online resources; acknowledges teens' fear of parental discovery; includes guidance on how to help a friend without betraying trust or becoming responsible for their safety alone; the Crisis Text Line (741741) and similar resources are prominently featured."
    weight: 0.30
    description: "TeenAccessibleResources"
