meta:
  id: infographic-health-campaign
  level: 2
  course: health-education-content-writing
  type: output
  description: "Design a health education infographic campaign — create data-driven visual health communication pieces that make complex health information accessible and shareable"
  tags: [infographic, visual-communication, health-campaign, intermediate]

state: {}

trigger: |
  Design a series of health education infographics
  for a public health department's campaign to reduce
  preventable chronic diseases in the county.

  Campaign: "Know Your Numbers"
  Focus: Helping residents understand and act on their
  key health numbers (blood pressure, blood sugar,
  cholesterol, BMI, waist circumference)

  County health data:
  - Population: 450,000
  - 42% of adults have hypertension (many unaware)
  - 14% have diabetes (30% undiagnosed)
  - 38% have high cholesterol
  - 36% are obese
  - Health disparities: Rates 40-60% higher in
    underserved zip codes
  - Previous text-based campaigns had minimal impact

  Infographic series (5 pieces):
  1. "Know Your Blood Pressure Numbers" — target ranges,
     what they mean, when to act
  2. "Know Your Blood Sugar" — fasting glucose, A1C,
     pre-diabetes thresholds
  3. "Know Your Cholesterol" — HDL, LDL, total,
     triglycerides explained simply
  4. "The Big Picture" — how all numbers connect,
     overall cardiovascular risk
  5. "Take Action" — free screening locations, next
     steps, resources

  Requirements:
  - Must work in print (clinic posters, mailers) and
    digital (social media, website)
  - Must be accessible to low-literacy audiences
  - Must be culturally inclusive (diverse representation)
  - Must include actionable next steps
  - Must be shareable on social media

  Create:
  1. Creative brief for each infographic
  2. Content/copy for each infographic
  3. Visual element recommendations
  4. Distribution and placement strategy
  5. Accessibility guidelines
  6. Campaign measurement approach

assertions:
  - type: llm_judge
    criteria: "Infographic content translates complex health numbers into immediate understanding — a resident looking at the blood pressure infographic should understand their numbers in under 10 seconds; uses color coding (green/yellow/red zones), relatable analogies, and clear action thresholds; numbers are presented as 'What's normal → What's concerning → What to do' flow."
    weight: 0.35
    description: "NumberTranslation"
  - type: llm_judge
    criteria: "Content works across print and digital formats — provides dimensions and design specifications for clinic posters, social media posts (Instagram, Facebook), and website embedding; considers that print needs to be readable from a distance while social media needs to be thumb-stopping; each format optimizes for its viewing context."
    weight: 0.35
    description: "CrossFormatDesign"
  - type: llm_judge
    criteria: "Campaign measurement goes beyond impressions — defines metrics that indicate whether people actually understood their numbers and took action (screening registrations, appointment requests, website health assessment completions); includes a pre/post community survey design to measure knowledge change."
    weight: 0.30
    description: "CampaignMeasurement"
