meta:
  id: health-literacy-assessment-redesign
  level: 2
  course: health-education-content-writing
  type: output
  description: "Redesign health education materials using health literacy assessment — evaluate existing materials with SAM and readability tools, then rewrite them to meet evidence-based health literacy standards"
  tags: [health-literacy, material-assessment, redesign, intermediate]

state: {}

trigger: |
  Evaluate and redesign existing patient education
  materials using health literacy assessment tools
  and evidence-based plain language principles.

  Materials to assess and rewrite:

  Material 1 — Current diabetes education handout
  (excerpt):
  "Diabetes mellitus is a chronic metabolic disorder
  characterized by hyperglycemia resulting from defects
  in insulin secretion, insulin action, or both. The
  pathophysiology involves progressive beta-cell
  dysfunction and insulin resistance. Glycemic control
  is assessed via HbA1c measurements, with a target
  of <7% for most patients. Pharmacological
  interventions include metformin as first-line therapy,
  with potential escalation to sulfonylureas, DPP-4
  inhibitors, GLP-1 receptor agonists, or insulin
  therapy based on individual patient response and
  comorbidity profile."

  Material 2 — Current heart failure discharge sheet
  (excerpt):
  "Monitor for signs of decompensation including
  peripheral edema, dyspnea on exertion, orthopnea,
  and paroxysmal nocturnal dyspnea. Weigh yourself
  daily and report a weight gain of >2 lbs in 24 hours
  or >5 lbs in one week. Restrict sodium intake to
  <2000mg/day and fluid to 1.5-2L/day unless otherwise
  directed. Avoid NSAIDs and report any changes in
  renal function."

  Tasks:
  1. Assess both materials using SAM (Suitability
     Assessment of Materials) criteria
  2. Calculate approximate reading level
  3. Identify specific health literacy barriers
  4. Rewrite both materials at 5th-6th grade level
  5. Redesign format for accessibility
  6. Create before/after comparison analysis

assertions:
  - type: llm_judge
    criteria: "SAM assessment identifies specific literacy barriers — evaluates content, literacy demand, graphics, layout, learning stimulation, and cultural appropriateness; doesn't just say 'too hard to read' but identifies specific problems (medical jargon, passive voice, complex sentence structure, lack of visual hierarchy, absence of actionable instructions)."
    weight: 0.35
    description: "SAMAssessmentQuality"
  - type: llm_judge
    criteria: "Rewritten diabetes material is genuinely patient-accessible — transforms 'chronic metabolic disorder characterized by hyperglycemia' into plain language a 5th grader could understand; replaces every medical term with an everyday equivalent or explains it simply; the rewritten version conveys the same essential information without dumbing it down."
    weight: 0.35
    description: "DiabetesRewriteQuality"
  - type: llm_judge
    criteria: "Heart failure discharge rewrite converts clinical monitoring instructions into patient actions — 'peripheral edema' becomes 'swelling in your ankles or feet'; 'dyspnea on exertion' becomes 'getting out of breath doing things that didn't used to make you breathless'; 'restrict sodium to <2000mg' becomes practical food guidance; every instruction is something a patient can actually DO."
    weight: 0.30
    description: "HeartFailureRewriteActionability"
