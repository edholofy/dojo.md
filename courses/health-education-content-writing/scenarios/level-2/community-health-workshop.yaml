meta:
  id: community-health-workshop
  level: 2
  course: health-education-content-writing
  type: output
  description: "Design a community health education workshop — create curriculum, facilitator guides, participant materials, and evaluation tools for an interactive health education program"
  tags: [community-education, workshop-design, curriculum, intermediate]

state: {}

trigger: |
  Design a 6-week community health education workshop
  series about diabetes prevention for a community
  with high diabetes risk.

  Program: "Take Control: Your Diabetes Prevention
  Journey"
  Based on: CDC Diabetes Prevention Program (DPP)
  model (adapted for community setting)

  Community profile:
  - Predominantly African American and Latino community
  - 45% of adults over 40 are pre-diabetic
  - Limited access to fresh food (food desert area)
  - Most residents work hourly jobs with limited
    schedule flexibility
  - Community center is the primary gathering space
  - Strong faith-based community networks
  - Previous health programs had poor retention (40%
    dropout by week 3)

  Workshop series (6 sessions, 90 minutes each):
  - Week 1: Understanding Your Risk
  - Week 2: Eating Well on a Budget
  - Week 3: Moving More, Sitting Less
  - Week 4: Managing Stress and Sleep
  - Week 5: Navigating the Healthcare System
  - Week 6: Building Your Support Network

  Create:
  1. Workshop curriculum overview
  2. Facilitator guide for each session
  3. Participant handouts and worksheets
  4. Interactive activities and discussion prompts
  5. Retention strategy to prevent 40% dropout
  6. Evaluation instruments (pre/post)
  7. Community health worker training guide

assertions:
  - type: llm_judge
    criteria: "Curriculum addresses the real barriers this community faces — 'eating well' session acknowledges food desert reality and provides strategies that work with limited access (corner store healthy options, community garden, bulk buying cooperatives); 'moving more' works with hourly job constraints; content is practical for their actual lives, not aspirational."
    weight: 0.35
    description: "RealBarrierAddressing"
  - type: llm_judge
    criteria: "Retention strategy tackles the 40% dropout problem with specific interventions — identifies why people drop out (schedule conflicts, feeling overwhelmed, not seeing results, childcare needs) and addresses each; includes peer accountability, session recordings for missed weeks, childcare provision, culturally relevant food at sessions, and progress celebrations."
    weight: 0.35
    description: "RetentionStrategy"
  - type: llm_judge
    criteria: "Interactive activities go beyond lectures — each session includes participatory elements (cooking demonstrations with affordable ingredients, group walks, stress-reduction exercises participants can do at work, healthcare navigation role-plays); the workshop teaches through doing, not just telling; activities are culturally resonant."
    weight: 0.30
    description: "InteractiveActivityDesign"
