meta:
  id: clinical-trial-education
  level: 2
  course: health-education-content-writing
  type: output
  description: "Write clinical trial education materials — create informed consent support content and trial participation education that helps patients understand research participation options"
  tags: [clinical-trials, informed-consent, research-education, intermediate]

state: {}

trigger: |
  Write educational materials to help patients
  understand and consider clinical trial participation
  at an academic cancer center.

  Context:
  - Academic cancer center with 150+ active clinical
    trials
  - Only 5% of eligible cancer patients enroll in
    clinical trials
  - Minority patients participate at even lower rates
    (3%)
  - Common barriers: Fear, mistrust (especially in
    Black community due to historical abuses like
    Tuskegee), misunderstanding of randomization,
    belief they'll get "placebo only," logistical
    concerns

  Content to create:

  Piece 1: General clinical trials education brochure
  - What clinical trials are and why they exist
  - Phases of clinical trials explained
  - Patient rights and protections
  - Common myths vs. reality
  - Questions to ask about a specific trial

  Piece 2: "Considering a Clinical Trial" decision
  worksheet
  - Personal reflection questions
  - Pros and cons framework
  - Practical considerations checklist
  - Support person discussion guide

  Piece 3: Addressing historical distrust
  - Honest acknowledgment of Tuskegee and other abuses
  - How protections have changed (IRB, informed consent)
  - Patient rights during a trial (can withdraw anytime)
  - Community advisory board involvement

  Requirements:
  - 6th grade reading level
  - Available in English and Spanish
  - Non-coercive (education, not recruitment)
  - Addresses the specific barriers to participation

assertions:
  - type: llm_judge
    criteria: "Historical distrust content is honest and healing — doesn't minimize Tuskegee or other historical abuses; acknowledges that the distrust is justified and rational; explains how current protections (IRBs, informed consent, OHRP oversight) address past wrongs without claiming the problem is fully solved; this section builds trust through transparency."
    weight: 0.35
    description: "HistoricalDistrustHandling"
  - type: llm_judge
    criteria: "Myths section addresses the most impactful misconceptions — explains randomization without making patients feel like guinea pigs; clarifies that placebos are rarely used alone (usually standard-of-care + placebo vs. standard-of-care + new treatment); addresses the fear of 'being experimented on' vs. the reality of rigorous patient protections."
    weight: 0.35
    description: "MythAddressing"
  - type: llm_judge
    criteria: "Materials are educational, not recruitment-oriented — the tone is genuinely informational, helping patients make an informed decision; 'no' is presented as a valid and respected choice; the decision worksheet includes space for concerns and reasons NOT to participate; there is no implicit pressure to enroll."
    weight: 0.30
    description: "NonCoerciveTone"
