meta:
  id: misinformation-counter-content
  level: 2
  course: health-education-content-writing
  type: output
  description: "Write health misinformation counter-content — create evidence-based responses to common health myths and conspiracy theories using effective debunking techniques"
  tags: [misinformation, debunking, evidence-based, intermediate]

state: {}

trigger: |
  Create a series of evidence-based counter-content
  pieces addressing health misinformation circulating
  in your community health center's patient population.

  Context:
  - Community health center serving 25,000 patients
  - Clinical staff report patients frequently cite
    misinformation during appointments
  - Social media posts within the community are sharing
    false health claims
  - Trust in medical establishment is mixed

  Misinformation topics to address:

  Topic 1: "Natural immunity is always better than
  vaccines — the body heals itself."
  Patient impact: Parents refusing childhood vaccinations
  citing "natural immunity" philosophy.

  Topic 2: "Diabetes can be cured with cinnamon and
  apple cider vinegar — doctors just want to sell
  you drugs."
  Patient impact: Patients discontinuing metformin in
  favor of supplements.

  Topic 3: "Mental health medication changes your
  personality and makes you dependent — it's better
  to just tough it out."
  Patient impact: Patients refusing or stopping
  antidepressants.

  For each topic, create:
  1. Debunking content piece (patient-facing)
  2. Provider talking points for clinic conversations
  3. Social media response content (shareable)
  4. FAQs addressing specific claims
  5. Bridge messaging (acknowledge concern → provide
     evidence → offer action)

assertions:
  - type: llm_judge
    criteria: "Debunking approach uses evidence-based techniques — leads with the factual alternative rather than repeating the myth; uses the 'fact sandwich' (fact → brief mention of myth → detailed explanation of fact); acknowledges the emotional appeal of the misinformation rather than just dismissing it; doesn't use condescending tone."
    weight: 0.35
    description: "DebunkingTechnique"
  - type: llm_judge
    criteria: "Bridge messaging respects the underlying concern — 'natural immunity' believers care about their children's health; supplement users want control over their diabetes; medication-averse patients value their authentic self; the content validates these underlying values while redirecting toward evidence-based approaches that serve the same values."
    weight: 0.35
    description: "BridgeMessaging"
  - type: llm_judge
    criteria: "Provider talking points enable productive clinical conversations — gives providers specific phrases and approaches for when patients cite misinformation; emphasizes listening first, asking about the patient's concerns, and building on common ground rather than lecturing or dismissing; includes strategies for maintaining the therapeutic relationship."
    weight: 0.30
    description: "ProviderTalkingPoints"
