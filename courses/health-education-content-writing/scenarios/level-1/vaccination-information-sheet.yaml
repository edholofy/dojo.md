meta:
  id: vaccination-information-sheet
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write a vaccination information sheet — create balanced, evidence-based content addressing vaccine benefits, risks, and common concerns for patients and parents"
  tags: [vaccination, patient-information, evidence-based, beginner]

state: {}

trigger: |
  Write a vaccination information sheet for the annual
  flu vaccine to be distributed at a community health
  center.

  Target audience:
  - Adults and parents considering flu vaccination
  - Community includes vaccine-hesitant individuals
  - Mix of ages and health conditions
  - Some prior negative experiences with vaccines

  Content to cover:
  - What the flu vaccine does and how it works
  - Who should get vaccinated (CDC recommendations)
  - Who should NOT get vaccinated (contraindications)
  - Common side effects vs. rare serious reactions
  - Addressing common misconceptions (e.g., "the flu
    shot gave me the flu")
  - Where and when to get vaccinated
  - Insurance coverage and free vaccine programs
  - Flu facts (severity, hospitalization rates)

  Tone requirements:
  - Informative, not preachy
  - Acknowledge vaccine hesitancy respectfully
  - Present facts without being dismissive of concerns
  - Encourage without pressuring
  - Reading level: 6th-8th grade

assertions:
  - type: llm_judge
    criteria: "Misconceptions are addressed respectfully — doesn't mock or dismiss vaccine-hesitant readers; explains WHY people believe the flu shot causes the flu (timing coincidence, mild immune response) and provides clear scientific explanation; treats concerns as understandable rather than ignorant."
    weight: 0.35
    description: "RespectfulMisconceptionHandling"
  - type: llm_judge
    criteria: "Benefits and risks are presented honestly — doesn't oversell the vaccine or minimize side effects; acknowledges that the flu vaccine isn't 100% effective but explains why it's still valuable (reduced severity, reduced spread); presents common side effects matter-of-factly and rare serious reactions transparently."
    weight: 0.35
    description: "BalancedRiskBenefitPresentation"
  - type: llm_judge
    criteria: "Content is actionable and removes barriers — includes specific information about where, when, and how to get vaccinated; addresses cost concerns (insurance, free programs); provides clear guidance on who should and shouldn't get vaccinated; makes the next step easy for a reader who decides to proceed."
    weight: 0.30
    description: "ActionableGuidance"
