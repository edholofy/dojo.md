meta:
  id: patient-medication-guide
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write a patient medication guide — create clear, plain-language medication instructions covering dosage, side effects, interactions, and storage for a commonly prescribed medication"
  tags: [medication-guide, plain-language, patient-education, beginner]

state: {}

trigger: |
  Write a patient medication guide for metformin
  (Glucophage), a commonly prescribed Type 2 diabetes
  medication.

  Target audience:
  - Adult patients newly diagnosed with Type 2 diabetes
  - Average reading level: 6th-8th grade
  - Many patients have no medical background
  - Some patients may have limited English proficiency

  Medication details:
  - Drug: Metformin HCl (Glucophage)
  - Common doses: 500mg, 850mg, 1000mg
  - Frequency: 1-3 times daily with meals
  - Key side effects: GI upset (nausea, diarrhea),
    metallic taste, lactic acidosis (rare but serious)
  - Important interactions: Alcohol, contrast dye,
    certain kidney medications
  - Storage: Room temperature, away from moisture

  Requirements:
  - Written at 6th grade reading level or below
  - Use plain language (no medical jargon without
    explanation)
  - Include "What to do if you miss a dose"
  - Include "When to call your doctor immediately"
  - Format for easy scanning (bullets, headers)
  - Include a section on lifestyle alongside medication

assertions:
  - type: llm_judge
    criteria: "Guide is written at appropriate reading level — uses short sentences, common words, and explains any medical terms; a patient without medical background can understand every section; avoids jargon like 'contraindicated,' 'gastrointestinal,' or 'hypoglycemia' without plain-language alternatives."
    weight: 0.35
    description: "ReadabilityLevel"
  - type: llm_judge
    criteria: "Safety information is clear and actionable — the 'When to call your doctor' section includes specific, recognizable symptoms (not vague 'adverse reactions'); the missed dose instructions give a clear decision rule; the lactic acidosis warning is conveyed seriously without causing unnecessary alarm."
    weight: 0.35
    description: "SafetyClarity"
  - type: llm_judge
    criteria: "Guide is well-structured for scanning — uses clear headers, bullet points, and visual hierarchy; a patient can find any specific piece of information (dosage, side effects, storage) within seconds; includes a quick-reference summary at the beginning or end."
    weight: 0.30
    description: "StructureAndScannability"
