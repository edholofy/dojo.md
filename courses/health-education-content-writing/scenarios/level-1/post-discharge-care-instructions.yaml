meta:
  id: post-discharge-care-instructions
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write post-discharge care instructions — create clear recovery and self-care guidance for patients leaving the hospital after a common surgical procedure"
  tags: [discharge-instructions, post-surgical, self-care, beginner]

state: {}

trigger: |
  Write post-discharge care instructions for patients
  going home after a total knee replacement surgery.

  Target audience:
  - Adults aged 55-80 who just had knee replacement
  - Patients will be on pain medication and may have
    difficulty concentrating
  - Caregivers/family members will help with recovery
  - Average hospital stay: 1-2 days

  Content to cover:
  - Wound care (incision site, dressing changes, signs
    of infection)
  - Pain management (medication schedule, ice therapy,
    elevation)
  - Activity and mobility (walker use, weight bearing,
    prohibited movements)
  - Physical therapy schedule and exercises
  - Blood clot prevention (compression stockings,
    ankle pumps, blood thinners)
  - When to call the surgeon's office
  - When to go to the emergency room
  - Follow-up appointment schedule
  - Recovery milestones (what to expect week by week)

  Format:
  - Written for someone on pain medication (extra clear)
  - Checklist format where appropriate
  - Large font recommendations
  - Both patient and caregiver addressed
  - Reading level: 5th grade

assertions:
  - type: llm_judge
    criteria: "Instructions account for the patient's post-surgical state — uses extra-clear language appropriate for someone on pain medication; critical safety information (blood clot warning signs, infection signs) is prominently highlighted and impossible to miss; doesn't bury important warnings in dense text."
    weight: 0.35
    description: "PostSurgicalClarity"
  - type: llm_judge
    criteria: "Blood clot prevention is treated with appropriate urgency — DVT/PE prevention is a critical safety issue after knee replacement; instructions clearly explain blood thinner medication schedule, compression stocking use, ankle pump exercises, and warning signs (leg swelling, chest pain, shortness of breath) that require immediate emergency care."
    weight: 0.35
    description: "BloodClotPrevention"
  - type: llm_judge
    criteria: "Recovery milestones set realistic expectations — provides a week-by-week recovery timeline so patients know what's normal; addresses common concerns (swelling, bruising, stiffness) as expected rather than alarming; includes milestones that help patients see progress and stay motivated with physical therapy."
    weight: 0.30
    description: "RecoveryExpectations"
