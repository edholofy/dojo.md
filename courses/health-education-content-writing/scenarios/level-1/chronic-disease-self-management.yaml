meta:
  id: chronic-disease-self-management
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write a chronic disease self-management guide — create practical daily management instructions for patients living with a chronic condition like diabetes or asthma"
  tags: [chronic-disease, self-management, patient-guide, beginner]

state: {}

trigger: |
  Write a self-management guide for patients with
  Type 2 diabetes, designed to be given at diagnosis
  along with verbal education from their care team.

  Target audience:
  - Newly diagnosed Type 2 diabetes patients
  - Adults aged 35-70
  - Many patients are overwhelmed and scared
  - Various levels of health literacy
  - Need practical daily guidance, not medical textbook

  Content to cover:
  - What Type 2 diabetes is (simple explanation)
  - Blood sugar monitoring (when, how, target ranges)
  - Meal planning basics (carb counting simplified)
  - Physical activity recommendations
  - Medication management
  - Recognizing and treating low/high blood sugar
  - Foot care and daily self-checks
  - When to contact your care team
  - Emotional support and coping resources

  Format:
  - 4-6 page booklet
  - Daily routine checklist included
  - Reading level: 5th-6th grade
  - Space for patients to write their personal targets
  - Encouraging, empowering tone

assertions:
  - type: llm_judge
    criteria: "Guide empowers rather than overwhelms — doesn't try to teach everything at once; prioritizes the 3-5 most important daily management tasks; uses a 'start here' approach that builds confidence before adding complexity; acknowledges that learning to manage diabetes takes time."
    weight: 0.35
    description: "EmpowermentOverOverwhelm"
  - type: llm_judge
    criteria: "Blood sugar management is explained with practical clarity — provides specific target ranges in a format patients can reference quickly; explains WHEN to check (not just 'regularly'); includes a simple action plan for high and low readings; the guide enables a patient to act on their readings, not just record them."
    weight: 0.35
    description: "BloodSugarPracticalClarity"
  - type: llm_judge
    criteria: "Daily checklist creates an actionable routine — translates the guide's content into a simple, repeatable daily checklist that patients can follow; includes space for personalization (their specific targets, their medications); makes diabetes management feel structured rather than chaotic."
    weight: 0.30
    description: "DailyChecklistDesign"
