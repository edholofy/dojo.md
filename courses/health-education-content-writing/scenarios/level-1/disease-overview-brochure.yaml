meta:
  id: disease-overview-brochure
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write a patient-facing disease overview brochure — create accessible educational content explaining a chronic condition including causes, symptoms, treatment options, and self-management strategies"
  tags: [disease-education, brochure-writing, patient-education, beginner]

state: {}

trigger: |
  Write a patient education brochure about hypertension
  (high blood pressure) for distribution in a primary
  care clinic waiting room.

  Target audience:
  - Adults aged 40-70 newly diagnosed or at risk
  - Mixed health literacy levels
  - Diverse cultural backgrounds
  - Some patients may be in denial about their condition

  Content requirements:
  - What is blood pressure (explain the numbers)
  - What is high blood pressure and why it matters
  - Risk factors (modifiable and non-modifiable)
  - Why it's called "the silent killer"
  - Treatment approaches (lifestyle + medication)
  - Blood pressure monitoring at home
  - When to seek emergency care
  - Motivational messaging (it CAN be controlled)

  Format:
  - Tri-fold brochure layout (6 panels)
  - Max 800 words total
  - Reading level: 5th-7th grade
  - Include suggestions for visual elements
  - Include a tear-off blood pressure log

assertions:
  - type: llm_judge
    criteria: "Content explains blood pressure numbers in a way anyone can understand — breaks down systolic/diastolic in plain language (e.g., 'The top number shows pressure when your heart beats; the bottom number shows pressure when your heart rests'); includes a simple chart showing normal, elevated, and high ranges."
    weight: 0.35
    description: "BloodPressureExplanation"
  - type: llm_judge
    criteria: "Brochure motivates action without inducing fear — acknowledges the seriousness of hypertension (stroke, heart attack risk) but frames it as manageable and controllable; uses empowering language ('You can take charge of your blood pressure'); avoids fatalistic messaging that might cause patients to disengage."
    weight: 0.35
    description: "MotivationalTone"
  - type: llm_judge
    criteria: "Content fits the tri-fold brochure format — stays within approximately 800 words, is organized into 6 logical panel sections, includes suggestions for visuals that enhance understanding, and includes a practical tear-off blood pressure tracking log."
    weight: 0.30
    description: "FormatAdherence"
