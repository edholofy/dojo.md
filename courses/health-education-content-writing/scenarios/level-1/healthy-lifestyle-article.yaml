meta:
  id: healthy-lifestyle-article
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write a healthy lifestyle education article — create engaging, evidence-based content about nutrition, exercise, or wellness for a general patient audience"
  tags: [lifestyle-education, wellness-writing, evidence-based, beginner]

state: {}

trigger: |
  Write a patient education article about heart-healthy
  eating for a hospital's patient newsletter and website.

  Target audience:
  - Patients with or at risk for cardiovascular disease
  - General adult audience interested in heart health
  - Mixed cooking skills and food budgets
  - Diverse cultural food traditions

  Content requirements:
  - Evidence-based dietary recommendations (based on
    AHA guidelines)
  - Practical, actionable tips (not just "eat healthy")
  - Specific food swaps (instead of X, try Y)
  - Budget-friendly options
  - Simple recipes (2-3 heart-healthy recipes)
  - Address common myths (e.g., "all fat is bad")
  - Cultural sensitivity (not assuming one cuisine)
  - Connection between diet and heart health

  Format:
  - 800-1200 words
  - Conversational but credible tone
  - Scannable with subheadings
  - Include a "Quick Start" box for immediate action
  - Cite sources appropriately for patient audience

assertions:
  - type: llm_judge
    criteria: "Dietary advice is evidence-based and specific — references AHA or similar guidelines; provides concrete food recommendations (specific foods, portions) rather than vague advice like 'eat more vegetables'; addresses sodium, saturated fat, fiber, and omega-3s with practical guidance."
    weight: 0.35
    description: "EvidenceBasedAdvice"
  - type: llm_judge
    criteria: "Content is culturally inclusive and budget-conscious — doesn't assume a Western diet; acknowledges that heart-healthy eating looks different across cultures; provides budget-friendly options so recommendations aren't only for affluent patients; includes practical food swaps that are accessible."
    weight: 0.35
    description: "InclusivityAndAccessibility"
  - type: llm_judge
    criteria: "Article engages and motivates rather than lectures — uses a conversational tone that respects the reader; the 'Quick Start' box gives immediate actionable steps; recipes are genuinely simple (not requiring specialty ingredients or advanced skills); the overall message is empowering, not restrictive."
    weight: 0.30
    description: "EngagementAndMotivation"
