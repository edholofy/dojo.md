meta:
  id: beginner-health-writing-shift
  level: 1
  course: health-education-content-writing
  type: output
  description: "Beginner shift simulation — handle multiple health education writing requests including a medication guide, patient FAQ, and emergency preparation handout during a busy clinic day"
  tags: [shift-simulation, multi-task, health-writing, beginner]

state: {}

trigger: |
  You are a health education writer at a community
  health center. Handle these writing requests that
  came in today.

  REQUEST 1 — Urgent medication change notice:
  The pharmacy has switched from brand-name Lipitor
  to generic atorvastatin for all patients. Many
  patients are calling concerned that they received
  the "wrong medication." Write a patient notification
  letter explaining the change, why it happened, and
  reassuring patients that the generic is equally
  effective and safe.

  REQUEST 2 — Flu season FAQ:
  The clinic is overwhelmed with patient calls about
  flu season. Write a one-page FAQ addressing the top
  5 questions patients ask: (1) Should I get the flu
  shot? (2) Can the flu shot give me the flu? (3) Is
  it too late to get vaccinated? (4) What's the
  difference between flu and cold? (5) When should I
  go to urgent care vs. staying home?

  REQUEST 3 — Emergency preparedness:
  A major hurricane is forecast to hit the area in
  5 days. Write an emergency health preparedness
  handout for patients with chronic conditions
  (diabetes, hypertension, COPD) covering medication
  stockpiling, medical record preparation, and
  emergency contact protocols.

  Handle all three requests:
  1. Generic medication switch notification
  2. Flu season FAQ
  3. Emergency health preparedness handout
  4. Appropriate reading level for each piece
  5. Consistent health center branding/voice

assertions:
  - type: llm_judge
    criteria: "Generic medication notification is reassuring and factual — explains that atorvastatin IS Lipitor (same active ingredient, same dose, same effect); addresses the visual difference (different pill color/shape); explains WHY the switch happened (cost savings passed to patients); provides a contact number for patients who still have concerns."
    weight: 0.35
    description: "GenericMedicationReassurance"
  - type: llm_judge
    criteria: "Flu FAQ directly answers each question concisely — doesn't pad with unnecessary information; the 'Can the flu shot give me the flu?' answer explains why arm soreness and mild symptoms are NOT the flu; the flu vs. cold comparison uses a simple chart or side-by-side format; the urgent care decision guidance is specific and actionable."
    weight: 0.35
    description: "FluFAQDirectness"
  - type: llm_judge
    criteria: "Emergency preparedness handout is condition-specific and urgent — provides specific guidance for diabetes (insulin storage without power, blood sugar monitoring supplies), hypertension (medication refill timeline), and COPD (rescue inhaler supply, evacuation with oxygen equipment); includes a preparedness checklist patients can use immediately."
    weight: 0.30
    description: "EmergencyPrepSpecificity"
