meta:
  id: mental-health-awareness-content
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write mental health awareness content — create stigma-reducing educational material about depression for a workplace wellness program"
  tags: [mental-health, stigma-reduction, workplace-wellness, beginner]

state: {}

trigger: |
  Write mental health awareness content about
  depression for a corporate workplace wellness
  program.

  Target audience:
  - Employees across all levels (entry to executive)
  - Age range: 22-65
  - Many have stigma around mental health
  - Some may be currently experiencing depression
  - Managers need to know how to support team members

  Content requirements:
  - What depression is (and what it isn't)
  - Signs and symptoms in yourself and others
  - Debunking myths ("just snap out of it," "it's
    weakness," "everyone gets sad sometimes")
  - How to talk about it (conversation starters)
  - Workplace-specific impacts and accommodations
  - Resources: EAP, crisis hotlines, when to seek help
  - Manager-specific guidance on supporting employees
  - Self-care strategies backed by evidence

  Tone:
  - Destigmatizing and normalizing
  - Professional but warm
  - Not clinical or pathologizing
  - Inclusive of diverse experiences
  - Hopeful (depression is treatable)

  Format:
  - Digital content for company intranet
  - 1000-1500 words
  - Include a sidebar for managers
  - Include a self-assessment prompt (not diagnostic)
  - Include resource list with contact information

assertions:
  - type: llm_judge
    criteria: "Content effectively destigmatizes depression — reframes depression as a medical condition (like diabetes or hypertension, not a character flaw); uses normalizing language and statistics (1 in 5 adults); addresses workplace-specific stigma without being preachy; a reader experiencing depression should feel understood, not labeled."
    weight: 0.35
    description: "EffectiveDestigmatization"
  - type: llm_judge
    criteria: "Manager guidance is practical and appropriate — tells managers how to notice signs, start supportive conversations, offer accommodations, and connect employees to resources WITHOUT playing therapist or making diagnoses; includes specific phrases to use and avoid; respects privacy while enabling support."
    weight: 0.35
    description: "ManagerGuidance"
  - type: llm_judge
    criteria: "Resources are specific and immediately actionable — includes the EAP contact with instructions for accessing it, crisis hotline number (988), specific next steps for someone who thinks they might be experiencing depression; doesn't just say 'seek help' but removes barriers to actually doing so."
    weight: 0.30
    description: "ActionableResources"
