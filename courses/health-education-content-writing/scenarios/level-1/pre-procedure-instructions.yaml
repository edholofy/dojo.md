meta:
  id: pre-procedure-instructions
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write pre-procedure patient instructions — create clear step-by-step preparation guide for a common medical procedure including timeline, dietary restrictions, and what to expect"
  tags: [procedure-instructions, patient-preparation, step-by-step, beginner]

state: {}

trigger: |
  Write pre-procedure instructions for a patient
  scheduled for a colonoscopy.

  Target audience:
  - Adults aged 45-75 (average screening age)
  - Patients are often anxious about the procedure
  - Many have never had a colonoscopy before
  - Instructions must be followed precisely for
    procedure success

  Content to cover:
  - 7 days before: Medication adjustments (blood
    thinners, iron supplements, diabetes medications)
  - 5 days before: Dietary modifications begin
  - 1 day before: Clear liquid diet, bowel prep
    instructions
  - Day of procedure: NPO timing, arrival instructions,
    what to bring, what to wear
  - Bowel prep specifics: Split-prep protocol
    (MiraLAX/Gatorade or prescribed solution)
  - After procedure: Recovery expectations, when
    results will be available, activity restrictions
  - Transportation requirement (cannot drive after
    sedation)

  Critical success factor:
  - If prep instructions aren't followed correctly,
    the procedure may need to be rescheduled
  - 25% of colonoscopies have inadequate prep

  Format:
  - Timeline-based checklist format
  - Clearly marked "IMPORTANT" items
  - Phone number for questions
  - Reading level: 6th grade

assertions:
  - type: llm_judge
    criteria: "Instructions follow a clear timeline — organized day-by-day (7 days before, 5 days before, 1 day before, day of) so patients can plan ahead; each day's tasks are specific and actionable; the timeline format makes it easy to follow the prep schedule without confusion."
    weight: 0.35
    description: "TimelineClarity"
  - type: llm_judge
    criteria: "Bowel prep instructions are specific enough to prevent the 25% inadequate prep rate — includes exact amounts, timing, and technique; explains what 'clear liquids' means with specific examples (and what does NOT count); addresses common mistakes like stopping prep early or drinking red/purple liquids."
    weight: 0.35
    description: "PrepSpecificity"
  - type: llm_judge
    criteria: "Anxiety-reducing elements are woven throughout — normalizes patient concerns, explains what will happen during sedation, reassures about pain management, explains that most colonoscopies find nothing concerning; doesn't just list clinical steps but addresses the emotional experience."
    weight: 0.30
    description: "AnxietyReduction"
