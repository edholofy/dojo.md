meta:
  id: pediatric-parent-guide
  level: 1
  course: health-education-content-writing
  type: output
  description: "Write a pediatric parent guide — create educational content for parents about a common childhood health topic including prevention, home care, and when to seek medical attention"
  tags: [pediatric, parent-education, childhood-health, beginner]

state: {}

trigger: |
  Write a parent education guide about childhood ear
  infections (otitis media) for a pediatric clinic.

  Target audience:
  - Parents of children aged 6 months to 8 years
  - First-time and experienced parents
  - Parents often anxious about their child's illness
  - Need to know when home care is sufficient vs.
    when to call the doctor

  Content to cover:
  - What ear infections are (simple anatomy explanation)
  - Why children get them more often than adults
  - Signs and symptoms by age group (babies vs. toddlers
    vs. older children)
  - Home comfort measures (pain management, positioning)
  - When antibiotics are needed vs. watchful waiting
  - The "wait and see" approach (AAP guidelines)
  - When to call the doctor
  - When to go to the ER
  - Prevention strategies
  - Recurrent ear infections: what parents should know

  Format:
  - 2-page handout
  - Age-specific symptom chart
  - Clear decision tree: Home care vs. Doctor call vs. ER
  - Reading level: 7th grade
  - Reassuring but informative tone

assertions:
  - type: llm_judge
    criteria: "Decision tree is clear and parent-friendly — provides a simple flowchart or decision guide that helps anxious parents determine: 'Can I manage this at home?' vs. 'Should I call the doctor?' vs. 'Should I go to the ER?'; uses observable symptoms (fever height, duration, behavior changes) as decision criteria."
    weight: 0.35
    description: "DecisionTreeClarity"
  - type: llm_judge
    criteria: "Watchful waiting is explained in a way that builds parent confidence — the AAP 'wait and see' approach is anxiety-inducing for parents; the guide explains WHY it's recommended, what to watch for during the waiting period, and reassures parents that they're making a good decision by not demanding antibiotics immediately."
    weight: 0.35
    description: "WatchfulWaitingExplanation"
  - type: llm_judge
    criteria: "Age-specific symptoms help parents who can't rely on verbal communication — babies can't say 'my ear hurts'; the guide identifies non-verbal cues (ear tugging, irritability, feeding difficulty, sleep disruption) for younger children while listing verbal symptoms for older children; this age-specific approach prevents missed diagnoses."
    weight: 0.30
    description: "AgeSpecificSymptoms"
