meta:
  id: health-education-technology-unicorn
  level: 5
  course: health-education-content-writing
  type: output
  description: "Build a health education technology unicorn — design a venture-backed company that fundamentally disrupts how health education is created, personalized, and delivered worldwide"
  tags: [technology-startup, venture-capital, disruption, master]

state: {}

trigger: |
  You are founding a health education technology
  company with a $40M Series B and a mission to make
  every person on earth health literate. Design the
  company's strategy for becoming a unicorn.

  Company: "Clarity" — Health Education for Everyone

  Founding team:
  - CEO: You (20-year health education veteran, former
    CDC health communication director)
  - CTO: Former Google Health AI researcher
  - CPO: Former Duolingo VP of Product
  - CSO: Former WHO health literacy researcher
  - CDO: Former Pixar creative director

  Product suite:
  - ClarityCreate: AI-powered health content creation
    platform
  - ClarityPersonalize: Real-time content adaptation
    engine
  - ClarityReach: Multi-channel distribution platform
  - ClarityMeasure: Content effectiveness analytics
  - ClarityLearn: Consumer health literacy app

  Competitive advantages:
  - Duolingo-inspired approach to health literacy
  - Pixar-quality visual health education
  - AI trained on 10M+ patient-provider interactions
  - 200-language capability
  - Clinical validation partnership with Mayo Clinic

  Funding: Seed ($4M) → Series A ($15M) → Series B
  ($40M, current)
  Current ARR: $8M, growing 200% YoY
  Target: $80M ARR in 3 years, IPO in 5

  Create:
  1. Company strategy and vision
  2. Product roadmap (Year 1-5)
  3. Go-to-market strategy
  4. AI/ML differentiation strategy
  5. Clinical validation and trust-building
  6. International expansion plan
  7. Financial model and path to profitability
  8. Board management and Series C strategy

assertions:
  - type: llm_judge
    criteria: "Duolingo-inspired consumer app strategy creates a genuine health literacy movement — gamified, bite-sized health education that builds health literacy skills over time; daily engagement through health literacy challenges, progress tracking, and social features; the consumer app drives brand awareness while the enterprise products drive revenue."
    weight: 0.35
    description: "ConsumerAppStrategy"
  - type: llm_judge
    criteria: "Clinical validation strategy builds trust that competitors can't replicate — the Mayo Clinic partnership provides clinical credibility; implements rigorous content validation processes; publishes peer-reviewed evidence of content effectiveness; positions the company as 'clinically validated' in a market full of unvalidated health content; this becomes a competitive moat."
    weight: 0.35
    description: "ClinicalValidationMoat"
  - type: llm_judge
    criteria: "Financial model is realistic for a health education company — accounts for the unique challenges of healthcare sales (long cycles, compliance requirements, budget constraints); differentiates enterprise vs. consumer revenue streams; the path from $8M to $80M ARR includes realistic customer acquisition costs, expansion revenue, and churn assumptions."
    weight: 0.30
    description: "RealisticFinancialModel"
