meta:
  id: health-education-thought-leadership
  level: 5
  course: health-education-content-writing
  type: output
  description: "Establish thought leadership in health education — develop original frameworks, publish landmark analysis, and shape global discourse on the future of health communication and health literacy"
  tags: [thought-leadership, global-influence, health-literacy, master]

state: {}

trigger: |
  Establish yourself as the world's foremost authority
  on health education and health literacy, shaping
  how governments, health systems, and technology
  companies approach patient communication.

  Your platform:
  - Named WHO Special Envoy for Health Literacy
  - Former US Surgeon General's health literacy advisor
  - Founded the Global Health Literacy Institute
  - TED talk: "The Words That Kill" (12M views)
  - Author of 3 books on health communication
  - Advisory board: WHO, UNESCO, UNICEF, Gates Foundation
  - 200,000+ followers across academic and public
    platforms

  Inflection points in health education:
  - AI threatens to both democratize and dilute health
    information
  - Health misinformation has become a global health
    threat
  - Health literacy recognized as a social determinant
  - 3.6 billion people worldwide have inadequate
    health literacy
  - Digital health explosion creating new channels
    and new risks
  - Climate change requiring new health education
    frameworks
  - Pandemic preparedness demands communication readiness

  Create:
  1. Original framework: "The Health Communication
     Imperative" — a 10-year global strategy
  2. UN General Assembly address on health literacy
  3. Lancet Commission report on health education
  4. Annual "State of Global Health Literacy" report
  5. Public intellectual platform strategy
  6. Global Health Literacy Institute strategic plan
  7. Campaign to designate health literacy as a
     fundamental human right
  8. Legacy and succession planning

assertions:
  - type: llm_judge
    criteria: "10-year strategy is transformative and actionable — proposes concrete goals (universal health literacy assessment, AI-assisted personalized health education, global plain language standards, health communication training for all healthcare workers); includes measurable milestones, funding mechanisms, and accountability structures; goes beyond aspirational language to operationalizable plans."
    weight: 0.35
    description: "TransformativeGlobalStrategy"
  - type: llm_judge
    criteria: "UN General Assembly address makes health literacy a moral imperative — uses data (3.6B people with inadequate health literacy), patient stories from diverse countries, and economic analysis to argue that health literacy is as fundamental as clean water or basic education; the speech is both emotionally compelling and intellectually rigorous."
    weight: 0.35
    description: "UNAddressCompelling"
  - type: llm_judge
    criteria: "Health literacy as fundamental human right campaign has a credible path — identifies the international legal framework (WHO Constitution, UDHR), proposes specific treaty language, builds a coalition of supporting nations, engages patient advocacy organizations globally, and addresses counterarguments; the campaign draws on precedents from other rights-recognition movements."
    weight: 0.30
    description: "HumanRightCampaignCredibility"
