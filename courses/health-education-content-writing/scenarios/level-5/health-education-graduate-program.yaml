meta:
  id: health-education-graduate-program
  level: 5
  course: health-education-content-writing
  type: output
  description: "Design a graduate program in health education content science — create a new academic discipline combining health communication, behavioral science, design thinking, and AI for patient education"
  tags: [graduate-program, academic-design, new-discipline, master]

state: {}

trigger: |
  Design a pioneering graduate program that establishes
  health education content science as a distinct
  academic discipline.

  Program: Master of Science in Health Education
  Content Science (MS-HECS)

  Host institution: Top-10 school of public health
  with strengths in communication, behavioral science,
  and data science

  Discipline rationale:
  - Patient education is produced by people with no
    formal training in the science of health communication
  - No academic program integrates health science,
    communication theory, behavioral science, design
    thinking, and technology
  - The field needs an evidence base comparable to
    clinical medicine
  - Growing demand from health systems, digital health
    companies, pharma, and public health agencies
  - AI-powered health content requires humans who
    understand both the science and the art

  Target students:
  - Health communication professionals seeking
    graduate credentials
  - Clinical professionals transitioning to education
    roles
  - MPH graduates specializing in health communication
  - Digital health product managers
  - UX/content designers in healthcare
  - Journalists covering health

  Program parameters:
  - 42-credit program (14 courses)
  - Hybrid format (online + 2 intensive residencies)
  - Completion: 20-24 months
  - Applied capstone project
  - Research practicum
  - Optional PhD pathway

  Create:
  1. Academic rationale and program overview
  2. Full curriculum (14 courses with descriptions)
  3. Faculty recruitment strategy
  4. Applied capstone project framework
  5. Research agenda for the new discipline
  6. Industry advisory board composition
  7. Student recruitment and career placement
  8. Program assessment and accreditation plan

assertions:
  - type: llm_judge
    criteria: "Curriculum creates a genuinely new discipline — integrates courses that don't exist together in any current program: health communication theory, behavioral science for content design, health literacy science, AI and content technology, visual health communication, cultural competency in health content, regulatory compliance, and research methods for content effectiveness; this isn't just another MPH concentration."
    weight: 0.35
    description: "NovelDisciplineDesign"
  - type: llm_judge
    criteria: "Research agenda defines the field's open questions — identifies foundational research needs (what makes health content effective for whom, how to measure content impact, how AI changes health communication, how culture mediates content effectiveness); proposes methodological standards for health education content research; creates an evidence-building roadmap."
    weight: 0.35
    description: "FieldDefiningResearchAgenda"
  - type: llm_judge
    criteria: "Applied capstone produces real-world impact — requires students to design, implement, and evaluate a health education intervention in a real healthcare setting; includes evidence review, content development, pilot implementation, and outcome measurement; graduates have a portfolio piece demonstrating their ability to apply the discipline's principles."
    weight: 0.30
    description: "AppliedCapstoneDesign"
