meta:
  id: master-health-writing-shift
  level: 5
  course: health-education-content-writing
  type: output
  description: "Master shift simulation — serve as global health education leader managing a pandemic communication crisis, WHO standards dispute, AI ethics confrontation, and personal legacy decision"
  tags: [shift-simulation, global-leadership, multi-scenario, master]

state: {}

trigger: |
  You are the world's foremost authority on health
  education and health literacy. Handle these
  concurrent global challenges during a pivotal month.

  SITUATION 1 — Novel pandemic communication:
  A new respiratory pathogen (H5N1 variant) has
  achieved sustained human-to-human transmission.
  WHO has declared a Public Health Emergency of
  International Concern. Governments worldwide are
  looking to you for health communication guidance.
  Lessons from COVID-19 must inform the response, but
  the misinformation ecosystem has evolved significantly
  since 2020. AI-generated health misinformation is
  now indistinguishable from legitimate content.
  Trust in public health institutions remains low.

  SITUATION 2 — WHO standards crisis:
  Your draft Global Health Literacy Standards are
  facing fierce opposition from two directions: the
  pharmaceutical industry claims they would restrict
  DTC advertising; and several developing nations
  argue the standards are Western-centric and
  unachievable with their resources. The standards
  vote is in 3 weeks, and without a compromise, the
  entire initiative collapses.

  SITUATION 3 — AI ethics confrontation:
  A major tech company has launched an AI health
  education product that generates personalized health
  advice at scale. The product is already in use by
  50 million people globally. However, your research
  team has found the AI consistently provides lower-
  quality health education to users in developing
  countries and in non-English languages. The company
  has offered you $5M annually to join their advisory
  board and help fix the problem from inside. Critics
  say you'd be legitimizing a harmful product.

  SITUATION 4 — Legacy decision:
  You've been offered simultaneously: (a) the position
  of WHO Director of Health Communication (permanent,
  institutional), (b) $20M from the Gates Foundation
  to scale your social enterprise globally (impact,
  independent), and (c) a named professorship at
  Harvard to build the academic discipline (knowledge,
  legacy). You can only choose one.

  Handle all four situations:
  1. Pandemic communication strategy
  2. WHO standards diplomatic resolution
  3. AI ethics advisory board decision
  4. Legacy career choice analysis
  5. Cross-situation strategic coherence
  6. Personal values and integrity framework

assertions:
  - type: llm_judge
    criteria: "Pandemic communication strategy applies COVID lessons while adapting to new realities — addresses AI-generated misinformation with new counter-strategies, rebuilds trust through radical transparency and community-based communication, prepares multi-language materials in advance, and establishes real-time communication feedback loops; doesn't just repeat the COVID playbook."
    weight: 0.35
    description: "PandemicCommunicationEvolution"
  - type: llm_judge
    criteria: "WHO standards compromise finds common ground without gutting the standards — addresses pharma concerns by distinguishing between advertising and education standards; addresses developing nation concerns by creating implementation tiers and technical assistance provisions; preserves the core patient protection principles while making the standards achievable and adoptable."
    weight: 0.35
    description: "StandardsCompromise"
  - type: llm_judge
    criteria: "AI advisory board decision demonstrates ethical reasoning — weighs the genuine opportunity to fix a harmful product from inside against the risk of providing cover for ongoing harm; considers fiduciary duty, conditional engagement terms, public transparency requirements, and the precedent it sets; the reasoning process is more important than the specific decision."
    weight: 0.30
    description: "AIEthicsReasoning"
