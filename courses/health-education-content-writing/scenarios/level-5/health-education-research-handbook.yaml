meta:
  id: health-education-research-handbook
  level: 5
  course: health-education-content-writing
  type: output
  description: "Edit a comprehensive handbook on health education content science — curate the definitive academic reference covering health communication, literacy, behavioral science, and digital health education"
  tags: [research-handbook, academic-reference, evidence-synthesis, master]

state: {}

trigger: |
  Edit the definitive research handbook that
  establishes health education content science as a
  rigorous academic field.

  Publication: "The Springer Handbook of Health
  Education Content Science"

  Publisher: Springer Nature (Academic)
  Target: 900 pages, 45 chapters, 70+ contributing authors
  Timeline: 2.5-year project

  The handbook must establish health education content
  science as a field that intersects:
  - Health communication theory
  - Health literacy research
  - Behavioral science and nudge theory
  - Cognitive psychology and learning science
  - Design thinking and visual communication
  - AI and natural language processing
  - Cultural studies and medical anthropology
  - Implementation science
  - Health equity and social determinants
  - Regulatory science
  - Digital health and HCI
  - Public health and epidemiology

  Create:
  1. Intellectual architecture (6 major sections)
  2. Complete table of contents with chapter summaries
  3. Contributing author recruitment strategy
  4. Chapter commissioning template
  5. Editor's introduction (defining the field)
  6. Cross-referencing and coherence strategy
  7. Peer review and quality assurance process
  8. Impact and field-building strategy

assertions:
  - type: llm_judge
    criteria: "Intellectual architecture establishes a coherent field from diverse disciplines — organizes sections that build logically: foundations (theory, history, ethics), science (health literacy, behavioral, cognitive), craft (writing, design, cultural adaptation), technology (AI, digital, personalization), practice (implementation, evaluation, quality), and horizons (emerging challenges, global perspectives, future directions)."
    weight: 0.35
    description: "CoherentFieldArchitecture"
  - type: llm_judge
    criteria: "Editor's introduction makes the compelling case for a new discipline — argues that health education content has been produced without scientific rigor; the introduction identifies the evidence gaps, methodological challenges, and professional development needs that justify treating this as a distinct field of study; positions the handbook as the foundational text."
    weight: 0.35
    description: "DisciplineJustification"
  - type: llm_judge
    criteria: "Author recruitment bridges academia and practice — recruits from communication science, public health, clinical medicine, computer science, design, anthropology, and experienced practitioners; ensures the handbook captures both theoretical knowledge and practical wisdom; includes emerging scholars to build the field's future leadership."
    weight: 0.30
    description: "AuthorDiversityStrategy"
