meta:
  id: global-health-literacy-standards
  level: 5
  course: health-education-content-writing
  type: output
  description: "Develop global health literacy standards — create international frameworks for health education quality, accessibility, and effectiveness across diverse health systems and cultures"
  tags: [global-standards, international, health-literacy, master]

state: {}

trigger: |
  Lead the development of global health literacy
  and health education standards as chair of the
  WHO Commission on Health Literacy.

  Commission mandate:
  "Develop international standards for health education
  content quality, accessibility, and effectiveness
  that can be implemented across all WHO member states
  to ensure every person can access, understand, and
  act on health information."

  Global health literacy landscape:
  - Europe: Strong health literacy research tradition,
    EU Health Literacy Survey, national strategies in
    Austria, Scotland, Germany
  - North America: CDC health literacy initiatives,
    Patient Protection and Affordable Care Act Section
    5002, limited national strategy
  - Asia: Rapid digital health adoption, variable
    health literacy measurement, large rural populations
  - Africa: Community health worker models, oral
    tradition dominant, mobile-first health education
  - Latin America: Community-based participatory
    approaches, strong primary care orientation
  - Middle East: Gender-specific health education needs,
    rapidly developing health systems

  Key challenges:
  - No universal definition of health literacy
  - Measurement tools not validated across cultures
  - Standards must work for high-tech and low-resource
    settings
  - Digital divide creates new literacy barriers
  - Health education workforce varies enormously
  - Intellectual property issues with health content

  Create:
  1. Commission charter and work plan
  2. Global health literacy definition and framework
  3. Health education quality standards (universal)
  4. Measurement and assessment framework
  5. Implementation guidelines for diverse settings
  6. Digital health literacy addendum
  7. Health education workforce standards
  8. Monitoring and evaluation framework

assertions:
  - type: llm_judge
    criteria: "Global health literacy definition works across cultures — acknowledges that health literacy is not just reading ability but includes the capacity to access, understand, appraise, and apply health information; incorporates dimensions relevant to oral traditions, community-based decision-making, and digital navigation; the definition is operationalizable for measurement across vastly different contexts."
    weight: 0.35
    description: "UniversalDefinition"
  - type: llm_judge
    criteria: "Quality standards are achievable in both high-tech and low-resource settings — creates a tiered standard framework with core principles (accuracy, accessibility, cultural appropriateness) that apply universally and implementation specifications that adapt to available resources; a community health worker in rural Africa can meet the standards using oral and pictographic methods."
    weight: 0.35
    description: "TieredStandardsFramework"
  - type: llm_judge
    criteria: "Digital health literacy addendum addresses the emerging divide — recognizes that digital health creates new literacy demands; provides standards for digital health content accessibility, AI-generated health information quality, misinformation resilience, and data privacy literacy; addresses the risk that digital health innovations widen rather than narrow health literacy gaps."
    weight: 0.30
    description: "DigitalLiteracyAddendum"
