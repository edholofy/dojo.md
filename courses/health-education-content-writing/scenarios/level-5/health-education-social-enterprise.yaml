meta:
  id: health-education-social-enterprise
  level: 5
  course: health-education-content-writing
  type: output
  description: "Launch a social enterprise for health education equity — create an organization that provides free, accessible health education to underserved populations worldwide"
  tags: [social-enterprise, health-equity, global-access, master]

state: {}

trigger: |
  Launch a global social enterprise dedicated to
  making quality health education accessible to every
  person on earth, regardless of language, literacy,
  or location.

  Organization: "HealthWords for All" — Universal
  Health Education Initiative

  Vision: By 2035, every person on earth can access
  health education they can understand in their
  language, at their literacy level, through their
  available channels.

  The problem:
  - 3.6 billion people have inadequate health literacy
  - Health education in >95% of the world's 7,000
    languages doesn't exist
  - Low-resource countries have almost no patient
    education infrastructure
  - Existing health education favors literate, connected,
    English-speaking populations
  - Health misinformation fills the void where quality
    education doesn't exist

  Social enterprise model:
  - Direct service: Produce and distribute free health
    education in 100+ languages
  - Technology: Open-source platform for community
    health education creation
  - Training: Health education creator certification
    for community health workers globally
  - Research: Evidence building on what works in
    diverse, low-resource settings
  - Advocacy: Policy change for health education access

  Revenue model:
  - Foundation grants (Gates, Wellcome Trust, USAID)
  - WHO and UNICEF contracts
  - Health system partnerships (contextualized content
    for fee)
  - Corporate social responsibility partnerships
  - Impact investment for technology platform

  Create:
  1. Social enterprise business plan
  2. Theory of change and impact framework
  3. Content production model (100+ languages)
  4. Open-source technology platform design
  5. Community health worker training program
  6. Research and evidence-building strategy
  7. Fundraising and sustainability plan
  8. 10-year scaling roadmap

assertions:
  - type: llm_judge
    criteria: "Content production model scales to 100+ languages sustainably — doesn't rely on professional translation for every language; instead creates a tiered approach: professional translation for high-impact languages, community-driven translation with quality review for medium languages, and AI-assisted translation with local validation for emerging languages; empowers communities to create their own content."
    weight: 0.35
    description: "ScalableLanguageModel"
  - type: llm_judge
    criteria: "Open-source platform enables community-driven health education — provides tools for community health workers and local organizations to create, adapt, and distribute health education using templates, pictographic libraries, and AI assistance; the platform works on low-bandwidth connections and basic smartphones; community ownership ensures cultural relevance."
    weight: 0.35
    description: "OpenSourceCommunityPlatform"
  - type: llm_judge
    criteria: "Theory of change connects health education access to health outcomes — demonstrates the causal pathway from accessible health education → improved health literacy → better health behaviors → reduced preventable disease → improved quality of life; includes evidence from existing programs and projections for scale; identifies key assumptions and risks."
    weight: 0.30
    description: "TheoryOfChangeEvidence"
