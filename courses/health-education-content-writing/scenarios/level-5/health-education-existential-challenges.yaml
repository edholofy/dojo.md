meta:
  id: health-education-existential-challenges
  level: 5
  course: health-education-content-writing
  type: output
  description: "Confront existential challenges facing health education — analyze scenarios where health education as we know it is fundamentally transformed by AI, misinformation, and societal change"
  tags: [existential-challenges, future-scenarios, paradigm-shift, master]

state: {}

trigger: |
  Analyze the existential challenges facing health
  education as a field and profession, and develop
  strategies for adaptation and reinvention.

  You are delivering the keynote address at the
  International Union for Health Promotion and
  Education (IUHPE) World Conference: "The Death and
  Rebirth of Health Education."

  Existential scenarios to analyze:

  Scenario A — AI-native health communication:
  By 2030, AI systems can generate personalized,
  culturally adapted, literacy-appropriate health
  education in any language in real-time. The traditional
  role of health education content writer ceases to
  exist. What human value remains in health
  communication?

  Scenario B — Post-truth health landscape:
  Health misinformation has become so prevalent and
  sophisticated that traditional evidence-based health
  education cannot compete. Social media algorithms
  favor emotionally engaging misinformation over
  accurate but dry health facts. The public trusts
  influencers more than health institutions.

  Scenario C — Precision health education:
  Genomic, behavioral, and environmental data enable
  hyper-personalized health recommendations delivered
  through wearables and ambient computing. Health
  education becomes invisible — embedded in daily life
  through smart environments. The concept of "patient
  education materials" becomes obsolete.

  Scenario D — Climate health emergency:
  Climate change creates unprecedented health education
  needs — heat illness, vector-borne diseases, air
  quality, water safety, food system disruption,
  climate anxiety — across populations that have never
  needed this education before. Existing health
  education infrastructure is overwhelmed.

  Scenario E — Health education as liberation:
  A global movement reframes health education from
  "telling patients what to do" to "empowering
  communities to transform the conditions that make
  them sick." Health education becomes a tool for
  social justice, environmental justice, and
  community empowerment.

  Create:
  1. Analysis of each scenario (threats and opportunities)
  2. Most likely combined future scenario
  3. Skills and capabilities for future health educators
  4. Institutional adaptation strategies
  5. Ethical framework for emerging challenges
  6. Research priorities for navigating uncertainty
  7. Call to action for the profession
  8. Personal resilience and career guidance

assertions:
  - type: llm_judge
    criteria: "Analysis of AI-native health communication identifies what humans uniquely provide — empathy, trust-building, cultural understanding, ethical judgment, community connection, advocacy, and the ability to address the emotional and social dimensions of health behavior; the analysis is honest about what AI does better while defending the irreplaceable human elements."
    weight: 0.35
    description: "AIHumanValueAnalysis"
  - type: llm_judge
    criteria: "Post-truth scenario analysis goes beyond 'we need better fact-checking' — recognizes that the problem isn't just misinformation but the breakdown of institutional trust; proposes strategies that rebuild trust through transparency, community engagement, and meeting people in their information ecosystems; acknowledges that health education must evolve to compete, not just correct."
    weight: 0.35
    description: "PostTruthStrategyDepth"
  - type: llm_judge
    criteria: "Call to action is inspiring without being naive — acknowledges the real threats to the profession while articulating a compelling vision for how health education can evolve and thrive; provides specific, actionable steps for individuals and institutions; creates urgency without despair; ends with a vision worth pursuing."
    weight: 0.30
    description: "InspiringCallToAction"
