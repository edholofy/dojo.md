meta:
  id: health-education-government-policy
  level: 5
  course: health-education-content-writing
  type: output
  description: "Advise government on health education policy — develop comprehensive policy recommendations for national health literacy strategy, health education standards, and equitable access to health information"
  tags: [government-policy, national-strategy, health-literacy-policy, master]

state: {}

trigger: |
  You have been appointed to chair a Presidential
  Commission on Health Literacy charged with developing
  a National Health Literacy Strategy for the United
  States.

  Commission mandate (Executive Order):
  "Develop a comprehensive national strategy to ensure
  every American can access, understand, and act on
  health information necessary for their well-being,
  and that all healthcare communications meet
  established quality and accessibility standards."

  Commission findings from 18 months of hearings:
  - 88 million Americans have limited health literacy
  - Health literacy costs the US economy $236 billion
    annually in avoidable healthcare spending
  - Low health literacy associated with 2x more
    hospitalizations and 4x more ER visits
  - 80% of patient education materials exceed
    recommended reading levels
  - No federal standards for patient education quality
  - Health misinformation is a growing public health
    threat
  - Digital health is creating new literacy demands
  - Health literacy disparities mirror and amplify
    existing health disparities
  - The US has no national health literacy strategy
    (unlike Australia, Scotland, Austria)

  Create:
  1. Commission final report executive summary
  2. National Health Literacy Strategy (20 recommendations)
  3. Health Education Standards Act draft legislation
  4. Federal regulatory recommendations (HHS, CMS, FDA)
  5. Health education workforce development plan
  6. Technology and innovation investment strategy
  7. Health misinformation resilience framework
  8. Implementation timeline and accountability

assertions:
  - type: llm_judge
    criteria: "20 policy recommendations are specific, actionable, and funded — not just 'improve health literacy' but concrete proposals like mandating readability standards for all federally funded health materials, creating a National Health Literacy Research Center, requiring health literacy assessment in HEDIS quality measures, and establishing health education content standards for digital health products."
    weight: 0.35
    description: "ActionablePolicyRecommendations"
  - type: llm_judge
    criteria: "Health Education Standards Act creates enforceable requirements — mandates readability and accessibility standards for patient education in healthcare settings receiving federal funding; creates a certification process for health education content; establishes patient rights to understandable health information; includes enforcement mechanisms and penalties."
    weight: 0.35
    description: "LegislativeFramework"
  - type: llm_judge
    criteria: "Implementation timeline is realistic and sequenced — prioritizes quick-win executive actions (federal materials standards, CMS quality measures) while building toward legislative goals; includes interim milestones, responsible agencies, and accountability reporting; acknowledges political obstacles and proposes bipartisan framing."
    weight: 0.30
    description: "RealisticImplementation"
