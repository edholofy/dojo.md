meta:
  id: health-education-memoir
  level: 5
  course: health-education-content-writing
  type: output
  description: "Write a professional memoir from health education — craft a narrative about a career dedicated to making health information accessible, the lives changed, and the system failures witnessed"
  tags: [memoir, narrative-writing, career-reflection, master]

state: {}

trigger: |
  Write a professional memoir from 30 years in health
  education — chronicling the moments when the right
  words saved lives and the moments when the wrong
  words (or missing words) cost them.

  Working title: "Plain Language: How Words Save Lives
  (And How Their Absence Kills)"

  Memoir scope — key career chapters:

  Chapter arc 1: "The Awakening" (1995-2005)
  - Starting as a hospital patient educator, handing
    out materials nobody could read
  - The patient who took double her medication because
    "twice daily" was misunderstood
  - Discovering health literacy research and realizing
    the system was broken
  - The Somali refugee family navigating American
    healthcare with no translated materials
  - Learning to write for the reader, not the reviewer

  Chapter arc 2: "The Fight" (2005-2015)
  - Battling physicians who insisted patients should
    "just ask if they don't understand"
  - The institutional resistance to plain language
    ("but it sounds unprofessional")
  - Building a health literacy program from nothing
  - The cancer patient who didn't understand
    "palliative" meant she was dying
  - Finding allies in unexpected places

  Chapter arc 3: "The Reckoning" (2015-2025)
  - COVID-19: When health communication became a
    matter of national survival
  - The infodemic: Losing the information war to
    misinformation
  - AI promising to solve and threatening to destroy
    health education
  - The equity awakening: Whose health literacy are
    we measuring?
  - What words can and cannot do

  Create:
  1. Memoir proposal and narrative arc
  2. Sample chapter (most powerful story)
  3. Thematic framework
  4. Character and scene development
  5. Ethical considerations in health education memoir
  6. Publishing and impact strategy
  7. Companion resources
  8. Discussion guide for professional audiences

assertions:
  - type: llm_judge
    criteria: "Sample chapter achieves literary quality — uses vivid, specific scenes (a real patient interaction, a hospital corridor, a community health fair) with sensory detail and dialogue; the narrator's voice is reflective and self-aware; the chapter illuminates a universal truth about health communication through a particular human story."
    weight: 0.35
    description: "LiteraryQuality"
  - type: llm_judge
    criteria: "Thematic framework elevates personal stories to systemic insight — connects individual patient stories to the larger failure of a healthcare system that communicates in ways most patients cannot understand; explores how institutional priorities (legal protection, clinical precision) conflict with patient comprehension; reveals health education as a social justice issue."
    weight: 0.35
    description: "SystemicInsightFramework"
  - type: llm_judge
    criteria: "COVID chapter captures the unprecedented moment — the global pandemic was the largest-scale health communication challenge in human history; the memoir captures the chaos, the failures (confusing public health messaging), the misinformation explosion, and the moments when clear, compassionate communication cut through the noise and saved lives."
    weight: 0.30
    description: "COVIDChapterCapture"
