meta:
  id: self-care-sunday
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a self-care Sunday Reel for a bath product"
  tags: [ugc, self-care, wellness, aesthetic]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "SoakLux" bath bomb set ($19.99 for 6).
  Format: Self-Care Sunday routine. The creator shows their relaxation ritual.
  Instagram self-care content should feel calming, aesthetic, and aspirational.
  Include gentle background music suggestions and visual direction.

assertions:
  - type: llm_judge
    criteria: "The script creates a calming, ASMR-adjacent atmosphere — the pacing is slow enough to feel relaxing, with sensory descriptions of the bath bomb dissolving, colors, and scents"
    weight: 0.25
    description: "Creates calming, sensory atmosphere"
  - type: llm_judge
    criteria: "Visual direction captures the Instagram self-care aesthetic — warm lighting, steam, candles, soft textures, overhead bath shots with the bomb dissolving"
    weight: 0.25
    description: "Visual direction nails self-care aesthetic"
  - type: llm_judge
    criteria: "The script positions the bath bomb as an affordable luxury — at $3.33 per bath, it's accessible self-care that viewers would want to replicate"
    weight: 0.25
    description: "Positioned as affordable luxury"
  - type: llm_judge
    criteria: "Music and mood suggestions complement the visual content — recommendations are specific enough to guide a creator (genre, tempo, vibe) without being overly prescriptive"
    weight: 0.25
    description: "Music suggestions complement the mood"
