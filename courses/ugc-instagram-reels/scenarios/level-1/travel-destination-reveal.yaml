meta:
  id: travel-destination-reveal
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a travel destination reveal Reel featuring a travel product"
  tags: [ugc, travel, reveal, aesthetic]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "PackLight" compression packing cubes ($29.99).
  Format: travel destination reveal — creator arriving at a beach resort and unpacking.
  Show how the packing cubes kept everything organized for a week-long trip.
  Instagram travel content should be aspirational and visually stunning.

assertions:
  - type: llm_judge
    criteria: "The script captures Instagram travel aesthetic — aspirational destination visuals, beautiful shots of the location, and a sense of wanderlust that makes viewers engage"
    weight: 0.25
    description: "Captures aspirational Instagram travel aesthetic"
  - type: llm_judge
    criteria: "The packing cubes are naturally woven into the travel narrative — the unpacking moment shows genuine utility rather than being a forced product demo at a nice location"
    weight: 0.25
    description: "Product naturally woven into travel narrative"
  - type: llm_judge
    criteria: "The hook immediately draws viewers in with a visual or emotional travel moment — destination reveal, airplane window shot, or arrival excitement"
    weight: 0.25
    description: "Compelling travel hook"
  - type: llm_judge
    criteria: "The script balances aspirational travel content with practical product demonstration — viewers are both inspired to travel AND convinced they need packing cubes"
    weight: 0.25
    description: "Balances aspiration with practical demonstration"
