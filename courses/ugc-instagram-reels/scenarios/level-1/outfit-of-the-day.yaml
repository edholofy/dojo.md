meta:
  id: outfit-of-the-day
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write an OOTD Reel script for a fashion brand"
  tags: [ugc, fashion, ootd, instagram]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "Everlane" — an ethically-made
  basics brand. Feature their $48 linen shirt. Format: Outfit of the Day (OOTD).
  The creator styles the shirt 3 ways (casual, work, date night).
  Target audience: women 25-35 who value quality basics.

assertions:
  - type: llm_judge
    criteria: "The script shows three distinct styled looks with smooth transitions between them — each outfit is clearly different and the transitions feel natural for the Reels format"
    weight: 0.25
    description: "Three distinct looks with smooth transitions"
  - type: llm_judge
    criteria: "The tone matches Instagram's slightly aspirational but relatable voice — not overly casual like TikTok but also not stiff or editorial"
    weight: 0.25
    description: "Instagram-appropriate aspirational-yet-relatable tone"
  - type: llm_judge
    criteria: "The versatility angle is convincing — each styling demonstrates genuine different use cases, making the $48 investment feel worthwhile"
    weight: 0.25
    description: "Versatility makes price feel justified"
  - type: llm_judge
    criteria: "The script includes Instagram-native elements like save-worthy tips, potential carousel tie-in references, or encouragement to share with friends"
    weight: 0.25
    description: "Includes Instagram-native engagement elements"
