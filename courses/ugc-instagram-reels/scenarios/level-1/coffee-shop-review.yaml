meta:
  id: coffee-shop-review
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a local business review Reel for a coffee product"
  tags: [ugc, coffee, local-business, review]

state: {}

trigger: |
  Write a 30-second Instagram Reels UGC script for "Oatly" oat milk — featuring it
  at a local coffee shop. The creator orders an oat milk latte and shares their
  genuine reaction. Instagram coffee content is highly visual and aesthetic.
  Target: health-conscious millennials who frequent coffee shops.

assertions:
  - type: llm_judge
    criteria: "The script captures the aesthetic Instagram coffee culture — latte art, cozy coffee shop vibes, the first sip moment — in a way that feels native to the platform"
    weight: 0.25
    description: "Captures Instagram coffee aesthetic"
  - type: llm_judge
    criteria: "The hook is visually driven — leads with an appealing coffee shot or moment that stops scrollers in the Instagram feed"
    weight: 0.25
    description: "Visually-driven hook for Instagram feed"
  - type: llm_judge
    criteria: "The brand mention (Oatly) feels like a genuine preference, not a paid placement — the creator shares why they specifically choose oat milk over alternatives"
    weight: 0.25
    description: "Brand mention feels like genuine preference"
  - type: llm_judge
    criteria: "The script is appropriate for Instagram's slightly older, more polished audience compared to TikTok — tone is refined but still relatable"
    weight: 0.25
    description: "Tone suits Instagram's audience demographics"
