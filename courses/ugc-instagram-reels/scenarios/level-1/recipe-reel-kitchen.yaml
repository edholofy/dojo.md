meta:
  id: recipe-reel-kitchen
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a quick recipe Reel featuring a food product"
  tags: [ugc, food, recipe, tutorial]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "TruffleKing" truffle oil ($18.99).
  Format: quick recipe showing how to make truffle parmesan fries.
  The creator walks through the recipe in a visually appealing way.
  Instagram food content should be aesthetic and save-worthy.

assertions:
  - type: llm_judge
    criteria: "The recipe steps are clear and complete — a viewer could actually recreate the truffle parmesan fries by following along with the Reel"
    weight: 0.25
    description: "Recipe is complete and followable"
  - type: llm_judge
    criteria: "The script emphasizes visual appeal — includes direction for overhead shots, close-ups of the truffle oil drizzle, steam, cheese pull, or other 'food porn' moments that make the Reel save-worthy"
    weight: 0.25
    description: "Visually appealing food content direction"
  - type: llm_judge
    criteria: "The truffle oil is positioned as the transformative ingredient — the script shows how it elevates simple fries into something restaurant-quality"
    weight: 0.25
    description: "Product positioned as the transformative ingredient"
  - type: llm_judge
    criteria: "The pacing works for 60 seconds — doesn't rush through steps or drag in places. Uses text overlays and voiceover effectively for recipe clarity"
    weight: 0.25
    description: "Pacing optimized for 60-second format"
