meta:
  id: skincare-routine-reel
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a skincare routine Reel script with Instagram's polished aesthetic"
  tags: [ugc, skincare, routine, instagram-aesthetic]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "GlassGlow" hyaluronic acid serum ($32).
  The creator shows their nighttime skincare routine. Instagram audiences expect slightly
  more polished, aesthetic content than TikTok. Target: women 28-40.
  Include visual direction notes for the aesthetic shots.

assertions:
  - type: llm_judge
    criteria: "The script is calibrated for Instagram's more polished aesthetic — includes visual direction for well-lit, aesthetically pleasing shots while still feeling like authentic UGC, not a commercial"
    weight: 0.25
    description: "Instagram-appropriate polished aesthetic"
  - type: llm_judge
    criteria: "The script uses the full 60-second format well — doesn't feel like a stretched 30-second TikTok but takes advantage of the longer format to show a complete routine with more detail"
    weight: 0.25
    description: "Uses 60-second format effectively"
  - type: llm_judge
    criteria: "The hook works for Instagram's scroll behavior (1.5-second decision point) — immediately visually compelling in a way that suits the Instagram feed, not just the Explore page"
    weight: 0.25
    description: "Hook optimized for Instagram scroll behavior"
  - type: llm_judge
    criteria: "The product is the hero of the routine without dominating — seamlessly integrated as the key step, with enough routine context to feel authentic"
    weight: 0.25
    description: "Product naturally integrated as routine hero"
