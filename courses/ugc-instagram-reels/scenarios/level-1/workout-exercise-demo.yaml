meta:
  id: workout-exercise-demo
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a workout demo Reel for a fitness product"
  tags: [ugc, fitness, workout, demo]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "FlexBands" resistance bands set ($24.99).
  Format: 3-exercise demo showing a quick glute workout. Creator is a fitness enthusiast
  (not a trainer). Show proper form and make it save-worthy for people's workout collections.
  Target: women 22-35 who save workout Reels for gym day.

assertions:
  - type: llm_judge
    criteria: "The three exercises are clearly described with form cues that a viewer could follow — each exercise is distinct and specifically targets glutes using resistance bands"
    weight: 0.25
    description: "Three clear exercises with proper form cues"
  - type: llm_judge
    criteria: "The script is optimized for saves — structured as useful reference content that viewers would save to their workout collections for later use"
    weight: 0.25
    description: "Structured for saves as workout reference"
  - type: llm_judge
    criteria: "The creator persona is fitness enthusiast, not trainer — the tone is 'sharing my favorite exercises' not 'here's your workout plan,' which is more authentic for UGC"
    weight: 0.25
    description: "Enthusiast tone, not trainer lecture"
  - type: llm_judge
    criteria: "The resistance bands are integral to each exercise — viewers see specifically why bands make these exercises better, not just someone exercising near some bands"
    weight: 0.25
    description: "Bands integral to exercises, not just present"
