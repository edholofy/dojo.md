meta:
  id: home-decor-transformation
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a room transformation Reel for a home decor product"
  tags: [ugc, home-decor, transformation, aesthetic]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "AuraLamp" smart ambient light ($45).
  Format: room transformation / before-after. Show how the light changes the vibe
  of a bedroom from plain to cozy. Instagram's home decor audience loves aesthetic
  transformations with satisfying reveals.

assertions:
  - type: llm_judge
    criteria: "The transformation has a satisfying visual arc — builds from the 'before' (plain, uninspiring room) to the 'after' (cozy, ambient mood) with a clear reveal moment"
    weight: 0.25
    description: "Satisfying before-to-after visual arc"
  - type: llm_judge
    criteria: "The script captures the aesthetic that performs well on Instagram home decor — warm lighting, cozy vibes, ASMR-adjacent calming tone"
    weight: 0.25
    description: "Captures Instagram home decor aesthetic"
  - type: llm_judge
    criteria: "The smart light features (color changing, app control, scheduling) are shown through the transformation rather than listed as specs"
    weight: 0.25
    description: "Features shown through transformation, not listed"
  - type: llm_judge
    criteria: "The script encourages saves and shares — the transformation is impressive enough that viewers would save it for inspiration or send it to someone redecorating"
    weight: 0.25
    description: "Save-worthy and shareable transformation"
