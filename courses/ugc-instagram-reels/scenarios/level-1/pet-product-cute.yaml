meta:
  id: pet-product-cute
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a cute pet product Reel that drives engagement"
  tags: [ugc, pets, cute-content, engagement]

state: {}

trigger: |
  Write a 30-second Instagram Reels UGC script for "PawPerfect" self-cleaning dog brush ($22).
  Feature a golden retriever getting brushed. Pet content performs exceptionally well
  on Instagram. Make it cute, engaging, and shareable.
  Target: dog owners 25-45.

assertions:
  - type: llm_judge
    criteria: "The script maximizes the cute factor — captures specific adorable dog moments (happy tail wags, relaxed grooming face, fluffy fur reveal) that make viewers stop scrolling"
    weight: 0.25
    description: "Maximizes cute factor with specific moments"
  - type: llm_judge
    criteria: "The self-cleaning feature is demonstrated in a satisfying visual moment — showing the fur release is the product's 'wow' moment and the script builds to it"
    weight: 0.25
    description: "Self-cleaning demo is the satisfying payoff"
  - type: llm_judge
    criteria: "The script encourages tagging and sharing — pet content is among the most shared on Instagram, and the script includes elements that would make viewers tag their dog-owner friends"
    weight: 0.25
    description: "Encourages tagging and sharing"
  - type: llm_judge
    criteria: "The voiceover/text maintains a warm, relatable tone that dog owners connect with — speaks their language about grooming struggles"
    weight: 0.25
    description: "Warm tone that connects with dog owners"
