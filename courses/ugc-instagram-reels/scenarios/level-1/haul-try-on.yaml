meta:
  id: haul-try-on
  level: 1
  course: ugc-instagram-reels
  type: output
  description: "Write a try-on haul Reel for an online clothing store"
  tags: [ugc, fashion, haul, try-on]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "ASOS" — featuring a $150 spring haul
  with 4 items. Format: try-on haul with quick transitions. The creator shows each piece
  on camera with honest first impressions. Keep it upbeat and genuine.

assertions:
  - type: llm_judge
    criteria: "All four items get adequate screen time — each has a clear try-on moment with a genuine first reaction, not just quick flashes"
    weight: 0.25
    description: "All four items get adequate try-on time"
  - type: llm_judge
    criteria: "The transitions between outfits are smooth and engaging — uses common Reel transitions (snap, spin, outfit swap) that feel dynamic and keep the pacing interesting"
    weight: 0.25
    description: "Smooth, dynamic outfit transitions"
  - type: llm_judge
    criteria: "The first impressions feel genuine — includes honest reactions about fit, fabric feel, and whether items match their online photos, not just 'omg love everything'"
    weight: 0.25
    description: "Honest, specific first impressions"
  - type: llm_judge
    criteria: "The script structure makes viewers want to shop — mentions sizes for reference, includes styling tips, and ends with a clear shopping CTA"
    weight: 0.25
    description: "Drives shopping intent with practical details"
