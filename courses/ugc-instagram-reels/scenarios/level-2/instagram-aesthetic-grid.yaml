meta:
  id: instagram-aesthetic-grid
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Script that considers how the Reel thumbnail fits the creator's grid"
  tags: [ugc, grid-aesthetic, thumbnail, instagram-strategy]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Reformation" sustainable dress ($218).
  The creator is a fashion micro-influencer (15K followers) with a carefully curated
  beige/earth-tone grid aesthetic.

  The script must:
  - Include thumbnail direction (the cover frame must fit their grid aesthetic)
  - The Reel content should be engaging but the cover shot must be a stunning,
    grid-worthy fashion moment
  - Recommend the ideal cover frame from within the script

  Instagram creators care deeply about how Reels look on their profile grid.

assertions:
  - type: llm_judge
    criteria: "The script includes specific thumbnail/cover frame direction — identifies which moment in the Reel would make the best grid-worthy cover image and explains why"
    weight: 0.25
    description: "Specific thumbnail cover frame recommendation"
  - type: llm_judge
    criteria: "The visual direction maintains the beige/earth-tone aesthetic throughout — color palette, setting, and styling suggestions align with the creator's established grid look"
    weight: 0.25
    description: "Visual direction maintains grid aesthetic"
  - type: llm_judge
    criteria: "The Reel content is engaging and dynamic despite the aesthetic constraints — doesn't sacrifice entertainment value for aesthetics or vice versa"
    weight: 0.25
    description: "Engaging content within aesthetic constraints"
  - type: llm_judge
    criteria: "The $218 price point is handled with appropriate aspiration — the script makes the investment feel justified through the styling, quality focus, and sustainability story"
    weight: 0.25
    description: "Price justified through aspirational framing"
