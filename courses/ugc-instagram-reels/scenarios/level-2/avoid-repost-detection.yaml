meta:
  id: avoid-repost-detection
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Adapt TikTok content for Instagram without triggering repost detection"
  tags: [ugc, cross-platform, repost-detection, adaptation]

state: {}

trigger: |
  A brand has a successful TikTok UGC video for "Dyson Airwrap" ($599) that they want
  adapted for Instagram Reels. The original TikTok script:
  "Okay this thing is literally witchcraft *shows Airwrap curling hair* I CANNOT
  believe I waited this long. Look at this curl. LOOK AT IT. One pass. One single
  pass. My hair holds curls for maybe 2 hours with a regular curler. This? Still
  bouncy the next MORNING. Am I Rapunzel now?? Link in bio besties"

  Instagram's algorithm penalizes content that retains 70%+ of another video's visual
  or audio fingerprint. Rewrite this script for Instagram Reels, making it:
  - Different enough to avoid repost detection
  - Adapted for Instagram's slightly more polished audience
  - Equally effective but platform-native

assertions:
  - type: llm_judge
    criteria: "The adapted script is sufficiently different from the TikTok original — different structure, angle, or format that wouldn't trigger Instagram's visual/audio fingerprinting, while keeping the core message"
    weight: 0.30
    description: "Different enough to avoid repost detection"
  - type: llm_judge
    criteria: "The tone is adapted for Instagram's slightly older, more polished audience — maintains enthusiasm but dials back the TikTok-specific language and energy level"
    weight: 0.25
    description: "Tone adapted for Instagram audience"
  - type: llm_judge
    criteria: "The script is equally or more effective for Instagram than just reposting would be — takes advantage of Instagram-specific features, format, and audience expectations"
    weight: 0.25
    description: "More effective than simple repost"
  - type: llm_judge
    criteria: "The core product claims and emotional beats (witchcraft effect, one-pass curls, overnight hold) are preserved in the adaptation — the persuasion power is maintained"
    weight: 0.20
    description: "Core claims and emotional beats preserved"
