meta:
  id: carousel-reel-hybrid
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Script designed to complement a carousel post as part of a content pair"
  tags: [ugc, carousel, hybrid-content, instagram-strategy]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "The Ordinary" Niacinamide Serum ($6.50).
  This Reel is part of a content pair: the brand will also post a carousel with
  detailed ingredient info, before/after photos, and usage instructions.

  The Reel should:
  - Capture attention and create desire (emotional, visual)
  - Reference the carousel for more detailed info ("check our latest post for the full routine")
  - Work as standalone content too
  - Drive saves on the Reel (the algorithm values saves)

assertions:
  - type: llm_judge
    criteria: "The Reel captures attention emotionally/visually while naturally directing viewers to the carousel for detailed information — the two pieces of content complement each other"
    weight: 0.25
    description: "Reel and carousel complement each other"
  - type: llm_judge
    criteria: "The carousel reference is smooth and natural — doesn't feel like 'go check our other post' but rather adds value ('I broke down my full routine with before/afters in our latest post')"
    weight: 0.25
    description: "Carousel reference adds value, not just redirects"
  - type: llm_judge
    criteria: "The Reel works as standalone content — a viewer who never sees the carousel still gets value, understands the product, and might purchase"
    weight: 0.25
    description: "Works as standalone content"
  - type: llm_judge
    criteria: "The script includes save-bait elements — tips, a routine worth bookmarking, or information viewers would want to reference later, driving the algorithm signal Instagram values most"
    weight: 0.25
    description: "Includes elements that drive saves"
