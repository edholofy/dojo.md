meta:
  id: shoppable-reel-tags
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Script optimized for Instagram's shoppable features and product tags"
  tags: [ugc, shoppable, product-tags, instagram-commerce]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Glossier" featuring 3 products:
  Boy Brow ($18), Cloud Paint ($20), and Balm Dotcom ($14).
  The script must be optimized for Instagram Shopping:
  - Each product should have a clear on-screen moment suitable for product tag placement
  - Include text overlay suggestions for price callouts
  - The flow should encourage "tap to shop" behavior
  Creator does a natural "5-minute makeup" tutorial.

assertions:
  - type: llm_judge
    criteria: "Each of the three products has a distinct, lingering on-screen moment that would work for Instagram product tag placement — not quick flashes but clear, tappable moments"
    weight: 0.30
    description: "Clear product tag placement moments for all 3 products"
  - type: llm_judge
    criteria: "Text overlay suggestions for prices are natural and non-intrusive — they complement the visual flow rather than cluttering the aesthetic"
    weight: 0.20
    description: "Price overlays complement aesthetic"
  - type: llm_judge
    criteria: "The 5-minute makeup tutorial is actually achievable and the three products form a cohesive, minimal routine — the selection makes sense together"
    weight: 0.25
    description: "Products form cohesive minimal routine"
  - type: llm_judge
    criteria: "The CTA encourages tap-to-shop behavior specific to Instagram (product tags, shop button, saved collections) rather than generic 'link in bio' which is less direct"
    weight: 0.25
    description: "Instagram-native shopping CTA"
