meta:
  id: stories-to-reels-funnel
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Script with a Stories-to-Reels content funnel strategy"
  tags: [ugc, stories, funnel, content-strategy]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Athletic Greens" (AG1) daily
  supplement ($79/month). Also provide 3 complementary Instagram Story frames
  that the creator would post the same day to drive traffic to the Reel.

  The Stories should:
  - Tease the Reel content
  - Each Story frame should add value on its own
  - Drive viewers from Stories to the Reel
  - Use Instagram Story features (polls, questions, countdown, swipe-up/link sticker)

assertions:
  - type: llm_judge
    criteria: "The Reel script stands alone as compelling content AND the three Story frames effectively tease and drive traffic to it — the funnel makes viewers want to watch the full Reel"
    weight: 0.25
    description: "Effective Stories-to-Reel funnel"
  - type: llm_judge
    criteria: "Each Story frame adds independent value (a tip, a question, a behind-the-scenes moment) rather than just saying 'go watch my Reel' — viewers get something from the Story even if they don't click through"
    weight: 0.25
    description: "Each Story adds independent value"
  - type: llm_judge
    criteria: "The Story frames use Instagram Story features effectively — polls, questions, countdown, or link stickers are used in ways that feel native and drive engagement"
    weight: 0.25
    description: "Story features used effectively"
  - type: llm_judge
    criteria: "The overall content strategy shows understanding of how Stories and Reels serve different purposes in the Instagram ecosystem — Stories for warm audience engagement, Reels for discovery"
    weight: 0.25
    description: "Understands Stories vs Reels ecosystem roles"
