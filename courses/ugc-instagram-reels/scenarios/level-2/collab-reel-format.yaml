meta:
  id: collab-reel-format
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Script designed for Instagram's Collab feature (dual-posted Reel)"
  tags: [ugc, collab, dual-post, instagram-feature]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "Sunday Riley" Good Genes lactic acid ($85).
  This Reel will use Instagram's Collab feature — it posts to BOTH the brand's
  page and the creator's page simultaneously.

  The script must work for both audiences:
  - The brand's followers (may not know the creator — need creator credibility established)
  - The creator's followers (already trust the creator — need product info)
  - Both audiences see the same content on different feeds

assertions:
  - type: llm_judge
    criteria: "The script works for both the brand's audience (needs creator credibility) and the creator's audience (needs product information) — neither group feels like an afterthought"
    weight: 0.30
    description: "Serves both brand and creator audiences"
  - type: llm_judge
    criteria: "The creator establishes their credibility early (skincare expertise, experience, or relatability) so brand followers who don't know them will trust the recommendation"
    weight: 0.25
    description: "Creator credibility established for brand audience"
  - type: llm_judge
    criteria: "The product information is thorough enough for the creator's audience who may not know the brand — what it does, why it's worth $85, and how it fits into a routine"
    weight: 0.25
    description: "Product info serves creator's audience"
  - type: llm_judge
    criteria: "The overall tone bridges brand professionalism and creator authenticity — doesn't lean too far toward either corporate polish or casual personal content"
    weight: 0.20
    description: "Bridges brand and creator tone"
