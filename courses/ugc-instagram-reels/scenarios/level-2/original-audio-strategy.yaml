meta:
  id: original-audio-strategy
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Script using original audio to boost Instagram's algorithm favorability"
  tags: [ugc, original-audio, algorithm, instagram-strategy]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Ceremonia" hair oil ($26).
  Instagram's algorithm now favors Reels with ORIGINAL audio over reused/trending
  sounds. The script should use the creator's original voiceover as the primary audio.

  Requirements:
  - Original voiceover (not trending sound lip-sync)
  - The voiceover style should be engaging enough to become its own audio trend
  - Include a catchy, quotable line that other creators might use as a sound
  - Visually show a hair transformation (dry/frizzy to smooth/shiny)

assertions:
  - type: llm_judge
    criteria: "The script is designed for original audio — uses the creator's authentic voiceover as the primary audio element, not a trending sound overlay"
    weight: 0.25
    description: "Designed for original audio, not trending sound"
  - type: llm_judge
    criteria: "The voiceover includes at least one catchy, quotable line or phrase that could become a reusable sound — something other creators might want to lip-sync or stitch"
    weight: 0.25
    description: "Contains a catchy, potentially viral audio hook"
  - type: llm_judge
    criteria: "The hair transformation is described in a visually compelling way — the before (dry/frizzy) to after (smooth/shiny) has a satisfying progression that viewers would watch fully"
    weight: 0.25
    description: "Compelling hair transformation visual arc"
  - type: llm_judge
    criteria: "The voiceover is engaging and personality-driven — not a monotone product review but an expressive, conversational delivery that makes the audio itself appealing"
    weight: 0.25
    description: "Engaging, personality-driven voiceover"
