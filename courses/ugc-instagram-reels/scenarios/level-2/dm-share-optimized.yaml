meta:
  id: dm-share-optimized
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Script optimized to drive DM shares, Instagram's highest engagement signal"
  tags: [ugc, dm-shares, algorithm, engagement]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "Chamberlain Coffee" ($15.99 for matcha).
  Instagram's algorithm heavily rewards DM shares — content people send to friends
  performs better than content that just gets likes.

  Design the script specifically to trigger the "I need to send this to someone" impulse:
  - Create a relatable moment people tag friends in
  - Include a "this is so you" element
  - Make it about a shared experience or inside-joke potential
  Target: women 20-30 who love matcha and share content with their friend group.

assertions:
  - type: llm_judge
    criteria: "The script is explicitly designed to trigger DM sharing — includes relatable moments, inside-joke potential, or 'tag your friend who...' elements that make sharing feel natural"
    weight: 0.30
    description: "Designed to trigger DM sharing impulse"
  - type: llm_judge
    criteria: "The relatable element is specific enough to resonate ('every girl has that one friend who is THIS obsessed with matcha') rather than generically relatable"
    weight: 0.25
    description: "Specific relatability, not generic"
  - type: llm_judge
    criteria: "The product promotion still lands despite the share-optimization focus — viewers who receive this in their DMs understand the product and might want to try it"
    weight: 0.25
    description: "Product promotion effective for DM recipients too"
  - type: llm_judge
    criteria: "The tone captures friend-group energy — feels like content from within a social circle, not from a brand trying to infiltrate one"
    weight: 0.20
    description: "Friend-group energy, not brand voice"
