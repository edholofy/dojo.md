meta:
  id: longer-format-90sec
  level: 2
  course: ugc-instagram-reels
  type: output
  description: "Script leveraging Instagram's optimal 60-90 second Reel length"
  tags: [ugc, long-format, 90-second, detailed]

state: {}

trigger: |
  Write a 90-second Instagram Reels UGC script for "Casper" mattress ($1,095).
  Instagram Reels between 60-90 seconds receive the highest engagement — longer than
  TikTok's optimal 15-30 seconds. Use this extra time strategically.

  The creator has slept on the Casper for 6 months. The longer format allows for:
  - Deeper storytelling (not just a quick testimonial)
  - More specific details about the sleep experience
  - Addressing common objections (price, online buying concerns)
  - A more complete narrative arc

  Don't just pad a 30-second script — use the 90 seconds purposefully.

assertions:
  - type: llm_judge
    criteria: "The 90-second format is used purposefully — every section adds value and the extra time enables deeper storytelling that wouldn't be possible in 30 seconds, not just filler padding"
    weight: 0.30
    description: "90 seconds used purposefully, no padding"
  - type: llm_judge
    criteria: "The 6-month experience provides specific, credible details — mentions particular improvements, specific nights, real observations that only come from extended use, not day-one first impressions"
    weight: 0.25
    description: "6-month experience provides specific credibility"
  - type: llm_judge
    criteria: "At least one common objection (price or online buying anxiety) is addressed naturally within the narrative — proactively resolving concerns rather than ignoring them for a $1,095 product"
    weight: 0.25
    description: "Addresses at least one purchase objection"
  - type: llm_judge
    criteria: "The pacing maintains engagement across 90 seconds — includes enough variety, scene changes, or narrative beats to prevent viewer drop-off in the middle"
    weight: 0.20
    description: "Pacing maintains engagement across full 90 seconds"
