meta:
  id: local-business-reel
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "UGC Reel for a local business with geographically limited audience"
  tags: [ugc, local-business, geo-targeting, small-business]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "Luna's Bakery" — a small
  artisan bakery in Austin, TX. No website, Instagram-only business.
  Their sourdough bread ($8/loaf) and croissants ($4.50) sell out every Saturday.

  The challenge: Instagram's Reels algorithm pushes content to a broad audience,
  but Luna's can only serve local Austin customers. A Reel that goes viral
  nationally is wasted reach for a neighborhood bakery.

  Write a script that:
  - Is engaging enough to perform well on Reels
  - Targets Austin locals specifically through content signals
  - Helps a small business without misleading non-local viewers

assertions:
  - type: llm_judge
    criteria: "The script includes location signals that help Instagram's algorithm understand this is local content — mentions Austin, neighborhood references, or local landmarks that attract the right geographic audience"
    weight: 0.25
    description: "Location signals for geographic targeting"
  - type: llm_judge
    criteria: "The content would still perform well as a Reel — it's engaging, visually compelling (fresh bread, bakery atmosphere), and watchable even for non-Austin viewers who discover it"
    weight: 0.25
    description: "Engaging Reel despite local focus"
  - type: llm_judge
    criteria: "The sell-out urgency is used authentically — mentions Saturday sell-outs as social proof and scarcity without being manipulative, and helps local viewers know when to go"
    weight: 0.25
    description: "Authentic scarcity from real sell-out pattern"
  - type: llm_judge
    criteria: "The script supports a small business's Instagram-only model — drives followers, not website visits, and encourages the behaviors that help a local business (visiting, DM orders, following for announcements)"
    weight: 0.25
    description: "Supports Instagram-only business model"
