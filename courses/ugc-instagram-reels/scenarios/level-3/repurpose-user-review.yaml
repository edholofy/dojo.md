meta:
  id: repurpose-user-review
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Transform a written customer review into an Instagram Reel script"
  tags: [ugc, review-adaptation, user-content, creative]

state: {}

trigger: |
  Transform this Amazon customer review into a 60-second Instagram Reels UGC script
  for "Ninja Creami" ice cream maker ($199):

  "5 stars. OK so I was skeptical because $200 for an ice cream maker?? But my wife
  convinced me and WOW. We've made protein ice cream (actually good), sorbet from
  just frozen fruit, and even a cookies and cream that rivals Cold Stone. The cleanup
  is super easy — one jar, rinse, done. My kids are obsessed and we've saved so much
  money not going out for ice cream. The noise level is pretty loud (like a blender)
  but it's only for 2 minutes so who cares. We've used it literally every day for
  3 weeks. Best kitchen purchase of the year."

  The Reel should feel like original UGC, not a dramatized reading of a review.

assertions:
  - type: llm_judge
    criteria: "The script feels like original UGC content, not a dramatic reading or recreation of the written review — it captures the spirit and key points but in a visually-native Reel format"
    weight: 0.30
    description: "Feels like original UGC, not review dramatization"
  - type: llm_judge
    criteria: "The key persuasion elements from the review are preserved: initial price skepticism, specific recipes made, easy cleanup, family enjoyment, daily usage, and cost savings vs. going out"
    weight: 0.25
    description: "Key persuasion elements preserved"
  - type: llm_judge
    criteria: "The honest mention of the noise drawback is included (maintaining trust) but contextualized positively, just like in the original review"
    weight: 0.20
    description: "Noise drawback mentioned with context"
  - type: llm_judge
    criteria: "The Reel format adds visual value that the written review couldn't — showing the actual ice cream being made, the textures, the family reactions — leveraging the medium's strengths"
    weight: 0.25
    description: "Visual format adds value beyond written review"
