meta:
  id: declining-reach-pivot
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Pivot strategy when a brand's Reels format stops performing"
  tags: [ugc, declining-reach, pivot, strategy]

state: {}

trigger: |
  "Fenty Beauty" has been posting the same UGC format for 3 months: talking-head
  product reviews with text overlays. Their Reel engagement dropped 60% as the
  algorithm deprioritized this format.

  Write a strategy note explaining:
  1. Why the format likely stopped working (algorithm fatigue, audience saturation)
  2. Three alternative UGC formats they should test

  Then write a complete 60-second script for ONE of your recommended formats,
  featuring Fenty Gloss Bomb ($22).

assertions:
  - type: llm_judge
    criteria: "The strategy note correctly diagnoses why the format stopped working — mentions algorithm content diversity preferences, audience fatigue, and the saturation of talking-head reviews"
    weight: 0.20
    description: "Correct diagnosis of format decline"
  - type: llm_judge
    criteria: "The three alternative format recommendations are genuinely different from each other AND from the talking-head format — not slight variations but fundamentally different content approaches"
    weight: 0.25
    description: "Three genuinely different format alternatives"
  - type: llm_judge
    criteria: "The selected format's script is fully developed and would actually revive engagement — it brings something fresh that the algorithm and audience would respond to"
    weight: 0.30
    description: "Script would genuinely revive engagement"
  - type: llm_judge
    criteria: "The strategy demonstrates understanding of how Instagram's algorithm rewards content variety from accounts — and how to maintain brand consistency while diversifying format"
    weight: 0.25
    description: "Understands algorithm content diversity rewards"
