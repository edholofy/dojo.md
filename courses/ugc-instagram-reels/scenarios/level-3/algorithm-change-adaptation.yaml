meta:
  id: algorithm-change-adaptation
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Adapt script strategy when Instagram changes its algorithm"
  tags: [ugc, algorithm, adaptation, strategy]

state: {}

trigger: |
  Instagram just announced an algorithm change: Reels will now be ranked 50% on
  "send-to-friend" rate and only 20% on watch time. Previously it was 40% watch time,
  30% likes, 30% shares.

  You have an existing script concept for "Hydro Flask" water bottle ($44.95) —
  a straightforward "5 reasons I love my Hydro Flask" listicle.

  Rewrite the concept to optimize for the new algorithm that heavily favors
  send-to-friend behavior. Explain your strategic pivot.

assertions:
  - type: llm_judge
    criteria: "The strategic pivot explanation shows genuine understanding of what drives DM sharing versus watch time — and how the script needs to fundamentally change, not just be tweaked"
    weight: 0.25
    description: "Shows understanding of DM-share vs watch-time optimization"
  - type: llm_judge
    criteria: "The rewritten script is fundamentally different from a listicle — pivots to a format that triggers the 'I need to send this' impulse (relatable comedy, controversy, gift idea, personality-based content)"
    weight: 0.30
    description: "Fundamentally different format optimized for shares"
  - type: llm_judge
    criteria: "The product still features prominently despite the format change — the algorithm optimization doesn't come at the cost of product visibility or purchase intent"
    weight: 0.25
    description: "Product still prominently featured"
  - type: llm_judge
    criteria: "The explanation acknowledges that listicles optimize for watch time (sequential reveals keep people watching) while share-optimized content needs relatable/emotional/funny moments"
    weight: 0.20
    description: "Correctly identifies why format types optimize differently"
