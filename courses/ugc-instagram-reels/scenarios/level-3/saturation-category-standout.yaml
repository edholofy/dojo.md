meta:
  id: saturation-category-standout
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Stand out in a completely saturated content category on Instagram"
  tags: [ugc, saturation, differentiation, creative]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Lululemon" Align leggings ($98).
  The challenge: Instagram is SATURATED with legging reviews. Thousands of Reels
  already cover this exact product with the same formats — try-on, squat test,
  comparison, "is it worth the price" reviews.

  Your script must take an angle that hasn't been done to death.
  Do NOT use any of these overused formats:
  - Squat test / see-through test
  - "Worth the price?" direct review
  - Lulu vs. Amazon dupe comparison
  - Simple try-on with mirror selfie

  Find a genuinely fresh angle that would stand out in a saturated feed.

assertions:
  - type: llm_judge
    criteria: "The angle is genuinely fresh and avoids ALL four banned overused formats — it would stand out in a feed full of typical legging reviews by approaching the product from an unexpected direction"
    weight: 0.35
    description: "Genuinely fresh angle, avoids all overused formats"
  - type: llm_judge
    criteria: "Despite the creative angle, the script still effectively sells the Align leggings — viewers understand why they're special and want to buy them"
    weight: 0.25
    description: "Creative angle still drives purchase intent"
  - type: llm_judge
    criteria: "The fresh approach would actually work on Instagram — it's not just different for the sake of being different but leverages a real audience interest or emotional connection"
    weight: 0.20
    description: "Fresh approach would genuinely perform"
  - type: llm_judge
    criteria: "The script acknowledges the saturation implicitly or explicitly — the hook might play off the fact that everyone has reviewed these, using that awareness as a strength"
    weight: 0.20
    description: "Uses saturation awareness as a creative strength"
