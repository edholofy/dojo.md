meta:
  id: brand-safety-adjacent
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Navigate brand-safety concerns in Instagram's more conservative environment"
  tags: [ugc, brand-safety, conservative, instagram]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "Dame" — a sexual wellness brand
  selling vibrators ($79-$135). Instagram is more conservative than TikTok regarding
  sexual wellness content.

  Constraints:
  - Instagram's community guidelines restrict explicit sexual content
  - The product cannot be shown in use or even implied in sexual context
  - But the product IS a vibrator — you can't pretend it's something else
  - The brand wants to destigmatize sexual wellness openly and honestly

  Write a script that promotes the product on Instagram without getting flagged
  while maintaining the brand's mission of destigmatization.

assertions:
  - type: llm_judge
    criteria: "The script navigates Instagram's content restrictions — promotes a vibrator without crossing into explicit content territory, finding the line between honest and flaggable"
    weight: 0.25
    description: "Navigates content restrictions skillfully"
  - type: llm_judge
    criteria: "The product is NOT disguised or euphemized to the point of meaninglessness — the script is honest about what the product is while being tasteful about how it's presented"
    weight: 0.25
    description: "Honest about product without disguising it"
  - type: llm_judge
    criteria: "The brand's destigmatization mission comes through — the script normalizes sexual wellness in a positive, empowering way rather than treating it as taboo or shameful"
    weight: 0.25
    description: "Destigmatization mission communicated"
  - type: llm_judge
    criteria: "The creative approach is smart for Instagram specifically — uses design focus, self-care framing, unboxing aesthetics, or empowerment messaging that fits the platform's visual culture"
    weight: 0.25
    description: "Creative approach suits Instagram's visual culture"
