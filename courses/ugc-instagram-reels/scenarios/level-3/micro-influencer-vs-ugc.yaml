meta:
  id: micro-influencer-vs-ugc
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Navigate the blurred line between UGC and influencer content on Instagram"
  tags: [ugc, micro-influencer, content-type, judgment]

state: {}

trigger: |
  A skincare brand "CeraVe" wants UGC for Instagram Reels. They've hired a creator
  with 48K followers — technically a micro-influencer, not a typical UGC creator.

  The brand brief says "We want UGC, not influencer content."
  But the creator's audience expects their usual polished, personality-driven content.

  Write a 60-second script that:
  - Feels like authentic UGC (not a sponsored influencer post)
  - Still works for a creator with 48K followers and an established personal brand
  - Explains the strategic difference between UGC and influencer content in your notes

  Include a strategy note on how to make influencer content feel like UGC.

assertions:
  - type: llm_judge
    criteria: "The strategy note clearly articulates the difference between UGC (product-centric, could be anyone) and influencer content (personality-centric, leveraging the creator's brand) and how to bridge them"
    weight: 0.25
    description: "Clear UGC vs influencer distinction"
  - type: llm_judge
    criteria: "The script leans UGC — focuses on the product experience rather than the creator's personality, uses relatable situations over aspirational lifestyle, and could work for a creator with 500 or 50K followers"
    weight: 0.30
    description: "Script leans UGC over influencer"
  - type: llm_judge
    criteria: "Despite leaning UGC, the script doesn't ask the 48K creator to completely abandon their established voice — finds a middle ground that feels authentic to them"
    weight: 0.25
    description: "Respects creator's established voice"
  - type: llm_judge
    criteria: "The CeraVe brand integration is appropriate — positions a pharmacy-brand product with the accessible, dermatologist-recommended credibility that aligns with its identity"
    weight: 0.20
    description: "CeraVe brand identity properly maintained"
