meta:
  id: accessibility-inclusive
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Create an accessible Reel that includes viewers with disabilities"
  tags: [ugc, accessibility, inclusion, best-practice]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Nike" Flyknit running shoes ($130).
  The brand requires that this Reel be fully accessible:
  - Must work with sound off (many Instagram users browse silently)
  - Text overlays must be readable and well-timed
  - Alt text description must be provided for the post
  - Content must not rely solely on color to convey information
  - Must include closed caption considerations

  Create an engaging Reel that meets all accessibility requirements without
  sacrificing creative quality. Include the alt text for the post.

assertions:
  - type: llm_judge
    criteria: "The script works fully with sound off — text overlays carry the complete message, not just supplementary captions, and the visual storytelling is self-sufficient"
    weight: 0.25
    description: "Fully functional with sound off"
  - type: llm_judge
    criteria: "Alt text is provided and follows best practices — descriptive enough for screen reader users to understand the content, specific about what's shown, and includes key product information"
    weight: 0.20
    description: "Alt text provided with best practices"
  - type: llm_judge
    criteria: "Text overlays are designed for readability — specifies font size, contrast, positioning, and timing that would work for viewers with visual impairments"
    weight: 0.25
    description: "Text overlays designed for readability"
  - type: llm_judge
    criteria: "All accessibility requirements are met WITHOUT making the Reel feel clinical or boring — the creative quality is just as high as a non-accessible version"
    weight: 0.30
    description: "Creative quality maintained despite accessibility focus"
