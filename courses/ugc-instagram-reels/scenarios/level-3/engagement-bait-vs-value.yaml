meta:
  id: engagement-bait-vs-value
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Drive engagement without using banned engagement-bait tactics"
  tags: [ugc, engagement, anti-bait, platform-rules]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "Crocs" Classic Clogs ($49.99).
  The goal is maximum engagement (comments, saves, shares).

  CONSTRAINT: Instagram now penalizes explicit engagement bait. You CANNOT use:
  - "Comment YES if you agree"
  - "Double tap if..."
  - "Tag someone who needs this"
  - "Save this for later"
  - Any direct instruction to engage

  Drive engagement ORGANICALLY through content quality, controversy, relatability,
  or curiosity — not through asking for it.

assertions:
  - type: llm_judge
    criteria: "The script drives engagement organically without ANY explicit engagement bait — no 'comment,' 'tag,' 'save,' 'like,' or 'share' instructions. Engagement comes from the content itself"
    weight: 0.30
    description: "Zero engagement bait, purely organic engagement"
  - type: llm_judge
    criteria: "The content would genuinely generate comments — uses opinion-provoking content, relatable controversy (Crocs love-hate debate), or a take that people want to respond to"
    weight: 0.25
    description: "Content genuinely provokes comments"
  - type: llm_judge
    criteria: "The Crocs' divisive reputation is leveraged as a content asset — the love-hate dynamic makes for inherently engaging content that people want to debate"
    weight: 0.25
    description: "Leverages Crocs' divisive reputation"
  - type: llm_judge
    criteria: "The script would generate saves through genuine value — a styling tip, an unexpected use case, or information people want to remember"
    weight: 0.20
    description: "Generates saves through genuine value"
