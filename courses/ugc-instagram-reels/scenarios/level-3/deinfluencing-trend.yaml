meta:
  id: deinfluencing-trend
  level: 3
  course: ugc-instagram-reels
  type: output
  description: "Navigate the deinfluencing trend while still promoting a product"
  tags: [ugc, deinfluencing, trend, authenticity]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "e.l.f. Cosmetics" Power Grip Primer ($10).
  The creator wants to ride the "deinfluencing" trend that's popular on Instagram —
  where creators tell people what NOT to buy.

  The script should use the deinfluencing format but ultimately recommend THIS product
  as the one thing that IS worth buying. The pivot from "stop wasting money on X"
  to "this is the one worth it" must feel genuine, not like a bait-and-switch.

assertions:
  - type: llm_judge
    criteria: "The deinfluencing portion feels genuine — the products the creator says NOT to buy are reasonable picks with fair criticism, not straw-man products set up to make the recommended product look good"
    weight: 0.25
    description: "Genuine deinfluencing, not straw-man setup"
  - type: llm_judge
    criteria: "The pivot from deinfluencing to recommending e.l.f. primer feels natural and earned — the recommendation has credibility BECAUSE the creator was just honest about other products, not despite it"
    weight: 0.30
    description: "Natural, earned pivot to recommendation"
  - type: llm_judge
    criteria: "The script rides the deinfluencing trend format authentically — uses the visual and narrative conventions that make this trend work on Instagram (dramatic 'don't buy this' moments)"
    weight: 0.20
    description: "Authentic deinfluencing trend format"
  - type: llm_judge
    criteria: "The $10 price point of e.l.f. is a natural fit for deinfluencing (which celebrates affordable alternatives) — the script leverages this alignment"
    weight: 0.25
    description: "Price point aligns with deinfluencing values"
