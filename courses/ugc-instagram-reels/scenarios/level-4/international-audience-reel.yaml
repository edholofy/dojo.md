meta:
  id: international-audience-reel
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Script for a global audience with cultural and language considerations"
  tags: [ugc, international, global, localization]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "IKEA" Billy Bookcase ($69).
  Instagram has a global audience and IKEA serves 60+ countries.

  The script must:
  - Be understandable to non-native English speakers (simple language)
  - Use visual storytelling that transcends language barriers
  - Include text overlay strategy for potential multi-language adaptation
  - Work for diverse living spaces (not just American-style homes)
  - The assembly process is universally relatable (IKEA's shared experience)

  Creator is building and styling a Billy Bookcase in a small apartment.

assertions:
  - type: llm_judge
    criteria: "The script uses simple, clear language appropriate for non-native English speakers — avoids idioms, slang, and culturally-specific references that would confuse an international audience"
    weight: 0.25
    description: "Simple language for international audience"
  - type: llm_judge
    criteria: "Visual storytelling carries the main narrative — the script could be understood with sound off and in any language because the visual sequence tells the story"
    weight: 0.25
    description: "Visual storytelling transcends language"
  - type: llm_judge
    criteria: "The text overlay strategy considers multi-language adaptation — text is minimal, positioned for easy replacement, and uses universal symbols or formatting"
    weight: 0.25
    description: "Text overlay designed for multi-language adaptation"
  - type: llm_judge
    criteria: "The living space and styling are relatable globally — not specific to American apartment aesthetics but applicable to small living spaces worldwide"
    weight: 0.25
    description: "Globally relatable living space and styling"
