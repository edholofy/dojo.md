meta:
  id: ugc-for-service-not-product
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Create UGC for an intangible service rather than a physical product"
  tags: [ugc, service, intangible, creative-challenge]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "BetterHelp" online therapy
  ($65-$100/week). Unlike physical products, therapy is:
  - Intangible (nothing to unbox, hold, or show)
  - Private (can't show actual therapy sessions)
  - Stigmatized (some viewers avoid mental health content)
  - Results-based (outcomes take weeks/months, not instant)

  The creator has been using BetterHelp for 4 months.
  Create compelling UGC for something you literally cannot show or demonstrate.

assertions:
  - type: llm_judge
    criteria: "The script creatively visualizes an intangible service — uses metaphor, before/after emotional states, daily life changes, or other creative devices to make therapy's impact tangible and visible"
    weight: 0.30
    description: "Creatively visualizes intangible service"
  - type: llm_judge
    criteria: "Privacy is respected — the script doesn't pretend to show therapy sessions or reveal private therapeutic content, but still communicates the value of the experience"
    weight: 0.20
    description: "Respects privacy, doesn't show sessions"
  - type: llm_judge
    criteria: "Mental health stigma is addressed through normalization — the script's tone makes therapy feel accessible and normal, not dramatic or clinical"
    weight: 0.25
    description: "Normalizes therapy without being clinical"
  - type: llm_judge
    criteria: "The 4-month timeline is used to show gradual, realistic progress — not an overnight transformation but genuine, believable improvement that builds trust"
    weight: 0.25
    description: "Shows realistic gradual progress over 4 months"
