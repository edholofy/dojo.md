meta:
  id: holiday-campaign-calendar
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Plan a 5-Reel holiday gift guide campaign across different audience segments"
  tags: [ugc, holiday, campaign, gift-guide]

state: {}

trigger: |
  Plan a 5-Reel Instagram holiday gift guide campaign for "Brooklinen" luxury
  bedding (sheets $149, duvet $349, towels $69). Timeline: December 1-15.

  Each Reel targets a different gift recipient:
  1. "Gifts for Her" (partner gifts)
  2. "Gifts for Him" (partner gifts)
  3. "Gifts for Parents" (thank-you gifts)
  4. "Gifts for the Person Who Has Everything"
  5. "Under $100 Gift Guide" (budget-conscious)

  Write all 5 scripts (30 seconds each). Each must:
  - Feature appropriate Brooklinen products for that recipient
  - Have a unique creative angle (not just "here's a sheet set for mom")
  - Include gift-wrapping or presentation moments (Instagram loves gift reveals)
  - Drive holiday shopping urgency without being cheesy

assertions:
  - type: llm_judge
    criteria: "All five scripts are provided, each targeting a distinct gift recipient with appropriate Brooklinen product selections — the product pairing makes logical sense for each audience"
    weight: 0.20
    description: "Five scripts with appropriate product-recipient pairing"
  - type: llm_judge
    criteria: "Each script has a unique creative angle — not five variations of the same 'this is a great gift' format but genuinely different approaches that keep the series interesting"
    weight: 0.25
    description: "Each script has unique creative angle"
  - type: llm_judge
    criteria: "Gift presentation/reveal moments are included and visually appealing — the scripts capture the gift-giving experience (wrapping, unboxing, reactions) that performs well on Instagram during holidays"
    weight: 0.25
    description: "Gift presentation moments included"
  - type: llm_judge
    criteria: "Holiday urgency is created through specific shipping deadlines, inventory notes, or gifting timelines rather than generic 'hurry!' language — practical urgency, not manufactured panic"
    weight: 0.30
    description: "Practical holiday urgency, not manufactured panic"
