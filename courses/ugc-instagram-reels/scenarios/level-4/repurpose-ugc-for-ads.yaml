meta:
  id: repurpose-ugc-for-ads
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Write UGC optimized for both organic posting and paid ad whitelisting"
  tags: [ugc, paid-ads, whitelisting, dual-purpose]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Allbirds" Tree Runners ($98).
  This content will serve DUAL purposes:
  1. Posted organically on the creator's feed
  2. Whitelisted as a paid Instagram ad (run from the creator's account)

  Organic and paid have different optimization needs:
  - Organic: needs strong hook, engagement signals, save-worthy content
  - Paid: needs clear value prop early, strong CTA, works without context
  - Paid can't rely on followers knowing the creator
  - Organic benefits from personality and community connection

  Write ONE script that works for both, with notes on what to adjust for the paid version.

assertions:
  - type: llm_judge
    criteria: "The script works for both organic and paid — the core content is strong enough for organic engagement while structured for paid ad effectiveness (clear value prop, CTA, context-free opening)"
    weight: 0.30
    description: "Works for both organic and paid purposes"
  - type: llm_judge
    criteria: "The notes clearly identify what to adjust for paid vs. organic — specific modifications like CTA button text, opening hook tweaks, or caption differences that optimize for each"
    weight: 0.25
    description: "Clear adjustment notes for paid vs organic"
  - type: llm_judge
    criteria: "The script doesn't feel like an ad despite being optimized for ads — maintains UGC authenticity that's the whole point of whitelisting creator content"
    weight: 0.25
    description: "Maintains UGC feel despite ad optimization"
  - type: llm_judge
    criteria: "The $98 sneaker pitch works for cold audiences (paid) who don't know the brand AND warm audiences (organic) who follow the creator — the value proposition scales"
    weight: 0.20
    description: "Value prop works for cold and warm audiences"
