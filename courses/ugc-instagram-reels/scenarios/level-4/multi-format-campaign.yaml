meta:
  id: multi-format-campaign
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Design a cohesive 3-Reel campaign series with different formats"
  tags: [ugc, campaign, multi-format, series]

state: {}

trigger: |
  Design a 3-Reel UGC campaign series for "Apple AirPods Max" ($549) to be posted
  across one week on Instagram. Each Reel must use a DIFFERENT format:

  Reel 1 (Day 1): Emotional/lifestyle format (60 seconds)
  Reel 2 (Day 3): Educational/informative format (60 seconds)
  Reel 3 (Day 6): Social proof/conversion format (45 seconds)

  The series should:
  - Tell a cohesive brand story across all three Reels
  - Each Reel works standalone but rewards viewers who see all three
  - Build from awareness → consideration → conversion
  - Same creator throughout for consistency

  Write all three scripts with a campaign strategy overview.

assertions:
  - type: llm_judge
    criteria: "All three scripts are provided with distinct formats (emotional, educational, social proof) and a clear campaign strategy overview explaining the awareness → consideration → conversion funnel"
    weight: 0.25
    description: "Three distinct scripts with clear funnel strategy"
  - type: llm_judge
    criteria: "The three Reels tell a cohesive story — there are narrative threads, callbacks, or progression that reward viewers who see all three while each also works independently"
    weight: 0.25
    description: "Cohesive story across three Reels"
  - type: llm_judge
    criteria: "Each format is genuinely different — the emotional Reel focuses on feeling, the educational on features/specs, and the social proof on credibility/conversion. They don't blend into the same thing"
    weight: 0.25
    description: "Formats genuinely distinct from each other"
  - type: llm_judge
    criteria: "The $549 price justification builds across the series — by the conversion Reel, the audience has been primed with emotional connection and rational justification to accept the premium price"
    weight: 0.25
    description: "Price justification builds across the series"
