meta:
  id: negative-comment-response-reel
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Script that turns negative comments into a follow-up Reel opportunity"
  tags: [ugc, comment-response, negative-feedback, engagement]

state: {}

trigger: |
  A UGC Reel for "Olaplex" No. 3 Hair Perfector ($30) got these top negative comments:
  - "This product is SO overhyped. Did nothing for my hair" (847 likes)
  - "Why would anyone pay $30 for 3.3oz?? It's gone in two weeks" (523 likes)
  - "$30 and it made my hair feel like straw. Worst purchase ever" (312 likes)

  Write a 60-second follow-up Reel (reply-to-comment format) that:
  - Addresses the criticism directly and honestly
  - Doesn't dismiss or gaslight the commenters
  - Explains when Olaplex works and when it doesn't (it's not for all hair types)
  - Turns the negative engagement into a trust-building opportunity
  - The creator responds to one specific comment as the hook

assertions:
  - type: llm_judge
    criteria: "The response addresses criticism directly — doesn't dismiss or gaslight the commenters but acknowledges that the product genuinely doesn't work for everyone"
    weight: 0.25
    description: "Directly addresses criticism without dismissing"
  - type: llm_judge
    criteria: "The script honestly explains who Olaplex IS and ISN'T for — specific hair types, damage levels, and usage expectations that set realistic standards"
    weight: 0.25
    description: "Honestly explains product fit/misfit"
  - type: llm_judge
    criteria: "The reply-to-comment hook format is executed well — starts by showing the specific comment on screen, which immediately creates engagement and curiosity"
    weight: 0.25
    description: "Reply-to-comment format executed well"
  - type: llm_judge
    criteria: "The response builds trust rather than defending the brand — viewers who see this would trust this creator MORE because they're willing to say 'this product isn't for everyone'"
    weight: 0.25
    description: "Response builds creator trust"
