meta:
  id: shadowban-recovery
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Create content strategy to recover from Instagram shadowban"
  tags: [ugc, shadowban, recovery, algorithm-penalty]

state: {}

trigger: |
  A supplement brand "Ritual" ($36/month multivitamin) had their Instagram Reels
  reach drop 95% overnight — likely a shadowban after using the word "cure" in a
  previous post (Instagram flags health claims).

  Write:
  1. An analysis of what likely triggered the shadowban and recovery steps
  2. A "safe" 60-second Instagram Reels UGC script that avoids all trigger words
     while still effectively promoting the multivitamin
  3. A list of words/phrases the brand should avoid in future Reels

  The script must rebuild trust with the algorithm while maintaining promotional effectiveness.

assertions:
  - type: llm_judge
    criteria: "The shadowban analysis is technically accurate — correctly identifies health claim violations, explains Instagram's automated moderation, and provides actionable recovery steps (wait period, content audit, hashtag cleanup)"
    weight: 0.25
    description: "Accurate shadowban diagnosis and recovery steps"
  - type: llm_judge
    criteria: "The safe script avoids ALL health claim trigger words (cure, treat, heal, prevent, fix, remedy) while still effectively communicating the product's benefits through experiential language"
    weight: 0.25
    description: "Avoids trigger words while staying effective"
  - type: llm_judge
    criteria: "The word/phrase avoidance list is comprehensive and specific to supplement marketing on Instagram — not just obvious medical terms but also subtle triggers the algorithm flags"
    weight: 0.25
    description: "Comprehensive trigger word avoidance list"
  - type: llm_judge
    criteria: "The overall strategy shows understanding of how to rebuild algorithmic trust — starts with low-risk content, gradually tests boundaries, monitors reach metrics"
    weight: 0.25
    description: "Smart algorithmic trust rebuilding strategy"
