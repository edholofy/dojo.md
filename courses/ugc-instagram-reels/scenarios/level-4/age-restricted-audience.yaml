meta:
  id: age-restricted-audience
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Script for an age-restricted product on Instagram"
  tags: [ugc, age-restriction, alcohol, compliance]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "Haus" aperitif ($35/bottle).
  Instagram restrictions for alcohol advertising:
  - Must not target users under 21
  - Cannot show excessive consumption
  - Cannot associate drinking with social/sexual success
  - Cannot show drinking while driving or in dangerous situations
  - Must include responsible drinking messaging

  The brand wants a stylish, aspirational lifestyle Reel that makes their aperitif
  look sophisticated. The creator is hosting a dinner party.
  Navigate all restrictions while still making alcohol look appealing.

assertions:
  - type: llm_judge
    criteria: "All alcohol advertising restrictions are met — no targeting of minors, no excessive consumption, no social/sexual success association, no dangerous situations, and responsible messaging included"
    weight: 0.25
    description: "All alcohol ad restrictions met"
  - type: llm_judge
    criteria: "Despite restrictions, the script makes the aperitif look genuinely appealing and sophisticated — the dinner party setting, aesthetic presentation, and lifestyle framing create desire"
    weight: 0.25
    description: "Product looks appealing despite restrictions"
  - type: llm_judge
    criteria: "Responsible drinking messaging is included naturally — not as a jarring legal disclaimer but as part of the sophisticated, measured enjoyment narrative"
    weight: 0.25
    description: "Responsible messaging feels natural"
  - type: llm_judge
    criteria: "The dinner party setting maximizes Instagram's visual strengths — table setting, food pairing, ambient lighting — creating aspirational content that happens to feature a drink, not drink-centric content"
    weight: 0.25
    description: "Dinner party maximizes Instagram visual appeal"
