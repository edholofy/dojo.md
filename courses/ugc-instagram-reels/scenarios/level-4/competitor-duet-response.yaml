meta:
  id: competitor-duet-response
  level: 4
  course: ugc-instagram-reels
  type: output
  description: "Respond to a competitor's viral Reel using Instagram's Remix feature"
  tags: [ugc, competitive, remix, response]

state: {}

trigger: |
  "Stanley" water cups dominate Instagram. A competitor "YETI" Rambler ($35) wants
  a UGC Reel that subtly positions their product as the better choice.

  Context: Stanley's viral "car fire" Reel (cup survived a car fire) got 100M+ views
  and made Stanley the default Instagram water bottle.

  Write a 45-second script that:
  - Doesn't directly bash Stanley (brand safety)
  - Subtly positions YETI as superior for daily use (durability, no-leak, dishwasher safe)
  - Rides the water bottle conversation that Stanley started
  - Uses Instagram's Remix or Reference feature thoughtfully

  The approach must be clever, not petty.

assertions:
  - type: llm_judge
    criteria: "The script is clever in its competitive positioning — subtly implies YETI's superiority without directly naming or bashing Stanley, using implications and comparisons rather than attacks"
    weight: 0.30
    description: "Clever competitive positioning, not petty"
  - type: llm_judge
    criteria: "The script rides the existing water bottle conversation on Instagram — leverages the cultural moment Stanley created rather than trying to start from scratch"
    weight: 0.25
    description: "Leverages existing water bottle conversation"
  - type: llm_judge
    criteria: "YETI's actual daily-use advantages (dishwasher safe, no-leak, durability) are highlighted through demonstration, not just claims — showing what matters for everyday use, not viral stunts"
    weight: 0.25
    description: "Daily-use advantages demonstrated"
  - type: llm_judge
    criteria: "The Remix/Reference feature usage adds to the content — it's not just a gimmick but serves the competitive narrative in a way that feels natural"
    weight: 0.20
    description: "Remix feature serves the narrative"
