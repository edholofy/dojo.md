meta:
  id: ar-filter-integration
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Script integrating Instagram's AR effects and interactive features"
  tags: [ugc, ar-effects, interactive, advanced-features]

state: {}

trigger: |
  Write a 45-second Instagram Reels UGC script for "MAC Cosmetics" lipstick ($22)
  that integrates Instagram's AR try-on filter. MAC has a custom AR filter that
  lets viewers virtually try on lipstick shades through their camera.

  The script must:
  - Demonstrate the AR filter in action (the creator uses it, then shows real application)
  - Compare AR preview vs. real-life application (building trust in the filter accuracy)
  - Include a CTA that drives viewers to try the filter themselves
  - Bridge the gap between digital try-on and actual purchase

  This is cutting-edge Instagram commerce — AR-enabled UGC.

assertions:
  - type: llm_judge
    criteria: "The AR filter demonstration is integrated naturally into the script — showing the virtual try-on followed by real application creates a compelling comparison that builds trust in digital commerce"
    weight: 0.30
    description: "AR filter demonstration integrated naturally"
  - type: llm_judge
    criteria: "The AR-to-real comparison is the script's key moment — the reveal that the filter accurately matches the real shade creates a satisfying, trust-building payoff"
    weight: 0.25
    description: "AR vs real comparison is satisfying payoff"
  - type: llm_judge
    criteria: "The CTA drives viewers to try the filter themselves — creating an interactive experience that extends engagement beyond just watching the Reel"
    weight: 0.25
    description: "CTA drives filter try-on interaction"
  - type: llm_judge
    criteria: "The script bridges digital and physical commerce — moves viewers from watching → trying the AR filter → wanting to buy the actual product, creating a complete funnel within Instagram"
    weight: 0.20
    description: "Bridges digital try-on to purchase intent"
