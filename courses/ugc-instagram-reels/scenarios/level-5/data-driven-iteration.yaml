meta:
  id: data-driven-iteration
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Iterate on a Reel script based on performance data from the first version"
  tags: [ugc, data-driven, iteration, analytics]

state: {}

trigger: |
  A UGC Reel for "Mejuri" gold necklace ($98) posted last week. Here's the performance data:

  Metrics:
  - Reach: 45,000 (good for account size)
  - Watch-through rate: 23% (below 40% benchmark — most dropped at 8-second mark)
  - Save rate: 1.2% (below 3% benchmark)
  - DM shares: 89 (below 200 benchmark for this reach)
  - Comments: 312 (above 150 benchmark — good!)
  - Comment sentiment: 68% positive, 22% asking "what necklace is this?", 10% negative
  - Average watch time: 12 seconds of 45-second Reel

  Original script hook: "POV: you treat yourself to that necklace you've been eyeing"
  Original body: slow lifestyle montage with soft music
  Original CTA: "Link in bio for the prettiest gold jewelry you'll ever own"

  Diagnose what went wrong and write an improved V2 script that fixes the specific
  data-identified issues while keeping what worked (comments).

assertions:
  - type: llm_judge
    criteria: "The diagnosis correctly identifies the 8-second drop-off as the key problem — the slow lifestyle montage loses viewers after the hook, and the script needs more dynamic pacing or value delivery in seconds 5-15"
    weight: 0.25
    description: "Correctly diagnoses 8-second drop-off cause"
  - type: llm_judge
    criteria: "The V2 script specifically addresses the low save rate (adds save-worthy element like styling tips), low DM shares (adds shareable/relatable moment), and low watch-through (faster pacing, more hooks throughout)"
    weight: 0.30
    description: "V2 addresses each underperforming metric"
  - type: llm_judge
    criteria: "The comment success is preserved or enhanced — since the original generated good engagement, the V2 keeps elements that drove comments while fixing the other metrics"
    weight: 0.20
    description: "Preserves comment success from V1"
  - type: llm_judge
    criteria: "The 22% 'what necklace is this?' comments are addressed — the V2 makes product identification easier (clearer product shots, name mention, product tag reference) to reduce friction"
    weight: 0.25
    description: "Addresses product identification friction"
