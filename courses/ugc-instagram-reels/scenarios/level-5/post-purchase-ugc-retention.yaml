meta:
  id: post-purchase-ugc-retention
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Design UGC that targets existing customers for retention, not acquisition"
  tags: [ugc, retention, post-purchase, loyalty]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Nespresso" Vertuo machine ($199).
  But this is NOT an acquisition Reel — it targets EXISTING Nespresso owners.

  The goal is retention and upsell:
  - Remind current owners why they love their machine (prevent buyer's remorse)
  - Introduce new seasonal capsule flavors (upsell)
  - Create community feeling among Nespresso owners
  - Encourage user-generated responses (other owners sharing their setups)

  Most UGC is designed for new customer acquisition. Designing for retention
  requires fundamentally different psychology and messaging.

  Include a note on how retention UGC differs from acquisition UGC.

assertions:
  - type: llm_judge
    criteria: "The note clearly articulates how retention UGC differs from acquisition UGC — different psychology (reinforcement vs. persuasion), different CTAs (explore vs. buy), different emotional targets (belonging vs. desire)"
    weight: 0.25
    description: "Clear retention vs acquisition UGC distinction"
  - type: llm_judge
    criteria: "The script speaks to existing owners — uses insider language, shared experiences, and community references that make current Nespresso owners feel seen and validated"
    weight: 0.25
    description: "Speaks to existing owners as community"
  - type: llm_judge
    criteria: "The seasonal capsule upsell is natural — positioned as an exciting discovery for the community rather than a hard sell, making existing owners want to try new flavors"
    weight: 0.25
    description: "Natural upsell through community excitement"
  - type: llm_judge
    criteria: "The script encourages user-generated responses — includes elements that would inspire other Nespresso owners to share their own setups, creating a community content flywheel"
    weight: 0.25
    description: "Inspires community content responses"
