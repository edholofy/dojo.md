meta:
  id: legal-ip-music-issues
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Navigate music licensing and IP issues for branded Instagram Reels"
  tags: [ugc, music-licensing, ip, legal]

state: {}

trigger: |
  A brand wants a UGC Reel for "Sonos" speakers ($449) featuring the creator
  blasting music. The script must address these legal complexities:

  1. Instagram's music library is licensed for personal use — business accounts
     have restricted access to many songs
  2. If this UGC is later whitelisted as a paid ad, the music licensing changes
  3. Popular songs used in organic Reels may get muted or blocked in certain countries
  4. The brand wants the creator to feature a recognizable song to show sound quality

  Write:
  1. A legal/strategy note explaining the music licensing landscape
  2. A 60-second script with three music strategy options:
     a. Using Instagram's business-licensed library
     b. Using royalty-free music
     c. Using original audio/sound design

assertions:
  - type: llm_judge
    criteria: "The legal note accurately explains Instagram's music licensing tiers — personal vs business accounts, organic vs paid ad licensing, geographic restrictions, and the risks of using popular songs in branded content"
    weight: 0.25
    description: "Accurate music licensing explanation"
  - type: llm_judge
    criteria: "Three distinct music strategy scripts are provided, each with clear trade-offs — business library (safe but limited), royalty-free (flexible but less recognizable), original audio (unique but no musical hook)"
    weight: 0.25
    description: "Three strategies with clear trade-offs"
  - type: llm_judge
    criteria: "The recommended strategy for this specific use case (speaker brand that needs to showcase sound quality) is clearly identified with reasoning — not all three presented equally but one recommended for Sonos's specific needs"
    weight: 0.25
    description: "Clear recommendation for speaker brand use case"
  - type: llm_judge
    criteria: "The scripts work without relying on a specific song — the sound quality demonstration comes through the visual/narrative experience rather than depending on recognizable music"
    weight: 0.25
    description: "Sound quality shown without depending on specific songs"
