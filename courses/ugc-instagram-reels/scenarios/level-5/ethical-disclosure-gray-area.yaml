meta:
  id: ethical-disclosure-gray-area
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Navigate ethical gray areas in UGC disclosure and gifted product content"
  tags: [ugc, ethics, disclosure, gifted-product, gray-area]

state: {}

trigger: |
  A creator received "Tatcha" Dewy Skin Cream ($69) as a PR gift (not a paid partnership).
  The brand did NOT ask for a post or provide a brief. The creator genuinely loves
  it and wants to make an Instagram Reel.

  The ethical gray areas:
  1. FTC says gifted products should be disclosed, but enforcement is unclear
  2. "#gifted" looks different than "#ad" to viewers (less trust impact)
  3. The creator genuinely loves the product (it's not fake enthusiasm)
  4. Other creators in the niche don't disclose gifted products (competitive pressure)
  5. Over-disclosing could make the creator look like every post is sponsored

  Write:
  1. An ethical analysis of the disclosure obligations and best practices
  2. A 45-second script with your recommended disclosure approach
  3. Explain how to maintain authenticity while being transparent

assertions:
  - type: llm_judge
    criteria: "The ethical analysis is thorough and nuanced — acknowledges the gray areas honestly rather than giving a simplistic answer. Covers FTC guidelines, industry norms, viewer trust, and competitive dynamics"
    weight: 0.25
    description: "Thorough ethical analysis of gray areas"
  - type: llm_judge
    criteria: "The recommended disclosure approach is clearly stated and justified — takes a position rather than just listing options, and the reasoning considers both legal protection and audience trust"
    weight: 0.25
    description: "Clear disclosure recommendation with justification"
  - type: llm_judge
    criteria: "The script integrates disclosure smoothly — whether through #gifted, a verbal mention, or text overlay, the disclosure doesn't undermine the genuine enthusiasm"
    weight: 0.25
    description: "Disclosure integrated without undermining enthusiasm"
  - type: llm_judge
    criteria: "The approach to maintaining authenticity is practical — shows how to be transparent about a gifted product while keeping the content feel genuine and trustworthy"
    weight: 0.25
    description: "Practical approach to authenticity with transparency"
