meta:
  id: rights-and-licensing
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Navigate UGC content rights and licensing for Instagram"
  tags: [ugc, rights, licensing, legal, advanced]

state: {}

trigger: |
  A creator shot UGC content for "Glossier" Balm Dotcom ($14). The original
  agreement was for one organic Instagram Reel post. Now Glossier wants to:
  1. Whilelist the Reel as a paid ad (additional usage)
  2. Feature it on their website (different platform)
  3. Use it in email marketing (different medium)
  4. Edit it into a shorter version for Stories (derivative work)

  Write:
  1. A response explaining to the brand what additional licensing they need
  2. A fair pricing framework for each additional usage right
  3. A UGC script that's designed from the start to work across all four use cases
     (organic post, paid ad, website embed, email thumbnail + Stories cut)

assertions:
  - type: llm_judge
    criteria: "The licensing explanation is accurate and professional — correctly identifies that each additional use (paid ads, website, email, derivative cuts) requires separate rights beyond the original organic posting agreement"
    weight: 0.25
    description: "Accurate licensing explanation for each usage"
  - type: llm_judge
    criteria: "The pricing framework is fair and industry-standard — provides reasonable rates or multipliers for each additional usage right that reflect the current UGC market"
    weight: 0.20
    description: "Fair, industry-standard pricing framework"
  - type: llm_judge
    criteria: "The multi-use script is genuinely versatile — works as an organic Reel, can be whitelisted as an ad, embeds well on a website, and has a natural cut point for a shorter Stories version"
    weight: 0.30
    description: "Script genuinely works across all four use cases"
  - type: llm_judge
    criteria: "The response demonstrates expertise in the business side of UGC — not just creative skills but understanding of content licensing, creator economics, and brand-creator relationships"
    weight: 0.25
    description: "Demonstrates UGC business expertise"
