meta:
  id: fake-ugc-detection
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Identify and fix a UGC script that would be detected as inauthentic"
  tags: [ugc, authenticity, detection, expert-critique]

state: {}

trigger: |
  Review this Instagram Reels UGC script for "Drunk Elephant" Protini moisturizer ($68)
  and identify everything that would make viewers detect it as a paid ad disguised as UGC:

  "[CREATOR smiling at camera, perfect lighting]
  OMG you guys!! So I just discovered this AMAZING moisturizer and I am OBSESSED!
  It's called Drunk Elephant Protini and it has literally changed my skin in just
  ONE week! My skin has never looked this good! The peptides and amino acids make
  your skin SO soft and plump. I use it every morning and night and the results are
  INCREDIBLE! Plus it's only $68 which is actually such a good deal for what you get!
  You NEED to try this! Link in my bio! Trust me you won't regret it!!"

  Write:
  1. A detailed critique identifying every inauthenticity marker
  2. A rewritten 45-second version that passes the authenticity test

assertions:
  - type: llm_judge
    criteria: "The critique identifies specific inauthenticity markers: excessive enthusiasm (OMG, AMAZING, OBSESSED, INCREDIBLE), unrealistic timeline (changed skin in ONE week), perfect lighting setup, feature listing (peptides, amino acids), and price justification that sounds scripted"
    weight: 0.25
    description: "Identifies specific inauthenticity markers"
  - type: llm_judge
    criteria: "The critique goes beyond surface-level issues to explain WHY each element triggers viewer skepticism — connects to audience psychology and pattern recognition for sponsored content"
    weight: 0.20
    description: "Explains why each element triggers skepticism"
  - type: llm_judge
    criteria: "The rewritten version addresses every identified issue — the same product is promoted with genuine enthusiasm, realistic claims, natural language, and authentic imperfection"
    weight: 0.30
    description: "Rewrite addresses every identified issue"
  - type: llm_judge
    criteria: "The rewritten version is MORE persuasive than the original despite being less overtly enthusiastic — demonstrating that authenticity sells better than hype"
    weight: 0.25
    description: "Rewrite more persuasive through authenticity"
