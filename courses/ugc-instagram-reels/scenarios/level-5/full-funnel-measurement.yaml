meta:
  id: full-funnel-measurement
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Design a Reel with built-in measurement framework for ROI tracking"
  tags: [ugc, measurement, roi, analytics, advanced]

state: {}

trigger: |
  Write a 60-second Instagram Reels UGC script for "Away" carry-on suitcase ($275)
  AND provide a complete measurement framework.

  The brand needs to prove UGC ROI to their CFO. The script must include:
  1. Trackable elements (unique discount code, UTM-tagged link, specific CTA phrases)
  2. Defined success metrics with benchmarks for each funnel stage:
     - Awareness: reach, impressions, new profile visits
     - Consideration: saves, shares, link clicks, add-to-carts
     - Conversion: purchases attributed, revenue, ROAS
  3. A/B test recommendations (what to test in V2)
  4. Attribution window and methodology recommendation

  The script itself should be a genuinely great Reel — not just a tracking vessel.

assertions:
  - type: llm_judge
    criteria: "The measurement framework is comprehensive and professional — covers all three funnel stages with specific metrics, benchmarks, and realistic targets that would satisfy a CFO"
    weight: 0.25
    description: "Comprehensive measurement framework"
  - type: llm_judge
    criteria: "Trackable elements (discount code, UTM parameters, unique CTA phrases) are built into the script naturally — they serve both measurement and creative purposes"
    weight: 0.25
    description: "Trackable elements built in naturally"
  - type: llm_judge
    criteria: "A/B test recommendations are specific and actionable — identify exact variables to test (hook variations, CTA types, creator demographics) with hypotheses for each"
    weight: 0.20
    description: "Specific, actionable A/B test recommendations"
  - type: llm_judge
    criteria: "Despite the heavy measurement focus, the script itself is a genuinely compelling, creative Reel — the tracking infrastructure is invisible to viewers"
    weight: 0.30
    description: "Great creative despite measurement focus"
