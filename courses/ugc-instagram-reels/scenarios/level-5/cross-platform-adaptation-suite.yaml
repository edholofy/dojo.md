meta:
  id: cross-platform-adaptation-suite
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Adapt one core concept into platform-specific scripts for Instagram, TikTok, and YouTube Shorts"
  tags: [ugc, cross-platform, adaptation, multi-platform]

state: {}

trigger: |
  Write a core UGC concept for "Dyson V15" cordless vacuum ($749), then adapt it
  into three platform-specific scripts:

  1. Instagram Reels version (60 seconds) — more polished, aesthetic, save-worthy
  2. TikTok version (30 seconds) — raw, fast, conversational, trend-aware
  3. YouTube Shorts version (45 seconds) — slightly more informative, search-optimized

  Each version must:
  - Share the same core message/value proposition
  - Be adapted for each platform's unique audience, format, and algorithm
  - Feel native to each platform (not a one-size-fits-all repost)
  - Include platform-specific CTA appropriate to each ecosystem

assertions:
  - type: llm_judge
    criteria: "All three versions share a clear core message but feel genuinely native to each platform — a viewer on any single platform wouldn't know it was adapted from elsewhere"
    weight: 0.25
    description: "Same core message, platform-native execution"
  - type: llm_judge
    criteria: "The Instagram version leverages IG-specific strengths (aesthetic visuals, shoppable tags, save-worthy content, DM-shareable) while the TikTok version leverages TT strengths (raw energy, trends, conversational) and YouTube Shorts leverages YT strengths (searchability, informational depth)"
    weight: 0.30
    description: "Each version leverages platform-specific strengths"
  - type: llm_judge
    criteria: "The platform-specific CTAs are correct — Instagram (product tags, bio link), TikTok (comment for link, bio), YouTube Shorts (channel subscribe, description link)"
    weight: 0.20
    description: "Platform-appropriate CTAs"
  - type: llm_judge
    criteria: "The $749 premium price is handled appropriately for each platform's audience — Instagram's more affluent audience vs TikTok's price-conscious audience vs YouTube's research-oriented audience"
    weight: 0.25
    description: "Price handled for each platform's audience"
