meta:
  id: creator-economy-negotiation
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Navigate a complex UGC brief with conflicting stakeholder requirements"
  tags: [ugc, negotiation, stakeholders, complexity]

state: {}

trigger: |
  You're writing a 60-second Instagram Reels UGC script for "Peloton" bike ($1,445).
  You've received conflicting feedback from three brand stakeholders:

  Marketing VP: "Make it aspirational. Show the lifestyle transformation. We need
  to justify the premium price."

  Social Media Manager: "Make it relatable and funny. Our audience is tired of
  aspirational fitness content. Humor performs 3x better for us."

  Legal/Compliance: "Cannot claim weight loss, cannot show before/after bodies,
  must include 'results may vary,' cannot show the bike in use by anyone under 18."

  Write:
  1. A stakeholder alignment note explaining how you'll satisfy all three
  2. A script that genuinely balances aspiration, humor, and compliance
  3. Explain which stakeholder's vision you weighted most and why

assertions:
  - type: llm_judge
    criteria: "The stakeholder alignment note is strategic and diplomatic — shows how the final script addresses each stakeholder's core need without dismissing anyone's input"
    weight: 0.25
    description: "Strategic stakeholder alignment"
  - type: llm_judge
    criteria: "The script genuinely balances all three requirements — aspirational elements, genuine humor, and full compliance coexist rather than one dominating"
    weight: 0.30
    description: "All three requirements genuinely balanced"
  - type: llm_judge
    criteria: "The weighting rationale is well-reasoned — explains why one vision got prioritized based on audience data, platform dynamics, or strategic advantage, not just personal preference"
    weight: 0.25
    description: "Weighting rationale well-reasoned"
  - type: llm_judge
    criteria: "All compliance requirements are met while being invisible — 'results may vary' is present, no under-18 usage shown, no body before/afters, no weight loss claims"
    weight: 0.20
    description: "Compliance requirements met invisibly"
