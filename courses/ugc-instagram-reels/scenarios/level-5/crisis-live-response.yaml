meta:
  id: crisis-live-response
  level: 5
  course: ugc-instagram-reels
  type: output
  description: "Script a real-time Reel response during an active brand crisis"
  tags: [ugc, crisis, real-time, high-stakes]

state: {}

trigger: |
  "Skims" (Kim Kardashian's shapewear brand) is in an active Instagram crisis.
  A viral Reel (8M views) from yesterday shows multiple customers receiving products
  with visible quality defects (loose threads, wrong sizes, stained items).
  The comment section is furious. #SkimsScam is trending.

  Skims' Instagram team needs a Reel response posted within 4 hours.
  This is NOT a UGC creator script — this is the brand's OWN Reel.

  Write a 60-second crisis response Reel script that:
  - Acknowledges the specific issues (quality defects) immediately
  - Provides concrete remediation (refunds, replacements, quality review)
  - Comes from a human at the company (not a faceless brand)
  - Could actually turn the tide on the #SkimsScam narrative
  - Includes recommended pinned comment strategy

assertions:
  - type: llm_judge
    criteria: "The response is immediate and specific — acknowledges quality defects directly, doesn't deflect or minimize, and shows the brand saw and takes the viral video seriously"
    weight: 0.25
    description: "Immediate, specific acknowledgment"
  - type: llm_judge
    criteria: "Concrete remediation is offered — specific actions (full refund process, expedited replacements, quality review measures, contact method) not vague promises"
    weight: 0.25
    description: "Concrete remediation actions"
  - type: llm_judge
    criteria: "The human element is strong — whoever is on camera (team member, QC lead, or executive) feels genuine, not reading a lawyer-approved script. The vulnerability is appropriate for the platform"
    weight: 0.25
    description: "Genuine human delivery"
  - type: llm_judge
    criteria: "The pinned comment strategy is smart — addresses the most common concerns proactively and provides direct action links, turning the comment section from a complaint board to a resolution hub"
    weight: 0.25
    description: "Smart pinned comment strategy"
