meta:
  id: cross-border-expense-compliance
  level: 3
  course: expense-report-categorization
  type: output
  description: "Navigate cross-border expense compliance — handle VAT reclaim, permanent establishment risk, transfer pricing implications, and multi-jurisdiction tax treatment of business expenses"
  tags: [cross-border, vat-reclaim, transfer-pricing, advanced]

state: {}

trigger: |
  A US-headquartered technology company has
  employees traveling extensively between its
  offices in the US, UK, Germany, and Singapore.
  Process the following cross-border expense
  compliance issues.

  ISSUE 1 — VAT RECLAIM OPTIMIZATION
  The company spent €2.3M on business expenses in
  EU countries in 2024 but only reclaimed €45,000
  in VAT. The finance team suspects significant
  unclaimed VAT. Analyze the following expense
  categories for VAT reclaim eligibility:

  Category          | Annual Spend | Current VAT Claimed
  ------------------|--------------|--------------------
  Hotels (EU)       | €680,000     | €22,000
  Meals (EU)        | €340,000     | €8,500
  Ground transport  | €180,000     | €6,500
  Conference fees   | €290,000     | €5,000
  Office supplies   | €85,000      | €3,000
  Telecom           | €45,000      | €0
  Fuel              | €120,000     | €0
  Professional svcs | €560,000     | €0

  Key VAT rates:
  - Germany: 19% standard, 7% reduced
  - France: 20% standard, 10% intermediate
  - UK: 20% standard (post-Brexit, different
    reclaim process)
  - Netherlands: 21% standard

  ISSUE 2 — PERMANENT ESTABLISHMENT RISK
  A US-based sales director has spent 145 days in
  the UK office in the past 12 months, generating
  £2.1M in UK client revenue. His expenses in the
  UK total £87,000. Assess the PE risk and expense
  treatment implications.

  ISSUE 3 — TRANSFER PRICING FOR SHARED SERVICES
  The Singapore office provides AP processing for
  all APAC entities (Japan, Australia, India). The
  shared services costs (including expense
  processing labor) need to be allocated. Total
  Singapore shared services cost: SGD 1.2M/year.
  Transaction volumes: Japan 45%, Australia 30%,
  India 25%.

  Prepare:
  1. VAT reclaim analysis with recovery estimate
  2. PE risk assessment and mitigation plan
  3. Transfer pricing allocation methodology
  4. Cross-border expense policy recommendations

assertions:
  - type: llm_judge
    criteria: "VAT reclaim analysis identifies significant recovery opportunity — hotels in Germany: 19% VAT but some countries restrict hotel VAT reclaim (France limits to specific conditions, Germany allows full recovery for business travel); meals: generally limited or excluded from VAT reclaim in most EU countries (France 0% reclaimable, Germany partially); conference fees: fully reclaimable in most countries at standard rate; professional services: significant missed opportunity — €560,000 at 19-21% VAT could yield €90-100K+ in reclaims; telecom and fuel also reclaimable in most jurisdictions; the analysis estimates total potential VAT reclaim vs. current €45,000 claimed — likely €200-350K recoverable annually; post-Brexit UK requires a different reclaim process (13th Directive for non-EU companies); recommends engaging a VAT reclaim specialist (Meridian, VAT IT, etc.) for implementation."
    weight: 0.35
    description: "VATReclaimAnalysis"
  - type: llm_judge
    criteria: "PE risk assessment is thorough — 145 days in the UK exceeds the typical 183-day safe harbor under many tax treaties but the US-UK treaty has specific provisions; the sales director's activities (generating £2.1M revenue) create PE risk because he may be 'concluding contracts' in the UK (OECD Article 5 criteria); if PE is established: the company would need to register for UK corporation tax, allocate profits to the UK PE, and treat UK expenses differently; the £87,000 in UK expenses would become PE-attributable costs rather than HQ costs; mitigation strategies include: reducing days below treaty threshold, ensuring contracts are formally concluded in the US, restructuring the role to avoid 'dependent agent' PE; the assessment considers both the tax treaty and UK domestic law; recommends immediate engagement with UK tax advisors; quantifies the potential tax exposure if PE is found."
    weight: 0.35
    description: "PERiskAssessment"
  - type: llm_judge
    criteria: "Transfer pricing methodology is defensible — the Singapore shared services allocation uses a recognized OECD method (cost-plus, TNMM, or CUP); the allocation keys (transaction volume 45/30/25) are documented and supportable; a markup of 5-10% on costs is applied per arm's length principle; the annual intercompany charges are calculated: Japan SGD 567K (45% × 1.2M + markup), Australia SGD 378K, India SGD 315K (approximately); documentation requirements include: transfer pricing master file, local files for each entity, benchmarking study; the expense processing allocation is integrated into the broader shared services agreement; the policy recommendations address: consistent GL coding across countries, standardized receipt requirements meeting all jurisdictions' tax documentation standards, centralized vs. local expense processing trade-offs, and currency of record policies."
    weight: 0.30
    description: "TransferPricingAllocation"
