meta:
  id: expense-policy-redesign
  level: 3
  course: expense-report-categorization
  type: output
  description: "Redesign corporate expense policy for a modern workforce — balance control objectives with employee experience, remote work realities, and competitive talent market"
  tags: [policy-redesign, modern-workforce, remote-work, advanced]

state: {}

trigger: |
  A technology company (2,000 employees, 60%
  remote) needs to completely redesign its expense
  policy. The current policy was written in 2018
  for a fully in-office workforce and doesn't
  address modern work arrangements.

  CURRENT ISSUES:
  - Policy doesn't cover home office expenses
  - No guidance for coworking space costs
  - Meal policies assume in-office lunches
  - Conference policies don't address virtual events
  - No guidance for digital subscriptions/tools
  - Travel policy assumes hub-to-hub travel, not
    distributed-to-anywhere
  - Employee satisfaction with expense process: 3.1/10
  - 45% of employees report avoiding legitimate
    expenses because the process is too cumbersome
  - Average reimbursement time: 18 days

  WORKFORCE COMPOSITION:
  - 40% in-office (SF and NYC hubs)
  - 35% fully remote (across 28 states)
  - 25% hybrid (2-3 days in office)
  - 15% international (5 countries)
  - Average age: 34 (tech workforce expectations)

  COMPETITIVE INTELLIGENCE:
  - Competitor A: $200/month home office stipend
  - Competitor B: Unlimited expense policy (trust-
    based) with post-audit
  - Competitor C: $5,000 annual professional
    development budget (self-directed)
  - Industry trend: moving toward stipends over
    reimbursements for recurring costs

  BUDGET CONSTRAINTS:
  - Current T&E budget: $8.2M annually
  - Approved increase for new policy: up to $9.5M
    (16% increase)
  - Must maintain SOX compliance controls

  Redesign the complete expense policy including:
  1. Updated expense categories and limits
  2. Remote/hybrid-specific provisions
  3. Stipend vs. reimbursement framework
  4. Simplified approval workflow
  5. Technology and tooling recommendations
  6. Employee experience improvements

assertions:
  - type: llm_judge
    criteria: "Policy redesign addresses modern work realities — creates new expense categories: (1) Home office setup allowance (one-time $1,000-$1,500 for desk, chair, monitor), (2) Monthly home office stipend ($100-$200 for internet, utilities, supplies), (3) Coworking space allowance (covers day passes or monthly membership), (4) Virtual event registration (separate from in-person conference budget), (5) Digital tools and subscriptions (pre-approved list with self-service procurement), (6) Team gathering travel (quarterly in-person meetups for remote teams); the policy distinguishes between in-office, hybrid, and remote employee entitlements; meal policies are updated: remote employees get a per diem equivalent for 'team days' when traveling to an office; the travel policy is rewritten for distributed teams (home to any work location, not hub-to-hub)."
    weight: 0.35
    description: "ModernPolicyDesign"
  - type: llm_judge
    criteria: "Stipend vs. reimbursement framework is well-designed — identifies which expenses should be stipends (recurring, predictable: home office, internet, phone) vs. reimbursements (variable, one-time: travel, client meals, conferences); stipends simplify processing (no receipts, auto-paid monthly, taxable as income but offset by tax deductions for some expenses); the framework considers tax implications: stipends are W-2 income, reimbursements under an accountable plan are tax-free; budget impact analysis shows: stipend costs are predictable ($200/month × 700 remote employees = $168K/month), while reimbursement savings from simplified processing offset administration costs; the total budget fits within the $9.5M approved amount; SOX compliance is maintained through: automated controls, post-audit sampling, and simplified but documented approval trails."
    weight: 0.35
    description: "StipendFramework"
  - type: llm_judge
    criteria: "Employee experience improvements are measurable — targets reducing expense satisfaction from 3.1/10 to 7+/10; addresses the 45% avoidance rate by: (1) Simplifying submission (mobile-first, receipt photo capture, auto-categorization), (2) Reducing approval steps (auto-approve under $250 with policy compliance), (3) Faster reimbursement (target 3-5 days vs. current 18 days, consider same-day for under $100), (4) Per diem options (flat rate vs. actuals for meals during travel), (5) Pre-approved spending (employee-selected tools under $50/month), (6) Transparent status tracking (real-time visibility into where report is in approval); the technology recommendations include: expense management platform with mobile app, corporate card with auto-expense creation, integrated receipt scanning, and Slack/Teams integration for approvals; success metrics defined: satisfaction score, submission rate, processing time, policy compliance rate."
    weight: 0.30
    description: "EmployeeExperience"
