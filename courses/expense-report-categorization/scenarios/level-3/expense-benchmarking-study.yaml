meta:
  id: expense-benchmarking-study
  level: 3
  course: expense-report-categorization
  type: output
  description: "Conduct an expense management benchmarking study — compare company metrics against industry peers, identify improvement opportunities, and develop action plans"
  tags: [benchmarking, industry-comparison, best-practices, advanced]

state: {}

trigger: |
  The CFO has requested a comprehensive
  benchmarking study comparing the company's
  expense management performance against industry
  peers. Prepare the analysis.

  COMPANY PROFILE:
  - Industry: Enterprise SaaS
  - Revenue: $450M
  - Employees: 2,800
  - Annual T&E spend: $28.4M
  - T&E as % of revenue: 6.3%
  - Cost per expense report processed: $58
  - Average reports per employee per month: 1.8
  - Processing time (submission to payment): 14 days
  - Policy violation rate: 22%
  - Audit finding rate: 3.2%
  - Manual data entry rate: 65%
  - Mobile submission rate: 25%
  - Corporate card adoption: 45%
  - Reimbursement via direct deposit: 78%

  INDUSTRY BENCHMARKS (Enterprise SaaS, $200-500M):
  - T&E as % of revenue: median 4.8%, top quartile 3.5%
  - Cost per report: median $42, top quartile $28
  - Processing time: median 8 days, top quartile 4 days
  - Policy violation rate: median 15%, top quartile 8%
  - Audit finding rate: median 2.1%, top quartile 0.8%
  - Manual data entry: median 40%, top quartile 15%
  - Mobile submission: median 55%, top quartile 75%
  - Corporate card adoption: median 65%, top quartile 85%
  - Direct deposit: median 92%, top quartile 99%

  PEER COMPANIES (anonymized):
  Company | Revenue | T&E Spend | T&E % | Cost/Report
  --------|---------|-----------|-------|------------
  Peer A  | $380M   | $16.7M    | 4.4%  | $32
  Peer B  | $520M   | $33.3M    | 6.4%  | $45
  Peer C  | $410M   | $18.0M    | 4.4%  | $38
  Peer D  | $290M   | $15.7M    | 5.4%  | $52
  Peer E  | $470M   | $18.8M    | 4.0%  | $29

  Create:
  1. Gap analysis against benchmarks
  2. Root cause assessment for underperformance
  3. Improvement roadmap with projected savings
  4. Quick wins vs. strategic initiatives
  5. Business case for investment

assertions:
  - type: llm_judge
    criteria: "Gap analysis is thorough and quantifies each gap — identifies that the company underperforms on nearly every metric: T&E as % of revenue (6.3% vs. 4.8% median — 31% above median); cost per report ($58 vs. $42 median — 38% above); processing time (14 days vs. 8 median — 75% above); policy violations (22% vs. 15% median — 47% above); manual data entry (65% vs. 40% median); mobile submission (25% vs. 55% median); corporate card adoption (45% vs. 65% median); the gap analysis calculates dollar impact: reducing T&E to median would save $6.76M annually ($28.4M - $21.6M); reducing cost per report to median saves $124K annually (6,500 reports/month × 12 × $16 savings); each gap is ranked by potential savings and difficulty to close; the company's two relative strengths (if any) are also noted."
    weight: 0.35
    description: "GapAnalysis"
  - type: llm_judge
    criteria: "Root cause assessment connects underperformance to specific operational issues — high T&E % driven by: excessive travel (1.8 reports/employee/month is high — suggests over-travel or could include non-travel expenses), lack of pre-trip approval for travel bookings, no preferred vendor program for hotels/airlines; high cost per report driven by: 65% manual data entry (industry has moved to OCR/auto-entry), low mobile adoption (25% — employees submit paper-heavy reports), manual approval workflows; high policy violations driven by: insufficient training (especially for new hires), unclear policy language, no pre-submission compliance checks; low corporate card adoption (45% vs. 65%) causes more manual receipts and slower reconciliation; the assessment maps each root cause to the corresponding metric gap and identifies which root causes affect multiple metrics simultaneously."
    weight: 0.35
    description: "RootCauseAssessment"
  - type: llm_judge
    criteria: "Improvement roadmap is realistic with projected savings — quick wins (0-3 months): mandate direct deposit (saves $X in check processing), enable mobile submission in existing Concur instance, implement auto-approval for reports under $250 with zero violations; medium-term (3-12 months): deploy OCR receipt scanning (reduce manual entry from 65% to 30%), expand corporate card program (target 75% adoption), implement pre-submission policy compliance checks (reduce violations from 22% to 12%); strategic (12-24 months): preferred vendor program with negotiated rates (target 10% savings on travel), AI-powered categorization (reduce manual entry to 15%), predictive analytics for T&E budgeting; the business case quantifies total projected savings: $2-4M annually from reduced T&E spend + $200-400K from processing efficiency; investment required: $300-500K for technology and implementation; ROI: 5-10x in first two years."
    weight: 0.30
    description: "ImprovementRoadmap"
