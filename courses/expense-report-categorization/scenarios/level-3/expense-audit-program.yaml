meta:
  id: expense-audit-program
  level: 3
  course: expense-report-categorization
  type: output
  description: "Design a comprehensive expense audit program — create sampling methodologies, audit procedures, reporting templates, and continuous monitoring controls"
  tags: [audit-program, internal-audit, sampling, advanced]

state: {}

trigger: |
  The internal audit department is establishing a
  formal expense audit program. The company
  processes $48M in annual T&E expenses across
  4,200 employees. Design the complete audit
  program.

  COMPANY CONTEXT:
  - Annual T&E: $48M (8% of operating expenses)
  - Monthly reports: ~6,500 expense reports
  - Average report value: $615
  - Top 10% of spenders account for 65% of T&E
  - Last audit: 18 months ago (found $340K in
    improper expenses, 0.7% of total)
  - Expense system: SAP Concur with card integration
  - 3 prior fraud cases in past 5 years

  RISK FACTORS IDENTIFIED:
  - High-travel sales team (120 people, $18M annual)
  - Executive expenses with limited oversight ($4.2M)
  - International travel with multi-currency ($8.5M)
  - Conference/event spending ($3.8M)
  - New employees (150 hired in last 12 months)
    unfamiliar with policy
  - Remote workers claiming home office expenses
    ($1.2M)

  AUDIT RESOURCES:
  - 2 full-time auditors available
  - Access to Concur data analytics module
  - ACL/IDEA audit software available
  - Budget for external forensic support if needed

  Design:
  1. Risk-based audit plan (annual)
  2. Statistical sampling methodology
  3. Audit procedures for each risk area
  4. Continuous monitoring program
  5. Reporting template and escalation procedures
  6. Fraud detection analytics

assertions:
  - type: llm_judge
    criteria: "Risk-based audit plan is comprehensive — the plan prioritizes audit areas by risk: (1) Executive expenses ($4.2M, high risk due to limited oversight — audit 100% of CEO/CFO expenses, 50% sample of VP expenses); (2) Sales team ($18M, highest dollar amount — stratified sampling of top spenders); (3) International travel ($8.5M, FX and compliance risk — focus on FX markups and per diem compliance); (4) Conference spending ($3.8M — verify business purpose and attendee documentation); (5) New employee expenses (policy compliance training effectiveness); (6) Remote worker home office claims (verify eligibility and reasonableness); the plan includes: audit universe definition, risk scoring matrix, planned hours per area, and quarterly audit schedule; the two auditors' time is allocated efficiently across the year with continuous monitoring supplementing periodic audits."
    weight: 0.35
    description: "RiskBasedAuditPlan"
  - type: llm_judge
    criteria: "Sampling methodology is statistically sound — uses stratified sampling: (1) All expenses over $5,000 are tested (100% coverage of high-value items); (2) Stratified random sample of remaining: high spenders (top 10%) sampled at 20%, medium spenders at 10%, low spenders at 5%; (3) Targeted sampling for risk areas (all international FX transactions, all entertainment expenses, all executive submissions); the methodology calculates: sample size for desired confidence level (95% confidence, 5% expected error rate), considering the population of 78,000 annual line items; MUS (Monetary Unit Sampling) is considered for dollar-weighted selection; the sample is designed to detect material misstatement (materiality threshold defined — e.g., $50K or 0.1% of T&E spend); Benford's Law analysis for first-digit distribution testing on expense amounts."
    weight: 0.35
    description: "SamplingMethodology"
  - type: llm_judge
    criteria: "Continuous monitoring and fraud analytics are practical — continuous monitoring includes: automated daily/weekly reports from Concur data: (1) Expenses submitted on weekends/holidays, (2) Round-dollar amounts over $100, (3) Duplicate vendor/amount/date combinations, (4) Expenses just under approval thresholds, (5) Receipts just under documentation thresholds, (6) Split transactions (multiple charges to same vendor on same day), (7) Vendor name fuzzy matching against closed/fictitious vendor databases, (8) Employee spending trending analysis (>2 standard deviations from mean); the fraud detection analytics use ACL/IDEA to: perform Benford's analysis, gap/duplicate testing, vendor master analysis, and stratification of expense populations; the reporting template includes: findings summary, risk rating, management response, remediation timeline, and follow-up procedures; escalation paths: auditor → audit manager → CFO → audit committee for fraud findings."
    weight: 0.30
    description: "ContinuousMonitoring"
