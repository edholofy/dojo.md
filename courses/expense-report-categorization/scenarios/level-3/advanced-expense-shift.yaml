meta:
  id: advanced-expense-shift
  level: 3
  course: expense-report-categorization
  type: output
  description: "Advanced shift simulation — handle enterprise system design, cross-border compliance, and SOX control remediation in a single workday"
  tags: [shift-simulation, multi-task, advanced-synthesis, advanced]

state: {}

trigger: |
  You are the Director of Expense Management
  handling three critical initiatives on a Friday
  before month-end close.

  INITIATIVE 1 — SYSTEM OUTAGE RECOVERY
  The expense management system (Concur) went down
  for 18 hours during the last two days of the
  month. 450 expense reports could not be submitted.
  The system is back up, but month-end close is
  Monday. You need to:
  - Estimate the accrual for unsubmitted reports
  - Create a submission extension policy
  - Ensure period-end financials are accurate
  - Communicate to all stakeholders

  Known data:
  - Average report value: $780
  - Typical month-end submission spike: 35% of
    monthly reports in last 2 days
  - Monthly average: 6,500 reports
  - 3,200 reports already submitted this month
  - Corporate card charges for March: $4.2M
  - Expenses submitted to date: $3.6M

  INITIATIVE 2 — REGULATORY CHANGE IMPACT
  The IRS has issued new guidance effective
  immediately that changes the deductibility of
  certain meal expenses. The previous 50%
  deduction for business meals provided by
  restaurants has been reinstated to 100% for
  meals provided on employer premises during
  meetings. Your company has significant on-premise
  catering and meeting meals (~$1.8M annually).

  Assess the impact and implement the GL coding
  changes needed to capture the tax benefit.

  INITIATIVE 3 — WHISTLEBLOWER ALLEGATION
  HR has forwarded a whistleblower complaint
  alleging that a VP has been submitting personal
  travel expenses as business travel. The
  allegation claims the VP booked family vacations
  through the corporate travel system, adding
  fake meeting invites to justify the trips. The
  estimated exposure is $45,000 over 18 months.

  Outline the investigation approach, evidence
  preservation, and interim controls.

assertions:
  - type: llm_judge
    criteria: "System outage recovery plan is comprehensive — the accrual estimate uses: (1) Historical submission pattern (35% spike in last 2 days = ~2,275 expected reports, minus any that came in before outage); (2) Gap calculation: 6,500 expected - 3,200 submitted = 3,300 outstanding; (3) Dollar accrual: 3,300 × $780 average = ~$2.57M estimated; (4) Cross-reference with known corporate card charges: $4.2M total - $3.6M submitted = $600K minimum card-related gap; the submission extension allows 5 business days past normal deadline; communication plan includes: email to all employees about extension, notification to finance team about accrual methodology, memo to external auditors about the outage and its financial impact; the accrual journal entry debits the estimated GL distribution and credits Accrued Liabilities."
    weight: 0.35
    description: "OutageRecovery"
  - type: llm_judge
    criteria: "Regulatory change implementation is accurate — identifies the specific IRS guidance change (meals on employer premises during meetings returning to 100% deductibility); the GL coding change requires: creating a new GL code or sub-code to distinguish on-premise meeting meals (100% deductible) from other business meals (50% deductible); estimates the tax impact: $1.8M × 50% additional deduction × corporate tax rate (21%) = ~$189K annual tax savings; implementation steps: (1) Create new GL code (e.g., 6136 — Meals, On-Premise/Meeting), (2) Update expense system dropdown and descriptions, (3) Communicate to employees on new coding requirements, (4) Retroactively review YTD expenses for reclassification opportunity, (5) Update tax team on the change for quarterly estimated payments; the timeline is urgent as the benefit is effective immediately."
    weight: 0.35
    description: "RegulatoryChange"
  - type: llm_judge
    criteria: "Whistleblower investigation approach is appropriate — the plan includes: (1) Evidence preservation: immediately pull all of the VP's expense reports for the 18-month period, preserve travel booking records, calendar entries, and email correspondence; place a litigation hold on relevant documents; (2) Investigation scope: compare claimed business trips to calendar entries (do meetings actually exist?), verify attendee lists for claimed meetings, check if family members are on the same flights/hotel bookings, review travel patterns (are 'business' destinations vacation destinations?); (3) Interim controls: the VP's future expenses should require CFO-level approval pending investigation outcome; do not confront the VP before the investigation is substantially complete; (4) Team composition: Internal Audit leads, HR involved for employee relations, Legal counsel for privilege protection; (5) Whistleblower protections: ensure confidentiality, document that no retaliation occurs per Dodd-Frank/SOX protections; the $45K estimated exposure is quantified against actual findings."
    weight: 0.30
    description: "WhistleblowerInvestigation"
