meta:
  id: enterprise-expense-system
  level: 3
  course: expense-report-categorization
  type: output
  description: "Design an enterprise expense management system — architect the technology platform, integration points, automation rules, and reporting infrastructure for a global organization"
  tags: [enterprise-system, architecture, automation, advanced]

state: {}

trigger: |
  A multinational corporation (5,000 employees,
  12 countries) is replacing its legacy expense
  management system. Design the new platform.

  CURRENT STATE:
  - Spreadsheet-based expense reports
  - Manual approval via email chains
  - 3 different corporate card providers by region
  - No integration with ERP (SAP S/4HANA)
  - Average processing time: 21 days
  - Error rate: 35% on GL coding
  - No mobile capability
  - No receipt OCR or automation

  TARGET STATE:
  - Fully automated expense processing
  - Mobile-first submission
  - OCR receipt capture with auto-categorization
  - Real-time policy compliance checking
  - Integration with SAP, corporate cards, and
    travel booking systems
  - Multi-currency with automatic FX conversion
  - Analytics and reporting dashboards
  - Support for 12 countries with different tax
    rules, per diem rates, and regulations

  REGIONS AND COMPLEXITY:
  - Americas (US, Canada, Brazil): 2,500 employees
  - EMEA (UK, Germany, France, UAE): 1,500 employees
  - APAC (Japan, Singapore, Australia, India):
    1,000 employees

  Design:
  1. System architecture and integration map
  2. Automation rules engine specification
  3. Multi-country compliance framework
  4. OCR and AI categorization workflow
  5. Rollout plan (phased by region)
  6. KPIs and success metrics

assertions:
  - type: llm_judge
    criteria: "System architecture addresses all integration points — the design includes: (1) Core expense platform (whether build, buy, or configure — e.g., SAP Concur, Coupa, or custom); (2) SAP S/4HANA integration for GL posting, cost center sync, and employee master data; (3) Corporate card feeds from 3 providers via file import or API; (4) Travel booking system integration (GDS/TMC) for pre-trip expense population; (5) OCR/AI service for receipt processing (Google Vision, AWS Textract, or platform-native); (6) Mobile app architecture (native vs. PWA); (7) FX rate service integration (OANDA, ECB, or similar); (8) Tax engine for multi-country compliance; the architecture diagram shows data flows, APIs, and batch vs. real-time processing decisions; security and data residency requirements by region are addressed."
    weight: 0.35
    description: "SystemArchitecture"
  - type: llm_judge
    criteria: "Automation rules engine is sophisticated and handles complexity — includes: auto-categorization rules based on MCC codes, vendor names, and historical patterns; policy compliance engine with country-specific rules (US IRS rates, UK HMRC rates, German Reisekostenrecht, etc.); duplicate detection across card transactions and manual submissions; auto-approval rules for low-risk, policy-compliant expenses below thresholds; smart routing based on amount, submitter level, and country; FX conversion rules specifying rate source, timing, and fee handling; tax calculation rules (VAT reclaim eligibility by country, US deductibility, withholding requirements); the rules engine supports configuration without code changes; escalation rules for exceptions; the specification includes at least 10 specific automation rules with conditions and actions."
    weight: 0.35
    description: "AutomationRulesEngine"
  - type: llm_judge
    criteria: "Multi-country framework and rollout plan are realistic — the compliance framework addresses: US (IRS Section 274, per diem rates, $75 receipt threshold), Canada (CRA rules, GST/HST input tax credits), Brazil (nota fiscal requirements), UK (HMRC benchmark rates, VAT reclaim), Germany (Vorsteuerabzug, Pauschalen), France (TVA recovery, urssaf meal vouchers), UAE (no income tax but VAT), Japan (consumption tax, per diem rules), Singapore (GST), Australia (FBT, GST), India (GST, TDS requirements); the rollout plan is phased: Americas first (largest, HQ), then EMEA, then APAC; each phase includes: data migration, user training, parallel running, and go-live support; KPIs include: processing time (target <5 days), error rate (target <5%), user adoption (target >90%), cost per report, and audit finding reduction."
    weight: 0.30
    description: "MultiCountryRollout"
