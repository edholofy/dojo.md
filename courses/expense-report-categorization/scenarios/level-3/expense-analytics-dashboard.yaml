meta:
  id: expense-analytics-dashboard
  level: 3
  course: expense-report-categorization
  type: output
  description: "Design an expense analytics and reporting dashboard — create KPIs, visualizations, drill-down capabilities, and predictive analytics for expense management"
  tags: [analytics, dashboard, kpis, advanced]

state: {}

trigger: |
  Design a comprehensive expense analytics
  dashboard for the CFO and finance leadership
  team. The company processes 8,000 expense
  reports monthly across 4 business units.

  BUSINESS UNITS:
  - North America Commercial (1,200 employees)
  - EMEA Operations (800 employees)
  - Product & Engineering (600 employees)
  - Corporate Functions (400 employees)

  AVAILABLE DATA SOURCES:
  - Expense management system (Concur): all reports,
    line items, approvals, GL codes
  - Corporate card transactions: real-time feeds
  - ERP (SAP): budget data, cost centers, GL master
  - HR system: employee data, org hierarchy, travel
    frequency
  - Travel booking system: flights, hotels, car
    rentals
  - Accounts payable: payment data, aging

  DASHBOARD REQUIREMENTS:
  1. Executive overview (CFO-level)
  2. Operational metrics (Finance Director-level)
  3. Compliance and audit view
  4. Predictive analytics
  5. Ad hoc reporting capability

  The dashboard should surface:
  - Spending patterns and trends
  - Budget vs. actual by BU, department, GL code
  - Policy compliance rates
  - Processing efficiency (cycle times, backlog)
  - Fraud risk indicators
  - Forecasting for next quarter/year

  Design the complete dashboard including:
  1. KPI definitions and calculations
  2. Dashboard layout and visualizations
  3. Drill-down hierarchies
  4. Alert and exception rules
  5. Data refresh and latency requirements

assertions:
  - type: llm_judge
    criteria: "KPIs are well-defined and cover all dimensions — the dashboard includes at minimum: (1) Total T&E spend (MTD, QTD, YTD) with trend; (2) Spend per employee by BU; (3) Budget utilization percentage by BU, department, GL code; (4) Policy compliance rate (% of reports with zero violations); (5) Average processing time (submission to payment); (6) Approval backlog (reports pending >5 days); (7) Top 10 vendors by spend; (8) Category mix (% by GL code); (9) FX impact on international expenses; (10) Fraud risk score (aggregated from anomaly detection); each KPI includes: definition, calculation formula, data source, refresh frequency, and target/benchmark; the KPIs distinguish between leading indicators (e.g., pre-trip booking compliance) and lagging indicators (e.g., actual spend vs. budget)."
    weight: 0.35
    description: "KPIDefinitions"
  - type: llm_judge
    criteria: "Dashboard layout and visualizations are appropriate for the audience — the executive overview uses: summary cards for key metrics, trend lines for spend over time, heat maps for BU comparison, and donut charts for category breakdown; the operational view adds: processing funnel (submitted → approved → paid), aging table for pending reports, and employee-level drill-down; the compliance view includes: violation type distribution, repeat offender list, exception approval rates, and audit trail timeline; each visualization type is justified (e.g., line charts for trends, bar charts for comparisons, tables for detailed data); the drill-down hierarchy allows: company → BU → department → employee → individual report → line item; the design considers real-time vs. batch data (card transactions real-time, budget data daily, compliance scores weekly)."
    weight: 0.35
    description: "DashboardDesign"
  - type: llm_judge
    criteria: "Predictive analytics and alerting are actionable — predictive features include: (1) Budget exhaustion forecast (when will each BU hit budget at current run rate); (2) Seasonal spending prediction based on historical patterns; (3) Anomaly detection alerts for unusual spending spikes; (4) Cash flow forecasting for upcoming reimbursements; alert rules include: budget >80% utilized (warning), >95% (critical); processing time >5 days (escalation); individual expense >$5,000 (review required); new vendor with >$1,000 first transaction (verification); spending increase >20% vs. prior month (investigation); each alert specifies: condition, threshold, recipient, action required, and severity level; the ad hoc reporting capability allows users to filter by any dimension (date, BU, department, GL code, employee, vendor) and export to Excel/PDF."
    weight: 0.30
    description: "PredictiveAnalytics"
