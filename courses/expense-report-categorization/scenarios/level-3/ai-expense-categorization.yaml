meta:
  id: ai-expense-categorization
  level: 3
  course: expense-report-categorization
  type: output
  description: "Build an AI-powered expense categorization engine — design ML models for receipt OCR, auto-classification, anomaly detection, and intelligent GL code assignment"
  tags: [ai-ml, auto-categorization, ocr, advanced]

state: {}

trigger: |
  Design an AI/ML system for automatic expense
  categorization that will process 50,000 expense
  reports per month across a large enterprise.

  CURRENT MANUAL PROCESS:
  - Employees manually select GL codes from a
    dropdown (200+ codes)
  - 35% error rate on GL coding
  - Finance team reviews and corrects ~5,000
    reports/month
  - Each correction takes 8-15 minutes
  - Total monthly cost of corrections: ~$125,000
    in labor

  AVAILABLE DATA FOR TRAINING:
  - 3 years of historical expense reports (1.2M
    records) with corrected GL codes
  - Corporate card transaction data with MCC codes
  - Receipt images (800K+ scanned receipts)
  - Vendor master data (15,000 vendors)
  - Employee profiles (department, role, travel
    patterns)

  PERFORMANCE REQUIREMENTS:
  - GL code accuracy: >95% for top 20 categories
  - Receipt data extraction accuracy: >98%
  - Processing time: <5 seconds per receipt
  - Anomaly detection: flag >80% of policy
    violations
  - Support 12 languages for international receipts
  - Confidence scoring for human review routing

  Design:
  1. ML pipeline architecture
  2. Receipt OCR and data extraction model
  3. GL code classification model
  4. Anomaly detection system
  5. Confidence scoring and human-in-the-loop
  6. Model training and evaluation strategy
  7. Continuous learning feedback loop

assertions:
  - type: llm_judge
    criteria: "ML pipeline architecture is technically sound — includes: (1) Receipt ingestion pipeline (image preprocessing, orientation correction, quality assessment); (2) OCR engine selection and design (multi-language support for 12 languages, handling of thermal receipts, handwritten amounts, different date formats); (3) Named Entity Recognition for extracting: merchant name, date, total amount, tax, tip, line items, currency; (4) GL classification model (multi-class classifier using features from OCR output, MCC code, vendor history, employee patterns); (5) Anomaly detection model (trained on historical fraud cases, policy violations, and outlier expenses); (6) Confidence scoring layer that determines: auto-approve (>95% confidence), suggest with review (80-95%), and flag for manual classification (<80%); the pipeline is designed for batch and real-time processing."
    weight: 0.35
    description: "MLPipelineArchitecture"
  - type: llm_judge
    criteria: "Model design choices are well-reasoned — the GL classification model uses: features from OCR (vendor name, amount, category keywords), MCC code mapping, historical GL assignments for the same vendor, employee's department and role, time of day and day of week; model options are discussed (gradient boosting vs. neural network vs. transformer-based); the training strategy uses the 1.2M historical records with the corrected GL codes as ground truth; evaluation uses precision, recall, and F1 score per GL code; handling of rare categories (codes with few training examples) through techniques like oversampling or hierarchical classification; the anomaly detection system uses isolation forests, autoencoders, or rule-based systems for different types of anomalies; A/B testing strategy for comparing model versions."
    weight: 0.35
    description: "ModelDesign"
  - type: llm_judge
    criteria: "Human-in-the-loop and continuous learning are practical — the confidence scoring system routes expenses to different paths: auto-classified (high confidence, no review needed), suggested classification (medium confidence, employee confirms), manual classification (low confidence, finance team assigns); the feedback loop captures corrections from both employees and finance team to retrain models; model monitoring tracks: accuracy drift over time, new vendors not in training data, seasonal pattern changes; the system handles cold start for new employees (uses department averages) and new vendors (falls back to MCC code classification); retraining cadence is defined (weekly incremental, monthly full retrain); the ROI calculation shows: current cost $125K/month, projected reduction to $30K/month with 95%+ accuracy, yielding ~$1.1M annual savings."
    weight: 0.30
    description: "ContinuousLearning"
