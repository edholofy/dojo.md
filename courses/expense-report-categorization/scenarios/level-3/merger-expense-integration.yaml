meta:
  id: merger-expense-integration
  level: 3
  course: expense-report-categorization
  type: output
  description: "Integrate expense management systems during a corporate merger — harmonize GL structures, policies, approval workflows, and reporting across two organizations"
  tags: [merger-integration, chart-of-accounts, harmonization, advanced]

state: {}

trigger: |
  Two companies are merging and their expense
  management systems must be integrated within
  90 days of close. Develop the integration plan.

  ACQUIRING COMPANY (AlphaTech, 3,000 employees):
  - Expense system: SAP Concur
  - GL structure: 4-digit codes (6000-6999 for
    expenses)
  - Corporate cards: Amex (single provider)
  - Policy: comprehensive, 45-page document
  - Approval: Manager → Director for >$2,500
  - Currency: USD-centric, limited international

  TARGET COMPANY (BetaSoft, 1,200 employees):
  - Expense system: Expensify
  - GL structure: 6-digit codes (600000-699999)
  - Corporate cards: Various (employee-selected)
  - Policy: minimal, 5-page document
  - Approval: Manager only, no amount limits
  - Currency: Multi-currency (offices in 4 countries)

  KEY DIFFERENCES TO RESOLVE:

  GL MAPPING CHALLENGE:
  AlphaTech          | BetaSoft
  -------------------|--------------------
  6100 Airfare       | 601000 Air Travel
  6110 Ground Trans  | 601100 Taxi/Rideshare
                     | 601200 Rental Cars
                     | 601300 Train/Rail
  6120 Lodging       | 602000 Hotels
                     | 602100 Airbnb/Alt
  6130 Client Meals  | 603000 Meals-External
  6135 Employee Meals| 603100 Meals-Internal
  6140 Conferences   | 604000 Events
  6150 Entertainment | 605000 Client Gifts
                     | 605100 Entertainment
  6200 Supplies      | 606000 Office Supplies
  6300 Prof Dev      | 607000 Training
                     | 607100 Books/Subscr
  6400 Technology    | 608000 Software
                     | 608100 Hardware

  TIMELINE: 90 days from close (Day 1 is April 1)
  DAY 30: Interim solution operational
  DAY 60: Full policy harmonization
  DAY 90: Single system go-live

  Create:
  1. GL mapping and harmonization plan
  2. Policy harmonization recommendations
  3. System migration approach
  4. Change management and communication plan
  5. Risk mitigation strategies

assertions:
  - type: llm_judge
    criteria: "GL mapping is comprehensive and preserves reporting granularity — the mapping addresses every code from both companies; the harmonized structure should adopt the more granular approach (BetaSoft's 6-digit codes provide better detail) while maintaining AlphaTech's simpler reporting through roll-up hierarchies; alternatively, adopts AlphaTech's 4-digit codes but adds sub-codes for BetaSoft's detail; the mapping handles: Ground Transport split (BetaSoft separates taxi, rental, train — AlphaTech combines all); Lodging split (BetaSoft separates hotel from alternative lodging); Entertainment vs. Gifts (BetaSoft separates these); Technology split (software vs. hardware); the mapping includes a crosswalk table showing old codes → new codes for both companies; historical data migration strategy preserves reporting continuity; the approach considers SAP's GL structure requirements."
    weight: 0.35
    description: "GLHarmonization"
  - type: llm_judge
    criteria: "Policy harmonization balances both cultures — addresses the major policy gaps: BetaSoft's 5-page policy needs significant expansion (meal limits, approval thresholds, receipt requirements, travel booking rules); AlphaTech's 45-page policy may be overly complex; the harmonized policy adopts the stronger controls from AlphaTech but simplifies language; key decisions: approval thresholds (adopt AlphaTech's tiered approach), meal limits (set unified limits), corporate card (consolidate to single provider vs. allow choice), receipt threshold (standardize); the recommendation considers employee impact — BetaSoft employees accustomed to minimal oversight will resist stricter controls; change management includes: side-by-side comparison of old vs. new rules, grace period for enforcement, training sessions, and dedicated support channel; the policy addresses multi-currency (BetaSoft's strength) while improving controls."
    weight: 0.35
    description: "PolicyHarmonization"
  - type: llm_judge
    criteria: "System migration and timeline are realistic — the 90-day plan includes: Days 1-30 interim solution (BetaSoft employees submit through simplified Concur instance or continue on Expensify with manual GL translation); Days 31-60 testing and parallel running; Days 61-90 full migration to unified Concur; the migration handles: user account creation for 1,200 BetaSoft employees, historical data migration (or archive decision), corporate card feed setup, approval workflow configuration, policy rule programming; risk mitigation includes: parallel running period where both systems operate, data validation procedures, rollback plan if migration fails, dedicated support team during transition, executive sponsor communications; the plan acknowledges that 90 days is aggressive and identifies the critical path items that could delay go-live."
    weight: 0.30
    description: "SystemMigration"
