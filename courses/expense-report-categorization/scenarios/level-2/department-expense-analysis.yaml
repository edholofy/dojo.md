meta:
  id: department-expense-analysis
  level: 2
  course: expense-report-categorization
  type: output
  description: "Analyze department-level expense trends — compare spending across periods, identify anomalies, calculate budget variances, and prepare management reports"
  tags: [department-analysis, budget-variance, trend-analysis, intermediate]

state: {}

trigger: |
  Prepare a quarterly expense analysis for the
  CFO comparing Q1 2025 actuals to budget and
  prior year for all departments.

  DEPARTMENT EXPENSE SUMMARY — Q1 2025:

  SALES (CC-100):
  GL Code | Category           | Q1 Budget | Q1 Actual | Q1 2024
  --------|--------------------|-----------|-----------|---------
  6100    | Airfare            | $45,000   | $52,340   | $41,200
  6110    | Ground Transport   | $12,000   | $14,780   | $11,500
  6120    | Lodging            | $35,000   | $38,900   | $33,100
  6130    | Client Meals       | $25,000   | $31,450   | $22,800
  6135    | Employee Meals     | $8,000    | $7,200    | $7,500
  6150    | Client Entertainment| $15,000  | $18,600   | $12,900
  6400    | Technology         | $5,000    | $4,800    | $4,500
  TOTAL   |                    | $145,000  | $168,070  | $133,500

  ENGINEERING (CC-200):
  GL Code | Category           | Q1 Budget | Q1 Actual | Q1 2024
  --------|--------------------|-----------|-----------|---------
  6100    | Airfare            | $8,000    | $6,200    | $7,800
  6110    | Ground Transport   | $2,000    | $1,800    | $1,900
  6120    | Lodging            | $5,000    | $4,100    | $4,600
  6135    | Employee Meals     | $4,000    | $5,800    | $3,200
  6200    | Office Supplies    | $3,000    | $2,400    | $2,800
  6300    | Prof Development   | $12,000   | $15,400   | $10,500
  6400    | Technology         | $28,000   | $32,100   | $24,500
  TOTAL   |                    | $62,000   | $67,800   | $55,300

  MARKETING (CC-300):
  GL Code | Category           | Q1 Budget | Q1 Actual | Q1 2024
  --------|--------------------|-----------|-----------|---------
  6100    | Airfare            | $15,000   | $13,200   | $14,100
  6110    | Ground Transport   | $5,000    | $4,600    | $4,800
  6120    | Lodging            | $10,000   | $9,800    | $9,500
  6130    | Client Meals       | $8,000    | $7,500    | $7,200
  6140    | Conferences        | $20,000   | $28,500   | $18,000
  6400    | Technology         | $8,000    | $9,200    | $7,100
  6600    | Marketing Expenses | $30,000   | $34,800   | $27,500
  TOTAL   |                    | $96,000   | $107,600  | $88,200

  HR (CC-400):
  GL Code | Category           | Q1 Budget | Q1 Actual | Q1 2024
  --------|--------------------|-----------|-----------|---------
  6100    | Airfare            | $5,000    | $8,200    | $4,200
  6110    | Ground Transport   | $2,000    | $3,100    | $1,800
  6120    | Lodging            | $4,000    | $6,500    | $3,600
  6300    | Prof Development   | $6,000    | $5,800    | $5,500
  6400    | Technology         | $4,000    | $4,200    | $3,800
  6800    | Recruiting         | $15,000   | $22,400   | $12,000
  TOTAL   |                    | $36,000   | $50,200   | $30,900

  Prepare:
  1. Variance analysis (budget vs. actual, YoY)
  2. Anomaly identification and root cause analysis
  3. Trend analysis and projections
  4. Executive summary with recommendations

assertions:
  - type: llm_judge
    criteria: "Variance analysis is mathematically correct and insightful — calculates both dollar and percentage variances for each line item: budget vs. actual and YoY; identifies the largest variances: Sales total is $23,070 (15.9%) over budget; HR total is $14,200 (39.4%) over budget — the largest percentage overage; HR recruiting is $7,400 (49.3%) over budget — the single largest line item variance; Marketing conferences are $8,500 (42.5%) over budget; Engineering professional development is $3,400 (28.3%) over budget; company-wide total: budget $339,000, actual $393,670, variance $54,670 (16.1%) unfavorable; the analysis distinguishes between favorable and unfavorable variances and ranks them by materiality."
    weight: 0.35
    description: "VarianceAnalysis"
  - type: llm_judge
    criteria: "Anomaly identification provides actionable root cause hypotheses — HR's 39.4% budget overage is the most significant anomaly: recruiting expenses ($22,400 vs. $15,000 budget) suggest an unplanned hiring surge — should verify if additional headcount was approved mid-quarter; HR travel ($8,200 airfare vs. $5,000 budget) likely related to recruiting travel (campus visits, candidate interviews); Sales client meals ($31,450 vs. $25,000) and entertainment ($18,600 vs. $15,000) are both over — suggests increased client activity or insufficient per-person controls; Engineering employee meals ($5,800 vs. $4,000) increased 45% — possibly related to new team members or more frequent team events; Marketing conferences at $28,500 vs. $20,000 may indicate an unbudgeted conference or higher registration fees; each anomaly includes a specific recommendation (investigate, adjust budget, tighten controls)."
    weight: 0.35
    description: "AnomalyAnalysis"
  - type: llm_judge
    criteria: "Executive summary is concise and includes forward-looking projections — projects full-year spend based on Q1 trends (Q1 actual × 4 or using seasonal adjustments); if Q1 trends continue, full-year spend would be approximately $1.57M vs. $1.36M budget — a projected $215K overage; the summary highlights the top 3 concerns: (1) HR recruiting costs trending 49% over budget, (2) Sales T&E growing faster than revenue growth, (3) Marketing conference spend needs mid-year review; recommendations include: request HR to provide updated hiring plan justification, implement per-person meal limits in Sales, require pre-approval for conference registrations over $1,000, and conduct a mid-year budget re-forecast; the summary is formatted for a CFO audience — concise, data-driven, with clear action items."
    weight: 0.30
    description: "ExecutiveSummary"
