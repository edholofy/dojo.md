meta:
  id: expense-knowledge-management
  level: 4
  course: expense-report-categorization
  type: output
  description: "Design an expense management knowledge management system — create knowledge bases, decision support tools, training programs, and institutional memory preservation for expense operations"
  tags: [knowledge-management, training, decision-support, expert]

state: {}

trigger: |
  A company's expense management team has
  significant institutional knowledge concentrated
  in 3 senior employees who are approaching
  retirement. Design a knowledge management system
  to capture, organize, and transfer this expertise.

  KNOWLEDGE AT RISK:
  
  SENIOR ANALYST 1 — Maria (32 years experience):
  - Knows every GL code exception and the business
    reason behind it
  - Can identify fraudulent receipts by visual
    inspection (caught $1.2M in fraud over career)
  - Understands historical policy evolution and
    why rules exist
  - Has relationships with every department head
    for resolving disputes

  SENIOR ANALYST 2 — Robert (25 years experience):
  - Expert in international expense compliance
    (12 countries)
  - Manages all VAT reclaim processes
  - Handles complex multi-currency reconciliations
  - Knows the regulatory history in each country

  SENIOR ANALYST 3 — Patricia (28 years experience):
  - Designed the current approval workflows
  - Manages the Concur system configuration
  - Handles all SOX audit interactions
  - Maintains the policy exception database

  COMPANY CONTEXT:
  - 6,000 employees
  - $42M annual T&E
  - Each senior analyst processes 200+ escalated
    cases per month
  - Junior team (8 people) handles routine processing
  - Average time to resolve an escalation: 45
    minutes (seniors) vs. 3 hours (juniors)
  - Retirement timeline: Maria in 6 months,
    Robert in 12 months, Patricia in 18 months

  Design the knowledge capture and transfer system:
  1. Knowledge audit and taxonomy
  2. Capture methodology for each expert
  3. Decision support tools (for junior staff)
  4. Training and mentorship program
  5. Knowledge base platform and governance
  6. Transition plan aligned with retirement timeline

assertions:
  - type: llm_judge
    criteria: "Knowledge taxonomy is comprehensive and captures tacit knowledge — the audit identifies three types of knowledge: (1) Explicit (documentable): GL code mappings, policy rules, compliance checklists, system configurations, VAT rates by country — these are captured in written procedures; (2) Tacit procedural (demonstrable): fraud receipt detection techniques, escalation resolution patterns, multi-currency reconciliation methods, audit interaction strategies — these require observation and guided practice; (3) Tacit relational (transferable through experience): department head relationships, understanding organizational politics around expenses, knowing when to enforce vs. when to flex on policy, reading the context behind unusual expenses; the taxonomy organizes knowledge by: domain (GL coding, fraud, international, SOX, system admin), frequency (daily, weekly, monthly, quarterly), complexity (routine, moderate, complex, expert-only), and risk (low impact if lost, moderate, critical)."
    weight: 0.35
    description: "KnowledgeTaxonomy"
  - type: llm_judge
    criteria: "Capture methodology is practical and respects retirement timeline — Maria (6 months to retirement, most urgent): immediate priority on fraud detection techniques using structured interviews + case review sessions (review 50+ past fraud cases together, document the visual and pattern indicators); video recording of complex escalation resolutions; creation of GL code exception decision tree with business rationale; Robert (12 months): document country-by-country compliance guides with regulatory references; create VAT reclaim procedure manuals with screenshots; record multi-currency reconciliation walkthroughs; Patricia (18 months): export and document all Concur configurations and the reasons behind them; create SOX control testing playbook; document the policy exception decision framework; the capture schedule is realistic: 4-6 hours per week per expert over their remaining tenure; knowledge is captured progressively (most critical first) in case someone retires early."
    weight: 0.35
    description: "CaptureMethodology"
  - type: llm_judge
    criteria: "Decision support tools empower junior staff — tools include: (1) Escalation decision tree: flowchart-based tool that walks junior analysts through common scenarios with the expert's recommended resolution (if expense is type X, check Y, then decide Z); (2) Fraud detection checklist: the 25 most common fraud indicators Maria has identified, with examples and what to look for; (3) International compliance quick-reference: country cards for each of 12 countries showing VAT rates, receipt requirements, per diem rules, and common pitfalls; (4) GL code helper: searchable database of every GL exception with the business context; (5) SOX audit preparation toolkit: timeline, document checklist, common auditor questions with approved responses; the training program pairs each junior with a senior for shadowing during the overlap period; the transition plan includes: parallel processing period (junior handles case, senior reviews) with decreasing senior oversight; monthly knowledge gap assessment; and a post-retirement support contract (5 hours/month consulting for 6 months after each retirement) as safety net."
    weight: 0.30
    description: "DecisionSupportTools"
