meta:
  id: expense-transformation-case-study
  level: 4
  course: expense-report-categorization
  type: output
  description: "Write a detailed expense management transformation case study — document the journey from legacy processes to modern automated expense management with quantified outcomes"
  tags: [case-study, transformation, change-management, expert]

state: {}

trigger: |
  Write a comprehensive case study documenting a
  3-year expense management transformation at a
  mid-market company. This case study will be
  published by a business school for MBA students.

  COMPANY: NovaChem Industries (composite, based
  on real engagements)
  - Specialty chemicals manufacturer
  - Revenue: $850M
  - Employees: 4,200 (60% field-based)
  - Locations: 18 manufacturing plants + HQ + 5
    regional offices across 8 countries
  - Annual T&E before transformation: $38M

  THE JOURNEY:

  YEAR 0 (BASELINE):
  - Paper-based expense reports (triplicate forms)
  - Average processing time: 28 days
  - Error rate on GL coding: 42%
  - Employee satisfaction: 2.1/10
  - Expense fraud discovered: $780K over 3 years
  - No corporate card program
  - No policy for field workers' daily expenses
  - Reimbursement by check (mailed to home)
  - Finance team: 8 FTEs dedicated to expense
    processing
  - Cost per report: $92

  YEAR 1 (FOUNDATION):
  - Implemented SAP Concur
  - Launched corporate card program (60% adoption)
  - Created standardized global policy
  - Deployed mobile app for field workers
  - Result: processing time → 12 days

  YEAR 2 (OPTIMIZATION):
  - Added OCR receipt scanning
  - Implemented AI categorization
  - Redesigned approval workflow
  - Launched analytics dashboard
  - Result: processing time → 6 days, error rate → 15%

  YEAR 3 (TRANSFORMATION):
  - Trust-based policy for managers
  - Real-time spending controls
  - ESG travel tracking
  - Predictive analytics
  - Result: processing time → 3 days, satisfaction 8.2/10

  Write the case study including:
  1. Executive summary
  2. Situation analysis (Year 0)
  3. Transformation journey (Years 1-3)
  4. Change management challenges and solutions
  5. Quantified outcomes and ROI
  6. Lessons learned and teaching points

assertions:
  - type: llm_judge
    criteria: "Case study is comprehensive and suitable for MBA instruction — the executive summary captures the key transformation narrative: from paper-based to AI-powered in 3 years; the situation analysis paints a vivid picture of the Year 0 problems (28-day processing, 42% error rate, check reimbursements, $780K fraud); each year's transformation is detailed with: specific initiatives, implementation challenges, resistance points, and measurable outcomes; the narrative includes real-world complexity: manufacturing plant workers who don't have company email, union considerations for field expense policies, multi-country compliance (8 countries with different regulations), and the COVID disruption that may have occurred during the transformation; the case study is structured with teaching objectives (what MBA students should learn), discussion questions, and analysis frameworks."
    weight: 0.35
    description: "CaseStudyNarrative"
  - type: llm_judge
    criteria: "Change management challenges are realistically portrayed — challenges include: (1) Plant workers resistant to mobile app adoption (solved by: train-the-trainer program with plant supervisors, simplified UX for common expense types, kiosk stations at plants); (2) Middle management resistance to corporate cards (solved by: liability clarity communication, phased rollout with volunteer early adopters); (3) Field workers who preferred the paper system (solved by: showing them how much faster they get reimbursed — 3 days vs. 28); (4) Union concerns about tracking and monitoring (solved by: transparent policy, union involvement in design); (5) Cultural resistance in international locations (solved by: regional champions, localized training); (6) Executive exception culture (solved by: CEO personally modeling compliance); the case study shows that technology was only 40% of the challenge — 60% was people and process change."
    weight: 0.35
    description: "ChangeManagement"
  - type: llm_judge
    criteria: "Quantified outcomes demonstrate clear ROI — the outcomes section provides before/after metrics for every KPI: processing time (28→3 days), error rate (42%→5%), employee satisfaction (2.1→8.2/10), cost per report ($92→$24), fraud detection rate (improved from $780K undetected to real-time prevention), finance FTEs (8→3, with 5 redeployed to higher-value work); financial ROI calculated: technology investment ($1.2M over 3 years), process savings ($1.8M annually — 5 FTEs × $120K + reduced error correction), fraud prevention ($250K annually), T&E spend reduction ($2.8M annually through better compliance and behavioral changes); total 3-year ROI: ($1.2M investment, $14.6M in cumulative savings = 12:1 return); the teaching points include: start with the burning platform, invest in change management equally with technology, measure continuously, and the importance of executive sponsorship."
    weight: 0.30
    description: "QuantifiedOutcomes"
