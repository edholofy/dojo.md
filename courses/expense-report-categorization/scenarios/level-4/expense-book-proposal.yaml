meta:
  id: expense-book-proposal
  level: 4
  course: expense-report-categorization
  type: output
  description: "Write a book proposal for an expense management practitioner guide — develop chapter outline, sample content, market positioning, and publisher pitch"
  tags: [book-proposal, practitioner-guide, thought-leadership, expert]

state: {}

trigger: |
  Write a book proposal for the definitive
  practitioner guide on modern expense management.

  BOOK CONCEPT:
  Title: "Beyond Receipts: Transforming Corporate
  Expense Management for the AI Age"

  TARGET AUDIENCE:
  - CFOs and VP Finance overseeing T&E programs
  - Controllers and accounting managers
  - Expense management professionals
  - Internal auditors focused on expense controls
  - Technology leaders evaluating expense platforms

  AUTHOR CREDENTIALS (you):
  - 20 years in corporate finance, last 10 focused
    on expense management
  - Former VP of Finance at a Fortune 500 (managed
    $200M T&E program)
  - Led 3 major expense system implementations
  - Published 15 articles in CFO Magazine and
    Journal of Accountancy
  - Speaker at 20+ industry conferences
  - Advisory board member for 2 expense tech
    startups

  COMPETITIVE LANDSCAPE:
  - No current book dedicated to corporate expense
    management (only chapters in general finance
    books)
  - SAP Concur publishes whitepapers but no
    comprehensive book
  - GBTA publishes research reports, not guides
  - Last relevant book published in 2015 (pre-AI,
    pre-COVID, pre-remote work)

  TARGET PUBLISHER: Wiley Finance or Harvard
  Business Review Press

  Create the complete book proposal:
  1. Overview and market positioning
  2. Chapter-by-chapter outline (12-15 chapters)
  3. Sample chapter excerpt (1,000+ words)
  4. Author platform and marketing plan
  5. Comparable titles and differentiation
  6. Timeline and specifications

assertions:
  - type: llm_judge
    criteria: "Book proposal is professionally structured and compelling — the overview positions the book as filling a significant gap (no current book on expense management despite $1.4T global spend); the market sizing shows: 500K+ finance professionals involved in expense management, 50K+ companies needing modernization guidance; the chapter outline covers 12-15 chapters progressing from fundamentals to advanced topics: (1) The Hidden Cost Center (why expense management matters), (2) The Expense Lifecycle, (3) Policy Design for the Modern Workforce, (4) GL Coding and Tax Implications, (5) Technology Selection and Implementation, (6) AI-Powered Categorization, (7) Fraud Prevention and Detection, (8) Cross-Border Compliance, (9) Analytics and Benchmarking, (10) Remote Work and the New Expense Landscape, (11) SOX Controls and Governance, (12) ESG and Sustainable Travel, (13) The Future of Expense Management; each chapter includes: 1-2 sentence description, key topics, case study or example, and estimated page count."
    weight: 0.35
    description: "BookProposalStructure"
  - type: llm_judge
    criteria: "Sample chapter excerpt demonstrates expertise and engaging writing — the excerpt (1,000+ words) balances practical guidance with narrative storytelling; includes a real-world case study or composite example that illustrates the chapter's key concepts; technical accuracy on expense management concepts (GL coding, tax rules, policy design, or technology) is demonstrated; the writing style is accessible to a business audience (not overly academic, not too informal); the excerpt includes: a compelling opening anecdote, the key framework or model being presented, practical application guidance, and a bridge to the next chapter; the writing quality suggests the author can sustain a full-length book (not just a long blog post)."
    weight: 0.35
    description: "SampleChapter"
  - type: llm_judge
    criteria: "Marketing plan and specifications are realistic — the author platform section leverages existing credentials (15 articles, 20+ conference appearances, startup advisory roles); the marketing plan includes: pre-launch (industry newsletter features, LinkedIn thought leadership, speaking engagements), launch (virtual book tour, podcast appearances, excerpt publications in CFO Magazine), post-launch (corporate bulk purchases for finance teams, university adoption for courses, continuing education credit partnerships with AICPA/IMA); comparable titles section identifies 3-5 related books and differentiates on recency, specificity, and comprehensiveness; timeline: proposal to contract (3 months), manuscript (12 months), production (6 months), publication (21 months from start); specs: 60,000-75,000 words, 12-15 chapters, 30+ case studies, templates and checklists as appendices or downloadable resources."
    weight: 0.30
    description: "MarketingPlan"
