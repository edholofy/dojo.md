meta:
  id: expense-certification-program
  level: 4
  course: expense-report-categorization
  type: output
  description: "Design a professional certification program for expense management — create curriculum, competency framework, assessment methodology, and credentialing body"
  tags: [certification, professional-development, curriculum, expert]

state: {}

trigger: |
  A professional association (Global Association
  of Finance Professionals) wants to create a
  certification for expense management specialists.
  Design the complete certification program.

  ASSOCIATION CONTEXT:
  - 50,000 members worldwide
  - Existing certifications in general accounting
    and internal audit
  - No existing expense-specific certification
  - Budget for program development: $800K
  - Target launch: 12 months from now
  - Expected initial cohort: 500 candidates

  MARKET DEMAND:
  - LinkedIn shows 15,000+ job postings mentioning
    "expense management" in past 12 months
  - Average salary for expense managers: $75K
  - With relevant certifications: $92K (23% premium)
  - No competing certification exists
  - Companies increasingly seeking specialized
    expense professionals due to compliance
    complexity, technology transformation, and
    fraud prevention needs

  CERTIFICATION REQUIREMENTS:
  - Must be rigorous enough to be valued by
    employers
  - Must be accessible to working professionals
  - Must cover both technical skills and emerging
    trends (AI, sustainability, remote work)
  - Must include practical application, not just
    theory
  - Must be globally relevant (not US-only)

  Design:
  1. Certification tiers and competency framework
  2. Curriculum and study materials
  3. Assessment methodology
  4. Delivery model (in-person, online, hybrid)
  5. Credentialing governance
  6. Marketing and enrollment strategy

assertions:
  - type: llm_judge
    criteria: "Competency framework is comprehensive and tiered — creates at least 2 certification levels: (1) Certified Expense Management Professional (CEMP) — foundational: GL coding, policy administration, receipt processing, corporate card management, basic compliance, expense system operation; (2) Certified Expense Management Expert (CEME) — advanced: enterprise strategy, system architecture, cross-border compliance, fraud investigation, analytics, AI/automation, governance, audit program design; competency domains include: (a) Expense Processing & Categorization, (b) Policy Design & Compliance, (c) Tax & Regulatory, (d) Technology & Automation, (e) Analytics & Reporting, (f) Fraud Prevention & Investigation, (g) Leadership & Strategy (CEME only); each domain has defined learning objectives with Bloom's taxonomy levels (knowledge, comprehension, application, analysis for CEMP; synthesis, evaluation for CEME); prerequisites for CEMP: 2 years related experience or finance degree; CEME: CEMP + 5 years experience."
    weight: 0.35
    description: "CompetencyFramework"
  - type: llm_judge
    criteria: "Curriculum is practical and covers emerging trends — CEMP curriculum (80-100 hours study time): expense lifecycle management, GL coding and chart of accounts, corporate card programs, receipt documentation and IRS requirements, policy design fundamentals, basic compliance (SOX, IRS Section 274), expense system administration, reporting and month-end procedures, basic fraud detection; CEME curriculum (120-150 hours): enterprise expense strategy, AI/ML in expense processing, cross-border compliance (VAT, transfer pricing, PE risk), advanced fraud investigation, system selection and implementation, organizational change management, ESG and sustainability travel tracking, remote work expense management, executive compensation expense oversight; assessment methodology includes: proctored exam (multiple choice + case studies), practical simulation (process a complex expense scenario), and continuing education requirements (30 hours every 2 years); the global relevance is ensured by including international case studies and country-specific compliance modules."
    weight: 0.35
    description: "CurriculumDesign"
  - type: llm_judge
    criteria: "Business model and launch plan are viable — delivery model: hybrid with online self-paced learning (primary), live virtual workshops (supplemental), and optional in-person bootcamps; pricing: CEMP exam $495 (study materials $295 additional), CEME exam $695 (study materials $395); annual maintenance fee $150; the $800K development budget allocation: curriculum development ($300K), technology platform ($200K), marketing launch ($150K), exam development and psychometric validation ($100K), reserve ($50K); revenue projections: 500 initial candidates × $790 average revenue = $395K Year 1; growing to 2,000 candidates/year by Year 3 = $1.58M; break-even by Year 2; marketing strategy: partnership with expense software vendors (Concur, Expensify) for employer-sponsored candidates, LinkedIn and trade publication advertising, conference presentations, employer endorsement program; governance includes: credentialing board with industry and academic representation, exam integrity procedures, and ANSI/ISO 17024 accreditation path."
    weight: 0.30
    description: "BusinessModel"
