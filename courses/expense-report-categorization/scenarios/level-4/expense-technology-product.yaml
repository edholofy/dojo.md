meta:
  id: expense-technology-product
  level: 4
  course: expense-report-categorization
  type: output
  description: "Design an expense management technology product — create product vision, feature roadmap, technical architecture, and go-to-market strategy for a next-generation expense platform"
  tags: [product-design, saas, fintech, expert]

state: {}

trigger: |
  You are the founding product manager of a
  startup building a next-generation expense
  management platform. Design the product.

  MARKET ANALYSIS:
  - Current leaders: SAP Concur (40% share),
    Expensify (15%), Brex/Ramp (growing fast),
    Navan (travel + expense), Coupa (procurement)
  - Pain points with incumbents:
    - Concur: complex, expensive, poor UX
    - Expensify: limited enterprise features
    - Brex/Ramp: card-centric, limited global
    - Navan: travel-first, expense is secondary
  - Emerging trends:
    - AI-first categorization
    - Real-time spending controls
    - Embedded corporate cards
    - Carbon footprint tracking
    - Employee experience focus
    - API-first architecture
    - Vertical-specific features

  TARGET MARKET:
  - Primary: Mid-market companies (500-5,000
    employees, $5-50M annual T&E)
  - Use case: Replace Concur or Expensify with a
    modern, AI-first platform
  - Buyer: CFO / VP Finance
  - User: Every employee who submits expenses

  COMPETITIVE DIFFERENTIATION:
  - Zero-touch expense processing (fully automated)
  - AI that learns company-specific patterns
  - Beautiful UX (consumer-grade mobile experience)
  - Real-time policy compliance (not post-facto)
  - Built-in analytics and benchmarking

  Design:
  1. Product vision and positioning
  2. MVP feature set (launch in 6 months)
  3. Full feature roadmap (18 months)
  4. Technical architecture
  5. Pricing strategy
  6. Go-to-market plan

assertions:
  - type: llm_judge
    criteria: "Product vision is compelling and differentiated — the positioning clearly articulates why this product is better than Concur (simpler, AI-powered), Expensify (more enterprise features), and Brex/Ramp (not card-dependent, more global); the 'zero-touch' vision is defined: 80%+ of expenses are auto-submitted via card transactions + OCR receipts with no manual data entry; the MVP (6-month launch) is focused and achievable: receipt OCR with AI categorization, corporate card integration, mobile-first submission, rule-based approval routing, basic reporting, and integration with top 5 accounting systems (QBO, Xero, NetSuite, Sage, SAP); the MVP deliberately excludes features that would delay launch (multi-currency, advanced analytics, carbon tracking) while delivering core value."
    weight: 0.35
    description: "ProductVision"
  - type: llm_judge
    criteria: "Technical architecture is modern and scalable — API-first design (all features accessible via API); microservices architecture with: receipt processing service (OCR + AI), card transaction ingestion, approval engine, reporting engine, integration service; the AI/ML pipeline includes: receipt image processing (orientation, quality enhancement), OCR extraction (multi-model: Google Vision + custom fine-tuned model), entity extraction (merchant, amount, date, category), GL classification (trained on company-specific data), anomaly detection; the architecture supports: multi-tenant SaaS, data residency options (US, EU, APAC for compliance), real-time card transaction processing, webhook-based integrations, and horizontal scaling; technology choices are justified (language, database, cloud provider, ML framework); security architecture includes: SOC 2 Type II, encryption at rest and in transit, role-based access, and audit logging."
    weight: 0.35
    description: "TechnicalArchitecture"
  - type: llm_judge
    criteria: "Pricing and GTM strategy are commercially sound — pricing model is competitive: per-user/month pricing with tiers (Starter: $8/user for basic features, Professional: $15/user for AI + analytics, Enterprise: custom for global/compliance features); compared to Concur ($8-25/user) and Expensify ($5-9/user); the GTM plan includes: (1) Direct sales team targeting mid-market (2 AEs at launch, growing to 8 by month 18), (2) PLG motion with free tier for small teams (<25 employees) to drive bottom-up adoption, (3) Partnership channel with accounting firms and ERP vendors, (4) Content marketing targeting CFOs and finance leaders; customer acquisition cost and lifetime value are estimated; the 18-month roadmap adds: multi-currency support (month 8), advanced analytics (month 10), carbon tracking (month 12), API marketplace (month 14), and vertical-specific features (month 16-18); milestones: 50 customers at month 6, 200 at month 12, 500 at month 18."
    weight: 0.30
    description: "PricingAndGTM"
