meta:
  id: expense-governance-framework
  level: 4
  course: expense-report-categorization
  type: output
  description: "Create an enterprise expense governance framework — establish oversight structures, policy hierarchies, control environments, and accountability mechanisms for global expense management"
  tags: [governance, enterprise-framework, accountability, expert]

state: {}

trigger: |
  A Fortune 500 company (45,000 employees,
  30 countries, $380M annual T&E) needs a
  comprehensive expense governance framework
  after a board-level inquiry into T&E spending
  controls.

  TRIGGERING EVENTS:
  - CFO discovered that T&E spending increased 28%
    year-over-year with no corresponding revenue
    growth
  - Three instances of executives booking first-
    class travel in violation of policy with no
    consequences
  - Regional offices have materially different
    policies, leading to equity complaints
  - SOX audit found 5 significant deficiencies in
    expense controls
  - Proxy advisory firm flagged excessive executive
    travel costs in compensation analysis

  CURRENT STATE:
  - Decentralized management: each region sets its
    own policies
  - No global expense committee or oversight body
  - Policy exceptions approved informally with no
    documentation
  - No regular reporting to the Board on T&E
  - Technology stack varies by region (Concur in
    Americas/EMEA, manual in APAC)
  - No benchmarking or performance metrics

  Design the governance framework:
  1. Governance structure and accountability
  2. Global policy hierarchy
  3. Control environment design
  4. Performance management and reporting
  5. Executive expense oversight
  6. Continuous improvement mechanism

assertions:
  - type: llm_judge
    criteria: "Governance structure establishes clear accountability — creates a multi-level oversight model: (1) Board Audit Committee: receives quarterly T&E summary, approves executive travel policy, reviews annual benchmarking report; (2) Global Expense Committee (chaired by CFO, members: regional CFOs, CHRO, CIO, Internal Audit VP): meets monthly, sets global policy, reviews exception trends, approves budget allocations; (3) Regional Expense Leads: implement global policy with approved local variations, report monthly to Global Committee; (4) Department Heads: accountable for departmental T&E budget, review monthly reports, approve exceptions within authority; the framework includes: RACI matrix for key expense decisions, charter for the Global Expense Committee, Terms of Reference for regional leads, and reporting cadelines; executive expenses require Board-level reporting (CEO travel reviewed by Audit Committee chair, C-suite travel reviewed by CFO + Audit Committee)."
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Global policy hierarchy balances standardization with local flexibility — three-tier policy structure: (1) Global Policy (mandatory worldwide): ethical standards, approval authorities, receipt requirements, fraud prevention, executive limits, SOX controls; (2) Regional Standards (customizable within bounds): meal limits adjusted for local cost of living, transportation modes, lodging rates per city/country, tax compliance (VAT, GST requirements), local labor law requirements; (3) Departmental Guidelines (operational flexibility): project-specific coding rules, client entertainment standards, team event budgets; the hierarchy specifies which elements are non-negotiable global standards vs. locally adjustable; the policy addresses the equity complaint by creating a transparent methodology for regional limit-setting (e.g., based on Numbeo cost-of-living index); exception process formalized: documented request → appropriate authority approval → quarterly exception review."
    weight: 0.35
    description: "PolicyHierarchy"
  - type: llm_judge
    criteria: "Control environment and executive oversight address the triggering events — each triggering event is directly remediated: (1) 28% T&E increase without revenue growth: monthly spend-vs-revenue ratio reporting to Executive Committee, automatic budget freeze triggers at thresholds; (2) Executive first-class violations with no consequences: zero-tolerance enforcement for executive policy violations with mandatory CEO/Board notification, clawback provisions; (3) Regional policy inconsistencies: global policy framework with transparent local adjustments; (4) SOX deficiencies: specific control remediation plans with testing procedures (ties to COSO framework); (5) Proxy advisory concerns: executive travel disclosure in proxy statement, comparative benchmarking; the continuous improvement mechanism includes: annual policy review cycle, quarterly benchmarking against peers, employee feedback surveys, technology roadmap aligned with governance needs, and annual third-party assessment of the governance framework effectiveness."
    weight: 0.30
    description: "ControlEnvironment"
