meta:
  id: expense-behavioral-science
  level: 4
  course: expense-report-categorization
  type: output
  description: "Apply behavioral science to expense management — design nudges, choice architecture, and behavioral interventions to improve expense compliance and reduce wasteful spending"
  tags: [behavioral-science, nudges, choice-architecture, expert]

state: {}

trigger: |
  A company wants to reduce T&E spending by 15%
  without tightening policy limits, using
  behavioral science principles instead. Design
  the intervention program.

  CURRENT STATE:
  - 3,000 employees, $24M annual T&E
  - Average business trip cost: $2,100
  - 70% of flights booked are NOT the lowest
    available fare (even when schedules are similar)
  - 55% of hotel bookings exceed the preferred
    hotel rate by 20%+
  - Meal spending averages 85% of policy limits
    (suggesting anchoring to the limit)
  - Only 30% of employees submit expenses within
    7 days (average: 16 days)
  - 40% of employees don't use the corporate
    travel booking tool (book directly, often at
    higher prices)

  BEHAVIORAL INSIGHTS AVAILABLE:
  - Research shows people anchor to policy limits
    (if limit is $150 for dinner, average is $127)
  - Loss aversion: people respond more to what
    they might lose than what they might gain
  - Social proof: showing peers' spending affects
    individual behavior
  - Default effects: people choose whatever is
    pre-selected
  - Mental accounting: how expenses are framed
    affects spending
  - Feedback loops: timely information changes
    behavior
  - Gamification: competitive elements drive
    engagement

  Design a comprehensive behavioral intervention:
  1. Nudge inventory (10+ specific nudges)
  2. Choice architecture redesign
  3. Feedback and social comparison system
  4. Gamification framework
  5. Measurement and A/B testing plan
  6. Ethical considerations

assertions:
  - type: llm_judge
    criteria: "Nudge inventory is creative and grounded in behavioral science — includes at least 10 specific nudges with the psychological principle behind each: (1) Remove policy limits from display (reduce anchoring — instead show 'typical spend for this category' which is lower than the limit); (2) Default to lowest-fare flight option in booking tool (default effect); (3) Show 'X colleagues chose this hotel at $Y/night' (social proof); (4) Display savings counter ('You've saved the company $X this quarter') (feedback + intrinsic motivation); (5) Frame expenses as costs-per-revenue-dollar ('This trip costs $0.003 of every dollar we earn') (mental accounting reframe); (6) Pre-commit mechanism: ask employees to set their own spending targets before trips (commitment bias); (7) Real-time spending notifications ('Your trip is tracking 15% over similar trips') (immediate feedback); (8) Simplify the expense submission process to reduce 16-day average (friction reduction); (9) Show environmental impact of flight choices (moral motivation); (10) Celebrate under-budget travelers publicly (positive reinforcement)."
    weight: 0.35
    description: "NudgeInventory"
  - type: llm_judge
    criteria: "Choice architecture and gamification are well-designed — the booking tool redesign includes: default sort by total cost (not departure time), preferred hotels listed first with green checkmarks, economy class pre-selected with an explicit 'opt-up' step for premium, meal venues suggested near the hotel sorted by price; the gamification framework includes: department spending leaderboards (showing savings rate, not absolute spending), individual savings badges or points, quarterly recognition for top savers, team competitions with charitable donation rewards (saves $X → company donates $Y to team's chosen charity); the system avoids perverse incentives (e.g., not rewarding people for not traveling when they should, not creating a culture where expense submission feels punitive); the ethical considerations address: is it manipulative? (distinction between nudging and coercing), does it disproportionately affect lower-ranking employees?, does it create perverse incentives (e.g., not booking necessary travel)?."
    weight: 0.35
    description: "ChoiceArchitecture"
  - type: llm_judge
    criteria: "A/B testing plan enables rigorous measurement — the testing plan includes: (1) Randomized controlled trials: employees randomly assigned to nudge vs. control groups (ensuring balance across departments and levels); (2) Specific experiments: Test A — policy limits visible vs. hidden (measure spending relative to limits); Test B — social comparison feedback vs. no feedback (measure hotel/meal spending); Test C — gamification vs. no gamification (measure booking tool usage and savings); (3) Measurement: pre-post comparison controlling for seasonality and business travel volume; primary metrics are spending per trip, booking compliance rate, and submission timeliness; (4) Sample size calculations for statistical significance (power analysis); (5) Phased rollout: pilot with one department (200 employees) for 3 months before company-wide deployment; (6) Expected outcomes: 8-15% reduction in per-trip costs without policy changes, achieving the $3.6M savings target (15% of $24M); (7) Iteration protocol: A/B tests run for 6-week cycles, winners deployed, losers refined or discarded."
    weight: 0.30
    description: "ABTestingPlan"
