meta:
  id: expense-research-program
  level: 4
  course: expense-report-categorization
  type: output
  description: "Design an expense management research program — create research agenda, data collection methodology, analysis frameworks, and publication strategy for advancing the field"
  tags: [research-program, academic-study, data-analysis, expert]

state: {}

trigger: |
  A business school is launching a research center
  focused on corporate expense management and
  travel spending. Design the research program.

  CENTER DETAILS:
  - Name: Center for Corporate Expense Innovation
  - Host: Top-20 Business School
  - Funding: $2M over 3 years (corporate sponsors
    + university)
  - Faculty: 2 finance professors, 1 behavioral
    economist, 1 data scientist
  - PhD students: 4 (2 per year)
  - Industry advisory board: 8 CFOs from Fortune
    500 companies

  RESEARCH QUESTIONS (initial):
  1. What is the relationship between expense
     policy strictness and employee satisfaction/
     retention?
  2. Do trust-based expense policies (no limits,
     post-audit) result in higher or lower
     spending than traditional policies?
  3. How has remote work changed corporate expense
     patterns — is travel spending permanently
     reduced or just redistributed?
  4. What is the true cost of expense management
     (including employee time, not just processing
     cost)?
  5. Can AI categorization reduce expense fraud or
     does it create new blind spots?

  DATA SOURCES AVAILABLE:
  - 15 corporate partners willing to share
    anonymized expense data (total: 180K employees,
    $2.1B in annual T&E)
  - SAP Concur aggregate benchmarking data
  - BLS and Census Bureau travel data
  - Academic literature on behavioral economics
    and compliance psychology

  Design:
  1. 3-year research agenda
  2. Methodology for each research stream
  3. Data governance and ethics framework
  4. Publication and dissemination strategy
  5. Industry impact and practitioner toolkit

assertions:
  - type: llm_judge
    criteria: "Research agenda is academically rigorous and practically relevant — the 3-year plan sequences research logically: Year 1 focuses on descriptive/exploratory studies (mapping the expense landscape, establishing baselines from 15 partners' data, identifying variables and patterns); Year 2 focuses on causal/experimental studies (A/B testing policy changes, natural experiments from COVID/remote work transition, behavioral interventions); Year 3 focuses on prescriptive/applied research (developing normative models, creating practitioner tools, validating frameworks); each of the 5 research questions is mapped to specific studies with: hypothesis, methodology (quasi-experimental, longitudinal, cross-sectional), required data, and expected timeline; the research addresses gaps in existing literature (most expense management research is practitioner-focused, not academic — this program bridges the gap)."
    weight: 0.35
    description: "ResearchAgenda"
  - type: llm_judge
    criteria: "Methodology is sound for each research stream — (1) Policy strictness vs. satisfaction: survey instrument + expense data correlation, with controls for industry, company size, and role; quasi-experimental design using companies that changed policies; (2) Trust-based policies: difference-in-differences analysis comparing companies before/after policy change; addresses selection bias (companies that adopt trust-based policies may differ systematically); (3) Remote work impact: interrupted time series analysis using COVID as natural experiment; distinguishes between short-term disruption and permanent changes; (4) True cost of expense management: time-and-motion study combined with activity-based costing; includes opportunity cost of employee time; (5) AI and fraud: A/B testing with AI-flagging vs. traditional audit; measures Type I and Type II errors; data governance framework includes: IRB approval, data anonymization protocols, corporate partner agreements, data security standards, and ethical guidelines for research on employee behavior."
    weight: 0.35
    description: "ResearchMethodology"
  - type: llm_judge
    criteria: "Publication and impact strategy maximizes both academic and practitioner reach — academic publications target: top finance journals (JAR, TAR, JAE), management journals (AMJ, SMJ), and information systems journals (MISQ); practitioner publications target: Harvard Business Review, MIT Sloan Management Review, CFO Magazine; the dissemination strategy includes: annual research conference bringing together academics and practitioners, quarterly research briefs for the advisory board, open-access working papers, and a practitioner toolkit (benchmarking tools, policy templates, ROI calculators) available to center sponsors; the center produces an annual 'State of Corporate Expense Management' report based on aggregated data; PhD dissertations contribute to the research streams; the industry impact section describes how findings will influence: expense policy design, technology vendor product development, regulatory guidance, and professional standards."
    weight: 0.30
    description: "PublicationStrategy"
