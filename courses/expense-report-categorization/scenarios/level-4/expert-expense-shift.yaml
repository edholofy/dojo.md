meta:
  id: expert-expense-shift
  level: 4
  course: expense-report-categorization
  type: output
  description: "Expert shift simulation — handle consulting engagement delivery, board presentation preparation, and organizational transformation in a single day"
  tags: [shift-simulation, multi-task, expert-synthesis, expert]

state: {}

trigger: |
  You are the Chief of Staff to the CFO, handling
  three strategic expense management initiatives
  on a day when the CFO is at a board meeting.

  INITIATIVE 1 — BOARD PRESENTATION
  The CFO needs talking points for the Audit
  Committee about expense management performance.
  Prepare a one-page executive brief covering:
  - Annual T&E spend ($52M) vs. budget ($48M)
  - 8.3% increase vs. 3% revenue growth
  - 3 recent fraud cases totaling $156K
  - SOX remediation progress (3 of 5 deficiencies
    resolved)
  - Technology investment ROI ($1.2M invested,
    $3.4M in savings realized)
  - Benchmarking results (company at 75th
    percentile on cost per report)
  - Recommendation for $500K additional technology
    investment

  INITIATIVE 2 — RFP EVALUATION
  Three expense management software vendors
  responded to the company's RFP. Score them:

  Vendor A (SAP Concur Enterprise):
  - Price: $22/user/month
  - Integration: Native SAP, limited other ERPs
  - AI: Basic OCR, no ML categorization
  - Mobile: Yes, full-featured
  - Global: 200+ countries, VAT reclaim built-in
  - Support: 24/7, dedicated account manager
  - Implementation: 6-9 months

  Vendor B (ExpenseAI):
  - Price: $12/user/month
  - Integration: API-first, connectors for 50+ ERPs
  - AI: Advanced ML categorization (98% accuracy)
  - Mobile: Yes, consumer-grade UX
  - Global: 45 countries, no VAT reclaim
  - Support: Business hours, ticket-based
  - Implementation: 3-4 months

  Vendor C (GlobalExpense Pro):
  - Price: $16/user/month
  - Integration: Pre-built for SAP, Oracle, NetSuite
  - AI: Moderate (OCR + rule-based categorization)
  - Mobile: Yes, functional but dated UI
  - Global: 120 countries, VAT reclaim partnership
  - Support: 24/7, shared pool
  - Implementation: 4-6 months

  INITIATIVE 3 — CRISIS RESPONSE
  A major news outlet is preparing a story about
  corporate expense waste, and your company has
  been contacted for comment. A former employee
  provided the journalist with examples of
  executive travel expenses, including a $14,000
  first-class ticket and a $4,500 hotel suite.
  Prepare the crisis response.

  Handle all three initiatives.

assertions:
  - type: llm_judge
    criteria: "Board presentation brief is executive-quality — the one-page brief is concise, data-driven, and action-oriented; leads with the $4M T&E overage ($52M vs. $48M budget) and contextualizes it against revenue growth (8.3% T&E increase vs. 3% revenue = concerning trend); the fraud section frames the $156K in recoveries as proof that controls are working, not just as a loss; SOX progress (3/5 resolved) is presented with timeline for remaining 2; the technology ROI ($3.4M savings on $1.2M investment = 2.8x return) supports the $500K additional investment request; the benchmarking at 75th percentile is positioned as 'room for improvement to reach top quartile'; the brief includes: 3-4 key metrics in a dashboard format, traffic-light status indicators, specific asks of the Audit Committee, and the CFO's recommendation; the tone is appropriate for a board audience (strategic, not operational)."
    weight: 0.35
    description: "BoardBrief"
  - type: llm_judge
    criteria: "RFP evaluation uses a structured scoring methodology — creates a weighted scoring matrix with categories: Price (15%), ERP Integration (20%), AI/Automation (20%), Mobile UX (10%), Global Coverage (15%), Support (10%), Implementation (10%); each vendor is scored 1-5 in each category with justification; Vendor A (Concur): strong on global (5) and support (5), weak on AI (2) and price (2); Vendor B (ExpenseAI): strong on AI (5) and price (5), weak on global (2) and support (3); Vendor C (GlobalExpense): moderate across all categories (3-4); the total weighted score identifies the recommended vendor; the evaluation considers: the company has SAP (Vendor A advantage), processes 12+ countries (Vendor A/C advantage), and wants AI capabilities (Vendor B advantage); the recommendation addresses trade-offs and may suggest negotiation strategies; TCO analysis includes: license cost, implementation, integration development, training, and ongoing administration."
    weight: 0.35
    description: "RFPEvaluation"
  - type: llm_judge
    criteria: "Crisis response is professionally managed — the response includes: (1) Immediate actions: gather facts about the specific expenses cited ($14K ticket, $4,500 suite), verify if they were policy-compliant or exceptions, coordinate with General Counsel and Communications; (2) Media statement: acknowledges the company takes expense management seriously, states that the company has comprehensive policies and controls, notes recent investments in improvement, without confirming or denying specific expenses (privacy); (3) Internal communication: CEO memo to employees acknowledging the inquiry, reinforcing expense policy expectations, preventing rumor speculation; (4) Proactive measures: if the expenses are indeed excessive, announce a policy review and enhanced executive expense oversight; (5) Legal considerations: the former employee may have violated NDAs or confidentiality agreements — coordinate with legal but do NOT threaten publicly; the response avoids common crisis communication mistakes: being defensive, attacking the journalist, or making promises that can't be kept."
    weight: 0.30
    description: "CrisisResponse"
