meta:
  id: expense-consulting-practice
  level: 4
  course: expense-report-categorization
  type: output
  description: "Build an expense management consulting practice — develop service offerings, methodologies, deliverable templates, and go-to-market strategy for helping organizations optimize their expense programs"
  tags: [consulting-practice, service-design, methodology, expert]

state: {}

trigger: |
  You are launching a specialized expense
  management consulting practice within a Big 4
  advisory firm. Design the practice from the
  ground up.

  MARKET OPPORTUNITY:
  - Global T&E spend: $1.4 trillion annually
  - Average company waste: 15-25% of T&E budget
  - Only 30% of mid-market companies have
    optimized expense management
  - Post-COVID: companies rethinking travel policies
  - ESG: carbon tracking on travel gaining traction
  - Remote work: fundamentally changing expense
    patterns

  TARGET CLIENTS:
  - Tier 1: Fortune 500 ($500K-$2M engagements)
  - Tier 2: Mid-market $200M-$1B revenue
    ($100K-$500K engagements)
  - Tier 3: Growth-stage companies
    ($50K-$100K engagements)

  PRACTICE REQUIREMENTS:
  - 3 core service lines
  - Proprietary methodology/framework
  - Reusable deliverable templates
  - Pricing strategy
  - First-year revenue target: $5M
  - Team: 2 partners, 4 managers, 8 consultants

  Design:
  1. Service line definitions and offerings
  2. Proprietary methodology (branded framework)
  3. Engagement delivery approach
  4. Sales and marketing strategy
  5. Team development and staffing plan
  6. First-year business plan

assertions:
  - type: llm_judge
    criteria: "Service lines are well-defined with clear value propositions — includes at least 3 service lines: (1) Expense Program Optimization (diagnostic assessment, policy redesign, process improvement, savings identification — suitable for all tiers); (2) Technology Transformation (system selection, implementation, integration, change management — primarily Tier 1 and 2); (3) Compliance and Controls (SOX remediation, fraud detection, audit program design, regulatory compliance — primarily Tier 1); potential additional lines: ESG/sustainability travel tracking, M&A integration support, managed services (ongoing outsourced expense management); each service line includes: description, target client profile, typical engagement scope, duration, team composition, and pricing range; the total addressable market for each line is estimated."
    weight: 0.35
    description: "ServiceLineDesign"
  - type: llm_judge
    criteria: "Proprietary methodology is compelling and differentiated — the branded framework (e.g., 'ExpenseIQ' or 'T&E360') includes defined phases: (1) Discovery/Diagnostic (data collection, stakeholder interviews, current state assessment); (2) Analysis (benchmarking against industry data, gap identification, opportunity quantification); (3) Design (future state architecture, policy redesign, technology requirements); (4) Implementation (system deployment, change management, training); (5) Optimization (continuous improvement, monitoring, ROI measurement); the methodology includes proprietary tools: maturity assessment scorecard (1-5 scale across 10 dimensions), savings calculator, benchmark database, policy template library; the framework is designed to be reusable across engagements while customizable to each client; deliverable templates include: executive presentation, diagnostic report, transformation roadmap, policy document, and ROI tracker."
    weight: 0.35
    description: "ProprietaryMethodology"
  - type: llm_judge
    criteria: "Business plan is financially viable — the $5M first-year target is achievable with the team of 14: utilization target for partners (40% billable), managers (60%), consultants (75%); blended billing rates by tier and role; engagement pipeline needed: 3-5 Tier 1 ($500K avg × 4 = $2M), 6-10 Tier 2 ($200K avg × 8 = $1.6M), 10-15 Tier 3 ($75K avg × 18 = $1.35M); the sales strategy includes: partnership with expense software vendors (SAP Concur, Coupa) for referrals, thought leadership content (whitepapers, webinars, conference speaking), CFO roundtable events, and leveraging existing Big 4 client relationships; the staffing plan includes hiring timeline, skill requirements (CPA, CIA, expense system certifications), and career development paths; risk factors: sales cycle length, competition from niche firms, and talent retention."
    weight: 0.30
    description: "BusinessPlan"
