meta:
  id: master-expense-shift
  level: 5
  course: expense-report-categorization
  type: output
  description: "Master shift simulation — handle thought leadership publication, global standards development, and existential challenge response in a single day that defines a career"
  tags: [shift-simulation, master-synthesis, profession-defining, master]

state: {}

trigger: |
  You are the world's foremost authority on
  corporate expense management. Today, three
  events converge that will define the future of
  the profession.

  EVENT 1 — KEYNOTE ADDRESS
  You are delivering the opening keynote at the
  Global Finance Leadership Summit (5,000
  attendees, livestreamed to 50,000). Your topic:
  "The Death and Rebirth of the Expense Report."
  The audience includes CFOs from 40 countries,
  regulators, technology founders, and media.

  Your thesis: the traditional expense report is
  dead — killed by AI, real-time controls, and
  trust-based cultures. But something more
  powerful is being born: intelligent spending
  governance that makes organizations more
  effective, more ethical, and more human.

  Write the 20-minute keynote with 3 acts:
  Act 1: The autopsy (what killed the expense report)
  Act 2: The birth (what's replacing it)
  Act 3: The call to action (what leaders must do)

  EVENT 2 — REGULATORY CRISIS
  During the conference, breaking news: the EU
  has proposed a regulation requiring real-time
  reporting of all corporate expenses above €500
  to tax authorities — effectively creating a
  government surveillance system for corporate
  spending. The US Treasury is considering
  something similar. Multiple CFOs in the audience
  are panicking.

  You are asked to lead an emergency panel
  discussion with 3 other experts. Prepare your
  opening statement and recommendations for how
  the profession should respond.

  EVENT 3 — LEGACY MOMENT
  After the conference, a young professional
  approaches you. She's 25, just started as an
  AP clerk — exactly where you were 35 years ago.
  She asks: "With AI doing everything, is there
  still a future in this field? Should I stay or
  pivot to something else?"

  Write your response — this is the mentoring
  moment that will shape the next generation.

assertions:
  - type: llm_judge
    criteria: "Keynote is powerful and memorable — Act 1 opens with a dramatic image or statistic that captures attention (e.g., 'In 1990, I processed my first expense report. It took 4 hours, 3 signatures, and one shoebox of receipts. Last week, an AI processed 50,000 expense reports in the time it took me to have lunch.'); the autopsy identifies the killers: (1) AI eliminated manual categorization, (2) corporate cards eliminated receipt submission, (3) real-time controls eliminated post-facto approval, (4) trust cultures eliminated the assumption of guilt; Act 2 describes the new paradigm: intelligent spending governance where technology handles compliance while humans focus on strategy, ethics, and value creation; specific examples of companies already operating this way; Act 3 calls CFOs to action: embrace the transformation, invest in technology and talent, redesign for trust, and lead the profession forward; the keynote has emotional resonance — it's not just about systems and controls, it's about the human relationship between organizations and the people who spend on their behalf."
    weight: 0.35
    description: "KeynoteAddress"
  - type: llm_judge
    criteria: "Regulatory crisis response balances compliance advocacy with privacy protection — the opening statement acknowledges the legitimate government interest in tax compliance while raising serious concerns about corporate privacy, data security, and administrative burden; the analysis covers: (1) The EU proposal's scope and impact (real-time reporting of €500+ expenses would cover millions of transactions daily); (2) Privacy implications under GDPR (ironic — the EU would be collecting detailed spending data that GDPR restricts for private entities); (3) Competitive disadvantage (EU companies would face reporting burden that US/Asian competitors don't); (4) Technical feasibility (current systems aren't built for real-time tax authority reporting); (5) Alternative approaches that achieve compliance goals without surveillance (e.g., AI-powered audit selection, third-party platform reporting, random sampling); the recommendations include: industry coalition response, engagement with regulators on practical alternatives, pilot program proposal, and cross-border coordination through OECD; the tone is constructive, not combative — working with regulators, not against them."
    weight: 0.35
    description: "RegulatoryCrisisResponse"
  - type: llm_judge
    criteria: "Mentoring response is genuine, inspiring, and strategically sound — the response to the young AP clerk is personal and authentic (draws on the speaker's own career journey); it acknowledges her legitimate concern (AI is transforming the field) while reframing the opportunity; the advice includes: (1) 'The field isn't dying — it's evolving. The clerks who survived the last technology wave became the managers who understood both the human and technical sides'; (2) Specific skills to develop: AI literacy, data analytics, behavioral understanding, cross-border compliance, strategic thinking; (3) The things AI can't do: build relationships with department heads, exercise judgment in ambiguous situations, design policies that balance competing values, lead organizational change; (4) Career path guidance: use the AP clerk role to understand the full expense lifecycle, then specialize (technology, compliance, analytics, or strategy); (5) A broader philosophical message about finding meaning in work that most people overlook — expense management touches every employee, every day, and getting it right makes organizations more effective and more humane; the response avoids being patronizing or unrealistically optimistic — it's honest about challenges while inspiring about possibilities."
    weight: 0.30
    description: "MentoringMoment"
