meta:
  id: expense-graduate-program
  level: 5
  course: expense-report-categorization
  type: output
  description: "Design a graduate-level course on corporate expense management — create syllabus, case studies, research assignments, and assessment methodology for an MBA elective"
  tags: [graduate-program, mba-course, curriculum-design, master]

state: {}

trigger: |
  Design a full-semester MBA elective course on
  "Strategic Expense Management in the Digital Age"
  for a top-20 business school.

  COURSE CONTEXT:
  - MBA program, second-year elective
  - 14-week semester, 2 sessions per week (1.5
    hours each)
  - Class size: 40 students
  - Prerequisites: Financial Accounting, Managerial
    Accounting
  - Mix of students: 40% finance career track,
    30% consulting, 20% tech/ops, 10% other

  LEARNING OBJECTIVES:
  1. Understand the strategic role of expense
     management in corporate finance
  2. Apply analytical frameworks to T&E optimization
  3. Evaluate technology solutions for expense
     management
  4. Design control environments balancing risk and
     efficiency
  5. Lead expense management transformation
     initiatives

  AVAILABLE RESOURCES:
  - Guest speakers from industry (CFOs, expense
    tech founders, Big 4 partners)
  - Access to anonymized corporate expense datasets
  - Expense management software demo environments
    (Concur, Expensify, Brex)
  - Published case studies from HBS, Stanford, and
    Wharton (on related topics)

  Design:
  1. Complete syllabus with weekly schedule
  2. Assessment structure (exams, projects, participation)
  3. Case studies (original, 3 custom cases)
  4. Final project specifications
  5. Reading list (academic and practitioner)
  6. Guest speaker schedule and integration

assertions:
  - type: llm_judge
    criteria: "Syllabus is comprehensive and well-sequenced — the 14-week schedule covers: Weeks 1-2 (Foundation): expense management landscape, the T&E ecosystem, financial reporting of expenses; Weeks 3-4 (Policy & Compliance): policy design, regulatory environment (IRS, SOX, international), behavioral aspects of compliance; Weeks 5-6 (Technology): expense management platforms, AI/ML applications, system evaluation and selection; Weeks 7-8 (Analytics & Optimization): data analytics in expense management, benchmarking, predictive analytics; Week 9 (Mid-term case presentation); Weeks 10-11 (Global & Strategic): cross-border compliance, M&A integration, organizational transformation; Weeks 12-13 (Emerging Topics): ESG and sustainable travel, remote work implications, future of expense management; Week 14 (Final presentations); each session has: learning objectives, assigned readings, discussion questions, and an activity (case discussion, software demo, data analysis exercise); the course builds from technical foundations to strategic leadership."
    weight: 0.35
    description: "SyllabusDesign"
  - type: llm_judge
    criteria: "Assessment structure develops practical skills — includes: (1) Individual assignments (30%): 3 assignments — expense policy analysis (critique a real company's policy), technology evaluation memo (evaluate an expense platform using a framework), and expense data analysis (use dataset to identify optimization opportunities); (2) Mid-term case presentation (20%): team of 4 presents analysis of a custom case study with recommendations; (3) Final project (35%): teams of 4 develop a comprehensive expense management transformation proposal for a real organization (partner company provides anonymized data); deliverables include: diagnostic assessment, transformation roadmap, technology recommendation, financial business case, and implementation plan; (4) Class participation (15%): quality of case discussion contributions, peer evaluation; the custom case studies include: (a) NovaChem — manufacturing company with legacy expense processes (transformation challenge), (b) TechVelocity — high-growth startup designing expense policy from scratch (greenfield design), (c) MegaBank — regulated financial institution balancing compliance with efficiency (regulated industry challenge)."
    weight: 0.35
    description: "AssessmentStructure"
  - type: llm_judge
    criteria: "Reading list and guest speakers enhance learning — the reading list includes: academic articles (behavioral economics of spending, agency theory applied to expense management, information asymmetry in corporate spending), practitioner publications (GBTA research reports, J.P. Morgan T&E benchmark studies, McKinsey articles on procurement), books (recommended text covering finance fundamentals plus selected chapters from behavioral economics and organizational change books); guest speakers are integrated with relevant course topics: Week 2 — CFO discussing the strategic importance of T&E; Week 5 — expense tech founder on AI in expense management; Week 8 — Big 4 partner on expense audit and fraud; Week 11 — Global controller on cross-border challenges; Week 13 — futurist or thought leader on the evolving workspace; each guest speaker session includes: pre-session preparation, moderated Q&A, and a reflection assignment; the final project connects theory to practice with partner companies providing real feedback on student proposals."
    weight: 0.30
    description: "ReadingListAndSpeakers"
