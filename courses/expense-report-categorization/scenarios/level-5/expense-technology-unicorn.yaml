meta:
  id: expense-technology-unicorn
  level: 5
  course: expense-report-categorization
  type: output
  description: "Create a venture pitch for a next-generation expense management platform — develop the business plan, technical vision, market strategy, and fundraising materials for a potential unicorn"
  tags: [venture-pitch, startup, fundraising, master]

state: {}

trigger: |
  Create a Series A pitch deck and supporting
  materials for "ZeroExpense" — a startup aiming
  to eliminate the concept of expense reports
  entirely.

  COMPANY VISION:
  ZeroExpense doesn't manage expense reports — it
  eliminates them. Through a combination of
  intelligent corporate cards, real-time policy
  enforcement, and AI-powered automation, business
  spending happens within pre-approved boundaries
  with zero manual submission required.

  FOUNDING TEAM:
  - CEO: Former VP Finance at a Fortune 500
    (managed $200M T&E), 2 prior exits
  - CTO: Former ML lead at Stripe, built payment
    fraud detection at scale
  - CPO: Former Head of Design at Expensify,
    obsessed with eliminating friction
  - Head of Sales: Former enterprise sales at SAP
    Concur, knows every pain point

  TRACTION (12 months since founding):
  - MVP launched 6 months ago
  - 45 paying customers (250-2,000 employees each)
  - $1.8M ARR, growing 25% month-over-month
  - Net revenue retention: 135%
  - NPS: 82 (vs. industry average of 23)
  - Zero-touch rate: 78% of expenses require no
    human action
  - Average customer saves 340 admin hours/year

  THE ASK:
  - Raising $25M Series A
  - Lead investor: top-tier VC (Sequoia, a16z, or
    Index)
  - Use of funds: engineering (50%), sales (30%),
    ops (20%)
  - 18-month runway to Series B milestones

  Create:
  1. Pitch deck narrative (15 slides)
  2. Financial model summary (5-year projections)
  3. Competitive positioning map
  4. Technical differentiation deep-dive
  5. Customer success stories (2 case studies)
  6. Objection handling document

assertions:
  - type: llm_judge
    criteria: "Pitch deck narrative is compelling and investor-ready — the 15-slide structure follows best practices: (1) Title/hook, (2) Problem (expense reports waste $1.4T in productivity annually), (3) Why now (AI + embedded fintech convergence), (4) Solution (zero-touch expense management), (5) Product demo/screenshots, (6) How it works (3-step explanation), (7) Market size (TAM/SAM/SOM calculation — TAM: $16B expense management market, SAM: $5B mid-market, SOM: $500M achievable), (8) Traction ($1.8M ARR, 45 customers, 25% MoM growth), (9) Business model (per-user SaaS + card interchange revenue), (10) Competitive landscape (2x2 matrix positioning), (11) Team (exceptional founder-market fit), (12) Go-to-market (PLG + enterprise sales), (13) Financial projections (path to $100M ARR), (14) The ask ($25M for 18 months), (15) Vision (a world without expense reports); the narrative has a clear story arc and emotional hook."
    weight: 0.35
    description: "PitchDeckNarrative"
  - type: llm_judge
    criteria: "Financial model is credible and demonstrates venture-scale opportunity — 5-year projections show: Year 1 (current): $2.5M ARR; Year 2: $12M ARR (land 200 customers, expand existing); Year 3: $45M ARR (enterprise segment, international); Year 4: $110M ARR (market leadership in mid-market); Year 5: $250M ARR (expand to enterprise); the unit economics are attractive: CAC $15K (blended), LTV $120K, LTV/CAC >8x; gross margin 80%+ (SaaS + interchange); the model shows a path to profitability by Year 4-5 but prioritizes growth; the dual revenue model (SaaS + card interchange) is explained: SaaS provides predictable revenue, interchange provides transaction-linked upside; the burn rate is manageable: $25M provides 18-month runway to reach $15-20M ARR (Series B milestones); the competitive positioning map places ZeroExpense in the 'high automation + great UX' quadrant vs. Concur (low automation, low UX), Brex (moderate automation, high UX), Expensify (moderate automation, moderate UX)."
    weight: 0.35
    description: "FinancialModel"
  - type: llm_judge
    criteria: "Technical differentiation and objection handling are thorough — the technical deep-dive explains the core ML pipeline: real-time transaction classification (99.2% accuracy using merchant data + card data + user context), policy compliance engine (checks 50+ rules in <100ms per transaction), anomaly detection (catches 94% of policy violations before they're submitted), and the zero-touch workflow (card transaction → auto-categorize → auto-match-receipt → auto-approve if compliant → done); the customer case studies show: (a) a 500-person tech company that eliminated 95% of expense report submissions and saved 2,100 admin hours in the first year, (b) a 1,200-person services firm that reduced processing costs from $62/report to $8/report; the objection handling document addresses investor concerns: 'What about Brex/Ramp?' (they're card companies adding expense features — we're an expense company that happens to issue cards), 'Can you sell to enterprise?' (current largest customer has 2,000 employees, enterprise playbook planned for Year 2), 'What's the moat?' (data network effects — each customer's data improves the model for all customers)."
    weight: 0.30
    description: "TechnicalAndObjections"
