meta:
  id: global-expense-standards
  level: 5
  course: expense-report-categorization
  type: output
  description: "Develop global expense management standards — create an international framework for corporate expense reporting, compliance, and governance that harmonizes practices across jurisdictions"
  tags: [global-standards, international-framework, harmonization, master]

state: {}

trigger: |
  The International Federation of Accountants
  (IFAC) has commissioned you to draft global
  standards for corporate expense management.
  Currently, there are no international standards
  — each country has its own tax rules, and each
  company creates its own policies.

  SCOPE:
  - Standards applicable to publicly traded
    companies worldwide
  - Cover: expense classification, documentation,
    controls, reporting, and disclosure
  - Must accommodate different legal and tax
    regimes without dictating specific tax treatment
  - Should be principles-based (like IFRS) rather
    than rules-based (like US GAAP)

  STAKEHOLDERS:
  - Corporate preparers (CFOs, controllers)
  - External auditors
  - Tax authorities (IRS, HMRC, ATO, NTA, etc.)
  - Investors and analysts
  - Regulatory bodies (SEC, FCA, ASIC, etc.)
  - Employee representatives
  - Technology vendors

  CURRENT CHALLENGES:
  - No common taxonomy for expense categories
    (making peer comparison impossible)
  - No minimum documentation standards (varies from
    receipt-optional to full substantiation)
  - No standard for expense disclosure in financial
    statements (T&E is often buried in SG&A)
  - Different approaches to expense policy
    governance (some regulated, most voluntary)
  - Cross-border expense allocation lacks
    consistency (transfer pricing implications)

  Draft the global standard including:
  1. Preamble and scope
  2. Core principles (5-7 principles)
  3. Expense classification standard
  4. Documentation and substantiation requirements
  5. Control and governance framework
  6. Disclosure requirements
  7. Implementation guidance
  8. Transition provisions

assertions:
  - type: llm_judge
    criteria: "Core principles are sound and globally applicable — includes 5-7 principles such as: (1) Transparency: all material expense categories should be separately identifiable in financial reporting; (2) Substantiation: expenses must be supported by evidence proportionate to their materiality and risk; (3) Authorization: expense approval structures should reflect organizational risk tolerance with appropriate segregation of duties; (4) Classification Consistency: expenses should be classified in a manner that enables meaningful period-over-period and peer comparison; (5) Proportionality: the cost of controls should not exceed the risk they mitigate; (6) Accountability: individuals and organizations should maintain clear responsibility for expense decisions and their consequences; (7) Technology Neutrality: standards should not mandate specific technologies but should recognize technology-enabled controls as equivalent to manual controls; the principles are principles-based like IFRS, allowing local implementation flexibility while ensuring global comparability."
    weight: 0.35
    description: "CorePrinciples"
  - type: llm_judge
    criteria: "Expense classification standard creates a usable global taxonomy — the standard defines a hierarchical classification: Level 1 (mandatory disclosure): Travel & Transportation, Accommodation, Meals & Hospitality, Professional Services, Technology & Equipment, Training & Development, Client & Business Development, Administrative; Level 2 (recommended): sub-categories within each Level 1 (e.g., Travel subdivides into Air, Ground, Rail, Maritime); Level 3 (optional): granular codes for internal management; the taxonomy includes: unique identifier codes, descriptions, inclusion/exclusion guidance, and mapping examples to common national GL structures (US, UK, Germany, Japan, Australia); the documentation standard sets minimum requirements by materiality: expenses under a threshold (locally defined) require vendor/date/amount; moderate expenses add business purpose; high-value expenses add attendee details and pre-authorization evidence; the standard accommodates different national receipt requirements while setting a minimum global floor."
    weight: 0.35
    description: "ClassificationStandard"
  - type: llm_judge
    criteria: "Governance framework and disclosure requirements are practical — the governance framework requires: (1) Board-level oversight of expense policies (annual review and approval); (2) Segregation of duties in expense processing; (3) Regular monitoring and reporting to management; (4) Periodic independent review (internal or external audit); (5) Whistleblower mechanisms for expense-related concerns; the disclosure requirements specify: publicly traded companies must disclose (in annual report or notes): aggregate T&E expense by Level 1 category, T&E as percentage of revenue and operating expenses, executive T&E expense (individually for CEO, aggregate for other named executives), significant changes in T&E policies during the period, and material expense-related control deficiencies; the implementation guidance provides: a phased adoption timeline (2 years for large companies, 3 years for mid-market), sample policy templates aligned with the standard, a self-assessment checklist for compliance, and jurisdictional annexes mapping the standard to local requirements for major economies."
    weight: 0.30
    description: "GovernanceAndDisclosure"
