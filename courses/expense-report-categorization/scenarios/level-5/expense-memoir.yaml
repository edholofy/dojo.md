meta:
  id: expense-memoir
  level: 5
  course: expense-report-categorization
  type: output
  description: "Write a professional memoir reflecting on a career in expense management — capture the evolution of the field, key moments, mentorship lessons, and wisdom for the next generation"
  tags: [memoir, career-reflection, professional-wisdom, master]

state: {}

trigger: |
  Write the opening chapters of a professional
  memoir from the perspective of a retiring
  expense management executive who spent 35 years
  in the field, from paper receipts to AI-powered
  automation.

  CHARACTER: Margaret O'Brien
  - Started as an AP clerk in 1990 at a large
    bank, manually processing paper expense reports
  - Rose through the ranks: AP Supervisor (1996),
    Expense Manager (2002), Director of T&E (2008),
    VP of Financial Operations (2015), SVP and
    Chief Expense Officer (2020, a title she created)
  - Managed expense programs at 3 Fortune 500
    companies
  - Implemented 5 major system transformations
  - Caught the largest expense fraud case in her
    industry ($2.3M scheme by a regional VP)
  - Mentored 40+ professionals who now lead expense
    teams worldwide
  - Served on FASB advisory committee for expense
    reporting standards
  - Retiring at age 60, with the field
    unrecognizable from when she started

  KEY MOMENTS TO INCLUDE:
  1. First day on the job (1990): processing paper
     expense forms by hand, the shoebox of receipts
  2. The SAP implementation (1998): first expense
     management software, fear and resistance
  3. The fraud discovery (2006): unraveling the
     $2.3M scheme, the human impact
  4. Going global (2012): harmonizing expense
     policies across 30 countries after a merger
  5. The trust experiment (2018): implementing a
     trust-based policy — the backlash and the
     breakthrough
  6. The AI revolution (2023): when machines started
     doing what she'd spent decades mastering
  7. Retirement reflection (2025): what the field
     means, what it taught her about organizations

  Write Chapters 1-3 (approximately 4,000 words
  total) covering moments 1-3.

assertions:
  - type: llm_judge
    criteria: "Memoir writing is engaging and authentic — Chapter 1 captures the visceral experience of 1990s expense processing: the physical reality of paper forms, triplicate carbon copies, rubber-stamped approvals, manila envelopes of receipts, adding machine tapes, and the filing cabinets; Margaret's voice is established: practical, observant, detail-oriented, with a dry humor about the absurdities of bureaucracy; the chapter introduces her mentor (an older AP supervisor who taught her 'every receipt tells a story about someone's day'); the writing evokes both the tedium and the satisfaction of getting numbers to balance; the first day establishes themes that will recur throughout the memoir: the importance of attention to detail, the human stories behind transactions, and the tension between control and trust."
    weight: 0.35
    description: "MemoirWritingQuality"
  - type: llm_judge
    criteria: "The SAP implementation chapter captures organizational change dynamics — Chapter 2 portrays the 1998 system implementation as a cultural earthquake: employees who'd processed expenses the same way for 20 years resisting the new system; the chapter honestly depicts the difficulties (data migration disasters, training sessions with resistant users, the week the system crashed and they had to process 800 reports by hand); Margaret's growth as a leader is shown — she goes from being skeptical of the technology to becoming its champion; the chapter includes specific technical details about early expense software that feel authentic (green-screen interfaces, dial-up connectivity, batch processing overnight); the broader lesson emerges: technology transformation is really about people transformation; the chapter includes at least one memorable character (a holdout who finally embraces the system, or a young enthusiast who sees possibilities others miss)."
    weight: 0.35
    description: "SystemImplementationChapter"
  - type: llm_judge
    criteria: "The fraud discovery chapter is compelling narrative non-fiction — Chapter 3 reads like a detective story: Margaret notices something wrong (a pattern, an anomaly, something that doesn't add up); the investigation unfolds gradually, with false leads and moments of doubt; the human element is central: the VP who committed the fraud is someone she knows and respects, making the discovery personally painful; the scheme is technically detailed enough to be educational (how the VP created fictitious vendors, submitted fake receipts, exploited approval workflow gaps, and concealed the fraud for 4 years); the aftermath explores the organizational impact (loss of trust, policy changes, personal consequences for the VP and their family); Margaret grapples with the ethical dimensions: the obligation to report vs. the human cost of investigation; the chapter connects to the broader theme of why controls exist — not because people are inherently dishonest, but because systems must be designed to protect honest people from the consequences of a few bad actors."
    weight: 0.30
    description: "FraudDiscoveryChapter"
