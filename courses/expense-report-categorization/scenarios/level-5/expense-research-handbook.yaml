meta:
  id: expense-research-handbook
  level: 5
  course: expense-report-categorization
  type: output
  description: "Write a research methodology handbook for studying expense management — define research paradigms, data collection methods, ethical frameworks, and analysis techniques specific to corporate spending research"
  tags: [research-handbook, methodology, academic, master]

state: {}

trigger: |
  Write a comprehensive research methodology
  handbook for academics and practitioners studying
  corporate expense management. This will be the
  first dedicated research methods guide for this
  emerging field.

  HANDBOOK PURPOSE:
  Expense management research sits at the
  intersection of accounting, behavioral science,
  information systems, and organizational behavior.
  No existing methodology guide addresses the
  unique challenges of studying corporate spending.

  UNIQUE METHODOLOGICAL CHALLENGES:
  1. Data sensitivity — expense data reveals
     employee behavior, making access difficult
  2. Heterogeneity — every company has different
     policies, systems, and cultures
  3. Measurement — "good" expense management is
     hard to define and measure
  4. Causality — many confounding variables affect
     spending patterns
  5. Temporal — expense patterns change with seasons,
     economic cycles, and pandemics
  6. Ethics — studying expense behavior raises
     surveillance and privacy concerns
  7. Generalizability — findings from one company
     may not apply to another

  TARGET AUDIENCE:
  - PhD students in accounting, IS, and OB
  - Faculty launching expense management research
  - Corporate research teams (internal analytics)
  - Consulting firms conducting expense studies
  - Policy researchers studying fiscal governance

  Write chapters covering:
  1. Research paradigms for expense management
  2. Quantitative methods (with expense-specific
     applications)
  3. Qualitative methods (interviewing, ethnography)
  4. Mixed methods approaches
  5. Data collection and access strategies
  6. Ethical considerations and IRB guidance
  7. Common pitfalls and how to avoid them

assertions:
  - type: llm_judge
    criteria: "Research paradigms are well-defined and appropriate — identifies 3-4 paradigms applicable to expense management research: (1) Positivist/quantitative: hypothesis testing using large expense datasets (e.g., does policy strictness correlate with spending levels?), applicable when large datasets are available from corporate partners or vendors; (2) Interpretivist/qualitative: understanding the meaning and experience of expense management through interviews and ethnography (e.g., how do employees make spending decisions?), applicable when exploring new phenomena or cultural dimensions; (3) Design science: building and evaluating expense management artifacts (systems, policies, controls) (e.g., does a new AI categorization system improve accuracy?), applicable for technology-focused research; (4) Critical/action research: examining power dynamics in expense control (e.g., how do expense policies differentially affect workers at different levels?); each paradigm includes: philosophical foundations, typical research questions, appropriate methods, quality criteria, and examples of published research; the handbook acknowledges that expense management research is inherently interdisciplinary."
    weight: 0.35
    description: "ResearchParadigms"
  - type: llm_judge
    criteria: "Quantitative and qualitative methods are adapted for expense contexts — quantitative methods cover: regression analysis for spending determinants (controlling for company size, industry, geography), difference-in-differences for policy change studies (pre/post policy implementation), RCT design for behavioral interventions (A/B testing nudges), survival analysis for expense fraud detection (time-to-detection models), panel data methods for multi-company studies; expense-specific adaptations include: handling right-censored data (expenses not yet submitted), seasonality adjustment methods, outlier treatment for legitimate high-value expenses vs. anomalies, and Benford's Law application for digit distribution analysis; qualitative methods include: semi-structured interviews with expense submitters and approvers, think-aloud protocols for expense categorization decisions, ethnographic observation of expense processing teams, document analysis of policy evolution, and focus groups for understanding compliance attitudes; the data collection chapter provides practical guidance on negotiating corporate data access agreements."
    weight: 0.35
    description: "MethodsAdaptation"
  - type: llm_judge
    criteria: "Ethics chapter and pitfalls section address real challenges — the ethics chapter covers: (1) Privacy concerns with expense data (data reveals dining habits, travel patterns, personal spending — even anonymized data can be re-identified); (2) IRB considerations for studying employee behavior (expense research often involves identifiable employee data requiring IRB review); (3) Informed consent challenges (employees may not want their spending studied — passive data collection raises consent issues); (4) Researcher conflicts of interest (corporate sponsors may want favorable findings); (5) Publication of findings that could identify specific individuals or companies; the common pitfalls chapter addresses: survivorship bias (only studying companies that share data — these are probably better-managed), selection bias in policy studies (companies that change policies are systematically different), the ecological fallacy (company-level findings don't apply to individuals), confusing correlation with causation in spending patterns, and the Hawthorne effect (people change behavior when they know expenses are being studied); each pitfall includes: how it manifests in expense research specifically, examples from published studies, and mitigation strategies."
    weight: 0.30
    description: "EthicsAndPitfalls"
