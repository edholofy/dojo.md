meta:
  id: expense-thought-leadership
  level: 5
  course: expense-report-categorization
  type: output
  description: "Develop thought leadership on the future of expense management — write a landmark article challenging conventional wisdom about corporate spending controls and proposing a new paradigm"
  tags: [thought-leadership, future-vision, paradigm-shift, master]

state: {}

trigger: |
  Write a landmark thought leadership article for
  Harvard Business Review that challenges the
  fundamental assumptions of corporate expense
  management and proposes a new paradigm.

  ARTICLE PREMISE:
  The entire model of corporate expense management
  is fundamentally broken — not because controls
  are insufficient, but because the control-first
  mentality creates more waste than it prevents.

  KEY ARGUMENTS TO DEVELOP:

  1. THE CONTROL PARADOX
  Companies spend $58 to process a $50 expense
  report. The average employee wastes 3 hours per
  month on expense administration. For a company
  with 10,000 employees at an average burdened cost
  of $75/hour, that's $27M annually in lost
  productivity — likely exceeding the fraud and
  waste the controls prevent.

  2. THE TRUST DIVIDEND
  Companies that adopted trust-based policies (no
  pre-approval, post-audit only) report:
  - 12% lower total T&E spending (not higher)
  - 85% employee satisfaction vs. 35% average
  - 3x faster reimbursement
  - No increase in fraud rates
  - But: only works with complementary practices

  3. THE AI DISRUPTION
  AI eliminates the need for most manual controls:
  - Real-time policy compliance before spending
  - Automatic categorization removes GL errors
  - Pattern detection catches fraud that humans miss
  - Predictive budgeting replaces reactive controls
  - But: creates new risks (algorithmic bias, over-
    reliance, privacy concerns)

  4. THE HUMAN ELEMENT
  Expense management is ultimately about trust,
  culture, and values — not systems and controls.
  The best expense management is invisible expense
  management.

  Write the complete 3,000-word article with:
  1. Compelling opening and thesis statement
  2. Evidence-based arguments (4 sections)
  3. The new paradigm framework
  4. Practical implementation guidance
  5. Acknowledging counterarguments
  6. Bold conclusion and call to action

assertions:
  - type: llm_judge
    criteria: "Article is HBR-quality thought leadership — the opening hooks the reader with a provocative observation or counterintuitive data point (e.g., 'Your expense management system is your most expensive employee'); the thesis is clear and bold: the control-centric model of expense management is obsolete and should be replaced with a trust-plus-technology paradigm; the writing style is appropriate for HBR: rigorous but accessible, uses data to support arguments, includes real-world examples (anonymized), and avoids jargon; the article is approximately 3,000 words; the structure follows a logical progression from problem identification to solution to implementation; the tone is authoritative but not dismissive of current practices — acknowledges legitimate reasons for controls while arguing for a better approach."
    weight: 0.35
    description: "ThoughtLeadershipQuality"
  - type: llm_judge
    criteria: "Arguments are evidence-based and nuanced — the Control Paradox section quantifies the hidden costs of over-control (processing cost, employee time, opportunity cost, morale impact); the Trust Dividend section presents both the benefits and prerequisites for trust-based policies (strong culture, transparent data, consequences for abuse, not suitable for all organizations); the AI Disruption section is technically accurate about current AI capabilities in expense management while honestly assessing limitations; the Human Element section connects expense management to broader organizational culture and values; counterarguments are addressed fairly: regulatory requirements (SOX, IRS) that mandate certain controls, industry-specific needs (government contracting, healthcare), and the reality that some employees will abuse trust; the new paradigm is presented as a spectrum, not an all-or-nothing proposition."
    weight: 0.35
    description: "EvidenceBasedArguments"
  - type: llm_judge
    criteria: "The new paradigm framework is actionable and memorable — the framework has a clear name and structure (e.g., 'Intelligent Expense Autonomy' or 'Trust-First Expense Management'); it defines 3-4 principles or pillars that organizations can adopt; it includes a maturity model showing how to progress from control-centric to trust-centric; the practical implementation guidance provides a 12-month transition roadmap; the framework acknowledges different starting points (heavily regulated industries vs. tech startups); the conclusion is bold and forward-looking — challenges CFOs to rethink their approach; the call to action is specific (not just 'think differently' but concrete steps); the article positions the author as a leading thinker in the space without being self-promotional."
    weight: 0.30
    description: "NewParadigmFramework"
