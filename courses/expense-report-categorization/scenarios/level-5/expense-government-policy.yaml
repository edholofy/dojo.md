meta:
  id: expense-government-policy
  level: 5
  course: expense-report-categorization
  type: output
  description: "Advise government on corporate expense regulation — draft policy recommendations for improving transparency, reducing fraud, and modernizing tax treatment of business expenses"
  tags: [government-policy, regulation, public-policy, master]

state: {}

trigger: |
  The US Senate Finance Committee has requested
  testimony and policy recommendations on
  modernizing the tax treatment and regulation of
  corporate business expenses. You are testifying
  as an expert witness.

  CONTEXT:
  - Current IRS rules for business expense
    deductions largely date from the 1960s-1980s
  - The Tax Cuts and Jobs Act (2017) eliminated
    entertainment deductions but created confusion
  - COVID and remote work fundamentally changed
    business expense patterns
  - AI and digital tools make real-time compliance
    possible but aren't reflected in regulations
  - International tax competition affects how
    countries treat business expenses
  - Estimated $75B in improper business expense
    deductions annually (IRS estimate)

  COMMITTEE QUESTIONS:

  1. MODERNIZATION: How should the IRS modernize
     business expense rules for the digital age?
     - Should receipt requirements change when
       digital records exist?
     - Should AI-verified expenses be treated
       differently?
     - How should remote work expenses be handled
       in the tax code?

  2. TRANSPARENCY: Should publicly traded companies
     be required to disclose more about their T&E
     spending?
     - Current disclosure: buried in SG&A
     - Proposed: separate line item for T&E
     - Executive travel disclosure requirements

  3. SIMPLIFICATION: The current system is too
     complex — 47% of small businesses cite expense
     deduction rules as a top compliance burden.
     - Per diem vs. actuals simplification
     - Standard deduction for business expenses?
     - Harmonization with international standards

  4. ENFORCEMENT: How can the IRS better detect
     improper deductions?
     - Technology-enabled audit capabilities
     - Third-party reporting requirements
     - Penalty structure modernization

  Prepare:
  1. Written testimony (2,000+ words)
  2. Policy recommendations (10 specific proposals)
  3. Legislative language suggestions (3 key
     provisions)
  4. Economic impact analysis
  5. Response to anticipated counter-arguments

assertions:
  - type: llm_judge
    criteria: "Written testimony is authoritative and appropriately formal — the testimony follows Congressional testimony conventions: begins with qualifications and disclaimer, provides context and background, addresses each committee question directly, offers specific recommendations with supporting evidence; the tone is expert but accessible (committee members are not tax specialists); the testimony includes data and research citations (IRS studies, academic research, international comparisons); the modernization section advocates for recognizing digital records as equivalent to paper receipts (the current $75 receipt threshold was set decades ago and hasn't kept pace with technology); the remote work section addresses the post-TCJA gap — employees can't deduct home office expenses but employers can provide reimbursement under an accountable plan, creating an inequity between employees and self-employed; the testimony is approximately 2,000+ words and structured for oral delivery with a written supplement."
    weight: 0.35
    description: "WrittenTestimony"
  - type: llm_judge
    criteria: "Policy recommendations are specific and actionable — includes 10 concrete proposals: (1) Digital receipt equivalence: amend Section 274(d) to recognize digital transaction records as adequate substantiation; (2) Remote work expense deduction: create a new above-the-line deduction for remote workers' home office expenses (currently only available to self-employed); (3) Simplified per diem election: allow all businesses (not just those meeting current requirements) to use GSA per diem rates; (4) AI-verified expense safe harbor: expenses verified by IRS-approved AI systems receive reduced audit scrutiny; (5) T&E disclosure requirement: amend SEC Regulation S-K to require separate T&E line item disclosure; (6) Executive travel transparency: require proxy statement disclosure of CEO and named executive travel costs; (7) Small business standard deduction: create a $5,000 standard deduction for business expenses (like the standard deduction for individual taxes); (8) Third-party reporting: require expense management platforms to report aggregate deductions to IRS (like 1099-K); (9) International harmonization: align US rules with OECD guidelines on business expense deductibility; (10) Penalty modernization: increase penalties for fraudulent expense deductions while creating a voluntary disclosure program."
    weight: 0.35
    description: "PolicyRecommendations"
  - type: llm_judge
    criteria: "Economic impact analysis and counter-arguments are well-developed — the economic impact estimates: revenue impact of each proposal (e.g., remote work deduction: -$8B in federal revenue, but offset by increased compliance and reduced audit costs); administrative savings: digital receipt equivalence saves businesses an estimated $2B annually in compliance costs; the small business standard deduction reduces compliance burden for 28M small businesses while simplifying IRS enforcement; third-party reporting could recover $10-15B of the $75B in improper deductions; counter-arguments addressed: (1) 'This will increase the deficit' — offset by improved enforcement and compliance; (2) 'Companies will abuse disclosure requirements' — principles-based requirements with materiality thresholds prevent gaming; (3) 'AI verification isn't reliable enough' — propose a certification program for AI systems with regular audits; (4) 'Small business standard deduction is unfair to those with higher expenses' — it's elective, not mandatory; the legislative language suggestions provide specific amendment text for the top 3 recommendations."
    weight: 0.30
    description: "EconomicImpact"
