meta:
  id: expense-social-enterprise
  level: 5
  course: expense-report-categorization
  type: output
  description: "Design a social enterprise that makes expense management expertise accessible to nonprofits and small businesses — create a sustainable model for democratizing financial controls"
  tags: [social-enterprise, nonprofit, democratization, master]

state: {}

trigger: |
  Design a social enterprise that brings
  professional expense management capabilities
  to organizations that can't afford them:
  nonprofits, small businesses, and social
  enterprises.

  THE PROBLEM:
  - 85% of nonprofits lack formal expense policies
  - Small businesses (<50 employees) lose 5-7% of
    revenue to expense mismanagement
  - Most expense management tools cost $8-25 per
    user per month (unaffordable for a 10-person
    nonprofit)
  - Nonprofit fraud is a $40B annual problem, with
    expense abuse being the most common type
  - Small business owners spend 12 hours/month on
    expense administration
  - Grant-funded organizations need strict expense
    tracking for compliance but lack tools and
    expertise

  TARGET BENEFICIARIES:
  - Nonprofits (10-500 employees)
  - Social enterprises and B-Corps
  - Small businesses (<$10M revenue)
  - Grant recipients needing compliance tracking
  - Community organizations and cooperatives

  DESIGN CONSTRAINTS:
  - Must be financially self-sustaining (not
    dependent on grants long-term)
  - Technology must be simple (users may not be
    tech-savvy)
  - Must work in low-connectivity environments
  - Must support multiple languages
  - Must be deployable in developing countries
  - Cost to users must be <$2/user/month or free

  Design the social enterprise:
  1. Mission and theory of change
  2. Product/service offering
  3. Revenue model and financial sustainability
  4. Technology platform design
  5. Impact measurement framework
  6. Growth and scaling strategy

assertions:
  - type: llm_judge
    criteria: "Mission and theory of change are compelling — the theory of change connects expense management to larger social outcomes: reducing nonprofit fraud protects donor dollars and mission impact; improving small business financial management reduces failure rates (20% fail due to financial mismanagement); proper expense tracking enables grant compliance, unlocking more funding for social impact; the mission statement is clear and inspiring (e.g., 'Every organization, regardless of size or budget, deserves the financial controls to protect its mission'); the social enterprise addresses a genuine market failure — commercial expense tools are priced for enterprise customers, leaving small organizations without options; the theory of change includes: short-term (organizations adopt basic controls), medium-term (reduced fraud and waste, better compliance), long-term (healthier nonprofit sector, more efficient allocation of charitable resources)."
    weight: 0.35
    description: "MissionAndTheoryOfChange"
  - type: llm_judge
    criteria: "Product and technology design serve the target users — the product is designed for simplicity: mobile-first interface (many nonprofit workers use phones, not computers), offline capability with sync when connected, WhatsApp/SMS integration for receipt submission (photo of receipt → auto-processed), pre-built expense policies for common nonprofit types (human services, education, health, international development), grant-specific tracking (expenses tagged to specific grants with compliant reporting), multi-language support (at minimum: English, Spanish, French, Portuguese, Arabic); the technology platform is low-cost: open-source core, cloud-hosted on affordable infrastructure (or partnered with cloud providers' nonprofit programs — AWS, Google, Microsoft all offer free credits); the product tiers: Free tier (up to 10 users, basic features), Social tier ($1/user/month for 11-100 users), Professional tier ($2/user/month for 100+ users or advanced features); cross-subsidy model where enterprise customers or corporate sponsors fund free tier."
    weight: 0.35
    description: "ProductDesign"
  - type: llm_judge
    criteria: "Revenue model is financially sustainable — multiple revenue streams: (1) Paid tiers from larger nonprofits and social enterprises; (2) Corporate sponsorship program ('Adopt-a-Nonprofit' — corporations fund expense management for partner nonprofits as CSR); (3) Consulting services for larger organizations at market rates (cross-subsidizes free tier); (4) Training and certification fees for nonprofit financial managers; (5) Grant funding for initial development and international expansion (but not ongoing operations); the financial model projects: Year 1 revenue from grants + seed funding, Year 2-3 growing earned revenue, Year 4+ self-sustaining from subscription and consulting; the impact measurement framework tracks: organizations served, users active, fraud prevented (estimated), grant compliance achieved, time saved by administrators, financial health improvement (before/after metrics); the scaling strategy includes: partnership with nonprofit infrastructure organizations (like NonprofitReady, TechSoup), integration with popular nonprofit accounting tools (QuickBooks, Sage), and training-the-trainer programs for developing countries."
    weight: 0.30
    description: "RevenueAndScaling"
