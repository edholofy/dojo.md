meta:
  id: master-negotiation-shift
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Handle the ultimate shift simulation — deliver a transformative keynote on the future of real estate negotiation in a post-AI, post-settlement, climate-changed world"
  tags: [shift-simulation, transformative-keynote, future-vision, master]

state: {}

trigger: |
  Deliver a keynote at the National Association of
  Realtors Annual Conference titled: "The Last
  Negotiator: Will AI End Real Estate Negotiation
  As We Know It?"

  The provocation: By 2030, AI negotiation agents will
  handle 40% of residential real estate transactions
  without human agent involvement. What does this mean
  for 1.5 million Realtors?

  Arguments for AI dominance:
  - AI can process all comparables instantly
  - AI never gets emotional or tired
  - AI can run infinite negotiation simulations
  - AI reduces transaction costs (no commission)
  - Consumers increasingly prefer digital transactions
  - AlphaFold proved AI can solve "unsolvable" problems
  - Early AI negotiation tools already outperform avg
    agents on measurable outcomes

  Arguments for human irreplaceability:
  - Real estate is deeply emotional (life's biggest
    purchase)
  - Unique properties defy algorithmic comparison
  - Trust requires human relationship
  - Ethical judgment can't be programmed
  - AI can't handle unprecedented situations
  - Cultural and contextual nuance matters
  - The 2008 crisis proved algorithms fail catastrophically

  Your thesis: Neither extreme is right. The future
  is "Augmented Negotiation" — humans and AI together,
  each doing what they do best.

  Audience: 3,000 Realtors, many anxious about their
  future. They need:
  - Honest assessment (no false comfort)
  - Specific adaptation strategies
  - Hope grounded in reality
  - Action steps they can take TODAY

  Create:
  1. Full keynote speech (~4,500 words, 35 minutes)
  2. "Augmented Negotiation" framework
  3. Five predictions for 2030 (specific, bold)
  4. Personal action plan template for agents
  5. Q&A preparation (12 tough questions)

assertions:
  - type: llm_judge
    criteria: "Keynote is genuine oratory — has an engaging opening hook, builds narrative tension (AI threat → human value → augmented future), includes specific examples and stories, maintains hope without false comfort, and ends with a compelling call to action."
    weight: 0.35
    description: "KeynoteOratory"
  - type: llm_judge
    criteria: "Augmented Negotiation framework is intellectually rigorous — clearly defines what AI does better (data processing, pattern recognition, scenario modeling), what humans do better (empathy, ethical judgment, creative problem-solving), and how they integrate in practice."
    weight: 0.35
    description: "FrameworkRigor"
  - type: llm_judge
    criteria: "Predictions are bold but defensible, and the action plan is immediately implementable — agents leave the keynote knowing exactly what skills to develop, what tools to adopt, and how to position themselves for the augmented future."
    weight: 0.30
    description: "ActionableOutcomes"
