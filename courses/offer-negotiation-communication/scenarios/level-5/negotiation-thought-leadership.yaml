meta:
  id: negotiation-thought-leadership
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Create a negotiation thought leadership platform — develop original frameworks, influential publications, and industry authority in real estate negotiation"
  tags: [thought-leadership, original-frameworks, industry-authority, master]

state: {}

trigger: |
  You're establishing yourself as the definitive voice
  in real estate negotiation. Design your thought
  leadership strategy and create original frameworks.

  Your credentials:
  - 25 years in RE negotiation (agent → broker → consultant)
  - Harvard PON certified mediator
  - PhD in Organizational Behavior (negotiation focus)
  - 100K+ social media following
  - Regular contributor to Inman, HousingWire, WSJ
  - Co-authored the NAR negotiation ethics update
  - Analyzed 50,000+ negotiations for outcome patterns

  Competitive thought leader landscape:
  | Name             | Focus              | Gap                      |
  |------------------|--------------------|--------------------------|
  | Chris Voss       | General negotiation| Not RE-specific          |
  | Tom Ferry        | Agent coaching     | Motivation, not method   |
  | Stefan Swanepoel | Industry trends    | Strategy, not negotiation|
  | Jimmy Diresta    | Investor deals     | Niche, not comprehensive |

  Your differentiator: The only thought leader bridging
  academic negotiation science with RE-specific practice,
  backed by data from 50K+ real transactions

  Create:
  1. Three original proprietary frameworks
  2. Research publication pipeline (3-year)
  3. Content strategy and media presence plan
  4. Speaking circuit and workshop design
  5. Monetization strategy
  6. Legacy and impact measurement

assertions:
  - type: llm_judge
    criteria: "Three proprietary frameworks are genuinely original and memorable — each has a clear name, methodology, practical application steps, and research backing from the 50K transaction dataset; they build on but extend beyond existing negotiation theory (PON, Voss)."
    weight: 0.35
    description: "OriginalFrameworks"
  - type: llm_judge
    criteria: "Content strategy leverages the unique data asset — uses real negotiation outcome data to generate insights that no competitor can replicate; includes regular data releases, longitudinal studies, and market-specific analyses that establish data authority."
    weight: 0.35
    description: "DataDrivenContent"
  - type: llm_judge
    criteria: "Monetization is sustainable without compromising credibility — consulting, keynotes, certification licensing, data products, and training programs; not sponsored content or vendor partnerships that could bias recommendations."
    weight: 0.30
    description: "SustainableMonetization"
