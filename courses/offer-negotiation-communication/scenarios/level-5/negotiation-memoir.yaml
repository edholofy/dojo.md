meta:
  id: negotiation-memoir
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Write a professional memoir of a career in real estate negotiation — document the most challenging deals, ethical dilemmas, and lessons learned"
  tags: [memoir, career-narrative, lessons-learned, master]

state: {}

trigger: |
  Write the opening chapters of a professional memoir
  titled "Between the Lines: 25 Years of Real Estate
  Negotiation" for a professional publisher.

  Career arc:

  Chapter 1 — The First Offer (1999):
  - First week as an agent, first buyer, first offer
  - Made every mistake: revealed buyer's max budget,
    didn't counter the counter, missed the inspection
    deadline by 2 hours
  - The deal fell apart but the lessons were permanent
  - Mentor's words: "In negotiation, what you don't
    say matters more than what you do"

  Chapter 2 — The Deal That Changed Everything (2005):
  - Multi-million dollar deal with a celebrity client
  - Privacy demands, intermediary chains, NDA requirements
  - Competing with 6 other offers sight-unseen
  - Discovered the listing agent was leaking offer
    details to a preferred buyer
  - Ethical crisis: report the agent or use the
    information?
  - Decision: Reported to the broker, lost the deal,
    gained a reputation for integrity

  Chapter 3 — The Crash (2008-2010):
  - Watching clients go underwater
  - Short sale negotiations: fighting banks for families
  - The emotional toll of negotiating someone's home
    loss
  - Learning that negotiation is sometimes about
    minimizing harm, not maximizing gain
  - The families you couldn't help haunting you

  Chapter 4 — The Reinvention (2015-2024):
  - Technology transforming the transaction
  - Teaching negotiation at the university level
  - The NAR settlement and everything changing
  - Mentoring the next generation
  - Finding meaning in the work beyond the commission

  Write Chapters 1-2 in full (~3,000 words total) and
  outlines for Chapters 3-4.

assertions:
  - type: llm_judge
    criteria: "Chapters 1-2 are written as compelling narrative prose — specific scenes, dialogue, emotional honesty, and character development; the rookie mistakes in Chapter 1 are endearing and instructive, the ethical crisis in Chapter 2 is genuinely tense."
    weight: 0.35
    description: "NarrativeQuality"
  - type: llm_judge
    criteria: "Professional lessons are woven naturally into stories — each anecdote illuminates a negotiation principle (the cost of revealing too much, the long-term value of integrity, the human dimension of transactions) without being didactic."
    weight: 0.35
    description: "LessonsIntegration"
  - type: llm_judge
    criteria: "Chapter 3-4 outlines set up the emotional arc — the crash as the crucible that transforms the agent, the reinvention as finding deeper purpose; the NAR settlement chapter positions the career-long learner adapting one more time."
    weight: 0.30
    description: "EmotionalArc"
