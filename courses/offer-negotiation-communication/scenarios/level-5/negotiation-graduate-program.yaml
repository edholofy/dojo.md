meta:
  id: negotiation-graduate-program
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Design a graduate program in real estate negotiation — academic curriculum combining negotiation science, behavioral economics, and real estate transaction practice"
  tags: [graduate-program, academic-design, negotiation-science, master]

state: {}

trigger: |
  A law school with a strong ADR (Alternative Dispute
  Resolution) program wants to launch a joint
  LLM/MSRE degree in "Real Estate Transaction
  Negotiation and Dispute Resolution." Design it.

  University context:
  - Top-20 law school with ADR specialization
  - Adjacent business school with RE concentration
  - Clinical programs with legal aid negotiation
  - Mediation clinic handling tenant-landlord disputes
  - Proximity to major RE market
  - $3M endowment from alumni RE developer and
    retired judge

  Competitive landscape:
  | Program          | Focus            | Duration | Degree  |
  |------------------|------------------|----------|---------|
  | Harvard PON      | General          | Short    | Cert    |
  | Pepperdine Straus| ADR              | 1 year   | LLM     |
  | MIT MSRED        | RE Development   | 1 year   | MSRE    |
  | NYU Schack       | RE General       | 1.5 year | MSRE    |

  Unique value: Only program combining legal negotiation
  training with real estate transaction expertise — 
  graduates can both negotiate and resolve disputes in
  RE contexts

  Target students (25 per cohort):
  - Mid-career RE attorneys (40%)
  - Experienced RE professionals seeking legal knowledge
    (30%)
  - ADR professionals entering RE (20%)
  - International students (10%)

  Create:
  1. Joint degree curriculum (40+ credits)
  2. Clinical program design (real cases)
  3. Faculty recruitment and advisory board
  4. Research center focus areas
  5. Career placement and alumni strategy
  6. Admissions and financial model

assertions:
  - type: llm_judge
    criteria: "Curriculum integrates legal and business education — combines negotiation theory, ADR methods, RE transaction law, and business negotiation practice; clinical component provides real-world negotiation and mediation experience with actual RE disputes."
    weight: 0.35
    description: "InterdisciplinaryCurriculum"
  - type: llm_judge
    criteria: "Clinical program is innovative — students negotiate or mediate real RE disputes (tenant-landlord, contract disputes, construction defects) under supervision; partnerships with courts, RE associations, and legal aid organizations provide case flow."
    weight: 0.35
    description: "ClinicalProgramDesign"
  - type: llm_judge
    criteria: "Career placement serves diverse student profiles — RE attorneys become better negotiators, RE professionals gain legal credibility, ADR professionals enter a high-value niche; specific employer partnerships and alumni network strategy supports 95%+ placement."
    weight: 0.30
    description: "CareerPlacement"
