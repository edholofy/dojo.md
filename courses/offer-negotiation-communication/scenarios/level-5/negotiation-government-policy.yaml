meta:
  id: negotiation-government-policy
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Design government policy for fair real estate negotiation — consumer protection regulations, transparency requirements, and anti-discrimination enforcement"
  tags: [government-policy, consumer-protection, anti-discrimination, master]

state: {}

trigger: |
  The Consumer Financial Protection Bureau (CFPB) is
  drafting new regulations for real estate negotiation
  practices. You've been appointed to the advisory
  panel. Design the policy framework.

  Context:
  - Post-NAR settlement, the market is in transition
  - Consumer confusion about agent roles and compensation
  - AI negotiation tools raising new fairness questions
  - Persistent discrimination in negotiation outcomes
  - Growing institutional investor presence changing
    negotiation dynamics

  Research findings informing policy:
  | Issue                          | Data Point                |
  |--------------------------------|---------------------------|
  | Discrimination in offers       | Black sellers receive 8%  |
  |                                | fewer offers on average   |
  | Appraisal bias                 | Homes in Black neighborhoods|
  |                                | undervalued by 12-17%     |
  | Commission transparency        | 65% of consumers don't    |
  |                                | understand agent compensation|
  | Institutional advantage         | Institutional buyers win  |
  |                                | 3x more bidding wars      |
  | AI fairness                    | Early AI tools show 7%    |
  |                                | racial bias in strategy   |
  |                                | recommendations           |

  Policy areas to address:
  1. Negotiation transparency requirements
  2. Anti-discrimination in offer selection
  3. AI negotiation tool regulation
  4. Institutional investor guardrails
  5. Consumer education mandates
  6. Enforcement and complaint mechanisms

  Constraints:
  - Must not unduly burden small brokerages
  - Must respect free market principles
  - Must be enforceable with existing agency resources
  - Must survive legal challenge (constitutional)
  - Must work across state regulatory frameworks

  Create:
  1. Proposed regulatory framework
  2. Impact assessment (cost-benefit analysis)
  3. Enforcement mechanism design
  4. AI audit requirements specification
  5. Public comment response strategy
  6. Implementation timeline and phasing

assertions:
  - type: llm_judge
    criteria: "Regulatory framework balances consumer protection with market freedom — transparency requirements are meaningful (compensation disclosure, offer selection criteria), anti-discrimination measures are evidence-based, and AI regulation addresses demonstrated bias without stifling innovation."
    weight: 0.35
    description: "RegulatoryBalance"
  - type: llm_judge
    criteria: "AI audit requirements are technically specific — defines what fairness testing means for negotiation tools (disparate impact analysis across protected classes), how often audits occur, what thresholds trigger enforcement, and who conducts the audits."
    weight: 0.35
    description: "AIAuditSpecifications"
  - type: llm_judge
    criteria: "Implementation is pragmatic — phased approach gives industry time to comply, small brokerage exemptions prevent disproportionate burden, enforcement leverages existing CFPB and HUD mechanisms, and legal analysis addresses likely constitutional challenges."
    weight: 0.30
    description: "ImplementationPragmatism"
