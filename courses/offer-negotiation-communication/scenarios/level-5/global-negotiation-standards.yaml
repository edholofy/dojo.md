meta:
  id: global-negotiation-standards
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Design global standards for real estate negotiation practices — harmonize ethical standards, communication protocols, and consumer protections across countries"
  tags: [global-standards, international-harmonization, consumer-protection, master]

state: {}

trigger: |
  The International Real Estate Federation (FIABCI)
  wants to establish global real estate negotiation
  standards. Design the framework.

  Current fragmentation:
  | Country   | Agent Role    | Commission   | Regulation      |
  |-----------|---------------|-------------- |-----------------|
  | USA       | Buyer+Seller  | Negotiable    | State-by-state  |
  | UK        | Seller only   | Seller pays   | Estate Agents Act|
  | Australia | Both sides    | Negotiable    | State licensing |
  | Japan     | Both sides    | Fixed by law  | National law    |
  | Germany   | Buyer+Seller  | Split by law  | Federal law     |
  | Brazil    | Both sides    | CRECI sets    | National council|
  | UAE       | Both sides    | Fixed (2%)    | RERA regulated  |
  | France    | Mandataire    | Regulated     | Hoguet Law      |

  Key differences to harmonize:
  1. Who the agent represents (buyer, seller, both)
  2. How compensation is determined and disclosed
  3. What must be disclosed during negotiations
  4. How offers are presented (sealed, open, auction)
  5. What contingencies/conditions are standard
  6. Consumer protection and complaint mechanisms
  7. Digital transaction capabilities
  8. Cross-border transaction protocols

  Challenges:
  - Legal traditions: common law vs civil law vs mixed
  - Cultural norms: negotiation styles vary dramatically
  - Consumer expectations: vary by market maturity
  - Technology adoption: varies from paper to blockchain
  - Political will: some countries resist harmonization

  Create:
  1. Core universal principles (applicable everywhere)
  2. Tiered compliance framework (basic → advanced)
  3. Cross-border transaction protocol
  4. Consumer protection minimum standards
  5. Technology interoperability requirements
  6. Governance and enforcement structure

assertions:
  - type: llm_judge
    criteria: "Universal principles are genuinely universal — applies across all legal traditions and cultural contexts; focuses on transparency, fairness, consumer protection, and professional competency without imposing one country's system on others."
    weight: 0.35
    description: "UniversalPrinciples"
  - type: llm_judge
    criteria: "Tiered compliance allows for market maturity differences — basic tier covers fundamental consumer protections (disclosure, representation clarity), advanced tier covers sophisticated practices (digital transactions, standardized contingencies, cross-border protocols)."
    weight: 0.35
    description: "TieredCompliance"
  - type: llm_judge
    criteria: "Cross-border protocol is practically implementable — addresses language, currency, legal jurisdiction, agent licensing recognition, dispute resolution, and consumer protection when buying across borders; includes model contract clauses."
    weight: 0.30
    description: "CrossBorderProtocol"
