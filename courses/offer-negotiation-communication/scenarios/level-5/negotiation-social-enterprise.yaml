meta:
  id: negotiation-social-enterprise
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Design a social enterprise providing negotiation support to underserved homebuyers — free or low-cost expert negotiation assistance for first-generation buyers"
  tags: [social-enterprise, equity, housing-access, master]

state: {}

trigger: |
  Design a social enterprise that provides expert
  real estate negotiation support to underserved
  communities. Address the negotiation inequality
  that contributes to the wealth gap.

  The negotiation equity gap:
  - First-generation buyers pay 2-5% more than
    experienced buyers (lack of negotiation knowledge)
  - Minority buyers are 40% less likely to negotiate
    repairs after inspection
  - Low-income buyers waive contingencies at 3x the
    rate of affluent buyers (fear of losing deal)
  - Rural buyers have limited agent access and accept
    unfavorable terms more often
  - Non-English speakers face communication barriers
    during critical negotiations

  Impact: Over a 30-year mortgage, a $10,000 overpayment
  costs $22,000+ in total interest. Multiplied across
  millions of underserved buyers, this contributes
  significantly to the racial wealth gap.

  Target populations:
  - First-generation homebuyers (no family RE knowledge)
  - Communities of color (historical discrimination)
  - Low-income qualified buyers (HUD counseling eligible)
  - Immigrant and refugee communities
  - Veterans transitioning from military housing
  - Survivors of predatory lending

  Service model options:
  1. Free negotiation coaching (pre-offer through closing)
  2. Pro bono expert negotiator matching
  3. AI-assisted negotiation tool (free tier)
  4. Community negotiation workshops
  5. Advocate accompaniment to key meetings

  Funding sources:
  - HUD Housing Counseling grants
  - CRA-motivated bank partnerships
  - Foundation grants (Ford, JPM Chase)
  - Social impact bonds
  - Fee-for-service from participating lenders

  Create:
  1. Theory of change and impact model
  2. Service design for each population
  3. Technology platform for equitable access
  4. Volunteer/pro bono recruitment strategy
  5. Financial sustainability model
  6. Impact measurement framework

assertions:
  - type: llm_judge
    criteria: "Services are designed for the specific barriers each population faces — first-gen buyers need education + coaching, immigrant communities need language access + cultural bridging, predatory lending survivors need trust rebuilding + protection; not one-size-fits-all."
    weight: 0.35
    description: "PopulationSpecificDesign"
  - type: llm_judge
    criteria: "Technology platform addresses the digital divide — mobile-first design, multilingual support, simplified interfaces, offline capability for rural areas, and AI negotiation assistance that works for non-expert users."
    weight: 0.35
    description: "EquitableTechnology"
  - type: llm_judge
    criteria: "Impact measurement connects to the wealth gap — tracks not just transaction savings ($X negotiated) but long-term wealth impact (equity built, interest saved, appreciation captured), with disaggregated data by demographics."
    weight: 0.30
    description: "WealthGapImpact"
