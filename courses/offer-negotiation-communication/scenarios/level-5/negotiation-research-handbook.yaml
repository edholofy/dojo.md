meta:
  id: negotiation-research-handbook
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Create the definitive research handbook on real estate negotiation — comprehensive methodological guide bridging negotiation science and real estate practice"
  tags: [research-handbook, comprehensive-reference, academic-practitioner, master]

state: {}

trigger: |
  Cambridge University Press has commissioned "The
  Cambridge Handbook of Real Estate Negotiation."
  Design the definitive academic reference work.

  Handbook specifications:
  - 700-800 pages, 30-35 chapters
  - Mix of academic researchers (55%) and senior
    practitioners (45%)
  - Audience: Academics, doctoral students, policy
    researchers, senior industry professionals
  - Must be the definitive interdisciplinary work

  Sections to design:
  Part I: Theoretical Foundations (negotiation theory,
    behavioral economics, game theory, social psychology)
  Part II: The Real Estate Negotiation Context (market
    structures, regulatory frameworks, information
    asymmetry, agency relationships)
  Part III: Empirical Research (methodology, key
    findings, data challenges, replication issues)
  Part IV: Special Contexts (commercial, international,
    distressed, luxury, new construction, digital)
  Part V: Technology and Innovation (AI, blockchain,
    smart contracts, virtual negotiation)
  Part VI: Ethics, Policy, and Society (fairness,
    discrimination, consumer protection, regulation)
  Part VII: Future Directions (climate, affordability,
    demographic change, AI transformation)

  Gap analysis:
  - "Handbook of Negotiation" (Olekalns, 2021): General,
    not RE-specific
  - "Real Estate Transactions" (Malloy, 2020): Legal
    focus, limited negotiation science
  - "Housing Economics" (O'Sullivan, 2019): Economic
    theory, limited practice integration
  - No interdisciplinary handbook exists for RE
    negotiation specifically

  Create:
  1. Complete table of contents (30-35 chapters)
  2. Contributing author selections with justifications
  3. Sample chapter outline (one theory + one empirical)
  4. Cross-chapter integration strategy
  5. Companion digital resources
  6. Marketing and impact plan

assertions:
  - type: llm_judge
    criteria: "Table of contents is comprehensive and well-structured — 30-35 chapters across 7 sections with no significant gaps; each chapter has a clear, non-overlapping scope; progression builds from theory through empirical evidence to practice and future directions."
    weight: 0.35
    description: "TableOfContentsQuality"
  - type: llm_judge
    criteria: "Contributing author selections reference real scholars appropriately — identifies researchers in relevant fields (negotiation science, RE economics, behavioral economics, legal scholarship) with justification based on their published work and expertise."
    weight: 0.35
    description: "AuthorCredibility"
  - type: llm_judge
    criteria: "Sample chapters demonstrate the handbook's interdisciplinary approach — theory chapter connects negotiation science to RE-specific dynamics, empirical chapter addresses unique methodological challenges of studying RE negotiations (selection bias, small samples, privacy)."
    weight: 0.30
    description: "InterdisciplinaryApproach"
