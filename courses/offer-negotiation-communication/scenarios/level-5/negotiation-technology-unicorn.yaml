meta:
  id: negotiation-technology-unicorn
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Design a billion-dollar negotiation technology company — AI-powered real estate transaction platform from seed to unicorn"
  tags: [unicorn-strategy, venture-scale, ai-platform, master]

state: {}

trigger: |
  You're co-founding an AI-powered real estate
  negotiation platform. Design the path from idea
  to $1B valuation.

  Product vision: "The AI that sits at every negotiation
  table — helping agents, protecting consumers, and
  making every deal fair"

  Current state (just raised $15M Series A):
  - Revenue: $2M ARR
  - Users: 3,000 agents across 5 markets
  - Product: AI negotiation copilot (real-time strategy,
    communication drafting, outcome prediction)
  - Key metric: Users close deals 12% faster with 4%
    better outcomes (measured by client satisfaction +
    financial metrics)
  - Team: 25 (12 eng, 5 data science, 3 sales, 5 G&A)
  - NRR: 145% (strong expansion)

  Path to $1B (target: 4 years):
  - Need $100M ARR at 10x multiple
  - Required growth: ~170% CAGR
  - Must expand from agent copilot to platform

  Growth levers:
  1. Horizontal: More agents, more markets
  2. Vertical: Buyer-facing tools, seller-facing tools
  3. Platform: Negotiation-as-a-Service API for other
     PropTech
  4. Data: Negotiation intelligence data products
  5. Adjacent: Commercial RE, mortgage, title
  6. International: UK, Australia, Canada

  Risks:
  - MLS data access restrictions
  - Regulatory backlash against AI in negotiations
  - Zillow/Redfin building competitive features
  - Agent resistance to technology replacement
  - Fair Housing compliance at scale

  Create the complete unicorn strategy.

assertions:
  - type: llm_judge
    criteria: "Revenue path to $100M ARR is credible — breaks down revenue by product line, shows how agent copilot scales, identifies when platform revenue kicks in, and projects data/API revenue as high-margin growth driver."
    weight: 0.35
    description: "RevenuePathCredibility"
  - type: llm_judge
    criteria: "Competitive moat is defensible — negotiation outcome data creates a flywheel (more usage → better predictions → more users), agent workflow integration creates switching costs, and the AI model improves with scale in ways competitors can't replicate without usage."
    weight: 0.35
    description: "CompetitiveMoat"
  - type: llm_judge
    criteria: "Risk mitigation addresses the unique regulatory challenge — AI in negotiation raises Fair Housing, fiduciary duty, and unauthorized practice of law concerns; the strategy includes proactive regulatory engagement, bias auditing, and agent-in-the-loop design."
    weight: 0.30
    description: "RegulatoryRiskMitigation"
