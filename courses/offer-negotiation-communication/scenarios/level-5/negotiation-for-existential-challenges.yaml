meta:
  id: negotiation-for-existential-challenges
  level: 5
  course: offer-negotiation-communication
  type: output
  description: "Apply negotiation expertise to existential housing challenges — climate displacement, housing affordability crisis, and the AI transformation of transaction processes"
  tags: [existential-challenges, climate-displacement, affordability-crisis, master]

state: {}

trigger: |
  How will real estate negotiation fundamentally change
  in the face of existential challenges? Create a
  forward-looking analysis for a global housing summit.

  Challenge 1 — Climate Displacement Negotiation:
  - 13M Americans may need to relocate by 2050
  - Insurance withdrawal creating "uninsurable" zones
  - Managed retreat programs require government-to-
    homeowner negotiation
  - Climate migration creates receiving community
    tensions
  - Traditional negotiation assumes willing buyer/seller
    — climate displacement creates forced sellers and
    captive buyers

  New negotiation scenarios:
  - Government buyout programs (fair market value?)
  - Insurance-contingent transactions (what if coverage
    unavailable?)
  - Climate disclosure in negotiations (what must be
    disclosed about flood/fire risk?)
  - Community-level negotiations (who decides managed
    retreat?)

  Challenge 2 — Affordability Crisis Negotiation:
  - Housing costs exceed 30% of income for 50M+ US
    households
  - Institutional investors competing with individual
    buyers
  - NIMBY vs YIMBY negotiations over zoning
  - Shared equity models create new negotiation dynamics
  - Community land trusts redefine ownership negotiation

  Challenge 3 — AI Transaction Transformation:
  - AI agents negotiating on behalf of buyers/sellers
  - Algorithmic pricing replacing human judgment
  - Smart contracts auto-executing terms
  - Virtual reality changing property evaluation
  - Human role shrinking but judgment still needed

  Create:
  1. Climate displacement negotiation framework
  2. Affordability crisis: new negotiation models
  3. AI transaction: human-machine negotiation design
  4. Integrated scenario modeling (2035 vision)
  5. Policy recommendations for equitable outcomes
  6. Practitioner preparation guide

assertions:
  - type: llm_judge
    criteria: "Climate displacement framework is genuinely novel — addresses negotiations where traditional assumptions fail (willing parties, market pricing, individual transactions), proposes community-level negotiation protocols, and considers justice dimensions of forced displacement."
    weight: 0.35
    description: "ClimateDisplacementFramework"
  - type: llm_judge
    criteria: "Affordability negotiation models go beyond traditional approaches — explores shared equity negotiations, community land trust transaction dynamics, institutional vs individual buyer protections, and zoning negotiation frameworks that balance community interests."
    weight: 0.35
    description: "AffordabilityModels"
  - type: llm_judge
    criteria: "AI-human negotiation design is thoughtful — addresses what happens when AI negotiates for one party and a human for another, algorithmic fairness concerns, the role of human judgment in unprecedented situations, and regulatory frameworks for AI in transactions."
    weight: 0.30
    description: "AIHumanNegotiationDesign"
