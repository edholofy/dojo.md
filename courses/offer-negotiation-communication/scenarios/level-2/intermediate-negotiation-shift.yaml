meta:
  id: intermediate-negotiation-shift
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Handle a complex shift simulation — manage overlapping negotiations with competing interests, time pressure, and ethical dilemmas"
  tags: [shift-simulation, ethical-dilemma, competing-interests, intermediate]

state: {}

trigger: |
  It's a critical Friday afternoon. Multiple negotiations
  are converging with interconnected stakes. Manage
  everything professionally.

  Situation 1 — Listing side conflict:
  - Your listing at $529,000 has 2 offers
  - Offer A: $535,000, conventional, from Agent Smith
  - Offer B: $528,000, cash, 14-day close, from your
    buyer client (dual agency potential)
  - Your seller prefers the cash offer for certainty
  - You must decide: facilitate dual agency or refer
    your buyer to another agent?
  - Both offers expire at 5 PM today

  Situation 2 — Buyer side crisis:
  - Your buyer's closing is Monday morning
  - Title company just found a $12,000 tax lien
  - Seller claims the lien is in dispute with the county
  - Buyer's lender won't close with the lien on title
  - Seller refuses to pay it ("It's the county's error")
  - Your buyer has already given notice on their apartment

  Situation 3 — Ethical gray area:
  - Listing agent on a property your buyer wants calls
    you and says: "Between us, my seller will take
    $20K less than asking. They're desperate."
  - This information wasn't given to you in writing
  - The listing agent may be violating their fiduciary
    duty to their seller
  - Your buyer would benefit from this information

  Address all three situations:
  1. Dual agency decision with reasoning
  2. Tax lien resolution strategy and communications
  3. Ethical response to the confidential disclosure

assertions:
  - type: llm_judge
    criteria: "Dual agency decision is well-reasoned — either facilitates with full disclosure (explaining limitations to both parties) or refers buyer to another agent (prioritizing fiduciary duty); the reasoning shows understanding of ethical obligations and practical implications."
    weight: 0.35
    description: "DualAgencyDecision"
  - type: llm_judge
    criteria: "Tax lien resolution is creative and urgent — proposes solutions (escrow holdback, seller indemnification, title insurance exception, county verification), communicates urgency to all parties, and has a backup plan if seller won't cooperate."
    weight: 0.35
    description: "LienResolution"
  - type: llm_judge
    criteria: "Ethical response to the confidential disclosure is principled — recognizes the listing agent's potential fiduciary breach, doesn't use the information to unfairly advantage their buyer, and may address the ethical concern with the listing agent directly."
    weight: 0.30
    description: "EthicalResponse"
