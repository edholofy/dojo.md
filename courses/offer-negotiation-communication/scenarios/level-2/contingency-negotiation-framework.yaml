meta:
  id: contingency-negotiation-framework
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Build a contingency negotiation framework — develop systematic approaches to negotiating inspection, appraisal, financing, and home sale contingencies"
  tags: [contingency-framework, systematic-approach, risk-management, intermediate]

state: {}

trigger: |
  Your brokerage wants a standardized framework for
  negotiating contingencies. Create the comprehensive
  guide with communication templates.

  Contingency types to address:

  1. Inspection Contingency:
     - Standard periods: 7, 10, 14 days
     - Buyer leverage factors
     - Repair vs credit vs price reduction approaches
     - "As-is" with right to inspect variations
     - Walk-away thresholds

  2. Appraisal Contingency:
     - Gap coverage strategies (full, partial, none)
     - Appraisal rebuttal process
     - Pre-appraisal comparable submission
     - Waiver risks and protections

  3. Financing Contingency:
     - Pre-approval strength levels
     - Timeline management
     - Rate lock implications
     - Loan type considerations (conventional vs FHA/VA)

  4. Home Sale Contingency:
     - Kick-out clause structures
     - First right of refusal variations
     - Bridge loan alternatives
     - 72-hour vs 48-hour notice periods

  For each contingency, create:
  - Negotiation decision tree
  - Communication templates (buyer side and seller side)
  - Risk assessment checklist
  - Common mistakes to avoid

assertions:
  - type: llm_judge
    criteria: "Framework covers all four contingency types with decision trees — each contingency has a clear if/then logic for different market conditions (buyer's vs seller's market), party positions, and risk tolerance levels."
    weight: 0.35
    description: "FrameworkCompleteness"
  - type: llm_judge
    criteria: "Communication templates are ready-to-use — provides actual email/message language for common scenarios (requesting repairs, proposing credits, waiving contingencies, delivering bad news), with appropriate professional tone for each situation."
    weight: 0.35
    description: "TemplateUsability"
  - type: llm_judge
    criteria: "Risk assessment is honest — identifies when waiving contingencies is truly dangerous (financing contingency with weak pre-approval, appraisal waiver without cash reserves), not just competitive; includes common mistakes that lead to lawsuits or financial loss."
    weight: 0.30
    description: "RiskHonesty"
