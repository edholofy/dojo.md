meta:
  id: investor-offer-strategy
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Develop investor offer strategies — cash offers, assignment clauses, quick closes, and portfolio purchase negotiations"
  tags: [investor-strategy, cash-offers, portfolio-purchase, intermediate]

state: {}

trigger: |
  An experienced investor client wants to acquire 3
  rental properties in the same neighborhood. Develop
  the offer strategy and communications.

  Target properties:

  Property 1: 456 Maple — $195,000 (listed 45 days)
  - 3BR/2BA, tenant-occupied, lease ends in 4 months
  - Seller: Retiring landlord, owns free and clear
  - Current rent: $1,450/month
  - Condition: Good, well-maintained

  Property 2: 789 Elm — $168,000 (listed 22 days)
  - 2BR/1BA duplex, one side vacant
  - Seller: Out-of-state owner, managed remotely
  - Current rent: $850/unit ($850 collected, $850 vacant)
  - Condition: Fair, needs $12K in work

  Property 3: 123 Pine — $210,000 (listed 60 days)
  - 4BR/2BA, vacant, previous rental
  - Seller: Bank-owned REO
  - Last tenant vacated owing $3,200
  - Condition: Fair to poor, needs $20K renovation

  Investor's parameters:
  - All cash purchases (proof of funds: $650,000)
  - Target: 7%+ cap rate on each
  - Close in 14-21 days per property
  - Wants assignment clause in contracts
  - Budget for renovation: $35,000 total

  Create:
  1. Offer strategy for each property (different
     approaches for different sellers)
  2. Communication templates for each listing agent
  3. Portfolio discount pitch if negotiating all 3
  4. Assignment clause language and justification

assertions:
  - type: llm_judge
    criteria: "Offer strategies are tailored to each seller type — retiring landlord (emphasize quick, clean cash close preserving tenant relationship), out-of-state owner (solve their management headache), REO bank (meet their process requirements, compete on certainty not price)."
    weight: 0.35
    description: "TailoredOfferStrategies"
  - type: llm_judge
    criteria: "Communications position cash offers as solving each seller's specific problem — speed for the retiree, relief for the out-of-state owner, certainty for the bank; each emphasizes different benefits rather than using a one-size-fits-all template."
    weight: 0.35
    description: "ProblemSolvingCommunication"
  - type: llm_judge
    criteria: "Portfolio pitch and assignment clause are professionally handled — bulk discount rationale (efficiency, certainty of closing multiple), assignment clause positioned as standard investor practice with explanation of why it benefits the transaction."
    weight: 0.30
    description: "InvestorTermsHandling"
