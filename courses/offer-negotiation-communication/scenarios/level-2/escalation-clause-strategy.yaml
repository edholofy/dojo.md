meta:
  id: escalation-clause-strategy
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Design and communicate escalation clause strategies — craft competitive offers with automatic price increases while protecting your buyer's interests"
  tags: [escalation-clause, competitive-bidding, strategy, intermediate]

state: {}

trigger: |
  Your buyer wants to use an escalation clause in a
  competitive market. Design the strategy and draft
  the communications.

  Property: 567 Maple Court, listed at $415,000
  Expected competition: 4-6 offers (hot neighborhood)

  Your buyer's parameters:
  - Comfortable offer: $420,000
  - Maximum willingness: $445,000
  - Escalation increment: Needs your recommendation
  - Down payment: 25% (strong)
  - Pre-approved up to $460,000
  - Can waive appraisal contingency up to $10K gap

  Market data:
  - Last 3 sales in neighborhood: $418K, $425K, $432K
  - Average over-ask: 4.2% in this neighborhood
  - Homes in this price range: avg 3 offers

  Escalation clause considerations:
  - Some listing agents don't accept escalation clauses
  - Clause reveals buyer's maximum (strategic risk)
  - Must require proof of competing offer
  - May trigger appraisal issues at escalated price
  - Some sellers find them impersonal

  Create:
  1. Escalation clause recommendation with specific terms
  2. Cover letter strategy (personal touch with clause)
  3. Communication to listing agent about the clause
  4. Backup strategy if escalation clause is rejected

assertions:
  - type: llm_judge
    criteria: "Escalation clause terms are well-designed — recommends appropriate increment ($2,500-5,000), sets the cap at $445K, requires written proof of bona fide competing offer, and includes protections like appraisal gap coverage up to $10K."
    weight: 0.35
    description: "ClauseDesign"
  - type: llm_judge
    criteria: "Communication strategy addresses the impersonal risk — pairs the escalation clause with a personal cover letter, explains the clause to the listing agent proactively, and positions it as showing serious commitment rather than gaming the system."
    weight: 0.35
    description: "CommunicationStrategy"
  - type: llm_judge
    criteria: "Backup strategy is prepared — if listing agent rejects the clause, has a fixed-price offer ready at a strategic level (not the maximum), with alternative ways to strengthen competitiveness (appraisal waiver, faster closing, flexible possession)."
    weight: 0.30
    description: "BackupPreparation"
