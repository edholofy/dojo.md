meta:
  id: creative-deal-structuring
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Structure creative deals to bridge gaps — seller financing, lease-options, rent-backs, and non-traditional terms that solve problems neither side expected"
  tags: [creative-deals, deal-structure, problem-solving, intermediate]

state: {}

trigger: |
  A buyer and seller are $20,000 apart and traditional
  negotiation has stalled. Find creative solutions.

  Current impasse:
  - List price: $465,000
  - Buyer's max offer: $445,000
  - Seller's minimum: $460,000
  - Gap: $15,000 (from buyer's max to seller's min)

  Buyer's situation:
  - First-time buyer, maxed out on down payment ($45K)
  - Pre-approved for $450,000 (conventional)
  - Current lease expires in 3 months
  - Loves the property, won't find comparable in budget
  - Has strong income ($145K/year combined)
  - Student loans limit current borrowing power

  Seller's situation:
  - Needs $460K net to pay off mortgage + closing costs
  - Already purchased new home (closing in 6 weeks)
  - Carrying two mortgages if this doesn't sell
  - Home has been on market 35 days
  - Next showing traffic is light (seasonal slowdown)

  Explored but rejected:
  - Buyer can't increase down payment
  - Seller can't reduce below $460K (mortgage payoff)
  - Conventional lender won't stretch beyond $450K

  Create:
  1. Three creative deal structures to bridge the gap
  2. Communication presenting each option to both parties
  3. Risk analysis for each structure
  4. Recommended approach with implementation steps

assertions:
  - type: llm_judge
    criteria: "Three creative structures are genuinely different approaches — e.g., seller-held second mortgage for the gap, seller credit toward closing costs freeing up buyer cash, lease-option with portion of rent applied to purchase, or hybrid structures; each addresses the specific financial constraints."
    weight: 0.35
    description: "CreativeStructures"
  - type: llm_judge
    criteria: "Communication to both parties shows how each structure serves their interests — seller sees path to $460K+ net, buyer sees path to ownership within their budget; neither feels they're the only one making concessions."
    weight: 0.35
    description: "MutualBenefitCommunication"
  - type: llm_judge
    criteria: "Risk analysis is honest — identifies legal requirements (seller financing disclosures, Dodd-Frank compliance), tax implications, and scenarios where each structure could fail; recommended approach is the one with the best risk/reward profile."
    weight: 0.30
    description: "RiskAnalysisHonesty"
