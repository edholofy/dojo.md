meta:
  id: dual-agency-negotiation
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Navigate dual agency negotiations — manage fiduciary duties to both parties while maintaining fairness and legal compliance"
  tags: [dual-agency, fiduciary-duty, legal-compliance, intermediate]

state: {}

trigger: |
  You're in a dual agency situation — your buyer client
  wants to make an offer on your own listing. Navigate
  this carefully.

  Your listing: 890 Willow Lane, $425,000
  Your buyer's desired offer: $408,000

  Dual agency context:
  - Your state allows dual agency with written consent
  - Both parties must sign dual agency disclosure
  - You cannot share either party's confidential
    information with the other
  - You cannot advocate for one party over the other

  Seller's confidential info (you know but can't share):
  - Seller told you they'd accept $410,000
  - Seller is divorcing and needs to sell quickly
  - Seller has a backup property contingent on this sale

  Buyer's confidential info (you know but can't share):
  - Buyer would go up to $430,000
  - Buyer needs to move within 60 days
  - Buyer was pre-approved for $500,000

  Ethical challenges:
  - You know both sides' walkaway prices
  - You're incentivized by higher price (more commission)
  - Both clients expect you to advocate for them
  - Any advice could favor one party

  Create:
  1. Dual agency disclosure communication to both parties
  2. Offer presentation process (fair to both sides)
  3. Negotiation facilitation approach (neutral)
  4. Documentation strategy to protect yourself legally

assertions:
  - type: llm_judge
    criteria: "Dual agency disclosure is thorough — explains what changes (no advocacy, no confidential info sharing, no price recommendation), what stays the same (transaction management, paperwork, timeline), and gives both parties the option to seek independent representation."
    weight: 0.35
    description: "DisclosureCompleteness"
  - type: llm_judge
    criteria: "Negotiation facilitation is genuinely neutral — doesn't steer either party toward a specific price, presents objective market data instead of opinions, facilitates communication without revealing confidential information, and documents every interaction."
    weight: 0.35
    description: "NeutralFacilitation"
  - type: llm_judge
    criteria: "Documentation strategy protects the agent — records all disclosures, maintains separate communication files, documents that confidential information was not shared, and includes written acknowledgment from both parties about the limitations of dual agency."
    weight: 0.30
    description: "LegalProtection"
