meta:
  id: estate-sale-negotiation
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Navigate estate sale negotiations — work with executors, multiple heirs, probate requirements, and emotional dynamics unique to estate transactions"
  tags: [estate-sale, probate, executor-communication, intermediate]

state: {}

trigger: |
  Your buyer wants to purchase a home being sold by
  an estate. Navigate the unique challenges of estate
  negotiations.

  Property: 234 Heritage Lane, listed at $315,000
  - Home built in 1965, original owner passed away
  - Estate is being managed by 3 adult children
  - Probate court requires approval for sales under
    90% of appraised value
  - Home needs $40K+ in updates (original kitchen,
    bathrooms, carpet, HVAC)
  - Listed as-is

  Seller side dynamics:
  - Executor (oldest sibling): Wants to sell quickly,
    practical about pricing
  - Sibling 2: Emotional, feels listing price is too
    low ("Mom's house is worth more")
  - Sibling 3: Lives out of state, just wants their
    share, doesn't care about price
  - Estate attorney must approve all contract terms
  - Property appraised at $325,000 by probate appraiser

  Your buyer's offer:
  - Price: $290,000 (accounting for $40K in needed work)
  - As-is purchase
  - 45-day closing (probate needs court approval)
  - Flexible on personal property (willing to remove
    items or let estate handle)

  Create:
  1. Offer presentation strategy (who to address, tone)
  2. Justification for the $290,000 price
  3. Communication addressing the emotional sibling
  4. Timeline management for probate requirements

assertions:
  - type: llm_judge
    criteria: "Offer presentation addresses the unique estate dynamics — directed to the executor as decision-maker, acknowledges the emotional significance of the family home, and provides documentation (repair estimates, comparables) that supports the price for all three siblings."
    weight: 0.35
    description: "EstatePresentationStrategy"
  - type: llm_judge
    criteria: "Price justification is thorough and sensitive — shows $325K appraised value minus $40K+ in needed repairs = $285K adjusted value, positions $290K as fair; frames it as respecting the home's value while accounting for real condition issues."
    weight: 0.35
    description: "PriceJustification"
  - type: llm_judge
    criteria: "Communication addresses probate requirements — understands court approval timeline, minimum sale price requirements (90% of appraised = $292,500, so $290K may need adjustment), and provides a realistic closing timeline that accounts for probate processes."
    weight: 0.30
    description: "ProbateAwareness"
