meta:
  id: relocation-negotiation
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Navigate corporate relocation negotiations — work with relocation companies, guaranteed buyout programs, and employer-directed timelines"
  tags: [relocation, corporate-transfer, buyout-program, intermediate]

state: {}

trigger: |
  Your buyer is a corporate transferee with a relocation
  package. Their employer's relocation company is
  involved. Navigate this complex three-party negotiation.

  Transferee/buyer details:
  - Relocating from Chicago to your market
  - Start date at new office: 6 weeks from now
  - Relocation company: Global Mobility Solutions (GMS)
  - GMS controls: Offer terms, appraisal process,
    inspection scope
  - Employee has $15,000 relocation allowance for
    closing costs

  GMS requirements:
  - Must have 2 independent appraisals before offer
  - Offer cannot exceed average of 2 appraisals
  - GMS approval required on all counter-offers
  - GMS has 48-hour review period for all documents
  - Home warranty required (GMS pays)
  - Inspection by GMS-approved inspector only

  Target property: $389,000 listing
  - Appraisal 1: $385,000
  - Appraisal 2: $392,000
  - Average: $388,500
  - Maximum offer per GMS policy: $388,500

  Complication:
  - Seller received another offer at $392,000 (non-relo)
  - Your buyer MUST have this home (only one near
    new office meeting school requirements)
  - GMS won't approve above $388,500
  - Buyer wants to pay the $3,500 difference personally
    but GMS policy is unclear on this

  Write:
  1. Communication to GMS requesting approval/exception
  2. Communication to listing agent explaining relo
     process and proposing terms
  3. Communication to your buyer about strategy and
     realistic expectations

assertions:
  - type: llm_judge
    criteria: "GMS communication is professional and policy-aware — requests exception with specific justification (competitive market, only suitable property, employee retention value), proposes the buyer-paid gap as a compliant solution, and provides comparable data supporting the higher value."
    weight: 0.35
    description: "RelocationCompanyCommunication"
  - type: llm_judge
    criteria: "Listing agent communication explains relo constraints without revealing weakness — positions GMS backing as certainty advantage (guaranteed close, backed by Fortune 500 employer), addresses the price gap with specific solutions, and highlights non-price strengths."
    weight: 0.35
    description: "ListingAgentCommunication"
  - type: llm_judge
    criteria: "Buyer communication manages expectations — explains GMS constraints, the competing offer situation, potential out-of-pocket costs, and alternative strategies (negotiate other terms, ask employer for exception, explore nearby properties as backup)."
    weight: 0.30
    description: "BuyerExpectationManagement"
