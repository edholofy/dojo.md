meta:
  id: multi-offer-management
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Manage a multiple offer situation as the listing agent — communicate fairly, present offers objectively, and guide your seller through selection"
  tags: [multiple-offers, listing-agent, fair-process, intermediate]

state: {}

trigger: |
  You're the listing agent with 5 offers on your
  $385,000 listing. Manage the process professionally
  and guide your seller.

  Offer A:
  - Price: $395,000 | Down: 20% conventional
  - Contingencies: Inspection (7 days), appraisal
  - Close: 30 days | EMD: $10,000
  - Buyer: Pre-approved, local lender
  - Personal letter included

  Offer B:
  - Price: $405,000 | Down: 5% FHA
  - Contingencies: Inspection (10 days), appraisal,
    financing
  - Close: 45 days | EMD: $5,000
  - Buyer: Pre-approved, online lender
  - Requesting 2% seller closing cost credit

  Offer C:
  - Price: $400,000 | Down: Cash purchase
  - Contingencies: Inspection (5 days) only
  - Close: 14 days | EMD: $15,000
  - Buyer: Investor, proof of funds provided
  - As-is purchase

  Offer D:
  - Price: $392,000 | Down: 25% conventional
  - Contingencies: Inspection (7 days), appraisal
  - Close: 30 days | EMD: $8,000
  - Escalation clause: Up to $410,000 in $2,500
    increments
  - Buyer: Relocating physician, flexible on possession

  Offer E:
  - Price: $398,000 | Down: 15% conventional
  - Contingencies: Inspection (10 days), appraisal,
    home sale contingency (their home is under contract)
  - Close: 60 days | EMD: $7,500
  - Buyer: Move-up buyer from same neighborhood

  Create:
  1. Offer comparison matrix for your seller
  2. Net proceeds analysis for each offer
  3. Risk assessment for each offer
  4. Your recommendation with rationale
  5. Communication plan (what to tell each buyer's agent)

assertions:
  - type: llm_judge
    criteria: "Offer comparison matrix is comprehensive — compares all 5 offers across price, net proceeds, terms, contingencies, timeline, certainty of close, and risk; presented in a format the seller can easily understand and compare."
    weight: 0.35
    description: "ComparisonMatrixQuality"
  - type: llm_judge
    criteria: "Net proceeds and risk analysis differentiates effectively — Offer B's 2% credit reduces net significantly, Offer C's cash/quick close has certainty value, Offer D's escalation clause reveals max, Offer E's home sale contingency adds risk; each is quantified."
    weight: 0.35
    description: "AnalyticalDepth"
  - type: llm_judge
    criteria: "Communication plan treats all buyer agents professionally — doesn't reveal details of competing offers, gives each agent fair opportunity, and the recommendation considers both financial and certainty factors (not just highest price)."
    weight: 0.30
    description: "FairProcessCommunication"
