meta:
  id: new-construction-negotiation
  level: 2
  course: offer-negotiation-communication
  type: output
  description: "Negotiate new construction purchases — builder incentives, upgrade negotiations, warranty terms, and construction timeline guarantees"
  tags: [new-construction, builder-negotiation, upgrades, intermediate]

state: {}

trigger: |
  Your buyer wants to purchase a new construction home
  from a national builder. Negotiate the best deal
  beyond just the base price.

  Builder: Summit Homes (publicly traded, national)
  Community: "The Reserves at Oakwood"
  Model: "The Wellington" — 4BR/3BA, 2,400 sq ft

  Base price: $485,000
  Lot premium (cul-de-sac): $15,000
  Total before upgrades: $500,000

  Standard builder incentives (current promotion):
  - $15,000 toward closing costs if using preferred
    lender
  - Free upgraded appliance package ($4,500 value)
  - Promotion ends in 2 weeks

  Your buyer's desired upgrades:
  | Upgrade                    | Builder Price |
  |----------------------------|---------------|
  | Hardwood floors (main)     | $8,500        |
  | Quartz countertops         | $6,200        |
  | Extended patio             | $4,800        |
  | 3-car garage (from 2)     | $12,000       |
  | Smart home package         | $3,500        |
  | Premium landscaping        | $5,000        |
  | Total upgrades             | $40,000       |

  Market context:
  - Builder has 8 unsold spec homes in this community
  - Quarter-end is in 3 weeks (builders push for closes)
  - Competing community nearby offering 4% price cuts
  - Interest rates: 6.3% (builder's preferred lender
    offering 5.9% buy-down)

  Create:
  1. Negotiation strategy (what to ask for and why)
  2. Communication to builder's sales rep
  3. Upgrade prioritization with negotiation approach
  4. Analysis of preferred lender incentive vs
     independent lender

assertions:
  - type: llm_judge
    criteria: "Negotiation strategy leverages builder's position — 8 unsold specs + quarter-end pressure + competing community creates leverage; targets upgrades over base price reduction (builders protect base price for comp purposes but negotiate upgrades freely)."
    weight: 0.35
    description: "BuilderLeverageAwareness"
  - type: llm_judge
    criteria: "Communication to builder is informed and professional — references the competitive landscape, quarter-end timing, and unsold inventory without being adversarial; proposes a package deal that gives the builder a closeable transaction in exchange for meaningful concessions."
    weight: 0.35
    description: "BuilderCommunication"
  - type: llm_judge
    criteria: "Preferred lender analysis is financially rigorous — compares the 5.9% rate buy-down value against potential higher fees or less competitive terms from the preferred lender; weighs $15K closing cost credit against independent lender's potentially better overall loan terms."
    weight: 0.30
    description: "LenderAnalysis"
