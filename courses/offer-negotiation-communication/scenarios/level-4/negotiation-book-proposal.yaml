meta:
  id: negotiation-book-proposal
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Write a book proposal for a definitive guide on real estate negotiation — chapter outline, sample content, and market positioning"
  tags: [book-proposal, publishing, practitioner-guide, expert]

state: {}

trigger: |
  Write a book proposal for "The Art and Science of
  Real Estate Negotiation: A Data-Driven Guide for
  the Modern Agent" for a major publisher.

  Unique angle:
  - Combines negotiation science (Harvard PON, behavioral
    economics) with RE-specific practice
  - Includes original research (analyzed 50,000+
    negotiations for outcome patterns)
  - Addresses the post-settlement compensation landscape
  - Technology-integrated approach (AI tools, analytics)
  - Written by a practitioner with academic credentials

  Target readers:
  - Licensed real estate agents (primary — 2M+ in US)
  - Brokers and team leaders
  - Real estate investors
  - Real estate educators and trainers
  - Consumers buying/selling homes (secondary)

  Competing titles:
  | Title                           | Author      | Year | Gap                    |
  |---------------------------------|-------------|------|------------------------|
  | "Getting to Yes"                | Fisher/Ury  | 1981 | Not RE-specific        |
  | "Never Split the Difference"    | Voss        | 2016 | Not RE-specific        |
  | "Real Estate Negotiation"       | Hamilton    | 2019 | Pre-settlement, no data|
  | "Negotiate Like a Pro"          | Pivar       | 2012 | Dated, basic           |
  | "The Millionaire RE Agent"      | Keller      | 2004 | Sales, not negotiation |

  Publisher requirements:
  - 280-320 pages
  - 16-20 chapters
  - Case studies, scripts, and templates included
  - Digital companion (worksheets, calculators)

  Create the full proposal.

assertions:
  - type: llm_judge
    criteria: "Book proposal positions against competitors effectively — identifies the gap (no data-driven, post-settlement, technology-integrated RE negotiation guide exists), shows market size (2M+ agents), and differentiates through original research and academic+practitioner credibility."
    weight: 0.35
    description: "MarketPositioning"
  - type: llm_judge
    criteria: "Chapter outline progresses logically — from negotiation foundations through specific transaction types to advanced situations, with each chapter delivering both theory and practical tools (scripts, templates, checklists); includes the post-settlement compensation reality."
    weight: 0.35
    description: "ChapterOutline"
  - type: llm_judge
    criteria: "Sample content demonstrates the book's voice — authoritative but accessible, uses real negotiation scenarios with data-backed outcomes, includes specific scripts and templates, and shows how research findings translate to practical agent behavior."
    weight: 0.30
    description: "SampleContentQuality"
