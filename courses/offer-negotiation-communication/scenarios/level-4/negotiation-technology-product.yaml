meta:
  id: negotiation-technology-product
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Design a negotiation technology product — smart contract platform, automated negotiation tools, and blockchain-based transaction management"
  tags: [technology-product, smart-contracts, blockchain, expert]

state: {}

trigger: |
  Design a next-generation real estate negotiation
  platform that uses smart contracts, AI, and
  blockchain to transform how deals are negotiated
  and executed.

  Product vision: "From offer to close in 7 days,
  with full transparency and zero paperwork"

  Technology components:
  1. Smart Contract Engine
     - Automatically execute contract terms when
       conditions are met
     - Escrow management via smart contract
     - Contingency auto-resolution (appraisal data
       feeds, inspection report triggers)
     - Deadline enforcement and auto-notifications

  2. AI Negotiation Copilot
     - Real-time market data integration
     - Counter-offer suggestion engine
     - Communication drafting assistant
     - Outcome probability estimation
     - Risk scoring for each negotiation position

  3. Blockchain Transaction Ledger
     - Immutable record of all offers, counters, and
       amendments
     - Title chain verification
     - Digital identity verification for all parties
     - Transparent commission tracking

  4. Collaborative Workspace
     - Real-time multi-party document editing
     - Video negotiation rooms with recording/consent
     - Timeline visualization
     - Task management and deadline tracking

  Market analysis:
  - TAM: $12B (US RE transaction technology)
  - Current solutions: Dotloop, DocuSign, SkySlope
    (document-focused, not negotiation-focused)
  - Differentiator: End-to-end negotiation + execution
  - Barriers: Regulatory compliance, industry adoption,
    smart contract legal status

  Create:
  1. Product requirements and architecture
  2. Smart contract design for RE transactions
  3. AI copilot feature specifications
  4. Regulatory compliance framework
  5. Go-to-market strategy
  6. Risk assessment and mitigation

assertions:
  - type: llm_judge
    criteria: "Product architecture is technically coherent — explains how smart contracts handle the inherent uncertainty of RE transactions (inspection outcomes, appraisal values, financing approval) which don't naturally fit deterministic smart contract logic."
    weight: 0.35
    description: "TechnicalCoherence"
  - type: llm_judge
    criteria: "Regulatory compliance framework is thorough — addresses the legal status of smart contracts in RE (state-by-state variation), electronic signature laws (ESIGN, UETA), broker supervision requirements, and the unauthorized practice of law risk from AI-generated contract terms."
    weight: 0.35
    description: "RegulatoryCompliance"
  - type: llm_judge
    criteria: "Go-to-market strategy is realistic about adoption barriers — the RE industry is notoriously slow to adopt technology; strategy addresses agent training, broker buy-in, MLS integration, and a phased approach that doesn't require wholesale industry transformation."
    weight: 0.30
    description: "AdoptionStrategy"
