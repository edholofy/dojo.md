meta:
  id: expert-negotiation-shift
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Handle an expert-level shift simulation — integrate organizational strategy, regulatory compliance, and technology innovation to transform negotiation practices across an enterprise"
  tags: [shift-simulation, enterprise-transformation, regulatory-innovation, expert]

state: {}

trigger: |
  You've been hired as Chief Negotiation Officer for
  a national real estate platform (like Compass or
  eXp) with 25,000 agents. The CEO wants you to build
  a competitive advantage through superior negotiation
  capabilities. Design the transformation.

  Current state:
  - No standardized negotiation practices across agents
  - Agent-to-agent negotiation quality varies wildly
  - Post-NAR settlement: 40% of agents struggle with
    compensation negotiation
  - Technology stack: CRM, e-signature, but no
    negotiation-specific tools
  - Competitive pressure: Redfin's algorithm-assisted
    negotiation gaining market share
  - Training: One optional 2-hour webinar per quarter
  - Data: Rich transaction data but not used for
    negotiation intelligence

  Strategic imperatives:
  1. Build measurably better negotiation outcomes
     (higher client satisfaction, better terms)
  2. Create AI-assisted negotiation tools that augment
     (not replace) agent expertise
  3. Develop compensation negotiation mastery for all
     agents (post-settlement survival)
  4. Build a negotiation training academy that becomes
     a recruitment advantage
  5. Design negotiation analytics that identify coaching
     opportunities and market trends
  6. Ensure compliance across 50 states with varying
     regulations

  Budget: $8M annually
  Timeline: Year 1 measurable results, Year 3 market
  leadership
  Constraint: Agents are independent contractors

  Create the complete transformation strategy.

assertions:
  - type: llm_judge
    criteria: "Strategy addresses the independent contractor challenge — agents can't be mandated, so adoption requires demonstrating ROI (more closings, higher satisfaction, less liability); includes incentive structures, voluntary adoption tiers, and value-based engagement."
    weight: 0.35
    description: "IndependentContractorStrategy"
  - type: llm_judge
    criteria: "AI-assisted tools are designed to augment, not replace — provides real-time market data and strategy suggestions during negotiations, drafts communications for agent review, and predicts outcomes; explicitly avoids making decisions for agents."
    weight: 0.35
    description: "AIToolDesign"
  - type: llm_judge
    criteria: "Compensation negotiation training is the post-settlement survival priority — provides specific scripts, role-play scenarios, and value proposition frameworks; addresses the 40% struggling agents with tiered support from self-paced to 1:1 coaching."
    weight: 0.30
    description: "CompensationTraining"
