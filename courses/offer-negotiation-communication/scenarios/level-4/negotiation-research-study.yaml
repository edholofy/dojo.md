meta:
  id: negotiation-research-study
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Design a peer-reviewed research study on real estate negotiation effectiveness — methodology, data collection, and analysis framework for publication"
  tags: [research-study, academic-methodology, negotiation-effectiveness, expert]

state: {}

trigger: |
  A university's real estate research center has funded
  a study on "Factors That Predict Real Estate
  Negotiation Outcomes." Design the research.

  Research questions:
  1. What agent behaviors and communication patterns
     predict better negotiation outcomes (higher L/S
     ratio for sellers, lower purchase price for buyers)?
  2. How do market conditions moderate the effectiveness
     of different negotiation strategies?
  3. What role does agent experience play in negotiation
     outcomes when controlling for market conditions?

  Available data:
  - MLS transaction data: 200,000 transactions (5 years,
    3 metro areas)
  - Agent communication logs: 15,000 transactions with
    full email/text records (with consent)
  - Agent surveys: 2,000 agents on negotiation tactics
  - Client surveys: 5,000 post-transaction satisfaction
    surveys
  - Market condition data: monthly metrics for all areas

  Methodological challenges:
  - Selection bias: Better agents may get better
    listings
  - Confounding: Market conditions affect all outcomes
  - Measurement: "Good negotiation outcome" is
    subjective
  - Privacy: Communication logs contain sensitive info
  - Generalizability: Results may be market-specific

  Deliverables:
  1. Research design and methodology
  2. Variable operationalization
  3. Statistical analysis plan
  4. NLP approach for communication analysis
  5. Expected findings and policy implications
  6. Publication strategy

assertions:
  - type: llm_judge
    criteria: "Research design is methodologically rigorous — addresses selection bias (propensity score matching or instrumental variables), uses multi-level modeling (transactions nested within agents within markets), and defines negotiation outcomes with multiple measures."
    weight: 0.35
    description: "MethodologicalRigor"
  - type: llm_judge
    criteria: "NLP approach for communication analysis is well-specified — describes how negotiation communication will be coded (sentiment, directiveness, data-use frequency, response speed), what models will be used (topic modeling, sentiment analysis), and how findings connect to outcomes."
    weight: 0.35
    description: "NLPCommunicationAnalysis"
  - type: llm_judge
    criteria: "Privacy and ethical considerations are thorough — IRB approval process, communication data anonymization, agent consent protocols, data storage security, and commitments about how individual agent results will be reported (aggregate only)."
    weight: 0.30
    description: "EthicsAndPrivacy"
