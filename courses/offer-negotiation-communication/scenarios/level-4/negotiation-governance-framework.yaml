meta:
  id: negotiation-governance-framework
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Design a national negotiation governance framework — ethical standards, regulatory alignment, and industry-wide best practices for real estate negotiation conduct"
  tags: [governance-framework, ethical-standards, regulatory, expert]

state: {}

trigger: |
  The National Association of Realtors has formed a
  task force to update negotiation conduct standards
  following the NAR settlement changes. You're leading
  the effort. Design the new framework.

  Context — Post-settlement landscape:
  - Buyer agent compensation is now negotiated directly
  - Compensation can no longer be listed on MLS
  - Buyer agency agreements required before showings
  - Commission transparency requirements increased
  - Consumer confusion about agent compensation
  - Some agents struggling with new compensation
    negotiation reality

  Issues to address:
  1. Buyer compensation negotiation ethics
     - How to discuss commission without steering
     - Transparency requirements
     - Minimum service standards at different comp levels
  2. Offer presentation standards
     - Ensuring all offers are presented promptly
     - Preventing discrimination in offer selection
     - Fair Housing compliance in multiple offer situations
  3. Dual agency modernization
     - Technology-enabled transaction facilitation
     - AI-assisted neutral representation
     - State-by-state compliance mapping
  4. International harmonization
     - Cross-border transaction standards
     - Foreign agent collaboration protocols
     - Anti-money laundering compliance

  Stakeholders:
  - 1.5M NAR members
  - 580 MLS organizations
  - 50 state regulatory bodies
  - Consumer advocacy groups
  - DOJ Antitrust Division (monitoring)

  Create the complete governance framework.

assertions:
  - type: llm_judge
    criteria: "Buyer compensation standards are clear and ethical — provides specific guidance on commission discussion scripts that comply with antitrust requirements, transparency templates, and service-level agreements tied to compensation levels."
    weight: 0.35
    description: "CompensationStandards"
  - type: llm_judge
    criteria: "Offer presentation standards prevent discrimination — includes Fair Housing compliance checklists, documentation requirements for multiple offer decisions, and prohibition of using buyer financing type or personal characteristics in offer evaluation."
    weight: 0.35
    description: "FairHousingCompliance"
  - type: llm_judge
    criteria: "Framework balances stakeholder interests — addresses DOJ antitrust concerns (competition, consumer choice), NAR member needs (clear guidance, protection from liability), and consumer advocacy (transparency, fair treatment), with enforcement mechanisms."
    weight: 0.30
    description: "StakeholderBalance"
