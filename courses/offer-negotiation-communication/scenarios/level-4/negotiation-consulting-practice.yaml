meta:
  id: negotiation-consulting-practice
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Design a real estate negotiation consulting practice — advisory services, training programs, and expert witness capabilities for complex transactions"
  tags: [consulting-practice, advisory-services, expert-witness, expert]

state: {}

trigger: |
  You're launching a specialized real estate negotiation
  consulting practice. Design the complete business.

  Service areas:
  1. Transaction Advisory — Complex deal structuring
     for institutional clients ($5M+ transactions)
  2. Training & Development — Negotiation skill
     programs for brokerages and associations
  3. Expert Witness — Litigation support for
     negotiation-related disputes
  4. Mediation — Post-contract dispute resolution
  5. Technology Advisory — PropTech negotiation tools
     evaluation and implementation

  Target clients:
  - Large brokerages (400+ agents)
  - Commercial real estate firms
  - Real estate associations (state/national)
  - Law firms handling RE litigation
  - PropTech companies
  - Government agencies (public land deals)

  Competitive positioning:
  - Only practitioner with Harvard PON certification
    + 20 years RE transaction experience
  - Published author on RE negotiation
  - Former broker of record for top-20 firm
  - Network of 500+ industry contacts

  Financial targets:
  - Year 1: $400K (solo + contract support)
  - Year 3: $1.5M (team of 4)
  - Year 5: $3M (team of 8, national reach)

  Create the complete business plan and service design.

assertions:
  - type: llm_judge
    criteria: "Service catalog is well-designed — each service area has clear deliverables, pricing models (project vs retainer vs per-diem), and target client profiles; the five services complement each other and create cross-selling opportunities."
    weight: 0.35
    description: "ServiceDesign"
  - type: llm_judge
    criteria: "Expert witness service is credible — includes case preparation methodology, testimony standards, report templates, fee structure (retainer + per-diem + trial rate), and qualification materials; addresses the specific needs of RE litigation (breach of duty, misrepresentation, fiduciary claims)."
    weight: 0.35
    description: "ExpertWitnessCredibility"
  - type: llm_judge
    criteria: "Growth plan is realistic — Year 1 leverages personal network and speaking for client acquisition, Year 2-3 builds team with complementary skills (commercial, residential, international), Year 5 achieves scale through productized training and technology advisory."
    weight: 0.30
    description: "GrowthPlanRealism"
