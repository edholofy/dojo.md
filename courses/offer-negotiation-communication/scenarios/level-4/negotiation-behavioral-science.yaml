meta:
  id: negotiation-behavioral-science
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Apply behavioral science to real estate negotiation — design interventions based on cognitive biases, prospect theory, and decision architecture"
  tags: [behavioral-science, cognitive-bias, decision-architecture, expert]

state: {}

trigger: |
  A behavioral science research lab wants to design
  evidence-based interventions that improve real estate
  negotiation outcomes. Create the research and
  intervention framework.

  Documented biases in RE negotiation:

  Buyer biases:
  | Bias              | Effect                        | Est. Cost |
  |-------------------|-------------------------------|-----------|
  | Anchoring         | First price seen dominates    | ±$8-15K   |
  | Loss aversion     | Overpay to avoid "losing" home| +$5-12K   |
  | FOMO              | Waive protections in bidding  | Risk ↑    |
  | Endowment (pre)   | Overvalue homes already toured| +$3-8K    |
  | Status quo        | Don't negotiate (accept terms)| -$5-10K   |

  Seller biases:
  | Bias              | Effect                        | Est. Cost |
  |-------------------|-------------------------------|-----------|
  | Endowment effect  | Overprice by 5-10%            | +15-30 DOM|
  | Anchoring (own)   | Cling to original list price  | Stale inv |
  | Sunk cost         | "I spent $50K on renovations" | Mispricing|
  | Optimism bias     | Reject reasonable offers      | -$5-15K   |
  | Reactance         | Reject lowball out of spite   | Lost opp  |

  Agent biases:
  | Bias              | Effect                        | Impact    |
  |-------------------|-------------------------------|-----------|
  | Confirmation      | Select comps supporting price | ±5% CMA  |
  | Commission bias   | Favor quick close over best   | Client $  |
  | Recency           | Overweight latest comp        | Accuracy  |
  | Overconfidence    | Skip preparation              | Outcomes  |

  Available data:
  - 50,000 transactions with negotiation records
  - Agent decision-making surveys (2,000 responses)
  - Eye-tracking studies on offer documents (pilot)
  - A/B tests on listing descriptions (5,000 listings)

  Create:
  1. Bias identification and measurement framework
  2. De-biasing interventions for each stakeholder
  3. Choice architecture for negotiation decisions
  4. Experimental design for testing interventions
  5. Technology applications for bias mitigation
  6. Ethical considerations in nudging

assertions:
  - type: llm_judge
    criteria: "De-biasing interventions are evidence-based and practical — includes specific techniques like pre-commitment strategies for buyers (set max before touring), structured CMA processes for agents (blind comparable selection), and cooling-off prompts for emotional decisions."
    weight: 0.35
    description: "DeBiasingInterventions"
  - type: llm_judge
    criteria: "Choice architecture redesigns negotiation decisions — uses framing effects positively (present repair costs as investment value retained), default options (standard contingency packages), and decision staging (separate emotional from financial decisions)."
    weight: 0.35
    description: "ChoiceArchitecture"
  - type: llm_judge
    criteria: "Experimental design is rigorous — randomized controlled trials where possible, field experiments in real transactions (with ethical approval), pre-registered hypotheses, and appropriate statistical methods for the data structure."
    weight: 0.30
    description: "ExperimentalDesign"
