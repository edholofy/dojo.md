meta:
  id: negotiation-certification-program
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Design a professional certification in real estate negotiation — curriculum, assessment framework, and accreditation standards"
  tags: [certification, professional-development, curriculum, expert]

state: {}

trigger: |
  Design a "Certified Real Estate Negotiation Expert"
  (CRNE) designation. This would be the gold standard
  for negotiation competency in real estate.

  Market positioning:
  - Above CNE (Certified Negotiation Expert — existing,
    1-day course)
  - Below Harvard PON certification (general, not RE
    specific)
  - Unique: Combines RE-specific knowledge with
    advanced negotiation theory

  Program structure:
  - Total commitment: 120 hours over 6-12 months
  - Mix of online, live virtual, and in-person intensives
  - Requires active license and 3+ years experience
  - Must complete practicum with documented negotiations
  - Proctored final assessment
  - Biennial CE requirement for renewal

  Curriculum areas:
  1. Negotiation Theory (20 hours)
     - Harvard PON principles adapted for RE
     - Behavioral economics in negotiation
     - Game theory applications
  2. Residential Transaction Mastery (30 hours)
     - All transaction types and scenarios
     - Multi-party and complex situations
     - State-specific regulatory compliance
  3. Commercial Negotiation (20 hours)
     - Lease negotiations
     - Investment property transactions
     - Development and land deals
  4. Communication Excellence (20 hours)
     - Written communication standards
     - Verbal negotiation techniques
     - Cross-cultural competence
  5. Ethics & Compliance (15 hours)
     - Fiduciary duties in negotiation
     - Fair Housing in offer selection
     - Post-settlement compensation ethics
  6. Practicum (15 hours)
     - 5 documented negotiations with mentor review
     - Peer evaluation sessions
     - Final portfolio presentation

  Create the complete certification program design.

assertions:
  - type: llm_judge
    criteria: "Curriculum is rigorous and distinctive — goes beyond existing programs like CNE by incorporating negotiation theory (PON, behavioral economics, game theory) with RE-specific application; each module has clear learning outcomes and assessments."
    weight: 0.35
    description: "CurriculumRigor"
  - type: llm_judge
    criteria: "Assessment framework measures real competency — includes written exam (theory knowledge), practical case study analysis (applied knowledge), and practicum evaluation (demonstrated skill); rubrics are specific and objective."
    weight: 0.35
    description: "AssessmentFramework"
  - type: llm_judge
    criteria: "Program logistics are feasible for working professionals — 120 hours over 6-12 months is completable while maintaining active practice, pricing is competitive ($3,000-5,000 range), and the practicum leverages real transactions rather than requiring separate projects."
    weight: 0.30
    description: "ProgramFeasibility"
