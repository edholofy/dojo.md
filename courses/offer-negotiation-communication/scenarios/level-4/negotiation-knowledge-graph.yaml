meta:
  id: negotiation-knowledge-graph
  level: 4
  course: offer-negotiation-communication
  type: output
  description: "Design a knowledge graph for real estate negotiation intelligence — map relationships between negotiation strategies, outcomes, market conditions, and agent behaviors"
  tags: [knowledge-graph, negotiation-intelligence, relationship-mapping, expert]

state: {}

trigger: |
  Design a knowledge graph that captures the complex
  relationships between negotiation strategies, market
  conditions, agent behaviors, and transaction outcomes.

  Entity types:
  - Negotiations (with full attribute sets)
  - Strategies (tactics, approaches, techniques)
  - Outcomes (price, terms, timeline, satisfaction)
  - Agents (experience, style, track record)
  - Market Conditions (inventory, prices, rates)
  - Properties (type, price range, condition)
  - Clients (buyer/seller, motivation, constraints)
  - Regulations (state rules, federal requirements)

  Relationship types:
  - Strategy → produced → Outcome (in context)
  - Agent → employed → Strategy (frequency, skill)
  - Market_Condition → moderated → Strategy_Effectiveness
  - Client_Motivation → influenced → Negotiation_Position
  - Regulation → constrained → Available_Strategies
  - Property_Type → correlated_with → Strategy_Success

  Use cases:
  1. "What strategy works best for a seller in a
     buyer's market with an overpriced listing?"
  2. "Which agents are most effective negotiators
     for luxury properties?" (coaching target)
  3. "What's the most likely outcome trajectory
     given current negotiation positions?"
  4. "What regulatory constraints apply to this
     specific negotiation scenario?"

  Technical requirements:
  - Graph DB: Neo4j
  - Initial data: 100K negotiations, 5M relationships
  - Query time: < 1 second for common patterns
  - Update: Real-time for new transactions

  Create:
  1. Ontology design with full entity-relationship model
  2. Data ingestion and enrichment pipeline
  3. Graph query patterns for each use case
  4. ML on graph (strategy recommendation engine)
  5. Visualization for agents and managers
  6. Privacy and ethical framework

assertions:
  - type: llm_judge
    criteria: "Ontology captures the contextual nature of negotiation — the same strategy produces different outcomes depending on market conditions, property type, client motivation, and agent skill; the graph model represents these interactions as relationship properties."
    weight: 0.35
    description: "OntologyDesign"
  - type: llm_judge
    criteria: "Strategy recommendation engine uses graph traversal meaningfully — given current context (market, property, client), finds similar historical negotiations, identifies successful strategies, and weights recommendations by contextual similarity."
    weight: 0.35
    description: "RecommendationEngine"
  - type: llm_judge
    criteria: "Privacy framework addresses negotiation-specific concerns — client negotiation positions are confidential, agent performance data requires consent, strategy recommendations don't create unfair advantages, and the system complies with broker supervision requirements."
    weight: 0.30
    description: "PrivacyFramework"
