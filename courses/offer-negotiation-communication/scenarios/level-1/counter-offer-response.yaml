meta:
  id: counter-offer-response
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Respond to a seller's counter-offer — communicate the counter to your buyer client and draft a strategic response"
  tags: [counter-offer, buyer-communication, response-strategy, beginner]

state: {}

trigger: |
  You presented your buyer's offer of $375,000 on a
  $385,000 listing. The seller has countered. Communicate
  with your buyer and draft a response.

  Seller's counter-offer:
  - Price: $382,000 (reduced from $385,000)
  - Earnest money: $7,500 (increased from $5,000)
  - Closing timeline: 30 days (shortened from 45)
  - Contingencies: Inspection reduced to 7 days
  - Personal property: Will include refrigerator only
    (not washer/dryer)
  - Home warranty: Declined
  - Counter expires: Tomorrow at 5:00 PM

  Your comparable sales research shows:
  - 125 Oak: $378,000 (similar condition, sold 2 weeks ago)
  - 140 Elm: $381,000 (slightly larger, sold last month)
  - 98 Maple: $370,000 (needs more work, sold 3 weeks ago)

  Write:
  1. Message to your buyer explaining the counter-offer
  2. Your analysis and recommendation
  3. Draft counter-offer response to listing agent

assertions:
  - type: llm_judge
    criteria: "Message to buyer explains every change clearly — price movement ($3K gap remaining), earnest money increase, shorter timeline implications, reduced inspection period risk, personal property changes, and warranty denial; uses plain language without jargon."
    weight: 0.35
    description: "BuyerCommunicationClarity"
  - type: llm_judge
    criteria: "Analysis and recommendation are data-driven — uses comparable sales ($370-381K range) to justify a counter in the $378-380K range, addresses risks of shorter inspection period, and presents options rather than dictating a decision."
    weight: 0.35
    description: "AnalysisQuality"
  - type: llm_judge
    criteria: "Draft counter-offer maintains negotiating leverage — doesn't split the difference exactly (which signals the final number), makes strategic concessions on some terms while holding firm on others, and respects the expiration deadline."
    weight: 0.30
    description: "CounterOfferStrategy"
