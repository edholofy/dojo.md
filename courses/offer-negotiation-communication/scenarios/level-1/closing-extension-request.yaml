meta:
  id: closing-extension-request
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Request a closing extension — communicate delays professionally and negotiate additional time without jeopardizing the deal"
  tags: [closing-extension, delay-communication, timeline, beginner]

state: {}

trigger: |
  Your buyer's loan is delayed and you need a closing
  extension. Communicate this without losing the deal.

  Original timeline:
  - Contract date: January 15
  - Scheduled closing: February 28
  - Current date: February 22
  - All contingencies already removed

  Delay cause:
  - Lender requires additional documentation (tax
    returns needed re-verification due to job change
    6 months ago)
  - New estimated closing: March 10 (10-day extension)
  - Buyer's employment and income are verified — this
    is a documentation issue, not a qualification issue

  Complications:
  - Seller has movers scheduled for March 1
  - Seller's purchase of their new home closes March 5
  - Listing agent is frustrated (this is the second
    delay — first was 3 days for appraisal scheduling)
  - Per diem penalty clause: $150/day after original
    closing date

  Write:
  1. Communication to listing agent requesting extension
  2. Message to your buyer about the situation
  3. Proposed terms for the extension amendment

assertions:
  - type: llm_judge
    criteria: "Extension request to listing agent is transparent and solutions-oriented — explains the specific cause (documentation, not qualification), provides the new firm date, offers concessions (per diem, increased earnest money), and acknowledges the inconvenience without being defensive."
    weight: 0.35
    description: "ExtensionRequestQuality"
  - type: llm_judge
    criteria: "Buyer message is honest about consequences — explains the per diem cost ($150/day × 10 days = $1,500), the risk of seller walking away, and what the buyer needs to do immediately (provide documents to lender ASAP) to minimize the delay."
    weight: 0.35
    description: "BuyerTransparency"
  - type: llm_judge
    criteria: "Extension amendment terms are fair — offers per diem compensation, possibly additional earnest money as good faith, aligns with seller's own closing timeline (March 5), and includes a firm drop-dead date to give the seller certainty."
    weight: 0.30
    description: "AmendmentFairness"
