meta:
  id: initial-offer-presentation
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Present an initial offer to a listing agent — professional communication that positions your buyer competitively while building rapport"
  tags: [initial-offer, presentation, buyer-agent, beginner]

state: {}

trigger: |
  You're a buyer's agent presenting your client's first
  offer on a home. Write the communication to the
  listing agent.

  Property: 123 Oak Street, listed at $385,000
  Your client's offer:
  - Price: $375,000
  - Down payment: 20% ($75,000)
  - Financing: Pre-approved, conventional 30-year fixed
  - Lender: First National Bank (local, reliable)
  - Earnest money: $5,000
  - Closing timeline: 45 days
  - Contingencies: Inspection (10 days), appraisal,
    financing
  - Personal property: Requesting washer/dryer and
    refrigerator
  - Home warranty: Requesting seller-paid ($500)

  Context:
  - Home has been on market 12 days
  - No other known offers
  - Your buyer is well-qualified (780 credit, stable job)
  - The home needs minor cosmetic updates

  Write:
  1. Email to listing agent presenting the offer
  2. Brief summary of buyer's strengths to share verbally
  3. Key talking points if listing agent pushes back

assertions:
  - type: llm_judge
    criteria: "Email is professional and complete — includes all material terms, highlights buyer strengths (20% down, strong pre-approval, local lender), positions the $10K below-ask price with rationale (cosmetic updates, market data), and maintains a collaborative tone."
    weight: 0.35
    description: "OfferPresentationQuality"
  - type: llm_judge
    criteria: "Buyer strength summary is concise and compelling — emphasizes financial qualification, flexibility on timeline, and seriousness of intent; avoids revealing too much negotiating room or desperation."
    weight: 0.35
    description: "BuyerPositioning"
  - type: llm_judge
    criteria: "Pushback talking points are strategic — prepared responses for price objection (comparable sales data), contingency objection (reasonable timelines), and personal property request (minor cost to seller); maintains negotiating leverage."
    weight: 0.30
    description: "NegotiationPreparation"
