meta:
  id: beginner-negotiation-shift
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Handle a beginner shift simulation — manage multiple negotiation situations simultaneously during a busy day"
  tags: [shift-simulation, multi-situation, time-management, beginner]

state: {}

trigger: |
  It's a busy Tuesday. You have three active
  negotiations happening simultaneously. Manage all
  communications effectively.

  Situation 1 — Buyer side (123 Oak St):
  - Submitted offer yesterday at $365,000 on $375,000
    listing
  - Listing agent just called: "Seller will counter,
    expect it by 3 PM today"
  - Your buyer texts: "Any word yet? I'm so nervous!"
  - Deadline pressure: Your buyer's lease expires in
    45 days

  Situation 2 — Seller side (456 Elm Dr):
  - Your listing at $298,000
  - Received an offer this morning: $285,000, FHA,
    requesting 3% closing costs
  - Seller is motivated (relocating for work in 6 weeks)
  - Buyer's agent asks: "Can we get a response by EOD?"

  Situation 3 — Buyer side (789 Pine Rd):
  - Under contract at $425,000, closing in 2 weeks
  - Title company just found a lien from a 2019
    contractor ($8,500)
  - Listing agent is unaware of the lien
  - Closing could be delayed if not resolved quickly

  Write all necessary communications for today:
  1. Response to your nervous buyer (Situation 1)
  2. Offer presentation to your seller (Situation 2)
  3. Communication about the lien issue (Situation 3)
  4. Prioritization plan for the day

assertions:
  - type: llm_judge
    criteria: "Buyer response (Situation 1) is calming and informative — acknowledges anxiety, shares the update about the counter coming by 3 PM, reminds them of their strong position, and sets expectations for next steps without over-promising."
    weight: 0.35
    description: "MultiSituationBuyerComm"
  - type: llm_judge
    criteria: "Seller presentation (Situation 2) is efficient given time pressure — quickly analyzes the net proceeds (considering 3% closing costs), factors in seller's relocation timeline as motivation to move forward, and recommends a counter that balances speed with value."
    weight: 0.35
    description: "MultiSituationSellerComm"
  - type: llm_judge
    criteria: "Lien communication (Situation 3) is appropriately urgent — contacts listing agent immediately, frames it as a solvable issue requiring seller action, and proposes a path to resolution that doesn't delay the 2-week closing timeline."
    weight: 0.30
    description: "MultiSituationUrgentComm"
