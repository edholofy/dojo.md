meta:
  id: earnest-money-dispute
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Navigate an earnest money dispute — communicate clearly about deposit release when a transaction falls apart"
  tags: [earnest-money, deposit-dispute, transaction-failure, beginner]

state: {}

trigger: |
  A transaction is falling apart and earnest money is
  at stake. You're the buyer's agent. Navigate the
  communication.

  Situation:
  - Contract price: $340,000
  - Earnest money: $5,000 (held by title company)
  - Buyer wants to terminate due to inspection issues
  - Inspection contingency deadline: Today at 5 PM
  - Current time: 2:30 PM

  Inspection findings (delivered yesterday):
  - Foundation crack requiring $15,000 repair
  - Mold in crawl space ($4,000 remediation)
  - Seller refused all repair requests this morning
  - Buyer does not want to proceed

  Complications:
  - Listing agent argues the termination notice must
    include the specific inspection items per contract
  - Listing agent claims verbal termination doesn't
    count — needs written notice
  - Title company needs both agents' signatures to
    release earnest money
  - Seller is threatening to keep earnest money

  Write:
  1. Written termination notice to listing agent
     (before 5 PM deadline)
  2. Message to your buyer about protecting their
     earnest money
  3. Follow-up communication if seller disputes the
     release

assertions:
  - type: llm_judge
    criteria: "Termination notice is legally proper — delivered in writing before the deadline, references the inspection contingency clause by contract section, includes inspection findings as basis, and clearly states buyer is exercising their contractual right to terminate."
    weight: 0.35
    description: "TerminationNoticePropriety"
  - type: llm_judge
    criteria: "Buyer message is reassuring and accurate — explains that termination within the inspection contingency period entitles them to full earnest money return, outlines the process, and addresses the seller's threat as procedural posturing."
    weight: 0.35
    description: "BuyerReassurance"
  - type: llm_judge
    criteria: "Dispute follow-up is firm but professional — cites contract language, references the timeline compliance, keeps the title company informed, and outlines next steps if seller continues to refuse release (mediation, state real estate commission complaint)."
    weight: 0.30
    description: "DisputeResolution"
