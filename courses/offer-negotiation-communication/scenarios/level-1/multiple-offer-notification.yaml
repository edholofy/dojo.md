meta:
  id: multiple-offer-notification
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Handle a multiple offer situation — notify buyer clients and advise on highest-and-best strategy"
  tags: [multiple-offers, highest-and-best, competitive-bidding, beginner]

state: {}

trigger: |
  You're a buyer's agent. The listing agent just called
  to inform you that there are 3 offers on the property
  your client wants. They're asking for "highest and
  best" by tomorrow at noon.

  Property: 456 Pine Lane, listed at $325,000
  Your client's current offer: $325,000 (full price)
  Your client's max budget: $345,000

  What the listing agent shared:
  - 3 total offers received (including yours)
  - All are "competitive" (no specifics)
  - Seller prefers quick closing
  - Seller is relocating and needs flexibility on
    possession (2 weeks after closing)

  Your client's situation:
  - First-time buyer, emotionally attached to this home
  - Pre-approved up to $350,000
  - Can close in 30 days
  - Currently renting (flexible on possession)
  - Has been outbid on 2 previous homes

  Write:
  1. Message to your buyer about the multiple offer
     situation
  2. Strategy recommendations for their highest-and-best
  3. Draft revised offer terms

assertions:
  - type: llm_judge
    criteria: "Message to buyer is honest but calming — explains the multiple offer situation clearly, acknowledges their frustration (outbid twice before), but focuses on strategy rather than panic; doesn't pressure them to exceed their comfort level."
    weight: 0.35
    description: "BuyerCommunicationTone"
  - type: llm_judge
    criteria: "Strategy recommendations are specific and smart — suggests strengthening non-price terms (flexible possession aligns with seller's relocation need, faster closing), considers escalation clause pros/cons, and addresses the emotional vs financial decision."
    weight: 0.35
    description: "StrategyQuality"
  - type: llm_judge
    criteria: "Revised offer leverages the client's advantages — flexibility on possession (rent-back) is a strong non-price differentiator; price increase is reasonable within budget; contingency adjustments balance competitiveness with protection."
    weight: 0.30
    description: "RevisedOfferStrength"
