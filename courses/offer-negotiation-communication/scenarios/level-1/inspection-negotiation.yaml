meta:
  id: inspection-negotiation
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Navigate post-inspection negotiations — communicate repair requests, credits, and resolution strategies between buyer and seller"
  tags: [inspection, repair-negotiation, contingency, beginner]

state: {}

trigger: |
  The home inspection is complete and issues were found.
  You're the buyer's agent. Communicate the findings
  and negotiate repairs.

  Property: Under contract at $395,000

  Inspection findings:
  Major items:
  - HVAC system: 18 years old, working but nearing end
    of life. Estimated replacement: $6,500
  - Roof: Minor leak around chimney flashing, some
    shingles curling. Repair estimate: $2,200
  - Electrical panel: Double-tapped breakers (safety
    concern). Fix estimate: $800

  Minor items:
  - Grading slopes toward foundation in backyard
  - Several outlets not grounded (older home)
  - Bathroom caulking needs replacement
  - Dryer vent needs cleaning
  - Minor wood rot on deck railing

  Context:
  - Contract has 10-day inspection contingency (day 7)
  - Seller is elderly, lived in home 30+ years
  - Market is balanced (not heavily favoring either side)
  - Your buyer loves the home but is concerned about
    the HVAC and roof

  Write:
  1. Summary message to your buyer about inspection results
  2. Repair/credit request to listing agent
  3. Negotiation strategy if seller pushes back

assertions:
  - type: llm_judge
    criteria: "Buyer message distinguishes major from minor items clearly — explains HVAC, roof, and electrical as legitimate safety/structural concerns vs cosmetic/maintenance items; provides cost estimates and recommendation without creating panic."
    weight: 0.35
    description: "BuyerInspectionCommunication"
  - type: llm_judge
    criteria: "Repair request to listing agent is professional and reasonable — focuses on major items (safety, structural, mechanical), doesn't nickel-and-dime on minor items, offers flexibility (repairs OR credit), and maintains a collaborative tone."
    weight: 0.35
    description: "RepairRequestProfessionalism"
  - type: llm_judge
    criteria: "Negotiation strategy is prepared for pushback — has fallback positions (e.g., credit instead of repairs, focus on safety items only, split the HVAC cost), considers the seller's emotional attachment, and knows when to walk away vs compromise."
    weight: 0.30
    description: "FallbackStrategy"
