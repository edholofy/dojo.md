meta:
  id: appraisal-gap-communication
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Handle an appraisal gap — communicate the shortfall to both parties and negotiate a resolution"
  tags: [appraisal-gap, valuation, price-negotiation, beginner]

state: {}

trigger: |
  The appraisal came in below the contract price.
  You're the buyer's agent. Navigate this situation.

  Contract details:
  - Contract price: $410,000
  - Appraisal value: $395,000
  - Gap: $15,000
  - Buyer's down payment: 20% of purchase price
  - Loan amount at contract price: $328,000
  - Maximum loan at appraised value: $316,000

  Impact on buyer:
  - At contract price with appraised value, buyer needs
    an additional $12,000 in cash (difference between
    $316K loan and $328K needed, plus gap coverage)
  - Buyer has $95,000 total available for down payment
    and closing costs
  - Buyer CAN cover the gap financially but doesn't
    want to overpay

  Context:
  - Buyer offered $10K over asking in a competitive
    situation
  - No appraisal gap guarantee was included
  - Comparable sales support values of $392-402K
  - Seller has already found their next home
  - Market has cooled slightly since offer was accepted
    (3 weeks ago)

  Write:
  1. Message to your buyer explaining the appraisal gap
  2. Communication to listing agent proposing a solution
  3. Three possible resolution scenarios with pros/cons

assertions:
  - type: llm_judge
    criteria: "Buyer message explains the appraisal gap impact clearly — shows the math (additional cash needed), explains why the appraisal matters for lending, and presents this as a negotiation opportunity rather than a crisis."
    weight: 0.35
    description: "AppraisalGapExplanation"
  - type: llm_judge
    criteria: "Communication to listing agent is strategic — leverages the appraisal as objective evidence, notes the seller's motivation (already found next home), and proposes a solution (meet in the middle, price reduction, or credit) without ultimatums."
    weight: 0.35
    description: "ListingAgentCommunication"
  - type: llm_judge
    criteria: "Three resolution scenarios are realistic — e.g., (1) reduce price to appraised value, (2) split the gap, (3) buyer covers full gap; each includes financial impact for both parties and likelihood of acceptance."
    weight: 0.30
    description: "ResolutionScenarios"
