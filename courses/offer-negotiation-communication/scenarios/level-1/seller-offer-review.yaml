meta:
  id: seller-offer-review
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Present an offer to your seller client — explain the terms, provide analysis, and recommend a response strategy"
  tags: [seller-side, offer-review, listing-agent, beginner]

state: {}

trigger: |
  You're the listing agent. An offer just came in on
  your seller's property. Present it to your client
  and recommend a response.

  Listing: 789 Cedar Drive, listed at $420,000
  Days on market: 8

  Offer received:
  - Price: $405,000
  - Down payment: 10% ($40,500)
  - Financing: FHA loan, pre-approved through
    Nationwide Mortgage
  - Earnest money: $3,000
  - Closing timeline: 60 days
  - Contingencies: Inspection (14 days), appraisal,
    financing
  - Requests: Seller to pay 3% closing costs ($12,150)
  - Home warranty: Requesting seller-paid ($550)

  Market context:
  - Average DOM in neighborhood: 14 days
  - 2 showings scheduled for this weekend
  - Buyer's agent mentioned client is very interested
  - FHA appraisals tend to be more stringent
  - Similar homes: $410-425K recently

  Write:
  1. Message to seller presenting the offer
  2. Net proceeds analysis (offer vs asking price)
  3. Recommended counter-offer strategy

assertions:
  - type: llm_judge
    criteria: "Offer presentation to seller is clear and thorough — breaks down the effective price (considering 3% closing costs = net $392,850 vs $420K ask), explains FHA implications (stricter appraisal, longer timeline), and identifies strengths and weaknesses of the offer."
    weight: 0.35
    description: "OfferPresentation"
  - type: llm_judge
    criteria: "Net proceeds analysis shows real numbers — compares net from this offer vs potential net at full price, factors in additional DOM costs if they wait, and presents the 3% closing cost request as a significant concession worth $12,150."
    weight: 0.35
    description: "NetProceedsAnalysis"
  - type: llm_judge
    criteria: "Counter-offer strategy is informed by market position — with only 8 DOM and weekend showings coming, seller has leverage; recommends countering on price AND closing costs, with specific numbers and rationale."
    weight: 0.30
    description: "CounterStrategy"
