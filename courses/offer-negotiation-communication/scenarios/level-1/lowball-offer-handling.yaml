meta:
  id: lowball-offer-handling
  level: 1
  course: offer-negotiation-communication
  type: output
  description: "Handle a lowball offer professionally — respond strategically whether you represent the buyer or seller"
  tags: [lowball-offer, price-gap, professional-response, beginner]

state: {}

trigger: |
  You're the listing agent. A lowball offer has come in
  on your seller's property. Handle this professionally.

  Listing: 234 Birch Avenue, listed at $450,000
  Days on market: 21
  Price reductions: None
  Showings: 8 total, positive feedback overall

  The offer:
  - Price: $390,000 (13.3% below asking)
  - Down payment: 25% cash
  - No contingencies (as-is, cash-like terms)
  - Close in 21 days
  - Buyer is an investor

  Your seller's reaction: "This is insulting. I don't
  even want to respond."

  Market data:
  - Comparable sales: $435-455K range
  - Neighborhood average DOM: 28 days
  - Seller's mortgage payoff: $310,000
  - Seller needs minimum $420,000 net to purchase
    their next home

  Write:
  1. Message to your seller about why they should respond
  2. Recommended counter-offer strategy
  3. Response to buyer's agent (professional, firm)

assertions:
  - type: llm_judge
    criteria: "Message to seller manages emotions effectively — validates their frustration but explains why not responding is the worst strategy (leaves money on the table, signals weakness); reminds them a counter costs nothing and keeps the negotiation alive."
    weight: 0.35
    description: "SellerEmotionManagement"
  - type: llm_judge
    criteria: "Counter-offer strategy is firm but strategic — counters near or at asking price (signaling the $390K is far from acceptable), acknowledges the strong terms (cash-like, no contingencies) as valuable, and positions for a realistic settlement range."
    weight: 0.35
    description: "CounterOfferStrategy"
  - type: llm_judge
    criteria: "Response to buyer's agent is professional — doesn't insult the offer, acknowledges the strong terms, firmly communicates the price gap with supporting data, and keeps the door open for a serious counter without revealing the seller's minimum."
    weight: 0.30
    description: "AgentCommunicationProfessionalism"
