meta:
  id: distressed-property-negotiation
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Navigate distressed property negotiations — short sales, REO purchases, pre-foreclosure, and auction strategies with institutional and emotional stakeholders"
  tags: [distressed-property, short-sale, REO, advanced]

state: {}

trigger: |
  Your investor client wants to build a portfolio of
  distressed properties. Navigate the unique negotiation
  challenges across three distress categories.

  Property 1 — Short Sale:
  - 456 Oak Ave, listed at $225,000
  - Seller owes: $285,000 (underwater by $60K)
  - Bank: Wells Fargo (loss mitigation dept)
  - Seller: Family facing medical bankruptcy
  - Market value: $230,000
  - Timeline: 60-120 days for bank approval
  - BPO ordered, pending

  Property 2 — REO (Bank-Owned):
  - 789 Pine St, listed at $178,000 by asset manager
  - Previous sale attempt fell through (appraisal gap)
  - Bank: Fannie Mae (HomePath listing)
  - Condition: Fair, needs $25K in work
  - Listed 45 days, one price reduction from $192K
  - Owner-occupant priority period expired

  Property 3 — Pre-Foreclosure:
  - 123 Elm Dr, NOT listed
  - Owner 4 months behind on mortgage ($12,000 arrears)
  - Mortgage balance: $195,000
  - Market value: $245,000 (equity exists)
  - Foreclosure auction: 6 weeks away
  - Owner is elderly, confused about options

  Create:
  1. Negotiation strategy for each property type
  2. Communication to institutional parties (bank,
     asset manager, servicer)
  3. Ethical communication with distressed homeowner
  4. Timeline management and documentation
  5. Risk assessment for each acquisition

assertions:
  - type: llm_judge
    criteria: "Strategies are tailored to each distress type — short sale requires patience and bank negotiation expertise, REO requires understanding asset disposition priorities, pre-foreclosure requires ethical direct outreach; each has different leverage points and timelines."
    weight: 0.35
    description: "TailoredDistressedStrategies"
  - type: llm_judge
    criteria: "Institutional communications are professionally formatted — short sale package includes hardship letter support, BPO preparation, and HUD-1 estimates; REO offer meets HomePath requirements; each shows understanding of institutional decision-making processes."
    weight: 0.35
    description: "InstitutionalCommunication"
  - type: llm_judge
    criteria: "Ethical standards for the pre-foreclosure outreach are paramount — doesn't exploit the elderly owner's confusion, presents all options (loan modification, forbearance, sale), doesn't pressure, and considers whether a sale is actually in the homeowner's best interest."
    weight: 0.30
    description: "EthicalDistressedOutreach"
