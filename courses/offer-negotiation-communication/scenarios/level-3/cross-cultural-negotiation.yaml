meta:
  id: cross-cultural-negotiation
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Navigate cross-cultural real estate negotiations — adapt communication styles, understand cultural norms, and build trust across diverse backgrounds"
  tags: [cross-cultural, international-buyers, cultural-competence, advanced]

state: {}

trigger: |
  Your market has increasing international buyer
  activity. Design a cross-cultural negotiation
  framework for your brokerage.

  International buyer segments in your market:
  
  Segment 1 — East Asian buyers (Chinese, Japanese,
  Korean):
  - 15% of transactions over $500K
  - Preferences: numerology (avoid 4, prefer 8),
    feng shui considerations, multi-generational living
  - Negotiation style: Indirect, relationship-first,
    patience valued, group decision-making
  - Challenges: Language barriers, different contract
    traditions, wire transfer complexities

  Segment 2 — Latin American buyers (Mexican, Brazilian,
  Colombian):
  - 8% of transactions
  - Preferences: Family proximity, community connection,
    outdoor living space
  - Negotiation style: Personal relationship essential,
    flexible timelines, verbal agreements carry weight
  - Challenges: Cross-border financing, FIRPTA concerns,
    documentation requirements

  Segment 3 — Middle Eastern buyers (UAE, Saudi, Qatari):
  - 5% of luxury transactions
  - Preferences: Privacy, premium finishes, investment
    potential, proximity to cultural amenities
  - Negotiation style: Formal, respectful of hierarchy,
    patience with process, generous with hospitality
  - Challenges: Religious considerations (Islamic
    finance), gender dynamics, time zone coordination

  Segment 4 — European buyers (UK, German, French):
  - 10% of transactions
  - Preferences: Quality construction, energy efficiency,
    walkable locations
  - Negotiation style: Direct, data-driven, process-
    oriented, clear boundaries
  - Challenges: Different measurement systems, legal
    tradition differences, exchange rate risk

  Create:
  1. Cultural competence training curriculum
  2. Communication adaptation guidelines per segment
  3. Negotiation style adjustments
  4. Common mistakes and how to avoid them
  5. Resource toolkit (translators, cultural advisors)

assertions:
  - type: llm_judge
    criteria: "Response creates nuanced cultural guidance — goes beyond stereotypes to provide actionable communication adaptations; addresses relationship-building pace, decision-making structures, and negotiation rhythm differences without being reductive."
    weight: 0.35
    description: "CulturalNuance"
  - type: llm_judge
    criteria: "Negotiation style adjustments are practical — specific examples like 'allow longer response times for consensus-based decision-making cultures,' 'provide detailed data packages for process-oriented negotiators,' and 'build personal relationship before presenting offers in relationship-first cultures.'"
    weight: 0.35
    description: "PracticalAdaptations"
  - type: llm_judge
    criteria: "Common mistakes section is honest and specific — addresses real missteps (rushing Asian buyers, ignoring family involvement in Latin American decisions, misunderstanding Islamic finance requirements, being too informal with Middle Eastern clients) with corrective strategies."
    weight: 0.30
    description: "MistakePrevention"
