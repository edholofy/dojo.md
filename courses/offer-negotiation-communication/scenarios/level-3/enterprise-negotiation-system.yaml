meta:
  id: enterprise-negotiation-system
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Build an enterprise negotiation system for a large brokerage — standardized processes, training programs, analytics, and quality assurance for consistent negotiation outcomes"
  tags: [enterprise-system, brokerage-operations, negotiation-analytics, advanced]

state: {}

trigger: |
  A 350-agent brokerage wants to standardize its
  negotiation practices. Currently, each agent negotiates
  differently with inconsistent results. Design the
  complete system.

  Current problems:
  - Average list/sale ratio: 96.2% (top agents: 99.1%,
    bottom quartile: 93.4%)
  - 12% of deals fall through during negotiation
  - 3 ethics complaints last year related to negotiation
    communication
  - No standardized offer presentation format
  - No tracking of negotiation outcomes or patterns
  - New agents often make costly mistakes

  System requirements:
  1. Standardized negotiation playbooks (buyer/seller)
  2. Communication templates and quality standards
  3. Mentorship program for new agent negotiations
  4. Analytics dashboard tracking negotiation KPIs
  5. Ethics compliance guardrails
  6. Technology integration (CRM, e-signature, comms)

  KPI targets:
  - List/sale ratio: improve to 97.5% average
  - Deal fall-through rate: reduce to 8%
  - Ethics complaints: zero
  - Agent satisfaction: 85%+ with system
  - Client satisfaction: 90%+ post-transaction

  Create the complete negotiation system design.

assertions:
  - type: llm_judge
    criteria: "Response designs comprehensive playbooks — separate buyer-side and seller-side negotiation frameworks with decision trees for common scenarios (multiple offers, inspection findings, appraisal gaps), with specific language guidelines and escalation paths."
    weight: 0.35
    description: "PlaybookDesign"
  - type: llm_judge
    criteria: "Analytics dashboard tracks meaningful KPIs — list/sale ratio by agent/office, deal fall-through rates with root cause analysis, time-to-close by negotiation complexity, and pattern recognition for common negotiation failures."
    weight: 0.35
    description: "AnalyticsDesign"
  - type: llm_judge
    criteria: "Ethics compliance is built into the system — automated checks for dual agency disclosure, communication logging requirements, prohibited practice alerts, and mentorship review for new agents' first 10 negotiations."
    weight: 0.30
    description: "EthicsIntegration"
