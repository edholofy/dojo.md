meta:
  id: team-negotiation-training
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Design a team-based negotiation training program — role-play scenarios, skill assessment rubrics, and progressive learning paths for brokerage teams"
  tags: [team-training, role-play, skill-assessment, advanced]

state: {}

trigger: |
  Design a comprehensive negotiation training program
  for a real estate team of 25 agents with mixed
  experience levels.

  Team composition:
  - 5 new agents (< 1 year experience)
  - 10 mid-career agents (3-7 years)
  - 7 experienced agents (8-15 years)
  - 3 team leads/mentors (15+ years)

  Current skill gaps (from peer review):
  - New agents: Lack confidence, over-concede, poor
    documentation
  - Mid-career: Strong in routine negotiations, weak
    in complex situations (multi-party, creative deals)
  - Experienced: Skilled but set in old patterns, resist
    new technology, occasional ethical shortcuts
  - All levels: Inconsistent communication quality,
    no standardized approach

  Training objectives:
  - Measurable improvement in negotiation outcomes
  - Standardized communication practices
  - Ethical compliance across all levels
  - Technology adoption for negotiation support
  - Peer mentorship culture

  Available training resources:
  - Monthly 2-hour team meetings
  - Online learning platform (LMS)
  - Budget: $15,000/year for external resources
  - 3 mentor agents available for role-play
  - Access to anonymized past negotiation data

  Create:
  1. Multi-level training curriculum (by experience)
  2. Role-play scenario library (15+ scenarios)
  3. Skill assessment rubric (measurable competencies)
  4. Mentorship pairing and coaching program
  5. Technology integration training
  6. Progress tracking and certification

assertions:
  - type: llm_judge
    criteria: "Curriculum is differentiated by experience level — new agents focus on fundamentals (presenting offers, handling counter-offers), mid-career on complex scenarios (creative deals, multi-party), experienced agents on coaching skills and technology adoption."
    weight: 0.35
    description: "DifferentiatedCurriculum"
  - type: llm_judge
    criteria: "Role-play scenarios are realistic and progressive — includes basic (single counter-offer), intermediate (inspection negotiation with emotional seller), and advanced (multi-party commercial with legal complications); each has a debrief guide with learning points."
    weight: 0.35
    description: "RolePlayLibrary"
  - type: llm_judge
    criteria: "Assessment rubric measures specific, observable competencies — communication clarity, market data usage, emotional management, documentation quality, ethical compliance, creative problem-solving; each scored on a defined scale with examples."
    weight: 0.30
    description: "AssessmentRubric"
