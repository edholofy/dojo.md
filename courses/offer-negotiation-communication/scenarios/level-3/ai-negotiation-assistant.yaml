meta:
  id: ai-negotiation-assistant
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Design an AI-powered negotiation assistant — real-time strategy recommendations, communication drafting, and outcome prediction for real estate negotiations"
  tags: [ai-assistant, negotiation-technology, real-time-strategy, advanced]

state: {}

trigger: |
  A PropTech startup wants to build an AI negotiation
  assistant for real estate agents. Design the product
  concept and feature set.

  Vision: An AI copilot that sits alongside agents
  during negotiations, providing real-time data,
  strategy suggestions, and communication drafts.

  Core features to design:
  1. Real-time comparable analysis during negotiation
  2. Counter-offer recommendation engine
  3. Communication tone and content analysis
  4. Outcome prediction based on negotiation patterns
  5. Risk assessment for each negotiation move
  6. Compliance checking for all communications

  Data inputs available:
  - MLS data (real-time)
  - Historical negotiation outcomes (500K+ transactions)
  - Agent communication logs (with permission)
  - Market condition indicators
  - Property-specific data (inspections, appraisals)
  - Agent performance history

  Constraints:
  - Must not make decisions for the agent
  - Must comply with Fair Housing Act
  - Must not create unauthorized practice of law
  - Must protect client confidentiality
  - Must work on mobile devices in real-time
  - Must integrate with existing CRM/MLS systems

  Create:
  1. Product requirements document
  2. AI model architecture for key features
  3. User experience flow (agent in negotiation)
  4. Ethical framework and guardrails
  5. Training data strategy
  6. Competitive positioning

assertions:
  - type: llm_judge
    criteria: "Response designs a focused product — prioritizes features that agents actually need in real-time (comparable data, communication drafting, compliance checking) over impressive-sounding but less useful features; the UX flow reflects how agents actually work during negotiations."
    weight: 0.35
    description: "ProductDesignFocus"
  - type: llm_judge
    criteria: "AI model architecture is realistic — explains what models power each feature (NLP for communication analysis, regression/ML for outcome prediction, rule-based for compliance), acknowledges limitations, and addresses the cold-start problem for new markets."
    weight: 0.35
    description: "TechnicalRealism"
  - type: llm_judge
    criteria: "Ethical framework is thorough — addresses Fair Housing compliance (no steering, no discriminatory patterns), unauthorized practice of law (suggestions not legal advice), confidentiality (data handling), and the risk of AI bias in negotiation recommendations."
    weight: 0.30
    description: "EthicalFramework"
