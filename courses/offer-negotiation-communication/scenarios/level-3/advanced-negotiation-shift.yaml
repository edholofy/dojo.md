meta:
  id: advanced-negotiation-shift
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Handle a complex advanced shift simulation — integrate multiple advanced negotiation challenges across commercial, residential, and international contexts simultaneously"
  tags: [shift-simulation, multi-context, cross-functional, advanced]

state: {}

trigger: |
  You're a managing broker overseeing three complex
  negotiations that each require different expertise
  and are creating interconnected complications.

  Situation 1 — International buyer + seller's 1031:
  - Japanese corporate buyer purchasing $2.8M property
  - Buyer's counsel requires bi-lingual contract
  - Seller needs 1031 exchange with identification
    deadline in 10 days
  - Seller's replacement property fell through yesterday
  - If this deal delays, seller loses $450K in tax
    deferral
  - Buyer's team operates on 12-hour time zone difference
  - Buyer wants 45-day due diligence (seller needs
    30-day close)

  Situation 2 — Multi-family portfolio sale:
  - 12-unit apartment building, $1.4M
  - 3 tenants have filed habitability complaints
  - City inspection scheduled in 2 weeks
  - Buyer's lender requires clear inspection before
    funding
  - Seller wants as-is sale but hasn't disclosed the
    complaints
  - Your agent discovered the complaints through public
    records

  Situation 3 — Agent dispute:
  - Two of your agents are in a commission dispute on
    a $380K transaction
  - Agent A says they brought the buyer and showed
    the property
  - Agent B says they had an existing buyer agency
    agreement with the same client
  - The buyer confirms they worked with both agents
  - Closing is in 5 days and neither agent will sign
    the commission disbursement

  Address all three situations with:
  1. Immediate actions and communications
  2. Ethical and legal analysis
  3. Resolution strategies
  4. Risk mitigation for the brokerage

assertions:
  - type: llm_judge
    criteria: "Situation 1 is handled with both cultural awareness and urgency — addresses the 1031 deadline crisis (10 days), proposes timeline compromise that protects the seller's tax position, and manages international communication challenges (time zones, language, bi-cultural contract requirements)."
    weight: 0.35
    description: "InternationalPlusExchangeResolution"
  - type: llm_judge
    criteria: "Situation 2 addresses the disclosure obligation directly — the undisclosed habitability complaints create legal liability; recommends immediate seller disclosure, addresses how this affects negotiation positioning, and manages the inspection timeline risk for the buyer's lender."
    weight: 0.35
    description: "DisclosureAndComplianceResolution"
  - type: llm_judge
    criteria: "Commission dispute is resolved fairly and quickly — reviews both agents' documentation, applies brokerage policy and state regulations, proposes an equitable resolution that doesn't delay the closing, and establishes precedent for future disputes."
    weight: 0.30
    description: "CommissionDisputeResolution"
