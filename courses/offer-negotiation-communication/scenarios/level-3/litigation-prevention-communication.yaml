meta:
  id: litigation-prevention-communication
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Design communication practices that prevent litigation — documentation standards, disclosure requirements, and risk management in negotiation communications"
  tags: [litigation-prevention, risk-management, documentation, advanced]

state: {}

trigger: |
  Your brokerage's E&O insurance carrier has flagged
  negotiation communication as the #1 source of claims.
  Design a litigation-prevention communication framework.

  Claim data (last 3 years at your brokerage):
  | Claim Type                    | Count | Avg Cost  |
  |-------------------------------|-------|-----------|
  | Undisclosed property defect   |   8   | $45,000   |
  | Misrepresentation of terms    |   5   | $32,000   |
  | Failure to present offer      |   3   | $28,000   |
  | Earnest money dispute         |   4   | $15,000   |
  | Dual agency conflict          |   2   | $52,000   |
  | Deadline miscommunication     |   3   | $22,000   |
  | Unauthorized practice of law  |   2   | $38,000   |
  | Total                         |  27   | $882,000  |

  Common communication failures identified:
  - Verbal promises not documented in writing
  - Text messages with legal implications not archived
  - Vague language in repair negotiations
  - Failure to confirm receipt of offers/counters
  - Inconsistent disclosure language
  - Agent opinions presented as facts
  - Unauthorized legal/financial advice

  Requirements:
  - Reduce claims by 50% within 2 years
  - Maintain agent efficiency (not so bureaucratic
    that it slows business)
  - Integrate with existing technology (Dotloop,
    DocuSign, CRM)
  - Include training and accountability measures

  Create:
  1. Communication documentation standards
  2. Template library for high-risk communications
  3. Disclosure compliance checklist
  4. Technology-enabled safeguards
  5. Training program for claim prevention
  6. Incident response protocol

assertions:
  - type: llm_judge
    criteria: "Documentation standards address the specific claim types — requires written confirmation for all offers/counters (prevents failure to present), standardized disclosure language (prevents misrepresentation), and archiving protocols for texts and calls (prevents verbal promise disputes)."
    weight: 0.35
    description: "DocumentationStandards"
  - type: llm_judge
    criteria: "Template library provides ready-to-use language for the highest-risk communications — inspection repair responses, earnest money release requests, disclosure statements, and dual agency notifications; each template includes 'never say' warnings."
    weight: 0.35
    description: "TemplateLibrary"
  - type: llm_judge
    criteria: "Safeguards are practical, not bureaucratic — uses technology (automated confirmation receipts, CRM-integrated disclosure tracking, text archiving tools) to reduce friction; training focuses on the 7 claim types with real examples from the brokerage's own history."
    weight: 0.30
    description: "PracticalSafeguards"
