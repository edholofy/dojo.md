meta:
  id: commercial-lease-negotiation
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Navigate commercial lease negotiations — LOI drafting, tenant improvement negotiations, lease structure options, and landlord/tenant communication dynamics"
  tags: [commercial-lease, LOI-drafting, tenant-improvements, advanced]

state: {}

trigger: |
  Your commercial client (a growing restaurant group)
  wants to lease a 4,500 SF retail space. Negotiate
  the lease terms.

  Space details:
  - Location: 1200 Main Street, downtown retail corridor
  - Size: 4,500 SF (was previously a clothing store)
  - Landlord: Regional REIT, professionally managed
  - Asking rent: $32/SF NNN ($144,000/year)
  - NNN estimated: $8.50/SF ($38,250/year)
  - Available: Immediately (vacant 4 months)

  Tenant requirements:
  - Extensive build-out needed (restaurant from retail)
  - Estimated TI cost: $185,000
  - Wants 10-year lease for TI amortization
  - Wants 6-month rent abatement during build-out
  - Needs exclusive use clause (no other restaurants
    in the center)
  - Wants option to expand into adjacent 2,000 SF
  - Personal guarantee limitation requested

  Landlord's known position:
  - Minimum 5-year term
  - TI allowance: Up to $45/SF ($202,500) for 10-year
  - Rent abatement: 3 months maximum
  - Exclusive use: Willing for "full-service restaurant"
    (not fast-casual or coffee)
  - Expansion option: Possible but wants right of first
    refusal not guaranteed option
  - Personal guarantee: Full for first 3 years, then
    burns off to 50%

  Create:
  1. Letter of Intent (LOI) drafting
  2. Key negotiation points and strategy
  3. Communication to landlord's representative
  4. Counter-proposal for contested terms

assertions:
  - type: llm_judge
    criteria: "LOI covers all material commercial lease terms — base rent with escalation schedule, NNN structure, TI allowance and delivery condition, rent abatement period, exclusive use clause scope, expansion rights, personal guarantee terms, and lease options (renewal, termination)."
    weight: 0.35
    description: "LOICompleteness"
  - type: llm_judge
    criteria: "Negotiation strategy identifies trade-offs — knows which terms have room (TI allowance is generous, use it; rent abatement has gap but 4 months vacant creates leverage) and which to concede (personal guarantee burn-off is reasonable); creates package deals."
    weight: 0.35
    description: "NegotiationStrategy"
  - type: llm_judge
    criteria: "Communication to landlord positions the tenant as desirable — restaurant drives foot traffic (benefits other tenants), restaurant group's track record reduces risk, long-term lease commitment provides income stability; frames requests as mutual benefit."
    weight: 0.30
    description: "TenantPositioning"
