meta:
  id: luxury-negotiation-protocol
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Design luxury property negotiation protocols — high-stakes communication, privacy management, and white-glove service standards for ultra-premium transactions"
  tags: [luxury-negotiation, high-net-worth, privacy, advanced]

state: {}

trigger: |
  Your luxury division handles $2M+ transactions.
  Design the negotiation protocol for high-net-worth
  clients and premium properties.

  Luxury negotiation differences:
  - Transaction amounts: $2M-$25M
  - Clients: CEOs, professional athletes, entertainers,
    tech founders, trust funds
  - Privacy: Paramount — many use LLCs, trusts, or
    buyer's agents with NDAs
  - Timeline: Often slower (not urgency-driven)
  - Contingencies: More complex (estate planning,
    tax structuring, 1031 exchanges)
  - Communication: Through attorneys, business managers,
    personal assistants

  Current challenges:
  - Offer presentation through intermediaries (4-5
    people between buyer and seller)
  - Confidential sale prices (off-market, pocket
    listings)
  - Multiple properties under consideration globally
  - Cultural sensitivity (international UHNWIs)
  - Media attention for celebrity transactions
  - Custom contract terms (non-standard addenda)

  Sample scenario:
  - Property: $8.5M estate, off-market
  - Buyer: Tech founder, communicates through
    family office
  - Seller: Elderly patriarch, communicates through
    estate attorney and adult child
  - Buyer wants to see property but demands NDA first
  - Buyer's family office wants custom inspection
    terms (30 days, 4 separate inspections)
  - Both sides want confidentiality clause in contract

  Create:
  1. Luxury negotiation protocol manual
  2. Privacy and confidentiality framework
  3. Multi-party communication chain management
  4. Sample NDA and confidentiality provisions
  5. White-glove service standards for negotiation

assertions:
  - type: llm_judge
    criteria: "Protocol manual addresses luxury-specific dynamics — longer timelines, intermediary communication chains, off-market transaction processes, and the unique psychology of UHNW clients (they're buying a lifestyle, not just a property)."
    weight: 0.35
    description: "LuxuryProtocolDesign"
  - type: llm_judge
    criteria: "Privacy framework is comprehensive — NDA templates for property viewings, confidentiality clauses for contracts, entity structure guidance (LLC/trust purchasing), media management for public figure clients, and data handling for sensitive financial information."
    weight: 0.35
    description: "PrivacyFramework"
  - type: llm_judge
    criteria: "Multi-party communication management is practical — clear protocols for who communicates with whom (agent → family office → client), confirmation of authority for each intermediary, documentation of all communication chains, and escalation paths when intermediaries cause delays."
    weight: 0.30
    description: "CommunicationChainManagement"
