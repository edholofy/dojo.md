meta:
  id: negotiation-analytics-platform
  level: 3
  course: offer-negotiation-communication
  type: output
  description: "Design a negotiation analytics platform — track outcomes, identify patterns, and provide data-driven strategy recommendations across a brokerage"
  tags: [analytics-platform, outcome-tracking, pattern-analysis, advanced]

state: {}

trigger: |
  Your brokerage wants to build a data-driven
  negotiation analytics platform. Design the system.

  Data available:
  - 5,000+ transactions over 5 years
  - Full negotiation history: initial offer, counters,
    final terms, timeline
  - Agent information: experience, specialization,
    transaction count
  - Market conditions at time of each negotiation
  - Inspection reports and repair negotiations
  - Appraisal outcomes and gap resolutions
  - Client satisfaction surveys (post-closing)

  Questions the platform should answer:
  1. "What's the optimal initial offer for this market
     condition?" (predict negotiation range)
  2. "Which negotiation tactics produce the best
     outcomes?" (strategy effectiveness)
  3. "Where are our agents underperforming in
     negotiations?" (coaching opportunities)
  4. "What's the likelihood this deal closes based on
     current negotiation trajectory?" (deal scoring)
  5. "How do our negotiation outcomes compare to
     market averages?" (benchmarking)

  Users:
  - Individual agents: Personal performance dashboards
  - Team leads: Team comparison and coaching tools
  - Broker/owner: Brokerage-wide trends and ROI
  - Training department: Skill gap identification

  Create:
  1. Data model and analytics architecture
  2. Key metrics and KPIs for each user type
  3. Predictive models for negotiation outcomes
  4. Visualization and dashboard design
  5. Privacy and ethical data use framework
  6. Implementation roadmap

assertions:
  - type: llm_judge
    criteria: "Data model captures the full negotiation lifecycle — from initial offer through counter-offers, contingency negotiations, and final closing; links to market conditions, agent profiles, and client outcomes to enable meaningful pattern analysis."
    weight: 0.35
    description: "DataModelCompleteness"
  - type: llm_judge
    criteria: "Predictive models are grounded in realistic approaches — uses market condition variables, property characteristics, and historical patterns to predict negotiation ranges and deal closure probability; acknowledges limitations and confidence intervals."
    weight: 0.35
    description: "PredictiveModelRealism"
  - type: llm_judge
    criteria: "Privacy framework addresses sensitive data — agent performance comparisons require consent, client data is anonymized for aggregate analysis, individual negotiation details aren't exposed to competitors, and the platform doesn't create unfair advantages."
    weight: 0.30
    description: "PrivacyAndEthics"
