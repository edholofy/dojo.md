meta:
  id: listicle-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a listicle/ranked video"
  tags: [thumbnail, listicle, ranking, format]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "Top 10 Productivity Apps You NEED in 2026"
  Channel: Productivity/tech channel with 150K subscribers
  Genre: Listicle/ranking

  The thumbnail should communicate the "top 10" format while being clean and not cluttered.

assertions:
  - type: llm_judge
    criteria: "The number/ranking element is prominent and eye-catching — uses a large, bold number or visual ranking system that immediately communicates this is a list/ranking format"
    weight: 0.25
    description: "Number/ranking element prominent"
  - type: llm_judge
    criteria: "The design is clean despite the listicle format — doesn't try to show all 10 apps as tiny icons. Instead, focuses on 1-3 recognizable elements that represent the best picks"
    weight: 0.30
    description: "Clean design, not cluttered with all items"
  - type: llm_judge
    criteria: "The thumbnail creates FOMO or curiosity — makes viewers feel they're missing out on apps that could change their productivity, not just seeing a generic list"
    weight: 0.25
    description: "Creates FOMO about missing valuable apps"
  - type: llm_judge
    criteria: "The year '2026' or a freshness indicator is visually prominent — communicates this is current content, which matters for tech/productivity audiences"
    weight: 0.20
    description: "Freshness/currency visually communicated"
