meta:
  id: educational-explainer-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for an educational/explainer video"
  tags: [thumbnail, education, explainer, informational]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "How the Stock Market Actually Works (Explained Simply)"
  Channel: Finance education channel with 400K subscribers
  Genre: Educational/explainer

  The thumbnail should make a complex topic feel accessible and clickable.

assertions:
  - type: llm_judge
    criteria: "The complex topic (stock market) is made visually accessible — uses simplified icons, diagrams, or metaphors rather than complex charts or jargon that would intimidate beginners"
    weight: 0.25
    description: "Complex topic made visually accessible"
  - type: llm_judge
    criteria: "The thumbnail creates a knowledge gap — makes viewers feel they don't fully understand how the stock market works and this video will fill that gap"
    weight: 0.25
    description: "Creates a knowledge gap impulse"
  - type: llm_judge
    criteria: "The visual is engaging despite being educational — doesn't look like a boring textbook diagram but uses creative visual representation that stands out"
    weight: 0.25
    description: "Engaging despite educational topic"
  - type: llm_judge
    criteria: "The 'explained simply' promise is visually reinforced — the thumbnail itself demonstrates simplicity through clean design, clear visuals, and minimal complexity"
    weight: 0.25
    description: "Simplicity promise reinforced by clean design"
