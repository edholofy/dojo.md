meta:
  id: product-review-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a tech product review"
  tags: [thumbnail, tech, review, product]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "iPhone 16 Pro Review — Is It Worth the Upgrade?"
  Channel: Tech review channel with 200K subscribers
  Genre: Product review

  Describe the complete thumbnail concept. Remember: 70% of YouTube views
  happen on mobile where thumbnails appear very small.

assertions:
  - type: llm_judge
    criteria: "The product (iPhone 16 Pro) is clearly visible and recognizable even at small mobile thumbnail size — the phone is prominently featured, not tiny in the background"
    weight: 0.25
    description: "Product clearly visible at mobile size"
  - type: llm_judge
    criteria: "The thumbnail creates a question or tension about the review verdict — uses visual cues (thumbs up/down, rating scale, expression of surprise/disappointment) that make viewers click to find out the answer"
    weight: 0.25
    description: "Creates tension about the verdict"
  - type: llm_judge
    criteria: "The text overlay complements the title rather than duplicating it — doesn't repeat 'iPhone 16 Pro Review' but might add a hook like 'WORTH IT?' or a score hint"
    weight: 0.25
    description: "Text complements title, not duplicates"
  - type: llm_judge
    criteria: "The color scheme provides high contrast against YouTube's white background and doesn't clash with the YouTube UI elements (red progress bar, timestamp overlay)"
    weight: 0.25
    description: "High contrast, works with YouTube UI"
