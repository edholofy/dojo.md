meta:
  id: challenge-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a challenge/experiment video"
  tags: [thumbnail, challenge, experiment, entertainment]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "I Lived on $1 a Day for 30 Days"
  Channel: Lifestyle experiment channel with 250K subscribers
  Genre: Challenge/experiment

  The thumbnail should communicate the extreme nature of the challenge
  and create empathy or disbelief.

assertions:
  - type: llm_judge
    criteria: "The extreme nature of the challenge ($1/day for 30 days) is visually communicated in a way that creates immediate disbelief or curiosity — 'how is that even possible?'"
    weight: 0.30
    description: "Extreme challenge visually communicated"
  - type: llm_judge
    criteria: "The thumbnail shows consequence or struggle — visual elements suggest what living on $1 looks like (minimal food, empty fridge, physical change) creating empathy"
    weight: 0.25
    description: "Shows struggle/consequence visually"
  - type: llm_judge
    criteria: "The creator's expression adds emotional weight — whether exhaustion, determination, or shock at the end, the face tells part of the story"
    weight: 0.25
    description: "Creator's expression adds emotional weight"
  - type: llm_judge
    criteria: "The $1 amount is visually prominent and shocking — uses a large number, dollar bill imagery, or price tag visual that makes the challenge immediately comprehensible"
    weight: 0.20
    description: "$1 amount visually prominent and shocking"
