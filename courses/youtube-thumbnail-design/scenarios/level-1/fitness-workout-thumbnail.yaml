meta:
  id: fitness-workout-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a workout/fitness video"
  tags: [thumbnail, fitness, workout, health]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "15 Minute Full Body Workout — No Equipment"
  Channel: Fitness channel with 500K subscribers
  Genre: Workout/fitness

  The thumbnail should appeal to people looking for a quick workout and convey energy.

assertions:
  - type: llm_judge
    criteria: "The thumbnail conveys energy and movement — uses dynamic poses, action shots, or visual elements that communicate 'active workout' rather than a static posed photo"
    weight: 0.25
    description: "Conveys energy and movement"
  - type: llm_judge
    criteria: "The 'no equipment' and '15 minutes' key selling points are visually communicated — through text overlay, visual absence of gym equipment, or time indicator that sets expectations"
    weight: 0.25
    description: "Key selling points visually communicated"
  - type: llm_judge
    criteria: "The body shown in the thumbnail is aspirational but achievable — motivates viewers to click without being intimidating or discouraging for beginners"
    weight: 0.25
    description: "Aspirational but achievable body representation"
  - type: llm_judge
    criteria: "Colors are high-energy and contrast well — uses vibrant colors (oranges, greens, bright blues) that stand out in a feed and match the energetic fitness genre"
    weight: 0.25
    description: "High-energy colors with good contrast"
