meta:
  id: storytime-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a storytime/narrative video"
  tags: [thumbnail, storytime, drama, narrative]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "I Quit My $200K Job (Here's Why)"
  Channel: Career/entrepreneurship channel with 100K subscribers
  Genre: Storytime/personal narrative

  The thumbnail should create maximum curiosity and an emotional hook.

assertions:
  - type: llm_judge
    criteria: "The thumbnail creates strong curiosity — uses visual storytelling that makes viewers NEED to know why someone would quit a $200K job. The emotional hook is impossible to scroll past"
    weight: 0.30
    description: "Creates strong curiosity about the story"
  - type: llm_judge
    criteria: "The $200K figure or salary concept is visually represented in an impactful way — whether through text, money imagery, or contrast between corporate and freedom"
    weight: 0.25
    description: "$200K figure visually impactful"
  - type: llm_judge
    criteria: "The creator's expression tells the story — whether regret, relief, excitement, or contemplation, the emotion on their face gives a hint at the narrative without revealing the conclusion"
    weight: 0.25
    description: "Facial expression hints at narrative"
  - type: llm_judge
    criteria: "The composition uses contrast — corporate vs. free, money vs. passion, suit vs. casual — to visually represent the transformation implied by the title"
    weight: 0.20
    description: "Visual contrast represents transformation"
