meta:
  id: comparison-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a comparison/versus video"
  tags: [thumbnail, comparison, versus, split]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "MacBook Pro vs Dell XPS — Which Should You Buy?"
  Channel: Tech channel with 300K subscribers
  Genre: Comparison/versus

  The thumbnail should clearly communicate the comparison format and create
  tension about which product wins.

assertions:
  - type: llm_judge
    criteria: "The comparison is immediately obvious — the thumbnail uses a clear visual structure (split screen, VS graphic, side-by-side) that communicates 'this is a comparison' at a glance"
    weight: 0.25
    description: "Comparison format immediately obvious"
  - type: llm_judge
    criteria: "Both products are equally visible and recognizable — neither laptop dominates, maintaining the tension of which one wins"
    weight: 0.25
    description: "Both products equally visible"
  - type: llm_judge
    criteria: "The thumbnail creates a desire to see the verdict — uses visual cues (question marks, arrows, checkmarks, or the creator pointing/choosing) that make viewers want to click for the answer"
    weight: 0.25
    description: "Creates desire to see the verdict"
  - type: llm_judge
    criteria: "The design is clean with high contrast despite showing two products — the comparison doesn't make the thumbnail look cluttered or busy"
    weight: 0.25
    description: "Clean design despite comparison complexity"
