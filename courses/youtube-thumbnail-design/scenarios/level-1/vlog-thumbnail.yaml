meta:
  id: vlog-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a personal vlog"
  tags: [thumbnail, vlog, lifestyle, personal]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "I Moved to Tokyo! (First Week)"
  Channel: Travel/lifestyle vlogger with 80K subscribers
  Genre: Vlog

  The thumbnail should convey excitement and the "new adventure" feeling.
  Include face/expression direction if featuring the creator.

assertions:
  - type: llm_judge
    criteria: "The thumbnail features a human face with a strong, clear emotion (excitement, wonder, amazement) — research shows faces with strong emotion increase CTR by 20-30%"
    weight: 0.30
    description: "Strong emotional face expression"
  - type: llm_judge
    criteria: "Tokyo is immediately recognizable in the background — uses iconic visual elements (neon signs, temples, cityscapes, cherry blossoms) that communicate the location without text"
    weight: 0.25
    description: "Location immediately recognizable"
  - type: llm_judge
    criteria: "The composition balances the creator's face with the Tokyo backdrop — neither dominates at the expense of the other, creating a 'person in an exciting place' narrative"
    weight: 0.25
    description: "Balanced face-and-backdrop composition"
  - type: llm_judge
    criteria: "The thumbnail tells a story of arrival/newness — visual cues suggest this is the beginning of an adventure, creating curiosity about what happens next"
    weight: 0.20
    description: "Tells an arrival/adventure story"
