meta:
  id: simple-tutorial-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail concept for a simple how-to tutorial video"
  tags: [thumbnail, tutorial, how-to, beginner]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "How to Make Perfect Scrambled Eggs (3 Minutes)"
  Channel: Home cooking channel with 50K subscribers
  Genre: Cooking tutorial

  Describe the thumbnail concept including: composition, text overlay, colors,
  facial expression (if applicable), and any props or visual elements.
  The thumbnail should maximize click-through rate for a cooking tutorial.

assertions:
  - type: llm_judge
    criteria: "The thumbnail concept has a clear single focal point — the viewer's eye is immediately drawn to one main element (the finished eggs, the cooking action, or an expressive face) without competing visual elements"
    weight: 0.25
    description: "Clear single focal point"
  - type: llm_judge
    criteria: "Any text overlay is minimal (3-5 words max), high contrast, and readable at mobile thumbnail size (120px). The text adds value beyond what the video title already says"
    weight: 0.25
    description: "Minimal, high-contrast, mobile-readable text"
  - type: llm_judge
    criteria: "The concept would make a viewer hungry or curious — uses appetizing food photography principles (close-up, steam, vibrant colors, golden texture) that trigger the click impulse"
    weight: 0.25
    description: "Appetizing visual that triggers click impulse"
  - type: llm_judge
    criteria: "The thumbnail concept is specific enough to produce — includes concrete direction for composition, colors, text placement, and visual elements that a designer or creator could execute"
    weight: 0.25
    description: "Specific enough to produce"
