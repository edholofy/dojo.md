meta:
  id: gaming-thumbnail
  level: 1
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a gaming video"
  tags: [thumbnail, gaming, entertainment, gameplay]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "This Secret Strategy Breaks the Game (GTA 6)"
  Channel: Gaming channel with 1M subscribers
  Genre: Gaming

  The thumbnail should generate maximum excitement and curiosity about
  the secret strategy while following gaming thumbnail conventions.

assertions:
  - type: llm_judge
    criteria: "The thumbnail follows gaming genre conventions — bold, vibrant, high-energy design with game-relevant imagery that gaming audiences immediately recognize and respond to"
    weight: 0.25
    description: "Follows gaming thumbnail conventions"
  - type: llm_judge
    criteria: "The 'secret' or 'game-breaking' element creates curiosity — visual hints at the strategy without revealing it, making gamers click to learn the trick"
    weight: 0.25
    description: "Creates curiosity about the secret"
  - type: llm_judge
    criteria: "GTA 6 is clearly identified — game-specific visual elements (logo, characters, recognizable scenes) make it immediately clear which game this is about"
    weight: 0.25
    description: "Game clearly identified"
  - type: llm_judge
    criteria: "The creator's facecam reaction (if included) shows genuine shock or excitement — gaming thumbnails often pair gameplay with expressive creator reactions for higher CTR"
    weight: 0.25
    description: "Creator reaction adds excitement"
