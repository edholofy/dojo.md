meta:
  id: competitive-feed-standout
  level: 3
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnail that stands out when placed next to competitor thumbnails"
  tags: [thumbnail, competitive, standout, feed-context]

state: {}

trigger: |
  Create a thumbnail for a new video about "Best Noise Cancelling Headphones 2026."
  Here are the competitor thumbnails currently ranking for this search:

  Competitor 1: White background, 3 headphones lined up, "BEST NC HEADPHONES" in black
  Competitor 2: Creator wearing headphones, shocked face, yellow background
  Competitor 3: Dark background, single headphone glamour shot, red text "#1 PICK"
  Competitor 4: Split screen comparison of 5 headphones, very busy/cluttered

  Your thumbnail will appear ALONGSIDE these in search results and suggested videos.
  Design something that stands out from this specific competitive set.

assertions:
  - type: llm_judge
    criteria: "The concept is visually distinct from all four competitors — it would immediately stand out when placed alongside white/yellow/dark backgrounds and the common formats described"
    weight: 0.30
    description: "Visually distinct from all four competitors"
  - type: llm_judge
    criteria: "The differentiation strategy is explained — the agent articulates WHY their concept stands out (different color, unexpected format, unique angle, emotional approach competitors missed)"
    weight: 0.25
    description: "Differentiation strategy explained"
  - type: llm_judge
    criteria: "The concept still communicates 'headphone review/comparison' clearly — standing out doesn't mean confusing viewers about what the video is"
    weight: 0.25
    description: "Still clearly communicates the content"
  - type: llm_judge
    criteria: "The design would attract clicks specifically from people searching for headphone reviews — it's not just visually different but strategically different for the target audience"
    weight: 0.20
    description: "Strategically different for target audience"
