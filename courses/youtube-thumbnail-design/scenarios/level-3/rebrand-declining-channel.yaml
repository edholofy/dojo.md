meta:
  id: rebrand-declining-channel
  level: 3
  course: youtube-thumbnail-design
  type: output
  description: "Redesign thumbnail style for a channel with declining CTR"
  tags: [thumbnail, rebrand, declining-ctr, strategy]

state: {}

trigger: |
  A cooking channel "Chef Mike's Kitchen" (350K subscribers) has seen their CTR
  decline from 8% to 3.5% over 6 months. Their current thumbnail style:
  - Always the same layout: chef on left, food on right
  - Same yellow/red color scheme every video
  - Same font, same position, same expression (big smile)
  - "RECIPE" stamp in the corner

  Analytics show: viewers report "thumbnail fatigue" — they can't distinguish
  one video from another in their feed.

  Design a refreshed thumbnail strategy that:
  1. Diagnoses why the current approach is failing
  2. Proposes a new system that prevents fatigue while maintaining brand recognition
  3. Shows example concepts for 3 different upcoming videos

assertions:
  - type: llm_judge
    criteria: "The diagnosis correctly identifies thumbnail fatigue as the core issue — viewers can't distinguish videos because the layout, colors, expression, and format are identical every time"
    weight: 0.25
    description: "Correctly diagnoses thumbnail fatigue"
  - type: llm_judge
    criteria: "The new system balances variety with brand recognition — changes enough elements to prevent fatigue while keeping a thread of consistency (maybe one signature element) that identifies the channel"
    weight: 0.25
    description: "Balances variety with brand recognition"
  - type: llm_judge
    criteria: "Three example concepts demonstrate the variety within the system — each thumbnail looks distinct from the others while still belonging to the same channel"
    weight: 0.25
    description: "Three examples show variety within system"
  - type: llm_judge
    criteria: "The strategy would plausibly improve CTR — the changes address the specific issues (same layout, same expression, same colors) with targeted solutions"
    weight: 0.25
    description: "Strategy would plausibly improve CTR"
