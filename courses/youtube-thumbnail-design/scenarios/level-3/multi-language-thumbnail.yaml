meta:
  id: multi-language-thumbnail
  level: 3
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnail that works across multiple language markets"
  tags: [thumbnail, multi-language, international, scalable]

state: {}

trigger: |
  Create a YouTube thumbnail system for a video being published in 4 languages:
  English, Spanish, Japanese, and Arabic.

  Video: "The Most Dangerous Roads in the World"
  Channel: Travel/documentary with 2M subscribers (global audience)

  Design a thumbnail system where:
  - The visual elements work universally (no text-dependent meaning)
  - Text overlays can be swapped for each language without redesign
  - The thumbnail reads correctly in RTL languages (Arabic)
  - Cultural visual references work globally

assertions:
  - type: llm_judge
    criteria: "The core visual concept communicates 'dangerous roads' universally without text — the visual alone tells the story regardless of language"
    weight: 0.25
    description: "Visual communicates concept universally"
  - type: llm_judge
    criteria: "The text overlay system is designed for easy language swapping — text is positioned in areas that accommodate different text lengths and character sets (Japanese characters, Arabic script)"
    weight: 0.25
    description: "Text system accommodates multiple languages"
  - type: llm_judge
    criteria: "RTL (right-to-left) considerations for Arabic are addressed — the layout works when text direction flips, and any directional visual elements are considered"
    weight: 0.25
    description: "RTL considerations addressed"
  - type: llm_judge
    criteria: "Visual references are globally understood — the concept doesn't rely on cultural knowledge specific to one region (like specific road signs or landmarks only recognizable in one country)"
    weight: 0.25
    description: "Visual references globally understood"
