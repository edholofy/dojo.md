meta:
  id: clickbait-vs-accurate
  level: 3
  course: youtube-thumbnail-design
  type: output
  description: "Find the line between clickbait and accurate thumbnails"
  tags: [thumbnail, clickbait, accuracy, ethics]

state: {}

trigger: |
  A creator sent you two thumbnail concepts for their video:
  Title: "My Honest Review of Living in Portugal for 1 Year"

  Concept A (Clickbait): Creator crying, red "X" over Portugal flag, text says
  "WORST MISTAKE??" — implies the experience was terrible. The actual video is
  mostly positive (7/10 experience) with some honest downsides.

  Concept B (Too Accurate): Pleasant photo of creator in Lisbon, text says
  "1 Year in Portugal — Pros and Cons." Accurately represents the content
  but is boring.

  Neither is ideal. Design a THIRD option that's:
  - Honest about the content (mostly positive with some downsides)
  - Compelling enough to generate high CTR
  - Not misleading but still creates curiosity

  Explain the principles behind finding this balance.

assertions:
  - type: llm_judge
    criteria: "The third concept finds the genuine middle ground — creates curiosity and emotional engagement without misrepresenting the mostly-positive content as negative. Doesn't over-promise drama or under-promise value"
    weight: 0.30
    description: "Genuine middle ground between clickbait and boring"
  - type: llm_judge
    criteria: "The principles explanation articulates the ethics of thumbnail design — distinguishes between honest curiosity gaps (acceptable) and misleading emotional manipulation (not acceptable)"
    weight: 0.25
    description: "Clear ethical framework for thumbnail design"
  - type: llm_judge
    criteria: "The concept would genuinely generate competitive CTR — it's not just ethically better but would actually perform well in a feed, making the case that honesty and performance aren't opposites"
    weight: 0.25
    description: "Would genuinely generate competitive CTR"
  - type: llm_judge
    criteria: "The analysis of why Concept A is problematic goes beyond 'it's clickbait' — mentions viewer trust erosion, audience retention impact, and YouTube's detection of misleading thumbnails"
    weight: 0.20
    description: "Deep analysis of clickbait consequences"
