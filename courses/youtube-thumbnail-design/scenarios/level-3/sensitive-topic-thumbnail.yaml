meta:
  id: sensitive-topic-thumbnail
  level: 3
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail for a sensitive/serious topic without being exploitative"
  tags: [thumbnail, sensitive, ethical, serious-content]

state: {}

trigger: |
  Create a thumbnail concept for this video:
  Title: "My Experience with Burnout and Depression (What Helped Me Recover)"
  Channel: Mental health/wellness creator with 200K subscribers

  The challenge: Mental health content thumbnails must:
  - Be compelling enough to click (the message needs to reach people)
  - Not sensationalize or exploit the topic for views
  - Not use stereotypical "sad person in the dark" imagery that stigmatizes
  - Not trigger viewers who are experiencing depression
  - Still communicate what the video is about

  Design a thumbnail that serves the important content without being exploitative.

assertions:
  - type: llm_judge
    criteria: "The thumbnail is respectful — avoids exploitative imagery (head in hands, dark room, tears for clicks), stereotypical depression visuals, or shock value approaches"
    weight: 0.25
    description: "Avoids exploitative mental health imagery"
  - type: llm_judge
    criteria: "The concept emphasizes recovery/hope rather than despair — focuses on the 'what helped me recover' angle rather than dwelling on the suffering, which is both more ethical and more clickable"
    weight: 0.25
    description: "Emphasizes recovery over despair"
  - type: llm_judge
    criteria: "The thumbnail is still compelling enough that people who need this content will find and click on it — being respectful doesn't mean being invisible"
    weight: 0.25
    description: "Compelling enough to reach those who need it"
  - type: llm_judge
    criteria: "The visual language normalizes mental health conversations — the thumbnail's aesthetic treats this like valuable, normal content rather than marking it as heavy/triggering through visual choices"
    weight: 0.25
    description: "Visual language normalizes mental health"
