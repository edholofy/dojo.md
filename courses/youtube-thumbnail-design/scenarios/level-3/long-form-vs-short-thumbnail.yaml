meta:
  id: long-form-vs-short-thumbnail
  level: 3
  course: youtube-thumbnail-design
  type: output
  description: "Different thumbnail strategies for long-form vs Shorts content"
  tags: [thumbnail, long-form, shorts, format-specific]

state: {}

trigger: |
  A fitness creator is publishing the SAME content in two formats:
  1. Long-form video (15 minutes): "Complete Ab Workout for Six-Pack Abs"
  2. YouTube Short (60 seconds): Condensed version of the same workout

  Design thumbnail concepts for BOTH formats. Consider:
  - Long-form thumbnails appear in search, suggested, and homepage (landscape)
  - Shorts thumbnails are vertical and appear in the Shorts shelf
  - They're competing for different viewer mindsets (searching vs. scrolling)
  - They should be related but not identical

assertions:
  - type: llm_judge
    criteria: "Both concepts are provided with clear differentiation — the long-form thumbnail is designed for landscape/search behavior while the Shorts thumbnail is designed for vertical/scroll behavior"
    weight: 0.25
    description: "Both formats provided with clear differentiation"
  - type: llm_judge
    criteria: "The long-form thumbnail is optimized for intentional viewing — designed for viewers actively searching for ab workouts, emphasizing value and credibility"
    weight: 0.25
    description: "Long-form optimized for search/intentional viewing"
  - type: llm_judge
    criteria: "The Shorts thumbnail is optimized for scroll-stopping — designed for the Shorts shelf where viewers are passively scrolling, emphasizing immediate visual impact"
    weight: 0.25
    description: "Shorts optimized for scroll-stopping"
  - type: llm_judge
    criteria: "The two thumbnails are visually related but not identical — viewers who see both would recognize them as connected content without finding them redundant"
    weight: 0.25
    description: "Related but not identical concepts"
