meta:
  id: seasonal-event-thumbnail
  level: 3
  course: youtube-thumbnail-design
  type: output
  description: "Design time-sensitive thumbnail for a trending event"
  tags: [thumbnail, trending, time-sensitive, event]

state: {}

trigger: |
  A tech channel needs a thumbnail published within 2 hours of Apple's WWDC keynote.
  The video will be: "Everything Apple Just Announced at WWDC 2026"

  Constraints:
  - You don't know what will be announced yet (thumbnail must be prepped in advance)
  - Dozens of tech channels will publish similar videos simultaneously
  - Speed matters — first to publish with a compelling thumbnail wins
  - The thumbnail might need to be updated after the event with actual product images

  Design a thumbnail strategy with:
  1. A pre-event template ready to go
  2. Instructions for rapid post-event customization
  3. How to stand out from 50+ identical WWDC recap thumbnails

assertions:
  - type: llm_judge
    criteria: "The pre-event template is genuinely ready to publish — could go live within minutes of the keynote ending with minimal edits"
    weight: 0.25
    description: "Pre-event template ready for rapid deployment"
  - type: llm_judge
    criteria: "The post-event customization instructions are clear and fast — identify exactly what to swap (product image, feature highlight) and where, enabling a designer to update in under 15 minutes"
    weight: 0.25
    description: "Clear rapid customization instructions"
  - type: llm_judge
    criteria: "The concept stands out from typical WWDC recap thumbnails (which all use Apple's color scheme, Apple logo, product lineup) — has a differentiating element"
    weight: 0.25
    description: "Stands out from typical WWDC thumbnails"
  - type: llm_judge
    criteria: "The strategy accounts for the competitive speed dynamics — understands that in time-sensitive content, a good-enough thumbnail published fast beats a perfect thumbnail published late"
    weight: 0.25
    description: "Accounts for speed vs perfection tradeoff"
