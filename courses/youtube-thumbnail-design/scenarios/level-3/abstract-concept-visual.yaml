meta:
  id: abstract-concept-visual
  level: 3
  course: youtube-thumbnail-design
  type: output
  description: "Visualize an abstract concept in a concrete thumbnail"
  tags: [thumbnail, abstract, visualization, creative]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "Why Time Feels Like It's Speeding Up (The Science)"
  Channel: Science/philosophy channel with 700K subscribers

  The challenge: "time perception" is an abstract concept with no obvious visual
  representation. You can't photograph the feeling of time speeding up.

  Create a thumbnail that makes this abstract concept immediately visually
  understandable and clickable.

assertions:
  - type: llm_judge
    criteria: "The abstract concept (time feeling faster) is made visually concrete through a creative metaphor, visual device, or symbolic representation that viewers instantly understand"
    weight: 0.30
    description: "Abstract concept made visually concrete"
  - type: llm_judge
    criteria: "The visual metaphor is original and not a cliché — avoids obvious representations like a melting clock (Dali), simple hourglass, or a generic clock face"
    weight: 0.25
    description: "Original metaphor, not cliché"
  - type: llm_judge
    criteria: "The thumbnail creates the actual FEELING of time speeding up through visual design — motion blur, acceleration, compression, or other design techniques that evoke the sensation"
    weight: 0.25
    description: "Design evokes the actual feeling"
  - type: llm_judge
    criteria: "The scientific angle is hinted at visually — something in the design suggests this is a scientific/educational video, not just a philosophical musing"
    weight: 0.20
    description: "Scientific angle visually suggested"
