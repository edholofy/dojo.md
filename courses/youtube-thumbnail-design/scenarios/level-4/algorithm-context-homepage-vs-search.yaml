meta:
  id: algorithm-context-homepage-vs-search
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnails optimized for different algorithm surfaces"
  tags: [thumbnail, algorithm, homepage, search, suggested]

state: {}

trigger: |
  YouTube shows thumbnails in different contexts where viewer behavior differs:
  1. Homepage (browsing, passive discovery — need to stop scroll)
  2. Search results (active intent — need to match query)
  3. Suggested videos sidebar (competitive — next to the video being watched)
  4. Notifications/subscriptions (loyal audience — brand recognition matters)

  Video: "How to Negotiate Your Salary (Get Paid More)"
  Channel: Career advice with 250K subscribers

  Design TWO thumbnail variants:
  - Variant A: Optimized for Homepage/Browse (scroll-stopping)
  - Variant B: Optimized for Search (intent-matching)

  Explain why each is optimized for its context.

assertions:
  - type: llm_judge
    criteria: "Two distinct variants are provided with clear context optimization — Variant A prioritizes scroll-stopping visual impact while Variant B prioritizes search intent matching and credibility"
    weight: 0.25
    description: "Two variants optimized for different contexts"
  - type: llm_judge
    criteria: "The explanations demonstrate genuine understanding of viewer psychology in each context — passive browsing vs. active searching creates different click motivations"
    weight: 0.25
    description: "Understands different viewer psychology per context"
  - type: llm_judge
    criteria: "The browse variant uses emotional triggers (curiosity, FOMO, aspiration) while the search variant uses trust signals (authority, clarity, match to query)"
    weight: 0.25
    description: "Appropriate triggers for each context"
  - type: llm_judge
    criteria: "Both variants are specific to the salary negotiation topic — the optimization isn't generic but considers what browse viewers and search viewers specifically want from this content"
    weight: 0.25
    description: "Topic-specific optimization, not generic"
