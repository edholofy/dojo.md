meta:
  id: accessibility-in-thumbnails
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnails accessible to colorblind and visually impaired viewers"
  tags: [thumbnail, accessibility, colorblind, inclusive]

state: {}

trigger: |
  Create a YouTube thumbnail concept that's accessible to viewers with:
  1. Red-green colorblindness (deuteranopia — 8% of men)
  2. Complete colorblindness (achromatopsia — rare but exists)
  3. Low vision (viewers using screen magnification)

  Video: "Red vs Green Flags in a Job Interview"
  Channel: Career advice with 180K subscribers

  The challenge: This video is LITERALLY about red and green — but 8% of male
  viewers can't distinguish those colors.

  Design a thumbnail that communicates "red flags vs green flags" without
  relying solely on the colors red and green.

assertions:
  - type: llm_judge
    criteria: "The red/green distinction is communicated through MULTIPLE channels — not just color but also shape, icons, symbols, text, or spatial position so colorblind viewers understand the concept"
    weight: 0.30
    description: "Red/green communicated without color-dependency"
  - type: llm_judge
    criteria: "The design maintains high contrast that works in grayscale — if all color were removed, the thumbnail would still be readable and the visual hierarchy would hold"
    weight: 0.25
    description: "Maintains high contrast in grayscale"
  - type: llm_judge
    criteria: "The thumbnail is still visually appealing and high-CTR for viewers WITH full color vision — accessibility doesn't come at the cost of design quality"
    weight: 0.25
    description: "Appealing for full color vision viewers too"
  - type: llm_judge
    criteria: "The concept works at magnified viewing — critical elements are large enough and spaced enough that screen magnification doesn't break the design"
    weight: 0.20
    description: "Works at magnified viewing sizes"
