meta:
  id: thumbnail-story-arc
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail that tells a micro-story in a single image"
  tags: [thumbnail, storytelling, micro-story, advanced]

state: {}

trigger: |
  Create a YouTube thumbnail that tells a complete micro-story in one image:
  Title: "I Rebuilt a Destroyed Lamborghini for $15,000"
  Channel: Car restoration with 900K subscribers

  A great thumbnail for this video should contain a complete narrative arc
  in a single frame — the destroyed state, the rebuilt state, and the creator's
  role in the transformation. The viewer should understand the entire story
  just from the thumbnail.

  Design a concept that achieves this visual storytelling challenge.

assertions:
  - type: llm_judge
    criteria: "The thumbnail communicates a complete narrative arc (destroyed → rebuilt → triumph) in a single image — the viewer understands the full transformation story without needing the title"
    weight: 0.30
    description: "Complete narrative arc in single image"
  - type: llm_judge
    criteria: "The before/after or transformation element is dramatically presented — the contrast between destroyed and rebuilt creates visual wow that demands a click"
    weight: 0.25
    description: "Dramatic transformation contrast"
  - type: llm_judge
    criteria: "The $15,000 budget element adds to the story's impressiveness — the visual conveys that this was done affordably relative to a Lamborghini's value"
    weight: 0.20
    description: "$15K budget adds to story impressiveness"
  - type: llm_judge
    criteria: "The composition is clean despite containing multiple story elements — the destroyed/rebuilt states don't make the thumbnail look cluttered or busy"
    weight: 0.25
    description: "Clean composition despite multiple elements"
