meta:
  id: sponsor-integration-thumbnail
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Balance sponsor requirements with CTR optimization in thumbnail"
  tags: [thumbnail, sponsor, brand, conflicting-requirements]

state: {}

trigger: |
  Create a thumbnail for a sponsored video:
  Title: "I Tested 5 VPN Services (NordVPN Won)"
  Channel: Tech/privacy channel with 500K subscribers
  Sponsor: NordVPN

  The sponsor requires:
  - NordVPN logo visible in the thumbnail
  - Their brand colors (blue/purple) incorporated
  - Product must be recognizable

  But CTR optimization requires:
  - Sponsor logos reduce organic CTR (viewers skip "sponsored content")
  - Sponsor brand colors may clash with the channel's established palette
  - Over-prominent sponsorship signals reduce viewer trust

  Design a thumbnail that satisfies the sponsor while minimizing CTR damage.
  Include a negotiation note about what to push back on.

assertions:
  - type: llm_judge
    criteria: "The thumbnail satisfies sponsor requirements (logo visible, brand colors present, product recognizable) while minimizing their CTR-reducing impact through smart placement and sizing"
    weight: 0.25
    description: "Sponsor requirements met with minimal CTR damage"
  - type: llm_judge
    criteria: "The negotiation note is professional and strategic — identifies which sponsor requirements to push back on and how to frame the pushback in terms of mutual benefit (better CTR = more views for the sponsor)"
    weight: 0.25
    description: "Strategic negotiation recommendations"
  - type: llm_judge
    criteria: "The thumbnail still looks like organic content, not an ad — the sponsor elements are present but don't dominate the visual, maintaining viewer trust"
    weight: 0.25
    description: "Still looks organic, not like an ad"
  - type: llm_judge
    criteria: "The comparison/testing angle is emphasized over the sponsorship — the thumbnail communicates 'honest comparison' rather than 'paid endorsement,' which is better for both CTR and the sponsor"
    weight: 0.25
    description: "Testing angle emphasized over sponsorship"
