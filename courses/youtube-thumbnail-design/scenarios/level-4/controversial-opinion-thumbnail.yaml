meta:
  id: controversial-opinion-thumbnail
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnails for two opposing viewpoint videos on the same channel"
  tags: [thumbnail, controversy, opposing-views, balance]

state: {}

trigger: |
  A tech channel is publishing TWO videos in the same week with opposing viewpoints:
  Video 1: "Why You SHOULD Buy the Apple Vision Pro"
  Video 2: "Why You SHOULD NOT Buy the Apple Vision Pro"

  Design thumbnail concepts for BOTH videos that:
  - Make it clear which video argues which side
  - Both are equally compelling (don't favor one viewpoint)
  - Create curiosity about the reasoning on each side
  - Look related but clearly different
  - Don't just use "green checkmark vs red X" (too obvious)

assertions:
  - type: llm_judge
    criteria: "Both thumbnails clearly communicate their opposing viewpoints — a viewer instantly knows which video argues for and which argues against, without reading the full title"
    weight: 0.25
    description: "Opposing viewpoints clearly communicated"
  - type: llm_judge
    criteria: "Neither thumbnail is more compelling than the other — both are equally clickable. The design doesn't accidentally favor the positive or negative take"
    weight: 0.25
    description: "Equally compelling for both viewpoints"
  - type: llm_judge
    criteria: "The visual language goes beyond simple positive/negative indicators (no simple checkmark/X or thumbs up/down) — uses more nuanced visual storytelling to communicate each position"
    weight: 0.25
    description: "Nuanced visual language beyond simple indicators"
  - type: llm_judge
    criteria: "The pair works as a set — they're visually related enough to suggest they're companion videos, encouraging viewers to watch both"
    weight: 0.25
    description: "Work as a companion set"
