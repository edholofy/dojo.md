meta:
  id: ctr-diagnosis-analytics
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Diagnose thumbnail performance issues from analytics data"
  tags: [thumbnail, analytics, diagnosis, ctr-optimization]

state: {}

trigger: |
  Analyze these thumbnail performance analytics and diagnose the issues:

  Channel: Travel vlogger, 400K subs
  Last 10 videos' CTR and impressions:

  | Video | CTR | Impressions | Thumbnail Style |
  |-------|-----|-------------|-----------------|
  | Tokyo Day 1 | 8.2% | 450K | Face + location |
  | Tokyo Food Tour | 6.1% | 380K | Food close-up |
  | Tokyo Day 2 | 3.8% | 200K | Face + location |
  | Osaka Trip | 7.5% | 420K | Face + location |
  | Japan Travel Tips | 4.2% | 280K | Text-heavy infographic |
  | Tokyo Day 3 | 2.9% | 150K | Face + location |
  | Kyoto Temple Tour | 6.8% | 350K | Face + location |
  | Japan Budget Guide | 3.5% | 220K | Text-heavy infographic |
  | Tokyo Final Day | 2.1% | 120K | Face + location |
  | Best of Japan | 5.4% | 300K | Montage/collage |

  Provide:
  1. Data-driven diagnosis of what's working and what isn't
  2. Specific thumbnail strategy recommendations
  3. Redesigned concepts for the 3 worst-performing thumbnails

assertions:
  - type: llm_judge
    criteria: "The diagnosis identifies the clear pattern: sequential 'Day X' thumbnails have declining CTR (8.2% → 3.8% → 2.9% → 2.1%) while unique events maintain higher CTR — demonstrating series fatigue"
    weight: 0.25
    description: "Identifies sequential series fatigue pattern"
  - type: llm_judge
    criteria: "The analysis also identifies that text-heavy infographic thumbnails underperform (4.2%, 3.5%) versus visual/face-driven thumbnails — recommending against the infographic style"
    weight: 0.25
    description: "Identifies text-heavy style underperformance"
  - type: llm_judge
    criteria: "The three redesigned concepts address the specific issues of their originals — sequential numbering replaced with unique hooks, text-heavy replaced with visual approaches"
    weight: 0.25
    description: "Redesigns address specific diagnosed issues"
  - type: llm_judge
    criteria: "The strategy recommendations are actionable and data-backed — not generic 'make better thumbnails' but specific changes tied to the patterns found in the data"
    weight: 0.25
    description: "Actionable, data-backed recommendations"
