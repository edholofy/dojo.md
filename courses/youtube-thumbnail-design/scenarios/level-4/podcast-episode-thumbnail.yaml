meta:
  id: podcast-episode-thumbnail
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Design compelling thumbnails for a video podcast format"
  tags: [thumbnail, podcast, interview, talking-heads]

state: {}

trigger: |
  Create a thumbnail strategy for a video podcast:
  Channel: "Deep Dive" business interview podcast with 300K subscribers
  Format: Two people talking (host + guest) for 90 minutes
  Upcoming guest: A well-known but not instantly recognizable startup founder

  The challenge: Podcast thumbnails are notoriously boring (two talking heads
  on a dark background). Most podcast channels have terrible CTR because
  every thumbnail looks the same.

  Design a thumbnail concept that:
  - Makes this specific episode stand out from the 200+ other episodes
  - Works for a guest who isn't a celebrity (can't rely on face recognition)
  - Communicates the value of this specific conversation
  - Breaks out of the generic "two people talking" podcast thumbnail format

assertions:
  - type: llm_judge
    criteria: "The concept breaks out of the generic podcast thumbnail format — doesn't default to 'two faces on dark background with guest name' but uses a creative approach that communicates the episode's unique value"
    weight: 0.30
    description: "Breaks generic podcast thumbnail format"
  - type: llm_judge
    criteria: "Since the guest isn't instantly recognizable, the thumbnail communicates WHO they are and WHY viewers should care through visual context (their company, achievement, topic) rather than just their face"
    weight: 0.25
    description: "Communicates guest value without celebrity recognition"
  - type: llm_judge
    criteria: "The specific conversation topic or hook is visually communicated — viewers understand what makes THIS episode worth 90 minutes of their time"
    weight: 0.25
    description: "Episode-specific hook visually communicated"
  - type: llm_judge
    criteria: "The concept could scale — it's not a one-off creative idea but suggests a system that could make every episode's thumbnail feel unique while maintaining channel identity"
    weight: 0.20
    description: "Scalable system, not just one-off idea"
