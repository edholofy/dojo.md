meta:
  id: budget-thumbnail-diy
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Design professional thumbnails achievable with zero budget and free tools"
  tags: [thumbnail, budget, diy, accessibility]

state: {}

trigger: |
  A brand new creator with ZERO budget needs thumbnail concepts they can make themselves:
  - Only free tools available (Canva free tier, phone camera, natural lighting)
  - No Photoshop skills
  - No professional photography equipment
  - No graphic design background

  Video: "How I Learned to Code in 6 Months (No Degree)"
  Channel: New coding/career channel, 500 subscribers

  Design a thumbnail concept that's:
  1. Professional-looking despite zero budget
  2. Achievable with Canva free tier and a smartphone
  3. Competitive with thumbnails from established channels
  4. Include step-by-step execution instructions

assertions:
  - type: llm_judge
    criteria: "The concept is genuinely achievable with Canva free tier and a smartphone — doesn't require skills, tools, or assets the creator doesn't have"
    weight: 0.25
    description: "Achievable with zero budget and free tools"
  - type: llm_judge
    criteria: "Step-by-step execution instructions are clear enough that a non-designer could follow them — specific Canva features, photo setup tips, and text formatting guidance"
    weight: 0.25
    description: "Clear step-by-step instructions for non-designers"
  - type: llm_judge
    criteria: "The result would look professional — the concept uses design principles (contrast, simplicity, focal point) that work even with basic tools, not just 'make the best of what you have'"
    weight: 0.25
    description: "Would look professional despite basic tools"
  - type: llm_judge
    criteria: "The concept could compete with established channels — it's not a 'beginner thumbnail' but a smart design that leverages constraints (simplicity from limitation = clean design)"
    weight: 0.25
    description: "Could compete with established channels"
