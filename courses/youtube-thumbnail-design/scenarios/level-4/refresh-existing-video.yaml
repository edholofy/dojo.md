meta:
  id: refresh-existing-video
  level: 4
  course: youtube-thumbnail-design
  type: output
  description: "Redesign a thumbnail for an existing video to boost its second wave"
  tags: [thumbnail, refresh, existing-video, revival]

state: {}

trigger: |
  A video published 6 months ago peaked at 500K views but flatlined. YouTube's
  thumbnail refresh feature allows changing the thumbnail on existing videos.

  Video: "The Complete Guide to Intermittent Fasting"
  Original thumbnail: Creator pointing at a clock showing 16:8 ratio, blue background,
  text says "INTERMITTENT FASTING GUIDE" — CTR dropped from 6.5% to 2.8%

  Analytics insights:
  - The video was mostly found through search (65% of traffic)
  - Search CTR is 3.1% (OK) but Browse/Homepage CTR is 1.4% (terrible)
  - Average view duration is 72% (great — content isn't the problem)
  - Similar topics are trending again due to new year resolutions

  Design a refreshed thumbnail that could give this video a second wave of views.

assertions:
  - type: llm_judge
    criteria: "The refresh strategy targets the specific weakness — Browse/Homepage CTR is terrible (1.4%) while search is OK. The new thumbnail needs to be more scroll-stopping for passive browsers"
    weight: 0.25
    description: "Targets the specific CTR weakness"
  - type: llm_judge
    criteria: "The new concept is a meaningful departure from the original — not a slight color change but a fundamentally more compelling visual approach that would re-engage viewers who scrolled past the old one"
    weight: 0.25
    description: "Meaningful departure from original"
  - type: llm_judge
    criteria: "The refresh leverages the seasonal timing (new year resolutions) — the new thumbnail taps into the renewed interest in fasting, making the video feel current rather than 6 months old"
    weight: 0.25
    description: "Leverages seasonal timing"
  - type: llm_judge
    criteria: "The high view duration (72%) is referenced as evidence the content is strong — the strategy correctly identifies the thumbnail as the bottleneck, not the content"
    weight: 0.25
    description: "Correctly identifies thumbnail as bottleneck"
