meta:
  id: thumbnail-evolution-strategy
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Plan a channel's thumbnail evolution from 0 to 1M subscribers"
  tags: [thumbnail, growth-strategy, evolution, long-term]

state: {}

trigger: |
  Plan the thumbnail design evolution for a channel at four growth stages:

  Channel: Personal finance education
  Stage 1: 0-1K subscribers (just starting, building identity)
  Stage 2: 1K-50K subscribers (gaining traction, finding audience)
  Stage 3: 50K-250K subscribers (established niche authority)
  Stage 4: 250K-1M subscribers (scaling to mainstream)

  For each stage:
  1. Recommended thumbnail style and why it's right for that stage
  2. What changes when transitioning to the next stage
  3. What stays consistent throughout (brand DNA)
  4. Example thumbnail concept for a typical video at that stage

  The evolution should show natural brand maturation, not random redesigns.

assertions:
  - type: llm_judge
    criteria: "Four distinct stages are defined with thumbnail styles that evolve logically — early stages are simpler/scrappier while later stages are more polished/professional, reflecting natural brand maturation"
    weight: 0.25
    description: "Four stages with logical evolution"
  - type: llm_judge
    criteria: "The transitions between stages are smooth — each change is explained as a natural response to audience growth, not arbitrary redesigns. There's a thread of brand DNA throughout"
    weight: 0.25
    description: "Smooth transitions with consistent brand DNA"
  - type: llm_judge
    criteria: "Stage-appropriate advice is given — doesn't recommend expensive production at Stage 1 or simplistic designs at Stage 4. Each recommendation matches the channel's resources and audience at that stage"
    weight: 0.25
    description: "Stage-appropriate recommendations"
  - type: llm_judge
    criteria: "The example concepts demonstrate the evolution visually — reading all four examples in sequence, one can see a clear design maturation that would naturally occur as a channel grows"
    weight: 0.25
    description: "Example concepts demonstrate visual evolution"
