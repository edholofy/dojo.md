meta:
  id: cross-niche-viral-thumbnail
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail that transcends the channel's niche for viral potential"
  tags: [thumbnail, viral, cross-niche, breakout]

state: {}

trigger: |
  A niche channel wants their next video to break out beyond their usual audience:
  Channel: "CivilEngineerReacts" — a civil engineer who reacts to construction fails
  (150K subscribers, average 50K views per video, average CTR 5.5%)

  Upcoming video: "Engineer Reacts to the Most Dangerous Bridge in the World"

  This video has potential to reach millions of viewers beyond the engineering niche
  IF the thumbnail captures a wider audience. Current subscribers are engineering
  enthusiasts, but the topic (dangerous bridge) has mass appeal.

  Design a thumbnail that:
  - Maintains credibility with existing engineering audience
  - Appeals to general YouTube viewers who've never watched the channel
  - Could get recommended alongside mainstream content, not just engineering
  - Has 10M+ view potential based on thumbnail alone

assertions:
  - type: llm_judge
    criteria: "The thumbnail appeals to mass audiences — a viewer with zero interest in engineering would still want to click because the 'dangerous bridge' visual is universally compelling"
    weight: 0.30
    description: "Mass appeal beyond niche"
  - type: llm_judge
    criteria: "The engineering credibility is maintained — the thumbnail communicates that this is an expert's analysis, not just fear-mongering, which satisfies existing subscribers and adds authority"
    weight: 0.20
    description: "Maintains engineering credibility"
  - type: llm_judge
    criteria: "The visual creates genuine fear/awe about the bridge — the danger is visually palpable through the image, creating a visceral response that transcends niche interest"
    weight: 0.25
    description: "Creates visceral fear/awe response"
  - type: llm_judge
    criteria: "The concept would get recommended alongside mainstream content (MrBeast, Veritasium, Mark Rober) — the thumbnail quality and visual appeal match mainstream YouTube production standards"
    weight: 0.25
    description: "Mainstream recommendation potential"
