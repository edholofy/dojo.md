meta:
  id: thumbnail-audit-report
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Conduct a comprehensive thumbnail audit of a channel"
  tags: [thumbnail, audit, comprehensive, channel-review]

state: {}

trigger: |
  Conduct a comprehensive thumbnail audit for a fictional channel with these
  20 thumbnail descriptions. Identify patterns, score each, and provide
  an actionable improvement plan.

  Channel: "TechSimplified" — 800K subscribers, tech reviews and tutorials

  Recent 20 thumbnails:
  1. White BG, laptop photo, "REVIEW" stamp — CTR 3.2%
  2. Creator shocked face, phone in hand, yellow BG — CTR 7.1%
  3. White BG, headphones photo, "BEST?" text — CTR 3.0%
  4. Creator pointing at laptop screen, blue BG — CTR 5.8%
  5. White BG, three products lined up, "TOP 3" — CTR 3.4%
  6. Creator confused face, "DON'T BUY" red text — CTR 8.9%
  7. White BG, tablet photo, "REVIEW" stamp — CTR 2.8%
  8. Creator excited, holding product up, green BG — CTR 6.5%
  9. White BG, router photo, small text — CTR 2.1%
  10. Creator split-screen comparing two items — CTR 7.3%
  11. Dark BG, product with price crossed out — CTR 6.0%
  12. White BG, camera photo, "REVIEW" stamp — CTR 2.5%
  13. Creator in store, multiple products visible — CTR 4.2%
  14. Close-up of product detail with arrow — CTR 5.5%
  15. White BG, speaker photo, "WORTH IT?" text — CTR 3.6%
  16. Creator dramatic expression, fire emoji overlay — CTR 7.8%
  17. White BG, smartwatch, "REVIEW" stamp — CTR 2.7%
  18. Before/after comparison of setup — CTR 6.9%
  19. White BG, monitor, minimal text — CTR 2.4%
  20. Creator with product, lifestyle setting — CTR 5.2%

  Provide a full audit report with pattern analysis, scoring, and strategy.

assertions:
  - type: llm_judge
    criteria: "The audit identifies the clear pattern: white background product-on-white-bg 'REVIEW' thumbnails consistently underperform (2-3.5% CTR) while creator-face-with-emotion thumbnails consistently outperform (6-9% CTR)"
    weight: 0.25
    description: "Identifies the product-only vs face-driven pattern"
  - type: llm_judge
    criteria: "The analysis categorizes thumbnails into performance tiers and identifies what differentiates high-CTR (6%+) from low-CTR (under 4%) thumbnails systematically"
    weight: 0.25
    description: "Systematic categorization into performance tiers"
  - type: llm_judge
    criteria: "The improvement plan is specific — recommends retiring the white-background 'REVIEW' stamp format and provides concrete alternative approaches backed by the channel's own data"
    weight: 0.25
    description: "Specific improvement plan backed by data"
  - type: llm_judge
    criteria: "The audit includes channel-level strategic recommendations — not just individual thumbnail fixes but how to systematically improve the channel's average CTR through thumbnail standards"
    weight: 0.25
    description: "Channel-level strategic recommendations"
