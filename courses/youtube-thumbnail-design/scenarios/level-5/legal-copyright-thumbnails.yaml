meta:
  id: legal-copyright-thumbnails
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Navigate copyright and legal issues in thumbnail imagery"
  tags: [thumbnail, copyright, legal, fair-use]

state: {}

trigger: |
  Evaluate these thumbnail concepts for legal/copyright compliance:

  1. Video: "Why Disney+ Is Failing" — Creator wants to use Disney's logo and
     screenshots from Disney+ shows in the thumbnail
  2. Video: "This $20 Amazon Gadget is INSANE" — Creator wants to use the
     manufacturer's product photo from Amazon
  3. Video: "Celebrity X's Worst Fashion Moments" — Creator wants to use paparazzi
     photos of the celebrity from Getty Images
  4. Video: "My Reaction to Taylor Swift's New Album" — Creator wants to use
     Taylor Swift's album artwork as a background

  For each:
  - Is it legal? Under what doctrine (fair use, editorial use, etc.)?
  - What are the risks?
  - If risky, provide an alternative that's safer but still effective

assertions:
  - type: llm_judge
    criteria: "Each of the four scenarios is evaluated with accurate legal reasoning — correctly applies fair use doctrine, editorial use, transformative use, and copyright principles specific to YouTube thumbnails"
    weight: 0.25
    description: "Accurate legal analysis for each scenario"
  - type: llm_judge
    criteria: "The risk assessment is practical — identifies which uses are likely safe (commentary fair use), which are gray area (product photos), and which are genuinely risky (Getty paparazzi photos)"
    weight: 0.25
    description: "Practical risk assessment with clear tiers"
  - type: llm_judge
    criteria: "Alternative designs are provided for risky scenarios — each alternative is genuinely effective as a thumbnail, not just legally safer but creatively worse"
    weight: 0.25
    description: "Effective alternatives for risky scenarios"
  - type: llm_judge
    criteria: "The nuances of YouTube's specific copyright landscape are addressed — including Content ID for thumbnails, manual takedown processes, and how different rights holders enforce differently"
    weight: 0.25
    description: "YouTube-specific copyright nuances addressed"
