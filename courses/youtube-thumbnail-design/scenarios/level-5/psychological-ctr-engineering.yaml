meta:
  id: psychological-ctr-engineering
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Engineer a thumbnail using advanced psychological principles"
  tags: [thumbnail, psychology, advanced, ctr-engineering]

state: {}

trigger: |
  Engineer a YouTube thumbnail using specific psychological principles for maximum CTR:

  Video: "The Secret Formula Behind Every Viral YouTube Video"
  Channel: Creator education with 1.5M subscribers

  Apply ALL of these psychological principles in your design:
  1. Curiosity Gap (Loewenstein) — create an information gap the viewer must close
  2. Von Restorff Effect — make one element dramatically different to ensure memory
  3. Gestalt Proximity — group related visual elements to create meaning
  4. F-Pattern scanning — place key elements where eyes naturally land first
  5. Emotional Contagion — use facial expression to transfer emotion to the viewer

  For each principle, explain exactly how it's applied in the thumbnail.

assertions:
  - type: llm_judge
    criteria: "All five psychological principles are explicitly applied with specific design decisions — each principle maps to a concrete visual element in the thumbnail, not vague references"
    weight: 0.30
    description: "All five principles explicitly applied"
  - type: llm_judge
    criteria: "The applications demonstrate genuine understanding of each principle — not just name-dropping but showing HOW curiosity gap is created, WHERE the F-pattern places key elements, WHAT facial expression transfers which emotion"
    weight: 0.25
    description: "Genuine understanding of each principle"
  - type: llm_judge
    criteria: "Despite the heavy theoretical framework, the thumbnail feels natural and appealing — the psychology is invisible to the viewer, who just feels compelled to click"
    weight: 0.25
    description: "Psychology invisible, just feels compelling"
  - type: llm_judge
    criteria: "The principles work together synergistically — they don't compete for attention but compound into a more powerful whole than any single principle would create alone"
    weight: 0.20
    description: "Principles work synergistically"
