meta:
  id: thumbnail-system-at-scale
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Design a thumbnail production system for a channel publishing daily"
  tags: [thumbnail, system, scale, production-pipeline]

state: {}

trigger: |
  Design a complete thumbnail production system for a daily upload channel:
  Channel: News/commentary publishing 7 videos per week
  Team: 1 host, 1 editor, 1 thumbnail designer (part-time)
  Current process: Thumbnail made after editing, often rushed, inconsistent quality

  Create:
  1. A thumbnail template system with 5 base templates for different video types
  2. Production workflow (when to shoot, design, review, publish)
  3. Quality checklist before publishing
  4. A/B testing strategy for continuous improvement
  5. Brand guidelines document (colors, fonts, styles, do's and don'ts)

  The system must produce high-quality thumbnails consistently at daily scale
  without burning out the part-time designer.

assertions:
  - type: llm_judge
    criteria: "The five base templates cover distinct video types (breaking news, opinion, interview, explainer, recurring segment) with enough flexibility for daily variation"
    weight: 0.20
    description: "Five distinct, flexible base templates"
  - type: llm_judge
    criteria: "The production workflow is realistic for a 3-person team with a part-time designer — doesn't require heroic effort or unrealistic timelines. Includes batch shooting and pre-production"
    weight: 0.20
    description: "Realistic workflow for small team"
  - type: llm_judge
    criteria: "The quality checklist is specific and actionable — includes mobile readability check, contrast verification, UI overlay avoidance, text limit, and brand consistency review"
    weight: 0.20
    description: "Specific, actionable quality checklist"
  - type: llm_judge
    criteria: "The A/B testing strategy is practical for a daily upload schedule — identifies which videos to test, frequency, what variables to test, and how to track results"
    weight: 0.20
    description: "Practical A/B testing strategy"
  - type: llm_judge
    criteria: "The brand guidelines are comprehensive enough to maintain consistency even when the designer is unavailable — someone else could produce an on-brand thumbnail"
    weight: 0.20
    description: "Brand guidelines enable consistency without designer"
