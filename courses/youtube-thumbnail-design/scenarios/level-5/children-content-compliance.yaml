meta:
  id: children-content-compliance
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnails for children's content with COPPA compliance"
  tags: [thumbnail, children, coppa, compliance]

state: {}

trigger: |
  Create thumbnail concepts for a children's YouTube channel:
  Channel: "Funtime Learning" — educational content for kids ages 4-8
  Video: "Learn Colors with Dinosaurs! (Fun ABC Song)"

  COPPA compliance requirements for children's content:
  - Thumbnails must not be misleading about content
  - No clickbait tactics that exploit children's limited comprehension
  - No scary or inappropriate imagery
  - Must accurately represent the educational content
  - YouTube Kids has different display rules

  Additional considerations:
  - Parents often select videos for their children
  - Children respond to different visual cues than adults
  - Bright colors and characters matter more than faces/expressions
  - Text must be simple enough for emerging readers OR work purely visually

  Design concepts for both YouTube Kids and regular YouTube placement.

assertions:
  - type: llm_judge
    criteria: "COPPA compliance is fully met — no misleading elements, no exploitative clickbait, no inappropriate imagery, and the thumbnail accurately represents educational dinosaur/color/ABC content"
    weight: 0.25
    description: "Full COPPA compliance"
  - type: llm_judge
    criteria: "The design works for the dual audience — appealing to children (bright colors, fun characters, dynamic visuals) AND trustworthy to parents (clearly educational, safe, appropriate)"
    weight: 0.25
    description: "Works for children AND parents"
  - type: llm_judge
    criteria: "Both YouTube Kids and regular YouTube placement are considered — different display contexts and audience discovery patterns are addressed"
    weight: 0.25
    description: "Both YouTube Kids and regular YouTube addressed"
  - type: llm_judge
    criteria: "The visual design is child-appropriate — uses developmental psychology considerations (bright primary colors, simple shapes, recognizable characters, large elements)"
    weight: 0.25
    description: "Developmentally appropriate design"
