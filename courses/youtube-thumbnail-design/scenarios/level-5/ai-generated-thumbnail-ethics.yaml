meta:
  id: ai-generated-thumbnail-ethics
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Navigate ethics of AI-generated thumbnails and deepfake expressions"
  tags: [thumbnail, ai-ethics, deepfake, authenticity]

state: {}

trigger: |
  A creator wants to use AI tools for their thumbnails:
  1. AI-generate exaggerated facial expressions they didn't actually make
  2. AI-composite themselves into locations they've never visited
  3. AI-enhance their face to look more attractive
  4. AI-create product images that are more polished than reality

  For each use case, evaluate:
  - Is it ethical? Why or why not?
  - Does it violate YouTube's policies?
  - Does it constitute misleading content?
  - Where's the line between "enhancement" and "fabrication"?

  Then provide guidelines for ethical AI thumbnail usage.

assertions:
  - type: llm_judge
    criteria: "Each of the four use cases is evaluated individually with nuanced reasoning — not a blanket 'AI is bad' or 'AI is fine' but specific ethical analysis for each scenario"
    weight: 0.25
    description: "Nuanced evaluation of each use case"
  - type: llm_judge
    criteria: "The ethical framework distinguishes between enhancement and fabrication — e.g., AI expression exaggeration may be acceptable (like traditional photo editing) while AI-compositing into unvisited locations is misleading"
    weight: 0.25
    description: "Clear enhancement vs fabrication distinction"
  - type: llm_judge
    criteria: "YouTube's actual policies on misleading content and synthetic media are correctly referenced — not invented rules but accurate platform guidelines"
    weight: 0.25
    description: "Accurate platform policy references"
  - type: llm_judge
    criteria: "The ethical guidelines are practical and actionable — not philosophical abstractions but clear rules a creator could follow (e.g., 'AI enhancement of lighting: OK. AI-generated expressions you never made: not OK')"
    weight: 0.25
    description: "Practical, actionable ethical guidelines"
