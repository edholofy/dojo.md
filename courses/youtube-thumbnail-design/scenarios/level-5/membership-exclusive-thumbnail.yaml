meta:
  id: membership-exclusive-thumbnail
  level: 5
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnails for different monetization tiers"
  tags: [thumbnail, monetization, membership, premium]

state: {}

trigger: |
  A creator has three content tiers:
  1. Free public videos (ad-supported, 2M subscriber base)
  2. Channel membership videos ($4.99/month, 15K members)
  3. Patreon exclusive videos ($19.99/month, 2K patrons)

  They want thumbnail strategies for each tier:
  Video topic (same content, different depths): "How to Start a Business in 2026"

  Tier 1 (Free): "How to Start a Business in 2026 (Beginner's Guide)"
  Tier 2 (Members): "My Exact Business Plan Template (Members Only)"
  Tier 3 (Patreon): "Live Q&A: I'll Review YOUR Business Plan"

  Design thumbnails for all three that:
  - Communicate the tier/exclusivity level appropriately
  - The free thumbnail doesn't devalue the paid content
  - The paid thumbnails justify their price through perceived value
  - The system encourages upgrades to higher tiers

assertions:
  - type: llm_judge
    criteria: "All three thumbnails are provided with escalating perceived value — the visual quality and exclusivity signals increase with each tier"
    weight: 0.25
    description: "Escalating perceived value across tiers"
  - type: llm_judge
    criteria: "The free thumbnail is compelling for mass appeal without giving away the premium value — creates enough desire to attract viewers while leaving room for paid upgrades"
    weight: 0.25
    description: "Free thumbnail drives interest without cannibalizing paid"
  - type: llm_judge
    criteria: "The paid tier thumbnails communicate exclusivity and premium value — visual cues suggest 'this is worth paying for' through design quality, personal access signals, or exclusive content indicators"
    weight: 0.25
    description: "Paid thumbnails communicate premium value"
  - type: llm_judge
    criteria: "The tier system encourages progression — a free viewer seeing the members-only thumbnail would feel FOMO, and a member seeing the Patreon thumbnail would consider upgrading"
    weight: 0.25
    description: "Tier system encourages progression"
