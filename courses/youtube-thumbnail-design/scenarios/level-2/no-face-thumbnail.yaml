meta:
  id: no-face-thumbnail
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Design a compelling thumbnail without using a human face"
  tags: [thumbnail, no-face, faceless, creative]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "10 Websites That Will Pay You $100/Day (2026)"
  Channel: Side hustle/money-making with 200K subscribers
  CONSTRAINT: The creator is a faceless channel — no human face can appear.

  Design a compelling thumbnail that achieves high CTR without relying on
  facial expressions, which normally boost CTR by 20-30%.

assertions:
  - type: llm_judge
    criteria: "The thumbnail is compelling WITHOUT a human face — uses alternative attention-grabbing elements (money imagery, laptop screens, bold graphics, curiosity gaps) to compensate for the missing face CTR boost"
    weight: 0.30
    description: "Compelling without human face"
  - type: llm_judge
    criteria: "The $100/day earning potential is visually prominent and exciting — money imagery, dollar signs, or a financial visualization creates the same emotional hook a shocked face would"
    weight: 0.25
    description: "$100/day potential visually exciting"
  - type: llm_judge
    criteria: "The design uses high contrast and bold elements to stand out in a feed where most thumbnails feature faces — the faceless design doesn't blend into the background"
    weight: 0.25
    description: "Stands out in a feed full of faces"
  - type: llm_judge
    criteria: "The concept avoids looking like a generic stock-photo design — has personality and uniqueness despite the absence of a creator's face"
    weight: 0.20
    description: "Has personality despite being faceless"
