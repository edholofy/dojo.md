meta:
  id: color-psychology
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Apply color psychology to thumbnail design for specific emotional responses"
  tags: [thumbnail, color-psychology, design-theory, emotional]

state: {}

trigger: |
  Create thumbnail concepts for TWO videos from the same channel, each requiring
  a completely different emotional response through color:

  Channel: Documentary/deep-dive channel with 350K subscribers

  Video 1: "The Happiest Country in the World (What They Do Differently)"
  — Should evoke: warmth, happiness, curiosity, optimism

  Video 2: "Inside the World's Most Dangerous Prison"
  — Should evoke: tension, danger, intrigue, darkness

  For each, explain your color palette choices using color psychology principles
  and how the colors drive the intended emotional response.

assertions:
  - type: llm_judge
    criteria: "The color palettes are dramatically different and appropriate — warm/bright for the happiness video, dark/intense for the prison video. The agent demonstrates intentional color selection"
    weight: 0.25
    description: "Color palettes dramatically different and appropriate"
  - type: llm_judge
    criteria: "Color psychology explanations are specific and grounded — explains WHY certain colors evoke certain emotions (warm yellows = optimism, deep reds/blacks = danger) with design reasoning"
    weight: 0.25
    description: "Color psychology explanations specific and grounded"
  - type: llm_judge
    criteria: "Both thumbnails would stand out in a YouTube feed despite their different tones — the colors provide contrast against YouTube's white/gray interface"
    weight: 0.25
    description: "Both stand out in YouTube's interface"
  - type: llm_judge
    criteria: "The colors work harmoniously within each thumbnail — not just individual color choices but a cohesive palette that maintains readability and visual hierarchy"
    weight: 0.25
    description: "Cohesive palettes with good visual hierarchy"
