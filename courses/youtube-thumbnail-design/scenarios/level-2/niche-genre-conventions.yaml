meta:
  id: niche-genre-conventions
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnail following niche genre conventions while standing out"
  tags: [thumbnail, genre-conventions, niche, balance]

state: {}

trigger: |
  Create a YouTube thumbnail for a true crime video:
  Title: "The Disappearance of Sarah Chen — What Really Happened?"
  Channel: True crime channel with 450K subscribers

  True crime thumbnails have specific genre conventions:
  - Dark, moody color grading
  - Missing person photos or evidence imagery
  - Serious/somber tone (no smiling faces or bright colors)
  - Red accents for emphasis
  - Location/map imagery

  Design a thumbnail that follows enough conventions for genre recognition
  while standing out from the sea of similar true crime thumbnails.

assertions:
  - type: llm_judge
    criteria: "The thumbnail follows key true crime conventions enough for immediate genre recognition — a viewer would know this is true crime content at a glance from the visual language"
    weight: 0.25
    description: "Genre immediately recognizable"
  - type: llm_judge
    criteria: "The concept introduces a unique element that differentiates it from typical true crime thumbnails — something unexpected that makes it stand out in a feed full of dark, moody thumbnails"
    weight: 0.25
    description: "Unique differentiator within genre conventions"
  - type: llm_judge
    criteria: "The tone is respectful toward the subject (a missing person) — doesn't sensationalize or exploit the case for clicks. The design is compelling without being exploitative"
    weight: 0.25
    description: "Respectful tone for sensitive subject"
  - type: llm_judge
    criteria: "The thumbnail creates genuine curiosity about what happened — visual storytelling hints at the mystery without revealing the conclusion"
    weight: 0.25
    description: "Creates genuine curiosity about the case"
