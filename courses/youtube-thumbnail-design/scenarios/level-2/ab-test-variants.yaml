meta:
  id: ab-test-variants
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Design three A/B test thumbnail variants with different hypotheses"
  tags: [thumbnail, ab-testing, variants, optimization]

state: {}

trigger: |
  Create THREE A/B test thumbnail variants for this video:
  Title: "I Tried Every Fast Food Burger to Find the BEST"
  Channel: Food review channel with 800K subscribers
  Genre: Food ranking/taste test

  For each variant, provide:
  1. The thumbnail concept description
  2. The hypothesis (why this approach might win)
  3. What variable is being tested vs. the other variants

  The variants should test meaningfully different approaches, not just color swaps.

assertions:
  - type: llm_judge
    criteria: "Three distinct variants are provided, each testing a meaningfully different variable — not just color changes but fundamentally different approaches (face vs. food focus, text vs. no text, single burger vs. lineup)"
    weight: 0.30
    description: "Three meaningfully different variants"
  - type: llm_judge
    criteria: "Each variant has a clear, specific hypothesis — explains WHY that approach might generate more clicks based on thumbnail psychology or audience behavior"
    weight: 0.25
    description: "Clear hypothesis for each variant"
  - type: llm_judge
    criteria: "The tested variables are isolated — each variant changes one main element so the test results would clearly indicate which element drives CTR"
    weight: 0.25
    description: "Variables properly isolated for testing"
  - type: llm_judge
    criteria: "All three variants are genuinely strong thumbnails — not one obvious winner with two weak alternatives, but three viable options where the winner is uncertain"
    weight: 0.20
    description: "All three variants are genuinely viable"
