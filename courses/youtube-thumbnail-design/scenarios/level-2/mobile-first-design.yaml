meta:
  id: mobile-first-design
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Design specifically for mobile viewing where 70% of YouTube is watched"
  tags: [thumbnail, mobile, small-screen, optimization]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "The REAL Reason You Can't Focus (It's Not What You Think)"
  Channel: Psychology/self-improvement with 600K subscribers

  CRITICAL CONSTRAINT: Design specifically for mobile where the thumbnail appears
  at approximately 120×68 pixels. At this size:
  - Fine details disappear
  - Small text is unreadable
  - Low-contrast elements vanish
  - Complex compositions become muddy

  Describe your concept and explicitly explain what remains visible/readable at
  mobile thumbnail size vs. desktop size.

assertions:
  - type: llm_judge
    criteria: "The design is explicitly mobile-first — large, bold elements that remain clear at 120×68px. The concept description specifically addresses what works at mobile size"
    weight: 0.30
    description: "Explicitly designed for mobile thumbnail size"
  - type: llm_judge
    criteria: "The mobile vs. desktop visibility analysis is provided — identifies which elements remain visible at mobile size and which are bonus details visible only on desktop"
    weight: 0.25
    description: "Mobile vs desktop visibility analysis provided"
  - type: llm_judge
    criteria: "Text (if any) uses extremely bold, large fonts with maximum contrast — the agent demonstrates understanding that anything less than 3-4 words in very bold type is unreadable on mobile"
    weight: 0.25
    description: "Text optimized for mobile readability"
  - type: llm_judge
    criteria: "The concept still creates curiosity about the 'real reason you can't focus' — mobile optimization doesn't sacrifice the emotional hook"
    weight: 0.20
    description: "Curiosity hook maintained despite mobile constraints"
