meta:
  id: brand-consistent-series
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnails for a video series with consistent branding"
  tags: [thumbnail, branding, series, consistency]

state: {}

trigger: |
  Design thumbnail concepts for a 5-part video series:
  Channel: "MinimalMoney" personal finance education (120K subscribers)
  Series: "Money 101" — complete beginner guide

  Episodes:
  1. "Money 101: How to Budget (Part 1)"
  2. "Money 101: Saving vs Investing (Part 2)"
  3. "Money 101: Your First Investment (Part 3)"
  4. "Money 101: Credit Scores Explained (Part 4)"
  5. "Money 101: Building Wealth Long-Term (Part 5)"

  The thumbnails must be individually compelling AND visually cohesive as a series.
  Define the visual system (colors, layout, typography rules) and then describe each.

assertions:
  - type: llm_judge
    criteria: "A clear visual system is defined — consistent color palette, typography, layout grid, and branding elements that make all 5 thumbnails recognizable as a series"
    weight: 0.25
    description: "Clear visual system for series consistency"
  - type: llm_judge
    criteria: "Each individual thumbnail is compelling on its own — a viewer seeing just one thumbnail would want to click, not just collectors who want to watch the whole series"
    weight: 0.25
    description: "Each thumbnail compelling individually"
  - type: llm_judge
    criteria: "The series numbering or progression is visually clear — viewers can identify which episode is which and understand the sequential nature of the content"
    weight: 0.25
    description: "Series progression visually clear"
  - type: llm_judge
    criteria: "The thumbnails vary enough within the system to avoid monotony — consistent branding doesn't mean identical thumbnails with different text"
    weight: 0.25
    description: "Variety within consistency"
