meta:
  id: avoid-youtube-ui-overlap
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Design around YouTube's UI elements that overlay thumbnails"
  tags: [thumbnail, ui-overlay, technical, optimization]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "Complete Python Course for Beginners (4 Hours)"
  Channel: Programming tutorial with 1M subscribers
  Duration: 4:02:15

  YouTube overlays several UI elements on thumbnails that can obscure your design:
  - Video duration timestamp (bottom-right corner)
  - "Watch Later" clock icon (top-right on hover)
  - Progress bar (bottom) for partially watched videos
  - "Watched" checkmark for completed videos

  Design a thumbnail that keeps all critical information visible despite these overlays.
  Identify which areas of the thumbnail are "safe zones" and "danger zones."

assertions:
  - type: llm_judge
    criteria: "The concept explicitly identifies YouTube UI overlay zones — specifically the bottom-right timestamp, top-right watch later, and bottom progress bar — and keeps critical information away from these areas"
    weight: 0.30
    description: "UI overlay zones explicitly addressed"
  - type: llm_judge
    criteria: "A safe zone / danger zone map is provided — showing where text and important visual elements should be placed to avoid being covered by YouTube's interface"
    weight: 0.25
    description: "Safe/danger zone map provided"
  - type: llm_judge
    criteria: "The thumbnail concept works effectively despite the 4-hour duration being a long timestamp that takes more space — the design accommodates the larger overlay"
    weight: 0.25
    description: "Accommodates longer duration timestamp"
  - type: llm_judge
    criteria: "The concept for a programming tutorial is compelling — makes a 4-hour Python course look accessible and worth the time investment, not intimidating"
    weight: 0.20
    description: "Programming tutorial concept compelling"
