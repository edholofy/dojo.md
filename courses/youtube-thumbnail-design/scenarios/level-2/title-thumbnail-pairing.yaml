meta:
  id: title-thumbnail-pairing
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Design thumbnail that works in tandem with the title, not independently"
  tags: [thumbnail, title-pairing, synergy, strategy]

state: {}

trigger: |
  Create a thumbnail concept that works IN TANDEM with the video title.
  The thumbnail and title should tell a combined story — not repeat each other.

  Title: "I Spent $10,000 on a Mystery Box"
  Channel: Entertainment/lifestyle with 2M subscribers

  BAD example: Thumbnail text says "$10,000 MYSTERY BOX" (just repeats the title)
  GOOD example: Thumbnail SHOWS what was inside without text, creating a 1+1=3 effect

  Design the thumbnail concept and explain how it pairs with the title to create
  more curiosity together than either would alone.

assertions:
  - type: llm_judge
    criteria: "The thumbnail does NOT duplicate the title's information — it adds NEW visual information that combines with the title to create more curiosity than either alone"
    weight: 0.30
    description: "Thumbnail adds info, doesn't duplicate title"
  - type: llm_judge
    criteria: "The pairing explanation demonstrates understanding of the 1+1=3 principle — the title provides context ('$10,000 mystery box') and the thumbnail shows reaction/result, making both essential"
    weight: 0.25
    description: "Demonstrates 1+1=3 title-thumbnail principle"
  - type: llm_judge
    criteria: "The thumbnail alone (without the title) would still be intriguing enough to notice — even without text context, the visual is arresting"
    weight: 0.25
    description: "Thumbnail compelling even without title"
  - type: llm_judge
    criteria: "The concept avoids text overlay entirely or uses minimal text that doesn't repeat the title — demonstrates restraint in thumbnail text usage"
    weight: 0.20
    description: "Minimal/no text that avoids title duplication"
