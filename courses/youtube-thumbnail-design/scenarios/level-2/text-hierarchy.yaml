meta:
  id: text-hierarchy
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Create effective text hierarchy in a thumbnail with multiple information layers"
  tags: [thumbnail, text-hierarchy, typography, readability]

state: {}

trigger: |
  Create a YouTube thumbnail concept for this video:
  Title: "How I Built a $1M Business in 12 Months (Step by Step)"
  Channel: Entrepreneurship channel with 500K subscribers

  The thumbnail needs to communicate multiple pieces of information:
  - The $1M achievement (primary hook)
  - The 12-month timeline (secondary hook)
  - That it's a step-by-step guide (value proposition)

  Design a text hierarchy system where the most important info reads first,
  second info reads next, and the detail is optional — all within 3-5 words of text.

assertions:
  - type: llm_judge
    criteria: "The text hierarchy is clear — a definite reading order where the eye hits the most impactful element first ($1M), then the timeline (12 months), demonstrated through size, weight, color, and position"
    weight: 0.30
    description: "Clear reading order in text hierarchy"
  - type: llm_judge
    criteria: "The total text is 3-5 words maximum — all three information layers are communicated through a combination of text and visual elements, not a paragraph"
    weight: 0.25
    description: "Maximum 3-5 words total"
  - type: llm_judge
    criteria: "The text typography choices are specific — font style, weight, size, color, and position for each text element are described with enough detail to execute"
    weight: 0.25
    description: "Specific typography direction"
  - type: llm_judge
    criteria: "The text remains readable at mobile thumbnail size — the primary text element ($1M) is large enough to read at 120px width"
    weight: 0.20
    description: "Readable at mobile size"
