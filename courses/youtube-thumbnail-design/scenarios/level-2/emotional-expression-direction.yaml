meta:
  id: emotional-expression-direction
  level: 2
  course: youtube-thumbnail-design
  type: output
  description: "Provide specific facial expression direction for a thumbnail shoot"
  tags: [thumbnail, expression, face, direction]

state: {}

trigger: |
  You're directing a creator for their thumbnail photo shoot. Provide specific
  expression and pose direction for THREE different videos:

  1. "I Got Scammed Out of $5,000" (negative/cautionary story)
  2. "I Found the BEST Budget Laptop" (positive/exciting discovery)
  3. "Is College Worth It? (Honest Answer)" (thought-provoking/balanced)

  For each, describe:
  - Exact facial expression (which muscles, mouth position, eye direction)
  - Hand placement and body language
  - Camera angle and distance
  - Lighting mood

  Be specific enough that a creator could replicate each expression.

assertions:
  - type: llm_judge
    criteria: "Each expression is specific and actionable — describes exact details (wide eyes, dropped jaw, furrowed brow, pointed finger) rather than vague direction like 'look excited'"
    weight: 0.30
    description: "Specific, actionable expression direction"
  - type: llm_judge
    criteria: "The three expressions are clearly different from each other and match their video's emotional tone — scam story evokes shock/anger, budget laptop evokes excitement, college debate evokes contemplation"
    weight: 0.25
    description: "Expressions match each video's tone"
  - type: llm_judge
    criteria: "Camera angle, distance, and lighting suggestions are included and serve the emotional goal — e.g., lower angle for authority, closer crop for intimacy, dramatic lighting for cautionary content"
    weight: 0.25
    description: "Camera and lighting serve emotional goals"
  - type: llm_judge
    criteria: "The expressions would photograph well as thumbnails — they're exaggerated enough to read at small sizes but not so over-the-top that they look like parody"
    weight: 0.20
    description: "Expressions read well at thumbnail size"
