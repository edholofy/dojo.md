meta:
  id: bug-backlog-management
  level: 2
  course: bug-report-triage
  type: output
  description: "Manage a growing bug backlog using prioritization frameworks and make tough decisions about what to fix, defer, or close"
  tags: [bugs, backlog, prioritization, rice, intermediate]

state: {}

trigger: |
  "ProjectHub" (project management SaaS) has a bug backlog problem.
  There are 87 open bugs, 15 new bugs per week, and the team can
  fix ~10 bugs per sprint (2 weeks). The backlog is growing.

  Your engineering manager says: "We need to get this under control.
  Prioritize ruthlessly. Some of these bugs are 6+ months old."

  Here are 10 representative bugs from the backlog. Use the RICE
  framework (Reach × Impact × Confidence / Effort) to prioritize:

  Bug 1: "Calendar sync fails for Google Workspace accounts"
    Reach: 2,000 users (40%), Impact: High (3), Confidence: 90%,
    Effort: 3 days

  Bug 2: "Emoji reactions don't render on mobile"
    Reach: 500 users (10%), Impact: Low (0.5), Confidence: 100%,
    Effort: 0.5 days

  Bug 3: "CSV export includes deleted tasks"
    Reach: 300 users (6%), Impact: Medium (2), Confidence: 80%,
    Effort: 2 days

  Bug 4: "Page load time >5s on projects with 500+ tasks"
    Reach: 800 users (16%), Impact: High (3), Confidence: 70%,
    Effort: 10 days

  Bug 5: "Notification preferences reset after each login"
    Reach: 5,000 users (100%), Impact: Low (1), Confidence: 95%,
    Effort: 1 day

  Bug 6: "SSO login fails intermittently for Okta users"
    Reach: 400 users (8%), Impact: High (3), Confidence: 60%,
    Effort: 5 days

  Bug 7: "Dark mode: text invisible on 3 settings pages"
    Reach: 1,500 users (30%), Impact: Medium (2), Confidence: 100%,
    Effort: 1 day

  Bug 8: "API rate limit error messages are not helpful"
    Reach: 200 users (4%), Impact: Low (1), Confidence: 90%,
    Effort: 0.5 days

  Bug 9: "File upload fails for files >50MB (limit is supposed to
    be 100MB)"
    Reach: 600 users (12%), Impact: High (3), Confidence: 85%,
    Effort: 3 days

  Bug 10: "Task due dates off by 1 day for users in timezone UTC-12"
    Reach: 5 users (0.1%), Impact: High (3), Confidence: 50%,
    Effort: 4 days

  Tasks:
  1. Calculate RICE scores and rank the 10 bugs.
  2. Which bugs would you include in the next sprint (capacity: 10 days)?
  3. Which bugs would you consider closing as "won't fix"? Why?
  4. The backlog grows 15 bugs/sprint but you fix 10. How do you
     prevent the backlog from growing indefinitely?

assertions:
  - type: llm_judge
    criteria: "RICE calculations are reasonable — Bug 5 (100% reach, low effort) and Bug 7 (high reach, 1 day) score highly, while Bug 10 (5 users) scores very low"
    weight: 0.25
    description: "Reasonable RICE calculations"
  - type: llm_judge
    criteria: "Sprint selection fits 10-day capacity — picks a set of bugs that sum to ≤10 effort days, prioritizing by RICE score"
    weight: 0.25
    description: "Capacity-aware sprint selection"
  - type: llm_judge
    criteria: "Won't fix candidates are justified — Bug 10 (5 users, uncertain confidence) is a strong candidate, with clear reasoning about cost vs. benefit"
    weight: 0.25
    description: "Justified won't-fix decisions"
  - type: llm_judge
    criteria: "Backlog growth strategy is proposed — suggests approaches like bug budgets, quality gates, severity thresholds for auto-closing, or dedicated bug-fix sprints"
    weight: 0.25
    description: "Backlog growth strategy"
