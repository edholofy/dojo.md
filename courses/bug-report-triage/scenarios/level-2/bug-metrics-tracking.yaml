meta:
  id: bug-metrics-tracking
  level: 2
  course: bug-report-triage
  type: output
  description: "Track and analyze bug metrics to measure team performance and identify quality trends"
  tags: [bugs, metrics, sla, tracking, intermediate]

state: {}

trigger: |
  "DevFlow" (developer tools SaaS) wants to establish bug metrics
  and SLAs. Currently they have no formal tracking — bugs get fixed
  when developers have time.

  Historical data from the last quarter (you pulled from Jira):
  - Total bugs filed: 180
  - Total bugs resolved: 145
  - Average resolution time: 8.5 days
  - Critical bugs filed: 12, avg resolution: 4.2 days
  - Major bugs filed: 45, avg resolution: 7.1 days
  - Minor bugs filed: 85, avg resolution: 10.3 days
  - Trivial bugs filed: 38, avg resolution: 12.8 days
  - Bugs reopened after fix: 22 (15% reopen rate)
  - Bugs found in production (escaped QA): 65 (36% escape rate)
  - Customer-reported vs. internal: 60% customer, 40% internal

  Industry benchmarks:
  - Target reopen rate: <5%
  - Target escape rate: <20%
  - Target critical resolution: <4 hours
  - Target major resolution: <24 hours

  Tasks:

  1. Analyze the data: What are the 3 most concerning metrics,
     and what do they tell you about the team's quality process?

  2. Propose SLAs for each severity level:
     - Critical: Response time ___, Resolution time ___
     - Major: Response time ___, Resolution time ___
     - Minor: Response time ___, Resolution time ___
     - Trivial: Resolution time ___
     Justify each SLA target.

  3. The 15% reopen rate is 3x the benchmark. What are the likely
     causes, and what would you investigate first?

  4. Design a monthly bug health dashboard. What 8-10 metrics should
     be tracked, and what does each metric tell the team?

assertions:
  - type: llm_judge
    criteria: "Reopen rate and escape rate are flagged as top concerns — 15% reopen rate (3x benchmark) and 36% escape rate (nearly 2x benchmark) indicate serious quality gaps"
    weight: 0.25
    description: "Top concerns identified"
  - type: llm_judge
    criteria: "SLAs are realistic improvements — doesn't immediately target industry benchmark for critical bugs (current 4.2 days vs target 4 hours), proposes incremental improvement"
    weight: 0.25
    description: "Realistic SLA targets"
  - type: llm_judge
    criteria: "Reopen causes are investigated — suggests inadequate testing of fixes, unclear acceptance criteria, insufficient code review, or incomplete root cause analysis"
    weight: 0.25
    description: "Reopen cause investigation"
  - type: llm_judge
    criteria: "Dashboard includes leading and lagging metrics — tracks both outcome metrics (resolution time, escape rate) and process metrics (backlog growth, test coverage)"
    weight: 0.25
    description: "Balanced metric dashboard"
