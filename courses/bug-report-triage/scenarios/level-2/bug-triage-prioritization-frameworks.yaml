meta:
  id: bug-triage-prioritization-frameworks
  level: 2
  course: bug-report-triage
  type: output
  description: "Apply structured prioritization frameworks like RICE, WSJF, and impact/effort matrices to make consistent bug triage decisions across a growing backlog"
  tags: [bugs, prioritization, frameworks, RICE, WSJF, intermediate]

state: {}

trigger: |
  You're a QA lead at "DataVault" (analytics platform, 50 engineers).
  The team has been triaging bugs inconsistently — different engineers
  use different criteria, leading to arguments in triage meetings.

  The VP of Engineering says: "We need a framework. Every bug should be
  scored the same way so we can compare apples to apples."

  Here are 8 bugs to prioritize using a framework:

  Bug 1: Dashboard loading time is 12 seconds (should be <3s)
  - Affects: All 10,000 users
  - Workaround: Users can refresh the page (sometimes helps)
  - Fix estimate: 5 days

  Bug 2: CSV export includes deleted records
  - Affects: ~200 users who export weekly
  - Workaround: Manually filter deleted records after export
  - Fix estimate: 2 days

  Bug 3: Two-factor auth codes expire after 15 seconds instead of 30
  - Affects: ~3,000 users with 2FA enabled
  - Workaround: Request new code quickly
  - Fix estimate: 0.5 days

  Bug 4: Custom date range filter resets when switching between tabs
  - Affects: ~5,000 users who use custom ranges
  - Workaround: Re-enter the date range each time
  - Fix estimate: 3 days

  Bug 5: Email notifications arrive 4-6 hours late
  - Affects: All 10,000 users
  - Workaround: Check the app directly
  - Fix estimate: 8 days

  Bug 6: Chart colors are indistinguishable for colorblind users
  - Affects: ~500 colorblind users
  - Workaround: None (accessibility issue)
  - Fix estimate: 2 days

  Bug 7: API rate limit error message shows internal stack trace
  - Affects: ~100 API users
  - Workaround: None (potential security concern)
  - Fix estimate: 0.5 days

  Bug 8: Saved report names truncate at 50 characters without warning
  - Affects: ~800 users with long report names
  - Workaround: Use shorter names
  - Fix estimate: 1 day

  Tasks:

  1. Choose a prioritization framework (RICE, WSJF, or custom) and
     explain why it's appropriate for this team's needs.

  2. Score all 8 bugs using your chosen framework. Show the math.

  3. Produce the final priority ranking and group into:
     - Sprint 1 (this week): Fix immediately
     - Sprint 2 (next week): Fix soon
     - Backlog: Fix when capacity allows

  4. How would you handle disagreements when engineers challenge the
     framework's ranking? (e.g., "Bug 6 should be higher because
     accessibility matters more than the score suggests")

assertions:
  - type: llm_judge
    criteria: "Framework is applied consistently — all 8 bugs are scored using the same criteria with visible calculations, not just gut-feel rankings"
    weight: 0.25
    description: "Consistent framework application"
  - type: llm_judge
    criteria: "RICE or similar scoring accounts for reach, impact, confidence, and effort — recognizes that Bug 1 (all users, slow dashboard) and Bug 5 (all users, late notifications) score high on reach but differ on impact"
    weight: 0.25
    description: "Multi-factor scoring"
  - type: llm_judge
    criteria: "Sprint grouping is practical — Bug 7 (security concern, 0.5 day fix) and Bug 3 (quick fix, auth issue) are candidates for Sprint 1 due to low effort and security implications"
    weight: 0.25
    description: "Practical sprint grouping"
  - type: llm_judge
    criteria: "Disagreement handling acknowledges framework limitations — proposes override mechanisms for accessibility, security, or strategic concerns that quantitative scores may underweight"
    weight: 0.25
    description: "Framework override mechanisms"
