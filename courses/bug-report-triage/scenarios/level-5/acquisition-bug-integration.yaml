meta:
  id: acquisition-bug-integration
  level: 5
  course: bug-report-triage
  type: output
  description: "Integrate bug triage processes after a company acquisition — merging different tools, taxonomies, cultures, and customer bases while maintaining quality for both"
  tags: [bugs, acquisition, integration, merger, mastery]

state: {}

trigger: |
  "Atlas Platform" ($500M ARR, 400 engineers) just acquired "NimbleApp"
  ($50M ARR, 60 engineers). The acquisition was strategic — NimbleApp
  has a mobile-first product that Atlas lacks.

  The integration challenge: two completely different quality cultures
  and bug triage systems need to merge.

  Atlas (the acquirer):
  - Jira with highly customized workflows (47 custom fields per bug)
  - 5-level severity scale (S1-S5)
  - Formal triage meetings 3x/week with 8 attendees
  - Dedicated QA team (40 engineers)
  - Average bug resolution: 8 days
  - Bug backlog: 2,400 open bugs
  - Customer communication: automated status updates via Zendesk

  NimbleApp (the acquired):
  - Linear with minimal configuration (5 fields per bug)
  - 3-level severity scale (Critical, Normal, Low)
  - Async triage via Slack threads
  - No dedicated QA (developers own testing)
  - Average bug resolution: 3 days
  - Bug backlog: 180 open bugs
  - Customer communication: personal DMs from engineers

  Cultural friction already emerging:
  - NimbleApp engineers call Atlas's process "bureaucratic nightmare"
  - Atlas engineers call NimbleApp's process "cowboy coding"
  - NimbleApp's top engineer resigned, saying "I didn't join a startup
    to fill out 47 Jira fields"
  - Atlas QA team wants to "bring NimbleApp up to our standards"
  - NimbleApp customers are getting automated Zendesk tickets instead
    of personal DMs and are complaining

  The CPO says: "We need one triage process for both teams within 6
  months. Don't lose the best of either culture."

  Tasks:

  1. Assess both systems: What's working and what's broken in each?
     What should the unified system adopt from each?

  2. Design the unified triage process:
     - Tool choice and configuration (not 47 fields, not 5 either)
     - Unified severity taxonomy
     - Meeting cadence that works for both cultures
     - Customer communication approach

  3. Handle the cultural integration:
     - How do you prevent NimbleApp talent from leaving?
     - How do you get Atlas engineers to simplify?
     - What's the migration timeline?
     - How do you handle the inevitable "our way was better" pushback?

  4. The NimbleApp customers are used to personal attention from a 60-
     person company. Now they're customers of a 400-person company.
     How do you maintain that personal feel at scale?

assertions:
  - type: llm_judge
    criteria: "Assessment is balanced — identifies strengths in both systems (Atlas: thoroughness, documentation; NimbleApp: speed, simplicity) rather than assuming the acquirer's process is superior"
    weight: 0.25
    description: "Balanced assessment"
  - type: llm_judge
    criteria: "Unified system takes best of both — proposes something between 47 fields and 5 fields, with required core fields plus optional detailed fields, balancing thoroughness with speed"
    weight: 0.25
    description: "Best-of-both design"
  - type: llm_judge
    criteria: "Cultural integration is empathetic — acknowledges that NimbleApp engineers chose a startup culture and proposes preserving their autonomy within a lighter-weight version of the unified process"
    weight: 0.25
    description: "Empathetic cultural integration"
  - type: llm_judge
    criteria: "Customer communication plan preserves personal feel — proposes dedicated account contacts, escalation paths, or hybrid model rather than immediately forcing all NimbleApp customers into Zendesk automation"
    weight: 0.25
    description: "Personal feel at scale"
