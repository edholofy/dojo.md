meta:
  id: regulated-industry-bugs
  level: 5
  course: bug-report-triage
  type: output
  description: "Manage bug triage in a heavily regulated environment where bugs may trigger compliance obligations, audit findings, and regulatory reporting requirements"
  tags: [bugs, compliance, regulation, HIPAA, SOX, mastery]

state: {}

trigger: |
  You're the Director of Quality at "MedCore" (healthcare EHR
  platform, 1,200 hospitals, FDA Class II medical device certification,
  HIPAA covered entity, SOC 2 Type II certified).

  Every bug isn't just a software problem — it may be a regulatory
  event. Your triage process must satisfy:

  - FDA 21 CFR Part 11 (electronic records, electronic signatures)
  - HIPAA Security Rule (ePHI protection)
  - SOC 2 Type II (continuous compliance)
  - State-specific health data laws (50 different requirements)
  - HITRUST certification requirements

  Current challenges:

  Challenge 1: Classification uncertainty
  A nurse reports that medication dosage calculations occasionally
  round differently than expected (e.g., 2.45mg displays as 2.4mg
  instead of 2.5mg). Is this a cosmetic display bug, a clinical
  safety bug, or an FDA-reportable adverse event?

  Challenge 2: Audit trail integrity
  During routine testing, a QA engineer discovers that certain admin
  actions don't generate audit log entries. This has been the case
  for approximately 6 months. 200+ hospitals may have incomplete
  audit trails.

  Challenge 3: Cross-regulation conflict
  A customer in California requests that their patient data be deleted
  under CCPA. But HIPAA requires maintaining certain records for 6
  years. And your FDA submission references the data schema. Deleting
  the data could affect all three compliance frameworks.

  Challenge 4: Patch urgency vs. validation
  A critical security vulnerability is discovered. Normal FDA validation
  for software changes takes 2-3 weeks. The security team says "patch
  now." The regulatory team says "validate first."

  Tasks:

  1. Design the regulatory-aware bug classification system:
     - How do you classify bugs by regulatory impact?
     - What triggers FDA reporting? HIPAA breach notification?
     - Who makes the classification decision?
     - What documentation is required at each severity level?

  2. Handle each of the 4 challenges above — provide your triage
     decision, regulatory rationale, and required documentation.

  3. Design the change management process that satisfies both
     security urgency and regulatory validation:
     - Emergency patch procedures
     - Abbreviated validation protocols
     - Risk-based approach to FDA submissions

  4. How do you train engineers to recognize regulatory implications
     of bugs? Most engineers have no regulatory background.

assertions:
  - type: llm_judge
    criteria: "Classification system maps bugs to regulatory obligations — clearly defines when a bug triggers FDA MDR reporting, HIPAA breach notification, or SOC 2 incident documentation"
    weight: 0.25
    description: "Regulatory-mapped classification"
  - type: llm_judge
    criteria: "Medication rounding bug is treated as potential clinical safety issue — errs on the side of caution, involves clinical safety officer, and documents the risk assessment"
    weight: 0.25
    description: "Clinical safety prioritized"
  - type: llm_judge
    criteria: "Emergency patch process balances speed and compliance — proposes abbreviated validation with risk assessment, not full bypassing of FDA requirements"
    weight: 0.25
    description: "Balanced emergency process"
  - type: llm_judge
    criteria: "Engineer training is practical — proposes decision trees, checklists, or classification guides that non-regulatory engineers can use to flag potential regulatory issues"
    weight: 0.25
    description: "Practical regulatory training"
