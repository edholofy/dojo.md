meta:
  id: bug-triage-consultancy
  level: 5
  course: bug-report-triage
  type: output
  description: "Act as an external consultant diagnosing and fixing a broken bug triage process at a struggling company, with competing stakeholder interests and political dynamics"
  tags: [bugs, consultancy, diagnosis, stakeholders, mastery]

state: {}

trigger: |
  You've been hired as an external consultant by "BuildRight"
  (construction project management SaaS, $90M ARR, 120 engineers).
  The board hired you because internal efforts to fix bug triage have
  failed three times.

  Stakeholder interviews reveal competing perspectives:

  VP Engineering (Sarah): "Our triage process is fine. The problem is
  we don't have enough engineers. Give me 20 more headcount and the
  bug backlog disappears."

  VP Product (Marcus): "Engineering keeps fixing the wrong bugs. They
  fix what's easy, not what customers need. Product should own triage
  priority."

  VP Customer Success (Diana): "I have enterprise customers threatening
  to leave because bugs they reported 6 months ago haven't been touched.
  Neither engineering nor product listens to CS."

  CTO (James): "We've tried three different triage tools, two process
  redesigns, and hired a QA director who quit after 4 months. Something
  is fundamentally broken and I don't know what."

  CEO (Lisa): "Our NPS is 18, our churn is 15% annually, and I just
  lost a $3M deal because the prospect saw our G2 reviews mentioning
  bugs. Fix this."

  Data you've gathered:
  - 1,800 open bugs (400 older than 6 months)
  - Average bug resolution time: 34 days
  - 40% of bugs are reassigned at least once before resolution
  - No shared severity/priority definitions
  - Triage meeting: 2 hours every Monday (15 people, 60% attendance)
  - Engineering resolves 45 bugs/week but 55 new bugs filed weekly
  - Customer-reported bugs take 2x longer to resolve than internal ones
  - No clear owner for the triage process

  Tasks:

  1. Diagnosis: What's actually broken? Go beyond what each stakeholder
     says and identify the systemic issues. Why have three previous
     fix attempts failed?

  2. Design the recommended triage operating model:
     - Who owns triage decisions?
     - What's the meeting cadence and format?
     - How do engineering, product, and CS collaborate?
     - What tooling and process changes are needed?

  3. Navigate the political dynamics:
     - Sarah wants headcount, Marcus wants control, Diana wants voice
     - How do you get alignment without anyone feeling they "lost"?
     - Write the executive presentation that gets buy-in from all VPs

  4. What's your 90-day implementation plan? Include quick wins in the
     first 2 weeks that build credibility for the larger changes.

assertions:
  - type: llm_judge
    criteria: "Diagnosis identifies the real issue — the problem isn't headcount, tools, or any single stakeholder, but lack of shared ownership, inconsistent definitions, and no feedback loop between CS, product, and engineering"
    weight: 0.25
    description: "Root cause diagnosis"
  - type: llm_judge
    criteria: "Operating model creates shared ownership — proposes a triage council or similar structure where engineering, product, and CS jointly own priority decisions with defined roles"
    weight: 0.25
    description: "Shared ownership model"
  - type: llm_judge
    criteria: "Political navigation is sophisticated — gives each VP a meaningful role (Sarah: execution speed, Marcus: product alignment, Diana: customer voice) so everyone wins"
    weight: 0.25
    description: "Sophisticated stakeholder management"
  - type: llm_judge
    criteria: "Quick wins are concrete — proposes 2-3 visible improvements in weeks 1-2 (e.g., close stale bugs, fix the top 5 customer-reported bugs, standardize severity definitions)"
    weight: 0.25
    description: "Concrete quick wins"
