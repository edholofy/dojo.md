meta:
  id: bug-economics
  level: 5
  course: bug-report-triage
  type: output
  description: "Apply economic thinking to bug triage — calculate the true cost of bugs, optimize resource allocation using cost-benefit analysis, and build the business case for quality investment"
  tags: [bugs, economics, ROI, cost-analysis, mastery]

state: {}

trigger: |
  You're the VP of Engineering at "MarketPulse" (marketing analytics
  platform, $180M ARR, 250 engineers). The CFO has challenged you:

  "Engineering always says we need more budget for quality. But you
  can't show me the numbers. I need to see the economics of bugs —
  what they actually cost us, what fixing them saves, and where the
  optimal investment point is."

  Data available:
  - Revenue: $180M ARR, 5% annual churn rate ($9M lost annually)
  - Customer survey: 35% of churned customers cite bugs as top-3 reason
  - Support: 4,000 tickets/month, 40% are bug-related
  - Support cost: $45 per ticket (blended: agent salary + tools)
  - Engineering: 250 engineers at $200K average loaded cost
  - Bug fix time: 25% of engineering capacity (62.5 engineers)
  - Average bug fix cost: $4,200 (21 hours × $200/hr)
  - Bug introduction rate: 120 new bugs/month
  - Bugs found pre-production: 60% (by testing)
  - Bugs found in production: 40% (by customers or monitoring)
  - Cost to fix pre-production: $800 (4 hours average)
  - Cost to fix in production: $8,500 (42 hours: investigation + fix +
    deployment + customer communication + postmortem)
  - Outages caused by bugs: 6/year, average 3 hours, estimated cost
    $150K per hour in lost revenue + reputation damage

  Tasks:

  1. Calculate the total annual cost of bugs:
     - Direct costs (engineering time to fix)
     - Support costs (bug-related tickets)
     - Revenue impact (churn attributable to bugs)
     - Outage costs
     - Opportunity cost (what could 62.5 engineers build instead?)
     - Show total cost and cost per bug

  2. Build the investment optimization model:
     - Where does each additional $1 in quality spend generate the
       highest return? (Prevention, detection, or faster resolution?)
     - What's the optimal bug escape rate? (It's not 0%)
     - At what point does quality investment have diminishing returns?

  3. Propose 3 investment scenarios for the CFO:
     - Scenario A: $500K additional investment
     - Scenario B: $1.5M additional investment
     - Scenario C: $3M additional investment
     For each: what it buys, expected bug reduction, projected ROI,
     and payback period.

  4. Design the ongoing quality economics dashboard:
     - What metrics does the CFO see monthly?
     - How do you track quality ROI over time?
     - How do you make the case for continued investment?

assertions:
  - type: llm_judge
    criteria: "Cost calculation is comprehensive — includes direct fix costs, support costs, churn revenue, outage costs, AND opportunity cost of engineers doing fix work instead of building features"
    weight: 0.25
    description: "Comprehensive cost calculation"
  - type: llm_judge
    criteria: "Optimal escape rate isn't zero — explains diminishing returns and that the economically optimal point is where marginal cost of prevention equals marginal cost of escape"
    weight: 0.25
    description: "Economic optimization insight"
  - type: llm_judge
    criteria: "Investment scenarios show different ROI profiles — each scenario has quantified benefits, not just 'more testing = fewer bugs', with clear payback periods"
    weight: 0.25
    description: "Quantified investment scenarios"
  - type: llm_judge
    criteria: "Prevention investment is highlighted — identifies that shifting detection earlier (pre-production from 60% to 80%) has the highest ROI because production bugs cost 10x more"
    weight: 0.25
    description: "Prevention ROI highlighted"
