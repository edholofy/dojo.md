meta:
  id: open-source-bug-management
  level: 5
  course: bug-report-triage
  type: output
  description: "Manage bug triage for a popular open-source project with community contributors, where you have no authority over reporters and limited maintainer resources"
  tags: [bugs, open-source, community, maintainer, mastery]

state: {}

trigger: |
  You're the lead maintainer of "FastDB" — an open-source database
  library with 45,000 GitHub stars, 2,000 forks, 800 open issues, and
  3 active maintainers (all volunteers with day jobs).

  Community dynamics:
  - 150 new issues filed monthly (mix of bugs, features, questions)
  - 15 active community contributors (they fix ~20% of bugs)
  - 500+ drive-by reporters (file one issue, never return)
  - 3 corporate sponsors contribute $5K/month total
  - Biggest sponsor wants their bug prioritized (implied threat to
    pull funding)

  Current problems:
  - 800 open issues, oldest is 4 years old
  - 60% of new issues lack reproduction steps
  - Maintainer burnout: one maintainer went on indefinite hiatus
  - Toxic interactions: users demanding fixes, calling maintainers
    lazy, filing duplicate issues with angry comments
  - No clear triage process (maintainers just fix what interests them)
  - Critical bugs in edge cases that only 0.1% of users hit, but those
    users are very vocal

  Recent crisis:
  A security vulnerability was disclosed publicly on Twitter before
  being reported to maintainers. The tweet went viral (5K retweets).
  A patch is needed but the one maintainer who understands that code
  module is on hiatus.

  Tasks:

  1. Design the community triage process:
     - Issue templates and required fields
     - Automated triage (bots, labels, stale issue management)
     - Community triage team (how to recruit and empower contributors)
     - Severity classification that works for open-source

  2. Handle the community dynamics:
     - Toxic users: What's your code of conduct enforcement approach?
     - Corporate sponsor pressure: How do you balance sponsored vs.
       community priorities?
     - Maintainer burnout: How do you distribute triage load?
     - Drive-by reporters: How do you get better bug reports?

  3. Handle the security crisis:
     - The vulnerability is public. What do you do RIGHT NOW?
     - The expert maintainer is on hiatus. How do you get a patch out?
     - How do you prevent premature public disclosure in the future?

  4. Design the sustainability plan: How does a 3-person volunteer
     team sustainably manage 150 issues/month?

assertions:
  - type: llm_judge
    criteria: "Community triage uses automation — proposes issue templates, auto-labeling bots, stale issue policies, and reproduction-required labels to handle scale with limited maintainer time"
    weight: 0.25
    description: "Automated community triage"
  - type: llm_judge
    criteria: "Sponsor handling maintains integrity — doesn't let funding dictate priority but creates a transparent way to acknowledge sponsors (e.g., paid support tier, priority labels) without corrupting community trust"
    weight: 0.25
    description: "Sponsor integrity maintained"
  - type: llm_judge
    criteria: "Security response is urgent and practical — proposes immediate CVE disclosure, temporary workaround or mitigation guidance, reaching out to the hiatus maintainer, and recruiting emergency help from trusted contributors"
    weight: 0.25
    description: "Practical security response"
  - type: llm_judge
    criteria: "Sustainability plan is realistic — acknowledges 3 volunteers can't handle 150 issues/month and proposes community triage team, automated workflows, and clear expectations about response times"
    weight: 0.25
    description: "Realistic sustainability plan"
