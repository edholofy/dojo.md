meta:
  id: distributed-team-triage
  level: 5
  course: bug-report-triage
  type: output
  description: "Design bug triage operations for a fully distributed team across 5 time zones, where synchronous meetings are impossible and cultural differences affect bug reporting"
  tags: [bugs, distributed, remote, timezone, mastery]

state: {}

trigger: |
  "GlobalFlow" (workflow automation, $220M ARR, 350 engineers across
  5 time zones: San Francisco, London, Bangalore, Tokyo, São Paulo).
  The company went fully remote 2 years ago.

  The bug triage process was designed for a single-office team and
  hasn't adapted. Current problems:

  Timezone challenges:
  - Triage meetings at 10am PT exclude Tokyo (2am) and Bangalore
    (10:30pm)
  - Critical bugs reported at 11pm PT sit untriaged for 8-10 hours
    until the US team starts
  - The São Paulo team (30 engineers) feels excluded from all decisions
  - Handoff between timezones is informal ("I'll Slack someone")

  Cultural differences in bug reporting:
  - US engineers file bugs with minimal detail ("Search is broken")
  - Bangalore team files extremely detailed bugs (2-page descriptions)
  - Tokyo team rarely files bugs (cultural reluctance to criticize)
  - London team files bugs as feature requests to "soften" the message
  - São Paulo team files bugs verbally in Slack (no tickets created)

  Language challenges:
  - Bug reports in English vary in clarity (non-native speakers)
  - Customer bugs come in 12 languages
  - Technical terminology has different meanings across regions

  Collaboration metrics:
  - Cross-timezone bugs take 3x longer to resolve
  - 45% of cross-timezone handoffs result in context loss
  - Team satisfaction with triage process: 28% (lowest in company)

  Tasks:

  1. Design the follow-the-sun triage model:
     - How do you ensure 24-hour triage coverage?
     - What are the handoff protocols between timezones?
     - How do you maintain context across handoffs?
     - What tooling supports async triage decisions?

  2. Address the cultural differences:
     - How do you standardize bug reporting without being culturally
       insensitive?
     - How do you encourage the Tokyo team to report bugs?
     - How do you get the São Paulo team to use tickets?
     - How do you normalize the detail level across teams?

  3. Design the async triage decision framework:
     - When can triage decisions be made asynchronously?
     - When must decisions wait for synchronous discussion?
     - How do you handle disagreements across timezones?
     - How do you make async decisions feel inclusive?

  4. What metrics tell you the distributed triage is working? How do
     you measure equity across timezones?

assertions:
  - type: llm_judge
    criteria: "Follow-the-sun model has clear handoffs — defines specific handoff times, required documentation at each handoff, and designated triage leads per timezone with overlap windows"
    weight: 0.25
    description: "Clear timezone handoffs"
  - type: llm_judge
    criteria: "Cultural approach is respectful — doesn't impose one culture's reporting style but creates a lightweight standard with templates that accommodate different communication styles"
    weight: 0.25
    description: "Culturally respectful standardization"
  - type: llm_judge
    criteria: "Async framework defines clear criteria — specifies which severity levels can be async-triaged (most P2-P3) vs. which require sync discussion (P0-P1), with escalation paths"
    weight: 0.25
    description: "Clear async criteria"
  - type: llm_judge
    criteria: "Equity metrics track timezone fairness — measures resolution time by reporting timezone, triage participation by region, and ensures no timezone is systematically disadvantaged"
    weight: 0.25
    description: "Timezone equity metrics"
