meta:
  id: zero-bug-philosophy
  level: 5
  course: bug-report-triage
  type: output
  description: "Design and implement a zero-bug philosophy across an engineering organization — where the goal isn't zero bugs, but zero tolerance for ignoring them"
  tags: [bugs, philosophy, zero-bug, organizational, mastery]

state: {}

trigger: |
  You've been hired as VP of Quality at "NovaTech" ($400M ARR, 600
  engineers, 15 products). The board has mandated a "zero-bug policy"
  after a series of quality incidents that cost $20M in lost contracts.

  The CEO says: "I want zero bugs in production."
  The CTO says: "That's impossible. We need zero tolerance for bugs,
  not zero bugs."

  Current reality:
  - Bug backlog: 4,200 open bugs (oldest is 3 years old)
  - 800 bugs filed monthly, 600 closed monthly (net +200/month)
  - 60% of bugs are never resolved (closed as "won't fix" or stale)
  - Engineers spend 15% of time on bug fixes (leadership wants 25%)
  - No organization-wide bug SLAs
  - Each product team has different quality standards
  - Customer satisfaction with bug resolution: 32%

  Board expectations:
  - Bug backlog reduced by 80% within 12 months
  - Customer-reported bugs reduced by 50% within 12 months
  - Customer satisfaction with bug resolution above 75%
  - Zero P0/P1 bugs open for more than 48 hours

  Tasks:

  1. Resolve the CEO vs. CTO debate: Write the quality philosophy
     document that defines what "zero bug" actually means at NovaTech.
     Address: What's a bug vs. a feature gap? When is "won't fix"
     acceptable? What does "zero tolerance" mean in practice?

  2. Design the backlog bankruptcy strategy:
     - How do you go from 4,200 to ~800 open bugs in 12 months?
     - Which bugs do you close vs. fix vs. merge?
     - How do you communicate this to customers who filed those bugs?
     - How do you prevent the backlog from growing back?

  3. Design the organization-wide bug SLA framework:
     - SLAs by severity tier
     - Escalation procedures when SLAs are breached
     - Consequences for repeated SLA misses
     - How do you handle SLAs differently for enterprise vs. SMB?

  4. How do you change the engineering culture from "bugs are
     inevitable" to "bugs are unacceptable"? What's the 12-month
     transformation plan?

assertions:
  - type: llm_judge
    criteria: "Philosophy resolves the debate constructively — defines zero-bug as a process discipline (every bug gets a decision within SLA) rather than an impossible goal (no bugs ever)"
    weight: 0.25
    description: "Constructive philosophy definition"
  - type: llm_judge
    criteria: "Backlog bankruptcy is systematic — proposes mass-closing stale bugs with criteria (age, reporter activity, relevance), transparent customer communication, and a fresh-start date"
    weight: 0.25
    description: "Systematic backlog bankruptcy"
  - type: llm_judge
    criteria: "SLA framework is tiered and enforced — P0 (<4h response, <24h fix), P1 (<24h response, <48h fix), with escalation to management when breached and consequences for patterns"
    weight: 0.25
    description: "Enforced tiered SLAs"
  - type: llm_judge
    criteria: "Cultural transformation connects to incentives — proposes making quality metrics part of performance reviews, team OKRs, and promotion criteria"
    weight: 0.25
    description: "Incentive-aligned culture change"
