meta:
  id: comprehensive-triage-engagement
  level: 5
  course: bug-report-triage
  type: output
  description: "Handle the ultimate bug triage challenge — a full-day simulation with 20+ interconnected issues across technical, organizational, and customer-facing dimensions"
  tags: [bugs, comprehensive, simulation, full-day, mastery]

state: {}

trigger: |
  You're the newly appointed Head of Quality at "OmniSaaS" ($700M ARR,
  1,000 engineers, 25,000 customers, 20 products). Today is your first
  day, and the universe is testing you.

  8:00 AM — Morning briefing:
  Your predecessor left a 15-page document titled "Things I Couldn't
  Fix." Key points:
  - Bug backlog: 6,000 open bugs across 20 products
  - No unified triage process (each product team does their own thing)
  - Customer satisfaction with bug resolution: 24%
  - Average resolution time: 42 days
  - 3 customers (worth $15M combined) have given 30-day ultimatums
  - Engineering morale around bug fixing: "It's punishment duty"
  - The board wants a quality transformation plan in 60 days

  9:00 AM — First crisis:
  Product A (largest product, $200M ARR): A data corruption bug is
  discovered. It's been silently corrupting 0.1% of records for the
  past 3 months. 500 customers affected. The data cannot be recovered.

  10:30 AM — Second crisis:
  Product B's entire QA team (5 people) has resigned. They submitted
  a joint letter: "We've been asking for automation tools for 2 years.
  Management doesn't take quality seriously. We're going where we're
  valued."

  12:00 PM — Customer escalation:
  The CIO of your second-largest customer ($5M/year) calls: "I have
  a board meeting Thursday. I need to tell them OmniSaaS is getting
  better, or I need to tell them we're switching vendors. Give me
  something to present."

  2:00 PM — Discovery:
  While investigating the data corruption, engineers discover that
  Product A and Product C share a database library with a known bug
  that was reported 18 months ago but deprioritized. Product C may
  also be affected.

  3:30 PM — Media inquiry:
  A reporter from The Information is working on a story about OmniSaaS
  quality issues. Multiple customers have gone on record. The story
  publishes Friday.

  4:30 PM — Board member call:
  A board member calls you directly: "I invested in this company
  because of its technology. Now I'm hearing about data corruption and
  QA teams quitting. I need you to convince me this is fixable."

  Tasks:

  1. Triage the day: Given everything that's happening, what are your
     priorities? What do you do first, second, third? What can wait?

  2. Handle the data corruption crisis:
     - Scope the impact (how do you find all affected records?)
     - Customer communication strategy (500 customers need to know)
     - Fix the root cause (shared database library across products)
     - Prevent it from happening again

  3. Write the 60-day quality transformation plan for the board:
     - Week 1-2: Emergency stabilization
     - Week 3-4: Process foundation
     - Week 5-8: Systematic improvement
     - Include: headcount, tooling, process, culture changes

  4. Handle the three external pressures simultaneously:
     - CIO who needs "something for Thursday"
     - Reporter who publishes Friday
     - Board member who needs conviction that it's fixable

  5. What does your predecessor's document tell you about the
     organizational dysfunction? What systemic issues allowed 6,000
     bugs to accumulate, a shared library bug to be ignored for 18
     months, and an entire QA team to quit?

assertions:
  - type: llm_judge
    criteria: "Day triage prioritizes data corruption first — the 3-month silent corruption affecting 500 customers is the most urgent crisis because the damage is ongoing and irreversible"
    weight: 0.20
    description: "Crisis prioritization"
  - type: llm_judge
    criteria: "Transformation plan is credible for 60 days — focuses on achievable wins (triage process, top customer bugs, quick hires) rather than trying to fix everything at once"
    weight: 0.20
    description: "Credible 60-day plan"
  - type: llm_judge
    criteria: "External communications are differentiated — the CIO gets specific commitments, the reporter gets a proactive narrative, the board member gets strategic vision, each with appropriate tone"
    weight: 0.20
    description: "Differentiated external comms"
  - type: llm_judge
    criteria: "Systemic diagnosis goes deep — connects QA team resignation to management neglect, bug accumulation to lack of ownership, and shared library bug to cross-product coordination failure"
    weight: 0.20
    description: "Deep systemic diagnosis"
  - type: llm_judge
    criteria: "Data corruption response includes proactive customer notification — doesn't wait for customers to discover the issue but proactively reaches out to all 500 affected customers with specifics"
    weight: 0.20
    description: "Proactive corruption notification"
