meta:
  id: wont-fix-communication
  level: 1
  course: bug-report-triage
  type: output
  description: "Learn to communicate 'won't fix' and 'works as intended' decisions professionally and empathetically"
  tags: [bugs, wont-fix, communication, diplomacy, basics]

state: {}

trigger: |
  At "NoteApp" (note-taking SaaS), the triage team has decided that
  3 reported bugs will not be fixed. You need to communicate these
  decisions. Each requires a different approach.

  Decision 1: "Won't fix — Works as intended"
  Bug: "When I export a note to PDF, the custom fonts aren't
  preserved. The PDF uses system fonts instead."
  Context: PDF export intentionally uses system fonts for
  compatibility across all devices. Using custom fonts would
  require embedding them, increasing file sizes 10x.
  Reporter: Paying customer, designer

  Decision 2: "Won't fix — Too low impact to justify effort"
  Bug: "The note count on the sidebar shows '99+' instead of the
  exact number when you have more than 99 notes."
  Context: Fixing this requires refactoring the sidebar component.
  Only 2% of users have 100+ notes. Engineering estimate: 3 days.
  Reporter: Power user, free tier

  Decision 3: "Won't fix — Incompatible with product direction"
  Bug: "The collaborative editing feature doesn't support real-time
  cursor positions from other users."
  Context: Product team has decided to move away from real-time
  collaboration and focus on async collaboration instead. Building
  cursor sync would invest in a feature being deprecated.
  Reporter: Enterprise customer, $500/mo

  Tasks:

  1. Write the response for each "won't fix" decision.

  2. For each, explain: How do you say "no" without making the
     reporter feel dismissed?

  3. Decision #3 is tricky — an enterprise customer asking for a
     feature you're deprecating. How do you communicate this without
     revealing confidential product strategy?

  4. What alternatives or workarounds can you offer for each case?

assertions:
  - type: llm_judge
    criteria: "Works-as-intended response explains the reasoning — tells the designer WHY system fonts are used (compatibility, file size) so the decision makes sense, not just 'that's how it works'"
    weight: 0.25
    description: "Reasoning explained"
  - type: llm_judge
    criteria: "Low-impact response is respectful — doesn't say '99% of users don't care' or make the reporter feel their report was a waste of time"
    weight: 0.25
    description: "Respectful low-impact response"
  - type: llm_judge
    criteria: "Enterprise response is diplomatically honest — communicates that this won't be built without revealing the deprecation plan, possibly redirecting to the async collaboration direction"
    weight: 0.25
    description: "Diplomatic enterprise response"
  - type: llm_judge
    criteria: "Alternatives are offered — each response suggests a workaround (manual font embedding, browser extension, third-party tool) rather than just saying no"
    weight: 0.25
    description: "Alternatives offered"
