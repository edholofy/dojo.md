meta:
  id: customer-bug-communication
  level: 1
  course: bug-report-triage
  type: output
  description: "Write clear, professional responses to customers who report bugs — from acknowledgment through resolution"
  tags: [bugs, customer, communication, response, basics]

state: {}

trigger: |
  You handle customer-reported bugs at "FileSync" (file storage
  SaaS). Write responses for each stage of the bug lifecycle.

  The bug: A customer reports "Files uploaded yesterday are showing
  as 0 bytes. I can see them in my file list but they're empty.
  This happened to about 20 files I uploaded between 3-5 PM EST."

  Customer: Maria, Business plan ($49/mo), 2-year customer

  Write 4 responses for each stage:

  1. Initial acknowledgment (within 1 hour):
     - Acknowledge the issue
     - Show you understand the impact
     - Set expectations for next update

  2. Investigation update (4 hours later):
     Engineering found that a storage migration caused the issue.
     Files aren't lost — they're in a temporary cache. Recovery
     is possible but will take 6-8 hours.
     - Communicate what you found
     - Set expectations for resolution
     - Reassure about data safety

  3. Resolution notification (next morning):
     Files have been fully restored.
     - Confirm resolution
     - Explain what happened (non-technical)
     - Explain what you're doing to prevent recurrence

  4. Follow-up (3 days later):
     Check in to make sure everything is working.
     - Verify the fix is holding
     - Rebuild confidence
     - Thank them for reporting

  For each response, note the key communication principle you're
  applying.

assertions:
  - type: llm_judge
    criteria: "Acknowledgment includes a timeline — tells Maria when she'll hear back next, not just 'we're looking into it' with no timeframe"
    weight: 0.25
    description: "Timeline in acknowledgment"
  - type: llm_judge
    criteria: "Investigation update leads with good news — 'files aren't lost' appears early in the message, not buried after technical explanation"
    weight: 0.25
    description: "Good news first in update"
  - type: llm_judge
    criteria: "Resolution explains non-technically — describes the storage migration issue in terms Maria can understand without being condescending"
    weight: 0.25
    description: "Non-technical explanation"
  - type: llm_judge
    criteria: "Follow-up demonstrates care — checking in 3 days later shows proactive customer service, not just closing the ticket"
    weight: 0.25
    description: "Proactive follow-up"
