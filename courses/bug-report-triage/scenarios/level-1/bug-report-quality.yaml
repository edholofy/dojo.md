meta:
  id: bug-report-quality
  level: 1
  course: bug-report-triage
  type: output
  description: "Evaluate and improve bug report quality — identify what information is missing and rewrite incomplete bug reports"
  tags: [bugs, report-quality, writing, communication, basics]

state: {}

trigger: |
  Your engineering team at "ChatBase" (messaging platform) has been
  complaining that bug reports from the QA team and customers are
  too vague to act on. Your lead asks you to evaluate 3 bug reports
  and improve them.

  Bug Report A (from QA):
  Title: "Chat doesn't work"
  Description: "The chat feature is broken. Please fix."

  Bug Report B (from customer):
  Title: "Can't send messages"
  Description: "I've been trying to send messages all morning but
  it's not working. This is really frustrating. I need this fixed
  ASAP because we have a client meeting."

  Bug Report C (from a developer):
  Title: "WebSocket connection drops after 30min idle on Firefox 115"
  Description: "Steps: 1) Open chat room, 2) Leave idle for 30 min,
  3) Attempt to send message. Expected: message sends. Actual:
  'Connection lost' error. Tested on Firefox 115.0.2, macOS 14.2.
  Does not reproduce on Chrome 120. Server logs show no heartbeat
  response. Likely related to Firefox's aggressive socket timeout."

  Tasks:

  1. Rate each bug report's quality (1-5 scale) and explain why.

  2. What are the essential components of a good bug report?
     List them and explain why each matters.

  3. Rewrite Bug Reports A and B to meet quality standards. Add
     reasonable assumptions for missing details.

  4. What questions would you ask the reporter of Bug Report A
     and Bug Report B to get the information you need?

assertions:
  - type: llm_judge
    criteria: "Bug Report C is rated highest — recognizes it as a well-written report with steps to reproduce, environment details, expected/actual behavior, and initial diagnosis"
    weight: 0.25
    description: "Quality ratings are correct"
  - type: llm_judge
    criteria: "Essential components include at minimum: title, steps to reproduce, expected behavior, actual behavior, environment/browser/OS, and severity"
    weight: 0.25
    description: "Essential components identified"
  - type: llm_judge
    criteria: "Rewritten reports include steps to reproduce — both Report A and B rewrites add specific reproduction steps, not just more descriptive summaries"
    weight: 0.25
    description: "Rewrites include reproduction steps"
  - type: llm_judge
    criteria: "Follow-up questions are specific — asks about browser, OS, steps taken, error messages, screenshots, and whether the issue is reproducible, not just 'can you give more detail?'"
    weight: 0.25
    description: "Specific follow-up questions"
