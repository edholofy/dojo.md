meta:
  id: bug-severity-basics
  level: 1
  course: bug-report-triage
  type: output
  description: "Understand the difference between bug severity and priority, and learn to classify bugs correctly using standard frameworks"
  tags: [bugs, severity, priority, classification, basics]

state: {}

trigger: |
  You're a new QA engineer at "AppFlow" (project management SaaS).
  Your lead asks you to classify the severity and priority for 6
  incoming bug reports before the weekly triage meeting.

  Bug reports:

  1. "App crashes when clicking Save on projects with more than
     100 tasks. We've had 3 enterprise customers report this today."

  2. "The 'Export to PDF' button text is misspelled as 'Exprot to PDF'
     on the dashboard page."

  3. "Users can access admin settings by modifying the URL parameter.
     Any logged-in user can change billing and permissions."

  4. "The loading spinner on the task list page is slightly off-center
     by about 2 pixels on Safari."

  5. "Email notifications for task assignments are being sent 4-6
     hours late instead of immediately."

  6. "The date picker shows incorrect dates when the user's timezone
     is set to anything other than UTC."

  Tasks:

  1. Define the difference between severity and priority. Why are
     they different, and give an example of a high-severity,
     low-priority bug.

  2. Classify each bug using this severity scale:
     - Critical: System crash, data loss, security vulnerability
     - Major: Core feature broken, significant user impact
     - Minor: Feature works but with issues, workaround available
     - Trivial: Cosmetic, no functional impact

  3. Assign priority (P0-P3) to each bug:
     - P0: Fix immediately, all hands on deck
     - P1: Fix in current sprint
     - P2: Fix in next sprint
     - P3: Fix when time allows

  4. For each classification, explain your reasoning in 1-2 sentences.

assertions:
  - type: llm_judge
    criteria: "Severity vs priority distinction is clear — explains that severity is about technical impact while priority is about business urgency, with a valid example of their divergence"
    weight: 0.25
    description: "Clear severity-priority distinction"
  - type: llm_judge
    criteria: "Security bug (#3) is classified as Critical severity and P0 priority — unauthorized admin access is a security vulnerability that needs immediate attention"
    weight: 0.25
    description: "Security bug correctly classified"
  - type: llm_judge
    criteria: "Crash bug (#1) is high severity and high priority — enterprise customers affected with data loss risk puts this at Critical/P0 or P1"
    weight: 0.25
    description: "Crash bug correctly classified"
  - type: llm_judge
    criteria: "Cosmetic bugs (#2, #4) are low severity — typo and pixel alignment are Minor/Trivial with P2-P3 priority, not treated as urgent"
    weight: 0.25
    description: "Cosmetic bugs correctly classified"
