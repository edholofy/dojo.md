meta:
  id: bug-reproduction
  level: 1
  course: bug-report-triage
  type: output
  description: "Learn basic bug reproduction strategies — how to reproduce reported issues and what to do when you can't reproduce them"
  tags: [bugs, reproduction, debugging, troubleshooting, basics]

state: {}

trigger: |
  You're a support engineer at "ScheduleApp" (scheduling SaaS).
  Three bugs were reported this week and you need to attempt
  reproduction before passing them to engineering.

  Bug A: "Calendar events disappear after refreshing the page"
  Reporter: Sarah, Marketing team, Chrome on Windows 11
  Additional info: "It happens sometimes. Not every time."

  Bug B: "Can't create events on February 29, 2028"
  Reporter: DevOps team during testing
  Additional info: "Tried to schedule a recurring event that would
  fall on Feb 29. Got error: 'Invalid date.'"

  Bug C: "The app is really slow"
  Reporter: Jake, Sales team, Safari on macOS
  Additional info: "Pages take forever to load. Started about a
  week ago."

  Tasks:

  1. For each bug, write a reproduction plan:
     - What specific steps would you follow?
     - What environment/conditions do you need to set up?
     - What are you looking for to confirm the bug?

  2. Bug A says "happens sometimes." What techniques can you use
     to reproduce intermittent bugs? List at least 4 approaches.

  3. You tried Bug A's reproduction steps 10 times and it never
     happened. Write the response back to Sarah asking for more
     information. What specific questions do you ask?

  4. Bug C is vague ("really slow"). How do you turn this into
     a measurable, actionable bug report? What data would you
     collect?

assertions:
  - type: llm_judge
    criteria: "Reproduction plans are step-by-step — each bug gets specific steps to follow with environment setup, not just 'try to reproduce the issue'"
    weight: 0.25
    description: "Step-by-step reproduction plans"
  - type: llm_judge
    criteria: "Intermittent bug techniques are listed — mentions approaches like varying timing, different data sets, network conditions, concurrent users, or cache states"
    weight: 0.25
    description: "Intermittent bug techniques"
  - type: llm_judge
    criteria: "Follow-up questions to Sarah are specific — asks about what she was doing before refresh, how many events, browser extensions, network, and whether specific event types disappear"
    weight: 0.25
    description: "Specific follow-up questions"
  - type: llm_judge
    criteria: "Performance bug is quantified — suggests collecting page load times, network tab data, browser dev tools metrics, or user count on the account to make 'slow' measurable"
    weight: 0.25
    description: "Quantified performance bug"
