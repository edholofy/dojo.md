meta:
  id: bug-acknowledgment-writing
  level: 1
  course: bug-report-triage
  type: output
  description: "Write professional bug acknowledgment responses that set expectations and maintain reporter confidence"
  tags: [bugs, acknowledgment, communication, response, basics]

state: {}

trigger: |
  You're handling incoming bug reports at "FormBuilder" (form creation
  SaaS). Write acknowledgment responses for each of these 4 bug
  reports. Each requires a different tone and approach.

  Bug 1 (from enterprise customer, angry tone):
  "Your form builder crashed in the middle of our annual compliance
  survey and we lost 200 responses. This is the third time this
  month. We're paying $2,000/month for this? Fix this NOW or we're
  leaving."
  Filed: 2 hours ago

  Bug 2 (from free-tier user, helpful tone):
  "Hey! I found a small bug — when I set a form to require email
  validation, it accepts 'test@test' without a TLD. Not a big deal
  but thought you'd want to know! Love the product otherwise."
  Filed: 1 day ago

  Bug 3 (from internal developer, technical):
  "The form submission handler is throwing a NullPointerException
  when the conditional logic field reference points to a deleted
  field. Stack trace attached. Reproduction: create form with
  conditional logic, delete the referenced field, submit form."
  Filed: 4 hours ago

  Bug 4 (from customer, confused):
  "I don't know if this is a bug or if I'm doing something wrong,
  but my forms aren't showing up on my website even though I
  published them. I've tried everything."
  Filed: 30 minutes ago

  For each, write the acknowledgment response and explain:
  - What tone did you use and why?
  - What expectations did you set?
  - What's the next step you're committing to?

assertions:
  - type: llm_judge
    criteria: "Enterprise customer response leads with empathy — acknowledges the data loss and repeated incidents first before discussing next steps, matching the urgency of their frustration"
    weight: 0.25
    description: "Empathy-first enterprise response"
  - type: llm_judge
    criteria: "Free-tier user response is warm and appreciative — thanks them for the helpful report, doesn't dismiss the bug, and matches their positive energy"
    weight: 0.25
    description: "Warm free-tier response"
  - type: llm_judge
    criteria: "Internal developer response is technical and efficient — acknowledges the stack trace, confirms the reproduction steps, and discusses the likely code path without unnecessary pleasantries"
    weight: 0.25
    description: "Technical internal response"
  - type: llm_judge
    criteria: "Confused customer response is reassuring — doesn't assume it's user error or a bug, offers to help troubleshoot, and makes the customer feel comfortable reporting"
    weight: 0.25
    description: "Reassuring confused-customer response"
