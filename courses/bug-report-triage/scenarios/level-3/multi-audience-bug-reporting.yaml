meta:
  id: multi-audience-bug-reporting
  level: 3
  course: bug-report-triage
  type: output
  description: "Write bug reports and status updates for different audiences — developers, PMs, customers, and executives"
  tags: [bugs, communication, audiences, writing, advanced]

state: {}

trigger: |
  "ShopEngine" (e-commerce platform) has a critical bug:
  the checkout process silently drops coupon codes for orders over
  $500, causing customers to be charged full price. It's been
  happening for 2 weeks and affected ~3,000 orders totaling
  ~$45,000 in overcharges.

  You need to communicate about this bug to 5 different audiences.
  Each needs different information, detail level, and tone.

  Write the following:

  1. Engineering bug report (for the dev team fixing it):
     Include technical details, reproduction steps, affected code
     paths, and suggested fix approach.

  2. Product manager brief (for prioritization and roadmap impact):
     Focus on customer impact, business impact, timeline for fix,
     and whether this blocks other work.

  3. Customer support talking points (for agents handling complaints):
     What agents should say, what they shouldn't say, escalation
     criteria, and any temporary workarounds.

  4. Customer notification email (for affected customers):
     Acknowledge the issue, explain the impact, describe the
     remediation (refunds), and rebuild trust.

  5. Executive summary (for the CTO/CEO):
     One paragraph: what happened, impact, fix timeline, customer
     remediation plan, and what's being done to prevent recurrence.

  For each, explain the key differences in:
  - Level of technical detail
  - Tone and language
  - What to include vs. omit
  - Call to action

assertions:
  - type: llm_judge
    criteria: "Engineering report is technically detailed — includes reproduction steps, affected code path (coupon validation for orders >$500), and suggested fix approach"
    weight: 0.25
    description: "Technical engineering report"
  - type: llm_judge
    criteria: "Customer email is empathetic and action-oriented — acknowledges the overcharge, commits to specific refund process, and doesn't use technical jargon"
    weight: 0.25
    description: "Empathetic customer email"
  - type: llm_judge
    criteria: "Support talking points include what NOT to say — prevents agents from making promises about timelines, admitting negligence, or speculating about technical causes"
    weight: 0.25
    description: "Talking points with boundaries"
  - type: llm_judge
    criteria: "Executive summary is concise — one paragraph that covers impact ($45K overcharge), timeline, remediation, and prevention without technical details"
    weight: 0.25
    description: "Concise executive summary"
