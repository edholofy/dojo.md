meta:
  id: bug-prevention-program
  level: 3
  course: bug-report-triage
  type: output
  description: "Design a comprehensive bug prevention program including regression suites, feature flags, canary deployments, and bug bash events"
  tags: [bugs, prevention, quality, testing, advanced]

state: {}

trigger: |
  "DeployFast" (deployment platform SaaS) has a quality problem.
  Their bug escape rate is 36% (industry target: <20%), meaning
  over a third of bugs reach production despite QA efforts.

  Current state:
  - 60 bugs escape to production per quarter
  - No automated regression suite
  - Manual QA testing before each release (2 days)
  - No canary deployments — all releases go to 100% of users
  - No feature flags
  - No bug bash events
  - Deploys twice per week
  - Test environment has known differences from production

  The VP of Engineering says: "We're moving too fast and breaking
  things. I need a bug prevention strategy that doesn't slow us
  down."

  Tasks:

  1. Design the regression test strategy:
     - What types of tests should be automated first?
     - How do you decide which bugs to write regression tests for?
     - What's the target coverage, and how long to get there?
     - How do you maintain tests without slowing development?

  2. Design the deployment safety net:
     - Canary deployment strategy (what percentage, for how long?)
     - Feature flag rollout plan (what gets flagged?)
     - Rollback automation (when does it trigger?)
     - How do these work together?

  3. Design a quarterly bug bash program:
     - Who participates?
     - How long does each bug bash last?
     - What are the focus areas?
     - How do you incentivize participation?
     - What happens with the bugs found?

  4. Create the 6-month quality improvement roadmap:
     - Month 1-2: Quick wins
     - Month 3-4: Foundation
     - Month 5-6: Optimization
     Target: Bug escape rate from 36% to <20%

assertions:
  - type: llm_judge
    criteria: "Regression test prioritization is smart — prioritizes tests for critical paths, frequently-regressed areas, and past production bugs rather than trying to test everything"
    weight: 0.25
    description: "Smart regression prioritization"
  - type: llm_judge
    criteria: "Deployment safety net layers multiple strategies — canary catches performance issues, feature flags enable quick disable, rollback automation handles failures, working as defense-in-depth"
    weight: 0.25
    description: "Layered deployment safety"
  - type: llm_judge
    criteria: "Bug bash is well-structured — defines duration (typically 1-2 days), focus areas, cross-functional participation, and clear process for triaging found bugs"
    weight: 0.25
    description: "Well-structured bug bash"
  - type: llm_judge
    criteria: "Roadmap doesn't slow deployment — quick wins in months 1-2 include CI test automation and canary deployments that improve quality without reducing velocity"
    weight: 0.25
    description: "Quality without velocity loss"
