meta:
  id: triage-process-design
  level: 3
  course: bug-report-triage
  type: output
  description: "Design a complete bug triage process for a growing engineering organization with multiple teams and products"
  tags: [bugs, triage, process, organization, advanced]

state: {}

trigger: |
  "BuildStack" (developer platform, 4 products, 80 engineers across
  12 teams) has outgrown their informal triage process. What worked
  with 20 engineers doesn't work with 80.

  Current problems:
  - No consistent triage schedule across teams
  - Bugs ping-pong between teams ("not our bug")
  - Critical bugs sometimes sit unnoticed for days
  - No standard severity definitions (one team's "critical" is
    another team's "major")
  - Duplicate bugs across products waste investigation time
  - Average bug age in backlog: 4 months (growing)
  - Engineers spend 30% of triage time debating ownership

  Team structure:
  - Platform Core (API, authentication, infrastructure): 3 teams
  - Product A (CI/CD): 3 teams
  - Product B (Monitoring): 2 teams
  - Product C (Deployment): 2 teams
  - Product D (Security scanning): 2 teams

  Tasks:

  1. Design the unified triage process:
     - Severity and priority definitions (shared across all teams)
     - Triage cadence and meeting format
     - Ownership rules (how to decide which team owns a bug)
     - Cross-product bug handling (when bugs span products)
     - Escalation path for unresolved ownership disputes

  2. Design the triage rotation system:
     - How does the triage role rotate across teams?
     - What are the triage lead's responsibilities?
     - How much time should the triage lead spend daily?
     - How do you handle after-hours critical bugs?

  3. Address the ownership dispute problem:
     - Create a decision tree for bug ownership
     - What happens when no team claims a bug?
     - How do you handle bugs in shared code?

  4. How do you measure triage process health? Define 5-8 KPIs.

assertions:
  - type: llm_judge
    criteria: "Severity definitions are universal — provides clear, unambiguous definitions that all 12 teams agree on, eliminating the 'different standards' problem"
    weight: 0.25
    description: "Universal severity definitions"
  - type: llm_judge
    criteria: "Ownership decision tree is concrete — uses specific rules (error originates in, component affected, API surface) rather than subjective judgment"
    weight: 0.25
    description: "Concrete ownership rules"
  - type: llm_judge
    criteria: "Unclaimed bug process exists — defines a default owner or escalation path when no team claims a bug, preventing bugs from languishing"
    weight: 0.25
    description: "Unclaimed bug process"
  - type: llm_judge
    criteria: "KPIs measure process health — includes time-to-triage, ownership dispute rate, backlog age, cross-team bug count, and triage meeting efficiency"
    weight: 0.25
    description: "Process health KPIs"
