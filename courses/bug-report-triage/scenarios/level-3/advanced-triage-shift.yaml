meta:
  id: advanced-triage-shift
  level: 3
  course: bug-report-triage
  type: output
  description: "Handle a week of complex triage challenges including cross-team disputes, customer escalations, and process improvement"
  tags: [bugs, simulation, advanced, week-management, triage]

state: {}

trigger: |
  You're the senior triage engineer at "CloudPlatform" (cloud
  infrastructure SaaS, 3,000 customers). This week tests your
  judgment.

  Monday: Ownership dispute
  A critical bug was filed: "Database connections leak when using
  connection pooling with our SDK." The SDK team says "it's a
  platform issue — the connection pool is server-side." The Platform
  team says "it's an SDK issue — the SDK isn't releasing connections
  properly." Neither team wants to own it. The bug is 3 days old
  and the customer is escalating.

  Tuesday: Volume spike
  A security researcher publicly tweets about a vulnerability in
  your platform's authentication (without contacting you first).
  Within 2 hours, you receive 40 duplicate bug reports, 15 support
  tickets, and your CEO is asking for a statement.

  Wednesday: Process challenge
  Your team discovers that 30 bugs filed in the last month were
  actually duplicate reports of 8 underlying issues. The deduplication
  problem is wasting ~20 hours/month of engineering time.

  Thursday: Quality data
  You pull the monthly report: bug reopen rate has risen from 8%
  to 18%. Something is wrong with how bugs are being fixed or
  verified.

  Friday: Customer crisis
  An enterprise customer ($50K/mo) sends a list of 15 open bugs
  and says: "None of these have been addressed in 3 months. We're
  evaluating alternatives." Your CSM is panicking.

  Tasks:
  1. Monday: Resolve the ownership dispute. What's your decision
     and how do you enforce it?
  2. Tuesday: Handle the public vulnerability disclosure. Action
     plan for the first 2 hours.
  3. Wednesday: Propose a deduplication solution.
  4. Thursday: Investigate the reopen rate spike. What are your
     hypotheses and investigation plan?
  5. Friday: Create the customer recovery plan for the 15 open bugs.

assertions:
  - type: llm_judge
    criteria: "Ownership dispute is resolved decisively — assigns a temporary owner (likely Platform, as server-side), mandates joint investigation, and creates a process for future disputes"
    weight: 0.20
    description: "Decisive ownership resolution"
  - type: llm_judge
    criteria: "Public disclosure response is rapid and structured — includes immediate assessment, internal communication, public acknowledgment, and fix timeline within the first 2 hours"
    weight: 0.20
    description: "Rapid disclosure response"
  - type: llm_judge
    criteria: "Deduplication solution is practical — proposes improved search, similar-issue suggestions during filing, or weekly dedup review, not just 'be more careful'"
    weight: 0.20
    description: "Practical dedup solution"
  - type: llm_judge
    criteria: "Customer recovery prioritizes the 15 bugs — triages the list, commits to fixing the most impactful ones within specific timelines, and assigns a dedicated engineering resource"
    weight: 0.20
    description: "Customer bug prioritization"
  - type: llm_judge
    criteria: "Reopen rate investigation has hypotheses — considers insufficient testing, unclear acceptance criteria, incomplete fixes, or environmental differences as potential causes"
    weight: 0.20
    description: "Reopen rate hypotheses"
