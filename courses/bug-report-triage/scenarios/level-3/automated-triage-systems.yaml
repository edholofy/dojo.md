meta:
  id: automated-triage-systems
  level: 3
  course: bug-report-triage
  type: output
  description: "Design automated bug triage systems using integrations, rules engines, and AI-assisted classification"
  tags: [bugs, automation, triage, ai, advanced]

state: {}

trigger: |
  "CloudOps" (cloud operations platform, 500+ bugs filed/month)
  can't keep up with manual triage. The engineering director wants
  to automate as much of the triage process as possible.

  Current manual process:
  - 500+ bugs filed per month (from customers, QA, developers,
    monitoring)
  - 1 triage engineer spends 2 hours/day reviewing new bugs
  - Average time from filing to first triage decision: 18 hours
  - 25% of bugs are duplicates (discovered too late)
  - 15% of bugs are misclassified (wrong severity or team)
  - 10% are feature requests filed as bugs

  Available tools:
  - Bug tracker: Jira
  - Error monitoring: Sentry
  - Customer support: Zendesk
  - Alerting: PagerDuty
  - CI/CD: GitHub Actions
  - Communication: Slack

  Tasks:

  1. Design the automated triage pipeline:
     - Stage 1: Auto-classification (how?)
     - Stage 2: Duplicate detection (how?)
     - Stage 3: Routing (rules for assigning to teams)
     - Stage 4: Priority assignment (what signals?)
     - Stage 5: Escalation triggers (what conditions?)
     What stays manual vs. what can be automated?

  2. Design the Sentry → Jira integration:
     - What Sentry events should auto-create Jira tickets?
     - What data should flow into the Jira ticket?
     - How do you prevent alert fatigue from noisy errors?
     - How do you handle Sentry grouping for duplicate detection?

  3. Design the AI-assisted triage rules:
     - What patterns can ML detect in bug reports?
     - How would you classify bugs vs. feature requests automatically?
     - What confidence threshold before auto-assigning vs. human review?

  4. What metrics prove the automation is working? How do you
     measure improvement over the manual process?

assertions:
  - type: llm_judge
    criteria: "Pipeline has clear automation vs. manual split — auto-classifies obvious patterns and routes clearly-owned bugs, but keeps human review for ambiguous cases and high-severity issues"
    weight: 0.25
    description: "Clear automation-manual split"
  - type: llm_judge
    criteria: "Sentry integration includes noise reduction — addresses alert fatigue with thresholds, grouping, snoozing, and severity-based filtering to prevent ticket floods"
    weight: 0.25
    description: "Noise-reduced Sentry integration"
  - type: llm_judge
    criteria: "AI classification includes confidence thresholds — doesn't blindly auto-assign, uses confidence levels to determine when automation acts vs. when humans review"
    weight: 0.25
    description: "Confidence-threshold AI classification"
  - type: llm_judge
    criteria: "Success metrics compare to baseline — measures reduction in triage time (from 18h), duplicate rate (from 25%), misclassification rate (from 15%), and triage engineer time (from 2h/day)"
    weight: 0.25
    description: "Baseline-compared metrics"
