meta:
  id: bug-triage-data-analysis
  level: 3
  course: bug-report-triage
  type: output
  description: "Analyze bug data to identify patterns, predict quality trends, and inform engineering investments"
  tags: [bugs, data, analysis, patterns, advanced]

state: {}

trigger: |
  "AppBuilder" (low-code platform) has 18 months of bug data.
  The Head of Engineering wants insights to guide next quarter's
  quality investments. Here's the data:

  Bug filing trends (monthly averages):
  - Jan-Jun 2025: 45 bugs/month
  - Jul-Dec 2025: 72 bugs/month (60% increase)
  - Jan 2026: 85 bugs

  By component:
  - Form Builder: 30% of all bugs (most complex component)
  - Workflow Engine: 25% (most critical component)
  - API Gateway: 15% (least bugs but highest severity)
  - Dashboard: 20% (most cosmetic bugs)
  - Authentication: 10% (most security-related bugs)

  By source:
  - Customer-reported: 55% (increasing)
  - QA-found: 25% (decreasing)
  - Engineering-found: 15% (stable)
  - Monitoring-detected: 5% (increasing)

  By severity over time:
  - Critical bugs: 5 → 8 → 12 (growing)
  - Major bugs: 15 → 22 → 28 (growing)
  - Minor bugs: 20 → 35 → 38 (growing)
  - Trivial bugs: 5 → 7 → 7 (stable)

  Resolution metrics:
  - Average resolution time: 12 days → 18 days (increasing)
  - Bug reopen rate: 8% → 15% (increasing)
  - Bugs closed "won't fix": 5% → 12% (increasing)

  Tasks:

  1. What are the 3 most important insights from this data?
     What story does the data tell about the product's quality
     trajectory?

  2. The customer-reported percentage is increasing while QA-found
     is decreasing. What does this mean, and why is it a problem?

  3. Based on the data, what should the engineering team invest in
     next quarter? Recommend 3 specific quality investments with
     data-backed justification.

  4. Create the quarterly "Quality Health Report" for the Head of
     Engineering with visualizations described.

assertions:
  - type: llm_judge
    criteria: "Quality trajectory is identified as declining — growing bug count, increasing resolution time, and increasing reopen rate all point to deteriorating quality"
    weight: 0.25
    description: "Declining quality trajectory"
  - type: llm_judge
    criteria: "Customer vs QA shift is flagged — recognizes that customers finding more bugs and QA finding fewer means QA coverage is declining or product complexity is outpacing testing"
    weight: 0.25
    description: "QA coverage gap flagged"
  - type: llm_judge
    criteria: "Investment recommendations are data-backed — points to specific components (Workflow Engine severity, Form Builder volume) and specific problems (reopen rate, resolution time)"
    weight: 0.25
    description: "Data-backed investments"
  - type: llm_judge
    criteria: "Quality report includes trend visualizations — describes charts for bug trend lines, component breakdown, severity distribution, and resolution time over time"
    weight: 0.25
    description: "Trend visualization report"
