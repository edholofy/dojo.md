meta:
  id: customer-facing-bug-management
  level: 3
  course: bug-report-triage
  type: output
  description: "Manage customer-reported bugs through the full lifecycle — from intake through resolution to satisfaction follow-up"
  tags: [bugs, customer, lifecycle, communication, advanced]

state: {}

trigger: |
  "StorageCloud" (cloud storage SaaS, 5,000 customers) receives
  ~200 customer-reported bugs per month through support channels.
  The current process is broken:

  - Customers report bugs via support tickets
  - Support creates Jira tickets (sometimes, inconsistently)
  - Engineering may or may not see the Jira ticket
  - Customers rarely hear back about their bug
  - Average time from customer report to fix: 45 days
  - Customer satisfaction with bug resolution: 2.1/5

  The VP of Customer Success says: "Our customers feel like their
  bug reports go into a black hole. Fix the experience."

  Tasks:

  1. Design the end-to-end customer bug lifecycle:
     - Intake: How bugs are received and acknowledged
     - Triage: How they're prioritized and routed
     - Investigation: How engineering assesses them
     - Communication: How customers are updated
     - Resolution: How fixes are verified and deployed
     - Follow-up: How you close the loop with the customer
     Include SLAs for each stage.

  2. Design the communication touchpoints:
     - Acknowledgment (timing and content)
     - Investigation update (when something is learned)
     - Fix scheduled (when it's in a sprint)
     - Fix deployed (when it's in production)
     - Follow-up (post-resolution check-in)
     Write template messages for each touchpoint.

  3. How do you handle the difficult scenarios:
     - Customer reports a bug you already know about (backlogged
       for 3 months)
     - Customer reports a bug you've decided not to fix
     - Customer's "bug" is actually a feature request
     - Customer's "bug" is actually user error

  4. How do you measure customer satisfaction with bug resolution?
     Design the measurement approach.

assertions:
  - type: llm_judge
    criteria: "Lifecycle has defined SLAs at each stage — not just 'as soon as possible' but specific timeframes for acknowledgment (hours), triage (1 day), investigation (3 days), etc."
    weight: 0.25
    description: "SLAs at each stage"
  - type: llm_judge
    criteria: "Backlogged bug communication is honest — tells the customer their bug is known and queued, gives realistic timeline, doesn't pretend it's a new discovery"
    weight: 0.25
    description: "Honest backlog communication"
  - type: llm_judge
    criteria: "User error handling is respectful — doesn't say 'that's not a bug, you're using it wrong' but guides the customer to the correct approach while keeping them engaged"
    weight: 0.25
    description: "Respectful user error handling"
  - type: llm_judge
    criteria: "Satisfaction measurement goes beyond CSAT — includes resolution time tracking, follow-up surveys, repeat report rates, and correlation with overall NPS"
    weight: 0.25
    description: "Comprehensive satisfaction measurement"
