meta:
  id: customer-trust-recovery
  level: 4
  course: bug-report-triage
  type: output
  description: "Rebuild customer trust after a series of quality failures that have damaged the product's reputation"
  tags: [bugs, customer-trust, reputation, recovery, expert]

state: {}

trigger: |
  "ReportEngine" (business intelligence SaaS, $80M ARR) has had a
  terrible 6 months. Three major incidents have eroded customer trust:

  Incident 1 (3 months ago): Data loss event
  - A deployment bug deleted 48 hours of customer data
  - 500 accounts affected
  - Data recovered from backups but customers lost work
  - NPS dropped from +40 to +22

  Incident 2 (6 weeks ago): Report accuracy bug
  - Financial reports showed incorrect totals for 2 weeks
  - 200 accounts affected
  - Some customers submitted incorrect reports to regulators
  - Class action discussion on customer forums

  Incident 3 (last week): 8-hour outage
  - Complete platform unavailability during business hours
  - All 3,000 customers affected
  - Customer forum filled with "I'm leaving" posts
  - NPS dropped to +8

  Customer fallout:
  - 45 accounts have downgraded plans
  - 12 enterprise accounts are "at risk" per the CS team
  - 150 open bugs from frustrated customers
  - G2 rating dropped from 4.5 to 3.8 stars
  - CFO estimates $4M ARR at risk from potential churn

  The CEO asks: "How do we rebuild trust through our bug handling
  and quality processes?"

  Tasks:

  1. Design the customer trust recovery program:
     - Immediate actions (this week)
     - Short-term (next 30 days)
     - Medium-term (next 90 days)
     - Long-term (next 6 months)

  2. For the 150 open bugs from frustrated customers:
     - How do you triage and prioritize this special backlog?
     - What SLAs do you commit to?
     - How do you communicate progress?

  3. Design the public transparency initiative:
     - Status page improvements
     - Public incident reports
     - Public quality metrics dashboard
     - Customer advisory board for quality

  4. Write the CEO's "letter to customers" addressing the quality
     failures and committing to improvement.

assertions:
  - type: llm_judge
    criteria: "Recovery program is phased — immediate actions show urgency (this week), while longer phases build systemic improvements, not just PR gestures"
    weight: 0.25
    description: "Phased recovery program"
  - type: llm_judge
    criteria: "150-bug backlog gets special treatment — dedicated engineering team, accelerated SLAs, and personal communication for each reporter, not just normal backlog processing"
    weight: 0.25
    description: "Special backlog treatment"
  - type: llm_judge
    criteria: "Transparency initiative goes beyond status page — includes public incident reports, measurable quality commitments, and customer advisory board participation"
    weight: 0.25
    description: "Substantive transparency"
  - type: llm_judge
    criteria: "CEO letter is authentic — acknowledges failures specifically, takes responsibility without excuses, and makes concrete commitments with timelines"
    weight: 0.25
    description: "Authentic CEO letter"
