meta:
  id: production-reliability-program
  level: 4
  course: bug-report-triage
  type: output
  description: "Design a comprehensive production reliability program that reduces bug escape rate, improves detection speed, and establishes SLOs/SLIs across the organization"
  tags: [bugs, reliability, SLO, SLI, production, expert]

state: {}

trigger: |
  "CloudSync" (file sync and collaboration platform, $200M ARR, 300
  engineers, 50,000 business customers) has reliability problems that
  are becoming a competitive disadvantage.

  Current reliability metrics:
  - Uptime: 99.5% (competitors average 99.95%)
  - Bug escape rate: 28% (bugs found in production vs. pre-production)
  - Mean time to detect (MTTD): 45 minutes
  - Mean time to resolve (MTTR): 4 hours
  - Incidents per month: 12 (3 customer-facing)
  - Change failure rate: 18%
  - Deployment frequency: Weekly (competitors deploy daily)

  Customer impact:
  - Enterprise customers require 99.99% SLA (you can't offer it)
  - Lost 3 enterprise deals last quarter due to reliability concerns
  - Customer trust survey: 62% confident in reliability (target: 85%)

  The CTO says: "We need a reliability program that makes us best-in-
  class within 12 months. I want to offer 99.99% SLA with confidence."

  Tasks:

  1. Design the SLO/SLI framework:
     - What SLIs do you measure? (availability, latency, durability,
       correctness)
     - What SLOs do you set for each tier (free, business, enterprise)?
     - How do you track and alert on error budgets?
     - How do error budgets influence development velocity?

  2. Design the production readiness program:
     - Pre-deployment checklist (what must pass before shipping?)
     - Canary deployment strategy
     - Feature flag rollout procedures
     - Automated rollback triggers
     - Load testing requirements

  3. Design the incident detection and response improvements:
     - How do you get MTTD from 45 min to under 5 min?
     - How do you get MTTR from 4 hours to under 30 min?
     - On-call structure and escalation paths
     - Incident classification and response playbooks

  4. How do you get from weekly to daily deployments while IMPROVING
     reliability? Most teams think faster = riskier. Prove otherwise.

assertions:
  - type: llm_judge
    criteria: "SLO framework is tiered — different tiers get different SLOs (e.g., enterprise 99.99%, business 99.95%, free 99.9%), with SLIs covering availability, latency, durability, and correctness"
    weight: 0.25
    description: "Tiered SLO framework"
  - type: llm_judge
    criteria: "Error budgets drive decisions — explains how consuming error budget slows feature development and triggers reliability investment, creating a self-correcting system"
    weight: 0.25
    description: "Error budget governance"
  - type: llm_judge
    criteria: "Detection improvement is specific — proposes synthetic monitoring, anomaly detection, distributed tracing, and customer-facing error tracking to get MTTD under 5 minutes"
    weight: 0.25
    description: "Specific detection improvements"
  - type: llm_judge
    criteria: "Faster deployments improve reliability — explains that smaller, more frequent deployments reduce blast radius, make rollbacks easier, and that CI/CD automation catches issues earlier"
    weight: 0.25
    description: "Velocity improves reliability"
