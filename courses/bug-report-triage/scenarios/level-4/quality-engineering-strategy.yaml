meta:
  id: quality-engineering-strategy
  level: 4
  course: bug-report-triage
  type: output
  description: "Design an organization-wide quality engineering strategy that reduces bug rates, improves detection, and builds quality into the development process"
  tags: [bugs, quality, strategy, engineering, expert]

state: {}

trigger: |
  "ScalePlatform" ($150M ARR, 200 engineers, 8 products) has a
  quality crisis. The CEO says: "We ship too many bugs. Our
  competitors are more reliable. Fix this."

  Current state:
  - Bug escape rate: 38% (industry target: <15%)
  - Customer-reported bugs: 400/month (growing 15% QoQ)
  - Mean time to detect production bugs: 6 hours
  - Mean time to resolve: 14 days
  - Regression rate: 22% (bugs that reappear after fix)
  - Test coverage: 45% (inconsistent across teams)
  - No dedicated QA team (developers test their own code)
  - No formal code review standards
  - CI runs take 45 minutes (developers skip them)

  Budget: $2M for quality improvement over 12 months

  Tasks:

  1. Diagnose the root causes of the quality crisis. What are the
     top 5 systemic issues, and how do they compound?

  2. Design the 12-month quality transformation:
     - Month 1-3: Foundations (what changes first?)
     - Month 4-6: Scale (what automation?)
     - Month 7-9: Optimize (what measurement?)
     - Month 10-12: Excellence (what culture?)
     Include headcount, tooling, and process changes.

  3. Allocate the $2M budget across:
     - People (hiring, training)
     - Tools (testing, monitoring, CI/CD)
     - Process (code review, triage, postmortems)
     Justify each allocation.

  4. How do you measure success? Define the KPIs and targets at
     6-month and 12-month milestones.

assertions:
  - type: llm_judge
    criteria: "Diagnosis identifies compounding issues — connects slow CI (developers skip) to low coverage to high escape rate to customer-reported bugs in a causal chain"
    weight: 0.25
    description: "Compounding issues identified"
  - type: llm_judge
    criteria: "Transformation starts with CI speed — if CI takes 45 minutes and devs skip it, nothing else works until CI is fast and reliable"
    weight: 0.25
    description: "CI speed prioritized"
  - type: llm_judge
    criteria: "Budget allocation is justified — each investment area has clear expected ROI, with people and tools balanced against process improvement"
    weight: 0.25
    description: "Justified budget allocation"
  - type: llm_judge
    criteria: "Success KPIs are specific — targets escape rate reduction (38%→15%), MTTD reduction (6h→30min), and resolution time reduction (14d→5d) at each milestone"
    weight: 0.25
    description: "Specific success KPIs"
