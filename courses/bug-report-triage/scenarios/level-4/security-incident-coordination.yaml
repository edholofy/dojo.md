meta:
  id: security-incident-coordination
  level: 4
  course: bug-report-triage
  type: output
  description: "Coordinate response to a critical security vulnerability from discovery through patching, disclosure, and customer communication"
  tags: [bugs, security, incident, coordination, expert]

state: {}

trigger: |
  "AuthGuard" (identity and access management SaaS, 2,000 enterprise
  customers) just discovered a critical authentication bypass
  vulnerability.

  Discovery:
  A security researcher reported via your bug bounty program that
  a specific sequence of API calls can bypass MFA and gain access
  to any account. The researcher:
  - Has proof of concept (working exploit)
  - Is requesting $50K bounty (your max is $25K)
  - Has agreed to a 90-day embargo
  - Asks: "When will this be patched?"

  Vulnerability assessment:
  - CVSS 9.8 (Critical)
  - No evidence of active exploitation (yet)
  - Affects all customers using MFA (85% of customer base)
  - Fix estimated at 5-7 engineering days
  - No workaround available
  - Requires coordinated deployment across all instances

  Stakeholders who need to be involved:
  - Security team (fix the vulnerability)
  - Engineering leadership (resource allocation)
  - Legal (disclosure obligations, bounty agreement)
  - Customer Success (customer communication)
  - Marketing/PR (public disclosure preparation)
  - Executive team (business risk assessment)

  Tasks:

  1. Design the incident response plan:
     - Day 1-3: What happens immediately?
     - Day 4-10: Fix development and testing
     - Day 11-14: Deployment and verification
     - Day 15-90: Embargo period management
     - Day 90+: Public disclosure

  2. Handle the bounty negotiation:
     - The researcher wants $50K, your max is $25K
     - How do you negotiate?
     - What's the risk of not paying fairly?
     - Write the response to the researcher

  3. Write the customer advisory that will go out post-patch:
     - What do you disclose?
     - What do you NOT disclose?
     - How do you balance transparency with security?

  4. What process improvements should be made post-incident?
     The fact that MFA bypass was possible is itself a design flaw.

assertions:
  - type: llm_judge
    criteria: "Incident response is structured by phase — immediate containment, fix development, testing, deployment, and disclosure are clearly separated with actions for each"
    weight: 0.25
    description: "Phased incident response"
  - type: llm_judge
    criteria: "Bounty negotiation is fair and strategic — proposes a reasonable counter-offer or exception process, understanding that underpaying risks the researcher going public early"
    weight: 0.25
    description: "Fair bounty negotiation"
  - type: llm_judge
    criteria: "Customer advisory balances transparency and security — discloses enough for customers to understand the risk without providing exploit details that could help attackers"
    weight: 0.25
    description: "Balanced customer advisory"
  - type: llm_judge
    criteria: "Process improvements address the design flaw — goes beyond patching to recommend MFA architecture review, security audit program, and threat modeling"
    weight: 0.25
    description: "Design-level improvements"
