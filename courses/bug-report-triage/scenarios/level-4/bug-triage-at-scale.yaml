meta:
  id: bug-triage-at-scale
  level: 4
  course: bug-report-triage
  type: output
  description: "Manage bug triage operations at massive scale — 2,000+ bugs/month across multiple products, teams, and geographies"
  tags: [bugs, scale, operations, management, expert]

state: {}

trigger: |
  "MegaSoft" ($500M ARR, 500 engineers, 12 products, 3 time zones)
  processes 2,000+ bugs per month. The current triage system is
  buckling under the load.

  Current state:
  - 2,000 bugs filed monthly (from customers, QA, monitoring, engineering)
  - 30% are duplicates (identified too late)
  - 15% are feature requests misfiled as bugs
  - Average triage time: 3 days
  - 12 different Jira projects with inconsistent workflows
  - 4 different severity taxonomies across products
  - No centralized triage — each product manages its own
  - Cross-product bugs average 8 days to reach the right team
  - Triage meetings consume 40 hours/week of senior engineer time

  CEO mandate: "Triage should take hours, not days. 90% of bugs
  should be routed correctly on first assignment."

  Tasks:

  1. Design the centralized triage operating model:
     - Organizational structure (who does triage?)
     - Technology platform (unified Jira, routing rules)
     - Standardized taxonomy (severity, priority, categories)
     - First-pass vs. deep-triage workflow
     - SLAs for triage decisions

  2. Build the intelligent routing system:
     - Auto-routing rules based on component, keyword, reporter
     - Confidence-based assignment (auto vs. human)
     - Cross-product bug detection and routing
     - Feedback loop to improve routing accuracy
     Target: 90% correct first-assignment

  3. Design the efficiency improvements:
     - How do you reduce the 30% duplicate rate?
     - How do you catch the 15% misfiled feature requests?
     - How do you cut the 40 hours/week of meeting time?
     - How do you reduce cross-product routing from 8 days?

  4. What's the ROI of the centralized triage system? Calculate
     engineering hours saved.

assertions:
  - type: llm_judge
    criteria: "Operating model has dedicated triage team — proposes a central triage function rather than expecting each product team to manage its own, reducing the 40h/week burden"
    weight: 0.25
    description: "Dedicated triage function"
  - type: llm_judge
    criteria: "Routing system uses multiple signals — combines component tags, keyword matching, historical patterns, and reporter identity for intelligent auto-routing"
    weight: 0.25
    description: "Multi-signal routing"
  - type: llm_judge
    criteria: "Duplicate reduction is systematic — proposes real-time similar-issue search during filing, automated dedup detection, and periodic dedup sweeps"
    weight: 0.25
    description: "Systematic duplicate reduction"
  - type: llm_judge
    criteria: "ROI is quantified — calculates engineering hours saved from deduplication, faster routing, reduced meeting time, and multiplies by loaded engineer cost"
    weight: 0.25
    description: "Quantified ROI"
