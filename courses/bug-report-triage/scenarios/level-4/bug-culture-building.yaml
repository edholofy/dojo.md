meta:
  id: bug-culture-building
  level: 4
  course: bug-report-triage
  type: output
  description: "Build an engineering culture that prioritizes quality, treats bugs as learning opportunities, and embeds quality into every development practice"
  tags: [bugs, culture, quality, engineering, expert]

state: {}

trigger: |
  "DevScale" (developer tools, 150 engineers) has a cultural problem
  with bugs. Common attitudes include:

  - "Bugs are QA's problem, not mine"
  - "We don't have time for testing, we need to ship features"
  - "Bug fixes aren't valued in performance reviews"
  - "Postmortems feel like blame sessions"
  - "The bug backlog is someone else's responsibility"

  The CTO says: "Quality isn't a department. It's a mindset. I need
  every engineer to own quality, not just the triage team."

  Current cultural indicators:
  - Developers write tests for only 30% of new code
  - Bug fix PRs get fewer code reviews than feature PRs
  - Postmortem attendance averages 4 people (should be 15+)
  - Zero engineers volunteered for the last bug bash
  - "Bug duty" rotation is seen as punishment

  Tasks:

  1. Diagnose the cultural issues: What's causing these attitudes?
     Why do engineers see bugs as someone else's problem?

  2. Design the cultural transformation program:
     - How do you make quality part of the engineering identity?
     - How do you make bug fixing valued (performance reviews,
       recognition)?
     - How do you make postmortems useful and blameless?
     - How do you make triage rotation desirable?

  3. Design 5 specific initiatives:
     - A recognition program for quality contributions
     - A blameless postmortem format
     - An engaging bug bash format
     - A code review standard that catches bugs
     - A "quality champion" program

  4. How do you measure cultural change? What leading indicators
     show the culture is shifting before the bug metrics improve?

assertions:
  - type: llm_judge
    criteria: "Cultural diagnosis identifies systemic causes — connects bug attitudes to incentive structures (features rewarded, quality not), process design (postmortems feel blaming), and lack of ownership"
    weight: 0.25
    description: "Systemic cultural diagnosis"
  - type: llm_judge
    criteria: "Performance review integration is specific — proposes adding quality metrics (test coverage, bug fix contributions, postmortem participation) to engineering performance evaluation"
    weight: 0.25
    description: "Performance review integration"
  - type: llm_judge
    criteria: "Blameless postmortem format is concrete — describes a specific meeting structure with ground rules, facilitator role, timeline reconstruction, and action-focused outcome"
    weight: 0.25
    description: "Concrete postmortem format"
  - type: llm_judge
    criteria: "Leading indicators measure culture before metrics — tracks behaviors like test coverage adoption, postmortem attendance, bug bash participation, and code review thoroughness"
    weight: 0.25
    description: "Leading cultural indicators"
