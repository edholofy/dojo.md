meta:
  id: technical-debt-triage
  level: 4
  course: bug-report-triage
  type: output
  description: "Manage the intersection of technical debt and bug triage — prioritize debt reduction that prevents bugs, budget debt work against feature development, and communicate debt impact to business stakeholders"
  tags: [bugs, technical-debt, prioritization, business, expert]

state: {}

trigger: |
  "FinTrack" (financial planning SaaS, $120M ARR, 180 engineers) has a
  growing technical debt problem that's directly causing bugs.

  Debt analysis (from recent engineering survey):
  - 40% of production bugs trace back to 3 legacy subsystems
  - The payment processing module hasn't been refactored in 5 years
    and causes 8 incidents/month
  - Test coverage on legacy code averages 15% vs. 75% on new code
  - 30% of engineering time is spent on "bug whack-a-mole" in debt areas
  - Onboarding new engineers takes 3 months (1 month in low-debt areas)
  - Developers avoid working on legacy modules, creating knowledge silos

  The CFO asks: "Engineering wants $3M to 'pay down technical debt.'
  What does that actually mean? How do I know it's worth it?"

  The VP Engineering says: "We can't keep patching bugs in rotten code.
  Every fix introduces two new bugs. We need to refactor."

  Tasks:

  1. Build the technical debt inventory and scoring model:
     - How do you identify and catalog technical debt?
     - How do you score debt items by bug-generation potential?
     - How do you connect debt to business outcomes (incidents, velocity,
       retention)?

  2. Design the debt reduction strategy:
     - Which of the 3 legacy subsystems do you tackle first? Why?
     - How do you phase the work to deliver value incrementally?
     - How much engineering capacity do you allocate (debt vs. features)?
     - How do you prevent new debt while paying down old debt?

  3. Build the business case for the CFO:
     - Translate debt into financial terms (cost of bugs, engineer time,
       customer churn)
     - Calculate the ROI of the $3M investment
     - What metrics prove the investment is working?

  4. How do you change the triage process to account for debt?
     When a bug comes in from a high-debt area, how does that change
     your fix-vs-refactor decision?

assertions:
  - type: llm_judge
    criteria: "Debt scoring connects to bugs — proposes a model that scores debt items by bug generation rate, incident frequency, fix complexity, and blast radius"
    weight: 0.25
    description: "Bug-connected debt scoring"
  - type: llm_judge
    criteria: "Business case uses financial language — translates debt into dollars (engineer hours wasted, customer churn cost, incident response cost) and calculates ROI of the $3M investment"
    weight: 0.25
    description: "Financial business case"
  - type: llm_judge
    criteria: "Capacity allocation is specific — proposes a percentage split (e.g., 20-30% for debt reduction) with rules for when to increase or decrease based on incident rates"
    weight: 0.25
    description: "Specific capacity allocation"
  - type: llm_judge
    criteria: "Triage process adapts for debt — proposes a fix-vs-refactor decision framework where repeated bugs in high-debt areas trigger refactoring instead of point fixes"
    weight: 0.25
    description: "Adaptive triage for debt"
