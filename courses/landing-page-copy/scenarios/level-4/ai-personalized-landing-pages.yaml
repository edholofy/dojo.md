meta:
  id: ai-personalized-landing-pages
  level: 4
  course: landing-page-copy
  type: output
  description: "Use AI to generate and personalize landing page copy at scale"
  tags: [landing-pages, ai, personalization, dynamic-content, expert]

state: {}

trigger: |
  AI is transforming landing page copy creation. In 2026, AI can generate
  copy variations, personalize messaging in real-time, and optimize through
  automated testing. But AI-generated copy still requires strategic oversight
  and quality control.

  You're the Head of Growth at a B2B SaaS company with 200 landing pages
  across 15 product lines and 8 industry verticals.

  Design the AI-powered landing page system:

  1. AI copy generation workflow:
     - How to use AI to generate headline variations (prompt engineering)
     - Write 5 prompts that produce high-quality headline variations
     - Quality control: how to evaluate AI-generated copy
     - AI-generated vs human-written: where AI excels and where it fails
     - Editorial guidelines for AI copy review

  2. Dynamic personalization engine:
     - Real-time copy personalization based on:
       a) Traffic source (Google Ads vs LinkedIn vs email)
       b) Industry (detected from company domain or IP)
       c) Company size (SMB vs enterprise messaging)
       d) Behavioral signals (returning visitor, pages viewed)
     - Write copy variants for each personalization dimension
     - Technical architecture: how personalization works without
       impacting page speed

  3. Automated copy testing:
     - Multi-armed bandit vs traditional A/B testing for AI optimization
     - How AI can generate and test hundreds of copy variations
     - Setting guardrails: what AI can change vs what requires human approval
     - Convergence: when the AI has found the optimal copy

  4. Scale management:
     - Maintaining brand voice across 200 AI-influenced pages
     - AI copy style guide: rules and constraints for the AI
     - Governance: approval workflows for AI-generated content
     - Version control: tracking what's live on each page

  5. Ethical and practical concerns:
     - When AI-generated copy misleads or overpromises
     - Disclosure: should visitors know the copy is AI-generated?
     - Quality degradation risks at scale
     - Human oversight requirements

  6. Measuring AI copy performance:
     - AI-generated vs human-written conversion rates
     - Cost per landing page: AI vs human creation
     - Quality metrics beyond conversion (brand perception, trust)
     - When to pull back from AI and invest in human copywriting

assertions:
  - type: llm_judge
    criteria: "The AI prompts are well-engineered — include context, constraints, target audience, and tone specifications that produce usable headline variations, not generic output"
    weight: 0.25
    description: "Well-engineered AI prompts"
  - type: llm_judge
    criteria: "The personalization dimensions are practical — industry detection, traffic source matching, and company size messaging are realistic personalization layers that create genuine relevance"
    weight: 0.25
    description: "Practical personalization dimensions"
  - type: llm_judge
    criteria: "Guardrails are clearly defined — specifies what the AI can change independently (headline variations, CTA text) vs what requires human review (claims, pricing, legal content)"
    weight: 0.25
    description: "Clearly defined AI guardrails"
  - type: llm_judge
    criteria: "The ethical concerns are substantive — addresses real risks of AI copy at scale (quality degradation, misleading claims, brand consistency) rather than generic AI ethics"
    weight: 0.25
    description: "Substantive ethical concerns"
