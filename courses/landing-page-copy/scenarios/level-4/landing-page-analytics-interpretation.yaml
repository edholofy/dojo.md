meta:
  id: landing-page-analytics-interpretation
  level: 4
  course: landing-page-copy
  type: output
  description: "Interpret landing page analytics data to drive copy optimization decisions"
  tags: [landing-pages, analytics, data-interpretation, optimization, expert]

state: {}

trigger: |
  Data tells you WHERE to optimize; copy expertise tells you HOW. Most
  teams look at conversion rate alone, but behavioral data (scroll depth,
  click maps, session recordings) reveals exactly which copy elements
  are working and which are failing.

  You have comprehensive analytics data for a SaaS landing page.
  Product: ReportBuilder — automated reporting tool for agencies
  Goal: Free trial signup
  Traffic: 12,000 visits/month

  Analytics data:

  Conversion rate: 1.9% (industry avg: 3.5%)
  Bounce rate: 68%
  Average time on page: 1:42

  Scroll depth data:
  - 100% see hero section
  - 72% scroll past hero
  - 48% reach features section
  - 31% reach testimonials section
  - 18% reach pricing section
  - 12% reach final CTA

  Click map data:
  - Hero CTA: 2.3% click rate
  - Features section CTA: 0.8% click rate
  - Final CTA: 1.1% click rate
  - Navigation links: 8.4% click rate (leaving the page!)
  - "Watch Demo" link: 5.2% click rate

  Session recording insights:
  - Many visitors pause at the features section (dense text grid)
  - Some visitors scroll back up to re-read the headline
  - Most who reach testimonials continue to the CTA
  - Several visitors click the logo (goes to homepage)

  Interpret this data and provide copy optimization recommendations:

  1. Data interpretation:
     - What each data point tells you about copy performance
     - The biggest copy problem (supported by data)
     - What's working (supported by data)
     - Where visitors are dropping off and why

  2. Priority optimizations (ranked by expected impact):
     For each recommendation:
     - What the data says
     - What the copy change should be
     - Expected conversion lift
     - How to measure the improvement

  3. Heatmap and scroll depth action plan:
     - Why 52% drop off before features (hero isn't compelling enough)
     - Why 82% never see the final CTA (page too long or copy too dense)
     - How to improve scroll continuation
     - Where to add CTAs based on scroll data

  4. The navigation problem:
     - 8.4% clicking navigation links = exits
     - Recommendation: remove or minimize navigation
     - Expected conversion lift from navigation removal

  5. Testing plan based on data insights:
     - 3 data-driven tests to run first
     - How to validate hypotheses from analytics data
     - What additional data to collect

assertions:
  - type: llm_judge
    criteria: "The data interpretation correctly identifies the hero-to-features drop-off as the biggest problem — 28% of visitors leave between hero and features, indicating the hero fails to motivate further reading"
    weight: 0.25
    description: "Correctly identified key drop-off problem"
  - type: llm_judge
    criteria: "The navigation link insight is correctly prioritized — 8.4% click rate on navigation vs 2.3% on the CTA means more people are leaving than converting, and removing navigation should be a top recommendation"
    weight: 0.25
    description: "Correctly prioritized navigation removal"
  - type: llm_judge
    criteria: "Each recommendation is directly supported by data — not generic CRO advice but specific changes driven by the scroll depth, click map, and session recording evidence"
    weight: 0.25
    description: "Data-supported recommendations"
  - type: llm_judge
    criteria: "The positive signal is recognized — visitors who reach testimonials tend to continue to the CTA, suggesting testimonials are effective and should be moved earlier in the page"
    weight: 0.25
    description: "Recognized positive testimonial signal"
