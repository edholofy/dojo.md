meta:
  id: micro-copy-optimization
  level: 4
  course: landing-page-copy
  type: output
  description: "Optimize micro-copy elements that have outsized impact on conversion"
  tags: [landing-pages, micro-copy, ux-writing, details, expert]

state: {}

trigger: |
  Micro-copy — the small text elements like button labels, tooltips, error
  messages, placeholder text, and privacy assurances — often has the highest
  ROI of any copy optimization. A single word change in a CTA can lift
  conversions by 10-30%.

  You're doing a micro-copy audit and optimization for a SaaS signup flow.
  Product: ScheduleKit — appointment scheduling for small businesses
  Current conversion rate from page visit to completed signup: 3.8%

  Optimize every micro-copy element:

  1. Form micro-copy:
     - Field labels: "Email Address" vs "Work Email" vs "Your best email"
     - Placeholder text: what goes inside each field
     - Help text: when to show tooltips and what they say
     - Inline validation messages: success, error, and warning states
     - Password requirements: how to display without being overwhelming
     - Auto-suggest text: "Did you mean @gmail.com?"
     - Write all versions and recommend the best for each

  2. Button and CTA micro-copy:
     - Primary CTA: test 5 variations for "Start Free Trial"
     - Secondary CTA: "Already have an account? Log in"
     - Ghost button: "See Plans" or "Compare Features"
     - Button state changes: loading ("Setting up your account..."),
       success ("You're in!"), error ("Something went wrong — try again")

  3. Trust micro-copy near conversion points:
     - Below CTA: "No credit card required. Setup in 2 minutes."
     - Near form: "We'll never share your information"
     - Security badges: "256-bit SSL encrypted" — does this actually help?
     - Privacy link: "Read our Privacy Policy" positioning

  4. Progress and feedback micro-copy:
     - Multi-step form progress indicators
     - "Step 2 of 3 — Almost there!"
     - Loading states: "Creating your workspace..."
     - Empty states: what to show on first login with no data

  5. Error and recovery micro-copy:
     - 404 page copy
     - Form validation errors (specific, helpful, human)
     - Session timeout message
     - Payment failure recovery
     - "Sorry" vs "Oops" vs direct language — what's appropriate for B2B?

  6. Onboarding micro-copy (first 60 seconds):
     - Welcome message after signup
     - First-time tooltips guiding setup
     - Empty state CTAs ("Create your first event type")
     - Quick-start checklist copy

assertions:
  - type: llm_judge
    criteria: "Form labels are tested with specific reasoning — explains why 'Work Email' qualifies leads better than 'Email' and why 'Your best email' feels too casual for B2B"
    weight: 0.25
    description: "Reasoned form label testing"
  - type: llm_judge
    criteria: "Error messages are specific and helpful — each error tells the user exactly what went wrong and how to fix it, in plain language appropriate for a B2B audience"
    weight: 0.25
    description: "Specific helpful error messages"
  - type: llm_judge
    criteria: "Button state changes are well-crafted — loading, success, and error states provide clear feedback that reduces anxiety and confirms progress"
    weight: 0.25
    description: "Well-crafted button state changes"
  - type: llm_judge
    criteria: "Trust micro-copy is placed strategically — appears at moments of highest friction (near forms, near payment, near CTAs) with specific reassurances relevant to each friction point"
    weight: 0.25
    description: "Strategically placed trust micro-copy"
