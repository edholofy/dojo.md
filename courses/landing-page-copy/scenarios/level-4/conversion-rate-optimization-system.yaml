meta:
  id: conversion-rate-optimization-system
  level: 4
  course: landing-page-copy
  type: output
  description: "Build a systematic CRO program for continuous landing page improvement"
  tags: [landing-pages, cro, optimization, systematic, expert]

state: {}

trigger: |
  Conversion rate optimization isn't a one-time project — it's a continuous
  system of hypothesis generation, testing, and iteration. Companies with
  mature CRO programs achieve 2-3x higher conversion rates than those
  doing ad hoc optimization.

  You're building a CRO program for:
  Company: CloudOps — a cloud infrastructure management SaaS
  Current state: 5 key landing pages, combined 50,000 visits/month
  Team: 1 CRO specialist, 1 designer, 1 developer (part-time)
  Current combined conversion rate: 2.1%
  Goal: 4%+ within 12 months

  Design the complete CRO system:

  1. CRO audit framework:
     For each of the 5 landing pages, audit:
     - Heuristic analysis (clarity, relevance, motivation, friction, distraction)
     - Quantitative data analysis (funnel drop-offs, click maps, scroll maps)
     - Qualitative research (user testing, session recordings, surveys)
     - Competitor benchmark analysis
     - Priority score: which page to optimize first

  2. Hypothesis generation process:
     - How to turn audit findings into testable hypotheses
     - Hypothesis format: "If we [change], then [metric] will [improve/decline]
       because [reason based on evidence]"
     - Write 10 example hypotheses for CloudOps landing pages
     - How to prioritize hypotheses (ICE framework: Impact, Confidence, Ease)

  3. Testing roadmap (12 months):
     - Month-by-month testing calendar
     - How many tests to run concurrently (given traffic constraints)
     - Test velocity targets (tests per month)
     - How to handle inconclusive tests
     - When to move from A/B testing to multivariate testing
     - Learning documentation: how to capture and share test results

  4. Copy optimization playbook:
     - The 5 copy elements that produce the highest conversion lifts
     - Standard copy tests to run on every new landing page
     - Copy patterns that consistently win (backed by testing data)
     - Copy patterns that consistently lose
     - Template for copy variation generation

  5. Measurement and reporting:
     - CRO dashboard metrics (conversion rate, test velocity, win rate,
       cumulative lift)
     - Monthly CRO report template
     - How to calculate the revenue impact of CRO improvements
     - When to declare a page "optimized" (diminishing returns)

  6. Scaling CRO:
     - From 5 pages to 50 pages
     - Training other team members on CRO principles
     - Building a testing culture across marketing
     - Tool stack for CRO at scale

assertions:
  - type: llm_judge
    criteria: "The audit framework is multi-method — combines heuristic analysis, quantitative data, and qualitative research for a complete picture, not just one approach"
    weight: 0.25
    description: "Multi-method audit framework"
  - type: llm_judge
    criteria: "Hypotheses are properly formatted — each includes the change, expected outcome, and evidence-based reasoning, not just 'let's try a new headline'"
    weight: 0.25
    description: "Properly formatted hypotheses"
  - type: llm_judge
    criteria: "The 12-month roadmap is realistic for the traffic level — 50K visits/month limits concurrent tests, and the roadmap accounts for this with appropriate test velocity"
    weight: 0.25
    description: "Traffic-realistic testing roadmap"
  - type: llm_judge
    criteria: "The revenue impact calculation connects CRO to business outcomes — shows how a 1% conversion rate improvement translates to specific revenue gains for CloudOps"
    weight: 0.25
    description: "Revenue-connected CRO impact"
