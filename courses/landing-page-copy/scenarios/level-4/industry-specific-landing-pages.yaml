meta:
  id: industry-specific-landing-pages
  level: 4
  course: landing-page-copy
  type: output
  description: "Write landing pages adapted for specific industries with unique requirements"
  tags: [landing-pages, industry-specific, vertical, compliance, expert]

state: {}

trigger: |
  Different industries have different trust requirements, compliance
  constraints, buyer psychology, and conversion patterns. A healthcare
  landing page needs different proof than a SaaS page.

  Write landing page hero sections and key copy for 4 industries:

  1. Healthcare (HIPAA-regulated telehealth platform):
     - Product: Virtual primary care visits
     - Goal: Book first appointment
     - Constraints: Can't make medical claims, HIPAA compliance required,
       insurance information needed
     Write:
     - Headline and subheadline (reassuring, not salesy)
     - Trust elements (medical credentials, HIPAA badge, insurance accepted)
     - CTA (lower barrier than "Book Now" — maybe "Check Availability"?)
     - Required disclaimers and compliance copy
     - How healthcare copy differs from typical SaaS

  2. Financial Services (investment advisory):
     - Product: Robo-advisor with human advisor access
     - Goal: Open account ($500 minimum)
     - Constraints: SEC/FINRA compliance, can't guarantee returns
     Write:
     - Headline (builds trust without promising returns)
     - Risk disclaimers that don't kill conversion
     - Credibility elements (registration, assets under management)
     - The "right" way to talk about returns

  3. Education (online university program):
     - Product: Online MBA program ($35,000 total)
     - Goal: Request information / apply
     - Constraints: Accreditation claims must be accurate, ROI statements
       need substantiation
     Write:
     - Headline (career transformation focus)
     - Credibility (accreditation, alumni outcomes, rankings)
     - Why education pages need extensive social proof
     - Application CTA copy (multi-step process)

  4. Real Estate (luxury property development):
     - Product: Pre-sale condos ($800K-$2M)
     - Goal: Schedule showing / join interest list
     - Constraints: Local real estate advertising laws, fair housing
     Write:
     - Headline (aspiration and exclusivity)
     - Lifestyle-focused copy (not just specs)
     - Social proof for luxury (scarcity, prestige)
     - Fair housing compliance requirements

  For each industry:
  - The #1 trust element that matters most
  - The #1 compliance risk to avoid
  - How conversion goals differ from typical B2B/B2C

assertions:
  - type: llm_judge
    criteria: "Healthcare copy is HIPAA-appropriate — no medical claims, proper disclaimers, and trust elements focus on provider credentials and platform security rather than health outcomes"
    weight: 0.25
    description: "HIPAA-appropriate healthcare copy"
  - type: llm_judge
    criteria: "Financial services copy handles returns correctly — discusses investment philosophy and approach without guaranteeing returns, with proper SEC/FINRA disclosure language"
    weight: 0.25
    description: "Correctly handled financial returns copy"
  - type: llm_judge
    criteria: "Each industry's #1 trust element is correctly identified — healthcare needs medical credentials, finance needs registration/AUM, education needs accreditation, real estate needs developer track record"
    weight: 0.25
    description: "Correctly identified trust elements"
  - type: llm_judge
    criteria: "The copy feels industry-native — each version reads like it was written by someone who understands the industry, not generic copy with industry keywords swapped in"
    weight: 0.25
    description: "Industry-native feeling copy"
