meta:
  id: landing-page-copy-system
  level: 4
  course: landing-page-copy
  type: output
  description: "Build a scalable landing page copy production system for a marketing team"
  tags: [landing-pages, production-system, templates, scaling, operations]

state: {}

trigger: |
  As companies scale, they need to produce landing pages faster without
  sacrificing quality. Ad hoc copywriting doesn't scale — you need
  templates, briefs, and quality gates.

  You're building a landing page copy system for a growth marketing team
  that needs to produce 20+ landing pages per month across:
  - Product launches
  - Ad campaign variants
  - Event promotions
  - Content offers
  - Partnership co-marketing

  Design the complete system:

  1. Landing page copy brief template:
     Create a brief template that any copywriter can fill out:
     - Page purpose and conversion goal
     - Target audience (persona, awareness level, traffic source)
     - Key message and value proposition
     - Proof points and social proof available
     - Required compliance and legal elements
     - SEO requirements (if applicable)
     - Design constraints (template, custom, brand guidelines)
     - CTA hierarchy (primary, secondary)
     - Deadline and review process

  2. Copy templates for common page types:
     Create fill-in-the-blank templates for:
     a) Product launch page template
     b) Lead magnet download template
     c) Event registration template
     d) "Request Demo" template
     Each template: structure, word count targets, required sections,
     variable elements that change per campaign

  3. Copy review and quality gates:
     - Self-review checklist (copywriter checks before submitting)
     - Peer review checklist (what reviewers evaluate)
     - Brand voice consistency check
     - Compliance review (legal, privacy, claims)
     - Pre-launch testing checklist (forms work, links correct, mobile ok)

  4. Copy library and reuse strategy:
     - Building a swipe file of high-performing copy elements
     - Categorized by: headlines, CTAs, testimonials, objection handlers
     - How to reuse copy without being repetitive
     - Version control: tracking which copy is live where

  5. Performance feedback loop:
     - How landing page performance data improves future copy
     - Tagging copy elements to track what works
     - Monthly copy performance review process
     - Building institutional knowledge about what converts

assertions:
  - type: llm_judge
    criteria: "The brief template is comprehensive enough for independent copywriter execution — a writer with no context could produce on-strategy copy using only the brief"
    weight: 0.25
    description: "Self-sufficient copy brief template"
  - type: llm_judge
    criteria: "The fill-in-the-blank templates are practical — include enough structure to ensure quality while leaving room for creative expression and campaign-specific messaging"
    weight: 0.25
    description: "Practical fill-in-blank templates"
  - type: llm_judge
    criteria: "The quality gate system catches real problems — self-review catches missing elements, peer review catches unclear messaging, and compliance review catches legal risks"
    weight: 0.25
    description: "Problem-catching quality gates"
  - type: llm_judge
    criteria: "The feedback loop connects performance to future copy — explains how conversion data from live pages informs the copy library, templates, and brief requirements"
    weight: 0.25
    description: "Performance-connected feedback loop"
