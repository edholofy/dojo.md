meta:
  id: retargeting-landing-pages
  level: 4
  course: landing-page-copy
  type: output
  description: "Write landing pages for retargeted visitors who didn't convert the first time"
  tags: [landing-pages, retargeting, returning-visitors, remarketing, expert]

state: {}

trigger: |
  Retargeting brings back visitors who didn't convert the first time.
  But showing them the exact same page is a missed opportunity. Retargeting
  landing pages should acknowledge their return, address their likely
  objections, and offer something new.

  Product: ProposalHQ — proposal creation software for agencies
  First visit: Visitor saw the main landing page, spent 2 minutes, left
  without converting
  Retargeting ad: Display ad seen 3 days later

  Design retargeting landing pages for 4 scenarios:

  1. "Browsed but didn't convert" (generic retarget):
     - What we know: they're interested but something stopped them
     - Retargeting ad copy (the hook to get them back)
     - Landing page copy that acknowledges the return visit
     - Address likely objections (price? complexity? commitment?)
     - New element: social proof they didn't see before
     - Different CTA: lower commitment ("Watch a 2-min Demo" instead of
       "Start Free Trial")

  2. "Viewed pricing page" (price-sensitive retarget):
     - What we know: they care about price specifically
     - Landing page focused on value and ROI
     - Case study showing ROI: "How Agency X saved 10 hours/week"
     - Offer: extended trial or discount code
     - CTA: "Start Free Trial — 30 Days, No Credit Card"

  3. "Started signup but abandoned" (high-intent retarget):
     - What we know: they were very close to converting
     - Landing page that addresses last-minute friction
     - Simplify: show what they'll get immediately after signup
     - Offer: save their progress, pre-fill their form
     - CTA: "Pick Up Where You Left Off"

  4. "Converted to free trial but didn't activate" (activation retarget):
     - What we know: they signed up but never used the product
     - Landing page showing quick wins ("Create your first proposal in 5 min")
     - Social proof from similar users who activated and saw results
     - CTA: "Log In and Get Started"

  For each scenario:
  - How the copy differs from the original landing page (and why)
  - The psychological state of the visitor
  - Expected conversion rate vs original page
  - When to stop retargeting (frequency caps, message fatigue)

assertions:
  - type: llm_judge
    criteria: "Each retargeting scenario has fundamentally different copy — not the same page with a different headline but genuinely different messaging that addresses the specific reason they didn't convert"
    weight: 0.30
    description: "Fundamentally different retargeting copy"
  - type: llm_judge
    criteria: "The pricing retarget focuses on value not features — since they already know the product, the copy shifts to ROI, case studies, and value justification"
    weight: 0.25
    description: "Value-focused pricing retarget"
  - type: llm_judge
    criteria: "The abandoned signup scenario correctly reduces friction — acknowledges they were close, simplifies the remaining steps, and may save their progress rather than starting over"
    weight: 0.25
    description: "Friction-reducing abandoned signup copy"
  - type: llm_judge
    criteria: "Frequency and fatigue management is addressed — includes guidelines for how many times to retarget, when to change creative, and when to stop altogether"
    weight: 0.20
    description: "Frequency fatigue management"
