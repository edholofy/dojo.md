meta:
  id: localization-landing-pages
  level: 4
  course: landing-page-copy
  type: output
  description: "Localize landing page copy for international markets"
  tags: [landing-pages, localization, international, cultural, expert]

state: {}

trigger: |
  Landing page localization goes far beyond translation. Cultural norms,
  trust signals, purchasing behavior, and even color psychology differ
  across markets. A US landing page translated to Japanese will
  underperform a natively designed Japanese page by 30-50%.

  You're localizing a SaaS landing page for 3 international markets:
  Product: PayFlow — payment processing for small businesses
  Original market: United States
  Target markets: Japan, Germany, Brazil

  For each market, adapt the landing page:

  1. Japan:
     - Cultural copy differences (indirect communication, group consensus,
       formality level)
     - Trust signals that matter (company longevity, number of users,
       media coverage)
     - Payment and pricing display norms (yen formatting, consumption tax)
     - CTA differences (Japanese buyers prefer detailed information before
       committing)
     - Visual and layout preferences (higher information density preferred)
     - Write the hero section in English that reflects Japanese copy norms

  2. Germany:
     - Cultural copy differences (direct communication, data privacy
       sensitivity, thoroughness)
     - Trust signals that matter (TÜV certification, Datenschutz compliance,
       Impressum requirements)
     - GDPR compliance elements specific to German audiences
     - Payment preferences (Rechnung, SEPA direct debit, Klarna)
     - CTA differences (Germans prefer detailed evaluation before trial)
     - Write the hero section in English reflecting German copy norms

  3. Brazil:
     - Cultural copy differences (warm, relationship-focused, visual,
       social proof heavy)
     - Trust signals that matter (CPF/CNPJ integration, local payment methods)
     - Payment preferences (PIX, boleto bancário, installments)
     - Mobile-first emphasis (80%+ mobile traffic)
     - CTA differences (more emotionally driven, social proof dominant)
     - Write the hero section in English reflecting Brazilian copy norms

  For all markets:
  4. Common localization mistakes:
     - Direct translation failures (idioms, humor, cultural references)
     - Copy length changes across languages (German is 30% longer)
     - Color and imagery localization
     - Local competitive landscape impact on positioning

  5. Localization testing strategy:
     - How to test localized copy effectiveness
     - When native speakers are essential vs when translation suffices
     - Metrics to track per market

assertions:
  - type: llm_judge
    criteria: "The Japanese adaptation reflects real cultural norms — higher information density, indirect language, group decision-making emphasis, and formality level appropriate for B2B in Japan"
    weight: 0.25
    description: "Culturally accurate Japanese adaptation"
  - type: llm_judge
    criteria: "The German adaptation addresses data privacy prominence — Datenschutz (data protection) is prominently featured, GDPR compliance is explicit, and trust signals include German-specific certifications"
    weight: 0.25
    description: "Privacy-prominent German adaptation"
  - type: llm_judge
    criteria: "The Brazilian adaptation includes local payment methods — PIX and boleto bancário are mentioned as critical conversion factors, not just generic 'local payment support'"
    weight: 0.25
    description: "Local payment Brazilian adaptation"
  - type: llm_judge
    criteria: "Common localization mistakes are specific — includes real examples like German text being 30% longer affecting layout, humor that doesn't translate, and color associations that differ"
    weight: 0.25
    description: "Specific localization mistakes"
