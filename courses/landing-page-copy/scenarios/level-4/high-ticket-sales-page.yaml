meta:
  id: high-ticket-sales-page
  level: 4
  course: landing-page-copy
  type: output
  description: "Write a long-form sales page for a high-ticket offer ($2,000+)"
  tags: [landing-pages, high-ticket, sales-page, long-form, persuasion]

state: {}

trigger: |
  High-ticket offers ($2,000+) require long-form sales pages because the
  risk is higher, the decision is bigger, and every objection must be
  addressed before the prospect closes. These pages are typically
  3,000-8,000+ words and follow a precise persuasion sequence.

  Write a long-form sales page for:
  Offer: "Revenue Accelerator" — 12-week group coaching program
  for B2B SaaS founders who want to go from $500K to $5M ARR
  Price: $4,997 (or 3 payments of $1,997)
  Creator: Alex Rivera, founder who scaled 3 SaaS companies past $10M
  Includes: Weekly group calls, 1:1 strategy session, playbook library,
  private community, implementation templates
  Guarantee: Results or money back within 90 days

  Write the complete sales page:

  1. Pre-headline and headline:
     - Pre-headline: qualify the audience ("For B2B SaaS founders at $500K+...")
     - Main headline: promise the transformation
     - Subheadline: add specificity and credibility

  2. Opening story (500 words):
     - Alex's own journey from struggling founder to $10M+
     - Relatable moment of frustration
     - The breakthrough insight
     - Why this program exists

  3. The problem (400 words):
     - Why most SaaS founders plateau at $500K-$1M
     - The common mistakes (wrong pricing, founder-led sales that don't scale,
       product-market fit confusion)
     - Cost of staying stuck (opportunity cost, burn rate, personal toll)

  4. The solution (300 words):
     - Introduce the program
     - The framework overview (not too much detail yet)
     - Why this approach works (methodology credibility)

  5. What's included (500 words):
     - Each component with benefit-focused description
     - Value stacking: assign dollar values to each component
     - Total value vs price (the stack must feel like a no-brainer)

  6. Social proof (400 words):
     - 3 detailed success stories (before → after with specific numbers)
     - Shorter testimonial quotes (5-6)
     - Logos or metrics ("47 founders have completed this program")

  7. Objection handling (300 words):
     - "I don't have time" — time investment is 5 hours/week
     - "I've tried coaching before" — what makes this different
     - "It's too expensive" — ROI calculation
     - "What if it doesn't work for my niche?"

  8. The guarantee (200 words):
     - 90-day money-back guarantee copy
     - Make the guarantee feel bold and confident
     - Risk reversal: "You have nothing to lose and everything to gain"

  9. Closing CTA (200 words):
     - Final emotional appeal
     - Urgency (if legitimate: cohort start date, limited seats)
     - CTA button + payment options
     - "P.S." section (last persuasion element)

  10. FAQ section (6 questions):
      - Practical details (schedule, commitment, tech requirements)
      - Qualification questions ("Is this right for me if...?")

assertions:
  - type: llm_judge
    criteria: "The value stack is effective — each component is assigned a credible dollar value and the total stacked value makes the $4,997 price feel like a significant discount"
    weight: 0.25
    description: "Effective value stack"
  - type: llm_judge
    criteria: "The opening story is engaging and relevant — Alex's journey feels authentic and relatable to the target audience, not a generic rags-to-riches narrative"
    weight: 0.25
    description: "Engaging relevant opening story"
  - type: llm_judge
    criteria: "Objection handling is specific and credible — each objection gets a substantive answer with evidence, not dismissive responses like 'just trust the process'"
    weight: 0.25
    description: "Specific credible objection handling"
  - type: llm_judge
    criteria: "The guarantee is bold and builds confidence — the 90-day money-back guarantee is positioned as a sign of program confidence, not as a safety net for a weak offer"
    weight: 0.25
    description: "Bold confidence-building guarantee"
