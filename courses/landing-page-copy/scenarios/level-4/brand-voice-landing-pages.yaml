meta:
  id: brand-voice-landing-pages
  level: 4
  course: landing-page-copy
  type: output
  description: "Maintain brand voice consistency across all landing page copy"
  tags: [landing-pages, brand-voice, consistency, tone, expert]

state: {}

trigger: |
  Brand voice on landing pages must balance conversion optimization with
  brand consistency. Conversion copy techniques (urgency, social proof,
  objection handling) need to feel like YOUR brand, not generic direct
  response marketing.

  You're establishing landing page voice guidelines for:
  Company: Notion-like productivity SaaS called "Workspace"
  Brand personality: Calm, confident, slightly playful, respects the user's
  intelligence, never aggressive or pushy
  Tone references: Think Apple's clarity + Slack's warmth + Notion's simplicity

  Design the brand voice system for landing pages:

  1. Voice attributes defined:
     - 4 brand voice attributes (e.g., Clear, Warm, Confident, Playful)
     - For each attribute:
       a) What it sounds like in landing page copy (with example)
       b) What it does NOT sound like (anti-example)
       c) How it applies to different page elements

  2. Tone spectrum:
     - How tone shifts across different landing page contexts:
       a) Product launch (more excited, still calm)
       b) Pricing page (straightforward, transparent)
       c) Enterprise landing page (professional, less playful)
       d) Error pages (empathetic, reassuring, slightly humorous)
     - Write the same CTA in all 4 tonal contexts

  3. Voice-consistent copy examples:
     Write these elements in the Workspace brand voice:
     - Hero headline (clear, confident)
     - Feature descriptions (warm, helpful)
     - CTA buttons (inviting, not pushy)
     - Error messages (empathetic, slightly playful)
     - Legal/privacy copy (clear, not scary)
     - Loading states (reassuring, maybe playful)

     Then write the same elements in a WRONG voice:
     - Too corporate ("Leverage our platform to synergize...")
     - Too aggressive ("Don't miss out! Act NOW or lose everything!")
     - Too casual ("lol this feature is lowkey fire ngl")

  4. Voice guidelines document:
     - Vocabulary: words we use vs words we never use
     - Sentence structure preferences (short, active, direct)
     - Punctuation and formatting rules
     - How to handle urgency without being pushy
     - How to handle social proof without sounding boastful

  5. Quality assurance:
     - Voice consistency checklist for landing page reviews
     - How to train new copywriters on the voice
     - Common voice mistakes and how to fix them
     - When conversion optimization should override brand voice (if ever)

assertions:
  - type: llm_judge
    criteria: "The voice attributes are distinct and specific — each attribute has clear boundaries with examples and anti-examples that make it easy to judge whether copy is on-voice"
    weight: 0.25
    description: "Distinct specific voice attributes"
  - type: llm_judge
    criteria: "The wrong voice examples clearly illustrate the contrast — corporate, aggressive, and too-casual versions are obviously wrong and help define the boundaries of the brand voice"
    weight: 0.25
    description: "Clear wrong voice contrasts"
  - type: llm_judge
    criteria: "The tone spectrum shows appropriate shifts — the same brand can sound more professional on enterprise pages and more playful on error pages while remaining recognizably 'Workspace'"
    weight: 0.25
    description: "Appropriate tone spectrum shifts"
  - type: llm_judge
    criteria: "The vocabulary list is practical — includes specific words to use and avoid, not generic advice like 'be friendly,' with reasoning for each choice"
    weight: 0.25
    description: "Practical vocabulary list"
