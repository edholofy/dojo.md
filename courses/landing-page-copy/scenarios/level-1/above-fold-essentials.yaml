meta:
  id: above-fold-essentials
  level: 1
  course: landing-page-copy
  type: output
  description: "Write above-the-fold copy that keeps visitors on the page"
  tags: [landing-pages, above-fold, hero-section, first-impression, basics]

state: {}

trigger: |
  47% of users expect a page to load in under 2 seconds, and the above-
  the-fold content determines whether they stay or bounce. The hero section
  must include: headline, value proposition, CTA, and visual — all visible
  without scrolling.

  Write above-the-fold copy for these 3 landing pages:

  1. SaaS product landing page:
     Product: CloudBackup — automated backup for small businesses
     Goal: Free trial signups
     Key differentiator: One-click setup, no IT team needed

     Write:
     - Headline
     - Subheadline (1-2 sentences)
     - Primary CTA button text
     - Supporting CTA text (below button)
     - Trust element (one line of social proof)

  2. E-commerce product page:
     Product: EcoBottle — insulated water bottle made from recycled materials
     Goal: Add to cart
     Price: $34.99

     Write:
     - Headline
     - Product tagline
     - Key selling points (3 bullet points, visible above fold)
     - CTA button text
     - Trust/shipping info line

  3. Service provider landing page:
     Service: TaxPro — online tax filing service
     Goal: Start filing
     Key differentiator: AI-assisted, maximum refund guarantee

     Write:
     - Headline
     - Subheadline
     - Primary CTA
     - Risk-reversal statement
     - Social proof element

  For each page, also specify:
  - What to EXCLUDE from above the fold (and why)
  - How the copy changes for mobile (shorter? different CTA?)

assertions:
  - type: llm_judge
    criteria: "Each hero section includes all required elements — headline, supporting text, CTA, and trust element, forming a complete above-fold experience"
    weight: 0.25
    description: "Complete hero section elements"
  - type: llm_judge
    criteria: "Headlines and CTAs are matched to the conversion goal — free trial copy reduces commitment fear, e-commerce copy drives purchase action, service copy builds trust"
    weight: 0.25
    description: "Goal-matched hero copy"
  - type: llm_judge
    criteria: "The exclusion recommendations are correct — navigation links to other pages, lengthy descriptions, and secondary offers should be below the fold to maintain focus"
    weight: 0.25
    description: "Correct above-fold exclusions"
  - type: llm_judge
    criteria: "Mobile adaptations are practical — shorter headlines, simplified copy, and touch-friendly CTA considerations specific to smaller screens"
    weight: 0.25
    description: "Practical mobile adaptations"
