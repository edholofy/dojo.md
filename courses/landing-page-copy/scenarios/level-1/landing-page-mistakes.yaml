meta:
  id: landing-page-mistakes
  level: 1
  course: landing-page-copy
  type: output
  description: "Identify and fix common landing page copy mistakes"
  tags: [landing-pages, mistakes, diagnosis, fixes, basics]

state: {}

trigger: |
  Most landing pages fail not because they lack good copy but because
  they contain conversion-killing mistakes. Fixing these mistakes often
  improves conversion rates more than adding new elements.

  Here's a landing page with 10 copy mistakes. Identify and fix each one:

  ---
  [HEADER: Full navigation menu with 8 links]

  Headline: "Welcome to Our Amazing Platform!"
  Subheadline: "We offer a wide range of solutions for businesses of
  all sizes across multiple industries and use cases."

  [3 paragraphs of company history — 200 words about founding story]

  Features:
  - AI-powered analytics engine
  - RESTful API with OAuth 2.0
  - Multi-tenant architecture
  - 99.99% SLA guaranteed uptime

  "Thousands of customers love us!"
  — Happy Customer

  CTA Button: [Submit]

  Fine print: "By clicking Submit you agree to our Terms of Service,
  Privacy Policy, Cookie Policy, Data Processing Agreement, and
  acknowledge that we may contact you for marketing purposes including
  but not limited to..."

  [Footer with 30+ links]
  ---

  For each mistake:
  1. Identify the mistake
  2. Explain why it hurts conversions
  3. Write the fixed version
  4. Estimate the conversion impact (high/medium/low)

assertions:
  - type: llm_judge
    criteria: "All major mistakes are identified — navigation menu, vague headline, company-focused copy, technical features without benefits, generic testimonial, weak CTA, and scary fine print"
    weight: 0.30
    description: "All major mistakes identified"
  - type: llm_judge
    criteria: "Each fix is a specific rewrite, not just advice — doesn't just say 'make the headline clearer' but provides an actual improved headline"
    weight: 0.25
    description: "Specific rewrites not just advice"
  - type: llm_judge
    criteria: "Conversion impact estimates are reasonable — removing navigation and fixing the CTA are high impact, while fine print improvements are medium/low impact"
    weight: 0.25
    description: "Reasonable impact estimates"
  - type: llm_judge
    criteria: "The navigation menu issue is addressed — explains why full navigation on a landing page provides exit paths that reduce conversion focus"
    weight: 0.20
    description: "Navigation exit path issue addressed"
