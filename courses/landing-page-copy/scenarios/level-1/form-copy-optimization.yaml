meta:
  id: form-copy-optimization
  level: 1
  course: landing-page-copy
  type: output
  description: "Write form copy that reduces friction and increases submissions"
  tags: [landing-pages, forms, friction, conversion, basics]

state: {}

trigger: |
  Forms are where conversions happen — and where most visitors abandon.
  Each additional form field reduces submissions. But it's not just about
  fewer fields — the labels, placeholder text, and surrounding copy matter.

  Optimize the form copy for these 3 landing pages:

  1. SaaS demo request form:
     Current form (7 fields):
     - First Name, Last Name, Email, Phone, Company, Job Title, Message

     Optimize:
     - Reduce to essential fields (justify each field kept or removed)
     - Write field labels and placeholder text for each field
     - Write the form headline ("Book Your Demo" or better?)
     - Write supporting copy above the form (2-3 lines)
     - Write the submit button text
     - Write confirmation/success message

  2. Newsletter signup form:
     Current form (3 fields): Name, Email, Subscribe

     Optimize:
     - Can it be reduced to 1 field? Pros and cons
     - Write the form headline
     - Write the value proposition near the form
     - Write the submit button text (not "Subscribe")
     - Write what subscribers will receive (set expectations)

  3. Lead magnet download form:
     Resource: "2026 Marketing Trends Report" (PDF)
     Current form: Name, Email, Company, Phone, Industry

     Optimize:
     - Reduce fields based on the value exchange
     - Write the form headline
     - Write the resource preview description (what's inside)
     - Write the submit button text
     - Privacy assurance line (e.g., "We respect your inbox...")

  For all forms:
  - Error message copy for common validation failures
  - Mobile form optimization considerations

assertions:
  - type: llm_judge
    criteria: "Field reduction is justified — explains why each removed field was unnecessary for the conversion goal and why each kept field is essential"
    weight: 0.25
    description: "Justified field reduction"
  - type: llm_judge
    criteria: "Form headlines and surrounding copy reduce anxiety — addresses common form fears (spam, sales calls, data misuse) with specific reassurance"
    weight: 0.25
    description: "Anxiety-reducing form copy"
  - type: llm_judge
    criteria: "Submit buttons are benefit-focused — uses action verbs that describe the outcome ('Get My Report', 'Book My Demo') instead of generic labels ('Submit', 'Send')"
    weight: 0.25
    description: "Benefit-focused submit buttons"
  - type: llm_judge
    criteria: "Error messages are helpful and human — not just 'Invalid input' but specific guidance like 'Please enter a valid email address (example@company.com)'"
    weight: 0.25
    description: "Helpful human error messages"
