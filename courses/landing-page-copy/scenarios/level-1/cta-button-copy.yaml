meta:
  id: cta-button-copy
  level: 1
  course: landing-page-copy
  type: output
  description: "Write effective CTA button copy that drives clicks and conversions"
  tags: [landing-pages, cta, buttons, conversion, basics]

state: {}

trigger: |
  CTA button copy is often an afterthought, but strong action verbs in CTAs
  increase click-through rates by up to 13%. Generic CTAs like "Submit" or
  "Click Here" leave conversions on the table.

  You're writing CTA button copy for 5 different landing page scenarios:

  1. SaaS free trial signup (project management tool):
     - Write 5 CTA variations
     - Include at least one that emphasizes "free" and one that emphasizes
       the outcome

  2. E-commerce limited-time offer (30% off running shoes):
     - Write 5 CTA variations
     - Include at least one with urgency and one without

  3. Lead magnet download (free SEO checklist PDF):
     - Write 5 CTA variations
     - Include at least one that emphasizes instant access

  4. Webinar registration (marketing strategy masterclass):
     - Write 5 CTA variations
     - Include at least one that implies exclusivity

  5. Consultation booking (financial advisor):
     - Write 5 CTA variations
     - Include at least one that reduces commitment anxiety

  For each scenario:
  - Explain which CTA you'd recommend as the primary and why
  - Identify which CTAs to AVOID and why (too generic, too pushy, etc.)
  - Supporting text to place near the CTA button (1 line)

assertions:
  - type: llm_judge
    criteria: "CTAs use strong action verbs — 'Start,' 'Get,' 'Claim,' 'Book,' 'Download' rather than weak verbs like 'Submit,' 'Click,' or 'Enter'"
    weight: 0.25
    description: "Strong action verb CTAs"
  - type: llm_judge
    criteria: "Each scenario's CTAs match the conversion goal — free trial CTAs reduce risk ('Start Free'), offer CTAs create urgency ('Claim 30% Off'), lead magnets emphasize value ('Get My Free Checklist')"
    weight: 0.30
    description: "Goal-matched CTA copy"
  - type: llm_judge
    criteria: "The 'avoid' CTAs are correctly identified — explains why generic CTAs like 'Submit' perform poorly and why overly aggressive CTAs ('BUY NOW!!!') can backfire"
    weight: 0.25
    description: "Correctly identified bad CTAs"
  - type: llm_judge
    criteria: "Supporting text near CTAs reduces friction — lines like 'No credit card required' or 'Free forever, no strings attached' address conversion hesitations"
    weight: 0.20
    description: "Friction-reducing supporting text"
