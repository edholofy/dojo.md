meta:
  id: urgency-scarcity-copy
  level: 1
  course: landing-page-copy
  type: output
  description: "Write authentic urgency and scarcity copy without being manipulative"
  tags: [landing-pages, urgency, scarcity, psychology, ethics]

state: {}

trigger: |
  Urgency and scarcity are powerful conversion drivers — loss aversion
  means people feel the pain of missing out 2x more than the pleasure
  of gaining. But fake urgency ("Only 2 left!" when there are 2,000)
  destroys trust.

  Write urgency/scarcity copy for these scenarios:

  1. Legitimate time-limited offer:
     - SaaS product: 40% off annual plan, offer ends Friday
     - Write 3 ways to express this urgency
     - Show the countdown timer context copy
     - Write the "offer expired" fallback copy

  2. Legitimate capacity-limited offer:
     - Live workshop: 50 seats, 38 already registered
     - Write 3 ways to express limited capacity
     - How to update copy as seats fill (dynamic scarcity)
     - Write the "sold out" waitlist copy

  3. Evergreen urgency (no real deadline):
     - A SaaS product with no discount, always available
     - Write 3 ways to create urgency ethically (opportunity cost,
       competitor advantage, problem worsening)
     - Why "act now" without a reason fails

  4. Identify manipulative urgency (5 examples):
     - Write 5 examples of fake/manipulative urgency copy
     - Explain why each is unethical and how consumers see through it
     - Write the honest alternative for each

  5. Urgency placement strategy:
     - Where on the page urgency copy is most effective
     - How to pair urgency with risk reversal (guarantee)
     - When urgency hurts instead of helps (high-consideration purchases)

assertions:
  - type: llm_judge
    criteria: "Legitimate urgency copy is specific and verifiable — mentions actual dates, actual seat counts, or actual discount end times rather than vague 'act now' language"
    weight: 0.25
    description: "Specific verifiable urgency copy"
  - type: llm_judge
    criteria: "Manipulative examples are correctly identified — fake countdown timers that reset, fake 'only X left' on unlimited products, and false urgency are flagged with explanations of why they damage trust"
    weight: 0.25
    description: "Correctly identified manipulative urgency"
  - type: llm_judge
    criteria: "Evergreen urgency alternatives are creative and honest — uses opportunity cost, competitive pressure, or problem escalation to create genuine motivation without fake deadlines"
    weight: 0.25
    description: "Creative honest evergreen urgency"
  - type: llm_judge
    criteria: "The pairing strategy is sound — urgency paired with risk reversal ('Offer ends Friday — 30-day money-back guarantee') addresses both motivation and fear simultaneously"
    weight: 0.25
    description: "Sound urgency-risk reversal pairing"
