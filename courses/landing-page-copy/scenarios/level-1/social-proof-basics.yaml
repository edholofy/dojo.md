meta:
  id: social-proof-basics
  level: 1
  course: landing-page-copy
  type: output
  description: "Write effective social proof copy for landing pages"
  tags: [landing-pages, social-proof, testimonials, trust, basics]

state: {}

trigger: |
  Landing pages with social proof convert 34% better than those without.
  But poorly written social proof can actually hurt conversions — generic
  testimonials like "Great product!" add no value.

  Write social proof copy for a B2B analytics platform (DataLens):

  1. Customer testimonials (write 3):
     For each testimonial:
     - The quote (2-3 sentences, specific and results-focused)
     - Attribution (name, title, company)
     - Why this testimonial is effective
     - One example of a BAD version of the same testimonial (and why
       it's bad)

  2. Trust bar copy:
     - Write the section header for a logo bar ("Trusted by..." format)
     - 3 variations of the header text
     - When to use company count ("500+ companies") vs names

  3. Statistics-based social proof:
     - Write 4 data points to display on the page
     - Format: number + context (e.g., "10,000+ dashboards created")
     - Why each number is compelling
     - Common mistakes with statistics-based social proof

  4. Case study teaser:
     - Write a 3-line case study summary for the landing page
     - Include: company name, challenge, result with specific numbers
     - CTA to read the full case study

  5. Social proof placement guide:
     - Where to place each type on the page (above fold, mid-page,
       near CTA, footer)
     - Why placement matters for conversion impact
     - Which social proof types work best near the CTA

assertions:
  - type: llm_judge
    criteria: "Testimonials include specific results — numbers, percentages, timeframes, or concrete outcomes rather than vague praise like 'great product' or 'love it'"
    weight: 0.30
    description: "Results-specific testimonials"
  - type: llm_judge
    criteria: "Bad testimonial examples clearly demonstrate the contrast — shows why generic, unattributed, or results-free testimonials fail to build trust"
    weight: 0.25
    description: "Clear bad testimonial contrasts"
  - type: llm_judge
    criteria: "Statistics are formatted for impact — large, scannable numbers with context that makes them meaningful (not just raw numbers without reference points)"
    weight: 0.25
    description: "Impact-formatted statistics"
  - type: llm_judge
    criteria: "Placement recommendations have reasoning — explains why testimonials near CTAs reduce last-moment hesitation and why logo bars work best just below the hero"
    weight: 0.20
    description: "Reasoned placement recommendations"
