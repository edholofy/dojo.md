meta:
  id: landing-page-structure
  level: 1
  course: landing-page-copy
  type: output
  description: "Structure a landing page with the right copy sections in the right order"
  tags: [landing-pages, structure, page-layout, copy-sections, basics]

state: {}

trigger: |
  A well-structured landing page guides visitors through a persuasion
  sequence. Each section has a specific job, and the order matters.

  You're structuring a landing page for:
  Product: InvoiceNinja — invoicing software for freelancers
  Goal: Free trial signup
  Price: Free plan available, paid plans from $15/month

  Design the complete page structure:

  1. Map out every section of the page, top to bottom:
     For each section provide:
     - Section name and purpose
     - What copy goes here (describe the content)
     - Word count target for the section
     - Why this section is in this position

  2. Write the copy for at least 6 of these sections:
     - Hero section (headline, subheadline, CTA)
     - Problem section (pain points the audience faces)
     - Solution section (how the product solves these problems)
     - Features section (3-4 key features with benefit-focused descriptions)
     - Social proof section (testimonials or statistics)
     - Final CTA section (closing argument + button)

  3. Transition copy between sections:
     - Write the bridge text that connects each section to the next
     - Explain why smooth transitions keep readers scrolling

  4. What to leave OUT:
     - Elements that don't belong on a conversion-focused landing page
     - Why navigation menus can hurt landing page conversions
     - When to link away from the page vs keep visitors focused

assertions:
  - type: llm_judge
    criteria: "The page structure follows a logical persuasion sequence — problem before solution, features before social proof, and a strong closing CTA that builds on everything above"
    weight: 0.25
    description: "Logical persuasion sequence"
  - type: llm_judge
    criteria: "Each section has a clear purpose — not just 'features section' but why features are shown at this specific point in the page flow"
    weight: 0.25
    description: "Clear purpose per section"
  - type: llm_judge
    criteria: "The written copy is specific to freelancer invoicing — mentions real pain points (chasing payments, tracking hours, tax time stress) rather than generic SaaS benefits"
    weight: 0.25
    description: "Audience-specific copy"
  - type: llm_judge
    criteria: "The exclusion guidance is well-reasoned — explains why removing navigation, social media links, and competing CTAs keeps visitors focused on the single conversion goal"
    weight: 0.25
    description: "Well-reasoned exclusion guidance"
