meta:
  id: value-proposition-clarity
  level: 1
  course: landing-page-copy
  type: output
  description: "Craft clear value propositions that communicate benefits instantly"
  tags: [landing-pages, value-proposition, clarity, messaging, basics]

state: {}

trigger: |
  You have 5 seconds to communicate your value proposition before a visitor
  decides to stay or leave. The value proposition must answer: "What do you
  do, who is it for, and why should I care?"

  Here are 5 unclear value propositions. Rewrite each:

  1. Original: "Synergize your workflow with next-generation AI-powered
     solutions for enterprise digital transformation."
     Company: A scheduling tool for small teams

  2. Original: "We're passionate about creating delightful experiences
     that empower communities."
     Company: An online course marketplace

  3. Original: "Innovation meets simplicity."
     Company: An accounting software for freelancers

  4. Original: "Your one-stop solution for all your needs."
     Company: A CRM for real estate agents

  5. Original: "Reimagining the future of work."
     Company: A video conferencing tool with AI note-taking

  For each:
  - Diagnose why the original fails (what's wrong specifically)
  - Write 3 improved value proposition options
  - For each improvement, specify:
    a) Headline (main value proposition)
    b) Subheadline (supporting detail, 1-2 sentences)
    c) Why this version is clearer

  Then provide:
  - A value proposition checklist (5-7 criteria for a strong VP)
  - The #1 mistake companies make with their value propositions

assertions:
  - type: llm_judge
    criteria: "Each diagnosis correctly identifies the specific failure — jargon, vagueness, lack of specificity, missing audience, or missing benefit, not just 'it's unclear'"
    weight: 0.25
    description: "Specific failure diagnosis per VP"
  - type: llm_judge
    criteria: "Improved value propositions are concrete and specific — mention who the product is for, what it does, and the specific benefit, avoiding buzzwords and jargon"
    weight: 0.30
    description: "Concrete specific improved VPs"
  - type: llm_judge
    criteria: "Subheadlines provide useful supporting detail — add specificity (features, numbers, differentiation) without repeating the headline"
    weight: 0.25
    description: "Useful supporting subheadlines"
  - type: llm_judge
    criteria: "The checklist is practical — includes criteria like specificity, audience clarity, benefit focus, and jargon avoidance that can be applied to any value proposition"
    weight: 0.20
    description: "Practical VP checklist"
