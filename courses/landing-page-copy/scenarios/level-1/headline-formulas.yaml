meta:
  id: headline-formulas
  level: 1
  course: landing-page-copy
  type: output
  description: "Write compelling landing page headlines using proven formulas"
  tags: [landing-pages, headlines, copywriting, formulas, basics]

state: {}

trigger: |
  The headline is the most important element on a landing page — 80% of
  visitors read the headline, but only 20% read the rest. A strong headline
  can improve conversions by 27-104%.

  Write headlines for this SaaS product using 5 different formulas:

  Product: TimeTrack Pro — a time tracking tool for freelancers
  Key benefit: Know exactly where your hours go so you can bill more accurately
  Target audience: Freelance designers and developers

  For each formula:
  1. Name and explain the formula
  2. Write 3 headline variations using it
  3. Explain why each headline works

  Formulas to use:
  a) Benefit-driven headline (lead with the outcome)
  b) Problem-agitation headline (call out the pain point)
  c) How-to headline (promise a specific result)
  d) Social proof headline (leverage numbers or authority)
  e) Question headline (provoke curiosity)

  Then:
  - Rank your 15 headlines from strongest to weakest
  - Explain what makes the #1 headline the strongest
  - Identify common headline mistakes to avoid

assertions:
  - type: llm_judge
    criteria: "Each formula produces 3 distinct headlines — not variations of the same headline but genuinely different angles that use the formula in different ways"
    weight: 0.25
    description: "Distinct headline variations per formula"
  - type: llm_judge
    criteria: "Headlines are specific to the product — mentions freelancers, time tracking, billing, hours, or related concepts rather than generic 'boost productivity' language"
    weight: 0.25
    description: "Product-specific headlines"
  - type: llm_judge
    criteria: "The ranking has clear reasoning — the #1 headline is justified with specific reasons (clarity, benefit focus, emotional hook) rather than subjective preference"
    weight: 0.25
    description: "Clear ranking reasoning"
  - type: llm_judge
    criteria: "The headline mistakes are specific and actionable — identifies real problems like being too clever, too vague, too long, or feature-focused instead of benefit-focused"
    weight: 0.25
    description: "Specific actionable headline mistakes"
