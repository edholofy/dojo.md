meta:
  id: benefit-vs-feature-copy
  level: 1
  course: landing-page-copy
  type: output
  description: "Transform feature-focused copy into benefit-driven landing page copy"
  tags: [landing-pages, benefits, features, copywriting, transformation]

state: {}

trigger: |
  Features tell, benefits sell. Most landing pages list features without
  connecting them to outcomes the reader cares about. The formula:
  Feature → Benefit → Emotional payoff.

  You're rewriting the features section for a project management tool
  (TeamFlow) targeting marketing teams at agencies.

  Original feature list (flat, feature-focused):
  1. "Kanban board view"
  2. "Time tracking integration"
  3. "Client portal access"
  4. "Automated workflow rules"
  5. "Real-time collaboration"
  6. "Custom reporting dashboard"

  For each feature:
  1. Identify the underlying benefit (what does this DO for the user?)
  2. Identify the emotional payoff (how does this make them FEEL?)
  3. Write the feature description in benefit-first format:
     - Benefit headline (what they get)
     - Supporting detail (how the feature delivers the benefit)
     - 2-3 sentences maximum

  Then:
  4. Write 2 versions of the complete features section:
     - Version A: Icon + headline + one-line description (scannable format)
     - Version B: Headline + paragraph + mini CTA per feature (detailed format)

  5. When to use features vs benefits:
     - When feature-first copy works better (technical audiences)
     - When benefit-first copy works better (non-technical buyers)
     - How to combine both for mixed audiences

assertions:
  - type: llm_judge
    criteria: "Each transformation correctly identifies the real benefit — 'Kanban board' becomes about visual clarity and project progress, not just the feature name restated"
    weight: 0.30
    description: "Correctly identified real benefits"
  - type: llm_judge
    criteria: "Emotional payoffs are relevant to the audience — marketing agency teams care about client happiness, deadline stress, and team coordination, and the payoffs reflect these"
    weight: 0.25
    description: "Audience-relevant emotional payoffs"
  - type: llm_judge
    criteria: "Both format versions are complete and distinct — Version A is scannable with short descriptions while Version B provides more detail and persuasion"
    weight: 0.25
    description: "Complete distinct format versions"
  - type: llm_judge
    criteria: "The features vs benefits guidance is nuanced — recognizes that technical audiences may want feature details while business buyers need benefit framing, with guidance for mixed audiences"
    weight: 0.20
    description: "Nuanced features vs benefits guidance"
