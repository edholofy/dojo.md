meta:
  id: ab-testing-copy-elements
  level: 3
  course: landing-page-copy
  type: output
  description: "Design and interpret A/B tests for landing page copy elements"
  tags: [landing-pages, ab-testing, experimentation, data-driven, advanced]

state: {}

trigger: |
  A/B testing transforms landing page optimization from guesswork to
  science. But most teams test the wrong things, stop tests too early,
  or draw incorrect conclusions. Headline tests alone can produce
  27-104% conversion lifts.

  You're running a testing program for a B2B SaaS landing page.
  Current conversion rate: 2.3% (850 conversions/month from 37,000 visits)

  Design 5 A/B tests:

  1. Headline test:
     - Control: "Automate Your Marketing Workflows"
     - Write 3 test variants with different angles:
       a) Benefit-specific angle
       b) Problem-focused angle
       c) Social proof angle
     - Hypothesis for each variant
     - Expected lift range
     - Sample size and duration calculation

  2. CTA button test:
     - Control: "Get Started Free"
     - Write 4 variants testing: action verb, specificity, urgency, outcome
     - Why CTA tests need larger sample sizes than headline tests

  3. Social proof test:
     - Control: Logo bar with 6 company logos
     - Variants:
       a) Logo bar + "Trusted by 2,000+ teams"
       b) Customer testimonial replacing logo bar
       c) Metric-focused ("$50M+ in revenue generated for customers")
     - Which variant to prioritize and why

  4. Form length test:
     - Control: 5 fields (Name, Email, Company, Phone, Team Size)
     - Variant: 2 fields (Email, Company)
     - Expected trade-off: more leads but lower quality
     - How to measure true value (lead quality, not just quantity)

  5. Page length test:
     - Control: Current page (1,500 words)
     - Variant: Condensed version (600 words)
     - What to cut and what to keep
     - How to measure engagement differences (scroll depth, time on page)

  For each test:
  - Statistical significance threshold and why 95% confidence matters
  - Minimum viable sample size
  - How long to run the test
  - What constitutes a winner (primary metric + guardrail metrics)
  - Common testing mistakes to avoid

assertions:
  - type: llm_judge
    criteria: "Sample size calculations are reasonable — acknowledges that detecting a 10% relative lift requires thousands of visitors per variant, and provides realistic test durations for the given traffic"
    weight: 0.25
    description: "Reasonable sample size calculations"
  - type: llm_judge
    criteria: "The form length test addresses the quality vs quantity trade-off — doesn't just measure form submissions but considers downstream metrics like lead quality, demo show rates, or SQL conversion"
    weight: 0.25
    description: "Quality vs quantity form trade-off"
  - type: llm_judge
    criteria: "Testing priorities are correct — tests are ordered by expected impact (headline > form > CTA > social proof > page length), not randomly"
    weight: 0.25
    description: "Correctly prioritized tests"
  - type: llm_judge
    criteria: "Common mistakes are identified — stopping tests early, testing too many variables at once, ignoring statistical significance, and not accounting for day-of-week or seasonal variation"
    weight: 0.25
    description: "Common testing mistakes identified"
