meta:
  id: webinar-registration-page
  level: 3
  course: landing-page-copy
  type: output
  description: "Write a webinar registration page that maximizes signups and attendance"
  tags: [landing-pages, webinar, registration, event, conversion]

state: {}

trigger: |
  Webinar registration pages need to solve two problems: getting signups
  AND getting people to actually attend. Average webinar attendance is
  40-50% of registrants, and registration page conversion rates range
  from 5-15%.

  Write a registration page for:
  Webinar: "How We Generated $2.4M in Pipeline from Content Marketing
  in 6 Months" (live event)
  Speaker: Marcus Chen, VP of Marketing at GrowthMetrics (B2B SaaS,
  Series B, $15M ARR)
  Date: Thursday, March 20, 2026 at 2:00 PM EST
  Duration: 45 minutes + 15 minute Q&A
  Target audience: B2B marketing leaders (Directors and VPs)

  Write the complete registration page:

  1. Headline and hook:
     - Headline with specific result (the $2.4M hook)
     - Subheadline that qualifies the audience
     - Why this webinar is worth 60 minutes of their time

  2. What attendees will learn:
     - 4-5 bullet points (specific and outcome-focused)
     - Each bullet answers "What will I be able to DO after this?"
     - Tease enough to create curiosity, not so much they don't need to attend

  3. Speaker bio section:
     - Marcus's credibility (specific achievements, not generic bio)
     - Why HE is qualified to teach this (results, not just titles)
     - Company context that adds credibility

  4. Registration form:
     - Field selection (email + what else?)
     - CTA button copy ("Register Now" vs "Save My Seat" vs other)
     - Capacity/urgency element
     - What happens after registration (calendar invite, reminder emails)

  5. Attendance-boosting elements:
     - "Add to calendar" functionality mention
     - Reminder email sequence copy (3 emails: confirmation, day before,
       30 minutes before)
     - Replay availability copy (show or don't show?)
     - The debate: does promising a replay decrease live attendance?

  6. Social proof and FOMO:
     - Past webinar results ("Last webinar: 1,200 attendees, 4.8/5 rating")
     - Live registration counter (if applicable)
     - Attendee company types

  7. Post-registration thank you page:
     - Confirmation copy
     - What to expect next
     - Referral CTA ("Know someone who'd benefit? Share this link")
     - Bonus: additional resource or pre-webinar content

assertions:
  - type: llm_judge
    criteria: "The learning bullets are outcome-focused — each describes what attendees will be able to DO ('replicate the exact content framework that generated $2.4M') not just what will be discussed"
    weight: 0.25
    description: "Outcome-focused learning bullets"
  - type: llm_judge
    criteria: "The speaker bio builds specific credibility — mentions concrete results and relevant experience, not generic 'thought leader' or 'passionate marketer' language"
    weight: 0.25
    description: "Specifically credible speaker bio"
  - type: llm_judge
    criteria: "The reminder email sequence is well-crafted — each email has a distinct purpose (confirmation with calendar link, anticipation builder, last-minute reminder with join link)"
    weight: 0.25
    description: "Well-crafted reminder sequence"
  - type: llm_judge
    criteria: "The replay debate is addressed — acknowledges the trade-off between promising replays (higher registrations) and withholding replays (higher live attendance) with a recommendation"
    weight: 0.25
    description: "Replay debate addressed"
