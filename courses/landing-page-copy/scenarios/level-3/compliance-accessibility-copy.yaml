meta:
  id: compliance-accessibility-copy
  level: 3
  course: landing-page-copy
  type: output
  description: "Write landing page copy that meets legal compliance and accessibility standards"
  tags: [landing-pages, compliance, accessibility, gdpr, legal]

state: {}

trigger: |
  Landing page compliance isn't optional — GDPR fines reach 4% of global
  revenue, ADA lawsuits are increasing, and FTC scrutiny on marketing
  claims is tightening. But compliance copy doesn't have to kill conversions.

  You're building a compliant landing page for:
  Product: HealthTrack — a wellness app that tracks nutrition, exercise,
  and sleep
  Markets: US, UK, EU (Germany, France)
  Data collected: Email, health data, location, usage analytics

  Write all compliance copy:

  1. Privacy and data collection:
     - Cookie consent banner copy (not just "We use cookies")
     - Privacy policy excerpt for the landing page
     - Data collection disclosure: what data, why, how long stored
     - GDPR-compliant consent checkboxes (no pre-ticked boxes)
     - CCPA "Do Not Sell My Information" link copy
     - How to make privacy copy reassuring, not alarming

  2. Health claims compliance:
     - The app tracks health metrics but can't make medical claims
     - Write 5 benefit statements that are strong but legally safe
     - Show the WRONG version of each (claim that crosses the line)
     - Disclaimer copy that protects without undermining trust
     - FTC guidelines for health-related marketing claims

  3. Accessibility (WCAG 2.1 AA):
     - Alt text for 5 typical landing page images
     - Aria labels for interactive elements (buttons, forms, toggles)
     - Color contrast requirements for text and CTA buttons
     - Copy structure for screen reader optimization
     - How to write for cognitive accessibility (plain language,
       clear structure)
     - Error messages that meet accessibility standards

  4. Terms and conditions:
     - Terms acceptance copy at the signup form
     - How to present terms without scaring users
     - "By signing up, you agree to..." vs explicit checkbox
     - When explicit consent is required (GDPR) vs implied (US)

  5. International compliance differences:
     - What changes between US, UK, and EU versions
     - Country-specific legal requirements
     - How to handle multiple compliance regimes on one page
     - When to create separate pages per market

assertions:
  - type: llm_judge
    criteria: "GDPR consent is correctly implemented — explicit opt-in (no pre-ticked boxes), clear purpose specification, and granular consent options that comply with GDPR requirements"
    weight: 0.25
    description: "Correctly implemented GDPR consent"
  - type: llm_judge
    criteria: "Health claims are legally safe — benefit statements describe the app's tracking capabilities without implying medical diagnosis, treatment, or health guarantees"
    weight: 0.25
    description: "Legally safe health claims"
  - type: llm_judge
    criteria: "Accessibility copy is complete — includes alt text, aria labels, and screen-reader-friendly structure that goes beyond checkboxes to genuine usability"
    weight: 0.25
    description: "Complete accessibility copy"
  - type: llm_judge
    criteria: "Compliance copy maintains conversion potential — privacy and legal copy is reassuring rather than alarming, positioned to build trust rather than create fear"
    weight: 0.25
    description: "Conversion-maintaining compliance copy"
