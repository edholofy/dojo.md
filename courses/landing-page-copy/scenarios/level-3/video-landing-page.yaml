meta:
  id: video-landing-page
  level: 3
  course: landing-page-copy
  type: output
  description: "Integrate video into landing pages for maximum conversion impact"
  tags: [landing-pages, video, multimedia, conversion, advanced]

state: {}

trigger: |
  Adding video to a landing page can increase conversions by up to 86%.
  But video can also hurt — if it slows load time, auto-plays with sound,
  or replaces important text copy. The key is strategic integration.

  You're creating a video-integrated landing page for:
  Product: ContractZen — AI-powered contract review tool for legal teams
  Goal: Demo request
  Target: General Counsel and legal operations managers

  Design the video landing page strategy:

  1. Video script for the hero section (60-second explainer):
     - Opening hook (first 5 seconds — critical for retention)
     - Problem statement (10 seconds)
     - Solution introduction (10 seconds)
     - How it works (20 seconds — 3 steps)
     - Social proof (5 seconds)
     - CTA (10 seconds)
     - Write the complete narration script with visual directions

  2. Video vs text strategy:
     - What the video covers that text doesn't need to repeat
     - What text covers that the video can't (scannable details,
       specific features, pricing)
     - How text and video complement each other
     - What to show visitors who don't watch the video

  3. Video placement and format:
     - Above-fold embedded vs below-fold
     - Auto-play (muted) vs click-to-play
     - Thumbnail selection (what makes people click play)
     - Video length optimization (why 60 seconds, not 3 minutes)
     - Mobile video considerations (data, screen size, context)

  4. Video testimonial section:
     - Script framework for 30-second customer testimonial videos
     - Questions to ask customers on camera
     - Why video testimonials outperform text by 80%+
     - How to get customers to agree to video testimonials

  5. Performance considerations:
     - Video impact on page load time
     - Lazy loading video strategy
     - Hosting options (embedded YouTube vs Vimeo vs self-hosted)
     - Core Web Vitals impact and mitigation
     - Fallback for no-video visitors

  6. Measuring video's conversion impact:
     - How to A/B test video vs no-video
     - Video engagement metrics (play rate, watch time, completion)
     - Correlation between video viewing and conversion

assertions:
  - type: llm_judge
    criteria: "The video script has a compelling 5-second hook — captures attention immediately with a relatable problem or surprising statistic, not a logo animation"
    weight: 0.25
    description: "Compelling 5-second video hook"
  - type: llm_judge
    criteria: "The text/video complementarity is well-designed — video handles emotion, demonstration, and overview while text provides scannable details, pricing, and feature specifics"
    weight: 0.25
    description: "Well-designed text-video complementarity"
  - type: llm_judge
    criteria: "Performance considerations are technical and practical — addresses lazy loading, hosting tradeoffs, CLS prevention, and the real impact of video on LCP"
    weight: 0.25
    description: "Technical performance considerations"
  - type: llm_judge
    criteria: "The measurement approach isolates video's impact — explains how to A/B test video presence, track play-to-conversion correlation, and determine whether video is actually helping"
    weight: 0.25
    description: "Impact-isolating measurement approach"
