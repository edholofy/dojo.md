meta:
  id: psychology-driven-copy
  level: 3
  course: landing-page-copy
  type: output
  description: "Apply behavioral psychology principles to landing page copy"
  tags: [landing-pages, psychology, behavioral, persuasion, advanced]

state: {}

trigger: |
  Behavioral psychology drives conversion. Loss aversion makes people feel
  the pain of missing out 2x more than equivalent gain. Anchoring makes
  the first number they see frame all subsequent judgments. Understanding
  these principles turns copywriting into conversion science.

  Apply 6 psychology principles to a landing page for:
  Product: MealPrep Pro — weekly meal planning and grocery delivery service
  Price: $89/week (includes groceries for a family of 4)
  Target: Busy dual-income parents

  For each principle:
  1. Explain the principle in one sentence
  2. Write the landing page copy that applies it
  3. Explain exactly how the principle is working in the copy
  4. Show a version that MISUSES the principle (and why it fails)

  Principles to apply:

  a) Loss aversion:
     - Frame the offer in terms of what they'll LOSE by not acting
     - vs what they'll GAIN by acting

  b) Anchoring:
     - Use price anchoring to make $89/week feel like a deal
     - First number they see sets their reference point

  c) Social proof:
     - Bandwagon effect: "12,000 families already..."
     - When specific numbers are more powerful than vague claims

  d) Reciprocity:
     - Give something valuable before asking for conversion
     - Free meal plan, recipe book, or consultation offer

  e) Commitment and consistency:
     - Small commitments that lead to larger ones
     - "Take the quiz" → personalized plan → trial → subscription

  f) Paradox of choice:
     - Why 3 plan options outperform 8 plan options
     - How to simplify decisions without limiting perceived value

  Then:
  7. Ethical boundaries:
     - Where persuasion becomes manipulation
     - Dark patterns to avoid
     - How to use psychology ethically in copywriting

assertions:
  - type: llm_judge
    criteria: "Each principle is correctly applied — loss aversion uses 'stop wasting' framing, anchoring references the higher alternative cost, social proof uses specific numbers, and each is clearly demonstrated in actual copy"
    weight: 0.30
    description: "Correctly applied psychology principles"
  - type: llm_judge
    criteria: "The misuse examples are clearly distinct from correct use — shows how overusing urgency becomes manipulation, how fake social proof erodes trust, and how aggressive anchoring feels deceptive"
    weight: 0.25
    description: "Clearly distinct misuse examples"
  - type: llm_judge
    criteria: "The anchoring strategy is effective — comparing $89/week to the higher cost of restaurants, grocery shopping time, or food waste makes the price feel reasonable"
    weight: 0.25
    description: "Effective anchoring strategy"
  - type: llm_judge
    criteria: "Ethical boundaries are clearly defined — distinguishes between legitimate persuasion (showing real benefits) and manipulation (fake urgency, hidden costs, dark patterns)"
    weight: 0.20
    description: "Clearly defined ethical boundaries"
