meta:
  id: post-click-experience
  level: 3
  course: landing-page-copy
  type: output
  description: "Design the complete post-click experience from ad to thank you page"
  tags: [landing-pages, post-click, user-journey, thank-you-page, funnel]

state: {}

trigger: |
  The landing page isn't the end — it's the middle of a journey. Message
  match from ad to landing page, and then to thank you page, confirmation
  email, and onboarding sequence creates a cohesive conversion experience.

  You're designing the complete post-click experience for:
  Product: HireRight — an AI recruiting platform
  Traffic source: LinkedIn Ads targeting HR Directors
  Goal: Demo booking

  Design every copy touchpoint:

  1. LinkedIn ad copy (the promise):
     - Headline and body text for the ad
     - The specific promise or hook that earns the click
     - Why message match matters (ad promise = page delivery)

  2. Landing page (the delivery):
     - Hero section that immediately mirrors the ad's promise
     - How to continue the exact conversation the ad started
     - Full page copy optimized for demo booking
     - CTA: "Book Your Demo" with supporting text

  3. Demo booking form/scheduler:
     - Form or Calendly-style scheduler copy
     - What information to collect (and why each field)
     - Scheduling UX copy (timezone, availability, duration)
     - What to tell them to expect in the demo

  4. Thank you / confirmation page:
     - Confirmation copy (what happens next, when)
     - Set expectations: who they'll meet, what to prepare
     - Secondary CTA: additional resource, case study, or referral ask
     - Calendar invite copy (subject line, description, attendees)

  5. Pre-demo email sequence (3 emails):
     - Email 1 (immediately): Confirmation with demo details
     - Email 2 (2 days before): Preparation email with agenda preview
     - Email 3 (1 hour before): Reminder with join link
     - Each email: subject line, body copy, CTA

  6. No-show recovery:
     - If they miss the demo: follow-up email copy
     - Rescheduling CTA (not guilt-tripping)
     - Alternative: offer a video demo instead

  7. Message consistency audit:
     - Map the exact message thread from ad → landing page → form →
       thank you → emails
     - Where message breaks typically occur
     - How to maintain consistent tone and promise throughout

assertions:
  - type: llm_judge
    criteria: "Message match is maintained throughout — the specific promise in the LinkedIn ad is directly reflected in the landing page headline, and the thread continues through every subsequent touchpoint"
    weight: 0.30
    description: "Maintained message match throughout"
  - type: llm_judge
    criteria: "The pre-demo emails serve distinct purposes — confirmation provides details, preparation builds anticipation and reduces no-shows, reminder provides easy access to join"
    weight: 0.25
    description: "Distinct purpose pre-demo emails"
  - type: llm_judge
    criteria: "The no-show recovery is helpful, not guilt-tripping — offers easy rescheduling and an alternative (video demo) rather than 'You missed your appointment!'"
    weight: 0.25
    description: "Helpful no-show recovery"
  - type: llm_judge
    criteria: "The thank you page includes a meaningful secondary CTA — a relevant case study, prep document, or referral ask that adds value rather than wasting the post-conversion attention"
    weight: 0.20
    description: "Meaningful secondary CTA"
