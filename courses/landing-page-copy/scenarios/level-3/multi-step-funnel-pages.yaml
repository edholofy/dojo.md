meta:
  id: multi-step-funnel-pages
  level: 3
  course: landing-page-copy
  type: output
  description: "Design copy for multi-step landing page funnels with progressive commitment"
  tags: [landing-pages, funnel, multi-step, progressive-commitment, advanced]

state: {}

trigger: |
  Multi-step funnels break a complex conversion into smaller, easier steps.
  The "breadcrumb technique" uses micro-commitments: answering easy questions
  before asking for email/payment. This can increase conversions by 120%.

  Design a multi-step funnel for:
  Product: FitCoach — personalized fitness coaching app
  Goal: Paid trial signup ($1 for first month, then $29/month)
  Target: Adults 25-45 wanting to get in shape but intimidated by gyms

  Design the 5-step funnel:

  Step 1: Quiz entry page
  - Headline: Hook that invites self-discovery
  - First question: Easy, non-threatening (e.g., "What's your fitness goal?")
  - 3-4 visual answer options (lose weight, build muscle, improve energy, etc.)
  - Why starting with a question works better than "Sign Up"

  Step 2: Personalization questions (3-4 questions)
  - Question 2: Current activity level (sedentary, moderate, active)
  - Question 3: Biggest obstacle (time, motivation, knowledge, injury)
  - Question 4: Preferred workout type (home, gym, outdoor, mixed)
  - Progress bar design and copy
  - Why each question increases investment in the outcome

  Step 3: Personalized results page
  - "Based on your answers..." personalized summary
  - Their ideal program description
  - Expected results (timeline and outcomes)
  - Social proof from people with similar profiles
  - Transition to the offer

  Step 4: Offer page
  - Headline connecting to their personalized results
  - The $1 trial offer with full explanation
  - What's included in the coaching program
  - Risk reversal (cancel anytime, money-back guarantee)
  - CTA: "Start My Personalized Plan — $1"

  Step 5: Payment and confirmation
  - Minimal payment form copy
  - Trust elements near payment fields
  - Order summary copy
  - "What happens next" explanation
  - Welcome email copy

  For the entire funnel:
  - Drop-off prediction: where people will leave and why
  - Copy interventions to reduce each drop-off point
  - Mobile optimization for each step
  - How to retarget funnel abandoners

assertions:
  - type: llm_judge
    criteria: "The questions progress from easy to committed — starts with a simple preference question, gradually asks more personal questions, building investment before asking for payment"
    weight: 0.25
    description: "Progressive commitment question flow"
  - type: llm_judge
    criteria: "The personalized results feel genuinely tailored — the copy changes based on the answers given (different messaging for 'lose weight' vs 'build muscle' goals), not a generic recommendation"
    weight: 0.25
    description: "Genuinely tailored personalization"
  - type: llm_judge
    criteria: "The $1 trial offer is positioned as low-risk — clearly explains what happens after the trial, how to cancel, and why $1 isn't a bait-and-switch"
    weight: 0.25
    description: "Low-risk positioned trial offer"
  - type: llm_judge
    criteria: "Drop-off predictions are realistic — identifies that the biggest drop-off is likely at Step 4 (payment) and Step 2 (question fatigue), with specific copy interventions for each"
    weight: 0.25
    description: "Realistic drop-off predictions"
