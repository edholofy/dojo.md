meta:
  id: comparison-landing-page
  level: 3
  course: landing-page-copy
  type: output
  description: "Write a competitor comparison landing page that wins without attacking"
  tags: [landing-pages, comparison, competitive, positioning, advanced]

state: {}

trigger: |
  "Alternative to [Competitor]" and "[Product A] vs [Product B]" pages
  capture high-intent traffic — people actively comparing solutions.
  These pages must be fair, specific, and persuasive without being
  aggressive or dishonest.

  Write comparison landing pages for:
  Your product: TaskMaster — project management tool for remote teams
  Competitor: Asana (well-known, enterprise-focused, complex)

  Create 2 comparison page versions:

  Version 1: "[Your Product] vs Asana" comparison page
  1. Headline: Position the comparison fairly
  2. At-a-glance comparison table:
     - 8 comparison criteria (features, pricing, ease of use, support, etc.)
     - How to present your advantages without misrepresenting the competitor
     - When to acknowledge the competitor is stronger (builds credibility)

  3. Detailed comparison sections:
     For 4 key comparison areas:
     - Your advantage explained (with specifics)
     - Fair acknowledgment of competitor's strengths
     - Why your advantage matters for the target audience

  4. Migration section:
     - "Switching from Asana?" subsection
     - How easy it is to migrate
     - Data import capabilities
     - Transition timeline and support

  5. Social proof from switchers:
     - Testimonials from people who switched FROM Asana
     - Specific results after switching
     - Common concerns about switching (addressed)

  Version 2: "Best Asana Alternative" landing page
  6. Different framing: you're not comparing, you're positioning as
     the alternative for people who've already decided Asana isn't right
  7. What's different about this page vs the comparison page
  8. When someone searches "Asana alternative" vs "vs Asana" — different intent

  For both versions:
  - Legal and ethical guidelines for competitor comparison pages
  - What you can and cannot say about competitors
  - FTC and advertising law considerations

assertions:
  - type: llm_judge
    criteria: "The comparison table is fair — acknowledges areas where Asana genuinely excels (enterprise features, brand recognition) while highlighting TaskMaster's advantages for remote teams"
    weight: 0.25
    description: "Fair comparison table"
  - type: llm_judge
    criteria: "The two versions target different search intents — 'vs' searches want balanced comparison while 'alternative' searches want validation for switching, and the copy reflects this"
    weight: 0.25
    description: "Intent-matched page versions"
  - type: llm_judge
    criteria: "Switcher testimonials are specific — include what they switched FROM, what was wrong, and what improved after switching, not just generic praise"
    weight: 0.25
    description: "Specific switcher testimonials"
  - type: llm_judge
    criteria: "Legal and ethical guidelines are practical — mentions what can't be claimed without evidence, how to handle competitor trademarks, and when comparison claims need substantiation"
    weight: 0.25
    description: "Practical legal ethical guidelines"
