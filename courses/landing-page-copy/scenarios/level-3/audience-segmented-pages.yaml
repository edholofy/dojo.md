meta:
  id: audience-segmented-pages
  level: 3
  course: landing-page-copy
  type: output
  description: "Create audience-specific landing page variations for different segments"
  tags: [landing-pages, segmentation, personalization, targeting, advanced]

state: {}

trigger: |
  One landing page rarely converts all audience segments equally. Creating
  segment-specific variations with tailored messaging can increase
  conversion rates by 30-50%. The copy changes, not the product.

  Product: DataSync — a data integration platform
  3 target segments with different needs:

  Segment A: CTOs at startups (technical, price-sensitive, move fast)
  Segment B: VP of IT at enterprise (risk-averse, compliance-focused, committee decisions)
  Segment C: Data engineers (hands-on, feature-focused, hate sales-speak)

  For each segment, write a tailored landing page hero section and key copy:

  1. Segment A — Startup CTO:
     - Headline (emphasizes: speed, simplicity, developer-friendly)
     - Subheadline (speaks to startup constraints)
     - Key selling points (3 bullets: technical + affordable + fast)
     - CTA (low friction: "Start Building" or similar)
     - Social proof (startup logos, developer testimonials)
     - Tone: direct, technical but not enterprise-speak

  2. Segment B — Enterprise VP of IT:
     - Headline (emphasizes: reliability, security, compliance)
     - Subheadline (speaks to enterprise requirements)
     - Key selling points (3 bullets: security + scalability + support)
     - CTA (higher consideration: "Schedule Demo" or "Talk to Sales")
     - Social proof (enterprise logos, compliance certifications)
     - Tone: professional, trust-building, risk-reducing

  3. Segment C — Data Engineer:
     - Headline (emphasizes: technical capabilities, flexibility)
     - Subheadline (speaks to engineering pain points)
     - Key selling points (3 bullets: API + documentation + performance)
     - CTA (developer-style: "View Docs" or "Try the API")
     - Social proof (GitHub stars, Stack Overflow mentions, tech community)
     - Tone: no-nonsense, technical, show-don't-tell

  Then provide:
  4. Routing strategy:
     - How to send each segment to the right page
     - Ad copy → landing page message match
     - URL parameters and UTM-based routing
     - When to use one page with dynamic content vs separate pages

  5. Shared vs unique elements:
     - What stays the same across all 3 versions
     - What changes (and why each change matters)

assertions:
  - type: llm_judge
    criteria: "Each segment gets genuinely different messaging — not just word swaps but fundamentally different value propositions, pain points, and trust signals tailored to each persona"
    weight: 0.30
    description: "Genuinely different segment messaging"
  - type: llm_judge
    criteria: "The tone shifts are appropriate — startup CTO copy is direct and informal, enterprise copy is professional and risk-reducing, data engineer copy is technical and jargon-appropriate"
    weight: 0.25
    description: "Appropriate tone shifts per segment"
  - type: llm_judge
    criteria: "CTAs match the segment's decision process — startups self-serve ('Start Building'), enterprise committees need sales engagement ('Schedule Demo'), engineers want to evaluate independently ('View Docs')"
    weight: 0.25
    description: "Decision-process-matched CTAs"
  - type: llm_judge
    criteria: "The routing strategy is practical — explains how ad campaigns, UTM parameters, and page variations work together to ensure message match from ad to landing page"
    weight: 0.20
    description: "Practical routing strategy"
