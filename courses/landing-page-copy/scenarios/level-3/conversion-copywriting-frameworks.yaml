meta:
  id: conversion-copywriting-frameworks
  level: 3
  course: landing-page-copy
  type: output
  description: "Apply multiple copywriting frameworks to the same landing page and compare results"
  tags: [landing-pages, frameworks, aida, bab, copywriting, advanced]

state: {}

trigger: |
  Different copywriting frameworks produce different page structures and
  emotional arcs. The best framework depends on the audience, product,
  and where the visitor is in their awareness journey.

  Apply 4 frameworks to the SAME product and compare:
  Product: VoiceFlow — AI customer service chatbot for e-commerce
  Target: E-commerce store owners with 1,000-10,000 orders/month
  Goal: Start free trial
  Price: Free trial, then $99/month

  Write the complete landing page using each framework:

  1. AIDA (Attention, Interest, Desire, Action):
     - Attention: Bold, pattern-interrupting headline
     - Interest: Connect to their pain points and curiosity
     - Desire: Paint the picture of the transformed business
     - Action: Compelling CTA that feels like the natural next step
     - Write the full page copy

  2. PAS (Problem, Agitate, Solution):
     - Problem: Name the specific problems they face
     - Agitate: Make the problems feel urgent
     - Solution: Present VoiceFlow as the relief
     - Write the full page copy

  3. BAB (Before, After, Bridge):
     - Before: Their current frustrating reality
     - After: The ideal state with the problem solved
     - Bridge: VoiceFlow is how they get from Before to After
     - Write the full page copy

  4. StoryBrand (Character, Problem, Guide, Plan, CTA, Failure, Success):
     - Character: The e-commerce owner (hero)
     - Problem: External, internal, and philosophical problems
     - Guide: VoiceFlow as the experienced guide
     - Plan: 3 simple steps to implement
     - CTA: Direct and transitional CTAs
     - Failure: What happens without action
     - Success: The transformation
     - Write the full page copy

  Then:
  5. Framework comparison:
     - Which framework works best for THIS product and audience? Why?
     - When to use each framework (product type, audience awareness)
     - Can frameworks be combined? Show a hybrid approach

assertions:
  - type: llm_judge
    criteria: "All 4 frameworks are correctly applied — each follows its specific structure and produces a genuinely different page flow, not the same content reorganized"
    weight: 0.30
    description: "Correctly applied distinct frameworks"
  - type: llm_judge
    criteria: "The comparison analysis has a clear recommendation — identifies which framework best suits e-commerce store owners evaluating AI chatbots, with specific reasoning"
    weight: 0.25
    description: "Clear framework recommendation"
  - type: llm_judge
    criteria: "Each framework's copy is complete enough to judge — includes headline, key sections, and CTA for each, not just outlines"
    weight: 0.25
    description: "Complete copy per framework"
  - type: llm_judge
    criteria: "The StoryBrand version correctly uses the customer as hero — positions VoiceFlow as the guide, not the hero, and identifies external, internal, and philosophical problems"
    weight: 0.20
    description: "Correct StoryBrand customer-as-hero"
