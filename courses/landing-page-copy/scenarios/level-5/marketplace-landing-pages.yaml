meta:
  id: marketplace-landing-pages
  level: 5
  course: landing-page-copy
  type: output
  description: "Design landing pages for two-sided marketplace platforms"
  tags: [landing-pages, marketplace, two-sided, platform, mastery]

state: {}

trigger: |
  Two-sided marketplace landing pages face a unique challenge: you need
  to convert TWO different audiences (buyers and sellers) whose needs
  often conflict. Uber needs both drivers and riders. Airbnb needs both
  hosts and guests. Your messaging must serve both sides without
  confusing either.

  You're launching a marketplace:
  Platform: SkillMatch — connecting freelance specialists with companies
  for short-term projects (1-4 weeks)
  Side A: Companies needing specialized talent (demand side)
  Side B: Freelance specialists looking for projects (supply side)
  Verticals: Design, Engineering, Data Science, Marketing

  Design the landing page system:

  1. Homepage / main landing page:
     - How to address both sides without confusing either
     - Split messaging strategy vs unified messaging
     - Visual design: how to clearly separate the two paths
     - Write the hero section that speaks to both audiences
     - Dual CTA: "Find Talent" and "Find Projects"
     - When to show one side vs both

  2. Demand-side landing page (companies hiring):
     - Headline focused on speed, quality, and reduced hiring friction
     - Pain points: traditional hiring is slow, expensive, risky
     - How SkillMatch solves each pain point
     - Social proof: companies that found great talent
     - Quality guarantee and vetting process
     - CTA: "Post Your First Project Free"
     - Write the complete page

  3. Supply-side landing page (freelancers joining):
     - Headline focused on quality projects, fair pay, and flexibility
     - Pain points: finding clients is hard, payment is uncertain
     - How SkillMatch is different from Upwork/Fiverr (no race to bottom)
     - Social proof: freelancer earnings and project quality
     - Application process (not just signup — vetting builds exclusivity)
     - CTA: "Apply to Join"
     - Write the complete page

  4. Vertical-specific landing pages:
     - Design-specific page (targeting design agencies and freelancers)
     - How to adapt messaging per vertical
     - Vertical-specific social proof and case studies
     - When generic vs vertical-specific pages perform better

  5. Chicken-and-egg strategy:
     - When you have no supply: how to attract freelancers with no projects
     - When you have no demand: how to attract companies with few freelancers
     - Landing page copy for each cold-start scenario
     - How messaging evolves as the marketplace matures

  6. Trust building for marketplace:
     - Payment protection messaging (escrow, milestones)
     - Dispute resolution process
     - Vetting and quality standards
     - Insurance and legal protections
     - How marketplace trust differs from SaaS trust

assertions:
  - type: llm_judge
    criteria: "The two-sided messaging correctly addresses different motivations — companies care about speed and quality while freelancers care about project quality and fair pay, and the copy reflects this"
    weight: 0.25
    description: "Correctly different two-sided messaging"
  - type: llm_judge
    criteria: "The chicken-and-egg strategy is practical — provides specific copy approaches for launching with insufficient supply or demand, acknowledging this is the marketplace's core challenge"
    weight: 0.25
    description: "Practical chicken-and-egg strategy"
  - type: llm_judge
    criteria: "The homepage dual-CTA approach is well-designed — visitors can quickly identify which side they belong to and navigate to the right experience without confusion"
    weight: 0.25
    description: "Well-designed dual-CTA homepage"
  - type: llm_judge
    criteria: "The supply-side page creates exclusivity — the 'Apply to Join' framing positions the platform as selective, which attracts higher-quality freelancers rather than a free-for-all"
    weight: 0.25
    description: "Exclusivity-creating supply-side page"
