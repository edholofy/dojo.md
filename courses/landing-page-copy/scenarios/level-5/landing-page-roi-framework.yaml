meta:
  id: landing-page-roi-framework
  level: 5
  course: landing-page-copy
  type: output
  description: "Build a comprehensive ROI measurement framework for landing page optimization"
  tags: [landing-pages, roi, measurement, attribution, business-impact]

state: {}

trigger: |
  Landing page optimization is one of the highest-ROI marketing activities,
  but proving it requires rigorous measurement. A 1% conversion rate
  improvement can mean millions in revenue — but only if you can attribute
  and track it.

  Company: CloudSecurity Pro — B2B cybersecurity SaaS
  ARR: $30M
  Monthly ad spend: $200,000 across Google Ads, LinkedIn, and Facebook
  Average deal size: $25,000/year
  Current landing page conversion rate: 2.8%
  Monthly landing page visits: 35,000
  Lead-to-opportunity rate: 15%
  Opportunity-to-close rate: 22%

  Build the complete ROI framework:

  1. Revenue attribution model:
     - Calculate current monthly pipeline from landing pages
     - Calculate current monthly revenue attributable to landing pages
     - Cost per conversion and cost per customer via landing pages
     - CAC comparison: landing pages vs other channels
     - Show the complete funnel math from visit → conversion → SQL →
       opportunity → closed deal → revenue

  2. Conversion improvement scenarios:
     Model 3 scenarios:
     a) Conservative: 2.8% → 3.5% conversion (+0.7%)
     b) Moderate: 2.8% → 4.5% conversion (+1.7%)
     c) Aggressive: 2.8% → 6.0% conversion (+3.2%)
     For each: additional monthly leads, pipeline, and closed revenue
     Show the annual revenue impact of each scenario

  3. Investment justification:
     - Cost to achieve each scenario (team, tools, time)
     - Payback period for the CRO investment
     - ROI calculation: (revenue gained - cost of optimization) / cost
     - Compare to alternative investments (more ad spend, more content, etc.)
     - Build a business case presentation for the CFO

  4. Measurement infrastructure:
     - What to track and which tools to use
     - Landing page → CRM integration for full-funnel tracking
     - Multi-touch attribution for landing pages in longer sales cycles
     - How to handle 90+ day sales cycles in attribution
     - Conversion rate trending and anomaly detection

  5. Beyond conversion rate:
     - Lead quality scoring (not all conversions are equal)
     - Revenue per visitor as a north star metric
     - Lifetime value of customers acquired through landing pages
     - Brand impact: does better landing page copy improve brand perception?
     - Competitive impact: how conversion improvements affect market share

  6. Reporting cadence and audience:
     - Weekly: conversion metrics for the optimization team
     - Monthly: performance report for marketing leadership
     - Quarterly: business impact review for executive team
     - Annually: strategic ROI review for the board
     - Write a sample executive summary for the quarterly review

assertions:
  - type: llm_judge
    criteria: "The funnel math is correct — starting from 35,000 visits at 2.8% conversion through to revenue, with each stage using the provided rates to calculate realistic pipeline and revenue numbers"
    weight: 0.30
    description: "Correct funnel math calculations"
  - type: llm_judge
    criteria: "The investment justification is CFO-ready — compares CRO investment to alternative marketing spend, shows payback period, and presents ROI in financial terms executives understand"
    weight: 0.25
    description: "CFO-ready investment justification"
  - type: llm_judge
    criteria: "The measurement infrastructure addresses B2B complexity — handles 90+ day sales cycles, multi-touch attribution, and the challenge of connecting landing page conversions to closed revenue"
    weight: 0.25
    description: "B2B-complex measurement infrastructure"
  - type: llm_judge
    criteria: "The reporting cadence matches audience needs — weekly reports are tactical for the team, monthly reports show trends for leadership, and quarterly reviews connect to business impact"
    weight: 0.20
    description: "Audience-matched reporting cadence"
