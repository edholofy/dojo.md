meta:
  id: conversion-psychology-mastery
  level: 5
  course: landing-page-copy
  type: output
  description: "Master advanced conversion psychology for landing page optimization"
  tags: [landing-pages, psychology, behavioral-science, advanced-persuasion, mastery]

state: {}

trigger: |
  Beyond basic psychology principles (scarcity, social proof, loss aversion),
  advanced conversion psychology draws from behavioral economics, cognitive
  science, and decision theory. These principles explain why people make
  irrational decisions — and how to design for those decisions ethically.

  You're a conversion psychologist designing a landing page system for:
  Company: InvestWise — a robo-advisor platform for first-time investors
  Challenge: Getting risk-averse people to trust an algorithm with their money
  Target: Millennials with $10K-$100K in savings, currently in savings accounts

  Apply advanced psychology:

  1. Cognitive biases that affect financial decisions:
     For each bias, explain how it manifests and write landing page copy
     that works WITH the bias (not against it):

     a) Status quo bias: "My money is fine in savings" — how to overcome
        inertia without creating anxiety
     b) Ambiguity aversion: Uncertainty about investing outcomes — how to
        make the unknown feel safe
     c) Present bias: Prioritizing today over retirement — how to make
        the future feel concrete
     d) Dunning-Kruger in reverse: "I'm not smart enough to invest" —
        how to build confidence without condescension
     e) Endowment effect: Reluctance to "spend" savings — reframe
        investing as growing, not spending

  2. Decision architecture on the page:
     - How choice architecture influences which plan visitors choose
     - Default options: what to pre-select and why
     - Comparison framing: how to present investment options
     - Information sequencing: what to show first to anchor perception
     - Cognitive load management: simplifying complex financial decisions

  3. Trust-building for algorithm-averse audiences:
     - Anthropomorphizing the algorithm ("Meet your AI advisor, Alex")
     - Transparency: showing how the algorithm makes decisions
     - Control illusion: giving users knobs and dials that make them
       feel in control
     - Social proof from people who were also skeptical
     - Authority transfer: human experts behind the algorithm

  4. Emotional design for financial products:
     - Fear vs aspiration: when to use each emotional driver
     - Progress visualization: showing compound growth over decades
     - Loss framing vs gain framing for different audience segments
     - The "regret minimization" framework for CTA design
     - Write 3 emotionally distinct hero sections for the same product

  5. Ethical considerations:
     - When behavioral design becomes manipulation in financial services
     - SEC/FINRA implications of psychology-driven marketing
     - Dark patterns specific to financial products
     - How to test for unintended psychological harm
     - The responsibility of applying psychology to financial decisions

assertions:
  - type: llm_judge
    criteria: "Each cognitive bias is correctly identified and addressed — the copy works WITH the bias rather than trying to educate it away, which is more effective and more respectful"
    weight: 0.25
    description: "Correctly addressed cognitive biases"
  - type: llm_judge
    criteria: "The decision architecture recommendations are specific — not just 'simplify choices' but specific default selections, comparison framing, and information ordering for investment products"
    weight: 0.25
    description: "Specific decision architecture"
  - type: llm_judge
    criteria: "The 3 emotionally distinct hero sections demonstrate range — one fear-based, one aspiration-based, and one logic-based, all for the same product, showing how emotional framing changes the entire page feel"
    weight: 0.25
    description: "Emotionally distinct hero sections"
  - type: llm_judge
    criteria: "Ethics are substantively addressed — specifically identifies where behavioral design crosses into manipulation for financial products, with SEC/FINRA compliance considerations"
    weight: 0.25
    description: "Substantive financial ethics"
