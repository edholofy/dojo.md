meta:
  id: enterprise-landing-page-governance
  level: 5
  course: landing-page-copy
  type: output
  description: "Design enterprise-level landing page governance for large organizations"
  tags: [landing-pages, enterprise, governance, scale, mastery]

state: {}

trigger: |
  At enterprise scale (500+ landing pages across multiple products, teams,
  and markets), landing page management becomes an organizational challenge.
  Without governance, you get: inconsistent messaging, brand violations,
  compliance risks, duplicate pages, and wasted ad spend.

  You're the Director of Digital Experience at a Fortune 500 technology
  company with:
  - 800+ live landing pages across 12 product lines
  - 6 regional marketing teams creating pages independently
  - 4 different page builders and CMS platforms in use
  - No centralized page inventory or performance tracking
  - Recent brand violation on a landing page that went viral (negative PR)
  - Legal team flagged 23 compliance issues in a random audit

  Design the enterprise landing page governance system:

  1. Inventory and audit:
     - How to catalog 800+ existing pages
     - Quality scoring framework (brand compliance, performance,
       legal compliance, technical quality)
     - Triage: which pages to keep, update, redirect, or delete
     - Ongoing inventory management

  2. Governance framework:
     - Roles and responsibilities (centralized team vs regional teams)
     - Approval workflow by page type:
       a) Standard pages: self-service with template → auto-approve
       b) Custom pages: regional creation → central review
       c) Regulated content: creation → legal review → compliance sign-off
     - SLA for review turnaround (don't create bottlenecks)
     - Escalation process for urgent pages

  3. Standards and templates:
     - Brand-compliant page templates (modular, customizable within bounds)
     - Copy guidelines: required elements, prohibited language
     - Legal copy blocks: pre-approved disclaimers, privacy notices
     - Accessibility standards (WCAG 2.1 AA minimum)
     - Technical standards (load time, mobile performance, tracking)

  4. Technology standardization:
     - Consolidating from 4 platforms to 1-2
     - Platform evaluation criteria
     - Migration plan for existing pages
     - Integration with analytics, CRM, and ad platforms

  5. Training and enablement:
     - Self-service training for regional teams
     - Certification program for page creators
     - Resource library (templates, copy blocks, best practices)
     - Office hours for questions and reviews

  6. Performance management:
     - Centralized analytics dashboard for all 800+ pages
     - Automated alerts for underperforming pages
     - Quarterly performance reviews by product line and region
     - Benchmarking: how to compare pages across different products/markets

  7. Compliance management:
     - Automated compliance scanning
     - Pre-approved copy blocks for regulated industries
     - Audit frequency and process
     - Incident response: what to do when a violation is discovered

assertions:
  - type: llm_judge
    criteria: "The governance framework balances control with speed — doesn't create bottlenecks that slow marketing campaigns while maintaining quality and compliance standards"
    weight: 0.25
    description: "Speed-balanced governance framework"
  - type: llm_judge
    criteria: "The compliance management system is proactive — includes automated scanning, pre-approved copy blocks, and regular audits rather than just reacting to discovered violations"
    weight: 0.25
    description: "Proactive compliance management"
  - type: llm_judge
    criteria: "The template system enables self-service — regional teams can create compliant pages independently using modular templates, reducing central team bottlenecks"
    weight: 0.25
    description: "Self-service enabling templates"
  - type: llm_judge
    criteria: "The platform consolidation plan is realistic — acknowledges that migrating from 4 platforms takes time, has risk, and requires stakeholder buy-in across 12 product lines"
    weight: 0.25
    description: "Realistic platform consolidation"
