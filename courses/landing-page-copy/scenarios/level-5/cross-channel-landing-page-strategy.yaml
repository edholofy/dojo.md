meta:
  id: cross-channel-landing-page-strategy
  level: 5
  course: landing-page-copy
  type: output
  description: "Design landing pages optimized for different traffic channels"
  tags: [landing-pages, cross-channel, traffic-sources, message-match, mastery]

state: {}

trigger: |
  Visitors from different channels have different intent, awareness levels,
  and expectations. A visitor from a Google search ad is actively looking
  for a solution. A visitor from a Facebook ad may not even know they have
  a problem. Same product, different copy, different page.

  Product: ClearCRM — CRM for small service businesses
  (plumbers, electricians, HVAC, landscapers)
  Price: $49/month per user

  Design channel-specific landing pages for 6 traffic sources:

  1. Google Search (high intent — searching "CRM for plumbers"):
     - Visitor mindset: actively looking for a solution
     - Headline: directly answer their search query
     - Copy approach: comparison-focused, feature-rich, pricing upfront
     - CTA: direct signup or free trial
     - Page length: medium (they want to evaluate, not be educated)

  2. Facebook/Meta Ads (low intent — interest-based targeting):
     - Visitor mindset: interrupted, wasn't looking for a CRM
     - Headline: lead with the pain point, not the product
     - Copy approach: problem-agitate-solution, emotional
     - CTA: low commitment ("See How It Works" video)
     - Page length: shorter (they need to be hooked quickly)

  3. LinkedIn Ads (professional intent — targeting business owners):
     - Visitor mindset: business-focused, evaluating improvements
     - Headline: business outcomes and professionalism
     - Copy approach: ROI-focused, case studies prominent
     - CTA: demo request or ROI calculator
     - Page length: medium-long (B2B decision-making needs details)

  4. Email (warm traffic — existing newsletter subscribers):
     - Visitor mindset: already familiar with the brand
     - Headline: continuation of the email's promise
     - Copy approach: skip the education, go straight to offer
     - CTA: direct signup with subscriber discount
     - Page length: short (they already know you)

  5. Organic/SEO (informational → commercial bridge):
     - Visitor mindset: researching, not ready to buy
     - Headline: educational with subtle product positioning
     - Copy approach: content-first, product mention secondary
     - CTA: soft (free guide, quiz, or newsletter)
     - Page length: longer (content-driven, SEO-optimized)

  6. Referral/Partner (trust-transferred):
     - Visitor mindset: recommended by someone they trust
     - Headline: acknowledge the referral source
     - Copy approach: leverage transferred trust, exclusive offer
     - CTA: special referral signup with bonus
     - Page length: short (trust is pre-built)

  For each channel:
  - Write the hero section (headline, subheadline, CTA)
  - Why this copy approach works for this channel
  - What would fail if you used a different channel's approach

  Then:
  7. Message match audit framework:
     - How to ensure ad copy matches landing page copy per channel
     - Dynamic text replacement strategy
     - Performance comparison across channels

assertions:
  - type: llm_judge
    criteria: "Each channel gets genuinely different copy — Google Search is direct and feature-focused while Facebook is emotional and problem-led, reflecting the actual mindset differences"
    weight: 0.30
    description: "Genuinely different channel copy"
  - type: llm_judge
    criteria: "The CTA ladder matches channel intent — high-intent channels get direct signup CTAs while low-intent channels get educational CTAs, with clear reasoning for each"
    weight: 0.25
    description: "Intent-matched CTA ladder"
  - type: llm_judge
    criteria: "The email channel correctly leverages existing familiarity — skips brand introduction and goes directly to the offer with subscriber-specific benefits"
    weight: 0.25
    description: "Correctly leveraged email familiarity"
  - type: llm_judge
    criteria: "The failure analysis for wrong approaches is insightful — explains why using a Facebook approach on Google Search would fail (too emotional for someone actively searching) and vice versa"
    weight: 0.20
    description: "Insightful wrong-approach failure analysis"
