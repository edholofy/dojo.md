meta:
  id: crisis-landing-pages
  level: 5
  course: landing-page-copy
  type: output
  description: "Create landing pages for crisis situations and rapid-response campaigns"
  tags: [landing-pages, crisis, rapid-response, reputation, mastery]

state: {}

trigger: |
  Crisis landing pages must be deployed rapidly when your brand faces
  a PR crisis, a competitor makes a major move, or market conditions
  shift suddenly. Speed and message control are critical.

  Design crisis landing pages for 4 scenarios:

  1. Data breach response:
     Your SaaS company experienced a security breach affecting 50,000
     user accounts. You need a landing page within 4 hours.
     Write:
     - Headline: transparent, not defensive
     - What happened (honest, specific)
     - What you're doing about it (immediate actions)
     - What affected users should do (clear steps)
     - FAQ addressing common questions
     - Contact information for concerned customers
     - Tone: empathetic, responsible, proactive
     - What NOT to say (lawyer-reviewed caution points)

  2. Competitor acquisition landing page:
     Your main competitor just announced they're being acquired by a large
     corporation. Their customers are nervous about changes.
     Write:
     - Headline: welcoming without being predatory
     - Why their customers should consider switching
     - Migration offer (extended trial, data import support)
     - CTA: "Explore Your Options" (soft, not aggressive)
     - Timeline: availability of this offer
     - Tone: helpful, not opportunistic

  3. Market disruption landing page:
     A new regulation (like GDPR) just passed that significantly affects
     your industry. You need to position your product as the solution.
     Write:
     - Headline: acknowledge the regulation, position as ready
     - How your product helps with compliance
     - Urgency: compliance deadline approaching
     - Educational content: what the regulation means
     - CTA: compliance audit or demo
     - Tone: authoritative, helpful, not fear-mongering

  4. Product crisis / major outage:
     Your product experienced a 12-hour outage affecting all customers.
     Write:
     - Status page messaging during the outage
     - Post-mortem landing page after resolution
     - What went wrong (transparent root cause analysis)
     - What you're doing to prevent it (specific improvements)
     - Customer compensation offer (if appropriate)
     - Rebuilding trust: actions speak louder than apologies

  For all scenarios:
  - Template structure for rapid deployment (pre-built, fill in specifics)
  - Approval workflow for crisis pages (who must sign off, in what order)
  - How crisis landing pages differ from regular marketing pages
  - Measuring success: what metrics matter for crisis pages

assertions:
  - type: llm_judge
    criteria: "The data breach page is transparent and honest — admits the breach clearly, explains what data was affected, and provides specific steps for users rather than vague corporate language"
    weight: 0.25
    description: "Transparent honest breach page"
  - type: llm_judge
    criteria: "The competitor acquisition page is welcoming but not predatory — offers genuine help to concerned customers without aggressively attacking the competitor or their decision"
    weight: 0.25
    description: "Welcoming non-predatory competitor page"
  - type: llm_judge
    criteria: "The crisis template allows rapid deployment — pre-built structure with fill-in sections that could be customized and launched within 4 hours by any team member"
    weight: 0.25
    description: "Rapid-deployment crisis template"
  - type: llm_judge
    criteria: "The post-mortem page builds trust through transparency — specific root cause, specific prevention measures, and customer compensation demonstrate accountability"
    weight: 0.25
    description: "Trust-building post-mortem page"
