meta:
  id: full-landing-page-system
  level: 5
  course: landing-page-copy
  type: output
  description: "Design a complete landing page ecosystem for a growing SaaS company"
  tags: [landing-pages, ecosystem, system-design, strategy, mastery]

state: {}

trigger: |
  You've been hired as Head of Conversion at a Series B SaaS company
  (customer data platform). The company has:
  - 1 generic landing page for all traffic (converting at 1.4%)
  - $500K/month in paid media driving traffic
  - 6 buyer personas across 4 industries
  - 3 products (CDP, analytics, personalization)
  - Competitors: Segment, Amplitude, Mixpanel

  At 1.4% conversion, you're wasting $493K/month of the ad spend.
  The CEO wants 4%+ conversion within 12 months.

  Design the complete landing page ecosystem:

  1. Landing page architecture:
     - How many landing pages you need (and why)
     - Mapping: product × persona × traffic source × funnel stage
     - Priority: which pages to build first (highest traffic, lowest
       conversion = biggest opportunity)
     - Landing page types needed: product pages, comparison pages,
       use case pages, industry pages, event pages, content offer pages
     - Template strategy: custom vs templated pages

  2. Copy strategy per page type:
     For each page type, define:
     - Messaging hierarchy (primary message, secondary, tertiary)
     - Copy length and structure
     - Required proof points and trust elements
     - CTA strategy (primary and secondary)
     - Write the hero section for 3 representative pages

  3. Ad-to-page message match system:
     - How to ensure every ad matches its landing page
     - Dynamic text replacement strategy
     - Campaign-level copy coordination
     - Quality assurance: preventing message mismatch

  4. Testing and optimization roadmap:
     - Phase 1 (Months 1-3): Build and launch core pages
     - Phase 2 (Months 4-6): Test and optimize top performers
     - Phase 3 (Months 7-9): Expand page coverage
     - Phase 4 (Months 10-12): Advanced personalization and AI
     - Monthly test velocity targets
     - Expected conversion lift per phase

  5. Team and process:
     - Roles needed: copywriter, designer, developer, CRO analyst
     - Production workflow: brief → draft → review → build → launch → test
     - Turnaround time targets per page type
     - Quality gate at each stage

  6. Measurement framework:
     - Page-level metrics (conversion rate, bounce rate, engagement)
     - Campaign-level metrics (cost per conversion, ROAS improvement)
     - Portfolio metrics (average conversion across all pages)
     - Revenue attribution: from page conversion to closed deal
     - Board-level reporting: how to present conversion improvements
       as revenue impact

  7. Budget and ROI projection:
     - Investment needed (team, tools, ad spend reallocation)
     - Expected ROI: what does moving from 1.4% to 4%+ mean for revenue?
     - Break-even point for the conversion optimization investment

assertions:
  - type: llm_judge
    criteria: "The page architecture is derived from a clear matrix — product × persona × traffic source creates a logical page inventory rather than ad hoc page creation"
    weight: 0.25
    description: "Matrix-derived page architecture"
  - type: llm_judge
    criteria: "The ROI projection is compelling — clearly shows how moving from 1.4% to 4% conversion on $500K/month ad spend dramatically changes the unit economics and revenue potential"
    weight: 0.25
    description: "Compelling ROI projection"
  - type: llm_judge
    criteria: "The phased roadmap is realistic — acknowledges that building 50+ pages takes time, starts with highest-impact pages, and progressively adds complexity"
    weight: 0.25
    description: "Realistic phased roadmap"
  - type: llm_judge
    criteria: "Ad-to-page message match is systematically addressed — not just 'make sure ads match pages' but a specific system for dynamic text replacement and campaign coordination"
    weight: 0.25
    description: "Systematic message match"
