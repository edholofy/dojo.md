meta:
  id: landing-page-agency
  level: 5
  course: landing-page-copy
  type: output
  description: "Build and operate a landing page optimization agency"
  tags: [landing-pages, agency, business, client-management, mastery]

state: {}

trigger: |
  You're launching a landing page optimization agency — a specialized
  service that helps companies improve their landing page conversion rates.
  This is a high-value service because even small conversion improvements
  can generate millions in additional revenue for clients.

  Design the complete agency operation:

  1. Service offering:
     Design 3 service packages:
     a) Landing Page Audit ($2,500 one-time):
        - Deliverables: heuristic analysis, data review, recommendations
        - What the client receives (report format)
        - Timeline: 2 weeks

     b) Landing Page Creation ($5,000-$15,000 per page):
        - Discovery, copy, design, development, testing
        - What determines the price range
        - Timeline and revision process
        - Deliverables at each stage

     c) Ongoing CRO Retainer ($5,000-$15,000/month):
        - Monthly optimization, testing, reporting
        - Number of tests per month
        - Monthly strategy review
        - Performance guarantees (if any)

  2. Client acquisition:
     - How to demonstrate your value (case studies, before/after data)
     - Ideal client profile (industries, company size, ad spend)
     - Sales process: discovery call → audit → proposal → engagement
     - Red flags: clients to avoid (no traffic, unrealistic expectations)
     - How to price based on value delivered (% of ad spend saved or
       revenue generated)

  3. Delivery process:
     - Discovery: what to learn about the client's business
     - Research: analytics review, competitor analysis, user research
     - Copy creation: brief → first draft → revision → final
     - Design and development collaboration
     - Launch and testing protocol
     - Ongoing optimization workflow

  4. Team building:
     - Core roles: strategist, copywriter, designer, developer, analyst
     - When to hire vs contract
     - Quality assurance across team members
     - Client communication protocols
     - How to maintain quality as you scale from 5 to 20+ clients

  5. Reporting and retention:
     - Monthly performance report template
     - How to show ROI when results are incremental
     - Client education: teaching them to appreciate CRO value
     - Upselling: from audit → creation → retainer
     - Client retention: why clients churn and how to prevent it

  6. Competitive differentiation:
     - What makes your agency different from competitors
     - Specialization vs generalization (vertical-specific agencies)
     - Building IP: proprietary frameworks, benchmarks, and playbooks
     - Thought leadership: content marketing for the agency itself

assertions:
  - type: llm_judge
    criteria: "Pricing reflects value delivered — the retainer is priced relative to the client's ad spend and potential revenue improvement, with clear justification for each tier"
    weight: 0.25
    description: "Value-reflective pricing"
  - type: llm_judge
    criteria: "The delivery process is professional and repeatable — each stage has clear deliverables, timelines, and client touchpoints that could be executed consistently across multiple clients"
    weight: 0.25
    description: "Professional repeatable delivery"
  - type: llm_judge
    criteria: "Red flag identification is practical — correctly identifies clients without sufficient traffic, with no tracking setup, or with unrealistic expectations as poor fits"
    weight: 0.25
    description: "Practical red flag identification"
  - type: llm_judge
    criteria: "The scaling plan addresses quality risks — identifies how to maintain copy and design quality as the agency grows from 5 to 20+ clients"
    weight: 0.25
    description: "Quality-maintaining scaling plan"
