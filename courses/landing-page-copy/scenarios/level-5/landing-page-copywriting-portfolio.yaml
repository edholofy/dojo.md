meta:
  id: landing-page-copywriting-portfolio
  level: 5
  course: landing-page-copy
  type: output
  description: "Create a professional landing page copywriting portfolio with case studies"
  tags: [landing-pages, portfolio, career, case-study, mastery]

state: {}

trigger: |
  A landing page copywriter's portfolio is itself a conversion challenge:
  you need to convince potential clients or employers that you can improve
  their conversion rates. Your portfolio must demonstrate results, process,
  and versatility.

  Build a professional landing page copywriting portfolio:

  1. Portfolio landing page (meta: a landing page for your own services):
     - Headline: what you do and the results you deliver
     - Social proof: conversion improvements you've achieved
     - Process overview: how you approach landing page projects
     - CTA: "Let's Improve Your Landing Pages" or similar
     - Write the complete page copy

  2. Case study #1 (SaaS free trial optimization):
     - Client context: B2B SaaS, 3.2% → 7.8% conversion improvement
     - The challenge: what was wrong with the original page
     - Your process: research, hypothesis, copy changes, testing
     - Before/after copy comparison: show 3 specific changes
     - Results: conversion lift, revenue impact, client testimonial
     - Lessons learned: what surprised you, what you'd do differently

  3. Case study #2 (E-commerce product page rewrite):
     - Client context: DTC brand, $45 average order value
     - The challenge: high traffic, low add-to-cart rate
     - Before/after: show the original copy vs your rewrite
     - Focus: how you improved the product story and trust elements
     - Results: add-to-cart rate improvement, revenue per visitor lift

  4. Case study #3 (Lead generation page overhaul):
     - Client context: B2B services firm
     - The challenge: high cost per lead from paid campaigns
     - Process: form optimization, headline testing, social proof addition
     - Results: CPL reduction, lead quality improvement
     - Key insight: the one change that made the biggest difference

  5. Spec work pieces:
     - Write a landing page for a fictional product (show your range)
     - Include copy for a different industry than your case studies
     - Annotate your decisions: why each element was written this way
     - Show strategic thinking, not just writing ability

  6. Portfolio optimization:
     - How to structure your portfolio for maximum client interest
     - What clients look for when evaluating copywriters
     - Pricing presentation: how to justify your rates
     - The copywriter's own conversion funnel: portfolio → inquiry →
       discovery call → proposal → engagement

assertions:
  - type: llm_judge
    criteria: "Case studies follow a compelling narrative structure — each tells a story with clear before/after contrast, specific metrics, and lessons that demonstrate expertise"
    weight: 0.25
    description: "Compelling case study narratives"
  - type: llm_judge
    criteria: "Before/after copy comparisons are specific — shows actual copy changes with annotations explaining why each change improves conversion, not just 'we made it better'"
    weight: 0.25
    description: "Specific annotated copy comparisons"
  - type: llm_judge
    criteria: "The portfolio page practices what it preaches — the copywriter's own portfolio landing page uses the same techniques (clear headline, social proof, CTA) that they recommend for clients"
    weight: 0.25
    description: "Self-demonstrating portfolio page"
  - type: llm_judge
    criteria: "Results are specific and credible — conversion rate improvements, revenue impacts, and client testimonials include specific numbers rather than vague claims"
    weight: 0.25
    description: "Specific credible results"
