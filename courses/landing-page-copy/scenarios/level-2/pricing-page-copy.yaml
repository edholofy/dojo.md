meta:
  id: pricing-page-copy
  level: 2
  course: landing-page-copy
  type: output
  description: "Write pricing page copy that drives plan selection and reduces decision paralysis"
  tags: [landing-pages, pricing, plan-selection, anchoring, conversion]

state: {}

trigger: |
  Pricing pages are one of the highest-intent pages on any website — visitors
  are considering purchase. But poor pricing page copy causes decision
  paralysis, sticker shock, or visitors choosing the wrong plan.

  Write a pricing page for:
  Product: DesignStudio — a collaborative design tool for marketing teams
  Plans:
  - Starter: $0/month (1 user, 3 projects, basic templates)
  - Pro: $19/user/month (unlimited projects, brand kit, comments)
  - Business: $49/user/month (everything + custom templates, analytics,
    priority support, SSO)
  - Enterprise: Custom pricing (everything + dedicated support, SLA,
    custom integrations)

  Write the complete pricing page:

  1. Pricing page headline and subheadline:
     - Write 3 headline options (not "Pricing" — something benefit-focused)
     - Subheadline that positions pricing positively

  2. Plan descriptions:
     For each plan:
     - Plan name with one-line description ("Best for..." persona)
     - Price display (monthly, with annual discount toggle)
     - Feature list (benefit-focused, not just feature names)
     - CTA button text (different per plan)
     - Why this plan: a one-sentence pitch for who should choose it

  3. Recommended plan highlight:
     - Which plan to recommend (Pro — the "Goldilocks" plan)
     - How to visually and copy-wise make this the default choice
     - "Most Popular" or "Best Value" badge copy
     - Anchoring: why showing the expensive plan makes Pro look reasonable

  4. Plan comparison table:
     - Feature comparison across all 4 plans
     - How to write feature descriptions that upsell without pressuring
     - Checkmarks vs detailed descriptions debate

  5. Pricing FAQ (6 questions):
     - Annual vs monthly savings
     - Can I switch plans?
     - What happens if I exceed limits?
     - Do you offer discounts? (non-profit, startup, education)
     - What's the refund policy?
     - How does per-user pricing work?

  6. Final CTA below pricing:
     - Copy that handles the "I'm still not sure" visitor
     - Offer: "Not sure? Start free and upgrade anytime"

assertions:
  - type: llm_judge
    criteria: "The Pro plan is effectively positioned as the recommended choice — visual and copy cues (Most Popular badge, benefit emphasis, strategic CTA) guide most visitors toward the middle tier"
    weight: 0.25
    description: "Effectively recommended Pro plan"
  - type: llm_judge
    criteria: "Price anchoring is used correctly — the Business/Enterprise plans make the Pro plan feel more reasonable by comparison, and annual vs monthly pricing shows the savings"
    weight: 0.25
    description: "Correct price anchoring"
  - type: llm_judge
    criteria: "CTA buttons differ meaningfully per plan — free plan says 'Start Free,' Pro says 'Start Free Trial' or 'Get Started,' Enterprise says 'Contact Sales,' matching the commitment level"
    weight: 0.25
    description: "Meaningfully different plan CTAs"
  - type: llm_judge
    criteria: "FAQs address real pricing anxiety — switching plans, refund policy, and what happens at limits are genuine concerns that could prevent conversion if unanswered"
    weight: 0.25
    description: "Real pricing anxiety FAQs"
