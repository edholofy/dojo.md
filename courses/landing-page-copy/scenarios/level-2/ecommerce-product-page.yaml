meta:
  id: ecommerce-product-page
  level: 2
  course: landing-page-copy
  type: output
  description: "Write a high-converting e-commerce product landing page"
  tags: [landing-pages, ecommerce, product-page, conversion, retail]

state: {}

trigger: |
  E-commerce landing pages differ from SaaS pages — the buying decision
  is more emotional, price sensitivity is higher, and trust signals
  (returns, shipping, security) are critical. E-commerce conversion rates
  average 1.5-3%, with top performers hitting 4%+.

  Write a product landing page for:
  Product: AeroChair Pro — ergonomic office chair
  Price: $599 (was $799 — 25% off launch price)
  Target audience: Remote workers with back pain
  Key features: Adjustable lumbar support, breathable mesh, 12-year warranty
  Shipping: Free, 3-5 business days. 30-day return policy.

  Write the complete landing page:

  1. Hero section:
     - Product headline (benefit-focused, not just product name)
     - Price display with original price crossed out
     - Key selling points (3 bullet points visible immediately)
     - Primary CTA: "Add to Cart" or variation
     - Urgency element (launch pricing ends date)

  2. Pain point section:
     - 3-4 problems remote workers face (back pain, poor posture,
       discomfort during long sessions)
     - How these problems affect work quality and health
     - Why cheap chairs make the problem worse

  3. Product story and differentiation:
     - What makes AeroChair Pro different from $200 alternatives
     - Engineering/design story (brief, credibility-building)
     - Comparison chart: AeroChair Pro vs common alternatives

  4. Feature deep-dive (4 features):
     - Each feature: benefit headline + how it works + why it matters
     - Technical specs for detail-oriented buyers
     - "See it in action" descriptions for visual content

  5. Social proof:
     - 3 customer reviews (specific use cases and results)
     - Star rating display
     - "As featured in" media mentions
     - User-generated content references (customer photos)

  6. Trust and risk reversal:
     - 30-day return policy (make it prominent)
     - 12-year warranty details
     - Free shipping emphasis
     - Payment security badges
     - Financing option (e.g., "4 payments of $149.75")

  7. Final CTA with urgency:
     - Restate the offer
     - Countdown or deadline reminder
     - Final CTA button + trust elements

assertions:
  - type: llm_judge
    criteria: "The pricing display is optimized for perceived value — original price visible with strikethrough, savings amount or percentage shown, and launch timing creates legitimate urgency"
    weight: 0.25
    description: "Value-optimized pricing display"
  - type: llm_judge
    criteria: "Pain points are specific to remote workers — mentions real problems like 'afternoon backaches during Zoom calls' or 'shifting positions every 20 minutes' rather than generic discomfort"
    weight: 0.25
    description: "Remote-worker-specific pain points"
  - type: llm_judge
    criteria: "Trust elements are comprehensive — returns, warranty, shipping, payment security, and financing options address all major purchase anxieties for a $599 product"
    weight: 0.25
    description: "Comprehensive trust elements"
  - type: llm_judge
    criteria: "The comparison chart effectively differentiates — shows specific advantages over cheaper alternatives (adjustability, materials, warranty) without being overly negative about competitors"
    weight: 0.25
    description: "Effective comparison differentiation"
