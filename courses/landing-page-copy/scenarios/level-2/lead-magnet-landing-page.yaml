meta:
  id: lead-magnet-landing-page
  level: 2
  course: landing-page-copy
  type: output
  description: "Write a lead magnet landing page that maximizes email captures"
  tags: [landing-pages, lead-magnet, email-capture, lead-generation, b2b]

state: {}

trigger: |
  Lead magnet landing pages trade valuable content for an email address.
  The conversion rate depends on the perceived value of the content vs
  the "cost" of sharing personal information. Lead gen pages typically
  convert at 5-15%.

  Create landing pages for 3 different lead magnets:

  1. Ebook: "The 2026 State of Remote Work Report"
     - Audience: HR directors at companies with 100-1,000 employees
     - Content: 40-page report with original survey data from 5,000 workers
     - Goal: Capture email + company size for sales qualification

     Write:
     - Headline and subheadline
     - 5 key findings teaser (what's inside, without giving it all away)
     - Form (fields, labels, CTA button)
     - Trust elements (who conducted the survey, data credibility)
     - Social proof (downloads count, media mentions)

  2. Template: "Cold Email Outreach Template Pack (12 Templates)"
     - Audience: SDRs and sales professionals
     - Content: 12 proven email templates with personalization guides
     - Goal: Email capture only (low friction)

     Write:
     - Headline that emphasizes instant value
     - What's included (template preview descriptions)
     - Minimal form (1-2 fields) + CTA
     - "What you'll get" bullet list
     - Preview/sample of one template (enough to show quality)

  3. Webinar replay: "How We Grew from $1M to $10M ARR in 18 Months"
     - Audience: SaaS founders and growth leaders
     - Content: 45-minute presentation with Q&A
     - Goal: Email + job title for segmentation

     Write:
     - Headline with specific result hook
     - Speaker bio and credibility
     - What viewers will learn (3-4 bullet points)
     - Form + CTA
     - Time investment framing ("45 minutes that could change your growth trajectory")

  For all 3 pages:
  - Thank you page copy (post-conversion)
  - Delivery mechanism (instant download, email delivery, access link)

assertions:
  - type: llm_judge
    criteria: "Each lead magnet headline communicates clear value exchange — the visitor immediately understands what they'll receive and why it's worth sharing their email"
    weight: 0.25
    description: "Clear value exchange headlines"
  - type: llm_judge
    criteria: "The teasers create curiosity without giving everything away — shows enough to prove the content is valuable without making the download unnecessary"
    weight: 0.25
    description: "Curiosity-creating teasers"
  - type: llm_judge
    criteria: "Form friction matches the value offered — a 40-page report can justify email + company size, while a template pack should require only email"
    weight: 0.25
    description: "Value-matched form friction"
  - type: llm_judge
    criteria: "Thank you pages continue the relationship — not just 'check your email' but next steps, additional resources, or a soft product pitch"
    weight: 0.25
    description: "Relationship-continuing thank you pages"
