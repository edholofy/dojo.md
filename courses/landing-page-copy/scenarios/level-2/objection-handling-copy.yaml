meta:
  id: objection-handling-copy
  level: 2
  course: landing-page-copy
  type: output
  description: "Write copy that preemptively addresses and overcomes buyer objections"
  tags: [landing-pages, objections, trust, persuasion, intermediate]

state: {}

trigger: |
  Every visitor has objections — reasons NOT to convert. Great landing
  pages anticipate these objections and address them before the visitor
  leaves. The key is knowing which objections are most common for your
  product type.

  You're writing objection-handling copy for:
  Product: LearnPro — an online course platform for professional development
  Price: $49/month or $399/year
  Target: Mid-career professionals looking to upskill

  Map the objection landscape and write copy to handle each:

  1. Price objections:
     - "It's too expensive"
     - "I can learn this for free on YouTube"
     - "What if I don't use it enough to justify the cost?"
     Write copy for each that reframes the value without being dismissive.

  2. Trust objections:
     - "I've never heard of this company"
     - "How do I know the courses are any good?"
     - "What are the instructor credentials?"
     Write copy that builds credibility through specific evidence.

  3. Timing objections:
     - "I'll do this later"
     - "I'm too busy right now"
     - "I need to think about it"
     Write copy that creates motivation without fake urgency.

  4. Effort objections:
     - "It seems like a lot of work"
     - "What if I can't keep up?"
     - "I've started courses before and never finished"
     Write copy that reduces perceived effort and builds confidence.

  5. Implementation strategy:
     - Where to place objection-handling copy on the page
     - FAQ section vs inline objection handling
     - How to handle objections without drawing attention to negatives
     - The "objection sandwich" technique (benefit → handle objection → benefit)

assertions:
  - type: llm_judge
    criteria: "Price objection handling reframes value — compares $49/month to concrete alternatives (conference ticket, textbook, career coach) and calculates ROI rather than just saying 'it's worth it'"
    weight: 0.25
    description: "Value-reframing price objection handling"
  - type: llm_judge
    criteria: "Trust objection handling provides evidence — specific instructor credentials, course completion rates, student outcomes, or company partnerships rather than self-proclaimed quality"
    weight: 0.25
    description: "Evidence-based trust building"
  - type: llm_judge
    criteria: "Effort objection handling reduces perceived difficulty — mentions time commitments ('15 minutes/day'), bite-sized lessons, and completion support rather than dismissing the concern"
    weight: 0.25
    description: "Difficulty-reducing effort handling"
  - type: llm_judge
    criteria: "Implementation strategy explains when to use FAQ vs inline — inline objection handling near CTAs for critical objections, FAQ section for secondary concerns that only some visitors have"
    weight: 0.25
    description: "Strategic FAQ vs inline placement"
