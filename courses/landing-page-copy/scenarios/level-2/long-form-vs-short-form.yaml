meta:
  id: long-form-vs-short-form
  level: 2
  course: landing-page-copy
  type: output
  description: "Determine when to use long-form vs short-form landing pages"
  tags: [landing-pages, long-form, short-form, page-length, strategy]

state: {}

trigger: |
  Long-form landing pages can generate up to 220% more leads than short
  pages, but only when the context is right. Crazy Egg's long-form page
  increased conversions by 363%. Meanwhile, short pages win for low-
  friction offers. The right choice depends on price, complexity, and
  audience awareness.

  You have 3 landing page scenarios. For each, decide long-form or
  short-form, then write the page.

  Scenario 1: High-ticket SaaS ($2,000/month enterprise analytics)
  - Audience: VP of Data at enterprise companies
  - Goal: Demo request
  - Decision complexity: High (multiple stakeholders, long sales cycle)

  Scenario 2: Free ebook download ("10 Instagram Growth Hacks")
  - Audience: Social media managers
  - Goal: Email capture
  - Decision complexity: Low (free, instant delivery)

  Scenario 3: Mid-range online course ($497 one-time payment)
  - Audience: Freelance designers wanting to learn UX
  - Goal: Course enrollment
  - Decision complexity: Medium (meaningful investment, career decision)

  For each scenario:
  1. Recommendation: Long-form or short-form (with reasoning)
  2. Estimated word count and page structure
  3. Write the key sections:
     - For long-form: hero, problem, solution, features, social proof,
       objection handling, guarantee, final CTA
     - For short-form: hero, quick benefits, CTA (entire page)
  4. What would change your recommendation (when would the opposite
     work better?)

  Then provide:
  5. Decision framework:
     - Factors that determine page length (price, awareness, complexity,
       trust level, traffic source)
     - A decision matrix for choosing page length
     - How to test: run both and let data decide

assertions:
  - type: llm_judge
    criteria: "Scenario 1 correctly gets long-form treatment — enterprise $2K/month requires extensive trust building, objection handling, and social proof that short-form can't deliver"
    weight: 0.25
    description: "Correct long-form for enterprise"
  - type: llm_judge
    criteria: "Scenario 2 correctly gets short-form treatment — a free ebook download needs minimal persuasion and should have a fast path to the form"
    weight: 0.25
    description: "Correct short-form for free offer"
  - type: llm_judge
    criteria: "The decision framework is practical — considers price point, audience awareness, traffic source (cold vs warm), and product complexity as key factors with clear thresholds"
    weight: 0.25
    description: "Practical decision framework"
  - type: llm_judge
    criteria: "The 'what would change your recommendation' sections show nuance — acknowledges that warm traffic might convert on short-form even for high-ticket, or that a free offer with low awareness might need more copy"
    weight: 0.25
    description: "Nuanced recommendation conditions"
