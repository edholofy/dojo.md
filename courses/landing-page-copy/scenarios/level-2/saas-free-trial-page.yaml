meta:
  id: saas-free-trial-page
  level: 2
  course: landing-page-copy
  type: output
  description: "Write a high-converting SaaS free trial landing page"
  tags: [landing-pages, saas, free-trial, conversion, b2b]

state: {}

trigger: |
  SaaS free trial pages have unique conversion challenges: you're asking
  people to invest time (setup, learning) not just money. The average SaaS
  trial-to-paid conversion rate is 15-25%. Great landing page copy gets
  trials started; great onboarding converts them.

  Write a complete free trial landing page for:
  Product: FormBuilder — drag-and-drop form and survey creation tool
  Target: Marketing teams at mid-market companies (50-500 employees)
  Pricing: Free plan (10 responses/month), Pro $29/month, Business $79/month
  Key competitors: Typeform, JotForm, Google Forms
  Key differentiators: Conditional logic builder, native CRM integrations,
  brand customization

  Write the complete page:

  1. Hero section:
     - Headline (benefit-focused, mentions the audience)
     - Subheadline (differentiator + proof point)
     - Primary CTA ("Start Free" or variation)
     - Supporting text: "No credit card required" or similar
     - Trust bar: "Trusted by teams at [company types]"

  2. Problem → Solution bridge:
     - 3 pain points of current form tools (specific to marketing teams)
     - How FormBuilder solves each one
     - Quick comparison element (why switch from competitor)

  3. Feature showcase (4 key features):
     For each feature:
     - Benefit headline
     - 2-sentence description
     - Specific use case for marketing teams

  4. Social proof section:
     - 2 testimonials (results-focused, from marketing personas)
     - Key metrics (forms created, responses collected, etc.)
     - Integration logos (tools marketing teams already use)

  5. Pricing transparency section:
     - Why showing pricing on a trial page builds trust
     - Brief pricing table (Free, Pro, Business)
     - CTA: start with free plan → upgrade when ready

  6. FAQ section (5 questions):
     - Address common objections (data security, migration, learning curve)
     - Each answer: 2-3 sentences, reassuring but honest

  7. Final CTA section:
     - Closing headline (restate main benefit)
     - Final CTA button + supporting text
     - Risk reversal (guarantee or reassurance)

assertions:
  - type: llm_judge
    criteria: "The copy specifically targets marketing teams — pain points, use cases, and testimonials reference marketing-specific scenarios (lead capture forms, event registration, customer surveys) not generic form building"
    weight: 0.25
    description: "Marketing-team-targeted copy"
  - type: llm_judge
    criteria: "The free trial friction is minimized — 'no credit card required,' easy start language, and supporting text that reduces commitment anxiety throughout the page"
    weight: 0.25
    description: "Minimized trial friction"
  - type: llm_judge
    criteria: "The competitive positioning is subtle but effective — acknowledges competitor limitations without naming them aggressively, focusing on FormBuilder's unique strengths"
    weight: 0.25
    description: "Subtle effective competitive positioning"
  - type: llm_judge
    criteria: "The FAQ section addresses real objections — data security for marketing data, migration from existing tools, and learning curve for non-technical team members"
    weight: 0.25
    description: "Real objection FAQ answers"
