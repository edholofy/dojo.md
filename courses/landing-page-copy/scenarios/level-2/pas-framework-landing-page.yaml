meta:
  id: pas-framework-landing-page
  level: 2
  course: landing-page-copy
  type: output
  description: "Apply the Problem-Agitate-Solution framework to full landing page copy"
  tags: [landing-pages, pas-framework, copywriting, persuasion, intermediate]

state: {}

trigger: |
  The PAS (Problem-Agitate-Solution) framework is one of the most effective
  copywriting structures for landing pages. It works by:
  1. Problem — identify the reader's pain
  2. Agitate — make the pain feel urgent and real
  3. Solution — present your product as the relief

  Apply PAS to a full landing page for:
  Product: SleepSync — a sleep tracking and improvement app
  Target audience: Busy professionals (30-45) struggling with sleep quality
  Goal: App download (free with premium upgrade)
  Key differentiator: AI-personalized sleep coaching, not just tracking

  Write the complete landing page using PAS structure:

  1. Problem section:
     - Headline that calls out the problem
     - 3-4 specific pain points the audience recognizes instantly
     - Each pain point: one sentence that makes them nod "that's me"
     - Why generic sleep advice ("just go to bed earlier") fails

  2. Agitate section:
     - Deepen the problem: what happens if they DON'T fix their sleep
     - Health consequences (backed by data)
     - Career/productivity consequences
     - Relationship consequences
     - The emotional cost: frustration, guilt, helplessness
     - Important: agitate without being preachy or fear-mongering

  3. Solution section:
     - Transition from agitation to relief ("There's a better way")
     - How SleepSync solves each specific problem mentioned
     - Features presented as solutions to the agitated problems
     - Social proof that validates the solution works
     - CTA that connects to the emotional journey

  4. Complete page copy:
     Write the full page from top to bottom, with:
     - Hero section (PAS condensed into above-fold)
     - Expanded problem section
     - Agitation section
     - Solution reveal
     - Features as benefits
     - Social proof
     - Closing CTA with risk reversal

  5. PAS dos and don'ts:
     - When PAS works (pain-aware audiences, B2C, health/wellness)
     - When PAS doesn't work (happy audiences, aspirational products)
     - How to agitate without being manipulative

assertions:
  - type: llm_judge
    criteria: "The problem section identifies pain points that busy professionals actually experience — specific scenarios like 'lying awake running through tomorrow's to-do list' rather than generic 'poor sleep'"
    weight: 0.25
    description: "Relatable specific pain points"
  - type: llm_judge
    criteria: "The agitation section deepens concern without being preachy — uses data and consequences to make the problem feel urgent without lecturing the reader about their habits"
    weight: 0.25
    description: "Effective non-preachy agitation"
  - type: llm_judge
    criteria: "The solution section directly connects to each agitated problem — each feature is presented as a response to a specific pain point mentioned earlier, creating a satisfying resolution"
    weight: 0.25
    description: "Problem-connected solution presentation"
  - type: llm_judge
    criteria: "The complete page copy flows naturally through all PAS stages — transitions feel smooth, not formulaic, and the emotional arc from problem to agitation to relief is compelling"
    weight: 0.25
    description: "Natural flowing PAS arc"
