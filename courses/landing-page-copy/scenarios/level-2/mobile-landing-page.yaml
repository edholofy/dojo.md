meta:
  id: mobile-landing-page
  level: 2
  course: landing-page-copy
  type: output
  description: "Optimize landing page copy for mobile-first conversion"
  tags: [landing-pages, mobile, responsive, ux, optimization]

state: {}

trigger: |
  Mobile traffic accounts for 60%+ of web traffic, but mobile conversion
  rates are 40-51% lower than desktop. The copy that works on desktop
  often fails on mobile — longer attention spans, more screen space, and
  easier form completion give desktop significant advantages.

  You're optimizing a SaaS landing page for mobile:
  Product: BudgetBee — personal finance app
  Goal: App download
  Desktop conversion rate: 4.2%
  Mobile conversion rate: 1.8% (needs improvement)

  Provide the mobile copy optimization:

  1. Desktop vs Mobile copy comparison:
     Write these sections in BOTH desktop and mobile versions:

     a) Hero headline:
        Desktop: [longer, more detailed]
        Mobile: [shorter, punchier, fits one screen]

     b) Value proposition:
        Desktop: [3-4 sentences]
        Mobile: [1-2 sentences max]

     c) Feature descriptions:
        Desktop: [paragraph format with details]
        Mobile: [bullet points, icons, minimal text]

     d) CTA:
        Desktop: [CTA with supporting text]
        Mobile: [CTA as sticky button, minimal text]

  2. Mobile-specific copy techniques:
     - How to communicate the same value in 50% fewer words
     - Progressive disclosure: what to show first, what to hide
     - Accordion/expandable sections for detailed content
     - Thumb-zone optimization for CTA placement
     - When to use "Learn More" to preserve space

  3. Mobile form optimization:
     - Reduce the desktop form for mobile
     - Smart defaults and auto-fill considerations
     - Single-step vs multi-step forms on mobile
     - Input types (email keyboard, number pad, etc.)
     - Error handling on small screens

  4. Mobile-specific copy for app download:
     - App store badge placement and copy
     - "Download" vs "Get the App" vs "Start Free"
     - Social proof formatted for mobile (compact formats)
     - Deep link vs App Store redirect strategy

assertions:
  - type: llm_judge
    criteria: "Mobile copy is genuinely shorter and punchier — not just the same desktop copy with line breaks but rewritten for smaller screens with tighter language and fewer words"
    weight: 0.30
    description: "Genuinely shorter mobile copy"
  - type: llm_judge
    criteria: "Progressive disclosure is well-implemented — the most important information is visible immediately while details are accessible but don't clutter the initial view"
    weight: 0.25
    description: "Well-implemented progressive disclosure"
  - type: llm_judge
    criteria: "Mobile form optimization is practical — specific suggestions for reducing fields, using appropriate input types, and implementing single-field-at-a-time progression"
    weight: 0.25
    description: "Practical mobile form optimization"
  - type: llm_judge
    criteria: "The app download copy addresses the mobile context — visitors are already on their phone, so the CTA should capitalize on this with immediate download actions"
    weight: 0.20
    description: "Mobile-context app download copy"
