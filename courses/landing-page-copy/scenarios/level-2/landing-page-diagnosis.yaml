meta:
  id: landing-page-diagnosis
  level: 2
  course: landing-page-copy
  type: output
  description: "Diagnose why a landing page is underperforming and prescribe fixes"
  tags: [landing-pages, diagnosis, optimization, troubleshooting, intermediate]

state: {}

trigger: |
  A landing page is underperforming. You need to diagnose why and
  prescribe specific copy fixes.

  Landing page details:
  Product: ProjectHub — project management tool for agencies
  Goal: Free trial signup
  Traffic: 5,000 visits/month (mostly from Google Ads)
  Current conversion rate: 0.8% (40 signups/month)
  Industry benchmark: 3-5% for SaaS free trial pages
  Bounce rate: 72%
  Average time on page: 23 seconds

  Current page copy (summarized):
  - Headline: "The Future of Project Management Is Here"
  - Subheadline: "ProjectHub leverages cutting-edge AI technology to
    deliver next-generation project management capabilities for forward-
    thinking agencies."
  - No social proof above the fold
  - Features section lists 12 features in a dense grid
  - One testimonial at the bottom: "Good tool." — J.S.
  - CTA button: "Sign Up" (appears only at the bottom)
  - No mention of "free" anywhere on the page
  - Long form: Name, Email, Company, Phone, Team Size, Agency Type,
    How Did You Hear About Us

  Diagnose and fix:

  1. Diagnosis (identify at least 8 problems):
     For each problem:
     - What it is
     - Why it hurts conversions (connect to the metrics)
     - Severity: critical, major, or minor

  2. Prescribed fixes (prioritized by impact):
     - Fix #1 through Fix #8, ordered by expected conversion impact
     - For each fix: write the exact new copy
     - Expected conversion lift from each fix (estimate)

  3. Quick wins vs deep fixes:
     - Which fixes can be implemented in 1 hour?
     - Which require significant rewriting?
     - Recommended implementation sequence

  4. Target state:
     - What the optimized page looks like (describe the full page)
     - Realistic target conversion rate after fixes
     - What to A/B test first

assertions:
  - type: llm_judge
    criteria: "The diagnosis correctly identifies the critical issues — vague headline, no 'free' mention, CTA only at bottom, 7-field form, and weak testimonial are all flagged as high-impact problems"
    weight: 0.30
    description: "Correctly identified critical issues"
  - type: llm_judge
    criteria: "Each fix includes actual rewritten copy — not just 'improve the headline' but a specific new headline that addresses the diagnosis"
    weight: 0.25
    description: "Actual rewritten copy per fix"
  - type: llm_judge
    criteria: "The 23-second time on page and 72% bounce rate are correctly connected to above-fold problems — visitors are leaving before scrolling because the hero section fails to engage"
    weight: 0.25
    description: "Metrics correctly connected to problems"
  - type: llm_judge
    criteria: "The target conversion rate is realistic — moving from 0.8% to 3-4% with copy fixes alone is ambitious but achievable, and the estimate acknowledges that some improvements may need testing"
    weight: 0.20
    description: "Realistic target conversion rate"
