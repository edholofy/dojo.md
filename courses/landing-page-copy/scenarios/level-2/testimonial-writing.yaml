meta:
  id: testimonial-writing
  level: 2
  course: landing-page-copy
  type: output
  description: "Create and curate compelling testimonials for landing pages"
  tags: [landing-pages, testimonials, social-proof, customer-voice, intermediate]

state: {}

trigger: |
  Customer testimonials can increase conversions by up to 270% when done
  right. But most testimonials are generic ("Great product!") or feel
  manufactured. The best testimonials tell a story: Before → Obstacle →
  Solution → Result.

  You're the conversion copywriter for a B2B email marketing platform
  (MailFlow). You have raw customer feedback from interviews and need
  to turn it into landing page testimonials.

  Raw feedback from customers:

  Customer A (Sarah, Marketing Director, DTC brand):
  "We switched from Mailchimp because their analytics were confusing. With
  MailFlow we can actually see which emails drive revenue. Our email revenue
  went up like 40% or something in the first quarter. The drag-and-drop
  editor is really good too. It's faster."

  Customer B (James, Founder, SaaS startup):
  "I'm not a marketing person. I needed something that just works without
  having to learn a whole platform. MailFlow's AI subject lines actually
  work — my open rates are way better now. It took maybe 20 minutes to
  set up our welcome sequence. That was surprising."

  Customer C (Priya, E-commerce Manager, fashion brand):
  "Segmentation was the big thing for us. We were blasting everyone with
  the same emails. MailFlow made it easy to segment by purchase history.
  Our unsubscribe rate dropped a lot. And the abandoned cart emails recover
  about $15K a month now."

  For each customer:
  1. Write 3 versions of their testimonial:
     a) Short version (1-2 sentences for near CTA placement)
     b) Medium version (3-4 sentences with context and result)
     c) Full story version (Before → Obstacle → Solution → Result format)

  2. Attribution format:
     - Name, title, company, headshot placeholder
     - When to include company logo
     - How much context helps (industry, company size)

  3. Testimonial selection strategy:
     - Which testimonial to place where on the page
     - Matching testimonials to visitor segments
     - How to request better testimonials from customers
     - Questions to ask in testimonial interviews

  4. Ethical considerations:
     - How much can you edit customer quotes?
     - Getting approval for published testimonials
     - FTC disclosure requirements
     - Handling negative feedback that surfaces during interviews

assertions:
  - type: llm_judge
    criteria: "Short versions capture the most powerful element — a specific result or transformation in 1-2 punchy sentences, not a watered-down summary"
    weight: 0.25
    description: "Powerful short testimonial versions"
  - type: llm_judge
    criteria: "Full story versions follow Before → Obstacle → Solution → Result — each testimonial tells a mini-narrative that mirrors the landing page's own persuasion arc"
    weight: 0.25
    description: "Narrative full story testimonials"
  - type: llm_judge
    criteria: "The testimonial interview questions are designed to elicit specific, results-focused responses — not 'do you like our product?' but 'what changed for your business after using us?'"
    weight: 0.25
    description: "Results-eliciting interview questions"
  - type: llm_judge
    criteria: "Ethical guidelines are practical — clear rules about editing quotes (grammar ok, meaning changes not ok), approval processes, and FTC requirements for incentivized testimonials"
    weight: 0.25
    description: "Practical ethical guidelines"
