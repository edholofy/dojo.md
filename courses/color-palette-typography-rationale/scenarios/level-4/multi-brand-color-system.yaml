meta:
  id: multi-brand-color-system
  level: 4
  course: color-palette-typography-rationale
  type: output
  description: "Multi-brand color system — design a color architecture supporting multiple distinct brands within one parent organization"
  tags: [multi-brand, architecture, brands, tokens, expert]

state: {}

trigger: |
  A Design System Director says: "Our parent company
  owns 4 distinct brands:

  - Brand A (premium): Deep navy + gold, sophisticated
  - Brand B (consumer): Bright coral + teal, energetic
  - Brand C (enterprise): Steel blue + slate, professional
  - Brand D (youth): Vibrant purple + lime, playful

  All 4 brands share the same component library and
  design system. Currently each brand has a completely
  separate color file with no structure — just a list
  of hex values.

  I need to build a multi-brand color architecture where:
  1. Components work across all brands without code changes
  2. Each brand feels genuinely distinct, not just recolored
  3. Adding a 5th brand doesn't require rebuilding
  4. All brands meet WCAG AA accessibility

  How do I architect this?"

  Task: Design a multi-brand color token architecture
  with per-brand palettes and shared semantic structure.

assertions:
  - type: llm_judge
    criteria: "Response designs multi-brand token architecture — shared semantic layer (all 4 brands use identical semantic token NAMES: color.action.primary, color.bg.surface, color.text.primary, color.feedback.error, color.border.default — the names are the contract between components and brands), per-brand reference layer (Brand A: color.action.primary resolves to deep navy #1E3A5F, Brand B: same token resolves to coral #F97316, Brand C: to steel blue #3B82F6, Brand D: to purple #8B5CF6 — different visual identity, same semantic meaning), brand theme files (each brand is a complete theme file mapping every semantic token to brand-specific reference values — components consume semantic tokens and automatically render in the correct brand), completeness requirement (every semantic token must be defined in every brand theme — if Brand A has color.bg.subtle, all brands must define it, enforced by schema validation)."
    weight: 0.35
    description: "TokenArchitecture"
  - type: llm_judge
    criteria: "Response ensures genuine brand distinction beyond recoloring — beyond primary color swap (each brand needs: distinct color proportions — Brand A uses dark backgrounds frequently for premium feel while Brand B uses light backgrounds for energy, distinct accent strategy — Brand A's gold accent appears minimally for elegance, Brand D's lime appears abundantly for playfulness, distinct neutral warmth — Brand A's neutrals are cool-tinted for sophistication, Brand B's are warm-tinted for friendliness), brand-specific tokens (some tokens only make sense for certain brands: Brand A has color.bg.luxury for dark premium sections, Brand D has color.bg.playful for illustrated sections — these extend the shared set with brand-specific additions), typography as brand reinforcement (if the component library supports it: each brand can also vary typography tokens — Brand A uses serif headings for premium, Brand D uses rounded sans-serif for playful — further differentiation beyond color alone)."
    weight: 0.35
    description: "BrandDistinction"
  - type: llm_judge
    criteria: "Response addresses scalability and accessibility — adding Brand E (architecture test: to add a 5th brand, create a new theme file mapping all semantic tokens to Brand E's reference values — no component changes, no shared code changes, just a new theme file, brand onboarding checklist: define reference palette, map to all semantic tokens, verify accessibility, test rendering of all components, timeline: 2-3 weeks for a new brand integration vs. months without this architecture), accessibility per brand (every brand theme must pass automated accessibility verification: all text/background combinations meet WCAG AA, every interactive element meets 3:1 non-text contrast, branded colors tested in colorblind simulations — Brand D's purple+lime combination is particularly risky for color vision deficiency and needs verification), and documentation (multi-brand style guide showing: shared component rendered in each brand's theme — visual proof that one component works across 4 brands, token mapping reference per brand, brand-specific design guidelines — not just colors but how each brand uses the system differently)."
    weight: 0.30
    description: "ScalabilityAccessibility"
