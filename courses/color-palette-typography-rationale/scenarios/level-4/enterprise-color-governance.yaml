meta:
  id: enterprise-color-governance
  level: 4
  course: color-palette-typography-rationale
  type: output
  description: "Enterprise color governance — establish organizational policies, approval workflows, and quality gates for color usage across a large product portfolio"
  tags: [enterprise, governance, policy, approval, expert]

state: {}

trigger: |
  A Design VP at a Fortune 500 company says: "We have
  12 product teams, 85 designers, and no color governance.
  The result:

  - 340 unique hex values across our product portfolio
  - Teams independently create 'shades' by eyeballing
  - Some products use our 2019 palette, others use 2022,
    one team uses their own palette entirely
  - Marketing uses Pantone references, product uses hex,
    mobile uses platform-specific values — they don't match
  - No approval process — anyone can add a new color
  - When we audit: 40% of colors fail WCAG AA contrast

  I need a governance framework that brings order
  without killing creativity. How do I govern color
  across 12 teams?"

  Task: Design an enterprise color governance framework
  with policies, approval workflows, and enforcement
  mechanisms.

assertions:
  - type: llm_judge
    criteria: "Response creates color governance structure — color authority (who owns color decisions: Design System team owns the official palette and approves additions/changes, each product team has a 'color steward' who ensures compliance, quarterly color review with all stewards — surface drift and standardize), color policy (official palette is the single source of truth: all 12 products must use the same reference tokens, new colors require formal request with: use case justification, accessibility verification, semantic token mapping — approved or denied within 1 week, no ad-hoc hex values — lint rules enforce token usage, sunset process: old palettes deprecated with migration timeline), palette unification plan (reduce 340 unique hex values to target ~80-100: audit all 340 values, cluster similar colors, map each to nearest official token, provide migration mapping for every team)."
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Response designs approval and enforcement workflows — color addition workflow (designer identifies need → submits request with: proposed color hex, intended role, accessibility verification, which products need it → Design System team reviews: does this exist already? can an existing color serve? → if approved: added to official palette with semantic token name, documented, distributed to all teams → if denied: rationale provided with alternative suggestion), enforcement mechanisms (automated: CI/CD lint rule that flags any hex value not in the official token set — blocks deployment or warnings depending on strictness level, design tool plugins: Figma plugin that validates color usage against approved palette, manual: quarterly audit of all products sampling 10 screens each — compliance score reported to VP), exception process (teams can request temporary exceptions for: experimental features, client-specific branding, time-limited campaigns — exceptions have expiry dates and auto-review)."
    weight: 0.35
    description: "ApprovalAndEnforcement"
  - type: llm_judge
    criteria: "Response addresses cross-format consistency and metrics — format standardization (establish one source of truth with automatic conversion: hex as primary definition, Pantone: mapped equivalents for print, RGB: for digital, HSL: for programmatic manipulation, iOS UIColor and Android Color: for mobile — all generated from the same source, never manually maintained), design token distribution (tokens defined in one system like Tokens Studio or Style Dictionary, exported to: CSS custom properties for web, Swift constants for iOS, Kotlin constants for Android, SCSS variables for legacy, Figma shared library — automated sync prevents drift), governance metrics (track: number of non-standard colors in production — trending down, accessibility compliance rate — trending up from 60% toward 100%, time to approve new color requests — target <5 business days, cross-product visual consistency score — quarterly assessment), and communication (annual 'state of color' report to design leadership, onboarding materials for new designers, color governance included in design team handbook)."
    weight: 0.30
    description: "ConsistencyAndMetrics"
