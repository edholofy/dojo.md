meta:
  id: color-typography-roi
  level: 4
  course: color-palette-typography-rationale
  type: output
  description: "Color and typography ROI — quantify the business impact and return on investment of systematic color and typography improvements"
  tags: [roi, business-impact, metrics, investment, expert]

state: {}

trigger: |
  A VP of Product says: "The design team wants to spend
  6 months and $200K on a 'color and typography overhaul.'
  They say it will 'improve the user experience' but the
  CFO wants numbers. Questions:

  1. What's the measurable business impact of better
     color and typography?
  2. How do we calculate ROI on this investment?
  3. What metrics should we track before and after?
  4. Can you show me examples of companies that measured
     the impact of visual design changes?

  I believe design matters, but I need to make the
  business case. Help me build it."

  Task: Build a business case for color and typography
  investment with ROI framework, measurable metrics,
  and supporting evidence.

assertions:
  - type: llm_judge
    criteria: "Response quantifies business impact of color and typography — conversion impact (CTA button color and contrast directly affect click-through rates — A/B tests consistently show 10-30% conversion differences from color changes, typography readability affects time-on-page and bounce rates — users who can't read easily leave, brand consistency increases recognition by up to 80% and can increase revenue by 23% — cite Lucidpress/Marq study), cost reduction impact (design inconsistency costs: developer time spent choosing/debating colors ad-hoc, accessibility remediation after launch — average of $10-25K per product for WCAG fixes that proper palette design prevents, brand inconsistency requiring rework across marketing, product, and communications — estimated hours per year), risk mitigation (accessibility lawsuits: average ADA digital accessibility settlement is $50-100K, inaccessible color usage is the #1 most common WCAG failure at 96.3% of homepages — WebAIM Million data)."
    weight: 0.35
    description: "BusinessImpact"
  - type: llm_judge
    criteria: "Response builds ROI calculation framework — investment breakdown ($200K over 6 months: design system color architecture, typography system, token implementation, migration, documentation — break down where the money goes), return categories (hard ROI: conversion rate improvement — if checkout conversion increases 5% and current revenue is $X, the return is 0.05 × $X annually, development efficiency — if developers save 2 hours/week on color decisions across 20 developers, that's 2,080 hours/year × hourly rate, accessibility risk reduction — probability of lawsuit × average settlement cost avoided), soft ROI (brand perception improvement — measured by NPS or brand sentiment surveys, employee satisfaction — designers report higher satisfaction with systematic tools, faster onboarding — new designers productive sooner with documented systems), ROI formula (ROI = (Gain from Investment − Cost of Investment) / Cost of Investment × 100 — provide worked example with realistic numbers showing positive ROI within 12-18 months)."
    weight: 0.35
    description: "ROIFramework"
  - type: llm_judge
    criteria: "Response provides measurement plan — before/after metrics (establish baselines BEFORE the overhaul begins: conversion rates at key funnels, bounce rates, time-on-page, accessibility audit pass rate, developer velocity on UI tasks, brand consistency score from audit, NPS or CSAT scores, task completion rates for key user flows — measure all again 3 months and 6 months after overhaul completes), industry evidence (cite real examples: Google's Material Design system improving development efficiency, Airbnb's design system reducing time-to-market, any available data on typography/color A/B test results from published case studies), presentation format (executive summary: one-page with investment, expected return, risk assessment, and recommendation, detailed appendix: calculation methodology, assumptions, comparable company data, measurement plan with timeline — written for CFO-level audience, not designers)."
    weight: 0.30
    description: "MeasurementAndEvidence"
