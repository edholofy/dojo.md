meta:
  id: typography-across-product-suite
  level: 4
  course: color-palette-typography-rationale
  type: output
  description: "Typography across product suite — create a unified typography strategy for a portfolio of related products"
  tags: [product-suite, unification, portfolio, consistency, expert]

state: {}

trigger: |
  A Head of Design says: "Our company has 6 products
  acquired over 5 years. Each has its own typography:

  - Product A (flagship): Inter for everything
  - Product B (analytics): Roboto Mono for data, Roboto for UI
  - Product C (messaging): SF Pro on iOS, Roboto on Android
  - Product D (CMS): Georgia headings, Arial body
  - Product E (e-commerce): Montserrat headings, Lato body
  - Product F (mobile-only): System fonts throughout

  Users who use multiple products say 'they don't feel
  like they're from the same company.' But each product's
  typography was chosen for good reasons.

  How do I unify typography across 6 products without
  breaking what works in each?"

  Task: Design a unified typography strategy for a
  multi-product portfolio with rationale for consistency
  vs. product-specific flexibility.

assertions:
  - type: llm_judge
    criteria: "Response evaluates each product's typography needs — Product A (flagship/general): flexible, any font works; Product B (analytics): needs tabular figures and monospace for data — legitimate technical need; Product C (messaging): platform-native fonts reduce latency and feel natural — legitimate UX reason; Product D (CMS): Georgia/Arial is dated but content-first CMS may benefit from serif readability; Product E (e-commerce): Montserrat+Lato are both sans-serif with insufficient contrast; Product F (mobile): system fonts are performance-optimal for mobile — each assessment is honest about whether the current choice serves a real purpose vs. being an arbitrary historical decision."
    weight: 0.35
    description: "ProductAnalysis"
  - type: llm_judge
    criteria: "Response designs a unified typography framework — shared brand layer (one primary font family used across all products for brand-level elements: product name, navigation, key headings — creates immediate family resemblance, recommendation: Inter or similar comprehensive family with variable font support, wide weight range, and tabular figures for analytics), product-specific flexibility (each product can use additional fonts for justified reasons: analytics keeps monospace for data, messaging keeps system fonts for performance, but unnecessary variation eliminated: e-commerce doesn't need both Montserrat AND Lato, CMS doesn't need Georgia — can use the shared family), the framework (Tier 1 — Mandatory: brand font for product name, primary navigation, page titles — all 6 products, Tier 2 — Recommended: brand font for body text, buttons, forms — unless product has justified alternative, Tier 3 — Flexible: specialized fonts for specific contexts like monospace for code/data — product team decides with design system review)."
    weight: 0.35
    description: "UnifiedFramework"
  - type: llm_judge
    criteria: "Response provides migration and governance plan — migration priority (start with highest-visibility unification: product names and navigation across all products — immediate family resemblance with minimal engineering effort, then standardize body typography product by product during planned redesigns — opportunistic migration not forced), design tokens for typography (shared tokens: --font-brand, --font-body, --font-data, --font-mono — products consume shared tokens and can override with justified alternatives, token distribution ensures future changes propagate), governance (typography decisions reviewed by cross-product design council, new font requests require: performance impact assessment, licensing review, justification for why shared font doesn't suffice, quarterly typography consistency audit across all products), and user perception measurement (after unification: survey multi-product users on brand consistency perception — track improvement)."
    weight: 0.30
    description: "MigrationAndGovernance"
