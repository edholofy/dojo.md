meta:
  id: brand-evolution-strategy
  level: 4
  course: color-palette-typography-rationale
  type: output
  description: "Brand evolution strategy — plan a multi-year color and typography evolution that maintains recognition while modernizing"
  tags: [brand-evolution, modernization, recognition, strategy, expert]

state: {}

trigger: |
  A CMO says: "Our brand is 15 years old. The palette
  and typography feel dated but we have strong brand
  recognition — customers identify us by our colors.

  Current brand:
  - Primary: Dark forest green (#2D5016) — 'our' green
  - Secondary: Gold (#DAA520) — traditional feel
  - Typography: Garamond for headings, Verdana for body
  - Overall feel: traditional, established, trustworthy
    but also 'old' and 'corporate'

  We want to evolve to feel modern and dynamic without
  losing the recognition and trust our existing colors
  carry. Our competitor just rebranded with a neon palette
  and their customers hated it.

  The board says: 'Evolve, don't revolve.' How do we
  modernize over time without a jarring rebrand?"

  Task: Design a multi-year brand color and typography
  evolution strategy with rationale for pacing and
  specific transitions.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased evolution strategy — Year 1: Refresh, not rebrand (keep the green but modernize: shift #2D5016 to a brighter, more saturated green like #22C55E or #16A34A — same color family but feels contemporary, update gold to a warmer modern variant — from antique gold #DAA520 to something like #F59E0B amber, maintain recognition while signaling freshness), Year 2: Typography modernization (transition from Garamond to a modern serif like DM Serif Display or Source Serif Pro for headings — retains serif editorial quality but with contemporary letterforms, transition from Verdana to Inter or similar for body — modern, wide feature set, variable font), Year 3: Extended palette and system (introduce additional colors beyond green and gold — build a complete modern palette with the evolved green as anchor, introduce design token architecture for consistent application), the key principle: evolution not revolution — each year's change is noticeable but not jarring, and each builds on the previous."
    weight: 0.35
    description: "PhasedEvolution"
  - type: llm_judge
    criteria: "Response addresses brand recognition preservation — what to keep (the green: this IS the brand — it stays green, the overall tone: trustworthy and established — evolution adds modernity on top, not replacing trust), what to change (saturation and vibrancy: from dark/muted to brighter/cleaner, typography weight: from traditional serif + dated sans-serif to modern versions of both, application: from conservative corporate layouts to more dynamic usage with whitespace, scale, and typography contrast), recognition testing (during each phase: conduct brand recognition studies — can existing customers still identify the brand? A/B test evolved vs. original in marketing materials — measure recognition and preference), competitor lesson (their competitor's neon rebrand failed because it was too drastic — complete personality change, not evolution — use as internal case study for why gradual evolution is safer), stakeholder communication (present evolution as a timeline showing Year 0, Year 1, Year 2, Year 3 — each step is a small change that accumulates into a modern identity)."
    weight: 0.35
    description: "RecognitionPreservation"
  - type: llm_judge
    criteria: "Response provides implementation roadmap and documentation — touch point rollout per year (Year 1 green refresh: update digital products first — website, app, social media — fastest to change, then marketing materials as they're reprinted, physical signage last — most expensive to change; Year 2 typography: same digital-first order), brand guidelines evolution (update brand guide each year — not a single massive new guide but annual editions showing the evolution, include 'was/now' comparisons so teams can see the change), internal communication (all-hands presentation: 'why we're evolving' — share the strategic rationale, address employee attachment to current brand — people resist change), measurement (brand perception surveys: quarterly tracking of attributes like 'modern', 'trustworthy', 'innovative' — should see 'modern' rising while 'trustworthy' holds steady, if 'trustworthy' drops: slow down evolution), and budget planning (Year 1: minimal cost — digital updates only, Year 2: font licensing + digital updates, Year 3: full palette rollout including physical materials — phased investment)."
    weight: 0.30
    description: "ImplementationRoadmap"
