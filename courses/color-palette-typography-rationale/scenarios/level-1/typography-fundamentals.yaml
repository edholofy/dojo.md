meta:
  id: typography-fundamentals
  level: 1
  course: color-palette-typography-rationale
  type: output
  description: "Typography fundamentals — explain typeface categories, font anatomy, and basic selection criteria"
  tags: [typography, fundamentals, typeface, font-selection, beginner]

state: {}

trigger: |
  A content manager says: "I've been asked to choose fonts
  for our company blog redesign. I know there are serif
  and sans-serif fonts, but beyond that I'm lost.

  Requirements:
  - Professional but approachable tone
  - Long-form articles (readability is key)
  - Works on both desktop and mobile
  - Budget: free or Google Fonts only

  I need to pick a heading font and a body font. How do
  I choose? What makes a font 'good' for body text vs.
  headings? And how do I explain my choices to the team?"

  Task: Explain typography fundamentals and recommend
  a heading/body font pairing with written rationale.

assertions:
  - type: llm_judge
    criteria: "Response explains typography fundamentals — typeface categories (serif: traditional, authoritative, have small decorative strokes — e.g., Georgia, Merriweather; sans-serif: modern, clean, no decorative strokes — e.g., Inter, Open Sans; display: decorative, for large sizes only — not for body text; monospace: fixed-width, for code), font anatomy basics (x-height: height of lowercase letters — larger x-height improves readability at small sizes, line-height/leading: space between lines — 1.5-1.7 for body text, tracking/letter-spacing: space between all characters — affects readability and visual density, weight: thin to black — regular/400 for body, bold/700 for emphasis), readability factors (x-height, character width, open counters, clear letterforms — all affect how easily text can be read at body sizes)."
    weight: 0.35
    description: "TypographyBasics"
  - type: llm_judge
    criteria: "Response recommends a specific font pairing with clear rationale — heading font recommendation (e.g., Source Serif Pro, Playfair Display, or Lora — serif for headings adds warmth and editorial quality, creates visual hierarchy against sans-serif body), body font recommendation (e.g., Inter, Source Sans Pro, or Nunito — sans-serif for body text provides clean readability on screens, large x-height and open counters aid long-form reading), pairing logic (contrast principle: serif headings + sans-serif body creates clear visual hierarchy, shared characteristics: similar x-height or proportions create harmony despite contrast, the pairing conveys 'professional but approachable' — serif editorial quality + sans-serif modern friendliness). All recommended fonts must be available on Google Fonts as specified in the budget."
    weight: 0.35
    description: "FontPairingRecommendation"
  - type: llm_judge
    criteria: "Response includes practical sizing guidance and written rationale — type scale (body: 16-18px for comfortable reading, headings: clear hierarchy like H1: 36px, H2: 28px, H3: 22px, line-height: 1.5-1.7 for body, 1.2-1.3 for headings), responsive considerations (body text should be at least 16px on mobile to prevent zoom, line length: 50-75 characters per line for optimal readability — constrain with max-width), and a written rationale suitable for presenting to the team (font names, why each was chosen, how they work together, what tone they create, specific usage rules — heading font at weights X and Y, body font at regular and bold only)."
    weight: 0.30
    description: "SizingAndRationale"
