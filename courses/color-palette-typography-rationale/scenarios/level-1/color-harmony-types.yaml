meta:
  id: color-harmony-types
  level: 1
  course: color-palette-typography-rationale
  type: output
  description: "Color harmony types — explain complementary, analogous, triadic, and split-complementary color schemes with use cases"
  tags: [color-harmony, complementary, analogous, triadic, beginner]

state: {}

trigger: |
  A marketing coordinator says: "I need to create color
  palettes for three different campaigns:

  1. A calming wellness brand (spa and meditation app)
  2. A playful children's education platform
  3. A bold sports drink launch

  My designer friend said I should use 'color harmonies'
  but I don't know the difference between complementary,
  analogous, triadic, etc. Which harmony type works for
  each campaign and why?"

  Task: Explain the main color harmony types and recommend
  the best harmony for each campaign with rationale.

assertions:
  - type: llm_judge
    criteria: "Response explains major color harmony types — complementary (two colors opposite on the color wheel — high contrast, energetic, bold — e.g., blue and orange), analogous (three colors adjacent on the color wheel — harmonious, cohesive, calming — e.g., blue, blue-green, green), triadic (three colors equally spaced on the color wheel — vibrant, balanced variety — e.g., red, yellow, blue), split-complementary (base color plus two colors adjacent to its complement — contrast with less tension — e.g., blue, red-orange, yellow-orange), monochromatic (single hue with varying saturation and value — unified, elegant, subtle — e.g., light blue, medium blue, dark blue). Each harmony type explained with visual character and emotional quality."
    weight: 0.35
    description: "HarmonyExplanations"
  - type: llm_judge
    criteria: "Response recommends appropriate harmonies for each campaign — Wellness brand: analogous harmony recommended (e.g., soft blue-green, teal, sage green — adjacent colors create soothing, cohesive feel appropriate for calm and relaxation, no jarring contrasts), Children's education: triadic harmony recommended (e.g., primary red, blue, yellow or adjusted secondary palette — vibrant variety captures children's attention, playful and energetic without being chaotic), Sports drink: complementary harmony recommended (e.g., electric blue and orange, or green and red — maximum contrast creates bold, high-energy visual impact suitable for action and competition). Each recommendation explains WHY the harmony type matches the brand personality and audience."
    weight: 0.35
    description: "CampaignRecommendations"
  - type: llm_judge
    criteria: "Response provides practical application guidance — for each campaign: specific hex values suggested as starting points, recommended proportions (dominant, secondary, accent percentages), where each color appears in typical marketing materials (backgrounds, headlines, CTAs, icons), common mistakes to avoid (too many equally saturated colors in triadic creates visual noise — vary saturation levels, analogous palettes need sufficient value contrast to avoid looking flat, complementary can vibrate optically at full saturation — desaturate one). Includes brief written rationale statement for each campaign palette that could be presented to a client or stakeholder."
    weight: 0.30
    description: "PracticalApplication"
