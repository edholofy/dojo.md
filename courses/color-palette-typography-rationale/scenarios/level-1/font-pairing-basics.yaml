meta:
  id: font-pairing-basics
  level: 1
  course: color-palette-typography-rationale
  type: output
  description: "Font pairing basics — explain principles of combining typefaces including contrast, concordance, and hierarchy"
  tags: [font-pairing, contrast, hierarchy, typefaces, beginner]

state: {}

trigger: |
  A startup founder says: "I'm building a fintech app
  and I want it to feel trustworthy but modern. I tried
  pairing Roboto with Open Sans but my designer friend
  said they're 'too similar' and don't create hierarchy.

  Then I tried Comic Sans with Times New Roman and she
  laughed. Clearly I don't know what I'm doing.

  What are the rules for pairing fonts? How do I know
  if two fonts work together?"

  Task: Explain font pairing principles and recommend
  2-3 font pairings appropriate for a fintech app with
  rationale for each.

assertions:
  - type: llm_judge
    criteria: "Response explains font pairing principles — contrast (pair fonts that are different enough to create visual distinction — serif + sans-serif is classic contrast, two very similar sans-serifs like Roboto and Open Sans don't create enough contrast for hierarchy), concordance (paired fonts should share underlying characteristics — similar x-height, proportions, or mood even when structurally different, this creates harmony), hierarchy (font pairing should establish clear visual hierarchy — one font for headings, one for body, weight and size differences reinforce the hierarchy), the 'too similar' problem (Roboto vs Open Sans: both geometric sans-serifs with similar proportions — creates visual confusion, not enough differentiation for heading vs body), the 'too different' problem (Comic Sans vs Times New Roman: radically different personalities create visual discord — no shared mood or aesthetic thread)."
    weight: 0.35
    description: "PairingPrinciples"
  - type: llm_judge
    criteria: "Response recommends 2-3 specific font pairings for fintech — Pairing 1: e.g., DM Serif Display + Inter (serif heading adds gravitas and trust, Inter body text is clean and modern, contrast creates hierarchy while both feel polished), Pairing 2: e.g., Space Grotesk + IBM Plex Sans (geometric precision feels tech-forward, IBM Plex has institutional credibility, both share clean geometry for concordance), Pairing 3: e.g., Fraunces + Work Sans (Fraunces has warmth and character for headings, Work Sans is neutral and professional for body, contrast is clear but mood is cohesive). Each pairing includes: font names, heading vs body assignment, why it works for fintech specifically (trust, modernity, professionalism), and the contrast/concordance dynamic."
    weight: 0.35
    description: "FintechPairings"
  - type: llm_judge
    criteria: "Response provides practical pairing testing guidance — how to evaluate pairings (set both fonts at the same size first — do they share proportional harmony? then set at intended sizes — does the heading font command attention while body font supports reading? test with real content, not lorem ipsum), quick pairing rules of thumb (one serif + one sans-serif almost always works, superfamily pairings are safe bets like Roboto + Roboto Slab, match x-height between pairs for visual consistency, limit to 2 fonts maximum — 3 is rarely necessary), common mistakes (using display fonts for body text, using too many weights — stick to regular + bold for body font, pairing two decorative fonts — at least one must be neutral), and tools for exploration (Google Fonts suggested pairings, Fontjoy, Typewolf)."
    weight: 0.30
    description: "PracticalGuidance"
