meta:
  id: type-scale-hierarchy
  level: 1
  course: color-palette-typography-rationale
  type: output
  description: "Type scale and hierarchy — create a typographic scale with clear visual hierarchy for headings, body, and supporting text"
  tags: [type-scale, hierarchy, sizing, spacing, beginner]

state: {}

trigger: |
  A product designer says: "I'm setting up the typography
  for a new SaaS dashboard. Right now everything looks
  the same size and weight — there's no visual hierarchy.
  Users can't tell what's important.

  Current mess:
  - Page titles: 16px regular
  - Section headers: 16px bold
  - Body text: 14px regular
  - Labels: 14px regular
  - Helper text: 12px regular

  The sizes are too close together. Nothing stands out.
  How do I create a proper type scale and what's the
  rationale behind the sizing?"

  Task: Design a typographic scale for a SaaS dashboard
  with clear hierarchy and written rationale for each
  level.

assertions:
  - type: llm_judge
    criteria: "Response explains type scale principles — mathematical scales (type scales use a consistent ratio to create harmonious size progression — Major Third 1.250, Perfect Fourth 1.333, Augmented Fourth 1.414, Perfect Fifth 1.5 — each has different character), why the current scale fails (16/16/14/14/12 has only 2px and 4px differences — not enough visual contrast, bold alone is insufficient hierarchy signal, labels and body text are identical size creating confusion), minimum differentiation (adjacent sizes should differ by at least 20-30% to be clearly distinguishable — 14px to 16px is only 14% increase, barely noticeable), and how hierarchy works (size is primary hierarchy signal, weight is secondary, color/opacity is tertiary — combine all three for clear levels)."
    weight: 0.35
    description: "TypeScalePrinciples"
  - type: llm_judge
    criteria: "Response provides a specific type scale for the SaaS dashboard — recommended scale with clear levels (Display/Page Title: 28-32px semibold or bold — clearly the most important element, H2/Section Header: 20-24px semibold — clearly subordinate to page title but prominent, H3/Subsection: 16-18px semibold — labels for card sections or widget titles, Body: 14-16px regular — primary reading text, Label/Caption: 12-13px medium — form labels and metadata, Helper/Small: 11-12px regular — supporting text and timestamps), each level has: specific px value, font weight, line-height recommendation, and color/opacity (page title: 100% opacity, body: 87% or #333, helper text: 60% or #666), the scale follows a consistent ratio or is logically structured."
    weight: 0.35
    description: "DashboardTypeScale"
  - type: llm_judge
    criteria: "Response includes line-height, spacing, and written rationale — line-height per level (headings: 1.2-1.3 for tight, impactful feel, body text: 1.5-1.6 for comfortable reading, helper text: 1.4 for compact but readable), spacing rules (margin-bottom for each heading level — creates breathing room and groups related content, spacing between section header and first paragraph, spacing between paragraphs), and a written rationale document (table or list format showing: level name, size, weight, line-height, color, usage example, why this value was chosen — e.g., 'Page title at 28px bold creates immediate visual anchoring and is 75% larger than body text, ensuring users always know what page they're on')."
    weight: 0.30
    description: "SpacingAndRationale"
