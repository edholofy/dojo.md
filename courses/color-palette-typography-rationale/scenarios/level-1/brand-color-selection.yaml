meta:
  id: brand-color-selection
  level: 1
  course: color-palette-typography-rationale
  type: output
  description: "Brand color selection — choose a primary brand color based on industry, audience, and brand values"
  tags: [brand-color, selection, industry, values, beginner]

state: {}

trigger: |
  A small business owner says: "I'm opening a bakery
  called 'Morning Bloom' — artisan pastries and specialty
  coffee. My target customers are young professionals
  aged 25-40 in an urban area.

  Brand values: warmth, craftsmanship, community, quality
  (not mass-produced)

  I need to pick brand colors but I'm overwhelmed. My
  competitors use:
  - Competitor A: Pink and white (very feminine)
  - Competitor B: Brown and cream (traditional bakery)
  - Competitor C: Black and gold (luxury feel)

  I want to feel distinct but still 'bakery-appropriate.'
  Help me choose colors and explain why."

  Task: Select a primary brand color palette for this
  bakery with detailed rationale explaining the choice.

assertions:
  - type: llm_judge
    criteria: "Response selects appropriate brand colors with clear reasoning — primary color choice (warm tone appropriate for bakery — terracotta, warm coral, dusty rose, sage green, or warm mustard — avoids overused bakery colors while remaining food-appropriate, connects to brand name 'Morning Bloom' with natural or sunrise-inspired tones), competitive differentiation (analyzes competitor colors and positions the recommendation to stand out — not pink like Competitor A, not traditional brown like B, not luxury black/gold like C — carves own visual territory), brand values alignment (chosen colors map to stated values: warmth — warm undertones, craftsmanship — earthy/artisan feel, community — approachable not exclusive, quality — refined not cheap)."
    weight: 0.35
    description: "ColorSelection"
  - type: llm_judge
    criteria: "Response builds a complete palette, not just one color — full palette with 4-6 colors (primary: the main brand color, secondary: a complementary tone, accent: a pop color for CTAs and highlights, neutrals: warm whites and dark tones for text and backgrounds — not pure white #FFFFFF or pure black #000000, use off-whites and charcoal for warmth), each color has a hex value and named role, proportions recommended (60-30-10 or similar), palette works together harmonically (shares undertones or follows a color harmony principle), and considers practical applications (how colors appear on packaging, signage, digital — bakery needs colors that work on physical and digital materials, food photography needs neutral backgrounds that don't compete with food images)."
    weight: 0.35
    description: "CompletePalette"
  - type: llm_judge
    criteria: "Response provides a presentable rationale document — structured as: brand overview (who is Morning Bloom, target audience, brand values), palette presentation (visual-friendly layout with color swatches described, hex values, and names), color-by-color rationale (why each color was chosen, what it communicates, where it's used), competitive positioning (how the palette differentiates from competitors), application guidance (storefront signage, packaging, cups and bags, menu design, social media, website — brief notes on how the palette applies to each), and mood/feeling summary (the overall impression the palette creates — should read as 'warm, artisan, inviting, modern' not 'corporate' or 'mass-market')."
    weight: 0.30
    description: "RationalePresentation"
