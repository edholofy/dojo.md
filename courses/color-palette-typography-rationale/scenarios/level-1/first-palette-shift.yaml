meta:
  id: first-palette-shift
  level: 1
  course: color-palette-typography-rationale
  type: output
  description: "First palette shift — handle multiple beginner color and typography tasks in a single session"
  tags: [shift, combined, assessment, beginner]

state: {}

trigger: |
  You're a junior designer at a small agency. Your
  morning tasks:

  TASK 1 — A client (local yoga studio) asks: "We want
  our website to feel 'calm and grounded.' Here are
  3 palettes we like. Which is best and why?"
  - Palette A: Bright neon green, hot pink, electric blue
  - Palette B: Sage green, warm beige, soft terracotta
  - Palette C: Navy, gold, burgundy

  TASK 2 — Same client asks: "We're using Montserrat for
  everything — headings, body text, captions, all at
  the same weight. Is that okay?"

  TASK 3 — Your manager reviews your work on another
  project and says: "You used 14 different colors in
  this design. Why? Pick 5 and justify each one."

  Task: Handle all three design tasks with appropriate
  color and typography rationale.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — palette evaluation for yoga studio — Palette A rejected (neon green, hot pink, electric blue — high energy, overstimulating, opposite of calm and grounded — these are nightclub colors, not yoga studio colors), Palette B recommended (sage green, warm beige, soft terracotta — earthy, natural, calming — sage green connects to nature and serenity, beige is warm and grounding, terracotta adds warmth without energy — perfectly aligned with 'calm and grounded'), Palette C analyzed (navy, gold, burgundy — sophisticated and luxurious but feels more like a law firm or hotel than a yoga studio — conveys formality and prestige, not calm and groundedness), recommendation includes specific rationale connecting palette B's colors to the client's stated feelings and yoga studio context."
    weight: 0.35
    description: "PaletteEvaluation"
  - type: llm_judge
    criteria: "Response handles Task 2 — typography assessment for yoga studio — identifies the problem (using one font family for everything CAN work but using same weight throughout eliminates visual hierarchy — users can't distinguish headings from body from captions), if keeping Montserrat: vary weights (Montserrat Light or Regular for body at 16px, Montserrat SemiBold or Bold for headings at 24-28px, Montserrat Medium for captions at 12-13px — weight and size variation creates hierarchy within one family), or recommend a pairing (Montserrat for headings paired with a complementary body font like Lora or Source Serif for warmer, more readable body text — serif body text has a calming, editorial quality that fits yoga studio), provides rationale for whichever approach is recommended."
    weight: 0.35
    description: "TypographyAssessment"
  - type: llm_judge
    criteria: "Response handles Task 3 — color reduction exercise — explains the problem (14 colors creates visual chaos — no coherent brand identity, inconsistent user experience, harder to maintain, every color should have a PURPOSE), provides a framework for reducing to 5 (Primary: main brand/action color, Secondary: supporting brand color, Accent: attention-grabbing highlight, Neutral Dark: text and dark UI elements, Neutral Light: backgrounds and subtle elements), demonstrates the exercise (pick 5 from the hypothetical 14 with justification: 'I kept the blue because it's our primary CTA color, I removed the teal because it was too similar to the blue and created confusion, I kept the dark gray for text because pure black felt harsh...'), establishes the principle: every color in a palette must have a documented role — if you can't justify it, remove it."
    weight: 0.30
    description: "ColorReduction"
