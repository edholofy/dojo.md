meta:
  id: color-theory-basics
  level: 1
  course: color-palette-typography-rationale
  type: output
  description: "Color theory basics — explain fundamental color concepts including hue, saturation, value, and the color wheel"
  tags: [color-theory, basics, hsv, color-wheel, beginner]

state: {}

trigger: |
  A junior designer says: "I'm putting together my first
  color palette for a fitness app. My manager asked me to
  'document the color rationale' but I don't even know
  the basics. I picked colors that 'look good together'
  but I can't explain WHY they work.

  The colors I chose:
  - Bright orange (#FF6B35)
  - Dark navy (#1A1A2E)
  - Light gray (#F0F0F0)

  Can you help me understand the color theory behind why
  these might work (or not) and how to write a rationale?"

  Task: Explain basic color theory concepts and help write
  a beginner-level color palette rationale for these colors.

assertions:
  - type: llm_judge
    criteria: "Response explains fundamental color theory concepts — hue (the color itself on the color wheel — orange at ~30°, navy-blue at ~240°), saturation (intensity/purity of color — the orange is highly saturated, the navy is deep/low brightness), value/lightness (how light or dark — the palette has clear light-to-dark range: light gray, bright orange, dark navy), color wheel basics (primary, secondary, tertiary colors — orange is a warm secondary, navy is a cool primary), and temperature (warm colors like orange convey energy and action — fitting for fitness, cool colors like navy convey stability and trust). Applies these concepts to the specific palette chosen."
    weight: 0.35
    description: "ColorTheoryFundamentals"
  - type: llm_judge
    criteria: "Response evaluates the palette and explains why it works — complementary relationship (orange and blue are near-complementary on the color wheel — creates visual tension and energy), contrast (high contrast between dark navy and light gray ensures readability, orange as accent draws attention to CTAs and key elements), 60-30-10 rule (suggest proportions: 60% light gray as background, 30% navy as primary, 10% orange as accent — prevents visual overwhelm), palette coherence (the three colors create a balanced warm-cool dynamic appropriate for fitness branding — energy + trust + clean). Also identifies potential issues (orange may need adjustment for accessibility against light gray — contrast ratio check needed)."
    weight: 0.35
    description: "PaletteEvaluation"
  - type: llm_judge
    criteria: "Response provides a written color rationale template — structured rationale document including: palette overview (3-5 sentence summary of palette and its purpose), individual color entries (for each color: hex value, color name, role in the palette — primary/secondary/accent, why this color was chosen — connects to brand values or user psychology), color relationships (how the colors work together — complementary contrast, temperature balance), intended usage (where each color appears — backgrounds, text, buttons, icons), and emotional associations (orange = energy and motivation, navy = professionalism and trust, gray = clean and modern — all appropriate for fitness brand). Written in clear, presentable language suitable for a design review."
    weight: 0.30
    description: "RationaleDocument"
