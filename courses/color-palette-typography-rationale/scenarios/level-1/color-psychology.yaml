meta:
  id: color-psychology
  level: 1
  course: color-palette-typography-rationale
  type: output
  description: "Color psychology — explain how colors influence perception, emotion, and behavior in design contexts"
  tags: [color-psychology, emotion, perception, branding, beginner]

state: {}

trigger: |
  A brand strategist says: "We're rebranding a healthcare
  startup. The CEO wants red because it's 'bold and
  memorable.' The marketing lead wants green because it's
  'calming and natural.' The CTO wants blue because
  'every tech company uses blue for a reason.'

  I need to settle this debate with actual color psychology
  evidence. What do these colors actually communicate, and
  which is best for a healthcare startup?"

  Task: Explain color psychology for red, green, and blue
  in the context of healthcare branding and recommend the
  best primary color with rationale.

assertions:
  - type: llm_judge
    criteria: "Response explains color psychology for each color — Red (energy, urgency, passion, danger, appetite — in healthcare context: associated with emergency/danger/blood which can create anxiety, works for urgent care or bold disruptors but risky for general healthcare — may feel alarming rather than caring), Green (nature, growth, health, calm, renewal — in healthcare context: strong positive associations with health, healing, and natural wellness, used by pharmacies and health brands, feels safe and nurturing), Blue (trust, stability, professionalism, calm, competence — in healthcare context: most commonly used color in healthcare and medical branding, conveys reliability and expertise, used by hospitals, insurance companies, health tech — builds confidence and trust). Addresses cultural context (color meanings vary across cultures — red is lucky in China, white is mourning in some Asian cultures)."
    weight: 0.35
    description: "ColorPsychologyAnalysis"
  - type: llm_judge
    criteria: "Response provides a clear recommendation with nuanced rationale — recommends either blue or green as primary (both are appropriate for healthcare, with evidence for the recommendation), acknowledges strengths of each position (CEO's red: bold differentiation is valid but risky in healthcare, marketing's green: strong health associations, CTO's blue: proven trust-building), recommendation addresses the startup context (if wanting to feel established and trustworthy — blue, if wanting to feel natural and wellness-oriented — green, if wanting to stand out from blue-dominated healthcare landscape — green differentiates while remaining appropriate), suggests how to incorporate secondary colors (can use blue primary with green accents, or green primary with blue accents — doesn't have to be all-or-nothing), addresses red diplomatically (can be used sparingly as accent for CTAs or urgency indicators without being the primary brand color)."
    weight: 0.35
    description: "RecommendationAndRationale"
  - type: llm_judge
    criteria: "Response provides a color psychology rationale document — written rationale covering: color psychology evidence for the recommended color (cite general associations and industry precedent), competitive landscape consideration (what colors do competitors use — differentiation opportunity vs. industry convention), specific palette suggestion (primary color with 2-3 supporting colors — hex values, roles, and proportions), where each color appears (primary: logo, nav, key brand elements; secondary: accents, illustrations; neutral: backgrounds, text), and limitations of color psychology (color psychology is not exact science — cultural context, personal experience, and surrounding design all influence perception, use as guidance not gospel)."
    weight: 0.30
    description: "RationaleDocument"
