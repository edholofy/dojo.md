meta:
  id: competitive-color-analysis
  level: 2
  course: color-palette-typography-rationale
  type: output
  description: "Competitive color analysis — analyze competitor color palettes to inform differentiation strategy"
  tags: [competitive-analysis, differentiation, market, positioning, intermediate]

state: {}

trigger: |
  A brand strategist says: "We're launching a new
  project management tool. Before choosing our colors,
  I want to understand the competitive landscape:

  - Asana: coral/orange-red (#F06A6A)
  - Monday.com: multi-color rainbow approach
  - Trello: blue (#0079BF)
  - Jira: blue (#0052CC)
  - Notion: black and white minimalist
  - ClickUp: purple/gradient (#7B68EE)
  - Linear: purple/blue (#5E6AD2)

  There's a lot of blue and purple in this space. How
  do we differentiate visually while still looking like
  a credible project management tool? We don't want to
  look like a toy or a completely different category."

  Task: Conduct a competitive color analysis and
  recommend a differentiated palette with strategic
  rationale.

assertions:
  - type: llm_judge
    criteria: "Response conducts systematic competitive analysis — maps the color landscape (blue cluster: Trello, Jira — traditional tech/enterprise positioning, purple cluster: ClickUp, Linear — modern/innovative positioning, warm/bold: Asana — energetic/action-oriented, multi-color: Monday.com — playful/flexible, neutral: Notion — minimalist/content-first), identifies white space (underrepresented colors in the space: green, teal, warm earth tones, deep navy with warm accents — these represent differentiation opportunities), analyzes what color choices communicate about positioning (blue = enterprise/trust but crowded, purple = modern but increasingly common, warm colors = energy but may feel less 'serious' for enterprise), considers the implicit category conventions (productivity tools trend toward cool colors — blue, purple — because they convey focus and professionalism)."
    weight: 0.35
    description: "CompetitiveAnalysis"
  - type: llm_judge
    criteria: "Response recommends a differentiated palette with strategic reasoning — primary color choice occupies identified white space (e.g., teal/deep green conveys growth and productivity while being distinct from blue/purple competitors, or a distinctive warm-cool combination), recommendation balances differentiation with category credibility (can't look like a food delivery app — needs to read as 'productivity tool' while being visually distinct), full palette proposed (primary: differentiated main color, secondary: complementary supporting color, neutral: dark text and light backgrounds that feel polished, accent: distinctive highlight color for CTAs and key actions), positioning rationale (the palette communicates specific brand attributes that competitors don't own — e.g., 'while competitors focus on speed and features, our green palette positions us around sustainable productivity and growth')."
    weight: 0.35
    description: "DifferentiatedPalette"
  - type: llm_judge
    criteria: "Response provides competitive analysis documentation — visual competitive map (organized by color positioning — matrix or spectrum showing where each competitor sits and where the recommendation carves new space), rationale document structure (market analysis: what colors are saturated in this space, white space identification: what visual territory is unclaimed, recommendation: our positioning and supporting evidence, risk assessment: could this color be misread as a different category?), brand guidelines implications (how the palette extends to marketing materials, app UI, and brand communications — all should reinforce the differentiation), and ongoing monitoring (track new entrants and competitor rebrands — visual positioning requires maintenance, if a major competitor moves into our color space we may need to adjust)."
    weight: 0.30
    description: "AnalysisDocumentation"
