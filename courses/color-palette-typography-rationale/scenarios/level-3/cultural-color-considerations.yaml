meta:
  id: cultural-color-considerations
  level: 3
  course: color-palette-typography-rationale
  type: output
  description: "Cultural color considerations — adapt color palettes for international markets where color meanings differ significantly"
  tags: [cultural, international, localization, color-meaning, advanced]

state: {}

trigger: |
  A global product manager says: "We're expanding our
  fintech app from the US to China, Japan, India, Brazil,
  and the Middle East. Our current color scheme:

  - Primary: Green (#10B981) — for 'money, growth, positive'
  - Error: Red (#EF4444) — for 'danger, stop, negative'
  - Trust: Blue (#3B82F6) — for 'security, reliability'
  - Caution: Yellow (#F59E0B) — for 'warning, attention'
  - Mourning/Formal: Black — for headers and serious UI

  My localization team says some of these colors have
  VERY different meanings in different cultures. Red
  means 'luck and prosperity' in China — so it's weird
  to use it for errors. Green is the sacred color of
  Islam. White means mourning in some Asian cultures.

  How do we handle this? We can't create a different
  palette for every country, can we?"

  Task: Create a culturally-informed color strategy for
  international markets with rationale for adaptation vs.
  consistency decisions.

assertions:
  - type: llm_judge
    criteria: "Response maps cultural color meanings per market — China (red: luck, prosperity, celebration — positive not negative; yellow: imperial, auspicious; white: mourning, death — careful with white-heavy UIs; green: relatively neutral; gold: wealth and prestige), Japan (red: life, energy — generally positive; white: purity — also mourning in some contexts; black: formality, mystery; blue: trust — similar to Western), India (red: auspicious, marriage, prosperity — positive; saffron/orange: sacred, spiritual; green: Islam, nature, fertility; white: mourning in Hindu tradition; blue: associated with Krishna — divine), Brazil (green and yellow: national flag — patriotic but also political connotations; purple: mourning; blue: positive), Middle East (green: Islam, paradise, life — deeply significant; blue: protection from evil eye — positive; red: danger but also courage; gold: wealth, prestige). Analysis is specific and nuanced, not stereotypical."
    weight: 0.35
    description: "CulturalColorMapping"
  - type: llm_judge
    criteria: "Response provides strategic recommendation — NOT a different palette per market (impractical: increases design and engineering complexity exponentially, fractures brand identity), recommended approach: universal color system with cultural sensitivity (keep semantic color tokens consistent across markets but pair with non-color indicators: icons, text labels, patterns — never rely on color meaning alone, keep the primary brand color consistent globally for brand recognition, for status colors: use icons and text alongside color — a red error message with an X icon communicates 'error' regardless of cultural color associations, for culturally sensitive elements like marketing: allow regional color customization within brand guidelines — e.g., Chinese New Year promotions can feature red and gold), specific adjustments (error states: use icon + text + color — the icon and text carry the meaning, color reinforces but isn't sole communicator; financial positive/negative: use up/down arrows alongside green/red — or consider blue for positive where green is problematic)."
    weight: 0.35
    description: "StrategicRecommendation"
  - type: llm_judge
    criteria: "Response provides documentation and implementation — cultural color guidelines document (per-market page: key color sensitivities, what to avoid, what to embrace, regional marketing color palette — distinct from core product palette), implementation strategy (core product: one global palette with strong non-color communication — accessible AND culturally neutral, marketing materials: regionalized color guidance — allow local teams to select culturally appropriate promotional colors within brand framework, sensitive use cases: financial gain/loss, celebrations, mourning — document market-specific guidance), user testing recommendation (test color associations with users in each market — don't rely only on desk research, user testing may reveal that younger urban users in China are familiar with Western color conventions from global apps, cultural color sensitivity decreases in digital-native generations but should still be respected), and the key principle: design for meaning, not for color — if the meaning is clear without color, cultural color differences become less risky."
    weight: 0.30
    description: "ImplementationDocs"
