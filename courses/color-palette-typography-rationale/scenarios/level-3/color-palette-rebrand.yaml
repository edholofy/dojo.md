meta:
  id: color-palette-rebrand
  level: 3
  course: color-palette-typography-rationale
  type: output
  description: "Color palette rebrand — plan and execute a color palette change for an established product"
  tags: [rebrand, migration, transition, palette-change, advanced]

state: {}

trigger: |
  A VP of Design says: "We're rebranding. Our current
  palette (established 8 years ago) feels dated:

  Old palette:
  - Primary: #1565C0 (dark corporate blue)
  - Secondary: #FFA000 (amber)
  - Background: #FAFAFA (cold gray-white)
  - Text: #212121 (near-black)

  New brand palette (from agency):
  - Primary: #6366F1 (indigo-violet)
  - Secondary: #EC4899 (vibrant pink)
  - Background: #FEFCE8 (warm cream)
  - Text: #1E293B (blue-tinted dark)

  The palette shift is dramatic — from conservative
  corporate to modern and bold. The product has:
  - 300+ screens
  - 45 components in the design system
  - Mobile apps on iOS and Android
  - Marketing website
  - Email templates
  - PDF reports generated by the system

  How do we plan and execute this rebrand across
  everything without breaking the product?"

  Task: Create a rebrand color migration plan with
  rationale for the transition approach, risk assessment,
  and rollout strategy.

assertions:
  - type: llm_judge
    criteria: "Response plans the color migration systematically — audit current usage (map every use of old colors across all touchpoints: product UI, mobile apps, marketing, email, PDFs — create a comprehensive color inventory showing where each hex value appears), token-based migration (if design tokens exist: rebrand is a token value change — update reference tokens and semantic tokens follow automatically, if tokens don't exist: this is the moment to introduce them — migrate to tokens AND rebrand simultaneously), palette expansion (agency provided 4 colors but product needs full system: extend to include — old palette equivalent mappings, tints/shades for each new color, semantic colors that may not change: success green, error red, warning amber — decide what stays and what changes), and color mapping document (old → new for every color: #1565C0 → #6366F1 for primary, #FFA000 → #EC4899 for secondary, but also: all intermediate shades, hover states, disabled states, background tints — complete mapping table)."
    weight: 0.35
    description: "MigrationPlanning"
  - type: llm_judge
    criteria: "Response addresses the dramatic palette shift — risk assessment (old palette was conservative cool tones, new palette is warm and vibrant — this affects: readability — verify all new text/background combinations meet WCAG AA, user recognition — users familiar with old blue may not recognize the product, data visualization — charts using old colors need migration, third-party integrations — embedded widgets, partner-branded elements, print materials — business cards, letterhead, signage with old colors), phased rollout strategy (Option A: big bang — change everything at once for brand consistency, Option B: phased — marketing first then product then mobile then email, recommended approach with rationale — big bang is cleaner for brand consistency but higher risk, phased reduces risk but creates a period of mixed branding), user communication (notify users before the change — 'Our new look is coming' preview, ensure critical user paths are tested post-rebrand — can users still find what they need?)."
    weight: 0.35
    description: "RiskAndRollout"
  - type: llm_judge
    criteria: "Response covers all touchpoints and documentation — product-specific considerations (300+ screens: prioritize by traffic, test high-traffic flows end-to-end, 45 components: update design system first — components cascade to screens, mobile apps: require App Store review — longer deployment timeline than web, email templates: test across email clients — Outlook renders colors differently, PDF reports: update templates and verify output), acceptance criteria for each touchpoint (no old hex values remaining, all text meets WCAG AA contrast, visual regression tests pass, user testing with 5+ users confirms navigation not impaired), rebrand documentation (brand guidelines update: new palette with hex/RGB/CMYK values, usage rules, do/don't examples, old-to-new mapping reference for stragglers, sunset date for old brand assets — after which old colors should not appear anywhere), and timeline (realistic timeline: 2-3 months for full migration across all touchpoints, milestones per phase with dependencies)."
    weight: 0.30
    description: "TouchpointsAndDocs"
