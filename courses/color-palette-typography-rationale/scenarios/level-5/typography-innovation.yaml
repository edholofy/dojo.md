meta:
  id: typography-innovation
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "Typography innovation — explore and evaluate emerging typography technologies and techniques for next-generation products"
  tags: [innovation, emerging, variable-fonts, ai, future, master]

state: {}

trigger: |
  A Chief Design Officer says: "I want us to be at the
  forefront of typography innovation. Current landscape:

  1. Variable fonts are mainstream but we're barely using
     their capabilities beyond weight variation
  2. AI-generated custom typefaces are emerging — should
     we create our own brand font?
  3. Responsive typography with container queries enables
     context-aware sizing — we haven't explored this
  4. Inclusive typography research shows that letter
     differentiation significantly impacts readability
     for users with dyslexia and low vision
  5. Color fonts (COLRv1) enable multi-color glyphs —
     useful for emoji and illustrations in text

  Budget: $500K for a typography innovation initiative.
  Which of these should we invest in, and why?"

  Task: Evaluate each typography innovation opportunity
  and recommend an investment strategy with rationale
  for prioritization.

assertions:
  - type: llm_judge
    criteria: "Response evaluates each innovation — Variable font deep usage (beyond weight: width axis for responsive density, optical size for automatic size-specific adjustments, grade axis for weight changes without layout shift — enables micro-interactions, responsive design refinements, accessibility improvements — HIGH value, moderate cost), AI-generated custom typeface (emerging tools like Fontjoy, Prototypo, AI font generators — creating a truly unique brand font differentiates visually, but risks: quality of AI-generated fonts varies, maintenance burden of custom font, licensing clarity of AI-generated work, production readiness — MEDIUM value, high risk), Container query typography (font-size: clamp() based on container width not viewport — enables truly modular responsive components, each component adapts typography to its context regardless of viewport — HIGH value, low cost), Inclusive typography (letter differentiation research backed by scientific evidence — Atkinson Hyperlegible and similar fonts measurably improve reading speed for dyslexic users — HIGH impact, aligns with accessibility strategy, moderate cost), Color fonts COLRv1 (enables multi-color glyphs without image fallbacks — useful for brands with icon-heavy communication, browser support is growing, file size concern with multiple color layers — MEDIUM value, niche application)."
    weight: 0.35
    description: "InnovationEvaluation"
  - type: llm_judge
    criteria: "Response recommends prioritized investment strategy — $500K allocation (Priority 1 — $200K: Inclusive typography initiative — commission or license a readability-optimized font for body text, conduct user research with disabled users to measure impact, integrate into design system as default body font — aligns with accessibility strategy and has measurable user benefit), Priority 2 — $150K: Variable font capabilities — implement width, optical size, and grade axes throughout the design system, create responsive typography that adapts to container context using container queries, build micro-interaction patterns using font-weight animation — significant UX improvement), Priority 3 — $100K: Custom brand typeface exploration — prototype an AI-assisted custom heading font, evaluate quality and production readiness, if successful: unique brand differentiation, if not: use investment to license a premium existing font — measured risk), Reserve — $50K: Color font experimentation — limited exploration of COLRv1 for icon integration and marketing materials, evaluate browser support timeline for production readiness), why this order (inclusive typography has the clearest ROI — measurable accessibility improvement and legal risk reduction, variable fonts have immediate practical benefit across all products, custom typeface is strategic differentiation but higher risk, color fonts are experimental with limited production use today)."
    weight: 0.35
    description: "InvestmentStrategy"
  - type: llm_judge
    criteria: "Response provides evaluation criteria and timeline — success metrics per initiative (inclusive typography: reading speed improvement for users with dyslexia — target 15%+ improvement in user testing, accessibility compliance improvement — WCAG text spacing requirements met by default, variable fonts: performance improvement — payload size reduction, responsive typography quality score from design review, container query adoption across components — target 100%, custom typeface: brand differentiation score in perception study vs competitors, production readiness checklist — hinting quality, weight range, language support, color fonts: proof-of-concept quality, browser support coverage, file size impact), timeline (Quarter 1: inclusive typography research and font selection, variable font implementation begins, Quarter 2: inclusive font integrated into design system, container query typography deployed, custom typeface prototyping begins, Quarter 3: user testing results for inclusive typography, custom typeface evaluation go/no-go decision, color font experimentation, Quarter 4: full rollout of confirmed initiatives, results report with ROI for each investment), and industry positioning (publishing findings from inclusive typography research positions company as accessibility leader — conference talks, blog posts, open-source contribution of research data)."
    weight: 0.30
    description: "EvaluationAndTimeline"
