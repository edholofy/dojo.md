meta:
  id: color-typography-keynote
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "Color and typography keynote — deliver a thought leadership keynote on the future of color and typography in digital design"
  tags: [keynote, thought-leadership, future, industry, master]

state: {}

trigger: |
  You've been invited to keynote at the Design Systems
  Conference. Title: "The Science and Soul of Color and
  Typography: Why Most Design Systems Get It Wrong."

  Audience: 2,000 design system practitioners, design
  leads, engineers, and product managers.

  Your talk should:
  1. Challenge the current approach to color and typography
     in design systems (too mechanical, not scientific
     enough)
  2. Present a vision for how color and typography
     systems should evolve
  3. Bridge the gap between color science and practical
     design system implementation
  4. Address accessibility as a design excellence goal,
     not a compliance checkbox
  5. Be provocative but actionable

  Task: Write the keynote outline with key arguments,
  supporting evidence, and actionable takeaways.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling keynote structure — provocative opening ('Every design system I've audited has the same problem: your color scales aren't scales at all. They're arbitrary steps in a non-perceptual color space that you generated with a tool you don't understand. Your blue-400 to blue-500 isn't the same visual distance as blue-700 to blue-800. Your data visualization palette fails for 8% of your male users. And your typography — you chose a font because it was popular on Google Fonts and set sizes based on what felt right. We can do better.'), current state critique (design systems treat color as a solved problem: generate a palette with Coolors, name it blue-100 through blue-900, done — but the generation is arbitrary, the spacing is perceptually unequal, and the accessibility testing is an afterthought, typography is even worse: most design systems document 'we use Inter' with no rationale for the choice, no perceptual testing, no inclusive design consideration), the core argument: color and typography are the most visible design decisions we make — they deserve scientific rigor, not gut feeling."
    weight: 0.35
    description: "KeynoteStructure"
  - type: llm_judge
    criteria: "Response presents the evolution vision — three provocations: Provocation 1: Color science belongs in design systems (OKLCH and perceptual uniformity should be the foundation of every color scale — not RGB or HSL, Delta E should be used to verify that color scale steps are perceptually even, data visualization palettes should be generated from perceptual distance calculations not aesthetic preference, this isn't academic — it directly affects whether users can distinguish elements in your charts), Provocation 2: Typography is a readability engineering problem (choosing a font because it 'looks modern' is like choosing a database because the logo is nice — typeface selection should be tested with user performance metrics: reading speed, comprehension, error rate, letterform differentiation measured scientifically — b/d, I/l/1 confusion rates, inclusive typography designed for users with dyslexia, low vision, and cognitive disabilities should be the default, not an accommodation), Provocation 3: Accessibility is design excellence (stop treating 4.5:1 contrast as a ceiling — it's a floor, the question isn't 'does this pass WCAG?' but 'can real people with real disabilities actually use this?' — usability-first, compliance-follows approach)."
    weight: 0.35
    description: "EvolutionVision"
  - type: llm_judge
    criteria: "Response provides actionable takeaways — for design system practitioners (next Monday actions: audit your color scales in OKLCH — are the perceptual steps even? run your data visualization palette through a colorblind simulator — is every color distinguishable in deuteranopia, protanopia, and tritanopia? test your body font's letter differentiation — print 'Illiterate billiard' and see if every character is distinct, measure your typography accessibility — does your system respect text spacing overrides per WCAG 1.4.12?), for design leads (invest in color science literacy for your team — it's not optional anymore, commission user testing of your typography with disabled users — the results will surprise you, build perceptual uniformity checks into your color generation pipeline — automate the science), for engineers (implement OKLCH in your token pipeline — the math is straightforward and the results are superior, build font-metric matching for fallback fonts — eliminate CLS from font loading, implement automated accessibility testing for every color combination — not just spot checks), memorable closing ('We've spent 20 years building design systems that are consistent. It's time to build design systems that are correct. Consistent mediocrity is still mediocrity. Let's bring science, inclusivity, and genuine craft to the most fundamental elements of our visual systems — color and type. Your users — all of them — deserve it.')."
    weight: 0.30
    description: "ActionableTakeaways"
