meta:
  id: global-color-standardization
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "Global color standardization — harmonize color systems across a multinational organization with regional offices, acquired brands, and cultural requirements"
  tags: [global, standardization, multinational, harmonization, master]

state: {}

trigger: |
  A Global VP of Design says: "Our company operates in
  30 countries with products built by teams in 8 offices.
  We've acquired 6 companies in the last 4 years. The
  visual identity is chaos:

  - US headquarters: original brand palette (blue + green)
  - Berlin office: evolved the palette independently
    (different blues, added purple)
  - Tokyo office: adapted colors for Japanese market
    (added warmer tones, adjusted red usage)
  - São Paulo office: uses colors aligned with local
    preferences (brighter, more saturated)
  - 6 acquired brands: each has its own palette ranging
    from 'very different' to 'somewhat compatible'

  Total: ~2,000 unique color values across all offices
  and brands. We need ONE global color system that:
  1. Creates brand unity across 30 countries
  2. Respects legitimate cultural differences
  3. Absorbs acquired brands over time
  4. Can be governed from HQ without micromanaging

  How do we build a global color standard?"

  Task: Design a global color standardization strategy
  with federated governance, cultural accommodation,
  and acquisition integration framework.

assertions:
  - type: llm_judge
    criteria: "Response designs global color architecture — core global palette (one universal set of reference tokens: ~100 colors that ALL offices and brands use — primary brand colors, semantic colors, full neutral scale, this is the 'brand DNA' that creates unity), regional flexibility layer (each region can add supplementary colors for: cultural appropriateness — Tokyo's warm tones for Japanese market, local marketing campaigns — São Paulo's vibrant palette for Brazilian market, but supplementary colors must: complement the global palette, meet accessibility requirements, be approved by regional design lead — not ad-hoc), acquisition integration framework (new brands enter a 3-phase integration: Phase 1 — co-branded with global palette as secondary, Phase 2 — gradual migration of product UI to global palette with brand-specific accents, Phase 3 — full integration into global system with optional legacy accent color — timeline: 12-18 months per acquisition)."
    weight: 0.35
    description: "GlobalArchitecture"
  - type: llm_judge
    criteria: "Response creates federated governance model — central authority (HQ design system team owns: core global palette definition, semantic token architecture, accessibility requirements, quarterly global color audit — ensures unity without micromanagement), regional autonomy (each regional office has a Regional Design Lead who: manages regional supplementary colors, approves local marketing color usage, ensures cultural appropriateness, reports color usage to central team quarterly), governance structure (Global Color Council: HQ lead + 4 regional leads, meets quarterly, decisions: changes to core palette require council vote, regional additions require regional lead approval + central notification, new acquisition integration plan requires council review), and escalation path (disagreements between regions: discussed in council, cultural concerns override HQ preferences — if Tokyo says red for error is culturally inappropriate in certain contexts, that's respected with documented rationale)."
    weight: 0.35
    description: "FederatedGovernance"
  - type: llm_judge
    criteria: "Response provides implementation roadmap and measurement — phased rollout (Year 1: define global palette + audit all 2,000 colors + create migration mappings, Year 2: migrate all offices to global palette + regional layers, Year 3: integrate remaining acquisitions + optimize governance), reducing 2,000 to manageable set (automated clustering: group similar colors across all offices — many of the 2,000 are near-duplicates that can merge, mapping workshop per office: work with each team to map their colors to global tokens — respect their context while standardizing, deprecation: old color values become aliases to new tokens during transition, then removed), measurement (global color consistency score: % of all products using exclusively global + approved regional colors — target: 80% by end of Year 1, 95% by end of Year 2, brand recognition study: does consistent color usage improve cross-regional brand recognition? accessibility compliance: all regions achieve WCAG AA — no exceptions, dashboard showing color usage per region — visible to council and leadership), tooling (global token distribution system: tokens published as npm packages, Figma library sync, mobile SDK — one source of truth propagated to all offices, regional override mechanism built into tooling — regions configure their supplementary colors without modifying core)."
    weight: 0.30
    description: "ImplementationMeasurement"
