meta:
  id: ai-assisted-color-typography
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "AI-assisted color and typography — evaluate and implement AI tools for palette generation, font selection, and design system automation"
  tags: [ai, automation, generation, machine-learning, master]

state: {}

trigger: |
  A Chief Design Officer says: "AI is transforming
  everything. I want to understand how it can transform
  our color and typography work specifically:

  1. AI palette generation — tools that generate palettes
     from a brand brief or mood board. Are they good
     enough to replace a designer's judgment?
  2. AI font matching — tools that recommend typeface
     pairings based on compatibility algorithms. Better
     than human intuition?
  3. Automated accessibility correction — AI that
     automatically adjusts colors to meet WCAG standards.
     Can we trust it?
  4. Generative typography — AI that creates custom
     typefaces. Ready for production?
  5. Design token generation — AI that generates semantic
     token structures from existing design files.
     Practical yet?

  Our design team is nervous — they think AI will
  replace them. Our engineering team is excited — they
  think AI will eliminate design bottlenecks.

  Give me an honest assessment and implementation plan."

  Task: Evaluate AI capabilities for color and typography
  with honest assessment of readiness, risks, and
  implementation strategy.

assertions:
  - type: llm_judge
    criteria: "Response provides honest evaluation of each AI capability — AI palette generation (current state: tools can generate aesthetically pleasing palettes from prompts or mood boards, but lack brand strategy understanding — they produce 'nice colors' not 'strategically positioned brand colors', honest assessment: useful for exploration and initial ideation, not ready to replace designer judgment for brand decisions — 70% of the way there for inspiration, 20% for production), AI font matching (current state: algorithms analyze visual similarity metrics — x-height ratio, stroke width, proportional harmony — and recommend pairings, honest assessment: surprisingly good for identifying compatible fonts, better than random pairing, but lacks cultural and emotional judgment — can suggest harmonious fonts but not whether the pair communicates 'luxury fintech' vs 'friendly healthcare'), automated accessibility correction (current state: can adjust colors to meet contrast ratios algorithmically — darken or lighten until 4.5:1 is met, honest assessment: most reliable AI application — mathematically deterministic, can trust the contrast math, but may produce aesthetically poor results — an AI-adjusted palette may meet WCAG but look muddy or lose brand character), generative typography (current state: AI can generate letterforms and complete typefaces, honest assessment: NOT ready for production — generated fonts often have: inconsistent metrics, poor hinting, insufficient weight range, quality issues at small sizes — useful for concept exploration, 2-3 years from production readiness), design token generation (current state: can analyze Figma files and extract color/typography usage into token structures, honest assessment: most practical and immediately useful — can accelerate what is otherwise tedious manual work, needs human review of semantic naming and organization but saves significant time)."
    weight: 0.35
    description: "HonestEvaluation"
  - type: llm_judge
    criteria: "Response addresses the team dynamic and provides implementation strategy — addressing designer concerns (AI doesn't replace designers — it replaces the tedious parts: generating color variations, checking contrast ratios, extracting tokens from files, designers focus on strategy: brand positioning, emotional impact, user experience — the parts AI can't do, reframe: AI as design power tool, like Figma replaced manual pixel pushing but didn't replace designers), addressing engineering enthusiasm (temper expectations — AI won't eliminate design bottlenecks overnight, automated palette generation still needs design review, AI-generated tokens need human semantic naming, the bottleneck in design isn't color picking — it's decision-making, alignment, and strategy — AI doesn't accelerate those), implementation plan (Phase 1 — Quick wins with low risk: deploy automated accessibility checking in CI/CD — AI verifies contrast ratios automatically, no human review needed for pass/fail, integrate design token extraction tooling — AI generates initial token structure from Figma, designers review and refine; Phase 2 — Augmentation: add AI palette exploration tools to designer workflow — for inspiration during brand exploration, deploy AI font matching as suggestion tool — designers see recommendations but make final decisions; Phase 3 — Evaluation: pilot generative typography for a non-critical internal project, evaluate quality and production readiness)."
    weight: 0.35
    description: "TeamDynamicsAndStrategy"
  - type: llm_judge
    criteria: "Response provides governance and risk framework — AI governance for design (principle: AI generates options, humans make decisions — no autonomous AI changes to production colors or typography, review workflow: AI suggestion → designer evaluation → design lead approval → implementation, quality gates: AI-generated palettes must pass: brand consistency check, accessibility verification, colorblind simulation, perceptual uniformity validation — before consideration), risks (brand dilution: AI-generated palettes may trend toward generic — same tool used by everyone produces similar results, over-reliance: teams may accept AI suggestions without critical evaluation — 'the AI said it's fine' replaces design thinking, quality degradation: AI-generated fonts and tokens may introduce subtle issues that only surface in production — thorough testing required), documentation (AI usage policy for design: which tools are approved, which decisions require human judgment, how AI suggestions are documented and reviewed, training: team education on AI capabilities and limitations — prevent both fear and over-enthusiasm), and measurement (track: time saved by AI-assisted workflows, quality of AI-generated vs human-generated design decisions — blind comparison studies, designer satisfaction with AI tools — are they helpful or frustrating?)."
    weight: 0.30
    description: "GovernanceAndRisk"
