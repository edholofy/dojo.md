meta:
  id: color-maturity-model
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "Color and typography maturity model — create a maturity framework to assess and advance organizational color and typography capabilities"
  tags: [maturity-model, assessment, capability, advancement, master]

state: {}

trigger: |
  A Design Operations Director says: "I need to assess
  where our organization stands in color and typography
  maturity and create a roadmap to improve. We currently
  have:

  - A basic palette documented in a PDF
  - Typography choices that vary by team
  - No design tokens — colors are hardcoded
  - No dark mode support
  - Accessibility compliance is ~60%
  - No governance — anyone can add colors

  I want a maturity model like CMMI but for color and
  typography systems. Something I can use to:
  1. Assess where we are today
  2. Show leadership where we need to be
  3. Create a roadmap with clear milestones
  4. Benchmark against industry peers

  Design the maturity model."

  Task: Create a color and typography maturity model
  with assessment criteria, level definitions, and
  advancement roadmap.

assertions:
  - type: llm_judge
    criteria: "Response defines 5 maturity levels — Level 1: Ad Hoc (colors chosen individually per project, no shared palette, typography decisions made by individual designers, no documentation — characterized by: inconsistency, duplication, frequent debates about 'which blue'), Level 2: Defined (one documented palette exists, basic typography guidelines, colors stored as static values — Sass variables or hex codes, some accessibility awareness but not systematic — characterized by: documentation exists but adherence is inconsistent), Level 3: Managed (design tokens implemented, semantic naming, dark mode supported, typography system with modular scale, WCAG AA compliance achieved, basic governance with approval process — characterized by: systematic approach, tokens as single source of truth, accessibility built in), Level 4: Optimized (multi-theme architecture, automated token distribution across platforms, continuous accessibility monitoring, performance-optimized font loading, cross-product consistency, ROI metrics tracked — characterized by: engineering excellence, measurable business impact), Level 5: Leading (perceptually uniform color science foundation, global multi-brand multi-theme architecture, AI-assisted color generation, inclusive typography innovation, industry thought leadership, federated governance — characterized by: pushing industry forward, color and typography as competitive advantage). Each level has clear, observable assessment criteria."
    weight: 0.35
    description: "MaturityLevels"
  - type: llm_judge
    criteria: "Response provides assessment framework — assessment dimensions (for each maturity level, assess across: Palette Architecture — how colors are structured and stored, Typography System — how typefaces and sizing are organized, Accessibility — color contrast and typography inclusiveness, Governance — who controls color/typography decisions, Tooling — what tools and automation support the system, Documentation — how complete and current are the specifications, Cross-Platform — consistency across web, iOS, Android, Performance — font loading and rendering optimization), scoring methodology (each dimension scored 1-5 against level criteria, overall maturity = lowest dimension score — because the weakest area represents actual capability, assessment questionnaire: 5-7 specific questions per dimension with observable answers — e.g., 'Are all text/background combinations verified against WCAG AA?' Yes/No), current state assessment (applies the model to the organization described: basic palette PDF = Level 2 for Architecture, varying typography = Level 1 for Typography System, 60% accessibility = Level 2, no governance = Level 1, overall: Level 1-2 with specific gaps identified per dimension)."
    weight: 0.35
    description: "AssessmentFramework"
  - type: llm_judge
    criteria: "Response creates advancement roadmap — from current Level 1-2 to target: Level 2→3 roadmap (6-9 months: implement design tokens replacing hardcoded values, establish modular type scale, achieve WCAG AA compliance across all products, implement basic governance — color addition requires review, deliverables: token system, typography specification, accessibility audit, governance document), Level 3→4 roadmap (9-12 months: add dark mode as theme, automate token distribution to all platforms, implement continuous accessibility monitoring in CI/CD, optimize font performance to Core Web Vitals targets, track ROI metrics, deliverables: multi-theme architecture, automated pipeline, performance dashboards), Level 4→5 roadmap (12-18 months: adopt perceptual color science, explore typography innovation, establish federated governance for multi-team organization, publish research and contribute to industry — deliverables: science-based color system, innovation prototypes, industry presentations), milestone markers (clear criteria for declaring advancement to each level — leadership can track progress), and industry benchmarking (compare organizational maturity against known benchmarks: most companies are Level 1-2, top design systems like Material Design and Polaris are Level 4-5, being at Level 3 puts you in top 20% of organizations)."
    weight: 0.30
    description: "AdvancementRoadmap"
