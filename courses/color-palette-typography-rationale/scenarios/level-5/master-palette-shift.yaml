meta:
  id: master-palette-shift
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "Master palette shift — handle a week of strategic color and typography challenges as a Chief Design Officer"
  tags: [shift, combined, assessment, master]

state: {}

trigger: |
  You're the Chief Design Officer of a Fortune 500
  technology company. Your week:

  MONDAY — The board reviews your annual design report.
  A board member asks: "We spend $3M/year on design
  systems. How much of that is color and typography,
  and what's the return? Show me the numbers." You
  have 10 minutes to respond with a convincing business
  case.

  WEDNESDAY — Your company announces a $500M acquisition
  of a competitor. Their visual identity (warm oranges
  and rounded typefaces) is the opposite of yours (cool
  blues and geometric sans-serif). The CEO asks: "What's
  our visual integration strategy? Can their customers
  handle a color change?" You need a plan by Friday.

  FRIDAY — A major client (government agency) threatens
  to end a $50M contract because "your products fail
  accessibility standards — specifically, color contrast
  failures across 3 products and typography that doesn't
  respect user text-size preferences." You have 48 hours
  to respond with a remediation plan.

  Task: Handle all three strategic challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Monday — board-level ROI presentation — immediate response strategy (don't present costs — present value: 'Color and typography systems represent approximately $800K of our $3M design systems investment. Here's what that investment delivers:'), quantified returns (brand consistency: unified color and typography across 15 products creates recognizable brand identity for 50M users — consistent brands earn 23% more revenue, development efficiency: design tokens eliminate 2,000+ annual decisions about color and font values — estimated 4,000 engineer-hours saved per year at $150/hour = $600K efficiency gain, accessibility risk: systematic color contrast compliance prevents the ADA lawsuits our industry peers face — average settlement: $75K-500K, we've had zero color-accessibility incidents, user experience: our typography system ensures readability across devices — measurable in time-on-task, task completion, and customer satisfaction metrics), total estimated value vs. investment ($800K investment → $600K efficiency + risk avoidance + brand revenue impact = positive ROI within 12 months), presented in board language — no design terminology."
    weight: 0.35
    description: "BoardROI"
  - type: llm_judge
    criteria: "Response handles Wednesday — acquisition visual integration strategy — assessment (warm orange/rounded vs. cool blue/geometric — opposite personalities, their customers chose them partly for their visual identity — changing it risks customer alienation, but long-term brand fragmentation is costly), recommendation (phased approach: Phase 1 — co-branding with minimal visual changes — add our logo/name alongside theirs, keep their palette and typography intact, communicate to their customers: 'same product, now with our resources behind it'; Phase 2 at Month 6 — shared component architecture with dual themes — their visual identity and ours rendered from same components, engineering efficiency without visual disruption; Phase 3 at Month 12-18 — evaluate: if products are merging, gradually evolve their visual identity toward ours, if products remain distinct, maintain separate brand identities on shared architecture), user impact analysis (research shows abrupt visual changes cause: 15-25% increase in support tickets, temporary decrease in task completion, negative sentiment — gradual evolution mitigates all three), Friday delivery: one-page visual integration strategy document for CEO."
    weight: 0.35
    description: "AcquisitionStrategy"
  - type: llm_judge
    criteria: "Response handles Friday — government accessibility crisis — immediate response (within 48 hours: acknowledge the findings — 'We take accessibility compliance seriously and are committed to resolving these issues', do NOT argue or minimize — a $50M contract and government goodwill are at stake), remediation plan (72-hour triage: immediately audit all 3 products for color contrast failures — quantify scope, deploy emergency fixes for critical contrast failures — text color adjustments that can be deployed without UI redesign, typography text-size respect: audit all products for hardcoded font sizes — replace px with rem, verify no overflow: hidden on text containers, verify all products respect iOS Dynamic Type and Android font-size preferences), client-facing remediation document (structured as: executive summary — 'We identified the root causes and have a remediation plan', findings acknowledgment — specific issues found across 3 products with severity, immediate fixes — what will be deployed within 2 weeks, systematic fix — design token architecture ensuring all products inherit accessible defaults, prevention — CI/CD accessibility gates, continuous monitoring, quarterly third-party audit, timeline — milestones with dates), contract protection (offer: quarterly accessibility compliance reports going forward, third-party accessibility audit at our expense, direct escalation path for any accessibility issues — demonstrates commitment beyond remediation)."
    weight: 0.30
    description: "GovernmentAccessibilityCrisis"
