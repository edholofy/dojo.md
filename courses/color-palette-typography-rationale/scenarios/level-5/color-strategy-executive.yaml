meta:
  id: color-strategy-executive
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "Color strategy executive communication — present color and typography strategy to C-suite with business impact, competitive positioning, and investment case"
  tags: [executive, strategy, c-suite, business-case, master]

state: {}

trigger: |
  A Chief Design Officer says: "I have 30 minutes with
  the CEO, CFO, and CTO to present our color and
  typography strategy for the next 3 years. They're
  not designers — they think in revenue, risk, and
  competitive advantage.

  Our situation:
  - $2B annual revenue, 15 products, 50M users
  - Brand recognition is strong but visual identity is
    fragmented — each product looks different
  - Accessibility litigation risk is growing — 2 demand
    letters received this year
  - Competitor just launched a unified, modern visual
    identity and is winning perception in media
  - Our design system exists but color and typography
    are inconsistent

  Build me a C-suite presentation that makes the case
  for investing $1.5M over 18 months in a unified
  color and typography system."

  Task: Create a C-suite color and typography strategy
  presentation with business case, competitive analysis,
  and investment framework.

assertions:
  - type: llm_judge
    criteria: "Response creates executive-level business case — revenue impact (brand consistency can increase revenue 10-20% through improved recognition — cite research, consistent visual identity across 15 products means 50M users experience a unified brand — currently fragmented experience reduces cross-sell effectiveness, modern visual identity wins media perception — competitor's rebrand is generating coverage and user perception advantage), risk mitigation ($2B company with 2 demand letters: ADA settlements average $50-100K each, class-action exposure could be $500K-2M+, systematic color accessibility compliance eliminates this risk vector — currently 40%+ of color usage likely fails WCAG, regulatory: European Accessibility Act enforcement begins 2025 — non-compliance affects EU market access), competitive response (competitor's unified visual identity is a market signal — if we don't respond, we risk being perceived as dated/fragmented, investment positions us ahead of remaining competitors who haven't unified yet)."
    weight: 0.35
    description: "BusinessCase"
  - type: llm_judge
    criteria: "Response structures the 30-minute presentation — executive summary (2 minutes: the problem in one sentence, the solution in one sentence, the investment and expected return), market context (5 minutes: competitor analysis, industry trend toward unified design, accessibility regulatory landscape), current state assessment (5 minutes: fragmentation cost — developer hours wasted, brand inconsistency, accessibility risk quantified, before photos showing inconsistency across products), proposed investment (10 minutes: $1.5M over 18 months — Phase 1: audit and architecture $300K, Phase 2: implementation and migration $800K, Phase 3: governance and optimization $400K, what each phase delivers with milestones), expected returns (5 minutes: quantified — accessibility risk eliminated, development efficiency gains, brand consistency improvement with measurement plan, ROI calculation showing payback within 12-24 months), ask and decision (3 minutes: specific approval requested, next steps, timeline to begin). Presentation avoids design jargon — no 'tokens,' 'type scale,' or 'color harmony' — translates everything to business language."
    weight: 0.35
    description: "PresentationStructure"
  - type: llm_judge
    criteria: "Response addresses each C-suite stakeholder — CFO concerns (investment justification: $1.5M vs. quantified risk reduction + efficiency gains + revenue impact, ROI timeline: when does investment pay for itself, ongoing costs: maintenance is ~$200K/year after initial investment — design system team allocation), CEO concerns (competitive positioning: how this positions the company visually in the market, brand strength: unified identity strengthens brand equity across all 15 products, user perception: consistent visual experience builds trust and loyalty), CTO concerns (technical architecture: design tokens, automated distribution, CI/CD integration — presented as engineering infrastructure not design project, development velocity: standardized colors and typography reduce decision-making and implementation time, scalability: system scales to new products and acquisitions without per-product design work), and the presentation includes: metrics dashboard proposal — what will be tracked and reported quarterly to the executive team to demonstrate ROI."
    weight: 0.30
    description: "StakeholderAlignment"
