meta:
  id: color-typography-ma
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "Color and typography M&A — conduct visual identity due diligence during acquisitions and plan post-merger integration"
  tags: [ma, acquisition, due-diligence, integration, master]

state: {}

trigger: |
  A VP of Corporate Development says: "We're acquiring
  a company for $200M. The integration team covers
  technology, operations, and people. Nobody ever looks
  at visual identity until it's too late.

  The acquisition target:
  - Their own mature design system with 80 components
  - Color palette: warm oranges and greens (very different
    from our cool blues and grays)
  - Typography: they use a $40K/year licensed typeface
    that our license doesn't cover
  - Their brand has strong recognition in their market
    segment — customers chose them partly because of
    their distinct visual identity
  - 3 products with ~5M users

  Questions:
  1. What's the visual identity risk in this acquisition?
  2. How do we value/cost the integration work?
  3. Should we absorb their identity into ours, keep it
     separate, or create something new?
  4. What's the user impact of changing their colors?

  Task: Conduct visual identity due diligence and plan
  integration with rationale for the approach.

assertions:
  - type: llm_judge
    criteria: "Response conducts visual identity due diligence — cost assessment (font licensing: $40K/year ongoing — can we extend our license to cover their usage or must we negotiate separately? migration cost if we change their typography: estimate engineering hours across 3 products × 80 components, color system compatibility: warm orange/green vs. cool blue/gray — fundamentally different visual identities, complete palette overhaul needed if absorbing, design system integration: merging 80 components with our system — per-component audit for color and typography dependencies — estimate $100-300K in integration work), risk assessment (user disruption: 5M users will see visual changes — risk of confusion, reduced trust, perceived 'hostile takeover' of their beloved product, brand equity destruction: their warm visual identity is part of why customers chose them — changing it may erode that value, font license risk: is their $40K license transferable in an acquisition? review contract terms — could be $0 or could require renegotiation at higher rates), opportunity assessment (unified brand strengthens parent company identity, cross-selling opportunities improve with visual consistency)."
    weight: 0.35
    description: "DueDiligence"
  - type: llm_judge
    criteria: "Response recommends integration approach — evaluate three options (Option A: Full absorption — migrate acquired brand to parent palette, pros: brand unity, lower ongoing maintenance, cross-selling clarity, cons: user disruption, brand equity loss, high migration cost, timeline: 18-24 months; Option B: Maintain separate brand — keep their visual identity independent, pros: preserves brand equity, zero user disruption, cons: no brand unification, ongoing dual-system maintenance, separate governance; Option C: Unified architecture with brand expressions — shared component library with brand-specific color/typography tokens, pros: engineering efficiency with visual distinctiveness, cons: architecture complexity, moderate integration cost), recommended approach with rationale (likely Option C for Year 1-2: maintain their brand identity while migrating to shared component architecture with different theme, evaluate absorption in Year 3 based on: user retention data, brand perception studies, business unit strategy — if products are merging, visual merger follows naturally; if products remain distinct, visual distinction is valuable)."
    weight: 0.35
    description: "IntegrationApproach"
  - type: llm_judge
    criteria: "Response addresses user impact and integration plan — user communication (if any visual changes: communicate early and clearly — 'We're joining forces with [parent], here's what's changing and what's staying the same', gradual introduction of parent brand elements — co-branding first, subtle shifts over time, monitor: user sentiment, support tickets, churn rate during visual transitions — if metrics spike, slow down), integration timeline (Month 1-3: due diligence and architecture assessment — compatibility of design systems, token mapping, font license review, Month 3-6: shared architecture build — unified component library with dual themes, Month 6-12: migrate acquired products to shared components with acquired brand theme — looks the same to users but infrastructure is unified, Month 12+: strategic decisions about brand evolution based on data), cost summary for deal team (line items: design system integration — $X, font licensing resolution — $Y, user communication and transition — $Z, total visual identity integration cost: $X+Y+Z — should be factored into acquisition cost model alongside technology and operational integration), and success metrics (design system adoption: % of acquired products using shared components, user retention: no significant churn attributable to visual changes, engineering efficiency: reduced maintenance overhead from unified components)."
    weight: 0.30
    description: "UserImpactAndPlan"
