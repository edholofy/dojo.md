meta:
  id: color-culture-transformation
  level: 5
  course: color-palette-typography-rationale
  type: output
  description: "Color culture transformation — transform organizational culture around color and typography from ad-hoc to systematic excellence"
  tags: [culture, transformation, organizational, change, master]

state: {}

trigger: |
  A newly hired VP of Design says: "I inherited a 200-
  person design organization with a terrible relationship
  to color and typography. The symptoms:

  1. Designers treat color as decoration — 'just make it
     look nice' — no strategic thinking about color
  2. Engineers view typography as 'someone else's problem'
     and hardcode font sizes
  3. PMs don't understand why color and typography changes
     need dedicated sprint time
  4. Leadership thinks branding is the logo — they don't
     see color and typography as brand assets
  5. Accessibility is seen as a constraint, not a quality
     standard

  I've built a great token system before. The technology
  isn't the problem — the CULTURE is the problem. If I
  just implement tokens without changing how people think
  about color and typography, we'll be right back here
  in 2 years.

  How do I transform the culture?"

  Task: Design a cultural transformation program for
  color and typography excellence with change management
  strategy, education, and sustainability mechanisms.

assertions:
  - type: llm_judge
    criteria: "Response designs culture change strategy — addresses each stakeholder group differently (designers: transform from 'decoration' mindset to 'strategic communication' mindset — color and typography are the primary visual language, not ornamentation, training: color science, typography readability research, accessibility-as-craft; engineers: transform from 'someone else's problem' to 'engineering discipline' — font performance, token architecture, automated accessibility testing are engineering challenges, training: design token implementation, Core Web Vitals typography impact, WCAG contrast in CI/CD; PMs: transform from 'why does this take time' to 'this prevents rework and risk' — show that ad-hoc color decisions create downstream costs, education: business impact of visual consistency, accessibility litigation risk, time spent on rework; leadership: transform from 'logo is brand' to 'every pixel is brand' — color and typography are the most frequent touchpoints users have with the brand, presentation: competitive analysis showing how visual systems differentiate)."
    weight: 0.35
    description: "CultureChangeStrategy"
  - type: llm_judge
    criteria: "Response provides specific change management tactics — quick wins (Month 1-2: run a 'color and typography audit' of one flagship product with the whole team — make the current chaos visible and undeniable, showcase before/after: take one screen and redesign with proper color and typography system — the improvement is self-evident, share industry horror stories: accessibility lawsuits, rebrand failures — create urgency), education program (monthly 'Color & Type Craft' sessions: 30-minute lunch-and-learns rotating topics — color science, typography readability, accessibility deep-dives, data visualization color, invite external speakers: accessibility advocates, type designers, brand strategists — hearing from outside experts carries different weight than internal advocacy, create 'Color & Typography Fundamentals' onboarding module — every new hire gets foundational education), visible leadership (VP personally reviews color and typography decisions in design reviews — signals that leadership cares, celebrate examples of excellent color and typography work — internal newsletter, town hall shout-outs, establish 'Color & Typography Champions' in each team — voluntary role with recognition)."
    weight: 0.35
    description: "ChangeManagementTactics"
  - type: llm_judge
    criteria: "Response ensures sustainability — embedding in processes (color and typography review as part of design review checklist — not a separate meeting but integrated into existing workflow, accessibility contrast check as CI/CD gate — automated enforcement removes debate, PR review checklist includes typography compliance — engineers trained to review, new component acceptance criteria includes color and typography spec — not shipped without documentation), measuring cultural change (survey: quarterly pulse on designer attitudes toward color and typography — from 'decoration' to 'strategic', metric: % of projects that include color rationale documentation — from 0% toward 80%+, metric: accessibility compliance trending toward 100%, metric: designer satisfaction with color and typography tools and processes), avoiding regression (when the VP eventually leaves: the system should sustain itself — culture change means the practices continue without the champion, sustainability mechanisms: documented processes, automated enforcement, trained champions across teams, leadership buy-in documented in OKRs not just one person's advocacy, annual review: assess color and typography maturity against the maturity model — ensure continued advancement not regression)."
    weight: 0.30
    description: "Sustainability"
