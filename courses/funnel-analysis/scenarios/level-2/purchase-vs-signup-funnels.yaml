meta:
  id: purchase-vs-signup-funnels
  level: 2
  course: funnel-analysis
  type: output
  description: "Purchase vs signup funnels — understand how different funnel types (e-commerce purchase, SaaS signup, B2B lead gen) require different analysis approaches"
  tags: [funnel-types, ecommerce, saas, b2b, comparison, intermediate]

state: {}

trigger: |
  A new analyst joining the team says: "I've only worked on e-commerce
  purchase funnels before. Now I need to build funnels for our SaaS
  product (freemium signup and trial-to-paid) and for our enterprise
  sales pipeline. How are these different from what I know?"

  Task: Compare and contrast purchase funnels, signup/activation
  funnels, and B2B sales funnels — their structures, key metrics,
  optimization levers, and common pitfalls.

assertions:
  - type: llm_judge
    criteria: "Response compares the three funnel types structurally — structure: 'Three funnel types compared: E-commerce purchase funnel: structure: visit → browse → product page → add to cart → checkout → purchase. Time to convert: minutes to hours (single session or a few sessions). Decision maker: individual consumer. Friction type: payment friction, trust, price sensitivity. Key metric: conversion rate (typically 1-4%). Revenue model: each conversion = direct revenue. SaaS signup and activation funnel: structure: visit → signup → onboarding → activation (first value moment) → retention → paid conversion. Time to convert: days to weeks (trial period is typically 7-30 days). Decision maker: individual user (B2C SaaS) or team champion (B2B SaaS). Friction type: value realization friction — user must understand and experience value before paying. Key metric: activation rate (20-40%) and trial-to-paid conversion (2-25% depending on model). Revenue model: recurring — a converted user pays monthly/annually. The funnel does not end at signup, it barely begins. B2B enterprise sales funnel: structure: lead → MQL (marketing qualified) → SQL (sales qualified) → opportunity → proposal → negotiation → close. Time to convert: weeks to months (enterprise deals: 3-12 months). Decision makers: multiple stakeholders (user, manager, procurement, legal, finance). Friction type: organizational friction — budget approval, security review, legal contracts, integration requirements. Key metric: pipeline velocity (time × win rate × deal size). Revenue model: large contract value ($10K-$1M+ annually) with fewer deals. Key structural difference: e-commerce is wide and fast (millions of users, quick decisions). SaaS is medium and progressive (thousands of users, gradual commitment). B2B is narrow and deep (hundreds of leads, complex multi-stakeholder decisions)'"
    weight: 0.35
    description: "Structure"
  - type: llm_judge
    criteria: "Response covers different optimization approaches for each funnel type — optimization: 'Optimization differences by funnel type: E-commerce optimization levers: reduce friction at checkout (fewer form fields, guest checkout, express payment). Improve product pages (images, reviews, social proof). Cart abandonment recovery (email within 1 hour, 10-15% recovery rate). Price and offer optimization (free shipping threshold, urgency signals). The biggest wins come from removing steps and reducing cognitive load. SaaS optimization levers: time-to-value acceleration — get users to their aha moment faster. The funnel has two critical transitions: signup → activation (did the user experience value?). Trial → paid (did the user decide the value is worth paying for?). Onboarding optimization: guided tours, checklists, personalized setup. Product-led growth tactics: in-app prompts, usage-based triggers, team invitations. The biggest wins come from helping users succeed, not from reducing friction. Common SaaS mistake: optimizing signup form (making it easier to sign up) when the real problem is post-signup activation. Adding 1,000 more signups who never activate is worthless. B2B sales funnel optimization levers: lead scoring to focus sales effort on high-intent leads. Sales enablement content at each stage (case studies, ROI calculators, security documentation). Multi-threading — engaging multiple stakeholders simultaneously rather than sequentially. Deal velocity — reducing time in each stage through better qualification and faster response. The biggest wins come from qualifying leads early (removing bad fits before they consume sales time) and from arming champions with the content they need to sell internally'"
    weight: 0.35
    description: "Optimization"
  - type: llm_judge
    criteria: "Response covers metrics and pitfalls specific to each funnel type — metrics: 'Key metrics by funnel type: E-commerce metrics: conversion rate by step, cart abandonment rate, average order value (AOV), revenue per visitor (RPV), return rate. Watch for: high conversion + high return rate = false success. RPV is more important than conversion rate (a lower conversion rate at a higher AOV can generate more revenue). SaaS metrics: signup rate, activation rate (within 7 days), time-to-activation, trial-to-paid conversion, expansion revenue rate, net revenue retention. Watch for: high signup + low activation = leaky bucket. A 50% signup rate with 5% activation is worse than a 20% signup rate with 30% activation. Measure the COMPLETE funnel through to paid retention, not just signup. B2B metrics: lead-to-MQL rate, MQL-to-SQL rate, SQL-to-opportunity rate, win rate, average deal size, sales cycle length, pipeline coverage ratio. Watch for: high volume of MQLs with low SQL conversion = bad lead scoring. Pipeline coverage ratio (pipeline value ÷ quota) should be 3-4x to hit targets. A short sales cycle with a low win rate may be better than a long cycle with a high win rate (velocity matters). Pitfalls when switching between funnel types: Pitfall 1: applying e-commerce urgency tactics to B2B (countdown timers on enterprise proposals look unprofessional and damage trust). Pitfall 2: measuring SaaS success at signup instead of activation (a SaaS funnel that ends at signup is incomplete — it is like an e-commerce funnel that ends at add-to-cart). Pitfall 3: using conversion rate as the primary B2B metric (in B2B, a 5% win rate on $500K deals can be far more valuable than a 30% win rate on $10K deals — dollar-weighted metrics matter more). Pitfall 4: expecting B2B funnel improvements to show results quickly (enterprise sales cycles are 3-12 months, so a funnel change today may not show impact for 2 quarters)'"
    weight: 0.30
    description: "Metrics"
