meta:
  id: ecommerce-funnel-optimization
  level: 2
  course: funnel-analysis
  type: output
  description: "E-commerce funnel optimization — apply funnel analysis to the complete e-commerce purchase journey from landing page to post-purchase"
  tags: [ecommerce, purchase-funnel, cart-abandonment, checkout, intermediate]

state: {}

trigger: |
  An e-commerce manager presents their funnel data:

  "Our monthly funnel for the last 3 months:

  Landing page: 500,000 visitors
  Product page: 150,000 (30%)
  Add to cart: 22,500 (15%)
  Initiate checkout: 11,250 (50%)
  Complete purchase: 5,625 (50%)
  Overall conversion: 1.125%

  AOV is $65. Industry average conversion is about 2.5%. We're well
  below. Where do we focus and what's the playbook?"

  Task: Diagnose the e-commerce funnel, identify the highest-impact
  improvement areas, and provide a detailed optimization playbook.

assertions:
  - type: llm_judge
    criteria: "Response provides a thorough funnel diagnosis — diagnosis: 'E-commerce funnel diagnosis: step-by-step benchmarking: step | current rate | industry benchmark | gap. Landing → product page: 30% | 35-50% | below benchmark. Product → add to cart: 15% | 8-15% | at benchmark (upper end). Cart → checkout: 50% | 55-70% | below benchmark. Checkout → purchase: 50% | 60-75% | well below benchmark. Overall: 1.125% | 2-3% | significantly below. Revenue at current state: 5,625 purchases × $65 AOV = $365,625/month. Drop-off analysis by absolute user loss: landing → product: 350,000 users lost (70%) — largest absolute loss. Product → cart: 127,500 lost (85%). Cart → checkout: 11,250 lost (50%). Checkout → purchase: 5,625 lost (50%). Impact analysis — revenue gain per 5pp improvement at each step: landing → product (30% → 35%): +25,000 more product views → cascading through → approximately 563 additional purchases → $36,563/month. Product → cart (15% → 20%): +7,500 more carts → cascading → approximately 1,875 additional purchases → $121,875/month. Cart → checkout (50% → 55%): +1,125 more checkouts → cascading → approximately 563 additional purchases → $36,563/month. Checkout → purchase (50% → 55%): +563 more purchases → $36,563/month. Highest impact opportunity: product page → add to cart. A 5pp improvement here generates 3x the revenue of improving any other step. This is unusual because product-to-cart is already at benchmark — but because it handles 150,000 users monthly, even small improvements have outsized impact'"
    weight: 0.35
    description: "Diagnosis"
  - type: llm_judge
    criteria: "Response provides a detailed optimization playbook — playbook: 'E-commerce optimization playbook: Priority 1 — Checkout completion (50% → 65%): this step is most below benchmark AND highly actionable. Quick wins (implement in 1-2 weeks): add guest checkout (25-30% of checkout abandonment is due to forced account creation). Add Apple Pay, Google Pay, Shop Pay (reduces payment friction by 60%). Auto-detect and prefill address fields. Show a progress indicator (step 2 of 3). Display trust signals (secure checkout badge, return policy). Medium-term (2-4 weeks): implement address auto-complete API. Reduce form fields to essential minimum (name, address, payment). Add real-time validation (do not wait until submit to show errors). Show order summary in a persistent sidebar. A/B test single-page vs multi-step checkout. Priority 2 — Landing page to product page (30% → 40%): improve site navigation and search: implement search auto-suggest with product images. Show trending and popular products on landing page. Personalize landing page by traffic source (social visitors see different content than search visitors). Improve page load time (every 1-second delay reduces conversion by 7%). Implement exit-intent engagement (popup with popular products or search prompt). Priority 3 — Cart to checkout (50% → 60%): reduce cart abandonment: show shipping cost early (unexpected shipping is the #1 reason for cart abandonment). Implement cart persistence (saved carts for returning users). Add cart abandonment email sequence (send within 1 hour, then 24 hours, then 72 hours). Show trust signals in cart (money-back guarantee, easy returns). Display estimated delivery date prominently'"
    weight: 0.35
    description: "Playbook"
  - type: llm_judge
    criteria: "Response covers post-purchase funnel and measurement plan — post-purchase: 'The post-purchase funnel (often ignored): the funnel does not end at purchase. Post-purchase stages: purchase → order confirmation email opened (target 80%+). Confirmation → delivery tracking engaged (target 60%+). Delivery → product review submitted (target 10-15%). Review → repeat purchase within 90 days (target 20-30%). Repeat → loyalty program enrollment (target 15-25%). Why post-purchase matters: a customer who repeats has 2-3x higher LTV than a one-time buyer. Post-purchase email flows can generate 10-20% of total revenue. Reviews from purchasers increase conversion for future shoppers (social proof loop). Post-purchase optimization tactics: send shipping confirmation with tracking within 2 hours. Request a review 7 days after delivery (with incentive like 10% off next order). Send product recommendation email 14-21 days after delivery. Implement a loyalty program with tiered benefits. Measurement plan for the optimization program: weekly metrics: conversion rate by step (with confidence intervals). Cart abandonment rate and recovery rate. Average order value and revenue per visitor. Page load time by device. Monthly metrics: overall conversion rate trend (target: 1.125% → 2% within 6 months). Revenue impact of each optimization shipped. Mobile vs desktop conversion gap. Top exit pages in the funnel. Quarterly metrics: customer acquisition cost vs LTV by channel. Repeat purchase rate by cohort. Post-purchase funnel completion rates. Revenue target: improving from 1.125% to 2% conversion: 500,000 × 2% = 10,000 purchases × $65 = $650,000/month. That is $284,375 additional monthly revenue (+78%). Even reaching 1.5% conversion adds $121,875/month'"
    weight: 0.30
    description: "Post-purchase"
