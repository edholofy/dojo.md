meta:
  id: funnel-reporting-frameworks
  level: 2
  course: funnel-analysis
  type: output
  description: "Funnel reporting frameworks — build effective funnel reports for different audiences, from weekly team updates to executive dashboards"
  tags: [reporting, dashboards, communication, stakeholders, intermediate]

state: {}

trigger: |
  The analytics lead says: "I need to create three different funnel
  reports: a weekly update for the product team (detailed, actionable),
  a monthly report for the VP of Product (strategic, focused), and
  a quarterly board deck (high-level, business impact). Each audience
  needs different depth, metrics, and framing. What's the framework?"

  Task: Design funnel reporting frameworks for three different
  audiences with appropriate depth, metrics, and communication style.

assertions:
  - type: llm_judge
    criteria: "Response provides the weekly product team report framework — weekly: 'Weekly product team funnel report — framework: purpose: enable the team to identify problems quickly and prioritize fixes. Length: 1-2 pages or a live dashboard. Section 1 — Funnel snapshot (this week vs last week): step | this week | last week | change | status. Visit → signup: 4.2% | 4.5% | -0.3pp | ⚠ declining. Signup → activation: 32% | 31% | +1pp | ✓ stable. Activation → paid: 12% | 11.5% | +0.5pp | ✓ improving. Overall: 0.16% | 0.16% | flat | — neutral. Include: absolute numbers alongside percentages (4.2% of 50,000 = 2,100 signups). Include: week-over-week AND 4-week trailing average to separate noise from trends. Section 2 — Anomalies and alerts: any step that moved more than 2pp week-over-week. Example: visit → signup dropped from 4.5% to 4.2%. Investigation: new landing page deployed Wednesday — the new page converts 3.8% vs old page 4.8%. Recommendation: revert landing page change or iterate on the new design. Section 3 — Active experiments: experiment | step | variant | control | confidence. New onboarding flow: signup → activation | 35% | 31% | 87% (not yet significant). Simplified checkout: cart → purchase | 62% | 58% | 94% (approaching significance). Section 4 — Action items: prioritized list of 2-3 things to do this week. 1. Revert or fix the landing page (visit → signup regression). 2. Continue monitoring onboarding experiment (needs 1 more week). 3. Prepare to ship simplified checkout if significance reaches 95%'"
    weight: 0.35
    description: "Weekly"
  - type: llm_judge
    criteria: "Response provides the monthly VP report and quarterly board framework — monthly-quarterly: 'Monthly VP of Product report — framework: purpose: strategic overview with clear insight on what is working, what is not, and what the team is doing about it. Length: 3-5 slides or pages. Slide 1 — Executive summary (one paragraph): our signup funnel improved 8% this month, driven by the simplified checkout test. Activation remains flat — our next priority. Revenue impact of this month's improvements: estimated $15,000 additional MRR. Slide 2 — Funnel trend (3-month view): a single chart showing overall conversion rate trend with annotations for major changes. January: 0.14% — baseline, no experiments. February: 0.16% — simplified checkout shipped. March: 0.16% — activation experiments launched (results pending). Include a target line showing the quarterly goal (e.g., 0.20% by end of Q2). Slide 3 — Segment performance: device | conversion | trend | action. Desktop: 0.22% | stable | maintain. Mobile: 0.11% | improving | continue mobile optimization. The VP needs to see WHERE the funnel is strong and weak, not just the overall number. Slide 4 — Wins and losses this month: wins: simplified checkout improved checkout → purchase by 4pp (+$15K MRR). Losses: landing page redesign failed (reverted after 3-day test). Learning: users need clearer value proposition above the fold. Slide 5 — Next month priorities (2-3 bullets): 1. Launch activation onboarding experiment (target: 32% → 38%). 2. Mobile product page optimization (target: 11% → 14% add-to-cart). Quarterly board deck — framework: purpose: demonstrate business health and trajectory. Length: 1-2 slides on funnel within a broader board presentation. Board funnel slide — the story arc: headline: one sentence that tells the story. Example: our funnel efficiency improved 25% this quarter, adding $45K in monthly recurring revenue. The funnel visual: a simplified 3-4 step funnel (not the detailed 8-step version). Show current quarter vs previous quarter vs same quarter last year. Industry benchmark comparison for context. The business impact: translate funnel improvements to dollars. 0.14% → 0.18% overall conversion = 200 additional customers/month. At $75 ARPU = $15,000 additional MRR = $180,000 additional ARR. The forward look: next quarter target: 0.22% overall conversion. Key initiative: mobile optimization (60% of traffic, 30% of conversions — closing this gap is the single biggest opportunity). Board members do not want to see p-values, segment breakdowns, or A/B test details. They want: is the business growing? Where is the biggest opportunity? What are you doing about it?'"
    weight: 0.35
    description: "Monthly and quarterly"
  - type: llm_judge
    criteria: "Response covers reporting best practices and common mistakes — practices: 'Funnel reporting best practices: Practice 1 — Lead with the insight, not the data: bad: visit-to-signup conversion was 4.2% this week (down from 4.5%). Good: the landing page redesign reduced signups by 7% — recommend reverting. The audience wants to know what happened and what to do, not just the numbers. Practice 2 — Always include context for every metric: raw metric: checkout conversion is 58%. With context: checkout conversion is 58% (up from 52% last quarter, industry benchmark is 65%, target is 62% by end of Q2). Context transforms a number into an insight. Practice 3 — Use consistent time comparisons: always include: week-over-week (for weekly reports). Month-over-month (for monthly reports). Year-over-year (for seasonality adjustment). Trailing average (to smooth noise). Practice 4 — Show both absolute and relative metrics: 4.2% conversion rate sounds abstract. 4.2% of 50,000 visitors = 2,100 signups is concrete. Executives respond to user counts and revenue more than percentages. Practice 5 — Separate signal from noise: if daily checkout conversion fluctuates between 48% and 62%, a single day at 55% is meaningless. Use statistical process control: calculate the control limits (mean ± 2 standard deviations). Only report data points outside the control limits as meaningful changes. Common reporting mistakes: 1. Reporting too many metrics (pick 3-5 key metrics per audience). 2. No actionable recommendations (every insight should have a next step). 3. Mixing improvement from optimization with improvement from traffic quality changes. 4. Reporting monthly averages that mask weekly problems. 5. Not archiving historical reports (you need to compare Q1 this year to Q1 last year)'"
    weight: 0.30
    description: "Practices"
