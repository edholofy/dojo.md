meta:
  id: funnel-velocity
  level: 2
  course: funnel-analysis
  type: output
  description: "Funnel velocity — measure and optimize how fast users move through the funnel, identify bottlenecks in time, and balance speed with conversion quality"
  tags: [velocity, speed, time-analysis, bottleneck, intermediate]

state: {}

trigger: |
  The VP of Sales reports: "Our SaaS funnel conversion rates look
  healthy, but deals are taking forever to close. I need to understand
  funnel velocity — not just IF users convert, but HOW FAST they move
  through each stage."

  Current SaaS funnel with timing data:
  Lead → MQL: 5 days average (conversion: 30%)
  MQL → SQL: 12 days average (conversion: 45%)
  SQL → Proposal: 8 days average (conversion: 60%)
  Proposal → Close: 25 days average (conversion: 35%)
  Total cycle: 50 days average

  Task: Analyze the funnel velocity, identify time-based bottlenecks,
  and recommend how to accelerate the pipeline without sacrificing
  conversion quality.

assertions:
  - type: llm_judge
    criteria: "Response analyzes funnel velocity comprehensively — analysis: 'Funnel velocity analysis: pipeline velocity formula: velocity = (number of opportunities × win rate × average deal size) ÷ sales cycle length. Example: (100 leads/month × 30% × 45% × 60% × 35% win rate × $25,000 ACV) ÷ 50 days. Effective velocity = 100 × 0.0283 × $25,000 ÷ 50 = $1,415/day in pipeline throughput. Where time is being spent — the 50-day breakdown: lead → MQL (5 days, 10% of cycle): relatively fast. Lead scoring and initial qualification happen quickly. MQL → SQL (12 days, 24% of cycle): moderate delay. This is where marketing hands off to sales. Common bottleneck: sales reps take too long to follow up on MQLs. SQL → proposal (8 days, 16% of cycle): acceptable. Discovery calls, demos, and needs assessment. Proposal → close (25 days, 50% of cycle): THIS IS THE BOTTLENECK. Half the total cycle is spent between proposal and close. Common causes: multi-stakeholder approval process. Legal and procurement review. Budget allocation delays. Competitive evaluation. Champion cannot sell internally. Speed-conversion correlation: critical insight — faster is not always better. Leads that convert in under 3 days (lead → MQL): may be low quality (tire-kickers who quickly sign up but never activate). Leads that take 5-8 days: may be more thoughtful and higher quality. There is often a sweet spot where speed correlates with conversion quality. Analyze: median time for CONVERTING leads vs median time for NON-CONVERTING leads. If converting leads are faster, then acceleration helps. If converting leads take longer (more thorough evaluation), then pressure to speed up may hurt quality'"
    weight: 0.35
    description: "Analysis"
  - type: llm_judge
    criteria: "Response provides velocity optimization recommendations — optimization: 'Velocity optimization by stage: Stage 1 — Lead to MQL (5 days → target 3 days): implement real-time lead scoring (behavioral + firmographic). Auto-route high-score leads to fast-track qualification. Use chatbot for immediate engagement when leads visit key pages. Stage 2 — MQL to SQL (12 days → target 7 days): implement SLA for sales follow-up: respond to MQLs within 4 hours (not days). Data shows that contacting a lead within 5 minutes is 100x more effective than after 30 minutes. Automate meeting scheduling (Calendly links in nurture emails). Improve MQL quality so sales trusts and prioritizes them. Stage 3 — SQL to proposal (8 days → target 5 days): standardize discovery process (templated questions, scoring rubric). Build proposal templates and configure CPQ (configure-price-quote) tools. Reduce internal approval loops for non-standard pricing. Stage 4 — Proposal to close (25 days → target 15 days): THIS IS WHERE THE BIGGEST IMPACT IS. Identify and engage ALL decision-makers early (multi-threading). Provide the champion with internal selling materials (ROI calculator, one-pager for CFO, security documentation for IT). Set mutual action plans with specific dates for each approval step. Create urgency without pressure (end-of-quarter incentives, implementation timeline benefits). Address legal and procurement proactively (send security questionnaire and contract early). Projected impact of velocity improvements: current: 50-day cycle. Target: 30-day cycle (40% reduction). Same conversion rates, same deal size, but 40% faster throughput. Pipeline velocity increases by 67% (50/30 = 1.67x). Revenue impact: same pipeline generates 67% more revenue per quarter because deals close faster'"
    weight: 0.35
    description: "Optimization"
  - type: llm_judge
    criteria: "Response covers velocity metrics and monitoring — monitoring: 'Velocity metrics and monitoring: key velocity metrics to track: 1. Average time in each stage: track separately for won and lost deals. If lost deals spend 40 days at proposal vs 20 days for won deals, deals stuck over 30 days should trigger a pipeline review. 2. Stage aging alerts: set thresholds for each stage. If a deal exceeds 1.5x the average time, flag it for review. Example: proposal stage average = 25 days, alert at 38+ days. 3. Velocity by segment: enterprise deals (50+ seats): 75-day cycle is normal. Mid-market (10-50 seats): 35-day cycle. SMB (under 10 seats): 14-day cycle. Do not compare these segments — they have fundamentally different buying processes. 4. Conversion velocity quadrant: plot deals on two axes: speed (fast vs slow) and outcome (won vs lost). Fast wins: ideal — deals that close quickly and successfully. Slow wins: valuable but could be accelerated. Fast losses: good — quick disqualification saves resources. Slow losses: worst category — long cycles that end in a loss waste the most resources. Goal: minimize slow losses (disqualify faster) and convert slow wins into fast wins. The velocity-quality tradeoff: danger sign: if you push velocity too hard, sales reps may: skip discovery (leading to poor fit and higher churn). Over-discount to close faster (destroying margins). Push unready prospects too hard (damaging relationships). Guard rail: track post-sale metrics alongside velocity. If churn rate increases as cycle time decreases, you are sacrificing quality for speed. The ideal state: faster cycle time WITH maintained or improved churn rates'"
    weight: 0.30
    description: "Monitoring"
