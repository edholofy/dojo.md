meta:
  id: cross-device-tracking
  level: 3
  course: funnel-analysis
  type: output
  description: "Cross-device funnel tracking — handle users who start on one device and convert on another, resolving identity and measuring true conversion rates"
  tags: [cross-device, identity-resolution, multi-device, tracking, advanced]

state: {}

trigger: |
  The Head of Analytics reports: "We suspect many users browse on
  mobile but purchase on desktop. Our mobile funnel shows 1.5%
  conversion and desktop shows 4.2%, but if we track users across
  devices, the true mobile-influenced conversion might be much higher.
  How do we solve cross-device tracking for funnel analysis?"

  Task: Explain cross-device funnel tracking, identity resolution
  methods, and how to measure true cross-device conversion paths.

assertions:
  - type: llm_judge
    criteria: "Response explains the cross-device problem and its impact on funnel metrics — problem: 'The cross-device problem in funnel analysis: what is happening: a user browses products on their phone during lunch (mobile session). That evening, they purchase on their laptop (desktop session). Without cross-device tracking: mobile funnel sees a browsing session that did not convert (counted as a failure). Desktop funnel sees a purchase with minimal browsing (looks like a direct conversion). Both funnel views are wrong. Impact on funnel metrics: mobile conversion appears lower than reality (many mobile browsers convert on desktop later). Desktop conversion appears higher than reality (credit for conversions that mobile initiated). Channel attribution is distorted (mobile marketing campaigns look less effective). Overall funnel is fragmented (the real journey spans multiple device-sessions). Scale of the problem: 40-60% of online purchases involve multiple devices. Mobile research, desktop purchase is the most common pattern. Some journeys span 3+ devices (phone, tablet, laptop). B2B journeys often span work laptop, personal phone, and home computer. The business impact: if 30% of mobile browsers convert on desktop within 7 days: current reported mobile conversion: 1.5%. True mobile-influenced conversion: 1.5% + (70% of mobile non-converters × 30% cross-device conversion) = approximately 3.8%. This changes the ROI calculation for mobile marketing dramatically. A campaign that appears to generate $50K in mobile revenue may actually generate $125K when cross-device conversions are included'"
    weight: 0.35
    description: "Problem"
  - type: llm_judge
    criteria: "Response covers identity resolution methods — identity: 'Identity resolution methods for cross-device tracking: Method 1 — Deterministic matching (highest accuracy, limited reach): use login/account data to connect devices. If a user logs in on both mobile and desktop, you can link the sessions definitively. Accuracy: 95%+ (near-certain match). Reach: typically only 30-50% of users log in on multiple devices. Implementation: create a unified user ID that persists across devices. When a user logs in, map the device/cookie ID to the unified user ID. Retroactively connect pre-login sessions to the user ID. Method 2 — Probabilistic matching (lower accuracy, broader reach): use signals to estimate that two devices belong to the same user. Signals: same IP address (same home WiFi). Similar browsing patterns. Same geographic location. Similar time-of-day usage patterns. Matching email or phone number fragments. Accuracy: 60-80% (good estimates, some false matches). Reach: can match 60-80% of users. Implementation: use third-party identity resolution services or build statistical models. Method 3 — Hybrid approach (recommended): combine deterministic and probabilistic methods. Use deterministic matching for logged-in users (high confidence). Use probabilistic matching for anonymous users (moderate confidence). Assign confidence scores to each cross-device link: high confidence (deterministic): include in primary funnel metrics. Medium confidence (probabilistic, multiple signals): include in adjusted funnel metrics. Low confidence (probabilistic, single signal): exclude from metrics, use for directional analysis only. Privacy considerations: first-party data only (your own login data and website behavior). Comply with GDPR, CCPA, and other privacy regulations. Provide users with transparency about cross-device tracking. Cookie deprecation impact: third-party cookies are being phased out. First-party login data becomes even more critical. Server-side tracking and customer data platforms (CDPs) are the future'"
    weight: 0.35
    description: "Identity"
  - type: llm_judge
    criteria: "Response covers cross-device funnel measurement and optimization — measurement: 'Cross-device funnel measurement: building the cross-device funnel: step 1 — stitch sessions: connect all sessions from the same user across devices. User journey reconstruction: session 1 (mobile, Monday 12pm): browsed 3 products, added 1 to wishlist. Session 2 (desktop, Monday 8pm): viewed wishlist, added to cart. Session 3 (desktop, Tuesday 7pm): completed purchase. Without stitching: 3 separate sessions across 2 funnels. With stitching: 1 unified 3-session journey. Step 2 — Create device-journey funnels: instead of device-specific funnels, create journey-type funnels. Journey type A (single device, desktop): browse → cart → purchase on desktop. Conversion: 4.2%. Journey type B (single device, mobile): browse → cart → purchase on mobile. Conversion: 1.5%. Journey type C (mobile research → desktop purchase): browse on mobile → return on desktop → cart → purchase. Conversion: 3.8% (from first mobile touch to eventual purchase). Journey type D (desktop research → mobile purchase): browse on desktop → return on mobile → purchase. Conversion: 2.1%. Step 3 — Recalculate channel effectiveness: mobile marketing campaigns with cross-device credit: direct mobile conversions: $50K revenue. Cross-device conversions (mobile-initiated, desktop-completed): $75K revenue. True mobile marketing ROI: $125K / campaign cost = 2.5x (vs 1.0x without cross-device). Step 4 — Optimize for cross-device journeys: if mobile → desktop is the most common cross-device journey (and it usually is): ensure cart and wishlist sync across devices seamlessly. Send email reminders when a mobile session does not convert (continue your shopping on any device). Make the desktop experience aware of mobile browsing (show recently viewed products). Reduce the friction of resuming on a different device (persistent login, saved cart). Measurement framework: report both single-device AND cross-device funnel metrics. Single-device metrics: useful for device-specific UX optimization. Cross-device metrics: useful for marketing attribution and budget allocation. Track cross-device journey share over time: if 30% of conversions are cross-device and growing, the mobile experience is increasingly important even if mobile conversion rate appears low'"
    weight: 0.30
    description: "Measurement"
