meta:
  id: funnel-anomaly-detection
  level: 3
  course: funnel-analysis
  type: output
  description: "Funnel anomaly detection — build automated systems to detect unexpected changes in funnel metrics, diagnose root causes, and respond before business impact grows"
  tags: [anomaly-detection, monitoring, alerts, root-cause, advanced]

state: {}

trigger: |
  The Head of Analytics says: "Last month, our signup-to-activation
  rate dropped from 32% to 24% over 5 days and nobody noticed until
  the weekly review. By then, we'd lost 400+ potential activations.
  I need an automated anomaly detection system for our funnel. How
  do I build one that catches real problems without flooding us with
  false alerts?"

  Task: Design a funnel anomaly detection system including detection
  methods, root cause diagnosis, alerting thresholds, and response
  playbooks.

assertions:
  - type: llm_judge
    criteria: "Response covers anomaly detection methods for funnel metrics — detection: 'Anomaly detection methods for funnel metrics: Method 1 — Statistical process control (SPC): treat each funnel step conversion rate as a control chart. Calculate the mean and standard deviation from 30+ days of baseline data. Set control limits: warning (2σ): flag for review. Alert (3σ): immediate investigation required. Example for activation rate: baseline mean: 32%, standard deviation: 2pp. Warning limits: 28% - 36% (2σ). Alert limits: 26% - 38% (3σ). The 24% drop would trigger the alert limit (below 26%), catching it on day 1-2 instead of day 5+. Advantages: simple to implement, well-understood statistical foundation. Limitations: assumes stable baseline (does not handle trends or seasonality well). Method 2 — Moving baseline with trend adjustment: instead of a fixed baseline, use a 28-day rolling average adjusted for weekly seasonality. Expected rate = 28-day rolling average × day-of-week adjustment factor. Example: 28-day rolling activation average: 32%. Monday adjustment: 0.97 (Mondays are 3% below average). Expected Monday activation: 31.04%. Anomaly threshold: actual rate below expected rate - 2σ. This handles gradual trends and weekly patterns while still catching sharp drops. Method 3 — Change point detection (CUSUM or PELT): instead of checking individual data points, detect when the underlying distribution CHANGES. CUSUM (cumulative sum) accumulates deviations from the expected rate. When the cumulative deviation exceeds a threshold, a change point is detected. This is more sensitive to gradual degradation than SPC (which requires a single point to cross the threshold). Example: activation rate: 32%, 31.5%, 31%, 30.5%, 30%, 29%... No single day crosses the 26% alert threshold, but CUSUM detects the sustained downward trend by day 3-4. Method 4 — Multi-metric correlation: monitor funnel steps as a system, not independently. If signup rate drops 2pp AND activation drops 3pp simultaneously, these may share a root cause (e.g., a deployment affected the entire onboarding flow). Correlated drops across multiple steps should have LOWER alert thresholds (a 1.5σ drop at TWO consecutive steps is more concerning than a 2σ drop at one step)'"
    weight: 0.35
    description: "Detection"
  - type: llm_judge
    criteria: "Response covers root cause diagnosis and response playbooks — diagnosis: 'Root cause diagnosis framework: when an anomaly is detected, follow this diagnostic tree: Level 1 — Is it a data issue? (check first, takes 5 minutes): check event volume: did total events drop? If so, tracking may be broken. Check for deployment: was code deployed in the last 24 hours? Check data pipeline: is data arriving with normal latency? If yes to any: likely a technical issue, not a real funnel problem. Escalate to engineering. Level 2 — Is it segment-specific? (check second, takes 15 minutes): break the anomaly down by: device (mobile vs desktop), browser, geography, traffic source, user type (new vs returning). If the drop is isolated to one segment: mobile-only drop → likely a mobile-specific bug or UI issue. One geography drop → possible localization or CDN issue. One traffic source → possible campaign or landing page problem. If the drop is across all segments → systemic issue (product change, competitor, market shift). Level 3 — Is it correlated with other metrics? (takes 30 minutes): check if other funnel steps are also affected. Check if engagement metrics changed (session duration, page views, bounce rate). Check external factors: competitor launches, press coverage, seasonal patterns. Level 4 — Deep investigation (takes hours): session recordings: watch 20-30 sessions from the affected period. User surveys: trigger an in-app survey for users who dropped off. Support tickets: check for spikes in related complaints. Logs: review error logs and performance metrics during the affected period. Response playbooks: Playbook A — Tracking breakage detected: 1. Alert: data engineering team (immediate). 2. Action: check recent deployments for tracking code changes. 3. Fix: restore tracking or hotfix the broken implementation. 4. Recovery: backfill data if possible, annotate gap in dashboards. 5. Prevention: add tracking verification to CI/CD pipeline. Playbook B — Product bug causing funnel drop: 1. Alert: product engineering team (P1 priority). 2. Action: identify the affected flow and reproduce the issue. 3. Fix: hotfix or rollback the problematic deployment. 4. Recovery: notify affected users, offer support. 5. Prevention: add funnel impact check to deployment validation'"
    weight: 0.35
    description: "Diagnosis"
  - type: llm_judge
    criteria: "Response covers alert design and noise reduction — alerting: 'Alert design and noise reduction: the false alert problem: too many alerts → team ignores all alerts → real anomalies are missed. A funnel with 6 steps, each monitored at 3 thresholds, checking every hour = 432 potential alerts per day. Most will be false positives. Noise reduction strategies: Strategy 1 — Tiered severity: P0 (page immediately): overall conversion rate drops more than 50%, or any step drops to 0%. Something is badly broken. P1 (alert within 1 hour): any step drops below 3σ AND persists for 2+ consecutive hours. Sustained significant anomaly. P2 (daily digest): any step exceeds 2σ for 4+ consecutive hours. Notable but not critical. P3 (weekly review): any step trends more than 5pp below 4-week average. Gradual degradation. Strategy 2 — Minimum duration filters: do not alert on a single data point. Require the anomaly to persist for a minimum duration: hourly metrics: 2+ consecutive hours. Daily metrics: 2+ consecutive days. This eliminates most transient noise (lunch hour dips, bot traffic spikes). Strategy 3 — Business-hour awareness: funnel metrics naturally fluctuate by time of day. A 2am conversion rate of 45% (vs 55% average) is not anomalous — 2am traffic is smaller and lower quality. Apply different thresholds for peak vs off-peak hours. Strategy 4 — Context-aware suppression: suppress alerts during known events: scheduled maintenance windows. Major marketing campaigns (traffic quality changes). Holiday periods (seasonal patterns). A/B test launches (expected metric shifts for test groups). Implementation recommendation: start with Method 1 (SPC) for immediate value. Add Method 2 (moving baseline) within 1 month. Add Method 3 (change point detection) within 3 months. Implement the diagnostic framework and playbooks immediately — detection without diagnosis is useless. The 24% activation drop scenario: with this system, the SPC alert would trigger on day 1 (24% is below the 26% 3σ limit). The diagnostic tree would identify whether it is data, segment-specific, or systemic within 30 minutes. The response playbook would initiate the fix within 2 hours. Instead of losing 400+ activations over 5 days, the team would lose approximately 50 activations in half a day'"
    weight: 0.30
    description: "Alerting"
