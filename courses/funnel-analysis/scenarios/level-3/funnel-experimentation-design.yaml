meta:
  id: funnel-experimentation-design
  level: 3
  course: funnel-analysis
  type: output
  description: "Funnel experimentation design — design rigorous experiments for funnel optimization including multi-step tests, holdout groups, and sequential testing"
  tags: [experimentation, test-design, holdout, sequential-testing, advanced]

state: {}

trigger: |
  The experimentation lead says: "Simple A/B tests are not enough for
  our funnel optimization. We need to test changes that affect multiple
  funnel steps simultaneously, run experiments on low-traffic steps,
  and understand interactions between changes at different steps. How
  do I design experiments for complex funnel optimization?"

  Task: Explain advanced experimentation design for funnel optimization,
  including multi-step experiments, sequential testing, holdout groups,
  and interaction effects.

assertions:
  - type: llm_judge
    criteria: "Response covers multi-step and full-funnel experiment design — multi-step: 'Multi-step funnel experimentation: the problem with step-isolated testing: testing a checkout redesign in isolation misses critical interactions. The new checkout may improve checkout → purchase by 5pp. But it may also attract different users through the funnel (users who previously dropped at cart now reach checkout). The composition of users at each step changes when you modify upstream steps. Full-funnel experiments: instead of testing one step, test the full journey. Example: variant changes signup form (step 2) AND onboarding (step 3) AND pricing page (step 4). Measure the overall funnel conversion, not individual step conversion. Advantage: captures interaction effects and composition changes. Disadvantage: if the variant wins, you do not know which change drove the improvement. Factorial experiment design: test multiple changes simultaneously using a factorial design. Factor A: new signup form (yes/no). Factor B: new onboarding (yes/no). Four groups: group 1 (control-control): old signup + old onboarding. Group 2: new signup + old onboarding. Group 3: old signup + new onboarding. Group 4: new signup + new onboarding. This reveals: main effect of signup change (compare groups 2+4 vs 1+3). Main effect of onboarding change (compare groups 3+4 vs 1+2). Interaction effect (does group 4 perform better or worse than you would expect from groups 2 and 3 combined?). Required sample: 4x the sample of a simple A/B test (4 groups instead of 2). Worth it when you suspect the changes interact'"
    weight: 0.35
    description: "Multi-step"
  - type: llm_judge
    criteria: "Response covers sequential testing and low-traffic solutions — sequential: 'Sequential testing and low-traffic funnel experiments: the low-traffic problem: bottom-of-funnel steps often have too few users for standard A/B tests. Example: only 200 users per week reach the pricing page. To detect a 5pp improvement (20% → 25%) at 80% power and 95% confidence: need approximately 1,500 users per variant. At 200/week: 15 weeks of testing (nearly 4 months). Solutions for low-traffic funnel steps: Solution 1 — Sequential testing (group sequential design): instead of a fixed-sample test, use boundaries that allow early stopping. Check results at pre-planned intervals (weekly). If the effect is very large, stop early and declare a winner. If the effect is moderate, continue collecting data. If the effect is clearly negligible, stop early and keep the control. Methods: O'Brien-Fleming boundaries (conservative, recommended). Pocock boundaries (more aggressive, higher risk of false positives). Always pre-define the analysis schedule — do not check whenever you feel like it. Solution 2 — Bayesian testing: instead of p-values and fixed sample sizes, use Bayesian inference. Output: probability that the variant is better (e.g., 87% probability variant is better). No fixed sample size — you decide when the probability is sufficient for your risk tolerance. Example: after 2 weeks with 400 users total: P(variant better) = 78%. Continue testing. After 4 weeks with 800 users: P(variant better) = 93%. Ship the variant (93% confidence is sufficient for this low-risk change). Advantage: natural for low-traffic steps, allows continuous monitoring without inflating false positive rate. Solution 3 — Composite metrics: instead of testing conversion at a single step, use a composite metric that captures the full funnel. Example: revenue per visitor (RPV) = overall conversion rate × average order value. RPV captures changes at any funnel step, giving you a larger sample (all visitors) while detecting improvements anywhere in the funnel. Solution 4 — Quasi-experimental methods: when randomized A/B testing is not feasible: before-after analysis with statistical adjustment. Interrupted time series (compare the trend before and after the change). Matched cohort comparison (compare users who experienced the change to similar users who did not)'"
    weight: 0.35
    description: "Sequential"
  - type: llm_judge
    criteria: "Response covers holdout groups and long-term measurement — holdout: 'Holdout groups and long-term experiment measurement: the holdout group strategy: a holdout group is a permanent control group that never receives ANY optimization. Purpose: measure the cumulative impact of all funnel optimizations over time. Implementation: reserve 5-10% of users as the holdout (they always see the original experience). Every optimization shipped to the other 90-95%. After 6 months, compare the optimized group to the holdout: holdout overall conversion: 2.1% (unchanged from 6 months ago). Optimized group: 3.4% (after 12 optimizations). Cumulative lift: 62% improvement from all optimizations combined. This is critical for three reasons: 1. It proves the value of the optimization program (62% improvement = real dollars). 2. Individual A/B tests may show interaction effects that partially cancel each other. The holdout reveals the NET impact. 3. It detects degradation — if the optimized group starts performing worse than expected, an optimization may have introduced a regression. Long-term measurement considerations: novelty effects: some changes show a 10% lift in week 1 that fades to 2% by week 4. Users were curious about the new design, not genuinely converting better. Fix: measure test results at week 1 AND week 4. Only count the week 4 result as the true effect. Learning effects: some changes show a small initial lift that GROWS over time. A simplified onboarding takes time to compound (more activated users → more referrals → more qualified traffic → higher conversion). Fix: run important tests for at least 4 weeks. Check for growing or declining effects over time. Seasonal contamination: a test that ran during a holiday period may show inflated results. Fix: run tests for complete business cycles. Adjust for seasonality using year-over-year data. Experiment governance: maintain an experiment log: test name, hypothesis, primary metric, start date, end date, result, decision, long-term follow-up. Review the experiment log quarterly to check for: tests where long-term results diverged from short-term results. Interactions between shipped changes. Areas of the funnel that have not been tested recently'"
    weight: 0.30
    description: "Holdout"
