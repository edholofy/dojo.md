meta:
  id: funnel-automation
  level: 3
  course: funnel-analysis
  type: output
  description: "Funnel automation — build automated systems that respond to funnel events in real-time including triggered emails, personalized experiences, and automated interventions"
  tags: [automation, triggers, personalization, real-time, advanced]

state: {}

trigger: |
  The marketing automation lead says: "I want to build automated
  responses to funnel events. When a user adds to cart but doesn't
  checkout within 2 hours, send an email. When a trial user hasn't
  activated after 3 days, trigger in-app guidance. When a high-value
  lead enters the funnel, alert sales immediately. How do I design
  a comprehensive funnel automation system?"

  Task: Design a funnel automation system with event triggers,
  personalized responses, and measurement frameworks.

assertions:
  - type: llm_judge
    criteria: "Response covers the automation architecture and trigger design — architecture: 'Funnel automation system architecture: three layers: Layer 1 — Event stream: captures every user action in real-time. Product page view, add to cart, checkout start, form field interaction, feature usage, login, etc. Each event includes: user ID, timestamp, action, properties (product ID, value, device). Layer 2 — Trigger engine: evaluates events against rules in real-time. Rules define: conditions (what happened or did not happen). Timing (how long to wait before acting). Audience (which users this applies to). Exclusions (do not trigger if the user already converted or was recently contacted). Layer 3 — Response layer: executes the automated response. Email, push notification, in-app message, SMS, sales alert, experience change. Key trigger types: Event trigger: fires when a specific event occurs. Example: user adds to cart → trigger: start 2-hour abandonment timer. Non-event trigger: fires when an expected event does NOT occur within a time window. Example: user signed up 3 days ago AND has not activated → trigger: send activation email. Threshold trigger: fires when a metric crosses a threshold. Example: user's engagement score exceeds 80 → trigger: alert sales team. Sequence trigger: fires when a specific sequence of events occurs (or does not occur). Example: user viewed pricing page 3 times in 7 days but has not started a trial → trigger: offer personalized demo. Trigger design principles: 1. Wait before acting: do not email immediately after cart abandonment. Wait 1-2 hours (the user may still be shopping). Wait 24 hours for trial activation nudges (the user may plan to return tomorrow). 2. Limit frequency: no user should receive more than 3 automated messages per week. Implement a global suppression window (minimum 48 hours between communications). 3. Escalate gradually: first touch: subtle in-app hint. Second touch (24h later): email with helpful content. Third touch (72h later): personal outreach from support or sales. 4. Respect user signals: if a user dismisses an in-app prompt, do not show it again for 7 days. If a user unsubscribes from emails, stop ALL automated emails (not just marketing)'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response provides specific automation playbooks for common funnel scenarios — playbooks: 'Automation playbooks by funnel scenario: Playbook 1 — Cart abandonment (e-commerce): trigger: user adds to cart but does not initiate checkout within 2 hours. Response sequence: hour 2: email with cart contents and product images (subject: you left something behind). Hour 24: second email with social proof (1,247 people bought this item this week). Hour 72: final email with incentive (10% off, or free shipping, limited 24-hour offer). In-app: when user returns, show persistent cart reminder bar. Performance benchmarks: email 1 recovery rate: 5-10%. Email 2 recovery rate: 3-5%. Email 3 recovery rate: 2-4%. Total recovery: 10-19% of abandoned carts. Revenue impact: if 11,250 users abandon cart monthly and recovery rate is 12%: 1,350 recovered purchases × $65 AOV = $87,750/month. Playbook 2 — Trial activation (SaaS): trigger: user signed up for trial and has not completed the activation milestone within 3 days. Response sequence: day 1: welcome email with quick-start guide (3 steps to your first result). Day 3: in-app checklist highlighting remaining setup steps. Day 5: email with a case study showing what activated users achieved. Day 7: personal email from customer success (hi, I noticed you have not connected your data source yet — can I help?). Day 10: in-app prompt offering a guided walkthrough or 15-minute onboarding call. Personalization: customize the message based on what the user HAS done. If they connected data but have not created a report: focus on report creation. If they have not even logged in: focus on getting them back into the product. Playbook 3 — High-value lead detection (B2B): trigger: a user matches the ideal customer profile AND performs high-intent actions (visited pricing 2+ times, viewed enterprise features, company has 500+ employees). Response: immediate Slack alert to the sales team with user details and behavior history. Auto-assign to the appropriate sales rep based on company size and industry. Create a personalized landing page for when the user returns. Add to high-touch nurture sequence with case studies from similar companies. Timing: sales should respond within 5 minutes for hot leads (response time dramatically affects conversion)'"
    weight: 0.35
    description: "Playbooks"
  - type: llm_judge
    criteria: "Response covers measurement and optimization of automation — measurement: 'Measuring and optimizing funnel automation: key automation metrics: 1. Trigger rate: what percentage of eligible users are being triggered? If cart abandonment emails should reach 11,250 users/month but only 8,000 are receiving them, 3,250 are being missed (likely email opt-outs or technical issues). 2. Response rate: of users who receive the automated message, what percentage take the desired action? Email open rate: 35-45% (cart abandonment emails typically have high opens). Click-through rate: 10-15%. Recovery/conversion rate: 5-15%. 3. Incremental lift: the MOST important metric. Compare users who received the automation to a holdout group that did not. If the automation group converts at 15% and the holdout at 8%, the incremental lift is 7pp. Without a holdout, you might credit the automation with all 15% of conversions, but 8% would have converted anyway. 4. Revenue per triggered user: total revenue from automated conversions ÷ total users triggered. Example: $87,750 revenue ÷ 11,250 triggered users = $7.80 per triggered user. This is the number to track over time as you optimize. Optimization strategies: A/B test the automations: test different email subject lines (personalized vs generic). Test different timing (2-hour vs 4-hour abandonment delay). Test different incentive levels (10% off vs free shipping). Test different channels (email vs push notification vs SMS). Personalization depth: level 1: same message for everyone (basic). Level 2: different messages by segment (mobile vs desktop, new vs returning). Level 3: different messages by behavior (what they browsed, what they carted). Level 4: individually personalized (ML-generated subject lines and product recommendations). Each level of personalization typically improves response rates by 10-20%. Common automation mistakes: 1. Over-automating: too many messages overwhelm users and reduce trust. 2. Not measuring incrementality: crediting automations for conversions that would have happened anyway. 3. Ignoring the user experience: automations should feel helpful, not pushy. 4. Set-and-forget: automations must be reviewed quarterly — what worked last year may not work now'"
    weight: 0.30
    description: "Measurement"
