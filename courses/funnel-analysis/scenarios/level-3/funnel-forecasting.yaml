meta:
  id: funnel-forecasting
  level: 3
  course: funnel-analysis
  type: output
  description: "Funnel forecasting — use funnel data to predict future conversions, revenue, and resource needs with statistical models"
  tags: [forecasting, prediction, pipeline, revenue-planning, advanced]

state: {}

trigger: |
  The VP of Finance asks: "I need to forecast next quarter's revenue
  based on our funnel data. We have 12 months of historical funnel
  data and I need to account for seasonality, planned marketing
  campaigns, and our optimization roadmap. How do I build a reliable
  funnel-based revenue forecast?"

  Historical data (monthly averages, last 12 months):
  Visitors: 200,000 (growing 3% month-over-month)
  Signup rate: 4.5% (stable)
  Activation rate: 32% (improving 0.5pp/month)
  Trial-to-paid: 15% (stable)
  ARPU: $55 (growing $1/month)
  Churn: 5% monthly

  Task: Build a funnel-based revenue forecast model with scenarios
  and sensitivity analysis.

assertions:
  - type: llm_judge
    criteria: "Response builds a bottom-up funnel forecast model — model: 'Bottom-up funnel forecast model: base case forecast — next 3 months: the model multiplies each funnel stage, projecting forward using historical trends. Month 1 forecast: visitors: 200,000 × 1.03 = 206,000. Signups: 206,000 × 4.5% = 9,270. Activated: 9,270 × 32.5% (32% + 0.5pp trend) = 3,013. New paid: 3,013 × 15% = 452. ARPU: $56. New MRR from new customers: 452 × $56 = $25,312. Month 2 forecast: visitors: 206,000 × 1.03 = 212,180. Signups: 212,180 × 4.5% = 9,548. Activated: 9,548 × 33.0% = 3,151. New paid: 3,151 × 15% = 473. ARPU: $57. New MRR: 473 × $57 = $26,961. Month 3 forecast: visitors: 212,180 × 1.03 = 218,545. Signups: 218,545 × 4.5% = 9,835. Activated: 9,835 × 33.5% = 3,295. New paid: 3,295 × 15% = 494. ARPU: $58. New MRR: 494 × $58 = $28,652. Existing customer revenue (accounting for churn): assuming current base of 3,000 paying customers at $55 ARPU. Month 1: (3,000 × 0.95 + 452) × $56 = (2,850 + 452) × $56 = $184,912. Month 2: (3,302 × 0.95 + 473) × $57 = (3,137 + 473) × $57 = $205,770. Month 3: (3,610 × 0.95 + 494) × $58 = (3,430 + 494) × $58 = $227,592. Quarterly revenue forecast: $184,912 + $205,770 + $227,592 = $618,274. Critical assumptions documented: traffic growth continues at 3% MoM. Activation improvement continues at 0.5pp/month. Trial-to-paid rate remains at 15%. Churn rate remains at 5% monthly. No major competitive or market changes'"
    weight: 0.35
    description: "Model"
  - type: llm_judge
    criteria: "Response includes scenario analysis and sensitivity — scenarios: 'Scenario analysis: Optimistic scenario (planned improvements succeed): activation optimization ships in month 1 (adds 3pp to activation rate). New marketing campaign increases traffic by 5% in month 2. Trial-to-paid improves from 15% to 17% via improved onboarding. Month 3 optimistic: visitors: 218,545 × 1.05 = 229,472. Signups: 229,472 × 4.5% = 10,326. Activated: 10,326 × 36.5% (33.5% base + 3pp optimization) = 3,769. New paid: 3,769 × 17% = 641. Optimistic quarterly revenue: approximately $680,000 (+10% vs base case). Pessimistic scenario (headwinds materialize): traffic growth slows to 1% MoM (market saturation). Activation plateaus at 32% (diminishing returns on optimization). New competitor launches, increasing churn from 5% to 7%. Month 3 pessimistic: visitors: 204,020. Signups: 9,181. Activated: 2,938. New paid: 441. Pessimistic quarterly revenue: approximately $540,000 (-13% vs base case). Sensitivity analysis — which variable matters most: test each variable independently (10% relative change): variable | 10% improvement | revenue impact | sensitivity rank. Traffic volume: +10% visitors | +$32K/quarter | medium. Signup rate: 4.5% → 4.95% | +$32K/quarter | medium. Activation rate: 32% → 35.2% | +$32K/quarter | medium. Trial-to-paid: 15% → 16.5% | +$32K/quarter | medium. ARPU: $55 → $60.50 | +$34K/quarter | medium. Churn rate: 5% → 4.5% | +$42K/quarter | HIGH. Insight: churn reduction has the highest impact because it compounds — every retained customer generates revenue in every subsequent month. A 0.5pp churn reduction is worth more than a 10% increase in any single funnel metric. This reframes the optimization priority: retention improvements should be valued higher than acquisition improvements'"
    weight: 0.35
    description: "Scenarios"
  - type: llm_judge
    criteria: "Response covers forecast validation and communication — validation: 'Forecast validation and communication: validating the forecast: 1. Backtest: apply the model to the last 3-6 months of historical data. If the model predicted $550K and actual was $520K, the model has a 5.8% positive bias — adjust accordingly. 2. Track forecast accuracy monthly: month | forecast | actual | error | cumulative error. Month 1: $184,912 | $181,500 | +1.9% | +1.9%. Month 2: $205,770 | $198,300 | +3.8% | +2.8%. If the error is consistently positive, the model is optimistic — consider adding a confidence discount. 3. Confidence intervals: the base case is a point estimate. Add confidence intervals: 80% confidence: $570K - $670K. 90% confidence: $545K - $695K. This gives the finance team a range to plan against, not a single number that will be exactly wrong. Communicating the forecast to finance and leadership: slide 1 — headline: next quarter revenue forecast: $618K (base case), range $545K-$695K. This represents 15% growth over the current quarter. Slide 2 — the funnel model: show the funnel stages with conversion rates and trends. Highlight which assumptions are based on trends (reliable) vs planned initiatives (uncertain). Slide 3 — scenarios: three scenarios with probabilities: optimistic (25% probability): $680K — if all planned improvements succeed. Base case (50% probability): $618K — trends continue as observed. Pessimistic (25% probability): $540K — if headwinds materialize. Weighted expected value: $614K. Slide 4 — key risks and dependencies: risk: activation optimization delayed by 1 month (impact: -$15K). Risk: competitor launch increases churn (impact: -$40K). Dependency: marketing campaign budget approved for month 2. Updating the forecast: update monthly with actual data replacing projections. Track which assumptions were accurate and which need revision. The forecast should get MORE accurate as the quarter progresses (more actuals, fewer projections)'"
    weight: 0.30
    description: "Validation"
