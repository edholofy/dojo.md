meta:
  id: reverse-funnel-analysis
  level: 3
  course: funnel-analysis
  type: output
  description: "Reverse funnel analysis — work backwards from conversions to understand what paths, behaviors, and characteristics predict success"
  tags: [reverse-funnel, success-patterns, behavioral-analysis, advanced]

state: {}

trigger: |
  The Chief Product Officer says: "Instead of looking at where users
  drop off, I want to understand our BEST users. What did our top
  converters do differently? What paths did they take? What behaviors
  predicted their success? I want to reverse-engineer the ideal
  customer journey."

  Task: Explain reverse funnel analysis — starting from converted
  users and working backwards to identify the patterns, paths, and
  behaviors that predict conversion.

assertions:
  - type: llm_judge
    criteria: "Response explains the reverse funnel methodology — methodology: 'Reverse funnel analysis methodology: traditional funnel: start at the top, watch users drop off, fix the leaky steps. Reverse funnel: start at the bottom (converters), trace backwards, identify what they did differently. Step 1 — Define your success cohort: select users who achieved the desired outcome (purchase, activation, 90-day retention). Example: 500 users who became paid subscribers in the last 3 months. Control group: 5,000 users who signed up in the same period but did NOT convert. Step 2 — Map the complete journey of converters: for each converter, reconstruct their full journey: every page visited, feature used, email opened, support interaction. Create a journey sequence: day 1: signed up via Google search, completed profile. Day 2: explored dashboard, connected data source. Day 3: created first report, invited colleague. Day 5: colleague joined, shared report. Day 7: hit free tier limit, viewed pricing page. Day 9: started trial, used premium features. Day 14: converted to paid. Step 3 — Identify common patterns among converters: analyze the journey data to find behaviors that are disproportionately common among converters vs non-converters. Behavior | converters (%) | non-converters (%) | lift. Connected data source within 48h: 82% | 15% | 5.5x. Invited a colleague: 68% | 8% | 8.5x. Created 3+ reports: 75% | 12% | 6.3x. Viewed pricing page before trial: 90% | 25% | 3.6x. Used the product 5+ days in first 2 weeks: 88% | 10% | 8.8x. Step 4 — Identify the critical path: the sequence of events that most converters followed. Critical path (followed by 65% of converters): signup → connect data → explore features → create report → invite team → hit limit → evaluate pricing → convert. Alternate paths exist but the critical path has the highest conversion probability'"
    weight: 0.35
    description: "Methodology"
  - type: llm_judge
    criteria: "Response covers using reverse funnel insights for optimization — optimization: 'Using reverse funnel insights for optimization: Insight 1 — The golden actions: actions with the highest lift (converter % vs non-converter %) are the golden actions. From the analysis: inviting a colleague (8.5x lift) and using the product 5+ days (8.8x lift) are the two strongest predictors. Optimization: design the product to GUIDE users toward these actions. Add invite team member prompt after first report creation. Send engagement emails on days 2, 4, 6 highlighting new features to explore. Create an onboarding checklist that includes the golden actions. Insight 2 — The time windows matter: converters do not just do different things — they do them FASTER. Converters: connect data within 48 hours (82%). Non-converters who eventually connect: average 8 days. The speed of early engagement predicts conversion. Optimization: create urgency in the first 48 hours. Offer concierge onboarding for the first 2 days. Send a personalized email at hour 24 if data source not connected: we noticed you have not connected your data yet — here is a 2-minute setup guide. Insight 3 — The disqualifying behaviors: reverse funnel also reveals what NON-converters do. Behaviors strongly associated with NOT converting: only viewed the pricing page without using the product (tourists). Signed up and never returned (phantom signups). Used only basic features for 14+ days without exploring advanced features (stuck users). Optimization: for tourists: do not count them in funnel metrics (they inflate the top and depress conversion rates). For phantom signups: improve day-1 onboarding email sequence. For stuck users: trigger in-app guidance to discover advanced features. Insight 4 — Building a conversion probability score: combine the golden actions into a score: action | weight. Connected data source: +25 points. Created first report: +15 points. Invited colleague: +20 points. Used 5+ days: +20 points. Viewed pricing page: +10 points. Hit free tier limit: +10 points. Score | conversion probability. 0-20: 3% (low probability). 21-50: 15% (moderate). 51-80: 45% (high). 81-100: 78% (very high). Use this score to prioritize sales outreach, in-app messaging, and support resources'"
    weight: 0.35
    description: "Optimization"
  - type: llm_judge
    criteria: "Response covers advanced reverse funnel techniques — advanced: 'Advanced reverse funnel techniques: Technique 1 — Segment-specific reverse funnels: the ideal journey may differ by user segment. Enterprise users: ideal path includes security review, admin setup, SSO configuration. SMB users: ideal path focuses on quick setup, immediate value, self-serve. Build separate reverse funnel models for each segment and design segment-specific onboarding flows. Technique 2 — Temporal pattern analysis: analyze not just WHAT converters did but WHEN they did it. Time-to-first-action: converters take their first meaningful action within 10 minutes of signup. Non-converters take 3+ days (if they return at all). Session patterns: converters have 3-5 sessions in the first week (exploring and building). Non-converters have 1-2 sessions (brief, unfocused). Weekly rhythm: converters establish a regular usage pattern by week 2. Non-converters show irregular, declining engagement. Technique 3 — Path comparison using sequence analysis: compare the top 5 most common paths for converters vs non-converters. Top converter paths: path 1 (35%): signup → data → report → team → upgrade. Path 2 (20%): signup → explore → data → report → report → team → upgrade. Path 3 (15%): signup → data → team → report → upgrade. Top non-converter paths: path 1 (40%): signup → explore → leave (never return). Path 2 (25%): signup → explore → explore → leave. Path 3 (15%): signup → data → leave (got stuck). Key difference: converters reach the data connection step early and progress through it. Non-converters get stuck in exploration mode or bounce immediately. Technique 4 — Causal inference (moving beyond correlation): the golden actions may be correlated with conversion but not causal. Users who invite colleagues may already be more committed — the invitation does not CAUSE conversion. To test causality: run an A/B test where you actively prompt half of users to invite colleagues. If the prompted group converts at a higher rate, invitation has a causal effect. If conversion rates are similar, invitation is a signal of intent, not a driver. This distinction matters for optimization: if causal, design the product to DRIVE the action. If correlated, use the action as a PREDICTOR for targeting'"
    weight: 0.30
    description: "Advanced"
