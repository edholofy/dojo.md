meta:
  id: customer-journey-mapping
  level: 3
  course: funnel-analysis
  type: output
  description: "Customer journey mapping vs funnels — understand when to use funnel analysis vs journey mapping and how to combine both for comprehensive user understanding"
  tags: [journey-mapping, user-experience, touchpoints, funnel-comparison, advanced]

state: {}

trigger: |
  The UX research lead asks: "My team does customer journey mapping
  and the growth team does funnel analysis. We often reach different
  conclusions about what to optimize. Journey maps show emotional
  friction at the comparison step but the funnel shows the biggest
  drop at checkout. How do I reconcile these approaches?"

  Task: Compare funnel analysis and customer journey mapping, explain
  when to use each, and show how to combine them for deeper insight.

assertions:
  - type: llm_judge
    criteria: "Response compares the two approaches comprehensively — comparison: 'Funnel analysis vs customer journey mapping: funnel analysis: what it is: quantitative measurement of conversion rates at each step of a defined path. What it measures: how many users pass from step A to step B (conversion rate). What it reveals: WHERE users drop off (the step with the biggest loss). Strengths: precise, measurable, scalable (works with millions of users), easy to track over time. Limitations: treats users as numbers, does not explain WHY users drop off, assumes a linear or predefined path. Customer journey mapping: what it is: qualitative visualization of the complete user experience across all touchpoints. What it maps: user actions, thoughts, emotions, pain points, and moments of delight across the entire experience. What it reveals: WHY users behave the way they do (frustration, confusion, delight). Strengths: rich context, captures emotional experience, reveals unexpected friction, informs design decisions. Limitations: subjective, based on small samples (10-30 users), hard to quantify or track over time. Why they sometimes disagree: the comparison step example: funnel data shows a 15% drop at comparison step — moderate, not the worst step. Journey map shows intense frustration at the comparison step — users are confused by pricing tiers. These are not contradictory — they are complementary: the funnel shows that 85% of users PASS the comparison step (most survive). But the journey map shows that even users who pass through are frustrated (affecting downstream behavior). The frustrated users who survive comparison may be more likely to abandon at checkout (30pp lower checkout conversion vs non-frustrated users). The funnel misattributes the problem to checkout when the ROOT CAUSE is at comparison'"
    weight: 0.35
    description: "Comparison"
  - type: llm_judge
    criteria: "Response covers combining both approaches effectively — combining: 'Combining funnel analysis and journey mapping: the integrated framework: Layer 1 — Funnel analysis (quantitative foundation): identify the steps, measure conversion rates, calculate business impact. This tells you WHAT is happening and WHERE. Layer 2 — Journey mapping (qualitative depth): for each funnel step, map the user's emotional and cognitive experience. This tells you WHY users behave as they do. Layer 3 — Behavioral analytics (connecting what and why): session recordings, heatmaps, click tracking. This shows HOW users interact with each step. Practical integration method: Step 1 — Start with the funnel: identify the top 3 steps with the biggest drop-off or business impact. Checkout: 50% drop-off, $200K/month revenue impact. Product page: 70% drop-off, $180K/month. Registration: 60% drop-off, $150K/month. Step 2 — Journey map each priority step: for checkout (the highest-impact step): recruit 15-20 users to complete the checkout while thinking aloud. Map their experience: moment 1: user sees checkout form — 12 fields, feeling overwhelmed. Moment 2: user confused by shipping options (3 options with unclear differences). Moment 3: user surprised by total (tax and shipping added late). Moment 4: user hesitates at payment — does not see trust badges, feeling unsafe. Step 3 — Connect journey insights to funnel metrics: for each journey friction point, check the quantitative data: moment 3 (price surprise): 25% of users who see the final total with tax added abandon immediately. This is a quantifiable insight: hidden costs cause 25% of checkout abandonment. Step 4 — Prioritize using both lenses: prioritize issues that are both quantitatively significant (high funnel impact) AND qualitatively validated (users report pain). Price surprise: high funnel impact (25% abandon) + high emotional friction (frustration, trust loss) = top priority. Form length: moderate funnel impact (10% slower completion) + moderate friction (tedious but not frustrating) = medium priority'"
    weight: 0.35
    description: "Combining"
  - type: llm_judge
    criteria: "Response covers when to use each approach and practical recommendations — usage: 'When to use each approach: use funnel analysis when: you need to measure the business impact of user behavior changes. You need to track performance over time (daily, weekly, monthly trends). You need to compare segments (mobile vs desktop, channel A vs channel B). You need to calculate ROI of optimization efforts. You need to set quantitative goals for the team. Use journey mapping when: you need to understand WHY users are dropping off (not just where). You are designing a new feature or flow (before there is funnel data). You need to understand the emotional experience (trust, confusion, frustration). You want to discover unexpected user behaviors or needs. You are optimizing for user satisfaction, not just conversion. Use both when: you are making a major product decision (redesigning checkout, launching a new onboarding flow). Your funnel shows a problem but the cause is unclear. You want to prioritize between multiple funnel optimization opportunities. You need to convince stakeholders that a UX investment is worth the engineering cost. Practical recommendations: 1. Run journey mapping before major funnel optimization projects: do not optimize blindly. A journey map before a checkout redesign prevents optimizing the wrong things. 2. Validate journey map findings with funnel data: a UX researcher says users are frustrated at step 3. Check: do frustrated users (identified by behavior signals like rage clicks, back-and-forth navigation) have lower conversion at step 3? If yes: the qualitative finding is quantitatively validated. If no: the frustration may exist but not impact conversion (it may impact satisfaction or NPS instead). 3. Use journey maps to generate funnel hypotheses: journey map reveals users are confused by pricing tiers. Funnel hypothesis: simplifying pricing will improve pricing page → signup conversion by 5-10%. Test the hypothesis with an A/B test. This creates a feedback loop: journey map → hypothesis → A/B test → funnel measurement → updated journey map. 4. Share both perspectives with stakeholders: present funnel data for business justification (this optimization is worth $200K/month). Present journey map for emotional resonance (here is what our users are actually experiencing). The combination is more persuasive than either alone'"
    weight: 0.30
    description: "Usage"
