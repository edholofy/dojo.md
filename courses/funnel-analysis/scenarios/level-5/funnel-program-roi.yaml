meta:
  id: funnel-program-roi
  level: 5
  course: funnel-analysis
  type: output
  description: "Funnel program ROI — measure the total return on investment from funnel optimization programs including direct revenue, efficiency gains, and organizational capabilities"
  tags: [roi, program-evaluation, business-case, value-measurement, master]

state: {}

trigger: |
  The CFO asks: "We've spent $2M on funnel optimization over 3 years
  — analytics tools, data engineering, A/B testing platforms, and
  dedicated headcount. I need to know the ROI. Not just 'conversion
  improved' but the actual dollar return on our $2M investment. And
  how should I think about continuing vs reducing this investment?"

  Task: Build a comprehensive ROI analysis for a funnel optimization
  program covering direct revenue impact, efficiency gains, risk
  reduction, and strategic value.

assertions:
  - type: llm_judge
    criteria: "Response covers direct revenue impact measurement — revenue: 'Direct revenue impact of the funnel optimization program: measurement methodology: compare current funnel performance to what it would have been WITHOUT the optimization program. Approach 1 — Before-after comparison (baseline): pre-program baseline (3 years ago): overall conversion: 1.5%. Monthly revenue: $420K. ARPU: $52. Monthly visitors: 540K. Current state: overall conversion: 2.8% (+87% relative improvement). Monthly revenue: $1.21M. ARPU: $62 (+19%). Monthly visitors: 700K (+30%). Revenue decomposition: current revenue: $1.21M/month. Counterfactual (without optimization, assuming traffic still grew 30%): 700K visitors × 1.5% conversion × $52 ARPU = $546K/month. Revenue attributable to funnel optimization: $1.21M - $546K = $664K/month. Annual revenue impact: $664K × 12 = $7.97M. 3-year cumulative (ramping from year 1 to year 3): year 1: $2.4M additional revenue (early improvements). Year 2: $5.1M additional revenue (optimization velocity increased). Year 3: $8.0M additional revenue (compounding improvements). Total 3-year revenue impact: $15.5M. ROI on $2M investment: $15.5M ÷ $2M = 7.75x return. But this is an overestimate because not all improvement came from optimization: Approach 2 — Controlled attribution: some conversion improvement came from: product improvements (new features, better UX) — estimated 30% of improvement. Market tailwinds (growing demand, favorable macro) — estimated 10%. Funnel optimization program — estimated 60% of improvement. Adjusted 3-year revenue impact: $15.5M × 60% = $9.3M. Adjusted ROI: $9.3M ÷ $2M = 4.65x return. This is a conservative estimate — the actual ROI is likely between 4x and 8x. Approach 3 — Experiment-validated attribution (most rigorous): sum the measured impact of every A/B test shipped during the program. 47 experiments conducted over 3 years. 19 winners shipped (40% win rate). Total measured annual impact of shipped experiments: $3.2M/year. This is the most defensible number because each experiment was individually measured'"
    weight: 0.35
    description: "Revenue"
  - type: llm_judge
    criteria: "Response covers efficiency gains and indirect value — efficiency: 'Efficiency gains and indirect value: Efficiency gain 1 — Faster decision-making: before: product decisions based on opinions and stakeholder preferences (2-3 week debate cycles). After: product decisions backed by funnel data (decisions made in 1-2 days). Estimated time saved: 20 hours/month of executive and PM time in decision debates. Value: 20 hours × $150/hour average fully loaded cost × 12 months × 3 years = $108K. Efficiency gain 2 — Reduced failed initiatives: before: 6 major product initiatives per year, 2 succeeded (33% success rate). After: 8 initiatives per year, 5 succeeded (63% success rate). The funnel data allowed the team to: validate ideas before building (pre-test with funnel predictions). Kill underperforming initiatives faster (data showed no funnel impact within 4 weeks). Double down on winners (data showed strong funnel signal). Value of improved success rate: each failed initiative costs approximately $150K (engineering time wasted). 3 fewer failures per year × $150K × 3 years = $1.35M saved. Efficiency gain 3 — Avoided revenue loss from faster incident detection: funnel monitoring detected 12 significant incidents over 3 years. Average incident duration WITH monitoring: 4 hours. Estimated duration WITHOUT monitoring: 48 hours (found in weekly review). Average revenue impact per incident: $5,000/hour. Revenue preserved: 12 incidents × (48-4 hours) × $5,000 = $2.64M. Efficiency gain 4 — Marketing spend optimization: funnel attribution data informed marketing budget reallocation. Before: $50K/month spent on social ads with 0.14% funnel conversion. After: budget shifted to email and referral with 0.96% and 1.6% conversion. Marketing efficiency improvement: same total budget generates 40% more conversions. Value: 40% more conversions × 12 months × 3 years = estimated $2.1M additional revenue from better allocation. Indirect value — organizational capability: the funnel optimization program created a data-driven culture. Every team now references funnel data in decision-making. New employees learn funnel thinking in their first week. This capability has a compounding effect that is difficult to quantify but may be the most valuable outcome of the program'"
    weight: 0.35
    description: "Efficiency"
  - type: llm_judge
    criteria: "Response covers investment continuation framework and CFO presentation — continuation: 'Investment continuation framework: should the CFO continue, increase, or reduce the investment? The diminishing returns question: funnel optimization has diminishing returns — the first improvements are easy, later ones are harder. Year 1: $2.4M revenue gain from $500K investment (4.8x). Year 2: $5.1M revenue gain from $700K investment (7.3x — improved as capabilities matured). Year 3: $8.0M revenue gain from $800K investment (10x — compounding effects). The ROI is actually INCREASING, not decreasing. This is because: early investments in infrastructure (data pipelines, monitoring) are one-time costs that continue generating value. The organizational capability compounds (more people making data-driven decisions). Each optimization builds on previous ones (compound improvement). When to reduce investment: reduce when: all funnel steps are within 5% of industry best-in-class benchmarks. Marginal experiments consistently show less than 0.5pp improvement. The team cannot generate hypotheses for new experiments. When to increase investment: increase when: new products or markets need funnel analysis capability. The competitive landscape intensifies (need faster optimization cycles). Technology advances enable new optimization approaches (AI-powered personalization). Our current situation warrants: maintaining the investment. Conversion is improving but mobile gap represents $5M+ annual opportunity. The program ROI is increasing, not decreasing. The organizational capability is generating compounding returns. CFO presentation — the executive summary: the investment case: we invested $2M over 3 years in funnel optimization. Direct revenue impact: $9.3M (conservative, experiment-validated: $3.2M/year). Efficiency gains: $6.2M (faster decisions, fewer failures, faster incident detection, better marketing allocation). Total return: $15.5M on $2M invested = 7.75x ROI. Risk reduction: the monitoring system prevented an estimated $2.6M in revenue loss from incidents. Going forward: recommended annual investment: $900K (roughly current level). Expected annual return: $8M+ (based on current program trajectory). Key opportunity: closing the mobile conversion gap alone could add $5M ARR. The bottom line: for every $1 we invest in funnel optimization, we generate $5-8 in revenue. This is one of the highest-ROI programs in the company. Reducing investment would be penny-wise and pound-foolish'"
    weight: 0.30
    description: "Continuation"
