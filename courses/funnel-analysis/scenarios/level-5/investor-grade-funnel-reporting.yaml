meta:
  id: investor-grade-funnel-reporting
  level: 5
  course: funnel-analysis
  type: output
  description: "Investor-grade funnel reporting — present funnel metrics to investors and board members with the rigor, context, and narrative they require for funding and governance decisions"
  tags: [investor-reporting, board, fundraising, due-diligence, master]

state: {}

trigger: |
  The CFO says: "We're raising our Series B ($30M round). Investors
  will scrutinize our funnel metrics during due diligence. I need
  investor-grade funnel reporting that demonstrates unit economics,
  shows improvement trends, and addresses their concerns proactively.
  What should our data room include?"

  Task: Design an investor-grade funnel reporting package for Series B
  due diligence, covering metrics, trends, cohort analysis, and
  anticipated investor questions.

assertions:
  - type: llm_judge
    criteria: "Response covers the investor funnel reporting package — package: 'Investor-grade funnel reporting package: Section 1 — Funnel overview (the story): headline: we convert 2.8% of visitors to paying customers at $62 ARPU, up from 1.5% eighteen months ago — a 87% improvement in unit economics. The funnel diagram: a clean 5-stage funnel showing: visitor (200K/month) → signup (5.5%, 11,000) → activation (38%, 4,180) → paid (22%, 920) → expansion (24%, 221 expand per month). Each stage annotated with: conversion rate, volume, and trend arrow. Below the diagram: key insight: activation rate (38%) is our competitive advantage — industry benchmark is 25-35%. Our onboarding investment is paying off. Section 2 — Unit economics through the funnel: CAC (customer acquisition cost): total marketing + sales spend ÷ new paying customers. Current: $145 CAC (down from $210 eighteen months ago). Trend: declining 5% per quarter (funnel efficiency improving). LTV (lifetime value): ARPU × gross margin × customer lifetime (1/churn rate). Current: $62 × 80% × 24 months = $1,190. Trend: improving 3% per quarter (ARPU growing + churn declining). LTV:CAC ratio: $1,190 ÷ $145 = 8.2x. Industry benchmark: 3x is healthy, 5x+ is excellent. Our 8.2x indicates strong unit economics with room to invest more aggressively in acquisition. Payback period: CAC ÷ (monthly ARPU × gross margin) = $145 ÷ ($62 × 80%) = 2.9 months. Industry benchmark: under 12 months is good, under 6 is excellent. 2.9 months means we recover acquisition cost quickly, enabling faster reinvestment. Section 3 — Cohort funnel analysis (proving durability): show that each successive cohort performs better than the previous one. Cohort | month-3 conversion | month-6 conversion | month-12 LTV. Q1 2023: 1.5% | 1.8% | $850. Q2 2023: 1.8% | 2.1% | $920. Q3 2023: 2.2% | 2.5% | $1,050. Q4 2023: 2.5% | 2.8% | $1,120. Q1 2024: 2.8% | TBD | TBD (projected $1,190). This cohort table demonstrates: conversion rates are genuinely improving (not just traffic quality changes). LTV is growing (users are staying longer and paying more). Recent cohorts outperform older ones at every maturity point. This is the most compelling evidence of product-market fit and execution quality'"
    weight: 0.35
    description: "Package"
  - type: llm_judge
    criteria: "Response covers anticipated investor questions and risk factors — questions: 'Anticipated investor questions and prepared answers: Q1: how much of your conversion improvement comes from traffic quality vs product improvement? A: we decompose this quarterly. Of the 1.3pp overall improvement (1.5% → 2.8%): 0.8pp from product improvements (controlled analysis — same traffic source conversion improved). 0.5pp from traffic mix shift (more organic/email, less paid social). Even without the traffic mix benefit, we improved 53% — product-driven growth is real. Q2: what happens to your funnel when you scale traffic 3x? A: historically, conversion rate declined 0.3pp when we doubled traffic (from 100K to 200K). This is because marginal traffic is lower quality. Our model assumes 0.2pp decline per doubling. At 600K visitors: expected conversion 2.4% (not 2.8%). This is built into our projections. Q3: is your activation rate (38%) sustainable or artificially inflated? A: we segment activation by acquisition source. Organic users: 42% activation (strong product-market fit). Paid users: 33% activation (lower but still above benchmark). Email users: 48% activation (high-intent channel). All segments exceed the 25-35% industry benchmark. The blended 38% is not dependent on any single channel. Q4: what are your funnel's biggest risks? A: we proactively present three risks. Risk 1: mobile conversion (1.8%) is 60% below desktop (4.5%). If mobile traffic share grows (currently 55%), blended conversion will face headwinds. Mitigation: mobile optimization is our top product priority this quarter. Risk 2: activation rate improvement may plateau. We have improved from 25% to 38% over 18 months. Further gains will be harder. Mitigation: we are investing in AI-powered personalized onboarding. Risk 3: competitive pressure. Two funded competitors are investing in similar products. If they achieve parity, our conversion advantage may erode. Mitigation: our 38% activation rate represents a durable product moat that took 18 months to build. Q5: how do you reconcile different team metrics? A: we implemented a metric governance framework 6 months ago. All board-level metrics are certified with documented definitions, single source of truth, and quarterly audits. Team-specific metrics exist for operational purposes but are clearly labeled and reconciled to certified metrics'"
    weight: 0.35
    description: "Questions"
  - type: llm_judge
    criteria: "Response covers projections and growth model for investors — projections: 'Projections and growth model: funnel-based revenue projection for the next 18 months (Series B timeline): assumptions: traffic growth: 8% MoM (with $30M funding for marketing and brand). Conversion: improving 0.1pp per month (continued optimization). ARPU: growing $1/month (pricing and expansion). Churn: declining 0.2pp per quarter (from 4.5% to 3.3% monthly). Month 6 projection: traffic: 300K. Conversion: 3.4%. New customers: 1,020/month. Paying base: 6,800. MRR: $462K. ARR: $5.5M. Month 12 projection: traffic: 450K. Conversion: 4.0%. New customers: 1,800/month. Paying base: 12,500. MRR: $937K. ARR: $11.2M. Month 18 projection: traffic: 675K. Conversion: 4.6%. New customers: 3,105/month. Paying base: 20,000. MRR: $1.6M. ARR: $19.2M. Key model sensitivities (what could go wrong): downside case (traffic grows 5% instead of 8%): month 18 ARR: $14.1M (27% below base case). Mitigation: even in the downside, we reach $14M ARR (a 7x increase from current $1.8M). Downside case (conversion plateaus at 3.5%): month 18 ARR: $16.5M (14% below base case). This is less impactful because base growth and churn reduction still drive growth. Worst case (both headwinds + churn stays flat): month 18 ARR: $10.2M (still a 5.7x increase from current). Use of funds — funnel-informed allocation: marketing ($12M): scale traffic from 200K to 675K monthly. Focus on channels with proven funnel economics (organic, email, referral). Product ($10M): mobile optimization (close the mobile-desktop gap). AI onboarding (push activation from 38% to 50%). Enterprise features (increase ARPU ceiling). Infrastructure ($5M): real-time funnel monitoring. Multi-product data architecture. Self-serve analytics for all teams. Operations ($3M): customer success team (reduce churn). Sales team for enterprise segment. Each allocation is tied to a specific funnel metric improvement, making the investment thesis concrete and measurable'"
    weight: 0.30
    description: "Projections"
