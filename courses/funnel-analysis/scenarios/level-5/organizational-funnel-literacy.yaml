meta:
  id: organizational-funnel-literacy
  level: 5
  course: funnel-analysis
  type: output
  description: "Organizational funnel literacy — build company-wide funnel thinking that transforms how every team makes decisions and measures success"
  tags: [organizational, culture, literacy, transformation, master]

state: {}

trigger: |
  The CEO says: "Funnel analysis is currently an analytics team
  activity. I want every team — engineering, design, marketing, sales,
  support, and HR — to think in funnels. How do I make funnel thinking
  a core organizational capability?"

  Task: Design an organizational transformation program that embeds
  funnel thinking across all functions, from hiring to product
  development to customer support.

assertions:
  - type: llm_judge
    criteria: "Response covers the organizational transformation framework — framework: 'Organizational funnel literacy transformation: why every team needs funnel thinking: engineering: without funnel context, engineers optimize for code quality and performance. With funnel context, they prioritize changes that move the needle on conversion. A 50ms performance improvement on the checkout page may improve conversion 0.3pp — worth $30K/month. Without knowing this, the engineer might deprioritize it. Design: without funnel context, designers create beautiful interfaces. With funnel context, they design for conversion AND delight. They know that a minor layout change on the pricing page affects $100K/month in revenue. Sales: without funnel context, sales reps pursue all leads equally. With funnel context, they focus on leads with the highest funnel scores (3x better conversion). Customer support: without funnel context, support resolves tickets. With funnel context, support identifies funnel friction patterns from tickets and feeds insights back to product. HR: without funnel context, HR fills roles. With funnel context, HR understands the business impact of each role and prioritizes accordingly. The transformation program — three phases: Phase 1 — Funnel education (month 1-2): company-wide funnel workshop: what is a funnel? How do we measure ours? Why does it matter? Role-specific funnel training: engineering: how code changes affect conversion (with examples from your codebase). Design: how UI patterns affect funnel metrics (with A/B test results). Marketing: how channel performance affects funnel quality (with attribution data). Sales: how lead scoring predicts conversion (with historical win/loss data). Support: how to identify funnel friction from support tickets. Deliverable: every employee can name the company's 5 funnel stages and the current conversion rate at each step. Phase 2 — Funnel integration (month 3-6): embed funnel metrics into every team's workflow. Engineering: PRD (product requirements document) includes expected funnel impact. Design: design reviews include funnel impact assessment. Marketing: campaign proposals include projected funnel metrics. Sales: pipeline reviews reference funnel stage data. Support: weekly report includes funnel friction patterns identified from tickets. Deliverable: every team's OKRs include at least one funnel-related metric. Phase 3 — Funnel culture (month 6-12): funnel metrics become part of the company's decision-making DNA. Weekly all-hands includes a 2-minute funnel update. Product decisions are justified with funnel impact estimates. Cross-functional funnel improvement projects are launched quarterly. Funnel champions in each team are recognized and empowered'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response covers function-specific funnel integration — integration: 'Function-specific funnel integration: Engineering — funnel-aware development: before: engineer receives a ticket to redesign the checkout form. After: ticket includes: current checkout conversion rate (55%). Target conversion rate (62%). Expected revenue impact of improvement ($63K/month). The engineer now understands the business value of their work. Sprint planning: prioritize by funnel impact, not just technical complexity. Feature A: 3 story points, improves activation by 2pp ($24K/month). Feature B: 8 story points, improves checkout by 1pp ($12K/month). Feature A has 6x better ROI per story point — build it first. Deployment monitoring: after every deployment, check if funnel metrics changed. If activation dropped 2pp within 4 hours of deployment: investigate immediately. This makes engineers partners in funnel optimization, not just feature builders. Design — conversion-aware design: design reviews include a funnel impact section. The designer presents: which funnel step this design affects. What the current conversion rate is. The hypothesis for how the design improves it. How to measure success (the A/B test plan). Design decisions justified with data: we made the CTA button 20% larger because our mobile heatmap shows 15% of taps miss the current button. The estimated impact is a 2pp improvement in mobile form submission rate. Sales — funnel-scored pipeline: lead scoring model based on funnel behavior: lead score = (engagement score × 0.4) + (fit score × 0.3) + (intent score × 0.3). Engagement score: based on funnel progression (visited pricing: +20, started trial: +30, activated: +40). Sales reps see: this lead has an 82% funnel score — they activated 3 days ago, invited 2 teammates, and viewed the enterprise pricing page twice. Expected close probability: 65%. Recommended action: call within 24 hours with an enterprise demo. Customer support — funnel friction detection: support tickets are tagged with the funnel step where the issue occurred. Monthly analysis: step | tickets | % of total | top issue. Signup: 120 | 15% | password requirements confusing. Activation: 280 | 35% | data source connection failing. Checkout: 200 | 25% | payment method not accepted. Post-purchase: 200 | 25% | feature not working as expected. The support team feeds this directly to product: activation connection failures account for 35% of support tickets. If fixed, activation rate could improve 3-5pp. HR — funnel-informed hiring: if the funnel analysis shows activation is the biggest bottleneck, HR prioritizes hiring: onboarding designers (improve the activation experience). Growth engineers (build and test activation experiments). Data scientists (model activation predictors and optimize). Hiring is aligned with the company's funnel priorities, not just headcount targets'"
    weight: 0.35
    description: "Integration"
  - type: llm_judge
    criteria: "Response covers measuring organizational funnel maturity and sustaining the transformation — maturity: 'Measuring organizational funnel maturity: the funnel literacy scorecard: measure each team's funnel literacy quarterly: dimension | score 1-5 | criteria. Awareness: can the team describe the company funnel and current metrics? Knowledge: can the team explain how their work affects funnel performance? Integration: does the team use funnel data in daily decision-making? Contribution: has the team delivered a measurable funnel improvement this quarter? Innovation: has the team proposed novel funnel optimization approaches? Target: every team scores 3+ within 12 months, 4+ within 24 months. Organizational funnel maturity model: Level 1 — Ad hoc: funnel analysis is done occasionally, by the analytics team only. No shared definitions. No connection between funnel data and team decisions. Level 2 — Defined: funnel metrics are standardized and certified. Teams can access funnel data through dashboards. Quarterly funnel reviews happen cross-functionally. Level 3 — Managed: every team has funnel-related OKRs. Funnel impact is part of product development process. Experimentation is systematic and data-driven. Level 4 — Optimized: funnel thinking is embedded in company culture. Real-time monitoring with automated alerting. Cross-functional funnel improvement teams operate continuously. Level 5 — Innovative: funnel analysis drives company strategy. Predictive models anticipate funnel changes. The company's funnel capabilities are a competitive advantage. Sustaining the transformation: 1. Funnel champions network: identify 1-2 funnel champions per team. Monthly champions meeting to share insights and best practices. Champions are recognized in company communications. 2. Quarterly funnel days: company-wide event where teams present their funnel contributions. Awards for the biggest funnel improvement of the quarter. Hackathon-style sessions to brainstorm funnel experiments. 3. Funnel impact tracking: maintain a running total of the revenue impact of all funnel improvements. Example: total funnel-driven revenue improvement since program launch: $1.2M additional MRR. This makes the value of funnel literacy tangible and motivating. 4. New employee onboarding: every new hire completes the funnel literacy module in their first week. They learn: the company funnel, current metrics, how their role connects, and how to access funnel data. From day 1, every employee understands the funnel'"
    weight: 0.30
    description: "Maturity"
