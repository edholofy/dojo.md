meta:
  id: funnel-competitive-intelligence
  level: 5
  course: funnel-analysis
  type: output
  description: "Funnel competitive intelligence — estimate competitor funnel performance, identify competitive advantages, and inform strategic decisions using external data"
  tags: [competitive-intelligence, benchmarking, market-analysis, strategy, master]

state: {}

trigger: |
  The Chief Strategy Officer asks: "Our three main competitors just
  raised large funding rounds. I need to understand their funnel
  performance relative to ours without having access to their internal
  data. How do I estimate competitor funnels and use those estimates
  for strategic decisions?"

  Task: Design a competitive funnel intelligence framework including
  estimation methods, comparison frameworks, and strategic applications.

assertions:
  - type: llm_judge
    criteria: "Response covers competitor funnel estimation methods — estimation: 'Competitor funnel estimation methods: Data source 1 — Traffic and engagement estimates: tools: SimilarWeb, SEMrush, Ahrefs. Available metrics: monthly unique visitors (±20% accuracy). Traffic sources breakdown (organic, paid, social, direct, referral). Bounce rate and pages per session (engagement quality proxies). Geographic distribution. Example estimates: competitor | monthly visitors | organic % | bounce rate. Competitor A: 1.2M | 45% | 52%. Competitor B: 400K | 62% | 38%. Us: 700K | 50% | 44%. Insight: Competitor B has the lowest bounce rate (38%) and highest organic share (62%), suggesting strong product-market fit and content strategy. Data source 2 — Public financial signals: sources: press releases, Crunchbase funding data, job postings, public filings. Revenue estimation: funding round valuation ÷ typical revenue multiple for the stage. If Competitor A raised $50M at $500M valuation: at 20x revenue multiple (typical Series C SaaS): estimated ARR = $25M. Revenue per visitor: $25M ÷ (1.2M visitors × 12 months) = $1.74 per visitor per month. Our RPV: $910K ÷ 700K = $1.30 per visitor. Competitor A monetizes visitors 34% more efficiently. Data source 3 — Product intelligence: sign up for competitor products (mystery shopping). Map their funnel steps, count form fields, measure onboarding flow. Note: activation criteria (what they consider success). Time from signup to first value experience. Friction points and advantages. Record the complete experience: competitor B's onboarding is 3 steps vs our 7 steps. They reach the aha moment in 4 minutes vs our 12 minutes. This likely explains their higher activation rate. Data source 4 — Customer reviews and surveys: G2, Capterra, Trustpilot reviews mention funnel friction: competitor A reviews: great product but the setup was painful (activation weakness). Competitor B reviews: loved how fast I could get started (activation strength). Win/loss analysis from sales team: why did prospects choose the competitor? If 40% cite easier setup — their activation funnel is better than ours'"
    weight: 0.35
    description: "Estimation"
  - type: llm_judge
    criteria: "Response covers competitive comparison framework — comparison: 'Competitive funnel comparison framework: the estimated competitive funnel matrix: funnel stage | us | comp A | comp B | our position. Traffic volume: 700K | 1.2M | 400K | middle. Visit → signup: 5.5% | 4.0% est | 7.0% est | strong. Signup → activation: 38% | 28% est | 48% est | middle. Activation → paid: 22% | 25% est | 20% est | middle. Overall conversion: 2.8% | 1.8% est | 3.2% est | middle. ARPU: $62 | $75 est | $95 est | lowest. LTV: $1,190 | $1,200 est | $1,900 est | lowest. The competitive positioning map: plot competitors on two axes: conversion efficiency (overall conversion rate) vs monetization efficiency (ARPU/LTV). Quadrant 1 (high conversion, high monetization): Competitor B — the enterprise champion. Quadrant 2 (high conversion, low monetization): us — the efficient converter. Quadrant 3 (low conversion, high monetization): Competitor A — the brand leader. Quadrant 4 (low conversion, low monetization): no major competitor here. Strategic implications: 1. Our competitive advantage is conversion efficiency (2.8% vs Competitor A's 1.8%). Our product experience converts well — this is a durable moat. 2. Our competitive weakness is monetization (ARPU $62 vs Competitor B's $95). We either serve a lower-value segment or undercharge for our product. 3. The biggest threat is Competitor B: higher conversion AND higher ARPU. They are currently smaller (400K traffic) but if they scale traffic, they will dominate. Competitive funnel benchmarking dashboard: track quarterly: metric | Q1 | Q2 | Q3 | Q4 | trend. Our conversion: 2.5% | 2.6% | 2.7% | 2.8% | ↑ improving. Comp A conversion (est): 1.6% | 1.7% | 1.8% | 1.8% | → stable. Comp B conversion (est): 2.8% | 3.0% | 3.1% | 3.2% | ↑ improving faster. Our gap to Comp B: -0.3pp | -0.4pp | -0.4pp | -0.4pp | → stable gap. If the gap to Competitor B is widening, they are improving faster than us — a strategic concern'"
    weight: 0.35
    description: "Comparison"
  - type: llm_judge
    criteria: "Response covers strategic applications of competitive funnel intelligence — strategic: 'Strategic applications of competitive funnel intelligence: Application 1 — Competitive positioning and messaging: our funnel advantage: signup conversion (5.5%) is highest among competitors. This means: our marketing and landing pages are effective. We attract qualified traffic. The initial product impression is strong. Marketing message: the platform that converts — start seeing results in minutes, not days. Target the pain point of competitor weaknesses: Competitor A's activation pain → our message: set up in 3 steps, not 30. Competitor B's pricing → our message: enterprise power at half the cost. Application 2 — Product strategy prioritization: our weakest stage relative to competitors is activation (38% vs Competitor B's estimated 48%). If we closed this 10pp gap: additional activated users: 11,000 × 10% = 1,100. Additional paid (at 22% conversion): 242 more customers/month. Revenue impact: 242 × $62 = $15,000 additional MRR. This justifies the investment in studying and matching Competitor B's onboarding excellence. Specific actions: sign up for Competitor B. Document their onboarding step-by-step. Identify what they do that we do not (likely: fewer steps, pre-built templates, guided first experience). Adapt the best practices to our product. Application 3 — M&A intelligence: if considering acquiring a competitor, their estimated funnel data informs valuation. Competitor B funnel analysis: estimated 3.2% conversion × 400K traffic × $95 ARPU = estimated $1.22M/month revenue. Their funnel strengths (activation, ARPU) would complement our strengths (traffic, signup). Combined entity: our traffic (700K) + their conversion (3.2%) + their ARPU ($95) = $2.13M/month. This is 2.3x our current revenue — a strong case for acquisition if the price is right. Application 4 — Defensive strategy: monitor competitor funnel improvements quarterly. If Competitor A's activation rate improves from estimated 28% to 35%, they are closing the gap. Response options: accelerate our own activation optimization. Invest in a different competitive moat (data network effects, platform ecosystem). Launch a competitive displacement program targeting their dissatisfied users. Early warning: if a competitor's job postings show hiring for growth engineers, onboarding designers, or conversion optimization roles, expect their funnel to improve in 6-12 months'"
    weight: 0.30
    description: "Strategic"
