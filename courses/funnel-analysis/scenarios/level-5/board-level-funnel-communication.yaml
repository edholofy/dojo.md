meta:
  id: board-level-funnel-communication
  level: 5
  course: funnel-analysis
  type: output
  description: "Board-level funnel communication — present funnel insights to boards of directors in a way that drives governance decisions, resource allocation, and strategic direction"
  tags: [board, governance, executive-communication, strategic-decisions, master]

state: {}

trigger: |
  The CEO says: "The board has 45 minutes for our quarterly business
  review. I get 10 minutes for funnel metrics. The board includes
  2 investors, 2 independent directors (one former CMO, one former
  CTO), and 3 executives. How do I present funnel data that drives
  real board-level decisions, not just information sharing?"

  Task: Design a board-level funnel presentation that informs
  governance decisions within a 10-minute time constraint.

assertions:
  - type: llm_judge
    criteria: "Response covers the board presentation structure and content — structure: 'Board-level funnel presentation — 10-minute structure: minute 0-2 — The headline and context: one slide, one headline, one decision implication. Headline: our funnel efficiency improved 23% this quarter, but mobile conversion remains 60% below desktop — a $1.2M annual revenue gap. Context: last quarter's board direction was to focus on activation rate. We delivered: activation improved from 34% to 38% (+12% relative). This added $96K in quarterly revenue. The mobile gap has widened and is now the single largest revenue opportunity. Decision implication: we are requesting board approval to shift $500K of the R&D budget from feature development to mobile optimization. Why this structure works for board members: investors want to see: is the business getting more efficient? (LTV:CAC improving). Is the growth trajectory intact? (conversion trends up). Where is the biggest risk? (mobile gap). Former CMO wants to see: are marketing channels delivering quality traffic? (channel-specific conversion). Is the brand awareness driving funnel entry? (top-of-funnel metrics). Former CTO wants to see: is the technology investment paying off? (infrastructure-driven improvements). Are there technical bottlenecks? (page speed, mobile compatibility). Executives want to see: are we on track for annual targets? (quarterly progress vs plan). What resources do we need? (budget and headcount requests). Minute 2-5 — The data (3 slides maximum): Slide 1 — Funnel trend (one chart): 4-quarter trend showing overall conversion rate with target line. Annotations for major initiatives and their impact. This quarter: 2.8% conversion (target: 2.5%). On track. Slide 2 — Cohort health (one table): quarterly cohort table showing that newer cohorts outperform older ones at the same maturity point. This is the strongest evidence of sustainable improvement. Slide 3 — Unit economics evolution: LTV:CAC ratio: 8.2x (up from 6.5x last quarter). CAC payback: 2.9 months (down from 3.8 months). Blended gross margin: 80% (stable). These three slides give the board everything they need to assess business health'"
    weight: 0.35
    description: "Structure"
  - type: llm_judge
    criteria: "Response covers driving board decisions and handling board dynamics — decisions: 'Driving board decisions: Minute 5-7 — The strategic question (the decision moment): present the board with a clear decision to make. Example: strategic question: should we invest $500K in mobile optimization or continue investing in new feature development? The case for mobile optimization: mobile is 55% of traffic but 30% of revenue. The mobile-desktop conversion gap: 1.8% vs 4.5%. If mobile matched desktop: additional 600 customers/month × $62 ARPU = $446K additional MRR ($5.35M ARR). Investment required: $500K one-time (2 senior engineers + 1 mobile designer for 6 months). Expected ROI: 10.7x within 12 months. The alternative — new feature development: new features add value for existing customers (reduces churn by an estimated 0.5pp). Revenue impact: approximately $180K additional MRR. Both are valuable, but mobile optimization has 2.5x the ROI. Recommendation: approve the mobile investment. Present the decision clearly: we are not asking the board to approve an analytics initiative. We are asking the board to allocate capital to the highest-ROI growth opportunity, supported by data. Handling board dynamics: the skeptical investor: concern — are these conversion numbers reliable? Response: we implemented metric governance 6 months ago. All board metrics are certified with documented definitions, audited quarterly. We also show reconciliation between internal metrics and third-party validation (Google Analytics, Stripe revenue). The detail-oriented director: concern — what's the confidence level? Response: our improvement is based on 12 months of cohort data with consistent upward trends across all segments. The mobile opportunity estimate has 80% confidence bounds of $3.5M-$7.2M ARR impact. The strategic director: concern — how does this compare to competitors? Response: we estimate Competitor B converts mobile at 2.8% (vs our 1.8%). This is the primary driver of their superior overall conversion (3.2% vs our 2.8%). Closing the mobile gap would make us the conversion leader. Minute 7-8 — Forward look: next quarter targets: overall conversion: 3.0% (from 2.8%). Mobile conversion: 2.2% (from 1.8%). Activation rate: 40% (from 38%). Key initiatives: mobile checkout redesign (ship in month 2). AI-powered onboarding personalization (ship in month 3). Enterprise pricing tier launch (ship in month 1). Minute 8-10 — Discussion and Q&A: reserved for board questions and deliberation on the proposed decision'"
    weight: 0.35
    description: "Decisions"
  - type: llm_judge
    criteria: "Response covers board reporting cadence and governance integration — governance: 'Board reporting cadence and governance integration: quarterly board reporting package: pre-read (distributed 48 hours before the meeting): full funnel data appendix (10 pages). Cohort tables with detailed breakdowns. Competitive intelligence summary. Experiment results from the quarter. In-meeting (10 minutes): the 3-slide presentation + decision request. Post-meeting (distributed within 24 hours): meeting minutes with decisions recorded. Action items with owners and deadlines. Updated targets if the board approved changes. Between-meeting updates: monthly 1-page email to board members with: headline metric (overall conversion) and trend. Any P0 anomalies and their resolution. Progress update on approved initiatives. Monthly updates keep the board engaged and prevent 45-minute catch-up sessions. Funnel metrics in governance decisions: how funnel data informs specific board decisions: decision: CEO performance review. Funnel input: did conversion and unit economics improve under the CEO's leadership? Year-over-year funnel improvement is a key executive performance metric. Decision: annual budget allocation. Funnel input: allocate budget to the funnel stages with the highest ROI opportunity. If activation is the bottleneck, product budget should increase. If traffic is the bottleneck, marketing budget should increase. Decision: M&A evaluation. Funnel input: does the acquisition target strengthen our funnel weakness? If our weakness is enterprise conversion and the target excels at enterprise, the strategic fit is strong. Decision: risk assessment. Funnel input: what happens if our funnel deteriorates? Scenario analysis: if conversion drops 1pp, revenue declines $X. What is our downside exposure? Board-level KPI dashboard: the board should see the same 5 metrics every quarter: 1. Overall conversion rate (and trend). 2. LTV:CAC ratio (and trend). 3. Cohort performance (each new cohort vs previous). 4. Mobile vs desktop gap (the biggest known risk). 5. Revenue per visitor (the ultimate efficiency metric). These 5 metrics, tracked consistently over time, give the board a complete picture of funnel health in under 2 minutes of review. The remaining 8 minutes are for strategic discussion and decision-making, not data consumption'"
    weight: 0.30
    description: "Governance"
