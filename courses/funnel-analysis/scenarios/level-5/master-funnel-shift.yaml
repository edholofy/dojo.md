meta:
  id: master-funnel-shift
  level: 5
  course: funnel-analysis
  type: output
  description: "Master funnel shift — handle C-suite and board-level funnel challenges requiring strategic planning, investor communication, and organizational transformation in a single day"
  tags: [shift-simulation, master, c-suite, board-level, multi-request]

state: {}

trigger: |
  Three master-level funnel requests arrive simultaneously:

  Request 1 (Board of Directors): "We're evaluating a $50M acquisition
  target. Their reported funnel metrics look impressive — 4.5%
  overall conversion, $120 ARPU, 110% NRR. But we've been burned
  before. Conduct a funnel due diligence analysis and tell us what
  questions to ask and what risks to look for."

  Request 2 (Incoming CEO — first 90 days): "I'm the new CEO starting
  Monday. I need a funnel-based assessment of the company's health
  within my first 2 weeks. What should I look at, in what order, and
  what would signal that the business is stronger or weaker than the
  board presentation suggested?"

  Request 3 (PE Investor): "We're considering a growth equity
  investment. Show me a funnel-based value creation plan — how would
  you use funnel optimization to double the company's valuation within
  3 years?"

  Task: Handle all three requests with detailed analysis.

assertions:
  - type: llm_judge
    criteria: "Response handles Request 1 with acquisition due diligence — diligence: 'Request 1 — Funnel due diligence for $50M acquisition: the due diligence framework (10 critical questions): Question 1 — How is conversion rate defined and measured? Red flags: conversion measured over a 90-day window (inflates rates vs 30-day industry standard). Sessions counted instead of unique users (inflates denominator). Bot traffic not filtered. Internal test accounts included. Ask for: the exact formula (numerator, denominator, exclusions, time window). Same metric computed by your data team using raw data access. Question 2 — Show me cohort-level conversion trends: healthy: each quarterly cohort converts better than the previous. Concerning: recent cohorts convert worse (growth is being fueled by traffic volume, not funnel quality). Red flag: the company cannot produce cohort-level data (they may not track it, hiding deterioration). Question 3 — Decompose conversion by traffic source: their 4.5% blended rate may mask: organic: 7% conversion (high-quality, earned traffic). Paid: 2% conversion (expensive, lower quality). If 60% of traffic is paid: blended rate is dependent on continued ad spending. If ad budget is cut post-acquisition, conversion will drop significantly. Question 4 — What is the ARPU trend by cohort? $120 ARPU may be: increasing (healthy — newer customers pay more). Stable (acceptable — no pricing power erosion). Declining (concerning — suggests competitive pressure or value erosion). Also check: is ARPU driven by a few large enterprise accounts? Remove the top 5% of accounts and check what the median ARPU looks like. Question 5 — Validate the 110% NRR: ask for NRR by cohort (newer vs older customers). Ask for gross retention vs net retention. If gross retention is 85% but expansion is 25%: NRR = 110%. But 15% of customers are leaving every year — expansion from remaining customers masks churn. Question 6 — What is the customer acquisition cost and trend? If CAC is $200 and rising 10% quarterly: the funnel is getting less efficient over time. At some point, CAC exceeds LTV and growth becomes unprofitable. Question 7 — Show me the mobile vs desktop funnel split: if mobile is 50%+ of traffic but converts at 40% of desktop rate: the reported 4.5% conversion is fragile (mobile share growth will erode it). Question 8 — What experiments have they run and what is the win rate? A company with a mature funnel optimization program: runs 20+ experiments per quarter. Has a 30-40% win rate. Can show the revenue impact of shipped experiments. If they cannot: the reported conversion may be accidental, not systematic. Question 9 — How dependent is the funnel on any single channel, feature, or person? If 50% of signups come from one marketing channel: that channel could change algorithm or pricing overnight. If one product feature drives 60% of activation: a bug in that feature would devastate the funnel. Question 10 — What does the funnel look like in the WORST month? Every company presents their best quarter. Ask for the worst month in the last 2 years. How far did metrics drop? How long did it take to recover? This reveals the floor, not just the ceiling. Risk assessment summary: overall risk level based on due diligence findings. Low risk: consistent cohort improvement, diversified traffic, systematic optimization program. Medium risk: some cohort variability, moderate channel concentration, limited experimentation. High risk: declining cohort quality, heavy paid traffic dependency, no experimentation culture, metrics defined non-standardly'"
    weight: 0.35
    description: "Due diligence"
  - type: llm_judge
    criteria: "Response handles Request 2 with the new CEO assessment plan — ceo: 'Request 2 — New CEO 14-day funnel assessment: Day 1-3 — Get the raw data (trust but verify): request the funnel dashboard and ask: how is each metric defined? (Exact formula, exclusions, time window). What system computes it? (Internal pipeline vs third-party tool). When was the definition last changed? (Recent changes may have inflated numbers). Personally check 3 numbers by hand: pull raw data for last month. Calculate overall conversion manually. If your number matches the dashboard within 2%, the data is trustworthy. If it differs by 10%+, there is a measurement problem — this is your first priority to fix. Day 3-5 — Assess funnel health: review 12 months of funnel data looking for: trend: is the business improving? Compare the latest quarter to the same quarter last year. Volatility: how much do metrics fluctuate? High volatility suggests unstable performance or data quality issues. Segmentation: is the blended number hiding segment problems? Check mobile vs desktop, top 3 traffic sources, new vs returning users. Five signals the business is STRONGER than presented: conversion is improving at the cohort level (genuine product improvement). Multiple traffic sources contribute meaningfully (no single-channel dependency). Activation rate exceeds industry benchmarks (strong product-market fit). Churn is declining quarter over quarter (product stickiness increasing). Experiments have a documented track record of wins. Five signals the business is WEAKER than presented: recent cohorts convert worse than older ones (quality declining). One channel drives 50%+ of conversions (fragile, channel-dependent). Conversion improvement came from traffic quality shift, not product (unsustainable). No experimentation culture (improvements are accidental, not systematic). High gross churn masked by expansion revenue (NRR looks good but customers are leaving). Day 5-10 — Identify the #1 opportunity and #1 risk: opportunity: the funnel step with the largest gap between current performance and benchmark. This is where the most value can be created with focused investment. Risk: the metric that could decline most rapidly if current conditions change. Channel dependency, cohort deterioration, competitive threat. Day 10-14 — Present findings to the board: a 3-slide assessment: Slide 1: funnel health is [strong/moderate/concerning] — the headline and evidence. Slide 2: the top opportunity is worth $[X]M ARR — specific, quantified. Slide 3: the top risk is [Y] — and here is how I plan to mitigate it within 90 days'"
    weight: 0.35
    description: "CEO assessment"
  - type: llm_judge
    criteria: "Response handles Request 3 with a PE value creation plan — value-creation: 'Request 3 — PE funnel-based value creation plan (2x valuation in 3 years): current state (year 0): ARR: $12M. Valuation: $50M (approximately 4.2x ARR). Overall conversion: 2.8%. ARPU: $62. NRR: 105%. Monthly visitors: 700K. Target state (year 3): ARR: $36M+ (3x revenue growth → 2x valuation at higher multiple). Valuation: $100M+ (approximately 2.8x ARR multiple expansion from growth + profitability). Value creation levers — the funnel-based playbook: Lever 1 — Conversion optimization (+30% revenue impact): year 1: improve activation from 38% to 45% (the biggest bottleneck). Method: hire an onboarding product team, implement AI-assisted setup. Year 2: improve trial-to-paid from 22% to 28%. Method: pricing restructure, better trial experience. Year 3: improve overall from 3.5% to 4.0% (marginal gains across all steps). Revenue impact: 700K × (4.0% - 2.8%) × $62 × 12 = $6.25M additional ARR. Lever 2 — ARPU expansion (+40% revenue impact): year 1: launch 3-tier pricing ($39/$69/$129). Expected ARPU increase: $62 → $75. Year 2: add usage-based pricing component. ARPU: $75 → $85. Year 3: launch enterprise tier ($200+). ARPU: $85 → $95. Revenue impact from ARPU alone: (($95 - $62) ÷ $62) × current revenue base = approximately $6.4M additional ARR. Lever 3 — Traffic growth (+50% revenue impact): year 1: invest $3M in content marketing and SEO. Traffic: 700K → 900K. Year 2: launch referral program and partnerships. Traffic: 900K → 1.2M. Year 3: international expansion (UK, Germany). Traffic: 1.2M → 1.5M. Revenue impact: (1.5M - 700K) × 4.0% × $95 × 12 = $36.5M total ARR (from all sources at year 3 metrics). But wait — we need to separate this from levers 1-2. Lever 4 — Retention improvement (+25% revenue impact): year 1: reduce monthly churn from 4.5% to 3.5% (customer success investment). Year 2: further reduce to 3.0% (product improvements). Year 3: achieve 2.5% churn (best-in-class). Impact: higher retention compounds the value of every new customer acquired. Combined 3-year projection: year 3 state: monthly visitors: 1.5M. Overall conversion: 4.0%. New customers: 5,000/month. ARPU: $95. Monthly churn: 2.5%. Paying customer base: approximately 30,000. MRR: $2.85M. ARR: $34.2M. Valuation at 3.5x ARR (higher multiple from growth + improving profitability): $120M. Value created: $120M - $50M = $70M (2.4x valuation increase). Investment required: year 1: $2.5M (hiring, infrastructure, marketing). Year 2: $3M (scaling, international). Year 3: $2M (optimization, efficiency). Total investment: $7.5M. ROI on investment: $70M value created ÷ $7.5M invested = 9.3x return. Key risks to the plan: risk 1: conversion improvements may plateau before reaching 4.0%. Mitigation: 3.5% still yields $28M ARR ($98M valuation). Risk 2: competitive pressure may compress ARPU growth. Mitigation: usage-based pricing captures value regardless of competitive pricing. Risk 3: international expansion may convert at lower rates. Mitigation: launch in UK first (similar market dynamics to US). The PE investor's decision: this is a fundable opportunity because: the funnel has documented improvement trajectory (not speculative). Each lever is independently measurable and de-riskable. Even if only 2 of 4 levers succeed, the 2x valuation target is achievable'"
    weight: 0.30
    description: "Value creation"
