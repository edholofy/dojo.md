meta:
  id: funnel-monetization-strategy
  level: 5
  course: funnel-analysis
  type: output
  description: "Funnel monetization strategy — use funnel insights to optimize revenue per user through pricing, packaging, and expansion strategies informed by conversion data"
  tags: [monetization, revenue-optimization, pricing-strategy, expansion, master]

state: {}

trigger: |
  The Chief Revenue Officer says: "We've optimized conversion rates
  for 2 years and they're near benchmark levels. But our revenue per
  visitor is still 40% below the market leader. The issue isn't
  conversion volume — it's monetization. How do I use funnel data to
  maximize revenue per user at every stage of the journey?"

  Task: Design a funnel-based monetization strategy that optimizes
  revenue extraction at each funnel stage without degrading conversion.

assertions:
  - type: llm_judge
    criteria: "Response covers stage-by-stage monetization opportunities — stages: 'Stage-by-stage funnel monetization: current state: RPV (revenue per visitor) = $1.30. Market leader RPV = $2.15. Gap: $0.85 per visitor ($0.85 × 700K monthly visitors = $595K/month unrealized revenue). Stage 1 — Pre-signup monetization (visitors who never sign up): 94.5% of visitors never sign up. Most companies treat these as lost. Monetization opportunity: advertising (if applicable): display ads on high-traffic content pages. Content sponsorships: sponsored tutorials, guides. Data insights (aggregated, anonymized): industry benchmark reports. Estimated RPV contribution: $0.02-$0.05 per non-converting visitor. At 660K non-converting visitors: $13K-$33K/month additional revenue. Stage 2 — Signup to activation monetization (free users exploring): 62% of signups never activate (never experience core value). Monetization approach: freemium with strategic limits. Free tier should deliver enough value to demonstrate the product. But limits should create natural upgrade moments. Limit design: free users get 3 dashboards (enough to see value, not enough for real work). Free users get 7-day data history (enough to see the product, not enough for analysis). Free users get email-only export (functional but inconvenient). Each limit corresponds to a funnel moment where the user discovers they need more. Stage 3 — Activation to paid monetization (the conversion moment): current trial-to-paid: 22% at $62 ARPU. Monetization levers: pricing page optimization: test 3-tier pricing with decoy tier. The most popular plan should be the middle tier (positioned as best value). Annual pricing with monthly price shown (annual $49/month vs monthly $65/month). Usage-based pricing component: base plan + per-unit pricing for additional usage. This captures more value from heavy users while keeping the entry price low. Urgency and scarcity: trial ending in 3 days — save your 15 dashboards and 6 months of data. Not pressure tactics, but genuine value preservation messaging. Stage 4 — Paid to expansion monetization (growing ARPU): current expansion rate: 24%. Expansion opportunities: seat expansion: as teams grow, more users need access. Usage expansion: as users embed the product in workflows, they use more resources. Feature expansion: offer premium features as add-ons. Professional services: implementation, training, custom integrations. Expansion funnel: paid user → power user (uses 80%+ of features) → team growth (invites colleagues) → capacity limit → expansion opportunity → upgrade. Design the product so natural usage growth leads to natural expansion moments'"
    weight: 0.35
    description: "Stages"
  - type: llm_judge
    criteria: "Response covers revenue-per-visitor optimization framework — framework: 'Revenue per visitor (RPV) optimization framework: RPV decomposition: RPV = conversion rate × ARPU × customer lifetime factor. Current: $1.30 = 2.8% × $62 × 0.75 (accounting for churn). Market leader: $2.15 = 3.2% × $95 × 0.71. The gap analysis: component | us | market leader | contribution to RPV gap. Conversion rate: 2.8% | 3.2% | $0.18 of the gap (21%). ARPU: $62 | $95 | $0.55 of the gap (65%). Lifetime factor: 0.75 | 0.71 | -$0.03 (we are actually better here). 65% of the RPV gap comes from ARPU, not conversion. This shifts the strategic priority from conversion optimization to monetization optimization. ARPU improvement strategies: Strategy 1 — Pricing restructure (impact: +$15-25 ARPU): current: one plan at $62/month. Proposed: starter ($39), professional ($69), business ($129). Expected distribution: starter 30%, professional 50%, business 20%. Weighted ARPU: $39 × 0.3 + $69 × 0.5 + $129 × 0.2 = $11.70 + $34.50 + $25.80 = $72/month. RPV impact: $72 vs $62 = +$0.17 per visitor. Risk: the starter tier may cannibalize professional signups (monitor tier migration closely). Strategy 2 — Usage-based pricing layer (impact: +$8-15 ARPU): add a usage component on top of the base plan. Example: base plan includes 1,000 API calls/month. Additional API calls: $0.01 each. Top 20% of users currently use 5,000+ calls but pay the same as light users. Usage-based pricing captures $15+/month from heavy users while keeping the base price accessible. Strategy 3 — Premium add-ons (impact: +$10-20 ARPU): AI-powered insights: $20/month add-on (estimated 15% adoption). Advanced security/compliance: $30/month add-on (estimated 10% adoption). Priority support: $15/month add-on (estimated 8% adoption). Weighted add-on revenue: $20 × 0.15 + $30 × 0.10 + $15 × 0.08 = $3.00 + $3.00 + $1.20 = $7.20 additional ARPU. Combined ARPU target: $62 (current) + $10 (pricing restructure) + $10 (usage-based) + $7 (add-ons) = $89/month. This would close 80% of the ARPU gap to the market leader'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response covers the conversion-monetization tradeoff and implementation — tradeoff: 'The conversion-monetization tradeoff: the fundamental tension: increasing price typically decreases conversion rate. The goal is to increase ARPU MORE than conversion declines, resulting in higher RPV. Example modeling: scenario | ARPU | conversion | RPV | net impact. Current: $62 | 2.8% | $1.30 | baseline. Price increase 15%: $71 | 2.6% (-7%) | $1.38 | +$0.08 ✓ net positive. Price increase 30%: $81 | 2.3% (-18%) | $1.39 | +$0.09 ✓ still positive. Price increase 50%: $93 | 1.9% (-32%) | $1.32 | +$0.02 ✓ barely positive. Price increase 75%: $108 | 1.5% (-46%) | $1.22 | -$0.08 ✗ net negative. The optimal price is around $80-90 where RPV is maximized. Beyond that, conversion drops too steeply. Testing methodology: do NOT test prices in a traditional A/B test (charging different users different prices creates trust issues). Instead: test willingness-to-pay through surveys (Van Westendorp price sensitivity meter). Test price sensitivity through packaging (add features to justify higher price, not just increase price). Test in different markets (price differently in new markets where there is no reference price). Test sequentially (old price for existing customers, new price for new signups, compare conversion rates). Implementation roadmap: month 1 — research: willingness-to-pay survey with 500 customers. Competitive pricing analysis. Usage data analysis (which features are most valued). Month 2 — design: design 3-tier pricing structure based on research. Design usage-based pricing component. Design add-on packages. Month 3 — soft launch: launch new pricing for new customers only (existing customers grandfathered). Monitor conversion rate at each funnel step closely. Track ARPU and RPV daily. Month 4-6 — optimize: A/B test pricing page design and messaging. Adjust tier features based on adoption patterns. Introduce add-ons gradually (one per month). Month 6 — evaluate: compare RPV before and after the pricing change. If RPV improved by $0.30+: success, continue optimizing. If RPV declined: investigate which component failed and iterate. Expected outcome: RPV improvement from $1.30 to $1.75-$1.90 within 6 months. Revenue impact: ($1.80 - $1.30) × 700K visitors = $350K additional monthly revenue = $4.2M additional ARR'"
    weight: 0.30
    description: "Tradeoff"
