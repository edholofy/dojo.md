meta:
  id: funnel-driven-strategy
  level: 5
  course: funnel-analysis
  type: output
  description: "Funnel-driven business strategy — use funnel insights to drive company-level strategic decisions including market expansion, product investment, and competitive positioning"
  tags: [strategy, business-planning, market-expansion, competitive, master]

state: {}

trigger: |
  The CEO asks: "We have strong funnel data across 3 markets and
  2 products. I want to use funnel performance to make strategic
  decisions: which market to expand into next, which product to
  invest in, and how to position against competitors. Show me how
  funnel analysis becomes a strategic tool, not just an optimization
  metric."

  Task: Demonstrate how funnel analysis drives company-level
  strategic decisions across market expansion, product investment,
  and competitive positioning.

assertions:
  - type: llm_judge
    criteria: "Response covers funnel-driven market expansion strategy — expansion: 'Funnel-driven market expansion strategy: using funnel data to choose the next market: current market performance: market | traffic | overall conversion | ARPU | revenue/month. US (mature): 500K | 2.8% | $65 | $910K. UK (growing): 150K | 2.2% | $55 | $181K. Germany (early): 50K | 1.4% | $50 | $35K. Step-level analysis by market: step | US | UK | Germany. Visit → signup: 5.5% | 4.8% | 3.0%. Signup → activation: 38% | 35% | 28%. Activation → paid: 22% | 20% | 18%. Paid → expansion: 24% | 18% | 12%. Market expansion decision framework: Option A — Expand to France (new market): estimated initial traffic: 30K/month (based on market size and brand awareness). Expected conversion: 1.0-1.5% (similar to early Germany). Expected ARPU: $45. Projected revenue: 30K × 1.25% × $45 = $16,875/month. Time to mature: 18-24 months to reach Germany's current level. Option B — Double down on UK (existing market, growth stage): current traffic can be increased to 300K with marketing investment. Conversion can be improved from 2.2% to 2.6% (close gap with US). Expected revenue: 300K × 2.6% × $58 = $452K/month (2.5x current). Time to impact: 6-12 months. Option C — Optimize Germany (existing market, early stage): current conversion (1.4%) is far below US (2.8%) — room for 2x improvement. Focus on localization, local payment methods, and German-language onboarding. Expected revenue: 80K × 2.2% × $52 = $91K/month (2.6x current). Time to impact: 6-9 months. Funnel-based recommendation: invest in UK (option B) first — the funnel data shows UK conversion rates are close to US levels, indicating product-market fit exists. The gap is primarily in traffic (market awareness) and expansion (upselling), both addressable with marketing and product investment. Germany second — conversion gap analysis shows the issue is top-of-funnel (signup rate: 3% vs US 5.5%), likely due to localization gaps rather than product-market fit problems. Defer France — entering a new market is highest risk, lowest near-term return, and diverts resources from proven markets'"
    weight: 0.35
    description: "Expansion"
  - type: llm_judge
    criteria: "Response covers funnel-driven product investment decisions — investment: 'Funnel-driven product investment decisions: using funnel data to allocate product development resources: Product A (Analytics — core product): funnel health: strong (2.8% overall, improving 0.2pp/quarter). Optimization opportunities: incremental (most steps near benchmark). Investment need: maintenance + mobile optimization. Product B (Reporting — add-on): funnel health: moderate (18% cross-sell conversion from Analytics users). Optimization opportunities: significant (activation rate: 25%, benchmark: 40%). Investment need: high — onboarding redesign could unlock substantial revenue. Investment decision matrix: product | funnel maturity | improvement potential | revenue impact per 1pp improvement | recommended investment. Analytics: mature | low (1pp = $14K/month) | $14K | maintenance ($200K/year). Reporting: growing | high (1pp = $8K/month, but 15pp achievable) | $120K potential | heavy ($500K/year). The counterintuitive insight: Analytics generates more revenue today, but Reporting has 8x more improvement potential. Shifting investment from Analytics optimization to Reporting activation would generate more total revenue. Funnel-based R&D allocation: map planned features to their funnel impact: feature | development cost | funnel step affected | expected improvement | revenue impact | ROI. Mobile redesign: $150K | visit→signup (mobile) | +2pp | $180K/year | 1.2x. AI onboarding: $200K | signup→activation | +5pp | $360K/year | 1.8x. Express checkout: $100K | checkout→purchase | +3pp | $270K/year | 2.7x. API integration: $300K | activation→expansion | +2pp | $480K/year | 1.6x. Ranking by funnel ROI: express checkout (2.7x) → AI onboarding (1.8x) → API integration (1.6x) → mobile redesign (1.2x). This approach transforms product planning from opinion-based to data-driven. Every feature investment is evaluated by its expected funnel impact and revenue ROI'"
    weight: 0.35
    description: "Investment"
  - type: llm_judge
    criteria: "Response covers funnel-driven competitive positioning — competitive: 'Funnel-driven competitive positioning: estimating competitor funnel performance: competitors do not share their funnel data, but you can estimate it from public signals: traffic: SimilarWeb, SEMrush estimates. Conversion proxies: public financial filings (revenue ÷ estimated traffic × ARPU). Product quality: product reviews, G2/Capterra scores, feature comparison. Pricing: publicly available pricing pages. Estimated competitive funnel comparison: metric | our company | competitor A | competitor B. Monthly traffic: 700K | 1.2M | 400K. Estimated conversion: 2.5% | 1.8% | 3.2%. ARPU: $62 | $45 | $95. Revenue efficiency: $1.09M | $972K | $1.22M. Key competitive insights from funnel analysis: 1. Competitor A has 70% more traffic but lower conversion. They are winning on awareness but losing on product experience. Competitive strategy: invest in conversion optimization, not traffic acquisition. Let them spend on marketing while we convert better. 2. Competitor B has higher conversion AND higher ARPU. They likely serve enterprise customers better (higher price, better onboarding). Competitive strategy: if we want to compete for enterprise, study their onboarding and pricing. If we want to own SMB, our current pricing and conversion are advantages. Positioning the company based on funnel strengths: our funnel advantage is middle-of-funnel (signup → activation → paid). This means: our product experience is strong (users who try it, convert). Our weakness is top-of-funnel (traffic and awareness). Strategic positioning: the product that converts — marketing message should emphasize ease of use, fast time-to-value, and user satisfaction. Competitive response to funnel threats: if competitor A's traffic keeps growing, they will eventually improve conversion too (more data, more budget). Pre-emptive move: invest in top-of-funnel before they close the conversion gap. If competitor B moves downmarket with a cheaper tier, they threaten our SMB base. Defensive move: strengthen our activation experience (our competitive moat) and consider a free tier to capture users before competitor B does'"
    weight: 0.30
    description: "Competitive"
