meta:
  id: funnel-market-timing
  level: 5
  course: funnel-analysis
  type: output
  description: "Funnel market timing — use funnel data as leading indicators for market shifts, economic changes, and competitive dynamics"
  tags: [market-timing, leading-indicators, economic-signals, competitive, master]

state: {}

trigger: |
  The Chief Strategy Officer says: "In 2023, our funnel metrics started
  declining 3 months before we saw revenue impact. By the time we
  reacted, we'd lost 6 months of growth. I want to use funnel data
  as an early warning system for market shifts — not just product
  problems. How can funnel patterns predict macroeconomic changes,
  competitive threats, and market timing opportunities?"

  Task: Design a framework for using funnel data as leading indicators
  for market-level insights and strategic timing decisions.

assertions:
  - type: llm_judge
    criteria: "Response covers funnel data as macroeconomic leading indicators — macro: 'Funnel data as macroeconomic leading indicators: why funnel data predicts market changes: funnel metrics reflect real user behavior in real-time. Economic indicators (GDP, employment, consumer confidence) are published monthly or quarterly with delays. Funnel data captures economic sentiment changes weeks before official data. Leading indicator patterns: Pattern 1 — Budget tightening (early recession signal): funnel signal: trial-to-paid conversion drops 5pp over 4 weeks while activation rate stays constant. Interpretation: users still find value (activation unchanged) but decide not to pay (budget constraint). This predicts: departmental budget freezes, longer procurement cycles, increased price sensitivity. Timeline: this signal appears 2-3 months before revenue impact and 4-6 months before macroeconomic indicators confirm a slowdown. Response: pre-position for price sensitivity. Launch annual billing discounts (lock in revenue). Prepare a more affordable tier. Emphasize ROI and cost-saving messaging. Pattern 2 — Market confidence recovery: funnel signal: top-of-funnel traffic increases 15% over 6 weeks, driven by organic search for solution-category keywords. Interpretation: companies are actively searching for solutions again (budget unfreezing). This predicts: increased spending, easier sales conversations, larger deal sizes. Timeline: this signal appears 2-3 months before competitors recognize the recovery. Response: invest aggressively in marketing before competitors react. Lock in customers during the early recovery when competition for attention is lower. Pattern 3 — Industry-specific disruption: funnel signal: sudden spike in signups from a specific industry vertical (e.g., healthcare signups triple in 2 weeks). Interpretation: a regulatory change, competitor shutdown, or industry event is driving urgency. Response: create industry-specific landing pages and case studies. Brief the sales team on the industry dynamics. Consider temporary industry-specific pricing or features'"
    weight: 0.35
    description: "Macro"
  - type: llm_judge
    criteria: "Response covers competitive threat detection from funnel signals — competitive: 'Competitive threat detection through funnel signals: Signal 1 — Win rate decline by segment: funnel data: enterprise trial-to-paid conversion drops from 25% to 18% over 2 quarters while SMB stays at 22%. Surface analysis: enterprise conversion is declining. Deeper analysis: exit surveys reveal a competitor launched enterprise features. Competitive implication: the competitor is specifically targeting enterprise customers. If unaddressed, they will erode the highest-LTV segment. Response timeline: 0-3 months (immediate): accelerate enterprise feature roadmap. 3-6 months: launch competitive displacement program. 6-12 months: establish enterprise customer advisory board for product direction. Signal 2 — Traffic source disruption: funnel data: paid search CPC increases 40% over 3 months with no change in bid strategy. Surface analysis: acquisition costs are rising. Deeper analysis: a well-funded competitor is bidding aggressively on your keywords. Competitive implication: they are trying to outspend you for top-of-funnel visibility. Response: do not match their spending — they may have more capital. Instead: double down on organic content (lower CAC, not biddable). Strengthen the product (improve conversion to compensate for fewer visitors). Invest in referral programs (competitors cannot outbid word-of-mouth). Signal 3 — Funnel quality shift: funnel data: signup rate increases 20% but activation rate drops 15% simultaneously. Surface analysis: mixed signals — more signups but lower quality. Deeper analysis: a competitor shut down or degraded their free tier. Their users are flooding to your product but are not well-matched (different expectations). Competitive implication: you are receiving refugee users from a competitor's decision. These users may churn faster but represent an acquisition opportunity. Response: create targeted onboarding for users coming from competitor X. Customize messaging: coming from [competitor]? Here is how to migrate your data. Track this cohort separately — their retention pattern will differ from organic signups. Signal 4 — Competitive displacement pattern: funnel data: customers who previously churned are reactivating at 2x the normal rate. Deeper analysis: a competitor raised prices or degraded features, pushing their customers back to you. Competitive implication: the competitor is under pressure. Response: create a competitive comeback program. Offer win-back discounts and priority onboarding. Capture market share while the competitor struggles'"
    weight: 0.35
    description: "Competitive"
  - type: llm_judge
    criteria: "Response covers strategic timing decisions based on funnel intelligence — timing: 'Strategic timing decisions from funnel intelligence: Decision 1 — When to expand into a new market: funnel signal: organic traffic from an untapped market exceeds 5% of total traffic AND converts at 80% of the primary market rate. Interpretation: there is natural demand in this market. Users are finding the product organically and successfully using it. The 80% conversion rate indicates reasonable product-market fit without localization. Timing: expand NOW while organic momentum exists. If you wait, a local competitor may capture the demand. Decision 2 — When to raise prices: funnel signal: trial-to-paid conversion is stable or increasing AND expansion rate is growing AND churn is declining. Interpretation: users are getting more value from the product. They are converting at the same or higher rates, expanding usage, and staying longer. This is the ideal time to raise prices — value perception is strong enough to absorb a price increase. Bad timing signals: raising prices when activation is declining (users are already questioning value). Raising prices during a competitive threat (gives customers a reason to switch). Decision 3 — When to launch a new product: funnel signal: 15% of support tickets or feature requests mention a capability your product does not offer. These users complete the funnel but 30% churn within 6 months citing the missing capability. Interpretation: there is a validated, quantified demand for the new capability. Users are converting despite the gap, but leaving because of it. Timing: launch the product before the churn pattern becomes entrenched. If users learn to solve the problem with a competitor's tool, they will not switch back. Decision 4 — When to pivot strategy: funnel signal: overall conversion is improving but LTV is declining quarter over quarter. Each new cohort converts better but retains worse. Interpretation: you are getting better at attracting and converting users, but the product is not delivering lasting value. Growth is being fueled by acquisition efficiency, not product strength. This is a dangerous pattern — revenue looks good now but will plateau and decline. Timing: pivot product strategy NOW. Shift investment from acquisition optimization to product depth and retention. This is painful because conversion metrics look great, but the LTV signal is the truth. Building the funnel intelligence system: 1. Define 10-15 funnel-based leading indicators (macro, competitive, strategic). 2. Set thresholds and monitoring cadence for each. 3. Assign owners responsible for interpreting and escalating signals. 4. Present quarterly funnel intelligence brief to the executive team. 5. Integrate funnel signals into the strategic planning process. The goal: funnel data should inform not just what we optimize this sprint, but what we do this year. It should be as central to strategic planning as financial projections'"
    weight: 0.30
    description: "Timing"
