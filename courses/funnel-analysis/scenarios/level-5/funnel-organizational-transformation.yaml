meta:
  id: funnel-organizational-transformation
  level: 5
  course: funnel-analysis
  type: output
  description: "Funnel organizational transformation — restructure teams, processes, and incentives around funnel stages to maximize conversion and revenue at scale"
  tags: [organizational, restructuring, incentives, cross-functional, master]

state: {}

trigger: |
  The CEO says: "We're reorganizing the company around the customer
  journey instead of traditional functions. Instead of having
  marketing, product, and engineering as separate silos, I want teams
  organized around funnel stages: an acquisition team, an activation
  team, a monetization team, and a retention team. How do I structure
  this? What are the risks?"

  Task: Design a funnel-stage-based organizational structure including
  team design, metrics, incentives, cross-stage coordination, and
  risks to mitigate.

assertions:
  - type: llm_judge
    criteria: "Response covers the funnel-stage organizational design — design: 'Funnel-stage organizational design: team structure: Team 1 — Acquisition (funnel entry → signup): mission: bring qualified visitors to the product and convert them to signups. Composition: growth marketer (paid channels), content marketer, SEO specialist, landing page designer, growth engineer, data analyst. Owns: website, landing pages, ad campaigns, content, SEO, referral program. Primary metrics: cost per acquisition (CPA), signup volume, traffic quality score. Target: 12,000 signups/month at $8 CPA. Team 2 — Activation (signup → first value moment): mission: help new users experience the core product value as fast as possible. Composition: product manager, onboarding designer, 2 product engineers, customer success specialist, data analyst. Owns: onboarding flow, first-use experience, welcome emails, activation milestones. Primary metrics: activation rate (target: 42%), time-to-activation (target: under 2 days), activation quality score. Team 3 — Monetization (activation → paid conversion + expansion): mission: convert activated users to paying customers and expand their usage. Composition: product manager, pricing analyst, 2 engineers, sales development rep (for enterprise), data analyst. Owns: pricing page, trial experience, upgrade prompts, expansion offers, enterprise sales handoff. Primary metrics: trial-to-paid rate (target: 25%), ARPU (target: $75), expansion rate (target: 28%). Team 4 — Retention (paid → ongoing engagement → renewal): mission: keep paying customers engaged, successful, and loyal. Composition: product manager, customer success manager, 2 engineers, support specialist, data analyst. Owns: customer health scoring, re-engagement campaigns, feature adoption, churn prediction, support experience. Primary metrics: net revenue retention (target: 115%), monthly churn (target: under 3%), NPS (target: 50+). Cross-cutting team — Platform: provides shared infrastructure (data pipeline, experimentation platform, analytics tools). Does NOT own funnel metrics but enables all teams to measure and optimize'"
    weight: 0.35
    description: "Design"
  - type: llm_judge
    criteria: "Response covers incentives, handoffs, and coordination — coordination: 'Incentives and coordination: incentive structure: each team is primarily incentivized on their stage metrics. But to prevent sub-optimization, include shared metrics. Team | primary metric (70% weight) | shared metric (30% weight). Acquisition: signups at target CPA | overall RPV. Activation: activation rate | overall RPV. Monetization: ARPU + trial conversion | overall RPV. Retention: NRR + churn | overall RPV. Revenue per visitor (RPV) is the shared metric because it captures the ENTIRE funnel. If one team optimizes their stage at the expense of another, RPV will decline, affecting everyone's compensation. Handoff design — the critical coordination points: Handoff 1 — Acquisition → Activation (the lead quality handoff): problem: Acquisition team incentivized to maximize signups could attract low-quality users. These users inflate signup numbers but never activate, wasting Activation team's resources. Solution: define a lead quality score that Acquisition must maintain. Acquisition is measured on signups × quality score, not raw signups. Quality score = percentage of signups who take at least one meaningful action within 24 hours. If quality score drops below 60%, Acquisition must investigate traffic sources. Handoff 2 — Activation → Monetization (the readiness handoff): problem: Activation team could declare users activated prematurely to inflate their numbers. Users who are activated but not truly ready for conversion waste Monetization effort. Solution: activation metric must be validated predictive — activated users should convert to paid at 3x+ the rate of non-activated users. If the conversion lift ratio drops below 3x, the activation metric needs redefinition. Handoff 3 — Monetization → Retention (the customer handoff): problem: Monetization team could use aggressive discounts or misleading offers to boost conversion. These customers churn quickly, hurting Retention metrics. Solution: Monetization team is penalized for 30-day churn rate of customers they converted. If more than 15% of new paid customers churn within 30 days, this flags a conversion quality issue. Cross-stage coordination mechanisms: weekly funnel review: all 4 team leads meet for 30 minutes. Review end-to-end funnel metrics. Discuss handoff quality. Identify cross-stage experiments. Monthly strategy alignment: teams present their quarterly plans. Identify dependencies and conflicts. Allocate shared resources (engineering, design). Quarterly rebalancing: if one stage is over-resourced relative to its improvement potential, shift resources. If Acquisition is near benchmark but Activation has significant room for improvement, move a growth engineer from Acquisition to Activation'"
    weight: 0.35
    description: "Coordination"
  - type: llm_judge
    criteria: "Response covers risks and mitigation strategies — risks: 'Risks of funnel-stage organization and mitigation: Risk 1 — Silo creation (trading functional silos for stage silos): danger: teams optimize their stage independently, creating handoff friction. Acquisition pushes volume, Activation cannot handle the throughput, quality drops. Mitigation: shared RPV metric ensures no team benefits from hurting another. Mandatory cross-stage rotation: engineers spend 1 quarter per year on a different stage team. Joint OKRs: each team has at least 1 OKR shared with the adjacent team. Risk 2 — Career path confusion: danger: in a traditional structure, engineers have a clear career path within engineering. In stage-based teams, the growth engineer on the Acquisition team is isolated from other engineers. Mitigation: maintain functional communities of practice (engineering guild, design guild, analytics guild). Career laddering remains functional (junior → senior → staff engineer). Day-to-day work is with the stage team, professional development is with the functional guild. Risk 3 — Duplication of effort: danger: all 4 teams need engineering, design, and analytics resources. This could lead to 4x the infrastructure, inconsistent standards, and redundant tools. Mitigation: the Platform team provides shared infrastructure and standards. Stage teams consume shared tools (experimentation platform, analytics, A/B testing). Code review and architectural decisions involve the engineering guild. Risk 4 — Metric gaming: danger: teams manipulate metrics to look good. Acquisition counts bot signups. Activation lowers the bar for activation. Monetization offers unsustainable discounts. Mitigation: metric certification (all team metrics audited quarterly by data team). Upstream-downstream validation (each team validates the quality of what they receive from the upstream team). Business outcome alignment (ultimately, only revenue growth matters). Risk 5 — Resistance to change: danger: existing team leaders lose authority. Engineers resist being embedded in non-engineering teams. Stakeholders are confused about who owns what. Mitigation: phased implementation over 6 months (start with 1 stage team as a pilot). Involve existing leaders in designing the new structure. Communicate the WHY clearly: this structure makes every team directly accountable for a part of the customer journey. Celebrate early wins loudly to build momentum. Decision framework for the CEO: implement this structure if: the company is large enough (100+ people) to staff each stage team fully. Funnel optimization is the primary growth lever. Current functional silos are clearly blocking cross-functional collaboration. Do NOT implement if: the company is small (under 50 people) — overhead exceeds benefit. The product is not yet at product-market fit (too early to optimize the funnel). Engineering talent strongly resists the reorganization (culture must be ready)'"
    weight: 0.30
    description: "Risks"
