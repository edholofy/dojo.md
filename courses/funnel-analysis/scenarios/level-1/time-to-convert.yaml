meta:
  id: time-to-convert
  level: 1
  course: funnel-analysis
  type: output
  description: "Measure time-to-convert — analyze how long users take to move through the funnel, identify bottlenecks, and understand the relationship between speed and conversion"
  tags: [time-to-convert, velocity, bottleneck, speed, beginner]

state: {}

trigger: |
  The PM asks: "I know our conversion rates, but I don't know how
  LONG it takes users to convert. Some buy in 5 minutes, others take
  a week. Does speed matter? How do I measure and use time-to-convert
  data?"

  Task: Explain how to measure time-to-convert in funnels, identify
  time-based bottlenecks, and use timing data to improve conversion.

assertions:
  - type: llm_judge
    criteria: "Response explains time-to-convert measurement — measurement: 'Measuring time-to-convert: time-to-convert (TTC) is the elapsed time between a user entering the funnel and completing the desired action. Overall TTC: time from first visit to purchase. Step-by-step TTC: time spent at each funnel stage. Example measurements for an e-commerce funnel: overall TTC distribution: 30% convert within 1 session (same day). 25% convert within 2-3 days. 20% convert within 4-7 days. 15% convert within 8-30 days. 10% convert after 30+ days. Median TTC: 3 days. Average TTC: 8 days (skewed by slow converters). Step-by-step TTC: homepage to product page: median 30 seconds (fast — users know what they want). Product page to add to cart: median 4 minutes (users read reviews, compare sizes). Add to cart to checkout: median 2 hours (users often leave and return). Checkout to purchase: median 3 minutes (fast — once committed, they finish). Key finding: the cart-to-checkout step has a 2-hour median TTC. This means most cart additions do NOT lead to immediate checkout — users abandon and some return later. This is the time-based bottleneck. Why median, not average? Average TTC is skewed by outliers (users who take weeks). A user who converts after 60 days inflates the average but is not representative. Median (50th percentile) is more useful for understanding typical behavior. Also track: 75th percentile (the slow quarter) and 90th percentile (the slowest 10%). Segmenting TTC: by device: mobile median 1 day, desktop median 4 days. By channel: direct traffic 2 hours, paid social 5 days. By product price: under $50 = 1 day, over $200 = 12 days. Higher-price purchases take longer — users need more consideration time'"
    weight: 0.35
    description: "Measurement"
  - type: llm_judge
    criteria: "Response covers the speed-conversion relationship — relationship: 'The relationship between speed and conversion: faster funnels convert better — but the relationship is not linear. Data analysis: group users by how quickly they moved from step 1 to step 2. Under 1 minute: 8% eventually purchase. 1-5 minutes: 12% purchase. 5-30 minutes: 6% purchase. 30+ minutes (came back later): 3% purchase. Users who engage quickly with the product are more likely to convert. Those who linger may be confused, distracted, or uncommitted. But correlation is not causation: making the funnel faster does not automatically make users convert more. Users who convert quickly may have higher intent to begin with. However, REMOVING friction that slows users down does improve conversion. Example: the email verification step takes 3 minutes median (users must leave the app, find the email, click the link). During that 3 minutes: 35% of users never return. Solution: implement in-app verification (paste code instead of clicking email link). Result: verification time drops to 30 seconds, drop-off rate decreases from 35% to 12%. The speed improvement removed a friction point that caused users to leave the funnel. Time windows and conversion: SaaS signup funnel — conversion rate by time since signup: converted within 1 hour: 65% still active at month 3. Converted within 1 day: 45% still active at month 3. Converted within 7 days: 30% still active at month 3. Users who activate quickly also retain better — speed is a signal of product-market fit and user motivation'"
    weight: 0.35
    description: "Relationship"
  - type: llm_judge
    criteria: "Response covers using TTC data for optimization — optimization: 'Using time-to-convert data for optimization: Optimization 1 — Identify time-based bottlenecks: list each funnel step with its median TTC. Steps with TTC significantly higher than expected are bottlenecks. If checkout takes 3 minutes but registration takes 8 minutes: registration is the bottleneck. Investigate: is the form too long? Are there confusing fields? Is email verification required? Optimization 2 — Set conversion windows: define how long after funnel entry a conversion counts. For a same-session funnel (e-commerce impulse purchase): 30-minute window. For a consideration purchase (B2B software): 30-day window. For an enterprise sale: 90-day window. Conversions outside the window may be attributed to a different funnel entry. Optimization 3 — Design time-sensitive interventions: cart abandonment (users who add to cart but do not checkout within 2 hours): trigger an email reminder at the 2-hour mark. Include a gentle nudge: your items are still in your cart. Maybe add free shipping if they return within 24 hours. Result: recovering 5-10% of abandoned carts. Signup abandonment (users who start signup but do not complete within 10 minutes): trigger an in-app prompt: need help completing your signup? Offer live chat or simplified form. Trial expiration (users on a 14-day trial who have not activated by day 7): send a targeted email: you are halfway through your trial. Here is a quick guide to get started. Users who activate in the second week of a trial convert at half the rate of users who activate in the first week. Optimization 4 — Report TTC trends over time: track median TTC for each step monthly. If TTC is increasing, the step is getting more friction (possibly from a product change). If TTC is decreasing, optimizations are working. Goal: reduce overall TTC while maintaining or improving conversion rate'"
    weight: 0.30
    description: "Optimization"
