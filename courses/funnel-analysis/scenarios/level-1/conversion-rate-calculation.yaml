meta:
  id: conversion-rate-calculation
  level: 1
  course: funnel-analysis
  type: output
  description: "Calculate conversion rates correctly — understand step-by-step vs overall conversion, absolute vs relative rates, and avoid common calculation mistakes"
  tags: [conversion-rate, calculation, step-by-step, overall, beginner]

state: {}

trigger: |
  A PM asks: "I see two numbers for our funnel: a 4% overall
  conversion rate and a 67% checkout conversion rate. These seem
  contradictory. How do conversion rates work in a funnel? What's
  the right way to calculate them?"

  Task: Explain how to calculate conversion rates in a funnel,
  including step-by-step rates, overall rates, and the relationship
  between them.

assertions:
  - type: llm_judge
    criteria: "Response explains step-by-step and overall conversion rates — calculation: 'Conversion rate calculation in funnels: two types of conversion rates: 1. Step-by-step (stage-to-stage) conversion rate: the percentage of users who move from one step to the next. Formula: (users at step N+1) / (users at step N) × 100%. Example funnel: homepage (10,000) → product page (4,000) → add to cart (1,200) → checkout (800) → purchase (400). Step 1→2: 4,000/10,000 = 40%. Step 2→3: 1,200/4,000 = 30%. Step 3→4: 800/1,200 = 67%. Step 4→5: 400/800 = 50%. 2. Overall (end-to-end) conversion rate: the percentage of users who complete the entire funnel from the first step to the last. Formula: (users at final step) / (users at first step) × 100%. Overall: 400/10,000 = 4%. Both numbers are correct — they measure different things. The 4% answers: what fraction of all visitors make a purchase? The 67% answers: what fraction of users who add to cart proceed to checkout? Mathematical relationship: overall rate = product of all step rates. 40% × 30% × 67% × 50% = 4.0%. This means improving any single step rate improves the overall rate. If step 2→3 improves from 30% to 35%: new overall = 40% × 35% × 67% × 50% = 4.7% — an 18% improvement in overall conversion from a 5pp improvement at one step. Drop-off rate: the complement of the step conversion rate. If step 1→2 conversion is 40%, the drop-off is 60%. Drop-off tells you how many users you LOST at each step'"
    weight: 0.35
    description: "Calculation"
  - type: llm_judge
    criteria: "Response covers absolute vs relative improvements and common mistakes — mistakes: 'Absolute vs relative conversion improvements: the PM hears the checkout rate improved from 50% to 55%. Absolute improvement: +5 percentage points (50% → 55%). Relative improvement: +10% (5/50 = 10% relative increase). These are very different claims. Always clarify which one you mean. A 5pp absolute improvement at the checkout step: old overall: 40% × 30% × 67% × 50% = 4.0%. New overall: 40% × 30% × 67% × 55% = 4.4%. Revenue impact: +10% more purchases. A 5pp absolute improvement at the product page step: old overall: 40% × 30% × 67% × 50% = 4.0%. New overall: 45% × 30% × 67% × 50% = 4.5%. Revenue impact: +12.5% more purchases. The same 5pp improvement has different revenue impact depending on WHERE in the funnel it occurs. Common calculation mistakes: Mistake 1 — Using total visitors as denominator for every step: wrong: checkout conversion = 800/10,000 = 8%. Right: checkout conversion = 800/1,200 = 67% (denominator is users who reached the previous step). Mistake 2 — Counting users who skip steps: if a user goes directly from homepage to checkout (skipping product page and cart): they should still be counted in the funnel. Decide: count them at the step they entered, or require sequential progression. Document your methodology. Mistake 3 — Double-counting repeat visits: a user who visits the homepage 3 times and purchases once. If you count visits: 3 homepage visits, 1 purchase = 33% conversion. If you count unique users: 1 user, 1 purchase = 100% conversion. Standard practice: count unique users per funnel session or per time period (daily, weekly). Mistake 4 — Ignoring the time window: a user who visits Monday and purchases Friday. If your funnel window is same-day, this purchase is not attributed to the Monday funnel entry. Define the conversion window: same session, same day, 7 days, or 30 days'"
    weight: 0.35
    description: "Mistakes"
  - type: llm_judge
    criteria: "Response covers interpreting conversion rates for decision-making — interpretation: 'Interpreting conversion rates for decisions: what is a good conversion rate? There is no universal answer — it depends on the product, industry, and funnel stage. E-commerce benchmarks: overall visitor-to-purchase: 2-4%. Cart-to-purchase: 40-60%. Product page-to-cart: 5-15%. SaaS benchmarks: visitor-to-signup: 2-5%. Signup-to-activation: 20-40%. Trial-to-paid: 10-25%. B2B benchmarks: visitor-to-lead: 1-3%. Lead-to-demo: 10-20%. Demo-to-close: 20-40%. Use benchmarks as directional guides, not targets. Your product's funnel is unique. Prioritization framework using conversion rates: calculate the revenue impact of a 10% relative improvement at each step: Step 1→2 (40% → 44%): 400 more users reach step 2. Projected additional purchases: 400 × 30% × 67% × 50% = 40. Step 2→3 (30% → 33%): 120 more users reach step 3. Projected additional purchases: 120 × 67% × 50% = 40. Step 3→4 (67% → 74%): 84 more users reach step 4. Projected additional purchases: 84 × 50% = 42. Step 4→5 (50% → 55%): projected additional purchases: 40. Interesting: a 10% relative improvement at any step produces roughly 40 additional purchases in this funnel. This means ALL steps are equally important for a percentage-based improvement. But some steps may be EASIER to improve than others. The PM should prioritize based on: impact (all roughly equal here) × ease of improvement × confidence in the fix. When conversion rates are misleading: a 90% step conversion rate might seem healthy — but if the overall funnel has 6 steps each at 90%, overall conversion is only 53% (0.9^6 = 0.53). Even small inefficiencies compound across many steps'"
    weight: 0.30
    description: "Interpretation"
