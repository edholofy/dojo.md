meta:
  id: drop-off-analysis
  level: 1
  course: funnel-analysis
  type: output
  description: "Analyze funnel drop-offs — identify where users leave, diagnose why they leave, and prioritize which drop-off points to fix first"
  tags: [drop-off, abandonment, diagnosis, prioritization, beginner]

state: {}

trigger: |
  The Growth Lead says: "I can see our funnel conversion rates but
  I need to understand the DROP-OFFS. Where are we losing the most
  users? Why are they leaving? And which drop-off should I fix first?"

  Task: Explain how to analyze funnel drop-offs, diagnose the causes,
  and prioritize fixes.

assertions:
  - type: llm_judge
    criteria: "Response explains drop-off identification and measurement — identification: 'Drop-off analysis — identifying where users leave: drop-off rate at each step = 1 - step conversion rate. Or: (users at step N - users at step N+1) / users at step N. E-commerce funnel drop-offs: homepage (10,000) → product page (4,000): 6,000 dropped (60%). Product page → add to cart (1,200): 2,800 dropped (70%). Add to cart → checkout (800): 400 dropped (33%). Checkout → purchase (400): 400 dropped (50%). Absolute drop-off (users lost): step 1→2 loses 6,000 users (largest absolute loss). Step 2→3 loses 2,800 users. Step 3→4 loses 400 users (smallest absolute loss). Step 4→5 loses 400 users. Relative drop-off (percentage lost): step 2→3 loses 70% of entering users (highest relative drop-off). Step 1→2 loses 60%. Step 4→5 loses 50%. Step 3→4 loses 33% (lowest relative drop-off). Which metric matters more? For high-traffic steps (top of funnel): absolute drop-off matters most because each user is worth less (they have not committed yet) but there are many of them. For low-traffic steps (bottom of funnel): relative drop-off matters most because each user is highly valuable (they have invested time and intent). The leaky bucket metaphor: think of each funnel step as a bucket with holes. The top bucket has the most water flowing in — even small holes lose a lot. The bottom bucket has less water but each drop is more valuable — so even small holes must be plugged'"
    weight: 0.35
    description: "Identification"
  - type: llm_judge
    criteria: "Response covers diagnosing drop-off causes — diagnosis: 'Diagnosing why users drop off at each step: Step 1→2 (homepage to product page — 60% drop-off): possible causes: users landed on the wrong page (misleading ads or SEO). Homepage does not clearly show what the product offers. Navigation is confusing — users cannot find what they want. Page loads slowly (53% of users leave if page takes more than 3 seconds). Diagnostic methods: check bounce rate by traffic source (are certain channels worse?). Run a heatmap analysis (where do users click? where do they not?). Check page load time (is it above 3 seconds?). Review the homepage with fresh eyes — is the value proposition clear? Step 2→3 (product page to add to cart — 70% drop-off): possible causes: price too high (price shock after clicking). Product information insufficient (missing sizes, reviews, details). No clear call to action (add to cart button is not prominent). Users are browsing, not ready to buy (comparison shopping). Diagnostic methods: exit survey on the product page (why are you leaving?). Compare drop-off rate for products with reviews vs without (reviews reduce uncertainty). Check if users scroll to the add-to-cart button (maybe it is below the fold). Step 3→4 (cart to checkout — 33% drop-off): possible causes: unexpected shipping costs appear at checkout. Required account creation (forcing signup before purchase). Checkout form is too long. Payment method not available. Diagnostic methods: check if drop-off spikes when shipping costs are shown. A/B test guest checkout vs required signup. Track form field abandonment (which field causes users to leave?). Step 4→5 (checkout to purchase — 50% drop-off): possible causes: payment failure (credit card declined). Security concerns (site does not look trustworthy). User was just checking the total price (not ready to commit). Slow payment processing. Diagnostic methods: check payment error logs. Add trust badges and security indicators. Simplify the final step (reduce to one click)'"
    weight: 0.35
    description: "Diagnosis"
  - type: llm_judge
    criteria: "Response covers prioritizing which drop-offs to fix — prioritization: 'Prioritizing which drop-offs to fix first: the ICE framework for funnel optimization: I = Impact: how many additional conversions will fixing this drop-off generate? C = Confidence: how certain are we that we can fix it? E = Ease: how quickly and cheaply can we implement the fix? Score each drop-off opportunity on a 1-10 scale: Step 1→2 (homepage → product page): impact: 8 (6,000 users, even small improvement is big). Confidence: 5 (many possible causes, diagnosis needed). Ease: 6 (homepage redesign is moderate effort). ICE score: 8×5×6 = 240. Step 2→3 (product page → cart): impact: 7 (2,800 users). Confidence: 7 (adding reviews and better CTAs are proven tactics). Ease: 8 (relatively easy to implement). ICE score: 7×7×8 = 392 (highest priority). Step 3→4 (cart → checkout): impact: 4 (400 users, small absolute number). Confidence: 9 (removing required signup is a known fix). Ease: 9 (simple technical change). ICE score: 4×9×9 = 324. Step 4→5 (checkout → purchase): impact: 5 (400 users, but high value). Confidence: 6 (payment issues vary). Ease: 5 (payment infrastructure changes are complex). ICE score: 5×6×5 = 150 (lowest priority). Priority order: 1. Product page → cart (ICE 392): add reviews, improve CTAs, better product information. 2. Cart → checkout (ICE 324): add guest checkout, remove friction. 3. Homepage → product page (ICE 240): improve navigation, speed up page load. 4. Checkout → purchase (ICE 150): add trust badges, fix payment errors. Quick wins vs strategic investments: quick wins (implement in 1-2 weeks): guest checkout, trust badges, page speed optimization. These are low-risk, high-confidence improvements. Strategic investments (implement in 1-3 months): homepage redesign, product page overhaul, personalized recommendations. These are higher-impact but require more effort and testing'"
    weight: 0.30
    description: "Prioritization"
