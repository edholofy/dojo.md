meta:
  id: funnel-visualization
  level: 1
  course: funnel-analysis
  type: output
  description: "Visualize funnels effectively — choose the right chart type, build funnel diagrams, and communicate funnel insights to different audiences"
  tags: [visualization, funnel-chart, communication, bar-chart, beginner]

state: {}

trigger: |
  The analyst says: "I have all the funnel numbers in a spreadsheet
  but when I show them to the PM, their eyes glaze over. How do I
  visualize a funnel so anyone can understand it at a glance?"

  Task: Explain the main visualization types for funnel data and
  when to use each one.

assertions:
  - type: llm_judge
    criteria: "Response covers funnel diagram and bar chart visualizations — diagrams: 'Funnel visualization types: Type 1 — The classic funnel diagram: a trapezoidal shape where each stage is a horizontal bar that gets narrower as you move down. Top bar (widest): homepage visits (10,000). Second bar: product page views (4,000). Third bar: add to cart (1,200). Fourth bar: checkout started (800). Bottom bar (narrowest): purchase completed (400). The width of each bar is proportional to the number of users. The visual immediately communicates: the funnel narrows dramatically from top to bottom. The biggest narrowing (widest gap) is between homepage and product page. Annotations: label each bar with the absolute count AND the conversion rate to the next step. Add the drop-off percentage between bars (60%, 70%, 33%, 50%). Color coding: use a gradient from light (top) to dark (bottom), or use red to highlight the step with the worst drop-off. Type 2 — Horizontal bar chart: each stage is a horizontal bar, all starting from the left edge. Bar lengths represent the number of users at each stage. This is cleaner than the funnel shape and easier to compare stages precisely. The gap between bars clearly shows the drop-off. Advantage: more accurate visual comparison than the funnel shape (funnel shapes can distort proportions). Type 3 — Percentage bar chart (normalized): each bar shows the percentage of original users remaining. Step 1: 100%. Step 2: 40%. Step 3: 12%. Step 4: 8%. Step 5: 4%. This emphasizes the cumulative conversion rate. It answers: what percentage of users survive to each step? Best for: comparing funnels across time periods or segments (different starting volumes become comparable when normalized to 100%)'"
    weight: 0.35
    description: "Diagrams"
  - type: llm_judge
    criteria: "Response covers additional visualization types and comparison views — additional: 'Additional funnel visualizations: Type 4 — Step-by-step conversion waterfall: a waterfall chart showing conversion rate at each step. Start at 100%, then show each step's drop-off as a negative bar, and the remaining users as the running total. This format clearly shows: which step causes the largest absolute loss. The cumulative effect of all drop-offs. Where the funnel stabilizes (consecutive steps with small drops). Type 5 — Funnel comparison (side-by-side): place two funnels next to each other to compare: this month vs last month. Desktop vs mobile. Channel A vs channel B. Each funnel uses the same scale (normalized to 100% at the top). Differences are immediately visible — if mobile's second bar is shorter than desktop's, mobile users are dropping off earlier. Type 6 — Funnel over time (trend chart): plot conversion rates for each step as lines over time. X-axis: week or month. Y-axis: conversion rate. Each line represents a funnel step. If the product page→cart line is rising over time, that step is improving. If the checkout→purchase line is falling, something is degrading. This is excellent for tracking the impact of product changes. Type 7 — Sankey diagram (flow visualization): shows not just the main funnel path but ALL paths users take. Flows branch at each step — some users go forward, some go backward (return to a previous step), some exit. This reveals: users who skip steps. Users who revisit earlier steps. Alternative paths to conversion. Best for: understanding complex user journeys where the funnel is not strictly linear'"
    weight: 0.35
    description: "Additional"
  - type: llm_judge
    criteria: "Response covers presentation tips and audience-specific formatting — presentation: 'Presenting funnel data to different audiences: Audience 1 — Executives (CEO, VP): use the classic funnel diagram (most intuitive). Show only the overall numbers and the top 1-2 insights. Lead with the business impact: our biggest opportunity is the product page — fixing it could generate $50K/month. Include one recommendation per insight. Example: our checkout drop-off costs us $30K/month. Adding guest checkout is estimated to recover $10K of that. Audience 2 — Product managers: use the percentage bar chart with step-by-step conversion rates. Include segmentation (device, channel). Highlight the specific step they own. Provide diagnostic data (heatmaps, session recordings, error logs). Example: mobile checkout conversion is 35% vs desktop 55%. Mobile users abandon at the payment form — the fields are too small. Audience 3 — Data team: provide the raw numbers table alongside the visualization. Include confidence intervals for conversion rates if sample sizes are small. Share the SQL query or methodology so they can reproduce. Include time-series trend data for each step. Design rules for funnel charts: 1. Always label absolute numbers AND percentages (raw count gives scale, percentage gives rate). 2. Highlight the worst step with a contrasting color (red or orange). 3. Include the overall conversion rate prominently. 4. Use consistent colors across all funnel visualizations (so the team learns the visual language). 5. Annotate significant events (product launches, campaigns, outages) on time-series funnel charts. 6. Keep it to one funnel per slide — do not overload with multiple funnels on one view. 7. Use the title to state the insight, not the chart type. Bad title: E-commerce Funnel. Good title: 70% of users drop off at the product page — our biggest growth opportunity'"
    weight: 0.30
    description: "Presentation"
