meta:
  id: common-funnel-mistakes
  level: 1
  course: funnel-analysis
  type: output
  description: "Avoid common funnel analysis mistakes — recognize and prevent the most frequent errors in building, interpreting, and optimizing funnels"
  tags: [mistakes, pitfalls, errors, data-quality, beginner]

state: {}

trigger: |
  A senior analyst reviews a junior analyst's funnel report and says:
  "There are several problems with this analysis. The conversion rates
  don't add up, you're comparing funnels with different time windows,
  and you're optimizing the wrong step. Let me explain the most
  common funnel analysis mistakes."

  Task: Explain the most common mistakes in funnel analysis and how
  to avoid them.

assertions:
  - type: llm_judge
    criteria: "Response covers data and construction mistakes — construction: 'Common funnel construction mistakes: Mistake 1 — Inconsistent time windows: comparing a 7-day funnel window from last week to a 30-day window from last month. A 30-day window will always show higher conversion (more time for users to complete the funnel). Fix: always use the same conversion window when comparing funnels. Document the window in every report. Mistake 2 — Counting sessions instead of users: a user visits the homepage 5 times and purchases once. If you count sessions: 5 entries, 1 conversion = 20% conversion. If you count users: 1 user, 1 conversion = 100% conversion. Fix: always count unique users unless you have a specific reason to count sessions. Document which approach you are using. Mistake 3 — Including bot traffic: bots inflate top-of-funnel numbers but never convert. This makes conversion rates look artificially low. If 30% of homepage visits are bots, the true visitor-to-purchase conversion is 4% / 0.7 = 5.7% (not 4%). Fix: filter out known bots before funnel analysis. Use server-side events rather than client-side page views when possible. Mistake 4 — Not excluding returning/existing users: if the funnel is for new user signup, existing users who visit the homepage should not be in the funnel. Including them inflates the top of the funnel (more visitors) but they never sign up (they already have accounts). Fix: filter the funnel to include only first-time visitors or users without accounts. Mistake 5 — Mixing products or flows: if the website sells both physical products and digital subscriptions, combining them into one funnel masks differences. Physical products: 3% conversion (lower, requires shipping decision). Digital subscriptions: 8% conversion (higher, instant delivery). Combined: 5% (meaningless average). Fix: build separate funnels for distinct user journeys'"
    weight: 0.35
    description: "Construction"
  - type: llm_judge
    criteria: "Response covers interpretation and optimization mistakes — interpretation: 'Common interpretation and optimization mistakes: Mistake 6 — Optimizing the wrong step: the team notices that checkout-to-purchase conversion is 50% and wants to improve it. But the biggest absolute drop-off is homepage-to-product-page (6,000 users lost). Improving the checkout step from 50% to 60% gains 80 additional purchases. Improving the homepage step from 40% to 45% gains 200 additional purchases. The team is optimizing a small step when the big opportunity is at the top. Fix: always calculate the revenue impact of improving each step before prioritizing. Mistake 7 — Assuming correlation means causation: users who watch the product video have 2x higher conversion than those who do not. Conclusion: force all users to watch the video. But the users who chose to watch may have had higher purchase intent already. The video did not cause higher conversion — intent caused both video watching and purchasing. Fix: run an A/B test — show the video prominently to half the users and see if their conversion improves. Mistake 8 — Ignoring segment differences: overall checkout conversion is 55%. But: desktop: 65%. Mobile: 35%. Averaging masks a severe mobile problem. If 60% of traffic is mobile, the mobile checkout is dragging down the overall rate significantly. Fix: always segment funnels by at least: device, acquisition channel, and new vs returning users. Mistake 9 — Snapshot bias — measuring only one time period: one week's funnel data may be influenced by a sale, a holiday, or a marketing campaign. Concluding that the checkout was improved because this week's rate was 60% vs last week's 55% — but this week had a promotional campaign. Fix: compare at least 4 weeks of data. Use statistical significance testing before declaring a change. Mistake 10 — Ignoring qualitative data: a funnel shows a 40% drop-off at registration but the analyst does not investigate WHY. Possible reasons visible only through qualitative research: users are confused by a form field. The password requirements are frustrating. Users do not trust the site with their email. Fix: combine quantitative funnel data with qualitative research — user surveys, session recordings, usability tests, and customer support feedback'"
    weight: 0.35
    description: "Interpretation"
  - type: llm_judge
    criteria: "Response covers reporting and communication mistakes — reporting: 'Common reporting and communication mistakes: Mistake 11 — Presenting too many steps: a funnel with 15 micro-steps is overwhelming for stakeholders. Nobody can absorb 15 conversion rates in a meeting. Fix: present 4-6 major steps in the main report. Keep the detailed 15-step analysis in the appendix for investigation. Mistake 12 — Reporting conversion rates without context: the checkout conversion rate improved from 55% to 58%. But: was this statistically significant? (with 200 users, a 3pp change could be random noise). Did any other metric change? (maybe overall traffic dropped and only high-intent users remained). Fix: include: sample size, time period, confidence level, and any concurrent changes that may have affected the metric. Mistake 13 — Comparing funnels with different volumes: funnel A: 1,000 entries, 50 conversions (5%). Funnel B: 100 entries, 8 conversions (8%). Funnel B has a higher rate but the sample is 10x smaller. The confidence interval for funnel B is much wider — the true rate could be anywhere from 3% to 13%. Fix: note sample sizes alongside conversion rates. Use confidence intervals. Do not declare a winner without statistical rigor. Mistake 14 — Not tracking funnel changes over time: a one-time funnel analysis is useful but insufficient. If you only look at this month's funnel, you do not know: is it improving or declining? Was last month better or worse? Is there seasonal variation? Fix: build a funnel dashboard that tracks step-by-step conversion rates weekly or monthly. This transforms funnel analysis from a one-time project into an ongoing monitoring system. Checklist for accurate funnel analysis: 1. Define the time window and document it. 2. Count unique users (not sessions). 3. Filter bots and internal traffic. 4. Segment by device, channel, and user type. 5. Include sample sizes with all rates. 6. Track over time (not just a snapshot). 7. Combine with qualitative research. 8. Calculate business impact before prioritizing fixes'"
    weight: 0.30
    description: "Reporting"
