meta:
  id: funnel-metrics
  level: 1
  course: funnel-analysis
  type: output
  description: "Master funnel metrics — understand and calculate the key metrics that describe funnel health including throughput, velocity, leakage, and efficiency"
  tags: [metrics, throughput, velocity, leakage, efficiency, beginner]

state: {}

trigger: |
  A data analyst asks: "Beyond conversion rate, what other metrics
  should I track for our funnel? My manager keeps asking about
  throughput, velocity, and leakage but I'm not sure what those mean
  in a funnel context."

  Task: Explain the key funnel metrics, how to calculate them, and
  what each one tells you about funnel health.

assertions:
  - type: llm_judge
    criteria: "Response explains core funnel metrics — metrics: 'Core funnel metrics: Metric 1 — Throughput: the number of users who pass through each stage in a given time period. Example: weekly throughput for a SaaS signup funnel: landing page: 5,000 visitors/week. Signup started: 1,000/week. Signup completed: 600/week. Activation (first key action): 240/week. Paid conversion: 72/week. Throughput tells you the VOLUME flowing through the funnel. If throughput at the top drops (fewer visitors), all downstream stages will decline — even if conversion rates stay the same. Track throughput weekly or daily to detect volume changes early. Metric 2 — Velocity: how quickly users move through the funnel, measured as average or median time between stages. Signup funnel velocity: landing to signup start: 2 minutes. Signup to completion: 5 minutes. Completion to activation: 3 days. Activation to paid: 7 days. Total funnel velocity: about 10 days from first visit to paid. Faster velocity generally means healthier funnels. If velocity is slowing, friction is increasing somewhere. Metric 3 — Leakage rate: the percentage of users who exit the funnel at each stage without moving forward. It is the complement of conversion rate but focuses on the LOSS, not the success. Leakage by stage: landing → signup: 80% leakage (4,000 of 5,000 leave). Signup → completed: 40% leakage. Completed → activated: 60% leakage. Activated → paid: 70% leakage. Total leakage: 98.6% of entering users never reach the bottom. Leakage analysis answers: where is the funnel hemorrhaging users? Metric 4 — Funnel efficiency: the overall conversion rate expressed as a ratio of output to input. Efficiency = 72 paid users / 5,000 visitors = 1.44%. Track efficiency over time to see if the funnel is improving. Compare efficiency across segments (mobile vs desktop, channel A vs B)'"
    weight: 0.35
    description: "Metrics"
  - type: llm_judge
    criteria: "Response covers derived metrics and health indicators — derived: 'Derived funnel metrics and health indicators: Metric 5 — Drop-off cost: assign a value to each user at each stage and calculate the cost of losing them. If a paid user is worth $100 LTV: 5,000 visitors × $0 = $0 (no investment yet). 1,000 signups × $0.50 acquisition cost = $500 invested. 600 completed × $2 onboarding cost = $1,200 invested. 240 activated × $5 support cost = $1,200 invested. The 360 users who completed signup but never activated represent: $720 in wasted acquisition and onboarding cost. This makes drop-off at the activation stage a $720/week problem. Metric 6 — Conversion rate by attempt: some users attempt a step multiple times before succeeding or giving up. Checkout attempts: 1,200 users attempted checkout. First attempt success: 500 (42%). Second attempt success: 150 (additional 12%). Third attempt: 50 (additional 4%). Total: 700 out of 1,200 (58% eventual success). 500 users gave up after 1+ failed attempts. This reveals that 42% of eventual successes required multiple attempts — the step has usability issues. Metric 7 — Return rate: the percentage of users who leave a step and later return. Cart return rate: of 400 users who abandoned cart, 80 returned within 7 days (20% return rate). Of those 80, 50 completed purchase (62.5% conversion among returners). Understanding return rates helps design win-back interventions (cart abandonment emails, retargeting ads). Funnel health scorecard: create a simple dashboard showing: throughput trend (volume — is it growing?). Conversion rate trend (efficiency — is it improving?). Velocity trend (speed — is it getting faster?). Leakage at each step (where are we losing users?). All four together give a complete picture of funnel health'"
    weight: 0.35
    description: "Derived"
  - type: llm_judge
    criteria: "Response covers using metrics for goal-setting and reporting — goals: 'Using funnel metrics for goal-setting and reporting: setting funnel goals: do not just set an overall conversion rate target. Set goals at each step. Example quarterly goals: landing → signup: improve from 20% to 23% (goal: better landing page copy). Signup → completed: maintain at 60% (no changes planned). Completed → activated: improve from 40% to 50% (goal: new onboarding flow). Activated → paid: improve from 30% to 33% (goal: trial extension experiment). Expected impact: current weekly paid users: 72. Projected with improvements: 5,000 × 23% × 60% × 50% × 33% = 114. That is a 58% increase in paid conversions from targeted step improvements. Funnel reporting cadence: daily: check throughput at each step (early warning for anomalies). Weekly: review conversion rates and velocity (track trends). Monthly: deep-dive into leakage analysis and segment breakdowns. Quarterly: strategic review — are we hitting funnel goals? What investments are working? Creating a funnel dashboard: row 1: step-by-step conversion rates with trend arrows. Row 2: throughput numbers at each step. Row 3: time-to-convert at each step. Row 4: comparison to the previous period (week-over-week or month-over-month). Color coding: green if improving, red if degrading, gray if stable. One number to rule them all: if the team needs a single metric, use funnel efficiency (end-to-end conversion rate). But always have the step-by-step breakdown available for diagnosis. The single number tells you IF there is a problem. The breakdown tells you WHERE the problem is'"
    weight: 0.30
    description: "Goals"
