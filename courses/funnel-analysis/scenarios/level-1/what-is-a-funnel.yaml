meta:
  id: what-is-a-funnel
  level: 1
  course: funnel-analysis
  type: output
  description: "Understand what a funnel is — learn the concept of conversion funnels, why they narrow at each stage, and how to identify the stages in your product"
  tags: [funnel-basics, conversion, stages, beginner]

state: {}

trigger: |
  A junior analyst asks: "Everyone keeps talking about 'the funnel'
  but I don't really understand what it means. Why is it called a
  funnel? How do I know what the stages are for our product? And
  why should I care about funnel analysis?"

  Task: Explain what a conversion funnel is, why it matters, and
  how to identify the right stages for any product.

assertions:
  - type: llm_judge
    criteria: "Response explains the funnel concept clearly — concept: 'What is a conversion funnel? A funnel is a model of the sequential steps users take toward a desired outcome. It is called a funnel because the number of users decreases at each step — many enter at the top, fewer complete each subsequent step, and only a fraction reach the bottom. Example — e-commerce purchase funnel: Step 1: Visit website (10,000 users). Step 2: View product page (4,000 users — 40%). Step 3: Add to cart (1,200 users — 12%). Step 4: Begin checkout (800 users — 8%). Step 5: Complete purchase (400 users — 4%). The funnel narrows because at each step, some users leave (drop off). They may lose interest, encounter friction, get distracted, or decide the product is not for them. Why it is shaped like a funnel: wide at the top (many users enter), narrow at the bottom (few complete the desired action). The overall conversion rate (visitors to purchase) is 4% — but the funnel shows WHERE users drop off. Between step 1 and step 2: 60% leave without viewing a product (discovery problem). Between step 3 and step 4: 33% abandon their cart (checkout friction). This is far more actionable than just knowing the 4% overall conversion rate. Without funnel analysis, you only see: we had 10,000 visitors and 400 purchases. With funnel analysis, you see: the biggest drop-off is step 1→2 (60% leave), which tells you exactly where to focus improvement efforts'"
    weight: 0.35
    description: "Concept"
  - type: llm_judge
    criteria: "Response explains how to identify funnel stages — stages: 'How to identify funnel stages for your product: the stages depend on the product type and the desired outcome. Framework: identify the entry point, the desired outcome, and the critical steps in between. SaaS signup funnel: 1. Land on homepage. 2. Click Sign Up. 3. Fill in registration form. 4. Verify email. 5. Complete onboarding. 6. Perform first key action (activation). Mobile app funnel: 1. See app store listing. 2. Download app. 3. Open app for the first time. 4. Complete registration. 5. Complete tutorial. 6. Perform core action (activation). B2B sales funnel: 1. Visit website. 2. Request demo. 3. Attend demo. 4. Receive proposal. 5. Sign contract. Marketplace buyer funnel: 1. Search for item. 2. View listing. 3. Contact seller. 4. Negotiate/agree. 5. Complete transaction. Rules for defining good funnel stages: Rule 1: stages must be sequential — each step happens after the previous one. Rule 2: stages must be measurable — you need event tracking data for each step. Rule 3: stages should be mutually exclusive — a user is at one stage at a time. Rule 4: keep it to 4-7 stages — too few hides the detail, too many creates noise. Rule 5: include both the ideal path AND common alternate paths (some users skip steps). How to discover your funnel: if you are not sure what the stages are, look at your analytics data. Find the most common paths users take from entry to the desired outcome. The dominant path (used by 60-80% of converting users) is your primary funnel. Less common paths are secondary funnels worth analyzing separately'"
    weight: 0.35
    description: "Stages"
  - type: llm_judge
    criteria: "Response explains why funnel analysis matters with practical examples — value: 'Why funnel analysis matters: Reason 1 — It tells you WHERE to focus: if your overall conversion is 4%, improving it to 5% is a 25% increase in revenue. But where do you invest? Funnel analysis shows: step 1→2 loses 6,000 users (biggest drop-off). Step 3→4 loses 400 users (smallest absolute, but 33% relative). Fixing step 1→2 (product discovery) has 15x more impact potential than fixing step 3→4. Reason 2 — It reveals hidden problems: a company has 10% signup conversion and thinks it is fine. Funnel reveals: 80% of users who click Sign Up complete the form. But only 40% verify their email. The email verification step is killing half the signups. Fix: implement magic link authentication or in-app verification. Reason 3 — It enables before/after measurement: you redesign the checkout page. Before: step 3→4 conversion was 67%. After: step 3→4 conversion is 78%. The funnel quantifies the exact impact of the change at the exact step you changed. Reason 4 — It connects teams: marketing owns the top of the funnel (driving traffic). Product owns the middle (user experience, activation). Sales owns the bottom (conversion to payment). Funnel analysis gives all teams a shared framework and shared language. Each team can see how their work connects to the overall conversion rate. Reason 5 — It prioritizes investments: a 10% improvement at a high-volume step generates more revenue than a 50% improvement at a low-volume step. Example: improving step 1→2 from 40% to 44% (+400 more users reaching step 2) creates more purchases than improving step 4→5 from 50% to 55% (+40 more users). The funnel is the foundation of growth — it turns vague problems (we need more conversions) into specific, actionable opportunities'"
    weight: 0.30
    description: "Value"
