meta:
  id: micro-conversions
  level: 1
  course: funnel-analysis
  type: output
  description: "Track micro-conversions — identify and measure the small actions within each funnel stage that predict macro-conversion outcomes"
  tags: [micro-conversions, leading-indicators, engagement-signals, beginner]

state: {}

trigger: |
  The PM asks: "I want to understand what users DO within each funnel
  step, not just whether they move to the next step. What small actions
  predict whether a user will convert? How do I use micro-conversions
  to optimize the funnel?"

  Task: Explain micro-conversions, how to identify them, and how to
  use them as leading indicators for funnel optimization.

assertions:
  - type: llm_judge
    criteria: "Response explains micro-conversions and their relationship to macro-conversions — concept: 'Micro-conversions vs macro-conversions: macro-conversions are the major funnel goals: purchase, signup, subscription. Micro-conversions are the smaller actions that happen along the way and predict whether the macro-conversion will occur. Example — e-commerce product page: macro-conversion: add to cart. Micro-conversions on the product page: viewed 3+ product images (engagement signal). Read customer reviews (trust-building). Checked size guide (purchase intent). Scrolled to the bottom of the page (thorough evaluation). Clicked compare to similar products (active shopping). Users who perform 3+ micro-conversions: 25% add to cart. Users who perform 0-1 micro-conversions: 4% add to cart. Micro-conversions are leading indicators — they tell you BEFORE the macro-conversion whether the user is likely to convert. Example — SaaS onboarding: macro-conversion: complete activation (perform first key action). Micro-conversions during onboarding: watched the intro video (orientation). Customized their profile (investment). Invited a colleague (collaboration intent). Explored the settings page (personalization). Clicked on a help article (learning). Users who performed 4+ onboarding micro-conversions: 65% activate within 7 days. Users who performed 0-1: 8% activate. The micro-conversions reveal the quality of engagement at each funnel step, not just whether the user passed through'"
    weight: 0.35
    description: "Concept"
  - type: llm_judge
    criteria: "Response covers identifying and measuring micro-conversions — identification: 'How to identify valuable micro-conversions: Step 1 — List all trackable actions within each funnel step: for the product page step, list every action: scroll depth (25%, 50%, 75%, 100%). Image gallery interactions (swipe, zoom, click). Review section engagement (expand reviews, sort, filter). Size/variant selection. Price comparison clicks. Wishlist/save for later. Share button clicks. Step 2 — Correlate each micro-conversion with macro-conversion: for each action, compare: conversion rate for users who performed the action vs those who did not. Action | users who did it | their macro conversion | users who did not | their conversion. Viewed 3+ images: 35% | 22% add to cart | 65% | 6%. Read reviews: 28% | 18% | 72% | 8%. Checked size guide: 15% | 30% | 85% | 9%. Scrolled 75%+: 40% | 20% | 60% | 5%. Step 3 — Rank by predictive power: calculate the conversion lift for each micro-conversion: checking the size guide has the highest conversion rate for doers (30%) — users who check sizing are strongly intent to purchase. Scrolling 75%+ has the highest reach (40% of users do it) with strong lift (20% vs 5%). Step 4 — Select 3-5 key micro-conversions to track: choose actions that are: highly predictive of macro-conversion (large gap between doers and non-doers). Actionable (you can design the product to encourage them). Measurable (reliable tracking is in place). Track these as a micro-conversion score for each user'"
    weight: 0.35
    description: "Identification"
  - type: llm_judge
    criteria: "Response covers using micro-conversions for optimization — optimization: 'Using micro-conversions for funnel optimization: Optimization 1 — Design for micro-conversions: if viewing 3+ images predicts add-to-cart, make the image gallery more prominent. If reading reviews predicts purchase, show reviews higher on the page. If checking the size guide predicts conversion, add a size recommendation tool. The product should guide users toward the micro-conversions that predict success. Optimization 2 — Early warning system: track micro-conversion rates daily as leading indicators. If the image viewing rate drops from 35% to 25% this week: expect add-to-cart rates to drop in 1-2 days. Investigate immediately: is the image gallery broken? Did a design change hide it? Micro-conversions give you 1-3 days of advance warning before macro-conversion drops show up. Optimization 3 — Personalized interventions: if a user has been on the product page for 3 minutes without any micro-conversions: trigger a prompt: need help finding the right size? Or show a featured review to encourage engagement. If a user has performed 3 micro-conversions but has not added to cart: they may be hesitating on price. Show a limited-time offer or free shipping threshold. Optimization 4 — Funnel step enrichment: instead of tracking a single conversion rate per step, track a micro-conversion score distribution. Product page micro-conversion score distribution: score 0 (no engagement): 40% of visitors. Score 1-2 (light engagement): 35%. Score 3-4 (moderate engagement): 18%. Score 5+ (deep engagement): 7%. The goal is to shift users from score 0-1 to score 3+. If 10% more users reach score 3+, macro-conversion will improve proportionally. For the PM: select 3-5 key micro-conversions per funnel step. Track them alongside macro-conversion rates. Design the product to encourage the most predictive micro-conversions. Use micro-conversion rates as early warning indicators for funnel health'"
    weight: 0.30
    description: "Optimization"
