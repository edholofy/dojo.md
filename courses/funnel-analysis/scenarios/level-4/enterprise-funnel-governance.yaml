meta:
  id: enterprise-funnel-governance
  level: 4
  course: funnel-analysis
  type: output
  description: "Enterprise funnel governance — establish standards, ownership, and processes for funnel metrics across a large organization with multiple teams"
  tags: [governance, standards, ownership, enterprise, expert]

state: {}

trigger: |
  The Chief Data Officer says: "We have 15 teams each defining funnels
  differently. Marketing's 'conversion rate' is different from
  Product's. Finance uses different time windows. Nobody agrees on
  the numbers. I need a governance framework that creates a single
  source of truth for funnel metrics while still letting teams
  customize their analysis."

  Task: Design an enterprise funnel governance framework covering
  metric definitions, ownership, standardization, and self-serve
  capabilities.

assertions:
  - type: llm_judge
    criteria: "Response covers metric standardization and the single source of truth — standardization: 'Enterprise funnel metric standardization: the problem: 15 teams, 15 different conversion rates. Marketing: counts visitors using Google Analytics (includes bots, excludes ad-blocked users). Product: counts users using Mixpanel (excludes anonymous visitors, includes logged-in users only). Finance: counts transactions from the database (includes refunded orders as conversions). Sales: counts leads from Salesforce (different definition of conversion entirely). Result: in the same meeting, Marketing reports 2.1% conversion, Product reports 3.8%, and Finance reports 4.2%. Nobody trusts any number. The governance framework: Layer 1 — Certified metrics (the single source of truth): define a small set of certified metrics that are: precisely defined (documented definition, numerator, denominator, exclusions). Authoritatively computed (one system of record, one pipeline). Auditable (lineage tracked from source to metric). Versioned (changes to the definition are tracked and communicated). Example certified metrics: metric: overall conversion rate. Definition: unique users who completed a purchase ÷ unique users who visited any product page. Exclusions: bot traffic (defined by bot detection system), internal employees, test accounts. Time window: 30-day conversion window from first product page view. Counting: unique users (not sessions). Source of truth: data warehouse, table: certified_metrics.funnel_conversion_daily. Owner: analytics engineering team. Certification date: 2024-01-15. Next review: 2024-07-15. Layer 2 — Team-specific metrics (customized views): teams can create their own funnel definitions for specific analysis needs. But: team metrics must be clearly labeled as non-certified. Team metrics cannot override or replace certified metrics in executive reporting. Team metrics should reference the certified metric for comparison. Example: marketing team metric: marketing-attributed conversion rate. Defined as: conversion rate for users who entered via a marketing campaign. This is a valid and useful metric, but it is a filtered view of the certified metric, not a replacement. Layer 3 — Metric catalog: a searchable catalog of all metrics (certified and team-specific). Each entry includes: definition, formula, data source, owner, certification status, lineage, usage guidelines'"
    weight: 0.35
    description: "Standardization"
  - type: llm_judge
    criteria: "Response covers ownership model and organizational structure — ownership: 'Ownership model and organizational structure: the RACI model for funnel metrics: for each certified metric, assign: Responsible: the team that maintains the pipeline and ensures data quality (analytics engineering). Accountable: the executive who owns the business outcome (VP of Growth owns conversion rate). Consulted: teams whose input is needed for definition changes (product, marketing, finance). Informed: teams who use the metric in their work (all teams). Metric stewardship structure: executive sponsor (CDO or VP of Analytics): approves new certified metric definitions. Resolves disputes between teams. Reviews certification status annually. Metric stewards (1-2 senior analysts): review proposed metric changes for consistency and clarity. Maintain the metric catalog. Run quarterly metric health reviews. Data engineering team: maintains the pipelines that compute certified metrics. Ensures SLAs for data freshness and accuracy. Team analysts: create team-specific metrics. Consume certified metrics. Propose changes to certified metrics through the governance process. Change management process: any change to a certified metric must follow: 1. Proposal: document the proposed change, rationale, and impact assessment. 2. Review: metric stewards assess for consistency, clarity, and backward compatibility. 3. Impact analysis: which reports, dashboards, and teams are affected? 4. Communication: notify all consumers 2 weeks before the change. 5. Implementation: update the pipeline, documentation, and catalog. 6. Validation: verify the new computation produces expected results. 7. Deprecation: maintain the old metric in parallel for 30 days with a deprecation warning. Emergency changes: if a critical data quality issue is discovered, the metric steward can make immediate changes. But must follow up with full documentation within 48 hours'"
    weight: 0.35
    description: "Ownership"
  - type: llm_judge
    criteria: "Response covers self-serve capabilities and practical implementation — self-serve: 'Self-serve funnel analysis within governance: the goal: let teams explore and customize without breaking the single source of truth. Self-serve capabilities: 1. Funnel builder tool: analysts can create custom funnels by selecting from a catalog of certified events. Events are pre-defined and validated (page_view:homepage, button_click:add_to_cart, etc.). The tool enforces governance rules: conversion windows must be between 1 and 90 days. Counting must be unique users or unique sessions (no mixing). Bot and internal traffic exclusions are automatically applied. Segments must use certified dimension definitions. 2. Sandbox environment: teams can experiment with metric definitions in a sandbox. Sandbox metrics are clearly labeled and never appear in production dashboards. Promising sandbox metrics can be proposed for certification. 3. Pre-built segment library: certified segments: device type, traffic source, geography, user type (new vs returning). Teams select from the library instead of creating ad-hoc segment definitions. This ensures the device segment in marketing's funnel uses the same logic as product's funnel. 4. Dashboard governance: executive dashboards ONLY show certified metrics. Team dashboards can mix certified and team-specific metrics. Clear visual distinction: certified metrics have a badge, team metrics have a disclaimer. Practical implementation plan: quarter 1: audit all existing funnel definitions across 15 teams. Identify the top 10 most-used funnel metrics. Define and certify the top 5 metrics. Quarter 2: build the metric catalog. Implement the certified metric pipelines. Deploy the self-serve funnel builder with governance guardrails. Quarter 3: migrate all executive dashboards to certified metrics. Train teams on the governance process and self-serve tools. Quarter 4: review and expand certification to additional metrics. Establish the quarterly metric health review cadence. Success metrics for the governance program: metric agreement rate: percentage of meetings where all teams reference the same number (target: 95%+, up from approximately 40%). Time to new metric: how long it takes to define and certify a new metric (target: 2 weeks, down from 2 months). Data quality incidents: number of times certified metrics are found to be incorrect (target: fewer than 2 per quarter). Self-serve adoption: percentage of funnel analyses done through the self-serve tool (target: 80% within 6 months)'"
    weight: 0.30
    description: "Self-serve"
