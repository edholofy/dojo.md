meta:
  id: multi-product-funnels
  level: 4
  course: funnel-analysis
  type: output
  description: "Multi-product funnel analysis — analyze funnels across a product portfolio where users cross between products and usage of one product influences another"
  tags: [multi-product, portfolio, cross-selling, product-interaction, expert]

state: {}

trigger: |
  The Chief Product Officer of a SaaS company with 4 products says:
  "Each product team tracks their own funnel, but users cross between
  products. Someone who uses Product A is 3x more likely to convert
  on Product B. How do I analyze funnels across the portfolio and
  optimize the cross-product journey?"

  Products: Analytics (core), Reporting (add-on), Data Pipeline
  (add-on), AI Insights (premium).

  Task: Design a cross-product funnel analysis framework that captures
  product interactions, cross-sell opportunities, and portfolio-level
  conversion optimization.

assertions:
  - type: llm_judge
    criteria: "Response covers cross-product funnel framework — framework: 'Cross-product funnel analysis framework: the portfolio funnel: instead of 4 independent product funnels, build a portfolio funnel that captures the complete customer journey across all products. Product adoption sequence (most common): step 1: discover Analytics (core product) via marketing. Step 2: sign up for Analytics free tier. Step 3: activate Analytics (connect data source, create first dashboard). Step 4: upgrade Analytics to paid. Step 5: discover Reporting (prompted by in-product cross-sell or natural need). Step 6: adopt Reporting (trial or add-on purchase). Step 7: discover Data Pipeline (operational need as usage scales). Step 8: adopt Data Pipeline. Step 9: discover AI Insights (premium, offered to high-engagement users). Step 10: adopt AI Insights. Cross-product influence mapping: product A usage | impact on product B conversion. Analytics active 30+ days: → Reporting trial start rate 3.2x higher than non-Analytics users. Analytics + Reporting user: → Data Pipeline adoption 2.5x higher. Any 2 products adopted: → AI Insights conversion 4.1x higher. Reverse influence: Reporting users who lack Analytics: 60% eventually adopt Analytics (pull-through effect). Portfolio funnel metrics: product breadth: average number of products per paying customer. Current: 1.4 products. Target: 2.0 products. Cross-product conversion rate: percentage of single-product users who adopt a second product within 12 months. Current: 25%. Target: 40%. Portfolio LTV: lifetime value by number of products adopted. 1 product: $1,200 LTV. 2 products: $3,500 LTV (2.9x). 3 products: $7,200 LTV (6x). 4 products: $14,000 LTV (11.7x). The LTV multiplier is superlinear — each additional product adopted more than doubles LTV because multi-product users have higher retention AND higher ARPU'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response covers cross-product funnel optimization — optimization: 'Cross-product funnel optimization: identifying cross-sell timing: analyze when single-product users are most receptive to a second product. Time-based triggers: analytics users who have been active 30-60 days are the most receptive to Reporting. Too early (under 14 days): user is still learning the first product. Too late (over 90 days): user has established workflows and may resist adding complexity. Usage-based triggers: analytics users who create 10+ dashboards are 4x more likely to need Reporting. Users who manually export data weekly are prime candidates for Data Pipeline. Users who ask support questions about predictions are candidates for AI Insights. Friction-based triggers: when a user hits a limitation in product A that product B solves, this is the ideal cross-sell moment. Example: analytics user tries to schedule a report delivery → this is a Reporting feature → prompt cross-sell. Cross-product funnel optimization tactics: 1. Natural discovery paths: embed product B features as previews within product A. Show what AI Insights would reveal on the user's current data (teaser). Allow limited use of Reporting features within Analytics (hook). 2. Bundled trials: when a user starts an Analytics paid plan, offer a 14-day trial of Reporting automatically. This removes the discovery barrier — users experience value before deciding. 3. Unified onboarding: when a user adopts a second product, skip the generic onboarding. Instead, show how the new product integrates with what they already use. Your Analytics dashboards are now available as scheduled reports in Reporting. 4. Cross-product pricing incentives: bundle discount: 20% off when adopting 2+ products. Suite pricing: all 4 products at 40% less than individual pricing. This encourages multi-product adoption while increasing total ARPU'"
    weight: 0.35
    description: "Optimization"
  - type: llm_judge
    criteria: "Response covers portfolio-level measurement and organizational considerations — portfolio: 'Portfolio-level measurement: the cross-product dashboard: Metric 1 — Product adoption funnel (portfolio view): total customers: 5,000. Using 1 product: 3,500 (70%). Using 2 products: 1,000 (20%). Using 3 products: 400 (8%). Using 4 products: 100 (2%). The funnel here is products adopted, not traditional conversion steps. Goal: shift the distribution toward multi-product usage. Metric 2 — Cross-product transition matrix: from/to | Reporting | Pipeline | AI Insights. Analytics: 18% adopt | 8% adopt | 3% adopt. Reporting: — | 15% adopt | 5% adopt. Pipeline: 12% adopt | — | 10% adopt. This matrix reveals the most common product adoption paths and where cross-sell efforts should focus. Metric 3 — Portfolio revenue composition: product | solo revenue | cross-sell revenue | total. Analytics: $2M | — | $2M. Reporting: $300K | $800K (from Analytics cross-sell) | $1.1M. Pipeline: $200K | $500K | $700K. AI Insights: $50K | $400K | $450K. 40% of portfolio revenue comes from cross-sell, not independent product marketing. Organizational considerations: cross-product funnel analysis requires: 1. Unified identity: users must be identifiable across all products. A user who has separate accounts for Analytics and Reporting appears as two users without identity resolution. 2. Shared event taxonomy: all products must use the same event naming and structure. Analytics cannot call it signup while Reporting calls it registration. 3. Cross-team collaboration: product teams naturally optimize their own funnel. But cross-product optimization may require team A to add features that benefit team B's funnel. This requires executive sponsorship and shared incentives. Incentive structure: product teams should be measured on both: product-specific metrics (their funnel performance). Portfolio-contribution metrics (how many users they send to other products). A team that has excellent product conversion but actively prevents users from discovering other products is suboptimal for the business. 4. Cannibalization analysis: ensure products complement rather than cannibalize each other. If Data Pipeline users reduce their Analytics usage by 40%, the cross-sell may destroy more value than it creates. Monitor product engagement for both the new AND existing products after each cross-sell'"
    weight: 0.30
    description: "Portfolio"
