meta:
  id: marketplace-funnels
  level: 4
  course: funnel-analysis
  type: output
  description: "Marketplace funnels — analyze two-sided marketplace funnels where buyer and seller journeys interact and influence each other"
  tags: [marketplace, two-sided, supply-demand, liquidity, expert]

state: {}

trigger: |
  The VP of Product at a marketplace platform says: "We have two
  funnels that interact — the buyer funnel and the seller funnel. When
  we optimize the buyer funnel, it can break the seller experience,
  and vice versa. Plus, marketplace liquidity affects both funnels.
  How do I analyze and optimize interconnected marketplace funnels?"

  Task: Explain marketplace funnel analysis for two-sided platforms,
  covering buyer funnels, seller funnels, liquidity effects, and
  the interactions between them.

assertions:
  - type: llm_judge
    criteria: "Response covers the dual funnel structure of marketplaces — dual-funnel: 'Marketplace dual funnel structure: buyer funnel: search/browse → view listing → contact seller/add to cart → complete transaction → review/repeat. Typical metrics: search-to-view rate: 40-60%. View-to-contact/cart rate: 5-15%. Contact-to-transaction rate: 20-40% (varies by marketplace type). Overall buyer conversion: 1-5%. Seller funnel: signup → create listing → listing goes live → receive inquiry → complete transaction → relist/expand. Typical metrics: signup-to-first-listing rate: 30-50%. Listing-to-inquiry rate (depends on marketplace liquidity): 10-40%. Inquiry-to-transaction rate: 30-60%. Seller activation (completes first transaction): 15-30%. The critical interaction — liquidity: marketplace liquidity is the probability that a buyer finds what they want AND the seller is available to fulfill it. Low liquidity: buyers search but cannot find good matches → buyer funnel conversion drops. High liquidity: buyers find many options, sellers get consistent demand → both funnels improve. The liquidity feedback loop: more sellers → more inventory → better buyer experience → more buyers → more demand → more seller earnings → more sellers. The reverse is also true (death spiral): fewer sellers → less inventory → worse buyer experience → fewer buyers → less demand → sellers leave → fewer sellers. Funnel interaction effects: buyer-side optimization that HURTS sellers: making it easier for buyers to browse without committing (free browsing, no login required) increases buyer top-of-funnel but may flood sellers with low-intent inquiries. Seller-side optimization that HURTS buyers: reducing listing requirements (fewer photos, less detail) increases seller listing creation but degrades the buyer browsing experience. Both-side optimization: improving search matching helps buyers find relevant listings (higher view-to-contact) AND helps sellers receive more qualified inquiries (higher inquiry-to-transaction)'"
    weight: 0.35
    description: "Dual funnel"
  - type: llm_judge
    criteria: "Response covers marketplace-specific funnel metrics and optimization — metrics: 'Marketplace-specific funnel metrics: beyond traditional conversion rates: 1. Search-to-match rate: what percentage of buyer searches return at least one relevant result? If 30% of searches return zero results, the marketplace has a supply gap problem. Optimization: identify the most common zero-result searches and recruit sellers in those categories. 2. Time-to-match: how long does it take from buyer search to finding a match? A marketplace where buyers browse 50 listings to find one match has a discovery problem. A marketplace where the first 3 listings are relevant has strong matching. 3. Seller fill rate: what percentage of listings receive at least one inquiry within 30 days? Low fill rate → sellers become inactive and leave. Target: 70%+ fill rate for healthy marketplace. 4. Transaction density: transactions per active listing per month. Low density: each listing gets infrequent transactions (marketplace is spread too thin). High density: listings are consistently active (strong marketplace liquidity). 5. Take rate efficiency: marketplace revenue per transaction ÷ total GMV. How efficiently is the marketplace monetizing its funnel? Optimization by marketplace maturity: Early stage (building supply): focus on seller funnel — recruit sellers, simplify listing creation, provide tools. Accept that buyer conversion will be low (limited inventory). Metric focus: active listings, seller activation rate, supply coverage by category. Growth stage (building demand): shift focus to buyer funnel — improve search, discovery, and conversion. The supply exists; now drive buyers to transact. Metric focus: buyer conversion rate, GMV growth, buyer retention. Mature stage (optimizing efficiency): focus on matching quality and transaction efficiency. Both supply and demand exist; maximize the value of each interaction. Metric focus: take rate, customer satisfaction (both sides), repeat transaction rate'"
    weight: 0.35
    description: "Metrics"
  - type: llm_judge
    criteria: "Response covers marketplace funnel balancing and advanced strategies — balancing: 'Marketplace funnel balancing strategies: the balancing act: every marketplace optimization must be evaluated for its impact on BOTH sides. Use a 2x2 impact matrix: optimization | buyer impact | seller impact | net marketplace effect. Better search algorithm: +15% buyer conversion | +10% seller fill rate | ✓ ship (both sides benefit). Lower listing fees: neutral buyer | +30% new listings | ✓ ship if supply-constrained. Buyer protection guarantee: +20% buyer trust | -5% seller margin | evaluate (trade-off). Faster listing approval: neutral buyer | +25% seller activation | ✓ ship (no buyer downside). Mandatory seller photos: +10% buyer conversion | -20% listing creation | evaluate (supply cost). The supply-demand ratio framework: calculate the supply-demand ratio for each category. Ratio = active listings ÷ monthly buyer searches. Ratio > 3.0 (supply surplus): oversupplied — focus on buyer optimization. Ratio 1.0-3.0 (balanced): healthy — optimize matching and transaction efficiency. Ratio < 1.0 (demand surplus): undersupplied — focus on seller recruitment. Different categories may be in different states simultaneously. The marketplace should have category-specific funnel strategies, not one-size-fits-all. Advanced marketplace funnel patterns: 1. The cold start funnel: new marketplaces have no liquidity. Neither buyers nor sellers want to be first. Solution: subsidize one side (pay sellers to list, give buyers credits). Create artificial liquidity (marketplace operates as a seller itself initially). Focus on a narrow niche first (one category, one geography) to build density. 2. The geographic funnel: marketplace liquidity varies by location. A marketplace with great liquidity in San Francisco and zero liquidity in Denver has two very different funnel performances. Measure and optimize funnels by geography. Expansion strategy: launch new cities with supply-side seeding before driving buyer demand. 3. The trust funnel: both sides need to trust the marketplace before transacting. Buyer trust funnel: anonymous browse → create account → share payment info → complete first transaction. Seller trust funnel: create account → share banking info → list first item → receive first payment. Trust-building interventions at each step: reviews, guarantees, verified badges, escrow, insurance'"
    weight: 0.30
    description: "Balancing"
