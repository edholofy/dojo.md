meta:
  id: real-time-funnel-monitoring
  level: 4
  course: funnel-analysis
  type: output
  description: "Real-time funnel monitoring — build systems that track funnel health continuously, detect issues within minutes, and enable instant response"
  tags: [real-time, monitoring, dashboards, incident-response, expert]

state: {}

trigger: |
  The CTO says: "Our current funnel metrics are 24 hours old. By the
  time we see a problem, thousands of users have been affected. I want
  real-time funnel monitoring that detects issues within 5 minutes and
  enables us to respond within 30 minutes. Design the system."

  Task: Design a real-time funnel monitoring system with sub-5-minute
  latency, automated anomaly detection, and incident response
  integration.

assertions:
  - type: llm_judge
    criteria: "Response covers the real-time monitoring system design — system: 'Real-time funnel monitoring system design: data pipeline for sub-5-minute latency: event source → Kafka (sub-second) → stream processor (Flink, 30-second windows) → real-time aggregation store (Redis or Druid) → monitoring dashboard (Grafana or custom). Each funnel step conversion rate computed every 60 seconds using 15-minute rolling windows. Why rolling windows: a 1-minute window has too few events for meaningful rates. A 15-minute window smooths noise while detecting real changes quickly. Window configuration: primary: 15-minute rolling window, updated every 60 seconds. Secondary: 1-hour rolling window for trend context. Background: 24-hour rolling window for baseline comparison. Dashboard design: real-time funnel dashboard (refreshes every 60 seconds): top row — current state: step | current rate (15min) | 1-hour rate | 24-hour baseline | status. Homepage → product: 42% | 41% | 43% | ✓ normal. Product → cart: 12% | 13% | 12% | ✓ normal. Cart → checkout: 55% | 56% | 58% | ⚠ slightly low. Checkout → purchase: 62% | 58% | 61% | 🔴 declining. Second row — volume indicators: events per minute by step (detect tracking outages). Active users in the funnel right now. Conversion events per minute. Third row — trend sparklines: 24-hour trend for each step with anomaly annotations. Comparison to same time yesterday and same day last week. Alert thresholds (per step): warning: current 15-min rate deviates more than 2σ from the 24-hour baseline for 2+ consecutive windows. Alert: current rate deviates more than 3σ for 3+ consecutive windows OR drops more than 30% from baseline. Critical: any step rate drops to 0% for 5+ minutes (likely a complete outage). Volume alert: event count drops more than 50% from expected (tracking may be broken)'"
    weight: 0.35
    description: "System"
  - type: llm_judge
    criteria: "Response covers incident response integration — incident: 'Incident response integration: automated incident workflow: detection (T+0 to T+5 minutes): anomaly detected by monitoring system. Auto-classification: tracking issue, product bug, or traffic anomaly. Initial triage: system checks event volumes, deployment logs, and CDN status automatically. Notification (T+5 to T+10 minutes): P0 (complete outage): page on-call engineer via PagerDuty. Post to #incidents Slack channel with auto-generated summary. P1 (significant degradation): Slack alert to engineering and product teams. Include: affected step, current rate, baseline rate, affected segment, recent deployments. P2 (moderate deviation): email to analytics team for investigation. Include in daily digest if unresolved. Auto-generated incident context: when an alert fires, automatically compile: recent deployments (last 12 hours) from CI/CD system. Segment breakdown (which devices, browsers, geos are affected). Correlated metrics (are other funnel steps also affected?). Error logs from the affected funnel step. Session replay links for affected users. This context saves the on-call engineer 30+ minutes of investigation. Response playbooks by incident type: Playbook A — Tracking outage detected: events for step X dropped to zero. Immediate: check if the tracking code was modified in a recent deployment. Check CDN and third-party script availability. Check for browser console errors in affected pages. Resolution: rollback the breaking change or hotfix the tracking code. Recovery: backfill data gap using server-side logs if available. Annotate the gap in dashboards. Playbook B — Conversion rate drop (not tracking): Step X conversion dropped 30% across all segments. Check: did a recent deployment change the user experience? Check: are error rates elevated for the affected page/API? Check: did a third-party service go down (payment provider, auth provider)? Resolution: rollback the breaking deployment or fix the third-party integration. Communication: post status update to stakeholders with estimated impact (users affected × average revenue per user). Playbook C — Segment-specific anomaly: conversion dropped for mobile Safari only. Check: was there an iOS update released? Check: is a specific JavaScript feature being used that Safari deprecated? Resolution: implement browser-specific fix or feature detection. Smaller blast radius, lower priority than cross-segment issues'"
    weight: 0.35
    description: "Incident"
  - type: llm_judge
    criteria: "Response covers operational considerations and SLA design — operations: 'Operational considerations: SLA design for funnel monitoring: data freshness SLA: 95% of metrics available within 5 minutes of event occurrence. 99% within 15 minutes. Alert latency SLA: anomaly detected within 5 minutes of occurrence. Notification delivered within 2 minutes of detection. Dashboard availability SLA: 99.9% uptime for the real-time dashboard. Graceful degradation: if real-time pipeline fails, fall back to 15-minute batch aggregation. Reliability engineering: the monitoring system must be MORE reliable than the system it monitors. If the funnel breaks AND the monitoring breaks simultaneously, nobody knows. Strategies: independent infrastructure: monitoring runs on separate servers from the product. Independent data path: monitoring ingests events directly from Kafka, not from the product database. Self-monitoring: the monitoring system monitors its own health (event ingestion rate, processing latency, dashboard availability). Chaos testing: regularly simulate monitoring failures to verify alerting and fallback work. Cost and resource planning: stream processing cluster: 4-8 nodes for 1,150 events/second average. Real-time aggregation store: Redis cluster with 50GB memory for rolling windows. Dashboard infrastructure: Grafana or equivalent with 60-second refresh for 20 concurrent users. Engineering effort: 2-3 engineers for 3 months to build, 0.5 FTE for ongoing maintenance. Estimated total cost: $5,000-$10,000/month infrastructure + engineering time. ROI justification: the 24% → 22% activation drop (from the earlier scenario) went undetected for 5 days, costing 400+ activations. At $50 LTV per activated user: $20,000 lost from one incident. Real-time monitoring would have detected it in 5 minutes, limiting the loss to approximately $500. One prevented incident per quarter justifies the system cost. Maturity model: Level 1: batch metrics (24-hour delay, manual investigation). Level 2: near-real-time dashboard (5-minute delay, manual monitoring). Level 3: automated anomaly detection (5-minute detection, automated alerts). Level 4: self-healing (automated rollback when funnel regression detected after deployment). Level 5: predictive monitoring (ML models predict funnel problems before they occur based on leading indicators)'"
    weight: 0.30
    description: "Operations"
