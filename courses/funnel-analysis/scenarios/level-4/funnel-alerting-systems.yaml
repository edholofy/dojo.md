meta:
  id: funnel-alerting-systems
  level: 4
  course: funnel-analysis
  type: output
  description: "Funnel alerting systems — design intelligent alerting that reduces noise, prioritizes by business impact, and integrates with organizational workflows"
  tags: [alerting, intelligent-alerts, noise-reduction, incident-management, expert]

state: {}

trigger: |
  The Director of Analytics says: "We set up funnel alerts last
  quarter but now nobody pays attention to them. We get 50+ alerts
  per week, most are false positives, and the team has alert fatigue.
  I need an intelligent alerting system that surfaces real problems
  and suppresses noise."

  Task: Design an intelligent funnel alerting system that minimizes
  false positives, prioritizes alerts by business impact, and
  integrates with team workflows.

assertions:
  - type: llm_judge
    criteria: "Response covers intelligent alert design with noise reduction — design: 'Intelligent funnel alert design: the alert fatigue problem: 50 alerts/week with 90% false positive rate = 5 real alerts buried in 45 false alarms. After 2 weeks, the team stops investigating entirely. Even real problems go unnoticed. Noise reduction through intelligent thresholds: Static thresholds (current, problematic): alert if checkout conversion drops below 55%. This fires every time there is normal fluctuation below 55% (weekends, holidays, off-peak hours). Dynamic thresholds (improved): alert if checkout conversion is below the expected value minus 2 standard deviations, where expected value is calculated from: day-of-week adjustment (weekends are naturally lower). Hour-of-day adjustment (night hours have different patterns). Seasonal adjustment (holidays, sales events). Trend adjustment (gradual improvements do not trigger false alerts). This reduces false positives by 70-80% while maintaining sensitivity to real anomalies. Multi-signal confirmation: do not alert on a single metric in isolation. Instead, require confirmation from correlated signals: primary signal: checkout conversion dropped 5pp. Confirming signal 1: checkout page error rate increased. Confirming signal 2: checkout page load time increased by 2 seconds. Confirming signal 3: support tickets about checkout issues spiked. With all confirming signals: high confidence this is a real problem. Without confirming signals: likely a traffic quality shift, not a product issue. Minimum duration requirement: require the anomaly to persist for a minimum duration before alerting. For hourly metrics: 2 consecutive anomalous hours. For daily metrics: 2 consecutive anomalous days. This eliminates transient noise (a single bad hour) while catching sustained problems. Alert deduplication: if the same anomaly triggers alerts across multiple related metrics (checkout conversion, checkout volume, checkout error rate), consolidate into a single alert with all related metrics included'"
    weight: 0.35
    description: "Design"
  - type: llm_judge
    criteria: "Response covers impact-based prioritization — prioritization: 'Impact-based alert prioritization: every alert should include an estimated business impact: impact calculation: affected users = (current traffic at the step) × (baseline rate - current rate). Revenue impact = affected users × downstream conversion rate × AOV. Example: checkout conversion dropped from 58% to 50%. Current checkout entries: 500/hour. Affected users: 500 × (0.58 - 0.50) = 40 users/hour not converting. Revenue impact: 40 × $85 AOV = $3,400/hour lost revenue. If unresolved for 8 business hours: $27,200 lost. This quantification enables: engineers to prioritize based on business impact, not technical severity. Leadership to understand the cost of slow response. Post-incident analysis of actual business loss. Priority tiers based on impact: P0 — Critical ($10,000+/hour impact or total outage): page on-call engineer immediately. Automated incident creation in PagerDuty/Opsgenie. Executive notification within 15 minutes. Target response: 5 minutes, target resolution: 1 hour. Frequency: fewer than 1 per month. P1 — High ($1,000-$10,000/hour impact): Slack alert to engineering channel. Incident created manually if not resolved within 30 minutes. Target response: 15 minutes, target resolution: 4 hours. Frequency: 2-4 per month. P2 — Medium ($100-$1,000/hour impact): email notification to analytics and product teams. Included in daily standup if unresolved. Target response: 2 hours, target resolution: 24 hours. Frequency: 4-8 per month. P3 — Low (under $100/hour or trend-based): included in weekly digest. Investigated during regular analytics review. Target response: 48 hours. Frequency: 10-15 per month. Alert budget: set an organizational alert budget: maximum 5-8 actionable alerts per week that require human response. If the system generates more, the thresholds need tuning. Track alert precision quarterly: if precision drops below 50% (more than half of alerts are false positives), retune thresholds'"
    weight: 0.35
    description: "Prioritization"
  - type: llm_judge
    criteria: "Response covers workflow integration and continuous improvement — workflow: 'Workflow integration: alert routing: route alerts to the team best positioned to investigate and resolve. Funnel step | primary routing | secondary routing. Homepage/landing: marketing team | web engineering. Signup/registration: growth team | product engineering. Activation/onboarding: product team | product engineering. Pricing/checkout: revenue team | payment engineering. Cross-funnel (all steps affected): data engineering | on-call engineer. Routing logic: if the alert is correlated with a recent deployment → route to the deploying team. If the alert is segment-specific (mobile only) → route to the mobile team. If the alert is geography-specific → route to the localization team. If no clear correlation → route to the analytics on-call for initial triage. Integration with existing tools: Slack: alerts posted to team-specific channels with actionable context. Jira/Linear: P0 and P1 alerts auto-create tickets with pre-populated fields. PagerDuty: P0 alerts trigger on-call escalation. Dashboards: anomalous metrics highlighted with red borders and annotation. Runbooks: alert includes a link to the relevant investigation runbook. Continuous improvement: alert lifecycle tracking: for every alert, track: time to acknowledge (was it seen?). Time to investigate (was it triaged?). Time to resolve (was the root cause fixed?). Outcome: true positive (real problem found) or false positive (no issue). Business impact: confirmed revenue loss or confirmed non-impact. Monthly alert review: review all alerts from the past month. Calculate: alert precision (true positives ÷ total alerts). Alert recall (real problems caught ÷ total real problems, including those found manually). Mean time to detect (MTTD). Mean time to resolve (MTTR). Quarterly threshold tuning: adjust thresholds based on precision/recall analysis. Tighten thresholds for alerts with high false positive rates. Loosen thresholds for areas where real problems were missed. Add new alerts for failure modes discovered during incidents. The flywheel: better alerts → faster detection → faster resolution → less business impact → more trust in alerting → team actually responds to alerts → better outcomes'"
    weight: 0.30
    description: "Workflow"
