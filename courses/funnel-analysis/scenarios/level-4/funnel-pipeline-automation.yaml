meta:
  id: funnel-pipeline-automation
  level: 4
  course: funnel-analysis
  type: output
  description: "Funnel pipeline automation — automate the end-to-end funnel analysis workflow from data collection through insight generation and action triggering"
  tags: [automation, pipeline, workflow, self-healing, expert]

state: {}

trigger: |
  The Head of Data says: "Our funnel analysis workflow is mostly
  manual. An analyst runs queries, builds dashboards, writes reports,
  and sends them to stakeholders every week. This takes 2 days of
  analyst time per week and is error-prone. I want to automate the
  entire pipeline from data collection to insight delivery to action
  triggering."

  Task: Design an end-to-end automated funnel analysis pipeline that
  minimizes manual effort while maintaining quality and relevance.

assertions:
  - type: llm_judge
    criteria: "Response covers the end-to-end automation architecture — architecture: 'End-to-end funnel analysis automation architecture: Stage 1 — Automated data collection and processing: event ingestion: continuous (Kafka, already in place). Data cleaning: automated daily pipeline with validation gates (deduplication, bot filtering, schema validation). Funnel computation: automated daily recalculation of all certified funnel metrics. Segmentation: automated segmented funnel computation (by device, channel, geography, cohort). Delivery: results written to analytical tables, available in BI tools within 4 hours of the day ending. Stage 2 — Automated insight generation: what used to take an analyst 2 hours of querying and interpreting, automate through rule-based and ML-powered insight detection. Rule-based insights: if step X conversion changed more than 2pp week-over-week: generate insight — step X conversion [increased/decreased] by [N]pp. If segment gap widened (mobile vs desktop difference grew by 5pp+): generate insight — mobile-desktop gap for step X widened significantly. If a newly launched feature correlates with conversion change: generate insight — users who used [feature] converted at [N]% vs [M]% for non-users. ML-powered insights: anomaly detection identifies unexpected patterns. Trend analysis detects accelerating or decelerating improvement. Correlation analysis identifies metrics moving together unexpectedly. Insight formatting: each auto-generated insight should follow a template: what changed: checkout conversion dropped from 58% to 53% week-over-week. Why it likely matters: this represents approximately 250 fewer purchases/week ($21,250 revenue impact). Probable cause: the drop is concentrated in mobile Safari (from 52% to 38%). Recommended action: investigate recent changes to mobile checkout experience. Confidence level: high (3σ deviation, corroborated by support ticket spike). Stage 3 — Automated report generation: weekly funnel report auto-generated every Monday at 6am. Structure: executive summary (2-3 sentences with the key takeaway). Funnel snapshot (table with week-over-week comparison). Insights section (top 3-5 auto-generated insights, ranked by business impact). Experiment update (active tests with current results). Action items (carry-forward items from previous weeks + new recommendations). Format: generated as a Slack message, email, and PDF. The analyst reviews and edits for 30 minutes instead of building from scratch for 2 days'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers self-healing and error handling — self-healing: 'Self-healing pipeline design: automated error detection and recovery: Error type 1 — Data pipeline failure: detection: pipeline monitoring checks for completion status at expected time. Auto-recovery: retry the failed stage up to 3 times with exponential backoff. If retries fail: alert the data engineering team AND serve the last known good data to dashboards. The dashboard shows a staleness indicator: data as of [last successful run timestamp]. Error type 2 — Data quality anomaly: detection: validation gates catch issues (step 1 count less than step 2 count). Auto-recovery: quarantine the suspicious data. Run diagnostic queries to identify the source (which events are problematic?). Attempt auto-correction: if the issue is a known pattern (e.g., duplicate events from a specific source), apply the known fix automatically. If auto-correction fails: alert the data quality team with the diagnostic output. Error type 3 — Insight generation false positive: detection: an analyst marks an auto-generated insight as not relevant or incorrect. Feedback loop: the system learns from dismissed insights. If similar insights are dismissed 3+ times, adjust the threshold for that pattern. Over time, the insight engine becomes more accurate. Error type 4 — Stale funnel definitions: detection: a funnel definition references an event that has not been observed in 30+ days. Possible causes: the product removed the feature, the tracking was changed, or the event was renamed. Auto-response: flag the stale funnel definition for review. Suggest alternative events that may represent the same user action. Alert the funnel owner. Self-monitoring metrics: pipeline reliability: percentage of days with successful, on-time delivery (target: 99%+). Auto-recovery success rate: percentage of errors resolved without human intervention (target: 80%+). Insight precision: percentage of auto-generated insights rated as relevant by analysts (target: 70%+). Mean time to auto-recover: average time from error detection to automatic resolution (target: under 30 minutes)'"
    weight: 0.35
    description: "Self-healing"
  - type: llm_judge
    criteria: "Response covers action triggering and ROI measurement — actions: 'Automated action triggering: closing the loop from insight to action: the most valuable automation is not just detecting problems but initiating responses. Automated action types: Type 1 — Notification actions (low risk, high frequency): when funnel anomaly detected: send Slack alert to relevant team. When weekly report ready: distribute to stakeholder list. When experiment reaches significance: notify experiment owner. Type 2 — Escalation actions (medium risk, medium frequency): when P0 anomaly persists for 30+ minutes: create incident ticket and page on-call. When a funnel step drops below a business-critical threshold: escalate to VP level. When data quality issue affects executive dashboard: flag the dashboard with a warning banner. Type 3 — Product actions (higher risk, lower frequency): when cart abandonment detected: trigger abandoned cart email sequence. When a high-value lead shows buying signals: create a sales task in CRM. When a user is at risk of churning (funnel engagement declining): trigger retention intervention. Type 4 — Experimental actions (highest risk, lowest frequency): when a winning experiment reaches 99% confidence: auto-graduate the variant to 100% of users (requires pre-approval from product owner). When a losing experiment reaches significance: auto-stop the experiment and revert to control. These should have guardrails: only auto-graduate experiments with pre-registered criteria met. Require human approval for any action that changes the user experience for more than 10% of users. Maintain a kill switch for any automated action. ROI of the automation program: time saved: analyst time reduced from 16 hours/week to 4 hours/week (review and editing). 12 hours/week saved × $75/hour × 52 weeks = $46,800/year in analyst productivity. Faster detection: mean time to detect funnel issues reduced from 5 days to 30 minutes. Revenue preserved: each hour of faster detection saves approximately $1,000-$5,000 in lost revenue. Estimated: $50,000-$100,000/year in preserved revenue. Better insights: automated analysis catches patterns humans miss. Consistent analysis: no human variability in methodology or focus. Total ROI: $100,000-$150,000/year in combined savings and preserved revenue. Implementation cost: 3-4 months of engineering effort + $2,000-$5,000/month infrastructure. Payback period: 4-6 months'"
    weight: 0.30
    description: "Actions"
