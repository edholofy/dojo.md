meta:
  id: funnel-data-pipelines
  level: 4
  course: funnel-analysis
  type: output
  description: "Funnel data pipelines — design robust ETL/ELT pipelines that reliably transform raw events into funnel-ready analytical datasets"
  tags: [data-pipelines, etl, data-engineering, reliability, expert]

state: {}

trigger: |
  The data engineering lead says: "Our funnel data pipeline is a mess.
  It breaks every other week, takes 6 hours to run, produces different
  numbers depending on when you query it, and nobody understands the
  transformation logic anymore. I need to rebuild it properly."

  Task: Design a reliable funnel data pipeline with proper
  transformation logic, validation gates, idempotent processing,
  and observability.

assertions:
  - type: llm_judge
    criteria: "Response covers pipeline architecture and transformation design — pipeline: 'Funnel data pipeline architecture: pipeline stages: Stage 1 — Ingestion (raw events → landing zone): ingest raw events from Kafka into a landing zone (S3 or equivalent). Partitioned by date and hour: s3://data-lake/raw/events/dt=2024-01-15/hr=14/. Format: Parquet (columnar, compressed, schema-enforced). Retention: raw data retained for 2 years (regulatory and debugging). No transformations at this stage — preserve the raw event exactly as received. Stage 2 — Cleaning and deduplication (landing zone → cleaned layer): deduplication: use event_id to remove duplicate events (network retries, double-clicks). Method: select distinct on event_id within a 24-hour window. Bot filtering: remove events from known bot user agents. Remove events from internal IP addresses. Remove events with impossible patterns (1,000 page views in 1 minute). Data type enforcement: cast timestamps to UTC datetime. Validate user_id format. Validate required fields are present (event_name, timestamp, user_id). Quarantine invalid events (do not discard — move to a quarantine table for investigation). Stage 3 — Sessionization (cleaned → sessionized): group events into user sessions. Session definition: a session starts with the first event and ends after 30 minutes of inactivity. Each session gets a unique session_id. Cross-device sessions: if identity resolution links two device IDs to the same user, merge sessions that overlap temporally. Output: enriched events with session_id, session_sequence_number, and is_session_start/end flags. Stage 4 — Funnel stage assignment (sessionized → funnel-ready): for each funnel definition, determine which stage each user has reached. Example: signup funnel stages: stage 1: visited homepage (event: page_view, page=/). Stage 2: clicked signup (event: button_click, button=signup). Stage 3: submitted form (event: form_submit, form=signup_form). Stage 4: verified email (event: email_verified). Stage 5: completed onboarding (event: onboarding_complete). Assignment logic: for each user, find the LATEST stage they reached within the conversion window. User A: visited homepage (stage 1), clicked signup (stage 2), submitted form (stage 3) — assigned to stage 3. Handle out-of-order events: use timestamp ordering, not ingestion ordering. Stage 5 — Aggregation (funnel-ready → analytical tables): pre-compute daily funnel aggregates: date | funnel_id | step | segment | user_count | converted_count | conversion_rate. These tables power the dashboards and reports'"
    weight: 0.35
    description: "Pipeline"
  - type: llm_judge
    criteria: "Response covers reliability and idempotent processing — reliability: 'Pipeline reliability engineering: idempotent processing: every pipeline stage must be idempotent — running it twice with the same input produces the same output. This is critical because: pipelines fail mid-run and need to be restarted. Late-arriving data requires reprocessing historical windows. Bug fixes require backfilling corrected data. Implementation: use MERGE or INSERT OVERWRITE (not INSERT) for all writes. Partition data by processing date — reprocessing overwrites the partition. Each pipeline run writes to a staging table first, then atomically swaps into the production table. Exactly-once semantics: the combination of deduplication (stage 2) and idempotent writes ensures exactly-once processing even if the pipeline runs multiple times. Validation gates: after each pipeline stage, run validation checks before proceeding. Gate 1 (post-cleaning): row count within 10% of expected (based on historical average). No null user_ids (should be 0 after cleaning). Duplicate rate below 0.01% (deduplication was effective). Gate 2 (post-sessionization): average session length within historical norms (3-8 minutes). Sessions per user within expected range (1-5 per day). No sessions spanning more than 24 hours (indicates sessionization bug). Gate 3 (post-funnel-assignment): funnel step counts are monotonically decreasing (step 1 ≥ step 2 ≥ step 3). Conversion rates within historical bounds (±5pp of 30-day average). No step has 0 users (unless the funnel is genuinely unused). If any gate fails: halt the pipeline. Alert the data engineering team. Serve the last known good data to dashboards (stale but correct is better than fresh but wrong). Backfill and recovery: late-arriving events: events that arrive after the initial processing window. Solution: run a daily late-arrival sweep that reprocesses the last 72 hours of data, merging late events into existing partitions. Pipeline failure recovery: each stage logs a checkpoint upon completion. On restart, resume from the last completed checkpoint. Full reprocessing: design the pipeline to reprocess any historical period on demand. Test this capability monthly — you will need it during incidents'"
    weight: 0.35
    description: "Reliability"
  - type: llm_judge
    criteria: "Response covers observability and operational excellence — observability: 'Pipeline observability: monitoring metrics: 1. Pipeline execution metrics: run duration by stage (track 7-day trend). Row counts at each stage (input vs output). Error and quarantine rates. Processing latency (time from event occurrence to availability in analytical tables). 2. Data quality metrics: deduplication rate (should be stable, a spike indicates a source problem). Bot traffic percentage (should be stable, a spike indicates a bot attack). Schema violation rate (should be near zero). Funnel consistency check results (step counts monotonically decreasing). 3. Infrastructure metrics: compute resource utilization (CPU, memory, I/O). Storage growth rate. Query performance on analytical tables. Alerting: P0 alert: pipeline has not completed within 2x the normal duration. P1 alert: validation gate failed (data quality issue). P2 alert: processing latency exceeds SLA (data is stale). Documentation and maintainability: the original problem (nobody understands the transformation logic) is a documentation and code quality issue. Solutions: 1. SQL documentation: every transformation query should have a header comment explaining WHAT it does and WHY. Not: join users with events. Instead: join users with events to resolve cross-device identity, handling the case where a user has multiple device IDs by selecting the earliest created account. 2. Data lineage: track which upstream tables feed into which downstream tables. When a bug is found in a source table, lineage shows which downstream tables are affected. Tools: dbt lineage, or custom metadata tracking. 3. Data dictionary: define every column in every table. Include: data type, source, business definition, example values, known quirks. This prevents the new engineer from spending a week figuring out what session_bounce_flag means. 4. Runbook: document how to: restart a failed pipeline, reprocess a specific date range, add a new funnel definition, investigate data quality alerts. Testing: unit tests for transformation logic (given this input, expect this output). Integration tests for end-to-end pipeline (feed sample data through all stages, verify final output). Data quality tests that run in CI/CD (prevent merging a change that breaks validation gates)'"
    weight: 0.30
    description: "Observability"
