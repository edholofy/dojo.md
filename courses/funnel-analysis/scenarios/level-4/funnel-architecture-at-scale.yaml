meta:
  id: funnel-architecture-at-scale
  level: 4
  course: funnel-analysis
  type: output
  description: "Funnel architecture at scale — design data infrastructure to support funnel analysis across millions of users, multiple products, and real-time requirements"
  tags: [architecture, scale, data-infrastructure, performance, expert]

state: {}

trigger: |
  The VP of Engineering asks: "We have 50 million monthly users across
  3 products. Our funnel queries take 45 minutes to run, our data is
  24 hours stale, and adding a new funnel step requires a 2-week
  engineering project. I need a funnel data architecture that scales.
  What should we build?"

  Task: Design a scalable funnel data architecture that handles
  high-volume event streams, enables near-real-time funnel analysis,
  and allows self-serve funnel creation by non-engineers.

assertions:
  - type: llm_judge
    criteria: "Response covers the data architecture design — architecture: 'Scalable funnel data architecture: Layer 1 — Event collection and streaming: event volume: 50M users × average 20 events/session × 3 sessions/month = 3 billion events/month (approximately 1,150 events/second average, 10,000/second peak). Technology: Apache Kafka or Amazon Kinesis for event streaming. Event schema: standardized event format with: event_id (UUID, for deduplication). user_id (unified cross-product identity). timestamp (UTC, millisecond precision). event_name (standardized taxonomy: page_view, button_click, form_submit, purchase). properties (JSON: product_id, page_url, device, session_id). Schema registry: enforce event schemas to prevent data quality issues. Schema evolution: add new properties without breaking existing consumers. Layer 2 — Stream processing (near-real-time): Apache Flink or Kafka Streams for real-time event processing. Real-time aggregations: compute funnel step counts every 5 minutes. Sessionization: stitch events into user sessions in real-time. Identity resolution: resolve cross-device user IDs as events arrive. Output to real-time dashboard (sub-5-minute latency for funnel metrics). Layer 3 — Analytical data store: columnar storage for historical funnel analysis: ClickHouse, Apache Druid, or BigQuery. Pre-aggregated funnel tables: daily step counts by segment (device, channel, geography, product). User-level funnel stage tracking (current stage per user, time in stage). Funnel definition table (metadata for self-serve funnel creation). Partitioning: by date and product for query performance. Materialized views: pre-compute common funnel queries (top 10 most-used funnels refreshed every hour). Query performance target: any funnel query returns in under 10 seconds (vs current 45 minutes). Layer 4 — Self-serve funnel builder: a UI or configuration layer that allows analysts and PMs to: define new funnels by selecting events and ordering them. Set conversion windows (7-day, 14-day, 30-day). Apply segments (device, geography, cohort). Schedule automated reports. No engineering involvement required for standard funnel creation. Implementation: funnel definitions stored as JSON configuration. A query engine translates funnel definitions into optimized SQL queries against the analytical store. Caching: frequently accessed funnels cached with 15-minute refresh'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers multi-product funnel challenges — multi-product: 'Multi-product funnel challenges and solutions: cross-product identity: the 3 products may have different user ID systems. Solution: build a unified identity graph. Map product-specific IDs to a canonical user ID. Handle: same user with different accounts across products. Shared accounts (family, team). Anonymous-to-identified transitions. Cross-product funnels: users may start in product A and convert in product B. Example: user discovers the brand through the free tool (product A). User signs up for the main product (product B). User upgrades to the enterprise suite (product C). Without cross-product funnels, each product team only sees their slice. With cross-product funnels: product A appears to have low conversion (users leave for product B). Product B appears to have high conversion (inheriting pre-qualified users from A). The cross-product funnel reveals that product A is a critical acquisition channel for product B. Product-specific vs unified funnels: maintain both: product-specific funnels for product team optimization (each team owns their funnel). Unified funnels for business-level analysis (how do users flow across the portfolio). Cross-product metrics: cross-product adoption rate: what percentage of product A users also use product B? Cross-product LTV: users who use 2+ products have 3-5x higher LTV. Product interaction funnel: product A trial → product A paid → product B adoption → product C enterprise. Data governance across products: each product may have different data retention policies, privacy requirements, and regulatory constraints. Build a data governance layer that: enforces data access permissions by team. Applies PII masking for non-privileged queries. Maintains audit trails for data access. Respects product-specific data deletion requirements (GDPR right to be forgotten must cascade across all products)'"
    weight: 0.35
    description: "Multi-product"
  - type: llm_judge
    criteria: "Response covers performance optimization and operational considerations — operations: 'Performance optimization: query optimization strategies: 1. Pre-aggregation: compute daily/hourly funnel step counts at ingestion time. Most funnel queries only need aggregated counts, not user-level data. Pre-aggregated queries: 0.5 seconds. User-level queries: 10-30 seconds. Full raw scan: 45 minutes (current state — avoid this). 2. Bitmap indexes: for funnel step membership queries (which users completed step 3?). Bitmap operations (AND, OR) are extremely fast for set intersection. Users who completed step 1 AND step 2 AND step 3 = bitmap intersection. 3. Approximate algorithms: for directional analysis, use approximate count distinct (HyperLogLog). 95% accurate with 100x less computation. Use for: real-time dashboard, exploratory analysis. Switch to exact counts for: executive reports, financial projections. 4. Query caching and materialization: cache the top 50 most-run funnel queries. Refresh materialized views on a schedule (every 15 minutes for real-time, hourly for standard). Invalidate cache when underlying data or funnel definitions change. Operational considerations: monitoring: track query latency percentiles (p50, p95, p99). Alert on data freshness (if data is more than 30 minutes stale, something is wrong). Monitor event volume for anomalies (sudden drops indicate tracking failures). Cost management: raw event storage grows linearly with user base. Implement tiered storage: hot (last 90 days, fast queries), warm (90 days to 1 year, slower), cold (1+ year, archival). Estimate: at 3 billion events/month, storage costs approximately $5,000-$15,000/month depending on platform. Migration strategy: do not build the full architecture at once. Phase 1 (month 1-2): implement event streaming and standardized schema. Phase 2 (month 3-4): build the analytical store with pre-aggregation. Phase 3 (month 5-6): add the self-serve funnel builder. Phase 4 (month 7-8): add real-time processing and cross-product identity. Each phase delivers independent value while building toward the complete architecture'"
    weight: 0.30
    description: "Operations"
