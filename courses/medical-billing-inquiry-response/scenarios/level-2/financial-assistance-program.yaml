meta:
  id: financial-assistance-program
  level: 2
  course: medical-billing-inquiry-response
  type: output
  description: "Design a comprehensive patient financial assistance program — develop charity care policies, sliding fee scales, financial counseling workflows, and ACA compliance documentation"
  tags: [financial-assistance, charity-care, sliding-scale, intermediate]

state: {}

trigger: |
  Design a comprehensive patient financial assistance
  program for a nonprofit hospital system that must
  comply with ACA Section 501(r) requirements.

  Organization: Community Medical Center
  - 250-bed nonprofit hospital
  - Annual gross patient revenue: $180M
  - Uncompensated care budget: $8M
  - Current charity care: Ad hoc, no formal policy
  - Uninsured patient volume: 8% of discharges
  - Underinsured patients with high balances: 15%
  - Community demographics: 30% below 200% FPL
  - Bad debt write-offs: $12M annually

  ACA 501(r) requirements:
  - Written financial assistance policy (FAP)
  - Written emergency medical care policy
  - Billing and collection limitations
  - Community health needs assessment
  - FAP must be widely publicized
  - Must offer discounts to FAP-eligible patients

  Program design parameters:
  - Free care for patients below 200% FPL
  - Sliding scale for 200-400% FPL
  - Emergency department care available regardless
    of ability to pay
  - Must apply to all hospital services
  - Collections may not begin until FAP eligibility
    has been assessed
  - Credit reporting restrictions per new regulations

  Create:
  1. Financial assistance policy (FAP)
  2. Sliding fee scale design
  3. Patient screening and enrollment workflow
  4. Staff training on financial counseling
  5. Community outreach and publicity plan
  6. Billing and collections limitations policy
  7. Compliance monitoring framework
  8. Financial impact analysis

assertions:
  - type: llm_judge
    criteria: "Sliding fee scale is fair and practical — provides free care at 200% FPL and below, then graduates discounts (e.g., 75% discount at 200-250% FPL, 50% at 250-300%, 25% at 300-400%); the scale considers family size and uses current federal poverty guidelines."
    weight: 0.35
    description: "SlidingFeeScaleDesign"
  - type: llm_judge
    criteria: "Billing and collections limitations comply with 501(r) — no extraordinary collection actions (liens, wage garnishment, lawsuits) until the hospital has made reasonable efforts to determine FAP eligibility; provides at least 240 days from first billing before collection actions."
    weight: 0.35
    description: "CollectionsLimitations"
  - type: llm_judge
    criteria: "Financial impact analysis demonstrates that a formal FAP actually reduces bad debt — patients who are screened and enrolled in financial assistance generate less bad debt than patients who simply don't pay; converting $12M bad debt into $8M structured charity care improves both finances and community benefit reporting."
    weight: 0.30
    description: "FinancialImpactAnalysis"
