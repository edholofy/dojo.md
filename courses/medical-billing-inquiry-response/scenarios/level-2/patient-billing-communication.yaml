meta:
  id: patient-billing-communication
  level: 2
  course: medical-billing-inquiry-response
  type: output
  description: "Design patient-centered billing communication — create billing statement redesigns, proactive financial notifications, and empathetic collection scripts that reduce patient confusion and complaints"
  tags: [billing-communication, statement-design, patient-centered, intermediate]

state: {}

trigger: |
  Redesign patient billing communications for a
  practice that receives 200+ billing-related patient
  complaints per month, most of which stem from
  confusing bills and poor communication.

  Practice: Westside Medical Group
  - 30 providers, multi-specialty
  - Monthly statements mailed: 8,000
  - Monthly billing calls received: 1,200
  - Monthly complaints: 220 (target: under 50)
  - Patient satisfaction (billing): 2.3/5

  Top complaint categories:
  1. "I don't understand my bill" (35%)
  2. "I thought insurance covered this" (25%)
  3. "I already paid this" (15%)
  4. "Nobody told me this would cost extra" (12%)
  5. "The bill came too late" (8%)
  6. "The person I spoke with was rude" (5%)

  Current billing statement issues:
  - Dense, text-heavy format with medical jargon
  - No visual hierarchy — all charges look the same
  - Insurance adjustments shown as negative numbers
  - Multiple dates of service on one statement
  - Payment history not clearly shown
  - No clear call-to-action or payment options
  - Return envelope but no online payment link

  Create:
  1. Billing statement redesign
  2. Pre-service cost notification template
  3. Post-claim patient notification
  4. Empathetic billing call scripts
  5. Digital payment integration plan
  6. Patient billing FAQ document
  7. Staff training on empathetic communication

assertions:
  - type: llm_judge
    criteria: "Statement redesign addresses the #1 complaint — uses clear visual hierarchy, plain language descriptions of services, shows 'What we billed → What insurance paid → What you owe' in a simple flow; the patient can understand their balance in under 30 seconds."
    weight: 0.35
    description: "StatementClarity"
  - type: llm_judge
    criteria: "Pre-service cost notification addresses 'Nobody told me this would cost extra' — provides estimated out-of-pocket costs BEFORE the service based on benefits verification; sets realistic expectations and eliminates surprise bills from the patient's perspective."
    weight: 0.35
    description: "PreServiceNotification"
  - type: llm_judge
    criteria: "Empathetic call scripts transform billing conversations — replace transactional language ('You owe $X') with empathetic framing ('I understand this is unexpected. Let me walk you through what happened and what your options are.'); includes de-escalation techniques for upset patients."
    weight: 0.30
    description: "EmpatheticScripts"
