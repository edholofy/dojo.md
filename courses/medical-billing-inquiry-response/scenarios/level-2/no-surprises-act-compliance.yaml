meta:
  id: no-surprises-act-compliance
  level: 2
  course: medical-billing-inquiry-response
  type: output
  description: "Implement No Surprises Act compliance for billing operations — develop policies for good faith estimates, balance billing prohibitions, and independent dispute resolution"
  tags: [no-surprises-act, compliance, idr-process, intermediate]

state: {}

trigger: |
  Implement comprehensive No Surprises Act compliance
  for a multi-specialty practice that has been found
  non-compliant in several areas during a state
  insurance department review.

  Practice: Metro Medical Associates
  - 25 providers across 5 specialties
  - Mix of in-network and out-of-network patients
  - Monthly patient volume: 3,000
  - Uninsured patients: 12% of volume

  Compliance gaps identified:

  1. Good Faith Estimates:
  - GFEs not being provided to uninsured patients
  - When provided, GFEs don't include all expected
    services (missing ancillary services like labs,
    imaging, anesthesia)
  - GFEs not provided within required timeframe
    (3 business days before service)

  2. Balance billing violations:
  - Out-of-network providers balance billing patients
    who received services at in-network facilities
  - Emergency services being balance billed
  - Patient consent forms for out-of-network care
    don't meet NSA requirements

  3. Patient notice requirements:
  - No posted notices about NSA rights in facility
  - No notice provided with scheduling confirmation
  - Notice language doesn't include required elements

  4. IDR process:
  - Practice unaware of independent dispute resolution
    process for payment disputes with insurers
  - No staff trained on IDR filing
  - Missing timelines for IDR participation

  State insurance department has given 60 days to
  demonstrate full compliance or face penalties.

  Create:
  1. Compliance remediation plan
  2. GFE generation workflow and templates
  3. Balance billing policy revision
  4. Patient notice documents
  5. IDR participation procedures
  6. Staff training curriculum
  7. Ongoing compliance monitoring

assertions:
  - type: llm_judge
    criteria: "GFE workflow addresses the most common gaps — includes all convening providers and facilities (not just the primary provider), provides estimates within the 3-business-day requirement, calculates all reasonably expected services for the episode of care, and documents delivery to the patient."
    weight: 0.35
    description: "GFEWorkflowCompleteness"
  - type: llm_judge
    criteria: "Balance billing policy revision correctly identifies prohibited vs. permitted balance billing — emergency services CANNOT be balance billed regardless of network status; non-emergency services at in-network facilities by out-of-network providers CANNOT be balance billed unless valid consent is obtained with all NSA-required disclosures."
    weight: 0.35
    description: "BalanceBillingPolicy"
  - type: llm_judge
    criteria: "IDR procedures prepare the practice for both initiating and responding to disputes — covers the 30-day open negotiation period, IDR filing requirements, batching rules for similar claims, evidence submission, and the binding nature of IDR decisions."
    weight: 0.30
    description: "IDRPreparedness"
