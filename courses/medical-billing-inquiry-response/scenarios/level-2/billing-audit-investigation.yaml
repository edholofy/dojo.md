meta:
  id: billing-audit-investigation
  level: 2
  course: medical-billing-inquiry-response
  type: output
  description: "Conduct a billing accuracy audit — investigate systematic billing errors, identify root causes, and develop corrective action plans to reduce errors and improve revenue integrity"
  tags: [billing-audit, revenue-integrity, error-investigation, intermediate]

state: {}

trigger: |
  Conduct a billing accuracy audit after a whistleblower
  complaint alleges systematic overbilling at a
  medical practice.

  Practice: Premier Cardiology Associates
  - 6 cardiologists, 3 NPs
  - Annual billing: $12M
  - Monthly claim volume: 3,500

  Whistleblower allegations:
  1. Routine follow-up visits consistently coded at
     the highest level (99215) regardless of complexity
  2. EKGs billed for patients who didn't receive them
  3. Stress tests billed with both professional and
     technical components when only professional was
     performed
  4. Modifier -25 appended to virtually every E/M
     code to justify separate procedure billing

  Audit sample: 200 randomly selected patient encounters
  from the past 6 months

  Audit findings:
  - E/M coding distribution:
    * 99215 (highest): 62% of visits (benchmark: 15-20%)
    * 99214: 25% (benchmark: 40-50%)
    * 99213: 10% (benchmark: 25-30%)
    * 99212/99211: 3% (benchmark: 10-15%)
  - EKG billing: 12 instances of EKG charges without
    corresponding clinical documentation
  - Stress test billing: 8 instances of dual-component
    billing when only professional component was
    appropriate
  - Modifier -25: Used on 78% of E/M visits (benchmark:
    20-30%)

  Create:
  1. Audit findings report
  2. Statistical analysis of coding patterns
  3. Revenue impact assessment (potential overpayment)
  4. Root cause analysis
  5. Corrective action plan
  6. Voluntary disclosure decision framework
  7. Compliance program recommendations

assertions:
  - type: llm_judge
    criteria: "Audit findings quantify the potential overpayment — the 62% rate of 99215 vs. the 15-20% benchmark suggests systematic upcoding; calculates the estimated overpayment by comparing actual E/M distribution to expected distribution and multiplying by the rate differential per code."
    weight: 0.35
    description: "OverpaymentQuantification"
  - type: llm_judge
    criteria: "Voluntary disclosure decision framework weighs legal, financial, and reputational risks — if the audit confirms systematic overbilling, voluntary self-disclosure to OIG or CMS reduces potential penalties; the framework evaluates whether the findings meet the threshold for False Claims Act liability and recommends engagement of healthcare compliance counsel."
    weight: 0.35
    description: "VoluntaryDisclosureFramework"
  - type: llm_judge
    criteria: "Corrective action plan addresses both the immediate overpayment and systemic causes — implements coding education, documentation improvement, prospective coding audits, and ongoing monitoring; doesn't just fix past errors but prevents future ones."
    weight: 0.30
    description: "CorrectiveActionPlan"
