meta:
  id: price-transparency-compliance
  level: 2
  course: medical-billing-inquiry-response
  type: output
  description: "Implement CMS price transparency requirements — create machine-readable files, consumer-friendly displays, and shoppable services tools while managing competitive concerns"
  tags: [price-transparency, cms-compliance, shoppable-services, intermediate]

state: {}

trigger: |
  Implement CMS hospital price transparency
  requirements that the hospital has been non-compliant
  with, risking significant daily penalties.

  Organization: Lakeside Regional Hospital
  - 300-bed community hospital
  - 15 service lines
  - Annual gross charges: $450M
  - Current compliance: Machine-readable file exists
    but is incomplete; no consumer-friendly display
  - CMS warning letter received: 90 days to comply

  CMS requirements (Hospital Price Transparency Rule):
  1. Machine-readable file containing:
  - All items and services (standard charges)
  - Gross charges
  - Discounted cash price
  - Payer-specific negotiated rates (by payer/plan)
  - De-identified minimum and maximum negotiated rates
  - Must be updated annually, publicly accessible

  2. Consumer-friendly display:
  - At least 300 shoppable services
  - Must include the 70 CMS-specified services
  - For each service: plain language description,
    payer-specific negotiated rates, and discounted
    cash price
  - Must include ancillary services typically
    provided with the primary service

  Challenges:
  - Chargemaster has 12,000+ line items
  - Payer contracts have confidentiality clauses
  - Competitive concerns about publishing rates
  - Data extraction from multiple billing systems
  - Physician practice rates are separate from hospital
  - Annual update requirement needs a sustainable process

  Create:
  1. Compliance implementation plan
  2. Machine-readable file generation process
  3. Consumer-friendly display design
  4. Payer contract confidentiality analysis
  5. Data governance for rate information
  6. Annual update process
  7. Patient communication strategy

assertions:
  - type: llm_judge
    criteria: "Payer contract confidentiality analysis resolves the tension — CMS requirements supersede payer contract confidentiality clauses; the hospital is legally required to publish negotiated rates regardless of contractual language; the analysis identifies which contracts need renegotiation vs. which are preempted by federal law."
    weight: 0.35
    description: "ConfidentialityResolution"
  - type: llm_judge
    criteria: "Consumer-friendly display is truly consumer-friendly — doesn't just list CPT codes and dollar amounts; provides plain language service descriptions ('Knee replacement surgery, including hospital stay, implant, and physical therapy'), expected total cost ranges, and cost comparison tools."
    weight: 0.35
    description: "ConsumerFriendlyDesign"
  - type: llm_judge
    criteria: "Annual update process is sustainable — establishes automated data extraction from billing systems, scheduled file regeneration, validation checks, and public posting; doesn't rely on manual one-time compliance effort that will decay."
    weight: 0.30
    description: "SustainableUpdateProcess"
