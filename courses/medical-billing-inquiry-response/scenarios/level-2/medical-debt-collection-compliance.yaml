meta:
  id: medical-debt-collection-compliance
  level: 2
  course: medical-billing-inquiry-response
  type: output
  description: "Ensure medical debt collection compliance — navigate FDCPA, CFPB regulations, state medical debt laws, and credit reporting requirements for patient accounts sent to collections"
  tags: [debt-collection, fdcpa, cfpb-compliance, intermediate]

state: {}

trigger: |
  Ensure medical debt collection compliance for a
  hospital system that uses a third-party collection
  agency and has received patient complaints about
  aggressive collection practices.

  Organization: Heritage Health System
  - 3 hospitals, 12 clinics
  - Annual patient accounts receivable: $85M
  - Accounts sent to collections annually: $18M
  - Collection agency: National Recovery Services (NRS)
  - Patient complaints about NRS: 35 in the past year
  - State attorney general inquiry received

  Complaint themes:
  - Patients sent to collections without receiving
    financial assistance screening
  - Patients who had payment plans in place still
    sent to collections
  - Collections initiated within 30 days of first bill
  - Threatening language in collection letters
  - Collections for amounts under $500 (overhead exceeds
    recovery for small balances)
  - Patients reported to credit bureaus for disputed bills
  - Collections for balances covered by insurance
    (billing errors not corrected before collections)

  Regulatory landscape:
  - FDCPA (Fair Debt Collection Practices Act)
  - CFPB Regulation F
  - State medical debt protection laws
  - ACA 501(r) for nonprofit hospitals
  - Recent CFPB medical debt credit reporting rules
  - State-specific collection notification requirements

  Create:
  1. Collection practices compliance audit
  2. Revised collection policies and procedures
  3. Pre-collection checklist (before sending to agency)
  4. Collection agency oversight framework
  5. Patient complaint resolution process
  6. Credit reporting compliance procedures
  7. Staff training on compliant collection practices
  8. Attorney general response strategy

assertions:
  - type: llm_judge
    criteria: "Pre-collection checklist prevents the most common complaint causes — verifies financial assistance screening was completed, confirms no active payment plan, ensures minimum billing cycle (at least 120 days), confirms insurance processing is complete, and validates the balance amount before sending to collections."
    weight: 0.35
    description: "PreCollectionChecklist"
  - type: llm_judge
    criteria: "Collection agency oversight framework includes accountability measures — regular audits of NRS practices, patient complaint tracking, script review and approval, call monitoring, compliance with all regulatory requirements, and termination provisions for non-compliance."
    weight: 0.35
    description: "AgencyOversight"
  - type: llm_judge
    criteria: "Attorney general response demonstrates good faith — acknowledges the complaints, presents the remediation plan, provides evidence of corrective actions taken, and commits to ongoing monitoring; doesn't minimize the issues or blame the collection agency."
    weight: 0.30
    description: "AttorneyGeneralResponse"
