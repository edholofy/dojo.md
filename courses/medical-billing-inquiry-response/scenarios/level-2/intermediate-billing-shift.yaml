meta:
  id: intermediate-billing-shift
  level: 2
  course: medical-billing-inquiry-response
  type: output
  description: "Intermediate shift simulation — manage complex billing challenges including a No Surprises Act complaint, multi-payer claim dispute, financial assistance crisis, and a billing audit finding"
  tags: [shift-simulation, complex-billing, multi-scenario, intermediate]

state: {}

trigger: |
  You are the billing manager for a multi-specialty
  medical group. Handle these concurrent challenges
  during an eventful afternoon.

  SITUATION 1 — State insurance department inquiry:
  The state insurance department has forwarded a patient
  complaint about a $6,200 balance bill for emergency
  anesthesia services. The patient was seen in-network
  ER but the anesthesiologist was out-of-network. Your
  practice manages the anesthesiology group's billing.
  Response due in 15 business days.

  SITUATION 2 — Payer clawback demand:
  UnitedHealthcare has sent a demand letter requesting
  repayment of $145,000, claiming they overpaid on
  claims for the past 18 months due to a contract
  rate error. They want payment within 30 days. Your
  review shows some claims may indeed have been overpaid,
  but others were correctly paid.

  SITUATION 3 — Patient financial crisis:
  A long-time patient (treated for cancer over 2 years)
  owes $28,000 across multiple dates of service. She
  was on a payment plan but just lost her job and
  health insurance. She's crying on the phone asking
  if she'll be sued. She still needs ongoing treatment.

  SITUATION 4 — Coding compliance alert:
  Your external coding auditor's quarterly report shows
  that one physician has a 99215 usage rate of 85%
  (vs. practice average of 25%). The auditor recommends
  immediate investigation and possible voluntary
  disclosure.

  Handle all four situations:
  1. State inquiry response strategy
  2. Payer clawback negotiation approach
  3. Patient financial crisis resolution
  4. Coding compliance investigation plan
  5. Priority triage and resource allocation
  6. Documentation of all actions

assertions:
  - type: llm_judge
    criteria: "State inquiry response correctly applies No Surprises Act — emergency anesthesia by an out-of-network provider at an in-network facility is a textbook NSA scenario; the patient should not have been balance billed; the response acknowledges the error and commits to billing correction."
    weight: 0.35
    description: "NSAComplianceResponse"
  - type: llm_judge
    criteria: "Payer clawback response doesn't simply accept the $145,000 demand — requests detailed claim-level breakdown, independently verifies each claim, challenges incorrect overpayment assertions, negotiates a settlement for legitimate overpayments, and requests a reasonable repayment timeline."
    weight: 0.35
    description: "ClawbackNegotiation"
  - type: llm_judge
    criteria: "Cancer patient financial crisis is handled with urgency and compassion — immediately screens for charity care eligibility (job loss + no insurance likely qualifies), places the account on hold from collections, connects her to financial assistance resources, and ensures her ongoing treatment is not interrupted."
    weight: 0.30
    description: "CancerPatientCrisis"
