meta:
  id: denial-management-program
  level: 2
  course: medical-billing-inquiry-response
  type: output
  description: "Build a systematic denial management program — analyze denial patterns, develop appeal strategies, and implement prevention protocols to reduce claim denials"
  tags: [denial-management, appeal-strategy, prevention-protocol, intermediate]

state: {}

trigger: |
  Build a systematic denial management program for
  a medical practice experiencing high denial rates
  that are impacting revenue and patient satisfaction.

  Practice: Valley Orthopedics & Sports Medicine
  - 8 orthopedic surgeons, 4 PAs
  - Monthly claim volume: 2,500
  - Monthly revenue: $2.8M
  - Current denial rate: 14% (industry benchmark: 5-8%)
  - Annual revenue at risk: $4.7M in denied claims
  - Current appeal rate: Only 30% of denials are appealed
  - Appeal success rate: 45% when appealed
  - Net revenue loss from unworked denials: $2.6M annually

  Denial data (past 6 months):

  By denial reason:
  - Prior authorization issues: 28%
  - Medical necessity: 22%
  - Coding errors: 18%
  - Timely filing: 12%
  - Duplicate claims: 8%
  - Coordination of benefits: 7%
  - Patient eligibility: 5%

  By payer:
  - UHC: 22% denial rate (highest)
  - Cigna: 18%
  - Aetna: 14%
  - BCBS: 10%
  - Medicare: 8%

  By service type:
  - Surgical procedures: 18% denial rate
  - Advanced imaging (MRI/CT): 20%
  - Physical therapy: 12%
  - Office visits: 6%
  - DME/orthotics: 25% (highest)

  Create:
  1. Denial analysis report
  2. Appeal prioritization framework
  3. Prevention strategy by denial category
  4. Payer-specific denial reduction tactics
  5. Staff accountability and training plan
  6. KPI dashboard for denial management
  7. ROI projection for the program

assertions:
  - type: llm_judge
    criteria: "Appeal prioritization framework maximizes recovery ROI — prioritizes appeals by dollar value and win probability; $2.6M in unworked denials represents a massive opportunity; appeals for medical necessity (22%) and prior auth (28%) likely have the highest recovery potential."
    weight: 0.35
    description: "AppealPrioritization"
  - type: llm_judge
    criteria: "Prevention strategies target root causes — prior authorization denials need a pre-service verification workflow, coding errors need coder education and audit, timely filing needs submission tracking alerts, and duplicate claims need claims scrubbing; each prevention strategy addresses a specific failure mode."
    weight: 0.35
    description: "RootCausePrevention"
  - type: llm_judge
    criteria: "ROI projection demonstrates clear financial impact — if the program reduces denial rate from 14% to 8% and increases appeal rate from 30% to 80%, the annual revenue recovery is quantified; the cost of denial management staff and systems is offset by recovery multiples."
    weight: 0.30
    description: "ROIProjection"
