meta:
  id: health-equity-billing-access
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Design health equity-centered billing practices — address disparities in financial access, eliminate billing barriers for underserved populations, and create culturally responsive financial assistance programs"
  tags: [health-equity, financial-access, underserved-populations, advanced]

state: {}

trigger: |
  Design health equity-centered billing practices for
  a safety-net health system serving a diverse,
  predominantly low-income community where billing
  practices have been identified as a barrier to care.

  Organization: Community Health Alliance
  - 1 hospital (Level II Trauma), 8 FQHCs
  - Annual patient encounters: 350,000
  - Patient demographics:
    * Uninsured: 28%
    * Medicaid: 35%
    * Medicare: 15%
    * Commercial: 18%
    * Other: 4%
  - Languages spoken: English (55%), Spanish (25%),
    Haitian Creole (8%), Portuguese (5%), Other (7%)
  - 65% of patients at or below 200% FPL

  Identified equity issues:
  - Financial assistance application is 12 pages, only
    in English, requires documentation many patients
    can't provide
  - Self-pay patients charged full chargemaster rates
    (3-4x insured rates)
  - Collections sent to agency after 60 days regardless
    of circumstances
  - No interpreter services for billing calls
  - Online payment portal requires smartphone/computer
    (digital divide)
  - Same billing policies applied to undocumented
    patients who cannot obtain insurance
  - Patients report avoiding care due to fear of bills
  - Credit reporting for medical debt
    disproportionately affects Black and Hispanic patients

  Create:
  1. Health equity billing assessment framework
  2. Simplified financial assistance program redesign
  3. Multilingual billing communication strategy
  4. Self-pay pricing reform (away from chargemaster)
  5. Culturally responsive financial counseling model
  6. Digital and non-digital payment accessibility plan
  7. Anti-displacement billing policies (preventing
     care avoidance)
  8. Community partnership strategy for financial navigation

assertions:
  - type: llm_judge
    criteria: "Financial assistance redesign removes barriers — simplifies the 12-page application to a streamlined form, offers it in all major languages served, uses presumptive eligibility for patients clearly below income thresholds, accepts alternative documentation for those who can't provide traditional proof, and implements auto-enrollment from Medicaid data."
    weight: 0.35
    description: "FinancialAssistanceRedesign"
  - type: llm_judge
    criteria: "Self-pay pricing reform eliminates the inequity of charging uninsured patients chargemaster rates — implements a fair pricing policy that charges self-pay patients no more than the best contracted rate or Medicare rate; addresses the specific situation of undocumented patients who cannot obtain insurance through no fault of their own."
    weight: 0.35
    description: "SelfPayPricingReform"
  - type: llm_judge
    criteria: "Anti-displacement strategy addresses care avoidance — implements proactive financial counseling before services, eliminates credit reporting for medical debt, creates extended payment plans with no interest, trains staff to never turn patients away for billing reasons, and tracks whether billing practices are causing patients to delay or avoid needed care."
    weight: 0.30
    description: "CareAvoidancePrevention"
