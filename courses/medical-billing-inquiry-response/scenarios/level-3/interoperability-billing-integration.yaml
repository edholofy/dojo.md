meta:
  id: interoperability-billing-integration
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Design interoperable billing data exchange systems — implement FHIR-based billing workflows, payer-provider data integration, and real-time eligibility and claim status connectivity"
  tags: [interoperability, fhir, data-exchange, advanced]

state: {}

trigger: |
  Design an interoperable billing data exchange
  strategy for a health system implementing CMS
  Interoperability and Patient Access requirements
  while modernizing payer connectivity.

  Organization: Pacific Health Network
  - 5 hospitals, 30 clinics across 3 states
  - 4 different EHR systems (migrating to Epic)
  - 3 practice management/billing systems
  - 150 unique payer contracts
  - Monthly claims: 120,000 across all entities

  Current state:
  - Eligibility verification: Mix of batch (60%) and
    real-time (40%); 3 different clearinghouses
  - Claim submission: 80% electronic (EDI 837), 20%
    manual/paper for certain payers
  - Remittance: ERA (835) for 70% of payments;
    manual posting for 30%
  - Prior auth: 90% phone/fax; 10% payer portals
  - Claim status: Mostly manual — staff check payer
    portals individually
  - Patient cost estimates: Manual lookup, 24-48 hour
    turnaround

  Regulatory requirements:
  - CMS Interoperability Rule (Patient Access API)
  - TEFCA framework participation
  - Da Vinci Implementation Guides for billing
  - Prior Authorization Rule (CMS-0057-F)
  - Good Faith Estimate requirements
  - State-specific data exchange mandates

  Create:
  1. FHIR-based billing integration architecture
  2. Unified clearinghouse consolidation plan
  3. Real-time eligibility and benefits verification
  4. Electronic prior authorization implementation
  5. Patient-facing cost transparency API
  6. Payer data exchange modernization roadmap
  7. Data governance framework for billing data
  8. Compliance with CMS interoperability mandates

assertions:
  - type: llm_judge
    criteria: "FHIR architecture leverages Da Vinci Implementation Guides — specifically uses PCDE (Payer Coverage Decision Exchange), PDex (Payer Data Exchange), and Prior Authorization Support IGs; doesn't just mention FHIR generically but designs specific resource mappings for claims, EOBs, coverage, and prior authorization workflows."
    weight: 0.35
    description: "FHIRArchitectureDesign"
  - type: llm_judge
    criteria: "Electronic prior authorization implementation addresses the CMS Prior Authorization Rule — implements FHIR-based prior auth workflows that enable real-time submission and determination; moves from 90% phone/fax to predominantly electronic; includes integration with clinical decision support to auto-populate clinical documentation."
    weight: 0.35
    description: "ElectronicPriorAuth"
  - type: llm_judge
    criteria: "Patient cost transparency API provides real-time estimates — integrates eligibility data, contracted rates, deductible accumulation, and service-specific pricing to generate accurate patient cost estimates in real-time; replaces the current 24-48 hour manual process; supports Good Faith Estimate requirements."
    weight: 0.30
    description: "PatientCostAPI"
