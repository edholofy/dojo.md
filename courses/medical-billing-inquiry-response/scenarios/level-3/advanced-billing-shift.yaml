meta:
  id: advanced-billing-shift
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Advanced shift simulation — manage enterprise billing crises including a payer system outage, OIG audit notification, multi-million dollar underpayment discovery, and staff walkout threat"
  tags: [shift-simulation, enterprise-crisis, multi-scenario, advanced]

state: {}

trigger: |
  You are the VP of Revenue Cycle for a 4-hospital
  health system. Handle these concurrent crises
  during a turbulent week.

  SITUATION 1 — Major payer system outage:
  Blue Cross, your largest payer (38% of revenue),
  has experienced a cyberattack. Their claims processing
  system has been down for 12 days with no estimated
  restoration date. You have $14M in claims that cannot
  be submitted. Cash flow projections show you'll miss
  payroll in 3 weeks if the situation continues.
  Additionally, timely filing deadlines are approaching
  for older claims.

  SITUATION 2 — OIG audit notification:
  You've received an OIG audit notification requesting
  records for 500 Medicare claims across your cardiology
  and orthopedic departments for the past 3 years. The
  audit is focused on medical necessity for high-cost
  procedures. Your preliminary internal review suggests
  15-20% of sampled claims may have documentation
  weaknesses. Potential exposure: $8-12M plus penalties.

  SITUATION 3 — Underpayment discovery:
  Your analytics team has discovered that UnitedHealthcare
  has been systematically underpaying your orthopedic
  surgery claims by applying an outdated fee schedule
  for the past 14 months. Estimated underpayment: $3.2M.
  The contract clearly specifies the current fee schedule.
  UHC denies the error.

  SITUATION 4 — Staff crisis:
  Your billing team (42 FTEs) has sent a collective
  letter threatening to resign in 30 days unless
  compensation is increased by 20% and remote work
  is implemented. They cite being overworked, underpaid,
  and disrespected. This comes at the worst possible time
  given the other crises.

  Handle all four situations:
  1. Cash flow management during payer outage
  2. OIG audit response strategy
  3. Underpayment recovery approach
  4. Staff retention emergency plan
  5. Enterprise risk assessment and prioritization
  6. Board-level communication plan

assertions:
  - type: llm_judge
    criteria: "Cash flow management addresses the immediate payroll risk — explores bridge financing (line of credit, factoring), accelerates collections from other payers, requests advance payments from Blue Cross under force majeure, documents all claims for timely filing protection, and establishes a weekly cash flow monitoring cadence; doesn't just wait for the system to come back up."
    weight: 0.35
    description: "CashFlowCrisisManagement"
  - type: llm_judge
    criteria: "OIG audit response follows proper protocol — immediately engages healthcare compliance counsel, preserves all documentation (litigation hold), begins internal investigation to understand the scope of exposure, doesn't volunteer additional information beyond what's requested, develops a response timeline, and considers voluntary self-disclosure if the internal review reveals systematic issues."
    weight: 0.35
    description: "OIGAuditProtocol"
  - type: llm_judge
    criteria: "Staff crisis response balances urgency with sustainability — doesn't dismiss the grievances or make promises that can't be kept; proposes an immediate town hall to demonstrate listening, commissions a rapid compensation study, offers interim measures (retention bonuses, hybrid work pilot), and creates a longer-term workforce investment plan; recognizes that losing 42 FTEs during the other crises would be catastrophic."
    weight: 0.30
    description: "StaffRetentionEmergency"
