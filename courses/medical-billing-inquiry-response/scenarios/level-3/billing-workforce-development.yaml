meta:
  id: billing-workforce-development
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Design a billing workforce development program — address staffing shortages, create career pathways, implement competency-based training, and build resilient billing operations"
  tags: [workforce-development, training, career-pathways, advanced]

state: {}

trigger: |
  Design a comprehensive billing workforce development
  program for a health system experiencing critical
  staffing challenges in revenue cycle operations.

  Organization: Heritage Medical Center
  - 650-bed academic medical center
  - Revenue cycle staff: 280 FTEs
  - Current vacancy rate: 28% (78 open positions)
  - Annual turnover: 42%
  - Average tenure: 1.8 years
  - Time to fill a position: 67 days
  - Cost per hire: $4,200
  - Annual recruitment/turnover cost: $1.2M

  Staffing analysis:
  - Entry-level billers (180 FTEs): 52% vacancy rate,
    starting wage $15.50/hr (market: $17-19)
  - Coding specialists (45 FTEs): 18% vacancy,
    credentialed coders earning $24/hr (market: $28-32)
  - Denial management (30 FTEs): 22% vacancy,
    high-burnout role
  - Financial counselors (15 FTEs): 15% vacancy,
    emotional labor concerns
  - Supervisors/managers (10 FTEs): 10% vacancy,
    promoted from within without management training

  Root causes of turnover:
  - Below-market compensation
  - No career advancement pathway
  - Inadequate training (2-day orientation, then
    "figure it out")
  - High-stress environment with productivity pressure
  - Remote work not offered (competitors offer hybrid)
  - No professional development support
  - Perception of billing as "dead end" career

  Create:
  1. Compensation benchmarking and restructuring plan
  2. Career ladder with competency framework
  3. Structured onboarding and training program
  4. Remote/hybrid work policy for billing roles
  5. Retention and engagement strategy
  6. Pipeline development (partnerships, apprenticeships)
  7. Workforce planning model for demand forecasting
  8. ROI analysis for workforce investment

assertions:
  - type: llm_judge
    criteria: "Career ladder creates meaningful advancement — defines clear progression from entry-level biller through coding specialist, denial analyst, team lead, supervisor, and manager with specific competencies, certifications, and experience requirements at each level; includes lateral moves into specialties like compliance, analytics, or payer relations; makes billing a career, not a dead end."
    weight: 0.35
    description: "CareerLadderDesign"
  - type: llm_judge
    criteria: "Training program replaces 'figure it out' with structured learning — implements a phased onboarding (classroom, shadowing, mentored production, independent) over 90+ days; includes competency assessments before advancement; provides ongoing education on regulatory changes, payer updates, and new technology; addresses the specific training gap for promoted supervisors."
    weight: 0.35
    description: "StructuredTrainingProgram"
  - type: llm_judge
    criteria: "ROI analysis demonstrates that workforce investment pays for itself — quantifies the cost of current turnover ($1.2M recruitment + productivity loss + errors from inexperienced staff + overtime for remaining staff); shows that competitive compensation, training, and career pathways reduce turnover and improve billing performance metrics."
    weight: 0.30
    description: "WorkforceInvestmentROI"
