meta:
  id: cross-functional-denial-strategy
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Design a cross-functional denial management strategy — coordinate clinical documentation, coding, billing, and payer contracting teams to systematically reduce denials and recover lost revenue"
  tags: [denial-management, cross-functional, revenue-recovery, advanced]

state: {}

trigger: |
  Design a cross-functional denial management strategy
  for a health system where denials have grown 40% over
  two years despite increased staffing.

  Organization: Meridian Healthcare
  - Annual net revenue: $850M
  - Total denials (initial): $127M (15% of gross)
  - Denials overturned on appeal: $38M (30% win rate)
  - Net denial write-off: $89M (10.5% of net revenue)
  - Denial management staff: 42 FTEs
  - Average cost per denial worked: $118

  Denial breakdown by category:
  - Medical necessity: 28% ($35.6M)
  - Prior authorization: 22% ($27.9M)
  - Eligibility/registration: 18% ($22.9M)
  - Coding: 15% ($19.1M)
  - Timely filing: 8% ($10.2M)
  - Duplicate claims: 5% ($6.4M)
  - Other: 4% ($5.1M)

  Denial breakdown by payer:
  - UnitedHealthcare: 35% (highest denial rate: 22%)
  - Anthem/BCBS: 25% (denial rate: 14%)
  - Aetna: 15% (denial rate: 12%)
  - Medicare: 12% (denial rate: 8%)
  - Medicaid: 8% (denial rate: 18%)
  - Other: 5%

  Current issues:
  - Billing team works denials in isolation
  - No feedback loop to clinical documentation
  - Prior auth team disconnected from billing
  - No payer-specific denial trending
  - Appeals are generic — same template for all payers
  - No root cause analysis or prevention focus

  Create:
  1. Cross-functional denial task force charter
  2. Denial prevention strategy by category
  3. Payer-specific denial management playbooks
  4. Clinical documentation improvement integration
  5. Real-time denial analytics dashboard
  6. Appeal strategy optimization
  7. Financial impact model and recovery targets
  8. Accountability and incentive structure

assertions:
  - type: llm_judge
    criteria: "Denial prevention strategy addresses each category with targeted interventions — medical necessity denials require clinical documentation improvement and concurrent review; prior auth denials need process automation and payer communication; eligibility denials need front-end verification; each category gets a specific prevention workflow, not a one-size-fits-all approach."
    weight: 0.35
    description: "CategorySpecificPrevention"
  - type: llm_judge
    criteria: "Payer-specific playbooks recognize that UnitedHealthcare at 22% denial rate requires a fundamentally different strategy than Medicare at 8% — includes analysis of UHC's specific denial reasons, appeal success patterns, contract leverage points, and escalation pathways; generic appeal templates are replaced with payer-tailored approaches."
    weight: 0.35
    description: "PayerSpecificPlaybooks"
  - type: llm_judge
    criteria: "Financial impact model quantifies the opportunity — the $89M net write-off represents a massive revenue recovery opportunity; the model projects realistic recovery targets by category and payer, accounts for the cost of expanded denial management resources, and shows a clear ROI for the investment in cross-functional coordination."
    weight: 0.30
    description: "FinancialImpactModel"
