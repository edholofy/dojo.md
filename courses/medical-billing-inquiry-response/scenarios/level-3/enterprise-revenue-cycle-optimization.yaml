meta:
  id: enterprise-revenue-cycle-optimization
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Optimize enterprise revenue cycle management — redesign end-to-end billing workflows, implement predictive analytics for denial prevention, and establish KPI dashboards across a multi-facility health system"
  tags: [revenue-cycle, enterprise-optimization, predictive-analytics, advanced]

state: {}

trigger: |
  Design an enterprise revenue cycle optimization
  strategy for a health system experiencing declining
  net collection rates and rising denial volumes.

  Organization: Pinnacle Health Partners
  - 4 hospitals, 22 outpatient clinics, 180 providers
  - Annual gross charges: $1.8B
  - Net collection rate: 89% (target: 95%+)
  - Clean claim rate: 78% (target: 95%+)
  - Denial rate: 14% (industry benchmark: 5-8%)
  - Days in A/R: 62 (target: 35-40)
  - Cost to collect: $0.07 per $1 (target: $0.04)
  - Bad debt write-offs: $28M annually
  - Staff turnover in billing: 35% annually

  Root cause analysis findings:
  - Front-end: Insurance verification gaps (40% of
    denials trace to eligibility issues)
  - Mid-cycle: Coding accuracy at 82% (target: 95%+)
  - Back-end: Only 45% of denials are worked; average
    appeal turnaround is 45 days
  - Technology: 3 different billing systems across
    facilities with no unified reporting
  - Training: No standardized onboarding; tribal
    knowledge dependence

  Create:
  1. Enterprise RCM transformation roadmap (12-month)
  2. Predictive denial prevention model design
  3. KPI dashboard framework with drill-down metrics
  4. Technology consolidation plan
  5. Staffing model with career ladder design
  6. ROI projection for optimization investment
  7. Change management and communication strategy

assertions:
  - type: llm_judge
    criteria: "Transformation roadmap prioritizes quick wins with highest financial impact first — front-end eligibility verification fixes address 40% of denials and should be Phase 1; technology consolidation and predictive analytics are longer-term investments; the roadmap includes specific milestones, owners, and measurable targets for each phase."
    weight: 0.35
    description: "TransformationRoadmap"
  - type: llm_judge
    criteria: "KPI dashboard framework goes beyond basic metrics — includes leading indicators (not just lagging), drill-down capability from system-level to facility to provider to payer, real-time denial trending with root cause categorization, and benchmarking against industry standards; enables proactive management rather than reactive reporting."
    weight: 0.35
    description: "KPIDashboardDesign"
  - type: llm_judge
    criteria: "ROI projection quantifies the financial opportunity — the gap between 89% and 95% net collection on $1.8B gross charges represents tens of millions in additional revenue; the projection accounts for implementation costs, timeline to value, and ongoing operational savings from reduced denial rates and lower cost to collect."
    weight: 0.30
    description: "ROIProjection"
