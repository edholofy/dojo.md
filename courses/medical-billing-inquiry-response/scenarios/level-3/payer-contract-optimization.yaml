meta:
  id: payer-contract-optimization
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Optimize payer contract management and negotiation — analyze reimbursement performance, model contract scenarios, and develop negotiation strategies that improve billing outcomes"
  tags: [payer-contracts, negotiation, reimbursement-analysis, advanced]

state: {}

trigger: |
  Optimize payer contract management for a medical
  group experiencing reimbursement erosion and unfavorable
  contract terms impacting billing operations.

  Organization: Premier Medical Associates
  - 120 physicians across 8 specialties
  - Annual net revenue: $180M
  - Top payers by volume:
    * Blue Cross (35%): Contract up for renewal in 90 days
    * UnitedHealthcare (25%): 2 years remaining
    * Aetna (15%): 1 year remaining
    * Medicare (15%): Not negotiable
    * Cigna (5%): Recently signed 3-year deal
    * Other (5%)

  Contract performance analysis:
  - Blue Cross: Paying 108% of Medicare on average,
    but specific procedures reimbursed below cost
    (colonoscopies at 85% of Medicare, MRIs at 90%)
  - UnitedHealthcare: Frequent downcoding and bundling
    reducing effective rate to 95% of contract
  - Aetna: Aggressive prior auth requirements causing
    22% administrative burden surcharge per claim
  - Cigna: New contract has unfavorable timely filing
    limits (60 days vs. industry standard 90-120)

  Billing-specific contract issues:
  - No clean claim payment guarantee clauses
  - Payer recoupment allowed without provider agreement
  - No penalties for payer slow payment (average 45 days
    vs. contracted 30 days)
  - Vague medical necessity criteria allowing subjective
    denials
  - No dispute resolution process defined
  - Rate increases capped at 1% annually (below inflation)

  Create:
  1. Payer performance scorecard methodology
  2. Blue Cross renewal negotiation strategy
  3. Contract term optimization recommendations
  4. Reimbursement modeling for negotiation scenarios
  5. Administrative burden quantification by payer
  6. Billing-friendly contract language templates
  7. Payer relations management framework
  8. Multi-year contract portfolio strategy

assertions:
  - type: llm_judge
    criteria: "Blue Cross negotiation strategy leverages data — uses the specific reimbursement gaps (colonoscopies at 85%, MRIs at 90% of Medicare) to build a case for targeted rate increases; quantifies the cost to the practice of below-cost procedures; presents competitive market data and patient volume leverage to support the negotiation."
    weight: 0.35
    description: "DataDrivenNegotiation"
  - type: llm_judge
    criteria: "Contract language recommendations address the billing-specific issues — proposes clean claim payment guarantees with interest penalties, limits on retroactive recoupment, prompt payment clauses with teeth, objective medical necessity criteria referencing published guidelines, and formal dispute resolution procedures; these aren't generic suggestions but specific contractual provisions."
    weight: 0.35
    description: "ContractLanguageOptimization"
  - type: llm_judge
    criteria: "Administrative burden quantification makes the invisible visible — calculates the per-claim cost of Aetna's excessive prior auth requirements, UHC's downcoding patterns, and Cigna's tight timely filing limits; converts these burdens to dollar amounts that can be used in contract negotiations or fee schedule discussions."
    weight: 0.30
    description: "AdminBurdenQuantification"
