meta:
  id: value-based-billing-transformation
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Transform billing operations for value-based care — design hybrid billing workflows supporting both fee-for-service and value-based payment models including bundled payments, shared savings, and capitation"
  tags: [value-based-care, payment-models, billing-transformation, advanced]

state: {}

trigger: |
  Design a billing transformation strategy to support
  a health system's transition from predominantly
  fee-for-service to value-based payment models.

  Organization: Unity Health Network
  - 3 hospitals, 200 employed physicians
  - Current revenue mix:
    * Fee-for-service: 70% ($420M)
    * Bundled payments (CJR, BPCI-A): 12% ($72M)
    * Shared savings (MSSP ACO): 10% ($60M)
    * Capitation (Medicare Advantage): 5% ($30M)
    * Other VBC arrangements: 3% ($18M)
  - Target revenue mix in 3 years:
    * Fee-for-service: 40%
    * Value-based: 60%

  Current challenges:
  - Billing team only trained in FFS claims processing
  - No capability to track quality metrics for VBC
  - Bundled payment reconciliation done manually in
    Excel spreadsheets
  - Cannot attribute patients to VBC contracts
  - No cost accounting at episode or patient level
  - Shared savings calculations delayed 18+ months
  - Provider compensation still 100% RVU-based

  Create:
  1. Hybrid billing operations framework (FFS + VBC)
  2. Bundled payment reconciliation system design
  3. Patient attribution and panel management process
  4. Cost accounting methodology for episodes of care
  5. Quality metric tracking and reporting integration
  6. Provider compensation redesign for VBC alignment
  7. Staff retraining and organizational redesign plan
  8. Financial modeling for revenue mix transition

assertions:
  - type: llm_judge
    criteria: "Hybrid billing framework maintains FFS revenue integrity while building VBC capabilities — doesn't sacrifice current fee-for-service revenue during transition; creates parallel workflows that share data and staff; the framework supports both claim submission and value-based reconciliation for the same patient encounters."
    weight: 0.35
    description: "HybridBillingFramework"
  - type: llm_judge
    criteria: "Cost accounting methodology enables episode-level cost tracking — identifies all direct and indirect costs attributable to a bundled episode; enables the organization to know whether they're generating savings or losses under each VBC contract; moves beyond the manual Excel process to a systematic approach."
    weight: 0.35
    description: "CostAccountingMethodology"
  - type: llm_judge
    criteria: "Provider compensation redesign aligns incentives with VBC goals — transitions from 100% RVU-based to a model that incorporates quality metrics, patient outcomes, and cost efficiency; includes a transition timeline that doesn't create a financial cliff for providers; addresses physician engagement and buy-in."
    weight: 0.30
    description: "CompensationRedesign"
