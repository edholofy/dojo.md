meta:
  id: regulatory-compliance-program
  level: 3
  course: medical-billing-inquiry-response
  type: output
  description: "Build a comprehensive billing regulatory compliance program — integrate No Surprises Act, Price Transparency, HIPAA billing provisions, state consumer protection laws, and CMS requirements into unified compliance operations"
  tags: [regulatory-compliance, no-surprises-act, price-transparency, advanced]

state: {}

trigger: |
  Build a comprehensive billing regulatory compliance
  program for a health system facing multiple regulatory
  requirements and recent enforcement actions.

  Organization: Atlantic Health Partners
  - 2 hospitals, 18 clinics, 400 providers
  - Mix of employed and contracted physicians
  - States of operation: New York, New Jersey, Connecticut
  - Recent regulatory events:
    * CMS warning letter for Price Transparency
      non-compliance (machine-readable file incomplete)
    * State AG investigation into surprise billing
      complaints (28 complaints in 6 months)
    * OCR audit of billing-related HIPAA practices
    * OIG subpoena for records related to a coding
      investigation

  Regulatory requirements to address:
  1. No Surprises Act (federal) — balance billing
     protections, Good Faith Estimates, IDR process
  2. Price Transparency — machine-readable files,
     shoppable services, 300 items requirement
  3. State surprise billing laws (NY, NJ, CT each
     have different requirements)
  4. HIPAA — billing statement minimum necessary,
     business associate agreements with billing vendors
  5. CMS Conditions of Participation — financial
     counseling, EMTALA billing restrictions
  6. False Claims Act — coding accuracy and compliance
  7. ACA 501(r) — charity care for nonprofit hospitals

  Create:
  1. Unified regulatory compliance framework
  2. Compliance gap analysis (current state vs. required)
  3. Remediation plan for each regulatory finding
  4. Ongoing compliance monitoring program
  5. Staff training curriculum by role
  6. Regulatory change management process
  7. Board-level compliance reporting dashboard
  8. Incident response procedures for future findings

assertions:
  - type: llm_judge
    criteria: "Compliance framework integrates multi-state requirements — recognizes that NY, NJ, and CT each have different surprise billing laws with varying requirements for independent dispute resolution, patient notification, and provider contracting; creates a compliance matrix that maps federal and state requirements to operational procedures."
    weight: 0.35
    description: "MultiStateCompliance"
  - type: llm_judge
    criteria: "Remediation plan addresses the four active regulatory matters with appropriate urgency — the OIG subpoena requires immediate legal counsel engagement and document preservation; the CMS price transparency warning needs rapid technical remediation; the AG investigation requires a cooperative response; the OCR audit needs comprehensive policy review."
    weight: 0.35
    description: "RemediationPrioritization"
  - type: llm_judge
    criteria: "Ongoing monitoring program prevents future compliance failures — implements proactive surveillance including automated price transparency file validation, surprise billing complaint tracking, coding audit sampling, and regulatory change scanning; moves the organization from reactive to proactive compliance management."
    weight: 0.30
    description: "ProactiveMonitoring"
