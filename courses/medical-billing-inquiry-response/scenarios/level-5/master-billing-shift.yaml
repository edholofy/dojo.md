meta:
  id: master-billing-shift
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Master shift simulation — serve as national healthcare billing reform leader managing a congressional hearing, industry coalition crisis, international standards dispute, and personal ethical confrontation"
  tags: [shift-simulation, national-leadership, multi-scenario, master]

state: {}

trigger: |
  You are the nation's foremost authority on medical
  billing reform. Handle these concurrent challenges
  during a pivotal week that will shape the future
  of billing.

  SITUATION 1 — Congressional hearing:
  You are testifying before the House Ways and Means
  Committee on the Medical Billing Simplification Act.
  The bill would mandate a single standardized claim
  form, require real-time claim adjudication within
  48 hours, ban surprise billing for all services
  (not just emergency), and create a national billing
  ombudsman. The hospital lobby opposes parts of the
  bill. The insurance industry opposes other parts.
  Patient advocates say it doesn't go far enough.
  You must provide expert testimony that advances
  meaningful reform while acknowledging legitimate
  stakeholder concerns.

  SITUATION 2 — Coalition fracture:
  Your Billing Reform Coalition (200+ health systems)
  is fracturing. Large academic medical centers want
  to preserve complex billing capabilities. Small
  community hospitals want radical simplification.
  Safety-net hospitals want financial protection
  guarantees. For-profit systems want minimal
  regulation. The coalition's unity was your main
  source of political power, and it's dissolving at
  the worst possible time.

  SITUATION 3 — International incident:
  The WHO has leaked your draft global billing standards
  to the press. The US healthcare industry is outraged,
  calling the standards "socialist healthcare by
  backdoor." European colleagues are frustrated that
  the US is blocking consensus. You're caught between
  your international mandate and domestic political
  pressure.

  SITUATION 4 — Ethical confrontation:
  A major health system (a coalition member and your
  largest consulting client) has been secretly using
  your patient-centered billing framework as marketing
  cover while actually increasing aggressive collection
  practices behind the scenes. An investigative
  journalist has the evidence and wants your comment.
  Your reputation, your framework's credibility, and
  a significant revenue stream are all at risk.

  Handle all four situations:
  1. Congressional testimony strategy
  2. Coalition unity restoration plan
  3. International standards diplomatic resolution
  4. Ethical confrontation response
  5. Stakeholder communication across all four situations
  6. Personal integrity and legacy considerations

assertions:
  - type: llm_judge
    criteria: "Congressional testimony is substantive and politically savvy — supports the bill's goals while offering specific amendments based on implementation expertise; acknowledges hospital and insurer concerns without capitulating to them; uses patient data and international comparisons to make the case for reform; provides the committee with actionable expert guidance, not just philosophical positions."
    weight: 0.35
    description: "CongressionalTestimony"
  - type: llm_judge
    criteria: "Coalition restoration strategy finds common ground among divergent interests — identifies shared values (fair reimbursement, reduced administrative burden, patient trust) that unite diverse health systems; proposes a tiered reform framework that allows different implementation speeds; doesn't try to impose a single model but creates a big-tent agenda; may sacrifice some policy ambition for organizational unity."
    weight: 0.35
    description: "CoalitionRestoration"
  - type: llm_judge
    criteria: "Ethical confrontation prioritizes integrity over revenue — publicly distances from the health system's practices, even at financial cost; cooperates with the journalist transparently; uses the incident to strengthen the framework with accountability mechanisms; demonstrates that the billing reform movement holds itself to the same standards it demands of others."
    weight: 0.30
    description: "EthicalIntegrityResponse"
