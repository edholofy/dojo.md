meta:
  id: billing-research-handbook
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Edit a comprehensive research handbook on medical billing — curate and synthesize the definitive academic reference covering billing science, methodology, and evidence-based practice"
  tags: [research-handbook, academic-reference, evidence-synthesis, master]

state: {}

trigger: |
  Edit the definitive research handbook on medical
  billing — the first comprehensive academic reference
  that establishes billing as a field of scientific
  inquiry.

  Publication: "The Oxford Handbook of Medical Billing:
  Science, Practice, and Policy"

  Publisher: Oxford University Press (Academic Division)
  Target: 800 pages, 40 chapters, 60+ contributing authors
  Timeline: 2-year project

  You are the editor-in-chief responsible for:
  - Defining the handbook's intellectual architecture
  - Commissioning chapters from leading experts
  - Ensuring coherence across diverse contributions
  - Writing the framing introduction and conclusion
  - Managing peer review process

  The handbook must establish medical billing as a
  legitimate field of study that intersects with:
  - Health economics and health policy
  - Health services research
  - Information science and technology
  - Organizational behavior
  - Consumer behavior and behavioral economics
  - Health equity and social determinants
  - Law and regulation
  - Artificial intelligence and automation
  - Workforce science

  Create:
  1. Handbook intellectual architecture (5 major sections)
  2. Complete table of contents with chapter descriptions
  3. Contributing author recruitment strategy
  4. Chapter commissioning template with guidelines
  5. Editor's introduction (framing the field)
  6. Peer review process and quality standards
  7. Cross-referencing and coherence strategy
  8. Impact and dissemination plan

assertions:
  - type: llm_judge
    criteria: "Intellectual architecture establishes billing as an interdisciplinary academic field — organizes the handbook into coherent sections that cover foundations (economics, history, regulatory), operations (coding, claims, denials), technology (AI, interoperability), human dimensions (patient experience, workforce, equity), and futures (policy reform, automation, global perspectives); each section builds on the previous."
    weight: 0.35
    description: "IntellectualArchitecture"
  - type: llm_judge
    criteria: "Editor's introduction makes the case for billing as a field of study — argues that despite handling trillions of dollars and affecting every patient, billing has been treated as merely operational rather than worthy of scientific inquiry; identifies the research gaps, methodological challenges, and potential for evidence-based billing practice; sets the agenda for the field."
    weight: 0.35
    description: "EditorsIntroduction"
  - type: llm_judge
    criteria: "Contributing author strategy identifies the right voices — recruits from health economics (who study billing costs), health services research (who measure billing impacts), computer science (who build billing technology), law (who shape billing regulation), and practice (who live billing daily); includes emerging scholars alongside established experts; ensures diversity of perspective."
    weight: 0.30
    description: "AuthorRecruitmentStrategy"
