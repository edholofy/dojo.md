meta:
  id: billing-social-enterprise
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Launch a social enterprise addressing medical billing inequity — create an organization that provides free billing advocacy, consumer education, and systemic reform to protect patients from harmful billing practices"
  tags: [social-enterprise, patient-advocacy, billing-equity, master]

state: {}

trigger: |
  Launch a social enterprise that addresses medical
  billing inequity — providing direct patient
  assistance while working to change the systems
  that create billing harm.

  Organization concept: "BillRights" — Patient Billing
  Justice Initiative

  Inspiration:
  - 100M Americans have medical debt
  - Low-income and minority patients disproportionately
    affected
  - Most patients lack the knowledge to dispute bills
  - Legal aid organizations rarely handle billing issues
  - For-profit billing advocacy services charge fees
    patients can't afford
  - Systemic issues require both direct service and
    advocacy

  Proposed model:
  - Direct services: Free billing review, dispute
    resolution, and financial assistance navigation
    for uninsured and underinsured patients
  - Education: Community health literacy programs
    focused on billing rights
  - Technology: Open-source tools for billing review
    and price comparison
  - Policy: Research and advocacy for billing reform
    at state and federal levels
  - Training: Pro bono billing advocate certification
    program

  Revenue model (nonprofit):
  - Foundation grants (healthcare, social justice)
  - Hospital/health system partnerships (funded referral
    programs)
  - cy pres distributions from billing class action
    settlements
  - Government contracts (navigator programs)
  - Individual donations

  Target outcomes (Year 1):
  - 10,000 patients assisted
  - $15M in billing errors corrected or debt eliminated
  - 500 pro bono billing advocates trained
  - 3 state-level policy victories
  - Financial sustainability by Year 3

  Create:
  1. Social enterprise business plan
  2. Theory of change and impact measurement
  3. Direct service delivery model
  4. Billing advocate training curriculum
  5. Technology platform design (open-source)
  6. Policy advocacy strategy
  7. Fundraising and revenue diversification plan
  8. Scaling strategy for national reach

assertions:
  - type: llm_judge
    criteria: "Theory of change connects direct service to systemic change — individual patient assistance generates data on billing abuses that powers policy advocacy; trained advocates create a distributed workforce for patient protection; open-source tools democratize billing knowledge; the enterprise doesn't just treat symptoms but addresses root causes of billing inequity."
    weight: 0.35
    description: "TheoryOfChange"
  - type: llm_judge
    criteria: "Direct service model is operationally viable at scale — defines intake criteria, case triage, review processes, dispute workflows, and outcome tracking; uses a mix of professional staff and trained volunteers/advocates; leverages technology to handle volume while maintaining quality; includes quality assurance and patient satisfaction measurement."
    weight: 0.35
    description: "ServiceDeliveryModel"
  - type: llm_judge
    criteria: "Open-source technology platform empowers patients directly — provides bill review tools, price comparison databases, financial assistance eligibility screening, dispute letter generators, and rights-based education; designed for low-literacy and non-English-speaking users; creates network effects where each user interaction improves the tools for future users."
    weight: 0.30
    description: "OpenSourcePlatform"
