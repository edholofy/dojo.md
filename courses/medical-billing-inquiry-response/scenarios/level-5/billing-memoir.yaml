meta:
  id: billing-memoir
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Write a professional memoir from the frontlines of medical billing — craft a narrative that humanizes the billing profession while exposing systemic failures that harm patients and workers"
  tags: [memoir, narrative-writing, humanization, master]

state: {}

trigger: |
  Write a professional memoir from 30 years in medical
  billing that humanizes the profession while exposing
  the systemic failures that harm patients, workers,
  and the healthcare system.

  Working title: "Behind the Bill: Confessions from
  Healthcare's Most Hated Department"

  Memoir scope — key career chapters:

  Chapter arc 1: "The Education" (1995-2005)
  - Starting as a $7/hour billing clerk at a rural
    hospital
  - Learning the byzantine complexity of medical billing
  - First ethical dilemma: Told to re-bill claims that
    were correctly denied
  - Witnessing a patient choose death over debt
  - Rising from clerk to coding specialist to manager

  Chapter arc 2: "The Machine" (2005-2015)
  - Managing a 200-person billing department
  - The impossible mandate: Maximize collections while
    treating patients with compassion
  - Implementing aggressive collection policies under
    CFO pressure
  - The whistleblower who exposed the system she built
  - Finding humanity in the margins — staff who quietly
    helped patients navigate the system

  Chapter arc 3: "The Transformation" (2015-2025)
  - Leading billing reform after a patient's suicide
    linked to billing practices
  - Building patient-centered billing from scratch
  - Fighting institutional resistance to change
  - The toll of caring in a system designed not to
  - What billing could become if we had the courage

  Create:
  1. Memoir proposal and narrative arc
  2. Sample chapter (most powerful story)
  3. Thematic framework connecting personal to systemic
  4. Character development for key figures
  5. Ethical considerations in memoir writing
  6. Publishing strategy (literary vs. trade)
  7. Impact strategy (how the book drives change)
  8. Companion resources (discussion guide, advocacy kit)

assertions:
  - type: llm_judge
    criteria: "Sample chapter achieves literary quality — uses specific sensory details, dialogue, and scene-setting rather than generic descriptions; a patient's story is told with dignity and complexity, not as a political prop; the narrator's internal conflict between institutional loyalty and moral conscience creates genuine tension; the prose is accessible to general readers."
    weight: 0.35
    description: "LiteraryQuality"
  - type: llm_judge
    criteria: "Thematic framework elevates personal stories to systemic critique — the memoir isn't just 'billing is bad'; it explores how good people build and maintain harmful systems, how institutional incentives override individual compassion, how bureaucratic violence operates differently from clinical harm, and how reform requires both personal courage and structural change."
    weight: 0.35
    description: "SystemicThematicFramework"
  - type: llm_judge
    criteria: "Ethical considerations address the real risks of healthcare memoir — protects patient identities while maintaining narrative truth, handles the power dynamics of telling stories about vulnerable people, addresses the tension between institutional critique and professional consequences, and ensures the memoir serves patients rather than the author's career."
    weight: 0.30
    description: "MemoirEthics"
