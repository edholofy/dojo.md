meta:
  id: global-billing-standards
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Develop global healthcare billing standards — create international frameworks for billing transparency, patient financial protection, and cross-border billing harmonization"
  tags: [global-standards, international, billing-harmonization, master]

state: {}

trigger: |
  Lead the development of global healthcare billing
  standards as the appointed chair of the WHO Working
  Group on Patient Financial Protection in Healthcare
  Billing.

  Context:
  - Healthcare billing varies enormously across countries
  - Even universal healthcare systems have patient
    cost-sharing that requires billing
  - Cross-border healthcare growing (medical tourism,
    EU patient mobility, telemedicine)
  - No international standards for billing transparency,
    dispute resolution, or patient financial protection
  - WHO recognizes that billing practices contribute to
    financial catastrophe and impoverishment

  Working group composition:
  - Representatives from 30 countries (mix of single-
    payer, multi-payer, and developing health systems)
  - WHO health financing experts
  - Patient advocacy organizations (global)
  - Healthcare provider associations
  - Health technology companies
  - Health economists and researchers

  Comparative billing systems to consider:
  - US: Multi-payer, most complex billing, highest admin
    costs (34% of health spending)
  - UK NHS: Single-payer, minimal patient billing,
    but growing cost-sharing concerns
  - Germany: Multi-payer (sickness funds), standardized
    billing, patient co-payments
  - Japan: Universal coverage, standardized fee schedule,
    30% patient co-payment
  - India: Majority out-of-pocket, minimal insurance
    infrastructure, catastrophic spending
  - Rwanda: Community-based health insurance, simplified
    billing at point of care

  Create:
  1. Working group charter and governance structure
  2. Global billing transparency standard (draft)
  3. Patient financial protection principles
  4. Cross-border billing harmonization framework
  5. Billing simplification guidelines for LMICs
  6. Technology standards for billing interoperability
  7. Implementation roadmap for diverse health systems
  8. Monitoring and evaluation framework

assertions:
  - type: llm_judge
    criteria: "Global standards are achievable across vastly different health systems — recognizes that a standard that works for the US multi-payer system must also work for Rwanda's community insurance; uses a tiered framework with core principles (transparency, non-discrimination, dispute resolution) that apply universally and implementation specifics that adapt to each system's maturity."
    weight: 0.35
    description: "UniversalApplicability"
  - type: llm_judge
    criteria: "Patient financial protection principles address the WHO goal of preventing financial catastrophe — defines maximum out-of-pocket thresholds relative to income, prohibits balance billing in emergency settings universally, requires financial screening before collections, mandates plain-language billing regardless of system complexity; these principles protect patients in any billing system."
    weight: 0.35
    description: "FinancialProtectionPrinciples"
  - type: llm_judge
    criteria: "LMIC billing simplification guidelines provide practical value — recognizes that India and Rwanda cannot implement the same billing infrastructure as Germany or the US; proposes simplified, technology-appropriate billing approaches (mobile-first, pictographic, point-of-care pricing) that protect patients while being feasible in resource-constrained settings."
    weight: 0.30
    description: "LMICSimplificationGuidelines"
