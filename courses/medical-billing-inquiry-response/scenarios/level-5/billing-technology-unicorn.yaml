meta:
  id: billing-technology-unicorn
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Build a healthcare billing technology unicorn — design a venture-backed company that fundamentally disrupts medical billing through AI, automation, and patient-first design"
  tags: [technology-startup, venture-capital, disruption, master]

state: {}

trigger: |
  You are founding a healthcare billing technology
  company with a $50M Series B and a mission to make
  medical billing invisible to patients. Design the
  company's strategy for becoming a unicorn.

  Company: "Clarity Health" — Making Medical Bills
  Disappear

  Founding team:
  - CEO: You (20-year RCM veteran, led $3B health
    system's billing transformation)
  - CTO: Former Google Health engineering director
  - CPO: Former Stripe product leader
  - CMO: Former Cedar Health marketing VP
  - Chief AI Officer: Former MIT AI Lab researcher

  Funding history:
  - Seed ($5M): Product-market fit validated
  - Series A ($18M): First 20 health system customers
  - Series B ($50M): Scale to 200+ customers
  - Current ARR: $12M, growing 180% YoY
  - Target: $100M ARR in 3 years, IPO in 5

  Product suite:
  - ClarityAI: Autonomous billing resolution engine
  - ClarityPatient: Zero-friction patient billing
    experience
  - ClarityInsight: Predictive revenue analytics
  - ClarityConnect: Universal payer connectivity

  Competitive landscape:
  - Waystar, R1 RCM, Ensemble (traditional RCM)
  - Cedar, Collectly (patient payments)
  - Olive AI (failed — learn from mistakes)
  - Epic, Oracle Health (EHR-embedded billing)

  Create:
  1. Company strategy and competitive positioning
  2. Product roadmap (Series B through IPO)
  3. Go-to-market strategy (enterprise sales)
  4. AI/ML product differentiation strategy
  5. Customer success and expansion model
  6. Hiring plan and culture design
  7. Financial model (path to $100M ARR)
  8. Board management and fundraising strategy

assertions:
  - type: llm_judge
    criteria: "Competitive positioning identifies a defensible moat — articulates why Clarity Health wins against both traditional RCM companies (technology-native) and patient payment startups (full-stack, not just patient-facing); the moat is built on proprietary AI trained on billing data, network effects from payer connectivity, and switching costs from deep EHR integration; learns from Olive AI's failure to avoid similar mistakes."
    weight: 0.35
    description: "CompetitivePositioning"
  - type: llm_judge
    criteria: "Financial model is credible for a healthcare SaaS company — accounts for long enterprise sales cycles (6-12 months), implementation revenue and timelines, expansion revenue from cross-selling product suite, net revenue retention targets (120%+), and realistic gross margins for healthcare SaaS (65-75%); the path from $12M to $100M ARR is plausible, not hockey-stick fantasy."
    weight: 0.35
    description: "FinancialModelCredibility"
  - type: llm_judge
    criteria: "AI differentiation strategy is technically grounded — explains what the AI actually does better than existing solutions (not just 'we use AI'); specific capabilities like autonomous denial resolution, predictive coding accuracy, real-time payer rule interpretation, and natural language patient communication; addresses data acquisition strategy and model training pipeline."
    weight: 0.30
    description: "AIDifferentiation"
