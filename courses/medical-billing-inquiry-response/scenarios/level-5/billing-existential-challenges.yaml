meta:
  id: billing-existential-challenges
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Confront existential challenges facing medical billing — analyze scenarios where billing as we know it ceases to exist and develop adaptation strategies for the profession"
  tags: [existential-challenges, future-scenarios, paradigm-shift, master]

state: {}

trigger: |
  Analyze the existential challenges facing medical
  billing as a profession and industry, and develop
  strategies for adaptation and reinvention.

  You are presenting at the HFMA National Strategy
  Summit on "The End of Medical Billing As We Know It."

  Existential scenarios to analyze:

  Scenario A — Full AI automation:
  By 2030, AI systems can autonomously code encounters,
  submit claims, resolve denials, negotiate with payers,
  and communicate with patients about billing. The
  300,000+ billing jobs in the US are threatened.
  What happens to the workforce? What new roles emerge?
  What can't be automated?

  Scenario B — Single-payer legislation:
  Medicare for All eliminates commercial insurance.
  Multi-payer billing complexity disappears. Billing
  departments shrink 80%. Revenue cycle technology
  companies lose their market. What does the transition
  look like? What billing functions remain?

  Scenario C — Blockchain-native healthcare:
  Smart contracts automatically adjudicate claims at
  point of service. Patients see real-time pricing.
  Payments settle instantly. The entire claims submission
  and adjudication infrastructure becomes obsolete.
  Is this technically feasible? What's the realistic
  timeline?

  Scenario D — Consumer-driven revolution:
  Amazon, Apple, and Google enter healthcare billing.
  Patients demand retail-like billing experiences.
  Health systems that can't provide transparent,
  simple billing lose patients. The competitive
  landscape fundamentally shifts.

  Scenario E — Medical debt abolition:
  A social movement successfully eliminates medical
  debt as a concept. Legislation prohibits billing
  patients beyond insurance payment. Providers absorb
  all patient cost-sharing. How does the financial
  model work? What breaks?

  Create:
  1. Comprehensive analysis of each scenario
  2. Probability and timeline assessment for each
  3. Impact analysis on different stakeholders
  4. Adaptation strategies for billing professionals
  5. Organizational resilience framework
  6. Skill migration pathways for displaced workers
  7. Synthesis: Most likely combined future scenario
  8. Call to action for the billing profession

assertions:
  - type: llm_judge
    criteria: "Scenario analysis is intellectually honest — doesn't dismiss threatening scenarios to protect the profession; acknowledges that full AI automation and single-payer both pose genuine existential threats to billing as currently practiced; provides credible probability and timeline assessments; identifies what truly cannot be automated (empathy, complex judgment, ethical decision-making) vs. what professionals just wish couldn't be."
    weight: 0.35
    description: "IntellectualHonestyInAnalysis"
  - type: llm_judge
    criteria: "Skill migration pathways provide realistic career transitions — maps current billing competencies to future roles (data analytics, patient financial counseling, compliance, health IT, payer strategy); includes retraining timelines and investment requirements; acknowledges that not all current workers will successfully transition and addresses workforce equity concerns."
    weight: 0.35
    description: "WorkforceMigrationPaths"
  - type: llm_judge
    criteria: "Synthesized future scenario combines elements realistically — the most likely future isn't any single scenario but a combination; creates a credible 2030-2035 picture that includes partial automation, payment model reform, increased transparency, and evolving patient expectations; provides actionable guidance for organizations and individuals to prepare for this hybrid future."
    weight: 0.30
    description: "SynthesizedFutureVision"
