meta:
  id: billing-government-policy
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Advise government on medical billing policy reform — develop comprehensive policy recommendations for federal and state governments on billing transparency, patient protection, and system modernization"
  tags: [government-policy, regulatory-reform, patient-protection, master]

state: {}

trigger: |
  You have been appointed to lead a bipartisan
  Presidential Commission on Medical Billing Reform,
  charged with developing comprehensive policy
  recommendations to modernize and humanize medical
  billing in America.

  Commission mandate (Executive Order):
  "Develop actionable policy recommendations to reduce
  the administrative burden, financial harm, and
  inequity caused by the current medical billing system,
  while ensuring the financial sustainability of
  healthcare providers."

  Commission composition:
  - 15 commissioners (bipartisan)
  - Representatives from: health systems, physician
    practices, insurance plans, patient advocacy,
    technology, academic research, state regulators,
    labor (billing workers), small business (employer
    perspective)

  Key findings from 12 months of hearings:
  - Administrative costs: $812B annually (25% of health
    spending) — highest in the world
  - Medical debt: $220B outstanding, affecting 100M
    Americans
  - Billing complexity: Average claim touches 30 entities
  - Workforce: 2.5M people employed in billing — jobs at
    risk from automation
  - Disparities: Black and Hispanic patients 50% more
    likely to have medical debt
  - Patient harm: 40% of adults have delayed care due
    to billing concerns
  - International: US spends 8x more on billing admin
    than comparable countries

  Create:
  1. Commission final report executive summary
  2. Policy recommendations (15-20 specific proposals)
  3. Legislative framework for Medical Billing Reform Act
  4. Regulatory recommendations for CMS, HHS, CFPB
  5. State model legislation for patient protection
  6. Technology modernization mandate
  7. Workforce transition and protection plan
  8. Implementation timeline and accountability framework

assertions:
  - type: llm_judge
    criteria: "Policy recommendations are specific, actionable, and politically viable — not just 'simplify billing' but concrete proposals like standardized claim formats, universal eligibility verification, price transparency enforcement mechanisms, medical debt credit reporting bans, and billing dispute resolution procedures; each recommendation includes the authorizing mechanism (legislation vs. regulation vs. executive action)."
    weight: 0.35
    description: "ActionablePolicyRecommendations"
  - type: llm_judge
    criteria: "Workforce transition plan addresses the 2.5M workers at risk — recognizes that billing reform and automation will displace workers; proposes retraining programs, transition support, and new roles in the reformed system; doesn't sacrifice workers for efficiency gains; includes funding mechanisms and timeline; treats this as a just transition similar to energy sector reforms."
    weight: 0.35
    description: "WorkforceTransitionPlan"
  - type: llm_judge
    criteria: "Implementation timeline is realistic and sequenced — prioritizes patient protection measures (debt reporting ban, financial assistance mandates) in the near term; phases technology modernization over 5-10 years; includes enforcement mechanisms and accountability measures; acknowledges political and operational obstacles; doesn't promise transformation overnight."
    weight: 0.30
    description: "RealisticImplementationTimeline"
