meta:
  id: billing-thought-leadership
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Establish thought leadership in medical billing reform — develop original frameworks, publish influential analysis, and shape industry discourse on the future of healthcare billing"
  tags: [thought-leadership, industry-influence, billing-reform, master]

state: {}

trigger: |
  Establish yourself as the definitive thought leader
  on medical billing reform, shaping how the industry
  thinks about the future of billing and patient
  financial experience.

  Your platform:
  - Named to Modern Healthcare's "Top 25 Innovators"
  - Advisory board member for HFMA, AAHAM, and MGMA
  - Regular contributor to Health Affairs, NEJM Catalyst
  - Invited testimony before Senate HELP Committee
  - 50,000+ LinkedIn followers in healthcare finance
  - Founded the "Billing Reform Coalition" (200+ health
    system members)

  Industry inflection points:
  - AI threatens to automate 60% of billing jobs
  - Price transparency regulations reshaping market
  - Medical debt elimination movements gaining momentum
  - Single-payer proposals would eliminate most billing
  - Consumer expectations shifting (Amazon/retail models)
  - Health equity demands requiring billing reform
  - Consolidation creating mega-revenue-cycle operations
  - Value-based care rendering FFS billing obsolete

  Create:
  1. Original thought leadership framework: "The Future
     of Medical Billing" — a definitive 10-year vision
  2. Senate testimony on medical billing reform
  3. Health Affairs policy brief on billing as a social
     determinant of health
  4. Annual "State of Medical Billing" report outline
  5. Keynote speech for HFMA annual conference
  6. Billing Reform Coalition strategic agenda
  7. Media strategy for influencing public discourse
  8. Personal brand and legacy strategy

assertions:
  - type: llm_judge
    criteria: "10-year vision framework is genuinely forward-looking and provocative — doesn't just extrapolate current trends; proposes a fundamentally different model for how billing should work (transparent, automated, patient-centered, possibly invisible); acknowledges that billing as currently practiced may not survive the next decade; provides a credible transition roadmap."
    weight: 0.35
    description: "VisionaryFramework"
  - type: llm_judge
    criteria: "Senate testimony balances policy advocacy with practical expertise — provides specific, actionable policy recommendations backed by data; addresses both sides (consumer protection AND provider sustainability); acknowledges trade-offs honestly; demonstrates deep operational knowledge that distinguishes this testimony from general advocacy."
    weight: 0.35
    description: "SenateTestimony"
  - type: llm_judge
    criteria: "Health Affairs policy brief makes the novel argument that billing is a social determinant of health — presents evidence that billing practices cause measurable health harm (care avoidance, financial toxicity, mental health impacts, health disparities); positions this as comparable to other SDOH like food insecurity and housing instability; proposes specific interventions."
    weight: 0.30
    description: "BillingAsSDOH"
