meta:
  id: billing-graduate-program
  level: 5
  course: medical-billing-inquiry-response
  type: output
  description: "Design a graduate academic program in healthcare revenue cycle management — create curriculum, research agenda, and clinical practicum for the first master's-level program in healthcare billing"
  tags: [graduate-program, academic-design, curriculum-development, master]

state: {}

trigger: |
  Design the first graduate academic program
  specifically focused on healthcare revenue cycle
  management and patient financial experience.

  Program: Master of Science in Healthcare Revenue
  Cycle Management (MS-HRCM)

  Host institution: Top-20 school of public health
  with existing MHA program

  Rationale:
  - Revenue cycle is a $300B+ industry
  - No graduate program specifically trains RCM leaders
  - Current leaders come from accounting, HIT, or
    work their way up without formal education
  - The field is becoming increasingly complex
    (technology, regulation, analytics, patient experience)
  - Demand exceeds supply for qualified RCM executives
  - Adjacent programs (MHA, MBA) don't cover billing
    in sufficient depth

  Target students:
  - Mid-career billing professionals seeking leadership
  - MHA/MBA graduates wanting RCM specialization
  - Health IT professionals moving into revenue cycle
  - Clinical professionals transitioning to administrative
    roles
  - Payer-side professionals wanting provider perspective

  Program parameters:
  - 36-credit hour program (12 courses)
  - Available online and on-campus
  - Completion: 18-24 months
  - Capstone project required
  - Clinical practicum (160 hours)
  - Advisory board of industry leaders

  Create:
  1. Program overview and learning objectives
  2. Full curriculum with course descriptions (12 courses)
  3. Faculty recruitment strategy (academic + practitioner)
  4. Clinical practicum design
  5. Capstone project requirements and examples
  6. Research agenda for the program's research center
  7. Industry partnership and placement strategy
  8. Program assessment and accreditation plan

assertions:
  - type: llm_judge
    criteria: "Curriculum covers the full breadth of modern RCM leadership — includes core billing operations (coding, claims, denials), analytics and data science for revenue cycle, regulatory compliance and healthcare law, technology and automation, patient financial experience, value-based payment models, leadership and change management, and health equity in billing; goes far beyond traditional 'billing and coding' education."
    weight: 0.35
    description: "ComprehensiveCurriculum"
  - type: llm_judge
    criteria: "Research agenda establishes the field as an academic discipline — proposes research questions that would advance both theory and practice (billing's impact on health outcomes, optimal billing system design, AI in revenue cycle, behavioral economics of patient payment, workforce development); defines methodology standards and creates an evidence base for billing practice."
    weight: 0.35
    description: "AcademicResearchAgenda"
  - type: llm_judge
    criteria: "Clinical practicum provides meaningful experiential learning — places students in real revenue cycle operations across diverse settings (hospital, physician practice, health plan, consulting firm, technology company); includes structured reflection, mentorship, and competency assessment; graduates gain practical experience, not just theoretical knowledge."
    weight: 0.30
    description: "PracticumDesign"
