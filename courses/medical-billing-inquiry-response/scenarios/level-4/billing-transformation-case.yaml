meta:
  id: billing-transformation-case
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Write a comprehensive billing transformation case study — document a multi-year revenue cycle transformation including methodology, challenges, measurable outcomes, and replicable lessons"
  tags: [case-study, transformation, documentation, expert]

state: {}

trigger: |
  Write a comprehensive case study documenting a
  successful multi-year billing transformation that
  can be published in HFMA's Healthcare Financial
  Management journal and presented at conferences.

  Transformation subject: Lakeside Health System
  - 1,200-bed health system, 3 hospitals, 40 clinics
  - Transformation period: January 2022 - December 2024
  - Led by new VP of Revenue Cycle (hired externally)

  Before (January 2022):
  - Net collection rate: 86%
  - Days in A/R: 72
  - Denial rate: 18%
  - Clean claim rate: 74%
  - Patient billing complaints: 450/month
  - Patient satisfaction (billing): 2.1/5
  - Cost to collect: $0.09 per dollar
  - Staff turnover: 48%
  - Bad debt: $42M annually (4.2% of net revenue)

  After (December 2024):
  - Net collection rate: 96%
  - Days in A/R: 34
  - Denial rate: 5%
  - Clean claim rate: 97%
  - Patient billing complaints: 35/month
  - Patient satisfaction (billing): 4.4/5
  - Cost to collect: $0.035 per dollar
  - Staff turnover: 12%
  - Bad debt: $8M annually (0.7% of net revenue)

  Key interventions:
  - Year 1: Front-end overhaul (eligibility, registration,
    prior auth automation)
  - Year 2: Mid-cycle transformation (coding AI,
    charge capture, clinical documentation)
  - Year 3: Back-end and patient experience (denial
    prevention, billing redesign, financial counseling)

  Total investment: $18M over 3 years
  Incremental revenue and savings: $68M annually

  Create:
  1. Executive summary for publication
  2. Methodology and approach documentation
  3. Year-by-year narrative with key decisions
  4. Quantitative results analysis
  5. Challenges and how they were overcome
  6. Replicable framework for other organizations
  7. Lessons learned and what they'd do differently
  8. Future outlook and sustainability plan

assertions:
  - type: llm_judge
    criteria: "Case study demonstrates causality, not just correlation — connects specific interventions to specific outcome improvements; the front-end overhaul drove denial reduction in eligibility categories, coding AI improved clean claim rates, billing redesign reduced patient complaints; uses before/after metrics tied to each intervention phase."
    weight: 0.35
    description: "CausalityDemonstration"
  - type: llm_judge
    criteria: "Challenges section is honest and detailed — doesn't just present a success narrative; documents real obstacles (board skepticism, physician resistance, technology failures, staff morale issues during transition, unexpected regulatory changes) and how they were addressed; this credibility makes the case study more valuable and replicable."
    weight: 0.35
    description: "HonestChallengesDocumentation"
  - type: llm_judge
    criteria: "Replicable framework extracts generalizable principles — identifies what was specific to Lakeside (size, market, starting point) vs. what applies broadly; creates a phased implementation guide that other organizations can adapt; includes decision criteria for prioritizing interventions based on an organization's specific weaknesses."
    weight: 0.30
    description: "ReplicableFramework"
