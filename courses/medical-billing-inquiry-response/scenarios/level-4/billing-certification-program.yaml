meta:
  id: billing-certification-program
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Design a professional certification program for medical billing inquiry specialists — create competency standards, examination blueprints, continuing education requirements, and program governance"
  tags: [certification, professional-development, competency-standards, expert]

state: {}

trigger: |
  Design a professional certification program for
  medical billing inquiry and resolution specialists,
  a role that currently has no dedicated credential.

  Context:
  - Existing certifications: CPC (coding), CPB (billing),
    CRCR (revenue cycle), CHFP (healthcare finance)
  - Gap: No certification focused specifically on patient
    billing inquiry resolution — the communication,
    problem-solving, and empathy skills needed to handle
    billing inquiries effectively
  - The role requires unique blend of: billing knowledge,
    insurance literacy, patient communication, regulatory
    awareness, conflict resolution, and financial counseling

  Proposed certification: "Certified Patient Billing
  Resolution Specialist" (CPBRS)

  Sponsoring organization: Healthcare Financial
  Management Association (HFMA) partnership

  Target audience:
  - Patient billing representatives (150,000+ nationally)
  - Financial counselors
  - Patient access staff
  - Revenue cycle team leads
  - Healthcare call center supervisors

  Create:
  1. Certification program charter and governance
  2. Competency framework (knowledge, skills, abilities)
  3. Examination blueprint and content outline
  4. Study guide curriculum design
  5. Practical assessment component design
  6. Continuing education requirements
  7. Program launch and marketing strategy
  8. Psychometric validation approach

assertions:
  - type: llm_judge
    criteria: "Competency framework covers the full spectrum of the role — includes technical billing knowledge (coding, claims, payer rules), regulatory awareness (NSA, HIPAA, FDCPA, state laws), communication skills (empathy, de-escalation, health literacy), problem-solving (root cause analysis, multi-payer coordination), and financial counseling (assistance programs, payment options); reflects the unique cross-functional nature of the role."
    weight: 0.35
    description: "CompetencyFrameworkDesign"
  - type: llm_judge
    criteria: "Practical assessment goes beyond multiple-choice — includes scenario-based simulations where candidates handle realistic billing inquiries (angry patient, complex insurance situation, potential compliance issue); evaluates not just knowledge but the ability to apply it with appropriate empathy and communication skills; uses standardized rubrics for consistent scoring."
    weight: 0.35
    description: "PracticalAssessmentDesign"
  - type: llm_judge
    criteria: "Psychometric validation ensures the certification has credibility — plans for content validity (subject matter expert review), construct validity (factor analysis), reliability testing (item analysis, inter-rater for practicals), standard setting (modified Angoff or similar), and ongoing analysis; follows NCCA or ISO 17024 standards for certification accreditation."
    weight: 0.30
    description: "PsychometricValidation"
