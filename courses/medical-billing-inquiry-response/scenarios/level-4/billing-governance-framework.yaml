meta:
  id: billing-governance-framework
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Design a billing governance framework — establish organizational structures, policies, accountability mechanisms, and oversight processes for enterprise billing operations"
  tags: [governance, organizational-design, policy-framework, expert]

state: {}

trigger: |
  Design a comprehensive billing governance framework
  for a health system formed through recent mergers
  where billing practices are inconsistent, uncoordinated,
  and creating financial and compliance risk.

  Organization: Summit Health (post-merger)
  - Formed from 3 separate health systems merged over
    2 years
  - 7 hospitals, 45 clinics, 800 providers
  - Annual net revenue: $2.4B
  - 3 different billing/PMS systems still in use
  - 3 different charity care policies
  - 3 different collection agency relationships
  - 3 different coding departments with different
    standards
  - No unified revenue cycle leadership below CFO
  - Each legacy system operates independently

  Current problems:
  - Same procedures billed differently across entities
  - Inconsistent patient financial policies create
    confusion and complaints
  - No unified compliance oversight for billing
  - Payer contract negotiations conducted independently
    (sometimes competing against themselves)
  - Reporting is fragmented — CFO cannot see system-wide
    billing performance
  - Regulatory compliance gaps found in 2 of 3 entities
  - Board has no visibility into billing operations risk

  Create:
  1. Revenue cycle governance structure
  2. System-wide billing policy harmonization plan
  3. Centralized vs. shared services decision framework
  4. Compliance oversight and monitoring architecture
  5. Performance reporting and accountability framework
  6. Payer strategy coordination mechanism
  7. Technology consolidation governance
  8. Board-level risk reporting and fiduciary oversight

assertions:
  - type: llm_judge
    criteria: "Governance structure establishes clear authority and accountability — creates a Revenue Cycle Governance Committee with defined charter, membership, decision rights, and meeting cadence; resolves the current confusion about who has authority to make billing decisions; includes a RACI matrix for key billing functions across the merged entities."
    weight: 0.35
    description: "GovernanceStructureDesign"
  - type: llm_judge
    criteria: "Policy harmonization plan has a realistic sequencing strategy — doesn't try to harmonize everything at once; prioritizes patient-facing policies first (charity care, payment plans, collections) for consistency of experience, then operational policies (coding standards, payer communication), then back-office processes; includes a change management approach for each legacy system's staff."
    weight: 0.35
    description: "PolicyHarmonizationSequencing"
  - type: llm_judge
    criteria: "Centralized vs. shared services framework makes data-driven decisions — analyzes which functions benefit from centralization (payer contracting, compliance, analytics, technology) vs. which should remain local (patient financial counseling, front-desk collections); uses cost, quality, compliance risk, and patient experience as decision criteria."
    weight: 0.30
    description: "CentralizationDecisionFramework"
