meta:
  id: billing-book-proposal
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Write a book proposal on transforming medical billing — develop a manuscript concept that bridges the gap between healthcare finance professionals and the patients impacted by billing practices"
  tags: [book-proposal, thought-leadership, publishing, expert]

state: {}

trigger: |
  Write a book proposal for a definitive work on
  transforming medical billing from a source of patient
  harm to a tool for financial well-being.

  Working title: "The Billing Cure: Transforming
  Healthcare's Most Broken System"

  Author credentials:
  - 25 years in healthcare revenue cycle leadership
  - Led billing transformation at 3 major health systems
  - Reduced patient complaints by 80% through
    billing redesign
  - Regular HFMA keynote speaker
  - Published in NEJM Catalyst, Health Affairs, and
    Harvard Business Review
  - Advisor to CMS on price transparency regulations

  Book concept:
  - Target audience: Healthcare executives, billing
    leaders, policy makers, and informed general readers
  - Premise: Medical billing is the single most broken
    system in US healthcare, causing more patient harm
    than most clinical errors, but it can be fixed
  - Approach: Combines data, patient stories, industry
    analysis, and a practical transformation framework
  - Comparable titles: "An American Sickness" (Rosenthal),
    "The Price We Pay" (Makary)

  Create:
  1. Book proposal overview and market positioning
  2. Chapter-by-chapter outline (12-15 chapters)
  3. Sample chapter (Chapter 1 or most compelling)
  4. Author platform and marketing strategy
  5. Competitive analysis against existing titles
  6. Target publishers and agent strategy
  7. Supplemental materials concept (website, toolkit)
  8. Speaking and media strategy for book launch

assertions:
  - type: llm_judge
    criteria: "Chapter outline balances problem diagnosis with solutions — doesn't just catalog billing problems (readers already know billing is broken); the first half establishes the scope and human impact of billing dysfunction, the second half presents a credible transformation framework with real examples; each chapter has a clear narrative arc with patient stories and data."
    weight: 0.35
    description: "ChapterOutlineBalance"
  - type: llm_judge
    criteria: "Market positioning differentiates from existing titles — Rosenthal and Makary focused on pricing and unnecessary care broadly; this book goes deep on billing specifically as a system failure; the proposal articulates what new ground this book covers that hasn't been addressed, and why the author's operational experience provides a uniquely actionable perspective."
    weight: 0.35
    description: "MarketDifferentiation"
  - type: llm_judge
    criteria: "Sample chapter hooks the reader — opens with a compelling patient story that illustrates the human cost of billing dysfunction, weaves in data that establishes the systemic nature of the problem, and ends with a preview of the solution framework; written in accessible prose, not industry jargon; makes a general reader care about billing reform."
    weight: 0.30
    description: "SampleChapterQuality"
