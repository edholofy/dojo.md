meta:
  id: billing-technology-product
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Design a medical billing technology product — create a SaaS platform for billing inquiry management with AI-powered resolution, patient self-service, and analytics"
  tags: [technology-product, saas-design, product-management, expert]

state: {}

trigger: |
  Design a SaaS product that transforms how healthcare
  organizations handle patient billing inquiries, from
  initial question through complete resolution.

  Product vision: "BillClear" — AI-powered billing
  inquiry resolution platform

  Market opportunity:
  - US healthcare organizations handle 1.2B+ patient
    billing inquiries annually
  - Average cost per inquiry: $8-15 (phone), $2-4
    (digital self-service)
  - 60% of inquiries are repetitive (balance, payment
    status, EOB explanation)
  - Current solutions: Call centers, patient portals
    (limited), clearinghouse tools
  - Gap: No purpose-built platform for end-to-end
    billing inquiry resolution
  - TAM: $4.8B | SAM: $1.2B | SOM: $120M (Year 5)

  Target users:
  - Patient billing departments (50-500 person teams)
  - Health system CFOs (ROI decision-makers)
  - Patients (end users of self-service features)

  Key capabilities needed:
  - AI-powered chat/voice for common inquiries
  - Integration with EHR, PMS, and payer systems
  - Automated claim status lookup and explanation
  - Payment processing and plan management
  - Inquiry routing and escalation workflows
  - Analytics and performance dashboards
  - Multi-language support
  - Compliance with HIPAA, PCI-DSS

  Create:
  1. Product requirements document (PRD)
  2. System architecture and integration design
  3. AI/ML model specifications for inquiry resolution
  4. User experience design (patient and staff personas)
  5. Data model and API specification
  6. Compliance and security architecture
  7. Pricing model and packaging strategy
  8. Product roadmap (MVP through Year 3)

assertions:
  - type: llm_judge
    criteria: "Product architecture solves the integration challenge — healthcare billing data lives across EHR, PMS, clearinghouse, and payer systems; the platform design includes specific integration approaches (HL7/FHIR, EDI 270/271, payer APIs) that aggregate billing data into a unified patient financial record that powers both AI resolution and agent workflows."
    weight: 0.35
    description: "IntegrationArchitecture"
  - type: llm_judge
    criteria: "AI model specification addresses the unique challenges of medical billing — NLU model trained on billing-specific language and patient phrasings; knowledge base includes CPT/ICD code explanations, payer-specific policies, and insurance terminology translations to plain language; confidence scoring determines when to resolve automatically vs. escalate to human; learns from resolution outcomes."
    weight: 0.35
    description: "AIModelSpecification"
  - type: llm_judge
    criteria: "Pricing model aligns value with willingness to pay — considers per-inquiry, per-resolution, or platform subscription models; accounts for different customer sizes (small practice vs. health system); creates pricing tiers that grow with usage and value delivered; includes an ROI calculator showing cost savings vs. traditional call center operations."
    weight: 0.30
    description: "PricingValueAlignment"
