meta:
  id: billing-consulting-practice
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Launch a medical billing consulting practice — develop service offerings, methodology frameworks, engagement models, and thought leadership for advising healthcare organizations on billing optimization"
  tags: [consulting, practice-building, methodology, expert]

state: {}

trigger: |
  You are launching a medical billing consulting
  practice after 20 years leading revenue cycle
  operations for major health systems. Design your
  consulting firm's foundation.

  Your background:
  - VP of Revenue Cycle at a $3B health system
  - Led billing transformation saving $45M annually
  - Implemented AI-driven denial prevention (50% reduction)
  - Published author on revenue cycle management
  - Speaker at HFMA and MGMA conferences
  - CPC, CPMA, CHFP certified

  Target market analysis:
  - 6,000+ hospitals in the US
  - 230,000+ physician practices
  - Average health system spends 3-5% of revenue on
    billing operations
  - RCM consulting market: $18B and growing 12% annually
  - Key competitors: Navigant, Huron, Advisory Board,
    boutique firms
  - Client pain points: declining reimbursement, staffing
    shortages, technology complexity, regulatory burden

  Create:
  1. Consulting firm business plan
  2. Service offering portfolio (5-7 core services)
  3. Proprietary assessment methodology
  4. Engagement model templates (discovery, assessment,
     implementation, optimization)
  5. Pricing strategy and fee structures
  6. Go-to-market strategy
  7. Thought leadership and content strategy
  8. Staffing plan and talent acquisition

assertions:
  - type: llm_judge
    criteria: "Proprietary assessment methodology differentiates from competitors — creates a structured, repeatable framework for evaluating an organization's billing operations across multiple dimensions (financial performance, operational efficiency, technology utilization, compliance, patient experience); produces a quantified maturity score with benchmarked comparisons and prioritized improvement opportunities."
    weight: 0.35
    description: "ProprietaryMethodology"
  - type: llm_judge
    criteria: "Service offerings are strategically designed to create recurring revenue — includes one-time assessment engagements that naturally lead to implementation projects, ongoing managed services or fractional leadership roles, and technology-enabled monitoring that creates long-term client relationships; not just one-and-done project work."
    weight: 0.35
    description: "RecurringRevenueModel"
  - type: llm_judge
    criteria: "Go-to-market strategy leverages the founder's specific credentials — uses the $45M savings case study, AI implementation experience, and conference speaking platform to generate inbound interest; targets specific market segments where the founder has domain expertise; includes a realistic client acquisition timeline and pipeline development approach."
    weight: 0.30
    description: "GoToMarketStrategy"
