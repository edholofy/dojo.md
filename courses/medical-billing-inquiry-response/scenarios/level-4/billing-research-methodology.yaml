meta:
  id: billing-research-methodology
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Design medical billing research methodology — develop studies measuring billing practice effectiveness, patient financial outcomes, and systemic billing reform impacts"
  tags: [research-methodology, evidence-based, study-design, expert]

state: {}

trigger: |
  Design a multi-phase research program studying the
  impact of medical billing practices on patient
  financial outcomes and healthcare utilization.

  Research context:
  - 41% of US adults have medical debt
  - Medical debt is the #1 cause of personal bankruptcy
  - Patients with medical debt delay/avoid needed care
  - Limited rigorous evidence on which billing
    interventions improve patient financial outcomes
  - Growing policy interest in medical debt reform
  - Major funders (RWJF, Commonwealth Fund, Arnold
    Ventures) prioritizing this area

  Proposed research program: "The Patient Financial
  Experience Study" (PFES)

  Research questions:
  1. How do different billing practices (proactive
     financial counseling, simplified statements, flexible
     payment plans, charity care screening) affect patient
     financial burden and healthcare utilization?
  2. What is the causal relationship between billing
     complexity and care avoidance?
  3. How do medical billing practices contribute to
     health disparities across racial and socioeconomic
     groups?
  4. What is the ROI for healthcare organizations that
     invest in patient-friendly billing practices?

  Available resources:
  - Partnership with 12 health systems willing to
    participate in studies
  - Access to all-payer claims databases in 5 states
  - Survey infrastructure for patient populations
  - $3.5M in initial funding
  - 3-year timeline

  Create:
  1. Research program overview and significance
  2. Study designs for each research question
  3. Methodology for measuring patient financial burden
  4. Data collection instruments and protocols
  5. Statistical analysis plan
  6. Ethical considerations and IRB strategy
  7. Dissemination and policy translation plan
  8. Budget allocation across research phases

assertions:
  - type: llm_judge
    criteria: "Study designs use appropriate methods for causal inference — the billing intervention study uses a cluster-randomized trial or stepped-wedge design across the 12 health systems; the care avoidance study uses difference-in-differences or instrumental variable approaches; the research doesn't rely solely on cross-sectional surveys or correlational analyses for causal questions."
    weight: 0.35
    description: "CausalInferenceDesign"
  - type: llm_judge
    criteria: "Patient financial burden measurement goes beyond simple balance amounts — develops a validated composite measure incorporating out-of-pocket costs, debt-to-income ratio, financial hardship indicators (food insecurity, housing instability), psychological distress, and care avoidance behaviors; captures the full patient experience, not just what the provider sees."
    weight: 0.35
    description: "FinancialBurdenMeasurement"
  - type: llm_judge
    criteria: "Policy translation plan bridges research and action — identifies specific policy levers (federal legislation, state medical debt laws, CMS regulations, payer policies) that research findings could inform; includes stakeholder engagement strategy with policymakers, advocacy organizations, and industry groups; creates policy briefs and actionable recommendations, not just academic publications."
    weight: 0.30
    description: "PolicyTranslationPlan"
