meta:
  id: expert-billing-shift
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Expert shift simulation — serve as interim CRO managing a health system billing crisis involving a False Claims Act investigation, payer contract termination, technology platform failure, and media exposure"
  tags: [shift-simulation, executive-crisis, multi-scenario, expert]

state: {}

trigger: |
  You have been brought in as interim Chief Revenue
  Officer for a health system in crisis. Handle these
  simultaneous existential threats during your first
  week.

  SITUATION 1 — False Claims Act investigation:
  The DOJ has notified the health system of a False
  Claims Act investigation based on a whistleblower
  complaint from a former coding supervisor. The
  complaint alleges systematic upcoding across all
  specialties, generating an estimated $45M in
  overpayments to Medicare and Medicaid over 5 years.
  The previous CRO resigned when the investigation
  was announced. Potential treble damages: $135M plus
  per-claim penalties.

  SITUATION 2 — Payer contract termination:
  Anthem, representing 30% of commercial revenue
  ($110M annually), has issued a 90-day termination
  notice citing "persistent billing irregularities
  and failure to resolve overpayment disputes." The
  termination would leave 45,000 patients needing to
  find new providers or pay out-of-network rates.

  SITUATION 3 — Technology failure:
  The health system's revenue cycle management platform
  (centralized billing system) suffered a catastrophic
  failure. The vendor says full restoration will take
  6-8 weeks. Meanwhile, no claims can be submitted,
  no payments posted, and no patient statements
  generated. Cash reserves cover 4 weeks of operations.

  SITUATION 4 — Media exposure:
  A local investigative journalist has published a
  series titled "Billing for Sickness: How [Health
  System] Profits from Patient Confusion." The series
  includes patient stories of aggressive collections,
  surprise bills, and financial ruin. Social media
  amplification is driving significant public backlash.
  The board wants an immediate response.

  Handle all four situations:
  1. DOJ investigation response strategy
  2. Anthem contract rescue plan
  3. Technology disaster recovery and cash management
  4. Media crisis communication plan
  5. Board communication and confidence management
  6. Integrated crisis management approach

assertions:
  - type: llm_judge
    criteria: "DOJ investigation response follows the correct legal and compliance protocol — immediately retains outside counsel specializing in healthcare fraud defense, issues a company-wide document preservation notice, engages forensic billing auditors for independent claims review, evaluates whether voluntary self-disclosure to OIG is strategically advisable, and does NOT destroy, alter, or minimize evidence; understands the treble damages exposure is existential."
    weight: 0.35
    description: "DOJInvestigationResponse"
  - type: llm_judge
    criteria: "Anthem contract rescue demonstrates strategic negotiation under pressure — requests a meeting to present a concrete corrective action plan, offers to resolve outstanding overpayment disputes with a settlement, proposes enhanced oversight and reporting, emphasizes patient impact of termination on 45,000 members; uses the patient disruption argument as leverage while acknowledging the legitimate concerns."
    weight: 0.35
    description: "AnthemContractRescue"
  - type: llm_judge
    criteria: "Media crisis response takes accountability without admitting legal liability — acknowledges patient experiences, announces concrete corrective actions (billing practice review, patient ombudsman, financial assistance expansion), doesn't attack the journalist or dismiss the stories; coordinates messaging across all four crises to present a coherent narrative of transformation."
    weight: 0.30
    description: "MediaCrisisResponse"
