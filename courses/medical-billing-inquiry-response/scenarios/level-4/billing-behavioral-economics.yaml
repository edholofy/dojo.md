meta:
  id: billing-behavioral-economics
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Apply behavioral economics to medical billing — design nudges, choice architecture, and framing interventions that improve patient payment behavior while maintaining ethical standards"
  tags: [behavioral-economics, nudge-design, patient-behavior, expert]

state: {}

trigger: |
  Apply behavioral economics principles to redesign
  medical billing practices that improve patient
  financial outcomes and organizational revenue while
  maintaining ethical boundaries.

  Organization: Beacon Health System
  - $1.2B annual net revenue
  - Patient self-pay and cost-sharing: $180M annually
  - Current self-pay collection rate: 28%
  - Average patient balance: $1,850
  - Payment plan adherence: 55% complete their plans
  - Financial assistance uptake: Only 12% of eligible
    patients apply

  Behavioral barriers identified:
  - Present bias: Patients prioritize immediate needs
    over medical bill payments
  - Status quo bias: Default is to ignore bills until
    collections
  - Information overload: Complex bills cause decision
    paralysis
  - Loss aversion: Fear of large balances causes
    avoidance
  - Social norms: No reference point for what others do
  - Optimism bias: "Insurance will probably cover it"
  - Mental accounting: Medical bills in different
    "mental bucket" than other obligations

  Ethical constraints:
  - Nudges must benefit patients, not just the organization
  - Cannot exploit cognitive biases to extract more money
  - Must preserve patient choice and autonomy
  - Financial assistance must remain easily accessible
  - Cannot create shame or social pressure

  Create:
  1. Behavioral audit of current billing practices
  2. Nudge intervention portfolio (8-10 specific nudges)
  3. Choice architecture for payment options
  4. Statement framing experiments
  5. Default and opt-out strategy design
  6. Ethical framework for billing nudges
  7. A/B testing methodology
  8. Measurement and evaluation plan

assertions:
  - type: llm_judge
    criteria: "Nudge portfolio addresses specific behavioral barriers with evidence-based interventions — anchoring effects in payment plan options, social norm messaging ('Most patients in your situation set up payment plans'), simplification of the payment decision, strategic use of deadlines and reminders, and pre-commitment devices; each nudge is mapped to a specific behavioral barrier."
    weight: 0.35
    description: "NudgePortfolioDesign"
  - type: llm_judge
    criteria: "Ethical framework distinguishes between beneficial and exploitative nudges — payment plan defaults that reduce patient stress are ethical; hiding financial assistance to increase payments is not; the framework provides a clear test for whether a nudge respects patient autonomy and serves patient welfare; includes a review process for proposed nudges."
    weight: 0.35
    description: "EthicalNudgeFramework"
  - type: llm_judge
    criteria: "A/B testing methodology is rigorous and appropriate for healthcare — addresses unique challenges like IRB considerations, patient consent for billing experiments, sample size calculations accounting for payment seasonality, and measurement of both financial outcomes (collection rate) and patient outcomes (satisfaction, care avoidance, financial distress)."
    weight: 0.30
    description: "TestingMethodology"
