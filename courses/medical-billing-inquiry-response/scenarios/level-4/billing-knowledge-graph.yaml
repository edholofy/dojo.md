meta:
  id: billing-knowledge-graph
  level: 4
  course: medical-billing-inquiry-response
  type: output
  description: "Design a medical billing knowledge graph — create a structured representation of billing concepts, rules, payer policies, and regulatory requirements that powers intelligent billing systems"
  tags: [knowledge-graph, ontology, knowledge-management, expert]

state: {}

trigger: |
  Design a comprehensive knowledge graph for medical
  billing that can power intelligent billing assistance
  systems, training programs, and compliance monitoring.

  Context:
  - Medical billing involves 100,000+ CPT/HCPCS codes
  - 70,000+ ICD-10-CM diagnosis codes
  - 500+ insurance payers with unique rules
  - Federal, state, and local regulations
  - Constantly changing policies and fee schedules
  - Knowledge currently exists in tribal knowledge,
    payer manuals, CMS transmittals, and scattered
    documentation

  Knowledge graph requirements:
  - Must represent relationships between codes, payers,
    rules, and regulations
  - Must capture temporal validity (rules change over
    time)
  - Must support natural language queries from billing
    staff
  - Must enable automated billing rule validation
  - Must integrate with existing billing systems
  - Must be maintainable as rules and regulations change

  Use cases:
  1. "Can I bill 99214 and 93000 together for this payer?"
  2. "What are the prior auth requirements for MRI of
     the lumbar spine under Blue Cross?"
  3. "Has the modifier -25 guidance changed for Medicare
     in the last 6 months?"
  4. "What documentation is required for Level 5 E/M
     billing?"
  5. "What are the No Surprises Act requirements for this
     out-of-network scenario?"

  Create:
  1. Knowledge graph ontology design
  2. Entity and relationship taxonomy
  3. Data ingestion architecture (CMS, payers, regs)
  4. Temporal versioning model
  5. Query interface design (natural language + structured)
  6. Validation rule engine architecture
  7. Maintenance and update workflow
  8. Integration API specification

assertions:
  - type: llm_judge
    criteria: "Ontology design captures the multi-dimensional nature of billing knowledge — models entities (codes, payers, providers, patients, regulations, modifiers) and their relationships (coverage, bundling, prior auth requirements, documentation rules); handles the complexity that the same code has different rules depending on payer, place of service, patient type, and date of service."
    weight: 0.35
    description: "OntologyDesign"
  - type: llm_judge
    criteria: "Temporal versioning model solves the critical challenge of billing rule currency — rules, fee schedules, and regulations change constantly; the model tracks effective dates, maintains historical versions for claims adjudication, handles prospective vs. retrospective changes, and supports point-in-time queries ('What was the rule on the date of service?')."
    weight: 0.35
    description: "TemporalVersioningModel"
  - type: llm_judge
    criteria: "Maintenance workflow addresses the knowledge graph's biggest ongoing challenge — defines processes for monitoring CMS transmittals, payer policy updates, LCD/NCD changes, and regulatory amendments; includes automated change detection, SME review workflows, validation testing before deployment, and version control; the graph is only valuable if it stays current."
    weight: 0.30
    description: "MaintenanceWorkflow"
