meta:
  id: geographic-revenue-forecasting
  level: 3
  course: revenue-forecasting
  type: output
  description: "Geographic revenue forecasting — forecast revenue across multiple regions with currency effects, regional growth rates, and market maturity differences"
  tags: [geographic, regional, currency, international, multi-market, advanced]

state: {}

trigger: |
  An international FP&A director says: "We operate in 4 regions and
  each has different dynamics:

  North America: $20M ARR, mature, growing 15% YoY, USD.
  Europe: $8M ARR, growing 25% YoY, EUR (strengthening 5% vs USD).
  Asia-Pacific: $3M ARR, growing 45% YoY, mixed currencies.
  Latin America: $1M ARR, growing 60% YoY, BRL (weakening 10% vs USD).

  Total: $32M ARR. Our board reports in USD. How do I build a forecast
  that accounts for regional differences, currency movements, and
  different growth trajectories? Last year our forecast missed by
  $2M partly because of unexpected currency movements."

  Task: Build a multi-region revenue forecast that handles currency
  effects, regional maturity differences, and consolidated reporting.

assertions:
  - type: llm_judge
    criteria: "Response builds regional forecasts with growth modeling — regional: 'Regional revenue forecasts: North America ($20M ARR, 15% YoY): the mature market — stable, predictable. Key assumptions: growth driven by upsell and moderate new business. Churn stable at 5% annual. No currency risk (reporting currency is USD). Forecast: Q1: $5.0M × 1.035 (quarterly growth) = $5.18M. Q2: $5.36M. Q3: $5.55M. Q4: $5.75M. Annual: $21.84M. This is the most reliable forecast — mature markets have established patterns. Europe ($8M ARR, 25% YoY, EUR): the growth market with currency tailwind. Local currency forecast (EUR): EUR ARR: approximately €7.3M (at current EUR/USD 1.10). Growth: 25% YoY in EUR. Q1: €1.87M. Q2: €1.98M. Q3: €2.10M. Q4: €2.23M. Annual EUR revenue: €8.18M. Currency conversion to USD: current rate: 1 EUR = 1.10 USD. EUR is strengthening 5% vs USD (expected year-end rate: 1.155). Three currency scenarios: scenario 1 — use current spot rate: €8.18M × 1.10 = $9.0M. Scenario 2 — use forward rates (market expectation): average rate for the year: approximately 1.125. €8.18M × 1.125 = $9.2M. Scenario 3 — EUR strengthens 5% as expected: average rate: approximately 1.125 (same, forward rates already reflect expectations). USD revenue: $9.2M. Currency tailwind: $9.2M vs $8.8M at constant currency = $400K positive impact. Asia-Pacific ($3M ARR, 45% YoY, mixed currencies): the high-growth market with complexity. Currency mix: Japan (JPY) 40%, Australia (AUD) 30%, Singapore (SGD) 20%, India (INR) 10%. Each sub-region has different growth rates: Japan: $1.2M, growing 30% YoY (mature market). Australia: $0.9M, growing 50% (early growth). Singapore: $0.6M, growing 55% (hub for SE Asia). India: $0.3M, growing 80% (early stage, massive potential). Local currency forecasts converted to USD: Japan: ¥175M → $1.56M (assuming JPY weakens 3%). Australia: AUD 1.4M → $1.35M (AUD stable). Singapore: SGD 0.93M → $0.93M. India: INR 54M → $0.54M (INR weakens 5%). APAC total: $4.38M. Latin America ($1M ARR, 60% YoY, BRL): the fastest-growing but currency-challenged. Local currency: BRL ARR approximately R$5.0M. Growth: 60% YoY in BRL → R$8.0M year-end ARR. Annual BRL revenue: approximately R$6.5M. Currency risk: BRL weakening 10% vs USD. Current rate: 1 USD = 5.0 BRL. Year-end expected: 1 USD = 5.5 BRL. Average rate: 5.25 BRL per USD. USD revenue: R$6.5M ÷ 5.25 = $1.24M. Without currency depreciation: R$6.5M ÷ 5.0 = $1.30M. Currency headwind: -$60K. Despite 60% local growth, USD revenue only grows 24% ($1.0M to $1.24M). This is the FX trap — high-growth emerging markets can disappoint in reporting currency'"
    weight: 0.35
    description: "Regional"
  - type: llm_judge
    criteria: "Response covers consolidated forecasting and currency management — consolidated: 'Consolidated forecast and currency management: the consolidated revenue forecast: region | local growth | FX impact | USD revenue | USD growth. NA: 15% | 0% | $21.84M | 9.2% (sequential quarterly). Europe: 25% | +4.5% | $9.20M | 15.0%. APAC: 45% | -2% (blended) | $4.38M | 46.0%. LatAm: 60% | -10% | $1.24M | 24.0%. Total: — | — | $36.66M | 14.6% growth from $32M. Constant currency analysis: this is how global companies report to separate business performance from currency effects. Constant currency growth (holding FX rates flat at beginning of year): Europe: €8.18M × 1.10 (constant) = $9.0M vs $8M = 12.5% CC growth. APAC: $4.35M (at constant rates) vs $3M = 45.0% CC growth. LatAm: R$6.5M ÷ 5.0 (constant) = $1.30M vs $1M = 30.0% CC growth. Total at constant currency: $36.49M (14.1% growth). Total at actual currency: $36.66M (14.6% growth). FX impact: +$170K net positive (Europe tailwind offsets LatAm headwind). Report both: the business grew 14.1% in constant currency. Reported USD growth was 14.6% including a 0.5pp currency tailwind. This honesty helps the board distinguish between operational performance and currency luck. Currency hedging implications: the forecast identifies currency exposures: EUR exposure: $9.2M (28% of revenue) — tailwind expected. JPY exposure: $1.56M (4%) — headwind expected. BRL exposure: $1.24M (3%) — significant headwind expected. AUD exposure: $1.35M (4%) — neutral. Hedging recommendation: hedge EUR and JPY exposure (largest and most volatile). Total exposure to hedge: approximately $10.8M. Hedging cost: typically 1-2% of hedged amount = $108-216K. Value at risk without hedging: if EUR/USD moves ±10% instead of ±5%: EUR impact: ±$800K. Total unhedged FX risk: approximately ±$1.2M. Whether to hedge depends on: risk tolerance (can the company absorb $1.2M variance?). Hedging cost vs expected impact. Management time to administer hedges'"
    weight: 0.35
    description: "Consolidated"
  - type: llm_judge
    criteria: "Response covers regional forecasting best practices and growth stage management — practices: 'Regional forecasting best practices: forecasting by market maturity: different regions are at different stages and need different models. Mature markets (North America): use time series methods — enough historical data for statistical models. Focus on retention and expansion (growth from new business is incremental). Model: bottom-up MRR with driver-based new business. Accuracy target: ±5% quarterly. Growth markets (Europe, Australia): use blended approach — historical data plus market sizing. Growth rates are still high — model growth rate deceleration. Model: cohort-based with regional acquisition trends. Accuracy target: ±10% quarterly. Emerging markets (APAC, LatAm): use scenario-based approach — high uncertainty, less historical data. Growth rates are volatile — wide confidence intervals. Model: top-down market sizing with bottom-up validation. Accuracy target: ±15-20% quarterly. Revenue mix management: track how the regional mix shifts over time. Current mix: NA 63%, EUR 25%, APAC 9%, LatAm 3%. Projected mix in 3 years: NA 50%, EUR 28%, APAC 15%, LatAm 7%. The shift toward non-USD revenue increases currency exposure. Plan for this by: increasing hedging as international mix grows. Building pricing in local currencies with periodic USD-peg adjustments. Considering natural hedging (matching local costs to local revenue). Regional investment allocation: the forecast reveals where growth ROI is highest. Region | growth rate | cost of growth (CAC) | ROI index. NA: 15% | $15K CAC | 1.0x (baseline). Europe: 25% | $12K CAC | 1.5x. APAC: 45% | $8K CAC | 2.8x. LatAm: 60% | $5K CAC | 4.0x. LatAm has the highest growth ROI — but also the highest currency risk and operational complexity. The optimal allocation balances: growth potential (favors APAC, LatAm). Currency risk (favors NA, EUR). Operational complexity (favors NA, EUR). Market maturity (favors EUR, APAC for growth). Avoiding the $2M miss — lessons for next year: the prior year's $2M miss came partly from FX. Preventive measures: use forward rates, not spot rates, for the annual forecast. Include a specific FX risk line in the forecast ($X million at risk). Update currency assumptions quarterly. Report constant currency growth alongside actual to detect FX surprises early. If the board sees constant currency growth at 14% but reported growth at 10%, they immediately understand that FX is the delta — not underperformance'"
    weight: 0.30
    description: "Practices"
