meta:
  id: advanced-revenue-shift
  level: 3
  course: revenue-forecasting
  type: output
  description: "Advanced revenue forecasting shift — a combined scenario requiring statistical methods, Monte Carlo simulation, cross-functional integration, and market-driven adjustments"
  tags: [shift, combined, assessment, multi-method, advanced]

state: {}

trigger: |
  A CFO is preparing the annual revenue plan for a $50M ARR B2B SaaS
  company going through significant changes:

  Current state: $50M ARR, 4,000 customers, $12.5K average ACV.
  NRR: 112%. Gross retention: 90%. New business: $15M/year.

  Upcoming changes: (1) Launching a new AI product module in Q2 that
  could drive $3-8M in incremental ARR. (2) A major competitor just
  raised $200M and is cutting prices 30%. (3) Expanding to Europe
  (currently US-only), targeting $5M European ARR by year-end.
  (4) The macro environment is uncertain — PMI is at 49.5.

  The board wants: a probabilistic forecast with confidence intervals,
  a sensitivity analysis on key drivers, a cross-functional consensus
  process, and quarterly milestone checkpoints.

  Task: Build a comprehensive annual revenue plan addressing all four
  requirements with appropriate methodology for each component.

assertions:
  - type: llm_judge
    criteria: "Response builds the base forecast with new initiative modeling — base: 'Comprehensive annual revenue plan: base forecast construction: Layer 1 — Existing business (most predictable): starting ARR: $50M. Gross retention: 90% → retain $45M. Expansion (NRR 112% - GRR 90% = 22% expansion): $50M × 22% = $11M expansion. Existing business year-end ARR: $45M + $11M = $56M. Annual recognized revenue from existing business (average of start and end): approximately $53M. Layer 2 — New business (US, current product): historical: $15M/year in new ARR. Competitive pressure from funded competitor: apply -15% adjustment. Adjusted new ARR: $12.75M. Revenue recognized in year (average half-year impact): $6.4M. Layer 3 — New AI product module (Q2 launch): scenario range: $3M to $8M in incremental ARR. Base case: $5M new ARR by year-end. Ramp: Q2: $500K, Q3: $1.5M, Q4: $3M cumulative (total $5M by year-end). Revenue recognized from AI module: approximately $2.5M (partial year). Layer 4 — European expansion (new geography): target: $5M European ARR by year-end. Ramp: Q1: preparation ($0), Q2: $500K, Q3: $1.5M, Q4: $3M cumulative. More realistic target: $3M (international launches typically achieve 60% of initial targets). Revenue recognized: approximately $1.2M. Combined base case: existing business: $53M. US new business: $6.4M. AI module: $2.5M. Europe: $1.2M. Total annual revenue: $63.1M. Year-end ARR: $56M + $12.75M + $5M + $3M = $76.75M. Note: year-end ARR ($76.75M) is much higher than annual revenue ($63.1M) because new initiatives ramp through the year. Monte Carlo simulation on the base: input distributions: gross retention: beta distribution (mean 90%, range 85-94%). NRR expansion: normal (mean 22%, SD 3%). US new business: triangular (min $9M, mode $12.75M, max $16M). AI module ARR: triangular (min $2M, mode $5M, max $8M). Europe ARR: triangular (min $1M, mode $3M, max $5M). After 10,000 simulations: annual revenue: P10: $57.5M, P50: $62.8M, P90: $69.2M. Year-end ARR: P10: $68M, P50: $76M, P90: $85M. Key finding: the range of outcomes is wide ($57.5M to $69.2M) because three major initiatives introduce significant uncertainty simultaneously'"
    weight: 0.35
    description: "Base"
  - type: llm_judge
    criteria: "Response covers sensitivity analysis and competitive/macro adjustments — sensitivity: 'Sensitivity analysis and market adjustments: tornado analysis — which driver matters most: driver | -20% scenario | base | +20% scenario | range. AI module success: $1.5M rev | $2.5M | $4.0M | $2.5M range. Gross retention: $51.8M total | $63.1M | - (capped at 100%) | $11.3M range. US new business: $61.8M | $63.1M | $64.4M | $2.6M range. NRR expansion: $60.5M | $63.1M | $65.7M | $5.2M range. Europe: $62.5M | $63.1M | $63.7M | $1.2M range. Ranking by annual revenue impact: 1. Gross retention (±$5.7M): most impactful — a 2pp change in GRR swings revenue by $1M+. 2. NRR expansion (±$2.6M): expansion drives significant revenue on a $50M base. 3. AI module (±$1.25M in-year): limited in-year impact because of late launch, but massive ARR impact for next year. 4. US new business (±$1.3M): meaningful but moderated by partial-year recognition. 5. Europe (±$600K): smallest in-year impact, more meaningful for Year 2+. Competitive adjustment — the $200M competitor: immediate impacts (already modeled in base): US win rate decreases 15% → $12.75M new ARR (vs $15M). Second-order impacts to model separately: pricing pressure at renewal: 10% of customers demand 15% discount to match. Impact: $50M × 10% × 15% = $750K revenue at risk. Increased churn: enterprise customers less affected, SMB more vulnerable. SMB churn increase from 12% to 15% annual → additional $900K at risk. Longer sales cycles: average deal closes 20% slower → fewer Q4 closes. Impact: approximately $500K in slipped deals from Q4 to next year. Total competitive headwind: approximately $2.15M annually. This is partially offset in the base case but additional analysis reveals $1M+ in unmodeled risk. Macro adjustment — PMI at 49.5: PMI below 50 signals contraction. Historical impact for our business: PMI 49-50: sales cycles extend 15%, enterprise budget reviews increase. Impact model: new business volume: -10% (companies delay new software purchases). Expansion: -5% (companies slow seat additions and upgrades). Churn: +1pp (budget-constrained customers cancel). Macro-adjusted forecast: new business: $12.75M × 90% = $11.5M. Expansion: $11M × 95% = $10.45M. Additional churn: $50M × 1% = $500K. Total macro headwind: approximately $2.3M. Stress scenario: if PMI drops to 47 (recession territory): double the macro headwind to $4.6M. Annual revenue drops to $58.5M. Year-end ARR drops to $70M'"
    weight: 0.35
    description: "Sensitivity"
  - type: llm_judge
    criteria: "Response covers cross-functional consensus and quarterly checkpoints — consensus: 'Cross-functional consensus and quarterly checkpoints: the consensus process for this plan: Step 1 — Pre-meeting alignment: distribute the base forecast model to all department heads. Each team reviews the assumptions relevant to their domain: sales: new business pipeline, win rates, deal sizes. Product: AI module timeline, adoption assumptions, feature readiness. CS: retention, expansion, churn signals. Marketing: lead generation, Europe pipeline, demand gen budget. International: Europe go-to-market plan, local hiring, regulatory compliance. Step 2 — Assumption reconciliation meeting: focus on the five areas of highest disagreement. Likely debates: product says AI module will hit $8M (optimistic). Sales says $3M (conservative — they have not sold it yet). Resolution: use a $5M base with $3M conservative and $8M optimistic scenarios. Sales says new US business is $15M (pre-competitive adjustment). CS says competition will reduce it to $10M. Resolution: use $12.75M (15% competitive haircut — between the two views). Step 3 — Consensus output: the agreed-upon plan: annual revenue: $63.1M (base case). Confidence range: $57.5M - $69.2M (P10-P90). Year-end ARR: $76.75M. Key risk: gross retention (largest swing factor). Key opportunity: AI module (if product-market fit exceeds expectations). Quarterly milestone checkpoints: Q1 milestones (by end of March): existing business NRR: >110% (tracking to plan). US pipeline: >$25M weighted (sufficient for $12.75M target). AI module: beta complete, 10 design partners committed. Europe: first hire made, first 3 pilot customers signed. PMI: track trend (if drops below 48, activate downturn playbook). If Q1 milestones are met: maintain base forecast. If US pipeline is below $20M: downgrade US new business to $10M (conservative). If AI beta feedback is negative: downgrade AI module to $3M. Q2 milestones (by end of June): AI module: public launch, $500K ARR from early adopters. Europe: $500K ARR from pilot expansion. Competitive impact: track win rate — if below 20%, activate competitive response. Revenue: Q1+Q2 recognized revenue should be approximately $29M (46% of annual). Q3 milestones (by end of September): AI module: $2M cumulative ARR (on track for $5M). Europe: $2M cumulative ARR (on track for $3M). Year-to-date revenue: approximately $45M (71% of annual). Forecast should be refined to ±5% accuracy for Q4. Q4 milestones (by end of December): full year close. Post-mortem on forecast accuracy. Set up next year's plan using lessons learned. Each quarterly checkpoint narrows the forecast range and provides an opportunity to adjust resource allocation based on which initiatives are performing and which are underperforming'"
    weight: 0.30
    description: "Consensus"
