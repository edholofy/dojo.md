meta:
  id: forecast-decomposition
  level: 3
  course: revenue-forecasting
  type: output
  description: "Forecast decomposition — break down revenue forecasts into component drivers using STL, seasonal adjustment, and driver attribution to explain and improve accuracy"
  tags: [decomposition, stl, attribution, components, advanced]

state: {}

trigger: |
  A revenue operations lead says: "Our forecast last quarter was
  $12M and we hit $11.2M — a 7% miss. Leadership wants to know
  exactly WHY we missed and which component was off. I need to
  decompose the forecast into its components and attribute the
  miss to specific drivers.

  Our revenue comes from: 3,200 customers across 4 segments (SMB,
  mid-market, enterprise, strategic). Each segment has different
  growth, churn, and expansion patterns. I also need to separate
  the trend, seasonal, and one-time effects.

  How do I decompose the forecast to find exactly where it went wrong?"

  Task: Demonstrate forecast decomposition techniques including
  segment-level attribution, time series decomposition, and driver
  attribution to explain the variance.

assertions:
  - type: llm_judge
    criteria: "Response covers segment-level decomposition and attribution — segments: 'Segment-level forecast decomposition: decomposing the $800K miss by customer segment: segment | forecast | actual | variance | % of miss. SMB (2,400 customers): $4.0M | $3.7M | -$300K | 37.5%. Mid-market (500 customers): $3.5M | $3.4M | -$100K | 12.5%. Enterprise (250 customers): $3.2M | $3.0M | -$200K | 25.0%. Strategic (50 customers): $1.3M | $1.1M | -$200K | 25.0%. Total: $12.0M | $11.2M | -$800K | 100%. First insight: SMB contributed the most absolute variance ($300K) but strategic had the highest percentage miss (15.4%). The 50 strategic accounts caused $200K in variance — $4K per account on average. Further decomposition within each segment — the MRR waterfall: for SMB segment ($300K miss): component | forecast | actual | variance. Starting MRR: $1,280K | $1,280K | $0 (known at quarter start). New MRR: $180K | $140K | -$40K (fewer new customers). Expansion MRR: $120K | $95K | -$25K (lower upsell). Churned MRR: -$200K | -$240K | -$40K (higher churn). Contraction MRR: -$50K | -$65K | -$15K (more downgrades). Net change: $50K | -$70K | -$120K. Quarter revenue impact: approximately -$300K (cumulative effect across 3 months). SMB miss decomposition: 33% from lower acquisition (pipeline quality or volume issue). 21% from weak expansion (product adoption or pricing). 33% from higher churn (customer satisfaction or competitor). 13% from more contraction (downgrades to lower tiers). For strategic segment ($200K miss): component | forecast | actual | variance. Starting MRR: $420K | $420K | $0. New MRR: $50K | $20K | -$30K (one expected enterprise deal slipped). Expansion MRR: $35K | $30K | -$5K (slightly below plan). Churned MRR: -$10K | -$60K | -$50K (one strategic account churned unexpectedly). Quarter revenue impact: approximately -$200K. Strategic miss is dominated by two events: one deal slipped ($30K/month impact) and one strategic account churned ($50K/month impact). The strategic segment is inherently lumpy — individual account events drive large variances'"
    weight: 0.35
    description: "Segments"
  - type: llm_judge
    criteria: "Response covers time series decomposition of the miss — timeseries: 'Time series decomposition of the miss: separating trend, seasonal, and irregular components: using STL (Seasonal and Trend decomposition using Loess) or classical decomposition to break the revenue time series into: trend component: the underlying growth trajectory. Seasonal component: the predictable recurring pattern. Residual component: everything else (irregular, one-time events, noise). Applying STL to 36 months of historical data: trend: revenue has been growing $150K/month on average. Current trend level: approximately $3.9M/month. The trend has been slightly decelerating — growth was $180K/month a year ago, now $120K/month. Seasonal component: quarter | seasonal effect. Q1: -8% (below trend). Q2: +2% (slightly above). Q3: -3% (slightly below). Q4: +12% (well above trend). Last quarter was Q3 (seasonally weak), which was accounted for in the forecast. Residual analysis: after removing trend and seasonality from actuals. Last quarter residuals: month 1: -$40K (slightly below expected). Month 2: -$120K (significantly below). Month 3: -$80K (below but improving). Total residual: -$240K. The residual tells us: $560K of the miss was structural (explained by trend and seasonal miscalculation). $240K was driven by unexpected events (residual). Trend vs seasonal attribution: trend miss: the forecast assumed $150K/month growth continuing. Actual growth decelerated to $120K/month. Three-month trend impact: 3 × $30K = $90K of the miss attributed to trend deceleration. Seasonal miss: the forecast used -3% seasonal adjustment for Q3. Actual seasonal effect was approximately -5%. Impact: $12M × 2% = $240K attributed to stronger seasonal dip. One-time events: the strategic account loss ($50K/month × 3 = $150K) accounts for most of the residual. The deal slip contributes $30K/month × 2 months = $60K. Combined one-time impact: approximately $210K. Attribution summary: cause | amount | % of miss | type. Trend deceleration: $90K | 11% | structural — may continue. Seasonal underestimate: $240K | 30% | fixable — update seasonal indices. Lower SMB acquisition: $120K | 15% | operational — investigate pipeline. Higher SMB churn: $120K | 15% | operational — investigate customer success. Strategic account loss: $150K | 19% | one-time event. Deal slippage: $60K | 8% | timing — recoverable. Weak expansion: $20K | 2% | minor. Total: $800K | 100%'"
    weight: 0.35
    description: "TimeSeries"
  - type: llm_judge
    criteria: "Response covers actionable improvements from decomposition — actions: 'Actionable improvements from decomposition: priority-ranked interventions based on decomposition findings: Priority 1 — Fix the seasonal model (addresses 30% of miss): the Q3 seasonal effect was underestimated (-3% used, -5% actual). Action: recalculate seasonal indices using the last 3 years of data, weighting recent years more heavily. If only 2 years existed previously, the third year of data may change the pattern. Impact: prevents $240K seasonal miss in future Q3 forecasts. Effort: low (model recalibration, 2-3 hours). Priority 2 — Address SMB acquisition decline (addresses 15% of miss): SMB new customer acquisition came in 22% below plan. Possible causes: marketing spend was the same but channel effectiveness declined. Sales qualification standards tightened (fewer but higher-quality leads). Competitive pressure in SMB segment. Action: analyze acquisition by channel, identify which channel underperformed, adjust forecast inputs. Impact: prevents $120K miss per quarter if sustained. Effort: medium (requires marketing and sales analysis). Priority 3 — Address SMB churn increase (addresses 15% of miss): SMB churn was 20% higher than forecast. Possible causes: product quality issue (check NPS, support tickets). Competitor offering attracted price-sensitive SMB customers. Seasonal effect specific to SMB (e.g., small business budget cuts in Q3). Action: conduct churn analysis — are churned customers going to competitors or going dark? Impact: $120K/quarter if sustained, plus compound effects on future quarters. Effort: medium-high (requires customer success investigation and intervention). Priority 4 — Update the growth trend assumption (addresses 11% of miss): growth is decelerating from $180K/month to $120K/month. This is natural for a maturing business but needs to be reflected in the forecast. Action: use a decelerating growth model instead of linear growth. Model growth rate as a function of revenue level (growth slows as the base grows). Impact: $90K/quarter improvement in forecast accuracy. Effort: low (model update). Priority 5 — Improve strategic segment forecasting (addresses 19% of miss): individual strategic account events drive large variances. Action: implement account-level forecasting for the top 20-30 accounts. Assign probability estimates to known risks (contract renewals, champion changes, competitive threats). Impact: reduces one-time surprise variance significantly. Effort: high (requires account management input and regular updates). The decomposition feedback loop: each month, decompose the forecast variance into these same categories. Track whether each category is improving: category | Q1 variance | Q2 variance | Q3 variance | trend. Seasonal: $50K | $100K | $240K | worsening. Trend: $30K | $60K | $90K | worsening. Acquisition: $80K | $50K | $120K | volatile. Churn: $40K | $60K | $120K | worsening. One-time: $100K | $20K | $210K | lumpy. This creates accountability — the team responsible for each component can see whether their accuracy is improving'"
    weight: 0.30
    description: "Actions"
