meta:
  id: revenue-recognition-forecasting
  level: 3
  course: revenue-forecasting
  type: output
  description: "Revenue recognition forecasting — understand how ASC 606 revenue recognition rules affect forecasts and how to model bookings-to-revenue conversion"
  tags: [revenue-recognition, asc606, bookings, billings, deferred, advanced]

state: {}

trigger: |
  A controller says: "Our CEO keeps confusing bookings with revenue
  and it's causing forecast misses. Last quarter we booked $8M in new
  contracts but only recognized $3.2M in revenue. The CEO presented
  $8M to the board and now they think we're underperforming.

  We have a mix of contract types: monthly subscriptions, annual
  prepaid contracts, multi-year enterprise deals with implementation
  phases, and professional services billed on milestones.

  How do I build a forecast that properly models the bookings-to-
  revenue conversion for each contract type?"

  Task: Explain the bookings-billings-revenue distinction, model
  the conversion for each contract type, and build a proper revenue
  recognition forecast.

assertions:
  - type: llm_judge
    criteria: "Response explains bookings, billings, and revenue distinctions — distinctions: 'Bookings, billings, and revenue — the critical distinctions: bookings: the total value of new contracts signed. When a customer signs a 3-year, $300K contract, bookings = $300K on the signing date. Bookings represent future commitment, not current revenue. Billings: invoices sent to the customer. The $300K contract might be billed annually: $100K at signing, $100K at year 2, $100K at year 3. Billings represent cash flow timing. Revenue (recognized): the amount recorded as earned under accounting rules (ASC 606/IFRS 15). The $300K contract is recognized as revenue as the service is delivered: $8.33K per month over 36 months. Revenue represents value delivered. Why this matters for forecasting: the CEO presented $8M in bookings to the board. But only $3.2M was recognizable as revenue in the quarter. The gap ($4.8M) is deferred — it will be recognized in future quarters. This is not underperformance — it is the natural lag between booking and recognition. The bookings-to-revenue waterfall: bookings in Q1: $8M. Less: multi-year portion deferred to future years: -$2.5M (contracts spanning beyond this year). Less: annual contracts with partial quarter delivery: -$1.8M (signed mid-quarter, only partial months delivered). Less: implementation-dependent revenue: -$500K (milestones not yet achieved). Q1 recognized revenue: $3.2M. Future revenue locked in from Q1 bookings: Q2: $1.5M. Q3: $1.2M. Q4: $1.1M. Year 2+: $2.5M. Total lifetime revenue from Q1 bookings: $9.5M (may exceed $8M if expansion is included). Modeling by contract type: Type 1 — Monthly subscriptions: booking = 1 month. Billing = monthly. Revenue recognition = monthly (immediate). Conversion ratio: 100% recognized in the month earned. Forecast model: monthly revenue = active subscribers × monthly price. No lag between booking and revenue. Type 2 — Annual prepaid contracts: booking = 12 months at signing. Billing = upfront or quarterly. Revenue recognition = 1/12 per month over 12 months. Conversion ratio: only 1/12 (8.3%) recognized in the signing month. Example: $120K annual contract signed March 1. March revenue: $10K. Q1 revenue: $10K (only 1 month). Full year: $120K. Forecast model: create a schedule of when each contract starts and allocate monthly. Type 3 — Multi-year enterprise deals: booking = total contract value ($300K). Billing = annual ($100K/year). Revenue recognition = monthly over contract term ($8.33K/month). Conversion ratio: only 2.8% recognized in the signing month (1/36). These deals create a large deferred revenue balance and a reliable future revenue stream. Type 4 — Professional services (milestone-based): booking = total project value ($200K). Billing = at milestone completion. Revenue recognition = percentage of completion or milestone delivery. Example: phase 1 (discovery): $40K, recognized when delivered. Phase 2 (implementation): $120K, recognized over 3 months. Phase 3 (training): $40K, recognized when completed. Revenue timing depends on project execution, not contract signing'"
    weight: 0.35
    description: "Distinctions"
  - type: llm_judge
    criteria: "Response builds the revenue recognition forecast model — model: 'Building the revenue recognition forecast model: the deferred revenue waterfall: starting deferred revenue (beginning of quarter): $4.5M. This represents previously booked revenue that has not yet been recognized. Plus new bookings this quarter: $8M. Less revenue recognized this quarter: -$3.2M. Plus other adjustments (cancellations, modifications): -$300K. Ending deferred revenue: $9.0M. The $9.0M in deferred revenue is committed future revenue — it will be recognized in upcoming quarters as services are delivered. This is the built-in floor for future revenue forecasts. Building the month-by-month recognition schedule: for each existing contract and expected new booking, create a recognition timeline. Existing contracts — already signed, recognition schedule known: contract | monthly recognition | remaining months | total remaining. Customer A (annual): $10K/month | 8 months | $80K. Customer B (3-year): $8.3K/month | 28 months | $233K. Customer C (annual): $5K/month | 3 months | $15K. Total existing schedule: creates a baseline recognition curve. New bookings — forecast when deals close and model recognition: expected Q2 booking: $7M in new contracts. Breakdown: monthly subscriptions: $1M → recognized immediately. Annual contracts: $4M → recognized over 12 months ($333K/month starting from booking month). Enterprise multi-year: $1.5M → recognized over 24-36 months ($42-63K/month). Services: $500K → recognized based on milestone timing ($167K/quarter). Q2 recognition from Q2 bookings: monthly subs: $1M (full recognition). Annual: $4M × (average 2 months in quarter ÷ 12) = $667K. Enterprise: $1.5M × (average 2 months ÷ 30) = $100K. Services: $500K × 40% (first milestone achievable in quarter) = $200K. Q2 new booking recognition: $1.97M. Total Q2 revenue: existing base recognition + new booking recognition. Existing base: approximately $3.8M (from existing contract schedule). New Q2 bookings: $1.97M. Total: approximately $5.77M. Key insight: most of Q2's revenue ($3.8M of $5.77M = 66%) comes from contracts already signed. Only 34% depends on new Q2 bookings. This is the power of the deferred revenue base — it makes revenue highly predictable. The annual forecast model: quarter | existing base | new bookings recognition | total. Q1: $3.2M (actual) | $0M | $3.2M. Q2: $3.8M | $2.0M | $5.8M. Q3: $4.5M | $2.8M | $7.3M. Q4: $5.2M | $3.5M | $8.7M. Annual total: $25.0M. Note how revenue grows through the year as deferred revenue from earlier bookings layer in. Q4 benefits from 12 months of accumulated bookings'"
    weight: 0.35
    description: "Model"
  - type: llm_judge
    criteria: "Response covers communicating bookings vs revenue to leadership — communication: 'Communicating bookings vs revenue to leadership: the CEO education framework: create a one-page cheat sheet for the CEO and board: metric | what it measures | when to use it | watch out for. Bookings: commitment from customers | growth signal, sales effectiveness | does not equal cash or revenue. ARR: annualized recurring revenue | business trajectory, valuation metric | forward-looking, not actual revenue. Billings: cash collected or invoiced | cash flow planning, collections health | timing varies by payment terms. Revenue (GAAP): value delivered per accounting rules | financial reporting, profitability | lags behind bookings. The key chart — bookings-to-revenue bridge: show this quarterly to the board. Start with bookings bar. Show the conversion waterfall. End with recognized revenue. Include deferred revenue balance (the future revenue reservoir). Quarter-over-quarter: show how the deferred reservoir grows (more future revenue locked in). Metrics the board should track: bookings growth: are we signing more new business? (Leading indicator). Revenue growth: is recognized revenue growing? (Lagging but definitive). Deferred revenue growth: is the future revenue floor rising? (Predictability indicator). Bookings-to-revenue conversion ratio: what percentage of bookings becomes revenue in the same period? Monthly subscriptions: approximately 100%. Blended company: typically 35-50% in the booking quarter. The ratio tells you how long it takes bookings to flow through to revenue. Revenue visibility metric: how much of next quarter's revenue is already locked in from existing contracts and deferred revenue? If 75% of next quarter's revenue is already contracted: very high visibility. If 50%: moderate visibility. If 25%: low visibility (more dependent on new bookings). For companies with multi-year contracts: visibility can be 80-90%. For monthly subscription companies: visibility is lower (depends on retention assumptions). Common board questions and answers: Q: why is revenue only $3.2M when we booked $8M? A: our average contract term is 18 months. Only 40% of a new contract's value is recognized in the first quarter. The remaining 60% is deferred revenue — locked-in future revenue that will flow into the next 4-6 quarters. Our deferred revenue grew from $4.5M to $9.0M — this is a positive signal showing increasing future revenue commitments. Q: should we shift to more monthly contracts to accelerate recognition? A: monthly contracts recognize faster but annual and multi-year contracts provide better cash flow, higher retention, and greater revenue predictability. The trade-off: faster recognition (looks better in the short term) vs. longer commitments (more predictable and higher LTV). Most high-growth SaaS companies prefer annual+ contracts for predictability'"
    weight: 0.30
    description: "Communication"
