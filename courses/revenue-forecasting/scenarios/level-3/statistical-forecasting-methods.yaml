meta:
  id: statistical-forecasting-methods
  level: 3
  course: revenue-forecasting
  type: output
  description: "Statistical forecasting methods — apply ARIMA, exponential smoothing, and regression models to revenue data with model selection and validation"
  tags: [arima, regression, statistical, model-selection, advanced]

state: {}

trigger: |
  A senior data analyst says: "Management wants me to move beyond
  simple growth rate projections and use proper statistical methods.
  I have 36 months of monthly revenue data that shows clear trend
  and seasonality. Our revenue has grown from $500K to $1.2M monthly
  over 3 years with consistent Q4 peaks and Q1 troughs.

  I've heard of ARIMA, exponential smoothing, and regression but
  don't know which to use or how to validate. The forecast needs
  to be defensible to our board's data-savvy members."

  Task: Compare statistical forecasting methods, recommend the best
  approach for this data, and show how to validate and defend the model.

assertions:
  - type: llm_judge
    criteria: "Response explains and compares statistical methods — methods: 'Statistical forecasting methods comparison: Method 1 — ARIMA (AutoRegressive Integrated Moving Average): how it works: ARIMA models the revenue series as a function of its own past values (autoregressive) and past forecast errors (moving average). The Integrated part handles non-stationary data (trending series) by differencing. ARIMA(p,d,q) parameters: p = autoregressive order (how many past values to use). d = differencing order (how many times to difference for stationarity). q = moving average order (how many past errors to use). For seasonal data: SARIMA adds seasonal components — ARIMA(p,d,q)(P,D,Q)m. With monthly data and yearly seasonality: m=12. Typical specification for revenue data: SARIMA(1,1,1)(1,1,1)12. This means: first-order AR and MA with one seasonal difference and one regular difference. Application to our data: the model captures both the upward trend (through differencing) and the seasonal pattern (through seasonal components). Strengths: flexible, handles complex patterns, well-established theory. Weaknesses: requires stationarity assumptions, can overfit with too many parameters, harder to interpret than simpler methods, needs 36+ data points. Method 2 — Exponential smoothing (ETS): how it works: ETS (Error, Trend, Seasonality) models decompose the series into error, trend, and seasonal components, each with a smoothing parameter. ETS taxonomy: ETS(A,N,N): simple exponential smoothing (no trend, no seasonality). ETS(A,A,N): Holt's method (additive trend, no seasonality). ETS(A,A,A): Holt-Winters additive (additive trend and seasonality). ETS(A,A,M): Holt-Winters multiplicative (additive trend, multiplicative seasonality). For our data: ETS(M,A,M) — multiplicative errors, additive trend, multiplicative seasonality. This is appropriate because seasonal swings grow proportionally with revenue level. Strengths: intuitive decomposition, automatically adapts to changing patterns, good for business users to understand, works well with 24+ data points. Weaknesses: assumes exponential decay of old information, limited ability to include external variables. Method 3 — Regression-based approaches: how it works: model revenue as a function of time and other variables. Simple trend regression: Revenue = β₀ + β₁×time + ε. With seasonal dummies: Revenue = β₀ + β₁×time + Σ(β_month × month_dummy) + ε. With external variables: Revenue = β₀ + β₁×time + β₂×marketing_spend + β₃×customer_count + ε. For our data: multiple regression with time trend, seasonal dummies, and business drivers. Revenue_t = 480K + 19.5K×t + seasonal_adjustment + β×marketing_t. Strengths: easy to interpret (each coefficient has a clear meaning), can include external drivers, provides statistical significance tests. Weaknesses: assumes linear relationships, cannot capture complex temporal patterns, residuals may be autocorrelated (violating regression assumptions). Recommendation for this data: primary model: ETS(M,A,M) — Holt-Winters multiplicative. It captures the trend and growing seasonal pattern naturally. Easy to explain to the board. Provides prediction intervals. Validation model: SARIMA(1,1,1)(1,1,1)12. Use as a cross-check against ETS. If both models agree within 5%, confidence is high. Supporting model: regression with drivers. Helps explain WHY revenue is what it is, even if the other models predict WHAT it will be'"
    weight: 0.35
    description: "Methods"
  - type: llm_judge
    criteria: "Response covers model validation and selection — validation: 'Model validation and selection: the validation framework: Step 1 — Train-test split: use months 1-30 for training (fitting the model). Hold out months 31-36 for testing (validating predictions). Never use the same data for both fitting and evaluating. Step 2 — Fit models on training data: fit ETS, SARIMA, and regression on months 1-30. Generate forecasts for months 31-36. Step 3 — Compare forecasts to actuals: model | MAPE | MAE | RMSE | bias. ETS(M,A,M): 4.8% | $48K | $62K | -0.5% (slight underforecast). SARIMA(1,1,1)(1,1,1)12: 5.2% | $53K | $68K | +1.2% (slight overforecast). Regression with dummies: 7.1% | $72K | $85K | -2.8% (underforecasts consistently). ETS wins on all metrics — select it as the primary model. Step 4 — Cross-validation (rolling origin): more robust than a single train-test split. Start with months 1-24, forecast month 25, compare to actual. Then months 1-25, forecast month 26, compare. Continue through month 36. This gives 12 forecast-actual pairs for evaluation, reducing the risk that the single test set was unusually easy or hard. Step 5 — Residual diagnostics: after fitting the model, check that residuals (actual minus predicted on training data) are: random (no pattern when plotted over time). Normally distributed (for valid prediction intervals). Not autocorrelated (Ljung-Box test p-value > 0.05). Homoscedastic (constant variance — no fan shape). If residuals show patterns, the model is missing something. Information criteria for model comparison: AIC (Akaike Information Criterion): balances fit quality against model complexity. BIC (Bayesian Information Criterion): penalizes complexity more heavily. Lower AIC/BIC = better model. Example: model | AIC | BIC. ETS(M,A,M): 892 | 918. ETS(A,A,M): 897 | 923. SARIMA(1,1,1)(1,1,1)12: 901 | 935. ETS(M,A,M) has the lowest AIC and BIC — confirming it as the best choice. Prediction intervals: the model should produce not just point forecasts but intervals. Month 37 forecast: $1.25M. 80% interval: $1.15M - $1.35M. 95% interval: $1.08M - $1.42M. These intervals widen as the forecast horizon extends. Month 42 (6 months out): $1.38M. 80% interval: $1.18M - $1.58M. 95% interval: $1.05M - $1.71M. By month 42, the 95% interval spans $660K — a 48% range. This honestly communicates the forecast uncertainty'"
    weight: 0.35
    description: "Validation"
  - type: llm_judge
    criteria: "Response covers defending the model to the board — defense: 'Defending the model to the board: the board defense framework: anticipate three types of questions. Type 1 — methodology questions: Q: why did you choose this model? A: we tested three approaches (ETS, ARIMA, regression) on held-out data. ETS had the lowest error rate (4.8% MAPE) and best captures our growth trend and seasonal pattern. We validated using rolling cross-validation, not just one test period. Q: what about machine learning models? A: for 36 months of monthly data, ML models typically overfit. Statistical models outperform ML when data is limited. If we had daily data (1,000+ points), ML approaches would be worth exploring. Q: how do you know the model will work going forward? A: we do not know with certainty — that is why we present confidence intervals. The model assumes current patterns continue. We monitor monthly and retrain quarterly. If the model's errors exceed 10% for two consecutive months, we investigate and potentially re-specify. Type 2 — assumptions questions: Q: what are the key assumptions? A: the model assumes: the growth trend continues at a similar rate (not accelerating or decelerating). Seasonal patterns remain similar year-over-year. No structural breaks (new product launches, market disruptions, acquisitions). These are tested explicitly: we compare recent seasonal indices to historical ones. We track whether the trend is linear, accelerating, or decelerating. Any planned initiatives (pricing changes, market expansion) are modeled as adjustments on top of the statistical forecast. Q: what could make this forecast wrong? A: three scenarios that would invalidate the model: a major customer loss (>5% of revenue) — not captured in statistical patterns. A new product launch that changes the revenue trajectory. A macroeconomic shift that changes customer behavior. For each, we have prepared scenario adjustments. Type 3 — precision questions: Q: you are showing $1.25M for next month — how confident are you? A: we are 80% confident it will be between $1.15M and $1.35M. We are 95% confident it will be between $1.08M and $1.42M. Our model has been within 5% of actual for 10 of the last 12 months. Q: can we use this for individual customer forecasting? A: no — this model forecasts aggregate revenue. Individual customer behavior requires a different approach (cohort models, propensity scoring). The aggregate model works because individual variations cancel out at scale. Building credibility over time: the most powerful defense is a track record. After 6 months: show a chart of forecast vs actual for each month. Calculate cumulative accuracy (should be improving). Show that the model catches seasonal patterns correctly. A track record of 90%+ accuracy for 6 consecutive months makes the model essentially self-defending'"
    weight: 0.30
    description: "Defense"
