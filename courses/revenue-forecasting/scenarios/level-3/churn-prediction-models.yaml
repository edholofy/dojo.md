meta:
  id: churn-prediction-models
  level: 3
  course: revenue-forecasting
  type: output
  description: "Churn prediction models — build predictive models for customer churn to improve revenue forecast accuracy on the retention component"
  tags: [churn, prediction, retention, health-scoring, modeling, advanced]

state: {}

trigger: |
  A head of customer success says: "Our revenue forecast keeps missing
  on the churn side. Last quarter we forecasted 3% monthly churn but
  actual was 4.5%. We have 1,500 customers generating $15M ARR and
  we need to predict which customers are at risk of churning.

  Available data: product usage (logins, features used, API calls),
  support tickets (volume, severity, resolution time), NPS scores
  (quarterly), contract details (term, renewal date, discount level),
  billing data (late payments, downgrades), and engagement metrics
  (training attended, community participation).

  How do I build a churn prediction model that improves our forecast?"

  Task: Design a churn prediction model using the available data,
  show how it integrates into the revenue forecast, and demonstrate
  the forecast accuracy improvement.

assertions:
  - type: llm_judge
    criteria: "Response builds the churn prediction model with feature engineering — model: 'Building the churn prediction model: Step 1 — Define the prediction target: churn definition: a customer is considered churned if they cancel their subscription or do not renew by their contract end date. Prediction window: predict whether a customer will churn in the next 90 days. This gives enough lead time for intervention while being specific enough for useful predictions. Step 2 — Feature engineering: transform raw data into predictive features. Usage features: login_frequency_30d: average logins per week in the last 30 days. login_trend: ratio of last 30-day logins to prior 30-day logins (declining = risk). feature_adoption_score: percentage of key features used at least once. api_call_volume_trend: change in API usage over last 90 days. days_since_last_login: most powerful single feature — customers who stop logging in almost always churn. Support features: tickets_open_30d: number of support tickets in last 30 days. ticket_severity_avg: average severity of recent tickets. escalation_count: number of tickets escalated to management. resolution_time_avg: average time to resolve tickets (slower = more frustrated). unresolved_tickets: currently open tickets. Satisfaction features: nps_score: latest NPS score (0-10). nps_trend: change in NPS from previous survey. Contractual features: contract_remaining_months: time until renewal (churn risk increases near renewal). discount_level: heavily discounted customers may churn when discount expires. contract_term: annual vs monthly (monthly customers churn faster). Billing features: late_payments_90d: number of late payments. downgrade_in_90d: binary — did the customer downgrade recently? payment_method: credit card on file vs invoice (invoice = more friction to churn). Engagement features: training_sessions_attended: customers who attend training retain better. community_posts: active community members rarely churn. executive_sponsor_contact: regular contact with their executive = lower risk. Step 3 — Historical churn analysis: analyze the last 12-18 months of churned customers. Key findings from exploratory analysis: customers who churn typically show signals 60-90 days before cancellation. Top 5 predictive features (ranked by importance): 1. days_since_last_login (strongest predictor — customers who have not logged in for 14+ days are 8x more likely to churn). 2. login_trend (declining usage over 60 days — 5x churn risk). 3. nps_score below 6 (detractors churn at 4x the rate of promoters). 4. unresolved_tickets above 2 (3x churn risk). 5. contract_remaining_months below 3 (approaching renewal — 2x risk window). Step 4 — Build the model: use logistic regression or gradient boosting (XGBoost) to predict churn probability for each customer. Model output: each customer gets a churn probability score (0-100%). Example scores: Customer A: 85% churn probability (no login in 21 days, NPS 4, 3 open tickets). Customer B: 12% churn probability (daily logins, NPS 9, no tickets). Customer C: 45% churn probability (declining usage, NPS 6, approaching renewal). Model performance: AUC-ROC: 0.82 (good predictive power). Precision at 50% threshold: 72% (72% of flagged customers actually churn). Recall at 50% threshold: 65% (catches 65% of actual churns)'"
    weight: 0.35
    description: "Model"
  - type: llm_judge
    criteria: "Response integrates churn prediction into the revenue forecast — integration: 'Integrating churn prediction into the revenue forecast: from customer-level predictions to revenue forecast: Step 1 — Score all 1,500 customers: assign each customer a churn probability for the next 90 days. Distribution of scores: high risk (>50%): 120 customers, $1.5M ARR. Medium risk (20-50%): 280 customers, $3.2M ARR. Low risk (<20%): 1,100 customers, $10.3M ARR. Step 2 — Calculate expected churn revenue: expected churn = sum of (each customer's ARR × churn probability). High risk: $1.5M × average 65% = $975K expected to churn. Medium risk: $3.2M × average 32% = $1,024K expected to churn. Low risk: $10.3M × average 8% = $824K expected to churn. Total expected quarterly churn: $2,823K. Monthly expected churn: $941K. Monthly churn rate: $941K ÷ $15M = 6.3% of ARR per quarter = 2.1% per month. Step 3 — Compare to the old forecast method: old method: 3% monthly churn (historical average). Quarterly expected churn: $15M × 3% × 3 = $1,350K. New model: quarterly expected churn: $2,823K (2.1x higher than old method). The old method used a static historical average that did not account for the current customer health distribution. The model reveals that the current customer base is less healthy than historical average. This explains the prior quarter miss: the model would have predicted 4.2% effective monthly churn (close to the 4.5% actual), while the static method predicted 3%. Step 4 — Build the forecast with churn prediction: monthly revenue forecast with model-based churn: month 1: $1,250K (starting MRR) - $26.3K (model-predicted churn) + expansion + new = updated MRR. Instead of one churn rate applied uniformly, the model applies different rates to different risk segments. This produces a more accurate forecast because it reflects the actual health of the current customer base. Forecast accuracy improvement: metric | old method | churn model | improvement. Quarterly churn MAPE: 22% | 8% | 64% improvement. Revenue forecast MAPE: 7% | 3.5% | 50% improvement. The churn model cuts revenue forecast error roughly in half because churn was the largest source of forecast error'"
    weight: 0.35
    description: "Integration"
  - type: llm_judge
    criteria: "Response covers using churn predictions for intervention and continuous improvement — intervention: 'Using churn predictions for intervention and forecast feedback loop: the intervention framework: the churn model is not just for forecasting — it enables proactive retention. Tier 1 — Critical risk (>70% churn probability): approximately 60 customers, $800K ARR. Action: executive outreach within 1 week. Assign dedicated CSM for daily engagement. Offer custom retention package if needed. Target: save 30% of at-risk revenue = $240K preserved. Tier 2 — High risk (50-70%): approximately 60 customers, $700K ARR. Action: CSM outreach within 2 weeks. Conduct business review to understand pain points. Address product gaps or service issues. Target: save 40% = $280K preserved. Tier 3 — Medium risk (20-50%): approximately 280 customers, $3.2M ARR. Action: automated engagement sequence (email, in-app messaging). Proactive feature recommendations based on usage gaps. Quarterly business review scheduling. Target: save 50% = $512K preserved. Forecast impact of interventions: without intervention: expected quarterly churn = $2,823K. With intervention savings: -$240K - $280K - $512K = $1,032K saved. Net expected churn: $1,791K. Intervention-adjusted monthly churn rate: 1.3% (vs 2.1% without intervention). The forecast should model BOTH the expected churn and the expected intervention effectiveness. Present: expected churn without intervention: $2,823K/quarter. Expected intervention savings: $1,032K/quarter. Net forecast churn: $1,791K/quarter. This is more transparent than simply forecasting a lower churn number. Model maintenance and continuous improvement: model retraining schedule: monthly: update feature values for all customers (refresh scores). Quarterly: retrain the model with new churn data (last 3 months of outcomes). Annually: re-evaluate feature set (are there new signals? Are old signals still predictive?). Monitoring for model drift: track monthly: predicted churn rate vs actual churn rate. If predicted consistently under-estimates actual by >20%, the model needs retraining. A common cause: the customer base composition shifts (more SMB, different geography). Feature importance drift: if login frequency was the top predictor but a mobile app launch changes login patterns, the feature may become less predictive. Monitor feature importance quarterly. Feedback loop: churn prediction → forecast → intervention → outcome → model update. Each cycle improves both the forecast accuracy and the retention effectiveness. After 6 months of operation: the model's predictions should stabilize at <10% error. The CS team develops intuition for which signals matter. The revenue forecast incorporates realistic, data-driven churn estimates instead of historical averages'"
    weight: 0.30
    description: "Intervention"
