meta:
  id: monte-carlo-simulation
  level: 3
  course: revenue-forecasting
  type: output
  description: "Monte Carlo simulation — use probabilistic simulation to model revenue uncertainty, generate confidence distributions, and stress-test forecasts"
  tags: [monte-carlo, simulation, probability, distribution, uncertainty, advanced]

state: {}

trigger: |
  A director of analytics says: "Our board asked for a probabilistic
  revenue forecast — not just three scenarios but a full distribution
  of possible outcomes. They want to know: what is the probability we
  hit $20M next year? What revenue level are we 90% confident we'll
  exceed? We have:

  Current ARR: $15M. Key uncertain variables:
  - New customer acquisition: 20-40 per month (most likely 28).
  - Average ACV: $8K-$15K (most likely $11K).
  - Monthly churn: 1.5%-4% (most likely 2.5%).
  - Expansion rate: 2%-6% (most likely 3.5%).

  How do I run a Monte Carlo simulation for revenue forecasting?"

  Task: Explain Monte Carlo simulation, set up the model, run the
  simulation, and interpret the results for board-level communication.

assertions:
  - type: llm_judge
    criteria: "Response explains Monte Carlo and sets up the model — setup: 'Monte Carlo simulation for revenue forecasting: what is Monte Carlo simulation: instead of calculating one forecast with fixed assumptions, Monte Carlo runs thousands of simulations, each with randomly sampled assumptions from probability distributions. The result is not one number but a distribution of possible outcomes — showing both the expected value and the range of uncertainty. Why Monte Carlo is better than 3-scenario analysis: three scenarios (best, base, worst) are arbitrary and miss the probability between scenarios. Monte Carlo might run 10,000 simulations and show that: $18M has a 75% probability of being exceeded. $20M has a 45% probability. $22M has a 15% probability. This is much more informative than base case $20M / conservative $17M / optimistic $23M. Setting up the model: Step 1 — Define the input distributions: each uncertain variable gets a probability distribution, not a single value. New customer acquisition (per month): distribution: triangular (min=20, mode=28, max=40). Why triangular: simple, captures asymmetry (more upside than downside). The mode (28) is the most likely value, but there is a long tail to 40 if marketing campaigns exceed expectations. Average ACV: distribution: normal (mean=$11K, standard deviation=$2K). Why normal: ACV is determined by product mix and tends to cluster around the average with symmetric variation. Truncated at $8K and $15K to prevent unrealistic extremes. Monthly churn rate: distribution: beta (alpha=5, beta=195) → mean=2.5%, roughly ranging 1.5%-4%. Why beta: churn rates are bounded between 0% and 100%. Beta distribution naturally models proportions. Slight right skew — churn is more likely to spike than drop. Monthly expansion rate: distribution: triangular (min=2%, mode=3.5%, max=6%). Why triangular: expansion depends on upsell execution, which has a known range. Correlations between variables: some inputs are correlated and should not be sampled independently. Negative correlation: high acquisition often means lower ACV (more SMB deals). Positive correlation: high expansion often coincides with lower churn (product-market fit). Model these with a correlation matrix: acquisition-ACV correlation: -0.3. Expansion-churn correlation: -0.4. Step 2 — Build the monthly simulation engine: for each simulation run (1 of 10,000): sample all input variables from their distributions (respecting correlations). Run the MRR model forward 12 months: month_n MRR = month_(n-1) MRR × (1 - churn + expansion) + new_customers × ACV/12. Sum 12 months of MRR to get annual revenue. Record the result. After 10,000 runs, you have 10,000 possible annual revenue outcomes'"
    weight: 0.35
    description: "Setup"
  - type: llm_judge
    criteria: "Response interprets the simulation results — results: 'Interpreting Monte Carlo results: the output distribution: after 10,000 simulations, the results form a probability distribution. Summary statistics: mean: $19.8M. Median: $19.5M (50th percentile — 50% chance of exceeding). Standard deviation: $2.4M. 10th percentile (P10): $16.8M (90% chance of exceeding this). 25th percentile (P25): $18.1M (75% chance of exceeding). 75th percentile (P75): $21.3M (25% chance of exceeding). 90th percentile (P90): $23.0M (10% chance of exceeding). Answering the board's questions: Q: what is the probability we hit $20M? A: the simulation shows approximately 45% probability of reaching or exceeding $20M. This means it is slightly less likely than not — $20M is an aspirational but not unreasonable target. Q: what revenue level are we 90% confident we will exceed? A: the P10 value is $16.8M — we are 90% confident annual revenue will be at least $16.8M. This is the conservative planning number — use this for cash flow planning and minimum expense commitments. Key percentiles and their uses: P10 ($16.8M): worst-case planning. Use for: minimum cash needs, debt covenants, survival planning. P25 ($18.1M): conservative planning. Use for: committed headcount, infrastructure investment. P50 ($19.5M): base case planning. Use for: operating budget, target-setting baseline. P75 ($21.3M): optimistic planning. Use for: stretch targets, upside investment opportunities. P90 ($23.0M): best-case awareness. Use for: understanding maximum capacity needs, recognizing that this is unlikely. The shape of the distribution matters: if the distribution is symmetric (normal-like): mean ≈ median, upside and downside are roughly equal. If right-skewed: mean > median, there is more upside potential than downside risk (common when growth accelerates). If left-skewed: mean < median, there is more downside risk than upside (common when churn could spike). Our distribution: mean ($19.8M) > median ($19.5M) — slightly right-skewed, meaning there is modest upside potential. Sensitivity within the simulation: run a tornado analysis on the simulation inputs. Which variable contributes most to the output variance? Rank by correlation with output: 1. Monthly churn rate: -0.65 correlation with annual revenue (highest impact). 2. New customer acquisition: +0.58 correlation. 3. Expansion rate: +0.42 correlation. 4. ACV: +0.35 correlation. Churn rate is the single most important driver — reducing churn uncertainty (through better retention programs) would narrow the forecast range more than any other action'"
    weight: 0.35
    description: "Results"
  - type: llm_judge
    criteria: "Response covers practical implementation and board presentation — practical: 'Practical implementation: implementation in a spreadsheet: while proper Monte Carlo uses programming (Python/R), a spreadsheet version works for board communication. Setup: create 10,000 rows (one per simulation). Column A: random acquisition draw = ROUND(triangular_random(20, 28, 40)). Column B: random ACV draw = NORMINV(RAND(), 11000, 2000). Column C: random churn draw = BETAINV(RAND(), 5, 195). Column D: random expansion draw = triangular_random(0.02, 0.035, 0.06). Column E: calculated annual revenue using the MRR model with columns A-D. Create a histogram of column E to visualize the distribution. Implementation in Python: using numpy and scipy: sample from distributions with numpy.random. Run the MRR model in a loop (vectorized for speed). Plot with matplotlib or seaborn. 10,000 simulations runs in under 1 second. Common mistakes in Monte Carlo: 1. Using uniform distributions for everything: uniform assumes all values are equally likely — this is rarely true. Churn is NOT equally likely to be 1.5% as 4%. Use triangular, normal, or beta distributions that reflect actual likelihood. 2. Ignoring correlations: if you sample acquisition and ACV independently, you may get simulations with both high acquisition AND high ACV — which may be unrealistic. Use correlated sampling to maintain realistic combinations. 3. Too few simulations: 100 simulations: very noisy, unreliable percentiles. 1,000: reasonable for rough estimates. 10,000: good for most business applications. 100,000: unnecessary for revenue forecasting (diminishing returns). 4. Trusting the tails too much: the P1 and P99 values are determined by the extreme tails of input distributions. If those distributions are wrong, the extremes are meaningless. Focus on P10-P90 range for practical planning. Board presentation of Monte Carlo results: the one-slide summary: title: 2024 Revenue Forecast — Probabilistic Analysis. Center: histogram/distribution chart with key percentiles marked. Below the chart: we are 90% confident revenue will exceed $16.8M. Our most likely outcome is $19.5M (50th percentile). There is a 45% chance of reaching the $20M target. The range $16.8M - $23.0M covers 80% of possible outcomes. Key insight: churn rate is the largest source of forecast uncertainty. Reducing churn volatility through retention investments would narrow our forecast range by approximately 25%. Narrative: the Monte Carlo approach gives us honest uncertainty bounds. Rather than promising $20M and missing, we can say: our target is $20M (45% probability), our planning baseline is $18.1M (75% confidence), and our floor is $16.8M (90% confidence). This allows the board to make resource allocation decisions matched to their risk tolerance'"
    weight: 0.30
    description: "Practical"
