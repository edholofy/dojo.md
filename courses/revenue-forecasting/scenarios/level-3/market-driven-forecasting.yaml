meta:
  id: market-driven-forecasting
  level: 3
  course: revenue-forecasting
  type: output
  description: "Market-driven forecasting — incorporate macroeconomic indicators, competitive intelligence, and market trends into revenue forecasts"
  tags: [market, macro, competitive, external-factors, advanced]

state: {}

trigger: |
  A chief revenue officer says: "Our internal models keep missing
  because they don't account for external factors. Last year, a
  recession scare caused enterprise deals to stall for two quarters
  — our model never saw it coming. A competitor's price cut cost us
  8% of our pipeline. Regulatory changes in Europe reduced our TAM.

  We have a $30M ARR B2B SaaS company selling to mid-market and
  enterprise. How do I incorporate market factors into our forecast?"

  Task: Design a market-driven forecasting framework that integrates
  macroeconomic, competitive, and regulatory factors into the revenue
  forecast with specific leading indicators.

assertions:
  - type: llm_judge
    criteria: "Response covers macroeconomic factors and leading indicators — macro: 'Macroeconomic factors in revenue forecasting: why macro matters for B2B SaaS: enterprise purchase decisions are influenced by economic conditions. During uncertainty, businesses: extend sales cycles (evaluation takes longer). Reduce new software purchases (budget freezes). Renegotiate existing contracts (push for discounts). Delay implementations (slower time-to-revenue). Key macroeconomic indicators to track: Leading indicators (predict future revenue impact 3-6 months ahead): PMI (Purchasing Managers Index): above 50 = expansion, below 50 = contraction. When PMI drops below 50, enterprise deal velocity typically slows 20-30%. Historical correlation for our business: PMI decline of 5 points → 15% increase in average sales cycle length → 10% reduction in quarterly new bookings. Consumer confidence index: affects B2C customers of our B2B clients. If their end customers slow spending, they slow software spending. Tech sector layoffs: mass layoffs signal budget tightening. 10,000+ tech layoffs in a quarter → 5-8% reduction in our win rate within 2 quarters. Interest rates / Fed funds rate: higher rates → higher cost of capital → companies are less willing to invest in new software → longer sales cycles, more scrutiny on ROI. Coincident indicators (confirm what is happening): GDP growth rate: positive GDP = healthy spending environment. If GDP growth turns negative, expect 10-20% impact on new business. Corporate earnings: if our customers' industries report declining earnings, they will tighten budgets. IT spending surveys (Gartner, IDC): direct measurement of technology purchase intent. Lagging indicators (confirm trends already reflected in revenue): unemployment rate: by the time unemployment rises, the impact is already in our numbers. Bankruptcy filings: extreme lagging signal. Building the macro adjustment model: create a macro multiplier that adjusts the base forecast. Base forecast (internal model): $38M next year (27% growth). Macro assessment: PMI has declined from 55 to 51 over last 6 months (approaching contraction). Interest rates increased 2pp this year. Tech layoffs up 40% YoY. IT spending surveys show 5% planned reduction. Macro multiplier calculation: assign impact to each indicator. PMI declining: -5% on new business bookings. Rate increases: -3% on enterprise deal velocity. Tech layoffs: -2% on pipeline. IT spending: -3% on overall growth. Combined macro headwind: approximately -12% on new business growth. Adjusted forecast: existing customer revenue: $30M × 105% NRR = $31.5M (less affected by macro). New business: $6.5M planned × (1 - 12% macro headwind) = $5.72M. Macro-adjusted total: $37.2M (vs $38M base). The macro adjustment is modest here (-2%) because existing customer revenue provides a buffer. For acquisition-heavy businesses, the impact would be larger'"
    weight: 0.35
    description: "Macro"
  - type: llm_judge
    criteria: "Response covers competitive intelligence factors — competitive: 'Competitive intelligence in forecasting: why competitor moves affect the forecast: competitor actions directly impact win rates, pricing, churn, and pipeline. Ignoring competitors means forecasting in a vacuum. Competitive events to model: Event 1 — Competitor price cut: impact on our forecast: pipeline win rate decreases as price-sensitive prospects choose the cheaper option. Existing customers may request discounts at renewal. Modeling approach: segment the pipeline by price sensitivity. Price-sensitive segment (40% of pipeline): win rate drops 10-15pp. Price-insensitive segment (60%): minimal impact. Example: pipeline: $15M weighted. Price-sensitive: $6M × (win rate drops from 25% to 15%) = lose $600K vs plan. Price-insensitive: $9M × 25% = $2.25M (unchanged). New total: $3.15M vs $3.75M planned = $600K headwind. Existing customer impact: 5% of customers at renewal will demand matching discount. $30M ARR × 5% at risk × average 15% discount = $225K annual revenue reduction. Total competitive price impact: approximately $825K annually. Event 2 — Competitor launches new feature: if the feature addresses a gap we also have: near-term: minimal impact (switching costs are high). Medium-term: 2-5% increase in churn at next renewal cycle. Pipeline: 5-10% reduction in win rate for prospects who value that feature. If the feature creates a new category we do not serve: strategic concern but limited near-term revenue impact. Modeling: identify which customer segments value the feature most. Apply higher churn assumption to those segments. Event 3 — Competitor raises capital: signal: they will increase marketing spend and possibly reduce pricing. Impact: 6-12 month lag before market impact is felt. Model: gradually increase competitive pressure over 2-3 quarters. Win rate: decrease by 1-2pp per quarter. CAC: increase by 5-10% as ad auction competition rises. Building the competitive adjustment: current win rate: 25%. Competitor price cut impact: -5pp for price-sensitive deals (40% of pipeline). Competitor feature launch: -2pp for feature-sensitive deals (30% of pipeline). New competitor entry: -1pp overall. Blended adjusted win rate: 25% - (5% × 40%) - (2% × 30%) - 1% = 25% - 2% - 0.6% - 1% = 21.4%. Revenue impact: ($15M pipeline × 25% = $3.75M) vs ($15M × 21.4% = $3.21M). Competitive headwind: $540K on pipeline conversion alone'"
    weight: 0.35
    description: "Competitive"
  - type: llm_judge
    criteria: "Response covers integrating market factors into the forecast and building an early warning system — integration: 'Integrating market factors into the unified forecast: the three-layer forecast model: Layer 1 — Internal model (base): the standard forecast based on pipeline, retention, expansion, and acquisition. Base forecast: $38M. Layer 2 — Market adjustment: macro multiplier: -2% ($760K headwind). Competitive adjustment: -$540K pipeline impact + -$825K pricing impact = -$1.365M. Regulatory adjustment: European data regulation reduces addressable market. Impact: -$400K on European new business. Total market adjustment: approximately -$2.5M. Layer 3 — Opportunity adjustment: market opportunities that improve the forecast. Competitor bankruptcy/exit: if competitor X exits market, +$1M in switchover revenue. New regulation requiring our product category: +$500K in compliance-driven demand. Market expansion (new geography or vertical): +$800K. Net opportunity adjustment: probability-weighted = approximately +$700K. Final market-adjusted forecast: base: $38M. Market headwinds: -$2.5M. Market opportunities: +$700K. Market-adjusted forecast: $36.2M (vs $38M base). Growth: 21% (vs 27% base). This is a more honest forecast that accounts for the real operating environment. Building the early warning system: set up monitoring for leading indicators. Monthly dashboard: indicator | current | 3-month trend | threshold | action. PMI: 51.2 | declining | below 49 → activate downturn playbook. Competitor pricing: stable | competitor A cut 10% | any major cut → adjust win rates. Tech layoffs: 15K/quarter | increasing | above 20K → tighten hiring. Win rate: 23% | declining | below 20% → investigate pipeline quality. Sales cycle: 68 days | lengthening | above 80 days → adjust deal timing. Pipeline coverage: 3.2x | declining | below 2.5x → increase marketing. Churn signals: 2 enterprise accounts flagged | stable | above 5 flagged → activate retention. Trigger-based forecast updates: when a leading indicator crosses its threshold, automatically adjust the forecast. Example: PMI drops below 49 → apply -8% adjustment to new business forecast for next 2 quarters. This turns the forecast from a static annual plan into a dynamic system that responds to market reality. Quarterly market review: each quarter, assess: which market factors actually materialized? How close was the market adjustment to reality? What signals did we miss? What new market factors should we be tracking? This builds the institutional knowledge of how external factors affect the specific business'"
    weight: 0.30
    description: "Integration"
