meta:
  id: expansion-revenue-modeling
  level: 3
  course: revenue-forecasting
  type: output
  description: "Expansion revenue modeling — forecast upsell, cross-sell, and usage-based expansion revenue using customer lifecycle and propensity models"
  tags: [expansion, upsell, cross-sell, usage-growth, propensity, advanced]

state: {}

trigger: |
  A revenue operations manager says: "Expansion revenue is our
  biggest growth lever but hardest to forecast. We currently have:

  2,000 customers across 3 plans: Basic ($49/mo, 800 customers),
  Pro ($149/mo, 900 customers), Enterprise ($399/mo, 300 customers).

  Expansion paths: Basic→Pro upgrade, Pro→Enterprise upgrade, seat
  additions (all plans, $15/seat), usage overage (Enterprise only,
  $0.10/API call above 100K/month).

  Historical expansion rate is 4% monthly but it varies wildly
  (2-7%) and I can never predict which month will be high or low.
  How do I build a proper expansion revenue forecast?"

  Task: Build an expansion revenue forecast model that predicts
  upgrade, seat addition, and usage expansion with propensity scoring.

assertions:
  - type: llm_judge
    criteria: "Response decomposes expansion into components and builds propensity models — components: 'Expansion revenue decomposition and propensity modeling: decomposing the 4% monthly expansion: total MRR: (800 × $49) + (900 × $149) + (300 × $399) = $39,200 + $134,100 + $119,700 = $293,000. 4% monthly expansion = approximately $11,720/month. But this varies from $5,860 (2%) to $20,510 (7%). Breaking down by expansion type: Component 1 — Plan upgrades (Basic→Pro, Pro→Enterprise): historical data: Basic→Pro: approximately 3% of Basic customers upgrade per month (24 customers). Revenue per upgrade: $149 - $49 = $100/month incremental. Monthly upgrade MRR: 24 × $100 = $2,400. Pro→Enterprise: approximately 1.5% of Pro upgrade per month (13.5 customers). Revenue per upgrade: $399 - $149 = $250/month incremental. Monthly upgrade MRR: 13.5 × $250 = $3,375. Total plan upgrade MRR: $5,775/month (49% of expansion). Component 2 — Seat additions: average seats added per expanding customer: 2.5 seats. Percentage of customers adding seats per month: 2%. Customers adding seats: 2,000 × 2% = 40 customers. Monthly seat MRR: 40 × 2.5 × $15 = $1,500 (13% of expansion). Component 3 — Usage overage (Enterprise only): enterprise customers with overage: approximately 45% in any month (135 customers). Average overage: 50,000 API calls above 100K limit. Monthly overage MRR: 135 × 50,000 × $0.10 = $675,000... actually this is usage revenue, need to check: 135 × 50,000 × $0.10 = $675K. But this seems high relative to MRR. Let me recalculate: if average overage is 5,000 calls (not 50,000): 135 × 5,000 × $0.10 = $67.5K... still high. Realistic: average overage revenue per customer: $33/month. Monthly overage MRR: 135 × $33 = $4,455 (38% of expansion). Total expansion: $5,775 + $1,500 + $4,455 = $11,730 (matches the 4% rate). Building propensity models for each component: upgrade propensity model (Basic→Pro): which Basic customers are most likely to upgrade? Predictive features: usage_vs_plan_limit: customers using >80% of Basic feature limits are 5x more likely to upgrade. team_size: teams >5 people usually need Pro collaboration features. feature_hit_rate: customers who hit Basic limitations 3+ times/month. tenure: customers who have been on Basic 3-6 months (past initial adoption, ready for more). support_requests_for_pro_features: asking about features only available in Pro. Scoring: assign each Basic customer a 0-100 upgrade propensity score. Score >70: 15% monthly upgrade probability. Score 40-70: 3% monthly upgrade probability. Score <40: 0.5% monthly upgrade probability. Expected monthly upgrades: high propensity (160 customers × 15%): 24 upgrades. Medium propensity (400 customers × 3%): 12 upgrades. Low propensity (240 customers × 0.5%): 1.2 upgrades. Total: 37.2 upgrades × $100 = $3,720 (vs $2,400 historical average). The propensity model suggests more upgrade potential than currently captured — opportunity for CS intervention'"
    weight: 0.35
    description: "Components"
  - type: llm_judge
    criteria: "Response builds the expansion forecast with temporal patterns — forecast: 'Building the expansion forecast with temporal patterns: why expansion varies 2-7% monthly: seasonal patterns in expansion: Q1 (Jan-Mar): lower expansion (3% average). Budget cycles reset, companies cautious. Q4 carryover — customers who expanded in Q4 do not expand again soon. Q2 (Apr-Jun): moderate expansion (4% average). New fiscal year budgets released. Spring planning cycles trigger upgrades. Q3 (Jul-Aug): lower expansion (2.5% average). Summer slowdown, key decision-makers on vacation. Fewer seat additions (hiring slows). Q4 (Sep-Dec): high expansion (6% average). Use-it-or-lose-it budget spending. Year-end growth pushes usage over limits. Companies prepare for next year by locking in upgrades. Event-driven expansion: product launches: new feature releases trigger 2-3x normal upgrade rate for 2-3 weeks. Pricing changes: announced price increases trigger a rush of pre-increase upgrades. Sales campaigns: targeted upsell campaigns can boost expansion by 30-50% in the campaign month. Customer growth events: customers who raise funding, hire rapidly, or launch new products drive seat additions and usage growth. Building the monthly expansion forecast: month-by-month model: for each month, estimate each expansion component separately. January forecast example: plan upgrades: base rate × seasonal index × any events. Basic→Pro: 24 base × 0.75 (Q1 seasonal) = 18 upgrades × $100 = $1,800. Pro→Enterprise: 13.5 × 0.70 (Q1, enterprise decisions slow) = 9.5 × $250 = $2,375. Seat additions: 40 base × 0.80 (hiring slower in Jan) = 32 × $37.50 = $1,200. Usage overage: 135 × $33 × 0.85 (lower usage post-holiday) = $3,787. January total expansion: $9,162 (3.1% — below annual average, consistent with Q1). October forecast example: plan upgrades: 24 × 1.30 (Q4 budget flush) = 31.2 × $100 = $3,120. Pro→Enterprise: 13.5 × 1.50 (enterprise Q4 decisions) = 20.3 × $250 = $5,063. Seat additions: 40 × 1.40 (hiring surge) = 56 × $37.50 = $2,100. Usage overage: 135 × $33 × 1.25 (peak usage) = $5,569. October total expansion: $15,852 (5.4% — above average, consistent with Q4). Quarterly expansion forecast: Q1: $28K (3.2% average). Q2: $36K (4.1% average). Q3: $30K (3.4% average). Q4: $47K (5.3% average). Annual expansion: $141K MRR added = $1.7M ARR. Annual expansion as % of starting ARR: $1.7M ÷ $3.5M = 48.5%. This is the detailed view that explains why the blended 4% monthly rate varies so much'"
    weight: 0.35
    description: "Forecast"
  - type: llm_judge
    criteria: "Response covers using the expansion model for revenue optimization — optimization: 'Using the expansion model for revenue optimization: identifying expansion opportunities: the propensity model reveals untapped expansion potential. Gap analysis: component | current rate | potential rate | revenue gap. Basic→Pro upgrades: 3%/month | 4.5%/month | +$1,200/month MRR. Pro→Enterprise upgrades: 1.5%/month | 2.5%/month | +$2,250/month MRR. Seat additions: 2%/month | 3.5%/month | +$1,125/month MRR. Usage overage: $33/customer | $50/customer | +$2,295/month MRR. Total expansion opportunity: +$6,870/month = $82K/year additional expansion MRR. This would increase the expansion rate from 4% to 6.3% monthly. Intervention strategies by component: for plan upgrades — the guided upgrade path: identify customers with propensity score >70 who have not upgraded in 6+ months. Trigger: in-app notification showing features they are missing. Escalation: CSM outreach for high-value accounts. Incentive: 15% discount on first 3 months of higher plan. Expected impact: increase conversion of high-propensity customers from 15% to 22%. Revenue: additional $1,500/month MRR. For seat additions — the team growth trigger: monitor customer team size through admin panel data. When a customer adds 3+ team members to their organization without adding seats: trigger email suggesting team plan. CSM outreach for accounts with >10 unused invites. Expected impact: 50% more seat addition events. Revenue: additional $750/month MRR. For usage expansion — the threshold alert: enterprise customers approaching their API limit: at 80% usage: send dashboard notification showing usage trend. At 90% usage: alert account manager for proactive conversation. Offer volume discount for committed higher usage (lock in expansion). Expected impact: 20% more overage revenue (customers who hit limits stay instead of churning to competitors with higher limits). Revenue: additional $900/month MRR. Building expansion into the forecast accountability framework: expansion forecast scorecard (monthly): component | forecast | actual | variance | action. Plan upgrades: $5,775 | $6,200 | +$425 | above plan — Q4 budget flush effect. Seat additions: $1,500 | $1,200 | -$300 | below — hiring slowdown in customer base. Usage overage: $4,455 | $4,800 | +$345 | above — healthy customer growth. Total expansion: $11,730 | $12,200 | +$470 | +4% above forecast. Track this monthly. Over time, the expansion forecast should stabilize at ±10% accuracy, making the overall revenue forecast significantly more reliable'"
    weight: 0.30
    description: "Optimization"
