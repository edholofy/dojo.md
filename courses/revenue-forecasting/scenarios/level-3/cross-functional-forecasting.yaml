meta:
  id: cross-functional-forecasting
  level: 3
  course: revenue-forecasting
  type: output
  description: "Cross-functional forecasting — integrate inputs from sales, marketing, product, and customer success into a unified revenue forecast"
  tags: [cross-functional, collaboration, consensus, integration, advanced]

state: {}

trigger: |
  A VP of FP&A says: "Every team has a different view of next year's
  revenue:

  Sales says $28M — based on their pipeline and quota capacity.
  Marketing says $24M — based on lead generation and conversion models.
  Customer Success says $22M — based on retention and expansion trends.
  Product says $30M — based on the new features launching.

  Current ARR is $18M. I need to create ONE forecast that integrates
  all these perspectives. How do I run a cross-functional forecasting
  process that produces a credible, unified number?"

  Task: Design and execute a cross-functional forecasting process that
  reconciles the different perspectives into a unified forecast.

assertions:
  - type: llm_judge
    criteria: "Response analyzes why each team's forecast differs — analysis: 'Analyzing the forecast discrepancy: why each team arrives at a different number: Sales forecast ($28M — 56% growth): sales bases their forecast on: quota capacity: 15 AEs × $1.8M quota = $27M from new business. Plus renewals and expansion. Sales teams forecast what they CAN sell, not what they WILL sell. Typical over-forecasting: sales pipeline win rates are optimistic. Not all quota capacity is productive (new hires ramping, attrition). Historical data: sales has over-forecasted by 15-20% on average. Adjusted estimate: $28M × 0.82 (historical accuracy) = $23M. Marketing forecast ($24M — 33% growth): marketing bases their forecast on: lead volume × conversion rate × average deal size. This year: 12,000 MQLs × 8% close rate × $11K ACV = $10.6M new ARR. Plus existing $18M ARR × 95% retention = $17.1M. Plus expansion: $2M. Total: $10.6M + $17.1M + $2M = $29.7M... but marketing is forecasting $24M. This means marketing has already applied some haircuts to their model. Marketing tends to be realistic about volumes but optimistic about conversion rates. Adjusted estimate: reasonable if conversion rate drops from 8% to 6.5%. Customer Success forecast ($22M — 22% growth): CS bases their forecast on: retention: $18M × 92% GRR = $16.56M retained. Expansion: $18M × 10% = $1.8M expansion. New business: not their domain — they assume modest $3.6M new ARR. Total: $22M. CS focuses on the existing customer base and tends to be conservative about new business (they see the churn, not the pipeline). CS is usually the most accurate for existing customer revenue. Adjusted estimate: their existing customer forecast ($18.36M) is likely solid. New business is understated. Product forecast ($30M — 67% growth): product bases their forecast on: current trajectory: $24M. New feature impact: +$6M from new pricing tier and mobile app. Product teams are optimistic about feature-driven revenue. They assume build it and they will come, underestimating sales and marketing dependencies. Historical data: product-driven revenue projections are typically 50-70% too high. Adjusted estimate: $24M + $6M × 0.4 (realizable) = $26.4M. Summary of adjusted estimates: sales: $23M. Marketing: $24M. Customer success: $22M. Product: $26.4M. Range: $22M - $26.4M. The adjusted range ($22-26M) is much tighter than the raw range ($22-30M)'"
    weight: 0.35
    description: "Analysis"
  - type: llm_judge
    criteria: "Response designs the cross-functional process — process: 'The cross-functional forecasting process: Phase 1 — Independent forecasts (week 1): each team builds their forecast independently using their own methodology. Sales: pipeline-based with quota capacity. Marketing: funnel-based with lead volume and conversion. CS: retention and expansion model on existing base. Product: feature impact assessment on top of base trajectory. Finance provides each team with a common template and shared assumptions (inflation rate, market growth, pricing changes). Phase 2 — Assumption comparison workshop (week 2): bring all teams together to compare assumptions, not numbers. Key comparison table: assumption | sales | marketing | CS | product. New customer acquisition: 250/year | 220/year | 120/year | 280/year. Average ACV: $11K | $11K | $11K | $13K (includes new tier). Logo churn: 6% annual | 7% | 8% | 5%. NRR: 110% | 108% | 105% | 115%. Where teams disagree reveals where uncertainty lies: acquisition: sales and product are optimistic, CS is pessimistic. Churn: CS has the most direct visibility — likely most accurate. NRR: product assumes features drive more expansion. Each disagreement is discussed: which team has the best data? What evidence supports each assumption? What would need to be true for each to be correct? Converge on consensus assumptions: new customers: 200/year (between marketing's 220 and CS's 120, weighted toward marketing). ACV: $11.5K (slight increase from new pricing tier). Logo churn: 7.5% (CS-weighted, they have the best data). NRR: 108% (moderate expansion, below product's optimistic 115%). Phase 3 — Build the consensus forecast (week 3): using agreed-upon assumptions: existing customer revenue: $18M × NRR (108%) = $19.44M. This includes: retention: $18M × (1 - 7.5%) = $16.65M. Expansion: $18M × 15.5% = $2.79M (to reach 108% NRR). New customer revenue: 200 × $11.5K = $2.3M new ARR. Revenue recognized in year: approximately $1.15M (average half-year of billing). Total consensus forecast: $19.44M + $1.15M = $20.59M... but this assumes new customers only contribute half-year. Full calculation with monthly model: month-by-month MRR build with 17 new customers/month, $958 monthly ARPU, 0.625% monthly churn, 0.67% monthly expansion. Year-end ARR: approximately $22.8M. Annual recognized revenue: approximately $20.5M. Consensus forecast: $24.5M ARR by year-end (including the full new business ramp), approximately $21M in recognized annual revenue. Phase 4 — Stress test and finalize (week 4): apply scenario analysis to the consensus forecast. Conservative: $19.5M (churn worse, acquisition slower). Base: $21M (consensus assumptions). Optimistic: $24M (new features drive faster expansion). Present the $21M consensus with the $19.5-24M range'"
    weight: 0.35
    description: "Process"
  - type: llm_judge
    criteria: "Response covers maintaining alignment through the year — alignment: 'Maintaining cross-functional alignment: the monthly forecast sync: after establishing the annual consensus, maintain alignment monthly. Monthly cross-functional review (1 hour): part 1 — actual vs forecast (15 min): finance presents last month's actual vs the rolling forecast. Highlight variances > 5% for discussion. Part 2 — driver updates by team (30 min): sales: pipeline update, deal velocity, win rate trends. Marketing: lead volume, conversion rate, channel performance. CS: churn signals, expansion pipeline, NPS trends. Product: feature launch status, adoption metrics. Part 3 — forecast adjustment (15 min): update the consensus forecast based on new information. Roll forward one month (drop completed month, add new month at the end). Document what changed and why. The accountability framework: each team owns specific forecast components: team | owns | measured by. Sales: new customer acquisition, deal timing | pipeline accuracy, quota attainment vs forecast. Marketing: lead volume, conversion rates | MQL-to-customer conversion, cost per acquisition vs plan. CS: retention, expansion, contraction | GRR and NRR vs forecast, churn prediction accuracy. Product: feature-driven revenue uplift | adoption rates vs forecast, expansion from new features. Finance: overall forecast, consolidation | overall MAPE, forecast bias, range accuracy. Handling disagreements: when teams disagree on assumptions during the year, use data to resolve. Example: CS says churn is rising but Sales says pipeline will offset it. Resolution: what does the data show? If churn increased from 0.6% to 0.8% monthly in the last 3 months, that is a trend. Has sales pipeline actually increased to offset? Check CRM data. What is the net impact? Model both views and show the range. Let the CFO make the final call for the consensus forecast. Document the disagreement and what the final assumption was. When one team is consistently more accurate, their input should carry more weight in future consensus discussions. Building a forecasting culture: the goal is not to punish inaccuracy but to improve it over time. Track each team's forecast accuracy quarterly: team | Q1 accuracy | Q2 accuracy | Q3 accuracy | trend. Sales: ±18% | ±15% | ±12% | improving. Marketing: ±10% | ±8% | ±9% | stable. CS: ±5% | ±6% | ±5% | excellent. Product: ±30% | ±25% | ±22% | improving but still weak. This scorecard motivates improvement without blame. CS is the anchor, Product is the wildcard. Over time, the cross-functional process should tighten the forecast range and reduce surprise misses'"
    weight: 0.30
    description: "Alignment"
