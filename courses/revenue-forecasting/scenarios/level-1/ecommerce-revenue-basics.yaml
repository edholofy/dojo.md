meta:
  id: ecommerce-revenue-basics
  level: 1
  course: revenue-forecasting
  type: output
  description: "E-commerce revenue basics — understand how to forecast revenue for transactional e-commerce businesses using traffic, conversion, and AOV"
  tags: [ecommerce, transactional, conversion, aov, traffic, beginner]

state: {}

trigger: |
  An e-commerce store owner says: "I run an online store and my
  revenue is much less predictable than my friend's SaaS company.
  Some months we do $150K, other months $80K. Here's my data:

  Monthly visitors: 200,000. Conversion rate: 2.5%. Average order
  value (AOV): $45. Repeat purchase rate: 20% within 90 days.
  Monthly marketing spend: $25,000. Cost per acquisition: $12.50.

  How do I forecast revenue for my type of business?"

  Task: Explain how e-commerce revenue forecasting differs from
  subscription models and build a forecast using the given data.

assertions:
  - type: llm_judge
    criteria: "Response explains the e-commerce revenue formula and key differences — formula: 'E-commerce revenue forecasting fundamentals: the core formula: revenue = traffic × conversion rate × average order value. With the given data: revenue = 200,000 × 2.5% × $45 = 200,000 × 0.025 × $45 = $225,000/month. How e-commerce differs from subscription (SaaS): subscription: starts each month with known recurring revenue. E-commerce: starts each month at zero — every sale must be earned. Subscription: churn is the main risk (losing existing revenue). E-commerce: traffic and conversion volatility are the main risks. Subscription: 90-95% of next month revenue is predictable. E-commerce: 0% of next month revenue is guaranteed. Subscription: customer lifetime value unfolds over months/years. E-commerce: each transaction may be the only transaction. This is why the store owner's friend with a SaaS company has more predictable revenue — SaaS carries forward a recurring base. Breaking down the revenue components: Component 1 — Traffic (200,000 visitors/month): traffic sources and their predictability: organic search: moderately predictable (changes slowly, affected by SEO and algorithm updates). Paid ads: highly controllable (spend more = more traffic, but with diminishing returns). Email/SMS: moderately predictable (depends on list size and engagement). Social media: low predictability (algorithm-dependent, viral moments). Direct: moderately predictable (brand strength, word of mouth). Forecasting traffic: segment by source. Organic: 80,000 (growing 3%/month). Paid: 100,000 ($25K spend ÷ $0.25 CPC). Email: 15,000 (stable). Social: 5,000 (variable). Component 2 — Conversion rate (2.5%): conversion rate varies by: traffic source (email converts at 5%, paid at 2%, social at 1%). Device (desktop 3.5%, mobile 1.8%). Day of week (weekends higher for B2C). Season (holiday conversion rates are higher — more intent-driven traffic). For forecasting: use source-weighted conversion rates rather than blended average. Blended 2.5% can mask that paid traffic converts at 2% while email converts at 5%. Component 3 — Average order value ($45): AOV is influenced by: product mix (higher-priced items shift AOV up). Promotions and discounts (coupons reduce AOV). Bundling and upsells (cross-sells increase AOV). Season (holiday AOV is often higher — gift purchases). AOV tends to be more stable than traffic or conversion rate, making it the most predictable component'"
    weight: 0.35
    description: "Formula"
  - type: llm_judge
    criteria: "Response builds a monthly e-commerce forecast — forecast: 'Building the e-commerce forecast: the monthly forecast model: forecast each component separately, then multiply. January forecast example: traffic forecast: organic 82,000 (3% growth) + paid 100,000 (same spend) + email 15,000 + social 5,000 = 202,000. Conversion forecast: 2.5% (blended, stable month). AOV forecast: $44 (slight January dip — post-holiday, fewer gifts). January revenue: 202,000 × 2.5% × $44 = $222,200. Adding the repeat purchase layer: new customers this month: 202,000 × 2.5% = 5,050 orders. But some of these are repeat customers from previous months. Repeat purchase rate: 20% within 90 days. Customers acquired 1-3 months ago who return: month-1 customers returning: 5,000 × 7% (first-month return rate) = 350. Month-2 customers returning: 4,800 × 7% = 336. Month-3 customers returning: 4,600 × 6% = 276. Repeat orders: approximately 962. Total orders: new (approximately 4,088) + repeat (approximately 962) = 5,050. Repeat customers are valuable because they cost nothing to acquire — this is free revenue on top of the paid acquisition engine. The customer economics: monthly marketing spend: $25,000. New customers acquired: $25,000 ÷ $12.50 CPA = 2,000 customers from paid channels. Revenue from paid-acquired customers: 2,000 × $45 = $90,000. ROAS (return on ad spend): $90,000 ÷ $25,000 = 3.6x. Plus organic and repeat customers generate approximately $135,000 in revenue at zero marginal acquisition cost. Quarterly forecast: build month by month accounting for seasonality. Q1 (typically weakest): Jan $222K + Feb $230K + Mar $240K = $692K. Q2 (moderate): Apr $245K + May $250K + Jun $235K = $730K. Q3 (back to school): Jul $225K + Aug $260K + Sep $255K = $740K. Q4 (holiday peak): Oct $270K + Nov $350K + Dec $420K = $1,040K. Annual forecast: approximately $3.2M. Notice: Q4 is 33% of annual revenue. This seasonal concentration is typical for e-commerce. Missing Q4 by 20% has a much larger impact than missing Q1 by 20%'"
    weight: 0.35
    description: "Forecast"
  - type: llm_judge
    criteria: "Response covers improving e-commerce forecast accuracy — improving: 'Improving e-commerce forecast accuracy: the three-lever framework: every e-commerce revenue improvement comes from one of three levers: Lever 1 — More traffic: increase marketing spend (diminishing returns apply). Improve SEO (slow but compounding). Launch new channels (affiliates, influencers, marketplaces). Current: 200K visitors. If increased to 250K (+25%): revenue increases from $225K to $281K (+25%). Traffic scales linearly with revenue but acquisition costs typically increase. Lever 2 — Better conversion: optimize product pages, checkout flow, site speed. Improve product photography and descriptions. Add reviews and social proof. Add live chat or chatbots. Current: 2.5%. If improved to 3.0% (+0.5pp): revenue increases from $225K to $270K (+20%). Small conversion improvements have outsized impact because they affect ALL traffic. Lever 3 — Higher AOV: bundle products (buy 2 get 10% off). Free shipping thresholds ($50 free shipping when AOV is $45). Upsells and cross-sells at checkout. Premium or higher-priced product lines. Current: $45. If increased to $52 (+$7): revenue increases from $225K to $260K (+16%). Which lever to prioritize: calculate the effort required for each. Traffic +25% requires 25% more marketing spend ($6,250/month). Conversion +0.5pp requires product page optimization (one-time project). AOV +$7 requires checkout optimization and bundling (one-time project). Conversion and AOV improvements are usually higher ROI because they are one-time investments that compound on all future traffic. Traffic increases require ongoing spend. Forecasting with scenarios: build three scenarios based on lever assumptions: conservative: traffic -10%, conversion stable, AOV stable → $202K/month. Base: current trajectory → $225K/month. Optimistic: traffic +15%, conversion +0.3pp, AOV +$3 → $295K/month. The range ($202K to $295K) shows the forecast uncertainty. E-commerce forecasts typically have wider ranges than SaaS forecasts because of the lack of recurring revenue baseline. Key e-commerce metrics to track for forecast accuracy: daily revenue run rate (are we on pace for the monthly forecast?). Traffic by source (which channels are over/under-performing?). Conversion rate trend (is it stable, improving, or declining?). AOV trend (are promotions compressing margins?). New vs repeat customer mix (is the repeat engine working?). Cart abandonment rate (are we losing customers at checkout?)'"
    weight: 0.30
    description: "Improving"
