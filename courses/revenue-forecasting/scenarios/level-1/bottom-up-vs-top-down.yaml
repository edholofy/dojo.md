meta:
  id: bottom-up-vs-top-down
  level: 1
  course: revenue-forecasting
  type: output
  description: "Bottom-up vs top-down forecasting — understand the two fundamental approaches to building revenue forecasts and when to use each"
  tags: [bottom-up, top-down, methodology, approach, beginner]

state: {}

trigger: |
  A startup CEO says: "My investors want a revenue forecast for next
  year. My CFO built a bottom-up forecast showing $3.2M and my head
  of sales built a top-down forecast showing $5.8M. That's an 80%
  difference! Which approach is right? When should I use each one?"

  Current data: 200 customers, $120 ARPU, 5% monthly churn, acquiring
  30 new customers/month, $50K monthly marketing spend, market size
  estimated at $2B.

  Task: Explain both approaches, build each forecast with the given
  data, and recommend how to reconcile them.

assertions:
  - type: llm_judge
    criteria: "Response explains and builds a bottom-up forecast — bottomup: 'Bottom-up forecasting: what it is: start from individual business components and build upward to total revenue. Revenue = (customers × ARPU) calculated month by month with additions and subtractions. Building the bottom-up forecast with the given data: starting position — month 1: existing customers: 200. New customers/month: 30. Monthly churn: 5% (lose 5% of customers each month). ARPU: $120/month. Month 1: customers = 200 - (200 × 5%) + 30 = 200 - 10 + 30 = 220. Revenue = 220 × $120 = $26,400. Month 2: customers = 220 - 11 + 30 = 239. Revenue = 239 × $120 = $28,680. Month 3: customers = 239 - 12 + 30 = 257. Revenue = 257 × $120 = $30,840. Continuing this pattern month by month: month 6: approximately 310 customers, revenue approximately $37,200. Month 9: approximately 355 customers, revenue approximately $42,600. Month 12: approximately 390 customers, revenue approximately $46,800. Annual total: sum of all 12 months = approximately $3.2M (which matches the CFO's number). Key insight: growth slows because churn is proportional to customer count. At 30 new customers/month and 5% churn, the customer base approaches a ceiling. The ceiling = new customers ÷ churn rate = 30 ÷ 0.05 = 600 customers. With current acquisition and churn rates, the business will never exceed 600 customers (it approaches this asymptotically). This is why bottom-up forecasts tend to be more conservative — they expose the mathematical constraints. Strengths of bottom-up: grounded in actual business mechanics. Every assumption is testable and measurable. Reveals constraints and bottlenecks (like the 600-customer ceiling). Easy to do sensitivity analysis (what if churn drops to 3%?). Weaknesses of bottom-up: assumes current dynamics continue (does not capture step-function changes). Can be overly conservative (does not account for new products, markets, or channels). Requires detailed operational data. Best for: established businesses with 6+ months of data. Quarterly and annual operating forecasts. Board and investor updates on expected (not aspirational) performance'"
    weight: 0.35
    description: "BottomUp"
  - type: llm_judge
    criteria: "Response explains and builds a top-down forecast — topdown: 'Top-down forecasting: what it is: start from the total market opportunity and work downward to estimate the company's share. Revenue = TAM × market share × capture rate. Building the top-down forecast with the given data: total addressable market (TAM): $2B. Current revenue: 200 × $120 × 12 = $288K annually. Current market share: $288K ÷ $2B = 0.014%. Approach 1 — Market share growth: if the company grows its market share to 0.05% (still tiny): $2B × 0.0005 = $1M. To 0.29%: $2B × 0.0029 = $5.8M (the sales leader's number). The sales leader likely assumed: the market is huge ($2B). We only need a tiny fraction (0.29%). 0.29% market share seems easily achievable. Approach 2 — Comparable company benchmarks: similar companies at our stage grow 100-200% year-over-year. Current ARR: $288K. At 100% growth: $576K. At 200% growth: $864K. At the 1,900% growth needed to reach $5.8M — this would be exceptional, not typical. Approach 3 — Sales capacity model: if each sales rep generates $500K/year and we have 5 reps: capacity = 5 × $500K = $2.5M. To reach $5.8M, we need 11-12 reps. Can we hire and ramp 7 additional reps this year? This reveals the operational requirements behind the top-down number. The $5.8M problem: the sales leader's number assumes: market share grows 20x (0.014% to 0.29%). This requires massive customer acquisition acceleration. There is no constraint analysis (where do these customers come from?). It assumes the business can scale operations to support 20x growth. This is a target disguised as a forecast. Strengths of top-down: useful for sizing opportunities and setting vision. Good for new market entry where bottom-up data does not exist. Helps identify whether a market is worth pursuing. Weaknesses of top-down: usually too optimistic (the market is big so we will capture some). Does not reveal HOW the revenue will be generated. TAM estimates are often inflated. Small percentages of large numbers feel achievable but may not be. Best for: fundraising narratives (investors like TAM stories). New market or product launch planning. Strategic planning (should we enter this market?)'"
    weight: 0.35
    description: "TopDown"
  - type: llm_judge
    criteria: "Response covers how to reconcile the two approaches — reconcile: 'Reconciling bottom-up and top-down forecasts: the gap analysis: bottom-up: $3.2M (operationally grounded). Top-down: $5.8M (market opportunity). Gap: $2.6M (80% difference). This gap is not unusual — it reveals the difference between what the current business machine produces and what the market could theoretically support. Step 1 — Accept the bottom-up as the base case: the $3.2M is grounded in known inputs (customers, churn, acquisition rate, ARPU). This is what will happen if nothing changes. It should be the planning baseline for hiring, expenses, and cash flow. Step 2 — Identify what would need to change to close the gap: to reach $5.8M from $3.2M, the company needs an additional $2.6M in revenue. Options: increase acquisition from 30 to 80 new customers/month (requires 2.7x marketing investment — $135K/month instead of $50K). Reduce churn from 5% to 2% (raises the customer ceiling from 600 to 1,500). Increase ARPU from $120 to $200 (launch premium tier or raise prices). Combine multiple levers: acquisition to 50/month + churn to 3% + ARPU to $150 = approximately $5.1M. Step 3 — Build the reconciled forecast: present three scenarios. Conservative (bottom-up, no changes): $3.2M. This is the floor — what happens with current operations. Base case (bottom-up with planned improvements): $4.2M. Assumes: acquisition increases to 40/month (hire 2 more reps). Churn reduces to 4% (product improvements planned). ARPU increases to $130 (price increase in Q2). Optimistic (bottom-up with aggressive improvements): $5.5M. Assumes: acquisition increases to 60/month (double marketing spend). Churn reduces to 3% (major product investment). ARPU increases to $150 (new premium tier launches). Each scenario is grounded in specific, measurable assumptions. The board can evaluate whether each assumption is realistic. Step 4 — Present to investors: the recommended framing: our bottom-up model projects $3.2M at current trajectory. With planned investments in sales (2 hires), product (churn reduction), and pricing (Q2 increase), our base case is $4.2M. The market opportunity supports $5.5M+ if we accelerate investment. We are raising capital to fund the base-to-optimistic gap. This is credible because it starts from reality and shows the path, rather than starting from a large market number and asserting a small percentage. The golden rule: always start with bottom-up for operating forecasts. Use top-down to validate the opportunity is large enough. Reconcile by identifying the specific actions and investments needed to move from bottom-up toward top-down. If you cannot articulate what needs to change to close the gap, the top-down number is a fantasy'"
    weight: 0.30
    description: "Reconcile"
