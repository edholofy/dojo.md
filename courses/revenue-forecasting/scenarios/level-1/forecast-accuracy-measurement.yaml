meta:
  id: forecast-accuracy-measurement
  level: 1
  course: revenue-forecasting
  type: output
  description: "Forecast accuracy measurement — learn how to measure, track, and improve forecast accuracy over time using standard error metrics"
  tags: [accuracy, error-metrics, mape, bias, tracking, beginner]

state: {}

trigger: |
  The finance manager says: "We've been forecasting revenue for a
  year but I don't know if we're getting better. Last quarter our
  forecasts were: January forecast $55K (actual $58K), February
  forecast $60K (actual $57K), March forecast $62K (actual $65K).
  How do I measure and track forecast accuracy?"

  Task: Explain forecast accuracy metrics, calculate them for the
  given data, and design a system for tracking and improving
  forecast accuracy over time.

assertions:
  - type: llm_judge
    criteria: "Response calculates and explains error metrics — metrics: 'Forecast accuracy metrics — calculated for the given data: Metric 1 — Absolute Error: the simple difference between forecast and actual. January: |$55K - $58K| = $3K. February: |$60K - $57K| = $3K. March: |$62K - $65K| = $3K. Metric 2 — Percentage Error (PE): error as a percentage of actual revenue. January: ($55K - $58K) ÷ $58K = -5.2% (underforecast). February: ($60K - $57K) ÷ $57K = +5.3% (overforecast). March: ($62K - $65K) ÷ $65K = -4.6% (underforecast). Metric 3 — Mean Absolute Percentage Error (MAPE): the average of the absolute percentage errors. MAPE = (5.2% + 5.3% + 4.6%) ÷ 3 = 5.03%. Interpretation: on average, our forecast is off by about 5% from actual. This is considered good accuracy for monthly forecasts (under 10% is good). Metric 4 — Mean Percentage Error (MPE) — bias indicator: MPE = (-5.2% + 5.3% + -4.6%) ÷ 3 = -1.5%. Interpretation: the negative MPE indicates a slight negative bias — we tend to underforecast. This means we are consistently surprised by revenue coming in higher than expected. While this is the less dangerous direction (better to be surprised positively), it suggests our model is not capturing something that drives higher revenue. Metric 5 — Root Mean Square Error (RMSE): RMSE = sqrt((3² + 3² + 3²) ÷ 3) = sqrt(9) = $3K. Interpretation: the typical forecast error is $3K. RMSE penalizes large errors more than MAPE, which is useful for detecting outlier months. Metric 6 — Weighted MAPE (WMAPE): weights each month's error by its revenue contribution. WMAPE = (3 + 3 + 3) ÷ (58 + 57 + 65) = 9 ÷ 180 = 5.0%. Similar to MAPE in this case because months have similar revenue levels. WMAPE is more appropriate when revenue varies significantly month to month (e.g., seasonal businesses). Which metric to use: MAPE: best for communicating accuracy to stakeholders (easy to understand: we are 5% off on average). MPE: best for detecting systematic bias (are we consistently over or under?). RMSE: best for comparing forecast models (lower RMSE = better model). WMAPE: best for businesses with significant monthly revenue variation'"
    weight: 0.35
    description: "Metrics"
  - type: llm_judge
    criteria: "Response covers tracking accuracy over time — tracking: 'Tracking forecast accuracy over time: the forecast accuracy scorecard: build a monthly scorecard that tracks: month | forecast | actual | error | MAPE | bias. Jan: $55K | $58K | -$3K | 5.2% | under. Feb: $60K | $57K | +$3K | 5.3% | over. Mar: $62K | $65K | -$3K | 4.6% | under. Rolling metrics: 3-month MAPE: 5.03%. 3-month MPE: -1.5% (slight underforecast bias). Trend: improving? stable? deteriorating? Track MAPE quarterly: Q1: 5.0%. Q2: 6.2% (worse — investigate). Q3: 4.5% (improved). Q4: 8.0% (worse — likely seasonality effect). Accuracy by forecast horizon: measure accuracy at different horizons. 30-day forecast MAPE: 5% (good). 60-day forecast MAPE: 12% (acceptable). 90-day forecast MAPE: 18% (moderate). This tells you how far out your forecast is reliable. If 90-day MAPE exceeds 20%, your quarterly forecast is unreliable. Accuracy by revenue stream: if you forecast subscription and transactional revenue separately: subscription MAPE: 3% (highly predictable). Transactional MAPE: 15% (much less predictable). This tells you where to focus improvement efforts. Benchmarks for forecast accuracy: MAPE | rating | typical context. Under 5%: excellent | stable subscription businesses. 5-10%: good | most SaaS and mature e-commerce. 10-20%: acceptable | growing businesses, seasonal businesses. 20-30%: poor but common | early-stage startups, volatile markets. Over 30%: unreliable | pre-product-market-fit, highly seasonal'"
    weight: 0.35
    description: "Tracking"
  - type: llm_judge
    criteria: "Response covers improving forecast accuracy — improvement: 'Improving forecast accuracy: diagnosis — why forecasts miss: Pattern 1 — Consistent underforcasting (negative bias like our example): our forecasts are consistently below actual. Possible causes: we are not capturing a growth driver (new channel, word-of-mouth). Our model uses stale growth assumptions (the business is accelerating). We are being too conservative. Fix: increase the growth rate in the model. Add the missing revenue driver. Pattern 2 — Consistent overforecasting (positive bias): forecasts are consistently above actual. Possible causes: we are projecting aspirational targets, not realistic estimates. Churn is higher than modeled. Acquisition is slower than planned. Fix: recalibrate the model using actual data, not targets. Pattern 3 — High variance (sometimes over, sometimes under, no pattern): forecasts are unpredictable. Possible causes: revenue is genuinely volatile. The model is missing important variables (seasonality, campaign timing). Random events significantly affect revenue (large deals, one-time events). Fix: add explanatory variables. Segment revenue into predictable and unpredictable components. Improvement strategies: Strategy 1 — Shorten the feedback loop: do not wait until month-end to compare forecast vs actual. Track daily revenue against the daily forecast pace. If day 15 revenue is 40% of the monthly forecast, you are behind pace. Adjust the rolling forecast weekly. Strategy 2 — Forecast at a more granular level: instead of one total revenue number, forecast: by product or revenue stream. By customer segment. By geography. By new vs existing customers. Granular forecasts expose where accuracy breaks down. You might discover: subscription revenue forecast is 3% MAPE (great). New business revenue forecast is 25% MAPE (needs work). Focus improvement on the weak component. Strategy 3 — Build a forecast improvement log: every month, document: what did we miss and why? Was it a model error or an unexpected event? What would we change for next time? This creates institutional learning. Strategy 4 — Use multiple models and average them: ensemble forecasting: run 3 different models and average the results. The average of multiple forecasts is typically more accurate than any single forecast (the wisdom of models)'"
    weight: 0.30
    description: "Improvement"
