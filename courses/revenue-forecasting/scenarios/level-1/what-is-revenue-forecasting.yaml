meta:
  id: what-is-revenue-forecasting
  level: 1
  course: revenue-forecasting
  type: output
  description: "Understand revenue forecasting — learn what revenue forecasting is, why it matters, and the fundamental concepts behind predicting future revenue"
  tags: [fundamentals, concepts, introduction, beginner]

state: {}

trigger: |
  A new financial analyst asks: "What exactly is revenue forecasting?
  Why do companies need it? What's the difference between a forecast,
  a projection, and a target? And how accurate do forecasts need to be?"

  Task: Explain the fundamentals of revenue forecasting, its purpose,
  key terminology, and realistic accuracy expectations.

assertions:
  - type: llm_judge
    criteria: "Response explains what revenue forecasting is and why it matters — fundamentals: 'Revenue forecasting fundamentals: what is revenue forecasting: revenue forecasting is the process of estimating future revenue over a specific time period (month, quarter, year) using historical data, current trends, and business assumptions. It answers: how much money will the business generate? Purpose — why companies forecast revenue: 1. Resource planning: hiring, inventory, infrastructure decisions depend on expected revenue. If the company expects $5M next quarter, it can justify hiring 10 engineers. If revenue is uncertain, those hires are risky. 2. Cash flow management: knowing when revenue will arrive determines when bills can be paid. A company with $1M in monthly expenses needs confidence that revenue will exceed that. 3. Investment decisions: should the company invest in a new product line, expand to a new market, or increase marketing spend? The forecast determines what the company can afford. 4. Stakeholder communication: investors, board members, and employees need visibility into expected performance. 5. Performance measurement: forecasts create targets against which actual performance is measured. Key terminology: forecast: a data-driven estimate of what WILL happen based on historical patterns and known inputs. A forecast is a prediction, not a commitment. Projection: an estimate of what COULD happen under specific assumptions. Usually presented as scenarios (best case, base case, worst case). Target: what the company WANTS to happen. Targets are aspirational, forecasts are analytical. Example: forecast says $4M. Target says $5M. The $1M gap represents the stretch the team needs to achieve. Budget: a financial plan that allocates resources based on expected revenue. The budget is downstream of the forecast. Plan: combines forecasts, targets, and budgets into an actionable roadmap'"
    weight: 0.35
    description: "Fundamentals"
  - type: llm_judge
    criteria: "Response covers forecast accuracy expectations and timeframes — accuracy: 'Forecast accuracy expectations: realistic accuracy by timeframe: timeframe | typical accuracy | acceptable range. Next month: ±5-10% | within 10% is good. Next quarter: ±10-15% | within 15% is acceptable. Next year: ±15-25% | within 20% is good for stable businesses. 2-3 years out: ±25-50% | directional accuracy is the goal, not precision. Why accuracy decreases with time: more unknowns accumulate (market changes, competitive moves, internal decisions). Compounding uncertainty: a 5% error per month compounds to 80%+ error over a year. External factors become less predictable (economic conditions, regulation). Measuring forecast accuracy: MAPE (Mean Absolute Percentage Error): average of |actual - forecast| / actual × 100. Example: forecast $1M, actual $1.1M. MAPE = |1.1 - 1.0| / 1.1 × 100 = 9.1%. Forecast bias: does the forecast consistently overestimate or underestimate? Positive bias (consistently overforecasting): dangerous — leads to overspending and missed targets. Negative bias (consistently underforecasting): less dangerous but still problematic — leads to underinvestment and missed opportunities. Industry benchmarks for forecast accuracy: SaaS companies: top quartile achieves ±5-8% quarterly accuracy. E-commerce: ±10-15% is typical due to higher volatility. Enterprise B2B: ±15-20% due to lumpy deal timing. Startups (pre-product-market-fit): ±50%+ is common and acceptable. The right mindset: a forecast is not a promise. It is a structured best estimate. The goal is not to be exactly right but to be directionally correct and to understand the range of possible outcomes. A forecast of $1M ± $200K is more useful than a forecast of exactly $1M with no range'"
    weight: 0.35
    description: "Accuracy"
  - type: llm_judge
    criteria: "Response covers basic forecasting approaches and inputs — approaches: 'Basic forecasting approaches: Approach 1 — Historical trend extrapolation (simplest): take last month's revenue and project it forward. If revenue has been growing 5% month-over-month for 6 months: next month forecast = last month × 1.05. Pros: simple, fast, requires minimal data. Cons: assumes the trend continues unchanged (often wrong). When to use: stable businesses with consistent growth patterns. Approach 2 — Run rate calculation: annualize current performance. Monthly run rate: current month revenue × 12. Quarterly run rate: current quarter × 4. Example: January revenue = $400K → annual run rate = $4.8M. Pros: gives a quick baseline for annual planning. Cons: ignores seasonality, growth, and one-time events. A December holiday spike run-rated produces an overly optimistic annual forecast. When to use: quick directional estimates, early-stage companies. Approach 3 — Bottom-up forecasting: build the forecast from individual components. Revenue = number of customers × average revenue per customer. Forecast each component separately: customers: how many do we expect to acquire? Churn: how many will we lose? ARPU: what will each customer pay? Then multiply: (existing customers - churned + new customers) × ARPU. Pros: more accurate, identifies drivers, reveals assumptions. Cons: more complex, requires more data, each assumption introduces error. When to use: established businesses with good customer data. Approach 4 — Top-down forecasting: start from the total addressable market and estimate market share. TAM × estimated market share × expected ARPU. Example: $10B market × 0.5% market share × $100 ARPU = $5M. Pros: useful for new markets and investor conversations. Cons: top-down estimates are often wildly optimistic. When to use: new market entry, fundraising narratives (always validate with bottom-up). Key inputs for any revenue forecast: historical revenue data (at least 12 months). Customer count and churn rate. Pipeline data (for B2B). Marketing spend and conversion rates. Pricing and ARPU trends. Seasonality patterns. Planned initiatives (product launches, pricing changes, marketing campaigns)'"
    weight: 0.30
    description: "Approaches"
