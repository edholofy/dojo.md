meta:
  id: revenue-models
  level: 1
  course: revenue-forecasting
  type: output
  description: "Understand revenue models — learn the different ways businesses generate revenue and how each model affects forecasting approach"
  tags: [revenue-models, subscription, transactional, recurring, beginner]

state: {}

trigger: |
  A junior analyst asks: "My company has both subscription revenue
  and one-time purchase revenue. How do I forecast these differently?
  What are the main revenue model types and why does the model matter
  for forecasting?"

  Task: Explain the major revenue model types and how each one
  requires a different forecasting approach.

assertions:
  - type: llm_judge
    criteria: "Response explains major revenue model types — models: 'Major revenue model types: Model 1 — Subscription/recurring revenue: how it works: customers pay a regular fee (monthly or annually) for ongoing access. Examples: SaaS (Salesforce, Slack), streaming (Netflix, Spotify), membership (gym, Amazon Prime). Revenue formula: MRR = number of subscribers × average subscription price. Key metrics: MRR (monthly recurring revenue), ARR (annual recurring revenue), churn rate, expansion revenue, net revenue retention (NRR). Forecasting advantage: highly predictable. If you have 1,000 subscribers paying $50/month with 3% monthly churn, you KNOW next month's baseline revenue before the month starts. Next month baseline: 1,000 × (1 - 0.03) × $50 = $48,500. Forecasting challenge: predicting new subscriber acquisition and churn rates. Model 2 — Transactional/one-time revenue: how it works: customers pay per transaction or purchase. Examples: e-commerce (Amazon), ride-sharing (Uber), food delivery (DoorDash). Revenue formula: revenue = number of transactions × average transaction value. Key metrics: transaction volume, average order value (AOV), purchase frequency, customer lifetime value. Forecasting advantage: high volume of data points for pattern analysis. Forecasting challenge: each sale is independent — no guaranteed recurring baseline. Revenue can swing dramatically based on seasonality, promotions, and external factors. Model 3 — Usage-based/consumption revenue: how it works: customers pay based on how much they use. Examples: cloud computing (AWS), API calls (Twilio), data storage (Snowflake). Revenue formula: revenue = units consumed × price per unit. Key metrics: usage volume, usage growth rate, price per unit, customer expansion rate. Forecasting advantage: tied to customer growth (as customers grow, their usage grows). Forecasting challenge: usage is variable and hard to predict precisely. A customer might consume 100 units one month and 500 the next. Model 4 — Hybrid/multi-stream revenue: how it works: combines multiple models. Example: Shopify — subscription (monthly platform fee) + transaction fee (per sale) + add-ons (premium themes, apps). Revenue formula: total = subscription revenue + transaction revenue + services revenue. Forecasting approach: forecast each stream separately, then combine. The subscription component provides a predictable base. The variable components add uncertainty. Model 5 — Project/services revenue: how it works: revenue from custom projects or consulting. Examples: agencies, consulting firms, custom software development. Revenue formula: revenue = number of projects × average project value. Forecasting challenge: lumpy revenue — one large project can double a month's revenue. Pipeline dependent — forecast accuracy depends on sales pipeline reliability'"
    weight: 0.35
    description: "Models"
  - type: llm_judge
    criteria: "Response covers how revenue model affects forecasting — impact: 'How revenue model affects forecasting approach: subscription forecasting: start with the existing subscriber base (known revenue). Subtract expected churn (predictable from historical rates). Add expected new subscribers (from marketing pipeline). Add expected expansion revenue (upsells, seat additions). The formula: next month MRR = current MRR × (1 - churn rate) + new MRR + expansion MRR. Example: current MRR: $500,000. Churn rate: 3% → lost MRR: $15,000. New subscribers: 50 × $60 avg = $3,000. Expansion: $5,000 from upsells. Forecast: $500,000 - $15,000 + $3,000 + $5,000 = $493,000. This is highly predictable — the baseline ($500K) is known, and the adjustments are relatively small. Transactional forecasting: no recurring baseline — every month starts at zero. Must predict: how many customers will purchase? What will the average order size be? How will seasonality affect volume? The formula: monthly revenue = traffic × conversion rate × AOV. Example: expected visitors: 500,000. Conversion rate: 2.5%. AOV: $65. Forecast: 500,000 × 0.025 × $65 = $812,500. Each input is uncertain, and the errors multiply. Usage-based forecasting: forecast usage volume per customer cohort. Newer customers typically use less. Mature customers use more but growth slows. The formula: revenue = sum of (each customer's expected usage × price per unit). This requires customer-level or cohort-level usage modeling. Key insight: predictability ranking (most to least predictable): 1. Subscription (highest predictability — recurring base). 2. Usage-based (moderate — grows with customer success). 3. Hybrid (moderate — mix of predictable and variable). 4. Transactional (lower — no recurring baseline). 5. Project/services (lowest — lumpy, pipeline-dependent). A SaaS company with 95% gross retention has 95% of next month's revenue already locked in before the month starts. An e-commerce company has 0% locked in'"
    weight: 0.35
    description: "Impact"
  - type: llm_judge
    criteria: "Response covers practical guidance for multi-model companies — practical: 'Practical guidance for multi-model forecasting: for the analyst with both subscription and one-time revenue: Step 1 — Separate the revenue streams: do not forecast total revenue as one number. Forecast each stream independently. Subscription stream: $200K/month (predictable, growing 3%/month). One-time purchases: $80K/month (variable, seasonal). Step 2 — Use different methods for each stream: subscription: use the MRR model (base - churn + new + expansion). One-time: use historical pattern matching (same month last year × growth factor). Step 3 — Combine with appropriate uncertainty: subscription forecast: $206K (high confidence, ±5%). One-time forecast: $85K (lower confidence, ±20%). Combined forecast: $291K. Confidence range: $274K - $308K. The subscription stream anchors the forecast. The one-time stream adds uncertainty. Step 4 — Report each stream separately to stakeholders: breaking out revenue streams helps stakeholders understand: which part of the business is predictable. Where growth is coming from. Which stream needs attention. Example report: total revenue forecast: $291K. Subscription: $206K (+3% MoM, driven by 45 new subscribers). One-time purchases: $85K (seasonal uptick expected from spring promotion). Revenue quality indicator: 71% recurring (up from 65% last year — improving predictability). The revenue quality indicator: percentage of revenue that is recurring. Higher recurring percentage = more predictable business = more valuable (higher valuation multiples). SaaS companies with 90%+ recurring revenue are valued at 10-20x revenue. E-commerce companies with 0% recurring are valued at 1-3x revenue. Improving revenue quality (shifting toward recurring) is often more valuable than increasing total revenue'"
    weight: 0.30
    description: "Practical"
