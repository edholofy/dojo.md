meta:
  id: saas-revenue-metrics
  level: 1
  course: revenue-forecasting
  type: output
  description: "SaaS revenue metrics — understand MRR, ARR, NRR, churn, and the key metrics that drive SaaS revenue forecasting"
  tags: [saas, mrr, arr, nrr, churn, expansion, beginner]

state: {}

trigger: |
  A product manager at a SaaS company says: "I keep hearing about
  MRR, ARR, NRR, gross retention, net retention, expansion revenue,
  and contraction. I need to understand what these metrics mean, how
  they relate to each other, and how they drive our revenue forecast."

  Current data: 500 customers, $60 average monthly price, 4% monthly
  logo churn, 2% monthly revenue contraction, 5% monthly expansion.

  Task: Explain the key SaaS revenue metrics and show how they
  connect to build a revenue forecast.

assertions:
  - type: llm_judge
    criteria: "Response explains all key SaaS revenue metrics — metrics: 'Key SaaS revenue metrics: MRR (Monthly Recurring Revenue): the total predictable revenue earned each month from subscriptions. Calculation: sum of all active subscriptions' monthly fees. Example: 500 customers × $60/month = $30,000 MRR. ARR (Annual Recurring Revenue): MRR × 12 = annualized revenue. $30,000 × 12 = $360,000 ARR. Important: ARR assumes current MRR continues for a full year (it will not because of churn and growth). MRR components — the MRR waterfall: starting MRR: $30,000. Plus new MRR: revenue from new customers acquired this month. Plus expansion MRR: revenue increase from existing customers (upsells, upgrades, additional seats). Minus contraction MRR: revenue decrease from existing customers (downgrades, reduced seats). Minus churned MRR: revenue lost from customers who canceled. Equals ending MRR. With the given data: new MRR: assume 25 new customers × $60 = $1,500. Expansion MRR: 5% of starting MRR = $30,000 × 5% = $1,500. Contraction MRR: 2% of starting MRR = $30,000 × 2% = $600. Churned MRR: 4% logo churn = 20 customers × $60 = $1,200. Ending MRR: $30,000 + $1,500 + $1,500 - $600 - $1,200 = $31,200. Net new MRR: $31,200 - $30,000 = $1,200 (positive — the business is growing). Churn metrics: logo churn rate (customer churn): percentage of customers who cancel. 20 cancellations ÷ 500 customers = 4% monthly. Gross revenue churn: percentage of MRR lost to cancellation and contraction. ($1,200 + $600) ÷ $30,000 = 6% monthly gross revenue churn. Net revenue churn: gross churn minus expansion. ($1,200 + $600 - $1,500) ÷ $30,000 = 1% monthly net revenue churn. Retention metrics: GRR (Gross Revenue Retention): percentage of revenue retained from existing customers EXCLUDING expansion. GRR = (starting MRR - churned MRR - contraction MRR) ÷ starting MRR. GRR = ($30,000 - $1,200 - $600) ÷ $30,000 = 94%. GRR is always ≤ 100% (cannot exceed 100% because it excludes expansion). Benchmark: best-in-class SaaS: 95%+ GRR. Good: 90-95%. Concerning: below 85%. NRR (Net Revenue Retention): percentage of revenue retained from existing customers INCLUDING expansion. NRR = (starting MRR - churned MRR - contraction MRR + expansion MRR) ÷ starting MRR. NRR = ($30,000 - $1,200 - $600 + $1,500) ÷ $30,000 = 99%. NRR can exceed 100% (when expansion exceeds churn + contraction). Benchmark: best-in-class SaaS: 120%+ NRR (Snowflake, Datadog). Good: 105-120%. Acceptable: 95-105%. Concerning: below 95%. Our 99% NRR means: the existing customer base is essentially flat — not growing, not shrinking. Growth depends entirely on new customer acquisition'"
    weight: 0.35
    description: "Metrics"
  - type: llm_judge
    criteria: "Response shows how metrics drive the revenue forecast — forecast: 'How SaaS metrics drive the revenue forecast: the MRR projection model: project MRR forward month by month using the component rates. Month 1: starting $30,000 + new $1,500 + expansion $1,500 - contraction $600 - churn $1,200 = $31,200. Month 2: $31,200 × (1 + 5% - 2% - 4%) + new $1,500 = $31,200 × 99% + $1,500 = $32,388. Month 3: $32,388 × 99% + $1,500 = $33,564. Simplified formula: MRR(n+1) = MRR(n) × NRR + new MRR. At 99% NRR and $1,500 new MRR/month: month 6: $37,500 MRR → $450K ARR. Month 12: $46,000 MRR → $552K ARR (53% annual growth). Why NRR is the most important metric: scenario A: NRR = 99%, new MRR = $1,500/month. Month 12 MRR: $46,000. Scenario B: NRR = 110%, new MRR = $1,500/month. Month 12 MRR: $62,000 (35% more revenue from the SAME acquisition effort). Scenario C: NRR = 90%, new MRR = $1,500/month. Month 12 MRR: $34,000 (26% less — the leaky bucket). NRR above 100% means the company grows even without new customers. This is the most powerful state for a SaaS business. With 120% NRR, the existing customer base grows 20% annually on its own — new customers are pure upside. The quick ratio: measures the efficiency of growth. Quick ratio = (new MRR + expansion MRR) ÷ (churned MRR + contraction MRR). Our quick ratio: ($1,500 + $1,500) ÷ ($1,200 + $600) = 3,000 ÷ 1,800 = 1.67x. Benchmark: above 4x is excellent (adding $4 for every $1 lost). 2-4x is good. 1-2x is concerning (adding barely more than losing). Below 1x is shrinking. Our 1.67x is concerning — we are barely outpacing losses. The revenue forecast depends heavily on improving either acquisition (more new MRR) or retention (higher NRR)'"
    weight: 0.35
    description: "Forecast"
  - type: llm_judge
    criteria: "Response covers practical interpretation and improvement levers — levers: 'Practical interpretation and improvement levers: the health assessment: metric | our value | benchmark | assessment. Logo churn: 4% monthly | 2-3% | too high. GRR: 94% | 95%+ | borderline. NRR: 99% | 110%+ | below target. Quick ratio: 1.67x | 4x+ | needs improvement. Diagnosis: the business is growing but inefficiently. We are acquiring customers (good) but losing almost as many as we gain. The path to $1M ARR: current trajectory (NRR 99%, $1,500 new MRR/month): reach $1M ARR in approximately 30 months. Improved trajectory (NRR 110%, $2,500 new MRR/month): reach $1M ARR in approximately 18 months. The NRR improvement alone (99% → 110%) accelerates the timeline by 6 months. The additional new MRR ($1,500 → $2,500) saves another 6 months. Combined: 12 months faster. Improvement levers: Lever 1 — Reduce logo churn (4% → 2.5%): impact: saves $450/month in churned MRR per month. Tactics: improve onboarding (activate users faster). Implement customer health scoring (identify at-risk accounts). Build a customer success function. Lever 2 — Increase expansion (5% → 8%): impact: adds $900/month in expansion MRR. Tactics: launch higher-tier plans with premium features. Implement usage-based pricing components. Build in-product upgrade prompts at natural expansion moments. Lever 3 — Reduce contraction (2% → 1%): impact: saves $300/month. Tactics: improve the downgrade experience (make it easy to come back). Understand WHY customers downgrade (exit surveys). Address the most common downgrade reasons with product improvements. Lever 4 — Increase new MRR ($1,500 → $2,500): impact: adds $1,000/month in new MRR. Tactics: increase marketing spend in highest-ROI channels. Improve signup-to-paid conversion rate. Launch referral program. Combined impact: all four levers together: NRR improves from 99% to approximately 105%. New MRR increases from $1,500 to $2,500. Month 12 MRR projection: approximately $62,000 (vs $46,000 without improvements). That is $192K additional ARR from operational improvements — no new product needed'"
    weight: 0.30
    description: "Levers"
