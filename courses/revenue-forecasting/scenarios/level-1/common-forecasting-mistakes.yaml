meta:
  id: common-forecasting-mistakes
  level: 1
  course: revenue-forecasting
  type: output
  description: "Common forecasting mistakes — learn the most frequent errors in revenue forecasting and how to avoid them"
  tags: [mistakes, pitfalls, bias, overconfidence, beginner]

state: {}

trigger: |
  A VP of Finance says: "I've been burned by bad forecasts before.
  Last year our Q3 forecast was $2M but we only hit $1.4M — a 30%
  miss. The board was furious. Then Q4 we forecasted $1.5M
  conservatively and hit $2.1M — a 40% miss in the other direction.
  What are the most common forecasting mistakes and how do I avoid them?"

  Task: Explain the most common revenue forecasting mistakes, why they
  happen, and practical strategies to avoid each one.

assertions:
  - type: llm_judge
    criteria: "Response identifies and explains common forecasting mistakes — mistakes: 'Common revenue forecasting mistakes: Mistake 1 — Confusing targets with forecasts: what happens: the sales team says they will close $2M. Leadership adopts $2M as the forecast. Reality: the sales team was stating their aspirational target, not a data-driven prediction. The forecast should reflect what WILL likely happen, not what we HOPE will happen. Fix: separate the forecasting process from target-setting. The forecast is analytical (what does the data say?). The target is motivational (what do we want to achieve?). The gap between them is the stretch that requires specific actions. Mistake 2 — Anchoring to a single number: what happens: presenting the forecast as exactly $2,000,000 implies false precision. No one remembers the assumptions behind the number. When it misses, the conversation becomes about WHY it missed rather than whether it was within an acceptable range. Fix: always present a range. Base case: $1.8M (most likely). Optimistic case: $2.1M (if key deal closes, marketing campaign succeeds). Conservative case: $1.5M (if churn increases, pipeline slips). This reframes the conversation from miss/hit to which scenario played out and why. Mistake 3 — The hockey stick projection: what happens: revenue has been growing 5% month-over-month for 6 months. The forecast assumes 5% growth continues indefinitely. Month 1: $100K. Month 6: $134K. Month 12: $180K. Month 24: $322K (more than tripled). Reality: growth rates almost always decelerate. Markets saturate. Competition increases. Customer acquisition becomes harder. Fix: model growth rate deceleration. If growth has been 5% monthly, assume it decreases by 0.3-0.5pp each quarter. Quarter 1: 5% monthly growth. Quarter 2: 4.5%. Quarter 3: 4%. Quarter 4: 3.5%. This produces a more realistic S-curve. Mistake 4 — Ignoring seasonality: what happens: December revenue is $500K. January forecast is $525K (+5% growth). January actual is $380K. The forecaster forgot that December includes holiday spending, year-end deals, and budget flushes that do not recur in January. Fix: always compare same-period year-over-year. Use seasonal indices to adjust monthly forecasts. If January is historically 70% of December, forecast $350K, then add growth. Mistake 5 — Survivorship bias in pipeline: what happens: looking at closed deals to calculate win rates. 50 deals closed out of 100 in pipeline = 50% win rate. But the pipeline had 200 deals — 100 were disqualified or went silent and were quietly removed. True win rate: 50 out of 200 = 25%. The forecast based on 50% win rate will be double the reality. Fix: track ALL pipeline entries from creation, including those removed. Calculate win rates based on original pipeline, not cleaned-up pipeline'"
    weight: 0.35
    description: "Mistakes"
  - type: llm_judge
    criteria: "Response covers additional mistakes and cognitive biases — biases: 'Additional mistakes and cognitive biases: Mistake 6 — Recency bias: what happens: last month was the best month ever ($300K). The forecaster assumes this is the new normal and projects forward from $300K. Reality: last month may have included a one-time large deal, a seasonal spike, or a promotion that pulled forward future revenue. Fix: look at the trailing 3-6 month trend, not just the last month. Identify whether the spike was one-time or recurring. Remove outliers before trend analysis. Mistake 7 — Sandbagging (deliberate under-forecasting): what happens: sales leaders learn that missing forecasts has consequences, so they deliberately forecast low to always beat expectations. Q1 forecast: $1.2M. Q1 actual: $1.8M. This looks like the team over-performed, but the company under-invested (hiring, marketing, inventory) because it planned for $1.2M. Fix: measure forecast accuracy in both directions. Over-forecasting by 20% and under-forecasting by 20% should be treated as equally problematic. Reward accuracy, not just beating the number. Mistake 8 — Not accounting for revenue recognition timing: what happens: a $500K annual contract is signed in March. The forecast shows $500K revenue in March. Reality: if revenue is recognized monthly, the company recognizes $41.7K/month over 12 months. March actual recognized revenue: $41.7K, not $500K. Fix: understand the difference between bookings (deals signed), billings (invoices sent), and revenue (recognized per accounting rules). Forecast the metric that matters for the specific audience. Mistake 9 — Extrapolating from insufficient data: what happens: a 3-month-old startup has revenue of $10K, $15K, $25K. Founder projects: we are growing 50-67% month-over-month. At this rate, we will hit $1M monthly revenue in 12 months. Reality: early-stage growth rates are not sustainable. The sample size is too small to establish a reliable pattern. Fix: use conservative assumptions for projections beyond 2x the historical data period. With 3 months of data, forecast at most 6 months ahead, and use wide confidence ranges. Mistake 10 — Ignoring churn and contraction: what happens: forecast adds new customer revenue but does not subtract expected losses. New customers: +$200K/quarter. Churn: -$80K/quarter (ignored). Forecast: $200K growth. Actual: $120K growth. This compounds — after 4 quarters, the forecast is $800K ahead of reality. Fix: always model gross additions AND gross losses. Net growth = new revenue + expansion - churn - contraction. Track each component separately'"
    weight: 0.35
    description: "Biases"
  - type: llm_judge
    criteria: "Response covers how to build a mistake-resistant forecasting process — process: 'Building a mistake-resistant forecasting process: the forecast hygiene checklist: before publishing any forecast, verify: 1. Is this a forecast or a target? (Am I predicting or hoping?). 2. Am I presenting a range, not a single number? 3. Have I accounted for seasonality? (Compare YoY, not MoM). 4. Have I modeled churn and contraction? (Both sides of the equation). 5. Are my growth rate assumptions decelerating appropriately? 6. Is my pipeline data clean? (Win rates based on full pipeline, not just survivors). 7. Am I using enough historical data? (At least 12 months for confidence). 8. Have I separated one-time events from recurring patterns? The post-mortem process: after every quarter, conduct a forecast review: what did we forecast vs actual? Which assumptions were wrong and why? Was the miss due to the model (fixable) or an unforeseeable event (acceptable)? What would we do differently next time? Document these findings. Over time, you build institutional knowledge about your forecasting strengths and weaknesses. Applying to the VP scenario: Q3 miss ($2M forecast, $1.4M actual = 30% over): likely causes — target was used as forecast. Pipeline win rates were inflated. Seasonality not accounted for. One-time deals from Q2 were projected to recur. Q4 miss ($1.5M forecast, $2.1M actual = 40% under): likely causes — overcorrected from Q3 miss (recency bias on the miss itself). Sandbagged to avoid another over-forecast. Did not account for Q4 seasonal strength (year-end budget flush). These are classic examples of oscillating forecasts — overcorrecting in each direction. The fix is a systematic process, not intuition-based adjustments. Recommended approach for the VP: implement a three-forecast system. Bottom-up forecast: built from pipeline + renewal data + historical patterns. Top-down forecast: built from market size, growth rates, and competitive dynamics. Consensus forecast: average of bottom-up and top-down, reviewed by cross-functional team. Track accuracy of all three. Over time, you learn which method is most reliable for your business'"
    weight: 0.30
    description: "Process"
