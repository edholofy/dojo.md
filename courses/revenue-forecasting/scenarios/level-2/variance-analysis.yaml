meta:
  id: variance-analysis
  level: 2
  course: revenue-forecasting
  type: output
  description: "Variance analysis — learn to analyze the difference between forecasted and actual revenue, identify root causes, and improve future forecasts"
  tags: [variance, actual-vs-forecast, root-cause, bridge, intermediate]

state: {}

trigger: |
  A financial analyst says: "Our Q2 revenue came in at $4.8M against
  a forecast of $5.2M — an 8% miss. My CFO wants a detailed variance
  analysis explaining where and why we missed. Here's the breakdown:

  Forecast: Subscription $3.5M (actual $3.3M), New business $1.0M
  (actual $0.9M), Professional services $0.5M (actual $0.4M),
  Usage-based $0.2M (actual $0.2M).

  What happened in each area: subscription had higher-than-expected
  churn in May. New business had two deals slip to Q3. Services had
  a project delay. Usage-based was on target."

  Task: Conduct a structured variance analysis, build a waterfall
  bridge, and recommend improvements to the forecasting process.

assertions:
  - type: llm_judge
    criteria: "Response conducts a structured variance analysis — analysis: 'Structured variance analysis: overall variance summary: forecast: $5.2M. Actual: $4.8M. Variance: -$400K (-7.7%). Verdict: unfavorable miss. Decomposing the variance by revenue stream: stream | forecast | actual | variance | % miss | contribution to total miss. Subscription: $3.5M | $3.3M | -$200K | -5.7% | 50% of miss. New business: $1.0M | $0.9M | -$100K | -10.0% | 25% of miss. Services: $0.5M | $0.4M | -$100K | -20.0% | 25% of miss. Usage-based: $0.2M | $0.2M | $0K | 0% | 0% of miss. Total: $5.2M | $4.8M | -$400K | -7.7% | 100%. Key observation: subscription is the largest stream and contributed 50% of the miss. But services had the highest percentage miss (20%) — suggesting the services forecast was the least accurate. Root cause analysis by stream: Subscription (-$200K): the churn spike in May caused the miss. Normal monthly churn: 3% of MRR ($35K/month). May actual churn: 5.5% of MRR ($63K). Excess churn in May: $28K × remaining months in Q2 = approximately $56K direct impact. Plus the compounding effect of lost customers on June revenue: approximately $30K. Plus lower-than-expected expansion ($40K below plan). Total subscription variance explained: $56K (excess churn) + $30K (churn compounding) + $40K (weak expansion) + $74K (other small items) = $200K. New business (-$100K): two deals slipped from Q2 to Q3. Deal A: $60K (was in negotiation stage, legal review took 3 extra weeks). Deal B: $45K (champion left the company, new stakeholder required re-evaluation). Combined slipped revenue: $105K (explains the full $100K miss with rounding). Note: these deals are not lost — they slipped. Q3 should benefit from their closure. Services (-$100K): one project delayed by 6 weeks due to client readiness issues. Project was a $180K engagement. $100K of revenue recognition pushed from Q2 to Q3. Not a demand problem — a timing problem. Usage-based ($0K): on target — this is the most stable and predictable stream'"
    weight: 0.35
    description: "Analysis"
  - type: llm_judge
    criteria: "Response builds a variance waterfall bridge — bridge: 'The variance waterfall bridge: the waterfall (bridge) chart is the standard way to visually communicate variance analysis to executives. It shows the journey from forecast to actual as a series of additions and subtractions. Building the bridge — start at $5.2M forecast: $5.2M (forecast). -$56K: excess May churn (subscription). -$30K: churn compounding effect (subscription). -$40K: weak expansion revenue (subscription). -$74K: other subscription items. -$60K: Deal A slipped to Q3 (new business). -$45K: Deal B slipped to Q3 (new business). +$5K: small new deals above plan (new business). -$100K: project delay (services). = $4.8M (actual). Reading the bridge: the bridge tells a clear story. The largest single driver was the May churn spike (-$56K). The deal slippage (-$105K combined) is not lost revenue — it is timing. The services miss (-$100K) is also timing — revenue is deferred, not lost. The true run-rate impact (revenue actually lost, not just delayed): May churn excess: -$56K (ongoing impact — these customers are gone). Churn compounding: -$30K (ongoing — compounds each future month). Weak expansion: -$40K (one-time if expansion recovers; ongoing if systematic). Total structural miss: approximately $126K. Total timing miss: approximately $205K (deals and project that shift to Q3). Other: approximately $69K. The structural vs timing distinction matters: timing misses self-correct in future quarters. Structural misses compound and require intervention. Variance classification framework: category | type | action required. Timing (deal slips, project delays): temporary | monitor Q3 for catch-up. Volume (fewer deals than planned): structural | investigate pipeline health. Rate (lower ARPU than planned): structural | review pricing and discounting. Churn (higher customer losses): structural | investigate customer success. Expansion (lower upsell): structural | review expansion playbook. One-time (unusual events): non-recurring | document and exclude from trend'"
    weight: 0.35
    description: "Bridge"
  - type: llm_judge
    criteria: "Response covers forecast improvement recommendations — improvement: 'Improving the forecasting process based on variance findings: recommendation 1 — build an early warning system for churn: the May churn spike should not have been a surprise. Implement: weekly churn monitoring (not just monthly). Customer health scores that flag at-risk accounts 30-60 days before churn. Churn forecast that adjusts dynamically based on leading indicators (support ticket volume, usage decline, NPS scores). Forecast impact: if the May churn spike had been detected 2 weeks early, the subscription forecast could have been adjusted by $50-80K, reducing the overall miss. Recommendation 2 — apply deal slippage rates to pipeline forecasts: historically, what percentage of late-stage deals slip by one quarter? If 15% of negotiation-stage deals slip: apply a 15% haircut to deals expected to close in the last month of the quarter. This systematically addresses the optimistic bias in pipeline forecasting. Recommendation 3 — separate timing variance from demand variance: the current variance report mixes true misses with timing differences. Create two variance categories: demand variance (true miss or beat — revenue gained or lost permanently). Timing variance (revenue shifted between periods — self-correcting). Track cumulative year-to-date variance to see if timing variances net out over time. If Q2 had $205K of timing slippage and Q3 recaptures $200K, the timing variance is essentially zero on a half-year basis. Recommendation 4 — implement a monthly forecast update cadence: do not set the quarterly forecast once and leave it. Month 1 of quarter: set the initial forecast. Month 2: update with actual month-1 data and revised outlook for months 2-3. Month 3: final update with 2 months of actual data and month-3 outlook. This rolling update reduces surprise misses because the forecast narrows as the quarter progresses. Recommendation 5 — track forecast accuracy by stream over time: build a dashboard showing MAPE by revenue stream over trailing 4 quarters: stream | Q1 MAPE | Q2 MAPE | Q3 MAPE | Q4 MAPE | trend. Subscription: 3% | 5.7% | - | - | worsening. New business: 8% | 10% | - | - | stable-poor. Services: 12% | 20% | - | - | worsening. Usage: 2% | 0% | - | - | excellent. This identifies which streams need the most forecasting improvement and whether accuracy is improving or degrading over time. Presenting to the CFO: lead with: we missed by $400K (7.7%). Of this, approximately $200K is timing (will recover in Q3) and approximately $200K is structural (requires action). The three structural issues are: churn spike, weak expansion, and pipeline optimism. Here are the three process changes to prevent a repeat'"
    weight: 0.30
    description: "Improvement"
