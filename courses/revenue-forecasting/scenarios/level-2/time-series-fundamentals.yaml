meta:
  id: time-series-fundamentals
  level: 2
  course: revenue-forecasting
  type: output
  description: "Time series fundamentals — learn core time series concepts including trend, seasonality, and noise decomposition for revenue forecasting"
  tags: [time-series, trend, decomposition, exponential-smoothing, intermediate]

state: {}

trigger: |
  A data analyst says: "My manager wants me to use time series
  analysis for our revenue forecast instead of just using growth
  rates. I have 24 months of monthly revenue data and need to
  understand the core time series concepts. Here's a sample:

  The data shows: an upward trend (revenue growing from $200K to
  $400K over 24 months), seasonal pattern (Q4 spikes, Q1 dips),
  and monthly noise (±5-10% random variation).

  What are the fundamental time series concepts I need to know and
  how do I apply them to revenue forecasting?"

  Task: Explain time series decomposition, demonstrate key methods,
  and show how they improve revenue forecasting accuracy.

assertions:
  - type: llm_judge
    criteria: "Response explains time series decomposition — decomposition: 'Time series decomposition: what is time series decomposition: breaking a revenue series into its underlying components so each can be analyzed and forecast separately. The three components: Component 1 — Trend (T): the long-term direction of revenue. In this data: revenue is growing from $200K to $400K over 24 months. This is approximately $8.3K per month linear growth, or approximately 3% month-over-month compound growth. How to extract: fit a trend line (linear, exponential, or polynomial) through the data. Moving average: calculate a 12-month centered moving average to smooth out seasonality. The trend line shows the fundamental growth trajectory, stripped of seasonal and random effects. Component 2 — Seasonality (S): the regular, repeating pattern within each year. In this data: Q4 months are approximately 20-30% above trend. Q1 months are approximately 15-20% below trend. Q2 and Q3 are near trend. The seasonal pattern: Jan (0.82), Feb (0.85), Mar (0.90), Apr (0.95), May (1.00), Jun (1.02), Jul (0.98), Aug (0.97), Sep (1.05), Oct (1.10), Nov (1.20), Dec (1.30). These seasonal indices sum to approximately 12.14 (close to 12, normalized). How to extract: calculate the ratio of actual to trend for each month, then average across years. Component 3 — Noise/Residual (R): the random, unpredictable variation after removing trend and seasonality. In this data: ±5-10% random variation from month to month. Noise is caused by: timing of specific deals, marketing campaign effectiveness, weather, competitor actions. Noise cannot be forecast — it represents irreducible uncertainty. Decomposition models: additive model: Y = T + S + R (when seasonal variation is constant in absolute terms). Multiplicative model: Y = T × S × R (when seasonal variation scales with the level of the series). For revenue data, multiplicative is usually more appropriate because seasonal spikes grow as the business grows. A business with $200K base might have a $40K December spike, while at $400K base the spike would be $80K — the percentage stays the same, but the absolute amount doubles'"
    weight: 0.35
    description: "Decomposition"
  - type: llm_judge
    criteria: "Response covers key time series forecasting methods — methods: 'Key time series forecasting methods: Method 1 — Simple moving average: calculation: average of the last N months. 3-month MA: average of last 3 months (responsive but noisy). 6-month MA: average of last 6 months (smoother but lags). 12-month MA: average of last 12 months (removes seasonality entirely). For forecasting: use the MA as a smoothed baseline and add seasonal adjustment. Example with 3-month MA (months 22-24 average $380K): month 25 forecast = $380K × seasonal index for month 25. If month 25 is January (index 0.82): $380K × 0.82 = $312K. Limitation: equal weight to all N months — does not emphasize recent data. Method 2 — Exponential smoothing: gives more weight to recent observations. Formula: forecast = α × actual_last_month + (1-α) × previous_forecast. Alpha (α) is the smoothing parameter (0 to 1). α = 0.1: heavy smoothing, slow to react to changes. α = 0.3: moderate smoothing (common starting point). α = 0.9: minimal smoothing, very responsive to recent data. Example with α = 0.3: if last month actual = $400K and previous forecast = $370K: new forecast = 0.3 × $400K + 0.7 × $370K = $120K + $259K = $379K. This gives 30% weight to the most recent observation and distributes the remaining 70% across all prior history (exponentially decaying). Method 3 — Holt-Winters (triple exponential smoothing): the gold standard for revenue with trend and seasonality. Three components smoothed separately: level (baseline): captures the current revenue level. Trend: captures the growth rate. Seasonality: captures the seasonal pattern. Each has its own smoothing parameter (α, β, γ). Forecast formula: forecast(t+h) = (level_t + h × trend_t) × seasonal_index(t+h). Example: current level: $390K. Current trend: +$8K/month. January seasonal index: 0.82. Forecast for January (h=1): ($390K + 1 × $8K) × 0.82 = $398K × 0.82 = $326K. Forecast for February (h=2): ($390K + 2 × $8K) × 0.85 = $406K × 0.85 = $345K. Holt-Winters advantages: automatically updates trend and seasonal estimates as new data arrives. Handles both additive and multiplicative seasonality. Well-suited for revenue data with growth and seasonal patterns. Choosing the right method: no seasonality, no trend: simple moving average or simple exponential smoothing. Trend but no seasonality: double exponential smoothing (Holt's method). Both trend and seasonality: Holt-Winters (triple exponential smoothing). For most revenue data with 12+ months of history: use Holt-Winters'"
    weight: 0.35
    description: "Methods"
  - type: llm_judge
    criteria: "Response covers practical application and model evaluation — practical: 'Practical application and model evaluation: evaluating forecast model accuracy: hold-out testing: use months 1-18 for training, months 19-24 for testing. Apply each method to predict months 19-24, then compare predictions to actuals. Metrics for comparison: MAPE (Mean Absolute Percentage Error): average percentage error across test months. MAE (Mean Absolute Error): average dollar error. RMSE (Root Mean Square Error): penalizes large misses more heavily. Example comparison: method | MAPE | MAE | RMSE. 3-month MA + seasonal: 8.2% | $28K | $34K. Exponential smoothing: 7.5% | $26K | $31K. Holt-Winters: 5.1% | $18K | $22K. Holt-Winters wins because it captures both trend and seasonality simultaneously. Practical implementation steps: Step 1 — Collect at least 24 months of monthly revenue data. Step 2 — Plot the data and visually identify trend, seasonality, and outliers. Step 3 — Remove outliers (one-time events that should not influence the forecast). Example: a $100K one-time consulting project in month 8 should be removed before modeling. Step 4 — Fit Holt-Winters model. In Excel: use the FORECAST.ETS function. In Python: from statsmodels use ExponentialSmoothing. In R: use the hw() function from forecast package. Step 5 — Generate forecasts with confidence intervals. The model produces point forecasts plus prediction intervals. Month 25 forecast: $326K. 80% prediction interval: $290K - $362K. 95% prediction interval: $265K - $387K. Wider intervals = more uncertainty. Intervals widen as you forecast further ahead. Step 6 — Validate monthly by comparing forecast to actual. When to update the model: monthly: add the new actual data point and re-fit the model. Quarterly: review whether the model parameters need adjustment. Annually: recalculate seasonal indices with the new full year of data. When time series methods fail: structural breaks: a major business change (new product launch, acquisition, pivot) invalidates historical patterns. The model cannot forecast discontinuities — use judgment and scenario analysis instead. External shocks: recessions, pandemics, regulatory changes. Combine time series forecasts with scenario modeling for these events. Limited data: time series needs 24+ months for reliability. With less data, use simpler methods (growth rate projection, bottom-up)'"
    weight: 0.30
    description: "Practical"
