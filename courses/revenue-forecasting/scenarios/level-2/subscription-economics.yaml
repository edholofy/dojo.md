meta:
  id: subscription-economics
  level: 2
  course: revenue-forecasting
  type: output
  description: "Subscription economics — understand unit economics including CAC, LTV, payback period, and how they shape the revenue forecast"
  tags: [subscription, cac, ltv, payback, unit-economics, intermediate]

state: {}

trigger: |
  A growth-stage CEO says: "My board keeps asking about our unit
  economics and how they affect our revenue trajectory. Here's what
  I know:

  Monthly subscription: $99/month per customer.
  Customer acquisition cost (CAC): $450 (blended across all channels).
  Monthly gross margin: 75%.
  Monthly logo churn: 3.5%.
  Monthly expansion rate: 1.5% (upsells, seat additions).
  Current customers: 2,000.
  New customers/month: 150.

  They say our unit economics need to improve before they'll fund
  aggressive growth. What should I tell them?"

  Task: Analyze the unit economics, calculate key ratios, show how
  they affect the revenue forecast, and identify what needs to improve.

assertions:
  - type: llm_judge
    criteria: "Response calculates all key unit economics metrics — metrics: 'Unit economics analysis: Metric 1 — Customer Lifetime Value (LTV): average customer lifetime = 1 ÷ monthly churn rate = 1 ÷ 3.5% = 28.6 months. Gross margin-adjusted revenue per month: $99 × 75% = $74.25. Simple LTV = $74.25 × 28.6 = $2,124. With expansion revenue: net monthly churn = 3.5% - 1.5% = 2.0% (net revenue churn). Revenue lifetime = 1 ÷ 2.0% = 50 months. LTV with expansion = $74.25 × 50 = $3,713. The expansion revenue significantly increases LTV (from $2,124 to $3,713) because it extends the effective revenue lifetime even though customers leave at the same rate. Metric 2 — LTV/CAC ratio: LTV: $3,713. CAC: $450. LTV/CAC = $3,713 ÷ $450 = 8.3x. Benchmark: below 3x: business loses money on customer acquisition. 3-5x: healthy but limited room for investment. 5-10x: strong unit economics, room to invest aggressively. Above 10x: potentially under-investing in growth. Our 8.3x is strong — the board should be comfortable with this ratio. However, this uses the GM-adjusted LTV. Some investors prefer the fully-loaded LTV (including customer success, support costs), which would be lower. Metric 3 — CAC payback period: how many months until a customer's gross margin contribution recovers the acquisition cost. Monthly GM contribution: $99 × 75% = $74.25. CAC payback = $450 ÷ $74.25 = 6.1 months. With expansion: payback is slightly faster because revenue per customer grows over time, but the difference is small in early months. Benchmark: under 6 months: excellent (common in consumer subscription). 6-12 months: good (typical for SMB SaaS). 12-18 months: acceptable (mid-market SaaS). 18-24 months: concerning (enterprise SaaS can be higher if LTV is very high). Above 24 months: dangerous (cash burn may become unsustainable). Our 6.1 months is good — each customer becomes profitable relatively quickly. Metric 4 — Monthly recurring revenue (MRR) dynamics: starting MRR: 2,000 × $99 = $198,000. New MRR: 150 × $99 = $14,850. Churned MRR: $198,000 × 3.5% = $6,930. Expansion MRR: $198,000 × 1.5% = $2,970. Net new MRR: $14,850 + $2,970 - $6,930 = $10,890. MRR growth rate: $10,890 ÷ $198,000 = 5.5% monthly. NRR: (1 - 3.5% + 1.5%) = 98% monthly = approximately 78% annually. The 98% monthly NRR means the existing customer base slowly declines without new acquisition. At 78% annual NRR, the company would lose 22% of its revenue each year if it stopped acquiring new customers'"
    weight: 0.35
    description: "Metrics"
  - type: llm_judge
    criteria: "Response shows how unit economics affect the revenue forecast — forecast: 'How unit economics shape the revenue forecast: the 12-month projection: using the current unit economics: month 1 MRR: $198,000 + $10,890 = $208,890. Month 3 MRR: approximately $233,000. Month 6 MRR: approximately $275,000. Month 12 MRR: approximately $380,000. Annual revenue: approximately $3.4M. Year-end ARR: approximately $4.56M. This represents 92% ARR growth ($4.56M from $2.38M starting ARR). The unit economics tell us WHY growth looks this way: NRR of 98% means the existing base erodes slowly. New customer acquisition ($14.8K MRR/month) drives all growth. Growth is linear — MRR increases by roughly $10-12K per month. To achieve accelerating (exponential) growth, the company needs either: more new customers per month (scale acquisition). Higher NRR (above 100% means existing base grows on its own). Why the board wants improvement: scenario analysis — the impact of better unit economics: current state: 3.5% churn, 1.5% expansion, 150 new/month, $450 CAC. Year-end ARR: $4.56M. Monthly burn from acquisition: 150 × $450 = $67,500. Improved state A (reduce churn to 2.5%): NRR improves from 98% to 99%. Year-end ARR: $4.96M (+$400K). Improvement requires: better onboarding, proactive customer success. Cost: 1 customer success manager at $80K/year. ROI: $400K revenue ÷ $80K cost = 5x return. Improved state B (increase expansion to 3%): NRR improves from 98% to 100%. Year-end ARR: $5.28M (+$720K). NRR at 100% means the existing base is self-sustaining. Improvement requires: premium features, usage-based pricing component. Improved state C (reduce CAC from $450 to $350): same growth trajectory but $100 less cost per customer. Annual saving: 150 × $100 × 12 = $180K. LTV/CAC improves from 8.3x to 10.6x. Improvement requires: better conversion rate optimization, lower-cost channels. Combined improvement (A + B + C): year-end ARR: $5.6M (23% higher than current trajectory). Monthly burn reduced by $15K. LTV/CAC: 13x. The board's message decoded: they are not saying unit economics are bad (8.3x LTV/CAC is strong). They are saying: if you improve churn by 1pp and expansion by 1.5pp, the SAME acquisition spend produces 23% more revenue. Prove you can do this, and we will fund aggressive growth'"
    weight: 0.35
    description: "Forecast"
  - type: llm_judge
    criteria: "Response covers the path to improvement and board communication — improvement: 'The path to improvement and board communication: the unit economics improvement roadmap: Phase 1 (months 1-3) — diagnose churn: analyze why 3.5% of customers leave each month. Segment churn by: customer age (are new customers churning fast?). Plan type (is one plan churning more?). Acquisition channel (are paid-ad customers churning more than organic?). Likely findings: month-1 churn is probably 8-10% (early activation failure). Months 2-6 churn is probably 3-4% (value realization issues). Months 6+ churn is probably 1-2% (stable, committed customers). Fix the biggest bucket first — early churn is usually the cheapest to fix (improve onboarding, add activation emails, offer setup assistance). Phase 2 (months 3-6) — build expansion engine: current expansion rate (1.5%) suggests limited upsell paths. Options: add a premium tier with advanced features ($149 or $199/month). Add usage-based component (API calls, storage, seats). Create add-on products (analytics, integrations, support tiers). Target: increase expansion rate from 1.5% to 3% within 6 months. Phase 3 (months 6-12) — optimize acquisition efficiency: with better retention and expansion (higher LTV), the company can afford higher CAC while maintaining strong ratios. But the goal is to REDUCE CAC while maintaining volume. Tactics: invest in content marketing and SEO (lower CAC channel). Build referral programs (existing customer referrals have near-zero CAC). Improve website conversion (more trials from same traffic). Board presentation framework: the three slides the board needs. Slide 1 — Current unit economics scorecard: CAC: $450 (target: $350). LTV: $3,713 (target: $5,000). LTV/CAC: 8.3x (target: 14x). Payback: 6.1 months (target: 5 months). NRR: 98% monthly / 78% annual (target: 100% monthly / 100% annual). Slide 2 — Improvement plan with timeline: quarter | focus | metric target | expected impact. Q1: reduce early churn | churn 3.5% → 3.0% | +$200K ARR. Q2: launch premium tier | expansion 1.5% → 2.5% | +$350K ARR. Q3: optimize acquisition | CAC $450 → $380 | $126K savings. Q4: scale with improved economics | 200 new/month | +$800K ARR. Slide 3 — Revenue forecast scenarios: current trajectory: $4.56M year-end ARR. With improvements: $5.6M year-end ARR (23% higher). With improvements plus aggressive scaling: $7.2M year-end ARR (58% higher). The improvement path unlocks the scaling path — this is the story the board wants to see'"
    weight: 0.30
    description: "Improvement"
