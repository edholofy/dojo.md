meta:
  id: forecast-communication
  level: 2
  course: revenue-forecasting
  type: output
  description: "Forecast communication — learn how to present revenue forecasts to different stakeholders with appropriate framing, context, and confidence levels"
  tags: [communication, presentation, stakeholders, framing, intermediate]

state: {}

trigger: |
  A director of finance says: "I have the same revenue forecast but
  need to present it to three different audiences next week:

  1. The board of directors (wants strategic view, risk assessment).
  2. The sales leadership team (wants targets and resource allocation).
  3. The engineering team (wants headcount planning context).

  Our forecast: $18M next year (base case), up from $14M this year.
  Range: $15.5M (conservative) to $21M (optimistic). Key driver:
  launching a new enterprise tier that could generate $2-4M.

  How do I present the same forecast differently to each audience?"

  Task: Create forecast presentations tailored to each audience,
  explaining what to emphasize, what to include, and what to omit
  for each stakeholder group.

assertions:
  - type: llm_judge
    criteria: "Response creates the board-level presentation — board: 'Board presentation — strategic view and risk assessment: what the board cares about: are we on track to meet our long-term targets? What are the key risks to revenue? How confident are we in the forecast? What decisions need board input? The board presentation structure: Slide 1 — Revenue trajectory: this year: $14M (actual or near-final). Next year forecast: $18M base case (29% growth). Context: industry benchmark growth is 20-25% for our stage. We are projecting above-market growth driven by enterprise tier launch. Chart: show 3-year revenue trend with forward projection. Include the range band ($15.5M - $21M) to communicate uncertainty visually. Slide 2 — Scenario analysis: scenario | revenue | growth | probability | key driver. Optimistic: $21M | 50% | 25% | enterprise tier exceeds plan, strong retention. Base: $18M | 29% | 50% | enterprise tier on plan, current trends continue. Conservative: $15.5M | 11% | 25% | enterprise tier underperforms, churn increases. Expected value: $18.1M. Slide 3 — Key risks and mitigants: risk 1: enterprise tier adoption slower than planned (impact: -$2M). Mitigant: pilot program with 5 design partners already committed ($800K committed ARR). Risk 2: competitive pressure increases churn (impact: -$1M). Mitigant: product roadmap addresses top 3 competitive gaps in H1. Risk 3: macroeconomic slowdown extends sales cycles (impact: -$1.5M). Mitigant: 65% of forecast is from existing customer expansion (less sensitive to macro). Slide 4 — Board decisions needed: should we invest $500K in enterprise sales enablement to capture the upside? Should we hire ahead of the forecast (risk) or behind the forecast (miss opportunity)? Board presentation tone: confident but balanced. Show awareness of risks without being defensive. Focus on what you CAN control. Do not present one number — present the range. Do not bury bad news — address risks head-on with mitigants'"
    weight: 0.35
    description: "Board"
  - type: llm_judge
    criteria: "Response creates the sales leadership presentation — sales: 'Sales leadership presentation — targets and resource allocation: what sales leadership cares about: what is my team's target? How is the target distributed across segments and quarters? What resources (headcount, tools, budget) will I get? Is the target achievable or aspirational? The sales presentation structure: Section 1 — Revenue targets by segment: total target: $18M. Breakdown: existing customer expansion: $7.2M (40% of target). New business — SMB: $4.5M (25%). New business — mid-market: $3.6M (20%). New business — enterprise (new tier): $2.7M (15%). Why this split matters: $7.2M from expansion is the most predictable — driven by NRR and cross-sell. $4.5M SMB is the volume play — requires consistent lead flow. $3.6M mid-market requires deal specialization and longer cycles. $2.7M enterprise is the riskiest — new segment, longer sales cycles, fewer deals. Section 2 — Quarterly targets with ramp: quarter | target | reasoning. Q1: $3.8M (21%) | cautious start, enterprise ramp. Q2: $4.2M (23%) | enterprise pipeline maturing. Q3: $4.5M (25%) | full enterprise sales motion. Q4: $5.5M (31%) | seasonal budget flush plus enterprise closes. Note: Q4 weighting is typical but risky — track pipeline weekly in Q3 to validate. Section 3 — Resource allocation: headcount plan: current: 12 AEs (8 SMB, 3 mid-market, 1 enterprise). Planned: add 6 AEs (2 SMB, 2 mid-market, 2 enterprise). Hiring timeline: 2 in Q1, 2 in Q2, 2 in Q3. Ramp time: 3 months to full productivity. Quota assignment: segment | AEs | quota per AE | total. SMB: 10 | $450K | $4.5M. Mid-market: 5 | $720K | $3.6M. Enterprise: 3 | $900K | $2.7M. Coverage validation: required pipeline = target ÷ win rate × pipeline coverage ratio. SMB: $4.5M ÷ 25% win rate × 3x coverage = $54M pipeline needed. Mid-market: $3.6M ÷ 20% × 3.5x = $63M pipeline needed. Enterprise: $2.7M ÷ 15% × 4x = $72M pipeline needed. Section 4 — Compensation and incentive alignment: quotas should be set so 60-70% of reps achieve plan (if everyone achieves, quotas were too low). Enterprise reps should have higher base, lower variable — reflecting longer sales cycles. Consider accelerators above 100% attainment to motivate upside performance. Sales presentation tone: direct and actionable. Show the math behind the targets. Be transparent about assumptions (ramp time, win rates, pipeline needs). Acknowledge the stretch but show it is achievable with the planned resources'"
    weight: 0.35
    description: "Sales"
  - type: llm_judge
    criteria: "Response creates the engineering team presentation — engineering: 'Engineering team presentation — headcount planning context: what engineering cares about: will we need to hire more engineers? For which teams? What is the product roadmap that drives this revenue? Are we building for the current customer base or new segments? The engineering presentation structure: Section 1 — Revenue context (brief): company is growing from $14M to $18M (29% growth). Key initiative: enterprise tier launch requires product investment. Revenue from enterprise tier: $2-4M of the total forecast. Engineering implication: enterprise customers have different requirements (SSO, audit logs, SLA, permissions, data residency). Section 2 — Product requirements driven by the forecast: enterprise tier requirements (revenue impact: $2.7M): must-have features by Q1 launch: SSO/SAML integration, role-based access control, audit logging, 99.9% SLA commitment. Nice-to-have by Q2: data residency options, advanced admin console, API rate limit controls. Estimated engineering investment: 4 engineers × 6 months = 24 engineer-months. Existing product maintenance (revenue impact: $7.2M expansion): features that drive expansion: advanced analytics (upsell trigger), additional integrations, improved onboarding (reduces churn, protects base revenue). Estimated investment: 3 engineers full-time. Infrastructure scaling: current: supports 2,000 customers at $14M ARR. Projected: 2,800+ customers at $18M ARR (40% customer growth). Scaling needs: database optimization, CDN expansion, monitoring improvements. Estimated investment: 2 engineers × 4 months. Section 3 — Headcount plan: current engineering team: 20 engineers. Proposed additions: 6 engineers (2 enterprise features, 2 platform, 2 infrastructure). Hiring timeline: 2 in Q1, 2 in Q2, 2 in Q3. Engineering cost: 6 × $180K average loaded cost = $1.08M annual investment. Revenue return: enterprise tier alone is expected to generate $2.7M — a 2.5x return on the engineering investment. Section 4 — Priorities and trade-offs: the revenue forecast implies these priority rankings. Priority 1: enterprise tier (launch by end of Q1 — gates $2.7M revenue). Priority 2: expansion features (supports $7.2M expansion revenue). Priority 3: infrastructure scaling (supports customer growth without degradation). Priority 4: technical debt (important but not directly revenue-linked). If the engineering team can only do three of four: enterprise + expansion + scaling = full revenue support. Deferring technical debt adds risk but does not directly impact revenue. This is a trade-off discussion for engineering leadership and the CTO. Engineering presentation tone: factual and structured. Connect every engineering investment to a revenue outcome. Show the ROI of engineering headcount (the $1.08M investment supports $18M in revenue). Be clear about trade-offs and priorities — engineers appreciate transparency about what will and will not get built. Avoid aspirational language — use data and logic. Key principle across all three presentations: same data, different framing. The board gets strategy and risk. Sales gets targets and resources. Engineering gets product priorities and headcount. Never show the full detail to every audience — it overwhelms and confuses. Tailor the depth and focus to what each audience needs to make their decisions'"
    weight: 0.30
    description: "Engineering"
