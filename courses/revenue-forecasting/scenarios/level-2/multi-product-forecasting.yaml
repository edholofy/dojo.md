meta:
  id: multi-product-forecasting
  level: 2
  course: revenue-forecasting
  type: output
  description: "Multi-product forecasting — learn to forecast revenue for companies with multiple products including cannibalization, halo effects, and portfolio dynamics"
  tags: [multi-product, portfolio, cannibalization, cross-sell, intermediate]

state: {}

trigger: |
  A product VP says: "We have three products and I need to forecast
  total company revenue, but they affect each other:

  Product A (Core Platform): $5M ARR, growing 15% YoY, 95% GRR.
  Product B (Analytics Add-on): $1.2M ARR, growing 40% YoY, 90% GRR.
     Launched 18 months ago. 30% of Product A customers also have B.
  Product C (New Mobile App): Launching next quarter. Priced at $29/month.
     Expected to attract new customers AND convert some Product A users.

  Product B helps retain Product A customers (customers with both
  products have 98% GRR vs 93% for A-only). But Product C might
  cannibalize some Product A revenue. How do I forecast this?"

  Task: Build a multi-product revenue forecast that accounts for
  cross-product dynamics, cannibalization, and halo effects.

assertions:
  - type: llm_judge
    criteria: "Response analyzes cross-product dynamics — dynamics: 'Cross-product dynamics analysis: understanding the product portfolio: Product A (Core Platform): the foundation. $5M ARR, mature, steady growth. Product B (Analytics Add-on): the retention multiplier. $1.2M ARR, fast-growing, creates stickiness. Product C (Mobile App): the growth driver. New launch, unknown trajectory, potential cannibalization. The interaction effects: Halo effect — Product B improves Product A retention: customers with A-only: 93% GRR (7% annual churn). Customers with A+B: 98% GRR (2% annual churn). Having Product B reduces churn by 5 percentage points. This means Product B's value exceeds its direct revenue — it also protects Product A revenue. Quantifying the halo effect: Product A customers: assume 500 total (at $10K average ACV). A-only customers: 350 (70%) at 93% GRR → lose 24.5 customers/year → $245K lost. A+B customers: 150 (30%) at 98% GRR → lose 3 customers/year → $30K lost. Total A churn: $275K/year. If B penetration increases from 30% to 50%: A-only: 250 at 93% GRR → lose 17.5 → $175K lost. A+B: 250 at 98% GRR → lose 5 → $50K lost. Total A churn: $225K/year. The additional B penetration saves $50K/year in Product A revenue. Product B's total value = direct revenue ($1.2M) + retention value ($50K+ saved annually in Product A). Cannibalization risk — Product C vs Product A: Product C at $29/month ($348/year) vs Product A at $10K/year average. Direct substitution risk is LOW — the products serve different use cases and price points. However: some small Product A customers ($99/month tier) may downgrade to Product C ($29/month) if the mobile app meets their needs. Estimated cannibalization: 5-10% of lowest-tier Product A customers. If 50 customers downgrade from $99/month to $29/month: lost Product A revenue: 50 × ($99 - $0) × 12 = $59,400. Gained Product C revenue: 50 × $29 × 12 = $17,400. Net impact: -$42,000. The cannibalization is limited because the products serve different segments, but it must be modeled'"
    weight: 0.35
    description: "Dynamics"
  - type: llm_judge
    criteria: "Response builds the multi-product forecast — forecast: 'Building the multi-product forecast: Product A forecast (next 12 months): starting ARR: $5.0M. Organic growth (new customer acquisition): 15% YoY → $750K new ARR. GRR: blended 95% → lose $250K. Cannibalization from Product C: -$42K. Product A ending ARR: $5.0M + $750K - $250K - $42K = $5.458M. Product A annual revenue (recognized during the year): approximately $5.23M. Product B forecast: starting ARR: $1.2M. Growth rate: 40% YoY (driven by increasing penetration of Product A base). New B customers: 40% × $1.2M = $480K new ARR. GRR: 90% → lose $120K. Improved retention from deeper A+B integration: GRR improving to 92% → lose $110K. Product B ending ARR: $1.2M + $480K - $110K = $1.57M. Product B annual revenue: approximately $1.39M. Product C forecast (new launch): launch timing: beginning of Q2 (9 months of revenue in year). Adoption scenarios: ramp model: month 1: 50 customers. Month 3: 200 customers. Month 6: 500 customers. Month 9: 800 customers. Customer sources: 60% net-new (never used any product) — pure growth. 25% Product A users adding C (incremental revenue). 10% Product A downgrades (cannibalization — modeled above). 5% competitor switches. Revenue: month 1-3: 50 → 200 customers × $29 = $1,450 → $5,800/month. Month 4-6: 200 → 500 × $29 = $5,800 → $14,500/month. Month 7-9: 500 → 800 × $29 = $14,500 → $23,200/month. Product C annual revenue (9 months): approximately $100K. Product C ending ARR: 800 × $29 × 12 = $278K. Total portfolio forecast: product | starting ARR | ending ARR | annual revenue | growth. A: $5.0M | $5.46M | $5.23M | 9.2%. B: $1.2M | $1.57M | $1.39M | 30.8%. C: $0 | $278K | $100K | new. Total: $6.2M | $7.31M | $6.72M | 17.9%. Key insight: the portfolio grows 17.9% — faster than Product A alone (9.2%) because of the fast-growing add-on (B) and new product (C). Product mix shifts: Product A goes from 81% of ARR to 75%. This diversification reduces risk — the company is less dependent on a single product'"
    weight: 0.35
    description: "Forecast"
  - type: llm_judge
    criteria: "Response covers portfolio optimization and strategic implications — strategy: 'Portfolio optimization and strategic implications: the portfolio optimization framework: each product plays a different strategic role. Product A (Cash cow): generates the most revenue. Growing slowly but reliably. High retention — the foundation of the business. Strategy: protect and extract maximum value. Invest in retention (Product B cross-sell). Modest new feature investment. Product B (Retention multiplier): direct revenue contribution is modest ($1.2M). But its retention impact on Product A is worth $50K+/year AND growing. Combined A+B customers have 70% longer lifetime. Strategy: maximize A→B conversion. Target: increase penetration from 30% to 60% within 18 months. Consider bundling B with higher-tier A plans. The ROI of B is understated by its direct revenue alone. Product C (Growth engine): small revenue today but largest growth potential. Attracts new customer segments (mobile-first users). Risk: cannibalization of Product A. Strategy: position as entry point, not replacement. Build upgrade path: C → A → A+B. Track cannibalization monthly and adjust if needed. Revenue quality assessment: metric | current | projected | trend. Recurring revenue %: 100% | 100% | stable. Product concentration (A as % of total): 81% | 75% | improving. Customer overlap (multi-product): 30% | 45% | improving. Average revenue per account: $12,400 | $13,100 | growing. Revenue diversification is improving — this reduces risk and typically increases company valuation multiples. Cross-sell revenue model: the most valuable insight from multi-product analysis is the cross-sell opportunity. Cross-sell path 1: A → A+B. Current penetration: 30% (150 of 500 customers). Target: 50% by year-end. Revenue opportunity: 100 new B customers × $2,400/year = $240K new ARR. Plus retention benefit: $50K saved in A churn. Total value: $290K. Cross-sell path 2: C → A. If 20% of net-new C customers upgrade to A within 12 months. 480 net-new C customers × 20% = 96 potential A customers. Revenue: 96 × $10K = $960K in additional A ARR (mostly in year 2). This is the long-term strategic value of Product C — it is a customer acquisition channel for Product A. Forecasting implication: the multi-product forecast should model not just each product independently but also the flows between products (cross-sell, cannibalization, retention effects). Presenting the portfolio forecast: show both the individual product forecasts AND the cross-product dynamics. The total is not simply the sum of independent forecasts — interactions add value (halo effects) and subtract value (cannibalization). In this case, the interactions are net positive: Product B's retention benefit (+$50K) exceeds Product C's cannibalization (-$42K) by a small margin, and this will grow as B penetration increases'"
    weight: 0.30
    description: "Strategy"
