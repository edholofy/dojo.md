meta:
  id: cohort-based-forecasting
  level: 2
  course: revenue-forecasting
  type: output
  description: "Cohort-based forecasting — learn to forecast revenue by analyzing customer cohort behavior including retention curves, expansion patterns, and lifetime value"
  tags: [cohort, retention, ltv, expansion, intermediate]

state: {}

trigger: |
  A SaaS analytics lead says: "Our aggregate churn rate is 4% monthly
  but I suspect this hides important differences between customer
  groups. We acquired different cohorts through different channels:

  Cohort A (Jan, organic): 100 customers, $80 ARPU, month-3 retention 85%.
  Cohort B (Feb, paid ads): 150 customers, $60 ARPU, month-3 retention 70%.
  Cohort C (Mar, enterprise sales): 30 customers, $250 ARPU, month-3 retention 95%.

  How do I use cohort analysis to build a better revenue forecast?"

  Task: Explain cohort-based forecasting, analyze the given cohorts,
  and build a cohort-level revenue forecast that reveals insights
  hidden by aggregate metrics.

assertions:
  - type: llm_judge
    criteria: "Response explains cohort-based forecasting and analyzes the cohorts — analysis: 'Cohort-based forecasting: what it is: instead of forecasting revenue as one aggregate number, break customers into groups (cohorts) based on when they joined, how they were acquired, or their characteristics. Each cohort has its own retention curve, expansion pattern, and revenue trajectory. Why cohorts matter: the aggregate 4% churn rate is a blended average that hides critical differences. Cohort A (organic): 15% lost by month 3 = approximately 5% monthly churn. Cohort B (paid ads): 30% lost by month 3 = approximately 10% monthly churn. Cohort C (enterprise): 5% lost by month 3 = approximately 1.7% monthly churn. Blended: (100×5% + 150×10% + 30×1.7%) ÷ 280 = approximately 7% weighted, but the mix of active customers shifts over time, making the blended rate unstable. Retention curve analysis: each cohort follows a characteristic decay pattern. Cohort A (organic, $80 ARPU): month 0: 100 customers, $8,000 MRR. Month 3: 85 customers, $6,800 MRR. Month 6: approximately 72 customers, $5,760 MRR. Month 12: approximately 52 customers, $4,160 MRR. Revenue retained at month 12: 52% of starting MRR. Cohort B (paid ads, $60 ARPU): month 0: 150 customers, $9,000 MRR. Month 3: 105 customers, $6,300 MRR. Month 6: approximately 74 customers, $4,440 MRR. Month 12: approximately 36 customers, $2,160 MRR. Revenue retained at month 12: 24% of starting MRR. Cohort C (enterprise, $250 ARPU): month 0: 30 customers, $7,500 MRR. Month 3: 28.5 customers, $7,125 MRR. Month 6: approximately 27 customers, $6,750 MRR. Month 12: approximately 24 customers, $6,000 MRR. Revenue retained at month 12: 80% of starting MRR. Key insight: Cohort B generates the most revenue initially ($9,000) but retains the least (24% at month 12). Cohort C generates less initially ($7,500) but retains far more (80% at month 12). The lifetime value differs dramatically: Cohort A LTV: approximately $8,000 × (1 ÷ 0.05) = $160K per cohort. Cohort B LTV: approximately $9,000 × (1 ÷ 0.10) = $90K per cohort. Cohort C LTV: approximately $7,500 × (1 ÷ 0.017) = $441K per cohort. Enterprise customers (Cohort C) generate 5x the lifetime value of paid-ad customers (Cohort B) despite having fewer customers'"
    weight: 0.35
    description: "Analysis"
  - type: llm_judge
    criteria: "Response builds a cohort-level revenue forecast — forecast: 'Building the cohort-level revenue forecast: the layered cohort model: total revenue in any month = sum of remaining revenue from each historical cohort + revenue from new cohorts. Example — forecasting month 6 revenue: existing cohort contributions at month 6: Cohort A (now 6 months old): 72 customers × $80 = $5,760. Cohort B (now 5 months old): approximately 82 customers × $60 = $4,920. Cohort C (now 4 months old): approximately 28 customers × $250 = $7,000. Plus new cohorts acquired in months 4, 5, and 6 (each at their starting point minus early churn). Assume monthly acquisition continues at similar rates: month 4 cohort (2 months old by month 6): 120 customers acquired, 108 remaining × $70 avg = $7,560. Month 5 cohort (1 month old): 120 acquired, 114 remaining × $70 = $7,980. Month 6 cohort (brand new): 120 acquired × $70 = $8,400. Month 6 total forecast: $5,760 + $4,920 + $7,000 + $7,560 + $7,980 + $8,400 = $41,620. Compare to naive forecast: 280 customers × 4% blended churn × 6 months of decay × $85 blended ARPU = much less accurate because it does not account for cohort mix shifting. Quarterly forecast (months 4-6): build month by month, layering in new cohorts each month. Month 4: approximately $35,000. Month 5: approximately $38,000. Month 6: approximately $41,600. Q2 total: approximately $114,600. With expansion revenue: if enterprise cohort (C) expands at 8%/month while others expand at 2%/month. Cohort C month 6 with expansion: $7,000 × (1.08)^3 = $8,820 (not $7,000). Cohort A month 6 with expansion: $5,760 × (1.02)^3 = $6,110. This reveals that enterprise customers not only retain better but also expand faster — making them dramatically more valuable for forecasting. Channel allocation insight: every $1 spent acquiring enterprise customers (Cohort C) generates approximately 5x more lifetime revenue than $1 spent on paid ads (Cohort B). The forecast should model what happens if acquisition budget shifts toward enterprise'"
    weight: 0.35
    description: "Forecast"
  - type: llm_judge
    criteria: "Response covers practical cohort forecasting implementation — implementation: 'Practical cohort forecasting implementation: building the cohort model in practice: Step 1 — Define cohort dimensions: time-based: month of acquisition (most common). Channel-based: how they were acquired (organic, paid, enterprise). Plan-based: which pricing plan they chose. Size-based: company size (SMB, mid-market, enterprise). Geography-based: region or country. Start with time-based cohorts, then overlay one additional dimension (channel or plan). Step 2 — Calculate retention curves for each cohort type: track what percentage of each cohort remains active at month 1, 2, 3, 6, 12. Plot these as retention curves. Identify the shape: fast initial drop then stabilization (typical for consumer/SMB). Gradual steady decline (typical for mid-market). Very low churn with possible expansion (typical for enterprise). Step 3 — Incorporate expansion and contraction: net dollar retention by cohort: organic customers: 98% NDR (slight net churn). Paid-ad customers: 88% NDR (significant net churn). Enterprise customers: 115% NDR (net expansion — they grow over time). Step 4 — Layer cohorts to build the forecast: in a spreadsheet, create a row for each monthly cohort. Each column represents a future month. Cell value = cohort starting MRR × retention rate at that age × expansion factor. Sum each column to get total MRR for that month. Common pitfalls in cohort forecasting: 1. Using too few cohorts: at least 6-12 monthly cohorts are needed to establish reliable retention curves. 2. Ignoring cohort quality changes: paid-ad cohorts may get worse over time as you exhaust the best audiences. Enterprise cohorts may get better as the sales team improves qualification. 3. Not updating retention curves: recalculate quarterly as behavior evolves. 4. Forgetting to model acquisition volume changes: more marketing spend changes both the volume and quality of new cohorts. Advanced cohort insight — the payback period: Cohort B (paid ads): CAC $60, monthly revenue $60, but 10% monthly churn. Payback period: need to earn back $60 CAC before the customer churns. At 10% monthly churn, average lifetime = 10 months. LTV = 10 × $60 = $600. LTV/CAC ratio = 10x (appears great). But the median customer churns in month 7 — so the MEDIAN customer generates $420 (payback in month 1). Cohort C (enterprise): CAC $2,000, monthly revenue $250, 1.7% monthly churn. LTV = 59 months × $250 = $14,750. LTV/CAC ratio = 7.4x (lower ratio but much higher absolute LTV). The enterprise channel has a higher absolute return despite a lower ratio — this is critical for forecasting because the absolute revenue contribution drives the total forecast number'"
    weight: 0.30
    description: "Implementation"
