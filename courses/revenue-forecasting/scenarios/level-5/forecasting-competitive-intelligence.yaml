meta:
  id: forecasting-competitive-intelligence
  level: 5
  course: revenue-forecasting
  type: output
  description: "Forecasting competitive intelligence — use revenue forecasting methodologies to analyze and predict competitor revenue, market dynamics, and industry trends"
  tags: [competitive-intelligence, competitor-analysis, market-dynamics, prediction, master]

state: {}

trigger: |
  A chief strategy officer says: "We need to forecast our competitors'
  revenue trajectories to inform our strategy. We're in a 4-player
  market:

  Us: $200M ARR, 25% growth, NRR 112%, private.
  Competitor A: $350M ARR, 18% growth, public (quarterly filings).
  Competitor B: $80M ARR, 45% growth, recently raised Series D ($150M).
  Competitor C: $120M ARR, 30% growth, PE-backed.

  I need to forecast each competitor's trajectory, predict when
  Competitor B will overtake us, and identify strategic windows
  where we can gain market share. Build competitive revenue forecasts."

  Task: Build competitive revenue forecasts for all players, identify
  market dynamics and tipping points, and recommend strategic timing.

assertions:
  - type: llm_judge
    criteria: "Response builds competitive revenue forecasts using available data — forecasts: 'Competitive revenue forecasting: data sources for competitive intelligence: Competitor A (public): 10-K and 10-Q filings (quarterly revenue, ARR, customer count, NRR — disclosed). Earnings call transcripts (management commentary, guidance). Analyst reports (Wall Street estimates, channel checks). Job postings (hiring pace = growth investment signal). Competitor B (VC-backed): press releases (funding announcements often include revenue milestones). LinkedIn headcount growth (correlates with revenue growth). G2/Gartner reviews volume (customer adoption signal). Technology job postings (engineering investment direction). Industry sources (conferences, former employees, shared customers). Competitor C (PE-backed): limited public data. PE firm marketing materials may mention portfolio performance. Industry events and press coverage. Channel partner intelligence. Building the competitive forecasts: Competitor A forecast ($350M ARR, 18% growth, public): year 1: $350M × 1.18 = $413M. Year 2: $413M × 1.15 (growth deceleration — large base, public company caution) = $475M. Year 3: $475M × 1.12 = $532M. Confidence: high (public data, analyst consensus). Key signals to monitor: quarterly earnings (verify growth rate). NRR disclosure (if declining, growth slows faster). Product launches (could accelerate or decelerate). Competitor B forecast ($80M ARR, 45% growth, Series D): year 1: $80M × 1.45 = $116M. Year 2: $116M × 1.38 (deceleration as base grows) = $160M. Year 3: $160M × 1.30 = $208M. Confidence: moderate (estimated from indirect signals). Key assumptions: $150M raise provides 24+ months of runway at current burn. Growth rate decelerates 5-7pp per year (typical for scaling SaaS). No IPO or acquisition in forecast period. The $150M raise signals: the company plans to invest aggressively in growth. They likely have 60-80% of the raise allocated to sales and marketing. Hiring should accelerate 40-60% over next 12 months. Competitor C forecast ($120M ARR, 30% growth, PE-backed): year 1: $120M × 1.30 = $156M. Year 2: $156M × 1.25 (PE firms often push for efficiency after initial growth) = $195M. Year 3: $195M × 1.20 = $234M. Confidence: low-moderate (limited data, PE strategy uncertain). PE-backed companies may prioritize margin over growth (affecting the trajectory). If PE pushes for exit in 2 years, growth may accelerate short-term. Our forecast ($200M ARR, 25% growth): year 1: $200M × 1.25 = $250M. Year 2: $250M × 1.23 = $307.5M. Year 3: $307.5M × 1.20 = $369M. Market landscape in 3 years: player | current ARR | year 3 ARR | market position. Competitor A: $350M | $532M | market leader (maintains). Us: $200M | $369M | strong #2 (closing gap). Competitor C: $120M | $234M | solid #3. Competitor B: $80M | $208M | fast-growing #4 (approaching #3). Total market: $750M | $1,343M | 79% CAGR (market expanding)'"
    weight: 0.35
    description: "Forecasts"
  - type: llm_judge
    criteria: "Response identifies strategic tipping points and market dynamics — dynamics: 'Strategic tipping points and market dynamics: tipping point 1 — when does Competitor B overtake us? At current trajectories: Competitor B: $80M growing 45% (decelerating 5-7pp/year). Us: $200M growing 25% (decelerating 2-3pp/year). Crossover calculation: Competitor B overtakes us when their ARR exceeds ours. Year 1: B = $116M, us = $250M (gap: $134M). Year 2: B = $160M, us = $307M (gap: $147M — gap WIDENING). Year 3: B = $208M, us = $369M (gap: $161M — gap still widening). Year 5: B = $340M, us = $510M (gap: $170M). At these growth rates, Competitor B NEVER catches us because our absolute growth exceeds theirs despite a lower percentage. $250M × 25% = $62.5M absolute growth vs $116M × 38% = $44M. However — scenario where B catches us: if Competitor B maintains 40%+ growth (no deceleration — unusual but possible with $150M war chest). And our growth decelerates to 15% (competitive pressure, market saturation). Year 3: B = $220M, us = $305M (gap: $85M — closing). Year 5: B = $430M, us = $400M — B overtakes us. The crossover point under this scenario: approximately 4.5 years from now. Strategic implication: we have a 3-4 year window of ARR leadership over B. This window is the time to build durable advantages (enterprise relationships, platform lock-in, ecosystem) that B cannot easily replicate even if they reach similar ARR. Tipping point 2 — when do we threaten Competitor A? Our trajectory vs A: year 3: us = $369M vs A = $532M (we are 69% of A). Year 5: us = $510M vs A = $660M (we are 77% of A). If A's growth continues to decelerate and ours maintains: crossover is approximately year 7-8. However — we can accelerate the crossover: if we grow 30% and A grows 15% (competitive displacement): year 4: us = $480M vs A = $612M (78%). Year 5: us = $624M vs A = $704M (89%). Year 6: us = $780M vs A = $788M (99% — virtual parity). Accelerating to parity requires gaining 5pp of growth rate — possible through market share capture, new products, or M&A. Market share dynamics: total addressable market (estimated): $5B. Current market penetration: combined $750M ÷ $5B = 15%. By year 3: $1,343M ÷ $5B (or $6B if market grows) = 22-27%. The market is still early — 75% unpenetrated. Strategic implication: the competitive battle is not zero-sum. Most growth comes from converting non-customers, not stealing from competitors. However, in the enterprise segment (top 2,000 potential accounts), it IS zero-sum — if A gets them first, switching costs prevent us from winning them later. Strategic windows identified: window 1 (now to month 6) — enterprise land grab: Competitor B is not yet enterprise-ready ($80M ARR, limited enterprise features). Competitor A is growing slowly (18%). We should invest heavily in enterprise sales to lock in accounts before B scales up. Window 2 (months 6-18) — product differentiation: Competitor B will invest their $150M in catching up on product. We need to build differentiated features that B cannot replicate quickly (AI, platform, ecosystem). Window 3 (months 18-36) — potential M&A: if Competitor C underperforms PE expectations (PE firms sell underperformers), we could acquire them. $234M ARR target would leapfrog us past A ($369M + $234M = $603M vs A's $532M). M&A timing window: likely months 24-36 (PE hold periods typically 4-6 years)'"
    weight: 0.35
    description: "Dynamics"
  - type: llm_judge
    criteria: "Response covers competitive strategy recommendations driven by forecasts — strategy: 'Competitive strategy recommendations driven by forecasts: strategy 1 — accelerate enterprise before B arrives: the forecast shows we have 18-24 months before Competitor B has enterprise credibility. Action plan: invest $15M in enterprise sales (20 additional enterprise AEs). Target the top 500 enterprise accounts not yet committed to any vendor. Lock in 3-year contracts with favorable terms (cost today, value tomorrow). Expected revenue impact: $30-40M additional enterprise ARR within 24 months. Competitive moat created: enterprise switching costs are 18-24 months. Once locked in, these accounts are protected even when B arrives. Forecast-driven timing: if B's hiring data shows enterprise sales reps being posted, accelerate this strategy by 3-6 months. Strategy 2 — invest in platform and ecosystem: build integrations, APIs, and partner ecosystem that create switching costs. Forecast implication: our platform play increases NRR from 112% to 120%+ as customers build workflows on our platform. Revenue impact: $200M × 8% NRR increase = $16M additional annual revenue compounding. This widens the gap with B permanently — even if they match our features, they cannot match our ecosystem overnight. Strategy 3 — prepare for M&A opportunity with Competitor C: the forecast suggests C will reach $195-234M ARR by year 2-3. If PE expectations were $250M+ by that point, C may underperform. This creates an acquisition window. Preparation: build a detailed model of C's customer base overlap and synergy potential. Identify C's key accounts and begin relationship building. Model the combined entity revenue (our $300-370M + their $195-234M). Timing: be ready to approach when PE signals willingness to exit (watch for advisor mandates, management changes). Strategy 4 — intelligence monitoring system: build a competitive dashboard that tracks monthly: metric | Competitor A | Competitor B | Competitor C. Job postings: 150/month | 80/month (rising) | 45/month. G2 reviews: 500 (stable) | 200 (growing fast) | 150 (stable). Website traffic: 2M/month | 800K (growing) | 400K (stable). LinkedIn followers: 50K | 20K (growing) | 12K (stable). News mentions: 30/month | 25/month | 5/month. Estimated quarterly revenue: from public data or model | from model | from model. Set alerts for: Competitor B job postings increase >50% (signal: accelerating investment). Competitor A growth decelerates below 15% (signal: vulnerability). Competitor C leadership changes (signal: PE exit preparation). Any competitor acquires a complementary company (signal: strategic shift). Presenting competitive forecasts to the board: section 1: market landscape — we are #2 in a $5B market that is 85% unpenetrated. Section 2: competitive trajectories — A leads but decelerating, B growing fast but 2.5x smaller, C solid but PE timeline creates uncertainty. Section 3: strategic windows — 3 time-bound opportunities identified with specific actions. Section 4: investment request — $15M enterprise acceleration + $5M platform investment + M&A readiness. Expected return: $50-60M additional ARR within 3 years, plus strategic positioning that is worth $200M+ in enterprise value. The key insight: competitive revenue forecasting transforms strategy from reactive (respond to what competitors do) to proactive (act before competitors reach critical mass). Our forecasting advantage means we can predict competitive dynamics 12-18 months ahead and position accordingly'"
    weight: 0.30
    description: "Strategy"
