meta:
  id: investor-grade-forecasting
  level: 5
  course: revenue-forecasting
  type: output
  description: "Investor-grade forecasting — build forecasts that satisfy PE/VC due diligence, support valuations, and withstand analyst scrutiny during fundraising and IPO"
  tags: [investor, due-diligence, valuation, ipo, fundraising, master]

state: {}

trigger: |
  A PE firm's operating partner says: "We're evaluating a $400M ARR
  SaaS company for acquisition at 12x ARR ($4.8B). Their management
  projects $600M ARR in 3 years (50% growth). We need to independently
  validate their forecast and build our own. If their forecast is
  off by 20%, we'd overpay by $960M.

  Company data: $400M ARR, 30,000 customers, NRR 118%, GRR 92%,
  LTV/CAC 5.2x, 60% gross margin, growing 35% YoY. 4 product lines.

  Build an investor-grade independent forecast and identify the key
  assumptions that drive valuation risk."

  Task: Build an independent PE-grade revenue forecast, identify
  assumption risks, and show how forecast uncertainty affects the
  acquisition valuation.

assertions:
  - type: llm_judge
    criteria: "Response builds an independent investor-grade forecast — forecast: 'Independent investor-grade revenue forecast: step 1 — decompose management's $600M projection: management claims 50% growth over 3 years ($400M → $600M). Implied CAGR: 14.5% annually. This is a deceleration from current 35% YoY — but is the deceleration realistic? Decomposition of their forecast: existing customer base: $400M × NRR (118%) = $472M year-end ARR from existing customers alone. But NRR typically decelerates as the customer base matures: year 1 NRR: 116% (slight decline from 118%). Year 2 NRR: 113%. Year 3 NRR: 110%. Existing customer contribution by year 3: $400M × 1.16 × 1.13 × 1.10 = $576M. This means existing customers alone could nearly reach $600M — almost no new business required. Red flag: if management is projecting $600M, they may be underestimating existing customer growth OR overestimating new business while missing NRR deceleration. Step 2 — build the independent bottom-up forecast: customer base model: starting customers: 30,000. Annual new customers: historical = 8,000/year. Projected (with deceleration): year 1: 7,500. Year 2: 7,000. Year 3: 6,500. Annual logo churn: 8% (GRR 92% ÷ weighted). Year 1: 30,000 - 2,400 + 7,500 = 35,100. Year 2: 35,100 - 2,808 + 7,000 = 39,292. Year 3: 39,292 - 3,143 + 6,500 = 42,649. Revenue model: existing customer revenue (NRR-driven): year 1: $400M × 1.16 = $464M. Year 2: $464M × 1.13 = $524M. Year 3: $524M × 1.10 = $577M. New customer revenue (incremental): year 1: 7,500 × $13.3K avg ACV × 0.5 (half-year recognition) = $50M. Year 2: 7,000 × $13.3K × 0.5 = $46.6M + full-year of prior new = $46.6M + $50M carry = $96.6M. Year 3: similar layering. Independent year-end ARR estimates: year 1: $464M + $100M new ARR = $564M (35% growth). Year 2: $524M + incremental = $618M (9.6% sequential). Year 3: $577M + incremental = $660M (6.8% sequential). Independent 3-year ARR: $660M. Management's 3-year ARR: $600M. The independent forecast is HIGHER than management's — suggesting management may be sandbagging or has assumed more aggressive deceleration. However, this assumes NRR holds above 110%, which is the critical assumption'"
    weight: 0.35
    description: "Forecast"
  - type: llm_judge
    criteria: "Response identifies key assumption risks that drive valuation — risks: 'Key assumption risks driving valuation: assumption risk matrix: assumption | management value | our estimate | bull case | bear case | valuation sensitivity. NRR: 118% stable | 118% → 110% | 120% stable | 105% by yr 3 | ±$300M ARR by yr 3 (±$3.6B valuation). GRR: 92% stable | 92% → 90% | 93% | 87% | ±$200M ARR (±$2.4B). New customer growth: 8K/yr | 7.5K → 6.5K | 8.5K/yr | 5K/yr | ±$150M ARR (±$1.8B). ACV: $13.3K stable | $13.3K → $14.5K | $15K | $12K | ±$100M ARR (±$1.2B). Competitive pressure: none modeled | moderate | minimal | severe | ±$250M ARR (±$3.0B). Deep dive on the three highest-risk assumptions: Risk 1 — NRR deceleration (highest impact): NRR at 118% is excellent but rare for a $400M ARR company. Industry benchmarks: $100M ARR: median NRR 112-115%. $200-500M ARR: median NRR 108-112%. $500M+: median NRR 105-110%. The company's 118% NRR at $400M ARR is top-decile. Maintaining it requires: continuous product innovation driving expansion. Customers growing their usage consistently. Limited competitive alternatives for key features. Due diligence questions: what percentage of NRR comes from price increases vs usage growth vs seat expansion? Are the top 10 expansion accounts responsible for a disproportionate share? Has NRR been stable for 8+ quarters or is it trending? Forecast sensitivity: year 3 ARR if NRR = 118%: $720M. Year 3 ARR if NRR = 110%: $577M. Year 3 ARR if NRR = 105%: $510M. Difference at 12x multiple: ($720M - $510M) × 12 = $2.5B in valuation swing. Risk 2 — Gross retention (GRR) in a competitive market: GRR at 92% means 8% of revenue is lost to churn and contraction annually. If a well-funded competitor emerges: GRR could drop to 87% (5pp decline). Impact: $400M × 5% = $20M additional annual churn, compounding. Year 3 impact: approximately $80M lower ARR. Due diligence: analyze churn by customer segment, tenure, and product line. Are there customer concentration risks (top 10 customers as % of revenue)? What is the competitive landscape and are barriers to switching high? Risk 3 — New business trajectory: at $400M ARR, the company is acquiring 8,000 customers/year. This requires significant sales and marketing investment. CAC payback at LTV/CAC 5.2x is healthy, but: is CAC increasing as the market matures? Are new cohort quality declining (lower NRR in recent cohorts)? Is the addressable market being exhausted? Due diligence: cohort analysis — compare NRR and GRR of year-1 cohorts vs year-3 cohorts. If recent cohorts have lower retention, the aggregate NRR will decline as older, higher-retention cohorts churn out'"
    weight: 0.35
    description: "Risks"
  - type: llm_judge
    criteria: "Response connects forecast uncertainty to valuation and deal structure — valuation: 'Connecting forecast to valuation: valuation scenario matrix: scenario | year 3 ARR | multiple | enterprise value | vs asking price ($4.8B). Bear case (NRR 105%, GRR 87%): $510M | 10x | $5.1B | +6% (slight overpay risk). Base case (NRR 110%, GRR 90%): $600M | 12x | $7.2B | +50% (significant value creation). Bull case (NRR 118%, GRR 92%): $720M | 14x | $10.1B | +110% (exceptional return). Key insight: the $4.8B asking price at 12x current ARR prices in ZERO growth. If any of the scenarios above play out, the acquisition creates value. However, the bear case still produces 6% upside — meaning the downside protection is reasonable. The valuation risk is not in the purchase price — it is in the MULTIPLE compression risk: if growth slows AND the market compresses multiples from 12x to 8x: bear case at 8x: $510M × 8 = $4.08B (15% loss). This is the real risk — the intersection of revenue underperformance and multiple compression. Deal structure recommendations based on forecast uncertainty: recommendation 1 — earnout on year 2 performance: pay $4.0B upfront (10x current ARR). $800M earnout tied to achieving $550M ARR by year 2. If year 2 ARR < $480M: no earnout. If $480-550M: pro-rata earnout. If > $550M: full earnout + bonus. This protects against overpayment if NRR decelerates faster than expected. Recommendation 2 — management retention tied to forecast: key management (CRO, CPO, CTO) compensation tied to revenue targets. Vesting schedule aligned with the 3-year forecast: year 1 target: $490M ARR (35% growth). Year 2 target: $570M ARR (16% growth). Year 3 target: $640M ARR (12% growth). If management hits targets, they earn full retention packages. This aligns incentives and surfaces any sandbagging in the management forecast. Recommendation 3 — covenant-based financing: if using leverage to fund the acquisition, set debt covenants at the bear case forecast. Revenue covenant: $510M ARR by year 3. EBITDA margin covenant: 20% by year 2. This ensures the business can service debt even in the downside scenario. Investment committee presentation: the one-slide recommendation. Asking price: $4.8B (12x current ARR). Our independent valuation: $5.1B - $10.1B (bear-bull range). Base case IRR: 22% over 5 years. Key forecast risk: NRR deceleration (±$2.5B valuation swing). Recommendation: proceed at $4.0B + $800M earnout structure. The independent forecast work is what transforms this from a spreadsheet exercise into a $4.8B investment decision with quantified risk'"
    weight: 0.30
    description: "Valuation"
