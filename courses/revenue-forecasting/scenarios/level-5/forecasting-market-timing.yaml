meta:
  id: forecasting-market-timing
  level: 5
  course: revenue-forecasting
  type: output
  description: "Forecasting market timing — use revenue forecasting to time strategic moves including product launches, market entries, pricing changes, and investment cycles for maximum impact"
  tags: [market-timing, strategic-timing, product-launch, market-entry, investment, master]

state: {}

trigger: |
  A CEO asks: "We have three major strategic moves planned for the next
  18 months, and the timing of each one could make or break our year:

  1. New enterprise product launch — ready anytime in Q2 or Q3. Our
     ARR is $400M, growing 28%. The enterprise product targets $50M
     ARR in its first year.
  2. APAC market expansion — Japan and Australia. Current APAC revenue
     is $20M (5% of total). Target: $60M within 24 months.
  3. Price increase — 15% across mid-market tier (40% of ARR = $160M).
     Last increase was 3 years ago.

  Each move interacts with the others — launching all three at once could
  overwhelm the organization. But delaying any one costs opportunity.

  Use revenue forecasting to determine the optimal timing and sequencing
  of these three moves. When should we do what, and why?"

  Task: Build a forecast-driven strategic timing analysis that determines
  the optimal sequencing and timing of the three strategic moves, including
  interaction effects and risk scenarios.

assertions:
  - type: llm_judge
    criteria: "Response analyzes each strategic move with revenue forecasting — moves: 'Forecast-driven strategic timing analysis: analyzing each move independently: Move 1 — enterprise product launch timing: Q2 launch scenario: months available in year: 9 months of selling (April-December). Typical enterprise sales cycle: 6-9 months. First closed deals: Q4 (month 7-9 after launch). Year 1 recognized ARR: $5-10M (most deals close late, partial year recognition). Pipeline build required: $150M pipeline for $50M target (3x coverage at enterprise close rates of 20-25%). Positive factors: Q2 aligns with customer budget planning for next fiscal year. More time for pipeline building before year-end budget flush. Q3 launch scenario: months available: 6 months of selling (July-December). First closed deals: Q1 next year (majority). Year 1 recognized ARR: $2-5M (even fewer in-year closes). Pipeline reality: only 6 months to build $150M pipeline — very aggressive. Positive factors: more engineering polish time. Can learn from Q2 competitive launches. Recommendation: launch in Q2 — the 3-month head start translates to roughly 2x more year-1 revenue. Enterprise sales cycles are long; every month of delay costs disproportionately. Specific timing: early April (after Q1 earnings if public, after customer fiscal year budgets are set). Move 2 — APAC expansion timing: market entry cost structure: Japan: office setup, 3-6 months for entity establishment. Hiring: 15-20 people (sales, SE, CS, ops). Annual run-rate cost: $4-6M. Time to first deal: 6-9 months (relationship-heavy market). Australia: simpler entity setup (2-3 months, English-speaking). Hiring: 8-12 people. Annual run-rate cost: $2-3M. Time to first deal: 3-6 months (more transactional). Revenue trajectory modeling: sequential entry (Japan first, then Australia 6 months later): month 0-6: Japan setup, $0 revenue, -$3M investment. Month 6-12: Japan first deals ($2-3M ARR), Australia setup begins, -$5M cumulative. Month 12-18: Japan ramping ($8-12M), Australia first deals ($3-5M), -$4M cumulative. Month 18-24: Japan ($18-25M), Australia ($10-15M), breakeven. Year 2 total APAC: $28-40M ARR. Parallel entry (both simultaneously): faster to $60M target but higher upfront cash burn. More management bandwidth required. Higher execution risk (splitting focus). Recommendation: start Australia in Q1 (simpler, faster revenue), Japan in Q2 (coincide with enterprise launch for organizational energy). Stagger by one quarter to avoid overwhelming the organization. Move 3 — price increase timing: revenue impact modeling: affected base: $160M ARR (mid-market tier). 15% increase: potential $24M ARR uplift. But — churn risk: price-sensitive customers may leave. Historical analysis of peer companies: 5-10% of affected customers churn within 6 months of increase. At 7.5% churn: $12M ARR lost. Net impact: $24M - $12M = $12M net ARR gain. Timing considerations: do NOT time the price increase with the enterprise launch — customers should not see the company as simultaneously launching premium products AND raising prices on existing ones. Optimal timing: Q3 or Q4 (after enterprise launch is established and generating positive press). Grandfather existing contracts through their renewal date — the increase affects renewals and new business only. At average 12-month contract length, full impact takes 12 months to roll through. Revenue recognition: Q3 announcement → Q4 first renewals at new price → full run-rate by Q3 next year. Month 1-3 impact: minimal ($2-3M from quarterly renewals). Month 4-6: $6-8M. Month 7-12: $12-18M. Full year 2 impact: $22-24M (before churn offset)'"
    weight: 0.35
    description: "Moves"
  - type: llm_judge
    criteria: "Response addresses interaction effects and optimal sequencing — sequencing: 'Interaction effects and optimal sequencing: interaction matrix — how the moves affect each other: enterprise launch × APAC expansion: positive synergy — enterprise product can be launched in APAC markets simultaneously, giving the expansion team a new product to sell. Negative interaction — both compete for executive attention and enablement resources. Net: moderate positive if sequenced 1 quarter apart. Enterprise launch × price increase: negative interaction — launching a premium product while raising prices sends a message of greed rather than value. Customers may perceive the company as extracting maximum revenue. Net: should be separated by at least 2 quarters. APAC expansion × price increase: mixed — new APAC customers get the new pricing naturally (no increase perception). Existing APAC customers ($20M) face the increase. Net: neutral if APAC expansion leads the price increase. Three-way interaction: all three simultaneously would overwhelm: sales enablement (learning new product + new markets + defending price increases). Customer success (onboarding enterprise customers + supporting APAC + managing price increase churn). Marketing (launching product + market entry + price increase communications). Optimal sequencing — the master timeline: Q1: begin Australia expansion (low complexity, fast revenue). Prepare enterprise product launch materials and beta program. Q2 (April): launch enterprise product globally (including new APAC markets). Begin Japan market entry process. Reason: Q2 gives maximum selling time. APAC expansion benefits from a new product to offer. Q3 (July): announce price increase effective for renewals starting Q4. Reason: 2 quarters after enterprise launch — the new product justifies the mid-market price increase (halo effect: the company is clearly investing in product). Enterprise product is now established, reducing the greed perception. Q4: first renewals at new pricing. Japan generating first pipeline. Enterprise product first major deals closing. Year 2: all three initiatives at full run-rate. Revenue forecast by quarter with optimal sequencing: quarter | organic | enterprise | APAC | price increase | total. Q1: $103M | $0 | $0.5M (Aus setup) | $0 | $103.5M. Q2: $106M | $1M (pipeline) | $2M | $0 | $109M. Q3: $109M | $4M | $5M | $1M | $119M. Q4: $112M | $8M | $8M | $3M | $131M. Year total: $430M | $13M | $15.5M | $4M | $462.5M. Compared to doing nothing (organic only): $430M. Strategic moves add: $32.5M in year 1, accelerating to $80-100M in year 2. Versus launching all three in Q1 simultaneously: higher risk of execution failure. Likely 20-30% lower total impact due to organizational overwhelm. Customer perception risk (price increase + new product = negative). The staggered approach sacrifices $5-8M in theoretical year-1 revenue for significantly higher probability of success and better year-2 trajectory'"
    weight: 0.35
    description: "Sequencing"
  - type: llm_judge
    criteria: "Response covers risk scenarios and decision triggers — risks: 'Risk scenarios and decision triggers: scenario analysis — what could go wrong: scenario A — enterprise product launch underperforms: signals: pipeline build <$50M by end of Q2 (need $150M by year-end). Win rate below 15% in first 10 competitive deals. Customer feedback indicates product-market fit issues. Impact on sequencing: if enterprise product struggles, delay price increase further (cannot raise prices while flagship product disappoints). Redirect some APAC investment to fix enterprise product. Decision trigger: if Q2 pipeline is below $30M, pause APAC Japan entry and reallocate resources to enterprise product-market fit. Scenario B — APAC expansion costs exceed projections: signals: entity setup takes >6 months (regulatory or legal complications). First 3 hires in Japan all fail (cultural or market fit). Customer acquisition cost in APAC is 3x domestic. Impact on sequencing: APAC delays do not affect enterprise or pricing timelines. Can slow APAC burn rate without impacting other initiatives. Decision trigger: if Australia has not closed 5 deals by month 6, reassess the APAC thesis. Consider channel partnerships instead of direct presence. Scenario C — price increase triggers higher-than-expected churn: signals: first month of renewals at new price shows >15% churn (vs expected 7.5%). Competitive win rates drop (competitors use our price increase against us). Social media or review site backlash. Impact on sequencing: could erode base revenue that funds the other two initiatives. If $160M base shrinks by 15% = $24M lost, fully offsetting the increase. Decision trigger: if first 60 days of renewals show >12% churn, pause the increase for remaining renewals and reassess value justification. Scenario D — macro downturn during execution: signals: market-wide SaaS growth decelerating. Customer budget freezes reported by sales team. Competitors cutting prices. Impact: all three initiatives become harder simultaneously. Enterprise deals lengthen. APAC appetite decreases. Price increase becomes untenable. Decision trigger: if organic growth drops below 20% (from 28%), shift to defensive mode — protect base revenue, delay price increase indefinitely, slow APAC investment. Continue enterprise launch but with revised $25M target. Building the forecast monitoring dashboard: create a weekly dashboard tracking: metric | target | actual | status. Enterprise pipeline: $150M by year-end | current | green/yellow/red. Enterprise win rate: >20% | current | status. APAC customer count: 5 by month 6, 20 by month 12 | current | status. APAC CAC ratio: <3x domestic | current | status. Price increase churn: <10% of renewals | current | status. Net revenue impact of increase: >$12M net | current | status. Organic growth rate: >25% | current | status. Overall forecast accuracy: MAPE <6% | current | status. Board communication framework: present the three moves as a portfolio of strategic bets. Each bet has: expected value (revenue impact), cost (investment required), probability of success, and correlation with other bets. The staggered timing reduces portfolio risk — if one initiative fails, the others are not contaminated. The decision triggers provide a pre-agreed framework for course correction — the board does not need to debate whether to pivot, only whether the trigger conditions have been met. This transforms the board conversation from opinions about timing to data-driven monitoring of pre-agreed metrics'"
    weight: 0.30
    description: "Risks"
