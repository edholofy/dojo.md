meta:
  id: master-revenue-shift
  level: 5
  course: revenue-forecasting
  type: output
  description: "Master revenue forecasting shift — the ultimate assessment combining investor-grade forecasting, organizational transformation, competitive intelligence, ethical governance, and board-level strategic communication"
  tags: [shift, combined, assessment, comprehensive, master]

state: {}

trigger: |
  You are the Chief Revenue Officer of a $2B ARR enterprise software
  company that just announced it will IPO in 12 months. The situation:

  Revenue: $2B ARR across 6 product lines, 4 geographies, 100,000
  customers. NRR: 115%. GRR: 91%. Growing 22% YoY.

  Challenges: (1) A $500M acquisition is closing in 60 days — must
  integrate into the forecast. (2) Three activist investors are
  pressuring for higher profitability — wants growth to slow from
  22% to 15% while expanding margins from 10% to 20%. (3) The
  biggest competitor just went public at 15x ARR — our target is 12x
  ($24B). (4) Internal forecasting accuracy is 8% MAPE — needs to be
  <4% for IPO credibility. (5) Two board members disagree on growth
  vs profitability strategy.

  Deliver the comprehensive revenue strategy covering: the IPO-ready
  forecast, acquisition integration, activist investor response,
  competitive positioning, and the board's strategic choice.

  Task: Build the complete revenue strategy addressing all five
  challenges simultaneously — this is the ultimate test of revenue
  forecasting mastery.

assertions:
  - type: llm_judge
    criteria: "Response addresses the IPO forecast and acquisition integration — ipo: 'IPO-ready revenue forecast with acquisition integration: building the 12-month IPO forecast: Layer 1 — Organic existing business: starting ARR: $2.0B. NRR: 115% (expansion exceeds churn). Monthly NRR: (1.15)^(1/12) = 1.0117 (1.17%/month). Year-end organic ARR: $2.0B × 1.15 = $2.3B. Annual recognized revenue: approximately $2.15B (average of start and end ARR). By geography: Americas ($1.2B ARR): NRR 117%, year-end $1.404B. EMEA ($0.5B): NRR 113%, year-end $0.565B. APAC ($0.2B): NRR 118%, year-end $0.236B. Other ($0.1B): NRR 108%, year-end $0.108B. Total organic: $2.313B. Layer 2 — Organic new business: historical: $440M/year in new ARR (22% growth on $2B). Assumptions: sales capacity supports $400-480M depending on hiring ramp. Base case: $420M new ARR. Revenue recognized: approximately $210M (half-year average). Layer 3 — Acquisition integration ($500M ARR target): target's standalone trajectory: $500M growing 18% = $590M year-end. Integration synergies: cross-sell: 15% of target's customers adopt our products = $22.5M ARR. Reverse cross-sell: 5% of our customers adopt target's products = $50M ARR. Combined: $72.5M synergy ARR by year-end. Integration risks: customer churn during integration: 5% of target customers = $25M ARR at risk. Deal slippage during sales integration: 10% of target's new business = $10.6M. Net integration impact: $72.5M synergies - $35.6M risks = $36.9M net positive. Post-acquisition year-end ARR: target standalone: $590M + $36.9M = $626.9M. Consolidated IPO forecast: organic existing: $2.313B. Organic new business: $420M ARR ($210M recognized). Acquisition: $626.9M year-end ARR ($563M recognized — partial year). Total year-end ARR: $3.36B. Total annual recognized revenue: approximately $2.92B. Growth rate: 46% (including acquisition). Organic growth: 22% (excluding acquisition). Addressing the 8% → <4% MAPE requirement: the 8% MAPE current state is unacceptable for IPO. 8% MAPE on $2.92B = $234M forecast uncertainty. At 12x multiple, this is $2.8B in valuation uncertainty. 90-day MAPE improvement plan: week 1-4: standardize definitions and calibrate pipeline probabilities across all 6 product lines. Quick win target: 8% → 6% MAPE. Week 5-8: deploy ML ensemble model (XGBoost + Holt-Winters) on existing data. Target: 6% → 5% MAPE. Week 9-12: integrate acquisition data, add real-time monitoring. Target: 5% → 4% MAPE. Ongoing: monthly retraining, weekly accuracy tracking. Month 6 target: 3.5% MAPE (IPO-ready). IPO guidance framework: do not guide to the exact forecast. Guide to P25-P75 of Monte Carlo simulation. Annual revenue guidance: $2.8B - $3.1B. This is wide enough to hit (93% probability) but narrow enough to signal confidence. Quarter-by-quarter breakout in the prospectus to show the ramp'"
    weight: 0.35
    description: "IPO"
  - type: llm_judge
    criteria: "Response addresses the activist investor response and growth vs profitability debate — activist: 'Activist investor response and growth vs profitability: the activist demand analyzed: activists want: growth to slow from 22% to 15%. Margins to expand from 10% to 20%. This implies: revenue sacrifice: at 15% growth, year-end ARR = $2.3B (vs $2.44B at 22%). Revenue difference: $140M ARR = $1.68B at 12x. Margin improvement: 10% → 20% margin on $2.9B = $290M EBITDA (vs $290M revenue sacrifice at lower growth). The NPV of the activist strategy vs growth strategy: strategy | year 1 ARR | year 3 ARR | margin | EBITDA yr 3 | valuation (EV/ARR or EV/EBITDA). Growth (22%): $2.44B | $3.63B | 10% | $363M | $43.6B at 12x. Balanced (18%): $2.36B | $3.28B | 15% | $492M | $39.4B at 12x or $12.3B at 25x EBITDA. Profit (15%): $2.30B | $3.04B | 20% | $608M | $36.5B at 12x or $15.2B at 25x EBITDA. Insight: the activist strategy optimizes for EBITDA multiples, not revenue multiples. At 25x EBITDA (typical for profitable software), the profit strategy produces $15.2B valuation. At 12x ARR (typical for high-growth SaaS), the growth strategy produces $43.6B. The correct strategy depends on WHICH MULTIPLE THE MARKET WILL APPLY. If the market values growth (12x+ ARR): stay on the growth path. If the market shifts to profit (25x+ EBITDA): the activist path creates more value. The resolution — a forecast-driven compromise: Option C — Balanced growth (18% growth, 15% margin): achieves $3.28B ARR by year 3 AND $492M EBITDA. Valued at 12x ARR: $39.4B. Valued at 25x EBITDA: $12.3B. The market will likely use a blended multiple: approximately $30-35B range. This positions the company for EITHER market environment. Present to the board: the balanced strategy is the risk-minimizing approach. It does not bet entirely on growth multiples (which can compress in downturns). It does not sacrifice growth entirely (which would reduce ARR-based valuation). It provides the board maximum optionality. Activist response: dear activist investors: we share your commitment to shareholder value. We are implementing a balanced strategy that achieves 18% organic growth AND 15% operating margins. This positions the company for strong valuation under both growth and profitability frameworks. Our revenue forecast shows $3.28B ARR by year 3 with 15% margins — delivering both growth and profitability. We welcome constructive dialogue on specific operational improvements that can enhance margins without sacrificing the growth that drives our core valuation'"
    weight: 0.35
    description: "Activist"
  - type: llm_judge
    criteria: "Response addresses competitive positioning and the board's strategic choice — competitive: 'Competitive positioning and the board's strategic choice: competitive IPO positioning: our competitor traded at 15x ARR at their IPO. Their metrics at IPO: $1.5B ARR, 28% growth, NRR 120%, GRR 93%. Our metrics at IPO: $3.36B ARR (with acquisition), 22% organic / 46% reported, NRR 115%, GRR 91%. Comparative analysis for bankers and analysts: metric | competitor at IPO | us at IPO | advantage. ARR: $1.5B | $3.36B | us (2.2x larger). Growth: 28% | 22% organic | competitor (faster). NRR: 120% | 115% | competitor (higher). GRR: 93% | 91% | competitor (slightly higher). Scale: mid-market leader | market leader | us (broader base). Valuation argument: competitor at 15x: $22.5B. Our target of 12x on $3.36B: $40.3B. Despite lower growth rate, our larger scale and market leadership justify a premium absolute valuation. However: our growth deceleration and slightly lower NRR justify a lower MULTIPLE. The 12x target (vs their 15x) reflects this. Revenue forecast's role in IPO pricing: the quality of our revenue forecast directly affects IPO pricing. High-quality forecast (MAPE <4%): bankers trust management projections. Analysts set targets based on our guidance. Market assigns a credibility premium (0.5-1x multiple uplift). Low-quality forecast (MAPE >8%): bankers discount management projections by 15-20%. Analysts set conservative targets. Market assigns a credibility discount (1-2x multiple reduction). Getting from 8% to <4% MAPE is worth approximately 1x multiple = $3.36B in enterprise value. The board's strategic choice — resolution framework: board member #1 (growth advocate): wants 22% growth, invest in market share. Argument: we will never be this well-positioned again. Growth creates value. Board member #2 (profitability advocate): wants 15% growth, expand margins to 20%. Argument: the market is shifting to profitability. Avoid being caught unprofitable in a downturn. The CRO's recommendation (forecast-driven): present the revenue forecast for all three options with probabilistic ranges. Show the valuation sensitivity analysis. Recommend: balanced strategy (18% growth, 15% margin) for the IPO year. Build in decision triggers for post-IPO pivoting. Post-IPO flexibility: if the stock trades above 14x ARR → accelerate growth (market rewards growth). If the stock trades below 10x ARR → optimize margins (market demands profitability). This data-driven approach removes the personal opinions from the strategic debate and focuses on what the market will actually value. The final board presentation — 10 slides: slide 1: IPO-ready forecast ($3.36B year-end ARR, $2.92B recognized revenue). Slide 2: acquisition integration plan ($500M + $127M synergies). Slide 3: three strategic scenarios with revenue and margin implications. Slide 4: Monte Carlo simulation showing probability distribution of outcomes. Slide 5: competitive positioning vs recently-IPO'd competitor. Slide 6: activist response framework (balanced growth + margins). Slide 7: MAPE improvement plan (8% → <4% in 6 months). Slide 8: guidance methodology (P25-P75 range, quarterly cadence). Slide 9: risk factors with quantified impact and mitigation. Slide 10: recommendation — balanced strategy with post-IPO triggers. This is revenue forecasting at its highest level — not just predicting numbers but using forecast intelligence to drive the most consequential strategic decisions a company will ever make'"
    weight: 0.30
    description: "Competitive"
