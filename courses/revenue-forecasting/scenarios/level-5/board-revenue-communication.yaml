meta:
  id: board-revenue-communication
  level: 5
  course: revenue-forecasting
  type: output
  description: "Board-level revenue communication — master the art of presenting revenue forecasts to boards of directors with strategic framing, risk calibration, and decision-enabling narratives"
  tags: [board, communication, strategic, narrative, governance, master]

state: {}

trigger: |
  A CEO preparing for a pivotal board meeting says: "We're presenting
  next year's revenue plan to a board that includes two former CFOs,
  a PE partner, and a public company CEO. Our $250M ARR company is
  at an inflection point:

  Option A: Invest $30M to accelerate growth from 25% to 40% YoY.
  Option B: Optimize for profitability — maintain 25% growth but
  reach breakeven.
  Option C: Balanced — 30% growth with a path to profitability in 18 months.

  Each option has a different revenue forecast, risk profile, and
  capital requirement. The board needs to choose. How do I present
  this so the board can make an informed decision in 2 hours?"

  Task: Design the board presentation that frames the revenue forecast
  as a strategic decision, enabling the board to choose between options
  with full understanding of trade-offs.

assertions:
  - type: llm_judge
    criteria: "Response designs the strategic framing for the board — framing: 'Board presentation strategic framing: the narrative arc: frame the presentation as a strategic decision, not a financial report. Do not start with spreadsheets — start with context. Opening (5 minutes): where we are and why this decision matters. We have reached $250M ARR with strong fundamentals: 25% growth, improving unit economics, market leader in our core segment. The next 12 months will define whether we become a $1B ARR public company or a profitable $400M ARR private company. Both are good outcomes — but they require different strategies, different investments, and different risk tolerances. This is not a math problem — it is a strategic choice about what kind of company we want to be. Slide 1 — The three paths: present all three options on one page with the key metrics. metric | Option A (Growth) | Option B (Profit) | Option C (Balanced). Year-end ARR: $350M | $312.5M | $325M. Growth rate: 40% | 25% | 30%. Cash burn: $30M | $0 (breakeven) | $15M. Cash required: $50M raise | $0 | $20M credit facility. Path to profitability: 24+ months | now | 18 months. IPO readiness: 18-24 months | not planned | 24-30 months. Risk level: high | low | moderate. Slide 2 — Revenue forecast for each option: Option A — Growth acceleration ($350M ARR): investment: hire 80 sales reps, 2x marketing spend, expand to 3 new markets. Revenue build: existing customers at NRR 115%: $250M × 1.15 = $287.5M. New business (doubled capacity): $62.5M new ARR. Total: $350M. Monthly ramp: Q1: $265M run rate (hiring and ramp). Q2: $290M (new reps productive). Q3: $320M (full capacity). Q4: $350M (target achieved). Risk: if new reps ramp slowly (45 days instead of 30), Q4 target drops to $330M. If 3 new markets underperform (50% of plan), target drops to $340M. Option B — Profitability optimization ($312.5M ARR): investment: reduce sales team by 10%, cut marketing 30%, focus on existing customers. Revenue build: existing at NRR 115%: $287.5M. New business (reduced): $25M new ARR. Total: $312.5M. Cost reduction: save $25M in operating expenses. Reach cash flow breakeven by Q2. Risk: if reducing sales capacity leads to faster competitor growth, we may lose market position. NRR could decline if product investment is reduced for profitability. Option C — Balanced growth ($325M ARR): investment: modest hiring (30 reps), targeted marketing in proven channels. Revenue build: existing at NRR 115%: $287.5M. New business (moderate): $37.5M new ARR. Total: $325M. Path to profitability: Q3 of the following year (18 months). Risk: middle path may satisfy no one — not fast enough for growth investors, not profitable enough for value investors'"
    weight: 0.35
    description: "Framing"
  - type: llm_judge
    criteria: "Response covers risk-adjusted analysis and decision framework for the board — analysis: 'Risk-adjusted analysis for the board: probabilistic outcomes for each option: option A — growth (Monte Carlo results): P10 (downside): $310M ARR (ramp delays, market headwinds). P50 (base): $345M ARR. P90 (upside): $380M ARR. Probability of hitting $350M target: 45%. Key risks: hiring and ramp execution (largest uncertainty). New market traction (uncertain demand). Increased burn rate with uncertain payoff timeline. Best case: we hit $350M+ and are IPO-ready at 14x multiple = $4.9B+ valuation. Worst case: we burn $50M, hit $310M, and need another raise at worse terms. Option B — profitability: P10: $295M ARR (churn increase from reduced investment). P50: $310M ARR. P90: $320M ARR. Probability of hitting $312.5M target: 55%. Key risks: competitive position erosion (competitors invest while we optimize). Talent attrition (top performers leave if growth slows). Customer perception (are we a growth company or a lifestyle business?). Best case: profitable at $320M, strong cash position, full optionality. Worst case: growth stalls at $295M, market share declines, becomes acquisition target at lower multiple. Option C — balanced: P10: $305M ARR. P50: $322M ARR. P90: $340M ARR. Probability of hitting $325M target: 50%. Key risks: neither growth investors nor value investors are fully excited. Execution requires precision — must hit targets in both growth and efficiency. Best case: $340M with path to profitability = strongest strategic position. Worst case: $305M, still burning $10M/year, in no-mans land. The decision framework: present the decision as a 2×2 matrix. market environment → favorable | unfavorable. choose growth (A): $380M, IPO at $5B+ | $310M, need emergency raise. Choose profit (B): $320M, missed opportunity | $310M, safe but small. Choose balanced (C): $340M, best of both | $305M, muddy narrative. Key insight for the board: if we believe the market is favorable (macro stable, competitors not threatening), Option A maximizes value creation. If we believe the market is unfavorable (recession risk, competitor threat), Option B preserves the company. If we are uncertain, Option C provides the most optionality. The board's role is to assess the market environment and match it to the right strategy. Board member perspective anticipation: former CFO #1 will ask: what is the cash runway under each option? Have we stress-tested the worst case? Option A: need $50M raise. Current cash $40M, 8 months runway at increased burn. Option B: cash positive by Q2, unlimited runway. Option C: need $20M credit facility, 18 months to profitability. Former CFO #2 will ask: what do the unit economics look like under accelerated growth? Will CAC increase as we hire rapidly and enter new markets? If CAC doubles, the $30M investment generates $15M ROI — still positive but lower margin. PE partner will ask: what is the valuation impact of each option? Option A at 14x: $4.9B. Option B at 8x (profitable but lower growth): $2.5B. Option C at 11x: $3.6B. The PE partner will favor whichever maximizes enterprise value relative to equity invested. Public company CEO will ask: which option creates the most durable competitive advantage? Growth creates moats (network effects, data advantages, brand). Profitability creates resilience (survives downturns, can acquire). Balanced maintains optionality (can accelerate or optimize based on results)'"
    weight: 0.35
    description: "Analysis"
  - type: llm_judge
    criteria: "Response covers the recommendation and decision-enabling close — recommendation: 'The recommendation and decision-enabling close: the CEO's recommendation framework: do not present all three options as equal — the CEO must have a point of view. Recommended approach: Option C (balanced) with a trigger to accelerate to Option A. Rationale: Option C provides the highest risk-adjusted return. It preserves optionality — we can accelerate in Q2 if signals are positive. It does not require an immediate fundraise (credit facility is sufficient). It gives us 6 months of data before committing $30M. Trigger for acceleration (Option A upgrade): if Q1 results show: NRR above 116% (existing customers growing strongly). New business pipeline coverage above 4x (demand is strong). New market pilots achieving 80%+ of plan. Macro indicators stable (PMI > 50, tech spending flat or growing). Then in Q2, draw additional capital and accelerate to Option A trajectory. Trigger for optimization (Option B downgrade): if Q1 results show: NRR below 110% (customer health declining). Pipeline coverage below 2.5x (demand weakening). Macro deterioration (PMI below 48, tech layoffs accelerating). Then in Q2, shift to Option B — cut discretionary spend and target profitability. This staged approach addresses every board member's concern: CFOs: cash is preserved, stress-tested, contingency planned. PE partner: value maximization path with downside protection. Public CEO: competitive position maintained with strategic flexibility. The closing slide — the ask: the board is asked to approve: Option C as the operating plan for year 1. A $20M credit facility as the financing mechanism. Quarterly strategic reviews with pre-defined triggers for acceleration or optimization. Authority for the CEO to shift to Option A if Q1 triggers are met (pre-approved). The 90-day review cadence: month 3: Q1 results. Decision: maintain Option C, accelerate to A, or pivot to B. Month 6: Q2 results. If accelerated, confirm trajectory. If maintained, reassess. Month 9: Q3 results. Full-year outlook nearly certain. Year-end plan for following year. Month 12: annual review. Three-year strategic plan refresh. Meeting management: total presentation: 45 minutes. Board discussion: 60 minutes. Decision and vote: 15 minutes. Follow-up items and next steps: 15 minutes. Do not present this as 50 slides of detail. The board gets 8-10 slides maximum with a detailed appendix for reference. The discussion should be strategic, not tactical. The CFO should handle financial detail questions. The CRO should handle go-to-market questions. The CEO drives the narrative and recommendation'"
    weight: 0.30
    description: "Recommendation"
