meta:
  id: automated-forecasting-pipelines
  level: 4
  course: revenue-forecasting
  type: output
  description: "Automated forecasting pipelines — design end-to-end automated revenue forecasting systems with data ingestion, model training, monitoring, and alerting"
  tags: [automation, pipeline, data-engineering, monitoring, alerting, expert]

state: {}

trigger: |
  A director of revenue operations says: "Our forecasting process is
  manual and takes 2 weeks every month. An analyst pulls data from
  5 different systems, builds a spreadsheet model, reviews with 4
  department heads, and produces the forecast. By the time it's done,
  the data is already stale.

  We need to automate this. We have: Salesforce (CRM), Stripe
  (billing), Mixpanel (product analytics), HubSpot (marketing),
  and Snowflake (data warehouse). Revenue is $80M ARR with 8,000
  customers across 3 products.

  Design an automated forecasting pipeline that produces daily
  updated forecasts with minimal human intervention."

  Task: Design a complete automated forecasting pipeline architecture
  including data ingestion, feature computation, model execution,
  output distribution, and monitoring with alerting.

assertions:
  - type: llm_judge
    criteria: "Response designs the data pipeline and feature computation layer — pipeline: 'Automated forecasting pipeline architecture: Layer 1 — Data ingestion: source systems and data flows: Salesforce → Snowflake: pipeline opportunities, stages, amounts, close dates, win/loss. Sync: every 4 hours via Fivetran or Airbyte. Tables: opportunities, accounts, contacts, activities. Stripe → Snowflake: subscriptions, invoices, charges, refunds, MRR events. Sync: hourly via webhook + daily batch reconciliation. Tables: subscriptions, invoice_line_items, charges, events. Mixpanel → Snowflake: product events (logins, feature usage, API calls). Sync: daily batch export. Tables: events (50M+ rows/month), user_properties. HubSpot → Snowflake: leads, MQLs, campaigns, email engagement. Sync: every 6 hours. Tables: contacts, deals, campaigns, email_events. Data quality layer: on every sync, run automated checks. Row count delta: flag if >20% change from prior sync. NULL rate: flag if key fields exceed 5% NULLs. Value range: flag if revenue amounts exceed 3 standard deviations. Timeliness: flag if sync is >2 hours late. Data quality dashboard alerts the data team within 15 minutes of any failure. Layer 2 — Feature computation: the feature store runs a dbt pipeline every night at 2 AM. Feature computation stages: Stage 1 — Base tables (raw → clean): deduplicate records. Handle type conversions and null filling. Apply business logic (e.g., subscription status determination). Stage 2 — Entity-level features: customer features: customer_mrr, customer_tenure, plan_type, seat_count. Account health: login_frequency_30d, feature_adoption_score, nps_latest. Revenue features: mrr_current, mrr_new, mrr_expansion, mrr_churn, mrr_contraction. Pipeline features: pipeline_weighted, pipeline_count, pipeline_velocity. Stage 3 — Aggregate features: company-level aggregates for the forecasting model. total_mrr, active_customers, new_customers_30d. Avg_arpu, median_arpu, arpu_trend_90d. Pipeline_coverage_ratio, win_rate_90d, avg_deal_size. Churn_rate_30d, expansion_rate_30d, nrr_monthly. Marketing_mqls_30d, cac_30d, lead_velocity. Stage 4 — Temporal features: lag features: mrr_lag_1 through mrr_lag_12. Rolling averages: mrr_rolling_3m, mrr_rolling_6m, mrr_rolling_12m. Year-over-year: mrr_yoy_change, customers_yoy_change. Seasonality: month_index, quarter_index, is_quarter_end. Total: approximately 120 features computed nightly, stored in the feature store. Computation time: approximately 15 minutes for the full pipeline'"
    weight: 0.35
    description: "Pipeline"
  - type: llm_judge
    criteria: "Response covers model execution and output distribution — execution: 'Layer 3 — Model execution: the model runs daily at 3 AM (after feature computation completes). Daily execution flow: Step 1 — Feature retrieval (2 minutes): pull latest features from the feature store. Validate: all required features present, no unexpected NULLs. Step 2 — Model inference (1 minute): run the ensemble model (XGBoost + LSTM + statistical baseline). Generate point forecast and prediction intervals for: next month (highest accuracy). Next 3 months (moderate accuracy). Next 6 months (directional). Step 3 — Scenario computation (3 minutes): run 3 scenario overlays on the base forecast: base case: model output (no adjustments). Conservative: apply -10% to new business, +1pp to churn. Optimistic: apply +10% to new business, -0.5pp to churn. Step 4 — Anomaly detection (1 minute): compare today's forecast to yesterday's forecast. If delta > 2% for next month: flag as significant change. Identify which features drove the change (SHAP delta analysis). Step 5 — Output generation (2 minutes): write results to the forecast output table in Snowflake. Generate the daily forecast report (JSON + formatted dashboard). Total daily execution: approximately 9 minutes from feature pull to output. Layer 4 — Output distribution: where the forecast goes: destination 1 — Executive dashboard (Looker/Tableau): real-time dashboard showing: current month pace vs forecast (actual accumulated revenue vs forecast pace line). Next month forecast with confidence interval. Rolling 3-month forecast with scenario bands. Year-to-date actual vs year-to-date forecast. Updated every time the model runs (daily). Destination 2 — Weekly forecast email (automated): every Monday at 8 AM, automatically send: this week's revenue pace update. Updated next-month forecast vs last week's forecast. Key driver changes (what moved the forecast). To: CFO, VP Sales, VP CS, VP Marketing. Destination 3 — Slack alerts (real-time): channel: #revenue-forecast. Posts when: daily forecast changes by >1% (unusual shift). A data quality issue is detected. A model monitoring metric crosses a threshold. Monthly when: month-end forecast is finalized (within 2 hours of month close). Destination 4 — API endpoint: REST API for internal tools to query the forecast. Used by: sales capacity planning tool, hiring models, budget allocation systems. Endpoint: GET /forecast?horizon=3m&scenario=base. Returns: monthly forecasts with confidence intervals in JSON'"
    weight: 0.35
    description: "Execution"
  - type: llm_judge
    criteria: "Response covers monitoring, alerting, and continuous improvement — monitoring: 'Layer 5 — Monitoring and alerting: model performance monitoring: track forecast accuracy continuously: metric | threshold | alert level | action. Daily MAPE (1-day): <2% | info | log only. Weekly MAPE (7-day): <3% | warning | investigate. Monthly MAPE (30-day): <5% | critical | retrain model. 3-month MAPE: <8% | critical | review model architecture. Forecast bias (rolling 6-month): <±2% | warning | recalibrate. Data quality monitoring: monitor | threshold | alert. Stripe sync lag: >4 hours | critical (revenue data stale). Salesforce sync lag: >8 hours | warning (pipeline data stale). Feature NULL rate: >5% on key features | critical (model inputs corrupted). Row count anomaly: >30% change | warning (data pipeline issue). Model drift monitoring: concept drift: the relationship between features and revenue changes over time. Detection: compare feature importance rankings monthly. If top-5 features change significantly, investigate. Data drift: input feature distributions shift. Detection: Kolmogorov-Smirnov test on feature distributions. If >3 features show significant drift, retrain model. Automated alerting flow: data quality issue detected → Slack alert → data team investigates → if severe, pause forecast output → resume when resolved. Model drift detected → warning alert → data science team evaluates → schedule retrain if needed. Accuracy degradation → critical alert → immediate investigation → retrain or fallback to statistical model. Continuous improvement: monthly improvement cycle: day 1-5: compute actual vs forecast for completed month. Day 5: calculate monthly MAPE, add to tracking dashboard. Day 6-10: analyze forecast errors — which features were most wrong? Day 10-15: if MAPE > target, investigate and implement improvements. Quarterly model review: retrain with fresh data. Re-evaluate feature set (add new, remove stale). Consider model architecture changes. Benchmark against simple models to ensure ML is still adding value. Annual architecture review: assess whether data sources need updating. Evaluate new ML techniques. Review if business model changes require fundamental model redesign. The human-in-the-loop: despite automation, certain events require human judgment. Known future events: product launches, pricing changes, acquisitions. The system accepts manual adjustments overlaid on the automated forecast. Adjustment log: every manual adjustment is logged with rationale. Post-event, compare adjusted vs unadjusted forecast to measure the value of human judgment. Over time, build a library of event-type adjustments: event_type | typical_impact | confidence. Product launch: +5-15% in affected segment | medium. Pricing increase: -3% volume, +8% ARPU | high. Major customer loss: -$X known impact | high. Macro recession: -10-20% new business | low-medium. These become semi-automated: when a product launch is flagged, the system suggests an adjustment based on historical launches'"
    weight: 0.30
    description: "Monitoring"
