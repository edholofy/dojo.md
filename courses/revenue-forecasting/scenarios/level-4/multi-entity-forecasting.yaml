meta:
  id: multi-entity-forecasting
  level: 4
  course: revenue-forecasting
  type: output
  description: "Multi-entity forecasting — forecast revenue across multiple business units, subsidiaries, and legal entities with intercompany elimination and currency consolidation"
  tags: [multi-entity, consolidation, intercompany, subsidiary, expert]

state: {}

trigger: |
  A corporate FP&A director says: "We're a holding company with 4
  subsidiaries that sell to each other and to external customers.
  Building the consolidated revenue forecast is a nightmare:

  Sub A (Platform, US): $80M external revenue, sells $15M in platform
  services to Subs B, C, D.
  Sub B (Analytics, UK): $30M external, buys $5M from Sub A, sells
  $3M to Sub C. Reports in GBP.
  Sub C (Commerce, Germany): $25M external, buys $8M from Sub A,
  buys $3M from Sub B. Reports in EUR.
  Sub D (Mobile, Japan): $15M external, buys $2M from Sub A. Reports
  in JPY.

  Our consolidated revenue should be $150M external but people keep
  reporting $178M because they include intercompany. Design a proper
  multi-entity forecast."

  Task: Build a multi-entity revenue forecast with proper intercompany
  elimination, currency consolidation, and entity-level accountability.

assertions:
  - type: llm_judge
    criteria: "Response designs the multi-entity forecasting framework with intercompany elimination — framework: 'Multi-entity forecasting framework: understanding intercompany revenue: the problem: each subsidiary reports its total revenue including sales to sister companies. Sub A reports: $80M external + $15M intercompany = $95M total. Sub B reports: $30M external + $3M intercompany = $33M total. Sub C reports: $25M external + $0 intercompany = $25M total. Sub D reports: $15M external + $0 intercompany = $15M total. Sum of subsidiary totals: $168M. But this double-counts intercompany transactions. Sub A sells $5M to Sub B — this is Sub A's revenue and Sub B's cost. At the consolidated level, this is an internal transfer, not real revenue. Intercompany elimination matrix: seller → buyer | amount | elimination. A → B: $5M | eliminate. A → C: $8M | eliminate. A → D: $2M | eliminate. B → C: $3M | eliminate. Total intercompany: $18M | all eliminated. Consolidated revenue: $168M - $18M = $150M external revenue. Building the forecast with elimination: step 1 — each subsidiary forecasts independently: Sub A forecast: external: $80M × 1.12 = $89.6M (12% growth). Intercompany to B: $5M × 1.15 = $5.75M (B growing faster). Intercompany to C: $8M × 1.10 = $8.8M. Intercompany to D: $2M × 1.20 = $2.4M. Sub A total: $106.55M. Sub B forecast (in GBP): external: £24M × 1.18 = £28.3M. Intercompany to C: £2.4M × 1.10 = £2.64M. Sub B total: £30.94M. Sub C forecast (in EUR): external: €23M × 1.15 = €26.45M. No intercompany sales. Sub C total: €26.45M. Sub D forecast (in JPY): external: ¥2.25B × 1.25 = ¥2.81B. No intercompany sales. Sub D total: ¥2.81B. Step 2 — validate intercompany balances: the intercompany revenue from the seller must match the intercompany cost from the buyer. Sub A says it will sell $5.75M to Sub B. Sub B must confirm it expects to buy $5.75M from Sub A (converted from GBP). If these do not match: reconciliation required. Common causes: timing differences (Sub A recognizes in December, Sub B in January). Currency conversion disagreements. Volume or pricing disputes. Resolution: establish intercompany pricing agreements and recognition rules. Monthly reconciliation of intercompany balances. Step 3 — eliminate intercompany from the consolidated forecast: total subsidiary revenue: $106.55M + (£30.94M × 1.27) + (€26.45M × 1.10) + (¥2.81B ÷ 150) = $106.55M + $39.29M + $29.10M + $18.73M = $193.67M. Intercompany eliminations: $5.75M + $8.8M + $2.4M + ($2.64M × 1.27 USD/GBP) = $5.75M + $8.8M + $2.4M + $3.35M = $20.30M. Consolidated external revenue: $193.67M - $20.30M = $173.37M (16% consolidated growth from $150M)'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response covers currency consolidation and entity-level accountability — consolidation: 'Currency consolidation: translating subsidiary forecasts to reporting currency (USD): Sub A (US): already in USD. No translation needed. Sub B (UK, GBP): monthly forecast in GBP translated using: current month: spot rate at month-end. Forward months: forward exchange rates or budget rates. GBP/USD scenarios: spot: 1.27. Budget rate (set at beginning of year): 1.25. Forward rate (market expectation): 1.28 by year-end. Using budget rates for planning and actual rates for reporting. Sub B in USD (budget rate): £30.94M × 1.25 = $38.68M. Sub B in USD (forward rate): £30.94M × 1.28 = $39.60M. Sub C (Germany, EUR): EUR/USD scenarios: spot: 1.10. Budget: 1.08. Forward: 1.12. Sub C in USD (budget): €26.45M × 1.08 = $28.57M. Sub C in USD (forward): €26.45M × 1.12 = $29.62M. Sub D (Japan, JPY): JPY/USD scenarios: spot: 150. Budget: 148. Forward: 155 (JPY weakening). Sub D in USD (budget): ¥2.81B ÷ 148 = $18.99M. Sub D in USD (forward): ¥2.81B ÷ 155 = $18.13M. Currency impact summary: entity | budget rate forecast | forward rate forecast | FX impact. Sub B: $38.68M | $39.60M | +$920K tailwind. Sub C: $28.57M | $29.62M | +$1.05M tailwind. Sub D: $18.99M | $18.13M | -$860K headwind. Net FX impact: +$1.11M tailwind at forward rates vs budget. Constant currency reporting: consolidated growth at budget rates: ($173.37M - $150M) ÷ $150M = 15.6%. Consolidated growth at forward rates: ($174.48M - $150M) ÷ $150M = 16.3%. FX contribution: 0.7pp of the 16.3% growth. Report both: we grew 15.6% in constant currency, 16.3% including FX tailwinds. Entity-level accountability: each subsidiary is measured on local currency performance. Sub A: measured on USD revenue. Sub B: measured on GBP revenue. Sub C: measured on EUR revenue. Sub D: measured on JPY revenue. FX gains/losses are tracked at the corporate level, not attributed to subsidiary performance. This prevents a UK subsidiary from claiming strong performance when GBP happened to strengthen, or a Japanese subsidiary being penalized when JPY weakened. Entity-level KPIs: entity | local revenue target | MAPE target | accountability. Sub A: $89.6M (USD) | <5% | VP Americas. Sub B: £28.3M (GBP) | <8% | VP EMEA. Sub C: €26.45M (EUR) | <8% | VP EMEA. Sub D: ¥2.81B (JPY) | <10% | VP APAC. Corporate: $173M (consolidated, budget rates) | <5% | CFO'"
    weight: 0.35
    description: "Consolidation"
  - type: llm_judge
    criteria: "Response covers practical multi-entity forecasting challenges — challenges: 'Practical multi-entity forecasting challenges: challenge 1 — transfer pricing complexity: intercompany transactions must be priced at arms-length (as if between unrelated parties) for tax compliance. Transfer pricing affects: how much revenue Sub A recognizes from intercompany sales. How much cost Sub B, C, D recognize from intercompany purchases. The consolidated profit margin of each subsidiary. Forecasting impact: if tax authorities challenge transfer prices, revenue may be reallocated between entities. Build a ±5% sensitivity on intercompany pricing into the forecast. Challenge 2 — timing and close differences: each subsidiary may close books on different schedules. Sub B (UK) closes on the last Friday of the month (can differ from calendar month-end by 1-3 days). Sub D (Japan) has a March fiscal year-end (different from corporate December year-end). Forecasting impact: monthly consolidation requires adjustments for timing differences. Build standardized close calendars with documented cut-off rules. Challenge 3 — different accounting standards: Sub A, D: US GAAP. Sub B: IFRS (UK). Sub C: IFRS (Germany). Revenue recognition differences between GAAP and IFRS can cause discrepancies. Forecasting impact: establish a common revenue recognition policy for forecasting purposes. Reconcile differences in the consolidation adjustments. Challenge 4 — intercompany elimination timing: Sub A ships a product to Sub C on December 28. Sub A recognizes revenue in December. Sub C does not receive and record the inventory until January 2. In December: intercompany revenue exists at Sub A but no corresponding cost at Sub C. Elimination is incomplete → consolidated revenue is overstated for December. Fix: establish cut-off rules requiring both entities to recognize in the same period. The multi-entity forecast process: monthly cadence: day 1-3: each subsidiary closes books and submits local forecast. Day 4: FP&A validates intercompany balances (seller revenue = buyer cost). Day 5-6: currency translation at appropriate rates. Day 7: intercompany elimination. Day 8: consolidation adjustments (timing, accounting standards). Day 9: consolidated forecast published. Day 10: corporate review with subsidiary heads. Technology recommendations: EPM (Enterprise Performance Management) tool: Anaplan, Adaptive Planning, or Planful. These tools handle: multi-currency planning and translation. Intercompany elimination rules. Consolidation hierarchies. Workflow and approval routing. Version control (budget, forecast, actual). The ROI: reduces the 2-week manual process to 3-4 days. Eliminates spreadsheet errors (which average $10K-$50K per quarter in a company this size). Provides audit trail required for SOX compliance'"
    weight: 0.30
    description: "Challenges"
