meta:
  id: ml-forecasting-systems
  level: 4
  course: revenue-forecasting
  type: output
  description: "ML-based forecasting systems — design and implement machine learning models for revenue prediction including feature engineering, model selection, and production deployment"
  tags: [machine-learning, xgboost, lstm, ensemble, production, expert]

state: {}

trigger: |
  A VP of Data Science says: "We have a $200M ARR company with 15,000
  customers and 5 years of granular data. Our statistical models
  (ARIMA, Holt-Winters) have plateaued at 8% MAPE. The CFO wants
  us to explore ML approaches to get below 5%.

  Available data: 60 months of revenue, customer-level transactions,
  product usage telemetry, CRM pipeline data, marketing attribution,
  macroeconomic indicators, 200+ customer attributes.

  Design an ML forecasting system that improves accuracy, is
  interpretable enough for the CFO, and can run in production."

  Task: Design a complete ML forecasting system including feature
  engineering, model architecture, training pipeline, and production
  deployment with interpretability.

assertions:
  - type: llm_judge
    criteria: "Response covers feature engineering and model architecture — architecture: 'ML forecasting system architecture: feature engineering — the foundation of ML forecasting: feature categories: temporal features: month, quarter, day_of_year (capture seasonality). Is_month_end, is_quarter_end (capture billing cycles). Days_since_last_holiday, days_to_next_holiday. Year fraction (captures annual position). Lag features: revenue_lag_1 through revenue_lag_12 (autoregressive inputs). Revenue_rolling_mean_3, _6, _12 (smoothed history). Revenue_rolling_std_3 (recent volatility). YoY_change_same_month (seasonal comparison). Customer base features: active_customers, new_customers_30d, churned_customers_30d. Avg_customer_tenure, median_arpu. Customer_concentration (HHI index — revenue concentration risk). Cohort_health_score (aggregate health of recent cohorts). Pipeline features: pipeline_weighted_value, pipeline_count. Pipeline_velocity (deals per day moving through stages). Pipeline_coverage_ratio (pipeline ÷ target). Deal_creation_rate_30d. Product features: feature_adoption_rate, avg_api_calls_per_customer. New_feature_launches_90d, product_nps_score. Usage_growth_rate, seats_per_customer_avg. Macro features: pmi_index, gdp_growth_quarter, interest_rate. Tech_sector_layoffs_30d, sp500_change_90d. Consumer_confidence_index. Marketing features: marketing_spend_30d, cac_30d, lead_volume_30d. Organic_traffic_growth, paid_conversion_rate. Feature count: approximately 80-100 engineered features from 200+ raw attributes. Model architecture — the ensemble approach: do not rely on a single model. Build an ensemble of complementary models. Model 1 — XGBoost (gradient boosted trees): input: all 100 features. Output: next-month revenue prediction. Strengths: handles non-linear relationships. Naturally captures feature interactions (e.g., high pipeline + low churn = strong month). Provides feature importance rankings. Robust to outliers. Configuration: 500 trees, max depth 6, learning rate 0.05. Trained on months 1-48, validated on months 49-54, tested on months 55-60. Model 2 — LSTM (Long Short-Term Memory neural network): input: sequence of last 12 months of key features (time-series format). Output: next-month revenue prediction. Strengths: captures complex temporal patterns. Learns long-range dependencies (e.g., seasonal patterns). Architecture: 2 LSTM layers (64 and 32 units), dropout 0.2. Trained on same split as XGBoost. Model 3 — Holt-Winters (statistical baseline): the existing statistical model, kept as a baseline and ensemble member. Strengths: interpretable, well-understood, stable. Ensemble combination: final prediction = 0.45 × XGBoost + 0.35 × LSTM + 0.20 × Holt-Winters. Weights determined by out-of-sample performance on validation set. The ensemble typically outperforms any individual model by 10-15% in MAPE'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers training pipeline and performance evaluation — training: 'Training pipeline and performance evaluation: the training pipeline: Step 1 — Data preparation: collect all features for each month (60 months × 100 features). Handle missing values: forward-fill for time series, median impute for static features. Normalize features: standard scaling for neural network inputs. Create train/validation/test splits: train: months 1-48 (80%). Validation: months 49-54 (10%). Test: months 55-60 (10%). Critical: never leak future information into training features. All lag features and rolling windows must be calculated using only past data. Step 2 — Model training: XGBoost: train with early stopping on validation MAPE. Hyperparameter tuning via Bayesian optimization (Optuna). Cross-validate using time-series split (expanding window, not random). LSTM: train for 200 epochs with early stopping on validation loss. Use learning rate scheduling (reduce on plateau). Batch size: 32 (small batches for time series). Holt-Winters: fit on training data, optimize smoothing parameters. Step 3 — Model evaluation: test set results (months 55-60): model | MAPE | MAE | RMSE | bias. XGBoost: 4.2% | $700K | $950K | -0.3%. LSTM: 5.1% | $850K | $1.1M | +0.8%. Holt-Winters: 7.8% | $1.3M | $1.6M | -1.5%. Ensemble: 3.8% | $633K | $820K | +0.1%. The ensemble achieves 3.8% MAPE — below the 5% target and a 53% improvement over Holt-Winters alone. Backtesting: rolling-origin evaluation over 24 months. Train on expanding window, predict 1-month ahead, compare to actual. 24 forecast-actual pairs: ensemble MAPE range: 2.1% to 6.8%. Average: 3.9% (consistent with test set). Only 2 of 24 months exceeded 5% MAPE (both were December — Q4 anomalies). Model reliability: the model is reliable for 1-month forecasts (consistently under 5%). For 3-month forecasts: MAPE increases to approximately 7%. For 6-month forecasts: MAPE increases to approximately 12%. For 12-month forecasts: MAPE increases to approximately 18%. Recommendation: use ML for 1-3 month forecasts, revert to scenario-based planning for 6-12 months. Step 4 — Feature importance analysis: XGBoost feature importance (top 10): 1. Revenue_lag_1 (last month's revenue): 18% importance. 2. Revenue_rolling_mean_3: 12%. 3. Active_customers: 9%. 4. Pipeline_weighted_value: 8%. 5. YoY_change_same_month: 7%. 6. New_customers_30d: 6%. 7. Churn_rate_30d: 5%. 8. Feature_adoption_rate: 4%. 9. Marketing_spend_30d: 4%. 10. PMI_index: 3%. Key insight: the top 3 features are backward-looking (revenue history). Forward-looking features (pipeline, new customers) also contribute significantly. Macro features (PMI) matter but less than operational metrics'"
    weight: 0.35
    description: "Training"
  - type: llm_judge
    criteria: "Response covers production deployment and interpretability for the CFO — production: 'Production deployment and CFO interpretability: production architecture: the ML forecasting system runs as a production service, not a one-time analysis. Data pipeline: daily data ingestion from CRM, billing, product analytics, and macro APIs. Feature store: pre-computed features updated daily, stored in a feature store for consistency. Model serving: REST API that returns next-month forecast with confidence intervals. Monitoring: automated alerts for data quality issues, model drift, and prediction anomalies. Monthly cadence: day 5: previous month's actuals finalized. Day 6: features updated, model generates new forecast. Day 7: forecast reviewed by data science team. Day 8: forecast published to FP&A dashboard. Model retraining: monthly: retrain with latest data point (expanding window). Quarterly: full hyperparameter re-optimization. Annually: feature engineering review (add new signals, remove stale ones). Drift detection: monitor prediction error rolling average. If 3-month rolling MAPE exceeds 7% (nearly double target), trigger investigation. Common drift causes: business model change (new product launched). Customer mix shift (enterprise vs SMB ratio changed). External shock (recession, competitor disruption). Making ML interpretable for the CFO: the CFO does not need to understand gradient boosting. They need to understand WHY the forecast is what it is. Interpretability layer — SHAP (SHapley Additive exPlanations): SHAP values show how each feature contributes to a specific prediction. Example — January forecast of $17.2M: base prediction (average): $16.8M. Revenue_lag_1 (December was strong): +$380K. Active_customers (grew 2.1% in Dec): +$220K. Pipeline_weighted (strong Q1 pipeline): +$180K. YoY_same_month (Jan last year was weak): -$150K. Churn_rate (slightly elevated): -$120K. PMI (declining to 48.5): -$90K. Other features: -$20K. Final prediction: $17.2M. The CFO can see: strong December + growing customer base + strong pipeline drives the forecast UP. But seasonal weakness (Jan pattern) + churn + macro concerns push it DOWN. This is a STORY, not a black box. The monthly forecast report for the CFO: one-page format. Section 1: the number — next month forecast: $17.2M (±3.8%, range $16.5M - $17.8M). Section 2: what is driving the forecast up — December momentum (+$380K), customer growth (+$220K), pipeline strength (+$180K). Section 3: what is driving the forecast down — seasonal pattern (-$150K), churn signals (-$120K), macro weakness (-$90K). Section 4: model confidence — last 6 months accuracy: 3.6% average MAPE. This is the same information the CFO would get from a human analyst, but generated systematically and consistently. Guardrails and human oversight: the ML system is a tool, not a replacement for judgment. Guardrails: if ML forecast differs from statistical model by >15%, flag for human review. If macro indicators shift dramatically (PMI drops 5+ points), override with scenario-adjusted forecast. If a large one-time event is known (acquisition, product launch, major customer win/loss), adjust the ML forecast manually. The ML forecast is the starting point for the FP&A discussion, not the final answer'"
    weight: 0.30
    description: "Production"
