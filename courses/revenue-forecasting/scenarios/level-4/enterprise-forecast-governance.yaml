meta:
  id: enterprise-forecast-governance
  level: 4
  course: revenue-forecasting
  type: output
  description: "Enterprise forecast governance — design organizational governance frameworks for revenue forecasting including accountability, audit trails, and regulatory compliance"
  tags: [governance, compliance, audit, accountability, enterprise, expert]

state: {}

trigger: |
  A Chief Accounting Officer says: "We're preparing for our IPO and
  the SEC will scrutinize our revenue forecasting practices. Our
  current process has no formal governance — different teams use
  different models, there's no audit trail, and forecast assumptions
  are not documented. Last quarter, our guidance missed by 12% and
  analysts downgraded us.

  We need enterprise-grade forecast governance. We have $500M ARR,
  4 business units, 20+ forecasting stakeholders, and we're subject
  to SOX compliance requirements. Design the governance framework."

  Task: Design an enterprise forecast governance framework covering
  accountability structures, audit trails, regulatory compliance,
  model validation, and guidance communication protocols.

assertions:
  - type: llm_judge
    criteria: "Response designs the governance structure and accountability framework — governance: 'Enterprise forecast governance framework: organizational structure: the forecasting governance hierarchy: Level 1 — Forecast Governance Committee (FGC): composition: CFO (chair), CRO, CMO, CPO, Chief Accounting Officer, Head of FP&A. Frequency: quarterly (plus ad-hoc for material events). Responsibilities: approve the official forecast and guidance range. Review and approve material forecast assumption changes. Sign off on external guidance (earnings calls, SEC filings). Approve new forecasting methodologies before deployment. Level 2 — Revenue Forecasting Council (RFC): composition: VP FP&A (chair), VP Rev Ops, VP Data Science, VP Sales Ops, VP CS Ops, Controller. Frequency: monthly. Responsibilities: produce the consolidated revenue forecast. Resolve cross-functional assumption conflicts. Review forecast accuracy and improvement plans. Manage the forecasting calendar and process. Level 3 — Business Unit Forecast Owners: each of the 4 BUs has a designated forecast owner. Responsibilities: produce BU-level forecast inputs monthly. Own the accuracy of their BU forecast. Document assumptions and methodology changes. Escalate material variances within 48 hours. Accountability matrix (RACI): activity | responsible | accountable | consulted | informed. BU input forecasts: BU Owners | VP FP&A | RFC | FGC. Consolidated forecast: FP&A team | VP FP&A | RFC | FGC. Methodology approval: Data Science | VP FP&A | RFC | FGC. Guidance range: FP&A team | CFO | FGC | Board. External communication: IR team | CFO/CEO | FGC | Board. The forecast calendar: a rigid calendar ensures consistency and timeliness. Monthly cadence: day 1-3: source systems close, data validated. Day 4-5: automated pipeline generates base forecast. Day 6-8: BU owners review and adjust with documented rationale. Day 9-10: RFC reviews consolidated forecast. Day 11: VP FP&A approves and publishes internal forecast. Day 12: executive dashboard updated. Quarterly cadence (in addition to monthly): week 1: BU deep-dive reviews (methodology, accuracy, assumptions). Week 2: RFC consolidation and scenario analysis. Week 3: FGC review and approval. Week 4: board presentation, guidance update if needed'"
    weight: 0.35
    description: "Governance"
  - type: llm_judge
    criteria: "Response covers audit trails, documentation, and SOX compliance — compliance: 'Audit trails and SOX compliance: the audit trail framework: every forecast must have a complete, immutable audit trail. What must be documented for every forecast cycle: 1. Input data sources: which systems provided data, what date/time, any data quality issues. Hash of input datasets for reproducibility. 2. Assumptions register: every assumption used in the forecast, who set it, when, and the rationale. Example entry: assumption ID: A-2024-Q3-017. Assumption: logo churn rate = 6.5% annually. Set by: VP Customer Success. Date: 2024-07-08. Rationale: trailing 6-month average is 6.2%, adjusting +0.3pp for known competitive pressure. Prior value: 6.0% (set 2024-04-10). Change approved by: RFC meeting 2024-07-10, minutes reference #RFC-2024-07. 3. Model versioning: which version of each forecasting model was used. Model parameters and configuration. Any manual overrides and their justification. 4. Adjustment log: every manual adjustment to the automated forecast. Who made it, when, why, and what was the quantitative impact. Approval chain for the adjustment. 5. Output archive: the final forecast output, stored immutably. Comparison to prior period forecast (what changed). Sign-off by VP FP&A and CFO for external-facing forecasts. SOX compliance requirements for forecasting: SOX Section 302 — CEO/CFO certification: the CEO and CFO personally certify the accuracy of financial disclosures. Revenue guidance is a material disclosure — it must be produced through a controlled process. Implication: the forecast process must be documented, repeatable, and auditable. SOX Section 404 — Internal controls: revenue forecasting is a key internal control over financial reporting (ICFR). Required controls: access controls: who can view and modify the forecast (role-based). Change management: all methodology changes require RFC approval before deployment. Segregation of duties: the person producing the forecast should not be the same person approving it. Data integrity: source data must be reconciled to financial statements. Testing: internal audit must test forecast controls annually. Control documentation: for each control, document: control objective: ensure forecast inputs are accurate and complete. Control activity: data quality checks on ingestion (automated), manual reconciliation to GL monthly. Frequency: every forecast cycle (monthly). Evidence: data quality reports, reconciliation workpapers, sign-off logs. Control owner: Director of Revenue Operations. Testing approach: sample 3 months per year, verify data quality checks ran and passed, verify reconciliation was performed. Material weakness risk: if the forecast process has a control gap and the company misses guidance by >10%, auditors may flag a material weakness in ICFR. This can delay the IPO, trigger SEC scrutiny, and damage investor confidence. Prevent this with: documented policies and procedures. Consistent execution of the forecast calendar. Retention of all audit trail artifacts for 7+ years'"
    weight: 0.35
    description: "Compliance"
  - type: llm_judge
    criteria: "Response covers guidance communication and model validation — guidance: 'Guidance communication and model validation: guidance communication protocol: who can communicate the forecast externally: only the CEO and CFO during earnings calls. Only the IR team in analyst communications. All external statements must be pre-approved by legal and the FGC. Guidance range construction: never give a single-point estimate externally. Construct the range using the P25-P75 of the Monte Carlo simulation. Internal base case: $525M. Guidance range: $510M - $540M. This range is wide enough to avoid frequent misses but narrow enough to signal confidence. Guidance update triggers: an intra-quarter guidance update is required if: the forecast moves outside the guidance range by >3%. A material event occurs (large customer loss, acquisition, product failure). A macro shock changes the outlook significantly. The update process: within 24 hours of trigger, FGC convenes. Within 48 hours, decision on whether to update guidance. If updating: 8-K filing with SEC, press release, investor call. Beating vs missing guidance: the optimal outcome is beating guidance by 1-3% (demonstrates operational excellence without suggesting sandbagging). Missing by >5%: serious credibility damage, potential SEC scrutiny. Beating by >10%: suggests sandbagging — analyst trust erodes. Model validation framework: all forecasting models must pass validation before deployment. Validation checklist: 1. Conceptual soundness: does the model logic make economic sense? Are the features causally related to revenue (not just correlated)? 2. Statistical validation: out-of-sample MAPE < internal threshold (5% for primary model). No significant bias (MPE within ±2%). Residuals pass normality and independence tests. 3. Benchmarking: model must outperform naive benchmarks (last month, trailing average, linear trend). Performance improvement must be statistically significant (not just noise). 4. Stress testing: model performance under extreme scenarios (2x churn, 50% pipeline drop). If model produces unrealistic outputs under stress, it needs constraints. 5. Sensitivity analysis: model should not be overly sensitive to any single feature. If removing one feature degrades MAPE by >50%, the model is fragile. 6. Operational readiness: model runs within acceptable time limits. Data pipeline handles failures gracefully. Failover to statistical baseline if ML model fails. Validation must be documented and approved by: data science lead, VP FP&A, and external auditor (for SOX purposes). Annual re-validation is required even if the model is performing well. Continuous monitoring post-deployment: the model validation is not a one-time event. Monthly: track MAPE, bias, feature importance stability. Quarterly: compare to benchmark models, assess if retraining improved performance. Annually: full re-validation including stress tests and conceptual review'"
    weight: 0.30
    description: "Guidance"
