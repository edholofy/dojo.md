meta:
  id: forecasting-during-disruption
  level: 4
  course: revenue-forecasting
  type: output
  description: "Forecasting during disruption — adapt revenue forecasting methods for periods of extreme uncertainty including recessions, pandemics, market disruption, and rapid growth"
  tags: [disruption, recession, uncertainty, crisis, adaptation, expert]

state: {}

trigger: |
  A CFO says: "Our models are useless right now. Three months ago
  everything was predictable — $60M ARR growing 30% YoY. Then:

  1. A major economic downturn hit — our enterprise customers froze
     budgets and 3 key accounts (worth $4M combined) paused renewal.
  2. A new AI competitor launched with a free tier that's attracting
     our SMB customers — SMB churn tripled from 3% to 9% monthly.
  3. But paradoxically, our AI features are gaining traction —
     usage-based revenue is growing 100% and we're getting inbound
     enterprise interest.

  How do I forecast when historical patterns are broken, the situation
  is changing weekly, and different parts of the business are going
  in opposite directions?"

  Task: Design a crisis-adapted forecasting framework that handles
  extreme uncertainty, rapid change, and divergent business dynamics.

assertions:
  - type: llm_judge
    criteria: "Response addresses why standard models fail during disruption — diagnosis: 'Why standard models fail during disruption: the broken assumptions: standard forecasting models assume: past patterns continue (stationarity). Changes happen gradually (smooth trends). All business segments move in the same direction. The environment is relatively stable. During disruption, ALL these assumptions fail simultaneously: historical patterns are irrelevant — 3% SMB churn is now 9%. Changes are step-functions, not gradual — enterprise budgets froze overnight. Segments diverge — enterprise contracts pausing while AI usage surging. The environment is volatile — weekly changes instead of quarterly. The specific challenges in this scenario: challenge 1 — conflicting signals: enterprise: contracting (budget freezes, paused renewals). SMB: hemorrhaging (3x churn increase). AI/usage: exploding (+100% growth). Net direction: unclear — depends on the relative magnitude of each force. Challenge 2 — unstable base rates: cannot use the trailing 12-month average for anything. The last 3 months represent a structural break — the prior 9 months are from a different era. Only the most recent 4-8 weeks of data reflect the current reality. Challenge 3 — uncertain duration: how long will the downturn last? 3 months? 12 months? 36 months? How long will the competitive threat persist? Is the AI growth sustainable or a temporary bump? The forecast needs to handle multiple duration scenarios. Diagnosing the current state — segment-by-segment triage: segment | pre-crisis ARR | current trajectory | status. Enterprise (50 accounts, $30M): $30M, 3 accounts ($4M) paused, 2 more at risk | critical. Mid-market (200 accounts, $18M): $18M, churn up slightly (3% → 4%) | concerning. SMB (2,000 accounts, $8M): $8M, churn tripled (3% → 9%) | hemorrhaging. Usage/AI (cross-cutting): $4M, growing 100% | surging. Total: $60M → divergent trajectories. First action: stop forecasting total revenue as one number. Each segment needs a separate forecast with different methodologies'"
    weight: 0.35
    description: "Diagnosis"
  - type: llm_judge
    criteria: "Response builds the crisis-adapted forecasting framework — framework: 'Crisis-adapted forecasting framework: principle 1 — shorten the forecast horizon: during normal times: forecast 12 months ahead with quarterly detail. During disruption: primary forecast: 90 days (monthly detail). Secondary forecast: 6 months (quarterly, scenario-based). Abandon: 12-month point forecasts (they are fiction during disruption). Update frequency: move from monthly to weekly forecast updates for the first 90 days. Principle 2 — scenario-based, not point-based: build 3 scenarios with explicit assumption sets. Scenario A — Downturn deepens (30% probability): enterprise: 2 more accounts pause ($2M). Duration: 12+ months. SMB churn: stays at 9% (competitor entrenched). AI growth: slows to 50% (customers resist new spending). 90-day forecast: enterprise: $30M → $26M ARR. SMB: $8M → $5.8M ARR (9% monthly churn for 3 months). Usage: $4M → $5.3M ARR. Total: $37.1M ARR (-38% from peak trajectory). Scenario B — Stabilization (50% probability): enterprise: no additional pauses. 1 of 3 paused accounts resumes. Duration: 6 months to recovery. SMB churn: reduces to 6% (some stabilization). AI growth: continues at 80%. 90-day forecast: enterprise: $30M → $28M ARR. SMB: $8M → $6.6M ARR. Usage: $4M → $5.6M ARR. Total: $40.2M ARR. Scenario C — Recovery and pivot (20% probability): enterprise: all paused accounts resume. New AI-driven enterprise interest converts. SMB churn: reduces to 5% (competitor free tier proves limited). AI growth: accelerates to 120%. 90-day forecast: enterprise: $30M → $30.5M ARR. SMB: $8M → $6.9M ARR. Usage: $4M → $6.2M ARR. Total: $43.6M ARR. Probability-weighted forecast: EV = 0.3 × $37.1M + 0.5 × $40.2M + 0.2 × $43.6M = $11.13M + $20.1M + $8.72M = $39.95M ARR. This is a 33% decline from the pre-crisis $60M growth trajectory — but it is honest. Principle 3 — leading indicator monitoring: during disruption, lagging indicators (monthly revenue) are too slow. Switch to leading indicators with daily tracking: indicator | frequency | threshold | action. Enterprise renewal conversations: daily | <3 positive signals/week → escalate | CRO outreach. SMB churn rate (7-day rolling): daily | >8% → activate retention | CS war room. AI usage growth: daily | <5% weekly growth → investigate | product review. Pipeline new opportunities: daily | <10/week → increase marketing | CMO intervention. Competitor free tier signups: weekly | >500/week → competitive response | pricing review. Cash runway: weekly | <12 months → cost reduction | CFO emergency plan. Principle 4 — focus on what you CAN control: during disruption, energy goes to controllable levers. Controllable: customer outreach and retention (CS activation). Pricing and packaging adjustments (competitive response). Cost structure (if revenue declines enough). Product prioritization (double down on AI since it is growing). Uncontrollable: macro economy. Competitor funding and strategy. Customer budget decisions. Forecast the uncontrollable through scenarios. Execute on the controllable through action plans'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response covers communication during disruption and recovery planning — communication: 'Communication and recovery planning: communicating the disrupted forecast to the board: the board needs honesty, not false precision. Board presentation framework during crisis: Section 1 — Situation assessment (1 slide): what happened: 3 simultaneous shocks (macro, competitive, technology shift). Current state: $60M ARR trajectory disrupted. Segments diverging — enterprise contracting, AI surging. Section 2 — Scenario analysis (1 slide): scenario | 90-day ARR | probability | key trigger. Deepening: $37.1M | 30% | additional enterprise pauses, SMB churn persists. Stabilization: $40.2M | 50% | enterprise holds, SMB churn moderates. Recovery/pivot: $43.6M | 20% | enterprise resumes, AI accelerates. Expected: $40.0M ARR. Section 3 — Actions underway (1 slide): action | owner | timeline | expected impact. Enterprise retention program: CRO | immediate | save $2-3M at-risk ARR. SMB competitive response: CPO + CMO | 30 days | reduce churn from 9% to 6%. AI product investment: CTO | 60 days | accelerate AI revenue from $4M to $6M run rate. Cost reduction if scenario A: CFO | contingent | preserve 18+ months runway. Section 4 — Decision points (1 slide): if scenario A indicators appear by day 30: reduce headcount by 15% (preserve cash). If scenario C indicators appear by day 60: increase investment in AI features. In both cases: monthly board updates until stabilization. What NOT to say: we expect to return to the $60M trajectory (you do not know this). Everything will be fine (the board needs candor, not optimism). We need to cut 30% immediately (premature — assess first). Recovery planning — the pivot framework: the AI growth signal is potentially transformative. While enterprise and SMB struggle, AI usage is surging. Assessment: is the AI growth a temporary bump or a fundamental shift? Metrics to watch: are new customers arriving specifically for AI features? Are existing customers increasing AI usage consistently (not just trying it)? Is AI usage correlated with lower churn (customers who use AI stay)? What is the willingness to pay for AI features? If AI is a fundamental shift: pivot the forecast model. De-emphasize SMB (let natural churn run while reducing acquisition spend). Invest heavily in AI features and enterprise AI use cases. Build a new forecast model where AI usage-based revenue becomes the growth engine. Revised 12-month outlook (if AI pivot proves valid): enterprise: stabilizes at $28M, then grows to $32M with AI features. SMB: declines from $8M to $5M (accepted — shift investment away). Usage/AI: grows from $4M to $12M (triple in 12 months). Total: $49M ARR — lower than pre-crisis trajectory but on a more sustainable, defensible path. The key insight: disruption is not just a threat — it often reveals new opportunities that were hidden by the comfort of the old trajectory. The forecast should model both the threats AND the emerging opportunities'"
    weight: 0.30
    description: "Communication"
