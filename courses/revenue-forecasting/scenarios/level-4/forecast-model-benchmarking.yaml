meta:
  id: forecast-model-benchmarking
  level: 4
  course: revenue-forecasting
  type: output
  description: "Forecast model benchmarking — systematically compare forecasting models across multiple dimensions including accuracy, interpretability, computational cost, and business value"
  tags: [benchmarking, model-comparison, evaluation, selection, expert]

state: {}

trigger: |
  A head of data science says: "We have 5 different forecasting models
  running in parallel and the CFO wants to know which one to trust.
  Each team built their own:

  Model A: Holt-Winters (FP&A team, Excel).
  Model B: ARIMA with external regressors (data analyst, R).
  Model C: XGBoost ensemble (ML team, Python).
  Model D: Prophet (marketing analytics, Python).
  Model E: Bottom-up driver model (Rev Ops, Anaplan).

  Last quarter's forecasts ranged from $42M to $48M. Actual was $44.5M.
  We have 48 months of historical data. Design a rigorous benchmarking
  framework to evaluate and select the best model or combination."

  Task: Design a comprehensive model benchmarking framework, evaluate
  the 5 models, and recommend the optimal approach.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-dimensional benchmarking framework — framework: 'Forecast model benchmarking framework: dimension 1 — accuracy metrics: evaluate on held-out data (months 37-48, 12 months of testing). Metric set: MAPE: average absolute percentage error (overall accuracy). MAE: average dollar error (business impact). RMSE: root mean square error (penalizes large misses). Bias (MPE): systematic over or underforecasting. Directional accuracy: percentage of months where the forecast correctly predicted whether revenue would go up or down. Evaluation protocol: rolling-origin cross-validation. Train on months 1-36, forecast month 37. Train on months 1-37, forecast month 38. Continue through month 48. This gives 12 forecast-actual pairs for each model. Results: model | MAPE | MAE | RMSE | bias | directional. Holt-Winters: 6.2% | $2.8M | $3.4M | -1.5% (under) | 75%. ARIMA-X: 5.1% | $2.3M | $2.9M | +0.8% | 83%. XGBoost: 4.3% | $1.9M | $2.5M | +0.3% | 92%. Prophet: 5.8% | $2.6M | $3.2M | -2.1% (under) | 75%. Driver model: 7.4% | $3.3M | $4.1M | +2.5% (over) | 67%. Accuracy ranking: XGBoost > ARIMA-X > Prophet > Holt-Winters > driver model. Dimension 2 — stability and reliability: does the model perform consistently or have occasional large misses? Metrics: maximum single-month error (worst miss). Error variance (how variable are errors month-to-month). Performance degradation at longer horizons (1-month vs 3-month vs 6-month). Results: model | max error | error variance | 3-month MAPE | 6-month MAPE. Holt-Winters: 12% | moderate | 9.5% | 14%. ARIMA-X: 9% | low | 7.8% | 12%. XGBoost: 8% | low | 6.5% | 11%. Prophet: 14% | high | 10.2% | 16%. Driver model: 18% | very high | 12% | 20%. XGBoost is most stable. Prophet has occasional large misses. Driver model is unreliable at longer horizons. Dimension 3 — interpretability: can the CFO understand WHY the forecast is what it is? Scoring (1-5): Holt-Winters: 4/5 (trend + seasonal, easy to explain). ARIMA-X: 3/5 (mathematical, but coefficients are interpretable). XGBoost: 2/5 (black box without SHAP, 3.5/5 with SHAP). Prophet: 4/5 (trend + seasonality + holidays, visually intuitive). Driver model: 5/5 (built from business drivers, fully transparent). The most accurate model (XGBoost) is the least interpretable. The most interpretable model (driver model) is the least accurate. This is the classic accuracy-interpretability tradeoff. Dimension 4 — operational factors: model | update time | maintenance effort | data requirements | owner skill. Holt-Winters: 5 min | low | minimal | Excel. ARIMA-X: 30 min | medium | moderate | R/Python. XGBoost: 2 hours | high | extensive | ML engineer. Prophet: 15 min | low | moderate | Python basics. Driver model: 1 week | very high | extensive | business analyst'"
    weight: 0.35
    description: "Framework"
  - type: llm_judge
    criteria: "Response evaluates combinations and recommends the optimal approach — recommendation: 'Model combination and recommendation: ensemble evaluation: individual models have weaknesses — ensembles often outperform. Test combinations using optimized weights (minimize MAPE on validation set). Ensemble options tested: equal weight (all 5 models × 20%): MAPE 4.8% (better than any single model except XGBoost). Top-3 weighted (XGBoost 50%, ARIMA-X 30%, Holt-Winters 20%): MAPE 3.7% (best overall). XGBoost + driver model (60/40): MAPE 4.5% (accuracy + interpretability balance). All models + inverse-MAPE weighting: MAPE 3.9% (good but adds complexity with 5 models). Best ensemble: XGBoost (50%) + ARIMA-X (30%) + Holt-Winters (20%). This achieves 3.7% MAPE — a 14% improvement over XGBoost alone. Why the ensemble works: XGBoost captures non-linear patterns and feature interactions. ARIMA-X captures time-series autocorrelation that XGBoost misses. Holt-Winters provides stable baseline that prevents ensemble from overfitting. Their errors are partially uncorrelated — when XGBoost misses high, ARIMA-X often misses low, and the average is closer to actual. Recommendation — the two-tier system: tier 1 — primary forecast (the number): the ensemble model (XGBoost + ARIMA-X + Holt-Winters). MAPE: 3.7% (best accuracy). Used for: official forecast, guidance, resource planning. Updated: daily (automated). Owner: ML team with data engineering support. Tier 2 — explanatory model (the story): the driver model (Rev Ops). MAPE: 7.4% (not used for the number). Used for: explaining WHY the forecast is what it is. What-if analysis (what if we increase marketing spend 20%?). Scenario planning (what if a key customer churns?). Updated: monthly (manual but valuable). Owner: Revenue Operations. How the two tiers work together: the ensemble says next month revenue will be $45.2M. The driver model explains: $28M from existing customer base (subscription recognition). $8M from expansion (NRR driving organic growth). $6M from new business (pipeline conversion). $3.2M from usage (API consumption trends). The CFO gets both precision AND narrative. Neither model alone provides both. Sunset recommendation: Prophet: retire. It is outperformed by both ARIMA-X and XGBoost in accuracy and by Holt-Winters in simplicity. Keep as a benchmarking reference but remove from production. ARIMA-X in R: migrate to Python for consistency with XGBoost pipeline. The R implementation creates a maintenance burden and integration challenge'"
    weight: 0.35
    description: "Recommendation"
  - type: llm_judge
    criteria: "Response covers ongoing benchmarking and model governance — governance: 'Ongoing benchmarking and model governance: the continuous benchmarking protocol: benchmarking is not a one-time exercise. Models degrade over time as business dynamics change. Monthly monitoring: track each model's MAPE, bias, and max error. Compare ensemble vs individual models. If any model consistently adds error to the ensemble (ensemble without it performs better), consider removal. Quarterly deep evaluation: re-run the full benchmarking framework. Update ensemble weights based on recent performance. Evaluate new candidate models (new team member builds a model, new open-source approach). Annual model tournament: open competition — any team can submit a forecasting model. Evaluate all submissions on the standard benchmark dataset. Winner gets included in the ensemble if it improves accuracy. This creates healthy competition and prevents model stagnation. Model governance framework: model lifecycle: proposal → development → validation → deployment → monitoring → retirement. Stage gates: proposal: must define the hypothesis for why this model will improve accuracy. Development: must use standardized data splits and evaluation metrics. Validation: must outperform naive baseline (last month carried forward) by >20%. Must not underperform current ensemble. Must pass residual diagnostics. Deployment: approved by head of data science and VP FP&A. Monitoring: monthly accuracy tracking with automated alerts. Retirement: if model underperforms for 3 consecutive quarters. Documentation requirements: each production model must have: model card: algorithm, features, training data, limitations. Performance history: monthly MAPE since deployment. Dependency map: what data sources and infrastructure it requires. Failover plan: what happens if this model fails (fallback to statistical baseline). Change log: every parameter change, retraining event, or feature modification. This documentation supports SOX compliance and IPO readiness. The benchmarking dashboard: a living dashboard that shows: model | current month MAPE | 3-month rolling MAPE | trend | status. XGBoost: 3.8% | 4.1% | stable | active (ensemble). ARIMA-X: 5.0% | 5.3% | stable | active (ensemble). Holt-Winters: 6.0% | 6.5% | slight degradation | active (ensemble). Prophet: 7.2% | 7.0% | stable | retired. Driver: 8.1% | 7.8% | improving | active (explanatory). Ensemble: 3.5% | 3.7% | stable | primary forecast. This gives the CFO confidence that the forecasting system is professionally managed, continuously evaluated, and improving over time'"
    weight: 0.30
    description: "Governance"
