meta:
  id: ma-revenue-forecasting
  level: 4
  course: revenue-forecasting
  type: output
  description: "M&A revenue forecasting — forecast combined entity revenue during mergers and acquisitions including synergies, integration risks, and combined customer dynamics"
  tags: [m-and-a, merger, acquisition, synergies, integration, expert]

state: {}

trigger: |
  A VP of Corporate Development says: "We're acquiring a competitor.
  The board needs a combined revenue forecast for the next 3 years.

  Acquirer (us): $120M ARR, 10,000 customers, NRR 115%, 20% YoY growth.
  Target: $40M ARR, 5,000 customers, NRR 105%, 30% YoY growth.
  Customer overlap: 800 customers use both products.

  Expected synergies: cross-sell (our product to their customers),
  combined platform pricing, and reduced competitive pressure.
  Expected risks: customer churn during integration, team attrition,
  and product migration complexity.

  Build a 3-year combined revenue forecast with and without synergies."

  Task: Build a pre-acquisition and post-acquisition combined revenue
  forecast modeling synergies, integration risks, and customer overlap.

assertions:
  - type: llm_judge
    criteria: "Response builds standalone and combined baseline forecasts — baseline: 'M&A revenue forecasting — baseline construction: standalone forecasts (no acquisition): acquirer standalone (3-year): year 1: $120M × 1.20 = $144M. Year 2: $144M × 1.18 (growth decelerates) = $169.9M. Year 3: $169.9M × 1.16 = $197.1M. 3-year CAGR: 18%. Target standalone (3-year): year 1: $40M × 1.30 = $52M. Year 2: $52M × 1.25 (growth decelerates) = $65M. Year 3: $65M × 1.20 = $78M. 3-year CAGR: 25%. Simple combined (sum of standalone): year 1: $144M + $52M = $196M. Year 2: $169.9M + $65M = $234.9M. Year 3: $197.1M + $78M = $275.1M. This is the no-synergies, no-disruption baseline. It assumes the two businesses continue independently. Customer overlap analysis: 800 customers use both products. These customers are counted in both revenue bases. Overlap revenue: acquirer revenue from overlap customers: 800 × ($120M ÷ 10,000 avg) = $9.6M. Target revenue from overlap customers: 800 × ($40M ÷ 5,000 avg) = $6.4M. Total overlap revenue: $16M. Post-acquisition, these 800 customers do not generate $16M in additive revenue — they were already paying both companies. The combined entity should not double-count this revenue. Adjusted combined baseline: year 1: $196M - $0 (overlap customers continue paying both — no change yet). Eventually: overlap customers will consolidate onto a combined platform. Revenue risk: they may pay less for the combined product than for two separate products. Revenue opportunity: a combined product may justify a higher price. Baseline combined forecast (no synergies, no disruption): year 1: $196M. Year 2: $234.9M. Year 3: $275.1M'"
    weight: 0.35
    description: "Baseline"
  - type: llm_judge
    criteria: "Response models synergies and integration risks — synergies: 'Modeling synergies and integration risks: revenue synergies: Synergy 1 — Cross-sell (our product to their customers): target has 5,000 customers. 800 overlap already have our product. Addressable: 4,200 net-new potential customers for our product. Assumption: 15% cross-sell conversion over 3 years. Year 1: 5% conversion = 210 customers × $12K ACV = $2.5M. Year 2: additional 5% = 210 more × $12K = $2.5M incremental ($5.0M cumulative). Year 3: additional 5% = 210 more × $12K = $2.5M incremental ($7.5M cumulative). Synergy 2 — Reverse cross-sell (their product to our customers): acquirer has 10,000 customers. 800 overlap already have target product. Addressable: 9,200 potential customers for target product. Assumption: 10% conversion over 3 years (lower — their product is less established). Year 1: 3% = 276 × $8K ACV = $2.2M. Year 2: 4% = 368 × $8K = $2.9M incremental. Year 3: 3% = 276 × $8K = $2.2M incremental. Cumulative: $7.3M by year 3. Synergy 3 — Combined platform premium: overlap customers (800) consolidate onto combined platform. New combined price: premium of 20% over the higher individual price. 800 × ($12K × 1.2 - $12K) = 800 × $2.4K = $1.9M by year 2. Synergy 4 — Reduced competitive pressure: the target was our competitor for some deals. Eliminating competition improves win rate. Estimated impact: 5% higher win rate on competitive deals = $1.5M/year additional new business. Total revenue synergies by year: year 1: $2.5M + $2.2M + $0 + $1.5M = $6.2M. Year 2: $5.0M + $5.1M + $1.9M + $1.5M = $13.5M. Year 3: $7.5M + $7.3M + $1.9M + $1.5M = $18.2M. Integration risks — revenue headwinds: Risk 1 — Customer churn during integration: historical M&A data: 5-15% of acquired company customers churn within 18 months. Conservative estimate: 10% of target customers churn. $40M × 10% = $4M at risk over 18 months. Year 1: $2.5M churn (front-loaded — uncertainty drives early departures). Year 2: $1.5M additional churn. Risk 2 — Overlap customer consolidation risk: 800 overlap customers currently pay both companies ($16M combined). Post-migration, some will negotiate combined pricing below the sum. Estimated revenue compression: 15% of overlap revenue. $16M × 15% = $2.4M revenue loss (spread over years 2-3). Risk 3 — Sales disruption: during integration, sales teams are distracted, territories are unclear. Target's new business acquisition drops 20% in year 1. $52M × 20% new business share × 20% decline = $2.1M revenue impact. Risk 4 — Product migration failures: if the combined platform has quality issues, all segments suffer. Estimated: 2% additional churn across both customer bases = $3.2M at risk. Probability: 30%. Expected loss: $960K. Total integration risks by year: year 1: $2.5M + $0 + $2.1M + $480K = $5.1M. Year 2: $1.5M + $1.2M + $0 + $480K = $3.2M. Year 3: $0 + $1.2M + $0 + $0 = $1.2M'"
    weight: 0.35
    description: "Synergies"
  - type: llm_judge
    criteria: "Response covers the combined forecast scenarios and board presentation — combined: 'Combined forecast with synergies and risks: three scenarios for the board: Conservative (synergies delayed, risks front-loaded): year | standalone | synergies (50% of plan) | risks (125% of plan) | total. Year 1: $196M | +$3.1M | -$6.4M | $192.7M. Year 2: $235M | +$6.8M | -$4.0M | $237.8M. Year 3: $275M | +$9.1M | -$1.5M | $282.6M. Base case (synergies and risks as modeled): year 1: $196M + $6.2M - $5.1M = $197.1M. Year 2: $235M + $13.5M - $3.2M = $245.3M. Year 3: $275M + $18.2M - $1.2M = $292.0M. Optimistic (synergies accelerated, risks contained): year 1: $196M + $9.3M - $3.8M = $201.5M. Year 2: $235M + $20.3M - $2.4M = $252.9M. Year 3: $275M + $27.3M - $0.9M = $301.4M. Net synergy realization: scenario | year 1 | year 2 | year 3 | 3-year total. Conservative: -$3.3M | +$2.8M | +$7.6M | +$7.1M. Base: +$1.1M | +$10.3M | +$17.0M | +$28.4M. Optimistic: +$5.5M | +$17.9M | +$26.4M | +$49.8M. Key insight: year 1 may be slightly accretive or dilutive depending on integration execution. The real value creation happens in years 2-3 as synergies ramp and integration risks fade. Board presentation for the acquisition business case: slide 1 — strategic rationale: combined entity creates a platform play. Eliminates our primary competitor. Cross-sell opportunity to 13,200 non-overlapping customers. Combined NRR potential: 120%+ (vs 115% and 105% standalone). Slide 2 — financial impact: metric | standalone | combined (base). Year 3 ARR: $275M | $292M (+6.2%). 3-year revenue: $706M | $734M (+$28M). 3-year synergies: $0 | +$38M gross, +$28M net of risks. Synergy NPV (at 10% discount): approximately $22M. Slide 3 — integration milestones and risk mitigation: milestone | timeline | risk mitigation. Sales team integration: Q1-Q2 year 1 | retain top 10 target AEs with guaranteed comp. Customer communication: day 1 | CEO letter, no-change-for-12-months guarantee. Product roadmap: Q2 year 1 | combined platform roadmap published. Migration: Q3-Q4 year 2 | phased migration with rollback capability. Slide 4 — tracking and accountability: quarterly synergy tracking scoreboard: synergy type | target | actual | % achieved. Cross-sell (our → their customers): $2.5M | — | —. Reverse cross-sell: $2.2M | — | —. Competitive win rate improvement: $1.5M | — | —. Integration churn: <$2.5M | — | —. The board should review this quarterly to ensure synergies are being captured and risks are being managed. If year 1 synergies are below 50% of plan, escalate integration resources. If churn exceeds 150% of plan, pause migration and focus on retention'"
    weight: 0.30
    description: "Combined"
