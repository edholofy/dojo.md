meta:
  id: expert-revenue-shift
  level: 4
  course: revenue-forecasting
  type: output
  description: "Expert revenue forecasting shift — a combined scenario requiring ML systems, enterprise governance, M&A modeling, and real-time monitoring across a complex organization"
  tags: [shift, combined, assessment, multi-method, expert]

state: {}

trigger: |
  You are the newly hired VP of Revenue Operations at a $300M ARR
  company preparing for IPO in 18 months. The current state:

  4 business units across 3 geographies generating revenue in 5
  currencies. 25,000 customers. Mix of subscription (70%), usage-
  based (20%), and professional services (10%).

  Current problems: (1) Forecast accuracy is 15% MAPE (target: <5%).
  (2) No automated forecasting — everything is manual spreadsheets.
  (3) A $50M acquisition is closing next quarter. (4) The SEC
  requires auditable forecasting processes for IPO. (5) Board wants
  probabilistic forecasts with confidence intervals.

  Build a comprehensive 18-month plan to transform revenue forecasting
  from its current state to IPO-ready, addressing all five problems.

  Task: Design the complete transformation plan with phased
  implementation, technology architecture, organizational design,
  and governance framework.

assertions:
  - type: llm_judge
    criteria: "Response designs the phased transformation plan — plan: 'Revenue forecasting transformation plan: Phase 1 — Foundation (months 1-3): priority: stop the bleeding and establish governance basics. Workstream 1A — Immediate accuracy improvement: diagnose the 15% MAPE. Decompose by BU, geography, and revenue type. Likely findings: services forecast is 25%+ MAPE (lumpy). Subscription is 8% (acceptable but improvable). Usage-based is 18% (volatile). Geographic forecasts have currency exposure unmeasured. Quick wins: implement cohort-based churn forecasting (replace static rates). Calibrate pipeline probabilities against historical close rates. Add seasonal adjustment to all models. Apply currency forward rates instead of spot rates. Target: reduce MAPE from 15% to 10% within 3 months. Workstream 1B — Governance foundation: establish the Forecast Governance Committee (FGC). Create the Revenue Forecasting Council (RFC). Assign BU forecast owners with accountability. Implement the forecast calendar (monthly cadence). Begin documenting assumptions and methodology. Workstream 1C — Data infrastructure: audit all data sources (CRM, billing, product analytics, marketing). Identify data quality issues and establish automated quality checks. Begin building the centralized data warehouse (Snowflake). Establish the feature store foundation. Phase 2 — Automation and M&A integration (months 4-9): Workstream 2A — Automated pipeline: build the automated data ingestion pipeline (5 source systems). Implement the feature computation layer (120+ features nightly). Deploy initial ML ensemble model (XGBoost + Holt-Winters). Set up daily forecast generation and distribution. Target: MAPE below 8%, forecast produced in hours not weeks. Workstream 2B — Acquisition integration: pre-close: build standalone forecast for target ($50M ARR). Model synergies and integration risks (cross-sell, churn, overlap). Post-close: integrate target's data into the forecasting pipeline. Extend the model to cover the combined entity. Track synergy realization vs plan. Workstream 2C — Multi-entity and currency: implement multi-currency forecasting with budget and forward rates. Build intercompany elimination automation. Establish constant currency reporting. Hedge major currency exposures (>10% of consolidated revenue). Phase 3 — IPO readiness (months 10-18): Workstream 3A — SOX compliance: document all forecasting controls (access, change management, segregation of duties). Implement audit trails for every forecast cycle. Build the assumptions register with approval workflows. Conduct internal audit testing of forecast controls. Engage external auditors for pre-IPO readiness assessment. Workstream 3B — Advanced capabilities: deploy LSTM neural network as ensemble member. Implement Monte Carlo simulation for probabilistic forecasts. Build real-time revenue monitoring (daily pacing, anomaly detection). Deploy SHAP interpretability layer for CFO communication. Target: MAPE below 5%, probabilistic forecasts with calibrated intervals. Workstream 3C — Guidance framework: establish guidance range methodology (P25-P75 of Monte Carlo). Build guidance update protocols and triggers. Train CEO and CFO on guidance communication. Conduct mock earnings calls with analyst Q&A preparation'"
    weight: 0.35
    description: "Plan"
  - type: llm_judge
    criteria: "Response covers technology architecture and organizational design — architecture: 'Technology architecture and organizational design: technology stack: layer | tool | purpose. Data ingestion: Fivetran/Airbyte | extract from 5+ source systems. Data warehouse: Snowflake | centralized analytics database. Data transformation: dbt | feature engineering, data quality. ML platform: MLflow/SageMaker | model training, versioning, deployment. Forecasting engine: custom Python service | ensemble model execution. Feature store: Feast/Tecton | pre-computed features for model input. Visualization: Looker/Tableau | executive dashboards, real-time monitoring. Alerting: PagerDuty/Slack | anomaly alerts, threshold notifications. EPM: Anaplan/Adaptive | multi-entity consolidation, scenario planning. Audit: custom logging | immutable audit trail for SOX. Architecture diagram: source systems → data ingestion → Snowflake → dbt transformations → feature store → ML models → forecast output → dashboards + alerts + API. Parallel path: Snowflake → EPM tool → multi-entity consolidation → guidance range. Budget: year 1 total investment: $1.5-2.5M. Technology: $600K-$800K (tools, infrastructure, compute). People: $800K-$1.2M (new hires, see below). Consulting: $200K-$400K (SOX readiness, ML expertise). Training: $50K-$100K (team enablement). ROI: 10% reduction in forecast error on $300M revenue = $30M better resource allocation. Prevention of guidance misses: each miss costs approximately $50-100M in market cap. Organizational design: the Revenue Forecasting Center of Excellence: reporting to: VP Revenue Operations (this role). Team structure: core team (6 FTEs): Director of Revenue Forecasting (hire month 1). 2 forecasting analysts (1 existing, 1 hire month 2). 1 data engineer (hire month 1). 1 ML engineer (hire month 3). 1 forecast governance analyst (hire month 6, for SOX). Extended team (dotted-line): BU forecast owners (4, existing roles with added responsibility). Regional finance leads (3, existing). Data science team member (shared resource). Skills matrix: role | technical skills | domain skills. Director: statistical modeling, team leadership | FP&A, investor relations. Analyst: SQL, Excel, Python basics | revenue accounting, business acumen. Data engineer: Python, SQL, Airflow, dbt | data quality, pipeline reliability. ML engineer: Python, ML frameworks, MLOps | model deployment, monitoring. Governance: SOX experience, documentation | audit, compliance, process design'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers success metrics, risk mitigation, and board communication — success: 'Success metrics and board communication: transformation success metrics: metric | current | month 6 target | month 12 target | month 18 (IPO) target. Forecast MAPE: 15% | 10% | 7% | <5%. Forecast production time: 2 weeks | 3 days | 1 day | same-day. Automation level: 0% | 50% | 80% | 95%. SOX readiness: 0% | 30% | 70% | 100%. Probabilistic forecasts: none | scenarios | Monte Carlo | calibrated intervals. Audit trail coverage: 0% | 50% | 90% | 100%. Monthly milestones: month 3: governance framework operational, MAPE at 10%. Month 6: automated pipeline live, M&A integrated, MAPE at 8%. Month 9: ML models in production, real-time monitoring live. Month 12: SOX controls tested, MAPE at 7%, Monte Carlo operational. Month 15: external audit approval, guidance framework validated. Month 18: IPO-ready — all systems operational, <5% MAPE, full compliance. Risk mitigation: risk | probability | impact | mitigation. Data quality issues delay pipeline: high | medium | assign dedicated data engineer, build quality checks first. ML model does not improve accuracy: medium | medium | keep statistical baseline as fallback, ML must beat benchmark. M&A integration disrupts existing forecast: medium | high | parallel systems for 6 months, do not replace until validated. SOX controls deemed insufficient: low | very high | engage auditors early (month 6), iterate on feedback. Key staff attrition: medium | high | competitive compensation, clear career paths, meaningful work. Board communication plan: quarterly board updates on the transformation: quarter 1 board update: progress: governance established, BU owners assigned, data audit complete. MAPE: improved from 15% to 12% (early quick wins). Key decision: approve $1.8M transformation budget. Quarter 2: progress: automated pipeline live, MAPE at 9%. M&A: integration plan approved, synergy tracking started. Risk: data quality issues in 2 source systems (remediation in progress). Quarter 3: progress: ML models deployed, MAPE at 7%. Real-time monitoring: daily revenue pacing operational. SOX: 70% of controls documented and tested. Quarter 4 (pre-IPO): progress: all systems operational. MAPE: 4.8% (target achieved). SOX: external auditor sign-off received. Guidance: Monte Carlo-based range methodology validated over 6 months. Ready for IPO: the forecasting system can support quarterly guidance, analyst calls, and SEC scrutiny. The transformation narrative for IPO investors: we invested $2M in building an enterprise-grade revenue forecasting system. Our forecast accuracy improved from 15% to <5% MAPE over 18 months. We provide probabilistic revenue guidance with calibrated confidence intervals. Our forecasting process meets SOX compliance requirements. Revenue visibility: 85% of next quarter revenue is already committed/contracted. This positions the company as operationally sophisticated — a positive signal for IPO valuation'"
    weight: 0.30
    description: "Success"
