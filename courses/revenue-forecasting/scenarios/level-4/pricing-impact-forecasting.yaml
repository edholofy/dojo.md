meta:
  id: pricing-impact-forecasting
  level: 4
  course: revenue-forecasting
  type: output
  description: "Pricing impact forecasting — model the revenue impact of pricing changes including elasticity, migration patterns, and competitive response"
  tags: [pricing, elasticity, migration, revenue-impact, modeling, expert]

state: {}

trigger: |
  A chief revenue officer says: "We're planning a major pricing change
  for next quarter and need to forecast the revenue impact precisely.
  Current pricing:

  Starter: $29/month (3,000 customers). Pro: $79/month (2,000
  customers). Enterprise: $199/month (500 customers).
  Total MRR: $87K + $158K + $99.5K = $344.5K ($4.13M ARR).

  Proposed changes: Starter → $39/month (+34%). Pro → $99/month (+25%).
  Enterprise → $249/month (+25%). Grandfather existing customers for
  6 months, then migrate.

  What will happen to revenue? How many customers will we lose?
  What's the net impact after churn and downgrades?"

  Task: Model the complete revenue impact of the pricing change
  including demand elasticity, customer migration patterns, churn
  response, and competitive dynamics.

assertions:
  - type: llm_judge
    criteria: "Response models price elasticity and customer behavior — elasticity: 'Pricing impact modeling — elasticity and customer behavior: price elasticity of demand: price elasticity measures how sensitive customers are to price changes. Elasticity = % change in quantity ÷ % change in price. For SaaS products, elasticity varies by segment: Starter customers (most price-sensitive): typical elasticity: -1.2 to -1.5 (elastic — lose more customers proportionally than price gained). Price increase: +34% ($29 → $39). Expected customer loss: 34% × 1.3 elasticity = 44% at risk. But not all at-risk customers will churn immediately. With 6-month grandfather: month 1-6: minimal churn (grandfathered). Month 7: 15% of Starter customers churn (sticker shock). Month 8-12: additional 10% churn over 6 months (gradual). Total Starter churn from price change: approximately 25% (750 customers). Remaining Starter customers: 2,250 at $39 = $87.75K MRR. Previously: 3,000 at $29 = $87K MRR. Net Starter impact: +$750/month (+0.9%) despite losing 750 customers. Pro customers (moderate sensitivity): elasticity: -0.6 to -0.8 (inelastic — Pro users rely on advanced features). Price increase: +25% ($79 → $99). Expected behavior: 8% churn (160 customers — they value Pro features). 5% downgrade to Starter (100 customers — some can manage with less). 87% accept the increase (1,740 customers). Remaining Pro revenue: 1,740 × $99 = $172.26K + downgrades handled below. Previously: 2,000 × $79 = $158K. Net Pro impact: +$14.26K/month (+9%) with 260 fewer customers. Enterprise customers (least sensitive): elasticity: -0.2 to -0.4 (highly inelastic — deep integration, high switching costs). Price increase: +25% ($199 → $249). Expected behavior: 2% churn (10 customers). 3% negotiate custom pricing (15 customers at $220 avg). 95% accept (475 customers). Enterprise revenue: 475 × $249 + 15 × $220 = $118.28K + $3.3K = $121.58K. Previously: 500 × $199 = $99.5K. Net Enterprise impact: +$22.08K/month (+22%). Gross migration patterns: from Starter: 750 churn to zero, 100 upgrade to Pro (the price gap narrowed). From Pro: 160 churn, 100 downgrade to Starter at $39. From Enterprise: 10 churn. New Starter from Pro downgrades: +100 × $39 = $3.9K. Pro from Starter upgrades: +100 × $99 = $9.9K (some see Starter price increase as reason to get more value at Pro). Net migration MRR impact: +$13.8K from inter-plan movement'"
    weight: 0.35
    description: "Elasticity"
  - type: llm_judge
    criteria: "Response builds the complete revenue forecast with pricing impact — forecast: 'Complete revenue forecast with pricing change: phased timeline: Phase 1 — Grandfather period (months 1-6): all existing customers remain at current prices. New customers sign up at new prices. New customer impact: assume 200 new customers/month (blended across plans). Higher prices may reduce new signups by 10-15%. New customer acquisition: 200 × 0.875 (12.5% reduction) = 175 new customers/month. New customer MRR: approximately $12K/month (at new price points). Month 6 MRR (end of grandfather): existing: $344.5K (unchanged, minus normal churn). Normal churn over 6 months: approximately $34.5K lost. New customers added: 175 × 6 months = 1,050 × average $69 ARPU = $72.5K. Month 6 total MRR: $344.5K - $34.5K + $72.5K = $382.5K. Phase 2 — Migration (months 7-9): the critical period where existing customers transition to new prices. Month 7 (migration month — heaviest churn): starter churn: 15% × 2,850 remaining = 428 customers leave. Pro churn: 5% of 1,900 remaining = 95 leave. Enterprise churn: 1% of 490 remaining = 5 leave. Plan migrations: 100 Starter → Pro, 100 Pro → Starter. Surviving customers now at new prices: Starter: (2,850 - 428 - 100 + 100) × $39 = 2,422 × $39 = $94.5K. Pro: (1,900 - 95 + 100 - 100) × $99 = 1,805 × $99 = $178.7K. Enterprise: (490 - 5) × $249 + 15 × $220 = $485 × $249 + $3.3K = $120.77K + $3.3K = $124.07K. Month 7 MRR: $94.5K + $178.7K + $124.07K + new customers ≈ $409K. Months 8-9: residual churn continues at elevated but declining rate. Additional 5% Starter churn spread over 2 months. Additional 3% Pro churn. Month 9 MRR: approximately $395K (some residual churn, offset by new customers). Phase 3 — New equilibrium (months 10-18): churn returns to normal rates at new price points. MRR grows from the higher per-customer revenue. Month 12 MRR projection: approximately $420K. Month 18 MRR projection: approximately $470K. Revenue comparison — with vs without pricing change: scenario | month 6 MRR | month 12 MRR | month 18 MRR. No price change: $370K | $410K | $460K. With price change: $383K | $420K | $470K. Difference: +$13K | +$10K | +$10K. Annual revenue impact: approximately +$130K/year (+3% of ARR). The pricing change produces a modest net positive revenue impact (+3%) but with significant customer churn risk. The gain is larger at higher price points (Enterprise +22%) and nearly neutral at Starter (+0.9%). Breakeven analysis: the pricing change loses 920 customers (from 5,500 to approximately 4,580). Revenue per remaining customer increases by approximately 18% average. Breakeven point: month 8 (MRR with price change exceeds MRR without). Full payback of lost customers: month 14 (cumulative revenue gap from transition period recovered)'"
    weight: 0.35
    description: "Forecast"
  - type: llm_judge
    criteria: "Response covers risk mitigation and competitive response modeling — risks: 'Risk mitigation and competitive response: competitive response modeling: competitor reactions to our price increase: scenario 1 — competitor holds prices (60% probability): our price increase creates a larger gap. Price-sensitive customers (Starter) may switch to competitor. Additional churn risk: 5-8% of Starter customers (150-240 customers). Revenue impact: -$6K to -$9K MRR. Mitigation: differentiate on features, not price. Emphasize value added since last price change. Scenario 2 — competitor also raises prices (25% probability): industry-wide price increase normalizes the change. Reduced churn risk — customers have nowhere cheaper to go. Net impact: our modeled churn rates drop by 30-40%. Revenue impact: +$3K MRR vs base case. Scenario 3 — competitor cuts prices aggressively (15% probability): competitor sees an opportunity to capture price-sensitive customers. May launch aggressive win-back campaigns targeting our churning customers. Additional churn risk: 10-15% above our baseline model. Revenue impact: -$15K to -$25K MRR. Mitigation: prepare competitive response offers (retention discounts for at-risk accounts). Monitor competitor pricing weekly during migration period. Risk mitigation strategies: strategy 1 — retention offers for at-risk accounts: identify the 750 highest-churn-risk Starter customers (high price sensitivity, low feature usage). Offer 20% discount for 12-month commitment ($31.20/month instead of $39). Cost: 750 × $7.80/month = $5.85K MRR (savings vs new price). Benefit: retain 500 of 750 at-risk customers (67% save rate). Net: lose $5.85K in discount revenue but retain $19.5K in customer revenue. Strategy 2 — migration communication campaign: 90 days before migration: announce changes with clear value justification. 60 days: personalized impact emails showing each customer's new price and what they get for it. 30 days: offer annual pre-pay at a 15% discount (locks in customers, improves retention). Migration day: ensure smooth billing transition, support team on standby. Strategy 3 — feature gate incentives: add 2-3 new features exclusive to the new pricing (reward those who accept the increase). Customers who accepted Pro at $99 get access to an advanced analytics feature. This makes the price increase feel like a plan upgrade, not just a cost increase. Monitoring during migration: daily tracking during months 7-9: metric | threshold | action. Daily churn count: >20/day for 3+ days → activate retention war room. Competitor mentions in churn reasons: >30% → launch competitive response. Support ticket volume: >2x normal → add support capacity. Social media sentiment: negative spike → activate PR response. NPS score: drops >10 points → executive communication to customers. Post-migration assessment (month 10): actual churn vs modeled churn: if actual > 130% of model → pricing was too aggressive, consider partial rollback. ARPU increase vs plan: if < 80% of modeled increase → migration execution issue. Customer satisfaction: if NPS drops >15 points → long-term retention risk. Revenue trajectory: is new equilibrium growth rate above or below pre-change rate?'"
    weight: 0.30
    description: "Risks"
