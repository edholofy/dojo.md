meta:
  id: real-time-revenue-monitoring
  level: 4
  course: revenue-forecasting
  type: output
  description: "Real-time revenue monitoring — design systems for continuous revenue tracking, intra-month pacing, anomaly detection, and dynamic forecast adjustment"
  tags: [real-time, monitoring, pacing, anomaly-detection, dashboard, expert]

state: {}

trigger: |
  A revenue operations director says: "Our CFO wants to know where
  we stand against the monthly forecast at any point during the month,
  not just at month-end. We need a real-time revenue monitoring
  system.

  Current setup: $100M ARR, 12,000 customers. Revenue comes from:
  subscriptions (recognized daily), usage (metered hourly), and
  professional services (milestone-based). We use Stripe for billing,
  Snowflake for analytics, and Looker for dashboards.

  Last month we didn't realize we were going to miss until day 28.
  We need to know by day 10 if we're off track."

  Task: Design a real-time revenue monitoring system with intra-month
  pacing, anomaly detection, and early warning capabilities.

assertions:
  - type: llm_judge
    criteria: "Response designs the real-time monitoring architecture — architecture: 'Real-time revenue monitoring architecture: data flow design: real-time data sources: Stripe webhooks: every charge, subscription event, refund, and failure is received in real-time. Processing: <30 seconds from event to dashboard update. Events captured: invoice.paid, customer.subscription.updated, charge.refunded, charge.failed. Usage metering: API call counts, storage usage, compute hours. Processing: hourly aggregation from application telemetry. Data pipeline: Stripe webhook → event queue (Kafka/SQS) → event processor → real-time revenue table (Snowflake). Usage telemetry → hourly aggregation → usage revenue calculation → Snowflake. Services milestones → manual entry validated by PM → Snowflake. Revenue recognition layer: subscription recognition engine: for each active subscription, calculate daily recognized revenue. $100/month subscription = $3.33/day (or exact based on days in month). Running total: at any point, sum all daily recognition from day 1 to current day. Usage recognition: calculated hourly based on metered usage. Running total updates every hour. Services recognition: recognized upon milestone completion (event-driven, not daily). Intra-month revenue pacing: the pacing model compares actual accumulated revenue to where we should be at this point in the month. Expected daily revenue curve: not all days are equal. Subscriptions: roughly linear (equal daily recognition). Usage: front-loaded on business days, lower on weekends. Services: lumpy (milestones can complete any day). Building the pacing curve: day-of-month | expected cumulative % of monthly revenue. Day 1: 3.3% | Day 5: 16.7% | Day 10: 33.3%. Day 15: 50.0% | Day 20: 66.7% | Day 25: 83.3%. Day 28-31: 90-100%. Adjusted for day-of-week effects: business days have higher revenue recognition than weekends. The pacing model accounts for this by using a day-weighted expected curve. Pacing metric: Revenue Pace Index (RPI): RPI = (actual cumulative revenue ÷ expected cumulative revenue at this day) × 100. RPI = 100: exactly on pace. RPI > 100: ahead of pace (likely to beat forecast). RPI < 100: behind pace (may miss forecast). Example on day 10: monthly forecast: $8.5M. Expected by day 10: $8.5M × 33.3% = $2.83M. Actual through day 10: $2.65M. RPI = ($2.65M ÷ $2.83M) × 100 = 93.6. Interpretation: we are 6.4% behind pace. If this continues, month-end projected revenue = $8.5M × 93.6% = $7.96M — a $540K miss'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers anomaly detection and early warning system — anomaly: 'Anomaly detection and early warning: multi-level anomaly detection: Level 1 — Daily revenue anomalies: detect unusual daily revenue compared to expected. Method: control chart (SPC) approach. Calculate historical mean and standard deviation for each day type (Monday, Tuesday, etc.). Flag if daily revenue falls outside ±2 standard deviations. Example: typical Tuesday revenue: $290K ± $25K. Today (Tuesday): $230K. Z-score: ($230K - $290K) ÷ $25K = -2.4. This is a significant anomaly — investigate immediately. Possible causes: payment processing issue (check Stripe). Large customer churn event. Billing system error. Calendar effect (holiday in a key market). Level 2 — Cumulative pace anomalies: detect when cumulative revenue diverges from expected pace. Warning threshold: RPI below 95 for 3+ consecutive days. Critical threshold: RPI below 90 for 2+ consecutive days. Day-over-day RPI trend: if RPI is declining for 5+ consecutive days, something structural is changing even if absolute RPI is still above 95. Level 3 — Component anomalies: monitor each revenue component separately. Subscription MRR anomalies: daily new subscription MRR drops >30% vs 7-day average. Daily churn MRR exceeds 2x the 7-day average. Usage revenue anomalies: hourly usage volume drops >40% vs same-hour-last-week. Total daily usage is 2+ standard deviations below normal. Services revenue anomalies: milestone completions behind schedule by >2 weeks. Pipeline of upcoming milestones insufficient to meet monthly forecast. The early warning alert system: alert | trigger | recipient | action. Info: RPI 95-100 for 2+ days | Rev Ops | monitor, no action. Warning: RPI 90-95 for 2+ days | Rev Ops + VP Finance | investigate root cause. Critical: RPI <90 for 2+ days | CFO + CRO | emergency review, forecast adjustment. Anomaly: daily revenue >2 SD from expected | Rev Ops + Engineering | investigate, rule out technical issues. The day-10 early warning: by day 10, the system can project month-end with reasonable accuracy. Projection methods: linear extrapolation: actual ÷ expected_pct × 100% = projected month-end. Historical pattern matching: find past months with similar day-10 RPI, average their final outcomes. Component projection: project each component separately based on its own pace. Ensemble of all three methods provides the most reliable day-10 estimate. Historical accuracy of day-10 projections: MAPE of day-10 projections for final month-end: average MAPE: 4.2% (compared to 8% at month start). 80% of months: within ±5% of final. 95% of months: within ±8% of final. By day 10, we eliminate half the forecast uncertainty. By day 20, we eliminate 80% — the forecast should be within 2% of final'"
    weight: 0.35
    description: "Anomaly"
  - type: llm_judge
    criteria: "Response covers dynamic forecast adjustment and dashboarding — dashboard: 'Dynamic forecast adjustment and dashboard design: dynamic forecast adjustment: the system continuously updates the month-end forecast as data arrives. Day 1: forecast = model forecast (purely predictive). Day 5: forecast = 80% model + 20% actual pace projection. Day 10: forecast = 60% model + 40% actual pace. Day 15: forecast = 40% model + 60% actual pace. Day 20: forecast = 20% model + 80% actual pace. Day 25: forecast = 5% model + 95% actual pace. By day 25, the forecast is essentially known — only remaining services milestones add uncertainty. Auto-adjustment triggers: if the dynamic forecast deviates from the original model forecast by >5%: automatically update the downstream quarterly and annual forecasts. Notify stakeholders of the revised outlook. Document the change reason based on component analysis. Dashboard design — the Revenue Cockpit: section 1 — Current month summary: metric | value | status. Month-end forecast: $8.5M → $8.2M (revised) | warning. Revenue through today: $5.1M (day 18) | on pace for revised. Days remaining: 13 | — . RPI: 96.3 | slightly behind original pace. section 2 — Daily revenue chart: X-axis: days of month (1-31). Lines: expected daily cumulative (forecast pace line). Actual daily cumulative (actual revenue line). Prior month same-day (comparison). Shaded area: ±5% forecast confidence band. Visual: if the actual line drops below the confidence band, the area turns from green to yellow (warning) to red (critical). section 3 — Component breakdown: component | forecast | pace | projected | delta. Subscriptions: $6.8M | 97% | $6.6M | -$200K. Usage: $1.2M | 91% | $1.09M | -$110K. Services: $500K | 80% | $400K | -$100K. Total: $8.5M | 95% | $8.1M | -$400K. This immediately shows: services is the weakest component (2 milestones at risk). Usage is slightly soft (investigate customer usage patterns). Subscriptions are close to plan (minor churn issue). section 4 — Anomaly log: date | type | description | status | impact. Day 8: churn spike | 12 customers cancelled ($45K MRR) vs 5 expected | investigating | -$100K. Day 14: usage dip | API volume 15% below normal | resolved (customer maintenance window) | temporary. Day 16: milestone delay | Project Alpha delivery pushed 2 weeks | escalated | -$80K at risk. section 5 — Rolling forecast: month | original forecast | current estimate | change. Current month: $8.5M | $8.2M | -$300K. Next month: $8.8M | $8.6M | -$200K (cascade effect). Month after: $9.1M | $8.9M | -$200K. The CFO can see: we will likely miss this month by approximately $300K. The impact cascades slightly into future months. The primary drivers are identifiable and being addressed'"
    weight: 0.30
    description: "Dashboard"
