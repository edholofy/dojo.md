meta:
  id: customer-lifecycle-optimization
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Optimize the entire customer lifecycle for retention — from first touch through maturity, identifying and eliminating churn risk at every stage"
  tags: [churn, lifecycle, end-to-end, optimization, master]

state: {}

trigger: |
  You're the CCO of "LifecycleSaaS" ($200M ARR, 15,000 customers).
  You've been given a mandate: "Reduce churn at every stage of the
  customer lifecycle." Your analysis reveals churn concentrates at
  specific lifecycle moments.

  Churn by lifecycle stage:

  Stage 1: First 30 days (Onboarding)
  - 8% of new customers churn in first month
  - Root cause: Failed to reach "aha moment"
  - Key metric: Time to first value (currently 21 days, target: 7)
  - Signal: 40% of churners never completed onboarding

  Stage 2: Days 31-90 (Adoption)
  - 12% additional churn
  - Root cause: Feature adoption stalls after initial setup
  - Key metric: Features adopted (currently 2.3, target: 5)
  - Signal: Usage plateaus or declines after initial spike

  Stage 3: Days 91-365 (Maturity)
  - 8% additional churn
  - Root cause: Not enough value to justify renewal at first anniversary
  - Key metric: QBR completion rate (currently 40%)
  - Signal: Declining login frequency 60 days before renewal

  Stage 4: Year 1+ (Expansion or Contraction)
  - 5% annual churn for customers past year 1
  - Root cause: Competitive alternatives, champion departure, budget
  - Key metric: NRR per cohort
  - Signal: Contraction before churn (80% of churners downgraded first)

  Stage 5: Renewal (every 12 months)
  - 40% of total churn happens within 60 days of renewal date
  - Root cause: Procurement re-evaluation triggers competitive bids
  - Key metric: On-time renewal rate (currently 65%)
  - Signal: Non-response to renewal outreach

  Tasks:
  1. Design the lifecycle-stage intervention for each stage. What
     specific actions reduce churn at each moment?

  2. "80% of churners downgraded first." Design the contraction-to-
     churn prevention playbook.

  3. Create the unified customer health score that incorporates
     lifecycle stage — a Day 15 customer and a Year 3 customer
     shouldn't be scored the same way.

  4. If you can only invest in 2 of 5 stages, which 2 have the
     highest ROI? Show your analysis.

assertions:
  - type: llm_judge
    criteria: "Lifecycle interventions are stage-specific — proposes different actions for each stage based on the unique churn drivers at that moment"
    weight: 0.25
    description: "Stage-specific interventions"
  - type: llm_judge
    criteria: "Contraction prevention playbook is proactive — identifies contraction signals early and intervenes before the customer moves from contraction to churn"
    weight: 0.25
    description: "Proactive contraction prevention"
  - type: llm_judge
    criteria: "Lifecycle-aware health score adjusts weights — scores early-stage customers on activation metrics and mature customers on engagement and expansion signals"
    weight: 0.25
    description: "Lifecycle-aware health scoring"
  - type: llm_judge
    criteria: "Investment prioritization shows analysis — quantifies churn reduction potential and ARR saved for each stage to identify the highest-ROI investment"
    weight: 0.25
    description: "Analytical investment prioritization"
