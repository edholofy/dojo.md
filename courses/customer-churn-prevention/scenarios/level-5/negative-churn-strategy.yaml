meta:
  id: negative-churn-strategy
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Achieve and sustain negative churn (NRR > 130%) through expansion, usage-based growth, and product-led retention at the highest level"
  tags: [churn, negative-churn, NRR, expansion, master]

state: {}

trigger: |
  You're the Chief Revenue Officer at "HyperGrowth" ($400M ARR,
  publicly traded). The board's new mandate: Achieve 130% NRR (best
  in class for public SaaS).

  Current state:
  - GRR: 91% (solid, but room to improve)
  - NRR: 115% (good but not best-in-class)
  - Expansion revenue: 24% of starting ARR
  - Contraction: 4% of starting ARR

  To reach 130% NRR, you need:
  - Expansion to reach 39-43% (currently 24%)
  - Churn + contraction to stay at or below 9-13%

  Expansion levers:
  1. Seat-based expansion: Add users as customers grow. Currently
     generates 40% of expansion revenue.
  2. Usage-based pricing: Charge by API calls/data volume. Not yet
     implemented — would change the pricing model.
  3. Cross-sell new products: 2 new product lines launched this year.
     Adoption: 8% of existing customers.
  4. Upgrade to higher tiers: Only 15% of customers are on the
     highest tier.
  5. Platform effect: Customers who use 3+ products have 140% NRR.
     Only 12% of customers use 3+.

  Companies with 130%+ NRR (benchmarks):
  - Snowflake: Usage-based pricing drives natural expansion
  - Twilio: Volume-based growth tied to customer success
  - Datadog: Land-and-expand with 16+ products
  - CrowdStrike: Module cross-sell and threat expansion

  Constraints:
  - Can't raise prices more than 5% annually (competitive pressure)
  - New products aren't mature enough for aggressive cross-sell
  - Sales team is quota'd on new logos, not expansion

  Tasks:
  1. Design the path to 130% NRR. Which expansion levers generate
     the most value? Show the math for each lever.

  2. Should you switch to usage-based pricing? Analyze the revenue
     model change using the benchmark companies.

  3. How do you get from 12% multi-product adoption to 40%? Design
     the cross-sell program that feels helpful, not pushy.

  4. The sales team isn't incentivized for expansion. Design the
     comp restructure that aligns the entire revenue team.

assertions:
  - type: llm_judge
    criteria: "NRR path is quantified per lever — shows how much each expansion lever contributes and which combination reaches 130%"
    weight: 0.25
    description: "Quantified NRR path per lever"
  - type: llm_judge
    criteria: "Usage-based pricing analysis is thorough — considers revenue predictability trade-offs, customer behavior changes, and lessons from benchmark companies"
    weight: 0.25
    description: "Thorough usage pricing analysis"
  - type: llm_judge
    criteria: "Cross-sell program is customer-centric — uses product-led discovery, usage signals, and value-based recommendations rather than aggressive sales pushes"
    weight: 0.25
    description: "Customer-centric cross-sell"
  - type: llm_judge
    criteria: "Comp restructure aligns on expansion — proposes specific changes (expansion quota, NRR bonuses, CS-sales co-sell) that incentivize the right behaviors"
    weight: 0.25
    description: "Expansion-aligned comp restructure"
