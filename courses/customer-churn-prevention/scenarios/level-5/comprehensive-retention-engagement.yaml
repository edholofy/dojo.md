meta:
  id: comprehensive-retention-engagement
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Execute a full-day consulting engagement covering retention assessment, strategy design, team optimization, and financial modeling for a company in retention crisis"
  tags: [churn, consulting, comprehensive, full-engagement, master]

state: {}

trigger: |
  You're a world-class retention consultant. "MegaSaaS" ($1B ARR,
  50,000 customers, 500 CS staff) has hired you for a full-day
  intensive. Their retention metrics have deteriorated for 4
  consecutive quarters and the board is alarmed.

  Morning Session (9 AM - 12 PM): Assessment

  Data provided:
  - GRR: 84% → 82% → 80% → 78% (4-quarter decline)
  - NRR: 108% → 104% → 100% → 96% (below 100% = shrinking)
  - Logo retention: 78% (lost 11,000 customers in 12 months)
  - Enterprise GRR: 92% (stable)
  - Mid-market GRR: 82% (declining)
  - SMB GRR: 65% (crisis)
  - Total credits/concessions: $45M last year
  - CS team cost: $60M (6% of revenue)
  - CAC: $18K, LTV: $28K (LTV/CAC: 1.6x — dangerously low)
  - NPS: +8 (industry: +35)
  - Time to value: 35 days (industry: 14)
  - Feature adoption: 22% (industry: 45%)

  Afternoon Session 1 (1-3 PM): Strategy Design
  - Segment-specific retention plans
  - Organizational redesign for the 500-person CS team
  - Technology and automation roadmap
  - Financial model for retention investment

  Afternoon Session 2 (3-5 PM): Implementation
  - 90-day action plan
  - Quick wins that show results this quarter
  - Team restructuring timeline
  - Board communication strategy

  Tasks:
  1. Morning: Present the assessment. What story does the data tell?
     Rank the problems by severity and impact.

  2. Afternoon 1: Design the retention strategy. What changes to
     segments, organization, and technology?

  3. Afternoon 2: Create the 90-day plan with 5 quick wins that
     show measurable improvement.

  4. Close: If MegaSaaS does nothing, project where they'll be in
     12 months. Then project the improvement scenario.

assertions:
  - type: llm_judge
    criteria: "Assessment tells a clear story — identifies the compounding decline, traces it to specific segments and root causes, and quantifies the total cost"
    weight: 0.25
    description: "Clear assessment narrative"
  - type: llm_judge
    criteria: "Strategy is comprehensive — addresses all major levers (segment strategy, team structure, technology, process) with specific recommendations"
    weight: 0.25
    description: "Comprehensive strategy design"
  - type: llm_judge
    criteria: "Quick wins are genuinely achievable in 90 days — proposes actions that can show measurable retention improvement without major infrastructure changes"
    weight: 0.25
    description: "Achievable 90-day quick wins"
  - type: llm_judge
    criteria: "Do-nothing projection is compelling — shows the compounding effect of declining retention on ARR, LTV, and company viability over 12 months"
    weight: 0.25
    description: "Compelling do-nothing projection"
