meta:
  id: retention-consulting-engagement
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Act as a retention strategy consultant assessing a struggling company's churn problems and designing a transformation program"
  tags: [churn, consulting, strategy, assessment, master]

state: {}

trigger: |
  You're a world-class retention consultant. "CrisisCloud" ($300M
  ARR, 20,000 customers) hires you after their annual churn hit 28%
  — the worst in their industry. They've lost $84M in ARR this year.

  Discovery findings:

  Organizational:
  - CS reports to Sales VP (conflict of interest)
  - No CCO or dedicated retention leadership
  - CS team of 15 manages 20,000 accounts (1:1,333 ratio)
  - CS team turnover: 40% annually
  - No career path for CS professionals

  Process:
  - No health scoring (CSMs use "gut feeling")
  - Renewal process starts 30 days before expiry
  - No save playbooks or authorized retention offers
  - Exit interviews: done for <5% of churned customers
  - No dunning optimization (5% of churn is involuntary)

  Product:
  - Time-to-value: 45 days (industry: 14 days)
  - Feature adoption: average customer uses 18% of features
  - Product NPS: +15 (industry: +40)
  - Top churn reason: "Didn't realize the value" (35%)

  Financial:
  - CAC: $8,000
  - LTV: $16,000 (should be $40,000+ at industry retention rates)
  - LTV/CAC: 2x (should be 5x+)
  - Total cost of churn (credits + replacement): $126M/year

  Tasks:
  1. Present your 90-day assessment. What are the top 10 findings
     ranked by impact and urgency?

  2. Design the 18-month transformation roadmap. Phase 1 quick wins,
     Phase 2 structural changes, Phase 3 optimization.

  3. The CEO says: "We can't afford to hire more CS people." Design
     the retention improvement plan within the existing headcount.

  4. Project the financial impact: If you reduce churn from 28% to
     15% over 18 months, what's the ARR and LTV impact?

assertions:
  - type: llm_judge
    criteria: "Assessment is prioritized by impact — ranks findings by revenue impact and urgency, identifying the highest-ROI changes first"
    weight: 0.25
    description: "Impact-prioritized assessment"
  - type: llm_judge
    criteria: "Roadmap is phased with quick wins — Phase 1 delivers measurable improvement in 90 days (dunning, renewal process, basic health scoring)"
    weight: 0.25
    description: "Quick-win phased roadmap"
  - type: llm_judge
    criteria: "Headcount-constrained plan uses automation — proposes tech-touch, automated triggers, and prioritized human intervention to maximize impact per CSM"
    weight: 0.25
    description: "Automation-leveraged constrained plan"
  - type: llm_judge
    criteria: "Financial projection is specific — calculates ARR saved, LTV improvement, and LTV/CAC ratio change with year-by-year projections"
    weight: 0.25
    description: "Specific financial projection"
