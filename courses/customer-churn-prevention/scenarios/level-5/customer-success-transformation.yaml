meta:
  id: customer-success-transformation
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Lead a company-wide transformation from reactive customer support to proactive customer success — changing the operating model, culture, and business outcomes"
  tags: [churn, transformation, operating-model, culture, master]

state: {}

trigger: |
  You're the incoming CCO at "TransformCo" ($500M ARR, 40,000
  customers, 200 CS + Support staff). The CEO hired you because:
  "We have a support team that puts out fires. I want a success
  team that prevents them."

  Current state assessment:

  Operating model: Reactive
  - 80% of CS time is spent on support tickets
  - 15% on renewals (last-minute)
  - 5% on proactive engagement
  - No customer journey mapping
  - No value realization tracking
  - Customer engagement: only when customers reach out

  Team structure:
  - 150 support agents (tier 1-3)
  - 40 CSMs (generalists, fire-fighters)
  - 10 renewals specialists (order takers)
  - No CS operations, no analytics, no enablement

  Metrics:
  - Support CSAT: 3.8/5.0 (declining)
  - First response time: 4 hours (target: 1 hour)
  - Resolution time: 3 days (target: 1 day)
  - GRR: 82% (industry: 90%)
  - NRR: 95% (industry: 115%)
  - No health scores, no churn prediction, no lifecycle tracking

  Target state (in 2 years):
  - Proactive CS model with 70% of CS time spent on prevention
  - GRR: 92%
  - NRR: 118%
  - Support automated with AI for tier 1 (60% deflection)
  - Health scoring and churn prediction for all accounts
  - Customer journey mapped and measured

  Constraints:
  - Cannot increase total headcount by more than 10%
  - Must maintain support quality during transformation
  - Union-like resistance from support agents ("Are you replacing us?")

  Tasks:
  1. Design the 2-year transformation roadmap with quarterly
     milestones.

  2. How do you restructure 200 people without mass layoffs? What
     roles change, who gets retrained, and what new roles are created?

  3. Address the "are you replacing us?" concern from support agents.
     How do you bring the existing team along?

  4. Measure the transformation: What metrics prove you're moving
     from reactive to proactive, and what are the quarterly targets?

assertions:
  - type: llm_judge
    criteria: "Roadmap is phased with clear milestones — progresses from quick wins to structural changes to culture transformation with specific quarterly deliverables"
    weight: 0.25
    description: "Milestone-clear transformation roadmap"
  - type: llm_judge
    criteria: "Restructuring preserves people — retrains support agents into proactive roles (onboarding, adoption, expansion) rather than eliminating positions"
    weight: 0.25
    description: "People-preserving restructuring"
  - type: llm_judge
    criteria: "Change management addresses fear directly — communicates the vision, shows how roles evolve upward (not downward), and provides training and support"
    weight: 0.25
    description: "Fear-addressing change management"
  - type: llm_judge
    criteria: "Transformation metrics are leading — includes proactive engagement rate, health score accuracy, time-to-intervention, and intervention save rate alongside GRR/NRR"
    weight: 0.25
    description: "Leading transformation metrics"
