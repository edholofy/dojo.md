meta:
  id: industry-specific-retention
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Design industry-specific retention strategies for healthcare, financial services, e-commerce, and education SaaS — where churn drivers and solutions differ fundamentally"
  tags: [churn, industry-specific, vertical, strategy, master]

state: {}

trigger: |
  You're a retention strategy consultant advising "VerticalSaaS"
  ($350M ARR), which serves 4 distinct vertical markets. Each
  vertical has unique churn dynamics.

  Healthcare SaaS ($100M ARR, 2,000 customers):
  - Annual churn: 8% (low, due to integration depth and compliance)
  - NRR: 118%
  - Top risk: Regulatory changes (HIPAA updates, CMS requirements)
  - Retention driver: EHR integration depth — takes 6 months to
    implement, creating massive switching costs
  - Churn trigger: Government contract cycles (3-year terms)

  Financial Services SaaS ($120M ARR, 3,000 customers):
  - Annual churn: 12%
  - NRR: 110%
  - Top risk: Security incidents and compliance failures
  - Retention driver: Data-in-place gravity (10 years of financial
    records in your platform)
  - Churn trigger: M&A consolidation (acquirer dictates tools)

  E-commerce SaaS ($80M ARR, 8,000 customers):
  - Annual churn: 22%
  - NRR: 95%
  - Top risk: Seasonal businesses cancel after peak season
  - Retention driver: Revenue attribution (proving ROI)
  - Churn trigger: Monthly billing cycle, low switching costs

  Education SaaS ($50M ARR, 5,000 customers):
  - Annual churn: 30%
  - NRR: 85%
  - Top risk: Budget cycles (academic year, grant expiration)
  - Retention driver: Student/teacher adoption (hard to retrain)
  - Churn trigger: Summer break cancellations, new administration

  Tasks:
  1. For each vertical, design the retention strategy that addresses
     the unique churn drivers.

  2. E-commerce churn is 22%. Can you get it below 15% without
     adding annual contracts? Design the product-led retention
     approach.

  3. Education churn is 30% — the worst segment. Is it worth
     investing in retention or should the company focus on other
     verticals?

  4. Design the universal retention framework that works across all
     4 verticals while allowing vertical-specific customization.

assertions:
  - type: llm_judge
    criteria: "Vertical strategies address unique drivers — healthcare gets compliance focus, fintech gets security and data gravity, e-commerce gets ROI proof, education gets budget cycle alignment"
    weight: 0.25
    description: "Unique vertical strategies"
  - type: llm_judge
    criteria: "E-commerce product-led approach is creative — uses engagement triggers, seasonal planning, and revenue attribution to keep customers engaged year-round"
    weight: 0.25
    description: "Creative e-commerce retention"
  - type: llm_judge
    criteria: "Education investment decision is analytical — evaluates the vertical's contribution margin, improvement potential, and opportunity cost vs. investing in higher-NRR verticals"
    weight: 0.25
    description: "Analytical education decision"
  - type: llm_judge
    criteria: "Universal framework has core + flex — defines common elements (health scoring, renewal process) while allowing vertical-specific customization (triggers, offers, timing)"
    weight: 0.25
    description: "Core-plus-flex universal framework"
