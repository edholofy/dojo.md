meta:
  id: churn-psychology
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Apply behavioral psychology to churn prevention — understanding why customers leave, how decisions are made, and designing interventions based on cognitive biases"
  tags: [churn, psychology, behavioral-science, decision-making, master]

state: {}

trigger: |
  You're a behavioral psychologist consulting for "MindSaaS" ($100M
  ARR, 8,000 customers). They've hired you because their rational
  arguments (features, pricing, ROI) aren't preventing churn. "Our
  customers know we're the better product, but they leave anyway."

  Behavioral insights from churn analysis:

  Insight 1: Loss aversion
  Customers who experienced a single bad incident (even resolved)
  churn at 3x the rate of customers who never had an incident.
  The "loss" of trust outweighs the "gain" of resolution.

  Insight 2: Peak-end rule
  Customers who had a terrible onboarding but great support in month
  6 rate their experience lower than customers who had mediocre
  everything. The peak (bad onboarding) defines the memory.

  Insight 3: Status quo bias
  Long-tenured customers (3+ years) churn at 3% — not because
  they're happier, but because switching feels risky. But once
  they start evaluating alternatives, they leave 70% of the time.

  Insight 4: Social proof
  When a prominent customer churns publicly (blog post, conference
  talk), 5-10 related customers churn within 60 days. One departure
  gives "permission" to others.

  Insight 5: Endowment effect
  Customers who've customized the product heavily (custom integrations,
  workflows, templates) value it more than equivalent features
  elsewhere. Customization = ownership = retention.

  Insight 6: Sunk cost
  Despite textbook economics saying sunk costs are irrelevant,
  customers who've invested time in learning the platform are 2x
  less likely to switch. Making the learning visible increases
  retention.

  Tasks:
  1. Design 6 retention interventions based on each behavioral
     insight. How do you operationalize each one?

  2. The "social proof of churning" effect: Design the containment
     strategy when a prominent customer leaves publicly.

  3. How do you increase the endowment effect — making customers
     invest more in your product so switching costs increase
     psychologically?

  4. Write the "save" conversation script that uses behavioral
     psychology principles. What framing, language, and structure
     maximizes the save rate?

assertions:
  - type: llm_judge
    criteria: "Interventions are psychologically grounded — each intervention directly applies the specific behavioral principle (loss aversion, peak-end, etc.) to a retention action"
    weight: 0.25
    description: "Psychologically grounded interventions"
  - type: llm_judge
    criteria: "Social proof containment is strategic — addresses both the churning customer and the 'at-risk' audience who might follow"
    weight: 0.25
    description: "Strategic social proof containment"
  - type: llm_judge
    criteria: "Endowment effect strategies are ethical — increases investment and customization in ways that benefit the customer, not just lock them in"
    weight: 0.25
    description: "Ethical endowment strategies"
  - type: llm_judge
    criteria: "Save script applies multiple principles — uses loss framing, sunk cost visualization, social proof (who else uses it), and status quo reinforcement"
    weight: 0.25
    description: "Multi-principle save script"
