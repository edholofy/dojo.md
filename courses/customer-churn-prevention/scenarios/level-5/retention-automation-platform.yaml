meta:
  id: retention-automation-platform
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Design a comprehensive retention automation platform — from data ingestion to predictive scoring to automated intervention to measurement"
  tags: [churn, automation, platform, end-to-end, master]

state: {}

trigger: |
  You're the VP of CS Operations at "AutoRetain" ($250M ARR,
  20,000 customers). You've been tasked with building the internal
  "Retention Engine" — a platform that automates the entire
  retention lifecycle.

  Current manual processes:
  1. Health scoring: CSMs manually review accounts weekly (100+
     hours/month across the team)
  2. Risk identification: Monthly report from analytics team
     (2-week lag between signal and action)
  3. Intervention selection: CSMs choose their own approach (no
     consistency, no optimization)
  4. Outreach execution: Manual emails and calls
  5. Offer management: CSMs negotiate individually (no standardized
     playbooks)
  6. Measurement: Quarterly retention review (too infrequent)

  Platform requirements:
  - Real-time health scoring (updated daily, not monthly)
  - Predictive churn alerts (60+ day lead time)
  - Automated intervention triggers (email, in-app, CSM assignment)
  - Dynamic offer engine (right offer for right customer at right time)
  - A/B testing framework for retention interventions
  - ROI tracking per intervention type
  - Integration with: Salesforce, Gainsight, Intercom, Stripe,
    Snowflake data warehouse

  Constraints:
  - 20,000 customers across 4 segments (enterprise, mid-market,
    SMB, self-serve)
  - Budget: $1.5M Year 1, $500K/year ongoing
  - Must show ROI within 6 months
  - Engineering team: 4 engineers allocated

  Tasks:
  1. Design the platform architecture. What are the core systems,
     data flows, and integration points?

  2. Design the dynamic offer engine. How does it determine the
     right retention offer for each customer automatically?

  3. Build the A/B testing framework for retention. How do you
     test interventions ethically (some customers get no
     intervention)?

  4. Calculate the expected ROI. If the platform improves save
     rates from 20% to 35%, what's the revenue impact?

assertions:
  - type: llm_judge
    criteria: "Platform architecture is well-designed — identifies data ingestion, scoring engine, intervention router, offer engine, and measurement system as core components"
    weight: 0.25
    description: "Well-designed platform architecture"
  - type: llm_judge
    criteria: "Offer engine uses multi-factor routing — considers customer segment, risk level, churn reason, historical response to offers, and financial constraints"
    weight: 0.25
    description: "Multi-factor offer engine"
  - type: llm_judge
    criteria: "A/B testing framework is ethical — addresses the control group concern by using holdout percentages, minimum viable sample sizes, and escalation rules"
    weight: 0.25
    description: "Ethical A/B testing framework"
  - type: llm_judge
    criteria: "ROI calculation is credible — quantifies revenue saved from improved save rates, factors in platform cost, and shows clear payback timeline"
    weight: 0.25
    description: "Credible ROI calculation"
