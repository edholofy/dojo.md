meta:
  id: retention-economics-masterclass
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Master the economics of customer retention — modeling LTV, quantifying retention investments, and connecting churn to company valuation"
  tags: [churn, economics, LTV, valuation, master]

state: {}

trigger: |
  You're the Chief Strategy Officer at "ValueSaaS" (pre-IPO, $500M
  ARR, 30,000 customers). The board is preparing for an IPO and
  retention economics are under intense scrutiny from investment
  bankers.

  Current metrics:
  - GRR: 88% (public SaaS median: 90%)
  - NRR: 112% (public SaaS median: 115%)
  - Logo retention: 82%
  - Average contract value: $16.7K
  - CAC: $22K
  - Payback period: 18 months
  - Gross margin: 75%
  - LTV (current): $52K
  - LTV/CAC: 2.4x (target for IPO: 4x+)

  Investment banker questions:
  1. "Your GRR is below median. How does that affect your valuation
     multiple?"
  2. "What's the sensitivity analysis? If GRR drops to 85%, what
     happens to your LTV and growth model?"
  3. "Your NRR of 112% masks underlying churn. What's your gross
     churn rate and how do you plan to improve it?"
  4. "Companies with 120%+ NRR trade at 15x revenue. You're at 112%.
     What's the valuation gap?"

  Modeling challenge:
  The board wants you to model 3 scenarios over 5 years:
  - Scenario A (Status quo): GRR stays at 88%, NRR at 112%
  - Scenario B (Moderate improvement): GRR to 92%, NRR to 118%
  - Scenario C (Best in class): GRR to 95%, NRR to 125%

  Assume: 25% annual new ARR growth, same CAC, 75% margin.

  Tasks:
  1. Answer each investment banker question with data-backed
     responses.

  2. Model the 3 scenarios over 5 years. Show year-by-year ARR,
     LTV, LTV/CAC, and estimated valuation multiple.

  3. What investments are needed to move from Scenario A to Scenario
     B? From B to C? What's the marginal cost of each improvement?

  4. Make the case for investing $20M in retention before the IPO.
     Connect it directly to IPO valuation.

assertions:
  - type: llm_judge
    criteria: "Investment banker answers are financially sophisticated — uses correct SaaS metrics language, cites comparables, and addresses concerns directly"
    weight: 0.25
    description: "Financially sophisticated answers"
  - type: llm_judge
    criteria: "5-year model is coherent — shows compounding effects of retention improvement on ARR, LTV, and unit economics with consistent assumptions"
    weight: 0.25
    description: "Coherent 5-year model"
  - type: llm_judge
    criteria: "Marginal cost analysis is realistic — shows diminishing returns as you move from moderate to best-in-class, identifying the efficient frontier"
    weight: 0.25
    description: "Realistic marginal cost analysis"
  - type: llm_judge
    criteria: "Pre-IPO investment case is compelling — quantifies the valuation uplift from improved NRR in terms of revenue multiple expansion"
    weight: 0.25
    description: "Compelling pre-IPO investment case"
