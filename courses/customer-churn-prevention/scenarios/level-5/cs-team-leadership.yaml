meta:
  id: cs-team-leadership
  level: 5
  course: customer-churn-prevention
  type: output
  description: "Lead and scale a customer success team — hiring, training, performance management, and building a high-performing retention organization"
  tags: [churn, leadership, team-building, CS-operations, master]

state: {}

trigger: |
  You're the newly promoted VP of Customer Success at "ScaleUp"
  ($180M ARR, 12,000 customers). You're inheriting a team that's
  been through rough times.

  Team state:
  - 20 CSMs managing 12,000 accounts (600:1 ratio)
  - Annual team turnover: 45% (industry: 25%)
  - Average CSM tenure: 11 months
  - Top performers carry 2x the save rate of bottom performers
  - No career path beyond "Senior CSM"
  - Comp: Base $75K + variable $15K based on renewal rate
  - Morale: Low (4 CSMs have given notice in the past month)

  Performance distribution:
  - Top 20% (4 CSMs): 92% GRR on their accounts, 35% save rate
  - Middle 60% (12 CSMs): 85% GRR, 20% save rate
  - Bottom 20% (4 CSMs): 72% GRR, 8% save rate

  Budget: $3.5M total team budget (headcount + tools + discretionary).
  Growth: Board expects you to handle $250M ARR next year (39% growth)
  with no more than 25% headcount increase (5 additional CSMs).

  Key decisions:
  - Should you keep the 4 bottom performers or replace them?
  - How do you retain the 4 top performers who are being recruited?
  - How do you handle 12,000 accounts with 25 CSMs (from 20)?
  - The team can't scale linearly — what changes structurally?

  Tasks:
  1. Design the CS team structure for $250M ARR. How do you
     organize 25 CSMs to cover 12,000+ accounts?

  2. Address the turnover problem. What changes to comp, career path,
     and culture would reduce turnover from 45% to 20%?

  3. The top 4 performers deliver 2x the results. How do you
     replicate their success across the team?

  4. Design the performance management framework. How do you measure,
     coach, and develop CSMs?

assertions:
  - type: llm_judge
    criteria: "Team structure scales efficiently — proposes tiered coverage (high-touch, mid-touch, tech-touch) or specialization (retention specialists, onboarding, expansion) rather than flat coverage"
    weight: 0.25
    description: "Efficiently scaled team structure"
  - type: llm_judge
    criteria: "Turnover solution is holistic — addresses comp (competitive base + meaningful variable), career path (IC and management tracks), and culture (recognition, autonomy)"
    weight: 0.25
    description: "Holistic turnover solution"
  - type: llm_judge
    criteria: "Top performer replication is systematic — identifies what differentiates top CSMs (behaviors, not traits) and builds enablement programs around those behaviors"
    weight: 0.25
    description: "Systematic performance replication"
  - type: llm_judge
    criteria: "Performance framework is balanced — measures both outcomes (GRR, save rate) and inputs (activities, quality) with coaching cadence and development plans"
    weight: 0.25
    description: "Balanced performance framework"
