meta:
  id: churn-signals-basics
  level: 1
  course: customer-churn-prevention
  type: output
  description: "Identify basic churn signals from customer behavior data and classify risk levels"
  tags: [churn, signals, early-warning, beginner]

state: {}

trigger: |
  You're a junior customer success manager at "TaskFlow" (project
  management SaaS, $10M ARR, 2,000 customers). Your manager asks
  you to review 5 customer accounts and identify churn risk signals.

  Customer data (last 30 days vs. previous 30 days):

  Customer A: "DesignStudio" ($200/month)
  - Logins: 145 → 22 (85% drop)
  - Active users: 12 → 3
  - Projects created: 8 → 0
  - Support tickets: 0 → 0
  - Last login: 3 days ago

  Customer B: "CodeShop" ($500/month)
  - Logins: 200 → 190 (5% drop)
  - Active users: 25 → 24
  - Projects created: 15 → 12
  - Support tickets: 1 → 4 (all about export functionality)
  - Last login: Today

  Customer C: "MarketPro" ($150/month)
  - Logins: 80 → 85 (6% increase)
  - Active users: 5 → 5
  - Projects created: 3 → 4
  - Support tickets: 0 → 1 (asking about competitor feature)
  - Last login: Yesterday

  Customer D: "BuildCo" ($300/month)
  - Logins: 100 → 95 (5% drop)
  - Active users: 10 → 10
  - Projects created: 5 → 5
  - Support tickets: 0 → 0
  - Contract renewal: In 2 weeks
  - No response to last 2 renewal reminder emails

  Customer E: "StartupX" ($100/month)
  - Logins: 50 → 60 (20% increase)
  - Active users: 3 → 5
  - Projects created: 2 → 6
  - Support tickets: 0 → 3 (all asking about upgrading)
  - Last login: Today

  Tasks:
  1. Rank these customers by churn risk (highest to lowest). Explain
     your reasoning for each ranking.

  2. For each high-risk customer, identify the specific churn signals
     that concern you.

  3. Which customer is NOT a churn risk but might look like one at
     first glance? Why?

  4. For the highest-risk customer, write a brief outreach email to
     re-engage them.

assertions:
  - type: llm_judge
    criteria: "Risk ranking is correct — identifies Customer A as highest risk (massive usage drop), Customer D as high risk (renewal silence), Customer C as moderate (competitor inquiry), and Customer E as low/no risk (growing usage)"
    weight: 0.25
    description: "Correct risk ranking"
  - type: llm_judge
    criteria: "Churn signals are specifically identified — names usage decline, active user drop, project creation halt, renewal non-response, and competitor feature inquiry as distinct signals"
    weight: 0.25
    description: "Specific signal identification"
  - type: llm_judge
    criteria: "False positive is recognized — identifies Customer B or E as not a true churn risk despite surface-level signals (B has support tickets but stable usage; E is growing)"
    weight: 0.25
    description: "False positive recognition"
  - type: llm_judge
    criteria: "Re-engagement email is appropriate — tone is helpful not desperate, references their previous usage, offers value, and includes a specific call to action"
    weight: 0.25
    description: "Appropriate re-engagement email"
