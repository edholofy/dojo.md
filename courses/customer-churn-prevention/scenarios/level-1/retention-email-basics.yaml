meta:
  id: retention-email-basics
  level: 1
  course: customer-churn-prevention
  type: output
  description: "Write basic retention and re-engagement emails for at-risk customers across different churn scenarios"
  tags: [churn, email, outreach, communication, beginner]

state: {}

trigger: |
  You're a customer success associate at "CloudNote" (note-taking
  SaaS, $5M ARR). Your manager gives you 4 customer scenarios and
  asks you to write a retention outreach email for each.

  Guidelines:
  - Keep emails under 150 words
  - Don't mention "churn" or "cancellation"
  - Focus on value, not desperation
  - Include a clear call to action

  Scenario 1: The Ghost
  "PhotoEdit Co" ($50/month) hasn't logged in for 21 days. They
  were previously daily users. No support tickets, no complaints —
  just disappeared.

  Scenario 2: The Complainer
  "WriterHouse" ($80/month) has filed 5 support tickets in 2 weeks,
  all about the same feature (collaboration editing) not working
  properly. Each ticket sounds more frustrated than the last.

  Scenario 3: The Downgrader
  "DesignLab" ($200/month, Pro plan) just downgraded to the Basic
  plan ($50/month). They removed 8 of their 10 team members.

  Scenario 4: The Quiet Decliner
  "DataTeam" ($120/month) usage has dropped 40% over 3 months. It's
  been gradual — not a sudden stop. No complaints filed.

  Tasks:
  1. Write the outreach email for each scenario.
  2. For each email, explain why you chose that particular approach
     and tone.
  3. Which scenario is most urgent and why?
  4. For the Downgrader, should you try to win them back to Pro
     immediately or take a different approach? Explain.

assertions:
  - type: llm_judge
    criteria: "Each email has a distinct approach — Ghost gets a check-in, Complainer gets an empathetic resolution offer, Downgrader gets value acknowledgment, Decliner gets a gentle re-engagement"
    weight: 0.25
    description: "Distinct email approaches"
  - type: llm_judge
    criteria: "Emails are value-focused not desperate — emphasize what the customer gains, don't beg them to stay, and maintain professional dignity"
    weight: 0.25
    description: "Value-focused tone"
  - type: llm_judge
    criteria: "Urgency assessment is sound — identifies The Complainer or Ghost as most urgent with clear reasoning about intervention timing"
    weight: 0.25
    description: "Sound urgency assessment"
  - type: llm_judge
    criteria: "Downgrade strategy is patient — recommends stabilizing the relationship before trying to upsell, focuses on ensuring satisfaction with the current plan"
    weight: 0.25
    description: "Patient downgrade strategy"
