meta:
  id: cancellation-save-basics
  level: 1
  course: customer-churn-prevention
  type: output
  description: "Handle basic customer cancellation requests with appropriate save offers and graceful offboarding"
  tags: [churn, cancellation, save-offer, communication, beginner]

state: {}

trigger: |
  You're a customer success rep at "FormBuilder" (form/survey SaaS,
  $8M ARR, 5,000 customers). You receive 3 cancellation requests
  today.

  Cancellation 1: Price-based
  Email from "SmallBiz LLC" ($30/month, 6 months as customer):
  "Hi, we need to cancel our subscription. We love the product but
  our budget has been cut and we can't justify $30/month right now.
  Please process our cancellation."

  Cancellation 2: Feature gap
  Email from "SurveyTeam" ($80/month, 14 months as customer):
  "We're canceling because you still don't have conditional logic
  in forms. We've been asking for this for a year. We're moving to
  TypeForm which already has it."

  Cancellation 3: Not using it
  Email from "EventCo" ($50/month, 3 months as customer):
  "Cancel our account please. We signed up thinking we'd use it
  more but honestly we haven't touched it in a month. Not worth
  the money."

  Your save offer toolkit:
  - 30% discount for 3 months
  - Free upgrade to next tier for 2 months
  - 1-on-1 onboarding/training session
  - Pause account for up to 3 months (no charge)
  - Downgrade to free tier with limited features

  Tasks:
  1. Write the save response for each cancellation. Match the right
     offer to the right situation.

  2. For Cancellation 2 (feature gap), the feature IS on the roadmap
     for next quarter. How does this change your response?

  3. If the customer insists on canceling despite your save offer,
     write the graceful offboarding response.

  4. Which of these 3 cancellations is most likely to be saved?
     Which is least likely? Why?

assertions:
  - type: llm_judge
    criteria: "Save offers match the reason — price-based gets discount or pause, feature gap gets roadmap info and timeline, non-usage gets onboarding session or downgrade"
    weight: 0.25
    description: "Matched save offers"
  - type: llm_judge
    criteria: "Feature roadmap response is effective — shares the timeline, offers a bridge solution (discount/pause until feature ships), and doesn't over-promise"
    weight: 0.25
    description: "Effective roadmap response"
  - type: llm_judge
    criteria: "Offboarding response is graceful — thanks the customer, offers to help export data, leaves the door open for return, and doesn't guilt-trip"
    weight: 0.25
    description: "Graceful offboarding"
  - type: llm_judge
    criteria: "Save likelihood analysis is reasonable — identifies price-based as most saveable (clear solution) and feature gap or non-usage as least saveable with sound reasoning"
    weight: 0.25
    description: "Reasonable save analysis"
