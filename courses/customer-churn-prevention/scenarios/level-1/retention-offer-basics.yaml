meta:
  id: retention-offer-basics
  level: 1
  course: customer-churn-prevention
  type: output
  description: "Select and present appropriate retention offers based on the customer's reason for leaving and account value"
  tags: [churn, retention-offers, discounts, save, beginner]

state: {}

trigger: |
  You're a customer success rep at "EmailPro" (email marketing SaaS,
  $10M ARR). You have a retention offer toolkit and need to match
  the right offer to each situation.

  Retention offer toolkit:
  A. 25% discount for 6 months ($X savings)
  B. Free upgrade to next tier for 3 months
  C. 1-on-1 dedicated onboarding session (1 hour)
  D. Account pause for up to 3 months (no charge)
  E. Annual plan discount (20% off if they commit yearly)
  F. Dedicated account manager for 3 months

  Customer situations:

  Situation 1: "LocalShop" ($40/month, 4 months)
  "We're not sending enough emails to justify the cost. We only
  send our monthly newsletter."
  MRR at risk: $40

  Situation 2: "GrowthCo" ($150/month, 12 months)
  "We love the product but our funding round fell through. We need
  to cut all non-essential software for 3 months."
  MRR at risk: $150

  Situation 3: "BigRetail" ($400/month, 8 months)
  "We're not getting ROI from our email campaigns. Open rates are
  low and we don't know what we're doing wrong."
  MRR at risk: $400

  Situation 4: "TechBlog" ($80/month, 18 months)
  "Competitor X is offering the same features for $50/month. Why
  should I stay?"
  MRR at risk: $80

  Tasks:
  1. Select the best retention offer for each situation. Explain your
     reasoning.

  2. For Situation 3, a discount won't solve the problem. What will?
     Write the retention pitch.

  3. For Situation 4, should you match the competitor's price? What
     are the risks of price-matching?

  4. Calculate the cost of each retention offer vs. the cost of
     losing the customer (assume 12-month LTV). Which offers are
     worth making?

assertions:
  - type: llm_judge
    criteria: "Offer matching is logical — LocalShop gets downgrade or training, GrowthCo gets account pause, BigRetail gets dedicated support/training, TechBlog gets value justification or annual discount"
    weight: 0.25
    description: "Logical offer matching"
  - type: llm_judge
    criteria: "BigRetail solution addresses root cause — offers training, strategy help, or dedicated manager to improve campaign performance, not just a discount"
    weight: 0.25
    description: "Root-cause BigRetail solution"
  - type: llm_judge
    criteria: "Price-matching risk is understood — explains that price-matching sets a precedent, erodes margins, and doesn't address whether the competitor actually delivers equivalent value"
    weight: 0.25
    description: "Price-matching risk awareness"
  - type: llm_judge
    criteria: "Cost analysis compares offer cost to churn cost — shows that retaining even at a discount is cheaper than acquiring a replacement customer"
    weight: 0.25
    description: "Offer vs. churn cost analysis"
