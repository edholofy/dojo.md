meta:
  id: exit-interview-basics
  level: 1
  course: customer-churn-prevention
  type: output
  description: "Conduct basic customer exit interviews to understand why customers leave and capture actionable feedback"
  tags: [churn, exit-interview, feedback, learning, beginner]

state: {}

trigger: |
  You're a customer success associate at "ProjectHub" (project
  management SaaS). Three customers canceled this week. Your manager
  wants you to conduct exit interviews and summarize the findings.

  Customer 1: "MediaCo" ($150/month, 18 months)
  Cancellation reason given in form: "Switching to another tool"
  Contact: Sarah, Operations Manager
  What you know: They started a trial with Monday.com last month.

  Customer 2: "ConsultFirm" ($80/month, 6 months)
  Cancellation reason given in form: "Too expensive"
  Contact: James, Owner
  What you know: They only used 3 of 12 available features.

  Customer 3: "DevTeam" ($200/month, 24 months)
  Cancellation reason given in form: "No longer needed"
  Contact: Maria, CTO
  What you know: They recently adopted Jira and Confluence.

  Tasks:
  1. Write the exit interview invitation email for each customer.
     Make it easy for them to say yes.

  2. Prepare 5 questions for each interview that dig deeper than the
     surface-level cancellation reason.

  3. After the interviews, Customer 1 reveals they switched because
     of a specific feature gap (Gantt charts). Customer 2 reveals
     the real reason is the product felt too complex. Customer 3
     reveals they consolidated tools. Write the feedback summary
     for your product team.

  4. Which of these 3 exits provides the most actionable insight for
     preventing future churn? Why?

assertions:
  - type: llm_judge
    criteria: "Interview invitations are low-friction — short, acknowledges the cancellation without judgment, explains the purpose, and offers flexible scheduling"
    weight: 0.25
    description: "Low-friction interview invitations"
  - type: llm_judge
    criteria: "Questions dig deeper — goes beyond the surface reason to explore decision timeline, alternatives considered, what would have changed their mind, and what they'll miss"
    weight: 0.25
    description: "Deep-digging questions"
  - type: llm_judge
    criteria: "Feedback summary is actionable — presents findings in a format the product team can act on, distinguishing between feature gaps, UX issues, and market shifts"
    weight: 0.25
    description: "Actionable feedback summary"
  - type: llm_judge
    criteria: "Most actionable exit is correctly identified — recognizes that the 'too complex' feedback (Customer 2) or specific feature gap (Customer 1) is more actionable than tool consolidation"
    weight: 0.25
    description: "Correct actionability assessment"
