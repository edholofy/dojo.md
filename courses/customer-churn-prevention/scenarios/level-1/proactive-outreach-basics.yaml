meta:
  id: proactive-outreach-basics
  level: 1
  course: customer-churn-prevention
  type: output
  description: "Design and execute basic proactive outreach campaigns for at-risk customers before they consider leaving"
  tags: [churn, proactive-outreach, intervention, early-warning, beginner]

state: {}

trigger: |
  You're a customer success associate at "ChatBot Pro" (conversational
  AI SaaS, $6M ARR, 3,000 customers). Your system flagged 20
  customers as "at risk" based on declining usage metrics.

  The at-risk list breaks down into patterns:

  Pattern A — Onboarding stall (8 customers):
  Signed up 2-4 weeks ago, completed setup but never launched their
  first chatbot. Average plan: $50/month.

  Pattern B — Post-honeymoon decline (7 customers):
  Active for 3-6 months, usage peaked 2 months ago and has been
  declining 15-20% each month since. Average plan: $100/month.

  Pattern C — Seasonal or event-driven (5 customers):
  Were very active during a specific period (holiday season, product
  launch) but usage dropped 80%+ after. Average plan: $75/month.

  Your time: You can spend 1 hour per day on proactive outreach.
  You can't individually call all 20 customers.

  Tasks:
  1. Prioritize: Which pattern should you address first? Why?

  2. Design a scalable outreach approach for each pattern. What
     message do you send, and can you batch similar cases?

  3. For Pattern A (onboarding stall), write the outreach email that
     gets them to launch their first chatbot.

  4. For Pattern C (seasonal), should you even try to retain them?
     Or is their usage pattern expected? How do you decide?

assertions:
  - type: llm_judge
    criteria: "Prioritization considers timing — identifies Pattern A (onboarding stall) as most urgent because early intervention has the highest save rate"
    weight: 0.25
    description: "Timing-aware prioritization"
  - type: llm_judge
    criteria: "Outreach is scalable — proposes template-based but personalized emails for each pattern, not 20 individual custom messages"
    weight: 0.25
    description: "Scalable outreach design"
  - type: llm_judge
    criteria: "Onboarding email removes barriers — identifies common stall reasons (complexity, unclear next step) and offers specific help like a template or quick-start guide"
    weight: 0.25
    description: "Barrier-removing onboarding email"
  - type: llm_judge
    criteria: "Seasonal analysis is nuanced — distinguishes between customers who naturally have seasonal usage vs. those who tried the product and stopped, and proposes different approaches"
    weight: 0.25
    description: "Nuanced seasonal analysis"
