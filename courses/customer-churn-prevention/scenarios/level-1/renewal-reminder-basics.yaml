meta:
  id: renewal-reminder-basics
  level: 1
  course: customer-churn-prevention
  type: output
  description: "Write effective contract renewal reminders that drive on-time renewals and identify at-risk accounts early"
  tags: [churn, renewal, communication, timing, beginner]

state: {}

trigger: |
  You're a customer success associate at "AnalyticsPro" (analytics
  SaaS, $20M ARR). You manage 50 accounts, and 8 are up for renewal
  next month. Your manager wants you to start the renewal outreach.

  Renewal playbook timing:
  - 90 days out: Health check and value review
  - 60 days out: Renewal discussion and proposal
  - 30 days out: Contract sent for signature
  - 14 days out: Follow-up if not signed
  - 7 days out: Urgent reminder
  - Day of: Final notice

  Your 8 renewal accounts:

  High confidence (4):
  - "RetailBrand" ($500/mo) — Health score: 92, expanding team
  - "FinanceOrg" ($300/mo) — Health score: 88, just praised you in NPS
  - "TechCo" ($400/mo) — Health score: 85, using all features
  - "MediaGroup" ($250/mo) — Health score: 80, stable usage

  Medium confidence (2):
  - "StartupHub" ($150/mo) — Health score: 62, usage declining
  - "AgencyPro" ($200/mo) — Health score: 58, champion left company

  Low confidence (2):
  - "SmallBiz" ($100/mo) — Health score: 35, barely using product
  - "OldClient" ($350/mo) — Health score: 40, filed 6 complaints

  Tasks:
  1. Write the 90-day renewal email for one high-confidence and one
     low-confidence account. How do they differ?

  2. AgencyPro's champion left the company. How do you handle renewal
     when your internal advocate is gone?

  3. You're at the 30-day mark and SmallBiz hasn't responded to any
     outreach. What's your escalation plan?

  4. Should you try to upsell high-confidence accounts at renewal?
     What's the risk?

assertions:
  - type: llm_judge
    criteria: "Renewal emails differ by confidence — high-confidence focuses on value expansion, low-confidence focuses on addressing concerns and demonstrating value"
    weight: 0.25
    description: "Confidence-appropriate renewal emails"
  - type: llm_judge
    criteria: "Champion departure is handled proactively — suggests identifying a new champion, re-establishing the value narrative, and scheduling a meeting with the new decision-maker"
    weight: 0.25
    description: "Proactive champion departure handling"
  - type: llm_judge
    criteria: "Non-responsive escalation is structured — proposes multi-channel outreach (phone, email, LinkedIn), involves manager, and has a clear decision point for when to stop"
    weight: 0.25
    description: "Structured escalation plan"
  - type: llm_judge
    criteria: "Upsell timing advice is cautious — recognizes that upselling at renewal can backfire and recommends securing the renewal first before expanding"
    weight: 0.25
    description: "Cautious upsell timing"
