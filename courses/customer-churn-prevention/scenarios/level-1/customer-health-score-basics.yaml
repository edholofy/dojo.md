meta:
  id: customer-health-score-basics
  level: 1
  course: customer-churn-prevention
  type: output
  description: "Understand and interpret basic customer health scores to prioritize retention outreach"
  tags: [churn, health-score, metrics, prioritization, beginner]

state: {}

trigger: |
  You're a customer success associate at "HelpDesk Pro" (customer
  support SaaS, $15M ARR). The company uses a simple health score
  (0-100) based on 4 factors:

  Health score formula:
  - Product usage (0-30 points): Based on daily active users vs.
    licensed seats
  - Feature adoption (0-25 points): % of key features used at least
    once in last 30 days
  - Support sentiment (0-25 points): Based on CSAT scores and ticket
    volume trends
  - Engagement (0-20 points): Logins, webinar attendance, community
    participation

  Scoring brackets:
  - 80-100: Healthy (green)
  - 50-79: At risk (yellow)
  - 0-49: Critical (red)

  Your assigned accounts and their scores:

  Account 1: "RetailCo" — Score: 42 (Red)
  Usage: 8/30 | Adoption: 10/25 | Sentiment: 15/25 | Engagement: 9/20
  Notes: 50 licensed seats, only 12 active. Using basic ticketing but
  not knowledge base, live chat, or reporting.

  Account 2: "TechStart" — Score: 71 (Yellow)
  Usage: 25/30 | Adoption: 20/25 | Sentiment: 8/25 | Engagement: 18/20
  Notes: High usage but CSAT dropped from 4.5 to 2.8 last month.
  3 escalated tickets about response time.

  Account 3: "AgencyCo" — Score: 55 (Yellow)
  Usage: 15/30 | Adoption: 15/25 | Sentiment: 20/25 | Engagement: 5/20
  Notes: Decent usage and happy with product, but never attends
  webinars, doesn't engage with community or newsletters.

  Account 4: "BigCorp" — Score: 85 (Green)
  Usage: 28/30 | Adoption: 22/25 | Sentiment: 22/25 | Engagement: 13/20
  Notes: Renewal in 3 months. Everything looks great.

  Tasks:
  1. Prioritize these accounts for outreach. Who do you contact first
     and why?

  2. For RetailCo (Red), what's the primary driver of the low score?
     What specific intervention would you recommend?

  3. TechStart is high-usage but low-sentiment. Why is this
     combination particularly dangerous? What do you do?

  4. AgencyCo's low engagement score — is this a real churn risk or
     a false alarm? How do you decide?

assertions:
  - type: llm_judge
    criteria: "Prioritization is correct — TechStart should be highest priority (high usage + crashing sentiment = imminent churn risk) despite RetailCo having a lower raw score"
    weight: 0.25
    description: "Correct prioritization"
  - type: llm_judge
    criteria: "RetailCo intervention targets adoption — identifies low feature adoption as the fixable driver and recommends training or onboarding intervention"
    weight: 0.25
    description: "Adoption-focused RetailCo intervention"
  - type: llm_judge
    criteria: "TechStart danger is recognized — explains that high-usage customers with declining satisfaction are the most dangerous because they're actively frustrated, not just disengaged"
    weight: 0.25
    description: "High-usage low-sentiment danger"
  - type: llm_judge
    criteria: "Engagement false alarm is analyzed — considers whether low engagement without other risk signals is truly dangerous or just reflects a customer who prefers self-service"
    weight: 0.25
    description: "Engagement false alarm analysis"
