meta:
  id: onboarding-completion-retention
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Optimize customer onboarding to drive retention — reducing time-to-value and preventing early-stage churn from incomplete setup"
  tags: [churn, onboarding, time-to-value, activation, intermediate]

state: {}

trigger: |
  You're the Customer Onboarding Manager at "SchedulePro" (scheduling
  SaaS, $15M ARR, 6,000 customers). Data shows a stark correlation
  between onboarding completion and retention:

  Onboarding completion vs. 12-month retention:
  - 100% complete: 92% retention
  - 75% complete: 78% retention
  - 50% complete: 55% retention
  - <25% complete: 25% retention

  Current onboarding stats:
  - Average time to complete onboarding: 14 days (target: 7 days)
  - Onboarding completion rate: 45%
  - Drop-off points:
    Step 1 (account setup): 95% complete
    Step 2 (import data): 72% complete — 23% drop-off
    Step 3 (configure settings): 58% complete — 14% drop-off
    Step 4 (invite team): 42% complete — 16% drop-off
    Step 5 (first scheduled event): 35% complete — 7% drop-off

  Customer feedback on onboarding:
  - "Data import was confusing — I didn't know what format to use"
  - "I didn't realize I needed to invite my team before I could
    use scheduling"
  - "The setup took too long. I signed up to solve a problem today,
    not in 2 weeks"

  Resources:
  - 2 onboarding specialists (handle high-touch for $200+/mo plans)
  - Email automation for all customers
  - In-app tooltips and guided tours
  - Help center with 50 articles
  - Weekly "Getting Started" webinar (avg 20 attendees)

  Tasks:
  1. Redesign the onboarding flow to maximize completion rate. What
     changes do you make and why?

  2. The biggest drop-off is at Step 2 (data import). Design the
     intervention to reduce this from 23% drop-off to <10%.

  3. Create the automated nudge sequence for customers who stall
     at each step. What triggers the nudge and what does it say?

  4. If you could only improve one onboarding metric, which would
     have the biggest retention impact? Why?

assertions:
  - type: llm_judge
    criteria: "Onboarding redesign reduces friction — simplifies steps, reorders for quick wins, and removes unnecessary blockers (like requiring team invites before first use)"
    weight: 0.25
    description: "Friction-reducing onboarding redesign"
  - type: llm_judge
    criteria: "Data import intervention is specific — proposes format auto-detection, CSV templates, assisted import, or skip-for-now option with follow-up"
    weight: 0.25
    description: "Specific import intervention"
  - type: llm_judge
    criteria: "Nudge sequence is well-timed — triggers based on inactivity duration at each step with escalating urgency and offers of help"
    weight: 0.25
    description: "Well-timed nudge sequence"
  - type: llm_judge
    criteria: "Single metric choice is well-reasoned — identifies time-to-value or completion rate with clear reasoning about downstream retention impact"
    weight: 0.25
    description: "Well-reasoned metric priority"
