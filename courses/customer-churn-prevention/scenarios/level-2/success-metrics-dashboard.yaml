meta:
  id: success-metrics-dashboard
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Design and interpret customer success dashboards with GRR, NRR, health scores, and churn cohort analysis to drive retention decisions"
  tags: [churn, metrics, dashboard, NRR, GRR, intermediate]

state: {}

trigger: |
  You're a CS Operations Analyst at "CloudSync" (data sync SaaS,
  $45M ARR, 3,500 customers). The CRO wants a customer success
  dashboard that the leadership team reviews weekly.

  Available metrics:
  - Gross Revenue Retention (GRR): 88% (target: 92%)
  - Net Revenue Retention (NRR): 105% (target: 115%)
  - Logo retention: 82% (target: 90%)
  - Monthly churn rate: 1.5%
  - Average customer health score: 68/100
  - NPS: +32 (industry benchmark: +42)
  - Time to value: 45 days (target: 21 days)
  - Support CSAT: 4.1/5.0

  Cohort analysis (customers by sign-up quarter):
  - Q1 2025 cohort: 85% retained at 12 months
  - Q2 2025 cohort: 78% retained at 9 months
  - Q3 2025 cohort: 72% retained at 6 months (concerning decline)
  - Q4 2025 cohort: 90% retained at 3 months (too early to tell)

  Segment breakdown:
  - Enterprise (500 customers): GRR 95%, NRR 120%, churn 0.5%/mo
  - Mid-market (1,200 customers): GRR 90%, NRR 108%, churn 1.2%/mo
  - SMB (1,800 customers): GRR 78%, NRR 92%, churn 2.5%/mo

  Tasks:
  1. Design the weekly dashboard. What metrics are displayed front
     and center? What's the visual hierarchy?

  2. Analyze the cohort data. Q3 2025 shows concerning decline — what
     happened and what should you investigate?

  3. GRR is 88% but NRR is 105%. What does this gap tell you about
     the business? Is this healthy?

  4. The CRO asks: "Where should we invest to have the biggest
     retention impact?" Use the data to make a recommendation.

assertions:
  - type: llm_judge
    criteria: "Dashboard design prioritizes actionable metrics — leads with GRR/NRR trends, highlights at-risk accounts, and includes segment-level drill-downs"
    weight: 0.25
    description: "Actionable dashboard design"
  - type: llm_judge
    criteria: "Cohort analysis identifies the problem — investigates what changed in Q3 (product changes, onboarding changes, customer mix) that caused declining retention"
    weight: 0.25
    description: "Insightful cohort analysis"
  - type: llm_judge
    criteria: "GRR-NRR gap interpretation is accurate — explains that expansion is masking churn, which is unsustainable and means the base is leaking"
    weight: 0.25
    description: "Accurate GRR-NRR interpretation"
  - type: llm_judge
    criteria: "Investment recommendation is data-driven — identifies SMB retention or time-to-value improvement as highest-impact areas based on the segment and metric data"
    weight: 0.25
    description: "Data-driven investment recommendation"
