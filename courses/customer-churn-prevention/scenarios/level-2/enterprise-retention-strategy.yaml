meta:
  id: enterprise-retention-strategy
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Manage enterprise customer retention with multi-stakeholder relationships, executive escalation, and high-touch save strategies"
  tags: [churn, enterprise, retention, high-touch, intermediate]

state: {}

trigger: |
  You're a senior CSM at "DataVault" (enterprise data management,
  $50M ARR). You manage 15 enterprise accounts ($200K-$1M ARR each).
  Three accounts are showing concerning signals.

  Account 1: "MegaCorp" ($800K/year, 3 years as customer)
  Signals:
  - Your champion (VP of Data) was promoted to a different division
  - New VP of Data is evaluating all vendor contracts
  - Usage is stable but the new VP hasn't responded to 3 meeting
    requests
  - Renewal: 6 months away
  - Your CEO played golf with their CEO last quarter

  Account 2: "FinServe" ($500K/year, 2 years as customer)
  Signals:
  - CSAT dropped from 4.5 to 2.8 after a major migration went badly
  - Their CTO sent an email saying "disappointed in the migration
    experience"
  - They're meeting with Competitor X next Tuesday
  - Renewal: 4 months away

  Account 3: "RetailGiant" ($300K/year, 1 year as customer)
  Signals:
  - Budget cuts announced company-wide (15% reduction)
  - Their project manager asked about downgrade options
  - Feature adoption: only 30% of purchased capabilities used
  - Renewal: 8 months away

  Tasks:
  1. Create a 90-day save plan for each account. Who do you involve,
     what actions do you take, and what's the timeline?

  2. For MegaCorp, how do you get a meeting with the new VP? Design
     the multi-channel outreach strategy.

  3. For FinServe, the competitor meeting is in 5 days. What can you
     do before Tuesday? Should you involve your CEO?

  4. For RetailGiant, should you proactively offer a downgrade to
     save the relationship, or fight for the full contract value?

assertions:
  - type: llm_judge
    criteria: "Save plans are account-specific — MegaCorp needs relationship rebuilding, FinServe needs recovery and competitive blocking, RetailGiant needs value demonstration"
    weight: 0.25
    description: "Account-specific save plans"
  - type: llm_judge
    criteria: "New stakeholder strategy is multi-pronged — uses multiple channels (email, LinkedIn, phone, mutual connections, executive intro) to reach the new VP"
    weight: 0.25
    description: "Multi-channel stakeholder strategy"
  - type: llm_judge
    criteria: "Competitive threat response is urgent — proposes concrete actions before Tuesday (executive call, value review, roadmap preview) and appropriate executive involvement"
    weight: 0.25
    description: "Urgent competitive response"
  - type: llm_judge
    criteria: "Downgrade decision considers long-term value — analyzes whether a proactive downgrade preserves the relationship for future expansion vs. fighting for full value"
    weight: 0.25
    description: "Strategic downgrade decision"
