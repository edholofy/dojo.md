meta:
  id: win-back-campaign-design
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Design win-back campaigns for recently churned customers with appropriate timing, messaging, and offers"
  tags: [churn, win-back, campaign, re-engagement, intermediate]

state: {}

trigger: |
  You're a customer success manager at "MarketPulse" (marketing
  analytics SaaS, $18M ARR). 45 customers churned last quarter.
  The VP wants a win-back campaign.

  Churned customer segments:

  Segment A — Price churned (15 customers, avg $80/month):
  Left because they said the product was too expensive. Most were
  on monthly plans. Average tenure: 6 months.

  Segment B — Feature churned (12 customers, avg $150/month):
  Left for competitors that had specific features you lacked (most
  commonly: social media analytics integration). Average tenure:
  10 months.

  Segment C — Neglect churned (10 customers, avg $120/month):
  Slowly stopped using the product. Didn't respond to outreach.
  No specific complaint. Average tenure: 8 months.

  Segment D — Bad experience churned (8 customers, avg $200/month):
  Left after negative experiences (data errors, slow support,
  billing disputes). Average tenure: 14 months.

  Product updates since they left (2 months ago):
  - Launched social media analytics integration (addresses Segment B)
  - Released a new "Starter" plan at 40% lower price
  - Improved support response time from 24h to 4h
  - Fixed the data accuracy issues that caused complaints

  Budget: $5,000 for the win-back campaign.

  Tasks:
  1. Design the win-back email sequence for each segment. How many
     emails, what timing, what message?

  2. What offer do you make to each segment? Not all need discounts.

  3. Segment D had bad experiences. Can you win them back? What's
     different about this approach?

  4. Set success metrics for the campaign. What win-back rate would
     you consider successful?

assertions:
  - type: llm_judge
    criteria: "Email sequences are segment-specific — different messaging, timing, and number of touches for each segment based on their reason for leaving"
    weight: 0.25
    description: "Segment-specific sequences"
  - type: llm_judge
    criteria: "Offers match churn reasons — price churned get pricing news, feature churned get product updates, neglect churned get re-engagement value, bad experience get acknowledgment and proof of change"
    weight: 0.25
    description: "Reason-matched offers"
  - type: llm_judge
    criteria: "Bad experience win-back is appropriately different — leads with acknowledgment and apology, demonstrates specific improvements, and doesn't push too hard"
    weight: 0.25
    description: "Appropriate bad-experience approach"
  - type: llm_judge
    criteria: "Success metrics are realistic — sets achievable win-back rate targets (5-15% typically) with clear measurement criteria and timeline"
    weight: 0.25
    description: "Realistic success metrics"
