meta:
  id: smb-retention-at-scale
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Design scalable retention programs for SMB customers where individual high-touch outreach isn't economically viable"
  tags: [churn, SMB, scale, automation, intermediate]

state: {}

trigger: |
  You're the Head of SMB Customer Success at "InvoicePro" (invoicing
  SaaS, $20M ARR). You have 8,000 SMB customers paying $20-$100/month.
  SMB churn is 5% monthly (60% annual). You have 2 CSMs covering all
  8,000 accounts.

  The math problem:
  - 8,000 customers ÷ 2 CSMs = 4,000 accounts per CSM
  - At-risk customers (per churn model): 800 at any given time
  - Average call time: 15 minutes
  - Available call time per CSM per day: 6 hours
  - Calls per CSM per day: 24
  - Days to reach all at-risk: 17 days (too slow — most churn by then)

  Current approach: Batch email campaigns to at-risk segments.
  Current save rate: 8% (very low).

  Available tools:
  - Email automation (Intercom)
  - In-app messaging
  - Self-service help center
  - Community forum
  - Webinars (monthly, 50 average attendees)
  - NPS surveys (quarterly)
  - Product usage analytics

  Budget for SMB retention: $50K/year (can't hire more CSMs).

  Tasks:
  1. Design the scalable retention program. How do you cover 8,000
     SMB accounts with 2 CSMs and $50K?

  2. Create the automated retention playbook with triggers, actions,
     and escalation rules. When does a human get involved?

  3. Design a "one-to-many" engagement strategy (webinars, community,
     content) that drives retention without 1:1 calls.

  4. Target: Reduce SMB monthly churn from 5% to 3.5%. Calculate the
     revenue impact and the cost per saved customer.

assertions:
  - type: llm_judge
    criteria: "Retention program is automation-first — uses triggered emails, in-app messaging, and self-service as the primary retention mechanism, reserving CSM time for high-value saves"
    weight: 0.25
    description: "Automation-first retention program"
  - type: llm_judge
    criteria: "Playbook has clear escalation triggers — defines specific thresholds for when automated outreach escalates to human intervention (e.g., MRR above threshold, multiple risk signals)"
    weight: 0.25
    description: "Clear escalation triggers"
  - type: llm_judge
    criteria: "One-to-many strategy is engaging — proposes community building, targeted webinars, and content programs that drive feature adoption and connection"
    weight: 0.25
    description: "Engaging one-to-many strategy"
  - type: llm_judge
    criteria: "Revenue impact calculation is correct — accurately calculates ARR saved from 1.5% churn reduction and cost per saved customer"
    weight: 0.25
    description: "Correct revenue impact calculation"
