meta:
  id: competitive-displacement-defense
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Defend against competitive displacement — monitoring signals, communicating switching costs, and executing counter-strategies when competitors target your customers"
  tags: [churn, competitive, displacement, defense, intermediate]

state: {}

trigger: |
  You're a customer success manager at "CRMPro" ($35M ARR, 4,000
  customers). Your competitive intelligence shows that "RivalCRM"
  just launched an aggressive displacement campaign targeting your
  customers.

  Intelligence gathered:
  - RivalCRM is offering free migration + 50% off first year
  - They're targeting your customers with 500+ contacts (your mid-
    market segment)
  - 3 of your customers mentioned receiving outreach from RivalCRM
  - RivalCRM's product recently added 2 features your customers
    frequently request (workflow automation and AI email writing)

  Your affected customer segments:
  - High-value at-risk (12 accounts, $180K ARR): Have mentioned
    wanting workflow automation or AI features
  - Stable but targeted (40 accounts, $400K ARR): No complaints but
    match the competitor's target profile
  - New customers (20 accounts, $120K ARR): Less than 6 months old,
    still in early adoption, vulnerable

  Your competitive advantages (vs. RivalCRM):
  - Deeper integration ecosystem (200+ integrations vs. 50)
  - Better reporting and analytics
  - Dedicated CSM for accounts >$5K/year
  - 5 years of customer data (migration risk = data loss/disruption)
  - RivalCRM has known reliability issues (3 major outages in 6 months)

  Tasks:
  1. Design the competitive defense playbook for each segment. What
     proactive outreach do you send?

  2. A customer says: "RivalCRM is offering me free migration and
     50% off. Can you match that?" How do you respond?

  3. How do you communicate switching costs (data migration risk,
     learning curve, integration rebuild) without sounding defensive?

  4. Two features your customers want are available from the competitor
     but not from you. How do you handle the feature gap while staying
     honest?

assertions:
  - type: llm_judge
    criteria: "Defense playbook is segment-specific — high-value gets executive attention and feature roadmap previews, stable gets value reinforcement, new gets accelerated onboarding"
    weight: 0.25
    description: "Segment-specific defense"
  - type: llm_judge
    criteria: "Discount request response is value-based — doesn't lead with price matching but emphasizes total value, integration depth, and questions the competitor's reliability"
    weight: 0.25
    description: "Value-based discount response"
  - type: llm_judge
    criteria: "Switching cost communication is educational not defensive — frames migration risks as considerations for their decision, backed by specific examples"
    weight: 0.25
    description: "Educational switching cost communication"
  - type: llm_judge
    criteria: "Feature gap is handled honestly — acknowledges the gap, shares roadmap timing if available, and positions other strengths as compensating"
    weight: 0.25
    description: "Honest feature gap handling"
