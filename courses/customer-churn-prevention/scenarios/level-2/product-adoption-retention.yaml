meta:
  id: product-adoption-retention
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Drive retention through product adoption — identifying under-utilized features and designing intervention programs to increase stickiness"
  tags: [churn, product-adoption, stickiness, feature-usage, intermediate]

state: {}

trigger: |
  You're a customer success manager at "WorkflowPro" (workflow
  automation SaaS, $30M ARR, 5,000 customers). Data shows that
  customers who adopt 5+ features have a 95% annual retention rate,
  while customers using <3 features churn at 40% annually.

  Feature adoption data across your customer base:

  Feature adoption tiers:
  - Power users (5+ features): 20% of customers, 2% churn rate
  - Active users (3-4 features): 35% of customers, 12% churn rate
  - Basic users (1-2 features): 30% of customers, 35% churn rate
  - Dormant (0 features active): 15% of customers, 65% churn rate

  Key features and adoption rates:
  1. Basic workflows (89% adoption) — everyone uses this
  2. Email notifications (72%) — most adopt within first month
  3. Integrations (45%) — requires technical setup
  4. Reporting dashboard (38%) — underutilized but high-value
  5. API access (22%) — developer-dependent
  6. Custom templates (31%) — requires learning curve
  7. Team collaboration (28%) — requires multiple team members
  8. Advanced automations (15%) — complex but highest correlation
     with retention (r=0.82)

  Churn correlation discovery:
  Customers who activate "Reporting dashboard" within 30 days are
  3.2x more likely to retain at 12 months. But 62% of customers
  never open the reporting tab.

  Tasks:
  1. Design a "feature activation" campaign to move Basic users to
     Active users. Which features do you push and why?

  2. The reporting dashboard has the highest retention correlation
     but low adoption. Design the intervention to get customers to
     try it.

  3. Create a 30-60-90 day adoption checklist for new customers that
     optimizes for retention.

  4. How do you measure the success of your adoption campaigns?
     What metrics prove that adoption drives retention?

assertions:
  - type: llm_judge
    criteria: "Feature activation targets the right features — prioritizes reporting dashboard and integrations based on retention correlation, not just ease of adoption"
    weight: 0.25
    description: "Retention-optimized feature targeting"
  - type: llm_judge
    criteria: "Reporting intervention reduces friction — uses in-app prompts, sample reports, or guided tours rather than just email campaigns"
    weight: 0.25
    description: "Friction-reducing reporting intervention"
  - type: llm_judge
    criteria: "Onboarding checklist is retention-focused — sequences feature activation to build toward the 5+ feature threshold within 90 days"
    weight: 0.25
    description: "Retention-focused onboarding checklist"
  - type: llm_judge
    criteria: "Success metrics connect adoption to retention — tracks feature activation rates AND correlates them with retention outcomes, not just adoption in isolation"
    weight: 0.25
    description: "Adoption-retention connected metrics"
