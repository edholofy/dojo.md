meta:
  id: churn-prediction-scoring
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Build and apply churn prediction scoring models using behavioral data, usage patterns, and customer attributes"
  tags: [churn, prediction, scoring, data-driven, intermediate]

state: {}

trigger: |
  You're a customer success analyst at "StreamData" (data analytics
  SaaS, $25M ARR, 3,000 customers). The VP of CS wants you to build
  a churn prediction scoring model.

  Available data points per customer:
  - Login frequency (daily, weekly, monthly)
  - Feature adoption rate (% of available features used)
  - Support ticket volume and sentiment
  - NPS score (last survey)
  - Contract type (monthly vs. annual)
  - Time as customer (months)
  - Billing history (late payments, downgrades)
  - Champion engagement (does the internal champion respond to emails?)
  - API usage volume (for technical customers)
  - Last QBR attendance

  Historical churn data (last 12 months):
  - Total churn: 180 customers (6% annual rate)
  - Top correlations with churn:
    1. Login decline >40% month-over-month (r=0.72)
    2. No QBR attendance for 2+ quarters (r=0.65)
    3. Monthly contract (vs. annual) (r=0.58)
    4. Support ticket CSAT <3.0 (r=0.55)
    5. Feature adoption <20% (r=0.52)
    6. Champion left company (r=0.48)

  Tasks:
  1. Design the scoring model. How do you weight each data point?
     Show the formula and scoring brackets (low/medium/high risk).

  2. Apply your model to these 3 customers:
     - Customer X: Logins -50%, NPS 4, monthly contract, 3 months old,
       feature adoption 15%, no support tickets
     - Customer Y: Logins stable, NPS 8, annual contract, 18 months,
       feature adoption 60%, champion left last week
     - Customer Z: Logins +10%, NPS 6, annual, 12 months, adoption 40%,
       but 5 negative support tickets this month

  3. The VP asks: "How do I know this model is accurate?" How do you
     validate the model against historical churn data?

  4. What's the risk of false positives (flagging healthy customers
     as at-risk)? How do you minimize wasted effort?

assertions:
  - type: llm_judge
    criteria: "Scoring model uses weighted factors — assigns higher weights to stronger correlations (login decline, QBR absence) and creates clear scoring brackets"
    weight: 0.25
    description: "Weighted scoring model"
  - type: llm_judge
    criteria: "Customer applications are consistent — applies the model consistently to all 3 customers and arrives at defensible risk scores"
    weight: 0.25
    description: "Consistent model application"
  - type: llm_judge
    criteria: "Validation approach is sound — proposes backtesting against historical data, precision/recall analysis, or holdout set testing"
    weight: 0.25
    description: "Sound model validation"
  - type: llm_judge
    criteria: "False positive mitigation is practical — proposes threshold tuning, secondary signal confirmation, or tiered response to reduce wasted outreach"
    weight: 0.25
    description: "Practical false positive mitigation"
