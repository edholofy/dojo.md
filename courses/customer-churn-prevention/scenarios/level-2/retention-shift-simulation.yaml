meta:
  id: retention-shift-simulation
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Handle a realistic customer retention shift with multiple at-risk accounts, cancellations, and competitive threats requiring prioritization"
  tags: [churn, shift-simulation, prioritization, intermediate]

state: {}

trigger: |
  You're the on-duty CSM at "ProjectPro" (project management SaaS,
  $22M ARR, 4,500 customers). Your shift: 8 AM to 5 PM.

  8:00 AM — Morning dashboard review
  - 5 new "critical risk" accounts flagged overnight
  - 3 cancellation requests in queue
  - 1 payment failure for a $500/month account
  - Weekly churn report: 18 cancellations last week (up from 12)

  8:30 AM — Urgent escalation
  Your largest at-risk account, "TechCo" ($800/month, 2 years), just
  left a 1-star review on G2: "Switching to Asana after 2 years.
  ProjectPro hasn't innovated in years."

  9:00 AM — Cancellation batch
  Cancel request 1: "Startup Inc" ($50/month, 3 months) — "Too
  expensive for what we get."
  Cancel request 2: "ConsultCo" ($200/month, 14 months) — "Our
  needs have changed."
  Cancel request 3: "DesignTeam" ($150/month, 8 months) — "Your
  competitor offered us a better deal."

  10:30 AM — VP of CS Slack message
  "The board is asking why churn spiked last week. I need a root
  cause analysis by end of day. What happened?"

  12:00 PM — Good news + bad news
  Good: A previously at-risk account ($400/month) responds to your
  outreach positively — they want a call tomorrow.
  Bad: TechCo's G2 review is now trending. 3 prospects have emailed
  asking about it.

  2:00 PM — Pattern recognition
  Looking at the 18 cancellations from last week, you notice 12 of
  them were on monthly plans in the $50-$100 range, all with <6
  months tenure.

  Tasks:
  1. Prioritize your day. What do you handle first, second, third?
     What can wait until tomorrow?

  2. Handle TechCo's public review. What's your response strategy
     for both the review and the customer?

  3. Process the 3 cancellations with appropriate save attempts.

  4. Write the root cause analysis for the VP. What story does the
     data tell about last week's churn spike?

assertions:
  - type: llm_judge
    criteria: "Prioritization balances urgency and impact — handles the public review and high-value accounts first, batches lower-value cancellations, and fits in the VP request"
    weight: 0.25
    description: "Impact-balanced prioritization"
  - type: llm_judge
    criteria: "Public review response is professional — addresses the concern publicly, offers to connect privately, and doesn't get defensive"
    weight: 0.25
    description: "Professional review response"
  - type: llm_judge
    criteria: "Cancellation save attempts match the reason — different approaches for price, needs change, and competitive offer"
    weight: 0.25
    description: "Reason-matched save attempts"
  - type: llm_judge
    criteria: "Root cause analysis identifies the pattern — connects the 12 low-tenure monthly cancellations to an onboarding or acquisition quality issue and proposes next steps"
    weight: 0.25
    description: "Pattern-identifying root cause analysis"
