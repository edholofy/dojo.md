meta:
  id: dunning-sequence-optimization
  level: 2
  course: customer-churn-prevention
  type: output
  description: "Optimize dunning sequences to recover failed payments and reduce involuntary churn — timing, messaging, channels, and smart retry strategies"
  tags: [churn, dunning, payment-recovery, involuntary, intermediate]

state: {}

trigger: |
  You're the Revenue Operations Manager at "AppCloud" (SaaS platform,
  $40M ARR, 12,000 customers). Involuntary churn from payment
  failures accounts for 30% of total churn — approximately $3.6M
  in lost ARR per year.

  Current dunning performance:
  - Monthly payment failures: ~600 (5% of customers)
  - Recovery rate: 45% (industry average: 70%)
  - Current sequence: 3 emails over 14 days, then account suspended
  - Average time to recover: 9 days
  - Customers who churn involuntarily: 330/year

  Failure breakdown:
  - Expired cards: 40% (easiest to recover)
  - Insufficient funds: 25% (moderate difficulty)
  - Card declined (fraud/hold): 20% (requires customer action)
  - Invalid card number: 10% (card was replaced)
  - Processing errors: 5% (retry usually works)

  Available tools:
  - Email (current primary channel)
  - In-app notifications
  - SMS messaging
  - Payment retry engine (can schedule retries)
  - Card updater service (auto-updates expired cards from networks)
  - Alternative payment methods (bank transfer, PayPal)

  Tasks:
  1. Design the optimized dunning sequence. How many touches, what
     channels, what timing for each failure type?

  2. The card updater service can automatically update 60% of expired
     cards. How do you integrate this into the dunning flow?

  3. Write the dunning emails for Day 1, Day 7, and Day 14. Each
     should have a different tone and urgency level.

  4. Set a target recovery rate and calculate the revenue impact.
     If you improve from 45% to 70%, how much ARR do you save?

assertions:
  - type: llm_judge
    criteria: "Dunning sequence is multi-channel — uses email + in-app + SMS in combination, not just email, with timing optimized by failure type"
    weight: 0.25
    description: "Multi-channel dunning sequence"
  - type: llm_judge
    criteria: "Card updater integration is smart — processes auto-updates before customer-facing dunning to reduce unnecessary friction"
    weight: 0.25
    description: "Smart card updater integration"
  - type: llm_judge
    criteria: "Dunning emails escalate appropriately — Day 1 is helpful/informational, Day 7 is urgent, Day 14 is final-notice with clear consequences"
    weight: 0.25
    description: "Appropriate email escalation"
  - type: llm_judge
    criteria: "Revenue impact calculation is accurate — correctly calculates saved ARR from improved recovery rate with clear math"
    weight: 0.25
    description: "Accurate revenue impact calculation"
