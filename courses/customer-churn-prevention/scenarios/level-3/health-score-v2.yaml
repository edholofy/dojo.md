meta:
  id: health-score-v2
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Redesign the customer health scoring model with advanced leading indicators, segment-specific weights, and predictive accuracy validation"
  tags: [churn, health-score, predictive, model-design, advanced]

state: {}

trigger: |
  You're the CS Operations Director at "DataStream" ($65M ARR,
  4,500 customers). Your current health score has a 45% accuracy
  rate for predicting churn — barely better than a coin flip. The
  CCO says: "Fix the health score or we're flying blind."

  Current model problems:
  - Same weights for all customer segments (enterprise and SMB
    weighted identically)
  - Lagging indicators dominate (CSAT, NPS) — by the time they
    drop, churn is already happening
  - Binary inputs: "logged in this month: yes/no" instead of trends
  - No competitive intelligence signals
  - Updated monthly — too slow for fast-moving churn signals
  - 30% of CSMs say the score "doesn't reflect reality" and ignore it

  Available data (that the current model doesn't use):
  - Daily login trends (not just monthly count)
  - Feature adoption velocity (rate of change, not just snapshot)
  - Support ticket sentiment analysis (NLP-scored)
  - Executive sponsor engagement (email open/response rates)
  - Contract utilization (% of purchased capacity used)
  - Community and event participation
  - Product feedback submission rate
  - Account growth trajectory (adding/removing users)
  - Competitive mention in support tickets

  Validation data:
  - 500 churned customers over 18 months with full behavioral data
  - 3,500 retained customers as control group

  Tasks:
  1. Design Health Score v2. What inputs, what weights, and how do
     weights differ by segment?

  2. How do you incorporate leading indicators that predict churn
     30-60 days before it happens?

  3. Validate the new model against the 500 churned customers. What
     accuracy targets do you set, and how do you test?

  4. CSMs don't trust the current score. How do you build adoption
     of the new model? What if they disagree with a score?

assertions:
  - type: llm_judge
    criteria: "Health Score v2 uses leading indicators — incorporates trend data (usage velocity, adoption rate of change) rather than just point-in-time snapshots"
    weight: 0.25
    description: "Leading-indicator health score"
  - type: llm_judge
    criteria: "Segment-specific weights are justified — explains why enterprise might weight executive engagement higher while SMB weights product usage higher"
    weight: 0.25
    description: "Justified segment-specific weights"
  - type: llm_judge
    criteria: "Validation methodology is sound — proposes backtesting, precision/recall metrics, and accuracy targets appropriate for a churn prediction model"
    weight: 0.25
    description: "Sound validation methodology"
  - type: llm_judge
    criteria: "CSM adoption plan addresses trust — includes transparency (show the calculation), override mechanisms, feedback loop, and gradual rollout"
    weight: 0.25
    description: "Trust-building CSM adoption"
