meta:
  id: b2b-multi-stakeholder-retention
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Navigate B2B retention with multiple stakeholders — when different people in the same company have conflicting views on whether to stay or leave"
  tags: [churn, B2B, multi-stakeholder, politics, advanced]

state: {}

trigger: |
  You're a senior CSM at "SecurityPro" (cybersecurity SaaS, $120M
  ARR). You manage "ConglomerateCorp" ($450K ARR, 3-year customer).
  The account is at risk — but different stakeholders have different
  views.

  Stakeholder map:

  Sarah (CISO — decision maker, 2 years in role):
  View: Neutral. "The product works but I'm not sure we're getting
  maximum value. I need to justify the spend to the CFO."
  Concern: ROI demonstration, board reporting.

  Marcus (VP of IT — day-to-day owner):
  View: Negative. "Your product is too complex. My team spends too
  much time configuring it. I'd rather buy something simpler."
  Concern: Operational burden, team productivity.

  Lisa (Security Analyst — power user):
  View: Positive. "I love the product. The threat detection is best-
  in-class. I'd hate to switch."
  Concern: Losing capabilities she depends on daily.

  David (CFO — budget authority):
  View: Negative. "Security is a cost center. I want to reduce the
  security budget by 20%. Everything is on the table."
  Concern: Cost reduction, budget optimization.

  Jennifer (Procurement — contract owner):
  View: Neutral. "Our contract is up in 90 days. I need competitive
  bids from at least 2 vendors."
  Concern: Compliance with procurement policy.

  Power dynamics:
  - David (CFO) has budget authority and is pushing for cuts
  - Sarah (CISO) can argue for security but needs data to back it up
  - Marcus wants to switch; Lisa doesn't
  - Jennifer will follow whatever Sarah and David decide

  Tasks:
  1. Map the stakeholders and design your influence strategy. Who do
     you need to win over, and in what order?

  2. Marcus is your biggest internal detractor. How do you address
     his complexity complaint while keeping Lisa happy?

  3. David wants a 20% cut. Can you offer a restructured deal that
     keeps the ARR close to $450K while giving him a "win"?

  4. Jennifer needs competitive bids. How do you ensure you're the
     preferred vendor when procurement compares you to alternatives?

assertions:
  - type: llm_judge
    criteria: "Influence strategy targets the right person first — identifies Sarah (CISO) as the key to influence both David and Jennifer, and equips her with ROI data"
    weight: 0.25
    description: "Targeted influence strategy"
  - type: llm_judge
    criteria: "Complexity and satisfaction are balanced — proposes solutions that simplify Marcus's experience (managed services, simplified config) without removing Lisa's advanced capabilities"
    weight: 0.25
    description: "Balanced complexity solution"
  - type: llm_judge
    criteria: "Budget restructuring is creative — proposes scope adjustment, multi-year discount, or value-add repackaging that gives the CFO a 'cut' while preserving revenue"
    weight: 0.25
    description: "Creative budget restructuring"
  - type: llm_judge
    criteria: "Procurement strategy is proactive — prepares competitive comparison materials, ROI documentation, and references before Jennifer's evaluation begins"
    weight: 0.25
    description: "Proactive procurement strategy"
