meta:
  id: cross-functional-retention
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Coordinate cross-functional retention efforts across CS, Product, Engineering, Sales, and Marketing to address systemic churn drivers"
  tags: [churn, cross-functional, alignment, collaboration, advanced]

state: {}

trigger: |
  You're the VP of Customer Success at "WorkOS" ($90M ARR, 5,000
  customers). Churn has been stuck at 14% annually despite your CS
  team's efforts. You've concluded that churn is a company problem,
  not a CS problem.

  Root cause mapping across departments:

  Product (responsible for 30% of churn):
  - Product complexity drives 15% of churn (no simplified experience)
  - Missing features drive 15% (competitors have integrations we lack)
  - Product VP's priority: new market features, not retention features

  Engineering (responsible for 20% of churn):
  - Reliability issues drive 10% of churn (5 outages in 6 months)
  - Performance degradation drives 10% (API latency doubled)
  - Engineering VP's priority: scaling for growth, not reliability

  Sales (responsible for 15% of churn):
  - Over-promising during sales process drives 10% of churn
  - Wrong-fit customers drive 5% (sold to customers who don't need the product)
  - Sales VP's priority: hitting quota, not customer fit

  Marketing (responsible for 10% of churn):
  - Low-quality leads from campaigns drive 5% (high churn cohorts)
  - Mismatched messaging drives 5% (expectations set wrong)
  - Marketing VP's priority: lead volume, not lead quality

  CS team (responsible for 25% of churn):
  - Slow onboarding drives 10%
  - Reactive vs proactive approach drives 10%
  - Coverage gaps drive 5%

  Tasks:
  1. Design the cross-functional churn reduction program. How do you
     get 4 other department heads to care about retention?

  2. Create the shared accountability framework. How does each
     department's OKRs include retention metrics?

  3. The Product VP says: "Building retention features doesn't grow
     revenue." How do you counter this argument?

  4. Design the monthly cross-functional churn review meeting. What
     data is reviewed, who attends, and what decisions are made?

assertions:
  - type: llm_judge
    criteria: "Cross-functional program is structured — establishes a retention council, assigns departmental churn reduction targets, and defines shared metrics"
    weight: 0.25
    description: "Structured cross-functional program"
  - type: llm_judge
    criteria: "Accountability framework ties retention to every team — proposes specific retention-related OKRs for Product, Engineering, Sales, and Marketing"
    weight: 0.25
    description: "Universal retention accountability"
  - type: llm_judge
    criteria: "Revenue argument is countered with data — shows that retention features protect existing revenue (which costs less than acquiring new revenue)"
    weight: 0.25
    description: "Data-backed retention revenue argument"
  - type: llm_judge
    criteria: "Review meeting is actionable — includes specific data review (churn by root cause), cross-functional discussion, and assignment of action items with deadlines"
    weight: 0.25
    description: "Actionable review meeting design"
