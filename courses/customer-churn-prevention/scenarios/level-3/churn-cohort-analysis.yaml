meta:
  id: churn-cohort-analysis
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Perform advanced churn cohort analysis to identify systemic patterns, seasonal trends, and segment-specific retention drivers"
  tags: [churn, cohort-analysis, data-analysis, patterns, advanced]

state: {}

trigger: |
  You're the Director of CS Analytics at "SaaSMetrics" ($60M ARR,
  8,000 customers). The board wants to understand WHY churn increased
  from 8% to 12% annually over the past 18 months.

  Cohort retention data (% retained at month):

  Month→        3     6     9     12
  Q1 2024:     92%   85%   80%   78%
  Q2 2024:     90%   82%   76%   72%
  Q3 2024:     88%   78%   70%   65%  ← first concerning cohort
  Q4 2024:     86%   75%   68%   —
  Q1 2025:     84%   72%   —     —
  Q2 2025:     82%   —     —     —

  Segment breakdown of Q3 2024 cohort (worst performing):
  - Enterprise: 95% at 12 months (normal)
  - Mid-market: 72% at 12 months (declining)
  - SMB: 48% at 12 months (crisis)

  What changed in Q3 2024:
  - New pricing tier launched (20% increase for SMB plans)
  - Onboarding team reduced from 5 to 3 (cost-cutting)
  - New marketing campaign drove 400 SMB sign-ups (2x normal)
  - Free trial extended from 14 to 30 days
  - Competitor launched a free tier

  Additional data:
  - SMB customers from the marketing campaign have 30% lower
    feature adoption than organic sign-ups
  - Time-to-first-value increased from 3 days to 8 days after
    onboarding team reduction
  - 60% of SMB churners cite "too expensive" (up from 35%)
  - Customers who completed onboarding checklist: 70% → 45%

  Tasks:
  1. What's causing the cohort degradation? Present the root cause
     analysis with supporting data.

  2. Separate the compounding factors. How much of the churn increase
     is from pricing, marketing quality, onboarding reduction, and
     competitive pressure?

  3. Design the remediation plan. What changes would you make to
     reverse the trend?

  4. The CFO says the price increase generated $1.2M in additional
     revenue. The extra churn costs $2.5M in lost ARR. Present the
     net impact analysis.

assertions:
  - type: llm_judge
    criteria: "Root cause analysis identifies multiple compounding factors — doesn't blame just one cause but shows how pricing, marketing quality, and onboarding reduction combined to degrade retention"
    weight: 0.25
    description: "Multi-factor root cause analysis"
  - type: llm_judge
    criteria: "Factor separation is analytical — attempts to quantify each factor's contribution using segment comparisons, before/after data, or control groups"
    weight: 0.25
    description: "Analytical factor separation"
  - type: llm_judge
    criteria: "Remediation plan addresses each factor — proposes specific actions for pricing, marketing targeting, onboarding staffing, and competitive response"
    weight: 0.25
    description: "Comprehensive remediation plan"
  - type: llm_judge
    criteria: "Net impact analysis is clear — shows the price increase was net negative ($1.2M gain vs. $2.5M churn cost) and recommends a path forward"
    weight: 0.25
    description: "Clear net impact analysis"
