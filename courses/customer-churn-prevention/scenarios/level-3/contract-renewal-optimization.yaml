meta:
  id: contract-renewal-optimization
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Optimize the contract renewal process to maximize on-time renewals, reduce churn at renewal, and increase expansion revenue"
  tags: [churn, renewal, contract, optimization, advanced]

state: {}

trigger: |
  You're the Director of Customer Success at "CloudPlatform" ($70M
  ARR, 2,000 customers, annual contracts). Your renewal performance
  needs improvement.

  Current renewal metrics:
  - On-time renewal rate: 72% (industry benchmark: 85%)
  - Late renewal rate (1-30 days late): 15%
  - Churn at renewal: 13% (industry benchmark: 8%)
  - Expansion at renewal: 18% (industry benchmark: 25%)
  - Average renewal cycle: 45 days (from first outreach to signature)
  - Renewals requiring VP approval (discounts): 35%

  Renewal failure analysis (last 12 months, 260 churned at renewal):
  - "Didn't realize the value": 35%
  - "Budget cuts": 25%
  - "Champion left": 15%
  - "Switched to competitor": 15%
  - "Outgrew the product": 10%

  Process gaps:
  - Renewal outreach starts at 60 days (too late for at-risk accounts)
  - No standardized QBR process — CSMs do them inconsistently
  - Price increases announced at renewal (surprise to customers)
  - Multi-year discount: only 5% of customers on multi-year deals
  - No expansion playbook — CSMs don't know when/how to upsell

  Tasks:
  1. Redesign the renewal process. What happens at 180, 120, 90, 60,
     and 30 days before renewal?

  2. "Didn't realize the value" is the #1 churn reason at renewal.
     Design the QBR program that prevents this.

  3. Create the expansion playbook for renewals. When is the right
     time to propose expansion vs. just securing the renewal?

  4. How do you increase multi-year contracts from 5% to 25%? What
     incentives work?

assertions:
  - type: llm_judge
    criteria: "Renewal process starts early — begins health checks at 180 days, value reviews at 120, commercial discussions at 90, with clear actions at each milestone"
    weight: 0.25
    description: "Early-start renewal process"
  - type: llm_judge
    criteria: "QBR program demonstrates value — includes quantified business impact, usage highlights, ROI analysis, and future roadmap aligned to customer goals"
    weight: 0.25
    description: "Value-demonstrating QBR program"
  - type: llm_judge
    criteria: "Expansion timing is strategic — proposes expanding after securing the base renewal for at-risk accounts, and leading with expansion for healthy accounts"
    weight: 0.25
    description: "Strategic expansion timing"
  - type: llm_judge
    criteria: "Multi-year incentives are compelling — offers pricing discounts, feature locks, dedicated resources, or price increase protection that justify longer commitments"
    weight: 0.25
    description: "Compelling multi-year incentives"
