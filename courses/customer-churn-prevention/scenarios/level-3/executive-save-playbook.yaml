meta:
  id: executive-save-playbook
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Design and execute executive-level save strategies for critical accounts where standard retention approaches have failed"
  tags: [churn, executive-escalation, high-touch, save, advanced]

state: {}

trigger: |
  You're the VP of Customer Success at "EnterprisePro" ($100M ARR,
  500 enterprise customers). Three critical accounts are in danger
  of churning within the next 60 days. Standard CSM-level saves
  have already been attempted and failed.

  Account 1: "GlobalBank" ($1.2M ARR, 4-year customer)
  History: Your champion (CIO) retired. New CIO is "cleaning house"
  and evaluating all vendors. Your CSM's save attempt was rejected:
  "I don't need a discount. I need to know why we should stay."
  The new CIO has meetings with 3 competitors scheduled.
  Your CEO knows their CEO personally.

  Account 2: "TechConglomerate" ($800K ARR, 2-year customer)
  History: They had a catastrophic data loss during a product update
  6 months ago. Despite resolution and credits, trust is broken. The
  VP of Engineering refuses to meet with your team. Their legal team
  has sent a formal breach notice.
  They're building an in-house replacement.

  Account 3: "HealthSystem" ($600K ARR, 3-year customer)
  History: Their budget was cut 30%. They asked to downgrade to a
  $200K package. Your CSM said no (company policy: no mid-contract
  downgrades). They're now threatening full termination. NPS score
  dropped from 9 to 2.
  Contract has a 90-day termination clause they're ready to invoke.

  Your resources:
  - CEO willing to make 2 customer calls this week
  - $500K discretionary retention budget
  - Engineering can prioritize 1 customer-specific feature request
  - Legal can modify contract terms with VP approval

  Tasks:
  1. Design the executive save strategy for each account. Who does
     what, by when?

  2. You can only use the CEO for 2 of the 3 accounts. Which 2 and
     why? What's the CEO's message for each?

  3. For TechConglomerate, trust is broken. How do you rebuild trust
     when the customer won't even meet with you?

  4. For HealthSystem, the company policy blocked the save. When
     should policies be overridden for retention? Design the
     exception framework.

assertions:
  - type: llm_judge
    criteria: "Save strategies are tailored — each account gets a different approach based on the specific blocker (new leadership, broken trust, budget cuts)"
    weight: 0.25
    description: "Tailored executive save strategies"
  - type: llm_judge
    criteria: "CEO deployment is strategic — selects the 2 highest-ROI accounts and crafts distinct messages for each (relationship-based vs. accountability-based)"
    weight: 0.25
    description: "Strategic CEO deployment"
  - type: llm_judge
    criteria: "Trust rebuilding approach is patient — proposes graduated re-engagement (written commitment, third-party validation, phased recovery plan) rather than asking for a meeting"
    weight: 0.25
    description: "Patient trust rebuilding"
  - type: llm_judge
    criteria: "Policy exception framework is clear — defines criteria for when to override retention policies (ARR threshold, churn risk, competitive threat) with approval chain"
    weight: 0.25
    description: "Clear policy exception framework"
