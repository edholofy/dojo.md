meta:
  id: advanced-retention-shift
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Navigate an advanced retention management shift with executive escalations, competitive threats, cross-functional coordination, and data-driven decision making"
  tags: [churn, shift-simulation, advanced, multi-stakeholder]

state: {}

trigger: |
  You're the Senior Director of Customer Success at "PlatformX"
  ($75M ARR, 5,000 customers). Your shift: 8 AM to 6 PM.

  8:00 AM — Weekly dashboard
  - GRR this month: 87% (target: 92%, trending wrong direction)
  - 12 accounts flagged critical risk (total ARR: $2.1M)
  - 3 accounts are past renewal deadline (not signed, no response)
  - NRR: 102% (target: 115%)

  9:00 AM — Board email
  Board member emails CEO (you're CC'd): "I noticed our GRR is
  below target for the 3rd consecutive month. What's the plan?"
  CEO Slacks you: "I need a response I can send to the board by
  end of day."

  10:00 AM — Enterprise escalation
  Your top account, "MegaRetail" ($500K ARR), emails you directly:
  "We've been evaluating alternatives and we're leaning toward
  switching. We need a meeting with your CEO this week or we're
  done." They've been a customer for 5 years.

  11:00 AM — Team crisis
  Your best CSM (manages $5M in ARR) just gave 2 weeks notice.
  Their 40 accounts include 8 of the 12 critical-risk accounts.

  12:00 PM — Product blocker
  3 of the critical-risk accounts all cite the same missing feature
  (API v2 migration). Product says it's 6 months away. These
  accounts may not wait.

  2:00 PM — Competitive intelligence
  A competitor just announced a "migration guarantee" — free data
  migration + 6 months free for any customer switching from a named
  list of competitors (including you).

  4:00 PM — Small win
  One of the 3 past-deadline renewals comes through — signed at
  110% of previous value after a successful QBR.

  Tasks:
  1. Prioritize your day. Walk through each event and your response.

  2. Handle the board question: Write the CEO's response about GRR.

  3. Design the MegaRetail save strategy. What do you bring to the
     CEO meeting?

  4. Your best CSM is leaving with 8 critical accounts. What's the
     transition plan to protect those accounts?

assertions:
  - type: llm_judge
    criteria: "Day prioritization is clear — handles the enterprise escalation and CSM departure as top priorities, delegates or stages the board response and competitive threat"
    weight: 0.25
    description: "Clear day prioritization"
  - type: llm_judge
    criteria: "Board response is honest and action-oriented — acknowledges the GRR trend, identifies root causes, and presents a concrete improvement plan with milestones"
    weight: 0.25
    description: "Honest action-oriented board response"
  - type: llm_judge
    criteria: "MegaRetail save strategy is executive-ready — prepares value summary, addresses their specific concerns, and proposes concrete commitments for the CEO meeting"
    weight: 0.25
    description: "Executive-ready save strategy"
  - type: llm_judge
    criteria: "CSM transition plan protects accounts — prioritizes the 8 critical accounts, proposes immediate customer outreach, and designs knowledge transfer process"
    weight: 0.25
    description: "Account-protective transition plan"
