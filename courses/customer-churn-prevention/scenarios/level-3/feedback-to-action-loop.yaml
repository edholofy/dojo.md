meta:
  id: feedback-to-action-loop
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Build a closed-loop system from churn feedback to product and process improvements — turning exit data into retention gains"
  tags: [churn, feedback, closed-loop, process-improvement, advanced]

state: {}

trigger: |
  You're the VP of Customer Success at "ProductSuite" ($50M ARR,
  4,000 customers). Over the past year, you've conducted 200 exit
  interviews with churned customers. The data paints a clear picture,
  but nothing has changed.

  Exit interview theme analysis (200 interviews):

  Theme 1: "Product complexity" — 28% of exits
  "We only used 20% of the features. The product felt bloated and
  overwhelming for our team."

  Theme 2: "Poor onboarding" — 22% of exits
  "We never really figured out how to use it properly. The training
  was too generic."

  Theme 3: "Competitor feature advantage" — 18% of exits
  Top requested features (that competitors have):
  - Native mobile app (mentioned 40 times)
  - AI-powered insights (mentioned 35 times)
  - Better integrations with Salesforce (mentioned 28 times)

  Theme 4: "Support quality" — 15% of exits
  "Support was slow and gave generic answers. We felt like we were
  talking to a wall."

  Theme 5: "Pricing/value perception" — 12% of exits
  "The price kept going up but the product didn't improve."

  Theme 6: "Organizational change" — 5% of exits
  Budget cuts, M&A, or strategic pivot (not preventable).

  The problem: You've shared these findings in 3 quarterly reviews.
  Product hasn't built the mobile app. Support hasn't improved
  response times. Onboarding hasn't changed. The data isn't driving
  action.

  Tasks:
  1. Design the closed-loop process that turns exit interview data
     into product and process changes. Who is accountable at each
     step?

  2. Quantify the business impact of each theme. If you could fix
     one theme, which would save the most revenue? Show the math.

  3. Product says: "We can't build everything churned customers want."
     How do you prioritize churn feedback against new feature
     requests from current customers?

  4. The CEO asks: "Why aren't we acting on this data?" Prepare your
     presentation that creates urgency and commitment to change.

assertions:
  - type: llm_judge
    criteria: "Closed-loop process has clear accountability — assigns owners for each stage (data collection → analysis → prioritization → implementation → measurement) with timelines"
    weight: 0.25
    description: "Accountable closed-loop process"
  - type: llm_judge
    criteria: "Business impact quantification uses churn data — calculates ARR at risk per theme and potential save rate to determine revenue impact of fixing each one"
    weight: 0.25
    description: "Quantified business impact"
  - type: llm_judge
    criteria: "Prioritization framework balances churn prevention and growth — proposes a scoring system that weights both retention impact and growth potential"
    weight: 0.25
    description: "Balanced prioritization framework"
  - type: llm_judge
    criteria: "CEO presentation creates urgency — uses financial data to show the cost of inaction and proposes specific commitments with deadlines"
    weight: 0.25
    description: "Urgency-creating CEO presentation"
