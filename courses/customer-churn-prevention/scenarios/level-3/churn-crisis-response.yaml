meta:
  id: churn-crisis-response
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Respond to a sudden churn spike caused by an external event — product outage, pricing change, or competitor action that triggers mass cancellation risk"
  tags: [churn, crisis, mass-cancellation, response, advanced]

state: {}

trigger: |
  You're the VP of Customer Success at "ToolStack" ($40M ARR, 6,000
  customers). On Monday morning, you discover a crisis.

  What happened: Over the weekend, a pricing update was pushed live
  accidentally. All customers on the "Growth" plan ($50/month) saw
  their price displayed as $150/month on their next invoice preview.
  While no one was actually charged the higher amount, 3,000 customers
  received an email saying "Your plan will renew at $150/month."

  Impact by Monday 9 AM:
  - 400 cancellation requests submitted
  - 1,200 angry support tickets
  - #ToolStackPriceGouging trending on Twitter
  - 3 industry blogs have published "ToolStack triples prices"
  - NPS survey responses from the weekend: -45 (from +38)
  - Competitors are running ads: "Switching from ToolStack? We'll
    match your old price."

  Timeline:
  - Engineering fixed the bug Saturday night (within 6 hours)
  - A "correction" email was sent Sunday: "Disregard the previous
    email. Your pricing has not changed."
  - But the damage is done. Customers are angry and skeptical.

  Resources:
  - CS team: 8 CSMs, 4 support reps
  - Budget: $100K emergency retention fund
  - CEO is willing to record a personal apology video
  - Product can push a "trust" feature (invoice history transparency)

  Tasks:
  1. Design the crisis response plan for the first 72 hours. What
     happens today, tomorrow, and Wednesday?

  2. 400 cancellations are in the queue. Design the bulk save strategy
     — you can't call all 400 individually.

  3. Write the CEO's apology communication. What tone, what channel,
     and what concrete actions does it promise?

  4. Competitors are running displacement ads. How do you counter
     them in real-time?

assertions:
  - type: llm_judge
    criteria: "72-hour plan is staged — Day 1 focuses on acknowledgment and damage control, Day 2 on individual outreach to highest-risk accounts, Day 3 on systemic trust-rebuilding"
    weight: 0.25
    description: "Staged 72-hour response plan"
  - type: llm_judge
    criteria: "Bulk save strategy is tiered — segments the 400 cancellations by value and prioritizes high-value for personal calls while automating lower-value with templates"
    weight: 0.25
    description: "Tiered bulk save strategy"
  - type: llm_judge
    criteria: "CEO apology is authentic — takes full responsibility, explains what happened, promises specific preventive measures, and offers a concrete goodwill gesture"
    weight: 0.25
    description: "Authentic CEO apology"
  - type: llm_judge
    criteria: "Competitive counter is proactive — addresses competitor messaging directly through customer channels, emphasizes the mistake is corrected, and highlights switching risks"
    weight: 0.25
    description: "Proactive competitive counter"
