meta:
  id: retention-offer-economics
  level: 3
  course: customer-churn-prevention
  type: output
  description: "Model the economics of retention offers — calculating ROI of discounts, upgrades, and concessions against churn cost and lifetime value"
  tags: [churn, economics, ROI, retention-offers, advanced]

state: {}

trigger: |
  You're the Director of Revenue Operations at "AnalyticsCloud"
  ($80M ARR, 6,000 customers). The CFO wants to understand the
  economics of your retention offers.

  Current retention offer usage (last 12 months):
  - Discounts given: 800 customers, average 25% off for 6 months
  - Free upgrades: 200 customers, average $50/month value for 3 months
  - Account pauses: 150 customers, average 2 months paused
  - Dedicated support: 50 customers, $500/month cost each for 3 months
  - Total retention investment: $1.8M

  Results of retention offers:
  - Customers who received a discount: 65% stayed at full price after
    discount expired, 20% churned when discount ended, 15% demanded
    continued discounts
  - Customers who received upgrades: 45% converted to paid upgrade,
    55% reverted but stayed
  - Customers who paused: 60% reactivated, 40% never came back
  - Customers who got dedicated support: 80% renewed at full price

  Financial data:
  - Average customer MRR: $1,100
  - Customer acquisition cost (CAC): $4,500
  - Average customer lifetime: 32 months
  - LTV: $35,200
  - Gross margin: 78%

  Concerning trend:
  - "Discount dependency": 150 customers now expect discounts at
    every renewal. They've been given discounts 2+ times.
  - The sales team is frustrated: "We sell at full price and then
    CS gives it away."

  Tasks:
  1. Calculate the ROI of each retention offer type. Which offers
     generate the most value per dollar invested?

  2. The "discount dependency" problem: 150 customers expect
     perpetual discounts. What do you do?

  3. Design a tiered retention offer framework — which offers are
     appropriate for which customer segments and situations?

  4. The CFO asks: "Are we spending too much on retention?" Defend
     or challenge the $1.8M investment.

assertions:
  - type: llm_judge
    criteria: "ROI calculation is thorough — calculates the return for each offer type by comparing offer cost to retained revenue, showing which offers have the best unit economics"
    weight: 0.25
    description: "Thorough ROI calculation"
  - type: llm_judge
    criteria: "Discount dependency solution is practical — proposes weaning strategies like value-add replacement, one-time-only policies, or graduated return to full price"
    weight: 0.25
    description: "Practical dependency solution"
  - type: llm_judge
    criteria: "Tiered framework is clear — maps offer types to segments based on MRR, tenure, risk level, and reason for churn"
    weight: 0.25
    description: "Clear tiered offer framework"
  - type: llm_judge
    criteria: "Investment defense uses LTV math — shows that retaining customers at a discount is still more profitable than acquiring replacements at full CAC"
    weight: 0.25
    description: "LTV-based investment defense"
