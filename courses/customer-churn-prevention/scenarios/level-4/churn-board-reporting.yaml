meta:
  id: churn-board-reporting
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Present churn analysis and retention strategy to the board of directors — connecting retention metrics to company valuation, growth, and strategic direction"
  tags: [churn, board, executive, reporting, expert]

state: {}

trigger: |
  You're the CCO of "PublicSaaS" (publicly traded, $400M ARR,
  25,000 customers). You have 20 minutes at the next board meeting
  to present the retention strategy. This is the first time churn
  has been a standalone board topic.

  Why now:
  - GRR declined from 90% to 86% over 3 quarters
  - An analyst downgraded the stock citing "deteriorating unit
    economics and rising churn"
  - The CEO was asked about churn on the last earnings call and
    didn't have a great answer
  - A board member (former Salesforce exec) said: "At Salesforce,
    we treated NRR as the single most important metric."

  Board-ready data:
  - GRR: 86% (peer median: 90%)
  - NRR: 108% (peer median: 115%)
  - Logo retention: 80% (peer median: 88%)
  - LTV/CAC: 3.2x (peer median: 5x)
  - Churn cost: $56M in lost ARR last year
  - Replacement cost: $84M (CAC × churned customers)
  - Valuation impact: Every 1% improvement in NRR adds ~$40M to
    market cap (based on revenue multiple)

  Board member profiles:
  - Chair: PE background, focused on unit economics
  - Member A: Former Salesforce exec, NRR evangelist
  - Member B: CFO background, concerned about cash efficiency
  - Member C: Customer representative, advocating for investment
  - Member D: Growth investor, worried about top-line deceleration

  Your ask: $15M over 3 years for a "Retention Excellence" program.

  Tasks:
  1. Structure the 20-minute board presentation. What's the
     narrative arc?

  2. Each board member will have different questions. Prepare for
     the Q&A from each perspective.

  3. Connect retention to valuation. Show the board how improving
     NRR from 108% to 115% impacts the company's market cap.

  4. The PE-background Chair asks: "Why should we invest $15M in
     retention instead of putting that into sales for new logos?"
     Answer persuasively.

assertions:
  - type: llm_judge
    criteria: "Presentation is board-caliber — follows a narrative arc (problem, impact, root cause, plan, ask) within 20 minutes with executive-level content"
    weight: 0.25
    description: "Board-caliber presentation"
  - type: llm_judge
    criteria: "Q&A prep is tailored — anticipates specific questions from each board member's perspective and prepares concise, data-backed answers"
    weight: 0.25
    description: "Tailored Q&A preparation"
  - type: llm_judge
    criteria: "Valuation connection is quantified — shows specific dollar impact of NRR improvement on market cap using revenue multiples"
    weight: 0.25
    description: "Quantified valuation connection"
  - type: llm_judge
    criteria: "Retention vs. acquisition argument is compelling — uses unit economics (LTV/CAC, payback period) to show retention investment generates higher returns"
    weight: 0.25
    description: "Compelling retention vs. acquisition"
