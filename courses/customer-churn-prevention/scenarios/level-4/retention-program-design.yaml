meta:
  id: retention-program-design
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Design a comprehensive company-wide retention program from scratch — strategy, team structure, tooling, metrics, and executive alignment"
  tags: [churn, program-design, strategy, organizational, expert]

state: {}

trigger: |
  You're the newly hired Chief Customer Officer at "ScaleSaaS"
  ($200M ARR, 15,000 customers). The company has never had a
  dedicated retention function. Customer Success was added 18 months
  ago as a reactive team, and churn has been rising: 15% → 18% → 22%
  annually.

  Current state:
  - 12 CSMs (generalists, no specialization)
  - No health scoring or predictive analytics
  - No formal renewal process (sales handles renewals ad-hoc)
  - No save playbooks or retention offers
  - No dunning optimization (default Stripe emails)
  - Churn data tracked in spreadsheets, not a CS platform
  - No exit interviews or churn feedback loop
  - Product team has never seen churn data

  Financial context:
  - $200M ARR with 22% annual churn = $44M in lost revenue/year
  - Customer acquisition cost: $15K per customer
  - Replacing churned customers costs: $44M × (15K ÷ avg contract)
    = $66M/year in acquisition to replace churn
  - Total cost of churn: ~$110M/year (lost revenue + replacement)

  Board mandate: Reduce churn from 22% to 12% within 2 years.
  Budget: $5M for Year 1 transformation.

  Tasks:
  1. Design the 2-year retention program. What are the phases,
     milestones, and quick wins in the first 90 days?

  2. What team structure do you need? How many people, what roles,
     and what do you hire first?

  3. Select the technology stack for retention management. What
     platforms, integrations, and data infrastructure are needed?

  4. Present the business case: How does investing $5M to reduce
     churn by 10 points generate ROI?

assertions:
  - type: llm_judge
    criteria: "2-year program is phased — starts with quick wins (dunning optimization, health scoring), builds to structural changes (renewals process, save playbooks), and ends with culture change"
    weight: 0.25
    description: "Phased retention program"
  - type: llm_judge
    criteria: "Team structure is role-specific — includes retention specialists, CS ops/analytics, renewal managers, and onboarding specialists with clear hiring priority order"
    weight: 0.25
    description: "Role-specific team structure"
  - type: llm_judge
    criteria: "Technology selection is practical — chooses a CS platform, integrations with CRM/billing/product analytics, and doesn't over-engineer for Year 1"
    weight: 0.25
    description: "Practical technology selection"
  - type: llm_judge
    criteria: "ROI business case is compelling — quantifies revenue saved from 10-point churn reduction, compares to investment, and shows payback period"
    weight: 0.25
    description: "Compelling ROI business case"
