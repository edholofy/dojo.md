meta:
  id: expert-retention-shift
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Navigate an expert-level retention shift with board-level pressure, competitive crises, team challenges, and strategic decisions impacting company trajectory"
  tags: [churn, shift-simulation, expert, strategic-decisions]

state: {}

trigger: |
  You're the CCO of "ScaleCloud" ($150M ARR, 10,000 customers).
  It's the last week of Q4. Your shift: 7 AM to 7 PM.

  7:00 AM — Quarterly metrics
  - Q4 GRR: 84% (worst quarter in company history, target: 90%)
  - Q4 NRR: 98% (below 100% — existing customers are shrinking)
  - 15 enterprise accounts churned this quarter ($4.5M ARR)
  - Competitor won 8 of those 15 accounts
  - Your retention team's morale: critically low

  8:00 AM — Board prep
  CEO Slack: "Board meeting in 3 days. I need to explain why we lost
  $4.5M in enterprise ARR. Your analysis is due by tonight."

  9:00 AM — Competitive shock
  TechCrunch publishes: "Competitor X raises $200M, announces free
  tier and enterprise migration program targeting ScaleCloud
  customers." Your phone starts ringing.

  10:00 AM — Top account escalation
  Your #1 customer ("MegaBank", $2M ARR, 5 years) calls: "I read
  the TechCrunch article. Competitor X just offered us free migration
  and 60% off for 3 years. Convince me why I shouldn't take it."

  11:00 AM — Internal challenge
  3 of your 8 senior CSMs approach you: "We're demoralized. We're
  losing accounts we can't save because the product isn't competitive.
  We need to talk about the team's future."

  1:00 PM — CFO call
  "We need to cut CS budget by 20% for next year. Marketing also
  lost budget. We're in efficiency mode."

  3:00 PM — Silver lining
  Product team shares: They're releasing a major feature update next
  month that addresses the #1 reason customers leave (the feature
  gap the competitor exploits). But it's not public yet.

  5:00 PM — Strategic decision
  CEO asks: "Should we match Competitor X's pricing and fight on
  price, or differentiate on something else?"

  Tasks:
  1. Handle each event chronologically. What's your response at each
     timestamp?

  2. Save MegaBank. What do you bring to the conversation? Can you
     use the unreleased product news?

  3. Address your demoralized team. What do you say and what do you
     change?

  4. Write the board analysis: Why did you lose $4.5M, what are you
     doing about it, and what's the plan for next year?

assertions:
  - type: llm_judge
    criteria: "Chronological responses are decisive — addresses each event with clear actions, appropriate delegation, and time management"
    weight: 0.25
    description: "Decisive chronological responses"
  - type: llm_judge
    criteria: "MegaBank save uses competitive intelligence carefully — shares upcoming product roadmap within NDA if appropriate, emphasizes switching risks, and proposes competitive retention offer"
    weight: 0.25
    description: "Carefully crafted MegaBank save"
  - type: llm_judge
    criteria: "Team morale response is authentic — acknowledges the challenges, shares the product update as hope, and proposes concrete improvements to their work conditions"
    weight: 0.25
    description: "Authentic team morale response"
  - type: llm_judge
    criteria: "Board analysis is honest and forward-looking — explains the losses, identifies systemic causes, and presents a credible turnaround plan"
    weight: 0.25
    description: "Honest forward-looking board analysis"
