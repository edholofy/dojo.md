meta:
  id: pricing-retention-impact
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Analyze and manage the impact of pricing changes on customer retention — modeling elasticity, timing increases, and communicating value"
  tags: [churn, pricing, elasticity, communication, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "PriceSaaS" ($120M ARR,
  10,000 customers). The CFO says: "We need a 15% price increase
  across all plans to hit our margin targets." The CCO says: "If
  you raise prices 15%, we'll lose 20% of our SMB customers."

  Current pricing and retention:
  - SMB ($30-100/month, 6,000 customers): 20% annual churn
  - Mid-market ($200-500/month, 3,000 customers): 10% annual churn
  - Enterprise ($1,000-5,000/month, 1,000 customers): 5% annual churn

  Historical price increase data:
  - Last increase (2 years ago, 10%):
    SMB churn spiked from 18% to 28% for 3 months, then settled at 22%
    Mid-market: no significant change
    Enterprise: no significant change

  Price elasticity estimates:
  - SMB: Highly elastic (-1.5) — 10% price increase → 15% churn increase
  - Mid-market: Moderately elastic (-0.5) — 10% increase → 5% churn increase
  - Enterprise: Inelastic (-0.1) — 10% increase → 1% churn increase

  Revenue modeling (15% increase):
  - Additional revenue if no churn: $18M/year
  - Estimated churn from SMB (20% of 6,000 × $65 avg): $9.4M lost
  - Estimated churn from mid-market (7.5%): $1.9M lost
  - Estimated churn from enterprise (0.5%): $0.3M lost
  - Net revenue impact: $18M - $11.6M = $6.4M gain

  BUT: Lost customers are gone permanently. Over 3 years, the
  cumulative loss exceeds the gain.

  Tasks:
  1. Should you do a flat 15% increase across all segments, or a
     differentiated approach? Model both scenarios.

  2. Design the price increase communication strategy for each
     segment. What's the timeline and messaging?

  3. The CCO proposes "grandfathering" existing customers and only
     raising prices for new customers. Analyze the pros and cons.

  4. What retention safeguards should you build into the price
     increase plan?

assertions:
  - type: llm_judge
    criteria: "Pricing strategy is differentiated — proposes segment-specific increases based on elasticity (higher for enterprise, lower or zero for SMB)"
    weight: 0.25
    description: "Differentiated pricing strategy"
  - type: llm_judge
    criteria: "Communication strategy builds value first — leads with new features/value before announcing price changes, with appropriate advance notice"
    weight: 0.25
    description: "Value-first communication"
  - type: llm_judge
    criteria: "Grandfathering analysis weighs both sides — considers the simplicity benefit and retention upside against the revenue ceiling and new-vs-existing pricing complexity"
    weight: 0.25
    description: "Balanced grandfathering analysis"
  - type: llm_judge
    criteria: "Retention safeguards are concrete — proposes specific measures like annual lock-in discounts, loyalty pricing, or save offers ready for at-risk customers"
    weight: 0.25
    description: "Concrete retention safeguards"
