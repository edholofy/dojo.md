meta:
  id: nrr-optimization
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Optimize Net Revenue Retention (NRR) through a combined strategy of churn reduction, contraction prevention, and expansion acceleration"
  tags: [churn, NRR, expansion, revenue, expert]

state: {}

trigger: |
  You're the CRO of "GrowthCloud" ($180M ARR, 8,000 customers).
  Your NRR is 103% — meaning you barely grow from existing
  customers. The board wants 120%+ NRR within 18 months.

  NRR breakdown:
  - Starting ARR: $180M
  - Gross churn: -$25.2M (14%)
  - Contraction: -$10.8M (6%)
  - Expansion: +$41.4M (23%)
  - Net: $185.4M (NRR: 103%)

  To reach 120% NRR ($216M):
  - Need an additional $30.6M from existing customers
  - Must reduce churn AND increase expansion simultaneously

  Current performance by segment:
  Enterprise (800 customers, $100M ARR):
  - GRR: 92%, Expansion: 30%, NRR: 122%

  Mid-market (2,200 customers, $50M ARR):
  - GRR: 85%, Expansion: 20%, NRR: 105%

  SMB (5,000 customers, $30M ARR):
  - GRR: 75%, Expansion: 10%, NRR: 85%

  Levers available:
  - Reduce churn (currently 14% → target 10%)
  - Reduce contraction (currently 6% → target 3%)
  - Increase expansion (currently 23% → target 30%+)
  - Pricing optimization (usage-based pricing being considered)
  - New product lines for existing customers

  Tasks:
  1. Build the path to 120% NRR. What combination of churn reduction,
     contraction prevention, and expansion gets you there? Show the
     math.

  2. SMB NRR is 85% — below 100%, meaning the segment is shrinking.
     Is it worth investing in SMB retention, or should you focus on
     enterprise expansion?

  3. Design the expansion playbook. How do you increase expansion
     from 23% to 30%+ without feeling pushy to customers?

  4. The CFO proposes switching to usage-based pricing to increase
     NRR. Analyze the pros and cons for each segment.

assertions:
  - type: llm_judge
    criteria: "NRR path is quantified — shows specific dollar amounts for each lever (churn reduction saves $X, expansion growth adds $Y) that sum to the 120% target"
    weight: 0.25
    description: "Quantified NRR path"
  - type: llm_judge
    criteria: "SMB investment decision is data-driven — analyzes the unit economics of SMB retention vs. enterprise expansion and makes a defensible recommendation"
    weight: 0.25
    description: "Data-driven SMB investment decision"
  - type: llm_judge
    criteria: "Expansion playbook is customer-centric — proposes value-driven expansion motions (usage triggers, business milestone alignment) rather than aggressive upselling"
    weight: 0.25
    description: "Customer-centric expansion playbook"
  - type: llm_judge
    criteria: "Usage-based pricing analysis is thorough — considers both upside (expansion when usage grows) and downside (contraction when usage drops) for each segment"
    weight: 0.25
    description: "Thorough usage pricing analysis"
