meta:
  id: global-retention-program
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Design and manage a retention program across multiple regions, cultures, and market conditions with global consistency and local adaptation"
  tags: [churn, global, multi-region, cultural, expert]

state: {}

trigger: |
  You're the Global VP of Customer Success at "WorldSaaS" ($250M
  ARR, 20,000 customers across 4 regions). Each region has different
  churn dynamics.

  Regional performance:
  North America (8,000 customers, $120M ARR):
  - Annual churn: 12%
  - NRR: 112%
  - Top churn reason: Competitive switching
  - CS team: 20 CSMs, well-established

  Europe (5,000 customers, $60M ARR):
  - Annual churn: 18%
  - NRR: 98%
  - Top churn reason: GDPR compliance concerns, pricing sensitivity
  - CS team: 8 CSMs, 2 years old

  APAC (4,000 customers, $40M ARR):
  - Annual churn: 25%
  - NRR: 88%
  - Top churn reason: Cultural misalignment in support (US-centric
    product, English-only documentation, timezone-mismatched CSMs)
  - CS team: 3 CSMs (all in Singapore), covering 12 countries

  LATAM (3,000 customers, $30M ARR):
  - Annual churn: 30%
  - NRR: 82%
  - Top churn reason: Economic instability, currency fluctuations
    making USD pricing unaffordable
  - CS team: 2 CSMs, newly established

  Budget: $3M for global retention improvement.

  Tasks:
  1. Allocate the $3M budget across regions. Where does each dollar
     have the most impact? Show your analysis.

  2. APAC churn is 25%. Design the cultural adaptation program that
     addresses timezone, language, and cultural support gaps.

  3. LATAM customers can't afford USD pricing due to currency
     fluctuation. Design the pricing/retention strategy.

  4. Should retention playbooks be globally standardized or locally
     adapted? Where do you draw the line?

assertions:
  - type: llm_judge
    criteria: "Budget allocation is ROI-driven — invests proportionally more in regions with higher churn rates and larger improvement potential"
    weight: 0.25
    description: "ROI-driven budget allocation"
  - type: llm_judge
    criteria: "APAC cultural adaptation is specific — addresses language localization, regional CSM hiring, timezone-appropriate support hours, and culturally adapted communication"
    weight: 0.25
    description: "Specific APAC adaptation"
  - type: llm_judge
    criteria: "LATAM pricing strategy is creative — proposes local currency pricing, PPP adjustments, or flexible payment terms rather than just discounting"
    weight: 0.25
    description: "Creative LATAM pricing"
  - type: llm_judge
    criteria: "Global vs. local framework is clear — standardizes metrics, tooling, and core processes while allowing local adaptation of communication, offers, and engagement cadence"
    weight: 0.25
    description: "Clear global-local framework"
