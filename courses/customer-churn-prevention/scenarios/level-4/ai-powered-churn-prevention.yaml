meta:
  id: ai-powered-churn-prevention
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Design an AI-powered churn prevention system — predictive models, automated interventions, and intelligent routing of at-risk customers"
  tags: [churn, AI, machine-learning, automation, expert]

state: {}

trigger: |
  You're the VP of CS Operations at "DataPlatform" ($150M ARR,
  10,000 customers). The board approved a $2M investment in
  AI-powered churn prevention. "We want to predict churn 60 days
  before it happens and intervene automatically."

  Available data:
  - 5 years of customer behavioral data (logins, feature usage,
    API calls, support interactions)
  - 3 years of churn data (2,400 churned customers with full
    behavioral history)
  - NPS and CSAT scores (quarterly and transactional)
  - Contract data (pricing, terms, renewal dates)
  - Communication data (email opens, meeting attendance, CSM notes)
  - Product feedback (feature requests, bug reports)
  - External signals (company news, funding events, leadership changes)

  Current performance (manual process):
  - Churn prediction accuracy: 45% (CSM gut feeling)
  - Intervention timing: Average 30 days before churn (too late)
  - Save rate on identified at-risk: 25%

  Target performance:
  - Churn prediction accuracy: 80%+
  - Prediction lead time: 60+ days
  - Save rate: 40%+

  Constraints:
  - Can't be a black box — CSMs need to understand WHY an account
    is flagged
  - Must integrate with Salesforce and Gainsight
  - Must handle both enterprise (500 accounts) and SMB (9,500) with
    different signal weights
  - GDPR/privacy: Can't use certain personal data

  Tasks:
  1. Design the ML pipeline: What features, what model architecture,
     and how do you train and validate it?

  2. Design the automated intervention system. What actions are
     auto-triggered vs. requiring human review?

  3. How do you make the model explainable for CSMs? They need to
     understand "Customer X is at risk BECAUSE..."

  4. The model will have false positives. How do you handle CSMs
     wasting time on accounts that aren't actually at risk?

assertions:
  - type: llm_judge
    criteria: "ML pipeline is practical — identifies specific features (usage trends, engagement velocity, support sentiment), appropriate model types, and validation methodology"
    weight: 0.25
    description: "Practical ML pipeline design"
  - type: llm_judge
    criteria: "Automation guardrails are appropriate — auto-triggers low-risk actions (emails, in-app messages) and routes high-impact decisions (discounts, executive calls) to humans"
    weight: 0.25
    description: "Appropriate automation guardrails"
  - type: llm_judge
    criteria: "Explainability approach is user-friendly — provides top contributing factors, risk score breakdown, and actionable recommendations alongside the prediction"
    weight: 0.25
    description: "User-friendly explainability"
  - type: llm_judge
    criteria: "False positive management is systematic — includes confidence thresholds, tiered response based on prediction confidence, and feedback loop to improve accuracy"
    weight: 0.25
    description: "Systematic false positive management"
