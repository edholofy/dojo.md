meta:
  id: platform-migration-retention
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Manage customer retention during a major platform migration — preventing churn from disruption, feature gaps, and change resistance"
  tags: [churn, migration, platform, change-management, expert]

state: {}

trigger: |
  You're the VP of Customer Success at "LegacyModern" ($80M ARR,
  5,000 customers). The company is migrating from "Platform v1" to
  a completely rebuilt "Platform v2." The migration will affect all
  5,000 customers over 12 months.

  Platform v2 improvements:
  - 10x faster performance
  - Modern UI (complete redesign)
  - New API (not backward compatible)
  - Mobile app (new)
  - Better security and compliance

  Platform v2 gaps:
  - 15% of v1 features not available at launch (coming in 6 months)
  - Custom integrations will need to be rebuilt by customers
  - Data migration requires 2-4 hours of downtime per customer
  - Customer workflows will change significantly

  Customer segments and expected response:
  - Power users (1,000, $40M ARR): Will resist — they've customized
    v1 extensively. Integration rebuild is costly for them.
  - Moderate users (2,000, $25M ARR): Mixed — excited about new
    features but worried about learning curve.
  - Light users (2,000, $15M ARR): Apathetic — may use the migration
    disruption as a reason to evaluate alternatives.

  Historical benchmark: Similar migrations at other SaaS companies
  resulted in 15-30% churn during migration.

  Tasks:
  1. Design the customer communication and migration plan. How do
     you sequence 5,000 migrations over 12 months?

  2. Power users are your highest-value segment. Design the white-
     glove migration program for them.

  3. 15% of features are missing at launch. How do you communicate
     this and retain customers who depend on those features?

  4. Light users may use the disruption to leave. Design the
     retention strategy that makes migration a reason to STAY.

assertions:
  - type: llm_judge
    criteria: "Migration sequence is strategic — starts with enthusiastic moderate users, then light users, then power users last (when feature gaps are filled)"
    weight: 0.25
    description: "Strategic migration sequencing"
  - type: llm_judge
    criteria: "Power user program is high-touch — includes dedicated migration specialist, integration rebuild support, parallel running period, and rollback option"
    weight: 0.25
    description: "High-touch power user program"
  - type: llm_judge
    criteria: "Feature gap communication is honest with a timeline — names the missing features, provides specific delivery dates, and offers alternatives or workarounds"
    weight: 0.25
    description: "Timeline-backed feature gap communication"
  - type: llm_judge
    criteria: "Light user strategy reframes migration as value — emphasizes new capabilities (mobile, performance) that give them reasons to engage more deeply"
    weight: 0.25
    description: "Value-reframing light user strategy"
