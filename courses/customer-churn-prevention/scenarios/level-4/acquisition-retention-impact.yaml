meta:
  id: acquisition-retention-impact
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Manage customer retention during and after a company acquisition — preventing churn from uncertainty, product changes, and platform migrations"
  tags: [churn, M&A, acquisition, migration, expert]

state: {}

trigger: |
  You're the VP of Customer Success at "AcquiredSaaS" ($60M ARR,
  4,000 customers). Your company was just acquired by "BigCorp"
  ($500M ARR). The integration plan calls for migrating all
  AcquiredSaaS customers to BigCorp's platform within 18 months.

  Customer concerns:
  - "Will my pricing change?" (Yes — BigCorp's platform costs 30%
    more for equivalent features)
  - "Will the product I love disappear?" (Yes — features will be
    integrated into BigCorp's platform, but not all features)
  - "Will I still have my CSM?" (Uncertain — BigCorp uses a tech-
    touch model for accounts under $50K)

  Churn risk assessment:
  - 60% of AcquiredSaaS customers are on plans under $50K (will
    lose dedicated CSM)
  - 30% of features unique to AcquiredSaaS won't be replicated
    in BigCorp's platform
  - Competitor "AlternativeSaaS" is already reaching out to your
    customers: "Worried about the acquisition? We'll match your
    current pricing."

  Historical benchmark: Industry average for acquisitions = 25-40%
  customer churn in the first 2 years post-acquisition.

  Communication constraints:
  - Legal requires all customer communications be approved by
    BigCorp's legal team (48-hour approval process)
  - You can't commit to pricing until BigCorp finalizes the
    integration pricing model (expected in 3 months)
  - BigCorp's PR team controls the narrative

  Tasks:
  1. Design the customer retention plan for the 18-month integration
     period. What's the phased approach?

  2. Handle the "what's changing" communication. How do you be honest
     about price increases, feature changes, and CSM model changes
     without triggering mass churn?

  3. The competitor is actively targeting your customers. Design the
     counter-campaign within your legal constraints.

  4. Target: Keep churn below 15% during the integration (vs. 25-40%
     industry average). What specific actions make this achievable?

assertions:
  - type: llm_judge
    criteria: "Retention plan is phased — addresses immediate uncertainty (Day 1 communication), short-term stability (pricing locks), and long-term transition (migration support)"
    weight: 0.25
    description: "Phased integration retention plan"
  - type: llm_judge
    criteria: "Change communication is honest but strategic — acknowledges changes coming, frames them positively where possible, and provides timeline without creating immediate panic"
    weight: 0.25
    description: "Strategic change communication"
  - type: llm_judge
    criteria: "Counter-campaign works within constraints — proposes customer touchpoints and loyalty incentives that don't require legal approval for each communication"
    weight: 0.25
    description: "Legally constrained counter-campaign"
  - type: llm_judge
    criteria: "15% churn target is backed by specific actions — lists measurable interventions (pricing locks, migration support, dedicated teams) that reduce churn from the baseline"
    weight: 0.25
    description: "Action-backed churn target"
