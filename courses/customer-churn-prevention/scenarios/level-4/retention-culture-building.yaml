meta:
  id: retention-culture-building
  level: 4
  course: customer-churn-prevention
  type: output
  description: "Build a company-wide retention culture where every department understands, measures, and acts on churn prevention"
  tags: [churn, culture, organizational, leadership, expert]

state: {}

trigger: |
  You're the CEO of "RetainTech" ($100M ARR, 6,000 customers).
  Despite investing in CS, churn hasn't improved in 2 years (stuck
  at 15%). You've concluded the problem is cultural — nobody outside
  CS cares about retention.

  Cultural assessment:
  - Sales: Comp plan rewards new logos only. No clawback for churned
    customers. Quota relief for bad-fit deals.
  - Marketing: Campaigns optimize for lead volume, not lead quality.
    No tracking of which campaigns produce high-churn customers.
  - Product: Roadmap driven by prospects and competitive features.
    No "retention features" category. Product team doesn't attend
    churn reviews.
  - Engineering: Uptime is measured but not connected to customer
    impact. Bug fixes prioritized by engineering severity, not
    customer value.
  - Finance: Revenue recognized at booking. No visibility into
    expected churn or credit exposure.
  - HR: No customer-centric hiring criteria. No retention metrics
    in performance reviews.

  Financial reality:
  - Acquiring a new customer: $12K CAC
  - Retaining an existing customer: $1.5K annual CS cost
  - Churned revenue last year: $15M
  - Replacing churned revenue: $18M in sales + marketing spend
  - Net efficiency loss: $3M+ per year

  Tasks:
  1. Design the retention culture transformation. What changes to
     each department's incentives, metrics, and processes?

  2. How do you change the sales comp plan to include retention
     without demotivating the sales team?

  3. Create the "company retention scorecard" that every department
     reviews monthly. What metrics, who owns each, and what triggers
     action?

  4. You're giving an all-hands presentation: "Retention is
     everyone's job." What's your message and how do you make it
     resonate with every department?

assertions:
  - type: llm_judge
    criteria: "Cultural changes are department-specific — proposes concrete incentive and metric changes for each department, not just platitudes about 'customer focus'"
    weight: 0.25
    description: "Department-specific cultural changes"
  - type: llm_judge
    criteria: "Sales comp change is balanced — includes retention component (clawback, retention bonus, or customer quality metric) without making sales roles unattractive"
    weight: 0.25
    description: "Balanced sales comp redesign"
  - type: llm_judge
    criteria: "Retention scorecard is comprehensive — includes metrics owned by each department with clear targets, accountability, and escalation triggers"
    weight: 0.25
    description: "Comprehensive retention scorecard"
  - type: llm_judge
    criteria: "All-hands message resonates across functions — translates retention into each department's language (sales: easier expansion, product: better NPS, engineering: fewer fire drills)"
    weight: 0.25
    description: "Cross-functional resonant message"
