meta:
  id: support-portfolio
  level: 5
  course: saas-support-tickets
  type: output
  description: "Create a comprehensive support portfolio — document your expertise through case studies, frameworks, and artifacts that demonstrate mastery"
  tags: [support, portfolio, case-studies, frameworks, expertise, mastery]

state: {}

trigger: |
  A support portfolio demonstrates expertise through tangible
  artifacts, not just claims. Whether you're interviewing for
  a VP role, pitching consulting services, or building internal
  credibility, a portfolio of frameworks, case studies, and
  results speaks louder than a resume.

  Part 1: Portfolio structure
  1. Executive summary (your support philosophy)
  2. Case studies (problems solved with results)
  3. Frameworks and methodologies (your approach)
  4. Artifacts (real deliverables you've created)
  5. Results and metrics (quantified impact)

  Part 2: Build a complete support portfolio

  1. Write your support philosophy statement (500 words):
     - Your core beliefs about customer support
     - What differentiates good support from great support
     - How you approach support strategy
     - Your leadership and team-building philosophy
     - Make it personal, specific, and authentic

  2. Write 3 detailed case studies:

     Case Study A — "Transforming a Support Crisis"
     Situation: Company with 3.2 CSAT, 12-hour FRT, 22% churn
     Your actions: audit, restructure, implement self-service, AI
     Results: 4.4 CSAT, 1.5-hour FRT, 9% churn in 12 months
     Write the full case study with problem, approach, actions, results.

     Case Study B — "Building Enterprise Support from Scratch"
     Situation: SMB-focused SaaS moving upmarket with zero enterprise
     support infrastructure
     Your actions: design enterprise support model, hire specialists,
     build processes, implement tools
     Results: 95% enterprise retention, NPS 65, $2M in expansion revenue
     Write the full case study.

     Case Study C — "Support-Driven Product Transformation"
     Situation: Product team ignoring customer feedback, support
     team demoralized, high bug recurrence
     Your actions: build feedback pipeline, establish support-product
     partnership, implement VoC program
     Results: 40% reduction in bug-related tickets, product NPS
     improvement, support team engagement up 50%
     Write the full case study.

  3. Document 3 original frameworks:

     Framework A: "The Support Maturity Model"
     A 5-level model for assessing support organization maturity:
     - Level 1: Reactive (firefighting)
     - Level 2: Organized (processes exist)
     - Level 3: Proactive (anticipating issues)
     - Level 4: Strategic (driving business value)
     - Level 5: Transformative (competitive advantage)
     Define characteristics, metrics, and transition requirements.

     Framework B: "The Customer Effort Optimization Framework"
     A systematic approach to reducing customer effort in every
     support interaction. Define the components, measurement
     method, and optimization process.

     Framework C: "The Support Revenue Attribution Model"
     A methodology for attributing revenue impact to support
     activities. Define the attribution categories, measurement
     approach, and reporting structure.

  4. Create 3 portfolio artifacts:
     - A one-page "Support Strategy Canvas" template
     - A QA scorecard template (ready to use)
     - A support team performance dashboard design

  Part 3: Portfolio presentation
  1. Tailoring your portfolio for different audiences
  2. Quantifying results effectively
  3. Telling compelling support stories
  4. Continuous portfolio development

assertions:
  - type: llm_judge
    criteria: "Case studies are compelling and specific — each tells a clear story with concrete actions and quantified results"
    weight: 0.30
    description: "Compelling specific case studies"
  - type: llm_judge
    criteria: "Frameworks are original and practical — the Support Maturity Model and other frameworks provide genuine analytical value, not just buzzwords"
    weight: 0.25
    description: "Original practical frameworks"
  - type: llm_judge
    criteria: "The support philosophy is authentic and specific — it reveals genuine beliefs about support rather than generic platitudes"
    weight: 0.25
    description: "Authentic specific philosophy"
  - type: llm_judge
    criteria: "Portfolio artifacts are ready to use — templates and dashboards could be implemented immediately without significant additional work"
    weight: 0.20
    description: "Ready-to-use artifacts"
