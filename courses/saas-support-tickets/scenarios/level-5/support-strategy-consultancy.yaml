meta:
  id: support-strategy-consultancy
  level: 5
  course: saas-support-tickets
  type: output
  description: "Act as a support strategy consultant — audit existing operations, identify transformation opportunities, and design a complete support improvement roadmap"
  tags: [support, strategy, consultancy, transformation, audit, mastery]

state: {}

trigger: |
  As a support strategy consultant, you're brought in to assess
  a company's support operations and design a transformation
  roadmap. This requires synthesizing everything you've learned
  into actionable strategic recommendations.

  Client: "MetricsDash" — a business analytics SaaS
  - ARR: $12M, growing 40% year-over-year
  - Customers: 8,000 (80% SMB, 15% mid-market, 5% enterprise)
  - Support team: 22 agents, 2 leads, 1 manager
  - Monthly ticket volume: 8,500 (growing 30% YoY)
  - Current CSAT: 3.6/5.0 (industry average: 4.2)
  - Current FRT: 6.2 hours (target: 2 hours)
  - FCR: 58% (industry benchmark: 72%)
  - Annual churn: 18% (industry average: 10%)
  - NPS: 12 (industry average: 35)
  - Support cost: $1.8M/year
  - No knowledge base, no chatbot, no self-service
  - Help desk: Freshdesk (basic plan, underutilized)
  - No QA program, no formal training
  - Top ticket categories: Login issues (25%), "How do I?" (22%),
    Bugs (18%), Billing (15%), Feature requests (12%), Other (8%)

  Phase 1 — Audit (deliverable: assessment report):
  1. Identify the top 5 operational problems
  2. Benchmark against industry standards
  3. Root cause analysis for each problem
  4. Quick wins (improvements achievable in 30 days)

  Phase 2 — Strategy (deliverable: transformation plan):
  1. 12-month transformation roadmap (quarterly milestones)
  2. Technology recommendations (tools, integrations)
  3. Organizational design (team structure, roles, hiring plan)
  4. Process improvements (workflows, automation, QA)
  5. Self-service strategy (knowledge base, chatbot, in-app help)

  Phase 3 — Business case (deliverable: executive presentation):
  1. Investment required (people, technology, training)
  2. Expected ROI timeline
  3. Impact on churn, CSAT, NPS, and support cost
  4. Risk assessment and mitigation
  5. Success metrics and measurement plan

  Deliver all three phases as complete, client-ready documents.

assertions:
  - type: llm_judge
    criteria: "The audit correctly identifies critical issues — the missing self-service, high churn correlation with low CSAT, and underutilized tooling are flagged as root causes"
    weight: 0.30
    description: "Accurate critical issue identification"
  - type: llm_judge
    criteria: "The transformation plan is realistic and phased — it accounts for the company's growth rate and current team capacity without demanding unrealistic change speed"
    weight: 0.25
    description: "Realistic phased transformation"
  - type: llm_judge
    criteria: "The business case connects investments to outcomes — each recommendation includes specific expected impact on CSAT, churn, and cost metrics"
    weight: 0.25
    description: "Investment-outcome connection"
  - type: llm_judge
    criteria: "Deliverables are consultant-quality — they could be presented to a CEO or board with appropriate formatting, data, and recommendations"
    weight: 0.20
    description: "Consultant-quality deliverables"
