meta:
  id: support-transformation-leadership
  level: 5
  course: saas-support-tickets
  type: output
  description: "Lead a complete support transformation — guide an organization through fundamental change in support culture, operations, and customer experience"
  tags: [support, transformation, leadership, change-management, culture, mastery]

state: {}

trigger: |
  Support transformation is a leadership challenge as much as an
  operational one. Changing how a company supports its customers
  requires vision, stakeholder alignment, change management, and
  the ability to maintain service quality while rebuilding the plane
  in flight.

  Part 1: Transformation leadership principles
  1. The transformation paradox:
     - You must improve current operations while redesigning them
     - You must maintain team morale while changing everything
     - You must show quick results while building long-term change
     - You must secure budget by demonstrating value you haven't
       created yet
  2. Stakeholder alignment:
     - CEO/Board: strategic value narrative (ROI, competitive advantage)
     - Product: partnership narrative (customer intelligence)
     - Engineering: collaboration narrative (better bug reports)
     - Sales: enablement narrative (customer references, reduced churn)
     - Finance: efficiency narrative (cost optimization, revenue impact)
  3. Change management for support:
     - Communicating the "why" (not just the "what")
     - Building coalition of champions within the team
     - Managing resistance (it's natural, not hostile)
     - Celebrating progress (even small wins matter)
     - Sustaining change after the initial excitement fades

  Part 2: Lead a support transformation
  You've been hired as VP of Customer Support at "TechPulse" — a
  mid-market SaaS company in crisis:

  Current state:
  - ARR: $40M, flat growth (was growing 30% YoY two years ago)
  - Churn: 15% annually (up from 8% two years ago)
  - NPS: 8 (down from 45 two years ago)
  - Support team: 40 agents with 35% annual turnover
  - Glassdoor reviews mention "toxic support culture"
  - CEO is considering outsourcing support entirely
  - Product team views support as "the complaint department"
  - Engineering has a 6-month backlog of customer-reported bugs
  - No self-service, no automation, no QA program
  - Support is organized by channel (email team, chat team, phone team)
     instead of by skill or customer segment

  Board mandate: "Transform support or we outsource it. You have
  18 months to show results."

  Deliverables:

  1. The transformation vision document:
     - Where we are (brutal honest assessment)
     - Where we're going (inspiring but achievable vision)
     - Why this matters (business case for transformation)
     - How we'll get there (strategic approach)
     - What success looks like (measurable outcomes)

  2. The 18-month transformation roadmap:
     Months 1-3: "Stop the bleeding"
     - Quick wins to show immediate improvement
     - Crisis interventions for at-risk accounts
     - Team morale stabilization
     - Quick hires to address staffing gaps

     Months 4-9: "Build the foundation"
     - Organizational restructure (from channel-based to segment/skill)
     - Process redesign (ticket lifecycle, escalation, QA)
     - Technology overhaul (new help desk, knowledge base, automation)
     - Training program launch

     Months 10-15: "Accelerate"
     - Self-service launch (knowledge base + chatbot)
     - AI-assisted support implementation
     - Product partnership formalization
     - Community launch

     Months 16-18: "Demonstrate"
     - Measure transformation results
     - Present to the board
     - Plan for next phase of growth

  3. The stakeholder communication plan:
     - Board updates (quarterly, metrics-driven)
     - CEO weekly updates (progress + blockers)
     - Product/Engineering monthly syncs (partnership building)
     - Team all-hands (monthly, transparent, celebrating progress)
     - Customer advisory board (quarterly, voice of customer)

  4. The cultural transformation plan:
     - From reactive → proactive culture
     - From blame → learning culture
     - From siloed → collaborative culture
     - From metrics-obsessed → customer-obsessed culture
     Include: specific cultural initiatives, measurement, and timeline.

  Part 3: Sustaining transformation
  1. What happens when the initial excitement fades
  2. Handling setbacks during transformation
  3. Building transformation into ongoing operations
  4. Passing the baton (ensuring transformation survives your departure)

assertions:
  - type: llm_judge
    criteria: "The transformation vision is both honest and inspiring — the current state assessment is brutally accurate while the vision is genuinely achievable"
    weight: 0.30
    description: "Honest and inspiring vision"
  - type: llm_judge
    criteria: "The 18-month roadmap is realistic given constraints — it accounts for team morale, hiring timelines, and the need to maintain service while transforming"
    weight: 0.25
    description: "Realistic constrained roadmap"
  - type: llm_judge
    criteria: "Stakeholder communication is tailored per audience — each stakeholder group gets messaging that addresses their specific concerns and interests"
    weight: 0.25
    description: "Audience-tailored communication"
  - type: llm_judge
    criteria: "Cultural transformation goes beyond surface changes — specific initiatives address the toxic culture mentioned in Glassdoor reviews with genuine interventions"
    weight: 0.20
    description: "Genuine cultural intervention"
