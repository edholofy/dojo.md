meta:
  id: support-psychology
  level: 5
  course: saas-support-tickets
  type: output
  description: "Apply behavioral psychology to support — understand cognitive biases, emotional triggers, decision-making patterns, and persuasion in customer interactions"
  tags: [support, psychology, behavioral, cognitive-bias, emotions, mastery]

state: {}

trigger: |
  Understanding the psychology behind customer behavior transforms
  support from reactive problem-solving into strategic relationship
  management. Cognitive biases, emotional states, and decision
  patterns influence how customers perceive support quality —
  often more than the actual resolution.

  Part 1: Psychology in support interactions
  1. Cognitive biases affecting support perception:
     - Peak-end rule: customers judge experience by the peak
       (most intense moment) and the end, not the average
     - Negativity bias: one bad interaction outweighs five good ones
     - Anchoring: first response sets the expectation for the interaction
     - Endowment effect: customers overvalue what they already have
       (harder to accept downgrades or changes)
     - Status quo bias: resistance to any change, even improvements
     - Dunning-Kruger effect: some customers overestimate their
       technical ability (handle with care)
  2. Emotional states and support behavior:
     - Anger often masks fear (loss of data, business impact)
     - Frustration comes from unmet expectations (set better ones)
     - Confusion leads to helplessness (simplify, don't overwhelm)
     - Gratitude is an opportunity (build on positive moments)
  3. Decision-making in support:
     - Choice overload: too many options paralyze the customer
     - Loss aversion: framing as preventing loss vs. gaining benefit
     - Social proof: "other customers in your situation found..."
     - Reciprocity: give first (a credit, a workaround) to build goodwill

  Part 2: Apply psychology to support scenarios
  For "LearnHub" — an e-learning platform SaaS:

  1. Design a psychologically optimized support experience:
     Using the peak-end rule, design the ideal ticket lifecycle:
     - How to make the "peak" moment positive
     - How to ensure the "end" of every interaction is memorable
     - Identify and eliminate negative peaks
     - Provide 5 specific techniques with examples

  2. Rewrite 4 support responses using psychological principles:
     Original Response A:
     "Unfortunately, we don't offer that feature. You could try
     using a workaround, but it's not ideal."

     Original Response B:
     "Your account was suspended because you violated our terms
     of service. Please review our policies."

     Original Response C:
     "There are 6 different ways to export your data. Here are all
     the options: [long list]..."

     Original Response D:
     "We've applied a $50 credit to your account as compensation
     for the inconvenience."

     For each: identify the psychological issues, rewrite using
     behavioral principles, explain what changed and why.

  3. Design a customer feedback system informed by psychology:
     - When to ask for feedback (timing matters enormously)
     - How to frame questions (avoid leading, reduce bias)
     - Rating scale design (5-star vs. NPS vs. CES)
     - What to do with negative feedback (recovery opportunity)
     - How to increase response rates without annoying customers

  4. Create a "psychological safety" training module for agents:
     - How to create trust in the first 30 seconds
     - Language patterns that build vs. destroy rapport
     - Handling cognitive dissonance (customer is wrong but feels right)
     - Managing your own cognitive biases as a support agent
     - 6 specific exercises for developing psychological awareness

  Part 3: Ethical considerations
  1. Persuasion vs. manipulation in support
  2. When psychological techniques cross ethical lines
  3. Transparency about influence techniques
  4. Using psychology to help, not exploit

assertions:
  - type: llm_judge
    criteria: "Psychological principles are correctly applied — peak-end rule, loss aversion, and choice overload are used appropriately in support contexts"
    weight: 0.30
    description: "Correct psychological application"
  - type: llm_judge
    criteria: "Response rewrites demonstrate meaningful improvement — the psychological principles genuinely improve the customer experience, not just the language"
    weight: 0.25
    description: "Meaningfully improved responses"
  - type: llm_judge
    criteria: "The feedback system design is psychologically informed — timing, framing, and scale design reflect real behavioral science"
    weight: 0.25
    description: "Psychologically informed feedback"
  - type: llm_judge
    criteria: "Ethical boundaries are clearly drawn — the distinction between helpful persuasion and manipulation is addressed with specific examples"
    weight: 0.20
    description: "Clear ethical boundaries"
