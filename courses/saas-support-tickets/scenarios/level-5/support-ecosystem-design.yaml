meta:
  id: support-ecosystem-design
  level: 5
  course: saas-support-tickets
  type: output
  description: "Design a complete support ecosystem — architect the interconnected system of self-service, human support, community, automation, and feedback loops"
  tags: [support, ecosystem, architecture, holistic, design, mastery]

state: {}

trigger: |
  A support ecosystem is more than a help desk with a knowledge
  base. It's an interconnected system where every component
  reinforces the others: self-service reduces ticket volume,
  tickets inform knowledge base content, community amplifies
  both, automation handles the predictable, and data from
  all channels drives continuous improvement.

  Part 1: Ecosystem components and connections
  1. Self-service layer:
     - Knowledge base (articles, videos, tutorials)
     - In-app guidance (tooltips, walkthroughs, contextual help)
     - Community forums (peer-to-peer support)
     - Chatbot (AI-powered first line)
     - Status page (real-time system health)
  2. Human support layer:
     - Tier 1 (generalists, high volume, fast response)
     - Tier 2 (specialists, complex issues, deep expertise)
     - Tier 3 (engineering support, code-level troubleshooting)
     - Enterprise support (dedicated, relationship-based)
     - Proactive support (outreach based on signals)
  3. Feedback and intelligence layer:
     - Customer satisfaction tracking (per interaction and overall)
     - Product feedback pipeline (support → product team)
     - Knowledge gap identification (tickets without articles)
     - Customer health scoring (aggregated signals)
     - Competitive intelligence (what customers tell support)
  4. Orchestration layer:
     - Routing logic (right channel, right agent, right time)
     - Escalation automation (SLA-driven, sentiment-driven)
     - Workflow automation (repetitive tasks eliminated)
     - Cross-channel context (unified customer timeline)

  Part 2: Design a support ecosystem
  For "ProjectFlow" — a project management SaaS growing from
  10,000 to 50,000 users over 2 years:

  1. Map the complete ecosystem architecture:
     - Draw the connections between all components
     - Identify data flows (what information moves where)
     - Define interaction patterns (how a customer moves between layers)
     - Specify technology for each component
     - Calculate expected volume at each layer

  2. Design the customer journey through the ecosystem:
     Map 5 support scenarios from trigger to resolution:
     - Scenario A: Simple how-to question (self-service resolution)
     - Scenario B: Bug report (chatbot → human → engineering)
     - Scenario C: Billing dispute (chatbot → human → resolution)
     - Scenario D: Enterprise onboarding (proactive → dedicated support)
     - Scenario E: Outage (status page → mass comm → individual follow-up)
     For each: show every touchpoint and handoff in the ecosystem.

  3. Design the feedback loops:
     Create 4 closed-loop feedback systems:
     - Loop 1: Ticket → KB article creation → deflection measurement
     - Loop 2: Customer feedback → product improvement → customer notification
     - Loop 3: Agent performance → coaching → quality improvement
     - Loop 4: Usage data → proactive outreach → issue prevention
     For each: trigger, action, measurement, iteration cycle.

  4. Create the ecosystem scaling plan:
     - Phase 1 (10K users): Core support + basic self-service
     - Phase 2 (20K users): + Community + advanced automation
     - Phase 3 (35K users): + AI/ML + predictive support
     - Phase 4 (50K users): Full ecosystem operational
     For each phase: components, technology, team, investment, metrics.

  Part 3: Ecosystem health metrics
  1. Measuring ecosystem effectiveness holistically
  2. Balancing investment across ecosystem components
  3. Avoiding ecosystem over-complexity
  4. Evolving the ecosystem with product and market changes

assertions:
  - type: llm_judge
    criteria: "The ecosystem architecture is coherent — all components connect logically with clear data flows and interaction patterns"
    weight: 0.30
    description: "Coherent ecosystem architecture"
  - type: llm_judge
    criteria: "Customer journeys show realistic paths through the ecosystem — each scenario demonstrates how components work together, including handoffs and edge cases"
    weight: 0.25
    description: "Realistic customer journeys"
  - type: llm_judge
    criteria: "Feedback loops are genuinely closed — each loop has a measurable trigger, action, outcome, and iteration mechanism"
    weight: 0.25
    description: "Genuinely closed feedback loops"
  - type: llm_judge
    criteria: "The scaling plan is progressive and realistic — each phase builds on the previous without requiring too much simultaneous change"
    weight: 0.20
    description: "Progressive realistic scaling"
