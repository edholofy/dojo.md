meta:
  id: support-roi-framework
  level: 5
  course: saas-support-tickets
  type: output
  description: "Build a comprehensive support ROI framework — quantify every dimension of support's value from cost savings to revenue generation to brand equity"
  tags: [support, roi, framework, value, business-case, mastery]

state: {}

trigger: |
  Building a comprehensive ROI framework for support requires
  quantifying both the obvious (cost per ticket) and the subtle
  (brand perception, word-of-mouth, product improvement velocity).
  This framework becomes the foundation for every budget request,
  staffing decision, and strategic initiative.

  Part 1: The complete support value chain
  1. Direct cost savings:
     - Self-service deflection (tickets not created)
     - Automation efficiency (faster handling)
     - First contact resolution (fewer follow-ups)
     - Knowledge base ROI (one article serves thousands)
  2. Revenue impact:
     - Churn prevention (saved ARR)
     - Expansion influence (upsell/cross-sell from support)
     - Trial conversion (support-assisted activation)
     - Referral generation (happy customers refer)
  3. Product improvement:
     - Bug discovery velocity (support finds issues first)
     - Feature prioritization quality (customer-informed roadmap)
     - Usability insights (confusion signals from tickets)
     - Competitive intelligence (customers share what competitors do)
  4. Brand and market value:
     - Reputation impact (reviews, word-of-mouth)
     - Competitive differentiation (support as a selling point)
     - Employer brand (great support teams attract talent)
     - Market intelligence (early trend detection)

  Part 2: Build the ROI framework
  For "CloudBase" — a cloud database SaaS:
  - 12,000 customers, $30M ARR
  - Support team: 28 agents, $2.4M annual cost
  - Monthly tickets: 15,000
  - CSAT: 4.3/5.0, NPS: 42
  - Annual churn: 8%
  - Average customer LTV: $18,000

  1. Quantify each value dimension:
     Calculate specific dollar values for:
     - Self-service deflection savings (if 30% deflection rate)
     - Churn prevention value (support saves X customers at $Y LTV)
     - Expansion influence (support identifies Z upsell opportunities)
     - Product improvement value (faster bug detection saves
       $X in engineering time and customer impact)
     - Brand value contribution (G2 rating impact on lead conversion)
     Show all assumptions and calculations.

  2. Create the ROI dashboard:
     Design a quarterly ROI report with:
     - Total support value generated (dollar amount)
     - Support cost vs. value ratio
     - Trend analysis (is ROI improving?)
     - Comparison to industry benchmarks
     - Investment recommendations based on ROI data

  3. Model 3 investment scenarios:
     Scenario A: Add 5 agents + AI chatbot ($400K investment)
     Scenario B: Add 3 agents + knowledge base overhaul ($250K)
     Scenario C: No new investment, optimize existing resources ($0)
     For each:
     - Project the impact on key metrics (CSAT, FRT, churn, FCR)
     - Calculate expected ROI over 12 months
     - Identify risks and assumptions
     - Recommend which scenario to pursue and why

  4. Create the annual support value report:
     Write the executive report that proves support's business value:
     - Story format (problem → investment → results → future)
     - Specific dollar values for each value dimension
     - Customer stories that illustrate the numbers
     - Comparison to alternatives (what if we had no support team?)
     - Forward-looking investment recommendations

  Part 3: Sustaining ROI measurement
  1. Building automated ROI tracking
  2. Evolving the framework as the business grows
  3. Communicating ROI to different stakeholders
  4. Using ROI data to drive strategic decisions

assertions:
  - type: llm_judge
    criteria: "ROI calculations are defensible — assumptions are stated, math is correct, and values are realistic for the company's scale"
    weight: 0.30
    description: "Defensible ROI calculations"
  - type: llm_judge
    criteria: "All value dimensions are quantified — direct costs, revenue impact, product improvement, and brand value each get specific dollar amounts"
    weight: 0.25
    description: "Comprehensive value quantification"
  - type: llm_judge
    criteria: "Investment scenarios are meaningfully different — each scenario has distinct trade-offs and the recommendation is well-reasoned"
    weight: 0.25
    description: "Distinct scenario analysis"
  - type: llm_judge
    criteria: "The annual value report is executive-compelling — it tells a story that makes support's value undeniable"
    weight: 0.20
    description: "Compelling executive story"
