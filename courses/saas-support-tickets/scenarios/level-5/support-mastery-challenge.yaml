meta:
  id: support-mastery-challenge
  level: 5
  course: saas-support-tickets
  type: output
  description: "Complete the ultimate support mastery challenge — handle an extreme multi-day scenario combining every support skill into one comprehensive test"
  tags: [support, mastery, challenge, comprehensive, ultimate, mastery]

state: {}

trigger: |
  This is the ultimate SaaS support mastery challenge. You'll
  navigate a complex, multi-day scenario that tests every skill
  you've developed — from frontline ticket handling to strategic
  leadership to crisis management.

  You are the newly promoted VP of Customer Experience at
  "LaunchPad" — a product launch management SaaS ($25M ARR,
  15,000 customers). You report directly to the CEO.

  DAY 1 — Your first day:
  1. The current state briefing reveals:
     - Support team of 35 (high turnover — 40% annually)
     - CSAT: 3.4/5 and declining
     - FRT: 8 hours average
     - 12,000 tickets/month, growing 25% quarterly
     - No knowledge base, no automation
     - 3 enterprise accounts ($50K+/mo each) threatening to leave
     - Engineering relationship is adversarial ("support sends us garbage bugs")
     - CEO wants a transformation plan in 30 days

  Task: Write your 90-day plan with 30/60/90 milestones.

  DAY 7 — First crisis:
  A zero-day vulnerability is discovered in LaunchPad's file
  upload feature. Attackers could potentially access customer
  files. No evidence of exploitation yet, but you have 30 minutes
  before a security researcher publishes the disclosure.

  Task: Write the crisis response plan covering:
  - Immediate containment actions
  - Customer notification strategy (who, when, what)
  - Media response (the disclosure will make tech news)
  - Engineering coordination
  - Support team preparation for incoming volume

  DAY 14 — Enterprise saves:
  You meet with the 3 at-risk enterprise accounts:
  - Account A ($65K/mo): "Your support is terrible. We wait days
    for responses. We're evaluating Asana."
  - Account B ($52K/mo): "We've had the same bug for 4 months.
    Nobody seems to care."
  - Account C ($48K/mo): "We love the product but your team
    doesn't understand our enterprise needs."

  Task: Write a personalized retention plan for each account.

  DAY 21 — Organizational redesign:
  Armed with 3 weeks of data, you present your support org redesign:
  - From flat to tiered (T1/T2/T3 + Enterprise + Self-service)
  - New roles: Knowledge Manager, Support Engineer, QA Lead
  - AI/automation strategy
  - Engineering partnership model
  - Career development framework

  Task: Write the full organizational proposal.

  DAY 30 — CEO presentation:
  Present your transformation plan to the CEO and board:
  - Current state assessment (brutal honesty)
  - 12-month transformation roadmap
  - Investment required ($X people, $Y tools, $Z training)
  - Expected outcomes (CSAT, FRT, churn, NPS projections)
  - Risk assessment and contingency plans

  Task: Write the board-ready presentation outline with key slides.

assertions:
  - type: llm_judge
    criteria: "The 90-day plan is comprehensive and realistic — it addresses immediate fires, structural problems, and strategic vision with achievable milestones"
    weight: 0.30
    description: "Comprehensive realistic 90-day plan"
  - type: llm_judge
    criteria: "The security crisis response is appropriate — it prioritizes customer safety, transparency, and coordinated communication across all channels"
    weight: 0.25
    description: "Appropriate security crisis response"
  - type: llm_judge
    criteria: "Enterprise retention plans are personalized — each account gets a tailored approach addressing their specific complaint, not generic promises"
    weight: 0.25
    description: "Personalized enterprise retention"
  - type: llm_judge
    criteria: "The board presentation is executive-quality — it tells a compelling story from problem to solution to ROI with appropriate data and confidence"
    weight: 0.20
    description: "Executive-quality board presentation"
