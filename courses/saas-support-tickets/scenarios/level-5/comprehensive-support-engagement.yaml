meta:
  id: comprehensive-support-engagement
  level: 5
  course: saas-support-tickets
  type: output
  description: "Complete the comprehensive support engagement — deliver a full consulting engagement combining audit, strategy, implementation, and measurement"
  tags: [support, comprehensive, engagement, consulting, complete, mastery]

state: {}

trigger: |
  This is the capstone assessment. You'll deliver a complete
  support consulting engagement that synthesizes everything
  from ticket handling to organizational transformation into
  one cohesive deliverable.

  Client: "FinanceFlow" — a fintech SaaS
  - Product: Automated bookkeeping and financial reporting
  - ARR: $55M, 22,000 customers
  - Segments: Freelancers (60%), SMB (30%), Mid-market (10%)
  - Support team: 50 agents across 3 time zones (US, EU, APAC)
  - Channels: Email (55%), Chat (30%), Phone (10%), Social (5%)
  - Monthly tickets: 28,000
  - CSAT: 3.9/5.0 (target: 4.5)
  - FRT: 4.1 hours (target: 1 hour for chat, 4 hours for email)
  - FCR: 64% (target: 80%)
  - NPS: 28 (target: 50)
  - Annual churn: 11% (target: 7%)
  - Support cost: $4.2M/year
  - Existing tools: Zendesk, basic knowledge base, no AI/automation
  - Key challenge: Tax season (Jan-Apr) creates 3x volume spike
  - Regulatory: financial data handling requires SOC 2, GDPR compliance
  - Competitive pressure: competitors offering AI-powered support

  Deliverables (create all):

  1. EXECUTIVE ASSESSMENT (2-page summary):
     - Current state scoring (10 dimensions, 1-5 each)
     - Top 5 critical gaps
     - Competitive positioning vs. industry benchmarks
     - Strategic recommendation summary

  2. DETAILED FINDINGS (comprehensive):
     - Operational analysis (volume, staffing, efficiency)
     - Quality analysis (CSAT drivers, QA assessment)
     - Technology audit (tools, integrations, gaps)
     - Team assessment (skills, structure, morale, turnover)
     - Customer journey analysis (pain points, moments of truth)
     - Compliance and security review
     - Tax season readiness assessment

  3. STRATEGIC ROADMAP (12-month):
     Quarter 1: Foundation (process + people)
     Quarter 2: Technology (tools + automation)
     Quarter 3: Innovation (AI + self-service)
     Quarter 4: Optimization (measurement + iteration)
     Each quarter: initiatives, milestones, investment, expected results

  4. IMPLEMENTATION PLAYBOOKS (3):
     - Playbook A: Tax season surge management
       (staffing model, automation, self-service, communication)
     - Playbook B: AI-powered support implementation
       (chatbot, agent copilot, auto-categorization, quality monitoring)
     - Playbook C: Customer health-driven support
       (health scoring, proactive outreach, churn prevention, expansion)

  5. FINANCIAL MODEL:
     - Current support economics (cost per ticket, cost per customer)
     - Projected economics after transformation
     - Investment requirements by quarter
     - ROI timeline and break-even analysis
     - Sensitivity analysis (best case, likely case, worst case)

  6. SUCCESS METRICS DASHBOARD:
     - Leading indicators (predictive metrics)
     - Lagging indicators (outcome metrics)
     - Operational metrics (efficiency)
     - Experience metrics (quality)
     - Business metrics (revenue impact)
     - Quarterly review cadence and reporting structure

assertions:
  - type: llm_judge
    criteria: "All 6 deliverables are complete and professional — each could be presented to a C-suite audience without additional refinement"
    weight: 0.30
    description: "Complete professional deliverables"
  - type: llm_judge
    criteria: "The financial model is rigorous — cost calculations, ROI projections, and sensitivity analysis use realistic assumptions with transparent methodology"
    weight: 0.25
    description: "Rigorous financial modeling"
  - type: llm_judge
    criteria: "Tax season surge management addresses the unique fintech challenge — it provides specific staffing models, automation strategies, and customer communication plans for 3x volume"
    weight: 0.25
    description: "Fintech-specific surge planning"
  - type: llm_judge
    criteria: "The strategic roadmap connects investments to measurable outcomes — each initiative has clear expected impact on the target metrics"
    weight: 0.20
    description: "Investment-outcome connected roadmap"
