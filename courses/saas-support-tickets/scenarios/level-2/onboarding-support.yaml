meta:
  id: onboarding-support
  level: 2
  course: saas-support-tickets
  type: output
  description: "Support customers during onboarding — help new users get started, overcome setup obstacles, and achieve first value quickly"
  tags: [support, onboarding, setup, first-value, activation, intermediate]

state: {}

trigger: |
  Onboarding support is uniquely important because first impressions
  determine whether customers stay or churn. Support during onboarding
  isn't just fixing problems — it's proactively guiding customers
  to their first "aha moment" as quickly as possible.

  Part 1: Onboarding support principles
  1. Time to First Value (TTFV):
     - The faster a customer sees value, the more likely they stay
     - Identify "aha moments" for your product
     - Remove friction from the setup process
     - Proactive check-ins during critical first days
  2. Common onboarding blockers:
     - Account setup confusion (settings, team invites)
     - Data migration from previous tools
     - Integration configuration
     - Understanding core features vs. advanced features
     - Mismatched expectations (what they bought vs. what they need)
  3. Onboarding support vs. regular support:
     - More patient, more explanatory
     - Proactive rather than reactive
     - Educational tone (teaching, not just fixing)
     - Higher stakes (churn risk is highest in first 30 days)

  Part 2: Handle onboarding support scenarios
  For "ProjectNest" — a project management SaaS
  (Free, Starter $12/mo, Team $29/mo, Business $59/mo):

  1. Day 1 — Setup confusion:
     "I just signed up for the Team plan but I'm overwhelmed.
     There are so many settings and I don't know where to start.
     We're a marketing agency with 8 people."
     - Write a structured onboarding welcome response
     - Include prioritized setup steps (most important first)
     - Suggest quick wins they can achieve today

  2. Day 3 — Data migration frustration:
     "I'm trying to import our projects from Asana but the CSV
     import keeps failing. I have 200+ projects and I can't
     recreate them manually. This is a dealbreaker."
     - Handle the urgency and migration-specific troubleshooting
     - Offer alternatives (manual import help, migration service)
     - Prevent churn at this critical moment

  3. Day 7 — Team adoption resistance:
     "I set everything up but my team refuses to use ProjectNest.
     They say it's too different from what we had before. I'm the
     only one logging in. Help?"
     - Address the human/change management side
     - Suggest adoption strategies (training, champions, gradual rollout)
     - Offer resources (webinars, guides, onboarding calls)

  4. Day 14 — Feature confusion:
     "What's the difference between Projects, Workspaces, and Teams?
     I've been creating everything as Projects but now I think I'm
     doing it wrong. Can you help me reorganize?"
     - Explain core concepts clearly
     - Offer to help restructure (or guide them through it)
     - Don't make them feel bad for the mistake

  5. Day 21 — Considering downgrade:
     "I'm on the Team plan but honestly we're only using basic
     task lists. I don't think we need all these features. Should
     I switch to Starter?"
     - Explore whether they're underusing or the plan is genuinely wrong
     - Highlight Team features they haven't discovered
     - Be honest if Starter is genuinely the right fit

  Part 3: Proactive onboarding support
  1. Automated check-in email sequences (triggers and timing)
  2. Onboarding health scores (engagement signals)
  3. High-touch vs. low-touch onboarding by plan tier
  4. Measuring onboarding support success (activation metrics)

assertions:
  - type: llm_judge
    criteria: "All 5 responses guide customers toward value — each interaction moves them closer to successful product adoption rather than just answering the question"
    weight: 0.30
    description: "Value-oriented guidance"
  - type: llm_judge
    criteria: "The migration frustration response treats the issue as high-urgency — data migration is correctly identified as a churn-critical moment"
    weight: 0.25
    description: "Migration urgency recognition"
  - type: llm_judge
    criteria: "The team adoption response addresses change management — it goes beyond product features to help with the human side of adoption"
    weight: 0.25
    description: "Change management awareness"
  - type: llm_judge
    criteria: "The downgrade conversation is honest — it recommends the right plan for the customer even if that means less revenue"
    weight: 0.20
    description: "Honest plan recommendation"
