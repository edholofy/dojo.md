meta:
  id: sla-management
  level: 2
  course: saas-support-tickets
  type: output
  description: "Manage SLA commitments — track response and resolution deadlines, prioritize based on SLA urgency, and communicate when SLAs are at risk"
  tags: [support, sla, service-level, deadlines, prioritization, intermediate]

state: {}

trigger: |
  Service Level Agreements (SLAs) define the contract between your
  support team and your customers. Missing SLAs damages trust,
  triggers penalties, and indicates systemic support problems.
  Managing SLAs requires constant awareness of deadlines and
  smart prioritization.

  Part 1: SLA fundamentals
  1. SLA components:
     - First Response Time (FRT): time to first meaningful reply
     - Resolution Time: time to fully resolve the issue
     - Uptime SLA: platform availability commitment (99.9% = 8.7hr/year)
     - Response quality: accuracy and helpfulness metrics
  2. Typical SaaS SLA tiers:
     - Free: Best effort (no SLA)
     - Pro: FRT 8 business hours, Resolution 48 hours
     - Business: FRT 4 business hours, Resolution 24 hours
     - Enterprise: FRT 1 hour (24/7), Resolution 4 hours (P1)
  3. Priority-based SLAs:
     - P1 (Critical): System down, all users affected — FRT 15min, Resolve 4hr
     - P2 (High): Major feature broken, workaround exists — FRT 1hr, Resolve 8hr
     - P3 (Medium): Minor bug, limited impact — FRT 4hr, Resolve 24hr
     - P4 (Low): Question, feature request — FRT 8hr, Resolve 72hr
  4. SLA breach consequences:
     - Customer credits or refunds
     - Contract penalties (enterprise)
     - Churn risk and trust erosion
     - Internal performance tracking impact

  Part 2: Manage SLA scenarios
  For "AnalyticsHub" — a business analytics SaaS:

  You have 8 tickets in your queue. Current time: 2:00 PM Tuesday.
  Manage the SLA priorities:

  Ticket A: Enterprise P1, received 1:45 PM (FRT due: 2:00 PM)
  "Dashboard showing ERROR 500 for all users"

  Ticket B: Business P2, received 11:00 AM (FRT due: 3:00 PM)
  "Custom report builder not saving configurations"

  Ticket C: Pro P3, received 9:00 AM (FRT due: 5:00 PM)
  "Chart colors don't match brand guidelines option"

  Ticket D: Enterprise P2, received 12:00 PM (FRT due: 1:00 PM) — BREACHED
  "Data export includes wrong date range"

  Ticket E: Business P1, received 1:30 PM (FRT due: 2:30 PM)
  "All team members seeing 'Access Denied' since update"

  Ticket F: Pro P4, received yesterday 3:00 PM (FRT due: today 11:00 AM) — BREACHED
  "Can you add a dark mode option?"

  Ticket G: Enterprise P3, received 10:00 AM (FRT due: 2:00 PM)
  "Minor UI glitch in filter dropdown"

  Ticket H: Business P3, received 1:00 PM (FRT due: 5:00 PM)
  "Integration with Salesforce showing stale data"

  Tasks:
  1. Order these 8 tickets by handling priority (explain rationale)
  2. Write the first response for each (appropriate to urgency)
  3. Write the SLA breach communication for tickets D and F
  4. Create an internal status report on current queue health

  Part 3: SLA optimization
  1. Proactive SLA management (preventing breaches before they happen)
  2. SLA reporting and trend analysis
  3. Negotiating realistic SLAs with customers
  4. Automating SLA tracking and alerts

assertions:
  - type: llm_judge
    criteria: "Ticket priority ordering is correct — Enterprise P1 (Ticket A) and already-breached tickets get immediate attention, with clear reasoning for the full ordering"
    weight: 0.30
    description: "Correct SLA-based prioritization"
  - type: llm_judge
    criteria: "SLA breach communications are honest and professional — they acknowledge the miss, explain what happened, and commit to resolution without making excuses"
    weight: 0.25
    description: "Honest breach communication"
  - type: llm_judge
    criteria: "Response depth matches urgency — P1 tickets get immediate action-oriented responses while P4 tickets get thorough but lower-urgency replies"
    weight: 0.25
    description: "Urgency-matched response depth"
  - type: llm_judge
    criteria: "The queue health report provides actionable insights — it identifies patterns, risks, and recommendations, not just ticket counts"
    weight: 0.20
    description: "Actionable queue health report"
