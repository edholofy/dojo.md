meta:
  id: customer-health-scoring
  level: 2
  course: saas-support-tickets
  type: output
  description: "Assess customer health from support interactions — identify churn signals, expansion opportunities, and relationship trends through ticket analysis"
  tags: [support, customer-health, churn, retention, analytics, intermediate]

state: {}

trigger: |
  Every support interaction reveals something about the customer's
  relationship with your product. By analyzing ticket patterns,
  sentiment trends, and engagement signals, support teams can
  identify at-risk customers before they churn and expansion-ready
  customers before they're approached by competitors.

  Part 1: Customer health indicators from support
  1. Negative health signals (churn risk):
     - Increasing ticket frequency
     - Escalating sentiment (neutral → frustrated → angry)
     - Repeated issues (same problem, multiple tickets)
     - Mentions of competitors
     - Cancellation inquiries
     - Declining product usage between tickets
     - Key user departing the organization
  2. Positive health signals (expansion opportunity):
     - Questions about advanced features
     - Adding team members
     - Integration requests (deeper product investment)
     - Referring other departments or companies
     - Positive CSAT scores consistently
     - Requesting enterprise features (outgrowing current plan)
  3. Neutral but important signals:
     - Billing questions (verifying investment)
     - Feature requests (engaged but wanting more)
     - Onboarding questions (still learning)
     - Configuration help (customizing for their workflow)

  Part 2: Analyze customer health
  For "TeamBoard" — a team collaboration SaaS:

  Analyze 4 customer profiles based on their recent support
  ticket history and assign health scores (1-100):

  Customer A — "Acme Marketing Agency" (Business plan, $149/mo, 18 months)
  Recent tickets:
  - 6 weeks ago: "How to set up advanced automations" (resolved, CSAT 5/5)
  - 4 weeks ago: "Adding 5 more team members" (resolved, CSAT 5/5)
  - 2 weeks ago: "Do you have an API for custom integrations?" (resolved, CSAT 4/5)
  - This week: "Can we get a demo of Enterprise features?" (open)
  Usage: Daily active, 23 of 25 seats used, created 140 boards

  Customer B — "StartupCo" (Pro plan, $49/mo, 4 months)
  Recent tickets:
  - 3 weeks ago: "This is slower than Trello" (resolved, CSAT 2/5)
  - 2 weeks ago: "Board sharing is confusing" (resolved, CSAT 2/5)
  - 1 week ago: "How do I export my data?" (resolved, no CSAT)
  - This week: "What's your cancellation policy?" (open)
  Usage: 2 of 5 seats active, logged in 3 times this month

  Customer C — "Global Logistics Inc" (Enterprise, $499/mo, 3 years)
  Recent tickets:
  - 2 months ago: "SSO configuration help" (resolved, CSAT 4/5)
  - 1 month ago: "Compliance report request" (resolved, CSAT 5/5)
  - No tickets this month
  Usage: Steady, 45 of 50 seats used, daily active

  Customer D — "Freelancer Jane" (Free plan, 2 months)
  Recent tickets:
  - 1 week ago: "How do I upgrade to Pro?" (open)
  - 3 days ago: "Can I get a discount for annual billing?" (open)
  Usage: Daily active, using all free tier features, 3 boards at limit

  For each customer:
  1. Assign a health score (1-100) with rationale
  2. Identify the key signals driving the score
  3. Recommend specific actions for the CS/support team
  4. Flag for appropriate internal team (sales, success, support, product)

  Part 3: Operationalizing health scoring
  1. Building automated health score dashboards
  2. Integrating support data with CRM and CS platforms
  3. Creating playbooks for each health score bracket
  4. Feedback loops between support and customer success

assertions:
  - type: llm_judge
    criteria: "All 4 customer health assessments are well-reasoned — scores reflect the ticket history, usage data, and sentiment signals with clear justification"
    weight: 0.30
    description: "Well-reasoned health assessments"
  - type: llm_judge
    criteria: "Churn risk customer (B) is correctly identified and flagged — the pattern of declining CSAT, competitor mentions, data export, and cancellation inquiry is recognized"
    weight: 0.25
    description: "Correct churn risk identification"
  - type: llm_judge
    criteria: "Expansion opportunity customer (A) is identified — the pattern of growing usage, adding seats, API interest, and enterprise demo request signals upsell readiness"
    weight: 0.25
    description: "Expansion opportunity recognition"
  - type: llm_judge
    criteria: "Recommended actions are specific and actionable — each customer gets tailored next steps, not generic advice"
    weight: 0.20
    description: "Specific actionable recommendations"
