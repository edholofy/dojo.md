meta:
  id: proactive-support
  level: 2
  course: saas-support-tickets
  type: output
  description: "Implement proactive support strategies — anticipate issues, communicate before customers notice problems, and prevent tickets before they're created"
  tags: [support, proactive, prevention, communication, monitoring, intermediate]

state: {}

trigger: |
  Reactive support waits for customers to report problems.
  Proactive support anticipates issues and communicates before
  customers even notice. This approach reduces ticket volume,
  builds trust, and transforms support from a cost center
  into a competitive advantage.

  Part 1: Proactive support strategies
  1. Monitoring-driven communication:
     - System health alerts → customer notification before they notice
     - Performance degradation → proactive status update
     - Scheduled maintenance → advance notice with impact assessment
     - Third-party outage affecting integrations → inform affected users
  2. Usage-driven outreach:
     - Customer hasn't logged in for 14 days → check-in email
     - Usage spike detected → capacity planning advice
     - Feature adoption stall → helpful tips and guides
     - Account approaching plan limits → upgrade guidance
  3. Lifecycle-driven touchpoints:
     - Trial ending in 3 days → personalized conversion outreach
     - Annual renewal approaching → value summary and renewal prep
     - New feature launch → targeted notification to relevant users
     - Breaking API change → advance migration guide

  Part 2: Write proactive communications
  For "UpGuard" — a website uptime monitoring SaaS:

  1. Planned maintenance notification:
     You're scheduling 2 hours of maintenance this Saturday
     3:00-5:00 AM EST. Monitoring will be paused — customers won't
     receive alerts during this window.
     - Write: advance notice (72 hours), reminder (24 hours),
       start notification, completion notification
     - Consider: timezone handling, customer impact, alternatives

  2. Performance degradation detected:
     Your monitoring shows API response times have increased from
     200ms to 800ms over the past hour. No outage yet but trending
     toward SLA breach. 150 enterprise customers could be affected.
     - Write: internal escalation + proactive customer notification
     - Balance: transparency vs. causing unnecessary alarm

  3. Third-party integration outage:
     Slack's API is experiencing intermittent failures. Your
     customers' alert notifications via Slack may be delayed
     or missed. PagerDuty and email alerts are unaffected.
     - Write: proactive notification to customers using Slack integration
     - Include: alternative alert channels, status page link, ETA

  4. Customer usage pattern concern:
     A Business plan customer ($199/mo, 2 years tenure) has gone
     from checking their dashboard daily to not logging in for
     21 days. Their monitoring is still active but they're not
     engaging with alerts.
     - Write: concerned check-in email (not salesy, genuinely helpful)
     - Consider: something may have changed in their team/needs

  5. Breaking API change:
     Version 2 of your API will deprecate 3 endpoints in 90 days.
     You have 340 customers actively using these endpoints.
     - Write: deprecation notice sequence (90 days, 60 days, 30 days, 7 days)
     - Include: migration guide summary, support resources, deadline

  Part 3: Proactive support measurement
  1. Tickets prevented (how to estimate and track)
  2. Customer satisfaction impact of proactive communication
  3. Building a proactive support playbook
  4. Balancing proactivity with notification fatigue

assertions:
  - type: llm_judge
    criteria: "Proactive communications are timely and informative — each notification gives customers enough context to understand the impact and take action"
    weight: 0.30
    description: "Timely informative notifications"
  - type: llm_judge
    criteria: "The maintenance notification sequence is complete — advance notice, reminder, start, and completion messages form a coherent communication arc"
    weight: 0.25
    description: "Complete notification sequence"
  - type: llm_judge
    criteria: "The performance degradation response balances transparency with calm — it informs without causing panic"
    weight: 0.25
    description: "Transparent without panic"
  - type: llm_judge
    criteria: "The customer disengagement check-in is genuinely caring — it reads as helpful concern, not a retention play"
    weight: 0.20
    description: "Genuine care not retention play"
