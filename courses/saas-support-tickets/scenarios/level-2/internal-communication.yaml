meta:
  id: internal-communication
  level: 2
  course: saas-support-tickets
  type: output
  description: "Master internal support communication — write effective bug reports for engineering, coordinate with product teams, and document institutional knowledge"
  tags: [support, internal-communication, engineering, product, documentation, intermediate]

state: {}

trigger: |
  Support agents are the bridge between customers and internal
  teams. The quality of internal communication — bug reports,
  feature feedback, escalation notes — directly affects how
  quickly issues get resolved and how well product decisions
  reflect customer needs.

  Part 1: Internal communication types
  1. Bug reports to engineering:
     - Clear reproduction steps (environment, steps, expected vs. actual)
     - Impact assessment (how many customers, severity)
     - Customer context (workaround availability, urgency)
     - Logs, screenshots, error messages
  2. Feature feedback to product:
     - Customer use case (why they need it)
     - Frequency (how often requested)
     - Business impact (revenue at risk, churn potential)
     - Competitive context (do competitors have it?)
  3. Escalation documentation:
     - Issue summary and timeline
     - Steps already taken
     - Customer sentiment and business context
     - Recommended next steps
  4. Knowledge sharing:
     - Internal wiki articles and runbooks
     - Troubleshooting guides for common issues
     - Post-incident reviews and learnings
     - Onboarding documentation for new agents

  Part 2: Write internal communications
  For "CodeReview Pro" — a code review SaaS platform:

  1. Write a bug report for engineering:
     Issue: Customers report that inline comments on pull requests
     disappear after the PR is updated. Affects approximately 30
     customers in the last week. Reproduction: Create PR, add 3+
     inline comments, push new commit, comments vanish.
     - Write a complete engineering bug report
     - Include: severity, affected customers, reproduction steps,
       expected behavior, actual behavior, impact, suggested priority

  2. Write a feature request summary for product:
     Multiple customers (15 requests in last quarter) want branch
     protection rules — the ability to require approvals before
     merging. Top 3 requesters are Enterprise customers ($500+/mo).
     Two mentioned competitors who have this feature.
     - Write a product-ready feature request with business case
     - Include: customer quotes (anonymized), revenue impact,
       competitive analysis, suggested priority

  3. Write a post-incident internal review:
     Yesterday, a 45-minute outage affected the diff rendering
     engine. Root cause: a dependency update broke the syntax
     highlighting library. Support received 89 tickets during the
     outage. Resolution: rollback to previous dependency version.
     - Write the support team's contribution to the post-incident review
     - Include: customer impact summary, communication timeline,
       what worked, what could improve, action items

  4. Write an internal troubleshooting runbook:
     Create a runbook for "Customer can't connect their GitHub
     repository" — the most common support ticket (15% of volume).
     - Step-by-step diagnostic flow
     - Common causes and solutions
     - When to escalate vs. resolve
     - Customer communication templates

  Part 3: Building internal relationships
  1. Being engineering's ally (not adversary)
  2. Making product feedback actionable (not just noise)
  3. Creating feedback loops (closing the loop with customers)
  4. Support's role in product development

assertions:
  - type: llm_judge
    criteria: "The engineering bug report is actionable — it contains clear reproduction steps, impact data, and enough technical detail for an engineer to start investigating immediately"
    weight: 0.30
    description: "Actionable engineering bug report"
  - type: llm_judge
    criteria: "The product feature request includes a compelling business case — it goes beyond 'customers want this' to quantify revenue impact and competitive pressure"
    weight: 0.25
    description: "Compelling product business case"
  - type: llm_judge
    criteria: "The post-incident review is constructive — it identifies improvements without blame and includes specific action items"
    weight: 0.25
    description: "Constructive incident review"
  - type: llm_judge
    criteria: "The troubleshooting runbook is usable by a new agent — a junior support agent could follow it without additional context"
    weight: 0.20
    description: "New-agent-usable runbook"
