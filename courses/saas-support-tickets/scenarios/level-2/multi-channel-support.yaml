meta:
  id: multi-channel-support
  level: 2
  course: saas-support-tickets
  type: output
  description: "Deliver consistent multi-channel support — adapt your communication style across email, live chat, phone, social media, and in-app messaging"
  tags: [support, multi-channel, omnichannel, chat, email, social-media, intermediate]

state: {}

trigger: |
  Modern SaaS support happens across many channels. Each channel
  has different expectations for response time, tone, length, and
  formality. Great support agents adapt their style while keeping
  the quality consistent.

  Part 1: Channel-specific best practices
  1. Email support:
     - Longer, more detailed responses acceptable
     - Professional tone, structured formatting
     - Expected response time: 1-4 hours (business), 24 hours max
     - Include all information to minimize back-and-forth
     - Use formatting (headers, bullets, bold) for readability
  2. Live chat support:
     - Short, conversational messages
     - Break long answers into multiple messages
     - Expected response time: <30 seconds between messages
     - Use canned responses wisely (don't sound robotic)
     - Set expectations if you need time to research
  3. Social media support:
     - Public-facing (other customers can see)
     - Move sensitive issues to DM/private quickly
     - Brand voice consistency matters
     - Expected response time: <1 hour (Twitter/X), <4 hours (Facebook)
     - Brief initial response, offer to continue privately
  4. Phone/video support:
     - Active listening, verbal confirmation
     - Real-time troubleshooting
     - Follow up with written summary
     - Expected handling time: 5-15 minutes
  5. In-app messaging:
     - Context-aware (you know what page they're on)
     - Can include screenshots, screen recordings
     - Proactive vs. reactive messaging
     - Expected response time: varies by implementation

  Part 2: Write the same ticket across 5 channels
  For "FormBuilder" — a form creation SaaS:

  The issue: A customer's published form is collecting responses
  but the data isn't appearing in their dashboard. They have a
  survey deadline tomorrow.

  Customer: Business plan, $79/mo, 6 months tenure

  Write appropriate responses for each channel:

  1. Email response:
     - Full troubleshooting steps
     - Technical detail appropriate
     - Links to relevant help articles
     - Timeline for resolution

  2. Live chat conversation:
     - Simulate a realistic chat exchange (5-8 messages)
     - Real-time troubleshooting flow
     - Handle the urgency in real-time

  3. Twitter/X public response + DM follow-up:
     - Brief, professional public acknowledgment
     - Detailed DM with troubleshooting
     - Maintain brand voice

  4. Phone call script:
     - Opening, discovery questions, troubleshooting
     - Verbal instructions for non-technical user
     - Summary email after the call

  5. In-app message response:
     - Context-aware (you can see their form and dashboard)
     - Step-by-step with inline guidance
     - Proactive follow-up trigger

  Part 3: Omnichannel coordination
  1. Maintaining context when customers switch channels
  2. Channel-switching best practices (when to suggest a different channel)
  3. Unified customer timeline across channels
  4. Channel-specific metrics and benchmarks

assertions:
  - type: llm_judge
    criteria: "All 5 channel responses address the same issue but are clearly adapted — email is detailed, chat is conversational, social is brief, phone is verbal, in-app is contextual"
    weight: 0.30
    description: "Channel-appropriate adaptation"
  - type: llm_judge
    criteria: "The live chat simulation feels realistic — messages are appropriately short, there's natural back-and-forth, and typing time expectations are managed"
    weight: 0.25
    description: "Realistic chat simulation"
  - type: llm_judge
    criteria: "The social media response protects customer privacy — sensitive details are moved to DM without exposing account information publicly"
    weight: 0.25
    description: "Privacy-conscious social support"
  - type: llm_judge
    criteria: "Omnichannel coordination guidance addresses real challenges — context handoff between channels and preventing customers from repeating themselves"
    weight: 0.20
    description: "Practical omnichannel coordination"
