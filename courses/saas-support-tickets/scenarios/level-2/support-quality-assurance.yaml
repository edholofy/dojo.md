meta:
  id: support-quality-assurance
  level: 2
  course: saas-support-tickets
  type: output
  description: "Implement support quality assurance — review ticket quality, build scorecards, identify coaching opportunities, and maintain consistent support standards"
  tags: [support, quality-assurance, qa, scorecards, coaching, intermediate]

state: {}

trigger: |
  Quality assurance in support ensures every customer gets
  consistently excellent service. QA isn't about catching mistakes
  — it's about learning, improving, and maintaining high standards
  across the team.

  Part 1: Support QA fundamentals
  1. What to measure in ticket quality:
     - Accuracy (was the information correct?)
     - Completeness (was the issue fully addressed?)
     - Tone (was the communication appropriate?)
     - Efficiency (was it resolved in minimum interactions?)
     - Process compliance (were internal procedures followed?)
     - Customer effort (how easy was it for the customer?)
  2. QA methodologies:
     - Random sample review (5-10% of tickets)
     - Targeted review (escalated tickets, low CSAT scores)
     - Peer review (agents reviewing each other)
     - Customer feedback correlation (CSAT + QA score comparison)
  3. QA scoring approaches:
     - Binary (pass/fail per criterion)
     - Weighted scoring (some criteria matter more)
     - Rubric-based (detailed descriptors per score level)
     - Critical failure (one criterion = automatic fail regardless)

  Part 2: Build a QA program
  For "ScheduleEase" — an appointment scheduling SaaS:

  1. Design a QA scorecard:
     Create a comprehensive ticket review scorecard with:
     - 8-10 evaluation criteria (weighted)
     - Scoring rubric (1-5 scale with descriptors)
     - Critical failure criteria (automatic fail triggers)
     - Overall quality score calculation
     - Space for qualitative feedback and coaching notes

  2. Review 4 sample tickets and score them:

     Ticket A — Agent response to billing inquiry:
     Customer: "Why was I charged $39 instead of $29?"
     Agent: "Hi! Your plan is $29/mo but you added SMS reminders
     ($10/mo) on March 3rd. That's the $39 total. Let me know if
     you want to remove SMS reminders! Have a great day! 😊"
     Score this response on your scorecard.

     Ticket B — Agent response to bug report:
     Customer: "Calendar sync with Google is broken"
     Agent: "Please try clearing your cache and reconnecting your
     Google account. Let us know if that doesn't work."
     Score this response on your scorecard.

     Ticket C — Agent response to cancellation request:
     Customer: "I want to cancel. The product doesn't work for
     a salon with multiple locations."
     Agent: "I'm sorry to hear that. I've processed your cancellation
     effective immediately. Your account will remain accessible until
     the end of your billing period. If there's anything we could
     have done differently, we'd love to hear your feedback."
     Score this response on your scorecard.

     Ticket D — Agent response to feature request:
     Customer: "Can you add waitlist functionality?"
     Agent: "Great suggestion! I've added your vote to our feature
     request for waitlist functionality. While I can't share specific
     timelines, this is something our product team is aware of.
     In the meantime, some customers use our 'standby' status as
     a workaround — would you like me to show you how?"
     Score this response on your scorecard.

  3. Write coaching feedback for each ticket:
     - What went well
     - What could improve
     - Specific suggestions with examples

  Part 3: Building a QA culture
  1. Making QA non-threatening (growth mindset)
  2. Calibration sessions (ensuring reviewers score consistently)
  3. Using QA data for training and process improvement
  4. Balancing quality with speed metrics

assertions:
  - type: llm_judge
    criteria: "The QA scorecard is comprehensive and practical — criteria are weighted, rubrics are clear, and the scoring system is usable for real ticket review"
    weight: 0.30
    description: "Practical comprehensive scorecard"
  - type: llm_judge
    criteria: "Ticket scoring is fair and well-reasoned — scores reflect genuine quality differences between the 4 sample tickets with specific justifications"
    weight: 0.25
    description: "Fair reasoned scoring"
  - type: llm_judge
    criteria: "Coaching feedback is constructive and specific — it identifies improvement opportunities with actionable examples, not vague criticism"
    weight: 0.25
    description: "Constructive specific coaching"
  - type: llm_judge
    criteria: "The QA culture section addresses agent concerns — it acknowledges that QA can feel punitive and provides strategies for making it feel supportive"
    weight: 0.20
    description: "Supportive QA culture"
