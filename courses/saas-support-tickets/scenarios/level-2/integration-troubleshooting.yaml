meta:
  id: integration-troubleshooting
  level: 2
  course: saas-support-tickets
  type: output
  description: "Troubleshoot third-party integrations — diagnose issues with APIs, webhooks, OAuth, and platform connections that span multiple systems"
  tags: [support, integrations, api, troubleshooting, webhooks, intermediate]

state: {}

trigger: |
  Integration issues are among the most complex support tickets
  because they span multiple systems. The problem could be on your
  side, the third-party side, or in the customer's configuration.
  Systematic troubleshooting and clear communication about
  multi-system issues is essential.

  Part 1: Integration troubleshooting framework
  1. Common integration failure points:
     - Authentication (expired tokens, wrong API keys, OAuth scope)
     - Data mapping (field mismatches, format differences)
     - Rate limiting (too many API calls)
     - Webhook delivery (URL unreachable, SSL issues, timeouts)
     - Version incompatibility (API version deprecation)
     - Permission issues (insufficient scopes or access)
  2. Diagnostic approach:
     - Identify which system is failing (yours or theirs)
     - Check integration logs and error codes
     - Verify credentials and permissions
     - Test with minimal reproduction case
     - Check third-party status pages
  3. Communication challenges:
     - Customer may not understand multi-system architecture
     - "It worked yesterday" — what changed?
     - Coordinating with third-party support teams
     - Setting expectations for resolution timeline

  Part 2: Troubleshoot integration scenarios
  For "WorkflowMax" — a workflow automation SaaS that connects
  with Slack, Salesforce, Jira, Google Sheets, and Zapier:

  1. Slack integration not sending notifications:
     Customer: "I set up Slack notifications for task completions
     but nothing is coming through. It worked for the first week."
     - Walk through diagnostic steps
     - Common causes (token expiration, channel permissions, bot removed)
     - Write the troubleshooting response

  2. Salesforce sync showing duplicate records:
     Customer: "Every time a deal closes in Salesforce, WorkflowMax
     creates TWO projects instead of one. This has happened 15 times."
     - Investigate webhook vs. polling duplication
     - Deduplication strategies
     - Write response with fix and prevention

  3. Jira two-way sync stopped:
     Customer: "Tasks created in WorkflowMax used to appear in Jira
     and vice versa. Now Jira→WorkflowMax works but not the reverse."
     - Directional sync troubleshooting
     - Permission and configuration checks
     - Write response with systematic diagnostic

  4. Google Sheets integration showing "Authentication Error":
     Customer: "I keep getting 'Authentication Error' when trying to
     export data to Google Sheets. I already re-connected my account."
     - OAuth troubleshooting flow
     - Scope and permission verification
     - Write response appropriate for non-technical user

  5. Zapier integration triggering but sending empty data:
     Customer: "My Zap fires correctly but all the fields in the
     subsequent steps are empty. The trigger data shows up in Zapier
     but doesn't pass through."
     - Webhook payload inspection
     - Field mapping troubleshooting
     - Write response with step-by-step Zapier debugging

  Part 3: Integration support best practices
  1. Building integration troubleshooting runbooks
  2. When to contact the third-party vs. fix internally
  3. Proactive integration health monitoring
  4. Documenting integration-specific known issues

assertions:
  - type: llm_judge
    criteria: "Troubleshooting approaches are systematic — each scenario follows a logical diagnostic path from simple checks to complex investigation"
    weight: 0.30
    description: "Systematic diagnostic approach"
  - type: llm_judge
    criteria: "Responses are accessible to non-technical users — complex integration concepts are explained without jargon while still being technically accurate"
    weight: 0.25
    description: "Non-technical accessibility"
  - type: llm_judge
    criteria: "Multi-system responsibility is clear — responses identify whether the issue is on WorkflowMax's side, the third-party's side, or the customer's configuration"
    weight: 0.25
    description: "Clear system responsibility"
  - type: llm_judge
    criteria: "Prevention measures are included — each resolution includes steps to prevent the same issue from recurring"
    weight: 0.20
    description: "Recurrence prevention"
