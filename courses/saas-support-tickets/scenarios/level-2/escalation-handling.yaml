meta:
  id: escalation-handling
  level: 2
  course: saas-support-tickets
  type: output
  description: "Handle ticket escalations — know when and how to escalate issues to senior agents, engineering, or management while keeping the customer informed"
  tags: [support, escalation, tiered-support, handoff, communication, intermediate]

state: {}

trigger: |
  Not every ticket can be resolved at the first tier. Knowing when
  to escalate, how to document the handoff, and how to keep the
  customer informed during the transition separates good support
  from frustrating support.

  Part 1: Escalation frameworks
  1. When to escalate:
     - Technical complexity beyond your knowledge
     - Customer threatens legal action or media
     - Data loss or security incident
     - SLA breach risk (approaching deadline)
     - Repeated contacts (3+ on same issue)
     - Revenue impact above threshold ($10K+ ARR)
     - Executive or VIP customer request
  2. Escalation paths:
     - Tier 1 → Tier 2 (technical depth)
     - Tier 1 → Tier 3/Engineering (code-level issues)
     - Any tier → Management (customer relationship)
     - Any tier → Security team (data/access issues)
     - Any tier → Legal (compliance, liability)
  3. Escalation documentation:
     - Issue summary (what happened, when, impact)
     - Steps already taken (what you tried)
     - Customer sentiment (frustrated, angry, calm)
     - Business context (plan tier, tenure, ARR)
     - Urgency and SLA status

  Part 2: Handle escalation scenarios
  For "DataSync Pro" — a data integration SaaS:
  Write escalation responses for 6 scenarios:

  1. Customer reports data corruption after a sync:
     - 500 records affected, customer is a Business plan ($299/mo)
     - You've confirmed the issue exists but can't identify root cause
     - Write: customer response + internal escalation note to engineering

  2. Customer's CEO emails demanding immediate resolution:
     - Original ticket is 4 days old, normal priority
     - Issue is legitimate but not yet resolved
     - Write: response to CEO + escalation to management + update to
       original ticket owner

  3. Customer threatening to post negative review and cancel:
     - Pro plan, 8 months tenure, $49/mo
     - Issue is a known bug with workaround available
     - Write: de-escalation response + internal note on retention risk

  4. SLA breach imminent — P2 ticket approaching 8-hour deadline:
     - Complex integration issue, partially diagnosed
     - Original agent is offline (shift ended)
     - Write: customer update + internal escalation with handoff notes

  5. Customer reports potential security vulnerability:
     - They can see another customer's data in their dashboard
     - This is a critical security issue regardless of customer plan
     - Write: immediate response + security team escalation

  6. Ticket bounced between 3 agents with no resolution:
     - Customer increasingly frustrated with each handoff
     - Issue is an edge case in the API that no agent fully understands
     - Write: ownership response + consolidated escalation to Tier 3

  Part 3: Escalation best practices
  1. The warm handoff vs. cold handoff
  2. Preventing unnecessary escalations
  3. Following up after escalation (you still own the relationship)
  4. Measuring escalation effectiveness

assertions:
  - type: llm_judge
    criteria: "All 6 escalation scenarios include both customer-facing responses AND internal escalation documentation — the handoff is complete"
    weight: 0.30
    description: "Complete escalation documentation"
  - type: llm_judge
    criteria: "Customer communications maintain confidence — the customer feels their issue is being taken more seriously, not that they're being passed around"
    weight: 0.25
    description: "Confidence-maintaining communication"
  - type: llm_judge
    criteria: "Internal escalation notes contain all necessary context — receiving team can act without asking the customer to repeat information"
    weight: 0.25
    description: "Sufficient handoff context"
  - type: llm_judge
    criteria: "Security vulnerability scenario is treated with appropriate urgency — immediate acknowledgment and fast-track escalation"
    weight: 0.20
    description: "Appropriate security urgency"
