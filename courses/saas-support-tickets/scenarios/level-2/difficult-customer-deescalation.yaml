meta:
  id: difficult-customer-deescalation
  level: 2
  course: saas-support-tickets
  type: output
  description: "De-escalate difficult customer interactions — manage anger, threats, unreasonable demands, and abusive behavior while maintaining professionalism"
  tags: [support, de-escalation, difficult-customers, conflict, communication, intermediate]

state: {}

trigger: |
  Difficult customers aren't bad people — they're people having
  bad experiences. De-escalation is about breaking the anger cycle,
  finding the real issue underneath the emotion, and steering the
  conversation toward resolution.

  Part 1: De-escalation techniques
  1. The HEARD framework:
     - Hear: Let them vent without interrupting
     - Empathize: Acknowledge their specific frustration
     - Apologize: When appropriate, own what went wrong
     - Resolve: Take concrete action
     - Diagnose: Prevent recurrence
  2. Language patterns:
     - Replace "but" with "and" (doesn't negate empathy)
     - Replace "unfortunately" with positive alternatives
     - Replace "you need to" with "here's what we can do"
     - Avoid "calm down" (always escalates)
     - Use their name (creates personal connection)
  3. Knowing your limits:
     - When to offer concessions (credits, extensions, upgrades)
     - When to involve management (threatening behavior)
     - When to end the conversation (abusive language)
     - Company policies on customer abuse

  Part 2: De-escalate 6 difficult situations
  For "CloudDeploy" — a deployment automation SaaS:

  1. The Screamer:
     "THIS IS ABSOLUTELY UNACCEPTABLE! Your platform just took down
     our PRODUCTION environment during a deployment! We're losing
     $10,000 PER HOUR! Someone better fix this RIGHT NOW or you'll
     be hearing from our lawyers!"
     Customer: Enterprise plan, $2,000/mo, 2 years tenure

  2. The Passive-Aggressive:
     "Oh, it's broken AGAIN? What a surprise. I guess this is what
     I should expect from your 'enterprise-grade' platform. My
     intern could build something more reliable. But sure, I'll
     just file another ticket and wait three days like always."
     Customer: Business plan, $199/mo, 14 months tenure

  3. The Unreasonable Demander:
     "I want a full refund for the last 6 months, a free upgrade
     to Enterprise, a dedicated support line, and a written
     guarantee this will never happen again. Otherwise I'm telling
     every CTO I know to avoid CloudDeploy."
     Customer: Pro plan, $49/mo, 3 months tenure (issue: 2-hour
     outage affecting their non-production environment)

  4. The Repeat Offender:
     "Ticket #4,521. Yes, that's the number. FOUR THOUSAND tickets
     I've filed. OK maybe not that many but it FEELS like it. Same
     issue, different day. Your YAML parser breaks on multi-line
     strings. I've reported this 6 times. SIX. TIMES."
     Customer: Pro plan, $49/mo, 10 months tenure

  5. The Silent Threatener:
     "I've already started evaluating Heroku, Railway, and Render.
     I'll be making my decision by Friday. Unless something changes."
     Customer: Business plan, $199/mo, 8 months tenure, 15 users

  6. The Abusive Customer:
     "[Multiple profanities]. You people are [insult]. I can't
     believe I'm paying for this [expletive] product. The last
     agent I talked to was completely [insult]."
     Customer: Pro plan, $49/mo, 1 month tenure

  For each: Write the de-escalation response, note internal actions,
  and identify what concessions (if any) are appropriate.

  Part 3: Emotional resilience
  1. Not taking it personally (it's about the product, not you)
  2. Recovery between difficult interactions
  3. Recognizing when YOU need a break
  4. Documenting patterns of difficult interactions for process improvement

assertions:
  - type: llm_judge
    criteria: "All 6 responses de-escalate effectively — the tone shift moves from confrontation toward collaboration and resolution"
    weight: 0.30
    description: "Effective de-escalation"
  - type: llm_judge
    criteria: "The abusive customer scenario sets appropriate boundaries — profanity is addressed without matching the customer's energy, with a clear policy on acceptable communication"
    weight: 0.25
    description: "Appropriate boundary setting"
  - type: llm_judge
    criteria: "Concessions are proportional to impact — the Enterprise customer with production downtime gets more accommodation than the Pro customer with a non-production issue"
    weight: 0.25
    description: "Proportional concessions"
  - type: llm_judge
    criteria: "Emotional resilience section provides practical techniques — not just platitudes about self-care"
    weight: 0.20
    description: "Practical resilience techniques"
