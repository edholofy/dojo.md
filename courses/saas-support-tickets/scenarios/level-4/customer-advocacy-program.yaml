meta:
  id: customer-advocacy-program
  level: 4
  course: saas-support-tickets
  type: output
  description: "Build a customer advocacy program from support — transform satisfied customers into advocates, reference accounts, and community champions"
  tags: [support, advocacy, community, references, champions, expert]

state: {}

trigger: |
  The best marketing comes from happy customers. Support teams
  are uniquely positioned to identify potential advocates —
  they interact with customers at their most satisfied (problem
  solved) and can channel that positive energy into advocacy.

  Part 1: Customer advocacy from support
  1. Identifying potential advocates:
     - High CSAT scores consistently (4.5+ average)
     - Positive unsolicited feedback
     - Active product users (high engagement)
     - Long tenure with growing usage
     - Social media praise
     - Referral activity
  2. Advocacy program components:
     - Reference program (willing to speak with prospects)
     - Case study participation
     - Beta testing and product feedback
     - Community leadership
     - User group speakers
     - G2/Capterra reviews
     - Social media ambassadors
  3. The support-to-advocacy pipeline:
     - Exceptional support interaction → gratitude
     - Gratitude → relationship building
     - Relationship → advocacy request
     - Advocacy → program enrollment
     - Enrollment → ongoing engagement

  Part 2: Build a customer advocacy program
  For "TeamBuild" — a team management SaaS (5,000 customers):

  1. Design the advocacy program structure:
     - Program tiers (casual advocate → champion → advisory board)
     - Benefits per tier (early access, swag, direct product input,
       event invitations, speaking opportunities)
     - Requirements per tier (reviews, references, content)
     - Recognition and rewards system

  2. Create the support-to-advocacy workflow:
     - Trigger criteria (which support interactions indicate advocacy potential)
     - Handoff process from support to advocacy/marketing team
     - Initial outreach templates (3 scenarios):
       a) After an exceptionally resolved ticket
       b) After receiving unsolicited praise
       c) After a customer refers a new signup
     - Follow-up and enrollment sequence

  3. Write the advocacy request communications:
     - G2 review request (post-positive-interaction)
     - Case study participation invitation
     - Reference call availability request
     - User group speaking opportunity
     - Beta testing program invitation
     For each: write the message, explain timing and context

  4. Design the advocacy measurement framework:
     - Advocacy-sourced revenue (referrals, influenced deals)
     - Review and rating impact
     - Content created by advocates
     - Community engagement metrics
     - Program ROI calculation

  Part 3: Sustaining advocacy
  1. Keeping advocates engaged (avoiding advocacy fatigue)
  2. Handling it when an advocate has a bad experience
  3. Scaling the program as the customer base grows
  4. Cross-functional advocacy (support + marketing + success)

assertions:
  - type: llm_judge
    criteria: "The advocacy program structure is well-designed — tiers provide clear progression with increasing benefits and requirements"
    weight: 0.30
    description: "Well-designed program structure"
  - type: llm_judge
    criteria: "Advocacy requests are natural and non-pushy — they build on genuine positive experiences rather than feeling transactional"
    weight: 0.25
    description: "Natural non-pushy requests"
  - type: llm_judge
    criteria: "The measurement framework connects advocacy to revenue — it quantifies the business impact of the program beyond vanity metrics"
    weight: 0.25
    description: "Revenue-connected measurement"
  - type: llm_judge
    criteria: "Advocate bad experience handling is addressed — the plan acknowledges that even advocates can have negative experiences and provides recovery strategies"
    weight: 0.20
    description: "Advocate recovery strategies"
