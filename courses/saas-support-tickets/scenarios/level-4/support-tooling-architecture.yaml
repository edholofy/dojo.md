meta:
  id: support-tooling-architecture
  level: 4
  course: saas-support-tickets
  type: output
  description: "Architect the support technology stack — evaluate, implement, and integrate help desk platforms, automation tools, and analytics systems"
  tags: [support, tooling, architecture, integration, technology, expert]

state: {}

trigger: |
  The support technology stack directly impacts team efficiency,
  customer experience, and data quality. Expert support leaders
  architect systems that integrate seamlessly, scale with growth,
  and provide actionable insights.

  Part 1: Support technology landscape
  1. Core platform (help desk):
     - Zendesk, Intercom, Freshdesk, Help Scout, Front, Kustomer
     - Evaluation criteria: scalability, customization, integrations,
       pricing, ease of use, reporting, AI capabilities
  2. Supporting tools:
     - Knowledge base: Notion, Confluence, Help Scout Docs, GitBook
     - Chat/messaging: Intercom, Drift, LiveChat, Crisp
     - Phone/video: Aircall, Dialpad, Zoom, Twilio
     - Analytics: Looker, Metabase, custom dashboards
     - QA: MaestroQA, Klaus, Kaizo
     - AI/automation: Forethought, Ada, Capacity
  3. Integration requirements:
     - CRM sync (Salesforce, HubSpot)
     - Product data (user info, account status)
     - Engineering tools (Jira, GitHub, Linear)
     - Communication (Slack, email, SMS)
     - Billing (Stripe, Chargebee)

  Part 2: Architect a support tech stack
  For "CloudOps" — a DevOps SaaS company preparing to overhaul
  their support technology:

  Current state:
  - Using shared Gmail inbox for support (6,000 tickets/month)
  - Knowledge base: 40 Google Docs, poorly organized
  - No phone support (requested by enterprise customers)
  - Metrics tracked manually in spreadsheets
  - Team: 18 agents, growing to 30 in 12 months
  - Budget: $150K/year for support tools

  Tasks:
  1. Evaluate help desk platforms:
     - Compare 3 platforms for CloudOps's specific needs
     - Weighted scoring matrix (10 criteria, justification)
     - Recommend a platform with specific plan/pricing
     - Migration plan from Gmail to new platform

  2. Design the full integration architecture:
     - Draw the data flow between systems
     - Identify: what data goes where, sync frequency, failure handling
     - Map: customer journey touchpoints to system interactions
     - Include: Jira (engineering), Salesforce (sales), Stripe (billing),
       Slack (internal), and the knowledge base

  3. Create the implementation roadmap:
     - Phase 1: Core platform migration (weeks 1-4)
     - Phase 2: Knowledge base and self-service (weeks 5-8)
     - Phase 3: Automation and AI (weeks 9-12)
     - Phase 4: Analytics and optimization (weeks 13-16)
     - Each phase: deliverables, risks, success criteria

  4. Design the vendor evaluation process:
     - RFP template for support tool vendors
     - POC evaluation criteria and scorecard
     - Stakeholder involvement (who decides what)
     - Contract negotiation considerations

  Part 3: Maintaining the tech stack
  1. Vendor relationship management
  2. Regular tech stack audits (annual review)
  3. Build vs. buy decisions
  4. Future-proofing for emerging technologies

assertions:
  - type: llm_judge
    criteria: "Platform evaluation is thorough and fair — the weighted scoring matrix covers real decision criteria with justified weightings"
    weight: 0.30
    description: "Thorough fair platform evaluation"
  - type: llm_judge
    criteria: "The integration architecture is realistic — data flows between systems are well-defined with practical sync and failure handling considerations"
    weight: 0.25
    description: "Realistic integration architecture"
  - type: llm_judge
    criteria: "The implementation roadmap is phased sensibly — each phase builds on the previous, and risks at each stage are identified"
    weight: 0.25
    description: "Sensibly phased roadmap"
  - type: llm_judge
    criteria: "Budget considerations are practical — the $150K constraint is respected and pricing recommendations are realistic"
    weight: 0.20
    description: "Practical budget constraints"
