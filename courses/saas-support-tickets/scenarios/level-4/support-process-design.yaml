meta:
  id: support-process-design
  level: 4
  course: saas-support-tickets
  type: output
  description: "Design and optimize support processes — create workflows, standard operating procedures, and continuous improvement systems for support operations"
  tags: [support, process-design, workflows, sop, continuous-improvement, expert]

state: {}

trigger: |
  Great support isn't about individual heroics — it's about
  well-designed processes that ensure consistency, efficiency,
  and quality at scale. Expert support leaders design processes
  that handle the predictable automatically and free agents
  to handle the unpredictable brilliantly.

  Part 1: Process design principles
  1. When to create a process:
     - Same issue handled differently by different agents
     - Quality varies significantly across interactions
     - New agents struggle with recurring scenarios
     - Errors in handoffs between teams
     - Customer experience is inconsistent
  2. Process design framework:
     - Map the current state (how it works today)
     - Identify pain points (where it breaks)
     - Design the ideal state (how it should work)
     - Build the transition plan (how to get there)
     - Measure and iterate (how to improve continuously)
  3. Process documentation standards:
     - SOPs (Standard Operating Procedures): step-by-step guides
     - Decision trees: if/then logic for complex scenarios
     - Playbooks: comprehensive guides for specific scenarios
     - Quick reference cards: one-page summaries for common tasks

  Part 2: Design support processes
  For "EventPro" — an event management SaaS (3,000 customers,
  10 support agents, 2,500 tickets/month):

  1. Design the ticket lifecycle process:
     Create a complete ticket lifecycle SOP covering:
     - Ticket creation (auto-assign, categorize, prioritize)
     - First response (templates, personalization, SLA tracking)
     - Investigation (troubleshooting steps, internal coordination)
     - Resolution (confirm fix, document solution)
     - Follow-up (satisfaction check, knowledge base update)
     - Closure (auto-close criteria, reopen handling)
     Include decision points, role assignments, and SLA checkpoints.

  2. Design the escalation process:
     Create a decision tree for escalation that covers:
     - When to escalate (criteria by severity, customer tier, complexity)
     - How to escalate (documentation requirements, warm vs. cold handoff)
     - Who to escalate to (tier 2, engineering, management, security)
     - What happens after escalation (ownership, follow-up, resolution)
     - Escalation anti-patterns (what NOT to do)

  3. Design the bug reporting process:
     Create the end-to-end process from customer report to resolution:
     - Customer reports bug → Support investigation
     - Support confirms bug → Engineering bug report
     - Engineering triage → Priority assignment
     - Fix development → Testing → Deployment
     - Customer notification → Verification → Closure
     Include: templates, quality gates, SLA at each stage

  4. Design a continuous improvement process:
     Create a system for ongoing process improvement:
     - Weekly ticket review (what patterns emerge?)
     - Monthly process audit (what's working, what's not?)
     - Quarterly process optimization (major improvements)
     - Agent feedback loop (frontline insights)
     - Customer feedback integration

  Part 3: Process governance
  1. Process ownership and accountability
  2. Change management for process updates
  3. Training on new and updated processes
  4. Measuring process effectiveness

assertions:
  - type: llm_judge
    criteria: "The ticket lifecycle SOP is complete and usable — an agent could follow it for any ticket type with clear decision points at each stage"
    weight: 0.30
    description: "Complete usable ticket lifecycle"
  - type: llm_judge
    criteria: "The escalation decision tree covers real scenarios — it includes nuanced criteria beyond just severity, such as customer tier and emotional state"
    weight: 0.25
    description: "Nuanced escalation decision tree"
  - type: llm_judge
    criteria: "The bug reporting process spans the full lifecycle — from customer report through engineering fix to customer notification with quality gates"
    weight: 0.25
    description: "Full lifecycle bug process"
  - type: llm_judge
    criteria: "The continuous improvement system is sustainable — it creates regular improvement cadences without overwhelming the team with process overhead"
    weight: 0.20
    description: "Sustainable improvement system"
