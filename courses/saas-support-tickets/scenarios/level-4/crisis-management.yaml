meta:
  id: crisis-management
  level: 4
  course: saas-support-tickets
  type: output
  description: "Manage support during crisis events — coordinate responses during major outages, security breaches, PR incidents, and mass customer impact events"
  tags: [support, crisis, incident-management, emergency, coordination, expert]

state: {}

trigger: |
  Crisis situations test every aspect of a support operation
  simultaneously: ticket volume surges, customer emotions peak,
  internal coordination becomes critical, and every response is
  scrutinized. Expert support leaders have crisis playbooks ready
  before they're needed.

  Part 1: Crisis types in SaaS support
  1. Technical crisis:
     - Major outage (all customers affected)
     - Data breach or security incident
     - Data loss event
     - Critical vulnerability discovered
  2. Business crisis:
     - Pricing change backlash
     - Feature removal controversy
     - Acquisition/merger uncertainty
     - Key personnel departure (CEO, CTO)
  3. External crisis:
     - Negative media coverage
     - Competitor attack campaign
     - Regulatory action
     - Social media viral complaint

  Part 2: Navigate a multi-day crisis
  For "PaymentPro" — a payment processing SaaS ($10M ARR, 5,000 merchants):

  DAY 1 — Discovery (Tuesday, 9:00 AM):
  Your monitoring detects that approximately 2% of transactions
  processed between Friday 6PM and Monday 8AM were charged twice.
  Affected: ~800 merchants, ~15,000 duplicate transactions totaling
  approximately $2.3M in duplicate charges.

  Tasks:
  1. Write the initial internal crisis alert:
     - Who needs to know (engineering, leadership, legal, support)
     - Severity assessment and initial scope
     - Immediate containment actions
     - Communication hold (what NOT to say publicly yet)

  2. Write the first customer notification (sent 4 hours after discovery):
     - What you know and what you don't
     - What you're doing about it
     - What merchants should tell their customers
     - Timeline for next update

  DAY 2 — Response (Wednesday):
  Engineering has identified root cause (payment gateway failover
  bug) and confirmed the full scope. Refund processing has begun.
  Media has picked up the story. Support volume is 5x normal.

  Tasks:
  3. Write the detailed customer update:
     - Root cause explanation (technical but accessible)
     - Refund timeline and process
     - Impact on ongoing transactions (safe to process?)
     - Dedicated support channel for affected merchants

  4. Design the crisis support operations:
     - Triage framework for the 5x ticket volume
     - Temporary staffing plan (all hands, shifts, overtime)
     - Response templates for common questions
     - Escalation criteria during the crisis

  DAY 3-5 — Resolution and Recovery:
  Refunds are processing. Some merchants had customers dispute
  the duplicate charges through their banks, creating a chargeback
  mess. Three merchants are threatening lawsuits.

  Tasks:
  5. Write the resolution communication:
     - Refund completion confirmation
     - Chargeback guidance for merchants
     - What changed to prevent recurrence
     - Compensation/goodwill offer

  6. Write the post-crisis review from support's perspective:
     - What worked in the support response
     - What broke down
     - Recommendations for the crisis playbook
     - Customer impact assessment (lost merchants, damaged trust)

  Part 3: Crisis preparedness
  1. Building crisis playbooks before you need them
  2. Crisis communication templates
  3. Training the team for crisis response
  4. Post-crisis recovery and trust rebuilding

assertions:
  - type: llm_judge
    criteria: "Crisis communications escalate appropriately over the multi-day timeline — each update builds on the previous with increasing detail and resolution"
    weight: 0.30
    description: "Appropriate crisis escalation"
  - type: llm_judge
    criteria: "The crisis support operations plan is immediately actionable — triage framework, staffing plan, and templates could be deployed within hours"
    weight: 0.25
    description: "Immediately actionable operations"
  - type: llm_judge
    criteria: "Customer communications are honest without creating panic — they acknowledge the severity while maintaining confidence in resolution"
    weight: 0.25
    description: "Honest without panic"
  - type: llm_judge
    criteria: "The post-crisis review is genuinely reflective — it identifies real failures and specific improvements, not just self-congratulation"
    weight: 0.20
    description: "Genuinely reflective review"
