meta:
  id: complex-support-simulation
  level: 4
  course: saas-support-tickets
  type: output
  description: "Navigate a complex week-long support challenge — manage an enterprise escalation, system migration, team crisis, and strategic initiative simultaneously"
  tags: [support, simulation, complex, multi-thread, strategic, expert]

state: {}

trigger: |
  Expert support leaders juggle multiple complex initiatives
  simultaneously. This simulation tests your ability to manage
  strategic thinking alongside tactical execution across a full
  work week.

  You are the Support Director at "AppFlow" — a workflow automation
  SaaS ($8M ARR, 2,500 customers, 20 support agents).

  MONDAY:
  Thread 1 — Enterprise crisis:
  Your largest customer ($45K/mo, 500 users) reports that their
  automated workflows are producing incorrect outputs. They've
  halted all workflow automation and are running processes manually.
  The CEO of their company has emailed your CEO.
  Task: Write the executive response strategy and initial communication.

  Thread 2 — Platform migration:
  You're in week 3 of migrating from Freshdesk to Zendesk.
  The migration team reports that 6 months of customer history
  didn't transfer correctly. You go live in 2 weeks.
  Task: Assess the risk and write the decision memo (proceed, delay, or abort).

  WEDNESDAY:
  Thread 1 update: Engineering identified the root cause — a recent
  ML model update changed output formatting. Fix requires 48 hours.
  The enterprise customer is losing $10K/day in manual labor costs.
  Task: Write the update to the customer and propose interim compensation.

  Thread 3 — Team crisis:
  Your best team lead (managing 8 agents) gives 2-week notice.
  They're joining a competitor. Three other agents have mentioned
  they're also interviewing elsewhere.
  Task: Write the retention strategy and contingency plan.

  FRIDAY:
  Thread 1 resolution: Fix deployed, enterprise customer verified.
  Task: Write the post-resolution communication and relationship
  repair plan.

  Thread 2 update: Migration team fixed 80% of the history data.
  Remaining 20% can be recovered but needs 3 additional weeks.
  Task: Make and justify the go/no-go decision.

  Thread 4 — Strategic initiative:
  The CEO asks you to present a proposal for transforming support
  from reactive to proactive. Board meeting is in 10 days.
  Task: Write the executive proposal outline with 3 key initiatives.

  End of week:
  Write your weekly report to the CEO covering all 4 threads:
  progress, risks, decisions needed, and resource requirements.

assertions:
  - type: llm_judge
    criteria: "All 4 threads are managed coherently — each situation gets appropriate attention without any thread being neglected or handled superficially"
    weight: 0.30
    description: "Coherent multi-thread management"
  - type: llm_judge
    criteria: "Enterprise crisis handling is executive-level — communications to the CEO and enterprise customer are appropriately strategic and relationship-focused"
    weight: 0.25
    description: "Executive-level crisis handling"
  - type: llm_judge
    criteria: "Strategic decisions are well-reasoned — the migration go/no-go and team retention strategy show clear analysis of trade-offs"
    weight: 0.25
    description: "Well-reasoned strategic decisions"
  - type: llm_judge
    criteria: "The weekly CEO report synthesizes effectively — it presents 4 complex threads as a coherent narrative with clear action items"
    weight: 0.20
    description: "Effective executive synthesis"
