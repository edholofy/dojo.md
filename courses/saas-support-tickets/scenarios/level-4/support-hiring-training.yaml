meta:
  id: support-hiring-training
  level: 4
  course: saas-support-tickets
  type: output
  description: "Design support hiring and training programs — create interview processes, assessment criteria, onboarding curricula, and ongoing development programs"
  tags: [support, hiring, training, onboarding, development, expert]

state: {}

trigger: |
  Building a great support team starts with hiring the right
  people and giving them the right training. Expert support
  leaders design hiring processes that identify talent beyond
  resumes and training programs that prepare agents for real-world
  scenarios within weeks, not months.

  Part 1: Support hiring best practices
  1. Defining the ideal support agent:
     - Technical aptitude vs. empathy balance
     - Written communication skills (most support is text)
     - Problem-solving under pressure
     - Learning agility (products change constantly)
     - Emotional resilience (handling difficult customers)
  2. Hiring process design:
     - Resume screening criteria (look for X, ignore Y)
     - Phone screen (communication assessment)
     - Written assessment (ticket simulation)
     - Live exercise (troubleshooting scenario)
     - Culture fit interview
     - Reference checks specific to support skills
  3. Common hiring mistakes:
     - Over-indexing on technical skills
     - Ignoring writing quality
     - Not testing empathy with difficult scenarios
     - Hiring for current needs only (not growth potential)
     - Unconscious bias in "culture fit" assessment

  Part 2: Design a hiring and training program
  For "InvoicePro" — an invoicing SaaS hiring 5 support agents:

  1. Create the job description:
     - Role: Customer Support Specialist (Tier 1)
     - Write a job posting that attracts the right candidates
     - Include: responsibilities, requirements, nice-to-haves
     - Make it compelling (sell the role, not just list requirements)

  2. Design the interview process:
     Step 1 — Written assessment:
     Create 3 simulated tickets for candidates to respond to:
     - Easy: password reset question
     - Medium: billing dispute with frustrated customer
     - Hard: technical bug report requiring diagnosis
     Include scoring rubric for evaluating responses

     Step 2 — Live troubleshooting exercise:
     Design a 15-minute scenario where the candidate acts as
     support agent and you play the customer
     - Script for the "customer" (with escalation triggers)
     - Evaluation criteria for the candidate
     - Red flags to watch for

     Step 3 — Culture and values interview:
     - 5 behavioral interview questions specific to support
     - What great answers look like vs. concerning answers

  3. Design the onboarding curriculum:
     Create a 4-week onboarding program:
     - Week 1: Company, product, and tools
     - Week 2: Support processes and policies
     - Week 3: Shadowing and supervised practice
     - Week 4: Graduated independence with mentorship
     Include: daily schedules, learning objectives, assessments

  4. Design an ongoing development program:
     - Monthly skill development workshops
     - Quarterly performance reviews
     - Career path framework (agent → senior → lead → manager)
     - Cross-training opportunities (support → success → product)
     - Industry conference and certification budget

  Part 3: Retention and growth
  1. Keeping great agents (compensation, growth, culture)
  2. Handling the "support burnout" career stage
  3. Internal mobility (support as a career launchpad)
  4. Building a support team people want to join

assertions:
  - type: llm_judge
    criteria: "The job description is compelling — it sells the opportunity rather than just listing requirements, and attracts both experienced and high-potential candidates"
    weight: 0.25
    description: "Compelling job description"
  - type: llm_judge
    criteria: "The interview process is structured and fair — written assessments, live exercises, and behavioral questions evaluate different dimensions with clear rubrics"
    weight: 0.30
    description: "Structured fair interview process"
  - type: llm_judge
    criteria: "The onboarding curriculum progressively builds capability — it moves from observation to supervision to independence at an appropriate pace"
    weight: 0.25
    description: "Progressive onboarding curriculum"
  - type: llm_judge
    criteria: "Career development addresses support burnout — the program provides growth paths that prevent stagnation and retain talent"
    weight: 0.20
    description: "Burnout-preventing career paths"
