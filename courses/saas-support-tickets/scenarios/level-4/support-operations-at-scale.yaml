meta:
  id: support-operations-at-scale
  level: 4
  course: saas-support-tickets
  type: output
  description: "Scale support operations — design processes, automation, and organizational structures for support teams handling 10,000+ tickets per month"
  tags: [support, operations, scaling, automation, process-design, expert]

state: {}

trigger: |
  Scaling support from a small team to a large operation requires
  fundamental changes in process, technology, and organizational
  design. What works for 500 tickets/month breaks at 10,000.
  Expert support leaders build systems that scale without
  sacrificing quality.

  Part 1: Scaling challenges
  1. Volume thresholds and their challenges:
     - 500/mo: 1-2 agents, everyone does everything
     - 2,000/mo: 5-8 agents, need specialization
     - 10,000/mo: 20-30 agents, need tiers, automation, process
     - 50,000/mo: 50+ agents, need departments, management layers
  2. What breaks at scale:
     - Tribal knowledge (not documented)
     - Manual processes (not automated)
     - Single-queue model (not triaged)
     - Individual heroics (not systematic)
     - Flat team structure (not layered)

  Part 2: Design a scaled support operation
  For "CloudPlatform" — a cloud infrastructure SaaS growing from
  2,000 to 15,000 tickets/month over the next 12 months:

  1. Design the organizational structure:
     - Current: 8 generalist agents, 1 team lead
     - Target: structured team handling 15,000 tickets/month
     - Define: tiers, specializations, management layers,
       coverage model (time zones), escalation paths
     - Include: headcount plan, hiring timeline, role descriptions

  2. Design the automation strategy:
     - Identify which ticket types to automate (and which never to)
     - Design auto-routing rules (by topic, severity, customer tier)
     - Create escalation automation (SLA-triggered, sentiment-triggered)
     - Build self-service flows (chatbot, knowledge base, in-app help)
     - Target: 40% deflection rate, <2min auto-routing

  3. Design the quality framework at scale:
     - QA sampling strategy (can't review every ticket at volume)
     - Calibration process across 20+ reviewers
     - Performance metrics by tier and specialization
     - Customer feedback integration at scale
     - Continuous improvement process

  4. Design the technology stack:
     - Help desk platform selection criteria
     - Integration architecture (CRM, product, engineering tools)
     - Reporting and analytics infrastructure
     - AI/ML tooling for support automation
     - Knowledge management system

  5. Create a 12-month scaling roadmap:
     - Quarter-by-quarter milestones
     - Hiring and training timeline
     - Technology implementation phases
     - Risk mitigation for quality during rapid growth
     - Success metrics at each milestone

  Part 3: Sustaining scale
  1. Maintaining culture during rapid growth
  2. Avoiding "support factory" mentality
  3. Innovation in support at scale
  4. Executive reporting and support ROI at scale

assertions:
  - type: llm_judge
    criteria: "The organizational design is realistic and well-structured — tiers, specializations, and management layers make sense for the volume and complexity"
    weight: 0.30
    description: "Realistic organizational design"
  - type: llm_judge
    criteria: "The automation strategy identifies appropriate automation boundaries — routine tasks are automated while complex and emotional interactions remain human"
    weight: 0.25
    description: "Appropriate automation boundaries"
  - type: llm_judge
    criteria: "The 12-month roadmap is actionable — milestones are specific, risks are identified, and the progression from current state to target is logical"
    weight: 0.25
    description: "Actionable scaling roadmap"
  - type: llm_judge
    criteria: "Quality maintenance during growth is addressed — the plan acknowledges that quality often dips during rapid scaling and provides specific countermeasures"
    weight: 0.20
    description: "Quality during growth"
