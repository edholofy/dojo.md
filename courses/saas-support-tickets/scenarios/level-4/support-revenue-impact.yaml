meta:
  id: support-revenue-impact
  level: 4
  course: saas-support-tickets
  type: output
  description: "Quantify support's revenue impact — measure how support prevents churn, drives expansion, and contributes to business growth"
  tags: [support, revenue, roi, business-impact, metrics, expert]

state: {}

trigger: |
  Support is often viewed as a cost center. Expert support leaders
  reframe support as a revenue driver by quantifying its impact
  on retention, expansion, and customer lifetime value. This
  reframing is essential for securing resources and investment.

  Part 1: Support's revenue mechanics
  1. Revenue preservation (churn prevention):
     - Save conversations that prevent cancellations
     - Support quality correlation with retention rates
     - At-risk customer identification and intervention
     - Dollar value of each prevented churn
  2. Revenue expansion (growth from support):
     - Support-driven upsell opportunities
     - Feature adoption guidance leading to upgrades
     - Referral generation from positive experiences
     - Cross-sell recommendations during support
  3. Revenue enablement (making sales easier):
     - Pre-sales technical support
     - POC and trial support driving conversion
     - Knowledge base reducing sales objections
     - Case studies from exceptional support experiences

  Part 2: Build a support revenue model
  For "SalesEngine" — a sales enablement SaaS:
  - 3,500 customers
  - Average contract value: $400/mo
  - Annual churn rate: 12%
  - Monthly ticket volume: 4,200
  - Support team: 15 agents, $1.2M annual cost
  - CSAT: 4.2/5.0
  - Current FCR: 72%

  1. Calculate support's revenue impact:
     - Churn prevention: estimate saves per month, value per save
     - Expansion influence: support-identified upsell opportunities
     - Trial conversion support: support's role in converting trials
     - Total revenue impact vs. total support cost = ROI

  2. Build the executive business case:
     You're requesting budget for 3 additional senior agents ($75K each)
     and an AI chatbot implementation ($50K/year). Total ask: $275K.
     - Model the expected improvements (FRT, FCR, CSAT)
     - Translate improvements to revenue impact
     - Calculate expected ROI
     - Present the business case in executive format

  3. Design a support-influenced revenue dashboard:
     - Metrics that connect support activity to revenue
     - Save rate tracking and trending
     - Expansion influence attribution
     - Cost per ticket vs. revenue per customer
     - Support NPS correlation with expansion rate

  4. Create a support agent incentive program:
     - Revenue-aligned KPIs (not just ticket volume)
     - Save bonus structure
     - Quality-weighted compensation
     - Team vs. individual incentives
     - Avoiding perverse incentives (don't reward unnecessary saves)

  Part 3: Presenting support's value
  1. Building the narrative (from cost center to revenue driver)
  2. Executive communication and reporting
  3. Cross-functional partnership (support + sales + success)
  4. Benchmarking support ROI against industry

assertions:
  - type: llm_judge
    criteria: "Revenue calculations are realistic and well-reasoned — the math connects support metrics to dollar values with defensible assumptions"
    weight: 0.30
    description: "Realistic revenue calculations"
  - type: llm_judge
    criteria: "The executive business case is compelling — it presents a clear ROI narrative that would convince a CFO to approve the $275K investment"
    weight: 0.25
    description: "Compelling executive business case"
  - type: llm_judge
    criteria: "The incentive program avoids perverse incentives — it rewards genuine value creation without encouraging agents to game metrics"
    weight: 0.25
    description: "Well-designed incentive program"
  - type: llm_judge
    criteria: "The cost-center-to-revenue-driver narrative is authentic — it doesn't overstate support's impact but genuinely reframes the value proposition"
    weight: 0.20
    description: "Authentic value narrative"
