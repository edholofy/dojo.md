meta:
  id: support-driven-product-development
  level: 4
  course: saas-support-tickets
  type: output
  description: "Drive product development through support data — turn ticket trends, customer pain points, and feature requests into product roadmap influence"
  tags: [support, product-development, feedback, roadmap, customer-voice, expert]

state: {}

trigger: |
  Support teams are the closest team to customer pain. They see
  every bug, every confusion, every frustration, and every wish.
  Expert support leaders transform this raw customer voice into
  structured product influence that shapes the roadmap and
  improves the product systematically.

  Part 1: The support-product feedback loop
  1. Types of product signal from support:
     - Bug reports (what's broken)
     - Feature requests (what's missing)
     - Usability feedback (what's confusing)
     - Competitive intelligence (what competitors do better)
     - Expansion blockers (what prevents upsell)
     - Churn drivers (what makes customers leave)
  2. Transforming signal into influence:
     - Quantification (not "customers want X" but "147 customers
       requested X, representing $180K ARR")
     - Segmentation (is it enterprise or SMB asking?)
     - Severity assessment (annoyance vs. blocker vs. churn driver)
     - Competitive context (do 3 competitors already have this?)
  3. Building product team relationships:
     - Regular feedback syncs (weekly, structured)
     - Shared dashboards and metrics
     - Support presence in product planning
     - Closing the loop (telling support what happened with feedback)

  Part 2: Build a support-to-product program
  For "DesignFlow" — a design tool SaaS with 25,000 users:

  1. Analyze 3 months of ticket data and create a product impact report:
     Raw data (last 90 days):
     - 892 tickets about export quality (PDF exports are blurry)
     - 634 tickets requesting real-time collaboration
     - 421 tickets about slow performance with large files
     - 318 tickets requesting Figma import
     - 287 tickets about confusing layer management
     - 156 tickets requesting version history
     - 89 tickets about color accessibility checking
     - 67 tickets requesting dark mode

     For each:
     - Calculate revenue impact (affected customers' total ARR)
     - Assess churn risk
     - Evaluate competitive pressure
     - Recommend priority (critical, high, medium, low)
     - Provide product team with actionable brief

  2. Write 3 product feature briefs from support data:
     - Brief 1: PDF export quality (critical — causing churn)
     - Brief 2: Real-time collaboration (high — competitive gap)
     - Brief 3: Figma import (medium — onboarding enabler)
     Each brief should include: problem statement, customer quotes,
     quantitative impact, competitive analysis, and suggested approach

  3. Design a quarterly Voice of Customer (VoC) report:
     - Executive summary format
     - Ticket trend analysis with visualizations
     - Top 10 customer pain points ranked by impact
     - Competitive intelligence summary
     - Recommended product priorities
     - Success stories (things customers love)

  4. Create a feature request tracking system:
     - How to capture requests consistently
     - Voting/weighting methodology
     - Communication back to requesting customers
     - Integration with product planning tools

  Part 3: Measuring support's product influence
  1. Tracking which product changes originated from support feedback
  2. Measuring ticket volume reduction after product improvements
  3. Building support's credibility with product leadership
  4. The support team as product quality champions

assertions:
  - type: llm_judge
    criteria: "The product impact report quantifies business impact — ticket counts are connected to revenue, churn risk, and competitive pressure with specific numbers"
    weight: 0.30
    description: "Quantified business impact"
  - type: llm_judge
    criteria: "Feature briefs are compelling for a product audience — they tell a clear story with data, customer quotes, and competitive context that helps product teams make decisions"
    weight: 0.25
    description: "Compelling product briefs"
  - type: llm_judge
    criteria: "The VoC report is executive-ready — it presents insights at the right level of detail with actionable recommendations, not just data"
    weight: 0.25
    description: "Executive-ready VoC report"
  - type: llm_judge
    criteria: "The feature request tracking system is practical — it can be implemented with standard tools and doesn't require custom engineering"
    weight: 0.20
    description: "Practical tracking system"
