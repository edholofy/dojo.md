meta:
  id: knowledge-base-basics
  level: 1
  course: saas-support-tickets
  type: output
  description: "Create knowledge base articles — write clear, searchable self-service content that reduces ticket volume and empowers customers to solve issues independently"
  tags: [support, knowledge-base, self-service, articles, documentation, basics]

state: {}

trigger: |
  A well-maintained knowledge base reduces ticket volume by
  enabling customer self-service. Good knowledge base articles
  are clear, searchable, and solve problems without requiring
  a support ticket. Every support interaction is an opportunity
  to identify a missing or unclear article.

  Part 1: Knowledge base fundamentals
  1. Why knowledge bases matter:
     - 91% of customers would use a knowledge base if available
     - Self-service reduces ticket volume 20-40%
     - Available 24/7 (no waiting for support hours)
     - Scales infinitely (one article serves thousands)
  2. Article types:
     - How-to guides (step-by-step instructions)
     - Troubleshooting articles (problem → solution)
     - FAQ articles (quick answers to common questions)
     - Getting started guides (onboarding content)
     - Best practices (tips and recommendations)
  3. Writing principles:
     - Write for skimming (headers, bullets, short paragraphs)
     - Use simple language (no jargon)
     - Include visuals (screenshots, GIFs, videos)
     - Start with the solution (don't bury the answer)
     - Include search-friendly titles and keywords

  Part 2: Write knowledge base articles
  For "InvoiceCloud" — an invoicing SaaS:
  Write 4 complete knowledge base articles:

  Article 1: "How to Create and Send Your First Invoice"
  (Getting started guide)
  - Step-by-step with numbered instructions
  - Screenshot placement notes
  - Tips for customization
  - Related articles links

  Article 2: "Fixing 'Payment Failed' Errors"
  (Troubleshooting article)
  - Common causes and solutions
  - Decision tree format (if this → try that)
  - When to contact support

  Article 3: "Frequently Asked Billing Questions"
  (FAQ article)
  - 8 common billing questions with concise answers
  - Link to detailed articles where appropriate

  Article 4: "Setting Up Automatic Payment Reminders"
  (How-to guide)
  - Step-by-step configuration
  - Best practices for reminder timing
  - Template examples for reminder messages

  Part 3: Knowledge base management
  1. Identifying gaps (which tickets should have articles?)
  2. Keeping articles updated (review cycles)
  3. Measuring article effectiveness (helpfulness ratings)
  4. Writing articles from support ticket patterns

assertions:
  - type: llm_judge
    criteria: "All 4 articles are complete and publication-ready — they follow best practices with clear structure, step-by-step instructions, and helpful formatting"
    weight: 0.30
    description: "Complete publication-ready articles"
  - type: llm_judge
    criteria: "Articles are written for non-technical users — language is simple, jargon is avoided, and instructions assume no prior knowledge"
    weight: 0.25
    description: "Non-technical user language"
  - type: llm_judge
    criteria: "The troubleshooting article follows a logical decision tree — it guides users through diagnosis to solution efficiently"
    weight: 0.25
    description: "Logical troubleshooting flow"
  - type: llm_judge
    criteria: "Gap identification guidance is practical — it connects support ticket patterns to missing knowledge base content"
    weight: 0.20
    description: "Practical gap identification"
