meta:
  id: support-basics
  level: 1
  course: saas-support-tickets
  type: output
  description: "Understand SaaS support fundamentals — learn the principles of effective ticket resolution, response structure, and customer communication"
  tags: [support, basics, fundamentals, communication, response, basics]

state: {}

trigger: |
  SaaS customer support is the frontline of customer retention.
  How you respond to support tickets directly impacts customer
  satisfaction, churn rates, and brand perception. Understanding
  the fundamentals of effective support communication is essential.

  Part 1: SaaS support fundamentals
  1. Why support matters in SaaS:
     - Support interactions affect retention more than features
     - 96% of customers who have a high-effort experience are disloyal
     - The cost of acquiring a new customer is 5-25x more than retention
     - Support is a growth lever, not a cost center
  2. The anatomy of a great support response:
     - Acknowledgment (show you understand the issue)
     - Empathy (validate the frustration without blame)
     - Solution (clear steps to resolve or status update)
     - Next steps (what happens next, who does what)
     - Close (invitation to follow up if needed)
  3. Tone and voice in support:
     - Professional but human
     - Confident but not arrogant
     - Empathetic but not apologetic to a fault
     - Clear and concise, not robotic
     - Match the customer's urgency level

  Part 2: Write support responses
  For a project management SaaS tool ("TaskFlow"):
  Write responses to 5 common support tickets:

  1. "I can't log in to my account"
     - Troubleshooting steps
     - Account verification approach
     - Password reset instructions

  2. "The app is running really slowly"
     - Gathering diagnostic information
     - Initial troubleshooting suggestions
     - Escalation path if issue persists

  3. "How do I export my data to CSV?"
     - Step-by-step instructions with clarity
     - Link to relevant help article
     - Offer additional assistance

  4. "I was charged twice this month"
     - Empathetic acknowledgment
     - Verification steps
     - Resolution commitment and timeline

  5. "When is [feature] going to be released?"
     - Handling uncertainty gracefully
     - Redirecting to roadmap/feedback channels
     - Managing expectations

  For each response include:
  - The complete response text
  - Why this approach works
  - Common mistakes to avoid

  Part 3: Support writing best practices
  1. Formatting for readability (headers, bullets, short paragraphs)
  2. When to use screenshots or video links
  3. Internal notes vs. customer-facing responses
  4. When to close a ticket vs. keep it open

assertions:
  - type: llm_judge
    criteria: "All 5 support responses follow the acknowledgment-empathy-solution-next steps structure and feel genuinely helpful"
    weight: 0.30
    description: "Structured helpful responses"
  - type: llm_judge
    criteria: "Tone is professional but human — responses don't read like a chatbot or a corporate script"
    weight: 0.25
    description: "Professional human tone"
  - type: llm_judge
    criteria: "Solutions are specific and actionable — troubleshooting steps are clear enough for a non-technical user to follow"
    weight: 0.25
    description: "Specific actionable solutions"
  - type: llm_judge
    criteria: "Common mistakes are genuinely common — they highlight real support pitfalls, not obvious errors"
    weight: 0.20
    description: "Genuine common mistake identification"
