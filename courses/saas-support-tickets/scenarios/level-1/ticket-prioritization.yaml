meta:
  id: ticket-prioritization
  level: 1
  course: saas-support-tickets
  type: output
  description: "Prioritize support tickets — learn severity levels, urgency assessment, and triage methods to ensure critical issues get immediate attention"
  tags: [support, prioritization, triage, severity, urgency, basics]

state: {}

trigger: |
  Not all support tickets are equal. A billing error affecting
  one user is different from a system outage affecting thousands.
  Prioritization ensures critical issues get immediate attention
  while routine questions are handled efficiently.

  Part 1: Ticket prioritization framework
  1. Severity levels:
     - P1 (Critical): System down, data loss, security breach
       Response: Immediate (< 15 minutes)
     - P2 (High): Major feature broken, widespread impact
       Response: Within 1 hour
     - P3 (Medium): Feature partially broken, workaround available
       Response: Within 4 hours
     - P4 (Low): Question, enhancement request, cosmetic issue
       Response: Within 24 hours
  2. Priority factors:
     - Business impact (revenue, operations affected)
     - Number of users affected (1 vs. 1,000)
     - Workaround availability (can they still work?)
     - Customer tier (enterprise vs. free plan)
     - SLA obligations (contractual response times)
  3. Triage process:
     - Quick assessment (30 seconds to categorize)
     - Information gathering (what do you need to investigate?)
     - Routing (who should handle this?)
     - Communication (set expectations with the customer)

  Part 2: Triage support tickets
  For "CloudSync" — a file synchronization SaaS:
  Triage 8 incoming tickets and assign priority:

  1. "All our team files have disappeared from shared folders"
  2. "I can't figure out how to share a folder with someone"
  3. "The mobile app crashes when I try to upload photos"
  4. "Can you add dark mode to the app?"
  5. "We've been charged for 50 seats but only have 30 users"
  6. "File sync is running 2 hours behind schedule"
  7. "Our CEO's presentation file is corrupted before a board meeting in 1 hour"
  8. "The API is returning 500 errors on all endpoints"

  For each ticket:
  - Assign severity level (P1-P4) with justification
  - Write the initial response
  - Determine routing (self-handle, escalate, engineering)
  - Set customer expectations for resolution time

  Part 3: Prioritization best practices
  1. When customer perception doesn't match actual severity
  2. Managing the queue during high-volume periods
  3. Re-prioritizing when new information emerges
  4. Communicating priority decisions to customers

assertions:
  - type: llm_judge
    criteria: "All 8 tickets are correctly prioritized — the API returning 500 errors is P1, dark mode request is P4, and everything in between is logically ranked"
    weight: 0.30
    description: "Correct ticket prioritization"
  - type: llm_judge
    criteria: "Initial responses match urgency — P1 responses convey urgency and immediate action while P4 responses are helpful but not panicked"
    weight: 0.25
    description: "Urgency-matched responses"
  - type: llm_judge
    criteria: "Routing decisions are logical — data-loss tickets go to engineering, billing goes to billing team, how-to questions are handled directly"
    weight: 0.25
    description: "Logical ticket routing"
  - type: llm_judge
    criteria: "Customer expectations are set clearly — resolution timeframes are specific and realistic for each severity level"
    weight: 0.20
    description: "Clear expectation setting"
