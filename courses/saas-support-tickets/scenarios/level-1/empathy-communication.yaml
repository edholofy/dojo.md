meta:
  id: empathy-communication
  level: 1
  course: saas-support-tickets
  type: output
  description: "Master empathetic support communication — write responses that acknowledge frustration, validate feelings, and resolve issues while maintaining professionalism"
  tags: [support, empathy, communication, tone, customer-experience, basics]

state: {}

trigger: |
  Empathy in support isn't about saying "I'm sorry" repeatedly.
  It's about genuinely understanding the customer's situation,
  validating their feelings, and communicating in a way that
  builds trust — even when you can't immediately fix their problem.

  Part 1: Empathy in support communication
  1. The empathy framework:
     - Listen/read carefully (understand the real issue)
     - Acknowledge (show you understand what happened)
     - Validate (their frustration is reasonable)
     - Act (take concrete steps to help)
     - Follow up (ensure resolution)
  2. Empathy vs. sympathy:
     - Empathy: "I understand how frustrating it is to lose work"
     - Sympathy: "I'm sorry about that" (feels hollow)
     - Over-apologizing: "I'm so so sorry!" (loses credibility)
  3. Tone calibration:
     - Matching customer urgency (mirror their energy)
     - Calm during crisis (being their anchor)
     - Celebrating with them (when things go well)
     - Professional distance (emotional support has limits)

  Part 2: Write empathetic responses
  For "WriteFlow" — a writing productivity SaaS:
  Write empathetic responses for 6 emotionally charged tickets:

  1. ANGRY: "Your terrible update just deleted 3 hours of my writing!!!"
  - Acknowledge the horror of lost work
  - Immediate investigation
  - Recovery options if possible

  2. FRUSTRATED: "I've been going back and forth with support for
  2 weeks and NOTHING has been resolved"
  - Acknowledge the repeated frustration
  - Take ownership
  - Commit to resolution with specific steps

  3. DISAPPOINTED: "I recommended your product to my team and now
  it's not working. I look bad."
  - Acknowledge the personal/professional impact
  - Fix the issue AND the relationship
  - Restore their confidence

  4. CONFUSED: "I don't understand any of these settings.
  Your product is too complicated."
  - Don't make them feel dumb
  - Simplify and guide
  - Offer personalized help

  5. ANXIOUS: "We have a big presentation tomorrow and nothing
  is syncing properly. Please help urgently."
  - Calm urgency
  - Immediate action
  - Proactive updates

  6. GRATEFUL: "Your last agent was amazing and saved my project.
  How do I send them a thank you?"
  - Receive gratitude gracefully
  - Pass along the compliment
  - Reinforce the positive experience

  Part 3: Empathy development
  1. Building empathy skills (not everyone is naturally empathetic)
  2. Empathy fatigue and self-care for support agents
  3. Cultural sensitivity in global support
  4. When empathy conflicts with policy

assertions:
  - type: llm_judge
    criteria: "All 6 responses demonstrate genuine empathy — each acknowledges the specific emotional state and addresses the underlying feeling, not just the technical issue"
    weight: 0.30
    description: "Genuine emotional acknowledgment"
  - type: llm_judge
    criteria: "Angry customer response de-escalates without being patronizing — it takes the complaint seriously and takes ownership"
    weight: 0.25
    description: "Non-patronizing de-escalation"
  - type: llm_judge
    criteria: "The confused customer response empowers rather than condescends — it makes learning feel easy, not embarrassing"
    weight: 0.25
    description: "Empowering not condescending"
  - type: llm_judge
    criteria: "Empathy fatigue and self-care are addressed practically — support agents need emotional support too"
    weight: 0.20
    description: "Practical agent wellbeing"
