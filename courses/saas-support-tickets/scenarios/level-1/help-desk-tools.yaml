meta:
  id: help-desk-tools
  level: 1
  course: saas-support-tickets
  type: output
  description: "Understand help desk tools — learn how to use ticketing systems, macros, tags, and workflows to manage support efficiently"
  tags: [support, help-desk, tools, ticketing, workflows, basics]

state: {}

trigger: |
  Help desk tools are the operational backbone of support teams.
  Understanding how to use ticketing systems, create macros,
  apply tags, and build workflows makes support more efficient
  and consistent.

  Part 1: Help desk tool essentials
  1. Core ticketing features:
     - Ticket creation and assignment
     - Status tracking (open, pending, solved, closed)
     - Priority and severity tagging
     - Internal notes vs. public replies
     - Ticket merging and linking
     - Customer history and context
  2. Popular help desk platforms:
     - Zendesk: Enterprise-grade, highly customizable
     - Intercom: Conversational, product-integrated
     - Freshdesk: Feature-rich, good for growing teams
     - Help Scout: Simple, email-focused
     - Front: Collaborative inbox approach
     Compare features, pricing tiers, best-fit use cases
  3. Efficiency features:
     - Macros/canned responses (templated replies)
     - Auto-assignment rules (routing logic)
     - Tags and categories (organizing tickets)
     - SLA tracking (deadline enforcement)
     - Integrations (CRM, Slack, engineering tools)

  Part 2: Build help desk configurations
  For "PixelPerfect" — a design tool SaaS launching their
  first formal support system:
  1. Design the ticket workflow:
     - Status flow: New → Assigned → In Progress →
       Waiting on Customer → Waiting on Internal →
       Resolved → Closed
     - Auto-assignment rules (by topic, by plan tier)
     - SLA configuration (P1-P4 response and resolution times)
     - Escalation triggers (SLA breach → notify manager)
  2. Create 10 macro/canned responses:
     - Password reset instructions
     - Billing inquiry acknowledgment
     - Bug report information request
     - Feature request acknowledgment
     - Subscription cancellation process
     - Account upgrade confirmation
     - Known issue status update
     - Waiting on customer follow-up
     - Ticket resolution confirmation
     - Satisfaction survey invitation
  3. Design a tagging taxonomy:
     - Category tags (billing, technical, feature, account)
     - Product area tags (editor, exports, collaboration)
     - Sentiment tags (frustrated, happy, neutral)
     - Priority tags (P1-P4)
     - Resolution tags (resolved, known-issue, feature-gap)

  Part 3: Help desk optimization
  1. When to use macros vs. custom responses
  2. Building reports from ticket data
  3. Workflow automation (reducing manual steps)
  4. Scaling the help desk as the company grows

assertions:
  - type: llm_judge
    criteria: "The ticket workflow is logical and complete — every status transition makes sense and covers real support scenarios"
    weight: 0.25
    description: "Logical complete workflow"
  - type: llm_judge
    criteria: "All 10 macros are complete, well-written responses — they're ready to use with clear personalization points"
    weight: 0.30
    description: "Complete usable macros"
  - type: llm_judge
    criteria: "The tagging taxonomy is organized and useful — tags enable meaningful reporting and ticket management"
    weight: 0.25
    description: "Organized useful tagging"
  - type: llm_judge
    criteria: "Platform comparison provides genuine decision guidance — strengths and best-fit recommendations help choose the right tool"
    weight: 0.20
    description: "Genuine platform comparison"
