meta:
  id: billing-inquiries
  level: 1
  course: saas-support-tickets
  type: output
  description: "Handle billing support tickets — respond to charges, refunds, plan changes, invoices, and payment issues with accuracy and empathy"
  tags: [support, billing, payments, refunds, subscriptions, basics]

state: {}

trigger: |
  Billing tickets are among the most sensitive in SaaS support.
  Customers contacting about billing are often frustrated or
  confused. Clear, empathetic, and accurate responses prevent
  churn and build trust.

  Part 1: Common billing issues in SaaS
  1. Unexpected charges:
     - Trial-to-paid conversion (didn't realize trial ended)
     - Plan upgrade charges (prorated amounts confuse)
     - Annual billing surprises (forgot about renewal)
     - Overages or usage-based charges
  2. Refund requests:
     - Service dissatisfaction
     - Accidental purchase
     - Downgrade request with refund
     - Duplicate charges
  3. Plan management:
     - Upgrading or downgrading plans
     - Adding or removing seats/users
     - Switching billing cycles (monthly to annual)
     - Cancellation and offboarding

  Part 2: Write billing support responses
  For "MetricsDash" — an analytics SaaS ($29/mo starter, $99/mo pro):
  Write responses to 6 billing scenarios:

  1. "I was charged $99 but I'm on the $29 plan!"
     (Investigation reveals they upgraded last month)

  2. "I want a refund — I haven't used the product in 3 months"
     (Policy: 30-day refund window, but customer is long-term)

  3. "How do I cancel my subscription?"
     (Retain without being pushy, offer alternatives)

  4. "I need an invoice for my company's accounting"
     (Direct to invoice, explain how to find/generate)

  5. "Why was I charged after I thought I cancelled?"
     (Cancellation didn't complete, need to investigate)

  6. "I want to switch from monthly to annual — do I get a discount?"
     (Annual discount is 20%, explain transition process)

  For each response include:
  - The complete response text
  - Internal actions to take
  - When to make exceptions to policy
  - Escalation criteria

  Part 3: Billing support best practices
  1. When to issue a goodwill refund (even outside policy)
  2. Proactive billing communication (preventing tickets)
  3. Handling billing disputes with payment processors
  4. Documentation and audit trail requirements

assertions:
  - type: llm_judge
    criteria: "All 6 billing responses are accurate and empathetic — they acknowledge frustration while clearly explaining charges and options"
    weight: 0.30
    description: "Accurate empathetic billing responses"
  - type: llm_judge
    criteria: "Refund handling balances policy with customer retention — responses follow policy but show flexibility where appropriate"
    weight: 0.25
    description: "Policy-retention balance"
  - type: llm_judge
    criteria: "Cancellation response attempts retention without being manipulative — it offers alternatives without creating barriers to cancellation"
    weight: 0.25
    description: "Non-manipulative retention"
  - type: llm_judge
    criteria: "Internal actions and escalation criteria are clearly defined — agents know what to do behind the scenes for each scenario"
    weight: 0.20
    description: "Clear internal actions"
