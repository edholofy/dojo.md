meta:
  id: account-access-issues
  level: 1
  course: saas-support-tickets
  type: output
  description: "Resolve account access issues — handle login problems, password resets, SSO configuration, permissions, and account lockouts while maintaining security"
  tags: [support, account-access, login, security, authentication, basics]

state: {}

trigger: |
  Account access issues are high-urgency tickets because they
  completely block the customer from using the product. Fast,
  secure resolution is critical — but support must verify
  identity before granting access to prevent security breaches.

  Part 1: Common access issues
  1. Login problems:
     - Forgot password (most common)
     - Account locked (too many attempts)
     - Email/username not recognized
     - SSO/OAuth issues (Google, Microsoft, SAML)
     - Two-factor authentication problems
  2. Permission issues:
     - User can't access specific features
     - Admin permissions needed
     - Team/workspace visibility problems
     - Role-based access confusion
  3. Account status issues:
     - Account suspended (billing, violation)
     - Account deactivated by admin
     - Trial expired, need extension
     - Account merged or transferred

  Part 2: Resolve access scenarios
  For "TeamVault" — a team password management SaaS:
  Write responses for 6 access scenarios:

  1. "I can't log in — it says my password is wrong but I know it's right"
  - Identity verification steps
  - Troubleshooting (caps lock, browser cache, correct email)
  - Password reset process
  - Response if all troubleshooting fails

  2. "My account is locked and I'm in the middle of a critical project"
  - Urgency acknowledgment
  - Security-conscious unlocking process
  - Preventing future lockouts

  3. "Our SSO stopped working after an IT change"
  - Technical SSO troubleshooting
  - Configuration verification questions
  - Escalation to technical team if needed

  4. "A team member left and I need to access their vault"
  - Security verification (admin confirmation)
  - Data transfer process
  - Account deactivation steps

  5. "I was invited to a team but can't see any shared items"
  - Permission verification
  - Admin coordination
  - Step-by-step visibility fix

  6. "My 2FA device broke and I can't get my backup codes"
  - Identity verification (extra scrutiny needed)
  - Account recovery process
  - Security-first approach

  Part 3: Security in access support
  1. Identity verification best practices
  2. Social engineering attack awareness
  3. Documenting access changes for compliance
  4. Balancing speed with security

assertions:
  - type: llm_judge
    criteria: "All 6 responses balance urgency with security — access is restored quickly without bypassing identity verification"
    weight: 0.30
    description: "Urgency-security balance"
  - type: llm_judge
    criteria: "Identity verification is appropriate per scenario — a password reset needs less verification than accessing a departed employee's data"
    weight: 0.25
    description: "Appropriate identity verification"
  - type: llm_judge
    criteria: "Troubleshooting steps are logical — they start with simple fixes and escalate to more complex solutions"
    weight: 0.25
    description: "Logical troubleshooting progression"
  - type: llm_judge
    criteria: "Security awareness is demonstrated — social engineering risks are acknowledged and handled properly"
    weight: 0.20
    description: "Security-aware responses"
