meta:
  id: first-support-shift
  level: 1
  course: saas-support-tickets
  type: output
  description: "Complete your first support shift — handle a realistic queue of tickets combining all foundational skills into a simulated support work session"
  tags: [support, first-shift, capstone, queue, simulation, basics]

state: {}

trigger: |
  Bringing it all together — handle a realistic support ticket
  queue that combines prioritization, billing, bugs, features,
  access issues, and empathetic communication in a simulated
  support shift.

  You're a new support agent at "ProjectPulse" — a project
  management SaaS (Free, Pro $15/mo, Business $49/mo, Enterprise custom).
  Your shift starts with 8 tickets in the queue.

  Handle each ticket with a complete response:

  Ticket 1 (received 2 min ago):
  Subject: "URGENT - Cannot access any projects"
  "None of our team (15 people) can see any projects as of
  this morning. Everything was working yesterday. We have
  client deliverables due today. Please help immediately."
  Customer: Business plan, 18 months tenure

  Ticket 2 (received 15 min ago):
  Subject: "Billing question"
  "Hi, I added 3 users last week. Can you tell me what my
  next bill will be? I'm on the Pro plan."
  Customer: Pro plan, 6 months tenure

  Ticket 3 (received 45 min ago):
  Subject: "Feature suggestion - Gantt charts"
  "Love the product but really need Gantt chart views for
  project timelines. Any plans for this?"
  Customer: Business plan, 3 months tenure

  Ticket 4 (received 1 hour ago):
  Subject: "Export not working"
  "When I try to export my project to PDF, it just shows
  a blank page. Tried 3 different projects, same issue."
  Customer: Pro plan, 12 months tenure

  Ticket 5 (received 1.5 hours ago):
  Subject: "Cancel my account"
  "Please cancel my subscription effective immediately.
  The product is too slow and crashes constantly."
  Customer: Pro plan, 2 months tenure

  Ticket 6 (received 2 hours ago):
  Subject: "How do I add a team member?"
  "I'm new and can't figure out how to invite my colleague."
  Customer: Free plan, 1 week tenure

  Ticket 7 (received 3 hours ago):
  Subject: "RE: RE: RE: Still broken"
  "This is my FOURTH time contacting you about the same
  notification bug. I keep getting notifications for projects
  I'm not assigned to. Fix this or I'm leaving."
  Customer: Business plan, 14 months tenure

  Ticket 8 (received 4 hours ago):
  Subject: "Integration with Slack?"
  "Do you integrate with Slack? If so, how do I set it up?"
  Customer: Pro plan, 4 months tenure

  For each ticket:
  1. Assign priority (P1-P4) and order of response
  2. Write the complete customer response
  3. Note any internal actions or escalations needed

  After handling all 8, reflect on:
  - Time management (which to handle first and why)
  - Patterns you noticed (recurring issues)
  - Knowledge base articles that would reduce these tickets

assertions:
  - type: llm_judge
    criteria: "Tickets are handled in the right priority order — the team-wide access outage (P1) is first, the frustrated repeat customer is prioritized, routine questions come later"
    weight: 0.30
    description: "Correct priority ordering"
  - type: llm_judge
    criteria: "All 8 responses are complete, professional, and contextually appropriate — each ticket gets the right tone, depth, and action"
    weight: 0.30
    description: "Complete contextual responses"
  - type: llm_judge
    criteria: "The frustrated repeat customer (Ticket 7) receives special handling — acknowledgment of the repeated issue and commitment to escalation"
    weight: 0.20
    description: "Special handling for repeat issues"
  - type: llm_judge
    criteria: "Reflection identifies actionable patterns — knowledge base suggestions and process improvements emerge from the ticket analysis"
    weight: 0.20
    description: "Actionable pattern identification"
