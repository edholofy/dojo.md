meta:
  id: feature-requests
  level: 1
  course: saas-support-tickets
  type: output
  description: "Handle feature request tickets — acknowledge requests, manage expectations, capture feedback for product teams, and respond when features ship or are declined"
  tags: [support, feature-requests, feedback, product, expectations, basics]

state: {}

trigger: |
  Feature requests are among the most common support tickets.
  How you handle them affects customer satisfaction, product
  development, and retention. The key is making customers feel
  heard while honestly managing expectations.

  Part 1: Feature request handling
  1. Why feature requests matter:
     - Direct voice of customer to product team
     - Retention risk (customers leave for missing features)
     - Prioritization input for product roadmap
     - Opportunity to educate about existing features
  2. Feature request response framework:
     - Thank the customer (their input is valuable)
     - Understand the need (what are they trying to accomplish?)
     - Check for existing solutions (already possible differently?)
     - Capture and route (log for product team review)
     - Set expectations (no promises, honest timeline)
  3. Types of feature requests:
     - The feature exists (education opportunity)
     - On the roadmap (share timeline if appropriate)
     - Under consideration (no timeline, being evaluated)
     - Not planned (honest decline with reasoning)
     - Against product philosophy (explain why)

  Part 2: Respond to feature requests
  For "ScheduleWise" — an appointment scheduling SaaS:
  Write responses for 5 feature request scenarios:

  1. "Can you add Google Calendar integration?"
     (It already exists — customer doesn't know how to find it)

  2. "I need recurring appointment scheduling"
     (On the roadmap, shipping next quarter)

  3. "Can you add a built-in video calling feature?"
     (Under consideration, no timeline)

  4. "Your competitor has AI-powered scheduling suggestions"
     (Not planned currently, explain alternative approach)

  5. "Multiple customers have asked about SMS reminders"
     (Frequently requested, gathering feedback to prioritize)

  For each response:
  - Complete customer response
  - Internal logging format for the product team
  - How to follow up when the feature ships
  - When this response type risks churn

  Part 3: Feature request management
  1. Building a feature request database
  2. Voting and prioritization systems
  3. Communicating product decisions to requesters
  4. Turning frustrated requesters into advocates

assertions:
  - type: llm_judge
    criteria: "All 5 responses make the customer feel heard — even when the answer is 'not planned,' the customer's need is acknowledged and valued"
    weight: 0.30
    description: "Customer feels heard"
  - type: llm_judge
    criteria: "The existing-feature response educates without making the customer feel stupid — discovering an existing feature should feel like a win"
    weight: 0.25
    description: "Non-condescending education"
  - type: llm_judge
    criteria: "Internal logging captures the underlying need — product teams get the job-to-be-done, not just the feature description"
    weight: 0.25
    description: "Need-focused internal logging"
  - type: llm_judge
    criteria: "Expectation management is honest — responses don't over-promise or give vague 'we'll consider it' non-answers"
    weight: 0.20
    description: "Honest expectation management"
