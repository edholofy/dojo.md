meta:
  id: bug-report-responses
  level: 1
  course: saas-support-tickets
  type: output
  description: "Respond to bug reports — gather diagnostic information, set expectations, communicate with engineering, and keep customers updated during resolution"
  tags: [support, bugs, troubleshooting, engineering, diagnosis, basics]

state: {}

trigger: |
  Bug reports require a balance of technical understanding
  and customer empathy. The support agent must gather enough
  information for engineering to reproduce the issue while
  keeping the customer informed and confident that their
  problem is being addressed.

  Part 1: Bug report handling process
  1. Initial response:
     - Acknowledge the issue
     - Ask for diagnostic information:
       Browser/OS/device, steps to reproduce, screenshots,
       error messages, when it started, frequency
     - Set expectations for investigation timeline
  2. Investigation and escalation:
     - Try to reproduce the issue
     - Check known issues list
     - Write an internal escalation (for engineering)
     - Determine severity and impact
  3. Ongoing communication:
     - Status updates during investigation
     - When a fix is found (temporary workaround)
     - When a fix is deployed (confirmation and thanks)
     - Follow-up to confirm resolution

  Part 2: Handle bug report scenarios
  For "FormBuilder Pro" — a form building SaaS tool:
  Write complete response sequences for 4 bug reports:

  Bug 1: "My form submissions are not being saved"
  - Initial response (gathering info)
  - Follow-up (investigating, providing workaround)
  - Resolution message (fix deployed)

  Bug 2: "The drag-and-drop editor doesn't work in Safari"
  - Browser-specific troubleshooting
  - Known issue acknowledgment and workaround
  - Timeline for fix communication

  Bug 3: "Conditional logic on my form stopped working after your last update"
  - Post-update bug response
  - Regression acknowledgment
  - Rollback or hotfix communication

  Bug 4: "I'm getting a '403 Forbidden' error when I try to access my forms"
  - Technical troubleshooting steps
  - Permission/access investigation
  - Resolution or escalation

  For each bug, also write:
  - The internal engineering escalation note
  - The format: Summary, Steps to Reproduce, Expected vs. Actual,
    Impact, Priority, Customer Details

  Part 3: Bug reporting best practices
  1. Building a customer-friendly bug report template
  2. Setting realistic timelines for fixes
  3. When to offer compensation for bugs
  4. Post-incident follow-up and trust rebuilding

assertions:
  - type: llm_judge
    criteria: "Response sequences cover the full lifecycle — from initial report through investigation to resolution, with appropriate communication at each stage"
    weight: 0.30
    description: "Full lifecycle response sequences"
  - type: llm_judge
    criteria: "Internal engineering escalation notes are well-structured — they contain all information engineering needs to reproduce and fix the issue"
    weight: 0.25
    description: "Well-structured escalation notes"
  - type: llm_judge
    criteria: "Customer communication maintains confidence — updates keep the customer informed without overpromising or using too much technical jargon"
    weight: 0.25
    description: "Confidence-maintaining communication"
  - type: llm_judge
    criteria: "Workarounds are practical — temporary solutions actually help the customer continue their work while the fix is being developed"
    weight: 0.20
    description: "Practical workaround solutions"
