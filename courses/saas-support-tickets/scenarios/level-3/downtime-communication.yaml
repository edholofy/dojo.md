meta:
  id: downtime-communication
  level: 3
  course: saas-support-tickets
  type: output
  description: "Communicate during outages and incidents — write status page updates, incident notifications, and post-mortems that maintain customer trust"
  tags: [support, downtime, incidents, status-page, post-mortem, advanced]

state: {}

trigger: |
  How you communicate during downtime defines your brand's
  reliability reputation more than the downtime itself. Customers
  forgive outages — they don't forgive silence, dishonesty, or
  poor communication during a crisis.

  Part 1: Incident communication principles
  1. The 3 rules of incident communication:
     - Be fast (acknowledge within minutes, not hours)
     - Be honest (say what you know and what you don't)
     - Be consistent (regular updates even when nothing has changed)
  2. Communication channels during incidents:
     - Status page (primary source of truth)
     - In-app banner (for active users)
     - Email notification (for affected customers)
     - Social media (public acknowledgment)
     - Direct outreach (enterprise/high-value customers)
  3. Status page best practices:
     - Component-based status (not just "all systems operational")
     - Severity levels (degraded, partial outage, major outage)
     - Historical uptime display
     - Subscribe for updates functionality
     - Honest, jargon-free language

  Part 2: Write incident communications
  For "PayFlow" — a payment processing SaaS handling $2M+ daily:

  Incident timeline: Payment processing API failure
  - 2:15 PM: Monitoring detects increased error rates
  - 2:18 PM: Error rate exceeds 50%, payment failures begin
  - 2:25 PM: Engineering confirms root cause (database failover issue)
  - 2:40 PM: Partial fix deployed, error rate drops to 15%
  - 3:00 PM: Full resolution confirmed
  - 3:30 PM: Backlog of queued payments processed
  - Impact: 342 failed payment attempts over 45 minutes

  Write the complete communication sequence:

  1. Initial status page update (2:20 PM):
     - Acknowledge the issue
     - State what's affected
     - Set expectations

  2. Status page update with details (2:30 PM):
     - Root cause identified
     - Estimated resolution
     - Workaround if available

  3. Partial resolution update (2:45 PM):
     - What's improved
     - What's still affected
     - Updated timeline

  4. Resolution update (3:05 PM):
     - Confirmed resolution
     - What about failed transactions
     - Next steps

  5. Email to affected merchants (3:30 PM):
     - Personalized impact summary
     - What happened to their specific failed transactions
     - Credit/compensation if applicable
     - Prevention commitment

  6. Enterprise customer direct call script (for top 10 accounts):
     - Talking points for account managers
     - Technical details to share
     - Business impact acknowledgment
     - Relationship maintenance

  7. Post-incident report (published 48 hours later):
     - Timeline
     - Root cause analysis
     - Customer impact quantification
     - Remediation steps taken
     - Prevention measures implemented

  Part 3: Incident preparedness
  1. Pre-written incident templates
  2. Communication escalation matrix (who writes what, when)
  3. Training for incident communication
  4. Learning from past incidents to improve future communication

assertions:
  - type: llm_judge
    criteria: "The communication sequence follows a logical timeline — each update builds on the previous one with increasing detail and resolution progress"
    weight: 0.30
    description: "Logical communication timeline"
  - type: llm_judge
    criteria: "Status page updates are honest and informative — they state what's known and unknown without corporate hedging or vague language"
    weight: 0.25
    description: "Honest informative updates"
  - type: llm_judge
    criteria: "The merchant email personalizes impact — it addresses what happened to THEIR transactions specifically, not just a generic 'we had an outage'"
    weight: 0.25
    description: "Personalized impact communication"
  - type: llm_judge
    criteria: "The post-incident report is thorough and action-oriented — it includes genuine root cause analysis and specific prevention measures, not just a timeline"
    weight: 0.20
    description: "Thorough actionable post-incident"
