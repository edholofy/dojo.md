meta:
  id: churn-prevention
  level: 3
  course: saas-support-tickets
  type: output
  description: "Prevent customer churn through support — identify at-risk customers, handle cancellation saves, and turn negative experiences into retention opportunities"
  tags: [support, churn-prevention, retention, cancellation, save, advanced]

state: {}

trigger: |
  Every cancellation request is both a potential save and a learning
  opportunity. Effective churn prevention requires understanding why
  customers leave, having genuine solutions to offer, and knowing
  when to save vs. when to let go gracefully.

  Part 1: Churn prevention through support
  1. Why SaaS customers churn:
     - Product doesn't solve their problem (value gap)
     - Too difficult to use (adoption failure)
     - Better alternative found (competitive loss)
     - Budget cuts (economic factors)
     - Champion left the organization (loss of advocate)
     - Poor support experience (relationship failure)
     - Outgrew the product (success churn)
  2. Churn warning signals in support tickets:
     - Increasing ticket frequency with declining satisfaction
     - Data export requests
     - Competitor mentions
     - Cancellation policy inquiries
     - Reduced engagement between tickets
     - Multi-department complaints (not just one user)
  3. The save conversation framework:
     - Listen first (understand the real reason)
     - Validate (their frustration is legitimate)
     - Explore (is there a solution within your product?)
     - Offer (concrete value — not just discounts)
     - Accept (if they truly need to leave, make it easy)

  Part 2: Handle churn prevention scenarios
  For "MarketingHub" — a marketing automation SaaS
  (Starter $29/mo, Growth $99/mo, Pro $249/mo):

  1. Price-driven cancellation:
     "We love the product but our budget got cut. We need to cancel
     our Pro plan. Is there any way to keep some functionality
     at a lower price?"
     Customer: Pro plan, 14 months, $249/mo, team of 8
     - Write the save conversation
     - Explore options: downgrade, annual discount, feature freeze,
       pause instead of cancel

  2. Competitor switch:
     "We're moving to Mailchimp. Their automation builder is much
     easier to use and they include SMS for the same price."
     Customer: Growth plan, 6 months, $99/mo
     - Handle the competitive comparison gracefully
     - Highlight unique value without disparaging competitor
     - Offer to address their specific pain points

  3. Product frustration:
     "I've spent 3 months trying to get your email automation to
     work properly and I'm done. The workflows keep breaking and
     your documentation is terrible. Cancel my account."
     Customer: Growth plan, 3 months, $99/mo
     - Acknowledge the legitimate frustration
     - Offer concrete help (dedicated support session, screen share)
     - Differentiate between product issue and adoption issue

  4. Champion departed:
     "Hi, I'm new to this role. The previous marketing manager set
     up MarketingHub but nobody on the team really knows how to use
     it. We're considering canceling and starting fresh with
     something simpler."
     Customer: Pro plan, 22 months, $249/mo, team of 12
     - Treat this as a re-onboarding opportunity
     - Offer training, documentation, and dedicated support
     - Highlight the investment already made (data, campaigns, history)

  5. Graceful goodbye:
     "We're shutting down the business. Please cancel our account
     and help me export all our data."
     Customer: Growth plan, 36 months, $99/mo
     - Handle with empathy and professionalism
     - Make the exit smooth (data export, account closure)
     - Leave the door open (they may start something new)

  Part 3: Churn analytics and prevention programs
  1. Building a cancellation flow that gathers useful data
  2. Win-back campaigns (re-engaging churned customers)
  3. Proactive retention outreach based on health scores
  4. Measuring save rate and its impact on net revenue retention

assertions:
  - type: llm_judge
    criteria: "Save responses offer genuine value — each suggestion addresses the specific reason for leaving rather than offering generic discounts"
    weight: 0.30
    description: "Genuine value-based saves"
  - type: llm_judge
    criteria: "The competitor switch response is professional — it acknowledges the competitor's strengths without being defensive or disparaging"
    weight: 0.25
    description: "Professional competitive response"
  - type: llm_judge
    criteria: "The graceful goodbye is handled with dignity — the business closure scenario gets empathy and smooth exit support without a save attempt"
    weight: 0.25
    description: "Dignified graceful exit"
  - type: llm_judge
    criteria: "Churn analytics guidance is actionable — cancellation flow design and win-back campaigns include specific implementation steps"
    weight: 0.20
    description: "Actionable churn analytics"
