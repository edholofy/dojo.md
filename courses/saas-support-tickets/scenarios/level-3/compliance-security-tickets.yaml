meta:
  id: compliance-security-tickets
  level: 3
  course: saas-support-tickets
  type: output
  description: "Handle compliance and security-related tickets — respond to GDPR requests, SOC 2 inquiries, data breach notifications, and security questionnaires"
  tags: [support, compliance, security, gdpr, soc2, privacy, advanced]

state: {}

trigger: |
  Compliance and security tickets require special handling.
  Incorrect responses can expose the company to legal liability,
  while slow responses can violate regulatory deadlines. Support
  agents need to know when they can answer directly and when
  they must involve legal or security teams.

  Part 1: Common compliance and security ticket types
  1. Data privacy requests:
     - GDPR data subject access requests (30-day deadline)
     - GDPR data deletion requests (right to be forgotten)
     - CCPA consumer rights requests
     - Data portability requests
     - Consent withdrawal
  2. Security inquiries:
     - SOC 2 report requests (from enterprise prospects)
     - Security questionnaire completion
     - Penetration test report requests
     - Vulnerability disclosure handling
     - Data processing agreement (DPA) requests
  3. Incident-related:
     - Potential data breach notification
     - Unauthorized access reports
     - Suspicious activity reports
     - Account compromise claims

  Part 2: Handle compliance and security scenarios
  For "DataVault" — a data storage SaaS (SOC 2 Type II certified):

  1. GDPR data deletion request:
     "Under GDPR Article 17, I request the complete deletion of
     all my personal data from your systems. I am an EU citizen
     and I want confirmation within 30 days that all my data has
     been permanently erased."
     - Write the acknowledgment response (what can you say immediately?)
     - Outline the internal process (what needs to happen)
     - Write the completion confirmation
     - Handle the edge case: what about data in backups?

  2. SOC 2 report request from prospect:
     "We're evaluating DataVault for our financial services company.
     Before we can proceed, we need your latest SOC 2 Type II report,
     your data processing agreement, and responses to our 200-question
     security questionnaire."
     - Write the initial response (what can you share immediately?)
     - Explain NDA requirements for SOC 2 report sharing
     - Set expectations for security questionnaire timeline
     - Coordinate with sales and security teams

  3. Potential data breach report:
     "I just noticed that when I share a link to my vault, the URL
     contains what looks like another customer's account ID. I can
     see files that don't belong to me. This seems like a serious
     security issue."
     - Write the immediate customer response
     - Internal security incident escalation
     - Severity assessment documentation
     - Follow-up communication plan

  4. Employee termination data request:
     "We fired an employee yesterday. We need their DataVault
     account deactivated immediately and all their data transferred
     to their manager. Also, we need an audit log of everything
     they accessed in the last 30 days."
     - Handle the urgency and security sensitivity
     - Identity verification (is the requester authorized?)
     - Account deactivation process
     - Data transfer and audit log procedures

  5. Security questionnaire handling:
     A Fortune 500 prospect sends a 150-question security
     questionnaire covering encryption, access controls,
     incident response, business continuity, and vendor management.
     - Create a workflow for completing the questionnaire
     - Write responses for 5 representative questions
     - Set up internal coordination (security, engineering, legal)

  Part 3: Compliance support operations
  1. Building a compliance response library
  2. Training support agents on regulatory basics
  3. Compliance ticket SLAs and tracking
  4. Working with legal counsel on support responses

assertions:
  - type: llm_judge
    criteria: "GDPR responses are legally accurate — they acknowledge the specific right, confirm the timeline, and address edge cases like backup data retention"
    weight: 0.30
    description: "Legally accurate GDPR handling"
  - type: llm_judge
    criteria: "The security incident response prioritizes containment and investigation — the customer report of seeing another customer's data triggers appropriate urgency"
    weight: 0.25
    description: "Appropriate security incident response"
  - type: llm_judge
    criteria: "Identity verification is rigorous for sensitive requests — employee termination and data access requests require proper authorization verification"
    weight: 0.25
    description: "Rigorous identity verification"
  - type: llm_judge
    criteria: "Compliance operations guidance is practical — it addresses how to build repeatable processes for common compliance requests"
    weight: 0.20
    description: "Practical compliance operations"
