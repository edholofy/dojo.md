meta:
  id: support-metrics-analytics
  level: 3
  course: saas-support-tickets
  type: output
  description: "Master support metrics and analytics — track KPIs, build dashboards, analyze trends, and use data to drive support team improvement"
  tags: [support, metrics, analytics, kpis, dashboards, advanced]

state: {}

trigger: |
  Data-driven support teams outperform intuition-driven teams.
  Understanding which metrics matter, how to track them, and how
  to translate data into action is essential for support leaders
  and senior agents.

  Part 1: Core support metrics
  1. Speed metrics:
     - First Response Time (FRT): time to first human reply
     - Average Handle Time (AHT): total time per ticket
     - Mean Time to Resolution (MTTR): time to full resolution
     - Queue wait time: time before ticket is assigned
  2. Quality metrics:
     - Customer Satisfaction (CSAT): post-ticket survey score
     - Customer Effort Score (CES): how easy was it to resolve
     - Net Promoter Score (NPS): likelihood to recommend
     - Quality Assurance (QA) score: internal review score
     - First Contact Resolution (FCR): resolved without follow-up
  3. Volume metrics:
     - Ticket volume (total, by channel, by category)
     - Tickets per agent
     - Backlog size and age
     - Self-service deflection rate
  4. Business impact metrics:
     - Support cost per ticket
     - Revenue saved (churn prevented)
     - Expansion influenced by support
     - Support-driven product improvements

  Part 2: Build a support analytics program
  For "TaskMaster" — a task management SaaS with 50,000 users
  and a 12-person support team:

  1. Design a support dashboard:
     Create a weekly dashboard layout showing:
     - Executive summary (3-5 key numbers)
     - Trend charts (volume, CSAT, FRT, FCR over 12 weeks)
     - Agent performance leaderboard
     - Top ticket categories with week-over-week change
     - SLA compliance percentages
     - Customer health signals from support data

  2. Analyze this month's data and write the insights report:
     - Total tickets: 2,847 (up 23% from last month)
     - CSAT: 4.1/5.0 (down from 4.3)
     - FRT: 3.2 hours (up from 2.1 hours)
     - FCR: 68% (down from 74%)
     - Top categories: Login issues (31%), Billing (22%),
       Integration bugs (18%), Feature questions (15%), Other (14%)
     - Login issues up 150% after last week's auth update
     - 2 agents on PTO, 1 new agent in training
     - Enterprise CSAT: 4.6/5.0 (up), SMB CSAT: 3.8/5.0 (down)

     Write the complete monthly report with:
     - What happened (facts)
     - Why it happened (root cause analysis)
     - What to do about it (action items)
     - Resource recommendations

  3. Create an agent performance review template:
     - Quantitative metrics (tickets handled, CSAT, FRT, FCR)
     - Qualitative assessment (communication quality, teamwork)
     - Growth areas and development plan
     - Goal setting for next period

  Part 3: Advanced analytics
  1. Predictive analytics (forecasting ticket volume and staffing needs)
  2. Cohort analysis (support patterns by customer segment)
  3. Correlation analysis (which metrics predict churn?)
  4. A/B testing support approaches (measuring impact of changes)

assertions:
  - type: llm_judge
    criteria: "The dashboard design includes the right metrics with logical organization — executive summary, trends, performance, and actionable insights are all represented"
    weight: 0.30
    description: "Comprehensive logical dashboard"
  - type: llm_judge
    criteria: "The monthly report connects data to root causes — the 23% volume increase is correctly linked to the auth update and staffing gaps, with specific action items"
    weight: 0.25
    description: "Root-cause-connected analysis"
  - type: llm_judge
    criteria: "The agent performance template balances quantitative and qualitative — it doesn't reduce agents to numbers but also doesn't rely purely on subjective assessment"
    weight: 0.25
    description: "Balanced performance assessment"
  - type: llm_judge
    criteria: "Advanced analytics section provides practical guidance — predictive modeling and cohort analysis are explained in ways a support leader could actually implement"
    weight: 0.20
    description: "Practical advanced analytics"
