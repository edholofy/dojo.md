meta:
  id: enterprise-account-support
  level: 3
  course: saas-support-tickets
  type: output
  description: "Support enterprise accounts — manage high-value customers with dedicated support, custom SLAs, executive communication, and complex organizational needs"
  tags: [support, enterprise, high-value, dedicated-support, executive, advanced]

state: {}

trigger: |
  Enterprise customers are fundamentally different from self-serve
  customers. They have complex organizational structures, custom
  contracts, dedicated success managers, higher expectations, and
  significantly higher revenue impact. Enterprise support requires
  a different skillset and approach.

  Part 1: Enterprise support differences
  1. Organizational complexity:
     - Multiple stakeholders (admin, end users, executives, IT, procurement)
     - Custom configurations and integrations
     - Dedicated environments or instances
     - Compliance and security requirements
     - Change management processes (can't just "update and try again")
  2. Relationship management:
     - Named account team (CSM, TAM, support engineer)
     - Quarterly business reviews (QBRs)
     - Executive sponsor relationships
     - Vendor management processes
  3. Communication standards:
     - More formal, document everything
     - SLA tracking with contractual obligations
     - Incident reports and root cause analysis
     - Regular status updates (even when there's nothing new)

  Part 2: Handle enterprise support scenarios
  For "SecureVault" — an enterprise security SaaS ($5K-$50K/mo):

  1. Multi-stakeholder incident:
     SecureVault is experiencing intermittent authentication failures
     for GlobalCorp ($25K/mo, 2,000 users). The CISO is emailing
     your VP, the IT admin is filing tickets, and end users are
     calling the help desk.
     - Write responses for each stakeholder level
     - Create a coordinated communication plan
     - Draft the executive incident summary

  2. Custom integration failure:
     MegaBank ($50K/mo) has a custom SAML integration that broke
     after your latest release. Their security policy requires all
     authentication to go through their identity provider.
     - Write the initial response acknowledging the severity
     - Create the technical escalation document
     - Draft status updates at 2-hour intervals
     - Write the post-resolution executive summary

  3. Contract SLA breach:
     TechCorp ($15K/mo) experienced a P1 outage. Your contractual
     SLA guarantees 99.99% uptime and 15-minute P1 response time.
     The outage lasted 3 hours, and first response took 22 minutes.
     - Calculate the SLA breach impact
     - Write the breach notification and remediation plan
     - Propose service credits per contract terms
     - Draft the relationship recovery communication

  4. Enterprise onboarding escalation:
     HealthCo ($30K/mo, just signed) is 6 weeks into a 12-week
     onboarding. They're behind schedule because their IT team
     keeps requesting additional security reviews. The champion
     who signed the deal is getting pressure from leadership.
     - Write the status update to the customer champion
     - Create an accelerated onboarding plan
     - Draft internal escalation for additional implementation resources

  Part 3: Enterprise support operations
  1. Building an enterprise support playbook
  2. Managing enterprise escalation chains
  3. Enterprise post-incident review processes
  4. Measuring enterprise support success (beyond CSAT)

assertions:
  - type: llm_judge
    criteria: "Multi-stakeholder communications are appropriate per audience — executive summaries are high-level, IT admin responses are technical, end user guidance is simple"
    weight: 0.30
    description: "Audience-appropriate communication"
  - type: llm_judge
    criteria: "SLA breach handling is professional and proactive — it acknowledges the miss, calculates credits, and includes a genuine remediation plan"
    weight: 0.25
    description: "Professional SLA breach handling"
  - type: llm_judge
    criteria: "Enterprise communications reflect the revenue and relationship stakes — the tone and urgency match accounts worth $15K-$50K/month"
    weight: 0.25
    description: "Stakes-appropriate urgency"
  - type: llm_judge
    criteria: "Post-incident communications include root cause and prevention — they go beyond 'it's fixed' to explain what happened and what will change"
    weight: 0.20
    description: "Root cause and prevention"
