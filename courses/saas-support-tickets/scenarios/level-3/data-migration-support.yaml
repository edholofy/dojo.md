meta:
  id: data-migration-support
  level: 3
  course: saas-support-tickets
  type: output
  description: "Support customers through data migrations — guide imports from competitors, handle migration failures, and ensure data integrity during transitions"
  tags: [support, data-migration, import, export, transition, advanced]

state: {}

trigger: |
  Data migration is a high-stakes support scenario. Customers
  switching to your product bring existing data, and any loss
  or corruption during migration can destroy trust before the
  relationship even begins. Migration support requires technical
  skill, patience, and meticulous attention to data integrity.

  Part 1: Data migration fundamentals
  1. Migration types:
     - Self-service import (CSV, API, file upload)
     - Assisted migration (support guides the customer)
     - White-glove migration (your team handles everything)
     - Competitive migration (importing from specific competitors)
  2. Common migration challenges:
     - Data format incompatibilities
     - Field mapping mismatches
     - Character encoding issues
     - Duplicate detection and merging
     - Relationship/reference integrity
     - Large dataset handling (timeouts, memory limits)
     - Historical data vs. active data decisions
  3. Migration support principles:
     - Always back up before migrating
     - Migrate in stages (test with small sample first)
     - Validate data after migration
     - Document what was and wasn't migrated
     - Set clear expectations on timeline and completeness

  Part 2: Handle migration support scenarios
  For "CRMFlow" — a CRM SaaS with migration tools:

  1. CSV import failure:
     Customer: "I exported 15,000 contacts from HubSpot as CSV
     but your import tool says 'Invalid format' after processing
     for 10 minutes. I've tried 3 times."
     - Diagnose common CSV issues (encoding, delimiters, headers)
     - Write step-by-step troubleshooting response
     - Offer to review their CSV file if customer consents

  2. Partial migration — missing data:
     Customer: "Migration from Salesforce completed but I'm missing
     all custom fields, notes, and file attachments. Only basic
     contact info came through. We have 5 years of notes!"
     - Explain what the standard migration covers vs. custom data
     - Provide options for recovering the missing data
     - Set expectations on what's possible vs. what requires
       custom migration support

  3. Duplicate records after migration:
     Customer: "After importing from Pipedrive, I have thousands
     of duplicate contacts. Some contacts appear 3 or 4 times
     with slightly different information in each copy."
     - Explain why duplicates occurred
     - Provide deduplication strategies and tools
     - Write response with step-by-step cleanup guide

  4. Migration rollback request:
     Customer: "The migration messed up our existing data. Our
     team has been entering new data for 2 days since the import.
     We need to undo the migration but keep the new entries."
     - Handle the urgency and data integrity concern
     - Explain rollback options and limitations
     - Create a remediation plan that preserves new work

  5. Competitive migration — complex scenario:
     Customer switching from Monday.com. They have: 50 boards,
     200 automations, 15 integrations, 3 years of activity history,
     and 80 team members.
     - Assess migration complexity and scope
     - Create a phased migration plan
     - Set expectations on what migrates perfectly vs. what needs
       manual recreation
     - Write the migration kickoff response

  Part 3: Migration excellence
  1. Building migration runbooks per competitor
  2. Creating migration health checks and validation reports
  3. Post-migration support (first 30 days)
  4. Using migration data to improve the import tool

assertions:
  - type: llm_judge
    criteria: "Migration troubleshooting is technically sound — CSV format issues, encoding problems, and field mapping are addressed with specific, actionable steps"
    weight: 0.30
    description: "Technically sound migration help"
  - type: llm_judge
    criteria: "Expectations are set honestly — responses clearly state what can and can't be migrated rather than overpromising"
    weight: 0.25
    description: "Honest migration expectations"
  - type: llm_judge
    criteria: "The rollback scenario handles data integrity carefully — the plan preserves new work while addressing corrupted imported data"
    weight: 0.25
    description: "Careful data integrity handling"
  - type: llm_judge
    criteria: "The complex competitive migration includes a realistic phased plan — it acknowledges that not everything migrates cleanly"
    weight: 0.20
    description: "Realistic phased migration plan"
