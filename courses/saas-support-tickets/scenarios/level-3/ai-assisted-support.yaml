meta:
  id: ai-assisted-support
  level: 3
  course: saas-support-tickets
  type: output
  description: "Leverage AI in support workflows — use chatbots, auto-categorization, suggested responses, and sentiment analysis to augment human agents"
  tags: [support, ai, automation, chatbots, machine-learning, advanced]

state: {}

trigger: |
  AI is transforming SaaS support — not replacing agents but
  augmenting them. Smart AI integration handles routine queries,
  surfaces relevant context, and lets human agents focus on
  complex, high-value interactions.

  Part 1: AI in support — current landscape
  1. AI-powered capabilities:
     - Chatbot first response (deflect 30-60% of routine queries)
     - Auto-categorization and priority assignment
     - Suggested responses for agents
     - Sentiment analysis and escalation triggers
     - Knowledge base article suggestions
     - Predictive customer health scoring
     - Automated ticket summarization
  2. Where AI excels vs. where humans are needed:
     - AI: password resets, status checks, FAQ answers, routing
     - Human: emotional situations, complex troubleshooting,
       relationship management, creative problem-solving
     - Hybrid: AI drafts response, human reviews and personalizes
  3. AI implementation risks:
     - Hallucination (confidently wrong answers)
     - Tone-deaf responses to emotional situations
     - Over-automation (customers feel unheard)
     - Data privacy concerns
     - Bias in routing and prioritization

  Part 2: Design AI-assisted support workflows
  For "HelpStream" — a help desk SaaS implementing AI features:

  1. Design a chatbot conversation flow:
     Create the chatbot decision tree for the 5 most common
     ticket types:
     - Password reset (fully automated)
     - Billing inquiry (partially automated, handoff for complex)
     - Bug report (gather info, always handoff to human)
     - Feature request (capture and acknowledge, no handoff needed)
     - Account cancellation (capture reason, always handoff to human)
     Include: greeting, information gathering, resolution or
     handoff, and fallback for unrecognized queries.

  2. Write 5 AI-suggested responses that agents should modify:
     For each, provide:
     - The AI draft (what the system generates)
     - The human-edited version (what the agent should send)
     - Annotation explaining what was changed and why

  3. Design sentiment-based routing rules:
     - Define sentiment categories (positive, neutral, frustrated,
       angry, urgent)
     - Map each to routing actions (auto-respond, standard queue,
       priority queue, escalation, immediate)
     - Handle edge cases (sarcasm, mixed signals, cultural differences)

  4. Create an AI performance scorecard:
     - Metrics for chatbot effectiveness
     - Deflection rate vs. customer satisfaction
     - False positive/negative rates for categorization
     - Agent adoption and trust metrics

  Part 3: Responsible AI in support
  1. Transparency (should customers know they're talking to AI?)
  2. AI training data quality and bias
  3. Human oversight requirements
  4. Measuring AI impact on support quality and customer satisfaction

assertions:
  - type: llm_judge
    criteria: "The chatbot flow handles all 5 ticket types appropriately — fully automates where possible, hands off to humans where necessary, and gathers useful context in both cases"
    weight: 0.30
    description: "Appropriate chatbot automation"
  - type: llm_judge
    criteria: "AI-to-human response comparisons are instructive — they clearly show what AI gets wrong (tone, context, personalization) and how humans improve it"
    weight: 0.25
    description: "Instructive AI-human comparison"
  - type: llm_judge
    criteria: "Sentiment routing handles nuance — sarcasm, mixed emotions, and cultural differences are addressed, not just basic positive/negative classification"
    weight: 0.25
    description: "Nuanced sentiment routing"
  - type: llm_judge
    criteria: "Responsible AI section addresses real ethical concerns — transparency about AI use, bias prevention, and human oversight are treated substantively"
    weight: 0.20
    description: "Substantive AI ethics"
