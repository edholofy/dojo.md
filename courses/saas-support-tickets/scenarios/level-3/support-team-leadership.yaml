meta:
  id: support-team-leadership
  level: 3
  course: saas-support-tickets
  type: output
  description: "Lead a SaaS support team — hire, train, coach, and develop support agents while managing team performance and morale"
  tags: [support, leadership, team-management, hiring, coaching, advanced]

state: {}

trigger: |
  Leading a support team requires balancing metrics with humanity.
  You're responsible for customer experience AND agent wellbeing,
  process efficiency AND individual growth. Great support leaders
  build teams that are both high-performing and sustainable.

  Part 1: Support team leadership fundamentals
  1. Hiring support agents:
     - Key traits to look for (empathy, problem-solving, communication)
     - Interview techniques (scenario-based, writing samples)
     - Technical skills vs. soft skills balance
     - Diversity in hiring (different perspectives improve support)
  2. Training and development:
     - Onboarding program (product knowledge, tools, processes)
     - Shadowing and mentoring programs
     - Continuous learning (product updates, industry trends)
     - Career path development (support → success → product → engineering)
  3. Performance management:
     - Setting fair, achievable targets
     - Regular 1:1 coaching sessions
     - Addressing underperformance constructively
     - Recognizing and rewarding excellence
  4. Team wellbeing:
     - Preventing burnout (workload management)
     - Creating psychological safety
     - Managing difficult ticket emotional impact
     - Building team culture and cohesion

  Part 2: Handle team leadership scenarios
  For a support team at "BuildRight" — a construction management SaaS:
  Your team: 8 agents (2 senior, 4 mid-level, 2 junior), handling
  ~150 tickets/day across email, chat, and phone.

  1. New agent onboarding plan:
     You're hiring a new junior agent starting Monday. Create:
     - Week 1 onboarding schedule (day-by-day plan)
     - First month learning objectives and milestones
     - Shadowing and graduated responsibility plan
     - Knowledge assessment checkpoints
     - 90-day ramp-up expectations

  2. Underperformance coaching:
     Mid-level agent "Alex" — 11 months tenure, previously strong
     performer. Last 6 weeks: CSAT dropped from 4.5 to 3.2, FRT
     increased 40%, and two customer complaints about short/dismissive
     responses.
     - Write the 1:1 coaching conversation outline
     - Create a performance improvement plan
     - Balance accountability with empathy (something may be wrong)
     - Set measurable goals with timeline

  3. Team restructuring for growth:
     Volume is increasing 15% month-over-month. Current team is
     at capacity. You need to propose a team structure for scaling
     from 8 to 15 agents over 6 months.
     - Design the expanded team structure
     - Define roles and specializations
     - Create a hiring timeline
     - Propose training plan for new hires while maintaining service

  4. Team morale crisis:
     After a rough month (major outage, 2 agents quit, remaining
     team is exhausted and demoralized):
     - Write the team meeting agenda
     - Create a short-term recovery plan (next 2 weeks)
     - Design a medium-term morale improvement program
     - Address workload concerns realistically

  Part 3: Building support culture
  1. Creating team rituals (wins celebrations, learning shares)
  2. Cross-functional collaboration (support + product + engineering)
  3. Support career development and growth paths
  4. Leading through organizational change

assertions:
  - type: llm_judge
    criteria: "The onboarding plan is structured and comprehensive — it progresses logically from observation to supervised work to independent work with clear milestones"
    weight: 0.30
    description: "Structured comprehensive onboarding"
  - type: llm_judge
    criteria: "The underperformance coaching approach is empathetic — it investigates potential causes before jumping to correction and treats Alex as a person, not just a metric"
    weight: 0.25
    description: "Empathetic coaching approach"
  - type: llm_judge
    criteria: "Team scaling plan is realistic — it accounts for the reality that hiring and training take time and service quality may temporarily dip during growth"
    weight: 0.25
    description: "Realistic scaling plan"
  - type: llm_judge
    criteria: "The morale crisis response balances acknowledgment with action — it validates the team's exhaustion while providing concrete steps to improve the situation"
    weight: 0.20
    description: "Balanced morale response"
