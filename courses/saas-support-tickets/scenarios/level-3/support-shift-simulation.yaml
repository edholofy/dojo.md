meta:
  id: support-shift-simulation
  level: 3
  course: saas-support-tickets
  type: output
  description: "Navigate a complex support shift — manage a realistic ticket queue with competing priorities, interruptions, escalations, and team coordination"
  tags: [support, simulation, shift, queue-management, prioritization, advanced]

state: {}

trigger: |
  A real support shift is never just answering tickets in order.
  It's managing competing priorities, handling interruptions,
  coordinating with teammates, and making judgment calls about
  what needs attention now vs. what can wait.

  Scenario: You're the senior agent on a Tuesday afternoon shift
  at "AppStack" — a developer tools SaaS.
  Your team: You + 2 junior agents (Sam and Jordan).
  Current queue: 12 tickets, 3 active chats.

  Manage this 4-hour shift:

  HOUR 1 (1:00 PM - 2:00 PM):
  Starting queue:
  - Ticket A: Enterprise P1 — CI/CD pipeline broken for 50-person team
    (received 12:45 PM, FRT SLA: 1:00 PM - you're almost breaching!)
  - Ticket B: Pro P3 — "How do I set up environment variables?"
  - Ticket C: Business P2 — "Deploy failed with error code 5012"
  - Chat 1: Free tier user asking about pricing
  - Chat 2: Pro user frustrated about slow builds

  At 1:15 PM: A new P1 ticket arrives — "Production deployment
  rolled back automatically, data inconsistency detected"
  (Enterprise customer, $500/mo, deployment to 10K end users)

  At 1:30 PM: Sam (junior agent) messages you — "I'm stuck on a
  ticket about Kubernetes integration. Customer is getting impatient."

  HOUR 2 (2:00 PM - 3:00 PM):
  - Ticket D: Business P2 — "API rate limiting our automation scripts"
  - Ticket E: Pro P3 — "Feature request: dark mode in the IDE plugin"
  - Chat 3: Business user reporting intermittent 500 errors
  - Jordan (junior agent) solved 3 tickets but one customer
    replied angrily to Jordan's response — you need to review

  At 2:30 PM: Engineering Slack message — "We're rolling out a
  hotfix for error code 5012. Should be resolved in 30 minutes."

  HOUR 3 (3:00 PM - 4:00 PM):
  - 5 new tickets arrive from the same company (different users)
    all reporting the same issue — should be merged
  - A VIP customer's CSM sends you a Slack message asking for
    a status update on their open ticket
  - Sam needs to leave early (family emergency)

  HOUR 4 (4:00 PM - 5:00 PM):
  - Queue has 8 remaining tickets
  - You need to prepare handoff for the evening shift
  - Write end-of-shift report

  For the entire shift:
  1. Prioritize and order your actions for each hour
  2. Write key responses (at least 6 full ticket responses)
  3. Handle team coordination (Sam and Jordan guidance)
  4. Write the end-of-shift handoff report

assertions:
  - type: llm_judge
    criteria: "Priority decisions are sound throughout the shift — the almost-breaching P1 is addressed immediately, the new P1 gets urgent attention, and lower priority items are appropriately sequenced"
    weight: 0.30
    description: "Sound priority decisions"
  - type: llm_judge
    criteria: "Team coordination is effective — guidance to Sam and Jordan is helpful and timely, and Sam's early departure is handled with workload redistribution"
    weight: 0.25
    description: "Effective team coordination"
  - type: llm_judge
    criteria: "The end-of-shift handoff is comprehensive — the evening shift can pick up without confusion about ticket status, priorities, and ongoing issues"
    weight: 0.25
    description: "Comprehensive shift handoff"
  - type: llm_judge
    criteria: "Responses adapt to real-time information — the engineering hotfix update changes how error 5012 tickets are handled, and duplicate tickets are properly merged"
    weight: 0.20
    description: "Adaptive real-time response"
