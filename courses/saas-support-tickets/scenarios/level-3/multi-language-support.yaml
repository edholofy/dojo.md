meta:
  id: multi-language-support
  level: 3
  course: saas-support-tickets
  type: output
  description: "Deliver support across languages and cultures — handle localization, translation tools, cultural sensitivity, and global support team coordination"
  tags: [support, multi-language, localization, global, cultural-sensitivity, advanced]

state: {}

trigger: |
  Global SaaS products serve customers in many languages and
  cultures. Multi-language support goes beyond translation —
  it requires cultural awareness, localized communication
  styles, and operational coordination across time zones
  and languages.

  Part 1: Multi-language support fundamentals
  1. Language support strategies:
     - Native-speaker agents (best quality, highest cost)
     - AI translation with human review (good quality, scalable)
     - Machine translation only (fast, inconsistent quality)
     - English-only with translation disclaimer
     - Tiered: native for top markets, translation for others
  2. Cultural communication differences:
     - Directness vs. indirectness (US vs. Japan)
     - Formality levels (Germany vs. Australia)
     - Humor in support (UK welcome, Korea less so)
     - Apology culture (Japanese frequent, American moderate)
     - Time perception (urgent means different things)
  3. Operational challenges:
     - Time zone coverage (follow-the-sun model)
     - Knowledge base in multiple languages
     - Quality assurance across languages
     - Consistent brand voice in every language

  Part 2: Handle multi-language support scenarios
  For "GlobalSync" — a file sync SaaS expanding internationally:

  1. Translation quality control:
     A Japanese customer complains that your chatbot response
     in Japanese was grammatically awkward and used informal
     language (considered rude in business context). Write:
     - Apology response in appropriate Japanese business style
       (provide English version with cultural notes)
     - Internal process for improving translation quality
     - Quality review checklist for translated responses

  2. Follow-the-sun handoff:
     A Brazilian customer's P2 ticket (sync failure affecting
     50 users) was opened during São Paulo business hours.
     It's now being handed off to the Singapore team as São Paulo
     agents end their shift.
     - Write the handoff documentation
     - Write the customer update (explaining the handoff)
     - Ensure no information is lost in the transition

  3. Knowledge base localization:
     Your most popular help article ("Setting Up Two-Factor
     Authentication") needs to be localized for French, German,
     Spanish, and Japanese markets.
     - Write localization guidelines (not just translation)
     - Identify cultural adaptations needed per market
     - Create a localization review process
     - Write the French version of the article title and introduction
       with cultural notes

  4. Cross-cultural de-escalation:
     A German customer writes a very direct, detailed complaint:
     "The file versioning feature does not work as documented.
     Specifically, reverting to version 3 of 7 versions loses
     all metadata. This is a product deficiency that must be
     addressed. Please provide a timeline for resolution."
     - Explain why this isn't angry (German directness vs. American
       perception of directness as rudeness)
     - Write a culturally appropriate German-style response (direct,
       factual, specific timeline)
     - Compare with how you'd respond to the same content from
       a US customer

  Part 3: Building global support operations
  1. Hiring multilingual support teams
  2. Managing quality consistency across languages
  3. Localization budgeting and prioritization
  4. Measuring satisfaction across cultural segments

assertions:
  - type: llm_judge
    criteria: "Cultural communication differences are demonstrated — the German directness example and Japanese formality requirements show genuine cultural understanding"
    weight: 0.30
    description: "Genuine cultural understanding"
  - type: llm_judge
    criteria: "The follow-the-sun handoff is seamless — the customer doesn't lose context or experience delays due to the timezone transition"
    weight: 0.25
    description: "Seamless timezone handoff"
  - type: llm_judge
    criteria: "Localization goes beyond translation — it addresses cultural adaptations, not just language changes"
    weight: 0.25
    description: "Beyond-translation localization"
  - type: llm_judge
    criteria: "Cross-cultural de-escalation correctly identifies the non-angry German communication style — directness is distinguished from anger"
    weight: 0.20
    description: "Correct cultural tone reading"
