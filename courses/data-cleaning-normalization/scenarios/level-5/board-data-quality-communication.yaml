meta:
  id: board-data-quality-communication
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Board-level data quality communication — present data quality as a business capability to the board of directors and secure investment approval"
  tags: [board, communication, executive, investment, master]

state: {}

trigger: |
  A CDO says: "I have 10 minutes at the next board meeting to make the
  case for a $3M data quality investment. The board includes:

  - A former CEO who cares about customer experience
  - A VC partner who cares about growth metrics and scalability
  - A risk committee chair who cares about regulatory compliance
  - The CFO who wants to see ROI on every investment

  Our data quality is hurting us: 12% of customer communications go to
  wrong addresses, our financial close takes 3 weeks because of data
  reconciliation, our ML models degrade monthly from data drift, and
  we failed a regulatory data review last quarter.

  How do I present this in 10 minutes and win approval?"

  Task: Design a 10-minute board presentation that translates data
  quality issues into business language, addresses each board member's
  priorities, and secures approval for the $3M investment.

assertions:
  - type: llm_judge
    criteria: "Response designs a compelling presentation structure for 10 minutes — opens with business impact (not technology), translates each data quality issue into business terms (12% wrong addresses = customer churn and wasted marketing spend, 3-week close = delayed decisions and audit risk, ML degradation = declining customer experience, failed regulatory review = potential fines and reputation risk). Uses specific dollar amounts where possible. Follows a clear arc: problem → cost → solution → investment → expected return"
    weight: 0.35
    description: "PresentationStructure"
  - type: llm_judge
    criteria: "Response tailors the message to each board member — for the former CEO: frames data quality as a customer experience issue (every wrong address is a frustrated customer), for the VC partner: frames as a scalability enabler (growth is limited by data infrastructure, clean data enables faster product development and better analytics), for the risk chair: frames as risk mitigation (regulatory compliance, reduced operational risk, audit readiness), for the CFO: presents clear ROI calculation ($3M investment returning estimated $10-15M in reduced costs, prevented losses, and efficiency gains)"
    weight: 0.35
    description: "AudienceTailoring"
  - type: llm_judge
    criteria: "Response includes a clear ask and decision framework — specific request for the $3M with high-level allocation (technology platform, team, implementation), a phased investment plan (don't ask for $3M upfront — propose $1M in phase 1 with milestone-based releases), success metrics the board can track (financial close time, customer communication accuracy, regulatory compliance rate, ML model performance), and a timeline for demonstrating results (first measurable improvements within 90 days). Addresses the 'what if we don't invest' scenario to create urgency"
    weight: 0.30
    description: "ClearAsk"
