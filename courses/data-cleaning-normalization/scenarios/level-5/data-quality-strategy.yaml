meta:
  id: data-quality-strategy
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Data quality as corporate strategy — position data quality as a strategic business capability and quantify its impact on enterprise value"
  tags: [strategy, corporate, business-value, enterprise, master]

state: {}

trigger: |
  A CEO says: "I've been told we need to 'invest in data quality' but
  nobody has explained why it matters to the business — not the data
  team, the BUSINESS. We're a $2B revenue company preparing for IPO.

  I want to understand: How does data quality affect our revenue? Our
  customer experience? Our risk exposure? Our valuation? And how much
  should we be spending on it?

  Give me a business case, not a technology pitch."

  Task: Build the strategic business case for data quality investment,
  quantifying its impact on revenue, customer experience, risk, and
  enterprise valuation for a pre-IPO company.

assertions:
  - type: llm_judge
    criteria: "Response quantifies revenue impact of data quality — poor data quality causes: incorrect pricing (revenue leakage from mispriced products or services), missed upsell/cross-sell (dirty CRM data means sales misses opportunities), customer churn from poor experience (data errors in billing, shipping, communications), and marketing waste (wrong audiences, duplicate contacts, invalid emails). Provides specific estimates or industry benchmarks (e.g., Gartner estimates poor data quality costs organizations an average of $12.9M annually; IBM estimates the cost of bad data in the US at $3.1 trillion annually)"
    weight: 0.35
    description: "RevenueImpact"
  - type: llm_judge
    criteria: "Response connects data quality to IPO readiness and valuation — financial reporting accuracy (SOX compliance for public companies requires auditable data), analyst confidence (consistent, accurate metrics build analyst trust and premium multiples), risk reduction (clean data reduces operational risk, regulatory risk, and cyber risk from poor data inventory), and M&A readiness (acquirers and investors perform data quality due diligence — dirty data reduces enterprise value). Quantifies the valuation impact: if poor data quality leads to a 1x multiple reduction on $2B revenue, that's $2B in lost enterprise value"
    weight: 0.35
    description: "ValuationImpact"
  - type: llm_judge
    criteria: "Response provides a concrete investment recommendation — how much to spend (industry benchmarks: 15-25% of IT budget on data management, data quality is a subset), what to spend it on (people, process, technology breakdown), expected ROI timeline (quick wins in 3-6 months, transformational impact in 18-24 months), and how to measure success (data quality metrics linked to business KPIs: revenue accuracy, customer satisfaction, regulatory compliance rate). Presents this as an investment with measurable returns, not a cost center"
    weight: 0.30
    description: "InvestmentCase"
