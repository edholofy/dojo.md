meta:
  id: data-quality-crisis-management
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Data quality crisis management — handle major data quality incidents that threaten business operations, regulatory standing, and customer trust"
  tags: [crisis, incident-management, remediation, leadership, master]

state: {}

trigger: |
  A CEO calls an emergency meeting: "We have a data quality crisis.
  Three things happened simultaneously this week:

  1. Our quarterly earnings report was filed with the SEC containing
     a $47M revenue misstatement caused by duplicate transaction
     records in our data warehouse. We need to file an amendment.
     The stock dropped 8% on the news.

  2. A customer class-action lawsuit was filed alleging our credit
     scoring system (which uses our customer data) systematically
     disadvantaged minority applicants. Initial investigation suggests
     training data had significant demographic gaps — entire ZIP codes
     were missing from our data for 3 years due to a migration error.

  3. Our largest enterprise client (15% of revenue) is threatening
     to terminate their contract because we sent them a data feed
     with 40% stale records — their marketing campaigns based on
     our data produced a 2% response rate instead of the expected 15%.

  The board wants a crisis response plan by Monday. The general
  counsel is involved. The CISO is worried about what else might
  be wrong in our data.

  How do we manage this crisis, fix the root causes, and rebuild
  trust with investors, regulators, customers, and clients?"

  Task: Design a comprehensive crisis response plan that addresses
  all three incidents, identifies root causes, implements immediate
  containment, and builds a long-term remediation strategy that
  prevents recurrence.

assertions:
  - type: llm_judge
    criteria: "Response designs an immediate crisis containment strategy — for the SEC misstatement: engage external auditors, prepare the 10-K/A amendment, assess if other filings are affected, prepare investor communications and an 8-K disclosure, coordinate with legal on liability exposure; for the lawsuit: preserve all relevant data and documentation (litigation hold), engage outside counsel specializing in fair lending/AI discrimination, begin immediate independent audit of the credit scoring training data, prepare regulatory notification to relevant authorities; for the enterprise client: assign a senior executive as single point of contact, provide a data quality audit report within 48 hours, offer immediate remediation and service credits, prepare a retention plan. Prioritizes actions by legal/regulatory urgency"
    weight: 0.35
    description: "CrisisContainment"
  - type: llm_judge
    criteria: "Response identifies root causes and systemic failures — explains how duplicate transaction records went undetected through the financial reporting pipeline (missing reconciliation checks, no data quality gates before report generation), how a 3-year data gap went unnoticed (no completeness monitoring, no demographic coverage analysis, no training data validation before model deployment), how 40% stale records accumulated in a client data feed (no freshness monitoring, no SLA tracking, no automated quality checks on outbound data). Identifies the common thread: absence of enterprise data quality governance, monitoring, and accountability. Shows how fixing individual incidents without addressing systemic issues will lead to recurrence"
    weight: 0.35
    description: "RootCauseAnalysis"
  - type: llm_judge
    criteria: "Response provides a long-term remediation and trust-rebuilding strategy — establishes a data quality organization with board-level visibility (Chief Data Officer reporting to CEO with dedicated budget and authority), implements enterprise-wide data quality monitoring and alerting (no data leaves the organization or feeds a model without quality verification), creates an external trust-rebuilding plan (third-party data quality certification, transparent reporting to investors, proactive client quality reporting, regulatory cooperation), and builds a prevention framework (quality gates at every critical junction, regular stress testing of data pipelines, mandatory quality impact assessment for system changes). Addresses the cultural transformation needed to prevent 'data quality is someone else's problem' mindset"
    weight: 0.30
    description: "RemediationStrategy"
