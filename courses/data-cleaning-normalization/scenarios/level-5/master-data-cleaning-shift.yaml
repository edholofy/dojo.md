meta:
  id: master-data-cleaning-shift
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Master data cleaning shift — the ultimate assessment combining enterprise data quality management, regulatory compliance, AI governance, and strategic positioning"
  tags: [shift, combined, assessment, comprehensive, master]

state: {}

trigger: |
  You are the Chief Data Officer of a $3B revenue global bank that just
  announced it will undergo a core banking system migration while
  simultaneously preparing for AI-driven credit scoring (EU AI Act
  high-risk system). The situation:

  Data: 50 million customer records across 20 legacy systems, 15
  countries, 8 currencies. Current data quality: unknown (never
  measured systematically).

  Challenges:
  1. Core migration requires clean customer master data — estimated
     25% of records have quality issues (duplicates, outdated info,
     inconsistencies)
  2. EU AI Act requires training data for credit scoring to be
     representative, unbiased, and documented — current data has
     known demographic imbalances
  3. Regulatory deadline: BCBS 239 compliance for risk data quality
     must be demonstrated within 18 months
  4. 3 recent M&A integrations left customer data fragmented across
     acquired entities
  5. Board pressure to use data as a competitive asset for
     personalization and customer experience

  Deliver the comprehensive data quality strategy covering: migration
  readiness, AI governance, regulatory compliance, M&A integration,
  and competitive positioning.

  Task: Build the complete data quality strategy addressing all five
  challenges simultaneously — the ultimate test of data quality mastery.

assertions:
  - type: llm_judge
    criteria: "Response addresses migration readiness and M&A integration — designs a master data management (MDM) approach that creates a golden customer record from 20 legacy systems and 3 acquired entities, prioritizes entity resolution across 50M records (blocking strategies, matching algorithms, scalability), plans the data quality remediation timeline aligned with the migration schedule, addresses the multi-country complexity (different data protection rules, different naming conventions, different address formats by country), and creates data quality gates that prevent dirty data from being migrated to the new system"
    weight: 0.35
    description: "MigrationAndMA"
  - type: llm_judge
    criteria: "Response addresses AI governance and regulatory compliance — designs the data quality framework for EU AI Act compliance (representative training data assessment, bias detection and mitigation, data provenance documentation, ongoing monitoring), addresses BCBS 239 requirements (accurate, complete, timely risk data aggregation), creates a regulatory compliance roadmap within the 18-month deadline, and shows how AI governance requirements and banking regulations overlap (both require data lineage, quality measurement, and ongoing monitoring — build once, comply twice)"
    weight: 0.35
    description: "AIAndRegulatory"
  - type: llm_judge
    criteria: "Response addresses competitive positioning and strategic integration — how clean data enables the personalization and customer experience agenda the board wants, the investment case for the comprehensive data quality program (budget, team, timeline, expected ROI), how to sequence the five challenges (what must be done first, what can run in parallel, what depends on others), risk management (what happens if the migration is delayed? if AI Act deadlines tighten?), and the board-ready presentation that ties all five challenges into a coherent data quality strategy narrative"
    weight: 0.30
    description: "StrategicPositioning"
