meta:
  id: data-quality-transformation
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Data quality transformation — lead an organization-wide transformation from reactive data cleaning to proactive, embedded data quality culture"
  tags: [transformation, organizational, culture, program, master]

state: {}

trigger: |
  A newly appointed chief data officer says: "Our organization treats
  data quality as a cleanup task — something the data team does after
  everyone else creates the mess. We need a fundamental cultural shift.

  Current state: 200 people across 15 teams produce and consume data.
  Data quality is nobody's job. Analysts spend 40-60% of their time
  cleaning. There are no quality standards, no measurement, and no
  accountability.

  I have 24 months to transform this organization from reactive data
  cleaning to a proactive data quality culture where quality is
  everyone's responsibility.

  Design the transformation program."

  Task: Design a 24-month organizational transformation program that
  shifts data quality from a reactive cleanup task to an embedded
  organizational capability.

assertions:
  - type: llm_judge
    criteria: "Response designs a phased transformation — Phase 1 (months 1-6): Foundation — measure the current state (baseline quality metrics across all critical data assets), establish governance (data quality council, stewardship roles, accountability framework), implement quick wins (automated profiling, basic quality rules on the most critical pipelines), and demonstrate value (show business impact of quality improvements to build executive support). Phase 2 (months 7-12): Build — deploy data quality platform, implement data contracts, establish quality SLAs, train data producers on quality expectations. Phase 3 (months 13-18): Embed — integrate quality into every workflow, automated monitoring and alerting, shift-left quality ownership to producers. Phase 4 (months 19-24): Optimize — continuous improvement, advanced capabilities, culture fully embedded"
    weight: 0.35
    description: "PhasedTransformation"
  - type: llm_judge
    criteria: "Response addresses the cultural transformation — changing the mindset from 'data quality is the data team's job' to 'everyone who creates or modifies data is responsible for its quality,' incentive structures (include data quality in performance reviews for data producers), training programs (teaching non-data teams about quality impact), executive championing (making data quality a visible priority at the leadership level), celebrating quality improvements publicly, and addressing resistance (why would a sales team care about CRM data quality? because it affects their pipeline accuracy and commission calculations)"
    weight: 0.35
    description: "CulturalShift"
  - type: llm_judge
    criteria: "Response includes success metrics and sustainability — measuring transformation progress (analyst time on cleaning drops from 50% to 20%, quality metrics improve by defined targets, data-driven decisions increase), tracking the ROI of the transformation investment, building self-sustaining processes (quality doesn't regress when the transformation team moves on), continuous improvement mechanisms (quality reviews, retrospectives, evolving standards), and the target end-state: data quality is embedded in every data process, measured automatically, and owned by data producers — the data team enables rather than executes"
    weight: 0.30
    description: "Sustainability"
