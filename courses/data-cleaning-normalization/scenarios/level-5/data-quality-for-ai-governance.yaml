meta:
  id: data-quality-for-ai-governance
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Data quality for AI governance — ensure data quality meets the heightened requirements of AI/ML systems including fairness, explainability, and regulatory compliance"
  tags: [AI-governance, fairness, bias, explainability, regulation, master]

state: {}

trigger: |
  A chief AI officer says: "We're deploying AI across 12 business
  processes including credit scoring, claims processing, and customer
  service routing. The EU AI Act classifies several of these as
  high-risk AI systems requiring strict data quality standards.

  Specifically, the regulation requires:
  1. Training data must be relevant, representative, and free from
     errors to the extent possible
  2. Data must be examined for biases that could lead to discrimination
  3. Data provenance must be documented
  4. Ongoing monitoring of data quality feeding AI systems

  Our current data quality is adequate for business reporting but
  nowhere near the standard required for high-risk AI. What data
  quality framework do we need for AI governance?"

  Task: Design a data quality framework specifically for AI/ML systems
  that addresses the EU AI Act requirements, bias detection, data
  provenance, and ongoing monitoring.

assertions:
  - type: llm_judge
    criteria: "Response addresses AI-specific data quality requirements beyond standard quality — representativeness (training data must reflect the population the model will serve — not just completeness but proportional representation across demographics, geographies, and use cases), relevance (features used for training must be relevant to the prediction task — no proxy discrimination), error analysis (understanding how data errors affect model outcomes — not just error rates but error patterns and their impact on specific populations), and sufficiency (enough data for each subgroup to produce reliable predictions)"
    weight: 0.35
    description: "AISpecificQuality"
  - type: llm_judge
    criteria: "Response designs bias detection and mitigation in data — measuring demographic representation in training data vs the target population, detecting proxy variables (features that correlate with protected characteristics), testing for historical bias in labels (if past decisions were biased, training data perpetuates bias), and mitigation strategies (resampling underrepresented groups, removing biased features, synthetic data augmentation). Addresses the tension between data quality (complete, accurate data) and fairness (representative, unbiased data) — sometimes they conflict"
    weight: 0.35
    description: "BiasDetection"
  - type: llm_judge
    criteria: "Response covers data provenance and ongoing monitoring for compliance — documenting the complete data lifecycle (where data came from, how it was collected, what transformations were applied, who approved it for AI training), versioning of training datasets (so any model can be traced back to its exact training data), ongoing data quality monitoring specific to AI systems (distribution drift, new bias emerging, data freshness), and audit-readiness (preparing documentation that satisfies regulatory auditors and demonstrates compliance with the EU AI Act's data quality requirements)"
    weight: 0.30
    description: "ProvenanceMonitoring"
