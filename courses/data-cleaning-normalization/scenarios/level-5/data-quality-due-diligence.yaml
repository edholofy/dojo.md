meta:
  id: data-quality-due-diligence
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Data quality due diligence — assess data quality as part of M&A due diligence, technology audits, and investment evaluations"
  tags: [due-diligence, MA, investment, audit, assessment, master]

state: {}

trigger: |
  A PE firm partner says: "We're evaluating a $200M acquisition of a
  data-driven company (a marketing analytics platform with 5,000
  customers). The company claims their 'proprietary data asset' is a
  key value driver — they have 10 years of marketing performance data
  across 100,000 campaigns.

  But we've been burned before. A previous acquisition's 'data asset'
  turned out to be 60% duplicated, poorly documented, and largely
  unusable. We wrote down $50M in value.

  How do we conduct data quality due diligence before making the bid?
  What should we assess, how do we score it, and how does data quality
  affect our valuation?"

  Task: Design a data quality due diligence framework for M&A that
  assesses the target's data asset quality, identifies risks, and
  translates findings into valuation adjustments.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive due diligence assessment — what to evaluate: data asset inventory (what data exists, where, how much), quality dimensions per asset (completeness, accuracy, consistency, timeliness, uniqueness — scored and measured), data architecture and lineage (how data flows, where it's stored, how it's processed), documentation quality (are schemas, dictionaries, and processes documented?), technical debt (legacy formats, outdated systems, manual processes), and data governance maturity (who owns data quality, what processes exist, what tooling is in place)"
    weight: 0.35
    description: "AssessmentFramework"
  - type: llm_judge
    criteria: "Response identifies specific red flags and risks — high duplication rates that inflate data asset size, missing data documentation (if it's not documented, it's a risk), dependency on specific individuals for data knowledge (key person risk), data that can't be legally transferred (privacy regulations, contractual restrictions), quality that degrades without active maintenance (how much ongoing investment is needed to maintain quality?), and customer data overlap (how much of their data is actually unique vs available from third parties?). Each red flag should have an associated valuation impact"
    weight: 0.35
    description: "RedFlags"
  - type: llm_judge
    criteria: "Response translates data quality findings into valuation adjustments — how to discount the data asset value based on quality findings (60% duplication reduces the effective data asset by 60%), integration costs (cleaning and normalizing the acquired data costs $X, reducing net value), ongoing maintenance costs (annual cost to maintain data quality reduces the value of the data asset), and risk-adjusted valuation (probability-weighted scenarios: if data quality is better than expected, value is higher; if worse, value is lower). Provides a framework for arriving at a quality-adjusted bid price"
    weight: 0.30
    description: "ValuationAdjustment"
