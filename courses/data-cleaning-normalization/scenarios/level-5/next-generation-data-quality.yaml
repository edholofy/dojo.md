meta:
  id: next-generation-data-quality
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Next-generation data quality — explore emerging approaches including AI-powered cleaning, self-healing pipelines, and the future of data quality management"
  tags: [next-generation, AI-powered, self-healing, future, master]

state: {}

trigger: |
  A CTO asks: "Data quality has been a manual, reactive discipline for
  decades. With advances in AI, I expect this to change dramatically.
  What does next-generation data quality look like?

  Specifically:
  - Can AI automatically detect and fix data quality issues?
  - Can pipelines self-heal when quality degrades?
  - Can LLMs help with entity resolution and data standardization?
  - What about synthetic data for addressing data gaps?

  We're a large enterprise with 500+ data sources. What should we
  invest in over the next 3 years?"

  Task: Design a next-generation data quality vision that evaluates
  emerging AI-powered approaches, separates hype from genuine advances,
  and provides a practical adoption roadmap.

assertions:
  - type: llm_judge
    criteria: "Response evaluates AI-powered data quality capabilities — LLMs for entity resolution (understanding that 'IBM' and 'International Business Machines' are the same entity using semantic understanding, not just string matching), AI-powered data standardization (using language models to parse and normalize messy text fields like addresses and names), automated anomaly detection using ML (learning normal data patterns and flagging deviations without manual rule creation), and AI-assisted data imputation (using contextual understanding to fill missing values more intelligently than statistical methods). Provides honest assessment of current maturity and limitations"
    weight: 0.35
    description: "AIPowered"
  - type: llm_judge
    criteria: "Response evaluates self-healing pipelines and synthetic data — self-healing: pipelines that detect quality degradation and automatically apply corrective actions (revert to last known good state, apply backup transformation logic, route around failed sources). Limitations: self-healing works for known failure modes but struggles with novel failures. Synthetic data: using generative models to create realistic data for testing, augmenting underrepresented groups, and filling data gaps. Risks: synthetic data can amplify biases if the generation model is biased, and is not appropriate for regulatory reporting. Separates genuine value from hype for each approach"
    weight: 0.35
    description: "SelfHealingSynthetic"
  - type: llm_judge
    criteria: "Response provides a practical 3-year roadmap — Year 1: deploy ML-based anomaly detection on critical pipelines, implement LLM-assisted entity resolution for the highest-value deduplication cases, build self-healing capabilities for common, well-understood failure modes. Year 2: expand AI-powered cleaning to more data sources, deploy synthetic data for testing and development environments, build automated quality recommendation engine. Year 3: integrate AI quality capabilities into the data platform, build autonomous quality management for routine issues while keeping humans in the loop for complex judgment calls. Includes honest assessment of what will remain manual and why"
    weight: 0.30
    description: "Roadmap"
