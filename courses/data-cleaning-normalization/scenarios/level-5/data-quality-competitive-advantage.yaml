meta:
  id: data-quality-competitive-advantage
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Data quality as competitive advantage — use superior data quality to outperform competitors in decision-making, customer experience, and operational efficiency"
  tags: [competitive-advantage, strategy, differentiation, master]

state: {}

trigger: |
  A chief strategy officer says: "I've realized that data quality isn't
  just an operational concern — it's a competitive weapon. Our competitors
  are making decisions on dirty data while we could be making better
  decisions on clean data.

  In our industry (insurance), the company with the best data makes the
  best risk assessments, prices most accurately, detects fraud faster,
  and serves customers better. Data quality IS the business.

  How do I use superior data quality as a competitive moat? And how do
  I measure whether our data quality advantage is translating to
  business performance advantage?"

  Task: Design a strategy for using superior data quality as a
  competitive differentiator, identifying where data quality creates
  competitive advantage and how to measure and maintain that advantage.

assertions:
  - type: llm_judge
    criteria: "Response identifies where data quality creates competitive advantage in insurance — risk assessment accuracy (cleaner data → more accurate pricing → attract good risks, avoid bad risks, outperform competitors on loss ratios), fraud detection (higher quality data → fewer false positives and false negatives → lower fraud losses than competitors), claims processing speed (clean data → faster automated processing → better customer experience → higher retention and referrals), and underwriting efficiency (clean data → more automated underwriting → faster quotes → win more business). Quantifies the competitive impact where possible"
    weight: 0.35
    description: "CompetitiveAdvantage"
  - type: llm_judge
    criteria: "Response designs measurement frameworks — how to measure whether data quality advantage translates to business performance: compare loss ratios vs industry average (are we pricing better?), compare fraud detection rates vs industry (are we catching more fraud with fewer false positives?), compare claims processing time vs competitors (are we faster?), compare customer NPS vs industry (is our data-driven service better?), and track the gap over time (is our advantage growing or shrinking?). Includes benchmarking approaches and competitive intelligence methods"
    weight: 0.35
    description: "Measurement"
  - type: llm_judge
    criteria: "Response addresses building and maintaining the competitive moat — why data quality advantage is defensible (it's built on years of investment in processes, culture, and technology that can't be replicated quickly), how to widen the moat over time (continuous improvement, investing in emerging capabilities, building data quality into M&A integration), the risk of complacency (competitors will eventually improve, so the advantage must be continually maintained), and how to communicate the data quality advantage to investors and customers as a differentiator"
    weight: 0.30
    description: "MoatBuilding"
