meta:
  id: data-quality-economics
  level: 5
  course: data-cleaning-normalization
  type: output
  description: "Data quality economics — quantify the total cost of poor data quality and build the ROI case for data quality investment"
  tags: [economics, ROI, cost, business-case, measurement, master]

state: {}

trigger: |
  A board member asks: "We've been spending $5M annually on data quality
  and I need to understand the return. The data team says quality has
  improved but I want to know:

  1. What was the total cost of poor data quality BEFORE our investment?
  2. How much has our investment reduced those costs?
  3. What's the optimal level of data quality investment — are we
     spending too much, too little, or just right?
  4. What happens if we cut the budget by 50%?

  Company: $800M revenue, 200,000 customers, financial services."

  Task: Quantify the total cost of poor data quality, calculate the ROI
  of quality improvement investments, and determine the optimal
  investment level.

assertions:
  - type: llm_judge
    criteria: "Response quantifies the total cost of poor data quality across dimensions — direct costs (manual data cleaning labor, error correction, duplicate mail/marketing), operational costs (incorrect decisions based on bad data, rework from errors, customer churn from data-driven bad experiences), opportunity costs (missed insights from unreliable data, delayed analytics projects, inability to personalize), risk costs (regulatory fines from compliance failures, fraud losses from inadequate data for detection, audit remediation costs), and reputational costs (customer trust erosion from errors). Uses industry benchmarks and company-specific estimates to produce a total cost figure"
    weight: 0.35
    description: "TotalCost"
  - type: llm_judge
    criteria: "Response calculates the ROI of the $5M investment — measures improvement across each cost dimension (how much has manual cleaning cost decreased? how much has error-driven rework decreased? have regulatory penalties decreased?), calculates the total cost savings and revenue gains attributable to data quality improvement, and presents the ROI ratio (total value created ÷ $5M investment). Addresses attribution challenges (how to isolate data quality's contribution from other improvements) and uses conservative estimates"
    weight: 0.35
    description: "ROICalculation"
  - type: llm_judge
    criteria: "Response addresses the optimal investment level question — the diminishing returns curve (initial investment has high ROI, each additional dollar has less impact), the concept of 'good enough' data quality (100% quality is infinitely expensive, but 95% may be sufficient for most use cases), the consequences of cutting budget by 50% (quality degrades over time as new data quality issues emerge without maintenance, ROI of the remaining spend decreases as systemic capabilities atrophy), and a specific recommendation for the optimal spend level with justification"
    weight: 0.30
    description: "OptimalInvestment"
