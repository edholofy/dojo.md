meta:
  id: what-is-data-cleaning
  level: 1
  course: data-cleaning-normalization
  type: output
  description: "Introduction to data cleaning — understand why data quality matters and the main types of data quality issues"
  tags: [fundamentals, introduction, data-quality, basics]

state: {}

trigger: |
  A junior data analyst says: "I just pulled customer data for a report
  and my manager said it's 'dirty' and needs to be cleaned before analysis.
  What does dirty data actually mean? What kinds of problems can data have?
  And why can't I just analyze it as-is?"

  Task: Explain what data cleaning is, the main types of data quality
  issues, and why dirty data leads to incorrect analysis and poor
  business decisions.

assertions:
  - type: llm_judge
    criteria: "Response explains the main data quality dimensions — completeness (missing values, empty fields, null entries), accuracy (incorrect values, typos, outdated information), consistency (contradictory values across fields or systems, same entity represented differently), validity (values outside allowed ranges, wrong data types, invalid formats), uniqueness (duplicate records representing the same entity), and timeliness (stale data that no longer reflects current reality). Provides concrete examples of each"
    weight: 0.35
    description: "QualityDimensions"
  - type: llm_judge
    criteria: "Response explains why dirty data is dangerous for analysis — incorrect aggregations (averaging with nulls or duplicates), misleading visualizations, biased machine learning models, wrong business decisions based on flawed data, regulatory risks (reporting incorrect numbers), and the concept of 'garbage in, garbage out.' Uses specific examples like how duplicate customer records inflate customer counts or how missing revenue data understates total revenue"
    weight: 0.35
    description: "WhyItMatters"
  - type: llm_judge
    criteria: "Response introduces the data cleaning process at a high level — profiling the data first (understand what you have before fixing it), identifying issues by type, prioritizing fixes based on impact, documenting what was cleaned and how, and validating that cleaning improved quality without introducing new problems. Sets expectations that data cleaning typically takes 60-80% of a data project's time"
    weight: 0.30
    description: "CleaningProcess"
