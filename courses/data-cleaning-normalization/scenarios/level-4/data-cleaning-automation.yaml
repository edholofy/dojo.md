meta:
  id: data-cleaning-automation
  level: 4
  course: data-cleaning-normalization
  type: output
  description: "Data cleaning automation — build self-service data cleaning tools and automated pipelines that scale cleaning across the organization"
  tags: [automation, self-service, pipeline, tools, expert]

state: {}

trigger: |
  A director of data engineering says: "Our data scientists spend 60%
  of their time cleaning data. We have 50 data scientists doing similar
  cleaning tasks independently. Every project starts with the same
  steps: profile the data, handle missing values, fix formats, remove
  duplicates, and normalize features.

  I want to build automated cleaning pipelines and self-service tools
  so that common cleaning tasks are handled automatically. Data
  scientists should spend time on unique, domain-specific cleaning —
  not on boilerplate tasks.

  How do I automate data cleaning at scale?"

  Task: Design an automated data cleaning platform with reusable
  cleaning components, self-service tools for data scientists, and
  automated pipelines for common cleaning patterns.

assertions:
  - type: llm_judge
    criteria: "Response designs reusable cleaning components — a library of parameterized cleaning functions: standardize_dates(format), normalize_phone(country), clean_text(strip_whitespace=True, lowercase=True, remove_special=False), handle_missing(strategy='median', columns=[...]), detect_outliers(method='IQR', threshold=1.5), deduplicate(match_keys=['email'], fuzzy_threshold=0.85). Components should be composable into cleaning pipelines, version-controlled, and documented with expected inputs/outputs"
    weight: 0.35
    description: "ReusableComponents"
  - type: llm_judge
    criteria: "Response designs the automated pipeline architecture — auto-profiling stage (profile every new dataset automatically), auto-detection (identify common quality issues: missing values, type mismatches, format inconsistencies, outliers), auto-suggestion (recommend cleaning steps based on detected issues), human-in-the-loop review (data scientist reviews suggestions and approves/modifies), execution and logging (apply approved cleaning steps with full audit trail). Includes the self-service interface: data scientists configure cleaning through a UI or YAML configuration, not custom code for common operations"
    weight: 0.35
    description: "AutomatedPipeline"
  - type: llm_judge
    criteria: "Response addresses the organization's efficiency goal — quantifying time savings (from 60% to estimated 20-30% time on cleaning), measuring adoption and impact (which components are most used, which datasets benefit most), handling edge cases that can't be automated (domain-specific cleaning still requires human judgment), building institutional knowledge (cleaning patterns that work for one team are shared across the organization), and the continuous improvement cycle (feedback from data scientists improves the automated components over time)"
    weight: 0.30
    description: "EfficiencyImpact"
