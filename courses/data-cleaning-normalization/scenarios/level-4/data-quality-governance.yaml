meta:
  id: data-quality-governance
  level: 4
  course: data-cleaning-normalization
  type: output
  description: "Data quality governance — establish data stewardship, ownership, accountability structures, and organizational processes for sustaining data quality at enterprise scale"
  tags: [governance, stewardship, ownership, accountability, enterprise, expert]

state: {}

trigger: |
  A VP of Data says: "We've invested $5M in data quality tooling over
  3 years. We have Great Expectations, dbt tests, anomaly detection,
  the works. But our data quality isn't meaningfully better.

  The problem isn't technology — it's organizational. Nobody owns
  data quality. When an issue is found:
  - Data engineering says 'it came in dirty from the source system'
  - The source team says 'we didn't know anyone was using that field'
  - Analytics says 'someone should fix this upstream'
  - Business users say 'IT should handle it'

  We have 200 data engineers, 80 analysts, and 50 data scientists
  across 12 business units. Each unit has its own data practices.
  There's no consistent quality standard, no accountability, and
  no governance process.

  How do I build a data quality governance structure that creates
  real accountability and makes our $5M tooling investment actually
  deliver results?"

  Task: Design a data quality governance framework that establishes
  clear ownership, accountability, stewardship processes, and
  organizational structures to sustain quality at enterprise scale.

assertions:
  - type: llm_judge
    criteria: "Response designs a governance organizational structure — defines roles clearly: data owners (business executives accountable for data quality in their domain), data stewards (business-side specialists who define quality rules and resolve issues), data custodians (technical teams who implement and maintain quality checks), data quality council (cross-functional body that sets enterprise standards and resolves disputes). Establishes a RACI matrix for common data quality activities (issue detection, root cause analysis, remediation, rule definition, tool selection). Addresses the federated vs centralized tension — how to balance enterprise standards with business unit autonomy"
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Response creates accountability mechanisms — how to make data quality ownership enforceable (tie to performance reviews, OKRs, or business reviews), escalation paths when quality issues aren't resolved (steward → owner → data quality council → executive sponsor), quality gate enforcement in the data pipeline (no data published without meeting minimum quality thresholds), issue tracking and resolution SLAs (who fixes what, by when), and how to handle the 'it came in dirty from the source' problem (shared accountability models, quality contracts between producer and consumer teams)"
    weight: 0.35
    description: "AccountabilityMechanisms"
  - type: llm_judge
    criteria: "Response addresses the change management challenge — how to shift from reactive to proactive quality culture (training, incentives, visible leadership support), how to onboard 12 business units with different maturity levels (phased rollout, pilot with willing teams, demonstrate value before mandating), how to connect the $5M tooling investment to the governance framework (tools without governance = waste, governance without tools = manual burden), and how to measure governance effectiveness (time to detect issues, time to resolve, reduction in recurring issues, stakeholder satisfaction surveys)"
    weight: 0.30
    description: "ChangeManagement"
