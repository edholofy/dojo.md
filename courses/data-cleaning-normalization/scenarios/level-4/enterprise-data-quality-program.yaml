meta:
  id: enterprise-data-quality-program
  level: 4
  course: data-cleaning-normalization
  type: output
  description: "Enterprise data quality program — design and implement an organization-wide data quality management program with governance, metrics, and continuous improvement"
  tags: [enterprise, governance, program, metrics, SLA, expert]

state: {}

trigger: |
  A chief data officer says: "Our company has a data quality crisis.
  We spend $8M annually on data cleaning across 12 teams, but quality
  isn't improving. Every team cleans data independently, using different
  tools, different standards, and different definitions of 'clean.'

  Issues: inconsistent data definitions across business units, no
  quality metrics or SLAs, no accountability for data quality, and
  cleaning efforts that are duplicated across teams.

  We have 500+ data assets, 200 pipelines, and 3,000 data consumers.
  Design an enterprise data quality program that brings order to this
  chaos."

  Task: Design a comprehensive enterprise data quality management
  program covering governance structure, quality metrics, SLAs,
  stewardship roles, and continuous improvement processes.

assertions:
  - type: llm_judge
    criteria: "Response designs the governance structure — data quality council (executive sponsors from each business unit), data quality team (centralized team that sets standards and provides tooling), data stewards (domain experts in each business unit accountable for their data), data custodians (technical implementers who build and maintain quality processes). Defines the operating model: centralized standards with federated execution. Establishes a data quality policy that defines minimum quality expectations for all data assets"
    weight: 0.35
    description: "Governance"
  - type: llm_judge
    criteria: "Response establishes quality metrics and SLAs — defines measurable quality dimensions for each data asset (completeness, accuracy, consistency, timeliness, validity, uniqueness), sets SLA targets by data criticality tier (Tier 1 critical data: 99.5% completeness, <1% error rate, <15 min freshness; Tier 2: 98%, <3%, <1 hour; Tier 3: 95%, <5%, <24 hours), implements a data quality dashboard that tracks metrics across all assets, and creates an escalation process for SLA breaches. Includes how to baseline current quality and set realistic improvement targets"
    weight: 0.35
    description: "MetricsAndSLAs"
  - type: llm_judge
    criteria: "Response addresses the $8M cost problem and continuous improvement — identifies duplicate cleaning efforts across 12 teams and consolidates, implements preventive quality controls (catching issues at source rather than downstream cleaning), measures the business impact of poor data quality (decision errors, rework, customer impact) to justify investment, creates a continuous improvement cycle (measure → identify root causes → implement fixes → remeasure), and tracks ROI of the data quality program over time"
    weight: 0.30
    description: "CostAndImprovement"
