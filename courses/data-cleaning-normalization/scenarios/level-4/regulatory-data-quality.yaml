meta:
  id: regulatory-data-quality
  level: 4
  course: data-cleaning-normalization
  type: output
  description: "Regulatory data quality — meet data quality requirements for regulatory compliance including SOX, GDPR, BCBS 239, and financial reporting standards"
  tags: [regulatory, compliance, SOX, GDPR, BCBS239, expert]

state: {}

trigger: |
  A chief compliance officer at a financial institution says: "We failed
  our last regulatory examination because of data quality issues:

  1. SOX: our financial data aggregation couldn't be traced back to
     source transactions (missing data lineage)
  2. BCBS 239: our risk data isn't timely, accurate, or complete enough
     for regulatory risk reporting
  3. GDPR: we can't reliably identify all instances of a customer's
     personal data across our systems (data inventory gaps)
  4. Anti-money laundering: false positive rates on our transaction
     monitoring are 95% — largely due to poor data quality in
     customer records

  The regulator has given us 12 months to remediate. What data quality
  improvements do we need for each regulation?"

  Task: Design data quality remediation plans for SOX, BCBS 239, GDPR,
  and AML compliance, addressing the specific quality requirements of
  each regulatory framework.

assertions:
  - type: llm_judge
    criteria: "Response addresses SOX and BCBS 239 requirements — SOX: complete data lineage from financial reports back to source transactions, internal controls over data transformations (ICFR), change management for data pipelines affecting financial reporting, and reconciliation controls (proving that aggregated numbers match detail records). BCBS 239: risk data must be accurate (validated against source), complete (all positions included), timely (available when needed for risk reporting), and adaptable (can be re-aggregated for ad-hoc analysis). Provides specific data quality controls for each"
    weight: 0.35
    description: "SOXandBCBS"
  - type: llm_judge
    criteria: "Response addresses GDPR data quality requirements — comprehensive data inventory (knowing where all personal data resides across all systems), data accuracy obligations (Article 5 requires personal data to be accurate and kept up to date), data subject access requests (quality impacts: if data is inconsistent across systems, the response may be incomplete), right to erasure (requires complete knowledge of where data exists to delete it everywhere), and the role of data quality in enabling GDPR compliance (you can't protect data you can't find)"
    weight: 0.35
    description: "GDPR"
  - type: llm_judge
    criteria: "Response addresses AML data quality and the false positive problem — root causes of 95% false positive rate (inconsistent customer names, missing addresses, outdated records, duplicate customer profiles that split transaction history), specific data quality improvements that reduce false positives (deduplication of customer records, standardization of name and address fields, enrichment with current data, linking related accounts), expected impact on false positive rates (industry benchmarks suggest 30-50% reduction is achievable through data quality alone), and the 12-month remediation timeline with prioritized phases"
    weight: 0.30
    description: "AML"
