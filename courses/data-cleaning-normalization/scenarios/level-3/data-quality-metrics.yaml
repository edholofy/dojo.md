meta:
  id: data-quality-metrics
  level: 3
  course: data-cleaning-normalization
  type: output
  description: "Data quality metrics and SLAs — design comprehensive data quality measurement frameworks, dashboards, and service-level agreements for cross-functional stakeholders"
  tags: [metrics, SLA, measurement, dashboard, monitoring, advanced]

state: {}

trigger: |
  A head of data engineering says: "We've been doing data cleaning
  reactively — someone complains, we fix it. I want to move to
  proactive data quality management with real metrics and SLAs.

  Our platform has 150 data pipelines feeding 40 downstream
  applications. We have no systematic way to answer:
  - What's our current data quality score?
  - Which pipelines are degrading?
  - Are we meeting our quality commitments to downstream consumers?
  - Where should we invest in improvement?

  The CFO wants a monthly data quality report. The product team
  wants real-time quality dashboards. The compliance team wants
  evidence we meet regulatory data quality requirements.

  How do I design a data quality metrics framework that serves all
  three audiences and drives continuous improvement?"

  Task: Design a comprehensive data quality metrics framework with
  dimension-level scoring, pipeline-level monitoring, SLA definitions,
  and stakeholder-appropriate reporting.

assertions:
  - type: llm_judge
    criteria: "Response designs a multi-level metrics framework — defines metrics at multiple granularities: field-level (% of valid emails in customer.email), table-level (overall completeness of customer table), pipeline-level (quality score of the daily customer sync pipeline), domain-level (aggregate quality of all customer data), and enterprise-level (overall DQ score). Includes both leading indicators (quality check failures, rule violation rates) and lagging indicators (downstream error rates, manual correction volumes). Defines how dimension scores (accuracy, completeness, consistency, timeliness, uniqueness) are calculated and aggregated into composite scores with appropriate weighting"
    weight: 0.35
    description: "MetricsFramework"
  - type: llm_judge
    criteria: "Response defines data quality SLAs — how to set meaningful SLA targets (based on business criticality: Tier 1 data like financial records needs 99.9% accuracy, Tier 2 like marketing data might accept 95%), SLA structure (metric, threshold, measurement frequency, remediation timeline, escalation path), how to handle SLA breaches (automated alerts, root cause analysis, remediation tracking), and the relationship between SLAs and data contracts with downstream consumers. Addresses the challenge of setting initial baselines when current quality is unknown (measure first, set achievable targets, tighten over time)"
    weight: 0.35
    description: "SLADesign"
  - type: llm_judge
    criteria: "Response designs stakeholder-appropriate reporting — for the CFO: monthly executive dashboard showing business impact of data quality (cost of poor quality, trend over time, investment ROI), for the product team: real-time operational dashboard showing pipeline health, recent failures, quality trends by data domain, for the compliance team: audit-ready reports showing regulatory requirement coverage and evidence of quality controls. Includes how to automate report generation, how to make metrics actionable (not just informational), and how to use metrics to prioritize improvement investments"
    weight: 0.30
    description: "StakeholderReporting"
