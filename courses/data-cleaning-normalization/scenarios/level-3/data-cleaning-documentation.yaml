meta:
  id: data-cleaning-documentation
  level: 3
  course: data-cleaning-normalization
  type: output
  description: "Data cleaning documentation — create reproducible, auditable data cleaning workflows with clear documentation and lineage tracking"
  tags: [documentation, reproducibility, lineage, audit-trail, advanced]

state: {}

trigger: |
  A compliance officer says: "Our data team cleans production data but
  nobody documents what they changed, why, or how. When auditors ask
  'how did you arrive at this number?', we can't trace from the final
  report back to the raw data.

  Last month, a data analyst removed 2,000 'outlier' records that turned
  out to be a legitimate product category. We had no documentation of
  what was removed or why, and it took a week to reconstruct.

  We need reproducible, documented data cleaning that creates an audit
  trail. We're in financial services — regulators require data lineage."

  Task: Design a data cleaning documentation and lineage framework that
  makes cleaning processes reproducible, auditable, and traceable from
  raw data to final output.

assertions:
  - type: llm_judge
    criteria: "Response designs documentation standards for cleaning operations — every cleaning step should document: what was done (transformation applied), why it was done (the data quality issue being addressed), how many records were affected (counts before and after), what values were changed (old value → new value for sampled records), who approved the change, and when it was applied. Provides templates or formats for cleaning logs that capture this information systematically"
    weight: 0.35
    description: "DocumentationStandards"
  - type: llm_judge
    criteria: "Response addresses reproducibility — using code-based cleaning (not manual spreadsheet edits), version-controlled cleaning scripts (so any past cleaning can be re-examined), parameterized cleaning rules (thresholds and rules stored as configuration, not hardcoded), idempotent cleaning operations (running the same script twice produces the same result), and preserving raw data (never modify source data in place — always create cleaned copies with lineage back to the original)"
    weight: 0.35
    description: "Reproducibility"
  - type: llm_judge
    criteria: "Response covers data lineage for regulatory compliance — field-level lineage (for any value in the final report, trace it back through transformations to the source system), impact analysis (if a cleaning rule changes, which downstream reports are affected?), data retention (keeping raw data, intermediate states, and cleaning logs for the required retention period), and audit-readiness (preparing lineage documentation that auditors can follow without technical expertise)"
    weight: 0.30
    description: "Lineage"
