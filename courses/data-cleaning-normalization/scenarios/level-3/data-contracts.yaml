meta:
  id: data-contracts
  level: 3
  course: data-cleaning-normalization
  type: output
  description: "Data contracts — define and enforce agreements between data producers and consumers to prevent quality issues at the source"
  tags: [data-contracts, schema, SLA, producer-consumer, advanced]

state: {}

trigger: |
  A data platform lead says: "We're tired of reactive data cleaning.
  Every time an upstream team changes their data format, our pipelines
  break. Last quarter, the payments team added a new currency field
  without telling us, the marketing team changed their event schema,
  and the product team renamed three columns.

  I want to shift from reactive cleaning to proactive prevention using
  data contracts. How do we define contracts between data producers
  and consumers so that breaking changes are caught before they reach
  our pipelines?"

  Task: Design a data contracts framework that defines the agreement
  between data producers and consumers, including schema contracts,
  quality SLAs, and change management processes.

assertions:
  - type: llm_judge
    criteria: "Response defines what a data contract includes — schema definition (column names, types, nullability, constraints), semantic definition (what each field means, valid values, business rules), quality SLAs (maximum acceptable null rate per field, freshness requirements, completeness thresholds), ownership (who is the producer, who are the consumers, who is accountable), and change management process (how changes are proposed, reviewed, communicated, and implemented). Distinguishes data contracts from simple schema definitions"
    weight: 0.35
    description: "ContractDefinition"
  - type: llm_judge
    criteria: "Response explains how to enforce contracts — schema validation at the boundary (reject data that doesn't match the contract), automated contract testing in CI/CD (producer's pipeline fails if their output violates the contract), runtime monitoring (alert when contract SLAs are breached), versioning (contracts have versions, breaking changes require version bumps and consumer notification), and tooling options (Protobuf/Avro for schema enforcement, Great Expectations for quality rules, dbt contracts, custom validation layers)"
    weight: 0.35
    description: "Enforcement"
  - type: llm_judge
    criteria: "Response addresses organizational adoption — getting producers to accept contract responsibility (contracts are owned by producers, not consumers), negotiating contract terms (producers and consumers agree on realistic quality SLAs), handling legacy systems without contracts (start with the most critical data flows), change management for introducing contracts (incentive structures, executive sponsorship, incremental rollout), and the cultural shift from 'my pipeline is done when I publish the data' to 'my pipeline is done when consumers can reliably use the data'"
    weight: 0.30
    description: "OrganizationalAdoption"
