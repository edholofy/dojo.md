meta:
  id: meeting-summary-automation
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Design meeting summary automation — build systems that use AI, templates, and integrations to reduce documentation effort while maintaining quality"
  tags: [sales, meetings, automation, AI, templates, productivity, advanced]

state: {}

trigger: |
  You're the VP of Sales Operations at "AutoDoc" — a B2B SaaS company
  (200 AEs, $250M ARR). Your CEO gave you a challenge: "Our AEs spend
  an average of 4.2 hours per week on meeting documentation. Cut that
  to under 1 hour without reducing quality."

  Current documentation stack:
  - CRM: Salesforce (meeting notes in Activity records)
  - Calendar: Google Calendar
  - Video: Zoom (recordings available but rarely reviewed)
  - Conversation intelligence: Gong (deployed 6 months ago, 60% adoption)
  - Email: Gmail
  - No meeting-specific documentation tool

  Current AE documentation workflow (observed):
  1. Take handwritten notes during meeting (or don't)
  2. After meeting, open CRM, find the right opportunity
  3. Type notes from memory (average 45 min after meeting, sometimes
     hours or days later)
  4. Write follow-up email separately in Gmail
  5. Update opportunity fields manually (stage, next steps, etc.)
  6. Average total time: 25 minutes per meeting, 10 meetings/week
     = 4.2 hours

  Tools you're evaluating:
  - Gong (already deployed): Auto-transcription, AI summaries, action
    items. Limitation: summaries are generic, not deal-context-aware.
  - Fireflies.ai: Meeting transcription + AI notes. $19/user/month.
  - Otter.ai: Real-time transcription. $16.99/user/month.
  - Avoma: Revenue intelligence + auto-notes. $49/user/month.
  - Custom GPT integration: Use GPT-4 API to process Gong transcripts
    into structured summaries. Estimated $3/user/month in API costs.
  - Native Salesforce Einstein: Auto-capture from emails/calendar.
    Included in existing license.

  Constraints:
  - Budget: $100K annual for tools/integrations
  - Security: Must pass SOC 2 and HIPAA (healthcare clients)
  - Adoption: AEs rejected the last 2 tools that were "forced" on them
  - Integration: Must work with Salesforce and Gong (already deployed)

  Tasks:
  1. Design the automated documentation workflow — map the new process
     from meeting start to documentation complete. Show: which steps
     are automated, which require human input, where AI enhances vs.
     generates, and the expected time per meeting. Target: under 6
     minutes per meeting.

  2. Evaluate and recommend the tool stack. Compare the options against
     your requirements (budget, security, adoption, integration). Make
     a specific recommendation with justification. Include build vs.
     buy analysis for the custom GPT option.

  3. Create the change management plan for rolling out the new system.
     Address: the AE adoption problem (2 previous failed rollouts),
     the training plan, the phased rollout approach, success metrics,
     and how to handle AEs who prefer their current workflow.

assertions:
  - type: llm_judge
    criteria: "Automated workflow reduces time to under 6 min — shows clear process from meeting to documentation, identifies which steps are automated vs. human, AI enhancement points are practical, and the math works out to under 1 hour/week"
    weight: 0.35
    description: "Time-efficient automated workflow"
  - type: llm_judge
    criteria: "Tool recommendation is well-analyzed — compares options on budget, security, adoption, and integration criteria; build vs. buy analysis for custom GPT is balanced; recommendation fits within $100K and existing Gong investment"
    weight: 0.35
    description: "Well-analyzed tool recommendation"
  - type: llm_judge
    criteria: "Change management plan addresses previous failures — identifies why past rollouts failed, proposes adoption strategies (opt-in pilot, champions, quick wins), phased approach is realistic, and handles resistance without being heavy-handed"
    weight: 0.30
    description: "Failure-informed change management"
