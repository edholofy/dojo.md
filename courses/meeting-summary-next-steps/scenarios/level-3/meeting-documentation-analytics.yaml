meta:
  id: meeting-documentation-analytics
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Build meeting documentation analytics — use data from meeting summaries to identify deal patterns, forecast outcomes, and improve sales effectiveness"
  tags: [sales, meetings, analytics, patterns, forecasting, data-driven, advanced]

state: {}

trigger: |
  You're the Director of Revenue Operations at "InsightSales" — a B2B
  SaaS analytics company (150 AEs, $180M ARR). Your CEO asked you to
  answer a question: "Can we predict which deals will close based on
  the quality and content of meeting documentation?"

  You have access to data from the last 12 months:
  - 12,400 meetings documented in CRM
  - 2,100 closed-won deals
  - 4,800 closed-lost deals
  - Average 6.2 meetings per closed-won deal
  - Average 4.1 meetings per closed-lost deal

  Your data team ran an initial analysis:
  - Deals with all meeting summaries completed: 38% win rate
  - Deals with <50% summaries completed: 14% win rate
  - Deals where next steps were documented with dates: 42% win rate
  - Deals where next steps were vague or blank: 11% win rate
  - Average words per meeting summary (won deals): 287
  - Average words per meeting summary (lost deals): 94
  - Deals mentioning competitor by name in notes: 45% win rate
  - Deals with no competitive intel in notes: 19% win rate

  Text analysis of meeting summaries (NLP findings):
  - Won deals mention specific stakeholder names 3.2x more often
  - Won deals include specific dates/deadlines 2.8x more often
  - Lost deals use vague language ("good meeting," "went well") 4.1x
    more often
  - Won deals document objections 2.5x more often
  - Lost deals have 3.7x more gaps between meetings (avg 18 days vs 5)

  Anomalies in the data:
  - Top 10% of AEs by documentation quality have a 52% win rate
  - Bottom 10% have a 9% win rate
  - But: 3 top performers have terrible documentation and still close
    at 40%+ (relationship sellers)
  - And: 5 AEs have perfect documentation but only 15% win rate
    (over-documenting, under-selling?)

  Tasks:
  1. Create a "Meeting Documentation Health Score" model. Define: the
     input metrics (what to measure in each meeting summary), the
     scoring algorithm, the deal-level health score (aggregating across
     meetings), and the thresholds for "healthy," "at risk," and
     "critical." Show how to calculate it for a sample deal.

  2. Design a "Documentation-Based Forecast Overlay" — a system that
     adjusts CRM forecast probabilities based on meeting documentation
     quality. Address: how documentation scores modify stage
     probabilities, how to handle the anomalies (great sellers with
     bad docs, over-documenters), and how to present this to sales
     leadership.

  3. Build the "Meeting Effectiveness Dashboard" specification. Include:
     the 8 key metrics to track, the views needed (team-level, AE-level,
     deal-level), the alerts/triggers for management intervention, and
     how to present the data without making it feel like surveillance.

assertions:
  - type: llm_judge
    criteria: "Health score model is data-informed — uses the specific correlation data provided (completion rates, word counts, specificity markers, objection documentation), creates meaningful thresholds, and shows a realistic calculation example"
    weight: 0.35
    description: "Data-informed health score model"
  - type: llm_judge
    criteria: "Forecast overlay handles nuance — adjusts probabilities based on documentation quality while accounting for the anomalies (relationship sellers with bad docs, over-documenters), doesn't over-penalize or over-reward documentation alone"
    weight: 0.35
    description: "Nuanced forecast overlay"
  - type: llm_judge
    criteria: "Dashboard spec is practical and non-threatening — 8 meaningful metrics, appropriate views, smart intervention triggers, and thoughtful approach to avoiding surveillance perception while still driving accountability"
    weight: 0.30
    description: "Practical non-threatening dashboard"
