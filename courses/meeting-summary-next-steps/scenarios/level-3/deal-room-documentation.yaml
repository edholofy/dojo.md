meta:
  id: deal-room-documentation
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Build deal room documentation — create comprehensive shared workspaces for complex enterprise deals with multiple meetings, documents, and stakeholders"
  tags: [sales, meetings, deal-room, documentation, enterprise, collaboration, advanced]

state: {}

trigger: |
  You're a Strategic Account Director at "UnifyPlatform" — a B2B SaaS
  enterprise integration platform ($1M-5M ACV). You're managing a $3.2M
  deal with GlobalBank that has been in play for 8 months. The deal has
  generated 42 meetings, 156 action items, 28 documents exchanged, and
  involves 23 stakeholders across both organizations.

  Your CRO just said: "I need a deal room that I can review in 30
  minutes and understand exactly where this deal stands. The CEO is
  asking me about it in our next 1:1."

  Here's the deal's current state:

  Meeting history summary:
  - Months 1-2: 8 discovery/qualification meetings
  - Month 3: 6 technical deep dives
  - Month 4: 4 security/compliance reviews
  - Month 5: 5 business case meetings
  - Month 6: 7 negotiation sessions
  - Month 7: 6 legal/procurement meetings
  - Month 8: 6 executive alignment meetings
  - Status: Contract is 90% negotiated, 3 open items remain

  Open items:
  1. Data sovereignty — GlobalBank requires data to stay in EU (Frankfurt).
     Your EU region launches in 6 weeks. Their legal counsel wants written
     confirmation of GA date and SLA commitments.
  2. Custom SLA — They want 99.999% uptime (your standard is 99.99%).
     The extra 9 costs you significant infrastructure investment. Your VP
     of Engineering is running a cost analysis.
  3. Penalty clause — Their procurement wants a $50K/month credit for
     every hour of downtime below SLA. Your legal says max $10K/month.
     Gap is significant.

  Key stakeholders:
  - Their side: CEO (final sign-off), CTO (champion), CISO (gate),
    CFO (budget), General Counsel (contract), Head of Procurement
    (terms), 4 VPs (evaluators)
  - Your side: CEO, CRO, VP Engineering, VP Product, Head of Legal,
    Head of CS, you

  Risk factors:
  - Competitor (RivalCloud) submitted a "last look" proposal 2 weeks ago
  - GlobalBank's board meets in 4 weeks — CTO says deal must be signed
    before then
  - Your EU region launch has slipped once already

  Tasks:
  1. Create the deal room executive summary — a single document your CRO
     can read in 10 minutes. Include: deal overview, timeline of key
     milestones achieved, current status of all open items, stakeholder
     alignment map (who's for/against/neutral), risk register, competitive
     status, and the path to close with dates.

  2. Create the "meeting intelligence digest" — a synthesis of the 42
     meetings that extracts: the evolution of the deal (how positions
     changed over 8 months), the key moments that advanced or stalled
     the deal, patterns in stakeholder behavior, and the competitive
     intelligence gathered across all meetings.

  3. Design the deal room structure — what sections, documents, and views
     should exist in a well-organized deal room for a deal of this
     complexity. Include: the table of contents, what goes in each section,
     who needs access to what, and the update cadence for each section.

assertions:
  - type: llm_judge
    criteria: "Executive summary is scannable and complete — CRO can understand deal status in 10 minutes, includes all 3 open items with status, stakeholder alignment, competitive risk from RivalCloud, 4-week board deadline, and specific path to close"
    weight: 0.35
    description: "Scannable executive deal summary"
  - type: llm_judge
    criteria: "Meeting intelligence digest synthesizes 42 meetings meaningfully — shows deal evolution across 8 months, identifies key turning points, tracks stakeholder position changes, and extracts competitive intelligence patterns"
    weight: 0.35
    description: "Meaningful meeting intelligence synthesis"
  - type: llm_judge
    criteria: "Deal room structure is well-organized for $3.2M enterprise complexity — logical sections, appropriate access controls, realistic update cadences, and designed for both detailed review and quick executive scanning"
    weight: 0.30
    description: "Well-organized deal room structure"
