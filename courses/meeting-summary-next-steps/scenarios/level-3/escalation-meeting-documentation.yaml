meta:
  id: escalation-meeting-documentation
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Document escalation meetings — capture high-stakes customer escalations, executive interventions, and recovery plans with appropriate tone and precision"
  tags: [sales, meetings, escalation, executive, crisis, recovery, advanced]

state: {}

trigger: |
  You're a Customer Success Director at "ReliableCloud" — a B2B SaaS
  cloud infrastructure platform ($500M ARR). A top 10 account just had
  a critical escalation and you need to document a series of 3 meetings
  that happened over 48 hours.

  Account: MegaRetail Inc., $2.4M ARR, 3-year contract (18 months in)
  Crisis: Platform outage caused MegaRetail's Black Friday sale to go
  down for 47 minutes, estimated $3.2M in lost revenue for them

  Meeting 1 — Emergency Call (Friday 11 PM, 25 minutes):
  Attendees: You, your VP of Engineering, MegaRetail's CTO, their VP
  of E-commerce
  - MegaRetail's CTO was furious: "This is completely unacceptable.
    47 minutes during our biggest sales event. Do you know what this
    costs us?"
  - Your VP of Engineering explained: cascading failure in the load
    balancer. "It shouldn't have happened. We had safeguards but a
    recent update introduced a regression."
  - CTO demanded: "I want a full root cause analysis by Monday. I want
    a guarantee this never happens again. And I want to discuss
    financial remediation."
  - VP of E-commerce: "Our CEO is livid. She's considering invoking
    the termination clause."
  - You committed to: RCA by Monday, emergency meeting with your CEO
    and their CEO, and immediate engagement of a dedicated site
    reliability team

  Meeting 2 — Internal War Room (Saturday 9 AM, 90 minutes):
  Attendees: Your CEO, CRO, VP Engineering, VP Product, Head of Legal,
  Head of CS (you)
  - CEO: "This is a $2.4M account and they're our retail reference
    customer. Losing them would be devastating."
  - VP Engineering: Root cause identified — a configuration change in
    the CDN layer that bypassed normal testing. Human error + process
    gap.
  - Legal: "Their contract has a $50K/month SLA credit provision. At
    47 minutes, they're entitled to $50K. But they'll push for more
    based on their claimed $3.2M loss."
  - CRO: "We need to go beyond the SLA credit. This is a relationship
    issue, not a contract issue."
  - CEO decision: Offer $150K in service credits (3x the SLA credit),
    dedicated SRE team for 6 months, and a direct line to VP Engineering
    for future incidents
  - CEO will personally call MegaRetail's CEO Sunday evening

  Meeting 3 — CEO-to-CEO Call (Sunday 7 PM, 30 minutes):
  Attendees: Your CEO, MegaRetail's CEO, their CTO, you (note-taker)
  - Your CEO apologized personally and outlined the remediation package
  - MegaRetail CEO: "I appreciate the call. The credit helps but what
    I really need is confidence this won't happen again."
  - Your CEO shared the technical findings and the process changes
  - MegaRetail CEO asked about the dedicated SRE team: "How senior? I
    want someone who can make decisions, not a junior."
  - CTO: "The RCA needs to include what systemic changes you're making,
    not just this incident."
  - MegaRetail CEO: "I won't invoke the termination clause — yet. But
    I want a formal review in 90 days. If I'm not confident, we'll
    explore alternatives."
  - Your CEO agreed to 90-day review and quarterly executive check-ins

  Tasks:
  1. Write the documentation for all 3 meetings. Each requires different
     tone and audience: Meeting 1 is crisis response (factual, urgent),
     Meeting 2 is internal strategy (candid, action-oriented), Meeting 3
     is executive recovery (diplomatic, commitment-heavy). Include
     verbatim quotes where they're important for the record.

  2. Create the formal customer-facing incident report that your CEO
     will send to MegaRetail's CEO. Include: incident timeline, root
     cause (translated for non-technical executives), immediate actions
     taken, the remediation package, and long-term prevention measures.
     Tone: accountable but confident.

  3. Design the 90-day recovery plan for this account. Include: weekly
     milestones, the executive check-in cadence, the SRE engagement
     plan, the metrics you'll present at the 90-day review, and your
     internal escalation triggers if things go off track.

assertions:
  - type: llm_judge
    criteria: "Three meeting docs have appropriate tone — Meeting 1 is urgent/factual capturing CTO's anger and commitments made under pressure, Meeting 2 is candid internal strategy with CEO decisions, Meeting 3 is diplomatic executive recovery capturing the 90-day reprieve"
    weight: 0.35
    description: "Tone-appropriate escalation documentation"
  - type: llm_judge
    criteria: "Incident report is executive-quality — accountable without groveling, technically accurate without jargon, includes the $150K remediation package and dedicated SRE commitment, and conveys confidence in prevention measures"
    weight: 0.35
    description: "Executive-quality incident report"
  - type: llm_judge
    criteria: "90-day recovery plan is measurable — weekly milestones, executive cadence, SRE deliverables, specific metrics for the 90-day review, and internal triggers that catch problems before MegaRetail sees them"
    weight: 0.30
    description: "Measurable 90-day recovery plan"
