meta:
  id: global-meeting-documentation
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Manage global meeting documentation — handle time zones, cultural differences, and language barriers in multi-region deal documentation"
  tags: [sales, meetings, global, cultural, multi-region, international, advanced]

state: {}

trigger: |
  You're the Global Account Director at "WorldSync" — a B2B SaaS supply
  chain platform ($2M-10M ACV). You're managing a $6.5M deal with
  OmniCorp, a multinational manufacturer with operations in 12 countries.
  The deal requires coordinated meetings across 4 regions.

  Account: OmniCorp, $6.5M ACV, 24-month implementation
  Your deal team spans US, UK, Singapore, and Germany offices.

  This week's meeting schedule:

  Monday 8 AM ET — North America kickoff (you + NA team):
  Customer: VP of Supply Chain (Detroit), Head of Procurement (Toronto)
  - Detroit VP is direct and fast-paced: "Just tell me the price and
    timeline"
  - Toronto procurement is process-heavy: "We need a formal RFP response
    by March 15"
  - They want North America live in 6 months
  - Budget holder: Detroit VP ($3M for NA portion)

  Monday 4 PM ET / Tuesday 9 AM SGT — APAC review (Singapore team):
  Customer: Regional CTO (Singapore), Japan Country Manager, China Ops
  Director
  - Singapore CTO is your APAC champion but cautious: "We need local
    data residency"
  - Japan manager spoke through a translator; key concerns were about
    local regulatory compliance (J-SOX) and customization for Japanese
    workflows
  - China director was quiet but afterward sent an email listing 15
    technical requirements in Mandarin (your team is translating)
  - Data residency: Singapore and Japan confirmed, China requires
    separate evaluation
  - APAC budget: $1.5M, approved by Singapore CTO

  Tuesday 2 PM ET / 7 PM GMT — EMEA alignment (UK and Germany teams):
  Customer: Global CIO (London, executive sponsor), DACH Regional Head
  (Munich), France Operations Lead (Paris, joined by phone)
  - London CIO is the ultimate decision maker for the global deal
  - Munich head raised GDPR concerns and wants a DPA review
  - Paris lead had connectivity issues — missed 15 minutes, asked for
    a separate follow-up
  - CIO wants a "global governance model" for the platform
  - EMEA budget: $2M, subject to CIO approval

  Wednesday 7 AM ET — Global steering committee (all regions):
  Customer: CIO (London) chairing, all regional leads
  - CIO announced: "I want a single vendor decision by April 30"
  - Regions gave updates; some disagreement between Detroit (wants speed)
    and Munich (wants thoroughness)
  - CIO mediated: "We'll run NA as pilot, then expand globally"
  - Japan manager asked (through translator) about training in Japanese
  - Decision framework: CIO scores 60%, regional leads score 40%
    (10% each)

  Tasks:
  1. Write meeting summaries for all 4 meetings that are appropriate
     for a global audience. Consider: cultural communication differences,
     what needs translation or clarification, implicit vs. explicit
     messages (Japan's indirect communication, China's email follow-up
     pattern), and how to represent consensus vs. disagreement.

  2. Create a "Global Deal Coordination Document" that synthesizes all
     4 meetings into a single view. Include: regional requirements
     matrix, budget summary by region, timeline alignment, open items
     by region, the decision framework (60/40 split), and dependencies
     between regions.

  3. Design a "Global Meeting Documentation Protocol" for your deal
     team across 4 offices. Address: time zone management, translation
     workflow, cultural sensitivity in documentation, the single source
     of truth vs. regional views, and how to handle follow-up across
     12-hour time zone spans.

assertions:
  - type: llm_judge
    criteria: "Meeting summaries show cultural awareness — captures direct vs. indirect communication styles, handles translated content appropriately, notes when follow-up is needed for missed attendees (Paris), and distinguishes explicit statements from implied positions (Japan, China)"
    weight: 0.35
    description: "Culturally aware meeting summaries"
  - type: llm_judge
    criteria: "Global coordination document synthesizes 4 meetings coherently — regional requirements matrix is complete, budget totals to $6.5M across regions, timeline shows NA pilot first, and the 60/40 decision framework is clearly documented"
    weight: 0.35
    description: "Coherent global deal coordination"
  - type: llm_judge
    criteria: "Documentation protocol addresses real global challenges — time zone management, translation workflows, cultural sensitivity guidelines, single source of truth design, and practical follow-up cadence across 12-hour spans"
    weight: 0.30
    description: "Practical global documentation protocol"
