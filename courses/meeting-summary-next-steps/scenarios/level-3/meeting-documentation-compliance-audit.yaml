meta:
  id: meeting-documentation-compliance-audit
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Conduct a meeting documentation compliance audit — evaluate documentation practices against regulatory requirements and internal standards"
  tags: [sales, meetings, compliance, audit, regulatory, quality-assurance, advanced]

state: {}

trigger: |
  You're the Director of Sales Compliance at "RegTech" — a B2B SaaS
  compliance platform ($250M ARR) that sells to regulated industries
  (financial services, healthcare, government). Your external auditor
  just flagged meeting documentation as a "material weakness" in your
  SOX compliance.

  Auditor's findings:

  Finding 1 — Revenue Recognition Risk:
  47 meeting notes across 23 deals contain language that could be
  interpreted as revenue commitments not reflected in contracts. Examples:
  - "Agreed to give them the enterprise module at no extra charge"
  - "Told them we'd waive implementation fees if they sign by month-end"
  - "Promised a dedicated support team for the first year"
  The auditor says: "These verbal commitments may represent unrecorded
  obligations that affect revenue recognition under ASC 606."

  Finding 2 — Customer Data in Meeting Notes:
  Meeting summaries contain customer PII and competitive intelligence
  that shouldn't be in the CRM without proper data handling controls:
  - Customer employee personal opinions ("Sarah seems unhappy at the
    company, might leave soon")
  - Customer financial information ("Their CFO told us they're running
    out of runway")
  - Third-party competitive data ("They shared CompetitorX's proposal
    with us — pricing attached")
  Data retention: Meeting notes with PII are kept indefinitely with
  no purge process.

  Finding 3 — Inconsistent Documentation Practices:
  - 5 sales regions have 5 different documentation standards
  - No formal documentation policy exists
  - No training on what can/cannot be documented
  - No review process for meeting notes accuracy
  - 12% of meeting notes contradict the signed contract terms

  Remediation deadline: 90 days before next audit

  Current meeting documentation volume:
  - 3,200 meetings per month
  - 800 AEs and CSMs creating documentation
  - CRM: Salesforce with custom Activity fields
  - No automated compliance checks on meeting notes

  Tasks:
  1. Write the compliance audit response plan. Address all 3 findings
     with specific remediation steps, owners, and timelines. For
     Finding 1: how to reconcile verbal commitments with contracts.
     For Finding 2: the data handling policy for meeting notes. For
     Finding 3: the unified documentation standard.

  2. Design the "Meeting Documentation Compliance Framework." Include:
     what AEs can and cannot document (with specific examples),
     the data handling classification for meeting notes, the retention
     and purge policy, the review and approval process for sensitive
     content, and the automated compliance checks to implement.

  3. Create the 90-day remediation project plan. Include: the immediate
     actions (first 2 weeks), the policy development phase (weeks 3-6),
     the training rollout (weeks 7-10), the audit-readiness validation
     (weeks 11-12), and the ongoing monitoring system. Show how you'll
     address 3,200 meetings/month with sustainable processes.

assertions:
  - type: llm_judge
    criteria: "Audit response addresses all 3 findings — revenue recognition risk has specific reconciliation approach, customer data handling gets a clear policy with purge process, and documentation inconsistency gets a unified standard; remediation is realistic within 90 days"
    weight: 0.35
    description: "Complete audit finding response"
  - type: llm_judge
    criteria: "Compliance framework is specific and enforceable — clear examples of what can/cannot be documented, data classification makes sense, retention policy is GDPR-aware, review process is scalable for 3,200 meetings/month, and automated checks are realistic"
    weight: 0.35
    description: "Specific enforceable compliance framework"
  - type: llm_judge
    criteria: "90-day plan is realistic and auditor-ready — phased approach with clear milestones, training reaches 800 people, validation phase proves readiness, and ongoing monitoring prevents recurrence"
    weight: 0.30
    description: "Realistic auditor-ready remediation plan"
