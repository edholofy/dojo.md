meta:
  id: meeting-coaching-program
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Build a meeting documentation coaching program — train and evaluate AEs on meeting summary quality with structured feedback and improvement plans"
  tags: [sales, meetings, coaching, training, quality, enablement, advanced]

state: {}

trigger: |
  You're the Head of Sales Enablement at "CoachStack" — a B2B SaaS
  coaching platform (120 AEs). Your VP of Sales wants a formal coaching
  program for meeting documentation after discovering massive quality
  gaps.

  Quality audit results (you reviewed 50 meeting summaries per AE tier):

  Top-tier AEs (top 20%, 24 AEs):
  - Average summary score: 8.2/10
  - Strengths: Specific attendee mentions, quantified outcomes, clear
    action items
  - Weakness: Some don't capture competitive intelligence
  - Sample: "Met with CFO Sarah Chen and VP Ops David Kim. David
    confirmed 40% time reduction with our pilot. Sarah wants ROI
    analysis showing payback in <6 months. Sending financial model by
    Friday. Demo for their IT team scheduled March 12."

  Mid-tier AEs (middle 50%, 60 AEs):
  - Average summary score: 5.4/10
  - Strengths: Adequate basic information, usually include next steps
  - Weakness: Vague language, missing stakeholder details, no objection
    tracking
  - Sample: "Good demo with the client team. They liked the product.
    Some concerns about pricing. Will follow up next week."

  Bottom-tier AEs (bottom 30%, 36 AEs):
  - Average summary score: 2.8/10
  - Strengths: At least they write something (usually)
  - Weakness: No structure, no details, no action items, often late
  - Sample: "Had a call. Went okay. Need to send them something."
  - 40% of meetings have no documentation at all

  Correlation data:
  - Top-tier win rate: 38% | Mid-tier: 22% | Bottom-tier: 11%
  - Top-tier deal cycle: 52 days | Mid-tier: 74 days | Bottom-tier: 98 days
  - Top-tier customer satisfaction (post-sale): 4.6/5 | Mid-tier: 3.8/5
    | Bottom-tier: 3.1/5

  Constraints:
  - Budget: $50K for the program
  - Timeline: Must show improvement in 90 days
  - AEs resistant to "more admin work"
  - Manager buy-in varies — some coach actively, others don't

  Tasks:
  1. Design the 90-day coaching program with different tracks for each
     tier. For top-tier: mastery refinement. For mid-tier: structured
     improvement with specific skill gaps. For bottom-tier: fundamental
     skills building. Include: curriculum, practice exercises, assessment
     criteria, and weekly time commitment for each tier.

  2. Create the "Meeting Summary Rubric" — a scoring guide managers
     can use to evaluate meeting summaries consistently. Include: 8-10
     dimensions scored, the scoring scale, anchor examples for each
     score level, and a quick-score version for daily use.

  3. Design the incentive and accountability structure. Address: how to
     motivate AEs without making documentation feel punitive, the role
     of managers in coaching, metrics to track progress, and how to
     handle AEs who refuse to improve. Include specific ideas for making
     documentation feel valuable rather than bureaucratic.

assertions:
  - type: llm_judge
    criteria: "Coaching program is tier-appropriate — top-tier gets refinement (competitive intel, executive communication), mid-tier gets structure (templates, feedback loops), bottom-tier gets fundamentals (what to capture, when to document); fits within $50K and 90 days"
    weight: 0.35
    description: "Tier-appropriate coaching program"
  - type: llm_judge
    criteria: "Rubric is practical and consistent — 8-10 scored dimensions, clear scoring scale, anchor examples that match the provided quality samples, and a quick-score version managers can use in 2 minutes"
    weight: 0.35
    description: "Practical scoring rubric"
  - type: llm_judge
    criteria: "Incentive structure motivates without being punitive — uses positive reinforcement, connects documentation to win rates (not compliance), leverages peer learning, addresses manager variation, and has a realistic approach for resistant AEs"
    weight: 0.30
    description: "Motivating incentive structure"
