meta:
  id: cross-functional-meeting-documentation
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Document cross-functional meetings — manage documentation when sales, product, engineering, legal, and customer success all participate in prospect meetings"
  tags: [sales, meetings, cross-functional, collaboration, enterprise, advanced]

state: {}

trigger: |
  You're a Senior Enterprise AE at "PlatformOne" — a B2B SaaS enterprise
  platform ($500K-2M ACV). You're managing a complex deal with NexGen
  Financial where 4 internal teams participated in a 2-hour workshop.

  Account: NexGen Financial, $1.4M ACV, 18-month evaluation

  Workshop attendees (14 people total):

  Customer (7):
  - CTO Diana Reeves (executive sponsor)
  - VP of Engineering Alex Kuznetsov
  - CISO Patricia Gomez
  - Head of Compliance James O'Brien
  - Data Architect Sanjay Verma
  - Project Manager Kelly Tanaka
  - Procurement Director Robert Huang

  Your side (7):
  - You (AE, facilitator)
  - VP of Engineering Todd Mitchell
  - Solutions Architect Nina Park
  - Security Lead Chris Adams
  - Head of Professional Services Maria Lopez
  - Legal Counsel Brian Foster
  - Product Manager Rachel Wong

  Workshop structure and key moments:

  Track 1 — Technical Architecture (45 min, led by Todd & Nina):
  - Alex questioned your microservices architecture: "We've been burned
    by distributed systems complexity"
  - Nina showed the monolith-to-microservices migration path — Alex
    softened
  - Sanjay was concerned about data lineage: "We need full traceability
    for regulatory reporting"
  - Rachel confirmed data lineage is on the Q3 roadmap but not GA yet
  - Diana asked Todd: "What's your biggest technical failure and how
    did you handle it?" Todd gave a candid answer about a 2022 outage.
    Diana nodded approvingly.

  Track 2 — Security & Compliance (30 min, led by Chris & Brian):
  - Patricia requested a penetration test report — Chris provided it
  - James asked about FINRA and SEC compliance: Chris confirmed FINRA,
    said SEC reporting tools are "coming in Q4"
  - James: "SEC compliance is non-negotiable. If it's not ready, we
    can't proceed."
  - Brian and Robert discussed contract terms: Robert wants custom
    indemnification language
  - Patricia asked about breach notification SLA: Chris said 24 hours,
    Patricia wants 4 hours

  Track 3 — Implementation & Success (25 min, led by Maria):
  - Kelly asked about implementation timeline for 2,000 users
  - Maria estimated 6-9 months with phased rollout
  - Diana said "6-9 months is too long. We need to show board progress
    in 4 months."
  - Maria proposed an accelerated plan with Phase 1 (500 users) in 4
    months
  - Kelly asked about change management support — Maria said it's
    included in Professional Services

  Wrap-up (20 min):
  - Diana: "I'm cautiously optimistic. Sanjay and Alex need to validate
    technically. Patricia and James need the compliance gaps addressed.
    Robert, get the commercial terms moving."
  - Robert asked for "best and final" pricing within 2 weeks
  - Diana wants a decision by end of Q2 (14 weeks away)

  Tasks:
  1. Write 4 different meeting summaries — one for each internal team
     that participated (Engineering, Security/Legal, Professional
     Services, and your sales deal team). Each should highlight what's
     relevant to that team's next actions. Also write the customer-facing
     summary for Diana.

  2. Create the "action matrix" — a cross-functional tracker showing
     every commitment and open item, organized by: your team owner, the
     customer contact it relates to, deadline, priority, and dependency
     on other actions. Identify which items are on the critical path.

  3. Build a 14-week deal close plan that coordinates all internal
     teams. Show: the parallel workstreams (technical validation,
     security/compliance, commercial, implementation planning), key
     milestones, and the "gates" Diana's team needs to pass.

assertions:
  - type: llm_judge
    criteria: "Five summaries are genuinely tailored — Engineering focuses on architecture validation and data lineage gap, Security/Legal on FINRA/SEC compliance and breach SLA, Professional Services on accelerated timeline, Sales on deal strategy, Diana's on progress and commitments; not just different headers on the same content"
    weight: 0.35
    description: "Genuinely tailored cross-functional summaries"
  - type: llm_judge
    criteria: "Action matrix is comprehensive and shows dependencies — captures all commitments (SEC compliance timeline, breach SLA negotiation, penetration test, data lineage roadmap, pricing, implementation plan), identifies critical path items that block the deal"
    weight: 0.35
    description: "Comprehensive dependency-aware action matrix"
  - type: llm_judge
    criteria: "14-week plan coordinates parallel workstreams — shows technical, security, commercial, and implementation tracks running in parallel with clear milestones and gates; accounts for Diana's 4-month board progress requirement"
    weight: 0.30
    description: "Coordinated multi-track close plan"
