meta:
  id: competitive-deal-documentation
  level: 3
  course: meeting-summary-next-steps
  type: output
  description: "Document competitive deal intelligence — capture, track, and leverage competitive mentions across meetings to build winning strategies"
  tags: [sales, meetings, competitive, intelligence, strategy, documentation, advanced]

state: {}

trigger: |
  You're a Competitive Intelligence Manager at "WinRate" — a B2B SaaS
  sales intelligence platform ($200M ARR, 300 AEs). You've been asked to
  create a system for extracting and using competitive intelligence from
  meeting documentation.

  Current state: Competitive mentions are buried in meeting notes with
  no structure. When an AE writes "they mentioned CompetitorX," that
  insight dies in the CRM note. Nobody aggregates it.

  Sample competitive mentions from the last month's meeting notes:

  Deal 1 — TechCorp ($180K): AE wrote "They're also looking at Rival.
  Rival offered 30% less but doesn't have our analytics module."
  Deal 2 — FinCo ($95K): AE wrote "Procurement said Rival gave them
  a 3-year lock-in deal. Customer seemed tempted."
  Deal 3 — MedGroup ($220K): AE wrote "CTO used Rival at his last
  company. He's pushing for Rival internally."
  Deal 4 — RetailMax ($150K): AE wrote "They saw Rival's demo last
  week. Said our UI is better but Rival's reporting is stronger."
  Deal 5 — LogiCo ($300K): AE wrote "No competition mentioned."
  (But procurement later told another rep they have 3 vendors in
  evaluation.)
  Deal 6 — DataCorp ($400K): AE wrote "Champion told me off the record
  that NewEntrant is being evaluated. They don't know much about
  NewEntrant but their board member recommended them."
  Deal 7 — CloudFirst ($85K): No competitive section in notes at all.
  Deal 8 — BuildTech ($260K): AE wrote "Competitor demo went poorly
  according to our champion. Their SE couldn't answer security questions."

  Competitive landscape: Primary competitor (Rival) + emerging threat
  (NewEntrant) + 3 smaller niche players

  Tasks:
  1. Analyze the 8 deals and create a structured competitive intelligence
     report. For each deal: extract the competitive situation, assess the
     threat level, identify the competitor's strategy (pricing, product,
     relationship), and recommend the counter-strategy. Flag deals where
     competitive intel is suspiciously absent.

  2. Design the "Competitive Documentation Standard" — the fields AEs
     must complete for competitive intelligence in every meeting summary.
     Include: what to capture (specific competitive mentions, pricing
     intel, feature comparisons, relationship dynamics), how to
     categorize the threat level, and a quick-entry format that takes
     less than 2 minutes.

  3. Create the "Competitive Intelligence Aggregation System" — how to
     compile individual meeting notes into org-wide competitive trends.
     Include: the weekly competitive report format, trend analysis
     (competitor pricing trends, feature gap changes, win/loss patterns),
     alert triggers for new competitive threats, and how to feed insights
     back to product and marketing.

assertions:
  - type: llm_judge
    criteria: "Competitive analysis is thorough — assesses all 8 deals individually, flags Deals 5 and 7 as having suspicious gaps, identifies Rival's pricing strategy and CTO relationship play, spots NewEntrant as emerging board-level threat, recommends specific counter-strategies"
    weight: 0.35
    description: "Thorough competitive deal analysis"
  - type: llm_judge
    criteria: "Documentation standard is structured but fast — defines specific fields (competitor name, intel type, threat level, counter-strategy), categorization is simple, and the format genuinely takes less than 2 minutes to complete"
    weight: 0.35
    description: "Fast structured competitive standard"
  - type: llm_judge
    criteria: "Aggregation system creates organizational value — weekly report shows trends, alert system catches new threats, feedback loops to product and marketing are concrete, and the system transforms individual meeting notes into strategic intelligence"
    weight: 0.30
    description: "Value-creating aggregation system"
