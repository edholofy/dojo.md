meta:
  id: meeting-prep-to-summary-workflow
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Build the meeting prep-to-summary workflow — create a complete system from pre-meeting research through post-meeting documentation"
  tags: [sales, meetings, workflow, preparation, documentation, process, intermediate]

state: {}

trigger: |
  You're a Sales Enablement Lead at "ProcessHub" — a B2B SaaS process
  automation company. Your new VP of Sales wants to standardize the
  entire meeting lifecycle: from preparation through documentation. She
  said: "Our AEs walk into meetings unprepared and walk out with
  nothing documented. I want a system."

  She gave you data from the last quarter:
  - 847 customer meetings were held
  - Only 312 (37%) had pre-meeting notes in CRM
  - Only 498 (59%) had post-meeting summaries
  - Only 189 (22%) had next steps logged with dates
  - Average time from meeting to follow-up email: 27 hours (her target: 2 hours)
  - Win rate for deals with complete meeting documentation: 34%
  - Win rate for deals with incomplete documentation: 16%

  She also shared the top 5 complaints from AEs about meeting
  documentation:
  1. "It takes too long — I'd rather spend time selling"
  2. "I don't know what to write"
  3. "The CRM fields don't match what I need to capture"
  4. "Nobody reads my notes anyway"
  5. "I forget the details by the time I sit down to write"

  Upcoming meeting to use as a test case:
  You have a demo scheduled for tomorrow with PowerGrid Energy
  (500 employees, $120K ACV opportunity). Attendees: CTO, VP of
  Operations, and IT Director. They're evaluating your platform
  against 2 competitors. The CTO saw a webinar last month and
  requested the demo. Their current process automation is mostly
  manual with some Excel macros.

  Tasks:
  1. Create the pre-meeting preparation template. Include: research
     checklist (what to look up before every meeting), meeting
     objective setting, questions to prepare, stakeholder briefing
     format, and competitive intelligence gathering. Fill it out for
     the PowerGrid Energy demo.

  2. Create the during-meeting note-taking framework. Design a
     system that's fast enough to use in real-time (addresses AE
     complaint #1). Include: shorthand notation system, key moments
     to flag, and a one-page capture template.

  3. Create the post-meeting documentation workflow. Include: the
     15-minute documentation process (step by step), the follow-up
     email template, the CRM update checklist, and the handoff
     format for when deals move between team members. Address all 5
     AE complaints with specific solutions.

assertions:
  - type: llm_judge
    criteria: "Pre-meeting template is thorough yet practical — includes research checklist, objective setting, prepared questions, and stakeholder brief; the PowerGrid Energy example shows it in action with specific research items and questions"
    weight: 0.35
    description: "Thorough practical pre-meeting template"
  - type: llm_judge
    criteria: "During-meeting framework is realistically fast — shorthand system is learnable, capture template fits on one page, designed for real-time use without being overwhelming; addresses the 'takes too long' complaint"
    weight: 0.35
    description: "Fast real-time note framework"
  - type: llm_judge
    criteria: "Post-meeting workflow addresses all 5 complaints — time-efficient process, clear structure, CRM-aligned fields, visibility for readers, and real-time capture solutions; 15-minute process is realistic"
    weight: 0.30
    description: "Complaint-addressing post-meeting workflow"
