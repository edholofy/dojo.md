meta:
  id: multi-stakeholder-summary
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Write multi-stakeholder meeting summaries — tailor meeting recaps for different audiences when multiple decision-makers with different priorities attend"
  tags: [sales, meetings, stakeholders, tailored-communication, enterprise, intermediate]

state: {}

trigger: |
  You're an Enterprise AE at "IntegrateHQ" — a B2B SaaS integration
  platform ($50K-300K ACV). You just finished a 90-minute workshop with
  6 attendees from your prospect, each with different priorities.

  Account: GlobalRetail Corp ($180K ACV opportunity)

  Attendees and what they focused on:
  1. Sarah Chen (CIO) — joined for first 30 min only. Asked about
     total cost of ownership, vendor stability, and enterprise SLA.
     Said "I need to see ROI within 12 months." Left saying "Send me
     the executive summary — I'll review over the weekend."

  2. Marcus Johnson (VP Engineering) — technical lead for evaluation.
     Deep questions about API rate limits, webhook reliability, error
     handling. Wants to see architecture diagrams. Said "We need 99.99%
     uptime — anything less is a non-starter."

  3. Lisa Park (VP Operations) — focused on workflow automation and
     process efficiency. Asked "Can we eliminate our 3 manual data
     entry roles?" Interested in the no-code builder.

  4. Kevin Wu (Security Director) — grilled your SE on encryption,
     SOC 2 Type II, penetration testing, and data residency. Wants
     your security assessment questionnaire completed. Said "I have
     veto power."

  5. Amanda Torres (Data Analytics Lead) — excited about real-time
     data sync. Asked about Snowflake/BigQuery connectors. Wants to
     build a POC with her team's use case.

  6. Rob Miller (Procurement) — silent until pricing discussion. Asked
     about volume discounts, payment terms, and contract flexibility.
     Said "We never do 3-year deals."

  Workshop outcomes:
  - General consensus: the platform can solve their integration mess
  - Kevin's security review is the critical gate
  - Marcus wants a technical POC before recommending
  - Sarah wants a business case with ROI projections
  - Lisa wants to map her top 5 workflows to the platform
  - Rob wants "best and final" pricing

  Tasks:
  1. Write 3 different versions of the meeting follow-up:
     a) Executive summary for Sarah (CIO) — focused on ROI, timeline,
        and strategic value. Max 10 sentences.
     b) Technical summary for Marcus and Amanda — focused on
        architecture, capabilities, and POC planning.
     c) Full meeting recap for all attendees — comprehensive with all
        discussion points and action items.

  2. Create a stakeholder influence map based on this meeting. For each
     attendee: their role in the decision, their primary concern, their
     sentiment (positive/neutral/skeptical), and the specific action
     needed to advance them.

  3. Design a "next 30 days" engagement plan that addresses each
     stakeholder's needs in parallel. Show: the critical path to
     decision, dependencies between stakeholders, and the sequence of
     meetings/deliverables needed.

assertions:
  - type: llm_judge
    criteria: "Three summaries are genuinely different — Sarah's is strategic/ROI-focused and concise, Marcus/Amanda's is technical with architecture details, and the full recap covers everything; each speaks to the audience's language and priorities"
    weight: 0.35
    description: "Audience-tailored summaries"
  - type: llm_judge
    criteria: "Stakeholder map accurately captures influence dynamics — Kevin as veto-holder and gate, Sarah as economic buyer, Marcus as technical evaluator, Rob as procurement barrier (no 3-year deals), Lisa as operations champion, Amanda as POC driver"
    weight: 0.35
    description: "Accurate stakeholder influence map"
  - type: llm_judge
    criteria: "30-day plan shows parallel workstreams — security review for Kevin, POC for Marcus/Amanda, business case for Sarah, workflow mapping for Lisa, pricing for Rob; identifies critical path and dependencies"
    weight: 0.30
    description: "Parallel-path engagement plan"
