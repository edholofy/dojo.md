meta:
  id: intermediate-meeting-summary-shift
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Intermediate meeting summary shift — handle a complex deal week with multiple stakeholder meetings, competing deadlines, and documentation quality issues"
  tags: [sales, meetings, multi-deal, stakeholders, quality, shift-simulation, intermediate]

state: {}

trigger: |
  You're a Senior AE at "VelocityCloud" — a B2B SaaS cloud migration
  platform ($100K-500K ACV). It's Wednesday and you have a critical
  deal week. Your manager just told you: "The board wants a pipeline
  review Friday morning. I need your top 3 deals documented perfectly
  by Thursday 5 PM. No exceptions."

  Here's your situation:

  Deal 1 — EnterpriseMax ($320K ACV, closing this month):
  - You had 3 meetings this week (Mon, Tue, Wed morning)
  - Monday: Legal review with their General Counsel (40 min). Your notes
    say: "Legal call — mostly good. A few redlines on the MSA. Need to
    review." [Unacceptable — missing all details]
  - Tuesday: Technical validation with their CTO and 4 engineers (90 min).
    Your notes say: "Long tech meeting. They want proof of Kubernetes
    migration. SE handled most questions. I think it went well." [Vague]
  - Wednesday (this morning): Pricing negotiation with their CFO (30 min).
    You haven't written notes yet. From memory: CFO wants 18% discount
    (you offered 12%), wants Net 60 (your limit is Net 45), asked about
    a payment milestone structure tied to implementation phases. She said
    "Get me a revised proposal by Friday or we push to next quarter."

  Deal 2 — MidScale Corp ($180K ACV, demo stage):
  - You had a group demo yesterday with 6 attendees
  - Your notes from memory: Their VP of IT loved the dashboard, the
    security manager had concerns about FedRAMP certification (you're
    "in process" — not certified yet), the operations director asked if
    you can handle their 10TB daily data migration, their CEO dropped
    in for 5 minutes and asked "why should I pick you over AWS?"
  - No follow-up sent yet — it's been 24 hours

  Deal 3 — StartupGrow ($95K ACV, discovery):
  - Discovery call was LAST WEEK — you haven't documented it at all
  - From memory: founder is passionate about cloud-native, has $2M
    budget for infrastructure, needs to migrate before Series B due
    diligence (4 months away), currently on GCP but wants multi-cloud,
    team of 15 engineers, no procurement process — founder decides

  Tasks:
  1. Rewrite the meeting documentation for all 3 deals to board-review
     quality. For Deal 1, reconstruct proper notes for all 3 meetings.
     For Deal 2, write the complete demo summary. For Deal 3, write the
     discovery call notes from a week-old memory. Be honest about what
     you can and can't recall.

  2. For each deal, write the recommended next steps with specific dates
     and owners, the current risk assessment, and the probability you'd
     put in the CRM. Justify each probability.

  3. Write the pipeline summary your manager will present to the board
     on Friday. It should cover: total pipeline value, weighted pipeline,
     deal-by-deal status with risk flags, and what's needed to close
     each deal. Include a section on "documentation quality confidence"
     — how confident are you in the accuracy of reconstructed notes?

assertions:
  - type: llm_judge
    criteria: "Reconstructed documentation is realistic and honest — Deal 1 notes are detailed for Wed (freshest memory) and acknowledge gaps in Mon/Tue recall, Deal 2 demo summary captures all 6 attendee points, Deal 3 notes flag week-old memory limitations"
    weight: 0.35
    description: "Realistic reconstructed documentation"
  - type: llm_judge
    criteria: "Next steps are specific and risk-aware — Deal 1 has Friday proposal deadline urgency, Deal 2 addresses FedRAMP gap and CEO's competitive question, Deal 3 addresses week-old follow-up gap; probabilities are justified and realistic"
    weight: 0.35
    description: "Specific risk-aware next steps"
  - type: llm_judge
    criteria: "Board pipeline summary is executive-quality — includes total and weighted values, honest risk flags for each deal, clear documentation confidence section that acknowledges reconstructed vs. real-time notes"
    weight: 0.30
    description: "Executive-quality pipeline summary"
