meta:
  id: customer-success-handoff-documentation
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Document sales-to-CS handoffs — create comprehensive transition documentation that preserves meeting intelligence and customer commitments"
  tags: [sales, meetings, handoff, customer-success, transition, documentation, intermediate]

state: {}

trigger: |
  You're a Sales Operations Manager at "HandoffHub" — a B2B SaaS
  platform ($150M ARR, 100 AEs, 40 CSMs). Your biggest post-sale
  problem: customers complain that CS teams don't know what was
  promised during sales meetings. The latest customer survey shows
  47% of new customers say "I had to re-explain everything to the CS
  team."

  Your CEO is frustrated: "We're losing customers in the first 90 days
  because the handoff is broken. The AE makes promises in meetings,
  closes the deal, and moves on. CS inherits a mess."

  You have data from 3 recent problematic handoffs:

  Handoff 1 — TechFlow Inc ($180K ACV, closed 3 weeks ago):
  AE's handoff note: "Great customer. Standard implementation. Contact
  is Sarah, VP of Ops."
  What CS discovered during onboarding:
  - AE promised a custom integration with their proprietary ERP system
    (not in the contract, not mentioned in handoff)
  - AE told them implementation would take 4 weeks (standard is 8 weeks)
  - The actual champion is the CTO, not Sarah — Sarah is the day-to-day
    contact
  - AE offered a "free quarter of premium support" verbally — no record
  - Customer expected weekly check-in calls (AE promised this in a
    meeting)

  Handoff 2 — FinanceFirst ($95K ACV, closed 5 weeks ago):
  AE's handoff note: "Compliance-heavy customer. Be careful with data."
  What CS discovered:
  - Customer requires SOC 2 audit trail for every data access
  - They need monthly compliance reports in a specific format
  - Their legal team requires a BAA amendment before any data migration
  - The procurement director wants quarterly business reviews starting
    Month 2
  - They were told by the AE that their data would be in a dedicated
    (not shared) environment

  Handoff 3 — RetailMax ($240K ACV, closed 2 weeks ago):
  AE's handoff note: "Multi-location rollout. Start with HQ."
  What CS discovered:
  - RetailMax has 45 locations — rollout plan was supposed to be phased
    over 6 months with specific milestones tied to locations
  - The CEO expects a pilot report after 30 days before approving the
    full rollout
  - Three department heads who attended late-stage meetings each have
    different expectations for customization
  - The AE offered a "success guarantee" — full refund if not live in
    all locations by Month 6

  Tasks:
  1. Write the proper handoff documentation for all 3 accounts. Include
     for each: full meeting history summary (reconstruct what you can),
     all commitments and promises made, stakeholder map with roles and
     relationships, implementation expectations, risk factors, and
     customer success criteria.

  2. Design the "Sales-to-CS Handoff Template" that all AEs must
     complete before commission is paid. Include: 15 required fields,
     the meeting intelligence section (key insights from sales meetings),
     the commitment registry (every promise made with source meeting),
     and the customer expectation alignment checklist.

  3. Create the "Handoff Meeting" agenda — a structured meeting between
     AE, CSM, and the customer that happens within 1 week of close.
     Include: the agenda, the handoff document review process, how to
     address discrepancies between what was promised and what's
     contractual, and the mutual success plan format.

assertions:
  - type: llm_judge
    criteria: "Handoff documentation captures all missing information — TechFlow's custom ERP promise and timeline discrepancy, FinanceFirst's compliance requirements and dedicated environment expectation, RetailMax's phased rollout plan and success guarantee; each is complete and actionable for CS"
    weight: 0.35
    description: "Complete handoff documentation"
  - type: llm_judge
    criteria: "Handoff template is comprehensive and enforceable — 15 required fields cover the critical gaps seen in the 3 examples, commitment registry prevents verbal promises from being lost, and the commission-gating mechanism creates real accountability"
    weight: 0.35
    description: "Comprehensive enforceable handoff template"
  - type: llm_judge
    criteria: "Handoff meeting design addresses the transition gap — agenda covers expectation alignment, process for handling contractual vs. verbal commitments is diplomatic, and the mutual success plan creates shared accountability between AE, CSM, and customer"
    weight: 0.30
    description: "Gap-addressing handoff meeting"
