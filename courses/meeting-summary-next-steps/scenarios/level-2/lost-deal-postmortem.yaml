meta:
  id: lost-deal-postmortem
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Write lost deal postmortems — analyze meeting documentation to identify where deals went wrong and extract lessons for the team"
  tags: [sales, meetings, postmortem, lost-deal, analysis, lessons-learned, intermediate]

state: {}

trigger: |
  You're a Sales Manager at "PipelinePro" — a B2B SaaS sales engagement
  platform. You just lost a $240K deal to a competitor after 4 months of
  engagement. Your VP of Sales wants a full postmortem. You have access
  to all meeting summaries from the deal.

  Deal: Enterprise Solutions Group (ESG), $240K ACV, lost to CompetitorX

  Meeting history and summaries your AE wrote:

  Meeting 1 — Discovery (Month 1, Week 1):
  AE's summary: "Good intro call with Director of Sales Ops. They're
  looking for a new sales engagement tool. Currently using spreadsheets.
  Budget TBD. Will schedule demo."
  [No attendee names, no BANT details, no competitive mention]

  Meeting 2 — Demo (Month 1, Week 3):
  AE's summary: "Showed the platform to the team. They liked the email
  sequencing. Some questions about reporting. Scheduling a follow-up."
  [No specific reactions, no objections, no attendee names]

  Meeting 3 — Technical Review (Month 2, Week 1):
  AE's summary: "Tech team reviewed our architecture. Went well. Some
  questions about Salesforce integration. They want to see it working."
  [No details on who attended, what "went well" means, or what concerns]

  Meeting 4 — Business Case (Month 2, Week 3):
  AE's summary: "Presented ROI analysis. VP seemed interested but
  wants to compare with other options. They're also talking to
  CompetitorX."
  [First mention of competition — 7 weeks into the deal]

  Meeting 5 — Executive Meeting (Month 3, Week 1):
  AE's summary: "Our VP met with their CRO. Good conversation about
  strategy. CRO wants to move forward but needs board approval."
  [Vague — what strategy? What did "move forward" mean?]

  Meeting 6 — Negotiation (Month 3, Week 3):
  AE's summary: "Discussed pricing. They think we're 20% too expensive.
  Working on a revised proposal."
  [No details on what they compared to, no value defense]

  Meeting 7 — Final Call (Month 4, Week 2):
  AE's summary: "They went with CompetitorX. Said it was a pricing
  decision. Deal lost."

  What you learned in the loss debrief call with the prospect:
  - CompetitorX was brought in at Month 2 — we didn't know until Month 2.5
  - The CRO's EA told you the CRO was "never fully on board — she
    wanted CompetitorX from the start because she used it at her last
    company"
  - The IT team had concerns about our Salesforce integration that were
    never addressed — they submitted a list of 8 questions after Meeting
    3 that the AE never answered
  - CompetitorX did a live POC; we never offered one
  - The "board approval" was actually a formal vendor evaluation with a
    scoring matrix — we didn't know this

  Tasks:
  1. Write the postmortem analysis. For each of the 7 meetings: identify
     what critical information was missed in the summary, what the AE
     should have documented, and how better documentation would have
     changed the deal outcome.

  2. Identify the 5 "turning points" where this deal was winnable but
     we lost ground. For each: what happened, what should have happened,
     and what better meeting documentation would have revealed.

  3. Create a "Meeting Documentation Failure Patterns" guide based on
     this postmortem. Identify the recurring patterns of bad
     documentation (e.g., no names, no objection tracking, no competitive
     intel) and create a checklist to prevent each pattern.

assertions:
  - type: llm_judge
    criteria: "Postmortem analysis is thorough and specific — identifies information gaps in each meeting (missing names, BANT, competitive intel, technical concerns), connects documentation failures to deal outcome (unanswered Salesforce questions, missed CRO bias, no POC)"
    weight: 0.35
    description: "Thorough postmortem analysis"
  - type: llm_judge
    criteria: "Turning points are correctly identified — competitive entry at Month 2, unanswered technical questions after Meeting 3, CRO's CompetitorX preference not detected, no POC offered, vendor scoring matrix unknown; each has a clear 'what should have happened'"
    weight: 0.35
    description: "Correctly identified turning points"
  - type: llm_judge
    criteria: "Failure patterns guide is systematic and preventive — identifies recurring documentation anti-patterns (vague language, missing stakeholders, no objection tracking), provides specific checklists to prevent each, practical enough for training"
    weight: 0.30
    description: "Systematic failure patterns guide"
