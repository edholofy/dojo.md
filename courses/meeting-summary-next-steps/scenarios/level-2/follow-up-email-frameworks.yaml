meta:
  id: follow-up-email-frameworks
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Master follow-up email frameworks — learn structured approaches for different meeting outcomes including positive, stalled, and objection-heavy meetings"
  tags: [sales, meetings, follow-up, email, frameworks, objection-handling, intermediate]

state: {}

trigger: |
  You're a Senior AE at "SignalCRM" — a B2B SaaS CRM platform. Your
  sales enablement team is building a library of follow-up email
  frameworks. They've asked you to create frameworks for the 4 most
  challenging follow-up scenarios.

  Scenario A — The "Great Meeting, No Commitment" follow-up:
  You had an excellent 45-minute demo with Rachel Torres, VP of Sales
  at MediaGroup (150 people). She said "This is amazing" 3 times. Her
  team was engaged. But when you asked about next steps, she said:
  "Let me think about it and get back to you." You asked "When should
  I follow up?" and she said "Maybe in a couple weeks?" No specific
  commitment was made. It's been 4 days. Silence.

  Scenario B — The "Multiple Objections" follow-up:
  You had a 30-minute call with David Park, IT Director at FinCorp
  (300 people). He raised 5 objections: (1) "It's too expensive,"
  (2) "We tried a CRM migration before and it failed," (3) "My team
  won't adopt a new tool," (4) "Our current CRM works fine," and
  (5) "I don't have budget until Q3." Despite the objections, he
  agreed to another call next week.

  Scenario C — The "Champion Left the Meeting Early" follow-up:
  You had a group demo with 4 people from RetailCo. Your champion,
  Anna Kim (Director of Ops), had to leave after 15 minutes due to
  an emergency. The remaining 3 attendees (2 managers and 1 analyst)
  stayed for the full 45 minutes and were positive but said "Anna
  makes the decisions — we'll wait for her input."

  Scenario D — The "We're Going with Your Competitor" save attempt:
  You received an email from your contact at TechStart saying "We've
  decided to go with HubSpot. Thanks for your time." You've had 3
  great meetings over 2 months. Your last meeting was 3 weeks ago
  and you hadn't followed up since (a mistake).

  Tasks:
  1. Write the follow-up email for each scenario (4 emails). Each
     should use a framework appropriate to the situation: re-engagement
     for A, objection-addressing for B, champion re-briefing for C,
     and competitive save for D.

  2. For each email, explain: the framework you used, why you chose
     that approach, what psychological principle it leverages (e.g.,
     loss aversion, social proof, reciprocity), and what outcome you
     expect.

  3. Create a "Follow-Up Decision Tree" — a flowchart-style guide
     that helps AEs choose the right follow-up approach based on the
     meeting outcome. Include at least 6 different meeting outcome
     categories and the recommended framework for each.

assertions:
  - type: llm_judge
    criteria: "All 4 emails use distinctly different approaches — re-engagement with value add for A (not just checking in), structured objection addressing for B, champion-focused brief for C, competitive differentiation for D; each is professional and not desperate"
    weight: 0.35
    description: "Distinctly different follow-up approaches"
  - type: llm_judge
    criteria: "Framework explanations are insightful — correctly identifies psychological principles (loss aversion for D, social proof for B's adoption concern, reciprocity for A, urgency for C's incomplete demo), explains the strategic logic"
    weight: 0.35
    description: "Insightful framework explanations"
  - type: llm_judge
    criteria: "Decision tree is comprehensive and usable — covers at least 6 meeting outcomes, provides clear branching logic, recommends specific framework for each path, practical enough for an AE to reference quickly"
    weight: 0.30
    description: "Comprehensive follow-up decision tree"
