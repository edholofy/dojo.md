meta:
  id: conversation-intelligence-tools
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Leverage conversation intelligence tools — use AI-generated transcripts and insights from tools like Gong to enhance meeting documentation"
  tags: [sales, meetings, conversation-intelligence, Gong, AI, transcripts, intermediate]

state: {}

trigger: |
  You're a Sales Enablement Manager at "RevTech" — a B2B SaaS revenue
  optimization platform (200 AEs). Your company just deployed Gong for
  conversation intelligence. After 3 months, adoption is mixed: some
  reps love it, others ignore it. Your VP of Sales wants you to create
  the standard operating procedure for using AI-generated meeting data.

  Here's what you're working with:

  Gong data from a recent demo call (AE: Tyler Brooks):
  - Auto-generated transcript: 4,500 words (45-minute call)
  - Gong's AI summary: "Demo of analytics dashboard. Customer was
    interested. Next steps discussed."
  - Gong's topic tracker: Pricing (8 min), Competition (3 min),
    Security (6 min), Integration (12 min), Pricing again (4 min)
  - Gong's talk ratio: AE talked 72% (way too high — benchmark is 45%)
  - Gong's question count: AE asked 3 questions, customer asked 14
  - Gong's sentiment: Overall positive, dip during pricing discussion
  - Key moments flagged: customer said "that's too expensive" at 23:14,
    customer said "when can we start?" at 38:42
  - Competitor mentioned: "DataViz Pro" mentioned 2 times by customer

  Relevant transcript excerpts:
  - At 23:14: Customer: "Honestly, $4,500 a month is more than we
    budgeted. We were thinking $2,500-3,000 range."
  - At 23:45: Tyler: "I understand. Let me see what I can do. I'll
    talk to my manager." [No value justification attempted]
  - At 31:00: Customer: "DataViz Pro offered us a similar package for
    $3,200."
  - At 31:15: Tyler: "Oh, I'm not familiar with their pricing." [No
    competitive differentiation attempted]
  - At 38:42: Customer: "Look, if the price works, when can we start?
    We need this by Q3."
  - At 39:00: Tyler: "Great, I'll send you a proposal." [No timeline
    commitment or urgency creation]

  Tasks:
  1. Write the meeting summary that Tyler SHOULD have written, using
     the Gong data to create a comprehensive, accurate summary. Show
     how AI transcript data + human analysis = better documentation
     than either alone.

  2. Write coaching feedback for Tyler based on the Gong data. Address:
     talk ratio problem, missed competitive differentiation opportunity,
     weak pricing response, failure to create urgency when the customer
     showed buying signals. Be specific with timestamps and quotes.

  3. Create the "Conversation Intelligence SOP" for your 200-person
     sales team. Include: what Gong data to review after every call
     (5 key metrics), how to enhance AI summaries with human context,
     the template for combining AI + human notes, and the quality
     standard for meeting documentation when using CI tools.

assertions:
  - type: llm_judge
    criteria: "Meeting summary leverages Gong data intelligently — uses topic tracking, sentiment shifts, and key moments to create a richer summary than manual notes alone; identifies the pricing objection, competitive mention, and buying signal with specific details"
    weight: 0.35
    description: "AI-enhanced meeting summary"
  - type: llm_judge
    criteria: "Coaching feedback is specific and actionable — cites exact timestamps and quotes, identifies the 72% talk ratio problem, the missed competitive response at 31:00, the weak pricing handling at 23:45, and the missed close attempt at 38:42"
    weight: 0.35
    description: "Specific timestamp-based coaching"
  - type: llm_judge
    criteria: "SOP is practical for 200-person team — includes 5 reviewable metrics, AI+human template, quality standard, and is realistic about what AEs will actually do (not overly complex)"
    weight: 0.30
    description: "Practical CI SOP for sales team"
