meta:
  id: meeting-cadence-framework
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Design meeting cadence frameworks — create structured meeting sequences with appropriate summary templates for each stage of the sales cycle"
  tags: [sales, meetings, cadence, framework, sales-cycle, templates, intermediate]

state: {}

trigger: |
  You're a Sales Operations Manager at "DealFlow" — a B2B SaaS deal
  management platform ($2K-20K/month). Your CEO noticed that deals
  with consistent meeting documentation close 40% faster than those
  without. She wants you to build a structured meeting cadence framework.

  Current problems:
  - AEs schedule meetings randomly with no standard cadence
  - Some deals have 15 meetings before close; similar deals have 3
  - No standard summary template exists — each AE uses their own format
  - Follow-up emails range from 3 sentences to 3 pages
  - Next steps are often not documented until the customer asks "what's
    next?"

  Your sales cycle data:
  - Average sales cycle: 45 days (SMB), 90 days (Mid-Market), 180 days
    (Enterprise)
  - Average meetings per closed deal: 4 (SMB), 8 (Mid-Market), 14
    (Enterprise)
  - Meeting types that occur: discovery, demo, technical deep dive,
    business case review, executive alignment, negotiation, legal/
    procurement, implementation planning
  - Win rate by segment: 30% (SMB), 22% (Mid-Market), 18% (Enterprise)

  Your top performer (Sarah) shared her approach:
  - She sends a summary within 1 hour of every meeting
  - Her summaries always have 3 sections: "What We Discussed," "What
    We Agreed," "What Happens Next"
  - She schedules the next meeting before ending the current one
  - She sends a "mid-week pulse" email between meetings for enterprise
    deals
  - Her win rate: 38% (SMB), 31% (Mid-Market), 26% (Enterprise)

  Tasks:
  1. Design the meeting cadence framework for all 3 segments (SMB,
     Mid-Market, Enterprise). For each: define the standard meeting
     sequence (which meetings in what order), the ideal timing between
     meetings, the purpose and exit criteria for each meeting, and what
     must be documented after each.

  2. Create summary templates for the 4 most common meeting types:
     discovery, demo, negotiation, and implementation planning. Each
     template should include: required sections, recommended length,
     tone guidance, and an example of good vs. bad for that type.

  3. Build the "Meeting Momentum Scorecard" — a way for managers to
     measure if deals have healthy meeting cadence. Include: what metrics
     to track (time between meetings, summary completion rate, next-steps
     adherence), scoring criteria, and intervention triggers when a deal's
     cadence goes off track.

assertions:
  - type: llm_judge
    criteria: "Cadence framework is segment-appropriate — SMB is lean (4 meetings, fast-paced), Mid-Market is structured (8 meetings, clear stages), Enterprise is comprehensive (14 meetings, multi-threaded); each meeting has a clear purpose and exit criteria"
    weight: 0.35
    description: "Segment-appropriate cadence framework"
  - type: llm_judge
    criteria: "Summary templates are practical and differentiated — discovery template focuses on qualification, demo focuses on reactions and objections, negotiation focuses on terms and commitments, implementation focuses on timeline and ownership; good vs. bad examples are realistic"
    weight: 0.35
    description: "Practical differentiated templates"
  - type: llm_judge
    criteria: "Momentum scorecard is measurable and actionable — includes specific metrics (time between meetings, completion rates), clear scoring criteria, and realistic intervention triggers that managers can act on"
    weight: 0.30
    description: "Measurable momentum scorecard"
