meta:
  id: executive-briefing-summary
  level: 2
  course: meeting-summary-next-steps
  type: output
  description: "Write executive briefing summaries — capture high-level strategic discussions with C-suite executives and translate them into actionable deal strategy"
  tags: [sales, meetings, executive-briefing, C-suite, strategy, intermediate]

state: {}

trigger: |
  You're a Strategic Account Executive at "CloudScale" — an enterprise
  cloud infrastructure platform ($500K-2M ACV). Your CRO arranged an
  executive-to-executive briefing between your CEO and the prospect's CEO.
  You attended as the account owner.

  Account: MegaFinance Corp ($1.2M ACV opportunity)
  Meeting: 45-minute lunch meeting at a conference

  Attendees:
  - Your CEO: Jennifer Park
  - Prospect CEO: Robert Chang
  - Prospect CTO: Wei Li (joined for last 15 minutes)
  - You (AE, mostly observing)

  What happened:

  Jennifer and Robert knew each other from a previous company. Casual
  conversation first 10 minutes about industry trends.

  Robert shared his strategic vision (15 min):
  - "We're going through a digital transformation. Our board approved
    $50M over 3 years for tech modernization."
  - "Cloud migration is the #1 priority. We've been on-prem for 20
    years and it's killing our agility."
  - "We had a major outage last quarter — made the news. The board is
    pushing for resilience."
  - "I need a partner, not a vendor. Someone who understands financial
    services."

  Jennifer shared CloudScale's vision (10 min):
  - Talked about financial services customers and compliance
  - Mentioned the new FinServ-specific cloud offering (launching Q3)
  - Offered to connect Robert with the CEO of BankTech (a reference
    customer) for a peer conversation
  - Suggested a joint innovation workshop

  Key commitments and signals:
  - Robert said "I want Wei to fast-track the evaluation. Wei, make
    this a priority."
  - Wei said "We've been looking at AWS and Azure too. Your compliance
    story is better but I need to see performance benchmarks."
  - Robert asked Jennifer about partnership vs. vendor relationship:
    "Would you be open to a strategic partnership with co-development?"
  - Jennifer said "Absolutely. Let's explore what that looks like."
  - Robert mentioned their board meets in 6 weeks to review vendor
    shortlist
  - Jennifer offered a "white glove" implementation team for
    MegaFinance

  Tasks:
  1. Write the meeting summary for internal distribution (your CEO,
     CRO, deal team). This is not a customer-facing email — it's a
     strategic debrief. Include: what was said vs. what was implied,
     relationship dynamics observed, competitive positioning, strategic
     signals, and recommended deal strategy.

  2. Draft the customer-facing follow-up email from Jennifer to Robert
     (your CEO will send it, you're drafting). Tone: peer-to-peer,
     strategic, not salesy. Reference specific topics discussed,
     confirm commitments, and propose next steps.

  3. Create a deal strategy update based on what you learned in this
     meeting. Address: how this changes your deal approach, the new
     timeline (6-week board deadline), competitive strategy against
     AWS/Azure, the partnership angle, and specific actions for the
     next 2 weeks.

assertions:
  - type: llm_judge
    criteria: "Internal debrief captures strategic intelligence — reads between the lines (the outage creates urgency, $50M budget signal, partnership ask implies long-term commitment desire), competitive positioning (compliance advantage over AWS/Azure), and relationship dynamics (prior connection is an asset)"
    weight: 0.35
    description: "Strategic intelligence capture"
  - type: llm_judge
    criteria: "CEO-to-CEO email is appropriately executive-level — peer tone (not salesy), references specific conversation points, confirms the reference customer connection and innovation workshop, proposes next steps without being pushy"
    weight: 0.35
    description: "Executive-level follow-up draft"
  - type: llm_judge
    criteria: "Deal strategy is updated to reflect new intelligence — accounts for 6-week board timeline, leverages partnership angle, plans for competitive differentiation vs AWS/Azure, includes specific 2-week actions (benchmarks for Wei, reference call, workshop scheduling)"
    weight: 0.30
    description: "Intelligence-driven deal strategy update"
