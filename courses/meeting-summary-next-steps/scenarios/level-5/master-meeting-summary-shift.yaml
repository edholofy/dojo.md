meta:
  id: master-meeting-summary-shift
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Master meeting summary shift — handle an IPO roadshow documentation crisis, a customer data breach in meeting records, and an AI ethics violation simultaneously"
  tags: [sales, meetings, IPO, data-breach, AI-ethics, crisis, shift-simulation, master]

state: {}

trigger: |
  You're the CRO of "PublicReady" — a B2B SaaS company ($1.2B ARR)
  in the final 8 weeks before IPO. Three documentation crises hit in
  the same 48 hours. Each has IPO implications.

  Crisis 1 — IPO Roadshow Documentation:
  Your investment bankers just reviewed the S-1 draft and flagged a
  section about "customer intelligence infrastructure." They want you
  to provide:
  - Documentation of your top 50 customer relationships (meeting
    history, health status, renewal probability)
  - Evidence that your forecast accuracy claims are supported by data
  - A risk assessment of customer concentration (top 5 customers = 22%
    of ARR)

  The problem: Your documentation is inconsistent. 12 of the top 50
  accounts have poor documentation. 3 accounts have conflicting
  information between CRM notes and contract terms. One account's notes
  suggest verbal commitments that aren't in the contract — the bankers
  call this "potential undisclosed liability."

  Timeline: Bankers need the documentation package in 72 hours.

  Crisis 2 — Customer Data Breach in Meeting Records:
  Your security team discovered that a CRM data export containing
  meeting notes from 847 customer meetings was posted on a dark web
  forum. The meeting notes contain:
  - Customer strategy discussions ("Our CFO said they're planning a
    $50M acquisition — keep this confidential")
  - Competitive intelligence from customers ("Our competitor told us
    they're raising prices 30%")
  - Personal information about customer employees (opinions, career
    plans, personal circumstances mentioned in meetings)
  - Your internal deal strategy notes ("We can give them 15% but let's
    start at 5% and see if they push back")

  You must notify affected customers under GDPR (72-hour notification
  requirement). The IPO is at risk if this becomes public.

  Crisis 3 — AI Ethics Violation:
  A journalist contacted your PR team about a story they're writing.
  Title: "SaaS Company Uses AI to Secretly Analyze Customer
  Conversations." The journalist obtained an internal memo (leaked by
  a former employee) describing your AI meeting intelligence system.
  The memo includes language like "extract competitive intelligence
  from customer conversations" and "predict customer churn before they
  know it themselves."

  The journalist's angle: Your AI system processes customer conversations
  without explicit consent for AI analysis (separate from recording
  consent), and the system creates profiles of customer behavior that
  customers don't know about.

  The journalist wants a comment by Friday. If the story runs, it could
  torpedo the IPO.

  Tasks:
  1. Address the IPO documentation crisis. Write: the 72-hour plan to
     clean up the top 50 account documentation, the approach for the
     3 accounts with conflicting information, the legal guidance for
     the "verbal commitment" account, and the documentation package
     framework the bankers will receive.

  2. Address the data breach crisis. Write: the GDPR-compliant customer
     notification letter, the internal incident response plan, the
     assessment of IPO impact, and the remediation steps for securing
     meeting documentation going forward.

  3. Address the AI ethics crisis. Write: the response to the journalist
     (statement or interview strategy), the internal review of AI
     consent practices, the customer communication plan if the story
     runs, and the policy changes needed to make your AI practices
     defensible. Include an honest assessment: is the journalist's
     criticism valid?

assertions:
  - type: llm_judge
    criteria: "IPO documentation response is legally defensible — 72-hour plan is realistic, conflicting accounts are handled with documentation accuracy not cover-up, verbal commitment receives proper legal treatment, and the bankers' package meets S-1 requirements"
    weight: 0.35
    description: "Legally defensible IPO documentation"
  - type: llm_judge
    criteria: "Data breach response is GDPR-compliant and comprehensive — notification letter meets 72-hour requirement and content requirements, incident response covers containment and investigation, IPO impact assessment is honest, and remediation prevents recurrence"
    weight: 0.35
    description: "GDPR-compliant breach response"
  - type: llm_judge
    criteria: "AI ethics response is honest and strategic — acknowledges the validity of concerns (doesn't just defend), journalist response is transparent, customer communication is proactive, and policy changes show genuine commitment to ethical AI practices while protecting the IPO timeline"
    weight: 0.30
    description: "Honest strategic AI ethics response"
