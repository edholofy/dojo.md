meta:
  id: documentation-board-strategy
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Present meeting documentation strategy to the board — build the investment case for a documentation transformation as part of IPO preparation"
  tags: [sales, meetings, board, strategy, IPO, investment-case, master]

state: {}

trigger: |
  You're the CRO of "IPOReady" — a B2B SaaS company ($750M ARR, 800
  AEs) in the final 12 months before IPO. The board has asked you to
  present at the next board meeting on "Sales Process Maturity and
  Customer Intelligence Infrastructure." This is one of 3 presentations
  that will determine whether the board approves the IPO timeline.

  Board composition:
  - Chair: Former CEO of a $5B public SaaS company
  - Member 1: Partner at Sequoia Capital (led Series B)
  - Member 2: Former CFO of a public SaaS company
  - Member 3: Operating partner at a PE firm
  - Member 4: Independent director, former McKinsey senior partner

  What the board cares about:
  - Forecast accuracy (currently 62%, target 80%+ for IPO)
  - Sales efficiency metrics (for the S-1 narrative)
  - Process scalability (can the sales process support $2B ARR?)
  - Risk management (what are the risks in customer engagement?)
  - Competitive moat (is the sales process a defensible advantage?)

  Your current documentation metrics:
  - Documentation compliance: 74% (improved from 41% two years ago)
  - Meeting summary quality score: 6.8/10 (up from 3.2)
  - AI-assisted summaries: 45% of meetings (deployed 8 months ago)
  - Forecast accuracy: 62% (up from 48% pre-documentation program)
  - AE productivity: $420K revenue per AE (up from $340K)
  - Customer retention: 91% (up from 85%)
  - Time to document: 8 min avg (down from 28 min)

  Remaining gaps:
  - Forecast accuracy needs to reach 80%+
  - 26% of meetings still undocumented
  - AI summarization quality inconsistent across meeting types
  - No unified competitive intelligence from meetings
  - International documentation varies by region
  - Data governance for AI-generated content not fully formalized

  Investment request: $8M over 12 months to reach IPO readiness
  - $3M: AI/ML infrastructure for meeting intelligence
  - $2M: Headcount (Revenue Intelligence team expansion)
  - $1.5M: CRM and integration upgrades
  - $1M: Training, change management, and compliance
  - $0.5M: External audit and benchmarking

  Tasks:
  1. Create the board presentation (8-10 slides with speaker notes).
     Structure: current state and progress, the gap analysis, the
     investment proposal, the ROI model, the risk if we don't invest,
     and the timeline to IPO readiness. Each slide should have the data
     points a board member would expect to see.

  2. Write the Q&A preparation document. Anticipate the 10 toughest
     questions each board member might ask based on their backgrounds
     (VC perspective, CFO perspective, operations perspective, McKinsey
     perspective) and prepare data-backed answers.

  3. Create the "IPO Readiness Scorecard" for meeting documentation —
     the criteria that need to be met before the S-1 filing. Include:
     the 12 readiness criteria, the current score for each, the target
     score, the gap, and the remediation plan for each gap. This will
     become a living document tracked at every board meeting.

assertions:
  - type: llm_judge
    criteria: "Board presentation is investor-grade — 8-10 slides with data-driven content, shows progress AND gaps honestly, $8M investment is justified with clear ROI, risk framing makes the investment feel necessary not optional, and the narrative connects documentation to IPO readiness"
    weight: 0.35
    description: "Investor-grade board presentation"
  - type: llm_judge
    criteria: "Q&A preparation is board-member-specific — 10 tough questions reflect each member's expertise (VC asks about efficiency metrics, CFO about ROI rigor, McKinsey partner about process scalability, PE partner about benchmarks), answers are data-backed and concise"
    weight: 0.35
    description: "Board-member-specific Q&A preparation"
  - type: llm_judge
    criteria: "IPO readiness scorecard is auditable — 12 criteria are specific and measurable, current vs. target scores are realistic, gaps are honest, and remediation plans have clear owners and timelines that fit within the 12-month IPO timeline"
    weight: 0.30
    description: "Auditable IPO readiness scorecard"
