meta:
  id: comprehensive-meeting-intelligence
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Comprehensive meeting intelligence engagement — serve as the Chief Meeting Intelligence Officer building the complete capability from scratch"
  tags: [sales, meetings, comprehensive, executive, capability-building, transformation, master]

state: {}

trigger: |
  You're hired as the first-ever "Chief Meeting Intelligence Officer"
  at "OmniScale" — a B2B SaaS company ($1.5B ARR, 1,200 AEs, Fortune
  500 customers). This is a newly created C-suite role reporting to the
  CEO. Your mandate: build the meeting intelligence capability from
  zero to world-class in 24 months.

  Why the role was created:
  - Board observed that sales process maturity is the #1 operational
    risk in the company's growth plan ($1.5B → $3B in 3 years)
  - McKinsey audit identified meeting documentation as "the largest
    untapped source of customer intelligence"
  - IPO bankers flagged forecast accuracy (56%) as insufficient for
    public markets
  - 3 major customer escalations in the past year were traceable to
    poor meeting documentation
  - Competitive losses where meeting notes showed early warning signs
    that were ignored

  Your starting resources:
  - Budget: $15M over 24 months
  - Headcount: Authority to hire up to 25 people
  - Executive access: Direct reporting to CEO, seat on the leadership
    team
  - Technology: Existing Salesforce + Gong deployment (underutilized)
  - Data: 18 months of historical meeting data (varying quality)

  Your 24-month goal (as defined by the board):
  1. Forecast accuracy: 56% → 82%
  2. Documentation compliance: 48% → 95%
  3. AE documentation time: 22 min/meeting → <5 min/meeting
  4. Customer NPS impact: +12 points attributable to meeting follow-up
  5. Competitive win rate in documented competitive deals: 35% → 55%
  6. Revenue impact: demonstrate $50M in influenced revenue

  Constraints:
  - Union-represented employees in 2 European offices (any surveillance
    implications need works council approval)
  - Healthcare and financial services customers with strict recording
    policies
  - 30% of AEs are in the field (not video meetings — phone and in-
    person)
  - Existing IT backlog means limited engineering support for first
    6 months
  - 4 regional VPs of Sales who each want different things

  Tasks:
  1. Create your 24-month strategic plan. Include: the 4 phases (assess,
     build, scale, optimize), the 10 key capabilities you'll build, the
     technology roadmap, the organizational design (25 people across what
     roles), the budget allocation, and the milestone-based success
     criteria. Show how you'll hit each of the 6 board targets.

  2. Write your "First 100 Days" plan. Include: the diagnostic
     assessment (what you'll measure and how), the quick wins (what
     delivers visible impact in 90 days), the stakeholder management
     plan (especially the 4 regional VPs), the technology decisions to
     make, and the team structure you'll hire first.

  3. Design the "Meeting Intelligence Operating System" — the complete
     system of people, processes, technology, and metrics that will
     sustain meeting intelligence excellence beyond your tenure. Include:
     the governance model, the technology architecture, the continuous
     improvement mechanism, the skills development program, and how the
     system adapts as the company grows from $1.5B to $3B ARR.

assertions:
  - type: llm_judge
    criteria: "Strategic plan is comprehensive and credible — 4 phases with realistic timelines, 10 capabilities are well-chosen, technology roadmap builds on Salesforce+Gong, 25-person org is well-structured, budget allocation is justified, and there's a clear path to each of the 6 board targets"
    weight: 0.35
    description: "Comprehensive credible strategic plan"
  - type: llm_judge
    criteria: "First 100 days is pragmatic — diagnostic is focused, quick wins deliver visible impact, stakeholder management addresses 4 regional VP concerns, technology decisions are prioritized, and the hiring plan gets critical roles filled first"
    weight: 0.35
    description: "Pragmatic first 100 days"
  - type: llm_judge
    criteria: "Operating system is sustainable — governance ensures continuity, technology architecture scales to $3B, continuous improvement is built-in, and the system works despite constraints (field AEs, European unions, healthcare/finserv policies)"
    weight: 0.30
    description: "Sustainable operating system"
