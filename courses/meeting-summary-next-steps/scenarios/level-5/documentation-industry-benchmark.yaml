meta:
  id: documentation-industry-benchmark
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Create an industry benchmark study for meeting documentation — design, execute, and present a multi-company comparative analysis"
  tags: [sales, meetings, benchmark, industry-study, comparative-analysis, research, master]

state: {}

trigger: |
  You're the founder of a revenue operations research firm. A consortium
  of 12 B2B SaaS companies (ranging from $50M to $3B ARR) has funded a
  $500K benchmark study on meeting documentation practices. Each company
  contributed $40K and full data access for the study.

  Study scope:
  - 12 participating companies
  - Total of 8,200 AEs across the consortium
  - 18 months of meeting data
  - 2.1 million meeting records to analyze
  - 148,000 customer-facing follow-up emails
  - Win/loss data for 87,000 opportunities

  Data collected per company (anonymized):

  Company A ($3B ARR, 1,200 AEs): Documentation compliance 89%,
  AI-assisted 72%, win rate 28%, forecast accuracy 76%
  Company B ($1.2B ARR, 600 AEs): Compliance 67%, AI 45%, win rate 25%,
  forecast 64%
  Company C ($800M ARR, 450 AEs): Compliance 92%, AI 85%, win rate 34%,
  forecast 82%
  Company D ($500M ARR, 350 AEs): Compliance 55%, AI 20%, win rate 21%,
  forecast 52%
  Company E ($400M ARR, 280 AEs): Compliance 78%, AI 60%, win rate 31%,
  forecast 71%
  Company F ($350M ARR, 250 AEs): Compliance 44%, AI 0%, win rate 18%,
  forecast 45%
  Company G ($200M ARR, 180 AEs): Compliance 95%, AI 90%, win rate 36%,
  forecast 85%
  Company H ($150M ARR, 120 AEs): Compliance 38%, AI 10%, win rate 16%,
  forecast 41%
  Company I ($120M ARR, 100 AEs): Compliance 71%, AI 35%, win rate 24%,
  forecast 58%
  Company J ($80M ARR, 70 AEs): Compliance 82%, AI 65%, win rate 30%,
  forecast 74%
  Company K ($60M ARR, 50 AEs): Compliance 61%, AI 25%, win rate 22%,
  forecast 55%
  Company L ($50M ARR, 40 AEs): Compliance 88%, AI 80%, win rate 33%,
  forecast 79%

  Additional data points collected:
  - Average words per summary by company
  - Time from meeting to documentation by company
  - Action item completion rates by company
  - Customer satisfaction with meeting follow-ups by company
  - Documentation tool spend per AE by company
  - Manager review cadence by company

  Tasks:
  1. Design and present the benchmark study findings. Include: the
     methodology, the key findings (at least 8 major insights), the
     correlation analysis between documentation practices and business
     outcomes, the company clusters (group companies by similarity),
     and the "best practices" extracted from top performers (Companies
     C, G, L).

  2. Create the "Benchmark Scorecard" that each company receives.
     Design the individual report format: how each company's metrics
     compare to the consortium average, the peer group, and the top
     quartile. Include: the radar chart dimensions, the gap analysis,
     and specific improvement recommendations based on their position.

  3. Write the "State of Meeting Documentation" annual report summary
     that will be published publicly (anonymized). Include: industry-
     wide findings, the maturity curve, the AI adoption impact analysis,
     the ROI correlation data, and 5 predictions for the next 3 years.
     This should position your firm as the authority on this topic.

assertions:
  - type: llm_judge
    criteria: "Benchmark findings are analytically rigorous — uses the 12-company dataset to draw at least 8 meaningful insights, correlation analysis is sound, company clustering is logical, and best practices from C/G/L are specific and transferable"
    weight: 0.35
    description: "Analytically rigorous benchmark findings"
  - type: llm_judge
    criteria: "Benchmark scorecard is useful to each company — shows relative positioning clearly, radar chart captures meaningful dimensions, gap analysis is actionable, and recommendations are tailored to company position (not generic advice)"
    weight: 0.35
    description: "Individually useful benchmark scorecard"
  - type: llm_judge
    criteria: "Public report is authoritative — anonymized data is presented professionally, industry findings are compelling, AI impact analysis is balanced, and 5 predictions are bold but defensible; positions the firm as a credible authority"
    weight: 0.30
    description: "Authoritative public research report"
