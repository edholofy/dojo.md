meta:
  id: documentation-maturity-model
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Create a meeting documentation maturity model — define the industry standard for evaluating and benchmarking meeting documentation practices"
  tags: [sales, meetings, maturity-model, benchmark, industry-standard, framework, master]

state: {}

trigger: |
  You're a thought leader in B2B SaaS sales operations. A major industry
  analyst firm (think Forrester or Gartner) has commissioned you to
  create the definitive "Meeting Documentation Maturity Model" that will
  be used to evaluate B2B SaaS companies globally.

  The model will be published as a research report and used by:
  - 500+ B2B SaaS companies for self-assessment
  - PE/VC firms evaluating portfolio company operations
  - Boards evaluating sales process maturity
  - Consulting firms as an assessment tool

  Your research base:
  - Interviewed 75 CROs and VPs of Sales across company sizes ($10M
    to $5B ARR)
  - Analyzed documentation practices at 200+ B2B SaaS companies
  - Correlated documentation maturity with business outcomes (win rate,
    forecast accuracy, customer retention, AE productivity)

  Key findings from research:

  Company size patterns:
  - <$50M ARR: 80% have no documentation standard, 15% have basic
    templates, 5% have structured programs
  - $50-200M ARR: 40% no standard, 35% basic, 20% structured, 5%
    advanced
  - $200M-1B ARR: 10% no standard, 30% basic, 40% structured, 18%
    advanced, 2% best-in-class
  - >$1B ARR: 5% no standard, 15% basic, 35% structured, 35% advanced,
    10% best-in-class

  Correlation data (strongest correlations):
  - Documentation maturity to forecast accuracy: r=0.73
  - Documentation maturity to win rate: r=0.61
  - Documentation maturity to customer retention: r=0.58
  - Documentation maturity to AE ramp time (inverse): r=-0.67
  - Documentation maturity to revenue growth: r=0.45

  Dimensions to evaluate (from CRO interviews):
  - Capture: How meeting information is recorded
  - Structure: How meeting data is organized
  - Quality: Accuracy and completeness of documentation
  - Timeliness: Speed from meeting to documentation
  - Integration: Connection to CRM and other systems
  - Intelligence: Extraction of insights from documentation
  - Automation: Use of AI/technology to enhance documentation
  - Accountability: Culture and governance of documentation

  Tasks:
  1. Create the 5-level maturity model. For each level (Ad Hoc,
     Developing, Structured, Advanced, Best-in-Class): define what it
     looks like across all 8 dimensions, the business outcomes typically
     associated with that level, and the investment required to reach
     the next level. Include a self-assessment questionnaire (20
     questions) that companies can use to score themselves.

  2. Create the "Maturity-to-Outcomes" correlation analysis. Show: how
     each maturity level correlates with win rate, forecast accuracy,
     retention, and ramp time. Include the investment vs. return curve
     (where does investment in documentation maturity hit diminishing
     returns?). Identify the "breakeven maturity level" where
     documentation investment pays for itself.

  3. Write the executive summary of the research report (2 pages). It
     should be publishable quality — compelling data, clear framework,
     actionable recommendations, and a narrative that makes CROs and
     boards take documentation maturity seriously.

assertions:
  - type: llm_judge
    criteria: "5-level model is comprehensive and differentiated — each level is clearly distinct across all 8 dimensions, progression is logical, associated business outcomes are realistic and data-informed, and the self-assessment questionnaire is usable"
    weight: 0.35
    description: "Comprehensive differentiated maturity model"
  - type: llm_judge
    criteria: "Correlation analysis is analytical — uses the provided research data, shows maturity-to-outcome relationships, identifies the diminishing returns curve, and the breakeven analysis helps companies determine appropriate investment levels"
    weight: 0.35
    description: "Analytical correlation analysis"
  - type: llm_judge
    criteria: "Executive summary is publishable quality — compelling narrative, data-driven, clear framework summary, actionable recommendations, and authoritative tone appropriate for an analyst firm publication"
    weight: 0.30
    description: "Publishable executive summary"
