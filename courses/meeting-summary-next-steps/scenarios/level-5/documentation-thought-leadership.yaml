meta:
  id: documentation-thought-leadership
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Write meeting documentation thought leadership — author the definitive guide on the future of sales meeting documentation in the AI era"
  tags: [sales, meetings, thought-leadership, future, AI-era, publishing, master]

state: {}

trigger: |
  You're the Chief Revenue Officer of a $1B ARR B2B SaaS company and
  a recognized thought leader in sales operations. Harvard Business
  Review has asked you to write a feature article: "The Death of Meeting
  Notes: How AI Is Transforming the Way Sales Teams Capture and Act on
  Customer Intelligence."

  The article should be provocative, data-driven, and visionary. HBR's
  editor gave you this brief:

  "Our readers are C-suite executives and senior leaders. They want:
  a compelling thesis, supporting evidence, real-world examples, and
  actionable takeaways. Typical length: 3,000-4,000 words. We expect
  original thinking, not a summary of existing practices."

  Your thesis: Meeting documentation is evolving from a manual record-
  keeping task into an AI-powered intelligence system that fundamentally
  changes how sales organizations make decisions. The companies that
  embrace this shift will outperform those that don't by a factor of
  2-3x in revenue efficiency.

  Data you can reference (from your own company + industry research):
  - Companies with AI-powered documentation grow 2.4x faster
  - AI meeting summarization reduces documentation time by 78%
  - NLP analysis of meeting notes predicts deal outcomes with 83%
    accuracy (vs. 55% for stage-based forecasting)
  - 62% of customer intelligence is captured in meetings but never
    reaches the CRM in most companies
  - By 2028, estimated 90% of enterprise sales orgs will use AI for
    meeting documentation (up from 15% today)
  - The "documentation gap" costs B2B SaaS companies an average of
    12% of potential revenue

  Trends to address:
  1. Real-time AI note-taking replacing manual documentation
  2. Sentiment analysis detecting deal risk before humans can
  3. Automated action items with follow-up enforcement
  4. Meeting intelligence feeding into predictive forecasting
  5. Cross-meeting pattern recognition at organizational scale
  6. Privacy and ethical concerns with AI in customer conversations
  7. The human element: what AI can't replace in meeting intelligence

  Tasks:
  1. Write the full HBR article (3,000-4,000 words). Include: a
     compelling opening that challenges conventional thinking, the
     data-driven case for AI-powered documentation, 2-3 real-world
     company examples (can be anonymized), the 5 predictions for
     2026-2030, the ethical considerations, and a call to action for
     leaders.

  2. Write the "counterargument" sidebar — a 500-word piece presenting
     the strongest case against AI meeting documentation (privacy,
     authenticity, over-reliance on technology, the human judgment gap).
     This should be genuinely challenging, not a straw man.

  3. Create the "Leader's Action Guide" — a 1-page companion piece
     that gives executives 5 immediate actions they can take to begin
     the transformation. Each action should be specific enough to
     implement in 30 days.

assertions:
  - type: llm_judge
    criteria: "HBR article is publication-quality — compelling thesis, data-driven arguments, real-world examples, provocative predictions, ethical nuance, and a tone appropriate for C-suite HBR readers; genuinely reads like a thought leadership piece, not a blog post"
    weight: 0.35
    description: "Publication-quality HBR article"
  - type: llm_judge
    criteria: "Counterargument sidebar is genuinely challenging — presents real concerns about AI documentation (privacy, authenticity, over-reliance) that aren't easily dismissed, respects the opposing view, and adds intellectual honesty to the overall piece"
    weight: 0.35
    description: "Genuinely challenging counterargument"
  - type: llm_judge
    criteria: "Leader's action guide is immediately actionable — 5 actions that can genuinely be started in 30 days, specific enough to act on (not 'start thinking about AI'), appropriate for the C-suite audience"
    weight: 0.30
    description: "Immediately actionable leader's guide"
