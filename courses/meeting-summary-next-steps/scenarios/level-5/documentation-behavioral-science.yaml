meta:
  id: documentation-behavioral-science
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Apply behavioral science to meeting documentation — use cognitive psychology and behavioral economics to design documentation systems that drive adoption and accuracy"
  tags: [sales, meetings, behavioral-science, psychology, adoption, nudging, master]

state: {}

trigger: |
  You're a Behavioral Scientist consulting for a B2B SaaS company
  ($600M ARR, 500 AEs) on meeting documentation adoption. Despite 3
  years of effort, documentation compliance is stuck at 55%. The CRO
  hired you because "carrots and sticks haven't worked."

  Your behavioral assessment findings:

  Cognitive biases observed in AEs:
  1. Availability bias: AEs believe they'll remember meeting details,
     so documentation feels unnecessary. Reality: accuracy drops 40%
     after 24 hours.
  2. Present bias: Documenting now has a cost (time), while the benefit
     (better deals) is distant and uncertain. AEs choose to move to the
     next call instead.
  3. Optimism bias: AEs overestimate deal probability, so they
     underdocument risks and objections. "It'll work out."
  4. Status quo bias: AEs developed habits without documentation.
     Changing feels like extra work, not better work.
  5. Social proof gap: AEs don't see peers documenting, so they assume
     it's not expected. Top performers who document don't make it visible.
  6. Choice overload: The CRM has 47 fields to fill. AEs face paralysis
     and skip documentation entirely.
  7. Endowment effect: AEs feel ownership over their deal knowledge and
     resist externalizing it into a system.
  8. Dunning-Kruger effect: Poor documenters believe their documentation
     is adequate. They rate themselves 7/10 when objective score is 3/10.

  Failed interventions:
  - Financial incentives ($500/quarter for documentation compliance):
    Compliance went to 70% for one quarter then dropped to 52% when
    AEs learned to game the system (minimum viable notes).
  - Manager enforcement: Inconsistent — managers with too many direct
    reports couldn't review notes.
  - Gamification: Leaderboard for documentation quality — AEs hated it,
    called it "Big Brother."
  - Training: 4-hour workshop on documentation — knowledge retained
    for 2 weeks, then decay.

  Environmental observations:
  - AEs have an average of 6.3 tools open during meetings
  - Average meeting density: 5.2 meetings per day
  - Back-to-back meetings common (42% have <5 min between meetings)
  - Most AEs document (when they do) at end of day or next morning
  - Top-documenting AEs do it in the first 5 minutes after each meeting

  Tasks:
  1. Design the "Nudge Architecture" for meeting documentation. For each
     of the 8 biases: propose a specific behavioral intervention that
     counters the bias without relying on enforcement or incentives.
     Ground each intervention in behavioral science research. Include:
     the bias, the intervention design, the expected impact, and how to
     test it.

  2. Redesign the documentation environment. Using principles from
     behavioral science (choice architecture, friction reduction, default
     effects): redesign the physical/digital environment where
     documentation happens. Address: the 47-field CRM problem, the
     back-to-back meeting reality, the tool overload, and the timing
     of documentation. Propose the "2-minute documentation" system.

  3. Create the "Behavioral Change Measurement Framework." Traditional
     metrics (compliance rate) don't capture real behavior change.
     Design: leading indicators of behavior change, the stages of
     adoption measurement, how to distinguish genuine improvement from
     gaming, and the 12-month evaluation plan that measures sustained
     change.

assertions:
  - type: llm_judge
    criteria: "Nudge architecture is scientifically grounded — each intervention targets a specific bias, uses established behavioral science techniques (commitment devices, social norms, default effects), avoids enforcement/incentives, and includes testable hypotheses"
    weight: 0.35
    description: "Scientifically grounded nudge architecture"
  - type: llm_judge
    criteria: "Environment redesign is practical — solves the 47-field problem with choice architecture, addresses back-to-back meetings with friction reduction, the 2-minute documentation system is realistic, and designs leverage default effects and implementation intentions"
    weight: 0.35
    description: "Practical environment redesign"
  - type: llm_judge
    criteria: "Behavior change framework goes beyond compliance metrics — measures stages of adoption, distinguishes genuine change from gaming, includes leading indicators of habit formation, and the 12-month plan captures sustained change vs. temporary compliance"
    weight: 0.30
    description: "Beyond-compliance behavior measurement"
