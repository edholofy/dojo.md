meta:
  id: documentation-consulting-engagement
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Design a meeting documentation consulting engagement — build and deliver a comprehensive assessment and transformation program for a Fortune 500 client"
  tags: [sales, meetings, consulting, Fortune-500, transformation, engagement, master]

state: {}

trigger: |
  You're a Managing Partner at a Revenue Operations consulting firm.
  A Fortune 500 company (GlobalMfg, $8B revenue, 3,000 sales reps
  across 45 countries) has engaged your firm for a $2M, 20-week meeting
  documentation transformation.

  Client context:
  - GlobalMfg has 5 business units, each with independent CRM instances
  - Total sales meetings per month: 45,000+
  - Documentation compliance ranges from 85% (best BU) to 12% (worst)
  - No unified conversation intelligence tool
  - 8 different meeting documentation templates across BUs
  - 3 CRM platforms: Salesforce, SAP CRM, Microsoft Dynamics
  - Recent acquisitions added 2 more sales teams with no documentation
  - CEO mandate: "We need a single view of customer engagement across
    all business units by year-end"
  - SVP of Sales (your sponsor): "I can't forecast accurately because
    I don't know what's happening in 70% of customer meetings"

  Discovery phase findings:
  - 67% of sales reps say documentation "doesn't help them sell"
  - 82% of managers say they don't have the data they need from meetings
  - Average time to document a meeting: 35 minutes (reps), 8 minutes
    (top performers who use voice-to-text)
  - 14 regulatory regimes require specific documentation standards
  - IT infrastructure is complex: 5 data centers, hybrid cloud, GDPR/
    CCPA/LGPD compliance required
  - Change management history: 3 failed CRM consolidation attempts in
    5 years. Reps are "change fatigued"

  Your engagement team: 6 consultants, 2 data analysts, 1 change
  management specialist, 1 technology architect

  Tasks:
  1. Design the 20-week engagement plan. Include: the phased approach
     (assessment → design → pilot → scale), deliverables per phase,
     resource allocation, client stakeholder engagement model, risk
     register, and weekly status reporting format. Show how you'll
     manage 5 BUs with different maturity levels simultaneously.

  2. Create the "Meeting Documentation Maturity Assessment" framework
     you'll use to evaluate each BU. Include: the maturity dimensions
     (at least 8), the scoring model (1-5 for each), the data collection
     methodology, the benchmark comparison approach, and the
     prioritization matrix for improvement recommendations.

  3. Design the "Unified Documentation Architecture" recommendation.
     Address: the CRM consolidation approach (or federation alternative),
     the conversation intelligence platform selection criteria, the AI
     summarization strategy that works across 3 CRMs, the global
     template design that accommodates 14 regulatory regimes, and the
     adoption strategy that avoids repeating the 3 previous failures.

assertions:
  - type: llm_judge
    criteria: "Engagement plan is consulting-quality — phased approach with clear deliverables, resource allocation is realistic for a 10-person team across 5 BUs, risk register captures change fatigue and CRM complexity, and the weekly cadence keeps the $2M engagement on track"
    weight: 0.35
    description: "Consulting-quality engagement plan"
  - type: llm_judge
    criteria: "Maturity assessment is rigorous — at least 8 meaningful dimensions, 1-5 scoring is well-anchored, data collection is feasible for 45,000 meetings/month, and benchmarks provide actionable context for improvement"
    weight: 0.35
    description: "Rigorous maturity assessment framework"
  - type: llm_judge
    criteria: "Unified architecture addresses real complexity — CRM approach is pragmatic (not naive consolidation), CI platform criteria are specific, AI strategy works across 3 CRMs, templates handle 14 regulatory regimes, and adoption strategy explicitly addresses change fatigue"
    weight: 0.30
    description: "Reality-grounded unified architecture"
