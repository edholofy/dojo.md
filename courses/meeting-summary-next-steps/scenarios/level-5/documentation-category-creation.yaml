meta:
  id: documentation-category-creation
  level: 5
  course: meeting-summary-next-steps
  type: output
  description: "Create the 'Meeting Intelligence' category — define, position, and launch a new software category at the intersection of conversation intelligence and sales documentation"
  tags: [sales, meetings, category-creation, product-strategy, market, positioning, master]

state: {}

trigger: |
  You're the CEO of a VC-backed startup ($15M ARR, Series B) that
  has built a product at the intersection of conversation intelligence
  and meeting documentation. Your board wants you to create a new
  category: "Meeting Intelligence" — distinct from existing categories
  like conversation intelligence (Gong, Chorus) and note-taking
  (Otter, Fireflies).

  Your thesis: Existing tools either capture meetings (Gong) or
  document them (Otter) but don't connect meeting intelligence to
  business outcomes. "Meeting Intelligence" is the layer that turns
  conversations into actionable revenue intelligence.

  Market landscape:
  - Conversation Intelligence: $4.2B market (Gong, Chorus, Salesloft)
    Focus: recording, transcription, coaching
  - Meeting Productivity: $1.8B market (Otter, Fireflies, Avoma)
    Focus: note-taking, transcription, action items
  - Revenue Intelligence: $3.1B market (Clari, Gong, 6sense)
    Focus: forecasting, pipeline management
  - YOUR CATEGORY (Meeting Intelligence): connecting what happens in
    meetings to what happens in deals, at organizational scale

  Your product differentiators:
  1. Deal-context-aware AI summarization (uses CRM + meeting data)
  2. Cross-meeting pattern recognition (trends across an entire account)
  3. Meeting-driven forecast adjustments (sentiment → probability)
  4. Automated documentation quality scoring
  5. Multi-stakeholder relationship mapping from meeting data
  6. Competitive intelligence extraction and aggregation

  Category creation playbook:
  - Name: "Meeting Intelligence"
  - Tagline: "From conversation to conviction"
  - ICP: B2B SaaS companies with 50-1,000 AEs
  - Key metric you own: "Meeting Intelligence Score" — a composite
    metric of documentation quality, action item completion, and
    meeting-to-outcome correlation

  Competition's likely response:
  - Gong: "We already do this" (they partially do)
  - Otter: "We're adding AI features" (surface-level)
  - Clari: "Meeting data feeds our forecast" (limited integration)
  - Salesforce: "We'll build this natively" (unlikely in <2 years)

  Tasks:
  1. Write the category definition document. Include: what Meeting
     Intelligence is (and isn't), the 5 capabilities that define the
     category, the buying criteria customers should use, the market
     size estimate, and how Meeting Intelligence relates to (but differs
     from) conversation intelligence, note-taking, and revenue
     intelligence. This will be published as a "definitive guide."

  2. Create the analyst briefing deck (for Forrester/Gartner). Include:
     the category definition with supporting data, the market dynamics
     that created the need, your company's position as the category
     leader, the competitive landscape mapped to your category criteria,
     and the request for the analyst to create a Wave or Magic Quadrant.

  3. Design the category launch campaign. Include: the thought
     leadership content calendar (12 months), the analyst relations
     strategy, the customer proof points needed, the event strategy
     (speaking, sponsoring, hosting), and the metrics to track category
     adoption and awareness.

assertions:
  - type: llm_judge
    criteria: "Category definition is clear and defensible — Meeting Intelligence is distinctly positioned vs. conversation intelligence, note-taking, and revenue intelligence; 5 defining capabilities are unique to the category, buying criteria favor your product, and market size is credibly estimated"
    weight: 0.35
    description: "Clear defensible category definition"
  - type: llm_judge
    criteria: "Analyst briefing is persuasive — presents the category with data-backed market dynamics, maps competitors to your criteria (showing gaps), makes a credible case for a new Wave/MQ, and positions your company as the natural category leader"
    weight: 0.35
    description: "Persuasive analyst briefing"
  - type: llm_judge
    criteria: "Launch campaign is comprehensive and executable — 12-month content calendar is realistic, analyst strategy is specific, proof point requirements are concrete, event strategy is strategic, and tracking metrics measure real category adoption"
    weight: 0.30
    description: "Comprehensive executable launch campaign"
