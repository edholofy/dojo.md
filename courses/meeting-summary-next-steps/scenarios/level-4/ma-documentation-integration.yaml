meta:
  id: ma-documentation-integration
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Integrate meeting documentation post-M&A — harmonize meeting documentation systems, standards, and cultures when two sales organizations merge"
  tags: [sales, meetings, M&A, integration, harmonization, culture, expert]

state: {}

trigger: |
  You're the Chief Revenue Officer at "AcquireCo" — a B2B SaaS company
  ($600M ARR, 400 AEs) that just acquired "TargetCo" ($150M ARR, 120
  AEs) for $900M. You have 6 months to integrate the sales organizations.

  Documentation landscape comparison:

  AcquireCo (your company):
  - CRM: Salesforce Enterprise
  - Documentation standard: Strict — 95% compliance with structured
    meeting notes template
  - Conversation intelligence: Gong (85% adoption)
  - Quality score: 7.8/10 average
  - Culture: Process-driven, documentation-heavy, manager review of
    every summary
  - Win rate: 24% (process helps mid-performers, frustrates top ones)
  - Common complaint: "We spend more time documenting than selling"

  TargetCo (acquired company):
  - CRM: HubSpot
  - Documentation standard: None — each AE does their own thing
  - Conversation intelligence: None
  - Quality score: 3.2/10 average (when notes exist at all)
  - Culture: Relationship-driven, "the deal is in my head"
  - Win rate: 31% (top performers thrive, bottom ones have no support)
  - Common complaint: "Don't add bureaucracy to our sales process"

  Integration challenges:
  1. CRM migration: HubSpot to Salesforce (IT says 4-month project)
  2. 120 TargetCo AEs have never used Salesforce or Gong
  3. TargetCo's top 10 AEs (who generate 40% of TargetCo revenue)
     explicitly threatened to quit if "forced into AcquireCo's bureaucracy"
  4. 3 TargetCo customers have overlapping relationships with AcquireCo
     customers — documentation reveals conflicting pricing and promises
  5. TargetCo has institutional knowledge locked in people's heads,
     not systems — 8 key accounts have zero CRM documentation
  6. Cultural clash: AcquireCo managers want compliance; TargetCo
     managers want autonomy

  Board expectation: Integrated sales org with unified CRM and
  documentation by Month 6. Cross-sell revenue of $20M in first year.

  Tasks:
  1. Design the documentation integration plan. Address: the CRM
     migration timeline and how to preserve TargetCo's tribal knowledge
     during migration, the documentation standard that works for both
     cultures (not just forcing your standard on them), and how to handle
     the 3 overlapping customer situations.

  2. Create the "Knowledge Transfer Protocol" — how to extract the
     institutional knowledge from TargetCo AEs' heads into the CRM
     before it's lost. Include: the interview process, the documentation
     template for undocumented accounts, incentives for participation,
     and the timeline. Special focus on the 8 zero-documentation accounts.

  3. Write the communication plan for both organizations. Include:
     the announcement message to AcquireCo AEs (who fear TargetCo AEs
     won't follow the rules), the message to TargetCo AEs (who fear
     losing autonomy), the plan for the top 10 TargetCo performers,
     and the change management approach for the cultural integration.

assertions:
  - type: llm_judge
    criteria: "Integration plan finds middle ground — doesn't just force AcquireCo's standard on TargetCo, addresses CRM migration pragmatically, has a plan for overlapping customers with conflicting pricing, and preserves what works in both cultures"
    weight: 0.35
    description: "Balanced documentation integration"
  - type: llm_judge
    criteria: "Knowledge transfer protocol is urgent and practical — captures tribal knowledge before it walks out the door, has a realistic process for the 8 undocumented accounts, includes incentives that actually motivate AEs, and fits within the 6-month timeline"
    weight: 0.35
    description: "Urgent practical knowledge transfer"
  - type: llm_judge
    criteria: "Communication plan addresses both sides' fears — AcquireCo's fear of quality dilution AND TargetCo's fear of bureaucracy, has a credible plan for the top 10 performers (who threatened to quit), and frames integration as improvement for everyone"
    weight: 0.30
    description: "Dual-audience communication plan"
