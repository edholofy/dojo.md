meta:
  id: documentation-customer-experience
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Optimize documentation for customer experience — design meeting follow-ups and summaries that strengthen customer relationships and accelerate decisions"
  tags: [sales, meetings, customer-experience, relationships, trust, perception, expert]

state: {}

trigger: |
  You're the VP of Customer Experience at "TrustSaaS" — a B2B SaaS
  company ($300M ARR). Your NPS dropped 8 points last quarter. Customer
  feedback analysis reveals a surprising pattern: 34% of detractor
  comments mention meeting follow-ups.

  Customer verbatim feedback:

  Category 1 — "They don't listen" (42% of meeting complaints):
  - "I told them 3 times we need HIPAA compliance and it wasn't in
    the follow-up email"
  - "The summary didn't mention my main concern at all"
  - "They sent a generic template — I could tell they didn't actually
    capture what we discussed"
  - "The meeting notes from their side contradicted what I said"

  Category 2 — "They don't follow through" (31% of meeting complaints):
  - "The summary said they'd send the proposal by Friday. It's now
    the following Thursday."
  - "Next steps listed things for MY team but nothing for theirs"
  - "They committed to connecting me with a reference customer 3
    meetings ago. Still waiting."
  - "Every meeting ends with the same vague 'we'll follow up' but
    nothing specific happens"

  Category 3 — "They waste my time" (18% of meeting complaints):
  - "Every meeting starts with 10 minutes re-explaining what we
    discussed last time"
  - "I had to repeat the same requirements to 3 different people on
    their team"
  - "The handoff from sales to CS was terrible — nobody knew what
    was promised in the sales meetings"
  - "We spent 30 minutes reviewing things I'd already confirmed
    via email"

  Category 4 — "They're disorganized" (9% of meeting complaints):
  - "I never received a summary of our meeting"
  - "Their summary had the wrong attendee names"
  - "They mixed up our company with another customer in the notes"
  - "I got a follow-up email clearly meant for a different account"

  Data points:
  - Customers who receive summaries within 2 hours: NPS 62
  - Customers who receive summaries after 24+ hours: NPS 41
  - Customers who report accurate summaries: 94% retention
  - Customers who report inaccurate summaries: 76% retention
  - Deals with 3+ follow-through failures: 12% close rate

  Tasks:
  1. Design the "Customer-Centric Documentation Standard" — a meeting
     documentation approach optimized for customer experience. Address
     each of the 4 complaint categories with specific solutions. Include:
     the active listening capture technique, the mutual accountability
     format, the continuity system (so nothing gets repeated), and the
     quality control checklist.

  2. Create the customer follow-up email framework that builds trust.
     Include: the structure that proves you listened (mirroring language),
     the balanced action item format (your actions AND theirs), the
     continuity references (linking to previous discussions), and 3
     example emails showing before/after transformation.

  3. Design the measurement system. Include: the customer-side metrics
     (satisfaction with meeting follow-ups, perception of organization),
     the internal metrics (follow-through rate, summary accuracy, time
     to send), and the feedback loop that continuously improves
     documentation quality based on customer input.

assertions:
  - type: llm_judge
    criteria: "Documentation standard addresses all 4 complaint categories — listening capture techniques for 'don't listen,' mutual accountability for 'don't follow through,' continuity system for 'waste time,' quality checks for 'disorganized'; each solution is specific and practical"
    weight: 0.35
    description: "Complaint-addressing documentation standard"
  - type: llm_judge
    criteria: "Follow-up framework builds trust — uses mirroring language to prove listening, balanced action items show mutual commitment, continuity references eliminate repetition, and before/after examples show dramatic quality improvement"
    weight: 0.35
    description: "Trust-building follow-up framework"
  - type: llm_judge
    criteria: "Measurement system connects documentation to NPS — customer-side metrics are measurable, internal metrics drive quality, and the feedback loop creates continuous improvement based on real customer input"
    weight: 0.30
    description: "NPS-connected measurement system"
