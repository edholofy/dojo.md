meta:
  id: documentation-compensation-alignment
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Align compensation with documentation quality — design incentive structures that reward meeting documentation excellence without creating perverse incentives"
  tags: [sales, meetings, compensation, incentives, alignment, behavior, expert]

state: {}

trigger: |
  You're the VP of Sales at "IncentivePro" — a B2B SaaS company ($300M
  ARR, 250 AEs). Your board approved tying meeting documentation quality
  to compensation, but your Head of HR warned: "Every incentive creates
  a behavior. Make sure you're incentivizing the right behavior."

  Current compensation structure:
  - Base: $90K-130K depending on level
  - Variable: 50% of OTE tied to quota attainment
  - Accelerators: 1.5x for 100-120%, 2x for 120%+
  - No documentation component currently
  - SPIFs: Occasional $500-2,000 bonuses for specific behaviors

  Documentation data by AE performance:
  - Top 20% by revenue: Average doc quality 7.1/10, compliance 82%
  - Middle 60% by revenue: Average doc quality 4.8/10, compliance 58%
  - Bottom 20% by revenue: Average doc quality 3.2/10, compliance 39%
  - Interesting anomaly: 5 top performers have quality <4/10 (they win
    on relationships, not process)
  - Another anomaly: 8 AEs have quality >8/10 but are below quota (they
    over-document and under-sell)

  Previous incentive attempts at other companies (cautionary tales):
  1. Company A tied 10% of variable to documentation → AEs wrote
     minimum viable notes to check the box. Quality didn't improve.
  2. Company B gave $500/quarter for top documentation score → AEs
     gamed the scoring system by writing long notes with keywords.
  3. Company C made documentation a gate for commission payment → Top
     performers revolted, 3 quit. Revenue dropped 8%.
  4. Company D used peer review of meeting notes → Created resentment
     and political dynamics. Abandoned after 6 months.

  Constraints:
  - Cannot reduce existing OTE (market competitive)
  - Must not create a system that punishes top performers who close
     deals but don't document well
  - Must not reward documentation quantity over quality
  - Must be measurable and auditable
  - Must work across cultures (US, EMEA, APAC teams)
  - HR requires equal application — cannot have different rules for
     different performers

  Tasks:
  1. Design the compensation model that aligns documentation with
     revenue outcomes. Include: the specific comp structure changes,
     how documentation quality is measured (avoiding gaming), the
     weighting relative to revenue targets, and how you handle the
     anomalies (top sellers who don't document, great documenters
     who don't sell).

  2. Create the anti-gaming framework. For each of the 4 cautionary
     tales: explain what went wrong, design the specific safeguard
     that prevents the same failure, and show how your model avoids
     each pitfall.

  3. Write the rollout communication for 3 audiences:
     a) The all-hands announcement explaining the change
     b) The FAQ for AEs (anticipating their objections)
     c) The manager guide for coaching conversations about
        documentation-linked comp

assertions:
  - type: llm_judge
    criteria: "Compensation model is well-designed — documentation component is meaningful but not punitive, measurement avoids gaming, anomaly handling is fair (doesn't punish top sellers or reward over-documenters), and the model drives quality not quantity"
    weight: 0.35
    description: "Well-designed documentation compensation"
  - type: llm_judge
    criteria: "Anti-gaming framework learns from failures — addresses all 4 cautionary tales with specific safeguards, identifies the behavioral dynamics that create gaming, and designs measurement systems that are resistant to manipulation"
    weight: 0.35
    description: "Failure-informed anti-gaming framework"
  - type: llm_judge
    criteria: "Communications address all audiences appropriately — all-hands is transparent about the change, FAQ anticipates real objections, manager guide enables coaching conversations; all three maintain positive framing without being disingenuous"
    weight: 0.30
    description: "Audience-appropriate communications"
