meta:
  id: ai-meeting-documentation-platform
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Design an AI-powered meeting documentation platform — architect a system that uses LLMs, conversation intelligence, and CRM integration to automate and enhance documentation"
  tags: [sales, meetings, AI, platform, architecture, LLM, automation, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "SmartSales" — a B2B SaaS
  company ($400M ARR, 500 AEs). Your CEO wants to build an internal
  "AI Meeting Intelligence" platform that could eventually become a
  product. Budget: $3M over 2 years, team of 8 engineers.

  Current documentation problems at scale:
  - 12,000 customer meetings per month across 500 AEs
  - Only 45% have any documentation
  - Gong captures transcripts but AI summaries are generic and miss
    deal context
  - CRM data is disconnected from meeting data
  - Managers spend 8 hours/week reviewing meeting notes for pipeline
    accuracy
  - No way to detect documentation quality at scale

  Requirements for the AI platform:

  Core capabilities:
  1. Auto-generate meeting summaries from Gong/Zoom transcripts
  2. Enrich summaries with CRM context (deal stage, stakeholder map,
     competitive landscape, previous meeting history)
  3. Extract and track action items with automatic follow-up reminders
  4. Score documentation quality automatically
  5. Detect competitive intelligence, sentiment shifts, and risk signals
  6. Generate personalized follow-up emails (draft, not auto-send)
  7. Feed meeting intelligence into forecasting models

  Technical constraints:
  - Must integrate with: Salesforce, Gong, Zoom, Gmail, Slack
  - Must comply with SOC 2, GDPR, and CCPA
  - LLM processing costs must be under $5/meeting
  - Latency: summary available within 15 minutes of meeting end
  - Must handle multi-language meetings (English, Spanish, German,
    Japanese)
  - Data retention: meeting data must be purgeable per GDPR

  Stakeholder requirements:
  - AEs: "Make it faster than typing notes manually"
  - Managers: "Show me which deals are at risk from meeting patterns"
  - Executives: "Give me confidence in the forecast"
  - Legal: "Don't create compliance liability from recorded meetings"
  - IT: "Don't add another tool that nobody uses"

  Tasks:
  1. Design the platform architecture. Include: data flow from meeting
     to documentation, the AI pipeline (transcription → enrichment →
     summarization → action extraction → quality scoring), the
     integration layer, and the data model. Address the $5/meeting cost
     constraint with specific LLM model choices and optimization
     strategies.

  2. Define the AI prompt engineering strategy for meeting summaries.
     Show: how to inject CRM context into prompts, how to handle
     different meeting types (discovery vs. demo vs. negotiation), how
     to extract structured data (action items, competitive mentions,
     sentiment), and quality control mechanisms (hallucination detection,
     accuracy validation).

  3. Create the rollout and adoption plan. Include: the MVP scope (what
     ships in Month 3), the feature roadmap (Months 4-24), the adoption
     strategy (lessons from the Gong adoption challenge), success metrics
     by phase, and the governance model for AI-generated content (who
     reviews, who approves, liability for AI-generated follow-up emails).

assertions:
  - type: llm_judge
    criteria: "Architecture is technically sound — data flow is complete from meeting to output, AI pipeline stages are well-defined, integration points are specified, and the $5/meeting cost is addressed with specific model choices and optimizations (e.g., smaller models for extraction, larger for summarization)"
    weight: 0.35
    description: "Technically sound platform architecture"
  - type: llm_judge
    criteria: "Prompt engineering strategy is sophisticated — shows CRM context injection, meeting-type differentiation, structured data extraction approaches, and quality control mechanisms including hallucination detection"
    weight: 0.35
    description: "Sophisticated prompt engineering strategy"
  - type: llm_judge
    criteria: "Rollout plan is realistic — MVP is achievable in 3 months, roadmap is logical, adoption strategy learns from Gong challenges, and governance model addresses AI liability concerns"
    weight: 0.30
    description: "Realistic AI platform rollout plan"
