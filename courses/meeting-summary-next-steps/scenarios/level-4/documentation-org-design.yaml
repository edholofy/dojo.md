meta:
  id: documentation-org-design
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Design the meeting documentation organization — build the team, processes, and operating model for documentation excellence at scale"
  tags: [sales, meetings, organization, team-design, operating-model, scale, expert]

state: {}

trigger: |
  You're the Chief Revenue Officer at "ScaleOps" — a B2B SaaS company
  growing from $200M to $500M ARR over the next 3 years. You currently
  have 300 AEs and plan to hire 200 more. The CEO approved a new
  "Revenue Intelligence" function — you need to design it.

  The Revenue Intelligence function will own:
  1. Meeting documentation standards and quality
  2. Conversation intelligence platform (Gong)
  3. AI meeting summarization and enrichment
  4. Forecast intelligence (documentation-driven)
  5. Competitive intelligence from meetings
  6. Onboarding new AEs (documentation-related training)

  Current state (fragmented):
  - Sales Ops owns CRM fields (2 people, part-time)
  - Sales Enablement owns training (1 person, part-time)
  - IT owns Gong administration (0.5 FTE)
  - Nobody owns quality or AI summarization
  - Nobody owns competitive intelligence aggregation

  Budget: $2.5M annual for the function (headcount + tools)
  Timeline: Team built and operational in 6 months

  Hiring considerations:
  - Revenue Intelligence Lead: $250K+ comp, rare skill set
  - Data analysts: $120K each, need SQL + sales knowledge
  - Enablement specialists: $100K each, need coaching skills
  - AI/ML engineer: $200K, needed for custom models
  - Content specialists: $90K each, for templates and standards
  - Tools budget: $800K/year (Gong, Salesforce, AI tools)

  Questions from your leadership team:
  - VP of Sales: "Will this team have authority over my AEs' documentation?"
  - VP of Engineering: "Do we need our own ML engineer or can we use
    the platform team?"
  - Head of Sales Enablement: "Am I losing my documentation training
    responsibilities?"
  - CFO: "How do you measure the output of this team?"
  - CEO: "How does this function scale as we go from 300 to 500 AEs?"

  Tasks:
  1. Design the organizational structure for the Revenue Intelligence
     function. Include: the org chart with roles and reporting lines,
     job descriptions for the top 3 roles, the headcount plan by quarter,
     and the total compensation model within the $2.5M budget. Show how
     the function relates to Sales, Sales Ops, Enablement, and IT.

  2. Create the operating model. Include: the team's core processes
     (daily, weekly, monthly, quarterly cadences), the service-level
     agreements with other teams, the decision rights framework (who
     has authority over what), and the escalation path. Answer each of
     the 5 leadership questions.

  3. Design the scaling plan from 300 to 500 AEs. Include: which parts
     of the function scale linearly (need more people) vs. which scale
     through technology (AI), the critical hiring triggers, and the
     long-term vision for the function (what it looks like at $1B ARR).

assertions:
  - type: llm_judge
    criteria: "Org structure is well-designed — roles are clearly defined, reporting lines make sense, headcount plan fits within $2.5M budget, and the function's relationship to Sales, Enablement, and IT is clear and avoids turf conflicts"
    weight: 0.35
    description: "Well-designed org structure"
  - type: llm_judge
    criteria: "Operating model answers all 5 leadership questions — VP Sales' authority concern, Engineering's ML resource question, Enablement's scope concern, CFO's measurement question, and CEO's scaling question; SLAs and decision rights are specific"
    weight: 0.35
    description: "Complete operating model"
  - type: llm_judge
    criteria: "Scaling plan is thoughtful — identifies what scales with people vs. technology, hiring triggers are specific (not just 'when we need it'), and the $1B ARR vision shows the evolution of the function"
    weight: 0.30
    description: "Thoughtful scaling plan"
