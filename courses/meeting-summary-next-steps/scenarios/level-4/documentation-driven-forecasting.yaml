meta:
  id: documentation-driven-forecasting
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Build documentation-driven forecasting — use meeting intelligence data to improve pipeline forecasting accuracy and predict deal outcomes"
  tags: [sales, meetings, forecasting, pipeline, prediction, data-science, expert]

state: {}

trigger: |
  You're the SVP of Revenue at "ForecastPro" — a B2B SaaS company
  ($450M ARR, 400 AEs). Your board is demanding forecast accuracy
  improve from 55% to 80%+ within 3 quarters. Your hypothesis: meeting
  documentation contains the signals to predict deal outcomes better
  than CRM stage alone.

  Your data science team ran a preliminary analysis:

  Meeting documentation signals correlated with deal outcomes:
  1. "Champion engagement" — deals where the champion attended 80%+
     of meetings: 45% win rate vs. 12% when champion attended <40%
  2. "Multi-threading depth" — deals with 4+ unique customer attendees:
     38% win rate vs. 15% with 1-2 attendees
  3. "Next-steps specificity" — deals where next steps included dates
     and owners: 41% win rate vs. 9% when vague or blank
  4. "Objection documentation" — deals with documented objection
     responses: 35% win rate vs. 18% with no objection tracking
  5. "Meeting cadence" — deals with meetings every 7-10 days:
     40% win rate vs. 8% when gap exceeded 21 days
  6. "Sentiment trajectory" — deals where meeting sentiment improved
     over time: 42% win rate vs. 11% for declining sentiment
  7. "Executive engagement timing" — deals where exec meetings happened
     in the middle of the cycle: 37% win rate vs. 22% at the end

  Current forecast model (stage-based):
  - Discovery: 10% probability
  - Qualified: 25%
  - Demo/Evaluation: 40%
  - Negotiation: 60%
  - Verbal Commit: 85%
  - Closed Won: 100%
  - Accuracy: 55%

  Challenge: 73% of AEs are in "Negotiation" or later for at least one
  deal that's actually stalled. The stage-based model can't detect this.

  Proposed AI signals to add from meeting documentation:
  - Natural language sentiment analysis from meeting summaries
  - Action item completion rate per deal
  - Days since last meeting with the economic buyer
  - Competitive mention frequency and context
  - Buying committee coverage score (% of decision-makers engaged)

  Tasks:
  1. Design the "Documentation-Enhanced Forecast Model." Show: how to
     combine stage-based probabilities with meeting documentation signals,
     the weighting algorithm for each signal, how to detect stalled deals
     that look active based on stage alone, and the confidence scoring
     system. Include a worked example with 3 sample deals.

  2. Create the "Deal Health Dashboard" that visualizes meeting
     intelligence signals. Define: the 8 key metrics displayed per deal,
     the alert system for at-risk deals, the manager workflow for
     reviewing flagged deals, and the presentation format for the weekly
     forecast meeting.

  3. Write the rollout plan for transitioning from stage-based to
     documentation-enhanced forecasting. Address: how to validate the
     model against historical data, the parallel-run period (old and new
     model), the change management for AEs and managers, and how to
     maintain forecast accuracy during the transition.

assertions:
  - type: llm_judge
    criteria: "Forecast model is data-driven — combines stage probabilities with documentation signals using appropriate weighting, includes a stalled-deal detection mechanism, worked examples demonstrate the model clearly, and confidence scoring adds appropriate nuance"
    weight: 0.35
    description: "Data-driven enhanced forecast model"
  - type: llm_judge
    criteria: "Deal health dashboard surfaces actionable signals — 8 metrics per deal are meaningful, alert system catches stalled deals, manager workflow is efficient, and the weekly forecast meeting format drives decisions not just reporting"
    weight: 0.35
    description: "Actionable deal health dashboard"
  - type: llm_judge
    criteria: "Rollout plan manages risk — historical validation approach is sound, parallel-run period is appropriately long, change management addresses AE skepticism, and maintains forecast accuracy during transition"
    weight: 0.30
    description: "Risk-managed forecast transition"
