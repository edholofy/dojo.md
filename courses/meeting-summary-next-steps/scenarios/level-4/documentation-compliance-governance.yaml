meta:
  id: documentation-compliance-governance
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Build documentation compliance and governance — create policies for meeting recording, data retention, and regulatory compliance across jurisdictions"
  tags: [sales, meetings, compliance, governance, GDPR, recording, legal, expert]

state: {}

trigger: |
  You're the VP of Legal & Compliance at "GlobalSaaS" — a B2B SaaS
  company ($500M ARR) selling to customers in 40 countries. Your CEO
  wants to deploy AI-powered meeting documentation across the entire
  sales org (600 AEs). The General Counsel flagged significant legal
  risks.

  Legal landscape for meeting recording and documentation:

  United States:
  - Federal: One-party consent for recording
  - California, Illinois, Florida (12 states total): Two-party consent
  - Illinois BIPA: Biometric data concerns if video is analyzed
  - SEC regulations: Financial services customers have record-keeping
    requirements

  European Union:
  - GDPR Article 6: Need lawful basis for processing meeting data
  - GDPR Article 17: Right to erasure applies to meeting recordings
  - Germany: Strictest interpretation — explicit consent required for
    any recording, works council must approve employee monitoring
  - France: CNIL requires data protection impact assessment for AI
    processing of personal data

  Asia-Pacific:
  - Japan: APPI requires purpose specification and consent
  - Singapore: PDPA — consent required, limited cross-border transfers
  - China: PIPL — data localization required, consent for AI processing
  - Australia: Privacy Act — Australian Privacy Principles apply

  Current issues:
  1. 3 German prospects refused meetings because they saw "this call
     is being recorded" — lost $800K in pipeline
  2. A French customer filed a GDPR complaint because meeting notes
     included personal opinions about their employees
  3. A Singapore customer demanded deletion of all meeting recordings —
     you have no process for this
  4. Your AI summarization tool processes all transcripts through US
     servers — potential GDPR cross-border violation
  5. An AE in California recorded a call without informing all parties
     — potential wiretapping liability

  Board mandate: AI meeting documentation must be deployed globally
  within 12 months while maintaining zero compliance violations.

  Tasks:
  1. Create the global meeting documentation compliance framework.
     For each region (US, EU, APAC): document the legal requirements
     for recording, transcription, AI processing, and data storage.
     Create a decision matrix for what's allowed in each jurisdiction
     and what consent/notice is required.

  2. Design the technical compliance architecture. Address: how to
     handle recording consent across jurisdictions, data residency for
     meeting recordings and AI processing, the right-to-erasure
     workflow (including downstream AI models), and the consent
     management system. Include the solution for the 5 current issues.

  3. Write the governance policy document. Include: who can record
     meetings and under what conditions, what can be included in meeting
     documentation (and what can't — e.g., personal opinions about
     individuals), data retention schedules by region, the escalation
     process for compliance concerns, and training requirements for AEs.

assertions:
  - type: llm_judge
    criteria: "Compliance framework is jurisdictionally accurate — correctly identifies one-party vs. two-party consent requirements, GDPR lawful basis options, APAC consent requirements, and creates a usable decision matrix that covers recording, transcription, AI processing, and storage"
    weight: 0.35
    description: "Jurisdictionally accurate compliance framework"
  - type: llm_judge
    criteria: "Technical architecture solves real problems — addresses data residency with region-specific processing, handles right-to-erasure across AI systems, fixes the 5 current issues (German pipeline loss, French complaint, Singapore deletion, US server processing, California recording), and scales globally"
    weight: 0.35
    description: "Problem-solving technical architecture"
  - type: llm_judge
    criteria: "Governance policy is clear and enforceable — defines what AEs can/can't document, has realistic data retention schedules, clear escalation process, and training requirements that are practical for 600 AEs across 40 countries"
    weight: 0.30
    description: "Clear enforceable governance policy"
