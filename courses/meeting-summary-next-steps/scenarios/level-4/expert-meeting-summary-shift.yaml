meta:
  id: expert-meeting-summary-shift
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Expert meeting summary shift — handle a board crisis, M&A documentation leak, and AI documentation failure simultaneously"
  tags: [sales, meetings, crisis, board, M&A, AI-failure, shift-simulation, expert]

state: {}

trigger: |
  You're the CRO of "PlatformMax" — a B2B SaaS company ($400M ARR)
  preparing for IPO in 6 months. Three documentation-related crises
  hit in the same week. Each threatens the IPO timeline.

  Crisis 1 — Board Audit Discovery:
  The IPO auditors are reviewing your sales processes. They pulled 200
  random meeting summaries and found:
  - 38 contain revenue commitments or pricing promises that aren't
    reflected in the contract terms (e.g., "We agreed to give them a
    free year of premium support" — not in any contract)
  - 12 contain statements that could be interpreted as forward-looking
    revenue guarantees ("Don't worry, we'll hit $10M with them by Q4")
  - 7 reference undisclosed side agreements ("The VP told me off the
    record they'll sign a 5-year deal if we give them X")
  - The auditor said: "This is a material concern for the S-1 filing.
    These meeting notes could create legal liability."

  Crisis 2 — M&A Documentation Leak:
  You're in confidential acquisition discussions with a $50M ARR company.
  An AE documented a meeting with a customer where the customer said:
  "I heard you're acquiring TargetCo." The AE wrote it in the CRM
  meeting notes, which are visible to 200+ people internally. Your
  General Counsel is demanding to know: how did the customer find out,
  who else knows, and is this a breach of the NDA? The meeting note
  is the only evidence.

  Crisis 3 — AI Documentation Failure:
  Your new AI meeting summarization tool (deployed 2 months ago) has
  been generating inaccurate summaries. A customer's legal team sent
  a cease-and-desist because an AI-generated summary attributed false
  quotes to their General Counsel. The summary said their GC agreed
  to terms they explicitly rejected. The AI hallucinated the agreement
  from context. This has been sent to the customer as an official
  meeting follow-up.

  The customer's email: "Your follow-up email falsely claims our General
  Counsel agreed to the liability cap of $500K. She explicitly said the
  opposite. We consider this either incompetent or fraudulent. Our legal
  team is reviewing our options."

  Tasks:
  1. Address the board audit crisis. Write: the remediation plan for
     the 38+12+7 problematic meeting notes, the policy change to prevent
     future documentation creating legal liability, and the board memo
     explaining what happened and how you're fixing it. The memo must
     be honest without catastrophizing.

  2. Address the M&A leak crisis. Write: the investigation plan (trace
     how the information leaked), the immediate containment steps, the
     CRM access audit (who saw the note and when), and the new
     information security policy for confidential deal documentation.

  3. Address the AI hallucination crisis. Write: the immediate response
     to the customer's cease-and-desist, the internal incident report
     on the AI tool, the corrective action plan (do you keep, fix, or
     kill the AI tool?), and the policy for AI-generated content
     approval before customer distribution.

assertions:
  - type: llm_judge
    criteria: "Board audit response is legally sound — remediation plan addresses all 3 categories (pricing discrepancies, forward-looking statements, side agreements), policy changes prevent recurrence, and the board memo is honest yet demonstrates competent crisis management"
    weight: 0.35
    description: "Legally sound board audit response"
  - type: llm_judge
    criteria: "M&A leak response is thorough — investigation traces the information chain, containment is immediate and specific, CRM audit is detailed, and new information security policy is comprehensive enough to prevent future leaks"
    weight: 0.35
    description: "Thorough M&A leak containment"
  - type: llm_judge
    criteria: "AI hallucination response addresses all dimensions — customer response is appropriately apologetic and corrective, incident report is honest, corrective plan makes a defensible decision about the AI tool, and approval policy prevents future AI-generated errors from reaching customers"
    weight: 0.30
    description: "Multi-dimensional AI crisis response"
