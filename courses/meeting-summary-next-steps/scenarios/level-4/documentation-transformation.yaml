meta:
  id: documentation-transformation
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Lead a meeting documentation transformation — redesign the entire documentation culture and infrastructure for a scaling sales organization"
  tags: [sales, meetings, transformation, culture, infrastructure, executive, expert]

state: {}

trigger: |
  You're the newly hired CRO at "RapidScale" — a B2B SaaS company that
  just crossed $100M ARR with 250 AEs. The CEO brought you in because
  the company is preparing for an IPO in 18 months and the board flagged
  "sales process maturity" as a concern.

  Your assessment after 30 days:

  Documentation infrastructure:
  - CRM: Salesforce, heavily customized but poorly maintained
  - 47 custom fields on Opportunity, only 12 are regularly populated
  - No standard meeting documentation template
  - No conversation intelligence tool
  - Meeting notes are in Salesforce Activities, Google Docs, Slack, and
    personal notebooks — no single source of truth
  - 3 different teams have tried to implement documentation standards
    in the past 2 years — all failed within 3 months

  Documentation quality audit (500 random meeting notes):
  - 28% have no documentation at all
  - 35% have 1-3 sentence summaries ("Good meeting. Will follow up.")
  - 22% have adequate summaries with some structure
  - 15% have high-quality summaries with action items and next steps
  - Average: 2.1 out of 10 on your quality rubric

  Business impact of poor documentation:
  - Forecast accuracy: 42% (industry benchmark: 70%+)
  - AE ramp time: 9 months (should be 4-5 months for this product)
  - Deal handoff failures: 34% of transferred deals stall or lose
  - Customer escalations mentioning "they didn't follow through": 23%
  - Board confidence in pipeline: LOW

  Budget: $2M over 18 months for sales infrastructure modernization
  Team: You can hire 3 people dedicated to this initiative

  Previous failed attempts:
  - Attempt 1: Mandated documentation with penalties → AEs revolted,
    top performers threatened to leave
  - Attempt 2: Deployed a documentation tool (DocsAI) → 30% adoption,
    cancelled after 6 months
  - Attempt 3: Manager-led coaching → inconsistent, died when 2 of 5
    managers left

  Tasks:
  1. Design the 18-month documentation transformation roadmap. Include:
     phase 1 (months 1-3: foundation), phase 2 (months 4-9: build),
     phase 3 (months 10-18: optimize for IPO). For each phase: the
     objectives, key initiatives, technology investments, org changes,
     success metrics, and the change management approach that avoids
     repeating past failures.

  2. Create the "IPO-Ready Documentation Standard" — what meeting
     documentation needs to look like for a public-company-caliber sales
     org. Include: the required documentation framework, the quality bar,
     the audit process, and how documentation feeds into forecasting,
     customer health, and investor reporting.

  3. Write the board presentation slide narrative (5 slides) that
     explains: the current documentation gap, its impact on forecast
     accuracy and revenue, the transformation plan, the investment
     required, and the expected ROI. Frame it in language that resonates
     with board members who care about IPO readiness.

assertions:
  - type: llm_judge
    criteria: "Roadmap learns from past failures — Phase 1 avoids mandates and penalties (Attempt 1), builds on existing tools before adding new ones (Attempt 2), creates sustainable enablement (Attempt 3); each phase has realistic objectives and measurable milestones"
    weight: 0.35
    description: "Failure-informed transformation roadmap"
  - type: llm_judge
    criteria: "IPO-ready standard is specific and auditable — defines the documentation framework, quality bar with measurable criteria, audit process, and clear connections to forecasting accuracy and investor reporting"
    weight: 0.35
    description: "Auditable IPO-ready documentation standard"
  - type: llm_judge
    criteria: "Board narrative is compelling — connects documentation gaps to revenue impact and IPO risk, presents the investment as de-risking not cost, and frames the transformation as a competitive advantage for public markets"
    weight: 0.30
    description: "Compelling board transformation narrative"
