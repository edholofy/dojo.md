meta:
  id: documentation-economics
  level: 4
  course: meeting-summary-next-steps
  type: output
  description: "Model the economics of meeting documentation — quantify the ROI of documentation quality and build the business case for investment"
  tags: [sales, meetings, economics, ROI, business-case, CFO, expert]

state: {}

trigger: |
  You're the VP of Revenue Operations at "ROIStack" — a B2B SaaS company
  ($350M ARR, 300 AEs). Your CFO has questioned the $1.8M annual spend
  on meeting documentation tools and processes. She said: "Show me the
  ROI or I'm cutting the budget by 50% next quarter."

  Current documentation investment:
  - Gong licenses: $720K/year (300 users × $200/month)
  - Salesforce customization for meeting fields: $180K/year
  - Sales enablement headcount (2 FTEs focused on documentation
    coaching): $320K/year
  - Documentation quality audit team (1 FTE + contractor): $200K/year
  - AI summarization tools: $144K/year
  - Training and content: $80K/year
  - Meeting template system maintenance: $60K/year
  - Compliance reporting: $96K/year
  Total: $1.8M/year

  Available data for ROI analysis:
  - AE time on documentation: average 3.5 hours/week per AE
  - AE fully loaded cost: $250K/year = $120/hour
  - Total AE documentation time cost: 300 AEs × 3.5 hrs × 50 weeks
    × $120 = $6.3M/year in AE time
  - Win rate with complete documentation: 32%
  - Win rate without: 14%
  - Average deal size: $120K ACV
  - Deals per AE per year: 35 (average)
  - Forecast accuracy with documentation program: 68%
  - Forecast accuracy before program: 42%
  - Customer retention with documented handoffs: 92%
  - Customer retention without: 78%
  - AE ramp time with documentation system: 5.5 months
  - AE ramp time without: 8.5 months
  - Annual AE turnover: 25% (75 AEs leave/year)

  Comparison data:
  - Before documentation program (2 years ago): $280M ARR, 22% win rate
  - After documentation program (now): $350M ARR, 28% win rate
  - Industry benchmark for documentation investment: 0.3-0.8% of ARR

  Tasks:
  1. Build the full ROI model for the CFO. Include: direct cost analysis
     (the $1.8M investment), indirect cost analysis (AE time), revenue
     impact (win rate improvement, retention improvement, faster ramp),
     and the total value calculation. Show the model with conservative,
     moderate, and aggressive assumptions.

  2. Create the "Documentation Value Dashboard" — the ongoing metrics
     that prove ROI quarter over quarter. Include: the leading indicators
     (documentation quality scores, completion rates), the lagging
     indicators (win rate, forecast accuracy, retention), and the
     attribution methodology that connects documentation to outcomes.

  3. Write the CFO presentation. Include: the cost to cut (what happens
     if you reduce by 50%), the cost of bad documentation (quantified),
     and the optimization opportunity (where you can get more value
     from the current $1.8M). Recommend specific budget adjustments —
     maybe some areas should be cut and others should be increased.

assertions:
  - type: llm_judge
    criteria: "ROI model is rigorous — uses the provided data correctly, shows the math clearly, includes conservative/moderate/aggressive scenarios, quantifies win rate improvement value, retention impact, and ramp time savings; total ROI significantly exceeds the $1.8M investment"
    weight: 0.35
    description: "Rigorous ROI model"
  - type: llm_judge
    criteria: "Value dashboard connects leading and lagging indicators — documentation quality scores lead to win rate changes, completion rates connect to forecast accuracy, and the attribution methodology acknowledges correlation vs. causation"
    weight: 0.35
    description: "Connected leading-lagging dashboard"
  - type: llm_judge
    criteria: "CFO presentation is persuasive and honest — shows the cost of cutting, quantifies bad documentation risk, identifies optimization opportunities within the current budget, and makes specific recommendations (not just 'keep everything')"
    weight: 0.30
    description: "Persuasive honest CFO presentation"
