meta:
  id: qbr-summary
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Write QBR summaries — capture quarterly business review discussions including usage metrics, success stories, challenges, and renewal planning"
  tags: [sales, meetings, QBR, summary, customer-success, renewal, beginner]

state: {}

trigger: |
  You're a Customer Success Manager at "MetricsPro" — a B2B SaaS
  analytics platform ($2K-15K/month). You just completed a 60-minute
  Quarterly Business Review (QBR) with a key account that renews in
  90 days.

  Account: DataDriven Corp — $8,500/month, 85 users, Enterprise plan
  Contract renewal: 90 days away

  QBR attendees:
  - Customer: Tom Garcia (VP of Operations, executive sponsor), Priya
    Patel (Analytics Manager, day-to-day champion), Kevin Zhang (Data
    Engineer)
  - Your side: You (CSM), Alex Rivera (Solutions Architect)

  QBR agenda and what was discussed:

  1. Usage review (15 min):
     - Active users: 62 of 85 licensed (73% adoption). Down from 78%
       last quarter.
     - Most used features: custom dashboards (daily by 45 users),
       automated reports (weekly by 30 users)
     - Underused features: predictive analytics module (only 3 users),
       API integrations (0 usage — they paid for this add-on)
     - Tom asked "Why are we paying for API integrations if nobody's
       using them?"

  2. Success stories (10 min):
     - Priya shared that automated reports saved her team 15 hours/week
     - One dashboard helped identify a $200K inventory discrepancy
     - Kevin said the SQL connector "changed his workflow entirely"

  3. Challenges (15 min):
     - Dashboard load times have increased — Kevin says "it used to load
       in 2 seconds, now it's 8-10 seconds for complex dashboards"
     - Three departments requested access but were told "no more
       licenses" — Tom wasn't aware of this
     - Priya wants better training resources for the predictive analytics
       module — "we bought it but nobody knows how to use it"

  4. Product roadmap preview (10 min):
     - Alex showed the upcoming AI insights feature (GA in 6 weeks)
     - Tom was very interested: "That's exactly what our CEO has been
       asking for"
     - Kevin asked about Snowflake native connector (on roadmap, no date)

  5. Renewal discussion (10 min):
     - Tom said "We're generally happy but I need to justify the spend"
     - Tom asked about reducing licenses to 65 to save money
     - You mentioned the option to expand to the Premium tier which
       includes AI insights
     - Tom said "Send me a comparison — downgrade to 65 licenses vs.
       upgrade to Premium with AI"
     - Priya privately told you after the meeting: "Tom's getting
       pressure from the CFO to cut software spend by 20%"

  Tasks:
  1. Write the customer-facing QBR summary email to all attendees.
     Include: usage highlights, success metrics, action items from
     challenges discussed, roadmap items of interest, and clear next
     steps with dates.

  2. Write internal account notes for your CSM platform. Include:
     health score assessment, adoption risks, expansion opportunity,
     churn risk factors, competitive threat assessment, and your
     recommended strategy for the renewal.

  3. Create a 90-day renewal action plan with specific milestones.
     Address: the adoption gap (73% and falling), the API integration
     non-usage, the performance issue, the license reduction request,
     and the CFO pressure. Include who owns each action and by when.

assertions:
  - type: llm_judge
    criteria: "QBR summary email is professional and balanced — highlights successes (15hr/week saved, $200K catch), addresses challenges diplomatically (performance, training), lists clear action items with owners, and proposes next steps without being defensive about the issues raised"
    weight: 0.35
    description: "Professional balanced QBR summary"
  - type: llm_judge
    criteria: "Internal notes capture the real account health picture — flags adoption decline, API non-usage risk, CFO pressure as churn signal, license reduction as potential downgrade risk, but also identifies AI insights as expansion lever"
    weight: 0.35
    description: "Realistic account health assessment"
  - type: llm_judge
    criteria: "90-day renewal plan is actionable — addresses all 5 issues with specific owners, dates, and milestones; shows a strategy to protect revenue while genuinely solving customer problems"
    weight: 0.30
    description: "Actionable 90-day renewal plan"
