meta:
  id: first-meeting-summary-shift
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "First meeting summary shift — handle multiple meeting types simultaneously under time pressure with competing priorities"
  tags: [sales, meetings, summary, multi-task, time-pressure, shift-simulation, beginner]

state: {}

trigger: |
  You're an AE at "SyncFlow" — a B2B SaaS workflow automation platform
  ($500-5,000/month). It's 4:30 PM on a Friday. You have 3 meetings to
  summarize before end of day. Your manager's rule: "All meeting
  follow-ups must be sent within 2 hours of the meeting."

  You have 90 minutes before your hard stop at 6 PM. Here are your 3
  meetings from today:

  Meeting 1 (9 AM, 30-minute discovery call):
  Prospect: Rita Patel, Operations Director, LogiCo (150 employees)
  - LogiCo does manual workflow management in spreadsheets
  - They have 12 team leads who each manage workflows differently
  - Rita's pain: "I can't see what's happening across teams"
  - Budget: $30K-50K (Rita has authority)
  - Timeline: "We want to start implementing in Q2"
  - Rita wants a demo for her team leads next week
  - Competitors: They looked at Zapier but "it's too technical for
    our team"
  - Rita asked you to send a 1-pager and pricing before the demo

  Meeting 2 (11 AM, 45-minute demo):
  Prospect: David Chen, CTO, and Amy Wu, VP Ops, at ScaleUp Inc
  (400 employees)
  - Demo of the enterprise automation builder
  - David loved the API-first architecture
  - Amy loved the no-code builder: "Finally, something my ops team
    can use without engineering tickets"
  - David's concern: "How does this handle our SOC 2 requirements?"
  - Amy asked about onboarding time for 400 users
  - David wants a technical deep dive with his engineering team
  - Amy wants to see customer references in similar industries
  - They're currently using a competitor (WorkAuto) — contract ends
    in 4 months
  - Pricing discussed: $4,200/month for 400 users on Enterprise plan
  - David said "That's more than we're paying now but if the value is
    there..." Amy nodded

  Meeting 3 (2 PM, 20-minute check-in call):
  Existing customer: Nora Kim, Account Manager at BrightPath
  (current plan: $1,800/month)
  - Nora is unhappy: "Your last update broke our main workflow"
  - The issue happened 3 days ago and support hasn't resolved it
  - Nora said "If this isn't fixed by Monday, I'm escalating to my CEO"
  - Renewal is in 60 days
  - Nora also mentioned they want to add 30 more users (expansion!)
  - But she said "I can't justify expanding when the product is broken"
  - You promised to personally follow up with engineering today

  Tasks:
  1. Write all 3 follow-up emails (customer-facing). Each should be
     appropriate for the meeting type: discovery call follow-up for Rita,
     demo recap for David and Amy, and a priority response for Nora.
     Prioritize: which email do you send FIRST and why?

  2. Write CRM notes for all 3 meetings. Each should capture the key
     information needed for the next touchpoint.

  3. Triage and prioritize: List all action items across all 3 meetings,
     assign priorities (urgent/high/medium/low), and explain what you'd
     do in the next 60 minutes if you could only handle the most
     critical items. What's your "triage plan"?

assertions:
  - type: llm_judge
    criteria: "All 3 follow-up emails are appropriate for their type — discovery recap for Rita with 1-pager commitment, demo summary for David/Amy addressing SOC 2 and references, and urgent/empathetic response for Nora with fix commitment; correctly identifies Nora as highest priority"
    weight: 0.35
    description: "Appropriate prioritized follow-ups"
  - type: llm_judge
    criteria: "CRM notes capture deal-advancing information — Rita's BANT and demo scheduling, David/Amy's feature interests and competitive displacement timeline, Nora's churn risk and expansion opportunity; each is useful for the next touchpoint"
    weight: 0.35
    description: "Deal-advancing CRM notes"
  - type: llm_judge
    criteria: "Triage plan is realistic and well-prioritized — Nora's escalation is urgent (churn risk + broken product), identifies the 60-minute critical path (engineering follow-up, Nora email, CRM updates), defers lower-priority items appropriately"
    weight: 0.30
    description: "Realistic triage plan"
