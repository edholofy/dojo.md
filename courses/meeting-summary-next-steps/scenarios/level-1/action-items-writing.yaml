meta:
  id: action-items-writing
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Write effective action items — learn to create clear, specific, and accountable action items that actually get done"
  tags: [sales, meetings, action-items, accountability, SMART, beginner]

state: {}

trigger: |
  You're a sales operations analyst at "TaskFlow" — a B2B SaaS project
  management platform. Your VP of Sales is frustrated: "We have great
  meetings but nothing happens afterward. Action items are vague, nobody
  knows who owns what, and deadlines are missed constantly."

  The VP reviewed 10 recent meeting summaries and pulled examples of
  BAD action items:

  Bad example 1: "Follow up on the pricing discussion"
  Bad example 2: "Someone should check with legal about the contract"
  Bad example 3: "We need to get back to them soon with an answer"
  Bad example 4: "Look into the integration issue"
  Bad example 5: "The team will prepare a proposal"

  The VP wants you to learn the SMART action item framework:
  S = Specific (what exactly needs to be done?)
  M = Measurable (how will we know it's done?)
  A = Assigned (who specifically owns it?)
  R = Realistic (can it actually be done in the timeframe?)
  T = Time-bound (by when?)

  Tasks:
  1. Rewrite all 5 bad action items as SMART action items. For each:
     show the original, explain what's wrong with it, and write the
     improved version. Assume reasonable context (e.g., the pricing
     discussion was about a 15% discount for a 3-year deal).

  2. You just had a 45-minute sales call with Jordan Lee, VP of
     Engineering at BuildSoft (200 employees). Here are the raw notes
     you took during the call:
     - Jordan wants to see a technical deep dive with their team
     - They need pricing for 200 users + API access
     - Their security team needs our SOC 2 report
     - Jordan mentioned their CTO wants to meet our VP of Engineering
     - They're evaluating 2 other vendors (Competitor A and Competitor B)
     - Current contract with Competitor A ends in 60 days
     - Jordan asked if we can do a pilot with 20 users first
     - They need integration with Jira and GitHub

     Extract and write all action items from these notes. Each should
     be SMART and clearly indicate whether it's your action or the
     customer's action.

  3. Create an "Action Item Template" that your sales team can use after
     every meeting. Include: the format for each action item, a section
     for "our actions" vs "customer actions," a follow-up schedule, and
     tips for ensuring action items actually get completed.

assertions:
  - type: llm_judge
    criteria: "Rewrites are genuinely SMART — each improved action item has a specific task, assigned owner by name, measurable completion criteria, and a deadline; improvements are clearly better than originals"
    weight: 0.35
    description: "Genuinely SMART action item rewrites"
  - type: llm_judge
    criteria: "Call notes extraction is thorough — captures all action items from the notes (technical deep dive scheduling, pricing proposal, SOC 2 report sharing, exec meeting, pilot setup, integration compatibility check), properly split between seller and customer actions"
    weight: 0.35
    description: "Thorough action item extraction"
  - type: llm_judge
    criteria: "Template is practical and complete — usable format, our/customer action split, follow-up schedule, and practical tips for accountability"
    weight: 0.30
    description: "Practical action item template"
