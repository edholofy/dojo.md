meta:
  id: negotiation-meeting-recap
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Write negotiation meeting recaps — capture pricing discussions, contract terms, objections, and agreed-upon next steps from sales negotiation meetings"
  tags: [sales, meetings, negotiation, recap, pricing, contracts, beginner]

state: {}

trigger: |
  You're an AE at "SecureNet" — a B2B SaaS cybersecurity platform
  ($3K-25K/month). You just had a 40-minute negotiation meeting with
  a prospect. This is a $180K ACV deal that your VP of Sales is
  tracking closely.

  Attendees:
  - Prospect: Dana Williams (CISO), Frank Torres (Procurement Director),
    Mei Chen (Legal Counsel)
  - Your side: You (AE), Rachel Kim (VP of Sales, joined for last 15 min)

  Meeting flow:

  1. Pricing discussion (15 min):
     - Your quote: $15K/month for 500 endpoints, 3-year term
     - Frank said "Your competitor quoted us $11K/month for the same
       coverage." (Competitor: CyberShield)
     - Dana said "CyberShield doesn't have your threat intelligence
       module, which is what we actually need"
     - Frank pushed for $12K/month: "I need to show savings to justify
       switching vendors"
     - Rachel offered $13,500/month on a 3-year with annual prepay
       (10% discount from original)
     - Frank said "I need to think about it" — wanted $12,500

  2. Contract terms (10 min):
     - Mei wants a 60-day termination clause (your standard is 90-day)
     - Mei wants a data deletion guarantee within 30 days of termination
     - Mei asked about your cyber insurance coverage ($10M policy — she
       was satisfied)
     - Frank wants Net 45 payment terms (your standard is Net 30)
     - Mei asked for a BAA (Business Associate Agreement) for
       HIPAA data

  3. Implementation timeline (10 min):
     - Dana wants to go live within 45 days of signing
     - Your standard implementation is 60-90 days
     - Dana said "We have a board audit in 60 days — we MUST be live
       before then"
     - You suggested a phased approach: Phase 1 (core endpoints) in
       30 days, Phase 2 (full rollout) in 60 days
     - Dana liked the phased approach

  4. Rachel's close attempt (5 min):
     - Rachel offered a $1,000/month "fast-close" discount if they
       sign by end of next week (bringing it to $12,500/month)
     - Frank smiled and said "Now we're talking"
     - Dana said "I'm ready. Frank, can you get the paperwork processed?"
     - Frank said "I'll take the offer to our CFO. I need the final
       proposal with all terms in writing by Wednesday."
     - Mei said "I need 48 hours to review the final contract"

  Tasks:
  1. Write the customer-facing meeting recap email to all 3 prospect
     attendees. Include: pricing discussed and agreed framework, contract
     terms to be finalized, implementation timeline, and the exact next
     steps with dates. Be precise about what was agreed vs. what's still
     open.

  2. Write the internal deal update for your VP of Sales and deal team.
     Include: what was agreed, what's still being negotiated, the
     discount given and margin impact, the competitive dynamics, risk
     factors, and your probability assessment with justification.

  3. Create a "deal close checklist" for the next 10 days. List every
     action needed to close by the deadline, who owns it, and the
     deadline for each. Flag any items that could delay the close.

assertions:
  - type: llm_judge
    criteria: "Customer recap is precise about agreed vs. open terms — clearly states $12,500/month fast-close offer, lists open items (60-day vs 90-day termination, Net 45 vs 30, BAA), phased implementation, and exact next steps (proposal by Wednesday, 48hr legal review, CFO approval)"
    weight: 0.35
    description: "Precise negotiation recap"
  - type: llm_judge
    criteria: "Internal update captures deal intelligence — total discount given (17% from original), competitive positioning (CyberShield at $11K but missing threat intel), Frank's procurement dynamics, Dana as champion, and realistic close probability"
    weight: 0.35
    description: "Intelligence-capturing internal update"
  - type: llm_judge
    criteria: "Close checklist covers all critical paths — proposal delivery, legal review, CFO approval, contract redline, BAA preparation, implementation planning, with clear owners and dates that work backward from the deadline"
    weight: 0.30
    description: "Complete deal close checklist"
