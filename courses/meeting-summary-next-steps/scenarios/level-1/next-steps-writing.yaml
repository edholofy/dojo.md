meta:
  id: next-steps-writing
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Write compelling next steps — learn to end every meeting with clear, committed next steps that keep deals moving forward"
  tags: [sales, meetings, next-steps, momentum, commitment, beginner]

state: {}

trigger: |
  You're a sales coach at "CoachSaaS" reviewing your team's meeting
  follow-up emails. The #1 problem: next steps are vague, uncommitted,
  and don't create urgency. You're training 4 junior AEs.

  Here are the "next steps" sections from 5 recent follow-up emails.
  All are weak. Your job is to fix them.

  Weak next step 1 (after a discovery call):
  "Let's stay in touch. I'll send over some information and we can
  reconnect sometime next month."

  Context: Prospect said they're evaluating vendors by end of Q2.
  Q2 ends in 6 weeks. 2 competitors are also in the evaluation.

  Weak next step 2 (after a demo):
  "Thanks for your time today. Let me know if you have any questions
  about what we showed you."

  Context: Prospect's CEO needs to see a business case before approving.
  The prospect asked you to "send the ROI calculator." Demo went very
  well — prospect said "this is impressive."

  Weak next step 3 (after a negotiation meeting):
  "We'll get back to you on the pricing question."

  Context: Prospect asked for a 20% discount on a 3-year deal. Your
  VP of Sales needs to approve anything over 15%. Prospect's procurement
  deadline is in 10 days.

  Weak next step 4 (after an executive briefing):
  "Great meeting today. Looking forward to continuing the conversation."

  Context: You met with the prospect's CTO and CEO for 30 minutes. They
  asked about your product roadmap and enterprise support model. CTO
  seemed very interested; CEO was harder to read. CFO wasn't in the
  meeting but is the final budget approver.

  Weak next step 5 (after a QBR with existing customer):
  "Thanks for the productive QBR. Let's touch base again next quarter."

  Context: Customer's usage dropped 20%. They mentioned budget cuts.
  Renewal is in 90 days. They haven't adopted 2 features that would
  increase their ROI. Their champion hinted at evaluating a cheaper
  alternative.

  Tasks:
  1. Rewrite all 5 "next steps" sections. Each should be specific,
     time-bound, and create appropriate urgency based on the context.
     Include a concrete ask (meeting, deliverable, decision) with a
     proposed date.

  2. For each rewrite, explain: what was wrong with the original, what
     principle you applied (urgency, specificity, commitment, mutual
     action), and what you expect the improved next step to achieve.

  3. Create a "Next Steps Cheat Sheet" — a one-page guide your AE
     team can reference after any meeting type. Include: the anatomy
     of a good next step, 3 templates (after discovery, after demo,
     after negotiation), and 5 phrases that create commitment without
     being pushy.

assertions:
  - type: llm_judge
    criteria: "Rewrites are specific and time-bound — each includes a concrete ask with a date, creates appropriate urgency based on context (Q2 deadline, procurement deadline, renewal timeline)"
    weight: 0.40
    description: "Specific time-bound next steps"
  - type: llm_judge
    criteria: "Explanations identify the right principles — urgency for time-sensitive deals, mutual commitment for both sides, specificity replacing vague language, momentum preservation"
    weight: 0.30
    description: "Principle-identifying explanations"
  - type: llm_judge
    criteria: "Cheat sheet is practical — good next step anatomy, 3 usable templates, and commitment phrases that are professional and not aggressive"
    weight: 0.30
    description: "Practical next steps cheat sheet"
