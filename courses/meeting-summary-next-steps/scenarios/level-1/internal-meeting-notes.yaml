meta:
  id: internal-meeting-notes
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Write internal meeting notes — capture sales team meetings, pipeline reviews, and strategy discussions with clear decisions and action items"
  tags: [sales, meetings, internal, notes, pipeline-review, strategy, beginner]

state: {}

trigger: |
  You're a sales operations coordinator at "GrowthStack" — a B2B SaaS
  revenue intelligence platform. You just attended a 45-minute weekly
  pipeline review with the sales leadership team. Your job is to write
  the meeting notes that will be shared with the entire sales org.

  Attendees: VP of Sales (Maria Santos), 3 Regional Directors (James
  for East, Aisha for West, Chris for Central), Head of Sales Ops (you),
  Head of Sales Enablement (Tanya Park)

  Meeting notes you took (raw, unstructured):

  - Maria opened: "We're at 68% of Q1 target with 5 weeks left. Not
    where we need to be."
  - Pipeline coverage is 2.1x (target is 3x)
  - James (East): "I have 3 deals that could close this month — TechCorp
    $120K, FinServe $85K, BuildCo $45K. TechCorp is waiting on legal.
    FinServe needs VP approval. BuildCo is a verbal commit."
  - Aisha (West): "My region is behind because 2 AEs quit last month.
    I need to hire ASAP. I have one deal — MegaCorp $200K — but it might
    slip to Q2. Their CFO went on medical leave."
  - Chris (Central): "I'm at 82% already. HealthFirst $95K closes next
    week. I have 2 deals in negotiation — DataFlow $60K and CloudBase
    $55K."
  - Maria: "Chris, great work. James, I need daily updates on TechCorp.
    Aisha, let's get those job reqs posted today."
  - Discussion about Q2 planning: Maria wants each director to submit
    territory plans by March 15th.
  - Tanya offered to run deal coaching sessions for Aisha's remaining AEs
  - Maria wants a "war room" approach for the last 5 weeks — weekly
    deal-by-deal reviews
  - Aisha asked about temp sales support — Maria said "Talk to HR, I'll
    approve it if we can get contractors"
  - Chris mentioned a competitive threat: "RivalTech is offering 50%
    discounts to win deals. They got aggressive with my CloudBase prospect."
  - Maria: "Don't match those discounts. Sell on value. If they push, I'll
    join the call."
  - James's FinServe deal needs an executive sponsor email — Maria will
    send it by Thursday
  - Tanya will share updated competitive battle cards for RivalTech by
    Friday
  - Next meeting: same time next week

  Tasks:
  1. Write the formal meeting notes from these raw notes. Structure them
     properly with: meeting details (date, attendees, purpose), key
     metrics discussed, region-by-region pipeline update, decisions made,
     action items (with owners and due dates), and next meeting info.

  2. Create an action item tracker from this meeting. List every
     commitment made, who owns it, the deadline, and the priority level.
     Flag any action items that are critical to hitting Q1 target.

  3. Write a brief "executive summary" (5-7 sentences) that Maria can
     forward to her CEO. It should honestly portray the pipeline status,
     highlight the plan to close the gap, and flag the risks (Aisha's
     region, competitive pressure) without being alarmist.

assertions:
  - type: llm_judge
    criteria: "Meeting notes are well-structured and complete — includes all pipeline details by region with dollar amounts, captures all decisions (war room, no discount matching, territory plans), and every action item with owner and date"
    weight: 0.35
    description: "Well-structured complete meeting notes"
  - type: llm_judge
    criteria: "Action item tracker is thorough — captures all commitments (Maria's exec email by Thursday, Tanya's battle cards by Friday, Aisha's job reqs today, territory plans by March 15, daily TechCorp updates), with correct owners and priorities"
    weight: 0.35
    description: "Thorough action item tracker"
  - type: llm_judge
    criteria: "Executive summary is honest but strategic — accurately states 68% attainment and 2.1x coverage gap, highlights path to close (identified deals, war room approach), flags risks (attrition, competitive) with mitigation, appropriate tone for CEO"
    weight: 0.30
    description: "Strategic executive summary"
