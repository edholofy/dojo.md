meta:
  id: meeting-summary-basics
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Learn the fundamentals of meeting summaries — understand the essential components, proper structure, and why timely follow-up matters for deal progression"
  tags: [sales, meetings, summary, basics, structure, beginner]

state: {}

trigger: |
  You're a new AE at "SalesPro" — a B2B SaaS sales enablement platform
  ($200-2,000/month). Your manager reviewed your last 5 meeting follow-up
  emails and gave you this feedback: "Your summaries are too long, they
  bury the action items, and you're sending them the next day instead of
  within an hour. Here's what I need you to learn."

  Your manager provided the ideal meeting summary structure:
  1. Thank them for their time (1 sentence)
  2. Key discussion points (3-5 bullets, max)
  3. Decisions made (if any)
  4. Action items (with owners and deadlines)
  5. Next steps (specific next meeting or milestone)

  Here are transcripts from 3 meetings you had yesterday. Write proper
  meeting summaries for each.

  Meeting 1 — Discovery call with Pat Rivera, Director of Sales at
  GrowthCo (150 employees):
  You discussed: their current sales process (manual, no CRM integration),
  their pain points (reps spend 2 hours/day on admin instead of selling,
  no visibility into pipeline), their team size (25 reps, growing to 40),
  their timeline (want something in place before Q3 kickoff in 8 weeks),
  their budget (have $30K allocated but need to "make the case" to VP
  of Revenue). Pat asked for a product demo with their sales ops manager.
  You agreed to send a case study of a similar-sized company.

  Meeting 2 — Product demo with Alex Chen, CTO at TechStart (40 employees)
  and their developer Sam Park:
  You showed the API integration, custom dashboards, and reporting. Alex
  liked the API but asked about SSO support (you said it's on the Q3
  roadmap). Sam tested the API in real-time and said "this would save us
  20 hours per sprint." Alex asked about pricing for 40 users. You quoted
  $800/month for the Professional tier. Alex said "let me discuss with
  our CEO and get back to you." You asked if you could schedule a follow-
  up call with the CEO and Alex said "let me check her calendar."

  Meeting 3 — QBR preparation meeting (internal) with your CSM, Taylor
  Kim, for the upcoming quarterly business review with your largest
  customer, MegaCorp ($45K/year):
  You discussed: MegaCorp's renewal is in 90 days, they've had 3 support
  tickets about reporting bugs, usage has dropped 15% in the last quarter,
  their champion (VP of Sales) was promoted and the new VP hasn't been
  engaged yet. Taylor wants to present a usage recovery plan. You agreed
  to draft expansion talking points for a potential upsell to Enterprise
  tier ($72K/year). The QBR is scheduled for next Thursday.

  Tasks:
  1. Write the customer-facing meeting summary email for Meeting 1 (Pat
     Rivera). Follow the structure above. Keep it under 200 words.

  2. Write the customer-facing meeting summary email for Meeting 2 (Alex
     Chen). Follow the structure above. Include the specific action items
     for both sides with deadlines.

  3. Write the internal meeting summary for Meeting 3 (QBR prep). This
     is for your manager and the CS team. Include the risk assessment,
     the action items with owners, and the QBR agenda you'd propose.

assertions:
  - type: llm_judge
    criteria: "Meeting 1 summary is concise and complete — under 200 words, includes key discussion points, clear action items (demo scheduling, case study), and next steps with Pat's timeline acknowledged"
    weight: 0.35
    description: "Concise complete discovery summary"
  - type: llm_judge
    criteria: "Meeting 2 summary captures decisions and blockers — SSO question noted, pricing quoted, Alex's CEO discussion as next step, follow-up call scheduling as specific action item with owner"
    weight: 0.35
    description: "Decision-capturing demo summary"
  - type: llm_judge
    criteria: "Meeting 3 internal summary is action-oriented — risk assessment (usage drop, new VP, support tickets, 90-day renewal), action items with owners and deadlines, proposed QBR agenda"
    weight: 0.30
    description: "Action-oriented internal summary"
