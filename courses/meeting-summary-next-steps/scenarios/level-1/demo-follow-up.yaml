meta:
  id: demo-follow-up
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Write demo follow-up summaries — capture what was shown, questions asked, concerns raised, and next steps after a product demonstration"
  tags: [sales, meetings, demo, follow-up, summary, beginner]

state: {}

trigger: |
  You're an AE at "CloudDash" — a B2B SaaS analytics dashboard platform
  ($300-3,000/month). You just finished a 45-minute product demo with
  a prospect. Your SE (Sales Engineer) ran the demo while you facilitated.

  Attendees:
  - Customer: Jamie Wong (VP of Analytics), Casey Park (Data Analyst),
    Robin Lee (IT Director)
  - Your side: You (AE), Morgan Chen (SE)

  Demo flow and reactions:
  1. Dashboard builder: Jamie loved it. Said "this is exactly what we
     need." Casey asked if custom SQL queries are supported (Morgan
     showed this — Casey was impressed).
  2. Real-time data refresh: Robin asked about data refresh frequency.
     Morgan said "every 15 minutes on Professional, real-time on
     Enterprise." Robin said "we need real-time for our trading desk
     dashboards."
  3. Embedded analytics: Jamie asked about white-labeling dashboards
     for their clients. Morgan showed the embed feature. Jamie said
     "our clients have been asking for this."
  4. Security: Robin asked about SOC 2 compliance, SSO support, and
     data encryption. Morgan confirmed all three. Robin asked for the
     security whitepaper.
  5. Pricing discussion: You quoted $1,200/month for Professional (50
     users) or $2,800/month for Enterprise (50 users + real-time +
     white-label). Jamie asked about annual pricing (you offered 15%
     discount on annual). Jamie said "we need to discuss internally."
  6. Integration: Casey asked about Snowflake integration. Morgan said
     native connector is in beta, GA in 4 weeks. Casey said "that's
     the deal-breaker — we need it before we can commit."
  7. Timeline: Jamie wants to present a recommendation to the COO in
     3 weeks. COO makes final decisions over $2K/month.

  Tasks:
  1. Write the customer-facing demo follow-up email to all 3 attendees.
     Structure: thank them, recap what was demonstrated with their
     specific reactions, address the open items (Snowflake integration
     timeline, security whitepaper), summarize pricing discussed, and
     propose next steps.

  2. Write the internal deal notes for your CRM. Include: who attended
     and their roles/influence, feature interest mapping (which features
     excited whom), objections and concerns, competitive intelligence
     (if any), pricing discussed, deal stage recommendation, and your
     assessment of close probability.

  3. Identify the potential "deal-breaker" from the demo and write a
     plan to address it. Include: what the risk is, who owns it
     internally, what the timeline is, and what the backup plan is if
     the risk can't be resolved.

assertions:
  - type: llm_judge
    criteria: "Demo follow-up is personalized and specific — references each attendee's reactions and questions (Jamie on white-label, Casey on SQL/Snowflake, Robin on real-time and security), not a generic recap"
    weight: 0.35
    description: "Personalized demo follow-up"
  - type: llm_judge
    criteria: "CRM notes capture deal intelligence — attendee influence mapping, feature-to-person mapping, Snowflake as deal-breaker risk, COO as final approver, 3-week timeline, pricing on the table"
    weight: 0.35
    description: "Intelligence-capturing CRM notes"
  - type: llm_judge
    criteria: "Deal-breaker plan addresses Snowflake integration — identifies it as Casey's blocker, notes 4-week GA timeline vs Jamie's 3-week recommendation deadline, proposes beta access or workaround"
    weight: 0.30
    description: "Deal-breaker mitigation plan"
