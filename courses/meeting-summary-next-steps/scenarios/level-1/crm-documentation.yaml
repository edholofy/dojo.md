meta:
  id: crm-documentation
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Document meetings in your CRM — learn what to log, how to update opportunity stages, and how to maintain an accurate pipeline based on meeting outcomes"
  tags: [sales, meetings, CRM, documentation, pipeline, Salesforce, beginner]

state: {}

trigger: |
  You're a sales ops analyst at "CRMPro" — a B2B SaaS CRM platform.
  Your VP of Sales pulled a report and found a major problem: "Only 40%
  of our opportunities have notes from the last customer meeting. 60%
  of 'Next Steps' fields are blank or say 'TBD.' I can't forecast
  accurately if I don't know what happened in meetings."

  You've been asked to create the CRM documentation standard. Here are
  3 real opportunities where the AE had meetings but documentation is
  poor. Fix them.

  Opportunity 1: BuildTech Corp, $48K ACV, Stage: "Demo"
  Current CRM notes (most recent): "Had a good demo. They liked it."
  Next step field: blank
  Last activity: 12 days ago

  What actually happened (from the AE when you asked):
  - Demo was with CTO and 3 engineers
  - CTO loved the API but wants to see a POC with their data
  - Engineers asked about Python SDK (it exists but AE didn't know)
  - CTO said "we need to move fast — our current tool's contract ends
    in 45 days"
  - CTO asked AE to send a POC proposal with timeline and pricing
  - POC would be 2 weeks with their test data
  - No pricing has been discussed yet
  - Competitors: also evaluating Tool X

  Opportunity 2: MediCare Plus, $72K ACV, Stage: "Negotiation"
  Current CRM notes: "Working on contract."
  Next step field: "Follow up"
  Last activity: 5 days ago

  What actually happened:
  - Legal meeting with their General Counsel and procurement director
  - They want to change the liability cap from $500K to $1M
  - They want to add a data processing agreement (DPA) for HIPAA
  - Procurement wants payment terms Net 60 (your standard is Net 30)
  - General Counsel will redline the contract and send back by Friday
  - Your legal team needs to review and approve the DPA
  - Target close date: end of month (18 days away)
  - If the deal slips, their Q2 budget expires

  Opportunity 3: StartupLabs, $12K ACV, Stage: "Discovery"
  Current CRM notes: "Initial call went well."
  Next step field: "Send info"
  Last activity: 22 days ago

  What actually happened:
  - Discovery call was 3 weeks ago with the CEO
  - CEO was interested but said budget is tight — "maybe next quarter"
  - No demo was scheduled
  - CEO asked to be added to your newsletter
  - CEO mentioned they just raised a seed round
  - No other stakeholders involved
  - The AE hasn't followed up since the call

  Tasks:
  1. Write proper CRM notes for all 3 opportunities. Each should include:
     meeting date and attendees, key discussion points, BANT update,
     competitive intelligence, risk factors, and accurate next steps
     with dates.

  2. Recommend the correct opportunity stage for each deal and explain
     why. If the current stage is wrong, explain what it should be and
     what triggered the stage change.

  3. Create a "CRM Documentation Checklist" — the fields an AE must
     update after every meeting. Include: the required fields (what's
     mandatory), the recommended fields (what's helpful), the time
     standard (when updates must be done), and the quality standard
     (what "good" documentation looks like vs. what "bad" looks like).

assertions:
  - type: llm_judge
    criteria: "CRM notes are complete — all 3 have meeting dates, attendees, key points, BANT updates, competitive intel, risks, and specific next steps with dates; dramatically better than the originals"
    weight: 0.35
    description: "Complete CRM documentation"
  - type: llm_judge
    criteria: "Stage recommendations are correct — BuildTech should advance to Evaluation/POC, MediCare stays at Negotiation but needs attention, StartupLabs should move to Nurture or be deprioritized"
    weight: 0.35
    description: "Correct stage recommendations"
  - type: llm_judge
    criteria: "Documentation checklist is implementable — required vs recommended fields, time standard (within 2 hours), quality examples of good vs bad, practical enough for sales team to follow"
    weight: 0.30
    description: "Implementable documentation checklist"
