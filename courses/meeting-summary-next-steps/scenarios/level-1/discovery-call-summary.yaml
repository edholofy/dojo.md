meta:
  id: discovery-call-summary
  level: 1
  course: meeting-summary-next-steps
  type: output
  description: "Write discovery call summaries — learn to capture the key qualification information from a discovery call and turn it into a clear follow-up that advances the deal"
  tags: [sales, meetings, discovery, summary, follow-up, beginner]

state: {}

trigger: |
  You're an SDR at "DataVault" — a B2B SaaS data management platform
  ($500-5,000/month). You had 3 discovery calls today and need to write
  summary emails for each. Your manager expects summaries sent within
  1 hour of each call.

  Call 1 (30 minutes) — Lisa Martinez, Head of Data at FinanceHub
  (300 employees, financial services):
  - Current state: Using a legacy on-premise data warehouse that's
    "falling apart." Migration to cloud is a priority for 2026.
  - Pain: Data team spends 60% of time on maintenance instead of
    analysis. CEO wants self-serve analytics for executives.
  - Budget: $50K-80K allocated for data infrastructure modernization.
    Lisa has decision authority up to $50K; above that needs CFO sign-off.
  - Timeline: Board meeting in 8 weeks where she's presenting the
    modernization plan. Wants to have a vendor recommendation by then.
  - Competition: Also evaluating Snowflake and Databricks.
  - Champions: Lisa is the champion. She mentioned her data engineer,
    Raj, is "the one who'll actually implement this."
  - Concerns: Data residency requirements (must stay in US), SOC 2
    compliance, migration complexity from legacy system.
  - Agreed next steps: Demo for Lisa and Raj next week, you'll send
    case study of a similar financial services migration.

  Call 2 (15 minutes) — Mark Thompson, Marketing Manager at RetailCo
  (50 employees, e-commerce):
  - Current state: Using Google Sheets and manual CSV exports for data.
  - Pain: "We have no idea which marketing channels are working."
  - Budget: "I don't really know. I'd need to ask my boss."
  - Timeline: "No rush. We're just starting to look at options."
  - Not a decision-maker: Reports to VP of Marketing who makes tool
    decisions.
  - Very early stage, no urgency.
  - You suggested he forward a product overview to his VP.

  Call 3 (25 minutes) — Sarah Kim, VP of Product at HealthTech
  (180 employees, healthcare):
  - Current state: Using a competitor's product (CompeteData) for 2 years.
    Contract renews in 4 months.
  - Pain: CompeteData doesn't support HIPAA compliance natively. They've
    been using workarounds. Last month, an audit flagged the risk.
  - Budget: Current spend is $36K/year on CompeteData. "If you can match
    or beat that price with HIPAA built-in, it's a no-brainer."
  - Timeline: Need to decide in 60 days to give 60-day notice to
    CompeteData.
  - Decision maker: Sarah makes the decision. CTO has veto power on
    security matters.
  - Agreed next steps: You'll send HIPAA compliance documentation.
    Demo with Sarah and CTO scheduled for Thursday.

  Tasks:
  1. Write the customer-facing follow-up email for each of the 3 calls.
     Each email should: thank them, recap key discussion points (3-5
     bullets), list the specific action items with owners and dates,
     and propose clear next steps.

  2. Write the internal CRM notes for each call. Include: BANT
     qualification summary, deal stage recommendation (e.g., "Discovery"
     → "Qualified" or "Nurture"), competitive intelligence notes, risk
     factors, and recommended strategy.

  3. Rank the 3 deals by priority and explain your ranking. For the
     top-priority deal, write a plan for the next 2 weeks of engagement.

assertions:
  - type: llm_judge
    criteria: "Follow-up emails are professional and concise — each recaps correctly, includes specific action items with dates, and proposes clear next steps that advance the deal"
    weight: 0.35
    description: "Professional concise follow-up emails"
  - type: llm_judge
    criteria: "CRM notes capture qualification data — BANT for each call, correct stage recommendations (Lisa=Qualified, Mark=Nurture, Sarah=Qualified/high priority), competitive intel, and risk factors"
    weight: 0.35
    description: "Qualification-capturing CRM notes"
  - type: llm_judge
    criteria: "Priority ranking is correct — Sarah is top priority (competitive displacement, HIPAA urgency, 60-day deadline), Lisa is second (strong but 8-week timeline), Mark is lowest (no authority, no urgency)"
    weight: 0.30
    description: "Correct priority ranking"
