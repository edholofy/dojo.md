meta:
  id: basic-journey-components
  level: 1
  course: user-journey-mapping
  type: output
  description: "Basic journey map components — identify and document the core elements of a user journey map"
  tags: [journey-map, components, basics, beginner]

state: {}

trigger: |
  You're a junior UX designer at a food delivery app. Your
  manager asks you to create your first user journey map for
  the "ordering dinner" experience. A user named Maria, a
  busy working parent, opens the app at 6pm wanting to order
  dinner for her family of four.

  She browses restaurants, filters by family-friendly options,
  adds items to cart, realizes she forgot to check for her
  son's nut allergy, goes back to check allergen info (which
  is hard to find), modifies the order, enters payment,
  and waits for delivery tracking updates.

  Task: Create a journey map documenting Maria's experience
  with all essential journey map components.

assertions:
  - type: llm_judge
    criteria: "Response identifies and documents core journey map components — stages (the journey is broken into clear sequential phases: discovery/browsing, selection/filtering, ordering/cart, payment/checkout, delivery/tracking — each stage represents a distinct phase of the experience), actions (what Maria does at each stage: opens app, browses restaurants, applies filters, reviews menus, adds items, checks allergen info, modifies order, enters payment, tracks delivery), thoughts and feelings (Maria's internal state: 'what's quick and good for the whole family?' during browsing, frustration when allergen info is hard to find, anxiety about her son's allergy, relief when order is confirmed, impatience during delivery wait), touchpoints (every interaction point: app home screen, search/filter interface, restaurant listings, menu pages, allergen information section, cart, payment screen, delivery tracking screen), pain points (specific friction moments: allergen information is hard to find — this is a critical safety issue not just a UX annoyance, having to go back and modify the order disrupts the flow, uncertainty during delivery wait)."
    weight: 0.35
    description: "JourneyComponents"
  - type: llm_judge
    criteria: "Response structures the journey map in a clear visual or tabular format — organization (presented as a structured document with stages as columns or sections, and rows/layers for actions, thoughts, emotions, touchpoints, and pain points — not just a narrative paragraph), emotional curve (tracks Maria's emotional state across the journey: relatively positive during browsing, stress spike when she remembers the allergy and can't find allergen info, frustration peak when she has to backtrack, relief at checkout, mixed anticipation and impatience during delivery), opportunities (identifies improvement areas at each pain point: make allergen information prominently visible on menu items, allow allergen filters at the restaurant selection stage, provide proactive allergy warnings when items are added to cart, improve delivery tracking with more granular updates)."
    weight: 0.35
    description: "StructureAndFormat"
  - type: llm_judge
    criteria: "Response demonstrates journey mapping fundamentals — user-centered perspective (the map is told from Maria's perspective, not the company's — it captures her experience, not the system's processes), specificity (uses concrete details from the scenario rather than generic journey map filler — references the nut allergy, the family of four, the 6pm timing), completeness (covers the full end-to-end experience from app opening to delivery, doesn't skip stages or leave gaps), actionability (the pain points and opportunities identified are specific enough that a product team could act on them — 'improve allergen visibility' is more actionable than 'make the app better')."
    weight: 0.30
    description: "JourneyMappingFundamentals"
