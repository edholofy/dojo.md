meta:
  id: touchpoint-identification
  level: 1
  course: user-journey-mapping
  type: output
  description: "Touchpoint identification — catalog all interaction points between a user and a product or service"
  tags: [touchpoints, channels, interactions, beginner]

state: {}

trigger: |
  You're a UX designer at a pet insurance company. A
  customer named David recently went through the claims
  process when his dog needed emergency surgery. He's
  frustrated and considering canceling his policy.

  From his account, you can trace his interactions:
  - Searched "pet insurance claims" on Google
  - Landed on your FAQ page (which was outdated)
  - Called customer service (waited 23 minutes on hold)
  - Was told to submit claim via the mobile app
  - Downloaded the app (hadn't used it before)
  - Couldn't figure out how to start a claim
  - Called again (12 minutes on hold)
  - Agent walked him through the app while on the phone
  - Uploaded vet bills (app crashed twice during upload)
  - Received email confirmation but no timeline
  - Checked app daily for 2 weeks with no status change
  - Called again (18 minutes) to ask about status
  - Told claim was "in review" with no further details
  - Finally received partial reimbursement after 4 weeks
  - Amount was less than expected, no explanation provided
  - Tried to find appeals process, couldn't find info

  Task: Create a touchpoint map identifying every
  interaction point in David's claims journey.

assertions:
  - type: llm_judge
    criteria: "Response identifies and catalogs all touchpoints — digital touchpoints (Google search result, FAQ web page, mobile app download, mobile app claims interface, document upload feature, email confirmation, app status checking screen, website appeals information — or lack thereof), human touchpoints (first phone call — 23 min hold, second phone call — 12 min hold with agent walkthrough, third phone call — 18 min hold for status), communication touchpoints (email confirmation without timeline, lack of proactive status updates, reimbursement notification without explanation), each touchpoint documented with: the channel (phone, app, web, email), what David was trying to accomplish, whether it succeeded or failed, and the emotional impact."
    weight: 0.35
    description: "TouchpointCatalog"
  - type: llm_judge
    criteria: "Response evaluates touchpoint quality — failed touchpoints (outdated FAQ — first impression is the company doesn't maintain its resources; app claims flow — not intuitive, required phone support to navigate; document upload — crashed twice, eroding trust; status visibility — no updates for 2 weeks, forcing David to call; appeals process — information not findable), friction touchpoints (all three phone calls with long hold times totaling 53 minutes of waiting; downloading an unfamiliar app during a stressful situation; partial reimbursement with no explanation), missing touchpoints (proactive status updates should exist but don't; estimated timeline communication is absent; explanation of reimbursement calculation is absent; easy appeals path is absent — these are touchpoints that should exist in the journey but currently don't)."
    weight: 0.35
    description: "TouchpointQuality"
  - type: llm_judge
    criteria: "Response organizes touchpoints meaningfully — channel mapping (groups touchpoints by channel: web, app, phone, email — reveals that David was bounced between channels without seamless handoff), chronological flow (shows the sequence of touchpoints to reveal how David's experience degraded over time — from hopeful search to frustrated appeals), touchpoint ownership (identifies which internal team owns each touchpoint: marketing owns the FAQ, product owns the app, support owns the phone experience, operations owns the claims processing — the fragmentation explains the poor experience), key insight (the touchpoint map reveals that David's problem isn't any single bad touchpoint — it's that the touchpoints don't connect: the FAQ doesn't prepare him for the app, the app requires phone support to use, phone support can't provide status, status doesn't explain the outcome)."
    weight: 0.30
    description: "TouchpointOrganization"
