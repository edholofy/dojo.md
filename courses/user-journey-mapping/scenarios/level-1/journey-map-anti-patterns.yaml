meta:
  id: journey-map-anti-patterns
  level: 1
  course: user-journey-mapping
  type: output
  description: "Journey map anti-patterns — identify and fix common mistakes in journey mapping"
  tags: [anti-patterns, mistakes, review, quality, beginner]

state: {}

trigger: |
  You're a senior UX designer reviewing a junior designer's
  first journey map. The map is for a "patient booking a
  doctor appointment" journey at a healthcare company. Here
  are the problems you spot:

  1. The map starts at "Patient opens the app" — ignoring
     everything that happens before (symptoms, worry,
     deciding to see a doctor)

  2. The stages are labeled: "App Launch," "Search Screen,"
     "Results Page," "Booking Form," "Confirmation Screen"
     — named after screens, not user goals

  3. The emotions row says "Happy" at every stage except
     one that says "Frustrated (loading slow)"

  4. The pain points section lists only technical bugs:
     "Button doesn't work on Android," "Page loads in 4.2
     seconds," "Search filter resets when going back"

  5. There are no user quotes, research data, or evidence
     — it appears to be entirely assumed

  6. The "user" is described only as "a patient" with no
     persona details, context, or scenario

  7. The journey ends at "Confirmation screen shown" — no
     mention of what happens after (anxiety while waiting,
     preparing for the appointment, the visit itself)

  Task: Identify each anti-pattern, explain why it's
  problematic, and show how to fix each one.

assertions:
  - type: llm_judge
    criteria: "Response identifies and explains all anti-patterns — truncated journey (starting at app launch ignores the emotional context: the patient has symptoms, is worried, may have researched online, consulted family, and overcome healthcare avoidance — the journey starts before the app and the pre-app context shapes the entire experience), screen-based stages (naming stages after screens makes the map product-centric not user-centric: 'Search Screen' should be 'Finding the Right Doctor' — the user's goal isn't to use a screen, it's to find a doctor they trust), unrealistic emotions ('Happy' at almost every stage is clearly not researched — a patient booking a doctor appointment likely feels: worried about symptoms, anxious about availability, overwhelmed by choices, uncertain about the right doctor, relieved when booked but anxious about the visit), surface-level pain points (only listing technical bugs misses the real pain points: uncertainty about which doctor is right, worry about cost and insurance, anxiety about wait times, fear of bad news — technical bugs matter but they're not the primary pain points in a healthcare journey)."
    weight: 0.35
    description: "AntiPatternIdentification"
  - type: llm_judge
    criteria: "Response addresses evidence and scope problems — no research evidence (a journey map without user quotes, interview data, or analytics is an assumption map — it reflects what the designer thinks happens, not what actually happens; fix: conduct at least 5-8 patient interviews, review support tickets, analyze app analytics), no persona or context (a generic 'patient' could be a healthy 25-year-old booking a routine checkup or an anxious 60-year-old with concerning symptoms — these are completely different journeys; fix: define a specific persona with a scenario — 'Sara, 35, noticed a persistent cough for 2 weeks, worried but has been putting off calling'), premature ending (stopping at 'confirmation screen shown' misses the post-booking experience: waiting days or weeks for the appointment with growing anxiety, preparing questions, traveling to the office, the visit itself, follow-up — the most emotionally intense part of the journey happens after the booking)."
    weight: 0.35
    description: "EvidenceAndScope"
  - type: llm_judge
    criteria: "Response provides corrected versions showing the contrast — before and after for stages (before: 'App Launch, Search Screen, Results Page, Booking Form, Confirmation Screen' → after: 'Recognizing Symptoms, Deciding to Seek Care, Finding the Right Doctor, Scheduling the Appointment, Waiting for the Visit, The Appointment' — user-goal-based stages that tell a meaningful story), before and after for emotions (before: 'Happy, Happy, Happy, Frustrated, Happy' → after: a realistic emotional curve showing worry, anxiety, overwhelm, cautious relief, anticipatory anxiety — based on actual patient interviews), teaching moment (explains the meta-lesson: journey maps are only as good as the research behind them — an assumption-based map can be worse than no map because it creates false confidence that the team understands the user experience when they don't)."
    weight: 0.30
    description: "CorrectedExamples"
