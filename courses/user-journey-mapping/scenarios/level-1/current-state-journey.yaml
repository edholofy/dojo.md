meta:
  id: current-state-journey
  level: 1
  course: user-journey-mapping
  type: output
  description: "Current-state journey map — document how a user experience works today with its existing problems"
  tags: [current-state, as-is, documentation, beginner]

state: {}

trigger: |
  You're a UX researcher at a bank. Your team wants to
  improve the mortgage application process, which currently
  takes an average of 45 days and has a 40% abandonment rate.

  From customer interviews, you know the current experience:
  - Customer visits branch to inquire (or starts online)
  - Gathers required documents (pay stubs, tax returns,
    bank statements — average 12 documents)
  - Fills out a 15-page paper application (or a buggy
    online form that doesn't save progress)
  - Waits 5-7 days for initial review with no status updates
  - Gets called with questions about missing documents
  - Resubmits documents (often the same ones already sent)
  - Waits another 10-15 days for underwriting
  - Receives conditional approval with more document requests
  - Final approval takes another 7-10 days
  - Closing is scheduled with minimal flexibility

  Customer quotes: "I felt like I was in a black hole,"
  "Nobody could tell me where my application was," "I sent
  the same tax return three times to three different people."

  Task: Create a current-state journey map for the mortgage
  application experience.

assertions:
  - type: llm_judge
    criteria: "Response creates a thorough current-state journey map — stages (clear phases: awareness/inquiry, document gathering, application submission, initial review/waiting, follow-up/resubmission, underwriting, conditional approval, final approval, closing), actions per stage (specific customer actions: visiting branch or starting online, collecting 12 documents, filling 15-page form, waiting without updates, responding to calls about missing documents, resubmitting documents already sent, waiting again for underwriting, responding to more document requests, scheduling closing), pain points mapped to stages (document gathering is overwhelming — 12 documents with no checklist guidance; online form doesn't save progress — customers lose work; 5-7 day wait with no status updates — the 'black hole' feeling; duplicate document requests — organizational failure the customer pays for; total 45-day timeline feels endless with no visibility into progress)."
    weight: 0.35
    description: "CurrentStateDocumentation"
  - type: llm_judge
    criteria: "Response captures the emotional journey and evidence — emotional mapping (tracks customer emotions across the journey: hopeful at inquiry, overwhelmed during document gathering, frustrated with the buggy form, anxious during the waiting periods, angry when asked for documents already submitted, exhausted by conditional approval requests, relieved but drained at closing), evidence integration (uses the customer quotes effectively: maps 'black hole' feeling to the waiting stages, maps 'same tax return three times' to the resubmission pain point, maps 'nobody could tell me' to the lack of status visibility), quantitative anchoring (incorporates the data: 45-day average timeline, 40% abandonment rate, 12 required documents, 15-page application — these numbers make the pain points concrete and measurable)."
    weight: 0.35
    description: "EmotionalJourneyAndEvidence"
  - type: llm_judge
    criteria: "Response identifies where the current experience breaks down — abandonment risk mapping (identifies the likely abandonment points: document gathering overwhelm — customers give up before even applying; form that doesn't save progress — customers lose work and quit; the waiting black hole — customers shop competitors during silence; duplicate document requests — the final straw for frustrated customers), internal process failures visible to customer (the customer-facing symptoms of internal problems: no status updates means internal systems don't surface progress; duplicate document requests mean internal handoffs lose information; rigid closing scheduling means the process serves the bank not the customer), clear current-state baseline (the map establishes a measurable baseline that a future-state map can improve against: timeline benchmarks per stage, emotional low points to address, specific touchpoints to redesign)."
    weight: 0.30
    description: "BreakdownAnalysis"
