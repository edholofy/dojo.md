meta:
  id: emotional-journey-curve
  level: 1
  course: user-journey-mapping
  type: output
  description: "Emotional journey curve — map the emotional highs and lows across a user experience"
  tags: [emotions, feelings, curve, empathy, beginner]

state: {}

trigger: |
  You're a UX designer at a fitness app startup. Users sign
  up enthusiastically but 70% stop using the app within 30
  days. Your PM asks you to map the emotional journey of a
  new user's first month to find where motivation dies.

  User research reveals this pattern for "New Year's
  Resolution Rachel":
  - Day 1: Excited to download, sets ambitious goals
  - Day 2-3: Completes first workouts, feels accomplished
  - Day 5: App suggests harder workouts, feels challenged
    but motivated
  - Day 7: Misses a workout, app shows broken streak with
    a guilt-inducing notification
  - Day 10: Falls behind on goals, app dashboard shows
    red "behind schedule" metrics everywhere
  - Day 14: Tries to adjust goals downward but the flow
    is buried in settings and feels like "admitting defeat"
  - Day 18: Opens app, sees all the red metrics, closes
    it immediately
  - Day 21: Gets a push notification "You haven't worked
    out in 3 days!" — feels judged
  - Day 25: Considers deleting the app
  - Day 30: Uninstalls

  Task: Create an emotional journey curve for Rachel's
  first 30 days, identifying the critical emotional
  inflection points.

assertions:
  - type: llm_judge
    criteria: "Response maps the emotional curve with clear highs and lows — emotional highs (Day 1: excitement and optimism at peak — new beginning energy; Days 2-3: accomplishment and pride — completing workouts validates the decision; Day 5: challenged but confident — the app is pushing growth appropriately), emotional lows (Day 7: guilt from broken streak — the app's notification transforms a minor setback into a failure moment; Day 10: discouragement from red metrics — the dashboard becomes a judgment board; Day 14: defeat from goal adjustment difficulty — the app makes reasonable behavior feel like giving up; Day 18: avoidance — the emotional cost of opening the app exceeds the motivation to exercise; Day 21: resentment from judgmental notification — the app has become an antagonist; Day 25-30: apathy and abandonment — emotional disconnection is complete)."
    weight: 0.35
    description: "EmotionalCurveMapping"
  - type: llm_judge
    criteria: "Response identifies critical inflection points and their causes — the pivotal moment (Day 7 is the critical inflection point — Rachel's first missed workout is natural and recoverable, but the app's guilt-inducing broken streak notification turns a minor event into an emotional wound; this is where the design fails: it punishes normal human behavior), the cascade (each subsequent interaction reinforces the negative trajectory: red metrics compound the guilt, buried goal adjustment removes the escape valve, the judgmental notification confirms the app is not on her side — it's a downward spiral the design creates), design-caused vs user-caused (the emotional decline is primarily caused by design decisions not user behavior: broken streak emphasis, red color coding for 'behind,' buried goal adjustment, judgmental notification copy — Rachel's behavior is normal, the app's response is the problem)."
    weight: 0.35
    description: "InflectionPoints"
  - type: llm_judge
    criteria: "Response provides an emotional curve visualization concept and design implications — curve format (presents the emotional journey as a curve or timeline showing emotional intensity: high positive at Day 1-5, sharp drop at Day 7, continued decline through Day 10-14, brief consideration of recovery around Day 14, final descent to abandonment at Day 25-30), design opportunities from emotional data (where design interventions could change the curve: Day 7 — normalize missed workouts instead of punishing them, show encouragement not guilt; Day 10 — reframe metrics as progress not judgment, celebrate what was accomplished; Day 14 — make goal adjustment feel like smart strategy not defeat, surface it proactively; Day 21 — change notification tone from judgment to support; overall — the app should be Rachel's cheerleader not her critic), connection to the 70% stat (explains how the emotional curve pattern explains the 70% 30-day dropout — it's not that users lose motivation, it's that the app actively destroys motivation through punitive design patterns)."
    weight: 0.30
    description: "VisualizationAndImplications"
