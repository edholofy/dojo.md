meta:
  id: day-in-the-life-journey
  level: 1
  course: user-journey-mapping
  type: output
  description: "Day-in-the-life journey map — capture a user's full daily experience to find unmet needs"
  tags: [day-in-the-life, daily-routine, context, unmet-needs, beginner]

state: {}

trigger: |
  You're a UX researcher for a project management tool.
  Your product has good adoption but users say it "doesn't
  fit how they actually work." Your PM asks you to create
  a day-in-the-life journey map for your primary persona:

  "Team Lead Tanya" — manages a team of 8 software engineers.
  Her typical Tuesday:

  7:30am — Checks Slack on phone from bed, 47 unread messages
  8:15am — Arrives at office, opens email (32 emails), your
    PM tool, Jira, Google Calendar, and Slack on desktop
  8:30am — Daily standup (15 min) — takes notes in Google
    Docs because your tool's meeting notes feature is clunky
  9:00am — Updates task statuses in your tool based on standup
    (manually re-entering what was just discussed verbally)
  9:30am — Pulled into unplanned meeting about a blocked task
  10:00am — Tries to write a project status report — copies
    data from your tool into a Google Slides template
  10:45am — Slack message from VP asking "where are we on
    Project X?" — scrambles to compile update
  11:00am — 1:1 with team member about career growth
  11:30am — Reviews 3 pull requests in GitHub
  12:00pm — Lunch (checks Slack on phone, responds to 2
    urgent messages)
  1:00pm — Sprint planning for next week, uses Jira and
    your tool side by side
  2:30pm — Deep work: writing technical design document
  3:30pm — Another "where are we?" message, this time from
    a stakeholder in Teams
  4:00pm — Updates your tool with afternoon progress
  4:30pm — Prepares tomorrow's agenda using Google Calendar
    and your tool
  5:15pm — Leaves office, checks Slack one more time

  Task: Create a day-in-the-life journey map for Tanya
  that reveals opportunities for your product.

assertions:
  - type: llm_judge
    criteria: "Response maps Tanya's full day across all tools and activities — comprehensive timeline (covers 7:30am to 5:15pm with all activities documented, not just the ones involving the PM tool — the point of a day-in-the-life map is to understand the full context), tool ecosystem documented (maps all tools Tanya uses: Slack, email, your PM tool, Jira, Google Calendar, Google Docs, Google Slides, GitHub, Microsoft Teams — shows how fragmented her tool landscape is), time allocation visible (reveals how Tanya actually spends her time: communication and context-switching dominate her day, actual deep work is limited to ~1 hour, status reporting and updates consume significant time, she uses your PM tool for maybe 30-45 minutes total despite it being her team's primary project management tool)."
    weight: 0.35
    description: "DayInTheLifeMapping"
  - type: llm_judge
    criteria: "Response identifies unmet needs through the daily context — product-context gaps (your PM tool doesn't connect to how Tanya actually works: she takes meeting notes in Google Docs because your tool's notes feature is clunky; she manually re-enters standup information; she copies data into Google Slides for reports; she can't quickly answer 'where are we?' questions without scrambling), integration opportunities (the day-in-the-life map reveals that Tanya's pain isn't in any single tool — it's in the gaps between tools: Slack → your tool, your tool → Google Slides, Jira → your tool, standup → your tool — each transition is a manual, time-consuming handoff), context-switching cost (maps the fragmentation: Tanya switches contexts approximately 15-20 times per day, each switch has cognitive cost, the PM tool should reduce context-switching but currently adds to it by not integrating with her actual workflow)."
    weight: 0.35
    description: "UnmetNeedsIdentification"
  - type: llm_judge
    criteria: "Response distinguishes day-in-the-life from product journey — scope difference (a day-in-the-life map captures Tanya's entire day including activities unrelated to your product: 1:1 career conversations, PR reviews, lunch, deep work on technical documents — these provide context for understanding when and why she uses your tool), emotional and energy mapping (tracks Tanya's energy and stress across the day: morning energy used on reactive communication, mid-morning frustration with manual reporting, afternoon fatigue limiting engagement with tools, constant low-level anxiety from 'where are we?' interruptions), product opportunity framing (the map should frame opportunities in terms of Tanya's day, not product features: 'Tanya shouldn't need to manually compile status reports' not 'add a reporting feature'; 'Tanya should be able to answer stakeholder questions in 30 seconds' not 'add a dashboard')."
    weight: 0.30
    description: "DayInTheLifePrinciples"
