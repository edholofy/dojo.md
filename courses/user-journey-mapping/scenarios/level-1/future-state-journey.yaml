meta:
  id: future-state-journey
  level: 1
  course: user-journey-mapping
  type: output
  description: "Future-state journey map — envision an improved user experience based on current-state analysis"
  tags: [future-state, to-be, vision, improvement, beginner]

state: {}

trigger: |
  You're a UX designer at a car rental company. The
  current-state journey map reveals these problems:

  Current state:
  - Booking online takes 8 steps with confusing insurance
    options (abandonment: 35%)
  - At pickup: long queue (avg 25 min), counter agent
    re-enters information already provided online, hard-sell
    on upgrades and insurance the customer already declined
  - Car location: customer given a paper map of the parking
    lot, average 10 minutes to find the car
  - Returns: another queue (avg 15 min), agent walks around
    car slowly checking for damage while customer waits
    anxiously, surprise fuel charges if tank isn't exactly
    full, receipt emailed 3-5 days later

  Customer satisfaction: 2.8/5
  NPS: -15
  Repeat booking rate: 22%

  Task: Design a future-state journey map that reimagines
  the car rental experience.

assertions:
  - type: llm_judge
    criteria: "Response creates a compelling future-state journey — booking reimagined (simplified to 3-4 steps online: select car, add dates, review total with clear insurance explanation, confirm — no dark patterns or confusing upsells; insurance presented as simple clear options not confusing add-ons; abandonment target: below 15%), pickup reimagined (eliminate or drastically reduce the counter queue: digital check-in via app before arrival, car assigned and location sent via app with map pin, walk directly to car and unlock with phone or code — target: 0-5 minutes from arrival to driving; no re-entering information, no surprise upsells at the counter), return reimagined (drive to return area, park, walk away: photo-based car condition captured automatically or via quick self-service scan, fuel level checked digitally with fair pricing, receipt generated instantly via app/email — target: under 5 minutes total return time)."
    weight: 0.35
    description: "FutureStateVision"
  - type: llm_judge
    criteria: "Response connects future state to current-state problems — problem-solution mapping (each future-state improvement explicitly addresses a current-state pain point: 8-step booking → 3-4 steps, 25-min pickup queue → digital bypass, information re-entry → pre-populated data, insurance hard-sell → transparent digital selection, paper parking map → app-based car location, 15-min return queue → drive-park-walk-away, surprise fuel charges → transparent digital fuel tracking, 3-5 day receipt → instant digital receipt), emotional transformation (maps how the emotional journey changes: current anxiety about hidden costs → future confidence with transparent pricing, current frustration at queues → future delight at seamless flow, current dread of return inspection → future ease of quick self-service return), measurable targets (sets improvement targets: satisfaction from 2.8/5 to 4.2+/5, NPS from -15 to +30, repeat booking from 22% to 45%+)."
    weight: 0.35
    description: "CurrentToFutureConnection"
  - type: llm_judge
    criteria: "Response demonstrates future-state journey mapping principles — aspirational but feasible (the future state is ambitious but achievable with current technology — digital check-in, app-based car unlock, and photo documentation all exist in the market today; not science fiction but also not incremental), still journey-format (presented as a journey map with stages, actions, touchpoints, and emotions — not just a feature list or wish list; shows the end-to-end future experience from the customer's perspective), identifies enabling requirements (notes what's needed to achieve the future state: mobile app development, IoT car locks, digital condition capture system, integration between booking and pickup systems — acknowledging that the future state requires investment and implementation)."
    weight: 0.30
    description: "FutureStateprinciples"
