meta:
  id: first-journey-shift
  level: 1
  course: user-journey-mapping
  type: output
  description: "First journey shift — handle multiple beginner journey mapping challenges in a single session"
  tags: [shift, combined, assessment, beginner]

state: {}

trigger: |
  You're a junior UX designer on your second week at a
  startup that sells subscription boxes for hobbyists
  (cooking, painting, gardening). You face three journey
  mapping tasks today:

  TASK 1 — A customer named Linda called support angry:
  "I signed up for the cooking box, waited 2 weeks, got
  a painting box instead. I tried to exchange it on your
  website but there's no option. I emailed support 5 days
  ago and got an automated reply. I'm calling now and I've
  been on hold for 20 minutes. If this isn't fixed today,
  I'm canceling and posting a 1-star review." Map Linda's
  journey from signup to this phone call.

  TASK 2 — Your PM gives you a spreadsheet with 200 rows
  of customer support tickets from the last month. The
  top categories: wrong box received (45 tickets),
  delivery delayed (38), can't cancel subscription (31),
  charged after canceling (28), missing items in box (22),
  website login issues (19), can't change preferences (17).
  Create a pain point map for the overall customer journey.

  TASK 3 — The CEO asks: "What should the IDEAL unboxing
  experience feel like? I want our customers to post
  excited unboxing videos on social media." Create a
  brief future-state journey for the unboxing moment.

  Task: Handle all three beginner-level journey mapping
  challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — Linda's journey map — complete journey (maps Linda's experience from signup through the current phone call: signed up for cooking box with excitement and anticipation, waited 2 weeks, received wrong box — painting instead of cooking — disappointment and frustration, went to website to exchange — no exchange option found — growing anger, emailed support — received automated reply — feels ignored, waited 5 days with no human response — anger building, called support — 20 minutes on hold — at breaking point, threatening cancellation and negative review), emotional escalation (tracks how Linda's emotions escalate: each failed interaction compounds the frustration — the original error was fixable, but the series of failed recovery attempts transformed a logistics mistake into a relationship-ending experience), pain points identified (wrong box fulfillment, no self-service exchange option on website, automated email response with no human follow-up, 20-minute phone hold time — the pain isn't just the wrong box, it's the inability to resolve it)."
    weight: 0.35
    description: "LindaJourneyMap"
  - type: llm_judge
    criteria: "Response handles Task 2 — pain point map from support data — journey-stage mapping (organizes the 200 tickets into journey stages: fulfillment stage — wrong box 45 tickets, missing items 22 tickets; delivery stage — delays 38 tickets; subscription management stage — can't cancel 31 tickets, charged after canceling 28 tickets, can't change preferences 17 tickets; account stage — login issues 19 tickets), prioritization (uses ticket volume to prioritize: wrong box received is the highest-volume issue and directly affects the core value proposition; subscription management issues — can't cancel plus charged after canceling = 59 tickets combined — represent a serious trust and potentially legal concern; delivery delays are the second-highest individual category), pattern recognition (identifies systemic issues: the subscription management cluster — can't cancel, charged after canceling, can't change preferences — suggests the self-service tools are broken or missing; the fulfillment cluster — wrong box plus missing items — suggests quality control problems in the warehouse)."
    weight: 0.35
    description: "PainPointMapFromData"
  - type: llm_judge
    criteria: "Response handles Task 3 — future-state unboxing journey — unboxing experience design (creates a brief future-state journey for the unboxing moment: anticipation building — tracking notification, 'your box is arriving today' message; first impression — attractive packaging, personal touch like a handwritten note or name on the box; the reveal — items arranged beautifully, not just stuffed in; discovery — each item has a card explaining what it is, why it was chosen, and how to use it; connection — a QR code linking to a video tutorial or recipe; sharing prompt — the experience is visually appealing enough to photograph and share naturally), grounded in current problems (the future-state unboxing implicitly addresses current problems: the wrong box issue means the unboxing should clearly indicate which box type this is; missing items should be prevented by a visible checklist; the experience should be good enough that customers want to share, not complain), realistic scope (a brief future-state journey focused on one moment — the unboxing — not trying to redesign the entire subscription experience; appropriate scope for what the CEO asked)."
    weight: 0.30
    description: "FutureStateUnboxing"
