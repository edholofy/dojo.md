meta:
  id: journey-workshop-basics
  level: 1
  course: user-journey-mapping
  type: output
  description: "Journey mapping workshop basics — plan and facilitate a basic journey mapping workshop"
  tags: [workshop, facilitation, collaboration, basics, beginner]

state: {}

trigger: |
  You're a UX designer at a small SaaS company (40
  employees). Your manager says: "I've booked a conference
  room for Friday afternoon. I want you to run a journey
  mapping workshop with the product team. We've never done
  one before."

  Attendees (8 people):
  - 2 product managers (data-driven, skeptical of "design
    exercises")
  - 2 engineers (want concrete outcomes, not "sticky notes")
  - 1 customer support lead (has great customer insight
    but is shy in group settings)
  - 1 marketing manager (tends to dominate conversations)
  - 1 sales rep (focuses only on prospect experience)
  - You (the facilitator)

  Available: 3-hour block, whiteboard, sticky notes, markers,
  printed customer quotes from recent interviews (12 quotes),
  and analytics showing the conversion funnel with drop-off
  rates.

  The journey to map: new user onboarding (from first
  website visit to "aha moment" at 7 days).

  Task: Plan the workshop agenda, facilitation approach,
  and how to handle the team dynamics.

assertions:
  - type: llm_judge
    criteria: "Response provides a clear workshop plan — agenda structure (3-hour block broken into focused segments: introduction/context setting — 15-20 min to explain journey mapping purpose and show the analytics data to get buy-in from the data-driven PMs; silent brainstorming — 15-20 min where everyone individually writes actions, thoughts, and pain points on sticky notes using the customer quotes as prompts; stage definition — 20-30 min to collaboratively group sticky notes into journey stages; journey building — 45-60 min to fill in each stage with actions, thoughts, emotions, touchpoints, and pain points; prioritization — 20-30 min to identify the top 3-5 opportunities; wrap-up — 15 min to agree on next steps), timing realistic (3 hours is tight for a first-ever journey mapping workshop — the plan acknowledges this and focuses scope appropriately on one journey, doesn't try to do too much)."
    weight: 0.35
    description: "WorkshopPlan"
  - type: llm_judge
    criteria: "Response addresses team dynamics and facilitation techniques — handling the marketing manager who dominates (use structured turn-taking, silent brainstorming before discussion, dot-voting instead of verbal consensus — give everyone equal voice), drawing out the support lead who is shy (the support lead has the most direct customer knowledge — give them a specific role like 'customer voice' or call on them for customer evidence when specific stages are discussed, use the silent brainstorming to capture their input without requiring them to speak up in a group), engaging skeptical PMs and engineers (lead with the analytics data and customer quotes — ground the exercise in evidence not opinion; frame the output as a prioritized problem list not a feelings exercise; promise concrete next steps like 'we'll leave with 3 specific things to fix'), managing the sales rep's prospect focus (acknowledge that the prospect experience matters but scope the workshop to post-signup onboarding — offer to do a separate prospect journey map later)."
    weight: 0.35
    description: "FacilitationApproach"
  - type: llm_judge
    criteria: "Response prepares for workshop success — materials preparation (what to prepare before Friday: print customer quotes large enough to read from a distance, prepare the analytics funnel data as a poster or slide, pre-draw the journey map template on the whiteboard with blank stage columns and rows for actions/thoughts/emotions/touchpoints/pain points, prepare sticky note color coding — one color per category), expected outputs (what the team should leave with: a completed current-state journey map for onboarding, a prioritized list of the top 3-5 pain points to address, agreement on who owns the next steps for the top issues, a shared understanding of the customer's onboarding experience), first-time facilitator tips (acknowledge that this is the team's first journey map: start with a 2-minute example of a simple journey map from a familiar context like ordering coffee to make the concept tangible; set expectations that the first map won't be perfect; emphasize that the discussion is more valuable than the artifact)."
    weight: 0.30
    description: "WorkshopPreparation"
