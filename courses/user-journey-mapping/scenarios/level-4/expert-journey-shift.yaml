meta:
  id: expert-journey-shift
  level: 4
  course: user-journey-mapping
  type: output
  description: "Expert journey shift — handle multiple expert-level journey mapping challenges in a single session"
  tags: [shift, combined, assessment, expert]

state: {}

trigger: |
  You're the Chief Experience Officer at a global logistics
  company ($12B revenue, 60,000 employees, operations in
  35 countries). You face three expert-level challenges:

  TASK 1 — Your Board of Directors wants to understand
  the ROI of your 3-year, $25M journey management program.
  Results: customer satisfaction up from 3.2 to 4.1/5,
  NPS from 18 to 42, operational costs down 12%, customer
  retention up from 82% to 91%. But the CFO says "the
  economy improved too — how much is really attributable
  to journey work?" Prepare the board ROI case.

  TASK 2 — Your company is acquiring a regional competitor
  ($2B revenue, 12,000 employees, 15 countries). They
  have no CX program and make all decisions based on
  operational efficiency. Their customers complain about
  "being treated like packages, not people." You need to
  integrate their customer journeys without disrupting
  their operations during the busy holiday season
  starting in 8 weeks.
  Create the journey integration plan.

  TASK 3 — A management consulting firm has ranked your
  company's customer experience as #1 in the logistics
  industry for the first time. The CEO wants you to
  present at the company's annual strategy meeting about
  what journey management has done for the company and
  where you're taking it next. Your audience: 500 senior
  leaders across 35 countries.
  Create the strategy presentation outline.

  Task: Handle all three expert-level challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — Board ROI case — attribution methodology (addresses the CFO's valid concern: uses multiple attribution methods — controlled comparison between journey-improved and non-improved segments; timing analysis showing metric improvements correlating with specific journey interventions; customer attribution surveys asking directly; benchmarking against industry — if the economy improved for everyone but your company improved more, the delta is attributable to your program), financial translation (translates CX metrics to financial impact: retention improvement from 82% to 91% on $12B revenue = approximately $X billion in preserved revenue over 3 years; 12% operational cost reduction = $Y hundred million in savings; NPS improvement from 18 to 42 correlates with organic growth rate increase; conservative total: the $25M program has delivered $X-Y in value, representing a significant multiple ROI), board-appropriate framing (presents the case with rigor appropriate for a board: range estimates rather than point estimates, sensitivity analysis showing ROI under different attribution assumptions, comparison to alternative investments the $25M could have funded, and forward-looking value — the program's benefits compound as the organization's journey capabilities mature)."
    weight: 0.35
    description: "BoardROICase"
  - type: llm_judge
    criteria: "Response handles Task 2 — acquisition journey integration with holiday constraint — holiday-season constraint (8 weeks until busy season means: no customer-facing changes before or during the holiday season; the integration plan must be phased: immediate — assess the acquired company's customer journeys through rapid research; holiday period — monitor and support without changing anything; post-holiday — begin the integration with lessons learned from observing the holiday peak), 'packages not people' diagnosis (the acquired company's customers feel dehumanized — this is a journey design problem: map the current journeys to identify where the operational-efficiency-first approach creates inhuman experiences: automated status messages with no empathy, rigid processes with no flexibility, support agents measured on call duration not resolution; the journey integration should humanize these experiences without sacrificing operational efficiency), integration approach (don't impose your CX program wholesale: start with the acquired company's 3-5 most complained-about journey stages; apply journey mapping to understand the root causes; implement targeted improvements post-holiday that demonstrate the value of journey thinking; gradually build CX capability within the acquired company's organization rather than replacing their approach)."
    weight: 0.35
    description: "AcquisitionIntegration"
  - type: llm_judge
    criteria: "Response handles Task 3 — strategy presentation for 500 leaders — presentation narrative (tells the story of the company's journey transformation: where we were — #3 in the industry with declining satisfaction and growing customer complaints; what we did — invested in understanding our customers' journeys and redesigning around their needs; where we are — #1 in the industry for the first time; where we're going — from #1 in the industry to setting the standard for journey management globally), global audience considerations (500 leaders across 35 countries: the presentation must resonate across cultures; use specific examples from different regions to show that journey management works everywhere; acknowledge that implementation varies by market while the principles are universal; provide actionable takeaways that leaders can apply in their own regions), forward vision (what's next for the journey program: expanding journey management to the acquired company's 15 countries; advancing from reactive journey improvement to predictive journey optimization; investing in real-time journey orchestration capabilities; setting the ambition to be not just #1 in logistics but to be recognized as a top-10 CX company across all industries)."
    weight: 0.30
    description: "StrategyPresentation"
