meta:
  id: journey-ma-integration
  level: 4
  course: user-journey-mapping
  type: output
  description: "Journey M&A integration — harmonize customer journeys during mergers and acquisitions"
  tags: [merger, acquisition, integration, harmonization, expert]

state: {}

trigger: |
  You're the Chief Customer Officer at a $5B insurance
  company that has just acquired a $1.5B competitor. The
  CEO says: "We have 18 months to fully integrate. I
  don't want to lose a single customer during the
  transition."

  The situation:
  - Your company: 3M customers, traditional agent-based
    model, 45 journey maps, NPS 32, customer tenure avg
    8 years, CX maturity Level 3
  - Acquired company: 1.2M customers, digital-first
    model, 12 journey maps, NPS 48, customer tenure avg
    3 years, CX maturity Level 4

  Key challenges:
  - The acquired company's customers chose a digital-first
    experience — forcing them into your agent-based model
    would cause mass churn
  - Your customers value the agent relationship — forcing
    them into a digital model would also cause churn
  - Product overlap: both companies offer auto and home
    insurance with different pricing, features, and claims
    processes
  - Technology: your company runs on a 20-year-old policy
    system, the acquired company runs on modern cloud
    infrastructure
  - Brand: do you keep both brands, merge into one, or
    create something new?

  Task: Create a journey-driven M&A integration strategy
  that minimizes customer churn and maximizes synergies.

assertions:
  - type: llm_judge
    criteria: "Response designs a journey-centric integration strategy — customer-first principle (the integration should be driven by customer journey impact, not operational convenience: every integration decision is evaluated through the lens of 'how does this affect the customer's journey?'; the technology migration, brand consolidation, and product harmonization are all secondary to preserving and improving the customer experience), journey portfolio harmonization (merging 45 + 12 = 57 journey maps: audit both portfolios — identify identical journeys that can be merged, unique journeys that must be preserved, and conflicting journeys that must be reconciled; the 'claims process' journey exists in both companies — which is better? the answer should be based on customer satisfaction data, not which company is the acquirer), dual-model preservation (the most critical integration decision: don't force one model on all customers; maintain both agent-based and digital-first channels for the combined customer base; let customers self-select their preferred model; over time, many traditional customers may migrate to digital voluntarily — but forcing the transition would cause the churn the CEO wants to avoid)."
    weight: 0.35
    description: "IntegrationStrategy"
  - type: llm_judge
    criteria: "Response addresses churn risk and customer communication — churn risk mapping (identifies the highest-risk customer segments: acquired company's digital-first customers — they chose the acquired company specifically for its digital experience; any degradation would trigger churn; your company's agent-loyal customers — they value the personal relationship; any suggestion that agents are being replaced would trigger churn; customers with active claims — any transition confusion during an active claim would be devastating; the highest-risk moment is the brand and system transition announcement), customer communication strategy (different messages for different segments: for your existing customers — 'nothing changes about your agent relationship; in fact, we're adding digital options if you'd like them'; for acquired customers — 'your digital experience is preserved and protected; we're investing in making it even better, not changing it'; for both — 'the combined company offers you more choices: agent-based service when you want a personal touch, digital-first when you want speed and convenience'), 18-month integration timeline (phases: months 1-3 — no customer-facing changes, internal assessment and planning; months 4-9 — backend system integration with zero customer impact; months 10-15 — gradual introduction of cross-company benefits — agent customers get digital tools, digital customers get agent access if desired; months 16-18 — full integration with unified platform and preserved choice)."
    weight: 0.35
    description: "ChurnRiskManagement"
  - type: llm_judge
    criteria: "Response maximizes synergies through journey integration — technology synergy (the acquired company's modern cloud platform is likely superior: migrate your 20-year-old system to the acquired company's infrastructure — this is a rare M&A scenario where the acquired company's technology should win; but the migration must be invisible to your 3M customers — their journey doesn't change even as the backend transforms), best-of-both journeys (use the integration to improve both customer bases: the acquired company has a higher NPS — analyze what makes their journeys better and apply those learnings to your customer base; your company has longer customer tenure — analyze what creates loyalty and apply it to the acquired company's shorter-tenure customers; the combined company should have better journeys than either company had independently), brand strategy informed by journey analysis (the brand decision should be journey-driven: if both brands have strong customer attachment, a dual-brand strategy preserves journey continuity; if the acquired brand is stronger with digital customers, maintain it as the digital brand; if a new brand is created, ensure the transition is gradual and doesn't disrupt active customer journeys; the brand is a touchpoint in the journey — changing it affects emotional connection and trust)."
    weight: 0.30
    description: "SynergyMaximization"
