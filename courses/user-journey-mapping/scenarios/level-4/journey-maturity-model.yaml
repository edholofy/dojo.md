meta:
  id: journey-maturity-model
  level: 4
  course: user-journey-mapping
  type: output
  description: "Journey maturity model — assess and advance an organization's journey management capabilities"
  tags: [maturity-model, assessment, capability, advancement, expert]

state: {}

trigger: |
  You're a CX strategy consultant hired by a $2B retail
  company to assess their journey management maturity.
  After a 2-week assessment, here's what you found:

  Governance (Level 1 — Ad Hoc):
  - No formal journey ownership model
  - Journey maps created on-demand by individual teams
  - No standards, templates, or quality criteria

  Process (Level 2 — Managed):
  - Some teams have repeatable journey mapping processes
  - Marketing runs quarterly journey workshops
  - No cross-functional journey coordination

  Measurement (Level 1 — Ad Hoc):
  - No journey-stage metrics defined
  - NPS measured quarterly but not tied to journey stages
  - No connection between journey insights and KPIs

  Culture (Level 2 — Managed):
  - Customer-centricity is a stated value but not practiced
  - Some teams reference journeys in planning, most don't
  - No executive-level journey champion

  Technology (Level 1 — Ad Hoc):
  - Journey maps in PowerPoint and Miro — no dedicated
    platform
  - Customer data in 6+ systems with no unified view
  - No journey analytics capabilities

  Skills (Level 2 — Managed):
  - UX team has strong journey mapping skills
  - Other teams have minimal CX training
  - No journey-focused hiring criteria

  The CEO says: "Our competitors are winning on customer
  experience. I need a plan to get us to best-in-class
  within 3 years."

  Task: Create a journey maturity assessment report with
  a 3-year advancement roadmap.

assertions:
  - type: llm_judge
    criteria: "Response provides a detailed maturity assessment — dimension-by-dimension scoring (presents each of the 6 dimensions with its current maturity level, evidence for that level, and what the next level looks like: governance at Level 1 — evidence: no ownership, no standards; Level 2 would mean designated owners and basic templates; measurement at Level 1 — evidence: NPS not tied to journeys, no stage metrics; Level 2 would mean basic journey-stage KPIs defined), overall maturity score (synthesizes the 6 dimensions into an overall maturity assessment: average Level 1.5 — between Ad Hoc and Managed; this means the organization creates journey maps but doesn't systematically maintain, measure, or use them to drive decisions), maturity gaps (identifies the largest gaps: technology is the biggest gap — no unified customer data or journey analytics platform; governance is the second — without ownership, nothing else can be sustained; measurement is the third — without metrics, there's no way to know if journey improvements are working; skills and culture are relatively better but can't advance without the infrastructure of governance, technology, and measurement)."
    weight: 0.35
    description: "MaturityAssessment"
  - type: llm_judge
    criteria: "Response creates a 3-year advancement roadmap — year 1 foundation (target: move all dimensions to Level 2-3; key actions: establish journey governance — appoint journey owners for the top 5 customer journeys; create standards — one template, one tool, one quality bar; define journey-stage metrics for the top 5 journeys; select and implement a journey management platform; launch CX training for product managers and key stakeholders; hire or appoint a VP of CX to champion the program), year 2 scaling (target: move all dimensions to Level 3-4; key actions: expand journey ownership to all major journeys; integrate customer data into a unified platform; implement journey analytics — real-time visibility into journey health; embed journey metrics in team OKRs and executive dashboards; expand CX training to all customer-facing functions; establish cross-functional journey governance council), year 3 optimization (target: Level 4-5 across dimensions; key actions: predictive journey analytics — anticipate problems before they occur; automated journey interventions based on behavioral triggers; journey-driven product strategy — all product decisions reference journey insights; journey management is embedded in organizational culture — not a program but how the company operates; external benchmarking and thought leadership in CX)."
    weight: 0.35
    description: "AdvancementRoadmap"
  - type: llm_judge
    criteria: "Response addresses investment and change management — investment requirements (estimates the investment needed across 3 years: technology — journey management platform and customer data platform, approximately $500K-1M over 3 years; people — VP of CX hire, CX training program, possibly 2-3 dedicated journey analysts, approximately $1-2M annually; process — consulting and change management support, approximately $200-400K in year 1; total 3-year investment: $4-8M, which is less than 0.5% of the company's $2B revenue), change management approach (moving a $2B company from Level 1.5 to Level 4+ requires significant organizational change: executive sponsorship is critical — the CEO's mandate is an asset; quick wins in year 1 to build credibility — pick one high-pain journey, improve it measurably, and publicize the success; resistance management — teams that are used to operating without journey discipline will resist; make it easy — the governance framework should simplify decisions not add bureaucracy), measuring maturity advancement (how to know if the roadmap is working: reassess maturity dimensions annually using the same framework; track leading indicators — number of journey-informed product decisions, journey map freshness, cross-functional journey usage; track lagging indicators — NPS improvement, customer satisfaction trends, retention improvement)."
    weight: 0.30
    description: "InvestmentAndChange"
