meta:
  id: journey-portfolio-optimization
  level: 4
  course: user-journey-mapping
  type: output
  description: "Journey portfolio optimization — manage and optimize a portfolio of customer journeys across multiple product lines"
  tags: [portfolio, optimization, multi-product, management, expert]

state: {}

trigger: |
  You're the VP of CX at a $4B diversified technology
  company with 6 product lines and 85 documented customer
  journeys. The CEO says: "We can't invest equally in all
  85 journeys. Which ones matter most, and how do we
  allocate CX resources across them?"

  Portfolio overview:
  - Product A (40% of revenue): 22 journeys, avg CSAT 4.1
  - Product B (25% of revenue): 18 journeys, avg CSAT 3.2
  - Product C (15% of revenue): 15 journeys, avg CSAT 4.5
  - Product D (10% of revenue): 12 journeys, avg CSAT 2.9
  - Product E (7% of revenue): 10 journeys, avg CSAT 3.8
  - Product F (3% of revenue): 8 journeys, avg CSAT 3.5

  Cross-product data:
  - 45% of customers use 2+ products
  - Cross-product customers have 2x higher lifetime value
  - The biggest cross-product pain point: inconsistent
    support experience across products
  - Churn correlates most strongly with journeys scoring
    below 3.0 CSAT
  - 60% of CX budget currently goes to Product A (the
    largest) regardless of journey quality

  Task: Create a journey portfolio optimization framework
  and resource allocation strategy.

assertions:
  - type: llm_judge
    criteria: "Response creates a portfolio optimization framework — journey categorization (categorizes the 85 journeys by strategic importance: tier 1 — revenue-critical journeys in high-revenue products with below-average satisfaction, these are immediate risks; tier 2 — cross-product journeys used by the 45% multi-product customers, these protect the highest-LTV segment; tier 3 — journeys in high-CSAT products that need maintenance not improvement; tier 4 — journeys in low-revenue products that get proportional but not outsized investment), scoring methodology (each journey scored on: revenue at risk — what revenue is exposed if this journey degrades?; churn correlation — does low CSAT on this journey predict churn?; cross-product impact — does this journey affect multi-product customers?; improvement potential — how much can this journey realistically improve?; strategic alignment — does improving this journey support the company's growth direction?), portfolio rebalancing (the current 60% allocation to Product A is inertia not strategy: Product D at 2.9 CSAT is below the 3.0 churn-correlation threshold — it needs urgent investment; Product B at 3.2 CSAT contributes 25% of revenue but satisfaction is mediocre — moderate investment needed; Product C at 4.5 CSAT is excellent — maintain with minimal investment; the cross-product support inconsistency affects 45% of customers who have 2x LTV — this deserves dedicated cross-product investment)."
    weight: 0.35
    description: "PortfolioFramework"
  - type: llm_judge
    criteria: "Response provides specific resource allocation recommendations — reallocation strategy (shifts from revenue-proportional to impact-proportional allocation: Product D gets elevated investment despite being only 10% of revenue because its 2.9 CSAT is a churn risk — losing those customers affects revenue and potentially cross-product customers who also use other products; Product B gets increased investment because 25% revenue × mediocre satisfaction = significant revenue at risk; cross-product experience gets dedicated investment — an inconsistent support experience across products affects the highest-value customer segment), what gets reduced (Product A's 60% allocation is reduced to 35-40% — it has 4.1 CSAT and 40% revenue, which means its journeys are performing well; the reduction is proportional to its relative satisfaction and lower improvement potential; Product C's allocation is reduced to maintenance level — 4.5 CSAT is excellent, invest in maintaining not improving), measuring portfolio health (creates a portfolio-level dashboard: overall portfolio CSAT weighted by revenue; percentage of journeys above 3.5 CSAT threshold; cross-product journey consistency score; quarterly trend showing whether the portfolio is improving or declining; individual product journey health contributing to the portfolio view)."
    weight: 0.35
    description: "ResourceAllocation"
  - type: llm_judge
    criteria: "Response addresses governance and cross-product challenges — portfolio governance (who makes journey investment decisions: establish a Journey Portfolio Review — quarterly meeting with VPs from all product lines and the CXO; review portfolio health metrics, debate resource allocation, and align on priorities; this prevents the historical pattern of the largest product consuming the most CX resources regardless of need), cross-product journey investment (the 45% of customers using 2+ products are the most valuable: dedicate 15-20% of total CX budget to cross-product journey improvement; focus on: unified support experience regardless of product, consistent UX patterns across products, seamless data flow between products; these improvements protect the 2x LTV segment and create incentive for single-product customers to adopt additional products), from 85 to focused (85 journeys is too many to manage actively: identify the 15-20 journeys that cover 80% of customer interactions and revenue — actively manage and improve these; the remaining 65 journeys get basic monitoring with alerts if satisfaction drops below threshold; this 80/20 approach focuses resources where they have the most impact)."
    weight: 0.30
    description: "GovernanceAndCrossProduct"
