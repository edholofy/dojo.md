meta:
  id: enterprise-journey-management
  level: 4
  course: user-journey-mapping
  type: output
  description: "Enterprise journey management — build and operate a journey management program at enterprise scale"
  tags: [enterprise, journey-management, operations, scale, expert]

state: {}

trigger: |
  You're the newly hired Chief Experience Officer at a
  Fortune 500 telecommunications company ($15B revenue,
  35,000 employees, 20M customers). The company has:

  - 78 journey maps across consumer, business, and
    enterprise segments
  - 12 product lines (mobile, broadband, TV, IoT, cloud,
    enterprise networking, etc.)
  - 4 customer-facing channels (stores, call center,
    website, app)
  - Customer satisfaction: 58/100 (industry average: 72)
  - NPS: 12 (industry average: 32)
  - Churn: 1.8% monthly (industry average: 1.2%)

  The 78 journey maps were created by different teams
  over 5 years. Some are excellent, most are outdated,
  and many conflict with each other. Product teams make
  decisions in silos. The customer experiences the
  company as fragmented.

  The CEO says: "We spend $50M annually on CX initiatives
  across the company, but our scores keep declining. Fix
  this."

  Task: Design an enterprise journey management program
  that transforms how this organization understands and
  serves customers.

assertions:
  - type: llm_judge
    criteria: "Response designs an enterprise-scale journey management structure — journey portfolio management (treating the 78 maps as a portfolio: audit and consolidate — reduce to 20-30 active, high-quality journey maps organized by segment and lifecycle stage; establish a journey hierarchy — macro journeys spanning the full customer lifecycle, micro journeys for specific interactions within each macro journey; create a journey map of journey maps — showing how individual journeys connect into the overall customer experience), organizational structure (defines the team and governance needed: Journey Management Office — 8-12 people including journey owners, analysts, and researchers reporting to the CXO; Journey Owners Network — 20-30 product and service leaders who own individual journeys within their domain; Journey Governance Council — monthly cross-functional leadership review; Journey Analytics Team — dedicated data team connecting journey insights to business metrics), operating model (how journey management operates day-to-day: continuous journey monitoring — real-time dashboards tracking journey health metrics; quarterly journey reviews — deep-dive assessments of each major journey; annual journey strategy — connecting journey insights to product roadmap and investment decisions; incident response — when journey metrics drop suddenly, triggering investigation and remediation)."
    weight: 0.35
    description: "EnterpriseStructure"
  - type: llm_judge
    criteria: "Response addresses the $50M CX spending problem — diagnostic (explains why $50M in CX spending isn't improving scores: the spending is fragmented across 12 product lines with no coordination — each team optimizes their silo independently; there's no portfolio-level view showing which journeys matter most for satisfaction and retention; CX initiatives aren't prioritized by journey impact — they're prioritized by team budget and executive preference), investment reallocation (proposes restructuring the $50M: identify the 5 journeys that most impact the satisfaction gap between 58 and 72: likely includes onboarding for new customers, billing and payment, technical support, service change/upgrade, and issue resolution; concentrate 60% of CX investment on these 5 journeys rather than spreading across 78; the remaining 40% maintains baseline quality across other journeys), measurement framework (connects spending to outcomes: each major CX initiative must specify which journey stage it improves and by how much; quarterly ROI review — did the $2M onboarding redesign actually improve time-to-value and reduce early churn?; this accountability mechanism ensures the $50M delivers measurable journey improvement)."
    weight: 0.35
    description: "SpendingOptimization"
  - type: llm_judge
    criteria: "Response provides a transformation roadmap with quick wins — quick wins in 90 days (demonstrate value fast: identify the single worst customer journey — likely technical support or billing — and launch a focused improvement sprint; use existing data to create a 'journey health dashboard' showing the CEO real-time journey metrics; publicize one journey-driven product decision to build organizational awareness), year 1 goals (establish the foundation: complete the journey audit and consolidation from 78 to 20-30; hire the Journey Management Office team; implement journey analytics platform; launch the first 5 journey improvements based on the biggest satisfaction gaps; target: satisfaction from 58 to 63, churn from 1.8% to 1.6%), year 2-3 goals (scale and embed: all major product decisions reference journey insights; journey metrics embedded in executive dashboards and team OKRs; cross-journey optimization — fixing the fragmentation where customers experience different quality across product lines; target: satisfaction from 63 to 70+, NPS from 12 to 25+, churn from 1.6% to 1.3%), closing the gap (the gap from 58 to 72 in satisfaction and 12 to 32 in NPS represents billions in customer lifetime value — each point of NPS improvement can be quantified in reduced churn and increased expansion revenue)."
    weight: 0.30
    description: "TransformationRoadmap"
