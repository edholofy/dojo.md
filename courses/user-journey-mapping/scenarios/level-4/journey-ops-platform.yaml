meta:
  id: journey-ops-platform
  level: 4
  course: user-journey-mapping
  type: output
  description: "Journey operations platform — design the technology and data infrastructure for journey management at scale"
  tags: [journey-ops, platform, technology, infrastructure, expert]

state: {}

trigger: |
  You're the Head of Journey Operations at a multi-brand
  retail conglomerate (5 brands, $8B combined revenue,
  40M customers). The Chief Digital Officer has approved
  budget for a journey management platform and wants your
  recommendation.

  Current state:
  - Each brand has its own CX team (5 teams, 40 people total)
  - Journey maps stored in: Miro (2 brands), Figma (1),
    PowerPoint (1), and a custom SharePoint site (1)
  - Customer data in: 5 separate CDPs, 5 CRMs, 3 analytics
    platforms, 2 voice-of-customer tools
  - No cross-brand customer identification (a customer who
    shops at Brand A and Brand B is treated as 2 different
    people)
  - No real-time journey visibility
  - Each brand measures different CX metrics differently

  Requirements:
  - Unified journey management across 5 brands
  - Cross-brand customer identity resolution
  - Real-time journey analytics
  - Integration with existing CDPs and CRMs
  - Journey map creation, storage, and collaboration
  - Journey performance dashboards
  - Scalable to 40M+ customers
  - Must respect brand autonomy while enabling synergies

  Task: Design the journey operations platform architecture
  and recommend the technology approach.

assertions:
  - type: llm_judge
    criteria: "Response designs a layered platform architecture — data layer (the foundation: cross-brand customer identity resolution — connecting the 40M customers across 5 brands into unified profiles; data ingestion from all existing CDPs, CRMs, analytics platforms, and VoC tools; real-time event stream processing for journey state tracking; data governance ensuring privacy compliance across brands), journey management layer (journey mapping and management: centralized journey map repository with version control; journey builder for creating and editing maps collaboratively; journey template library with shared and brand-specific templates; journey performance metrics connected to each map stage; workflow for journey map review, approval, and publication), analytics and orchestration layer (real-time journey visibility: journey health dashboards per brand and cross-brand; customer journey state tracking — where each customer is in their journey right now; pattern detection — identifying common journey paths and drop-off points; cross-brand journey analysis — do customers who shop multiple brands behave differently?; alerting when journey KPIs deviate from targets)."
    weight: 0.35
    description: "PlatformArchitecture"
  - type: llm_judge
    criteria: "Response addresses the cross-brand challenge — identity resolution (the hardest technical problem: connecting a customer across 5 separate CDPs — requires matching on email, phone, loyalty cards, address, and probabilistic matching; must handle: the same person with different emails at different brands, shared household accounts, corporate vs personal purchases; privacy considerations: some customers may not want cross-brand tracking — opt-out mechanisms needed), brand autonomy vs synergy balance (the platform must serve both: each brand retains its own journey maps, CX team, and metrics; the platform provides shared infrastructure — one identity resolution engine, one analytics platform, one journey mapping tool; cross-brand insights are available but optional — Brand A can see that a customer also shops Brand B but isn't forced to act on it; shared learnings — if Brand C discovers a journey improvement that works, other brands can adopt it), governance model (who controls what: conglomerate CX team sets platform standards and shared infrastructure; brand CX teams own their journey maps and improvement programs; cross-brand journey council reviews shared opportunities quarterly; data governance board ensures privacy compliance across all brands)."
    weight: 0.35
    description: "CrossBrandChallenge"
  - type: llm_judge
    criteria: "Response provides implementation strategy and vendor considerations — build vs buy analysis (evaluates options: full custom build — maximum flexibility but $5-10M+ and 18-24 months; commercial journey management platform with custom integration — faster deployment, proven capabilities, but may not perfectly fit multi-brand needs; composable approach — best-of-breed tools for mapping, analytics, and identity resolution integrated via APIs; recommends the composable or commercial-plus-custom approach for balancing speed with flexibility), implementation roadmap (phased rollout: phase 1 months 1-4 — platform foundation with 1 pilot brand, customer identity resolution proof-of-concept, basic journey dashboards; phase 2 months 5-8 — expand to 3 brands, full analytics capabilities, cross-brand identity resolution; phase 3 months 9-12 — all 5 brands on the platform, cross-brand journey insights, real-time orchestration capabilities; phase 4 ongoing — optimization, AI-powered insights, predictive journey analytics), success metrics (how to measure platform value: time to create and update journey maps — should decrease; journey insight accessibility — measured by cross-functional usage; cross-brand customer recognition rate — percentage of customers identified across brands; journey performance metric coverage — percentage of journeys with real-time health monitoring)."
    weight: 0.30
    description: "ImplementationStrategy"
