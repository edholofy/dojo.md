meta:
  id: journey-culture-transformation
  level: 4
  course: user-journey-mapping
  type: output
  description: "Journey culture transformation — transform an organization from product-centric to journey-centric decision-making"
  tags: [culture, transformation, organizational-change, journey-centric, expert]

state: {}

trigger: |
  You're the Chief Customer Officer at a 10,000-person
  enterprise software company. The company is organized
  by product (5 product lines), but customers buy and
  use multiple products in integrated workflows. This
  product-centric structure creates a fragmented customer
  experience.

  Current reality:
  - Each product has its own PM, engineering, design, and
    support teams — organized vertically
  - Customers use an average of 2.7 products from the
    company but experience 2.7 separate products, not one
    integrated platform
  - Cross-product workflows are painful: data doesn't
    flow between products, UIs are inconsistent, support
    agents only know their own product
  - Customer satisfaction: Product-level scores are 4.0+
    but the "overall platform" score is 2.8
  - The 5 product VPs compete for budget and resources
    rather than collaborating on customer experience
  - Engineering has never seen a customer journey map

  The new CEO says: "We need to be organized around
  customer journeys, not products. But I can't reorganize
  10,000 people overnight."

  Task: Design a journey-centric cultural transformation
  strategy that shifts the organization from product
  thinking to journey thinking without a full reorganization.

assertions:
  - type: llm_judge
    criteria: "Response designs a transformation strategy without full reorg — journey overlay model (instead of reorganizing 10,000 people: create cross-product journey teams that overlay on top of the existing product structure; identify the top 5 customer journeys that span multiple products — e.g., 'new customer onboarding,' 'daily workflow,' 'scaling to enterprise,' 'issue resolution,' 'renewal'; assign a Journey Lead for each cross-product journey — empowered to coordinate across product lines; product teams still exist and own their product — journey teams coordinate the experience that spans products), the 4.0 vs 2.8 gap (this gap is the transformation's motivator: individual product satisfaction at 4.0 proves the teams can build good products; overall platform satisfaction at 2.8 proves the seams between products are the problem; the journey overlay targets the seams: data integration, UX consistency, cross-product support, and seamless workflows; the transformation doesn't need to change how products are built — it needs to change how products connect), breaking the VP competition (the 5 competing VPs are a cultural barrier: introduce journey-level OKRs that require cross-product collaboration; tie executive compensation partially to overall platform satisfaction, not just individual product scores; create a Journey Investment Fund that pools a portion of each product's budget for cross-product improvements)."
    weight: 0.35
    description: "TransformationStrategy"
  - type: llm_judge
    criteria: "Response addresses cultural change and engineering engagement — making engineering care about journeys (engineering has never seen a journey map: start with exposure — invite engineers to watch customer research sessions where customers struggle with cross-product workflows; show journey maps during sprint planning — not as mandates but as context for understanding how their work connects to the customer's real experience; celebrate engineering teams that improve cross-product metrics, not just ship features), cultural mechanisms (embed journey thinking into daily work: journey impact assessment for every major feature — 'how does this feature affect the cross-product journey?'; customer journey story at the start of every sprint planning meeting; cross-product design reviews where teams review how their designs connect; 'journey champions' in each product team who advocate for cross-product experience), the CEO's mandate (the CEO wants journey-centric but can't reorg overnight — the transformation should be phased: months 1-3: establish journey teams, map the 5 key cross-product journeys, create journey metrics; months 4-9: journey teams drive their first cross-product improvements, engineering starts seeing journey maps in sprint planning; months 10-18: journey metrics are embedded in OKRs, cross-product collaboration is normal, the overlay model is proven; months 18-36: consider whether the overlay model should become the primary structure or remain an overlay)."
    weight: 0.35
    description: "CulturalChange"
  - type: llm_judge
    criteria: "Response provides measurable transformation outcomes — success metrics (how to measure if the transformation is working: overall platform satisfaction from 2.8 toward 4.0; cross-product workflow completion rates; time to resolve cross-product support issues; number of cross-product improvements shipped; percentage of engineering teams that reference journey maps in planning; executive collaboration metrics — joint initiatives between product VPs), the business case (the 2.8 overall satisfaction on a platform where customers use 2.7 products is a retention time bomb: customers don't churn from individual products — they churn from the platform; improving overall satisfaction from 2.8 to 3.5+ could reduce churn by X% = $Y in preserved revenue; the fragmented experience is also a competitive vulnerability — integrated competitors can win by offering a unified experience), risk management (the transformation has risks: product VPs may resist journey teams as 'interference'; journey teams without authority can become frustrated coordination layers; if the overlay model doesn't get budget authority, it becomes advisory and is ignored; mitigation: CEO-level sponsorship with clear mandate, journey teams with real budget for cross-product initiatives, product VP compensation tied to platform metrics)."
    weight: 0.30
    description: "MeasurableOutcomes"
