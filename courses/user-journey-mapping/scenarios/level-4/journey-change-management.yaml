meta:
  id: journey-change-management
  level: 4
  course: user-journey-mapping
  type: output
  description: "Journey change management — manage the organizational change required when redesigning critical customer journeys"
  tags: [change-management, redesign, organizational, transformation, expert]

state: {}

trigger: |
  You're the CX Director at a large health insurance
  company (5M members, 8,000 employees). Journey mapping
  has revealed that the member enrollment journey is
  catastrophically broken — 35% abandonment rate, 47-min
  average completion time, NPS of -28.

  The redesign plan requires changes across 6 departments:
  - IT: Modernize the 15-year-old enrollment system
  - Operations: Restructure the enrollment processing team
  - Compliance: Simplify regulatory disclosures without
    violating requirements
  - Marketing: Redesign enrollment communications
  - Sales/Brokers: Retrain on the new digital enrollment
  - Customer Service: Build new support workflows

  Resistance expected from:
  - IT: "We can't change the enrollment system — everything
    depends on it" (15 years of technical debt)
  - Operations: "If you automate enrollment, you're
    eliminating our jobs" (team of 45 processors)
  - Compliance: "Any change to enrollment forms requires
    regulatory review — that takes 9 months minimum"
  - Brokers: "We like the current paper process — our
    clients are older and don't want digital"
  - Leadership: "The last major system change took 3 years
    and went 200% over budget"

  Task: Design a change management strategy for the
  enrollment journey redesign.

assertions:
  - type: llm_judge
    criteria: "Response addresses each resistance source with specific strategies — IT resistance (the 15-year-old system is a legitimate technical risk: strategy — propose a parallel system approach rather than big-bang replacement; build the new enrollment journey alongside the old system, migrate gradually; involve IT architects in the design to address technical concerns early; frame it as modernization that reduces their maintenance burden, not as criticism of their work), operations resistance (job elimination fear is real and must be addressed honestly: strategy — commit to redeployment not elimination — 45 processors can be retrained for higher-value roles like complex case handling, member support, quality assurance; involve the operations team in designing the new process — they know where the current process breaks; provide timeline clarity — 'automation happens gradually over 12 months, retraining begins immediately'), compliance resistance (9-month regulatory review is a legitimate constraint: strategy — engage compliance from day 1 as design partners, not reviewers at the end; work with compliance to identify which disclosures are truly required vs legacy additions; propose a phased approach where regulatory-sensitive elements are addressed first to start the review clock early), broker resistance (older clients preferring paper is partly valid: strategy — maintain a paper option while making digital the primary path; show brokers that digital enrollment actually saves them time; provide broker training and support during transition; co-design the digital experience with broker input)."
    weight: 0.35
    description: "ResistanceStrategies"
  - type: llm_judge
    criteria: "Response provides a phased change management plan — phase 1 coalition building months 1-3 (build support before building anything: executive sponsor secures CEO-level mandate; form a cross-departmental steering committee with representatives from all 6 departments; share the journey map data with all stakeholders — the -28 NPS and 35% abandonment rate create urgency; conduct listening sessions with each resistant group to understand their concerns deeply), phase 2 co-design months 4-8 (involve the resistant groups in designing the solution: operations team helps design the new automated process — they know the edge cases; compliance team reviews designs in real-time rather than at the end; IT architects are embedded in the design team; brokers participate in user testing; this co-design approach transforms resistors into co-owners), phase 3 pilot months 9-12 (prove the new journey works before full rollout: pilot with one state or one member segment; measure results against the current baseline — abandonment rate, completion time, NPS; use pilot results to refine the design and build organizational confidence; address any issues before scaling), phase 4 rollout months 13-18 (gradual rollout with support: phased geographic or segment rollout, not big-bang; intensive training and support for all affected teams; real-time monitoring and rapid response to issues; celebration of milestones and early wins)."
    weight: 0.35
    description: "PhasedChangeManagement"
  - type: llm_judge
    criteria: "Response addresses leadership concerns and communication — overcoming the '3 years and 200% over budget' fear (this is the most dangerous resistance because it comes from the top: acknowledge the history — 'the last project failed because it tried to change everything at once with a waterfall approach'; contrast the approach — 'we're using a phased, agile approach with measurable milestones at every stage'; propose kill criteria — 'if phase 1 pilot doesn't show 50% improvement in abandonment rate, we reassess before phase 2'; demonstrate learning — 'here's specifically how this approach differs from the previous failed project'), communication plan (different messages for different stakeholders: for leadership — 'this saves $X million annually in processing costs and prevents member loss to competitors with better enrollment experiences'; for employees — 'this modernization creates new career paths and eliminates the most tedious parts of your work'; for brokers — 'this makes your job easier and makes you look better to your clients'; for members — 'we're making it easier to get the coverage you need'), measuring change adoption (track whether the organization is actually changing: department-level adoption metrics — is each department implementing their part of the redesign?; resistance tracking — are initial concerns being addressed? are new concerns emerging?; sentiment surveys — is the organization moving from resistance to acceptance to adoption?; the redesign fails if the technology changes but the organization doesn't)."
    weight: 0.30
    description: "LeadershipAndCommunication"
