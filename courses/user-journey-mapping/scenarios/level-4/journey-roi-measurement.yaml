meta:
  id: journey-roi-measurement
  level: 4
  course: user-journey-mapping
  type: output
  description: "Journey ROI measurement — quantify the business value of journey mapping and management"
  tags: [roi, measurement, business-value, financial, expert]

state: {}

trigger: |
  You're the VP of CX at a SaaS company ($200M ARR,
  800 employees). The CFO has asked for a presentation
  on the ROI of the journey management program, which
  has cost $3.2M over 2 years (team, tools, research,
  consulting). The CFO says: "I need to see numbers, not
  feel-good stories about customer empathy."

  What you've done over 2 years:
  - Created and maintained 15 journey maps
  - Ran 24 journey-driven improvement projects
  - Hired a 6-person CX team
  - Implemented a journey analytics platform
  - Conducted 200+ customer research sessions

  What you can measure:
  - NPS improved from 22 to 38
  - Customer churn decreased from 14% to 10% annually
  - Support ticket volume decreased by 25%
  - Onboarding time-to-value decreased from 21 days to 8
  - Customer expansion revenue increased 18%
  - Feature adoption rate for journey-informed features:
    67% vs 34% for non-journey-informed features

  What's hard to attribute:
  - How much of the NPS improvement is due to journey work
    vs other factors?
  - How much churn reduction is journey-driven vs market
    conditions?
  - Product improvements happened simultaneously — how much
    credit goes to journey insights?

  Task: Build a rigorous ROI framework for the journey
  management program and prepare the CFO presentation.

assertions:
  - type: llm_judge
    criteria: "Response builds a defensible ROI framework — revenue impact quantification (translates journey improvements into dollars: churn reduction from 14% to 10% on $200M ARR = $8M in preserved annual revenue, but conservatively attribute 50% to journey work = $4M; expansion revenue increase of 18% — if base expansion was $30M, the increase is $5.4M, attribute 40% to journey insights = $2.16M; support ticket reduction of 25% — calculate cost per ticket × tickets reduced = estimated $500K-1M in operational savings), feature effectiveness (the most compelling data point: journey-informed features achieve 67% adoption vs 34% for non-journey-informed features — this nearly 2x difference means engineering investment is roughly twice as effective when guided by journey insights; quantify: if the company ships $20M in engineering annually and journey-informed features are twice as likely to be adopted, the journey program effectively doubles the return on a significant portion of engineering investment), conservative attribution (the CFO will challenge attribution — be conservative: use 40-50% attribution factors, present a range rather than a point estimate, acknowledge that other factors contributed, show the methodology transparently so the CFO can adjust assumptions)."
    weight: 0.35
    description: "ROIFramework"
  - type: llm_judge
    criteria: "Response prepares a CFO-appropriate presentation — CFO language (translates CX metrics into financial metrics: NPS improvement → customer lifetime value increase; churn reduction → revenue preservation; support ticket reduction → operational efficiency; time-to-value improvement → faster revenue recognition; feature adoption → engineering ROI; avoid CX jargon — no 'empathy maps,' 'emotional curves,' or 'touchpoint optimization'), the ROI calculation (presents the bottom line: $3.2M invested over 2 years; conservative estimated return: $4M preserved revenue from churn reduction + $2.16M from expansion + $750K from support savings = approximately $6.9M annually in value; ROI = ($6.9M × 2 years - $3.2M) / $3.2M = approximately 330% over 2 years — even with conservative 40-50% attribution; payback period: the investment was recovered within the first year), addressing the attribution challenge (doesn't pretend attribution is clean: presents the methodology — 'we attribute X% of the improvement to journey work based on: controlled comparisons where journey-informed initiatives outperformed non-journey-informed, timing correlation between journey improvements and metric changes, internal stakeholder assessment of influence factors'; invites the CFO to adjust the attribution factors and see that even at much lower attribution, the program is positive ROI)."
    weight: 0.35
    description: "CFOPresentation"
  - type: llm_judge
    criteria: "Response addresses ongoing measurement and future investment — ongoing measurement framework (establishes a system for continuous ROI tracking: monthly journey health dashboard with financial impact estimates; quarterly ROI review comparing journey program costs to attributed value; annual comprehensive assessment with updated attribution analysis; leading indicators that predict future ROI — feature adoption trends, journey satisfaction scores, proactive issue resolution rates), future investment case (uses the 2-year ROI data to argue for continued or expanded investment: the program is delivering 3x+ return — cutting it would save $1.6M/year but risk losing $6.9M+ in annual value; the 67% vs 34% feature adoption data suggests the company should expand journey-informed development not reduce it; propose specific year 3 investments with projected returns based on year 1-2 patterns), comparison to alternatives (how does journey program ROI compare to other investments the CFO evaluates: $3.2M over 2 years is less than one senior engineering team — but the journey program makes all engineering teams more effective; the 2x feature adoption rate means the journey program is the highest-leverage CX investment the company makes)."
    weight: 0.30
    description: "OngoingMeasurement"
