meta:
  id: journey-competitive-intelligence
  level: 4
  course: user-journey-mapping
  type: output
  description: "Journey competitive intelligence — use journey mapping to analyze competitors and identify strategic advantages"
  tags: [competitive-intelligence, competitive-analysis, strategy, differentiation, expert]

state: {}

trigger: |
  You're the VP of Strategy at a digital banking company.
  Your CEO says: "Our competitor just raised $500M and
  is coming after our customers. I need to understand their
  customer experience compared to ours so we can defend
  our position and find advantages."

  Your team conducted competitive journey analysis by:
  - Having 5 team members sign up for the competitor's
    service and document every touchpoint
  - Interviewing 20 customers who use both your service
    and the competitor
  - Analyzing the competitor's app store reviews (4,200
    reviews, 4.6 rating vs your 3.9)
  - Mystery shopping the competitor's customer support
  - Reviewing the competitor's public NPS (58 vs your 34)

  Key findings:
  Your advantages:
  - More product features (savings, investing, credit)
  - Better rates on savings accounts
  - Longer track record (8 years vs competitor's 3)

  Competitor advantages:
  - Account opening: 3 minutes vs your 15 minutes
  - App design: cleaner, faster, more intuitive
  - Support: in-app chat with 2-min response vs your
    phone-only with 12-min hold time
  - Onboarding: guided setup with personal finance goals
    vs your "here's the app, figure it out"
  - Communication: proactive financial insights and alerts
    vs your transactional notifications only

  The competitor wins on experience at every journey stage
  despite having fewer features.

  Task: Create a competitive journey analysis report with
  strategic recommendations.

assertions:
  - type: llm_judge
    criteria: "Response creates a structured competitive journey comparison — stage-by-stage comparison (maps both journeys side by side across stages: account opening — 3 min vs 15 min; onboarding — guided goal-setting vs figure-it-out; daily banking — clean intuitive app vs feature-rich but cluttered; support — 2-min chat vs 12-min phone hold; financial management — proactive insights vs transactional alerts; each stage shows a clear winner and the magnitude of the gap), the features vs experience paradox (addresses the core strategic insight: your company has more features but worse experience; more features can actually hurt experience — cluttered interfaces, confusing navigation, complexity that overwhelms new users; the competitor's fewer features may be a deliberate strategy — they do fewer things but do them extremely well; this challenges the assumption that more features = competitive advantage), the ratings gap explained (your 3.9 app rating vs their 4.6, your NPS 34 vs their 58 — the competitive journey analysis explains why: the rating gap isn't about functionality — it's about experience quality at every touchpoint; customers don't rate apps on feature count — they rate on how the app makes them feel)."
    weight: 0.35
    description: "CompetitiveJourneyComparison"
  - type: llm_judge
    criteria: "Response provides strategic recommendations — close the experience gaps (prioritize the highest-impact journey gaps: account opening from 15 min to under 5 min — this is the first impression and determines whether potential customers become actual customers; add in-app chat support — phone-only support is a generation behind; redesign onboarding with guided goal-setting — the competitor proves this works; add proactive financial insights — move from transactional notifications to a value-adding relationship), leverage your advantages (don't abandon what makes you strong: your feature depth is a genuine advantage for customers who need it — but it must be presented through progressive disclosure, not complexity; your better rates and longer track record build trust — emphasize these in the journey moments where trust matters most, like onboarding and large transactions; your product breadth means a customer can consolidate their entire financial life — the competitor can't offer that yet), defensive strategy (the competitor has $500M to attack: identify your most vulnerable customer segments — likely new customers and young customers who prioritize experience over feature depth; fortify these segments with experience improvements; identify your defensible segments — likely power users and customers who use 3+ products — and invest in cross-product integration to increase switching costs)."
    weight: 0.35
    description: "StrategicRecommendations"
  - type: llm_judge
    criteria: "Response addresses ongoing competitive monitoring — competitive journey monitoring program (this can't be a one-time analysis: establish quarterly competitive journey audits — sign up for competitor services, test new features, track review sentiment; monitor competitor's app store reviews for themes — what are they improving, what are customers praising or complaining about?; track the competitor's NPS and satisfaction publicly and through customer interviews; set up competitive journey alerts — when the competitor launches a new feature or changes a flow, analyze the impact on the journey comparison), competitive journey differentiation strategy (the long-term strategy isn't just to match the competitor but to create defensible journey advantages: identify journey stages where you can be definitively better — leverage your feature depth to create personalized financial journeys the competitor can't match with fewer features; innovate on journey stages the competitor hasn't addressed yet — complex financial planning, multi-product integration, life-event triggered financial guidance), executive reporting (present competitive journey intelligence to leadership regularly: quarterly competitive journey scorecard showing your position vs competitor across key stages; trend analysis — are the gaps closing or widening?; strategic recommendations that evolve based on competitive movement; this makes journey competitive intelligence a permanent input to strategy, not a one-time report)."
    weight: 0.30
    description: "OngoingMonitoring"
