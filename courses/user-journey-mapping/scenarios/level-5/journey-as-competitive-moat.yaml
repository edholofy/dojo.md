meta:
  id: journey-as-competitive-moat
  level: 5
  course: user-journey-mapping
  type: output
  description: "Journey as competitive moat — present journey management as a strategic competitive advantage at the board level"
  tags: [competitive-moat, board-level, strategy, differentiation, master]

state: {}

trigger: |
  You're the CEO of a $3B enterprise software company
  preparing for the annual board meeting. Your company
  has invested $40M over 5 years in journey management,
  making it a core strategic capability. The results:

  - NPS: from 22 to 56 (industry average: 35)
  - Net revenue retention: from 105% to 128%
  - Win rate against competitors: from 28% to 47%
  - Customer lifetime value: increased 85%
  - Time-to-value for new customers: from 90 days to 21
  - Product-led growth: 35% of new customers come from
    existing customer referrals (was 12%)

  A board member challenges you: "Every company claims
  to be customer-centric. Why is journey management a
  moat and not just table stakes?"

  Task: Build the board-level case for journey management
  as a defensible competitive advantage — not just a
  cost center but a strategic moat.

assertions:
  - type: llm_judge
    criteria: "Response argues journey management as a moat — why it's a moat not table stakes (a moat is a capability that competitors can't easily replicate: journey management takes years to build — the data, organizational capability, cultural embedding, and institutional knowledge can't be copied by hiring a consultant or buying a tool; it's a compound advantage — each year of journey data makes personas more accurate, predictions more reliable, and improvements more targeted; competitors starting now are 5 years behind and the gap widens, not narrows), the compound effect (journey management compounds in ways that individual initiatives don't: 5 years of journey data reveals patterns that 1 year can't; organizational journey culture means every employee makes better decisions — this scales multiplicatively; the 35% referral rate from journey-satisfied customers creates a self-reinforcing growth engine — better journeys → more referrals → more customers → more journey data → better journeys; the 128% net revenue retention means existing customers expand faster than new customers need to be acquired — this is the most efficient growth possible), defensibility evidence (the metrics prove the moat: competitors have NPS 35, you have 56 — the 21-point gap means your customers are significantly more loyal and vocal; 47% win rate vs historical 28% means you're winning almost 2 of every 3 competitive deals you lost before; 85% increase in customer lifetime value means each customer is dramatically more valuable — competitors can't match this with features alone)."
    weight: 0.35
    description: "MoatArgument"
  - type: llm_judge
    criteria: "Response quantifies the strategic value — financial impact (translates journey metrics to board-level financial language: 128% net revenue retention on $3B means $840M in expansion revenue annually — the journey program's contribution to this is the highest-ROI investment in the company; 85% increase in CLV means CAC payback period has shortened dramatically; the 35% referral rate means $X in customer acquisition cost savings; the $40M investment has generated an estimated $X-Y return over 5 years, making it the company's most capital-efficient growth driver), valuation impact (journey management affects company valuation: net revenue retention of 128% is a premium SaaS metric that public market investors reward with higher multiples; NPS of 56 signals durable customer relationships — reduces perceived churn risk for investors; the referral-driven growth reduces dependency on paid acquisition — more sustainable and predictable; if the company went public, the journey-driven metrics would command a higher valuation multiple), what happens without it (the risk case is as important as the return case: without continued journey investment, the metrics would slowly regress toward the industry mean — NPS drifts from 56 back toward 35, retention drops, win rates decline; competitors who are investing in CX would close the gap; the $40M investment isn't optional — it's protecting $3B in revenue and the premium valuation that the metrics support)."
    weight: 0.35
    description: "StrategicValuation"
  - type: llm_judge
    criteria: "Response addresses the board member's skepticism directly — every company claims customer-centricity (the board member is right that the term is overused: most companies claim customer-centricity but operate product-centrically — they measure feature adoption not journey satisfaction; the difference is measurable: compare your 128% net revenue retention to competitors at 105% — that gap is the difference between claiming customer-centricity and actually practicing it through journey management; the proof is in the metrics, not the mission statement), what makes this different from CRM or analytics (journey management is not a technology — it's an organizational capability: CRM stores customer data, journey management uses it to fundamentally redesign how the company serves customers; analytics measures what happened, journey management predicts what should happen and designs interventions; competitors can buy the same tools but can't replicate 5 years of organizational learning and cultural embedding), future moat deepening (the moat should be deepened not just maintained: predictive journey capabilities — anticipating customer needs before they arise; AI-enhanced journey personalization — each customer experiences a journey optimized for their behavior pattern; journey management as a platform capability that extends to partners and ecosystem — the company becomes the hub of an experience ecosystem that competitors can't replicate)."
    weight: 0.30
    description: "SkepticismResponse"
