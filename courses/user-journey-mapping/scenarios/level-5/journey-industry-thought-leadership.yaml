meta:
  id: journey-industry-thought-leadership
  level: 5
  course: user-journey-mapping
  type: output
  description: "Journey industry thought leadership — contribute to advancing the journey management discipline"
  tags: [thought-leadership, industry, publication, future, master]

state: {}

trigger: |
  Three industry organizations (Forrester, Gartner, and
  the Customer Experience Professionals Association) invite
  you to co-author a "State of Journey Management 2026"
  report. Your research reveals:

  Industry data:
  - 92% of companies have created journey maps
  - Only 31% use them to make actual product decisions
  - Only 14% have real-time journey analytics
  - Only 8% have predictive journey capabilities
  - Companies with mature journey practices (Level 4+)
    have 2.3x higher NPS than those at Level 1-2
  - The average company has 23 journey maps but no
    governance structure
  - 78% of journey maps are outdated within 6 months
  - Journey management platform market: $8.3B → $25.1B
    projected (CAGR 20.3%)

  Emerging trends:
  - AI-powered journey analytics adoption growing 340% YoY
  - "Journey operations" emerging as a discipline
  - Real-time journey orchestration replacing static maps
  - Companies hiring "Chief Journey Officers"
  - Journey management extending to employee and partner
    journeys

  Task: Write the executive summary for the "State of
  Journey Management 2026" report.

assertions:
  - type: llm_judge
    criteria: "Response writes a compelling executive summary — the maturity gap (frames the central finding: the industry has a journey management maturity crisis — 92% create maps but only 31% use them in decisions, only 14% have analytics, and only 8% have predictive capabilities; this means the vast majority of journey management investment is producing artifacts not outcomes; the 78% staleness rate means most journey maps are historical documents not living tools), the value evidence (the 2.3x NPS multiplier for Level 4+ companies is the report's most important finding: mature journey management isn't just incrementally better — it's transformatively better; this proves that the investment in advancing journey maturity has concrete, measurable business impact; the problem isn't that journey management doesn't work — it's that most companies haven't advanced far enough for it to work), the market signal (the $8.3B → $25.1B market growth and 20.3% CAGR indicate the industry recognizes the opportunity but the maturity data shows most organizations are buying tools without building capabilities; buying a journey management platform doesn't advance maturity if governance, process, and culture haven't caught up — the technology is necessary but not sufficient)."
    weight: 0.35
    description: "ExecutiveSummary"
  - type: llm_judge
    criteria: "Response analyzes the gap between creation and usage — root cause analysis (why the 92% → 31% gap exists: journey maps live in design files, decisions happen in meetings and sprint planning — there's a physical and process separation; journey maps are created by CX teams but decisions are made by cross-functional teams — there's an organizational separation; journey maps are created in project contexts and decay when the project ends — there's a temporal separation; journey maps require interpretation by busy teams who want explicit guidance — there's a cognitive separation), industry recommendations (to close the gap: embed journey insights in decision-making tools — sprint planning templates, design systems, analytics dashboards, executive review templates; expand journey ownership beyond CX — product, engineering, sales, marketing must co-own journey maps; make journey maps dynamic — connected to data, continuously updated, relevant in real-time; simplify journey artifacts — a journey map that takes 30 minutes to read won't be read; reduce to essential insights with drill-down capability), the shift from maps to management (the industry must evolve from 'journey mapping' — a periodic design activity — to 'journey management' — an ongoing operational discipline; journey mapping is creating the document; journey management is using it to drive decisions, measuring its impact, and maintaining it as a living tool)."
    weight: 0.35
    description: "GapAnalysis"
  - type: llm_judge
    criteria: "Response addresses emerging trends and the future of the discipline — journey operations as a discipline (JourneyOps is emerging as a recognized function: dedicated teams monitoring journey health, coordinating improvements, maintaining governance; this mirrors the evolution of DevOps and DesignOps — operational disciplines that professionalized previously ad-hoc practices; the 'Chief Journey Officer' title signals C-suite recognition of journey management as a strategic function), AI transformation (AI is the biggest disruption to journey management in a decade: AI-powered analytics replace quarterly manual analysis with continuous automated insight generation; predictive capabilities enable proactive intervention rather than reactive improvement; natural language processing of customer feedback provides journey insights at a scale human researchers can't match; 340% YoY growth in AI-powered journey analytics shows rapid adoption), beyond customer journeys (the discipline is expanding: employee journey management applies the same principles to internal experience — companies that manage employee journeys alongside customer journeys see correlation between employee satisfaction and customer satisfaction; partner and ecosystem journey management extends to B2B relationships; this expansion means journey management is becoming a universal discipline for understanding and optimizing any human experience within an organizational context)."
    weight: 0.30
    description: "EmergingTrends"
