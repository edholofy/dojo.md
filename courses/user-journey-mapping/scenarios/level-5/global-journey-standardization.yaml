meta:
  id: global-journey-standardization
  level: 5
  course: user-journey-mapping
  type: output
  description: "Global journey standardization — create a unified journey framework for a multinational organization spanning diverse markets"
  tags: [global, multinational, standardization, cultural, master]

state: {}

trigger: |
  You're the Global Head of CX for a multinational bank
  operating in 30 countries across 6 regions. Each region
  has developed its own journey maps independently:

  - North America (8 countries): 22 journey maps, digital-
    first, focused on speed and self-service
  - Europe (10 countries): 35 journey maps, heavily
    influenced by GDPR and PSD2, emphasize privacy and
    consent journeys
  - Asia Pacific (6 countries): 18 journey maps, mobile-
    dominant, include WeChat and LINE integration,
    relationship-focused
  - Latin America (3 countries): 8 journey maps, WhatsApp-
    integrated, installment-heavy, branch-dependent in
    rural areas
  - Middle East (2 countries): 5 journey maps, Islamic
    banking compliant, Arabic-first design
  - Africa (1 country): 3 journey maps, mobile-money
    focused, low-bandwidth optimization

  Total: 91 journey maps, no shared framework, no cross-
  regional visibility, and the global product team building
  a new digital banking platform has no idea which journeys
  to design for.

  Task: Create a global journey standardization strategy
  that respects regional differences while enabling global
  product decisions.

assertions:
  - type: llm_judge
    criteria: "Response designs a global-local journey architecture — global core journeys (identify 8-12 fundamental banking journeys that exist in every market: account opening, payments/transfers, lending/borrowing, savings/investing, support/issue resolution, account management, onboarding, and possibly insurance/wealth management — these are the universal banking needs regardless of culture or regulation), regional journey layers (each region adds context to the global core: North America — speed optimization, digital verification, Zelle/ACH integration; Europe — GDPR consent journeys, PSD2 open banking flows, strong customer authentication; Asia Pacific — WeChat/LINE payment integration, QR code-dominant interactions, relationship-managed service; Latin America — WhatsApp-based banking, installment payment structures, branch-to-digital hybrid; Middle East — Sharia-compliant product journeys, Arabic interface and right-to-left design; Africa — USSD/SMS journeys for low-bandwidth, mobile-money integration), architecture principle (the global core defines WHAT customers need to accomplish — transfer money, open an account, get support; the regional layer defines HOW they accomplish it — through which channels, with which regulatory requirements, in which cultural context; the global product team designs for the core needs and the regional teams adapt for local context)."
    weight: 0.35
    description: "GlobalLocalArchitecture"
  - type: llm_judge
    criteria: "Response addresses the consolidation challenge — 91 map audit methodology (how to consolidate 91 maps: step 1 — create a comparison matrix mapping all 91 journeys against the global core journey set; step 2 — identify clusters — maps describing the same core journey in different regions; step 3 — for each cluster, separate what's universal from what's regional from what's an artifact of different methodology; step 4 — consolidate into 8-12 global core journeys with regional variations), research gap analysis (some regions have thin coverage: Africa has only 3 maps for 1 country — needs significant research investment to understand if global patterns apply; Latin America's 8 maps may miss important mobile-first behaviors; Middle East's 5 maps may not adequately capture Islamic banking journey nuances; prioritize research investment in underrepresented regions), the global product team's problem solved (the new digital banking platform team now has a clear framework: design for the 8-12 global core journeys, build a platform architecture that accommodates regional variation through configuration not custom code, test with regional teams to validate that global designs work locally with appropriate adaptation)."
    weight: 0.35
    description: "ConsolidationMethodology"
  - type: llm_judge
    criteria: "Response provides governance and implementation — governance model (Global Journey Council: CX leaders from each region plus global design leadership, meets quarterly to review the global journey set; Regional Journey Stewards: one per region, responsible for maintaining regional layers and conducting local research; Global Journey Program Owner: one person who maintains the core framework and coordinates cross-regional alignment; standards include: common journey map template usable across all regions, shared taxonomy and terminology in English with local language support, quality criteria for research depth and data currency), implementation roadmap (phase 1 months 1-4: journey audit across all 6 regions, gap analysis, and research planning; phase 2 months 5-8: consolidation into global core with initial regional layers; phase 3 months 9-12: validation with regional teams and the global product team; phase 4 months 13-16: launch with training, governance cadence established; ongoing: quarterly reviews, annual comprehensive update), success metrics (the global product team reports the framework helps them make design decisions for multi-market features; regional teams feel their local market nuances are respected; cross-regional journey consistency improves while local relevance is maintained; time to make journey-informed global design decisions decreases; all 6 regions reference the same core journey names)."
    weight: 0.30
    description: "GovernanceAndImplementation"
