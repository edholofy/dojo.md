meta:
  id: journey-ethics-privacy
  level: 5
  course: user-journey-mapping
  type: output
  description: "Journey ethics and privacy — navigate the ethical challenges of tracking, predicting, and influencing customer journeys"
  tags: [ethics, privacy, data-ethics, responsible-design, master]

state: {}

trigger: |
  You're the Chief Ethics Officer and Chief Experience
  Officer at a major health insurance company. Your
  company has built sophisticated journey analytics that
  can predict member behavior with high accuracy. This
  creates ethical dilemmas:

  Dilemma 1 — Your journey analytics can predict with 82%
  accuracy which members will develop chronic conditions
  based on their behavioral patterns (claim frequency,
  preventive care usage, pharmacy patterns). This could
  enable proactive wellness interventions — or it could
  enable discriminatory pricing and coverage decisions.

  Dilemma 2 — Your journey orchestration system can
  dynamically adjust the member experience based on their
  predicted lifetime value. High-value members get faster
  support response times, personalized communications,
  and proactive outreach. Low-value members get standard
  automated treatment. Is this ethical?

  Dilemma 3 — Your journey data reveals that members who
  receive a certain sequence of nudges (specific emails,
  app notifications, and outreach calls) are 45% more
  likely to renew even if they're unsatisfied with the
  service. This is essentially a persuasion pattern that
  keeps unhappy customers paying. Is this ethical?

  Dilemma 4 — A third-party data broker offers to enrich
  your journey data with members' social media activity,
  purchasing behavior, and location data. This would
  dramatically improve journey prediction accuracy from
  82% to 94%. The data is legally available. Should you
  use it?

  Task: Create an ethical framework for journey management
  that addresses all four dilemmas.

assertions:
  - type: llm_judge
    criteria: "Response creates a principled ethical framework — framework principles (establishes clear principles for ethical journey management: beneficence — journey analytics must be used to benefit customers, not exploit them; transparency — customers should know what data is collected and how it influences their experience; equity — all customers deserve a quality experience regardless of predicted value; consent — customers should be able to opt out of journey tracking and personalization; non-maleficence — journey insights must never be used to harm customers through discriminatory pricing, coverage denial, or manipulative persuasion), dilemma 1 resolution (chronic condition prediction: the analytical capability is ethically neutral — the application determines the ethics; using predictions for proactive wellness interventions that help members — ethical and beneficial; using predictions for discriminatory pricing, coverage denial, or risk selection — clearly unethical and likely illegal; the framework: predictions of health conditions can only be used for member benefit, with member consent, and with human review; they must never flow to pricing, underwriting, or coverage decisions; build technical firewalls between predictive wellness and actuarial/pricing functions), dilemma 2 resolution (value-based service differentiation: providing faster service to high-value members is common practice but ethically problematic in healthcare: healthcare is a regulated right, not a luxury good — all members deserve adequate service; differentiation on service speed creates a two-tier system where vulnerable members may receive worse care; the framework: establish a service floor — every member gets service at or above a quality threshold; premium features can be offered but the standard experience must be excellent; never let predictive value determine response time for urgent or medical matters)."
    weight: 0.35
    description: "EthicalFramework"
  - type: llm_judge
    criteria: "Response addresses the persuasion and data enrichment dilemmas — dilemma 3 resolution (persuasion patterns keeping unhappy customers: this is the most nuanced dilemma — retaining unsatisfied customers through persuasion rather than service improvement is ethically problematic; the 45% renewal lift from nudges isn't customer satisfaction — it's behavioral manipulation; the framework: if journey orchestration increases retention, investigate WHY — if it's because the nudges inform customers about benefits they didn't know about, that's education; if it's because the nudges create urgency, guilt, or inertia that prevents unhappy customers from leaving, that's manipulation; the test: would you be comfortable if the nudge sequence was fully transparent to the customer? if not, it's likely manipulation; the ethical path: fix the satisfaction problem rather than mask it with persuasion), dilemma 4 resolution (third-party data enrichment: just because data is legally available doesn't make it ethically appropriate; purchasing social media activity, purchasing behavior, and location data of health insurance members crosses a boundary — members didn't consent to their insurer knowing their shopping habits, social media posts, and physical movements; the framework: even if legally permissible, assess: would members feel comfortable knowing their insurer has this data? the answer is almost certainly no; this violates the transparency and consent principles; the accuracy improvement from 82% to 94% doesn't justify the trust violation — being slightly more accurate at the cost of being surveilled is not a trade-off members would choose)."
    weight: 0.35
    description: "PersuasionAndDataEthics"
  - type: llm_judge
    criteria: "Response provides practical governance mechanisms — ethical review board (establish an Ethics Review Board for journey management decisions: includes CX, legal, compliance, ethics, member advocacy, and external ethicists; reviews all new journey analytics capabilities before deployment; assesses new data sources against the ethical framework; evaluates journey orchestration patterns for manipulation risk), practical guardrails (operational mechanisms that enforce the ethical framework: technical firewalls between predictive analytics and pricing/underwriting systems; automated fairness audits that detect when journey personalization creates discriminatory outcomes; mandatory human review for predictive models that touch health or financial decisions; opt-out mechanisms that are genuinely accessible, not buried in settings), the business case for ethics (ethical journey management isn't just the right thing to do — it's the smart business strategy: trust is the foundation of the health insurance relationship — members who discover their insurer is using manipulative retention tactics or discriminatory personalization will leave and share their experience publicly; regulatory risk — health insurance is heavily regulated and regulators are increasingly scrutinizing AI and data practices; reputational risk — a data ethics scandal could wipe out years of brand building; the ethical framework protects the company's most valuable asset: member trust)."
    weight: 0.30
    description: "GovernanceMechanisms"
