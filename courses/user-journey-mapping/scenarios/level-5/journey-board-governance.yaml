meta:
  id: journey-board-governance
  level: 5
  course: user-journey-mapping
  type: output
  description: "Journey board governance — establish board-level oversight and accountability for customer journey management"
  tags: [board, governance, executive, accountability, master]

state: {}

trigger: |
  You're the CEO of a publicly traded $5B enterprise
  technology company. After a competitor suffered a major
  customer exodus due to poor experience (losing 30% of
  revenue in 18 months), your Board of Directors asks:
  "How do we ensure customer experience quality has proper
  board-level oversight? We don't want to be blindsided
  by customer dissatisfaction the way our competitor was."

  Current state:
  - CX metrics are reported to the board annually as part
    of a 200-slide strategy deck — buried on slide 147
  - No board member has CX expertise
  - The competitor's board had no visibility into declining
    journey health — by the time financials showed the
    impact, it was too late
  - Your company's NPS has been slowly declining (42 → 38
    → 35 over 3 years) but the board hasn't discussed it
  - Product decisions are reported to the board as feature
    counts, not customer impact
  - Customer churn data reaches the board only in annual
    financial reviews

  The Board Chair says: "Customer experience is now a
  board-level governance matter. Design the oversight
  framework."

  Task: Design a board-level journey governance framework
  that provides meaningful oversight without micromanagement.

assertions:
  - type: llm_judge
    criteria: "Response designs a board-level CX governance framework — board CX dashboard (what the board should see quarterly: 3-5 journey health KPIs with trend lines — NPS, customer satisfaction, net revenue retention, customer effort score, journey completion rates; a 'customer experience risk register' highlighting journeys where satisfaction is declining before it affects financials; competitive CX benchmarking — how does the company compare to top competitors on key journey metrics?; the dashboard should fit on 2 pages, not be buried on slide 147), board CX committee (establishes a dedicated committee or adds CX to an existing committee: 2-3 board members with quarterly deep-dives into CX health; the committee reviews: CX metric trends and root causes, major journey improvement initiatives and their results, CX risk factors and mitigation plans, CX investment ROI; this mirrors how audit committees oversee financial health — a CX committee oversees experience health), leading indicator focus (the competitor's board was blindsided because they only saw lagging indicators — revenue declined after customers had already decided to leave: the board framework emphasizes leading indicators — NPS trend, journey satisfaction trends, support ticket themes, customer health scores; these indicators show customer sentiment changes 6-18 months before they appear in financials; the 42 → 38 → 35 NPS decline over 3 years should have triggered board discussion after the first year's drop, not gone unnoticed for 3 years)."
    weight: 0.35
    description: "BoardGovernanceFramework"
  - type: llm_judge
    criteria: "Response addresses the right level of board engagement — oversight not micromanagement (the board should not be reviewing individual journey maps or feature designs: the board's role is strategic oversight — are we investing appropriately in CX? are our CX metrics trending in the right direction? are CX risks being managed?; management's role is operational execution — which journeys to improve, how to improve them, what features to build; the framework clearly separates these levels: board asks 'is customer satisfaction improving?', management answers with data and plans), CX as fiduciary responsibility (frames CX oversight as a governance obligation: customer experience directly affects revenue, retention, and growth — these are financial outcomes the board is responsible for overseeing; the competitor's 30% revenue loss from poor CX is a governance failure — the board failed to monitor a leading indicator of financial risk; going forward, CX metrics should be treated with the same rigor as financial metrics — audited, trended, benchmarked, and reviewed regularly), board CX competency (addressing the lack of CX expertise: consider adding a board member with CX or customer-facing experience — someone who can interpret CX data and ask informed questions; in the interim, provide board members with an annual CX briefing that educates them on key concepts and industry trends; the board doesn't need to be CX experts — they need to understand what the metrics mean and when to ask questions)."
    weight: 0.35
    description: "AppropriateOversight"
  - type: llm_judge
    criteria: "Response connects to the competitor's cautionary tale and provides accountability — learning from the competitor's failure (analyzes what went wrong: the competitor's journey health was declining for years before the customer exodus — declining NPS, increasing support tickets, rising churn in specific segments — but these signals never reached the board; the board only saw financial metrics which lag CX metrics by 12-18 months; by the time the revenue decline was visible, 30% of customers had already decided to leave — recovery from that position is extremely difficult and expensive), accountability mechanisms (ensures CX accountability at every level: CEO — ultimately accountable for CX outcomes, reports CX health to the board quarterly; CXO — operationally accountable, owns the journey management program, provides data and analysis to the board; product VPs — accountable for journey health within their product lines; the board — accountable for ensuring CX is properly resourced, monitored, and prioritized at the strategic level), proactive intervention triggers (defines when the board should intervene: NPS decline of 5+ points in a single quarter; customer churn exceeding industry average by 2x; major journey satisfaction drop affecting a significant customer segment; competitive CX gap widening significantly; any of these triggers an immediate board discussion, not a note on the next quarterly report)."
    weight: 0.30
    description: "AccountabilityAndPrevention"
