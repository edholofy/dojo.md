meta:
  id: journey-innovation-lab
  level: 5
  course: user-journey-mapping
  type: output
  description: "Journey innovation lab — pioneer next-generation journey methodologies including real-time, predictive, and contextual journeys"
  tags: [innovation, next-generation, predictive, real-time, master]

state: {}

trigger: |
  Your organization has a mature journey management
  practice (Level 4+ maturity). The CEO asks: "What's
  next? How do we push journey management beyond best
  practices into innovation?"

  You propose a Journey Innovation Lab to explore:

  1. Predictive Journey Modeling — can we predict how
     customer journeys will evolve 6-12 months ahead
     based on market trends, technology adoption, and
     behavioral signals?

  2. Real-Time Adaptive Journeys — can journeys adapt
     themselves automatically based on individual customer
     behavior, context, and emotional state?

  3. Contextual Journey Switching — can we model how the
     same customer behaves differently in different
     contexts (work vs personal, urgent vs planned,
     mobile vs desktop, stressed vs relaxed)?

  4. Journey Simulation — can we simulate the impact of
     product changes on customer journeys before building
     anything, like a "flight simulator" for CX?

  Task: Design the Journey Innovation Lab including
  research agenda, experiments, and success criteria.

assertions:
  - type: llm_judge
    criteria: "Response designs experiments for each innovation area — predictive journey modeling (hypothesis: by combining behavioral trend data with market signals and technology adoption curves, we can predict journey evolution 6-12 months ahead; experiment: analyze 3 years of historical journey data alongside market data — can we retroactively predict the journey shifts that actually occurred? for example, did the data signal the shift to mobile-first journeys before it happened in our analytics?; if successful: product teams can design for where customers are going, not just where they are; success criteria: predicted journey evolution matches actual evolution within 70% accuracy 6 months ahead), real-time adaptive journeys (hypothesis: individual customer behavior signals can be used to adapt the journey in real-time — showing different content, adjusting support timing, and changing communication tone based on detected behavioral patterns; experiment: for one journey — new customer onboarding — create 3 adaptive paths that the system selects based on customer behavior in the first 3 sessions; monitor: does adaptive onboarding outperform the static onboarding journey in time-to-value and retention?; success criteria: adaptive journeys achieve 25%+ improvement in target metrics vs static journeys)."
    weight: 0.35
    description: "InnovationExperiments"
  - type: llm_judge
    criteria: "Response addresses contextual switching and journey simulation — contextual journey switching (hypothesis: the same customer behaves meaningfully differently in different contexts — a customer on mobile during a commute has different needs than the same customer on desktop during focused work; experiment: instrument the product to track same-customer behavior across contexts — device type, time of day, session length, task complexity — do distinct behavioral modes emerge? can we detect context switches in real-time?; if successful: the product adapts to context automatically — quick-check mode on mobile, deep-work mode on desktop, urgent-resolution mode during business hours; success criteria: same-customer cross-context analysis reveals 3+ distinct behavioral modes that can be detected with 80% accuracy), journey simulation (hypothesis: we can build a simulation model that predicts how product changes will affect customer journeys before we build anything; experiment: build a journey simulation using historical journey data — model the impact of a proposed product change — e.g., reducing onboarding steps from 8 to 4 — by analyzing similar past changes and their journey impact; validate by comparing simulation predictions to actual results from 3 recent product changes; if successful: product teams can 'test drive' journey changes before committing engineering resources; success criteria: simulation predictions match actual journey impact within 80% accuracy for 3+ test cases)."
    weight: 0.35
    description: "ContextualAndSimulation"
  - type: llm_judge
    criteria: "Response provides lab structure and governance — lab structure (team: 1 lab director, 2 researchers, 1 data scientist, 1 ML engineer, 1 designer — small team focused on experimentation; timeline: 6-month sprints per innovation area — each sprint: hypothesis, experiment design, data collection, analysis, findings presentation; budget: $400-600K annually — primarily people cost plus data infrastructure; reporting: quarterly findings to executive team, annual innovation report), innovation-to-practice pipeline (successful experiments transition to production: real-time adaptive journeys graduate from lab to the main product if metrics prove value; predictive models integrate into quarterly journey planning; contextual detection becomes a standard product capability; journey simulation becomes a product development tool; failed experiments are documented and shared — negative findings inform what not to invest in), measuring innovation ROI (track: experiments that graduate to production practice; business impact of graduated innovations — did adaptive onboarding improve retention?; time from innovation to production — the pipeline should be efficient; industry recognition — publications, presentations, thought leadership positioning; the lab should pay for itself through the value of graduated innovations within 2-3 years)."
    weight: 0.30
    description: "LabStructure"
