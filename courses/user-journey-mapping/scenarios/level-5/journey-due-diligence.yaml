meta:
  id: journey-due-diligence
  level: 5
  course: user-journey-mapping
  type: output
  description: "Journey due diligence — evaluate a company's journey management maturity as part of venture capital or PE due diligence"
  tags: [due-diligence, vc, pe, investment, assessment, master]

state: {}

trigger: |
  A private equity firm asks you to evaluate the journey
  management maturity of three potential portfolio
  companies as part of their due diligence process. Your
  assessment will influence $500M in investment decisions.

  Company A — $100M ARR, 400 employees, B2B SaaS:
  - NPS: 55, net revenue retention: 130%
  - 15 journey maps, updated monthly
  - Dedicated 8-person CX team with VP of CX
  - Journey analytics platform with predictive capabilities
  - All product decisions reference journey insights
  - Customer health score predicts churn with 85% accuracy

  Company B — $75M ARR, 300 employees, B2B SaaS:
  - NPS: 28, net revenue retention: 108%
  - 4 journey maps, created 2 years ago, never updated
  - 1 UX researcher doing journey work part-time
  - No journey analytics — relies on quarterly NPS surveys
  - Product decisions driven by sales requests
  - No churn prediction capability

  Company C — $120M ARR, 500 employees, B2B SaaS:
  - NPS: 42, net revenue retention: 118%
  - 30 journey maps, varying quality
  - 4-person CX team reporting to marketing
  - Basic journey analytics (retrospective only)
  - Journey insights used by design team but not product
    or engineering
  - Customer health scoring based on usage data only

  Task: Write the journey management assessment for all
  three companies and advise the PE firm on implications
  for each investment.

assertions:
  - type: llm_judge
    criteria: "Response assesses all three companies — Company A assessment (Level 4-5 maturity — best-in-class: the metrics reflect mature journey management — 130% NRR and 55 NPS are well above industry; 15 maps updated monthly with predictive analytics indicates operational journey management; the 8-person team with VP leadership shows organizational commitment; 85% churn prediction accuracy is a competitive asset; investment implication: this company's CX capability is a genuine differentiator that supports premium valuation; risk: the capability may be concentrated in the VP of CX — assess key-person dependency), Company B assessment (Level 1 maturity — minimal: 4 stale maps, part-time researcher, no analytics, sales-driven decisions — this company has effectively no journey management practice; the metrics show it: 28 NPS and 108% NRR are below industry benchmarks; investment implication: significant CX improvement opportunity — if PE invests, building a journey program could unlock substantial NRR and NPS improvement; this represents upside potential but also current risk — the company doesn't understand why customers stay or leave), Company C assessment (Level 2-3 maturity — partial: 30 maps of varying quality suggests enthusiasm without governance; 4-person team in marketing suggests CX is positioned as a marketing function not a strategic function; basic analytics without prediction means they can look backward but not forward; investment implication: the foundation exists but isn't being leveraged — the gap between 42 NPS and Company A's 55 represents realizable value if the PE firm invests in advancing maturity from Level 2-3 to Level 4)."
    weight: 0.35
    description: "CompanyAssessments"
  - type: llm_judge
    criteria: "Response provides investment implications and recommendations — valuation impact (journey maturity should affect valuation: Company A's Level 4-5 maturity supports a premium valuation — the 130% NRR and 55 NPS are durable metrics driven by systematic capability, not luck; Company B's Level 1 maturity is a valuation risk — the 108% NRR may decline further without intervention; Company C's Level 2-3 maturity represents unrealized value — with investment, the metrics could improve significantly, supporting a value-creation thesis), risk assessment for each (Company A risks: key-person dependency on the VP of CX, potential regression if investment in the program is cut post-acquisition; Company B risks: the company doesn't understand its customers well enough to predict or prevent churn — a competitor investing in CX could rapidly take share; Company C risks: the 30 inconsistent maps suggest organizational confusion about what journey management is — the CX team reports to marketing, limiting strategic influence), remediation recommendations (Company B investment condition: allocate $1-2M for journey program build-out — hire a VP of CX, conduct foundational research, build first journey analytics; this should be a condition of investment or a first-100-days priority; Company C optimization: invest $500K-1M to upgrade from Level 2-3 to Level 4 — establish governance, move CX from marketing to product/strategy, build predictive analytics; Company A maintenance: protect the existing program — ensure the post-acquisition integration doesn't disrupt the CX capability that drives the premium metrics)."
    weight: 0.35
    description: "InvestmentImplications"
  - type: llm_judge
    criteria: "Response demonstrates PE-appropriate analytical rigor — financial modeling connection (connects journey maturity to financial models PE firms use: Company B's 108% NRR vs Company A's 130% NRR — if Company B could reach 120% NRR through journey management investment, on $75M ARR that's $9M in additional expansion revenue annually; the $1-2M investment in journey management could yield 4-9x return within 2-3 years), portfolio-level view (advises the PE firm at the portfolio level: investing in all three creates a portfolio with different CX maturities and value-creation paths; Company A is a hold-and-protect asset; Company B is a build-and-improve opportunity; Company C is an optimize-and-accelerate play; the PE firm should have a CX playbook that it applies across portfolio companies), due diligence methodology (establishes a repeatable framework the PE firm can use for future evaluations: assess journey management across 6 dimensions — governance, process, measurement, culture, technology, skills; score each dimension on a 5-level maturity scale; connect maturity levels to financial metrics — companies at Level 4+ consistently outperform on NRR, NPS, and LTV; include journey management maturity in standard due diligence checklists alongside financial, legal, and technical due diligence)."
    weight: 0.30
    description: "PEAnalyticalRigor"
