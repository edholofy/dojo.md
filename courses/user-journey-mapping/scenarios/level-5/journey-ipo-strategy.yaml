meta:
  id: journey-ipo-strategy
  level: 5
  course: user-journey-mapping
  type: output
  description: "Journey IPO strategy — position journey management capabilities in investor communications and S-1 filing"
  tags: [ipo, investor, s1-filing, public-markets, master]

state: {}

trigger: |
  You're the Chief Experience Officer at a $2B ARR
  enterprise SaaS company preparing to go public in 6
  months. The investment bankers say: "Your journey
  management capabilities and customer metrics are a
  competitive differentiator. We want to highlight this
  in the S-1 filing and investor roadshow."

  Your metrics:
  - Net revenue retention: 135% (industry avg: 110%)
  - Gross revenue retention: 95% (industry avg: 88%)
  - NPS: 62 (industry avg: 30)
  - Customer health score accuracy: 89% at predicting
    churn 90 days out
  - Journey-informed features: 2.1x higher adoption rate
  - Time-to-value: 14 days (competitor avg: 45 days)
  - Customer acquisition cost payback: 11 months
    (competitor avg: 18 months)

  The journey management program:
  - 5-year program, $15M total investment
  - 12-person CX team
  - Proprietary journey analytics platform
  - AI-powered predictive journey capabilities
  - Journey-informed product development process

  The investment bankers want: "Show investors that your
  deep customer understanding is a sustainable competitive
  advantage that drives superior unit economics."

  Task: Create the investor-facing journey strategy section
  for the S-1 and roadshow materials.

assertions:
  - type: llm_judge
    criteria: "Response creates S-1 appropriate content — investor language (translates journey management into investor-relevant terms: 'Our proprietary customer intelligence platform enables us to understand and predict customer behavior with 89% accuracy, driving industry-leading retention metrics and capital-efficient growth'; never says 'empathy maps' or 'touchpoints' — says 'customer intelligence,' 'behavioral prediction,' 'experience optimization,' 'data-driven product development'), unit economics narrative (connects journey management to financial performance: 135% net revenue retention means existing customers grow 35% annually without additional acquisition cost; 95% gross retention means minimal revenue leakage; 11-month CAC payback vs 18-month competitor average means faster path to profitability per customer; these metrics collectively demonstrate a highly capital-efficient growth engine), competitive moat language (frames journey capabilities as a defensible advantage: 'Our 5-year investment in customer understanding has created a data asset and organizational capability that would take competitors years to replicate'; 'Our journey-informed product development process produces features with 2.1x higher adoption, meaning our engineering investment is approximately twice as productive as competitors'; 'Our predictive customer intelligence enables proactive retention and expansion, resulting in industry-leading 135% net revenue retention')."
    weight: 0.35
    description: "S1Content"
  - type: llm_judge
    criteria: "Response creates roadshow positioning — the growth narrative (investors want to understand the growth algorithm: 'Our growth flywheel: deep customer understanding → better product decisions → higher adoption → stronger retention → more expansion revenue → more customer data → deeper understanding; this flywheel has been compounding for 5 years and accelerates as we scale — our customer intelligence improves with every customer we serve'), risk mitigation narrative (journey management reduces key business risks that investors worry about: churn risk — 89% predictive accuracy means we identify at-risk customers 90 days before churn, enabling proactive intervention; product risk — 2.1x adoption rate for journey-informed features means lower probability of building features nobody uses; competitive risk — our 14-day time-to-value vs competitor's 45 creates a significant switching cost and competitive advantage in sales cycles), addressable market expansion (journey intelligence enables market expansion: 'Our customer understanding capabilities allow us to enter new market segments with validated knowledge of customer needs, reducing the risk and cost of market expansion; we don't enter markets blind — we enter with data-driven understanding of customer journeys in that segment')."
    weight: 0.35
    description: "RoadshowPositioning"
  - type: llm_judge
    criteria: "Response addresses SEC and accuracy considerations — defensible claims (every metric and claim in the S-1 must be SEC-defensible: use conservative attribution — don't claim that journey management caused all of the retention improvement, present it as a contributing factor with supporting evidence; present methodological rigor — explain how metrics are measured and what the limitations are; include risk factors — 'our competitive advantage depends on continued investment in customer intelligence capabilities; if we reduce this investment, our retention and growth metrics may decline'), forward-looking statement handling (projections about journey management impact must be properly caveated as forward-looking statements: 'We believe our customer intelligence capabilities position us for continued strong retention and expansion, though actual results may differ materially from projections'; don't overstate predictive capabilities — present the 89% accuracy as a current capability with a note that accuracy depends on data quality and market conditions), comparability and benchmarking (investors will want to compare your metrics to peers: present industry benchmarks alongside your metrics to demonstrate the gap; be specific about how you define and measure each metric to enable apples-to-apples comparison; acknowledge that some metrics may be defined differently by different companies)."
    weight: 0.30
    description: "SECConsiderations"
