meta:
  id: master-journey-shift
  level: 5
  course: user-journey-mapping
  type: output
  description: "Master journey shift — handle multiple master-level strategic journey challenges in a single session"
  tags: [shift, combined, assessment, master]

state: {}

trigger: |
  You're the Chief Experience Officer handling three
  master-level journey challenges simultaneously:

  TASK 1 — Your company is going through a $4B merger.
  The acquiring company (your company, $3B) has mature
  journey management (Level 4). The target company ($1B)
  has no journey practice but has higher NPS (52 vs your
  38). The CEO asks: "How is their NPS higher than ours
  if they don't even have journey maps?" You need to
  investigate this paradox and create the integration
  strategy.

  TASK 2 — A global regulatory body is proposing new
  "Customer Experience Transparency" regulations that
  would require companies to: (a) disclose how customer
  data is used in journey personalization, (b) provide
  opt-out mechanisms for journey-based targeting, (c)
  ensure journey analytics don't create discriminatory
  outcomes. You've been asked to advise the regulatory
  body on feasible implementation while representing
  your industry.

  TASK 3 — Your Board asks you to present a 5-year
  vision for journey management. AI capabilities are
  advancing rapidly, customer expectations are rising,
  and competitors are investing heavily in CX. The
  Board wants to know: "What does journey management
  look like in 2031, and how do we get there?"

  Task: Handle all three master-level challenges.

assertions:
  - type: llm_judge
    criteria: "Response handles Task 1 — the NPS paradox and merger integration — paradox investigation (explains why a company without journey maps can have higher NPS: journey management is a methodology, not the only path to customer satisfaction; the target company may have: a customer-obsessed culture that doesn't need formal maps because leaders naturally think about customer experience; a simpler product with fewer journey-breaking seams; a smaller scale where personal relationships substitute for systematic journey management; a founding team with exceptional customer intuition; key insight: journey maps are a tool for scaling customer empathy — small companies may not need them yet but will as they grow), integration strategy (this merger is unusual because the acquired company has better customer outcomes: don't impose your journey framework on a company that's already winning on CX; instead: study what makes their customer experience naturally excellent, formalize those practices into your journey framework, and use the merger to improve YOUR journeys not just standardize theirs; the integration should result in both companies improving: your systematic methodology + their intuitive customer-centricity), the scale warning (the target company's NPS of 52 without formal journey management may not survive scale: at $1B with a close-knit team, customer intuition works; at $4B combined with thousands of employees across the merged entity, intuition doesn't scale — this is why your Level 4 practice exists; the merger should preserve the acquired company's culture while adding the systematic capability they'll need at larger scale)."
    weight: 0.35
    description: "NPSParadoxAndMerger"
  - type: llm_judge
    criteria: "Response handles Task 2 — regulatory advisory — balanced regulatory advice (represents the industry while acknowledging legitimate consumer protection needs: transparency in journey personalization is reasonable — customers should know how their experience is being shaped; opt-out mechanisms are feasible but must be designed carefully — a full opt-out may degrade the experience in ways customers don't anticipate; discrimination prevention is critical but requires nuanced measurement — discriminatory outcomes aren't always intentional and detection requires sophisticated analysis), feasible implementation recommendations (advises the regulatory body on practical implementation: disclosure — propose a standardized 'experience personalization notice' that explains in plain language what data is used and how; opt-out — recommend tiered opt-out: customers can opt out of targeting and personalization while still receiving basic journey orchestration; discrimination — recommend algorithmic impact assessments for journey analytics that touch protected classes, with independent auditing; implementation timeline — give companies 18-24 months to comply, with guidance documents and safe harbors for good-faith efforts), industry positioning (frames the regulation as an opportunity not a threat: companies with mature journey practices are best positioned to comply because they already have governance, documentation, and measurement; the regulation raises the bar for all competitors — companies with mature practices gain competitive advantage; the regulation also builds consumer trust — which benefits the entire industry)."
    weight: 0.35
    description: "RegulatoryAdvisory"
  - type: llm_judge
    criteria: "Response handles Task 3 — 5-year journey management vision — 2031 vision (paints a concrete picture of journey management in 5 years: AI-native journey management where journeys are continuously optimized by AI rather than periodically redesigned by humans; per-customer adaptive journeys that are as personalized as a concierge service but at the scale of millions; predictive journey intelligence that anticipates customer needs before they arise — moving from reactive service to proactive care; journey management as a universal discipline — applied to customers, employees, partners, and even communities), getting there from here (a phased roadmap from 2026 to 2031: 2026-2027 — AI-assisted journey analysis and basic prediction; 2027-2028 — real-time adaptive journeys for top customer segments; 2028-2029 — predictive journey optimization at scale; 2029-2030 — journey simulation and testing capabilities; 2030-2031 — fully AI-native journey management with human oversight; each phase builds on the previous with clear investment requirements and expected returns), board-appropriate framing (the vision must be compelling and grounded: connects journey evolution to business outcomes — each capability advancement translates to retention, growth, and efficiency improvement; acknowledges risks — AI dependency, privacy regulation, competitive dynamics; positions the company to lead the industry — not just follow best practices but define the future of the discipline; investment estimate: $50-80M over 5 years, with expected ROI based on historical program performance)."
    weight: 0.30
    description: "FiveYearVision"
