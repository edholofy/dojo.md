meta:
  id: journey-governance-framework
  level: 3
  course: user-journey-mapping
  type: output
  description: "Journey governance framework — establish organizational ownership, maintenance, and quality standards for journey maps"
  tags: [governance, ownership, maintenance, standards, advanced]

state: {}

trigger: |
  You're the Director of CX at a financial services company
  with 12 product lines, 5,000 employees, and 45 existing
  journey maps created by different teams over the past
  3 years. The problem:

  - Nobody owns the journey maps — they were created during
    specific projects and then abandoned
  - 60% of the maps are outdated (products have changed
    significantly since the maps were created)
  - Different teams use different formats, terminology, and
    levels of detail — no consistency
  - Several maps contradict each other (the mortgage team's
    map shows a different application process than what
    actually exists)
  - Teams create new maps instead of updating existing ones
    because they can't find or trust the current ones
  - The journey maps live in scattered locations: some in
    Figma, some in PowerPoint, some in Miro, some printed
    and pinned to office walls
  - No one measures whether journey maps actually influence
    product decisions

  The CRO (Chief Revenue Officer) says: "We've spent hundreds
  of thousands of dollars on journey mapping over 3 years
  and I can't point to a single product decision that was
  improved because of them."

  Task: Design a journey governance framework that ensures
  journey maps are maintained, consistent, used, and
  actually drive decisions.

assertions:
  - type: llm_judge
    criteria: "Response designs a comprehensive governance structure — ownership model (establishes clear ownership: each journey map has a designated owner — the product manager or CX lead for that product line who is accountable for the map's accuracy and usage; a central Journey Center of Excellence provides standards, tools, and support but doesn't own individual maps; escalation path: journey owners report map health quarterly to the CX Director), quality standards (defines what a 'good' journey map includes: standard template with required elements — stages, actions, emotions, touchpoints, pain points, evidence sources, last-updated date, owner name; mandatory evidence base — no assumption-only maps allowed, each finding must cite a data source; review cadence — maps must be reviewed and updated at minimum every 6 months or after any major product change), centralized repository (single source of truth: all maps stored in one platform accessible to the entire organization — not scattered across Figma, PowerPoint, Miro, and office walls; version control — track changes over time, know who changed what and when; discoverability — searchable by product line, persona, journey stage, or keyword)."
    weight: 0.35
    description: "GovernanceStructure"
  - type: llm_judge
    criteria: "Response addresses the CRO's concern about decision impact — decision linkage (establishes a mechanism to connect journey maps to product decisions: when a product decision references journey map insights, it's documented — 'this feature was prioritized because Journey Map X shows pain point Y at stage Z'; quarterly report showing which decisions were journey-informed and their outcomes; this creates a measurable trail from journey insight to business impact), usage metrics (tracks whether maps are actually being used: view/access metrics for the repository, references in product briefs and sprint planning documents, number of product decisions that cite journey map findings, survey product teams — 'did you reference a journey map in your last planning cycle?'), the investment question (addresses the hundreds of thousands spent: audit the 45 existing maps — how many are still relevant, how many duplicate each other, how many informed any decision? consolidate the 45 into a managed set of 15-20 high-quality maps; going forward, track ROI — journey-informed features vs non-journey-informed features in terms of adoption, satisfaction, and business outcomes)."
    weight: 0.35
    description: "DecisionImpact"
  - type: llm_judge
    criteria: "Response provides implementation and sustainability plan — triage the existing 45 maps (step 1 is not to create more maps but to clean up what exists: categorize all 45 maps as current, outdated-but-salvageable, or obsolete; merge duplicates; retire obsolete maps officially rather than letting them linger; update salvageable maps with current data; this may reduce 45 maps to 15-20 actively maintained maps), change management (getting 5,000 employees to follow a governance framework requires change management: executive sponsorship — the CRO's frustration is an asset, use it to drive mandate; demonstrate value — take one high-value journey map, update it with fresh research, use it to inform a product decision, and publicize the result; make it easy — the governance framework should reduce burden on teams not add bureaucracy), sustainability mechanisms (prevent the maps from going stale again: automated staleness alerts — if a map hasn't been reviewed in 6 months, the owner gets notified; tie map maintenance to performance reviews for journey owners; quarterly journey governance reviews at the CX Director level; annual journey health assessment across all product lines)."
    weight: 0.30
    description: "ImplementationPlan"
