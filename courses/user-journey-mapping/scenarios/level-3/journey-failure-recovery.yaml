meta:
  id: journey-failure-recovery
  level: 3
  course: user-journey-mapping
  type: output
  description: "Journey failure and recovery mapping — design recovery journeys for when things go wrong"
  tags: [failure, recovery, service-recovery, resilience, advanced]

state: {}

trigger: |
  You're a senior service designer at an airline. Your
  CEO says: "We can't prevent every delay and cancellation,
  but we CAN control how we recover. I want our recovery
  experience to be so good that customers who experience
  a problem end up MORE loyal than those who don't."

  This is the "service recovery paradox" — customers who
  experience a well-handled failure can become more loyal
  than those who never had a problem.

  Current failure recovery data:
  - 2.3M flight disruptions annually (delays, cancellations,
    misconnections, lost baggage)
  - Current NPS for disrupted passengers: -45 (vs +25 for
    non-disrupted)
  - 78% of disrupted passengers say "nobody told me what
    was happening"
  - 65% had to figure out rebooking themselves
  - Average time to resolve a disruption: 4.5 hours
    (passenger perspective)
  - Only 12% of eligible passengers claim compensation
    (the process is intentionally difficult)
  - Customer loyalty after disruption: 40% never fly the
    airline again

  Types of disruptions:
  - Weather delays (30% of disruptions, least controllable)
  - Mechanical issues (25%, partially controllable)
  - Crew scheduling (20%, controllable)
  - Misconnections (15%, partially controllable)
  - Lost/delayed baggage (10%, controllable)

  Task: Design a journey failure and recovery mapping
  framework, and create a recovery journey for flight
  cancellations.

assertions:
  - type: llm_judge
    criteria: "Response designs a recovery journey framework — recovery journey stages (defines the stages of any failure recovery: detection — the system or customer identifies the problem; notification — the customer is informed about what happened, why, and what happens next; immediate mitigation — the airline takes action to reduce the impact — rebooking, accommodations, meals; resolution — the full resolution of the customer's travel needs; compensation — proactive fair compensation for the inconvenience; follow-up — checking that the resolution was satisfactory and rebuilding trust), the 78% communication gap (addresses the core finding: 78% say nobody told them what was happening — this means the detection and notification stages are failing; the recovery journey must prioritize real-time, proactive communication above all else: what happened, why, what the airline is doing about it, what the customer needs to do, and estimated resolution timeline), the service recovery paradox goal (frames the recovery journey around the paradox: the goal isn't just to fix the problem but to turn the failure into a loyalty-building moment; this requires: speed — faster resolution than the customer expects; communication — more transparency than the customer expects; empathy — acknowledgment of the emotional impact; agency — giving the customer control and options, not just a single rebooking)."
    weight: 0.35
    description: "RecoveryJourneyFramework"
  - type: llm_judge
    criteria: "Response creates a specific flight cancellation recovery journey — current-state recovery (maps how cancellations are handled today: passenger learns of cancellation from departure board or delayed gate announcement — no proactive notification; goes to rebooking desk with 200 other passengers — 2+ hour wait; limited rebooking options presented by stressed agent; no hotel or meal vouchers offered unless explicitly requested; compensation information buried in the website — only 12% claim it; total recovery time: 4.5+ hours of passenger effort), future-state recovery (redesigns the cancellation experience: proactive push notification 30+ minutes before the scheduled departure with the reason and immediate next steps; automatic rebooking with top 3 options presented in the app — passenger chooses; if overnight stay needed, hotel booked automatically and sent to the passenger's phone; meal and lounge vouchers issued automatically; compensation calculated and offered proactively — not waiting for the passenger to find and navigate a claims process; follow-up message the next day checking if the rebooking worked), the 4.5-hour gap (the current 4.5-hour average resolution should be reduced to under 30 minutes: most of that time is spent waiting in line — eliminated by app-based rebooking; the rest is spent figuring out what to do — eliminated by proactive communication and automatic rebooking)."
    weight: 0.35
    description: "CancellationRecoveryJourney"
  - type: llm_judge
    criteria: "Response addresses the compensation design and business case — compensation redesign (the current 12% claim rate is intentionally difficult — this saves money short-term but destroys loyalty: redesign: make compensation proactive and automatic; for eligible disruptions, calculate compensation per regulations and offer it immediately — 'we're sorry for the 3-hour delay, $X has been credited to your account'; this feels generous rather than adversarial; the cost of automatic compensation is less than the cost of losing 40% of disrupted passengers), the business case for recovery investment (40% of 2.3M disrupted passengers never fly the airline again — that's 920K lost customers annually; if the average customer lifetime value is $2K, the airline loses ~$1.8B in future revenue from recovery failures; investing in a world-class recovery experience — proactive rebooking, automatic compensation, real-time communication — would cost a fraction of that and could transform disrupted passengers into loyal advocates), measuring recovery success (defines metrics for the recovery journey: time-to-resolution — target under 30 minutes from disruption to confirmed alternate plan; communication satisfaction — 'I was kept informed' score should be above 80%; NPS for disrupted passengers — target: from -45 to +10 — still below non-disrupted +25 but dramatically improved; repeat booking rate after disruption — from 60% to 85%+)."
    weight: 0.30
    description: "CompensationAndBusinessCase"
