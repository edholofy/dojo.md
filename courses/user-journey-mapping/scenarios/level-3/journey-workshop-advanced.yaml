meta:
  id: journey-workshop-advanced
  level: 3
  course: user-journey-mapping
  type: output
  description: "Advanced journey workshop facilitation — design and facilitate complex multi-day journey mapping workshops"
  tags: [workshop, facilitation, advanced-methods, cross-functional, advanced]

state: {}

trigger: |
  You're an external CX consultant hired by a retail bank
  to run a 2-day journey mapping workshop. The bank wants
  to map the "new customer account opening" journey across
  digital and branch channels.

  Workshop participants (18 people across 3 tables):
  - Table 1 (Digital): Head of Digital, 2 product managers,
    1 UX designer, 1 data analyst, 1 mobile developer
  - Table 2 (Branch): Regional branch manager, 3 branch
    bankers, 1 teller, 1 compliance officer
  - Table 3 (Support): Head of Customer Service, 2 call
    center supervisors, 1 fraud analyst, 1 operations
    manager, 1 marketing manager

  Challenges:
  - Digital and branch teams blame each other for poor
    experience ("branches are outdated" vs "the app is
    confusing")
  - Compliance officer will block any idea that violates
    regulations
  - The data analyst has customer analytics that contradict
    what branch staff believe about customer behavior
  - Marketing manager tends to advocate for the brand
    message over customer reality
  - 2 branch bankers are skeptical: "This is a waste of
    our time — we should be with customers"

  Available: Customer research (25 interviews), analytics
  data (funnel, drop-off rates), 10 real customer
  testimonial videos (3-5 min each), branch observation
  notes, competitive analysis.

  Task: Design the 2-day workshop agenda with facilitation
  strategies for the team dynamics.

assertions:
  - type: llm_judge
    criteria: "Response designs a structured 2-day agenda — day 1 structure (morning: context setting and evidence immersion — show customer testimonial videos to ground everyone in real customer experience, present analytics data and research findings, establish shared understanding before mapping begins; afternoon: collaborative current-state mapping — mixed-table activities where digital, branch, and support people work together at the same table so they hear each other's perspectives, not in their siloed tables), day 2 structure (morning: deep-dive into pain points and moments of truth — prioritize the top problems using evidence from day 1; afternoon: future-state visioning and action planning — design the ideal cross-channel experience, identify specific improvements, assign owners, define success metrics), pacing and energy management (activities alternate between individual reflection, small group work, and whole-room sharing; physical movement breaks between sessions; energizing activities in the post-lunch slots when energy drops; builds from understanding to analysis to action over the 2 days)."
    weight: 0.35
    description: "WorkshopAgenda"
  - type: llm_judge
    criteria: "Response addresses specific team dynamics — breaking silos (mix the three tables for key activities — a digital product manager, a branch banker, and a call center supervisor mapping the same customer journey together will hear perspectives they've never considered; the customer testimonial videos create shared empathy that transcends departmental blame), handling the skeptical bankers (acknowledge their time is valuable: 'you're here because you know more about customer behavior than anyone in this room' — position them as experts, not students; show a customer video specifically about the branch experience to validate their importance; give them concrete roles in the workshop that leverage their direct customer knowledge), managing the compliance officer (don't position compliance as a blocker — invite them to the future-state session as a 'guardrails advisor' who helps ensure ideas are feasible; when ideas arise, ask 'what would we need to make this compliant?' rather than waiting for a 'no'), using data vs beliefs constructively (when analytics contradict branch staff beliefs, present it as 'what the data shows AND what you observe' rather than 'you're wrong' — both perspectives are valuable, the truth is often in the synthesis)."
    weight: 0.35
    description: "TeamDynamicsManagement"
  - type: llm_judge
    criteria: "Response ensures actionable outcomes — outputs defined (the workshop should produce: a validated current-state cross-channel journey map with evidence at each stage, a prioritized list of the top 5-7 pain points with severity and frequency data, a future-state journey vision showing how digital and branch channels work together, an action plan with specific improvements — each with an owner, timeline, and success metric), follow-through mechanisms (workshops fail when the outputs die in a conference room: document the journey map digitally within 1 week, share with all participants and their broader teams, schedule a 90-day follow-up workshop to review progress on the action items, assign an executive sponsor to ensure the action plan gets resources), managing expectations (set realistic expectations at the start: 'we won't solve everything in 2 days — we'll create a shared understanding and identify the most impactful improvements'; the goal is alignment and prioritization, not a complete redesign)."
    weight: 0.30
    description: "ActionableOutcomes"
