meta:
  id: employee-journey-mapping
  level: 3
  course: user-journey-mapping
  type: output
  description: "Employee journey mapping — map the employee experience to improve both internal culture and customer outcomes"
  tags: [employee-journey, internal, hr, culture, advanced]

state: {}

trigger: |
  You're the VP of People Experience at a 2,000-person
  fintech company. Employee turnover is 28% (industry
  average 18%), and exit interviews consistently mention
  "broken internal processes" and "nobody listens to
  employee feedback." Meanwhile, customer satisfaction is
  also declining.

  The CEO says: "We map our customer journeys religiously
  but we've never mapped the employee journey. Our people
  are suffering through broken processes and it's affecting
  how they serve customers."

  Data from recent employee engagement survey (42%
  response rate):
  - Onboarding: 35% say they felt "lost" in their first
    month (no buddy, outdated training materials)
  - Tools: 67% say internal tools are "frustrating or
    broken" (HR portal, expense system, IT helpdesk)
  - Growth: 54% don't understand how to get promoted
  - Feedback: 71% say "my feedback goes into a black hole"
  - Manager quality: scores range from 2.1 to 4.8 across
    teams — massive inconsistency
  - Collaboration: 48% say cross-team projects are
    "nightmarishly bureaucratic"

  Task: Create an employee journey mapping program that
  covers the full employee lifecycle and connects
  employee experience to customer outcomes.

assertions:
  - type: llm_judge
    criteria: "Response maps the full employee lifecycle journey — lifecycle stages (maps the complete employee journey: recruitment and hiring, onboarding and first 90 days, learning and development, daily work experience, growth and career progression, cross-functional collaboration, feedback and recognition, transitions — role changes and promotions, offboarding and alumni), stage-specific pain points (maps survey data to stages: onboarding — 35% feel lost, no buddy system, outdated materials; daily work — 67% frustrated with internal tools; growth — 54% unclear on promotion criteria; feedback — 71% feel unheard; collaboration — 48% find cross-team work bureaucratic; manager quality — wildly inconsistent experience depending on which team you join), emotional journey parallel (like customer journey maps, tracks the employee emotional curve: excitement at hiring, confusion during onboarding, frustration with tools, disengagement when feedback isn't heard, resignation to broken processes, and eventually actual resignation — the 28% turnover is the end of a journey that deteriorated over months)."
    weight: 0.35
    description: "EmployeeLifecycleMapping"
  - type: llm_judge
    criteria: "Response connects employee experience to customer outcomes — the causal chain (establishes how broken employee experiences cause declining customer satisfaction: frustrated employees using broken tools can't serve customers efficiently; employees who feel unheard eventually stop trying to improve processes; the 28% turnover means customers constantly interact with new, undertrained staff; manager inconsistency means customer experience quality varies dramatically by team), mirror effect (identifies where employee and customer journeys mirror each other: employees experience '71% feedback goes to black hole' — customers likely experience something similar when they give feedback; employees find internal tools frustrating — those same design sensibilities may affect customer-facing tools; cross-team bureaucracy internally creates slow, fragmented customer experiences externally), measurement linkage (proposes connecting employee experience metrics to customer metrics: teams with higher employee engagement scores likely have higher customer satisfaction; teams with lower turnover likely have more experienced staff delivering better customer outcomes; improving employee journey pain points should correlate with customer journey improvements)."
    weight: 0.35
    description: "EmployeeToCustomerConnection"
  - type: llm_judge
    criteria: "Response provides an employee journey mapping program structure — research methodology (how to build the employee journey maps: journey mapping workshops with employees from different tenures — new hires, 1-year, 3-year, 5-year; shadowing employees through their daily workflows; analyzing HR data — time-to-productivity, engagement survey trends, exit interview themes; the 42% survey response rate itself is a data point — 58% didn't respond, possibly the most disengaged), prioritization of fixes (not all employee journey problems can be fixed at once — prioritize by impact: onboarding fixes have the fastest payback — reduce the 'lost' feeling and new hires become productive faster; tool modernization addresses the most-cited pain point — 67%; feedback loop closure addresses the deepest trust issue — 71%), program sustainability (employee journey mapping should be ongoing not a one-time project: quarterly pulse surveys tied to journey stages, annual comprehensive journey map updates, employee journey metrics on leadership dashboards alongside customer journey metrics, the 28% turnover rate and engagement scores should be treated with the same urgency as customer NPS and churn)."
    weight: 0.30
    description: "ProgramStructure"
