meta:
  id: accessibility-journey
  level: 3
  course: user-journey-mapping
  type: output
  description: "Accessibility-inclusive journey mapping — map journeys that account for users with diverse abilities"
  tags: [accessibility, inclusive-design, diverse-abilities, advanced]

state: {}

trigger: |
  You're a senior UX researcher at a government digital
  services agency. A new regulation requires all government
  services to be "equally accessible to people with
  disabilities." Your team is tasked with journey mapping
  the tax filing process for users with diverse abilities.

  The current digital tax filing journey was designed for
  a "typical" user — sighted, able to use keyboard and
  mouse, with full cognitive capacity, and speaking English
  as a first language. Journey maps exist but don't
  account for:

  - A blind user navigating with a screen reader (VoiceOver
    or JAWS) — form labels are inconsistent, dynamic
    content changes aren't announced, the progress bar is
    purely visual
  - A deaf user who needs to contact support — phone is the
    only support channel, no video relay or chat option
  - A user with motor disabilities using switch navigation —
    complex form interactions require precise mouse clicks,
    timeouts expire before tasks can be completed
  - A user with cognitive disabilities — tax terminology is
    jargon-heavy, forms are 8 pages long with no save
    progress, error messages use technical language
  - An elderly user with low digital literacy — small text,
    no clear visual hierarchy, assumes familiarity with
    web conventions

  Task: Create accessibility-inclusive journey maps that
  show how the same tax filing process is experienced
  differently by users with different abilities.

assertions:
  - type: llm_judge
    criteria: "Response maps divergent experiences for each ability profile — screen reader journey (the blind user's experience: form navigation is non-linear because labels are inconsistent — the screen reader reads 'input field' without context; dynamic content changes like validation errors or progress updates aren't announced — the user doesn't know if their input was accepted; the purely visual progress bar means they have no sense of how far through the process they are; time spent: significantly longer than sighted users due to navigation confusion), motor disability journey (switch navigation user's experience: complex dropdown menus and date pickers require precise interactions that are difficult with switch access; timeouts expire during slower input — the form resets, losing all progress; scrolling through long forms is exhausting with switch navigation; the lack of save-progress means any timeout or error forces a complete restart), cognitive disability journey (the user struggles with tax terminology from the first page; 8-page form without save creates anxiety about losing progress; error messages like 'Invalid TIN format' are incomprehensible; no plain-language alternatives or contextual help; the cognitive load of the full process exceeds capacity for sustained attention)."
    weight: 0.35
    description: "DivergentAbilityExperiences"
  - type: llm_judge
    criteria: "Response identifies systemic accessibility barriers in the journey — barrier categories (organizes barriers by type: perceivable — visual progress bar, small text, no alternative text for visual elements, color-dependent status indicators; operable — timeouts too short for motor disabilities, mouse-required interactions, no keyboard navigation paths, no skip-navigation links; understandable — jargon-heavy language, technical error messages, complex form structure, no plain-language option; robust — inconsistent form labels break screen readers, dynamic content not ARIA-announced, forms not compatible with assistive technologies), barrier-stage mapping (maps where in the journey each barrier occurs: authentication — CAPTCHA is inaccessible to screen readers and cognitively challenging; form entry — timeouts, complex interactions, jargon; error handling — technical messages that don't explain how to fix the problem; support — phone-only excludes deaf users; completion — visual-only confirmation doesn't reach screen reader users), the equality gap (the regulation requires 'equally accessible' — the journey maps reveal that the current experience is profoundly unequal: a sighted keyboard-mouse user can file in 45 minutes, a screen reader user may take 3+ hours or fail entirely, a user with cognitive disabilities may be unable to complete the process at all)."
    weight: 0.35
    description: "SystemicBarriers"
  - type: llm_judge
    criteria: "Response provides remediation through inclusive journey redesign — inclusive design solutions mapped to barriers (for each major barrier, provides a specific solution: screen reader — consistent ARIA labels on all form fields, live regions for dynamic updates, non-visual progress indicator; motor disabilities — extended or removable timeouts, large click targets, keyboard-navigable alternatives for all interactions, save-progress at every page; cognitive disabilities — plain-language mode, chunked forms with save-progress, contextual help tooltips, error messages that explain in simple terms what went wrong and how to fix it; deaf users — live chat and video relay support options, text-based alternatives for all audio content; elderly/low literacy — large text option, clear visual hierarchy, step-by-step wizard with reassurance messaging), universal design benefit (highlights that many accessibility improvements benefit all users: save-progress helps everyone, plain-language helps non-native speakers, extended timeouts help users in distracting environments, large click targets help mobile users — accessible design is better design), compliance roadmap (prioritizes remediation: immediate — add save-progress and extend timeouts to prevent complete exclusion; short-term — fix form labels and ARIA for screen readers; medium-term — add plain-language mode and alternative support channels; ongoing — user testing with people with disabilities, not just automated accessibility scanning)."
    weight: 0.30
    description: "InclusiveRedesign"
