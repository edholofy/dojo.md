meta:
  id: journey-driven-product-strategy
  level: 3
  course: user-journey-mapping
  type: output
  description: "Journey-driven product strategy — use journey maps to inform product roadmap and prioritization"
  tags: [product-strategy, roadmap, prioritization, decision-making, advanced]

state: {}

trigger: |
  You're the VP of Product at a B2B collaboration platform.
  Your engineering team has capacity for 12 major features
  this year, but your backlog has 50+ feature requests.
  Historically, features were prioritized by loudest
  customer, biggest deal, or executive opinion.

  The CEO says: "This year, I want product decisions driven
  by journey insights, not politics."

  Your journey maps reveal these critical pain points:

  Onboarding journey (affects all new customers):
  - Time to first value: 14 days (competitor: 3 days)
  - 40% of trial users never invite a team member
  - Setup wizard abandoned by 55% of users

  Collaboration journey (core product value):
  - Real-time editing crashes 3% of sessions
  - File sharing limited to 100MB (customers request 1GB+)
  - No version history — accidental overwrites are the #1
    support ticket category

  Admin journey (enterprise buyers):
  - No SSO integration (losing 30% of enterprise deals)
  - No audit log (compliance requirement for regulated
    industries)
  - User management requires CSV upload only

  Reporting journey (renewal/expansion driver):
  - No usage analytics for admins
  - Custom reports require engineering support
  - No ROI dashboard for buyers

  Stakeholder requests:
  - Sales: "SSO is blocking our biggest deals"
  - Support: "Version history would eliminate 40% of tickets"
  - Marketing: "Fix onboarding — trial conversion is killing
    our funnel"
  - Enterprise customers: "Audit log or we can't renew"

  Task: Use journey map insights to create a journey-driven
  product prioritization framework and select 12 features
  from 50+.

assertions:
  - type: llm_judge
    criteria: "Response creates a journey-driven prioritization framework — scoring methodology (each feature scored on: journey stage impact — which journey does this improve and how critical is that journey?; pain point severity — how severe is the problem this feature solves, based on journey map evidence?; user breadth — how many customers experience this pain point?; business impact — what's the revenue, retention, or efficiency impact?; effort — engineering cost and complexity), journey-stage weighting (not all journey stages are equally important: onboarding affects all customers and drives trial conversion — high weight; collaboration is the core value proposition — critical weight; admin features unlock enterprise deals — high strategic weight; reporting drives renewals — medium weight; the framework makes these weights explicit rather than implicit), evidence-based scoring (each feature's score is grounded in journey map data, not opinion: SSO scores high because journey data shows 30% of enterprise deals lost; version history scores high because it's the #1 support ticket category; onboarding wizard redesign scores high because 55% abandonment rate with 14-day time-to-value vs competitor's 3 days)."
    weight: 0.35
    description: "PrioritizationFramework"
  - type: llm_judge
    criteria: "Response selects and justifies approximately 12 features — feature selection (applies the framework to select ~12 features, likely including: from onboarding — redesigned setup wizard, guided team invitation flow; from collaboration — version history, real-time editing stability fix, increased file size limit; from admin — SSO integration, audit log, improved user management; from reporting — usage analytics dashboard; the selection balances across journey stages while prioritizing the highest-impact items), what's cut and why (explains why 38+ features don't make the cut: some are lower-impact within their journey stage, some serve a small subset of users, some are nice-to-have not need-to-have; each cut references journey map evidence — 'feature X addresses a pain point experienced by only 8% of users in a non-critical journey stage'), addressing stakeholder requests (the framework provides evidence-based responses to each stakeholder: Sales gets SSO because journey data supports it — 30% deal loss; Support gets version history because it's the #1 ticket category; Marketing gets onboarding improvements because 55% abandonment is objectively critical; Enterprise gets audit log because it's a renewal blocker; nobody feels dismissed because the framework is transparent)."
    weight: 0.35
    description: "FeatureSelection"
  - type: llm_judge
    criteria: "Response demonstrates the value of journey-driven over politics-driven prioritization — the old way vs the new way (contrasts: under the old system, SSO might have been deprioritized because the loudest customer this week wanted a different feature; version history might never get built because it doesn't demo well for sales; onboarding might be ignored because executives assume it's 'good enough'; the journey-driven approach surfaces these objectively through data), roadmap communication (presents the selected features in journey terms: 'Q1-Q2: We're reducing time-to-first-value from 14 days to 3 and adding version history to eliminate our #1 support issue; Q3: SSO and audit log unlock the enterprise segment; Q4: usage analytics give admins the visibility they need' — this narrative connects features to customer outcomes, not internal politics), measuring success (defines how to measure whether the journey-driven approach works: track the journey metrics that each feature was designed to improve — did onboarding time-to-value decrease? did editing crashes reduce? did enterprise deal closure improve? — if journey-informed features outperform the historical baseline, the approach is validated)."
    weight: 0.30
    description: "JourneyDrivenValue"
