meta:
  id: journey-orchestration
  level: 3
  course: user-journey-mapping
  type: output
  description: "Journey orchestration — design real-time, adaptive customer journeys across multiple channels"
  tags: [orchestration, real-time, adaptive, multi-channel, advanced]

state: {}

trigger: |
  You're the Director of Customer Experience at an
  insurance company. The CEO says: "Our customer journeys
  are documented but static. Customers don't follow our
  maps — they jump between channels, change their minds,
  and behave unpredictably. I want journeys that adapt
  in real-time."

  Current state:
  - 14 documented journey maps across 4 product lines
    (auto, home, life, health)
  - Channels: website, mobile app, call center, agents,
    email, chat, direct mail
  - Customer data is siloed: marketing automation tracks
    web behavior, CRM tracks agent interactions, call
    center has separate logs, claims system is isolated
  - Journey maps are updated annually (if at all)
  - No real-time journey visibility — you can't see where
    a customer is in their journey right now

  Problem example: A customer was researching home insurance
  online, then called an agent who had no visibility into
  the web research. The agent started from scratch. The
  customer got a quote but didn't buy. Marketing then
  sent a "first-time visitor" email campaign because the
  web system didn't know about the agent interaction.

  Task: Design a journey orchestration strategy that
  enables real-time, adaptive customer journeys.

assertions:
  - type: llm_judge
    criteria: "Response designs a journey orchestration architecture — unified customer profile (the foundation: connect all channel data into a single customer profile that updates in real-time: web behavior, app usage, call center interactions, agent meetings, email engagement, chat transcripts, claims activity — every channel contributes to and reads from the same profile), real-time journey state (the system should know where each customer is in their journey at any moment: 'Customer 12345 is in the home insurance evaluation stage, has visited the quote page 3 times, spoke with agent Smith yesterday, opened the comparison email this morning' — this state is visible to all channels), adaptive triggers (when customer behavior changes, the journey adapts: if a customer researching auto insurance suddenly visits the home insurance page, the system recognizes a cross-sell opportunity; if a customer who received a quote calls the contact center, the agent sees the quote details and the customer's research history; if a customer abandons a claim form, the system triggers a supportive outreach rather than a marketing email)."
    weight: 0.35
    description: "OrchestrationArchitecture"
  - type: llm_judge
    criteria: "Response addresses the technology and data integration challenges — data unification strategy (breaking down the silos: identify all data sources across the 7 channels, map data schemas and identify overlapping/conflicting fields, design a customer data platform or journey analytics platform that ingests data from all sources, establish identity resolution across channels — the same customer using web, phone, and agent should be recognized as one person), technology stack considerations (journey orchestration requires: real-time data ingestion from all channels, customer identity resolution, journey state management, decision engine for adaptive responses, channel integration APIs for delivering personalized actions, analytics for journey performance monitoring), migration approach (moving from 14 static maps to dynamic orchestration can't happen overnight: start with one high-value journey — new customer home insurance evaluation, prove the value of real-time orchestration on one journey before scaling to all 14, the home insurance example in the problem statement is a perfect pilot — it demonstrates the pain of disconnected channels)."
    weight: 0.35
    description: "TechnologyIntegration"
  - type: llm_judge
    criteria: "Response covers organizational and governance requirements — cross-functional ownership (journey orchestration requires collaboration across marketing, sales, service, claims, and IT — no single team can own this alone; establish a Journey Orchestration team or center of excellence that coordinates across functions), journey design governance (who decides how journeys should adapt: define journey logic collaboratively — marketing shouldn't set triggers that conflict with agent strategies; establish testing and approval workflows for journey changes — an untested adaptive trigger could send wrong messages to thousands of customers), measurement and optimization (how to know if orchestration is working: measure journey completion rates, channel transition smoothness, customer effort scores across journey stages, and compare orchestrated journeys to the previous static approach; the home insurance example should measurably improve: no more 'first-time visitor' emails to customers who already spoke with agents, agents should see web research context, and quote-to-purchase conversion should increase)."
    weight: 0.30
    description: "OrganizationalGovernance"
