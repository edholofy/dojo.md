meta:
  id: journey-analytics-platform
  level: 3
  course: user-journey-mapping
  type: output
  description: "Journey analytics platform — design a data-driven system for measuring and optimizing customer journeys"
  tags: [analytics, data, platform, measurement, advanced]

state: {}

trigger: |
  You're the Head of Customer Analytics at a subscription
  meal-kit company. The company has grown to 500K
  subscribers but churn is 12% monthly. Your CEO says:
  "We have tons of data but no visibility into the actual
  customer journey. I want to see where customers fall
  off and why, in real-time."

  Available data sources:
  - Website analytics (page views, sessions, bounce rates)
  - App analytics (feature usage, session frequency)
  - Order data (frequency, meal choices, skip rates)
  - Delivery data (on-time rate, damage reports)
  - Customer support tickets (categories, resolution)
  - NPS surveys (quarterly, 15% response rate)
  - Social media mentions (sentiment, themes)
  - Email engagement (open rates, click rates)
  - Subscription data (plan type, billing history, pauses,
    cancellations)
  - Cooking completion data (recipe ratings, photo uploads)

  The challenge: These data sources exist in 8 different
  systems with no unified view. Nobody can answer: "What
  does the typical journey from signup to 6-month retained
  subscriber look like, and where does it break?"

  Task: Design a journey analytics platform that unifies
  these data sources into a real-time journey visibility
  system.

assertions:
  - type: llm_judge
    criteria: "Response designs a journey analytics architecture — data unification (how to connect 8 disparate systems: customer data platform or data warehouse that ingests from all sources, customer identity resolution connecting anonymous website visitors to known subscribers, event stream architecture that captures actions across all touchpoints in near-real-time, common data model that maps events from different systems to journey stages), journey stage definition in data terms (translates journey stages into measurable data events: awareness — website visits and ad interactions; trial/evaluation — first order placed, meal selection behavior; onboarding — first 3 orders: cooking completion rate, recipe ratings, app engagement; active subscription — regular ordering patterns, feature adoption, meal variety; at-risk — skip rate increasing, support tickets rising, NPS declining, email engagement dropping; churn — cancellation event, pause event, payment failure), real-time dashboard concept (what the CEO would see: journey funnel showing how many customers are at each stage right now, stage conversion rates and trends, cohort analysis showing how different signup cohorts progress through the journey, early warning indicators for at-risk customers, drill-down capability from stage-level metrics to individual customer journeys)."
    weight: 0.35
    description: "AnalyticsArchitecture"
  - type: llm_judge
    criteria: "Response identifies key journey metrics and insights — churn prediction (using journey data to predict churn before it happens: define the 'at-risk' behavioral fingerprint — customers who skip 2+ consecutive weeks, stop rating recipes, decrease app sessions, and open support tickets are highly likely to churn; build a churn risk score that combines these signals; trigger proactive intervention — a personalized outreach or discount — when risk score exceeds threshold), journey health metrics (define metrics that measure the health of each journey stage: time-to-first-cook — do new subscribers actually cook their first meal or does it sit in the fridge?; skip rate trend — is the customer skipping more frequently over time?; recipe satisfaction trajectory — are ratings improving or declining?; support friction score — is the customer having increasing issues?; engagement diversity — are they using the app for recipes, browsing future menus, submitting preferences, or just managing their subscription?), the 12% monthly churn investigation (uses the journey analytics to answer: at what journey stage do most churning customers fall off? what behavioral patterns precede churn? are there specific trigger events — a damaged delivery, a bad recipe, a billing surprise — that correlate with cancellation? which subscriber segments have the lowest churn and what does their journey look like?)."
    weight: 0.35
    description: "JourneyMetrics"
  - type: llm_judge
    criteria: "Response addresses implementation and organizational considerations — implementation roadmap (phased approach: phase 1 — connect the top 3 data sources — order data, subscription data, and support tickets — into a unified view; phase 2 — add behavioral data — app analytics, email engagement, website analytics; phase 3 — add qualitative data — NPS surveys, social mentions, recipe ratings; phase 4 — build predictive models using the unified data; each phase delivers incremental value), data quality and privacy (addresses practical concerns: data quality — different systems may have conflicting information, timestamps may not align, identity resolution across anonymous and logged-in states is challenging; privacy — meal preferences and health data require careful handling, GDPR/CCPA compliance for data unification, customer consent for cross-system data linking), organizational adoption (the analytics platform is only valuable if teams use it: train product, marketing, and support teams to read journey analytics; embed journey metrics into team OKRs — product owns onboarding stage metrics, marketing owns awareness stage, support owns at-risk stage; weekly journey health review meetings replace ad-hoc reporting requests)."
    weight: 0.30
    description: "ImplementationPlan"
