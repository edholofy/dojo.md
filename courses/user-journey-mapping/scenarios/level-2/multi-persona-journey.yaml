meta:
  id: multi-persona-journey
  level: 2
  course: user-journey-mapping
  type: output
  description: "Multi-persona journey mapping — map how different personas experience the same journey differently"
  tags: [multi-persona, comparison, divergence, intermediate]

state: {}

trigger: |
  You're a UX designer at an e-commerce platform that
  sells electronics. Your PM wants a journey map for the
  "purchasing a laptop" experience, but you have three
  very different buyer personas:

  Persona 1 — "Research-First Rachel" (35% of buyers):
  Spends 2-3 weeks researching, reads every review, compares
  specs in spreadsheets, visits 5+ competitor sites, asks
  questions in forums. Wants: detailed specs, comparison
  tools, expert reviews. Frustrated by: hidden specifications,
  marketing fluff instead of data, pressure to buy quickly.

  Persona 2 — "Deal-Hunter Derek" (40% of buyers):
  Only shops during sales events, has price alerts on 3
  apps, knows exactly what he wants, focuses solely on
  price. Wants: price history, deal alerts, coupon stacking.
  Frustrated by: inflated "original" prices, limited-time
  pressure, shipping costs that negate savings.

  Persona 3 — "Overwhelmed Olga" (25% of buyers):
  Needs a laptop for work but finds tech confusing, wants
  someone to just tell her what to buy, decision paralysis
  with too many options. Wants: guided recommendations,
  simple language, reassurance. Frustrated by: jargon,
  too many choices, fear of making the wrong purchase.

  Task: Create a multi-persona journey map showing how
  these three personas experience the same purchase
  journey differently.

assertions:
  - type: llm_judge
    criteria: "Response maps divergent experiences across shared stages — shared stages with different experiences (uses common journey stages — awareness, research, comparison, decision, purchase, post-purchase — but shows how each persona experiences them differently: Research stage: Rachel spends 2-3 weeks in deep research comparing specs; Derek skips research because he already knows what he wants, goes straight to price comparison; Olga starts researching, gets overwhelmed by options and jargon, and either abandons or seeks help), emotional divergence (the same touchpoint creates different emotions: a product page with 47 spec fields makes Rachel happy — 'finally, real data'; makes Derek indifferent — he scrolls to the price; makes Olga anxious — 'I don't understand any of this'; a 'flash sale ending in 2 hours' banner excites Derek, annoys Rachel — 'I'm not ready to decide yet', and stresses Olga — 'am I going to miss something?'), journey length and path (Rachel's journey is 2-3 weeks and linear through research; Derek's journey is event-driven — he waits for a sale then acts in hours; Olga's journey is unpredictable — she may loop between research and overwhelm multiple times before buying or abandoning)."
    weight: 0.35
    description: "DivergentExperiences"
  - type: llm_judge
    criteria: "Response identifies design conflicts and trade-offs — conflicting needs (features that serve one persona hurt another: detailed spec comparison tables serve Rachel but overwhelm Olga; aggressive sale countdown timers serve Derek but frustrate Rachel; simplified 'recommended for you' suggestions serve Olga but feel patronizing to Rachel), design trade-off analysis (the platform can't optimize for all three simultaneously: the homepage can't be both information-dense for Rachel AND simple for Olga; the checkout can't be both fast for Derek AND reassuring for Olga; identifies which conflicts are resolvable through personalization or progressive disclosure and which require strategic choices), persona-weighted decisions (with Derek at 40% of buyers, Rachel at 35%, and Olga at 25%, the platform needs to serve all three but may need to make trade-offs: the default experience should probably balance between the two largest segments with progressive disclosure serving Olga's simplicity needs and Rachel's depth needs)."
    weight: 0.35
    description: "DesignConflicts"
  - type: llm_judge
    criteria: "Response presents the multi-persona map in a comparable format — visual or structural comparison (presents the three journeys in a way that enables side-by-side comparison — either three parallel swim lanes, a comparison table by stage, or overlaid journey curves showing where personas diverge; not three completely separate maps that can't be compared), convergence and divergence points (identifies where personas share similar experiences — checkout process is similar for all three — and where they diverge most dramatically — the research/comparison phase is completely different; these points are valuable for design decisions), key persona-specific pain points (Rachel: can't find detailed enough specs or real expert reviews; Derek: hidden costs that appear at checkout negate the deal; Olga: no guided recommendation path, too many choices with no clear 'best' option; these are distinct problems requiring different solutions)."
    weight: 0.30
    description: "ComparableFormat"
