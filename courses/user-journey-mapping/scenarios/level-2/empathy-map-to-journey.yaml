meta:
  id: empathy-map-to-journey
  level: 2
  course: user-journey-mapping
  type: output
  description: "Empathy map to journey map — translate empathy map insights into a structured journey"
  tags: [empathy-map, synthesis, research-to-journey, intermediate]

state: {}

trigger: |
  You're a UX researcher at a job search platform. Your
  team just completed an empathy mapping workshop for
  your primary persona, "Mid-Career Mike," a 38-year-old
  marketing manager who was laid off 2 months ago.

  Empathy map results:

  SAYS:
  - "I just want a job that values my experience"
  - "I'm tired of applying to jobs that ghost me"
  - "The whole process feels dehumanizing"
  - "I used to hire people, now I can't get hired"
  - "My LinkedIn is full of people 10 years younger
    getting promoted"

  THINKS:
  - "Am I too old for this industry?"
  - "Should I lower my salary expectations?"
  - "Maybe I need to learn new skills"
  - "What if I've peaked in my career?"
  - "How long can we sustain on savings?"

  FEELS:
  - Anxious about finances (severance running out in 4 months)
  - Embarrassed around friends who are employed
  - Frustrated by automated rejections
  - Hopeful when a job matches his experience
  - Defeated after each ghosting experience

  DOES:
  - Applies to 5-10 jobs per day
  - Customizes resume for each application
  - Checks email constantly for responses
  - Attends networking events reluctantly
  - Scrolls LinkedIn at 2am unable to sleep

  Task: Transform this empathy map into a journey map
  for Mike's job search experience on your platform.

assertions:
  - type: llm_judge
    criteria: "Response translates empathy map quadrants into journey layers — mapping SAYS to the journey (Mike's statements reveal expectations and frustrations that map to specific journey stages: 'I'm tired of applying to jobs that ghost me' maps to the post-application waiting stage; 'the process feels dehumanizing' maps to the overall experience quality across all stages; 'I used to hire people' maps to an identity crisis that colors every interaction with the platform), mapping THINKS to internal monologue per stage (Mike's thoughts provide the cognitive layer: during search — 'am I too old?'; during application — 'should I lower my expectations?'; during waiting — 'maybe I need new skills'; after rejection — 'what if I've peaked?' — these thoughts create a narrative arc of declining confidence across the journey), mapping FEELS to emotional curve (the empathy map feelings translate to an emotional trajectory: hopeful when starting a search session, anxious when customizing resumes, briefly hopeful when finding a match, frustrated by automated rejections, defeated by ghosting, and a constant undertone of financial anxiety), mapping DOES to actions per stage (Mike's behaviors reveal the journey's intensity: 5-10 applications per day, customizing each resume, constant email checking, 2am LinkedIn scrolling — these actions show a person whose entire day revolves around the job search)."
    weight: 0.35
    description: "EmpathyToJourneyTranslation"
  - type: llm_judge
    criteria: "Response creates a structured journey from the empathy insights — journey stages derived from empathy data (the empathy map implies these stages: job search/discovery — browsing listings, filtering by experience level; evaluation — reading descriptions, assessing fit, comparing salary to expectations; application — customizing resume, filling forms, submitting; waiting — checking email, refreshing status, growing anxiety; response/non-response — receiving automated rejections or silence; emotional recovery — dealing with rejection before starting the cycle again; cycle repetition — the journey loops, with each cycle reducing confidence and hope), the empathy map context enriches every stage (a journey map without the empathy map might show: user searches, applies, waits, gets result — functional but empty; with the empathy map context: a 38-year-old who used to be on the other side of this process searches while fighting age-related self-doubt, applies with diminishing hope, waits while checking email at 2am, receives automated rejections that feel dehumanizing — the empathy map transforms a functional journey into a human story)."
    weight: 0.35
    description: "StructuredJourneyCreation"
  - type: llm_judge
    criteria: "Response identifies platform design opportunities from the combined empathy-journey analysis — addressing the emotional needs (the platform should address Mike's emotional state, not just his functional needs: during search — surface roles that value experience explicitly, show companies that hire mid-career professionals; during application — provide feedback on application strength, don't just accept and go silent; during waiting — provide status transparency, estimated timeline, and proof that a human reviewed the application; after rejection — offer constructive feedback, suggest similar roles, preserve dignity), the dehumanization problem (Mike feels the process is dehumanizing — the platform's opportunity is to rehumanize it: replace automated rejection emails with human-written responses, show the reviewer's name, provide a reason for non-advancement, acknowledge the effort of customizing the application), the 2am insight (Mike scrolling LinkedIn at 2am unable to sleep reveals the emotional toll — the platform could offer: evening job matches digest instead of constant checking, mindful job search features that encourage healthy boundaries, progress tracking that shows effort — 'you've applied to 47 jobs this month' — to validate his work even without results)."
    weight: 0.30
    description: "DesignOpportunities"
