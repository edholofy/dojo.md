meta:
  id: journey-metrics-kpis
  level: 2
  course: user-journey-mapping
  type: output
  description: "Journey metrics and KPIs — define measurable indicators for each journey stage"
  tags: [metrics, kpis, measurement, analytics, intermediate]

state: {}

trigger: |
  You're a product analyst at a B2B SaaS platform for
  project management. Your CEO says: "We have plenty of
  product metrics but I have no idea if our customers are
  actually having a good experience." The company tracks
  hundreds of metrics but none are organized around the
  customer journey.

  Current metrics (scattered across teams):
  - Marketing: website visits, trial signups, CAC
  - Product: DAU, feature usage %, session length
  - Engineering: uptime, page load time, error rate
  - Sales: demo-to-close rate, deal size, sales cycle
  - Support: ticket volume, resolution time, CSAT
  - Finance: MRR, churn rate, expansion revenue

  The customer journey stages:
  1. Awareness — discovers the product
  2. Evaluation — tries free trial, evaluates fit
  3. Onboarding — sets up workspace, invites team
  4. Adoption — team starts using core features
  5. Value realization — achieves the outcome they bought for
  6. Expansion — adds users, upgrades plan
  7. Renewal/Churn — decides to stay or leave

  Task: Create a journey-stage metric framework that maps
  the right KPIs to each journey stage and identifies
  metric gaps.

assertions:
  - type: llm_judge
    criteria: "Response maps metrics to journey stages appropriately — stage-metric alignment (assigns relevant existing metrics to each stage: awareness — website visits, CAC; evaluation — trial signups, demo-to-close rate, sales cycle; onboarding — needs new metrics, possibly time-to-first-value; adoption — DAU, feature usage %, session length; value realization — needs new metrics, possibly customer-reported outcomes; expansion — expansion revenue, deal size; renewal/churn — churn rate, MRR, CSAT), metric reassignment (some existing metrics are currently owned by the wrong team or aren't connected to the stage they actually measure: CSAT is tracked by support but it's really a renewal/churn indicator; feature usage % is tracked by product but it measures adoption success; trial signups are a marketing metric but they indicate evaluation engagement), leading vs lagging (distinguishes between leading indicators that predict future behavior and lagging indicators that measure past outcomes: DAU is a leading indicator of retention, churn rate is a lagging indicator — by the time you see churn, it's too late; the framework should emphasize leading indicators at early stages)."
    weight: 0.35
    description: "MetricStageMapping"
  - type: llm_judge
    criteria: "Response identifies critical metric gaps — missing journey metrics (identifies stages with no adequate metrics: onboarding has no dedicated metrics — you can't tell if a customer is successfully setting up or struggling; value realization has no measurement — you don't know if customers are actually achieving their goals; expansion has revenue metrics but no leading indicators of expansion readiness), gap-filling recommendations (proposes new metrics for the gaps: onboarding — time-to-first-project, team invite rate within 7 days, setup completion rate; value realization — customer-reported outcome achievement, time-to-value, workflow completion rate; expansion — feature ceiling hits — users hitting plan limits, team growth rate, power feature adoption — indicators they need more), the 'good experience' question (addresses the CEO's concern directly: the company measures operational performance — uptime, load time, error rate — and financial outcomes — MRR, churn — but doesn't measure experience quality at each stage; the framework adds experience metrics like time-to-value and onboarding completion alongside the operational and financial metrics)."
    weight: 0.35
    description: "MetricGapIdentification"
  - type: llm_judge
    criteria: "Response creates a usable metric framework — dashboard concept (proposes a journey-stage dashboard that shows the health of each stage: green/yellow/red indicators for each stage's key metrics, allowing leadership to see where customers are struggling without digging into hundreds of metrics), metric ownership (assigns each journey-stage metric to a responsible team: awareness and evaluation metrics to marketing/sales, onboarding metrics to a dedicated onboarding team or product, adoption metrics to product, value realization to customer success, expansion to sales/CS, renewal/churn to CS — clear ownership prevents metrics from falling through the cracks), actionability (each metric has a clear action trigger: if onboarding completion drops below X%, the onboarding team investigates and intervenes; if time-to-value increases, product examines what's blocking value; if expansion leading indicators spike, sales proactively reaches out — metrics without actions are vanity metrics)."
    weight: 0.30
    description: "UsableFramework"
