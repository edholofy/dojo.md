meta:
  id: research-driven-journey
  level: 2
  course: user-journey-mapping
  type: output
  description: "Research-driven journey mapping — create a journey map grounded in multiple research sources"
  tags: [research, evidence, data, triangulation, intermediate]

state: {}

trigger: |
  You're a UX researcher at a telehealth platform. You
  need to create a research-backed journey map for
  "first-time patient booking and completing a virtual
  visit." You have multiple data sources:

  Quantitative data:
  - Funnel analytics: 100K visitors → 35K create account →
    18K book appointment → 12K complete visit → 8K rebook
  - Average time to book: 23 minutes (target: under 10)
  - 45% of users who start booking abandon during insurance
    verification step
  - Peak booking times: 8-9pm (after kids' bedtime)
  - 30% of completed visits have technical issues (audio/video)

  Qualitative data (15 user interviews):
  - "I didn't know if my insurance was accepted until I was
    halfway through booking" (9/15)
  - "The waiting room was just a blank screen. I didn't
    know if the doctor was coming" (11/15)
  - "My doctor couldn't see the photos I uploaded of my
    rash" (4/15)
  - "I felt rushed — the visit was only 10 minutes" (7/15)
  - "I got the prescription but no follow-up instructions" (8/15)

  Support data (last 90 days):
  - 340 tickets about insurance verification
  - 280 tickets about video/audio issues
  - 190 tickets about prescription delivery
  - 150 tickets about how to share images/documents

  Behavioral analytics:
  - Users check the insurance page an average of 3.2 times
    before booking
  - 60% of users who experience tech issues don't rebook
  - Users spend 4.5 minutes on the "waiting room" screen

  Task: Create a research-backed journey map that
  synthesizes all data sources.

assertions:
  - type: llm_judge
    criteria: "Response synthesizes multiple data sources into a unified journey map — triangulation (each journey stage includes evidence from multiple sources: the insurance verification pain point is supported by analytics — 45% abandonment rate, interviews — 9/15 mentioned it, support tickets — 340 tickets, and behavioral data — 3.2 page revisits; this triangulation makes the finding robust, not based on any single data source), quantitative and qualitative integration (numbers provide scale and severity while quotes provide emotional context: '45% abandon at insurance verification' tells you the magnitude, 'I didn't know if my insurance was accepted until halfway through' tells you the experience — both are included at each relevant stage), evidence hierarchy (not all data sources carry equal weight: direct behavioral analytics and funnel data show what actually happens, interview quotes explain why, support tickets indicate severity — the journey map weights these appropriately)."
    weight: 0.35
    description: "DataSynthesis"
  - type: llm_judge
    criteria: "Response creates a complete journey with data-backed insights at each stage — stage-by-stage evidence (awareness/arrival: 100K visitors, peak at 8-9pm after kids' bedtime; account creation: 35K create accounts — 65% drop-off from visitors; booking: 18K book — insurance verification causes 45% abandonment, 23-min average booking time is 2x target; waiting room: 4.5 minutes on blank screen with 11/15 users confused; visit: 12K complete visits, 30% have tech issues, 7/15 feel rushed at 10 minutes; post-visit: 8/15 lack follow-up instructions, 190 prescription delivery tickets; rebooking: only 8K rebook, 60% of tech-issue users don't return), drop-off quantified (the funnel narrows from 100K to 8K — an 8% end-to-end conversion rate; each stage's drop-off is quantified and explained with qualitative evidence)."
    weight: 0.35
    description: "EvidenceBackedJourney"
  - type: llm_judge
    criteria: "Response prioritizes findings and identifies research gaps — prioritized pain points (based on combined evidence weight: insurance verification is the #1 priority — highest abandonment rate, most support tickets, most interview mentions; technical issues during visit are #2 — directly cause 60% non-rebooking; waiting room confusion is #3 — widespread in interviews and creates anxiety before the visit even starts), research gaps identified (notes where evidence is thin or missing: only 4/15 mentioned image sharing issues but 150 support tickets suggest it's underrepresented in interviews; no data on the post-visit prescription experience despite 190 tickets; no research on the rebooking decision — why do 4K of 12K completers not return even without tech issues?), actionable output (the journey map produces specific, prioritized recommendations backed by data: move insurance verification to the beginning of the flow, redesign the waiting room with status indicators and estimated wait time, invest in technical reliability to protect rebooking rates)."
    weight: 0.30
    description: "PrioritizationAndGaps"
