meta:
  id: journey-storytelling
  level: 2
  course: user-journey-mapping
  type: output
  description: "Journey storytelling — transform a journey map into a compelling narrative for stakeholders"
  tags: [storytelling, narrative, communication, stakeholders, intermediate]

state: {}

trigger: |
  You're a UX researcher who has completed a detailed
  journey map for a banking app's loan application process.
  You need to present findings to three different audiences
  next week:

  Audience 1 — Executive leadership (CEO, COO, CFO):
  Care about business impact, have 15 minutes, want
  bottom-line recommendations. Will lose interest if
  shown a detailed journey map artifact.

  Audience 2 — Product and engineering team (20 people):
  Want actionable details, need to understand the problems
  deeply enough to design solutions, have 45 minutes.

  Audience 3 — Board of directors (quarterly meeting):
  Non-technical, care about competitive position and
  customer satisfaction trends, have 5 minutes within
  a larger meeting.

  Key findings from the journey map:
  - 62% abandonment rate at document upload step
  - Average application time: 47 minutes (competitor: 12)
  - NPS for loan process: -22 (overall bank NPS: +35)
  - 3 customer quotes that are devastatingly honest
  - The root cause is a legacy system that requires manual
    document verification

  Task: Create three different presentations of the same
  journey map findings, tailored to each audience.

assertions:
  - type: llm_judge
    criteria: "Response creates an executive presentation — executive format (15 minutes, focused on impact and action: opens with the business problem — the loan process NPS is -22 while the bank's overall NPS is +35, the loan process is dragging down the brand; follows with one devastating customer quote that makes the problem visceral; presents the key metric — 62% abandonment means the bank loses $X million in potential loan revenue annually; closes with the recommendation and investment required — modernize document verification to reduce application time from 47 to under 15 minutes), no journey map artifact (executives don't need to see the full journey map — they need the story and the ask; the journey map is the evidence behind the story, not the presentation itself), CFO-relevant framing (translates the journey findings into financial language: abandonment rate × average loan size × margin = lost revenue; 47-minute application time = customer acquisition cost inefficiency; competitor's 12-minute process is a competitive threat to market share)."
    weight: 0.35
    description: "ExecutivePresentation"
  - type: llm_judge
    criteria: "Response creates a product team presentation — product team format (45 minutes, detailed and actionable: walks through the journey map stage by stage, shows where users struggle with specific evidence — heatmaps, session recordings, analytics, quotes; deep-dives into the document upload abandonment — what specifically causes 62% to leave: file format issues, camera quality on mobile, timeout errors, unclear instructions; discusses the legacy system root cause — what the system requires vs what modern alternatives could provide; ends with design opportunities and technical constraints), journey map artifact included (the product team should see the actual journey map with all its detail — they need to understand the full context to design solutions), solution space opened (doesn't prescribe a single solution — opens the design space: what if document upload was asynchronous? what if the app used OCR to read documents via camera? what if the application could be saved and resumed? what if certain documents could be verified digitally without upload? — the team should leave energized to solve the problems)."
    weight: 0.35
    description: "ProductTeamPresentation"
  - type: llm_judge
    criteria: "Response creates a board presentation — board format (5 minutes within a larger meeting: one slide or a brief verbal section; the headline: 'our loan application process takes 47 minutes while our best competitor takes 12, and 62% of applicants abandon — we have a plan to fix this by Q3'; one customer quote for emotional resonance; competitive positioning context — this gap is widening as competitors invest in digital lending; confidence statement — 'we've identified the root causes and have a remediation plan requiring $X investment'), audience adaptation demonstrated (each presentation uses the same underlying data but frames it completely differently: executives hear about revenue impact, the product team hears about user experience details, the board hears about competitive positioning and strategic risk), storytelling principles (regardless of audience: leads with the human impact not the data, uses customer quotes to make abstract metrics personal, presents the journey findings as a narrative with a problem-tension-resolution arc, ends with a clear call to action appropriate to each audience's decision-making authority)."
    weight: 0.30
    description: "BoardPresentation"
