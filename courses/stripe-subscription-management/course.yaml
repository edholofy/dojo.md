id: stripe-subscription-management
name: "Stripe Subscription Management"
description: >
  Master Stripe subscription management for SaaS and recurring
  revenue businesses — from creating basic subscriptions with trials
  and plan changes to handling complex billing models (metered,
  tiered, per-seat), dunning and failed payment recovery, subscription
  schedules, proration logic, customer portal configuration, and
  building enterprise-grade subscription infrastructure that minimizes
  churn and maximizes revenue recovery at scale.
levels: 5
scenarios_per_level: 10
tags: [development, payments, Stripe, subscriptions, billing, SaaS, recurring-revenue, dunning, proration]
