meta:
  id: subscription-internationalization
  level: 4
  course: stripe-subscription-management
  type: output
  description: "Internationalize subscription management — design a subscription system that handles global payment methods, local regulations, and cultural billing expectations"
  tags: [stripe, subscription, internationalization, global, local-methods, regulations, expert]

state: {}

trigger: |
  You're the Director of Global Billing at a SaaS company expanding
  from 3 markets (US, UK, EU) to 12 markets. Each new market has
  unique payment method preferences, regulatory requirements, and
  cultural expectations around billing.

  New markets and their requirements:

  Japan ($3M opportunity):
  - Payment method: Konbini (convenience store payments), JCB cards
  - Expectation: Annual contracts, invoice-based payment, Net 60
  - Regulation: Act on Specified Commercial Transactions (requires
    price display including consumption tax)

  Brazil ($2.5M opportunity):
  - Payment method: Boleto Bancário (bank slip), Pix (instant)
  - Expectation: Installment payments (12x on credit card), BRL
    pricing
  - Regulation: Consumer Defense Code requires easy cancellation,
    7-day cooling-off period for online purchases

  India ($4M opportunity):
  - Payment method: UPI, RuPay cards, NetBanking
  - Expectation: Monthly billing only (annual is uncommon for SaaS)
  - Regulation: RBI mandate requires re-authorization for recurring
    transactions above ₹15,000 every billing cycle

  South Korea ($1.5M opportunity):
  - Payment method: KakaoPay, Korean cards (domestic processing)
  - Expectation: Business customers want tax invoices (세금계산서)
  - Regulation: E-Commerce Act requires clear subscription terms

  Middle East (UAE + Saudi, $2M opportunity):
  - Payment method: Mada cards (Saudi), Apple Pay, cash on delivery
  - Expectation: VAT invoices required since VAT introduction
  - Regulation: UAE Data Protection Law (PDPL) for customer data

  Australia ($1.8M opportunity):
  - Payment method: Standard cards, BECS Direct Debit
  - Expectation: GST-inclusive pricing display
  - Regulation: Australian Consumer Law requires easy unsubscribe

  Tasks:
  1. Design the global subscription architecture. Include: how to
     support market-specific payment methods in Stripe (which
     methods are available via Stripe vs. need local processors),
     the localized pricing strategy (market-based pricing with
     purchasing power parity), the regulatory compliance matrix
     (requirements per market and how Stripe features map to them),
     and the market entry priority (which markets to launch first
     based on opportunity vs. complexity).

  2. Handle the India RBI mandate challenge. Write: the re-
     authorization flow for subscriptions above ₹15,000 (customer
     must approve each charge), the fallback strategy when re-
     authorization fails (grace period, notification, downgrade),
     the impact on your dunning system (can't just retry — need
     customer action), and the UX design that minimizes friction.

  3. Build the localization framework. Write: the invoice
     customization per market (tax display, language, required
     fields), the cancellation flow compliance (Brazil's 7-day
     cooling-off, Australia's easy unsubscribe, FTC click-to-cancel),
     the billing communication localization (emails in local
     language with market-appropriate payment instructions), and
     the testing strategy for each market.

assertions:
  - type: llm_judge
    criteria: "Global architecture is comprehensive — payment method support is mapped per market, localized pricing considers purchasing power, regulatory matrix covers all 6 new markets, and market priority is justified"
    weight: 0.35
    description: "Comprehensive global architecture"
  - type: llm_judge
    criteria: "India RBI mandate is handled correctly — re-authorization flow is compliant, fallback handles failures gracefully, dunning system adapts to customer-action requirement, and UX minimizes friction"
    weight: 0.35
    description: "Correct RBI mandate handling"
  - type: llm_judge
    criteria: "Localization framework is thorough — invoices meet per-market requirements, cancellation compliance is market-specific, communications are localized, and testing strategy covers each market"
    weight: 0.30
    description: "Thorough localization framework"
