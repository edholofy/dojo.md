meta:
  id: subscription-compliance-audit
  level: 4
  course: stripe-subscription-management
  type: output
  description: "Prepare for a subscription billing compliance audit — ensure SOX, ASC 606, PCI DSS, and consumer protection compliance for subscription operations"
  tags: [stripe, subscription, compliance, SOX, audit, consumer-protection, expert]

state: {}

trigger: |
  You're the VP of Billing at a SaaS company preparing for its
  first SOX audit (recently went public, $200M ARR). The external
  auditors have flagged 8 areas of concern in the subscription
  billing system:

  Finding 1 — Revenue recognition timing:
  Annual subscriptions are recognized at payment date, not spread
  over the service period. $24M in deferred revenue is unbooked.

  Finding 2 — Segregation of duties:
  The same engineers who write billing code can also issue refunds,
  modify subscription amounts, and void invoices in production
  Stripe. No approval workflow exists.

  Finding 3 — Change management:
  Pricing changes go to production without formal approval. Last
  month, a developer accidentally set a price to $0.99 instead of
  $99 and it was live for 3 hours before detection.

  Finding 4 — Refund controls:
  No dollar threshold for refund approval. An intern processed a
  $47,000 refund without any oversight.

  Finding 5 — Cancellation consumer compliance:
  Your cancellation flow requires 5 clicks and a phone call (for
  "retention"). California's automatic renewal law (ARL) and FTC's
  "click-to-cancel" rule require cancellation to be as easy as
  signup.

  Finding 6 — Trial transparency:
  Your trial-to-paid conversion doesn't clearly disclose the
  conversion date and amount. Multiple customer complaints and
  one state AG inquiry.

  Finding 7 — Dunning communication:
  Failed payment emails don't comply with EFTA (Electronic Fund
  Transfer Act) notification requirements.

  Finding 8 — Data retention:
  Stripe retains PII (email, name, payment methods) indefinitely.
  No data retention policy, no GDPR right-to-erasure process for
  subscription data.

  Tasks:
  1. Address findings 1-4 (financial controls). Write: the deferred
     revenue recognition system (ASC 606 compliant), the Stripe API
     access control framework (restricted API keys, role-based
     access, approval workflows for refunds/modifications), the
     change management process for pricing (approval gate before
     Stripe API calls), and the refund approval workflow with dollar
     thresholds ($500 auto-approve, $500-$5K manager, $5K+ VP).

  2. Address findings 5-8 (consumer and data compliance). Write: the
     compliant cancellation flow (2-click cancel that meets CA ARL
     and FTC rules), the trial disclosure design (clear conversion
     date, amount, and opt-out), the EFTA-compliant dunning emails
     (required disclosures for failed automatic payments), and the
     data retention and erasure policy (GDPR-compliant handling of
     Stripe customer data).

  3. Build the ongoing compliance monitoring system. Write: the
     automated control testing (daily checks that SOX controls are
     operating), the compliance dashboard (real-time status of all
     8 findings), the audit evidence collection (automated evidence
     for each control), and the annual compliance calendar
     (recurring tests, certifications, and regulatory deadlines).

assertions:
  - type: llm_judge
    criteria: "Financial controls are SOX-compliant — deferred revenue follows ASC 606, API access uses restricted keys with roles, pricing changes require approval, and refund workflow has appropriate dollar thresholds"
    weight: 0.35
    description: "SOX-compliant financial controls"
  - type: llm_judge
    criteria: "Consumer compliance addresses all 4 findings — cancellation meets CA ARL/FTC click-to-cancel, trial disclosure is transparent, dunning emails comply with EFTA, and data retention includes GDPR erasure"
    weight: 0.35
    description: "Complete consumer compliance"
  - type: llm_judge
    criteria: "Monitoring system sustains compliance — automated testing catches control failures, dashboard provides real-time visibility, audit evidence is auto-collected, and compliance calendar prevents lapses"
    weight: 0.30
    description: "Sustainable compliance monitoring"
