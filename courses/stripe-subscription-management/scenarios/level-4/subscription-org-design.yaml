meta:
  id: subscription-org-design
  level: 4
  course: stripe-subscription-management
  type: output
  description: "Design the subscription billing organization — build the team structure, processes, and operating model for a world-class billing engineering function"
  tags: [stripe, subscription, org-design, team, operating-model, leadership, expert]

state: {}

trigger: |
  You're the newly hired VP of Billing Engineering at a SaaS company
  ($100M ARR, growing to $200M). The CEO created this role because:
  "Billing incidents cost us $3M last year in lost revenue, refunds,
  and engineering time. We need a dedicated billing organization."

  Current state:
  - Billing code: Owned by 3 different teams (Payments, Backend,
    Platform). No single owner.
  - Team: 6 engineers touch billing code (none full-time)
  - Processes: No billing-specific QA, no billing on-call, no
    billing change management
  - Debt: 47 open billing-related bugs, 12 "known issues" that
    finance works around monthly
  - Vendor: Stripe (single vendor, no relationship manager)

  You need to build a billing organization from scratch:
  - Budget: $6M annual (fully loaded team cost)
  - Headcount authority: Up to 25 people
  - Timeline: Must show measurable improvement in 6 months

  Stakeholders:
  - CFO: "I need accurate revenue numbers and SOX compliance"
  - CTO: "Don't build a silo — integrate with our platform"
  - VP of Sales: "Enterprise deals need custom billing support"
  - VP of Customer Success: "Billing issues are our #1 support reason"

  Tasks:
  1. Design the organization structure. Include: the team composition
     (billing platform engineers, billing operations, billing
     analytics, billing reliability), the role descriptions for the
     first 10 hires (with priority order), the career ladder
     (billing engineer IC track and manager track), and the
     organizational placement (where does billing eng sit — under
     CTO, under CFO, or independent?).

  2. Define the operating model. Include: the billing change
     management process (how changes go from idea → code → production),
     the billing QA process (testing standards for billing code),
     the billing on-call rotation (SLAs, escalation, runbooks), the
     Stripe vendor relationship management (quarterly business
     reviews, feature requests, incident coordination), and the
     billing operations rhythm (daily, weekly, monthly ceremonies).

  3. Write the 6-month transformation plan. Include: the quick wins
     (first 30 days — reduce billing incidents by 50%), the team
     building timeline (when each role is hired), the 47-bug
     triage (priority matrix, estimated effort, resolution schedule),
     the stakeholder communication plan (monthly updates to CFO,
     CTO, VP Sales, VP CS), and the success metrics (KPIs that
     demonstrate improvement — billing incident rate, revenue
     accuracy, time-to-resolution).

assertions:
  - type: llm_judge
    criteria: "Org structure is well-designed — team composition covers platform, operations, analytics, and reliability; first 10 hires are prioritized correctly; career ladder attracts talent; and org placement is justified"
    weight: 0.35
    description: "Well-designed org structure"
  - type: llm_judge
    criteria: "Operating model is comprehensive — change management prevents incidents, QA standards are billing-specific, on-call has clear SLAs, Stripe relationship is managed, and operational rhythm is defined"
    weight: 0.35
    description: "Comprehensive operating model"
  - type: llm_judge
    criteria: "6-month plan is achievable — quick wins are realistic, hiring timeline is feasible, bug triage is prioritized, stakeholder communication is regular, and KPIs measure meaningful improvement"
    weight: 0.30
    description: "Achievable transformation plan"
