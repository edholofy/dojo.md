meta:
  id: subscription-economics-optimization
  level: 4
  course: stripe-subscription-management
  type: output
  description: "Optimize subscription economics — design pricing experiments, reduce processing costs, and maximize net revenue retention"
  tags: [stripe, subscription, economics, pricing, NRR, optimization, expert]

state: {}

trigger: |
  You're the VP of Growth at a SaaS company ($45M ARR, 18,000
  subscribers). The board has set aggressive targets for the next
  fiscal year:

  Current metrics:
  - Gross Revenue Retention (GRR): 88% (losing 12% to downgrades
    and cancellations)
  - Net Revenue Retention (NRR): 105% (expansion barely offsets churn)
  - ARPU: $208/month
  - LTV: $4,160 (ARPU / 5% monthly churn)
  - CAC: $1,800 (LTV:CAC ratio of 2.3:1)
  - Processing costs: 2.85% of revenue ($1.28M/year to Stripe)

  Board targets:
  - GRR: 88% → 93%
  - NRR: 105% → 120%
  - ARPU: $208 → $270
  - LTV:CAC: 2.3:1 → 3.5:1
  - Processing costs: 2.85% → 2.3%

  Levers available:
  1. Pricing optimization: Current plans haven't been updated in 2
     years. Competitors have moved to usage-based models.
  2. Expansion revenue: No systematic upsell/cross-sell. Add-ons
     exist but aren't promoted.
  3. Downgrade prevention: Customers downgrade because lower tiers
     are "good enough." Need to differentiate plans better.
  4. Processing cost reduction: Negotiate with Stripe, optimize
     payment methods (ACH is 0.8% vs. card at 2.9%), annual billing
     incentives (one transaction instead of 12).

  Tasks:
  1. Design the pricing optimization strategy. Include: the pricing
     model evaluation (flat-rate vs. per-seat vs. usage-based vs.
     hybrid — with analysis of which best achieves the ARPU target),
     the pricing experiment framework (A/B testing new prices for
     new customers while grandfathering existing), the plan
     restructuring (feature fencing to prevent "good enough"
     downgrades), and the implementation plan in Stripe (new
     products/prices, migration schedules).

  2. Build the expansion revenue engine. Include: the automated
     upsell triggers (usage approaching plan limits, team growth,
     feature engagement), the cross-sell framework (identifying
     which add-ons to recommend based on usage patterns), the
     in-app upgrade prompts (timing, messaging, Stripe Checkout
     integration), and the expansion revenue tracking (MRR expansion
     from upgrades, add-ons, and seat growth separately).

  3. Write the processing cost reduction plan. Include: the Stripe
     renegotiation strategy (leveraging $45M ARR and growth rate),
     the ACH/bank payment promotion (incentivizing customers to
     switch from cards), the annual billing promotion (discount
     that still reduces overall processing costs), and the cost
     model showing the path from 2.85% to 2.3%.

assertions:
  - type: llm_judge
    criteria: "Pricing strategy targets ARPU growth — model evaluation analyzes multiple options against the $270 target, A/B framework tests safely, plan restructuring prevents downgrades, and Stripe implementation is planned"
    weight: 0.35
    description: "ARPU-targeting pricing strategy"
  - type: llm_judge
    criteria: "Expansion engine drives NRR — upsell triggers are data-driven, cross-sell recommendations match usage patterns, in-app prompts are well-timed, and expansion revenue is tracked by source"
    weight: 0.35
    description: "NRR-driving expansion engine"
  - type: llm_judge
    criteria: "Cost reduction is achievable — Stripe renegotiation leverages volume, ACH promotion has a realistic incentive, annual billing math works, and the path from 2.85% to 2.3% is credible"
    weight: 0.30
    description: "Achievable cost reduction"
