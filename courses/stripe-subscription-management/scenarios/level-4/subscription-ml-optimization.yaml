meta:
  id: subscription-ml-optimization
  level: 4
  course: stripe-subscription-management
  type: output
  description: "Apply ML to subscription optimization — build predictive models for churn prevention, pricing optimization, and revenue forecasting"
  tags: [stripe, subscription, ML, prediction, churn, pricing, forecasting, expert]

state: {}

trigger: |
  You're the Head of Subscription Intelligence at a SaaS company
  ($50M ARR, 22,000 subscribers). You're building an ML-powered
  subscription optimization system that goes beyond basic analytics.

  Current metrics and pain points:
  - Monthly churn: 3.4% (industry best-in-class is 1.5%)
  - Pricing: One-size-fits-all plans (no personalization)
  - Revenue forecast: ±15% accuracy (CFO wants ±5%)
  - Expansion: 2% of customers upgrade per month (target: 5%)
  - Dunning: 62% payment recovery rate (target: 80%)

  Available data (3 years):
  - 22,000 active subscriptions with full history
  - 180,000 total subscription events (creates, updates, cancels)
  - Customer engagement data (logins, features used, support tickets)
  - Stripe payment data (success rates, decline codes, retry results)
  - Sales data (deal size, industry, company size, sales cycle)
  - NPS scores (quarterly, 8,000 responses)

  ML opportunities:
  1. Churn prediction: Predict which customers will churn 30/60/90
     days in advance
  2. Price sensitivity: Identify optimal pricing for each customer
     segment based on willingness-to-pay signals
  3. Revenue forecasting: Predict monthly revenue with confidence
     intervals
  4. Optimal retry timing: Predict the best time to retry each
     failed payment
  5. Expansion propensity: Score customers by likelihood to upgrade

  Tasks:
  1. Design the ML system for subscription optimization. Include: the
     feature engineering pipeline (extracting predictive features
     from subscription, engagement, payment, and support data), the
     model architecture for each use case (churn = classification,
     revenue = time series, retry = survival analysis), the real-time
     scoring infrastructure (sub-100ms per prediction), and the
     feedback loop (how model predictions improve over time).

  2. Build the churn prediction model in detail. Include: the
     feature set (engagement decay, payment failure history, support
     sentiment trend, plan utilization, NPS decline), the model
     selection (random forest vs. gradient boosted vs. neural
     network with trade-offs), the class imbalance handling (3.4%
     churn rate means 96.6% non-churn), the explainability layer
     (SHAP values for each prediction — why is this customer at
     risk?), and the integration with the retention system (high-
     risk score triggers intervention).

  3. Write the business case. Include: the expected revenue impact
     of each ML application (reducing churn by 1% = $500K ARR saved,
     improving retry = $X recovered), the build vs. buy analysis
     (custom ML vs. third-party tools like ChurnZero/Baremetrics),
     the data science team requirements (skills, headcount), and the
     18-month ROI projection.

assertions:
  - type: llm_judge
    criteria: "ML system design is appropriate — feature engineering combines all data sources, model types match each use case, real-time scoring is feasible, and feedback loops enable improvement"
    weight: 0.35
    description: "Appropriate ML system design"
  - type: llm_judge
    criteria: "Churn model is technically sound — feature set captures leading indicators, model selection considers trade-offs, class imbalance is handled, explainability uses SHAP or similar, and integration triggers retention actions"
    weight: 0.35
    description: "Technically sound churn model"
  - type: llm_judge
    criteria: "Business case is compelling — revenue impact is quantified for each application, build vs buy is balanced, team requirements are realistic, and ROI projection shows credible return"
    weight: 0.30
    description: "Compelling business case"
