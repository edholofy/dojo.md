meta:
  id: customer-portal-setup
  level: 1
  course: stripe-subscription-management
  type: output
  description: "Set up Stripe Customer Portal — configure self-service subscription management for customers"
  tags: [stripe, subscription, customer-portal, self-service, configuration, beginner]

state: {}

trigger: |
  You're a developer at a SaaS startup. Your support team is
  overwhelmed with billing requests — 40% of tickets are about:
  - Updating credit card information (15%)
  - Upgrading or downgrading plans (10%)
  - Canceling subscriptions (8%)
  - Viewing invoice history (7%)

  Your CTO says: "Stripe has a Customer Portal that handles all of
  this. Set it up so customers can self-serve instead of contacting
  support. But I want to control what they can do — they should be
  able to update payment methods and view invoices, but plan changes
  and cancellation should show a custom message directing them to
  talk to our success team first."

  Your plans:
  - Starter: $19/month
  - Pro: $49/month
  - Business: $149/month

  Additional requirements:
  - The portal should match your brand colors (#2563EB blue)
  - Customers should be redirected back to your app after using
    the portal
  - You need to track portal usage to measure support ticket
    reduction

  Tasks:
  1. Configure the Customer Portal. Write: the portal configuration
     API call (or explain Dashboard setup) that enables payment
     method updates, enables invoice history, restricts plan changes
     to show a message ("Contact sales@company.com to change your
     plan"), restricts cancellation to show a custom message, and
     sets brand colors.

  2. Implement the portal session creation endpoint. Write: the
     server-side code to create a billing_portal.session with the
     customer ID and return_url, the frontend button that redirects
     to the portal, and the handling of the return URL (detecting
     what the customer changed).

  3. Set up portal event tracking. Write: the webhook handlers for
     billing_portal events (payment method updated, subscription
     updated), the logic to track portal visits and actions for
     analytics, and the projected support ticket reduction
     calculation based on the 40% billing-ticket rate.

assertions:
  - type: llm_judge
    criteria: "Portal configuration is correct — payment method updates enabled, invoice history enabled, plan changes restricted with custom message, cancellation restricted with custom message, and branding applied"
    weight: 0.35
    description: "Correct portal configuration"
  - type: llm_judge
    criteria: "Portal session implementation works — session creation uses correct customer ID and return_url, frontend integration redirects properly, and return URL handling detects changes"
    weight: 0.35
    description: "Working portal session"
  - type: llm_judge
    criteria: "Event tracking is set up — portal webhook events are handled, analytics tracking captures portal usage, and the support ticket reduction projection is reasonable"
    weight: 0.30
    description: "Portal event tracking"
