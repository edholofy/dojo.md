meta:
  id: subscription-consulting-engagement
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Lead a subscription consulting engagement — advise a Fortune 500 company on their subscription transformation from perpetual licensing to SaaS"
  tags: [stripe, subscription, consulting, transformation, perpetual-to-SaaS, Fortune-500, master]

state: {}

trigger: |
  You're a subscription billing consultant engaged by "LegacySoft"
  — a Fortune 500 enterprise software company ($3.2B revenue) that
  is transitioning from perpetual licensing to a SaaS subscription
  model. This is a $5M, 24-month consulting engagement.

  Current state:
  - Revenue: 70% perpetual licenses + maintenance, 30% cloud/SaaS
  - Target: 70% subscription within 5 years
  - 8,500 enterprise customers, average deal size $380K
  - Current subscription billing: Built in-house, handles $960M ARR
  - Problems: Revenue recognition errors, manual invoicing for 40%
    of enterprise deals, no self-serve, billing disputes cost $12M/year

  Board mandate: "The market has moved to SaaS. Our stock is
  discounted 35% vs. pure-play SaaS peers because investors don't
  trust our transition. We need a world-class subscription billing
  system and a clear transition plan."

  Constraints:
  - Cannot disrupt $2.2B in perpetual + maintenance revenue
  - Enterprise customers expect Net 60 invoicing, PO-based billing,
    custom contracts
  - Regulatory: IFRS 15/ASC 606 revenue recognition for both
    perpetual and subscription
  - Global: 47 countries, 12 currencies
  - Integration: Must work with SAP ERP, Salesforce CRM, Zuora (which
    they're considering replacing with Stripe Billing)

  Tasks:
  1. Write the assessment report (weeks 1-6 deliverable). Include:
     the current-state analysis (billing architecture, process
     maturity, pain points, compliance gaps), the benchmark against
     SaaS billing best practices, the gap analysis (what needs to
     change), and the strategic options (fix current system, migrate
     to Stripe Billing, migrate to Zuora, hybrid approach).

  2. Design the target-state billing architecture (weeks 7-16
     deliverable). Include: the platform selection recommendation
     (Stripe vs. Zuora vs. hybrid with detailed comparison for
     enterprise needs), the billing process redesign (from manual
     to automated for 8,500 enterprise customers), the revenue
     recognition integration (IFRS 15/ASC 606 for perpetual and
     subscription side-by-side), and the migration roadmap (phased
     transition preserving $2.2B in legacy revenue).

  3. Write the executive steering committee presentation (week 16
     milestone). Include: the investment case ($5M+ platform cost,
     $8M implementation, $3M annual operations vs. $12M current
     dispute cost + $X operational savings), the risk register
     (top 10 risks with mitigation), the timeline (24-month
     implementation with quarterly milestones), and the success
     metrics (billing accuracy, automation rate, revenue recognition
     accuracy, customer satisfaction).

assertions:
  - type: llm_judge
    criteria: "Assessment is thorough — current-state analysis covers architecture/process/compliance, benchmark identifies specific gaps, and strategic options include Stripe/Zuora/hybrid with balanced evaluation"
    weight: 0.35
    description: "Thorough assessment report"
  - type: llm_judge
    criteria: "Target architecture is enterprise-grade — platform selection addresses enterprise billing needs (Net 60, PO, custom contracts), process redesign moves from manual to automated, revenue recognition handles dual models, and migration preserves legacy revenue"
    weight: 0.35
    description: "Enterprise-grade target architecture"
  - type: llm_judge
    criteria: "Executive presentation is board-ready — investment case shows clear ROI, risk register is comprehensive with mitigations, timeline has realistic milestones, and success metrics are measurable"
    weight: 0.30
    description: "Board-ready executive presentation"
