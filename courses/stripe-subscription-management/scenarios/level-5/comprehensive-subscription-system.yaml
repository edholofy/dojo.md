meta:
  id: comprehensive-subscription-system
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Comprehensive subscription management engagement — serve as the Chief Revenue Officer building a world-class subscription business from strategy to execution"
  tags: [stripe, subscription, comprehensive, CRO, transformation, executive, master]

state: {}

trigger: |
  You've been hired as the Chief Revenue Officer (CRO) at
  "NovaPlatform" — a SaaS company at an inflection point. The
  company has product-market fit ($25M ARR, growing 60% YoY) but
  the subscription infrastructure is breaking under growth.

  Current state:
  - ARR: $25M (12,000 subscribers)
  - Growth: 60% YoY but decelerating (was 90% last year)
  - NRR: 102% (barely net positive — churn offsets expansion)
  - Gross margin: 68% (below 75%+ SaaS benchmark)
  - Monthly churn: 4.5% (way above 2% benchmark)
  - ARPU: $174/month (hasn't grown in 2 years)
  - Processing costs: 2.9% ($725K/year to Stripe)
  - Billing team: 2 engineers (one leaving next month)
  - Technical debt: Subscription code is the #1 source of bugs

  Board expectations:
  - ARR: $25M → $60M in 18 months (path to $100M)
  - NRR: 102% → 125%
  - Gross margin: 68% → 78%
  - Monthly churn: 4.5% → 1.8%
  - ARPU: $174 → $280

  Resources:
  - Budget: $3M over 18 months for billing infrastructure
  - Headcount: Grow billing team from 2 to 12
  - Executive support: Board seat, direct CEO report

  Tasks:
  1. Create the 18-month revenue transformation plan. Include: the
     4 phases (stabilize → optimize → scale → accelerate), the
     pricing restructure (current flat-rate → value-based hybrid
     that drives ARPU from $174 to $280), the churn reduction
     program (4.5% → 1.8% through dunning, retention, and product),
     the expansion engine (NRR from 102% → 125% through upsells
     and usage-based pricing), and the gross margin improvement
     (processing costs + infrastructure optimization).

  2. Write the first 90 days plan. Include: the billing
     infrastructure stabilization (fix the top 5 bugs, hire the
     billing lead), the Stripe renegotiation (leverage $25M+ volume
     for better rates), the quick wins (implement Smart Retries,
     add cancellation flow, fix the biggest churn driver), the
     pricing experiment design (test new packaging with 10% of new
     customers), and the team building (first 3 hires with JDs).

  3. Design the "Revenue Operating System." Include: the metrics
     framework (daily MRR tracking, cohort analysis, NRR by
     segment), the pricing governance (who can change pricing and
     how), the subscription lifecycle optimization (acquisition →
     activation → retention → expansion → advocacy), the continuous
     improvement mechanism (monthly pricing review, quarterly churn
     analysis), and how this system scales from $25M to $100M ARR.

assertions:
  - type: llm_judge
    criteria: "Transformation plan is credible — 4 phases have realistic timelines, pricing restructure drives ARPU growth, churn reduction targets specific causes, expansion engine leverages usage-based pricing, and gross margin path is quantified"
    weight: 0.35
    description: "Credible transformation plan"
  - type: llm_judge
    criteria: "First 90 days is pragmatic — stabilization addresses critical infrastructure, Stripe renegotiation captures immediate savings, quick wins deliver visible results, pricing experiments are controlled, and first 3 hires are the right roles"
    weight: 0.35
    description: "Pragmatic first 90 days"
  - type: llm_judge
    criteria: "Revenue operating system is sustainable — metrics framework enables data-driven decisions, pricing governance prevents errors, lifecycle optimization is systematic, continuous improvement is built-in, and the system scales to $100M"
    weight: 0.30
    description: "Sustainable revenue operating system"
