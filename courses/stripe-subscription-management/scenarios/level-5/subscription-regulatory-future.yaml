meta:
  id: subscription-regulatory-future
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Navigate the future of subscription regulation — advise on emerging consumer protection laws, dark pattern bans, and subscription transparency requirements"
  tags: [stripe, subscription, regulation, consumer-protection, dark-patterns, transparency, master]

state: {}

trigger: |
  You're a regulatory strategy advisor to a coalition of 25 SaaS
  companies that collectively manage 5 million consumer and business
  subscriptions. New regulations are reshaping subscription billing
  practices globally, and the coalition needs a unified response.

  Regulatory developments:
  1. FTC "Click-to-Cancel" Rule (US, effective 2025):
     - Cancellation must be as easy as sign-up
     - No "save" calls required before cancellation
     - Pre-cancellation disclosures must be clear
     - Penalties: Up to $50,000+ per violation

  2. California Auto-Renewal Law (updated 2025):
     - Clear and conspicuous disclosure before purchase
     - Affirmative consent to auto-renewal terms
     - Easy online cancellation mechanism
     - Acknowledgment of auto-renewal terms before charge

  3. EU Digital Services Act / Consumer Rights Directive:
     - Dark pattern prohibition in subscription flows
     - "Confirm shaming" banned (e.g., "No, I don't want to save
       money")
     - Subscription status must be prominently displayed
     - One-click unsubscribe required for email communications

  4. UK Subscription Traps legislation (proposed 2026):
     - Mandatory cooling-off period for all subscriptions
     - Pre-renewal reminders required
     - Free trial auto-conversion requires explicit opt-in
     - Right to receive a proportionate refund on cancellation

  5. Australia Competition and Consumer Act amendments:
     - Unfair contract term protections extended to subscriptions
     - Drip pricing banned (all fees disclosed upfront)
     - Automatic renewal must be clearly indicated

  Coalition members' concerns:
  - "Our cancellation flow has a 22% save rate. FTC says we can't
    require the save step. We'll lose $15M in retained revenue."
  - "Our trial conversion is 35%. If UK requires explicit opt-in
    for conversion, it could drop to 15%."
  - "Our pricing page uses 'Most Popular' badges and 'Limited Time
    Offer' language. Is that a dark pattern under the EU rules?"

  Tasks:
  1. Write the regulatory compliance assessment. For each of the 5
     regulatory developments: the specific requirements, the impact
     on current subscription practices (with revenue quantification),
     the compliance deadline and penalty structure, and the
     compliant alternatives that minimize revenue impact.

  2. Design the coalition's model subscription practices. Include:
     the "gold standard" cancellation flow (compliant with all 5
     jurisdictions simultaneously), the transparent trial experience
     (explicit opt-in that still achieves reasonable conversion), the
     compliant retention strategy (how to save customers without
     dark patterns or mandatory save steps), and the compliant
     pricing page (what persuasion tactics are acceptable vs. dark
     patterns).

  3. Write the industry position paper. Include: the argument for
     balanced regulation (protecting consumers without killing
     subscription innovation), the proposed industry self-regulation
     framework (voluntary standards that preempt heavier regulation),
     the economic impact analysis (how overly restrictive regulation
     could harm consumers by reducing subscription availability),
     and the specific regulatory language recommendations for
     pending legislation (UK and EU).

assertions:
  - type: llm_judge
    criteria: "Compliance assessment is thorough — all 5 regulations are analyzed with specific requirements, revenue impact is quantified, deadlines and penalties are stated, and compliant alternatives minimize revenue loss"
    weight: 0.35
    description: "Thorough compliance assessment"
  - type: llm_judge
    criteria: "Model practices are compliant globally — cancellation flow meets all jurisdictions, trial experience uses explicit opt-in, retention strategy avoids dark patterns, and pricing page distinguishes persuasion from manipulation"
    weight: 0.35
    description: "Globally compliant model practices"
  - type: llm_judge
    criteria: "Position paper is balanced and credible — argues for consumer protection AND subscription viability, self-regulation framework is concrete, economic analysis is data-supported, and legislative recommendations are specific and reasonable"
    weight: 0.30
    description: "Balanced and credible position paper"
