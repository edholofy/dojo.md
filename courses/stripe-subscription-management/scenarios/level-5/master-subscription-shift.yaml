meta:
  id: master-subscription-shift
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Master subscription shift — handle a billing platform outage during month-end, an FTC investigation, and a board demand for immediate NRR improvement simultaneously"
  tags: [stripe, subscription, shift-simulation, platform-outage, FTC, board-crisis, master]

state: {}

trigger: |
  You're the CRO of a SaaS company ($120M ARR). Three existential
  subscription crises converge on the same day.

  Crisis 1 — Month-end billing platform failure:
  It's October 31st. Your billing platform has been processing
  monthly renewals all day, but at 6 PM a critical failure occurs:
  the subscription renewal job gets stuck in an infinite loop,
  creating 47,000 duplicate invoices. Of these:
  - 12,000 duplicate invoices were sent to customers by email
  - 3,200 duplicate charges were processed (customers were charged
    twice totaling $890,000 in overcharges)
  - The remaining 31,800 duplicates are in "draft" state and haven't
    been charged yet

  Your operations team is panicking. It's a Friday evening. Half
  the engineering team is at a company offsite. Customer support is
  getting flooded with calls.

  Crisis 2 — FTC investigation:
  You received a formal notice from the FTC this morning regarding
  your subscription practices. The investigation alleges:
  - Your free trial converts to paid without "clear and conspicuous"
    disclosure of the conversion date and amount
  - Your cancellation process requires 4 clicks and navigating
    through 2 "save" offers, which may violate the click-to-cancel
    rule
  - 847 consumer complaints have been filed in the past 18 months
  - The FTC is requesting: all cancellation flow screenshots, trial
    conversion disclosures, cancellation attempt data (how many
    start vs. complete), and all retention offer documentation

  Potential penalty: $50,000+ per violation. With 847 complaints
  and systematic practices, the exposure could be $40M+.

  Crisis 3 — Board ultimatum on NRR:
  The lead board member (largest investor) called an emergency board
  session for Monday. His message: "NRR has been below 110% for 3
  consecutive quarters. At $120M ARR, our public SaaS peers average
  125% NRR. This gap is costing us 2-3x in valuation multiple.
  I want a concrete plan by Monday or we discuss leadership changes."

  Current NRR: 108% (expansion 14%, contraction 2%, churn 4%)
  Board target: 120% within 4 quarters

  Tasks:
  1. Triage and address Crisis 1 immediately. Write: the incident
     response (first 2 hours — stop the loop, void draft invoices,
     identify all duplicate charges), the customer remediation plan
     (auto-refund the $890K in overcharges, customer communication,
     support surge plan), the technical postmortem (root cause,
     immediate fix, prevention), and the regulatory impact (do you
     need to report this to any authority?).

  2. Respond to Crisis 2. Write: the legal response strategy (hire
     FTC-specialized counsel, prepare document production), the
     immediate compliance fixes (redesign cancellation to 2-click,
     fix trial disclosures), the data production (what to provide
     vs. what to challenge), and the settlement analysis (what's
     the realistic outcome — consent decree, fine, required changes).

  3. Prepare for the board meeting (Crisis 3). Write: the NRR
     improvement plan (108% → 120% in 4 quarters — specific
     initiatives: pricing restructure, expansion triggers, churn
     prevention, dunning optimization), the honest assessment
     (can you reach 120%? what's realistic?), the investment ask
     ($X budget for billing/growth infrastructure), and the board
     presentation that acknowledges the gap while showing a credible
     path forward.

assertions:
  - type: llm_judge
    criteria: "Billing crisis response is methodical — incident response stops the damage, customer remediation auto-refunds overcharges with proactive communication, postmortem identifies root cause, and regulatory reporting needs are assessed"
    weight: 0.35
    description: "Methodical billing crisis response"
  - type: llm_judge
    criteria: "FTC response is legally sound — counsel engagement is immediate, compliance fixes address the specific allegations, document production is strategic, and settlement analysis is realistic about the range of outcomes"
    weight: 0.35
    description: "Legally sound FTC response"
  - type: llm_judge
    criteria: "Board presentation is credible — NRR plan has specific initiatives with quantified impact, honest assessment distinguishes achievable from aspirational, investment ask is justified, and the plan balances ambition with realism"
    weight: 0.30
    description: "Credible board presentation"
