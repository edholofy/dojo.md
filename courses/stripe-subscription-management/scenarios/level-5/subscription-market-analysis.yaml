meta:
  id: subscription-market-analysis
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Analyze the subscription economy — write a comprehensive industry report on subscription billing trends, technologies, and the future of recurring revenue"
  tags: [stripe, subscription, market-analysis, industry-report, trends, thought-leadership, master]

state: {}

trigger: |
  You're a principal analyst at a technology research firm. A
  consortium of 15 SaaS companies has funded a $400K research study:
  "The State of Subscription Billing Infrastructure in 2027."

  Research scope:
  - 15 participating companies (anonymized): $20M-$5B ARR
  - 200 survey responses from billing/finance leaders
  - 30 in-depth interviews with VPs of Billing/Finance
  - Market data on billing platform adoption, costs, and capabilities

  Preliminary findings:
  1. Platform adoption: Stripe Billing (45%), Zuora (20%), Chargebee
     (12%), Recurly (8%), in-house (10%), other (5%)
  2. Billing complexity is growing: Average company supports 4.2
     pricing models (up from 1.8 in 2022)
  3. Revenue leakage: Median company loses 3.7% of revenue to billing
     errors, failed payments, and pricing configuration mistakes
  4. Time to launch new pricing: Median 6 weeks (range: 2 days to
     6 months)
  5. Billing team size: Median 5 engineers (range: 0.5 to 45)
  6. Top challenge: Revenue recognition (cited by 78% of respondents)
  7. AI adoption in billing: 18% use ML for dunning, 8% for pricing,
     5% for fraud
  8. Multi-processor strategy: Only 15% use more than one processor
  9. Biggest regret: "We should have invested in billing infrastructure
     earlier" (64% of respondents)

  Tasks:
  1. Write the benchmark study. Include: the methodology, findings
     across 8 dimensions (platform choice, pricing complexity,
     revenue leakage, agility, team investment, compliance, AI
     adoption, resilience), the maturity model (5 levels from
     "ad-hoc billing" to "billing excellence"), and actionable
     recommendations by company size/stage.

  2. Create the individual company scorecard format. Include: the
     radar chart dimensions (8 axes), the peer comparison methodology
     (showing each company vs. size cohort and top quartile), the
     improvement priority matrix (high impact + low effort first),
     and the estimated ROI of closing each gap.

  3. Write the public executive summary "The State of Subscription
     Billing 2027." Include: 5 key industry trends, 3 predictions
     for 2028-2030, the billing maturity curve, and the call to
     action for CTOs and CFOs. This will be published as a
     thought-leadership piece.

assertions:
  - type: llm_judge
    criteria: "Benchmark study is analytically rigorous — methodology is sound, 8 dimensions cover key billing aspects, maturity model differentiates levels meaningfully, and recommendations are appropriate for different company sizes"
    weight: 0.35
    description: "Rigorous benchmark study"
  - type: llm_judge
    criteria: "Scorecard format is individually useful — radar chart axes are meaningful, peer comparison enables self-assessment, priority matrix helps resource allocation, and ROI estimates justify investment"
    weight: 0.35
    description: "Useful scorecard format"
  - type: llm_judge
    criteria: "Executive summary is publishable — trends are data-supported, predictions are bold but defensible, maturity curve adds context, and the call to action gives leaders concrete next steps"
    weight: 0.30
    description: "Publishable executive summary"
