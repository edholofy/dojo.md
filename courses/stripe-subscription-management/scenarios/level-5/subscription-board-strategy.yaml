meta:
  id: subscription-board-strategy
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Present subscription strategy to the board — prepare a board-level presentation on subscription performance, investment needs, and strategic direction"
  tags: [stripe, subscription, board, strategy, presentation, executive, master]

state: {}

trigger: |
  You're the CFO of a SaaS company ($150M ARR, pre-IPO). The board
  has requested a comprehensive review of the subscription business
  at the next quarterly meeting. Three board members have specific
  concerns:

  Board Member 1 (former Salesforce CFO):
  "Your net revenue retention is 108%. Best-in-class SaaS companies
  are at 130%+. Every point below 130% reduces your IPO multiple by
  0.5x. At $150M ARR, that's $75M in enterprise value per NRR point.
  What's the plan to get to 120%+ before the IPO?"

  Board Member 2 (former Stripe executive):
  "You're paying $4.35M annually to Stripe (2.9% effective rate).
  At your volume, you should be at 2.2-2.5%. You're leaving $600K-
  $1M on the table. Have you explored Stripe's volume discounts or
  alternative processors?"

  Board Member 3 (venture investor):
  "Your gross margin is 72%. The SaaS benchmark for IPO is 75-80%.
  Processing costs are a significant drag. What's the path to 78%+
  gross margin?"

  Supporting data:
  - ARR: $150M (growing 35% YoY)
  - Subscribers: 42,000
  - NRR: 108% (expansion: 15%, contraction: 3%, churn: 4%)
  - GRR: 93%
  - ARPU: $298/month
  - Processing costs: $4.35M (2.9% of $150M)
  - Gross margin: 72%
  - LTV:CAC: 3.2:1
  - Payback period: 14 months

  Tasks:
  1. Prepare the NRR improvement plan for Board Member 1. Include:
     the NRR bridge from 108% to 120% (which levers move each point:
     reduce churn, increase expansion, reduce contraction), the
     specific initiatives with expected impact (pricing restructure,
     usage-based upsells, churn prevention system), the investment
     required ($X in billing/growth engineering), and the timeline
     to reach 120% NRR.

  2. Prepare the processing cost analysis for Board Member 2.
     Include: the Stripe renegotiation strategy (volume discount
     request, competitive bids from Adyen/Checkout.com), the ACH
     migration opportunity (move 30% of US customers to ACH at
     0.8% vs. 2.9%), the annual billing incentive (reduce
     transactions by 10x for annual customers), and the total
     savings model ($600K-$1M annually).

  3. Write the 8-10 slide board presentation. Include: the
     subscription health dashboard (all key metrics with trends),
     the NRR improvement roadmap (Board Member 1), the gross margin
     improvement plan (Board Member 3 — processing costs + other
     COGS optimization), the competitive positioning (how your
     metrics compare to public SaaS benchmarks), and the 3-year
     subscription strategy that ties everything to IPO readiness.

assertions:
  - type: llm_judge
    criteria: "NRR plan is data-driven — NRR bridge shows specific lever impacts, initiatives are quantified, investment is justified, and the path from 108% to 120% is credible with a realistic timeline"
    weight: 0.35
    description: "Data-driven NRR plan"
  - type: llm_judge
    criteria: "Processing cost analysis is actionable — Stripe renegotiation uses competitive leverage, ACH migration opportunity is quantified, annual billing savings are calculated, and total savings model shows $600K-$1M potential"
    weight: 0.35
    description: "Actionable cost analysis"
  - type: llm_judge
    criteria: "Board presentation is IPO-grade — metrics dashboard is comprehensive, NRR and margin plans address board concerns directly, competitive benchmarking contextualizes performance, and 3-year strategy connects to IPO readiness"
    weight: 0.30
    description: "IPO-grade board presentation"
