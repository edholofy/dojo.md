meta:
  id: subscription-fintech-product
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Build a subscription billing fintech product — design and architect a billing platform product that competes in the subscription management market"
  tags: [stripe, subscription, fintech, product, billing-platform, startup, master]

state: {}

trigger: |
  You're the co-founder and CTO of a new fintech startup building
  "SubEngine" — a subscription management platform for mid-market
  SaaS companies ($5M-$100M ARR). You believe there's a gap between
  Stripe Billing (too basic for complex needs) and Zuora (too
  expensive and complex for mid-market).

  Your thesis:
  "Mid-market SaaS companies need: flexible pricing models, automated
  revenue recognition, dunning optimization, and self-serve analytics
  — without the $500K+ implementation cost of Zuora or the
  limitations of raw Stripe Billing. We'll build on top of Stripe
  as the payment processor and add the intelligence layer."

  Seed funding: $4M
  Team: 8 engineers, 2 product, 1 designer
  Timeline: MVP in 6 months, GA in 12 months

  Target customer profile:
  - SaaS company, $5M-$100M ARR
  - Using Stripe for payments
  - 1,000-50,000 subscribers
  - Pain points: pricing flexibility, revenue recognition, dunning,
    analytics
  - Currently using: Stripe Billing + spreadsheets + custom code

  Competitors:
  - Stripe Billing: Free with Stripe, but limited pricing models,
    no rev rec, basic dunning
  - Zuora: Full-featured but $200K+ implementation, enterprise-
    focused
  - Chargebee: Good for SMB, less capable for complex mid-market
  - Recurly: Strong dunning, weaker on pricing flexibility

  Tasks:
  1. Design the SubEngine product. Include: the product architecture
     (built on Stripe Billing API as the payment layer, SubEngine
     as the orchestration and intelligence layer), the core features
     for MVP (pricing engine, dunning optimizer, revenue dashboard),
     the differentiation from each competitor, and the API design
     that wraps Stripe while adding value.

  2. Write the technical architecture. Include: the system design
     (how SubEngine sits between the customer's application and
     Stripe), the data model (extending Stripe's subscription model
     with custom pricing logic, rev rec, and analytics), the
     real-time event processing (Stripe webhooks → SubEngine →
     customer's webhooks), and the multi-tenant architecture for
     serving hundreds of SaaS companies.

  3. Write the go-to-market plan. Include: the pricing model for
     SubEngine itself (usage-based, flat SaaS, or percentage of
     GMV), the first 10 customers acquisition strategy, the
     developer marketing plan (documentation, SDKs, open-source
     components), and the 18-month product roadmap from MVP to
     market leadership.

assertions:
  - type: llm_judge
    criteria: "Product design fills a real gap — architecture leverages Stripe as payment layer while adding genuine value, MVP features target the biggest mid-market pain points, differentiation from each competitor is specific and defensible"
    weight: 0.35
    description: "Gap-filling product design"
  - type: llm_judge
    criteria: "Technical architecture is sound — Stripe integration is well-designed, data model extends Stripe appropriately, event processing handles real-time flow, and multi-tenant architecture supports hundreds of customers"
    weight: 0.35
    description: "Sound technical architecture"
  - type: llm_judge
    criteria: "GTM plan is realistic — pricing model is justified, first 10 customers strategy is specific, developer marketing leverages the right channels, and product roadmap has realistic milestones for 8 engineers"
    weight: 0.30
    description: "Realistic GTM plan"
