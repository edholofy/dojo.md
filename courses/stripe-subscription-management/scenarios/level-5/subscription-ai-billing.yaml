meta:
  id: subscription-ai-billing
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Design AI-native billing — architect a subscription system for AI/ML products with token-based pricing, compute costs, and dynamic usage patterns"
  tags: [stripe, subscription, AI, token-pricing, compute, usage-based, master]

state: {}

trigger: |
  You're the Head of Billing at an AI startup ($30M ARR, growing
  150% YoY) that sells AI/ML APIs. Your billing is uniquely
  challenging because AI usage patterns are fundamentally different
  from traditional SaaS:

  Products:
  - Language API: Priced per 1,000 tokens ($0.03 input, $0.06 output)
  - Image generation: Priced per image ($0.02 for standard, $0.08
    for HD)
  - Fine-tuning: Priced per training hour ($3.00/hour for GPU time)
  - Embeddings: Priced per 1,000 tokens ($0.0001)

  Unique challenges:
  1. Unpredictable usage: A customer might use $5 on Monday and
     $5,000 on Tuesday (they launched a product using your API).
     Traditional monthly billing leads to massive receivables risk.
  2. Multi-dimensional metering: Unlike SaaS (count seats or API
     calls), you meter tokens, images, and compute hours — each
     with different unit costs.
  3. Cost pass-through: Your margin depends on GPU costs, which
     fluctuate. When GPU prices spike, your fixed pricing can go
     negative-margin.
  4. Prepaid credits vs. pay-as-you-go: Enterprise customers want
     committed spend with credits. Developers want pay-as-you-go
     with spending limits.
  5. Rate limiting and abuse: Without billing controls, a single
     compromised API key can generate $100K+ in charges in hours.

  Current billing issues:
  - 12% of invoices are disputed ("I didn't expect this charge")
  - $2.3M in outstanding receivables (customers who exceeded their
    expected spend and are now negotiating)
  - 3 incidents of API key compromise resulting in $180K in
    unauthorized usage
  - No real-time cost visibility for customers

  Tasks:
  1. Design the AI-native billing system. Include: the multi-
     dimensional metering pipeline (tokens + images + compute in
     real-time), the pricing engine (handling 4 different unit costs
     with volume discounts), the prepaid credit system (enterprise
     customers buy $50K-$500K in credits, usage draws down from
     balance), the pay-as-you-go system (real-time billing with
     spending limits and auto-pause), and the Stripe integration
     (mapping AI usage to Stripe's metered billing model).

  2. Solve the cost and risk challenges. Include: the real-time
     usage dashboard (customers see spend as it happens, with
     projected monthly cost), the spending alerts and auto-pause
     (configurable thresholds that stop API access before
     overcharges), the abuse detection system (identifying
     compromised keys by usage pattern anomalies), the GPU cost
     pass-through mechanism (dynamic pricing that adjusts with
     compute costs), and the dispute prevention strategy.

  3. Write the pricing strategy memo. Include: the comparison of
     billing models for AI (token-based vs. tier-based vs. outcome-
     based), the margin analysis (how GPU costs affect unit
     economics at different usage levels), the competitive pricing
     analysis (OpenAI, Anthropic, Google pricing structures), and
     the recommendation for how to price AI products to balance
     growth, margin, and customer predictability.

assertions:
  - type: llm_judge
    criteria: "Billing system handles AI complexity — multi-dimensional metering works in real-time, pricing engine supports 4 unit types, prepaid credits and pay-as-you-go coexist, spending limits prevent overcharges, and Stripe integration is technically sound"
    weight: 0.35
    description: "AI-complexity billing system"
  - type: llm_judge
    criteria: "Risk challenges are solved — real-time dashboard provides cost visibility, spending alerts prevent surprise bills, abuse detection catches compromised keys, GPU cost pass-through is designed, and disputes are reduced"
    weight: 0.35
    description: "Solved billing risk challenges"
  - type: llm_judge
    criteria: "Pricing strategy is well-analyzed — billing model comparison evaluates trade-offs, margin analysis uses real GPU economics, competitive analysis is current, and recommendation balances growth/margin/predictability"
    weight: 0.30
    description: "Well-analyzed pricing strategy"
