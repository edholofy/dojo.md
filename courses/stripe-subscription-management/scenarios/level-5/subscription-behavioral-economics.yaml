meta:
  id: subscription-behavioral-economics
  level: 5
  course: stripe-subscription-management
  type: output
  description: "Apply behavioral economics to subscriptions — design pricing, packaging, and retention strategies based on cognitive biases and decision science"
  tags: [stripe, subscription, behavioral-economics, pricing-psychology, retention, decision-science, master]

state: {}

trigger: |
  You're a pricing strategist hired by a SaaS company ($40M ARR)
  to redesign their subscription model using behavioral economics
  principles. The CEO says: "Our competitors have identical features
  at similar prices. The only way to win is by understanding how
  customers make buying decisions."

  Current state:
  - 3 plans: Basic ($29), Pro ($79), Enterprise ($199)
  - 60% of customers on Basic (low ARPU)
  - 25% on Pro
  - 15% on Enterprise
  - Monthly voluntary churn: 3.8%
  - Trial-to-paid conversion: 22%

  Target:
  - Shift distribution: 40% Basic, 35% Pro, 25% Enterprise
  - Reduce churn to 2.5%
  - Increase trial conversion to 35%
  - Increase ARPU by 40%

  Behavioral economics principles to apply:
  1. Anchoring: How the highest price affects perception of others
  2. Decoy effect: A "dominated alternative" that makes the target
     option look better
  3. Loss aversion: People feel losses 2x more than equivalent gains
  4. Endowment effect: People value what they already have more
  5. Status quo bias: The default option is chosen disproportionately
  6. Hyperbolic discounting: People prefer immediate rewards
  7. Social proof: "Most popular" labels influence choice
  8. Sunk cost fallacy: Past investment affects future decisions

  Tasks:
  1. Redesign the pricing page using behavioral economics. Include:
     the new plan structure (how to apply decoy effect and anchoring
     to shift customers toward Pro), the annual vs. monthly framing
     (using hyperbolic discounting — "save $190/year" vs. "2 months
     free"), the default plan selection (status quo bias — which
     plan is pre-selected and why), and the social proof elements
     ("Most popular" badge placement, customer count, logos).

  2. Redesign the trial experience using behavioral principles.
     Include: the endowment effect strategy (give full Pro features
     during trial so downgrading feels like a loss), the progress
     indicators (sunk cost — showing setup completion percentage),
     the trial-end framing (loss aversion — "You'll lose access to
     X features" vs. "Keep your access to X features"), and the
     default-to-paid mechanism (opt-out vs. opt-in with ethics
     discussion).

  3. Redesign the cancellation and retention flow. Include: the
     sunk cost presentation ("You've created 47 projects and invited
     12 team members"), the loss framing ("Your team will lose access
     to..."), the downgrade-before-cancel option (anchoring the
     cancellation to a lower price point), the pause option
     (reducing immediate loss while preserving revenue potential),
     and the ethical guardrails (when behavioral nudges cross the
     line into dark patterns — define the boundary).

assertions:
  - type: llm_judge
    criteria: "Pricing redesign applies behavioral economics correctly — anchoring and decoy effect would plausibly shift distribution toward Pro, annual framing uses discount psychology, default selection leverages status quo bias, and social proof is strategically placed"
    weight: 0.35
    description: "Correct behavioral pricing design"
  - type: llm_judge
    criteria: "Trial redesign increases conversion — endowment effect gives full features to create ownership feeling, progress indicators create sunk cost, trial-end framing emphasizes loss, and default-to-paid ethics are discussed honestly"
    weight: 0.35
    description: "Conversion-increasing trial design"
  - type: llm_judge
    criteria: "Retention flow is effective but ethical — sunk cost and loss framing are used to save customers, downgrade and pause options provide alternatives, and ethical guardrails clearly distinguish persuasion from dark patterns"
    weight: 0.30
    description: "Effective and ethical retention flow"
