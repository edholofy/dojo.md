meta:
  id: cohort-program-roi
  level: 5
  course: cohort-analysis
  type: output
  description: "Measure cohort analysis program ROI — quantify the business value of investing in cohort analytics capabilities, infrastructure, and organizational literacy"
  tags: [program-ROI, analytics-value, business-case, investment-return, master]

state: {}

trigger: |
  The CFO says: "The data team wants $500K for a cohort analytics
  program — infrastructure, tools, headcount. But how do I know
  this will actually generate returns? Can you build a business case
  that quantifies the ROI of investing in cohort analysis capabilities?"

  Task: Build a comprehensive ROI business case for investing in
  cohort analysis capabilities, quantifying both direct and indirect
  returns.

assertions:
  - type: llm_judge
    criteria: "Response covers direct ROI quantification — direct: 'Direct ROI from cohort analysis investment: the $500K investment breaks down into: infrastructure ($150K): data warehouse upgrades, OLAP engine, dashboarding tools. Headcount ($250K): 2 analytics engineers for 1 year. Tools and training ($100K): analytics platform licenses, organizational training. Direct return category 1 — Improved retention from cohort insights: before cohort analysis: retention tracked as a blended monthly average. No visibility into segment-level trends. Improvement efforts were untargeted (spray and pray). After cohort analysis: identified that paid social users had 18% M1 retention vs 45% organic. Reduced paid social spend by 40%, reallocated to organic channels. Result: overall M1 retention improved 5pp (from 35% to 40%). Revenue impact: 5pp × 10,000 monthly signups × $130 12-month LTV × 12 months = $780K annual revenue improvement. After cohort analysis: identified activation metric (completing first project). Redesigned onboarding around this behavior. Result: activation rate improved from 30% to 42% (+12pp). Revenue impact: 12% more users activating × 3x retention uplift for activated users × average LTV = $420K annual. Direct return category 2 — Marketing efficiency: identified that weekly LTV prediction scores could evaluate channel quality within 7 days. Reallocated $200K annual marketing budget from low-LTV channels to high-LTV channels. Result: same acquisition volume with 25% higher cohort LTV. Revenue impact: $200K × 1.25 = $50K incremental annual return from budget reallocation. Direct return category 3 — Pricing optimization: cohort data revealed usage intensity segments and willingness to pay. Launched tiered pricing capturing 2x ARPU from power users. Result: 15% blended ARPU increase by month 12. Revenue impact: 15% × $2.4M current ARR = $360K annual. Total direct returns: $780K + $420K + $50K + $360K = $1.61M annual. ROI: $1.61M return / $500K investment = 3.2:1 in year 1'"
    weight: 0.35
    description: "Direct"
  - type: llm_judge
    criteria: "Response covers indirect and strategic ROI — indirect: 'Indirect and strategic ROI: Indirect return 1 — Forecast accuracy improvement: before: top-down revenue forecast with 25% average error. After: cohort-based bottom-up forecast with 8% average error. Value: better forecasting enables more confident resource allocation. The CFO can plan hiring, infrastructure, and marketing spend with less buffer. Estimated value: 10% reduction in over-provisioned budget = $100K savings annually. Indirect return 2 — Faster problem detection: before: retention problems discovered 4-8 weeks after they start (when revenue impact becomes visible). After: automated cohort monitoring detects issues within 24-48 hours. Value: a broken deploy affecting 10,000 users, detected in 48 hours vs 6 weeks. Users impacted: 2,000 (48h) vs 50,000 (6 weeks). Revenue saved per incident: $40K. With approximately 4 incidents per year: $160K annual savings. Indirect return 3 — Investor confidence: cohort data quality directly impacts fundraising. Companies with strong cohort reporting receive 15-25% higher valuations (investor survey data). On a $50M valuation: 15% premium = $7.5M valuation uplift. This does not directly generate revenue but creates enormous enterprise value. Indirect return 4 — Organizational decision quality: teams making decisions based on cohort data make fewer mistakes. Marketing stops investing in channels with poor cohort LTV (avoids 2-3 bad campaigns per year worth $50K each). Product prioritizes features with the highest cohort retention impact (avoids 1-2 low-impact features per year worth $100K engineering time each). Estimated value: $250K annually from better decision-making. Total indirect returns: $100K + $160K + $250K = $510K annual (excluding valuation uplift). Combined ROI: direct ($1.61M) + indirect ($510K) = $2.12M annual return on $500K investment. ROI: 4.2:1 in year 1. And the investment compounds: year 2 returns are higher because the infrastructure is built and the organization is cohort-literate'"
    weight: 0.35
    description: "Indirect"
  - type: llm_judge
    criteria: "Response covers risk analysis and implementation timeline — risk: 'Risk analysis and implementation timeline: risks to the ROI case: Risk 1 — Returns take longer than expected: cohort-based improvements require 3-6 months to measure. The retention improvement from onboarding redesign will not show up in revenue for 6+ months. Mitigation: use leading indicators (activation rate, week-1 engagement) to track progress before revenue impact appears. Set milestones at 3, 6, and 12 months. Risk 2 — Organizational adoption is slow: teams may resist changing their metrics and workflows. Cohort data literacy takes time to build. Mitigation: start with quick wins (segment marketing by channel, stop worst-performing channels). Executive sponsorship ensures adoption is not optional. Risk 3 — Data quality issues delay the program: existing data may have gaps, inconsistencies, or tracking issues. Mitigation: first 2 months focused on data quality and pipeline reliability. Do not promise insights from bad data. Risk 4 — Over-engineering the solution: the team may build a complex system before demonstrating value. Mitigation: phase the investment (see timeline below). Implementation timeline: Month 1-2 (foundation, $100K): standardize cohort definitions. Build basic retention triangle from existing data. Deliver first insights to the exec team. Quick win: identify and cut the lowest-LTV acquisition channel. Month 3-4 (infrastructure, $150K): deploy OLAP engine for fast queries. Build automated cohort pipeline with validation. Launch self-service cohort dashboard. Quick win: launch the LTV prediction model for marketing. Month 5-8 (optimization, $150K): build anomaly detection and alerting. Implement behavioral cohort analysis. Support pricing optimization project. Quick win: identify the activation metric and redesign onboarding. Month 9-12 (scale, $100K): organizational training program. Board-level cohort reporting. Advanced capabilities (forecasting, competitive benchmarking). Milestone reporting to the CFO: month 3: first measurable improvement (marketing reallocation). Month 6: retention improvement measurable in cohort data. Month 9: revenue impact visible in financial results. Month 12: full program ROI assessment. For the CFO: the $500K investment projects a 4.2:1 ROI in year 1. The payback period is approximately 4 months (from marketing efficiency gains alone). The strategic value (investor confidence, decision quality, competitive advantage) compounds over years. Recommend: approve the investment with quarterly milestone reviews'"
    weight: 0.30
    description: "Risk"
