meta:
  id: organizational-transformation
  level: 5
  course: cohort-analysis
  type: output
  description: "Transform organizations with cohort thinking — embed cohort analysis into decision-making culture, build cohort literacy across teams, and create a cohort-driven operating model"
  tags: [organizational-transformation, culture, cohort-literacy, operating-model, master]

state: {}

trigger: |
  The CEO says: "Only our data team uses cohort analysis. Everyone
  else looks at vanity metrics — total users, total revenue, monthly
  averages. I want EVERY team thinking in cohorts. How do I transform
  the organization so cohort analysis is embedded in how we make
  decisions?"

  Task: Design an organizational transformation plan to embed cohort
  thinking into every team's decision-making process.

assertions:
  - type: llm_judge
    criteria: "Response covers the cohort literacy program — literacy: 'Building organizational cohort literacy: the problem: most teams use aggregate metrics that hide critical information. Marketing reports total signups (not quality by channel cohort). Product reports total DAU (not retention by feature cohort). Sales reports total revenue (not LTV by customer cohort). Finance forecasts using averages (not cohort-based bottom-up projections). Phase 1 — Executive cohort education (weeks 1-2): half-day workshop for C-suite and VPs. Content: why averages lie (Simpson's paradox demonstration with company data). How to read a retention triangle (using actual company data). The three cohort questions every executive should ask: how are newer cohorts performing vs older cohorts? What is driving changes — retention, acquisition quality, or mix shift? Are improvements from product changes showing up in cohort data? Deliverable: executive cohort dashboard with 5 key metrics. Success metric: every exec meeting references cohort data at least once. Phase 2 — Team-specific cohort training (weeks 3-6): marketing team: cohort-based channel evaluation — stop optimizing for signups, start optimizing for cohort LTV by channel. Weekly metric: predicted 6-month LTV of each week's acquisition cohort by channel. Product team: feature adoption cohort analysis — measure every feature's impact on retention. Weekly metric: activation rate and retention gap for top 5 features. Finance team: cohort-based forecasting — replace top-down models with bottom-up cohort projections. Monthly metric: cohort-based revenue forecast vs actuals (target: under 10% MAPE). Customer success: cohort health monitoring — identify at-risk customers using cohort engagement scores. Weekly metric: number of customers in the declining-engagement cohort segment. Sales team: cohort-based ICP refinement — identify which customer profiles have the best cohort economics. Quarterly metric: LTV:CAC by customer segment and acquisition source'"
    weight: 0.35
    description: "Literacy"
  - type: llm_judge
    criteria: "Response covers the cohort-driven operating model — operating: 'The cohort-driven operating model: embedding cohort analysis into business operations: Operating rhythm change 1 — Weekly business review: old format: total signups this week, total revenue this week, total DAU. New format: this week's signup cohort quality score (predicted LTV by channel). Retention trend: are recent cohorts improving? (vertical column analysis). Feature adoption metrics: activation rates for the top 3 retention-driving features. LTV:CAC ratio by acquisition channel. Any cohort anomalies detected by the monitoring system. Operating rhythm change 2 — Monthly business review: old: month-over-month revenue growth, monthly churn rate. New: cohort retention triangle update (new row added). NRR decomposition (churn, downgrades, expansion). LTV projection update for active cohorts. Cohort-based revenue forecast vs actuals. Feature impact scorecard (features shipped this month and their cohort impact). Operating rhythm change 3 — Quarterly strategy review: old: quarterly revenue target vs actual, headcount plan. New: cohort economics trend (are unit economics improving or degrading?). Market-level cohort comparison (which markets have the best cohort data?). R&D investment ROI measured by cohort retention impact. Acquisition channel efficiency by cohort (is paid acquisition improving?). 3-year cohort-based financial model update. Decision framework — the cohort test: every significant business decision must answer: how will this affect cohort retention? (product changes, pricing). How will this affect cohort acquisition quality? (marketing, partnerships). How will this affect cohort economics? (pricing, packaging, R&D investment). If a proposed initiative cannot articulate its cohort impact, it needs more analysis before approval'"
    weight: 0.35
    description: "Operating"
  - type: llm_judge
    criteria: "Response covers change management and sustaining the transformation — change: 'Change management and sustaining cohort-driven culture: overcoming resistance: resistance 1 — Marketing says cohort LTV takes too long to measure: solution: implement first-week LTV prediction scores. Marketing gets a weekly quality score within 7 days of each campaign. This is fast enough for campaign optimization. Resistance 2 — Product says cohort analysis does not work for fast iteration: solution: use weekly cohorts (not monthly) and track day-7 and day-14 retention. This gives product teams signal within 2-3 weeks of a release. Supplement with hourly engagement proxies for deployment impact detection. Resistance 3 — Finance says cohort-based forecasting is too complex: solution: build the model once, automate updates. Finance reviews the output monthly, not the methodology. Provide both a single point forecast (for simplicity) and a range (for accuracy). Resistance 4 — Everyone says the data is unreliable: solution: this is why the data architecture and pipeline automation must come first. Standardize definitions, automate validation, build trust through consistency. Sustaining the transformation: 1. Cohort champion network: identify one cohort champion per team. They are responsible for cohort literacy within their team. Monthly champion sync to share best practices. 2. Cohort metrics in OKRs: every team has at least one cohort-based OKR. Marketing: month-1 retention of acquired cohorts above 45%. Product: feature activation rate for key behaviors above 35%. Finance: cohort-based forecast accuracy within 10% MAPE. 3. Cohort data in the boardroom: quarterly board deck includes the retention triangle and NRR decomposition. Board members learn to read cohort data and ask cohort-informed questions. 4. Annual cohort review: once per year, deep-dive review of all cohort trends over the past 12 months. Identify the biggest wins (cohort improvements driven by product/marketing changes). Identify the biggest misses (declining cohorts, unaddressed risks). Set cohort targets for the next year. For the CEO: the transformation takes 6-12 months but creates lasting competitive advantage. Companies that think in cohorts make better decisions because they see through the averages and understand the true dynamics of their business'"
    weight: 0.30
    description: "Change"
