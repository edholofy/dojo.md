meta:
  id: investor-grade-cohort-reporting
  level: 5
  course: cohort-analysis
  type: output
  description: "Build investor-grade cohort reporting — create board-ready cohort presentations, due diligence packages, and fundraising-quality retention narratives"
  tags: [investor-reporting, board-deck, fundraising, due-diligence, master]

state: {}

trigger: |
  The CFO says: "We're raising our Series B. The lead investor's
  analyst sent us a list of cohort data they want to see. They want
  monthly retention triangles, LTV curves by cohort, NRR decomposition,
  and cohort-based revenue projections. This needs to be bulletproof —
  any inconsistency and we lose credibility. Build me the complete
  investor cohort package."

  Task: Build a comprehensive investor-grade cohort reporting package
  for a Series B fundraise.

assertions:
  - type: llm_judge
    criteria: "Response covers the investor cohort data package — package: 'Investor-grade cohort reporting package: Section 1 — Retention triangle (the centerpiece): monthly retention triangle for the last 18-24 monthly cohorts. Format: percentage retention at months 0, 1, 2, 3, 6, 9, 12. Include both the raw percentages and a color-coded heatmap. Example (showing improving trend): Jan 2024 | 100% 35% 25% 20% 15% 13% 11%. Apr 2024 | 100% 38% 28% 23% 18% 15%. Jul 2024 | 100% 42% 32% 27% 22%. Oct 2024 | 100% 45% 35% 30%. Jan 2025 | 100% 48% 38%. Key narrative: month-1 retention improved from 35% to 48% over 12 months (+13pp). Month-3 retention improved from 20% to 30% (+10pp). The improvement is consistent (no one-time spike) and accelerating. Section 2 — LTV curves by cohort: plot cumulative revenue per user for each quarterly cohort. Q1 2024: M3 $42, M6 $78, M9 $105, M12 $130. Q2 2024: M3 $45, M6 $85, M9 $115. Q3 2024: M3 $50, M6 $92. Q4 2024: M3 $55. Narrative: each newer cohort generates more cumulative revenue at every comparable time point. Q4 2024 is generating 31% more revenue at M3 than Q1 2024 ($55 vs $42). This indicates improving unit economics from better retention AND higher ARPU. Projected 12-month LTV: Q4 2024 projected at $165 (vs Q1 2024 actual of $130). Method: analogous cohort ratio with BG/NBD model validation. Section 3 — NRR decomposition: quarterly NRR for the last 8 quarters: Q1 2024: 92%. Q2 2024: 96%. Q3 2024: 100%. Q4 2024: 105%. Q1 2025: 108%. Waterfall: starting MRR → −churn → −downgrades → +expansion → ending MRR. Narrative: crossed 100% NRR in Q3 2024 (negative net revenue churn). Expansion is driven by seat growth (+60%) and plan upgrades (+40%). Churn is declining as retention improves'"
    weight: 0.35
    description: "Package"
  - type: llm_judge
    criteria: "Response covers due diligence preparation and common investor questions — diligence: 'Due diligence preparation: anticipating investor questions: Question 1: why did retention improve? Answer: three specific product investments: new onboarding (launched March 2024, +5pp M1 retention — A/B test validated). Collaboration features (launched June 2024, +3pp M6 retention). Mobile app improvements (launched September 2024, +2pp M1 retention). Total: +10pp M1 retention from product investments. Question 2: is this sustainable or a one-time improvement? Answer: the improvement has been consistent for 12 consecutive cohorts. Each newer cohort retains better than the previous one. The improvement is driven by structural product changes, not one-time events. Forward view: there are additional optimization opportunities identified (reducing the week-1 drop from 55% to 45%, which models suggest would add +4pp M1 retention). Question 3: how reliable are your LTV projections? Answer: present the prediction accuracy table: LTV projected at M3 vs actual M12 for the last 8 cohorts. Historical MAPE: 15% at M3, 8% at M6, 4% at M9. Show confidence intervals: Q4 2024 projected M12 LTV: $165 (95% CI: $145-$185). Method: BG/NBD model cross-validated with analogous cohort ratios. Both methods agree within 5%. Question 4: what happens if you scale acquisition 3x? Answer: present cohort data by acquisition channel. Organic cohorts: M12 LTV $160, 3:1 LTV:CAC. Paid cohorts: M12 LTV $95, 1.8:1 LTV:CAC. If acquisition scales 3x through paid channels: blended LTV will decline (more paid users in the mix). But paid LTV:CAC remains above 1.5:1 (profitable). Scenario model: at 3x scale, blended LTV drops from $130 to $110 but total revenue triples. Question 5: what is your biggest retention risk? Answer: honest assessment: the week-1 activation gap (55% of new users never return after day 1). If a competitor improves their activation experience, our month-1 advantage could narrow. Mitigation: activation optimization is the top product priority for the next 2 quarters'"
    weight: 0.35
    description: "Diligence"
  - type: llm_judge
    criteria: "Response covers presentation format and data integrity — presentation: 'Presentation format and data integrity: slide deck structure (10 slides): Slide 1 — Headline: retention improved 40% in 12 months, driving improving unit economics. Slide 2 — Retention triangle heatmap: the visual centerpiece. Color-coded, annotated with product launch dates. Slide 3 — Retention curve overlay: 4 quarterly cohort curves showing consistent improvement. Industry benchmark line included. Slide 4 — LTV curves by cohort: cumulative revenue per user, each newer cohort above the previous one. Slide 5 — NRR waterfall: quarterly NRR decomposition showing churn declining and expansion growing. Slide 6 — LTV:CAC by channel: showing which channels are profitable and at what scale. Slide 7 — Cohort-based revenue forecast: bottom-up projection for the next 12 months. Three scenarios: base, optimistic, conservative. Slide 8 — Retention drivers: the three product improvements and their measured impact. Slide 9 — Forward plan: next 3 product investments and their expected retention impact. Slide 10 — Key metrics summary table. Data integrity practices: 1. Audit trail: every number in the deck can be traced back to a specific query on a specific dataset. 2. Reconciliation: cohort revenue numbers reconciled to financial statements within 2%. 3. Methodology documentation: a 5-page appendix explaining cohort definitions, LTV calculation methods, and model validation. 4. Independent validation: have a board member or advisor independently spot-check 3-4 key numbers. 5. Version control: all queries and data exports are versioned with timestamps. 6. Sensitivity disclosure: for projections, clearly state assumptions and show sensitivity to key inputs (retention improvement rate, acquisition volume, ARPU growth). Common investor red flags to avoid: inconsistent numbers across slides. Projections without confidence intervals. Cherry-picked cohorts (showing only the best ones). Missing or unexplained data gaps. Retention definitions that change between slides. For the CFO: this package gives the investor everything they need for due diligence. Every number is traceable, projections include uncertainty ranges, and the narrative is supported by consistent data'"
    weight: 0.30
    description: "Presentation"
