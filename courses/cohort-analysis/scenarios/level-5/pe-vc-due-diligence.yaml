meta:
  id: pe-vc-due-diligence
  level: 5
  course: cohort-analysis
  type: output
  description: "Conduct PE/VC due diligence using cohort analysis — evaluate acquisition targets, assess business quality, and identify hidden risks through cohort forensics"
  tags: [due-diligence, PE, VC, acquisition, forensics, master]

state: {}

trigger: |
  A PE firm's operating partner says: "We're evaluating a SaaS company
  for acquisition. Their deck shows 40% month-1 retention and NRR of
  115%. These numbers look great but I've been burned before. Can you
  do a cohort forensic analysis? I want to know if these numbers are
  real, sustainable, and what risks are hiding underneath."

  Task: Conduct a comprehensive cohort forensic analysis for PE/VC
  due diligence, identifying whether reported metrics are genuine
  and sustainable.

assertions:
  - type: llm_judge
    criteria: "Response covers cohort forensic methodology for due diligence — forensics: 'Cohort forensic analysis methodology: Step 1 — Verify reported metrics independently: do not trust the deck numbers. Request raw data access and rebuild from scratch. Requested data: user-level signup dates. User-level activity events (with timestamps). Revenue by user by month. Subscription changes (upgrades, downgrades, cancellations). Rebuild the retention triangle: if the rebuilt numbers match the deck within 2pp, the company is reporting accurately. If they diverge by more than 5pp, there is a definitional issue or deliberate misrepresentation. Common discrepancies found in due diligence: discrepancy 1 — Inflated retention from definition manipulation: the company defines active as received a push notification (not user-initiated action). This inflates retention by 10-15pp because push notifications are sent to all users. Fix: redefine active as user-initiated server-side action. Recalculated retention: 28% (not 40%). Discrepancy 2 — Survivorship bias in NRR: NRR of 115% is calculated only for customers who stayed for 12+ months. Customers who churned in months 1-11 are excluded from the denominator. True NRR including all customers from the starting cohort: 92%. The 115% NRR is technically correct for surviving customers but misleading about overall business health. Discrepancy 3 — Cohort cherry-picking: the deck shows the 6 best-performing monthly cohorts out of 18. The 12 excluded cohorts had significantly worse retention (seasonal businesses often show this). Request all cohorts without exception. Step 2 — Assess sustainability: is the retention improving or is the good data a one-time anomaly? Build the full 18-month retention triangle. Check: are recent cohorts consistently better than older ones? Or was there a one-time improvement that has plateaued? Calculate the trend: if M1 retention improved from 30% to 42% over 12 months, is the improvement decelerating (last 3 months flat at 42%) or still accelerating?'"
    weight: 0.35
    description: "Forensics"
  - type: llm_judge
    criteria: "Response covers hidden risk identification through cohort analysis — risks: 'Hidden risks revealed by cohort analysis: Risk 1 — Degrading cohort economics masked by growth: total revenue growing 50% year-over-year (looks healthy). But per-cohort LTV is declining: Q1 2024 cohort M12 LTV: $150. Q2 2024: $130. Q3 2024: $115. Q4 2024: projected $100. Revenue growth is entirely driven by more signups, not better unit economics. This is a leaky bucket — if acquisition slows (budget cuts, channel saturation), revenue growth stalls immediately. Red flag severity: HIGH. This business cannot sustain growth without ever-increasing acquisition spend. Risk 2 — Channel dependency: 70% of signups come from a single paid channel (Facebook ads). Facebook ad costs have increased 30% year-over-year. If Facebook costs increase another 30%, LTV:CAC drops below 1.5:1 for 70% of the user base. The company has a critical dependency on a single acquisition channel. Red flag severity: HIGH. Acquisition cost risk could make the business unprofitable. Risk 3 — Revenue concentration in early cohorts: the 2022 and early 2023 cohorts generate 60% of total MRR. These cohorts are 2-3 years old and approaching natural churn. If 2022 cohort churn accelerates (they have been grandfathered at old prices), revenue could decline significantly. Red flag severity: MEDIUM. Revenue is front-loaded in aging cohorts. Risk 4 — Negative seasonality hidden in annual data: annual retention looks steady at 25%. But Q4 cohorts retain at 35% (holiday effect) and Q2 cohorts at 18%. The annual average masks significant seasonal variation. If the acquisition is based on Q4 data, the buyer overestimates sustainable retention. Red flag severity: MEDIUM. Seasonality must be modeled separately. Risk 5 — NRR driven by a few large customers: 115% NRR is driven by 5 enterprise customers who expanded significantly. Excluding these 5: NRR is 96%. The expansion story is not broad-based — it depends on a handful of accounts. Red flag severity: MEDIUM-HIGH. Concentration risk in expansion revenue'"
    weight: 0.35
    description: "Risks"
  - type: llm_judge
    criteria: "Response covers valuation implications and investment recommendation framework — valuation: 'Valuation implications of cohort analysis: adjusting valuation based on cohort findings: reported metrics suggest a premium SaaS business: 40% M1 retention, 115% NRR, growing revenue. But the forensic analysis reveals: true M1 retention is 28% (active definition was inflated). True NRR is 92% (survivorship bias in the original calculation). Per-cohort LTV is declining (growth is acquisition-driven, not retention-driven). Single-channel acquisition dependency (70% Facebook). Valuation adjustment: the company was presented as a 10-12x ARR business (strong retention, negative churn). Adjusted reality: 6-8x ARR (moderate retention, positive churn, channel risk). Difference: on $5M ARR, this is a $20M-$30M valuation difference. Investment recommendation framework: Category A — Pass (cohort data shows fundamental problems): true retention below industry average (M6 below 15% for SaaS). NRR below 85% (heavy churn, no expansion). LTV:CAC below 1:1 for the primary channel. Cohort LTV declining for 6+ consecutive cohorts. Category B — Invest with conditions: true retention is moderate but improvable (M6 15-25%). NRR is 90-100% (break-even, room for expansion). Specific cohort risks can be mitigated (diversify channels, fix onboarding). Conditions: price adjusted for true metrics, management team commits to retention improvement plan with milestones. Category C — Strong investment: true retention above 25% at M6. NRR above 105% (genuine negative churn). Improving cohort economics over time. Diversified acquisition channels. For the PE operating partner: the target company falls in Category B. True metrics are weaker than presented but not fundamentally broken. Recommend: adjust valuation from 10x to 7x ARR. Negotiate a retention milestone clause (price adjustment if retention does not improve to 35% M1 within 12 months post-acquisition). Invest in fixing the acquisition channel dependency as the first post-acquisition priority'"
    weight: 0.30
    description: "Valuation"
