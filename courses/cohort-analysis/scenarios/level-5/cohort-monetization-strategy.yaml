meta:
  id: cohort-monetization-strategy
  level: 5
  course: cohort-analysis
  type: output
  description: "Design cohort-based monetization strategies — optimize pricing, packaging, and revenue models using cohort data to maximize lifetime value across user segments"
  tags: [monetization, pricing-strategy, packaging, revenue-optimization, master]

state: {}

trigger: |
  The Chief Revenue Officer says: "We monetize through a flat
  subscription but our cohort data shows wildly different usage
  patterns. Some users barely touch the product, others use it
  heavily. I want a monetization strategy that captures more value
  from power users without losing light users. Design this using
  cohort analysis."

  Task: Design a cohort-based monetization strategy that optimizes
  revenue across different user segments while maintaining retention.

assertions:
  - type: llm_judge
    criteria: "Response covers usage-based cohort analysis for monetization — analysis: 'Cohort-based monetization analysis: mapping usage patterns to monetization opportunity: Step 1 — Build usage intensity cohorts: segment users by monthly usage (not just by signup date): power users (top 10%): 50+ sessions/month, 200+ actions. Heavy users (next 20%): 20-49 sessions, 100-199 actions. Moderate users (next 30%): 5-19 sessions, 20-99 actions. Light users (next 25%): 1-4 sessions, 5-19 actions. Dormant users (bottom 15%): 0 sessions (paying but not using). Step 2 — Revenue and retention by usage cohort: all currently pay $20/month (flat pricing). Cohort | ARPU | M12 retention | LTV (12mo) | usage cost. Power users: $20 | 92% | $221 | $8/month. Heavy users: $20 | 78% | $187 | $4/month. Moderate: $20 | 55% | $132 | $1.50/month. Light: $20 | 30% | $72 | $0.50/month. Dormant: $20 | 15% | $36 | $0.10/month. Key insight: power users get enormous value ($8 in cost to serve, $20 revenue — but they WOULD pay more). Dormant users are paying $20 for nothing — they will inevitably churn. Light users have weak retention because they have not found enough value to justify $20. The flat $20 pricing leaves money on the table at the top and creates churn at the bottom. Step 3 — Willingness to pay analysis by usage cohort: survey or revealed preference analysis. Power users: would pay $35-50/month for premium features. Heavy users: comfortable at $20-30/month. Moderate users: price-sensitive, would prefer $10-15/month. Light users: would try a $5-8/month plan or free with limits. Monetization gap: the flat $20 undercharges power users by $15-30/month. The flat $20 overcharges light users by $12-15/month (driving churn)'"
    weight: 0.35
    description: "Analysis"
  - type: llm_judge
    criteria: "Response covers monetization strategy design — strategy: 'Cohort-informed monetization strategy: new pricing structure based on cohort data: Tier 1 — Starter ($8/month): target: light users and new users who have not activated. Features: core product with usage limits (5 projects, 10 team members). Purpose: reduce churn for light users who found $20 too expensive. Lower the entry barrier for new cohorts. Expected impact: light user retention improves from 30% to 50% M12 (lower price matches their usage value). Tier 2 — Professional ($20/month): target: moderate and heavy users. Features: unlimited projects, 50 team members, advanced features. Purpose: maintain the current revenue base. Expected impact: moderate user retention stable at 55-60% M12. Tier 3 — Business ($40/month): target: power users. Features: everything in Pro + reporting, API access, admin controls, priority support. Purpose: capture the willingness-to-pay premium from power users. Expected impact: power user conversion to Business tier: 60-70%. Revenue per power user doubles. Retention stays above 90%. Tier 4 — Enterprise (custom pricing, $100+/month): target: teams and companies (5+ seats). Features: SSO, audit logs, SLA, dedicated support. Purpose: capture enterprise value, drive seat expansion. Expected impact: NRR above 130% for enterprise cohorts (seat growth). Revenue impact model: current state: 10,000 users × $20 = $200K MRR. Projected state after migration: power users (1,000): 700 × $40 + 300 × $20 = $34K. Heavy users (2,000): 1,800 × $20 + 200 × $40 = $44K. Moderate users (3,000): 2,500 × $20 + 500 × $8 = $54K. Light users (2,500): 1,500 × $8 + 500 × $20 + 500 churn = $22K. Dormant (1,500): 500 × $8 + 1,000 churn = $4K. Total projected MRR: $158K (initial dip from $200K). But at month 6: light user retention doubles (1,500 additional retained users). Power user ARPU increases. Projected MRR at month 6: $195K. Projected MRR at month 12: $230K (15% increase from better retention and higher power-user ARPU)'"
    weight: 0.35
    description: "Strategy"
  - type: llm_judge
    criteria: "Response covers migration strategy and measurement — migration: 'Pricing migration strategy and cohort-based measurement: migration approach: do not force-migrate existing users. Instead: new signups: default to the new pricing tiers (Starter, Professional, Business). Existing users: grandfathered at $20 for 6 months. During the 6 months, nudge toward the right tier: power users: highlight Business tier features they would benefit from. Light users: offer Starter tier as a retention alternative when churn signals appear. After 6 months: existing users choose their tier (automatic migration to the closest fit). Measurement framework: track cohort economics before and after the pricing change. Pre-change baseline (flat $20): M1 retention: 42%. M6 retention: 25%. 12-month LTV: $130. NRR: 108%. Post-change measurement (by tier): Starter tier cohorts: M1: 55% (higher because lower price attracts committed-at-price users). M6: 35% (dramatically better — users are paying what the product is worth to them). 12-month LTV: $85 (lower per user but many more retained users). Professional tier cohorts: M1: 48%. M6: 30%. LTV: $145. Business tier cohorts: M1: 85%. M6: 70%. LTV: $380. Blended metrics: weighted by tier volume. Track separately to ensure each tier is healthy. Cannibalization monitoring: watch for power users downgrading to Professional instead of upgrading to Business. If downgrade rate exceeds 20%: Business tier value proposition needs strengthening. Track plan movement monthly: upgrades (Starter→Pro, Pro→Business): healthy. Downgrades (Business→Pro, Pro→Starter): concerning. Cross-tier churn: which tier has the highest churn and why. For the CRO: the tiered pricing captures 2x revenue from power users while retaining 1.5x more light users. Short-term MRR dip of 10-15% is expected as users sort into tiers. Month-12 MRR is projected 15% above current levels. The key metric to watch: blended NRR should improve from 108% to 115%+ as the enterprise tier drives seat expansion'"
    weight: 0.30
    description: "Migration"
