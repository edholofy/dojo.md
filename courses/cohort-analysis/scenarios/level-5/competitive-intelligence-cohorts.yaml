meta:
  id: competitive-intelligence-cohorts
  level: 5
  course: cohort-analysis
  type: output
  description: "Use cohort analysis for competitive intelligence — estimate competitor retention, benchmark cohort performance, and identify competitive threats through market cohort data"
  tags: [competitive-intelligence, benchmarking, market-analysis, competitor, master]

state: {}

trigger: |
  The Chief Strategy Officer says: "Our competitor just raised a huge
  round. Their public blog says they have 'industry-leading retention.'
  I need to know: are they actually better than us? Can we estimate
  their cohort metrics from public data? And how do we benchmark
  ourselves against the market?"

  Task: Explain how to use cohort analysis for competitive intelligence,
  including estimating competitor metrics and building competitive
  benchmarks.

assertions:
  - type: llm_judge
    criteria: "Response covers estimating competitor cohort metrics — estimation: 'Estimating competitor cohort metrics from public data: direct data sources: the competitor's blog post mentions: 2M total users (growing 100% YoY). 500K MAU. 45% month-1 retention for recent cohorts. These claims can be partially validated and decomposed. Estimation method 1 — MAU/Total ratio analysis: MAU / total users = 500K / 2M = 25%. This is the blended activity rate across ALL cohorts (old and new). Industry benchmark: 20-30% for SaaS tools. Their number is within normal range — consistent with good but not exceptional retention. Estimation method 2 — Reverse-engineering the retention triangle: if they have 2M total users and grew 100% YoY: approximately 1M users in the last 12 months, approximately 1M in the 12 months before. If recent month-1 retention is 45% and the curve follows typical decay: month-1: 45%, month-3: 30%, month-6: 20%, month-12: 14% (estimated using industry-typical power law decay). Validation: sum up expected active users across all cohorts: recent 12 months (1M users): average 30% active = 300K. Older 12 months (1M users): average 15% active = 150K. Total estimated MAU: 450K (close to their reported 500K — the estimate is plausible). Estimation method 3 — App store and web traffic data: use third-party data (App Annie, SimilarWeb, Sensor Tower). Monthly downloads / DAU trends indicate new user acquisition and retention. If downloads are growing but DAU is flat: retention is poor despite high acquisition. If DAU grows faster than downloads: retention is improving. Estimation method 4 — Employee review sites: Glassdoor/Blind reviews sometimes mention internal metrics. A review saying we have 15% month-6 retention is a data point (with uncertainty). Competitor public filings or investor materials may mention NRR, churn, or LTV'"
    weight: 0.35
    description: "Estimation"
  - type: llm_judge
    criteria: "Response covers competitive benchmarking framework — benchmarking: 'Competitive benchmarking using cohort data: building a cohort benchmark database: for your market segment (e.g., B2B SaaS, project management), collect benchmark data from: industry reports (ChartMogul, ProfitWell, Recurly publish annual benchmarks). Public company disclosures (S-1 filings, earnings calls — NDR/NRR disclosures). Portfolio company data (if you have investor connections). Your own historical data (your best and worst cohorts as internal benchmarks). Benchmark table for B2B SaaS (project management segment): metric | bottom quartile | median | top quartile | your company. Month-1 retention: 25% | 35% | 45% | 42%. Month-6 retention: 10% | 18% | 28% | 25%. Month-12 retention: 6% | 12% | 20% | 18%. NRR: 85% | 100% | 115% | 108%. LTV (12-month): $60 | $100 | $160 | $130. LTV:CAC: 1.5:1 | 2.5:1 | 4:1 | 3.2:1. Competitive position: your company is above median on all metrics and approaching top quartile on several. Month-1 retention (42%) is close to top quartile (45%) — the onboarding improvement is paying off. NRR (108%) is above median (100%) but below top quartile (115%) — expansion revenue has room to grow. Competitive gap analysis: the competitor claims 45% month-1 retention (top quartile). If accurate, they have a 3pp advantage on initial activation. But their MAU ratio (25%) suggests month-6+ retention may be similar to yours. The competitive advantage may be concentrated in early activation (first month), not long-term retention. Strategic response: match their month-1 advantage by investing in the activation gap (your top product priority). Protect your month-6+ advantage (collaboration features that drive long-term retention). Build a moat in expansion revenue (increase NRR from 108% toward 115%)'"
    weight: 0.35
    description: "Benchmarking"
  - type: llm_judge
    criteria: "Response covers identifying competitive threats through cohort signals — threats: 'Identifying competitive threats through cohort data: early warning signals of competitive impact: Signal 1 — New user quality decline without acquisition changes: if month-1 retention drops 3-5pp without any acquisition channel changes, a competitor may be capturing higher-intent users first. If users are comparison-shopping and choosing the competitor, your cohorts will show: lower initial engagement (fewer first-session actions). Faster initial churn (users leave within days, not weeks). Lower activation metric completion. Investigate: did the competitor launch a new feature, pricing change, or marketing campaign? Signal 2 — Segment-specific retention decline: if retention drops only in a specific user segment (e.g., enterprise, US market, mobile users), a competitor may be targeting that segment. Example: enterprise cohort M3 retention dropped from 40% to 30% over 3 months. No product changes explain this. Hypothesis: the enterprise-focused competitor launched a feature that addresses enterprise pain points better. Signal 3 — Increased reactivation from competitor users: if you see a spike in signups from users who previously tried the competitor (identifiable through referral patterns or survey data): these users are migrating — a competitive opening. Track their retention separately — are they better or worse than average new users? If better: the competitor has a retention problem (opportunity to capture their users). If worse: they may be low-quality shoppers who will churn from any product. Competitive response framework: 1. Monitor: weekly cohort health dashboard with competitive context. 2. Detect: automated alerts when segment-specific retention changes by more than 3pp. 3. Diagnose: investigate whether the change correlates with competitor actions (launches, campaigns, pricing). 4. Respond: prioritize product investments that protect your cohort advantage. 5. Measure: track whether competitive responses improve the affected cohort segments. For the CSO: the competitor's 45% month-1 claim is plausible but their overall retention profile is likely similar to yours. Your advantage is in long-term retention and expansion revenue. Focus on closing the month-1 gap while protecting the month-6+ moat. Monitor for segment-specific competitive impacts weekly'"
    weight: 0.30
    description: "Threats"
