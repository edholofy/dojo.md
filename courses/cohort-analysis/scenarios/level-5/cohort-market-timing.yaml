meta:
  id: cohort-market-timing
  level: 5
  course: cohort-analysis
  type: output
  description: "Use cohort analysis for market timing — identify inflection points, detect market shifts, and time strategic moves using cohort trend data"
  tags: [market-timing, inflection-points, strategic-moves, trend-analysis, master]

state: {}

trigger: |
  The Chief Strategy Officer says: "Markets move in cycles. I want
  to use our cohort data to detect when the market is shifting —
  before it shows up in revenue. When should we accelerate spending?
  When should we conserve? Can cohort trends help us time our
  strategic moves?"

  Task: Explain how to use cohort analysis as a leading indicator
  for market shifts and to time strategic business decisions.

assertions:
  - type: llm_judge
    criteria: "Response covers cohort data as leading indicators — leading: 'Cohort data as a leading indicator: why cohort metrics lead revenue: revenue is a lagging indicator — it reflects decisions users already made. Cohort metrics are leading indicators — they reflect user behavior before it hits the P&L. Example: if month-1 retention drops from 42% to 35% for the October cohort: revenue impact will not appear for 2-3 months (these users have not yet generated significant revenue). But the cohort data signals the problem immediately. Leading indicator hierarchy (fastest to slowest): 1. First-session engagement (hours): if new users in the current week have 20% shorter first sessions, activation will drop. Signal lag: 1 day. 2. Week-1 activation rate (days): if activation drops from 35% to 28%, month-1 retention will likely drop by 3-5pp. Signal lag: 1 week. 3. Month-1 retention (weeks): if M1 retention drops, LTV will decline. Signal lag: 1 month. 4. Month-3 retention (months): confirms whether M1 signals persist. Signal lag: 3 months. 5. Revenue impact (months): actual revenue decline shows up. Signal lag: 4-6 months. Detecting market shifts: market expansion signal: when BOTH acquisition volume AND cohort quality are improving simultaneously: more signups AND higher retention per cohort. This indicates growing market demand with strong product-market fit. Timing: accelerate investment (more marketing spend, faster hiring, feature development). Market maturation signal: acquisition volume is growing but cohort quality is declining: more signups but lower M1 retention, lower activation rate. The market is being saturated with less-committed users (lower intent). Timing: optimize unit economics (improve activation, not just acquisition). Shift budget from volume to quality. Market contraction signal: acquisition volume is declining AND cohort quality is declining: fewer signups with worse retention. External factors are reducing demand (recession, competitive disruption, regulatory change). Timing: conserve cash, focus on retention of existing users, reduce acquisition spend'"
    weight: 0.35
    description: "Leading"
  - type: llm_judge
    criteria: "Response covers timing strategic decisions — timing: 'Timing strategic decisions with cohort data: Decision 1 — When to scale acquisition: scale when: 3+ consecutive monthly cohorts show improving M1 retention (product is getting stickier). Activation rate is above 35% (new users are finding value). LTV:CAC exceeds 3:1 for the primary channel. Do not scale when: cohort quality is declining (even if revenue is growing). LTV:CAC is between 1:1 and 2:1 (insufficient margin for scaling). Activation rate is below 25% (too many users are failing to find value). Decision 2 — When to raise prices: raise when: cohort NRR exceeds 110% (users are expanding — they value the product). Power user usage is growing (willingness to pay is high). Competitor pricing is above yours (market positioning allows it). Do not raise when: churn is above 5% monthly (price increase will accelerate churn). Cohort retention is declining (users are already dissatisfied). A competitor just launched a lower-priced alternative. Decision 3 — When to enter a new market: enter when: pilot market cohorts show M3 retention within 70% of home market. Local acquisition costs are reasonable (LTV:CAC above 2:1 projected). Home market is mature (growth is slowing — need new markets for expansion). Delay when: pilot cohort retention is below 50% of home market at M3. Home market still has untapped potential (improving cohort metrics). Decision 4 — When to launch a major product change: launch when: current feature adoption cohorts show plateauing engagement (diminishing returns on existing features). Behavioral cohort analysis identifies unmet needs (users with certain behaviors retain well but feature coverage is missing). Product-market fit score is high (users would be very disappointed to lose the product). Delay when: recent product changes are still being adopted (feature adoption curve is still rising). Cohort data shows the current product is still in an improvement trajectory (month over month retention gains)'"
    weight: 0.35
    description: "Timing"
  - type: llm_judge
    criteria: "Response covers building a cohort-based strategic dashboard — dashboard: 'Building the cohort-based strategic dashboard: the CSO needs a single dashboard that answers: are we in an expansion, maturation, or contraction phase? The strategic cohort dashboard: Panel 1 — Market phase indicator: a composite index combining: acquisition volume trend (3-month moving average). Cohort quality trend (M1 retention, 3-month moving average). LTV:CAC trend. Index interpretation: rising volume + rising quality = expansion (green). Rising volume + declining quality = maturation (yellow). Declining volume + declining quality = contraction (red). Panel 2 — Cohort trend arrows: for 6 key metrics, show the 6-month trend direction and magnitude: M1 retention: ↑ +8pp (improving). M6 retention: ↑ +5pp (improving). NRR: ↑ +10pp (improving). Activation rate: → 0pp (flat — potential concern). LTV:CAC organic: ↑ +0.5 (improving). LTV:CAC paid: ↓ -0.3 (declining — paid efficiency worsening). Panel 3 — Inflection point detection: automated detection of trend changes. A trend change is when a metric reverses direction for 2+ consecutive months. Example: M1 retention was improving for 8 months, then flattened for 2 months. Alert: potential inflection point — investigate whether the improvement has hit a ceiling or if a new factor is affecting retention. Panel 4 — Strategic timing recommendations: based on the current phase and trend data, the dashboard surfaces recommendations: current phase: late expansion. Recommended actions: lock in annual contracts before market matures. Increase prices 10-15% (market position is strong). Accelerate hiring for key roles (competitive talent market). Begin market expansion planning (home market approaching saturation). Recommended caution: paid LTV:CAC declining — do not scale paid acquisition further. Activation rate flat — onboarding needs investment before scaling. For the CSO: review this dashboard monthly. Use it to time budget decisions (accelerate/conserve), pricing decisions (increase/hold), and market entry decisions (enter/delay). The cohort signals lead revenue by 3-6 months — acting on them early creates a significant strategic advantage'"
    weight: 0.30
    description: "Dashboard"
