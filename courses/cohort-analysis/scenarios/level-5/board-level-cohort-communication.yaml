meta:
  id: board-level-cohort-communication
  level: 5
  course: cohort-analysis
  type: output
  description: "Communicate cohort insights at board level — translate complex cohort data into executive narratives, handle board questions, and use cohort data to drive governance decisions"
  tags: [board-communication, executive-narrative, governance, storytelling, master]

state: {}

trigger: |
  The CEO says: "I'm presenting our retention data to the board next
  week. Two of our board members are former operators who understand
  cohort analysis deeply. Two are financial investors who think in
  terms of revenue multiples. How do I present cohort data that
  satisfies both audiences and drives the right governance decisions?"

  Task: Design a board-level cohort presentation strategy that works
  for both operator and financial investor board members.

assertions:
  - type: llm_judge
    criteria: "Response covers board presentation design for mixed audiences — presentation: 'Board presentation design for mixed audiences: understanding the two audiences: operator board members (former CEOs/CPOs): want to see the retention triangle, feature adoption metrics, and cohort trends. They will ask about specific product changes and their measured impact. They want depth and will challenge methodology. Financial investor board members: want to see NRR, LTV:CAC, payback periods, and revenue projections. They care about unit economics and scalability. They want clarity on what the numbers mean for returns. Dual-track presentation structure: Section 1 — The headline (1 slide, 2 minutes): one chart, one sentence. Chart: month-1 retention trend line over 18 months (rising from 30% to 45%). Sentence: we have improved retention by 50% in 18 months, and each percentage point adds approximately $150K in annual revenue. This satisfies financial investors (revenue impact) and operators (the trend and magnitude). Section 2 — The cohort deep dive (2 slides, 5 minutes): Slide A (for operators): retention triangle heatmap with product launch annotations. The vertical improvement in M1 column annotated with what caused each step. Operators will engage with this — they want to know WHAT drove the improvement. Slide B (for financial investors): NRR waterfall showing the bridge from 92% to 108%. LTV:CAC by acquisition channel showing improving unit economics. Revenue contribution by cohort vintage (showing healthy diversification). Section 3 — The forward view (2 slides, 5 minutes): Slide C: cohort-based revenue forecast for next 4 quarters. Three scenarios (base, optimistic, conservative) with assumptions stated. Operators care about the assumptions. Investors care about the range and what drives the upside. Slide D: strategic cohort priorities for next quarter. 3 specific investments with expected cohort impact and timeline. Links back to the business strategy'"
    weight: 0.35
    description: "Presentation"
  - type: llm_judge
    criteria: "Response covers handling board questions and challenges — questions: 'Handling board questions and challenges: operator questions (expect these): Question: why did the October cohort underperform? Preparation: have the segmented view ready. October was affected by a tracking gap (3 days of data loss). Excluding the gap period, October is in line with the trend. Always know your worst cohort and why it underperformed. Question: is the retention improvement from product changes or acquisition quality? Preparation: show the same-channel retention comparison (organic users improved from 35% to 48%, controlling for channel mix). Show the A/B test data for the onboarding improvement (+5pp validated). Question: what is the activation metric and is adoption increasing? Preparation: the activation metric is completing a first project (correlates with 3x M6 retention). Adoption increased from 30% to 42% of new users in 6 months. Financial investor questions (expect these): Question: what is the implied LTV at 3-year horizon? Preparation: using BG/NBD model with confidence intervals. Projected 3-year LTV: $280 (95% CI: $240-$320). LTV:CAC at 3-year horizon: 5.2:1 (strong). Question: how does NRR scale? If you 5x the customer base, does NRR hold? Preparation: segment NRR by customer size. Enterprise NRR 125% (scalable — driven by seat growth). SMB NRR 85% (does not scale — high churn, low expansion). At 5x scale with more enterprise mix: blended NRR improves. At 5x scale with more SMB: blended NRR degrades. Show the sensitivity analysis. Question: what is the biggest risk to these cohort metrics? Preparation: three risks ranked: 1. acquisition channel dependency (70% Facebook). 2. Competitor with better onboarding could erode M1 advantage. 3. Price increase could cause elevated churn in 2022 vintage cohorts. For each risk: probability, impact, and mitigation plan'"
    weight: 0.35
    description: "Questions"
  - type: llm_judge
    criteria: "Response covers governance decisions driven by cohort data — governance: 'Board governance decisions driven by cohort data: governance decision 1 — Budget approval: the board must approve the annual marketing budget. Cohort data input: by acquisition channel, show LTV:CAC ratios. Channel A (organic): LTV:CAC 8:1 — approve unlimited investment (ROI is exceptional). Channel B (paid search): LTV:CAC 2.5:1 — approve scaling by 30% (healthy ROI with room to grow). Channel C (paid social): LTV:CAC 1.1:1 — approve maintenance budget only (barely profitable, monitor closely). Decision framework: approve scaling for channels where cohort LTV:CAC exceeds 2:1. Restrict channels below 1.5:1. This replaces the traditional approve X dollars for marketing with approve X dollars per channel based on cohort unit economics. Governance decision 2 — Pricing strategy: the board must approve a pricing change. Cohort data input: price sensitivity by cohort vintage (early cohorts highly sensitive). Revenue impact modeling by cohort (net positive for newer cohorts, negative for oldest). Competitive benchmarking (pricing above or below competitors for each retention tier). Board decision: approve tiered pricing increase (larger increase for newer cohorts, grandfather oldest cohorts). Governance decision 3 — Market expansion: the board must approve entering a new market. Cohort data input: pilot market cohort data vs home market at the same maturity. M3 retention in pilot: 25% (vs 35% home market at M3). LTV projection: 70% of home market LTV. Board decision: approve continued investment but with a milestone — if M6 retention does not reach 20% (within 60% of home market), reconsider. Governance decision 4 — Executive compensation: tie executive compensation to cohort metrics. CEO bonus: weighted on NRR improvement (40%), cohort LTV trend (30%), forecast accuracy (30%). Product VP bonus: month-1 retention improvement, feature activation rates. Marketing VP bonus: acquisition cohort quality (predicted LTV by channel). This aligns executive incentives with cohort health rather than vanity metrics'"
    weight: 0.30
    description: "Governance"
