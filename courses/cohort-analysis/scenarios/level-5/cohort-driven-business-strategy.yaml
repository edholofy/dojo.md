meta:
  id: cohort-driven-business-strategy
  level: 5
  course: cohort-analysis
  type: output
  description: "Drive business strategy with cohort insights — use cohort data to inform market expansion, product strategy, resource allocation, and competitive positioning at the executive level"
  tags: [business-strategy, market-expansion, resource-allocation, executive, master]

state: {}

trigger: |
  The CEO says: "We're planning our 3-year strategy. I've seen cohort
  analysis used for retention tracking but I want to use it to drive
  big strategic decisions — which markets to enter, where to allocate
  R&D, how to position against competitors. Show me how cohort
  analysis can inform company strategy, not just product analytics."

  Task: Explain how cohort analysis drives strategic business
  decisions at the CEO level, including market expansion, resource
  allocation, and competitive positioning.

assertions:
  - type: llm_judge
    criteria: "Response covers cohort-driven market expansion strategy — expansion: 'Cohort-driven market expansion: using cohort data to decide which markets to enter: current market cohort analysis: US market cohorts: month-6 retention: 25%, month-12 LTV: $130, NRR: 108%. UK market cohorts: month-6 retention: 22%, month-12 LTV: $110, NRR: 102%. Germany market cohorts: month-6 retention: 20%, month-12 LTV: $95, NRR: 98%. Japan market (early, 6 months of data): month-3 retention: 28%, projected month-12 LTV: $150 (extrapolated from early data). Strategic insight: Japan shows the strongest early cohort metrics despite being the newest market. This suggests strong product-market fit in Japan — consider accelerating investment. Germany is below NRR 100% (positive churn) — the market may not be mature enough for the current product. Expansion decision framework: for each candidate market, run a 6-month pilot and build cohort data. Compare pilot cohort metrics to the home market at the same maturity stage. Threshold: if month-3 retention is within 80% of the home market at month 3, the market is viable. If below 60%, the product needs significant localization before scaling. Resource allocation based on cohort data: market tier A (US, Japan): month-6 retention above 22%, NRR above 100%. Allocate: 60% of go-to-market resources. Strategy: scale aggressively, invest in expansion revenue. Market tier B (UK): month-6 retention 18-22%, NRR near 100%. Allocate: 25% of resources. Strategy: steady growth, focus on improving retention before scaling. Market tier C (Germany): month-6 retention below 18%, NRR below 100%. Allocate: 15% of resources. Strategy: investigate product-market fit issues before further investment. Product strategy implications: if Japan cohorts retain well but monetize slowly (high retention, low ARPU): invest in monetization features for the Japanese market. If Germany cohorts churn at month 3-4: investigate the month 3-4 user experience — is the product missing a feature that German users need?'"
    weight: 0.35
    description: "Expansion"
  - type: llm_judge
    criteria: "Response covers R&D resource allocation and competitive positioning — allocation: 'R&D resource allocation using cohort insights: cohort data reveals where engineering investment has the highest ROI. Analysis: for each product area, calculate the cohort retention impact: onboarding improvements (last 6 months): month-1 retention improved from 32% to 42% (+10pp). Estimated annual revenue impact: $1.2M (more users retained per cohort). Engineering investment: $400K (2 engineers × 6 months). ROI: 3:1. Collaboration features (last 6 months): users who adopt collaboration retain at 52% M6 vs 18% for non-adopters (+34pp gap). But only 25% adopt collaboration — feature discovery is poor. Potential: if adoption increases from 25% to 40%, overall M6 retention improves approximately 5pp. Estimated revenue impact: $600K annually. Engineering investment: $200K (1 engineer × 6 months). ROI: 3:1. Mobile app improvements (last year): mobile adoption at 40%, retention gap +18pp. Already widely adopted — incremental investment has diminishing returns. Estimated revenue impact: $200K. Engineering investment: $300K. ROI: 0.67:1. Allocation recommendation: Priority 1: collaboration feature discovery (highest untapped potential — 75% of users never find it). Priority 2: onboarding iteration (proven ROI, continue refinement). Priority 3: mobile (maintain, no major investment). Competitive positioning via cohort analysis: benchmark your cohorts against industry data. Industry average month-1 retention (SaaS): 40%. Your month-1 retention: 42% (slightly above average — not a competitive advantage). Industry month-6 retention: 20%. Your month-6 retention: 25% (25% better than average — this is a differentiator). Industry NRR: 95%. Your NRR: 108% (well above — strong expansion motion). Strategic positioning: our competitive advantage is in long-term retention and expansion, not initial activation. Marketing message: companies that stay with us grow with us (emphasizing the expansion story). Investment priority: protect and extend the month-6+ retention advantage rather than chasing marginal gains in month-1'"
    weight: 0.35
    description: "Allocation"
  - type: llm_judge
    criteria: "Response covers 3-year strategic planning with cohort projections — planning: 'Three-year strategic plan driven by cohort projections: Year 1 objectives (based on current cohort trends): improve month-1 retention from 42% to 48% (onboarding investment). Increase collaboration adoption from 25% to 40% (feature discovery). Expand Japan market from pilot to full launch (strong early cohorts). Projected impact: monthly revenue grows from $300K to $420K. NRR improves from 108% to 112%. Year 2 objectives: maintain month-1 retention at 48%+ (focus shifts to depth). Launch usage-based pricing for expansion revenue (cohort data shows power users would pay more). Enter 2 additional APAC markets (leveraging Japan playbook). Projected impact: monthly revenue $600K-$750K. Cohort LTV increases 20% from pricing optimization. Year 3 objectives: build enterprise cohort track (separate onboarding, features, pricing for enterprise customers). Achieve 120% NRR (through enterprise expansion). Consider M&A for geographic expansion (if organic cohort data in target markets is weak). Projected impact: monthly revenue $1.2M-$1.5M. Enterprise cohorts contribute 40% of new revenue. Strategic cohort KPIs for the board: metric | current | year 1 target | year 3 target. Month-1 retention: 42% | 48% | 50%. Month-6 retention: 25% | 30% | 35%. NRR: 108% | 112% | 120%. 12-month LTV: $130 | $155 | $200. LTV:CAC: 3:1 | 3.5:1 | 4:1. Payback period: 5 months | 4 months | 3 months. For the CEO: cohort analysis is not just a product metric — it is the foundation for every strategic decision. Market expansion: enter markets with strong early cohort data. R&D allocation: invest where cohort impact is highest. Competitive positioning: leverage long-term retention as the differentiator. Financial planning: use cohort-based bottom-up forecasting for investor-grade projections'"
    weight: 0.30
    description: "Planning"
