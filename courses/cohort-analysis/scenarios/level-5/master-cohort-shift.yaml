meta:
  id: master-cohort-shift
  level: 5
  course: cohort-analysis
  type: output
  description: "Master cohort shift — handle C-suite and board-level cohort challenges requiring strategic planning, investor communication, competitive intelligence, and organizational transformation"
  tags: [shift-simulation, master, multi-request, strategic]

state: {}

trigger: |
  Six cohort analysis challenges arrive from the board and C-suite
  during a critical week:

  Request 1 (Board Chair): "We're meeting with a potential acquirer
  next week. They want to see our cohort data. Make it bulletproof."

  Request 2 (CEO): "Our competitor just announced 50% M1 retention.
  Is that real? How do we compare?"

  Request 3 (CFO): "We need to raise prices but the board is worried
  about churn. Build a cohort-based risk model for a 25% price
  increase."

  Request 4 (Chief Strategy Officer): "Are we in a growth phase or
  a maturation phase? What do our cohort trends say about the next
  12 months?"

  Request 5 (Head of Data): "The data team wants to propose a $500K
  investment in cohort analytics infrastructure. Help me build the
  business case."

  Request 6 (CPO): "I want every product decision backed by cohort
  data. How do I transform the product team's decision-making?"

  Task: Handle all six requests.

assertions:
  - type: llm_judge
    criteria: "Response handles Requests 1 and 2 — acquirer data package and competitive analysis — acquirer_competitive: 'Request 1 — Acquirer-ready cohort package: build a comprehensive data room package: Section A — Retention fundamentals: 24-month retention triangle (all cohorts, no cherry-picking). Color-coded heatmap showing consistent improvement. Key metrics: M1 improved from 30% to 45% (+15pp), M6 from 15% to 28% (+13pp). Methodology document explaining all definitions (active, churn, cohort assignment). Reconciliation: cohort revenue tied to audited financials within 2%. Section B — Unit economics: LTV curves by quarterly cohort showing improvement. Current blended LTV:CAC 3.2:1, trending toward 4:1. Payback period by channel: organic 2 months, paid search 4 months, paid social 8 months. NRR decomposition: crossed 100% (now 108%), driven by expansion. Section C — Forward projections: cohort-based revenue forecast with 3 scenarios. BG/NBD model projections with confidence intervals. Sensitivity analysis on key assumptions. Section D — Data integrity: audit trail from dashboard to raw data. Independent validation by external analytics firm. No definitional inconsistencies across the package. Request 2 — Competitive intelligence on the 50% M1 claim: validation analysis: the competitor reported 50% M1 retention. Check 1 — Definition consistency: our M1 retention (45%) uses user-initiated server-side activity. If the competitor defines active as any event including system-generated (push notifications received), their 50% could be inflated by 5-10pp. Adjusted estimate: their true M1 may be 40-45% (comparable to ours). Check 2 — Third-party data validation: App store ranking: competitor is #3, we are #4 (close). SimilarWeb traffic: competitor 15% more monthly visits. SimilarWeb engagement: similar average session duration. This suggests comparable engagement — their 50% claim is plausible but likely uses a broader activity definition. Check 3 — Segment analysis: the competitor focuses on enterprise (higher inherent retention). Our user mix is 60% SMB, 40% enterprise. Adjusting for segment: our enterprise M1 is 52% (above their blended 50%). Conclusion: we likely have comparable or better retention when controlling for definitions and segment mix. For the Board Chair: present this as a competitive strength, not a weakness'"
    weight: 0.35
    description: "AcquirerCompetitive"
  - type: llm_judge
    criteria: "Response handles Requests 3 and 4 — pricing risk model and market phase assessment — pricing_market: 'Request 3 — Pricing risk model for 25% increase: cohort-by-cohort impact modeling: 2022 cohorts (600 customers, $12 avg ARPU): price elasticity −2.8 (very sensitive). Predicted incremental churn: 22-28%. Net revenue impact: −$800/month (churn exceeds price gain). Risk: HIGH. Recommendation: grandfather at current price. 2023 cohorts (1,000 customers, $17 avg ARPU): price elasticity −1.5. Predicted incremental churn: 10-15%. Net revenue impact: +$500/month (marginal gain). Risk: MODERATE. Recommendation: 15% increase (not full 25%). 2024 cohorts (1,500 customers, $21 avg ARPU): price elasticity −0.7. Predicted churn: 3-5%. Net revenue impact: +$6,500/month (strong gain). Risk: LOW. Recommendation: full 25% increase. New signups: full 25% increase on new price ($25→$31). No churn risk (price is set at acquisition). Risk: LOW (may reduce conversion rate 5-8%). Overall projection: tiered approach net impact: +$6,200/month by month 3. If the board insists on flat 25% for everyone: net impact: −$1,000/month in the first 3 months (2022 cohort churn offsets gains). Positive by month 6 only after high-churn cohorts have exited. Recommendation to the board: tiered approach generates $6,200/month with minimal risk vs flat approach that risks $1,000/month loss and significant customer goodwill damage. Request 4 — Market phase assessment: market phase indicators: acquisition volume: +40% YoY (still growing, but decelerating from +80% two years ago). Cohort quality (M1 retention): improving, from 30% to 45% over 18 months. LTV:CAC: improving for organic (5:1→8:1), declining for paid (2.5:1→2:1). Activation rate: plateau at 42% for 3 months (improvement stalling). Diagnosis: late expansion, approaching maturation. Evidence: growth is decelerating (40% vs 80% prior). Product improvements are yielding diminishing returns (activation plateau). Paid acquisition is getting more expensive (declining paid LTV:CAC). 12-month forward view: months 1-3: continue benefiting from recent product improvements. Cohort quality stays high. Months 4-6: paid acquisition efficiency likely declines further. Need organic growth engines (referral, content, partnerships). Months 7-12: market maturation sets in. Focus shifts from acquisition to retention and expansion. NRR becomes the primary growth driver. Strategic recommendations: accelerate organic growth investments now (before paid channels deteriorate further). Lock in annual contracts with current customers (protect against competitive entry). Prepare a market expansion plan (new geographies or segments to find the next growth phase)'"
    weight: 0.35
    description: "PricingMarket"
  - type: llm_judge
    criteria: "Response handles Requests 5 and 6 — analytics investment case and product team transformation — investment_transformation: 'Request 5 — Business case for $500K cohort analytics investment: investment breakdown: infrastructure ($150K), headcount ($250K), tools and training ($100K). Projected returns: direct returns (year 1): marketing reallocation from cohort LTV insights: $780K (stop funding low-LTV channels). Activation improvement from behavioral cohort analysis: $420K (redesign onboarding around activation metric). Pricing optimization from usage cohort data: $360K (tiered pricing). Total direct: $1.56M. Indirect returns (year 1): forecast accuracy improvement: $100K (less over-provisioned budget). Faster problem detection: $160K (4 incidents caught early). Better decision quality: $250K (avoided bad investments). Total indirect: $510K. Combined year 1 return: $2.07M. ROI: 4.1:1. Payback period: 4 months (marketing gains alone). For the Head of Data: present the phased timeline — month 1-2 foundation, month 3-4 infrastructure, month 5-8 optimization, month 9-12 scale. Recommend quarterly milestone reviews with the CFO. Request 6 — Product team transformation to cohort-driven decisions: the transformation plan: Phase 1 (weeks 1-4) — Data access: give every PM a cohort dashboard with retention by feature, activation metrics, and behavioral cohort comparisons. Phase 2 (weeks 5-8) — Workflow integration: before every feature spec, PMs must answer: which behavioral cohort does this target? What is the expected retention impact? How will we measure it through cohort data? Phase 3 (weeks 9-16) — Operational change: weekly product review includes: feature adoption rates by cohort. Retention impact of recent launches. Behavioral cohort trends (activation rate, feature depth). Phase 4 (ongoing) — Accountability: PM performance reviews include cohort impact metrics. Feature launch success measured by cohort retention improvement, not just usage. For the CPO: start with dashboard access and weekly metric reviews. Build toward making cohort impact a required part of every product decision. Timeline: 4 months to fully operational cohort-driven product team'"
    weight: 0.30
    description: "InvestmentTransformation"
