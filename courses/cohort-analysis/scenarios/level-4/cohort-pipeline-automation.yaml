meta:
  id: cohort-pipeline-automation
  level: 4
  course: cohort-analysis
  type: output
  description: "Automate cohort analysis pipelines — build end-to-end automated workflows from data ingestion to insight delivery with testing, validation, and self-healing capabilities"
  tags: [pipeline-automation, ETL, orchestration, self-healing, expert]

state: {}

trigger: |
  The Director of Analytics says: "Our analyst spends 3 days every
  month manually updating cohort reports. The process is error-prone —
  last month the retention numbers were wrong because someone forgot
  to exclude test users. I need a fully automated cohort pipeline
  that runs itself, validates its own output, and alerts us when
  something goes wrong."

  Task: Design a fully automated cohort analysis pipeline with
  built-in validation, testing, and self-healing capabilities.

assertions:
  - type: llm_judge
    criteria: "Response covers end-to-end pipeline design — pipeline: 'End-to-end automated cohort pipeline: pipeline architecture (using Airflow/Dagster/Prefect as orchestrator): Stage 1 — Data ingestion (daily, 2 AM): extract new events from the event stream or application database. Incremental extraction: only events since last run (event_timestamp > last_watermark). Load into raw events staging table (append-only). Validation gate: row count check (today's events should be within 20% of yesterday's). Schema check (expected columns present, correct data types). Null check (user_id and timestamp must not be null). If validation fails: alert on-call, halt pipeline, do not propagate bad data. Stage 2 — User daily activity computation (daily, 3 AM): transform raw events into fact_user_daily_activity. Logic: SELECT user_id, DATE(event_timestamp) as activity_date, u.cohort_month, u.channel, u.plan_type, COUNT(*) as event_count, COUNT(DISTINCT session_id) as session_count, SUM(revenue) as revenue FROM staging_events e JOIN dim_user u ON e.user_id = u.user_id WHERE e.event_timestamp >= last_watermark AND u.is_test_user = FALSE AND u.is_internal_user = FALSE GROUP BY 1,2,3,4,5. Critical: the WHERE clause automatically excludes test users and internal users. This is the systematic fix for the manual error the Director described. Stage 3 — Cohort retention aggregation (daily, 4 AM): for each cohort × segment combination, compute retention at each period offset. Incremental: only recompute the latest period for each cohort (historical cells are frozen). Insert new rows into fact_cohort_retention. Stage 4 — Anomaly detection (daily, 5 AM): run the statistical anomaly detection suite against updated cohort data. Generate alerts for any metrics outside control limits. Stage 5 — Dashboard refresh (daily, 6 AM): refresh materialized views powering dashboards. Invalidate dashboard cache. Send daily digest email with key metric changes'"
    weight: 0.35
    description: "Pipeline"
  - type: llm_judge
    criteria: "Response covers testing and validation framework — testing: 'Testing and validation framework: three layers of testing: Layer 1 — Unit tests (run on every code change): test individual transformation logic. Example tests: test_cohort_assignment: verify that a user signing up on Jan 31 23:59 UTC is assigned to January cohort. test_retention_calculation: given 100 users in a cohort and 35 active in month 1, retention should be 35%. test_test_user_exclusion: verify that users flagged as test or internal are excluded from all cohort calculations. test_incremental_logic: verify that rerunning the pipeline for the same day produces identical results (idempotency). Run automatically via CI/CD on every pull request to the pipeline code. Layer 2 — Data validation tests (run daily after each pipeline stage): test_cohort_size_consistency: cohort sizes should not change for cohorts older than 7 days (late-arriving events have a 7-day grace period). test_retention_monotonicity: within a single cohort, retention at month N should be ≤ retention at month N-1 (unless reactivation is explicitly tracked). test_month_0_equals_100: every cohort's month-0 retention must be exactly 100%. test_no_future_data: no cohort should have retention data for a period that has not yet elapsed. test_cross_source_reconciliation: compare cohort sizes to marketing's signup tracker — within 5% tolerance. Layer 3 — Integration tests (run weekly): end-to-end test: inject synthetic test data, run the full pipeline, verify output matches expected results. Regression test: compare this week's full pipeline output to last week's for historical periods — they should be identical (historical data should not change). Performance test: pipeline should complete within the SLA window (4 hours for full recomputation, 30 minutes for daily incremental). Test result tracking: all test results are logged with timestamps. Dashboard shows test pass rate over time. Any test failure blocks the pipeline from updating dashboards (data quality gate)'"
    weight: 0.35
    description: "Testing"
  - type: llm_judge
    criteria: "Response covers self-healing capabilities and operational excellence — selfhealing: 'Self-healing pipeline capabilities: self-healing scenario 1 — Late-arriving events: problem: some events arrive 2-3 days late (mobile app offline sync). Solution: the pipeline maintains a 7-day lookback window. Each day, it reprocesses the last 7 days of data. If late events change a retention number: the pipeline detects the change and updates the aggregated table. If the change exceeds 1pp, it logs the adjustment. If the change exceeds 3pp, it alerts the analyst (unusual late data volume). Self-healing scenario 2 — Upstream data source failure: problem: the events table is empty for today (source system outage). Detection: Stage 1 validation catches the zero-row count. Response: pipeline enters wait-and-retry mode. Retry every 30 minutes for 4 hours. If data arrives within the retry window, pipeline resumes normally. If data does not arrive: alert on-call, mark today as a data gap, skip today's incremental update. Dashboards show the previous day's data with a data gap indicator. Self-healing scenario 3 — Schema change: problem: a new column is added or a column is renamed in the source. Detection: schema check in Stage 1 catches unexpected columns or missing expected columns. Response: for additive changes (new column): pipeline proceeds, ignores the new column, alerts the data engineer to update the pipeline. For breaking changes (removed/renamed column): pipeline halts, alerts immediately, provides the schema diff. Operational excellence metrics: pipeline reliability: percentage of days the pipeline completes on time (target: 99.5%). Data freshness: time between event occurrence and dashboard availability (target: under 6 hours). Alert accuracy: percentage of alerts that were true positives (target: over 80%). Recovery time: average time from pipeline failure to successful completion (target: under 2 hours). For the Director of Analytics: the automated pipeline eliminates the 3-day manual process. Built-in test user exclusion prevents the recurring error. Self-healing handles common failure modes without human intervention. The analyst's time shifts from data processing to insight generation'"
    weight: 0.30
    description: "SelfHealing"
