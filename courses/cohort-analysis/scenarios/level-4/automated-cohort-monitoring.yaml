meta:
  id: automated-cohort-monitoring
  level: 4
  course: cohort-analysis
  type: output
  description: "Build automated cohort monitoring — design anomaly detection, alerting systems, and automated root cause analysis for cohort metrics"
  tags: [monitoring, anomaly-detection, alerting, automation, expert]

state: {}

trigger: |
  The Head of Analytics says: "We only discover retention problems
  weeks after they start because someone has to manually check the
  cohort tables. I want automated monitoring that detects anomalies
  in cohort data and alerts us within 24 hours. And it should help
  us understand WHY, not just tell us something is wrong."

  Task: Design an automated cohort monitoring system with anomaly
  detection, smart alerting, and automated root cause analysis.

assertions:
  - type: llm_judge
    criteria: "Response covers anomaly detection methodology for cohort data — detection: 'Anomaly detection for cohort metrics: what to monitor: the diagonal of the retention triangle — the most recent data point for each cohort. This is where new anomalies first appear. Monitoring metrics: 1. Month-1 retention for each new cohort (compared to the trailing 6-month average). 2. Latest retention reading for each active cohort (compared to the expected value from the retention model). 3. Cohort size (compared to expected signups from marketing). 4. Revenue per user at each lifecycle point (compared to the trailing average at the same point). Detection method 1 — Statistical process control: calculate the mean and standard deviation of month-1 retention over the last 12 cohorts. Mean: 38%, standard deviation: 3pp. Upper control limit (UCL): 38% + 3×3 = 47%. Lower control limit (LCL): 38% - 3×3 = 29%. If any cohort's month-1 retention falls below 29% or above 47%, trigger an alert. Two-sigma warning: if between 29-32% or 44-47%, flag as a warning. Three-sigma alarm: if below 29% or above 47%, flag as a critical alert. Detection method 2 — Predictive residuals: fit a retention model (BG/NBD or curve) to each cohort. For each new data point, compare actual to predicted. Residual = actual - predicted. If the residual exceeds 2 standard deviations of historical residuals, trigger an alert. This method catches anomalies within a cohort's lifecycle (e.g., month-4 retention suddenly drops for a specific cohort). Detection method 3 — Cohort-to-cohort comparison: for each new cohort reaching month N, compare to the previous cohort at month N. If the difference exceeds the historical month-to-month variation by 2x, alert. Example: January M3 was 25%, February M3 was 24%, March M3 was 18%. March is 7pp below February, while historical variation is ±2pp. Alert: March cohort month-3 retention is anomalously low'"
    weight: 0.35
    description: "Detection"
  - type: llm_judge
    criteria: "Response covers automated root cause analysis — rootcause: 'Automated root cause analysis: when an anomaly is detected, the system should automatically investigate the most likely causes. Root cause analysis pipeline: Step 1 — Segment decomposition: automatically break the anomalous cohort into sub-segments. For each segment, check if the anomaly is concentrated: channel breakdown: organic M3: 30% (normal). Paid search M3: 22% (normal). Paid social M3: 8% (anomalously low — was 15% for previous cohort). Finding: the anomaly is concentrated in paid social. Geography breakdown: US: 20% (normal). EU: 18% (normal). APAC: 5% (anomalous — was 14%). Finding: APAC paid social is the epicenter. Step 2 — Event timeline correlation: check for events that coincided with the anomaly start: product releases (a bug in the APAC-targeted feature?). Marketing campaign changes (new paid social creative for APAC?). Tracking changes (APAC SDK update?). External events (competitor launch in APAC market?). Finding: a new paid social campaign targeting APAC launched 3 months ago. These users had low initial engagement and are now churning at month 3. Step 3 — Behavioral analysis: compare the anomalous sub-segment to healthy sub-segments. Anomalous segment (APAC paid social): activation rate: 15% (vs 35% for other segments). Feature adoption: 8% used collaboration (vs 25% overall). Average sessions in month 1: 2.3 (vs 5.8 overall). Finding: APAC paid social users never activated — the ad creative attracted low-intent users. Step 4 — Generate root cause summary: automated report: anomaly: March cohort month-3 retention dropped 7pp below expected (18% vs 25%). Primary cause: APAC paid social acquisition (new campaign launched 3 months ago). Evidence: APAC paid social users had 60% lower activation rate. This segment's month-3 retention is 8% vs the 15% baseline for paid social. Recommendation: review APAC paid social targeting. Consider pausing the campaign until targeting is improved'"
    weight: 0.35
    description: "RootCause"
  - type: llm_judge
    criteria: "Response covers alerting design and operational workflow — alerting: 'Alerting system design and operational workflow: alert severity levels: Level 1 — Informational (green): metric is within 1 sigma of expected. Logged for trend tracking, no notification. Level 2 — Warning (yellow): metric is 1-2 sigma from expected. Slack notification to the analytics channel. Auto-generates a brief root cause summary. Expected response: analyst reviews within 48 hours. Level 3 — Alert (orange): metric is 2-3 sigma from expected. Slack notification to analytics + product channels. Auto-generates detailed root cause analysis. Expected response: analyst investigates within 24 hours, reports findings. Level 4 — Critical (red): metric is more than 3 sigma from expected, OR a key metric crosses a business threshold (e.g., month-1 retention drops below 25%). PagerDuty alert to the on-call analyst. Auto-generates root cause analysis with recommended actions. Expected response: immediate investigation, update to leadership within 4 hours. Alert fatigue prevention: group related anomalies (if 3 metrics are anomalous for the same cohort, send ONE alert with all three). Suppress repeated alerts for known issues (if APAC paid social is known to be problematic, do not alert daily). Weekly digest: summarize all warnings and informational alerts in a weekly email. Operational workflow: 1. Daily pipeline (6 AM): refresh cohort data, run anomaly detection, generate root cause for any alerts. 2. Morning standup (9 AM): analyst reviews any overnight alerts, triages severity. 3. Investigation (same day): for Level 3+, analyst deepens the automated root cause analysis with manual exploration. 4. Resolution: analyst marks the alert as: true positive (action taken), false positive (threshold adjustment needed), or known issue (suppress future alerts). 5. Monthly review: review alert accuracy (target: less than 20% false positive rate). Adjust detection thresholds based on feedback. Dashboard: a single monitoring dashboard showing: traffic light status for each active cohort. Timeline of recent alerts with resolution status. Trend charts for the top 5 monitored metrics. Root cause summaries for any open alerts'"
    weight: 0.30
    description: "Alerting"
