meta:
  id: cohort-analysis-at-scale
  level: 4
  course: cohort-analysis
  type: output
  description: "Scale cohort analysis infrastructure — design warehouse-native cohort pipelines, columnar OLAP architectures, and query optimization for billion-row datasets"
  tags: [scale, data-warehouse, OLAP, query-optimization, expert]

state: {}

trigger: |
  The VP of Engineering says: "Our cohort queries take 45 minutes on
  10M users. We're growing to 100M. The data team runs cohort analyses
  daily but the queries are killing our warehouse. How do we architect
  cohort analysis that scales to 100M+ users without breaking the bank?"

  Task: Explain how to architect cohort analysis infrastructure that
  scales to hundreds of millions of users.

assertions:
  - type: llm_judge
    criteria: "Response covers data architecture for scalable cohort analysis — architecture: 'Scalable cohort analysis architecture: why current queries are slow: typical cohort query pattern: SELECT cohort_month, period_offset, COUNT(DISTINCT user_id) / cohort_size FROM events JOIN users ON events.user_id = users.user_id GROUP BY cohort_month, period_offset. This joins a massive events table (billions of rows) with a users table and computes COUNT(DISTINCT) — one of the most expensive operations. Architecture pattern 1 — Pre-aggregated cohort tables: instead of querying raw events every time, build a materialized intermediate table. Daily ETL pipeline: Step 1: user_daily_activity table. One row per user per active day: user_id, date, cohort_month, channel, plan. Deduplicated (one row even if 100 events). Reduces billions of events to millions of user-days. Step 2: cohort_retention_snapshot table. Pre-computed retention for every cohort × period combination. Updated daily via incremental processing. Columns: cohort_month, period_offset, channel, plan, cohort_size, active_count, retention_rate. Query time: milliseconds instead of minutes. Architecture pattern 2 — Columnar OLAP (ClickHouse, DuckDB, BigQuery): columnar storage is ideal for cohort queries (they aggregate across many rows but only access a few columns). ClickHouse can compute cohort retention over 100M users in under 10 seconds. Key optimizations: partition by cohort_month (each cohort query touches only relevant partitions). Sort by user_id within partitions (makes COUNT(DISTINCT) efficient). Use materialized views for common aggregations. Architecture pattern 3 — Tiered computation: hot tier (real-time): last 7 days of data, in-memory (Redis/Druid). Used for real-time cohort dashboards. Warm tier (daily): last 12 months, in OLAP engine (ClickHouse/BigQuery). Used for standard cohort analysis. Cold tier (historical): 12+ months, in data warehouse (Snowflake/Redshift). Used for long-term trend analysis and LTV projections. Query routing: dashboard queries hit the warm tier. Ad-hoc deep dives hit the cold tier. Real-time alerts hit the hot tier'"
    weight: 0.35
    description: "Architecture"
  - type: llm_judge
    criteria: "Response covers query optimization techniques — optimization: 'Query optimization for cohort analysis at scale: Optimization 1 — Approximate COUNT(DISTINCT): exact COUNT(DISTINCT user_id) over 100M users is expensive. Use HyperLogLog (HLL) for approximate counts: error rate less than 2% with 10x faster execution. For retention rates, 2% error is acceptable (35% vs 35.7% does not change decisions). Use exact counts only when precision matters (financial reporting, small cohorts). Optimization 2 — Bitmap indexes for user sets: represent each cohort as a bitmap (bitset). Active users in period N are another bitmap. Retention = intersection count / cohort size. Bitmaps compute intersections in microseconds. Roaring bitmaps compress efficiently for sparse sets. Ideal for: large cohorts with boolean membership queries (active or not). Optimization 3 — Incremental computation: do not recompute the entire retention triangle daily. Only the diagonal changes (the most recent period for each cohort). Process: each day, compute activity for ALL cohorts on THAT day. Update only the latest period_offset for each cohort. Historical cells never change (month-3 retention for the January cohort is final). This reduces daily computation from O(cohorts × periods) to O(cohorts). Optimization 4 — Sampling for exploration: for ad-hoc analysis (not published dashboards), use a 10% random sample. Sample-based retention rates are accurate within ±1-2pp for cohorts with 1,000+ users. Explore on the sample, then validate final results on the full dataset. Optimization 5 — Partition pruning: structure tables so queries only scan relevant partitions. Partition by: cohort_month (most common filter). Sub-partition by: channel or plan (common segmentation dimensions). A query for January cohort scans only the January partition (1/12th of the data)'"
    weight: 0.35
    description: "Optimization"
  - type: llm_judge
    criteria: "Response covers cost management and operational considerations — operations: 'Cost management and operational considerations: cost analysis for 100M users: raw events approach: 50B events/year, $5K-15K/month in warehouse compute. Pre-aggregated approach: 3.6B user-days/year, $1K-3K/month. The pre-aggregated approach is 5x cheaper because it eliminates redundant event-level processing. Cost optimization strategies: 1. Right-size the refresh frequency: real-time cohort refresh: expensive, rarely needed. Daily refresh: sufficient for 95% of use cases. Weekly refresh: acceptable for executive dashboards. Match refresh frequency to decision frequency. 2. Tiered storage: keep only the last 12 months in the OLAP engine (expensive, fast). Archive older data to object storage (S3/GCS, cheap). Pull archived cohorts on-demand for historical analysis. 3. Query governance: set compute budgets per team (marketing gets X credits/month). Log and review expensive queries — often a poorly written query causes 80% of cost. Auto-kill queries that exceed 5-minute runtime. Operational checklist: 1. Data freshness SLA: cohort dashboards update by 8 AM daily. 2. Data quality checks: run automated validation after each refresh (monotonicity, size, completeness). 3. Schema evolution: when new dimensions are added (new channel, new plan), the pipeline should handle them without manual intervention. 4. Backfill capability: when a bug is discovered, the pipeline should be able to recompute any historical period. 5. Access control: raw user-level data is restricted. Aggregated cohort data is accessible to all analysts. 6. Documentation: SQL queries, pipeline DAGs, and dimension definitions are documented and version-controlled. For the VP of Engineering: migrate to pre-aggregated cohort tables. Use a columnar engine (ClickHouse or BigQuery) for the warm tier. Implement incremental daily computation. Expected: query time drops from 45 minutes to under 10 seconds. Compute cost drops 5x. Ready for 100M+ users'"
    weight: 0.30
    description: "Operations"
