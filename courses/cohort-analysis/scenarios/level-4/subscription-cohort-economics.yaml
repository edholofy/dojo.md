meta:
  id: subscription-cohort-economics
  level: 4
  course: cohort-analysis
  type: output
  description: "Analyze subscription cohort economics — calculate GRR, NRR, net revenue retention, expansion revenue, and negative churn by cohort for SaaS business planning"
  tags: [subscription, GRR, NRR, expansion-revenue, negative-churn, expert]

state: {}

trigger: |
  The VP of Finance at a SaaS company says: "Our investors are asking
  about net revenue retention by cohort. They want to see GRR and NRR
  separately, understand our expansion revenue, and know if we have
  negative churn. Can you build a cohort-based subscription economics
  analysis?"

  Task: Explain how to calculate and analyze GRR, NRR, expansion
  revenue, and negative churn using cohort data.

assertions:
  - type: llm_judge
    criteria: "Response explains GRR and NRR calculation by cohort — metrics: 'Subscription cohort economics — GRR and NRR: Gross Revenue Retention (GRR): measures revenue retained from existing customers, EXCLUDING expansion. GRR = (beginning revenue - downgrades - churn) / beginning revenue. GRR is always ≤ 100% (you cannot retain more than you started with without expansion). Net Revenue Retention (NRR): measures revenue retained INCLUDING expansion (upsells, cross-sells, seat growth). NRR = (beginning revenue - downgrades - churn + expansion) / beginning revenue. NRR can exceed 100% (negative churn). Calculating by cohort: January cohort (100 customers, $10K MRR at signup): month 6 MRR breakdown: 80 customers still active ($8,500 base MRR). 20 churned (-$2,000). 5 downgraded (-$300). 15 expanded (+$2,100 from upgrades and seat additions). GRR = ($10,000 - $300 - $2,000) / $10,000 = 77%. NRR = ($10,000 - $300 - $2,000 + $2,100) / $10,000 = 98%. April cohort (120 customers, $14K MRR): month 6: 100 still active ($12,200 base). 20 churned (-$2,400). 3 downgraded (-$200). 25 expanded (+$3,800). GRR = ($14,000 - $200 - $2,400) / $14,000 = 81.4%. NRR = ($14,000 - $200 - $2,400 + $3,800) / $14,000 = 108.6%. Key insight: April cohort has NRR above 100% (108.6%) — this is negative net revenue churn. Even though 20 customers churned, the expansion from remaining customers more than compensates. This is the holy grail of SaaS economics. Comparing across cohorts: track GRR and NRR at standard intervals (month 3, 6, 12) for each cohort. If GRR is improving: fewer customers are churning or downgrading (product-market fit strengthening). If NRR is improving while GRR is stable: expansion motion is working (upsell is more effective). If GRR is declining but NRR is stable: more churn but offset by expansion — fragile equilibrium'"
    weight: 0.35
    description: "Metrics"
  - type: llm_judge
    criteria: "Response covers expansion revenue analysis and negative churn — expansion: 'Expansion revenue cohort analysis: expansion sources by cohort: seat expansion: customers add more users over time. Plan upgrades: customers move from basic to pro to enterprise. Usage-based expansion: customers increase API calls, storage, or transactions. Cross-sell: customers adopt additional products. Tracking expansion curves by cohort: January cohort — cumulative expansion as percentage of starting MRR: month 3: +5% expansion. Month 6: +21% expansion. Month 12: +45% expansion. Month 18: +62% expansion. The expansion curve shows how quickly cohorts grow their spending. Healthy expansion patterns: linear expansion (steady growth through seat additions). Step-function expansion (plan upgrades at renewal points — annual contract milestones). Accelerating expansion (network effects within the customer — more departments adopting). Negative churn analysis: negative churn occurs when expansion revenue exceeds churned and downgraded revenue. January cohort — revenue waterfall over 12 months: starting MRR: $10,000. Churn: -$3,200 (32% logo churn). Downgrades: -$500. Expansion: +$4,500. Net MRR at month 12: $10,800 (NRR = 108%). The cohort is generating MORE revenue at month 12 than at signup, despite losing 32% of customers. Negative churn by segment: enterprise customers: NRR 125% (high expansion, low churn). Mid-market: NRR 105% (moderate expansion, moderate churn). SMB: NRR 78% (low expansion, high churn). Enterprise cohorts are the engine of negative churn. SMB cohorts have significant positive churn — they lose revenue over time. Implication: the business should invest disproportionately in enterprise acquisition and retention. SMB serves as a funnel for future upgrades, not as a standalone profitable segment'"
    weight: 0.35
    description: "Expansion"
  - type: llm_judge
    criteria: "Response covers investor-facing analysis and strategic implications — strategy: 'Investor-facing subscription cohort analysis: the investor presentation format: slide 1 — NRR trend by cohort vintage: show NRR at month 12 for each quarterly cohort over the last 2 years. Q1 2024: 92%. Q2 2024: 96%. Q3 2024: 100%. Q4 2024: 104%. Q1 2025: 108%. The trend shows the company crossed the 100% NRR threshold and is accelerating. This is the single most important SaaS metric for investors. Slide 2 — GRR and NRR decomposition: show a waterfall chart: starting MRR → -churn → -downgrades → +expansion → ending MRR. Separate by cohort to show the improvement over time. Highlight that GRR is improving (less churn) AND expansion is increasing (better upsell). Slide 3 — Cohort LTV curves: plot cumulative revenue per customer for each quarterly cohort. Show that newer cohorts have steeper curves (generating revenue faster). Calculate LTV:CAC by cohort: Q1 2024: LTV $12K, CAC $5K, ratio 2.4:1. Q1 2025: LTV $18K, CAC $5.5K, ratio 3.3:1. The ratio is improving — each new cohort is more efficient. Strategic implications: 1. Payback period by plan: if enterprise pays back in 8 months and SMB in 18 months, shift acquisition spend toward enterprise. 2. Expansion timing: if most expansion happens at month 6-9 (plan renewals), invest in customer success touchpoints before renewal. 3. Churn prevention ROI: calculate the revenue saved per prevented churn. If average churned customer was paying $150/month and had 18 months remaining LTV: preventing one churn saves $2,700. Compare to cost of retention intervention. 4. Pricing optimization: if NRR varies by pricing model (seat-based vs usage-based): seat-based cohorts NRR 105% (predictable but capped). Usage-based cohorts NRR 120% (higher ceiling but more volatile). Consider hybrid pricing to capture both expansion dynamics. For the VP of Finance: build a quarterly GRR/NRR dashboard by cohort. Track expansion sources separately (seats, upgrades, usage, cross-sell). Present the NRR trend to investors as the headline metric. Use cohort LTV:CAC ratios to optimize acquisition budget allocation'"
    weight: 0.30
    description: "Strategy"
