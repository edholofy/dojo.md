meta:
  id: marketplace-cohorts
  level: 4
  course: cohort-analysis
  type: output
  description: "Analyze marketplace and platform cohorts — track two-sided retention for buyers and sellers, measure liquidity effects, and optimize marketplace health using cohort data"
  tags: [marketplace, two-sided, buyer-seller, liquidity, expert]

state: {}

trigger: |
  The COO of a marketplace platform says: "We track buyer retention
  and seller retention separately, but they affect each other. When
  sellers churn, buyers can't find what they need and they churn too.
  How do we analyze cohort dynamics in a two-sided marketplace?"

  Task: Explain how to build and analyze cohort analyses for two-sided
  marketplaces where buyer and seller retention are interdependent.

assertions:
  - type: llm_judge
    criteria: "Response explains two-sided cohort analysis methodology — methodology: 'Two-sided marketplace cohort analysis: analyzing buyers and sellers independently misses the critical interaction between the two sides. Framework: parallel cohort tracking with cross-side metrics. Buyer cohort analysis: January buyer cohort (5,000 signups): month 1 retention (made at least 1 purchase): 35%. Month 3: 22%. Month 6: 15%. Month 12: 10%. Standard metrics: orders per buyer, average order value, repeat purchase rate. Seller cohort analysis: January seller cohort (500 signups): month 1 retention (listed at least 1 item): 60%. Month 3: 45%. Month 6: 35%. Month 12: 28%. Standard metrics: listings per seller, revenue per seller, fill rate. Cross-side cohort metrics (the marketplace-specific layer): for each BUYER cohort, track: number of unique sellers they transacted with. Time to first successful transaction (liquidity speed). Failed searches or abandoned carts (demand not met). For each SELLER cohort, track: number of unique buyers who purchased from them. Time to first sale (seller activation). Listing-to-sale ratio (demand for their supply). The cross-side perspective reveals: if seller retention drops, buyer cohorts experience longer time-to-transaction and higher cart abandonment (supply shortage). If buyer retention drops, seller cohorts see fewer sales per listing and higher listing-to-sale ratios (demand shortage). Marketplace health cohort: combine both sides: for each monthly cohort of the MARKETPLACE (not individual users): total liquidity ratio: transactions / (active buyers × active listings). Match rate: percentage of buyer searches that result in a transaction. Seller fill rate: percentage of listings that get at least one transaction. These marketplace-level cohort metrics reveal whether the platform is getting healthier (improving liquidity) or sicker (declining match quality) over time'"
    weight: 0.35
    description: "Methodology"
  - type: llm_judge
    criteria: "Response covers liquidity effects and network dynamics — liquidity: 'Liquidity effects on cohort retention: the liquidity flywheel: more sellers → more selection → more buyers → more demand → more sellers. Cohort analysis reveals whether this flywheel is working. Measuring liquidity impact on retention: compare buyer retention in high-supply vs low-supply categories: high-supply categories (electronics, 500 sellers): buyer M3 retention: 30%. Average time to purchase: 2 days. Low-supply categories (specialty goods, 20 sellers): buyer M3 retention: 12%. Average time to purchase: 8 days. The 18pp retention gap is driven by supply availability — when buyers cannot find what they want quickly, they churn. Seller retention × buyer retention interaction: buyer January cohort retention broken down by seller density at signup time: buyers who signed up when 400+ active sellers: M3: 28%, M6: 20%. Buyers who signed up when 200-400 active sellers: M3: 20%, M6: 12%. Buyers who signed up when under 200 active sellers: M3: 12%, M6: 5%. Buyer retention is a function of the marketplace state they entered. This means buyer cohort quality is partly determined by SELLER cohort health at the time. Network effect cohort analysis: for each monthly marketplace cohort, calculate: number of active participants (buyers + sellers). Transactions per active participant. Revenue per active participant. If transactions per participant increase as the marketplace grows: positive network effects are present. If they decrease: the marketplace is diluting (too many inactive participants). Seasonal liquidity patterns: holiday cohorts of buyers may see high immediate transactions but low repeat (one-time gift buyers). Back-to-school seller cohorts may see seasonal demand patterns. Decompose marketplace cohort trends into structural improvements vs seasonal effects'"
    weight: 0.35
    description: "Liquidity"
  - type: llm_judge
    criteria: "Response covers marketplace-specific optimization strategies — optimization: 'Marketplace cohort optimization strategies: Strategy 1 — Coordinated onboarding: buyer onboarding should emphasize categories with the deepest supply. Do not promote categories where sellers are scarce (buyers will have a bad first experience and churn). Seller onboarding should emphasize categories with the highest buyer demand. Match new sellers to underserved categories where their first sale is most likely. Measurement: track buyer M1 retention by first-purchase category. Track seller M1 retention by time-to-first-sale. Strategy 2 — Supply-constrained cohort management: when seller churn causes supply shortages in a category: proactively notify buyers: your saved category has fewer options this month — here are alternatives. Accelerate seller recruitment in the affected category. Track buyer cohorts that experienced the shortage separately — they may need win-back efforts. Strategy 3 — Marketplace cohort health dashboard: for each monthly marketplace cohort, display: buyer retention curve. Seller retention curve. Cross-side metrics (match rate, liquidity ratio). Revenue per participant. Overlay seller events (seller churn spikes, new seller campaigns) on buyer retention charts to visualize cross-side impact. Strategy 4 — Cohort-based marketplace economics: calculate unit economics by cohort for each side: buyer CAC vs buyer LTV by cohort. Seller CAC vs seller LTV by cohort. Marketplace-level analysis: what is the optimal buyer-to-seller ratio? If each seller supports 15 buyers and seller LTV is $500: buyer acquisition can be subsidized because seller revenue funds it. Track this ratio by cohort — if newer cohorts have lower seller-to-buyer ratios, the marketplace may need to invest more in seller acquisition. For the COO: build parallel buyer and seller cohort dashboards. Add cross-side metrics to understand interdependence. Monitor the liquidity ratio by cohort to track marketplace health. Use buyer retention by seller density to quantify the value of seller acquisition'"
    weight: 0.30
    description: "Optimization"
